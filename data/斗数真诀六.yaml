- - '##'
  - 再論田宅
- - '###'
  - （一）
- - '####'
  - 1. 田宅宮在斗數之中代表（一）住家及附近的環境（二）一個人的財庫（三）影響子女好壞的宮位（四）宅運的吉凶與異動（五）祖產的旺衰（六）未來的風水位：等，這些部份已在第二集論固定宮位時即已詳述，此處不再重複。本篇就置產與異動方面的看法，作一深入淺出的探討，而有關其他一些較為瑣碎，或未曾提過的重點，則併入田宅細評一項予以說明之。
- - '####'
  - 2. **一、置產**
- - '#####'
  - （1）置產是人生當中不算小的一件事，因而必須由大限的情況來看。凡是大限之祿忌入大限子田線，入本命子田線，亦或是大限子田線入本
- - '##'
  - 第 15 章 人生百态
- - '###'
  - （一）有巢变无壳：大限若田宅有忌而财宫有禄，或田宅有忌而官禄有禄，待流年行至子田线或将其引动，皆有因手头紧或因为要投资事业，而将所置之产变卖之兆。当然形成卖产的原因尚有多种，只要注意当年所行之运，四化所落之处，即可知道其当年因何故卖产。
- - '###'
  - （二）鸡窝换鸭窝：田宅宫有化科星而无禄，则不主置产而为租屋，若流年走田宅且迁移亦引动，便有因故而换租他屋而居之兆。其性质为租屋换租屋。
- - '##'
  - 三、田宅细评
- - '###'
  - 再论田宅
- - '####'
  - （一）家运
- - '####'
  - （二）意外
- - '##'
  - 论公务员升迁
- - '###'
  - （一）首先其大限走势须强劲，官禄宫亦旺，在此限内方有突破。
- - '###'
  - （二）再看当年的流年之科禄权入何宫位，且必须要入小限之三方四正才有效，但不可犯二个空亡星，否则就是瞎子点灯——白搭。
- - '###'
  - （三）分析流年是否走官禄宫或迁移宫而予以引动，若小限走官禄宫而逢科禄权，或是流年斗君宫位有灾厄，和流年科禄权相会者，但无天马或来引动迁移宫者，为只在原机关升官而不是调迁。
- - '###'
  - （四）看本生年禄马、贵人，以及流年天马、天魁、天钺和本生年魁钺有否会合，若斗君及小限宫也相会者必定升迁。
- - '###'
  - （五）除了本生年科禄权之外，另有流禄、流魁、流钺等吉星必须相会合才行。如有大限化禄会合更好，但这些吉星皆不可值二个空亡星才有力量。
- - '###'
  - （六）调迁。未逢权禄，则表示只是调动单位而不是升官。
- - '####'
  - （七）小限及其官禄中的流年四化引动，及煞星可显示其升降的动静，例如小限官禄逢煞冲，或禄、权转忌表示当年之职位明升暗降（职称虽好听，但属于打入冷宫坐冷板凳的情形）。
- - '####'
  - （八）若小限、官禄逢忌转禄权则为明降而暗升（例如：占缺或职位抢手，晋升机会多或是为油水多的肥缺）。
