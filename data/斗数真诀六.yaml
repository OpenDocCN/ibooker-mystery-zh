    SPA 美容、塑身店，放眼望去處處可見女人四十一枝花，甚至五、六十歲還風韻猶存、騷包得很吶！反觀那些疏於保養又過度應酬的男人們，不到四十就頂上無毛小腹微凸，看起來像個糟老頭，確實是比較又「穩」又「重」。


