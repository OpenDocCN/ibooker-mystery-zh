    一、智能方面的殘障


    先天性的一些有關這方面的疾病，有智障、蒙古症、水腦症後天人


    為因素所造成的，如植物人及外傷所造成的腦部損害，以上所舉的病


    症都會導致智力受損，或成爲白痴，而這種情形多半與昌曲二宿化忌


    有關，因爲昌曲二宿，於人體除了主視力之外，也分別主中樞與自律


    神經系統，一宿若逢化忌則易影響人的記憶力、判斷力、視力與理智


    性，會造成先天性的智能障礙者，多半必須命格具備以下情形：


    （一）命坐昌曲，疾厄宮十逢己辛又化忌回命宮者。


