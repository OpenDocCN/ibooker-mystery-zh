    ## 主角從缺


    ### 多胞胎


    「禧年台北市政府發出的雙胞胎召集令，來自全省各個角落共聚集了三千九百六十一對雙胞胎，已打破二千九百對的世界紀錄。


    根據醫學界的統計，生雙胞胎的機率是二百五十四分之一，三胞胎是十五萬三千分之一的機率，要四胞胎則是一百三十萬分之一才有機會，像美國堪薩斯州的桑德拉女士一口氣生下三男二女的六胞胎，這種機率恐怕比中了大樂透還要不容易呢。會有多胞胎的子女，有部份是受家族的遺傳基因，但絕大部份是不孕症的婦女借助醫學人工受孕，其造成多胞胎的機率最高。大概是老天爺體恤不孕症的婦女，做人工受孕既花錢又痛苦，乾脆一次給足了。


    一個家庭同時誕生了兩個小傢伙，年輕的父母肯定是手忙腳亂窮於應付了，加上所有的養育費用都是以雙倍計算，足以讓上班族的父母猛抓頭皮，如果一次生了三、四胞胎的話，經濟比較差的家庭一定養不起，會馬上喊救命立刻宣佈「倒莊」，像美國那位一次生六個的媽，一定是上帝跟她開了一個大玩笑，恐怕得動員整個社區的義工來共同扶養才應付得了呢！


    相信對於命理感到好奇，或存有質疑的人都會問：相同生辰八字的人難道都是相同命運嗎？答案是否定的，因為性別、出生地、家庭環境、教育過程……等條件不一，各有差別之故，或許對方還會追問：那麼雙胞胎呢？前述條件他們都相同，甚至是同一家公司出品的，連血緣都相同，難道日後他們的成就、學歷、遭遇都相同嗎？難道他們都同時紅鸞星動或結婚嗎？答案仍舊是否定的。


    我們只能說雙胞胎他們有可能長得很像，而且體質、嗜好、身材、思想都很接近、甚至連心裡所想的事都一樣，他們之間有很奇妙的心電感應，與溝通的默契，相信凡是曾養育過雙胞胎的父母都贊同此。


    點，但是這些是屬於其先天的部份相同，不包括往後他二人的際遇方面，而事實上在我們日常生活中所遇到的實際例子來看，確實如此，有其中一人從政而一人從商者，有其中一人桃花走得嗄嗄叫而另一個卻不知伊人在何方，更有一人安然無恙而且飛黃騰達，而另一個卻早已回蘇州賣鴨蛋了，這其中的原因到底是在哪，且看以下之分析：


    （一）如雙胞胎分別出生在兩個不同的時，則各以各的時辰排盤則命盤各自獨立，故而運勢自然各自不同。


    （二）多胞胎同一時辰內出生者，先出生者以該時辰按平常之論法論之。


    （三）多胞胎同一時辰內出生者，後出生者，仍按該時辰排盤，卻是以該盤之遷移宮爲其命宮，諸星不動，只有十二宮跟著變動而論，於是前一胎的兄弟宮爲後一胎的僕役宮，其它依此類推。


    （四）同一時辰內出生者，先出生者之身宮照常理推，後出生者則以其命宮爲定點，按推身宮之方法推，例如：先出生者命坐午位身宮在戌位官祿，則後出生者爲命坐子位，身宮在辰位。


    （五）推大限的方法與平常相同，各以其所屬命宮之處起大限，若雙胞胎爲一男一女則須分順行或逆行，小限亦同。


    （六）推算流年，小限則分爲：第一、三胎以太歲爲主，小限爲輔，第二、四胎則以小限爲主不宜看太歲，因此流年將少引動一個宮位。


    （七）斗數目前最多只能算到四胞胎爲止，若於同一時辰內出生之第三胎仍以該盤爲主，但以第一胎之兄弟宮爲其命宮，第四胎則以第一胎之僕役宮爲命宮，仍舊是星宿不動，而十二宮跟着轉動。


    （八）同一時辰出生之雙胞胎，命宮分坐同一張盤的命遷線，若其中一人命無主星，則須借用對宮星宿，此時因兩人坐命星宿相同，這對雙胞胎必然形貌酷似，例如：一人命坐卯位紫貪，另一人則命坐酉位借紫貪，此種情形在醫學上稱之爲同卵雙生。


    （九）同一時辰出生之雙胞胎，若各自命宮都有主星，而不須借用對宮的星座的話，此二人在形貌個性上必有些許外人稍能分辨的不同之處，此屬異卵雙生。


    （十）由第 (八)(九) 項可知在同一時辰內出生之四胞胎之中，第一胎會與第二胎較像，而第三胎會與第四胎較像。


    （十一）若雙胞胎當事者對於本身之生時不甚確定之時，可藉由第八、九二項理論，再觀察其形貌神似與否來加以校正。


    ## 第 13 章 人生百態


    ## 學歷與考運


    古語有云：「上品無寒門、下品無世族」，社會充滿封建色彩的「九品中正制」，參加科舉的考生必須身家清白，三代身世清白無人犯法，還規定操賤業的子弟不能參加考試，如家中從事娼妓、屠夫、剃頭、看相算命……等都被摒除於仕途之外，科舉功名被嚴格管制，只有少數人有機會出人頭地，現在的社會人格自由平等，不分貧、富、貴、賤，甚至連犯罪被關在牢裡的犯人都可以請假參加聯考，已真正落實布衣公卿的理想境界。


    古代的科舉分童試、鄉試、會試和殿試四個等級，童試屬於縣級，鄉試屬於省級、會試和殿試則屬於中央級，每隔三年考一次，其中逢寅申巳亥年舉辦童試，子午卯酉年為鄉試，辰戌丑未年為中央級的會、殿試，各地學子紛紛上京赴考。古代的科考一進試場三天兩夜不能出場，除絞盡腦汁答題外還要自己升火煮飯，有關吃、喝、拉、睡都在一個獨立的狹小空間裡，現在的考生筆試完後，就可以回家吹冷氣、睡覺補眠、養精蓄銳一番，實在有夠幸福的啦！


    以前童試第一名賜進士及第，鄉試第一名為解元，會試第一名稱會元，殿試由皇帝親自主持，文部閱卷官評出會試前十名呈皇帝欽定後放榜，榜首者稱為狀元。殿試放榜是三年一度的大事，皇宮裡鐘鼓齊鳴，皇帝親自陞殿，禮部尚書宣讀殿試成績，叫做傳臚，斗數賦文裡說陽梁呂祿格為傳臚第一，指的就是各級科考的榜首。三級科考都得第一名就叫「三元及第」，為科舉時代最高的榮譽。從宋到清的一千年間只有十一人得此殊榮，朝廷會在他們的故鄉建「三元及第」坊，以資表揚。科舉制度始於隋朝終於清朝，清光緒三十年舉辦最後一場會試然後劃下休止符。


    十年寒窗無人間，一舉成名天下知，這是中國自古以來對於諸位莘學子的寫照，爲的是能衣錦還鄉、光耀門楣，同時也是爲了可以藉此謀個一官半職，而得以衣食無慮，如此一來、名、利、食、祿一舉數得，是寒門得以進身，布衣得以爲卿相之道，以今日社會而言，學歷亦是廣受重視的個人條件，雖求學的目的已不再拘限於仕途，卻是將來在職業選擇上，以及工作的競爭上的一個重要依據，並藉由種不同類的考試加以取才任用，以下就學歷與考運之判別要領分別敘述之。


    一、學歷


    ### （二）個人的資質


    「不會唸經、休當和尚，不會上鞋、休當皮匠」，讀書也要看此人是不是塊讀書的料，一味的揠苗助長是徒勞無功的，有關於讀書方面，要看此人命格中是否具备读书的命，方法是看化科、昌、魁钺在其命盘中分佈的状况，若三合之中所会到的这些文星愈多愈佳，其中以化科星效力最强，例如：化科星坐命者爱现、好面子、禁不起漏气，因此会下苦心把书读好，便可在人前人后、咬文嚼字、舞文弄墨的臭屁。


    而昌曲二星以文昌对读书才有帮，主其文思敏锐、聪明、领悟力强，读书比别人轻松，文曲则是主异途功名，主口才和表达能力、说的比唱的好听，魁钺二星亦是以魁星较为管用，主其考运比人家好，因此过关容易。


    与科星相反的几个不利读书的星有：（一）化禄——好玩、不爱唸书，（二）空亡星——会造成记忆力不佳，（三）华盖——不利科考，结果会令人跌破眼镜！在三合中照会愈多愈不利，但并不表示此人智力不高，只是在数学和理化方面会阴沟裡翻船而已，其他方面也並不遜。


    色於人，一株樟樹再怎麼改變也成不了紅豆杉，況且樟樹的用途也絕不在紅豆杉之下啊！天生我材必有用，培育者若過於八股，則當今世上可能會因此而多了一位蒙古大夫卻少了一位藝術天才，豈不可惜！


    俗云：「小時了了、大未必佳」。讀書除了命格之條件之外，行運尤其重要並以第一、二大限求學時段爲考量，若此人命身會衆多文星，以表示幼年成績不錯，遇第二大限走化祿或空亡星，或大限官干爲辛，那可頭大了，其成績會一路下滑，若能「混」得過畢業，就已算萬幸了，此種情形再逢小限走昌曲化忌位，或走本命官祿宮且小限官祿亦不佳時，當年即有學歷因故中斷之。


    學歷亦須參照本命、遷移、田宅、如大限遷移或田宅逢破，則求學過程亦有不順，其原因查小限流年這三個宮位即知是休學、重修或被退學，反之亦有本命平常但求學期間逢科星及衆文星齊會，則借勢一氣呵成，魚躍龍門者亦大有人在，因此在判斷時，命格及大限運勢皆須注意，但是有文命者卻遠不如適時走文運。


    評斷一個人的學歷，須就此人之出生年代的背景加以考量，舉凡在當時的教育普及狀況，當時的學制，生長環境的教育風氣，男女受教育的机会以及個人的家境狀況：……等，種種影響其繼續升學的因素，即便是當事者書唸得再好，有時也會無奈的受制於這些因素，同時在衡量一個人學歷的高低標準，也必須以當時的普遍標準為依據，例如在三、四十年前大專聯考錄取率不到一成，若能讀個大學畢業，就幾乎被視為文曲星下凡塵了，畢業後，政府機構或大型企業搶著要人。


    而現在，拜託！大專聯考錄取率近九成，造成學士滿街走，碩士多如狗，有博士學位的人，太多因為找不到工作而跑去開計程車，現在也已沒啥好奇怪的，因此前後的標準差別太大了。


    ## 二、考運


    現代人在一生中或多或少都有機會面臨一些大大小小不同的考試，例如：升學考試、公職考試、就業考試、升遷考試、資格考試、專業技術認定考試……等，然而在衆多的考試之中，凡是有經驗者相信都會有一種共識，即過關者未必全是報考者中之佼佼者，或準備充份的，作答完美的未必上榜，所謂：不願文章中天下，只願文章中試官，會讀書的未必考運都好，考試當年的考運若不好的話，偏偏就會抓錯重點，背熟的沒考、沒背的考題全出了、能奈它何？


    至於看各種考試的考運如何？則與看學歷的方法有某些類似之處，只不過看考運是以應考當年之情形爲主，其參考要領如下：


    （一）查該年小限之命官、遷、田宅之好壞，以及流年之文昌、天魁是否入宮或會合，文星會合得愈多機率愈大，若小限官祿再人權祿便佳。


    （二）大限若得衆文星會合，則會提高命中率，但小限此時若不配合亦是枉然。


    （三）公職考試必先考其命格是否會魁鉞而爲公家格，若命身具有文曲、右弼、天鉞等星，主異途功，待在公門反而沒發展。


    （四）不具公家格者，雖於大限走魁鉞時有進入公門的可能，但大限過，必因故而中斷離職，領不到退休金。


    （五）小限走華蓋則不利考試，結果會令人出乎意料之外，成績必然比平時還差。


    另外，有關於就業或公職、特種、專業技術等考試，或高普考、資格考等項，除了前述要領以外，尚須考慮以下因素：


    （一）當事者是否符合該機關所要求之外型條件——如空服、櫃台、接待。


    （二）御等能力。


    （三）本身之背景是否符合該機關之要求——如身家清白、無前科等等。


    （四）當事者之命格是否具備某職之格——如空服、導遊、外交人士、必須具備流蕩天涯、或日月辰戌對照之格才成立。


    （五）該項考試之招考制度及錄取率。


    最後，我們要討論一個衆多學子所關心的問題：我適合讀什麼科系？此點必須以其命格爲主官祿宮爲輔來判斷，因爲此事關重大，有關於未來的職業和專長之故。大原則是:


    （一）紫微、天府、武曲以商科爲主，(二)太陽、天機以國貿、化工爲主，(三)廉貞、破軍以電機、電子爲主，(四)機月同梁以公職爲目標，(五)太陰、天同、文昌、文曲以文科或美工爲優先，


    （六）天機、天梁太陰加煞或會昌曲以電腦軟體、高科技為訴求，

    （七）巨門、太陽、天梁以文、法學科為主，（八）天相、七殺屬銀保科……。


    現在社會上的行業種類早已超過三百六十行，要以紫微有限的星曜來細分科系相當困難，須很有經驗的以整個星盤的組合還不一定能「猜」出來，前述的組合謹供參考而已。如果身宮有文曲、右弼、天錢等，屬於「異途功名」的格局，則選讀什麼科系已經沒什麼重要了，反正所修的科系將來也用不到，只是混張文憑而已，就算讀「見笑死（系）」也無妨。


    ## 現代孝子


    台東縣有個潘姓婦女，十四歲就嫁人，十五歲就生了第一胎，然後一個接一個，生了七男十三女，丈夫去世後再嫁，她又生了四個，十三年之間總共生育了二十四個小孩，這種「增產報國」的傲人成績終於讓她登上「最多產的母親」的世界紀錄。生這麼多小孩到底要幹嘛？相信連當事者都說不出所以然來。

    這位婦人平均一年四個月就能製造出一個小孩，其勇氣和毅力令人讚嘆！但是這輩子除了懷孕、做月子、哺育外，大概沒辦法再去做別的事，活著，不過是努力做人而已。為了張羅這一大群嗷嗷待哺的小孩，光是三餐的吃就有夠恐怖了，還能奢談其他的品質？對這個苦命的農婦而言「幸福美滿」就像天邊的彩虹般，那樣可見而不可及。

    在以前的農業社會，有人生半斤、一打那是很正常的事，有些人數真訣（六）個都生不出來，上帝待人不公，莫此爲甚。到底多產與不孕是由那些因素決定？從醫學的角度上來看，顯然是生理結構的問題，從占星學的角度是星盤的結構和組合出了差錯，在女性的星盤上子位、戌位和子女宮裡的星曜呈穩定和強勢，肯定她生育力很強，體質容易受孕，只要「跨過」就有了。若女性的星盤上子位、戌位和子女宮有煞、忌同臨或交馳的話，很容易淪爲「無子西瓜」，是不容易受孕的體質。

    斗數賦文說女命辰、戍、丑、未逢文昌或文曲化忌主其輸卵管有阻礙。生男育女雖以女命爲主，但男人亦負有「播種」的大任，男人若戌位有煞、忌同臨亦容易造成其「精蟲稀少」或「精蟲活動力不足」的體質。

    從民國五十年代起台灣地區實施家庭計劃，執行「兩個恰恰好」、「個不嫌少」運動，加上現代人注重生活品質及子女養育、教育費用高漲，年青一代幾乎都是生一、二個就不敢再生了。現在政府反過來來鼓勵增加生育，每一胎還補助五、六萬元，問題是，有誰會為了領這些補助款去生一個小孩？除非那個人腦殼壞去了。可是，若無法傳宗接代也是一件嚴重的事，平常稱做絕嗣或倒房，此後神主牌沒人供奉，清明無人掃墓，死後到了地府也無顏見列祖列宗。所以現在的時代潮流，不管體質再好也沒有人會多生，倒是各大醫院的不孕症門診大排長龍。


    古有孝子，而今亦有孝子，只是這子不同於那子，古有二十四孝，今人更將之發揚光大，愛屋及烏而發展為「二十五孝」，每一孝都有個名稱，至於這第二十五孝呢？是否該稱之爲「後顧之憂」，若是到頭來所得到的的是「後生可畏」，倒還令人欣慰沒有白孝一場，若得來的卻是「後患無窮」，那可真是冤枉到家了。


    且莫笑，君不見當今世上白髮孝子遠多過於黑髮孝子嗎？古人說不孝有三無後爲大，於是晚輩為了孝親之故拚老命的傳宗，也因爲如此衆多兒女如油麻菜籽一般，不須太好的環境及照料即可獨立的爭相萌發，父母縱使付出了全部的心力，但在衆多的子女瓜分之下，每人所能得到的關照亦有限，其它的必須要靠自己了，同時也因爲他自己須要做得更多，因此他才能更了解父母的辛勞，日後反而更會有反哺回饋之心。


    而今，雖不孝有三，卻是無後爲大，爲了不讓子女再受到自己過去的種種待遇，於是不敢多生，怕生多了無法供給他優渥的環境，打從孩子尚未出生之時，便早已爲他佈置好了，一個無所不用其心的育嬰房，各項設備皆採用上好的名牌貨，孩子一出生後那更是陪上了一條老命細心的呵護著，吃好的、用好的、絲毫不敢怠慢，孩子漸漸懂事以後，一股成龍成鳳的使命感油然而生，於是加班賺外快好讓孩子學這個、補那個、巴不得把他調教成十八般武藝樣樣精通一般，好在日後能在人前人後揚眉吐氣，特別是在聯考之日，奔上跑下、扇涼、遞茶水、擦汗、打氣、侍候得無微不至，恐怕連他自己的父母都不曾得到過兒子孝孫的道股孝勁，足以令老人家爲之氣結。


    然而，當兒女就算真的成龍成鳳了之後呢？個個不是忙於自己飛騰的事業，要不就是專注於自己的小家庭，或再次承傳孝子之職，鮮有閒空再回來探望上一屆的孝子囉！更甭奢望什麼反哺回饋了，若是子女日後偏又不成材，那更是欲哭無淚，恐怕孝子還要做到老啦！


    在現代孝子所培育的下一代中，普偏的都存在著一些後遺症：因成長過程過於安逸享受，故而易成溫室之花，經不起風霜，物質豐厚，有求必應，因而沒有感恩之心認爲理當如此，且無法體會資源來之不易，在家中一切以他爲主，因此稍有不順遂即無法忍受，父母掏心掏肺的關照與付出，致使他養成嚴重的依賴性，於是進入了社會之後較吃不了苦，受不了氣，捱不起罵，禁不起磨，並且好逸惡勞、投機取巧而不肯腳踏實地，想想，如果我們未來的主人是這個德行，豈不辜負諸位孝子原先欲其成龍成鳳之期望，以下幾種情形有現代孝子的傾向：


    （一）破軍坐命者，男女同論，因其為子息之宿，坐命者易有溺愛子女之情形。


    （二）太陰坐命者，重視家庭、重子女，母性強，對子女容易過於呵護。


    （三）子女宮有祿存，化祿，化權者，對子女有求必應。但是子女的好壞優劣則是以子女宮的三合來看，若無煞忌沖照，則子女尚有孝順的可能，反之若逢煞忌沖照，那麼您的付出可能成單行道了，到時別怨嘆「造反有理、不孝應該」。


    現代流行的小家庭，其家庭重心未必是夫妻倆，有很多小家庭有了小孩後，整個生活重心都往小孩身上傾斜，中國人一向有犧牲這一代，成就下一代的偉大情操，但結果往往是這一代確實被犧牲了，但'
