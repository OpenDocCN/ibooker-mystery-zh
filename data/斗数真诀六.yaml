    # # 第15章 人生百態


    人與人的磁場隨時會因為運勢的關係而改變，例如去年某生肖為當事者的貴人位，今年卻成了小人位，此種情形於實際生活中的例子亦相當多，就像去年還和某人打得火熱，相談甚歡，頗有相見恨晚之感，於是無話不談，而今年卻因爲某種原因而被擺了一道，頓覺所遇非人而悔不當初，只有暗罵一句：「墓仔埔倒水肥」。


    不管是命格或是流年，遇到小人纏身都是一件令人煩惱的事。一般而言，小人可概分爲兩種，一、是主動招小人，是平時太臭屁、耍大牌、行事太囂張目中無人，是自己故意刺激別人而造成別人的反感，產生負面的抵制或毀謗。二、是被動的招小人，是自己看起來比較懦弱或是流年行運陷入弱勢的是非圈，引來不良人士的欺侮。


