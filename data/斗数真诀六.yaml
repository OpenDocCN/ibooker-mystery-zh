    **所事事者，有刀頭舔血的人在江湖、身不由己者，亦有醉生夢死的不**


    知今夕是何夕者。芸芸衆生，來自四方，大家各安天命，各盡本份，隨緣因緣際會，聚散離合，載浮載沉，閃爍隕落，一切始於緣起而終於緣滅。**


    **人是一種難以理解的動物，研究人的心理尤艱難於生理，相信沒有**


    任何生理或心理學的學術，能夠針對隨機選定的某一人，然後僅憑一紙生辰、一面之緣，即能對其生理、心理趨向以及際遇可以立即瞭若指掌。紫微斗數就在這裡展現其神機妙算的廣袤本事，用古人的智慧結晶，輕易地推論出：人性、人心、人體、人品、人倫、人材、人緣、人壽、以及人生……等狀況，對象涵蓋：富人、窮人、貴人、小人、好人、壞人、男人、女人、文人、武人、吏人、懶人……；且準確性甚至會比FBI所作的個人調查資料還要正確、迅速、經濟與不可思議。


