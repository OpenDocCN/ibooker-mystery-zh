    22. **純情桃花**：運限逢紅鸞或流鸞入命身宮，且命格不具桃花者，是屬於單戀型的，屬於愛你心口難開，純純（蠢蠢）的愛。

    23. **偷香買身**：運行殺破狼，三方逢四煞，空劫交沖或相夾，財帛宮有暗祿者，此桃花為收費性質，可說一舉兩得，賺錢又賺爽。

