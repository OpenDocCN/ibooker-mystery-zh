    # ## 愛情路上妳和他


    若問世間情爲何物？相信沒有幾個人可回答得出來，愛情是可愛又迷人的，人類不分貧、富、貴、賤都需要愛情的滋潤，在人生的旅途上，愛情是扮演多麼關鍵的角色，有了愛情，人生立刻由黑白變彩色，生活立刻有了動能和活力，思想才由靜止而活潑，才能體會什麼是「幸福」、哪裡是「天堂」。有了愛，世界樣樣都美好。但，在愛情的世界裡，男女觀念有別，女人的愛情始終如一卻不一定長久，男人的愛情可能長久卻不容易專一。愛情的真締是要好好的愛自己更愛對方，愛情的快樂不是在激情的擁抱中結束，而是持續的永恆著。


