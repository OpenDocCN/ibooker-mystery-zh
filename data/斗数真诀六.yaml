    (八) 小限比太歲強是告別人，太歲比小限強是表示別人告你。


    (九) 若昌、曲化忌在小大限遷移宮或財帛、官祿、僕役等宮，流年神煞又犯官符，大小限在弱宮，該年必定見官符，天相又化忌者，定有官司纏身。


