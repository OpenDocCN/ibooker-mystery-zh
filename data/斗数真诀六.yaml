    ## 第 18 章 人生百態


    ### 正財與偏財

    #### (六)


    一、命格：


    武曲（武貪、武相例外）天府、太陽（旺地）祿存、以上這幾種星坐命或入財宮者屬於正財，在他們的心態也較不會去動偏財的腦筋，因為他們不去打沒有把握的仗，寧可少賺點也不願冒賠本的風險。


    二、命身組合：


    （一）命身宮星宿愈少愈單純，表示此人較屬於取正財傾向。


    （二）命身宮星宿愈多則其個性愈複雜，而顯得難以捉摸，當然其動腦子賺錢的點子也更多，且層面較廣較活，因此偏財成份居多。


    （三）若其命身宮互相交纏之下，具多種格局，則須列入考量，如命坐武府原屬正財但身入紫相，則其亦為紫府與武相的格局，因此來財屬於正偏皆有。


    #### 三、財源：


    福德宮主來財之源，因而個人的財福線的星宿愈單純、愈趨向於正財，而財福線星宿愈是複雜，其來財愈是屬於多樣化的偏財，再者財福線有權祿或權祿交馳者。除了表示此人來財之源廣泛以外亦顯示此人來財輕鬆，較不會去靠苦力硬碰硬，所謂生意錢三十年，血汗錢萬萬年，故而像這種來財方式多屬動腦或具投機性的偏財，另外，財福線有吉星入或夾亦主偏財，雖不一定大筆，但源源不斷。


    #### 四、四化


    四化入財福線或命宮，財宮之暗合位有四化亦主偏財，但須注意是化吉或化忌，例如：祿忌同宮或交馳於財福線，表示來財夾帶是非，


    ![img/aaeb686b88f14162f0212207e8e28f0e_216_0.png](img/aaeb686b88f14162f0212207e8e28f0e_216_0.png)


    ## 正財與偏財

    ### (六)

    #### 獻寶訣


    若流年逢祿轉忌則為過路財神，乾爽一場。有關於正財的來處須考慮命宮、財宮的星性，有關於偏財的來路則要以四化來作指標。


    在固定命盤的看法，對財帛即有專篇介紹，其要領是以本命格及大限為主，此篇所要談的是有關流年的看法，並如何精細分析財的去處。


    其要領為：


    （一）先看此人具備大富的命格與否，或只是小富或小康。先確定其等級和層次，因同樣是發，但貧者之富尚遠不如富者之貧，所謂黃鱔斬了一截還是比泥鰍大。


    （二）再看行至哪一個大運才發，或會不會發，所謂命好尙不如運勢的配合則小卒子有時也會變英雄。如運勢不配合，走到旺運之時不是年紀太小就是太老亦是枉然。


    （三）命格較高者往往是走中年運，然而究竟是在哪一個大限發，就要看大限的祿基，即大限祿存所落之宮位的旺弱。


    星必須乘旺且入於該限之三合，才表示該大限有搞頭，祿基可顯示出該大限內有關財帛的旺弱情形。


    (四)小限、太歲亦同論，小限的祿基即是您今年的財運旺弱，也就是自己的手氣，而太歲的祿基是表示外面來財的旺弱，即外來因素的干預：如環境、景氣、天時、地利……等條件對自己當年財運之影響。


    (五)以四化的祿忌來看財來財去，小限財帛宮的宮干化祿所入的宮位為準來財之處，所化的星性則為來財的性質，同理，財宮的宮干化忌所入的宮位即為主要的財去之處。


    (六)福德宮只是看來財之源的多寡與順逆，例如：福德宮若有化忌，空亡或煞星，該年賺錢必然會較吃力而並非沒有。


    (七)田宅為藏財之所，田宅逢破或逢煞要比財宮逢破嚴重得多，主該年必破財或暗耗，以斗君及太歲流月推算月份即可獨眼龍看戲——一目瞭然了。


    （八）參加抽獎或是彩券、樂透中獎，則是屬於偏財中的機會財，流年必須財官有化祿（貪狼；破軍不論）加恩光、天貴同臨才有機會得大獎。


    （九）至於打牌是否會贏錢，得端看流日當天的「手氣」如何，而比同桌打牌的另外三個也要看，否則你今天的財運雖好，另外那三個財運比你更強的話，你還是沒什麼勝算的。


    ## 移根換葉論移民


    舊門社會裡，一個人除非是一、隨軍征戰，二、出外經商，三、賣藝走唱，四、上京赴考，五、逢天災人禍而逃難的話，一生中大都少有遠行的機會，隨著時代的變遷，進步的交通使得天涯若比鄰，再加上政治的開放，國民所得水準的提高，資訊交流的便利，每年因各種不同原因出國的人數與日俱增，當中有去去就回者——觀光、商業考察、探親，有去了暫時不回者！—唸書、駐外工作。以及一去不回者移民。


    記得在前一陣子台灣舉行第一屆的民選總統的時候，又適逢中共一連串的軍事示威演習，把數十年來穩坐象牙寶塔裡的有錢人嚇得是魂不守舍，食不下嚥，前前後後又有什麼一九九五潤八月、一九九七香港末日之類的專著與報導，搞得寶島居民是個個人心惶惶的，於是緊接著就有不少禁不起刺激的有錢人，使出有錢能使鬼推磨的絕招，舉家飛的飛、逃的逃、以免中共打來被列為黑五類，而被活活的鬥死，所以三十六計、走爲上策，引起了一陣不小的移民風潮。


    至於移民的動機，因人而異，未必人人如前述原因，但總不外乎以下所列之數種緣故：


    （一）政治因素：如前述狀況，基於國家政情不穩定而作狡兔三窟之措施，或失勢的政客，不願見江東父老而寧可到外國坐冷板凳終老，也不願在這裡被打入冷宮，亦有具特殊敏感身份之政要，怕江山失陷之後被提出清算八百年前的老帳。


    （二）治安因素：嫌國內治安每下愈況，黑道猖狂，白道姑息，企業則在層層綁標圍標下，以及黑道的干預威脅，無法生存而個個出走，百姓則爲求自保亦是萌生離意。


    （三）跑路因素：安份守己的人賺錢總是嫌太慢了一點，一些爲非作歹之徒在飽掠搜括之後，怕東窗事發而吃牢飯，於是不如提前一步逃往海外，讓檢警抓不到也引渡不了，便可以好好的用這些黑心錢來享受下半輩子，當然啦！如果他的命夠長的話。


    （四）教育因素：這年頭「孝子」實在太多，為了能讓孩子接受歐美先進的教育環境，做父母的無所不用其心，選擇美加等先進國家移民，一來孩子外語絕對能學好，二來不須忍受過多的考試壓力以及不合理的學制，三來多一種國籍對他們而言總是較安心。


    （五）養老因素：有的人在步入晚年之後，事業、孩子、人生責任等都已了，於是想找個更好的生活環境來安享晚年，這種情形最好先去試住一段日子再移民也不晚，不要到時候因語言、宗教、風俗生活習慣都不同，而出現水土不服的情況反而痛苦。


    在命理上對於移民之構成條件，必須是移往不同政體的宗主國，且具有該國之公民身份才算，例如：台海兩岸即算移民，而香港與大陸之間於九七之後就不算移民了，然而不論何故移往何處，要移民也必須具有移民的命格，若只是大限符合，則運過之後即萌歸意，具有移民的命格者，也並非一出生即移民，以下就有關如何判斷移民的要領分別列敘如下：


    一、移民的命格：（一）命坐四馬地且身宮在遷移宮廟旺者，（二）遷移宮星座旺過於命宮者，（三）遷移宮有權祿者，（四）日月辰戌位坐命者，（五）同梁已亥位坐命者。


    二、宮祿宮有權祿者，主有兩本以上的護照。


    三、遷移宮若無祿，則未必能定居，流年祿不管用，因期限過短。


    四、具移民命格者，於大限祿權入遷移，或遷移廟旺時即有移民徵兆，並於小限太歲走遷移宮，且引動田宅宮時附諸行動。


    五、不具移民命格者，雖於大限具備，並已於流年時引動遷移、田宅而移民出去者，必於限過之時或流年遷移祿轉忌時，或因水土不服，語言或因其他某種原因而遷回祖國，除非其下一個大限遷移仍廟旺入權祿，且符合移民之有利要件，才能繼續定居國外。


    六、移民的原因，須視其大限三合走勢，配合星性與四化落宮即可推出。


    ## 第 13 章 人生百態


    ### 老人悲歌

    #### （六）

    ##### 圖靈真訣


    前一陣子，從電視上看到六個女兒聯合上法院狀告老母僞造文書，所爲的不過區區三百多萬父親的遺產分配不公，就算全數拿出來分配，每個人分到的也不超過是五十萬而已，爲了這點小錢就將老母告官，不惜讓她老人家坐牢去，實在令人難以常理去想像。電視畫面將這些女兒在法庭上推倒母親的情景全都錄，那些女兒們也已爲人之母，這種鏡頭所產生的身教和言教，不知道是否會遺傳下去，不怕將來她們的子女也一樣回敬？


    還有之前的「徐懷鈺尋親事件」等，都對我心裡產生相當大的震撼。長久以來，每當社會新聞出現老人事件，我都有無限的感慨，中國人的父母子女人倫親情乃人之本性，爲何會以如此的景況收場呢？在一個正常家庭的親子關係，應該不致如此才對，所謂事出必有因其中一定有其因果關係。


    記得小時候在鄉下時有一位鄰居，其人吃、喝、嫖、賭樣樣都會，脾氣又暴又壞，每次賭博輸了錢，回家後就打妻小出氣，每當酒後亂性就把小孩綁起來抽打，其子經常告訴我們「等我長大後，一定一腳把他踹出去」。可見老人會被遺棄，背後必有其因素，社會不能只同情老人是弱者，這是很不公平的。


    以社會現狀，獨居老人可分爲三種。一、沒有子女無人照顧者，依現有的社會福利制度，由政府來照顧應該沒有問題才對，二、有子女，但因其人個性偏激、思想孤僻，或年輕時未盡父母之責，當年老力襄時，有何資格要求子女善盡撫養回饋之責？三、有子女，少數卻出了歹子孫，而非本身沒盡責，就算是如此，子女是自己生、自己養、自己教的，結果如此對待你，夫復何怨？


    從社會層面分析，以前的人小孩生得多，除了家中需要多一些人手幫忙耕作之外，也帶有「播種理論」的想法，再怎麼衰也不會個個都是不肖子，總有一、二個會孝順養我吧！總是帶有「養兒防老」的觀念，現代人子女生得少，甚至是負成長，父母把所有的愛和資源全集中在少數的子女身上，E
    時代的年輕人心理總認為，父母對他們好是應該的，沒有提供足夠的資源，讓他們比不上別人，是父母的失職是大人的不對，學校的老師也沒教他們「孝順」兩個字要怎麼寫。在這種時代的潮流裡，要指望他們長大後對父母感恩回饋，豈不如同緣木求魚呢？既然現實如此，現代的人必須一方面養兒育女，一方面也得為自己將來預作打算，最重要的是身邊須有一些養老的銀兩，否則等到老了體弱力衰無力掙錢時，再來期望子女的施捨，那真的是三好加一好了。


    從命理的角度分析，下一代的品質優劣，由星盤上的子女宮其三方四正的星座組合情況即可判別，星群吉祥強勢，表示你的子女資質優厚，能光耀門楣大展鴻圖。如果配合的田宅宮不佳，那也只是滿足你的虛榮心罷了，雖然望子成龍成鳳是人之常情，待他們長大翅膀硬了就各自飛翔，奔忙於各自的事業領域，那有多餘的時間關心你，過年過節有回來看一下你，就得躲在被窩裡偷笑了。


    同樣的理論，子女宮若是星群皆陷弱，表示下一代成就不怎樣，配合的田宅宮如果是吉星坐守又強勢，子女長大後反而會在你身邊，隨時向你噓寒問暖的，讓你享受含飴弄孫之樂。爲什麼會這樣呢？因爲他們能力有限、收入不多，跟老人家同住可省掉不少房租開銷，講的露骨一點是，他在等你的遺產呢。


    萬一，你的子女宮三方四正的星群是煞、忌聚集的話，那你心裡應該清楚，養兒育女只是傳宗接代的責任的義務，將來沒有替你添麻煩出紕漏已是萬幸了，別指望他們長大後會孝敬你或回饋你，爲自己做好生涯規劃才是上策。


    ## 什麼是好命


    「什麼才叫『好命』？相信沒有一個人能說出一個準兒來，不同的人有不同的想法、認知和目標，標準不同答案當然不一而足了。”


    記得我有一位女性的客戶，在婚前是個富人家的千金小姐，每天過著飯來張口茶來伸手無憂無慮的生活。婚後反而經歷了無法細數的痛楚，例如丈夫的外遇，讓她瀕臨離婚的邊緣。事業的失敗，讓她嚐到三餐無以為繼的苦日子。子女的叛逆翹家輟學等，每一件事和過程都令她刻骨銘心，但是透過她那無限的包容心，始終能逐一化解障礙。三十多年一路走來，終於將子女撫養長大，各自成家立業，完成家族託負的任務。她說：「不管別人怎麼看，我覺得自己命很好。」


    關於好命和歹命的定義，純粹是個人主觀的認知問題，你自己認為每人過得快樂就是好命，每天唉聲嘆氣眉頭緊縮，像是哭虛坐命般，那肯定是歹命了。要怎樣把自己列爲「好命」的會員呢？那就是把需求標準降低一點，把人生目標訂在能力能達到的範圍，你的人生快樂就會多一點，斗數裡說天同星坐福德宮的人最好命，那是天同星的星性要的不多，凡事有就好，沒有也無妨，心態上很容易滿足，所以沒啥煩惱。


    人的需求也因階段性不同而有不同的認知，貧窮的人說：只要三餐能溫飽我就很滿足，失業的人說：能有一份穩定的工作我就很高興了，大富的人說：我多麼希望我的財富後面能多加二個零。好色的人說：「只要能擁有三妻四妾左擁右抱，就算頭髮掉光減少十年壽命也無悔」，那你呢？


    絕大多數的人會說：只要我有錢我就滿足、我就是好命，其實這是沒錢人家的心願而已，事實上「錢」真的能代表一切嗎？答案是否定的。例如王永慶先生的財富足以動搖國本，但其一生之操勞也是人盡皆知，以其八十幾歲高齡，還要帶領員工跑步、還在為了六輕、電廠和大陸投資煩心，萬一他生了病，股票一定跌停板。台南奇美公司的許文龍先生，財富規模跟王永慶沒得比，但他每週上班一天，找主要幹部開會，半小時就結束了，其他的时间不是打球、釣魚就是泡個老人茶，生活總是優逸悠哉。兩相比較就知道誰比較好命。


    在斗數的星盤上，三方四正無煞忌沖照者，代表其人心態上傾向安定、守成，沒有重大的慾望，就沒有衝刺的動力，自然也不會重大的起落和挫折。三方四正煞、忌、空劫照會太多，主其人慾望熾盛，慾望難以滿足，只好拚命的衝刺，就會帶來無窮的波折，飽受命運的侵凌。這理論大限逢之同論。


    所以說好命或歹命，完全在於個人的慾望高低，無關命理的富、貴、賤、貧，好命與歹命的標準唯人自定，在斗數裡福德宮是個重要的指標。


    ## 第 15 章 人生百态


    ## 論官訟與牢獄之災


    天上星多月不明、地上人多心不平，人平不語、水平不流，天地之大卻絕對找不到兩個一模一樣的人來，因而人與人的相處無法像齒齒工整的齒輪那樣毫無嫌隙，是非磨擦，在所難免，有的是為了要人爭一口氣，佛爭一柱香，有的認爲人善被人欺、馬善被人騎，最冤的是人無傷虎心、虎有傷人意，然而，不論是為了什，總歸是非只爲多開口，煩惱皆因強出頭，於是事態輕者，頂多叫罵一陣或幹一架便罷，若事關重大且有犯法之虞者，恐怕就要對簿公堂了。


    在現代這社會中，除了殺人放火之外，能引起官司的原因多半與毒、賭、財、情都脫不了關係，且佔的比例頗高，以一個吸毒成癮的人而言，吸毒可令其傾家蕩產在所不惜，一旦毒癮再發作，爲了弄錢吸毒，恐怕沒有不敢做的事，賭徒也是一樣，久賭必輸，一旦輸紅了眼，也是什麼事都幹得出來的，至於為財的成份而打官司的比例那更是普遍了，而且什麼身份都有，並不一定只有經商者才會發生。


    在斗數中會導致官司的星宿及組合有以下數種：


    （一）廉貞：因其為囚星，一旦化忌再走到或是會於三合之地即引發官司。


    （二）天府：此星加煞主官訟，雖不會化忌，但人四化再走到或三合會到即驗。


    （三）雙暗：落陷之太陽星，以及不逢太陽驅暗之巨暗等星，加煞亦會因不能見光之事而惹官司。


    （四）父疾：紫微斗數是沿革於古論，在古代為民申冤調解的縣太爺又稱之為父母官，一旦開罪了他們可是輕者挨板子重者押入大牢，因此父疾線如果逢雙忌，官府橫豎得走幾趟了。


    然而，在一生漫長的歲月之中，要如何的分辨到底當事者何時有犯官司的可能？首先還是溯及本源，先研究當事者之命格，以及其大運的走法，及星盤的星宿組合，因爲有的人是命格緣故、有的則是運勢使然，如爲運勢則勢必要考慮其星盤構造，以及星宿的組合，與行限之順逆方向，才能有效掌握事件的本末。


    以命格而言，廉貞或天府坐命者，惹上官司的機率要比其他星宿坐命者高，每逢丙年或行運宮干爲丙，廉貞化忌即觸動，若小限或太歲再走到，或：合會到即有犯官司的可能，單忌尙無大礙，若逢雙忌則有「官窯」可蹲了，若非廉貞或天府坐命者，如大限走廉貞再逢化忌，或小限太歲走到，且逢煞忌才會引動官司，否則其大限不具備還不至於構成多大的威脅。


    至於在衆多類型官司之中，要如何研判當事者究竟是因何事惹上何種官司？首先還是要先分析其命格，以及星盤架構及運程走勢，先確立其身份背景之後，再考其運程際遇及接觸層面，以研判他最有可能


