    # 第15章 人生百態


    少，故而再回頭看看自己的命格，便會覺得比上雖不足，但比下也總有餘了，而且再將自己目前的實際狀況，與大人物或社會衆生比較一下，只要您的慾望不是高不可及，便會覺得雖然不甚滿意，但是也還可以接受。


    人的慾望是永無止境的，所謂天大地大未若人心之大，心理學家馬斯洛的需求層次論曾指出，當人們目前的需求達到滿足後，便會依需要的程度作進一步的追求，從生理需求、物質需求：……一直到達自我實現，這是個難以任何標準來衡量的需求。如果以正面的觀點來看的話，這是人類進步的原動力，社會日新月異的催化劑，然而，任何事情都是一體兩面的，如果站在負面的影響來看，則過度的需求與慾望，亦是人類給自己背負的一大包袱，不僅須要付出龐大的代價，若一直達不到理想目標則恐有兩種情況發生，一是乾脆走捷徑，為達目的而不擇手段。一則是永遠處在不滿現狀的因境之中。'
