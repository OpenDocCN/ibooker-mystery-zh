    # # 同性戀情


    劉太太結婚不到半年，感覺老公對她愈來愈冷淡，夫妻生活情趣每

    沉愈下，連做愛做的事也推三阻四的老是提不起勁，沒什麼熱度可

    言，也完全沒有新婚的情調，經由姊妹淘的建議，請徵信社派人對老

    公跟監。隔沒幾天，徵信社的人打電話通知她說：「妳老公現在××

    賓館開房間」，劉太太氣急敗壞的驅車趕去，會同管區和徵信社的人

    員破門而入，沒想到她定神一看，橫躺在老公身邊赤條條的身子，竟

