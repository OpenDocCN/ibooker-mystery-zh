    ## 斗數真訣

    (六)


    用理性來欣賞人生

    用感性來面對生活


    用理性來欣賞人生

    用感性來面對生活


    天乙上人 著


    ## 真訣（六）

    ### 奉常處變 扭轉乾坤

    #### 掌握生活 享受呼吸


    **序**


    俗語說：「一樣米養百樣人」，雖然這只是個比喻，但真實的人生豈只是百態而已呢？在現實的社會舞台上，有人汲汲營營，厚顏狗腿、哈腰奉承，只為了升官發財或覬覦特定的利益。有人晨昏顛倒，終日埋首數字牌支而廢寢忘食，只為了夢想一夕致富，麻雀變鳳凰。


    有人日以繼夜的辛勤工作，為求一家溫飽而不能；有人為富不仁，除了自己省吃儉用，也吝於九牛一毛的公益，累積了大筆財富留給子孫，卻害子孫爲爭奪遺產而骨肉相殘。有人為了社會大愛而散盡家財終不悔，秉持一份生命雖死，愛卻可永留人間的偉大情操。更有人為了一份理想或目標而終其一生心血，不論心願是否能如其達成；畢竟人生有夢最美、希望相隨。看盡人生百態，心裡倒也覺得可愛。


    ## 遊戲真訣 (六)


    序


    不久前，網路上流傳著一則小故事，一名醫生帶著妻女出遠門旅行，半路上因車子電池耗盡被困在一處荒郊，萬分焦急的他求助無門，徒步走了好幾個小時的路，才找到公用電話並向數公里外的一家修車廠求援，不過，心裡其實很擔心，怕因逢假日遠道而來的修車人員會趁機敲他竹槓。


    沒多久，一位拄著柺杖雙腳不良於行的殘障者開著拖車迅速抵達，原本那位醫生想先詢問價錢，但還來不及開口，對方已很快的將車修好，醫師訥訥的問：「我該付多少修理費？」，卻聽見對方回答：「不用錢」。呆愣之際，修車技師又接著說：「當年，有人幫我脫離比你更糟的險境，我的兩條腿都斷了……救我的那個人並沒有向我要一毛錢，他告訴我，如果我感念這人間有情，就把這份情傳送出去。」這幾句簡單但卻意義非凡的話在醫生心裡迴盪。隨後，那位技師笑著告訴醫生：「你並沒有欠我錢，只要記得，有機會時，也把這份情——直傳下去！」


    將「現代斗數真訣」、「紫微斗數命例三百」全套付梓發行，把這份學問和三十年實際經驗傳承下去，是我此生最大的心願。雖然付出了六年的心血和五百多萬的經費，讓我無辜的變成一位負債者，但眼看著作品逐步的完成，內心實在充滿無限的安慰和喜悅，辛苦也值得。而為了走更長遠的路，回收製作成本是必需的，以及執行可更廣泛迅速的傳播命理的智慧管道——架設天乙上人網站，提高書價是不得不的抉擇。雖然學問本無價，只在乎內容是否值得、是否合乎您的需要，但因您的少許付出能支持作者，有機會將更多的經驗傳續下去和分享、幫助更多的人，福報肯定會與您相隨的。


    二〇〇一、中秋於台北居


