    \ 189\n毒與賭 198\n貴人與小人 206\n正財與偏財 211\n移根換葉論移民 218\n\n## 圖數真訣 (六)\n\n## 目錄\n\n\
    ## 前言\n\n您有過賞星的經驗嗎？您是否曾經在秋高氣爽的季節裡，趁著月兔皎潔，晴空無雲的夜晚，找一處寬廣僻靜之地，躺下來仰望一覽無際的星空而神遊其中呢？當您入神地欣賞這一片靜夜星空之時，是否隱約注意到每顆星星都有不同，星與星之間也有奇妙的互動。繁星點點、大小不一、遠近有別、明暗不等、色彩各具、動靜不定、各有所屬、各具特色，有發出光芒照亮別人的，有依靠別人照亮者，有靜處不動者，亦有四處奔竄亂撞者，隨著天體的運行時而相逢時而別離，時而大放異彩，時而黯淡無光。\n\
    \n這一切情景，豈不像極了我們站在超脫現實的山谷上，俯看茫茫人海一般的寫照嗎？有整天忙忙碌碌的朝不謀夕者，亦有飽食終日的無所事事者，有刀頭舔血的人在江湖、身不由己者，亦有醉生夢死的不知今夕是何夕者。芸芸衆生，來自四方，大家各安天命，各盡本份，隨緣因緣際會，聚散離合，載浮載沉，閃爍隕落，一切始於緣起而終於緣滅。\n\
    \n人是一種難以理解的動物，研究人的心理尤艱難於生理，相信沒有任何生理或心理學的學術，能夠針對隨機選定的某一人，然後僅憑一紙生辰、一面之緣，即能對其生理、心理趨向以及際遇可以立即瞭若指掌。紫微斗數就在這裡展現其神機妙算的廣袤本事，用古人的智慧結晶，輕易地推論出：人性、人心、人體、人品、人倫、人材、人緣、人壽、以及人生……等狀況，對象涵蓋：富人、窮人、貴人、小人、好人、壞人、男人、女人、文人、武人、吏人、懶人……；且準確性甚至會比\
    \ FBI 所作的個人調查資料還要正確、迅速、經濟與不可思議。\n\n世間人有千百種，若要將其加以適當的分門別類，實屬不易，因為衡量的準則難以拿捏，如何歸類，尚視站在何種角度加以區分，若以身爲研究者的立場而言，其衡量標準必須是公平的、客觀的、普遍的，在成就上必須不分貧富貴賤、成敗得失，在學藝上不分儒道墨法、士農工商，在地域上不分東西南北、蠻夷戎狄，在關係上不論鄰里鄉黨、親疏遠近，我們不難發現，在人生的大舞台上，若以各個角色在這世上短短數十寒暑的作爲與使命看來，可將人大致劃分爲四種類型。\n\
    \n### 一、來報恩的人\n\n此種類型的人，就像上輩子受了某人的大恩大德，無以爲報，而在這輩子必須以無怨無悔的付出來作爲報答似的，這種類型的例子如：\n\
    1. 女命太陽坐於卯位（未宮者）\n2. 男命太陰於酉位（子位坐命者）\n\n打出娘胎以後就像小蜜蜂一樣，一生一世忙進忙出的最主要目的，就是為了他那一窩子，勞心勞力、心甘情願地犧牲奉獻，一心一意只希望家人能夠吃香的、喝辣的、穿美的、用好的；而自己卻是省吃儉用，將就湊合著過，哪怕是自己再苦、再累，而當看到家人舒適的享用自己的汗水心血，而嘴角泛著滿足快樂的笑容時，那種欣慰歡愉之情甚於自己享用，此種心境是其他星宿坐命者所無法體會的，於是說明日月坐命者是家的貴人一點也不為過，一個家只要生有一個此類命格者，則其他的人就跟著沾光了，所謂：「一人得道、雞犬升天」。\n\
    \n此種命格之報恩對象，僅限於其本姓氏的家（娘家）及自己建立的家，就算結婚後也不會忘了自己的娘家，以致於結婚之後更累，得多扛起一個家的負擔，或許旁人會爲他叫苦，然而哪知他卻樂在其中，家可是他的精神支柱、活力泉源，家亦是他的甜蜜包袱，不信？不妨向他們求證看看。\n\
    \n### 二、來報仇的人\n\n此種類型的人，就像是和人家結了幾世仇一般，又像世上所有的人都不對得起他一樣，自呱呱落地起，似乎看什麼都不對，瞧什麼也都不順眼，好像沒有一件事情順他的心、如他的意似的，這種類型的人若處於順境之時，容易驕縱跋扈，目中無人，而當他處於逆境時更是怨天尤人、憤世嫉俗，因而一股突破世俗，再造新意識型態等……種種思想也就油然而生，並以某種思想主義的衛道者或是正義使者的身份自居，而對社會或特定對象施以無情的摧殘。\n\
    \n這種類型例如：黑道、作姦犯科、為非作歹、恐怖份子等命格，以星曜而言，則是七殺、破軍、貪狼、巨門等星座加煞坐命、身者，或煞星坐命、身且三合加會惡曜，或是眾煞會集等命格皆屬之。雖然他們的思想令人不敢領教，行爲不予認同，但其本身卻認爲改變自己是自救、影響別人是救人，至於手段嘛！只不過是討回公道罷了！他們的思想行爲是無法用一般的常理來加以衡量的，於是各種非法的事情在他們手上可就做得順理成章，理所當然的，因此，我們若以客觀的角度去看他們，那不是復仇者是什麼？\n\
    \n### 三、來還債的人\n\n有一種人，終日辛苦攢營，省吃儉用，拚老命來堆積起自己可能一生都不捨得花掉的財富，直到撒手西歸之後，充公的充公、轉手的轉手，留給子孫卻被敗光，自己窮其一生之力如精衛填海一般，到最後還是由別人來坐享，自己不過是個盡忠職守的財務管理人罷了，這實在是令人匪夷所思而不知其所爲何來，只能說或許他上輩子倒了人家的會錢或欠債未還，而於此生連本帶利的結帳吧！這種命格典型如：財星加祿存坐命者，武府、武貪、武相坐命者及命身空劫各佔其一者。\n\
    \n另外一種人則如同前生欠了人家多少債似的，而於此生心中常存感恩、惜福之心，於是盡一己之力來造福社會或鄉里，如各慈善機構內的義工，作育英才的教師，以及爲民服務的公僕和默默行善者。社會上極需要這種人，他們就像蚯蚓一樣不起眼卻能夠翻鬆人們的心田，而且辛勤地耕耘不懈，爲開路而吞噬泥土，結出鮮美的果實卻供他人享用；這種人和報恩者一樣，註定了一生勞碌的命運，此種命格如太陽和天相的組合格局，以及魁鉞坐命者屬之。\n\
    \n### 四、來討債的人\n\n這種類型的人，擺明了：大爺我是來這世上花錢的！況且錢賺來就是要花的嘛！幹嘛那麼看不開，花光了大不了再賺不就得了？這一類如：賭徒、吸毒者及公子哥兒們等人，一生只著重於本身的舒適自在與享樂，故其週遭的親友，除了別想在他們身上沾到半點光以外，恐怕還得幫他們料理那擦不完的屁股、收拾不完的殘局；這類命格有：武破、紫殺、紫貪加熱坐命者屬之。\n\
    \n另一種是屬於好逸惡勞而懶散的類型，雖然不見得會惹麻煩或敗家，但也別期望靠他，甚至根本不需要他來養家活口，但是他並不一定要吃山珍海味或穿綾羅綢緞，更不會為了這些而奔波勞累，他只想要清閒、坐享其成，因此喜歡接受「供養」，人家對他好，他也認爲是應該的，於是成爲他的家人就註定被判無期徒刑，此種人例如：富豪之繼承人、遊手好閒者、殘障無力營生者（此屬不可抗力因素）等，其命格多半是爲天同組合的格局，或是福德宮有化權、化祿者居多，或許這種人是前世積足了德，或是人家欠了他的債未還而於此生償還吧！\n\
    \n## 暗合宮位的論法\n\n### 第 10 章\n\n命宮、官祿宮、財帛宮這三方組合起來稱為「三合」，三合加上對宮遷移宮即成為「四正」的團隊。紫微斗數強調的是一個團隊的運作，絕不是單一宮位做解釋，任何一個宮位都一样，不管這個宮位是什麼星座坐鎮，七殺也好、天同也罢，重點是你帶的是一票什麼樣的組合？就算本宮星座再如何好，若是你帶的是群老弱殘兵，不但無力幫忙，甚至還會有扯後腿的情況發生。\n\
    \n三方四正的好壞，對命造的影響力非常大。假設本命的財宮很漂亮，但三方四正會到的都是煞忌一堆，代表的意思就是有很多人等著要花你的錢，可是能確定自己一定都是很賺錢嗎？即使賺得再多，恐怕也及不上大家幫你花錢的速度，更別說想多存點錢，以致於無形的財務壓力非常大！而且任何一個宮位都同論。只要找到一個定點，拉出它的三方四正的團隊組合，這樣就可以把這個宮位的重點精髓看得很清楚，是好、是壞，整個吉凶禍福都在這三方四正裡，尤其是不可忽視對宮的影響力！而且儘管是福德宮也好，或是田宅宮也罷，都是如此同論。\n\
    \n星座組合的論點，不論哪個宮位都同論。本宮的星座組合其實只是表相，是表面上的意識形態，我們不能忽略其三方四正的組合，尤其對宮會發揮很大的力道。當行運時，大運或流年的相關宮位都會跟著動。若以夫妻宮而言，有些夫妻或男女朋友之間的感情線，會讓人覺得：這個夫妻宮明明就不錯呀，為什麼會出問題？私底下各走各的？其實只要用夫妻宮爲定點，來看其三方四正的組合就會很清楚，台面上我們都只是看到表相，有些人為了身分，為了維持形象、面子，伴侶之間會私下商量，彼此在公衆場合中要作態一下，相互配合以免讓外人看了笑話，等派對或宴會結束後再回復原狀，回到家後依然照樣各睡各的。諸位不要覺得奇怪，有些夫妻真的就是這樣貌合神離，可是表面上大家很難看出所以然，但只要找出其夫妻宮三方四正的組合，感情是好是壞就是當下立斷。\n\
    \n### 留意五行生剋制化的重要\n\n感情線的對待關係，在這個組合判斷中即可察覺虛實真假，所以三方四正在解盤的技巧上，可是一個重要依據。請仔細思考，紫微斗數是一門邏輯推理，也是一種化學原理，同時也是一種精密的統計學，種種細節環環相扣。至於為什麼是一種化學原理？就在於星和星之間的五行融合、生剋制化，那就是一種化學調配的理論，所以我們必須要以很多面向來作研判。\n\
    \n三合為任一宮位的三方所架構的鐵三角，是解盤技巧中很重要的支柱，同時也是推論的基礎，必須熟記且熟練推演。而每張命盤都有其固定的六沖、六合，舉例來說，以任何一個宮位劃出對等線的宮位稱為對宮，而如此相對的關係就稱為對沖，例如寅申對沖、卯酉對沖等等，依此類推。\n\
    \n沖者，外力因素影響也。然而，在什麼情況下是爲「照」？什麼情況下是爲「沖」？原因是因為對宮就等同於由外向內的壓力，本宮則是代表自己的想法，若是本宮被沖，閣下的狀況會很無奈，就好比命宮是擎羊單守，道是不用別人鞭策，自己就會努力拚了！但若是對宮有煞星來沖，那就變成是別人來逼著自己去作，就算不想做也得做；這種就是屬於外來環境因素的压力，非自願性的、本身控制不了的，甚至會把本身的本質改變。所以，若是命宮的對宮有煞星，這就不是本身想要或不要的問題，而是自然有壓力來逼著自己不得不去面對，譬如說子女宮有煞星來沖，這其實不是自己小孩不好，反而是被別人帶壞的，子女本身的實質沒問題，而是不良的環境或不良交友狀況來影響子女的行爲。因此，無論是哪一個宮位，只要對宮有煞星來沖，我們都可以直接的解釋成：「沖者，外力因素影響也。」就這麼簡單。雖然只是短短的一句話，卻必須要廣泛地靈活運用才是最重要的。\n\
    \n同理，若是命宮有煞，格局組合又不佳的話，那是自己想學壞，甚至把別人也帶壞，反之，若是來自對宮的影響力，則是因爲交到壞朋友而學壞，這一來一往的關鍵就在於主動和被動的差異。因此，我們會看到有些人都是事情已經做下去了，錯也已經造成了，才開始低著頭來認錯反省：「對不起，我知道錯了，下次不敢了。」，會有這種情形則通常是來自對宮的問題。\n\
    \n因此，不可能有十全十美的命盤，因為每一張命盤都會有煞星、化忌，所以哪一張命盤宮位沒有沖？哪一個命盤宮位不欠？哪有人或是在哪方面不無奈？差別只是沖了誰、欠了誰而已。\n\
    \n我們以往所闡述的理論，不論是合宮或沖照，都是以當事者的命格爲基礎，來做最基本的學習，目的在於熟練命盤推演，然而在學習到這個階段，則要開始學習「合宮」的學問。因為以往所學是斗數的「表皮」，表皮是最基本也是平面的，這個平面包括了命宮、身宮以及祿權科忌，都是論命的重點，但我們還有重點精髓的理論。要成為一位專職研究紫微的論命者，則必須要研究到這個程度才有資格幫人論命，被人稱作「老師」，否則充其量只能算是一個懂紫微的人罷了，因為表面的東西，坊間各大賣房所賣的斗數書籍都有寫，大家看一看就都好像「懂了」，事實上卻不然，很多市面上略懂皮毛卻自稱「大師」者，為了名與利，以不紮實的看盤技巧來幫人看盤卻誤了他人一生者，大有人在，否則怎麼有「術士」與「老師」的差別？今天，我們就要帶領讀者們進入紫微斗數的另一個重點：「合宮」。\n\
    \n### 合宮代表著機會和趨力\n\n「合宮」對命盤當事人的影響力，是一種機會和趨力，也就是透過周遭人的壓力，讓自己的想法或決策來朝著這個方向而傾斜，例如一個小學生被丟到放牛班去，可以出淤泥而不染，不被其他同學帶壞，成績也沒退步的話，那可是很不容易的事！而若是一個小學生被安排進資優班，很自然的就會受到整個班級的求學氣氛所感染，雖然說不一定能就此出類拔萃，可是卻很容易在其他同學帶動的讀書氣氛下，容易讓成績更進步，這就是團隊的力量。以星盤來說，指的就是命宮三方四正的團隊，如果在命盤上，三方四正有著資優班的團隊，絕對比面對煞、忌、空、劫等三方四正團隊來得好！\n\
    \n例如，某大運逢機梁組合，當事者自然而然就有機會去認識一些會賭博的朋友，稱爲「賭伴」，慢慢地耳濡目染之下，不會玩也會開始下注，久而久之之後很快地就學會怎麼賭了。反之，若是沒有走這樣的運，自然就遇不到這類的朋友，也沒有這樣的環境來培養賭博技巧，甚至不會有想學的想法，因爲沒有誘惑和興趣嘛！再來是爲什麼有人會吸毒？這道理也是相同，難道當事者是某天一覺醒來就會的嗎？不太可能，一定是具備某些人或事或當下情境的驅使情況下，才會有這個機會去認識那一類的人，也才有可能去接觸到那一類的環境，否則一般人就算是哪天被雷打到，突然想試試的話，恐怕還不知道要去找誰買呢？不是嗎？\n\
    \n但是這種面對不良誘惑的情形，時常會出現在我們的人生旅途中，也許是某一個叉路或是十字路口，就面臨到是左轉還是右轉，還是繼續往前直走的抉擇。而我們雖然走在這被賦予的人生路上，但其實我們內心良知還是有辦法去抗拒「轉彎的誘惑」，選擇更直接坦蕩的好道路。\n\
    \n同樣的理論也可應用在工作選擇上，以從事保險業來說，都是先認識了從事保險業的朋友，進而接觸到保險業的環境，接著了解保險的好處，最後才萌生興趣來投入保險事業；人是不會無緣無故地跳到一個完全陌生的行業，一定是有某種理想或是某種理念相同的朋友應合，然後在面臨抉擇時所做的選擇。所以，在人生旅途中，我們會因為環境或自覺來學會很多事情，但無論學會什麼都需要一個際遇，一個機會，然後做出一個選擇，無論結果是好是壞，我們的重點就在於研究這個跡象。\n\
    \n《占驗派》獨家斗數精髓——「暗合宮」\n\n一位稱職的論命者，必定先把基礎學問熟練，也就是我們前面提到的命格，包含命宮、身宮的星性，整體格局的搭配以及四化的牽引，再細一點才從六合、六沖的理論來研究，便可找出命盤變化時的原因和理由，而這台面下的精髓就在「暗合宮」。\n\
    \n「暗合宮」，顧名思義指的就是台面下的運作，因此一般人在表面上是看不出來的，若以固定格局來說，「暗合宮」強調的是一種「緣份的表現」，在星盤的十二個宮位裡，互相產生互動引力的現象。可概括爲以下幾項：\n\
    \n### 暗合宮位\n\n*   **命宮坐子、午位：**\n    *   一、命宮與父母宮暗合（附圖二）\n\n若父母宮內有吉星或其星曜穩定，則這一生永遠與父母關係密切，親情緣份深長。若見煞、忌、巨門、破軍者，則顯現其親緣淺薄或是二姓延生，嚴重者必然生離死別。\n\
    \n*   **福德宮與兄弟宮暗合（附圖 1-2）**\n\n福德宮代表祖上的宮位，見吉星而有權、祿者，其兄弟可得祖上之產業或庇蔭，若逢煞、忌或空、劫者，就算看得到也還是吃不到。但因福德宮亦爲當事人之精神享受與來財之源，因此若兄弟宮有吉星坐守，表示手足之間和樂相處且有通財之義，反之，若組合不佳，則易爲手足之事而操煩，且有耗財之跡。\n\
    \n*   **夫妻宮與田宅宮暗合（附圖）**\n\n田宅宮內若有吉星坐守或者其星性溫和，代表另一半蠻顧家的，另一半有事沒事會常往娘家的跑，彼此互動關係良好，因此會有所謂「女婿如半子」的狀況，或是女兒結婚後卻還常住娘家的情況，那都是見怪不怪。反之，若組合不好，則代表另一半多和娘家或夫家在相處上有代溝、互動不良，因此彼此較少往來，而造成「親不如友」的現象。\n\
    \n研判上我們可以分開來看，若是夫妻宮有煞、忌等組合不良，那是當事人和配偶之間相處不良的狀況，但若爲田宅宮組合不佳的情況下，則是其本家雙親與另一半在觀念上無法溝通所致。\n\
    \n*   **子女宮與官祿宮暗合（附圖一）**\n\n代表當事人心中期望子女將來能承接自己的事業或才藝，自己……\n\n| 僕役 | 遷移 | 疾厄 |\
