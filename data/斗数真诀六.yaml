    ### （二）命格因素


    以一個不具桃花命格且老實、保守或孤獨感重的人而言，桃花就有可能三過其門而不入，其原因爲：一、個性木訥、不解風情而不知情為伺物。二、受禮教束縛而不敢逾矩。三、孤僻不喜與人接近，人際關係很爛的人。四、家庭觀念重，怕賠了夫人又折兵而得不償失。


