    時代的巨輪不斷的轉動著，接踵而至的年青一代，其看法與做法又如何呢？講究創新、突破、沒有什麼是不可能的事，年青一代的人真的做到了，一如他們的信念，對生辰、命運，他們既不規避亦不矯作，於是藉由醫術的發達，姑且權充上帝，乾脆來個造命，先請命理師於接近預產期之前的日子，預先選擇一個準父母中意的良辰吉時，屆時安排醫生於該日該時剖腹生產，這麼一來，落土時可是千真萬確，恐怕連上帝也只有愣在一旁搖頭無語可說了吧！


    是啊！此時聰明的人類可能會仰天長「笑」自認人定勝天，但是這時可能老天爺也在上天俯視著無知的人類，笑而不答。剖腹產若是站在當事者的立場上來說，一來孩子有個好命格，二來不須忍受陣痛臨盆之苦，三來可以保持身材，一舉數得有何不好呢？可是站在醫生的立場而言，除非是產婦有任何不利於自然產之狀況，否則基本上他們也不讚同任意的剖腹產，當然若是顧客執意如此，為了賺錢，反正刀是您換的又不是他，那就恭敬不如從命了。


    若是以命理的角度來看剖腹產，雖然孩子的生辰也照算不誤，但其衍生的數種問題卻值得我們深思與探討：


    (一) 若其原本應有的福基與命格極弱，但卻被安排在一相當厚重強勢的生辰之中出生，那麼這個孩子是否能承受得了？有醫師臨床發現，有產婦迷信選擇良辰吉日剖腹產可讓下一代好命，結果反而發生胎兒不足月生產，器官發育未成熟，一出生就因呼吸窘迫症，送進加護病房急救的不幸事件。


