    三十六、父母宮暗合福德宮\n\n## 第十一章 戀愛與姻緣\n\n愛情路上你和他 67\n論戀愛 71\n姻緣天註定（合婚） 74\n琴瑟和鳴 79\n刑剋與暴力\
