    另外，我們會發現，愈是在歐美等進步繁榮的國家，外遇發生機率愈是高，甚至女人還比男人瘋狂，或許由於國情民俗不同之故，他們並不會把它看得多嚴重，反正男女平等，你會我也會，大家一起來吧！情歸情、搞歸搞、兩碼事嘛！反正一人出一樣，誰也不吃虧。對於這種講究及時行樂的人生，在東方或其它某些較為保守的國家，如中東等國，那是不得了的罪行，沒有幾個人會甘冒當街被亂石砸死的危險來觸犯它，因此前述這些時空背景即是影響命盤的變數之一，這是站在社會背景角度的一隅來看。


    ## 三、本身修為的角度


    人的意念可以決定其本身的作爲，同理，一個人永遠也沒有辦法勉強另一個人去做他不願意做的事，只要他的意志夠堅定的話。因此對於一個觀念正確，時時刻刻不忘修持心性，淡泊達觀的人而言，較能克制各項貪念，而不易為外界的誘惑動搖其意念，雖然他也會遇到走桃花的時候，或許他也會遇到令他傾慕的對象，但是卻有可能會因爲他本身的修爲及道德觀，促使他產生更強的意念去抑止它發生，於是只有心動而不會行動。


    > 當然這種人實在是不多，但也不是沒有，可以當選爲「剩人」（即道德頹廢之下所剩不多的人）。其實這種事情除非是外來不可抗力因素所造成的以外，如脅迫、還債……等，只要本身行爲不要造成引發的誘因，如對人家放電或加以回電，應不致發展下去，除非自己也樂意那就沒轍了，所謂一個巴掌拍不響。


    綜觀以上三種角度：（一）命理、（二）社會、（三）修爲，我們必須知道，在碰到一張命盤的外遇和桃花等問題，絕不能只以第一項先天因素來論斷，必須將其它二項後天因素列入考量，要去了解當事者的社會背景，此屬外來因素，最後一項修爲則屬人爲的內在因素，必須憑著論命者的閱歷，並掌握當事者命宮三合所顯示的心性及運勢來加以判斷，如此一來，您的論斷必與事實相去不遠了。


    只是在我下海的命理生涯中，最怕碰到就是婚外情這難纏的問題了，當事者一旦陷入愛的畸戀漩渦中時，慾念已掩蓋了理智，根本聽不进你的建言。


    愛情和人類許多行爲一樣，愈禁愈烈，像皮球一樣拍得愈用力、彈得愈高，奉勸看倌老爺、夫人，遇到這種問題時千萬不要「入戲」太深！也不必給他們太多壓力和說教，多聽少說才不會兩面不是人。有一天，他在人生的旅途中痛苦徘徊面臨抉擇時，請你記得要伸出援手拉他一把，這就對了。


    ## 桃花舞春風


    前一陣子媒體報導說，台北縣貢寮鄉某一個偏僻的小漁村，最近被人發現其地理形式好像堪輿學上的「美女獻花」格局，外頭的女人會自動來投懷送抱，全村的男人都犯桃花，一生艷福不淺。看了這則新聞，我認爲那不是個桃花村，而根本是「莊孝維」。


    許多人都知道命理有「桃花」這個名詞，其實在堪輿風水裡也有桃花穴的名詞，但從沒聽說過有「桃花村」的說法，肯定是江湖術士在胡亂套用地理的學理。不過，什麼叫「桃花」？不但是見仁見智的問題，也因時代背景不同而有不同的寓意，以子平法而言，「桃花」是個惡煞，舉凡男歡女愛、酒色財氣、章台問柳等一概視為「桃花」，人人避之唯恐不及。斗數裡「桃花」的格局組合亦不下百種，同樣是很複雜的一個單元。


    但是，研究命理學術必須學習古學新解，才能跟得上時代的腳步，符合社會的潮流，才不會理論與事實脫節。古時侯在外拋頭露面的女性，不是佣人、婢女就是從事特種行業，一般的小姐是不能隨便出門露面的，否則就是不夠端莊，也會被冠以桃花來比喻女性的不正經。


    桃花除了直指男女性接觸外，凡是不正當的異性戀情，都被包含在「桃花的範圍內」。


    在現今的社會，講求的是男女平等，甚至是女權高漲，強調身體的自主權，女人不再是男人的附屬品。在人際關係互動頻繁又複雜的社會環境，豈不是人人都帶桃花、天天都在走桃花運？在紫微的學術裡，古文說女命會昌、曲是唇紅齒白淫巧容。同樣的命格在這個時代，反而是個氣質高雅又能幹的公關高手。


    「桃花」是現代已婚者的最恨，是婚姻最大的殺手，最怕另一半走桃花運。桃花已不再是男人的專利，根據我的統計，女性的外遇比率比男性還高。桃花雖然不好，卻是某些人的最愛，例如從事外務工作、媒體傳播、異性物品買賣者和演藝工作者等，尤其是演藝工作者，命格若沒帶一點桃花是絕對不會紅的。


    作現代斗數的理論，桃花星是散發出吸引異性的磁場來源，一個人若連異性的引力都沒有，就知道他的人緣有多差，人際關係肯定是遜斃了。桃花對某些人來說是非常適性的，至於是否會亂搞男女關係，就得從格局的組合狀況來論，實在無法一以言之。茲就桃花情況較嚴重的組合提供給讀者參考。


