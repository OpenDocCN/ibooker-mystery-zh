    若從生理的角度來看，男人與女人的先天體質有所不同，所謂：「男人只有不行，沒有不要的，女人只有不要，沒有不行的」。男人的「性趣」強弱因人而異，「性能力」則普遍與年紀呈反方向運行，有人說：男人性能力最強的時期是十八歲到二十五歲、可以「更更」而立、三十歲「夜夜」磨劍、四十歲「數鈔票」（習慣上是五張一數）、五十歲「做禮拜」（一周一次）、六十歲「做牙」（初二、十六）、七十歲「標會」（一個月開標一次）、八十歲「插秧」（一年二次）、九十歲「想當年」（如果還活著的話）。女人的性趣則是二十歲時夜夜春宵、三十如狼、四十如虎、五十天翻地覆、六十誰怕誰、七十如鱉（咬著不放）。若依此推論，女人若找個小自己十歲的男人，那肯定是棋逢敵手，雙方乾柴烈火，非常「性福」的啦！女人如果年紀再比男人大三十歲以上，那叫做「古道熱腸」了！


