    ## 第 16 章 人生百態


    ### 閻王生死簿 (六)


    在馬偕的安寧病房裡，秋萍半夜起床如廁，返回時看到自己的身影還躺在病床上，她也不知道這是怎麼回事，靜靜地再躺回床上，然後睡著了。


    第二天早晨起來，她感到全身乏力，她大聲說話，別人似乎聽不見。中午時分，一種冰冷的感覺蔓延全身，身體冷得直發抖，旁邊的看護阿桑急急忙拿著一桶溫水，把她的腳浸泡進去，把熱毛巾敷在她的額頭，可是秋萍卻覺得好燙。接著，她感覺全身骨頭一塊一塊地剝離下來，大大小小的堆疊在地上，眼淚和鼻涕無法控制的一直流，沾濕了整個枕頭，她覺得身體好虛弱，整個身體一直像要浮起來似的，但心境卻是異常的平靜，眼前呈現了絢麗的光芒和彩虹般的景色……直到老公來跟阿桑換班時才叫醒她。這是秋萍「死去活來」的瀕死經驗談。


    根據佛家的說法，人死亡的時候，人的肉體必須經歷地、水、火、風四大要素分解。當人走向死亡之途時，身體的「火」會先分解，所以才會全身冰冷，溫水都覺得滾燙；再來就是「地」跟著分解了，所以才會感覺身上的骨頭一塊一塊剝離；當涕泗縱橫的時候，也就「水」在分解了；最後一個離開人體是「風」，「風」就是「氣」，因為秋萍氣尚存，所以她又醒過來了。


    時間是人類最大的敵人，人活到一個歲數後就會自然老化，然後死亡，塵歸塵、土歸土。時間改變萬物循環的狀態，是宇宙的定律，並非沒有意義。時間讓小孩長大，大人變老，時間也讓窮人有機會翻身，富人有機會承受考驗。如果時間停止不動沒有循環和淘汰，那這個世界一定很可怕。


    不可否認，現代醫藥科技的進步一日千里，不但讓人類有更多的機會擺脫死神的威脅和疾病的痛苦，還能延年益壽，過著健康的優質生活。近年來人類基因圖騰的突破，更讓人解除「生年不滿百，長懷千歲憂」的苦惱，長命百歲甚至長生不老，已經不是遙不可及的夢想。


    如果這個夢有一天能成真的話，那這個地球不知道會變成什麼景象，若是每個人都能活到三百歲不死，那這個世界恐怕連「站著」都嫌擠了，其他的就更不敢想像了。


    本篇所要探討的主題，雖然是大家有所忌諱的壽限問題，但若是站在一個研究者的立場而言，又不能因此避而不談或省過略過。每個人終究都會走到這條路，只不過是時間的早晚差別而已。一般民間所認定的標準，是以活過一甲子而西歸者為壽終正寢，凡是未及一甲子而終者皆視為未盡天年或夭壽。但是在斗數的立場來看並非如此，俗諺云：「棺材是裝死者，而未必是裝老者」，而且也未必都是壞人先死、好人不長命，禍害過千年的例子從古至今亦是多得不勝枚舉。那麼一個人的壽元要從何處著手加以衡量呢？必須按照以下之步驟逐一考量：


    （一）先看本命格之強弱。一般而言，命格較弱、福份較薄、壽元也較短者，在命盤上較顯而易見之共同點多與空劫有關，如空劫夾、拱、坐命身或命身空劫各占其一者，此種情形屬於先天不良。


    （二）再看行運如何。雖具備前述之命格，若行運甚佳，眾多吉星來合，亦無早夭之兆；若命格強勢，遇行限不佳，或逢空劫之運，則必有個不小的劫難在等著，但還不致於死定了。最怕命身空劫本是單薄，大限又逢空劫，若四化不美，加以眾凶會集，則如薪盡火滅而回天乏術，此類屬後天失調。具此二項可大致獲悉當事者之壽元長短。


    壽限分為一、自然壽盡（未必高壽）；二、意外凶限二類。


    **一、自然壽盡之各種情況**


    （一）命格具備空劫、拱、夾，於大限再行空劫時，必有一劫。若福德及田宅位此時亦不佳逢煞忌則主倒限。


    （二）本命陷弱或無正星，行限又陷而逢煞沖，或行截空之限亦福德宮有煞忌，主自然而亡。


    （三）本命廟旺，老年行廟旺之地，則過猶不及，如人患腦溢血。


    （四）本命廟旺，晚年行運逢正星廟旺化吉，小限更是衆吉來聚，或是流年月建四祿會合，亦主忽然而死，此乃旺過頭了。


    （五）通常人生運行遷移宮之時為六十至七十之間的年齡，此限乃天傷、天使所夾之限，攸關生死，應特別注意。如遷移本宫星宿廟旺而無破則不妨，若陷而逢煞則凶。大限羊刃位，小限逢之上凶。


    （六）大小二限行天傷一行天使，再逢大限的祿存「祿空」亦為死限。


    （七）六十歲後大限行殺破狼限須小心，若四化不好，小限主星落陷，哭虛相夾，再逢禄空馬倒者亦主壽盡。


    **二、意外凶限之各種情況**


    （一）福德、田宅並未倒，但運限凶，遷移或疾厄宮煞、忌聚集，會提早跟上帝喝咖啡。


    （二）行限逢大限斗君化忌沖命身遷移主有大災禍，再逢祿空馬倒則為死限。


    （三）更有本命應是天折之局，如巨暗破耗陷地而逢煞多來沖，適逢大限連綿行逢益壽之宿而過關，但限過若不逢吉扶則凶。


    （四）有些成格凶死之命未必短壽，例如：廉貞四煞遭刑戮而未必是天折。


    （五）命格空劫拱照，大限又逢空劫照會，大限煞、忌入遷移位者，須要先向閻羅王借用免死金牌。


    綜合以上諸點可知，有關壽限的分析必須按步就班，先看命格，再考大限，即可大略清楚當事人之壽元長短，以及屬於自然壽盡或意外凶限而亡。然重要的評斷要點有三點，可作為判斷其倒限與否的重要依据：


    （一）空劫所座落的位置：因其影響命格的強弱以及運勢的順逆，凡運勢逢空劫照會之處，皆須留意其合狀況及福德宮以定吉凶。


    （二）福德與田宅宮皆倒之時，意為其福基已盡。所謂「倒」即該宮逢煞忌沖照或空劫夾拱照之謂，再逢運限陷弱煞忌多來沖則倒限。


    （三）大限斗君入命或沖命身宮，再逢祿空馬倒之時亦主倒限。所謂「祿空」乃大限祿存逢空，流年天馬與煞同宮謂之「馬倒」。若只具祿空一項條件，只表該限內較無福可享，未必會倒限。


    但是縱使具備有以上所述之情況，我們也不能十分肯定的鐵斷某人必於何時死於何故，因為尚有一些後天人爲因素所造成的影響須加以考慮。但天災戰禍所形成的變故，則不在此研究的範圍以內。


    （一）當行至某凶時，雖具備多項不利之要件，但尚須看當事者目前實際狀況之好壞。若與命盤所顯之運勢接近較好，否則其災禍多半是出乎意料之外的情形下，毫無預警的突然發生。


    （二）行限不吉之時若其六親狀況無恙，則當事人必須自己承擔這個業障，因而在判斷之前，尚須就其六親情況作一了解。若已有損及六親，則其災禍即可減輕。


    （三）行至凶限之時，若逢傾家蕩產、破相、傷殘，則可抵消其業障而延生。


    （四）在世的作為、陰德的積損，必直接影響當事者之福報，當然也直接影響到壽限。


    生寄也，死歸也！雖然每個人在人世間所受的待遇不同，有時甚感頗為不公，但殊途同歸，到頭來，無論貧富貴賤，善惡尊卑，沒有人能避免這條「不歸路」。同時這也是人生之中最公平的一件事，就算身份、地位、財富再高，一樣不例外。人生的舞台上沒有永遠的主角，然而在走馬換將之後，有些人就必須鞠躬下台而踏入「歸途」。但這是否意味著又是趕著去下一處，參加另一齣戲的開幕，亦或是總結一生功過來個審判者秋後算帳，則無人知曉。


    在禪宗的文案裡有這麼一段記載：一位老禪師帶著小和尚下山採買，在街上看見有喪家出殯，送葬隊伍連綿好幾條街，小和尚看了覺得很訝異，脫口而說：「一群活人在送一個死人，好壯觀喔！」老禪師糾正說：「你說錯了，那是一群死人送一個活人。」小和尚抓頭皮滿臉疑惑，似乎無法領悟其中的涵意。老禪師的意思是說，人活著，難免受到精神上與肉體上的限制，與蹲在苦窯沒啥兩樣；死後如同出牢，是一種解脫，那才值得慶幸。


    衆所皆知，當一個新生命誕生時，一個人大哭，週遭的人都在歡笑。死亡時，一個人歡笑，週遭的人都在悲傷痛哭。這就是荒謬的人生，是非之顛倒，莫此為甚。既然是這樣，人生還有什麼想不開的？您悟出來了嗎？


    ## 預約人生


    民國八十九年元旦那天（西曆二○○○），全省各地都傳出千禧寶寶誕生的消息。那天全世界都在歡欣的期待千禧年的第一道曙光，各地教堂、寺廟鐘鼓齊鳴熱列地迎接新一個世紀的到來。據說當天早子時的第一個時間，是「千載難逢」的好時辰，命理結構相當特殊，日後若非將相之材，也是非富即貴。


    有這種觀念和想法的人，在這個社會上還真不少。君不見，每逢龍年中國人的生育率就提升不少，謂之龍子、龍女；那癸亥年生的不都是鳳子、鳳女嗎？這是一般世俗和一廂情願的想法。站在命理的角度，絕不可能因此而大富大貴，反而給下一代添麻煩。試問十六年後升高中考的錄取率不是降低不少嗎？


    ## 沒有十全十美的命盤


    咱們以千禧寶寶為例，換算農曆是己卯年十一月二十五日早子時，排出來的星盤是：命宮在子位，（一）天機、右弼加天魁坐守；（二）財帛宮為天同、天梁坐守；（三）官祿宮有太陰、文曲化忌坐守；（四）遷移宮在午位有巨門加祿存坐守。


    天機守命宮主其人聰慧，善良心軟，加天魁卻是古意到家，其三方四正屬於機月同梁的星群組合，星性柔和平順，嚮往穩定而安逸的生活，淡泊明志很容易滿足。缺點就是三方四正缺乏煞星的沖激，當然就缺少積極奮鬥的動力，加上官祿宮的化忌星引發十足的挫折感，在面對強勢競爭的現代社會，想要出類拔萃只是一種奢談，這種人注定要受社會支配，而無力支配社會。何況夫妻宮要面對忌星，其婚姻波折亦難免，何來富與貴？其人人生難稱圓滿也。


    ## 人為刻意的製造八字，易生變化


    現代的醫藥科技每天都在進步，過去懷孕的婦女因胎位不正，而導致母體、小孩因難產致死的事件已不多見。剖腹生產的技術精進，使母體、小孩的存活率幾近完美，實在是人類的「大德術」。


    也由於醫術的先進，讓現代的婦女因為怕痛或是想要保持美好的身材，也有為了怕生產時造成陰道過度的擴張而鬆弛，影響產後性生活的品質，而刻意選擇了剖腹生產，進而引伸到特地挑個好時辰來剖腹生產。


    天下父母心，每個為人父母的都想給子女最好的，原本是天經地義的事。但是，想要用挑個好時辰剖腹生產，刻意「製造」一個大富大貴的八字，那是一項不可能的任務。先天上，八字裡的年、月四字在懷孕時即已受到限制了；至於「日」期也受到預產期的限制，總不能胎兒還沒成熟就剖腹把它取出來吧！那樣做是既缺德又很危險的事，一般都是預產期前一星期至十天為原則，但又不能太接近預產期，否則會有所挑的時辰未到，產婦已開始陣痛的烏龍事件。所以真正能有所選擇的大約只有一周的時限而已，再高明的命理師也只能「盡量」而爲罷了。因此要說能爲下一代挑個大富大貴的命格，那根本就是騙人的。要培育優良的下一代，是否能提供小孩一個良好的成長環境，才是最重要的。


    ## 命格的優劣和命格的高低無關


    不管千禧年也好，金龍年也好，挑個好時辰剖腹也罷，都是世俗中的觀念：前者由耶蘇教所頌揚，中間由江湖術士所鼓吹，最後是俗人一廂情願的認定。無論如何，概與命格的優劣和命格的高低無關。命理由八字起造而絕不會只管年或只管時辰，更無關生肖的吉凶。再好的一年都有人失魂落魄，再差的生肖也有人飛黃騰達。


    事若求全無可樂、人非看破不能閒。人有千算、天只一算，但是千算萬算，還是人算不如天算。有智慧的人總是虛懷若谷，順天應人淡然處之；凡夫俗子常是自命不凡，不自量力老是想做一些老天爺才能做到的事。凡事人人都想追求完美，有了房子想要車子，有了車子又想要妻子，最後即使五子登科了還是斷不了得隳望蜀的念頭，卻不知天道忌滿，人道忌全的道理，日月尚有盈虧蝕損何況人事種種？


    每個人都希望自己好命，而且是一輩子好命，殊不知天底下的事是相對而非絕對的。此點相信連愛因斯坦也不會反對，閣下不妨參考一下太極圖內所示意的陰陽定律：孤陰不生、獨陽不長、陰陽相生又可相剋。


    同樣如果人人都要好命，那麼該誰歹命？那豈不成了三個和尚沒水喝了嗎？好命的標準又在那裡？富貴！歐那西斯快樂嗎？長壽——百歲人瑞個個都過得好嗎？權位——總統樣樣都滿足嗎？美貌——古往今來的各大美人不都是紅顏薄命？


    如果您對一些您個人認爲他很好命的人，作一番仔細的觀察，你必然會發現他們至少都帶有一憾：或無親情溫暖、或無後、或帶疾……因此世人雖有好命與歹命，但都不是絕對的好與歹。世上有好人亦有惡人，但好人也不是絕對的零缺點，惡人也絕非真的一無是處，最起碼他讓警察沒失業。許多事物本來就是互補與互制，就如同陰陽的相生與相剋一般。


    ## 金錢無法買功德


    值得探討的問題是這樣做真的管用嗎？是無法面對現實的鴕鳥心態，或只是一種自我安慰的作用。如果這麼做管用的話，那麼命理師的家裡一定是代代出賢人囉！


    再談到中生代的情況，同樣對於不好的八字臨於己身而不能釋懷，介於新舊二代之間的思想，使得他們在補救的方法上會有所差別。同時因為一方面時代進步了些許，經濟情況亦改善不少，人們在觀念與認知上亦多少對老一輩的方法存在疑慮，於是不再逃避現實，而比較能以正視問題存在的態度來面對它。但社會上的功利主義與速食文化，再加上一種暴發戶的心態，使得他們在面對生辰或運勢不佳的情況時，會產生一種花錢消災、用金錢買功德，進而祈盼能立竿見影的迅速收到效果，而得到福報、或彌補先天的不足。'
