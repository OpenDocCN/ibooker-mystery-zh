    因此當流年引動夫妻宮時，發現本宮無恙而夾宮卻煞、忌聚集時，您就要有心理準備，一樁家庭革命運動即將展開了。


    ## 勞燕分飛


    有一個自稱年過三十，正是青春適婚正當時的女人，在網路上刊登則徵婚啟事，上面寫道：


    1. **因為誰也不知道結婚後老公會不會變心**，所以結婚前，要娶她的男人必須先存五百萬在她的戶頭裡，做爲她應該擁有的保障。

    2. **不喜歡結了婚就變得不自由不自主**，她自己賺來的錢自己自由支配，家裡的一切開銷全由老公支付，但是房子和車子必須登記在她名下。

    3. **因爲她不會侍奉老人家**，而且爲了避免婆媳過招的麻煩，所以她婚後不能和公婆同住。

    4. **不想當了媽媽後犧牲苗條的身材**，又要失去自己原有的生活品質，所以婚後要她生孩子是可以接受，但帶孩子的事就免談了。

    5. **不會也不喜歡做家事**，而且婚姻不該讓女人淪為女傭，所以想娶她的男人必須先請一個菲傭。


    看完這則啓事，我差一點當場吐血，她以爲她是誰啊！是蕭薔、還是章子怡？我敢肯定她絕對嫁不出去。


