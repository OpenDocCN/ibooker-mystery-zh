    ## 姊弟戀情


    這是個顛覆的時代，新的價值觀挑戰舊傳統機制，新的 E 世代意識形態取代了舊有的思想模式，流行歌手打造出的世代名詞：「只要我喜歡，有什麼不可以？」，已成為新新人類共同的行为方式，只要敢秀、敢標新立異，保證你會紅！如果你不敢突破傳統又不敢作怪，那你只有蹲在家裡孵蛋的份了。


