    # # 論婚外情


    這檔事真的是日常可見，在「外」面隨處可「遇」的「生活問題」。


    儘管養小老婆、包二奶或包養外公的型態已經不像過去，經濟獨立而不需要被養的人現今大有人在，單純的紅粉知己或性伴侶比例亦不少，但是不論社會風氣如何的開放，這種事還是只能做不能說，要不「見光死」，還能公開出雙入對「獲得肯定」的，不但有「技術性的困難」也很容易帶來家庭的災難，婚外情的另一半當然也有「自己的一片天」，但是這片天無論如何就是無法「普照大地，暢行無阻」的。


    所謂婚外情，顧名思義就是已婚者搞三角或多角關係，又稱為外遇、牽牛花或偷腥，在昔日保守社會中則給它扣上一個很難聽的名稱，叫做通姦，然而不論其稱呼如何，可知道這種事情不是只有發生在現代，只是社會背景和道德標準有別。在文明之前或許此種行為還頗受歡迎也說不定，人人皆可順性而爲，所謂獨樂樂不如衆樂樂，也許在當時還可美其名爲合家歡呢！'
- md: '## 第12章 戀愛與姻緣


    ### （一）命理的角度：


