    (八) 同一時辰出生之雙胞胎，命宮分坐同一張盤的命遷線，若其中一人命無主星，則須借用對宮星宿，此時因兩人坐命星宿相同，這對雙胞胎必然形貌酷似，例如：一人命坐卯位紫貪，另一人則命坐酉位借紫貪，此種情形在醫學上稱之爲同卵雙生。


