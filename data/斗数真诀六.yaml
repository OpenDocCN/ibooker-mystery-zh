    ## 第 15 章 人生百態


    人與人的磁場隨時會因為運勢的關係而改變，例如去年某生肖為當事者的貴人位，今年卻成了小人位，此種情形於實際生活中的例子亦相當多，就像去年還和某人打得火熱，相談甚歡，頗有相見恨晚之感，於是無話不談，而今年卻因爲某種原因而被擺了一道，頓覺所遇非人而悔不當初，只有暗罵一句：「墓仔埔倒水肥」。


    不管是命格或是流年，遇到小人纏身都是一件令人煩惱的事。一般而言，小人可概分為兩種，一、是主動招小人，是平時太臭屁、耍大牌、行事太囂張目中無人，是自己故意刺激別人而造成別人的反感，產生負面的抵制或毀謗。二、是被動的招小人，是自己看起來比較懦弱或是流年行運陷入弱勢的是非圈，引來不良人士的欺侮。


    不論是貴人或是小人，幾乎每個人都會遇到，貴人的實虛或小人的殺傷力的輕重，都有賴你平時的為人態度和作風，所謂「要怎麼收穫，先怎麼栽」就對了。


    ## 正財與偏財

    ### (六)


    錢財雖說是身外之物，生不帶來、死不帶去，但也不能否認錢財為養命的活源，有了錢、萬事圓，錢雖非萬能、沒錢卻萬萬不能，即便是方外之人也須承認要能「先顧腹肚」才能顧佛祖」。有錢不是罪過、沒錢反而難過，重點不在於多或少，而在於各人的謀財之道是否正當。有人認為君子愛財取之有道，亦有人認爲人無橫財不富、馬無野草不肥，於是有的人賺錢方法是光屁股坐板凳——一板一眼的，有的人則是五花八門、無所不用其計。

    受社會現實及功利主義的影響，工業愈發達，社會愈進步，財富問題愈是受到大衆矚目的課題。亦是個人身價及社會地位的表徵，人一且窮困潦倒，命就不值錢了。社會上充滿著以貧富論英雄的觀念，富與貴的大人物只有患個感冒微恙，立刻有主任級或院長級的醫師替他


