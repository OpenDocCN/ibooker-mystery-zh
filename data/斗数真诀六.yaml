- md: '## 第15章 人生百態


    ### 一、天命無關命理


    中央研究院公布一項民意調查，證實有一半的人相信「當總統需要天命」。以前民進黨前主席許信良先生決定退黨參選總統，他說競選總統是個天命，此生最大的責任就是努力完成「玉皇大帝」交付的任務。因此，任何人想要覬覦總統寶座之前不妨先攬鏡自照，瞧瞧自己是不是像個天子？是否被賦予天命了？令人遺憾的是，天命要從哪觀察得出來，還沒有一本天書或那一位高人洩露過此一天機。


    據佛教經典記載，當輪轉王誕生時會有七種寶物跟他一起出現，包括金寶、銀寶、兵寶、馬寶、令旗、功過簿和照妖鏡等，供他驅使，以便能號令天下，天子也等同視之。古代的皇帝向來都自稱是龍的化身，凡事都與「龍」有關，穿的是龍袍、坐的是龍椅、吐的痰是龍涎、放的屁是清香的龍屁、高興時是龍心大悅、生氣時叫龍顏大怒：……連金色和黃色都是皇室專用的顏色，一般百姓子民是不能隨意使用的。由此可見君子、王侯不是一般凡夫俗子所能擔當，更不是穿一套「媽祖婆」的戲服，自命天子轉世，就能出來選總統的。


    現在民主時代已沒有天生的統治者，總統和各級地方官都是人民用選票選出來的，而非要經玉皇大帝的欽定，參選者需要的是比人格、比政績、比群眾魅力，與命格高低無關。民主政治的年代，只要肯努力，布衣也可以成為卿相，只要您有錢，黑道大哥亦可經過選舉漂白而當上國會議員，這又與天命何干。


    ### 二、天災難測


    在任何一個災難中，儘管死傷累累，照例有人倖存也有人大難不死，像高雄縣大樹鄉一位周先生在九月二十日到南投集集訪友，在友人的盛情下留宿一夜，正巧碰到大地震，被壓在瓦礫堆中客死異鄉。


    在每一次重大空難發生時，總有一些人因某種因素沒趕上飛機，也總有一些人剛好補上位子上了這架死亡班機。「死亡或倖免」由誰來決定？是上帝還是閻羅王？


    根據佛家的因果業力說法，生死存亡由個人的業力決定，當一個人壽盡或福盡時，就會離開這個人間。業力又分「共業」和「別業」之分，共業就是彼此的行爲力，由一個家庭、一個團體、一個村莊甚至一個社會的人共生共存，形成一個彼此生命共同體，在生命的歷程中共同累積無數的業力，這些行爲逐漸醞釀成一種磁場，當這個磁場累積到一個臨界時就會爆開來，災難因而發生。例如說殺了一隻大沙魚，宰殺的人是主凶重罪，販賣和購買的是幫凶罪比較輕，但都需要為這隻沙魚的死負「共業」之罪，罪刑輕的就是「別業」。在重大災難中一起死亡的叫「共業」，只受到驚嚇而倖免於難的就是「別業」，當「別業」累積到一定程度也會晉升為「共業」的。


    從大的方向看，佛家的說法不無道理，人類爲了一己之私利，無限制的砍伐林木和吸收資源，導致聖嬰現象，世界各地皆氣象異常，災難頻傳，這就是大自然的反撲，追根究底的話，人類自己才是罪魁禍首，俗語說：「人若不講天理，天也不照甲子」，日後若看至「七月雪」也不必感到驚訝了。


    所以說，重大的災難事件不是命理能達到的範圍，遭逢重大災難死亡、八字或斗數看得出來嗎？當然看不出來，命理學術只是一種精細的統計學、心理學和邏輯推理，舉凡天災、人禍（戰爭、颱風、水災、空難或重大交通事故）都不是命理能夠演算或推論得清楚的，命理有其一定的界限，千萬別當它是萬能的。


    ### 三、共盤的迷惑


    斗數的星盤是由生辰八字為依據所排出的，同八字必有同命盤，因此八字所排出的命盤不是一個人的命運軌跡，而是同一個八字的人所共有的，這種情況統稱為「共盤」。但是，一個時辰包含了二個小時，這兩個小時內光是台灣地區少說也有二百人同一時辰出生，若是整個時區計算，那可能要上萬人了，他們的生辰八字都一樣、星盤也一樣，照這樣來推算一個人的命格和行運，似乎有點誇張，算得準是你運氣好，算不準也是正常的，反正瞎子摸象不必苛求。


    斗數是一門很精細的統計學，若是只依照生辰八字的話，粗分爲一六八個主格局架構，中分爲一○○八○○個組合，細分爲二四一九二○單元。經驗豐富的人其解盤的準確度能達到七十%就已經很「神」了，想要再更上一層樓必須再將時辰細分爲刻度（以十五分鐘爲一個單元），再劃分其人出生地的經緯度加以區分，此即所謂落土時與落土地的磁場效應，也才是屬於你個人量身訂做的命盤。


    ### 四、命理極限


    「喂！仙仔，你有明牌否？報幾支來簽吧！」

    「你講啥？什麼明牌不明牌的，你又誰啊？」

    「我是你的讀者啦！你們研究五術的不是都很會算嗎？報幾支樂透明牌給我，如果中了頭彩一定分你一半」。

    「我是人又不是仙，那有那個能耐算得出樂透號碼，如果真的算得出來，我也自己會去簽，我又不認識你幹嘛告訴你？」。


    自從政府開辦樂透彩券後，和之前大家樂正風行的時候一樣，這種對話在我家幾乎每天都會聽到，真的是煩死人，大家有所不知，這種「國學真訣（六）」中的觀點認為：樂透彩券能中獎，依持的是你命中是否有旺盛的偏財運和流年的機運，更重要的是你有沒有這種「福報」。否則就算你花五十萬下去包牌，也是一樣會損龜。如果彩券的頭獎能用算的算出來，那我幹嘛還需要這麼辛苦在這爬格子混一口飯吃呢？


    一般人總是喜歡把一項學問擴大解釋，記得民國七十九年時即有一位命理大師，自認是紫微斗數派的股神，在報章媒體廣召會員大肆鼓吹，說股市一定飆上一萬五千點，想賺錢的動作要快。結果，股市從一萬二千點一路崩跌到三千點左右，套死了一缸人不說，他的會員信徒傾家盪產的有之，臥軌、跳樓自殺的有之，那位大師也從此銷聲匿跡了。


    命理只是針對個人吉凶榮枯的演算工具而已，股市是政府當莊家的理財天地，每天都有數以百萬計的人或單位在參予買賣，這麼大的一個磁場豈是紫微星盤所能左右或顯現呢？爲了測試這個理論，我不惜花費數萬學費跟一位股市名師學技術分析理論，再花了近一年的時間將它套入紫微星盤。結果，還是自動放棄了，原因是大盤要用那一張盤為準，是以國運盤？還是股市成立盤？同樣是中國人的地區如新加坡、香港、大陸是否適用？答案都是否定的，所以如果有人說用紫微能預測股票市場走勢，那是矇著眼睛在說瞎話。


    同樣的，每逢大選時期，總有一些命理大師或面相高人，在電視媒體上口沫橫飛的鐵口直斷，某某人一定當選。也有一些地理仙仔拿著羅盤煞有其事的分析各個候選人的祖墳優劣，看看誰家的墓碑有出現龍紋？就算他們說的那位真的當選了，那也是被他矇到或是猜到的，絕對不是用命理或地理算出來的，不然就是「事後諸葛亮，事前豬一樣」。因為，真正五術的學術是沒有這麼大的能耐，若是要硬拗的話，人家是知恥近乎勇，他們是「無恥更乎勇」。


    ### 五、各人造業各人擔


    花些錢也無所謂，這種想法的人，正中了江湖術士的胃口，一邊是希望命理師能幫他們化解，就算望化錢能消災，另一邊是錢先收進口袋能不能消災則到時再說，反正是個願打一個願挨，災劫有沒解那是他家的事。不過，這檔事對我來說是絕對不幹的，各人造業各人擔，爲了一點小錢要我去承擔別人的業障，別說是門，連框都沒，我寧願吃卡歹一點，你說是不是？


    ## 紫微的人生觀


    只要是人類，沒有人逃得過生、老、病、死的輪迴定律。不管您是達官巨賈或是市井小民，只要有一天躺在醫院加護病房的病床上，則是眾生一律平等、一視同仁，再也沒有貴賤之分了。每當我遇到一些爲了一點小挫折就呼天搶地要死要活的人，我都會建議他們不妨至大醫院的加護病房外走一圈，然後問問自己到底在爭什麼？有啥想不開的？結果都相當有效，有些人的觀念和個性從此作了很大的改變。


    在紫微的研究領域裡，如果您所看過的命盤夠多，就會漸漸體會所謂大富由命、小富由儉的道理，此時雖然對自己的命格不甚滿意，但比較不會怨天尤人，因爲當您看的命盤愈多，就會發覺任何再好的命格都沒有十全十美的，縱有好的命格也要看您是站在何種角度去看它，而且較好的命格在廣大的人群當中，所佔的比例實在是少之又少，故而再回頭看看自己的命格，便會覺得比上雖不足，但比下也總有餘了，而且再將自己目前的實際狀況，與大人物或社會衆生比較一下，只要您的慾望不是高不可及，便會覺得雖然不甚滿意，但是也還可以接受。


    人的慾望是永無止境的，所謂天大地大未若人心之大，心理學家馬斯洛的需求層次論曾指出，當人們目前的需求達到滿足後，便會依需要的程度作進一步的追求，從生理需求、物質需求：……一直到達自我實現，這是個難以任何標準來衡量的需求。如果以正面的觀點來看的話，這是人類進步的原動力，社會日新月異的催化劑，然而，任何事情都是一體兩面的，如果站在負面的影響來看，則過度的需求與慾望，亦是人類給自己背負的一大包袱，不僅須要付出龐大的代價，若一直達不到理想目標則恐有兩種情況發生，一是乾脆走捷徑，爲達目的而不擇手段。一則是永遠處在不滿現狀的因境之中。


    如果我們能在眉間放一字「寬」，凡事不去作過分的苛求，縱使或有所失，但得到的潛在價值也絕非失去的所能比擬，這和宗教界所說的施比受更有福，俗諺「所謂吃虧就是佔便宜」的道理有異曲同工之處，每個人在這人間的大舞台上，所扮演的角色，不管戲份的輕重如何，扮演的是主角還是跑龍套而已，重要的是有沒有盡心盡力的去演好自己所扮演的角色，以及一本初衷的演完這齣戲，說穿了每個人不過是人生中的一個過客罷了，在這短短的旅途之中該去追求有限的物慾，或是永恆的價值，就要看各人在這人生的過程裡學到了什麼？


    每個人依據其命格的特色，決定他在人生當中所要扮演的角色，例如：天相或魁鉞坐命者，是扮演別人的貴人，生來就是為了要服務大眾的，也就是來還債的，故而其生性必然是熱心誠懇，而且雞婆到家，否則如何能稱職呢？其他的如報恩的、報仇的、討債的，這些都已在第一章即討論過，此處不再贅述。另外，一個人有時往往會扮演著多重的角色例如：在外面的工作性質必須扮演別人的貴人，而回到家裡又是一個稱職的家庭主婦（夫），這種多半是因爲其命格中有二者以上的星宿組合，如日月同宮加天魁坐命者。如果其命格只是單純來討債的，可能當事者就會不想工作，或賺的還不夠他自己花用，或懶於持家，或總是捅了漏子要人家來爲他收拾殘局的，反而是要別人來爲他服務。


    談到這裡我們假設一下，如果可以的話，讓您自己做個抉擇。您會選擇哪一種命格？如果您對命理已瞭解得很透徹的話，看到這裡恐怕也令您很難下決定了，當一國之尊好嗎？固然是聲威兼得、貴顯無疑，但他必須服一國之務，因此閒不得，且會失去部份自由，故而逍遙不得，平常百姓閒暇之餘只要不違法，想幹嘛都行，但一國之尊哪怕只是想到夜市吃個路邊攤或逛街，恐怕都需要安排討論好幾天，且屆時不把保全人員搞得人仰馬翻才怪。身爲豪門富買好嗎？雖然他們不需苦於生計，物質享受優渥，但爭奪家產、綁票、搶劫、敲詐等事易發生在其身上，精神壓力更大。俗云：「樹大招風、官大有險」。還是不如守著中庸之道要來得自由自在些，許多心理負擔遠重於體力負擔。


    我們對許多事情的看法，既不要過分的盲從或迷信，但也不要鐵齒死不信邪，以紫微斗數來說吧！或許有些人對它的看法很不以爲然，甚至斥之爲荒誕無稽之談，但如果它是這麼沒有價值，爲什麼能禁得起漫長歲月的考驗，而流傳至今歷久不衰呢？無庸置疑的是它具有相當的準確度，但這並非鼓勵大家從此就一切聽天由命了，如此豈不過於宿命論，而有失斗數存在的價值，況且若一切命運上天早就已作好安排無法改變，則人生還有啥搞頭了？


    命格所決定的是個人先天的條件，且是大原則性的，例如：六親概況、面貌特徵、個性嗜好，行運大致輪廓與吉凶落差的彈性極限，譬如前面所說的大富由命，這些是屬於天定而難以改變的部份，而一個人的作爲，會受其個人的修爲、道德、學識、價值觀及人生觀的影響，進而產生不同的因果，於是在其命格吉凶的落差彈性範圍內，改變了某些原本應有的狀況，所謂小富由儉即是一例，這些是屬於用後天人爲因素可改變的部份，勝不了天總要勝得了自己吧！


    既然已成定數的事實部份我們難以更動，不妨就可變的部份來加強，也就是除了知福、惜福之外再去造福來改變因果，造福之方必先由內心做起，由內而外，用道德來提昇。然而說理說教過於繁複，幾乎要把大學之道、修齊治平之理，都翻出來講，若舌頭不打結，腦袋不「爬帶」才怪，其實用最簡單的一句話來說就是「積陰德」，如此不但是造福別人，同時也是造福自己，這就像是往別人身上的灑香水一樣，自己也會沾上兩三滴。


    積陰德的方法很多，簡單的說是隨時隨機的佈施，消極的是「去惡」，積極的是「存善」及「行善」。勿以善小而不爲，勿以惡小而爲之。俗云：「明有王法暗有神、善惡到頭終有報。」然而道德修養可以幫助我們分辨是非善惡，盡心行善積德便能造福田，進而影響因果，將人事的艱難與琢磨視爲一種考驗，若能藉事練心、隨處養心，才不會空過因緣，如同耕田不播種。人生不一定球球是好球，但是有歷練的強打者，隨時都可以揮棒，其實最好的命格是能身體健康行運平安，您認爲呢？


    ## 中國紫微斗星界看老天乙上人傳道授業啟事


    凡是對紫微斗數有興趣的人都知道，這門千古智慧的學問易學難精，沒有經驗豐富的老師指導，絕非可輕易窺堂奧。


    天乙上人擁有三十年的教學與執業歷練，爲無數面臨困惑與抉擇的人解惑釋疑，門下學生近五百位，學有成績而對外執業的學生更高達六十多位，並且遍佈世界各地，繼續地發揚光大此“智慧的結晶”。其專業著作出版已有四十餘冊，精闢的解析與概念，爲斗數界的經典教材。


    天乙上人傾囊相授從不藏私，授課更有專用的獨門精準講義，以利有心向學的學生能快速的抓到重點，而不會困惑於傳統八股、模稜兩可的迷思中；讓您瞭解自己、改變機運、掌握未來、並擁有永不褪流行的一技之長。術傳有緣，緣至則聚。


