    ## 第12章 戀愛與姻緣


    ### 愛情路上妳和他


    若問世間情爲何物？相信沒有幾個人可回答得出來，愛情是可愛又迷人的，人類不分貧、富、貴、賤都需要愛情的滋潤，在人生的旅途上，愛情是扮演多麼關鍵的角色，有了愛情，人生立刻由黑白變彩色，生活立刻有了動能和活力，思想才由靜止而活潑，才能體會什麼是「幸福」、哪裡是「天堂」。有了愛，世界樣樣都美好。但，在愛情的世界裡，男女觀念有別，女人的愛情始終如一卻不一定長久，男人的愛情可能長久卻不容易專一。愛情的真締是要好好的愛自己更愛對方，愛情的快樂不是在激情的擁抱中結束，而是持續的永恆著。


    然而，愛情是煩惱，愛情是人間最大的苦，愛是辛苦的，要付出感情，既費時、費力、費錢又費心。愛是神仙、老虎、狗，若有對方的愛，你就快樂似神仙，整天眉歡眼笑地幸福掛在臉上，若對方不愛，就讓你飯吃不下、覺也睡不好，晨昏顛倒、神情憔悴地活像隻哈巴狗。當兩人世界有了競爭者出現，就會展現攻擊和防禦的本能，輕者打破醋罈子而令人抓狂失去理智，嚴重的甚至可以連生命都不要了，這實在很苦啊！


    愛情是苦的，萬一愛上不該愛的人，就如同歌手陳淑樺一首名曲《夢醒時分》：「你說你愛了不該愛的人，你的心中滿是傷痕，你說你犯了不該犯的錯，心中滿是悔恨，你說你嚐盡了生活的苦，找不到可以相信的人……」。肯定讓你吃不完兜著走，不用吃藥也能自動減肥。多少女性為愛情放棄所學和事業，多少男子為了婚姻而改變生涯計劃和嗜好亦在所不惜，歡喜為對方付出而無怨無悔，愛情的力量是何其偉大。


    在斗數占星學裡，夫妻宮是主掌感情的宮位，未婚前代表戀愛順利，婚後顯示婚姻生活幸福與否，夫妻宮裡所落的星座屬性代表你跟另一半的互動關係和彼此關係的好壞。


    ### 愛情路上你和他


    夫妻宮是一個感情的宮位，其重要性凌駕於親情和友情之上，一旦有了戀愛對象，親情和友情的重要性立刻下降。宮內星性的強弱、吉凶就是觀察當事者對另一半的認同度，宮內星性柔和穩定即顯示兩人恩愛，彼此個性、觀念契合能接受對方缺點。相反的，宮內星性煞忌聚集，則顯現兩人個性南轅北轍，觀念難以溝通，共同生活必然常起紛爭，故很難經得起時間的考驗以致分手各奔前程，所謂：「有緣成一雙，無緣造兩對」是也。


    ### 論戀愛


    步驟：一、先看命格。二、再看大限狀況。三、細看流年現狀


    #### 一、命格

    看當事者對異性的吸引力的強度，研判發生時間的早晚。


    (1) 命帶桃花則情竇初開得早，於是戀愛也談得較早，並於第二大限顯現。

    (2) 須考慮當事者出生時代背景，今日社會可附諸行動，昔日社會也許只能心動。

    (3) 早熟的戀愛看第一大限，一般正常戀愛的發生時間是在第二大限。

    (4) 戀愛得早並不表示結婚得早，戀愛亦不見得一次即成功，且現今日世代裡，戀愛的對象也不見得只是單純一對一的情況，國父的信徒（崇尚博愛）也是大有人在，戀愛乎？亂愛乎？只要我喜歡，有什麼不可以乎？


    #### 二、流年

    看戀愛發生時間及戀愛戰況。


    (1) 第二大限之時當小限或太歲走本命夫妻宮，或走本命紅鸞或流年紅鸞入命身宮時，稱為紅鸞星動並視為初戀，此種情形之戀愛較正式而用心，否則若是單純走到桃花星而不具前述要件，只能說是走桃花運，視為玩票性質之露水姻緣而已。

    (2) 紅鸞星動時大限若不具備結婚要件時，只上戀愛而已。

    (3) 戀愛須分內外，即小限若符合第 (1) 項戀愛要件時為自己愛上對方，此種情形成功率較太歲走到為對方追自己時要來得大。

    (4) 當太歲走到而被對方追求時，若小限亦配合表示自己也有意思，於是互相放電，一拍即合，否則不來電是談不了多久的。

    (5) 反之若小限走到爲自己愛上別人，若太歲也配合的話，則對方亦會回電必然實果！否則只好吃香蕉皮了。

    (6) 前項所謂太歲或小限配合，是指所配合的太歲或小限的夫妻宮，有化權或化祿而言。

    (7) 紅鸞星動時但流年的夫妻宮若不好，表示其戀愛波折多。

    (8) 戀愛中若逢流年夫妻宮之四化有轉變，不論是祿轉忌或權轉祿時，主其當年感情有變。

    (9) 戀愛發生當年若其流年夫妻宮干，所化祿出去的宮位所主之生肖，如恰爲對方之生肖時，主此人對自己有好處，反之若對方爲化忌出去之宮位所主生肖，則自己要倒大楣了，小限走到看小限夫妻宮，太歲走到則看太歲夫妻宮。


    ## 姻緣天註定（合婚）


    以前的農業社會，人們的生活幾乎跟著節氣活動，日出而做、日落而息，生活方式相當單調，人與人之間的互動機會較少，除了重大節慶之外，適婚的青年男女想要認識對象實在是難上加難，在純樸的民風之下，就算在路上遇到漂亮的小姐也不敢上前打招呼，只有借重媒婆的穿針引線才能達到目的。但是，並不是你喜歡她就一定要得到她，這中間還得經過所謂「六禮」繁複程序才行，所謂六禮就是人間名：俗稱「求上門」，媒人先將男方生辰八字送到女家，然後將女方生辰八字送到男家，三天後，雙方家中都沒有不好的「彩頭」，待雙方家長都同意後再將二人的八字送去合婚。


    合婚者，合八字也，是一種民間習俗，作用在於觀察二人是否相剋、女方是否剋公婆、是否不孕、是否宜室宜家，八字沒有太多瑕疵。沒問題後再進行第二次訂盟的手續，訂盟：即俗稱「文定」、「小聘」或「結指儀」，通常都以戒指一對當做信物。（三）納采：俗稱「大聘」（因各地習俗不同，納采的物品也跟著不同）（四）納幣：俗稱「大送」，乃男方將家用綢緞、盒擔、頭釵、金飾等盛儀，擔送到女方家，（五）請期：即男方將迎娶所擇定的良辰吉日送到女家，並禮儀全帖。（六）迎親：又稱為「嫁娶」，即女婿先至女家，然後將新娘迎娶回家送進洞房。民間的習俗和信仰強調，此生嫁誰娶誰都是前世註定的，所以不是冤家不聚頭，不是這家人不端這碗飯。


    因此嫁雞隨雞行，大家都很認命，再怎麼不合或委曲，也只是吵一吵、二人分房睡而已，少有人提到離婚的字眼。傳統的社會，娶到嬌妻或嫁到好尪都是前世燒好香，此世得到神明的回報。台灣俗諺說：「播著歹田望後冬，娶到歹某一世人」，在姻緣路上都相當宿命的。現代人嚮往自由戀愛，強調自我主張。待戀愛成熟後，雙方有共組家庭的意願時才論及婚嫁，是一件水到渠成很自然的事情。


    一提到結婚前還需要合婚，現代人會覺得那是一件陳腐的觀念。其實合婚是一種理智的尋找適當的對象，避免因一時的亂愛而沖昏了頭，因草率的結婚而造成日後的麻煩，合婚有相當積極而正面的意義，大可不必排斥。


    從命理的角度，認為個性、生活習性、價值觀和家庭背景的相契合或背離，是婚姻成敗的重要因素，這個部份從斗數的星盤可以很輕易的分辨，可從五個重點分析：


    (1) 男女雙方星盤的結構相同者，例如紫微星共同都在寅位，而命宮在何位無妨，這種組合較能接受對方的習性。

    (2) 男女雙方命身宮裡的主星相同者，這種組合因星座相同彼此的默契亦相近，個性或嗜好亦相同，結為夫妻當然很適配。


    不過，有些星座其星性並不適合當夫妻的，例如：天府配天府（誰也不服誰，肯定有得吵了），太陰配太陰（兩個都龜毛又動作慢，那生活的節奏時間永遠不夠用），武曲配武曲（兩個粗魯的人生活在一起那還有啥情趣可言），廉貞配廉貞（豈不天天都在勾心鬥角，生活永無寧日了）。


    (3) 自己星盤上，夫妻宮的主星恰好是對方命宮或身宮內的主星，這種組合真是天生一對，再好不過了。

    (4) 男人命宮坐太陰星者，搭配女命太陽星坐命宮者，此謂陰陽相吸之絕配也。

    (5) 具有互補性質的組合，例如武曲配破軍（會賺錢配好花錢），天府配天相（財庫配服務），七殺配天同（勤快配懶散），天機配天梁（聰明配古意），廉貞配紫微（精明配氣質）等均是絕佳的配對，婚後肯定幸福美滿。


    斗數的合婚原則是以先天固定星盤為主，有些夫妻結婚的情形只是大限具備而已，待運限一過，磁場互相消長即愈看愈不順眼，這種情形所締結的婚姻，其基礎多半不甚穩固。


    ### 琴瑟和鳴


    「我倆認識三年戀愛六年，彼此感情穩定成熟，今徵得雙方父母同意，決定攜手共組家庭。業已於五月二十日在台北地方法院公證結婚，期盼親友能夠分享我們的喜悅，更希望能得到您的祝福，謹敬備菲酌，竭誠邀您的大駕光臨，禮金千萬別太寒酸……」


    每當我接到這種紅色炸彈，心情總是憂喜參半，喜的是又有喜酒可喝，可以託他們福沾些喜氣。憂的是多一個朋友失去了自由，「PTT 協會」又多一個會員，破費事小，朋友的一生幸福才重要，但願他們是經過深思熟慮後才做決定，確定婚姻能使他們得到當下的生活元素，而不是因一時衝動激情「發昏」，想去結婚的人。


    在權的社會裡，凡事以男人爲主導，娶妻娶德，娶到歹某一世人衰，女人毫無商量的餘地，就算嫁著吃喝嫖賭樣樣來的歹尬，每天「話若要講透支、日屎就揮抹離」，只能順從三從四德的規範忍辱偷生。現今社會女權高漲，在婚姻生活中女人已站在主導位置，要求另一半遵守新的「三從四得」——第一、對太太的話要「聽從」；第二、太太出門要「隨從」；第三、太太說錯話要「盲從」；至於四則是，太太出門前化妝費時很久要「等得」，以及太人生日要「記得」，還有太太罵你要「忍得」和太太花錢要「捨得」！並幫忙做家事、帶小孩，全力做個「新好男人」才能合乎時代的潮流，男人真是愈來愈不好混了。


    ### 婚姻的看法：

    一、先看命格。二、次看大限。三、再查流年。


    #### 一、命格


    首看此人有無婚姻之可能，是早婚或晚婚，是昭陽（正宮）或是繼室或偏房。


    (1) 先看其命宮是否屬於某些不利婚姻的組合，如武曲加煞、機梁加煞、陰陽顛倒（男命太陰、女命太陽），官祿宮有本生年化忌星而欠夫妻者，此種情形如運限不配合，則成爲王老五的可能性較大。

    (2) 符合前項之命格，若具有婚姻者，絕大多數都是大限走勢促成的，並於運過之後若逢夫宮不佳時易出問題，或生離或死別，則看其運限的走勢，以及四化與煞星所落或沖照之情形而定。

    (3) 前項以命理角度而言，不利婚姻組合的人不如就當一個快樂的單身貴族，一旦走入了婚姻這條路，挫折、分手等風波必多、反而更累。

    (4) 本命宮或第二大限命宮有紅鸞星坐守則屬早婚命格，有天喜主緣份早發而未必是早婚。

    (5) 日、月、武曲、天梁坐命者感情線較晚開，適合晚婚，或夫妻宮太差如坐機巨、同巨、巨日、煞星者亦須晚婚較佳。

    (6) 第二大限結婚為早婚，第三大限為一般正常婚齡，第四大限之後皆屬於晚婚範圍，若以年齡而言，男逾三十三，女逾三十則皆屬晚婚。

    (7) 女命太陽、太陰落陷以及天同，多為偏房命格，做偏房反而較好命。

    (8) 夫妻宮坐破軍或左右單守或星宿太差時，適合做繼室或二手貨較佳。


    #### 二、大限


    以命格推判其婚姻之有無與早晚，後再繼查發生於哪一個大限，以及屬於該限之上五年或下五年結婚，依序縮小範圍。


    (1) 大限具備要件：大限走本命紅鸞，或是大限的權祿入本命或大限之夫妻宮，或本命權祿入大限夫妻宮，則於該限有姻緣機會。

    (2) 大限命宮星曜穩定或是夫妻宮有化吉星，則上該限上五年內結婚。

    (3) 大限命宮及夫妻宮有動星或逢煞沖破則主下五年才有機緣。

    (4) 確定為上五年或下五年結婚之後，再鎖定該五年之範圍再進步縮小範圍，以太歲或小限走夫妻宮，或本命紅鸞或流鸞入命身宮，且該年之夫妻宮又有化吉者爲其正式結婚年。

    (5) 第二次婚姻是以月支當年支看，以便查出暗紅鸞的宮位，例如：五月生人月支為午，紅鸞子年起卯逆行，可知數至月支午，則得暗紅鸞於酉位，再以前項目 (2)、(3)、(4)
    點推出結婚年份。

    (6) 行限走桃花時，田宅宮有化權或化祿，一般是同居，雖亦有可能結婚，但若不是走婚姻線而結婚，則甚難持久，並於行限夫妻宮逢破時必然分手。


    #### 三、流年


    (1) 流年太歲或小限逢本命夫妻宮或本命紅鸞星，該年視為紅鸞星動，會有結婚的衝動。

    (2) 流年的紅鸞星入本命宮或身宮亦主該年為紅鸞星動。


    ### 刑剋與暴力


    三年前家鄉有個林姓富有人家的兒子與女友訂婚，過沒幾天父親就因不明的疾病過世，依照鄉下習俗，女孩要披麻帶孝持媳婦之禮，並決定遵照風俗在百日內完婚。這段期間婆婆拿了女孩的八字請人批算，才發現女孩八字帶剪刀，帶鐵掃相當不詳，術士斷言這女孩不但剋死公公，將來還會剋死丈夫。婆婆回家後立刻要求兒子退婚。一對有情人從此成爲陌路，術士一句話讓一段美好的姻緣頓時煙消雲散。


    傳統命理最愛「剋」字，什麼剋父、剋母、剋夫、剋妻、剋子、剋孫……，無所不剋，簡直可以剋得雞飛狗跳。其實子平法裡所用的「剋」字，其實只是壓制、脅迫和某種限制，並不必然致死。若以此論之，那就太不瞭解江湖術士的本質了，沒有誇大其詞的引用條文，他們混什飯吃的？例如父親發生車禍就可以掰說小孩害的，把責任全推給孩子，這是什麼碗糕理論？當然沒道理！不過，信服的人就是很多，由此可見現代人教育水準提高了但
    IQ 和 EQ 並沒相對提高。


    在紫微學術裡不喜歡「剋」的字眼，平常都以磁場引力來形容，例如太陽坐命的人，無形中會跟父親較不投緣，那是當事者的個性，觀念與父親有代溝所致，斗數的理論，星盤上六親位星座的好壞，只是代表當事者與他們之間的對待關係親疏，以及緣份的深淺而已，絕無刑剋親情的理論。


    每個人都是獨立的個體，這個人如何能活生生的把另一個人剋死？除非拿刀把他殺死。在斗數裡真的要說得上帶有刑剋的，只有煞星單守命宮或是七殺加煞、武曲加煞坐命者還勉強稱得上，但絕大多數都是刑到自己的身體，甚少剋到其他親人，所謂「刑剋」的論調在紫微的學術裡只是個必須面對的「遺憾」罷了。


    同樣的道理，面對愈來愈多的婚姻暴力，有人說問題是出在星盤的夫妻宮太凶，亦有人說是命宮的問題，但根據我三十年來的實際經驗，其實兩者都不是，其關鍵是行運而不在命格的固定盤，試問有暴力傾向的人誰敢嫁他？莫非是白痴？大部分都是隨著大運流年的改變、人事物的變遷而發生。而會發生婚姻暴力的實例，大約可歸納三種原因。


    (1) 命宮擁有多重性格的星座或組合的人，當行運遭逢劇烈變化而產生性情突變，其人格特質起了變化，例如天同運轉入七殺運或天機運轉入紫微運等，常讓人的個性改變不及而難以適應，造成人格分裂，其周遭的親人當然是首當其衝，被拿來當消氣散本舖。

    (2) 命宮無主星或主星陷弱或是主星被空亡星遮蔽了，其個性必然是意志力較薄弱，每當感情、事業、財務遭逢重大挫敗時，其挫折感會打跨他的自信心而引發憂鬱症或燥鬱症，個性和行爲會變成另外一個人，人格意識完全改變，當流年煞星聚集時即會發作，造成自殘或是傷害他人的行爲（港星陳寶蓮的星盤即是一例）。

    (3) 所以平時多去關心周遭的親友，多給一點愛的鼓勵和安慰，可以減少很多家庭悲劇和婚姻暴力。


    ### (六) 婚外情訣


    - 現，甚至影響到公司的整體形象。

    - 婚姻與兩性關係是屬於私人領域的事，公司是不是可以用公權力來介入，是一件見仁見智的事情。不過，不可否認的是，企業宣示捍衛傳統家庭倫理，嚴格禁止婚外情或辦公室戀情，對該企業的社會形象有正面的評價，在其中工作的人，多少總會收斂一點，會更懂得約束自己吧！在這兩性關係互動複雜而不講究忠誠的時代，用公司的內規來規範員工不准發生婚外情，能達到多大的效果，實在是一大疑問。

    - 最近咱的國會殿堂也是緋聞不斷，大小老婆爭戰不休，好像電視連續劇一般，幾乎每天都有扣人心絃的新劇情，社會大衆也跟著劇情起舞，成爲茶餘飯後的八卦話題。有人爲大老婆撐腰，有人替小老婆叫屈抱不平。爲什麼這個私人的婚外情事件會引起社會大衆的高度興趣？除了當事者本身的身份和高知名度之外，另一個重點是，婚外情這檔事真的是日常可見，在「外」面隨處可「遇」的「生活問題」。


    儘管養小老婆、包二奶或包養外公的型態已經不像過去，經濟獨立而不需要被養的人現今大有人在，單純的紅粉知己或性伴侶比例亦不少，但是不論社會風氣如何的開放，這種事還是只能做不能說，要不「見光死」，還能公開出雙入對「獲得肯定」的，不但有「技術性的困難」也很容易帶來家庭的災難，婚外情的另一半當然也有「自己的一片天」，但是這片天無論如何就是無法「普照大地，暢行無阻」的。


    所謂婚外情，顧名思義就是已婚者搞三角或多角關係，又稱為外遇、牽牛花或偷腥，在昔日保守社會中則給它扣上一個很難聽的名稱，叫做通姦，然而不論其稱呼如何，可知道這種事情不是只有發生在現代，只是社會背景和道德標準有別。在文明之前或許此種行為還頗受歡迎也說不定，人人皆可順性而爲，所謂獨樂樂不如衆樂樂，也許在當時還可美其名爲合家歡呢！'
  mdcn: '## 第10章 暗合宮位的論法


    素，父母方面能影響當事者的層面有限；反之，若是父母宮的星性較強，多半對當事者採用命令式教育，即使當事者心中多有無奈，但因為主觀意識較弱，也只能乖乖地言聽計從。


    ## 第12章 戀愛與姻緣


    ### 愛情路上妳和他


    若問世間情爲何物？相信沒有幾個人可回答得出來，愛情是可愛又迷人的，人類不分貧、富、貴、賤都需要愛情的滋潤，在人生的旅途上，愛情是扮演多麼關鍵的角色，有了愛情，人生立刻由黑白變彩色，生活立刻有了動能和活力，思想才由靜止而活潑，才能體會什麼是「幸福」、哪裡是「天堂」。有了愛，世界樣樣都美好。但，在愛情的世界裡，男女觀念有別，女人的愛情始終如一卻不一定長久，男人的愛情可能長久卻不容易專一。愛情的真締是要好好的愛自己更愛對方，愛情的快樂不是在激情的擁抱中結束，而是持續的永恆著。


    然而，愛情是煩惱，愛情是人間最大的苦，愛是辛苦的，要付出感情，既費時、費力、費錢又費心。愛是神仙、老虎、狗，若有對方的愛，你就快樂似神仙，整天眉歡眼笑地幸福掛在臉上，若對方不愛，就讓你飯吃不下、覺也睡不好，晨昏顛倒、神情憔悴地活像隻哈巴狗。當兩人世界有了競爭者出現，就會展現攻擊和防禦的本能，輕者打破醋罈子而令人抓狂失去理智，嚴重的甚至可以連生命都不要了，這實在很苦啊！


    愛情是苦的，萬一愛上不該愛的人，就如同歌手陳淑樺一首名曲《夢醒時分》：「你說你愛了不該愛的人，你的心中滿是傷痕，你說你犯了不該犯的錯，心中滿是悔恨，你說你嚐盡了生活的苦，找不到可以相信的人……」。肯定讓你吃不完兜著走，不用吃藥也能自動減肥。多少女性為愛情放棄所學和事業，多少男子為了婚姻而改變生涯計劃和嗜好亦在所不惜，歡喜為對方付出而無怨無悔，愛情的力量是何其偉大。


    在斗數占星學裡，夫妻宮是主掌感情的宮位，未婚前代表戀愛順利，婚後顯示婚姻生活幸福與否，夫妻宮裡所落的星座屬性代表你跟另一半的互動關係和彼此關係的好壞。


    ### 愛情路上你和他


    夫妻宮是一個感情的宮位，其重要性凌駕於親情和友情之上，一旦有了戀愛對象，親情和友情的重要性立刻下降。宮內星性的強弱、吉凶就是觀察當事者對另一半的認同度，宮內星性柔和穩定即顯示兩人恩愛，彼此個性、觀念契合能接受對方缺點。相反的，宮內星性煞忌聚集，則顯現兩人個性南轅北轍，觀念難以溝通，共同生活必然常起紛爭，故很難經得起時間的考驗以致分手各奔前程，所謂：「有緣成一雙，無緣造兩對」是也。


    ### 論戀愛


    步驟：一、先看命格。二、再看大限狀況。三、細看流年現狀


    #### 一、命格

    看當事者對異性的吸引力的強度，研判發生時間的早晚。


    (1) 命帶桃花則情竇初開得早，於是戀愛也談得較早，並於第二大限顯現。

    (2) 須考慮當事者出生時代背景，今日社會可附諸行動，昔日社會也許只能心動。

    (3) 早熟的戀愛看第一大限，一般正常戀愛的發生時間是在第二大限。

    (4) 戀愛得早並不表示結婚得早，戀愛亦不見得一次即成功，且現今日世代裡，戀愛的對象也不見得只是單純一對一的情況，國父的信徒（崇尚博愛）也是大有人在，戀愛乎？亂愛乎？只要我喜歡，有什麼不可以乎？


    #### 二、流年

    看戀愛發生時間及戀愛戰況。


    (1) 第二大限之時當小限或太歲走本命夫妻宮，或走本命紅鸞或流年紅鸞入命身宮時，稱為紅鸞星動並視為初戀，此種情形之戀愛較正式而用心，否則若是單純走到桃花星而不具前述要件，只能說是走桃花運，視為玩票性質之露水姻緣而已。

    (2) 紅鸞星動時大限若不具備結婚要件時，只上戀愛而已。

    (3) 戀愛須分內外，即小限若符合第 (1) 項戀愛要件時為自己愛上對方，此種情形成功率較太歲走到為對方追自己時要來得大。

    (4) 當太歲走到而被對方追求時，若小限亦配合表示自己也有意思，於是互相放電，一拍即合，否則不來電是談不了多久的。

    (5) 反之若小限走到爲自己愛上別人，若太歲也配合的話，則對方亦會回電必然實果！否則只好吃香蕉皮了。

    (6) 前項所謂太歲或小限配合，是指所配合的太歲或小限的夫妻宮，有化權或化祿而言。

    (7) 紅鸞星動時但流年的夫妻宮若不好，表示其戀愛波折多。

    (8) 戀愛中若逢流年夫妻宮之四化有轉變，不論是祿轉忌或權轉祿時，主其當年感情有變。

    (9) 戀愛發生當年若其流年夫妻宮干，所化祿出去的宮位所主之生肖，如恰爲對方之生肖時，主此人對自己有好處，反之若對方爲化忌出去之宮位所主生肖，則自己要倒大楣了，小限走到看小限夫妻宮，太歲走到則看太歲夫妻宮。


    ## 姻緣天註定（合婚）


    以前的農業社會，人們的生活幾乎跟著節氣活動，日出而做、日落而息，生活方式相當單調，人與人之間的互動機會較少，除了重大節慶之外，適婚的青年男女想要認識對象實在是難上加難，在純樸的民風之下，就算在路上遇到漂亮的小姐也不敢上前打招呼，只有借重媒婆的穿針引線才能達到目的。但是，並不是你喜歡她就一定要得到她，這中間還得經過所謂「六禮」繁複程序才行，所謂六禮就是人間名：俗稱「求上門」，媒人先將男方生辰八字送到女家，然後將女方生辰八字送到男家，三天後，雙方家中都沒有不好的「彩頭」，待雙方家長都同意後再將二人的八字送去合婚。


    合婚者，合八字也，是一種民間習俗，作用在於觀察二人是否相剋、女方是否剋公婆、是否不孕、是否宜室宜家，八字沒有太多瑕疵。沒問題後再進行第二次訂盟的手續，訂盟：即俗稱「文定」、「小聘」或「結指儀」，通常都以戒指一對當做信物。（三）納采：俗稱「大聘」（因各地習俗不同，納采的物品也跟著不同）（四）納幣：俗稱「大送」，乃男方將家用綢緞、盒擔、頭釵、金飾等盛儀，擔送到女方家，（五）請期：即男方將迎娶所擇定的良辰吉日送到女家，並禮儀全帖。（六）迎親：又稱為「嫁娶」，即女婿先至女家，然後將新娘迎娶回家送進洞房。民間的習俗和信仰強調，此生嫁誰娶誰都是前世註定的，所以不是冤家不聚頭，不是這家人不端這碗飯。


    因此嫁雞隨雞行，大家都很認命，再怎麼不合或委曲，也只是吵一吵、二人分房睡而已，少有人提到離婚的字眼。傳統的社會，娶到嬌妻或嫁到好尪都是前世燒好香，此世得到神明的回報。台灣俗諺說：「播著歹田望後冬，娶到歹某一世人」，在姻緣路上都相當宿命的。現代人嚮往自由戀愛，強調自我主張。待戀愛成熟後，雙方有共組家庭的意願時才論及婚嫁，是一件水到渠成很自然的事情。


    一提到結婚前還需要合婚，現代人會覺得那是一件陳腐的觀念。其實合婚是一種理智的尋找適當的對象，避免因一時的亂愛而沖昏了頭，因草率的結婚而造成日後的麻煩，合婚有相當積極而正面的意義，大可不必排斥。


    從命理的角度，認為個性、生活習性、價值觀和家庭背景的相契合或背離，是婚姻成敗的重要因素，這個部份從斗數的星盤可以很輕易的分辨，可從五個重點分析：


    (1) 男女雙方星盤的結構相同者，例如紫微星共同都在寅位，而命宮在何位無妨，這種組合較能接受對方的習性。

    (2) 男女雙方命身宮裡的主星相同者，這種組合因星座相同彼此的默契亦相近，個性或嗜好亦相同，結為夫妻當然很適配。


    不過，有些星座其星性並不適合當夫妻的，例如：天府配天府（誰也不服誰，肯定有得吵了），太陰配太陰（兩個都龜毛又動作慢，那生活的節奏時間永遠不夠用），武曲配武曲（兩個粗魯的人生活在一起那還有啥情趣可言），廉貞配廉貞（豈不天天都在勾心鬥角，生活永無寧日了）。


    (3) 自己星盤上，夫妻宮的主星恰好是對方命宮或身宮內的主星，這種組合真是天生一對，再好不過了。

    (4) 男人命宮坐太陰星者，搭配女命太陽星坐命宮者，此謂陰陽相吸之絕配也。

    (5) 具有互補性質的組合，例如武曲配破軍（會賺錢配好花錢），天府配天相（財庫配服務），七殺配天同（勤快配懶散），天機配天梁（聰明配古意），廉貞配紫微（精明配氣質）等均是絕佳的配對，婚後肯定幸福美滿。


    斗數的合婚原則是以先天固定星盤為主，有些夫妻結婚的情形只是大限具備而已，待運限一過，磁場互相消長即愈看愈不順眼，這種情形所締結的婚姻，其基礎多半不甚穩固。


    ### 琴瑟和鳴


    「我倆認識三年戀愛六年，彼此感情穩定成熟，今徵得雙方父母同意，決定攜手共組家庭。業已於五月二十日在台北地方法院公證結婚，期盼親友能夠分享我們的喜悅，更希望能得到您的祝福，謹敬備菲酌，竭誠邀您的大駕光臨，禮金千萬別太寒酸……」


    每當我接到這種紅色炸彈，心情總是憂喜參半，喜的是又有喜酒可喝，可以託他們福沾些喜氣。憂的是多一個朋友失去了自由，「PTT 協會」又多一個會員，破費事小，朋友的一生幸福才重要，但願他們是經過深思熟慮後才做決定，確定婚姻能使他們得到當下的生活元素，而不是因一時衝動激情「發昏」，想去結婚的人。


    在權的社會裡，凡事以男人爲主導，娶妻娶德，娶到歹某一世人衰，女人毫無商量的餘地，就算嫁著吃喝嫖賭樣樣來的歹尬，每天「話若要講透支、日屎就揮抹離」，只能順從三從四德的規範忍辱偷生。現今社會女權高漲，在婚姻生活中女人已站在主導位置，要求另一半遵守新的「三從四得」——第一、對太太的話要「聽從」；第二、太太出門要「隨從」；第三、太太說錯話要「盲從」；至於四則是，太太出門前化妝費時很久要「等得」，以及太人生日要「記得」，還有太太罵你要「忍得」和太太花錢要「捨得」！並幫忙做家事、帶小孩，全力做個「新好男人」才能合乎時代的潮流，男人真是愈來愈不好混了。


    ### 婚姻的看法：

    一、先看命格。二、次看大限。三、再查流年。


    #### 一、命格


    首看此人有無婚姻之可能，是早婚或晚婚，是昭陽（正宮）或是繼室或偏房。


    (1) 先看其命宮是否屬於某些不利婚姻的組合，如武曲加煞、機梁加煞、陰陽顛倒（男命太陰、女命太陽），官祿宮有本生年化忌星而欠夫妻者，此種情形如運限不配合，則成爲王老五的可能性較大。

    (2) 符合前項之命格，若具有婚姻者，絕大多數都是大限走勢促成的，並於運過之後若逢夫宮不佳時易出問題，或生離或死別，則看其運限的走勢，以及四化與煞星所落或沖照之情形而定。

    (3) 前項以命理角度而言，不利婚姻組合的人不如就當一個快樂的單身貴族，一旦走入了婚姻這條路，挫折、分手等風波必多、反而更累。

    (4) 本命宮或第二大限命宮有紅鸞星坐守則屬早婚命格，有天喜主緣份早發而未必是早婚。

    (5) 日、月、武曲、天梁坐命者感情線較晚開，適合晚婚，或夫妻宮太差如坐機巨、同巨、巨日、煞星者亦須晚婚較佳。

    (6) 第二大限結婚為早婚，第三大限為一般正常婚齡，第四大限之後皆屬於晚婚範圍，若以年齡而言，男逾三十三，女逾三十則皆屬晚婚。

    (7) 女命太陽、太陰落陷以及天同，多為偏房命格，做偏房反而較好命。

    (8) 夫妻宮坐破軍或左右單守或星宿太差時，適合做繼室或二手貨較佳。


    #### 二、大限


    以命格推判其婚姻之有無與早晚，後再繼查發生於哪一個大限，以及屬於該限之上五年或下五年結婚，依序縮小範圍。


    (1) 大限具備要件：大限走本命紅鸞，或是大限的權祿入本命或大限之夫妻宮，或本命權祿入大限夫妻宮，則於該限有姻緣機會。

    (2) 大限命宮星曜穩定或是夫妻宮有化吉星，則上該限上五年內結婚。

    (3) 大限命宮及夫妻宮有動星或逢煞沖破則主下五年才有機緣。

    (4) 確定為上五年或下五年結婚之後，再鎖定該五年之範圍再進步縮小範圍，以太歲或小限走夫妻宮，或本命紅鸞或流鸞入命身宮，且該年之夫妻宮又有化吉者爲其正式結婚年。

    (5) 第二次婚姻是以月支當年支看，以便查出暗紅鸞的宮位，例如：五月生人月支為午，紅鸞子年起卯逆行，可知數至月支午，則得暗紅鸞於酉位，再以前項目 (2)、(3)、(4)
    點推出結婚年份。

    (6) 行限走桃花時，田宅宮有化權或化祿，一般是同居，雖亦有可能結婚，但若不是走婚姻線而結婚，則甚難持久，並於行限夫妻宮逢破時必然分手。


    #### 三、流年


    (1) 流年太歲或小限逢本命夫妻宮或本命紅鸞星，該年視為紅鸞星動，會有結婚的衝動。

    (2) 流年的紅鸞星入本命宮或身宮亦主該年為紅鸞星動。


    ### 刑剋與暴力


    三年前家鄉有個林姓富有人家的兒子與女友訂婚，過沒幾天父親就因不明的疾病過世，依照鄉下習俗，女孩要披麻帶孝持媳婦之禮，並決定遵照風俗在百日內完婚。這段期間婆婆拿了女孩的八字請人批算，才發現女孩八字帶剪刀，帶鐵掃相當不詳，術士斷言這女孩不但剋死公公，將來還會剋死丈夫。婆婆回家後立刻要求兒子退婚。一對有情人從此成爲陌路，術士一句話讓一段美好的姻緣頓時煙消雲散。


    傳統命理最愛「剋」字，什麼剋父、剋母、剋夫、剋妻、剋子、剋孫……，無所不剋，簡直可以剋得雞飛狗跳。其實子平法裡所用的「剋」字，其實只是壓制、脅迫和某種限制，並不必然致死。若以此論之，那就太不瞭解江湖術士的本質了，沒有誇大其詞的引用條文，他們混什飯吃的？例如父親發生車禍就可以掰說小孩害的，把責任全推給孩子，這是什麼碗糕理論？當然沒道理！不過，信服的人就是很多，由此可見現代人教育水準提高了但
    IQ 和 EQ 並沒相對提高。


    在紫微學術裡不喜歡「剋」的字眼，平常都以磁場引力來形容，例如太陽坐命的人，無形中會跟父親較不投緣，那是當事者的個性，觀念與父親有代溝所致，斗數的理論，星盤上六親位星座的好壞，只是代表當事者與他們之間的對待關係親疏，以及緣份的深淺而已，絕無刑剋親情的理論。


    每個人都是獨立的個體，這個人如何能活生生的把另一個人剋死？除非拿刀把他殺死。在斗數裡真的要說得上帶有刑剋的，只有煞星單守命宮或是七殺加煞、武曲加煞坐命者還勉強稱得上，但絕大多數都是刑到自己的身體，甚少剋到其他親人，所謂「刑剋」的論調在紫微的學術裡只是個必須面對的「遺憾」罷了。


    同樣的道理，面對愈來愈多的婚姻暴力，有人說問題是出在星盤的夫妻宮太凶，亦有人說是命宮的問題，但根據我三十年來的實際經驗，其實兩者都不是，其關鍵是行運而不在命格的固定盤，試問有暴力傾向的人誰敢嫁他？莫非是白痴？大部分都是隨著大運流年的改變、人事物的變遷而發生。而會發生婚姻暴力的實例，大約可歸納三種原因。


    (1) 命宮擁有多重性格的星座或組合的人，當行運遭逢劇烈變化而產生性情突變，其人格特質起了變化，例如天同運轉入七殺運或天機運轉入紫微運等，常讓人的個性改變不及而難以適應，造成人格分裂，其周遭的親人當然是首當其衝，被拿來當消氣散本舖。

    (2) 命宮無主星或主星陷弱或是主星被空亡星遮蔽了，其個性必然是意志力較薄弱，每當感情、事業、財務遭逢重大挫敗時，其挫折感會打跨他的自信心而引發憂鬱症或燥鬱症，個性和行爲會變成另外一個人，人格意識完全改變，當流年煞星聚集時即會發作，造成自殘或是傷害他人的行爲（港星陳寶蓮的星盤即是一例）。

    (3) 所以平時多去關心周遭的親友，多給一點愛的鼓勵和安慰，可以減少很多家庭悲劇和婚姻暴力。


    ### (六) 婚外情訣


    - 現，甚至影響到公司的整體形象。

    - 婚姻與兩性關係是屬於私人領域的事，公司是不是可以用公權力來介入，是一件見仁見智的事情。不過，不可否認的是，企業宣示捍衛傳統家庭倫理，嚴格禁止婚外情或辦公室戀情，對該企業的社會形象有正面的評價，在其中工作的人，多少總會收斂一點，會更懂得約束自己吧！在這兩性關係互動複雜而不講究忠誠的時代，用公司的內規來規範員工不准發生婚外情，能達到多大的效果，實在是一大疑問。

    - 最近咱的國會殿堂也是緋聞不斷，大小老婆爭戰不休，好像電視連續劇一般，幾乎每天都有扣人心絃的新劇情，社會大衆也跟著劇情起舞，成爲茶餘飯後的八卦話題。有人爲大老婆撐腰，有人替小老婆叫屈抱不平。爲什麼這個私人的婚外情事件會引起社會大衆的高度興趣？除了當事者本身的身份和高知名度之外，另一個重點是，婚外情這檔事真的是日常可見，在「外」面隨處可「遇」的「生活問題」。


    儘管養小老婆、包二奶或包養外公的型態已經不像過去，經濟獨立而不需要被養的人現今大有人在，單純的紅粉知己或性伴侶比例亦不少，但是不論社會風氣如何的開放，這種事還是只能做不能說，要不「見光死」，還能公開出雙入對「獲得肯定」的，不但有「技術性的困難」也很容易帶來家庭的災難，婚外情的另一半當然也有「自己的一片天」，但是這片天無論如何就是無法「普照大地，暢行無阻」的。


    所謂婚外情，顧名思義就是已婚者搞三角或多角關係，又稱為外遇、牽牛花或偷腥，在昔日保守社會中則給它扣上一個很難聽的名稱，叫做通姦，然而不論其稱呼如何，可知道這種事情不是只有發生在現代，只是社會背景和道德標準有別。在文明之前或許此種行為還頗受歡迎也說不定，人人皆可順性而爲，所謂獨樂樂不如衆樂樂，也許在當時還可美其名爲合家歡呢！'
