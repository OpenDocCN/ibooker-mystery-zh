    ## 二、社會背景的角度


    ### （一）時間背景


    在昔日的社會裡，民風保守，外遇這碼子事，幾乎是以男人爲主導，女人多受制於三從四德、七出之條等約束，即使對婚姻再不滿意，也不太敢輕易逾越雷池一步，並且古代女人識字不多，又標榜「女子無才便是德」，而且家務纏身，故而少有接觸外界之機會，自然外遇之機率少之又少；而男人只要不是勾搭上人家有夫之婦，多半不致受到社會多大的指責，況且三妻四妾亦不犯法，一旦看上了哪家的姑娘，只要有錢或對方點頭，就可順理成章的明媒正娶回來做小，娶得愈多，表示資本愈雄厚還愈顯威風，連皇帝老子都是搞外遇的祖師爺咧！「所謂有錢人終成眷屬」。


    時至今日的工商繁榮時代，隨著教育機會平等，女人的知識才華不亞於男人，甚而有過之，男人稍不爭氣，即被比了下去。隨著社會觀念的開放，以及工作機會的均等，女人走出了家庭，甚至擁有了屬於自己的事業，經濟能力也已不在男人之下，社會地位也逐漸提升，於是人际交往频繁，男女关系日渐开放，閒谈之间多少都会拿自己或配偶互相比较一番，举凡事业成就、学识才华、外貌身材、磨剑擦枪手艺……等，因而一旦运走桃花，遇上了一位文武兼备远胜于自己配偶的人对自己放电时，恐怕要晚节不保了，其外遇发生比率远大于往昔，外遇已不再是男人的专利，女人亦有主导的诱因，所以现代的男人再不争气点，当心随时会被身边的女人放空。


    ### （二）空间背景


    昔日孟母三迁的故事，说明了人受环境因素影响甚钜，因此若以一直生长于朴实的乡野间，与长期居住于繁华的大都会里，或居住在花街柳巷附近的人们来作一比较的话，其生活层面、人际关系、思想价值观必有显著之不同。


    外遇问题对后者而言，或许因环境关系而时有所闻，见怪不怪，甚至自己也會在不知不覺中效法週遭的人，但於前者生活環境與人際關係都較單純的人而言，至少所受到的污染都較後者少，即使走桃花面臨外遇問題時，顧忌總是比較多，因為前者而一夕成名，受到抨擊的機率遠大於後者。


