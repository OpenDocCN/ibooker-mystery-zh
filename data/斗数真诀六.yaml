    ## 三、田宅细评


    ### 再论田宅


    #### （一）家运


    田宅宫的好坏可以看出家运如何，且必须以大限的子田线为主，假使某大限之田宅不佳，例如：逢空劫夹、拱或遇巨门坐守或有煞忌冲照之时，主该限之家运不好，库位逢破，住所不稳定等事，但并非那十年之内年年如此，而是在小限或太岁再走到该大限之田宅宫，也就是前述逢空劫、煞忌、夹拱的宫位即应验所主之事。


    家运不好之时，与当事人住在同一个屋檐下者皆有影响，但是这并不能因此而判定当事人是不祥的大乌鸦，而把家中一旦发生的所有不幸全归咎于他，事实上家运的好坏只是藉由当事人的命盘显示出来罢了，他并没有什么天大的本领，足以影响家中的所有人，并且家运不好之时，家中其他人的命盘也必然会相关的有所显示，因此这绝对不是单纯的因为当事人一个人的缘故。


    至于家运不好的原因有三种，一是前段所言田宅宫的问题，田宅本宫不好是自家人造成的，同时星性及星宿组合可区别发生何事，若是它的夹宫或三合位不好，如逢空劫、煞忌、夹拱冲照、多半是因为外来的因素使然。


    第二种原因是家中的磁场突然有了某种改变，这种改变有些并不明显，其徵兆恐怕只有某些小动植物能察觉，就像水灾之前蚂蚁会大搬家，地震来临之前会引起小动物们的骚动不安。


    有此磁场的改变其徵兆会较为明显的产生某些异象，例如：家中的花木莫名其妙的全部枯萎，鱼儿自水族箱内跳出来自杀，玻璃门窗毫无理由的碎裂，家犬夜夜呼嚎……等，这些多半为不祥之事的先兆，之所以会如此是因为家中磁场突然改变，有不适合这家人再继续居住下去的倾向。


    第二种原因则与住家附近有兴木动土的情形有关，因为若有上述情况则会改变住家环境的风水，进而产生变数，特别是住宅的前方若有动土，其影响力尤其大，这些在阳宅学内也有对于此种情形的理论可引证。


    #### （二）意外


    子田线不佳，除上述以外，亦主意外，但此种多属于发生在家中的事故，而有别于命迁线不佳所主之意外，则为在自它以外之地所发生之伤害，然而无论何种事故，其严重程度须先看大限具备与否即大限子田线之好坏，大限具备者较为严重，至于自己受伤与否则参考疾厄宫，以及目前所走之小限、太岁情形，凡疾厄宫逢煞忌（尤以流年煞及双忌为凶），或小限、太岁走七杀、红鸾，或入命疾又遇煞则必有血光之灾，其情形严重与否，同样先视大限有无具备而论。


    若大限田宅不佳，小限再走到大限的田宅，即不好的那一宫时，是因自己的不慎而在家所引发事故，事故种类则看星性及组合，当中尤以巨门之组合最不吉，单守或化忌主口角、是非争执、巨火遭回禄、巨陀主蹄伤、巨铃上有毒气体引发之意外、空劫主跌倒、廉杀、武破主电伤巨火、廉火上电线走火……等，若大限田宅不佳而小限与大限重叠，且引动田宅，则主家里的人或屋宅有事，如小限犯小人，仆役不佳或仆役与田宅重叠，则有樑上君子光顾之虞，或是家中常有不速客造访，此时最怕逢陀罗，有去而复返之忧，另外，田宅宫的对宫为子女宫，田宅若逢煞星冲破须特别留意子女的安全，不是疾病就是有意外。


    命迁线所主之意外在此亦附带一提，其看法与田宅宫相同，所不同者是发生地点在居家以外，事故之种类亦有分别，如天机化忌在田宅主被房东赶走，或为自宅但因故被迫离开。而天机化忌若在迁移除了主在外与人争执计较，并主交通事故，因天机亦代表交通工具，若为机巨之组合，则为因交通事故而与人发生口角，其他如太阴化忌主旅游意外或山难，因太阴代表休闲娱乐之故。廉贞或太阴化忌亦主在外遇见灵异事件，破军文曲主水厄，擎羊主刀伤血光，武曲主打架，空劫防高处跌下，当年尤不宜坐飞机，火星主烧烫伤，发生时间为太岁或小限走迁移宫，而该年迁移宫有煞之时，若为交通事故再分析内外原因，小限不好是自己撞人，而太岁不好则是别人撞你。紫微看盘的技巧是由本命、大限、流年、流月逐步缩小，按照这个方式去解盘准没错的，至于小限和太岁要分盘分清楚，那是一定要的啦！


    ## 论公务员升迁


    此篇是针对上班族而言，自己是老板则何来升迁，除了公务员须具备公家格之外，其他情形即使是民营机构之上班族，亦可比照使用，升迁对上班族而言，是一件大事，尤其是以终身都投入公门中的公务员，对他来说这是他一生的职业，无法轻易的跳槽或说不干就不干，因此职位的高低、好坏，会直接影响他收入、心境、理想及生活的稳定，而不得不重视，只是每逢有异动之时，大家是人人有希望，个个没把握，心里是七上八下的猜测不知花落谁家？


    升迁在公门中以年资作为考量的成份大于私人机构，公务员只要勤劳、本份，不犯大错，年年总是会小跨一步的，日子一久，总有点小成果的，所谓：「多年的尼姑熬成佛、多年的媳妇熬成婆」，即使职位不甚理想，薪饷逐年的累进也是蛮可观的，虽谈不上是金饭碗，至少也是个稳定的铁饭碗了，但是在私人机构里，可就要凭本事来夺标，就像舞狮者使出了混身的解数，才能领先群狮，而登梯采青一般的竞争。


    一般而言，在命格上以紫微、天府、武曲、天相、破军化权以及官禄宫有权禄者，其升迁速度要比别人快，并且具有主管之格，而天梁坐命者可为主座掌权者，所谓：为人不当头，为木不当轴，做主管对他而言反而累。论升迁在看过了当事人的命格，先确定此人最高能升到什么阶层之后，再依次看大限以及流年的好坏，以确定有无升迁之希望，最后再分析升迁的性质是升职、加薪、迁调或降职，一下就升迁的几种要领分别叙述于后：


    ### （一）首先其大限走势须强劲，官禄宫亦旺，在此限内方有突破。


    ### （二）再看当年的流年之科禄权入何宫位，且必须要入小限之三方四正才有效，但不可犯二个空亡星，否则就是瞎子点灯——白搭。


    ### （三）分析流年是否走官禄宫或迁移宫而予以引动，若小限走官禄宫而逢科禄权，或是流年斗君宫位有灾厄，和流年科禄权相会者，但无天马或来引动迁移宫者，为只在原机关升官而不是调迁。


    ### （四）看本生年禄马、贵人，以及流年天马、天魁、天钺和本生年魁钺有否会合，若斗君及小限宫也相会者必定升迁。


    ### （五）除了本生年科禄权之外，另有流禄、流魁、流钺等吉星必须相会合才行。如有大限化禄会合更好，但这些吉星皆不可值二个空亡星才有力量。


    ### （六）调迁。未逢权禄，则表示只是调动单位而不是升官。


    #### （七）小限及其官禄中的流年四化引动，及煞星可显示其升降的动静，例如小限官禄逢煞冲，或禄、权转忌表示当年之职位明升暗降（职称虽好听，但属于打入冷宫坐冷板凳的情形）。


    #### （八）若小限、官禄逢忌转禄权则为明降而暗升（例如：占缺或职位抢手，晋升机会多或是为油水多的肥缺）。


    ## 论残与障


    残障分为残以及障，残多属于肢体上的缺陷，障多为智能或中枢神经系统方面的瑕疵，而不论残或障其原因有先天性与后天性的，在程度上有分轻度与重度的，而不能一律将其视为社会的负担，有人说他们是上天派下来考验人心的小天使，上天交给他们测试人类服务心与爱心的任务，而他们则提供了让人们发挥爱心广积阴德，增加福报的机会，至于轻度残障能自立者，则是提供给我们应惜福的讯息，以及突破困境的表率楷模。


    所谓天生我材必有用，况且亦有不少肢体残障者的成就远超过于正常人的情形，足以令一些身心健全却不求长进者为之汗颜，例如：大音乐家贝多芬在失聪的情形之下，却谱出了旷世奇作「命运交响曲」，集盲聋于一身的海伦凯勒却成为知名的演说家，台湾的杰出青年郑丰喜，以及一生得依靠轮椅的作家杏林子都是残而不废的典范。


    ### 一、智能方面的残障


    先天性的一些有关这方面的疾病，有智障、蒙古症、水脑症后天人为因素所造成的，如植物人及外伤所造成的脑部损害，以上所举的病徵都会导致智力受损，或成为白痴，而这种情形多半与昌曲二宿化忌有关，因为昌曲二宿，于人体除了主视力之外，也分别主中枢与自律神经系统，一宿若逢化忌则易影响人的记忆力、判断力、视力与理智性，会造成先天性的智能障碍者，多半必须命格具备以下情形：


    1. 命坐昌曲，疾厄宫十逢己辛又化忌回命宫者。

    2. 命坐天机，疾厄宫十为戊又化忌回命宫者。

    3. 本命疾厄坐昌曲且自化忌或化忌回命宫者。

    4. 具以上情形者，再逢福德宫旺过头者，如坐天同化禄或权禄同宫者，智障可能性更大，且药石罔顾。若单纯只是命坐昌曲化忌或天机化忌入命疾线者不能以此同论，甚至单纯只是天机化忌坐命者，反而更聪明且鬼点子奇多，比別人更要机智。至于后天因某种原因，或发烧过度，或意外创伤所造成的智力受损，或承重大刺激，而造成精神失常，乃是行限遇以上所列之情则该年即须注意此类事情的發生，如果大限并不具备以上之形成要件，则小限走到时最多只是不利读书，或因某事烦躁而抓狂一下而已，单忌尚无碍，双忌则须注意其为何宫之事，但只要大限不具备就不致造成智力受损之严重情况。


    ### 二、肢体方面的残障


    一般先天性所造成的肢体残缺情况，有先天畸型、或缺损、原因不外乎是遗传基因，或孕妇用药不当，或某些因母体之恶疾感染而造成的，这种情形多半是要在命格上具备，疾厄宫相当差的状况之下才会发生，例如：空劫夹疾厄、四煞夹疾厄、煞带忌冲照疾厄……等，其发生之部位则须先参考其命宫，疾厄宫之星性，化忌星之性质，及所欠的宫位，所上部位，或四煞会集或所夹的部位，以及疾厄宫干化忌位所落部位，来加以参考分析，例如：疾厄宫落天机化忌于已申位又逢煞夹，则因肝脏部位并非在已申二宫，且天机亦土上肢，故而大大的提高了其上肢发生问题的机率。


    至于后天性的因素，有以时代背景作为考量的，例如在昔日因小儿麻痹症的风行，以及预防疫苗不够普遍，无形中增加了许多下肢残障的机会，此种情形须瞭解该症，于发病之初会有发烧之症状，且多发生于童限，因此对于廉贞坐命会天刑者须多加留意，另一种为行运不佳所造成的，此种多半是遭逢意外的伤害，而形成断肢或瘫痪，例如大限逢巨门加煞或廉贪加热，入于大限疾厄，再逢小限或太岁行至该宫，且逢煞忌加以引动，即有发生之可能，受伤的部位亦是以前段所述之要领来分析查寻，并且大限命疾内所逢之煞，若为擎羊则有断肢的可能，陀罗则是伤筋挫骨不致见血光，值得注意的是大限疾厄逢辰戌位的昌曲化忌，须防小限再行至该宫又遇双忌之时，恐有脊椎神经病变或伤害，重则易导致下半身瘫痪，其他的如听觉、视觉……等伤残则须考其疾厄宫星性及宫位问题交叉研判即可明了。


    ## 太岁何辜


    ### 太岁何辜


    「太岁」只是个名称，「安太岁」也是一项宗教和民俗活动而已，无关乎吉凶祸福，有些人用「太岁当头座，无灾也有祸」的词句加诸在太岁身上，实在很不当也很冤枉哩！而这句话在民间流传甚广，影响力深植民心，一般人听到后，心里总觉得毛毛的，误以为「太岁」是个凶神恶煞，碰到它恐怕会倒大楣或衰运连连。其实那只是传说罢了，大家不明究理地以讹传讹的，愈传愈恐怖、愈传愈神秘！其实「太岁」只不过是个「名称」而已，根本没啥好紧张或害怕的。


    去年底有位李姓演员，吃完了朋友的尾牙宴后，酒醉驾车闯了祸，被交通警察带到分局接受酒测，酒精浓度高达「一三毫克」，已经明显的「酒醉」驾车了，而「喝酒不开车、开车不喝酒」这句话是人尽皆知的行为准则，这位老兄不但不认错，还在分局裡大呼小叫的说：「我今年犯太岁实在有够倒楣，为什么这么快，一过年就『冲』到了！」。自己做错了事不思检讨，还把罪过推到太岁头上来也实在太扯了，太岁又何其无辜？


    ### 太岁的由来


    要说「太岁」这个名称的由来，得追溯到古时的宋朝年代，由宗教和命理、占卜相结合所引申出来的一个名词。凡是占卜、八字、斗数等五术皆以「太岁」这个名称作为流年的代名词。至于宗教庙宇（尤其是道教）是用十二生肖搭配五行而组成六十甲子为年干支的循环，将太岁的名称与十二生肖（地支）作为流年的代名词，例如今年流年干支为甲申生肖属猴，因此凡是生肖属猴的人，今年皆是太岁年。


    太岁是何方神煞？


    所以「太岁」既不是神也不是煞，只不过是一个名称而已，如何能引来祸福呢？根据道教的记载，太岁是由六十甲子裡每一年由一位「太岁星君」轮值当班（类似军中的值星班长，如文末附表一）负责集合、分配当年的天兵、神将供神佛差遣，其本身并无法力或神格可言，更无权决定人类的吉凶祸福。传言中的「太岁当头坐，无灾也有祸」这句话，其实是庙宇在警示民众：流年的煞方不宜动土或安神位；例如甲申年煞方在南方，凡坐南向北的土地不宜动土，非动土不可的话，就得摆上神案供上三牲素果祭拜一下，也就是拜个码头，先行通报一声，打个招呼以示尊重。今年若是坐南朝北的房子也不宜入厝安神位，万一刚好买到这个方位的房子，一般也是以「浮炉」的方式作为权宜措施。所以说「无灾也有祸」那也未免太言重了。


    ### 安太岁的由来


    以前的农业社会裡，民众的知识比较封闭，宗教的影响力相当大，敬天地而畏鬼神，各地方庙宇即是民间的信仰中心，庙方扶乩转告仙佛的指示，民众即奉为准则，哪敢不从？庙宇愈大其影响力也愈大。


    也不知从哪个年代或从哪个庙宇开始，庙宇扶乩指示信众——凡属太岁年出生的生肖，必须在家安奉轮值的「太岁星君」即可保家安康，大家立即遵照办理。因此，凡是有太岁年生肖的家庭，都会在客厅的一隅设立神案来供奉「太岁星君」，早晚上香来祈求家中平安（因太岁非神非煞，因此资格不足以供奉在正式神案上，不相信的话，您可到各大庙宇瞧一瞧便知道）。


    ### 安太岁的演化


    所以，「安太岁」是一项宗教活动也是民间习俗，一代接一代的承传下来。当社会潮流的巨轮由农业社会推向工业时代后，以往的四代同堂大家庭已不复见了，改以树大分枝的小家庭取而代之，农业社会的大型四合院也转型成高楼公寓，公寓式的房子已没有多余的空间可以容纳「太岁星君」的神案了。庙方因此灵机一动，接下这件『粗重』的工作，在庙宇的偏殿设立了大型的「太岁星君」牌位，由庙方统一替信众安太岁和送太岁，将每位需要安太岁的信众，写上名字之后逐条贴在两侧，由信众随意捐献香油钱，往后每年农历十二月二十四日送神后到元宵节前，是每年安太岁活动的高峰期。


    「安太岁」的活动，起初是庙方因时代的改变而给信众方便，由信众随意捐献香油钱而已，后来安太岁的人愈来愈多，庙方干脆明订价格由二百元至壹仟元不等，也逐步成为庙宇的主要收入来源之一。此后庙方认为「安太岁」是一项固定的收入，和点『光明灯』一样，列为过年期间的重要活动。


    再之后又不知从何地或何处庙宇开始，又出现了新的庙方公告：


    「太岁年生的生肖是『犯太岁』，固然要安太岁以保平安，但其对冲的生肖（若今年是猴年，其对冲的生肖则是属虎）是冲太岁，冲比犯更严重，更应该安太岁才能保平安」，所以需要安太岁的人一下子增加了一倍！往后更有：「除了犯太岁和冲太岁的人之外，又多了两个偏冲的生肖也要安太岁才能保平安（按今年偏冲的是属龙和属猪两个生肖）。


    换句话说，十二个生肖裡，每年就有 1/3 的人都需要安太岁，也造成大型庙宇在每逢春节期间就大排长龙（香火兴旺的庙宇更要提早去拿号码牌），数以万计的信众排队等著安太岁的有趣现象。现在更先进的是，干脆在网络上设个「太岁宫」，让您直接点阅来安太岁，每人每次五百元，以趁机海捞一笔，这种景象不但离谱，简直是太扯了吧！


    而除了安太岁和点光明灯之外，还有多项需要「祭改」之事也列为太岁活动项目内容，例如今年属鼠的人犯白虎、逢属牛的犯官符、属兔的犯死符、属蛇的犯亡神、属马的犯丧门、属羊的犯桃花、属鸡的犯病符、属狗的犯天狗……等；十二生肖裡几乎个个无一幸免，变成每个人都要安太岁或是祭收一番，要不也点个光明灯来让您的流年运势加持一下也行，反正这是一年一度的宗教活动，信不信由您。


    因此，春节期间是各大庙宇最热闹、最忙碌的时候，一些大型庙宇的年度开支差不多这个时候就凑足了！不管是安太岁、点光明灯或各种祭改，这是宗教信仰和民间习俗，大家多抱著宁可信其有的态度来参与，反正花个小钱求个平安、买个心安，又能让所信仰的庙宇香火兴盛，可谓一举两得，因此大家乐于为之。其实，欲安岁消灾，还不如把家里的「太座」安好，恐怕还比较实际些哩！


    > 所以，「太岁」只是个名称，「安太岁」则是一项宗教和民俗活动，根本无关乎个人吉凶祸福，若是连酒后驾车肇事都要怪罪到太岁头上，那可真是冤枉啊，大人！


