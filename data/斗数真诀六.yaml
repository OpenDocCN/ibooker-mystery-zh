    ## 第 13 章 生態


    ### 主角從缺


    平心而論，慧貞是親友眼中的乖乖女，身材雖還稱不上高挑，卻均勻惹火，外貌姿色雖也還稱不上有沈魚落雁之姿，不過五官姣好，面容端正，清秀靦腆有著小家碧玉的氣質，加上身材屬於嬌小玲瓏有致，平時素雅的打扮，給人的印象是「清秀佳人」的典型。而且擁有美國哈佛碩士的傲人學歷，目前任職某外商公司，有穩定的工作和高收入，不論內外在條件都是一流的。


    偏偏，混到現在年紀已經一大把了，都快邁入四十關卡了，仍然沒有結婚建立家庭的打算，急煞了家中二老和周遭的親友，三不五時就語帶威脅的說：眼光不要那麼高，再這樣挑肥揀瘦的當心挑到「賣龍眼」的，難道要我們這輩子都抱不到外孫嗎？


    其實，慧貞並不是沒有男朋友，只是她的觀念與老一輩的有些代溝，慧貞說她喜歡和男朋友在一起相處的時光，喜歡兩個人輕鬆的交往，不喜歡每天膩在一起，不要有負擔、有壓力，不想去處理兩個家庭結合在一起所產生出來的問題。愛他卻不想去理會他家的事。


    現在慧貞和男朋友，星期一到星期五各自在不同的領域裡上班，週休二日時她們就處在一起，享受戀愛的甜蜜卻沒有傳統婚姻的牽絆。無拘無束逍遙得很耶。


    像慧貞的例子，在多元開放的現今社會，結婚、不結婚，只是生活方式的選擇而已。最重要的是，不管你是選擇前者還是後者，你是否已做好準備？每一個人都有權選擇最適合自己的生活方式，只要你對自己選擇和行為負責，任誰也管不了你。


    從占星學的角度探討，命格上「主角從缺」的人，我們稱為「單」。'
