    # ## 論殘與障


    殘障分為殘以及障，殘多屬於肢體上的缺陷，障多為智能或中樞神經系統方面的瑕疵，而不論殘或障其原因有先天性與後天性的，在程度上有分輕度與重度的，而不能一律將其視為社會的負擔，有人說他們是上天派下來考驗人心的小天使，上天交給他們測試人類服務心與愛心的任務，而他們則提供了讓人們發揮愛心廣積陰德，增加福報的機會，至於輕度殘障能自立者，則是提供給我們應惜福的訊息，以及突破困境的表率楷模。


    所謂天生我材必有用，況且亦有不少肢體殘障者的成就遠超過於正常人的情形，足以令一些身心健全卻不求長進者爲之汗顏，例如：大音樂家貝多芬在失聰的情形之下，卻譜出了曠世奇作「命運交響曲」，集盲聾於一身的海倫凱勒卻成爲知名的演說家，台灣的傑出青


