  md: '# # 直傳下去！


    將「現代斗數真訣」、「紫微斗數命例三百」全套付梓發行，把這

    份學問和三十年實際經驗傳承下去，是我此生最大的心願。雖然付出

    了六年的心血和五百多萬的經費，讓我無辜的變成一位負債者，但眼

    看著作品逐步的完成，內心實在充滿無限的安慰和喜悅，辛苦也值

    得。而為了走更長遠的路，回收製作成本是必需的，以及執行可更廣

    泛迅速的傳播命理的智慧管道——架設天乙上人網站，提高書價是不

    得不的抉擇。雖然學問本無價，只在乎內容是否值得、是否合乎您的

    需要，但因您的少許付出能支持作者，有機會將更多的經驗傳續下去

    和分享、幫助更多的人，福報肯定會與您相隨的。



