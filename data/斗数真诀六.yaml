    ## 再論疾厄


    天怕烏雲地怕荒、人怕疾病草怕霜，生、老、病、死雖是人生不變的定律，且生、老、死亦自有定數，而病可就未必非生不可，當然人吃五穀雜糧沒有不生病的道理，只不過是生多生少以及輕重的問題罷了。除了某些遺傳因素的疾病令人束手無策以外，大多可以藉由事前的保健來預防疾病，例如以改變不良的生活習慣或飲食偏好，來解除某一種病痛等，所謂三分吃藥、七分調理。


    談到疾病的預防方面，如果一個人對於他自己的體質並不瞭解，甚至對於疾病的常識毫無認知，例如身體某部份出現某種異狀，卻不知道是何種病變的徵兆，無形之中會因其人爲的疏忽，而坐失掌握醫療時效的先機，甚至延誤就醫而導致嚴重的後果，這未嘗不是一件令人深覺遺憾之事，俗云：「有病早治、省錢省事，小病不治、大病難醫，不怕年老、就怕病倒。」


    亦有許多人對於醫療保健常識有些許的認知偏差，即使知道身患何傷何疾，但其補救之道卻頗令人質疑，不是求醫方法不適當，就是迷信祖傳偏方，或自己按某些過去的傳統來瞎搞，例如：魚刺梗在喉嚨，便道聽塗說的喝醋、喝化骨水，而不去找耳鼻喉科醫生，如果如此能把魚骨都給化了，恐怕其消化道要先化在前。高血壓的人不按時吃降壓藥與忌口，卻猛喝芹菜汁，後來據研究報告指出芹菜中含鈉過高，血壓病變者不宜飲用。骨折者不依病況即隨意找個「拳頭師」七拉八扯的接，當然傳統接骨術亦有其獨到之處，好處是不必開刀，對於脫臼治療是既快又好，但骨折情況有多種，即使有幸得回春妙手接得奇準無比，但其骨折之處若有碎骨的話，恐怕還是得藉西醫手術搞定不可。


    紫微斗數中的疾厄宮，能專門針對個人的體質，作一番徹底的體檢，既省錢又明確，而且不須受皮肉之苦，甚至可以知道當事者何時苦於何症，何時有病發之兆，聽起來很玄，但其理論與中醫頗爲接近，對於熟悉五行的人而言，就不會覺得有何奇怪之處了。


    中國的五術山、醫、命、卜、相無一不是以陰陽五行作爲理論的基礎，中醫並以望、聞、問、切、爲診病之要道，即目察五色、耳識五音、言審五病、指別五脈，依此之理來下處方，因此欲研究疾厄宮除了對五行要有所瞭解之外，還要能加以靈活的運用，才能明確的分析病況，五行的學說，在中國的文化中很早就有，但最早見於文字是在尚書的洪範篇（洪範意爲偉大的定律），對於五行我們不可將觀念停留在木材、火焰、泥土、金屬、液體等唯物觀裡，在我們天人一體、心物一元的哲學思想中，五行所代表的並非只限於可見的物質而已，例如：五色、五味、五音、五氣、五官、五臟……等。


    斗數中各星、各宿、各宮、各具陰陽五行，故在論病之時須加以通盤考量，方不致產生偏頗而有失準確，除了要看疾厄宮內星宿五行，尚須考其星性所主之疾，與宮位之陰陽五行生剋旺弱，以及該宮所代表的部位，與宮干四化所入之處，而且行運之中體質會不斷改變，自然病況隨之更動，本命疾厄代表先天體質，大疾厄代表目前健康狀況，小限或流年走到或加以引動則是病發之年，疾病種類必須參考本命及大限疾厄以及四化示意之處，病情輕重則須評估大限疾厄之旺弱吉凶，尋醫之處則限用大疾厄宮之宮干化科星所落之方位，並以自宅作為方位定點來尋找。（參考第二集疾厄篇）


    如此一來，不但可以知道自己先天的體質，目前的狀況，甚至在未來的體質轉變，及易患何疾都能洞察先機，這對於疾病預防的工作有莫大的幫助，只要防範得當，屆時縱使不能全免，但至少會比沒有作防範時原本命盤中所顯示的狀況要輕得多，大體上說疾病依其成因分以下三種情況：


    ## 一、遺傳


    醫學上遺傳疾病種類頗多，例如：色盲、白化病、血友病、海洋性貧血、苯酮尿症、乳糖不耐症……等，有來自父母或來自隔代遺傳，此種情形自命盤中也不易看得出來，這種病症較無法加以治療改善，預防之道除了優生學以外也別無他法，其他某些如遺傳性的心臟病、高血壓、糖尿病等則可藉由醫藥的控制，飲食的控制，生活習慣的調理來加以控制，一般而言，會出現遺傳性疾病的命格，多半是以父母宮有化忌星且疾厄宮亦不佳的情形機率最大，因其忌星所欠的宮位爲疾厄宮，意即自己的身體零件有所欠缺，若外型無損反倒麻煩，其缺陷必有內部的某器官、基因或功能，且多是來自遺傳，不易治療之症，但未必會危及生命，至於疾病種類，亦是以疾厄宮星性、部位、四化來作爲研判的依據。


    ## 二、水土環境與生活飲食習性


    某些疾病有发生于某一地带的情形，在台湾西南部台南、嘉义沿海一带曾发生的「乌脚病」，与发生以中国男性为主的鼻咽癌，以及流行于西西里、希腊、地中海周围一带的遗传病：海洋性贫血又称地中海型贫血，在台湾海洋性贫血的带因者约估人口的三十分之一，且以客籍同胞发生的比例较一般人高。还有生活在高压电设施周围的人，白血病（血癌）的发生率较其他人大，以及生活在空气不良的大都会区，其呼吸道病变较多……等。


    某些局部地区性的疾病，是因为饮用水、化学污染等因素造成的，这种情形有时只需异地而处即可改善，像气喘、呼吸道过敏、乌脚病以及高压电或辐射线所引起的病变等类，像鼻咽癌这种疾病，并非只是一个小地区甚致连海外华人都不能倖免，可见其病因就不只是单纯的水土環境之故，勢必與其民族性的生活飲食習性有關，並且難以命盤來判斷，此時若只有改變環境，可能效果亦不彰，假使像地中海型貧血這種，不但是大區域性並且還與遺傳基因有關，恐怕綜合以上兩者將居住環境、生活、飲食習慣全部改變，也未必管用。


    ## 三、飲食習慣與生活環境


    會吃千頓香、不會吃一頓傷，有許多疾病是因爲飲食習慣不良而發生的，如暴飲暴食、不定時用餐、吃太好、偏食、食品衛生的疏忽：等，尤其中國人又是一個重吃的民族，凡事都要吃，無論是年節、婚喪喜慶、喬遷、彌月、開會，都少不了要吃他一頓，而且中國人是什麼都吃，天上飛的不吃飛機、地上跑的不吃車子、水裡游的不吃輪船、兩條腿的不吃梯子、四條腿的不吃椅子、會叫的不吃喇叭、帶刺的不吃梳子，不但吃還要補，做月子要補、病癒要補、「轉骨」要朝一夕之事。


    補、冬令還要補，這種吃法能不吃出病來嗎？常這道：「少吃多滋味、多吃活受罪」，節食祛病、寡欲延年。近來連營養專家也都主張粗茶淡飯、有益健康，並且呼籲少吃精緻的加工食品，提倡食品應回歸自然，且注意農葯殘留問題。


    至於有病的人，在飲食方面可就更要注意了，而且還要適當的忌口，例如：心臟血管病變者少吃高膽固醇類的，糖尿病者注意醣類的攝取，腎臟病者少吃鹹及高蛋白食品……等。在疾病的預防方面，則可配合紫微斗數所作的體檢來加以事先預防，以發揮其最大的功能，祈使其傷害減至最低程度，好比具有高血壓命格者，須在年少時即養成飲食清淡的習慣，具有肝疾命格者則須遠離煙酒以及過度疲勞，寧叫嘴受窮、莫讓病纏身，因為欲改變體質以達預防疾病之效，絕非一朝一夕之事。


    還有一些疾病，是基於生活作息不正常所致，像是長期熬夜、日夜顛倒、缺乏運動等，所謂：「水停百日生蟲、人間百日生病，出勁長勁、歇著沒勁」。亦有長期處於緊張繁忙的工作，精神壓力過重，且又得不到適當的放鬆休閒，而導致精神方面的疾病。以上這些病症除就診了解病情之外，還必須將生活作息正常化，以及好好的規劃一下精神生活，病情自然就會好轉很多，而關於這方面的病因探查，則須視其命格、習性，以及行運概況加以分析，便不難得知。


    ## 論曆法與閏月


    在紫微斗數與子平八字，對於閏月生人的月份認定方面的劃分標準是有所不同的，各家各派對此更是衆說紛云莫衷一是，然而歐美人士採用公元曆法又無閏月可言，難道他們都無法以紫微來論命嗎？於是


    在談到這些問題之前，我們不得不先對曆法以及閏月等問題來先作一番了解，首先就各國所通行使用的曆法先來作一個比較：


    ### 曆法：


    為推算年、月、日的時間長度及其關係，並制定時間序列的法則，並確定年首、月首、與節氣、大體上分爲陽曆、陰曆及陰陽曆三類。


    #### 陽曆：


    最早埃及人發明了陽曆，後世所用即據此加以改進，是依據地球繞行太陽的運動來作標準，所以全稱「太陽曆」。由於地球繞太陽一周的實際時間為三百六十五口又五小時四十六分四十六秒，與地球自轉時間並不如齒輪數那樣的吻合，而仍有誤差，因而須累積四年置一閏年，將多出來的一日置於二月的最後一天，年的月數與月的日數人為規定，因而有各種陽曆數型：


    ##### （一）儒略曆：


    此種陽曆為公元前四十六年由羅馬帝國的儒略凱撒大帝所創又稱羅馬曆，公元前八年由其侄奧古斯都作了調整，一年分爲十二個月一、三、五、七、八、十、十二爲大月三十一日，四、六、九、十一爲小月三十日，二月逢閏年爲二十九日，平年二十八日，公元數被四整除者爲閏年，年平均長爲三百六十五點二五日。


    ##### （二）公曆：


    又稱格列高利曆或西曆，爲目前世界上通用的曆法，屬於一種陽曆，由羅馬教皇格列高利十三世於一五八二年頒布，消除了從儒略曆實施到十六世紀後期，儒略曆年長度和實際回歸年長度的累積差值，使春分點又恢復到三月二十一日，並爲減少今後的誤差又規定公元年數被四整除，而世紀數被四百整除時爲閏年，平年三百六十五日，閏年三百六十六日，每四百年有九十七個閏年，平均年長度爲三百六十五點二四二五日。


    ##### （三）陰曆：


    公元：又稱公歷紀元或基督紀元，爲現代大多數國家採用的紀年法，是以耶蘇基督誕生的那一年爲公元元年。


    陰曆：早在西亞文化時代的歐美人士即發明了陰曆，是根據月球環繞地球的標準來制定的，全稱「太陰曆」。如希臘曆以及普遍通行於回教民族間的伊斯蘭教曆，所以亦有人稱之為回曆，但有別於中國俗稱陰曆的夏曆，陰曆全年亦分爲十二個月，單月三十日雙月二十九日，一年共有三百五十四日，由於月亮繞行地球一周約需二十九日又十二小時四十四分二點八秒，與地球之自轉仍有差數，故仍需置閏年，其設閏法是以三十年爲一周期，期中以第二、五、七、十、十三、十六、十八、二十一、二十四、二十六、二十九年等十一個年設閏，每逢閏年的最後一個月多一日，以求與地球自轉吻合，雖然如此但平均每年仍只有三百五十四天又八小時四十八分，與太陽曆法毫無關聯，且差距甚大，幾乎每三十五年多就會相差一年之多，因此陰曆的元旦也許會在陽曆的五月或十一月於是和季節寒暑、就更配合不起來。


    #### 陰陽曆：


    兼有陽曆和陰曆的性質，月的長度平均約爲一個期望月，年的長度平均約爲一個回歸年，此類例如黃曆、藏曆等，比陰曆、陽曆優越，但小年和閏年的日數相差太大，除太平天國所頒布的天曆外，中國在辛亥革命前的曆法都屬於陰陽曆，雖然民國以來亦使用國曆（陽曆）但民間依舊慣於使用黃曆。


    黃曆是由黃帝完成創制的，亦是最早的曆法，是依據地球繞太陽以及月球繞地球兩者合計而制的曆法，所以屬於陰陽合計的曆法爲最完备的曆法，夏朝並於寅月爲每年第一個月，謂之建寅，故亦稱夏曆，因夏曆之數得天正，即合於天道，地球繞月，四季之正，利於農事故又稱農民曆，周曆以子月爲第一月，商曆以丑月爲第一月，而我國現在仍以寅月爲第一月，但不論是建寅，建子或建丑，基本上都是黃帝所創之黃曆，若只稱陰曆或農民曆都不是最正確的。


    #### 閏月：


    由於日、月、地球之自轉與公轉時間，並不能適如其分的成一整數，其相互之間會發生誤差，於是就分大月為三十日小月二十九日，全年共三百五十四日，與地球繞太陽一周的實際時間相差十一日餘，累積三年共差三十三日餘，便置一個閏年與陽曆不同之處爲閏年則多一個閏月，這一年就有十三個月，又再過二年，又多設一個閏月，如此算來，每十九年就有七個閏月，故有「三年一閏好壞照輪」之諺。


    中國人的曆法，閏月是用來調整農曆日期，使之與寒暑節氣相配合，所以閏月較常出現年中時數，最多的是閏五月卻沒有閏一月、閏十一月或閏十二月，節氣爲我國曆法所獨有的，是以易經十二辟卦的原理（一歲十二月六六陽之象圖），由五日一候、三候一氣、六候一節而定出一年之二十四節氣，自立春、雨水……大寒，其中立春爲節、雨水爲氣，氣又名中氣其餘類推，而閏月則有節無中氣。


    二十四節氣，是依據地球繞行太陽的躔度計算而確定時日，因此其日期是固定在阳曆上，如春分多在阳曆三月二十一日、冬至多在阳曆十二月二十二日，与地球沿黄道绕日运行的轨迹完全相合，但须注意南北半球则恰好相反，因此黄曆包含了日、月、地球乃至各行星的运行，为最完整的曆法，而阳曆之月份与月之运行毫无关联，而忽略了其对潮汐之直接影响，以及对生态之间接影响，而阴曆未顾及绕日公转所产生的季节寒暑，以及年的长度与实际误差过大，两者都是偏颇的，而黄曆与人类的生活及生存息息相关，除计算时间之外，对衣食起居、农林、渔、牧等的关系极为密切，因而得以运用数千年而无误。


    至于閏月生人之月份，因无干支可用，于是子平八字即是以节气来区分月令，凡是本月节后生人者，即以本月干支为主来计算，若于节之前生人则以上月之干支计算之，如此便都有干支可用。而在紫微斗数方面，并不以日期固定在阳曆上的节气来划分换算，而是将閏月生人一併移作下月論，即閏五月生人以六月生人排盤，閏七月生人以八月生人排盤，論流月時，則將閏月均分前後之月各得四十五天論之。


    ## 再論田宅


    ### （一）


    #### 1. 田宅宮在斗數之中代表（一）住家及附近的環境（二）一個人的財庫（三）影響子女好壞的宮位（四）宅運的吉凶與異動（五）祖產的旺衰（六）未來的風水位：等，這些部份已在第二集論固定宮位時即已詳述，此處不再重複。本篇就置產與異動方面的看法，作一深入淺出的探討，而有關其他一些較為瑣碎，或未曾提過的重點，則併入田宅細評一項予以說明之。


    #### 2. **一、置產**


    ##### （1）置產是人生當中不算小的一件事，因而必須由大限的情況來看。凡是大限之祿忌入大限子田線，入本命子田線，亦或是大限子田線入本'
  mdcn: '## 第 15 章 人生百態


    觸犯的是非來做爲推測依據，例如：廉貞坐命者大限走武破、武殺加煞忌，小限再走到，或入財宮、遷移則有因財持刀財務糾紛等官司，或是武破、武殺坐，或人財而大限走廉貞，逢大小限重疊或小限、太歲走武破、武殺等處，又逢煞忌等星，則同屬爲財而引發的官司，再以重疊宮位，或四化引動的官位，或斗君、流年所行之處來分析，是與官祿宫（工作上），或僕役宫或其他宫位有關，即可知道是非官訟由來之處，總而言之，對一張命盤當事者的背景瞭解得愈多，自然所以料之事八九不離十，其他的注意事項尚有：


