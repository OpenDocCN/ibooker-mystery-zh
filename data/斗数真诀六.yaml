    (四) 會官符引動夫妻宮，而夫妻宮逢破，則屬離婚官司。


    (五) 同巨、機巨加陀羅入命宮，官祿位或大限入命遷、或父疾所引發的官司多半與毒品有關。


    (六) 雙官符會合，行小限逢煞，三方四正照會必有官司。


