    18. **點心桃花**：行限夫妻宮有化祿，對宮或暗合位有桃花星引誘主偷來暗去，無特定對象，行為如蜻蜓點水一樣、如蝴蝶採花一般。而東窗事發，有人要來捉猴子了。

    19. **貞婚桃花**：天姚與紅鸞同宮坐命身位，或天同加天姚或紅鸞者易犯重婚。

    20. **人際桃花**：命坐紅鸞星三方昌曲照會、遷移宮有祿存或化祿者，或女命太陽旺地坐命者，其性長袖善舞，喜周旋於異性圈裡謀取利益。

