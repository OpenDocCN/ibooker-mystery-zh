    # # 太歲何辜


    # ## 太歲何辜


    「太歲」只是個名稱，「安太歲」也只是一項宗教和民俗活動而已，無關乎吉凶禍福，有些人用「太歲當頭座，無災也有禍」的詞句加諸在太歲身上，實在很不當也很冤枉哩！而這句話在民間流傳甚廣，影響力深植民心，一般人聽到後，心裡總覺得毛毛的，誤以為「太歲」是個凶神惡煞，碰到它恐怕會倒大楣或衰運連連。其實那只是傳說罷了，大家不明究理地以訛傳訛的，愈傳愈恐怖、愈傳愈神秘！其實「太歲」只不過是個「名稱」而已，根本沒啥好緊張或害怕的。


    去年底有位李姓演員，吃完了朋友的尾牙宴後，酒醉駕車闖了禍，被交通警察帶到分局接受酒測，酒精濃度高達「一三毫克」，已經明顯的「酒醉」駕車了，而「喝酒不開車、開車不喝酒」這句話是


    273'
  - '[PAGE 274]


    人盡皆知的行為準則，這位老兄不但不認錯，還在分局裡大呼小叫的說：「我今年犯太歲實在有夠倒楣，為什麼這麼快，一過年就『沖』到了！」。自己做錯了事不思檢討，還把罪過推到太歲頭上來也實在太扯了，太歲又何其無辜？


    # # 太歲的由來


    要說「太歲」這個名稱的由來，得追溯到古時的宋朝年代，由宗教和命理、占卜相結合所引申出來的一個名詞。凡是占卜、八字、斗數等五術皆以「太歲」這個名稱作爲流年的代名詞。至於宗教廟宇（尤其是道教）是用十二生肖搭配五行而組成六十甲子爲年干支的循環，將太歲的名稱與十二生肖（地支）作爲流年的代名詞，例如今年流年干支爲甲申生肖屬猴，因此凡是生肖屬猴的人，今年皆是太歲年。'
  - '[PAGE 275]


    太歲是何方神煞？


    所以「太歲」既不是神也不是煞，只不過是一個名稱而已，如何能引來禍福呢？根據道教的記載，太歲是由六十甲子裡每一年由一位「太歲星君」輪值當班（類似軍中的值星班長，如文末附表一）負責集合、分配當年的天兵、神將供神佛差遣，其本身並無法力或神格可言，更無權決定人類的吉凶禍福。傳言中的「太歲當頭坐，無災也有禍」這句話，其實是廟宇在警示民衆：流年的煞方不宜動土或安神位；例如甲申年煞方在南方，凡坐南向北的土地不宜動土，非動土不可的話，就得擺上神案供上三牲素果祭拜一下，也就是拜個碼頭，先行通報一聲，打個招呼以示尊重。今年若是坐南朝北的房子也不宜入厝安神位，萬一剛好買到這個方位的房子，一般也是以「浮爐」的方式作為權宜措施。所以說「無災也有禍」那也未免太言重了。'
  - '[PAGE 276]


    # # 安太歲的由來


    以前的農業社會裡，民衆的知識比較封閉，宗教的影響力相當大，敬天地而畏鬼神，各地方廟宇即是民間的信仰中心，廟方扶乩轉告仙佛的指示，民衆即奉爲準則，哪敢不從？廟宇愈大其影響力也愈大。


    也不知從哪個年代或從哪個廟宇開始，廟宇扶乩指示信衆——凡屬太歲年出生的生肖，必須在家安奉輪值的「太歲星君」即可保家安康，大家立即遵照辦理。因此，凡是有太歲年生肖的家庭，都會在客廳的一隅設立神案來供奉「太歲星君」，早晚上香來祈求家中平安（因太歲非神非煞，因此資格不足以供奉在正式神案上，不相信的話，您可到各大廟宇瞧一瞧便知道）。


    # ## 安太歲的演化'
  - '[PAGE 277]


    **太歲何辜**


    所以，「安太歲」是一項宗教活動也是民間習俗，一代接一代的承傳下來。當社會潮流的巨輪由農業社會推向工業時代後，以往的四代同堂大家庭已不復見了，改以樹大分枝的小家庭取而代之，農業社會的大型四合院也轉型成高樓公寓，公寓式的房子已沒有多餘的空間可以容納「太歲星君」的神案了。廟方因此靈機一動，接下這件『粗重』的工作，在廟宇的偏殿設立了大型的「太歲星君」牌位，由廟方統一替信眾安太歲和送太歲，將每位需要安太歲的信衆，寫上名字之後逐條貼在兩側，由信衆隨意捐獻香油錢，往後每年農曆十二月二十四日送神後到元宵節前，是每年安太歲活動的高峰期。


    「安太歲」的活動，起初是廟方因時代的改變而給信衆方便，由信眾隨意捐獻香油錢而已，後來安太歲的人愈來愈多，廟方乾脆明訂價格由二百元至壹仟元不等，也逐步成爲廟宇的主要收入來源之一。此後廟方認爲「安太歲」是一項固定的收入，和點『光明燈』一樣，列'
  - '[PAGE 278]


    # 第15章 人生百態


    為過年期間的重要活動。


    再之後又不知從何地或何處廟宇開始，又出現了新的廟方公告：


    「太歲年生的生肖是『犯太歲』，固然要安太歲以保平安，但其對沖的生肖（若今年是猴年，其對沖的生肖則是屬虎）是沖太歲，沖比犯更嚴重，更應該安太歲才能保平安」，所以需要安太歲的人一下子增加了一倍！往後更有：「除了犯太歲和沖太歲的人之外，又多了兩個偏沖的生肖也要安太歲才能保平安（按今年偏沖的是屬龍和屬豬兩個生肖）。


    換句話說，十二個生肖裡，每年就有1/3的人都需要安太歲，也造成大型廟宇在每逢春節期間就大排長龍（香火興旺的廟宇更要提早去拿號碼牌），數以萬計的信眾排隊等著安太歲的有趣現象。現在更先進的是，乾脆在網路上設個「太歲宮」，讓您直接點閱來安太歲，每人每次五百元，以趁機海撈一筆，這種景象不但離譜，簡直是太扯'
