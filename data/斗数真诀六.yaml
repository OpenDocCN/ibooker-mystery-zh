    基本上站在命理的立場，並不鼓勵造命，除非產婦經醫師斷定不能自然生產，才不得不勉強接下這個重任。但須注意以下情形：


    (一) 須徵求對方意願，想要何種命格的子女？包括個性、嗜好、事業走向再據以選擇之。


    (二) 擇定之後再將該命格之優缺點，得失之處真實以告，以免日後被埋怨。


    (三) 造命之時必考慮對方之六親狀況，力求吻合，並要多瞭解對方的情況，本於善意，盡量運用專業技能，將逢破之宮位安排於對方已承受兌現之處，以免二次傷害。


    (四) 若無把握寧可不做，以免自誤誤人。


    ## 創業與改行


    俗云：「男怕入錯行、女怕嫁錯郎」，這足見古人對於行業選擇的慎重，並且以選定一行即賴以終身的情形居多，他們那種敬業的精神頗值得現代人效法，但其中有所不同的是男女的差別，過去的女人一旦嫁作馮婦則一生吃老公、穿老公、灶裡無柴燒老公。如今此種情形已屬少見，女人亦可在事業上佔有一席之地，因而行業的選擇對女人而言亦同等重要。


    天不出無用之人，地不長無根之草，行行出狀元、類類有高低，行船走馬三分命，幹某一行，首先就必須具有幹某一行的命格，先以命宮星宿爲主，再以官祿宮星宿爲輔來加以判斷，例如：當醫生的，必然他是要扮演別人的貴人，且須具有愛心、耐心及服務的熱心，因此以命格具有日、月、天相或廉貞會魁鉞者較適合，若爲外科醫生尚須帶有擎羊星或天刑才能下得了刀，七殺則是惡人無膽又怕見血，無論加什麼星都當不了外科醫生或護士，而從事美容、美髮業最多的，具統計爲日、月或貪狼的命格，因其具有長時間工作以及美化的性質。


    行業的「分類」在古時侯概以士、農、工、商等五種就搞定，以能謀個一官半職就是人人稱羨的高尚工作，商人則是殿後的，因爲在農業社會裡，家無恆產的人才會去做生意，況且生意人予人奸商耍詐的印象，一般人都認爲生意人只靠那張嘴耍嘴皮子，只會呼攏而已，沒什本事能拿上檯面，所以那個年代的人都認爲「萬般皆下品，唯有讀書高」。


    大約從民國六十年代起，一些八字命理學者把行業納入五行中，判別行業適性與否，例如屬木的行業包括家具、紡織成衣、文具等，屬土的行業包括房地產、建材、陶瓷、礦業等，屬金的行業包括金融、保險、證券、珠寶、交通等，屬火的行業包括電機、電子、燈飾、印刷、運輸等，屬水的行業包括餐飲、美容、化妝品、性產業等。只是現在看起來有點「不倫不類」。


    時至今日，各種商業活動頻繁，行業別早已不只三百六十行，而且各行中分工之精細亦令人嘆為觀止，不相信，您到大醫院的掛號檯旁一站，仔細看診療榜肯定您會傻眼，站在那兒猛抓頭皮，例如心臟部門就細分為心臟內科、心臟外科、心導管科、心血管科……。前一陣子我也差一點被客人考倒，他問：「老師您猜我是從事什麼行業的？」，我看他的命盤上此時大限的官祿位是天機星、天鉞加天馬坐守，我說：「應該是屬交通服務業」，他接著說：「老師您只說對一半，我的工作性質是跟郵局搶生意的民間郵局」，我也很不服氣的回敬他說：「郵局不就是屬交通部所管的嗎？你還要再拗嗎？」。


    以斗數的立場，要以區區幾個星座來面對那麼多又分工精細的行業，是一項不可能的任務，須要非常靈活的運用和豐富的經驗才會有個譜出來，千萬不可鎖定某一個星座即代表某一個行業，否則您一定會「相公」。例如太陽星雖主化工，但在寅、申位多數從事與貿易有關，在卯、酉位則是半公家格，在辰位是從事人際關係的業務工作，在己、午位則多半跟傳播媒體有關，在丑、未則跟投機性有關的工作，在戌、亥、子位多是從事見不得光的工作。


    現在的職業選擇，應先考量個人的性向、專業分類及時代的潮流等因素，現代人在學校主修的科目，出了社會後「學無所用」的比例相當高，而且一生中改變好幾種行業的人也很多，堅持一種行業終老的簡直是「稀有動物」了。在斗數的星盤上，官祿宮只代表事業線的順逆和強弱而已。行業的選擇應以行運大限，官祿宮的星座特性作爲參考的主軸，以大限的四化趨向去分析，才能更符合、更接近事實。


    ### 一、創業


    中國人的特性向來是寧爲雞首不爲馬尾，每個人都想當老闆不願屈就當伙計，因此中小企業佔百分之九十五以上，那天路旁的招牌掉下來準會鋤死好幾個老闆。當老闆真的那麼好嗎？答案是：天曉得，只有當過的人才知道箇中滋味。


    如果您沒當過老闆，很想要個董事長的頭銜來臭屁一下，我也不反對。不過，得先惦惦您的斤兩是否稱得上。


    一、您要創業所需的資金是否足夠？如果創業資金是借來的或自有資金不足五十%，那表示未開業就要先負擔利息，奉勸您「不要玩比較不會變臉」。


    二、所要開創的行業，您是否夠內行、夠專業？隔行如隔山，不要看別人賺錢、生意好你就心動，外行人做內行事是很危險的一件代誌，除非您錢真的很多，足以花錢買經驗。


    三、人際關係是否已成熟，現代人做生意，人際關係是成功與否的最大要素之一，人面不夠的化，創業是一件吃力又使不上力的沈重任務，千萬不可以「沒關係，就找關係，找到關係，就沒有關係」。


    如果您符合上述三個要件，您才可以大膽的跳出來計劃創業當老闆，也不有這需要看下一段。


    先確立當事者命格所屬之行業性質，再分析其層次，因爲若以同樣屬於帶刀的行業而言，有的可貴爲將軍或外科醫師，有的則是從事屠宰的行業，雖然都一樣是掌生殺，但命格之高低不同，故而層次亦有差別，命格、層次都確定之，再看大限，以分析當事者於何限開始嶄露頭角，具有老闆格者必在大限強勢，財宮都不錯時（廟旺或化吉），小限或太歲再走夫官線或天府星時（無煞忌沖或犯空亡），則有創業的舉動，尤其以大限走殺破狼時更明顯，創業後的好壞則是看隔年的運程，而上班族或公務，若行運如前述狀況，則工作上必有異動，情形可比照前章論公務員升遷之標準來論之。


    ### 二、改行


    大限強勢如前述狀況則有分，一、就同一行業但跳出來自己經營，二、離開先前之行業另創新局面之兆。若大限不佳財官逢破，或夫官線逢煞忌沖照，亦有改行跳槽之傾向，尤以夫官線逢雙忌之年尤明顯，以上班族而言官祿不佳，表示與上司不合或工作上無力勝任，若財宮不佳表示因不滿待遇而萌離職之念，以事業經營者來說，逢官祿不佳但財宮還不錯，表示尚有利潤，但所得與心血之付出不成比例，而不堪體力負荷或是非太多，而不願再經營下去了，反之官祿好但財逢破，表示生意雖好，但因成本或人事及各項費用過高，而無利可圖甚至虧本，因而想改行。


    無論經營者或上班族，若是改行還是上班，則較容易看，必須先考量其大限之運勢，若當年換工作之大官線都平稳，则以其命格为主、大限为辅，按前段行业之选择方法，来考虑做决定，若该大限结束之前的夫官线都不好，则想换工作就换，只要待遇合适就可以，不须对工作性质多作考虑，反正也是做不长久，鸭巢换鸡窝、换来换去差不多。


    若您并非跳槽而是要转行经营另一种行业，则须慎重，所谓隔行如隔山，倘若大限的大官不佳，最好还是当个上班族，暂时度小月，保存实力，易曰：「君子藏器於身、待时而动」，反正留得五湖明月在、不怕没处下金钩，若非得已非转行不可，必须保守经营，当小限或太岁走大限化忌位时，要特别注意当年在事业上必有一个坑谷或关卡，跳不过会死得很难看，最好先评估该限十年的起伏状态，并择一最有利之年付诸行动，而所转行业之性质，除依前述行业选择方法加以考虑之外，尚须加入本身条件，对此行的内行度，和目前在社会的**大環境下前景是否看好，以及資金回收速度與運勢的配合情況如何？作一個通盤的考量，所謂：「寧做一去百來的生意，不做一去不來的生意」。


    ## 毒與賭


    ### 一、毒蟲


    環境不佳多病毒、百足蛇蠍含劇毒，


    破口大罵嘴巴毒，殺人放火居心毒。


    老煙槍難斷煙毒、大醉俠難抗酒毒，


    蜂花蜂最怕梅毒、安公子愈安愈毒。


    失眠者易染藥毒、亂服成藥易中毒，


    嗜好中最忌吸毒、缺德莫過於販毒。


    販毒者尤其心毒、政府正全面掃毒，


    大家應齊心反毒、是否能以毒攻毒？


    談到毒就令我們想起掃毒英雄林則徐，繼而想起清朝時代的鴉片戰爭，中國半壁江山幾乎毀於一旦，在當時毒風大盛，於是上行下效，不僅耗損鉅資，腐蝕民心，使得國力漸弱，國無可用之兵無力攘外，甚至國內亂象四起，民不聊生幾近動搖國祚，可見此毒非同小可也。


    在您日常生活當中，是否曾見識過或聽過，有關於吸毒者的事例，那實在可以說是人生中的一大悲劇，毒品的種類衆多，從高價位的海洛英到較便宜的安非他命等，不論是要搖頭、搖手或是要搖臀種種一應俱全，然而不論何種毒品，一旦沾染則極易上癮而難以自拔，可怕的是，它可以摧毀一個人的雄心壯志，它可以埋沒一個人的才華，銷毀一個人的意志，折損一個人的尊嚴，吸跨三代累積的財富進而葬送了一生的大好前途，幸福家庭、事業、甚至寶貴的生命。


    相信您也曾在媒體上看到過，吸毒者在毒發之時的那種痛苦，可說是幾近瘋狂，消瘦的臉龐，扭曲的表情中，含著一雙茫然無助的眼神，夾帶著幾許絕望的感傷，好比一首歌曲中的詞：某年某月的某一天，就像一張破碎的臉……只要是人，見到此情此景能不爲他惋惜而感慨良多嗎？能不因此而有所警惕嗎？更何況看在他親人的眼裡，又何嘗不是一種錐心刺骨之痛，怎敢想像，販毒者有著怎麼樣的一副鐵石心腸，能夠爲了錢，置他人生死於度外。


    此處所謂毒品，除了麻醉毒品之外，長期的服用安眠藥而造成依賴性的，以及長期酗酒而造成的酒精中毒也算，然而會接觸毒品機率較大者，首先必須看當事者之命格是否具備，一般在斗數上來說，毒品必與巨暗有關；尤其以得不到旺地太陽來驅暗的更明顯，於是在命格上而言，命、疾坐子午卯酉位機巨與辰戌丑未同巨者屬之，且命宮星宿陷弱無力者，意志力不堅、主觀性不夠、更容易受影響，命宮星宿廟旺或強勢星宿坐命者，如殺、破、狼者，除非其命盤星宿組合不良或行運不佳者以外，其陷入毒品成癮者少之又少。


    除了命格具備以外，另一種情形是雖非同巨或機巨坐命者，但其命盤架構中，屬於有同巨或機巨的組合，並在青壯年期大限走到，或入大限疾厄，並有大限四化予以入宮引動，即須特別注意。尤其再逢小限行至即有接觸毒品的機會，但是如果其命格強勢，思想正派，生活環境單純，或定力夠者，則未必會到受誘惑，命宮星宿柔性或陷弱者，逢此情形就須特別留意了。一旦染上了麻醉性毒品，則往後的行運就算再好再旺也足白搭，除非強行勒戒，否則是水肥車排歸排拖屎連。


    ### 二、賭徒


    有錢不賭、對不起父母，賭光輸光、為國家爭光。


    種米養百種人，命格不同則個性不同，其嗜好也不同，有人好吃有人貪杯，有人好色，有人貪財，有人好賭，亦有人數者兼備，集十八般武藝於一身。賭是人的天性之一，中國人更是賭性堅強而聞名於世，賭能力、賭酒力、賭腕力、賭氣、賭錢、賭命若是真要賭，則什麼都能賭。甚至常聽人家說：我敢打賭某人一定如何、如何。只不過較能引人人勝的是賭錢，而常常愛賭錢的人被稱爲賭徒，而賭徒當中又分爲好幾級。


    (一) 嗜賭如命贏了乘勝追擊，輸了就想繼續翻本，無視於週遭的陷阱，兩眼不觀河水，一心只想躍龍門者叫作賭「痴」。


    (二) 只要有賭，大小不拘輸贏不論，夜以繼口而樂此不疲者爲「賭鬼」。


    (三) 眼觀四面、耳聽八方、賭技精湛、賭錢而不賭氣、贏不戀戰、輸即收兵者可謂郎中級的「賭聖」。


    (四) 兵不厭詐，只要贏錢即可，不擇手段且擅長移花接木，乾坤大挪移者稱之為老千。


    (五) 梳個教父頭，穿件大風衣，洗牌像耍特技，洗牌後可記住整副牌的順序，於是不用看即知對方的底牌，這樣的人應該稱為「賭神」吧！


    然而，個人是否具有賭的傾向，勢必與天機、天梁這兩顆星有密切關係，首先也是要先看命格具備與否，例如：辰戌丑未機梁或借機梁坐命者，子位太陽會機梁坐命，及卯酉位借陽梁會機梁坐命者，丑未同巨坐命者，或其他在命宮三合有照會機梁二宿坐命者屬之。其中若是機梁二宿有入四化者，則更明顯，以上之命格行運若再逢機梁照會，並入四化加以引動，則賭博涉人的頻率較高，屬於此類命格者較喜步調較緩的鬥智性賭博，如打麻將或是下棋、接龍、羅宋、撿紅點或四色牌，其中以丑未宮機梁對照，及機巨坐命者更是賭技一流，而且是採用打帶跑的游擊戰，見好就收，因此在賭場中較佔上風。


    雖然殺破狼或府相級的，命宮三合不會機梁，但並不因此就認爲他們不會涉賭，例如：武貪因貪財，武破喜刺激且花錢不節制，故而都有賭的傾向，而七殺較無膽量，涉賭機率較小，武破、武貪之命格較喜「博武筊」，例如一翻兩瞪眼的推牌九或是骰子、梭哈之類的，這種賭法輸贏都快，較符合他們的胃口，但他們常會因其貪性與喜刺激的個性，致使其贏而戀戰、輸則苦戰，賭錢變成賭氣，到頭來常是輸得...屁股帶板凳的，因此這種人在賭場中屬於「博憨筊」，較受歡迎。府、相、殺、破、狼命格者，若逢機梁照會並有四化引動時，即有涉賭之傾向，並於小限再走到時更明顯。


    賭之所以讓人沈迷，不外下列因素刺激、好玩、鬥智、金錢誘惑，心裡想不勞而獲，此處所謂的賭並非指家庭式衛生麻將，消遣娛樂無傷大雅，多半是指金額較大的輸贏，或賭場中的豪賭，賭和毒類似，都會讓人上癮，都會令人玩物喪志，而搞得傾家蕩產身敗名裂，因此智者不宜流連，否則勞神傷財又傷身，就算贏了金錢卻輸掉了健康與幸福，划算嗎？


    ## 貴人與小人


    「雪中送炭是君子、錦上添花是小人」，日常生活中，無論對命理有無研究者，都會對所謂貴人、小人有所耳聞，但是在命理方面所說的貴人或小人，並非道德修養上所認定的，有德者或無德者的標準。斗數上所稱的貴人是指能適時幫助你的人，不論其身份（涵蓋六親）地位、好壞、凡是對自己有所助益的就是自己的貴人，即使他是公認的壞人，反之，凡是對自己無益或是扯後腿者，即使他是公認的好人，但偏偏他對別人而言或許反而還算是貴人，對自己卻是會造成間接或直接的傷害，此種情形視爲小人，其衡量的標準較主觀，是以當事者的利害關係爲考量依據。


    ### 一、貴人


    一般我們要尋找貴人，有以下幾種星宿可以考慮，化科星、魁鉞、化忌星，在效力方面以流年的科、忌、魁鉞最管用，但期限最短，只主當年有效，大限的效力其次但主十年有效，本命的效力最小但期限最長，而本命魁鉞在四十歲之前行此二星主逢貴，但四十歲之後逢本命魁鉞則是自己要扮演別人的貴人，因而四十歲之後以尋流年魁鉞較爲有利，以下是尋流年貴人的方法，大限亦可比照辦理：


    (一) 太歲或小限的化科位所屬生肖，但三合須廟旺無破，無煞、忌沖。


    (二) 太歲魁鉞之落宮所屬生肖，但三合廟旺無煞忌對沖。


    (三) 太歲或小限化忌位所屬生肖，因化忌星爲多管之宿，該生肖之人當年對自己必會關心，但此種貴人不甚明顯，須當事人先開門引進，否則極易錯失。


    (四) 若以上之貴人皆不理想，不是陷弱逢破，即是逢空無力，則可尋大限之貴人位，在命盤中星宿最穩定平和之宮位，或其對宮永遠不會化忌之宮位所屬生肖。


    在命中或行運中有沒有貴人，在星盤推估上是一個重要的參數。在人生的旅程中當面臨關鍵性的轉捩點時，貴人扮演著極具影響力的角色，一般人的印象似乎是生命的過程中如果能遇到貴人拉一把，人生便從此飛黃騰達，麻雀立刻變鳳'
  mdcn: '## 預約人生


    您的錢若是以爲善不欲人知的方式，佈施於真正需要的人身上，自然老天爺不會虧待您，必然會在您頭上記上功德一件，定有福報；若是以買生物放生的方式則適得其反，且簡直是引誘人作惡；如果您採用花錢做法事的方式，那豈不成了賄賂神明了嗎？而且神明若能用錢收買還能稱之爲神嗎？那麼有錢人既可花錢改造命或運，那窮人豈不是永無翻身之日嗎？吾人以爲其欲以功德來改造命或運的觀念是對的，只不過所用的方式須要再加以深思，其實無論有錢沒錢，凡事只要心存善念，功德必從生活中做起，發揮童子軍所倡導的日行一善，日久對您的福基必有好的影響，即使不能即時行善、造福大衆，起碼不要去作惡，總能做到獨善其身吧！


    時代的巨輪不斷的轉動著，接踵而至的年青一代，其看法與做法又如何呢？講究創新、突破、沒有什麼是不可能的事，年青一代的人真的做到了，一如他們的信念，對生辰、命運，他們既不規避亦不矯作，於是藉由醫術的發達，姑且權充上帝，乾脆來個造命，先請命理師於接近預產期之前的日子，預先選擇一個準父母中意的良辰吉時，屆時安排醫生於該日該時剖腹生產，這麼一來，落土時可是千真萬確，恐怕連上帝也只有愣在一旁搖頭無語可說了吧！


    是啊！此時聰明的人類可能會仰天長「笑」自認人定勝天，但是這時可能老天爺也在上天俯視著無知的人類，笑而不答。剖腹產若是站在當事者的立場上來說，一來孩子有個好命格，二來不須忍受陣痛臨盆之苦，三來可以保持身材，一舉數得有何不好呢？可是站在醫生的立場而言，除非是產婦有任何不利於自然產之狀況，否則基本上他們也不讚同任意的剖腹產，當然若是顧客執意如此，為了賺錢，反正刀是您換的又不是他，那就恭敬不如從命了。


    若是以命理的角度來看剖腹產，雖然孩子的生辰也照算不誤，但其衍生的數種問題卻值得我們深思與探討：


    (一) 若其原本應有的福基與命格極弱，但卻被安排在一相當厚重強勢的生辰之中出生，那麼這個孩子是否能承受得了？有醫師臨床發現，有產婦迷信選擇良辰吉日剖腹產可讓下一代好命，結果反而發生胎兒不足月生產，器官發育未成熟，一出生就因呼吸窘迫症，送進加護病房急救的不幸事件。


    (二) 命盤中人人都有四煞與空劫，故而再好的命盤至少也總有二、三個宮位逢破，因此魚與熊掌無法兼得，要成就於某一方面，也必然會犧牲另一方面，取捨該由誰決定？


    (三) 就算選擇了一個好命格，然而世事如棋局局新，一旦無常萬事休，外在的大環境一旦有所變動，例如天災、國難、戰亂所引發的變故，則非人力所能左右，縱使有再好的命格，也難有例外而得以豁免。


    (四) 所託付的命理師是否對於專業的知識火侯到家，以及人生的歷練是否足夠，思想與心術是否正派，以及敬業與否？若所託非人，豈不弄巧成拙而得不償失。因為也有人把女命選擇一個太陽在辰位生命的八字。


    基本上站在命理的立場，並不鼓勵造命，除非產婦經醫師斷定不能自然生產，才不得不勉強接下這個重任。但須注意以下情形：


    (一) 須徵求對方意願，想要何種命格的子女？包括個性、嗜好、事業走向再據以選擇之。


    (二) 擇定之後再將該命格之優缺點，得失之處真實以告，以免日後被埋怨。


    (三) 造命之時必考慮對方之六親狀況，力求吻合，並要多瞭解對方的情況，本於善意，盡量運用專業技能，將逢破之宮位安排於對方已承受兌現之處，以免二次傷害。


    (四) 若無把握寧可不做，以免自誤誤人。


    ## 創業與改行


    俗云：「男怕入錯行、女怕嫁錯郎」，這足見古人對於行業選擇的慎重，並且以選定一行即賴以終身的情形居多，他們那種敬業的精神頗值得現代人效法，但其中有所不同的是男女的差別，過去的女人一旦嫁作馮婦則一生吃老公、穿老公、灶裡無柴燒老公。如今此種情形已屬少見，女人亦可在事業上佔有一席之地，因而行業的選擇對女人而言亦同等重要。


    天不出無用之人，地不長無根之草，行行出狀元、類類有高低，行船走馬三分命，幹某一行，首先就必須具有幹某一行的命格，先以命宮星宿爲主，再以官祿宮星宿爲輔來加以判斷，例如：當醫生的，必然他是要扮演別人的貴人，且須具有愛心、耐心及服務的熱心，因此以命格具有日、月、天相或廉貞會魁鉞者較適合，若爲外科醫生尚須帶有擎羊星或天刑才能下得了刀，七殺則是惡人無膽又怕見血，無論加什麼星都當不了外科醫生或護士，而從事美容、美髮業最多的，具統計爲日、月或貪狼的命格，因其具有長時間工作以及美化的性質。


    行業的「分類」在古時侯概以士、農、工、商等五種就搞定，以能謀個一官半職就是人人稱羨的高尚工作，商人則是殿後的，因爲在農業社會裡，家無恆產的人才會去做生意，況且生意人予人奸商耍詐的印象，一般人都認爲生意人只靠那張嘴耍嘴皮子，只會呼攏而已，沒什本事能拿上檯面，所以那個年代的人都認爲「萬般皆下品，唯有讀書高」。


    大約從民國六十年代起，一些八字命理學者把行業納入五行中，判別行業適性與否，例如屬木的行業包括家具、紡織成衣、文具等，屬土的行業包括房地產、建材、陶瓷、礦業等，屬金的行業包括金融、保險、證券、珠寶、交通等，屬火的行業包括電機、電子、燈飾、印刷、運輸等，屬水的行業包括餐飲、美容、化妝品、性產業等。只是現在看起來有點「不倫不類」。


    時至今日，各種商業活動頻繁，行業別早已不只三百六十行，而且各行中分工之精細亦令人嘆為觀止，不相信，您到大醫院的掛號檯旁一站，仔細看診療榜肯定您會傻眼，站在那兒猛抓頭皮，例如心臟部門就細分為心臟內科、心臟外科、心導管科、心血管科……。前一陣子我也差一點被客人考倒，他問：「老師您猜我是從事什麼行業的？」，我看他的命盤上此時大限的官祿位是天機星、天鉞加天馬坐守，我說：「應該是屬交通服務業」，他接著說：「老師您只說對一半，我的工作性質是跟郵局搶生意的民間郵局」，我也很不服氣的回敬他說：「郵局不就是屬交通部所管的嗎？你還要再拗嗎？」。


    以斗數的立場，要以區區幾個星座來面對那麼多又分工精細的行業，是一項不可能的任務，須要非常靈活的運用和豐富的經驗才會有個譜出來，千萬不可鎖定某一個星座即代表某一個行業，否則您一定會「相公」。例如太陽星雖主化工，但在寅、申位多數從事與貿易有關，在卯、酉位則是半公家格，在辰位是從事人際關係的業務工作，在己、午位則多半跟傳播媒體有關，在丑、未則跟投機性有關的工作，在戌、亥、子位多是從事見不得光的工作。


    現在的職業選擇，應先考量個人的性向、專業分類及時代的潮流等因素，現代人在學校主修的科目，出了社會後「學無所用」的比例相當高，而且一生中改變好幾種行業的人也很多，堅持一種行業終老的簡直是「稀有動物」了。在斗數的星盤上，官祿宮只代表事業線的順逆和強弱而已。行業的選擇應以行運大限，官祿宮的星座特性作爲參考的主軸，以大限的四化趨向去分析，才能更符合、更接近事實。


    ### 一、創業


    中國人的特性向來是寧爲雞首不爲馬尾，每個人都想當老闆不願屈就當伙計，因此中小企業佔百分之九十五以上，那天路旁的招牌掉下來準會鋤死好幾個老闆。當老闆真的那麼好嗎？答案是：天曉得，只有當過的人才知道箇中滋味。


    如果您沒當過老闆，很想要個董事長的頭銜來臭屁一下，我也不反對。不過，得先惦惦您的斤兩是否稱得上。


    一、您要創業所需的資金是否足夠？如果創業資金是借來的或自有資金不足五十%，那表示未開業就要先負擔利息，奉勸您「不要玩比較不會變臉」。


    二、所要開創的行業，您是否夠內行、夠專業？隔行如隔山，不要看別人賺錢、生意好你就心動，外行人做內行事是很危險的一件代誌，除非您錢真的很多，足以花錢買經驗。


    三、人際關係是否已成熟，現代人做生意，人際關係是成功與否的最大要素之一，人面不夠的化，創業是一件吃力又使不上力的沈重任務，千萬不可以「沒關係，就找關係，找到關係，就沒有關係」。


    如果您符合上述三個要件，您才可以大膽的跳出來計劃創業當老闆，也不有這需要看下一段。


    先確立當事者命格所屬之行業性質，再分析其層次，因爲若以同樣屬於帶刀的行業而言，有的可貴爲將軍或外科醫師，有的則是從事屠宰的行業，雖然都一樣是掌生殺，但命格之高低不同，故而層次亦有差別，命格、層次都確定之，再看大限，以分析當事者於何限開始嶄露頭角，具有老闆格者必在大限強勢，財宮都不錯時（廟旺或化吉），小限或太歲再走夫官線或天府星時（無煞忌沖或犯空亡），則有創業的舉動，尤其以大限走殺破狼時更明顯，創業後的好壞則是看隔年的運程，而上班族或公務，若行運如前述狀況，則工作上必有異動，情形可比照前章論公務員升遷之標準來論之。


    ### 二、改行


    大限強勢如前述狀況則有分，一、就同一行業但跳出來自己經營，二、離開先前之行業另創新局面之兆。若大限不佳財官逢破，或夫官線逢煞忌沖照，亦有改行跳槽之傾向，尤以夫官線逢雙忌之年尤明顯，以上班族而言官祿不佳，表示與上司不合或工作上無力勝任，若財宮不佳表示因不滿待遇而萌離職之念，以事業經營者來說，逢官祿不佳但財宮還不錯，表示尚有利潤，但所得與心血之付出不成比例，而不堪體力負荷或是非太多，而不願再經營下去了，反之官祿好但財逢破，表示生意雖好，但因成本或人事及各項費用過高，而無利可圖甚至虧本，因而想改行。


    無論經營者或上班族，若是改行還是上班，則較容易看，必須先考量其大限之運勢，若當年換工作之大官線都平稳，则以其命格为主、大限为辅，按前段行业之选择方法，来考虑做决定，若该大限结束之前的夫官线都不好，则想换工作就换，只要待遇合适就可以，不须对工作性质多作考虑，反正也是做不长久，鸭巢换鸡窝、换来换去差不多。


    若您并非跳槽而是要转行经营另一种行业，则须慎重，所谓隔行如隔山，倘若大限的大官不佳，最好还是当个上班族，暂时度小月，保存实力，易曰：「君子藏器於身、待时而动」，反正留得五湖明月在、不怕没处下金钩，若非得已非转行不可，必须保守经营，当小限或太岁走大限化忌位时，要特别注意当年在事业上必有一个坑谷或关卡，跳不过会死得很难看，最好先评估该限十年的起伏状态，并择一最有利之年付诸行动，而所转行业之性质，除依前述行业选择方法加以考虑之外，尚须加入本身条件，对此行的内行度，和目前在社会的**大環境下前景是否看好，以及資金回收速度與運勢的配合情況如何？作一個通盤的考量，所謂：「寧做一去百來的生意，不做一去不來的生意」。


    ## 毒與賭


    ### 一、毒蟲


    環境不佳多病毒、百足蛇蠍含劇毒，


    破口大罵嘴巴毒，殺人放火居心毒。


    老煙槍難斷煙毒、大醉俠難抗酒毒，


    蜂花蜂最怕梅毒、安公子愈安愈毒。


    失眠者易染藥毒、亂服成藥易中毒，


    嗜好中最忌吸毒、缺德莫過於販毒。


    販毒者尤其心毒、政府正全面掃毒，


    大家應齊心反毒、是否能以毒攻毒？


    談到毒就令我們想起掃毒英雄林則徐，繼而想起清朝時代的鴉片戰爭，中國半壁江山幾乎毀於一旦，在當時毒風大盛，於是上行下效，不僅耗損鉅資，腐蝕民心，使得國力漸弱，國無可用之兵無力攘外，甚至國內亂象四起，民不聊生幾近動搖國祚，可見此毒非同小可也。


    在您日常生活當中，是否曾見識過或聽過，有關於吸毒者的事例，那實在可以說是人生中的一大悲劇，毒品的種類衆多，從高價位的海洛英到較便宜的安非他命等，不論是要搖頭、搖手或是要搖臀種種一應俱全，然而不論何種毒品，一旦沾染則極易上癮而難以自拔，可怕的是，它可以摧毀一個人的雄心壯志，它可以埋沒一個人的才華，銷毀一個人的意志，折損一個人的尊嚴，吸跨三代累積的財富進而葬送了一生的大好前途，幸福家庭、事業、甚至寶貴的生命。


    相信您也曾在媒體上看到過，吸毒者在毒發之時的那種痛苦，可說是幾近瘋狂，消瘦的臉龐，扭曲的表情中，含著一雙茫然無助的眼神，夾帶著幾許絕望的感傷，好比一首歌曲中的詞：某年某月的某一天，就像一張破碎的臉……只要是人，見到此情此景能不爲他惋惜而感慨良多嗎？能不因此而有所警惕嗎？更何況看在他親人的眼裡，又何嘗不是一種錐心刺骨之痛，怎敢想像，販毒者有著怎麼樣的一副鐵石心腸，能夠爲了錢，置他人生死於度外。


    此處所謂毒品，除了麻醉毒品之外，長期的服用安眠藥而造成依賴性的，以及長期酗酒而造成的酒精中毒也算，然而會接觸毒品機率較大者，首先必須看當事者之命格是否具備，一般在斗數上來說，毒品必與巨暗有關；尤其以得不到旺地太陽來驅暗的更明顯，於是在命格上而言，命、疾坐子午卯酉位機巨與辰戌丑未同巨者屬之，且命宮星宿陷弱無力者，意志力不堅、主觀性不夠、更容易受影響，命宮星宿廟旺或強勢星宿坐命者，如殺、破、狼者，除非其命盤星宿組合不良或行運不佳者以外，其陷入毒品成癮者少之又少。


    除了命格具備以外，另一種情形是雖非同巨或機巨坐命者，但其命盤架構中，屬於有同巨或機巨的組合，並在青壯年期大限走到，或入大限疾厄，並有大限四化予以入宮引動，即須特別注意。尤其再逢小限行至即有接觸毒品的機會，但是如果其命格強勢，思想正派，生活環境單純，或定力夠者，則未必會到受誘惑，命宮星宿柔性或陷弱者，逢此情形就須特別留意了。一旦染上了麻醉性毒品，則往後的行運就算再好再旺也足白搭，除非強行勒戒，否則是水肥車排歸排拖屎連。


    ### 二、賭徒


    有錢不賭、對不起父母，賭光輸光、為國家爭光。


    種米養百種人，命格不同則個性不同，其嗜好也不同，有人好吃有人貪杯，有人好色，有人貪財，有人好賭，亦有人數者兼備，集十八般武藝於一身。賭是人的天性之一，中國人更是賭性堅強而聞名於世，賭能力、賭酒力、賭腕力、賭氣、賭錢、賭命若是真要賭，則什麼都能賭。甚至常聽人家說：我敢打賭某人一定如何、如何。只不過較能引人人勝的是賭錢，而常常愛賭錢的人被稱爲賭徒，而賭徒當中又分爲好幾級。


    (一) 嗜賭如命贏了乘勝追擊，輸了就想繼續翻本，無視於週遭的陷阱，兩眼不觀河水，一心只想躍龍門者叫作賭「痴」。


    (二) 只要有賭，大小不拘輸贏不論，夜以繼口而樂此不疲者爲「賭鬼」。


    (三) 眼觀四面、耳聽八方、賭技精湛、賭錢而不賭氣、贏不戀戰、輸即收兵者可謂郎中級的「賭聖」。


    (四) 兵不厭詐，只要贏錢即可，不擇手段且擅長移花接木，乾坤大挪移者稱之為老千。


    (五) 梳個教父頭，穿件大風衣，洗牌像耍特技，洗牌後可記住整副牌的順序，於是不用看即知對方的底牌，這樣的人應該稱為「賭神」吧！


    然而，個人是否具有賭的傾向，勢必與天機、天梁這兩顆星有密切關係，首先也是要先看命格具備與否，例如：辰戌丑未機梁或借機梁坐命者，子位太陽會機梁坐命，及卯酉位借陽梁會機梁坐命者，丑未同巨坐命者，或其他在命宮三合有照會機梁二宿坐命者屬之。其中若是機梁二宿有入四化者，則更明顯，以上之命格行運若再逢機梁照會，並入四化加以引動，則賭博涉人的頻率較高，屬於此類命格者較喜步調較緩的鬥智性賭博，如打麻將或是下棋、接龍、羅宋、撿紅點或四色牌，其中以丑未宮機梁對照，及機巨坐命者更是賭技一流，而且是採用打帶跑的游擊戰，見好就收，因此在賭場中較佔上風。


    雖然殺破狼或府相級的，命宮三合不會機梁，但並不因此就認爲他們不會涉賭，例如：武貪因貪財，武破喜刺激且花錢不節制，故而都有賭的傾向，而七殺較無膽量，涉賭機率較小，武破、武貪之命格較喜「博武筊」，例如一翻兩瞪眼的推牌九或是骰子、梭哈之類的，這種賭法輸贏都快，較符合他們的胃口，但他們常會因其貪性與喜刺激的個性，致使其贏而戀戰、輸則苦戰，賭錢變成賭氣，到頭來常是輸得...屁股帶板凳的，因此這種人在賭場中屬於「博憨筊」，較受歡迎。府、相、殺、破、狼命格者，若逢機梁照會並有四化引動時，即有涉賭之傾向，並於小限再走到時更明顯。


    賭之所以讓人沈迷，不外下列因素刺激、好玩、鬥智、金錢誘惑，心裡想不勞而獲，此處所謂的賭並非指家庭式衛生麻將，消遣娛樂無傷大雅，多半是指金額較大的輸贏，或賭場中的豪賭，賭和毒類似，都會讓人上癮，都會令人玩物喪志，而搞得傾家蕩產身敗名裂，因此智者不宜流連，否則勞神傷財又傷身，就算贏了金錢卻輸掉了健康與幸福，划算嗎？


    ## 貴人與小人


    「雪中送炭是君子、錦上添花是小人」，日常生活中，無論對命理有無研究者，都會對所謂貴人、小人有所耳聞，但是在命理方面所說的貴人或小人，並非道德修養上所認定的，有德者或無德者的標準。斗數上所稱的貴人是指能適時幫助你的人，不論其身份（涵蓋六親）地位、好壞、凡是對自己有所助益的就是自己的貴人，即使他是公認的壞人，反之，凡是對自己無益或是扯後腿者，即使他是公認的好人，但偏偏他對別人而言或許反而還算是貴人，對自己卻是會造成間接或直接的傷害，此種情形視爲小人，其衡量的標準較主觀，是以當事者的利害關係爲考量依據。


    ### 一、貴人


    一般我們要尋找貴人，有以下幾種星宿可以考慮，化科星、魁鉞、化忌星，在效力方面以流年的科、忌、魁鉞最管用，但期限最短，只主當年有效，大限的效力其次但主十年有效，本命的效力最小但期限最長，而本命魁鉞在四十歲之前行此二星主逢貴，但四十歲之後逢本命魁鉞則是自己要扮演別人的貴人，因而四十歲之後以尋流年魁鉞較爲有利，以下是尋流年貴人的方法，大限亦可比照辦理：


    (一) 太歲或小限的化科位所屬生肖，但三合須廟旺無破，無煞、忌沖。


    (二) 太歲魁鉞之落宮所屬生肖，但三合廟旺無煞忌對沖。


    (三) 太歲或小限化忌位所屬生肖，因化忌星爲多管之宿，該生肖之人當年對自己必會關心，但此種貴人不甚明顯，須當事人先開門引進，否則極易錯失。


    (四) 若以上之貴人皆不理想，不是陷弱逢破，即是逢空無力，則可尋大限之貴人位，在命盤中星宿最穩定平和之宮位，或其對宮永遠不會化忌之宮位所屬生肖。


    在命中或行運中有沒有貴人，在星盤推估上是一個重要的參數。在人生的旅程中當面臨關鍵性的轉捩點時，貴人扮演著極具影響力的角色，一般人的印象似乎是生命的過程中如果能遇到貴人拉一把，人生便從此飛黃騰達，麻雀立刻變鳳'
