  md: '# # 中國紫微斗星界看老天乙上人傳道授業啟事


    凡是對紫微斗數有興趣的人都知道，這門千古智慧的學問易學難精，沒有經驗

    豐富的老師指導，絕非可輕易窺堂奧。


    天乙上人擁有三十年的教學與執業歷練，為無數面臨困惑與抉擇的人解惑釋

    疑，門下學生近五百位，學有成績而對外執業的學生更高達六十多位，並且遍佈世

    界各地，繼續地發揚光大此“智慧的結晶”。其專業著作出版已有四十餘冊，精闢的


    解析與概念，為斗數界的經典教材。


    天乙上人傾囊相授從不藏私，授課更有專用的獨門精準講義，以利有心向學的

    學生能快速的抓到重點，而不會困惑於傳統八股、模稜兩可的迷思中；讓您瞭解自

    己、改變機運、掌握未來、並擁有永不褪流行的一技之長。術傳有緣，緣至則聚。'
