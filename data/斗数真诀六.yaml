    欲知置產當年之購買情況，須以當年小限田宅為主來判斷。若田宅入較穩定之靜星主購屋一次買斷，如落入動星則主分期付款，有殺破狼為二手貨，有昌曲化忌者，會因過戶手續拖延而難成，若小限財宮逢破，田宅有動星又逢煞忌而爲賣屋抵債，如財宮吉則更主換住所。'
