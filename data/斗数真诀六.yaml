    XX、XXX……等等，現今的社會，姊弟戀情的男女主角，再也不會瞻前顧後，畏首畏尾地怕人知道，反正覺得只要兩人喜歡，有什麼不可以的？先愛了再說！現代的女人可不再浪費時間，和成功機率不大的「哥哥」愛得那麼累人了，不如努力打扮多賺點錢，好好保養身材，再找個「弟弟」談戀愛就好了。


