    化忌星又代表小人星，其效力與期限亦與前述，但我們並非年年都犯小人，而不須要每年都戰戰兢兢的提防，只有當流年走兄僕線，且兄僕線不佳或走陰煞時須加以注意，其尋找方法為先找流年化忌位，但是以化忌位所沖的對宮所屬生肖為小人，例如：當年化忌星入戌位，則辰位屬龍的人須加以防範，其他的依此類推。


