    在先天上男女生理就有很大的差異，有人說：「男人只有不行，沒有不要的。女人只有不要，沒有不行的。」這句話形容相當貼切，女人在生理上佔盡了優勢。一但女人發揮了先天的優勢，男人可要吃不完兜著走囉！因此，想要性生活美滿，一定要跟另一半取得共識和配合才行，不過，這也不是一件容易完成的事，根據調查，台灣人對性生活雙方感到滿意的只佔百分之三十六而已，有一半以上的人對另一半不滿意。有人「有愛無性」，過著無性的婚姻，一年到尾吃沒幾盤「炒飯」，完全以「愛」來支撐感情。有人「有性無愛」，沈溺在一夜情的激情當中，沒有愛的成份，單純只為了生理發洩，反正一人出一樣，彼此湊合著做，做完拍一拍屁股各走各的，誰也沒損失啥、誰也不欠誰。


