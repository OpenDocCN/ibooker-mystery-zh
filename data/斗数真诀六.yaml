    ## 落跑新娘


    春嬌與志明是大學的同班同學，經過三年的戀愛交往，大學畢業後兩人即牽手步上禮堂，成爲班上同學羨慕的第一對婚姻，在喜宴上大肆慶祝一番。婚後沒多久志明就奉召入伍當兵去了，留下春嬌與家人同住，志明是家裡的獨子，上有父母及五個姊妹，大姊、二姊和么妹尚未出嫁，婚後的春嬌要面對公婆和三個小姑，所有的家事全落在她的身上，每天忙著侍奉公婆、煮飯、洗衣、打掃拖地……等等，整天忙個沒停，根本沒時間打扮，結婚不到三個月就活像個黃臉婆，一點也不像新婚的新娘子。


    更誇張的是，婆婆和大姑不曉得信奉什麼宗教，居然是每逢三、六、九加初一、十五日吃素，其他日子是葷食，家裡廚房擁有二套設備，只是春嬌弄素食又要煮葷食，經常弄錯挨罵，日子記錯了也要被唸，每逢素食日她就緊張得半死，一餐要煮二份也把她累個半死。有時候她賭氣故意拖到七點才回家，一進家門就得面對的，是餓著肚子擺著臭臉的公公、婆婆和諸位小姑。午夜夢迴，她非常清楚，這不是她要的婚姻，這家的媳婦比菲傭還不如。這種生活春嬌忍受了將近半年，趁志明放假回來時，她向戀愛三年的老公遞「辭呈」。


    現代的女人，遇上婆媳不合或不平等待遇時，敢率性主動提出離婚的，通常具有三種特徵。第一，經濟上具有自主能力，結婚的目的不是在取得「長期飯票」，不需要看夫家的臉色過日子。第二，經由戀愛結婚的比例較高，戀愛結婚的女人視結婚為一種「選擇」，相親結婚的女人，視婚姻為一種「安排」。第三，還沒生小孩，離婚傷害程度較低，沒有子女監護權的問題。


    從占星學的角度來說，婚姻的失敗其原因可謂五花八門，無奇不有。正式的婚姻是「兩姓聯姻」，戀愛是兩個人的事，可以「只要我喜歡有什麼不可以」。結了婚之後就是兩個家庭，兩個家族的事，婚後要面對彼此不同的家教、生活習性和環境，要如何學習和平相處則是一門學問，多數的人的主觀意識都較強，不願花時間去適應、溝通，寧願選擇「不玩了」。


