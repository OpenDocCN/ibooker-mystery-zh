    根據佛家的因果業力說法，生死存亡由個人的業力決定，當一個人壽盡或福盡時，就會離開這個人間。業力又分「共業」和「別業」之分，共業就是彼此的行爲力，由一個家庭、一個團體、一個村莊甚至一個社會的人共生共存，形成一個彼此生命共同體，在生命的歷程中共同累積無數的業力，這些行爲逐漸醞釀成一種磁場，當這個磁場累積到一個臨界時就會爆開來，災難因而發生。例如說殺了一隻大沙魚，宰殺的人是主凶重罪，販賣和購買的是幫凶罪比較輕，但都需要為這隻沙魚的死負「共業」之罪，罪刑輕的就是「別業」。在重大災'
