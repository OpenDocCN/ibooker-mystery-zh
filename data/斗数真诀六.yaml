    在 E 世代的愛情觀裡，大數都是抱著遊戲人間、及時享樂的心態，整個社會充斥著速食文化。流行著一夜情，男歡女愛全憑一時的感覺衝動，婚姻產生像兒戲般的草率，造成離婚率節節升高，私生兒和單親家庭滿街都是，上一代造的孽要由下一代來承受，又要如何來教育他們長大後對你「反哺」？這是社會的風氣和環境潮流，可不是從命的角度能說清楚講明白的。


    ## 姊妹戀情 (六)


    ### 妳性福嗎？


    有人說：「做愛做的事會讓人愈做愈愛！」。魚水之歡這碼事（有人直稱「嘿咻」、年青人稱為「炒飯」、也有人暱稱「吃水果」），在兩人的感情世界裡，確實是扮演著不可或缺的潤滑劑，性福與幸福之間存著密不可分的關聯性。性生活美滿愉快能為兩人的親密關係加分，感情的世界是彩色的；性生活若失調，彩色立刻變黑白，感情的距離可能會因此而漸行漸遠，甚至走向離異的途徑。


