    那實在可以說是人生中的一大悲劇，毒品的種類衆多，從高價位的海洛英到較便宜的安非他命等，不論是要搖頭、搖手或是要搖臀種種一應俱全，然而不論何種毒品，一旦沾染則極易上癮而難以自拔，可怕的是，它可以摧毀一個人的雄心壯志，它可以埋沒一個人的才華，銷毀一個人的意志，折損一個人的尊嚴，吸跨三代累積的財富進而葬送了一生的大好前途，幸福家庭、事業、甚至寶貴的生命。


