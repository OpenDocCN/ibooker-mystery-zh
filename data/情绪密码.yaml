    想要釋放受困情緒，這是一個不可或缺的必要步驟。受困情緒必須被表達出來，才能被釋放。藉由確認並將之帶入意識層次，我們證實了該情緒的存在，並在某種程度上了結當初創造它的情境。


    從某種意義上來說，我們讓受困情緒發聲，讓它被聽見。如果不這麼做，該受困情緒會一直製造身體疼痛或情緒障礙（或兩者都有），好讓我們感受到它的存在。


    為了找出到底是哪個情緒被困住，你要做的只有一件事：開口問。


    比方說，在這個例子中，你可以從 A 欄第五列的第一個情緒開始問：「這個受困情緒是責備嗎？」然後進行肌肉測試，答案非是即否。


    以同樣的方式依序測試每個情緒（一次一個），直到你確信自己找到正確的情緒了。如果清單上的第一個情緒就給了你肯定的答案，為了檢驗正確性，聰明如你會去測試下一個情緒，這時應該會得到否定的答案。記住，一次只能測試一個情緒，而且一次只會有一種結果。


    清楚自己在問什麼非常重要，你的意念和說出的話語必須保持一致。請注意這一點，這樣才不會把潛意識弄糊塗了。


    此外，請丟掉你對這個過程可能有的焦慮。焦慮是一種恐懼，而信心與恐懼無法並存！'
  - '[PAGE 186]


    # 提問訣竅


    以陳述句或疑問句來提問最好。假設該受困情緒是「懼怕」，那麼你可以說：「這個受困情緒是懼怕。」然後你會得到一個肯定的答案。


    如果改用疑問句形式：「這個受困情緒是懼怕嗎？」你也會得到一個肯定的答案。


    兩種詢問方式效果是一樣的，無論哪一種說法，身體都會給你相同的回應。


    如果你只是順著清單念出「懼怕」這個詞，而不是讓它以陳述句或疑問句的形式呈現，可能會得到一個混亂的答案。當你只是說「懼怕」時，即使那個被困住的情緒就是「懼怕」，你的身體也可能會在搖擺測試中往後傾，或者在肌肉測試中呈現軟弱的肌力。假如你只是拋出這個詞，潛意識也許無法正確解讀你的意思，而僅針對這個詞本身的負面能量做出反應。


    # 找出受困情緒後


    一旦找到受困情緒，恭喜你，你已經學會情緒密碼中一個非常重要的部分了！你的覺知的一個全然不同的面向已經在你眼前展開，而你現在正在學習汲取自己的靈性智慧，只要持續練習，這項能力就會一直幫助你。'
- md: '## 挖掘受困情緒相關資訊


    有時，潛意識會在它願意釋放情緒之前，要求揭露更多資訊，好讓意識對該情緒有更深入的了解。此時你不妨問問：「關於這個受困情緒，我們需要知道更多嗎？」若答案為否，就可以直接釋放該情緒；如果答案為「是」，你就必須再往下挖掘。


    讓意識參與這個過程非常重要，可以幫助受試者將自己與即將被釋放的情緒連結起來。


    請記得，潛意識知道關於這個受困情緒的一切，包括它什麼時候開始被困在體內、涉及哪些人、該能量滯留在身體哪個部位，以及它如何影響身體與心智。


    如果潛意識想要意識知道更多與這個受困情緒有關的事，我建議你先試著找出該情緒是「何時」被困住的。有時，這會引領人進入出乎意料的過去，且往往會揭露製造出這個受困情緒的事件。


    ### 情緒是何時被困住的？


    想要深入挖掘，可以從詢問「這個情緒是何時被困住的」開始。有很多問法可以獲得這項資訊，如果你在當下有什麼直覺，就跟隨它吧。


    例如，若找到受困情緒後，受試者心中剛好想起某件事，該情緒可能就是因為那件事被困住的。想要確認，你可以詢問受試者想起的這件事和製造出受困情緒的那件事是不是同一件。受試者如果不想與你分享跟那件事有關的一切，就不必這麼做，他只須在心中想一下該事件，然後你詢問這個受困情緒是不是因為那件事產生的，再幫他做肌肉測試就可以了。


    這是情緒密碼的優點之一：人們可以保有自己的隱私。受試者不需要解釋或說出製造這個受困情緒的狀況或事件，這讓人們在面對非常私密、可能引發痛苦或因為覺得難堪而說不出口的事件時，依舊能夠釋放因之而生的情緒。受試者完全可以自己選擇要揭露多少。


    若你的夥伴想不出與該情緒有關的特定事件也沒關係，你可以用刪去法來確認受困情緒發生於何時。找出發生的時間點，有助於揭露情緒受困的原因。


    如同我們把受困情緒表分欄、分列，以加快搜尋速度，你也可以把一生分成不同的時間段，這樣比較容易找出受困情緒是哪一年產生的。


    判定情緒何時被困住的方法沒有對錯。你只要提問，直到把答案縮小至某一年或某一事件。有個簡單的方法是把受試者的年紀除以二，然後看看受困情緒發生於他前半段或後半段的人生。比方說，若受試者是四十歲，你可以問：「這個情緒是二十歲之前被困住的嗎？」如果答案為「是」，你就進一步以同樣的方式縮小範圍。


    你可以問：「這個情緒是在你（我）十歲之前被困住的嗎？」


    若答案為「是」，就再把年紀除以二：「這個情緒是在你（我）五歲之前被困住的嗎？」


    如果得到肯定的答案，你可以繼續往下問，這個情緒被困住的年紀是不是一歲、兩歲、三歲等。


    我發現，以這種方式確認受困情緒發生的時間範圍，肌肉測試結果的準確度是正負一年；換句話說，如果身體說某個受困情緒發生在十七歲時，它實際上有可能發生於十六歲或十八歲，但十七歲的可能性最大。


    顯然，在搜尋受困情緒相關資訊時，相較於發生的實際年齡，你的心智對特定事件、狀況或情境有更強的連結。


    假設你大學畢業一個月後碰到的某個情緒性事件造成某個受困情緒，而你當時剛好二十三歲，那麼，肌肉測試的結果可能顯示這個情緒發生於二十二、二十三或二十四歲，也就是實際發生那一年的前後一年都有可能。假如你問的是這個受困情緒發生在事業之前或之後，你會得到比較精確的答案。用這種方式，你就能夠更確切地知道發生的時間。


    你可以時不時就問：「關於這個情緒，我們需要知道更多嗎？」當你帶到意識層次的受困情緒相關資訊夠多時，心智會讓你知你完成了，這個情緒可以被釋放了。


    ## 南西的偏頭痛


    我一直受到嚴重的頭痛和頸部疼痛所擾，甚至開始在頭頸的背面注射可體松。當你說我這些疼痛可能是某個受困情緒引起的，我根本無法理解你在說什麼。你開始問我身體問題，例如一九九四年發生在我身上的某件事，結果將範圍縮小到一九九四年一月發生的一個「無望」的情緒。


    然後我開始回想：「噢，我的老天！那是尚恩出生的時候，那時我懷孕三十三週。」他因為肺部塌陷住院二十一天。在你為我治療之後，我感覺好多了，真的很謝謝你。


    這真是個奇蹟。當時我們幾乎要失去尚恩，而你竟然知道我頭部後面有這些淤滯的能量。如果你見到尚恩，就會知道他真是我生命中的奇蹟。


    一旦你確認該情緒是何時發生的，受試者很可能就會知道當時發生了什麼事造成這個情緒，以及其中的因果關係。


    有時候，找出受困情緒發生的時間範圍，有助於更加深刻地理解當時發生的事，以及受困情緒如何影響身心。以下案例中的女士在一段充滿壓力的日子裡產生了受困情緒，該情緒後來導致她出現偏頭痛問題。


    ## 是誰的情緒？


    了解受困情緒產生的當下涉及哪些人，有時是有幫助的。比方說，假設你就快要抓到發生在你高中時期的受困情緒——憤恨——了，卻不記得可能導致這個情緒的任何事。


    你也許可以問：「這是我的憤恨嗎？」如果答案是肯定的，你可以問：「這股憤恨是否針對某人？」若答案為「是」，就接著問：「這個某人是一位男性嗎？」「是一位女性嗎？」「是一個朋友嗎？」「是家族成員嗎？」「是我哥哥嗎？」「是喬伊嗎？」像這樣透過刪去法逐漸鎖定可能的目標。


    如果這股憤恨是你的，卻無關某人，你可以詢問它是否與某個狀況有關，接著逐步縮小你的問題範圍，以找出那個狀況是什麼、何時發生等等。


    受困情緒很少憑空發生，通常會牽涉到他人，但也可能與家庭、學校、工作、財務、人際關係有關。


    如果你測試之後發現這並非你的憤恨，可以接著問：「這股憤恨是不是我從別人身上吸收來的？」我們有時確實會吸收別人的感覺，而那股能量就會變成我們多餘的負擔。好比一個母親覺她處境的感同身受可能就會為自己製造出一個受困情緒。就我的經驗而言，如果一個情緒是從他得憤恨，她的孩子也許就會接收到些許那樣的能量；或者，某個朋友正經歷生命的低潮，而你對他的處境感同身受，可能就會為自己製造出一個受困情緒。


    南西


    ## 情緒滯留在哪裡？


    另一件有趣的事，就是尋找受困情緒的藏身之處。記住，受困情緒一定會躲藏在身體的某個部位，你不一定要弄清楚這個藏身處，但找出它的位置是一件有趣且具啟發性的事。


    受困情緒可能滯留在身體任何地方，無論它一開始源自哪個器官。


    記住，受困情緒是一個能量構成的球體，尺寸通常介於柳橙到甜瓜之間，你可以利用刪去法判定這顆能量球的确切位置。


    詢問：「這個受困情緒被困在身體的右半邊嗎？」如果不是，就問：「這個受困情緒被困在身體的左半邊嗎？」每次提問，都利用肌肉測試來讓身體告訴你答案是什麼。


    如果你讓心智安靜一會兒，尤其，如果你求神幫助你釐清問題，相信我，你會弄清楚的。記住，「凡祈求的，就得著；叩門的，就給他開門。」


    假如這兩個問題的答案皆為否定，就問：「這個受困情緒被困在身體的中線嗎？」接著，詢問這個受困情緒是否在腰線以上、以下，或者正好在腰線上。很快地，你就會找出這股情緒能量大概滯留在哪個區域。


    只要繼續向身體提問，就能得到更明確的答案。這很簡單，而且透過練習，你會愈來愈得心應手。


    不要小看自己辨別情緒受困位置的能力。傾聽直覺提供的受困情緒位置資訊，你的心裡可能會冒出答案。先測試是否就是那裡，然後，你會對正確率之高感到驚奇，發現這樣做真是省時又省力。


    一旦找到受困情緒的位置，就想著那個身體部位有的任何症狀。如果受困情緒所在之處有疼痛的感覺，當情緒被釋放後，那股疼痛可能會突然消失。


    ## 憶起受困情緒


    有時候，你還是想不起來到底是哪件事導致這個受困情緒。其實，受困情緒頗常是由很快就被忘掉的狀況造成的。


    舉例來說，某一天似乎萬事不順，你看電影前去吃晚餐，結果餐廳的服務糟透了。你知道電影快開演了，自己就要遲到了，因此變得心煩意亂。好不容易等到帳單來了，你發現自己的卡刷爆了，於是你選擇覺得憤怒或丟臉，或者兩種情緒都有。當事情不如己意時，我們可能會非常火大，在這種情況下感受到的強烈情緒可能會有一、兩個被困在身體裡，但一年後，你也許很難再想起這件事，尤其如果你選擇不要停留在這個負面經驗裡。幾年後，被困住的情緒還是在那裡，但現在要有意識地想起這件事可能變得很難了。


    有時候，受困情緒是由短暫事件造成的，且你的意識永遠想不起那件事本身。


    即使你無法馬上想起某個受困情緒跟什麼事有關，我的經驗是，你有大概一半的機率會在接下來的幾天內想起來。通常隔天或當晚，你可能正在做某件完全不相關的事，結果那件事突然出現在你腦海裡。你會想起發生了什麼事，因為你的潛意識超時工作、搜尋，試著把它弄清楚，並從你的記憶庫裡挖出來。


    「關於這個受困情緒，我們需要知道更多嗎？」這個問句的使用次數沒有限制。而一旦得到「不需要」這個否定的答案，意味著你已經知道所有必須知道的相關訊息，你可以釋放那個情緒了。


    你是否真的想起發生了什麼事及受困情緒的起因，並非釋放情緒能量的關鍵。把那件事找出來會很有意思，而且這麼做也可能讓你得到一些更深刻的理解，不過，要釋放受困情緒，你只須找出是哪個情緒被困住，並讓意識覺知到它就夠了。下一步，就來學習如何釋放受困情緒。


    ## 為他人釋放情緒


    幫助他人釋放受困情緒時，請把磁鐵放在對方的背部，頸根處。告知你的夥伴在你滑動磁鐵時保持自然呼吸，然後從他的頸根處往下滾動或滑動磁鐵，一直滑到下背部或再往下。每一次滑到底之後，就將磁鐵拿離開對方背部，再放回頸根處往下滑，總共做三次。磁鐵每滑過一次，就會將磁能量轉移到督脈，這個磁能量會放大你的意念，並將之帶進其他所有經脈，讓全身充滿這份意念。其結果就是，磁鐵滑過三次之後，受困情緒便永遠被釋放掉了。就是這麼簡單。


    ## 為自己釋放情緒


    想為自己釋放受困情緒，請將一塊磁鐵放在眉心，保持平穩呼吸，不要憋氣，然後滾動或滑動磁鐵，往上經過前額、頭頂，延伸到後腦、頸部後方，一直到你的手沒辦法再往下為止。重複這個動作三次。


    你可以帶著釋放體內受困情緒的意念，用磁鐵滑過督脈的任何部分。假使你有一頭蓬鬆的卷髮，怕磁鐵在頭髮上滑動會弄壞造型，那麼便用磁鐵在前額滑動，能滑多遠就多遠。就是這麼簡單。記得要做三次，並且專注地想著要釋放這個受困情緒。


    ## 確認情緒是否已被釋放


    想要確認情緒是否已被釋放，只須詢問：「我們（我）是否已經成功釋放了這個受困情緒？」答案應為「是」。如果得到肯定的答案，這個受困情緒的釋放程序便完成了，現在你可以檢查看看是否有另一個受困情緒要被釋放，如果你想要的話。


    若測試結果顯示該情緒尚未被釋放，就像之前那樣用磁鐵再滑三次，但這次在心中對受試者（無論是你自己或他人）抱持多一點愛，相信你可以釋放這個情緒，並讓自己因為情緒正在被釋放而感謝神。


    記住，信心和信念可以成就任何事，就算只有一點點信心，也能看見偉大的事情發生！記得耶穌的話：「我實在告訴你們，你們若有信心，像一粒芥菜種，就是對這座山說：『你從這邊挪到那邊。』它也必挪去；並且你們沒有一件不能做的事了。」（見《聖經·馬太福音》第十七章二十節）


    ## 情緒一旦被釋放，就永久消失了


    情緒密碼有個很棒的地方：受困情緒一旦被釋放，就永遠消失了。多年來在診所及講座中，我從未見過任何一個受困情緒被釋放後又回來的。


    另一方面，滯留在體內的某種受困情緒卻可能被找到不只一次。遇到這樣的情況，你可能要從受試者身上釋放同一種情緒好幾次。雖然是同一種情緒，卻分別是不同的受困能量，且往往源自過去不同的情緒性事件。此外，一個人也可能有好幾個因為同一件事而被困住的不同情緒。


    ## 處理特定問題


    如果你正為生活中某個特定問題苦苦掙扎，判斷受困情緒是否可能在其中扮演一個隱形角色是很重要的。


    你也許懷疑自己有受困情緒，但當你詢問「我是否有個現在可以被釋放的受困情緒」時，它又不出現。這時，你需要以更直接的方式處理，才能將受困情緒揭露出來。


    這裡提供一些常見問題及對應的提問方式。這張清單可以一直列下去，不過這些應該夠讓你了解如何針對自己的特定問題發問了。


    - 是否有個受困情緒在阻止我減肥？

    - 是否有個受困情緒導致我的身體組織一直發炎？

    - 是否有個受困情緒在阻礙我賺更多錢？

    - 是否有個受困情緒在妨礙我賣出更多商品？

    - 是否有個受困情緒造成我的背部／頸部／肩膀／膝蓋疼痛？

    - 是否有個受困情緒導致我憂鬱／脾氣壞／易怒？

    - 我是否有個與我的丈夫／妻子／兒子／女兒／上司有關的受困情緒？

    - 是否有個受困情緒在阻礙我達成目標？

    - 是否有個受困情緒讓我難以戒菸／戒酒／戒毒／戒看色情片？

    - 我是否有個與「特定事件」相關的受困情緒？


    如果某個像這樣的直接問題的答案為「是」，潛意識已經辨認出該情緒了。接下來，你可以按照我之前在本章提到的程序，透過提問繼續找出這個情緒位在受困情緒表的哪一欄、哪一列（第206頁有流程圖）。


    請記住，任何問題的發生都可能由一個以上的情緒造成的。此外，受困情緒常常要像洋蔥的一般，一層一層地剝開。如果你今天釋放了一個與某特定問題有關的受困情緒，和這個問題相關的其他情緒也許要過一陣子才會出現。所以，如果你想徹底解決某個問題，最好時不時就重新檢查是否仍有任何導致該問題的受困情緒存在。


    ## 套疊的受困情緒


    幾個受困情緒滯留在身體的同一部位並不罕見，我稱這種現象為「套疊」。有「套疊」現象時，你有時會發現受試者覺得特別不舒服。一個部位有多個受困情緒，似乎會在身體組織上造成較為嚴重的變形與疼痛。有趣的是，運用情緒密碼找出並釋放套疊的受困情緒時，每釋放一個情緒，受試者的不適程度往往明顯減少。關於這類案例，請見第85頁「琴恩的卵巢疼痛」及87頁「傑克的網球肘」。


    ### 釋放過後的重整


    當身心在「重整」被釋放的受困情緒時，這個「重整」過程的症狀就會出現。一旦受困情緒被帶到意識層次，並且被以磁鐵釋放時，療癒的過程就開始了。


    在療癒過程中，當事人會像在山谷裡聽到回音一樣，重複體驗到已經被釋放了的情緒。這段期間，他們會覺得情緒有些起伏，這並不罕見。


    身體通常會願意在釋放至少一個情緒後才開始重整；另一方面，身體有時會連續釋放多個受困情緒，然後同時重整一組情緒。請務必信任身體的智慧，千萬別逼它，而是要溫柔以對，讓身體有充分的時間重整與療癒。


    如果釋放了一個受困情緒後，身體就不願再釋放另一個，你可以問問身體什麼時候會準備好釋放下一個：「我可以在—— 釋放另一個受困情緒嗎？」空白處請填上「十分鐘後」「兩小時後」「今天下午」「明天」等時間。假如身心開始重整情緒，通常會持續數小時到數天。


    > 請注意重整期間的情緒起伏

    >

    > 一定要讓接受療癒的人明白，釋放受困情緒後，他們會經歷一段輕微情緒起伏的重整期，這點非常重要的。如果你讓他們事先知道有這種可能性，真的發生時，他們會有心理準備。若接受療癒者確實出現明顯的重整症狀，例如哭泣或做了栩栩如生的夢，而妳沒有先告知可能會經歷這種事，他們也許會認為為釋放受困情緒反而讓自己的狀況變糟，而不是好轉。


    每次有個受困情緒被釋放，就會進行重整，但大約只有三成的時間會出現明顯的情緒起伏。


    身心通常可以不受影響地處理受困情緒的釋放過程，畢竟它是一部多工電腦，可以同時執行多項任務，但有時候，它會需要多花點時間從一個受困情緒中療癒，並且掌握這個新狀態。


    ## 胎兒期的受困情緒


    一般來說，當人們在處理一個或多個受困情緒的釋放過程時，他們的正常活動不會受限。


    有時你會發現，某個受困情緒並非發生在出生以後的任何一個時間點。其實，受困情緒也可能發生在母親的子宮裡，如果是這種情形，你可以問：


    - 「這個情緒是在子宮裡被困住的嗎？」

    - 「這個情緒是在第一孕期（懷孕第一到十二週）被困住的嗎？」

    - 「這個情緒是在第二孕期（第十三到二十七週）被困住的嗎？」

    - 「這個情緒是在第三孕期（第二十七週至生產）被困住的嗎？」


    根據我的經驗，胎兒期的受困情緒通常發生於第二孕期，而且往往是受試者的母親當時經歷的情緒。


    換句話說，假設一個女人在她懷孕的第二或第三孕期經歷「哀痛」的情緒，她整個人都跟著這股情緒能量振動，肚子裡的寶寶就會開始與這個情緒共振。結果，胎兒可能會從自己的母親那裡接收到這個受困情緒。


    我從未見過胎兒自己製造出受困情緒的例子，但不論這個情緒是來自胎兒或母親的身體都無關緊要，重要的是，它都可以透過同樣的方式釋放：用磁鐵順著督脈滑過三次。


    ## 遺傳來的受困情緒


    如同你遺傳了父親、母親和其他祖先的眼睛顏色或鼻子形狀一樣，你也可能遺傳了他們的受困情緒。遺傳來的受困情緒，和胎兒期的受困情緒或其他任何類型的受困情緒是不同的。


    如果是遺傳來的情緒，你在受精卵形成的當下就從精子或卵子接收到那個情緒的能量了。


    當精卵結合時，其中一方已經帶著某些額外的情緒能量了。這個受精卵開始分裂，然後，存在原本那個受精卵中的一切也被複製了。隨著受精卵不斷分裂，這額外的情緒能量也會被複製。


    你當然可以詢問「是否有個我們現在可以釋放、遺傳來的受困情緒」，來揭露這類受困能量的存在。但大多數時候，你會在尋找一般受困情緒時，偶然發現這是遺傳來的受困情緒。


    ### 如何找到遺傳來的情緒？


    我的經驗是，潛意識會引導你到某個遺傳來的情緒所在的正確欄、列，但不會告訴你是哪一格所列的五種情緒中的哪一個，除非你在情緒名前面加上「遺傳來的」這個詞。


    舉例來說，假設你發現你要釋放的受困情緒在 B 欄第二列，並且測試了那一格裡面的每一個情緒，但得到的結果都是否定的。如果出現這種狀況，你就詢問：「這是一個遺傳來的受困情緒嗎?」若得到肯定的答案,就接著問:「這是遺傳來的———嗎?」空白處依序填入
    B 欄第二列那一格裡的五個情緒,直到你找到正確的那一個。


    一旦辨識出遺傳來的受困情緒,你也許會想要判斷該情緒是遺傳自受試者的父親或母親。若想進一步挖掘,你可以詢問這個遺傳來的情緒是源自祖父(母)或曾祖父(母)等等。一般來說,遺傳來的受困情緒大多源自父母或祖父母。


    幾年前,我女兒娜塔莉幫我進行遠距療癒時,在我身上找到一個遺傳來的受困情緒:無望感。當娜塔莉判定這個情緒源自我父親那邊一位二十二代以前的愛爾蘭女性祖先時,她突然覺得那位女士就在身邊。娜塔莉感覺得到她非常想要讓這個情緒從她的子孫身上被釋放掉,同時也感受到她對於這個情緒正在被釋放有多感激。


    在那之前,我並不知道有這個情緒存在,它就像背景聲一樣,我一直沒有察覺。而這個「無望感」被釋放的那一刻,就像背景聲突然不見了,我也因而知道這個情緒被釋放了!


    當一個遺傳來的受困情緒被釋放時,它會從所有透過血脈將這股情緒能量往下傳的祖先身上被釋放掉,無論往回追溯多少代。這是情緒密碼一個非常強大的地方!而因為受試者可能已經把這股能量傳給自己的孩子了,我建議你抱持清楚的意念,將受困情緒從每一個擁有這股能量的靈魂身上釋放掉,無論他們在世與否。釋放結束後,你可以透過肌肉測試確認是不是除了受試者之外,其他每一個可能遺傳了這股能量的人也都沒有了這個情緒。'
  mdcn: '## 挖掘受困情緒相關資訊


    有時，潛意識會在它願意釋放情緒之前，要求揭露更多資訊，好讓意識對該情緒有更深入的了解。此時你不妨問問：「關於這個受困情緒，我們需要知道更多嗎？」若答案為否，就可以直接釋放該情緒；如果答案為「是」，你就必須再往下挖掘。


    讓意識參與這個過程非常重要，可以幫助受試者將自己與即將被釋放的情緒連結起來。


    請記得，潛意識知道關於這個受困情緒的一切，包括它什麼時候開始被困在體內、涉及哪些人、該能量滯留在身體哪個部位，以及它如何影響身體與心智。


    如果潛意識想要意識知道更多與這個受困情緒有關的事，我建議你先試著找出該情緒是「何時」被困住的。有時，這會引領人進入出乎意料的過去，且往往會揭露製造出這個受困情緒的事件。


    ### 情緒是何時被困住的？


    想要深入挖掘，可以從詢問「這個情緒是何時被困住的」開始。有很多問法可以獲得這項資訊，如果你在當下有什麼直覺，就跟隨它吧。


    例如，若找到受困情緒後，受試者心中剛好想起某件事，該情緒可能就是因為那件事被困住的。想要確認，你可以詢問受試者想起的這件事和製造出受困情緒的那件事是不是同一件。受試者如果不想與你分享跟那件事有關的一切，就不必這麼做，他只須在心中想一下該事件，然後你詢問這個受困情緒是不是因為那件事產生的，再幫他做肌肉測試就可以了。


    這是情緒密碼的優點之一：人們可以保有自己的隱私。受試者不需要解釋或說出製造這個受困情緒的狀況或事件，這讓人們在面對非常私密、可能引發痛苦或因為覺得難堪而說不出口的事件時，依舊能夠釋放因之而生的情緒。受試者完全可以自己選擇要揭露多少。


    若你的夥伴想不出與該情緒有關的特定事件也沒關係，你可以用刪去法來確認受困情緒發生於何時。找出發生的時間點，有助於揭露情緒受困的原因。


    如同我們把受困情緒表分欄、分列，以加快搜尋速度，你也可以把一生分成不同的時間段，這樣比較容易找出受困情緒是哪一年產生的。


    判定情緒何時被困住的方法沒有對錯。你只要提問，直到把答案縮小至某一年或某一事件。有個簡單的方法是把受試者的年紀除以二，然後看看受困情緒發生於他前半段或後半段的人生。比方說，若受試者是四十歲，你可以問：「這個情緒是二十歲之前被困住的嗎？」如果答案為「是」，你就進一步以同樣的方式縮小範圍。


    你可以問：「這個情緒是在你（我）十歲之前被困住的嗎？」


    若答案為「是」，就再把年紀除以二：「這個情緒是在你（我）五歲之前被困住的嗎？」


    如果得到肯定的答案，你可以繼續往下問，這個情緒被困住的年紀是不是一歲、兩歲、三歲等。


    我發現，以這種方式確認受困情緒發生的時間範圍，肌肉測試結果的準確度是正負一年；換句話說，如果身體說某個受困情緒發生在十七歲時，它實際上有可能發生於十六歲或十八歲，但十七歲的可能性最大。


    顯然，在搜尋受困情緒相關資訊時，相較於發生的實際年齡，你的心智對特定事件、狀況或情境有更強的連結。


    假設你大學畢業一個月後碰到的某個情緒性事件造成某個受困情緒，而你當時剛好二十三歲，那麼，肌肉測試的結果可能顯示這個情緒發生於二十二、二十三或二十四歲，也就是實際發生那一年的前後一年都有可能。假如你問的是這個受困情緒發生在事業之前或之後，你會得到比較精確的答案。用這種方式，你就能夠更確切地知道發生的時間。


    你可以時不時就問：「關於這個情緒，我們需要知道更多嗎？」當你帶到意識層次的受困情緒相關資訊夠多時，心智會讓你知你完成了，這個情緒可以被釋放了。


    ## 南西的偏頭痛


    我一直受到嚴重的頭痛和頸部疼痛所擾，甚至開始在頭頸的背面注射可體松。當你說我這些疼痛可能是某個受困情緒引起的，我根本無法理解你在說什麼。你開始問我身體問題，例如一九九四年發生在我身上的某件事，結果將範圍縮小到一九九四年一月發生的一個「無望」的情緒。


    然後我開始回想：「噢，我的老天！那是尚恩出生的時候，那時我懷孕三十三週。」他因為肺部塌陷住院二十一天。在你為我治療之後，我感覺好多了，真的很謝謝你。


    這真是個奇蹟。當時我們幾乎要失去尚恩，而你竟然知道我頭部後面有這些淤滯的能量。如果你見到尚恩，就會知道他真是我生命中的奇蹟。


    一旦你確認該情緒是何時發生的，受試者很可能就會知道當時發生了什麼事造成這個情緒，以及其中的因果關係。


    有時候，找出受困情緒發生的時間範圍，有助於更加深刻地理解當時發生的事，以及受困情緒如何影響身心。以下案例中的女士在一段充滿壓力的日子裡產生了受困情緒，該情緒後來導致她出現偏頭痛問題。


    ## 是誰的情緒？


    了解受困情緒產生的當下涉及哪些人，有時是有幫助的。比方說，假設你就快要抓到發生在你高中時期的受困情緒——憤恨——了，卻不記得可能導致這個情緒的任何事。


    你也許可以問：「這是我的憤恨嗎？」如果答案是肯定的，你可以問：「這股憤恨是否針對某人？」若答案為「是」，就接著問：「這個某人是一位男性嗎？」「是一位女性嗎？」「是一個朋友嗎？」「是家族成員嗎？」「是我哥哥嗎？」「是喬伊嗎？」像這樣透過刪去法逐漸鎖定可能的目標。


    如果這股憤恨是你的，卻無關某人，你可以詢問它是否與某個狀況有關，接著逐步縮小你的問題範圍，以找出那個狀況是什麼、何時發生等等。


    受困情緒很少憑空發生，通常會牽涉到他人，但也可能與家庭、學校、工作、財務、人際關係有關。


    如果你測試之後發現這並非你的憤恨，可以接著問：「這股憤恨是不是我從別人身上吸收來的？」我們有時確實會吸收別人的感覺，而那股能量就會變成我們多餘的負擔。好比一個母親覺她處境的感同身受可能就會為自己製造出一個受困情緒。就我的經驗而言，如果一個情緒是從他得憤恨，她的孩子也許就會接收到些許那樣的能量；或者，某個朋友正經歷生命的低潮，而你對他的處境感同身受，可能就會為自己製造出一個受困情緒。


    南西


    ## 情緒滯留在哪裡？


    另一件有趣的事，就是尋找受困情緒的藏身之處。記住，受困情緒一定會躲藏在身體的某個部位，你不一定要弄清楚這個藏身處，但找出它的位置是一件有趣且具啟發性的事。


    受困情緒可能滯留在身體任何地方，無論它一開始源自哪個器官。


    記住，受困情緒是一個能量構成的球體，尺寸通常介於柳橙到甜瓜之間，你可以利用刪去法判定這顆能量球的确切位置。


    詢問：「這個受困情緒被困在身體的右半邊嗎？」如果不是，就問：「這個受困情緒被困在身體的左半邊嗎？」每次提問，都利用肌肉測試來讓身體告訴你答案是什麼。


    如果你讓心智安靜一會兒，尤其，如果你求神幫助你釐清問題，相信我，你會弄清楚的。記住，「凡祈求的，就得著；叩門的，就給他開門。」


    假如這兩個問題的答案皆為否定，就問：「這個受困情緒被困在身體的中線嗎？」接著，詢問這個受困情緒是否在腰線以上、以下，或者正好在腰線上。很快地，你就會找出這股情緒能量大概滯留在哪個區域。


    只要繼續向身體提問，就能得到更明確的答案。這很簡單，而且透過練習，你會愈來愈得心應手。


    不要小看自己辨別情緒受困位置的能力。傾聽直覺提供的受困情緒位置資訊，你的心裡可能會冒出答案。先測試是否就是那裡，然後，你會對正確率之高感到驚奇，發現這樣做真是省時又省力。


    一旦找到受困情緒的位置，就想著那個身體部位有的任何症狀。如果受困情緒所在之處有疼痛的感覺，當情緒被釋放後，那股疼痛可能會突然消失。


    ## 憶起受困情緒


    有時候，你還是想不起來到底是哪件事導致這個受困情緒。其實，受困情緒頗常是由很快就被忘掉的狀況造成的。


    舉例來說，某一天似乎萬事不順，你看電影前去吃晚餐，結果餐廳的服務糟透了。你知道電影快開演了，自己就要遲到了，因此變得心煩意亂。好不容易等到帳單來了，你發現自己的卡刷爆了，於是你選擇覺得憤怒或丟臉，或者兩種情緒都有。當事情不如己意時，我們可能會非常火大，在這種情況下感受到的強烈情緒可能會有一、兩個被困在身體裡，但一年後，你也許很難再想起這件事，尤其如果你選擇不要停留在這個負面經驗裡。幾年後，被困住的情緒還是在那裡，但現在要有意識地想起這件事可能變得很難了。


    有時候，受困情緒是由短暫事件造成的，且你的意識永遠想不起那件事本身。


    即使你無法馬上想起某個受困情緒跟什麼事有關，我的經驗是，你有大概一半的機率會在接下來的幾天內想起來。通常隔天或當晚，你可能正在做某件完全不相關的事，結果那件事突然出現在你腦海裡。你會想起發生了什麼事，因為你的潛意識超時工作、搜尋，試著把它弄清楚，並從你的記憶庫裡挖出來。


    「關於這個受困情緒，我們需要知道更多嗎？」這個問句的使用次數沒有限制。而一旦得到「不需要」這個否定的答案，意味著你已經知道所有必須知道的相關訊息，你可以釋放那個情緒了。


    你是否真的想起發生了什麼事及受困情緒的起因，並非釋放情緒能量的關鍵。把那件事找出來會很有意思，而且這麼做也可能讓你得到一些更深刻的理解，不過，要釋放受困情緒，你只須找出是哪個情緒被困住，並讓意識覺知到它就夠了。下一步，就來學習如何釋放受困情緒。


    ## 為他人釋放情緒


    幫助他人釋放受困情緒時，請把磁鐵放在對方的背部，頸根處。告知你的夥伴在你滑動磁鐵時保持自然呼吸，然後從他的頸根處往下滾動或滑動磁鐵，一直滑到下背部或再往下。每一次滑到底之後，就將磁鐵拿離開對方背部，再放回頸根處往下滑，總共做三次。磁鐵每滑過一次，就會將磁能量轉移到督脈，這個磁能量會放大你的意念，並將之帶進其他所有經脈，讓全身充滿這份意念。其結果就是，磁鐵滑過三次之後，受困情緒便永遠被釋放掉了。就是這麼簡單。


    ## 為自己釋放情緒


    想為自己釋放受困情緒，請將一塊磁鐵放在眉心，保持平穩呼吸，不要憋氣，然後滾動或滑動磁鐵，往上經過前額、頭頂，延伸到後腦、頸部後方，一直到你的手沒辦法再往下為止。重複這個動作三次。


    你可以帶著釋放體內受困情緒的意念，用磁鐵滑過督脈的任何部分。假使你有一頭蓬鬆的卷髮，怕磁鐵在頭髮上滑動會弄壞造型，那麼便用磁鐵在前額滑動，能滑多遠就多遠。就是這麼簡單。記得要做三次，並且專注地想著要釋放這個受困情緒。


    ## 確認情緒是否已被釋放


    想要確認情緒是否已被釋放，只須詢問：「我們（我）是否已經成功釋放了這個受困情緒？」答案應為「是」。如果得到肯定的答案，這個受困情緒的釋放程序便完成了，現在你可以檢查看看是否有另一個受困情緒要被釋放，如果你想要的話。


    若測試結果顯示該情緒尚未被釋放，就像之前那樣用磁鐵再滑三次，但這次在心中對受試者（無論是你自己或他人）抱持多一點愛，相信你可以釋放這個情緒，並讓自己因為情緒正在被釋放而感謝神。


    記住，信心和信念可以成就任何事，就算只有一點點信心，也能看見偉大的事情發生！記得耶穌的話：「我實在告訴你們，你們若有信心，像一粒芥菜種，就是對這座山說：『你從這邊挪到那邊。』它也必挪去；並且你們沒有一件不能做的事了。」（見《聖經·馬太福音》第十七章二十節）


    ## 情緒一旦被釋放，就永久消失了


    情緒密碼有個很棒的地方：受困情緒一旦被釋放，就永遠消失了。多年來在診所及講座中，我從未見過任何一個受困情緒被釋放後又回來的。


    另一方面，滯留在體內的某種受困情緒卻可能被找到不只一次。遇到這樣的情況，你可能要從受試者身上釋放同一種情緒好幾次。雖然是同一種情緒，卻分別是不同的受困能量，且往往源自過去不同的情緒性事件。此外，一個人也可能有好幾個因為同一件事而被困住的不同情緒。


    ## 處理特定問題


    如果你正為生活中某個特定問題苦苦掙扎，判斷受困情緒是否可能在其中扮演一個隱形角色是很重要的。


    你也許懷疑自己有受困情緒，但當你詢問「我是否有個現在可以被釋放的受困情緒」時，它又不出現。這時，你需要以更直接的方式處理，才能將受困情緒揭露出來。


    這裡提供一些常見問題及對應的提問方式。這張清單可以一直列下去，不過這些應該夠讓你了解如何針對自己的特定問題發問了。


    - 是否有個受困情緒在阻止我減肥？

    - 是否有個受困情緒導致我的身體組織一直發炎？

    - 是否有個受困情緒在阻礙我賺更多錢？

    - 是否有個受困情緒在妨礙我賣出更多商品？

    - 是否有個受困情緒造成我的背部／頸部／肩膀／膝蓋疼痛？

    - 是否有個受困情緒導致我憂鬱／脾氣壞／易怒？

    - 我是否有個與我的丈夫／妻子／兒子／女兒／上司有關的受困情緒？

    - 是否有個受困情緒在阻礙我達成目標？

    - 是否有個受困情緒讓我難以戒菸／戒酒／戒毒／戒看色情片？

    - 我是否有個與「特定事件」相關的受困情緒？


    如果某個像這樣的直接問題的答案為「是」，潛意識已經辨認出該情緒了。接下來，你可以按照我之前在本章提到的程序，透過提問繼續找出這個情緒位在受困情緒表的哪一欄、哪一列（第206頁有流程圖）。


    請記住，任何問題的發生都可能由一個以上的情緒造成的。此外，受困情緒常常要像洋蔥的一般，一層一層地剝開。如果你今天釋放了一個與某特定問題有關的受困情緒，和這個問題相關的其他情緒也許要過一陣子才會出現。所以，如果你想徹底解決某個問題，最好時不時就重新檢查是否仍有任何導致該問題的受困情緒存在。


    ## 套疊的受困情緒


    幾個受困情緒滯留在身體的同一部位並不罕見，我稱這種現象為「套疊」。有「套疊」現象時，你有時會發現受試者覺得特別不舒服。一個部位有多個受困情緒，似乎會在身體組織上造成較為嚴重的變形與疼痛。有趣的是，運用情緒密碼找出並釋放套疊的受困情緒時，每釋放一個情緒，受試者的不適程度往往明顯減少。關於這類案例，請見第85頁「琴恩的卵巢疼痛」及87頁「傑克的網球肘」。


    ### 釋放過後的重整


    當身心在「重整」被釋放的受困情緒時，這個「重整」過程的症狀就會出現。一旦受困情緒被帶到意識層次，並且被以磁鐵釋放時，療癒的過程就開始了。


    在療癒過程中，當事人會像在山谷裡聽到回音一樣，重複體驗到已經被釋放了的情緒。這段期間，他們會覺得情緒有些起伏，這並不罕見。


    身體通常會願意在釋放至少一個情緒後才開始重整；另一方面，身體有時會連續釋放多個受困情緒，然後同時重整一組情緒。請務必信任身體的智慧，千萬別逼它，而是要溫柔以對，讓身體有充分的時間重整與療癒。


    如果釋放了一個受困情緒後，身體就不願再釋放另一個，你可以問問身體什麼時候會準備好釋放下一個：「我可以在—— 釋放另一個受困情緒嗎？」空白處請填上「十分鐘後」「兩小時後」「今天下午」「明天」等時間。假如身心開始重整情緒，通常會持續數小時到數天。


    > 請注意重整期間的情緒起伏

    >

    > 一定要讓接受療癒的人明白，釋放受困情緒後，他們會經歷一段輕微情緒起伏的重整期，這點非常重要的。如果你讓他們事先知道有這種可能性，真的發生時，他們會有心理準備。若接受療癒者確實出現明顯的重整症狀，例如哭泣或做了栩栩如生的夢，而妳沒有先告知可能會經歷這種事，他們也許會認為為釋放受困情緒反而讓自己的狀況變糟，而不是好轉。


    每次有個受困情緒被釋放，就會進行重整，但大約只有三成的時間會出現明顯的情緒起伏。


    身心通常可以不受影響地處理受困情緒的釋放過程，畢竟它是一部多工電腦，可以同時執行多項任務，但有時候，它會需要多花點時間從一個受困情緒中療癒，並且掌握這個新狀態。


    ## 胎兒期的受困情緒


    一般來說，當人們在處理一個或多個受困情緒的釋放過程時，他們的正常活動不會受限。


    有時你會發現，某個受困情緒並非發生在出生以後的任何一個時間點。其實，受困情緒也可能發生在母親的子宮裡，如果是這種情形，你可以問：


    - 「這個情緒是在子宮裡被困住的嗎？」

    - 「這個情緒是在第一孕期（懷孕第一到十二週）被困住的嗎？」

    - 「這個情緒是在第二孕期（第十三到二十七週）被困住的嗎？」

    - 「這個情緒是在第三孕期（第二十七週至生產）被困住的嗎？」


    根據我的經驗，胎兒期的受困情緒通常發生於第二孕期，而且往往是受試者的母親當時經歷的情緒。


    換句話說，假設一個女人在她懷孕的第二或第三孕期經歷「哀痛」的情緒，她整個人都跟著這股情緒能量振動，肚子裡的寶寶就會開始與這個情緒共振。結果，胎兒可能會從自己的母親那裡接收到這個受困情緒。


    我從未見過胎兒自己製造出受困情緒的例子，但不論這個情緒是來自胎兒或母親的身體都無關緊要，重要的是，它都可以透過同樣的方式釋放：用磁鐵順著督脈滑過三次。


    ## 遺傳來的受困情緒


    如同你遺傳了父親、母親和其他祖先的眼睛顏色或鼻子形狀一樣，你也可能遺傳了他們的受困情緒。遺傳來的受困情緒，和胎兒期的受困情緒或其他任何類型的受困情緒是不同的。


    如果是遺傳來的情緒，你在受精卵形成的當下就從精子或卵子接收到那個情緒的能量了。


    當精卵結合時，其中一方已經帶著某些額外的情緒能量了。這個受精卵開始分裂，然後，存在原本那個受精卵中的一切也被複製了。隨著受精卵不斷分裂，這額外的情緒能量也會被複製。


    你當然可以詢問「是否有個我們現在可以釋放、遺傳來的受困情緒」，來揭露這類受困能量的存在。但大多數時候，你會在尋找一般受困情緒時，偶然發現這是遺傳來的受困情緒。


    ### 如何找到遺傳來的情緒？


    我的經驗是，潛意識會引導你到某個遺傳來的情緒所在的正確欄、列，但不會告訴你是哪一格所列的五種情緒中的哪一個，除非你在情緒名前面加上「遺傳來的」這個詞。


    舉例來說，假設你發現你要釋放的受困情緒在 B 欄第二列，並且測試了那一格裡面的每一個情緒，但得到的結果都是否定的。如果出現這種狀況，你就詢問：「這是一個遺傳來的受困情緒嗎?」若得到肯定的答案,就接著問:「這是遺傳來的———嗎?」空白處依序填入
    B 欄第二列那一格裡的五個情緒,直到你找到正確的那一個。


    一旦辨識出遺傳來的受困情緒,你也許會想要判斷該情緒是遺傳自受試者的父親或母親。若想進一步挖掘,你可以詢問這個遺傳來的情緒是源自祖父(母)或曾祖父(母)等等。一般來說,遺傳來的受困情緒大多源自父母或祖父母。


    幾年前,我女兒娜塔莉幫我進行遠距療癒時,在我身上找到一個遺傳來的受困情緒:無望感。當娜塔莉判定這個情緒源自我父親那邊一位二十二代以前的愛爾蘭女性祖先時,她突然覺得那位女士就在身邊。娜塔莉感覺得到她非常想要讓這個情緒從她的子孫身上被釋放掉,同時也感受到她對於這個情緒正在被釋放有多感激。


    在那之前,我並不知道有這個情緒存在,它就像背景聲一樣,我一直沒有察覺。而這個「無望感」被釋放的那一刻,就像背景聲突然不見了,我也因而知道這個情緒被釋放了!


    當一個遺傳來的受困情緒被釋放時,它會從所有透過血脈將這股情緒能量往下傳的祖先身上被釋放掉,無論往回追溯多少代。這是情緒密碼一個非常強大的地方!而因為受試者可能已經把這股能量傳給自己的孩子了,我建議你抱持清楚的意念,將受困情緒從每一個擁有這股能量的靈魂身上釋放掉,無論他們在世與否。釋放結束後,你可以透過肌肉測試確認是不是除了受試者之外,其他每一個可能遺傳了這股能量的人也都沒有了這個情緒。'
