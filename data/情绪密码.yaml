  md: '最後，我會以耶穌基督之名結束禱告，阿們。「阿們」二字意指「願事情這樣成就」。神會在自我療癒的路上祝福你。我也希望你將來可以在這條路上幫助其他許多人，我知道你行的。


    布萊利·尼爾森'
