- md: '## 情緒密碼 074


    感受到那種情緒。

    你可以把受困情緒想成一顆一顆的能量球，因為它們就是。即使只由能量組成，且不為肉眼所見，它們還是有各自的尺寸和形狀——大小從柳橙到甜瓜都有可能。

    被困住的情緒能量總是會滯留在我們體內的某一處，而位在它範圍內的身體組織往往會和那個受困的情緒能量共振；也就是說，那些身體組織會持續感受到那個情緒振動。


    假設你有個受困多年的憤怒情緒，而你毫不知情。結果，每當你碰到一個可能會讓你生氣的狀況時，有很大的機率你一定會生氣，因為——雖然聽來不可思議——有一部分的你已經生氣了。


    如果你身體的某個部分已經因為受困情緒而以憤怒的頻率振動著，那麼，當發生一件可能引發你憤怒反應的事情時，你整個人會更容易與憤怒共振。


    有時候，人們不了解為什麼自己這麼容易被惹毛，或者為何無法擺脫某些情緒。背後的原因很有可能是：他們正在與之搏鬥的那個情緒，因為他們幾乎不記得的某個過往經驗而被困在體內。


    這就是為什麼釋放受困情緒總能帶來其他療法遠不能及的成效。很多時候，那些難以擺脫的情緒和行為就這麼消失了。


    這似乎簡單到令人難以置信，然而，一旦親自體驗過，你就會明白了。在你釋放自己的受困情緒之前，你會一直背負著它們費力前進。


    ## 洛麗對高中時期啦啦隊長的怨恨之情


    這種現象我看過不知凡幾，下面這個發生在我病人身上的故事正好可以用來說明。洛麗有個受困情緒：怨恨。我回溯這個情緒最早是在何時出現，發現這情緒在她高中時被困住，是她對一個女生的怨恨所致。此時，洛麗表示：「噢，當然啦，我很清楚這是怎麼一回事。」她說，啦啦隊有個女生讓她很受不了，反正高中那幾年她就是對那個女生滿懷怨恨。那股怨恨從未真正離開，因為它已經被困在洛麗體內。


    洛麗說：「你知道嗎？我現在想起她還是會恨得牙癢癢，有點奇怪吧？我現在都四十三歲了，高中時代已經是好久以前的事，你一定以為我已經把她忘了，但我就是擺脫不了那股怨恨。高中畢業後我就沒見過她，但每次一想到那個人，我就會覺得內在充滿怨恨，然後再次感受到從前對她的那股怨恨之情。」


    我向洛麗說明，受困情緒會使人難以放下那些我們寧可忘掉的事。我利用一塊磁鐵在幾秒內釋放了她的受困情緒，然後她就離開診所了。幾天後，我又見到洛麗，她很興奮地說：「尼爾森醫師，真的有用耶！昨晚我在跟一位老朋友聊天時，提到那個女生的名字，我竟然毫無感覺——從高中到現在，這是第一次！像這種情況，我通常會感受到對她的怨恨，這次竟然一點感覺也沒有！真是太棒了，謝啦！」


    ## 科克大半輩子的臭脾氣


    科克一天到晚發脾氣，他將近八十歲時因為背痛問題來找我，我很快就發現顯然還有其他問題困擾著他。他大聲責罵我們診所的同仁，對我也很唐突無禮。此外，即使他的妻子全然支持他，對他很寬容，他對妻子的態度還是非常輕蔑。一開始，我以爲他這種行爲是背痛所致，但是，當他的背痛問題開始改善之後，他的行爲並沒有跟著改變。我決定檢查他是否有受困情緒，結果找到了憤怒、憤恨、焦慮、怨恨、挫折感和恐懼，其中有不少源自孩童時期。


    釋放了這些情緒後，科克整個人改頭換面。他現在是個貼心的丈夫，關心妻子更勝過自己的病痛。


    科克以前會不斷抱怨所有的事，現在他把焦點放在別人身上，臉上時常掛著微笑，也很少抱怨了。認識他的人都對他的轉變感到驚訝。如果他的受困情緒早一點被釋放掉，他也許會有不一樣的人生。


    科克一直都可以自由選擇自己的情緒狀態，但受困情緒讓他比較容易與它們共振，而不是抵抗它們的牽引。他身體的某些部分充滿憤怒、憤恨、焦慮、怨恨、挫折感和恐懼，這是他醒著的每一刻都面臨的問題，直到我們釋放了那些能量。


    ## 為何怕者恆怕？


    這一切都得要回到身體的量子本質來探討。每天早上起床時，我們都預期自己的身體應該和昨天、前天看起來一模一樣。它們看著是實心的，我們也能充分預料其應有的模樣。我們從來不會在穿衣服照鏡子時，看到手腳變成旋轉的能量團，但說實話，那才是我們的真實樣貌。


    無論在你眼中是什麼樣子，你的身體實際上是一個以緊密結構流動著的能量集合。


    當你把某個受困情緒的負面振動帶進那個結構時，整體的正常振動頻率就被改變了。


    你不一定感覺得到，當然也沒辦法憑肉眼看出不同，但有其他方法可以分辨。


    記得音叉效應吧？一個停留在你體內的受困情緒會吸引其他同頻率的情緒。例如，若那個受困情緒是恐懼，你會比較容易受驚、害怕。那個能量停留在你體內愈久，你愈容易感覺到它；隨著時間過去，你會開始認為自己就是個滿懷恐懼的人，因為你似乎大部分時間都在擔心、害怕。


    事實上，因為你身體的某個部分真的被那個受困情緒能量——或者說「恐懼球」——籠罩，你注定要失敗。你身體的一部分已經在持續感受那個情緒，因此，當一個讓人害怕的狀況出現時，你會更容易進入恐懼的狀態；換句話說，既然你身體的一部分已經與恐懼的頻率共振，身體跟著共振也只剩一小步了。


    ## 受困情緒滯留在哪裡？


    很多人問我，為什麼某個情緒會被困在身體的這個區域，而不是那個區域？我發現，受困情緒常常滯留在身體比較容易受影響的部位——那些部位的能量因為遺傳易感性、損傷或營養不良而減少或失衡，讓它們容易受影響。


    有時，「隱喻」也發揮作用。當你了解潛意識主宰了身體和夢境時，這個說法就很合理了。


    象徵和隱喻是潛意識的語言，受困情緒很自然會滯留在具有象徵意義的身體部位。


    假設你為一個小產的朋友感到哀痛，並且沒有在感受過那個情緒之後就拋開，反而讓它被困住了，那麼，該受困情緒如果滯留在你的子宮或乳房（滋養的器官），也不令人驚訝。或者，假設你正處於生命中的困難時期，事情接連出狀況，讓你感覺受挫、快要被壓垮了，彷彿全世界的重量都落在你一人肩上。這種情況下，受困情緒也許就會滯留在你的肩膀。事實上，身體的任何部位都可能變成情緒受困之處。


    如果沒有注意到，這種失衡的狀況可能會持續很多年，最後在你的身體和心理健康上引發真正的問題。


    ## ★ 受困情緒在心理層面的影響


    受困情緒會在身體及心理兩個不同層面影響你。我們先來探討心理層面的影響。受困情緒會讓人出現過激的情緒反應，接下來的幾個真實案例在在說明了，受困情緒對一個人的心理有著顯著影響。


    ### 瑪莉失去兒子的創傷


    瑪莉是個五十多歲、美麗又善良的女士，來找我看診的一年前，她的獨生愛子被殘忍地謀殺身亡。你可以想像，獨子死亡對瑪莉來說是個非常可怕的打擊；更糟的是，對凶手的審判在法庭一再被拖延，讓她想放也放不下。

    第一次來找我時，瑪莉正處於生命的低潮。在兒子被謀殺身亡後的一年間，她完全被困在失去所愛的哀痛中。經過測試，我們接連找到幾個跟她兒子及其死亡有關的受困情緒。釋放那些被困住的情緒之後，瑪莉自由了，回復到以前那個身心平衡的她。雖然還是會想念兒子，而且會永遠感覺到他已經不在了，瑪莉依然是我所認識最快樂、最身心平衡的人之一。


    ### 莎拉與甘迺迪遇刺案


    我永遠不會忘記莎拉。她是個七十一歲的老婦人，來找我看診。我透過肌肉測試詢問她的潛意識，她需要些什麼，結果發現她有個受困情緒：悲傷。

    你的記性也許不是特別好，但你的潛意識可是會把發生過的所有事情記得一清二楚，當然也了解每個受困情緒的詳情。潛意識知道受困情緒何時發生、那個情緒到底是什麼、有誰牽涉其中等。

    在向莎拉的潛意識探詢該受困情緒的相關細節時，我試著確定發生的時間點。結果，這個悲傷的情緒是在一九六三年被困在莎拉的身體裡。


    一個直覺讓我問道：「這股悲傷與甘迺迪遇刺有關嗎？」她的身體透過肌肉測試給了肯定的答案。得出這個結果時，莎拉立刻潸然淚下，邊哭邊說：「噢，沒錯，那件事對我影響至深。非但如此，當甘迺迪總統的兒子，小約翰·甘迺迪幾年前墜機身亡時，我又猛然想起那件事。我什麼都沒辦法做，在家哭了好幾天。」


    受困情緒不斷發出負面振動，讓瑪莉失去平衡、難以招架。那些情緒被消除之後，她就能夠以比較健康的方式面對生命中的失落了。


    ## 受困情緒會放大你的反應


    如果你年紀夠大，記得一九六三年十一月那一天，就會想起那件事多令人震驚、傷心。事發當天，莎拉整個人都沉浸在悲傷之中，這個情緒強烈到她的身體沒辦法處理，結果就被困在她體內了。


    受困情緒會產生一個特定的有力振動，此外，我們的心智也將受困情緒與某些特定事件連結在一起。以莎拉來說，正以自身特殊頻率共振著的悲傷情緒，是與一位甘迺迪家族的人突然死亡連結在一起。當小約翰·甘迺迪悲慘身亡後，她對這個事件的正常悲傷就已被早已存在她體內的受困情緒放大了。她身體的一部分——這個情緒的能量滯留的部位——將近四十年來都沉浸在甘迺迪總統死亡的悲傷中，已經盡可能地運作了。


    得知小約翰·甘迺迪死亡時，莎拉整個身體都和受困情緒共振起來。結果，她不是哭過一場就繼續過日子，而是一連哭了好幾天，且一九六三年十一月那天的痛苦也火力全開地回到她身上。事實上，那份痛苦根本從未真正離開她的身體。說起來很不可思議，她身體的某個部分從來沒有停止感受那股深沉的悲傷。


    這個例子充分說明受困情緒可能持續存在許多年，並導致你以一種誇大的方式體驗類似的情緒。

    如果受困情緒從未被釋放，你剩下的人生可能都會感受到那份痛苦與過激反應。然而，這一切根本不必要，因為你的受困情緒可以輕易被擺脫掉。


    ## 找到被受困情緒影響的身體組織


    在釋放莎拉的悲傷之前，我決定對這個困在她體內近四十年之久的情緒一探究竟。這麼多年來它都存在身體何處？一直被籠罩在這深沉的悲傷之中費力運作的是哪些身體組織？這些組織又受到什麼樣的影響？潛意識對答案一清二楚，所以找出答案跟問問題一樣簡單。結果，得到的答案讓我們兩人都大吃一驚。


    肌肉測試的結果顯示，被困住的悲傷情緒滯留在她左邊的乳房。

    莎拉和我對望一眼，大感驚奇。她是一位乳癌存活者，四年前透過手術切除了左邊的乳房。這個受困情緒的能量滯留在她的左乳房。為什麼是這裡，而不是身體其他地方？也許是因為某種輕度感染、以前受過的傷或其他失衡狀況，讓她左邊的乳房變得比較脆弱，容易受影響。

    我則是覺得，這個情緒之所以被困在如此靠近心臟的身體組織中，源自她對甘迺迪總統的敬愛。


    ## 受困情緒在身體層面的影響


    持續被受困情緒扭曲的身體組織遲早會因為它的影響而受苦。


    如果把一個磁鐵放在舊型的映像管電視螢幕或電腦螢幕前，磁鐵的磁場會干擾螢幕中的電子正常流動，你就會看見眼前的畫面明顯扭曲了；如果將磁鐵靠得太近或停留在那裡太久，畫面會永遠扭曲，螢幕甚至會壞掉。受困情緒就是以類似方式在影響我們的身體。畢竟，身體是由能量組成，受困情緒也是，但受困情緒是負面能量，會扭曲身體組織，如同磁鐵讓電視螢幕上的畫面變形一樣。身體組織長期被扭曲的結果就是疼痛和功能失調，這就是為什麼釋放受困情緒常常能夠立刻緩解不適或其他症狀，甚至可能逆轉某些疾病。


    我認為這是很值得深入研究的領域，可以對疾病如何形成提供深切的洞見。


    我的經驗是，受困情緒會對身體組織造成令人不可置信的影響。那些身體組織長期受到刺激，不論原因為何，這個受困情緒多年來一直留在莎拉體內，使該組織持續處於輕微發炎的狀態，而這可能就是她罹患癌症的一個原因。這些徵兆沒有及時被看出來，最後為了拯救她的性命，只得切除左乳房，但悲傷並沒有被切掉，留了下來。釋放被困在她體內的悲傷幫助莎拉在情緒上療癒，不過，我要是早幾年發現就好了，這樣她也許就能免於承受那麼多痛苦，甚至免於罹患乳癌。


    ## 羅雪兒的肺癌


    羅雪兒第一次來找我治療時，肺部有個棒球大小的腫瘤，正在接受化療。我詢問她的身體，這個惡性的肺部組織中是否有受困情緒，結果得到肯定的答案。


    羅雪兒腫瘤中的受困情緒是許多年前產生的，那時她還是個年輕女孩。羅雪兒是菲律賓人，嫁給當時駐紮在菲律賓的美國水手。兩人有了孩子後，羅雪兒的丈夫每次出海都超過六個月。在意識層次上，她預期丈夫會經常不在身邊，並逐漸接受這樣的分離，但一個人撫養孩子還是很難、很孤單。意識層次上，羅雪兒相信丈夫不在也沒關係，她的身體卻顯示出，怨恨、挫折感、被遺棄等情緒在這段期間被困於她體內。

    「噢，不不不，」羅雪兒堅持，「我從來沒有那種感覺。我知道丹尼必須離開，我可以理解，我自己一個人不要緊。」然而，當我用磁鐵滑過她的背部後，羅雪兒坐直身子，搖著頭說：「這真是太奇怪了，我竟然感覺身體變輕許多，彷彿胸口有個重物被移開了。」


    由於羅雪兒來我的診所必須開上九十分鐘的車，我只幫她看過三次診，不過這已經足夠讓我清除所有出現在她腫瘤部位的受困情緒。約莫五週後，她來到我的辦公室，欣喜若狂地宣布好消息：她的醫生重新幫她照了
    X 光，發現她肺部的腫瘤完全消失了。

    受困情緒可能是促成這個癌症形成的重要原因嗎？我相信是。


    當然，因為羅雪兒當時也正在接受化療，我無法證明腫瘤之所以消失是因為受困情緒被釋放。不過，移除滯留在她胸口的情緒也許讓化療的效果變得更好，也提供了她身體療癒所需的條件。

    受困情緒最讓我訝異的是它導致身體痛楚的能力。我第一次碰見這種現象的經驗非常具有戲劇性。有一天，我妻子琴恩突然感覺左下腹一陣劇烈疼痛，肌肉測試結果顯示這股疼痛源自她左邊的卵巢，而且是情緒所致。我立刻開始為她尋找哪個情緒該「負責」，讓我驚訝的是，我找到的情緒不是一個，而是六個。你後來會知道，我們一次釋放一個受困情緒。有時候，你會發現一個以上的情緒「套疊」在同一部位，琴恩的狀況就是這樣。除了最後一個情緒，其他所有情緒都跟與琴恩關係密切的女性生命中發生的悲劇或煩心事有關。每找出一個情緒，我便將之釋放。


    驚人的是，每釋放一個受困情緒，琴恩的疼痛程度立刻顯著下降。清除五個受困情緒後，她的疼痛只剩一點點。


    她的身體指出還有一個受困情緒。測試結果顯示，有一個覺得自己「無用」的情緒從琴恩幼稚園時期就被困在她體內。


    那是一九六〇年，是尼克森和甘迺迪兩人爭奪美國總統大位那一年。琴恩的老師告訴她，學校選出一男一女接受當地報社採訪，談即將來臨的總統大選，而她正是被選中的那個小女生。她在訪問中會被問及一些關於總統候選人的問題，特別是如果她有投票權會投給誰。


    小琴恩為此興奮不已，而那一天很快就來了。她被領進學校為採訪準備的房間裡，工作人員擺了兩張椅子給兩位小朋友坐。採訪者先問小男生問題，同時因為要拍照，閃光燈打在他身上。雖然那天琴恩也被拍了照，但不知為何，採訪者完全沒有問她問題。除了拍照時被告知要如何擺姿勢，她幾乎徹底被忽略，然後採訪就這麼突然結束了。被帶回教室時，琴恩滿肚子疑惑。慢慢地，有個念頭開始在她心裡萌芽：她一定是個無足輕重的人。


    琴恩開始覺得自己沒用，這個情緒強烈到被困在她身體裡。情緒是能量，而由其特定振動可以判別這是哪一種情緒。一個受困情緒就像一個小能量球，總是「降落」或滯留在身體某處。因為某個原因，這個被困住的「無用感」滯留在琴恩左邊的卵巢三十年。釋放這最後一個受困情緒時，琴恩剩餘的一絲疼痛瞬間消失。她從地上站起來，我倆望著彼此，都對剛剛經歷的一切驚訝不已。在此之後，琴恩的那個部位再也沒有痛過。我不禁想著，如果我們沒有釋放她卵巢上那些能量，她的健康不知會承受什麼樣的後果。


    另一個因受困情緒導致身體疼痛的例子是傑克。傑克是我的一個病人，來找我治療令他痛苦難耐好幾個月的網球肘時是四十二歲。他的右前臂痛到沒辦法轉動鑰匙發動汽車。一開始，我採用傳統的整脊和物理治療；約莫一週後，他的狀況沒什麼改善，讓我很驚訝，因為以整脊療法處理網球肘問題的成果通常很不錯。傑克的狀況沒有改善讓我感覺受挫。那時我剛進入受困情緒的領域，沒想到要去詢問傑克的潛意識他的問題是否和情緒有關。我剛開始了解受困情緒的威力，以及它們可能造成許多不同的症狀。我知道受困情緒可能導致身體疼痛，但我也知道網球肘是一種發炎反應，我以前成功治癒過。不過，既然以傳統方法治療沒用，我決定詢問傑克的潛意識，受困情緒是不是他網球肘的根本原因。當他的身體回答「是」時，我有點訝異。


    運用情緒密碼，我們找出第一個受困情緒：自卑感。這個情緒被困在他體內的原因和他高中時心儀的一位女生有關。我將之釋放，而傑克對他的手臂立即感受到的效果大吃一驚，因為他手肘的疼痛突然顯著減少。我再次詢問是否還有可以釋放的受困情緒，他的身體回答「是」，因此我開始問下一個情緒是什麼、何時被困住的、是否跟某個特定的人有關。結果，這個受困情緒也源自傑克的高中時期，不過這次是跟另一個女孩有關。在那段不算美滿的關係裡，傑克有個「緊張」的情緒被困住了，而當我們將之釋放時，傑克手肘的疼痛更是大幅減輕。我們持續重複這個過程，直到總共移除了五個受困情緒。


    傑克的妻子陪他一起來就診，饒富興味地看著我幫他找出五個源自高中時代、每一個都不同女孩子有關的受困情緒。


    每當釋放一個受困情緒，傑克前臂的不適程度就會明顯減輕。最後一個情緒被釋放那一刻，他的疼痛完全消失，手臂可以這樣那樣轉了！他模仿轉動汽車鑰匙的動作，怎麼轉都不會痛。傑克的肘關節突然恢復以前的靈活，而且之前我用手指按摩他前臂的肌肉，他會疼痛難耐，現在竟然一點痛楚也沒有。這樣的結果讓在場所有見證者都大為驚奇。


    傑克高中時期是個網球選手，但有好多年沒有拿起球拍了。受困情緒往往會被吸引到身體比較脆弱的地方，亦即那些有過多壓力、受了傷、受到感染，或是有其他某種失衡狀況的部位。這些受困情緒滯留在傑克的前臂組織，我認為是因為高中時代他的前臂一再承受壓力，甚至受過一定程度的傷；然後同時期，他因感情受挫而產生受困情緒——記得受困情緒很有可能停留在身體最脆弱的部位吧？


    話說回來，若非親眼看見，我大概也很難相信。


    數分鐘之內，傑克的疼痛就從讓他無法活動到完全消失。


    儘管親眼見證，我依舊對情緒可以直接導致這樣劇烈的身體疼痛感到萬分驚訝。一路使用情緒密碼下來，我發現受困情緒會嚴重損害病人的健康，許多症狀可以完全或部分歸咎於受困情緒。強大的療癒效果會在受困情緒被釋放後顯現出來。誰想得到藉由消除受困情緒可以完全避免多少痛苦、不快樂和慢性疾病！我很快得知，有些情緒被困在我病人體內的時間比我原先以為的更久。這些病人多年來持續承受某種其實很容易擺脫的東西帶來的痛苦，一想到這個，我就覺得很難過。'
  mdcn: '## 情緒密碼 074


    感受到那種情緒。

    你可以把受困情緒想成一顆一顆的能量球，因為它們就是。即使只由能量組成，且不為肉眼所見，它們還是有各自的尺寸和形狀——大小從柳橙到甜瓜都有可能。

    被困住的情緒能量總是會滯留在我們體內的某一處，而位在它範圍內的身體組織往往會和那個受困的情緒能量共振；也就是說，那些身體組織會持續感受到那個情緒振動。


    假設你有個受困多年的憤怒情緒，而你毫不知情。結果，每當你碰到一個可能會讓你生氣的狀況時，有很大的機率你一定會生氣，因為——雖然聽來不可思議——有一部分的你已經生氣了。


    如果你身體的某個部分已經因為受困情緒而以憤怒的頻率振動著，那麼，當發生一件可能引發你憤怒反應的事情時，你整個人會更容易與憤怒共振。


    有時候，人們不了解為什麼自己這麼容易被惹毛，或者為何無法擺脫某些情緒。背後的原因很有可能是：他們正在與之搏鬥的那個情緒，因為他們幾乎不記得的某個過往經驗而被困在體內。


    這就是為什麼釋放受困情緒總能帶來其他療法遠不能及的成效。很多時候，那些難以擺脫的情緒和行為就這麼消失了。


    這似乎簡單到令人難以置信，然而，一旦親自體驗過，你就會明白了。在你釋放自己的受困情緒之前，你會一直背負著它們費力前進。


    ## 洛麗對高中時期啦啦隊長的怨恨之情


    這種現象我看過不知凡幾，下面這個發生在我病人身上的故事正好可以用來說明。洛麗有個受困情緒：怨恨。我回溯這個情緒最早是在何時出現，發現這情緒在她高中時被困住，是她對一個女生的怨恨所致。此時，洛麗表示：「噢，當然啦，我很清楚這是怎麼一回事。」她說，啦啦隊有個女生讓她很受不了，反正高中那幾年她就是對那個女生滿懷怨恨。那股怨恨從未真正離開，因為它已經被困在洛麗體內。


    洛麗說：「你知道嗎？我現在想起她還是會恨得牙癢癢，有點奇怪吧？我現在都四十三歲了，高中時代已經是好久以前的事，你一定以為我已經把她忘了，但我就是擺脫不了那股怨恨。高中畢業後我就沒見過她，但每次一想到那個人，我就會覺得內在充滿怨恨，然後再次感受到從前對她的那股怨恨之情。」


    我向洛麗說明，受困情緒會使人難以放下那些我們寧可忘掉的事。我利用一塊磁鐵在幾秒內釋放了她的受困情緒，然後她就離開診所了。幾天後，我又見到洛麗，她很興奮地說：「尼爾森醫師，真的有用耶！昨晚我在跟一位老朋友聊天時，提到那個女生的名字，我竟然毫無感覺——從高中到現在，這是第一次！像這種情況，我通常會感受到對她的怨恨，這次竟然一點感覺也沒有！真是太棒了，謝啦！」


    ## 科克大半輩子的臭脾氣


    科克一天到晚發脾氣，他將近八十歲時因為背痛問題來找我，我很快就發現顯然還有其他問題困擾著他。他大聲責罵我們診所的同仁，對我也很唐突無禮。此外，即使他的妻子全然支持他，對他很寬容，他對妻子的態度還是非常輕蔑。一開始，我以爲他這種行爲是背痛所致，但是，當他的背痛問題開始改善之後，他的行爲並沒有跟著改變。我決定檢查他是否有受困情緒，結果找到了憤怒、憤恨、焦慮、怨恨、挫折感和恐懼，其中有不少源自孩童時期。


    釋放了這些情緒後，科克整個人改頭換面。他現在是個貼心的丈夫，關心妻子更勝過自己的病痛。


    科克以前會不斷抱怨所有的事，現在他把焦點放在別人身上，臉上時常掛著微笑，也很少抱怨了。認識他的人都對他的轉變感到驚訝。如果他的受困情緒早一點被釋放掉，他也許會有不一樣的人生。


    科克一直都可以自由選擇自己的情緒狀態，但受困情緒讓他比較容易與它們共振，而不是抵抗它們的牽引。他身體的某些部分充滿憤怒、憤恨、焦慮、怨恨、挫折感和恐懼，這是他醒著的每一刻都面臨的問題，直到我們釋放了那些能量。


    ## 為何怕者恆怕？


    這一切都得要回到身體的量子本質來探討。每天早上起床時，我們都預期自己的身體應該和昨天、前天看起來一模一樣。它們看著是實心的，我們也能充分預料其應有的模樣。我們從來不會在穿衣服照鏡子時，看到手腳變成旋轉的能量團，但說實話，那才是我們的真實樣貌。


    無論在你眼中是什麼樣子，你的身體實際上是一個以緊密結構流動著的能量集合。


    當你把某個受困情緒的負面振動帶進那個結構時，整體的正常振動頻率就被改變了。


    你不一定感覺得到，當然也沒辦法憑肉眼看出不同，但有其他方法可以分辨。


    記得音叉效應吧？一個停留在你體內的受困情緒會吸引其他同頻率的情緒。例如，若那個受困情緒是恐懼，你會比較容易受驚、害怕。那個能量停留在你體內愈久，你愈容易感覺到它；隨著時間過去，你會開始認為自己就是個滿懷恐懼的人，因為你似乎大部分時間都在擔心、害怕。


    事實上，因為你身體的某個部分真的被那個受困情緒能量——或者說「恐懼球」——籠罩，你注定要失敗。你身體的一部分已經在持續感受那個情緒，因此，當一個讓人害怕的狀況出現時，你會更容易進入恐懼的狀態；換句話說，既然你身體的一部分已經與恐懼的頻率共振，身體跟著共振也只剩一小步了。


    ## 受困情緒滯留在哪裡？


    很多人問我，為什麼某個情緒會被困在身體的這個區域，而不是那個區域？我發現，受困情緒常常滯留在身體比較容易受影響的部位——那些部位的能量因為遺傳易感性、損傷或營養不良而減少或失衡，讓它們容易受影響。


    有時，「隱喻」也發揮作用。當你了解潛意識主宰了身體和夢境時，這個說法就很合理了。


    象徵和隱喻是潛意識的語言，受困情緒很自然會滯留在具有象徵意義的身體部位。


    假設你為一個小產的朋友感到哀痛，並且沒有在感受過那個情緒之後就拋開，反而讓它被困住了，那麼，該受困情緒如果滯留在你的子宮或乳房（滋養的器官），也不令人驚訝。或者，假設你正處於生命中的困難時期，事情接連出狀況，讓你感覺受挫、快要被壓垮了，彷彿全世界的重量都落在你一人肩上。這種情況下，受困情緒也許就會滯留在你的肩膀。事實上，身體的任何部位都可能變成情緒受困之處。


    如果沒有注意到，這種失衡的狀況可能會持續很多年，最後在你的身體和心理健康上引發真正的問題。


    ## ★ 受困情緒在心理層面的影響


    受困情緒會在身體及心理兩個不同層面影響你。我們先來探討心理層面的影響。受困情緒會讓人出現過激的情緒反應，接下來的幾個真實案例在在說明了，受困情緒對一個人的心理有著顯著影響。


    ### 瑪莉失去兒子的創傷


    瑪莉是個五十多歲、美麗又善良的女士，來找我看診的一年前，她的獨生愛子被殘忍地謀殺身亡。你可以想像，獨子死亡對瑪莉來說是個非常可怕的打擊；更糟的是，對凶手的審判在法庭一再被拖延，讓她想放也放不下。

    第一次來找我時，瑪莉正處於生命的低潮。在兒子被謀殺身亡後的一年間，她完全被困在失去所愛的哀痛中。經過測試，我們接連找到幾個跟她兒子及其死亡有關的受困情緒。釋放那些被困住的情緒之後，瑪莉自由了，回復到以前那個身心平衡的她。雖然還是會想念兒子，而且會永遠感覺到他已經不在了，瑪莉依然是我所認識最快樂、最身心平衡的人之一。


    ### 莎拉與甘迺迪遇刺案


    我永遠不會忘記莎拉。她是個七十一歲的老婦人，來找我看診。我透過肌肉測試詢問她的潛意識，她需要些什麼，結果發現她有個受困情緒：悲傷。

    你的記性也許不是特別好，但你的潛意識可是會把發生過的所有事情記得一清二楚，當然也了解每個受困情緒的詳情。潛意識知道受困情緒何時發生、那個情緒到底是什麼、有誰牽涉其中等。

    在向莎拉的潛意識探詢該受困情緒的相關細節時，我試著確定發生的時間點。結果，這個悲傷的情緒是在一九六三年被困在莎拉的身體裡。


    一個直覺讓我問道：「這股悲傷與甘迺迪遇刺有關嗎？」她的身體透過肌肉測試給了肯定的答案。得出這個結果時，莎拉立刻潸然淚下，邊哭邊說：「噢，沒錯，那件事對我影響至深。非但如此，當甘迺迪總統的兒子，小約翰·甘迺迪幾年前墜機身亡時，我又猛然想起那件事。我什麼都沒辦法做，在家哭了好幾天。」


    受困情緒不斷發出負面振動，讓瑪莉失去平衡、難以招架。那些情緒被消除之後，她就能夠以比較健康的方式面對生命中的失落了。


    ## 受困情緒會放大你的反應


    如果你年紀夠大，記得一九六三年十一月那一天，就會想起那件事多令人震驚、傷心。事發當天，莎拉整個人都沉浸在悲傷之中，這個情緒強烈到她的身體沒辦法處理，結果就被困在她體內了。


    受困情緒會產生一個特定的有力振動，此外，我們的心智也將受困情緒與某些特定事件連結在一起。以莎拉來說，正以自身特殊頻率共振著的悲傷情緒，是與一位甘迺迪家族的人突然死亡連結在一起。當小約翰·甘迺迪悲慘身亡後，她對這個事件的正常悲傷就已被早已存在她體內的受困情緒放大了。她身體的一部分——這個情緒的能量滯留的部位——將近四十年來都沉浸在甘迺迪總統死亡的悲傷中，已經盡可能地運作了。


    得知小約翰·甘迺迪死亡時，莎拉整個身體都和受困情緒共振起來。結果，她不是哭過一場就繼續過日子，而是一連哭了好幾天，且一九六三年十一月那天的痛苦也火力全開地回到她身上。事實上，那份痛苦根本從未真正離開她的身體。說起來很不可思議，她身體的某個部分從來沒有停止感受那股深沉的悲傷。


    這個例子充分說明受困情緒可能持續存在許多年，並導致你以一種誇大的方式體驗類似的情緒。

    如果受困情緒從未被釋放，你剩下的人生可能都會感受到那份痛苦與過激反應。然而，這一切根本不必要，因為你的受困情緒可以輕易被擺脫掉。


    ## 找到被受困情緒影響的身體組織


    在釋放莎拉的悲傷之前，我決定對這個困在她體內近四十年之久的情緒一探究竟。這麼多年來它都存在身體何處？一直被籠罩在這深沉的悲傷之中費力運作的是哪些身體組織？這些組織又受到什麼樣的影響？潛意識對答案一清二楚，所以找出答案跟問問題一樣簡單。結果，得到的答案讓我們兩人都大吃一驚。


    肌肉測試的結果顯示，被困住的悲傷情緒滯留在她左邊的乳房。

    莎拉和我對望一眼，大感驚奇。她是一位乳癌存活者，四年前透過手術切除了左邊的乳房。這個受困情緒的能量滯留在她的左乳房。為什麼是這裡，而不是身體其他地方？也許是因為某種輕度感染、以前受過的傷或其他失衡狀況，讓她左邊的乳房變得比較脆弱，容易受影響。

    我則是覺得，這個情緒之所以被困在如此靠近心臟的身體組織中，源自她對甘迺迪總統的敬愛。


    ## 受困情緒在身體層面的影響


    持續被受困情緒扭曲的身體組織遲早會因為它的影響而受苦。


    如果把一個磁鐵放在舊型的映像管電視螢幕或電腦螢幕前，磁鐵的磁場會干擾螢幕中的電子正常流動，你就會看見眼前的畫面明顯扭曲了；如果將磁鐵靠得太近或停留在那裡太久，畫面會永遠扭曲，螢幕甚至會壞掉。受困情緒就是以類似方式在影響我們的身體。畢竟，身體是由能量組成，受困情緒也是，但受困情緒是負面能量，會扭曲身體組織，如同磁鐵讓電視螢幕上的畫面變形一樣。身體組織長期被扭曲的結果就是疼痛和功能失調，這就是為什麼釋放受困情緒常常能夠立刻緩解不適或其他症狀，甚至可能逆轉某些疾病。


    我認為這是很值得深入研究的領域，可以對疾病如何形成提供深切的洞見。


    我的經驗是，受困情緒會對身體組織造成令人不可置信的影響。那些身體組織長期受到刺激，不論原因為何，這個受困情緒多年來一直留在莎拉體內，使該組織持續處於輕微發炎的狀態，而這可能就是她罹患癌症的一個原因。這些徵兆沒有及時被看出來，最後為了拯救她的性命，只得切除左乳房，但悲傷並沒有被切掉，留了下來。釋放被困在她體內的悲傷幫助莎拉在情緒上療癒，不過，我要是早幾年發現就好了，這樣她也許就能免於承受那麼多痛苦，甚至免於罹患乳癌。


    ## 羅雪兒的肺癌


    羅雪兒第一次來找我治療時，肺部有個棒球大小的腫瘤，正在接受化療。我詢問她的身體，這個惡性的肺部組織中是否有受困情緒，結果得到肯定的答案。


    羅雪兒腫瘤中的受困情緒是許多年前產生的，那時她還是個年輕女孩。羅雪兒是菲律賓人，嫁給當時駐紮在菲律賓的美國水手。兩人有了孩子後，羅雪兒的丈夫每次出海都超過六個月。在意識層次上，她預期丈夫會經常不在身邊，並逐漸接受這樣的分離，但一個人撫養孩子還是很難、很孤單。意識層次上，羅雪兒相信丈夫不在也沒關係，她的身體卻顯示出，怨恨、挫折感、被遺棄等情緒在這段期間被困於她體內。

    「噢，不不不，」羅雪兒堅持，「我從來沒有那種感覺。我知道丹尼必須離開，我可以理解，我自己一個人不要緊。」然而，當我用磁鐵滑過她的背部後，羅雪兒坐直身子，搖著頭說：「這真是太奇怪了，我竟然感覺身體變輕許多，彷彿胸口有個重物被移開了。」


    由於羅雪兒來我的診所必須開上九十分鐘的車，我只幫她看過三次診，不過這已經足夠讓我清除所有出現在她腫瘤部位的受困情緒。約莫五週後，她來到我的辦公室，欣喜若狂地宣布好消息：她的醫生重新幫她照了
    X 光，發現她肺部的腫瘤完全消失了。

    受困情緒可能是促成這個癌症形成的重要原因嗎？我相信是。


    當然，因為羅雪兒當時也正在接受化療，我無法證明腫瘤之所以消失是因為受困情緒被釋放。不過，移除滯留在她胸口的情緒也許讓化療的效果變得更好，也提供了她身體療癒所需的條件。

    受困情緒最讓我訝異的是它導致身體痛楚的能力。我第一次碰見這種現象的經驗非常具有戲劇性。有一天，我妻子琴恩突然感覺左下腹一陣劇烈疼痛，肌肉測試結果顯示這股疼痛源自她左邊的卵巢，而且是情緒所致。我立刻開始為她尋找哪個情緒該「負責」，讓我驚訝的是，我找到的情緒不是一個，而是六個。你後來會知道，我們一次釋放一個受困情緒。有時候，你會發現一個以上的情緒「套疊」在同一部位，琴恩的狀況就是這樣。除了最後一個情緒，其他所有情緒都跟與琴恩關係密切的女性生命中發生的悲劇或煩心事有關。每找出一個情緒，我便將之釋放。


    驚人的是，每釋放一個受困情緒，琴恩的疼痛程度立刻顯著下降。清除五個受困情緒後，她的疼痛只剩一點點。


    她的身體指出還有一個受困情緒。測試結果顯示，有一個覺得自己「無用」的情緒從琴恩幼稚園時期就被困在她體內。


    那是一九六〇年，是尼克森和甘迺迪兩人爭奪美國總統大位那一年。琴恩的老師告訴她，學校選出一男一女接受當地報社採訪，談即將來臨的總統大選，而她正是被選中的那個小女生。她在訪問中會被問及一些關於總統候選人的問題，特別是如果她有投票權會投給誰。


    小琴恩為此興奮不已，而那一天很快就來了。她被領進學校為採訪準備的房間裡，工作人員擺了兩張椅子給兩位小朋友坐。採訪者先問小男生問題，同時因為要拍照，閃光燈打在他身上。雖然那天琴恩也被拍了照，但不知為何，採訪者完全沒有問她問題。除了拍照時被告知要如何擺姿勢，她幾乎徹底被忽略，然後採訪就這麼突然結束了。被帶回教室時，琴恩滿肚子疑惑。慢慢地，有個念頭開始在她心裡萌芽：她一定是個無足輕重的人。


    琴恩開始覺得自己沒用，這個情緒強烈到被困在她身體裡。情緒是能量，而由其特定振動可以判別這是哪一種情緒。一個受困情緒就像一個小能量球，總是「降落」或滯留在身體某處。因為某個原因，這個被困住的「無用感」滯留在琴恩左邊的卵巢三十年。釋放這最後一個受困情緒時，琴恩剩餘的一絲疼痛瞬間消失。她從地上站起來，我倆望著彼此，都對剛剛經歷的一切驚訝不已。在此之後，琴恩的那個部位再也沒有痛過。我不禁想著，如果我們沒有釋放她卵巢上那些能量，她的健康不知會承受什麼樣的後果。


    另一個因受困情緒導致身體疼痛的例子是傑克。傑克是我的一個病人，來找我治療令他痛苦難耐好幾個月的網球肘時是四十二歲。他的右前臂痛到沒辦法轉動鑰匙發動汽車。一開始，我採用傳統的整脊和物理治療；約莫一週後，他的狀況沒什麼改善，讓我很驚訝，因為以整脊療法處理網球肘問題的成果通常很不錯。傑克的狀況沒有改善讓我感覺受挫。那時我剛進入受困情緒的領域，沒想到要去詢問傑克的潛意識他的問題是否和情緒有關。我剛開始了解受困情緒的威力，以及它們可能造成許多不同的症狀。我知道受困情緒可能導致身體疼痛，但我也知道網球肘是一種發炎反應，我以前成功治癒過。不過，既然以傳統方法治療沒用，我決定詢問傑克的潛意識，受困情緒是不是他網球肘的根本原因。當他的身體回答「是」時，我有點訝異。


    運用情緒密碼，我們找出第一個受困情緒：自卑感。這個情緒被困在他體內的原因和他高中時心儀的一位女生有關。我將之釋放，而傑克對他的手臂立即感受到的效果大吃一驚，因為他手肘的疼痛突然顯著減少。我再次詢問是否還有可以釋放的受困情緒，他的身體回答「是」，因此我開始問下一個情緒是什麼、何時被困住的、是否跟某個特定的人有關。結果，這個受困情緒也源自傑克的高中時期，不過這次是跟另一個女孩有關。在那段不算美滿的關係裡，傑克有個「緊張」的情緒被困住了，而當我們將之釋放時，傑克手肘的疼痛更是大幅減輕。我們持續重複這個過程，直到總共移除了五個受困情緒。


    傑克的妻子陪他一起來就診，饒富興味地看著我幫他找出五個源自高中時代、每一個都不同女孩子有關的受困情緒。


    每當釋放一個受困情緒，傑克前臂的不適程度就會明顯減輕。最後一個情緒被釋放那一刻，他的疼痛完全消失，手臂可以這樣那樣轉了！他模仿轉動汽車鑰匙的動作，怎麼轉都不會痛。傑克的肘關節突然恢復以前的靈活，而且之前我用手指按摩他前臂的肌肉，他會疼痛難耐，現在竟然一點痛楚也沒有。這樣的結果讓在場所有見證者都大為驚奇。


    傑克高中時期是個網球選手，但有好多年沒有拿起球拍了。受困情緒往往會被吸引到身體比較脆弱的地方，亦即那些有過多壓力、受了傷、受到感染，或是有其他某種失衡狀況的部位。這些受困情緒滯留在傑克的前臂組織，我認為是因為高中時代他的前臂一再承受壓力，甚至受過一定程度的傷；然後同時期，他因感情受挫而產生受困情緒——記得受困情緒很有可能停留在身體最脆弱的部位吧？


    話說回來，若非親眼看見，我大概也很難相信。


    數分鐘之內，傑克的疼痛就從讓他無法活動到完全消失。


    儘管親眼見證，我依舊對情緒可以直接導致這樣劇烈的身體疼痛感到萬分驚訝。一路使用情緒密碼下來，我發現受困情緒會嚴重損害病人的健康，許多症狀可以完全或部分歸咎於受困情緒。強大的療癒效果會在受困情緒被釋放後顯現出來。誰想得到藉由消除受困情緒可以完全避免多少痛苦、不快樂和慢性疾病！我很快得知，有些情緒被困在我病人體內的時間比我原先以為的更久。這些病人多年來持續承受某種其實很容易擺脫的東西帶來的痛苦，一想到這個，我就覺得很難過。'
