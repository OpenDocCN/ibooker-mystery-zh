    # ## 令人滿意的結果


    萊莉的狀況持續改善，沒多久，她的醫生就告訴貝蒂，他們認為萊莉沒有腦性麻痺和智能遲滯現象，要取消之前的診斷。


    萊莉過去那些乖張孤僻、捉摸不定的行為都消失了，現在的她就像個全新的小女孩。


    經驗告訴我們，許多孩童的行為及健康問題都可以透過情緒密碼獲得長足的改善與進步。


    而萊莉的故事讓我們知道，一個孩子的健康與心理發展，和體內的情緒能量有著強大的運動關係。此外，能夠見證一條年輕生命獲得自由，切斷負面受困能量，不再被受困能量威脅，我心中充滿了難以言說的感激。


    # ★ 為動物進行替代者測試


    替代者測試對動物而言是最好的方法。當然，如果動物能明白我們在做什麼，我想牠們大概就可以直接參與測試！但我還是直接幫牠們安排一位替代者比較快。


    假設你想要測試你的馬，可以請替代者直接碰觸馬，然後將你要問馬的問題說出來，接著在替代者身上執行測試。


    我在測試動物時，總是直接對牠們說話，就像對人說話一樣。動物也許不明白字面上的意思，但牠們似乎可以接收到我們的想法傳達出來的情緒意念。相信我，動物可以了解我們要對牠們做什麼，牠們感受意念的能力很多時候甚至超越人類。


    替代者測試適用於貓、狗及其他所有動物。我有許多非常精采的情緒密碼療癒經驗都發生在動物身上，我會在下一章詳述這些故事。


    # 為失去意識的人測試


    替代者測試讓我們可以為失去意識或陷入昏迷的人進行測試。當事人即使無法做出回應或透過言語回答，他們的潛意識依舊一刻不停地運作著。一個人雖然失去意識，他的身體功能還是在運作，呼吸正常，心臟也持續跳動，其潛意識依舊隨時對外在環境保持警覺，以確保一切都在控制之中。當你問潛意識問題，它會知道答案。假使當事人處於失去意識的狀態，無法主動參與測試，替代者測試就成了最佳解決方案。


    請注意，肌肉測試不應該用在緊急狀況，例如需要進行搶救時，心肺復甦術才是合宜的措施。


    幾年前，我父親因為大腦動脈瘤陷入昏迷，我真是憂心忡忡，想盡一切辦法幫助他。我和琴恩一起去醫院看他，當時他身體插滿管子，還有其他管線纏繞在身上，那樣的情況根本不允許我們接近他到可以為他進行肌肉測試的距離。


    我只好請琴恩當我父親的替代者。雖然他處於昏迷狀態，我們依舊可以進入他的潛意識。透過測試，我們找出除了醫護人員所做的處置之外對他最有幫助的辦法。那次執行替代者測試的經驗，讓我對這項恩典充滿感激之情。


