- img_proc: true
  md: '我們還是決定收養她。她生母在懷孕期間吸食毒品，導致茉莉的健康狀況特別不好，而且常常生病。因為嚴重的氣喘，她一個月要進出醫院三、四次，還得服用強體松，合併其他兩、三種治療氣喘的藥物，有時甚至需要透過機器輔助呼吸。不僅如此，茉莉還患有腦性麻痺，行為舉止非常失控。


    一開始，我們是因為母親身體出了些狀況而找到尼爾森醫師。一路上，我們親眼見證母親的情況一天好轉，所以我們決定也帶女兒去給尼爾森醫師看診。到目前為止，茉莉已經接受尼爾森醫師十三次診療。我還記得我們剛去時，茉莉在那年的十二月已經進出醫院七次，還必須仰賴機器呼吸。如今，茉莉已經完全停止服用氣喘藥三個星期，而且不必依靠機器或其他任何器材輔助呼吸。她現在的狀況真的大有進步，走路也穩健許多，連一些不好的習慣和舉止也消失大半。


    最棒的是，茉莉現在開口說話了。還記得她剛到我們家時是不講話的，而現在的她不但會說話、數數，而且狀況好得不得了。我們對目前的成果都滿意極了，她現在完全是脫胎換骨的小女生。老實說，在那段茉莉不定期出現氣喘警報和漫天揮舞著小拳頭的日子裡，我們有一度真的不知道能否再多撐一天。從前的茉莉一發作起來會超過兩個半小時，現在的她也許會覺得心煩意亂，但已經不再隨便'
