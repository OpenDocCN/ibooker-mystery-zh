    # 《附錄》情緒的定義


    徒勞無功：當一個人的付出、成就、企圖，或是盡了力卻不被接受或不被認可的時候；當一個人付出全部的心血卻被認為做得還不夠好的時候；一種不被領情、不被認可或不被承認的感覺。


    心痛：心臟感到苦悶和疼痛，通常起因於一段關係中的難題或傷心事。在胸口感受到碎裂或火燒一樣的感覺。


    不安全感：缺乏自信、自我意識；膽怯；來自對嘲笑或感到有威脅性的事物的不安全感。


    狂喜：強烈的愉悅感或喜悅感，但超過了身體能承受的量。這樣的力量衝擊到整個身體系統。


    脆弱：感覺容易受到傷害的，在情感上或身體上；不安全的；不穩定的。


    失敗感：一個人對於所期待、所企圖、所欲求的事情不如預期成功，或是完成度不如預期，而有被擊敗的感覺（對婚姻的失敗感、對其他人際關係的失敗感、被開除、破產，或是體育、學科項目表現不佳等）。


    無助：無法幫助自己；沒有他人的協助或保護；能力或力量非常有限。是有「受害者心態」的人常見的情緒。無法改變自己的現況或情況的感覺。


    無望：缺乏希望；不指望好事情會發生；沒有補救辦法，或是沒有解決的方法；看不到有可能改變與改善的方法。


    缺乏控制：缺乏克制力或方向；無法被管理或指揮；覺得某人或某事決定自己的命運的感覺。


    低自尊：低估自我的價值或重要性；注意力放在自己的缺點上；不看重自己的感受；沒有自信；不夠愛自己，缺乏對自己的愛。


    困惑：迷失感；頭腦不清楚；思緒模糊、混亂；缺乏判斷力或無法明確看清事情；糾纏；糾結；迷亂；被擾亂的心智狀態。


    # 《附錄》情緒的定義


    防衛：避免被攻擊，或是保護自己的一種狀態；對於威脅、批評或傷害到自己的自尊的事物一種敏感的表现；防禦自己身體或心理上遭受的威脅，這個威脅可能是真實的，或是想像出來的。


    哀痛：因為失去、災害或災禍而引發的強烈情緒；劇烈的傷心遺憾及深層的悲傷；喪失親人的普遍表現，也可以是煩擾、生氣或惱怒的感覺。


    自虐：情緒上的自虐包括負面的自我對話（例如：我真是個白痴）、自我責怪等。身體上的自虐包括不當的物質成癮、熬夜或不注重自己的身體健康，缺乏適當的飲食或營養。過度工作；過度懲罰自己或背負重擔，這種自虐常見於贖罪。疾病也是一種自虐的表現。


    倔強：難相處；無法變通；無法或不願意原諒；倔強的；固執任性的；抗拒的。


    憂鬱：傷心的；前景黯淡的；情緒低落的；沒有精神的狀態。通常是對自己生悶氣，以及對自己感到羞恥和罪惡感而延伸出來的情緒。


    挫折感：令人惱怒的；遇到瓶頸了；無法再繼續了；無法再往目標前進的受阻感。


    猶豫不決：沒有做決定的能力；在兩個選擇之間擺盪不定，源自不信任自己，或是懷疑自己有做出好決定的能力。


    恐慌：突如其來的、全面壓垮的恐懼讓人產生歇斯底里的行為；不合理的恐懼念頭或身體症狀，例如顫抖、過度換氣；強烈感覺厄運即將到來。


    付出被視為理所當然：感覺被漠不關心地對待；不受感激；被忽視。


    衝突：「內在衝突」是指個人自己內心及情緒上因為衝突或衝動而引起的掙扎（例如：要不要換新工作）。「外在衝突」是指與之對抗、意見相左、不合意、抗拒之、使敵對之；長期的衝突與爭吵（例如：她與前夫因為監護權的問題引發長期衝突）。


    對創造感到不安：因為感受不到安全感，或是不信任自己，以致無法創造或發展任何事物，其中包括無法創造或發展關係、家庭、健康、金錢、事業或藝術創作。因為不安全感而阻礙了創作過程（例如作家的寫作瓶頸）。


    # 《附錄》情緒的定義


    驚恐：強烈的、猛然的、全面的恐懼；過度的驚嚇。


    孤立無援：缺乏支持、幫助或鼓勵；不被他人支持；當需要幫助時求助無門；感覺獨自承受巨大的負擔。


    優柔寡斷：脆弱的；無精打采的；猶豫不決的；性格不堅定、不果斷；沒有骨氣。


    傲慢：過分看重自身一些真實擁有或想像出來的長處或優勢；過分虛榮（強烈渴望被注意、被稱讚、被認同）；覺得自己優於他人；無法被教導的；堅持自己一定才是對的；期望名過其實；用鄙視或輕蔑的態度對待別人。有強烈的驕傲但還在健康範圍內，是不會變成受困情緒的。


    羞恥：一種覺得自己做錯、有缺陷或不名譽的感覺；做了或經歷了不光榮、不適當、愚笨、羞恥的事，受侮辱的痛苦感覺；悔恨的起因。羞恥是所有情緒中最接近死亡的情緒，會導致罪惡感、憂鬱，甚至自殺。


    震驚：突如其來的強烈情緒或情感擾動；極度驚訝；覺得精神受創或震驚。


    無價值感：覺得自己不夠好、出身低賤；不值得讚許的；不配的；沒有價值的；不合適的；不得體的。


    無用感：覺得自己不重要或沒有價值，沒有任何卓越的特點、性質或自我，沒有任何用處。


