    # 情緒密碼


    能發生在母親的子宮裡，如果是這種情形，你可以問：


    「這個情緒是在子宮裡被困住的嗎？」「這個情緒是在第一孕期（懷孕第一到十二週）被困住的嗎？」「這個情緒是在第二孕期（第十三到二十七週）被困住的嗎？」「這個情緒是在第三孕期（第二十七週至生產）被困住的嗎？」


    # 根據我的經驗，胎兒期的受困情緒通常發生於第二孕期，而且往往是受試者的母親當時經歷的情緒。


    換句話說，假設一個女人在她懷孕的第二或第三孕期經歷「哀痛」的情緒，她整個人都跟著這股情緒能量振動，肚子裡的寶寶就會開始與這個情緒共振。結果，胎兒可能會從自己的母親那裡接收到這個受困情緒。


    我從未見過胎兒自己製造出受困情緒的例子，但不論這個情緒是來自胎兒或母親的身體都無關緊要，重要的是，它都可以透過同樣的方式釋放：用磁鐵順著督脈滑過三次。'
  - '[PAGE 203]


    # ★遺傳來的受困情緒


    如同你遺傳了父親、母親和其他祖先的眼睛顏色或鼻子形狀一樣，你也可能遺傳了他們的受困情緒。遺傳來的受困情緒，和胎兒期的受困情緒或其他任何類型的受困情緒是不同的。


    如果是遺傳來的情緒，你在受精卵形成的當下就從精子或卵子接收到那個情緒的能量了。


    當精卵結合時，其中一方已經帶著某些額外的情緒能量了。這個受精卵開始分裂，然後，存在原本那個受精卵中的一切也被複製了。隨著受精卵不斷分裂，這額外的情緒能量也會被複製。


    你當然可以詢問「是否有個我們現在可以釋放、遺傳來的受困情緒」，來揭露這類受困能量的存在。但大多數時候，你會在尋找一般受困情緒時，偶然發現這是遺傳來的受困情緒。


    # 如何找到遺傳來的情緒？


    我的經驗是，潛意識會引導你到某個遺傳來的情緒所在的正確欄、列，但不會告訴你是哪一格所列的五種情緒中的哪一個，除非你在情緒名前面加上「遺傳來的」這個詞。


    舉例來說，假設你發現你要釋放的受困情緒在 B 欄第二列，並且測試了那一格裡面的每一個情緒，但得到的結果都是否定的。如果出現這種狀況，你就詢問：「這是一個遺傳來的受困情'
  - '[PAGE 204]


    緒嗎?」若得到肯定的答案,就接著問:「這是遺傳來的———嗎?」空白處依序填入 B 欄


    第二列那一格裡的五個情緒,直到你找到正確的那一個。


    一旦辨識出遺傳來的受困情緒,你也許會想要判斷該情緒是遺傳自受試者的父親或母親。若想進一步挖掘,你可以詢問這個遺傳來的情緒是源自祖父(母)或曾祖父(母)等等。一般來說,遺傳來的受困情緒大多源自父母或祖父母。


    幾年前,我女兒娜塔莉幫我進行遠距療癒時,在我身上找到一個遺傳來的受困情緒:無望感。當娜塔莉判定這個情緒源自我父親那邊一位二十二代以前的愛爾蘭女性祖先時,她突然覺得那位女士就在身邊。娜塔莉感覺得到她非常想要讓這個情緒從她的子孫身上被釋放掉,同時也感受到她對於這個情緒正在被釋放有多感激。


    在那之前,我並不知道有這個情緒存在,它就像背景聲一樣,我一直沒有察覺。而這個「無望感」被釋放的那一刻,就像背景聲突然不見了,我也因而知道這個情緒被釋放了!


    當一個遺傳來的受困情緒被釋放時,它會從所有透過血脈將這股情緒能量往下傳的祖先身上被釋放掉,無論往回追溯多少代。這是情緒密碼一個非常強大的地方!而因為受試者可能已經把這股能量傳給自己的孩子了,我建議你抱持清楚的意念,將受困情緒從每一個擁有這股能量的靈魂身上釋放掉,無論他們在世與否。釋放結束後,你可以透過肌肉測試確認是不是除了受試者之外,其他每一個可能遺傳了這股能量的人也都沒有了這個情緒。'
- md: '# 為自己釋放遺傳來的情緒


    想要從自己身上釋放遺傳來的受困情緒，請把磁鐵放在眉心，然後按照之前說明過的、釋放非遺傳受困情緒的步驟進行：保持平穩呼吸，不要憋氣，然後滾動或滑動磁鐵，往上經過前額、頭頂，延伸到後腦、頸部後方，一直到你的手沒辦法再往下為止——唯一的差別是要重複「十次」，而非三次。


    # 幫他人釋放遺傳來的情緒


    想要幫他人釋放遺傳來的受困情緒，請把磁鐵放在對方的背部，頸根處。告知你的夥伴在你滑動磁鐵時保持自然呼吸，然後從他的頸根處往下滾動或滑動磁鐵，一直滑到下背部或再往下。每一次滑到底之後，就將磁鐵拿離開對方背部，再放回頸根處往下滑——總共做「十次」，而不是三次。


    ### 受胎前的受困情緒


    雖然罕見，但我曾經發現產生於受胎之前的受困情緒，而且我指的不是遺傳來的情緒。我相信人類在受胎前是以「有意識的實體」這樣的方式存在，不具備肉體，而是以靈魂存在，能夠自行思考，而且知道這趟來到地球的旅程。


    大部分受胎前的受困情緒，都與我們即將旅居地球這件事有關。


    有時候，即使我們或許因為有機會來到地球而欣喜萬分，也似乎會對即將展開的旅程感到驚慌、害怕。要離開那個充滿愛與美的地方，來到這個滿是麻煩、暴力和戰爭的地球，就算最勇敢的心，也不免畏縮。有時，受胎前的受困情緒就跟離開天家而產生的某種哀痛或悲傷有關，但也見過非常久遠以前的感情問題造成的受困情緒。受胎前的受困情緒並不常見，但我確實見過，你以後可能也會碰到。雖然很罕見，且往往影響力強大，釋放受胎前受困情緒的方式，就跟釋放其他被困住的情緒一樣，讓意識覺知這些情緒的存在後，用磁鐵刷三次，將之釋放。


    使用情緒密碼幫助自己和他人時，你會因為看到人們的重擔一個一個被卸下，而充滿喜悅。你會看見生命被改變，人們被療癒，而心，連結在一起了。


    別放棄！雖然想要精通情緒密碼必須花一些時間，但請相信自己的療癒能力，這絕對值得你花費精力。相信自己可以做到，並因此感謝神，其結果便是你因為相信而得到的回報。


    下面兩頁分別是釋放受困情緒的流程圖，以及受困情緒表，供你參考。


    而在下一章，你會學到受困情緒如何圍著你的心造出一道牆，讓你沒有能力付出與接收愛。


