    # 第7章 圍著心築起的那道牆


    > 我不想看起來像個傻瓜，我不想為你心碎。

    > 我要築一道牆，每日每日將它加高。

    > 這次我不再淪為愛的犧牲品，我要把內心所有感覺都鎖上，

    > 這樣你就闖不進來了。

    >

    > ——滅跡合唱團《愛的犧牲品》一曲的歌詞


    受困情緒會圍著你的心築起一道牆，讓你無法活出生命所有的可能。我從前的一個病人，一位很棒的女性寫信告訴我心牆對她人生的影響。


    # 活出童話般的人生


    尼爾森醫師為我清除心牆時，我大概五十一歲，已經在迪士尼公司工作了二十二年。我生活忙碌，工作充滿挑戰，經常出差到世界各地，與許多聰明且充滿創意的人一起工作。我有非常好的家人和很多要好的朋友，一直未婚。我並不反對婚姻，但也不急著出嫁，總之婚姻對我來說不是個重要問題，我的生活已經很充實了。


    那年的下半年，我的兩個朋友計畫去中國旅行，問我要不要一起去。我說我工作實在太忙了，但他們鍥而不捨地慫恿我。說也奇怪，這一切背後彷彿有一隻看不見的手把我推向中國，我只好靜下來思考，我是不是真的想去中國看看？大概是吧，因此，我就決定去了。


    當時在中國旅行尚有諸多限制，因此我們選擇參加旅行團。旅途中，我遇見一位翩翩紳士，他是個律師，離婚七年，住在新港灘，距離我在加州海岸的家大約四十哩。在那次的中國旅行中，我們以一種非常保守的方式認識了彼此。


    回程的飛機上，我們坐在一起，他邀請我隔週週末外出約會。我們交往了一年，後來他在感恩節向我求婚，六個月後我們就結婚了。那時我五十三歲。


    回想起來，我發現心牆被拆除之後，事情變得不一樣了，我開始敞開心接受「在生命中擁有一個互相關心照顧的人」這樣的想法。我可以很真實地感受到自己的改變，而這個改變驅使著我，彷彿找到一個與自己共同生活的人自然而然下一步要做的事。這種「準備好了」的感覺是前所未有的體驗。我想一定是因為那道我從未察覺其存在、看不見的心牆被拆除了，讓我可以允許這麼棒的男人進入我的生命。


    所以，如果你們當中有誰認為「大齡熟女」就結不了婚，請記住我的故事，去把心牆拆掉，敞開心接受生命中的各種可能吧！我和我丈夫即將慶祝第五個結婚紀念日，而且剛搬進位於加州海岸、可以俯瞰整片大海和卡特琳娜島的新家，過著童話般的人生。


    尼爾森醫師，謝謝你。


    琳恩


    ### 擁有思考、感覺和記憶能力的心


    心臟產生的功率和電磁能量，比大腦多六十到一千倍，說心臟是身體裡最強而有力的器官完全實至名歸。當你還在子宮裡時，你的心臟比大腦更早形成。心臟一天跳動大約十萬次，一年就是四千萬次，而且即使與人腦之間的連結被切斷，它還是會持續跳動。


    你的心就是你的存在的核心，你的本質的核心。


    新的研究顯示，心臟絕對不只是一個幫浦。一九七○年代，科學家發現心臟有個複雜的神經系統，這項發現導致醫學上出現新的分支——神經心臟學。事實上，我們每個人都有兩個腦，而出乎這些科學家意料之外的是，我們頭裡面的腦會聽從「心臟裡面的腦」發出來的訊息。


    你的心無時無刻不在發送訊息到全身，每一次跳動都帶著會影響你情緒和身體健康的重要訊息。


    當你對某人充滿愛意時，實際上是在透過你的心腦發送一個強而有力的電磁訊息給對方。


    醫學研究不斷證實，當我們對他人充滿愛與感恩時，會對自己的身體產生可觀的正面影響；而當有人對你發送愛與感恩，也就是你成了接受方時，這樣的正面影響也同樣會發生在你身上。


    科學家發現，從你心臟發射出的電磁訊號，可以在另一個人的腦波裡檢測到。這個現象在兩人接觸或靠得很近時最明顯，但即使相隔一段距離，還是量測得到。


    數十年來，醫學已經突破到可以將一個人的器官移植到另一個人身上。不過，還記得前面提到的三戰退伍老兵和他血液細胞的故事嗎？如果一個人的個別細胞無論在哪裡，都可以維持彼此之間的緊密連結，想想看，一個個器官的連結能力會有多強大！大家一定都聽過，器官移植接受者一夕之間對某種運動感興趣，或是莫名其妙愛上器官捐贈者喜愛的食物。接受心臟移植的病人從一開始就反映有這些現象，但醫生們毫無頭緒，便將之歸因於病人的想像。


    我們的心有其獨特智能，可以思考、感覺和記憶。


    現在有相當多的證據顯示，心臟具有感覺和記憶。調查指出，許多病患在接受心臟移植手術後出現某些變化，包括對食物或音樂的偏好、筆跡，以及出現原本不屬於他們的記憶。去跟那些接受移植手術的病人說，那都是他們的想像吧。有位男士之前從來不喜歡棒球或熱狗，但自從接受一位美國職棒芝加哥白襪隊忠實球迷捐贈的心臟後，突然變得非常熱中這兩樣東西；還有一位女士每次聽到某一首歌就會哭到不能自己，然而在她接受移植手術之前，這首歌對她沒有任何意義。


    # ★發現心牆


    你是否曾曾覺得需要「建造一道牆」，以保護自己不受外在負面狀況影響？看來，「建造一道牆」這個常見的法說法實際上是有根據的，我們稱這種現象為「心牆」。現在就來說說當初是如何發現心牆的。


    一九九八年三月，我和妻子琴恩一起去奧勒岡州的波特蘭參加一場磁療法的會議，我是主辦單位邀請的其中一位講者。


    一天清晨，琴恩叫醒我，說她做了一個很鮮明的夢。她強烈感覺到這個夢有個深遠的意義，而且和她自己的健康有關。


    在夢裡，琴恩看見一個不鏽鋼點菜轉盤，就是常在餐廳看到的那種。她說，有三張點菜單夾在那個轉盤上，而直覺告訴她，這三張單子分別代表一個和她健康有關的問題。


    琴恩的潛意識知道這個夢的意義，所以我開始幫她做肌肉測試，提出和轉盤上的單子有關的問題。我們很快就確認前兩個健康問題代表的意義，而當我把注意力放在第三張單子上時，發生了一件完全出乎意料的事。


    突然間，我產生一個清醒幻象。


    我的心眼清楚看見一片擦得發亮的美麗硬木地板，隨即領悟到，琴恩的心就在這片地板之下！


    這實在不合理，但這片光亮地板的影像，以及琴恩的心就在它之下的感覺是那麼持久、清晰，讓我決定盡可能找出其中的意義。我告訴琴恩我看見的景象，問她是否了解這是什麼意思。


    「嗯，昨晚我有點不舒服，拉娜說她感應到我心上有某種能量。不知道這跟她感應到的有沒有關連。」我的小姨子拉娜是個直覺超強且很有天分的靈氣療癒師。「我真的不曉得這代表什麼。」琴恩說道。


    還好我們可以利用肌肉測試找出更多與這片硬木地板有關的訊息。


    「我們先弄清楚這片地板有多厚。」我說，「它是否有一片木板那麼厚？」


    琴恩的手臂呈現強而有力的狀態，亦即答案為「是」。


    「它是否有兩片木板那麼厚？」「是。」


    「它是否有三片木板那麼厚？」「是。」


    我們很有耐心的把數字往上加，五片、十片、二十片、五十片、一百片、兩百片。没多久，我開始以「呎」為單位發問。


    「這片地板是否有一百呎那麼厚？」「是。」


    「它是否有五百呎那麼厚？」「是。」


    然後繼續加到一千呎、兩千呎、三千呎、四千呎⋯⋯「它是否有五千呎那麼厚？」「是。」


    「這片地板是否有一哩那麼厚？」「是。」


    「它是否有兩哩、三哩、四哩那麼厚？」「是、是、是。」


    「這片地板是否有五哩那麼厚？」「是。」


    「這片地板是否有六哩那麼厚？」「否。」


    這真是滿奇怪的，我們無法想像這是什麼意思。我很確定其中一定有個重大意義，便繼續測試，然後很快就發現，我的心眼清楚看見的這片硬木地板正好是五哩厚。我以前從未有過這樣的清醒幻象，然而，我們得到的答案卻如此清晰。


    現在有三件事是可以確定的：一、取夠能在心中清楚看見這片地板；二、我知道在某種象徵意義上，我妻子的心就在這片地板之下；三、這片地板非常厚，精確地說是五哩厚。這到底可能代表了什麼？


    我問：「你的心周圍是否有一道牆？」「是。」


    「這道牆是不是五哩厚？」「是。」


    「它是木頭做的嗎？」「是。」


    這到底要引領我們去發現什麼？會是一件很重要的事嗎？


    我讓心智安靜一會兒，這樣做使我問出另一個問題：「這道牆是受困情緒組成的嗎？」


    琴恩的手臂呈現強而有力的狀態。答案為「是」。


    突然間，其中的象徵意義對我來說變得再清楚不過。我知道人的心是何等脆弱、何等容易受傷害，也知道琴恩的過去。


    琴恩一直是個害羞敏感的小女孩。跟許多人一樣，她在一個不完美、不健全的家庭裡長大，雖然有一些美好的回憶，雖然愛自己的父母、愛自己的手足，也知道他們愛她，但在情緒上，琴恩依舊沒有安全感。


    她總是猜不到家裡的氣氛何時會風雲變色，怒氣和刻薄的言語常常毫無來由地突然出現。那種無法預測什麼時候會因為某件小事而被猛烈攻擊或責難的生活，常常令她和其他家人過得如履薄冰。


    # ★保護自己的心


    人們處理這類令人不愉快的情況的方法很多，有些人選擇攻擊，有些人選擇逃離，有些人則選擇躲藏。不過，我們通常會覺得必須保護自己不受傷害。


    你的心是你的存在的核心，潛意識知道它必須盡一切可能保護你的心，保護你纖弱易碎的核心。


    所謂的「心痛」和「心碎」是心在強烈的情緒張力下產生的特殊身體感受，幾乎每個人一生中都體驗過這種感覺。


    受困情緒擁有實體，由能量組成，就跟其他所有事物一樣。當受困情緒被製造出來時，必須寄居在身體某處，而有時候，它們會滯留在你的心裡面和周圍。


    你無所不能的潛意識有時會利用受困情緒的能量，在你的心周圍建造一道屏障。實際上，潛意識圍著你的心築起一道能量牆，用來保護它。


    一開始，這整個過程讓我百思不解，直到我領悟到，潛意識極有可能遵循著某些規則。例如，它不可能憑空造出一道牆，在我們居住的世界，所有事物都是由能量組成，而我相信潛意識絕對了解這個概念。我們周遭的物質世界裡所有的牆，無論是由何種材質建造而成，最終都是由能量組成的。潛意識創造出來的心牆也一樣，它只是剛好由某一種特定能量構成——受困情緒的能量。


    我相信對潛意識而言，心牆就跟你屁股底下的椅子一樣真實。心牆的確存在，只是存在於和我們肉眼可見的世界不太一樣的空間罷了。這會讓心牆變得較不真實嗎？我不這麼認為。我們看不見紫外線，或者更確切地說，是看不見電磁波譜中絕大部分的電磁波，但沒有人會否定它們的存在。


    我問琴恩的身體，我們可不可以釋放組成她心牆的受困情緒，答案是「可以」。


    她的身體漸漸開始願意釋放那些情緒。我和琴恩發現，從心牆上釋放情緒的步驟，就跟釋放其他受困情緒一樣。唯一不同的是，我們必須明確詢問，我們是否可以「從她的心牆上」釋放一個情緒，以獲得進入那些情緒的權利。


    每次從琴恩的心牆上釋放一個情緒之後，我都會詢問我們是否可以釋放另一個情緒。有時她的身體會讓我們在單一療程中清除一個以上的情緒，但通常得到的答案都是「否」。


    她的身體需要一段時間去處理每個被釋放的情緒，這不令人意外，所以在每個療程之間，我們會耐心等待。我們發現大約每隔一天就可以釋放一個不同的受困情緒，直到它們完全消失。而現在，琴恩的心牆已經不見了。


    # 琴恩的心牆是這樣築成的


    琴恩從小就學會保護自己的情感，退縮到她內在的一個安全堡壘，關閉自己的正面感受，且盡量避開那些會讓她受傷的人事物。當家中出現一觸即發的緊張事件時，她選擇去感受恐懼、怨恨和其他負面情緒，其中有些情緒她會表達出來，但多數都被她內化了。有些內化的情緒從未被徹底處理，於是變成她身體裡的受困能量。


    雖然她有意識地努力把人生過好，但在此同時，她的潛意識正在建造一道牆，一座可以讓她的心免於再次受傷的終極堡壘。


    琴恩的潛意識選擇用想像出來的木質地板作為她的心牆，明確地說，就是那種可以走在上面的硬質木材。你有沒有看見其中的象徵意義？她從小到大的房間有一片硬木地板，她當時的家裡絕大部分的地板也是由硬木鋪成，所以這是一個很熟悉的景象。她的潛意識在她年幼時就創造出心牆，但多年來，這道牆仍在持續建造。


    每新增一個受困情緒，都會為她的心牆增加厚度與強度，直到它變成數千、數萬呎厚。當我們從她的心牆釋放受困情緒時，會發現牆的厚度減少了。我們無法預測每釋放一個受困情緒能減少多少厚度，有些受困情緒可以大大減少心牆的厚度，有些情緒的影響幅度則比較小。


    心牆上最後一個受困情緒被釋放後，發生了一件很有趣的事，幫助琴恩揮別過去，以及她看重新建立與他人的連結。


    # 重新建立與他人的連結


    琴恩的心牆雖然保護了她的心免於受傷，但這樣的保護是有代價的。心牆的存在讓她感覺麻木、感覺有些孤獨，覺得與他人失去連結。她想要擁有親密的朋友，多次嘗試，卻總是被一些事情阻撓。大部分人都喜歡她，她卻發現自己很難與人自在相處。她有很多夥伴，但幾乎沒有真正知心的朋友。在社交聚會中，即使和認識多年的人在一起，她總覺得自己是個旁觀者，從來沒有真正的歸屬感。


    當最後一個受困情緒終於被釋放，她的心牆消失時，神奇的轉變發生了。


    「這輩子第一次，我不再覺得自己是個旁觀者。」琴恩告訴我，「我這一生一直渴望這種感覺，現在我終於知道成為朋友圈的一分子、成為團體的一分子是什麼感覺了。這是我從未體驗過的新感受，這種感覺真是太美妙、太棒了。」


    從那天起，這些感覺一直和琴恩在一起，並且幫助她在許多方面成長。我們發現，拆除心牆後，隨之而來的往往是與他人連結的深刻體驗。


    我們的個人成長與靈性成長經常源自對他人的愛，以及與他人的互動。心愈敞開，我們彼此待自己的方式。


    # 喬安不堪的婚姻


    在我們測試心牆的第一批對象中，有一位名叫喬安的女士，她結婚二十二年，有五個孩子。她的丈夫在心理和言語上虐待她，只要他在，家裡氣氛就會變得很糟糕、很可怕，其他家人都不明白喬安為何年復一年選擇留在這樣不堪的婚姻裡。


    如同大部分面臨相同處境的女人一般，喬安打造了一道心牆，來幫助自己忍受這段婚姻，並讓她柔軟的心與丈夫的言語虐待和情緒暴力隔開來。


    我猜想喬安應該有一道心牆，結果當我問她是否有心牆時，她的身體回答：「是。」接著，我想知道她的心牆是由什麼組成的。是否所有心牆都是木頭做的？我不知道，但是當我提出這個問題時，她的身體給出否定的答案。


    之間的連結就愈強；連結愈強，我們就能給出更多愛，並接收更多愛，而我們的生命就會變得更大、更富足。


    我真是感謝琴恩和她那天做的夢。沒有她，可能到現在都沒人知道心牆的存在。


    當我們開始針對其他人測試心牆時，發現心牆其實是個非常普遍的問題。在我們的經驗裡，大約八成的人都有心牆；事實上，你很可能就有心牆。'
  mdcn: '# 為自己釋放遺傳來的情緒


    想要從自己身上釋放遺傳來的受困情緒，請把磁鐵放在眉心，然後按照之前說明過的、釋放非遺傳受困情緒的步驟進行：保持平穩呼吸，不要憋氣，然後滾動或滑動磁鐵，往上經過前額、頭頂，延伸到後腦、頸部後方，一直到你的手沒辦法再往下為止——唯一的差別是要重複「十次」，而非三次。


    # 幫他人釋放遺傳來的情緒


    想要幫他人釋放遺傳來的受困情緒，請把磁鐵放在對方的背部，頸根處。告知你的夥伴在你滑動磁鐵時保持自然呼吸，然後從他的頸根處往下滾動或滑動磁鐵，一直滑到下背部或再往下。每一次滑到底之後，就將磁鐵拿離開對方背部，再放回頸根處往下滑——總共做「十次」，而不是三次。


    ### 受胎前的受困情緒


    雖然罕見，但我曾經發現產生於受胎之前的受困情緒，而且我指的不是遺傳來的情緒。我相信人類在受胎前是以「有意識的實體」這樣的方式存在，不具備肉體，而是以靈魂存在，能夠自行思考，而且知道這趟來到地球的旅程。


    大部分受胎前的受困情緒，都與我們即將旅居地球這件事有關。


    有時候，即使我們或許因為有機會來到地球而欣喜萬分，也似乎會對即將展開的旅程感到驚慌、害怕。要離開那個充滿愛與美的地方，來到這個滿是麻煩、暴力和戰爭的地球，就算最勇敢的心，也不免畏縮。有時，受胎前的受困情緒就跟離開天家而產生的某種哀痛或悲傷有關，但也見過非常久遠以前的感情問題造成的受困情緒。受胎前的受困情緒並不常見，但我確實見過，你以後可能也會碰到。雖然很罕見，且往往影響力強大，釋放受胎前受困情緒的方式，就跟釋放其他被困住的情緒一樣，讓意識覺知這些情緒的存在後，用磁鐵刷三次，將之釋放。


    使用情緒密碼幫助自己和他人時，你會因為看到人們的重擔一個一個被卸下，而充滿喜悅。你會看見生命被改變，人們被療癒，而心，連結在一起了。


    別放棄！雖然想要精通情緒密碼必須花一些時間，但請相信自己的療癒能力，這絕對值得你花費精力。相信自己可以做到，並因此感謝神，其結果便是你因為相信而得到的回報。


