  md: '尼爾森醫師為我清除心牆時,我大概五十一歲,已經在迪士尼公司工作了二十二年。我生活忙碌,工作充滿挑戰,經常出差到世界各地,與許多聰明且充滿創意的人一起工作。我有非常好的家人和很多要好的朋友,一直未婚。我並不反對婚姻,但也不急著出嫁,總之婚姻對我來說不是個重要問題,我的生活已經很充實了。


