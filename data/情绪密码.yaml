  - '[PAGE 88]


    邊的卵巢，而且是情緒所致。我立刻開始為她尋找哪個情緒該「負責」，讓我驚訝的是，我找到的情緒不是一個，而是六個。你後來會知道，我們一次釋放一個受困情緒。有時候，你會發現一個以上的情緒「套疊」在同一部位，琴恩的狀況就是這樣。除了最後一個情緒，其他所有情緒都跟與琴恩關係密切的女性生命中發生的悲劇或煩心事有關。每找出一個情緒，我便將之釋放。


    驚人的是，每釋放一個受困情緒，琴恩的疼痛程度立刻顯著下降。清除五個受困情緒後，她的疼痛只剩一點點。


    她的身體指出還有一個受困情緒。測試結果顯示，有一個覺得自己「無用」的情緒從琴恩幼稚園時期就被困在她體內。


    那是一九六〇年，是尼克森和甘迺迪兩人爭奪美國總統大位那一年。琴恩的老師告訴她，學校選出一男一女接受當地報社採訪，談即將來臨的總統大選，而她正是被選中的那個小女生。她在訪問中會被問及一些關於總統候選人的問題，特別是如果她有投票權會投給誰。


    小琴恩為此興奮不已，而那一天很快就來了。她被領進學校為採訪準備的房間裡，工作人員擺了兩張椅子給兩位小朋友坐。採訪者先問小男生問題，同時因為要拍照，閃光燈打在他身上。雖然那天琴恩也被拍了照，但不知為何，採訪者完全沒有問她問題。除了拍照時被告知要如何擺姿勢，她幾乎徹底被忽略，然後採訪就這麼突然結束了。被帶回教室時，琴恩滿肚子疑惑。慢慢地，有個念頭開始在她心裡萌芽：她一定是個無足輕重的人。'
  - '[PAGE 89]


    # 傑克的網球肘


    琴恩開始覺得自己沒用，這個情緒強烈到被困在她身體裡。情緒是能量，而由其特定振動可以判別這是哪一種情緒。一個受困情緒就像一個小能量球，總是「降落」或滯留在身體某處。因為某個原因，這個被困住的「無用感」滯留在琴恩左邊的卵巢三十年。釋放這最後一個受困情緒時，琴恩剩餘的一絲疼痛瞬間消失。她從地上站起來，我倆望著彼此，都對剛剛經歷的一切驚訝不已。在此之後，琴恩的那個部位再也沒有痛過。我不禁想著，如果我們沒有釋放她卵巢上那些能量，她的健康不知會承受什麼樣的後果。


    另一個因受困情緒導致身體疼痛的例子是傑克。傑克是我的一個病人，來找我治療令他痛苦難耐好幾個月的網球肘時是四十二歲。他的右前臂痛到沒辦法轉動鑰匙發動汽車。一開始，我採用傳統的整脊和物理治療；約莫一週後，他的狀況沒什麼改善，讓我很驚訝，因為以整脊療法處理網球肘問題的成果通常很不錯。傑克的狀況沒有改善讓我感覺受挫。那時我剛進入受困情緒的領域，沒想到要去詢問傑克的潛意識他的問題是否和情緒有關。我剛開始了解受困情緒的威力，以及它們可能造成許多不同的'
  - '[PAGE 90]


    症狀。我知道受困情緒可能導致身體疼痛, 但我也知道網球肘是一種發炎反應, 我以前成功治癒過。不過, 既然以傳統方法治療沒用, 我決定詢問傑克的潛意識, 受困情緒是不是他網球肘的根本原因。當他的身體回答「是」時,
    我有點訝異。


    運用情緒密碼, 我們找出第一個受困情緒：自卑感。這個情緒被困在他體內的原因和他高中時心儀的一位女生有關。我將之釋放, 而傑克對他的手臂立即感受到的效果大吃一驚,
    因為他手肘的疼痛突然顯著減少。我再次詢問是否還有可以釋放的受困情緒, 他的身體回答「是」, 因此我開始問下一個情緒是什麼、何時被困住的、是否跟某個特定的人有關。結果,
    這個受困情緒也源自傑克的高中時期, 不過這次是跟另一個女孩有關。在那段不算美滿的關係裡, 傑克有個「緊張」的情緒被困住了, 而當我們將之釋放時, 傑克手肘的疼痛更是大幅減輕。我們持續重複這個過程,
    直到總共移除了五個受困情緒。


    傑克的妻子陪他一起來就診, 饒富興味地看著我幫他找出五個源自高中時代、每一個都和不

    同女孩子有關的受困情緒。


    每當釋放一個受困情緒, 傑克前臂的不適程度就會明顯減輕。最後一個情緒被釋放那一刻,他的疼痛完全消失, 手臂可以這樣那樣轉了! 他模仿轉動汽車鑰匙的動作, 怎麼轉都不會痛。傑克的肘關節突然恢復以前的靈活,
    而且之前我用手指按摩他前臂的肌肉, 他會疼痛難耐,現在竟然一點痛楚也沒有。這樣的結果讓在場所有見證者都大為驚奇。'
