  md: '# 測試法


    如果身體給出的答案為「否」，有三種可能：


    +   1. 受試者沒有任何受困情緒。這個可能性非常低，因為幾乎每個人都有受困情緒。

    2. 受試者確實有個受困情緒，但出於某種原因，其潛意識現在不想釋放受困情緒。陳述句是這樣說的：「我有個現在可以被釋放的受困情緒。」受試者也許有意願，但他的潛意識可能不願意。這個狀況會改變的，之後也許就有不一樣的答案了。

    3. 受試者有「心牆」。如果是這樣，身體也許會表示它沒有任何受困情緒，但其實是有的。心牆會讓受困情緒變得較難被找到。為避免混淆，我會在下一章介紹心牆。即使你得到的答案為「否」，我建議你還是先把本章看完，因為無論如何你還是需要知道整個流程。


    如果答案為「是」，你就可以進行下一個步驟了。


