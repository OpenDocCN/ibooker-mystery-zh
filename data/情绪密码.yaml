    ## ★建造心牆的代價


    有一座小島上有許多猴子，科學家來到島上教會其中一隻猴子先把地瓜洗乾淨再吃。在一百隻猴子都學會洗地瓜的技能後，島上所有的猴子全都懂得如何洗地瓜了。科學家認為這真是太神奇了，然而這只是其中的一部分。他們很快就了解到，只要這一百隻猴子知道如何洗地瓜，其他所有猴子自動就知道怎麼做這件事，但不只是那座小島上的猴子學會這項技能，而是附近所有小島上的猴子也都開始洗地瓜了。


    如同尼爾森醫師所言，量子物理學告訴我們，訊息的傳送是瞬間發生的。如果人們的心打開來，我們就能達到關鍵多數。


    在那次的瀕死經驗裡，我對遇見的那個男人說：「可是我們只有幾千人啊。」他答道：「數百萬人會聽見，但只有幾千人會牢記。」


    不過，這幾千人已經足夠了。謝謝你給我這麼一個方法，去完成我的使命。


    ——安妮·霍恩


    築起心牆的代價無法估量。有多少人因為心牆的關係離群索居，過著孤獨的生活？有多少人從未體驗過找到真愛的喜悅？有多少妻子與孩子因此遭受虐待？


    心牆可能導致憂鬱、離婚和凌虐他人的行為，而這樣創造出來的虐待模式可能會一代又一代地延續下去，造成各式各樣的痛苦和破壞行為。


    擴大規模來看，心牆會導致誤解、歧視、仇恨和暴虐行為；若以全球為範疇來看，心牆則會造成種族滅絕、國與國之間的對立、恐怖主義和戰爭。


    這世界上有太多的孤立和暴力，太多的悲傷和痛苦。走在街上，我看到太多像寶菈和她兒子一樣的人，他們下顎緊縮，一臉怒氣和怨恨，只能透過各種可能的管道表達自己的痛苦與挫敗。一個又一個的人築起心牆，每晚電視新聞上層出不窮的故事，都是他們將自己的心封閉起來而做出的舉動。


    憂鬱症是心牆與受困情緒另一個常見的副作用。光是在美國，估計就有一千三百萬到一千四百萬人為憂鬱症所苦，這是美國女性最主要的失能原因，其中約莫百分之十五的人最後選擇自殺。而在十到二十四歲的孩童與年輕人中，自殺是第三大死因。透過釋放受困情緒與移除心牆，我們已經看過許多憂鬱症重症患者康復的例子，而且不再復發。我們見過很多人因此挽救了婚姻、解決了家庭暴力，以及為生活帶來巨大轉變。我們也見過有人開始發展美好的愛情關係，孩子們做出更好的抉擇，世界重回平靜美好。


    能分享並傳播我所知關於受困情緒與心牆的一切，讓我滿懷感恩之情。我毫不懷疑地認定這'
