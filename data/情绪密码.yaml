    小時後」「今天下午」「明天」等時間。假如身心開始重整情緒，通常會持續數小時到數天。


    > 請注意重整期間的情緒起伏


    一定要讓接受療癒的人明白，釋放受困情緒後，他們會經歷一段輕微情緒起伏的重整期，這


    點非常重要的。如果你讓他們事先知道有這種可能性，真的發生時，他們會有心理準備。若接受


    療癒者確實出現明顯的重整症狀，例如哭泣或做了栩栩如生的夢，而妳沒有先告知可能會經歷這


    種事，他們也許會認為為釋放受困情緒反而讓自己的狀況變糟，而不是好轉。


