  md: '# * 茱莉的故事：受困情緒如何影響孩子的健康與心理發展


    茱莉是個「毒癮寶寶」，出生後頭一天就被送到寄養家庭，而寄養家庭希望可以領養她。但茱莉的問題不是只有毒癮。我還記得第一次見到茱莉時，她才兩歲半，被診斷出有腦性麻痺、智能遲滯及嚴重的氣喘問題，同時還有注意力不足過動症。她的行為舉止如同一隻野生小動物。茱莉一直處於極度煩躁不安的狀態，如果可以，我覺得她真的會翻牆而出，逃離我的診療室。茱莉無法和其他孩子互動，也不想玩玩具。她一刻也靜不下來，甚至根本坐不住，而且也不說話。每次她發脾氣，就會持續好幾個小時。在接受我的治療之前，她已經因為氣喘多次進出醫院，而且必須透過機器改善呼吸問題。令人覺得安慰的是，寄養媽媽對她非常有耐心。透過替代者為茱莉測試後，我立刻發現她有心牆及其他失衡問題。接下來要提到的都是構成她心牆的受困情緒。當時我們花了一個月，在每次的療程中幫她釋放一個心牆上的受困情緒。


    下面這則故事描述一位處境堪憐的小女孩在移除受困情緒後，生命如何產生戲劇性的變化。'
  merge: -1
  pgno: 264
- img_proc: true
  md: '# 遺傳自生母的「得不到回應的愛」


    「得不到回應的愛」是一種很常見的情緒,通常是在覺得自己不被愛,或是對別人付出的愛被拒絕時產生的。茱莉的生母就有「得不到回應的愛」這個受困情緒,並且在受孕當下將這個情緒傳給茱莉。


    在現今的社會,我們往往會批判茱莉的生母這樣的人,因為他們有毒癮問題。我們會因為一個人的外在表現及不良行爲去責備對方,就像我們瞧不起茱莉的母親一樣。但是,我們看不見他們的心牆,那些由創傷、悲傷和哀痛的受困情緒組成的心牆,而茱莉的生母就背負了這樣的包袱。


    # 遺傳自生父的「憎恨」


    我們可能永遠不會知道茱莉的生父究竟經歷了什麼,導致他產生憎恨的情緒。茱莉雖然沒見過自己的生父,但絕對難逃這個憎恨遺毒的影響。當受困情緒能量一代一代往下傳時,會擾亂我們本來應該活出的人生。情緒會影響我們所做的選擇,影響我們對待他人的方式。這讓人不禁懷疑,那些代代相傳的暴力行爲和不健全的家庭功能,是不是有一部分應該歸咎於遺傳來的受困情緒?'
  merge: -1
  pgno: 265
- img_proc: true
  md: '# 遺傳自生母的「哀痛」和「憤怒」


    透過替代者測試，我得知茱莉在子宮裡（第一孕期）就有哀痛和憤怒這兩種受困情緒。這兩種情緒是茱莉的生母得知自己懷孕時的反應，然後就被困在茱莉體內了。


    # 第三孕期的「哀痛」「沮喪」及「傷心遺憾」


    孩子在子宮時接收到母親的強烈感受而產生受困情緒的狀況其實並不少見，我在茱莉身上找到的哀痛、沮喪、傷心遺憾等受困情緒，都是她母親在第三孕期體驗到的感覺。懷孕期間任何時刻都有可能產生受困情緒，但最容易出現在第三孕期。


    # 來自生母分娩時的「無望感」


    茱莉的母親在分娩時顯然感受到「無望」這個情緒，那時茱莉還在母親的身體裡，也就是還處於母親的能量場中。當她母親的身體以「無望」的頻率振動時，茱莉也開始以這個頻率共振，'
