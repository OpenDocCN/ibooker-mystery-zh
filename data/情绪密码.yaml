  md: '「是」，你就進一步以同樣的方式縮小範圍。

    你可以問：「這個情緒是在你（我）十歲之前被困住的嗎？」

    若答案為「是」，就再把年紀除以二：「這個情緒是在你（我）五歲之前被困住的嗎？」

    如果得到肯定的答案，你可以繼續往下問，這個情緒被困住的年紀是不是一歲、兩歲、三歲等。


    我發現，以這種方式確認受困情緒發生的時間範圍，肌肉測試結果的準確度是正負一年；換句話說，如果身體說某個受困情緒發生在十七歲時，它實際上有可能發生於十六歲或十八歲，但十七歲的可能性最大。


    顯然，在搜尋受困情緒相關資訊時，相較於發生的實際年齡，你的心智對特定事件、狀況或情境有更強的連結。


    假設你大學畢業一個月後碰到的某個情緒性事件造成某個受困情緒，而你當時剛好二十三歲，那麼，肌肉測試的結果可能顯示這個情緒發生於二十二、二十三或二十四歲，也就是實際發生那一年的前後一年都有可能。假如你問的是這個受困情緒發生在事業之前或之後，你會得到比較精確的答案。用這種方式，你就能夠更確切地知道發生的時間。


    你可以時不時就問：「關於這個情緒，我們需要知道更多嗎？」當你帶到意識層次的受困情緒相關資訊夠多時，心智會讓你知你完成了，這個情緒可以被釋放了。'
