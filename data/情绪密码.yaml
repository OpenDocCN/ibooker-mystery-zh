    ### ★你的未來被挾持了？


    你是否曾經覺得自己為了某件說不上來的事苦苦掙扎？也許是生活不如預期；也許你想要發展長久穩定的親密關係卻總是無法如願；也許你希望過往的某些事從來不曾發生，想要揮別過去卻又無能為力；甚至，你也許有一種不舒服的感覺，覺得自己的現在被過去以某種模糊不清、難以說明的方式挾持了。


    ### 珍妮佛的自我破壞行為


    珍妮佛的經驗可作為受困情緒如何造成阻礙的借鏡。珍妮佛是我女兒的好友，是個活潑可愛的大學生，前途一片光明。某年回家過暑假的路上，她順道來拜訪我們。她的大學生活一切順利，但她很擔心過去的某些事依舊折磨著她，而她懷疑自己是否正為受困情緒所擾。


    珍妮佛告訴我，她前一年和一位年輕人發展了一段轟轟烈烈的愛情。而自從那段狂風暴雨般的關係結束後，每次遇見新的異性，她總是覺得有股不安全感刺得她隱隱作痛，而且對承諾有種沒來由的恐懼，無法克服。珍妮佛說她似乎會不自覺地破壞每段才開始的戀情，我幫她檢查後，發現確實至少有一個受困情緒造成她的問題。


    由於她家住得比較遠，我決定教她情緒密碼，以便她日後不需要我從旁協助，就可以持續為自己釋放受困情緒。珍妮佛很快就輕鬆學會，並在體內找到好幾個受困情緒，其中最特別的是「對創造感到不安」的情緒。這種情緒是因為對創造事物缺乏自信所致，範圍從畫一幅畫、開始一份新工作，到進入一段新關係等。珍妮佛在上一段感情中經歷過這種情緒，然後這個情緒就被困在她的身體裡。那一天，在不到幾分鐘的時間內，她就把這個「對創造感到不安」的情緒，連同其他幾種受困情緒一併釋放掉，然後開車回家。


    幾天後，珍妮佛打電話來，激動地說著她感受到驚人的不同。她說她明顯覺得自己在現在的

    公職考試屢次失敗的茱莉亞


    茱莉亞因為想成為法院書記官而去上課，對未來工作的展望讓她興奮不已。法院書記官要學

    受挫的潛在原因是過去某件事造成他們也許並未意識到的受困情緒，而那個受困情緒正在破壞他們的努力。接下來這則故事就是個很好的例子。


    許多人無法發揮自己所有的能力，並且很難讓人生以它本該有的方式運轉。很多時候，他們

    些人會尋求傳統的心理治療，但這種方式並非直接處理受困情緒，而是處理相關症狀。


    人們經常感受到過去的情緒以某種方式煩擾著自己，卻似乎不知道該如何克服那些情緒。有

    業生涯和生活。


    擺脫受困情緒，你會覺得更有安全感、更有動力，得以自由地去創造你一直想要的關係、職

    命。


    擺脫受困情緒有助於克服你的過去造成的阻礙，為你的婚姻、家庭及其他人際關係帶來新生

    情成長。她很確定，如果沒有釋放受困情緒，她應該早就把這段關係搞砸了。


    表達；但釋放了受困情緒之後，她整個人變得非常自在、有自信。幾個月後，她持續看著這段感

    約會對象面前的表達能力進步了。之前在他身邊，她會害羞、膽怯，心裡有很多話都沒辦法好好


    會在一種專門的語音機器上打字,而且要打得又快又正確,以記錄法庭裡所有人的發言。茱莉亞在課堂上表現不錯,但每當面臨充滿壓力的考試時,她就考不好。她已經連考三次不過了,為此憂心忡忡,深怕接下來這一次是她通過考試的最後機會。


    我測試是否有受困情緒影響了她在考試情境中的行為,而她的身體回答「是」。造成她表現失常的受困情緒是「灰心喪氣」,原來,她的父母在她十五歲時離婚,讓她備感煎熬,而那段时间,感受到的那股令她難以忍受的「灰心喪氣」,就這麼被困在她體內。身處充滿壓力的考試情境時,那個「灰心喪氣」的受困情緒就會妨害她的表現。我們替茱莉亞釋放了被困住的「灰心喪氣」,她因此覺得放鬆且有自信,輕鬆通過接下來的考試,並拿到近乎滿分的好成績。


    在此之前,茱莉亞不知道雙親的離異和她過去對這件事的感受會對她現在的生活造成負面影響。


    如同你看不見風,卻可以感受到風一樣,受困情緒雖不為肉眼所見,對你的影響卻不容小覷。


    在我的經驗裡,有很高比例的身體疾病、情緒問題及自我破壞行為其實都是這些看不見的能量引起的。


    透過情緒密碼,你可以取回自己的人生,活得更健康,最終擺脫受困情緒施加在你身上那些暗中為害的力量。


    ### ★受困情緒的破壞力


    受困情緒會使你做出錯誤假設、對沒有惡意的言論過度反應、錯誤解讀他人的行為，並且破壞你的人際關係。更糟的是，受困情緒還可能引起憂鬱、焦慮，以及其他你不想要卻似乎甩不掉的感覺。它們會干擾你身體器官和組織的正常運作，破壞你的身體健康，導致疼痛、疲勞和疾病。然而，無論你多麼苦不堪言，正統醫學依舊診斷不出受困情緒的無形能量，即使它們可能是造成你身體與情緒問題的主要原因。


    想要消除任何與身心健康有關的問題，一定要處理那個問題的根本原因。現在有許多可以緩解疾病症狀的強效藥物，但是當藥力消失時，症狀往往會回來，就是因為疾病的根本原因沒有解決。


    要活出更美好的人生，你最好在受困情緒造成更多傷害之前把它們找出來，並釋放掉。本書要告訴大家，受困情緒就是造成許多身體和情緒疾病與痛苦背後重要的原因。


    ### 時間未必能療癒所有傷口


    有人說「時間可以療癒所有傷口」，其實不見得。你可以以為自己已經放下之前的人際關係

    造成的所有情緒傷痛，也許還為此接受過心理治療。一切都好像是昨天的事了，然而，你的身體可能仍被過往情緒的無形能量占據。這些傷口不是單靠時間就能療癒的，它們也許會讓你在目前的人際關係中出現異樣行為與感受，甚至導致你去破壞這些關係。


    釋放受困情緒時，真的有個重擔被拿掉了。事實上，很多人在受困情緒被釋放的當下，都會感覺到一陣輕盈。


    找到並釋放那些被困住的負面能量，真的能改變你的感受和行為，進而改變你的選擇，最後改變你得到的結果。


    情緒密碼就是要清除包袱，幫助你活出內在的真我。你不是你那些情緒包袱，但有時受困情緒會使你偏離軌道，或是讓你走上你寧願別走的路，導致你無法活出原本該有的、充滿生氣又健康的人生。


    ### ★ 受困情緒造成身體疼痛


    除了明顯的情緒痛苦之外，數百萬人也苦於身體疼痛，而很多時候，身體上的痛苦是由看不見的受困情緒能量間接或直接造成的。

    下面的例子說明了受困情緒如何能夠在人的身體發揮驚人的強大影響力。


    ### 黛比破碎的心


    黛比接受我的治療約莫一年，有一天她來到診所，說她覺得自己可能是心臟病發作了。她不但胸口痛、呼吸困難，左臂和左臉也完全麻木，這個情況在過去二十四小時內愈來愈嚴重。我馬上請她躺下，並通知同仁待命，因為我們可能需要醫療協助。確認過她的生命徵象正常後，我測試她的身體，以釐清這些症狀是不是某個受困情緒引起的，結果她的身體回答「是」。


    我繼續測試黛比，很快就發現這個受困情緒是「心痛」，而進一步測試的結果顯示，這個情緒是三年前被困在她體內的。這時，黛比突然哭了起來，大喊道：「我以爲我已經在接受心理治療時都處理好了！我不敢相信那件事現在又浮出來了！」我問她：「你願不願意說說發生了什麼事？」


    她說，三年前她丈夫有外遇，這消息對她而言簡直是晴天霹靂，毀了她的婚姻，也把她的生活攪得分崩離析，不過她慢慢接受了這件事。她流了許多淚，花了一年接受心理治療，再婚，然後繼續向前走——至少她這麼認為。


    黛比很驚訝，過去的心痛竟然依舊影響著她，而且是以這麼戲劇性的方式。在她已經不遺餘力去處理之後，這件事怎麼會是她身體痛楚的根源呢？她做了人家勸她做的每一件事：將自己的

    感受哭出來、表達出來；尋求朋友的慰藉和治療師的建議；開誠布公和丈夫對話，並與離婚這件事和解。這一路走來並不容易，她也有許多重大進展，所以心裡認為自己已經處理好這件事，並置之腦後了。


    黛比的盲點正是我們所有人的盲點。從她的經驗中可知，有一個實質影響無聲又無形，直到她開始將之顯化為症狀。她已經運用各種方式處理自己的問題了，除了這個——釋放讓她吃盡苦頭的受困情緒。


    我將那個被困住的心痛從她身體釋放掉，幾秒鐘之內，她的臉和手臂就恢復了知覺。突然間，她能夠自由地呼吸，胸口的疼痛和壓迫感也消失了。不久之後，她就離開診所，覺得自己全然安好。


    黛比在婚姻破裂那段日子裡感受到的那股難以承受的心痛，真真實實被困在她體內，而她身體上的症狀瞬間解除這件事令我感到驚奇，我不禁開始思考其中的運作機制。單單一個受困情緒怎麼有辦法引發如此劇烈的身體症狀？


    針對受困情緒如何影響我們的身體，黛比的經歷算是極端案例。一般而言，受困情緒不會造成黛比那種劇烈症狀。大部分的症狀都比較不明顯，但依舊會讓身心失衡。傳統心理治療雖然有其地位，卻沒辦法、也並未試圖移除受困情緒。


    ### 雪倫的母親是她身體疼痛的原因


    有一天，一位名叫雪倫的患者來到我的診間，說她下腹疼痛。她告訴我，那個痛似乎來自右側卵巢。我為她做檢查，以確認她的疼痛是不是受困情緒所致，果不其然。


    進一步測試的結果顯示，那個情緒是「挫折感」，和她母親有關，三天前被困在她體內。我一說出這個結論，她馬上氣憤地說道：「噢，又是我媽！她三天前打電話給我，把事情一股腦兒地往我頭上倒！我真希望她從我的生活裡消失，還我一個清靜！」


    我把那個被困住的挫折感從她身體釋放掉，她立刻不痛了。雪倫大為驚奇，幾乎不敢相信疼痛就這麼突然完全消失了。更讓雪倫驚訝的是，她母親給她的那種強烈挫折感，竟是她過去三天身體疼痛的主因。


    受困情緒甚至可能造成肌肉不平衡而引起關節問題，最終導致關節退化和關節炎。一釋放受困情緒，劇烈身體疼痛立即消失的案例，說實話，我看過不下數百件。


    ### 吉姆保住了膝關節


    很多人在移除受困情緒後立即擺脫疼痛、不適，就算被正統醫學宣告無望的病例也一樣。下

    面這封信是我以前一位病人寫給我的，他的例子正好是這種狀況的最佳寫照。


    我是你好幾年的病人了，當初會去找你，是因為我的雙腿、膝蓋和背部出現許多問題。我撐過了你為了清理我的身體而開立的營養補充品造成的副作用，接著，你幫我釋放了我緊緊抓住的怨恨、憤怒和恐懼，我的膝蓋終於不再痛了（之前幫我置換人工髖關節的醫生告訴我，我的膝關節也磨壞了，必須換成人工關節），多年來頭一次可以無痛地走路或爬樓梯。到目前為止，我基本上行動自如，不會疼痛。雖然不能說年紀愈來愈大之後關節炎不會來找我，但磨損的膝蓋還堪用，就讓我感激不盡了。我希望你的書大賣，並祈禱這本書可以為其他人開啟通往健康生活的大門。


    ——吉姆


    很多人會忍受疼痛，然後最終只能「與疼痛共處」，特別是找不到解決辦法或原因的時候。疼痛往往是一種警訊，是身體在告訴你某個地方出了問題。


    在處理疼痛患者的經驗中，我觀察到，至少有一半的疼痛是受困情緒引起的。


    ### 被別針「別」在過去


    有一次，我在拉斯維加斯帶工作坊時發生一件很有意思的事。我當時徵求一名自願者，一位二十出頭的女孩從觀眾席中起身走來。我問她有沒有任何身體上的不適，她說沒有，她很健康，沒什麼問題。


    我爲她進行肌肉測試，看看她是否有受困情緒，結果是有的。這個情緒是「孤立無援」，是一種類似你很需要幫助時卻獨自一人、求助無門的感覺。


    我利用肌肉測試問她的身體，這個情緒是何時被困住的。「這個情緒是最近五年內被困住的嗎？」「不是。」「這個情緒是十到三十歲之間被困住的嗎？」「不是。」「這個情緒是出生後到十歲之間被困住的嗎？」「是。」「這個情緒是在你出生後的前五年被困住的嗎？」「是。」「這個情緒是在你出生後的第一年被困住的嗎？」「是。」「這個情緒出現在你一歲以後嗎？」「不是。」「我問她有沒有什麼頭緒，她搖搖頭表示沒有。


    這位年輕女士的母親那天正好也一起參加工作坊，坐在觀眾席。此時，我向觀眾席望去，發現她母親神情有異。


    她的手摀著嘴，看起來不知是嚇到或覺得尷尬，我分辨不出來。我問她是不是知道一些內情，因爲她女兒當時年紀太小，不可能記得發生了些什麼。'
