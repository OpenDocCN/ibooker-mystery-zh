- img_proc: true
  md: '「尼爾森醫師，我有個奇怪的請求，不知道你能不能幫幫我。」她在電話裡說，「我有一匹叫遊俠的馬，最近不知怎麼搞的動不動就小便。我替牠找了三位獸醫，卻都找不出是什麼原因。獸醫宣稱遊俠非常健康，但牠帶來的麻煩可不小。牠不只替我製造麻煩，也為鄰近馬廄的主人與其他馬兒帶來不少困擾。我知道你偶爾會幫忙療癒動物，如果你可以過來看一下這裡的狀況，我真的會非常感激你。也許你可以幫忙治療遊俠。」


    還記得琳達之前來就診時，我們都會分享彼此對馬兒的熱愛。我自己就是在有許多馬匹圍繞的環境下長大的蒙大拿小孩，小時候的我從不放過任何可以騎馬的機會。琳達讓我看過四、五張她養的馬的照片，不過我沒有真正去她的馬廄見過那些馬。


