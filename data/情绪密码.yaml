  md: '# ★遺傳來的受困情緒


    如同你遺傳了父親、母親和其他祖先的眼睛顏色或鼻子形狀一樣，你也可能遺傳了他們的受困情緒。遺傳來的受困情緒，和胎兒期的受困情緒或其他任何類型的受困情緒是不同的。


    如果是遺傳來的情緒，你在受精卵形成的當下就從精子或卵子接收到那個情緒的能量了。


    當精卵結合時，其中一方已經帶著某些額外的情緒能量了。這個受精卵開始分裂，然後，存在原本那個受精卵中的一切也被複製了。隨著受精卵不斷分裂，這額外的情緒能量也會被複製。


    你當然可以詢問「是否有個我們現在可以釋放、遺傳來的受困情緒」，來揭露這類受困能量的存在。但大多數時候，你會在尋找一般受困情緒時，偶然發現這是遺傳來的受困情緒。


