    這本書讀到這裡，你或許開始懷疑自己是否也有受困情緒，那些情緒又會是什麼。下面就列出一些往往會導致受困情緒的狀況：


    - 失去所愛之人

    - 離婚或親密關係遭遇問題

    - 財務窘迫

    - 家庭壓力或工作壓力

    - 流產或墮胎

    - 身體創傷

    - 身體或情緒遭受打擊

    - 身體、心理、言語或性虐待

    - 負面的自我對話

    - 對自己或他人抱持負面信念

    - 長期壓力

    - 被拒絕

    - 身體疾病

    - 覺得自卑

    - 把感受藏在心底

    - 被忽視或被拋棄


    這張清單不可能涵蓋所有狀況，唯一可以知道您是否有受困情緒的辦法，就是詢問你的潛意識。這並不難，但開始之前，我必須先說明一下。


    # 儲存大量資訊的潛意識


    首先，我們來談談意識與潛意識之間的差別。這裡提供一個簡單的區分方式。經常有人提到，我們人類只使用了大腦的百分之十，這意味著意識只需要用到百分之十的腦力；換句話說，思考、行動、做選擇、做計畫、看東西、聽聲音、嘗味道、觸摸和嗅聞都是意識活動，而這一切只佔用了大腦百分之十的處理能力。


    假如這種說法成立，那麼，大腦的其他百分之九十在做什麼？如果意識佔了大腦的百分之十，我們就可以稱其他百分之九十為潛意識。這大部分沉默又無意識的大腦始終忙著儲存資訊、忙著讓你的身體系統可以有效運作。潛意識對我們所做的事，以及我們的行為和感覺有著看不見卻很強大的影響力。


    大多數人很少想到自己的潛意識，但想像一下接管潛意識負責執行的功能會是什麼景象。指導消化系統如何消化你的午餐，或是告訴你的細胞如何製造蛋白質或酵素，是多麼困難啊！如果你一整天时时刻刻都必須為了維持心跳或呼吸而操心，你還會認為爲現在的子過得很湊嗎？


    就像電腦一樣，你的潛意識能夠儲存大量資訊。


    腦部手術時常在病人清醒、有意識的情況下進行。大腦沒有痛覺神經，外科醫師便利用這一點，在手術中心心地以探針探查病人大腦，以獲得病人的回饋。


    知名神經外科醫師威爾德·潘菲爾德發現，在某些情況下，接受腦部手術的病人大腦某個部位被刺激時，會喚起回憶。舉例來說，當醫生以電極刺激腦部某個區域時，處於清醒狀態的病人會突然想起生命中某個特定時刻的場景、味道或聲音。


    這些突然閃現的場景或事件在正常情況下往往不會被憶起，但如果以電極再次觸碰相同腦部區域的相同位置，同樣的記憶便會再度湧現。


    如果你和我一樣常常記不得昨天發生什麼事，我相信你的潛意識依舊會完整無誤地幫你將事情記錄下來。


    我相信，你一生中做過的每一件事，都被記錄在你的潛意識裡。


    你在人群中見過的每一張臉，以及經歷過的每個氣味、每個聲音、每首歌曲、每個味道、每次觸碰、每個感覺，都被你的潛意識記錄下來了。


    曾經侵入你身體的每一個病毒、細菌或真菌，你受過的所有傷害，你的一切想法和感覺，以及你體內每個細胞的完整歷史，都被存檔。此外，潛意識對你身體可能藏匿的任何受困情緒都瞭若指掌，也知道那些情緒對你的身體、情緒及心理健康有何影響。這一切都被儲存在潛意識裡。


    # 潛意識是你的超級電腦


    不僅如此，潛意識也非常清楚你的身體需要些什麼才能恢復健康。不過，你該如何取得這項資訊？


    我在脊骨神經醫學院就讀時開始問自己這個問題，後來才慢慢理解，大腦本質上是一部電腦，一部在已知的宇宙中最強大的電腦。這不禁讓我想到，療癒者有沒有辦法汲取大腦的巨大力量，以獲得關鍵資訊，弄清楚自己的病人到底怎麼了。


    行醫那些年，我發現利用「肌肉動力學」或俗稱的「肌肉測試」，真的有可能從潛意識提取資訊。肌肉測試是一九六〇年代由喬治·古德哈特醫師首先發展出來的一種方法，用來矯正骨骼結構不平衡問題，現在則被廣為接受。雖說世界各地許多醫生都利用肌肉測試來矯正脊椎錯位及其他的不平衡，卻比較少人知道，肌肉測試可以用來直接從潛意識取得資訊。


    ## *與身體對話


    透過肌肉測試與患者的潛意識展開對話的能力，成了我的一項強大工具，讓我可以盡快得知患者需要些什麼才能康復。我慢慢變得完全相信身體的智慧，並且對於身體藉由肌肉測試將那份智慧傳達給我的天生能力很有信心。多年來針對一般民眾和醫生舉辦的教學講座讓我明白，人人都可以做到這件事。任何人都能學會問出身體的答案，也都能採取一些必要步驟去幫助身體療癒。你不需要是個醫生，只需要有學習的意願。


    許多年來，我一直迫切地想要與世人分享這份非凡的知識。過程中，我持續不斷地禱告，努力把「情緒密碼」這套系統淬鍊得更為簡易，而現在，它已經簡單到人人都學得會了。你很快就能擁有你所需的全部知識，以開始運用這個方法移除體內的受困情緒能量。


    # 負面刺激與正面刺激


    在我教你如何從潛意識取得資訊之前，你必須知道一個基本原則：所有的有機體，無論多麼原始，都會對正面或負面刺激產生反應。例如，植物會向陽生長，避開暗處。水族箱裡的阿米巴原蟲會游到光亮處，遠離陰暗；如果在水裡滴入一滴毒物，阿米巴原蟲會離開有毒的地方，往乾淨的水游去。


