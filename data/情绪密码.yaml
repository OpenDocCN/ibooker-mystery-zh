  md: '# 《附錄》情緒的定義


    防衛：避免被攻擊，或是保護自己的一種狀態；對於威脅、批評或傷害到自己的自尊的事物一種敏感的表现；防禦自己身體或心理上遭受的威脅，這個威脅可能是真實的，或是想像出來的。


    哀痛：因為失去、災害或災禍而引發的強烈情緒；劇烈的傷心遺憾及深層的悲傷；喪失親人的普遍表現，也可以是煩擾、生氣或惱怒的感覺。


    自虐：情緒上的自虐包括負面的自我對話（例如：我真是個白痴）、自我責怪等。身體上的自虐包括不當的物質成癮、熬夜或不注重自己的身體健康，缺乏適當的飲食或營養。過度工作；過度懲罰自己或背負重擔，這種自虐常見於贖罪。疾病也是一種自虐的表現。


    倔強：難相處；無法變通；無法或不願意原諒；倔強的；固執任性的；抗拒的。


    憂鬱：傷心的；前景黯淡的；情緒低落的；沒有精神的狀態。通常是對自己生悶氣，以及對自己感到羞恥和罪惡感而延伸出來的情緒。'
  merge: -1
  pgno: 333
- img_proc: true
  md: '挫折感：令人惱怒的；遇到瓶頸了；無法再繼續了；無法再往目標前進的受阻感。


    猶豫不決：沒有做決定的能力；在兩個選擇之間擺盪不定，源自不信任自己，或是懷疑自己有做出好決定的能力。


    恐慌：突如其來的、全面壓垮的恐懼讓人產生歇斯底里的行為；不合理的恐懼念頭或身體症狀，例如顫抖、過度換氣；強烈感覺厄運即將到來。


    付出被視為理所當然：感覺被漠不關心地對待；不受感激；被忽視。


    衝突：「內在衝突」是指個人自己內心及情緒上因為衝突或衝動而引起的掙扎（例如：要不要換新工作）。「外在衝突」是指與之對抗、意見相左、不合意、抗拒之、使敵對之；長期的衝突與爭吵（例如：她與前夫因為監護權的問題引發長期衝突）。


    對創造感到不安：因為感受不到安全感，或是不信任自己，以致無法創造或發展任何事物，其中包括無法創造或發展關係、家庭、健康、金錢、事業或藝術創作。因為不安全感而阻礙了創'
