    # ★ 為他人測試


    肌肉測試也可用於為他人找出身體有什麼問題。你可以直接測試當事人，或者採用替代者測試或代理人測試，第八章會詳述這些方式。


    為數眾多的生機論醫師和療癒工作者會在例行療程中使用肌肉測試來幫助自己的病人。你很容易就能學會肌肉測試，用來幫助自己、朋友或你所愛的人找出受困情緒，並運用情緒密碼將之釋放。


