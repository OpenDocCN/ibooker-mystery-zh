    # ★步驟一：取得受試者同意


    如果你是施作在自己身上，你已經同意了，可以直接進入下個步驟。


    假如是要為他人施作，進行測試和從受試者身體取得資訊前，必須確保對方同意你這麼做。你可以問：「我可以測試你是否有受困情緒嗎？」不要以肌肉測試取得這個問題的答案，而是要讓你的夥伴在口頭上允許你，或者至少點頭同意。


    一旦雙方都覺得舒服、放鬆，你們就可以開始了。


    # ★步驟二：建立測試基準


    詢問關於受困情緒的問題之前，必須先建立測試基準。請選擇一個你覺得用起來最舒服的肌肉測試法。你必須確認受試者是否處於可測試狀態：當對方說出'
  - '[PAGE 177]


    # 第3部 情緒密碼這樣用


    一個真實或符合真相的陳述句時，其肌肉是否呈現強而有力的反應？當對方做出不真實或不符合

    真相的陳述時，其肌肉是否變得軟弱無力？

    此外，因為每個人都是獨一無二的，你對不同的人做肌肉測試的感覺也會有所差異。建立測

    試基準的目的在於獲得明確的強、弱肌力反應，這能讓你知道對方的肌肉在測試中處於「強壯」

    與「軟弱」狀態時各是什麼感覺。

    想要建立測試基準，最明確、最廣為使用的方法，就是由受試者大聲說出自己的名字：「我

    的名字是——。」


    只要對方說出這個符合真相的陳述句，其肌肉應該會呈現強而有力的反應。

    現在，請你的夥伴大聲說出一個不真實的陳述句：「我的名字是——。」空白處請使

    用任何一個不是他名字的名字，其肌肉應該會變得軟弱無力。

    當然，讓你的夥伴說「是」或「不」、「愛」或「恨」等字眼，同樣也可以用來建立測試基準。


    # 如果夥伴處於不可測試狀態


    請記住，建立測試基準的部分原因是要確認受試者目前是否處於可測試狀態。假如對方無論

    說什麼陳述句，手臂肌肉皆維持強或弱的反應，那麼他此時就無法接受測試。在這種情況下，你'
  - '[PAGE 178]


    有幾個選擇：

    如果你或你的夥伴有脫水現象，會讓肌肉測試變得較難、甚至無法進行。

    輕微脫水很常見，也很容易解決。讓自己和夥伴喝杯水，然後再試試。如果還是不行，你的夥伴很可能有頸椎錯位的問題，在對方去找脊骨神經醫師調整之前，你可以藉由在替代者或自己身上施作，來為他們測試。

    有些人則是因為身體方面有所損傷或限制，而無法接受測試。此時，替代者測試就是幫助他們最好的選擇（第八章會更加詳細地介紹替代者測試）。


    # ★ 步驟三：判斷是否有受困情緒存在


    讓受試者說出下面這個陳述句：「我有個現在可以被釋放的受困情緒。」

    然後，使用你選擇的方法測試其反應。左邊的表格列出你可能選用的測試法，以及可能出現的結果。'
