    想想看，沒有了情緒，你會是什麼樣子？如果你所有的人生經驗構成一匹華美的掛毯，沒有

    了你體驗到的種種情緒，何來掛毯上各式繽紛的色彩？


    我們的情緒確實為生活添上一抹色彩。試想一下，一個沒有情緒起伏的世界會是什麼模樣？


    沒有喜悅，也沒有快樂、幸福、仁愛或友善的感覺，沒有人可以感受到愛，沒有任何正面情緒存

    在的可能。


