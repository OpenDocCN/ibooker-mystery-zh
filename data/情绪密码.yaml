    我認為磁場缺乏症候群是許多疾病的成因之一。如同大多數疾病，纖維肌痛症有各種因人而異的潛在病因，磁場缺乏症候群是其中很常見的一種。在磁場缺乏症候群是這個疾病主要或唯一潛在成因的案例中，運用磁能量會有戲劇性的改善，就像羅拉一樣。


