  md: '# 雙環測試法


    用一隻手的拇指與食指做出一個環，再用另一隻手的拇指與食指做出另一個環，然後將兩個環連結在一起，好像鎖鏈一般。形成其中一個環的拇指與食指擔任抵抗指的角色。再次運用負面或不符合真相的陳述句，慢慢調整抵抗指的力量，直到找出恰當力道為止。說陳述句時，試著將雙環拉分開（由擔任測試指的那個環負責拉）。記住，你只是要找出當你說出


