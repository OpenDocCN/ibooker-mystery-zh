    # 受困情緒滯留在哪裡？


    身體跟著共振也只剩一小步了。


    很多人問我，為什麼某個情緒會被困在身體的這個區域，而不是那個區域？我發現，受困情緒常常滯留在身體比較容易受影響的部位——那些部位的能量因為遺傳易感性、損傷或營養不良而減少或失衡，讓它們容易受影響。


    有時，「隱喻」也發揮作用。當你了解潛意識主宰了身體和夢境時，這個說法就很合理了。


    象徵和隱喻是潛意識的語言，受困情緒很自然會滯留在具有象徵意義的身體部位。


    假設你為一個小產的朋友感到哀痛，並且沒有在感受過那個情緒之後就拋開，反而讓它被困住了，那麼，該受困情緒如果滯留在你的子宮或乳房（滋養的器官），也不令人驚訝。或者，假設你正處於生命中的困難時期，事情接連出狀況，讓你感覺受挫、快要被壓垮了，彷彿全世界的重量都落在你一人肩上。這種情況下，受困情緒也許就會滯留在你的肩膀。事實上，身體的任何部位都可能變成情緒受困之處。


    如果沒有注意到，這種失衡的狀況可能會持續很多年，最後在你的身體和心理健康上引發真正的問題。'
