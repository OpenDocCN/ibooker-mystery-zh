  md: '# ★確認情緒是否已被釋放


    想要確認情緒是否已被釋放，只須詢問：「我們（我）是否已經成功釋放了這個受困情緒？」答案應為「是」。如果得到肯定的答案，這個受困情緒的釋放程序便完成了，現在你可以檢查看看是否有另一個受困情緒要被釋放，如果你想要的話。


    這份意念。其結果就是，磁鐵滑過三次之後，受困情緒便永遠被釋放掉了。就是這麼簡單。


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_196_0.png)


    督脈


    在對方的背部，頸根處。告知你的夥伴在你滑動磁鐵時保持自然呼吸，然後從他的頸根處往下滾動或滑動磁鐵，一直滑到下背部或再往下。每一次滑到底之後，就將磁鐵拿離開對方背部，再放回頸根處往下滑，總共做三次。磁鐵每滑過一次，就會將磁能量轉移到督脈，這個磁能量會放大你的意念，並將之帶進其他所有經脈，讓全身充滿'
