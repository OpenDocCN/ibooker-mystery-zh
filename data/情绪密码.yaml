    # 莎拉與甘迺迪遇刺案


    我永遠不會忘記莎拉。她是個七十一歲的老婦人，來找我看診。我透過肌肉測試詢問她的潛意識，她需要些什麼，結果發現她有個受困情緒：悲傷。

    你的記性也許不是特別好，但你的潛意識可是會把發生過的所有事情記得一清二楚，當然也了解每個受困情緒的詳情。潛意識知道受困情緒何時發生、那個情緒到底是什麼、有誰牽涉其中等。

    在向莎拉的潛意識探詢該受困情緒的相關細節時，我試著確定發生的時間點。結果，這個悲傷的情緒是在一九六三年被困在莎拉的身體裡。


    一個直覺讓我問道：「這股悲傷與甘迺迪遇刺有關嗎？」她的身體透過肌肉測試給了肯定的答案。得出這個結果時，莎拉立刻潸然淚下，邊哭邊說：「噢，沒錯，那件事對我影響至深。非但如此，當甘迺迪總統的兒子，小約翰·甘迺迪幾年前墜機身亡時，我又猛然想起那件事。我什麼都沒辦法做，在家哭了好幾天。」


    受困情緒不斷發出負面振動，讓瑪莉失去平衡、難以招架。那些情緒被消除之後，她就能夠以比較健康的方式面對生命中的失落了。'
