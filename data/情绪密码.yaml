  md: '| 第五列<br>腎臟或膀胱 | 責備<br>懼怕<br>恐懼<br>恐怖<br>惱怒 |


    # ★ 找到正確的情緒


    你可以問：「這個受困情緒是在奇数列嗎？」如果答案是否定的，你就知道它一定是在第二、第四或第六列；假如答案是肯定的，你就知道该受困情绪是在奇数列了。为了方便说明，我们必须假定它在其中哪一列。


    第三或第五列。接下来，我们必须判定它在第一列。


    你可以这样问：「这个受困情绪是在第一列吗？」


    如果答案是否，就继续问：「这个受困情绪是在第三列吗？」


    如果还不是，就询问是否在第五列。


    找到正确的栏、列之后，你已经把搜寻范围缩小到只剩五个可能的情绪。


    假设你判定该受困情绪在 A 栏的第五列，我们来看看表中的那一格有哪五个情绪（见上表）。


    再强调一次，受试者的潜意识明确知道你要找的受困情绪是哪一个。


    而透过肌肉测试精准找出该情绪，你便让受试者的「意识」觉察到这个受困情绪了。'
