  md: '有幾個選擇：

    如果你或你的夥伴有脫水現象，會讓肌肉測試變得較難、甚至無法進行。

    輕微脫水很常見，也很容易解決。讓自己和夥伴喝杯水，然後再試試。如果還是不行，你的夥伴很可能有頸椎錯位的問題，在對方去找脊骨神經醫師調整之前，你可以藉由在替代者或自己身上施作，來為他們測試。

    有些人則是因為身體方面有所損傷或限制，而無法接受測試。此時，替代者測試就是幫助他們最好的選擇（第八章會更加詳細地介紹替代者測試）。


    # ★ 步驟三：判斷是否有受困情緒存在


    讓受試者說出下面這個陳述句：「我有個現在可以被釋放的受困情緒。」

    然後，使用你選擇的方法測試其反應。左邊的表格列出你可能選用的測試法，以及可能出現的結果。'
