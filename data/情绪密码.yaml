    ## 人與人彼此相連


    事實上，整個人類家族在能量上是連結在一起的。地球另一端的人們受苦受難、性命垂危時，我們在潛意識層次上會感受到他們在遠方的哭泣和痛苦，並因而變得陰鬱、不快樂。當這個世界發生了一件悲慘的事，全世界的人都會在潛意識層次上感覺到，並受其影響；另一方面，若發生了一件美好的事，所有人都會同感喜悅。


