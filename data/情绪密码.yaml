    ## 受困情緒這樣影響你的人生


    想像一下你的想法對自己會有什麼樣的影響。每個人不時都會進行某種內在對話，你都對自己說什麼？許多人自我批評的次數遠比讚美自己多，然而，負面自我對話對你造成的傷害可能比你知道的嚴重許多。


    那身旁的人呢？你是否想過別人能夠感受到你對他們的感覺？其他人的潛意識一直在偵測你的想法發出的振動。你有沒有過身邊的朋友恰好說出你腦袋中正在想的事情的經驗？你是否曾經在電話鈴響之前就直覺地知道是誰打來的？這些不是巧合，而是思想能量具備影響力的證明。


    利用情緒密碼尋找受困情緒，與偵測他人思想或感覺發出的振動是類似的原理，其中的差異在於你可以詢問身體並真正得到明確的答案，而不是透過臆測。然後，你就可以一勞永逸地釋放受困情緒，並確知它們不會再回來了。


    ## 精確找出並釋放受困情緒，而不是碰運氣


    任何一位替代療法工作者都會告訴你，幾乎所有人都帶著過往的情緒能量。人的身體會緊緊抓住受困情緒，醫生和身體工作者很清楚這一點，因為一個簡單的觸碰往往就能讓患者的情緒和記憶如洪水般湧出。幾乎我認識的每一個療癒工作者——從脊骨神經醫師、能量工作者到按摩治療師——都有過這種經驗：患者的身體在釋放它一直緊抓不放的能量時，意外地一併釋放了情緒。


    釋放那些受困情緒會立即產生非常有效的療癒結果。雖然機緣巧合釋放情緒是件好事，但這通常不是那些療癒工作者原本的目的，過程中發生的情緒釋放純粹是意外。


    然而，情緒密碼這套方法目標明確。我有時會把它想作是一種「情緒手術」，因爲我們是帶著「將之移除」的明確意圖在尋找受困情緒，其中沒有任何碰運氣的成分。受困情緒有潛在的破壞性，你必須把它們找出來，排出體外，並確認它們已經被釋放了，而情緒密碼能夠幫助你精確而簡單的方式做到這一點。


    ## * 小孩子的受困情緒


    在我寫這本書的時候，我那對雙胞胎兒子已經十八歲了。我處理受困情緒的早期經驗之一來自我兒子睿特，當時還是個學步兒。睿特和德魯是異卵雙胞胎，相異的程度就和其他任何兩個小男生差不多。德魯一直很黏他媽媽和我，睿特則是和我妻子琴恩很親，但三歲左右開始不太搭理我。當我想要抱他、親近他，或是跟他依偎在一起時，他會把我推開，並且說：「壞醫生！走開！」起初我們以爲他只是正在經歷某種階段，一陣子之後就好了，但是他對我的負面感受持續了超過一年，讓我很傷心，也備感挫折。我不了解自己的兒子爲何會對我有這種感覺。


    某天晚上，我和琴恩坐著聊天，睿特坐在琴恩的腿上。我張開雙臂準備給他一個擁抱，他的反應則一如往常，將我推開，然後說：「壞醫生！走開！」這一次，我真的覺得很受傷，胸口簡直痛到要爆開，眼淚都快流下來了。我妻子說：「你知道的，也許他有受困情緒。」


    當時我們只處理過成人的受困情緒，但我們決定幫睿特做個檢查。透過情緒密碼，我們發現他真的有個受困情緒：哀痛。然而，不是他對我感到哀痛，而是我對他；換句話說，他在某個時間點感知我對他有哀痛的情緒。他強烈地感受到那股哀痛，以致它被困在他的身體裡。測試的結果顯示，那個受困情緒源自有一次我和大女兒吵架，而睿特剛好目睹整個經過。雖然我的哀痛不是針對他，睿特還是感知到我對女兒的哀痛情緒，並且攬到自己身上。


    釋放那個被困住的哀痛後，讓我驚奇的是，睿特向我走來，用雙臂抱住我。我哭著抱住我的小男孩，當下覺得既驚訝又興奮。如果只是移除受困情緒就能讓我兒子瞬間轉變，那麼，世界上還有多少孩子可以因而受益？


    ## 飛行員的女兒對他從疏離到親近


    隔天我在診所和一位病人聊到睿特，她說：「我覺得我女兒可能也有受困情緒。我丈夫是民航機飛行員，每星期都會連續離家幾天。每次他結束工作回家，我們的六歲女兒就會跑去躲起來，不願意和他親近，這傷透了他的心。」


    第二天，她把女兒帶來診所。檢查後發現，這個小女生確實因為父親而產生一個受困情緒：傷心遺憾。父親長時間離家讓她感到傷心遺憾，而在某個時間點，這個情緒強烈到讓她的身體失去平衡，情緒就此被困住了。這股情緒能量在潛意識層次上強烈影響到她對父親表現出來的行為。


    我們幫她釋放了傷心遺憾的情緒，然後她們母女倆就回家了。


    隔週，這位母親回到診所對我說：「尼爾森醫師，情緒密碼這個療法真的有用。我帶女兒來接受治療時，我丈夫剛好不在家；幾天前他從國外回來，一打開家門，我們的小女孩就跑過去跳進他懷裡。她以前從來不會這樣，一次都沒有！我丈夫高興極了！非常謝謝你。」


    我的雙胞胎兒子到了四歲時，睿特在口語上已經可以表達得很清楚，而且很愛講話，德魯則恰恰相反，讓我們夫妻不禁開始擔心起來。德魯在四歲時還無法說出完整的句子，且幾乎不太說話，要說話時還常常把手放在嘴巴上，彷彿很怕講話。


    他似乎對很多事都感到恐懼。去社區的游泳池，睿特馬上跳進池子裡，德魯則不安地站在池邊。他對任何新事物都顯得小心翼翼，並且有幽閉恐懼症。出去玩的時候，只要身後的門一關上，就會陷入恐慌，然後放聲尖叫。


    ## 德魯出生時的創傷經驗


    心理測驗顯示德魯有高智商，但發展速度不如同齡孩子的標準值。聽力測試也顯示他的聽力很正常。似乎沒有什麼原因可以解釋德魯的狀況。


    經歷過睿特的事之後，我們決定幫德魯檢查看看他是否有受困情緒，但當時我們不知道受困情緒真的就是造成他問題的原因。


    測試德魯時，我們很快就找到幾個受困情緒，這些情緒是他出生時，以及之後一小段時日裡的某些創傷引起的。


    琴恩生這兩個小傢伙時，產程長達二十二小時。睿特首先出生，他看起來很漂亮、很滿足，馬上就沉沉睡去。德魯則在十四分鐘後出生，而且狀況很不好，全身發青，沒什麼生氣。一群醫生立刻圍著他急救，他們不確定德魯能否撐過來，他的情況危急。


    最後他還是撐過來了，但接下來的十幾天還是有很多緊急狀況。我們在兩個男孩出生幾天後就把他們帶回家，但德魯必須再入院檢查到底哪裡出了問題。他喝下去的母奶統統吐了出來，體重直線下降。醫生告訴我們，他在出生後的頭幾天受到感染，可能危及性命。為了救他，醫生必須在他小小的身軀上做脊椎穿刺，並且透過靜脈注射抗生素。


    雖然百般不願意，但這個醫療程序開始時，我和琴恩都被請出了病房。在醫療團隊多次嘗試把針刺進德魯小小的血管和脊椎裡時，我們都沒辦法在他身旁安撫他，只能無助地聽著他因為驚恐而發出的尖叫聲。


    我倆自己並沒有老是想著德魯的創傷經驗，也從未在他小時候跟他討論過這些事。我們連想到都覺得很不舒服。四年後，就我們所知，德魯完全不記得這些事，但他的確對很多事物都很恐懼。


    我們一一找出並釋放與這些創傷事件有關的受困情緒。嬰兒時期的德魯感知到的事，以及那使他產生多深的恐懼，讓我們很驚訝。他可能預期來到這個世界會是一件很美好的事，想不到卻陷入一個他幾乎無法應付、極度痛苦的情況，彷彿降生到地獄裡了。你可能想像得到，他有恐懼、驚恐、覺得被遺棄的受困情緒，發現時我們也覺得心痛難耐，這些無疑就是他當時接受急救治療時的感受。


    德魯在媽媽的子宮裡等著在哥哥之後出生時，還產生了「恐慌」這個受困情緒。他哥哥睿特不急著離開那個陰暗卻舒適的家，這讓排隊等候的德魯有了恐慌的受困情緒，因而造成日後的幽閉恐懼症。


    此外，他還從他祖父那裡遺傳了一個「憤怒」的受困情緒，就是這個遺傳來的憤怒讓他不願意開口說話。他很害怕自己說出的話會傷人，這也解釋了為什麼這孩子說話時總摀著嘴。那天晚上我們釋放了這所有的受困情緒，然後就上床睡覺了。


    隔天上午吃早餐時，我們簡直不敢相信眼前的變化！德魯就像個小話匣子，突然間，而且是生平第一次，他說出了完整的句子。沒有受困情緒將他和舊時的創傷綁在一起，德魯終於能拋下恐懼。他的幽閉恐懼症消失了，畏畏縮縮的態度也是，完全成了一個開朗、快樂、充滿好奇心的小孩。


    ## ### ★受困情緒其實很普遍


    雖然不太可能透過肉眼判別，但差不多所有人都有受困情緒。我執業的那些年幾乎沒治療過沒有可識別的受困情緒的病人，記憶中只碰過一個。這個人花了許多時間靜心，在我眼中是個平靜、仁慈、泰然自若的人，很能掌控自己的情緒。我剛剛是不是說了「掌控自己的情緒」？是的，我會在第十章進一步說明這個主題，讓大家知道如何在未來避免受困情緒產生。


    僅僅因為經歷過的事，以及在人生旅程的此刻自己是什麼樣的人，就讓我們絕大多數人都有受困情緒。


    當某人經歷創傷或引發強烈情緒的事件，如車禍、爭吵或離婚時，就會產生與該事件有關的受困情緒能量。然而，並非每個情緒事件都會創造出受困情緒。人的身體是被設計來處理一般情況下的情緒能量，所以，當某個情緒被困住了，有部分是因為情有可原的狀況，如抵抗力下降、太過疲勞或身心失衡。當身體不是處於最佳狀態時，我們會比較容易產生受困情緒。


    ## 音叉


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_74_0.png)


    每個受困情緒都會在體內某個特定部位，以它自己的特定頻率振動著。不久後，這股振動會讓周圍的身體組織也以同樣的頻率振動，我們稱這種現象為「共振」。


    在我的講座裡，我會用音叉示範我們的宇宙對共振的回應有多強烈。我有一支音叉的振動頻率是五百一十二赫茲，發出的聲音高亢尖銳；另一支音叉的尺寸不一樣，振動頻率是一百二十八赫茲，聲音低沉許多。


    如果將數支不同尺寸的音叉放在同一個房間，然後敲擊其中一支，其他所有具備那個頻率的音叉都會開始發出微弱的嗡嗡聲；假如你讓你敲擊的那支音叉不再發出聲音，其他的音叉會繼續振動。這不是什麼音叉之間的自然吸引現象，而是宇宙的運行方式。


    ## 受困情緒的共振現象


    如果你敲打一支音叉並把它放到玻璃上，那片玻璃會開始以同樣的頻率振動，這是因為音叉迫使構成玻璃的能量動起來——與音叉同步振動。當你有個受困情緒時，就有點像體內有支音叉持續以某個負面情緒的特定頻率振動著，而不幸的是，這可能會將更多那種情緒帶進你的生活中。


    你有沒有看過一個人的情緒影響到一屋子人的情緒？也許你今天心平氣和地坐在候診室等著看醫生，旁邊有幾個人正安靜地在看雜誌，然後，一個焦慮不安的病人進來了。他在候診室來回踱步，一會兒拿起雜誌，一會兒又放回去，跟櫃台人員說話時也顯得很煩躁。他的肢體語言完全暴露了他的情緒，然而，這種無形的影響威力最強大。


    那個病人將一個強烈的、焦慮的振動發射到候診室，然後，你、櫃台人員和其他病人体內的某些細胞會開始以那個頻率振動。很快地，房裡的每個人都覺得有些焦慮不安，候診室的氣氛隨之改變，大家開始出現不一樣的感覺和反應。那個焦慮的病人不只將更多的不安吸引到自己的生活中，也在周遭的人身上引發那種情緒。


    如果你有一個受困情緒，就會吸引更多同樣的情緒到你的生活中。此外，你也更容易且更常'
  mdcn: '換言之，如果現在你體驗到恐懼的情緒，你的腎臟或膀胱正在製造那個特定的能量或振動；假如你覺得悲傷，這個情緒是由你的肺臟或大腸製造出來的，以此類推。


    當然，現在我們知道，感受到某些情緒時，腦部的某些區域會被觸發，而且我們感受到的情緒都有其生化成分。甘德絲·柏特博士在她的著作《情緒分子的奇幻世界》清楚解釋了我們本質中屬於「生化」的這一面。


    我們的本質中也有能量的一面，而現代科學正開始探索我們情緒的能量成分，並找出其關連性。


    多年門診經驗下來，我完全相信古時候的醫生所言是真的，身體裡的器官的確製造了我們體驗到的情緒。如果你現在覺得憤怒，這個情緒不完全來自你的大腦，它其實是由你的肝臟或膽囊發出來的；若你此刻感覺被背叛，這個情緒其實源自你的心臟或小腸。


    以前我們習慣把身體和心智分開，或將兩者視爲獨立個體，但現在身心的界線變得模糊，甚至沒有人知道是哪一方影響了哪一方。


    不只你的大腦，你的整個身體都充滿智慧。每個器官都是一個智能體，各司其職，並製造特定的情緒或感覺。


    得知體內器官製造了我們感受到的情緒，人們往往覺得很訝異。然而，這當中還是有些關連性可循，雖然大部分醫生都不會把注意力放在這上頭。


    ## 受困情緒殺死了黛娜·李維？


    我們都記得那個讓演員克里斯多夫·李維四肢癱瘓的悲慘意外，也感動於他的妻子黛娜·李維始終如一的付出，所以聽說她去世時，我們都很震驚、難過。丈夫過世十個月後，黛娜就向世人宣布自己罹患肺癌，並於七個月後撒手人寰，得年四十四歲。


    沒有抽菸習慣的黛娜·李維死於肺癌，一般人覺得她的死要歸因於二手菸，我則不這麼認為。肺臟是製造悲傷情緒的器官，而過度的悲傷無疑會導致受困情緒產生，往往影響到源起的器官。黛娜當然有理由悲傷，而我相信受困情緒，尤其是悲傷，至少是她死亡的部分原因，也許是全部的原因。


    ## 怒氣沖天的酒鬼


    另一個例子是酒精對人的影響。我們都知道，酗酒的人經常死於肝臟疾病，而我們也明白，許多喝酒的人在酒精的影響下會變得易怒、有暴力傾向。酒精是由肝臟分解、處理，過量飲酒會導致肝臟被過度刺激。當一個器官被過度刺激或負擔過重時，會製造出比正常狀況更多的情緒，而肝臟製造的是憤怒，這就是飲酒往往導致暴力背後的運作機制。


    如果你的某個器官生病了、被過度刺激，或是在某方面失衡，與其相關的情緒往往會高漲。


    我們發現，無論受困情緒存在體內何處，總是源於某個特定器官。舉例來說，一個被困住的憤怒情緒一開始可能從你的肝臟發出，但最後也許會存在你身體裡的任何部位。


    器官與情緒之間的關連頗令人玩味，對於了解人體如何運作也很重要，而這一切都要回到古老的能量療癒藝術。


    ## ★古老的療癒法門：能量醫學


    能量醫學是世界上已知最古老的療癒法門之一。早在公元前四○○○年，療癒者就了解人的健康與流經身體及組成身體的能量息息相关。中醫稱這個能量為「氣」，古印度或阿育吠陀醫學則稱之為「普拉納」。我們的這個部分如果不平衡，身體與心理健康可能會受到很大的影響。


    我們可以將這個能量比作電。你看不見電，卻感覺得到它；電無色無味，不為肉眼所見卻真實存在。如果你曾經把手指放進插座裡，或者在拿出烤吐司時被烤麵包機電到，一定知道我在說什麼。你或許看不見電，但它的的確確在那裡！


    身為人類，我們習慣以合乎自身信念系統的方式去感知事物。很小的時候，我們就發展出自己對於物質世界的一套信念。我們知道如果從單槓上掉下來，就會「砰」地一聲跌到地上，痛得要命，但我們從未想過地面和單槓實際上是由振動的能量組成——它們看起來那麼結實。我們也許喜歡以自己習慣的方式看待周遭世界，但愛因斯坦、特斯拉和其他科學家已經指出，宇宙遠比我們所能想像的更加複雜與奇妙。


    ## 不可思議的量子世界


    你一定聽過「我對它瞭如指掌」這個說法，但你对你的「指掌」到底有多了解？


    你的雙眼可以看見皮膚表面的皺紋、指甲和體毛，就這一方面而言，你完全熟悉你的指頭和手掌是什麼模樣。但是，如果把你的手擺在顯微鏡底下放大，你不會看到你熟悉的皮膚和皺紋；相反地，你可能會以爲自己看見的是一個奇異星球的表面，上面布滿丘陵和山谷。


    把你的皮膚用顯微鏡放大到兩萬倍，你會看見一片擠在一起的細胞；再高倍放大，你會看到分子；放大這些分子，你會看見組成這些分子的原子；再放大這些原子，你會看到組成這些原子的次原子能量團——電子、質子、中子和其他次原子粒子。那依舊是你的指掌，但它看起來和你所知的手大相逕庭。


    如果你現在瞥它一眼，你的手看起來很結實；將它往桌子上一拍，會發出扎實的一聲「砰」。雖然看起來是實心的，但你的手裡面其實有許多空隙。在次原子層次上，每個轉動的電子之間有著莫大的距離。原子有九九·九九九九九九%是空隙，你的手也有九九·九九九九九九%是空隙！如果你能移除手部所有原子中的空隙，你的手會縮小到必須用顯微鏡才看得見！雖然它的重量不變，所含的原子數量也相同，但你的手幾乎消失了。


    你可能需要花點時間來消化這個想法。你的手看起來是實心的，但它是由持續振動的能量構成。事實上，物理學家現在了解到，組成原子的那些所謂「次原子粒子」根本不是粒子。他們改用「能量單位」來計量原子的內容物，因為這樣精確多了。


    ## 思想是能量


    如同宇宙中的萬事萬物一般，你創造出來的想法同樣是由能量組成的。


    想法這種能量沒有界線可言，你的思想不像肉體一樣受地點及體積限制。


    大家都以爲自己沒有說出來的話被好好地藏在腦袋裡，實則不然。


    我們所有人都像個無線電台，持續將自身想法的能量發射到無邊無際的空間中，觸及身旁的一切人事物，進而產生好或壞的影響。


    這不表示我們能讀取他人的心思，但某種程度上，他人思想的能量可以在潛意識層次被偵測。


    ## 人與人彼此相連


    事實上，整個人類家族在能量上是連結在一起的。地球另一端的人們受苦受難、性命垂危時，我們在潛意識層次上會感受到他們在遠方的哭泣和痛苦，並因而變得陰鬱、不快樂。當這個世界發生了一件悲慘的事，全世界的人都會在潛意識層次上感覺到，並受其影響；另一方面，若發生了一件美好的事，所有人都會同感喜悅。


    我們每個人都有的這種連結常會化為各種隱微的念頭，從潛意識浮上意識層次。這種能量連結在母親與孩子之間似乎最強烈。孩子有麻煩時，母親往往可以感應到。我們稱之為「母親的直覺」，我母親就是這方面的專家。大概是因為這種將母子繫在一起的靈性臍帶，讓我們和母親之間有最強的連結。


    幾年前發生在我一位病人身上的事，正好可以用來說明這個能量連結的存在。某天晚上，她和丈夫正在家中看電視，突然感覺有一陣劇痛莫名其妙從一個部位轉移到另一個部位，遊走她全身。這突如其來的襲擊的劇烈程度讓她嚇壞了，疼痛感退去後，她大大鬆了一口氣，但整個人虛脫無力，驚恐不已。她從來沒經歷過這種事，不明白身體突然出了什麼問題。她試圖向大家說明這莫名其來的怪痛，但每個人都聽不懂她在說些什麼，包括她的醫生。


    三天後，她接到正在菲律賓工作的兒子的電話。他從醫院病床上打來告訴她，幾天前他被當地警察毒打了一頓。母子倆比對他被毆打的時間與她被疼痛襲擊的時間，赫然發現是一樣的。不知何故，她和兒子之間的連結強到可以真正「感受到他的痛」。這就是母親的直覺啊！


    你可以試著注視人群中某人的後腦勺，過不了多久，那個人就會轉過頭來看你。許多人都有這樣的經驗，如果你沒有，試試吧，每次都見效！


    ## 思想是有影響力的


    你的思想非常強而有力。每當你透過言語或文字表達自己的想法時，就是在用思想的能量影響你周遭的世界。所有事物都是藉由想法、信念和意念發生的。


    具公信力的科學實驗一再證明，人的想法可以直接影響植物、真菌和細菌的生長速度。而史丹佛大學的物理學家威廉·堤勒也證實了，思想能夠影響電子儀器。


    研究證明，透過刻意引導思想的能量，你可以影響另一個人，無論他身在何處。


    比方說，如果某人利用使人平靜下來的心像來集中自己的念頭，他就會在目標對象身上引發一股令人放鬆的感覺；假如他運用的是讓人覺得焦慮的心像，就會在目標對象身上引發令人焦慮的感受。其效果明顯到可以在實驗室透過「膚電反應」這種量測皮膚表面電流變化的方法測量到。


    ## 受困情緒這樣影響你的人生


    想像一下你的想法對自己會有什麼樣的影響。每個人不時都會進行某種內在對話，你都對自己說什麼？許多人自我批評的次數遠比讚美自己多，然而，負面自我對話對你造成的傷害可能比你知道的嚴重許多。


    那身旁的人呢？你是否想過別人能夠感受到你對他們的感覺？其他人的潛意識一直在偵測你的想法發出的振動。你有沒有過身邊的朋友恰好說出你腦袋中正在想的事情的經驗？你是否曾經在電話鈴響之前就直覺地知道是誰打來的？這些不是巧合，而是思想能量具備影響力的證明。


    利用情緒密碼尋找受困情緒，與偵測他人思想或感覺發出的振動是類似的原理，其中的差異在於你可以詢問身體並真正得到明確的答案，而不是透過臆測。然後，你就可以一勞永逸地釋放受困情緒，並確知它們不會再回來了。


    ## 精確找出並釋放受困情緒，而不是碰運氣


    任何一位替代療法工作者都會告訴你，幾乎所有人都帶著過往的情緒能量。人的身體會緊緊抓住受困情緒，醫生和身體工作者很清楚這一點，因為一個簡單的觸碰往往就能讓患者的情緒和記憶如洪水般湧出。幾乎我認識的每一個療癒工作者——從脊骨神經醫師、能量工作者到按摩治療師——都有過這種經驗：患者的身體在釋放它一直緊抓不放的能量時，意外地一併釋放了情緒。


    釋放那些受困情緒會立即產生非常有效的療癒結果。雖然機緣巧合釋放情緒是件好事，但這通常不是那些療癒工作者原本的目的，過程中發生的情緒釋放純粹是意外。


    然而，情緒密碼這套方法目標明確。我有時會把它想作是一種「情緒手術」，因爲我們是帶著「將之移除」的明確意圖在尋找受困情緒，其中沒有任何碰運氣的成分。受困情緒有潛在的破壞性，你必須把它們找出來，排出體外，並確認它們已經被釋放了，而情緒密碼能夠幫助你精確而簡單的方式做到這一點。


    ## * 小孩子的受困情緒


    在我寫這本書的時候，我那對雙胞胎兒子已經十八歲了。我處理受困情緒的早期經驗之一來自我兒子睿特，當時還是個學步兒。睿特和德魯是異卵雙胞胎，相異的程度就和其他任何兩個小男生差不多。德魯一直很黏他媽媽和我，睿特則是和我妻子琴恩很親，但三歲左右開始不太搭理我。當我想要抱他、親近他，或是跟他依偎在一起時，他會把我推開，並且說：「壞醫生！走開！」起初我們以爲他只是正在經歷某種階段，一陣子之後就好了，但是他對我的負面感受持續了超過一年，讓我很傷心，也備感挫折。我不了解自己的兒子爲何會對我有這種感覺。


    某天晚上，我和琴恩坐著聊天，睿特坐在琴恩的腿上。我張開雙臂準備給他一個擁抱，他的反應則一如往常，將我推開，然後說：「壞醫生！走開！」這一次，我真的覺得很受傷，胸口簡直痛到要爆開，眼淚都快流下來了。我妻子說：「你知道的，也許他有受困情緒。」


    當時我們只處理過成人的受困情緒，但我們決定幫睿特做個檢查。透過情緒密碼，我們發現他真的有個受困情緒：哀痛。然而，不是他對我感到哀痛，而是我對他；換句話說，他在某個時間點感知我對他有哀痛的情緒。他強烈地感受到那股哀痛，以致它被困在他的身體裡。測試的結果顯示，那個受困情緒源自有一次我和大女兒吵架，而睿特剛好目睹整個經過。雖然我的哀痛不是針對他，睿特還是感知到我對女兒的哀痛情緒，並且攬到自己身上。


    釋放那個被困住的哀痛後，讓我驚奇的是，睿特向我走來，用雙臂抱住我。我哭著抱住我的小男孩，當下覺得既驚訝又興奮。如果只是移除受困情緒就能讓我兒子瞬間轉變，那麼，世界上還有多少孩子可以因而受益？


    ## 飛行員的女兒對他從疏離到親近


    隔天我在診所和一位病人聊到睿特，她說：「我覺得我女兒可能也有受困情緒。我丈夫是民航機飛行員，每星期都會連續離家幾天。每次他結束工作回家，我們的六歲女兒就會跑去躲起來，不願意和他親近，這傷透了他的心。」


    第二天，她把女兒帶來診所。檢查後發現，這個小女生確實因為父親而產生一個受困情緒：傷心遺憾。父親長時間離家讓她感到傷心遺憾，而在某個時間點，這個情緒強烈到讓她的身體失去平衡，情緒就此被困住了。這股情緒能量在潛意識層次上強烈影響到她對父親表現出來的行為。


    我們幫她釋放了傷心遺憾的情緒，然後她們母女倆就回家了。


    隔週，這位母親回到診所對我說：「尼爾森醫師，情緒密碼這個療法真的有用。我帶女兒來接受治療時，我丈夫剛好不在家；幾天前他從國外回來，一打開家門，我們的小女孩就跑過去跳進他懷裡。她以前從來不會這樣，一次都沒有！我丈夫高興極了！非常謝謝你。」


    我的雙胞胎兒子到了四歲時，睿特在口語上已經可以表達得很清楚，而且很愛講話，德魯則恰恰相反，讓我們夫妻不禁開始擔心起來。德魯在四歲時還無法說出完整的句子，且幾乎不太說話，要說話時還常常把手放在嘴巴上，彷彿很怕講話。


    他似乎對很多事都感到恐懼。去社區的游泳池，睿特馬上跳進池子裡，德魯則不安地站在池邊。他對任何新事物都顯得小心翼翼，並且有幽閉恐懼症。出去玩的時候，只要身後的門一關上，就會陷入恐慌，然後放聲尖叫。


    ## 德魯出生時的創傷經驗


    心理測驗顯示德魯有高智商，但發展速度不如同齡孩子的標準值。聽力測試也顯示他的聽力很正常。似乎沒有什麼原因可以解釋德魯的狀況。


    經歷過睿特的事之後，我們決定幫德魯檢查看看他是否有受困情緒，但當時我們不知道受困情緒真的就是造成他問題的原因。


    測試德魯時，我們很快就找到幾個受困情緒，這些情緒是他出生時，以及之後一小段時日裡的某些創傷引起的。


    琴恩生這兩個小傢伙時，產程長達二十二小時。睿特首先出生，他看起來很漂亮、很滿足，馬上就沉沉睡去。德魯則在十四分鐘後出生，而且狀況很不好，全身發青，沒什麼生氣。一群醫生立刻圍著他急救，他們不確定德魯能否撐過來，他的情況危急。


    最後他還是撐過來了，但接下來的十幾天還是有很多緊急狀況。我們在兩個男孩出生幾天後就把他們帶回家，但德魯必須再入院檢查到底哪裡出了問題。他喝下去的母奶統統吐了出來，體重直線下降。醫生告訴我們，他在出生後的頭幾天受到感染，可能危及性命。為了救他，醫生必須在他小小的身軀上做脊椎穿刺，並且透過靜脈注射抗生素。


    雖然百般不願意，但這個醫療程序開始時，我和琴恩都被請出了病房。在醫療團隊多次嘗試把針刺進德魯小小的血管和脊椎裡時，我們都沒辦法在他身旁安撫他，只能無助地聽著他因為驚恐而發出的尖叫聲。


    我倆自己並沒有老是想著德魯的創傷經驗，也從未在他小時候跟他討論過這些事。我們連想到都覺得很不舒服。四年後，就我們所知，德魯完全不記得這些事，但他的確對很多事物都很恐懼。


    我們一一找出並釋放與這些創傷事件有關的受困情緒。嬰兒時期的德魯感知到的事，以及那使他產生多深的恐懼，讓我們很驚訝。他可能預期來到這個世界會是一件很美好的事，想不到卻陷入一個他幾乎無法應付、極度痛苦的情況，彷彿降生到地獄裡了。你可能想像得到，他有恐懼、驚恐、覺得被遺棄的受困情緒，發現時我們也覺得心痛難耐，這些無疑就是他當時接受急救治療時的感受。


    德魯在媽媽的子宮裡等著在哥哥之後出生時，還產生了「恐慌」這個受困情緒。他哥哥睿特不急著離開那個陰暗卻舒適的家，這讓排隊等候的德魯有了恐慌的受困情緒，因而造成日後的幽閉恐懼症。


    此外，他還從他祖父那裡遺傳了一個「憤怒」的受困情緒，就是這個遺傳來的憤怒讓他不願意開口說話。他很害怕自己說出的話會傷人，這也解釋了為什麼這孩子說話時總摀著嘴。那天晚上我們釋放了這所有的受困情緒，然後就上床睡覺了。


    隔天上午吃早餐時，我們簡直不敢相信眼前的變化！德魯就像個小話匣子，突然間，而且是生平第一次，他說出了完整的句子。沒有受困情緒將他和舊時的創傷綁在一起，德魯終於能拋下恐懼。他的幽閉恐懼症消失了，畏畏縮縮的態度也是，完全成了一個開朗、快樂、充滿好奇心的小孩。


    ## ### ★受困情緒其實很普遍


    雖然不太可能透過肉眼判別，但差不多所有人都有受困情緒。我執業的那些年幾乎沒治療過沒有可識別的受困情緒的病人，記憶中只碰過一個。這個人花了許多時間靜心，在我眼中是個平靜、仁慈、泰然自若的人，很能掌控自己的情緒。我剛剛是不是說了「掌控自己的情緒」？是的，我會在第十章進一步說明這個主題，讓大家知道如何在未來避免受困情緒產生。


    僅僅因為經歷過的事，以及在人生旅程的此刻自己是什麼樣的人，就讓我們絕大多數人都有受困情緒。


    當某人經歷創傷或引發強烈情緒的事件，如車禍、爭吵或離婚時，就會產生與該事件有關的受困情緒能量。然而，並非每個情緒事件都會創造出受困情緒。人的身體是被設計來處理一般情況下的情緒能量，所以，當某個情緒被困住了，有部分是因為情有可原的狀況，如抵抗力下降、太過疲勞或身心失衡。當身體不是處於最佳狀態時，我們會比較容易產生受困情緒。


    ## 音叉


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_74_0.png)


    每個受困情緒都會在體內某個特定部位，以它自己的特定頻率振動著。不久後，這股振動會讓周圍的身體組織也以同樣的頻率振動，我們稱這種現象為「共振」。


    在我的講座裡，我會用音叉示範我們的宇宙對共振的回應有多強烈。我有一支音叉的振動頻率是五百一十二赫茲，發出的聲音高亢尖銳；另一支音叉的尺寸不一樣，振動頻率是一百二十八赫茲，聲音低沉許多。


    如果將數支不同尺寸的音叉放在同一個房間，然後敲擊其中一支，其他所有具備那個頻率的音叉都會開始發出微弱的嗡嗡聲；假如你讓你敲擊的那支音叉不再發出聲音，其他的音叉會繼續振動。這不是什麼音叉之間的自然吸引現象，而是宇宙的運行方式。


    ## 受困情緒的共振現象


    如果你敲打一支音叉並把它放到玻璃上，那片玻璃會開始以同樣的頻率振動，這是因為音叉迫使構成玻璃的能量動起來——與音叉同步振動。當你有個受困情緒時，就有點像體內有支音叉持續以某個負面情緒的特定頻率振動著，而不幸的是，這可能會將更多那種情緒帶進你的生活中。


    你有沒有看過一個人的情緒影響到一屋子人的情緒？也許你今天心平氣和地坐在候診室等著看醫生，旁邊有幾個人正安靜地在看雜誌，然後，一個焦慮不安的病人進來了。他在候診室來回踱步，一會兒拿起雜誌，一會兒又放回去，跟櫃台人員說話時也顯得很煩躁。他的肢體語言完全暴露了他的情緒，然而，這種無形的影響威力最強大。


    那個病人將一個強烈的、焦慮的振動發射到候診室，然後，你、櫃台人員和其他病人体內的某些細胞會開始以那個頻率振動。很快地，房裡的每個人都覺得有些焦慮不安，候診室的氣氛隨之改變，大家開始出現不一樣的感覺和反應。那個焦慮的病人不只將更多的不安吸引到自己的生活中，也在周遭的人身上引發那種情緒。


    如果你有一個受困情緒，就會吸引更多同樣的情緒到你的生活中。此外，你也更容易且更常'
