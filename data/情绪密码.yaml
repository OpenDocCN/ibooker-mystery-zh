    # 易、更有效率。


    當然，最簡單的自我測試法是搖擺測試，大部分人不需要花太多時間練習就可以學會。搖擺測試僅有的幾個缺點是使用時必須站著，以及相較於其他自我測試法，它花的時間多一點，因為你必須給身體一些時間去擺動，不能強迫它。


    精通自我測試後，我馬上看見其中的好處。比方說，面對暫時無法被測試的患者，我不再需要另一個人幫我測試，我可以在自己身上爲病人測試。此外，我也可以檢查自己有沒有受困情緒和其他不平衡的地方，然後自行矯正、釋放。自我測試給了我一個非常快速、有效率而簡單的方法，以得到我正在尋找的答案。


    > 測試時覺得不舒服，請立刻停止！


    做這些測試時如果感覺到任何一絲不適，就換另一種方法。覺得不舒服或疼痛就表示你用的力氣太大了，假如你忽視不舒服的感覺，繼續測試下去，可能會讓自己受傷，或是導致身體組織發炎。


    理想狀態是，無論何種測試法，你都應該用最少的肌力就能分辨強弱。第一次學習這些肌肉測試時，我也是用了太多力氣，導致手指痠痛不已。最後我才發現，使用的力道只要足以撐住我'
