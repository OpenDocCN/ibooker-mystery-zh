    # 特定情緒了。


    你無法選擇要先釋放哪個情緒，受試者的潛意識會自己決定。


    一旦你得到肯定的答案，那個受困情緒就已經被選中了。你要做的，就是判斷它到底是受困情緒表中的哪一個情緒，好將它帶到意識層次。找出那個情緒，並且把潛意識想讓意識知道的相關資訊都挖出來，然後將之釋放。


    # 身體可能需要花一些時間處理被釋放的情緒


    如同我先前解釋過的，有時你可以一次就把心牆上的所有受困情緒一一釋放，但有時候，身體只會讓你釋放一定數量的受困情緒，然後它就需要休息一段時間，去處理那些被釋放掉的情緒。


    在你以釋放下一個受困情緒之前，等待期可能持續數小時到數天不等。


    證實心牆上的一個受困情緒已經被釋放之後，你只須回到原來的問題：「我們現在可以從心牆上釋放一個情緒嗎？」如果答案是「可以」，而且時間允許，就繼續往下進行。


    若答案是「不可以」，請藉由再次詢問「你是否有心牆」，來確認心牆是不是消失了。如果心牆還在，就詢問何時可以再釋放下一個心牆上的情緒——也許是晚一點、一個小時後或明天等等。'
  - '[PAGE 244]


    # *確認心牆的材料


    請記住，潛意識是很有邏輯的。既然憑空造出一道牆顯然不合邏輯，所以，潛意識總會挑選一種材料來建造心牆。


    如果僅以釋放心牆為目的，你其實不需要知道潛意識選擇什麼作為心牆的建材。因為到頭來，所有的心牆都是受困情緒的能量構成的，重要的是將其上的受困情緒釋放掉。


    另一方面，找出潛意識選中的材料很有意思，因為它往往會揭露一些象徵意義。想要問出心牆的建材其實沒有標準程序，但我通常會從那個材料是不是木頭開始測試起。如果不是木頭，我就詢問那個材料比木頭硬或軟；若比木頭硬，我就會問那個材料是不是一種金屬，諸如此類。透過刪去法，你很快就能歸納出可能的答案，同時還可以好好練習肌肉測試。


    若你已經找出心牆的材料，接下來，你可能會想問出這道牆的厚度。心牆可能像紙一樣薄，也可能有好幾哩厚，我只能告訴你，這是我們透過一次又一次的測試發現的結果。我們的潛意識不像意識那樣受限制，它有著天馬行空的想像力！然而，我相信潛意識非常認真看待這一切，它真的相信那道由它選擇的材料建造而成的牆是真實存在的。'
