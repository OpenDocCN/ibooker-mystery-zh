    | 肩痛 | 腹痛 | 髖部疼痛 |


    因為受困情緒近乎普遍現象，因為它總是會扭曲人體的能量場，也因為它完全是肉眼看不見的，因此可以在不被察覺的情況下造成各式各樣身體方面的問題。


    受困情緒真的是流行病，是暗中導致許多身體與情緒痛苦和疾病的無形原因。


    受困情緒會降低免疫功能，使身體更容易被疾病傷害。它會讓身體組織變形，阻礙能量流動，並使器官和腺體無法正常運作。


    上面這張表列出上門來找我的患者的症狀和疾病，受困情緒似乎是其中一項致病原因，很多時候甚至是絕對因素。


    我並不是說只要釋放受困情緒就可以百病全消。情緒密碼不應被單獨用來處理任何重大疾病或症狀，而是應該被視爲一種輔助療法。當受困情緒促成身體疾病時，將之移除絕對有幫助。


    情緒密碼很容易使用，而且很精準。釋放受困情緒有時會立即帶來戲劇性的效果，但大多時候，其作用是比較隱微的。然而，無論效果是立刻產生或慢慢顯現，似乎總是會帶來一股很大的滿足感與平靜。


    如果你像過去這些年來參加我的講座的許多人一樣，操作情緒密碼會為你的人生帶來嶄新的喜悅與自由。


    情緒密碼會幫助你擺脫過去的情緒包袱，為你帶來前所未有的身心平衡、內在平靜，以及全然的療癒。


    # 第 2 章 受困情緒的神祕世界


    > 未來的醫生不會開藥，而是會引導病人去關注身體與飲食，關注疾病的成因與預防。

