    # 儲存大量資訊的潛意識


    首先, 我們來談談意識與潛意識之間的差別。這裡提供一個簡單的區分方式。經常有人提到, 我們人類只使用了大腦的百分之十, 這意味著意識只需要用到百分之十的腦力;
    換句話說, 思考、行動、做選擇、做計畫、看東西、聽聲音、嘗味道、觸摸和嗅聞都是意識活動, 而這一切只佔用了大腦百分之十的處理能力。


    假如這種說法成立, 那麼, 大腦的其他百分之九十在做什麼? 如果意識佔了大腦的百分之十, 我們就可以稱其他百分之九十為潛意識。這大部分沉默又無意識的大腦始終忙著儲存資訊、忙著讓你的身體系統可以有效運作。潛意識對我們所做的事,
    以及我們的行為和感覺有著看不見卻很強大的影響力。


    大多數人很少想到自己的潛意識, 但想像一下接管潛意識負責執行的功能會是什麼景象。指導消化系統如何消化你的午餐, 或是告訴你的細胞如何製造蛋白質或酵素, 是多麼困難啊!
    如果你一整天时时刻刻都必須為了維持心跳或呼吸而操心, 你還會認為爲現在的子過得很湊嗎?


