    # 偏執貓鬆鬆寶


    不久之後就證實我的直覺是對的，白蘭地的受困情緒是「哀痛」。事情發生的經過是這樣的⋯⋯


    這家人最近在山上買了一幢小屋。一開始，他們會把白蘭地放在車子後座一起帶上山，但太長的旅程實在讓這隻小狗難以忍受，所以白蘭地常常暈車，並且吐在車裡。幾次之後，他們就不再帶著白蘭地去山上小屋了。白蘭地總是一臉興奮地看著家人打包行李，然後獨留牠一狗揚長而去。白蘭地簡直要抓狂，牠不明白為什麼只有自己被丟在家裡。明明牠也很興奮，準備好要跟家人一起出門。


    麻煩就是從這個時候開始出現的。白蘭地從來不曾給這家人捅過什麼婁子，但突然間，牠性情大變，只要有客人來家裡，牠一定會衝上去磨蹭他們的腿，讓人覺得反感又噁心。顯然，除了這樣做，白蘭地找不到其他方式表達自己的哀痛。


    移除受困情緒後，白蘭地的反常行為再也沒有出現過。雖然這家人去山上小屋時還是沒有帶上牠，但至少牠現在不會被鎖在屋子外面了。


    下面這個故事的獨特之處不在於貓咪身上發生了什麼奇事，而是一位年輕女子如何找到自己'
  - '[PAGE 290]


    # 的天賦，以及人生的新方向。


    我和朋友賽瑞娜去參加尼爾森醫師為期兩天、有關受困情緒的講座。上完課之後，我們兩人迫不及待想要試試這個新方法。回到家時，我的貓正好睡在沙發上，我倆靈機一動：「啊哈！這不正是我們的頭號白老鼠？」


    鬆鬆寶是一隻流浪貓，約莫一歲大的時候被我們家領養了。家裡人悉心照料牠，甚至給牠買了一個有鈴鐺的項圈，避免牠再次走失。一開始，我們花了一個月試著尋找牠原來的飼主，但總是杳無音訊。最後我們決定留下牠，因為牠真的是一隻好乖的貓。


    雖然鬆鬆寶對我們很友善，但牠對陌生人總是抱持著極大的恐懼。鬆鬆寶不像一般的貓那樣會去磨蹭陌生人的腿，以尋求注意；相反地，牠會將所有陌生人視為威脅。假使有任何不認識的人走進房間，牠絕對會以迅雷不及掩耳的速度逃離現場。


    那天，我讓自己擔任鬆鬆寶的替代者，以釐清牠有沒有受困情緒。果不其然，如我們所預料，牠的受困情緒是「恐懼」。當我們用磁鐵滑過牠的背，釋放那個受困情緒後，鬆鬆寶就把身體滾過來讓我們搔搔肚子。就這樣，沒有發生什麼特'
  - '[PAGE 291]


    別的事。

    但幾天後，有個客人來家裡，我們發現鬆鬆竟然沒有逃跑。事實上，每次有新面孔走進屋子裡，牠現在的表現就跟其他貓咪一樣，有時會走上前去吸引注意和討拍拍。

    真是多虧了尼爾森醫師的訓練，我才發現自己很喜歡跟動物一起工作，甚至發掘了一項特殊天賦：我發現我可以透過自我測試，快速找出並釋放動物的受困情緒。現在我不但有自已的寵物治療事業，也親眼見證許多動物經由情緒密碼產生驚人的變化。


    ——卡翠娜


    # ★被惡意遺棄的小狗


    前幾天，我又收到卡翠娜寄來的一封令人動容的信。利用情緒密碼幫助動物對她來說已經是駕輕就熟了。'
- md: '去年有個朋友打電話給我，表示想向我們借船。事情是這樣的：他們去斯蒂拉瓜密什河旁邊的一個私人莊園時，聽到一群小狗的嗚咽聲。四處張望之後，他們發現那群小狗就在河對岸的峭壁邊，被困在一塊小沙洲上。我的朋友擔心暴風雨一來，水位上漲，小狗一定會被淹死，因此向我借船救狗。


    我一聽，趕緊跟我哥哥帶著我們的獨木舟，趕到那個莊園去救狗。抵達現場時，有一隻小狗已經死亡，我們把其他四隻帶回家。牠們都是漂亮的小黑狗，身上還有白色的斑點和花紋，是鬥牛犬和德國牧羊犬的混種。


    其中一隻小狗總是抖個不停，即使我用毛毯包住牠，抱在我身邊，情況依舊。我心裡明白天氣沒這麼冷，牠會發抖全是因為受到驚嚇的關係。我拿出我的受困情緒表，讓自己擔任牠的替代者，開始幫牠測試受困情緒。我找出這隻狗的主要受困情緒有驚恐、震驚、恐懼、背叛，以及被遺棄。


    在詢問究竟發生了什麼事，然後在我身上進行測試以找出答案時，我發現這些小狗是被惡意遺棄在那裡，等著被淹死。不難理解這是一件多麼令人傷心又可惡的事！我仔細找出牠身上的每一個受困情緒，並確認這些負面能量全都被移除殆盡。


    不到半小時，這隻狗就停止發抖，並且安靜了下來。雖然我不介意一直用毯子包著牠抱在我懷裡，但我可以明顯感覺到，牠想跑出去玩了。


    知道這些小狗的創傷經歷後，我一一為其他小狗移除受困情緒，以確保牠們到了動物收容所，以及之後到新的領養家庭時，可以有個比較美好的開始。相信收容所一定會幫牠們找到一個美滿幸福的新家。


    ——卡翠娜


    ## ★一匹馬的傷心遺憾


    在我治療遊俠之後，風聲漸漸傳開，開始有傳言說我可以用一種特殊的方法治療動物。有個飼主就來問我能否去看看她的馬。這匹馬叫勇士，走起路來步伐怪異，或者說，牠是以一種非比尋常的方式走路。


    勇士是一匹花式騎術比賽馬，氣質優雅高貴。這種經過特殊訓練的馬可以透過騎士展現高度技巧性的表演。當然，牠現在連走路都有困難，更不用說要做這樣的表演了。


    勇士的訓練目前被迫暫停。有獸醫來看過牠，但檢查身體後，都找不出有什麼異樣，牠的飼主卡拉只好轉而向我求助。


    我抵達馬廄時，還引起一陣不小的騷動，所有人，包括飼主、訓練師及清潔工都很好奇，究竟這個人是用什麼新技術幫助馬兒擺脫情緒包袱。


    在為勇士療癒時，一群人把我團團圍住。我詢問是否有人自願擔任替代者，一位名叫瑪麗莎的訓練師自告奮勇上前。


    透過測試瑪麗莎，我很快就找出勇士行走困難的癥結：有個受困情緒導致牠的後臀出現不平衡問題。


    進一步測試的結果顯示，這個受困情緒是「傷心遺憾」。


    我詢問：「這份傷心遺憾是跟另一匹馬有關嗎？」


    瑪麗莎的手臂變得軟弱無力，代表答案為否。


    「這份傷心遺憾是跟某個人類有關嗎？」


    瑪麗莎的手臂再次變得軟弱無力。「不是。」


    「這份傷心遺憾是跟一隻狗有關嗎？」「不是。」


    「這份傷心遺憾是跟一隻貓有關嗎？」「不是。」


    我知道如果可以把這個情緒產生的原因找出來，對勇士會很有幫助，但偏偏所有可能的原因都快問完了，還是沒有答案。


    我持續不懈繼續問。看見附近有一隻松鼠，我便問道：「這份傷心遺憾是跟一隻松鼠有關嗎？」


    不是。


    「這份傷心遺憾是跟一隻鳥有關嗎？」


    此時，瑪麗莎的手臂變得強而有力，顯示答案為「是」。


    一匹馬為了一隻鳥覺得傷心遺憾？不知為何，我只覺得很滑稽，不禁和其他人一起笑了出來。


    還真是出乎眾人意料之外。


    突然間，飼主卡拉說話了：「等一下，我想我知道這是怎麼一回事。」


    看她的表情，我知道她是認真的。她說：「上星期，有一隻小雛鳥從鳥巢裡掉出來，摔到地上，正好落在勇士的欄舍前面。那隻小雛鳥掙扎了好一陣子，最後還是走了。」


    我透過瑪麗莎問勇士：「這份傷心遺憾是跟那隻死去的小雛鳥有關嗎？」


    結果，答案為「是」。


    勇士一定目睹了整個過程。當那隻雛鳥無助地掙扎求生，最後依舊死去時，勇士被一股傷心遺憾的情緒淹沒了，並因此形成一個受困情緒。這個情緒導致牠的後臀出現不平衡問題，進而影響牠的步態。


    我用磁鐵滑過勇士的背部，幫牠釋放受困情緒。卡拉把勇士帶到馬廄外面散步，結果，牠不再行走困難。隨著那份因小雛鳥而起的傷心遺憾情緒被釋放，勇士的步態問題也突然消失了。


    ## ★發生在馬兒身上的驚人療癒故事


    我的小孩以前在本地一處賽馬場上馬術課時，最後總會演變成我們幫忙飼主療癒馬兒們的受困情緒。下面這則故事就是馬主人分享的。


    從十四歲開始，我就一直參與騎術及馬術訓練，如今我也擁有一座賽馬場，並親自打理。我跟我的馬經常到全美各地參加國家馬術協會舉辦的各項賽事。


    大約一年前，我認識了尼爾森醫師和他的妻子琴恩，並有幸請他們幫我診治幾匹馬。由於治療效果顯著，且出奇地好，因此，我想跟各位分享我看見的一切。


    我養的馬都是夸特馬，這種馬原本是牧場用來趕牛羊的。


    其中有一匹我很喜歡的馬叫蝶螈，牠已經退休五年了，目前高齡十四歲。能活到這歲數，在馬界算是很罕見，但蝶螈有些毛病。


    大概十年前，蝶螈睡在蟻丘上，以致左後腿有一大塊皮膚被螞蟻咬了又咬。幾天不到，那塊皮膚上的毛就掉光了，之後也沒有真正復元。雖然後來毛有長出來，但我大概在六、七年前就不再讓牠露面，因為牠已經不太能表演了，而且我知道牠身體不舒服。蝶螈的活力不再，彷彿一瞬間蒼老許多，我都看在眼裡。


    過去五年，我讓牠完全退下來，但為了讓牠活動活動筋骨，我一年還是會帶牠出去兩次，好讓牠有些事情可以忙。


    這幾年，我請過獸醫和整脊師為蠑螈診療，甚至試過電擊療法，不過都沒有用。蠑螈是一匹很珍貴的馬，牠父母的祖父母都系出韃克跋，這是一種非常有名的夸特馬。此外，蠑螈母親的血統在美國的馬術和牧牛用馬中排名高居前五。


    尼爾森醫師和琴恩看過蠑螈後，表示牠有受困情緒的問題——明確地說，牠在兩歲左右產生「缺乏控制」和「緊張」兩種受困情緒。這是在我買下牠之前，那時牠在前任飼主／訓練師手中工作得太辛苦、太激烈了。他們還說蠑螈的左後腿組織連結出了些問題，這可以回溯到牠被螞蟻咬那件事。


    自從尼爾森醫師和他妻子來過以後（醫師總共只治療一次，大約三十分鐘），蠑螈就改頭換面了。事實上，牠彷彿突然回到四歲時的狀態！


    我現在可以用牠來以套索捉牛，這對馬的背會造成很大的負擔，但蠑螈做來完全沒問題。我可以在牠身上套韁繩，讓牠展現各種步態，牠表現得非常好，處於巔峰狀態。對我而言，蠑螈現在的表現簡直不可思議。退休後這些年，牠原本幾乎什麼事都做不了，但現在的牠充滿活力，整天都想跑出去玩，宛如新生啊。


    我還有另外一匹馬，叫元寶。元寶大概是我擁有過最棒的馬，牠是一匹漂亮的小夸特馬，有著鹿皮色的毛。我在三個月前買下牠，牠從一開始就顯得無精打采，而且有很嚴重的不信任感，沒有欲望做任何事，一點都不想工作。我碰巧知道牠之前的訓練過程，而我只能說，把那個過程形容為激烈，都算是客氣的。我觀察多年的心得是，你也許可以讓一匹馬接受那種嚴酷的訓練之後上場表演大約一年，然後你就再也使不動牠，因為你的馬最後會說：「你想要怎麼傷害我都沒關係，我已經不在乎，老子不幹了。」


    元寶就是被逼到絕境，索性不幹了。牠痛恨生命，痛恨工作，痛恨人類，因為他們嚴重虐待牠。尼爾森醫師和他妻子為元寶做檢查，發現牠有以下受困情緒：三歲時產生了「憎恨」（牠覺得自己的訓練師痛恨牠）和「憂鬱」，以及其他時期被困住的「不堪負荷」「恐慌」「付出被視為理所當然」等情緒。


    治療過後，元寶完全改頭換面。牠的節奏改變了，騎起來平穩許多，感覺起來更放鬆了，我騎牠時就有這種感覺。此外，牠不再怕人，也沒有那麼戒慎恐懼了。現在的牠各方面看來都與普通馬兒無異，喜歡工作，也充滿活力。這真是太令人驚奇了，元寶現在就像一匹全新的馬。


    上個月，我帶元寶去參加國家馬術協會的比賽，牠獲得三十四匹馬排名的第三名，並在賽馬活動中拿下第三名的佳績。我現在可以很高興地說，元寶在這場賽事打敗前訓練師的最佳紀錄，領先五個積分點。以灌輸恐懼的方式訓練或許行得了一時，但互相信任的關係才能持續下去。


    我不太確定尼爾森醫師的方法是怎麼發揮作用的，但我絕對相信受困情緒的真實性。能夠見證這個過程，並看到這麼好的結果，實在太美妙了。尼爾森醫師雖然不知道馬兒先前遭遇過什麼事，浮現出來的情緒和事件卻完全吻合。


    我早就知道這個方法管用，如今也在自己的馬身上看見成效。每當我試著跟別人描述這個療法時，大家總是說這聽起來像巫毒法術。我只知道這個方法真的有效，而我只關心這一點。


    ——波依德·朗帝


    我叫黛比·史畢森菲，是國際馬聯的花式騎術訓練師和講師，曾經和奧運訓練師一起在德國受過訓。我在加州經營一座訓練場十七年，訓練場中有二十三匹馬，從訓練級到第二中級都有。現在的我基本上是半退休狀態，跟我的荷爾斯泰因馬「啟示錄」住在奧勒岡州，並且在奧勒岡州、加州及科羅拉多州教授花式騎術及擔任比賽評審。


    一九九八年七月，我參加了尼爾森醫師在加州聖地牙哥舉辦的磁療法講座。我用他的方法清除受困情緒，發現這用在馬和人身上都是一項無價的工具。我有好多令人驚奇的故事可以分享，這裡就挑幾則特別精采的來說。


    有一匹隨我訓練好幾年的馬叫「高地人」，牠一年總會跛腳幾次。我們替牠請過三次獸醫，照過X光，也嘗試整脊復健及針灸療法，但似乎都沒有什麼用。大夥兒備感挫折，因為我們必須帶著牠去參加比賽，卻從不知道那神祕的跛腳症狀什麼時候會發作。當我因為接受尼爾森醫師診療十年，以及參加他舉辦的講座，而學會情緒密碼之後，便開始把這套能量平衡療法施作在我訓練的馬兒身上。


    高地人的跛腳症狀發生在右邊的跗關節，我開始幫牠清除情緒包袱。牠有一道二十九間欄舍厚的心牆，而透過釋放情緒，我讓這道心牆消失了。牠對牠的主人懷有「被遺棄」「憤怒」和「怨恨」等情緒，其中最主要的是「哀痛」。我往回追溯到牠五歲時，當時牠被以拖車運送，卻在拖車裡倒了下來，而主人沒有停下來幫牠，就讓牠一路上那樣躺著。我向牠的主人查證有沒有發生過這件事，她很羞愧地承認了。她當時不知道該怎麼做，只好讓牠在拖車裡躺著，繼續開車前往表演場地。高地人知道主人知情，因而怨恨她，也覺得自己被主人遺棄了。


    我幫高地人清除所有情緒之後，牠在十分鐘內就從跛腳馬變成一匹完全健康的馬，並在接下來三年的訓練期間維持健康狀態。中間我只有再幫牠清理過兩次，都是在牠看見其他馬兒不願意進去拖車的時候，我想也許是那樣的情景讓牠想起往日的哀痛。話雖如此，高地人的健康情形依舊良好，而且拿了好幾個冠軍回來。


    另外一匹來接受我訓練的馬也有跛腳問題，我之前從來沒有教過牠。我問牠的主人是否願意讓我為牠做肌肉測試，以釐清這個跛腳問題是身體或情緒因素。測試結果顯示，這是情緒造成的跛腳。有一匹馬在馬場被安樂死，這匹馬因為哀悼逝去的同伴，而造成多處臟器與心臟短路。我花了十分鐘幫牠清理，結束之後牠立刻健康地小跑了起來，而且直到被賣掉前都保持健康無恙。


    買馬之前，我都會利用情緒密碼看看我打算買的馬是否有情緒問題，以及是否真的可接受訓練，這在選擇理想馬匹上對我有極大的幫助。我總是會為我的馬做肌肉測試，以檢查牠們的健康狀態。因為有了尼爾森醫師的方法，我認為我的馬在身心方面都變得更健康、更快樂了。


    > ——黛比·史畢森菲


    ## ★你有了可以幫助動物的工具


    我們和動物共同生活在這個地球上，而很多時候，我們是牠們非常親密的照護者。動物是我們的同伴、我們的朋友，有時我們甚至把牠們視為家庭成員般愛護——事情就應該是這樣。


    如同對待家人般，我們有責任確保自己照顧的動物是不是有被餵飽、是不是有地方住，盡全力讓牠們活得健康且安全。


    請隨時注意自己照顧的動物，如果發生了什麼讓人心神不寧的事——例如雛鳥死在勇士面前——想想你的動物會有什麼感覺。當動物出現任何症狀時，無論是身體上或行爲上，都可能是受困情緒的影響。不過，你現在有工具可以自己幫助牠們了。


    別害怕嘗試，你只要把自己的心填滿對動物的愛，然後禱告，抱持著想要幫助牠們的清晰意念，相信自己做得到，那麼你一定做得成。


    # 第4部 更加光明的未来


    # 第10章 沒有受困情緒的人生


    > 我對明日一無所懼，因為我經歷過昨日，又熱愛今日。

    > ——威廉·艾倫·懷特


    鮮少有人不被受困情緒羈絆。這似乎是人的經歷的一部分。


    毫無受困情緒的人生，誠然是美妙精采的。然而就我的觀察，這即使有付諸實現的可能，卻人生就像個福袋，裡面裝滿令人感恩的祝福、必須跨越的困難、各種探索機會、需要做的抉擇，以及三不五時的哀痛與磨難。這些事使我們得以體驗人生、強健信心、增長見聞，並滋養心中的愛。人類大家庭的所有人都是彼此相連的，發生在其中一個成員身上的事，或多或少會影響到每一個人。透過這些體驗，我們發展出對彼此的了解與同情，讓人與人之間連結得更緊密。


    你的生命如何流動，取決於你決定如何帶著你面對的這許多事去感受每一天。


    什麼樣的事物會呈現在你面前、會有哪些機會來臨，以及你會學到什麼東西，與你的態度大有關係。


    ## 你的焦點決定了你的實相


    事實上，你眼前所見的許多事物，是因為你相信自己的生命中可以擁有那些事物而被吸引過來的。


    每一天都可以做選擇，選擇要對生活中發生的一切抱持正面或負面感受。任何時刻幾乎都會發生好事，以及沒那麼好的事，而你選擇把焦點放在哪一類事情上，大大影響你會有多少幸福感。


    人們有時會將太多注意力放在過去。如果你一直聚焦在過去的某個負面事件，重新經歷那些情緒，即使事件發生已久，你還是會因此產生受困情緒。


    說到這裡，我不禁想起一位名叫黛安的病人。黛安的父親十年前過世，但我在她身上找到一個被困住的「傷心遺憾」，竟是在她父親去世四年後產生的。黛安當時雖然撐過父親的喪禮，沒有產生任何受困情緒，但在父親逝世第四年的忌日，黛安選擇讓傷心遺憾的負面情緒壓倒她。那時她有意識地決定讓自己重新經歷痛失至親的傷心遺憾，而非想著父親帶給她的那些美好而正面的事物。結果，她爲自己製造了一個負面且有潛在危險的受困情緒。


    請停下腳步，觀察一下自己的思緒。在你生命中的任何一天，你的念頭都是偏向正面或負面？你會選擇專注於讓人歡喜的正面事物，並決定抱持感恩、滿足和喜悅的感受，或是選擇停留在負面情緒之中？


    比方說，假如你的感情出了問題，我相信你還是可以在伴侶身上找出一些讓你感謝的事。選擇聚焦於一段感情中的美好事物，並把注意力放在它正向的那些部分，可以幫助你心懷感恩、覺得快樂。這麼做甚至可能打開一條通往正面改變的路，尤其如果你還想繼續發展與維持這段感情。


    相反地，每當我們把焦點放在自己遭遇的問題，以及那些出錯的事情上，最後只會創造出更多負面事物。我看過一部電影，裡面有一位充滿智慧的老師告訴他的學生：「記住，你的焦點決定了你的實相。」多麼真實的一句話啊！你可以將半杯水看作半空，也可以看作半滿，不過，把它看作半滿，會讓你更有力量，並為你創造一個更爲正面的實相。


    對自己想要的事物抱持正面感受，將幫助你創造出自己夢想的一切。當你觀想你想要的人生，並能感受到美夢已然成真，最終你將找到機會創造出讓你快樂的一切事物。


    把注意力放在你不想要的事物上，並體驗到負面感受，不是會創造出同樣那些負面問題，就是會讓那些問題持續存在你的生活中。


    比方說，假如你總在擔心這輩子與真愛無緣，你向宇宙發出的訊息就是你找不到真愛。結果，你真的會找不到，或者至少不那麼容易找到。


    我們不斷將自己的想法發射到宇宙中，我相信這些想法會散布在無垠的空間裡，且不受光速或其他任何因素所限。人的思想強而有力，是我們創造了自己的想法與感受。


    記住《聖經·箴言》第二十三章第七節所說的：「因為他心怎樣思量，他為人就是怎樣。」


    創造隨時隨地都在發生。每當一個人有某個想法或某種長期的慣性思考模式時，他就是在創造，而某樣事物將會從這些想法中顯化出來⋯⋯因此，你最後會吸引來你覺知中的主要思想，無論那些思想是有意識或無意識的。


    > ——麥可·貝克威牧師


    你已經了解到，控制自己有意識的思想，並讓那些思想保持正面有多重要了。不過，你潛意識的念頭呢？


    潛意識對你想達成的目標有很大的影響力，然而，受困情緒會藉由潛意識的運作扯你後腿。


    你也很努力地保持正面心態，盡可能把半杯水看作半滿，但在此同時，潛意識裡的受困情緒卻背叛了你，不斷向宇宙發送負面的思想頻率。


    你體內的受困情緒愈多，它們發送出來的負面思想能量就愈多，你也愈難吸引到自己真正想要的事物。


    還好，受困情緒是可以被釋放的。只要你把使用情緒密碼變成習慣，就能改變思想的頻率，如此即可避免發生於潛意識層次的想法和感受帶來的傷害。


    當你擺脫了負面的受困情緒，你會發現自己比較容易去選擇正面情緒，而這些正面情緒將幫助你吸引來你真正想要的事物。


    ## ★你選擇了你的情緒


    你是否說過「我丈夫讓我氣死了」「那讓我好沮喪」「那件事讓我心情糟透了」之類的話？這樣的說法很普遍，如果你仔細傾聽自己內心的聲音，可能會發現自己正在說差不多的話。不過，假如你停下來思考一下，會發現這樣的說法頗荒謬。事實上，沒有人可以讓你感受到任何你並未選擇去感受的情緒。


    發生在你身上的事並未真的決定你感受到的情緒。也許你沒辦法有意識地控制每一件影響你人生的事，你卻有能力選擇自己要如何想、如何感受、如何行動。無論發生什麼事，最終選擇要感受哪種情緒的，是你自己。


    許多人有時會不知不覺地成為自身情緒的受害者。也許你不相信你有能力掌控自己的感受，負面情緒可能會以迅雷不及掩耳之勢快速浮現，讓人彷彿沒有時間選擇別種情緒，只能表現出自然的反應性情緒。假如你約會快遲到了，自然會覺得焦慮不安；如果有人粗魯無禮地對待你，可能會不自覺地被激怒；而當妳被羞辱或虐待時，你也會立刻覺得怨恨或憤怒。


    如果你像大多數人一樣，不如意事，十常八九，那麼除非控制自己的情緒，否則當事情發生時，你只能「反應」。而當你讓自己去反應時，你的潛意識可能會基於你過去在類似狀況中選擇的情緒，讓你感受到負面情緒。


    也許過去在類似狀況中你都選擇某一種負面反應，但你一定要以同樣的模式作為你未來的處理方式。每當你必須去處理或面對負面事物時，你都有選擇權。你可以選擇總是以老路子回應，或是選擇不同的方向。重點是，你的過去不一定等於你的未來。


    關於情緒的真相是：你才是有選擇權的老大。只有你才能選擇要用什麼方式去感受一件事。總是如此，絕無例外。意識到這一點本身就會讓人充滿力量。你才是自身情緒旋律的譜寫者。


    面對任何情況，你都可以選擇你想要的情緒。沒錯，這需要練習，也沒有人說這很容易做到，但確實是一條可行的路。


    下次當你發現心中充滿負面情緒時，停下來想一想，這一路上到底發生了什麼事，讓你如此難受。也許乍看之下是情緒選擇了你，其實不然，是你選擇了情緒。


    有意識地做出選擇，而不是讓舊有的潛意識模式掌控你，就是在選擇進化與成長。'
  mdcn: '去年有個朋友打電話給我，表示想向我們借船。事情是這樣的：他們去斯蒂拉瓜密什河旁邊的一個私人莊園時，聽到一群小狗的嗚咽聲。四處張望之後，他們發現那群小狗就在河對岸的峭壁邊，被困在一塊小沙洲上。我的朋友擔心暴風雨一來，水位上漲，小狗一定會被淹死，因此向我借船救狗。


    我一聽，趕緊跟我哥哥帶著我們的獨木舟，趕到那個莊園去救狗。抵達現場時，有一隻小狗已經死亡，我們把其他四隻帶回家。牠們都是漂亮的小黑狗，身上還有白色的斑點和花紋，是鬥牛犬和德國牧羊犬的混種。


    其中一隻小狗總是抖個不停，即使我用毛毯包住牠，抱在我身邊，情況依舊。我心裡明白天氣沒這麼冷，牠會發抖全是因為受到驚嚇的關係。我拿出我的受困情緒表，讓自己擔任牠的替代者，開始幫牠測試受困情緒。我找出這隻狗的主要受困情緒有驚恐、震驚、恐懼、背叛，以及被遺棄。


    在詢問究竟發生了什麼事，然後在我身上進行測試以找出答案時，我發現這些小狗是被惡意遺棄在那裡，等著被淹死。不難理解這是一件多麼令人傷心又可惡的事！我仔細找出牠身上的每一個受困情緒，並確認這些負面能量全都被移除殆盡。


    不到半小時，這隻狗就停止發抖，並且安靜了下來。雖然我不介意一直用毯子包著牠抱在我懷裡，但我可以明顯感覺到，牠想跑出去玩了。


    知道這些小狗的創傷經歷後，我一一為其他小狗移除受困情緒，以確保牠們到了動物收容所，以及之後到新的領養家庭時，可以有個比較美好的開始。相信收容所一定會幫牠們找到一個美滿幸福的新家。


    ——卡翠娜


    ## ★一匹馬的傷心遺憾


    在我治療遊俠之後，風聲漸漸傳開，開始有傳言說我可以用一種特殊的方法治療動物。有個飼主就來問我能否去看看她的馬。這匹馬叫勇士，走起路來步伐怪異，或者說，牠是以一種非比尋常的方式走路。


    勇士是一匹花式騎術比賽馬，氣質優雅高貴。這種經過特殊訓練的馬可以透過騎士展現高度技巧性的表演。當然，牠現在連走路都有困難，更不用說要做這樣的表演了。


    勇士的訓練目前被迫暫停。有獸醫來看過牠，但檢查身體後，都找不出有什麼異樣，牠的飼主卡拉只好轉而向我求助。


    我抵達馬廄時，還引起一陣不小的騷動，所有人，包括飼主、訓練師及清潔工都很好奇，究竟這個人是用什麼新技術幫助馬兒擺脫情緒包袱。


    在為勇士療癒時，一群人把我團團圍住。我詢問是否有人自願擔任替代者，一位名叫瑪麗莎的訓練師自告奮勇上前。


    透過測試瑪麗莎，我很快就找出勇士行走困難的癥結：有個受困情緒導致牠的後臀出現不平衡問題。


    進一步測試的結果顯示，這個受困情緒是「傷心遺憾」。


    我詢問：「這份傷心遺憾是跟另一匹馬有關嗎？」


    瑪麗莎的手臂變得軟弱無力，代表答案為否。


    「這份傷心遺憾是跟某個人類有關嗎？」


    瑪麗莎的手臂再次變得軟弱無力。「不是。」


    「這份傷心遺憾是跟一隻狗有關嗎？」「不是。」


    「這份傷心遺憾是跟一隻貓有關嗎？」「不是。」


    我知道如果可以把這個情緒產生的原因找出來，對勇士會很有幫助，但偏偏所有可能的原因都快問完了，還是沒有答案。


    我持續不懈繼續問。看見附近有一隻松鼠，我便問道：「這份傷心遺憾是跟一隻松鼠有關嗎？」


    不是。


    「這份傷心遺憾是跟一隻鳥有關嗎？」


    此時，瑪麗莎的手臂變得強而有力，顯示答案為「是」。


    一匹馬為了一隻鳥覺得傷心遺憾？不知為何，我只覺得很滑稽，不禁和其他人一起笑了出來。


    還真是出乎眾人意料之外。


    突然間，飼主卡拉說話了：「等一下，我想我知道這是怎麼一回事。」


    看她的表情，我知道她是認真的。她說：「上星期，有一隻小雛鳥從鳥巢裡掉出來，摔到地上，正好落在勇士的欄舍前面。那隻小雛鳥掙扎了好一陣子，最後還是走了。」


    我透過瑪麗莎問勇士：「這份傷心遺憾是跟那隻死去的小雛鳥有關嗎？」


    結果，答案為「是」。


    勇士一定目睹了整個過程。當那隻雛鳥無助地掙扎求生，最後依舊死去時，勇士被一股傷心遺憾的情緒淹沒了，並因此形成一個受困情緒。這個情緒導致牠的後臀出現不平衡問題，進而影響牠的步態。


    我用磁鐵滑過勇士的背部，幫牠釋放受困情緒。卡拉把勇士帶到馬廄外面散步，結果，牠不再行走困難。隨著那份因小雛鳥而起的傷心遺憾情緒被釋放，勇士的步態問題也突然消失了。


    ## ★發生在馬兒身上的驚人療癒故事


    我的小孩以前在本地一處賽馬場上馬術課時，最後總會演變成我們幫忙飼主療癒馬兒們的受困情緒。下面這則故事就是馬主人分享的。


    從十四歲開始，我就一直參與騎術及馬術訓練，如今我也擁有一座賽馬場，並親自打理。我跟我的馬經常到全美各地參加國家馬術協會舉辦的各項賽事。


    大約一年前，我認識了尼爾森醫師和他的妻子琴恩，並有幸請他們幫我診治幾匹馬。由於治療效果顯著，且出奇地好，因此，我想跟各位分享我看見的一切。


    我養的馬都是夸特馬，這種馬原本是牧場用來趕牛羊的。


    其中有一匹我很喜歡的馬叫蝶螈，牠已經退休五年了，目前高齡十四歲。能活到這歲數，在馬界算是很罕見，但蝶螈有些毛病。


    大概十年前，蝶螈睡在蟻丘上，以致左後腿有一大塊皮膚被螞蟻咬了又咬。幾天不到，那塊皮膚上的毛就掉光了，之後也沒有真正復元。雖然後來毛有長出來，但我大概在六、七年前就不再讓牠露面，因為牠已經不太能表演了，而且我知道牠身體不舒服。蝶螈的活力不再，彷彿一瞬間蒼老許多，我都看在眼裡。


    過去五年，我讓牠完全退下來，但為了讓牠活動活動筋骨，我一年還是會帶牠出去兩次，好讓牠有些事情可以忙。


    這幾年，我請過獸醫和整脊師為蠑螈診療，甚至試過電擊療法，不過都沒有用。蠑螈是一匹很珍貴的馬，牠父母的祖父母都系出韃克跋，這是一種非常有名的夸特馬。此外，蠑螈母親的血統在美國的馬術和牧牛用馬中排名高居前五。


    尼爾森醫師和琴恩看過蠑螈後，表示牠有受困情緒的問題——明確地說，牠在兩歲左右產生「缺乏控制」和「緊張」兩種受困情緒。這是在我買下牠之前，那時牠在前任飼主／訓練師手中工作得太辛苦、太激烈了。他們還說蠑螈的左後腿組織連結出了些問題，這可以回溯到牠被螞蟻咬那件事。


    自從尼爾森醫師和他妻子來過以後（醫師總共只治療一次，大約三十分鐘），蠑螈就改頭換面了。事實上，牠彷彿突然回到四歲時的狀態！


    我現在可以用牠來以套索捉牛，這對馬的背會造成很大的負擔，但蠑螈做來完全沒問題。我可以在牠身上套韁繩，讓牠展現各種步態，牠表現得非常好，處於巔峰狀態。對我而言，蠑螈現在的表現簡直不可思議。退休後這些年，牠原本幾乎什麼事都做不了，但現在的牠充滿活力，整天都想跑出去玩，宛如新生啊。


    我還有另外一匹馬，叫元寶。元寶大概是我擁有過最棒的馬，牠是一匹漂亮的小夸特馬，有著鹿皮色的毛。我在三個月前買下牠，牠從一開始就顯得無精打采，而且有很嚴重的不信任感，沒有欲望做任何事，一點都不想工作。我碰巧知道牠之前的訓練過程，而我只能說，把那個過程形容為激烈，都算是客氣的。我觀察多年的心得是，你也許可以讓一匹馬接受那種嚴酷的訓練之後上場表演大約一年，然後你就再也使不動牠，因為你的馬最後會說：「你想要怎麼傷害我都沒關係，我已經不在乎，老子不幹了。」


    元寶就是被逼到絕境，索性不幹了。牠痛恨生命，痛恨工作，痛恨人類，因為他們嚴重虐待牠。尼爾森醫師和他妻子為元寶做檢查，發現牠有以下受困情緒：三歲時產生了「憎恨」（牠覺得自己的訓練師痛恨牠）和「憂鬱」，以及其他時期被困住的「不堪負荷」「恐慌」「付出被視為理所當然」等情緒。


    治療過後，元寶完全改頭換面。牠的節奏改變了，騎起來平穩許多，感覺起來更放鬆了，我騎牠時就有這種感覺。此外，牠不再怕人，也沒有那麼戒慎恐懼了。現在的牠各方面看來都與普通馬兒無異，喜歡工作，也充滿活力。這真是太令人驚奇了，元寶現在就像一匹全新的馬。


    上個月，我帶元寶去參加國家馬術協會的比賽，牠獲得三十四匹馬排名的第三名，並在賽馬活動中拿下第三名的佳績。我現在可以很高興地說，元寶在這場賽事打敗前訓練師的最佳紀錄，領先五個積分點。以灌輸恐懼的方式訓練或許行得了一時，但互相信任的關係才能持續下去。


    我不太確定尼爾森醫師的方法是怎麼發揮作用的，但我絕對相信受困情緒的真實性。能夠見證這個過程，並看到這麼好的結果，實在太美妙了。尼爾森醫師雖然不知道馬兒先前遭遇過什麼事，浮現出來的情緒和事件卻完全吻合。


    我早就知道這個方法管用，如今也在自己的馬身上看見成效。每當我試著跟別人描述這個療法時，大家總是說這聽起來像巫毒法術。我只知道這個方法真的有效，而我只關心這一點。


    ——波依德·朗帝


    我叫黛比·史畢森菲，是國際馬聯的花式騎術訓練師和講師，曾經和奧運訓練師一起在德國受過訓。我在加州經營一座訓練場十七年，訓練場中有二十三匹馬，從訓練級到第二中級都有。現在的我基本上是半退休狀態，跟我的荷爾斯泰因馬「啟示錄」住在奧勒岡州，並且在奧勒岡州、加州及科羅拉多州教授花式騎術及擔任比賽評審。


    一九九八年七月，我參加了尼爾森醫師在加州聖地牙哥舉辦的磁療法講座。我用他的方法清除受困情緒，發現這用在馬和人身上都是一項無價的工具。我有好多令人驚奇的故事可以分享，這裡就挑幾則特別精采的來說。


    有一匹隨我訓練好幾年的馬叫「高地人」，牠一年總會跛腳幾次。我們替牠請過三次獸醫，照過X光，也嘗試整脊復健及針灸療法，但似乎都沒有什麼用。大夥兒備感挫折，因為我們必須帶著牠去參加比賽，卻從不知道那神祕的跛腳症狀什麼時候會發作。當我因為接受尼爾森醫師診療十年，以及參加他舉辦的講座，而學會情緒密碼之後，便開始把這套能量平衡療法施作在我訓練的馬兒身上。


    高地人的跛腳症狀發生在右邊的跗關節，我開始幫牠清除情緒包袱。牠有一道二十九間欄舍厚的心牆，而透過釋放情緒，我讓這道心牆消失了。牠對牠的主人懷有「被遺棄」「憤怒」和「怨恨」等情緒，其中最主要的是「哀痛」。我往回追溯到牠五歲時，當時牠被以拖車運送，卻在拖車裡倒了下來，而主人沒有停下來幫牠，就讓牠一路上那樣躺著。我向牠的主人查證有沒有發生過這件事，她很羞愧地承認了。她當時不知道該怎麼做，只好讓牠在拖車裡躺著，繼續開車前往表演場地。高地人知道主人知情，因而怨恨她，也覺得自己被主人遺棄了。


    我幫高地人清除所有情緒之後，牠在十分鐘內就從跛腳馬變成一匹完全健康的馬，並在接下來三年的訓練期間維持健康狀態。中間我只有再幫牠清理過兩次，都是在牠看見其他馬兒不願意進去拖車的時候，我想也許是那樣的情景讓牠想起往日的哀痛。話雖如此，高地人的健康情形依舊良好，而且拿了好幾個冠軍回來。


    另外一匹來接受我訓練的馬也有跛腳問題，我之前從來沒有教過牠。我問牠的主人是否願意讓我為牠做肌肉測試，以釐清這個跛腳問題是身體或情緒因素。測試結果顯示，這是情緒造成的跛腳。有一匹馬在馬場被安樂死，這匹馬因為哀悼逝去的同伴，而造成多處臟器與心臟短路。我花了十分鐘幫牠清理，結束之後牠立刻健康地小跑了起來，而且直到被賣掉前都保持健康無恙。


    買馬之前，我都會利用情緒密碼看看我打算買的馬是否有情緒問題，以及是否真的可接受訓練，這在選擇理想馬匹上對我有極大的幫助。我總是會為我的馬做肌肉測試，以檢查牠們的健康狀態。因為有了尼爾森醫師的方法，我認為我的馬在身心方面都變得更健康、更快樂了。


    > ——黛比·史畢森菲


    ## ★你有了可以幫助動物的工具


    我們和動物共同生活在這個地球上，而很多時候，我們是牠們非常親密的照護者。動物是我們的同伴、我們的朋友，有時我們甚至把牠們視為家庭成員般愛護——事情就應該是這樣。


    如同對待家人般，我們有責任確保自己照顧的動物是不是有被餵飽、是不是有地方住，盡全力讓牠們活得健康且安全。


    請隨時注意自己照顧的動物，如果發生了什麼讓人心神不寧的事——例如雛鳥死在勇士面前——想想你的動物會有什麼感覺。當動物出現任何症狀時，無論是身體上或行爲上，都可能是受困情緒的影響。不過，你現在有工具可以自己幫助牠們了。


    別害怕嘗試，你只要把自己的心填滿對動物的愛，然後禱告，抱持著想要幫助牠們的清晰意念，相信自己做得到，那麼你一定做得成。


    # 第4部 更加光明的未来


    # 第10章 沒有受困情緒的人生


    > 我對明日一無所懼，因為我經歷過昨日，又熱愛今日。

    > ——威廉·艾倫·懷特


    鮮少有人不被受困情緒羈絆。這似乎是人的經歷的一部分。


    毫無受困情緒的人生，誠然是美妙精采的。然而就我的觀察，這即使有付諸實現的可能，卻人生就像個福袋，裡面裝滿令人感恩的祝福、必須跨越的困難、各種探索機會、需要做的抉擇，以及三不五時的哀痛與磨難。這些事使我們得以體驗人生、強健信心、增長見聞，並滋養心中的愛。人類大家庭的所有人都是彼此相連的，發生在其中一個成員身上的事，或多或少會影響到每一個人。透過這些體驗，我們發展出對彼此的了解與同情，讓人與人之間連結得更緊密。


    你的生命如何流動，取決於你決定如何帶著你面對的這許多事去感受每一天。


    什麼樣的事物會呈現在你面前、會有哪些機會來臨，以及你會學到什麼東西，與你的態度大有關係。


    ## 你的焦點決定了你的實相


    事實上，你眼前所見的許多事物，是因為你相信自己的生命中可以擁有那些事物而被吸引過來的。


    每一天都可以做選擇，選擇要對生活中發生的一切抱持正面或負面感受。任何時刻幾乎都會發生好事，以及沒那麼好的事，而你選擇把焦點放在哪一類事情上，大大影響你會有多少幸福感。


    人們有時會將太多注意力放在過去。如果你一直聚焦在過去的某個負面事件，重新經歷那些情緒，即使事件發生已久，你還是會因此產生受困情緒。


    說到這裡，我不禁想起一位名叫黛安的病人。黛安的父親十年前過世，但我在她身上找到一個被困住的「傷心遺憾」，竟是在她父親去世四年後產生的。黛安當時雖然撐過父親的喪禮，沒有產生任何受困情緒，但在父親逝世第四年的忌日，黛安選擇讓傷心遺憾的負面情緒壓倒她。那時她有意識地決定讓自己重新經歷痛失至親的傷心遺憾，而非想著父親帶給她的那些美好而正面的事物。結果，她爲自己製造了一個負面且有潛在危險的受困情緒。


    請停下腳步，觀察一下自己的思緒。在你生命中的任何一天，你的念頭都是偏向正面或負面？你會選擇專注於讓人歡喜的正面事物，並決定抱持感恩、滿足和喜悅的感受，或是選擇停留在負面情緒之中？


    比方說，假如你的感情出了問題，我相信你還是可以在伴侶身上找出一些讓你感謝的事。選擇聚焦於一段感情中的美好事物，並把注意力放在它正向的那些部分，可以幫助你心懷感恩、覺得快樂。這麼做甚至可能打開一條通往正面改變的路，尤其如果你還想繼續發展與維持這段感情。


    相反地，每當我們把焦點放在自己遭遇的問題，以及那些出錯的事情上，最後只會創造出更多負面事物。我看過一部電影，裡面有一位充滿智慧的老師告訴他的學生：「記住，你的焦點決定了你的實相。」多麼真實的一句話啊！你可以將半杯水看作半空，也可以看作半滿，不過，把它看作半滿，會讓你更有力量，並為你創造一個更爲正面的實相。


    對自己想要的事物抱持正面感受，將幫助你創造出自己夢想的一切。當你觀想你想要的人生，並能感受到美夢已然成真，最終你將找到機會創造出讓你快樂的一切事物。


    把注意力放在你不想要的事物上，並體驗到負面感受，不是會創造出同樣那些負面問題，就是會讓那些問題持續存在你的生活中。


    比方說，假如你總在擔心這輩子與真愛無緣，你向宇宙發出的訊息就是你找不到真愛。結果，你真的會找不到，或者至少不那麼容易找到。


    我們不斷將自己的想法發射到宇宙中，我相信這些想法會散布在無垠的空間裡，且不受光速或其他任何因素所限。人的思想強而有力，是我們創造了自己的想法與感受。


    記住《聖經·箴言》第二十三章第七節所說的：「因為他心怎樣思量，他為人就是怎樣。」


    創造隨時隨地都在發生。每當一個人有某個想法或某種長期的慣性思考模式時，他就是在創造，而某樣事物將會從這些想法中顯化出來⋯⋯因此，你最後會吸引來你覺知中的主要思想，無論那些思想是有意識或無意識的。


    > ——麥可·貝克威牧師


    你已經了解到，控制自己有意識的思想，並讓那些思想保持正面有多重要了。不過，你潛意識的念頭呢？


    潛意識對你想達成的目標有很大的影響力，然而，受困情緒會藉由潛意識的運作扯你後腿。


    你也很努力地保持正面心態，盡可能把半杯水看作半滿，但在此同時，潛意識裡的受困情緒卻背叛了你，不斷向宇宙發送負面的思想頻率。


    你體內的受困情緒愈多，它們發送出來的負面思想能量就愈多，你也愈難吸引到自己真正想要的事物。


    還好，受困情緒是可以被釋放的。只要你把使用情緒密碼變成習慣，就能改變思想的頻率，如此即可避免發生於潛意識層次的想法和感受帶來的傷害。


    當你擺脫了負面的受困情緒，你會發現自己比較容易去選擇正面情緒，而這些正面情緒將幫助你吸引來你真正想要的事物。


    ## ★你選擇了你的情緒


    你是否說過「我丈夫讓我氣死了」「那讓我好沮喪」「那件事讓我心情糟透了」之類的話？這樣的說法很普遍，如果你仔細傾聽自己內心的聲音，可能會發現自己正在說差不多的話。不過，假如你停下來思考一下，會發現這樣的說法頗荒謬。事實上，沒有人可以讓你感受到任何你並未選擇去感受的情緒。


    發生在你身上的事並未真的決定你感受到的情緒。也許你沒辦法有意識地控制每一件影響你人生的事，你卻有能力選擇自己要如何想、如何感受、如何行動。無論發生什麼事，最終選擇要感受哪種情緒的，是你自己。


    許多人有時會不知不覺地成為自身情緒的受害者。也許你不相信你有能力掌控自己的感受，負面情緒可能會以迅雷不及掩耳之勢快速浮現，讓人彷彿沒有時間選擇別種情緒，只能表現出自然的反應性情緒。假如你約會快遲到了，自然會覺得焦慮不安；如果有人粗魯無禮地對待你，可能會不自覺地被激怒；而當妳被羞辱或虐待時，你也會立刻覺得怨恨或憤怒。


    如果你像大多數人一樣，不如意事，十常八九，那麼除非控制自己的情緒，否則當事情發生時，你只能「反應」。而當你讓自己去反應時，你的潛意識可能會基於你過去在類似狀況中選擇的情緒，讓你感受到負面情緒。


    也許過去在類似狀況中你都選擇某一種負面反應，但你一定要以同樣的模式作為你未來的處理方式。每當你必須去處理或面對負面事物時，你都有選擇權。你可以選擇總是以老路子回應，或是選擇不同的方向。重點是，你的過去不一定等於你的未來。


    關於情緒的真相是：你才是有選擇權的老大。只有你才能選擇要用什麼方式去感受一件事。總是如此，絕無例外。意識到這一點本身就會讓人充滿力量。你才是自身情緒旋律的譜寫者。


    面對任何情況，你都可以選擇你想要的情緒。沒錯，這需要練習，也沒有人說這很容易做到，但確實是一條可行的路。


    下次當你發現心中充滿負面情緒時，停下來想一想，這一路上到底發生了什麼事，讓你如此難受。也許乍看之下是情緒選擇了你，其實不然，是你選擇了情緒。


    有意識地做出選擇，而不是讓舊有的潛意識模式掌控你，就是在選擇進化與成長。'
