    # 情緒密碼 306


    要的事物。

    還好，受困情緒是可以被釋放的。只要你把使用情緒密碼變成習慣，就能改變思想的頻率，如此即可避免發生於潛意識層次的想法和感受帶來的傷害。

    當你擺脫了負面的受困情緒，你會發現自己比較容易去選擇正面情緒，而這些正面情緒將幫助你吸引來你真正想要的事物。


    # ★你選擇了你的情緒


    你是否說過「我丈夫讓我氣死了」「那讓我好沮喪」「那件事讓我心情糟透了」之類的話？這樣的說法很普遍，如果你仔細傾聽自己內心的聲音，可能會發現自己正在說差不多的話。不過，假如你停下來思考一下，會發現這樣的說法頗荒謬。事實上，沒有人可以讓你感受到任何你並未選擇去感受的情緒。

    發生在你身上的事並未真的決定你感受到的情緒。也許你沒辦法有意識地控制每一件影響你人生的事，你卻有能力選擇自己要如何想、如何感受、如何行動。無論發生什麼事，最終選擇要感受哪種情緒的，是你自己。

    許多人有時會不知不覺地成為自身情緒的受害者。也許你不相信你有能力掌控自己的感受，'
  - '[PAGE 309]


    # 第4部 更加光明的未來


    負面情緒可能會以迅雷不及掩耳之勢快速浮現，讓人彷彿沒有時間選擇別種情緒，只能表現出自然的反應性情緒。假如你約會快遲到了，自然會覺得焦慮不安；如果有人粗魯無禮地對待你，你可能會不自覺地被激怒；而當妳被羞辱或虐待時，你也會立刻覺得怨恨或憤怒。

    如果你像大多數人一樣，不如意事，十常八九，那麼除非控制自己的情緒，否則當事情發生時，你只能「反應」。而當你讓自己去反應時，你的潛意識可能會基於你過去在類似狀況中選擇的情緒，讓你感受到負面情緒。

    也許過去在類似狀況中你都選擇某一種負面反應，但你一定要以同樣的模式作為你未來的處理方式。每當你必須去處理或面對負面事物時，你都有選擇權。你可以選擇總是以老路子回應，或是選擇不同的方向。重點是，你的過去不一定等於你的未來。

    關於情緒的真相是：你才是有選擇權的老大。只有你才能選擇要用什麼方式去感受一件事。總是如此，絕無例外。意識到這一點本身就會讓人充滿力量。你才是自身情緒旋律的譜寫者。

    面對任何情況，你都可以選擇你想要的情緒。沒錯，這需要練習，也沒有人說這很容易做到，但確實是一條可行的路。

    下次當你發現心中充滿負面情緒時，停下來想一想，這一路上到底發生了什麼事，讓你如此難受。也許乍看之下是情緒選擇了你，其實不然，是你選擇了情緒。

    有意識地做出選擇，而不是讓舊有的潛意識模式掌控你，就是在選擇進化與成長。'
- md: '# 正面情緒清單


    | 接納 | 欣喜／愉快 | 希望 |

    | :--- | :--- | :--- |

    | 進取心 | 勤勉 | 謙遜 |

    | 期待 | 興高采烈 | 感興趣／關心 |

    | 敬畏 | 同理心 | 喜悅 |

    | 仁慈 | 興奮 | 善意 |

    | 平靜 | 信心 | 愛 |

    | 慈愛 | 原諒 | 虛心 |

    | 舒適 | 友誼 | 熱情 |

    | 滿足 | 寬容／慷慨 | 耐心 |

    | 自信 | 高興 | 和平 |

    | 勇氣 | 感恩 | 滿意 |

    | 好奇心 | 快樂 | 驚喜 |

    | 渴望 | 榮耀 | 樂意 |


    在自動反應模式掌控大局之前，可以利用你新學到的、關於受困情緒的知識，來幫助自己停下來，轉換思考方向。


    下次面對負面狀況時，不要一下子就反應。想一下，然後問問自己：「哪一種對我比較好？負面情緒或正面情緒？」我猜通常是正面情緒會勝出。有太多美好的感受供你選擇，這裡提供一份正面情緒清單，下次想要選擇以正面方式回應時，不妨試試。


    ## 關於放下


    《活出意義來》一書點出選擇你自己的情緒，而不是讓負面情緒選擇你的重要性。這本書的作者維克多·弗蘭克博士是一名心理學家，第二次世界大戰時被送進納粹集中營。身爲研究人類行爲的學生，弗蘭克博士很自然地開始觀察身旁的人。他注意到，人們對自身所處困境，以及對周遭觀察到的恐怖事物的反應，有很大的差異。弗蘭克博士發現那些選擇沉浸在無望感中的人，以及那些放棄的人，通常無法存活太久。


    但讓他驚訝的是，即使身處這種筆墨難以形容的恐怖氛圍中，依舊有一群人選擇了愛與希望。弗蘭克博士如此寫道：


    > 當時身處集中營的我們都記得，有人會穿過牢房去安慰其他人，把自己最後一片麵包送出去。這些人並不多，但已足以證明一件事，那就是你可以奪走一個人的一切，唯一例外的是：人類最後的自由——在任何情況下自由選擇自己的態度，選擇自己的路。


    ### 關於驕傲


    聽到「驕傲」這個詞，你會想到什麼？對某項成就的驕傲？因完美執行一項任務而驕傲？也許你想到的的是爲自己支持的球隊或祖國而感到驕傲。這些驕傲並無不妥，但有一種形式的驕傲會暗中滋生，且非常具傷害性。


    這種會傷害我們的驕傲，有時被稱爲傲慢。它會出現在我們讓自己與他人或神對立時；在我們感受到對他人的憎恨、嫉妒、怨恨、優越感、惡意或憤怒時。傲慢是自私的，它就像鬧脾氣一樣，讓我們認為自己的方式是最好的，也是唯一可行的方式。


    我們往往很難在自己身上認出傲慢。它被稱作「極大的惡」，因為它在眾人之中很常見。傲慢有個嚴重的問題，就是讓你不願意原諒他人，而是想要緊抓著你承受過的那些真實或想像中的傷痛，導致你產生憤怒、挫折感與怨恨等負面情緒。最終你可能會想要報復那些曾經錯待你的人。


    當我們讓自己的意志陷在對抗他人、對抗神或對抗宇宙的泥淖中，我們就偷走了自己的力量。世上所有的力量都源自神，如果對抗神，就如同癱瘓自己，讓自己止步不前。


    事實上，讓傲慢固守在你的生活中，只會阻礙自己的進步並傷害自己。傲慢會導致受困情緒產生，因為它不會讓你放手和解原諒，不會讓你走上通往平靜的更高道路。起初你只會覺得怨恨，但傲慢最終會帶你往下走進負面感受的黑暗道路。


    心中有怨恨，就會生出嗔念；放下怨恨，嗔念就會消失。


    ——佛陀


    放下過去的受傷感受對你非常有幫助。你可能以爲自己有正當理由緊抓著那些受傷的感受，因為唯有如此，那些傷害你的人才會受到懲罰。但事實上，緊抓住負面情緒傷害到的是你，不是他們。那些人可能知道，也可能不知道你的感受，但他們的感受完全是他們自己的事。就因爲你選擇緊抓著過去不放來讓自己受苦，不代表那些傷害你的人也會跟你一起受苦。也許他們真的做了很可怕的事，你似乎不可能放下，但這就是你有力量去做一件改變生命、對自己有特別意義之事的時候。一旦決定原諒他們，你就能擺脫所有和這個問題相關的負面情緒。我總是喜歡引用路易·史密德的這段話：「原諒就是讓一個囚犯自由，然後你會發現，那個囚犯就是你自己。」所以，爲什麼不讓自己自由？爲什麼要讓自己年復一年地經歷那些受傷的感覺，創造更多負面情緒和傷害？提醒自己，讓事情過去吧，原諒吧。問題常起因於無知。許多人之所以受苦，是因爲我們不知道自己對彼此做了什麼事。如果我們能夠了解自己對他做的一切，就是我們對自己所做的，問題就解決了。如果曾經有人錯待你，不妨想想耶穌基督給我們的榜樣。他被釘在十字架上時說了這麼一段話：「父啊！赦免他們；因爲他們所做的，他們不曉得。」在那樣的絕境中，耶穌選擇了愛與原諒，我們也可以。


    ## 力量


    二〇〇五年，專欄作家傑伊·艾凡森報導了一則全國性的新聞，這個真實故事傳達出原諒的力量。


    如果今天有個青少年一時興起，把一隻重達二十磅的冷凍火雞從高速行駛的車上猛然擲到你車子的擋風玻璃上，不知你做何感想？如果歷經六小時的手術，你的臉在重金屬器械和手術盛盤中被拼湊起來，事後並被告知未來還須經過數年的復健之路，才能回歸正常人的生活，沒有死亡或永久性腦部傷害就該感到幸運了，不知道你心中是什麼滋味？


    在得知攻擊你的人和其同夥一開始竟然只是因為他們偷了一張信用卡，準備去購物狂歡的路上隨手丟出那隻火雞，而這一切都只是為了好玩……你內心感受如何？


    就是這種駭人聽聞的犯罪事件，驅使政治人物盡力促成加重刑罰的承諾。就是這種事件，讓國會議員互相拚搏，誰也不讓誰地踩在對方身上，試圖讓自己成為針對利用冷凍家禽進行犯罪行為而端出加重刑罰法案的第一人。


    > 《紐約時報》節錄法庭律師的說法：這種犯罪行為無論處以何種刑罰，都不足以安慰受害者。他說：「即使是死刑也無法贖罪。」


    也就是這樣，才讓整起事件的結局如此出乎意料。現年四十四歲的受害者維多莉亞·魯佛蘿先前是一家藝品代理商的經理，她非但不想報復，竟然還想拯救那名攻擊她的十九歲犯罪行為人萊恩·庫辛。魯佛蘿堅持請檢察官調出库辛的資料，包括他的生平、成長環境等，並且堅持要提供庫辛一個認罪辯訴協議（注：法律上因被告承認犯有輕罪而獲得從輕處罰的協議）。一般來說，這樣的協議在美國境內會被判以六個月有期徒刑，並且在二級傷害罪後合併五年緩刑。


    假使庫辛被判定一級傷害罪成立，也就是原先最可能被控告成立的罪名，他會在牢裡蹲上二十五年；換句話說，屆時被丟回社會的庫辛將是一名沒有任何技能、沒有未來的中年男子。


    但故事只說了一半，那天法庭裡上演的最後結果，才是真正扣人心絃的部分。


    根據《紐約郵報》的報導，庫辛當庭走到魯佛蘿的座位前面，盈著淚，有些躊躇而小心翼翼地小聲道了歉：「我很抱歉對你做了那些事。」


    魯佛蘿站起來，這個受害人跟傷害她的人淚眼相擁。在庫辛啜泣時，她梳過庫辛的頭髮，拍拍他的背。《時代》雜誌記者親眼見證，並聽到她說：「沒事了，我只希望你能把生命中最好的那一面活出來。」根據法庭紀錄，就連鐵石心腸的檢察官，甚至媒體記者，都不禁動容，強忍淚水。


    ## 關於慈愛


    我們原諒他人的能力，源於自身給出愛的能力。最純粹的愛就是無條件的愛，也就是慈愛。


    > 《新約聖經》中最爲人熟知的其中一段，就是《哥林多前書》第十三章，部分經文如下：

    >

    > 1. 我若能說萬人的方言，並天使的話語，卻沒有愛，我就成了鳴的鑼，響的鈸一般。

    > 2. 我若有先知講道之能，也明白各樣的奧秘，各樣的知識，而且有全備的信，叫我能夠移山，卻沒有愛，我就算不得什麼。

    > 3. 我若將所有的賙濟窮人，又捨己身叫人焚燒，卻沒有愛，仍然與我無益。

    > 4. 愛是恆久忍耐，又有恩慈；愛是不嫉妒；愛是不自誇，不張狂，

    > 5. 不做害羞的事，不求自己的益處，不輕易發怒，不計算人的惡，

    > 6. 不喜歡不義，只喜歡真理；

    > 7. 凡事包容，凡事相信，凡事盼望，凡事忍耐。

    > 8. 愛是永不止息。先知講道之能終必歸於無有；說方言之能終必停止；知識也終必歸於無有。


    為什麼原諒他人並懷有一顆慈愛之心，可以幫助你避免產生受困情緒呢？因為慈愛就是愛，純粹而簡單，對我們的人類同胞發出無條件的愛。我也真心相信這就是我們會出現在地球上其中一個重要原因，我們是來到這裡學習發展這樣的愛。


    當我們對他人有這種感覺，我們的心就會以愛的頻率共振，內在就會體驗到平靜與和諧。處在這樣的頻率中，沒有任何黑暗可言，也沒有受困情緒會產生。


    慈愛幫助我們不再著眼於自身，擺脫自我為中心，幫助我們關心並了解他人的需要。這會讓我們犧牲自己的時間，服務他人，並提供物資給那些有需要的人。這幫助我們成為施者，也讓我們成為感恩的受者，而非取者。讓我們彼此建立一種連結，變成家人，成為兄弟。賦予個體價值，也讓我們變得更完整、更有歸屬感。


    慈愛，是一種從心發出的純淨之愛。慈悲是神給我們的一份禮物，因為是出於神的恩賜，所以我們可以大大地向祂張口，也應該多多向祂要。


    每當心中充滿慈愛，我們就在向外擴展，而非向內緊縮。我們在幫助他人實現快樂的同時，也會感受到喜悅。我們將關心他人的福祉視為讓自己開心的首要之務，將價值奉獻在社會及他人身上，使自己感到開心。如此，心得以在靈性上擴展，使我們變得有能力去給出並接收愛。


    德蕾莎修女對人類的奉獻受到全世界的尊崇。有人問過她如何日復一日地堅持下去，而且每日面對垂死之人能夠供給食物、碰觸他們、撫平他們皺起的眉頭，並且安慰他們。


    她說：「這不困難，因為我在每張臉上都看到基督的面容，如同在每個受苦的人身上我都看見基督正在經歷一場別有意涵的苦難考驗。」


    當心中充滿這樣的慈悲，我們會變得容易原諒他人、變得有耐心且寬容，基本上不太容易產生受困情緒。人往往傾向去放大別人的缺陷和弱點，進而論斷他人，但一個滿懷慈愛的生命才是值得去努力和實現的。這樣的生命充滿陽光，也唯有如此，才能遠離負面情緒的深淵。


    ## 關於誠信


    當我們能生活在真實且正確的道路上，我們就是一個誠信之人。誠信是一種美德，一種內在力量，一種對自我的誠實。誠信會讓人開展最好的一面。


    一般而言，我們愈誠信，就愈難產生受困情緒。因為此時靈魂沒有分裂，是完整的；此時我們的心沒有撕裂，沒有內在衝突。


    當一個人選擇在生命中彰顯誠信，他的心、他的靈都處在平安之中。當他持續走在這條路上時，誠信就益發壯盛，信心會倍增，同時正向特質也會被強化。一個活在這條道路上的人，很難留餘地給負面情緒，自然也就不會受困。


    以生命的本質而言，確實有許多艱困的時刻，我們唯有藉由成長蛻變，才能面對這些挑戰。在這一點上，即使誠信正直的人也不例外，單靠誠信也無法完全避免受情緒的干擾。


    因為自我的成長需要擴展、調整、淬鍊自我、承擔風險、包容他人需求、面臨艱難選擇，以及承受許多超乎我們自以爲能力所及之事。


    困境、反對和挑戰自然會帶給我們很多成長的機會。我們可以選擇反抗及迴避，或者，我們可以將挑戰視爲一種祝福，並感謝這一切帶給我們的成長。有時，最難面對的處境，反而帶給我們最大的益處。


    所以，當我們面臨反對聲浪時，要停下來自我檢視，是否產生了受困情緒，方能遠離情緒的負面影響。


    ## 生命的精煉之火


    人生就是一連串不斷學習與淨化的過程，下面這個故事就把這個原則彰顯得淋漓盡致。


    從前有一群婦女在研究《舊約聖經》的〈瑪拉基書〉，當她們讀到第三章第三節時，上面寫著：「他必坐下如煉淨銀子的。」這讓這群女子感到困惑，她們不明白這段經文究竟對神的性格和本質提出什麼樣的解釋。其中一名女子提議去探究煉銀的過程，並在下次讀經時與小組分享。


    當週這名女子就打電話找了一名銀匠，預約去參觀他工作時的情況。除了表明好奇之外，她沒有提到讓她去一探究竟的任何原因。當女子去參觀時，銀匠手中握著一塊銀，伸進火裡加熱。銀匠解釋在煉銀時，要有人把銀固定在火焰最燙的中央位置，好把所有不潔的東西都煉淨。


    這名女子就想到神也是這樣把我們握在同樣的位置，然後她又想到經文上說的：「他必坐下如煉淨銀子的。」於是她就問那銀匠，在煉銀時是不是真的要全程坐在火的前面，等待銀子煉出。


    那男人答道：「是的。」接著解釋他不僅需要坐在那邊握著那塊銀，而且在煉銀的同時，他必須全程定睛在銀塊上。如果銀塊在火焰中停留太久，這塊銀就壞了。


    這名女子靜默了一會兒，接著又問銀匠：「那你什麼時候才會知道這塊銀已經被煉淨了呢？」


    他笑著對她說：「噢，這還不簡單，當我可以在上頭看見自己的影像時，我就知道了。」


    今天世上的火若燒得你炙熱難耐，請記得，神必看顧你。


    若生命的試煉看似不可承受，記住，神是愛你的，祂對你有特別的安排。神在精煉你。當祂知道你變得像祂一樣有能力給出無條件的愛時，當祂可以在你臉上看到自己的形象時，這事就成了。


    我相信我們每一個人客居世上，都有個天生的命定，有一項任務要去完成，但受困情緒可能會暗中導致疾病，也會讓我們無法活出原來的樣貌。若是能夠幫助那些在苦難中的人，會是一項神聖的召喚。這不僅是為他們，也是為他們生命裡所能激起的漣漪，讓全然的生命穿越時間和空間，直至永恆。


    在我人生中有很大一部分的滿足感就是來自教導他人、施行療癒，並把人們內在的療癒者召喚出來。在做這些事的當下，我就體驗到幫助他人恢復力量、重拾健康與快樂的那種喜悅。


    ——不具名


    ## 關於禱告


    在我還是個年輕小夥子時，有過一段特殊的靈性經歷，那次經歷讓我真實體認到神的真實性。我知道祂住在我們裡面，我知道祂愛我們，我們是祂靈裡非常真實的孩子、兄弟，以及姊妹。


    一直以來，禱告幫助我了解我們身爲人類的真實身分，包括我們的身體如何運作、如何解決問題並進行療癒。每次在幫助前來求助的人之前，我都會先在心中默禱，這其實已經變成習慣了。有許多次我都因爲如此而受到神的啓發，並了解到超乎我自身能力以外的事。我非常感激神的幫助，並將一切榮耀歸於神。


    我真心鼓勵你在人生的各個層面尋求神的幫助，特別是在助人的時候。只要相信，並獻上感恩之情，祂必成爲你的倚靠。


    萬一你不知道怎麼禱告，或者不確定要用什麼形式禱告，我在此與你分享對我有效的禱告方式。


    一開始，我會簡單地呼求神，通常我會說「天父」，因爲我相信祂就是我的父親。


    接著，我會謝謝祂給我這個機會去幫助我眼前需要幫助的人。


    再來，我會請祂協助我做這件事，並用祂的智慧指引我。


    最後，我會以耶穌基督之名結束禱告，阿們。「阿們」二字意指「願事情這樣成就」。神會在自我療癒的路上祝福你。我也希望你將來可以在這條路上幫助其他許多人，我知道你行的。


    布萊利·尼爾森


    # 情緒的定義


    **被遺棄**：生活上的「遺棄」是孤單地被忽略、被遺留或被拋棄（這種感覺常出現在童年時期）。情緒上的「遺棄」是被放棄了、被抽離；在情感上被人孤立或離異，有種「被甩下了」的感覺。


    **背叛**：「被背叛」是別人打破了你對他的信任；被信任的人遺棄或傷害。「背叛他人」是自己對別人不忠實；不信守承諾；危害彼此之間的信任；辜負了信任你的人。「背叛自己」則是打破自己的原則；打破自己的道德規範；虐待或傷害了自己的身體或靈魂。


    **淒涼**：悲慘的；因為被遺棄而覺得傷心、寂寞、荒涼或空虛；沒有希望的；被拋棄的。


    **迷失方向**：無法看見正確或可接受的方向；沒有目標。現實生活中的失去方向通常發生在童年時期（在森林中迷路，找不到回家的路），情感上的失去方向指的則是沒有辦法看到正確的決定或方向，或是在情感上不穩定（例如：他妻子死後讓他覺得迷失方向。他什麼事都做不了，看起來完全迷失方向）。


    **得不到回應的愛**：表現出來的愛被拒絕，或是一直不被接受。感覺到人家不要自己；不被在乎；不被接受；在需要愛的地方缺乏愛。


    **焦慮**：一種概括不安和不祥之兆的感覺；對未知的恐懼；沒有特定理由的恐懼（例如：她總是毫無原因地感到焦慮及害怕）。


    **絕望**：完全喪失希望；悲慘的；難以接受幫助或無法被安撫。


    **厭惡**：討厭的感覺，特別是當美好的體驗或道德感被冒犯的時候。強烈的嫌惡感（例如：當殺人者被宣判無罪時，他產生強烈的厭惡感）。


    **緊張**：不自然的、深切的不自在或擔心；擔憂的；膽怯的；緊張不安或瀕臨崩潰的；不自然或劇烈的心神不寧或惴惴不安；害怕的；膽小的；覺得焦躁或緊張。


    **擔憂**：老想著困難或麻煩；對某個情況或某人感到不安或焦慮；對潛在的問題過度擔憂；擔心所愛的人可能遭受痛苦。


    **哭泣**：（多數是）無法壓抑地表達強烈情緒；對於疼痛或受苦（情緒上或身體上）的反應；無助的反應與表現。身體上的反應是在喉嚨、胸口或橫膈膜。產生受困情緒的原因經常是個人不允許自己哭泣（壓抑哭泣的反應）。


    **灰心喪氣**：感覺缺乏勇氣、缺乏希望、缺乏信心；灰心的；令人氣餒的；失去嘗試事情的動機與膽量。


    **被拒**：感覺被否定、被拒絕或冷落；被當成無用的或不重要的而被丟棄；被趕走；不被需要；被拋棄。


    **悲傷**：不快樂；對某事感到悲痛；悲慟的；因為哀痛的事而受影響。


    **傷心遺憾**：傷心的後悔；因為失去而引起的悲痛、失望或哀痛；感受或表達不幸、不幸福或悲傷。


    **憤怒**：因為錯誤或以為是錯誤的事而引起的強烈不愉快或好戰的感覺。「憤怒」這種情緒時常是為了掩飾或否認（不承認）受傷或害怕的感覺。


    **憤恨**：一種嚴厲、厭惡或憤世嫉俗的態度；因為痛苦的或被不公平對待的經驗而引起的生氣或怨恨。


    **內疚**：做錯事或犯了錯的感覺；覺得別人受的傷害是自己的責任（虐待、父母離異、死亡等），經常伴隨著憂鬱、羞恥感及自虐。


    **憎恨**：厭惡、輕視、非常不喜歡或反感，通常是「被傷害的愛」（情傷）所致。除了對人之外，憎恨也經常是針對某一種情況（覺得別人的行為有敵意；不公正的情況）。對自己的憎恨則會造成破壞性行為或疾病。


    **怨恨**：對某人或某事感到不悅或憤慨，而視爲受傷或被羞辱；一直被不公平對待而懷恨；不願意忘懷。這個情緒通常和敵意一起發生（在行爲中顯現惡意、強烈地敵對或對抗）。


    **責備**：「被責備」是被別人認爲應該負責、被指控，或是被加諸對某事的罪惡感。「責備別人」是指將責任加諸某人或某事、指控別人，或是在別人身上找到錯誤，爲了推卸責任而將之加諸他人或謾過，這是形成「被害者心態」的關鍵情緒，也是讓人喪失力量的關鍵情緒。「責備自己」則是在自己身上挑剔錯誤，這樣會引起自虐、壓抑及沮喪的感覺。


    **懼怕**：對於將要發生的事情感到害怕；對未來感到憂懼，通常是真實的，但有時是未知的（例如：他對於可能會在同學會上遇到當年霸凌他的同學感到懼怕）。


    **恐懼**：因爲逼近的危險、不幸或痛苦，而激發出非常苦惱的感覺。這種威脅感可能是真實的，或是自己想像出來的。


    **恐怖**：因爲可怕或嚇人的事而引發強烈的驚恐；令人厭惡的；震驚的感覺（例如一個極度暴力、殘酷或令人毛骨悚然的事件）。'
  mdcn: '# 正面情緒清單


    | 接納 | 欣喜／愉快 | 希望 |

    | :--- | :--- | :--- |

    | 進取心 | 勤勉 | 謙遜 |

    | 期待 | 興高采烈 | 感興趣／關心 |

    | 敬畏 | 同理心 | 喜悅 |

    | 仁慈 | 興奮 | 善意 |

    | 平靜 | 信心 | 愛 |

    | 慈愛 | 原諒 | 虛心 |

    | 舒適 | 友誼 | 熱情 |

    | 滿足 | 寬容／慷慨 | 耐心 |

    | 自信 | 高興 | 和平 |

    | 勇氣 | 感恩 | 滿意 |

    | 好奇心 | 快樂 | 驚喜 |

    | 渴望 | 榮耀 | 樂意 |


    在自動反應模式掌控大局之前，可以利用你新學到的、關於受困情緒的知識，來幫助自己停下來，轉換思考方向。


    下次面對負面狀況時，不要一下子就反應。想一下，然後問問自己：「哪一種對我比較好？負面情緒或正面情緒？」我猜通常是正面情緒會勝出。有太多美好的感受供你選擇，這裡提供一份正面情緒清單，下次想要選擇以正面方式回應時，不妨試試。


    ## 關於放下


    《活出意義來》一書點出選擇你自己的情緒，而不是讓負面情緒選擇你的重要性。這本書的作者維克多·弗蘭克博士是一名心理學家，第二次世界大戰時被送進納粹集中營。身爲研究人類行爲的學生，弗蘭克博士很自然地開始觀察身旁的人。他注意到，人們對自身所處困境，以及對周遭觀察到的恐怖事物的反應，有很大的差異。弗蘭克博士發現那些選擇沉浸在無望感中的人，以及那些放棄的人，通常無法存活太久。


    但讓他驚訝的是，即使身處這種筆墨難以形容的恐怖氛圍中，依舊有一群人選擇了愛與希望。弗蘭克博士如此寫道：


    > 當時身處集中營的我們都記得，有人會穿過牢房去安慰其他人，把自己最後一片麵包送出去。這些人並不多，但已足以證明一件事，那就是你可以奪走一個人的一切，唯一例外的是：人類最後的自由——在任何情況下自由選擇自己的態度，選擇自己的路。


    ### 關於驕傲


    聽到「驕傲」這個詞，你會想到什麼？對某項成就的驕傲？因完美執行一項任務而驕傲？也許你想到的的是爲自己支持的球隊或祖國而感到驕傲。這些驕傲並無不妥，但有一種形式的驕傲會暗中滋生，且非常具傷害性。


    這種會傷害我們的驕傲，有時被稱爲傲慢。它會出現在我們讓自己與他人或神對立時；在我們感受到對他人的憎恨、嫉妒、怨恨、優越感、惡意或憤怒時。傲慢是自私的，它就像鬧脾氣一樣，讓我們認為自己的方式是最好的，也是唯一可行的方式。


    我們往往很難在自己身上認出傲慢。它被稱作「極大的惡」，因為它在眾人之中很常見。傲慢有個嚴重的問題，就是讓你不願意原諒他人，而是想要緊抓著你承受過的那些真實或想像中的傷痛，導致你產生憤怒、挫折感與怨恨等負面情緒。最終你可能會想要報復那些曾經錯待你的人。


    當我們讓自己的意志陷在對抗他人、對抗神或對抗宇宙的泥淖中，我們就偷走了自己的力量。世上所有的力量都源自神，如果對抗神，就如同癱瘓自己，讓自己止步不前。


    事實上，讓傲慢固守在你的生活中，只會阻礙自己的進步並傷害自己。傲慢會導致受困情緒產生，因為它不會讓你放手和解原諒，不會讓你走上通往平靜的更高道路。起初你只會覺得怨恨，但傲慢最終會帶你往下走進負面感受的黑暗道路。


    心中有怨恨，就會生出嗔念；放下怨恨，嗔念就會消失。


    ——佛陀


    放下過去的受傷感受對你非常有幫助。你可能以爲自己有正當理由緊抓著那些受傷的感受，因為唯有如此，那些傷害你的人才會受到懲罰。但事實上，緊抓住負面情緒傷害到的是你，不是他們。那些人可能知道，也可能不知道你的感受，但他們的感受完全是他們自己的事。就因爲你選擇緊抓著過去不放來讓自己受苦，不代表那些傷害你的人也會跟你一起受苦。也許他們真的做了很可怕的事，你似乎不可能放下，但這就是你有力量去做一件改變生命、對自己有特別意義之事的時候。一旦決定原諒他們，你就能擺脫所有和這個問題相關的負面情緒。我總是喜歡引用路易·史密德的這段話：「原諒就是讓一個囚犯自由，然後你會發現，那個囚犯就是你自己。」所以，爲什麼不讓自己自由？爲什麼要讓自己年復一年地經歷那些受傷的感覺，創造更多負面情緒和傷害？提醒自己，讓事情過去吧，原諒吧。問題常起因於無知。許多人之所以受苦，是因爲我們不知道自己對彼此做了什麼事。如果我們能夠了解自己對他做的一切，就是我們對自己所做的，問題就解決了。如果曾經有人錯待你，不妨想想耶穌基督給我們的榜樣。他被釘在十字架上時說了這麼一段話：「父啊！赦免他們；因爲他們所做的，他們不曉得。」在那樣的絕境中，耶穌選擇了愛與原諒，我們也可以。


    ## 力量


    二〇〇五年，專欄作家傑伊·艾凡森報導了一則全國性的新聞，這個真實故事傳達出原諒的力量。


    如果今天有個青少年一時興起，把一隻重達二十磅的冷凍火雞從高速行駛的車上猛然擲到你車子的擋風玻璃上，不知你做何感想？如果歷經六小時的手術，你的臉在重金屬器械和手術盛盤中被拼湊起來，事後並被告知未來還須經過數年的復健之路，才能回歸正常人的生活，沒有死亡或永久性腦部傷害就該感到幸運了，不知道你心中是什麼滋味？


    在得知攻擊你的人和其同夥一開始竟然只是因為他們偷了一張信用卡，準備去購物狂歡的路上隨手丟出那隻火雞，而這一切都只是為了好玩……你內心感受如何？


    就是這種駭人聽聞的犯罪事件，驅使政治人物盡力促成加重刑罰的承諾。就是這種事件，讓國會議員互相拚搏，誰也不讓誰地踩在對方身上，試圖讓自己成為針對利用冷凍家禽進行犯罪行為而端出加重刑罰法案的第一人。


    > 《紐約時報》節錄法庭律師的說法：這種犯罪行為無論處以何種刑罰，都不足以安慰受害者。他說：「即使是死刑也無法贖罪。」


    也就是這樣，才讓整起事件的結局如此出乎意料。現年四十四歲的受害者維多莉亞·魯佛蘿先前是一家藝品代理商的經理，她非但不想報復，竟然還想拯救那名攻擊她的十九歲犯罪行為人萊恩·庫辛。魯佛蘿堅持請檢察官調出库辛的資料，包括他的生平、成長環境等，並且堅持要提供庫辛一個認罪辯訴協議（注：法律上因被告承認犯有輕罪而獲得從輕處罰的協議）。一般來說，這樣的協議在美國境內會被判以六個月有期徒刑，並且在二級傷害罪後合併五年緩刑。


    假使庫辛被判定一級傷害罪成立，也就是原先最可能被控告成立的罪名，他會在牢裡蹲上二十五年；換句話說，屆時被丟回社會的庫辛將是一名沒有任何技能、沒有未來的中年男子。


    但故事只說了一半，那天法庭裡上演的最後結果，才是真正扣人心絃的部分。


    根據《紐約郵報》的報導，庫辛當庭走到魯佛蘿的座位前面，盈著淚，有些躊躇而小心翼翼地小聲道了歉：「我很抱歉對你做了那些事。」


    魯佛蘿站起來，這個受害人跟傷害她的人淚眼相擁。在庫辛啜泣時，她梳過庫辛的頭髮，拍拍他的背。《時代》雜誌記者親眼見證，並聽到她說：「沒事了，我只希望你能把生命中最好的那一面活出來。」根據法庭紀錄，就連鐵石心腸的檢察官，甚至媒體記者，都不禁動容，強忍淚水。


    ## 關於慈愛


    我們原諒他人的能力，源於自身給出愛的能力。最純粹的愛就是無條件的愛，也就是慈愛。


    > 《新約聖經》中最爲人熟知的其中一段，就是《哥林多前書》第十三章，部分經文如下：

    >

    > 1. 我若能說萬人的方言，並天使的話語，卻沒有愛，我就成了鳴的鑼，響的鈸一般。

    > 2. 我若有先知講道之能，也明白各樣的奧秘，各樣的知識，而且有全備的信，叫我能夠移山，卻沒有愛，我就算不得什麼。

    > 3. 我若將所有的賙濟窮人，又捨己身叫人焚燒，卻沒有愛，仍然與我無益。

    > 4. 愛是恆久忍耐，又有恩慈；愛是不嫉妒；愛是不自誇，不張狂，

    > 5. 不做害羞的事，不求自己的益處，不輕易發怒，不計算人的惡，

    > 6. 不喜歡不義，只喜歡真理；

    > 7. 凡事包容，凡事相信，凡事盼望，凡事忍耐。

    > 8. 愛是永不止息。先知講道之能終必歸於無有；說方言之能終必停止；知識也終必歸於無有。


    為什麼原諒他人並懷有一顆慈愛之心，可以幫助你避免產生受困情緒呢？因為慈愛就是愛，純粹而簡單，對我們的人類同胞發出無條件的愛。我也真心相信這就是我們會出現在地球上其中一個重要原因，我們是來到這裡學習發展這樣的愛。


    當我們對他人有這種感覺，我們的心就會以愛的頻率共振，內在就會體驗到平靜與和諧。處在這樣的頻率中，沒有任何黑暗可言，也沒有受困情緒會產生。


    慈愛幫助我們不再著眼於自身，擺脫自我為中心，幫助我們關心並了解他人的需要。這會讓我們犧牲自己的時間，服務他人，並提供物資給那些有需要的人。這幫助我們成為施者，也讓我們成為感恩的受者，而非取者。讓我們彼此建立一種連結，變成家人，成為兄弟。賦予個體價值，也讓我們變得更完整、更有歸屬感。


    慈愛，是一種從心發出的純淨之愛。慈悲是神給我們的一份禮物，因為是出於神的恩賜，所以我們可以大大地向祂張口，也應該多多向祂要。


    每當心中充滿慈愛，我們就在向外擴展，而非向內緊縮。我們在幫助他人實現快樂的同時，也會感受到喜悅。我們將關心他人的福祉視為讓自己開心的首要之務，將價值奉獻在社會及他人身上，使自己感到開心。如此，心得以在靈性上擴展，使我們變得有能力去給出並接收愛。


    德蕾莎修女對人類的奉獻受到全世界的尊崇。有人問過她如何日復一日地堅持下去，而且每日面對垂死之人能夠供給食物、碰觸他們、撫平他們皺起的眉頭，並且安慰他們。


    她說：「這不困難，因為我在每張臉上都看到基督的面容，如同在每個受苦的人身上我都看見基督正在經歷一場別有意涵的苦難考驗。」


    當心中充滿這樣的慈悲，我們會變得容易原諒他人、變得有耐心且寬容，基本上不太容易產生受困情緒。人往往傾向去放大別人的缺陷和弱點，進而論斷他人，但一個滿懷慈愛的生命才是值得去努力和實現的。這樣的生命充滿陽光，也唯有如此，才能遠離負面情緒的深淵。


    ## 關於誠信


    當我們能生活在真實且正確的道路上，我們就是一個誠信之人。誠信是一種美德，一種內在力量，一種對自我的誠實。誠信會讓人開展最好的一面。


    一般而言，我們愈誠信，就愈難產生受困情緒。因為此時靈魂沒有分裂，是完整的；此時我們的心沒有撕裂，沒有內在衝突。


    當一個人選擇在生命中彰顯誠信，他的心、他的靈都處在平安之中。當他持續走在這條路上時，誠信就益發壯盛，信心會倍增，同時正向特質也會被強化。一個活在這條道路上的人，很難留餘地給負面情緒，自然也就不會受困。


    以生命的本質而言，確實有許多艱困的時刻，我們唯有藉由成長蛻變，才能面對這些挑戰。在這一點上，即使誠信正直的人也不例外，單靠誠信也無法完全避免受情緒的干擾。


    因為自我的成長需要擴展、調整、淬鍊自我、承擔風險、包容他人需求、面臨艱難選擇，以及承受許多超乎我們自以爲能力所及之事。


    困境、反對和挑戰自然會帶給我們很多成長的機會。我們可以選擇反抗及迴避，或者，我們可以將挑戰視爲一種祝福，並感謝這一切帶給我們的成長。有時，最難面對的處境，反而帶給我們最大的益處。


    所以，當我們面臨反對聲浪時，要停下來自我檢視，是否產生了受困情緒，方能遠離情緒的負面影響。


    ## 生命的精煉之火


    人生就是一連串不斷學習與淨化的過程，下面這個故事就把這個原則彰顯得淋漓盡致。


    從前有一群婦女在研究《舊約聖經》的〈瑪拉基書〉，當她們讀到第三章第三節時，上面寫著：「他必坐下如煉淨銀子的。」這讓這群女子感到困惑，她們不明白這段經文究竟對神的性格和本質提出什麼樣的解釋。其中一名女子提議去探究煉銀的過程，並在下次讀經時與小組分享。


    當週這名女子就打電話找了一名銀匠，預約去參觀他工作時的情況。除了表明好奇之外，她沒有提到讓她去一探究竟的任何原因。當女子去參觀時，銀匠手中握著一塊銀，伸進火裡加熱。銀匠解釋在煉銀時，要有人把銀固定在火焰最燙的中央位置，好把所有不潔的東西都煉淨。


    這名女子就想到神也是這樣把我們握在同樣的位置，然後她又想到經文上說的：「他必坐下如煉淨銀子的。」於是她就問那銀匠，在煉銀時是不是真的要全程坐在火的前面，等待銀子煉出。


    那男人答道：「是的。」接著解釋他不僅需要坐在那邊握著那塊銀，而且在煉銀的同時，他必須全程定睛在銀塊上。如果銀塊在火焰中停留太久，這塊銀就壞了。


    這名女子靜默了一會兒，接著又問銀匠：「那你什麼時候才會知道這塊銀已經被煉淨了呢？」


    他笑著對她說：「噢，這還不簡單，當我可以在上頭看見自己的影像時，我就知道了。」


    今天世上的火若燒得你炙熱難耐，請記得，神必看顧你。


    若生命的試煉看似不可承受，記住，神是愛你的，祂對你有特別的安排。神在精煉你。當祂知道你變得像祂一樣有能力給出無條件的愛時，當祂可以在你臉上看到自己的形象時，這事就成了。


    我相信我們每一個人客居世上，都有個天生的命定，有一項任務要去完成，但受困情緒可能會暗中導致疾病，也會讓我們無法活出原來的樣貌。若是能夠幫助那些在苦難中的人，會是一項神聖的召喚。這不僅是為他們，也是為他們生命裡所能激起的漣漪，讓全然的生命穿越時間和空間，直至永恆。


    在我人生中有很大一部分的滿足感就是來自教導他人、施行療癒，並把人們內在的療癒者召喚出來。在做這些事的當下，我就體驗到幫助他人恢復力量、重拾健康與快樂的那種喜悅。


    ——不具名


    ## 關於禱告


    在我還是個年輕小夥子時，有過一段特殊的靈性經歷，那次經歷讓我真實體認到神的真實性。我知道祂住在我們裡面，我知道祂愛我們，我們是祂靈裡非常真實的孩子、兄弟，以及姊妹。


    一直以來，禱告幫助我了解我們身爲人類的真實身分，包括我們的身體如何運作、如何解決問題並進行療癒。每次在幫助前來求助的人之前，我都會先在心中默禱，這其實已經變成習慣了。有許多次我都因爲如此而受到神的啓發，並了解到超乎我自身能力以外的事。我非常感激神的幫助，並將一切榮耀歸於神。


    我真心鼓勵你在人生的各個層面尋求神的幫助，特別是在助人的時候。只要相信，並獻上感恩之情，祂必成爲你的倚靠。


    萬一你不知道怎麼禱告，或者不確定要用什麼形式禱告，我在此與你分享對我有效的禱告方式。


    一開始，我會簡單地呼求神，通常我會說「天父」，因爲我相信祂就是我的父親。


    接著，我會謝謝祂給我這個機會去幫助我眼前需要幫助的人。


    再來，我會請祂協助我做這件事，並用祂的智慧指引我。


    最後，我會以耶穌基督之名結束禱告，阿們。「阿們」二字意指「願事情這樣成就」。神會在自我療癒的路上祝福你。我也希望你將來可以在這條路上幫助其他許多人，我知道你行的。


    布萊利·尼爾森


    # 情緒的定義


    **被遺棄**：生活上的「遺棄」是孤單地被忽略、被遺留或被拋棄（這種感覺常出現在童年時期）。情緒上的「遺棄」是被放棄了、被抽離；在情感上被人孤立或離異，有種「被甩下了」的感覺。


    **背叛**：「被背叛」是別人打破了你對他的信任；被信任的人遺棄或傷害。「背叛他人」是自己對別人不忠實；不信守承諾；危害彼此之間的信任；辜負了信任你的人。「背叛自己」則是打破自己的原則；打破自己的道德規範；虐待或傷害了自己的身體或靈魂。


    **淒涼**：悲慘的；因為被遺棄而覺得傷心、寂寞、荒涼或空虛；沒有希望的；被拋棄的。


    **迷失方向**：無法看見正確或可接受的方向；沒有目標。現實生活中的失去方向通常發生在童年時期（在森林中迷路，找不到回家的路），情感上的失去方向指的則是沒有辦法看到正確的決定或方向，或是在情感上不穩定（例如：他妻子死後讓他覺得迷失方向。他什麼事都做不了，看起來完全迷失方向）。


    **得不到回應的愛**：表現出來的愛被拒絕，或是一直不被接受。感覺到人家不要自己；不被在乎；不被接受；在需要愛的地方缺乏愛。


    **焦慮**：一種概括不安和不祥之兆的感覺；對未知的恐懼；沒有特定理由的恐懼（例如：她總是毫無原因地感到焦慮及害怕）。


    **絕望**：完全喪失希望；悲慘的；難以接受幫助或無法被安撫。


    **厭惡**：討厭的感覺，特別是當美好的體驗或道德感被冒犯的時候。強烈的嫌惡感（例如：當殺人者被宣判無罪時，他產生強烈的厭惡感）。


    **緊張**：不自然的、深切的不自在或擔心；擔憂的；膽怯的；緊張不安或瀕臨崩潰的；不自然或劇烈的心神不寧或惴惴不安；害怕的；膽小的；覺得焦躁或緊張。


    **擔憂**：老想著困難或麻煩；對某個情況或某人感到不安或焦慮；對潛在的問題過度擔憂；擔心所愛的人可能遭受痛苦。


    **哭泣**：（多數是）無法壓抑地表達強烈情緒；對於疼痛或受苦（情緒上或身體上）的反應；無助的反應與表現。身體上的反應是在喉嚨、胸口或橫膈膜。產生受困情緒的原因經常是個人不允許自己哭泣（壓抑哭泣的反應）。


    **灰心喪氣**：感覺缺乏勇氣、缺乏希望、缺乏信心；灰心的；令人氣餒的；失去嘗試事情的動機與膽量。


    **被拒**：感覺被否定、被拒絕或冷落；被當成無用的或不重要的而被丟棄；被趕走；不被需要；被拋棄。


    **悲傷**：不快樂；對某事感到悲痛；悲慟的；因為哀痛的事而受影響。


    **傷心遺憾**：傷心的後悔；因為失去而引起的悲痛、失望或哀痛；感受或表達不幸、不幸福或悲傷。


    **憤怒**：因為錯誤或以為是錯誤的事而引起的強烈不愉快或好戰的感覺。「憤怒」這種情緒時常是為了掩飾或否認（不承認）受傷或害怕的感覺。


    **憤恨**：一種嚴厲、厭惡或憤世嫉俗的態度；因為痛苦的或被不公平對待的經驗而引起的生氣或怨恨。


    **內疚**：做錯事或犯了錯的感覺；覺得別人受的傷害是自己的責任（虐待、父母離異、死亡等），經常伴隨著憂鬱、羞恥感及自虐。


    **憎恨**：厭惡、輕視、非常不喜歡或反感，通常是「被傷害的愛」（情傷）所致。除了對人之外，憎恨也經常是針對某一種情況（覺得別人的行為有敵意；不公正的情況）。對自己的憎恨則會造成破壞性行為或疾病。


    **怨恨**：對某人或某事感到不悅或憤慨，而視爲受傷或被羞辱；一直被不公平對待而懷恨；不願意忘懷。這個情緒通常和敵意一起發生（在行爲中顯現惡意、強烈地敵對或對抗）。


    **責備**：「被責備」是被別人認爲應該負責、被指控，或是被加諸對某事的罪惡感。「責備別人」是指將責任加諸某人或某事、指控別人，或是在別人身上找到錯誤，爲了推卸責任而將之加諸他人或謾過，這是形成「被害者心態」的關鍵情緒，也是讓人喪失力量的關鍵情緒。「責備自己」則是在自己身上挑剔錯誤，這樣會引起自虐、壓抑及沮喪的感覺。


    **懼怕**：對於將要發生的事情感到害怕；對未來感到憂懼，通常是真實的，但有時是未知的（例如：他對於可能會在同學會上遇到當年霸凌他的同學感到懼怕）。


    **恐懼**：因爲逼近的危險、不幸或痛苦，而激發出非常苦惱的感覺。這種威脅感可能是真實的，或是自己想像出來的。


    **恐怖**：因爲可怕或嚇人的事而引發強烈的驚恐；令人厭惡的；震驚的感覺（例如一個極度暴力、殘酷或令人毛骨悚然的事件）。'
