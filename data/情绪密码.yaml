    約莫一個世紀以前，如果想要捕捉一個人的神韻，你必須畫上一張畫，而且若要畫全彩圖，往往得花費許多時間和顏料；但現在，你需要的就是一部數位相機，然後花不到一秒的時間按下快門。以前去拜訪一位住在一百哩外的親戚，可是會花上你一週的時間，現在往返還用不著半天。


    利其器則善其事。掌握對的工具，任務就會變得簡單許多。替代者測試和代理人測試都是很好的工具，無論對象是近在眼前，還是遠在天邊，你都可以用這兩種工具幫他們有效釋放受困情緒。


