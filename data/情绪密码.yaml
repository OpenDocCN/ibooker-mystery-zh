    ## ★受困情緒與疾病的關係


    在療癒這門技藝中，最古老的觀念是：疾病是身體裡的不平衡造成的。受困情緒或許是人類最常遭受的一種不平衡，而我認為受困情緒可能直接或間接與幾乎所有疾病相關。


    > 瑪琳


