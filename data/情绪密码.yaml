  md: '# 檢查施作結果


    進行肌肉測試時，如果我連續三次以上都得到「強壯」或「軟弱無力」的反應，亦即連續好幾個測試結果都相同，我會重新進行基準測試，以確保受試者仍處於可測試狀態。


    假如你測試所花的時間比平常更久，不妨定期檢查你的基準，以確保自己得到的答案無誤。有時候，當你在為他人測試時，對方可能會進入超載狀態，這種情況下，你每次測試都會得到「軟弱無力」的結果，直到他們的心智結束處理程序。如果受試者的肌肉持續呈現「強壯」的反應，不妨利用一個負面字眼去測試他，反之亦然。


    # 請注意四處遊蕩的思緒


