    ## 如何找到並釋放心牆？


    現在我們來談談如何判定一個人有沒有心牆，以及如何將之釋放。


    要找到心牆，只要問問題就可以了。除非你實際詢問受試者的潛意識，他有沒有心牆，否則心牆是不會被揭露出來的。


    心牆由受困情緒構成，然而潛意識卻不再將它們歸類為受困情緒。那些情緒現在已經是一道牆的一部分了，除非你詢問「是否有心牆」，否則你是無法接近它們的。在你得以接觸那些造出心牆的受困情緒之前，你必須讓身心承認確實有一道牆在那裡。一旦你這麼做，受困情緒就會再次被潛意識認定為受困情緒，也因此很容易被釋放掉。當你一個接一個地釋放受困情緒之後，心牆就會瓦解了。


    ## 「隱藏的」這個詞的使用時機


    這真的很簡單，你只要問：「你是否有心牆？」然後利用你選擇的肌肉測試法，讓身體告訴你答案。


    在我的經驗裡，大約八成的人都有心牆。


    當你詢問「你是否有心牆」，然後得到否定的答案時，也許有另一種可能。很多時候，心牆都是隱而未現的，除非你在問句或陳述句裡用了「隱藏的」這個詞。心牆的目的是為了保護一個人的心；換句話說，它是為了把心隱藏起來，讓心不被那些可能導致情緒傷害的人事物所傷。有時，心牆似乎隱藏得太好了，以致難以被發現，但只要你特意在問句中加上「隱藏的」這個詞，它就會顯現出來。


    要確認有沒有這種可能性，你只須在問句或陳述句裡加上「隱藏的」三個字。比方說，你可以問：「你是否有心牆？」如果對方有一道心牆，而且是隱而未現的，這時就會被揭露出來。


    這個訣竅很重要，請銘記在心。很多時候，我都是用了「隱藏的」這個詞，才找到受試者的心牆。


    隱藏的心牆和一般心牆沒有不同，只是比較難被發現罷了。


    一旦身體敞開來讓你知道那裡有一道隱藏起來的心牆，你就可以不必使用「隱藏的」這個詞，因為它已經不再藏起來了。


    ## 心牆準備好要被釋放了嗎？


    一旦確認心牆存在，就問：「我們現在可以從心牆上釋放一個情緒嗎？」即使擁有心牆最終會對個人的健康和福祉產生負面影響，但心牆之所以存在一定有它的理由。有些人的處境讓他們暫時還沒準備好，或是不願意放棄心牆提供的保護，請你務必尊重這一點。


    如果心牆確實存在，但詢問能否將之移除時，卻得到否定的回應，受試者可能要好好想想潛意識為什麼會給出這樣的答案。是因為不安全，或者因為身心目前正在處理其他事情而不堪負荷？無論如何，受試者都應該聽從潛意識，因為潛意識知道什麼對他們最好。


    若得到肯定的答案，你只要照著第六章敘述的步驟操作即可。為了方便你使用，可以翻到第252頁，參考「釋放心牆流程圖」。


    無論受困情緒有沒有組成心牆，利用情緒密碼將之釋放的流程都是一樣的。當你詢問「我們現在可以從心牆上釋放一個情緒嗎」，然後得到肯定的答案時，身心早已選好一個它願意釋放的特定情緒了。


    你無法選擇要先釋放哪個情緒，受試者的潛意識會自己決定。


    一旦你得到肯定的答案，那個受困情緒就已經被選中了。你要做的，就是判斷它到底是受困情緒表中的哪一個情緒，好將它帶到意識層次。找出那個情緒，並且把潛意識想讓意識知道的相關資訊都挖出來，然後將之釋放。


    ## 身體可能需要花一些時間處理被釋放的情緒


    如同我先前解釋過的，有時你可以一次就把心牆上的所有受困情緒一一釋放，但有時候，身體只會讓你釋放一定數量的受困情緒，然後它就需要休息一段時間，去處理那些被釋放掉的情緒。


    在你以釋放下一個受困情緒之前，等待期可能持續數小時到數天不等。


    證實心牆上的一個受困情緒已經被釋放之後，你只須回到原來的問題：「我們現在可以從心牆上釋放一個情緒嗎？」如果答案是「可以」，而且時間允許，就繼續往下進行。


    若答案是「不可以」，請藉由再次詢問「你是否有心牆」，來確認心牆是不是消失了。如果心牆還在，就詢問何時可以再釋放下一個心牆上的情緒——也許是晚一點、一個小時後或明天等等。


    ## 確認心牆的材料


    請記住，潛意識是很有邏輯的。既然憑空造出一道牆顯然不合邏輯，所以，潛意識總會挑選一種材料來建造心牆。


    如果僅以釋放心牆為目的，你其實不需要知道潛意識選擇什麼作為心牆的建材。因為到頭來，所有的心牆都是受困情緒的能量構成的，重要的是將其上的受困情緒釋放掉。


    另一方面，找出潛意識選中的材料很有意思，因為它往往會揭露一些象徵意義。想要問出心牆的建材其實沒有標準程序，但我通常會從那個材料是不是木頭開始測試起。如果不是木頭，我就詢問那個材料比木頭硬或軟；若比木頭硬，我就會問那個材料是不是一種金屬，諸如此類。透過刪去法，你很快就能歸納出可能的答案，同時還可以好好練習肌肉測試。


    若你已經找出心牆的材料，接下來，你可能會想問出這道牆的厚度。心牆可能像紙一樣薄，也可能有好幾哩厚，我只能告訴你，這是我們透過一次又一次的測試發現的結果。我們的潛意識不像意識那樣受限制，它有著天馬行空的想像力！然而，我相信潛意識非常認真看待這一切，它真的相信那道由它選擇的材料建造而成的牆是真實存在的。


    ## 心牆的象徵意義


    有一次，一對老夫妻來到我的診所，丈夫一臉忿忿不平，對待妻子的態度既粗魯又輕蔑，太太看起來則溫和許多。他們兩人都有心牆。丈夫的心牆是鋼做的，堅硬、冰冷，且有好幾哩厚；妻子的心牆則由成千上萬層帷幔構成，為她丈夫不甚討喜的性格提供很好的緩衝。


    我也見過一位男同志的心牆是由鑽石建造而成。鑽石是目前已知自然界中最堅硬的物質——順帶一提，他的潛意識當時不願意讓我幫他釋放心牆。


    我看過各式各樣的心牆材料，從花、被子、毛毯、泥土、石頭、植物、皮革、玻璃，到所有種類的金屬，例如鋼、鈦、鐵，甚至是各種建築材料，如木頭、水泥塊、磚頭等等。


    人的性格通常與他們心牆的材料有很明顯的關連。我治療過一個小朋友，她的心牆是黃色塑膠做成的，就和她的黃色塑膠玩具一樣。


    有時候，心牆上會有一道門或一扇窗。門往往是鎖上的，除了主人，誰也沒有鑰匙。


    雖然心牆時常是球狀的，但也有可能是箱形，或是你可以想像到的其他任何形狀。有些心牆的邊緣很尖銳，或是表面有投影，讓人無法輕易靠近。


    我遇過一個年輕人，他長相英俊，各方面條件都不差，而且生活中有許多機會，卻似乎總是無法和女性發展出親密關係。


    ## 安妮·霍恩的故事：打開心，讓神聖能量充滿這個世界


    一位名叫安妮·霍恩的女士從西雅圖寫信給我，描述她不可思議的瀕死經驗。在那次瀕死經驗中，她看見未來的人幫助彼此移除心牆。下面就是她寫來的信。


