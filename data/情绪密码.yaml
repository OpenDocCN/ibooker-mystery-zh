    如果碰觸圍籬的人牽著另一個人，被牽住的那個人就會因此有觸電的感覺，碰觸電圍籬的人反而會覺得⋯⋯什麼事也沒有；換句話說，碰觸電圍籬的人只是扮演傳導電流的角色，好比一條延長線。


