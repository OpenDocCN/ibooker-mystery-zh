    讓抵抗指維持這樣的低強度，然後用測試指慢慢將之往下壓。你會發現抵抗指很容易就被壓下去了，這樣也沒關係。


    到目前為止一切都很好，接下來是你要了解的重點。


    自我測試法和我們學過的其他測試方法有些許不同，基本差異在於你必須找出自己的「調光器」設定；也就是說，你得學會拿捏力道，什麼樣的力道剛好讓抵抗指在陳述句符合真相時保持位置不變，陳述句不符合真相時則被壓下去。準備好了嗎？這一點都不難，跟著我一起做吧。


    一開始，請將抵抗指的肌肉力量調高到百分之百。現在，請說「不」，或者可以說「憎恨」，然後以測試指往下壓。你會發現，當抵抗指用盡全力阻抗時，即使你說了負面字眼，它依舊不會被壓下去。


    好，現在稍微調降抵抗指的肌肉力量，接著重複負面字眼「不」或「憎恨」（任何一個皆可，但在練習時請選擇其中一個，以保持一致）。現在，把抵抗指往下壓，看看會發生什麼事。毫無動靜？沒關係。


    試著再稍微調降抵抗指的肌肉張力，然後重複那個負面字眼，再測試一次。


    就這樣重複前述步驟。某一刻，你會發現當你說出負面字眼時，你的抵抗指已足夠軟弱，可以被測試指壓下去，這就表示你找到你抵抗指的調光器／肌肉力量設定了。一出現這樣的狀況，請運用抵抗指的這個力量設定，然後說一個正面字眼，例如「是」或「愛」，並馬上再測試一次，這時呈現的結果應該是強壯有力的，亦即抵抗指不會被壓下去。


    這個自我測試法的關鍵在於拿捏抵抗指需要的力道，好讓它在你說出「愛」這樣的正面字眼時，呈現強而有力的狀態；在你說出「憎恨」之類的負面字眼時，變得軟弱無力。就這樣而已，真的。


    有些人很容易就能學會自我測試。這種類型的測試法最困難的地方在於它的「主觀性」。人往往會質疑自我測試得來的每個答案，但你就是必須相信自己，相信答案的來處——你的潛意識。


    我發現自我測試是個無價之寶，雖然需要花時間練習，而且一開始似乎怎麼都學不會，但只要能堅持下去，我相信最後也會同意這是個無價之寶。


    # 單指測試法


    如果你想用單手測試法，但不是用一隻手，而是兩隻，那看起來會像接下來要介紹的這個方法。


    如果你是右撇子，請以左手握拳，並將左手食指直直伸出。這根食指會是你的抵抗指，也就是接受測試的手指。


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_155_0.png)


    把你的右手放在拳頭上，穩穩握住，並將右手小指頭的最後一個指節放在伸出的左手食指上任何一個你覺得舒服的位置（右手小指頭是測試指）。如果你是左撇子，將左手右手位置對調即可。


    手指擺在正確位置後，你可以按照之前提過的單手測試法步驟開始測試。為了方便起見，我再說明一次執行步驟：


    先將抵抗指的肌肉力量調到最大，然後說出「不」或「憎恨」，再以測試指將抵抗指往下壓。你會發現抵抗指的力量被調到最強時，即使說出負面字眼，它依然不會被壓下去。


    現在稍微調降抵抗指的力量，然後重複那個負面字眼（說「不」或「憎恨」都可以，但要統一）。接著再將抵抗指的肌肉張力往下調，重複負面字眼，再試一次。


    在反覆試驗的過程中，你會在某個時間點發現，當你說出負面字眼時，你的抵抗指已足夠軟弱，可以被測試壓下去，這就表示你找到你抵抗指的調光器／肌肉力量設定了。一旦成功，請運用抵抗指的這個力量設定，然後說一個正面字眼，例如「是」或「愛」，並馬上再測試一次，這時呈現的結果應該是強壯有力的，亦即抵抗指不會被壓下去。


    # 單環測試法


    以一隻手的食指指尖碰觸拇指指尖，做出OK的手勢。再將另外一隻手的拇指、食指和中指放入OK手勢的圓圈裡。圈內的手指是測試指，形成圓圈的那兩根手指則是抵抗指。


    依照我在前兩個方法所述的步驟，透過程復說出負面字眼或不符合真相的陳述句，慢慢找出抵抗指的恰當力道。說陳述句時，利用圓圈內的手指往外推，試著讓形成圓圈的指頭分開。形成圓圈的那兩根手指則負責抵抗，保持圓圈不被破壞。當你說出負面或不符合真相的陳述句，手指肌肉是弱的，而說出正面或與真相一致的陳述句，手指肌肉是有力的時，就表示你做對了，你已經找出抵抗指的恰當力道了。


    # 雙環測試法


    用一隻手的拇指與食指做出一個環，再用另一隻手的拇指與食指做出另一個環，然後將兩個環連結在一起，好像鎖鏈一般。形成其中一個環的拇指與食指擔任抵抗指的角色。再次運用負面或不符合真相的陳述句，慢慢調整抵抗指的力量，直到找出恰當力道為止。說陳述句時，試著將雙環拉分開（由擔任測試指的那個環負責拉）。記住，你只是要找出當你說出負面或不符合真相的陳述句時雙環會被拉開，說出正面或與真相一致的陳述句時雙環保持連結的恰當力道。


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_157_0.png)


    # 找到適合自己的測試法


    來參加我講座的人，約有百分之八十可以馬上成功運用至少一種我在本章介紹的自我測試法，我衷心建議大家好好練習。


    千萬別放棄！雖然有些人看似立刻就會學會這些自我測試法，但多數人還是得練習。請堅持一下，就像小時候學騎單車一樣，不久以後，這件事就會變成你的第二天性了。


    如果其中某種測試法讓你覺得比較舒服或自然，就好好練習它。練習時只用「是／不是」或「愛／恨」這些很明確是正面或負面的字眼，你會更快精通這項技巧。使用情緒密碼不是非得學會自我測試不可，但精通任何一項自我測試法會讓你執行起來更容易、更有效率。


    當然，最簡單的自我測試法是搖擺測試，大部分人不需要花太多時間練習就可以學會。搖擺測試僅有的幾個缺點是使用時必須站著，以及相較於其他自我測試法，它花的時間多一點，因為你必須給身體一些時間去擺動，不能強迫它。


    精通自我測試後，我馬上看見其中的好處。比方說，面對暫時無法被測試的患者，我不再需要另一個人幫我測試，我可以在自己身上為病人測試。此外，我也可以檢查自己有沒有受困情緒和其他不平衡的地方，然後自行矯正、釋放。自我測試給了我一個非常快速、有效率而簡單的方法，以得到我正在尋找的答案。


    > 測試時覺得不舒服，請立刻停止！


    做這些測試時如果感覺到任何一絲不適，就換另一種方法。覺得不舒服或疼痛就表示你用的力氣太大了，假如你忽視不舒服的感覺，繼續測試下去，可能會讓自己受傷，或是導致身體組織發炎。


    理想狀態是，無論何種測試法，你都應該用最少的肌力就能分辨強弱。第一次學習這些肌肉測試時，我也是用了太多力氣，導致手指痠痛不已。最後我才發現，使用的力道只要足以撐住我的抵抗指即可。這些自我測試法在不同的抵抗力道上都有用，但抵抗力愈大，你就愈容易感到疲勞，手指也愈容易痠痛。如果在執行任何一項測試時覺得不舒服，請立即停止，改用另一種測試法，直到痠痛消失，並且試著不要用太多力量抵抗。


    # 肌肉測試是直覺的輔助輪


    運用情緒密碼很長一段時間後，你可能會開始注意到一個奇怪的現象——在你透過肌肉測試得到答案之前的那一瞬間，答案會突然出現在你腦袋裡，好像有個小小的聲音正在對你低語。一開始，這個聲音也許細微到讓你忽略了它。


    你可能不習慣聽從這個小小的聲音，但你也許會發現自己正說著：「我知道那就是答案。」正當你要開始測試時，你會馬上感覺到、知道答案是什麼。這份直覺來自宇宙意識的資料庫，來自圍繞著我們所有人的智慧與能量之海。


    對你的直覺而言，肌肉測試就像輔助輪。


    當你愈來愈善於聽從直覺時，你會發現自己可以藉由傾聽直覺得知答案。你就是感覺得到。愈是留心這些細微的提示，你就愈能找出問題的答案。


    # ★療癒時的溝通不一定要透過語言


    療癒者和療癒對象之間的溝通並不一定要透過語言，我自己許多年前就有過這樣的經驗。那時我習慣用「腿長測試」來評估病人的狀況，多年來都用得很順手。要學會並精通腿長測試必須花比較多時間，我在這裡就省略不提，有興趣的人可以上我建立的網站學習：HealersLibrary.com。


    腿長測試其實是另一種形式的肌肉測試，只不過身體是透過腿長變化而非肌力變化提供答案。我很快就知道，運用這種測試法，身體很容易便會給我答案，就和其他測試法一樣。因此，腿長測試成了我從病人身體獲取答案的主要方法。事實上，多年來我在治療大部分患者時，第一件事就是請他們臉朝下趴著，然後透過是非題提問，病人的身體會藉由腿長變化給出答案。如果答案為「是」，雙腿長度就會一致；假如答案為「否」，病人的雙腿就會不一樣長。我每次測試都見效，直到有一天發生了一件有趣的事。


    當時我正在診療一名患者，快要結束時，我雙眼往下檢查他的腿長，發現他兩條腿的長度完美平衡。然後，我將視線上移，看著他的背部，並且閒閒地將注意力轉到他右邊的腎臟，關注了一會兒。接著，我再次檢查他的腿長，突然發現他雙腿的長度居然不一樣。我放鬆自己，然後視線上移，這次則將注意力放在他左邊的腎臟。之後，我又檢查他的腿長，發現兩條腿的長度是均衡的。


    我再次想著他的右臂，想了一會兒，之後又檢查腿部長度，發現雙腿明顯不一樣長，讓我驚詫不已！如同你可以想像的，這名患者的右臂確實出了問題。事實上，他身體的那個區域有個受困情緒，導致右臂不平衡。釋放那個受困情緒後，即使我想著他的右臂，他的腿長也不會發生變化了，因為讓那顆腎臟失衡的因素已經不存在了。


    這次的經驗讓我頓悟，我立刻將這份知識運用在其他病人身上。從那時起，默默對身體發問成了我的標準程序，而結果就跟以前一樣，差別在於過去我是想著問題並且說出來，現在只要在心裡想著要提出的問題就可以了。


    多年來，我運用這種測試方法都沒有任何問題。我與患者之間似乎有一種連結，讓我們不必透過語言就可以溝通無礙。


    我發現，任何我可以大聲問出來的問題，都能在心裡默默地問，結果會是一樣的。


    順道一提，非語言溝通適用於任何一種測試法，無論是搖擺測試、按壓手臂肌肉測試，或是我見過的其他每一種測試法都可以。


    受試者只要在心中想著自己的陳述句，測試結果會跟說出來一致。同樣地，執行測試的人可以想著要問受試者的問題就好，得出的結果也會跟把問題說出來一致。


    我在執行這種非語言測試時一直都沒碰到什麼問題，直到下面這名患者幫助我學會重要的一課。


    # 負面事物對測試結果的影響


    幾個月前，比爾因為下背痛來找我。他治療的狀況一直很不錯，而這一天，他來做例行檢查。他臉朝下躺在我的診療檯上，以方便我為他執行腿長測試。我將注意力放在他身上，心裡想著：「給我一個肯定的答案。」然後檢查他的腿部長度，結果是均衡的。接著我又想：「給我一個否定的答案。」並再次檢查他的腿長，但令我驚訝的是，他的兩腿長度依舊均衡，沒有變化。這非常奇怪，我用這個測試法已經超過十年了，從未見過這種情況。他的腿長理應有所變化，卻完全沒有。我實在不明白為什麼在他身上行不通。


    我重複執行整個程序好幾次，依舊沒有任何變化，讓我著實大惑不解。我從他的腳一路往上看，看了一會兒，然後注意到他背上的東西。他身穿一件白色 T 恤，衣服背面有個圖案，是一張邪惡的小丑臉，血從小丑的尖牙上滴落，模樣怪嚇人的。


    我直覺地拿張紙把那個小丑圖案蓋起來，接著再次檢查比爾的腿長，測試結果突然恢復正常了。老實說，我大感驚奇。我拿掉紙張，讓小丑圖案露出來，再次測試，結果比爾的腿長又沒有任何變化了。我又把小丑圖案用紙遮起來，比爾便呈現可接受測試的狀態。重點是，從開始測試到現在，我和比爾之間沒有任何言語交流。


    幾次把紙張拿起再放下，每次的結果都一樣，我終於把剛剛發生的事告訴比爾。我對他說：「我認爲你 T 恤背面的小丑圖案對你有負面影響，你還是把這件 T 恤丟掉比較好。」從此之後，他再也沒有出現在我的診間。


    # ## 影響。


    存在的一切事物都會發出振動能量，那能量最終會影響我們自己的能量場，無論是好影響或壞影響。


    有些事物帶有較爲正面的影響，有些則是負面的。舉例來說，如果你注視著希特勒的照片，你很可能會在肌肉測試中呈現軟弱的肌力，或者在搖擺測試中身體往後傾，遠離他的照片，以及那張照片暗示的負面性；假如你看著德蕾莎修女的照片，你很可能會在肌肉測試中呈現強壯的肌力，或者在搖擺測試中身體向前傾，接近她的照片，以及她的能量擁有的正面性。若你凝視一幅描繪美麗鄉村景色的圖畫，這幅畫發出的正面振動能量對你會有正面影響；另一方面，一幅描繪墮落、邪惡場景的畫，會以非常低的頻率振動，讓你的身體出現排斥反應。我相信是物體本身發出這些或正面或負面的頻率，而我們的個人價值觀和心理聯想也起了些作用。


    以下這個測試將讓你了解正面事物和負面事物如何影響你的能量。請看著上面這個簡單的圖案。


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_164_0.png)


    從某個方向看過去，它是一張積極正面的笑臉；假如倒過來看，它就變成一張充滿負面性的愁眉苦臉。凝視正面笑臉的圖案時，你會發現自己在肌肉測試中呈現強壯的肌力，或者在搖擺測試中身體往前傾；若將圖片倒過來，你在搖擺測試中身體會向後傾，或者在肌肉測試中呈現軟弱的肌力。別只聽我說，自己試一試，看看結果如何。


    心智將記錄事物的工作做得很好，而且你通常可以在心智不須休息的情況下清除受困情緒。但有些時候，巨量的互連資料，以及釋放受困情緒後必須進行的連結與再連結，會讓心智不堪負荷。


    我稱這種現象為「超載」，它會讓一個人的肌肉測試呈現「軟弱無力」的結果，無論你怎麼做。這種情況是暫時的，通常不會持續超過三十秒。


    在很罕見的情況下（通常是受試者有特別嚴重的受困情緒），我也遇過病人的超載狀態持續數小時，甚至一整天。但大多數時候，你只要給受試者一分鐘左右，他的心智就能完成處理程序，然後他又可以接受測試了。


    為了說明，請想像下面這個場景：你發現自己半夜坐在車裡，車頭燈打開，但引擎熄火，車子發不動。你轉動鑰匙試圖發動汽車，引擎卻一直空轉，發出「噗噗噗噗……噗噗噗噗……噗噗噗……」的聲音。你注意到，當引擎空轉時，車頭燈就會變暗。這就類似超載時身體裡發生的事。當心智激烈空轉，忙著處理你剛剛做過的事情時，可以用來做肌肉測試的能量就會變少。


    # 肌肉測試疑難排解


    ## 受試者的肌肉測試突然一直呈現「軟弱無力」的結果


    ## 無論怎麼做，受試者的肌肉測試都呈現「強壯」的結果


