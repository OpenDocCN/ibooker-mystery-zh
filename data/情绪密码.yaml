    # 情緒密碼 074


    感受到那種情緒。

    你可以把受困情緒想成一顆一顆的能量球,因為它們就是。即使只由能量組成,且不為肉眼所見,它們還是有各自的尺寸和形狀——大小從柳橙到甜瓜都有可能。

    被困住的情緒能量總是會滯留在我們體內的某一處,而位在它範圍內的身體組織往往會和那個受困的情緒能量共振;也就是說,那些身體組織會持續感受到那個情緒振動。


    假設你有個受困多年的憤怒情緒,而你毫不知情。結果,每當你碰到一個可能會讓你生氣的狀況時,有很大的機率你一定會生氣,因為——雖然聽來不可思議——有一部分的你已經生氣了。


    如果你身體的某個部分已經因為受困情緒而以憤怒的頻率振動著,那麼,當發生一件可能引發你憤怒反應的事情時,你整個人會更容易與憤怒共振。


    有時候,人們不了解為什麼自己這麼容易被惹毛,或者為何無法擺脫某些情緒。背後的原因很有可能是:他們正在與之搏鬥的那個情緒,因為他們幾乎不記得的某個過往經驗而被困在體內。


    這就是為什麼釋放受困情緒總能帶來其他療法遠不能及的成效。很多時候,那些難以擺脫的情緒和行為就這麼消失了。


    這似乎簡單到令人難以置信,然而,一旦親自體驗過,你就會明白了。在你釋放自己的受困情緒之前,你會一直背負著它們費力前進。'
