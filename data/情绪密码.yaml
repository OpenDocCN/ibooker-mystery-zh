    # 按壓手臂肌肉測試的施作訣竅


    這裡提供幾個訣竅，幫助你改進並精通這項肌肉測試技巧。


    1. 別太用力，使用足夠得到答案的力道即可。重點在於手法的巧妙，而非力量的強弱。

    2. 花三秒鐘穩定增加力道，從完全不施力到確定答案為何。

    3. 將你的手指放在正確位置。如果把手指放在受試者的腕骨上，他的身體會為了避免腕骨受傷，而讓手臂疲軟。你的手指應該放在略高於小指沿線腕骨凸起處的位置，即尺骨莖突上面一點的地方（見第146頁圖）。

    4. 請確定受試者有意願接受測試。受試者如果抱持質疑或憤世嫉俗的態度，會讓測試變得比較難以進行。人生苦短，別將時間花在不願意敞開心胸接受幫助的人身上。

