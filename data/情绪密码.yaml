    # 為何怕者恆怕？


    這一切都得要回到身體的量子本質來探討。每天早上起床時，我們都預期自己的身體應該和昨天、前天看起來一模一樣。它們看著是實心的，我們也能充分預料其應有的模樣。我們從來不會在穿衣服照鏡子時，看到手腳變成旋轉的能量團，但說實話，那才是我們的真實樣貌。


    無論在你眼中是什麼樣子，你的身體實際上是一個以緊密結構流動著的能量集合。


    當你把某個受困情緒的負面振動帶進那個結構時，整體的正常振動頻率就被改變了。


    你不一定感覺得到，當然也沒辦法憑肉眼看出不同，但有其他方法可以分辨。


    記得音叉效應吧？一個停留在你體內的受困情緒會吸引其他同頻率的情緒。例如，若那個受困情緒是恐懼，你會比較容易受驚、害怕。那個能量停留在你體內愈久，你愈容易感覺到它；隨著時間過去，你會開始認為自己就是個滿懷恐懼的人，因為你似乎大部分時間都在擔心、害怕。


