  md: '淤滯的能量。如果你見到尚恩，就會知道他真是我生命中的奇蹟。


    # 是誰的情緒？


    了解受困情緒產生的當下涉及哪些人，有時是有幫助的。比方說，假設你就快要抓到發生在你高中時期的受困情緒——憤恨——了，卻不記得可能導致這個情緒的任何事。


    你也許可以問：「這是我的憤恨嗎？」如果答案是肯定的，你可以問：「這股憤恨是否針對某人？」若答案為「是」，就接著問：「這個某人是一位男性嗎？」「是一位女性嗎？」「是一個朋友嗎？」「是家族成員嗎？」「是我哥哥嗎？」「是喬伊嗎？」像這樣透過刪去法逐漸鎖定可能的目標。


    如果這股憤恨是你的，卻無關某人，你可以詢問它是否與某個狀況有關，接著逐步縮小你的問題範圍，以找出那個狀況是什麼、何時發生等等。


