  md: '找並摧毀外來細菌、毒素及其他入侵者。實驗中，受試者會被接上電極，以測量他身體的電子活動，而他的白血球也會被放在一個高度敏感的儀器中，同樣測量它們的電子活動。受試者及其白血球的電子活動程度都被精密量測。


    此研究中的一位受試者曾經在二戰時期服役於海軍，服役地點是一艘駐紮在太平洋的航空母艦。該戰艦是當時日本神風特攻隊的目標之一，那種自殺式攻擊讓他驚恐不已，有好幾次，他都覺得自己死定了。


