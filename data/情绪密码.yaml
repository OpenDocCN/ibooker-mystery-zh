    # 受困情緒殺死了黛娜·李維？


    我們都記得那個讓演員克里斯多夫·李維四肢癱瘓的悲慘意外，也感動於他的妻子黛娜·李維始終如一的付出，所以聽說她去世時，我們都很震驚、難過。丈夫過世十個月後，黛娜就向世人宣布自己罹患肺癌，並於七個月後撒手人寰，得年四十四歲。


    沒有抽菸習慣的黛娜·李維死於肺癌，一般人覺得她的死要歸因於二手菸，我則不這麼認為。肺臟是製造悲傷情緒的器官，而過度的悲傷無疑會導致受困情緒產生，往往影響到源起的器官。黛娜當然有理由悲傷，而我相信受困情緒，尤其是悲傷，至少是她死亡的部分原因，也許是全部的原因。


    # 怒氣沖天的酒鬼


