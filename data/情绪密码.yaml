    當我們開始針對其他人測試心牆時,發現心牆其實是個非常普遍的問題。在我們的經驗裡,大約八成的人都有心牆;事實上,你很可能就有心牆。'
- md: '# 第3部 情緒密碼這樣用


    不是木頭。那麼是某種金屬嗎？答案為「是」，是某種金屬組成的。我試著縮小範圍，便問道：「這種金屬是鐵嗎？」「不是。」「這種金屬是鋼嗎？」「不是。」我試著問鈦、鋁、銅，以及我說過的其他所有金屬，但答案都是否定的。於是，我改用不同的角度趨近答案。


    「這種金屬比鐵還硬嗎？」「是。」「這種金屬比鋼還硬嗎？」「是。」以這種方式繼續問下去，我逐漸發現這種金屬比我想得出來的所有金屬都堅硬。我有點火大地問道：「構成你心牆的金屬是否比這地球上實際存在的任何金屬都要硬？」喬安身體給出的答案很明確：「是。」


    等一下，這是什麼情況？構成她心牆的金屬怎麼可能比地球上存在的任何金屬都堅硬？


    > 心牆也可能由不存在這世界的東西構成


    我整個腦子都塞滿自己那些真象的問題，以致完全忘記了一個非常重要的事實。心牆是潛意識創造出來的，而在潛意識裡，任何事物都有可能。


    除了數種受困情緒的能量之外，這道牆實際上並非由任何材料組成。也許它對我們而言並不「真實」，但我相信對潛意識來說，儘管是想像出來的，它就跟存在於這個世界的任何事物一樣真實。


    而心牆對身體的實際影響也非常強大。如同我們的思想一樣，心牆的存在會影響到整個身體系統，對我們的健康有直接影響。但要記著，心牆是一種想像出來的構造物，可以由任何東西組成。


    結婚兩年後，喬安的丈夫就開始虐待她。但她最重視的就是保住婚姻，因此她選擇忍氣吞聲，留在這段婚姻裡。


    喬安從小在快樂又平靜的家裡長大，是家人的掌上明珠。根據她的說法，她不記得見過父母爭吵，家中出現憤怒言語的次數屈指可數。


    當她婚姻中的虐待情形愈演愈烈時，她的潛意識拚了命地尋求保護。受困情緒形成了，所以，建造一道牆的原始材料有了。不過，潛意識認爲什麼樣的材料才夠堅固，足以保護她不受丈夫尼克的虐待呢？


    據說潛意識無法像我們（或意識）一樣分辨「真實」與「非真實」。例如，你在觀看一部驚悚片時，你的潛意識「不知道」你並未真正經歷電影中的場景。於是，你的心會狂跳，你的掌心會冒汗，你的腎上腺素會透過血液流竄到全身，然後出現所謂「戰或逃」的反應，彷彿你眼前所見的「現實」就是現實本身。


    基本上，潛意識會將所有來自意識的訊息都當真，無論它是不是真的。回到喬安的故事，她的心牆由金屬構成，但這種金屬比地球上存在的任何金屬都堅硬。


    很久以前，喬安在一部科幻電影裡看過一艘外星太空船。在片中，軍隊向它發射飛彈，煙霧散去後，那艘太空船還是在那裡。即使使用大砲或核子武器攻擊，煙霧消散後，整艘外星太空船依然完好無缺。電影中的科學家大感震驚，那艘太空船是由一種完全陌生的物質打造而成，一種不存在於地球的金屬，而且顯然堅不可摧。


    喬安的潛意識大叫：「太好了，這正是我需要的！」於是，這種來自一部老科幻電影、虛構的陌生金屬成了她心牆的建造材料。


    所以，喬安的心牆是由來自一艘外星太空船、堅不可摧的金屬打造而成。要保護她的心，會有比這個更好的方法嗎？記住，心牆來自深層的想像，來自無意識創造出它來的那個人的潛意識。


    一旦發現喬安的心牆是由何種材料組成，我們便開始釋放她心牆上的受困情緒了。由於喬安依舊與虐待她的丈夫維持著這段婚姻，我們了解到，她的心牆很可能是讓她可以維持與尼克之間婚姻關係的重要因素。


    這道心牆多年來一直保護著她的心，將之移除是對的嗎？對現階段的喬安而言，移除心牆是正確的嗎？她的身體建造出心牆必定有其原因，然而擁有心牆是要付出代價的，其主要代價就是讓你逐漸失去感受的能力。


    我們決定詢問喬安的潛意識，看它覺得釋放構成她心牆的受困情緒好不好，這是唯一安全的做法。


    「我們現在可以從你的心牆上釋放一個受困情緒嗎？」我問道。


    她的身體回答「可以」，開始釋放構成她心牆的受困情緒是沒問題的。事實上，喬安的身體想要它們離開！所以，我們開始透過肌肉測試——找出這些情緒，把它們清掉。


    每釋放一個受困情緒，我們都會再次檢查心牆的厚度（一開始是七呎厚）。


    「心牆還是七呎厚嗎？」

    「不是。」她的身體答道。

    「是六呎厚嗎？」「是。」


    隨著受困情緒被釋放，她的心牆變得愈來愈薄。厚度減少的程度根據每個情緒而有所不同，有時釋放一個情緒可以減少整整一呎的厚度，有時則沒有那麼多，可能減少六吋或更少。此外，以喬安來說，釋放一個受困情緒到釋放下一個情緒之間毋須等待，只要我們一發現受困情緒，就可以立刻釋放它。很顯然，她的潛意識已經準備好將受困情緒一個接一個全部擺脫掉了。


    # 回溯情緒為何受困，找出答案


    每辨識出一個受困情緒，我就會順道測試這個情緒是什麼時候被困住的，這樣問可以幫助喬安把受困情緒與讓她痛苦不堪的特定事件連結起來。我們發現她一直到結婚第二年才有心牆，也就是當日子開始變得很難熬的時候。


    當我們回溯各個受困情緒的由來時，便不難理解喬安為何需要一道堅不可摧的心牆。有個受困情緒源自她丈夫有一次將槍抵在她頭上，並威脅要殺了她；另一個情緒之所以被困住，則是因為她丈夫有一次對她的宗教活動大發雷霆，並在她面前把《聖經》燒了。喬安身體裡總共有九個不同的受困情緒，每一個都和她丈夫尼克的某個極端行徑有關。


    # 拆掉心牆，讓心恢復感受能力


    把喬安的九個受困情緒找出來釋放掉，並完全清除心牆，大概花了三十分鐘。當她的身體告訴我們心牆已經不存在時，喬安靜靜地笑了。


    「你現在感覺如何？」我問她。

    「有點暈，」她說，「不過挺好的……」然後她就回家了，回去那個有尼克在的家。


    生命裡許多充滿喜悅和驚奇的體驗。心牆也一樣。無論它對當時的你有多重要，一旦拆掉心牆，你就可以過著更快樂、與他人有更多連結的生活。有時候，是否清除心牆之間的差異，可以是「活在失望的深淵」對上「從此過著幸福快樂的生活」。


    遇到空襲，躲在防空洞裡是個好主意，但你不會想永遠待在那裡，因為如果那麼做，你會錯過發生令人無法承受的事件時，適當的緊急措施可以救你一命。如同身體的許多防衛機制一樣，心牆是無價的短期安全措施。


    一切？兩週之內，她就上法院遞狀訴請離婚，永遠離開尼克了。


    不受尼克的殘酷對待影響，現在既然沒有了這道保護牆，她已經可以真實地體驗到這一切，便再也難以相信自己竟然跟這樣的人耗了這麼多年。誰能夠忍受這樣的虐待？她有什麼理由再忍受這多年來第一次，喬安真正感覺到她和尼克的這段婚姻裡發生了什麼事。過去她的心牆保護她，從她走進家門那一刻起，她的心突然能夠感覺到尼克加諸她身上的所有冷嘲熱諷，以及各種卑劣、惡毒的行為。


    二十二年來，喬安的心周圍一直有一道穿不透的牆。現在這道牆被拆了。


    # 米蘭達和前男友


    米蘭達的例子非常適合用來說明一個人的心牆如何影響感情生活。三十八歲的米蘭達是個迷人的護士，因為頸部疼痛的問題來找我。做檢查時，米蘭達提到她已經很多年都沒有和任何人約會，也對於和男人發展任何戀愛關係不再感興趣。所以，當測試到她有心牆時，我一點都不驚訝。八年前，米蘭達為了她深愛的男人而心碎。為了保護自己的心不要再次受到那樣的傷害和痛苦，潛意識為她創造出一道心牆。


    米蘭達頸部的症狀已經出現好一段時間。去看門診時，有些醫生告訴她，這可能是慢性病，而且病因不明，但藥物似乎也無法緩解疼痛。在她的案例中，有三個受困情緒滯留在她體內，多年來一直在阻礙她展開新戀情，而她不知道這些受困情緒也是造成她頸部疼痛的主要原因。


    我們一一清除這些情緒。最後我問她的身體，心牆是否已經被釋放了，她的身體說心牆已經完全消失了。


    之後大約三個月，我都沒有再見到米蘭達。當我再次遇見她時，她看起來無比開心。我問她這段日子有什麼變化，她很興奮地告訴我，所有事情都不一樣了！她說她的頸部疼痛早就消失得無影無蹤，但還有比這更棒的事。


    「就在我上一次去找你之後，」米蘭達說，「我碰見我兒時的青梅竹馬。小學畢業後我就沒有再見過他了，他居然就住在我家附近，距離不到一個街區，而且已經住了八年。我們開始約會，而且彼此之間有火花。我們陷入愛河了！我想他很快就會向我求婚。」


    當初來到我的診間抱怨脖子痛，並且誓言不近男色的那個女人已經消失不見了。她現在彷彿換了個人。


    「非常感謝你的幫助。」米蘭達說，「如果你沒有幫我拆除心牆，老實說，我真的不覺得這一切會發生。我以前太自我封閉了。」


    當心牆和受困情緒被釋放之後，人們有時會描述，這就好像他們終於恢復感受能力了。長久以來，他們第一次可以自由地付出愛、接收愛。如此一來，有趣且美好的事就會發生。


    # 我們本該過著充滿愛與喜悅的生活


    這才是我們應該過的生活。我們應該過著健康有活力、充滿愛與喜悅的生活。在所有的情緒中，愛是最純淨的，擁有最高的振動頻率。愛這個最強而有力也最常見的情緒，由心產生，也由心接收。


    當你有心牆時，就無法給出你本來可以給予的愛，因為你心中那股愛的能量無法順利傳遞出去。同時，別人傳送給你的愛在某種程度上也被擋掉了。結果，因為你經歷過的情緒創傷，以及那道潛意識創造出來的心牆，你這一生可能多少會與他人隔絕開來。過往的創傷如此真切，它們造成的痛苦遠超過你當時所能負荷及感受的程度，這正是心牆產生的背景。然而，直到拆除心牆之前，你某種程度上都會為其所困。它將使你較難與他人產生連結，即使是你最愛的人也一樣。


    **移除心牆後，人們的生命，以及其子女、家人的生命都會徹底改變。**


    大約三成的人可以明顯且立即感受到釋放心牆帶來的效應，但多數人的改變是微妙且漸進的，以一種他們自己也無法馬上察覺的方式進行著。


    # 寶拉和她叛逆的兒子


    有一天，寶拉帶著她十七歲的兒子瑞克來到我的診間。寶拉說瑞克有憤怒相關的情緒問題，而且最近和一些狐群狗黨廝混，成績因此一落千丈，讓她不免擔心孩子可能會染上毒癮。她聽說我們藉由釋放受困情緒進行療癒，因此想了解她兒子的憤怒是否與受困情緒有關。


    我為眼前這位沉默的憤青測試，發現他有一道心牆。而當我接著測試他母親時，毫不意外地發現她也有心牆。


    很快地，我就發現瑞克不是唯一受憤怒所苦的人，他母親心中也充滿對前夫——也就是瑞克父親——的憤怒與怨恨。她神情冷酷，下巴緊繃，露出氣憤與決然的表情。


    我們用了五個療程替瑞克拆除心牆，每次療程大約十分鐘。有時一個療程可以釋放兩個情緒，但多數時候只能釋放一個。瑞克心牆上的受困情緒大多與他的父親有關，因為過去幾年，瑞克一直覺得被父親拋棄。父母離異對他而言是非常難以承受的事，也因此不免會有憤怒、挫折感、怨恨、自卑感等受困情緒。


    整個療癒過程一結束，瑞克便開始改變。有趣的是，他連髮型都變了。記得最初見到瑞克時，他留著橘色的龐克頭，那是一種反抗叛逆的表現；而現在，他已經不再需要宣洩憤怒與怨恨，因此髮型也換回一般造型。不僅如此，他的成績也進步了許多。其實他一直是個聰明的孩子，之前的脫序行為是因為心牆上的受困情緒及長期累積的壓力所致。


    在我們釋放他的心牆之前，瑞克一想到父親，心中就會迸發一陣狂怒；心牆清除之後，瑞克才能平心靜氣地面對父親，甚至願意花些時間陪伴他。既然一觸即發的憤怒已經是過去的事，瑞克現在整個人變得快樂許多，也更有衝勁。在釋放心牆之後，他便拿回了自己的人生。


    我永遠不會忘記最後一次看到瑞克時的情景，他完全變了。他和分享最近與父親一起去釣魚旅行的經過，臉上洋溢著無法抑制的笑容。他們的父子關係變得完全不一樣了。


    較令人好奇的是，我們清除他母親的心牆之後，她似乎沒有感覺到任何變化。兩個月後，寶拉回到我的診所抱怨道：「這是怎麼回事？瑞克彷彿完全變了個人，我幾乎認不得他了，但我怎麼覺得自己跟以前沒有什麼不一樣？」


    我向她說明，心牆被拆除後通常需要一段時間才能感受到變化，並讓生命裡的大小事重新洗牌歸位。此外，移除心牆後，身體必須經歷一段療癒過程，這可能會花一些時間。


    我不知道她當時有沒有聽進去，我想她可能對自己的生活沒能像兒子瑞克一樣有戲劇性的變化而感到失望。之後好一陣子，我都沒再見到他們母子倆，偶爾想起，總會好奇他們過得如何。


    約莫一年後，我在橘郡一家高檔百貨公司遇見寶菈，她馬上認出我來，並等著看我是否也能認出她。她看起來很眼熟，但我真的不知道眼前的女士是誰。在聊天時，我才慢慢想起她是誰，但她變得完全不一樣了，讓我幾乎認不出來。她的臉龐散發喜悅的光彩，神情煥然一新。自從我們最後一次見面後，她不僅在這家百貨公司找到一份好工作，也遇到了一個好男人，幸福地走入婚姻之中。


    在聊天的過程裡，我也得知瑞克無論在學校或生活上都過得很充實順利。我提醒寶菈一年前我們談到心牆時的對話。


    她露齒而笑：「我不知道這是否和移除心牆有關係，但我的生活跟一年前比起來已經好太多了，好到我自己都不敢相信！」


    向寶菈道別後，我想起一年前的她有多憤怒、多不快樂，然後不禁好奇：如果當時沒有清除她的心牆，現在她不知道會過著什麼樣的生活。


    # 小小孩子的心牆


    很遺憾，在這個世界上，就連小孩子往往也有心牆。想想看，年幼孩子的心是何等柔軟、何等敞開。他們如此無助，且完全相信人，但有太多時候，他們會成為大人暴虐言行和不當管教的犧牲品，甚至有些性情殘暴的孩子也會扮演加害者的角色。面對這種遭遇的小孩往往會有心牆。


    有時候，即使身處一個甜蜜美滿的家庭裡，生命依舊可能充滿挑戰。下面這封信是一位女士寫給我的，她兒子被醫生診斷出罹患憂鬱症。因為親眼看見好友死亡，他產生了一個受困情緒，而為了避免自己可憐幼小的心完全破碎，心牆就這麼形成了。


    # 九歲男孩的憂鬱


    > 親愛的尼爾森醫師：

    >

    > 幾週前，我帶著九歲的兒子去見你。這陣子以來，他一直表現出不太尋常的行為。他食不下嚥，夜不能寢，注意力渙散，且整個人變得很憤怒、負面和悲觀。上學更不用說了，簡直是惡夢一場。我們用盡各種方法，無論敦促、責罰、獎賞、賄賂，他就是不願意完成學校作業；即使好不容易完成了，他也不願意把作業交給老師。我知道他是個聰明的小孩，但因為不願意繳交作業，導致學校成績一塌糊塗。

    >

    > 我帶他去找小兒科醫師，接著被轉診到一位小兒神經科醫師那裡，然後又去給一位心理醫師做進一步的評估，而他們的結論是：我兒子有憂鬱症。（兩年前，我兒子一位非常要好的朋友溺水死亡，當時他正好目睹這一切；十個月後，他又參加了表哥的喪禮；之後半年內，陸續又有四位親人過世。我相信這一切都讓他非常痛苦。我試著協助他處理這些事帶給他的打擊，但顯然沒什麼效果。）

    >

    > 我帶他去見你時，你測試出他有一道「心牆」，造成他情緒上的不平衡。然後，你用磁鐵一一移除他心牆上的負面情緒。我雖然不了解這種療法的科學面，但我相信這會是我兒子日趨嚴重問題的解藥。在你幫他治療後的幾天，他都呈現昏昏欲睡的狀態，但接下來幾週，他行為上的改變實在令人難以置信！

