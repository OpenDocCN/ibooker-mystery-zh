    我相信每個人一生中一定都有過被自己的負面情緒搞得昏天黑地、不可自拔的時候，甚至說'
- md: '## 情緒密碼 022


    出或做出一些讓人事後懊悔或不解的事。我自己就因為在原生家庭和親密關係中受到的挫折，踏上了療癒的尋覓之旅。


    然而，在參加大大小小的工作坊和講座當下往往感到興奮無比，吶喊著我的人生就要大翻轉了，一回到原來的環境，無法控制的不耐煩和實相裡的問題就會原封不動地依循舊有模式爆發，總是讓我備感挫折，期間也一度放棄這些靈性及心理諮商的疏導理論。


    說句心底話，剛接觸本書介紹的療癒方式時，我也是半信半疑，實在是因為被這種能量療癒術呼攏過太多次了。當時只能透過國外網站得知相關訊息和電子書，推廣者還是一位阿兜仔醫生。用一塊磁鐵就可以解決你生命裡的許多難題，這可能嗎？直到經過一段時間的清理以後，我才猛然發現，好像有些生命中的議題確實消失了，其中當屬肩膀肌肉痠痛和生理痛的消失最為明顯。


    我想說的是，如果你也有過情緒或生理上的問題，如果也像我一樣看過各式各樣教你如何在靈性上成長，或是別被情緒綁架的書籍，卻徒勞無功，那我想要鼓勵你給自己最後一次機會，再試一次！因為你一旦試過這套療癒術，你就會知道它真實到你無法否認。


    起步的肌肉測試也許會有些難，我自己就屬於那種花了小半年才學會肌肉測試的地才。但請不要灰心，持之以恆，就一定會看到成效，而且人人都學得會。


    在這裡也要特別感謝我的夥伴，亦即本書的共同譯者陳威廷。要是沒有他在前幾個月不斷鼓勵我，每週協助我清理，我現在大概還在不穩定的肌肉測試中苦苦掙扎。


