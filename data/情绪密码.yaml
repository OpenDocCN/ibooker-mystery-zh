  md: '# 第9章 運用情緒密碼療癒動物


    > 動物的溝通能力毫不遜色，只不過大多時候都被人忽略。

    ——愛麗絲·華克


    # *動物也會有受困情緒


    所有喜愛動物的人都會告訴你，動物也有感覺。也許牠們不會說話，但如果透過行爲去認識牠們，久而久之就會了解牠們情緒上的細微變化。即使不透過語言，動物也能清楚表達自己的情緒。當發生會擾亂情緒的事件時，動物也和人一樣，可能會被受困情緒影響。


    我第一次爲動物釋放受困情緒其實是個意外。某天，我接到一位名叫琳達的患者打來的電話。她是個動物訓練師，大概一年前來找我治療過。當時她氣喘挺嚴重的，不過這通電話與此事一點關係都沒有。'
