  md: '# 對自己有點耐心


    有些人輕而易舉就能掌握這些技巧，有些人則要花比較多時間。我向你保證，如果你堅持不懈，這些技巧對你來說會變得很簡單，而且會為你打開一整個療癒世界。


    當第一次有人看著你的雙眼，熱淚盈眶地為你所做的事向你道謝時，你就會明白我的意思。沒有什麼比助人的感覺更令人著迷的了。那感覺棒透了！雖然不是每次都會發生，但只要抱著盡可能幫助他人的心，那種美妙的感覺就一定會出現。


    # 建立測試基準


    因為每個人都不一樣，所以在進行肌肉測試前，先建立每個人的基準是很重要的，這樣你才知道他們做出符合真相或不符合真相的陳述時，個人的肌肉感覺起來是怎樣。


    最簡單的方法就是請他們說出一個已知為真的陳述句，然後再說出一個已知是虛假的陳述句。例如讓他們說出自己的名字，之後再請他們宣稱某人的名字是自己的名字；或者，請他們說出「是」或「愛」之類的正面字眼，之後再請他們說出「不」或「恨」等負面字眼。'
