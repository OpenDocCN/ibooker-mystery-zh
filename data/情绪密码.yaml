    每天有源源不絕的人上門求診，讓我很容易測試這些磁鐵的療效。有時，其結果讓人無法解釋，甚至有點不可思議。比方說，我有個病人把磁力鞋墊置入鞋內，結果長期的肩膀問題立刻消失了；在四個不同的場合中，我只是把一塊磁力墊放在病人的胸口，就中止了他們的急性氣喘發作；我看過患者身體表面上放了一塊磁鐵，過敏就迅速而戲劇性地改善了；我還見過瘀傷幾乎在一夜之間就不見，骨折只花了正常的一半時間就痊癒了。


    在許多病例中，我開始要求某些病人穿戴磁鐵，作為治療方案的一部分，因為他們的復元時間似乎大幅縮短了。


    ### 驚人的軟骨再生案例


    我有個患者椎間盤凸出八公釐,但拒絕接受醫生建議的手術。她來找我時,右腿已經因為神經壓迫而完全喪失感覺了。在椎間盤損傷處穿戴一塊磁鐵二十四小時後,隨著療癒過程展開,她之前麻木的右腿開始出現尖銳的刺痛感;不到一週,她就可以停止服用止痛藥了。她一直把磁鐵穿戴在背上,疼痛和發炎現象持續減少,直至完全消失。一年後,她的放射科醫師覺得很困惑,因為在她新的斷層掃描影像中完全找不到椎間盤凸出的跡象。


    請注意,這些案例都使用了特別設計來用在身體上,以緩解不適、促進療癒的磁鐵。


    我見過最驚人的療癒經驗之一,發生在我叔叔羅威身上。一九三七年,羅威叔叔還是個年輕小夥子時,右膝受了傷。醫生建議他開刀,但不保證一定有幫助。他決定不接受手術,因為成功機率只有一半。所以,打從有記憶以來,我總是看到叔叔的右膝纏著彈性繃帶;後來才知道,他因為膝蓋舊傷,經年飽受疼痛的困擾。一九九五年,有個朋友介紹他磁療法。這位朋友堅持羅威叔叔應該在膝蓋上放兩塊磁鐵,至少放十天。這兩塊迷你磁鐵跟銀幣差不多大,羅威叔叔雖然很懷疑這樣做會有效果,但覺得反正沒什麼損失,就試試看吧。


    五天後,他沒有感受到任何變化,甚至七天後依舊毫無動靜。終於在第十天,一件戲劇性的事情發生了——他驚訝地發現自己的右膝不痛了，這是六十年來第一次。羅威叔叔欣喜若狂，幾乎不敢相信這是真的。接下來兩個月，他日夜都穿戴著磁鐵，而疼痛沒有再復發。那時，他決定讓自己的膝蓋照
    X 光，以便與三年前照的 X 光片比較。舊的 X 光片顯示他膝關節的軟骨幾乎磨光，相銜合的兩根骨頭末端都碰在一起了。


    然而，新的 X 光片顯示他膝蓋的軟骨不知怎麼地重新長出來了，這讓他的醫生十分驚訝。這種軟骨自然再生的現象，在醫學上被認為是不可能的，但它真的發生了。


    這些運用磁鐵的驚人成功案例迫使我敞開心胸，接受一種新的思考方式，接受我之前從沒學過的東西。但我知道，很多人也有同樣的問題。


    醫學史上大多數的進展都來自想像力的躍進。當人們發現新的治療方法時，舊療法就會被拋棄，讓位給更有效的治療方式。這通常是一段漫長而艱辛的過程，因為一路上沒有任何指引，只能試誤。


    身為人類，我們已經擁有肉體數千年，但因為肉體並未附帶「使用手冊」，我們已經花了許多時間，試圖弄清楚人體的運作機制，以及如何使它運作得更順暢。


    ### * 磁鐵可以放大療癒意念


    由於你是能量構成的,想要真正療癒,必須針對你這一方面的特質。而受困情緒本身也是能量,因此,釋放受困情緒最有效的方法,就是使用另一種能量。


    雖然過去有些療法是錯的，而且已經被拋棄,但有不少古老的療癒方法和觀念一直都是正確的,且現在又重獲關注了。愈了解人體的真實本質,我們愈能做出更有利於自身健康的決定。


    是人體免疫系統的一個重要部分,所以現在的醫生比較不願意切除病人的扁桃腺。這是醫學進步的跡象。那時人們認為扁桃腺無關緊要,也沒有人真正知道它有什麼作用。最後大家才了解,扁桃腺是人類免疫系統的一個重要部分。比方說,在我小時候,切除扁桃腺被認為是無害的手術。一項研究指出,一九六○年從軍的年輕人,有高達百分之四十接受過扁桃腺切除術。


    一旦對人體運作方式有新的了解,眾人認可的醫療標準做法即使立意再良善,也往往會被拋棄。從前,人們認為疾病是「血液敗壞」引起的,所以從古代到十九世紀晚期,放血都是非常流行的療法,直到更先進的醫療技術出現才終於被拋棄。


    ## 運用針灸系統


    意念是一種強大的思想能量，單單運用意念的力量，就有可能釋放被困住的情緒。我認為，想要釋放受困情緒的意念是整個療癒過程最重要的一環。我之所以使用磁鐵，是因為我相信磁鐵真的會放大意念的力量，釋放受困情緒。如同放大鏡可以放大圖像，我認為磁鐵實際上也會放大你的思想能量和意念。這使得任何人都有可能釋放受困情緒，你不必是個有天賦或有經驗的療癒者才能做到。如果你的意念很清楚，你要做的只是運用一塊簡單的磁鐵來放大自己的意念，以取得過去只有資深療癒者才能得到的結果。


    一塊簡單的磁鐵可以有效增加意念的能量，並將它帶進人體的能量場。而針灸系統提供了完美的通道，讓你將意念的能量導入體內，釋放受困情緒。


    針灸療法是以「人體能量場存在」這一點爲基礎，而且已經有數千年的歷史。事實上，世上已知最古老的醫書、著於大約公元前三五〇〇年的《黃帝內經》就已提到針灸穴位和經絡了。所謂穴位，指的是人體經絡上的一些特定位置。至於經絡，你可以把它們想成在皮膚底下流動的能量小河。經絡循行的路線十分明確，且不會因人而異。


    ### 督脈


    經絡存在與否, 多年來一直有爭議, 但最近三十年, 許多研究已經證實其存在。在一項研究中, 醫學博士尚一克勞德・達洛斯分別將一種叫鎘一99的放射性同位素注射到人體的穴位和非穴位處。這種放射性同位素會發出低強度輻射,
    可以被精準測量到, 並畫出其移動軌跡。被注射到穴位的放射性同位素往外擴散的軌跡, 和古時候中醫描繪的經絡圖一致; 相較之下, 被注射到非穴位處的同一種放射性物質則並未沿著特定路徑擴散。


    ### 督脈是釋放受困情緒的完美通道


    某些經絡扮演能量儲存的角色, 負責連結其他經絡並提供能量, 其中最重要的, 當屬督脈。督脈始於上唇中心點, 往上經過頭頂, 然後沿著脊椎中線往下，直到尾椎。由於督脈和其他所有經絡相連，最適合作為利用情緒密碼釋放受困情緒的通道。受困情緒是能量，想要將之移除，必須用另一種能量取勝，而督脈為這個目的提供了一個進入人體的完美入口。


    記住，磁鐵可以放大你的意念（亦即能量），當你抱著想要釋放你找到的受困情緒的意念時，只要用磁鐵滑過督脈就可以了。這個被放大的釋放受困情緒意念會進入督脈，然後很快地從這裡流進身體其他所有經絡和部位。這股突然流入的意念能量具有永久釋放受困情緒的效果。


    我行醫和教授情緒密碼多年，從未見過有受困情緒回來的。受困情緒一旦釋放，就永遠消失了。你不必知道穴位，不必了解這一切究竟如何運作，真的。你要做的，只是擁有一點信心和意念，就成了。但另一方面，對背後的運作機制有些了解，會增加你對這個過程的信心，進而提升你的療癒能力。


    ## 受困情緒去哪裡了？


    為了說明受困情緒如何離開身體，讓我做個比喻。現在有許多公司在製造可以抵銷背景噪音的特殊耳機，這種耳機可以讓用吹葉機清除樹葉的人或建築工人工作起來比較舒服，因為它能夠抵銷工作時使用的機器發出的響亮噪音。另一個普遍使用消除噪音耳機的職業是飛行員，因為飛機引擎持續發出的嗡嗡聲已經被證明很容易讓人疲勞。消除噪音耳機可以偵測外面進來的聲波頻率，並立即產生相位相反的聲波。當這兩種聲波碰在一起，就會互相抵銷，讓人們的耳根變得清淨多了。


    我相信釋放受困情緒也是類似的道理。每個受困情緒都有其特定的振動頻率，而就像相位相反的聲波可以抵銷外來噪音一般，你被放大的意念能量也能抵銷受困情緒的「噪音」。當你用磁鐵滑過督脈時，你實際上是以放大意念的形式創造了一股相反的能量流，然後受困情緒就被抵銷了。它就這麼消散了、消失了，如同飛機引擎的噪音一樣。


    另一個你也許比較熟悉的例子是信用卡。信用卡背面的磁條被編寫了特定資訊，如果把磁鐵放在上面，可能會消除那些資訊，這張信用卡就沒用了。釋放受困情緒的狀況很類似。當你用磁鐵順著督脈往下滑時，被編碼的情緒能量會被迅速且輕易地消除，而且是永遠消失。


    一般來說，磁鐵很安全，但有些情況下還是不應該使用，或者必須有醫生許可才能使用，例如懷孕、使用植入式止痛輸液幫浦或胰島素幫浦、植入人工電子耳，以及安裝心律調節器等。


