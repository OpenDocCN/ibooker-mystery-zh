    # 快速解決方案只是治標不治本


    在多年的執業生涯裡，我第一手目睹身體有一套內建的自我療癒能力，這是身體天生具備智能的另一項證明。為了恢復平衡狀態，身體有時需要幫助，例如移除受困情緒、排出毒素、整脊、補充適當營養等。療癒是一段過程，需要花點時間。


    但是，等待身體自行療癒對我們的耐心來說自然是一項考驗，我們常常想要快速解決方案，不願意等，只想即刻恢復健康。我們被無數廣告制約，以爲只要吞下一顆藥丸，問題就會解決。儘管有些處方藥確實解決了疾病的成因，但大部分藥品只是治標不治本。這些藥物十分擅長粉飾症狀，讓人覺得問題已經消失，殊不知它只是被以化學方式抑制住了。


    > 記住，症狀的出現其實是身體要告訴你有個地方出了問題，那是一種警訊，提醒你必須改變某樣事物，或者你的身體需要幫助。


    用藥物掩飾症狀，有點像以膠帶把汽車儀表板上那個最近閃個不停的油箱缺油指示燈貼住一樣，雖然可以暫時掩蓋，但你的車最終會動不了。


    藥廠會讓你相信，恢復健康最好的方法就是服用他們的產品，例如在媒體不斷放送廣告幫助創造了一個龐大的抗憂鬱藥物市場。不過，和所有藥品一樣，這些抗憂鬱藥幫助了一部分人，同時有其副作用。請看下面這段文字（節錄自美國食品藥物管理局二〇〇四年十月十四日發布的新聞稿）：


    > 美國食品藥物管理局今日發布一份大眾健康報告，警告民眾：服用抗憂鬱藥物提高了兒童和青少年出現自殺念頭和行為的風險……


    而釋放受困情緒不斷幫助病人克服憂鬱症。下面是我以前一位苦於嚴重憂鬱症的病人的見證：


    我曾經極度渴望自殺，每天起床都必須決定：「我今天要活，還是要死？」我被困住了，因為我有一部分的信念系統告訴我，我的生命不是我的，不能由我奪走。好幾年來，那一直是我的真言，但我真的不想活了。然後，我碰巧去參加尼爾森醫師的一場講座，他提到情緒。那時他並沒有談太多，所以在他演講結束後，我去找他說話：「你剛剛提到情緒，但並未多加著墨。我需要幫助……我不想活了，但我知道世上有些人很快樂，有些人生活的各方面都運作得很好。我不是那種人，但我想變得和他們一樣，你能不能幫助我？」


    尼爾森醫師那時幫我清除了跟我「缺乏喜悅」有關的某樣東西，而在清除的那一刻，我真的可以感受到所有的能量又回到我身上。


    我幾乎徹夜未眠，在那之後，我像是被打足了氣，整個人充滿能量。從那時開始，我們下了許多工夫，大部分都在清除被困住的情緒，還有一些其他療法，但最有用、最關鍵的，當屬釋放受困情緒。跟一年半前比起來，我是個截然不同的人了。我不再恐慌發作，不像以前一樣有夜驚問題，整個人改頭換面，充滿活力，擁抱生命，也熱愛生命。


    如果身體疼痛，我們也許需要止痛藥來應對。我很感謝有止痛藥，而就像我之前說過的，所有療癒方法皆有其效力。藥物適用於短期，因為它們可以緩解症狀，只不過有時弊多於利。


    請看下面這則《今日美國報》二〇〇六年十二月二十日刊出的報導：


    美國食品藥物管理局表示，數百萬美國消費者使用的非處方止痛藥，其標籤上應加注警語，以提醒民眾注意其對肝臟或胃部健康造成的風險。


    這些藥物包括市面上常見的阿斯匹靈、布洛芬、乙醯胺酚，將影響到莫疼、安舒疼、萘普生及泰諾等家庭常用藥品牌。


    食品藥物管理局建議：


    任何含有乙醯胺酚的產品，如泰諾，應加注其具有「肝毒性」的警語，特別是在服用劑量高、與其他含乙醯胺酚之藥物同時服用，或是與一天三杯以上的含酒精飲料一起服用的情況下。


    凱倫


    不需處方籤即可購買的非類固醇類抗發炎藥物，應於標籤上注明其在下列情況中可能導致胃出血：六十歲以上的患者；有潰瘍病史、正在服用抗凝血劑或服用一種以上非類固醇類抗發炎藥物的人；與酒類一起服用，或是服用此類藥物的時間超過指示的患者。


    二○○四年，需處方籤才能購買的非類固醇類抗發炎藥物偉克適因為其可能導致心臟病發作和中風，被從市場撤回，服用此類藥物的風險開始受到關注。去年，食品藥物管理局要求，同樣需處方籤才能購買的非類固醇抗發炎藥物希樂葆，標籤上應加注其造成心血管與胃部疾病的風險。食品藥物管理局顧問委員會於二○○二年表示，不需處方籤即可購買的非類固醇類抗發炎藥物應加注其可能導致胃出血的警語。


    下面這則見證來自我從前的一位病人，她從兩層樓高的地方跌到一顆大石頭上，摔斷背部，之後的四年一直飽受慢性疼痛所苦：


    我是因為幾年前跌斷背部，接受過好幾種物理治療和復健運動都沒辦法改善背痛問題，而去找尼爾森醫師。在尼爾森醫師第一次幫我調整時，我便知道他是個真正的療癒者，我就是感覺得到。而幾乎每一次的調整都包含從我體內的能量淤塞處「釋放情緒」（能量淤塞指的是尚未解決的創傷事件存在身體的能量系統中，阻礙了能量的流動）。


    一開始我並未察覺有任何改變，但漸漸地，我的疼痛開始減少！尼爾森醫師讓我知道，藏在我身體深處的情緒是讓我疼痛不堪的主要原因⋯⋯我的體內老早以前就積存了許多痛，尼爾森醫師能夠跟我的身體「對話」，幫助我釋放疼痛。


    每一次療程的釋放，以及隨之減少的疼痛，對我而言都是不可思議的過程和體驗。今天我可以從事兼職工作了，這是四年來頭一次，但最重要的是，我感覺到自己在身體和情緒上都獲得很大的療癒，並學到「身體和情緒彼此相關」這個寶貴的事實。


    > 琳達


    # 療癒疾病的根本原因


    如果沒有處理疾病的根本原因，那麼在身體能夠自行療癒前，那個病都不會離開你。我看過太多患者因為某種疾病服藥多年，一旦停藥，原本的病就會全面反撲，因為疾病的根本原因還在製造問題。根本原因必須被翻轉，否則問題不會消失，你就得繼續受苦，或是永遠服用藥物。大部分人從來不知道可以使用自己身體的能量，去了解哪裡出了差錯、該如何解決。幸好，我們處在一個很棒的年代，各個時代的知識都被灌輸到人類身上。


    古代的療癒原理充滿對人類能量本質的真相與洞見，而這些療法功效，現在被再次認可了。


    磁鐵是一種古老的療癒方法，也是情緒密碼不可或缺的一部分，我們會在下一章詳細說明。


    # 第4章 神奇的療癒工具：磁鐵


    > 一個受負面情緒左右的人也許立意良善，也許言語誠實，但絕不會是發現真理的那個人。

    > ——甘地


    你覺得家裡最有效的療癒工具是什麼？維他命？處方藥？療癒花草茶？你冰箱裡的某樣東西？或者，你冰箱上的某樣東西？噢，不，不是你的購物清單，我說的是將你的購物清單固定在冰箱上的磁鐵。


    信不信由你，想要釋放受困情緒，冰箱上那塊平凡的磁鐵會是你所能擁有最有效的療癒工具，前提是你如何使用，我會在這一章加以說明。


    一個人有多健康取決於他的能量場有多平衡，而能量療癒有助於恢復並維持能量場的和諧，進而讓身體保持健康。但是，如果看不見人體能量場，又該如何開始療癒它？你在前面的章節已經學到可以透過搖擺測試與潛意識溝通，找出受困情緒之類的不平衡，那麼，你可以用什麼作為工具，以移除受困情緒？


    答案是你必須運用其他形式的能量，而最容易使用、最便宜、最方便取得的能量工具，非磁鐵莫屬。磁鐵發射出純粹的能量，是一種強效工具，可以解決你看不見的能量不平衡。


    我試過所有種類的磁鐵，從最昂貴、磁力最強的，到最便宜、磁力最弱的都有；有些磁鐵專門設計來療癒人體，有些則否。但我發現，使用情緒密碼時，幾乎可以用任何一種磁鐵來釋放受困情緒。


    ## 人的體內存在著磁力


    你的存在範圍比你能夠看見或感覺到的大得多，這是因為你是個能量存在體，即使你也以肉體形式存在。也就是說，如果你看不見自身存在體的一部分，那麼，你看不見造成你健康問題的某些根本原因，或許也是一件非常合理的事。


    大部分人都認為他們只存在自身皮膚的範圍之內。你的皮膚代表你肉眼所見的最外層，而你一直被教導「眼見為實」。如今，科學研究已經證明，肉眼所見之外還有更多東西。


    舉例來說，我們現在知道體內的電子活動會產生一個電磁場，這是由神經系統中的電流，以及不斷在身體所有細胞中發生的電化過程創造出來的。


    科學家現在了解到，由身體往四面八方——上下、前後、側面——延伸八到十二呎（約二．五到三．六公尺），都是心臟電磁場的範圍。


    一九五六年，日本科學家進行了突破性研究，證實人的體內毫無疑問存在著電力與磁力。藉由將人體暴露在脈衝式電磁場中，科學家在細胞層次創造出電流變化，改變了細胞的新陳代謝。醫學界稱這種現象為「壓電效應」。


    西方醫學毫不保留地承認並接受這個電磁場的存在，但多年來只測量了「電」的部分。科學家與醫生已經在臨床上量測人體的電子活動許多年。一八九五年，測量心臟電脈衝的心電圖第一次應用在實務上，測量腦部電子活動的腦波圖則是從一九一三年起開始運用。


    一條基本物理定律告訴我們：只要有電子活動，就會產生相應的磁場。科學家可以利用腦磁波儀和心磁圖儀來測量這個磁場。相較以往，這些儀器在技術層面上大躍進，不再只限於測量心臟和大腦的電場。科學家慢慢認識到這些磁場交互作用的影響有多大、多重要。


    腦部的松果體會分泌影響全身的荷爾蒙，它被磁鐵礦群圍繞，這些磁鐵礦被仔細調整，以感知磁場，並與其產生相互作用。讓信鴿、蝴蝶和蜜蜂得以利用地球磁場導航的就是這同樣的磁鐵礦群，而我們松果體中的這些磁鐵礦與方向感似乎也有很大的關係。發表在《英國醫學期刊》中的一項研究發現，松果體鈣化或硬化的人迷路的可能性明顯較高！


    # 利用磁能量讓青蛙騰空飄浮


    科學家試圖了解磁力為何對生理機能有這麼大的影響，於是利用超強力磁鐵和青蛙做了一個有趣的實驗（美聯社在一九九七年四月十二日刊登過相關報導，如下）。這實驗有點古怪，我之所以舉其為例，是因為它說明了磁鐵對肉體的確有影響。


    # 科學家讓青蛙飄浮在空中


    英國及荷蘭科學家表示，他們利用一個磁力是地球百萬倍的磁場，成功地讓一隻青蛙飄浮在空中。


    根據他們的說法，更大型的生物，甚至人類，沒有理由無法利用同樣的方式對抗重力。


    > 「如果你有個夠大的磁場，這完全可行。」諾丁罕大學物理學教授彼得·曼恩說。曼恩是與荷蘭奈梅亨大學的同行合作創造出第一隻飄浮兩樓動物的英國科學家之一。


    最近一期的英國《新科學家》週刊也簡短報導了他們的努力。


    這群科學家說，要成功托起青蛙，該磁場的強度必須是地球磁場的百萬倍，這樣的強度才足以改變青蛙原子中的電子運行的軌道。


    曼恩解釋：「如果磁場以足夠的力量將青蛙推開，你就能戰勝重力，那隻青蛙就會飄浮著。」這一招不只適用於青蛙，科學家說他們也以同樣的方式，讓植物、蚱蜢和魚飄浮在空中。「每一樣尋常物體，無論是青蛙、蚱蜢或三明治，都具有磁性，只是平常很難得看見這樣壯觀的示範。」曼恩說道。


    這群科學家表示，他們的青蛙在磁力圓筒中飄浮之後，並未出現痛苦跡象。


    將人體暴露在磁場中，會發生更有意思、更令人驚奇的事：人們的疾病與不平衡的狀況完全消失了。疼痛減少，眩暈消失，也不再感到疲勞。已經有數千人藉由磁鐵的療癒力恢復健康，但即使證據就在那裡，將磁鐵用作療癒工具目前在現代醫學中仍處於實驗階段。許多生機論療癒者已經知道磁鐵的妙用，但醫學界還無法在科學上解釋他們於實驗中發現的事。


    二〇〇五年三月，《時代》雜誌刊載了一篇報導，描述哥倫比亞大學的醫生意外發現一種治癒憂鬱症的驚人方法——利用磁能量。


    美國康乃狄克州一位叫瑪莎的婦人有將近二十年的憂鬱症病史。她試過所有被認可的傳統治療方式——去看精神科醫師和心理醫師，並遵照醫囑按時服藥——卻不見任何成效。於是，瑪莎決定參與哥倫比亞大學一項實驗療法。醫生們讓她的頭部接受一連串的磁脈衝刺激，他們將這種療法稱為「重複性經顱磁刺激術」。


    在接受每次一小時、一週五次、連續六週的治療後，瑪莎說：「到了大約第三週，我開始看見改變的跡象；到了九月，我又感覺到快樂了，能夠在食物和陽光等事物中找到樂趣。」瑪莎定期回哥倫比亞大學接受治療，這篇文章刊登出來時，她的憂鬱症已經半年沒有發作了。


    這些醫生無法解釋為什麼磁刺激可以治療憂鬱症和其他不適。根據維克森林大學神經病學家喬治·威騰堡的說法：「磁刺激是一個引發電流的聰明做法，而不必真的連接電。」美國國家心理衛生研究院同意這項技術的有效性無可否認，並贊助哥倫比亞大學及其他三個機構進一步研究磁刺激的治療效果。


    二〇〇二年發表於《神經精神醫學與臨床神經科學期刊》中的一項研究指出，接受同樣的磁療法後，百分之七十五的憂鬱症患者狀況有顯著改善。


