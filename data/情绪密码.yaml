    # 第7章 圍著心築起的那道牆


    > 我不想看起來像個傻瓜，我不想為你心碎。

    我要築一道牆，每日每日將它加高。

    這次我不再淪為愛的犧牲品，我要把內心所有感覺都鎖上，

    這樣你就闖不進來了。


    ——滅跡合唱團《愛的犧牲品》一曲的歌詞


    受困情緒會圍著你的心築起一道牆，讓你無法活出生命所有的可能。我從前的一個病人，一位很棒的女性寫信告訴我心牆對她人生的影響。


    # 活出童話般的人生'
