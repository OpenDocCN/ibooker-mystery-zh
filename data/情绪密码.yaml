    # ★來自水的訊息


    日本科學家江本勝在他的著作《生命的答案，水知道》中詳述他對水結晶的研究，幫助我們了解周遭的能量世界。他和研究同仁發現，暴露在不同種類的音樂之中，水滴會形成不同的結晶圖案或「雪花」。比方說，接觸到迷幻搖滾樂的水，形成的結晶混亂無章；聽了莫札特交響曲的水，形成的結晶則美麗工整。


    他們進一步研究，發現如果在紙上寫下不同的字或句子，然後把這張紙貼在裝著水的瓶子上，靜置一整夜，會形成不同的水結晶。


    寫著「我愛你」的紙條會讓瓶子裡的水形成對稱、形狀完整漂亮的結晶；紙條上若寫著「我恨你」，形成的水結晶則不對稱而混亂。


    其中最美麗的水結晶，出現在接觸「愛與感恩」這個句子一整夜的那瓶水中。


