  md: '假設你的測試對象是嬰兒，任何一位目前處於可測試狀態的人都可作為替代者。如果測試對象是孩童，你可以選擇他的母親或父親，或是任何一位他覺得親近或相處自在的人作為他的替代者。當然，如果你不是孩子的父親或母親，測試前請先取得孩子父母的同意。


    > 只要是當下處於可測試狀態的人，都可以為任何人擔任替代者。


    這些年來，我已經把替代者測試視為肌肉測試不可或缺的輔助工具。如果為某人測試時，得到的結果反覆無常，並不一致，我會建議在你和當事人間安插一位替代者，然後在替代者身上執行肌肉測試，這樣就會得到一致的結果。藉由替代者的幫助，你往往會發現找尋答案變得更容易。


    你會注意到，有些人就是比別人容易測試。例如，我妻子琴恩就是非常容易測試的人，我倆一起工作，所以我經常請她擔任替代者。


    # 如何進行替代者測試？


    執行替代者測試的首要之務，就是確保替代者本身處於可測試狀態。你可以像我先前提過的那樣，請替代者說「是」或「否」、真實或不真實的陳述句，然後做肌肉測試。一旦確定替代者'
  merge: -1
  pgno: 260
- img_proc: true
  md: '沒有問題,就可以往下進行了。步驟如下:


    +   1. 先建立連結，替代者可以輕輕碰觸或牽著當事人的手。

    2. 請當事人用陳述句說出自己的名字：「我的名字是______。」然後對替代者進行肌肉測試，其肌肉應該會呈現強而有力的反應。

    3. 接著，請當事人說出一個不真實的陳述句：「我的名字是______。」空白處請填入任何不是他名字的名字。

    4. 對替代者進行肌肉測試。此時，替代者的肌肉應該會變得軟弱無力；如果沒有，請重覆步驟三，直到肌肉測試結果是「軟弱無力」為止。一旦當事人說出不真實的陳述句，而替代者的肌肉變得軟弱無力時，就表示連結已經建立，可以往下測試了。


    一般來說，當雙方有了身體接觸，當事人和替代者之間的連結在幾秒內就會完成，此時即可開始測試。連結一旦建立，就可以開始對當事人發問，或者讓當事人說出適當的陳述句，但此時是在替代者身上執行肌肉測試，而非當事人。'
  merge: -1
  pgno: 261
- img_proc: true
  md: '按照前面幾章描述的流程詢問所有相關問題，以辨識並找出受困情緒。當事人身上產生的任何能量變化，會立即流經替代者，並透過測試表現出來。要釋放受困情緒，則將磁鐵順著當事人的背往下滑即可；如果這個動作出於某種原因不可行，那麼，用磁鐵滑過替代者的背也會有同樣的效果，前提是雙方在能量上依舊保持連結。


    結束後，請中斷當事人和替代者之間的連結。做法非常簡單，只要替代者停止觸摸當事人即可。


    # 為孩童進行替代者測試


    幼童的肌肉測試結果通常較不穩定，替代者測試提供了一個簡單且有效率的方法，讓你得到你需要的答案，以幫助孩子。


