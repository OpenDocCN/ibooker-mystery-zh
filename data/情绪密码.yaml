    三天後，她接到正在菲律賓工作的兒子的電話。他從醫院病床上打來告訴她，幾天前他被當地警察毒打了一頓。母子倆比對他被毆打的時間與她被疼痛襲擊的時間，赫然發現是一樣的。不知何故，她和兒子之間的連結強到可以真正「感受到他的痛」。這就是母親的直覺啊！


    你可以試著注視人群中某人的後腦勺，過不了多久，那個人就會轉過頭來看你。許多人都有這樣的經驗，如果你沒有，試試吧，每次都見效！


    ## 思想是有影響力的


    你的思想非常強而有力。每當你透過言語或文字表達自己的想法時，就是在用思想的能量影響你周遭的世界。所有事物都是藉由想法、信念和意念發生的。


    具公信力的科學實驗一再證明，人的想法可以直接影響植物、真菌和細菌的生長速度。而史丹佛大學的物理學家威廉·堤勒也證實了，思想能夠影響電子儀器。


