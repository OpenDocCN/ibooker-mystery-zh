  md: '放下過去的受傷感受對你非常有幫助。你可能以爲自己有正當理由緊抓著那些受傷的感受，因為唯有如此，那些傷害你的人才會受到懲罰。但事實上，緊抓住負面情緒傷害到的是你，不是他們。那些人可能知道，也可能不知道你的感受，但他們的感受完全是他們自己的事。就因爲你選擇緊抓著過去不放來讓自己受苦，不代表那些傷害你的人也會跟你一起受苦。也許他們真的做了很可怕的事，你似乎不可能放下，但這就是你有力量去做一件改變生命、對自己有特別意義之事的時候。一旦決定原諒他們，你就能擺脫所有和這個問題相關的負面情緒。我總是喜歡引用路易·史密德的這段話：「原諒就是讓一個囚犯自由，然後你會發現，那個囚犯就是你自己。」所以，爲什麼不讓自己自由？爲什麼要讓自己年復一年地經歷那些受傷的感覺，創造更多負面情緒和傷害？提醒自己，讓事情過去吧，原諒吧。問題常起因於無知。許多人之所以受苦，是因爲我們不知道自己對彼此做了什麼事。如果我們能夠了解自己對他做的一切，就是我們對自己所做的，問題就解決了。如果曾經有人錯待你，不妨想想耶穌基督給我們的榜樣。他被釘在十字架上時說了這麼一段話：「父啊！赦免他們；因爲他們所做的，他們不曉得。」在那樣的絕境中，耶穌選擇了愛與原諒，我們也可以。


