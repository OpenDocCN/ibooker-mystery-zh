    # 情緒一旦被被釋放，就永久消失了


    情緒密碼有個很棒的地方：受困情緒一旦被釋放，就永遠消失了。多年來在診所及講座中，我從未見過任何一個受困情緒被釋放後又回來的。

    另一方面，滯留在體內的某種受困情緒卻可能被找到不只一次。遇到這樣的情況，你可能要從受試者身上釋放同一種情緒好幾次。雖然是同一種情緒，卻分別是不同的受困能量，且往往源自過去不同的情緒性事件。此外，一個人也可能有好幾個因為同一件事而被困住的不同情緒。'
