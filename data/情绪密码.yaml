    約莫一年後，我在橘郡一家高檔百貨公司遇見寶菈，她馬上認出我來，並等著看我是否也能認出她。她看起來很眼熟，但我真的不知道眼前的女士是誰。在聊天時，我才慢慢想起她是誰，但她變得完全不一樣了，讓我幾乎認不出來。她的臉龐散發喜悅的光彩，神情煥然一新。自從我們最後一次見面後，她不僅在這家百貨公司找到一份好工作，也遇到了一個好男人，幸福地走入婚姻之中。


    在聊天的過程裡，我也得知瑞克無論在學校或生活上都過得很充實順利。我提醒寶菈一年前我們談到心牆時的對話。


    她露齒而笑：「我不知道這是否和移除心牆有關係，但我的生活跟一年前比起來已經好太多了，好到我自己都不敢相信！」


    向寶菈道別後，我想起一年前的她有多憤怒、多不快樂，然後不禁好奇：如果當時沒有清除她的心牆，現在她不知道會過著什麼樣的生活。'
