    請注意，如果你練習過，在當事人處於無法接受測試的狀態時，你可以藉由測試自己來為對方測試。你也可以利用替代者測試來處理這個問題（我們將在第八章詳述）。替代者測試雖然是在第三者身上執行，而不是直接測試當事人，依舊可以讓你進入當事人的潛意識，把答案找出來。


    如果某人堅決不接受肌肉測試，他往往就真的無法使用肌肉測試。不過，這表示他故意不配合，不想讓測試順利進行。他有自己的打算。如果是這樣，他就不是運用情緒密碼的理想人選。我偶爾會遇到一些人打從心底認定肌肉測試不可行，結果，你知道嗎？肌肉測試對這些人就是起不了作用！他們確保了這一點。


    如你所見，這些測試並非只受純粹的物理力量左右。我就看過有人的肌肉軟弱到連一點點下壓力道都抵擋不了，但這種情況並不常見。大多數時候，你可以察覺肌肉力量的細微變化，察覺肌肉「被鎖住」或「軟弱無力」有何不同。


    肌肉測試大多數時候對大多數人都有用，但它還是會受其他因素干擾。有時行不通是因為受試者不知為何覺得不舒服，或者認為肌肉測試是騙人的，或者防備心特別強，擔心自己的隱私被揭露。例如，我發現有些人在一群人面前會變得無法接受測試，但只要離開眾人視線，就恢復可測試狀態了。


    ## 一定要獲得對方同意


    在進行每個步驟之前，一定要向受試者說明你接下來要做什麼。如果你要將對方的手臂往下壓以進行測試，請先說明這個步驟，並取得對方同意。


    確實有可能在當事人不知道的情況下，透過自我測試去測試他人，但這是不對的。


    徵得受試者同意，以及尊重對方的意願，是非常重要的。


    沒有取得當事人同意或違反對方意願去做測試，是侵犯他人隱私且完全錯誤的行為。這是不道德的，請不要這麼做！


    此外，沒有父母或監護人的允許，也請不要測試未成年人！


    ## 肌肉測試無法幫你贏得樂透


    肌肉測試是來自神的禮物，好讓我們可以互相幫助。它不是讓你用來測出樂透中獎號碼，或揭露。


    ## 不要利用肌肉測試做重大決定


    是詢問是否該接受那份工作之類的。就我的經驗，詢問與健康無關的問題大概都不管用。你可以探問現在的狀況，但不要試著預測未來，因為這不是肌肉測試的目的，測試的結果也不會可靠。這種測試是針對「現在」，適用於此刻正在發生的事，也適用於查明來自過去的受困情緒。


    ## 讓自己接受指引


    從經驗來說，我愈來愈清楚肌肉測試是一項天賜的禮物，有個特殊目的，但那個目的是受限的。你可以利用肌肉測試來幫你做任何決定，但我認為你只會變得神神經質而已。請運用肌肉測試找出受困情緒，幫助自己和他人保持身心健康就好，勿濫用。


    放下驕傲，去尋求神的幫助吧。神知道你正在尋找的答案，而且很樂意幫助你，但你必須提出請求。我記得一幅關於耶穌的名畫，畫裡的耶穌站在一戶人家的門口，正在敲門。有趣的是，那扇門外側沒有門把。耶穌打不開門，要去開門的是你！相信我吧，我每次替人測試前，都會在心中默禱，祈求神幫助我，而每一次，神都會幫忙。你也試試吧！


    ## 對自己有點耐心


    有些人輕而易舉就能掌握這些技巧，有些人則要花比較多時間。我向你保證，如果你堅持不懈，這些技巧對你來說會變得很簡單，而且會為你打開一整個療癒世界。


    當第一次有人看著你的雙眼，熱淚盈眶地為你所做的事向你道謝時，你就會明白我的意思。沒有什麼比助人的感覺更令人著迷的了。那感覺棒透了！雖然不是每次都會發生，但只要抱著盡可能幫助他人的心，那種美妙的感覺就一定會出現。


    ## 建立測試基準


    因為每個人都不一樣，所以在進行肌肉測試前，先建立每個人的基準是很重要的，這樣你才知道他們做出符合真相或不符合真相的陳述時，個人的肌肉感覺起來是怎樣。


    最簡單的方法就是請他們說出一個已知為真的陳述句，然後再說出一個已知是虛假的陳述句。例如讓他們說出自己的名字，之後再請他們宣稱某人的名字是自己的名字；或者，請他們說出「是」或「愛」之類的正面字眼，之後再請他們說出「不」或「恨」等負面字眼。


    ## 檢查施作結果


    進行肌肉測試時，如果我連續三次以上都得到「強壯」或「軟弱無力」的反應，亦即連續好幾個測試結果都相同，我會重新進行基準測試，以確保受試者仍處於可測試狀態。


    假如你測試所花的時間比平常更久，不妨定期檢查你的基準，以確保自己得到的答案無誤。有時候，當你在為他人測試時，對方可能會進入超載狀態，這種情況下，你每次測試都會得到「軟弱無力」的結果，直到他們的心智結束處理程序。如果受試者的肌肉持續呈現「強壯」的反應，不妨利用一個負面字眼去測試他，反之亦然。


    ## 請注意四處遊蕩的思緒


    你當下的念頭可能會影響測試結果，不信的話，你可以在幫人進行肌肉測試時，心裡想著他不好之處或貶低對方，看看會發生什麼事。他們的肌肉會變得軟弱無力。所以，保持專注真的很重要。


    如果你心中對受試者懷有負面想法——即使那個受試者是你自己——肌肉很容易就能偵測到，並變得軟弱無力。


    想要獲得準確的測試結果，正面意念與清明的思想是非常重要的關鍵。讓一切保持簡單，專注在說出的陳述句上，屏除雜念。也請指導受試者這麼做。


    讓你的心充滿對受試者的愛，懷著想要幫助對方的真誠渴望。相信自己做得到，並且因為你正在做這件事而感謝神。你要做的就是這些而已。


    ## 除非你是醫生，否則不要做診斷


    如果你是醫生，為人診斷病情是你分內之責；但假如你不是醫生，請不要為任何人做診斷。沒有執照就執行醫生業務是不合法的。請留心來找你的人告訴你的一切，如果對方的症狀聽起來不太尋常，請建議他去尋求適當的醫療診治。


    ## 別為不相信的人感到困擾


    不是每個人都能敞開心胸接受像情緒密碼這樣的新療癒方式。也許你的家人會覺得你腦袋進水，或者連你的狗都想離家出走了，但別讓這些事困擾你。史上最偉大的療癒者是耶穌，而當時幾乎沒有人相信他，所以你並不孤單。


    ### 第 3 部 情緒密碼這樣用


    ### 測試時，我們向什麼人或什麼東西提問？


    我們是與潛意識對話，而在我看來，這就好像跟我們內在的靈或更高智慧對話一般。這一部分的我們以某種方式與神的智慧及宇宙連結，而肌肉測試似乎也能汲取這些智慧。


    ### ★汲取宇宙智慧的管道


    當你在某人身上施作療法時，你其實是在為一個擁有肉體與靈的雙重本質存有療癒。我相信當我們來到這世上時，心智都被蒙了一層紗，所以不記得自己的前世。我們是以完全失憶的狀態來到這個世界。


    請讓我和你分享一個與此概念有關的親身經歷。有一天，我坐著靜心時，出現了一個深刻的靈性體悟。


    那層將我們與自己來到這世上之前的存在分開的記憶之紗突然被掀起，我身體的每個粒子立刻被一股巨大的、難以形容的「鄉愁」填滿。我渴望返回我天上的家，回到我來的地方，那裡才是我真正的家。這股強烈到令人難以置信的思鄉之情只持續了幾秒，然後就消失了，徒留我一人在敬畏中，久久難以平復。


    我有過幾次想家的感覺，但在這個靈性啓示中體驗到的鄉愁遠遠超過我能形容的一切。這次的經驗讓我了解，那層讓我們遺忘的紗其實是個好東西。如果沒有它阻礙我們想起與天父住在一起時的榮耀過往，我相信我們連五分鐘的人世生活都無法忍受。


    我領悟到，我們真的都是過客，就像華茲華斯的詩所說的：「從祂而來，我們披戴著榮耀的彩雲，神才是我們的歸宿。」


    地球不是我們真正的家，我們旅居此地是為了分辨善惡，為了增加信心，為了得到存在於一個肉體裡的經驗。我們來，是為了學習愛彼此、服務彼此，藉由做这些事，我們服事了神。


    在某種程度上，你的靈與超乎你意識理解範圍的事物有所接觸，而你的靈能夠透過肉體與你對話。肌肉測試就是讓你可以汲取那份知識的管道。


    我相信我們一直存在著，更多浩瀚的知識就深埋在我們的心智裡，只是我們的意識不得而知。現在只要提問就可以知道答案，不覺得棒極了嗎？


    # 第 6 章 釋放受困情緒


    > 信心是相信肉眼未見之物；其回報則是：得見所信之物。

    > ——聖奧古斯丁


    既然你已經有機會學習並進行肌肉測試，現在該來學習運用情緒密碼找到並釋放自己和他人的受困情緒了。


    你會發現整個流程既簡單又合邏輯，練習幾次之後，你就會得心應手。透過練習，大部分人可以在一、兩分鐘內找到並釋放一個受困情緒。


    開始之前，請先確定你和你的夥伴（如果有的話）對所處環境感到舒服自在。最好關掉電視和音樂，因為它們可能讓人分心，而且也許會在能量上帶來正面或負面的影響。


    情緒密碼的施作程序如下頁步驟圖所示：


    取得受試者同意

    ↓

    建立測試基準

    ↓

    判斷是否有受困情緒存在

    ↓

    判斷是哪種情緒

    ↓

    釋放該受困情緒

    ↓

    確認該情緒是否已被釋放


    ## ★步驟一：取得受試者同意


    如果你是施作在自己身上，你已經同意了，可以直接進入下個步驟。


    假如是要為他人施作，進行測試和從受試者身體取得資訊前，必須確保對方同意你這麼做。你可以問：「我可以測試你是否有受困情緒嗎？」不要以肌肉測試取得這個問題的答案，而是要讓你的夥伴在口頭上允許你，或者至少點頭同意。


    一旦雙方都覺得舒服、放鬆，你們就可以開始了。


    ## ★步驟二：建立測試基準


    詢問關於受困情緒的問題之前，必須先建立測試基準。請選擇一個你覺得用起來最舒服的肌肉測試法。你必須確認受試者是否處於可測試狀態：當對方說出一個真實或符合真相的陳述句時，其肌肉是否呈現強而有力的反應？當對方做出不真實或不符合真相的陳述時，其肌肉是否變得軟弱無力？


    此外，因為每個人都是獨一無二的，你對不同的人做肌肉測試的感覺也會有所差異。建立測試基準的目的在於獲得明確的強、弱肌力反應，這能讓你知道對方的肌肉在測試中處於「強壯」與「軟弱」狀態時各是什麼感覺。


    想要建立測試基準，最明確、最廣為使用的方法，就是由受試者大聲說出自己的名字：「我的名字是——。」


    只要對方說出這個符合真相的陳述句，其肌肉應該會呈現強而有力的反應。


    現在，請你的夥伴大聲說出一個不真實的陳述句：「我的名字是——。」空白處請使用任何一個不是他名字的名字，其肌肉應該會變得軟弱無力。


    當然，讓你的夥伴說「是」或「不」、「愛」或「恨」等字眼，同樣也可以用來建立測試基準。


    ### 如果夥伴處於不可測試狀態


    請記住，建立測試基準的部分原因是要確認受試者目前是否處於可測試狀態。假如對方無論說什麼陳述句，手臂肌肉皆維持強或弱的反應，那麼他此時就無法接受測試。在這種情況下，你有幾個選擇：


    如果你或你的夥伴有脫水現象，會讓肌肉測試變得較難、甚至無法進行。輕微脫水很常見，也很容易解決。讓自己和夥伴喝杯水，然後再試試。如果還是不行，你的夥伴很可能有頸椎錯位的問題，在對方去找脊骨神經醫師調整之前，你可以藉由在替代者或自己身上施作，來為他們測試。


    有些人則是因為身體方面有所損傷或限制，而無法接受測試。此時，替代者測試就是幫助他們最好的選擇（第八章會更加詳細地介紹替代者測試）。


    ## ★ 步驟三：判斷是否有受困情緒存在


    讓受試者說出下面這個陳述句：「我有個現在可以被釋放的受困情緒。」然後，使用你選擇的方法測試其反應。左邊的表格列出你可能選用的測試法，以及可能出現的結果。


    如果身體給出的答案為「否」，有三種可能：


    1. 受試者沒有任何受困情緒。這個可能性非常低，因為幾乎每個人都有受困情緒。

    2. 受試者確實有個受困情緒，但出於某種原因，其潛意識現在不想釋放受困情緒。陳述句是這樣說的：「我有個現在可以被釋放的受困情緒。」受試者也許有意願，但他的潛意識可能不願意。這個狀況會改變的，之後也許就有不一樣的答案了。

    3. 受試者有「心牆」。如果是這樣，身體也許會表示它沒有任何受困情緒，但其實是有的。心牆會讓受困情緒變得較難被找到。為避免混淆，我會在下一章介紹心牆。即使你得到的答案為「否」，我建議你還是先把本章看完，因為無論如何你還是需要知道整個流程。


    如果答案為「是」，你就可以進行下一個步驟了。


    | | 任何一種肌肉測試法 | 是 | 否 |

    | :--- | :--- | :--- | :--- |

    | 搖擺測試 | 強而有力 | 軟弱無力 |

    | | 往前傾 | 往後傾 |


    ## 步驟四：判斷是哪種情緒


    如果答案是肯定的，意味著有個受困情緒需要被釋放，下一步就是要深入了解該情緒。這是哪一種情緒？是憤怒嗎？是傷心遺憾嗎？是挫折感或憂鬱，還是其他情緒？這個情緒是何時被困住的？什麼事件造成的？


    透過簡單的刪去法，你很快就能歸納出答案。


    下一页的「受困情緒表」可以讓你更容易進行這項工作。


