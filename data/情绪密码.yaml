    ## 連接巨大資料庫的人類心智


    這一點，精神病學家大衛·霍金斯博士過去經常在演講時，於上千名聽眾面前進行非常生動的實地示範。他的工作人員會將沒有記號的密封信封傳下去給每一位聽眾，每個信封裡都裝有一些粉末，半數信封裝著人工甘味劑，另一半裝的則是有機維他命
    C。


    為了讓我們保持健康、有活力，身體運用的技巧遠遠超過我們意識上所知的一切。為了證明健康上是真實的或虛假的，亦即是否帶著誠信行動，沒人辦法欺騙自己的身體。我們的潛意識毫無疑問會立刻知道我們在思想、陳述、行為和身體還會有不一樣的反應——說謊時，肌肉抗力會立刻變弱，說實話的時候則維持強而有力。不僅如此，身體還能告訴我們，什麼事物對我們好、什麼不好，甚至在我們說實話或說謊時，知，我們的內在電腦隨時都掌握著我們體內各個層面的所有狀況。


    講到健康，身體可以透露的訊息比我們的意識所知的重要很多。執業那些年，我非常感謝病人的潛意識智慧，因為它幾乎總是知道哪裡出了問題，以及身體需要些什麼。想一想，我們的身體跟那些讓眼睛眨動、讓肺部隨著吸氣擴張的系統協調一致，我們的潛意識則持續監測血管裡的白血球和心臟的跳動。幸好，那些系統是無意識運作的。由此可以推測得人的潛意識智慧...


    接著，霍金斯博士會讓所有聽眾兩兩配對，練習一種簡單的肌肉測試技巧。其中一人將沒有做記號的信封擺在心臟上方，由同伴幫忙測試他的肌肉力量，並將結果是強是弱記錄下來。之後，兩人角色互換，並做比較。結果顯示，有些人的肌肉抗力強，有些人的肌肉抗力弱。


    所有人都完成這項簡單的測試之後，霍金斯博士會請他們打開信封，看看所持信封內裝的是人工甘味劑，還是維他命 C。結果每一次，肌肉抗力弱的那些人所持信封裡裝的都是人工甘味劑，而肌肉抗力強的人拿到的都是裝有維他命
    C 的信封，屢試不爽。在我自己的演講中，我發現這個結果確實是可重複的。


    所有人都知道，與人工甘味劑比起來，有機維他命 C 對我們比較好。然而，人體在某個更深的層次上知道一個被封印住的信封裡裝的是什麼，這件事事實令人覺得不可思議。霍金斯博士是這樣解釋的：


    人類的個別心智就像一部連結至一座巨大資料庫的電腦終端機，這座資料庫就是人類的意識，而我們的認知只是意識的個人表達，它的根是在所有人類的共同意識裡。這座資料庫是「天才」的領域，因為身爲人類即代表著分享這座資料庫，所以每一個人生而具有取用這份天賦才能的權利。資料庫所包含的無限資訊，已證明能在瞬間讓任何人取用，無論何時、何地。這著實是個不可思議的發現，無論對個人或集體而言，皆擁有改變生命的力量，而且影響的程度是我們始料未及的。


