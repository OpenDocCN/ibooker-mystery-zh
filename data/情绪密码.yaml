    # 天使神秘學院官方淘宝: http://strc.taobao.com


    089 第1部 受困情緒這樣影響你的人生


    傑克高中時期是個網球選手,但有好多年沒有拿起球拍了。受困情緒往往會被吸引到身體比較脆弱的地方,亦即那些有過多壓力、受了傷、受到感染,或是有其他某種失衡狀況的部位。這些受困情緒滯留在傑克的前臂組織,我認為是因為高中時代他的前臂一再承受壓力,甚至受過一定程度的傷;然後同時期,他因感情受挫而產生受困情緒——記得受困情緒很有可能停留在身體最脆弱的部位吧?


    話說回來,若非親眼看見,我大概也很難相信。


    # 數分鐘之內,傑克的疼痛就從讓他無法活動到完全消失。


    儘管親眼見證,我依舊對情緒可以直接導致這樣劇烈的身體疼痛感到萬分驚訝。一路使用情緒密碼下來,我發現受困情緒會嚴重損害病人的健康,許多症狀可以完全或部分歸咎於受困情緒。強大的療癒效果會在受困情緒被釋放後顯現出來。誰想得到藉由消除受困情緒可以完全避免多少痛苦、不快樂和慢性疾病!我很快得知,有些情緒被困在我病人體內的時間比我原先以爲的更久。這些病人多年來持續承受某種其實很容易擺脫的東西帶來的痛苦,一想到這個,我就覺得很難過。


