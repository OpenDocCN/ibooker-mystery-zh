    # 不可思議的代理人測試


    例如,若代理人叫蘇珊,你可以請她說:「我的名字是蘇珊。」如果肌肉測試結果為軟弱無力,表示她與當事人之間還有連結。那麼,就請她反覆陳述自己的名字,直到她的肌肉在測試中呈現強而有力的反應為止,因為這代表她與當事人的連結已經被切斷。就是這麼簡單。


    療癒程序結束後,請感謝代理人。而要切斷連結,只要請代理人陳述自己的名字,然後反覆做肌肉測試,直到其肌肉出現強而有力的反應為止。


