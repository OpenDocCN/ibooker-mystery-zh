    # 洛麗對高中時期啦啦隊長的怨恨之情


    這種現象我看過不知凡幾，下面這個發生在我病人身上的故事正好可以用來說明。洛麗有個受困情緒：怨恨。我回溯這個情緒最早是在何時出現，發現這情緒在她高中時被困住，是她對一個女生的怨恨所致。此時，洛麗表示：「噢，當然啦，我很清楚這是怎麼一回事。」她說，啦啦隊有個女生讓她很受不了，反正高中那幾年她就是對那個女生滿懷怨恨。那股怨恨從未真正離開，因為它已經被困在洛麗體內。


    洛麗說：「你知道嗎？我現在想起她還是會恨得牙癢癢，有點奇怪吧？我現在都四十三歲了，高中時代已經是好久以前的事，你一定以爲我已經把她忘了，但我就是擺脫不了那股怨恨。高中畢業後我就沒見過她，但每次一想到那個人，我就會覺得內在充滿怨恨，然後再次感受到從前對她的那股怨恨之情。」


    我向洛麗說明，受困情緒會使人難以放下那些我們寧可忘掉的事。我利用一塊磁鐵在幾秒內釋放了她的受困情緒，然後她就離開診所了。幾天後，我又見到洛麗，她很興奮地說：「尼爾森醫師，真的有用耶！昨晚我在跟一位老朋友聊天時，提到那個女生的名字，我竟然毫無感覺——從高中到現在，這是第一次！像這種情況，我通常會感受到對她的怨恨，這次竟然一點感覺也沒'
