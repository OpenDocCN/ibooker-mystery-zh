    | 不孕 | 胃酸逆流 | 網球肘 |

    | 失眠 | 背痛 | 鼻竇問題 |

    | 甲狀腺功能低下 | 恐慌發作 | 憂鬱症 |

    | 多發性硬化症 | 恐懼症 | 膝蓋痛 |

    | 低血糖症 | 氣喘 | 學習障礙 |

    | 克隆氏症 | 狼瘡 | 糖尿病 |

    | 貝爾氏麻痺 | 眩暈 | 頭痛 |

    | 夜驚 | 胸痛 | 頸痛 |

    | 帕金森氏症 | 偏頭痛 | 癌症 |

    | 性冷感 | 眼痛 | 關節痛 |

    | 性無能 | 結腸炎 | 讀寫障礙 |

