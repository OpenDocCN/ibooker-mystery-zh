  md: '緒嗎?」若得到肯定的答案,就接著問:「這是遺傳來的———嗎?」空白處依序填入 B 欄


    第二列那一格裡的五個情緒,直到你找到正確的那一個。


    一旦辨識出遺傳來的受困情緒,你也許會想要判斷該情緒是遺傳自受試者的父親或母親。若想進一步挖掘,你可以詢問這個遺傳來的情緒是源自祖父(母)或曾祖父(母)等等。一般來說,遺傳來的受困情緒大多源自父母或祖父母。


    幾年前,我女兒娜塔莉幫我進行遠距療癒時,在我身上找到一個遺傳來的受困情緒:無望感。當娜塔莉判定這個情緒源自我父親那邊一位二十二代以前的愛爾蘭女性祖先時,她突然覺得那位女士就在身邊。娜塔莉感覺得到她非常想要讓這個情緒從她的子孫身上被釋放掉,同時也感受到她對於這個情緒正在被釋放有多感激。


    在那之前,我並不知道有這個情緒存在,它就像背景聲一樣,我一直沒有察覺。而這個「無望感」被釋放的那一刻,就像背景聲突然不見了,我也因而知道這個情緒被釋放了!


    當一個遺傳來的受困情緒被釋放時,它會從所有透過血脈將這股情緒能量往下傳的祖先身上被釋放掉,無論往回追溯多少代。這是情緒密碼一個非常強大的地方!而因為受試者可能已經把這股能量傳給自己的孩子了,我建議你抱持清楚的意念,將受困情緒從每一個擁有這股能量的靈魂身上釋放掉,無論他們在世與否。釋放結束後,你可以透過肌肉測試確認是不是除了受試者之外,其他每一個可能遺傳了這股能量的人也都沒有了這個情緒。'
