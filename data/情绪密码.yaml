- md: '## 恐懼症


    恐懼症的定義是對某些活動、人、物體或狀況有不安且持續的恐懼。我發現，受困情緒是恐懼症的重要成因——也許是唯一的。潛意識知道恐懼症的根本原因是什麼，而導致每一種恐懼症的受困情緒有一個或多個。


    ### 飛機圖片恐懼症


    幾乎任何事物都可能引發恐懼症。舉例來說，我一個女患者有一種非常奇特的恐懼症：只要在雜誌或電視上看到飛機的圖片，她就會恐慌發作，而且很嚴重。如果頭頂上有一架飛機飛過，她眼睛必須盯著地面；假如抬頭看著飛機，恐慌就會發作。


    我透過肌肉測試詢問她的潛意識，是否有個受困情緒造成她的恐懼症，結果得到肯定的答案。經過進一步測試，得以確定發生了什麼事。


    幾年前，她在雜誌上讀到一篇民航機失事的文章，文章旁邊有一張飛機墜毀前被拍到的照片。讀這篇文章時，她被情緒淹沒了，強烈感受到乘客的恐懼，這個情緒因而被困在她體內。我釋放了這個受困情緒，她的恐懼症立刻消失了，可以直視圖片和天空中的飛機，而且症狀未再復發。


    ## ★夜驚


    我有個名叫卡蘿的四十二歲患者幾乎一輩子飽受夜驚所苦。她在睡夢中的驚叫聲會吵醒丈夫和孩子，每週至少三次！夜驚和惡夢的不同處，在於夜驚似乎不是由某個特定的夢引起的，而是患者在睡眠中感受到一種令人恐懼的特定情緒。


    卡蘿的夜驚一直是她生活中的大問題。她摔斷過兩根鎖骨、好幾根肋骨，連頭骨都裂過，因為她拚命想要逃離恐怖的夢境。


    我詢問她的潛意識：「你的夜驚是不是受困情緒引起的？」結果得到肯定的答案。進一步測試之後，發現她五歲時有一小段時期重複經歷某個惡夢，導致恐慌、驚恐和恐懼的情緒被困在體內。那個惡夢早就消失了，情緒卻依舊受困。


    釋放完這些被困住的情緒一週後，卡蘿的夜驚就此消失，未再復發。


    ## 受困情緒會影響你的生活品質


    我相信移除受困情緒對你的生活品質很重要，可以預防許多問題發生。希望你了解到，釋放被困住的情緒有助於解除身心症狀，讓你從苦海中脫身。


    透過釋放受困情緒，你可以移除有害的負面能量團，使它們無法繼續妨礙身體組織的正常運作，讓能量恢復自由流動，進而幫助身體自行療癒。


    你的心智也將回到更爲自然的狀態，不再有過往情緒帶來的戲劇性事件、痛苦和重擔阻礙你在生命中前行。


    接下來，我將分享一些古代醫生所知、關於人體能量場的驚人祕密，這些祕密近年才重新被發掘出來。


    # 第2部 認識能量世界


    # 第3章 古老能量療法的奧祕


    > 降生，只是入睡，只是忘卻；

    撐起這一具具軀殼的靈魂，生命之星，

    原先在他處安居，如今遠道而來。

    並非記憶全無，亦非身無寸縷，

    從祂而來，我們披戴著榮耀的彩雲，

    神才是我們的歸宿。


    ——威廉·華茲華斯


    一九三九年，一位名叫塞姆揚·克里安（Gurgen Karjian）的俄國電子工程師發明了克里安攝影術。克里安攝影術是利用高壓電拍出所有生物周圍散發的能量場，又稱為氣體放電顯像法。


    過去七、八十年間，俄國科學家利用克里安攝影術進行大量實驗，發現所有物體皆有個能量場，不過有生命物體的能量場比無生命物體活躍得多。利用克里安攝影術拍攝的影像中，最引人注目的是被切掉一半的葉子在照片裡呈現一整片葉子完整無缺的能量場。這些克里安影像是沒有可能其實是顯現了事物的內在靈性本質？「人體能量場」的存在長久以來一直是療癒藝術的基本信條。五千年前印度人就把賦予事物生命的能量稱為「普拉納」，中國人則稱之為「氣」，並且知道只要體內的氣不平衡，人就會變得不健康。


    我認為人類的能量場本質上是存在於每個人內在的靈魂，假使可以用什麼魔法將一個人的靈魂抽離身體，然後兩兩放在一起比較，其相似度會讓你驚訝不已。


    許多瀕死經驗的紀錄都顯示出，那些「死去」的人其實只是暫時離開身體，有時他們甚至還沒有意識到自己已經死亡，直到飄浮在半空中往下看，發現自己的肉體還躺在那裡。這些人透過自身經驗了解到，他們並非自己的肉體；相反地，肉體比較像是他們的靈魂居住的殿堂。


    我有過一個難忘的經驗，讓我領悟這個概念的真諦。執業生涯中，我經常遇到為棘手和慢性疾病所苦的病人，每次治療前，我都習慣先簡短地在心裡向神禱告，祈求祂的引導；而許多時候，當我力有未逮時，我都會感謝神的幫助。


    有一次，在心裡說完祈求幫助的禱詞後，我的注意力轉向躺在眼前診療檯上的患者。那一刻，我領受了一份來自天上的禮物，感知到自己是站在一座神聖的殿堂之前，這座殿堂就是身體。我心裡充滿敬畏，這份受到啟發的感知在一個更高的理解層次上揭露了關於身體的真相。


    這個靈性體驗改變了我看待人的方式。我對人類一直滿懷愛與尊重，但現在我了解到，人類存在的真相遠比我們想像的更深奧、更神聖。我們真的是在地球上體驗物質世界的靈性存有。


    ## 你的思想如何影響他人？


    一個人的想法源自他的靈性智能，對周遭的人會產生深遠的影響。你的思想是能量，毫不受限地持續從身體向外發射。


    你想法與感覺的能量會對其他人及其他生命形式產生微妙的影響。無論有沒有意識到，我們一直在與他人連繫，因為所有能量都是連續不斷且連結在一起的。


    琳達因為慢性疲勞症候群來找我，她說這些症狀是從她和一位女同事共用一個小隔間之後開始出現的。那位同事充滿負能量，經常因為這件事或那件事而發怒。琳達覺得那個人的負面能量是她健康惡化的導火線。


    # 簡單的肌肉測試展現思想的力量


    古代療癒者深刻了解思想的力量。在講座中，我會利用一個簡單的測試，說明思想如何對他的身體和心智產生巨大影響，而且不受距離限制。


    我請一位志願者站到房間最前面，背對聽眾，然後很快地進行基準肌肉測試，以確保他是可測試的：我請他說「愛」，然後輕輕但穩定地將他伸出的那隻手臂往下按，此時應會出現強勁的肌肉反應，也就是說，他應該可以輕鬆抵抗我往下壓的力量；接著，我請他說「恨」，再將他的手臂往下按，這時手臂肌肉應會呈現疲弱的反應，讓他無法抵抗我的按壓。


    確認一切就緒、可以示範了之後，我請志願者閉上眼睛，保持心無雜念。當然，我也讓自己靜下心來，以免干擾示範過程。接著，我請聽眾在我於志願者背後豎起大拇指時，安靜地對志願者傳送正面想法，如「我愛你」「你很棒」；當我在志願者背後將大拇指往下時，則請他們對志願者傳送負面念頭，如「我恨你」「你真令人噁心」。


    每當我豎起大拇指，聽眾便開始向志願者送出正面想法，然後我輕輕地將他伸出來的那隻手臂往下壓。毫無例外地，志願者的手臂總是呈現強勁的肌肉反應。為了使眾人明白這個結果單單是他們思想的能量造成的，我在示範過程中始終保持緘默，不發一語。


    接著，我將拇指朝下，聽眾開始向志願者發送負面念頭，然後我再次將他的手臂往下按。此時，志願者的手臂一定會變弱，屢試不爽。請注意，志願者在整個過程中都不知道我給聽眾什麼樣的信號。他不只背對聽眾，我向聽眾傳送訊息時還不發一語，在他背後打手勢，而且他的雙眼是閉著的。


    在我多年的教學講座中，這個簡單的測試始終呈現一致且可靠的結果。此測試之所以成功，是因為我們每個人都是能量組成的，思想也是，而當他人思想的能量穿過你的能量體，一定會產生正面或負面的影響。在我舉的這個例子中，聽眾向志願者傳送的負面念頭明顯讓他手臂的肌肉變弱，正面想法則使他的肌肉變強。這個簡單有趣的測試有幾個相當深刻的含意。


    當然，你自己的想法對你自身能量場的狀態會產生最強烈、最立即的影響。把念頭從正面轉為負面，你的振動能量會立刻由正轉負，最後無可避免地造成負面結果，最明顯的就是身體機能普遍變弱了。你可以想像負面念頭會如何讓你身體的器官與組織變弱，以及持續處於這個狀態會對健康造成什麼樣的危害。


    # 所有事物都由「能量積木」構成


    你的潛意識察覺得到可能會傷害你的負面想法，無論那是不是你自己發出的念頭；而如果你沒有看到負面想法的證據，如臉部表情、肢體語言或口語表達，你的意識往往不太能偵測到負面能量。這裡的「證據」指的是那些你從小就被教導要去尋找的東西。


    我想我們都變得有點麻木、遲鈍了，所以大部分人都沒辦法有意識地偵測到看不見的能量。


    從出生那天起，我們就被「這世界該是什麼模樣」的相關資訊轟炸。


    我們被灌輸了許多觀點、意見、偏見、傳統、理論、事實及信條，希望自己學到的東西是基於真理。我們進到學校去學習與大自然、科學及世界歷史有關的「事實」，長大成人後，我們的世界觀基本上已經就定位了。


    新資訊出現時，我們的心智會比較慢接受與理解跟以往學到的資訊不符合的事物，這是很自然的。假如這個新資訊要求我們在想法上做些改變——尤其如果它違背我們以往所學的一切——那麼，該資訊可能就難以被接受。


    大多數人從來不知道，我們周遭所有的事物皆由能量構成，只是因振動頻率不同，所以看起來不一樣、嘗起來不一樣、聞起來不一樣、感覺起來不一樣。我喜歡稱我們居住的地方為「樂高」宇宙。


    可能有人不知道「樂高」（或從來沒跟小孩相處過），容我說明一下：樂高是有各種顏色、形狀和尺寸的小塑膠積木，任何去過樂高主題樂園的人都會告訴你，這些小塑膠積木可以用來打造任何東西，從大象到摩天大樓。


    我們的宇宙也是由被稱為「次原子粒子」的小積木構成，但它們實際上並非粒子，你可以把它們想成振動能量的極小單位。如果把夠多的這些小能量放在一起，你會得到一個原子。而就像樂高積木一樣，這些小能量的排列方式不同，就會製造出不同元素的原子，如氫、碳、鈦等；同樣地，就像排樂高積木，各種原子也可以被排成蛋白質、脂肪、碳水化合物等分子。最終你會發現，你在周遭看到的一切，以及存在的所有事物，無論是植物、動物、礦物、氣體、液體、固體或其他任何東西，都是由這些小積木構成，而小積木是由能量組成的。


    ## 不可思議的量子世界


    次原子粒子其實不是粒子，而是「量子」，或是無法定義的某物的一個量。量子物理學，或是針對這些最小能量單位的研究，始於愛因斯坦，以及和他同時代的科學家。這群聰明絕頂的人構思出一些相當巧妙的實驗，企圖進一步找出這些能量的本質。量子研究一個非常驚人的部分顯示，這些能量會根據觀察者預期看到什麼，而有不同的行為表現。許多物理學家認為這些神秘行爲唯一的解釋，是原子中的能量本身具有某種程度的智能。


    在一項著名的實驗中，科學家將一個原子一分為二，然後將它的兩個粒子（或能量）以接近光速送往不同的方向。在這兩個粒子往不同方向行進一定距離後，其中一個粒子通過一強力磁場，改變了該粒子行進的方向。同一瞬間，它的姊妹粒子也轉向了，而且轉的角度毫不差。雖然兩個粒子已相距遙遠，彼此之間依舊保持著不可思議的連結，其中一個粒子身上發生的事，立刻會影響到另一個粒子，不受距離限制。你認為這是怎麼一回事？在相距如此遙遠的情況下，這些微小能量如何能表現出這麼明顯的即時交流？


    沒人知道確切答案，至少目前還沒有。然而，量子物理學已經一再證明這種現象。讓一個粒子發生改變，會讓另一個相連結的粒子即刻出現同樣的變化，無論兩者相距多遠。距離似乎不會阻礙它們之間的能量連結。所以請記住，每一樣事物都和其他所有事物連結在一起！


    不過，這個無法解釋的現象不是只存在次原子粒子的行為中，這種奇怪的連結在人體細胞中也被觀察到了。


    在一項非常著名的研究中，受試者的白血球被取出來放在培養皿上。白血球在人體中負責尋找並摧毀外來細菌、毒素及其他入侵者。實驗中，受試者會被接上電極，以測量他身體的電子活動，而他的白血球也會被放在一個高度敏感的儀器中，同樣測量它們的電子活動。受試者及其白血球的電子活動程度都被精密量測。


    此研究中的一位受試者曾經在二戰時期服役於海軍，服役地點是一艘駐紮在太平洋的航空母艦。該戰艦是當時日本神風特攻隊的目標之一，那種自殺式攻擊讓他驚恐不已，有好幾次，他都覺得自己死定了。


    身體接上電極後，研究人員讓他觀看神風特攻隊飛行員在戰爭期間向下俯衝並攻擊航空母艦的新聞影片。雖然已經是很久以前的事了，他的身體依舊沒有忘記這一切，突然湧現的強烈焦慮感立刻透過他身上的電極顯示在螢幕讀數上。


    這並不令人驚訝，真正讓研究人員大感驚奇的，是他們看見房間另一頭的白血球也同樣出現暴衝的讀數，兩者的讀數基本上完全相同。白血球的電流突然和他身體的電流一樣不穩定。而當研究人員關掉影片，受試者身體和他位於房間另一頭的白血球的電子活動便都恢復正常。


    科學家簡直不敢置信，他們重複測試多次，每次都得出相似的結果。爲了看看會發生什麼事，他們再次測試，但這次將受試者與其白血球之間的距離拉大——事實上，他們把裝有還活著的白血球的測量儀器搬到好幾哩外的另一間實驗室，然後再次進行這項測試。


    科學家反覆實驗，精確記錄受試者和他幾哩外的白血球的電子活動。他們讓受試者觀看神風特攻隊的影片，然後讓他休息；接著又看影片，然後又休息。結果，受試者的電子活動讀數，與他位於幾哩外的活白血球電子活動讀數，每次都一致。


    這項測試的結果違背這些科學家所學的一切。某人在看電影時生了氣，他位於好幾哩外的白血球會不會跟著生氣？隨便找個人問這個問題，我想對方應該會嘲笑你。這聽起來像天方夜譚，卻真的發生了。


    # ★擁有智能的宇宙


    還有比這更令人驚奇的事，而此事之所以看起來如此不可思議，是因為我們不了解。事實上，我們剛開始要去了解能量的神祕本質、能量如何運作，以及該怎麼利用它。


    我相信宇宙最大的祕密之一才正要被揭露。


    這個大祕密與現代科學發現有關：次原子粒子（或能量）擁有智能。


    想像一下量子物理學家說的都是真的，想像一下我們居住的宇宙完全由能量組成，而且這些能量不知為何具備智能。


    試想看看，你現在坐的這張椅子是由能量組成，而那個能量擁有智能。你的椅子當然不會真的「思考」，但在某種程度上，它是由無數微小能量組成，這些能量正在做它們該做的事，好讓你的椅子維持一張椅子的狀態，幫助你體驗這個世界應有的樣貌。


    二十世紀最有才智的人之一、被視為量子理論之父的馬克思·普朗克，在獲頒諾貝爾物理學獎時說出這番感言：


    > 身爲一個畢生致力於研究「物質」的人，我可以告訴諸位多年來我研究原子的結果：沒有所謂的物質。所有物質皆源自一股力量，並且單純憑藉這股力量而存在——該力量讓一個原子的粒子振動，並讓這個最微小的原子太陽系凝聚在一起。我們必須假定這股力量背後存在著一個擁有意識與智能的心智，這個心智是所有物質的母體。


    # 意念的力量


    你的意念其實只是能量的另一種形式，我喜歡把它想成一種「經過引導」的思想能量。


    因為能量擁有智能，它其實有能力服從你的意念，或與其合作。


    古代療癒者了解這個概念：宇宙充滿具備智能、可以回應意念的能量，並且由這些能量組成。


    耶穌基督是史上最偉大的療癒者，他使盲者得以看見，使跛足者得以行走，甚至使死者復活。


    他行的第一個神蹟雖然與療癒無關，卻戲劇性地示範了「擁有智能的能量」這個概念。


    耶穌和門徒去參加喜宴，結果主人的酒用盡了，這在當時是一件很失禮的事。耶穌吩咐僕人將幾口大石缸裝滿水，接著使那些水變成酒，讓在場的人驚奇不已（見《聖經·約翰福音》第二章一至十一節）。


    我相信耶穌只是叫水變成酒，然後水就照他的話去做。但我認為這之所以行得通，是因為水本身具有智能，才能夠遵循耶穌的命令。


    # 宇宙會如實回應你對自己的信念


    《聖經》中的另一個例子是與門徒彼得有關的故事。耶穌遣他的門徒渡海，他則上山禱告。當那些門徒在清晨時分看見一個人影在海面上朝他們走來時，船已行至海中央，遇著逆風，在波浪中顛簸。眾門徒驚恐萬分，以爲來的是個鬼。當他們發現那是自己的夫子時，彼得大喊道：「主，如果是你，請叫我從水面上走到你那裡去。」耶穌說：「你來吧！」彼得就從船上下去，開始在水面上朝耶穌走去。他行走在水面上了！但是，當他環顧四周，意識到自己正在做的事有多不自然、風勢有多猛烈時，他感到害怕，然後立刻開始往下沉。他大喊：「主啊，救我！」耶穌趕緊伸手拉住他，說道：「你這小信的人哪，爲什麼疑惑呢？」（見《聖經·馬太福音》第十四章二十二至三十一節）


    # 信心＋感恩＝你想要的結果


    彼得一開始是帶著信心的，相信自己可以在水面上行走。他的信心和意念如此強烈，讓他真的做到了。水的智能只是立刻回應了他的信心、他的意念，然後事物的正常狀態馬上改變，去支持他的意念。而在彼得開始感到恐懼那一刻，他相信自己有能力行走在水上的清晰意念和信心開始變小。當他的信心變小，清晰的意念就消失了，於是他開始往下沉，因為宇宙必須回應他新的心智狀態。


    你看，彼得心一生懷疑、一生恐懼，馬上開始往下沉。懷疑和恐懼是信心的相反，無法並存。同樣地，宇宙會支持你對自己的信念。如果你覺得自己辦不到，宇宙會支持這個信念，然後你就會成功。


    另一方面，如果你覺得自己可以，宇宙也會支持這個信念，然後你就被賦予力量，得以做到。


    父親過世兩個月後，我做了一個不尋常的夢。這個夢對我意義深遠，我把它視為神給我的訊息。我夢見自己沿著一所大學的長廊走，長廊裡人很多，每個人都在忙著自己的事。我身旁都是人，但有一件非常奇特的事發生在我身上——我當時確確實實走在空中，大約離地一吋，那感覺真是棒極了。我試著一下走快、一下走慢，看看會不會讓我的高度改變，結果沒有，我還是離地一時，那感覺真是難以形容！


    我身旁的人好像都沒有注意到這一點，只專注地做自己的事。我想想：「如果我可以離地一吋行走，離地一呎肯定也沒問題。」我一這麼想，這件事就發生了！我走在距離地面一呎的空中！


    那一刻，我往身後望去，看見一群小孩，他們正盯著我。雖然似乎沒有其他人注意到，但他們和我一樣，正在離地一呎的空中行走。


    我繼續走著，然後發現自己可以隨心所欲增加高度。沒多久，我的頭就幾乎要碰到天花板了。


    此時，我注意到所有人都放下手邊的事，仰頭看著我，問道：「你怎麼做到的？你怎麼可能在空中行走？」


    我告訴他們的答案是神給我的訊息，現在我要把這個訊息告訴你。


    我對他們說：「很簡單啊！你要做的就是『相信』自己可以做到，然後因為自己正在做這件事而『感謝』神！」


    然後，我向長廊的盡頭望去，看見好幾扇通往戶外的大玻璃門。外頭有連綿起伏的美麗綠色山丘、更多校園建築，以及廣闊的天空。我想想：「到了那些玻璃門之外，我就能飛了！」


    那一刻，我醒了過來。還在做夢般的狀態中，我就清楚領悟到這個夢境的含意。我可以在空中行走意味著我能夠做到我相信自己做得到的任何事，只要我因為自己正在做這件事而感謝神。


