    # 潛意識是你的超級電腦


    不僅如此，潛意識也非常清楚你的身體需要些什麼才能恢復健康。不過，你該如何取得這項資訊？


    我在脊骨神經醫學院就讀時開始問自己這個問題，後來才慢慢理解，大腦本質上是一部電腦，一部在已知的宇宙中最強大的電腦。這不禁讓我想到，療癒者有沒有辦法汲取大腦的巨大力量，以獲得關鍵資訊，弄清楚自己的病人到底怎麼了。


    行醫那些年，我發現利用「肌肉動力學」或俗稱的「肌肉測試」，真的有可能從潛意識提取資訊。肌肉測試是一九六〇年代由喬治·古德哈特醫師首先發展出來的一種方法，用來矯正骨骼結構不平衡問題，現在則被廣為接受。雖說世界各地許多醫生都利用肌肉測試來矯正脊椎錯位及其他的不平衡，卻比較少人知道，肌肉測試可以用來直接從潛意識取得資訊。


    ## *與身體對話


    透過肌肉測試與患者的潛意識展開對話的能力，成了我的一項強大工具，讓我可以盡快得知患者需要些什麼才能康復。我慢慢變得完全相信身體的智慧，並且對於身體藉由肌肉測試將那份智慧傳達給我的天生能力很有信心。多年來針對一般民眾和醫生舉辦的教學講座讓我明白，人人都可以做到這件事。任何人都能學會問出身體的答案，也都能採取一些必要步驟去幫助身體療癒。你不需要是個醫生，只需要有學習的意願。


    許多年來，我一直迫切地想要與世人分享這份非凡的知識。過程中，我持續不斷地禱告，努力把「情緒密碼」這套系統淬鍊得更為簡易，而現在，它已經簡單到人人都學得會了。你很快就能擁有你所需的全部知識，以開始運用這個方法移除體內的受困情緒能量。


    # 負面刺激與正面刺激


    在我教你如何從潛意識取得資訊之前，你必須知道一個基本原則：所有的有機體，無論多麼原始，都會對正面或負面刺激產生反應。例如，植物會向陽生長，避開暗處。水族箱裡的阿米巴原蟲會游到光亮處，遠離陰暗；如果在水裡滴入一滴毒物，阿米巴原蟲會離開有毒的地方，往乾淨的水游去。


    而在潛意識層次，人類的身體也一樣。你的身體會被正面的事物或想法吸引，排斥負面事物或念頭。事實上，這一直在你的生命中發生，只是你沒注意到而已。如果你可以讓自己的意識安靜下


    # 搖擺測試


    想要從潛意識獲取答案，我所知道最簡單的方法就是「搖擺測試」。之後你會從本書學到其他的肌肉測試技巧，但搖擺測試非常容易學，而且不需旁人協助，因此可以用在獨自一人的時候。做搖擺測試時，需要採取一個舒服的站立姿勢，所處的房間最好很安靜，沒有電視或音樂等讓人分心的事物。獨自一人，或是和另一個人一起練習，將讓你更容易學會。


    以下是操作步驟：


    雙腳打開，與肩同寬，讓身體自然平衡。


    雙手自然垂放在兩旁，身體靜止不動。


    放下一切煩惱，讓身體完全放鬆。如果閉上眼睛會令你覺得比較舒服，就閉上眼睛。幾秒之內，你會發現完全站立不動是一件不可能的事。肌肉在運作以維持站姿時，身體會不停地往不同方向小幅度擺動，這些擺動非常細微，而且不由你的意識控制。


    來，去感受身體在對你說些什麼，你會發現你的潛意識非常有能力與你溝通。準備好讓潛意識與你對話了嗎？


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_55_0.png)


    身體往前傾


    當你說出一個正面的、真實的或符合真相的陳述句時，通常不到十秒，你的身體應該就會明顯開始往前傾；而當你說出一個不符合真相或不真實的陳述句時，你的身體應該會在同樣的時間範圍內往後傾。


    我相信這種現象發生的原因，跟你習慣用來感知周遭世界的方式有關。雖然你的周遭狀況時時刻刻都從四面八方圍繞著你，但無論何時，無論你是在開車、走路、吃東西，或是坐在辦公桌旁工作，你都習慣只處理眼前的狀況，而不是身後或身旁發生的事。當你說出任何一個陳述句時，你的身體會將那個想法理解為它必須去處理的事物，就像辦公桌上的文件或盤子裡的食物。基本上，你可以想像你說出的陳述句就在你面前，準備要被處理了。


    當你準備好時，請說：「無條件的愛。」在心中想著這句話，並試著感受它讓你聯想到的種種感覺。不消片刻，你應該就會發現自己的身體往前傾。就像植物有向光性一樣，你的身體會輕輕地往那個想法的正面能量擺動，有時速度之快會讓你驚訝！


    現在把心智清理一下，然後說：「憎恨。」試著感受這個念頭讓你聯想到的種種感覺。如同任何有機體都會自動避開有毒或有害物質一樣，你的身體也會遠離「憎恨」這個想法。你應該會發現，你的身體在約莫十秒鐘內就會開始往後傾。不要試圖強迫身體向前或向後，這點很重要。請讓身體自行擺動。你正在給你的潛意識第一次機會，以這種非常直接的方式對你說話，而為了得到最佳效果，請一定要輕柔，不可強迫。透過練習，你會愈來愈駕輕就熟。


    現在，請說出一個你知道為真的陳述句。例如大聲說出自己的名字：「我的名字是______。」假設你叫艾力克斯，你就說：「我的名字是艾力克斯。」你的潛意識知道什麼是符合真相或真實的。當你做出真實的陳述時，你會感覺到自己的身體開始微微往前傾，因為它會被正面的、符合真相或真實的事物吸引。


    現在，請說出一個不真實或不符合真相的陳述句。假設你叫艾力克斯，你可以說「我的名字是克里斯」或「我的名字是基姆」。只要你選擇一個不是你名字的名字，你的潛意識會知道這句話並不符含真相或不真實。若保持心無雜念，一說出這句話，你應該就會在幾秒鐘內感覺到自己的身體往後傾。不只是「憎恨」之類的負面想法會被你的身體排斥，不符合真相和虛假的事物也


    會令心智和身體厭惡。


    # 保持心無雜念


    說出陳述句後，請確保心裡沒有其他念頭。如果任由思緒遊蕩，你的潛意識會分不清楚你指的是哪一件事。舉例而言，如果你做出一個正面或真實的陳述後，馬上開始回想前一晚跟另一半吵架的事，會怎麼樣呢？你可能會往後傾，因為你對那件事的記憶是負面的，身體自然想要遠離它。


    對自己要有耐心，這很重要。第一次學習這個方法時，你的身體可能會比預期多花一點時間才會擺動。假如出現這種狀況，請不要氣餒。


    透過練習，你的身體需要的反應時間會愈來愈短。對很多人來說，這種測試方法最大的挑戰在於必須放棄控制權一會兒，讓身體去做它想做的事。對有些人而言，交出控制權不是一件簡單的事。儘管如此，這還是一項簡單易學的技


    巧，應該用不了太多時間你就能得心應手了。


    # 測試你是否有受困情緒


    一旦你覺得自己上手了，你就準備好要善用運用搖擺測試了。請試著說：「我有一個受困情緒。」你的身體很有可能會往前傾，給你一個肯定的答案，表示你至少有一個受困情緒。如果你的身體往後傾，先不要急著認定你沒有受困情緒，這可能代表你的受困情緒被埋得比較深，需要再努力一點才能把它挖掘出來，但這不是問題，我稍後會說明如何找到並釋放這類受困情緒。


    如果有任何原因讓你無法實際執行這項測試，不要擔心，我會在第五章提供其他選擇。


    首要之務是專注於你發出的陳述或想法。保持心智平靜，讓你的潛意識透過身體的運作機制與你溝通。


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_57_0.png)


    身體往後傾


    # 受困情緒是什麼組成的？


    ## 情緒從何而來？


    宇宙中的一切，無論是以物質形式存在或看不見的事物，皆由能量組成。這些能量的特定排列方式和振動頻率決定了它們呈現在我們眼前的樣貌。在最基本的層次上，所有存在的事物都由同一種東西構成：能量。不只你是能量構成的，此時此刻，其他形式的能量也正在通過你的身體。看不見的能量以無線電波、X
    光、紅外線、思考波及情緒的形式存在我們周遭。


    > 我們好比優遊於能量大海裡的小魚。能量是組成所有事物的材料；它存在每一樣事物之中、穿過一切，並填滿宇宙的空隙。


    當能量以情緒的形式存在時，我們可以感覺到，而負面情緒能量如果被困在體內，就可能對我們產生不好的影響。受困情緒由能量組成，如同我們的身體和宇宙中其他事物都由能量構成一樣。


    數千年前的醫生對人體就已觀察入微。他們發現，人的生活如果被某種情緒支配，該情緒就會導致相關的身體疾病。舉例來說，一個被憤怒控制的人，他的肝臟和膽囊常會出現狀況；終日悲傷的人往往有肺臟或大腸的問題；經常陷入恐懼的人似乎會出現腎臟和膀胱的毛病。


    最後，人們發現情緒與身體各個器官有所關連，甚至有人相信情緒是由器官本身製造出來的。'
