    繼續用這個例子說明。現在當蘇珊說出「我的名字是萊恩·瓊斯」，然後對她進行肌肉測試時，她的肌肉會呈現強而有力的反應；如果蘇珊說「我的名字是蘇珊」，肌肉測試的結果反而暫時會是「軟弱無力」，因為她現在是代替萊恩行動。此時，無論萊恩身在何處，對代理人蘇珊施作的一切測試都等於施作在萊恩身上。


