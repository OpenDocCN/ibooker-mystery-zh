    # 讓自己放下過去情緒的包袱，迎向快樂的未來


    情緒密碼是藉由肌肉測試與潛意識建立溝通，來獲得受困情緒的資訊，然後以磁鐵滑過督脈（或脊椎）的表面，釋放受困情緒的技巧。


    潛意識以信念的形式，儲存了過去經驗的結論；這些信念可能來自祖先或父母的教養方式、童年經驗與文化的影響等等，而伴隨著信念的情感會使得信念更穩固。因此，當一套信念不能有效地解決人生問題時，藉著釋放負面情緒，有助於改變信念，解決問題。


    肌肉測試最早是由喬治·古德哈特醫師所提出。這種技巧被整脊師運用於評估人體的能量平衡與否，以及營養補充品的選擇上。讀者可以藉由閱讀本書、大衛·霍金斯的《心靈能量》與勞勃·威廉斯的《Psych-K:
    The Missing Peace in Your Life》這本書，來揣摩練習，學會這種技巧。


    在這本書中，肌肉測試是用來獲知潛意識中的受困情緒。在《心靈能量》一書中，肌肉測試被用來連結人類集體意識資料庫，以呈現心靈能量的數值。而勞勃·威廉斯更進一步指出，肌肉測試可以用來獲得來自超意識的訊息。


    本書作者尼爾森醫師發現除了磁力以外，還有一種零點能量棒（zero point energy wand）也可用於釋放受困情緒。我個人則發現市面上買得到的遠紅外線按摩滾輪與無相氣學的星隕石，也有類似的效果。


    曾有一位中年女性帶著約一、兩歲的嬰兒，到我的診所就診，希望讓嬰兒接受另類的能量療癒。這個嬰兒的問題是平常易哭鬧，不好照顧。我用情緒密碼的技巧，讓這位媽媽成為嬰兒的代理人，替嬰兒釋放掉在媽媽子宮內接收到的受困情緒。後來這位媽媽接受物理治療時，嬰兒明顯變得乖巧安靜。


    我們也許跟這個嬰兒一樣，平常的焦躁不安，甚至沮喪，是因為我們活在過去情緒的「背景噪音」之中。這些情緒可能來自傷痛的過去、童年、出生前尚在母親的子宮時，甚至來自祖先。


    我們的意識察覺不到，只因我們把這些情緒深深地埋藏在潛意識中。


    情緒密碼中的技巧，就像玩一場遊戲，我們何不藉此放下過去情緒的包袱，享受當下，並迎向快樂的未來？


    〔推薦序〕


    復健科專科醫師，身心靈整合專家 荊宇元


    ---


    # 《譯者序》

    一套簡單、易學、強大的療癒系統


    在你的意識能觀照到你的潛意識之前，它會主導你的人生，而且你會認爲這是命運的安排。


    > ——卡爾·榮格


    陳威廷


    二〇一三年夏天，身邊一位朋友憂鬱症併發厭食症復發，讓我第一次見識到情緒疾病的可怕。當時憑著一股想幫朋友的熱心及工程師蒐集資料的專長，上網找方法幫助朋友。一直以來，我都深信所有正面臨的問題在地球的另一端早已有更有智慧的人提出解決方案，而這位智者就是布萊利·尼爾森醫師。


    尼爾森醫師是美國的脊骨神經醫師，他根據二十多年的行醫經驗將疾病的成因歸納成六種不平衡，這六種不平衡分別為：


    1. 體內的病原體

    2. 器官系統失調

    3. 營養與生活型態相關問題

    4. 有毒物質影響

    5. 循環與器官系統失衡

    6. 能量相關問題


    尼爾森醫師將這六種不平衡整理成非常系統化且容易學習的工具，並命名為「身體密碼系統 2.0」。他顛覆了現代醫學以追逐症狀為導向的治療方式，相反地從「疾病成因」的角度來預防問題發生與解決問題。而本書《情緒密碼》就是「能量相關問題」中的一小部分。雖然只是疾病成因這個大拼圖的一小部分，但其威力不容小覷。


    我非常認同尼爾森醫師的理念，並且為這套簡單、易學且強大的系統感到著迷，因此踏上了我的療癒之旅。在與尼爾森醫師連絡並積極學習上手後，我成功地將這位憂鬱症併發厭食症的朋友推回生活的正軌，並解決了母親長年以來的胸痛問題。母親自退休後就開始出現不定期的胸痛問題，發作時非常痛苦。其症狀看似心肌梗塞，但到各大醫院檢查心臟和其他器官，都沒有任何異狀。這問題困擾母親超過十年之久，而在我認識情緒密碼之後，判斷應該是由「受困情緒」能量造成的，因此著手釋放母親的受困情緒與「心牆」，幾次療癒釋放了一百個以上的情緒。自此之後，母親的胸痛問題再也沒有發生過。這次經驗讓我非常震撼！除了再次驗證尼爾森醫師的發現之外，也讓我對從母親身上釋放出來的情緒感到驚訝。那些因小時生活困苦而產生的「卑微感」「羞辱」「挫折」「苦悶怨恨」「不堪負荷」等情緒能量並不會隨著時間消逝，反而會滯留在身體或潛意識中，伺機造成身體或心理問題。


    有了這樣的經驗，不禁讓我思考：為什麼這麼有系統、科學化、容易學習且強大的療法，在台灣卻鮮為人知呢？為什麼全球已有超過千位療癒師的療法，華文世界卻缺席呢？今天有此機緣讓我認識它，那就讓我來引進吧。於是，我著手準備通過療癒師資格考核、設立臉書群組推廣，並且幫助身邊的朋友療癒。在此感謝每個來到我身邊的個案，我從你們身上學到許多寶貴的療癒經驗與人生經驗。我見過情緒引起的腫瘤、器官失調、精神官能症、身體虛弱等不明原因問題在釋放情緒後，奇蹟似地改善，也見過人們的思想與自己的潛意識是多麼背離，明明頭腦想的是健康、幸福、豐盛，潛意識中的信念卻恰恰相反。若不整合意識與潛意識的觀點，在意識與潛意識背離的情況下，一輩子恐怕都得在事倍功半的苦難中掙扎。


    而透過情緒密碼釋放受困情緒的真正意義，不是將問題推離而已，更重要的是從每個事件中學習到寶實的人生經驗。以霸凌為例，假使某人因學生時期遭受霸凌，而在身、心、靈層面留下嚴重傷害，這些傷害進而引起日後的精神官能症，例如憂鬱、躁鬱、人際關係不良等問題。日後當事人每每回想，總會感到異常氣憤，覺得自己為什麼會遭受如此不公平的對待，因而久久無法平復。


    然而透過情緒密碼釋放受困情緒，我們可以將當年被霸凌所造成的受困情緒釋放。這釋放並不是將當事人「被霸凌」的這段記憶抹去，不是這樣的！而是將該事件引發的多餘情緒釋放掉，藉由這樣的釋放來改變當事人對該事件的「看法」，改變當事人如何「感知」該事件。


    這樣會造成什麼影響？如果這些情緒能量沒有被釋放掉，這些情緒就像隱形的「音叉」藏在當事人體內或潛意識中。我們都知道音叉會因為相同的共振頻率而引發共振，因此每次當事人處於類似的情境時，內在的這些受困情緒又會開始奔放，輕則讓當事人心情激動無法平復，重則影響當事人身、心、靈健康，甚至讓當事人覺得自己「遭受如此不公平的對待，那麼自己也有「權力」如此對待他人。這樣冤冤相報，不知道什麼時候才能平息。


    而受害者回頭變成加害者的情況到處可見，尤其在家庭中，很多婆媳問題都由此而起。身為婆婆的人年輕時遭受她自己婆婆的不公平對待，變成人家的婆婆後，也認為自己有權力以同樣的態度加害自己的媳婦。代代相傳的親子間家庭暴力也是如此。


    但如果我們將這事件造成的受困情緒釋放了呢？當事人對該事件的「感知」，可以從「憤恨不平」轉變為以「心平氣和」的態度來觀照此事件的人生意義。當事人可以用一顆平靜的心去分析這件事，想想：當年為什麼會被霸凌？是自己的問題，還是對方的問題？對方為什麼會霸凌我？是不是加害者內心比任何人更脆弱、更需要愛，卻只能透過這種方式（霸凌別人）偽裝自己？


    如果在這種情有可原的情況下，我願意原諒對方嗎？更重要的是，我願意原諒自己嗎？（許多遭受家暴與霸凌待遇的人內心深處是責怪自己的。）而被霸凌是如此痛苦，日後看到不公的情況，自己是否願意挺身而出，為受害者發聲？如此冷靜觀照之後，讓自己因為這件事而成長，進而轉變成懂得原諒自己、原諒他人的人，甚至成為高正義感、懂得體諒別人痛苦的人等等。


    發生在生命中的任何事件都可以讓我們學習與成長，一切只是時間早晚的問題罷了。在療癒中，我甚至見過因受困情緒無法被釋放，而困在地球超過數百年的靈魂。它們有如時間靜止般被困在虛空中無止境地等待那解不開的枷鎖消失，或是等待不知何時才會出現的救贖。每每想到這些，都讓我感慨萬千。但如果我們可以釋放這些受困情緒，讓我們有一顆平靜的心去觀照每個事件，而不是每次都被當時的情緒綁架，那我們就可以更快速地學習與成長，更快速地跨越這一切，並迎接更多生命中的美好。因為，生命的提升永遠是往內看，答案永遠在我們之內。


    我非常喜歡本書第七章提到的安妮·霍恩的故事。安妮在二十三歲（一九七五年）時經歷了瀕死經驗，她通過光與隧道，來到天堂。天使告訴安妮時辰未到，她會回到人間，並從事「打開心」的工作。天使還說會有許多人做一樣的工作，其目的是要將人心打開，這樣天堂的愛就能從這些被打開的心進入人間。而一旦達到「關鍵多數」，人間將會充滿天堂的愛，這世界也不再黑暗。安妮當時並不明白天使的意思，直到多年後認識了尼爾森醫師才恍然大悟。原來，當年天使告訴她那個「打開心」的工作，就是利用情緒密碼釋放人們的「心牆」。


    你會拿起這本書不是偶然，你的內在正呼喚著想要和安妮一樣打開自己的心、打開人們的心，讓每個人都成為那「關鍵多數」，讓天堂的愛進入人間，讓這個世界從此沒有黑暗。相信自己，只要具備信心、感激心與助己助人之心，你也可以做到。


    在療癒之路上要感謝的人太多了！感謝尼爾森醫師的支持與方智出版社出版本書，感謝每個來到我面前的個案與家人無盡的支持與包容。特別感謝廖庭均小姐的協助與寶貴意見。謝謝你們。


    最後我要提醒讀者，誠如尼爾森醫師所言，肌肉測試是上天給我們的恩典，切勿濫用這份恩典。請僅將肌肉測試用於療癒，切勿用在療癒以外的範疇。


