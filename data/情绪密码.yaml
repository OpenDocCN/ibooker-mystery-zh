    # 第 5 章 從你的內在智慧取得答案


    > 人類的大腦在本質上是不是一部與宇宙能量場相連的神奇電腦，它知道的遠比它以為自己知道的多得多？

    > E·華倫


    你已經在第二章學會用搖擺測試連結潛意識。對某些人來說，搖擺測試特別管用、特別容易學，因而變成他們唯一使用的測試方法。這當然沒問題，但在這一章，我會教一些其他方法，讓你有多樣化的選擇。


    # * 肌肉測試


    想要進入身體的內在電腦系統，最廣為使用與接受的方法，就是肌肉測試，或稱作肌肉動力學。


    ### 怕水的荷莉


    為了說明這一點，讓我分享幾年前一位名叫荷莉的年輕女子寫給我的信。她的姑姑葛雯上了很多年我的課，而且非常有效地利用肌肉測試釋放受困情緒。當她剛開始學習情緒密碼時，把荷莉當作練習對象。


    雖然有些人從未聽過，但肌肉測試並非什麼新玩意兒，早在一九四〇年代就有醫生用它來評估肌肉力量和受傷程度。如今，醫生和專門研究人體運動力學的人知道，肌肉測試的用途比一開始以為的更多。人們有時會懷疑它到底有沒有用，然而一旦親眼目睹其效果，便會大呼神奇。


    肌肉測試可以告訴我們身體的整體健康和平衡狀況。舉例說明肌肉測試的一些用途：幫助我們在疾病爆發之前找出身體的脆弱區域；讓我們可以直接問身體有何困擾，而一旦處理了那個問題，還可以讓我們知道問題是否已被矯正；告訴我們體內是否有受困情緒，並且讓我們當下就知道該情緒是否已被釋放。難怪人們看到肌肉測試的效果有多好時，會嘖嘖稱奇。


    一九九九年夏天我姑姑葛雯來猶他州時，滿嘴都在稱讚她學到的一項新技術。她說透過肌肉測試，她可以問身體關於「被困在體內」的情緒的問題，而身體會回答「是」或「不是」。她想要盡己所能利用這個新方法助人，而為了讓葛雯姑姑精通這項技術，我勉強同意當她的白老鼠。


    我還記得我站在房間裡，把手臂伸出來時，心裡想著：「這也太裝神弄鬼了吧！」然後，姑姑在我體內找到了第一個受困情緒：驚恐。我聳聳肩表示：「我沒有什麼好驚恐的啊……」


    「要不要問問這個情緒是幾歲時發生的？」葛雯姑姑問道。我又聳聳肩：「可以啊。」她向我的身體提問，而我的手臂似乎會跟著她的問題變強或變弱。當她問我的身體，這個情緒是不是發生在我四歲左右，我的手臂變得強而有力。


    「你有想起四歲時發生了什麼事嗎？」她問道。我立刻想起我小小的、無助的指頭從一道金屬欄杆往下滑，然後身體滑入高於我頭部的水中。姊姊跑來救我，我記得自己緊緊抓住她，不停地說：「謝謝你！謝謝你!」就這樣一直重複著。我不情願地答道:「噢…………有啦,我四歲時差點淹死。」


    葛雯姑姑馬上幫我檢查,看看這個事件是不是我驚恐的源頭。果真如此。於是,她用一塊磁鐵順著我的背往下滑,以釋放這個受困情緒,就這樣。太、太簡單了。我離開時邊走邊想:「這也太酷了。不過話說回來,這對我有什麼幫助?」我會告訴你,這對我有什麼幫助……


    當時我剛結束和三個孩子一起上的游泳課,我覺得那完全是浪費錢,因為孩子們老是跟我爭吵,一直在抱怨。那年夏天,我討厭死游泳課了。我發現每次一堂課要開始前,我就會變得非常焦慮;如果有合理的藉口,我們便會蹺課。然後,葛雯姑姑為我釋放受困情緒。游泳季節結束了,我並沒有想太多,但我開始感覺到內在出現了一種神祕又微妙、我無法解釋的變化。


    隔年我們又試著去上游泳課,突然間,我強烈意識到有個地方不一樣了:沒有了童年那個驚恐的記憶,我在水邊不再感到焦慮不安了。事實上，我很喜歡去游泳池，而且小孩上課時,我可以趁機看點書。更令我驚奇的，是孩子們的改變。有人會說那是因為他們長了一歲，就沒那麼怕水了，但我不同意。清除了一個非常真實、被困在我體內的情緒後，我知道我不只解放了自己，也讓我的孩子自由了。


    肌肉測試提供了一扇窗，讓我們知道身心發生了什麼事。運用肌肉測試，我們真的可以進入自己身體的內在電腦系統，找出不平衡之處。我把這個過程稱為「向身體提問」，以找出身體知道的事。我已經在診所運用多年，因為它能讓我很快地直接找到問題根源。身體電腦總是知道，因為它連接到所謂的「宇宙意識」，也就是一切萬有的資料庫。無論我示範過多少次，人們還是對肌肉測試的準確性與立即性印象深刻。對於自己的內在心智居然知道這麼多，以及它已經準備好提供他們要的資訊，人們總是大感驚奇。


