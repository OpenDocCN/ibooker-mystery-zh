  md: '然後他又可以接受測試了。

    為了說明，請想像下面這個場景：你發現自己半夜坐在車裡，車頭燈打開，但引擎熄火，車子發不動。你轉動鑰匙試圖發動汽車，引擎卻一直空轉，發出「噗噗噗噗……噗噗噗噗……噗噗噗……」的聲音。你注意到，當引擎空轉時，車頭燈就會變暗。這就類似超載時身體裡發生的事。當心智激烈空轉，忙著處理你剛剛做過的事情時，可以用來做肌肉測試的能量就會變少。


    無論怎麼做，受試者的肌肉測試都呈現「強壯」的結果

    如果無論你怎麼測試受試者，他的肌力都是「強壯的」，那麼他目前也許處於不可接受測試的狀態。在我的經驗裡，大概每五十人就有一人會暫時無法接受測試；也就是說，無論受試者做出多麼不符合真相或不真實的陳述，他們的肌肉都會維持強而有力的狀態。不過，這並非什麼嚴重的問題，也不會永久持續下去。

    我發現，導致這種狀況的原因不外乎以下兩種：受試者有脫水現象，或是頸部有一處以上的骨骼錯位。

    當一個人有脫水現象時，會直接影響到他的肌肉力量與導電性。這時你要做的，就是讓他喝杯水，然後再試一次。有時這樣就夠了。你或許也可以喝點水，因為如果你也有脫水現象，測試


