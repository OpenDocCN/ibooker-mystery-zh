  md: '# ### 受胎前的受困情緒


    雖然罕見，但我曾經發現產生於受胎之前的受困情緒，而且我指的不是遺傳來的情緒。我相信人類在受胎前是以「有意識的實體」這樣的方式存在，不具備肉體，而是以靈魂存在，能夠自行思考，而且知道這趟來到地球的旅程。


    大部分受胎前的受困情緒，都與我們即將旅居地球這件事有關。


    有時候，即使我們或許因為有機會來到地球而欣喜萬分，也似乎會對即將展開的旅程感到驚慌、害怕。要離開那個充滿愛與美的地方，來到這個滿是麻煩、暴力和戰爭的地球，就算最勇敢的心，也不免畏縮。有時，受胎前的受困情緒就跟離開天家而產生的某種哀痛或悲傷有關，但也見過非常久遠以前的感情問題造成的受困情緒。受胎前的受困情緒並不常見，但我確實見過，你以後可能也會碰到。雖然很罕見，且往往影響力強大，釋放受胎前受困情緒的方式，就跟釋放其他被困住的情緒一樣，讓意識覺知這些情緒的存在後，用磁鐵刷三次，將之釋放。


    使用情緒密碼幫助自己和他人時，你會因為看到人們的重擔一個一個被卸下，而充滿喜悅。你會看見生命被改變，人們被療癒，而心，連結在一起了。


    別放棄！雖然想要精通情緒密碼必須花一些時間，但請相信自己的療癒能力，這絕對值得你'
