  md: '# 一定要獲得對方同意


    在進行每個步驟之前，一定要向受試者說明你接下來要做什麼。如果你要將對方的手臂往下壓以進行測試，請先說明這個步驟，並取得對方同意。


    確實有可能在當事人不知道的情況下，透過自我測試去測試他人，但這是不對的。


    徵得受試者同意，以及尊重對方的意願，是非常重要的。


    沒有取得當事人同意或違反對方意願去做測試，是侵犯他人隱私且完全錯誤的行為。這是不道德的，請不要這麼做！


    此外，沒有父母或監護人的允許，也請不要測試未成年人！


