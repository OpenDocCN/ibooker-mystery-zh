  md: '# * 發生在馬兒身上的驚人療癒故事


    我的小孩以前在本地一處賽馬場上馬術課時，最後總會演變成我們幫忙飼主療癒馬兒們的受困情緒。下面這則故事就是馬主人分享的。


    從十四歲開始，我就一直參與騎術及馬術訓練，如今我也擁有一座賽馬場，並親自打理。我跟我的馬經常到全美各地參加國家馬術協會舉辦的各項賽事。


    大約一年前，我認識了尼爾森醫師和他的妻子琴恩，並有幸請他們幫我診治幾匹馬。由於治療效果顯著，且出奇地好，因此，我想跟各位分享我看見的一切。


    我養的馬都是夸特馬，這種馬原本是牧場用來趕牛羊的。


    其中有一匹我很喜歡的馬叫蝶螈，牠已經退休五年了，目前高齡十四歲。能活到這歲數，在馬界算是很罕見，但蝶螈有些毛病。


    大概十年前，蝶螈睡在蟻丘上，以致左後腿有一大塊皮膚被螞蟻咬了又咬。幾天不到，那塊皮膚上的毛就掉光了，之後也沒有真正復元。雖然後來毛有長出來，但我大概在六、七年前就不再讓牠露面，因為牠已經不太能表演了，而且我知道牠身體不舒服。蝶螈的活力不再，彷彿一瞬間蒼老許多，我都看在眼裡。過'
