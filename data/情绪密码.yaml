    # ★療癒時的溝通不一定要透過語言


    療癒者和療癒對象之間的溝通並不一定要透過語言，我自己許多年前就有過這樣的經驗。那時我習慣用「腿長測試」來評估病人的狀況，多年來都用得很順手。要學會並精通腿長測試必須花比較多時間，我在這裡就省略不提，有興趣的人可以上我建立的網站學習：HealersLibrary.com。


    腿長測試其實是另一種形式的肌肉測試，只不過身體是透過腿長變化而非肌力變化提供答案。我很快就知道，運用這種測試法，身體很容易便會給我答案，就和其他測試法一樣。因此，腿長測試成了我從病人身體獲取答案的主要方法。事實上，多年來我在治療大部分患者時，第一件事就是請他們臉朝下趴著，然後透過是非題提問，病人的身體會藉由腿長變化給出答案。如果答案為「是」，雙腿長度就會一致；假如答案為「否」，病人的雙腿就會不一樣長。我每次測試都見效，直到有一天發生了一件有趣的事。


    當時我正在診療一名患者，快要結束時，我雙眼往下檢查他的腿長，發現他兩條腿的長度完美平衡。然後，我將視線上移，看著他的背部，並且閒閒地將注意力轉到他右邊的腎臟，關注了一會兒。接著，我再次檢查他的腿長，突然發現他雙腿的長度居然不一樣。我放鬆自己，然後視線上移，這次則將注意力放在他左邊的腎臟。之後，我又檢查他的腿長，發現兩條腿的長度是均'
  - '[PAGE 162]


    衡的。

    我再次想著他的右臂，想了一會兒，之後又檢查腿部長度，發現雙腿明顯不一樣長，讓我驚

    詫不已！如同你可以想像的，這名患者的右臂確實出了問題。事實上，他身體的那個區域有個受

    困情緒，導致右臂不平衡。釋放那個受困情緒後，即使我想著他的右臂，他的腿長也不會發生變

    化了，因為讓那顆腎臟失衡的因素已經不存在了。

    這次的經驗讓我頓悟，我立刻將這份知識運用在其他病人身上。從那時起，默默對身體發問

