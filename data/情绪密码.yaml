    # 「隱藏的」這個詞的使用時機


    這真的很簡單，你只要問：「你是否有心牆？」然後利用你選擇的肌肉測試法，讓身體告訴你答案。

    在我的經驗裡，大約八成的人都有心牆。


    當你詢問「你是否有心牆」，然後得到否定的答案時，也許有另一種可能。很多時候，心牆都是隱而未現的，除非你在問句或陳述句裡用了「隱藏的」這個詞。心牆的目的是為了保護一個人的心；換句話說，它是為了把心隱藏起來，讓心不被那些可能導致情緒傷害的人事物所傷。有時，心牆似乎隱藏得太好了，以致難以被發現，但只要你特意在問句中加上「隱藏的」這個詞，它就會顯現出來。


    要確認有沒有這種可能性，你只須在問句或陳述句裡加上「隱藏的」三個字。比方說，你可以問：「你是否有心牆？」如果對方有一道心牆，而且是隱而未現的，這時就會被揭露出來。

    這個訣竅很重要，請銘記在心。很多時候，我都是用了「隱藏的」這個詞，才找到受試者的心牆。'
  - '[PAGE 242]


    隱藏的心牆和一般心牆沒有不同，只是比較難被發現罷了。

    一旦身體敞開來讓你知道那裡有一道隱藏起來的心牆，你就可以不必使用「隱藏的」這個詞，因為它已經不再藏起來了。


    # 心牆準備好要被釋放了嗎？


    一旦確認心牆存在，就問：「我們現在可以從心牆上釋放一個情緒嗎？」即使擁有心牆最終會對個人的健康和福祉產生負面影響，但心牆之所以存在一定有它的理由。有些人的處境讓他們暫時還沒準備好，或是不願意放棄心牆提供的保護，請你務必尊重這一點。

    如果心牆確實存在，但詢問能否將之移除時，卻得到否定的回應，受試者可能要好好想想潛意識為什麼會給出這樣的答案。是因為不安全，或者因為身心目前正在處理其他事情而不堪負荷？無論如何，受試者都應該聽從潛意識，因為潛意識知道什麼對他們最好。

    若得到肯定的答案，你只要照著第六章敘述的步驟操作即可。為了方便你使用，可以翻到第252頁，參考「釋放心牆流程圖」。

    無論受困情緒有沒有組成心牆，利用情緒密碼將之釋放的流程都是一樣的。當你詢問「我們現在可以從心牆上釋放一個情緒嗎」，然後得到肯定的答案時，身心早已選好一個它願意釋放的'
