    # ### ★受困情緒其實很普遍


    雖然不太可能透過肉眼判別，但差不多所有人都有受困情緒。我執業的那些年幾乎沒治療過沒有可識別的受困情緒的病人，記憶中只碰過一個。這個人花了許多時間靜心，在我眼中是個平靜、仁慈、泰然自若的人，很能掌控自己的情緒。我剛剛是不是說了「掌控自己的情緒」？是的，我會在第十章進一步說明這個主題，讓大家知道如何在未來避免受困情緒產生。


    僅僅因為經歷過的事，以及在人生旅程的此刻自己是什麼樣的人，就讓我們絕大多數人都有受困情緒。


    當某人經歷創傷或引發強烈情緒的事件，如車禍、爭吵或離婚時，就會產生與該事件有關的受困情緒能量。然而，並非每個情緒事件都會創造出受困情緒。人的身體是被設計來處理一般情況下的情緒能量，所以，當某個情緒被困住了，有部分是因為情有可原的狀況，如抵抗力下降、太過疲勞或身心失衡。當身體不是處於最佳狀態時，我們會比較容易產生受困情緒。


    恐懼。他的幽閉恐懼症消失了，畏畏縮縮的態度也是，完全成了一個開朗、快樂、充滿好奇心的小孩。'
