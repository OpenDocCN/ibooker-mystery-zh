  md: '# 天使神秘學院官方淘宝: http://strc.taobao.com


    089 第1部 受困情緒這樣影響你的人生


    傑克高中時期是個網球選手,但有好多年沒有拿起球拍了。受困情緒往往會被吸引到身體比較脆弱的地方,亦即那些有過多壓力、受了傷、受到感染,或是有其他某種失衡狀況的部位。這些受困情緒滯留在傑克的前臂組織,我認為是因為高中時代他的前臂一再承受壓力,甚至受過一定程度的傷;然後同時期,他因感情受挫而產生受困情緒——記得受困情緒很有可能停留在身體最脆弱的部位吧?


