  md: '# 單手測試法


    相反，會讓肌肉變弱。

    「是」與「不是」也會有類似的效果。「是」這個詞是正面的，如果你的陳述句是真實的或正面的，肌肉測試結果就會是強的，或者你的身體會向前傾。「不是」則是個負面的詞，若你的陳述句是不真實的或負面的，肌肉測試結果就會是疲弱的，或者你的身體會往後傾。

