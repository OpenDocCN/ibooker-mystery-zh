    # 按壓手臂肌肉測試的施作訣竅


    這裡提供幾個訣竅，幫助你改進並精通這項肌肉測試技巧。


    1. 別太用力，使用足夠得到答案的力道即可。重點在於手法的巧妙，而非力量的強弱。

