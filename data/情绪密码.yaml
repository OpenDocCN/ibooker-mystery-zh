    # 讓自己放下過去情緒的包袱，迎向快樂的未來


    情緒密碼是藉由肌肉測試與潛意識建立溝通，來獲得受困情緒的資訊，然後以磁鐵滑過督脈（或脊椎）的表面，釋放受困情緒的技巧。


    潛意識以信念的形式，儲存了過去經驗的結論；這些信念可能來自祖先或父母的教養方式、童年經驗與文化的影響等等，而伴隨著信念的情感會使得信念更穩固。因此，當一套信念不能有效地解決人生問題時，藉著釋放負面情緒，有助於改變信念，解決問題。


    肌肉測試最早是由喬治·古德哈特醫師所提出。這種技巧被整脊師運用於評估人體的能量平衡與否，以及營養補充品的選擇上。讀者可以藉由閱讀本書、大衛·霍金斯的《心靈能量》與勞勃·威廉斯的《Psych-K:
    The Missing Peace in Your Life》這本書，來揣摩練習，學會這種技巧。


    在這本書中，肌肉測試是用來獲知潛意識中的受困情緒。在《心靈能量》一書中，肌肉測試被用來連結人類集體意識資料庫，以呈現心靈能量的數值。而勞勃·威廉斯更進一步指出，肌肉


    〔推薦序〕


    復健科專科醫師，身心靈整合專家 荊宇元'
