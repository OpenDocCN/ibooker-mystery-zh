  md: '# ## 第3部 情緒密碼這樣用


    內、出生過程中，以及出生後的任何時刻形成。小孩一出生就帶有受困情緒是很常見的，一出生就有心牆倒是罕見，不過還是有這種案例。

    每個小孩都是寶貝！如今只要透過替代者測試，你就可以在許多情況中幫助孩子，因為情緒密碼也能施作在小孩子身上。面臨壓力和艱困處境的小孩當然會有受困情緒，但任何一個孩子——無論他得到多少愛或家庭環境好壞——都有可能產生受困情緒。


