  md: '# 第3部 情緒密碼這樣用


    「心牆是什麼？」我問道，「我不明白。」

    她說：「沒關係，你不需要知道它是什麼，我會幫你檢查。

    測試之後，她說我沒有心牆。

    接著她又說：「不然看看你有沒有隱藏的心牆好了。」

    「好啊。」我說，「不過這到底是什麼？」

    「沒事，」她笑著說，「你不需要了解。」


    她幫我檢查我有沒有隱藏的心牆，結果還是沒有。接著，她向我解釋情緒是

    如何累積成一道牆，這道牆又是如何讓你的心與其他人隔絕開來。如果她發現有

    心牆存在，她會用磁鐵滑過那個人的背部，釋放那些情緒，好讓對方的心敞開。

    我幾乎不敢相信我耳朵聽到的事。那一瞬間，彷彿有電流通過我全身。二十五

    年前發生在我身上的那件事突然說得通了，那是我二十三歲時經歷的重大事件。

    二十三歲時，我死過一次。那是一個激烈的死亡過程，我經歷了其他上千萬

    人也有過的「瀕死經驗」。但在我二十三歲時，沒有人討論這種事，至少我從沒

    聽過有人看見一條隧道或一道白光之類的。

    我離開了自己的身體，然後回顧我的一生，這對我來說是無比重要的經驗。

    那時我還非常年輕，從沒做過什麼轟轟烈烈的事，但我要回去了，回到天上的家。'
