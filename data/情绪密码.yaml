    # * 茱莉的故事：受困情緒如何影響孩子的健康與心理發展


    茱莉是個「毒癮寶寶」，出生後頭一天就被送到寄養家庭，而寄養家庭希望可以領養她。但茱莉的問題不是只有毒癮。我還記得第一次見到茱莉時，她才兩歲半，被診斷出有腦性麻痺、智能遲滯及嚴重的氣喘問題，同時還有注意力不足過動症。她的行為舉止如同一隻野生小動物。茱莉一直處於極度煩躁不安的狀態，如果可以，我覺得她真的會翻牆而出，逃離我的診療室。茱莉無法和其他孩子互動，也不想玩玩具。她一刻也靜不下來，甚至根本坐不住，而且也不說話。每次她發脾氣，就會持續好幾個小時。在接受我的治療之前，她已經因為氣喘多次進出醫院，而且必須透過機器改善呼吸問題。令人覺得安慰的是，寄養媽媽對她非常有耐心。透過替代者為茱莉測試後，我立刻發現她有心牆及其他失衡問題。接下來要提到的都是構成她心牆的受困情緒。當時我們花了一個月，在每次的療程中幫她釋放一個心牆上的受困情緒。


