    有些人很容易就能學會自我測試。這種類型的測試法最困難的地方在於它的「主觀性」。人往往會質疑自我測試得來的每個答案，但你就是必須相信自己，相信答案的來處——你的潛意識。


    我發現自我測試是個無價之寶，雖然需要花時間練習，而且一開始似乎怎麼都學不會，但只要能堅持下去，我相信最後也會同意這是個無價之寶。


