    # 與健康息息相關的人體能量場


    數十年前，科學界否認人體能量場的存在，但目前這種情況已經大大改變。科學家現在在穩定能量場存在，隨著新科技出現，他們已經可以透過試驗確認其存在的事實。舉例來說，有一種叫作「超導量子干涉磁量儀」的儀器可以偵測人體生化及生理活動產生的微小磁場。


    利用這種儀器，科學家得知人體所有的器官和組織都會發出特定的磁性振動，他們稱之為生物磁場。


    雖然不是所有醫生都知道，但比起傳統的電子測量方式，如腦波圖及心電圖，人體周遭的生物磁場可以讓醫生更準確地解讀病人的健康狀況。


    事實上，科學家現在知道心臟的電磁場非常強大，在距離身體三呎之處都可以測到準確的心電圖讀數。


    人體任何一個點和電磁場中任何一處都能測到讀數，因為這個電磁場本身是以三維——或說全息——的方式涵蓋資訊。


    現在的醫生從他們的教授那裡學到知識，而教授的知識又是從以前的教授那裡承襲而來。西方醫學屬於經驗主義，是根據觀察而來。若某樣事物沒辦法被觀察到，就無法被驗證；如果無法被驗證，那麼它就不是真的。


    儘管有這些缺點，跟隨西方醫學模式的醫生還是促成了史上一些非常了不起的醫學進展。他們開發出測試精密度度的重要方法、突破性的外科手術程序和先進技術。這種模式有許多優勢，但也有不利之處。


    一九四〇年代，耶魯大學一位著名的醫學研究者哈拉德·薩克斯頓·伯爾博士即主張：早在生理症狀顯現之前，就可以在人體能量場中偵測到病變。雖然當時的技術限制讓他無法做到，但伯爾博士建議可以透過調整或操控能量場來預防疾病。他的醫學同僚認為他的想法不可能實現又牽強，這也許是因為他們在念醫學院時沒有學過這種可能性。


    時至今日，傳統西方醫學在治療時依舊沒有考慮到能量場的重要性，所以，病人常常因為醫生沒有注意到他們疾病的根本原因，而受了不必要的苦。


    然而，許多從前被人嘲笑的非傳統療法，近來愈來愈受重視——一部分是因為科技進步了，科學家得以更準確地檢驗，一部分則是因為這些替代療法確實有效。


    現在，主流科學界甚至開始承認幾千年來中醫在治療時運用的經絡是存在的。針灸的能量治療效力尤其受到認可，即使醫學界尚未完全了解。此外，整脊也在臨床試驗中被證實有持久而顯著的益處——這一點，脊骨神經醫師和病人已經知道超過一百年了。


    大量證據顯示，人體是一個充滿能量的、振動的、情緒上的、靈性上的實體。當我們知道了能量和宇宙的本質，以及萬事萬物是如何持續與其他事物交流，就會發現從前那種機械論方法太受限、太簡單化了。如同賽門·米歇爾在他的著作《癌症不要來》指出的：


