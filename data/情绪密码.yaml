  md: '# ## 天使神秘学院官方淘宝：http://strc.taobao.com


    257 第 3 部 情緒密碼這樣用


    如果碰觸圍籬的人牽著另一個人，被牽住的那個人就會因此有觸電的感覺，碰觸電圍籬的人反而會覺得⋯⋯什麼事也沒有；換句話說，碰觸電圍籬的人只是扮演傳導電流的角色，好比一條延長線。


    沒多久，只要是在農場工作過的人都發現了這個秘密，只要是在電圍籬農場長大的人都會告訴你，他們玩過這個把戲。我還記得某天與朋友聊到這個現象，朋友記得他曾經位在電圍籬延伸出來的人鏈末端，也因此一直有觸電的感覺，直到他找到下一個人。就是這麼神奇。


    替代者測試也是以類似的原理運作。你可以把接受測試的當事人想成「人體電圍籬」，他們全身布滿電流，而必須進入這樣的電流場。替代者測試要當事人在場才能進行，替代者藉由碰觸當事人產生連結，測試者則在替代者身上執行肌肉測試，而非當事人。


    替代者測試適用於任何當事人在現場卻無法接受測試的情況。


    無法接受測試的可能原因如下：


    1. 年齡，例如當事人是嬰兒、幼童或長者。


    2. 身體上的限制，例如受傷、生病、疼痛、虛弱、脫水或頸椎錯位。


    3. 失去意識，例如處於睡眠或昏迷狀態。


    4. 因智能遲滯導致失能，或者你要幫助的對象是動物。


    獲取更多好書，請加微信：13641926204 或 QQ：715104687'
