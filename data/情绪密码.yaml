    「而且牠隨時隨地都在發抖。」凱西補充道，並且把小支舉起來，好讓我看見牠抖得有多厲害。

    「獸醫認為可能是傷到了神經，」博特繼續說，「而且這個情況可能會持續一輩子，他也無能為力。」

    凱西把小支放在診療檯上，讓我仔細幫牠檢查。我發現小支的脊椎有幾處錯位，跟我預期的差不多，於是我幫牠調整了一下。

    「其實我們心裡糾結的是，」凱西繼續說，「安樂死不知道對牠會不會比較好……」

    「小支現在的生活品質比起從前有很大的落差，」博特說，「牠在我們跟前既不吠，也不跑，跟從前的模樣大相逕庭。我們去哪兒都必須帶著牠，牠的好奇心全然消失，好像一直在受苦。」'
