  md: '影快開演了，自己就要遲到了，因此變得心煩意亂。好不容易等到帳單來了，你發現自己的卡刷爆了，於是你選擇覺得憤怒或丟臉，或者兩種情緒都有。當事情不如己意時，我們可能會非常火大，在這種情況下感受到的強烈情緒可能會有一、兩個被困在身體裡，但一年後，你也許很難再想起這件事，尤其如果你選擇不要停留在這個負面經驗裡。幾年後，被困住的情緒還是在那裡，但現在要有意識地想起這件事可能變得很難了。


