    # ★ 受困情緒在心理層面的影響


    受困情緒會在身體及心理兩個不同層面影響你。我們先來探討心理層面的影響。受困情緒會讓人出現過激的情緒反應，接下來的幾個真實案例在在說明了，受困情緒對一個人的心理有著顯著影響。


    # 瑪莉失去兒子的創傷


    瑪莉是個五十多歲、美麗又善良的女士，來找我看診的一年前，她的獨生愛子被殘忍地謀殺身亡。你可以想像，獨子死亡對瑪莉來說是個非常可怕的打擊；更糟的是，對凶手的審判在法庭一再被拖延，讓她想放也放不下。

    第一次來找我時，瑪莉正處於生命的低潮。在兒子被謀殺身亡後的一年間，她完全被困在失去所愛的哀痛中。經過測試，我們接連找到幾個跟她兒子及其死亡有關的受困情緒。釋放那些被困住的情緒之後，瑪莉自由了，回復到以前那個身心平衡的她。雖然還是會想念兒子，而且會永遠感覺到他已經不在了，瑪莉依然是我所認識最快樂、最身心平衡的人之一。'
