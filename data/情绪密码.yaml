  md: '他人隔絕開來。過往的創傷如此真切，它們造成的痛苦遠超過你當時所能負荷及感受的程度，這正是心牆產生的背景。然而，直到拆除心牆之前，你某種程度上都會為其所困。它將使你較難與他人產生連結，即使是你最愛的人也一樣。


