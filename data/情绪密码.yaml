    # 人在日本的艾莉森被療癒了


    我曾經治療過我診所附近一所舞蹈學校的幾位芭蕾舞者，其中一位名叫艾莉森的舞者跟著迪士尼的團隊到日本演出。某天傍晚，她母親憂心忡忡地打電話給我：「尼爾森醫師，我們遇上大麻煩了。艾莉森的臀部受傷，現在無法跳舞。她明天就要登台演出了，你能不能想法子幫忙？」


    我表明必須先和艾莉森談談才行，她母親便給我艾莉森在日本住的飯店的電話。接通電話後，艾莉森向我描述她臀部的問題。她說她的臀部當天毫無緣由地出現異常狀況，後來連走路都有困難，隔天根本不可能登台表演。


    取得艾莉森和她母親的測試同意後，我請琴恩擔任艾莉森的代理人。


    雖然艾莉森遠在地球的另一端，但是要完成她與代理人之間的連結，一點也沒有問題。


    為了方便取得艾莉森的資訊和即時回饋，我們打電話給艾莉森，但你不一定要這麼做。請注


    在當事人不在現場或因為某種理由無法來接受測試的情況下，代理人測試是最好的選擇。代理測試法讓你以為不在現場的人釋放受困情緒，實際上是一種遠距療癒形式。雖然遠距療癒目前尚未被併入西方醫學中，但無論古今都出現許多這類令人崇敬的技術，如西瓦心靈術、氣功、靈氣等。'
  - '[PAGE 274]


    意，進行代理人測試時，你不一定要和當事人通上電話。代理人和當事人之間只要透過能量連結就夠了。


    距離對能量而言不構成任何阻礙。能量無所不在，充滿整個世界，實際上是充滿整個無邊無際的空間。


    物體之間的能量與物體內部的能量同樣充沛。因為能量具有連續不斷與無所不在的特性，因此療癒艾莉森沒有任何困難。


    我們發現有兩個受困情緒滯留在艾莉森的臀部組織，這兩個情緒和日本之行給她的寂寞與悲傷感受有關。


    我在電話上問艾莉森：「你是不是覺得不想待在日本？」


    她不情願地承認：「能來這裡確實很讓人興奮，但我很想家，好想念我媽和家鄉的夥伴。不知怎麼地，我就是不想待在這裡，真的好希望可以回家。」


    我用磁鐵滑過琴恩的背，釋放艾莉森這兩個受困情緒。


    雖然艾莉森當時在地球另一端的日本，療癒成效還是立刻出現，絲毫不受影響。


