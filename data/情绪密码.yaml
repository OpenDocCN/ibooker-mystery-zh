    ## 找到正確那一欄


    我們來看看這張表。請注意，表中的每一列都包含了由兩個器官其中之一產生的情緒。例如，第一列的情緒是由心臟或小腸產生的。你可能還記得，所有的情緒都源自身體器官，而這兩個器官會在體內產生相同的情緒。表中其他器官產生的情緒，可在它們各自那一列找到。對我們而言，一個受困情緒源自哪個器官並不重要，只要我們可以認出它來，並將之釋放。


    整個流程進行過幾次後，就會變得相當簡單又快速，你會很驚訝地發現自己竟可以這麼快就找到受困情緒。請記住，潛意識一直知道那個受困情緒是什麼，你做的測試只是去確定潛意識早已知道的事。


    即使受試者從未實際見過這張受困情緒表，他的潛意識也能「看見」！事實上，在測試時，最好別讓受試者看到這張表，否則他可能會「選擇」其中一個情緒，來讓測試結果呈現強或弱的反應。他以為這樣做是在幫你，其實是幫倒忙。如果你想在療程開始時讓對方看一次這張受困情緒表，沒有關係，但就算他自己從未看過這張表，他的潛意識還是「讀」得到，因為其潛意識連結到宇宙意識。你可以嘗試看看會有什麼結果。


    你可以從下面這個問題開始整個探問的過程：「這個受困情緒是在 A 欄嗎？」然後進行肌肉測試。如果答案為「是」，你可以問：「這個受困情緒是在 B 欄嗎？」藉由得到「不是」這個答案，來檢驗正確性。


    每一次只能尋找一個受困情緒，而且它只會在兩欄的其中之一，因此，這兩個問題只會有一個是真的。


    如果身體給出矛盾的答案，例如告訴你受困情緒在 A 欄也在 B 欄，那麼你只是沒有得到一個好答案而已。此時，不妨做個深呼吸，重新集中注意力，讓自己的心充滿對你想要幫助的那個人的愛（如果你施作的對象是自己，那就讓你的心充滿對自己的愛），同時默禱祈求神的幫助，相信你可以得到正確的回應，並對即將找到答案心懷感恩，然後再試一次。請注意，如果你要找的那個情緒不在第
    179 頁的受困情緒表上，對方的潛意識會在這張表上選擇一個最接近的情緒，所以，你只需要這張受困情緒表就夠了。


    ## 找到正確那一列


    確定受困情緒在哪一欄後，你已經把搜尋範圍縮減了一半，接下來就是判定它在哪一列。我們可以由最上面開始一列一列往下問，但為了加快速度，我為每一列編號了（第一列到第六列）。因此，不需要一列一列問，我們立刻就能排除好幾列。


    你可以問：「這個受困情緒是在奇数列嗎？」如果答案是否定的，你就知道它一定是在第二、第四或第六列；假如答案是肯定的，你就知道该受困情绪是在奇数列了。为了方便说明，我们必须假定它在其中哪一列。第三或第五列。接下来，我们必须判定它在第一列。


    你可以这样问：「这个受困情绪是在第一列吗？」


    如果答案是否，就继续问：「这个受困情绪是在第三列吗？」


    如果还不是，就询问是否在第五列。


    找到正确的栏、列之后，你已经把搜寻范围缩小到只剩五个可能的情绪。


    假设你判定该受困情绪在 A 栏的第五列，我们来看看表中的那一格有哪五个情绪（见上表）。


    再强调一次，受试者的潜意识明确知道你要找的受困情绪是哪一个。


    而透过肌肉测试精准找出该情绪，你便让受试者的「意识」觉察到这个受困情绪了。


    ## ★ 找到正確的情緒


    想要釋放受困情緒，這是一個不可或缺的必要步驟。受困情緒必須被表達出來，才能被釋放。藉由確認並將之帶入意識層次，我們證實了該情緒的存在，並在某種程度上了結當初創造它的情境。


    從某種意義上來說，我們讓受困情緒發聲，讓它被聽見。如果不這麼做，該受困情緒會一直製造身體疼痛或情緒障礙（或兩者都有），好讓我們感受到它的存在。


    為了找出到底是哪個情緒被困住，你要做的只有一件事：開口問。


    比方說，在這個例子中，你可以從 A 欄第五列的第一個情緒開始問：「這個受困情緒是責備嗎？」然後進行肌肉測試，答案非是即否。


    以同樣的方式依序測試每個情緒（一次一個），直到你確信自己找到正確的情緒了。如果清單上的第一個情緒就給了你肯定的答案，為了檢驗正確性，聰明如你會去測試下一個情緒，這時應該會得到否定的答案。記住，一次只能測試一個情緒，而且一次只會有一種結果。


    清楚自己在問什麼非常重要，你的意念和說出的話語必須保持一致。請注意這一點，這樣才不會把潛意識弄糊塗了。


    此外，請丟掉你對這個過程可能有的焦慮。焦慮是一種恐懼，而信心與恐懼無法並存！


    ## 提問訣竅


    以陳述句或疑問句來提問最好。假設該受困情緒是「懼怕」，那麼你可以說：「這個受困情緒是懼怕。」然後你會得到一個肯定的答案。


    如果改用疑問句形式：「這個受困情緒是懼怕嗎？」你也會得到一個肯定的答案。


    兩種詢問方式效果是一樣的，無論哪一種說法，身體都會給你相同的回應。


    如果你只是順著清單念出「懼怕」這個詞，而不是讓它以陳述句或疑問句的形式呈現，可能會得到一個混亂的答案。當你只是說「懼怕」時，即使那個被困住的情緒就是「懼怕」，你的身體也可能會在搖擺測試中往後傾，或者在肌肉測試中呈現軟弱的肌力。假如你只是拋出這個詞，潛意識也許無法正確解讀你的意思，而僅針對這個詞本身的負面能量做出反應。


    ## 找出受困情緒後


    一旦找到受困情緒，恭喜你，你已經學會情緒密碼中一個非常重要的部分了！你的覺知的一個全然不同的面向已經在你眼前展開，而你現在正在學習汲取自己的靈性智慧，只要持續練習，這項能力就會一直幫助你。'
