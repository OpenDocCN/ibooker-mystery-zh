  md: '# 為失去意識的人測試


    替代者測試讓我們可以為失去意識或陷入昏迷的人進行測試。當事人即使無法做出回應或透過言語回答，他們的潛意識依舊一刻不停地運作著。一個人雖然失去意識，他的身體功能還是在運作，呼吸正常，心臟也持續跳動，其潛意識依舊隨時對外在環境保持警覺，以確保一切都在控制之中。當你問潛意識問題，它會知道答案。假使當事人處於失去意識的狀態，無法主動參與測試，替代者測試就成了最佳解決方案。


    就可以直接參與測試！但我還是直接幫牠們安排一位替代者比較快。

    假設你想要測試你的馬，可以請替代者直接碰觸馬，然後將你要問馬的問題說出來，接著在替代者身上執行測試。

    我在測試動物時，總是直接對牠們說話，就像對人說話一樣。動物也許不明白字面上的意思，但牠們似乎可以接收到我們的想法傳達出來的情緒意念。相信我，動物可以了解我們要對牠們做什麼，牠們感受意念的能力很多時候甚至超越人類。

    替代者測試適用於貓、狗及其他所有動物。我有許多非常精采的情緒密碼療癒經驗都發生在動物身上，我會在下一章詳述這些故事。'
  merge: -1
  pgno: 270
- img_proc: true
  md: '請注意，肌肉測試不應該用在緊急狀況，例如需要進行搶救時，心肺復甦術才是合宜的措施。


    幾年前，我父親因為大腦動脈瘤陷入昏迷，我真是憂心忡忡，想盡一切辦法幫助他。我和琴恩一起去醫院看他，當時他身體插滿管子，還有其他管線纏繞在身上，那樣的情況根本不允許我們接近他到可以為他進行肌肉測試的距離。


    我只好請琴恩當我父親的替代者。雖然他處於昏迷狀態，我們依舊可以進入他的潛意識。透過測試，我們找出除了醫護人員所做的處置之外對他最有幫助的辦法。那次執行替代者測試的經驗，讓我對這項恩典充滿感激之情。


    # ★取得療癒對象的同意


    請記住，在使用情緒密碼療癒他人之前，無論是直接施作在對方身上，或是透過替代者或代理人測試，你都必須先徵得對方的同意。下頁的表格列出一些基本原則，讓你知道在不同的情況下應該取得誰的同意。'
  merge: -1
  pgno: 271
- img_proc: true
  md: '| 測試對象 | 取得同意對象 |

    |---|---|

    | 意識清楚的成年人 | 本人 |

    | 失去意識的成年人 | 受試者最親近的成人親屬 |

    | 未成年人 | 其父母或監護人 |

    | 寵物 | 寵物的主人 |


    替代者測試是非常好用的工具, 為了讓療癒效果發揮到淋漓盡致, 這項工具是不可或缺的。若療癒對象是寵物、嬰兒、幼童, 或是失去意識、極度虛弱或處於極度疼痛狀態而無法接受測試的人,
    運用替代者測試就不成問題。


    # * 代理人測試


    獲得授權、可以代表他人的人, 稱作代理人。代理就是代替他人行動的意思。執行代理人測試時, 代理人必須暫時「成爲」那個當事人。代理人透過自願「成爲」他所代理的人而嘉惠對方,這時施作在代理人身上的所有測試,
    就像直接施作在他所代理的人身上一樣。'
  merge: -1
  pgno: 272
- img_proc: true
  md: '# 人在日本的艾莉森被療癒了


    我曾經治療過我診所附近一所舞蹈學校的幾位芭蕾舞者，其中一位名叫艾莉森的舞者跟著迪士尼的團隊到日本演出。某天傍晚，她母親憂心忡忡地打電話給我：「尼爾森醫師，我們遇上大麻煩了。艾莉森的臀部受傷，現在無法跳舞。她明天就要登台演出了，你能不能想法子幫忙？」


    我表明必須先和艾莉森談談才行，她母親便給我艾莉森在日本住的飯店的電話。接通電話後，艾莉森向我描述她臀部的問題。她說她的臀部當天毫無緣由地出現異常狀況，後來連走路都有困難，隔天根本不可能登台表演。


    取得艾莉森和她母親的測試同意後，我請琴恩擔任艾莉森的代理人。


    雖然艾莉森遠在地球的另一端，但是要完成她與代理人之間的連結，一點也沒有問題。


    為了方便取得艾莉森的資訊和即時回饋，我們打電話給艾莉森，但你不一定要這麼做。請注


    在當事人不在現場或因為某種理由無法來接受測試的情況下，代理人測試是最好的選擇。代理測試法讓你以為不在現場的人釋放受困情緒，實際上是一種遠距療癒形式。雖然遠距療癒目前尚未被併入西方醫學中，但無論古今都出現許多這類令人崇敬的技術，如西瓦心靈術、氣功、靈氣等。'
