    # 第3部 情緒密碼這樣用


    我們全都看著小支，那坐在診療檯上發抖的小狗。牠的眼神裡盡是恐懼，模樣說有多慘就有多慘。


    不難想像在被攻擊和擄走的瞬間，這隻小狗體驗到多麼驚恐的情緒。我判斷這一切很有可能是因為受困情緒在牠體內作祟。取得博特和凱西的同意後，我向他們解釋何謂替代者測試，並請他們其中一人擔任小支的替代者。


    當我問牠是不是有個受困情緒時，答案為「是」。我想當然地認爲這個情緒應該是恐懼或驚恐，但是當我逐漸縮小答案的範圍時，我很驚訝地發現，被土狼挾持的當下充滿這小狗心靈的情緒竟不是驚恐，也不是任何類似的情緒，而是悲傷。


    被那隻土狼咬在嘴裡時，小支心裡想的全是牠可能再也見不到博特和凱西了。一想到這裡，強大的悲傷淹沒了牠。


    一旦找到這個受困情緒，我很快地用磁鐵將之釋放，治療就結束了。


    當我把小支放到地上時，牠就像一顆衝出槍管的子彈，飛也似地衝了出去，穿過走廊，跑進候診室。之前被凱西抱著進入那個候診室時，牠抖得很厲害，抖到彷彿沒有注意到那裡有人在；現在，牠用好幾聲友善、健康的吠叫，向候診室裡的每個病人打招呼。接著，牠沿著走廊向前衝，往每個房間探頭探腦，並奉送幾聲狗吠，最後終於回到凱西和博特跟前，快樂地搖著牠的狗尾巴。這立竿見影的效果真是驚人！我們都大感驚奇，對這奇蹟般的療癒結果感動不已。博特和凱'
