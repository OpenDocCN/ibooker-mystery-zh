    # ## 天使神秘学院官方淘宝：http://strc.taobao.com


    257 第 3 部 情緒密碼這樣用


    如果碰觸圍籬的人牽著另一個人，被牽住的那個人就會因此有觸電的感覺，碰觸電圍籬的人反而會覺得⋯⋯什麼事也沒有；換句話說，碰觸電圍籬的人只是扮演傳導電流的角色，好比一條延長線。


    沒多久，只要是在農場工作過的人都發現了這個秘密，只要是在電圍籬農場長大的人都會告訴你，他們玩過這個把戲。我還記得某天與朋友聊到這個現象，朋友記得他曾經位在電圍籬延伸出來的人鏈末端，也因此一直有觸電的感覺，直到他找到下一個人。就是這麼神奇。


    替代者測試也是以類似的原理運作。你可以把接受測試的當事人想成「人體電圍籬」，他們全身布滿電流，而必須進入這樣的電流場。替代者測試要當事人在場才能進行，替代者藉由碰觸當事人產生連結，測試者則在替代者身上執行肌肉測試，而非當事人。


    替代者測試適用於任何當事人在現場卻無法接受測試的情況。


    無法接受測試的可能原因如下：


    1. 年齡，例如當事人是嬰兒、幼童或長者。


    2. 身體上的限制，例如受傷、生病、疼痛、虛弱、脫水或頸椎錯位。


    3. 失去意識，例如處於睡眠或昏迷狀態。


    4. 因智能遲滯導致失能，或者你要幫助的對象是動物。


    獲取更多好書，請加微信：13641926204 或 QQ：715104687'
  - '[PAGE 260]


    假設你的測試對象是嬰兒，任何一位目前處於可測試狀態的人都可作為替代者。如果測試對象是孩童，你可以選擇他的母親或父親，或是任何一位他覺得親近或相處自在的人作為他的替代者。當然，如果你不是孩子的父親或母親，測試前請先取得孩子父母的同意。


    > 只要是當下處於可測試狀態的人，都可以為任何人擔任替代者。


    這些年來，我已經把替代者測試視為肌肉測試不可或缺的輔助工具。如果為某人測試時，得到的結果反覆無常，並不一致，我會建議在你和當事人間安插一位替代者，然後在替代者身上執行肌肉測試，這樣就會得到一致的結果。藉由替代者的幫助，你往往會發現找尋答案變得更容易。


    你會注意到，有些人就是比別人容易測試。例如，我妻子琴恩就是非常容易測試的人，我倆一起工作，所以我經常請她擔任替代者。


    # 如何進行替代者測試？


    執行替代者測試的首要之務，就是確保替代者本身處於可測試狀態。你可以像我先前提過的那樣，請替代者說「是」或「否」、真實或不真實的陳述句，然後做肌肉測試。一旦確定替代者'
  - '[PAGE 261]


    沒有問題,就可以往下進行了。步驟如下:


    +   1. 先建立連結，替代者可以輕輕碰觸或牽著當事人的手。

    2. 請當事人用陳述句說出自己的名字：「我的名字是______。」然後對替代者進行肌肉測試，其肌肉應該會呈現強而有力的反應。

    3. 接著，請當事人說出一個不真實的陳述句：「我的名字是______。」空白處請填入任何不是他名字的名字。

    4. 對替代者進行肌肉測試。此時，替代者的肌肉應該會變得軟弱無力；如果沒有，請重覆步驟三，直到肌肉測試結果是「軟弱無力」為止。一旦當事人說出不真實的陳述句，而替代者的肌肉變得軟弱無力時，就表示連結已經建立，可以往下測試了。


    一般來說，當雙方有了身體接觸，當事人和替代者之間的連結在幾秒內就會完成，此時即可開始測試。連結一旦建立，就可以開始對當事人發問，或者讓當事人說出適當的陳述句，但此時是在替代者身上執行肌肉測試，而非當事人。'
  - '[PAGE 262]


    按照前面幾章描述的流程詢問所有相關問題，以辨識並找出受困情緒。當事人身上產生的任何能量變化，會立即流經替代者，並透過測試表現出來。要釋放受困情緒，則將磁鐵順著當事人的背往下滑即可；如果這個動作出於某種原因不可行，那麼，用磁鐵滑過替代者的背也會有同樣的效果，前提是雙方在能量上依舊保持連結。


    結束後，請中斷當事人和替代者之間的連結。做法非常簡單，只要替代者停止觸摸當事人即可。


    # 為孩童進行替代者測試


    幼童的肌肉測試結果通常較不穩定，替代者測試提供了一個簡單且有效率的方法，讓你得到你需要的答案，以幫助孩子。


    受困情緒可能透過遺傳而來，也有可能在子宮


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_262_0.png)


    測試者 替代者 當事人'
  - '[PAGE 263]


    # ## 第3部 情緒密碼這樣用


    內、出生過程中，以及出生後的任何時刻形成。小孩一出生就帶有受困情緒是很常見的，一出生就有心牆倒是罕見，不過還是有這種案例。

    每個小孩都是寶貝！如今只要透過替代者測試，你就可以在許多情況中幫助孩子，因為情緒密碼也能施作在小孩子身上。面臨壓力和艱困處境的小孩當然會有受困情緒，但任何一個孩子——無論他得到多少愛或家庭環境好壞——都有可能產生受困情緒。


    ![](img/795e9c22a8b8d60dcc74f795906e5c01_263_0.png)


    測試者 當事人 替代者'
  - '[PAGE 264]


    # * 茱莉的故事：受困情緒如何影響孩子的健康與心理發展


    茱莉是個「毒癮寶寶」，出生後頭一天就被送到寄養家庭，而寄養家庭希望可以領養她。但茱莉的問題不是只有毒癮。我還記得第一次見到茱莉時，她才兩歲半，被診斷出有腦性麻痺、智能遲滯及嚴重的氣喘問題，同時還有注意力不足過動症。她的行為舉止如同一隻野生小動物。茱莉一直處於極度煩躁不安的狀態，如果可以，我覺得她真的會翻牆而出，逃離我的診療室。茱莉無法和其他孩子互動，也不想玩玩具。她一刻也靜不下來，甚至根本坐不住，而且也不說話。每次她發脾氣，就會持續好幾個小時。在接受我的治療之前，她已經因為氣喘多次進出醫院，而且必須透過機器改善呼吸問題。令人覺得安慰的是，寄養媽媽對她非常有耐心。透過替代者為茱莉測試後，我立刻發現她有心牆及其他失衡問題。接下來要提到的都是構成她心牆的受困情緒。當時我們花了一個月，在每次的療程中幫她釋放一個心牆上的受困情緒。


    下面這則故事描述一位處境堪憐的小女孩在移除受困情緒後，生命如何產生戲劇性的變化。'
  - '[PAGE 265]


    # 遺傳自生母的「得不到回應的愛」


    「得不到回應的愛」是一種很常見的情緒,通常是在覺得自己不被愛,或是對別人付出的愛被拒絕時產生的。茱莉的生母就有「得不到回應的愛」這個受困情緒,並且在受孕當下將這個情緒傳給茱莉。


    在現今的社會,我們往往會批判茱莉的生母這樣的人,因為他們有毒癮問題。我們會因為一個人的外在表現及不良行爲去責備對方,就像我們瞧不起茱莉的母親一樣。但是,我們看不見他們的心牆,那些由創傷、悲傷和哀痛的受困情緒組成的心牆,而茱莉的生母就背負了這樣的包袱。


    # 遺傳自生父的「憎恨」


    我們可能永遠不會知道茱莉的生父究竟經歷了什麼,導致他產生憎恨的情緒。茱莉雖然沒見過自己的生父,但絕對難逃這個憎恨遺毒的影響。當受困情緒能量一代一代往下傳時,會擾亂我們本來應該活出的人生。情緒會影響我們所做的選擇,影響我們對待他人的方式。這讓人不禁懷疑,那些代代相傳的暴力行爲和不健全的家庭功能,是不是有一部分應該歸咎於遺傳來的受困情緒?'
  - '[PAGE 266]


    # 遺傳自生母的「哀痛」和「憤怒」


    透過替代者測試，我得知茱莉在子宮裡（第一孕期）就有哀痛和憤怒這兩種受困情緒。這兩種情緒是茱莉的生母得知自己懷孕時的反應，然後就被困在茱莉體內了。


    # 第三孕期的「哀痛」「沮喪」及「傷心遺憾」


    孩子在子宮時接收到母親的強烈感受而產生受困情緒的狀況其實並不少見，我在茱莉身上找到的哀痛、沮喪、傷心遺憾等受困情緒，都是她母親在第三孕期體驗到的感覺。懷孕期間任何時刻都有可能產生受困情緒，但最容易出現在第三孕期。


    # 來自生母分娩時的「無望感」


    茱莉的母親在分娩時顯然感受到「無望」這個情緒，那時茱莉還在母親的身體裡，也就是還處於母親的能量場中。當她母親的身體以「無望」的頻率振動時，茱莉也開始以這個頻率共振，'
  - '[PAGE 267]


    # 「一歲時的「無價值感」和「自虐」


    導致她一出生就帶著這個受困情緒。


    由於母親濫用毒品讓茱莉背負許多受困情緒能量，她自己一歲時就產生無價值感和自虐的情緒。她的寄養媽媽表示，茱莉在一歲左右經常會用自己的頭去撞地板和牆壁。


    # 釋放受困情緒的驚人成果


    第三次治療之後，茱莉終於可以一覺到天亮，呼吸時也沒有再發出怪聲。治療進行到第四次時，她的氣喘症狀也完全消失了。


    茱莉的氣喘症狀消失不久，社工去他們家探訪。那一天，社工請她的寄養媽媽填寫收養問卷表格，而且聊了近兩個小時。整個過程中，茱莉都坐在地板上，安靜地玩玩具，表現好得不得了，和之前完全不一樣。社工對此驚訝地問道：「你給小孩餵了什麼藥？」她的寄養媽媽貝蒂答道：「嗯，她現在什麼藥也不吃了。」貝蒂用自己的話描述茱莉的轉變如下。'
  - '[PAGE 268]


    我們還是決定收養她。她生母在懷孕期間吸食毒品，導致茉莉的健康狀況特別不好，而且常常生病。因為嚴重的氣喘，她一個月要進出醫院三、四次，還得服用強體松，合併其他兩、三種治療氣喘的藥物，有時甚至需要透過機器輔助呼吸。不僅如此，茉莉還患有腦性麻痺，行為舉止非常失控。


    一開始，我們是因為母親身體出了些狀況而找到尼爾森醫師。一路上，我們親眼見證母親的情況一天好轉，所以我們決定也帶女兒去給尼爾森醫師看診。到目前為止，茉莉已經接受尼爾森醫師十三次診療。我還記得我們剛去時，茉莉在那年的十二月已經進出醫院七次，還必須仰賴機器呼吸。如今，茉莉已經完全停止服用氣喘藥三個星期，而且不必依靠機器或其他任何器材輔助呼吸。她現在的狀況真的大有進步，走路也穩健許多，連一些不好的習慣和舉止也消失大半。


    最棒的是，茉莉現在開口說話了。還記得她剛到我們家時是不講話的，而現在的她不但會說話、數數，而且狀況好得不得了。我們對目前的成果都滿意極了，她現在完全是脫胎換骨的小女生。老實說，在那段茉莉不定期出現氣喘警報和漫天揮舞著小拳頭的日子裡，我們有一度真的不知道能否再多撐一天。從前的茉莉一發作起來會超過兩個半小時，現在的她也許會覺得心煩意亂，但已經不再隨便'
  - '[PAGE 269]


    # ## 令人滿意的結果


    萊莉的狀況持續改善，沒多久，她的醫生就告訴貝蒂，他們認為萊莉沒有腦性麻痺和智能遲滯現象，要取消之前的診斷。


    萊莉過去那些乖張孤僻、捉摸不定的行為都消失了，現在的她就像個全新的小女孩。


    經驗告訴我們，許多孩童的行為及健康問題都可以透過情緒密碼獲得長足的改善與進步。


    而萊莉的故事讓我們知道，一個孩子的健康與心理發展，和體內的情緒能量有著強大的運動關係。此外，能夠見證一條年輕生命獲得自由，切斷負面受困能量，不再被受困能量威脅，我心中充滿了難以言說的感激。


    # ★ 為動物進行替代者測試


    替代者測試對動物而言是最好的方法。當然，如果動物能明白我們在做什麼，我想牠們大概


    發脾氣了，頂多只是小哭一陣。我們真的覺得好棒、好開心！


    > ——貝蒂'
  - '[PAGE 270]


    # 為失去意識的人測試


    替代者測試讓我們可以為失去意識或陷入昏迷的人進行測試。當事人即使無法做出回應或透過言語回答，他們的潛意識依舊一刻不停地運作著。一個人雖然失去意識，他的身體功能還是在運作，呼吸正常，心臟也持續跳動，其潛意識依舊隨時對外在環境保持警覺，以確保一切都在控制之中。當你問潛意識問題，它會知道答案。假使當事人處於失去意識的狀態，無法主動參與測試，替代者測試就成了最佳解決方案。


    就可以直接參與測試！但我還是直接幫牠們安排一位替代者比較快。

    假設你想要測試你的馬，可以請替代者直接碰觸馬，然後將你要問馬的問題說出來，接著在替代者身上執行測試。

    我在測試動物時，總是直接對牠們說話，就像對人說話一樣。動物也許不明白字面上的意思，但牠們似乎可以接收到我們的想法傳達出來的情緒意念。相信我，動物可以了解我們要對牠們做什麼，牠們感受意念的能力很多時候甚至超越人類。

    替代者測試適用於貓、狗及其他所有動物。我有許多非常精采的情緒密碼療癒經驗都發生在動物身上，我會在下一章詳述這些故事。'
  - '[PAGE 271]


    請注意，肌肉測試不應該用在緊急狀況，例如需要進行搶救時，心肺復甦術才是合宜的措施。


    幾年前，我父親因為大腦動脈瘤陷入昏迷，我真是憂心忡忡，想盡一切辦法幫助他。我和琴恩一起去醫院看他，當時他身體插滿管子，還有其他管線纏繞在身上，那樣的情況根本不允許我們接近他到可以為他進行肌肉測試的距離。


    我只好請琴恩當我父親的替代者。雖然他處於昏迷狀態，我們依舊可以進入他的潛意識。透過測試，我們找出除了醫護人員所做的處置之外對他最有幫助的辦法。那次執行替代者測試的經驗，讓我對這項恩典充滿感激之情。


    # ★取得療癒對象的同意


    請記住，在使用情緒密碼療癒他人之前，無論是直接施作在對方身上，或是透過替代者或代理人測試，你都必須先徵得對方的同意。下頁的表格列出一些基本原則，讓你知道在不同的情況下應該取得誰的同意。'
  - '[PAGE 272]


    | 測試對象 | 取得同意對象 |

    |---|---|

    | 意識清楚的成年人 | 本人 |

    | 失去意識的成年人 | 受試者最親近的成人親屬 |

    | 未成年人 | 其父母或監護人 |

    | 寵物 | 寵物的主人 |


    替代者測試是非常好用的工具, 為了讓療癒效果發揮到淋漓盡致, 這項工具是不可或缺的。若療癒對象是寵物、嬰兒、幼童, 或是失去意識、極度虛弱或處於極度疼痛狀態而無法接受測試的人,
    運用替代者測試就不成問題。


    # * 代理人測試


    獲得授權、可以代表他人的人, 稱作代理人。代理就是代替他人行動的意思。執行代理人測試時, 代理人必須暫時「成爲」那個當事人。代理人透過自願「成爲」他所代理的人而嘉惠對方,這時施作在代理人身上的所有測試,
    就像直接施作在他所代理的人身上一樣。'
- md: '# 人在日本的艾莉森被療癒了


    我曾經治療過我診所附近一所舞蹈學校的幾位芭蕾舞者，其中一位名叫艾莉森的舞者跟著迪士尼的團隊到日本演出。某天傍晚，她母親憂心忡忡地打電話給我：「尼爾森醫師，我們遇上大麻煩了。艾莉森的臀部受傷，現在無法跳舞。她明天就要登台演出了，你能不能想法子幫忙？」


    我表明必須先和艾莉森談談才行，她母親便給我艾莉森在日本住的飯店的電話。接通電話後，艾莉森向我描述她臀部的問題。她說她的臀部當天毫無緣由地出現異常狀況，後來連走路都有困難，隔天根本不可能登台表演。


    取得艾莉森和她母親的測試同意後，我請琴恩擔任艾莉森的代理人。


    雖然艾莉森遠在地球的另一端，但是要完成她與代理人之間的連結，一點也沒有問題。


    為了方便取得艾莉森的資訊和即時回饋，我們打電話給艾莉森，但你不一定要這麼做。請注意，進行代理人測試時，你不一定要和當事人通上電話。代理人和當事人之間只要透過能量連結就夠了。


    距離對能量而言不構成任何阻礙。能量無所不在，充滿整個世界，實際上是充滿整個無邊無際的空間。


    物體之間的能量與物體內部的能量同樣充沛。因為能量具有連續不斷與無所不在的特性，因此療癒艾莉森沒有任何困難。


    我們發現有兩個受困情緒滯留在艾莉森的臀部組織，這兩個情緒和日本之行給她的寂寞與悲傷感受有關。


    我在電話上問艾莉森：「你是不是覺得不想待在日本？」


    她不情願地承認：「能來這裡確實很讓人興奮，但我很想家，好想念我媽和家鄉的夥伴。不知怎麼地，我就是不想待在這裡，真的好希望可以回家。」


    我用磁鐵滑過琴恩的背，釋放艾莉森這兩個受困情緒。


    雖然艾莉森當時在地球另一端的日本，療癒成效還是立刻出現，絲毫不受影響。


    在我們掛上電話之前，她的臀部已經完全不痛了，隔天正常登台演出，一點問題也沒有。


    # 朵蘭的遠距療癒經驗


    一位名叫朵蘭的患者與我分享這個故事，她提到遠距療癒的效果和親臨現場一模一樣。


    過去十年間，因為各式各樣的毛病，我時常會去找尼爾森醫師。有一次是因為橫膈膜疝氣的問題，併發胃灼熱和其他疼痛症狀，當時真是慘不忍睹，而我什麼也做不了。


    我和我丈夫瑞克坐在客廳發愁，後來瑞克決定打電話給尼爾森醫師，看看他能不能幫我。醫師透過測試發現我的症狀源自受困情緒，之後他就把那個情緒釋放掉。當時我倆坐在客廳裡，而那些症狀就在我們掛上電話的同時消失了。我建議各位不妨敞開心胸去試試這類療法。透過許多人的寶貴知識和不可思議的發現，今天我們真的可以因為這種遠距療法而受惠良多。


    朵蘭


    # 如何進行代理人測試？


    現在就來談談代理人測試的實際執行步驟。


    首要之務是取得當事人同意，一定要這麼做，以避免侵犯隱私及道德爭議的問題。


    假設有一位名叫萊恩·瓊斯的男士想要接受測試和治療，但他因為有事出城了，所以同意讓你和你的朋友蘇珊為他進行代理人測試。蘇珊自願擔任萊恩的代理人，因此，你會在蘇珊身上進行測試。


    - 1. 如同其他肌肉測試一樣，你要先在代理人身上建立測試基準。這是為了確保代理人本身在當下是可被測試的。

    - 2. 建立蘇珊與萊恩之間的能量連結。讓蘇珊說：「我的名字是萊恩·瓊斯。」然後進行肌肉測試。一開始，這個陳述句可能會讓肌肉測試結果呈現軟弱無力的反應，但稍微堅持一下，連結便會逐漸形成。

    - 3. 請代理人重複這個陳述句幾次（在本例中，就是請代理人蘇珊重複「我的名字是萊恩·瓊斯」），每次說完陳述句之後，就做肌肉測試。你（測試者）想要將蘇珊（代理人）與萊恩（當事人）連結在一起的意念愈清晰，結果就愈快出現。通常在幾次之後就能成功產生能量連結，此時肌肉測試會突然呈現強而有力的反應。


    繼續用這個例子說明。現在當蘇珊說出「我的名字是萊恩·瓊斯」，然後對她進行肌肉測試時，她的肌肉會呈現強而有力的反應；如果蘇珊說「我的名字是蘇珊」，肌肉測試的結果反而暫時會是「軟弱無力」，因為她現在是代替萊恩行動。此時，無論萊恩身在何處，對代理人蘇珊施作的一切測試都等於施作在萊恩身上。


    請記住，當代理人與當事人之間的能量連結形成時，這個連結是真實無比的。


    雖然我們不明白其中的奧祕，但是在執行代理人測試時，為了協助當事人，代理人本身的需求會暫時被擱置。


    | 角色 | 說明 |

    | :--- | :--- |

    | 當事人 | 需要療癒的人 |

    | 代理人 | 代替當事人接受測試的人 |

    | 測試者 | 執行測試的人 |


    # 切斷代理人與當事人之間的能量連結


    你問代理人的任何問題，實際上都是針對當事人詢問。透過測試代理人所找出的任何受困情緒，實際上都是當事人體內的受困情緒。在你切斷兩人的連結之前，任何你想對當事人做的測試，都可以直接在代理人身上進行，因為答案會是一致的；同樣地，如果你想為當事人釋放受困情緒或進行調整矯正，只要施作在代理人身上即可。


    現在你可以想像這項工具多好用了吧？它不僅讓你可以為身在遠方的人找出受困情緒，還可以幫他們釋放這些情緒，而且當事人的症狀通常會立刻減輕或消失。


    一旦代理人與當事人之間建立連結，你就可以按照前面章節描述的步驟那樣操作情緒密碼。透過測試代理人，你提出問題，然後找出當事人體內的受困情緒。


    當你藉由測試代理人找出受困情緒後，就可以把它釋放掉，如同當事人就在你身旁。你只要用磁鐵滑過代理人的背部，就可以為當事人釋放該受困情緒。記住，距離對能量而言不構成任何阻礙，你想要療癒他人的意念，以及相信這件事做得成的信念，才是成就這一切的關鍵。


    完成整個療癒程序後，請務必記得切斷代理人和當事人之間的連結。若連結沒有被切斷，代理人可能會持續感受到當事人的情緒。


    # 不可思議的代理人測試


    例如，若代理人叫蘇珊，你可以請她說：「我的名字是蘇珊。」如果肌肉測試結果為軟弱無力，表示她與當事人之間還有連結。那麼，就請她反覆陳述自己的名字，直到她的肌肉在測試中呈現強而有力的反應為止，因為這代表她與當事人的連結已經被切斷。就是這麼簡單。


    療癒程序結束後，請感謝代理人。而要切斷連結，只要請代理人陳述自己的名字，然後反覆做肌肉測試，直到其肌肉出現強而有力的反應為止。


    在某一次的療程結束時，我竟然犯下一個錯，忘記切斷兩姊妹之間的連結。隔天，我的病人來診所對我說：「好像有什麼事不太對勁，我覺得自己彷彿要變成我姊姊了。我可以感受到她的情緒，這未免太詭異了吧？我是不是還跟她連結在一起？」我馬上知道自己犯了錯，連忙切斷她倆之間的連結，而她也立刻恢復正常。


    主動擔任姊姊的代理人，我覺得透過代理人進行療癒真是一件神聖又特別的事。代理人的潛意識暫時讓自己位居次要，去幫助他人，真是讓人覺得不可思議。當中的奧祕，包括如何在遠距的情況下建立連結，著實遠遠超出我們的理解範圍。


    每次透過代理人測試進行遠距療癒，只要當事人立刻好轉或症狀減輕，都會讓我興奮不已。希望大家都可以試試替代者測試和代理人測試這兩項工具，我保證每個人都學得會，你也不例外。


    雖然我很有信心大家都可以學會替代者測試和代理人測試，但我知道有些讀者還是比較想要尋求我們的幫助。


    如果你想要請合格的療癒師為你進行遠距的代理人療癒，可以透過下列兩個連結進入我們的網站，獲得更多資訊：


    - 駐院療癒師：HealersLibrary.com/services

    - 國際療癒師：HealersLibrary.com/practitioners


    替代者測試則特別適用於家裡的寵物。在下一章，你會讀到更多將情緒密碼運用在動物身上的精采故事。


    # 第9章 運用情緒密碼療癒動物


    > 動物的溝通能力毫不遜色，只不過大多時候都被人忽略。

    > ——愛麗絲·華克


    # 動物也會有受困情緒


    所有喜愛動物的人都會告訴你，動物也有感覺。也許牠們不會說話，但如果透過行為去認識牠們，久而久之就會了解牠們情緒上的細微變化。即使不透過語言，動物也能清楚表達自己的情緒。當發生會擾亂情緒的事件時，動物也和人一樣，可能會被受困情緒影響。


    我第一次為動物釋放受困情緒其實是個意外。某天，我接到一位名叫琳達的患者打來的電話。她是個動物訓練師，大概一年前來找我治療過。當時她氣喘挺嚴重的，不過這通電話與此事一點關係都沒有。


    「尼爾森醫師，我有個奇怪的請求，不知道你能不能幫幫我。」她在電話裡說，「我有一匹叫遊俠的馬，最近不知怎麼搞的動不動就小便。我替牠找了三位獸醫，卻都找不出是什麼原因。獸醫宣稱遊俠非常健康，但牠帶來的麻煩可不小。牠不只替我製造麻煩，也為鄰近馬廄的主人與其他馬兒帶來不少困擾。我知道你偶爾會幫忙療癒動物，如果你可以過來看一下這裡的狀況，我真的會非常感激你。也許你可以幫忙治療遊俠。」


    還記得琳達之前來就診時，我們都會分享彼此對馬兒的熱愛。我自己就是在有許多馬匹圍繞的環境下長大的蒙大拿小孩，小時候的我從不放過任何可以騎馬的機會。琳達讓我看過四、五張她養的馬的照片，不過我沒有真正去她的馬廄見過那些馬。


    隔天，琴恩和我決定去琳達的馬廄一探究竟。我們走進一棟寬敞的長方形建築，上面有尖起的屋頂，裡面約有兩排、共四十個欄舍。一來到遊俠的欄舍，我們立刻了解琳達為什麼會這麼擔心牠。有別於其他乾淨、整齊的欄舍，這匹馬因為便溺問題，整個欄舍一片濕濘、髒亂不堪。


    為了在乾燥的環境中診察遊俠的狀況，琳達把牠帶到外面。琴恩自願當牠的替代者。她把一隻手搭在馬兒身上，另一隻手則伸出來讓我做肌肉測試。


    我們發現有某樣東西導致遊俠的腎臟出現不平衡現象，但測試了幾分鐘之後，我有點摸不著頭緒，因為我找不到那個導致不平衡的原因。


    琴恩突然冒出一句話：「你怎麼不測試看看牠有沒有受困情緒？」


    我忍不住大笑道：「幫一匹馬測試受困情緒？這也太搞笑了吧……」我在蒙大拿出生、成長，小時候自己也養過兩匹馬。雖然我很愛牠們，也把牠們照顧得很好，但如同大多數人，我從未想過馬兒也會有受困情緒的問題。


    琴恩平靜地看著我，再次說道：「你測試一下就是了。」琴恩的直覺非常強，也許她已經感應到遊俠真正出了什麼問題。


    我只好大聲地問：「這個不平衡是受困情緒引起的嗎？」然後，我將琴恩的手臂往下壓。結果，答案竟為「是」。


    令人驚訝的是，我居然可以在受困情緒表上找到遊俠的受困情緒：「衝突」。透過刪去法，我們發現遊俠是因為和另一匹馬處得不好而產生這個情緒。琳達證實幾個月前確實來了一匹新馬，遊俠和這匹新馬從第一天起就不對盤，偶爾還得將兩匹馬分開，以免牠們互相傷害。工作人員雖然已將新馬移到距離遊俠較遠的欄舍，但即使只是擦身而過，兩匹馬每天還是不免照到面。


    進一步測試之後，我發現這個被困住的情緒滯留在遊俠的右臀，而且確實是牠腎臟出現不平衡現象的根本原因。


    一旦找出這個受困情緒，我便使用磁鐵滑過遊俠的背，幫她釋放這個情緒。


    那次之後，遊俠的狀況逐漸好轉。幾天後，我和琳達通電話，她告訴我，遊俠的欄舍是乾的，這還是近幾個月來第一次出現這種情況，而且自此之後，遊俠再也沒有出現這個問題了。


    # 為動物釋放被困住的情緒


    我療癒的對象基本上是人，不常幫動物看診，但這次的經驗著實讓我大開眼界，也大大擴展我的視野，我相信有一天你也會有同樣的感受。


    幫動物釋放受困情緒的步驟，跟釋放人的受困情緒一樣。你會用到你已經很熟悉的受困情緒表，唯一需要克服的心理障礙，是你得直接和動物對話——或者應該說，是跟動物的潛意識說話，而不是人的潛意識。其餘部分大致相同。


    - 1. 因為要透過替代者測試動物，開始之前，自然要對作為替代者的那個人進行基準測試，以確保他處於可測試狀態。

    - 2. 請替代者將一隻手搭在該動物身上，另一隻手臂伸出來接受肌肉測試。測試者會問動物一個簡單的問題，以確認替代者與該動物之間已建立連結。比方說，如果你的測試對象是一匹馬，而那匹馬叫作「元寶」，你可以問：「你的名字是元寶嗎？」

    - 3. 接著，對替代者進行肌肉測試。假如問該動物一個符合真相的問題，而替代者肌肉測試的結果呈現強而有力的反應；問一個不符合真相的問題，替代者的肌肉變得軟弱無力，就表示已經成功建立連結。


    一旦建立能量連結，你就可以開始透過測試替代者找出答案，如同你的測試對象是人一樣。就實際目的而言，這兩者並無差異。


    第一次為動物做測試的經驗會讓你大感驚奇，畢竟突然發現一個跟動物溝通的新管道，大部分人都會為此感動不已。


    # 遭綁架的小支


    有一隻叫小支的拉薩犬是個絕佳的例子。小支的主人博特和凱西一帶牠進入診間，便告訴牠的故事。


    幾個月前的某一天，博特和凱西帶著小支在丘陵散步。充滿好奇心、喜歡到處探險的小支那天正好跑在主人前面，距離五、六十呎。突然，樹葉發出一陣沙沙聲，一隻土狼從路邊樹叢裡竄了出來。倏忽之間，那隻土狼已經叼著小支跑掉了。博特和凱西幾乎沒有時間反應，他們追著那隻土狼，一直追進樹林裡，最後還是只能束手無策地看著小支消失。


    他們傷透了心，回家後因為失去小狗變得無精打采。四天後，正當兩人還沉浸在哀痛之中時，小支竟然出現在家門口。牠全身發抖地站在那裡，雖然毛髮糾結亂纏，而且渾身是血，但牠很高興可以回到家。他們馬上把小支送到動物醫院，請獸醫為牠縫合傷口、注射抗生素。


    「這就像奇蹟一樣，我們都鬆了一口氣。」凱西說道。她親暱地把小支抱在臂彎裡，不斷用手撫摸小支。


    「所以，現在看來還有什麼問題嗎？」我問道。


    「牠不是原來的小支了。」博特向我解釋，「牠現在既不亂吠，也不再追著任何東西跑，彷彿牠生命裡再也沒有什麼事物可以引起牠的興趣。」


    「而且牠隨時隨地都在發抖。」凱西補充道，並且把小支舉起來，好讓我看見牠抖得有多厲害。


    「獸醫認為可能是傷到了神經，」博特繼續說，「而且這個情況可能會持續一輩子，他也無能為力。」


    凱西把小支放在診療檯上，讓我仔細幫牠檢查。我發現小支的脊椎有幾處錯位，跟我預期的差不多，於是我幫牠調整了一下。


    「其實我們心裡糾結的是，」凱西繼續說，「安樂死不知道對牠會不會比較好……」


    「小支現在的生活品質比起從前有很大的落差，」博特說，「牠在我們跟前既不吠，也不跑，跟從前的模樣大相逕庭。我們去哪兒都必須帶著牠，牠的好奇心全然消失，好像一直在受苦。」


    我們全都看著小支，那坐在診療檯上發抖的小狗。牠的眼神裡盡是恐懼，模樣說有多慘就有多慘。


    不難想像在被攻擊和擄走的瞬間，這隻小狗體驗到多麼驚恐的情緒。我判斷這一切很有可能是因為受困情緒在牠體內作祟。取得博特和凱西的同意後，我向他們解釋何謂替代者測試，並請他們其中一人擔任小支的替代者。


    當我問牠是不是有個受困情緒時，答案為「是」。我想當然地認為這個情緒應該是恐懼或驚恐，但是當我逐漸縮小答案的範圍時，我很驚訝地發現，被土狼挾持的當下充滿這小狗心靈的情緒竟不是驚恐，也不是任何類似的情緒，而是悲傷。


    被那隻土狼咬在嘴裡時，小支心裡想的全是牠可能再也見不到博特和凱西了。一想到這裡，強大的悲傷淹沒了牠。


    一旦找到這個受困情緒，我很快地用磁鐵將之釋放，治療就結束了。


    當我把小支放到地上時，牠就像一顆衝出槍管的子彈，飛也似地衝了出去，穿過走廊，跑進候診室。之前被凱西抱著進入那個候診室時，牠抖得很厲害，抖到彷彿沒有注意到那裡有人在；現在，牠用好幾聲友善、健康的吠叫，向候診室裡的每個病人打招呼。接著，牠沿著走廊向前衝，往每個房間探頭探腦，並奉送幾聲狗吠，最後終於回到凱西和博特跟前，快樂地搖著牠的狗尾巴。這立竿見影的效果真是驚人！我們都大感驚奇，對這奇蹟般的療癒結果感動不已。博特和凱西說，小支從那一刻起就不再發抖，而且重新展現牠好奇且討人喜歡的個性。


    為動物測試受困情緒時，最棒的就是你可以直接在牠們身上看到變化，而且往往會有立即且全然的療癒成效。動物不會為了讓你開心，而假裝牠們覺得比較舒服了。


    小支當時似乎知道我們想要幫牠，所以當牠一覺得自己比較舒服了，所有人都看得出來！


    # 搗蛋狗白蘭地


    有天傍晚，我們去找朋友。一進門，他們的狗白蘭地就以一種熱情無比但稍嫌猥褻的方式迎接我。


    「真是不好意思！」史基連忙道歉，「每次有客人上門，牠就會衝上去磨蹭他們的腿，真令人難為情，但我們也不知道該怎麼阻止牠的行為。最後不得已，只好在客人來訪時把牠鎖在外面。我們不知道你們要來，否則一定先把牠關到後院去。」


    我們坐下來聊天，很快就聊到別的地方去了，但是從我坐的位置，我可以透過移動式玻璃門看見另一頭的白蘭地，端著一臉被遺棄的可憐相。


    我把話題轉回白蘭地身上，告訴他們，牠表現出來的一些詭異行為有可能肇因於受困情緒。他們雖然從未聽過這種說法，仍舊信任我，讓我為白蘭地測試。


    不久之後就證實我的直覺是對的，白蘭地的受困情緒是「哀痛」。事情發生的經過是這樣的⋯⋯


    這家人最近在山上買了一幢小屋。一開始，他們會把白蘭地放在車子後座一起帶上山，但太長的旅程實在讓這隻小狗難以忍受，所以白蘭地常常暈車，並且吐在車裡。幾次之後，他們就不再帶著白蘭地去山上小屋了。白蘭地總是一臉興奮地看著家人打包行李，然後獨留牠一狗揚長而去。白蘭地簡直要抓狂，牠不明白為什麼只有自己被丟在家裡。明明牠也很興奮，準備好要跟家人一起出門。


    麻煩就是從這個時候開始出現的。白蘭地從來不曾給這家人捅過什麼婁子，但突然間，牠性情大變，只要有客人來家裡，牠一定會衝上去磨蹭他們的腿，讓人覺得反感又噁心。顯然，除了這樣做，白蘭地找不到其他方式表達自己的哀痛。


    移除受困情緒後，白蘭地的反常行為再也沒有出現過。雖然這家人去山上小屋時還是沒有帶上牠，但至少牠現在不會被鎖在屋子外面了。


    # 偏執貓鬆鬆寶


    下面這個故事的獨特之處不在於貓咪身上發生了什麼奇事，而是一位年輕女子如何找到自己的天賦，以及人生的新方向。


    我和朋友賽瑞娜去參加尼爾森醫師為期兩天、有關受困情緒的講座。上完課之後，我們兩人迫不及待想要試試這個新方法。回到家時，我的貓正好睡在沙發上，我倆靈機一動：「啊哈！這不正是我們的頭號白老鼠？」


    鬆鬆寶是一隻流浪貓，約莫一歲大的時候被我們家領養了。家裡人悉心照料牠，甚至給牠買了一個有鈴鐺的項圈，避免牠再次走失。一開始，我們花了一個月試著尋找牠原來的飼主，但總是杳無音訊。最後我們決定留下牠，因為牠真的是一隻好乖的貓。


    雖然鬆鬆寶對我們很友善，但牠對陌生人總是抱持著極大的恐懼。鬆鬆寶不像一般的貓那樣會去磨蹭陌生人的腿，以尋求注意；相反地，牠會將所有陌生人視為威脅。假使有任何不認識的人走進房間，牠絕對會以迅雷不及掩耳的速度逃離現場。


    那天，我讓自己擔任鬆鬆寶的替代者，以釐清牠有沒有受困情緒。果不其然，如我們所預料，牠的受困情緒是「恐懼」。當我們用磁鐵滑過牠的背，釋放那個受困情緒後，鬆鬆寶就把身體滾過來讓我們搔搔肚子。就這樣，沒有發生什麼特別的事。


    但幾天後，有個客人來家裡，我們發現鬆鬆竟然沒有逃跑。事實上，每次有新面孔走進屋子裡，牠現在的表現就跟其他貓咪一樣，有時會走上前去吸引注意和討拍拍。


    真是多虧了尼爾森醫師的訓練，我才發現自己很喜歡跟動物一起工作，甚至發掘了一項特殊天賦：我發現我可以透過自我測試，快速找出並釋放動物的受困情緒。現在我不但有自已的寵物治療事業，也親眼見證許多動物經由情緒密碼產生驚人的變化。


    ——卡翠娜


    # 被惡意遺棄的小狗


    前幾天，我又收到卡翠娜寄來的一封令人動容的信。利用情緒密碼幫助動物對她來說已經是駕輕就熟了。'
  mdcn: '# 人在日本的艾莉森被療癒了


    我曾經治療過我診所附近一所舞蹈學校的幾位芭蕾舞者，其中一位名叫艾莉森的舞者跟著迪士尼的團隊到日本演出。某天傍晚，她母親憂心忡忡地打電話給我：「尼爾森醫師，我們遇上大麻煩了。艾莉森的臀部受傷，現在無法跳舞。她明天就要登台演出了，你能不能想法子幫忙？」


    我表明必須先和艾莉森談談才行，她母親便給我艾莉森在日本住的飯店的電話。接通電話後，艾莉森向我描述她臀部的問題。她說她的臀部當天毫無緣由地出現異常狀況，後來連走路都有困難，隔天根本不可能登台表演。


    取得艾莉森和她母親的測試同意後，我請琴恩擔任艾莉森的代理人。


    雖然艾莉森遠在地球的另一端，但是要完成她與代理人之間的連結，一點也沒有問題。


    為了方便取得艾莉森的資訊和即時回饋，我們打電話給艾莉森，但你不一定要這麼做。請注意，進行代理人測試時，你不一定要和當事人通上電話。代理人和當事人之間只要透過能量連結就夠了。


    距離對能量而言不構成任何阻礙。能量無所不在，充滿整個世界，實際上是充滿整個無邊無際的空間。


    物體之間的能量與物體內部的能量同樣充沛。因為能量具有連續不斷與無所不在的特性，因此療癒艾莉森沒有任何困難。


    我們發現有兩個受困情緒滯留在艾莉森的臀部組織，這兩個情緒和日本之行給她的寂寞與悲傷感受有關。


    我在電話上問艾莉森：「你是不是覺得不想待在日本？」


    她不情願地承認：「能來這裡確實很讓人興奮，但我很想家，好想念我媽和家鄉的夥伴。不知怎麼地，我就是不想待在這裡，真的好希望可以回家。」


    我用磁鐵滑過琴恩的背，釋放艾莉森這兩個受困情緒。


    雖然艾莉森當時在地球另一端的日本，療癒成效還是立刻出現，絲毫不受影響。


    在我們掛上電話之前，她的臀部已經完全不痛了，隔天正常登台演出，一點問題也沒有。


    # 朵蘭的遠距療癒經驗


    一位名叫朵蘭的患者與我分享這個故事，她提到遠距療癒的效果和親臨現場一模一樣。


    過去十年間，因為各式各樣的毛病，我時常會去找尼爾森醫師。有一次是因為橫膈膜疝氣的問題，併發胃灼熱和其他疼痛症狀，當時真是慘不忍睹，而我什麼也做不了。


    我和我丈夫瑞克坐在客廳發愁，後來瑞克決定打電話給尼爾森醫師，看看他能不能幫我。醫師透過測試發現我的症狀源自受困情緒，之後他就把那個情緒釋放掉。當時我倆坐在客廳裡，而那些症狀就在我們掛上電話的同時消失了。我建議各位不妨敞開心胸去試試這類療法。透過許多人的寶貴知識和不可思議的發現，今天我們真的可以因為這種遠距療法而受惠良多。


    朵蘭


    # 如何進行代理人測試？


    現在就來談談代理人測試的實際執行步驟。


    首要之務是取得當事人同意，一定要這麼做，以避免侵犯隱私及道德爭議的問題。


    假設有一位名叫萊恩·瓊斯的男士想要接受測試和治療，但他因為有事出城了，所以同意讓你和你的朋友蘇珊為他進行代理人測試。蘇珊自願擔任萊恩的代理人，因此，你會在蘇珊身上進行測試。


    - 1. 如同其他肌肉測試一樣，你要先在代理人身上建立測試基準。這是為了確保代理人本身在當下是可被測試的。

    - 2. 建立蘇珊與萊恩之間的能量連結。讓蘇珊說：「我的名字是萊恩·瓊斯。」然後進行肌肉測試。一開始，這個陳述句可能會讓肌肉測試結果呈現軟弱無力的反應，但稍微堅持一下，連結便會逐漸形成。

    - 3. 請代理人重複這個陳述句幾次（在本例中，就是請代理人蘇珊重複「我的名字是萊恩·瓊斯」），每次說完陳述句之後，就做肌肉測試。你（測試者）想要將蘇珊（代理人）與萊恩（當事人）連結在一起的意念愈清晰，結果就愈快出現。通常在幾次之後就能成功產生能量連結，此時肌肉測試會突然呈現強而有力的反應。


    繼續用這個例子說明。現在當蘇珊說出「我的名字是萊恩·瓊斯」，然後對她進行肌肉測試時，她的肌肉會呈現強而有力的反應；如果蘇珊說「我的名字是蘇珊」，肌肉測試的結果反而暫時會是「軟弱無力」，因為她現在是代替萊恩行動。此時，無論萊恩身在何處，對代理人蘇珊施作的一切測試都等於施作在萊恩身上。


    請記住，當代理人與當事人之間的能量連結形成時，這個連結是真實無比的。


    雖然我們不明白其中的奧祕，但是在執行代理人測試時，為了協助當事人，代理人本身的需求會暫時被擱置。


    | 角色 | 說明 |

    | :--- | :--- |

    | 當事人 | 需要療癒的人 |

    | 代理人 | 代替當事人接受測試的人 |

    | 測試者 | 執行測試的人 |


    # 切斷代理人與當事人之間的能量連結


    你問代理人的任何問題，實際上都是針對當事人詢問。透過測試代理人所找出的任何受困情緒，實際上都是當事人體內的受困情緒。在你切斷兩人的連結之前，任何你想對當事人做的測試，都可以直接在代理人身上進行，因為答案會是一致的；同樣地，如果你想為當事人釋放受困情緒或進行調整矯正，只要施作在代理人身上即可。


    現在你可以想像這項工具多好用了吧？它不僅讓你可以為身在遠方的人找出受困情緒，還可以幫他們釋放這些情緒，而且當事人的症狀通常會立刻減輕或消失。


    一旦代理人與當事人之間建立連結，你就可以按照前面章節描述的步驟那樣操作情緒密碼。透過測試代理人，你提出問題，然後找出當事人體內的受困情緒。


    當你藉由測試代理人找出受困情緒後，就可以把它釋放掉，如同當事人就在你身旁。你只要用磁鐵滑過代理人的背部，就可以為當事人釋放該受困情緒。記住，距離對能量而言不構成任何阻礙，你想要療癒他人的意念，以及相信這件事做得成的信念，才是成就這一切的關鍵。


    完成整個療癒程序後，請務必記得切斷代理人和當事人之間的連結。若連結沒有被切斷，代理人可能會持續感受到當事人的情緒。


    # 不可思議的代理人測試


    例如，若代理人叫蘇珊，你可以請她說：「我的名字是蘇珊。」如果肌肉測試結果為軟弱無力，表示她與當事人之間還有連結。那麼，就請她反覆陳述自己的名字，直到她的肌肉在測試中呈現強而有力的反應為止，因為這代表她與當事人的連結已經被切斷。就是這麼簡單。


    療癒程序結束後，請感謝代理人。而要切斷連結，只要請代理人陳述自己的名字，然後反覆做肌肉測試，直到其肌肉出現強而有力的反應為止。


    在某一次的療程結束時，我竟然犯下一個錯，忘記切斷兩姊妹之間的連結。隔天，我的病人來診所對我說：「好像有什麼事不太對勁，我覺得自己彷彿要變成我姊姊了。我可以感受到她的情緒，這未免太詭異了吧？我是不是還跟她連結在一起？」我馬上知道自己犯了錯，連忙切斷她倆之間的連結，而她也立刻恢復正常。


    主動擔任姊姊的代理人，我覺得透過代理人進行療癒真是一件神聖又特別的事。代理人的潛意識暫時讓自己位居次要，去幫助他人，真是讓人覺得不可思議。當中的奧祕，包括如何在遠距的情況下建立連結，著實遠遠超出我們的理解範圍。


    每次透過代理人測試進行遠距療癒，只要當事人立刻好轉或症狀減輕，都會讓我興奮不已。希望大家都可以試試替代者測試和代理人測試這兩項工具，我保證每個人都學得會，你也不例外。


    雖然我很有信心大家都可以學會替代者測試和代理人測試，但我知道有些讀者還是比較想要尋求我們的幫助。


    如果你想要請合格的療癒師為你進行遠距的代理人療癒，可以透過下列兩個連結進入我們的網站，獲得更多資訊：


    - 駐院療癒師：HealersLibrary.com/services

    - 國際療癒師：HealersLibrary.com/practitioners


    替代者測試則特別適用於家裡的寵物。在下一章，你會讀到更多將情緒密碼運用在動物身上的精采故事。


    # 第9章 運用情緒密碼療癒動物


    > 動物的溝通能力毫不遜色，只不過大多時候都被人忽略。

    > ——愛麗絲·華克


    # 動物也會有受困情緒


    所有喜愛動物的人都會告訴你，動物也有感覺。也許牠們不會說話，但如果透過行為去認識牠們，久而久之就會了解牠們情緒上的細微變化。即使不透過語言，動物也能清楚表達自己的情緒。當發生會擾亂情緒的事件時，動物也和人一樣，可能會被受困情緒影響。


    我第一次為動物釋放受困情緒其實是個意外。某天，我接到一位名叫琳達的患者打來的電話。她是個動物訓練師，大概一年前來找我治療過。當時她氣喘挺嚴重的，不過這通電話與此事一點關係都沒有。


    「尼爾森醫師，我有個奇怪的請求，不知道你能不能幫幫我。」她在電話裡說，「我有一匹叫遊俠的馬，最近不知怎麼搞的動不動就小便。我替牠找了三位獸醫，卻都找不出是什麼原因。獸醫宣稱遊俠非常健康，但牠帶來的麻煩可不小。牠不只替我製造麻煩，也為鄰近馬廄的主人與其他馬兒帶來不少困擾。我知道你偶爾會幫忙療癒動物，如果你可以過來看一下這裡的狀況，我真的會非常感激你。也許你可以幫忙治療遊俠。」


    還記得琳達之前來就診時，我們都會分享彼此對馬兒的熱愛。我自己就是在有許多馬匹圍繞的環境下長大的蒙大拿小孩，小時候的我從不放過任何可以騎馬的機會。琳達讓我看過四、五張她養的馬的照片，不過我沒有真正去她的馬廄見過那些馬。


    隔天，琴恩和我決定去琳達的馬廄一探究竟。我們走進一棟寬敞的長方形建築，上面有尖起的屋頂，裡面約有兩排、共四十個欄舍。一來到遊俠的欄舍，我們立刻了解琳達為什麼會這麼擔心牠。有別於其他乾淨、整齊的欄舍，這匹馬因為便溺問題，整個欄舍一片濕濘、髒亂不堪。


    為了在乾燥的環境中診察遊俠的狀況，琳達把牠帶到外面。琴恩自願當牠的替代者。她把一隻手搭在馬兒身上，另一隻手則伸出來讓我做肌肉測試。


    我們發現有某樣東西導致遊俠的腎臟出現不平衡現象，但測試了幾分鐘之後，我有點摸不著頭緒，因為我找不到那個導致不平衡的原因。


    琴恩突然冒出一句話：「你怎麼不測試看看牠有沒有受困情緒？」


    我忍不住大笑道：「幫一匹馬測試受困情緒？這也太搞笑了吧……」我在蒙大拿出生、成長，小時候自己也養過兩匹馬。雖然我很愛牠們，也把牠們照顧得很好，但如同大多數人，我從未想過馬兒也會有受困情緒的問題。


    琴恩平靜地看著我，再次說道：「你測試一下就是了。」琴恩的直覺非常強，也許她已經感應到遊俠真正出了什麼問題。


    我只好大聲地問：「這個不平衡是受困情緒引起的嗎？」然後，我將琴恩的手臂往下壓。結果，答案竟為「是」。


    令人驚訝的是，我居然可以在受困情緒表上找到遊俠的受困情緒：「衝突」。透過刪去法，我們發現遊俠是因為和另一匹馬處得不好而產生這個情緒。琳達證實幾個月前確實來了一匹新馬，遊俠和這匹新馬從第一天起就不對盤，偶爾還得將兩匹馬分開，以免牠們互相傷害。工作人員雖然已將新馬移到距離遊俠較遠的欄舍，但即使只是擦身而過，兩匹馬每天還是不免照到面。


    進一步測試之後，我發現這個被困住的情緒滯留在遊俠的右臀，而且確實是牠腎臟出現不平衡現象的根本原因。


    一旦找出這個受困情緒，我便使用磁鐵滑過遊俠的背，幫她釋放這個情緒。


    那次之後，遊俠的狀況逐漸好轉。幾天後，我和琳達通電話，她告訴我，遊俠的欄舍是乾的，這還是近幾個月來第一次出現這種情況，而且自此之後，遊俠再也沒有出現這個問題了。


    # 為動物釋放被困住的情緒


    我療癒的對象基本上是人，不常幫動物看診，但這次的經驗著實讓我大開眼界，也大大擴展我的視野，我相信有一天你也會有同樣的感受。


    幫動物釋放受困情緒的步驟，跟釋放人的受困情緒一樣。你會用到你已經很熟悉的受困情緒表，唯一需要克服的心理障礙，是你得直接和動物對話——或者應該說，是跟動物的潛意識說話，而不是人的潛意識。其餘部分大致相同。


    - 1. 因為要透過替代者測試動物，開始之前，自然要對作為替代者的那個人進行基準測試，以確保他處於可測試狀態。

    - 2. 請替代者將一隻手搭在該動物身上，另一隻手臂伸出來接受肌肉測試。測試者會問動物一個簡單的問題，以確認替代者與該動物之間已建立連結。比方說，如果你的測試對象是一匹馬，而那匹馬叫作「元寶」，你可以問：「你的名字是元寶嗎？」

    - 3. 接著，對替代者進行肌肉測試。假如問該動物一個符合真相的問題，而替代者肌肉測試的結果呈現強而有力的反應；問一個不符合真相的問題，替代者的肌肉變得軟弱無力，就表示已經成功建立連結。


    一旦建立能量連結，你就可以開始透過測試替代者找出答案，如同你的測試對象是人一樣。就實際目的而言，這兩者並無差異。


    第一次為動物做測試的經驗會讓你大感驚奇，畢竟突然發現一個跟動物溝通的新管道，大部分人都會為此感動不已。


    # 遭綁架的小支


    有一隻叫小支的拉薩犬是個絕佳的例子。小支的主人博特和凱西一帶牠進入診間，便告訴牠的故事。


    幾個月前的某一天，博特和凱西帶著小支在丘陵散步。充滿好奇心、喜歡到處探險的小支那天正好跑在主人前面，距離五、六十呎。突然，樹葉發出一陣沙沙聲，一隻土狼從路邊樹叢裡竄了出來。倏忽之間，那隻土狼已經叼著小支跑掉了。博特和凱西幾乎沒有時間反應，他們追著那隻土狼，一直追進樹林裡，最後還是只能束手無策地看著小支消失。


    他們傷透了心，回家後因為失去小狗變得無精打采。四天後，正當兩人還沉浸在哀痛之中時，小支竟然出現在家門口。牠全身發抖地站在那裡，雖然毛髮糾結亂纏，而且渾身是血，但牠很高興可以回到家。他們馬上把小支送到動物醫院，請獸醫為牠縫合傷口、注射抗生素。


    「這就像奇蹟一樣，我們都鬆了一口氣。」凱西說道。她親暱地把小支抱在臂彎裡，不斷用手撫摸小支。


    「所以，現在看來還有什麼問題嗎？」我問道。


    「牠不是原來的小支了。」博特向我解釋，「牠現在既不亂吠，也不再追著任何東西跑，彷彿牠生命裡再也沒有什麼事物可以引起牠的興趣。」


    「而且牠隨時隨地都在發抖。」凱西補充道，並且把小支舉起來，好讓我看見牠抖得有多厲害。


    「獸醫認為可能是傷到了神經，」博特繼續說，「而且這個情況可能會持續一輩子，他也無能為力。」


    凱西把小支放在診療檯上，讓我仔細幫牠檢查。我發現小支的脊椎有幾處錯位，跟我預期的差不多，於是我幫牠調整了一下。


    「其實我們心裡糾結的是，」凱西繼續說，「安樂死不知道對牠會不會比較好……」


    「小支現在的生活品質比起從前有很大的落差，」博特說，「牠在我們跟前既不吠，也不跑，跟從前的模樣大相逕庭。我們去哪兒都必須帶著牠，牠的好奇心全然消失，好像一直在受苦。」


    我們全都看著小支，那坐在診療檯上發抖的小狗。牠的眼神裡盡是恐懼，模樣說有多慘就有多慘。


    不難想像在被攻擊和擄走的瞬間，這隻小狗體驗到多麼驚恐的情緒。我判斷這一切很有可能是因為受困情緒在牠體內作祟。取得博特和凱西的同意後，我向他們解釋何謂替代者測試，並請他們其中一人擔任小支的替代者。


    當我問牠是不是有個受困情緒時，答案為「是」。我想當然地認為這個情緒應該是恐懼或驚恐，但是當我逐漸縮小答案的範圍時，我很驚訝地發現，被土狼挾持的當下充滿這小狗心靈的情緒竟不是驚恐，也不是任何類似的情緒，而是悲傷。


    被那隻土狼咬在嘴裡時，小支心裡想的全是牠可能再也見不到博特和凱西了。一想到這裡，強大的悲傷淹沒了牠。


    一旦找到這個受困情緒，我很快地用磁鐵將之釋放，治療就結束了。


    當我把小支放到地上時，牠就像一顆衝出槍管的子彈，飛也似地衝了出去，穿過走廊，跑進候診室。之前被凱西抱著進入那個候診室時，牠抖得很厲害，抖到彷彿沒有注意到那裡有人在；現在，牠用好幾聲友善、健康的吠叫，向候診室裡的每個病人打招呼。接著，牠沿著走廊向前衝，往每個房間探頭探腦，並奉送幾聲狗吠，最後終於回到凱西和博特跟前，快樂地搖著牠的狗尾巴。這立竿見影的效果真是驚人！我們都大感驚奇，對這奇蹟般的療癒結果感動不已。博特和凱西說，小支從那一刻起就不再發抖，而且重新展現牠好奇且討人喜歡的個性。


    為動物測試受困情緒時，最棒的就是你可以直接在牠們身上看到變化，而且往往會有立即且全然的療癒成效。動物不會為了讓你開心，而假裝牠們覺得比較舒服了。


    小支當時似乎知道我們想要幫牠，所以當牠一覺得自己比較舒服了，所有人都看得出來！


    # 搗蛋狗白蘭地


    有天傍晚，我們去找朋友。一進門，他們的狗白蘭地就以一種熱情無比但稍嫌猥褻的方式迎接我。


    「真是不好意思！」史基連忙道歉，「每次有客人上門，牠就會衝上去磨蹭他們的腿，真令人難為情，但我們也不知道該怎麼阻止牠的行為。最後不得已，只好在客人來訪時把牠鎖在外面。我們不知道你們要來，否則一定先把牠關到後院去。」


    我們坐下來聊天，很快就聊到別的地方去了，但是從我坐的位置，我可以透過移動式玻璃門看見另一頭的白蘭地，端著一臉被遺棄的可憐相。


    我把話題轉回白蘭地身上，告訴他們，牠表現出來的一些詭異行為有可能肇因於受困情緒。他們雖然從未聽過這種說法，仍舊信任我，讓我為白蘭地測試。


    不久之後就證實我的直覺是對的，白蘭地的受困情緒是「哀痛」。事情發生的經過是這樣的⋯⋯


    這家人最近在山上買了一幢小屋。一開始，他們會把白蘭地放在車子後座一起帶上山，但太長的旅程實在讓這隻小狗難以忍受，所以白蘭地常常暈車，並且吐在車裡。幾次之後，他們就不再帶著白蘭地去山上小屋了。白蘭地總是一臉興奮地看著家人打包行李，然後獨留牠一狗揚長而去。白蘭地簡直要抓狂，牠不明白為什麼只有自己被丟在家裡。明明牠也很興奮，準備好要跟家人一起出門。


    麻煩就是從這個時候開始出現的。白蘭地從來不曾給這家人捅過什麼婁子，但突然間，牠性情大變，只要有客人來家裡，牠一定會衝上去磨蹭他們的腿，讓人覺得反感又噁心。顯然，除了這樣做，白蘭地找不到其他方式表達自己的哀痛。


    移除受困情緒後，白蘭地的反常行為再也沒有出現過。雖然這家人去山上小屋時還是沒有帶上牠，但至少牠現在不會被鎖在屋子外面了。


    # 偏執貓鬆鬆寶


    下面這個故事的獨特之處不在於貓咪身上發生了什麼奇事，而是一位年輕女子如何找到自己的天賦，以及人生的新方向。


    我和朋友賽瑞娜去參加尼爾森醫師為期兩天、有關受困情緒的講座。上完課之後，我們兩人迫不及待想要試試這個新方法。回到家時，我的貓正好睡在沙發上，我倆靈機一動：「啊哈！這不正是我們的頭號白老鼠？」


    鬆鬆寶是一隻流浪貓，約莫一歲大的時候被我們家領養了。家裡人悉心照料牠，甚至給牠買了一個有鈴鐺的項圈，避免牠再次走失。一開始，我們花了一個月試著尋找牠原來的飼主，但總是杳無音訊。最後我們決定留下牠，因為牠真的是一隻好乖的貓。


    雖然鬆鬆寶對我們很友善，但牠對陌生人總是抱持著極大的恐懼。鬆鬆寶不像一般的貓那樣會去磨蹭陌生人的腿，以尋求注意；相反地，牠會將所有陌生人視為威脅。假使有任何不認識的人走進房間，牠絕對會以迅雷不及掩耳的速度逃離現場。


    那天，我讓自己擔任鬆鬆寶的替代者，以釐清牠有沒有受困情緒。果不其然，如我們所預料，牠的受困情緒是「恐懼」。當我們用磁鐵滑過牠的背，釋放那個受困情緒後，鬆鬆寶就把身體滾過來讓我們搔搔肚子。就這樣，沒有發生什麼特別的事。


    但幾天後，有個客人來家裡，我們發現鬆鬆竟然沒有逃跑。事實上，每次有新面孔走進屋子裡，牠現在的表現就跟其他貓咪一樣，有時會走上前去吸引注意和討拍拍。


    真是多虧了尼爾森醫師的訓練，我才發現自己很喜歡跟動物一起工作，甚至發掘了一項特殊天賦：我發現我可以透過自我測試，快速找出並釋放動物的受困情緒。現在我不但有自已的寵物治療事業，也親眼見證許多動物經由情緒密碼產生驚人的變化。


    ——卡翠娜


    # 被惡意遺棄的小狗


    前幾天，我又收到卡翠娜寄來的一封令人動容的信。利用情緒密碼幫助動物對她來說已經是駕輕就熟了。'
