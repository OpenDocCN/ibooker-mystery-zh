    # ★建造心牆的代價


    有一座小島上有許多猴子，科學家來到島上教會其中一隻猴子先把地瓜洗乾淨再吃。在一百隻猴子都學會洗地瓜的技能後，島上所有的猴子全都懂得如何洗地瓜了。科學家認為這真是太神奇了，然而這只是其中的一部分。他們很快就了解到，只要這一百隻猴子知道如何洗地瓜，其他所有猴子自動就知道怎麼做這件事，但不只是那座小島上的猴子學會這項技能，而是附近所有小島上的猴子也都開始洗地瓜了。


    如同尼爾森醫師所言，量子物理學告訴我們，訊息的傳送是瞬間發生的。如果人們的心打開來，我們就能達到關鍵多數。


    在那次的瀕死經驗裡，我對遇見的那個男人說：「可是我們只有幾千人啊。」他答道：「數百萬人會聽見，但只有幾千人會牢記。」


    不過，這幾千人已經足夠了。謝謝你給我這麼一個方法，去完成我的使命。


