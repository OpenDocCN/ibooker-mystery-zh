  md: '# 心牆的象徵意義


    有一次，一對老夫妻來到我的診所，丈夫一臉忿忿不平，對待妻子的態度既粗魯又輕蔑，太

    太看起來則溫和許多。他們兩人都有心牆。丈夫的心牆是鋼做的，堅硬、冰冷，且有好幾哩厚；

    妻子的心牆則由成千上萬層帷幔構成，為她丈夫不甚討喜的性格提供很好的緩衝。


    我也見過一位男同志的心牆是由鑽石建造而成。鑽石是目前已知自然界中最堅硬的物質——

    順帶一提，他的潛意識當時不願意讓我幫他釋放心牆。


    我看過各式各樣的心牆材料，從花、被子、毛毯、泥土、石頭、植物、皮革、玻璃，到所有

    種類的金屬，例如鋼、鈦、鐵，甚至是各種建築材料，如木頭、水泥塊、磚頭等等。


    人的性格通常與他們心牆的材料有很明顯的關連。我治療過一個小朋友，她的心牆是黃色塑

    膠做成的，就和她的黃色塑膠玩具一樣。


    有時候，心牆上會有一道門或一扇窗。門往往是鎖上的，除了主人，誰也沒有鑰匙。


    雖然心牆時常是球狀的，但也有可能是箱形，或是你可以想像到的其他任何形狀。有些心牆

    的邊緣很尖銳，或是表面有投影，讓人無法輕易靠近。


    我遇過一個年輕人，他長相英俊，各方面條件都不差，而且生活中有許多機會，卻似乎總是

    無法和女性發展出親密關係。'
