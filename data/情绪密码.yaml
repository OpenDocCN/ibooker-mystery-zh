    愛那


    《聖經》上說，要切切保守你的心，因為一生的果效是由心發出。


    有些時候很奇怪，我會在讀書那個當下好像讀懂了，可是過了一段時間以後，通過不同媒體的啟示，對當初的理解又有了不同的領悟。


