    # (1) 精油性质


    从叶片或果实中都可以提取精油。多香果精油是从叶片中提取的，颜色黄褐色，与丁香的气味相似。从果实中提取的精油颜色为淡黄色，气味温和、清新、辛辣。


    # (2) 来源


    这种常绿植物原产于印度西部和美洲南部，高可达10m。种植第3年后开始结果，每个果实含有两个肾形的绿色种子。当果实成熟时种子为黑色，并变得光滑。树皮会剥落。牙买加为主要产地。


    之所以称其为多香果，是因为它的味道是由多种香味组成，包括丁香、杜松浆果、肉桂叶和胡椒的香味。在欧洲人到达加勒比海之前，当地人用作香料。多香果现在用作许多熟知的调味汁和作料的配料。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_103_0.png)


    多香果 Pimenta dioica


    # (3) 提取方法


    多香果精油是以叶片或果实为原料，采用蒸汽蒸馏法提取的。也有少量精油是从浆果树脂中提取的。浆果在完全成熟之前采集，因为当它们充分成熟时挥发油含量会降低。


    # (4) 化学成份


    丁子香酚（含量高达80%）、甲基丁子香酚、桉树脑、水芹烯和石竹（萜）烯。


    # (5) 治疗功效


    多香果精油的治疗功效：麻醉、止痛、抗氧化、防腐杀菌、祛风、肌肉放松、发红、激励和滋补。


    # (6) 使用注意事项


    多香果精油只能以低剂量使用，因为它对黏膜和皮肤有刺激作用。


    # (7) 用法


    多香果精油有助于治疗消化系统方面的疾病，包括腹部绞痛、肠胃气胀、消化不良和反胃恶心。它还可以缓解抑郁、精神疲劳、紧张、神经痛和压力过大的症状。


    # 1) 香炉和蒸发器熏香


    当心情不好的时候，在香炉或蒸发器中滴2滴多香果精油，有助于振奋精神和缓解压力。


    # 2) 做按摩油成份


    可以用很小剂量的多香果精油做按摩油的成份，以治疗胸腔感染，严重的肌肉抽筋或感冒。它也有助于治疗风湿病、关节炎、肌肉僵硬、打寒战、频繁的咳嗽和支气管炎。'
