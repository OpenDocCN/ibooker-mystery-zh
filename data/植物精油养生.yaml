  md: '**植物精油在家庭日常生活中的应用**


    Essential oils health


    使用精油做空气清新剂，仅需要按以下的要求去做：


    拿一个干净的塑料喷壶（给植物喷水的），灌半壶干净水，你最好使用过滤水或是瓶装水，以确保水中没有污染物，加8~10滴凉爽的、使人提神的精油，然后摇匀。当你想使房间空气清新时，摇匀喷壶，快速喷洒一些即可。但要确保离磨光家具远一点，因为精油会损伤磨光的家具。在避光、冷凉的地方保存喷壶。


    # (2) 几种空气清新剂配方


    去掉香烟味的喷雾，按照上面所说的水雾配制方法，在水中添加3滴迷迭香精油、3滴茶树精油和5滴桉树精油。


    去掉厨房烟味的喷雾，按照上面所说的水雾配制方法，在水中添加3滴椒样薄荷精油、3滴薰衣草精油和4滴鼠尾草精油。


    # (四) 做皮肤护理剂


    # 1. 家庭自制面部护理和收敛品（又称为滋补品）


    在调制面部滋养品时，添加一些类似于金缕梅酊剂的某种成份，能够增强收敛的功效，这也是面部滋养品所需要的。请注意，有些人使用金缕梅酊剂会有皮肤干燥的感觉。在调制滋养品时最好使用玫瑰水。在家里是很容易做些简单的护肤保养的，清洁掉护肤品后，可以用湿的棉球把皮肤擦拭干净。


    # (1) 家庭制作面部滋养品的方法


    滋养品的制作方法都是一样的。先把玫瑰水倒入玻璃瓶内作为底料，然后添加你选好的精油，给瓶子盖帽，剧烈摇晃瓶子，以帮助精油分散。通常商业化生产的此类产品是要添加一些助分散成份，因为家庭是现做现用就不用添加了。要把装有混合物的瓶子放置至少36小时，再次剧烈摇晃瓶子，用过滤纸过滤，以去除大量的精油，把滤液再次装瓶就可以待用了。记住，用前要摇匀。


    # (2) 面部滋养品的种类


    适合干性和一般肤质的滋补品：100mL玫瑰水、1滴甘菊精油、1滴天竺葵精油。


    适合油性和一般肤质的滋补品：100mL玫瑰水、1滴刺柏浆果精油、1滴奥托玫瑰精油。


    适合一般和敏感肤质的滋补品：可以用甘菊泡制100mL淡的茶水，往里滴1滴德国甘菊精油。这种甘菊茶味淡、色黑并带有一些苦味。如果得不到新鲜的材料，可以使用好的商业化的甘菊茶。


    一种收敛剂：25mL金缕梅酊剂、75mL玫瑰水、1滴丝柏精油、2滴檀香精油。'
