    # 3. 丁香精油


    丁香精油是从丁香植物（Syzygium aromaticum）中提取的，属于桃金娘科。


    虽然丁香精油效力很强，但在芳香疗法中要慎重使用。它能激发智力，振奋精神，帮助消化，缓解关节和风湿病的疼痛以及缓解呼吸系统疾病和腿部溃疡。


    # (1) 精油性质


    丁香精油味道温和、强劲，具有辛辣味。颜色从无色到淡黄色，黏质性中等到水性。


    # (2) 来源


    原产于印度尼西亚和马六甲海峡的岛屿，它是一种常绿树，可以长到大约 10m 高，叶片光亮绿色，花蕾指甲形状、玫瑰桃红色，翻烤烘干后变成深红褐色，可以把花蕾从树上直接打下来后烘干。


    拉丁文 Clavus 的意思是指甲形状，指花蕾。希腊人、罗马人和中国人经常用它来治疗牙痛，也用做口腔清新剂。它还有防腐杀菌的功效，经常用在预防传染性疾病方面。它是调味品贸易中重要的一种日用品，还用于制造香水、酿造葡萄酒和利口酒、春药、护牙产品。与柑橘相混可以作为润发油。在驱除蚊虫方面也会用到它。


    # (3) 提取方法


    丁香精油是以叶片、茎和花蕾为原料的。我们介绍的丁香精油是以叶片为原料的，采用蒸汽蒸馏法提取出来的，丁子香酚含量较低（为 80%）。而要从茎中提取，丁子香酚的含量会达到
    92% 。


