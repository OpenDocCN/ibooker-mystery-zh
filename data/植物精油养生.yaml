    4) 在更年期使用快乐鼠尾草精油，可以治疗身体发热、夜间流汗、心悸、易怒、头疼以及头昏眼花。

    5) 对肌肉疼痛、消化系统失衡、肾脏疾病有好处。对皮肤感染有冷却的效果。


    # (6) 使用注意事项


    快乐鼠尾草精油有很强的放松效果。当饮酒以后，最好避免使用快乐鼠尾草精油，因为它会扩大酒精的作用。它是无毒、无刺激的精油，但是大剂量的使用会导致头疼。一定避免在孕期使用。


    # (7) 用法


    快乐鼠尾草精油最大的功效在于能平缓安定神经、情绪、妇科方面的疾病，对肾脏和消化系统也有益处。它也有助于皮肤的痤疮、疖子和溃疡的痊愈，对肌肉和关节的疼痛有冷却的作用。


    +   1) 香炉和蒸发器

    在蒸汽疗法中，快乐鼠尾草精油可以用来治疗神经紧张、精神压抑、焦虑、失眠和更年期症。它对于减轻消极的情绪和创造一种更加积极的人生前景非常有效。也有助于提升创造力和领悟更多的直觉知识。

    2) 做按摩油或盆浴的添加成份

    快乐鼠尾草可以在复方按摩油中或稀释在浴缸中使用，以缓解肌肉疼痛、性冷淡、精神压抑、焦虑、月经问题、月经前不快症状（PMS）、神经紧张、失眠、抽筋和上瘾症。

    3) 做面霜或润肤乳的添加成份

    做面霜或润肤乳的添加成份时，快乐鼠尾草精油对皮肤问题、背部疼痛、抽筋、月经前不快症状和脖项僵硬有效。它在平衡油脂分泌和清除面部多余油脂方面的效果尤其的好。


    # (8) 适合与快乐鼠尾草精油混用的精油'
- md: '- 刺柏、薰衣草、松树、天竺葵、檀香、茉莉、乳香和其他柑橘类精油。


    ## 10. 香茅精油


    香茅精油是从亚香茅植物（Cymbopogon nardus）中提取出来的，属于禾本科香茅属。虽然这种精油早就被认定是一种驱虫精油（尤其是对携带疟疾的蚊子有效）。它对于清新大脑、净化房间、使皮肤软化也有很大的益处；还可以用于清洁油性皮肤和汗脚。


    - （1）精油的性质

    香茅精油味道清甜，有股柠檬味。


    - （2）来源

    原产于斯里兰卡和爪哇，是从一种坚硬的草中提取的。这种芬芳的多年生植物，可以长到 1m 高，使用在蜡烛里很受欢迎，可用于驱虫；香水、肥皂、皮肤清洗液和除臭剂里也常用到香茅精油。


    - （3）提取方法

    香茅精油是以切细的新鲜草或干燥（也可部分干燥）的草为原料，采用蒸汽蒸馏法提取的。


    - （4）化学成份

    香茅酸、龙脑、香茅醇、香叶醇、橙花醇、柠檬醛、香茅醛、蒎烯、二戊烯和柠檬精油。


    - （5）治疗功效

    香茅精油的最有效的特性是驱虫，经常被用作驱虫剂。它也常用作喷雾、扩散剂或做亚麻制品中棉布球的成份。它对于驱除狗和猫身上的跳蚤也有效果。此外，香茅精油有助于清新头脑，对身体有很好的调养和滋补的效果。可以治疗感冒、流感和轻微的感染，也有除臭的作用。


    - （6）使用注意事项

    对于个别皮肤敏感的人，使用香茅精油可能引起皮肤产生过敏反应和皮炎。


    - （7）用法

    香茅精油不仅可以在作杀虫剂中发挥作用，而且，当在病人房间使用它用于杀菌时，也会取得良好的效果。在清新大脑方面，它也有极好的效果。还可以抑制过多流汗、平衡皮肤油脂、杀死肠道内的寄生虫和减轻发烧。


    1) 香炉和蒸发器

    在蒸汽疗法中，香茅精油可以用作杀虫剂，治疗感冒和流感，清新大脑和病人的房间。在非洲，存在着严重的疟疾现象，香茅精油被广泛用于驱除携带这种讨厌疾病的蚊子。


    2) 做面霜和润肤乳的添加成份

    做面霜和润肤乳的添加成份，在热带地区使用时，香茅精油可以让人们放心地穿着，因为它能够驱避携带疟疾的蚊子。另外，它对劳累出汗的脚有神奇的清爽效果。


    (8) 适合与香茅精油混用的精油

    佛手柑、天竺葵、柠檬、柑橘、薰衣草和松树精油。


    ## 11. 柠檬香茅精油


    柠檬香茅精油是从柠檬香茅植物（Cymbopogon citratus）中提取的，属于禾本科，又称为蜿蜒香茅和退热草。


    它是一种味道清新的精油，可以有效地治疗时差反应，分解脂肪，减轻身体和精神的疲劳，还可以驱除家庭里的跳蚤和扁虱。


    (1) 精油性质

    柠檬香茅精油气味清甜，具有柠檬香味，颜色暗黄或琥珀色略带微红，水质黏性。


    (2) 来源

    它是一种生长迅速的多年生的香草，可以长到大约 1m 高，叶片细长，根系网状结构，会很快把土壤中的养分消耗尽。它起初野生于印度。


    它在印度，被称为"choomana poolu"，又被当作是“印度马鞭草”或“印度蜜蜂花”，它作为一种印度草药，用于退烧和治疗感染性疾病。在香水制造业中，它是种有价值的成份，可以用做制造柑橘类型的肥皂，也能用于驱避蚊虫。


    相关品种马丁氏香茅（C. martinii）和亚香茅（C. nardus），它们所生产的香精油被广泛用于制造肥皂和清洁剂。


    (3) 提取方式

    柠檬香茅精油是以新鲜或部分干燥的叶片为原料，采用蒸汽蒸馏法提取的。


    (4) 化学成份

    月桂（香叶）烯、香茅醛、乙酸香叶酯、橙花醇、香叶醇、橙花醛、微量的柠檬油精、柠檬醛。


    (5) 治疗功效

    1) 柠檬香茅精油可以促进身体的新陈代谢，缓解时差反应和头疼症状，缓和神经疲倦和压力过大引起的症状。

    2) 它是身体全面的滋补品，能改善副交感神经系统的功能，促进腺体的分泌，有助于身体的康复。

    3) 它对呼吸系统的感染也有作用，如咽喉疼痛、喉炎和发烧，并能预防感染性疾病的蔓延。对治疗大肠炎、消化不良和肠胃炎也有效。

    4) 有助于调和肌肉和组织，通过多给肌肉补给来缓解肌肉疼痛。它还有助于改善不良循环，还可当作驱虫剂。它有清除跳蚤、扁虱和虱子的作用。

    5) 有助于清洁油性皮肤和痤疮，以及治疗脚臭。还可以缓解过多排汗的症状。


    (6) 使用注意事项

    柠檬香茅精油对敏感性皮肤有刺激作用，所以要慎重使用。在孕期要避免使用，它有可能引起皮肤过敏。虽然一些人对柠檬香茅精油有过敏的反应，但是多数人使用浓度低于 3%
    时，不会产生过敏性反应，因为柠檬香茅精油仅含有微量的柠檬醛成份（而东西印度的柠檬香茅"Andropogon flexuosus and A. citratus"所含量达到了
    79%），发生过敏或刺激的可能性很小。


    (7) 用法

    柠檬香茅精油作为肌肉和皮肤的调理品有很强的功效。还能促进身体和大脑的新陈代谢活动，帮助控制感染和清除家里的微生物，释放清新空气。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，柠檬香茅精油可以用于治疗神经系统，驱除蚊虫。在感到昏昏欲睡的时候，它也可以保持头脑清醒，补充能量释放疲劳。


    2) 做复方按摩油或稀释在浴盆中使用

    柠檬香茅精油做复方按摩油或稀释在浴盆中使用，可以用于分解脂肪团，治疗消化问题，可利尿。可以治疗感染和神经衰弱，以及韧带拉伤。还可以做常用的滋补品。


    3) 做面霜或润肤乳的成份

    当用于面霜或润肤乳时，柠檬香茅精油可以分解脂肪团，调理肌肤，疏通堵塞的毛孔，有助于治疗痤疮。它的防腐杀菌的性质可以用于治疗脚臭和其他的真菌感染。


    (8) 适合与柠檬香茅精油混用的精油

    罗勒、柏木、芫荽、天竺葵、茉莉、薰衣草和茶树精油。


    ## 12. 棕榈玫瑰精油


    棕榈玫瑰精油是从棕榈玫瑰植物（Cymbopogon artini、Cymbopogon artini var. martinii）提取的，属于禾本科香茅属，又称为东印度和土耳其天竺葵。在国内也有叫玫瑰草的。


    它有很好的皮肤护理功效，也可用于缓解肌肉僵硬和酸痛，能使头脑保持清醒，振奋精神，使灵魂保持安逸，清除思想中混乱的想法。所以这种特别的精油很快就成为大众欢迎的芳香疗法和治疗用油。


    (1) 精油性质

    棕榈玫瑰精油有清甜的花香味，隐含着玫瑰的气味，颜色淡黄，接近水质的黏性。


    (2) 来源

    它是一种野生常绿的淡黄色的草本植物，茎细长柔软，在其顶端开花，叶片绿色、芳香。它在开花前收割，收割后约 1 周时间，草完全晒干，这时的出油率最高。

    因为棕榈玫瑰精油有类似玫瑰的气味，所以有些精油批发商或零售商，会肆无忌惮地往玫瑰精油中添加棕榈玫瑰精油。

    它也常常作为肥皂、香水和化妆品的成份，在烟草中做调味品使用。


    (3) 提取方法

    棕榈玫瑰精油是以开花前收割的草晒干后作为原料的，采用蒸汽蒸馏技术，产油率在 1% ~ 1.5%。


    (4) 化学成份

    月桂（香叶）烯、芳樟醇、香叶醇、乙酸香叶酯、二（聚）戊烯和柠檬清油。


    (5) 治疗功效

    1) 能安抚情绪、振奋精神和清除混乱想法的功效。它还可以用来抵抗身体和神经的疲劳，解决神经过敏症等与压力有关的问题。

    2) 在身体康复阶段中使用效果好。有降低体温，助于消化系统，抑制大肠感染，恢复消化动力，减轻厌食症，缓解肌肉酸痛和僵硬方面均有疗效。

    3) 对皮肤有保湿作用，可以协调水分平衡，刺激细胞再生。对皮脂的分泌也有平衡作用，能保持皮肤的柔软和弹性，可以治疗痤疮、皮炎，预防形成伤疤，对皮肤有返老还童和再生的功效。还可以治疗皮肤感染，缓解脚的酸疼症状，治疗脚气。


    (6) 使用注意事项

    无毒、无刺激和无过敏性，没有发现不良反应。


    (7) 用法

    棕榈玫瑰精油对皮肤、神经、消化系统及与精神压力有关的问题，有治疗功效。

    1) 香炉和蒸发器熏香

    在蒸汽疗法中，棕榈玫瑰精油可以用于身体康复期，可以缓解疲劳、神经紧张和压力过大的问题，还有振奋精神，清除思想杂念的作用。

    2) 做复方按摩油或稀释在浴盆中使用

    棕榈玫瑰精油做复方按摩油或稀释在浴盆中使用，可以用于康复期的病人，能缓解疲劳、神经紧张和压力过大的问题，还有强化呼吸系统的功能，能促进皮肤健康。

    3) 做面霜或洗液的成份

    当用于面霜或洗液时，它可以清洁感染的地方，预防形成伤疤。当添加在水中使用时，可以用于清洗伤口。当用作面霜或洗液的成份时，它对皮肤有保湿的功效，可以有效地舒展皱纹。它也可以平衡皮脂的自然分泌，保持皮肤柔顺和弹性。同时它还有助于新组织的形成，因此对皮肤的返老还童和再生非常有效。有人发现用棕榈玫瑰精油治疗脚气，效果很好。但要注意，不提倡在皮肤上直接使用精油，但可以把它稀释在乳化油中泡脚。


    (8) 适合与棕榈玫瑰精油混用的精油

    天竺葵、香柠檬、迷迭香、酸柠檬和依兰精油。


    ## 13. 万寿菊精油


    万寿菊精油是从万寿菊植物（Tagetes minuta、Tagetes glandulifera）中提取的，属于菊科。它经常与金盏花精油相混淆，金盏花属于菊科，又称“真正的万寿菊”。


    主要应用于治疗感染，尤其适用于治疗化脓性伤口和胸腔发炎的症状。


    (1) 精油性质

    万寿菊精油气味温和、甜，有类似于柑橘气味的果香味道，颜色黄色或红琥珀色。黏性中等，如果长期暴露在空气中，会变黏甚至成为凝胶状。


    (2) 来源

    在非洲人们称其为“卡其布灌木”，现在法国和北美洲也有种植。一般处于野生状态，叶片革质、深绿色，花多、橘黄色，类似于康乃馨。它的叶片和花是很好的驱虫剂，经常可以看见当地的棚屋上悬挂有此物，用于驱赶成群的苍蝇和蚊子。以
    5% 的精油浓度，可以用于杀死外露伤口的蛆，有人发现它的根系和种子有助于清除体内的毒素。万寿菊精油是许多治疗足部制剂的成份，也在某些香水中使用。


    (3) 提取方法

    万寿菊精油是以叶片、茎和花为原料的。采集时间是当种子开始形成期。


    (4) 化学成份

    万寿菊酮、柠檬烯、颉草酸和罗勒烯。


    (5) 治疗功效

    万寿菊精油是一种有价值的驱虫剂，可治疗寄生物和真菌引起的感染。还可治疗胸腔炎、咳嗽和黏膜炎，可以扩大支气管，促进黏液的流动，缓解充血状态。也用于治疗皮肤感染。它对创伤、切伤、姆囊炎（大趾内侧的肺炎）都有治疗作用。


    (6) 使用注意事项

    万寿菊精油功效强劲，应以小剂量使用，孕期避免使用。它能引起光敏性反应，敏感性皮肤要避免使用。


    (7) 用法

    万寿菊精油可以用于治疗呼吸系统和皮肤感染，还可以当作驱虫剂。

    1) 香炉和蒸发器熏香

    在蒸汽疗法中，万寿菊精油可以用于治疗咳嗽、支气管炎、胸腔炎和用作驱虫剂。

    2) 做复方按摩油或稀释在浴盆中使用

    万寿菊精油做复方按摩油或稀释在浴盆中使用，可以用于治疗创伤、割伤、咳嗽、胸腔感染以及寄生物和真菌引起的感染。

    3) 做面霜或润肤乳的成份

    当用于面霜或洗液时，万寿菊草油对真菌和细菌引起的感染有非常好的疗效，尤其适用于治疗化脓的伤口。


    (8) 适合与万寿菊精油混用的精油

    薰衣草、快乐鼠尾草、茉莉、柠檬、没药和橘子精油。


    ## 14. 百里香精油


    百里香精油是从百里香植物（Thymus vulgaris、Thymus aestivus，T. ilerdensis and T. velantianus）中提取的，属于唇形科，又分为普通或红色的百里香，还可称为麝香草、花园草。


    这种精油会使皮肤发生敏感性反应，但对集中注意力十分有益，还是支气管和肺部很好的激励物质。可以用于治疗支气管炎、咳嗽、感冒、哮喘和类似的疾病。另外，它特性温和，对于治疗风湿病、坐骨神经痛、关节炎和痛风也有疗效。


    (1) 精油性质

    它有着适中的甜味，但草香味很重，颜色红棕色或琥珀色。


    (2) 来源

    希腊人、埃及人和罗马人经常把它当作一种草药使用。它是一种古老的多年生常绿植物，可以长到 45cm 高，根系木质化，茎多分枝，叶片小、绿灰色、椭圆形，带有香味，花淡紫色或白色。


    (3) 提取方法

    百里香精油是以新鲜或部分干燥的花上部和叶片为原材料，采用水或蒸汽蒸馏法提取的，出油率在 0.7% ~ 1.0%。


    (4) 化学成份

    侧柏酮、松萜或蒎烯、茨烯、异丙基甲苯或百里香素、松油精或萜品烯、芳樟醇、龙脑、石竹（萜）烯、麝香草酚和香芹酚。


    (5) 治疗功效

    百里香精油能够强壮神经，增强记忆力，提高注意力，有助于缓解疲劳，抵抗压抑。它能增强肺部功能，可以缓解感冒、咳嗽、哮喘、喉炎、鼻窦炎、黏膜炎、咽喉痛和扁桃体炎的症状。百里香精油有利于提高免疫能力，治疗感冒、流感、感染性疾病和打冷战，还可以作为泌尿系统的消炎剂，治疗膀胱炎和尿道炎。这种精油具有温和效果，能缓解关节炎、风湿病、痛风、肌肉疼、扭伤和运动伤病症。它还有助于分解脂肪团，治疗厌食症、水肿，对妇科疾病也有一定疗效，还能帮助分娩。


    (6) 使用注意事项

    它是一种效力强劲的精油，孕妇或有高血压的患者要避免使用。因为它含有苯酚的成份（香芹酚和麝香草酚），能使黏膜和皮肤产生刺激性反应，所以不能用作皮肤护理产品的成份，一般应以低浓度使用。当用它做按摩治疗时，最好先做皮试，看是否有过敏性反应。


    (7) 用法

    百里香精油有助于治疗神经系统、呼吸问题、消化系统和泌尿系统方面的疾病。

    1) 香炉和蒸发器熏香

    在蒸汽疗法中，百里香精油有助于治疗支气管炎、咳嗽、鼻窦炎、黏膜充血和肌肉酸疼。

    2) 做复方油的成份

    做复方油的成份，可以治疗关节炎、支气管炎、感冒、流感、咳嗽、痛风、瘀伤、湿疹、黏膜充血、肌肉疼和风湿病，还可以减肥。

    3) 做漱口水和漱口剂的成份

    当稀释以后，做漱口水和漱口剂的成份时，百里香精油有助于治疗齿龈感染和扁桃体炎。

    4) 直接使用精油

    百里香精油可以治疗动物咬伤和疖子，但是一定要小心使用，因为可能会造成皮肤过敏性反应。


    (8) 适合与百里香精油混用的精油

    佛手柑、葡萄柚、柠檬、薰衣草、迷迭香和松树精油。


    ## 15. 蜡菊精油


    蜡菊精油是从蜡菊属植物（Helichrysum angustifolium）提取的，属于菊科，其精油一般被称为“永恒之油”，其植物被称为“不凋花”。


    (1) 精油性质

    蜡菊精油有种强烈的稻草味和果香味，隐约含有茶和蜂蜜的气味；颜色浅黄到红色。黏质性为水性。


    (2) 来源

    这种常绿的草本植物，可以长到 60cm 高，又被称为意大利永生草或不凋花。茎有分枝，叶片银绿色、有芳香，花色暗黄、类似于雏菊，当植物成熟时，花朵变干，然而仍保持原有颜色。蜡菊属植物大约有
    500 个品种，但是仅有少量品种可以用于提取精油。在中世纪时期，蜡菊属植物的花朵，在全欧洲都被当作一种点缀使用。


    (3) 提取方法

    蜡菊精油是以新鲜或干燥的丛生花头为材料，采用蒸汽蒸馏法提取的。如果花朵在采摘后 24 小时内完成蒸馏，可以获得高质量的油，越是采自幼龄植物的花朵，所蒸馏出的精油越好。


    (4) 化学成份

    松萜或蒎烯、茨烯、月桂烯、柠檬油精、桉树脑、芳樟醇、松油烯、橙花醇、香叶醇、丁子香酚和其他的二酮。


    (5) 治疗功效

    1) 有助于治疗循环系统的失调。它能缓和关节炎和风湿性病的疼痛，对感冒、流感、支气管炎、咳嗽和哮喘也有较好的治疗效果。

    2) 具有极好的再生效果，可以帮助治疗伤疤、痤疮、皮炎、妊娠纹、疖子和脓肿。民间医学也有用它治疗伤疤和老年斑的。

    3) 有助于治疗消化系统疾病，降低肝脏和脾的充血。


    (6) 使用注意事项

    蜡菊精油没有毒性、没有刺激性和过敏性，但是应避免给 12 岁以下的孩子使用。


    (7) 用法

    1) 蒸汽治疗或稀释在盆浴中使用

    在蒸汽疗法或稀释在盆浴中使用时，蜡菊精油能够用于治疗肌肉疼痛、呼吸道问题和消化系统疾病。

    2) 作为复方按摩油的成份

    蜡菊精油作为复方按摩油的成份，能够帮助减轻肌肉的疼痛，治疗呼吸道问题和消化系统疾病。

    3) 做面霜或润肤乳的成份

    作面霜或润肤乳的成份，蜡菊香精油对于皮炎、痤疮和伤疤的治疗有明显疗效，还可以延缓衰老。


    (8) 适合与蜡菊属植物精油混用的精油

    佛手柑、洋甘菊、鼠尾草、薰衣草、柑橘和花梨木精油。


    ## 16. 野艾精油


    野艾精油是从野艾植物（Artemisia vulgaris）植物提取的，属于菊科。


    (1) 精油性质

    野艾精油是有毒的，被划归为堕胎药类和神经毒素类。


    (2) 来源

    这是一种具有芳香气味的多年生植物，茎红紫色，叶片缺刻较深、暗绿色，叶背白色。圆锥花序，夏季开花，花细小、红褐色。传统上，人们把它作为一种符咒，用于驱避邪恶与灾难。在中草药里，其干燥压碎的叶片（艾蒿）可以用来暂时提高皮肤温度，以防止内部寒冷。作为一种草药，可用做肠胃刺激剂、利尿剂和神经滋补剂。在英国的草药药典中，野艾被列为治疗无月经和痛经的药品。


    (3) 提取方法

    野艾精油是以叶片和花的顶部为原料的。


    (4) 化学成份

    包括侧柏酮、桉树脑、茨烯。


    (5) 使用注意事项

    野艾精油不能用于芳香疗法，是一种有毒的、含神经毒素的堕胎药。


    ## 17. 苦艾精油


    苦艾精油是从苦艾植物（Artemisia absinthium）中提取的，属于菊科。


    (1) 精油性质

    苦艾精油有毒，是一种神经毒素和堕胎剂。'
