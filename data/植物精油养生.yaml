    # ## 5. 家里制作天然的面部清洁剂


    (1) 面部清洁剂的作用

    当你照镜子时，你面对的是灰暗、干燥和满是皮屑的肌肤，这可能就到了使用一些清洁剂的时候了。它可以除掉堵塞在皮肤表层的死细胞，使隐藏在下面年轻肌肤显现出来。虽然，在市场上有各种各样的商业擦洗剂，但是，我们发现，在家里自己做的擦洗剂对皮肤的使用效果是最充满活力的，可以使肌肤泛着玫瑰红色，增进皮肤的健康。


    (2) 面部清洁剂的用法

    清洗面部以后，用毛巾轻轻地把脸擦干，以温和的手法在面部做圆弧动作来涂抹黏性的混合物，但要避开眼部范围，在面部保留混合物15分钟，然后用微温的水清洗掉混合物。


    面部清洁剂的配制：取2~3茶匙的生燕麦（没有提前炒熟的），用手或研磨工具把它压碎成更小的块状物。在燕麦块中添加一些纯蜂蜜和1/4茶匙的苹果酒醋并进行搅拌，直到形成一种滑润的混合物。也可多加些蜂蜜。最后在混合物中添1滴罗勒精油。对于有问题的皮肤，可以用茶树精油代替罗勒精油，以促进愈合速度。


    (3) 使用注意事项

    有皮肤问题的年轻人应该小心，不要过度地使用面部清洁剂，过度地清洁或擦洗肌肤不但不会减轻皮肤问题，效果会是相反的，因为皮肤经过度刺激以后，自己的康复能力就会受到影响。所以，皮肤不好的人可以进行清洁处理，但操作过程要轻柔，使用频率不能过高，如果有什么疑问，请向你的主治医生或皮肤科医生进行咨询。但对于那些为了消除年龄带来痕迹的人来说，皮肤的清洁有助于促进血液循环和去除那些使人看起来灰暗和干燥的皮肤死细胞，清洁皮肤可以每14天做1次，在有些情况下，可以每周做1次。


    # ## 6. 花水


    (1) 花水的来源

    花水，又称为水溶胶。许多零售商提供的“精油水喷雾”其实不是真正的花水。花水是不能制作的，是精油提取中的蒸馏法过程中产生的附属产品。在市场上有如此多见的花水，其实很多都是再生的。少量精油混入水中，加些有扩散作用的成份，这样配制的混合物不是花水。


