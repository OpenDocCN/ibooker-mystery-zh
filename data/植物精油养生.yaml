    # **（二）恢复嗅觉**


    有一位患者多年来都受到慢性鼻窦炎之苦，他的嗅觉也在慢慢衰退，并且持续地受到短暂失去嗅觉的痛苦。手术后，他的情况并未得到改善，而且常常地感到没有嗅觉，令他的人生很悲惨。当他下班回家，没有办法闻到太太为他准备的晚餐的香味，而他的太太是一个很出色的厨师。更惨的是，他甚至没有味觉，因为嗅觉和味觉是紧扣着的。在他太太的探听下，他们来到了一个芳香疗法诊所，芳疗师为他做了一个“三明治”式的全身穴位按摩，然后又在脸上重做一次。在配方里，芳疗师选择了两种效果强烈的精油——薄荷及蓝胶尤加利，但是他都没有察觉到。在接受第3个疗程后，他想他应该可以闻到一点东西。芳疗师在木片上加入薄荷，放在他的鼻子前面。他发出很高兴的尖叫，然后说：“我可以闻到淡淡的薄荷味了，虽然不明显，但是我能闻到它。”6个月后，他恢复了嗅觉，能享受到他太太煮饭的一些香味，这令他们两人生活得更快乐。而比恢复嗅觉更好的结果是：这让他们的婚姻更愉快，同时没有预期中的副反应。


