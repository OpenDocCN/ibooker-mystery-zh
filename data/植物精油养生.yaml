- img_proc: true
  md: '- 用香皂类产品清洗这层油脂，清洗结果还会在皮肤残留对皮肤神经末梢有刺激的成份，多数人的皮肤不到一天就会又有油腻感觉。

    - 如果用干净的油来清洗这层油脂，实际将是一种溶解与替代的过程。用油洗面的过程包含着按摩的手法，通过按摩能够把黏附在皮肤表面的脏东西溶解掉，进而使干净的油逐渐地代替了原来脏油所处的位置。我们研究发现，皮肤神经末梢细胞处于这种植物油的环境内，不会刺激油脂腺分泌油脂。因为植物与动物都起源于海洋微生物；有着共同的祖先；在生物进化中，植物的提取物与动物的识别系统在遗传物质的严格复制过程中，必然也存在着一定的联系。所以，人类皮肤的识别系统对植物油是认可的。

    - 对于超出皮肤吸收和吸附能力的植物油，可以用香皂一类的去油产品洗掉。清洗方法在后面使用方法中陈述。油洗面的结果就是在皮肤表面形成油膜，皮肤对外界反应迟钝，油脂腺分泌自然就减少了。


    (2) 植物油洗面能彻底清除皮肤表面的污物


    - 植物油洗面能把面部结合态油垢溶解起来，洁面效果比单独使用香皂类产品效果更理想。因为香皂或洗面奶均是两性物质，也就是既有亲水成份，也有亲油成份。在去除面部的非水性污物时，它们中的亲油成份需要与油溶性的污物充分融合后变成水溶性物质，才能被水从面部清洗掉。而沉淀在面部毛孔内壁和表皮层的结合态污物主要成份为皮肤自身分泌物（油脂）和代谢物（蛋白质）的混合体，因为这种结合态混合体表现为疏水性，受接触面和极性的限制，不能像游离态的疏水性污物那样，在短时间内是被转化成水溶性物质的，也就无法被水从面部清洗掉。但是，如果用油先把这种油溶性的结合态污物转化成游离性的污物，然后再用香皂之类的物质转化成溶于水性的物质，就很容易把结合态的油溶性污物清洗掉。


    (3) 植物油洗面有疏通毛孔，帮助皮脂分泌的功能


    - 大家知道，相关联的毛孔堵塞和油脂分泌旺盛现象是导致痤疮发生的宏观诱导因素之一。皮肤自身分泌的油脂滞留在堵塞的毛孔中就会变质，而成为痤疮丙酸杆菌的食物。使用这种油洗面的按摩动作同时还能够使油渗透到毛孔深处，渗透过程对皮肤毛孔内油脂腺的分泌通道有疏通、清洁和润滑的作用。这样，既有利于保持毛孔的畅通，还能用清洁的植物油替换出丙酸杆菌已适应繁殖用的人体变质油脂，表现出缓解和预防痤疮发生的效果。


    5. 植物油制备方法及其成份分析


    - (1) 市场现有同类产品

    - 目前，用于皮肤护理的植物油很多，包括橄榄油、葡萄籽油、小麦胚芽油、荷荷芭油、月见草油、金盏草油、甜杏仁油A（Almond oil）和杏仁油（Apricot
    kernel oil）等。'
