  md: '常用单方植精油

    Essential oils health


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，它可以用于缓解黏膜炎，增添活力、克服反胃晕船，治疗感冒、流感，以及感觉孤独和性冷淡。


    2) 做复方按摩油或稀释在盆浴中使用

    做复方按摩油或稀释在盆浴中使用，它可以用于治疗关节炎、风湿病、反胃晕船、感冒和流感、肌肉疼、不良循环和呕吐。


    3) 做面霜或润肤乳添加成份使用

    作为面霜或润肤乳的一部分，它可以用于治疗关节炎、肌肉疼、风湿病，也有助于治疗循环不良和消散瘀伤。


    4) 做热敷配料

    在热敷材料中使用时，姜精油可以用做治疗关节炎、风湿病、肌肉疼和消化不良。


    5) 滴在手帕上使用

    为了方便使用，在手帕上滴1滴精油，及时快速吸入，在晕船、清晨恶心、消化不良、感冒和流感，以及在旅行中呕吐时使用。


    (8) 适合与姜油混用的精油

    香柠檬、乳香、橙花油、玫瑰、檀香和依兰精油。


    # ### 12. 枯茗精油


    枯茗精油是从枯茗植物（Cuminum cyminum）中提取的，属于伞形科，又称为孜然芹、欧莳萝和罗马香菜。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_114_0.png)


    (1) 精油性质

    它的味道辛辣，穿透力很强。


    (2) 来源

    最初起源于地中海地区，它是一种一年生植物，高约50cm，叶片深绿、细长、革质，花朵微小、白色或粉红色，果实小、椭圆形。


    在圣经诞生时期，它就是一种知名的植物，主要被用于治疗消化系统的疾病。埃及人用它治疗头痛。古代犹太法利赛教派的教徒用它来交税。在中世纪，封建制度下的地主用它给农奴支付薪水。枯茗是印度咖喱饭的主要成份，还被作为墨西哥民族器皿的图案。


    (3) 提取方法

    枯茗精油是以干燥的种子为原料的，采用蒸汽蒸馏法'
