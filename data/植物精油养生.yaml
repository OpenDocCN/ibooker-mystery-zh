    # (六) 树脂类精油


    # 1. 安息香精油


    安息香精油是从安息香树脂中提取出来的，安息香树（Styrax Benzoin）属于安息香科

    红皮属，又称为贝加明树脂、爪哇乳香。


    这种用树脂提取的精油有很强的镇静和提神的作用，能够帮助抚慰悲伤和孤独的情感；同时，也能刺

    激循环和调理呼吸系统的不畅。对恢复皮肤的弹性也有好处，可以淡化皮肤的红色，有止痒和止过敏的功效。


    (1) 精油性质

    安息香精油气味温和，有甜味，类似于香草的味道，香气平和，滞留期长。它的颜色金褐色，有点像

    蜂蜜的黏性。


    (2) 来源

    它主产于爪哇、苏门答腊岛（在印尼西部）和泰国，可以长到 8m 高。在树干上割深深的切口，一种

    浅灰色的树液就会从切口处渗出。当树脂变得坚硬和发脆时，就可以把它从树干上收集起来了。


    安息香树脂，是传统的熏香成份之一。在古代文明中，它经常被用来安抚愤怒的情

    绪，还是男修道士用的香水成份。它对呼吸系统也有好的作用。在现代香水工业中，它常

    常作为防止香味过快挥发的固定剂。


    (3) 提取方法

    安息香精油是从有 7 年树龄或更年长的安息香树的树脂中提取的，使用溶剂萃取方

    式，出油率在 65% ~ 85%。


    (4) 化学成份

    安息香、苯乙烯酸、苯甲基安息香酸盐、安息香醛、香草醛、苯基酯（60% ~ 80%），


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_125_0.png)'
