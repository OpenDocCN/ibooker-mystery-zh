    ## （三）草类精油


    ### 1. 椒样薄荷精油


    椒样薄荷精油是从薄荷植物中（Mentha piperita）提取的，属于唇形科，又称为欧薄荷。


    在芳香疗法中，这种凉爽和清新的精油能够刺激大脑，振奋精神和提升注意力；可以使皮肤感到凉爽，淡化皮肤的红色，缓解刺激和瘙痒。此外，有助于缓解结肠痉挛、偏头痛、鼻窦炎和胸口憋气，改善消化系统的功能。


    #### (1) 精油性质


    椒样薄荷精油有种清新、强烈的薄荷醇味；颜色清澈或浅黄，黏质性为水性。


    #### (2) 来源


    它原产于地中海地区，现在意大利、美国、日本和英国都有栽培。它是一种多年生植物，可以长到1m高，叶片锯齿状、披绒毛，花朵桃红色到紫红色，呈长圆锥形。它具有地下茎，可以用作繁殖材料，这种植物有许多品种，欧薄荷是水薄荷（M.
    aquatica）和荷兰薄荷（M. spicata）的杂交种。


    希腊神话中，有位美丽的少女明忒被冥王普路托所钟爱着，他的妻子珀尔塞福涅（宙斯之女，被冥王劫持娶作冥后）非常嫉妒，就残忍地把明忒埋到了地下，于是普路托就把她变成了这种植物。他知道，当人们看到这种植物的时候，就会想到明忒过几年还会回来的。


    从古时候开始，它在日本和中国就有栽培。在埃及坟墓里找到的证据表明，远在公元前1000年，人们就已经开始使用薄荷。


    #### (3) 提取方法


    椒样薄荷精油是从将要开花前收割的地上整株植物中提取的。这种油采用蒸汽蒸馏法提取，以新鲜或部分晒干的植物做原料，出油率在0.1%~1.0%。


    #### (4) 化学成份


    薄荷醇、薄荷酮、桉树脑、醋酸甲酯、甲基乙醇呋喃、柠檬油精、松萜或蒎烯、桧烯氢氧化物和蒲勒酮。


    #### (5) 治疗功效


    1) 椒样薄荷精油对于精神疲劳和压抑有良好的效果，有提神、刺激思维敏捷和集中注意力的作用。它有助于治疗感情冷淡、担惊受怕、头疼、偏头疼、神经压抑、眩晕和虚弱症状，还能缓解呼吸系统失调的症状，包括干咳、鼻窦充血、哮喘、支气管炎、肺炎、肺结核和霍乱。

    2) 对于消化系统，椒样薄荷精油对于许多疾病都有疗效，包括刺激胆囊和促进胆汁分泌。它有助于治疗腹部绞痛、抽筋、消化不良、结肠痉挛、肠胃气胀和反胃恶心，还能缓解牙痛、脚痛、风湿病、神经痛、肌肉和月经痛。

    3) 可用于缓解皮肤刺激和瘙痒，也能帮助淡化皮肤红色，有消炎的作用。它可以治疗皮炎、痤疮、癣菌病、疥疮和瘙痒症，有预防晒伤的疗效，同时有清凉肌肤的作用。


    #### (6) 使用注意事项


    以低剂量使用薄荷精油是无毒和无刺激的。但是因为它含有薄荷醇的成份，所以要注意它的感光性。它对皮肤和黏膜会产生刺激作用，所以使用的时候要远离眼睛。在孕期要避免使用，不要给7岁以下的孩子使用。


    #### (7) 用法


    椒样薄荷精油有助于治疗神经系统失常，对刺激大脑和集中注意力有很强的功效，还可以用于治疗呼吸系统感染、肌肉疼和一些皮肤方面的问题。


    1) 香炉和蒸发器熏香


    在蒸汽疗法中，椒样薄荷精油可以用于提高注意力，刺激大脑，缓解咳嗽、头疼、反胃，对于驱虫也有作用。


    2) 做复方按摩油或稀释在浴盆中使用


    椒样薄荷精油做复方按摩油或稀释在浴盆中使用，有助于治疗腹部绞痛、抽筋、后背疼痛、肠道感染、结肠痉挛、黏膜炎、大肠炎、循环不良、便秘、咳嗽、痢疾、脚部疲劳出汗、肠胃气胀、头疼、肌肉疼、神经痛、反胃、风湿病、精神疲劳。还可以治疗皮肤红肿、发痒以及其他的炎症。


    3) 用做漱口水成份


    含有椒样薄荷精油的漱口水可以改善口气，治疗齿龈发炎。


    4) 做面霜或润肤乳的成份


    当用做面霜或润肤乳的成份时，椒样薄荷精油可以缓解因太阳灼伤引起的刺痛感，缓解皮肤发炎和瘙痒症状，因有收缩血管的功效，可以降低皮肤的温度。


    ### (8) 适合与椒样薄荷精油混用的精油


    安息香、桉树、薰衣草、甜牛至、柠檬和迷迭香精油。


    ---


    ### 2. 留兰香精油


    留兰香精油是从薄荷植物（Mentha spicata，Mentha viridis）中提取的，属于唇形科，又分为大叶留兰香和小叶留兰香。又称为绿薄荷和荷兰薄荷。


    虽然不如椒样薄荷受欢迎，但是这种精油更加温和，可以给孩子使用；它对消化系统有更好的功效，可以缓解肠胃气胀、便秘、呕吐和反胃；对呼吸系统也有疗效，可以缓解咳嗽、支气管炎、哮喘、黏膜炎和窦炎。在皮肤上使用，可以减缓瘙痒；对大脑也有一定的刺激作用。


    #### (1) 精油性质


    它与椒样薄荷精油的气味相似，但是甜味淡些，颜色淡黄或淡绿色。


    #### (2) 来源


    它原产于地中海地区，是一种多年生的草本植物，茎坚硬，高度约1m。叶片亮绿色、长矛形状、叶缘深锯齿状。花色粉红色或淡紫色。与椒样薄荷不同，留兰香没有含高浓度的薄荷醇。古希腊人用它熏香洗浴。它在治疗性病方面享有盛名。在中世纪时期，它被用于治疗牙龈疼，还可以美白牙齿。美国产量占世界产量的80%以上。


    #### (3) 提取方法


    留兰香精油是以开花时期的地上部分为原料，采用蒸汽蒸馏技术提取，按鲜重计，出油率为0.3%～0.4%。割下的鲜草应晒至半干（即鲜料失水50%以上），再进行蒸馏。


    #### (4) 化学成份


    松萜或蒎烯、香芹酮、桉树脑、芳樟醇、柠檬油精、月桂（香叶）烯、石竹（萜）烯和薄荷酮。荷兰薄荷精油仅含有0.5%的薄荷酮，而椒样薄荷含有40%的薄荷酮。


    #### (5) 治疗功效


    1) 当你精神疲惫，需要刺激振奋的时候，留兰香精油就是你需要的东西。虽然它与椒样薄荷精油有许多相似的功效，但是由于它含有的薄荷醇非常少，对皮肤的刺激性就小，很适合孩子们使用。

    2) 对于治疗消化系统的疾病非常有帮助，如肠胃气胀、便秘、痢疾和反胃恶心。它还可以舒缓胃部肌肉不适的症状，治疗打嗝。

    3) 有助于治疗头痛、偏头痛、神经紧张、疲劳和压力过大症状。

    4) 有利于呼吸系统，可以治疗哮喘、支气管炎、黏膜炎和窦炎。

    5) 对皮肤的作用，能缓解瘙痒症，有助于治疗痤疮、皮炎。

    6) 对于女性的健康，它可以缓解月经量和白带过多，保持尿路畅通。


    #### (6) 使用注意事项


    无毒、无刺激性和光敏性。


    #### (7) 用法


    留兰香精油对于治疗消化系统、呼吸系统、精神疲劳和皮肤问题方面的疾病是有效的。


    在蒸汽疗法中，留兰香精油可以用于治疗呕吐、疝气、肠胃气胀、头痛、偏头痛、神经紧张、哮喘、支气管炎、鼻窦炎和黏膜炎。


    1) 香炉和蒸发器熏香


    留兰香精油做复方按摩油或稀释在浴盆中使用，可以用于缓解头痛、偏头痛、压力大、疲劳、鼻窦炎、哮喘、支气管炎和神经紧张，以及缓解瘙痒。


    3) 做面霜或润肤乳的成份


    当留兰香精油用做面霜或润肤乳的成份时，缓解头皮瘙痒的效果非常好。还可以解除皮肤的充血状态，减轻皮肤痤疮的严重性。


    ### (8) 适合与留兰香精油混用的精油


    罗勒、尤加利、薰衣草、迷迭香和茉莉精油。


    ---


    ### 3. 甜罗勒精油


    甜罗勒精油是从甜罗勒或罗勒（Ocimum basilicum）植物中提取的，属于唇形科罗勒属。它又分为欧洲罗勒、法国罗勒、普通罗勒。


    在芳香疗法中，会经常用到这种淡淡香味的精油。它能唤醒记忆，使头脑清晰，稳定神经系统，缓解窦充血，退烧，治疗月经问题。


    #### (1) 精油性质


    稍有黏性，淡绿黄色，具有清淡、透彻、略带辛辣的气味。复方罗勒油是甜味、绿色的。盛产于北非、塞浦路斯、塞舌尔、埃及和欧洲。


    #### (2) 来源


    **甜罗勒 Ocimum basilicum**


    甜罗勒起源于亚洲热带地区和太平洋岛屿，现在全欧洲和美国都有栽培。它是一年生草本植物，高1m。甜罗勒属于欧洲品种，与神圣罗勒及热带罗勒相比，叶片较大、较宽、较油亮。不同品种的花色也不相同，从白色到粉红色，在春天的时间吸引成群的蜜蜂。它的拉丁名Basilicum是从希腊字母"Baslicos"演化来的，意思是“国王”或“皇室”。在印度，罗勒受到极大的尊敬，它属于克利须那神（印度教）和毗瑟挐神（印度教主神之一，守护之神）的神圣植物，人们甚至会在参加宗教仪式前咀嚼它的叶片。据说，当印度教徒休息时，就把一片罗勒叶子放在胸前当作护身符。它也是印度和中国常用的一种草药。'
  mdcn: '## 1) 香炉和蒸发器熏香


    在蒸汽疗法中，玫瑰天竺葵精油可以用于缓解压力、焦虑和经前不快综合征（PMS）以及更年期问题。还能增强活力。


    ## 2) 做复方按摩油或稀释在浴盆中使用


    玫瑰天竺葵精油做复方按摩油或稀释在浴盆中使用，有助于治疗PMS、抑郁、压力、焦虑和紧张，对皮肤有保湿作用，能够治疗水肿、湿疹、带状疱疹、瘀青、癣菌病、痔疮和月经失调症，还能分解脂肪团。


    ## 3) 做面霜或润肤乳的成份


    当用做面霜或洗液的成份时，玫瑰天竺葵精油可以清洁油性和有皱纹的肌肤，辅助治疗创伤、烧伤、溃疡、湿疹、带状疱疹、瘀青，能驱除蚊虫，分解脂肪团和缓解胸部充血症状。


    ## 4) 做洗发香波的成份


    玫瑰天竺葵精油也可以稀释在香波中使用，以驱除头部的虱子。


    ## (8) 适合与天竺葵精油混用的油


    圆当归、罗勒、佛手柑、胡萝卜籽、柏木、香茅、快乐鼠尾草、葡萄柚、茉莉、薰衣草、酸柠檬、橙花、柑橘和迷迭香精油。


    ---


    ## 7. 薰衣草精油


    薰衣草精油是从薰衣草植物（Lavandula angustifolia、Lavandula officinalis）中提取的，属于唇形科。


    为什么薰衣草是最受欢迎的精油之一？它卓越的性质和优雅的气味就是很好的解释。它是一种具有镇定和放松功效的精油，它可以缓解压力和紧迫感，而它防腐杀菌的功效可以用于治疗感冒、流感和其他的疾病。对于治疗哮喘和偏头痛也是极好的。除此之外，它对女性健康和皮肤也有治疗作用，可以用于消除伤疤和平衡皮肤。


    ### (1) 精油性质


    薰衣草精油味道清新，颜色清澈，黏质性为水性。


    ### (2) 来源


    它是种多年生常绿灌木，高约1m，叶片灰绿、狭长线型，长茎顶端开有非常美丽的紫蓝色花朵。地中海地区也分布着一些品种，主要产地在法国。


    薰衣草的名字"Lavender"是从拉丁文"lavera"演化来的，意思是“清洗”。罗马人经常在日常的洗浴中用到它，据说是由罗马人把薰衣草引到英国的，在那不久就成为大众的喜爱品。用它点缀地板很受人喜爱，因为当在地板上行走的时候，它会散发一种香味。


    如今，它经常被用于梳洗水中，也作为杀虫剂或是薰衣香袋被放在亚麻制品中。也可用于清洁伤口和治疗烧伤。


    ### (3) 提取方法


    薰衣草精油是以花朵上部为原料，采用蒸汽蒸馏法提取的，出油率在1.4% ~ 1.6%。


    ### (4) 化学成份


    松萜或蒎烯、柠檬油精、桉树脑、罗勒烯、甲基乙基酮、10%的樟脑、芳樟醇、乙酸里哪酯、石竹（萜）烯、萜品烯或松油烯和30% ~ 60%的醋酸沉香酯。


    ### (5) 治疗功效


    1) 薰衣草精油对神经有抚慰和镇静的效果，可以舒缓紧张、压抑、恐慌和一般性的神经疲劳，对头痛、偏头痛和失眠也有疗效。

    2) 它还有益于支气管炎、哮喘、感冒、喉炎、口臭、咽喉感染和发嗝嗝声的咳嗽，可以帮助消化系统，治疗绞痛、反胃、呕吐和肠胃胀气。

    3) 薰衣草精油可以缓解因风湿病、关节炎、腰痛和肌肉酸痛引起的疼痛，尤其是那些与运动有关的疼痛。

    4) 薰衣草精油对皮肤有调和和新生的作用，适用于所有类型的皮肤，包括脓肿、痤疮、油性、疖子、烧伤、阳光灼伤、创伤、牛皮癣、虱子、蚊虫叮咬，也可以当作驱虫剂。薰衣草精油是为数不多的可以清洁皮肤的精油之一，尤其适用于治疗轻微的烧伤。


    ### (6) 使用注意事项


    虽然薰衣草精油被认为是最安全的精油之一，如果有任何过敏反应，也要停止使用。


    ### (7) 用法


    薰衣草精油还是最通用的精油之一，是家庭常备的一种精油，因为它的用途广泛，可以解决很多问题。它不仅可以用于解决神经问题，它对消化系统、呼吸系统和皮肤问题也有帮助，可以用于治疗肌肉酸疼、关节炎和风湿性疾病。


    1) 香炉和蒸发器熏香


    在蒸汽疗法中，薰衣草精油可以用于治疗敏感症、厌食、头昏眼花、失眠（孩子也可以）、干草热、头疼、压抑、外伤、神经紧张及作为驱虫剂。除此之外，它可以振奋精神，在危急时刻，有平缓兴奋的功效，可以缓解压力和减轻肌肉痉挛。


    2) 做复方按摩油或稀释在浴盆中使用


    薰衣草精油做复方按摩油或稀释在浴盆中使用，可以用于治疗腹部疼痛、敏感症、厌食、关节炎、肠胃失调、疲劳、干草热、头疼、失眠、闷闷不乐、外伤、焦虑、压抑、歇斯底里、做噩梦、恐慌、易怒、神经紧张，可以创造一种芬芳的环境，获得一种平淡的欢快。


    3) 做洗漱或棉签的成份


    薰衣草精油可以做洗漱或棉签的成份，治疗痤疮、蚊虫叮咬、痈、瘀伤、冻疮、头皮屑和虱子。


    4) 做冷敷材料


    薰衣草精油可以稀释后用于冷敷材料中，以治疗关节炎、湿疹和疼痛。


    5) 做面霜或润肤乳的成份


    当用于面霜或润肤乳时，薰衣草精油对于治疗烧伤，促进皮肤痊愈和淡化伤疤非常有效。薰衣草精油的抚慰和抗感染的功效，能够平衡皮肤活性失调症状，可以用于治疗皮炎、湿疹、牛皮癣、疖子、痈和痤疮。当治疗感染时，使用浓度不得高于
    1% 。此外，还可以治疗太阳灼伤引起的疼痛，对蚊虫叮咬引起的瘙痒也有疗效。


    ### (8) 适合与薰衣草精油混用的精油


    柏木、鼠尾草、天竺葵、松树、肉豆蔻和所有柑橘属植物精油。


    ---


    ## 8. 醒目薰衣草精油


    醒目薰衣草精油是从薰衣草与其杂交种的杂交品种植物（Lavandula x intermedia、L. hybrida and L. hortensis）中提取的，属于唇形科。


    醒目薰衣草精油有时候易被与它的近亲薰衣草精油混淆。但它能缓解肌肉和关节疼痛，减轻肌肉的僵硬，清洁肺部和鼻腔的黏液，治疗创伤和皮炎。它虽不如薰衣草知名，也不如薰衣草应用广泛，但它在复方按摩的应用中也很受欢迎。


    ### (1) 精油性质


    有清淡的花香味，与薰衣草精油味道相似，只是更强烈些。颜色清澈。


    ### (2) 来源


    醒目薰衣草是种杂交植物，1900年育成，亲本是真正薰衣草（L. angustifolia）和长穗薰衣草（L. latifolia）。植株较薰衣草大，茎多毛，蓝色或灰色花朵。它在法国大范围栽种，通常是为香水工厂提供其精油的，它的花朵被用于制作薰衣香袋、烹调调味品和手工艺制作品。


    ### (3) 提取方法


    以新鲜的上部花朵为原料，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份


    芳樟醇、乙酸芳樟酯、樟脑、桉树脑、茨烯、二戊烯、柠檬油精、罗勒烯和萜品烯。


    ### (5) 治疗功效


    醒目薰衣草精油可以用于治疗肌肉僵硬、酸疼。它还可以缓解肺部不适，治疗咳嗽、感冒和流感。


    ### (6) 使用注意事项


    无毒、无刺激性和光敏性。


    ### (7) 用法


    它的性质与真正薰衣草精油相似，但是，它的气味更强烈些，尤其适合治疗肌肉酸疼、循环系统和呼吸系统的疾病。


    1) 香炉和蒸发器熏香


    在蒸汽疗法中，醒目薰衣草精油可以用于治疗咳嗽、感冒和流感，还有放松的疗效。


    2) 做复方按摩油或稀释在浴盆中使用


    醒目薰衣草精油做复方按摩油或稀释在浴盆中使用，可以用于治疗肌肉和关节疼痛，对于缓解肌肉僵硬、清洁肺部和鼻腔的黏液非常有效。


    3) 做面霜或润肤乳的成份


    当用于面霜或润肤乳时，醒目薰衣草精油能促进肌肤创伤愈合，并起到消炎的作用。


    ### (8) 适合与醒目薰衣草精油混用的精油


    佛手柑、香茅、肉桂、鼠尾草、茉莉、松树、百里香、广藿香和迷迭香精油。


    ---


    ## 9. 依兰精油


    依兰精油是从依兰植物（Cananga odorata var. genuine、Unona odorantissimum）中提取的，属于番荔枝科，又称为“花中之花”。依兰精油是从第1道压榨工艺中提取的，也称为“完全”或“特佳”精油。这种特别芬芳的精油对情绪和身体有镇静作用，可以用于治疗性冷淡和阳痿症状。它对皮肤有完美的平衡和刺激效果，不但能够矫正皮脂分泌失调，还可以用于刺激头发生长。


    ### (1) 精油性质


    依兰植物有股异国情调般的甜味，颜色淡黄。


    ### (2) 来源


    它是种高大的热带树种，高约20m，花巨大、鲜嫩、芬芳；花色多样，有粉红色、紫红色或黄色。它的主要栽培地有爪哇、苏门答腊岛、留尼旺岛、马达加斯加岛和科摩（意大利北部城市）。英文名字"ylang"意思是“花中之花”。


    在印度尼西亚婚礼之夜，人们会把它的花瓣给新床做点缀。它的精油曾经是欧洲头发护理品的常用成份，还被称为望加锡头（发）油。椅子罩这个词就来源于此，因为椅子罩的作用就是防止头发油弄脏沙发等带软垫的家具。


    ### (3) 提取方法


    以新鲜的花朵为原料，采用水或蒸汽蒸馏提取的。初次蒸馏物被称为特级依兰油，是最好等级的精油。完全精油和固体精油是通过溶剂萃取法提取的。


    ### (4) 化学成份


    芳樟醇、乙酸香叶酯、石竹（萜）烯、甲基安息酸盐、苯甲基醋酸盐、苯甲基安息酸盐和其他的倍半萜烯。


    依兰精油有不同的“压榨品”，称为“特级”品、1 级品、2 级品和 3 级品。特级精油是最初压榨品，含有酯成份浓度最高，因此甜味也最浓，而其他的压榨品香味依次减弱。“特级”精油不能在芳香疗法中使用，不过可以用于香水工业中。在芳香疗法中可以使用“完全”精油，把特级精油与
    1 级、2 级压榨品相混合，就形成了完全依兰精油。


    ### (5) 治疗功效


    1) 依兰精油对神经系统有欣快和镇静的功效，有助于缓解焦虑、紧张、震惊、恐慌和害怕的感觉。它有引起性欲的功效，有助于治疗阳痿和性冷淡。

    2) 它对于缓和呼吸急促和心跳过快非常有效，有助于降低高血压和治疗大肠感染。

    3) 对于皮肤，依兰精油有抚慰作用。它能平衡油脂的分泌，适用于过分干燥和油腻的肤质。它能刺激头皮，显著地促进头发的生长。


    ### (6) 使用注意事项


    它被归类于无毒、无刺激和无光敏性的精油。据报道，它会产生敏感性反应。过量使用会导致头疼和反胃。


    ### (7) 用法


    依兰精油有助于缓解高血压、呼吸急促和心跳过快、神经问题，以及阳痿和性冷淡症状。


    1) 香炉和蒸发器


    在蒸汽疗法中，依兰精油能够缓解焦虑、紧张、震惊、恐慌和害怕的感觉，以及高血压、呼吸急促和心跳过快症状。还有助于治疗阳痿和性冷淡、失眠、压抑和压力过大等症状。对恢复体力也有好处。


    2) 做按摩油的成份或稀释在浴盆中使用


    依兰精油可以用作按摩油的成份或稀释在浴盆中使用，以用于恢复体力，治疗失眠、性冷淡、阳痿、压抑、焦虑、神经紧张和压力过大等症状。


    3) 做面霜或润肤乳的成份


    当用于面霜或润肤乳时，依兰精油能够平衡皮肤的油脂分泌，因而，可以矫正和平衡过分油腻和过分干燥的肌肤。


    ### (8) 适合与依兰精油混用的精油


    佛手柑、葡萄柚、薰衣草和檀香精油。


    ---


    ## （三）草类精油


    ### 1. 椒样薄荷精油


    椒样薄荷精油是从薄荷植物中（Mentha piperita）提取的，属于唇形科，又称为欧薄荷。


    在芳香疗法中，这种凉爽和清新的精油能够刺激大脑，振奋精神和提升注意力；可以使皮肤感到凉爽，淡化皮肤的红色，缓解刺激和瘙痒。此外，有助于缓解结肠痉挛、偏头痛、鼻窦炎和胸口憋气，改善消化系统的功能。


    #### (1) 精油性质


    椒样薄荷精油有种清新、强烈的薄荷醇味；颜色清澈或浅黄，黏质性为水性。


    #### (2) 来源


    它原产于地中海地区，现在意大利、美国、日本和英国都有栽培。它是一种多年生植物，可以长到1m高，叶片锯齿状、披绒毛，花朵桃红色到紫红色，呈长圆锥形。它具有地下茎，可以用作繁殖材料，这种植物有许多品种，欧薄荷是水薄荷（M.
    aquatica）和荷兰薄荷（M. spicata）的杂交种。


    希腊神话中，有位美丽的少女明忒被冥王普路托所钟爱着，他的妻子珀尔塞福涅（宙斯之女，被冥王劫持娶作冥后）非常嫉妒，就残忍地把明忒埋到了地下，于是普路托就把她变成了这种植物。他知道，当人们看到这种植物的时候，就会想到明忒过几年还会回来的。


    从古时候开始，它在日本和中国就有栽培。在埃及坟墓里找到的证据表明，远在公元前1000年，人们就已经开始使用薄荷。


    #### (3) 提取方法


    椒样薄荷精油是从将要开花前收割的地上整株植物中提取的。这种油采用蒸汽蒸馏法提取，以新鲜或部分晒干的植物做原料，出油率在0.1%~1.0%。


    #### (4) 化学成份


    薄荷醇、薄荷酮、桉树脑、醋酸甲酯、甲基乙醇呋喃、柠檬油精、松萜或蒎烯、桧烯氢氧化物和蒲勒酮。


    #### (5) 治疗功效


    1) 椒样薄荷精油对于精神疲劳和压抑有良好的效果，有提神、刺激思维敏捷和集中注意力的作用。它有助于治疗感情冷淡、担惊受怕、头疼、偏头疼、神经压抑、眩晕和虚弱症状，还能缓解呼吸系统失调的症状，包括干咳、鼻窦充血、哮喘、支气管炎、肺炎、肺结核和霍乱。

    2) 对于消化系统，椒样薄荷精油对于许多疾病都有疗效，包括刺激胆囊和促进胆汁分泌。它有助于治疗腹部绞痛、抽筋、消化不良、结肠痉挛、肠胃气胀和反胃恶心，还能缓解牙痛、脚痛、风湿病、神经痛、肌肉和月经痛。

    3) 可用于缓解皮肤刺激和瘙痒，也能帮助淡化皮肤红色，有消炎的作用。它可以治疗皮炎、痤疮、癣菌病、疥疮和瘙痒症，有预防晒伤的疗效，同时有清凉肌肤的作用。


    #### (6) 使用注意事项


    以低剂量使用薄荷精油是无毒和无刺激的。但是因为它含有薄荷醇的成份，所以要注意它的感光性。它对皮肤和黏膜会产生刺激作用，所以使用的时候要远离眼睛。在孕期要避免使用，不要给7岁以下的孩子使用。


    #### (7) 用法


    椒样薄荷精油有助于治疗神经系统失常，对刺激大脑和集中注意力有很强的功效，还可以用于治疗呼吸系统感染、肌肉疼和一些皮肤方面的问题。


    1) 香炉和蒸发器熏香


    在蒸汽疗法中，椒样薄荷精油可以用于提高注意力，刺激大脑，缓解咳嗽、头疼、反胃，对于驱虫也有作用。


    2) 做复方按摩油或稀释在浴盆中使用


    椒样薄荷精油做复方按摩油或稀释在浴盆中使用，有助于治疗腹部绞痛、抽筋、后背疼痛、肠道感染、结肠痉挛、黏膜炎、大肠炎、循环不良、便秘、咳嗽、痢疾、脚部疲劳出汗、肠胃气胀、头疼、肌肉疼、神经痛、反胃、风湿病、精神疲劳。还可以治疗皮肤红肿、发痒以及其他的炎症。


    3) 用做漱口水成份


    含有椒样薄荷精油的漱口水可以改善口气，治疗齿龈发炎。


    4) 做面霜或润肤乳的成份


    当用做面霜或润肤乳的成份时，椒样薄荷精油可以缓解因太阳灼伤引起的刺痛感，缓解皮肤发炎和瘙痒症状，因有收缩血管的功效，可以降低皮肤的温度。


    ### (8) 适合与椒样薄荷精油混用的精油


    安息香、桉树、薰衣草、甜牛至、柠檬和迷迭香精油。


    ---


    ### 2. 留兰香精油


    留兰香精油是从薄荷植物（Mentha spicata，Mentha viridis）中提取的，属于唇形科，又分为大叶留兰香和小叶留兰香。又称为绿薄荷和荷兰薄荷。


    虽然不如椒样薄荷受欢迎，但是这种精油更加温和，可以给孩子使用；它对消化系统有更好的功效，可以缓解肠胃气胀、便秘、呕吐和反胃；对呼吸系统也有疗效，可以缓解咳嗽、支气管炎、哮喘、黏膜炎和窦炎。在皮肤上使用，可以减缓瘙痒；对大脑也有一定的刺激作用。


    #### (1) 精油性质


    它与椒样薄荷精油的气味相似，但是甜味淡些，颜色淡黄或淡绿色。


    #### (2) 来源


    它原产于地中海地区，是一种多年生的草本植物，茎坚硬，高度约1m。叶片亮绿色、长矛形状、叶缘深锯齿状。花色粉红色或淡紫色。与椒样薄荷不同，留兰香没有含高浓度的薄荷醇。古希腊人用它熏香洗浴。它在治疗性病方面享有盛名。在中世纪时期，它被用于治疗牙龈疼，还可以美白牙齿。美国产量占世界产量的80%以上。


    #### (3) 提取方法


    留兰香精油是以开花时期的地上部分为原料，采用蒸汽蒸馏技术提取，按鲜重计，出油率为0.3%～0.4%。割下的鲜草应晒至半干（即鲜料失水50%以上），再进行蒸馏。


    #### (4) 化学成份


    松萜或蒎烯、香芹酮、桉树脑、芳樟醇、柠檬油精、月桂（香叶）烯、石竹（萜）烯和薄荷酮。荷兰薄荷精油仅含有0.5%的薄荷酮，而椒样薄荷含有40%的薄荷酮。


    #### (5) 治疗功效


    1) 当你精神疲惫，需要刺激振奋的时候，留兰香精油就是你需要的东西。虽然它与椒样薄荷精油有许多相似的功效，但是由于它含有的薄荷醇非常少，对皮肤的刺激性就小，很适合孩子们使用。

    2) 对于治疗消化系统的疾病非常有帮助，如肠胃气胀、便秘、痢疾和反胃恶心。它还可以舒缓胃部肌肉不适的症状，治疗打嗝。

    3) 有助于治疗头痛、偏头痛、神经紧张、疲劳和压力过大症状。

    4) 有利于呼吸系统，可以治疗哮喘、支气管炎、黏膜炎和窦炎。

    5) 对皮肤的作用，能缓解瘙痒症，有助于治疗痤疮、皮炎。

    6) 对于女性的健康，它可以缓解月经量和白带过多，保持尿路畅通。


    #### (6) 使用注意事项


    无毒、无刺激性和光敏性。


    #### (7) 用法


    留兰香精油对于治疗消化系统、呼吸系统、精神疲劳和皮肤问题方面的疾病是有效的。


    在蒸汽疗法中，留兰香精油可以用于治疗呕吐、疝气、肠胃气胀、头痛、偏头痛、神经紧张、哮喘、支气管炎、鼻窦炎和黏膜炎。


    1) 香炉和蒸发器熏香


    留兰香精油做复方按摩油或稀释在浴盆中使用，可以用于缓解头痛、偏头痛、压力大、疲劳、鼻窦炎、哮喘、支气管炎和神经紧张，以及缓解瘙痒。


    3) 做面霜或润肤乳的成份


    当留兰香精油用做面霜或润肤乳的成份时，缓解头皮瘙痒的效果非常好。还可以解除皮肤的充血状态，减轻皮肤痤疮的严重性。


    ### (8) 适合与留兰香精油混用的精油


    罗勒、尤加利、薰衣草、迷迭香和茉莉精油。


    ---


    ### 3. 甜罗勒精油


    甜罗勒精油是从甜罗勒或罗勒（Ocimum basilicum）植物中提取的，属于唇形科罗勒属。它又分为欧洲罗勒、法国罗勒、普通罗勒。


    在芳香疗法中，会经常用到这种淡淡香味的精油。它能唤醒记忆，使头脑清晰，稳定神经系统，缓解窦充血，退烧，治疗月经问题。


    #### (1) 精油性质


    稍有黏性，淡绿黄色，具有清淡、透彻、略带辛辣的气味。复方罗勒油是甜味、绿色的。盛产于北非、塞浦路斯、塞舌尔、埃及和欧洲。


    #### (2) 来源


    **甜罗勒 Ocimum basilicum**


    甜罗勒起源于亚洲热带地区和太平洋岛屿，现在全欧洲和美国都有栽培。它是一年生草本植物，高1m。甜罗勒属于欧洲品种，与神圣罗勒及热带罗勒相比，叶片较大、较宽、较油亮。不同品种的花色也不相同，从白色到粉红色，在春天的时间吸引成群的蜜蜂。它的拉丁名Basilicum是从希腊字母"Baslicos"演化来的，意思是“国王”或“皇室”。在印度，罗勒受到极大的尊敬，它属于克利须那神（印度教）和毗瑟挐神（印度教主神之一，守护之神）的神圣植物，人们甚至会在参加宗教仪式前咀嚼它的叶片。据说，当印度教徒休息时，就把一片罗勒叶子放在胸前当作护身符。它也是印度和中国常用的一种草药。'
