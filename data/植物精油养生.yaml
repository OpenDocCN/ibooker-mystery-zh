    # ## 3. 葡萄籽油


    这种基础油质地非常好，几乎是无色透明的，很容易被皮肤吸收。它有着温和的收敛性质，可以帮助收紧和护理皮肤。对于治疗痤疮和其他的皮肤疾病有帮助。它富含亚油酸，是一种必需脂肪酸，对皮肤和细胞膜非常重要。葡萄籽油具有再生和再建功效，对皮肤有很强的保湿作用。


    葡萄籽油（Grapeseed Oil）是一种一点都不油腻的油，但是当与其他油混用的时候，如甜杏仁油（扁桃油），会有变浓的现象。


