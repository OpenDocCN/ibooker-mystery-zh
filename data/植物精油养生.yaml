    # ## 3. 金盏草油


    这种油有时容易与万寿菊油相混淆，虽然万寿菊也属于金盏草家族的成员，不过，金盏草（Calendula officinalis）油本身被划归为浸泡或浸渍用油，它的提取方法是先将金盏草植物材料浸泡在其他浸泡油中，然后再把植物材料去除，这样，植物材料中的油就留在浸泡油中'
