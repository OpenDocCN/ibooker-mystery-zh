    **常用单方植精油**


    留兰香精油对于治疗消化系统、呼吸系统、精神疲劳和皮肤问题方面的疾病是有效的。


    **Essential oils health**


    在蒸汽疗法中，留兰香精油可以用于治疗呕吐、疝气、肠胃气胀、头痛、偏头痛、神经紧张、哮喘、支气管炎、鼻窦炎和黏膜炎。


    **1) 香炉和蒸发器熏香**


    留兰香精油做复方按摩油或稀释在浴盆中使用，可以用于缓解头痛、偏头痛、压力大、疲劳、鼻窦炎、哮喘、支气管炎和神经紧张，以及缓解瘙痒。


    **3) 做面霜或润肤乳的成份**


    当留兰香精油用做面霜或润肤乳的成份时，缓解头皮瘙痒的效果非常好。还可以解除皮肤的充血状态，减轻皮肤痤疮的严重性。


    **(8) 适合与留兰香精油混用的精油**


    罗勒、尤加利、薰衣草、迷迭香和茉莉精油。


    **3.甜罗勒精油**


    甜罗勒精油是从甜罗勒或罗勒（Ocimum basilicum）植物中提取的，属于唇形科罗勒属。它又分为欧洲罗勒、法国罗勒、普通罗勒。


    在芳香疗法中，会经常用到这种淡淡香味的精油。它能唤醒记忆，使头脑清晰，稳定神经系统，缓解窦充血，退烧，治疗月经问题。


    **(1)精油性质**


    稍有黏性，淡绿黄色，具有清淡、透彻、略带辛辣的气味。复方罗勒油是甜味、绿色的。盛产于北非、塞浦路斯、塞舌尔、埃及和欧洲。


    **(2)来源**


    **甜罗勒Ocimum basilicum**


    甜罗勒起源于亚洲热带地区和太平洋岛屿，现在全欧洲和美国都有栽培。它是一年生草本植物，高1m。甜罗勒属于欧洲品种，与神圣罗勒及热带罗勒相比，叶片较大、较宽、较油亮。不同品种的花色也不相同，从白色到粉红色，在春天的时间吸引成群的蜜蜂。它的拉丁名Basilicum是从希腊字母“Baslicos”演化来的，意思是“国王”或“皇室”。在印度，罗勒受到极大的尊敬，它属于克利须那神（印度教）和毗瑟挐神（印度教主神之一，守护之神）的神圣植物，人们甚至会在参加宗教仪式前咀嚼它的叶片。据说，当印度教徒休息时，就把一片罗勒叶子放在胸前当作护身符。它也是印度和中国常用的一种草药。'
- md: "## 3. 甜罗勒精油\n\n### （3）提取方法\n以植物的叶片和花为原料，采用水蒸气蒸馏法提取的。\n\n### （4）化学成份\n40%~45%沉香醇、樟脑、松萜或蒎烯、茨烯、柠檬油精、罗勒烯、芳樟醇、甲基胡椒酚、萜品醇或松油醇、香茅醇、香叶醇、甲基肉桂酸和丁子香酚。\n\
    \n### （5）治疗功效\n1. 甜罗勒精油是治疗神经失调、缓解头痛、偏头痛和敏感症的很好的滋补品。它常用来清除头脑杂念，缓解脑力疲劳，同时能在精神上给予力量和宁静。\n\
    2. 它对呼吸道也有良好的作用，经常被用来治疗哮喘、支气管炎和窦炎。此外，它对便秘、恶心、呕吐、抽筋（腹部绞痛）也有效，在治疗月经问题方面，也有好的表现。\n\
    3. 由于具有通经的性质，它经常用于治疗经期不足，并使其正常化。\n4. 它能帮助降低血液中的尿酸成份，以缓解痛风症状，抗动脉粥样硬化。对关节炎的治疗也有帮助。当在皮肤上使用时，能够帮助治疗痤疮。还可用于治疗蚊虫叮咬。\n\
    \n### （6）使用注意事项\n尽管人们需要刺激时常常会用到甜罗勒精油，但是，过量使用会有麻木的感觉。因此，怀孕期间不要使用，16 岁以下的孩子也不要使用。由于它能使敏感皮肤发生过敏反应，所以敏感性肤质的人要小心使用。它还有通经作用，所以怀孕期间一定避免使用。\n\
    \n### （7）用法\n甜罗勒精油是一种非常有益的精油，不但能治疗头痛和偏头痛，而且对精神沮丧也有振奋作用。对于消化不良，包括恶心和打嗝，呼吸道受感染，都有益处。甜罗勒精油可治疗黄蜂、昆虫，尤其是蚊子的叮咬。\n\
    \n1. **用于香炉和蒸发器熏香**\n   在蒸汽疗法中，罗勒精油能够用于治疗偏头痛、头痛，帮助提高注意力和使头脑清晰。\n2. **加入浴盆中**\n\
    \   当把罗勒精油加入温水浴盆中时，有益于痛风和关节炎的痊愈，也可以缓解肌肉和月经疼痛。\n\n### （8）适合与罗勒精油混用的精油\n香柠檬、黑胡椒、雪松、茴香、生姜、天竺葵、葡萄柚、薰衣草、柠檬、甜牛至精油。\n\
    \n## 4. 迷迭香精油\n\n迷迭香精油是从迷迭香植物（*Rosmarinus officinalis*、*Rosmarinus coronarium*）中提取的，属于唇形科。\n\
    \n这种味道清新和洁净的精油对大脑有很强的刺激作用，可以增强记忆和使思绪清晰；有助于治疗各种呼吸道问题、肌肉僵硬、感冒和改善肝脏和胆囊的功效。它也可以用于护理头发和头皮的健康。\n\
    \n### （1）精油性质\n有种强劲、清洁和新鲜的香草味道，颜色清澈，水质黏性。\n\n### （2）来源\n它是一种多年生常绿的矮灌木，可以长到 1.5m\
    \ 高，叶片绿灰色、针状，花色淡蓝或淡紫色，能吸引蜜蜂。原产于亚洲，现在主要栽培在法国、突尼斯和南斯拉夫。\n\n它的英文名\"Rosemary\"由希腊单词\"\
    Rosmarinus\"演化而来，意思是“海之露”，因为它非常喜欢水。埃及人、希伯来人、希腊人和罗马人认为它是一种神圣的植物。在中世纪时期，它被用来驱魔辟邪，还用它预防瘟疫。在法国医院，燃烧这种植物预防流行病。\n\
    \n### （3）提取方法\n迷迭香精油是以新鲜的花的顶端部分为原料，采用蒸汽蒸馏法提取的，出油率在 1.0%~2.0%。\n\n### （4）化学成份\n\
    松萜或蒎烯、龙脑、樟脑、醋酸冰片酯、茨烯、桉树脑和柠檬油精。\n\n### （5）治疗功效\n1. 对大脑和中枢神经系统有显著的作用，还可以清除杂念和启发智力。对大脑还有很好的刺激作用，能增强记忆力。\n\
    2. 有助于治疗头疼、偏头疼、神经痛、精神疲劳和神经衰弱，迷迭香精油的防腐杀菌的功效尤其适用于肠道感染、痢疾症状，缓解消化不良、肠胃气胀，协调肝脏不适和黄疸的症状，减轻因关节炎、风湿病和痛风引起的疼痛。\n\
    3. 有助于治疗动脉硬化、心悸、不良循环和静脉曲张。\n4. 迷迭香精油利尿的功效有利于降低月经期水分持有量，也利于分解脂肪和减轻体重。\n5. 对于呼吸系统，它对哮喘、支气管炎、黏膜炎鼻窦炎和发嗝嗝声的咳嗽有疗效。\n\
    6. 由于它具有收敛作用，对松弛的皮肤有积极的功效。它的刺激作用有利于调整头皮功能失调和促进头发的生长。\n\n### （6）使用注意事项\n迷迭香精油不能在孕期使用，患有癫痫症和高血压的病人也不适于使用。\n\
    \n### （7）用法\n迷迭香精油有助于治疗神经疲劳，改善循环系统、肌肉系统、呼吸系统的功能，对皮肤和头发有积极的作用。\n\n1. **香炉和蒸发器熏香**\n\
    \   在蒸汽疗法中，迷迭香精油有助于缓解饮酒过量、过度疲劳、鼻窦炎和身心疲倦的症状。此外，它还能刺激大脑、改善记忆和帮助思维。\n2. **做按摩油的成份或添加在浴盆中使用**\n\
    \   迷迭香精油有利于缓解肝脏、胆囊、黏膜充血、肌肉酸疼、抽筋、脖颈僵硬、过度疲劳、关节疼痛、感冒、便秘、腹泻、咳嗽、支气管炎、后背疼、头皮功能失调、鼻窦炎、身心疲倦的不适。\n\
    3. **做面霜或润肤乳的成份**\n   当迷迭香精油做面霜或润肤乳成份时，它最大功效是可以促进血液循环和解除皮肤的充血状态。\n4. **做香波的添加成份**\n\
    \   当添加到香波使用时，它不仅可以促进头皮循环功能和头发生长，还可以作为头发和头皮的日常滋补品。\n\n### （8）适合与迷迭香精油混用的精油\n柏木、香茅、天竺葵、薰衣草、柠檬香茅和椒样薄荷精油。\n\
    \n## 5. 蜜蜂花精油\n\n蜜蜂花精油是从蜜蜂花植物（*Melissa officinalis*）中提取的，属于唇形科，又称为香蜂花和柠檬香薄荷。可分为普通型、甜味型。\n\
    这种精油在芳香疗法中有许多用途，有助于抚慰情绪，具有很强的镇静的效果，能够调节心脏功能，尤其是在缓和心悸方面。此外，它还有调理月经的功效。在治疗因感冒引起的疼痛方面效果很好，还可以缓解真菌性的感染。\n\
    \n### （1）精油的性质\n蜜蜂花精油味甜、清新，有股柑橘味道，颜色淡黄，水质般的黏性。\n\n### （2）来源\n这种植物起源于地中海地区，可以长到\
    \ 60cm 高，喜欢含铁量高的土壤，叶片小、边缘锯齿状、略带绒毛，花朵小、白色到粉红色。这种花对蜜蜂有很强的吸引力。蜜蜂花的英文\"Melissa\"来源于希腊单词，意思是蜂蜜。它又有“柠檬香油”的称号，在希伯来语中，有“油之魁首”的美称。在\
    \ 14 世纪，法国派的托钵僧用它制作滋补水，Paracelsus（1493~1541 年）称这种植物为“长生不老药”，而 John Evelyn（1620~1706\
    \ 年）把它描绘成大脑的主宰者，能够加强记忆力，彻底地驱散忧郁。\n\n### （3）提取方法\n蜜蜂花是以新鲜花枝的上部、叶片和茎为原料的，采用蒸汽蒸馏法提取的。\n\
    \n### （4）化学成份\n罗勒烯、甲基己基酮、乙烯醇、辛醇、辛烯、古巴烯、香茅醛、芳樟醇、石竹（萜）烯、绿草烯、橙花醛、香叶醛、乙酸香叶酯、橙花醇和香叶醇。\n\
    \n### （5）治疗功效\n1. 可以镇定神经，在治疗精神抑郁方面有良好的疗效。它的镇定作用在临床上有很好的表现，可以治疗歇斯底里症和恐慌症。\n2. 对于心脏是一种滋补剂，能使心跳变得缓慢，降低高血压。\n\
    3. 可以调节经期，缓解经期疼痛。\n4. 能解决一些消化系统的问题，如反胃、肠胃气胀、呕吐、消化不良和痢疾。对发烧有降温的作用，还可以缓解因感冒引起的头痛和偏头痛。\n\
    5. 在用作治疗药物的初期，常被用来治疗唇疱疹。\n\n### （6）使用注意事项\n蜜蜂花精油没有毒，但是可以引起敏感和刺激反应，应该以低剂量使用。因此，在孕期要避免使用，皮肤敏感的人不要使用。\n\
    \n### （7）用法\n蜜蜂花精油最有价值的用处，是它抚慰神经的能力，以及治疗消化系统、心脏、月经疼痛和发烧。\n\n1. **香炉和蒸发器熏香**\n\
    \   在蒸汽疗法中，蜜蜂花精油可以用于抗抑郁，对大脑有很强的镇静效果，还可以缓解发烧和头疼的症状，对反胃恶心也有疗效。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   蜜蜂花精油做复方按摩油或稀释在浴盆中使用，可以用于治疗发烧、头疼、压抑，以及神经过敏和压力过大，缓解反胃和治疗真菌感染。\n3. **做面霜或润肤乳的成份**\n\
    \   虽然蜜蜂花含有高浓度的乙醛，也可能引起某些人的过敏反应，但是它对于真菌感染的治疗是有效的，能够止住伤口流血，对治疗秃顶和掉头发也有疗效。\n\n###\
    \ （8）适合与蜜蜂花精油混用的精油\n罗勒、罗马甘菊、玫瑰、天竺葵、乳香、薰衣草和依兰精油。\n\n## 6. 牛膝草精油\n\n牛膝草精油是从牛膝草植物（*Hyssopus\
    \ officinalis*）中提取的，属于苋科，又称为海索草。\n\n这种相当昂贵的精油可以有效地辅助治疗女性失调症和月周期性水肿。在帮助治疗呼吸系统方面，能够有效地清除黏液，缓解支气管痉挛。它还可以被用来治疗支气管炎、哮喘、流感和感冒，也有助于伤口愈合和消散皮肤上的瘀伤。\n\
    \n### （1）精油性质\n牛膝草精油有种温和的清甜气味，颜色从无色到淡黄绿色。\n\n### （2）来源\n这种灌木零星地分布在地中海地区，高度约 60cm，对蜜蜂有很强的吸引力。牛膝草曾经是希腊的名医希波克拉底（约公元前\
    \ 460～前 370 年，古希腊医师，医药之父）使用过的名字，是从希伯来语\"ezob\"演化来的，意思是“神圣的植物”。它在古书（《Old Testament》）中常被提到，那时，人们用它作心灵净化的象征，然而，这种说法所指的植物也有可能是牛至属植物。\n\
    \n它的茎木质化、多毛，叶片小、绿色、长毛状，花朵紫蓝色，是古代著名的植物。它的茎节处像牛膝盖。它在圣经中也被提到过。它具有净化的功效，可以驱避瘟疫、麻风病，治疗胸腔的疾病。它也被用于净化宗教场所，在中世纪被当作一种点缀植物，来驱避虱子。在\
    \ 10 世纪，本笃会的僧人把它作为利口酒的制作原料，引入到欧洲。\n据推测，可能原产我国，目前在我国东部省份有商业化种植。\n\n### （3）提取方法\n\
    牛膝草精油是以叶片和花朵为原料，采用蒸汽蒸馏法提取的。\n\n### （4）化学成份\n松萜或蒎烯、莰烯、桧烯、月桂（香叶）烯、柠檬油精、萜品醇、桉树脑和侧柏酮。\n\
    \n### （5）治疗功效\n1. 牛膝草精油能给人一种警戒的感觉，有助于缓解焦急和疲劳。因此，在康复阶段，可以当作滋补品使用。\n2. 在治疗因呼吸系统疾病和病毒引起的感冒时，它也是有效的，如治疗感冒、咳嗽、咽喉疼、流感、支气管炎、哮喘、黏膜炎和扁桃体炎。\n\
    3. 有助于治疗胃绞痛、肠胃胀气和消化不良，调节循环。\n4. 在月经期间，水肿是个经常性的问题，牛膝草精油有平衡的作用。一般情况下，这种精油是有助于月经正常的，对于无月经和白带异常有缓解作用。\n\
    5. 能通过减少心率和扩张外周动脉而降低血压。\n6. 对于瘀伤有好的治疗特性。\n\n### （6）使用注意事项\n牛膝草精油没有刺激性，没有敏感性，但要使用适度。孕妇和癫痫症患者应避免使用。\n\
    \n### （7）用法\n牛膝草精油是种功效强劲的油，可以缓解呼吸系统疾病，调节消化系统失常，治疗泌尿系统感染，以及皮肤问题，包括瘀伤、湿疹、感染和皮炎。\n\
    \n1. **香炉和蒸发器**\n   在蒸汽疗法中，牛膝草精油可以用于治疗焦虑、神经疲劳、感冒、咳嗽、支气管炎、哮喘和感染。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   牛膝草精油做复方按摩油或稀释在浴盆中使用，可以缓解焦虑、神经疲劳、呼吸系统疾病、病毒感染、月经问题、胃部绞痛、肠胃胀气、消化不良和促进皮肤康复。\n\
    3. **做面霜或润肤乳的成份**\n   当用于面霜或润肤乳时，牛膝草精油可以帮助皮肤康复，治疗伤疤，也可以帮助消散瘀伤。\n\n### （8）适合与牛膝草精油混用的精油\n\
    圆当归、鼠尾草、天竺葵、柑橘、橘子、蜜蜂花和迷迭香精油。\n\n## 7. 马郁兰精油\n\n马郁兰 Origanum majorana\n马郁兰精油是从马郁兰植物（*Origanum\
    \ majorana*）中提取的，属于唇形科，又称为多节牛至或甜牛至。\n\n这种精油在治疗哮喘和其他呼吸道疾病方面很有价值，对情绪有镇静作用。它能帮助活动亢进的人平静下来，还可以促进循环。\n\
    \n### （1）精油性质\n马郁兰精油气味温和，有些辛辣；无色或淡黄色/琥珀色。\n\n### （2）来源\n这是种柔弱的灌木型多年生植物，高约 60cm，茎多毛，叶片黑绿色、椭圆形，花小、白色或粉红色。起源于地中海地区，牛至属植物的英文名字\
    \ Origanum 是从希腊单词 orosganos 演变来的，意思是“大山的喜悦”。据说，可以给新婚夫妇带来好运。它是希腊人非常喜欢使用的一种草药。在医药和香水业中，有广泛的用途。另外，还可以把它散放在地板上，以遮盖不好的气味。\n\
    \n### （3）提取方法\n马郁兰精油是以新鲜干燥的叶片以及开花的上半部为原料，采用蒸汽蒸馏法提取的，出油率在 0.5%~3%。\n\n### （4）化学成份\n\
    桧烯、不旋松油精或萜品烯、异丙基苯、异松油烯、芳樟醇、氢氧化物、乙酸里哪酯、萜品烯或松油烯。\n\n### （5）治疗功效\n1. 马郁兰精油疗效温和，能抚慰情绪，缓解焦虑和压力，有助于使情绪亢进的人平静下来。\n\
    2. 有良好的肌肉松弛的功效，它的止痛功能有助于缓解风湿病、扭伤、拉伤和痉挛，以及关节肿胀和肌肉疼痛的症状。\n3. 有利于消化系统，能够缓解腹部绞痛、消化不良、便秘和肠胃气胀，对感冒、窦炎、支气管炎和哮喘也有疗效。\n\
    4. 可以作为一种放松剂，用于治疗头痛、偏头痛和失眠等症。\n5. 对性欲有克制的作用。\n6. 对月经疼痛、后延和不足都有很好的疗效。\n\n### （6）使用注意事项\n\
    马郁兰精油无毒、无刺激性和光敏性，但是要避免在孕期使用。\n\n### （7）用法\n马郁兰精油有助于治疗神经紧张、呼吸道问题、肌肉和关节疼、消化不良和月经失调等症状。\n\
    \n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，马郁兰精油可以用于治疗哮喘、支气管炎、咳嗽、不良循环、身体疲劳、头疼、紧张、失眠、焦虑、神经紧张和压力大等症状。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   马郁兰精油做复方按摩油或稀释在浴盆中使用，可以用于治疗哮喘、关节炎、后背疼、支气管炎、不良循环、感冒、咳嗽、消除放射性污染、身体疲倦、头疼、紧张、烧心、失眠、周期性疼痛、偏头痛、肌肉疼痛和抽筋、风湿病、窦炎、焦虑、压力大和悲痛症状。\n\
    3. **做面霜或润肤乳的成份**\n   马郁兰精油有很好的温热功效，当用于面霜或润肤乳时，可以促进冻疮愈合和驱散瘀伤。\n\n### （8）适合与马郁兰精油混用的精油\n\
    薰衣草、丝柏、柏木、甘菊、佛手柑、尤加利和茶树精油。\n\n## 8. 鼠尾草精油\n\n鼠尾草精油是从鼠尾草植物（*Salvia officinalis*）提取的，属于唇形科。\n\
    \n鼠尾草 *Salvia officinalis*\n“治疗”或“拯救”。在中世纪时期，它是许多神经滋补品的成份，也可用这种植物清洁齿龈。\n\n虽然这种油使用浓度高时会引起一些问题，但是如果以低剂量使用，它对解决许多问题还是有效的。有助于缓解悲痛和重新振奋精神；还能刺激循环系统；帮助解决女性问题，包括不育症、更年期症；对于皮肤的作用不仅仅是治疗，还能减小皮肤的毛孔大小。\n\
    \n### （1）精油性质\n鼠尾草精油有强烈的香草气味，有水质般的黏性。\n\n### （2）来源\n鼠尾草是一种常绿的多年生的草本植物，可以长到约 60cm，叶柄基部木质化、柔软、椭圆形、绿灰色，花多、绿色或紫罗兰色。中国人认为它可以治疗不孕症，而罗马人认为它对很多疾病都有疗效。\n\
    \n鼠尾草的名字 Sage 是从拉丁文单词 salvare，意思是“治疗”或“拯救”。\n\n### （3）提取方法\n鼠尾草精油是以干燥的叶片为原料的，采用蒸汽蒸馏法提取的，出油率约\
    \ 1%。\n\n### （4）化学成份\n鼠尾草精油的主要化学成份α-侧柏酮、β-侧柏酮、1，8-桉叶素、樟脑。\n\n### （5）治疗功效\n1. 有助于减轻悲痛、压抑的感觉，能够振奋情绪。\n\
    2. 对于刺激消化系统是有效的，尤其有开胃的作用。\n3. 由于它能调节荷尔蒙的分泌，对经期有非常好的调控作用。\n4. 还被用于治疗女性不孕症和更年期症，对尿路、肝脏和肾脏有滋补的功效。\n\
    5. 鼠尾草精油也能刺激淋巴循环系统，有影响到腺体的功能。\n6. 应用于肌肉系统时，它对肌肉僵硬和脖颈僵硬有效，能缓解肌肉发抖和瘫痪的症状，它能缓解因风湿病引起的疼痛。\n\
    7. 对治疗皮炎、溃疡和蚊虫叮咬有效，还可以缩小毛孔。\n\n### （6）使用注意事项\n鼠尾草精油功效强大，应该小心使用。因为这种精油含有高浓度的侧柏酮成份，当大剂量使用时，会产生抽搐反应，口服这种精油是有害的。在芳香疗法中要小心使用，如果鼠尾草精油的毒性困扰着你，你应该考虑快乐鼠尾草精油，因为它与鼠尾草精油的功效较相似，且没有副作用。\n\
    妇女在孕期要避免使用，高血压和癫痫症患者也要禁止使用。\n\n### （7）用法\n即使鼠尾草精油大剂量使用会有毒性，但是它仍可以提供一些好的治疗功效，可以与它的副作用相抵消。\n\
    \n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，鼠尾草精油可以用于镇静神经，帮助从悲痛和压抑中恢复过来，可以增强记忆力。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   鼠尾草精油以很小的浓度做复方按摩油或稀释在浴盆中使用，有助于治疗女性不孕症和改善更年期症状，能促进泌尿系统、肝脏、肾脏和淋巴系统的功能；它对肌肉僵硬和脖颈僵硬有效，能缓解肌肉发抖和瘫痪的症状。\n\
    3. **做面霜或润肤乳的成份**\n   虽然过量使用鼠尾草精油会有危险，但是它还是有积极的使用效果的，可以用于治疗牛皮癣、皮炎和溃疡。\n\n### （8）适合与鼠尾草精油混用的精油\n\
    佛手柑、薰衣草、柠檬和迷迭香精油。\n\n## 9. 快乐鼠尾草精油\n\n快乐鼠尾草精油是从快乐鼠尾草植物（*Salvia sclarea*）中提取的，属于唇形科，又称为南欧丹参。\n\
    \n虽快乐鼠尾草精油价格不菲，但它的功效强大，不仅表现在缓解精神压抑和神经紧张方面，而且对于治疗妇科疾病和面色不好都有很好的效果。\n\n### （1）精油性质\n\
    一种清澈到淡黄的精油，快乐鼠尾草油散发着清甜的坚果芳香味道，还有点青草的芬芳。油质水性，如果带叶片蒸馏，油质偏向黏性。\n\n### （2）来源\n原产于欧洲南部，是种低矮、冠径较大的二年生植物，可以长到\
    \ 1m 高，叶片巨大、多毛，小花蓝色或白色，直接着生在细长的茎上。在法国和俄罗斯有商业性栽培。\n英文名字来源于拉丁文 Claris，意思是“清澈”，或来源于希腊文\
    \ Skeria，意思是“坚韧”，因为它的花瓣有坚硬的地方。在中世纪时期，人们称其为\"Oculus Christi\"，是“基督的眼睛”的意思，它还被当作一种非常受尊重的药材。在牙买加，当地居民用它清洁和冷敷溃疡处，也用于治疗眼睛发炎。\n\
    \n### （3）提取方法\n快乐鼠尾草是以花的前端和叶片为原料，采用蒸汽蒸馏法提取的。\n\n### （4）化学成份\n快乐鼠尾草精油的主要化学成份为芳樟醇、乙酸里哪酯、石竹烯、松油醇、香叶醇、香紫苏醇。\n\
    \n### （5）治疗功效\n1. 可以平缓紧张的神经系统，尤其是在治疗沮丧、压抑、失眠和长期不安方面。\n2. 是子宫和女性功能方面的良好滋补品，如在治疗周期性痛经、月经量不足等。还可以减轻产妇分娩时的痛苦。\n\
    3. 劳累过后，使用快乐鼠尾草精油可以起到放松的效果。\n4. 在更年期使用快乐鼠尾草精油，可以治疗身体发热、夜间流汗、心悸、易怒、头疼以及头昏眼花。\n\
    5. 对肌肉疼痛、消化系统失衡、肾脏疾病有好处。对皮肤感染有冷却的效果。\n\n### （6）使用注意事项\n快乐鼠尾草精油有很强的放松效果。当饮酒以后，最好避免使用快乐鼠尾草精油，因为它会扩大酒精的作用。它是无毒、无刺激的精油，但是大剂量的使用会导致头疼。一定避免在孕期使用。\n\
    \n### （7）用法\n快乐鼠尾草精油最大的功效在于能平缓安定神经、情绪、妇科方面的疾病，对肾脏和消化系统也有益处。它也有助于皮肤的痤疮、疖子和溃疡的痊愈，对肌肉和关节的疼痛有冷却的作用。\n\
    \n1. **香炉和蒸发器**\n   在蒸汽疗法中，快乐鼠尾草精油可以用来治疗神经紧张、精神压抑、焦虑、失眠和更年期症。它对于减轻消极的情绪和创造一种更加积极的人生前景非常有效。也有助于提升创造力和领悟更多的直觉知识。\n\
    2. **做按摩油或盆浴的添加成份**\n   快乐鼠尾草可以在复方按摩油中或稀释在浴缸中使用，以缓解肌肉疼痛、性冷淡、精神压抑、焦虑、月经问题、月经前不快症状（PMS）、神经紧张、失眠、抽筋和上瘾症。\n\
    3. **做面霜或润肤乳的添加成份**\n   做面霜或润肤乳的添加成份时，快乐鼠尾草精油对皮肤问题、背部疼痛、抽筋、月经前不快症状和脖项僵硬有效。它在平衡油脂分泌和清除面部多余油脂方面的效果尤其的好。\n\
    \n### （8）适合与快乐鼠尾草精油混用的精油\n（原文此处结束，未列出具体清单）"
  mdcn: "## 3. 甜罗勒精油\n\n### （3）提取方法\n以植物的叶片和花为原料，采用水蒸气蒸馏法提取的。\n\n### （4）化学成份\n40%~45%沉香醇、樟脑、松萜或蒎烯、茨烯、柠檬油精、罗勒烯、芳樟醇、甲基胡椒酚、萜品醇或松油醇、香茅醇、香叶醇、甲基肉桂酸和丁子香酚。\n\
    \n### （5）治疗功效\n1. 甜罗勒精油是治疗神经失调、缓解头痛、偏头痛和敏感症的很好的滋补品。它常用来清除头脑杂念，缓解脑力疲劳，同时能在精神上给予力量和宁静。\n\
    2. 它对呼吸道也有良好的作用，经常被用来治疗哮喘、支气管炎和窦炎。此外，它对便秘、恶心、呕吐、抽筋（腹部绞痛）也有效，在治疗月经问题方面，也有好的表现。\n\
    3. 由于具有通经的性质，它经常用于治疗经期不足，并使其正常化。\n4. 它能帮助降低血液中的尿酸成份，以缓解痛风症状，抗动脉粥样硬化。对关节炎的治疗也有帮助。当在皮肤上使用时，能够帮助治疗痤疮。还可用于治疗蚊虫叮咬。\n\
    \n### （6）使用注意事项\n尽管人们需要刺激时常常会用到甜罗勒精油，但是，过量使用会有麻木的感觉。因此，怀孕期间不要使用，16 岁以下的孩子也不要使用。由于它能使敏感皮肤发生过敏反应，所以敏感性肤质的人要小心使用。它还有通经作用，所以怀孕期间一定避免使用。\n\
    \n### （7）用法\n甜罗勒精油是一种非常有益的精油，不但能治疗头痛和偏头痛，而且对精神沮丧也有振奋作用。对于消化不良，包括恶心和打嗝，呼吸道受感染，都有益处。甜罗勒精油可治疗黄蜂、昆虫，尤其是蚊子的叮咬。\n\
    \n1. **用于香炉和蒸发器熏香**\n   在蒸汽疗法中，罗勒精油能够用于治疗偏头痛、头痛，帮助提高注意力和使头脑清晰。\n2. **加入浴盆中**\n\
    \   当把罗勒精油加入温水浴盆中时，有益于痛风和关节炎的痊愈，也可以缓解肌肉和月经疼痛。\n\n### （8）适合与罗勒精油混用的精油\n香柠檬、黑胡椒、雪松、茴香、生姜、天竺葵、葡萄柚、薰衣草、柠檬、甜牛至精油。\n\
    \n## 4. 迷迭香精油\n\n迷迭香精油是从迷迭香植物（*Rosmarinus officinalis*、*Rosmarinus coronarium*）中提取的，属于唇形科。\n\
    \n这种味道清新和洁净的精油对大脑有很强的刺激作用，可以增强记忆和使思绪清晰；有助于治疗各种呼吸道问题、肌肉僵硬、感冒和改善肝脏和胆囊的功效。它也可以用于护理头发和头皮的健康。\n\
    \n### （1）精油性质\n有种强劲、清洁和新鲜的香草味道，颜色清澈，水质黏性。\n\n### （2）来源\n它是一种多年生常绿的矮灌木，可以长到 1.5m\
    \ 高，叶片绿灰色、针状，花色淡蓝或淡紫色，能吸引蜜蜂。原产于亚洲，现在主要栽培在法国、突尼斯和南斯拉夫。\n\n它的英文名\"Rosemary\"由希腊单词\"\
    Rosmarinus\"演化而来，意思是“海之露”，因为它非常喜欢水。埃及人、希伯来人、希腊人和罗马人认为它是一种神圣的植物。在中世纪时期，它被用来驱魔辟邪，还用它预防瘟疫。在法国医院，燃烧这种植物预防流行病。\n\
    \n### （3）提取方法\n迷迭香精油是以新鲜的花的顶端部分为原料，采用蒸汽蒸馏法提取的，出油率在 1.0%~2.0%。\n\n### （4）化学成份\n\
    松萜或蒎烯、龙脑、樟脑、醋酸冰片酯、茨烯、桉树脑和柠檬油精。\n\n### （5）治疗功效\n1. 对大脑和中枢神经系统有显著的作用，还可以清除杂念和启发智力。对大脑还有很好的刺激作用，能增强记忆力。\n\
    2. 有助于治疗头疼、偏头疼、神经痛、精神疲劳和神经衰弱，迷迭香精油的防腐杀菌的功效尤其适用于肠道感染、痢疾症状，缓解消化不良、肠胃气胀，协调肝脏不适和黄疸的症状，减轻因关节炎、风湿病和痛风引起的疼痛。\n\
    3. 有助于治疗动脉硬化、心悸、不良循环和静脉曲张。\n4. 迷迭香精油利尿的功效有利于降低月经期水分持有量，也利于分解脂肪和减轻体重。\n5. 对于呼吸系统，它对哮喘、支气管炎、黏膜炎鼻窦炎和发嗝嗝声的咳嗽有疗效。\n\
    6. 由于它具有收敛作用，对松弛的皮肤有积极的功效。它的刺激作用有利于调整头皮功能失调和促进头发的生长。\n\n### （6）使用注意事项\n迷迭香精油不能在孕期使用，患有癫痫症和高血压的病人也不适于使用。\n\
    \n### （7）用法\n迷迭香精油有助于治疗神经疲劳，改善循环系统、肌肉系统、呼吸系统的功能，对皮肤和头发有积极的作用。\n\n1. **香炉和蒸发器熏香**\n\
    \   在蒸汽疗法中，迷迭香精油有助于缓解饮酒过量、过度疲劳、鼻窦炎和身心疲倦的症状。此外，它还能刺激大脑、改善记忆和帮助思维。\n2. **做按摩油的成份或添加在浴盆中使用**\n\
    \   迷迭香精油有利于缓解肝脏、胆囊、黏膜充血、肌肉酸疼、抽筋、脖颈僵硬、过度疲劳、关节疼痛、感冒、便秘、腹泻、咳嗽、支气管炎、后背疼、头皮功能失调、鼻窦炎、身心疲倦的不适。\n\
    3. **做面霜或润肤乳的成份**\n   当迷迭香精油做面霜或润肤乳成份时，它最大功效是可以促进血液循环和解除皮肤的充血状态。\n4. **做香波的添加成份**\n\
    \   当添加到香波使用时，它不仅可以促进头皮循环功能和头发生长，还可以作为头发和头皮的日常滋补品。\n\n### （8）适合与迷迭香精油混用的精油\n柏木、香茅、天竺葵、薰衣草、柠檬香茅和椒样薄荷精油。\n\
    \n## 5. 蜜蜂花精油\n\n蜜蜂花精油是从蜜蜂花植物（*Melissa officinalis*）中提取的，属于唇形科，又称为香蜂花和柠檬香薄荷。可分为普通型、甜味型。\n\
    这种精油在芳香疗法中有许多用途，有助于抚慰情绪，具有很强的镇静的效果，能够调节心脏功能，尤其是在缓和心悸方面。此外，它还有调理月经的功效。在治疗因感冒引起的疼痛方面效果很好，还可以缓解真菌性的感染。\n\
    \n### （1）精油的性质\n蜜蜂花精油味甜、清新，有股柑橘味道，颜色淡黄，水质般的黏性。\n\n### （2）来源\n这种植物起源于地中海地区，可以长到\
    \ 60cm 高，喜欢含铁量高的土壤，叶片小、边缘锯齿状、略带绒毛，花朵小、白色到粉红色。这种花对蜜蜂有很强的吸引力。蜜蜂花的英文\"Melissa\"来源于希腊单词，意思是蜂蜜。它又有“柠檬香油”的称号，在希伯来语中，有“油之魁首”的美称。在\
    \ 14 世纪，法国派的托钵僧用它制作滋补水，Paracelsus（1493~1541 年）称这种植物为“长生不老药”，而 John Evelyn（1620~1706\
    \ 年）把它描绘成大脑的主宰者，能够加强记忆力，彻底地驱散忧郁。\n\n### （3）提取方法\n蜜蜂花是以新鲜花枝的上部、叶片和茎为原料的，采用蒸汽蒸馏法提取的。\n\
    \n### （4）化学成份\n罗勒烯、甲基己基酮、乙烯醇、辛醇、辛烯、古巴烯、香茅醛、芳樟醇、石竹（萜）烯、绿草烯、橙花醛、香叶醛、乙酸香叶酯、橙花醇和香叶醇。\n\
    \n### （5）治疗功效\n1. 可以镇定神经，在治疗精神抑郁方面有良好的疗效。它的镇定作用在临床上有很好的表现，可以治疗歇斯底里症和恐慌症。\n2. 对于心脏是一种滋补剂，能使心跳变得缓慢，降低高血压。\n\
    3. 可以调节经期，缓解经期疼痛。\n4. 能解决一些消化系统的问题，如反胃、肠胃气胀、呕吐、消化不良和痢疾。对发烧有降温的作用，还可以缓解因感冒引起的头痛和偏头痛。\n\
    5. 在用作治疗药物的初期，常被用来治疗唇疱疹。\n\n### （6）使用注意事项\n蜜蜂花精油没有毒，但是可以引起敏感和刺激反应，应该以低剂量使用。因此，在孕期要避免使用，皮肤敏感的人不要使用。\n\
    \n### （7）用法\n蜜蜂花精油最有价值的用处，是它抚慰神经的能力，以及治疗消化系统、心脏、月经疼痛和发烧。\n\n1. **香炉和蒸发器熏香**\n\
    \   在蒸汽疗法中，蜜蜂花精油可以用于抗抑郁，对大脑有很强的镇静效果，还可以缓解发烧和头疼的症状，对反胃恶心也有疗效。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   蜜蜂花精油做复方按摩油或稀释在浴盆中使用，可以用于治疗发烧、头疼、压抑，以及神经过敏和压力过大，缓解反胃和治疗真菌感染。\n3. **做面霜或润肤乳的成份**\n\
    \   虽然蜜蜂花含有高浓度的乙醛，也可能引起某些人的过敏反应，但是它对于真菌感染的治疗是有效的，能够止住伤口流血，对治疗秃顶和掉头发也有疗效。\n\n###\
    \ （8）适合与蜜蜂花精油混用的精油\n罗勒、罗马甘菊、玫瑰、天竺葵、乳香、薰衣草和依兰精油。\n\n## 6. 牛膝草精油\n\n牛膝草精油是从牛膝草植物（*Hyssopus\
    \ officinalis*）中提取的，属于苋科，又称为海索草。\n\n这种相当昂贵的精油可以有效地辅助治疗女性失调症和月周期性水肿。在帮助治疗呼吸系统方面，能够有效地清除黏液，缓解支气管痉挛。它还可以被用来治疗支气管炎、哮喘、流感和感冒，也有助于伤口愈合和消散皮肤上的瘀伤。\n\
    \n### （1）精油性质\n牛膝草精油有种温和的清甜气味，颜色从无色到淡黄绿色。\n\n### （2）来源\n这种灌木零星地分布在地中海地区，高度约 60cm，对蜜蜂有很强的吸引力。牛膝草曾经是希腊的名医希波克拉底（约公元前\
    \ 460～前 370 年，古希腊医师，医药之父）使用过的名字，是从希伯来语\"ezob\"演化来的，意思是“神圣的植物”。它在古书（《Old Testament》）中常被提到，那时，人们用它作心灵净化的象征，然而，这种说法所指的植物也有可能是牛至属植物。\n\
    \n它的茎木质化、多毛，叶片小、绿色、长毛状，花朵紫蓝色，是古代著名的植物。它的茎节处像牛膝盖。它在圣经中也被提到过。它具有净化的功效，可以驱避瘟疫、麻风病，治疗胸腔的疾病。它也被用于净化宗教场所，在中世纪被当作一种点缀植物，来驱避虱子。在\
    \ 10 世纪，本笃会的僧人把它作为利口酒的制作原料，引入到欧洲。\n据推测，可能原产我国，目前在我国东部省份有商业化种植。\n\n### （3）提取方法\n\
    牛膝草精油是以叶片和花朵为原料，采用蒸汽蒸馏法提取的。\n\n### （4）化学成份\n松萜或蒎烯、莰烯、桧烯、月桂（香叶）烯、柠檬油精、萜品醇、桉树脑和侧柏酮。\n\
    \n### （5）治疗功效\n1. 牛膝草精油能给人一种警戒的感觉，有助于缓解焦急和疲劳。因此，在康复阶段，可以当作滋补品使用。\n2. 在治疗因呼吸系统疾病和病毒引起的感冒时，它也是有效的，如治疗感冒、咳嗽、咽喉疼、流感、支气管炎、哮喘、黏膜炎和扁桃体炎。\n\
    3. 有助于治疗胃绞痛、肠胃胀气和消化不良，调节循环。\n4. 在月经期间，水肿是个经常性的问题，牛膝草精油有平衡的作用。一般情况下，这种精油是有助于月经正常的，对于无月经和白带异常有缓解作用。\n\
    5. 能通过减少心率和扩张外周动脉而降低血压。\n6. 对于瘀伤有好的治疗特性。\n\n### （6）使用注意事项\n牛膝草精油没有刺激性，没有敏感性，但要使用适度。孕妇和癫痫症患者应避免使用。\n\
    \n### （7）用法\n牛膝草精油是种功效强劲的油，可以缓解呼吸系统疾病，调节消化系统失常，治疗泌尿系统感染，以及皮肤问题，包括瘀伤、湿疹、感染和皮炎。\n\
    \n1. **香炉和蒸发器**\n   在蒸汽疗法中，牛膝草精油可以用于治疗焦虑、神经疲劳、感冒、咳嗽、支气管炎、哮喘和感染。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   牛膝草精油做复方按摩油或稀释在浴盆中使用，可以缓解焦虑、神经疲劳、呼吸系统疾病、病毒感染、月经问题、胃部绞痛、肠胃胀气、消化不良和促进皮肤康复。\n\
    3. **做面霜或润肤乳的成份**\n   当用于面霜或润肤乳时，牛膝草精油可以帮助皮肤康复，治疗伤疤，也可以帮助消散瘀伤。\n\n### （8）适合与牛膝草精油混用的精油\n\
    圆当归、鼠尾草、天竺葵、柑橘、橘子、蜜蜂花和迷迭香精油。\n\n## 7. 马郁兰精油\n\n马郁兰 Origanum majorana\n马郁兰精油是从马郁兰植物（*Origanum\
    \ majorana*）中提取的，属于唇形科，又称为多节牛至或甜牛至。\n\n这种精油在治疗哮喘和其他呼吸道疾病方面很有价值，对情绪有镇静作用。它能帮助活动亢进的人平静下来，还可以促进循环。\n\
    \n### （1）精油性质\n马郁兰精油气味温和，有些辛辣；无色或淡黄色/琥珀色。\n\n### （2）来源\n这是种柔弱的灌木型多年生植物，高约 60cm，茎多毛，叶片黑绿色、椭圆形，花小、白色或粉红色。起源于地中海地区，牛至属植物的英文名字\
    \ Origanum 是从希腊单词 orosganos 演变来的，意思是“大山的喜悦”。据说，可以给新婚夫妇带来好运。它是希腊人非常喜欢使用的一种草药。在医药和香水业中，有广泛的用途。另外，还可以把它散放在地板上，以遮盖不好的气味。\n\
    \n### （3）提取方法\n马郁兰精油是以新鲜干燥的叶片以及开花的上半部为原料，采用蒸汽蒸馏法提取的，出油率在 0.5%~3%。\n\n### （4）化学成份\n\
    桧烯、不旋松油精或萜品烯、异丙基苯、异松油烯、芳樟醇、氢氧化物、乙酸里哪酯、萜品烯或松油烯。\n\n### （5）治疗功效\n1. 马郁兰精油疗效温和，能抚慰情绪，缓解焦虑和压力，有助于使情绪亢进的人平静下来。\n\
    2. 有良好的肌肉松弛的功效，它的止痛功能有助于缓解风湿病、扭伤、拉伤和痉挛，以及关节肿胀和肌肉疼痛的症状。\n3. 有利于消化系统，能够缓解腹部绞痛、消化不良、便秘和肠胃气胀，对感冒、窦炎、支气管炎和哮喘也有疗效。\n\
    4. 可以作为一种放松剂，用于治疗头痛、偏头痛和失眠等症。\n5. 对性欲有克制的作用。\n6. 对月经疼痛、后延和不足都有很好的疗效。\n\n### （6）使用注意事项\n\
    马郁兰精油无毒、无刺激性和光敏性，但是要避免在孕期使用。\n\n### （7）用法\n马郁兰精油有助于治疗神经紧张、呼吸道问题、肌肉和关节疼、消化不良和月经失调等症状。\n\
    \n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，马郁兰精油可以用于治疗哮喘、支气管炎、咳嗽、不良循环、身体疲劳、头疼、紧张、失眠、焦虑、神经紧张和压力大等症状。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   马郁兰精油做复方按摩油或稀释在浴盆中使用，可以用于治疗哮喘、关节炎、后背疼、支气管炎、不良循环、感冒、咳嗽、消除放射性污染、身体疲倦、头疼、紧张、烧心、失眠、周期性疼痛、偏头痛、肌肉疼痛和抽筋、风湿病、窦炎、焦虑、压力大和悲痛症状。\n\
    3. **做面霜或润肤乳的成份**\n   马郁兰精油有很好的温热功效，当用于面霜或润肤乳时，可以促进冻疮愈合和驱散瘀伤。\n\n### （8）适合与马郁兰精油混用的精油\n\
    薰衣草、丝柏、柏木、甘菊、佛手柑、尤加利和茶树精油。\n\n## 8. 鼠尾草精油\n\n鼠尾草精油是从鼠尾草植物（*Salvia officinalis*）提取的，属于唇形科。\n\
    \n鼠尾草 *Salvia officinalis*\n“治疗”或“拯救”。在中世纪时期，它是许多神经滋补品的成份，也可用这种植物清洁齿龈。\n\n虽然这种油使用浓度高时会引起一些问题，但是如果以低剂量使用，它对解决许多问题还是有效的。有助于缓解悲痛和重新振奋精神；还能刺激循环系统；帮助解决女性问题，包括不育症、更年期症；对于皮肤的作用不仅仅是治疗，还能减小皮肤的毛孔大小。\n\
    \n### （1）精油性质\n鼠尾草精油有强烈的香草气味，有水质般的黏性。\n\n### （2）来源\n鼠尾草是一种常绿的多年生的草本植物，可以长到约 60cm，叶柄基部木质化、柔软、椭圆形、绿灰色，花多、绿色或紫罗兰色。中国人认为它可以治疗不孕症，而罗马人认为它对很多疾病都有疗效。\n\
    \n鼠尾草的名字 Sage 是从拉丁文单词 salvare，意思是“治疗”或“拯救”。\n\n### （3）提取方法\n鼠尾草精油是以干燥的叶片为原料的，采用蒸汽蒸馏法提取的，出油率约\
    \ 1%。\n\n### （4）化学成份\n鼠尾草精油的主要化学成份α-侧柏酮、β-侧柏酮、1，8-桉叶素、樟脑。\n\n### （5）治疗功效\n1. 有助于减轻悲痛、压抑的感觉，能够振奋情绪。\n\
    2. 对于刺激消化系统是有效的，尤其有开胃的作用。\n3. 由于它能调节荷尔蒙的分泌，对经期有非常好的调控作用。\n4. 还被用于治疗女性不孕症和更年期症，对尿路、肝脏和肾脏有滋补的功效。\n\
    5. 鼠尾草精油也能刺激淋巴循环系统，有影响到腺体的功能。\n6. 应用于肌肉系统时，它对肌肉僵硬和脖颈僵硬有效，能缓解肌肉发抖和瘫痪的症状，它能缓解因风湿病引起的疼痛。\n\
    7. 对治疗皮炎、溃疡和蚊虫叮咬有效，还可以缩小毛孔。\n\n### （6）使用注意事项\n鼠尾草精油功效强大，应该小心使用。因为这种精油含有高浓度的侧柏酮成份，当大剂量使用时，会产生抽搐反应，口服这种精油是有害的。在芳香疗法中要小心使用，如果鼠尾草精油的毒性困扰着你，你应该考虑快乐鼠尾草精油，因为它与鼠尾草精油的功效较相似，且没有副作用。\n\
    妇女在孕期要避免使用，高血压和癫痫症患者也要禁止使用。\n\n### （7）用法\n即使鼠尾草精油大剂量使用会有毒性，但是它仍可以提供一些好的治疗功效，可以与它的副作用相抵消。\n\
    \n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，鼠尾草精油可以用于镇静神经，帮助从悲痛和压抑中恢复过来，可以增强记忆力。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   鼠尾草精油以很小的浓度做复方按摩油或稀释在浴盆中使用，有助于治疗女性不孕症和改善更年期症状，能促进泌尿系统、肝脏、肾脏和淋巴系统的功能；它对肌肉僵硬和脖颈僵硬有效，能缓解肌肉发抖和瘫痪的症状。\n\
    3. **做面霜或润肤乳的成份**\n   虽然过量使用鼠尾草精油会有危险，但是它还是有积极的使用效果的，可以用于治疗牛皮癣、皮炎和溃疡。\n\n### （8）适合与鼠尾草精油混用的精油\n\
    佛手柑、薰衣草、柠檬和迷迭香精油。\n\n## 9. 快乐鼠尾草精油\n\n快乐鼠尾草精油是从快乐鼠尾草植物（*Salvia sclarea*）中提取的，属于唇形科，又称为南欧丹参。\n\
    \n虽快乐鼠尾草精油价格不菲，但它的功效强大，不仅表现在缓解精神压抑和神经紧张方面，而且对于治疗妇科疾病和面色不好都有很好的效果。\n\n### （1）精油性质\n\
    一种清澈到淡黄的精油，快乐鼠尾草油散发着清甜的坚果芳香味道，还有点青草的芬芳。油质水性，如果带叶片蒸馏，油质偏向黏性。\n\n### （2）来源\n原产于欧洲南部，是种低矮、冠径较大的二年生植物，可以长到\
    \ 1m 高，叶片巨大、多毛，小花蓝色或白色，直接着生在细长的茎上。在法国和俄罗斯有商业性栽培。\n英文名字来源于拉丁文 Claris，意思是“清澈”，或来源于希腊文\
    \ Skeria，意思是“坚韧”，因为它的花瓣有坚硬的地方。在中世纪时期，人们称其为\"Oculus Christi\"，是“基督的眼睛”的意思，它还被当作一种非常受尊重的药材。在牙买加，当地居民用它清洁和冷敷溃疡处，也用于治疗眼睛发炎。\n\
    \n### （3）提取方法\n快乐鼠尾草是以花的前端和叶片为原料，采用蒸汽蒸馏法提取的。\n\n### （4）化学成份\n快乐鼠尾草精油的主要化学成份为芳樟醇、乙酸里哪酯、石竹烯、松油醇、香叶醇、香紫苏醇。\n\
    \n### （5）治疗功效\n1. 可以平缓紧张的神经系统，尤其是在治疗沮丧、压抑、失眠和长期不安方面。\n2. 是子宫和女性功能方面的良好滋补品，如在治疗周期性痛经、月经量不足等。还可以减轻产妇分娩时的痛苦。\n\
    3. 劳累过后，使用快乐鼠尾草精油可以起到放松的效果。\n4. 在更年期使用快乐鼠尾草精油，可以治疗身体发热、夜间流汗、心悸、易怒、头疼以及头昏眼花。\n\
    5. 对肌肉疼痛、消化系统失衡、肾脏疾病有好处。对皮肤感染有冷却的效果。\n\n### （6）使用注意事项\n快乐鼠尾草精油有很强的放松效果。当饮酒以后，最好避免使用快乐鼠尾草精油，因为它会扩大酒精的作用。它是无毒、无刺激的精油，但是大剂量的使用会导致头疼。一定避免在孕期使用。\n\
    \n### （7）用法\n快乐鼠尾草精油最大的功效在于能平缓安定神经、情绪、妇科方面的疾病，对肾脏和消化系统也有益处。它也有助于皮肤的痤疮、疖子和溃疡的痊愈，对肌肉和关节的疼痛有冷却的作用。\n\
    \n1. **香炉和蒸发器**\n   在蒸汽疗法中，快乐鼠尾草精油可以用来治疗神经紧张、精神压抑、焦虑、失眠和更年期症。它对于减轻消极的情绪和创造一种更加积极的人生前景非常有效。也有助于提升创造力和领悟更多的直觉知识。\n\
    2. **做按摩油或盆浴的添加成份**\n   快乐鼠尾草可以在复方按摩油中或稀释在浴缸中使用，以缓解肌肉疼痛、性冷淡、精神压抑、焦虑、月经问题、月经前不快症状（PMS）、神经紧张、失眠、抽筋和上瘾症。\n\
    3. **做面霜或润肤乳的添加成份**\n   做面霜或润肤乳的添加成份时，快乐鼠尾草精油对皮肤问题、背部疼痛、抽筋、月经前不快症状和脖项僵硬有效。它在平衡油脂分泌和清除面部多余油脂方面的效果尤其的好。\n\
    \n### （8）适合与快乐鼠尾草精油混用的精油\n（原文此处结束，未列出具体清单）"
