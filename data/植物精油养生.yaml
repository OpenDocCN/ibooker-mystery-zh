    # # 一、植物精油基础知识


    # ## （一）植物精油概念


    植物精油，简称“精油”，是从各种植物材料中获得的一类挥发性物质。它不仅来源于草本、灌木、亚灌木和木本植物的花朵，也来源于它们的其他各种器官。这里突出和强调的“植物”精油，是与化学合成精油相区别的。本书所谈的精油均是植物的提取物。


    ### 1. 几种植物精油


    #### （1）固体精油


    把要萃取的材料放在盛有溶剂的蒸馏器中，然后缓慢加热，所加热量刚好能够使溶剂保留在混合物中（这种溶剂可以反复使用），而植物材料中的挥发性物质也不会散发掉。当把溶剂转移出去后，所剩的物质接近于固体，成蜡状，我们称其为“固体”精油。


    #### （2）树脂状精油


    把含有树脂的植物材料使用上述方法进行萃取，所分离出来的物质就称为“树脂状”精油。


    #### （3）完全精油


    先把固体精油用酒精加热溶解，然后搅动。完全精油或一些蜡质精油、不易挥发的油和脂肪都会溶解在酒精中。然后，把这种酒精混合物在真空状态下蒸馏，去除酒精，所剩下的物质就是“完全”精油。完全精油的香味最浓，也是最贵的，主要用于香水工业。


    ### 2. 植物精油的特性及应用注意事项


    #### （1）精油不是油，而是一种挥发性物质


    精油是根据植物材料性质采取不同的提取方法从植物材料中获取的有着很浓香味的液体。精油与其他油（如橄榄油）的不同点在于精油具有挥发性，当暴露在空气中时，就会挥发掉。


    #### （2）精油具有医疗保健功效


    精油还有某些治疗功效，能够用于保健和康乐方面。在精油漫长的应用历史中，许多'
  - '[PAGE 6]


    卓越的治病术士（尤指用宗教迷信方式给人治病的人）都会使用。事实证明，这些提取物确实具有治病的功效。


    # (3) 使用精油要注意安全


    在精油的使用过程中，也有一些必要的安全措施。比如，不要在皮肤上使用浓的、没有稀释过的精油。另外，某些精油是有毒的。幸运的是，一般这类精油是不销售的。不过，当第一次使用精油，或在尝试一种新的精油时，大家还是要小心。


    # (4) 精油使用方法多种多样


    精油的使用方法有许多种，如芳香按摩，精油主要通过皮肤被吸收；蒸汽疗法，精油分子通过肺部进入人体循环系统等等。


    # (5) 有少量精油可内服


    科学证明，有个别的植物精油也可以作为一种内服药用于医学领域，但一定要在经过训练的人或有相应行医资格的人的指导下使用。


    # (6) 应用精油前必须做皮肤测试


    如果你从来没有在你的皮肤上使用过精油，我们建议你先做皮肤测试，来检验有无过敏反应。


    # (二) 植物精油的应用历史


    # 1. 埃及


    在人类历史中，埃及人可能是最早在宗教、化妆品、庆典和医疗方面广泛使用芳香疗法和芳香植物的。具有香味的植物（或动物）的精华和树脂常常被用作防腐剂的材料，最典型的应该是在木乃伊制作工艺方面的应用。


    古埃及的统治者相信，只要尸体能够保存完整，人死后就可再生，轮回成人。人一死，他们便将其尸体的内脏（除了心脏及肾脏），包括脑部组织，全部取出放在宝瓮中。尸体被涂敷香料及药物，并用树脂填充腹腔，这样处理过的尸体经过千年也不腐败。雪松精油、没药精油以及其他的香熏植物精油在“木乃伊”制作过程中的使用，不但证明它们具有神奇的防腐作用，也说明古埃及著名的“木乃伊”与植物精油具有密不可分的关系。


    在古代一些重要节日，香料是重要的装点工具。古埃及的演奏者们顶着香料瓶来吹奏欢歌，浓郁的香味不仅增添了节日的气氛，还给人以精神上的享受。


