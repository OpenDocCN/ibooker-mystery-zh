    # # 十、植物精油在身体调理中的应用

    Essential oils health Essential oils health


    # (一) 植物精油与皮肤系统


    # ## 1. 擦伤


    - 擦伤每天都有可能发生，孩子们到处跑着玩，就有可能碰伤自己。擦伤处唯一的危险就是发生感染。所以，一定要确定擦伤处的杂物都被取出来了，所有的脏东西都被完全清洗掉了。

    - 配制清洗液的办法：在一碗温水中，滴入10滴薰衣草、桉树、柠檬或茶树精油。

    - 使受伤的皮肤尽可能地露在新鲜的空气中。但是如果有再感染的危险，要做些防护性覆盖。在一块纱布上滴3滴薰衣草精油，然后盖在伤口上。如果可能的，一天要换两次纱布，在第三天的时候，就可以让伤口暴露在空气中了。


    # ## 2. 唇疱疹


    - 唇疱疹会在嘴唇外侧形成水疱，有疼痛感，一般10天以后会自己痊愈。在痊愈初期，会形成硬壳。唇疱疹是一种单一性的疱疹病毒感染产生的，它可以处于休眠状态很长时间，当压力增大时，就会暴发。

    - 使用甘菊精油、金盏草油、天竺葵精油或茶树油，可以减轻疼痛和缓和病情。

    - 如果病毒的发作是由于太阳照射引起的，就要注意使用知名品牌的太阳防晒产品。


    # ## 3. 痤疮、粉刺、青春痘


    - 青春痘是最常见的皮肤失调的表现。轻微的青春痘表现为黑头和疙瘩，常出现在面部、背部和颈部。

    - (1)症状

    - 多数严重的病例会表现出极度的疼痛，伴有毛孔增大，最后留下深的疤痕。一般情况下，青春痘是由于对皮肤有保护作用的皮脂油的过度分泌而导致的。'
  - '[PAGE 215]


    女性使用避孕药可以使内分泌失调，也可以导致青春痘的产生。饮酒和吸烟也会影响皮肤和血液的纯洁度，这些都来自于不良或者失衡的生活习惯。

    （2）饮食调理

    长有青春痘的皮肤非常敏感，要经常细心地清洁皮肤。要有一个良好的饮食习惯，避免吃一些高脂肪的食品，同时多做锻炼，尤其是户外运动。

    （3）精油调理

    某些精油可以不稀释直接用于面部的小痘痘上，如茶树油或薰衣草油，但必须慎用，因为纯精油可以导致过敏反应。

    调配治疗面部的复方精油时，应该选择合适的基础油，例如，以加州希蒙得木油做基础油时，可以添加安息香油、雪松油、德国黄春菊、天竺葵油、薰衣草油、柠檬香茅油或者茶树油，稀释到2%。

    （4）使用方法

    晚上脸部清洗后，可以用棉签蘸少量复方精油或纯精油进行擦拭。坚持使用一段时间，直到小痘痘完全消失为止。

    复方精油的治疗效果对于某些皮肤可能不是很理想，但是，有些人反映效果确实很不错。


    # ### 4. 冻疮


    冻疮是长期暴露在寒冷环境中造成的。发病初期，受冻地方发红、变痒，逐渐变得疼痛，成水泡状；如果皮下深层组织受伤，会导致组织脱落和演变成坏疽。

    血液循环不好的皮肤和长期暴露在寒冷环境的皮肤容易受到影响。当第1次受到寒冷伤害后，这块皮肤对冷热的敏感性就增加了。

    在暖和的环境下，用柠檬汁按摩受伤部位，效果良好。也可以滴1滴纯天竺葵或茶树油在受伤部位，一般是手指或脚趾。

    也可以使用复方按摩油来治疗冻疮，配方是：10mL金盏草精油、2滴天竺葵精油、2滴薰衣草精油、2滴黑胡椒精油、2滴茶树精油。


    # ### 5. 冻伤


    冻伤会使皮肤变白、变凉和变麻木，这是因为皮肤暴露在低温下导致血液循环不良引起的。通常，手指、脚趾和耳朵最容易受到影响，在面部主要是鼻子和下颌。穿紧身衣物或鞋的地方容易变得湿润也会造成循环不良，一般会有发红和肿胀的现象发生。孩子和老人最容易受到寒冷的攻击。

    使受冻地方恢复循环是个痛苦的过程，这个过程要缓慢进行，不能使用热水。松树和丝柏家族的精油，尤其适合做治疗循环问题的按摩油。这些精油应该稀释在基础油中使'
  - '[PAGE 216]


    **植物精油在身体调理中的应用**


    用。在雪天外出回来后，在脚上擦一点松树精油与葡萄籽油的混合物，在皮肤患处也可以涂抹一些薰衣草精油，能预防冻伤的发生。


    6. 脚气


    脚气是最常见的一种真菌感染。最初的症状是出现小水疱，不久变成潮湿、发红的斑点，有灼烧和瘙痒的感觉。这种病很顽固，令人烦恼。它有很强的传染性，在潮湿的环境滋生迅速。不好的卫生条件和汗脚创造了适合真菌生长的环境。人工合成材料制成的袜子和鞋阻碍了空气流通，容易产生潮湿的环境。


    到可能感染脚气的地方时，可以在去前和走后，用纯茶树精油或天竺葵精油擦脚。


    治疗受感染的脚，可以在10mL任意的基础油中，添加2滴小麦胚芽油、2滴茶树精油和2滴天竺葵精油，每天在脚趾和指甲周围擦拭。


    **7. 疖子**


    疖子是一种脓肿，经常发生在臀部和手臂腋下的毛囊。发烧、劳累、有时淋巴结肿胀都有可能引发疖子。疖子经常发生在年轻的男性身上。饮食缺乏新鲜食物，吃猪肉过多，吃油榨食物和垃圾食物，这些都会导致血液不纯，进而引起疖子。


    对疖子有益的做法是清洗受感染的地方，配方如下：2滴薰衣草精油、2滴茶树精油、1滴刺柏精油，稀释在200mL的热水中。如果感染严重，再加1滴甘菊精油。每天清洗两次受感染的地方。感染进一步发展时，可以用棉签蘸些纯茶树精油，抹在患处。但是，如果没有很快取得效果，请到医院咨询。


    **8. 流血**


    各种类型的流血都需要认真地对待。一般，一位成年人大约有5L血，即使流失1L血都会有生命危险。因意外事故或紧急情况导致流血时，要及时征求医生的建议。


    如果是个小创口，可以使用外敷的办法，同时添加下面所列成份：1滴天竺葵精油、1滴柠檬精油、1滴洋甘菊精油、1滴茶树油。


    **9. 褥疮**


    卧床病人容易发生溃疡的位置，一般是臀部、脚后跟和肘部。经常帮助病人翻身能防止褥疮的发生。保持皮肤干燥、清洁和血液循环正常，也能预防褥疮。发生褥疮之前或之后，把下述成份混合在一起，轻轻地按摩，使其渗入到受影响的地方。使用的按摩油配方是：20mL月见草油、4滴小麦胚芽精油、3滴黄春菊或天竺葵精油、2滴薰衣草精油、2滴茶树精油、2滴乳香精油。


    如果褥疮已经流脓，就不能使用按摩油了。'
  - '[PAGE 217]


    **10. 伤口**


    当处理较深的伤口时，要特别地小心，因为伤口很容易发生感染。我们要做的就是不能让伤口总在流血，要设法让氧气进入伤口以消除感染的因素。所有的伤口都应快速得到治疗，否则，容易引起血液中毒现象的发生。


    细菌，如破伤风孢子，可以从脏东西进入伤口引起感染。感染破伤风会有生命的危险，因为会引起多处肌肉疼痛地抽搐，这种症状也可能是全身发作。


    先用清洗液仔细清洗伤口，清洗液的配置方法是，在500mL的水中，添加4滴薰衣草精油、2滴茶树精油和1滴桉树精油。


    柠檬汁可以用做突发性伤口的消毒剂，虽然会有刺痛感觉。当伤口处形成硬壳时，要保持干燥，不要剥掉它。你可以用金盏草精油一天两次地轻轻清洁伤口处。


    **11. 烧伤**


    烧伤有3种严重程度，第一种程度的烧伤，是受伤处变红；第二种，是有水泡；第三种程度的烧伤，是对皮肤和皮下肌肉组织造成了伤害。烧伤的典型症状是脱水，进而在烧伤的地方发生感染。


    电流、化学和辐射烧伤应该当作紧急事件进行处理。造成烧伤的原因可以是，过热、连续的摩擦、化学物质、辐射、电流、火、开水或烧热的油等。


    对于轻微的烧伤，立即在患处涂抹纯薰衣草精油，然后用湿的敷布盖上。


    所有的烧伤，如果不是明显轻微的症状，都需要立即到医院就诊。


    **12. 水泡**


    水泡可以由机械伤、烧伤、烫伤、皮肤发炎或蚊虫叮咬造成。水泡发生时，皮肤下面常有液体积累。当水泡破裂时，暴露出来的组织可能会感染。


    烧伤和烫伤的水泡是不能刺破的。可以在水泡上滴1滴薰衣草精油或茶树精油和1滴洋甘菊精油。然后小心全面地拍打。


    **13. 蚊虫叮咬（蜘蛛、扁虱和跳蚤）**


    蚊虫叮咬是可以预防的。当发生蚊虫叮咬时，你只需要一瓶薰衣草或甘菊精油就能够创造出治疗的奇迹。如果你对精油不过敏，可以直接在患处使用纯精油，能止住刺痛。要留意精油对叮咬处是否有过敏性反应，如果有必要，就到医院治疗。


    可以使用下列精油做驱虫剂：柠檬香茅精油、百里香精油、薰衣草精油、欧薄荷精油、香茅精油（尤其适用于蚊子）。'
  - '[PAGE 218]


