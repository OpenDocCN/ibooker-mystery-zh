    它的干燥叶片是一种草药，但它的精油功效强劲，即使很小剂量的使用都会抽搐反应。


    (3) 菖蒲

    这种植物的根系可以当做草药，治疗神经问题、头疼和眩晕等多种症状，但精油中含有致癌物，口服精油会产生抽搐反应，对肾脏和肝脏也有危害。


    (4) 樟脑

    虽然樟脑可以用于治疗一些感染的症状和呼吸系统的疾病，但是口服是有毒的。


    (5) 桂皮

    这种植物可以用于治疗许多消化系统的疾病，不过在皮肤上使用会有光敏性反应，还会刺激到黏膜。


    (6) 山葵

    使用山葵植物治疗咳嗽会有明显的效果，不过山葵精油含有烯丙基硫氰酸盐或酯（芥菜精油也含有该成份），对皮肤、眼睛、鼻腔和黏膜都有刺激作用。


    (7) 野艾

    这种植物能治疗许多种疾病，但是它的精油是有毒的，是一种堕胎剂和神经毒素。


    (8) 芥菜

    芥菜种子和粉末不含有烯丙基硫氰酸盐或酯成份，但是当种子与水接触后就会形成这种物质。这种精油不仅因为含有高浓度的烯丙基硫氰酸盐或酯（92%以上）而具有毒性，同时还是皮肤和黏膜的刺激剂。


    (9) 薄荷

    这种植物常被用于治疗多种疾病，包括月经不调，还是一种激励物；不过它的精油不仅是有毒的，还是一种堕胎剂，即使少量使用对肝脏和肺部也都会有损伤。


    (10) 芸香

    芸香可以用来治疗疾病，但其精油是有毒的，会刺激和灼烧皮肤，引起堕胎，对黏膜也有刺激性反应，其精油还是一种神经毒素，能引起光敏性反应。


    (11) 檫木

    这种植物可以用来治疗风湿病和痛风，但其精油含有高浓度的黄樟油精成份（80%~90%），这种成份是FDA禁止使用的，因为它是一种致癌物，即使小剂量使用也会有致命的危险。


    (12) 桧

    其精油含有桧烯，是有毒的，对皮肤也有刺激性，也是一种堕胎剂。


    (13) 艾菊

    艾菊精油含有高浓度的有毒成份，能引起抽搐反应、呕吐、子宫出血，如果影响到呼吸系统和其他器官，还会导致死亡。'
