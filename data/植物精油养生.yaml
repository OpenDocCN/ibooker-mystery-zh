  md: '# # （6）使用注意事项

    茶树精油被认为是一种安全的精油，没有毒性和刺激性，但也有人 对这种精油过敏，在使用时要注意。


    # # （7）用法

    茶树精油是刺激免疫系统效果最好的精油之一，能够治疗各种感染，还能用于清洁皮肤。


    +   ### 1）香炉和蒸发器熏香

    在蒸汽疗法中，茶树精油有助于治疗感冒、鼻窦炎、支气管炎和其他呼吸系统疾病，在休克恢复期也有作用。


    ### 2）做复方按摩油或稀释在浴盆中使用

    茶树精油做复方按摩油或稀释在浴盆中使用，可以用于治疗所有呼吸系统疾病以及关节炎、感冒、皮炎、皮肤感染、头皮失调、鼻窦炎、病毒感染、荨麻疹、婴儿感冒和咳嗽、支气管炎和汗脚。


    ### 3）做化妆水的成份或直接使用精油

    当把它加入水中用于洁净身体时，有助于治疗脓肿、褥疮、痤疮、疖子创伤及动物造成咬伤，也可以用棉签蘸精油直接擦在患处。治疗虱子，可以在头皮上直接擦精油，保留40分钟后，清洗头发，两天做一次，12天为一个疗程。治疗真菌病，如足癣和指甲传染病（甲沟炎），以及阴道炎，可以经常使用2.5%的稀释茶树油，涂抹于患处。

    请记住，它是一种强劲的精油，在皮肤上直接使用纯精油时要小心。


    ### 4）做漱口水的成份

    茶树精油可以作为漱口水的成份，用于治疗齿龈发炎、口腔溃疡、咽喉感染和扁桃腺炎。


    ### 5）做面霜或润肤乳的成份

    当把茶树精油混入面霜或润肤乳中用于护理皮肤时，它有助于清洁真菌、细菌和病毒的感染以及治疗各种皮肤问题，包括疖子、脓肿、痤疮、动物和人类的咬伤（需要向医生咨询后使用）、头皮屑和其他头皮失调症。它对治疗褥疮、尿疹或其他疹子也有疗效。


    ### （8）适合与茶树精油混用的精油

    肉桂、快乐鼠尾草、丁香、天竺葵、薰衣草、柠檬、没药、肉豆蔻、花梨木、迷迭香和百里香精油。


    # # 4.尤加利精油

    尤加利精油是从桉树（Eucalyptus globulus）中提取的，属于桃金娘科，又称为蓝桉。

    在芳香疗法中，这种精油有助于使头脑清新，集中注意力，减轻黏膜的肿胀程度。在治疗呼吸道问题、感染和肌肉酸痛，以及风湿病、头疼和精神疲惫方面，它也是非常有价值'
