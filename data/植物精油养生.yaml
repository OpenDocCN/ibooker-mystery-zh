    2) 做面霜或润肤乳的成份

    虽然肉桂精油对皮肤有刺激作用，但如果按照配比原则，混有低比例的肉桂精油的面霜或润肤乳对关节炎和风湿病是有益的。


    # **9.肉桂叶精油**


    肉桂叶精油是从肉桂植物（Cinnamomum zeylanicum、C.verum）的叶片中提取的，属于樟科。


    这种辛辣的精油在芳香疗法中有很大的利用价值，它可以缓解精疲力竭、精神压抑和垂头丧气的感觉。它有强大的治疗风湿病的功效，在消化系统方面也有作用，还可以治疗感冒和流感。


    （1）精油性质

    肉桂叶精油，味道温和、辛辣，有麝香的气味。油的颜色，从叶片中提取的精油颜色是黄色，从树皮中提取的精油颜色是红褐色。精油的黏质性介于中等到水性之间。从树皮提取的精油一般不在芳香疗法中使用。


    （2）来源

    这种桂树原产于印尼，在斯里兰卡和印度有栽培，树皮铁锈色，可以长到15m高，商业性的种植高度一般控制在2m。它的叶片革质、有光泽、绿色，开小白花，果实为浆果、椭圆形、紫色。树皮淡褐色，如纸一样。茎羽状、茂密，叶片依次向内反卷，每两年收割1次。


    希腊单词Kinnamon的意思是“管子”或“导管”的意思。肉桂精油过去常作为寺庙'
