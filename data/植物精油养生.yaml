- md: '## 咽部护理

    如果没有好转，请向牙医咨询。


    ## 2. 鼻窦炎

    鼻窦是一种细菌感染，主要在眼睛和鼻子周围骨骼上的凹处发生一处或多处的炎症。引起窦炎的病因可以是感冒、流感、扁桃腺炎、敏感症或是口腔不卫生。症状包括鼻音、流鼻血、疲劳、头疼、耳朵感染、眼周围疼痛、轻微的发烧或咳嗽。


    使用蒸汽吸入法可以缓解疼痛，蒸汽中加入 2 滴迷迭香精油、2 滴欧薄荷精油、1 滴百里香精油、1 滴尤加利精油。吸完蒸汽后，在 10mL 合适的基础油中添加下面的精油制成按摩油：2
    滴尤加利精油、2 滴欧薄荷精油、3 滴迷迭香精油、3 滴天竺葵精油、1 滴茶树精油。用这种混合油按摩鼻子、耳朵的前后、前额、颧骨、鼻子和脖子。


    ## 3. 耳朵感染或耳朵疼

    耳朵疼一般是由中耳感染引起的。


    症状包括一只或两只耳朵针刺般的疼痛、发烧、反胃、呕吐、腹泻，耳朵还有被塞满东西和有噪音的感觉。通常中耳感染是由感冒或流感引起的。如果疼痛很剧烈，伴有脖颈僵硬和发烧的症状，就要赶紧去医院治疗。


    为了缓解疼痛，把 1 滴丁香精油和 5mL 葡萄籽油混合，在脖颈和耳朵周围按摩。


    如果耳朵感染被认为是咽喉炎引起的，可以在一杯开水中滴入 2 滴茶树精油，用它每两个小时漱 1 次口。


    ## 4. 喉炎

    喉炎，引起咽喉疼痛最常见的原因之一，是一种咽喉或声带感染，声带感染会影响发声。


    ### (1) 症状

    咽喉早期症状是发痒、干咳、嘶哑和疼痛。在更为严重的情况下，人可能会失声，呼吸和吞咽也变得困难。


    ### (2) 饮食调理

    喝一杯加有半个柠檬的汁和蜂蜜的热水，也是一种好的治疗方法。但不要抽烟。


    ### (3) 精油调理

    治疗咽喉疼痛，每天用含有精油的漱口水漱口 5~6 次，漱口水的配制方法，选择下列的任何一种精油，在一杯凉开水中滴 2 滴：白千层、天竺葵、绿花白千层、黑胡椒、迷迭香或茶树精油。


    ## 5. 麦粒肿、睑腺炎

    睑腺炎是位于眼皮边缘的油腺上类似于丘疹的砂眼发展而成的。从外表看，它是个红色发痒的斑点，有疼痛的感觉，它会肿胀形成黄色或粉色的头状物。整个眼皮都会因此变红、发疼，感觉里面有什么东西似的。发生在眼皮内侧的睑腺炎会更疼，把眼皮抬起来能看见黄色的头状物。


    用悬钩子植物叶片泡的凉茶清洗眼睛，可以缓解疼痛。依照下面的方法，在眼睛的患处外敷材料也有用处。


    煮沸 10mL 玫瑰水，当玫瑰水冷下来后，往里添加 1 滴甘菊精油。然后，把它们放在一个容器内，摇晃均匀，用咖啡滤纸过滤混合物，使用过滤后的液体做外敷材料。


    ## 6. 睑炎

    睑炎是眼皮外面边缘发炎，症状有发红、瘙痒和灼烧，有时候觉得眼睛里有东西似的。眼睛会发红和受到刺激，这种症状在早晨更加严重。


    可以用下面的材料外敷，有助于治疗睑炎：1 滴洋甘菊精油、5mL 榛子油，混合，加入到 30mL 玫瑰水中。


    ## 7. 结膜炎

    结膜炎，通常称为红眼病，是眼睛最外层的膜发生了感染。这是一种常见的炎症，一般在 10 天左右就自己痊愈了。症状包括刺激、发红、瘙痒、灼热和流泪，不过，视力不会受到影响。


    细菌或病毒、灰尘、沙子和烟都能引起感染，使眼睛有刺激的感觉，还会加重感染。


    治疗酸疼、发痒的眼睛，可以先把外敷材料蘸上矢车菊、洋甘菊、万寿菊或茴香植物的浸剂，然后覆盖在眼睛上。


    用下列配方制成的制剂做外敷材料，也有助于缓解结膜炎：把 1 滴洋甘菊精油与 5mL 榛子油混合好后加入 30mL 的玫瑰水中，覆盖至少 7 个小时。可以用咖啡过滤纸做外敷材料，盖在闭着的眼皮上。


    ## 8. 口腔溃疡

    口腔溃疡可能是一种轻微的病毒造成的感染，不过一些研究表明，溃疡是由于焦虑或精神压抑造成的。


    ### (1) 症状

    口腔溃疡多发于口腔内侧、舌头上、口腔上侧、嘴唇和脸颊内黏膜上，以及在齿龈和脸颊的凹槽处。它起初有烧灼和刺痛的感觉，稍微有些肿胀。每个溃疡点的中心是白色的，其边缘发炎为红色，摸上去是柔软的感觉。溃疡可能会持续两到
    3 周，能够自愈，而不留伤疤。


    ### (2) 饮食调理

    当患有口腔溃疡时，不要吃酸性或辛辣的食物，因为会使伤口更疼；也不要吃硬的食物，不要喝咖啡、吸烟和饮酒。


    ### (3) 精油调理

    用棉签蘸些纯茶树精油，清洗溃疡处，能够立即减轻疼痛。可以使用漱口水。配方是：在 500mL 温开水中添加 5 克食盐和 2 滴茶树精油。


    还可以使用另一种漱口水，漱口后要把漱口水吐出来，在一杯温开水添加成份如下：2 滴欧薄荷精油、2 滴百里香精油、2 滴柠檬精油、2 滴茶树精油、2 滴天竺葵精油、10mL
    白兰地。


    ## 9. 流鼻血

    在鼻子没有骨折或受到伤害的情况下流鼻血，可以掐住鼻孔，从绵纸上吸入下列精油的混合物：3 滴柠檬精油和 1 滴薰衣草精油。


    使用冰袋也有助于止血。


    在鼻子骨折或受到伤害的情况下流鼻血，不要迟疑，立刻去医院接受治疗。


    ## 10. 脓肿、砂眼

    典型的脓肿发生在毛囊周围，不过我们通常称其为脓疱炎症。发病初期，这个部位的皮肤开始变得红肿，逐渐发展成有疼痛感的突起肿块。虽然，一般情况下脓肿成熟后，就会从皮肤上消失；但是这个过程大约需要两周时间，除了特殊的环境以外。


    做按摩能有助于缓解疼痛，在患处，每天使用两次，精油选择如下：2 滴薰衣草精油、2 滴茶树精油、2 滴甘菊精油。


    ## 11. 牙疼

    牙疼是最厉害的疼痛之一。牙疼时，你感觉到的只有这种疼痛。在棉签上滴 1 滴丁香精油，在牙疼的齿龈周围涂抹，或者塞在疼牙的牙缝里。也可以用按摩油按摩下颚骨和脸颊，配方如下：1
    滴丁香精油、3 滴洋甘菊精油、1 滴柠檬精油，稀释在 5mL 的植物油中。


    ## 12. 咽喉疼痛

    咽喉疼痛或咽炎通常表明咽喉发炎了，它会从口腔后面向食道扩散。常见的咽喉疼痛是由病毒或细菌感染引起的，也可能是扁桃体炎。一般，病毒感染是因感冒或流感引起的，同时有发烧、肌肉疼和流鼻涕的症状。


    细菌性感染通常是由链状球菌引起的。这种咽喉疼痛的典型特点是发病快，疼痛剧烈，还有发烧的症状，如果不使用抗生素即使治疗，细菌有可能扩散到其他器官，造成不可逆转的伤害。扁桃体炎通常是因为扁桃体发炎引起的。


    为了缓解不适，可以使用按摩油按摩颈部和耳朵后面的部位。配方如下：4 滴甘菊精油、1 滴百里香精油、1 滴柠檬精油、1 滴茶树精油，稀释在 5mL 的植物基础油中。


    蒸汽吸入疗法也是有效的，在热水中添加 2 滴尤加利、2 滴薰衣草和 1 滴百里香精油，可以参照我们的蒸汽吸入法网页。记住，要闭着眼睛。用加湿器保持空气的湿润，多饮液体。


    ## 13. 嘴唇开裂

    嘴唇开裂很疼，尤其是当你舔它的时候。


    可以调配一种油，用在开裂的嘴唇上，以缓解疼痛，帮助愈合。它的配方如下：20mL 芦荟精油、1 滴甘菊精油、2 滴天竺葵精油、1 滴橙花精油、2 滴玫瑰精油。


    ## （三）植物精油与心血管系统


    ### 1. 高血压

    高血压如果控制不当，会使心脏受损，对肾脏也是不利的。


    #### (1) 症状

    当心脏输送血液时，动脉壁受到来自外部的过强的冲击力，这就会造成血压上升，也就是高血压症。因为发病初期没有或很少有症状，当出现头疼、头昏眼花、耳鸣和心跳过速时，人们才注意到，此时血压已经很高了。


    #### (2) 饮食调理

    中等强度的高血压是能够控制住的，可以通过调节饮食结构，转变生活方式，戒烟，戒酒和减轻体重等方式。据研究，蒲公英茶或胶囊、生大蒜或大蒜胶囊能降低血压。


    #### (3) 精油调理

    一种芳香疗法式的按摩也是有助于使人放松的，人在放松的状态下，血压会有所降低。适合高血压患者按摩使用的精油：快乐鼠尾草、薰衣草、甜牛至、蜜蜂花、依兰精油。


    高血压患者避免使用的精油：牛膝草、迷迭香、鼠尾草、百里香。


    ### 2. 眩晕

    当大脑失去氧气，即使很短的时间，都会造成眩晕，或暂时失去知觉。这是具有危险征兆的警告信号，还包括视觉模糊、头昏眼花、注意力减弱、出汗或反胃恶心。


    眩晕的病因包括血糖低、循环失调、体力不支、站立时间太长、热、脱水、压力大、中暑、糖尿病、心脏不适、击打、体内出血、惊吓、焦虑、由于受伤和贫血引起的剧痛。


    使患者平躺，解开所有过紧处的衣服，把脚抬高，超过头顶。使用薰衣草、迷迭香或欧薄荷精油，涂抹在病人的鼻子下面，吸入。当病人恢复知觉以后，喝一杯热水，里面加半滴柠檬精油和
    1 茶匙蜂蜜。


    ### 3. 静脉曲张

    静脉曲张可能发生在身体的各种部位，但是主要在腿部。如果血流不通，血就会滞留在静脉处，这个部位就会肿胀和扭曲，形状类似于绳索，这样是很不舒服和疼痛的。


    为了缓解症状，每天用下列配方的按摩油，轻轻地按摩腿部，从脚按摩到心脏的位置。


    20mL 甜杏仁油、2 滴小麦胚芽油、4 滴薰衣草精油、4 滴丝柏精油。


    ### 4. 心悸

    这是一个常用术语，用来描述心脏无规律跳动时的感觉，也有心脏间歇跳动或加快跳动的现象。在更年期或运动后，这是一种常见的现象；但是，它也可能是心脏失调潜在的症状。


    不要喝茶、咖啡、可乐饮料以及带酒精的饮料也不要吃巧克力。


    当发病时，把手和胳膊肘以下的部位放入冷水中，至少 10 秒钟，有利于缓和病情；同时，你可以往手掌上滴 2 滴纯薰衣草精油，双手边撮边吸气。


    服用一些有镇静作用的汤药，如洋甘菊、柑橘叶、酸柠檬、罗勒和蜜蜂花植物。


    ### 5. 休克

    休克是一种与生命危险的紧急症状，因为血压低的缘故，到达重要器官的血液含氧量都不充足。当血压降低的时候，作为一种补偿机制，血液会从皮肤和肌肉通过不同的路线输送给更重要的器官，如心脏、肺部和大脑。这就是为什么皮肤会变得苍白、发凉和出冷汗，人也感到虚弱的原因。


    虽然虚弱，但是由于心脏和肺部还要维持功能，这样脉搏跳动就会加快，呼吸速率也会加快，此时的人会感到呼吸急促，或许会表现得极端焦虑和不安宁。这种状况如果拖延下去，能导致重要的器官受伤，也可能死亡。


    休克的病人要平躺着，用毯子或外套保暖，然后进行治疗或等待医生。不过，在晚上的时候，你也可以用些按摩油，按摩整个身体，对休克是有帮助的。参考配方如下：3 滴柠檬精油、2
    滴天竺葵精油、2 滴薰衣草精油、1 滴德国甘菊精油、1 滴酸柠檬叶精油，与 20mL 基础油混合。


    ### 6. 循环问题

    不良循环的症状包括疲劳、头昏眼花、难以集中注意力、容易昏晕、手脚发凉、头疼、眩晕、身体麻痹、动脉硬化、咽喉疼痛、高血压、糖尿病、皮肤不健康。这些都是不良循环问题的信号。


    循环系统的健康主要依赖心脏和血管的健康。有些精油能够促进血液循环，按摩患处，能够改善不良循环。


    使用如下配方制成按摩油：2 滴丝柏精油、2 滴橙花精油、2 滴柠檬精油、2 滴天竺葵精油，加入 15mL 的基础油中。


    避免喝茶和咖啡，可以服用欧芹和鼠尾草煎的汤药。


    ## （四）植物精油与神经系统


    神经系统是身体的联络网，能察觉体内、体外环境的变化，并将信息加以整合，然后协调肌肉的收缩及腺体的分泌。整个神经系统的控制中枢控制我们的身体功能，如消化、呼吸，也控制意识功能如心智、思考、情绪等。


    远古时代，人们用香草植物驱除造成人体精神失调的恶灵，药草学家也经常用香草植物来治疗神经系统的一些症状，如头痛、眩晕、疲倦等。近代，大量科学研究表明：植物精油对神经系统有着积极的疗效，它安全、天然的特性对人体无任何副作用。植物精油的药理作用在于，透过皮肤吸收，引起反应，主要是通过镇定或安抚神经系统，达到止痛、扩张血管、镇痉挛的效果。对于神经系统症状的治疗，可通过按摩、泡澡等方式来进行。


    ### 1. 成瘾

    成瘾是一种身体或心理对习惯性物质或化学成份的渴望或需要。多数麻醉品，甚至一些任务，都能成瘾，如训练、工作、吃东西或饮料。成瘾也跟营养匮乏有关，身体依赖型。


    ### 2. 神经痛

    神经痛，是当神经受到刺激或压迫时，产生的一种痛苦的感觉。病因可以因带状疱疹感染引起，也可以是由骨折产生的碎片压迫神经引起的。


    单纯的感冒也可以引起面部的神经痛，甚至头疼、牙疼或窦炎。如果某根神经或某类神经易受攻击，那么一有感冒就会引起那个部位的发病。


    一种按摩油有助于缓解神经痛，可以在患处用此油按摩。推荐的复方油配方：10mL 葡萄籽油、3 滴洋甘菊精油、3 滴黑胡椒精油、1 滴丁香精油、3 滴薰衣草精油。


    ### 3. 失眠

    失眠是指人不能入睡。它一般是由精神压力过大或焦虑造成的，也有身体本身的原因，如经期前紧张或是正处于更年期。常见的这些失眠原因可以容易被治愈。缺乏锻炼和过量饮酒或吸烟都是导致失眠的因素。


    薰衣草是一种温和的精油，可以帮助放松和入眠，也被推荐用于缓解精神和身体的疲劳。


    在你睡觉的床边放一些干的薰衣草，或是在你睡觉前半时洗盆浴的时候，往浴盆中添加几滴薰衣草或橙花精油。


    用复方精油做放松式的按摩，对于治疗失眠也是有好处，精油可以选择薰衣草、鼠尾草、苦橙叶、檀香或依兰。


    ### 4. 时差反应

    长途飞行以后会有时差反应，它的症状包括疲劳、睡眠混乱、反胃恶心和四肢疼痛或肿胀，尤其是脚。跨越几个时间区域后，你身体内大约 50 种生理和心理的规律被明显地打破了。在密封的加压飞机内一次呆数个小时，以及飞行的高度都会造成一些问题。在飞行中，要穿舒适、宽松的衣服，尽量抬高双脚，防止脚踝骨肿胀，经常在走廊行走，防止循环不畅。


    在飞行途中，你可以用按摩油按摩你的脚，并做些锻炼。按摩油的配制方法：在少量的基础油中添加 1 滴罗勒、天竺葵或葡萄柚精油。


    到达目的地后，你想提神，可以在手掌上滴 10 滴薰衣草精油，擦在躯干上，马上淋浴。


    当你经过飞行后，泡一个热水澡，添加下列的精油，有助于使你的身体和大脑恢复过来：2 滴欧薄荷精油、1 滴迷迭香精油、1 滴佛手柑精油、2 滴橙花精油、1 滴天竺葵精油。


    ### 5. 头疼

    头疼是发生在头部的某种疼痛，这种不舒适感变化强烈。引起头疼的原因可能是紧张、压力大、疲劳、穴位闭塞、敏感或刺激，以及头皮血管的受感染。


    酒精和香烟的过量使用，对药物的不良反应，在月经与季节变化前或期间，都有可能引发头疼。


    治疗头疼，可以选用下列配方：3 滴薰衣草精油、1 滴椒样薄荷精油、1 滴香柠檬精油、3 滴荷荷芭精油。


    可以用这种复方精油，按摩大脑底部或在太阳穴周围按摩。


    对于因紧张或神经原因引起的头疼，也可以使用上述的按摩方法。精油选择如下：3 滴薰衣草精油、1 滴鼠尾草精油、1 滴甘菊精油、2 滴荷荷芭精油。


    ### 6. 腿抽筋

    抽筋是肌肉或肌肉群突然无意的收缩，可产生剧烈的疼痛。贫血妇女容易在睡觉期间，常常会因为腿部供血不足，小腿或足部发生抽筋。如果发生频繁，就要去医院进行咨询。


    使劲地刮擦抽筋的腿部，直到抽筋的症状缓解，使用按下面配方制成的按摩油按摩：5mL 月见草油、3 滴洋甘菊精油。


    尽可能地弯曲膝盖也可以缓和抽筋。


    ## （五）植物精油与呼吸系统

    对芳香疗法来说，了解呼吸系统很重要，植物精油进入人体的另一个途径就是透过呼吸（皮肤吸收是另一主要方法）。大气中的含氧空气，必须在鼻腔加温、潮湿后，才送到肺部，在肺泡的上皮组织及微血管，进行氧与
    CO₂的交换，将新鲜的氧气送到组织细胞利用，同时将 CO₂排出体外。我们吸入的精油分子也是透过这种原理（气体交换）进入血液循环的。


    在呼吸系统中，植物精油通常发挥的是抗菌、抗痉挛以及祛痰等功效。1946 年，两位加拿大学者在实验中发现精油祛痰的作用是属于直接性的而非神经性的。其后的研究也证实了只需要非常小的剂量，尤加利、柠檬等精油通过蒸汽吸入的方式便具有促进肺活量和祛痰的功效。呼吸系统问题的治疗，可以通过蒸汽吸入、针对胸腔及颈椎的脊椎按摩或者直接在患处按敷来进行。


    ### 1. 肺炎

    肺炎是由细菌或病毒引起的，它们经过上呼吸道进入肺部。肺部微小的气囊就会发炎，并充满黏液。像支气管炎类的感染也能引起肺炎。


    肺炎的症状多种多样，可能轻微，也可能严重，包括胸腔剧烈的疼痛、打寒战和发烧、呼吸急促、吐血和持续干咳。它能成为非常严重的疾病，尤其对于幼龄儿童和老人。这时，应该到医院接受治疗。


    要大量饮水，可以服用由尤加利、牛至或百里香煎的汤药。煮沸 1 分钟，浸泡 5 ~7 分钟，添蜂蜜服用。


    可以使用蒸汽吸入法，适用精油为松树或丝柏。


    不要到户外，使环境保持温暖和干燥，避免接触烟味和酒精。


    ### 2. 感冒和流感

    感冒对不同人群的影响也不相同，然而压力大和身体虚弱的人群更容易患有感冒和流感。


    #### (1) 症状

    感冒的症状是鼻塞、流鼻涕、打喷嚏、咽喉疼和经常性的干咳。结果是脖颈处的淋巴结肿大，不过手感是柔软的。如果头部的感冒症状持续时间较长，就应该检查是否有过敏反应。


    流感比感冒要严重些，但是症状表现相似。流感会引起高烧，打寒战，有全身无力的感觉，甚至全身疼痛，包括头痛、后背痛和肌肉痛。


    流感还会引起反胃和呕吐。


    流感病毒比感冒病毒更厉害，传染性和危害性更强，但是两者的潜伏期都比较短。它们都有很高的传染性，传播途径有打喷嚏、咳嗽或接吻。身体的免疫系统能轻易地抵抗多数感冒和流感病毒，不过，压力过大和虚弱的身体很容易使感冒和流感再次发作。


    #### (2) 饮食调理

    为了加强免疫系统的功能，饮食要健康，要有规律地锻炼身体，可以多饮用柠檬汁和薄荷汤药。当患感冒时，要饮用大量的水。


    #### (3) 精油调理

    在办公场所预防感冒，把下列精油混合在 500mL 水中，装入喷雾器中，把水和油混匀，喷洒在办公室里：1 滴肉桂精油、1 滴丁香精油、1 滴尤加利精油、1 滴绿花白千层精油、1
    滴松树精油。


    当你感到你要得流感的时候，洗个热水盆浴，在浴盆中添加一些精油，有助于改善身体的状况。当你往浴盆里放水的时候，添加下面的精油：4 滴茶树精油、3 滴薰衣草精油、1
    滴柠檬精油。


    盆浴以后，你还需用些按摩油，配方如下：10mL 月见草油、3 滴茶树精油、2 滴尤加利精油。


    可以把以下精油放在吸入器或稀释在盆浴使用，也可以擦在胸前（混合后，稀释在合适的基础油中），或喷洒在手帕上，缓解因感冒引起的鼻塞：白千层、丁香、尤加利、绿花白千层和松树精油。


    用精油熏蒸房间有助于缓解症状的发生，适用精油包括丁香、薰衣草和松树精油。


    ### 3. 呼吸困难

    呼吸问题的 3 个共同的特点是呼吸疼痛、气短和喘息。呼吸疼痛是肺部、肌肉或骨骼严重失调的一种症状。如果排除胸腔受损和肺炎的可能性，最可能的病因就是纤维组织发炎了。


    上了年纪和不适都是气短的原因，可以用下列配方制作一种按摩油擦在胸部和后背：5 滴肉豆蔻精油、2 滴肉桂精油、10 滴尤加利精油、10 滴生姜精油、3 滴迷迭香精油，稀释在
    30mL 的植物基础油中。


    这一症状的致病原因有很多，不过，改变生活方式是最好的选择。有噪音的呼吸可能是急性的或慢性的疾病，会不断加重的。它有可能是感冒引起的，但是有时候存在更严重致病原因，比如呼吸道阻塞、哮喘、支气管炎或受到某种病毒的感染。


    在病情严重的时候，要休息，可以使用蒸汽吸入法治疗，加入 4 滴尤加利或牛膝草精油。


    支气管炎可以用下面配方制成的复方精油，按摩胸部、脖颈和后背：15 滴尤加利精油、10 滴迷迭香精油、5 滴牛膝草精油，稀释在 30mL 的植物基础油中。


    ### 4. 咳嗽

    咳嗽是身体对呼吸系统发炎的一种反应，炎症可能存在于咽喉、肺部或支气管。咳嗽有多种形式，根据咳嗽的特点可以对潜在的疾病进行诊断。咳嗽有助于从呼吸道排除黏液、细菌或其他的刺激物。通常，咳嗽是病毒或细菌感染的信号，如患感冒。也可能是呼吸系统的感染，如发喘嗝声的咳嗽或是得了肺炎。


    灰尘、吸烟或空气污染都可能是咳嗽的刺激源。不明原因的持续咳嗽通常有可能是由更严重的疾病引起的，如癌症或肺结核。


    饮用玫瑰花瓣水，它是最有效的制剂之一。它可以作用于黏液和缓解咳嗽。还可以喝一些汤药，材料主要是化痰的，如薰衣草、蜜蜂花、薄荷、玫瑰水或百里香。采用蒸汽吸入法，吸入桉树精油，或在枕头旁边放置树叶、花瓣水，可以避免在半夜因为咳嗽翻来覆去。'
  mdcn: '## 咽部护理

    如果没有好转，请向牙医咨询。


    ## 2. 鼻窦炎

    鼻窦是一种细菌感染，主要在眼睛和鼻子周围骨骼上的凹处发生一处或多处的炎症。引起窦炎的病因可以是感冒、流感、扁桃腺炎、敏感症或是口腔不卫生。症状包括鼻音、流鼻血、疲劳、头疼、耳朵感染、眼周围疼痛、轻微的发烧或咳嗽。


    使用蒸汽吸入法可以缓解疼痛，蒸汽中加入 2 滴迷迭香精油、2 滴欧薄荷精油、1 滴百里香精油、1 滴尤加利精油。吸完蒸汽后，在 10mL 合适的基础油中添加下面的精油制成按摩油：2
    滴尤加利精油、2 滴欧薄荷精油、3 滴迷迭香精油、3 滴天竺葵精油、1 滴茶树精油。用这种混合油按摩鼻子、耳朵的前后、前额、颧骨、鼻子和脖子。


    ## 3. 耳朵感染或耳朵疼

    耳朵疼一般是由中耳感染引起的。


    症状包括一只或两只耳朵针刺般的疼痛、发烧、反胃、呕吐、腹泻，耳朵还有被塞满东西和有噪音的感觉。通常中耳感染是由感冒或流感引起的。如果疼痛很剧烈，伴有脖颈僵硬和发烧的症状，就要赶紧去医院治疗。


    为了缓解疼痛，把 1 滴丁香精油和 5mL 葡萄籽油混合，在脖颈和耳朵周围按摩。


    如果耳朵感染被认为是咽喉炎引起的，可以在一杯开水中滴入 2 滴茶树精油，用它每两个小时漱 1 次口。


    ## 4. 喉炎

    喉炎，引起咽喉疼痛最常见的原因之一，是一种咽喉或声带感染，声带感染会影响发声。


    ### (1) 症状

    咽喉早期症状是发痒、干咳、嘶哑和疼痛。在更为严重的情况下，人可能会失声，呼吸和吞咽也变得困难。


    ### (2) 饮食调理

    喝一杯加有半个柠檬的汁和蜂蜜的热水，也是一种好的治疗方法。但不要抽烟。


    ### (3) 精油调理

    治疗咽喉疼痛，每天用含有精油的漱口水漱口 5~6 次，漱口水的配制方法，选择下列的任何一种精油，在一杯凉开水中滴 2 滴：白千层、天竺葵、绿花白千层、黑胡椒、迷迭香或茶树精油。


    ## 5. 麦粒肿、睑腺炎

    睑腺炎是位于眼皮边缘的油腺上类似于丘疹的砂眼发展而成的。从外表看，它是个红色发痒的斑点，有疼痛的感觉，它会肿胀形成黄色或粉色的头状物。整个眼皮都会因此变红、发疼，感觉里面有什么东西似的。发生在眼皮内侧的睑腺炎会更疼，把眼皮抬起来能看见黄色的头状物。


    用悬钩子植物叶片泡的凉茶清洗眼睛，可以缓解疼痛。依照下面的方法，在眼睛的患处外敷材料也有用处。


    煮沸 10mL 玫瑰水，当玫瑰水冷下来后，往里添加 1 滴甘菊精油。然后，把它们放在一个容器内，摇晃均匀，用咖啡滤纸过滤混合物，使用过滤后的液体做外敷材料。


    ## 6. 睑炎

    睑炎是眼皮外面边缘发炎，症状有发红、瘙痒和灼烧，有时候觉得眼睛里有东西似的。眼睛会发红和受到刺激，这种症状在早晨更加严重。


    可以用下面的材料外敷，有助于治疗睑炎：1 滴洋甘菊精油、5mL 榛子油，混合，加入到 30mL 玫瑰水中。


    ## 7. 结膜炎

    结膜炎，通常称为红眼病，是眼睛最外层的膜发生了感染。这是一种常见的炎症，一般在 10 天左右就自己痊愈了。症状包括刺激、发红、瘙痒、灼热和流泪，不过，视力不会受到影响。


    细菌或病毒、灰尘、沙子和烟都能引起感染，使眼睛有刺激的感觉，还会加重感染。


    治疗酸疼、发痒的眼睛，可以先把外敷材料蘸上矢车菊、洋甘菊、万寿菊或茴香植物的浸剂，然后覆盖在眼睛上。


    用下列配方制成的制剂做外敷材料，也有助于缓解结膜炎：把 1 滴洋甘菊精油与 5mL 榛子油混合好后加入 30mL 的玫瑰水中，覆盖至少 7 个小时。可以用咖啡过滤纸做外敷材料，盖在闭着的眼皮上。


    ## 8. 口腔溃疡

    口腔溃疡可能是一种轻微的病毒造成的感染，不过一些研究表明，溃疡是由于焦虑或精神压抑造成的。


    ### (1) 症状

    口腔溃疡多发于口腔内侧、舌头上、口腔上侧、嘴唇和脸颊内黏膜上，以及在齿龈和脸颊的凹槽处。它起初有烧灼和刺痛的感觉，稍微有些肿胀。每个溃疡点的中心是白色的，其边缘发炎为红色，摸上去是柔软的感觉。溃疡可能会持续两到
    3 周，能够自愈，而不留伤疤。


    ### (2) 饮食调理

    当患有口腔溃疡时，不要吃酸性或辛辣的食物，因为会使伤口更疼；也不要吃硬的食物，不要喝咖啡、吸烟和饮酒。


    ### (3) 精油调理

    用棉签蘸些纯茶树精油，清洗溃疡处，能够立即减轻疼痛。可以使用漱口水。配方是：在 500mL 温开水中添加 5 克食盐和 2 滴茶树精油。


    还可以使用另一种漱口水，漱口后要把漱口水吐出来，在一杯温开水添加成份如下：2 滴欧薄荷精油、2 滴百里香精油、2 滴柠檬精油、2 滴茶树精油、2 滴天竺葵精油、10mL
    白兰地。


    ## 9. 流鼻血

    在鼻子没有骨折或受到伤害的情况下流鼻血，可以掐住鼻孔，从绵纸上吸入下列精油的混合物：3 滴柠檬精油和 1 滴薰衣草精油。


    使用冰袋也有助于止血。


    在鼻子骨折或受到伤害的情况下流鼻血，不要迟疑，立刻去医院接受治疗。


    ## 10. 脓肿、砂眼

    典型的脓肿发生在毛囊周围，不过我们通常称其为脓疱炎症。发病初期，这个部位的皮肤开始变得红肿，逐渐发展成有疼痛感的突起肿块。虽然，一般情况下脓肿成熟后，就会从皮肤上消失；但是这个过程大约需要两周时间，除了特殊的环境以外。


    做按摩能有助于缓解疼痛，在患处，每天使用两次，精油选择如下：2 滴薰衣草精油、2 滴茶树精油、2 滴甘菊精油。


    ## 11. 牙疼

    牙疼是最厉害的疼痛之一。牙疼时，你感觉到的只有这种疼痛。在棉签上滴 1 滴丁香精油，在牙疼的齿龈周围涂抹，或者塞在疼牙的牙缝里。也可以用按摩油按摩下颚骨和脸颊，配方如下：1
    滴丁香精油、3 滴洋甘菊精油、1 滴柠檬精油，稀释在 5mL 的植物油中。


    ## 12. 咽喉疼痛

    咽喉疼痛或咽炎通常表明咽喉发炎了，它会从口腔后面向食道扩散。常见的咽喉疼痛是由病毒或细菌感染引起的，也可能是扁桃体炎。一般，病毒感染是因感冒或流感引起的，同时有发烧、肌肉疼和流鼻涕的症状。


    细菌性感染通常是由链状球菌引起的。这种咽喉疼痛的典型特点是发病快，疼痛剧烈，还有发烧的症状，如果不使用抗生素即使治疗，细菌有可能扩散到其他器官，造成不可逆转的伤害。扁桃体炎通常是因为扁桃体发炎引起的。


    为了缓解不适，可以使用按摩油按摩颈部和耳朵后面的部位。配方如下：4 滴甘菊精油、1 滴百里香精油、1 滴柠檬精油、1 滴茶树精油，稀释在 5mL 的植物基础油中。


    蒸汽吸入疗法也是有效的，在热水中添加 2 滴尤加利、2 滴薰衣草和 1 滴百里香精油，可以参照我们的蒸汽吸入法网页。记住，要闭着眼睛。用加湿器保持空气的湿润，多饮液体。


    ## 13. 嘴唇开裂

    嘴唇开裂很疼，尤其是当你舔它的时候。


    可以调配一种油，用在开裂的嘴唇上，以缓解疼痛，帮助愈合。它的配方如下：20mL 芦荟精油、1 滴甘菊精油、2 滴天竺葵精油、1 滴橙花精油、2 滴玫瑰精油。


    ## （三）植物精油与心血管系统


    ### 1. 高血压

    高血压如果控制不当，会使心脏受损，对肾脏也是不利的。


    #### (1) 症状

    当心脏输送血液时，动脉壁受到来自外部的过强的冲击力，这就会造成血压上升，也就是高血压症。因为发病初期没有或很少有症状，当出现头疼、头昏眼花、耳鸣和心跳过速时，人们才注意到，此时血压已经很高了。


    #### (2) 饮食调理

    中等强度的高血压是能够控制住的，可以通过调节饮食结构，转变生活方式，戒烟，戒酒和减轻体重等方式。据研究，蒲公英茶或胶囊、生大蒜或大蒜胶囊能降低血压。


    #### (3) 精油调理

    一种芳香疗法式的按摩也是有助于使人放松的，人在放松的状态下，血压会有所降低。适合高血压患者按摩使用的精油：快乐鼠尾草、薰衣草、甜牛至、蜜蜂花、依兰精油。


    高血压患者避免使用的精油：牛膝草、迷迭香、鼠尾草、百里香。


    ### 2. 眩晕

    当大脑失去氧气，即使很短的时间，都会造成眩晕，或暂时失去知觉。这是具有危险征兆的警告信号，还包括视觉模糊、头昏眼花、注意力减弱、出汗或反胃恶心。


    眩晕的病因包括血糖低、循环失调、体力不支、站立时间太长、热、脱水、压力大、中暑、糖尿病、心脏不适、击打、体内出血、惊吓、焦虑、由于受伤和贫血引起的剧痛。


    使患者平躺，解开所有过紧处的衣服，把脚抬高，超过头顶。使用薰衣草、迷迭香或欧薄荷精油，涂抹在病人的鼻子下面，吸入。当病人恢复知觉以后，喝一杯热水，里面加半滴柠檬精油和
    1 茶匙蜂蜜。


    ### 3. 静脉曲张

    静脉曲张可能发生在身体的各种部位，但是主要在腿部。如果血流不通，血就会滞留在静脉处，这个部位就会肿胀和扭曲，形状类似于绳索，这样是很不舒服和疼痛的。


    为了缓解症状，每天用下列配方的按摩油，轻轻地按摩腿部，从脚按摩到心脏的位置。


    20mL 甜杏仁油、2 滴小麦胚芽油、4 滴薰衣草精油、4 滴丝柏精油。


    ### 4. 心悸

    这是一个常用术语，用来描述心脏无规律跳动时的感觉，也有心脏间歇跳动或加快跳动的现象。在更年期或运动后，这是一种常见的现象；但是，它也可能是心脏失调潜在的症状。


    不要喝茶、咖啡、可乐饮料以及带酒精的饮料也不要吃巧克力。


    当发病时，把手和胳膊肘以下的部位放入冷水中，至少 10 秒钟，有利于缓和病情；同时，你可以往手掌上滴 2 滴纯薰衣草精油，双手边撮边吸气。


    服用一些有镇静作用的汤药，如洋甘菊、柑橘叶、酸柠檬、罗勒和蜜蜂花植物。


    ### 5. 休克

    休克是一种与生命危险的紧急症状，因为血压低的缘故，到达重要器官的血液含氧量都不充足。当血压降低的时候，作为一种补偿机制，血液会从皮肤和肌肉通过不同的路线输送给更重要的器官，如心脏、肺部和大脑。这就是为什么皮肤会变得苍白、发凉和出冷汗，人也感到虚弱的原因。


    虽然虚弱，但是由于心脏和肺部还要维持功能，这样脉搏跳动就会加快，呼吸速率也会加快，此时的人会感到呼吸急促，或许会表现得极端焦虑和不安宁。这种状况如果拖延下去，能导致重要的器官受伤，也可能死亡。


    休克的病人要平躺着，用毯子或外套保暖，然后进行治疗或等待医生。不过，在晚上的时候，你也可以用些按摩油，按摩整个身体，对休克是有帮助的。参考配方如下：3 滴柠檬精油、2
    滴天竺葵精油、2 滴薰衣草精油、1 滴德国甘菊精油、1 滴酸柠檬叶精油，与 20mL 基础油混合。


    ### 6. 循环问题

    不良循环的症状包括疲劳、头昏眼花、难以集中注意力、容易昏晕、手脚发凉、头疼、眩晕、身体麻痹、动脉硬化、咽喉疼痛、高血压、糖尿病、皮肤不健康。这些都是不良循环问题的信号。


    循环系统的健康主要依赖心脏和血管的健康。有些精油能够促进血液循环，按摩患处，能够改善不良循环。


    使用如下配方制成按摩油：2 滴丝柏精油、2 滴橙花精油、2 滴柠檬精油、2 滴天竺葵精油，加入 15mL 的基础油中。


    避免喝茶和咖啡，可以服用欧芹和鼠尾草煎的汤药。


    ## （四）植物精油与神经系统


    神经系统是身体的联络网，能察觉体内、体外环境的变化，并将信息加以整合，然后协调肌肉的收缩及腺体的分泌。整个神经系统的控制中枢控制我们的身体功能，如消化、呼吸，也控制意识功能如心智、思考、情绪等。


    远古时代，人们用香草植物驱除造成人体精神失调的恶灵，药草学家也经常用香草植物来治疗神经系统的一些症状，如头痛、眩晕、疲倦等。近代，大量科学研究表明：植物精油对神经系统有着积极的疗效，它安全、天然的特性对人体无任何副作用。植物精油的药理作用在于，透过皮肤吸收，引起反应，主要是通过镇定或安抚神经系统，达到止痛、扩张血管、镇痉挛的效果。对于神经系统症状的治疗，可通过按摩、泡澡等方式来进行。


    ### 1. 成瘾

    成瘾是一种身体或心理对习惯性物质或化学成份的渴望或需要。多数麻醉品，甚至一些任务，都能成瘾，如训练、工作、吃东西或饮料。成瘾也跟营养匮乏有关，身体依赖型。


    ### 2. 神经痛

    神经痛，是当神经受到刺激或压迫时，产生的一种痛苦的感觉。病因可以因带状疱疹感染引起，也可以是由骨折产生的碎片压迫神经引起的。


    单纯的感冒也可以引起面部的神经痛，甚至头疼、牙疼或窦炎。如果某根神经或某类神经易受攻击，那么一有感冒就会引起那个部位的发病。


    一种按摩油有助于缓解神经痛，可以在患处用此油按摩。推荐的复方油配方：10mL 葡萄籽油、3 滴洋甘菊精油、3 滴黑胡椒精油、1 滴丁香精油、3 滴薰衣草精油。


    ### 3. 失眠

    失眠是指人不能入睡。它一般是由精神压力过大或焦虑造成的，也有身体本身的原因，如经期前紧张或是正处于更年期。常见的这些失眠原因可以容易被治愈。缺乏锻炼和过量饮酒或吸烟都是导致失眠的因素。


    薰衣草是一种温和的精油，可以帮助放松和入眠，也被推荐用于缓解精神和身体的疲劳。


    在你睡觉的床边放一些干的薰衣草，或是在你睡觉前半时洗盆浴的时候，往浴盆中添加几滴薰衣草或橙花精油。


    用复方精油做放松式的按摩，对于治疗失眠也是有好处，精油可以选择薰衣草、鼠尾草、苦橙叶、檀香或依兰。


    ### 4. 时差反应

    长途飞行以后会有时差反应，它的症状包括疲劳、睡眠混乱、反胃恶心和四肢疼痛或肿胀，尤其是脚。跨越几个时间区域后，你身体内大约 50 种生理和心理的规律被明显地打破了。在密封的加压飞机内一次呆数个小时，以及飞行的高度都会造成一些问题。在飞行中，要穿舒适、宽松的衣服，尽量抬高双脚，防止脚踝骨肿胀，经常在走廊行走，防止循环不畅。


    在飞行途中，你可以用按摩油按摩你的脚，并做些锻炼。按摩油的配制方法：在少量的基础油中添加 1 滴罗勒、天竺葵或葡萄柚精油。


    到达目的地后，你想提神，可以在手掌上滴 10 滴薰衣草精油，擦在躯干上，马上淋浴。


    当你经过飞行后，泡一个热水澡，添加下列的精油，有助于使你的身体和大脑恢复过来：2 滴欧薄荷精油、1 滴迷迭香精油、1 滴佛手柑精油、2 滴橙花精油、1 滴天竺葵精油。


    ### 5. 头疼

    头疼是发生在头部的某种疼痛，这种不舒适感变化强烈。引起头疼的原因可能是紧张、压力大、疲劳、穴位闭塞、敏感或刺激，以及头皮血管的受感染。


    酒精和香烟的过量使用，对药物的不良反应，在月经与季节变化前或期间，都有可能引发头疼。


    治疗头疼，可以选用下列配方：3 滴薰衣草精油、1 滴椒样薄荷精油、1 滴香柠檬精油、3 滴荷荷芭精油。


    可以用这种复方精油，按摩大脑底部或在太阳穴周围按摩。


    对于因紧张或神经原因引起的头疼，也可以使用上述的按摩方法。精油选择如下：3 滴薰衣草精油、1 滴鼠尾草精油、1 滴甘菊精油、2 滴荷荷芭精油。


    ### 6. 腿抽筋

    抽筋是肌肉或肌肉群突然无意的收缩，可产生剧烈的疼痛。贫血妇女容易在睡觉期间，常常会因为腿部供血不足，小腿或足部发生抽筋。如果发生频繁，就要去医院进行咨询。


    使劲地刮擦抽筋的腿部，直到抽筋的症状缓解，使用按下面配方制成的按摩油按摩：5mL 月见草油、3 滴洋甘菊精油。


    尽可能地弯曲膝盖也可以缓和抽筋。


    ## （五）植物精油与呼吸系统

    对芳香疗法来说，了解呼吸系统很重要，植物精油进入人体的另一个途径就是透过呼吸（皮肤吸收是另一主要方法）。大气中的含氧空气，必须在鼻腔加温、潮湿后，才送到肺部，在肺泡的上皮组织及微血管，进行氧与
    CO₂的交换，将新鲜的氧气送到组织细胞利用，同时将 CO₂排出体外。我们吸入的精油分子也是透过这种原理（气体交换）进入血液循环的。


    在呼吸系统中，植物精油通常发挥的是抗菌、抗痉挛以及祛痰等功效。1946 年，两位加拿大学者在实验中发现精油祛痰的作用是属于直接性的而非神经性的。其后的研究也证实了只需要非常小的剂量，尤加利、柠檬等精油通过蒸汽吸入的方式便具有促进肺活量和祛痰的功效。呼吸系统问题的治疗，可以通过蒸汽吸入、针对胸腔及颈椎的脊椎按摩或者直接在患处按敷来进行。


    ### 1. 肺炎

    肺炎是由细菌或病毒引起的，它们经过上呼吸道进入肺部。肺部微小的气囊就会发炎，并充满黏液。像支气管炎类的感染也能引起肺炎。


    肺炎的症状多种多样，可能轻微，也可能严重，包括胸腔剧烈的疼痛、打寒战和发烧、呼吸急促、吐血和持续干咳。它能成为非常严重的疾病，尤其对于幼龄儿童和老人。这时，应该到医院接受治疗。


    要大量饮水，可以服用由尤加利、牛至或百里香煎的汤药。煮沸 1 分钟，浸泡 5 ~7 分钟，添蜂蜜服用。


    可以使用蒸汽吸入法，适用精油为松树或丝柏。


    不要到户外，使环境保持温暖和干燥，避免接触烟味和酒精。


    ### 2. 感冒和流感

    感冒对不同人群的影响也不相同，然而压力大和身体虚弱的人群更容易患有感冒和流感。


    #### (1) 症状

    感冒的症状是鼻塞、流鼻涕、打喷嚏、咽喉疼和经常性的干咳。结果是脖颈处的淋巴结肿大，不过手感是柔软的。如果头部的感冒症状持续时间较长，就应该检查是否有过敏反应。


    流感比感冒要严重些，但是症状表现相似。流感会引起高烧，打寒战，有全身无力的感觉，甚至全身疼痛，包括头痛、后背痛和肌肉痛。


    流感还会引起反胃和呕吐。


    流感病毒比感冒病毒更厉害，传染性和危害性更强，但是两者的潜伏期都比较短。它们都有很高的传染性，传播途径有打喷嚏、咳嗽或接吻。身体的免疫系统能轻易地抵抗多数感冒和流感病毒，不过，压力过大和虚弱的身体很容易使感冒和流感再次发作。


    #### (2) 饮食调理

    为了加强免疫系统的功能，饮食要健康，要有规律地锻炼身体，可以多饮用柠檬汁和薄荷汤药。当患感冒时，要饮用大量的水。


    #### (3) 精油调理

    在办公场所预防感冒，把下列精油混合在 500mL 水中，装入喷雾器中，把水和油混匀，喷洒在办公室里：1 滴肉桂精油、1 滴丁香精油、1 滴尤加利精油、1 滴绿花白千层精油、1
    滴松树精油。


    当你感到你要得流感的时候，洗个热水盆浴，在浴盆中添加一些精油，有助于改善身体的状况。当你往浴盆里放水的时候，添加下面的精油：4 滴茶树精油、3 滴薰衣草精油、1
    滴柠檬精油。


    盆浴以后，你还需用些按摩油，配方如下：10mL 月见草油、3 滴茶树精油、2 滴尤加利精油。


    可以把以下精油放在吸入器或稀释在盆浴使用，也可以擦在胸前（混合后，稀释在合适的基础油中），或喷洒在手帕上，缓解因感冒引起的鼻塞：白千层、丁香、尤加利、绿花白千层和松树精油。


    用精油熏蒸房间有助于缓解症状的发生，适用精油包括丁香、薰衣草和松树精油。


    ### 3. 呼吸困难

    呼吸问题的 3 个共同的特点是呼吸疼痛、气短和喘息。呼吸疼痛是肺部、肌肉或骨骼严重失调的一种症状。如果排除胸腔受损和肺炎的可能性，最可能的病因就是纤维组织发炎了。


    上了年纪和不适都是气短的原因，可以用下列配方制作一种按摩油擦在胸部和后背：5 滴肉豆蔻精油、2 滴肉桂精油、10 滴尤加利精油、10 滴生姜精油、3 滴迷迭香精油，稀释在
    30mL 的植物基础油中。


    这一症状的致病原因有很多，不过，改变生活方式是最好的选择。有噪音的呼吸可能是急性的或慢性的疾病，会不断加重的。它有可能是感冒引起的，但是有时候存在更严重致病原因，比如呼吸道阻塞、哮喘、支气管炎或受到某种病毒的感染。


    在病情严重的时候，要休息，可以使用蒸汽吸入法治疗，加入 4 滴尤加利或牛膝草精油。


    支气管炎可以用下面配方制成的复方精油，按摩胸部、脖颈和后背：15 滴尤加利精油、10 滴迷迭香精油、5 滴牛膝草精油，稀释在 30mL 的植物基础油中。


    ### 4. 咳嗽

    咳嗽是身体对呼吸系统发炎的一种反应，炎症可能存在于咽喉、肺部或支气管。咳嗽有多种形式，根据咳嗽的特点可以对潜在的疾病进行诊断。咳嗽有助于从呼吸道排除黏液、细菌或其他的刺激物。通常，咳嗽是病毒或细菌感染的信号，如患感冒。也可能是呼吸系统的感染，如发喘嗝声的咳嗽或是得了肺炎。


    灰尘、吸烟或空气污染都可能是咳嗽的刺激源。不明原因的持续咳嗽通常有可能是由更严重的疾病引起的，如癌症或肺结核。


    饮用玫瑰花瓣水，它是最有效的制剂之一。它可以作用于黏液和缓解咳嗽。还可以喝一些汤药，材料主要是化痰的，如薰衣草、蜜蜂花、薄荷、玫瑰水或百里香。采用蒸汽吸入法，吸入桉树精油，或在枕头旁边放置树叶、花瓣水，可以避免在半夜因为咳嗽翻来覆去。'
