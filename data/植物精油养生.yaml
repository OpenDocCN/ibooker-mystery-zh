    # 2. 橄榄油


    橄榄油（Olive Oil）有一种强烈的粮食气味，但它的药用价值也很高，能够使肌肤润滑，并有一定治疗作用，尤其适合于干性的肤质。它是一种非常稳定的油，不容易酸败，即使在没有冷藏的条件下，也可以存贮
    1 年。


    橄榄油是以它的果肉部分为原料提取的，而不是它的果核。采用不同的制作工艺，可以得到不同质量的油品，包括特佳原油、原油和纯油 3 个等级。特佳原油是从第 1 次压榨工序中获得的，而原油则来自第
    2 次压榨，与第 1 次压榨油相比，色泽和芳香味都显得清淡些。


    橄榄油含有较高水平的重要脂肪酸（α-亚麻酸），内服此油对预防心脏疾病有好处。它外用时，有助于皮肤的保水，对皮肤有治疗疼痛和炎症的功效。当在患处涂抹后，可以治疗关节炎。


    不建议您在芳香治疗过程中使用橄榄油。因为它有点太黏稠，并且味道太浓烈。不过，当对干性皮肤进行按摩时，可以在复方按摩油中添加一些橄榄油。


    橄榄 Canavium album Raeuseh'
