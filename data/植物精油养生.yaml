    4）它能帮助降低血液中的尿酸成份，以缓解痛风症状，抗动脉粥样硬化。对关节炎的治疗也有帮助。当在皮肤上使用时，能够帮助治疗痤疮。还可用于治疗蚊虫叮咬。


    （6）使用注意事项

    尽管人们需要刺激时常常会用到甜罗勒精油，但是，过量使用会有麻木的感觉。因此，怀孕期间不要使用，16 岁以下的孩子也不要使用。由于它能使敏感皮肤发生过敏反应，所以敏感性肤质的人要小心使用。它还有通经作用，所以怀孕期间一定避免使用。


