  md: '**常用单方植物精油**


    榄香树当地人称其为 Pili（马尼拉语），意思是“卵橄榄（树）或爪哇苦杏仁”，树脂从马尼拉出口，以两种形式，一种是 Primera（马尼拉语），也就是干净的树脂；另一种是
    Secunda（马尼拉语），也就是未加工的和不干净的原料。古埃及人用榄香精油做尸体的防腐剂。如今，人们在制造熏香材料、肥皂和清漆的时候会用到它。


    (3) 提取方法


    榄香精油是以树脂为原料，采用蒸汽蒸馏法提取的。


    (4) 化学成份


    松油醇、榄香素、榄香醇、二戊烯、水芹烯和柠檬油精。


    (5) 治疗功效


    榄香精油可以用于治疗呼吸道问题，如支气管炎、干咳和黏液过多。它对于出汗过多、切伤、创伤和皮肤感染也有帮助，对皮肤有返老还童的功效。它可以缓解精疲力竭和减轻压力，给人一种安宁的感觉。


    (6) 使用注意事项


    榄香精油对敏感性皮肤有刺激作用。


    (7) 用法


    榄香精油可以用于治疗呼吸道感染和皮肤问题，还有振奋精神的作用。


    1）香炉和蒸发器熏香


    在蒸汽疗法中，榄香精油可以用于治疗和呼吸道方面的疾病。


    2）做复方油或稀释在盆浴中使用


    榄香精油可以用在复方按摩油的成份中，或稀释在盆浴中使用，有助于治疗和呼吸道疾病，缓解压力，治疗皮肤感染。


    (8) 适合与榄香精油混用的精油


    乳香、薰衣草、迷迭香、没药和鼠尾草精油。


    **3. 没药精油**


    没药精油是从没药植物（Commiphora myrrha，Commiphora molmol and Balsamodendron myrrha）中提取的，属于橄榄科。


    没药精油是具有传奇色彩的精油，它不但可以震撼你的灵魂，而且对女性疾病、皮肤问题，排除体内毒素和黏液有很好的疗效。


