- img_proc: true
  md: '(3) 提取方法

    欧蓍草精油是以干燥的植物为原料，采用蒸汽蒸馏法提取的。


    (4) 治疗功效

    欧蓍草精油能够调理循环不畅，如静脉曲张和痔疮。它对月经不规律、更年期症、膀胱炎和感染有疗效。这种精油还有助于治疗消化系统方面的疾病，如肠胃气胀、疝气、腹部绞痛、消化不良和便秘。对于神经系统，它可以用于治疗有关精神压力方面的疾病，以及过度紧张和失眠症。它对皮肤也有好处，它能治疗发炎的伤口、皮疹、割伤、湿疹和烧伤，还能促进头发生长。


    (5) 使用注意事项

    不要在孕期使用欧蓍草精油。长期使用可能引起头疼，也会刺激敏感性的皮肤。


    (6) 用途

    欧蓍草精油有助于清除神经紧张，改进泌尿生殖器和消化系统状况，还能护理皮肤。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，欧蓍草精油有助于缓解压力，治疗失眠和消化系统方面的疾病。


    2) 做复方按摩油或稀释在浴盆中使用

    欧蓍草精油做复方按摩油或稀释在浴盆中使用时，可以用于治疗静脉曲张、痔疮、月经问题、消化系统失调、过度紧张、压力过大和皮肤问题。


    (8) 适合与欧蓍草精油混用的精油

    圆当归、柏木、橡树苔藓和马鞭草精油。


