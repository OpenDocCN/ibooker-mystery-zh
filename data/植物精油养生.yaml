    # # 6. 牛膝草精油


    牛膝草精油是从牛膝草植物（Hyssopus officinalis）中提取的，属于苋科，又称为海索草。


    这种相当昂贵的精油可以有效地辅助治疗女性失调症和月周期性水肿。在帮助治疗呼吸系统方面，能够有效地清除黏液，缓解支气管痉挛。它还可以被用来治疗支气管炎、哮喘、流感和感冒，也有助于伤口愈合和消散皮肤上的瘀伤。


    (1) 精油性质

    牛膝草精油有种温和的清甜气味，颜色从无色到淡黄绿色。


    (2) 来源

    这种灌木零星地分布在地中海地区，高度约60cm，对蜜蜂有很强的吸引力。牛膝草曾经是希腊的名医希波克拉底（约公元前460～前370年，古希腊医师，医药之父）使用过的名字，是从希伯来语“ezob”演化来的，意思是“神圣的植物”。它在古书（《Old
    Testament》）中常被提到，那时，人们用它作心灵净化的象征，然而，这种说法所指的植物也有可能是牛至属植物。


    它的茎木质化、多毛，叶片小、绿色、长毛状，花朵紫蓝色，是古代著名的植物。它的茎节处像牛膝盖。它在圣经中也被提到过。它具有净化的功效，可以驱避瘟疫、麻风病，治疗胸腔的疾病。它也被用于净化宗教场所，在中世纪被当作一种点缀植物，来驱避虱子。在10世纪，本笃会的僧人把它作为利口酒的制作原料，引入到欧洲。

    据推测，可能原产我国，目前在我国东部省份有商业化种植。


    (3) 提取方法

    牛膝草精油是以叶片和花朵为原料，采用蒸汽蒸馏法提取的。


    (4) 化学成份

    松萜或蒎烯、莰烯、桧烯、月桂（香叶）烯、柠檬油精、萜品醇、桉树脑和侧柏酮。


