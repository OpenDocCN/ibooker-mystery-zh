    7. 芫荽精油


    芫荽精油是从芫荽植物（Coriandrum sativum）中提取的，属于伞形科，又称为芫荽、香菜。


    从这种古老的植物中提取的精油，在芳香疗法中是占有一席之地的，可以用于平复情绪和抵抗疲劳；同时，还能温暖和镇定消化系统，缓解关节炎和风湿病的疼痛，以及肌肉痉挛，给身体解毒。


    （1）精油性质


    芫荽精油味道温和、甜，具有辛辣味，接近于无色到淡黄色；黏质性为水性。


    （2）来源


    原产于摩洛哥，是一年或二年生植物，可以长到1m高。叶片稀疏、纤细、革质化；略带桃红色或白色花朵，结绿色种子。揉碎叶片会散发一种不愉快的气味，就如压扁一只臭虫散发出的气味。希腊名字Koris（臭虫）就是芫荽单词Coriander的词根。


    埃及人使用种子已有数千年的历史了，作为春药或壮阳剂。罗马人和希腊人喜欢用它酿酒，而印度人喜欢烹饪中用它。在17世纪的法国，人们用这种种子熏香梳洗用水。目前，它还应用于酿造查特酒（法国查特修道院僧侣酿制的黄绿色甜酒）和本笃会的一种利口甜酒。


    （3）提取方法


    芫荽精油是以压碎的成熟种子为原料，采用蒸汽蒸馏法提取的，出油率在0.8%~1.0%。


    （4）化学成份


    龙脑、芳樟醇、桧树脑、异丙基苯、松油醇、二戊烯、水芹烯、松萘和异油松烯。


    （5）治疗功效


    芫荽精油可以用于恢复精力和振奋精神。它有益于消除脑力疲劳，缓解偏头痛和精神紧张，还可以治疗神经虚弱。它有暖胃和缓解月经痛的效果，同时，具有更新腺体系统的功能。它有助于缓解关节炎和风湿病疼痛，以及肌肉痉挛；对感冒和流感也有效果。它也


