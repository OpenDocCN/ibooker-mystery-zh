  md: '# # 植物精油与香草植物

    Essential oils health


    大家知道，植物精油来自香草植物，是香草植物的提取物。那么，香草植物为何物？下面将简略介绍一下有关香草的基本知识，以使人们更深入地了解植物精油的神秘和神奇。


    除了传统的适宜在庭院中铺陈的草皮，香草植物成为最近庭院和阳台栽种的新宠。它散发的香味具有抗氧化性及抗菌性，是清新气味和净化空气的绿色产品，如迷迭香、百里香、夜来香、薰衣草、薄荷，这些香味植物从幼苗到干株枯叶都有浓郁的香气，晚上更是香味四溢，特别适合营造庭院花香醉人的氛围。


