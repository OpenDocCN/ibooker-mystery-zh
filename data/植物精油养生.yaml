    # ### 1. 便秘


    便秘可以解释为大便的排泄困难，或者是排泄时缺乏气力。


    # #### （1）症状


    包括没有食欲、胃部发胀、有些反胃或消化不良。月经前期、孕妇和经常服药的人容易便秘，但是主要的原因还是饮食中缺乏粗纤维。另外，肛门反复拉伤还容易产生痔疮。


    # #### （2）饮食调理


    食用富含新鲜纤维的水果和蔬菜（茴香、龙蒿和胡萝卜），以及带皮谷物、豆类，或在每餐时食用些糠麸，可以缓解便秘。尽量避免食用茶、咖啡、巧克力和所有精制过的食物。要有规律地锻炼身体。


    # #### （3）精油调理


    使用按摩油，按顺时针方向在腹部靠下的位置做按摩，每天3次，也有疗效。按摩油的配方如下：15滴迷迭香精油、10滴柠檬精油、5滴欧薄荷精油与30mL荷荷芭精油混合。


    # ### 2. 口腔异味


    口腔异味，真是一个让人非常尴尬的事情。对于我们周围的这些人来说，他们太关注这个事情了。


    # #### （1）症状


    口腔有异味虽然还不是一种疾病，但这仍然是一种疾病潜伏的征兆。其原因有很多，像在齿缝中食物腐败分解、镶牙、饮酒、抽烟还有喝咖啡等都是可能导致口腔异味的原因。


    刺激性的食物，像葱蒜一类的食品会让口气更加难闻。口腔异味也是胃病的一个征兆。比如消化不良、肝肾脏解毒排毒的功能不正常，这些都能够导致口腔异味。


    # #### （2）精油调理


    常用漱口水的配制：4滴薰衣草油混入5mL白兰地和125mL温水中。'
  - '[PAGE 231]


    正确刷牙后，用此混合物漱口，然后吐出。


    # ### 3. 打嗝


    打嗝可能是很痛苦的，尤其是经常性的打嗝。在一个褐色的纸袋里滴 1 滴甘菊精油，把它捂在你的嘴和鼻子上，用鼻子缓慢地做深呼吸。


    有些人介绍说，饮用 1 杯水，里面溶有 1 茶匙糖，可以使打嗝停止。


    # ### 4. 反胃


    生理的和心理的问题都会引起反胃。引起反胃的原因不仅包括不好的气味、不良的消化、扁桃腺炎、流感、偏头痛、宿醉或食物中毒，而且还包括一些敏感症和情绪方面的疾病。怀孕初期也有反胃呕吐现象。


    当反胃的时候，不要尝试吃什么东西。喝一杯薄荷、茴香或茴芹泡的茶可能对反胃有好处。


    因运动引起的反胃，呼吸些新鲜空气就会好转，不过，加些精油的气味，如薰衣草或香柠檬，效果可能会更好。可以在手帕上滴几滴这种精油，在需要的时候吸入即可。


    # ### 5. 腹部疼痛


    腹部疼痛的原因有很多，如膀胱炎、月经、消化问题或吃饭太快。甚至腹部肌肉拉伤也有可能造成疼痛。


    服用甘菊和薄荷植物泡制的茶，能够缓解某些症状。


    使用按摩油按摩也有助于缓解腹部疼痛，按摩油的配制方法如下：5mL 基础油混入 1 滴洋甘菊或金盏草精油和 1 滴丁香精油和 1 滴欧薄荷精油。


    把它们混合在一起，按顺时针的方向，轻轻地按摩胃部。如果不见好转，还有腹泻、呕吐、发烧或头疼的症状，就要到医院接受治疗。


    # ### 6. 腹泻


    腹泻是肠胃系统出现问题的信号。如果伴随有发烧，这就表明黏膜发炎了。其他的症状还有强烈的口渴、脱水。腹泻是大肠的正常反应，这样可以清除体内的毒素和其他有传染性的废物。导致腹泻的病源，包括辛辣食物、不洁净的饮水、吃得太快、吃不成熟的果实和不易消化的蔬菜、吃过多油腻、含乳脂的食物和所吃食物的种类过多。


    腹泻能引起脱水，对于婴儿和老人后果尤为严重。在治疗期间，要多饮水，避免吃一些食物，包括新鲜的水果、糠（麸）、干饼干和乳制品。


    姜茶对于抽筋和腹部疼痛有好处。食用含淀粉多的食物，如白米饭，尤其是布丁米饭（一种以面粉、牛奶、鸡蛋等为基料的糊状甜食），可以治疗腹泻。'
  - '[PAGE 232]


    用含有精油的按摩油，在腹部摩擦也可以缓解腹泻。配置按摩油的方法是，把下列精油混入10mL的基础油中：2滴椒样薄荷精油、2滴薰衣草精油、2滴洋甘菊精油、2滴桉树精油、2滴天竺葵精油。


    # ### 7. 肛裂


    典型的肛裂会引起强烈刺骨的疼痛，同时有瘙痒的感觉。通常是在排便后发作。


    肛裂可以解释为，在肛门外表皮之间有溃疡处或发炎的裂缝，黏膜组织也会发生溃疡；病因通常是多方面的联合导致的，包括干燥皮肤受到过分摩擦、粗糙的手纸、由于便秘的拉伤，甚至过大和坚硬的大便引起的。


    年龄大的老人和小孩容易发生肛裂。


    用添加5滴薰衣草精油和1滴柠檬精油的温水，清洗患处，能缓解症状。


    # ### 8. 憩室炎


    位于大肠虚弱部分的重瓣憩室能收集大肠废物，一般不会有不舒服的感觉，除非它们有了炎症。症状可能有疼痛的感觉，以及敏感、发烧、腹泻、便秘、痉挛、出血和贫血。


    通常40岁以上的人容易患憩室炎，主要病因是，由于年龄的增长，大肠内壁所受压力过大和组织衰弱引起的。当大肠内收集废物的这些憩室被填充满后，就会发生炎症。


    库拉索芦荟有促进感染部位愈合的作用。可以1天3次，每次饮125mL的芦荟汁，以帮助治疗。还可以按顺时针的方向，在胃部以上涂抹按摩油，也能够缓解不适。按摩油的配制方法如下：1滴欧薄荷精油、1滴洋甘菊精油、2滴迷迭香精油、1滴丁香精油与5mL植物基础油混合。


    # ### 9. 烧心


    烧心就是胸口有灼烧疼痛的感觉，这种感觉能够辐射到脖颈和咽喉部位，有时会到脸部。它通常在饭后发作，此时胃酸正逆流而上经过括约肌。如果括约肌的肌肉协调能力丧失，保持着开的状态（正常情况是在关闭状态），胃酸就会逆流而上，就有烧心的痛苦感觉。


    可以用下列配方制成的按摩油按摩腹部上半部：2滴尤加利精油、1滴欧薄荷精油、2滴茴香精油，稀释在5mL（约1茶匙）葡萄籽油中。


    # ### （七）植物精油与生殖系统


    生殖系统是人体最为重要的系统之一，正是由于有了生殖系统，人类才能够繁育后代，才会享受为人父母的快乐与幸福。植物精油对生殖系统的主要作用是治疗生殖系统病'
  - '[PAGE 233]


    **植物精油在身体调理中的应用**


    症，具有治疗痛经、促进分娩和催生、催情的效果。

    因为一些精油具有刺激子宫收缩的作用，所以对于快速和无痛的分娩很有帮助，在某些情况下，使用植物油催生比使用化学药物更好，因为它能带来较高的安全性，减轻分娩期间的疼痛，同时降低婴儿在化学药物催化下所引发的某些损伤和不利因素。对于生殖系统问题的治疗，可以采用按摩、泡浴、坐浴等方式。


