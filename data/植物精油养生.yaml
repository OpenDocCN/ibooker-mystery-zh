    # - **8. 醒目薰衣草精油**


    - 醒目薰衣草精油是从薰衣草与其杂交种的杂交品种植物（Lavandula x intermedia、L. hybrida and L. hortensis）中提取的，属于唇形科。

    - 醒目薰衣草精油有时候易被与它的近亲薰衣草精油混淆。但它能缓解肌肉和关节疼痛，减轻肌肉的僵硬，清洁肺部和鼻腔的黏液，治疗创伤和皮炎。它虽不如薰衣草知名，也不如薰衣草应用广泛，但它在复方按摩的应用中也很受欢迎。


