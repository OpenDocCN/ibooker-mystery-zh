    **3.甜罗勒精油**


    甜罗勒精油是从甜罗勒或罗勒（Ocimum basilicum）植物中提取的，属于唇形科罗勒属。它又分为欧洲罗勒、法国罗勒、普通罗勒。


    在芳香疗法中，会经常用到这种淡淡香味的精油。它能唤醒记忆，使头脑清晰，稳定神经系统，缓解窦充血，退烧，治疗月经问题。


    **(1)精油性质**


    稍有黏性，淡绿黄色，具有清淡、透彻、略带辛辣的气味。复方罗勒油是甜味、绿色的。盛产于北非、塞浦路斯、塞舌尔、埃及和欧洲。


    **(2)来源**


    **甜罗勒Ocimum basilicum**


    甜罗勒起源于亚洲热带地区和太平洋岛屿，现在全欧洲和美国都有栽培。它是一年生草本植物，高1m。甜罗勒属于欧洲品种，与神圣罗勒及热带罗勒相比，叶片较大、较宽、较油亮。不同品种的花色也不相同，从白色到粉红色，在春天的时间吸引成群的蜜蜂。它的拉丁名Basilicum是从希腊字母“Baslicos”演化来的，意思是“国王”或“皇室”。在印度，罗勒受到极大的尊敬，它属于克利须那神（印度教）和毗瑟挐神（印度教主神之一，守护之神）的神圣植物，人们甚至会在参加宗教仪式前咀嚼它的叶片。据说，当印度教徒休息时，就把一片罗勒叶子放在胸前当作护身符。它也是印度和中国常用的一种草药。'
