  md: '![](img/9a4032e2e8ad73992ff2b2bd7fc25509_237_0.png)


    家庭栽培芳香植物景观（二）


    栽培香草植物其实并不难，只需把握好影响生长的几个关键因素即可种植出理想的香草。


    # ### （一）适宜家庭栽培的香草种类


    # #### 1. 香草贵族——迷迭香


    # ##### （1）栽培方法


    通风、日照良好、排水顺畅的环境是首要条件。若由种子开始栽培，发芽期约需 20 天，且第 1 年成长缓慢。一般采用扦插法，选择春、秋两季，剪下茎部顶端或新出的茎秆，5～10cm，浸泡水中
    10～30 分钟后，斜插在带有沙质土的培养土中，充分补充水分，约 20 天左右即会发根，待植株强壮后，可再移盆或定植。半匍匐型及匍匐型迷迭香亦可用压条方式繁殖。


    # ##### （2）采收保存


    迷迭香叶片可随时采收，也可以将整株茎、叶摘下，置放于阴暗处干燥后收集叶片放入密闭容器保存。采收植株时，最好不要剪到木质化部分，以免植株不易发新芽。


    # ##### （3）广泛应用


    1）料理：可结合其他香草串成香草束，增加食物风味，鱼、肉类料理及糕点皆可，花可点缀餐点盘饰。


    2）健康：促进消化，增加记忆，杀菌驱虫。'
