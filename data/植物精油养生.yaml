    的，其边缘发炎为红色，摸上去是柔软的感觉。溃疡可能会持续两到3周，能够自愈，而不留伤疤。


    （2）饮食调理


    当患有口腔溃疡时，不要吃酸性或辛辣的食物，因为会使伤口更疼；也不要吃硬的食物，不要喝咖啡、吸烟和饮酒。


    （3）精油调理


