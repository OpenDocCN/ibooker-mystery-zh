  md: '**植物精油在身体调理中的应用**


    用。在雪天外出回来后，在脚上擦一点松树精油与葡萄籽油的混合物，在皮肤患处也可以涂抹一些薰衣草精油，能预防冻伤的发生。


    6. 脚气


    脚气是最常见的一种真菌感染。最初的症状是出现小水疱，不久变成潮湿、发红的斑点，有灼烧和瘙痒的感觉。这种病很顽固，令人烦恼。它有很强的传染性，在潮湿的环境滋生迅速。不好的卫生条件和汗脚创造了适合真菌生长的环境。人工合成材料制成的袜子和鞋阻碍了空气流通，容易产生潮湿的环境。


    到可能感染脚气的地方时，可以在去前和走后，用纯茶树精油或天竺葵精油擦脚。


    治疗受感染的脚，可以在10mL任意的基础油中，添加2滴小麦胚芽油、2滴茶树精油和2滴天竺葵精油，每天在脚趾和指甲周围擦拭。


    **7. 疖子**


    疖子是一种脓肿，经常发生在臀部和手臂腋下的毛囊。发烧、劳累、有时淋巴结肿胀都有可能引发疖子。疖子经常发生在年轻的男性身上。饮食缺乏新鲜食物，吃猪肉过多，吃油榨食物和垃圾食物，这些都会导致血液不纯，进而引起疖子。


    对疖子有益的做法是清洗受感染的地方，配方如下：2滴薰衣草精油、2滴茶树精油、1滴刺柏精油，稀释在200mL的热水中。如果感染严重，再加1滴甘菊精油。每天清洗两次受感染的地方。感染进一步发展时，可以用棉签蘸些纯茶树精油，抹在患处。但是，如果没有很快取得效果，请到医院咨询。


    **8. 流血**


    各种类型的流血都需要认真地对待。一般，一位成年人大约有5L血，即使流失1L血都会有生命危险。因意外事故或紧急情况导致流血时，要及时征求医生的建议。


    如果是个小创口，可以使用外敷的办法，同时添加下面所列成份：1滴天竺葵精油、1滴柠檬精油、1滴洋甘菊精油、1滴茶树油。


    **9. 褥疮**


    卧床病人容易发生溃疡的位置，一般是臀部、脚后跟和肘部。经常帮助病人翻身能防止褥疮的发生。保持皮肤干燥、清洁和血液循环正常，也能预防褥疮。发生褥疮之前或之后，把下述成份混合在一起，轻轻地按摩，使其渗入到受影响的地方。使用的按摩油配方是：20mL月见草油、4滴小麦胚芽精油、3滴黄春菊或天竺葵精油、2滴薰衣草精油、2滴茶树精油、2滴乳香精油。


    如果褥疮已经流脓，就不能使用按摩油了。'
