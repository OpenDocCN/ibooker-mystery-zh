    **2. 针刺提取法**


    这种压榨提取方法主要用于获取柑橘属精油，比海绵压榨法会减少一些劳动强度，这是一种更加现代的精油提取方法。所谓针刺提取法，就是把果实放在容器内，容器内壁有针不断旋转，能刺破果实表面含油细胞。这样，含油细胞破裂，精油和其他的物质，如色素，就会流到容器中心的位置，那里设有收集器。精油会漂浮在混合物的上面，底下是水分。这时，就可以把精油从混合物中转移出来，倒入另外的容器中。


    **3. 机械研磨提取法**


    这种压榨提取方法与针刺法方法很相似，经常用于柑橘属植物精油的提取中。机械研磨是指先用机械把外果皮剥离，然后由流动的水把果皮分离出来，被投入到离心式分离器中。离心式分离方法提取油的过程很快，但是需要记住，因为精油是与其他细胞成份相混着的，里面存在着一些酶促反应，所以要对提取工艺加以改造。


    **（四）植物精油溶剂萃取方法**


    如果从广义上来谈论溶剂提取法的概念，它所指的就不仅仅是化学溶剂的提取，如（正）乙烷，还会包括其他的形式，如用固体油脂和CO₂做溶剂。溶剂提取尤其适用的植物材料，是含有精油成份很少的材料，或者这种材料主要由树脂成份构成。这种方法提取精油的香味要比蒸馏法好。在这种类型的精油提取方法中，植物材料中不容易分离出来的成份，如蜡状物和色素也能被分离出来，而在其他的提取过程中，就实现不了。


    **1. 浸泡提取方法**


    使用浸泡提取方法，就是把花瓣浸泡在热的油中，细胞膜破裂，精油被热油吸收了，把植物材料中的油分离出来，移入到其他容器中。这种提取技术与溶剂提取法非常接近，所不同之处在于，在浸泡提取中使用的提取剂是热油，而不是溶剂。


    **2. 脂肪吸附萃取**


    脂肪溶剂萃取与浸泡提取，有许多方面可以比较，但是在应用方面还是有些细微的差'
