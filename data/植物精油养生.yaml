  md: '和痔疮有收缩血管的作用。它还有益于体液过量的治疗，如流血、鼻出血、月经量过多、过量出汗、咳嗽和支气管炎。止痉挛的效果也是很突出的，可用于治疗哮喘、咳嗽、支气管炎、肺气肿和流感。此外，丝柏精油可以缓解肌肉抽筋，帮助调理月经周期，缓解关节炎和风湿病的疼痛。它对油性皮肤和创伤都有效果。


