    # ## 2. 胡桃油


    胡桃油（Juglans regia linn）有非常好的润肤效果，把它作为按摩油的成份是个很好的选择。一般不单独使用它，只是作为配制复方油的一种选择。胡桃油有股令人喜悦的坚果气味，含有少量的GLA成份。它有一定的治疗功效，有助于解决一些皮肤问题，但是对坚果油过敏的人需要在使用前做皮试。


