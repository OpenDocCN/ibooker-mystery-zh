  md: '疗程，但可以在演讲的前4天将精油滴在纸巾上吸入，也可以在沐浴时利用相同精油。后来他的太太告诉大家，科林不仅睑腺炎治好了，而且心情明显地愉快起来，这也令他们夫妻的感情越来越好。


    （五）消除疲倦


    几乎每个职员在接近日落时都会开始感到疲倦，特别是在星期一，也许是刚刚经历了双休日，还不能很快适应工作的节奏。在学校，尤其在大学，学生在理论课刚开始及结束时
    会感到倦怠，乏味的理论课会使人无精打采。在这些情况下，在喷雾器中加入数滴迷迭香及柠檬精油和水，清新的空气会让人心情愉快，并且效率可以大大地提高。把精油滴在纸巾上让每个人吸入，大部分情况下人的注意力会集中起来，原来的疲倦也会一扫而光。在这些情况下使用的迷迭香精油可以刺激血液及淋巴循环，对消化阻塞及无精打采的肝有正面作用，它出色的激励特性能成功地去除无精打采、厌倦的情绪。而柠檬精油的清新及提振香气，能激励免疫力，消除心理障碍。


    （六）安抚情绪


