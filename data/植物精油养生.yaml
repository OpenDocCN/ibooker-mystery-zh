    菖蒲 Acorus calamus


    # 18. 芥菜精油


    芥菜精油是从芥菜植物（Brassica nigra、Sinapsis nigra and Brassica sinapioides）中提取的，属于十字花科。


    # (1) 精油性质


    芥菜精油是种危险的油，因为它含有高浓度的烯丙基异硫氰酸酯成份。


    # (2) 来源


    它是一种一年生的植物，茎多分枝，叶片浅裂、形状有些像小竖琴，高16cm。在整个夏天都开着鲜亮的黄色花朵，结直立的4角型小豆荚，种子黑褐色。在草药学中，种子被用于治疗消化系统，有开胃的作用，能治感冒、打寒战、冻疮、风湿病、关节炎、腰痛。


    # (3) 提取方法


    芥菜精油是以黑色的芥菜种子为原料的，先把种子在温水中浸软，然后采用蒸汽或水蒸馏法提取。虽然芥菜种子和粉末不含烯丙基异硫氰酸酯成份，但制造精油时，种子与水接触后，在酶的作用下会产生这种物质。在新鲜种子或粉末中是不含这种有毒成份的。白色的芥菜种子不含有任何的精油。


    # (4) 化学成份


    含有大于92%的烯丙基异硫氰酸酯成份。


    # (5) 使用注意事项


    当芥菜精油用做吸入疗法时，它会在大脑枕骨的地方产生极端不愉快的感觉，会使眼睛黏膜和呼吸系统黏膜发生感染。当用于皮肤时，会产生灼烧的感觉，所以应该避免在芳香疗法中使用。作为一种精油，它是有毒的，因为它含有高浓度的烯丙基异硫氰酸酯成份，会对皮肤和肌肉黏膜产生刺激。'
  - '[PAGE 121]


    # # 19. 艾菊精油


    艾菊精油是从艾菊植物（Tanacetum vulgare、Chrysanthemum vulgare and C. tanacetum）中提取的，属于菊科。


    (1) 精油性质

    艾菊精油有辛辣的香味。


    (2) 来源

    这种生命力顽强的多年生植物原产于欧洲，可以长到1m高，茎光滑，叶片类似于蕨类、黑绿色，花朵丛生、小、圆形、亮黄色。整株植物都散发着强烈的气味，吉卜塞人把它当作一种万能药。过去，它被用来驱逐昆虫，治疗消化不良、感冒和发烧的症状，预防流产。

    艾菊精油含有高浓度的 thujone 成份，它是有毒的，能引起抽搐、呕吐和子宫出血。如果刺激到呼吸系统和伤害到其他器官都会有生命的危险。


    (3) 提取方法

    艾菊是以整株植物为原料，采用蒸汽蒸馏法提取的。


    (4) 化学成份

    thujone，isopinocamphone，camphor，borneol，camphone，artemisoneandpiperitone。


    (5) 使用注意事项

    它不能在芳香疗法中使用，它会引引起抽搐和类似癫痫症的病态，即使小剂量使用也是致命的。


    # # 20. 牛至精油


    牛至精油是从牛至植物（Origanum vulgare）中提取的，属于唇形科，又分为欧洲牛至、野牛至、普通牛至。


    (1) 精油性质

    牛至精油味道强烈、辛辣，类似于樟脑的气味，颜色淡黄，黏质性中等到水性。


    (2) 来源

    牛至是一种质地坚硬、树枝茂密的多年生药草，可以长到90cm高，茎直立、多毛，叶片暗绿色、卵形，在分枝顶端簇生粉色花朵。它是常用的花园植物，受蜜蜂的喜爱，当触动叶片时，会散发浓烈的香味。牛至药草在古代医药中就开始使用，如今，在地中海地区被广泛用作烹饪调料和治疗牙痛的药物。


    (3) 提取方法'
- md: '# 常用单方植物油


    牛至精油是以干燥的花部顶端为原料，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    香芹酚、麝香草酚、异丙基苯、罗勒烯和芳樟醇。


    ### (5) 使用注意事项

    从野牛至（Origanum vulgare）提取的和从西班牙牛至（Thymus capitatus）提取的牛至精油一样，对皮肤都有毒性，会刺激皮肤和黏膜组织，不应该在芳香疗法中使用，也避免在孕期使用。


    ## 21. 龙蒿精油


    龙蒿精油是从龙蒿植物（Artemisia dracunculus）中提取的，属于 Compositae 科。


    ### (1) 精油性质

    龙蒿精油有种青草般的辛辣气味，有些像茴芹的香味。


    ### (2) 来源

    它是一种多年生植物，喜欢生长在小溪和河流附近；茎木质化，可以长到约 1m 高。叶片银绿色、披有细绒毛，花淡黄色。


    它最初的英文名字叫 Estragon（也是龙蒿的意思），是由摩尔入侵者带到西班牙的。它的名字是从阿拉伯语 Tharkhoum 演变来的。它的拉丁语名字 Dracunculus
    意思是“小龙”，可能是它的根系卷曲时像龙的缘故。它的叶片一般用做内服药，也可以做醋。


    ### (3) 提取方法

    龙蒿精油是以叶片和花的上部为原料的，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    estragole（methyl chavicol），ocimene and phellandrene，cineoetc。


    ### (5) 治疗功效

    龙蒿精油能够刺激肠胃，能够促进消化，有助于治疗厌食、消化不良、肠胃气胀、打嗝和胃部痉挛，还可以缓解月经疼痛和调理月经周期。


    ### (6) 使用注意事项

    龙蒿精油没有刺激性和光敏性，但有一定的毒性，因为精油里含有 methylchavicol 成份，所以要适度使用，在孕期要避免使用。


    ### (7) 用法

    1) 在蒸汽治疗中或稀释在浴盆中使用

    在蒸汽疗法中或稀释在浴盆中使用，龙蒿精油有助于治疗消化不良和月经疼痛。


    2) 做复方按摩油

    龙蒿精油做复方按摩油，可以用于治疗消化问题和泌尿生殖系统的疾病。


    ### (8) 适合与龙蒿精油混用的精油


    ## 23. 欧蓍草精油


    欧蓍草精油是从欧蓍草植物（Achillea millefolium）中提取的，属于菊科。


    ### (1) **精油性质**

    欧蓍草精油味道辛辣、发甜，有水质般的黏性。


    ### (2) **来源**

    它是一种多年生植物，可以长到 1m 高，叶片革质、叶形类似于蕨类，头状花序，花多、粉红色或白色。它又被称为西洋蓍草，因为它形状犹如羽毛，在苏格兰被当作一种符咒，它有避免邪恶的力量。


    它有着医治百病的名声，可以用它治疗各种年龄段的各种疾病，甚至在一些瑞典啤酒中也加有欧蓍草。


    ### (3) 提取方法

    欧蓍草精油是以干燥的植物为原料，采用蒸汽蒸馏法提取的。


    ### (4) 治疗功效

    欧蓍草精油能够调理循环不畅，如静脉曲张和痔疮。它对月经不规律、更年期症、膀胱炎和感染有疗效。这种精油还有助于治疗消化系统方面的疾病，如肠胃气胀、疝气、腹部绞痛、消化不良和便秘。对于神经系统，它可以用于治疗有关精神压力方面的疾病，以及过度紧张和失眠症。它对皮肤也有好处，它能治疗发炎的伤口、皮疹、割伤、湿疹和烧伤，还能促进头发生长。


    ### (5) 使用注意事项

    不要在孕期使用欧蓍草精油。长期使用可能引起头疼，也会刺激敏感性的皮肤。


    ### (6) 用途

    欧蓍草精油有助于清除神经紧张，改进泌尿生殖器和消化系统状况，还能护理皮肤。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，欧蓍草精油有助于缓解压力，治疗失眠和消化系统方面的疾病。


    2) 做复方按摩油或稀释在浴盆中使用

    欧蓍草精油做复方按摩油或稀释在浴盆中使用时，可以用于治疗静脉曲张、痔疮、月经问题、消化系统失调、过度紧张、压力过大和皮肤问题。


    ### (8) 适合与欧蓍草精油混用的精油

    圆当归、柏木、橡树苔藓和马鞭草精油。


    ## 24. 晚香玉精油

    晚香玉精油是从晚香玉植物（Polianthes tuberosa）中提取的，属于石蒜科。


    ### (1) 精油性质

    晚香玉精油味沉，散发着稍带辛辣味的甜香味。


    ### (2) 来源

    晚香玉是一种高大、纤细、柔嫩的多年生植物，叶片细长，根系块茎状，花形与百合相似、巨大、芬芳，原野生于美国中部。目前在世界各地栽培，以获取鲜切花；但在埃及、中国、法国和摩洛哥还是作为提取精油的原料。


    ### (3) 提取方法

    固体和完全的晚香玉精油的提取方法是溶剂萃取法，以新鲜花为原料，原料是在花朵没有开放前采摘的。


    ### (4) 化学成份

    看叶醇及其乙醇酯、登花醇及其乙酯酯、全合欢醇、苯甲醇、苯甲酸甲酯、苯甲酸苄酯、水杨酸甲酯等。


    ### (5) 使用注意事项

    晚香玉精油一般不在芳香疗法中使用，但在香水工业中，它是一种很好的香水成份。据说，它有麻醉功效，不过还没有适当的安全使用数据。


    ## (六) 树脂类精油


    ### 1. 安息香精油


    安息香精油是从安息香树脂中提取出来的，安息香树（Styrax Benzoin）属于安息香科红皮属，又称为贝加明树脂、爪哇乳香。


    这种用树脂提取的精油有很强的镇静和提神的作用，能够帮助抚慰悲伤和孤独的情感；同时，也能刺激循环和调理呼吸系统的不畅。对恢复皮肤的弹性也有好处，可以淡化皮肤的红色，有止痒和止过敏的功效。


    #### (1) 精油性质

    安息香精油气味温和，有甜味，类似于香草的味道，香气平和，滞留期长。它的颜色金褐色，有点像蜂蜜的黏性。


    #### (2) 来源

    它主产于爪哇、苏门答腊岛（在印尼西部）和泰国，可以长到 8m 高。在树干上割深深的切口，一种浅灰色的树液就会从切口处渗出。当树脂变得坚硬和发脆时，就可以把它从树干上收集起来了。


    安息香树脂，是传统的熏香成份之一。在古代文明中，它经常被用来安抚愤怒的情绪，还是男修道士用的香水成份。它对呼吸系统也有好的作用。在现代香水工业中，它常常作为防止香味过快挥发的固定剂。


    #### (3) 提取方法

    安息香精油是从有 7 年树龄或更年长的安息香树的树脂中提取的，使用溶剂萃取方式，出油率在 65% ~ 85%。


    #### (4) 化学成份

    安息香、苯乙烯酸、苯甲基安息香酸盐、安息香醛、香草醛、苯基酯（60% ~ 80%），苯甲酸松柏酯、肉桂酸酯、安息香酸（10% ~ 20%）、芳香醛和微量香草素。


    #### (5) 用法

    1) 安息香精油对于抚慰神经系统紧张的治疗效果最好，对消化系统有帮助作用，对于循环系统和呼吸系统也有温和的疗效。

    2) 它能促进胰腺功能，进而可间接帮助消化系统工作，它是通过调控血糖浓度起的作用，这对于有糖尿病的人来说是很有价值的。

    3) 能增加皮肤的弹性，帮助开裂的皮肤愈合，进而有利于伤口的愈合。同时，可以淡化皮肤的红色、敏感性，减轻瘙痒。


    #### (6) 使用注意事项

    当需要精力集中时，要避免使用安息香精油，因为它有很强的放松功效。


    #### (7) 用法

    1) 香炉和蒸汽熏香

    在蒸汽疗法中，安息香精油能够用于治疗神经紧张，缓解压力，抚慰情绪。

    2) 作为复方按摩油和盆浴的添加成份

    安息香精油作为复方按摩油和盆浴的添加成份，能够帮助减轻关节炎和风湿病的疼痛；对于慢性支气管炎和咳嗽也有益处。受损的循环系统功能和肌肉僵硬的症状也可以从中受益。它还有镇静和扭转低落情绪的作用。此外，它还能给皮肤良好的呵护，包括增加皮肤弹力、降低红色、减轻敏感性和止痒，还能帮助伤口愈合。

    3) 做面霜的成份

    安息香精油对于干燥、龟裂性皮肤是一种良好的药物选择。它对于皮肤上的伤口也有帮助，还能缓解伤口疼痛、降低皮肤的敏感性，增加皮肤的弹性，并起到止痒的作用。


    #### (8) 适合与安息香精油混用的精油

    香柠檬、芫荽、乳香、刺柏、薰衣草、柠檬、没药、柑橘、酸柠檬叶、玫瑰和檀香精油。


    ### 2. 榄香精油


    榄香精油是从榄香树（Canarium luzonicum、C. commune）的树脂中提取的，属于橄榄科，又称为马尼拉榄香。


    #### (1) 精油性质

    榄香精油味道类似于柑橘属植物，稍带辛辣，颜色暗淡。


    #### (2) 来源

    原产于菲律宾岛，热带树种，可以长到 30m 高。当树萌芽时，从树上渗出淡黄色的树脂。当树脂遇到空气时，开始凝固。到落叶季节时，树脂开始停止渗出。


    榄香树当地人称其为 Pili（马尼拉语），意思是“卵橄榄（树）或爪哇苦杏仁”，树脂从马尼拉出口，以两种形式，一种是 Primera（马尼拉语），也就是干净的树脂；另一种是
    Secunda（马尼拉语），也就是未加工的和不干净的原料。古埃及人用榄香精油做尸体的防腐剂。如今，人们在制造熏香材料、肥皂和清漆的时候会用到它。


    #### (3) 提取方法

    榄香精油是以树脂为原料，采用蒸汽蒸馏法提取的。


    #### (4) 化学成份

    松油醇、榄香素、榄香醇、二戊烯、水芹烯和柠檬油精。


    #### (5) 治疗功效

    榄香精油可以用于治疗呼吸道问题，如支气管炎、干咳和黏液过多。它对于出汗过多、切伤、创伤和皮肤感染也有帮助，对皮肤有返老还童的功效。它可以缓解精疲力竭和减轻压力，给人一种安宁的感觉。


    #### (6) 使用注意事项

    榄香精油对敏感性皮肤有刺激作用。


    #### (7) 用法

    榄香精油可以用于治疗呼吸道感染和皮肤问题，还有振奋精神的作用。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，榄香精油可以用于治疗和呼吸道方面的疾病。

    2）做复方油或稀释在盆浴中使用

    榄香精油可以用在复方按摩油的成份中，或稀释在盆浴中使用，有助于治疗和呼吸道疾病，缓解压力，治疗皮肤感染。


    #### (8) 适合与榄香精油混用的精油

    乳香、薰衣草、迷迭香、没药和鼠尾草精油。


    ### 3. 没药精油


    没药精油是从没药植物（Commiphora myrrha，Commiphora molmol and Balsamodendron myrrha）中提取的，属于橄榄科。


    没药精油是具有传奇色彩的精油，它不但可以震撼你的灵魂，而且对女性疾病、皮肤问题，排除体内毒素和黏液有很好的疗效。


    #### (1) 精油性质

    没药精油有种温和的、略带霉味的气味，颜色淡黄色或琥珀色。


    #### (2) 来源

    它的树体不高，大约 5m，树皮浅色，分枝多结，叶片少，花小、白色。它起源于索马里、阿拉伯半岛和也门。树皮被割后，淡黄色液体状的树脂就会流出，变干后就成为微红色或褐色的硬块，有胡桃大小，精油就是从这里提出的。


    在古代的时候，没药非常受欢迎，常被中国人和埃及人当药材使用。还是埃及人举行太阳神庆典和制作木乃伊时也用它。它也被用于化妆品。希腊战士随身带着一小瓶没药精油，用于伤口的止血。


    #### (3) 提取方法

    没药精油是以树脂为原料的，采用蒸汽蒸馏法提取，出油率在 3% ~ 5%。


    #### (4) 化学成份

    松萜或蒎烯、杜松（萜）烯、柠檬油精、对异丙亚苄基丙二酸、丁子香酚、甲酚、乙酸、蚁酸、其他倍半萜烯和酸。


    ### （6）使用注意事项

    没药精油没有毒性和刺激性。但大剂量使用时会有毒性。避免在孕期使用。


    ### （7）用法

    没药精油的最强功效在于治疗呼吸系统疾病、消化系统、齿龈和口腔失调、皮肤护理，以及泌尿生殖器和月经问题。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，没药精油可以用于治疗支气管炎、黏膜炎、感冒和咳嗽。对于提高灵性也有帮助，尤其在思考问题的时候最有帮助。

    2）做复方按摩油或稀释在浴盆中使用

    没药精油做复方按摩油或稀释在浴盆中使用，可以用于治疗支气管炎、黏膜炎、感冒、咳嗽和感染，以及上面所列的各种妇科疾病。对皮肤的使用效果也很好。

    3）做漱口水

    用作调配漱口水的成份时，可治疗所有牙齿的感染。

    4）做冷敷材料

    没药精油可以稀释后用做冷敷材料，用于治疗疼痛，护理皮肤和伤口。

    5）做面霜或润肤乳的成份

    用作面霜或润肤乳的成份，在治疗慢性炎症和溃疡时，会有令人惊奇的效果。它可以加速伤口的愈合，清除脚气，治疗发生溃疡的湿疹。用在治疗褥疮、深的皮肤裂缝、疖子、痈、痤疮和所有其他的皮肤疾病上。也可以用棉签直接蘸些，在伤口和其他皮肤感染上使用。


    #### (8) 适合与没药精油混用的精油

    安息香、乳香、薰衣草、檀香和丁香精油。


    ### 4. 乳香精油


    它是从乳香树（Boswellia carteri）的树脂中提取的，属于橄榄科。


    它是芳香疗法中长期受人喜爱的精油之一。这种精油有着完美地稳定情绪的效果，可以帮助创造一种内在的安宁，还有助于抚慰呼吸道和泌尿系统方面的疾病，能缓解同风湿病和肌肉有关的疼痛，对皮肤有返老还童、平衡和治疗的作用。


    #### （1）精油性质

    乳香精油味道辛辣，有木头的清香味，令人不易忘怀。还含有一点樟脑味，但很令人愉快。颜色为淡黄绿色。


    #### （2）来源

    它原产于中东地区，叶片裂深、呈多尖塔形，花朵白色或淡粉红色。在树干上制造很深的切口，可把树皮呈条状剥离。几周后，将从切口处渗出乳白色的汁液，当与空气接触后就成为块状，如同人造黄油一样，精油就是从中提取出来的，采用蒸汽蒸馏法提取精油。


    乳香的英文单词 frankincense 来源于法语单词 Franc，是“奢华的”或“真正的熏香”的意思，与没药一起，是作为熏香材料使用到的树脂。乳香常被古埃及人当作给上帝的奉献物，还用于制作返老还童的面膜。也用于给病人熏香，以驱除邪恶的灵魂。圣经新约中的希伯来书给乳香的评价很高：“它是献给耶稣婴儿时候的贡献品之一。”


    #### (3) 提取方法

    乳香精油是以树脂为原料，采用蒸汽蒸馏法提取的，出油率在 3% ~ 10%。


    #### (4) 化学成份

    松萜或蒎烯、芳樟醇、辛基醋酸酯、醋酸冰片酯。


    #### (5) 治疗功效

    1) 乳香精油可以抚慰和镇静情绪，放慢和加深呼吸，当深思熟虑时使用，效果良好。它也有助于平缓焦虑情绪，把回忆过去的分神状态拉回到现实中。

    2) 对于呼吸系统，它可以洁净肺部，有助于缓和呼吸急促、哮喘、支气管炎、喉炎、咳嗽和感冒症状。

    3) 它可以调理月经量过多症状，是一种常用的子宫滋补剂。在疲劳时使用，有解乏的效果。它对风湿病有很好的疗效，对尿路感染也有积极的影响。


    乳香精油对皮肤有返老还童的效果，是一种皮肤滋补品，对于疼痛、痈、创伤、伤疤和皮肤感染都有疗效。


    #### (6) 使用注意事项

    乳香精油没有毒性和刺激性，可以被多数人使用。


    #### (7) 用法

    乳香精油是真正能镇静和抚慰全身以及情绪的精油之一。它可以缓和所有的疼痛，清洁肺部，用作皮肤的滋补品。

    1) 香炉和蒸发器熏香

    在蒸汽疗法中，乳香精油常被用于治疗支气管炎、感冒、咳嗽和失声，以及稳定情绪，减轻焦虑和培养内心的安宁。

    2) 做复方按摩油或稀释在盆浴的成份

    乳香精油可以用在复方按摩油或稀释在浴盆中，治疗感冒、咳嗽、支气管炎、风湿病、去寒、不良循环、精疲力竭、做噩梦、过多排汗、呼吸问题和黏膜充血。它对皮肤也有好的收敛效果，使皮肤重新焕发光彩，有助于治疗创伤、疼痛和溃疡。

    3) 做面霜和洗液的添加成份

    乳香精油可以添加在底料面霜或洗液中，用作常规的皮肤护理，可以减轻皮肤分泌油脂的程度，使皮肤恢复生机，同时有助于加速愈合创伤和溃疡，缓解疼痛。

    4) 洗涤或用作外敷配料

    为了促进愈合，防止在创伤处留有伤疤，在清洗伤口的时候，可以在水中添几滴乳香精油。对于破裂性肌肤和褥疮，把精油适当稀释后，可以轻轻地直接涂抹在受伤处，或作为外敷配料使用。


    #### (8) 适合与乳香精油混用的精油

    安息香、檀香、薰衣草、没药、松树、柑橘、香柠檬和柠檬精油。


    ## (七) 木本类精油


    ### 1. 杜松子精油


    杜松子精油是从杜松植物（Juniperus communis）中提取的，属于柏科刺柏属，又称为红松或欧洲刺柏。


    这种清新的精油在芳香疗法中，有助于刺激和加强神经系统功能，在面临挑战的关键时刻使用，有振奋精神的作用，有利于排尿。它还可以用于治疗风湿性病、关节炎、痛风、痤疮、皮炎、毛孔堵塞和湿疹，对于分解脂肪团也有疗效。


    #### (1) 精油性质

    杜松精油可以从浆果、针叶和木材中提取。从浆果中提取的精油要比从嫩枝、针叶提取的精油质量更好。它的气味新鲜、清爽，稍微带些木头香味，颜色浅，水质黏性。


    #### (2) 来源

    它是一种常绿灌木，野生状态可以长到10m高，人工栽培控制在2m的高度，叶片蓝绿色、针状，小花黄色，雌株结蓝黑色的果实（浆果）。主要产地为克里埃西亚。


    作为一种草药，它有很高的医用价值，可以用于治疗传染性的疾病，如霍乱、因伤寒引起的发烧，在西藏和欧洲还用它治疗瘟疫。在蒙古妇女开始分娩的时候，会给一些杜松枝。在南斯拉夫，它被看成是一种万能药。在法国医院，燃烧杜松枝以净化空气。它还是著名的杜松子酒的成份。


    #### (3) 提取方法

    杜松子精油是以干燥的、新鲜或轻微干燥的成熟果实为原料的，采用蒸汽蒸馏技术提取的，出油率在 0.2% ~ 2%。


    #### (4) 化学成份

    松萜或蒎烯、茨烯、桧烯、月桂烯、水芹烯、萜品烯或松油烯、桉树脑、异丙基苯、醋酸冰片酯、微量的柠檬油精、樟脑、芳樟醇、乙酸里哪酯、龙脑、橙花醇。


    #### (5) 治疗功效

    1）杜松子精油可以用于镇定神经、缓解焦虑和神经紧张，以及精神疲劳。它有益于前列腺膨大，还能缓解因膀胱炎和肾脏结石引起的排尿不畅的症状。

    2）有助于分解脂肪团和排除体内多余的水分。

    3）对消化系统也有帮助，尤其适用于肥胖症，暴食者，以及经期前腹胀者。

    4）对于肝脏有滋补作用。可以调节经期和缓解经期疼痛。它有助于消除尿酸，因此能够缓解痛风、关节炎、风湿病引起的疼痛。

    5）对于痤疮、湿疹、油性皮肤、溃疡湿疹、牛皮癣和炎症都有疗效。


    #### (6) 使用注意事项

    它被认为是没有毒性的，但因为它能刺激子宫肌肉，要妇女应避免在孕期使用，肾脏有问题也要避免使用。它是没有光敏性的，但有些人对它有反应，所以要适度使用。


    #### (7) 用法

    杜松精油是一种很有价值的精油，可以用于神经紧张和焦虑、尿路感染、过量饮食和肥胖、清除尿酸和护理皮肤。它与泌尿生殖系统有密切的关系。研究表明，它可以促进肾小球的过滤功能，因而可以帮助排除体内过多的钾、钠和氢元素，尤其对前列腺效果更明显。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，杜松精油可以用于治疗上瘾，神经紧张、宿醉、饮食过量。在面临挑战的关键时刻使用，有振奋精神的作用。

    2）做复方按摩油或稀释在浴盆中使用

    杜松精油做复方按摩油或稀释在浴盆中使用，可以用于治疗胃部绞痛、关节炎，分解脂肪，缓解神经紧张，治疗膀胱炎，缓解排尿疼痛、痛风、宿醉、关节肿胀，治疗肝脏疾病、肌肉疲劳，也有减肥的作用。

    3）做面霜或润肤乳的成份

    用于面霜或润肤乳时，杜松精油适合护理油性和长有痤疮的皮肤，可以治疗溃疡性湿疹。'
  mdcn: '# 常用单方植物油


    牛至精油是以干燥的花部顶端为原料，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    香芹酚、麝香草酚、异丙基苯、罗勒烯和芳樟醇。


    ### (5) 使用注意事项

    从野牛至（Origanum vulgare）提取的和从西班牙牛至（Thymus capitatus）提取的牛至精油一样，对皮肤都有毒性，会刺激皮肤和黏膜组织，不应该在芳香疗法中使用，也避免在孕期使用。


    ## 21. 龙蒿精油


    龙蒿精油是从龙蒿植物（Artemisia dracunculus）中提取的，属于 Compositae 科。


    ### (1) 精油性质

    龙蒿精油有种青草般的辛辣气味，有些像茴芹的香味。


    ### (2) 来源

    它是一种多年生植物，喜欢生长在小溪和河流附近；茎木质化，可以长到约 1m 高。叶片银绿色、披有细绒毛，花淡黄色。


    它最初的英文名字叫 Estragon（也是龙蒿的意思），是由摩尔入侵者带到西班牙的。它的名字是从阿拉伯语 Tharkhoum 演变来的。它的拉丁语名字 Dracunculus
    意思是“小龙”，可能是它的根系卷曲时像龙的缘故。它的叶片一般用做内服药，也可以做醋。


    ### (3) 提取方法

    龙蒿精油是以叶片和花的上部为原料的，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    estragole（methyl chavicol），ocimene and phellandrene，cineoetc。


    ### (5) 治疗功效

    龙蒿精油能够刺激肠胃，能够促进消化，有助于治疗厌食、消化不良、肠胃气胀、打嗝和胃部痉挛，还可以缓解月经疼痛和调理月经周期。


    ### (6) 使用注意事项

    龙蒿精油没有刺激性和光敏性，但有一定的毒性，因为精油里含有 methylchavicol 成份，所以要适度使用，在孕期要避免使用。


    ### (7) 用法

    1) 在蒸汽治疗中或稀释在浴盆中使用

    在蒸汽疗法中或稀释在浴盆中使用，龙蒿精油有助于治疗消化不良和月经疼痛。


    2) 做复方按摩油

    龙蒿精油做复方按摩油，可以用于治疗消化问题和泌尿生殖系统的疾病。


    ### (8) 适合与龙蒿精油混用的精油


    ## 23. 欧蓍草精油


    欧蓍草精油是从欧蓍草植物（Achillea millefolium）中提取的，属于菊科。


    ### (1) **精油性质**

    欧蓍草精油味道辛辣、发甜，有水质般的黏性。


    ### (2) **来源**

    它是一种多年生植物，可以长到 1m 高，叶片革质、叶形类似于蕨类，头状花序，花多、粉红色或白色。它又被称为西洋蓍草，因为它形状犹如羽毛，在苏格兰被当作一种符咒，它有避免邪恶的力量。


    它有着医治百病的名声，可以用它治疗各种年龄段的各种疾病，甚至在一些瑞典啤酒中也加有欧蓍草。


    ### (3) 提取方法

    欧蓍草精油是以干燥的植物为原料，采用蒸汽蒸馏法提取的。


    ### (4) 治疗功效

    欧蓍草精油能够调理循环不畅，如静脉曲张和痔疮。它对月经不规律、更年期症、膀胱炎和感染有疗效。这种精油还有助于治疗消化系统方面的疾病，如肠胃气胀、疝气、腹部绞痛、消化不良和便秘。对于神经系统，它可以用于治疗有关精神压力方面的疾病，以及过度紧张和失眠症。它对皮肤也有好处，它能治疗发炎的伤口、皮疹、割伤、湿疹和烧伤，还能促进头发生长。


    ### (5) 使用注意事项

    不要在孕期使用欧蓍草精油。长期使用可能引起头疼，也会刺激敏感性的皮肤。


    ### (6) 用途

    欧蓍草精油有助于清除神经紧张，改进泌尿生殖器和消化系统状况，还能护理皮肤。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，欧蓍草精油有助于缓解压力，治疗失眠和消化系统方面的疾病。


    2) 做复方按摩油或稀释在浴盆中使用

    欧蓍草精油做复方按摩油或稀释在浴盆中使用时，可以用于治疗静脉曲张、痔疮、月经问题、消化系统失调、过度紧张、压力过大和皮肤问题。


    ### (8) 适合与欧蓍草精油混用的精油

    圆当归、柏木、橡树苔藓和马鞭草精油。


    ## 24. 晚香玉精油

    晚香玉精油是从晚香玉植物（Polianthes tuberosa）中提取的，属于石蒜科。


    ### (1) 精油性质

    晚香玉精油味沉，散发着稍带辛辣味的甜香味。


    ### (2) 来源

    晚香玉是一种高大、纤细、柔嫩的多年生植物，叶片细长，根系块茎状，花形与百合相似、巨大、芬芳，原野生于美国中部。目前在世界各地栽培，以获取鲜切花；但在埃及、中国、法国和摩洛哥还是作为提取精油的原料。


    ### (3) 提取方法

    固体和完全的晚香玉精油的提取方法是溶剂萃取法，以新鲜花为原料，原料是在花朵没有开放前采摘的。


    ### (4) 化学成份

    看叶醇及其乙醇酯、登花醇及其乙酯酯、全合欢醇、苯甲醇、苯甲酸甲酯、苯甲酸苄酯、水杨酸甲酯等。


    ### (5) 使用注意事项

    晚香玉精油一般不在芳香疗法中使用，但在香水工业中，它是一种很好的香水成份。据说，它有麻醉功效，不过还没有适当的安全使用数据。


    ## (六) 树脂类精油


    ### 1. 安息香精油


    安息香精油是从安息香树脂中提取出来的，安息香树（Styrax Benzoin）属于安息香科红皮属，又称为贝加明树脂、爪哇乳香。


    这种用树脂提取的精油有很强的镇静和提神的作用，能够帮助抚慰悲伤和孤独的情感；同时，也能刺激循环和调理呼吸系统的不畅。对恢复皮肤的弹性也有好处，可以淡化皮肤的红色，有止痒和止过敏的功效。


    #### (1) 精油性质

    安息香精油气味温和，有甜味，类似于香草的味道，香气平和，滞留期长。它的颜色金褐色，有点像蜂蜜的黏性。


    #### (2) 来源

    它主产于爪哇、苏门答腊岛（在印尼西部）和泰国，可以长到 8m 高。在树干上割深深的切口，一种浅灰色的树液就会从切口处渗出。当树脂变得坚硬和发脆时，就可以把它从树干上收集起来了。


    安息香树脂，是传统的熏香成份之一。在古代文明中，它经常被用来安抚愤怒的情绪，还是男修道士用的香水成份。它对呼吸系统也有好的作用。在现代香水工业中，它常常作为防止香味过快挥发的固定剂。


    #### (3) 提取方法

    安息香精油是从有 7 年树龄或更年长的安息香树的树脂中提取的，使用溶剂萃取方式，出油率在 65% ~ 85%。


    #### (4) 化学成份

    安息香、苯乙烯酸、苯甲基安息香酸盐、安息香醛、香草醛、苯基酯（60% ~ 80%），苯甲酸松柏酯、肉桂酸酯、安息香酸（10% ~ 20%）、芳香醛和微量香草素。


    #### (5) 用法

    1) 安息香精油对于抚慰神经系统紧张的治疗效果最好，对消化系统有帮助作用，对于循环系统和呼吸系统也有温和的疗效。

    2) 它能促进胰腺功能，进而可间接帮助消化系统工作，它是通过调控血糖浓度起的作用，这对于有糖尿病的人来说是很有价值的。

    3) 能增加皮肤的弹性，帮助开裂的皮肤愈合，进而有利于伤口的愈合。同时，可以淡化皮肤的红色、敏感性，减轻瘙痒。


    #### (6) 使用注意事项

    当需要精力集中时，要避免使用安息香精油，因为它有很强的放松功效。


    #### (7) 用法

    1) 香炉和蒸汽熏香

    在蒸汽疗法中，安息香精油能够用于治疗神经紧张，缓解压力，抚慰情绪。

    2) 作为复方按摩油和盆浴的添加成份

    安息香精油作为复方按摩油和盆浴的添加成份，能够帮助减轻关节炎和风湿病的疼痛；对于慢性支气管炎和咳嗽也有益处。受损的循环系统功能和肌肉僵硬的症状也可以从中受益。它还有镇静和扭转低落情绪的作用。此外，它还能给皮肤良好的呵护，包括增加皮肤弹力、降低红色、减轻敏感性和止痒，还能帮助伤口愈合。

    3) 做面霜的成份

    安息香精油对于干燥、龟裂性皮肤是一种良好的药物选择。它对于皮肤上的伤口也有帮助，还能缓解伤口疼痛、降低皮肤的敏感性，增加皮肤的弹性，并起到止痒的作用。


    #### (8) 适合与安息香精油混用的精油

    香柠檬、芫荽、乳香、刺柏、薰衣草、柠檬、没药、柑橘、酸柠檬叶、玫瑰和檀香精油。


    ### 2. 榄香精油


    榄香精油是从榄香树（Canarium luzonicum、C. commune）的树脂中提取的，属于橄榄科，又称为马尼拉榄香。


    #### (1) 精油性质

    榄香精油味道类似于柑橘属植物，稍带辛辣，颜色暗淡。


    #### (2) 来源

    原产于菲律宾岛，热带树种，可以长到 30m 高。当树萌芽时，从树上渗出淡黄色的树脂。当树脂遇到空气时，开始凝固。到落叶季节时，树脂开始停止渗出。


    榄香树当地人称其为 Pili（马尼拉语），意思是“卵橄榄（树）或爪哇苦杏仁”，树脂从马尼拉出口，以两种形式，一种是 Primera（马尼拉语），也就是干净的树脂；另一种是
    Secunda（马尼拉语），也就是未加工的和不干净的原料。古埃及人用榄香精油做尸体的防腐剂。如今，人们在制造熏香材料、肥皂和清漆的时候会用到它。


    #### (3) 提取方法

    榄香精油是以树脂为原料，采用蒸汽蒸馏法提取的。


    #### (4) 化学成份

    松油醇、榄香素、榄香醇、二戊烯、水芹烯和柠檬油精。


    #### (5) 治疗功效

    榄香精油可以用于治疗呼吸道问题，如支气管炎、干咳和黏液过多。它对于出汗过多、切伤、创伤和皮肤感染也有帮助，对皮肤有返老还童的功效。它可以缓解精疲力竭和减轻压力，给人一种安宁的感觉。


    #### (6) 使用注意事项

    榄香精油对敏感性皮肤有刺激作用。


    #### (7) 用法

    榄香精油可以用于治疗呼吸道感染和皮肤问题，还有振奋精神的作用。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，榄香精油可以用于治疗和呼吸道方面的疾病。

    2）做复方油或稀释在盆浴中使用

    榄香精油可以用在复方按摩油的成份中，或稀释在盆浴中使用，有助于治疗和呼吸道疾病，缓解压力，治疗皮肤感染。


    #### (8) 适合与榄香精油混用的精油

    乳香、薰衣草、迷迭香、没药和鼠尾草精油。


    ### 3. 没药精油


    没药精油是从没药植物（Commiphora myrrha，Commiphora molmol and Balsamodendron myrrha）中提取的，属于橄榄科。


    没药精油是具有传奇色彩的精油，它不但可以震撼你的灵魂，而且对女性疾病、皮肤问题，排除体内毒素和黏液有很好的疗效。


    #### (1) 精油性质

    没药精油有种温和的、略带霉味的气味，颜色淡黄色或琥珀色。


    #### (2) 来源

    它的树体不高，大约 5m，树皮浅色，分枝多结，叶片少，花小、白色。它起源于索马里、阿拉伯半岛和也门。树皮被割后，淡黄色液体状的树脂就会流出，变干后就成为微红色或褐色的硬块，有胡桃大小，精油就是从这里提出的。


    在古代的时候，没药非常受欢迎，常被中国人和埃及人当药材使用。还是埃及人举行太阳神庆典和制作木乃伊时也用它。它也被用于化妆品。希腊战士随身带着一小瓶没药精油，用于伤口的止血。


    #### (3) 提取方法

    没药精油是以树脂为原料的，采用蒸汽蒸馏法提取，出油率在 3% ~ 5%。


    #### (4) 化学成份

    松萜或蒎烯、杜松（萜）烯、柠檬油精、对异丙亚苄基丙二酸、丁子香酚、甲酚、乙酸、蚁酸、其他倍半萜烯和酸。


    ### （6）使用注意事项

    没药精油没有毒性和刺激性。但大剂量使用时会有毒性。避免在孕期使用。


    ### （7）用法

    没药精油的最强功效在于治疗呼吸系统疾病、消化系统、齿龈和口腔失调、皮肤护理，以及泌尿生殖器和月经问题。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，没药精油可以用于治疗支气管炎、黏膜炎、感冒和咳嗽。对于提高灵性也有帮助，尤其在思考问题的时候最有帮助。

    2）做复方按摩油或稀释在浴盆中使用

    没药精油做复方按摩油或稀释在浴盆中使用，可以用于治疗支气管炎、黏膜炎、感冒、咳嗽和感染，以及上面所列的各种妇科疾病。对皮肤的使用效果也很好。

    3）做漱口水

    用作调配漱口水的成份时，可治疗所有牙齿的感染。

    4）做冷敷材料

    没药精油可以稀释后用做冷敷材料，用于治疗疼痛，护理皮肤和伤口。

    5）做面霜或润肤乳的成份

    用作面霜或润肤乳的成份，在治疗慢性炎症和溃疡时，会有令人惊奇的效果。它可以加速伤口的愈合，清除脚气，治疗发生溃疡的湿疹。用在治疗褥疮、深的皮肤裂缝、疖子、痈、痤疮和所有其他的皮肤疾病上。也可以用棉签直接蘸些，在伤口和其他皮肤感染上使用。


    #### (8) 适合与没药精油混用的精油

    安息香、乳香、薰衣草、檀香和丁香精油。


    ### 4. 乳香精油


    它是从乳香树（Boswellia carteri）的树脂中提取的，属于橄榄科。


    它是芳香疗法中长期受人喜爱的精油之一。这种精油有着完美地稳定情绪的效果，可以帮助创造一种内在的安宁，还有助于抚慰呼吸道和泌尿系统方面的疾病，能缓解同风湿病和肌肉有关的疼痛，对皮肤有返老还童、平衡和治疗的作用。


    #### （1）精油性质

    乳香精油味道辛辣，有木头的清香味，令人不易忘怀。还含有一点樟脑味，但很令人愉快。颜色为淡黄绿色。


    #### （2）来源

    它原产于中东地区，叶片裂深、呈多尖塔形，花朵白色或淡粉红色。在树干上制造很深的切口，可把树皮呈条状剥离。几周后，将从切口处渗出乳白色的汁液，当与空气接触后就成为块状，如同人造黄油一样，精油就是从中提取出来的，采用蒸汽蒸馏法提取精油。


    乳香的英文单词 frankincense 来源于法语单词 Franc，是“奢华的”或“真正的熏香”的意思，与没药一起，是作为熏香材料使用到的树脂。乳香常被古埃及人当作给上帝的奉献物，还用于制作返老还童的面膜。也用于给病人熏香，以驱除邪恶的灵魂。圣经新约中的希伯来书给乳香的评价很高：“它是献给耶稣婴儿时候的贡献品之一。”


    #### (3) 提取方法

    乳香精油是以树脂为原料，采用蒸汽蒸馏法提取的，出油率在 3% ~ 10%。


    #### (4) 化学成份

    松萜或蒎烯、芳樟醇、辛基醋酸酯、醋酸冰片酯。


    #### (5) 治疗功效

    1) 乳香精油可以抚慰和镇静情绪，放慢和加深呼吸，当深思熟虑时使用，效果良好。它也有助于平缓焦虑情绪，把回忆过去的分神状态拉回到现实中。

    2) 对于呼吸系统，它可以洁净肺部，有助于缓和呼吸急促、哮喘、支气管炎、喉炎、咳嗽和感冒症状。

    3) 它可以调理月经量过多症状，是一种常用的子宫滋补剂。在疲劳时使用，有解乏的效果。它对风湿病有很好的疗效，对尿路感染也有积极的影响。


    乳香精油对皮肤有返老还童的效果，是一种皮肤滋补品，对于疼痛、痈、创伤、伤疤和皮肤感染都有疗效。


    #### (6) 使用注意事项

    乳香精油没有毒性和刺激性，可以被多数人使用。


    #### (7) 用法

    乳香精油是真正能镇静和抚慰全身以及情绪的精油之一。它可以缓和所有的疼痛，清洁肺部，用作皮肤的滋补品。

    1) 香炉和蒸发器熏香

    在蒸汽疗法中，乳香精油常被用于治疗支气管炎、感冒、咳嗽和失声，以及稳定情绪，减轻焦虑和培养内心的安宁。

    2) 做复方按摩油或稀释在盆浴的成份

    乳香精油可以用在复方按摩油或稀释在浴盆中，治疗感冒、咳嗽、支气管炎、风湿病、去寒、不良循环、精疲力竭、做噩梦、过多排汗、呼吸问题和黏膜充血。它对皮肤也有好的收敛效果，使皮肤重新焕发光彩，有助于治疗创伤、疼痛和溃疡。

    3) 做面霜和洗液的添加成份

    乳香精油可以添加在底料面霜或洗液中，用作常规的皮肤护理，可以减轻皮肤分泌油脂的程度，使皮肤恢复生机，同时有助于加速愈合创伤和溃疡，缓解疼痛。

    4) 洗涤或用作外敷配料

    为了促进愈合，防止在创伤处留有伤疤，在清洗伤口的时候，可以在水中添几滴乳香精油。对于破裂性肌肤和褥疮，把精油适当稀释后，可以轻轻地直接涂抹在受伤处，或作为外敷配料使用。


    #### (8) 适合与乳香精油混用的精油

    安息香、檀香、薰衣草、没药、松树、柑橘、香柠檬和柠檬精油。


    ## (七) 木本类精油


    ### 1. 杜松子精油


    杜松子精油是从杜松植物（Juniperus communis）中提取的，属于柏科刺柏属，又称为红松或欧洲刺柏。


    这种清新的精油在芳香疗法中，有助于刺激和加强神经系统功能，在面临挑战的关键时刻使用，有振奋精神的作用，有利于排尿。它还可以用于治疗风湿性病、关节炎、痛风、痤疮、皮炎、毛孔堵塞和湿疹，对于分解脂肪团也有疗效。


    #### (1) 精油性质

    杜松精油可以从浆果、针叶和木材中提取。从浆果中提取的精油要比从嫩枝、针叶提取的精油质量更好。它的气味新鲜、清爽，稍微带些木头香味，颜色浅，水质黏性。


    #### (2) 来源

    它是一种常绿灌木，野生状态可以长到10m高，人工栽培控制在2m的高度，叶片蓝绿色、针状，小花黄色，雌株结蓝黑色的果实（浆果）。主要产地为克里埃西亚。


    作为一种草药，它有很高的医用价值，可以用于治疗传染性的疾病，如霍乱、因伤寒引起的发烧，在西藏和欧洲还用它治疗瘟疫。在蒙古妇女开始分娩的时候，会给一些杜松枝。在南斯拉夫，它被看成是一种万能药。在法国医院，燃烧杜松枝以净化空气。它还是著名的杜松子酒的成份。


    #### (3) 提取方法

    杜松子精油是以干燥的、新鲜或轻微干燥的成熟果实为原料的，采用蒸汽蒸馏技术提取的，出油率在 0.2% ~ 2%。


    #### (4) 化学成份

    松萜或蒎烯、茨烯、桧烯、月桂烯、水芹烯、萜品烯或松油烯、桉树脑、异丙基苯、醋酸冰片酯、微量的柠檬油精、樟脑、芳樟醇、乙酸里哪酯、龙脑、橙花醇。


    #### (5) 治疗功效

    1）杜松子精油可以用于镇定神经、缓解焦虑和神经紧张，以及精神疲劳。它有益于前列腺膨大，还能缓解因膀胱炎和肾脏结石引起的排尿不畅的症状。

    2）有助于分解脂肪团和排除体内多余的水分。

    3）对消化系统也有帮助，尤其适用于肥胖症，暴食者，以及经期前腹胀者。

    4）对于肝脏有滋补作用。可以调节经期和缓解经期疼痛。它有助于消除尿酸，因此能够缓解痛风、关节炎、风湿病引起的疼痛。

    5）对于痤疮、湿疹、油性皮肤、溃疡湿疹、牛皮癣和炎症都有疗效。


    #### (6) 使用注意事项

    它被认为是没有毒性的，但因为它能刺激子宫肌肉，要妇女应避免在孕期使用，肾脏有问题也要避免使用。它是没有光敏性的，但有些人对它有反应，所以要适度使用。


    #### (7) 用法

    杜松精油是一种很有价值的精油，可以用于神经紧张和焦虑、尿路感染、过量饮食和肥胖、清除尿酸和护理皮肤。它与泌尿生殖系统有密切的关系。研究表明，它可以促进肾小球的过滤功能，因而可以帮助排除体内过多的钾、钠和氢元素，尤其对前列腺效果更明显。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，杜松精油可以用于治疗上瘾，神经紧张、宿醉、饮食过量。在面临挑战的关键时刻使用，有振奋精神的作用。

    2）做复方按摩油或稀释在浴盆中使用

    杜松精油做复方按摩油或稀释在浴盆中使用，可以用于治疗胃部绞痛、关节炎，分解脂肪，缓解神经紧张，治疗膀胱炎，缓解排尿疼痛、痛风、宿醉、关节肿胀，治疗肝脏疾病、肌肉疲劳，也有减肥的作用。

    3）做面霜或润肤乳的成份

    用于面霜或润肤乳时，杜松精油适合护理油性和长有痤疮的皮肤，可以治疗溃疡性湿疹。'
