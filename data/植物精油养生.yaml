- md: '## 2. 精油浓度的选择


    1) 香水、梳妆水或是科隆香水的分类，要以它们所含香气的强度和所含香精的百分比为依据的。


    2) 对于香水，可以使精油的浓度达到 15% 左右，而对于味道较淡的梳妆水，使用浓度可以是 4%~8%，科隆香水用 1%~5% 浓度。


    3) 如果想计算百分率，1mL 液体相当于 20 滴。在换算过程中，要把所有添加进去的油也计算在底料中，如酒精或伏特酒或荷荷芭油，然后换算成滴数。


    4) 在调配复方油时，要先准备好一些配方、玻璃瓶、盖子，以及贮存的条件。


    ## 3. 香水配方


    ### （1）流传久远的科隆香水配方


    16 滴香柠檬、15 滴酸柠檬叶、2 滴柑橘、15 滴薰衣草、5 滴橙花油、10mL 柑橘花水、230mL 酒精或伏特加酒。


    **配制方法**


    先把底料酒精或伏特加酒倒入玻璃混合器中，添加上面所列的精油，然后混匀。装入瓶中，盖好盖，把混合物放置 4 天，然后加柑橘花水，再盖好盖子。使用前，至少要把这种混合物放置
    2 周以上，每天要轻轻摇晃瓶底。


    ### （2）“全活力”香水配方


    4 滴甜柑橘、10 滴柠檬、6 滴柑橘、8 滴橘子、5 滴乳香、1 滴没药、11mL 酒精或伏特加酒、11mL 荷荷芭油做香水的底油。


    **配制方法**


    先把底料倒入玻璃混合器中，按照顺序添加上面所列的精油，然后混匀。装入瓶中，盖好盖，就可以使用了。也可以减少底料的用量，但所加精油的浓度不能超过 15%。


    ### （3）为女士制作的煽情香水配方


    5 滴芫荽、6 滴香柠檬、4 滴橙花、1 滴复方茉莉、3 滴复方玫瑰、10mL 荷荷芭油。


    **配制方法**


    先把底料倒入玻璃混合器中，按照顺序添加上面所列的精油，然后混匀。装入瓶中，盖好盖。放置 1 周后，就可以使用了。


    ### （4）为男士制作的煽情科隆香水配方


    10 滴薰衣草、20 滴芫荽、22 滴檀香、23 滴雪松、5 滴乳香、100mL 酒精或伏特加。


    **配制方法**


    先把酒精或伏特加倒入玻璃混合器中，按照顺序添加上面所列的精油，然后混匀。在某些情况下，是可以使用人工合成物的，因为一些花的完全精油，如玫瑰和茉莉，每盎司的售价能达到数千美元。你也可以做一些仿制的香料，如康乃馨气味就可以用相同数量的黑胡椒、依兰和微量的天竺葵制成。


    ## 4. 调配程序


    精油的浓度很高，价格也很昂贵，在平时的应用时，我们很少用纯精油，都是先将精油稀释。现在，就让我们一起来学习一下调和精油的程序：


    **（1）调和各种精油的程序：**

    ① 准备好精油、空瓶及基础油；

    ② 将各种精油滴入空瓶里，盖好瓶盖，用双手滚搓瓶身，以彻底混合精油分子；

    ③ 加入基础油至正好超过瓶身与瓶颈交界处；

    ④ 盖好瓶盖，用双手迅速滚搓瓶子，以彻底混合精油及基础油。


    **（2）浓缩调和精油的调制程序：**

    ① 准备好精油及小型的深色空瓶。

    ② 将精油依照所需的滴数滴入空瓶里，注意应先加入较黏稠的精油。

    ③ 盖好瓶盖，用双手滚搓均匀，以彻底混合精油。

    ④ 倒置油瓶。

    ⑤ 瓶口朝上放置。


    **（3）单一精油稀释为按摩油的调制程序：**

    ① 将基础油倒入空瓶，直到油满至瓶颈为止。

    ② 加入精油。

    ③ 盖好瓶盖，用双手迅速滚搓瓶身，以彻底混合精油及基础油。


    ## （四）复方精油调香的注意事项


    当你在调配复方精油或给自己调配精油面霜时，你可能希望把一种精油的某些治疗功效也添加进去。这样，当把不同的精油混合在一起的时候，就能创造出某种协同增效的优势。不过，你可能仅注意到复方精油的治疗功效，不会想到香味也是需要“平衡”和协调的，这就是调香时要注意的问题了。在
    19 世纪，一位法国人根据音乐音阶的高低划分了精油香味的类别，这就是高音、中音和低音香味划分的来源。


    首先，要协调好混合体中高音、中音和低音香味之间的搭配，从这 3 个类别中挑选精油时，要注意，高音型和中音型精油的使用量要小于低音型精油。


    其次，一种丰富的香味应使高音香型精油占到 15%~25%，中音香型精油占到 30%~40%，低音香型精油占到 45%~55%。例如，用 4 滴天竺葵（中音香）、3
    滴尤加利（高音香）和 5 滴依兰（低音香）这样的比例。值得注意的是配制复方精油是要使用的，你必须喜欢才行。因为它只有令你的感觉器官喜悦才能发挥出最大的功效。比如，如果你想配制一种冬天使用的按摩油，你可能想到要在复方油中加一些椒样薄荷精油，但因为椒样薄荷精油是一种凉性油，你就需要用其他的油来平衡，如姜和檀香。


    最后，一种好的复方精油，通常是由三类精油调配而成，要同时含有高音香、中音香、低音香 3 种精油。


    ### 1. 高音香


    属于高音香的精油一般挥发速度很快，通常具有抗病毒的功效。它们共同的性质趋向于味道清新，有振奋精神的作用，价格一般也不昂贵。高音香精油通常挥发性强，起作用快，是复方油最先留给你的印象，但香味持续时间短。下列精油被认为属于高音香型：佛手柑（到中香）、葡萄柚、柠檬、酸柠檬、橙花（到中香）、酸柠檬叶、椒样薄荷、荷兰薄荷、茶树（到中香）、尤加利、罗勒（到中香）、白千层、肉桂、快乐鼠尾草（到中香）、芫荽（到中香）、牛膝草、柠檬香茅（到中香）、中国柑橘、绿花白千层、柑橘、鼠尾草、万寿菊、橘子、没药（到中香）和马鞭草精油。


    ### 2. 中音香


    大多数精油被认为是中音香型的，通常给身体的感觉是混合香的，具有平衡的功能。中音香型精油的气味不是立刻就能闻到的，可能需要两分钟的时间才能闻到，气味通常温和、柔顺。下列精油被认为属于中香型：松树、丝柏、茴香（到前香）、天竺葵、薰衣草、迷迭香、洋甘菊、甘草、黑胡椒、小豆蔻、牛膝草、刺柏、牛至、蜜蜂花、肉豆蔻、棕榈玫瑰、甘松和欧蓍草精油。


    ### 3. 低音香


    属于低音香型的精油，它们的气味一般都比较“沉”，扩散速度也慢，持续时间长，能使其他精油的蒸发速度也降下来。通常，它们的香味强烈、稳固和丰富，具有放松的功效，也是精油中价格最贵的部分。下列精油被认为是低香型的：雪松、乳香、檀香、生姜（到中香）、茉莉、玫瑰、依兰（到中香）、广藿香、桂皮（到中香）、肉桂（到中香）、丁香、没药、花梨木（到中香）、颉草、香根草精油。


    ## 植物精油在芳香按摩中的应用


    调配精油的时候不能单纯依赖香型，因为有些沉香型精油，精油的香味十分强烈，有时候是让人无法抗拒的。当用到这些芳香强烈的精油时，最好每次添加 1 滴，以防止它的气味把你的整个复方油的味道都掩盖了。


    调制复方精油是件有趣的事情，但要记住，调制的结果应该是你喜爱的味道，所以如果你没有按照“原则”使用不同香型的精油，是没有问题的。这些原则仅仅是你单独配制时的指导意见。


    ### （五）单方精油的香味分级


