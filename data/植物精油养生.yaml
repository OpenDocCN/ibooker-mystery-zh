    ### (8) 适合与姜油混用的精油

    香柠檬、乳香、橙花油、玫瑰、檀香和依兰精油。


    # ### 12. 枯茗精油


    枯茗精油是从枯茗植物（Cuminum cyminum）中提取的，属于伞形科，又称为孜然芹、欧莳萝和罗马香菜。


    ### (1) 精油性质

    它的味道辛辣，穿透力很强。


    ### （2）来源

    最初起源于地中海地区，它是一种一年生植物，高约50cm，叶片深绿、细长、革质，花朵微小、白色或粉红色，果实小、椭圆形。在圣经诞生时期，它就是一种知名的植物，主要被用于治疗消化系统的疾病。埃及人用它治疗头痛。古代犹太法利赛教派的教徒用它来交税。在中世纪，封建制度下的地主用它给农奴支付薪水。枯茗是印度咖喱饭的主要成份，还被作为墨西哥民族器皿的图案。


    ### （3）提取方法

    枯茗精油是以干燥的种子为原料的，采用蒸汽蒸馏法提取。


    ### (4) 化学成份

    枯（茗）酸、异丙基苯、二戊烯、柠檬油精、水芹烯和松萜。


    ### (5) 治疗功效

    枯茗精油被当作暖油使用，帮助缓解肌肉和骨关节炎疼痛。用在消化系统方面，它会发挥刺激作用，有助于治疗疝气、消化不良、肠胃胀气和肚胀。对于神经系统，它是一种滋补品，对头痛、偏头痛和精神疲惫有良好的疗效。


    ### (6) 使用注意事项

    枯茗精油有种无法抵挡的气味，所以要使用非常小的剂量。不过它被认为是无毒、无刺激性和过敏反应的精油。具有光敏性，皮肤使用后避免暴露在阳光下。皮肤过敏的人和孕妇都应避免使用。


    ### （7）用法

    枯茗精油有利于消化系统，可以作为神经系统的滋补品，能缓解肌肉疼痛。在蒸汽治疗中，枯茗精油有助于消化系统、神经系统和肌肉系统。


    ### (8) 适合与枯茗精油混用的精油

    圆当归、香菜和甘菊精油。


    # ### 13. 小豆蔻精油


    小豆蔻精油从小豆蔻植物（Elettaria cardomomum）中提取，属于姜科。


    ### （1）精油性质

    小豆蔻精油味道甜、辛辣，有股香油味；油质清澈，颜色淡黄，稍具水质黏性。


    ### (2) 来源

    小豆蔻是一种多年生的，类似于芦苇的植物，多为野生，在印度和锡兰（印度以南一岛国，现已更名为斯里兰卡，首都为科伦坡），有人工栽培。它可以长到4m高，叶片长、绿色、柔软似刀片，小花黄色、尖端紫罗兰色，肉质根茎与姜相似。果实灰色椭圆形，内含多枚种子。在远古时期，小豆蔻就已成名，埃及人用它制作香水和熏香，放在口中咀嚼以美白牙齿；而罗马人用它养胃，尤其是当饮食过度时使用。阿拉伯人种植小豆蔻，为他们的咖啡增香。它是亚洲人饮食的成份。当葡萄牙人在东方发现它后，是
    Valerius Cordus 首先在1544年蒸馏出小豆蔻精油的。


    ### （3）提取方法

    小豆蔻 Elettaria cardomomum

    小豆蔻精油是以种子为原料，采用蒸汽蒸馏法提取的，出油率在1%～5%。种子是在果实即将成熟之前采收的。


    #### (4) 化学成份

    松萜或蒎烯、桧烯、月桂烯、水芹烯、柠檬油精、桉树脑、不旋油精、百里香素、异油松烯、芳樟醇、乙酸里哪酯、萜品烯或松油烯、松油醇、醋酸松油脂、香茅醇、橙花醇、香叶醇、甲基丁子香酚和橙花油。


    #### (5) 治疗功效

    小豆蔻精油对消化系统尤其作用明显，能够放松和平缓疝气，治疗消化不良和恶心，尤其是在孕期的恶心、呕吐。它还可以暖胃和有助于缓解心痛。小豆蔻精油的化痰功能可以用于治疗咳嗽。它也是知名的治疗阳痿和性冷淡的药剂。当感觉到身体虚弱和精神疲倦时，小豆蔻精油可以恢复体力和振奋精神。


    #### (6) 使用注意事项

    小豆蔻精油没有毒性、过敏性和刺激性。


    #### （7）用法

    小豆蔻精油最大的利用价值在于治疗消化系统方面的疾病，也能有助于治疗咳嗽和感觉迟钝。

    1) 香炉和蒸发器熏香

    在蒸汽疗法中，小豆蔻精油可以治疗消化系统疾病，咳嗽和疲劳。

    2) 做复方油或盆浴的添加成份

    作为按摩油或稀释在浴盆中使用，小豆蔻精油可以治疗消化系统疾病和咳嗽，也可以当作一般的滋补品。在洗浴中使用效果非常好，可以让你会有新鲜和激励的感觉。


    #### （8）适合与小豆蔻精油混用的精油

    玫瑰、柑橘、香柠檬、丁香、香菜和雪松精油。


    # **14.葛缕子精油**


    葛缕子精油是从葛缕子植物（Carum carvi、Apium carvi）中提取的，属于伞形科，又称藏茴香和黄蒿。这种温和的精油有助于缓解精神压力和疲劳，还能帮助消化，对泌尿系统和呼吸系统也有好处。同时，应用在皮肤或头皮上，效果良好。


    ### （1）精油性质

    葛缕子精油味道辛辣，有甜味，有些像胡椒的味道。


    ### (2) 来源

    葛缕子一年可以完成两个生命周期，起源于亚洲。但现在主要在北欧、非洲和俄罗斯栽培。株高60cm，叶片柔软，类似于蕨类植物，伞形花序白色或粉红色，果实小、褐色。它是一种古老的植物，又称草地孜然芹，以辛辣著称，远在石器时代就有应用，而埃及人用它作为食物调味料，罗马人在制作面包时也会用到葛缕子。到中世纪时，德国和澳大利亚人在烹饪中使用。传统上，这种植物被认为与保持好视力有关，还有清新口腔的作用。


    ### (3) 提取方法

    葛缕子精油以干燥的种子为原料，采用蒸汽蒸馏法，出油率在 2% ~8%。


    ### （4）化学成份

    40% ~60% 香芹酮或葛缕酮、乙醛、糠醛和柠檬油精。


    ### (5) 治疗功效

    1）葛缕子精油能平缓神经，抚慰精神疲劳；还能健胃、帮助消化；治疗疝气、胃肠气胀和胃痉挛。

    2) 用作化痰剂时，对支气管炎、支气管哮喘和咳嗽有效。也可用于治疗咽喉疼痛、喉炎、尿路感染、清除毒素。

    3）它可以使哺乳期的母亲增加乳汁分泌量。人们发现，它可以减轻妇女经期的疼痛。

    4）它是有效的组织再生剂，可以用于油性皮肤；能消除瘀伤，减轻疖子，洁净受感染的伤口。此外，它可以缓解皮肤发痒，帮助清除粉刺和伤疤。


    ### (6) 使用注意事项

    虽然它没有毒性和光敏性，但使用浓度过高，也会引起皮肤产生敏感反应。


    ### （7）用法

    葛缕子精油最有效的功能是平息和抚慰神经和消化系统。作为一种化痰剂，有助于呼吸系统问题的解决，也有助于治疗尿路问题，当然对皮肤的利用价值也很大。

    1）香炉和蒸发器熏香

    在蒸汽疗法中，葛缕子精油可以做一种滋补剂，用于抚慰神经，帮助消化系统和尿路系统，同时也能改善呼吸系统。

    2) 做复方按摩油或盆浴的添加成份

    葛缕子精油可以做复方按摩油或盆浴的添加成份，可以用于治疗周期性的月经疼痛、消化问题、呼吸系统充血。同时对皮肤也是一种滋补剂。

    3）做面霜的成份

    作为面霜的成份时，有助于治疗皮肤发痒、疤伤，以及其他的一些问题，如粉刺；还能减轻瘀伤。还可刺激皮肤再生，有利于消除岁月的痕迹。


    ### (8) 适合与葛缕子精油混用的精油

    罗勒、甘菊、芫荽、乳香、姜、薰衣草和柑橘精油。


    # ### 15. 莳萝精油


    莳萝精油是从莳萝植物（Anethum sowa）中提取的，又称为印度莳萝。在芳香疗法中的精神治疗方面，莳萝精油可以使人们从受打击的情绪中解脱出来，在有重大决定的时刻使用效果也很好。对于身体，它有助于消化系统的治疗，如缓解便秘、消除胃肠胀气和打嗝。它可以促进皮肤伤口的愈合。


    ### （1）精油性质

    莳萝精油有股青草的味道，颜色淡黄，水质黏性。


    ### (2) 来源

    最初产于亚洲的西南部，莳萝是种一年生或二年生植物，可以长到约 1m 高，叶片绿色、革质，伞形花、小、黄色，种子微小、扁形。它很受埃及人、希腊人和罗马人的喜爱，被称为
    Anethon，莳萝植物的拉丁文就是从这演化过来的。它的俗称来源于盎格鲁撒克逊语 dylle 或 dylla，后来演变成"dill"。单词的意思是“使安静”，有使人宽心的功效。在中世纪，它被当作一种符咒来抵抗魔法。从
    1812 年开始，当法国皇帝查理曼大帝（742～814 年）命令广泛种植这种植物后，它得到广泛的应用，尤其是用于烹饪。


    ### （3）提取方法

    莳萝精油主要是以种子或整株植物（新鲜的或部分干燥）为原料，采用蒸汽蒸馏法提取的。我们提到的莳萝精油是以压碎的种子为原料，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    香芹酮、丁丁香酚、柠檬油精、松油精和肉豆蔻醚。


    ### （5）治疗功效

    1）它能平缓情绪，缓解头痛，减轻因过度紧张而过多地流汗。

    2）人们经常用新鲜植物压榨出来的水给婴儿和儿童治疗疝气，或其他消化系统的疾病。

    3）莳萝精油对成人的消化问题也有帮助，如可以消除胃肠胀气、便秘和打嗝。

    4）它也能刺激哺乳母亲乳汁的分泌，并有促进伤口愈合的功效。


    ### （6）使用注意事项

    莳萝精油没有毒性、没有刺激性和过敏性，但应避免在孕期使用。


    ### (7) 用法

    莳萝精油可以平缓和镇静神经，对成人消化问题有益处，还可以治愈伤口。

    1）香炉和蒸发器熏香

    莳萝精油可以在蒸汽疗法中治疗神经紧张、疝气和消化系统方面的疾病，尤其是情绪低落和异常紧张。

    2）做复方按摩油或稀释在盆浴中

    它可以发挥重大的作用，尤其在促进和平缓消化功能，消除肠胃胀气、便秘和打嗝方面。

    3) 做面霜和润肤乳的添加成份

    混在面霜和润肤乳中使用时，它对于治疗伤口有非常好的效果。


    ### (8) 适合与莳萝精油混用的精油

    香柠檬、香菜、肉豆蔻和其他柑橘属植物精油。


    # ## 16. 苦扁桃仁精油


    扁桃仁（苦的）精油是从扁桃树植物（Prunus amygdalus var. amara）种仁中提取的，属于蔷薇科。这种精油有毒。


    ### (1) 精油性质

    苦扁桃仁精油含有氢氰酸，是一种氢化物，有毒。


    ### （2）来源

    苦扁桃树原产于亚洲西部和非洲北部，目前在西班牙、土耳其、墨西哥和埃及广泛种植。从扁桃壳中取仁，用压榨法制成不挥发的油。先用碱洗扁桃仁，把氢氰酸去掉，然后再精馏，这样制得的扁桃仁油常常做食物的调味品使用。


    ### （3）提取方法

    采用压榨法提取，不挥发油的出油率大约是30%，与甜杏仁油相似。也可以用蒸馏法产出大约1%的苦扁桃仁精油。


    ### (4) 化学成份

    安息香醛（苯甲醛）和氢化物（氢氰酸）。


    ### （5）使用注意事项

    苦扁桃仁精油绝不能在治疗中使用。人体摄取7.5ml的苦扁桃仁精油就会死亡，所以要小心使用。


    # ## 17. 菖蒲精油


    菖蒲精油是从菖蒲植物（Acorus calamus var. angustatus）中提取的，属于天南星科。


    ### (1) 精油性质

    菖蒲精油具有温和、辛辣的香味，犹如森林散发出的甜香味道。


    ### （2）来源

    菖蒲是一种多年生、半水生的植物，常生长在沼泽地。原产于北欧和亚洲。这种植物的根系常在草药医学中用于治疗眩晕、头痛、痢疾以及神经系统的疾病。


    ### (3) 提取方法

    菖蒲精油以新鲜根系为原料，或以带皮的干燥根系为原料，采用蒸汽蒸馏法提取的。


    ### （4）化学成份

    菖蒲酮、古芸烯、细辛醚、菖蒲萜烯、芹子烯。


    ### （5）使用注意事项

    菖蒲精油不能在芳香疗法中使用。这种精油含有细辛醚，是一种致癌物质，口服能导致抽搐，对肝脏和肾脏有害。当把菖蒲精油按每日进食量的0.05%~0.5%的比例添加到老鼠的饲料中，经过59周，可导致老鼠十二指肠发生恶性肿瘤。口服这种精油可以导致严重的颤动持续30分钟至2个小时。


    # ### 18. 芥菜精油


    芥菜精油是从芥菜植物（Brassica nigra、Sinapsis nigra and Brassica sinapioides）中提取的，属于十字花科。


    ### (1) 精油性质

    芥菜精油是种危险的油，因为它含有高浓度的烯丙基异硫氰酸酯成份。


    ### （2）来源

    它是一种一年生的植物，茎多分枝，叶片浅裂、形状有些像小竖琴，高16cm。在整个夏天都开着鲜亮的黄色花朵，结直立的4角型小豆荚，种子黑褐色。在草药学中，种子被用于治疗消化系统，有开胃的作用，能治感冒、打寒战、冻疮、风湿病、关节炎、腰痛。


    ### （3）提取方法

    芥菜精油是以黑色的芥菜种子为原料的，先把种子在温水中浸软，然后采用蒸汽或水蒸馏法提取。虽然芥菜种子和粉末不含烯丙基异硫氰酸酯成份，但制造精油时，种子与水接触后，在酶的作用下会产生这种物质。在新鲜种子或粉末中是不含这种有毒成份的。白色的芥菜种子不含有任何的精油。


    ### （4）化学成份

    含有大于92%的烯丙基异硫氰酸酯成份。


    ### (5) 使用注意事项

    当芥菜精油用做吸入疗法时，它会在大脑枕骨的地方产生极端不愉快的感觉，会使眼睛黏膜和呼吸系统黏膜发生感染。当用于皮肤时，会产生灼烧的感觉，所以应该避免在芳香疗法中使用。作为一种精油，它是有毒的，因为它含有高浓度的烯丙基异硫氰酸酯成份，会对皮肤和肌肉黏膜产生刺激。


    # # 19. 艾菊精油


    艾菊精油是从艾菊植物（Tanacetum vulgare、Chrysanthemum vulgare and C. tanacetum）中提取的，属于菊科。


    ### (1) 精油性质

    艾菊精油有辛辣的香味。


    ### （2）来源

    这种生命力顽强的多年生植物原产于欧洲，可以长到1m高，茎光滑，叶片类似于蕨类、黑绿色，花朵丛生、小、圆形、亮黄色。整株植物都散发着强烈的气味，吉卜塞人把它当作一种万能药。过去，它被用来驱逐昆虫，治疗消化不良、感冒和发烧的症状，预防流产。艾菊精油含有高浓度的
    thujone 成份，它是有毒的，能引起抽搐、呕吐和子宫出血。如果刺激到呼吸系统和伤害到其他器官都会有生命的危险。


    ### (3) 提取方法

    艾菊是以整株植物为原料，采用蒸汽蒸馏法提取的。


    ### （4）化学成份

    thujone, isopinocamphone, camphor, borneol, camphone, artemisone and piperitone。


    ### （5）使用注意事项

    它不能在芳香疗法中使用，它会引引起抽搐和类似癫痫症的病态，即使小剂量使用也是致命的。


    # # 20. 牛至精油


    牛至精油是从牛至植物（Origanum vulgare）中提取的，属于唇形科，又分为欧洲牛至、野牛至、普通牛至。


    ### (1) 精油性质

    牛至精油味道强烈、辛辣，类似于樟脑的气味，颜色淡黄，黏质性中等到水性。


    ### （2）来源

    牛至是一种质地坚硬、树枝茂密的多年生药草，可以长到90cm高，茎直立、多毛，叶片暗绿色、卵形，在分枝顶端簇生粉色花朵。它是常用的花园植物，受蜜蜂的喜爱，当触动叶片时，会散发浓烈的香味。牛至药草在古代医药中就开始使用，如今，在地中海地区被广泛用作烹饪调料和治疗牙痛的药物。


