  md: '**植物精油安全性**


    Essential oils health


    (14)金钟柏

    使用这种植物的灌剂会引起并发症，其精油更是一种强效的堕胎剂、有毒物和神经毒素。


    (15)鹿蹄草

    鹿蹄草精油中的活性成份是甲基水杨酸盐（98%），用它制作的药膏可以治疗风湿病和其他疾病，其精油即使在很小剂量的使用中，对皮肤也可能会产生刺激作用，尤其是对阿司匹林（一种水杨酸盐）过敏的人群。鹿蹄草精油也是一种毒性很强的精油。


    (16)土荆芥（驱虫籽）


    驱虫籽是因为它能驱除环状寄生虫和十二指肠虫而得名的，由于它对肝脏、肾脏和心脏都有毒性，还是一种神经毒素，现在已经不再使用了。


    (17)苦艾


    苦艾酒饮料含有苦艾成份，经常饮用会产生幻听和幻视，还可能上瘾，并产生许多令人不愉快的副作用。它的活性成份是侧柏酮，这种化合物是一种惊厥剂和神经毒素，它的精油也有堕胎的作用。


    # **2.IFRA限制使用的精油**


    圆当归、香柠檬、苦柑橘、桂皮、枯茗、葡萄柚、柠檬酸、柠檬、万寿菊、橡树苔藓、芸香、马鞭草精油。这些精油不是被禁止使用的，而是要谨慎地使用，因为精油里含有少量可能会引起光敏性反应的活性成份。


    # **3.IFRA禁止使用的精油**


    某些精油由于具有的特殊性质，如毒性、敏感性等原因，被IFRA禁止使用，包括：刺桧、菖蒲、土木香、无花果、山葵、芥菜、秘鲁香液、马鞭草、茶、檫木、苦艾、土荆芥属植物精油。


    # **4.精油与集中精力**


    当你在开车时、正在操作危险性的机器时，或需要集中精力时，最好避免使用能降低你注意力的精油。这些精油包括：安息香、荷兰石竹（康乃馨）、洋甘菊、天竺葵、风信子、薰衣草、肉豆蔻、牛至属植物、橙花油、肉豆蔻、檀香、甘松、颉草属植物、香根草、依兰等的精油。'
