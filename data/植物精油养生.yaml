    8) **芳香**：直接采摘叶片嗅闻，可赶走睡意。\n9) **驱虫**：罗勒香气可防止部分蚊虫的叮咬。\n\n## （二）适宜香草栽培的环境条件\n\n\
    ### 1. 庭院栽培的土壤条件\n\n土壤是植物赖以生存的基础。优质的土壤才能培育出势态良好的香草植物。一般来说，排水良好、富含有机质的土壤是香草植物茁壮成长的保障。我们常见的土壤类型通常有沙土、壤土、黏土3种类型。\n\
    \n- **（1）黏土**\n  黏土组含黏粒数量较多，孔隙小，肥水渗透慢，因此保水保肥力强，但是易积水，透气性差。\n- **（2）壤土**\n  壤土组中粗粉粒含量多，物理化学性能良好，通气透水且保水保肥的性能良好，土层深厚，是种植香草植物的理想土壤。\n\
    - **（3）沙土**\n  沙土组中黏粒较少，沙粒含量均在50%以上，粒子组成较粗，孔隙大、透气性强，但易漏水漏肥，土壤温度变化较大，晴天温度上升较快。\n\
    \n## 2. 盆栽的常用介质\n\n介质就是所谓的培养土，培养土并非真正的土壤，而是一些质地较土壤粗的物质，主要目的是达成有利于植物生长所需之透气、透水、保水、排水、保肥性。以下是常用的介质。\n\
    \n### 陶砾\n#### （1）陶粒\n陶粒，顾名思义，就是陶质的颗粒。陶粒形状因工艺不同而各异，其外观特征大部分呈圆形或椭圆形球体，但也有一些仿碎石陶粒呈不规则碎石状。陶粒的抗渗性、抗冻性都很好，很适合作为园艺栽培的基质。\n\
    \n### 珍珠石\n#### （2）珍珠石\n珍珠石是高岭石的一种，为黏土矿物。是将珍珠岩经由高温、高压烧制而成的人工培养土，白色，拥有质轻、多孔的特点，其保水、排水的效果均佳。\n\
    \n### 蛭石\n#### （3）蛭石\n蛭石为一种经过高温煅烧后加以粉碎的人工培养土，一般为褐、黄、暗绿色，有油一样的光泽。它质地非常轻，细微得呈土壤状，适合作为混合土使用，也可用于播种与扦插。它具有排水、保水、保肥与通气的作用。\n\
    \n### 草炭\n#### （4）草炭\n“草炭”又名“泥炭”，是沼泽发育过程中的产物，含有大量水分和未被彻底分解的植物残体、腐殖质以及一部分矿物质。它质地松软易于散碎，多呈棕色或黑色，具有可燃性和吸气性，本身就已经是无公害的绿色肥料，具有提高土壤的持水、通气和保肥的能力。\n\
    \n香草植物喜好光照充足，温度适宜的气候，绝大部分的香草植物不适合在室内进行栽培，最主要原因是植物必须依赖日光进行光合作用。一般香草植物的成长温度在 15\
    \ ~ 25℃，高温多湿是香草植物生长的忌讳。通常家庭栽种香草植物都是选择在阳台上盆栽，或是在庭院中种植。\n\n若发现在室内栽种的香草植物变得瘦弱细长，没有香味，考虑是不是摆放的位置光线不足，可以换个阳光充足的位置，或者直接拿到阳台上。另外，在阳光充足的情况下，也要不时转动一下花盆，使植物的每个部位都能充分得到阳光的照射。\n\
    \n家庭栽种香草植物多以盆栽为主，供水的基本原则是以盆内土壤开始干燥时，才给予大量的水来保持湿润的状态。另外，还必须考虑植株的特性，如薄荷的需水性较高、迷迭香较喜微干的环境。\n\
    \n若是固定浇水，夏季维持早晚各一次浇透，春、秋、冬则每天1次，尽可能选择上午6~8时或下午4~6时进行。夏季中午时分日照强烈，应避免浇水。如果不会影响到楼下邻居，尽量不用水盘，一来容易滋生蚊虫，二来易造成植物根系长期处在潮湿状态，而产生烂根现象。\n\
    \n## 5. 修剪\n修剪的目的在于调节植物体内的营养，减少无益的营养生长，平衡生长与开花结果的关系，更新老枝，疏掉病弱枝，保证植株内部通风透光，以利于植物的生长，增加开花和结果量。\n\
    \n修剪时注意不要剪太多，以免对枝条的刺激太大，使新芽长不出来而死亡。\n\n## （三）香草繁殖方法\n香草植物的繁殖方法基本上可分为有性繁殖（播种）和无性繁殖（如扦插、压条、分株）两种。\n\
    \n### 1. 播种法\n播种法就是在短时间内就可栽种出大量的种苗，且培育出的植株健壮，寿命较长。此法操作简单，在家庭种植中较为实用。播种法通常有撒播、点播。金莲花、琉璃苣等大的种子适合点播，覆土较厚。小的种子如甘菊、薄荷适合撒播，覆土较浅。\n\
    \n### 2. 分株法\n分株法指利用植物的根、茎或匍匐枝从母体上分割出来，另栽植成新的独立植株的繁殖方法。薄荷、留兰香是利用地下茎繁殖，紫罗兰采用地下根茎分离繁殖；鸢尾、姜、晚香玉等用块茎分株繁殖；麝香百合、蒜、水仙等用鳞茎繁殖，香根草、柠檬草、香茅等用分根繁殖。\n\
    \n分株方法是先把植株从盆中小心掘出后，抓住根茎部分，顺着植株的生长与发根状态，予以分开，再将其种入新的盆具或土中。分株过程中，要注意别伤到根部。\n\n\
    ### 3. 扦插法\n扦插法是利用植物的根、茎、叶等部分插入土中，生根后发育成新植株的繁殖方法。此法应用范围较广、经济而简便，尤以采用枝条扦插繁殖方法在香草植物和香草类植物生产上用的较为普遍，如桂花、栀子、茉莉、大花茉莉、含笑、香叶、月桂、薰衣草、杭菊以及芳樟等。\n\
    \n扦插的方法是将植株顶芽部分 8 ~ 10cm 处剪下，剪下的枝段含水量较少，应插在水中 0.5 ~ 1 小时，去除下端的叶片。用筷子在装有培养土的盆器中挖洞，把枝条插入、压紧洞口，再给予充足的水分，约\
    \ 1 星期后就会生根，约 1 个月后可进行移植、定植。\n\n### 4. 压条法\n压条法，对扦插较难生根或生根慢的植物可利用压条法繁殖，即不使枝条脱离母体，将其部分埋入土中，待生根后再与母体分离长成新的植株。\n\
    \n具体做法：将植物茎干压入土中，连接部分以∩形铁丝固定，覆土，约2星期后发根，待新植株冒出新芽后，剪掉连接的茎干，再定植即可。\n\n压条法可在短时间内增加植株数量，存活率高，适合此法的香草植物有百里香、迷迭香、薄荷等。\n\
    \n## （四）病虫害防治\n病虫害的发生会影响植物的正常生长。在发生病虫害前，可以做些预防工作，比如选择植株或种子时，要挑选没有病害的；使用的土壤要清洁，没有杂草种子及虫卵；浇水时不宜过多，防止产生细菌等。\n\
    \n### 1. 常见病害\n#### （1）白粉病\n白粉病侵染叶、茎、花柄，早期症状为幼叶扭曲，淡灰色，长出一层白色粉末状物。严重时花少而小，甚至开不出花，叶片枯萎。白粉病由病菌引起，主要危害玫瑰、蔷薇、柑橘等。\n\
    \n#### （2）黄龙病\n黄龙病发病初期在正常绿色的树冠上有部分新梢叶子黄化，形成黄梢。特征性病状是从叶片主脉和侧脉附近、叶片基部和边缘开始黄化，逐步蔓延到全部叶片，病叶厚、革质，易脱落。\n\
    黄龙病的病源是病毒，主要危害柑橘。\n\n#### （3）溃疡病\n开始在叶背出现黄色，斑点逐渐扩大，并隆起破裂，叶正面的病斑部位亦隆起；最后病斑木栓化，呈灰褐色，近圆形，周围有黄色或黄绿色的晕环。\n\
    溃疡病的病源是细菌，主要危害柑橘、紫罗兰等。\n\n### 2. 常见虫害\n#### （1）红蜘蛛\n**形态特征**：成虫近梨形或楔形，足4对，雌虫体长0.4mm，雄虫0.33mm，体色暗红。\n\
    红蜘蛛主要危害柑橘、香叶天竺葵、墨红、玫瑰、香水月季等，被害叶片失去光泽。\n\n#### （2）蚜虫\n**形态特征**：具刺吸式口器，体长1.5~2.0mm，头胸部淡黑色，腹部黄绿色，体绿色，复眼红色，最大特点是体表披有蜡状白粉。\n\
    蚜虫危害广泛，几乎能危害所有的香草植物和花卉。主要吸取香草植物的幼叶、嫩茎和花蕾周围，引起叶片变黄、皱缩、卷曲，严重时造成枝叶花蕾枯萎，甚至全株死亡。\n\n\
    #### （3）蓑蛾\n**形态特征**：雌成虫体翅暗褐色，前翅近外缘有4～5个透明斑，幼虫暗褐色，头红褐色，胸部背板黄褐色，有红褐色斑纹。幼虫纺锤形，雌性比雄性的'大。\n\
    蓑蛾其食性极杂，主要危害墨红、香水月季、玫瑰、桂花、腊梅等。\n\n#### （4）蓟马\n**形态特征**：成虫体长1～1.2mm，淡褐色，触角7节，第1节灰白色。雄虫无翅，雌虫有翅。卵肾形，长0.18mm，黄绿色。若虫体黄色，前胸背板淡褐色，足淡灰色。\n\
    蓟马主要危害风信子、水仙、栀子、柑橘等香草植物的花朵和叶片。\n\n### 3. 防治方法\n家庭栽培的香草多用于观赏、烹饪、茶饮等，如果盆栽的香草发生了病虫害，建议先不要用喷施化学农药的方式处理。此处介绍几个简单的防治病虫害的方法：①将淘过米的水稍微做一下稀释，浇在叶片或土壤中；②用冷却的香草茶喷在叶片或浇在土壤上；③用稀释牛奶喷洒在植株上。\n\
    \n## 十二、植物精油最新研究进展\n\n### （一）一种能祛痘的真正甜杏仁洁面油\n\n#### 1. 痤疮概念\n痤疮又叫青春痘、粉刺、酒刺，是一种多发于面部的慢性皮肤炎症。专家发现，11～25岁的青少年的发病率达到80%以上；25～35岁的青年人发病率达到15%以上。此病尽管对身体影响不大，但如不及时治疗或治疗不当，都有可能留下难愈的疤痕。\n\
    \n#### 2. 痤疮形成的病因\n现有研究结果认为，痤疮症状的形成过程受4个有因果关系的因素影响：\n首先，是皮脂腺过度分泌皮脂；\n其次，是毛孔堵塞；\n\
    第三，是皮脂因此排出毛孔受阻，在毛囊内累积后酸败；\n第四，是皮脂酸败，进而会引起毛囊内的痤疮丙酸杆菌大量繁殖；\n结果，皮肤就出现可见的炎症反应。不过，痤疮发病原因及发病机制至今尚未完全清楚，目前认为是一种多因素控制的疾病。\n\
    \n#### 3. 目前痤疮临床治疗依据与方式\n针对上述4个因素的中西医疗法均有一定的效果。\n\n##### （1）抑制皮脂腺过度分泌油脂\n这是引发痤疮发生的根源性因素。诱发皮脂过度分泌的因素可以归结为：①皮肤外部微生态环境改变，即与皮肤直接接触的外界环境，包括温度、湿度、光照以及化妆品、大气粉尘等物质；②身体内部器官功能紊乱，如饮食失调、肠胃功能紊乱，免疫失调，雄性激素代谢失调等因素；③精神因素，如忧伤、抑郁和情绪低落。这些都会直接或间接诱发皮脂过度分泌。\n\
    \n西医抑制皮脂腺分泌的方法，是通过使用雄性素拮抗剂、糖皮质激素以及异维A酸类药物，来协调身体内部器官紊乱状态的。\n中医抑制皮脂腺分泌的方法，是通过使用丹参药物，以及具有泻火解毒作用的连薄双清片，来协调身体内部器官紊乱状态的。\n\
    上述中西医方法，对影响皮脂分泌的皮肤外部微生态环境和精神因素都没有明确的说明。\n\n##### （2）疏通毛孔堵塞\n目前认为毛孔堵塞的原因，主要是毛囊口过度角化所致。但是，也有皮肤表皮细胞代谢物累积堵塞的因素。西医使用的异维A酸酯类药物，能减缓毛囊上皮组织角化进程。我们认为，在这个环节中，发生作用的应该是该药物的酯类成份。中医在对待毛孔堵塞的问题上，研制的药物（颠倒散），含有硫化物，能使毛囊上皮组织软化，以帮助皮脂分泌顺畅。\n\
    \n##### （3）抑制滞留在毛孔内的皮脂酸败\n皮脂酸败的原因，就是因为滞留在毛孔内的皮脂发生了氧化反应。西医在治疗痤疮的外用软膏内，添加抗氧化剂成份的作用，一方面是为了延长药物保质期；另一方面就有抑制皮脂氧化的作用。抗氧化剂会常用到维生素E。还没有见到中医明确提出过用抗氧化剂来缓解痤疮的报道，但是中医所使药物的抗氧化成份应该是有的。\n\
    \n##### （4）以杀灭的方式来减少痤疮丙酸杆菌的数量\n以痤疮丙酸杆菌为主的微生物（还包括金黄色葡萄球菌），在毛孔内以酸败的油脂为营养物而大量繁殖。中西医对待菌类的繁殖都用药物直接灭杀。西医常用药物有阿奇霉素、罗红霉素和异维A酸。中医常用药物有黄连、黄芩、大黄、芦荟、玫瑰、三七和当归等。\n\
    \n#### 4. 植物油洗面祛面部痤疮的机理\n##### （1）植物油洗面有长时间抑制皮脂腺分泌的功能\n我们发现用这种植物油直接清洁面部，然后用清水结合香皂或洗面奶之类的产品把皮肤没有吸收的油洗掉，而面部不需要再搽护肤霜或护肤油之类的产品，皮肤依然有干净与湿润的感觉，这种感觉能够持续3天左右，在此期间，可以只用清水洗面即可。其原因分析如下：\n\
    - 无论干性皮肤或者油性皮肤，其面部表层都覆盖着一层油脂。从皮肤解剖结构看出，在皮肤表面分布着大量的皮肤神经末梢细胞。皮肤神经末梢细胞就像探头一样感应着这层油脂成份、数量的变化，根据感应结果来调控油脂腺的分泌数量和时期。如果这层油脂吸附外来物质（人工合成物质）或混有自身代谢产物，油脂将变稠（如同抽油烟机滤网所挂的脏油一样），皮肤就会感觉油腻。\n\
    - 用香皂类产品清洗这层油脂，清洗结果还会在皮肤残留对皮肤神经末梢有刺激的成份，多数人的皮肤不到一天就会又有油腻感觉。\n- 如果用干净的油来清洗这层油脂，实际将是一种溶解与替代的过程。用油洗面的过程包含着按摩的手法，通过按摩能够把黏附在皮肤表面的脏东西溶解掉，进而使干净的油逐渐地代替了原来脏油所处的位置。我们研究发现，皮肤神经末梢细胞处于这种植物油的环境内，不会刺激油脂腺分泌油脂。因为植物与动物都起源于海洋微生物；有着共同的祖先；在生物进化中，植物的提取物与动物的识别系统在遗传物质的严格复制过程中，必然也存在着一定的联系。所以，人类皮肤的识别系统对植物油是认可的。\n\
    - 对于超出皮肤吸收和吸附能力的植物油，可以用香皂一类的去油产品洗掉。清洗方法在后面使用方法中陈述。油洗面的结果就是在皮肤表面形成油膜，皮肤对外界反应迟钝，油脂腺分泌自然就减少了。\n\
    \n##### （2）植物油洗面能彻底清除皮肤表面的污物\n- 植物油洗面能把面部结合态油垢溶解起来，洁面效果比单独使用香皂类产品效果更理想。因为香皂或洗面奶均是两性物质，也就是既有亲水成份，也有亲油成份。在去除面部的非水性污物时，它们中的亲油成份需要与油溶性的污物充分融合后变成水溶性物质，才能被水从面部清洗掉。而沉淀在面部毛孔内壁和表皮层的结合态污物主要成份为皮肤自身分泌物（油脂）和代谢物（蛋白质）的混合体，因为这种结合态混合体表现为疏水性，受接触面和极性的限制，不能像游离态的疏水性污物那样，在短时间内是被转化成水溶性物质的，也就无法被水从面部清洗掉。但是，如果用油先把这种油溶性的结合态污物转化成游离性的污物，然后再用香皂之类的物质转化成溶于水性的物质，就很容易把结合态的油溶性污物清洗掉。\n\
    \n##### （3）植物油洗面有疏通毛孔，帮助皮脂分泌的功能\n- 大家知道，相关联的毛孔堵塞和油脂分泌旺盛现象是导致痤疮发生的宏观诱导因素之一。皮肤自身分泌的油脂滞留在堵塞的毛孔中就会变质，而成为痤疮丙酸杆菌的食物。使用这种油洗面的按摩动作同时还能够使油渗透到毛孔深处，渗透过程对皮肤毛孔内油脂腺的分泌通道有疏通、清洁和润滑的作用。这样，既有利于保持毛孔的畅通，还能用清洁的植物油替换出丙酸杆菌已适应繁殖用的人体变质油脂，表现出缓解和预防痤疮发生的效果。\n\
    \n#### 5. 植物油制备方法及其成份分析\n##### （1）市场现有同类产品\n目前，用于皮肤护理的植物油很多，包括橄榄油、葡萄籽油、小麦胚芽油、荷荷芭油、月见草油、金盏草油、甜杏仁油A（Almond\
    \ oil）和杏仁油（Apricot kernel oil）等。"
  mdcn: "## 植物精油与香草植物\nEssential oils health\n\n~10天发芽，成长及扩散相当快速。另外可用扦插、压条、分株等方式繁殖，繁殖迅速且生命力强，即使地上部叶片枯萎，地下根仍会长出新叶，不愧是香草植物初学者最好的伙伴。\n\
    \n### (2) 采收保存\n随时可将叶、茎剪摘下来直接运用，或是吊在室内风干，待完全干燥之后置于密封罐内保存，但应尽量在3个月内使用完毕。\n\n###\
    \ (3) 广泛应用\n1) **料理**：凡糖、酒、油、酱油、醋中皆可添加，餐后的甜点或饼干蛋糕皆可酌量加入，可增加料理风味。\n2) **健康**：促进消化、消炎杀菌，日常生活应用相当普遍。\n\
    3) **茶饮**：薄荷茶可单独饮用，亦可加入玫瑰、薰衣草等其他香草一并使用。\n5) **精油**：薄荷精油可提振精神、消除疲劳，独特的清凉感可减轻疼痛。\n\
    6) **花艺**：鲜绿的叶片搭配上可爱的小花，是花艺表现中最出色的配角。\n7) **园艺**：春末夏初时，薄荷会展现旺盛的生命力，是香草花园中的王子。\n\
    8) **工艺**：干枯的茎秆可运用在各式工艺品中，清凉的独特风味更可结合在百草香干花中。\n\n## 6. 香草之王——罗勒\n\n### (1) 栽培方法\n\
    性喜阳光充足，排水良好的土壤，喜好温暖，冬季寒流来袭时生长状况不佳。一般以种子栽培，于春季播种，春夏之际不断摘芯，成长速度及状况佳，也可使用扦插法，约20天发根。\n\
    \n### (2) 采收保存\n叶片可随时采摘运用，摘下的叶片在室温下半天左右即会转黑，放入冰箱可保存3~5天，因此大都干燥后使用，或是以新鲜叶片做成酱汁，保存期较长，也可浸渍与醋、油中再加入料理使用。\n\
    \n### (3) 广泛应用\n1) **料理**：它是所有香草植物中运用范围最广泛的食材，例如地中海式、意大利式、法式及中式料理中皆可寻觅到，沙拉、汤类、烘烤皆宜。\n\
    2) **健康**：强身、健胃、解热、通经。\n3) **美容**：叶片蒸脸或混入热水中沐浴，可消除疲劳。\n4) **茶饮**：直接冲泡或混入牛奶中，风味独特。\n\
    5) **精油**：蒸馏叶片产生精油，可舒缓精神压力。\n6) **花艺**：罗勒花束可衬托出主体花材如玫瑰、薰衣草等的艳丽。\n7) **园艺**：是厨房花园必备的香草，更是其他植物共生的好朋友。\n\
    8) **芳香**：直接采摘叶片嗅闻，可赶走睡意。\n9) **驱虫**：罗勒香气可防止部分蚊虫的叮咬。\n\n## （二）适宜香草栽培的环境条件\n\n\
    ### 1. 庭院栽培的土壤条件\n\n土壤是植物赖以生存的基础。优质的土壤才能培育出势态良好的香草植物。一般来说，排水良好、富含有机质的土壤是香草植物茁壮成长的保障。我们常见的土壤类型通常有沙土、壤土、黏土3种类型。\n\
    \n- **（1）黏土**\n  黏土组含黏粒数量较多，孔隙小，肥水渗透慢，因此保水保肥力强，但是易积水，透气性差。\n- **（2）壤土**\n  壤土组中粗粉粒含量多，物理化学性能良好，通气透水且保水保肥的性能良好，土层深厚，是种植香草植物的理想土壤。\n\
    - **（3）沙土**\n  沙土组中黏粒较少，沙粒含量均在50%以上，粒子组成较粗，孔隙大、透气性强，但易漏水漏肥，土壤温度变化较大，晴天温度上升较快。\n\
    \n## 2. 盆栽的常用介质\n\n介质就是所谓的培养土，培养土并非真正的土壤，而是一些质地较土壤粗的物质，主要目的是达成有利于植物生长所需之透气、透水、保水、排水、保肥性。以下是常用的介质。\n\
    \n### 陶砾\n#### （1）陶粒\n陶粒，顾名思义，就是陶质的颗粒。陶粒形状因工艺不同而各异，其外观特征大部分呈圆形或椭圆形球体，但也有一些仿碎石陶粒呈不规则碎石状。陶粒的抗渗性、抗冻性都很好，很适合作为园艺栽培的基质。\n\
    \n### 珍珠石\n#### （2）珍珠石\n珍珠石是高岭石的一种，为黏土矿物。是将珍珠岩经由高温、高压烧制而成的人工培养土，白色，拥有质轻、多孔的特点，其保水、排水的效果均佳。\n\
    \n### 蛭石\n#### （3）蛭石\n蛭石为一种经过高温煅烧后加以粉碎的人工培养土，一般为褐、黄、暗绿色，有油一样的光泽。它质地非常轻，细微得呈土壤状，适合作为混合土使用，也可用于播种与扦插。它具有排水、保水、保肥与通气的作用。\n\
    \n### 草炭\n#### （4）草炭\n“草炭”又名“泥炭”，是沼泽发育过程中的产物，含有大量水分和未被彻底分解的植物残体、腐殖质以及一部分矿物质。它质地松软易于散碎，多呈棕色或黑色，具有可燃性和吸气性，本身就已经是无公害的绿色肥料，具有提高土壤的持水、通气和保肥的能力。\n\
    \n香草植物喜好光照充足，温度适宜的气候，绝大部分的香草植物不适合在室内进行栽培，最主要原因是植物必须依赖日光进行光合作用。一般香草植物的成长温度在 15\
    \ ~ 25℃，高温多湿是香草植物生长的忌讳。通常家庭栽种香草植物都是选择在阳台上盆栽，或是在庭院中种植。\n\n若发现在室内栽种的香草植物变得瘦弱细长，没有香味，考虑是不是摆放的位置光线不足，可以换个阳光充足的位置，或者直接拿到阳台上。另外，在阳光充足的情况下，也要不时转动一下花盆，使植物的每个部位都能充分得到阳光的照射。\n\
    \n家庭栽种香草植物多以盆栽为主，供水的基本原则是以盆内土壤开始干燥时，才给予大量的水来保持湿润的状态。另外，还必须考虑植株的特性，如薄荷的需水性较高、迷迭香较喜微干的环境。\n\
    \n若是固定浇水，夏季维持早晚各一次浇透，春、秋、冬则每天1次，尽可能选择上午6~8时或下午4~6时进行。夏季中午时分日照强烈，应避免浇水。如果不会影响到楼下邻居，尽量不用水盘，一来容易滋生蚊虫，二来易造成植物根系长期处在潮湿状态，而产生烂根现象。\n\
    \n## 5. 修剪\n修剪的目的在于调节植物体内的营养，减少无益的营养生长，平衡生长与开花结果的关系，更新老枝，疏掉病弱枝，保证植株内部通风透光，以利于植物的生长，增加开花和结果量。\n\
    \n修剪时注意不要剪太多，以免对枝条的刺激太大，使新芽长不出来而死亡。\n\n## （三）香草繁殖方法\n香草植物的繁殖方法基本上可分为有性繁殖（播种）和无性繁殖（如扦插、压条、分株）两种。\n\
    \n### 1. 播种法\n播种法就是在短时间内就可栽种出大量的种苗，且培育出的植株健壮，寿命较长。此法操作简单，在家庭种植中较为实用。播种法通常有撒播、点播。金莲花、琉璃苣等大的种子适合点播，覆土较厚。小的种子如甘菊、薄荷适合撒播，覆土较浅。\n\
    \n### 2. 分株法\n分株法指利用植物的根、茎或匍匐枝从母体上分割出来，另栽植成新的独立植株的繁殖方法。薄荷、留兰香是利用地下茎繁殖，紫罗兰采用地下根茎分离繁殖；鸢尾、姜、晚香玉等用块茎分株繁殖；麝香百合、蒜、水仙等用鳞茎繁殖，香根草、柠檬草、香茅等用分根繁殖。\n\
    \n分株方法是先把植株从盆中小心掘出后，抓住根茎部分，顺着植株的生长与发根状态，予以分开，再将其种入新的盆具或土中。分株过程中，要注意别伤到根部。\n\n\
    ### 3. 扦插法\n扦插法是利用植物的根、茎、叶等部分插入土中，生根后发育成新植株的繁殖方法。此法应用范围较广、经济而简便，尤以采用枝条扦插繁殖方法在香草植物和香草类植物生产上用的较为普遍，如桂花、栀子、茉莉、大花茉莉、含笑、香叶、月桂、薰衣草、杭菊以及芳樟等。\n\
    \n扦插的方法是将植株顶芽部分 8 ~ 10cm 处剪下，剪下的枝段含水量较少，应插在水中 0.5 ~ 1 小时，去除下端的叶片。用筷子在装有培养土的盆器中挖洞，把枝条插入、压紧洞口，再给予充足的水分，约\
    \ 1 星期后就会生根，约 1 个月后可进行移植、定植。\n\n### 4. 压条法\n压条法，对扦插较难生根或生根慢的植物可利用压条法繁殖，即不使枝条脱离母体，将其部分埋入土中，待生根后再与母体分离长成新的植株。\n\
    \n具体做法：将植物茎干压入土中，连接部分以∩形铁丝固定，覆土，约2星期后发根，待新植株冒出新芽后，剪掉连接的茎干，再定植即可。\n\n压条法可在短时间内增加植株数量，存活率高，适合此法的香草植物有百里香、迷迭香、薄荷等。\n\
    \n## （四）病虫害防治\n病虫害的发生会影响植物的正常生长。在发生病虫害前，可以做些预防工作，比如选择植株或种子时，要挑选没有病害的；使用的土壤要清洁，没有杂草种子及虫卵；浇水时不宜过多，防止产生细菌等。\n\
    \n### 1. 常见病害\n#### （1）白粉病\n白粉病侵染叶、茎、花柄，早期症状为幼叶扭曲，淡灰色，长出一层白色粉末状物。严重时花少而小，甚至开不出花，叶片枯萎。白粉病由病菌引起，主要危害玫瑰、蔷薇、柑橘等。\n\
    \n#### （2）黄龙病\n黄龙病发病初期在正常绿色的树冠上有部分新梢叶子黄化，形成黄梢。特征性病状是从叶片主脉和侧脉附近、叶片基部和边缘开始黄化，逐步蔓延到全部叶片，病叶厚、革质，易脱落。\n\
    黄龙病的病源是病毒，主要危害柑橘。\n\n#### （3）溃疡病\n开始在叶背出现黄色，斑点逐渐扩大，并隆起破裂，叶正面的病斑部位亦隆起；最后病斑木栓化，呈灰褐色，近圆形，周围有黄色或黄绿色的晕环。\n\
    溃疡病的病源是细菌，主要危害柑橘、紫罗兰等。\n\n### 2. 常见虫害\n#### （1）红蜘蛛\n**形态特征**：成虫近梨形或楔形，足4对，雌虫体长0.4mm，雄虫0.33mm，体色暗红。\n\
    红蜘蛛主要危害柑橘、香叶天竺葵、墨红、玫瑰、香水月季等，被害叶片失去光泽。\n\n#### （2）蚜虫\n**形态特征**：具刺吸式口器，体长1.5~2.0mm，头胸部淡黑色，腹部黄绿色，体绿色，复眼红色，最大特点是体表披有蜡状白粉。\n\
    蚜虫危害广泛，几乎能危害所有的香草植物和花卉。主要吸取香草植物的幼叶、嫩茎和花蕾周围，引起叶片变黄、皱缩、卷曲，严重时造成枝叶花蕾枯萎，甚至全株死亡。\n\n\
    #### （3）蓑蛾\n**形态特征**：雌成虫体翅暗褐色，前翅近外缘有4～5个透明斑，幼虫暗褐色，头红褐色，胸部背板黄褐色，有红褐色斑纹。幼虫纺锤形，雌性比雄性的'大。\n\
    蓑蛾其食性极杂，主要危害墨红、香水月季、玫瑰、桂花、腊梅等。\n\n#### （4）蓟马\n**形态特征**：成虫体长1～1.2mm，淡褐色，触角7节，第1节灰白色。雄虫无翅，雌虫有翅。卵肾形，长0.18mm，黄绿色。若虫体黄色，前胸背板淡褐色，足淡灰色。\n\
    蓟马主要危害风信子、水仙、栀子、柑橘等香草植物的花朵和叶片。\n\n### 3. 防治方法\n家庭栽培的香草多用于观赏、烹饪、茶饮等，如果盆栽的香草发生了病虫害，建议先不要用喷施化学农药的方式处理。此处介绍几个简单的防治病虫害的方法：①将淘过米的水稍微做一下稀释，浇在叶片或土壤中；②用冷却的香草茶喷在叶片或浇在土壤上；③用稀释牛奶喷洒在植株上。\n\
    \n## 十二、植物精油最新研究进展\n\n### （一）一种能祛痘的真正甜杏仁洁面油\n\n#### 1. 痤疮概念\n痤疮又叫青春痘、粉刺、酒刺，是一种多发于面部的慢性皮肤炎症。专家发现，11～25岁的青少年的发病率达到80%以上；25～35岁的青年人发病率达到15%以上。此病尽管对身体影响不大，但如不及时治疗或治疗不当，都有可能留下难愈的疤痕。\n\
    \n#### 2. 痤疮形成的病因\n现有研究结果认为，痤疮症状的形成过程受4个有因果关系的因素影响：\n首先，是皮脂腺过度分泌皮脂；\n其次，是毛孔堵塞；\n\
    第三，是皮脂因此排出毛孔受阻，在毛囊内累积后酸败；\n第四，是皮脂酸败，进而会引起毛囊内的痤疮丙酸杆菌大量繁殖；\n结果，皮肤就出现可见的炎症反应。不过，痤疮发病原因及发病机制至今尚未完全清楚，目前认为是一种多因素控制的疾病。\n\
    \n#### 3. 目前痤疮临床治疗依据与方式\n针对上述4个因素的中西医疗法均有一定的效果。\n\n##### （1）抑制皮脂腺过度分泌油脂\n这是引发痤疮发生的根源性因素。诱发皮脂过度分泌的因素可以归结为：①皮肤外部微生态环境改变，即与皮肤直接接触的外界环境，包括温度、湿度、光照以及化妆品、大气粉尘等物质；②身体内部器官功能紊乱，如饮食失调、肠胃功能紊乱，免疫失调，雄性激素代谢失调等因素；③精神因素，如忧伤、抑郁和情绪低落。这些都会直接或间接诱发皮脂过度分泌。\n\
    \n西医抑制皮脂腺分泌的方法，是通过使用雄性素拮抗剂、糖皮质激素以及异维A酸类药物，来协调身体内部器官紊乱状态的。\n中医抑制皮脂腺分泌的方法，是通过使用丹参药物，以及具有泻火解毒作用的连薄双清片，来协调身体内部器官紊乱状态的。\n\
    上述中西医方法，对影响皮脂分泌的皮肤外部微生态环境和精神因素都没有明确的说明。\n\n##### （2）疏通毛孔堵塞\n目前认为毛孔堵塞的原因，主要是毛囊口过度角化所致。但是，也有皮肤表皮细胞代谢物累积堵塞的因素。西医使用的异维A酸酯类药物，能减缓毛囊上皮组织角化进程。我们认为，在这个环节中，发生作用的应该是该药物的酯类成份。中医在对待毛孔堵塞的问题上，研制的药物（颠倒散），含有硫化物，能使毛囊上皮组织软化，以帮助皮脂分泌顺畅。\n\
    \n##### （3）抑制滞留在毛孔内的皮脂酸败\n皮脂酸败的原因，就是因为滞留在毛孔内的皮脂发生了氧化反应。西医在治疗痤疮的外用软膏内，添加抗氧化剂成份的作用，一方面是为了延长药物保质期；另一方面就有抑制皮脂氧化的作用。抗氧化剂会常用到维生素E。还没有见到中医明确提出过用抗氧化剂来缓解痤疮的报道，但是中医所使药物的抗氧化成份应该是有的。\n\
    \n##### （4）以杀灭的方式来减少痤疮丙酸杆菌的数量\n以痤疮丙酸杆菌为主的微生物（还包括金黄色葡萄球菌），在毛孔内以酸败的油脂为营养物而大量繁殖。中西医对待菌类的繁殖都用药物直接灭杀。西医常用药物有阿奇霉素、罗红霉素和异维A酸。中医常用药物有黄连、黄芩、大黄、芦荟、玫瑰、三七和当归等。\n\
    \n#### 4. 植物油洗面祛面部痤疮的机理\n##### （1）植物油洗面有长时间抑制皮脂腺分泌的功能\n我们发现用这种植物油直接清洁面部，然后用清水结合香皂或洗面奶之类的产品把皮肤没有吸收的油洗掉，而面部不需要再搽护肤霜或护肤油之类的产品，皮肤依然有干净与湿润的感觉，这种感觉能够持续3天左右，在此期间，可以只用清水洗面即可。其原因分析如下：\n\
    - 无论干性皮肤或者油性皮肤，其面部表层都覆盖着一层油脂。从皮肤解剖结构看出，在皮肤表面分布着大量的皮肤神经末梢细胞。皮肤神经末梢细胞就像探头一样感应着这层油脂成份、数量的变化，根据感应结果来调控油脂腺的分泌数量和时期。如果这层油脂吸附外来物质（人工合成物质）或混有自身代谢产物，油脂将变稠（如同抽油烟机滤网所挂的脏油一样），皮肤就会感觉油腻。\n\
    - 用香皂类产品清洗这层油脂，清洗结果还会在皮肤残留对皮肤神经末梢有刺激的成份，多数人的皮肤不到一天就会又有油腻感觉。\n- 如果用干净的油来清洗这层油脂，实际将是一种溶解与替代的过程。用油洗面的过程包含着按摩的手法，通过按摩能够把黏附在皮肤表面的脏东西溶解掉，进而使干净的油逐渐地代替了原来脏油所处的位置。我们研究发现，皮肤神经末梢细胞处于这种植物油的环境内，不会刺激油脂腺分泌油脂。因为植物与动物都起源于海洋微生物；有着共同的祖先；在生物进化中，植物的提取物与动物的识别系统在遗传物质的严格复制过程中，必然也存在着一定的联系。所以，人类皮肤的识别系统对植物油是认可的。\n\
    - 对于超出皮肤吸收和吸附能力的植物油，可以用香皂一类的去油产品洗掉。清洗方法在后面使用方法中陈述。油洗面的结果就是在皮肤表面形成油膜，皮肤对外界反应迟钝，油脂腺分泌自然就减少了。\n\
    \n##### （2）植物油洗面能彻底清除皮肤表面的污物\n- 植物油洗面能把面部结合态油垢溶解起来，洁面效果比单独使用香皂类产品效果更理想。因为香皂或洗面奶均是两性物质，也就是既有亲水成份，也有亲油成份。在去除面部的非水性污物时，它们中的亲油成份需要与油溶性的污物充分融合后变成水溶性物质，才能被水从面部清洗掉。而沉淀在面部毛孔内壁和表皮层的结合态污物主要成份为皮肤自身分泌物（油脂）和代谢物（蛋白质）的混合体，因为这种结合态混合体表现为疏水性，受接触面和极性的限制，不能像游离态的疏水性污物那样，在短时间内是被转化成水溶性物质的，也就无法被水从面部清洗掉。但是，如果用油先把这种油溶性的结合态污物转化成游离性的污物，然后再用香皂之类的物质转化成溶于水性的物质，就很容易把结合态的油溶性污物清洗掉。\n\
    \n##### （3）植物油洗面有疏通毛孔，帮助皮脂分泌的功能\n- 大家知道，相关联的毛孔堵塞和油脂分泌旺盛现象是导致痤疮发生的宏观诱导因素之一。皮肤自身分泌的油脂滞留在堵塞的毛孔中就会变质，而成为痤疮丙酸杆菌的食物。使用这种油洗面的按摩动作同时还能够使油渗透到毛孔深处，渗透过程对皮肤毛孔内油脂腺的分泌通道有疏通、清洁和润滑的作用。这样，既有利于保持毛孔的畅通，还能用清洁的植物油替换出丙酸杆菌已适应繁殖用的人体变质油脂，表现出缓解和预防痤疮发生的效果。\n\
    \n#### 5. 植物油制备方法及其成份分析\n##### （1）市场现有同类产品\n目前，用于皮肤护理的植物油很多，包括橄榄油、葡萄籽油、小麦胚芽油、荷荷芭油、月见草油、金盏草油、甜杏仁油A（Almond\
    \ oil）和杏仁油（Apricot kernel oil）等。"
