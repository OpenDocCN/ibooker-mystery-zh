- img_proc: true
  md: '**植物精油在家庭日常生活中的应用**


    桑拿浴有保健作用的原理是坐着桑拿浴时，其中的热量能人为地刺激身体“发热”，这样身体的免疫系统会被激活，反过来，可以促进红细胞的生成。有人研究发现，在“人工发热”期间，血红细胞数量增加的程度是显著的。此外，桑拿浴还有助于体内干扰素的形成。干扰素是一种抗病毒的蛋白质，具有很强的抑制癌症的功效。桑拿浴还能加快体内化学反应的速度，因此也是清除体内累积的毒素的好方法。它不仅促进了体内的新陈代谢，还促进皮肤的各种功能，皮肤是排泄废物最重要的器官，可以通过刺激排汗，帮助清除废物。依此类推，对身体的熏蒸也会有相同的效果。


    据报道，有感冒或流感征兆的人蒸桑拿，能够预防病症的进一步发展。桑拿室的温度要比皮肤温度高约10℃，身体温度也会增加约3℃，进入“人为发烧”状态，许多医生认为，这有助于杀死有害的细菌和病毒，另外还可以加强免疫系统的功能。


    在排汗的同时，你的身体也需要更多的氧气供应，据报道，增加20%，肺部也就可以排出更多的废物。如果桑拿室的空气太干燥，就像多数美洲桑拿那样，肺部的黏膜可能也会变得干燥起来，并有可能受到伤害，因此，最好要有一定的湿度。


    桑拿浴的其他益处。当往上面加热的石头上浇水时，会产生许多的阴离子并进入空气。在欧洲和前苏联所做的研究认为，阴离子有助于人体健康，对身体的疾病也有许多的疗效。桑拿热有助于身体消除乳酸，因此在强体力运动后蒸桑拿浴是个很好的选择。但刚做完运动要先休息一会儿，然后洗个淋浴让体温降下来，再蒸桑拿。


    （5）桑拿浴的过程


    在欧洲水疗中，桑拿浴一般在按摩之前进行，以使肌肉放松，做好按摩的准备。这个顺序在美洲以及在印度草医学中是相反的，他们是先做按摩，然后做排汗浴，以帮助排除毒素，这些毒素是在按摩过程中被驱逐到体表的。


    （6）洗桑拿的一些注意事项


    蒸桑拿15分钟，人体平均会散失0.5～1.5L的水分，因此人们在蒸桑拿之前和之后都要饮用大量的水，以防脱水。做完排汗浴后，芬兰人要喝冰水让心跳减缓下来，这样做虽然有人认为对身体有积极的作用，但我们提醒人们，不要模仿，除非你的体格足够强壮。在世界各地的SPA中，人们在做完桑拿浴后，喜欢用冷水浇身，虽然这样做的刺激性比喝冰水轻，并会让人精神振奋，但患有哮喘的人是不适合这样做的，在没有征得医生同意之前，也不应该洗桑拿。桑拿浴的热对心脏有压力。蒸桑拿会加速心脏的跳动速率，虽有人认为仅仅是加快心脏的跳动速率，而不会影响到血压。但我们建议，高血压患者在没有征得医生同意之前，不要蒸桑拿。另外的一些注意事项：


    桑拿浴不适合孕妇、孩子或老年人，也不适合患有肺炎或其他呼吸系统疾病的患者采用。


    如果你有没愈合的伤口，或有些发烧，都不要洗桑拿。


    如果你有任何健康方面的疑惑，在洗桑拿之前，首先要咨询医生。'
