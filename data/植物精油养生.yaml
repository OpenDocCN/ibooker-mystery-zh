  md: '# # 三、植物精油与基础油的提取方法


    # ## （一）原料采集


    对大部分植物来说，应在开花前的上午 9 ~ 11 点采收不带露珠的未受损的叶子或小枝，这样药效最好。用于提取精油的原料（如玫瑰花）越早采集越好，最好在早晨太阳还没有出来的时候就要进行。采收地必须离提炼厂非常近，工人一采收就可以直接送往工厂，越快提炼越好。用于提取精油的原料，根据植物油腺结构不同，采集方式也有所不同。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_28_0.png)


    采集玫瑰花的场景


    # ### 1. 未发香鲜花的保养


    茉莉、大花茉莉、晚香玉等是采集即将开放的成熟花蕾。在未开放前不发香，只有不断通过呼吸作用和代谢过程，经过一定时间后，花蕾才会开放和发香。在上述作用和过程中，花蕾会不断地释放一定热量。在运输和贮存过程中，如不加以妥善保养，花蕾因受热过度，会发酵变质。一般在运输途中，常用竹箩把花蕾松散地盛装，有时在箩的中间还设'
