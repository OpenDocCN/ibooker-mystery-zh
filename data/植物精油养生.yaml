    （6）使用注意事项


    丁香精油的功效强劲，使用时要谨慎对待。如果稀释在基础油、面霜或润肤乳中，用于皮肤时，浓度要控制在1%以下。它会引起个别人的皮肤过敏反应，很容易刺激到黏膜。在孕期应避免使用。


    丁香精油的治疗功效：止痛、防腐杀菌、止痉挛、治神经痛、祛风、抗传染、消毒、杀虫，还可以作为刺激物、健胃品和妇女滋补品。


    （7）用法


    丁香精油的作用有消毒、缓解疼痛，尤其是牙痛、关节炎和风湿病引起的疼痛。治疗消化系统方面的疾病也有很好的疗效。它也可以用于治疗皮肤方面的疾病，尤其适合治疗皮肤疼痛、腿部溃疡和驱除蚊虫。


    1）香炉和蒸发器


    在蒸汽疗法中，丁香精油可以用于治疗支气管炎和头昏眼花的毛病，帮助振奋精神、强化记忆力和抵抗虚弱、无生气的状态。


    2）做按摩油的成份


    丁香精油可以用做按摩油的成份，治疗腹泻、支气管炎、打冷战、感冒、肌肉麻木、肠胃痉挛、风湿病和关节炎。对于牙疼，可以用这种精油按摩下颌，使用的稀释浓度应不高于1%。


    3）做面霜或润肤乳的成份


    用于面霜或润肤乳时，丁香精油的功效和做按摩油成份时一样，还可以帮助腿部溃疡和皮肤疼痛的愈合，使用的稀释浓度也应不高于1%。


    4）做漱口水的成份


    丁香精油能以低浓度的比例添加在漱口水中，用于治疗牙疼。


    （8）适合与丁香精油混用的精油


    罗勒、安息香、肉桂、薰衣草、姜、檀香和鼠尾草精油。


    # ## 4. 多香果精油


    多香果精油是从多香果植物（Pimenta dioica L. Merr.）中提取的，属于桃金娘科。原植物又称为西班牙甘椒、牙买加胡椒、多香果辣椒和玉桂子。


