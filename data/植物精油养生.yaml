    # ### 1. 酸橙精油


    酸橙精油是从酸橙植物（Citrus aurantium linn.）和苦橙植物（C. aurantium linn. var. amura Engl.）的果皮中提取的，酸橙属于芸香科柑橘属。


    （1）精油性质

    味道清甜，带有刺激味，颜色黄色到橘红色，黏性水质。货架期约为6个月。


    （2）来源

    酸橙是一种常绿乔木，高约10m，羽状叶，叶片暗绿色，白色花，微带香气，果实形状类似于柑橘，果皮粗糙、圆形、黄色。原产于中国，现在西班牙、意大利有大面积栽培。

    苦橙是酸橙的变种，我国又称玳玳花，花极香。由于果实2~3年不落，隔年花果同在，犹如“三代同堂”。


    （3）提取方法

    以果皮为原料，采用冷榨法提取，出油率在0.3%~0.5%。


    （4）化学成份

    包括松萜或蒎烯、月桂（香叶）烯、柠檬油精、萜品油烯或异松油烯、桉树脑、芳樟醇、龙脑、柠檬醛和微量的醋酸橙花醛、乙酸香叶酯。


    （5）治疗功效

    1）在芳香疗法中使用时，它是一种总能给人以快乐的精油。因为它能给大脑带来幸福和温馨的感觉，可以帮助人们放松和帮助孩子在晚上入睡。

    2）它对免疫系统有促进功能，能预防感冒和流感。


