    # # 5. 蜜蜂花精油


    蜜蜂花精油是从蜜蜂花植物（Melissa officinalis）中提取的，属于唇形科，又称为香蜂花和柠檬香薄荷。可分为普通型、甜味型。

    这种精油在芳香疗法中有许多用途，有助于抚慰情绪，具有很强的镇静的效果，能够调节心脏功能，尤其是在缓和心悸方面。此外，它还有调理月经的功效。在治疗因感冒引起的疼痛方面效果很好，还可以缓解真菌性的感染。


    (1) 精油的性质

    蜜蜂花精油味甜、清新，有股柑橘味道，颜色淡黄，水质般的黏性。


    (2) 来源

