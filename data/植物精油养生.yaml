    ### 3. 基础油的使用范围


    芳香疗法中，当使用精油做按摩油时，都会用基础油稀释。从医学角度看，这样做是为了将纯精油内某些成份浓度降低至可使用的范围。做这些时，一定不能由外行的人操作。


    ### 4. 基础油的选择方法


    虽然，在芳香疗法中，基础油是用于稀释精油的，但是其本身也具有各种对按摩有价值的功效，因为它们具备着一种或多种自己的特性。所以，基础油的选择也依临床医师所施行的按摩方法而定，因为，重一些的油给皮肤更多的“牵引”，在进行深度按摩时，会起到作用；而其他较轻的油会给予皮肤更多的“润滑”，在进行放松按摩时，可以选择。


    当用拇指的手法按摩全身时，一般需要大约 30mL 的基础油。


    ### 5. 基础油的使用注意事项


    大部分人对这些基础性的基础油不会有过敏性反应。但少数人还是可能对某种坚果有过敏性的问题，因此，明智的选择是：在使用某种坚果做基础油前先做皮肤测试。有时，人们会在日常身体按摩中使用“工业油”，但不会应用于芳香疗法中的按摩，虽然其价格比植物基础油要便宜得多，但是却不能给患者带来的相同的效果，还会令按摩者的皮肤感到“油腻”，因为这类矿物油，如婴儿油，会阻塞皮肤毛孔，从而限制了精油的渗入和皮肤的吸收，达不到精油按摩的预期治疗效果，所以要避免使用。


    ### 6. 基础油与食用油的区别


    表 1-2 基础油与食用油在美容应用方面的主要区别：


    | 类别 | 基础油 | 食用油 |

    | :--- | :--- | :--- |

    | 原料处理 | 不蒸炒 | 蒸炒 |

    | 压榨温度 | 低于 50℃ | 高于 120℃ |

    | 保质办法 | 滤纸过滤脱水，膜过滤脱菌，充氮气保鲜 | 用 270℃高温脱水杀菌 |

    | 活性成份 | 含有维生素 E 和脂溶性蛋白 | 维生素成份变性 |

    | 用途 | 芳香按摩保健 | 食用 |


    ## （八）植物精油的购买与贮藏


    当您在购买精油时，首先要确定您购买的是植物精油，而非人工合成的复制品。


    ### 1. 购买精油的注意事项


    1) 当看到瓶子上写着“芳香油”、“花香油”或其他一些含糊不清的精油名称时，您要注意了，这可能不是您希望购买的精油。

    2) 精油的商标应该是"pure essential oil"或者是"100% essential oil"，当标签是"aromatherapy oil"时，这可能是基础油与精油的混合物。

    3) 如果所有精油的标价都是一样的，就不要从这家公司购买精油了。因为不同精油在成本价格上相差很大，不可能所有产品都是相同的价格。

    4) 精油的拉丁文名称必须出现在瓶子上，这样在您购买时就会避免很多误解，因为很多同名不同种的植物都可以用来做精油。

    5) 所有的精油都必须密封在有色的瓶子里，如果将它们装在透明的瓶子内，精油是很容易变质的。

    6) 植物基础油可以装在透明的容器内，但是植物精油总要装在琥珀色或者蓝色的瓶子里。

    7) 精油瓶口必须配有带点滴器的瓶盖，这样每次用时，就会逐滴流出。


    因为植物精油是一种天然的化合物，这些成份需要仔细照顾，正确的存放才能够保证不至于失效。


    ### 2. 存放精油的要求


    1) 精油必须保存在冷凉、阴暗的地方，也可以冷藏（但不要结冰）以防止其变质。

    2) 一些精油在低温保存时会凝聚，当置于室温下就会恢复正常。一些柑橘属的精油在解冻后依然是黏稠状，这样是不会影响它们的治疗效果的。

    3) 精油瓶不能长时间没有必要地敞着盖，因为它们是很容易挥发的。

    4) 大多数精油可以保存很长时间，但是柑橘属精油的贮藏期超过 6~9 个月后就不能在皮肤上使用了，在其他芳香治疗中还可以使用，比如在香薰法中使用。'
