    （5）治疗功效

    晒干的肉桂植物可以用于治疗消化系统疾病，如胃肠胀气、绞痛、消化不良、痢疾和呕吐恶心。它也可以治疗感冒、流感、发烧、关节炎和风湿病。


    （6）使用注意事项

    肉桂精油最好不要在皮肤上使用，因为它会对皮肤产生刺激，使皮肤有光敏性，对黏膜也有刺激作用。孕期避免使用。


