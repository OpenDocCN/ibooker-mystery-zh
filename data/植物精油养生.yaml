    # ## （四）草本其他器官类基础油


    # ### 1. 小麦胚芽油


    所有的小麦胚芽油（Triticum durum or T. aestivum）都是从小麦的“胚芽”中提取的，它位于小麦的中心。这种谷物包括三部分：外壳、胚和胚乳。虽然胚芽仅占小麦重量的
    3%，但是却含有整个小麦 25% 的蛋白质，还含有维生素和矿物质。这种油含有高浓度的维生素 E 和必需脂肪酸。因含有高浓度的维生素 E，它是一种天然的抗氧化剂，能够防止油的酸败，所以经常把它加在其他的基础油中，以延长它们的保质期，防止酸败。当在局部皮肤使用的时候，它有助于促进新细胞的生成，改善循环功能，帮助修复太阳对皮肤的灼伤，有助于滋润皮肤，使肤色看起来更年轻，还可以淡化疤痕。有助于缓解皮炎的症状。'
