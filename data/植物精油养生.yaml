    # （二）植物精油蒸馏方法


    据记载，过去大多数精油在埃及是利用溶剂提取法制造的。不过，对新近出土的蒸馏锅考证来看，居住在美索不达米亚地区的埃及人早在公元前3500年就已经使用蒸馏技术提取精油了。但是，我们应该把蒸馏技术的发明归功于生活在980～1037年的一位阿拉伯炼金术士，他也是内科医生，因为他是第一个掌握全部蒸馏技术的人。他的工艺非常完美，流传了几百年都没有改变。其蒸馏原理是：先把挥发性的液体（精油）转变成气体，然后再把气体冷却成液体。这是我们今天用于生产精油所用的最普遍和最有效的方法。


    蒸馏技术也有不足之处，对于提取一些容易受热发生变化的材料时，或是有些油使用该技术很难提取时，它就无能为力了。


    # 1.水蒸馏法


    在精油的制造中，使用水蒸馏方法时，要把植物材料完全浸泡在水中，静置到水沸腾。在某种程度上，这种方法对提取出来的油有保护作用，因为油周围的水可以当作一种障碍物，防止油温过高。当浓缩了的原料冷却下来后，水和精油就被分开了，把油轻轻地移入其他容器，就可以当精油使用了。在这个过程分离出的水也是有用的，可以进入市场，当作“花水”（又称为水溶胶或花露）销售，如玫瑰水、薰衣草水和柑橘水。水蒸馏'
  - '[PAGE 31]


    **植物精油与基础油的提取方法**


    可以在减压的状态下（低真空）进行，以降低温度，防止超过 100℃，这对于保护植物材料和精油是有价值的。因而，对热敏感的橙花油，可以使用这种方法成功地被提取出来。

    如果有些植物不能长期浸泡在热水中，如薰衣草，这就需要寻找一种更恰当的提取方法。任何含脂类多的植物材料都不适合这种提取方法，因为长期浸泡在热水中，脂类物质将被破坏，而合成为酒精和羧酸。


    # **2. 蒸汽蒸馏法**


    使用蒸汽蒸馏法提取和制造精油时，要把植物材料放入蒸馏器内，然后把蒸汽注入植物材料中。热的蒸汽有助于从植物材料中释放出芳香分子，因为蒸汽可以强迫打开植物材料中精油储藏的油腺细胞。这些挥发性的精油分子从植物材料中释放出来进入蒸汽之中。蒸汽的温度需要仔细的调控，使之恰好能够使植物材料释放出精油。太热会点燃植物材料或精油。含有精油的蒸汽通过一个冷却系统，蒸汽浓缩，形成液体，这样精油和水就相互分离开了。所使用的蒸汽压力比大气压要大，因此蒸汽产生时的沸腾温度在
    100℃以上，这样可以促进精油快速从植物材料中释放出来，防止精油受到破坏。


    ![蒸汽蒸馏法的仪器装置](image_url)

    一些精油对热是敏感的，如薰衣草。采用这种提取方法，精油就不会受到破坏，它的成份也不会分解成芳樟醇（沉香醇、芳樟醇）和醋酸，如芳樟酯等。


    # **3. 水蒸气扩散法**


    水蒸气扩散法提取精油，也是蒸汽提取方法的一种类型，主要区别在于蒸汽进入蒸馏塔的方式有所不同。水扩散蒸馏法，水蒸气是从上往下进入植物材料的，一般的蒸汽蒸馏法的水蒸气是从下往上走的。含有水蒸气混合物的浓缩精油，在放置植物材料的铁格子下面汇集。这种提取方式的主要优势是使用的蒸汽量少，蒸馏时间短和出油率高。'
  - '[PAGE 32]


    **4. 回流蒸馏提取**


    玫瑰精油是在水蒸汽中提取的，它的主要成份是苯基、乙烷基的醇类，能够溶解在水蒸汽中。这种提取方式不会使精油产生新的成份。


    然而，这样的方法提取的精油是不完全的，缺乏散发玫瑰香味的部分成份，为了生产“完全意义”的精油，需要把溶解在水中的苯基、乙烷基的醇类再蒸馏出来，再添回到“不完全的精油中”。当把苯基、乙烷基的醇类用这种方法蒸馏出来后，按照正确的比例，再添回到最初的蒸馏物中，以形成完全完整玫瑰精油，我们称其为奥托玫瑰油。


    **5. 精馏**


    当精油中仍含有一些杂质的时候，可以再次采用蒸汽蒸馏或真空蒸馏进行精馏。这种再次蒸馏的提纯过程就称为精馏。例如，尤加利精油就是典型的“二次蒸馏油”。二次蒸馏油的化学性会发生变化，所采用的加热温度也不同，可以用于生产标准质量的精油。


    **6. 水和蒸汽联合蒸馏法**


    这主要是常规的水蒸馏法和蒸汽蒸馏法的联合制取精油的过程。植物材料先静置在水中，同时，给水加热，把流动的蒸汽注入水和植物材料的混合体中。


    **7. 分馏蒸馏法**


    当人们谈到分馏蒸馏时，它指的也是常规的蒸馏程序，但是精油的收集不是连续的，它是分批收集的（这就是分馏的含义），主要适用的原料是依兰。


    **（三）植物精油压榨方法**


    当在精油制造中提到“冷榨”方法时，它主要指的是压榨方法，因为这种压榨方法是不使用热源的。多数坚果和种子的油也是使用“冷榨”方法提取的，但是这里所提到的油，是在高强度的压力下从植物原材料中挤出来的，一般情况下，这种方法可以生产出好质量的油，但是有些制造商因为使用化学的或是加热的方法，过度地精炼油，结果是削弱了油的好品质。


    但是，当我们回顾精油制造中的压榨提取方法时，我们发现，多数柑橘属植物的精油是采用这个提取方法的。不过，也可以使用其他不同的提取方式完成这项工作。


    **1. 海绵吸附提取法**


    大多数柑橘属植物精油是采用这种方法提取的，过去是用手工把果肉去掉的，然后把'
- md: "## 2. 针刺提取法\n\n这种压榨提取方法主要用于获取柑橘属精油，比海绵压榨法会减少一些劳动强度，这是一种更加现代的精油提取方法。所谓针刺提取法，就是把果实放在容器内，容器内壁有针不断旋转，能刺破果实表面含油细胞。这样，含油细胞破裂，精油和其他的物质，如色素，就会流到容器中心的位置，那里设有收集器。精油会漂浮在混合物的上面，底下是水分。这时，就可以把精油从混合物中转移出来，倒入另外的容器中。\n\
    \n## 3. 机械研磨提取法\n\n这种压榨提取方法与针刺法方法很相似，经常用于柑橘属植物精油的提取中。机械研磨是指先用机械把外果皮剥离，然后由流动的水把果皮分离出来，被投入到离心式分离器中。离心式分离方法提取油的过程很快，但是需要记住，因为精油是与其他细胞成份相混着的，里面存在着一些酶促反应，所以要对提取工艺加以改造。\n\
    \n### （四）植物精油溶剂萃取方法\n\n如果从广义上来谈论溶剂提取法的概念，它所指的就不仅仅是化学溶剂的提取，如（正）乙烷，还会包括其他的形式，如用固体油脂和\
    \ CO₂做溶剂。溶剂提取尤其适用的植物材料，是含有精油成份很少的材料，或者这种材料主要由树脂成份构成。这种方法提取精油的香味要比蒸馏法好。在这种类型的精油提取方法中，植物材料中不容易分离出来的成份，如蜡状物和色素也能被分离出来，而在其他的提取过程中，就实现不了。\n\
    \n#### 1. 浸泡提取方法\n\n使用浸泡提取方法，就是把花瓣浸泡在热的油中，细胞膜破裂，精油被热油吸收了，把植物材料中的油分离出来，移入到其他容器中。这种提取技术与溶剂提取法非常接近，所不同之处在于，在浸泡提取中使用的提取剂是热油，而不是溶剂。\n\
    \n#### 2. 脂肪吸附萃取\n\n脂肪溶剂萃取与浸泡提取，有许多方面可以比较，但是在应用方面还是有些细微的差别。\n\n玻璃框架的盘子（称为底盘），上面覆盖高纯度并且无味的植物或动物脂肪，把要萃取的植物花瓣材料平铺在油脂上面，然后进行挤压。一般花在新鲜的时候就采摘下来，在它们的油脂腺还没被包裹住之前，花瓣在油脂的混合物中可以保留几天，让花瓣的精油释放到混合物中，然后把萃取所剩的花瓣除去，再放入新采摘的花瓣。重复这个程序，直到这种油脂性混合物所含的精油达到饱和为止。这个过程需要重复很长时间，约需\
    \ 20 次。当混合物达到饱和点时，把花瓣去掉，用酒精冲洗脂肪溶剂和精油的混合物，把萃取物从所剩的脂肪中分离出来，留下的脂肪可以用做制造肥皂的材料。最后，把酒精从混合物蒸发掉，所剩下的就是精油。这是一种劳动力密集的提取方法，这种获取精油的方法是很昂贵的，如今，一般只在提取晚香玉和茉莉精油的时候用到。\n\
    \n### 3. 有机溶剂提取法\n\n使用溶剂可以提取精油，如石油醚、甲醇、乙醇或（正）乙烷。这种方法经常用于对易碎材料的提取，如茉莉、风信子、水仙和晚香玉，它们经受不起蒸汽蒸馏产生的热量。\n\
    \n溶剂提取精油的浓度很高，更接近于天然植物材料具有的香味。虽然溶剂提取方法使用范围很广，但是有些人认为，这样提取的油不适合做芳香疗法的用油，因为溶剂的残留物可能会出现在最终的产品里。据报道，提取的最终产品中含有溶剂残留量可达到\
    \ 6% ~ 20% 。如果拿苯作为标准溶剂进行衡量的话，使用（正）乙烷作为溶剂，产品中溶剂的残留量会下降到 10ppm，这是非常低的溶剂残留浓度。值得一提的是，苯已经不在提取中使用了，因为苯被认为是一种致癌物质。\n\
    \n溶剂提取后的植物材料，可以用它生产一种蜡质的芳香化合物，称为“固体精油”。\n\n### 4. 超临界 CO₂萃取技术提取精油\n\n使用超临界 CO₂萃取技术从植物材料中提取精油，是一种相当新的方法。虽然，在成本方面有些增加，但是的确可以产出质量很好的油。在高压的条件下，CO₂在\
    \ 33℃时，处于一种极不稳定的状态，既不是液体又不是气体，但却同时具有两者的性质，此时，它就成为提取精油最好的溶剂，因为提取过程是在室温条件下瞬间完成的。另外，CO₂是一种惰性气体，因此不会与被提取物发生化学反应。如果想去掉\
    \ CO₂溶剂，仅需要降低压力就可以。这种提取过程必须要在密闭的容器内进行，因为需要 200 个大气压才能使 CO₂处于临界状态，200 个大气压意味着是正常大气压力的\
    \ 200 倍。为了保持到这么高的压力，需要一套不锈钢的设备，所以这种提取方法的生产成本很高。\n\n### （五）基础油冷榨法\n\n基础油的冷榨法与精油的压榨法在工作原理上有相似的地方，最显著的不同点是基础油的冷榨法所使用的压力要比压榨果皮类的植物材料大很多，以采用液液压榨油机制作真正甜杏仁油为例，如直径为\
    \ 20cm 的榨桶需要的压力会达到 100 吨以上。\n\n基础油的冷榨法工艺与食用油的压榨工艺也存在很多差异，具体表现在对原材料的处理方面和对毛油的精炼方面，基础油要求的条件更高些。\n\
    \n基础油的冷榨工艺过程中，植物原料的最高温度不能超过 50℃，否则基础油中的活性物质和保质期将受到影响。因为，不能采用高温灭菌，基础油需要采用膜过滤的方式去掉油中的微生物。为了提高基础油的保质期和质量，基础油的过滤环境要做到：低温、无菌、无氧和无光。\n\
    \n![液液压榨油机](img/9a4032e2e8ad73992ff2b2bd7fc25509_35_0.png)\n\n## 四、常用单方植物精油\n\n\
    ### （一）柑橘类精油\n\n#### 1. 酸橙精油\n\n酸橙精油是从酸橙植物（Citrus aurantium linn.）和苦橙植物（C. aurantium\
    \ linn. var. amura Engl.）的果皮中提取的，酸橙属于芸香科柑橘属。\n\n##### （1）精油性质\n味道清甜，带有刺激味，颜色黄色到橘红色，黏性水质。货架期约为\
    \ 6 个月。\n\n##### （2）来源\n酸橙是一种常绿乔木，高约 10m，羽状叶，叶片暗绿色，白色花，微带香气，果实形状类似于柑橘，果皮粗糙、圆形、黄色。原产于中国，现在西班牙、意大利有大面积栽培。\n\
    苦橙是酸橙的变种，我国又称玳玳花，花极香。由于果实 2~3 年不落，隔年花果同在，犹如“三代同堂”。\n\n##### （3）提取方法\n以果皮为原料，采用冷榨法提取，出油率在\
    \ 0.3%~0.5%。\n\n##### （4）化学成份\n包括松萜或蒎烯、月桂（香叶）烯、柠檬油精、萜品油烯或异松油烯、桉树脑、芳樟醇、龙脑、柠檬醛和微量的醋酸橙花醛、乙酸香叶酯。\n\
    \n##### （5）治疗功效\n1. 在芳香疗法中使用时，它是一种总能给人以快乐的精油。因为它能给大脑带来幸福和温馨的感觉，可以帮助人们放松和帮助孩子在晚上入睡。\n\
    2. 它对免疫系统有促进功能，能预防感冒和流感。\n3. 它对淋巴循环系统有刺激作用，有助于平衡体内的水分循环，有排除体内毒素和利尿作用。\n4. 它对于消化系统是一种常用的滋补剂，有助于缓解便秘和消化不良。\n\
    \n##### （6）使用注意事项\n它是一种无毒、无刺激和无过敏性的安全用油。不过，要小心使用，因为它有光敏感反应。因此，在使用酸橙精油后，最好不要暴露在阳光下。\n\
    \n##### （7）用法\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，酸橙精油有助于治疗感冒、流感、神经紧张和压力过大，还可以创造一种幸福和温馨的感觉，在晚上，可以帮助孩子入睡。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   酸橙精油做复方按摩油或稀释在浴盆中使用，可以用于治疗感冒、流感，有排毒和促进淋巴循环系统的功能，还能缓解神经紧张和压力过大。\n\
    3. **做面霜或洗液的成份。**\n   当用做面霜或洗液的成份时，它有利于淋巴循环系统，帮助有皱纹的肌肤排毒。虽然它仅仅是一般的皮肤滋补品，但是对于老化的肌肤，也有很好的使用效果。可以治疗炎症、痤疮和抚慰干性、易受刺激的皮肤。能够作为皮肤滋补品的原因是与它可以促进皮肤胶原质的形成有关，胶原质是一种保持健康、年轻肌肤的成份。\n\
    4. **其他用途**\n   酸橙精油是许多柑橘类型利口酒的制作材料，也是制作食物、饮料和糖果的调味品。用于家具抛光保养时，可以预防虫蛀。\n\n#####\
    \ （8）适合与酸橙精油混用的精油\n包括黑胡椒、肉桂叶、丁香、姜、乳香、檀香和香根草。\n\n#### 2. 欧洲橘子精油\n\n欧洲橘子精油是从橘子植物（Citrus\
    \ reticulata Blanco、Citrus nobili Lour、C. deliciosa Ten.）的果皮中提取的，属于芸香科柑橘属。\n\n\
    ##### （1）精油性质\n味道发甜、刺鼻，颜色橘黄色。\n\n##### （2）来源\n原产于我国，在 1805 年被引入欧洲，稍后传到美洲，现在美洲是这种精油最大的加工地。欧洲橘子的果皮颜色是深橙色，不含有种子。橘与橙最大区别在于橘皮易与果肉分离，而橙皮紧贴果肉。\n\
    \n##### （3）提取方法\n以果皮为原材料，采用冷榨法提取的。\n\n##### （4）化学成份\n侧柏酮、松萜或蒎烯、茨烯、桧烯、月桂（香叶）烯、柠檬油精、松油精或萜品烯、芳樟醇、香茅醛、萜品烯或松油烯、橙花醇、牻牛儿醛或香叶醛。\n\
    \n##### （5）治疗功效\n这种味道扑鼻，并能引起人们兴趣的精油有许多很好的功效。\n1. 欧洲橘子精油对神经系统有抚慰的作用，对消化系统有滋补的作用，还有助于治疗肠胃气胀、痢疾和便秘。\n\
    2. 它对皮肤也有使用价值，可以延缓皮肤松懈，能促进循环，降低流体阻力。\n\n##### （6）使用注意事项\n一般认为，它是无毒、无刺激性和光敏性的精油。但是，有发生光敏性的报道，所以使用橘子精油后，最好不要暴露在阳光下。\n\
    \n##### （7）用途\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，欧洲橘子精油可以用于抚慰神经系统，所以也就可以缓解压力和紧张状态，也能够促进消化系统的功能。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   欧洲橘子精油做复方按摩油或稀释在浴盆中使用，有助于神经系统的调节，可以缓解肠胃气胀、痢疾、便秘以及其他消化系统的疾病，还能够促进皮肤的循环功能，降低流体阻力，防止皮肤松懈。\n\
    3. **做面霜或润肤乳的成份**\n   欧洲橘子精油有助于预防因怀孕造成的皮肤松懈，还可以促进循环和降低流体阻力。\n\n##### （8）适合与欧洲橘子精油混用的精油\n\
    佛手柑、肉桂、快乐鼠尾草、丁香、乳香、薰衣草、肉豆蔻和橙花精油。\n\n#### 3. 柠檬精油\n\n柠檬精油是从柠檬植物（Citrus Limon）果皮中提取的，柠檬属于芸香科。\n\
    \n##### （1）精油性质\n气味强烈、清新，淡绿黄色，水质黏性。如果用于芳香疗法上，柠檬精油的保质期仅为 8~10 个月，但是过了保质期后，仍可以用于芳香治疗，如蒸汽疗法。\n\
    \n##### （2）来源\n原产于印度，这是一种常绿植物，可以长到 6m 高，叶片黑绿色、卵形、边缘带锯齿，花色粉色或白色，香味浓郁。树带刺，果实成熟过程，由绿变黄。\n\
    柠檬的英文单词 Lemon，来源于阿拉伯文 laimun 或波斯人语 limun，这种树是由十字军战士在中世纪时期带入欧洲的。它的果实含有丰富的维生素 A、维生素\
    \ B、维生素 C，在皇家海军中，每人每天喝 30 毫升的柠檬汁，以预防坏血病和其他维生素缺乏症。\n\n##### （3）提取方法\n以新鲜果皮为原料，采用冷榨法提取的。\n\
    \n##### （4）化学成份\n松萜或蒎烯、茨烯、桧烯、月桂（香叶）烯、松油精、芳樟醇、红没药烯、柠檬油精、橙花醇和橙花醛。\n\n##### （5）治疗功效\n\
    柠檬精油能改善循环系统功能，包括促进血液循环，以降低血压，止鼻血。它可以增强免疫系统，净化身体，改善消化系统功能，分解脂肪团，治疗消化不良和便秘。柠檬精油具有抚慰和缓解头痛、偏头痛的作用，通过中和身体内的酸性物质，对治疗关节炎和风湿病也有帮助。还有助于清洁痤疮，清洁油腻皮肤和头发，以及去掉死皮细胞。\n\
    \n##### （6）使用注意事项\n柠檬精油无毒，个别人对它有过敏和感光反应。由于它具有光敏性，在见光之前要避免使用（即使浓度很低）。\n\n#####\
    \ （7）用途\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，柠檬精油可以用于治疗感冒、失声、流感、抑郁、缺乏精力和疲劳。此外，它可以缓解刺激，也可以改善注意力，振奋精神，清新头脑和帮助果断地处理问题。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   柠檬精油做复方按摩油或稀释在浴盆中使用，可以用于治疗消化问题、缺乏精力、疲劳、感染、流感、肥胖、风湿病、抑郁和作为常用的滋补品。\n\
    3. **做面霜或润肤乳的成份**\n   当用于面霜或润肤乳成份时，柠檬精油可以清洁皮肤。它的收敛性特别适合于油性皮肤。另外，它的防腐杀菌的功效可以用于治疗割伤、烫伤和轻微的创伤。它的促进发红的功效可以用于分解脂肪团和治疗痤疮。\n\
    4. **做漱口水的成份**\n   把柠檬精油稀释在温和的水中，可以作为非常好的漱口水，用于治疗口腔溃疡。\n5. **其他用法**\n   这种清新气味的柑橘属精油的利用价值，不仅表现在做决定和促进精力集中的时候，在日本的银行，它被用于清新空气，缓解工作疲劳。它还是普遍受欢迎的食品和香水的用料。\n\
    \n##### （8）适合与柠檬精油混用的精油\n薰衣草、玫瑰、檀香、安息香、尤加利、天竺葵、茴香、橙花油和榄香精油。\n\n#### 4. 葡萄柚精油\n\
    \n葡萄柚精油是从葡萄柚植物（Citrus paradisi Macf.）中提取的，属于芸香科柑橘属，又称为文旦果。\n\n##### （1）精油的性质\n\
    葡萄柚精油有种能够强烈提神的味道，颜色淡黄或浅红宝石色，水质黏性。与所有的柑橘属精油一样，葡萄柚精油应该在购买期内 6 个月用完。\n\n##### （2）来源\n\
    葡萄柚起源于亚洲，现在主要在美国、巴西和以色列栽种。葡萄柚果实是从一种叶片光滑的树上采摘的，树高 10m，白色花，果实巨大、淡黄色。精油腺埋入在果皮深处，只能产少量的精油。\n\
    \n##### （3）提取方法\n以新鲜果皮为原料的，采用冷榨方法，出油率在 0.5%~1%。\n\n##### （4）化学成份\n松萜或蒎烯、桧烯、月桂烯、柠檬油精、香叶醇、芳樟醇、香茅醛、乙酸葵酯和菖品烯或松油烯。\n\
    \n##### （5）治疗功效\n1. 葡萄柚精油有激励情绪的效果，可以缓和压力和沮丧。\n2. 葡萄柚精油可以帮助油性皮肤保持清洁，可以调理肌肤和组织，对治疗痤疮也有帮助。葡萄柚精油常在头发护理中用到，能促进头发生长。\n\
    3. 葡萄柚精油含有高浓度的维生素 C，因而对免疫系统非常有利用价值。可以有效地预防感冒和流感。\n4. 葡萄柚精油最适合用于分解脂肪团（臀、腿部），对于减轻体重和利尿也有积极的作用，还能帮助身体排除过多的水分。通过刺激淋巴系统的循环，还可以排除体内的毒素。\n\
    5. 对于治疗肌肉疲乏和僵硬疗效显著。\n\n##### （6）使用注意事项\n没有毒性、没有刺激性和过敏性，虽然被列入到没有光敏性精油的行列，但是如果使用后暴露在强光下，可能会引起刺激性反应。\n\
    \n##### （7）用法\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，葡萄柚精油可以用于治疗宿醉、头痛、性欲过度、精力耗竭和压抑。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   葡萄柚精油可以在复方按摩油里使用，也可以添加在浴盆中使用，以促进脂肪团的分解，帮助治疗和缓解感冒、流感、缺乏活力、时差反应、肌肉疲劳、体重超标、头痛、闷闷不乐、精神和身体的疲乏。\n\
    3. **做洗液、面霜和润肤乳的添加成份**\n   当用作面霜、润肤乳或洗液的添加成份使用时，葡萄柚精油有助于洁净油脂性和带痤疮的肌肤，也可以帮助皮肤组织去除脂肪团，排除体内过多的水分。\n\
    \n##### （8）适合与葡萄柚精油混用的精油\n香柠檬、薰衣草、天竺葵、棕榈玫瑰和乳香精油。\n\n#### 5. 佛手柑精油\n\n佛手柑精油是从佛手树（Citrus\
    \ aurantium var. bergamia、C. bergamia Risso & Poit.）中提取的，属于芸香科柑橘属，又称贝加莫柑橘、贝加毛橙。\n\
    \n##### （1）精油性质\n精油的味道以柑橘属植物共有味道为主，然而，其特点是带有发甜的水果味，同时，还会散发一种温和的辛辣的花香味，令人想到橙花油和薰衣草油。精油的颜色在绿色到绿黄色间变化，油质为水黏性。\n\
    \n##### （2）来源\n佛手树起源于亚洲东南部，后被引入欧洲，尤其是意大利，在象牙海岸、摩洛哥、突尼斯和阿尔及利亚（北非国家）也有种植。\n这种树可以长到\
    \ 4m 高，花是星状的，叶片光滑，所结果实既像橘子又像葡萄柚，形状像梨。果实成熟过程，颜色从绿变成黄色。\n佛手柑精油与橙花油、薰衣草油一样是香料店、化妆品以及窗体行业使用最广泛的精油之一，还是经典的\
    \ 4711 科隆香水的主要成份，厄尔氏灰茶也用到它。\n它的另一个名字贝加莫柑橘精油来源于意大利的贝加莫，这种精油最初是在那里开始销售的。\n\n#####\
    \ （3）提取方法\n以成熟和没有成熟果实的果皮为原料，利用压榨方法提取精油，出油率可以达到 0.5%。\n\n##### （4）化学成份\n松萜或蒎烯、月桂烯或香叶烯、柠檬油精、香柑内酯、红没药烯、芳樟醇、乙酸里哪酯、橙花醇、香叶醇、醋酸香叶醇、萜品醇、松油醇、苧烯。\n\
    \n##### （5）治疗功效\n这种精油味道清新，在芳香疗法中是令人喜爱的，能创造一种放松和愉快的感觉。当你正在寻找一种精油来治疗精神抑郁、SAD（季节性的失调）或一般的情感问题，如缺乏自信或性格内向，可以考虑佛手柑精油。它可以缓解泌尿系统感染，对肝脏、脾和胃有利。适用于油性皮肤、痤疮（青春痘）、牛皮癣、湿疹和因感冒引起的疼痛。佛手柑精油还可以用于治疗精神忧郁、压力大、紧张、恐慌、不正常的兴奋、感染（包括各种皮肤问题)、厌食、牛皮癣、湿疹等，在帮助身体康复中有很大的作用。它还有极好的杀菌作用，经常被用于治疗皮肤病，如痤疮、油性皮肤、湿疹、牛皮癣，也可以用于治疗感冒引起的疼痛和鸡皮疙瘩、创伤。它对于激励肝脏、肠胃和脾的功能，有良好的效果。在治疗泌尿系统感染和炎症方面，效果极好，如膀胱炎。\n\
    \n##### （6）使用注意事项\n在敏感皮肤上使用佛手柑精油，暴露在阳光下时会产生灼热的感觉，因为，它所含高浓度的香柑内酯能引起光毒性反应。所以，我们建议在皮肤上使用这种精油时，避免暴露在阳光下。即使把香柑内酯成份从精油中去除，光毒性能减少，但仍建议在皮肤上使用这种精油后不要暴露在阳光下，并且使用浓度要低于\
    \ 1%。\n\n##### （7）用法\n1. **香炉和蒸汽熏香**\n   利用蒸汽治疗，佛手柑精油可以用于治疗精神压抑、情感低落以及呼吸系统问题、感冒、PMS（经前紧张综合症）和\
    \ SAD。\n2. **做为复方按摩油和盆浴的添加成份**\n   它可以在复方按摩油中或者稀释在浴盆中使用，有助于治疗精神压抑、神经紧张、SAD、PMS、皮肤问题、暴饮暴食、产后抑郁、感冒、焦虑、情绪低落和厌食症。\n\
    3. **做面霜的成份**\n   作为基础面霜的成份，佛手柑精油可以用于治疗创伤、牛皮癣、油性皮肤、疥疮、湿疹、痤疮、感冒和鸡皮疙瘩。\n\n#####\
    \ （8）适合与佛手柑精油混用的精油\n黑胡椒、快乐鼠尾草、柏树、乳香、天竺葵、茉莉、中国柑橘、肉豆蔻、柑橘、迷迭香、檀香、香根草和依兰精油。\n\n###\
    \ （二）花类精油\n\n#### 1. 橙花精油\n\n橙花精油是从一种苦橙植物（Citrus aurantium var. amara、Citrus vulgaris\
    \ and C. Bigardia）的花中提取的，属于芸香科。\n\n##### （1）精油性质\n味道清甜，有花香味，这种令人不易忘怀的清香味，颜色淡黄，黏性水质。购买橙花精油的时候要小心，因为有许多供应商在这种油中掺基础油，以获得更多的利润。它的气味强烈，即使稀释浓度很低时，它仍会散发出令人难以置信的气味。\n\
    \n##### （2）来源\n它又被称为“柑橘花”，因为用大约 1000 kg 的柑橘花才能生产 1 kg 的橙花精油。据说，它的名字同一位意大利公主有关，她用这种精油作为香水使用，还用它熏香洗浴水和手套。它至今还是制作法国科隆香水的原料。柑橘花还经常用于婚礼和洗礼的仪式上，新娘用它来修饰自己，传统上，新娘用柑橘花蕾修饰她的头发。"
  mdcn: "## 2. 针刺提取法\n\n这种压榨提取方法主要用于获取柑橘属精油，比海绵压榨法会减少一些劳动强度，这是一种更加现代的精油提取方法。所谓针刺提取法，就是把果实放在容器内，容器内壁有针不断旋转，能刺破果实表面含油细胞。这样，含油细胞破裂，精油和其他的物质，如色素，就会流到容器中心的位置，那里设有收集器。精油会漂浮在混合物的上面，底下是水分。这时，就可以把精油从混合物中转移出来，倒入另外的容器中。\n\
    \n## 3. 机械研磨提取法\n\n这种压榨提取方法与针刺法方法很相似，经常用于柑橘属植物精油的提取中。机械研磨是指先用机械把外果皮剥离，然后由流动的水把果皮分离出来，被投入到离心式分离器中。离心式分离方法提取油的过程很快，但是需要记住，因为精油是与其他细胞成份相混着的，里面存在着一些酶促反应，所以要对提取工艺加以改造。\n\
    \n### （四）植物精油溶剂萃取方法\n\n如果从广义上来谈论溶剂提取法的概念，它所指的就不仅仅是化学溶剂的提取，如（正）乙烷，还会包括其他的形式，如用固体油脂和\
    \ CO₂做溶剂。溶剂提取尤其适用的植物材料，是含有精油成份很少的材料，或者这种材料主要由树脂成份构成。这种方法提取精油的香味要比蒸馏法好。在这种类型的精油提取方法中，植物材料中不容易分离出来的成份，如蜡状物和色素也能被分离出来，而在其他的提取过程中，就实现不了。\n\
    \n#### 1. 浸泡提取方法\n\n使用浸泡提取方法，就是把花瓣浸泡在热的油中，细胞膜破裂，精油被热油吸收了，把植物材料中的油分离出来，移入到其他容器中。这种提取技术与溶剂提取法非常接近，所不同之处在于，在浸泡提取中使用的提取剂是热油，而不是溶剂。\n\
    \n#### 2. 脂肪吸附萃取\n\n脂肪溶剂萃取与浸泡提取，有许多方面可以比较，但是在应用方面还是有些细微的差别。\n\n玻璃框架的盘子（称为底盘），上面覆盖高纯度并且无味的植物或动物脂肪，把要萃取的植物花瓣材料平铺在油脂上面，然后进行挤压。一般花在新鲜的时候就采摘下来，在它们的油脂腺还没被包裹住之前，花瓣在油脂的混合物中可以保留几天，让花瓣的精油释放到混合物中，然后把萃取所剩的花瓣除去，再放入新采摘的花瓣。重复这个程序，直到这种油脂性混合物所含的精油达到饱和为止。这个过程需要重复很长时间，约需\
    \ 20 次。当混合物达到饱和点时，把花瓣去掉，用酒精冲洗脂肪溶剂和精油的混合物，把萃取物从所剩的脂肪中分离出来，留下的脂肪可以用做制造肥皂的材料。最后，把酒精从混合物蒸发掉，所剩下的就是精油。这是一种劳动力密集的提取方法，这种获取精油的方法是很昂贵的，如今，一般只在提取晚香玉和茉莉精油的时候用到。\n\
    \n### 3. 有机溶剂提取法\n\n使用溶剂可以提取精油，如石油醚、甲醇、乙醇或（正）乙烷。这种方法经常用于对易碎材料的提取，如茉莉、风信子、水仙和晚香玉，它们经受不起蒸汽蒸馏产生的热量。\n\
    \n溶剂提取精油的浓度很高，更接近于天然植物材料具有的香味。虽然溶剂提取方法使用范围很广，但是有些人认为，这样提取的油不适合做芳香疗法的用油，因为溶剂的残留物可能会出现在最终的产品里。据报道，提取的最终产品中含有溶剂残留量可达到\
    \ 6% ~ 20% 。如果拿苯作为标准溶剂进行衡量的话，使用（正）乙烷作为溶剂，产品中溶剂的残留量会下降到 10ppm，这是非常低的溶剂残留浓度。值得一提的是，苯已经不在提取中使用了，因为苯被认为是一种致癌物质。\n\
    \n溶剂提取后的植物材料，可以用它生产一种蜡质的芳香化合物，称为“固体精油”。\n\n### 4. 超临界 CO₂萃取技术提取精油\n\n使用超临界 CO₂萃取技术从植物材料中提取精油，是一种相当新的方法。虽然，在成本方面有些增加，但是的确可以产出质量很好的油。在高压的条件下，CO₂在\
    \ 33℃时，处于一种极不稳定的状态，既不是液体又不是气体，但却同时具有两者的性质，此时，它就成为提取精油最好的溶剂，因为提取过程是在室温条件下瞬间完成的。另外，CO₂是一种惰性气体，因此不会与被提取物发生化学反应。如果想去掉\
    \ CO₂溶剂，仅需要降低压力就可以。这种提取过程必须要在密闭的容器内进行，因为需要 200 个大气压才能使 CO₂处于临界状态，200 个大气压意味着是正常大气压力的\
    \ 200 倍。为了保持到这么高的压力，需要一套不锈钢的设备，所以这种提取方法的生产成本很高。\n\n### （五）基础油冷榨法\n\n基础油的冷榨法与精油的压榨法在工作原理上有相似的地方，最显著的不同点是基础油的冷榨法所使用的压力要比压榨果皮类的植物材料大很多，以采用液液压榨油机制作真正甜杏仁油为例，如直径为\
    \ 20cm 的榨桶需要的压力会达到 100 吨以上。\n\n基础油的冷榨法工艺与食用油的压榨工艺也存在很多差异，具体表现在对原材料的处理方面和对毛油的精炼方面，基础油要求的条件更高些。\n\
    \n基础油的冷榨工艺过程中，植物原料的最高温度不能超过 50℃，否则基础油中的活性物质和保质期将受到影响。因为，不能采用高温灭菌，基础油需要采用膜过滤的方式去掉油中的微生物。为了提高基础油的保质期和质量，基础油的过滤环境要做到：低温、无菌、无氧和无光。\n\
    \n![液液压榨油机](img/9a4032e2e8ad73992ff2b2bd7fc25509_35_0.png)\n\n## 四、常用单方植物精油\n\n\
    ### （一）柑橘类精油\n\n#### 1. 酸橙精油\n\n酸橙精油是从酸橙植物（Citrus aurantium linn.）和苦橙植物（C. aurantium\
    \ linn. var. amura Engl.）的果皮中提取的，酸橙属于芸香科柑橘属。\n\n##### （1）精油性质\n味道清甜，带有刺激味，颜色黄色到橘红色，黏性水质。货架期约为\
    \ 6 个月。\n\n##### （2）来源\n酸橙是一种常绿乔木，高约 10m，羽状叶，叶片暗绿色，白色花，微带香气，果实形状类似于柑橘，果皮粗糙、圆形、黄色。原产于中国，现在西班牙、意大利有大面积栽培。\n\
    苦橙是酸橙的变种，我国又称玳玳花，花极香。由于果实 2~3 年不落，隔年花果同在，犹如“三代同堂”。\n\n##### （3）提取方法\n以果皮为原料，采用冷榨法提取，出油率在\
    \ 0.3%~0.5%。\n\n##### （4）化学成份\n包括松萜或蒎烯、月桂（香叶）烯、柠檬油精、萜品油烯或异松油烯、桉树脑、芳樟醇、龙脑、柠檬醛和微量的醋酸橙花醛、乙酸香叶酯。\n\
    \n##### （5）治疗功效\n1. 在芳香疗法中使用时，它是一种总能给人以快乐的精油。因为它能给大脑带来幸福和温馨的感觉，可以帮助人们放松和帮助孩子在晚上入睡。\n\
    2. 它对免疫系统有促进功能，能预防感冒和流感。\n3. 它对淋巴循环系统有刺激作用，有助于平衡体内的水分循环，有排除体内毒素和利尿作用。\n4. 它对于消化系统是一种常用的滋补剂，有助于缓解便秘和消化不良。\n\
    \n##### （6）使用注意事项\n它是一种无毒、无刺激和无过敏性的安全用油。不过，要小心使用，因为它有光敏感反应。因此，在使用酸橙精油后，最好不要暴露在阳光下。\n\
    \n##### （7）用法\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，酸橙精油有助于治疗感冒、流感、神经紧张和压力过大，还可以创造一种幸福和温馨的感觉，在晚上，可以帮助孩子入睡。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   酸橙精油做复方按摩油或稀释在浴盆中使用，可以用于治疗感冒、流感，有排毒和促进淋巴循环系统的功能，还能缓解神经紧张和压力过大。\n\
    3. **做面霜或洗液的成份。**\n   当用做面霜或洗液的成份时，它有利于淋巴循环系统，帮助有皱纹的肌肤排毒。虽然它仅仅是一般的皮肤滋补品，但是对于老化的肌肤，也有很好的使用效果。可以治疗炎症、痤疮和抚慰干性、易受刺激的皮肤。能够作为皮肤滋补品的原因是与它可以促进皮肤胶原质的形成有关，胶原质是一种保持健康、年轻肌肤的成份。\n\
    4. **其他用途**\n   酸橙精油是许多柑橘类型利口酒的制作材料，也是制作食物、饮料和糖果的调味品。用于家具抛光保养时，可以预防虫蛀。\n\n#####\
    \ （8）适合与酸橙精油混用的精油\n包括黑胡椒、肉桂叶、丁香、姜、乳香、檀香和香根草。\n\n#### 2. 欧洲橘子精油\n\n欧洲橘子精油是从橘子植物（Citrus\
    \ reticulata Blanco、Citrus nobili Lour、C. deliciosa Ten.）的果皮中提取的，属于芸香科柑橘属。\n\n\
    ##### （1）精油性质\n味道发甜、刺鼻，颜色橘黄色。\n\n##### （2）来源\n原产于我国，在 1805 年被引入欧洲，稍后传到美洲，现在美洲是这种精油最大的加工地。欧洲橘子的果皮颜色是深橙色，不含有种子。橘与橙最大区别在于橘皮易与果肉分离，而橙皮紧贴果肉。\n\
    \n##### （3）提取方法\n以果皮为原材料，采用冷榨法提取的。\n\n##### （4）化学成份\n侧柏酮、松萜或蒎烯、茨烯、桧烯、月桂（香叶）烯、柠檬油精、松油精或萜品烯、芳樟醇、香茅醛、萜品烯或松油烯、橙花醇、牻牛儿醛或香叶醛。\n\
    \n##### （5）治疗功效\n这种味道扑鼻，并能引起人们兴趣的精油有许多很好的功效。\n1. 欧洲橘子精油对神经系统有抚慰的作用，对消化系统有滋补的作用，还有助于治疗肠胃气胀、痢疾和便秘。\n\
    2. 它对皮肤也有使用价值，可以延缓皮肤松懈，能促进循环，降低流体阻力。\n\n##### （6）使用注意事项\n一般认为，它是无毒、无刺激性和光敏性的精油。但是，有发生光敏性的报道，所以使用橘子精油后，最好不要暴露在阳光下。\n\
    \n##### （7）用途\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，欧洲橘子精油可以用于抚慰神经系统，所以也就可以缓解压力和紧张状态，也能够促进消化系统的功能。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   欧洲橘子精油做复方按摩油或稀释在浴盆中使用，有助于神经系统的调节，可以缓解肠胃气胀、痢疾、便秘以及其他消化系统的疾病，还能够促进皮肤的循环功能，降低流体阻力，防止皮肤松懈。\n\
    3. **做面霜或润肤乳的成份**\n   欧洲橘子精油有助于预防因怀孕造成的皮肤松懈，还可以促进循环和降低流体阻力。\n\n##### （8）适合与欧洲橘子精油混用的精油\n\
    佛手柑、肉桂、快乐鼠尾草、丁香、乳香、薰衣草、肉豆蔻和橙花精油。\n\n#### 3. 柠檬精油\n\n柠檬精油是从柠檬植物（Citrus Limon）果皮中提取的，柠檬属于芸香科。\n\
    \n##### （1）精油性质\n气味强烈、清新，淡绿黄色，水质黏性。如果用于芳香疗法上，柠檬精油的保质期仅为 8~10 个月，但是过了保质期后，仍可以用于芳香治疗，如蒸汽疗法。\n\
    \n##### （2）来源\n原产于印度，这是一种常绿植物，可以长到 6m 高，叶片黑绿色、卵形、边缘带锯齿，花色粉色或白色，香味浓郁。树带刺，果实成熟过程，由绿变黄。\n\
    柠檬的英文单词 Lemon，来源于阿拉伯文 laimun 或波斯人语 limun，这种树是由十字军战士在中世纪时期带入欧洲的。它的果实含有丰富的维生素 A、维生素\
    \ B、维生素 C，在皇家海军中，每人每天喝 30 毫升的柠檬汁，以预防坏血病和其他维生素缺乏症。\n\n##### （3）提取方法\n以新鲜果皮为原料，采用冷榨法提取的。\n\
    \n##### （4）化学成份\n松萜或蒎烯、茨烯、桧烯、月桂（香叶）烯、松油精、芳樟醇、红没药烯、柠檬油精、橙花醇和橙花醛。\n\n##### （5）治疗功效\n\
    柠檬精油能改善循环系统功能，包括促进血液循环，以降低血压，止鼻血。它可以增强免疫系统，净化身体，改善消化系统功能，分解脂肪团，治疗消化不良和便秘。柠檬精油具有抚慰和缓解头痛、偏头痛的作用，通过中和身体内的酸性物质，对治疗关节炎和风湿病也有帮助。还有助于清洁痤疮，清洁油腻皮肤和头发，以及去掉死皮细胞。\n\
    \n##### （6）使用注意事项\n柠檬精油无毒，个别人对它有过敏和感光反应。由于它具有光敏性，在见光之前要避免使用（即使浓度很低）。\n\n#####\
    \ （7）用途\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，柠檬精油可以用于治疗感冒、失声、流感、抑郁、缺乏精力和疲劳。此外，它可以缓解刺激，也可以改善注意力，振奋精神，清新头脑和帮助果断地处理问题。\n\
    2. **做复方按摩油或稀释在浴盆中使用**\n   柠檬精油做复方按摩油或稀释在浴盆中使用，可以用于治疗消化问题、缺乏精力、疲劳、感染、流感、肥胖、风湿病、抑郁和作为常用的滋补品。\n\
    3. **做面霜或润肤乳的成份**\n   当用于面霜或润肤乳成份时，柠檬精油可以清洁皮肤。它的收敛性特别适合于油性皮肤。另外，它的防腐杀菌的功效可以用于治疗割伤、烫伤和轻微的创伤。它的促进发红的功效可以用于分解脂肪团和治疗痤疮。\n\
    4. **做漱口水的成份**\n   把柠檬精油稀释在温和的水中，可以作为非常好的漱口水，用于治疗口腔溃疡。\n5. **其他用法**\n   这种清新气味的柑橘属精油的利用价值，不仅表现在做决定和促进精力集中的时候，在日本的银行，它被用于清新空气，缓解工作疲劳。它还是普遍受欢迎的食品和香水的用料。\n\
    \n##### （8）适合与柠檬精油混用的精油\n薰衣草、玫瑰、檀香、安息香、尤加利、天竺葵、茴香、橙花油和榄香精油。\n\n#### 4. 葡萄柚精油\n\
    \n葡萄柚精油是从葡萄柚植物（Citrus paradisi Macf.）中提取的，属于芸香科柑橘属，又称为文旦果。\n\n##### （1）精油的性质\n\
    葡萄柚精油有种能够强烈提神的味道，颜色淡黄或浅红宝石色，水质黏性。与所有的柑橘属精油一样，葡萄柚精油应该在购买期内 6 个月用完。\n\n##### （2）来源\n\
    葡萄柚起源于亚洲，现在主要在美国、巴西和以色列栽种。葡萄柚果实是从一种叶片光滑的树上采摘的，树高 10m，白色花，果实巨大、淡黄色。精油腺埋入在果皮深处，只能产少量的精油。\n\
    \n##### （3）提取方法\n以新鲜果皮为原料的，采用冷榨方法，出油率在 0.5%~1%。\n\n##### （4）化学成份\n松萜或蒎烯、桧烯、月桂烯、柠檬油精、香叶醇、芳樟醇、香茅醛、乙酸葵酯和菖品烯或松油烯。\n\
    \n##### （5）治疗功效\n1. 葡萄柚精油有激励情绪的效果，可以缓和压力和沮丧。\n2. 葡萄柚精油可以帮助油性皮肤保持清洁，可以调理肌肤和组织，对治疗痤疮也有帮助。葡萄柚精油常在头发护理中用到，能促进头发生长。\n\
    3. 葡萄柚精油含有高浓度的维生素 C，因而对免疫系统非常有利用价值。可以有效地预防感冒和流感。\n4. 葡萄柚精油最适合用于分解脂肪团（臀、腿部），对于减轻体重和利尿也有积极的作用，还能帮助身体排除过多的水分。通过刺激淋巴系统的循环，还可以排除体内的毒素。\n\
    5. 对于治疗肌肉疲乏和僵硬疗效显著。\n\n##### （6）使用注意事项\n没有毒性、没有刺激性和过敏性，虽然被列入到没有光敏性精油的行列，但是如果使用后暴露在强光下，可能会引起刺激性反应。\n\
    \n##### （7）用法\n1. **香炉和蒸发器熏香**\n   在蒸汽疗法中，葡萄柚精油可以用于治疗宿醉、头痛、性欲过度、精力耗竭和压抑。\n2. **做复方按摩油或稀释在浴盆中使用**\n\
    \   葡萄柚精油可以在复方按摩油里使用，也可以添加在浴盆中使用，以促进脂肪团的分解，帮助治疗和缓解感冒、流感、缺乏活力、时差反应、肌肉疲劳、体重超标、头痛、闷闷不乐、精神和身体的疲乏。\n\
    3. **做洗液、面霜和润肤乳的添加成份**\n   当用作面霜、润肤乳或洗液的添加成份使用时，葡萄柚精油有助于洁净油脂性和带痤疮的肌肤，也可以帮助皮肤组织去除脂肪团，排除体内过多的水分。\n\
    \n##### （8）适合与葡萄柚精油混用的精油\n香柠檬、薰衣草、天竺葵、棕榈玫瑰和乳香精油。\n\n#### 5. 佛手柑精油\n\n佛手柑精油是从佛手树（Citrus\
    \ aurantium var. bergamia、C. bergamia Risso & Poit.）中提取的，属于芸香科柑橘属，又称贝加莫柑橘、贝加毛橙。\n\
    \n##### （1）精油性质\n精油的味道以柑橘属植物共有味道为主，然而，其特点是带有发甜的水果味，同时，还会散发一种温和的辛辣的花香味，令人想到橙花油和薰衣草油。精油的颜色在绿色到绿黄色间变化，油质为水黏性。\n\
    \n##### （2）来源\n佛手树起源于亚洲东南部，后被引入欧洲，尤其是意大利，在象牙海岸、摩洛哥、突尼斯和阿尔及利亚（北非国家）也有种植。\n这种树可以长到\
    \ 4m 高，花是星状的，叶片光滑，所结果实既像橘子又像葡萄柚，形状像梨。果实成熟过程，颜色从绿变成黄色。\n佛手柑精油与橙花油、薰衣草油一样是香料店、化妆品以及窗体行业使用最广泛的精油之一，还是经典的\
    \ 4711 科隆香水的主要成份，厄尔氏灰茶也用到它。\n它的另一个名字贝加莫柑橘精油来源于意大利的贝加莫，这种精油最初是在那里开始销售的。\n\n#####\
    \ （3）提取方法\n以成熟和没有成熟果实的果皮为原料，利用压榨方法提取精油，出油率可以达到 0.5%。\n\n##### （4）化学成份\n松萜或蒎烯、月桂烯或香叶烯、柠檬油精、香柑内酯、红没药烯、芳樟醇、乙酸里哪酯、橙花醇、香叶醇、醋酸香叶醇、萜品醇、松油醇、苧烯。\n\
    \n##### （5）治疗功效\n这种精油味道清新，在芳香疗法中是令人喜爱的，能创造一种放松和愉快的感觉。当你正在寻找一种精油来治疗精神抑郁、SAD（季节性的失调）或一般的情感问题，如缺乏自信或性格内向，可以考虑佛手柑精油。它可以缓解泌尿系统感染，对肝脏、脾和胃有利。适用于油性皮肤、痤疮（青春痘）、牛皮癣、湿疹和因感冒引起的疼痛。佛手柑精油还可以用于治疗精神忧郁、压力大、紧张、恐慌、不正常的兴奋、感染（包括各种皮肤问题)、厌食、牛皮癣、湿疹等，在帮助身体康复中有很大的作用。它还有极好的杀菌作用，经常被用于治疗皮肤病，如痤疮、油性皮肤、湿疹、牛皮癣，也可以用于治疗感冒引起的疼痛和鸡皮疙瘩、创伤。它对于激励肝脏、肠胃和脾的功能，有良好的效果。在治疗泌尿系统感染和炎症方面，效果极好，如膀胱炎。\n\
    \n##### （6）使用注意事项\n在敏感皮肤上使用佛手柑精油，暴露在阳光下时会产生灼热的感觉，因为，它所含高浓度的香柑内酯能引起光毒性反应。所以，我们建议在皮肤上使用这种精油时，避免暴露在阳光下。即使把香柑内酯成份从精油中去除，光毒性能减少，但仍建议在皮肤上使用这种精油后不要暴露在阳光下，并且使用浓度要低于\
    \ 1%。\n\n##### （7）用法\n1. **香炉和蒸汽熏香**\n   利用蒸汽治疗，佛手柑精油可以用于治疗精神压抑、情感低落以及呼吸系统问题、感冒、PMS（经前紧张综合症）和\
    \ SAD。\n2. **做为复方按摩油和盆浴的添加成份**\n   它可以在复方按摩油中或者稀释在浴盆中使用，有助于治疗精神压抑、神经紧张、SAD、PMS、皮肤问题、暴饮暴食、产后抑郁、感冒、焦虑、情绪低落和厌食症。\n\
    3. **做面霜的成份**\n   作为基础面霜的成份，佛手柑精油可以用于治疗创伤、牛皮癣、油性皮肤、疥疮、湿疹、痤疮、感冒和鸡皮疙瘩。\n\n#####\
    \ （8）适合与佛手柑精油混用的精油\n黑胡椒、快乐鼠尾草、柏树、乳香、天竺葵、茉莉、中国柑橘、肉豆蔻、柑橘、迷迭香、檀香、香根草和依兰精油。\n\n###\
    \ （二）花类精油\n\n#### 1. 橙花精油\n\n橙花精油是从一种苦橙植物（Citrus aurantium var. amara、Citrus vulgaris\
    \ and C. Bigardia）的花中提取的，属于芸香科。\n\n##### （1）精油性质\n味道清甜，有花香味，这种令人不易忘怀的清香味，颜色淡黄，黏性水质。购买橙花精油的时候要小心，因为有许多供应商在这种油中掺基础油，以获得更多的利润。它的气味强烈，即使稀释浓度很低时，它仍会散发出令人难以置信的气味。\n\
    \n##### （2）来源\n它又被称为“柑橘花”，因为用大约 1000 kg 的柑橘花才能生产 1 kg 的橙花精油。据说，它的名字同一位意大利公主有关，她用这种精油作为香水使用，还用它熏香洗浴水和手套。它至今还是制作法国科隆香水的原料。柑橘花还经常用于婚礼和洗礼的仪式上，新娘用它来修饰自己，传统上，新娘用柑橘花蕾修饰她的头发。"
