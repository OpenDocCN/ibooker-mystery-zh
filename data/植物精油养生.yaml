    **2. 中国和印度**


    在同一时期，中国人也开始利用药草和香草植物；在中国民间家中悬挂芳香植物或点燃香料植物来驱邪避瘟、提神醒脑的习惯由来已久，人们常常点燃天然檀香木及松木来陶冶性情、舒缓紧张压力。印度草医学中也利用到了芳香疗法，在印度宗教的仪式上，檀香木制品可以用来涂抹在国王以及高级祭司的头顶上。


    **3. 希腊**


    古希腊人接纳和吸收了埃及人的医学知识。那个时代最负盛名的是希腊医生希波克拉底（约公元前460～前377年），他同时也是一位“整体协同治疗”的坚定支持者，其中就包括芳香按摩在内的治疗手段。


    **4. 古罗马**


    古罗马人又接受了希腊人的医学知识，开始意识到卫生的重要性，并且相信香味的神奇功能，他们贮存了大量用于芳香疗法的材料，大大提升了当时医疗和健康的水平。


    **5. 阿拉伯帝国**


    当罗马帝国和随后的黑暗年代结束后，我们看到了阿拉伯帝国的兴起，因为地理位置的缘故，他们不但继承了古希腊和古罗马的医学知识，而且还受到中国和印度的影响。


    据史料记载，当时有一位波斯医生（980～1037年）就掌握了精油的蒸馏工艺。


    **（三）植物精油发展历史的重要阶段**


    **1. 黑暗时代**


    在那段时间里，禁止没有受过培训的草药医生们提供民间疗法，巫师这样的人甚至受到迫害。但僧侣们仍躲在寺庙内坚持给病人看病，使草药医学得以流传下来。由于当时教会认为洗澡是一种罪孽，在没有其他办法的情况下，许多有香味的材料被大量使用以遮盖身上的臭味。尽管大部分芳香材料有抗菌和驱虫的作用，但均未起到医疗保健作用，而只是被用作除臭剂。经过那么一段时期，希波克拉底的整体协同疗法几乎消失。


    **2. 复兴时期**


    整体协同治疗疾病观点的复兴也不是一帆风顺的，这个时期最有影响力的医生是佩拉'
  - '[PAGE 9]


    **3. 花香疗法**


    爱德华·布什是一位咨询医生，也是一位受过正规培训的病理学家和细菌学家，但他并不沉迷于传统医学的说教，而是大胆地用花香进行医疗实践，并且形成了自己的一套治疗身体失调的理论。这类疾病一般没有明显的外部症状，但是患者在心理上却存在问题。他的医疗理念虽然没有明显的逻辑性，主要依赖于他自身的直觉，但是治疗的效果却是出奇的好。


    **4. 现代芳香疗法的出现**


    1937年法国化学家兼香料商盖特佛塞提出。他不相信自然疗法，但却对精油的性质感兴趣。1910年，他在实验室烧伤了手，当时身边只有没有稀释过的薰衣草精油，情急之下把手伸进装薰衣草精油的容器中，当时，精油不但立即止住了疼痛，而且伤口愈合过程没有感染和留下伤疤。他还发现少量的精油能被身体吸收，并与体内化学物质相互作用。


    **5. 现代芳香疗法的医疗应用**


    在第一次世界大战期间，根据盖特弗塞的试验结果，著名芳香疗法研究者珍瓦涅医生成功地利用植物精油治疗受伤的战士。他用植物精油（如薰衣草油）为伤病人员处理严重灼伤及溃疡伤口，效果非常明显，从而使精油和医疗有了密不可分的关系。人们尊他为“**芳香疗法之父**”。


    **6. 现代芳香疗法的美容应用**


    玛格丽特·摩莉女士是近代首先以精油按摩方式发挥精油的回春、护肤及心灵呵护效果，并将精油导向美容保养领域的人。1950年，她把精油稀释到植物基础油中，用作皮肤按摩，采用的是太比坦手法，即沿着脊柱突起两侧的神经末梢进行按摩。她也是为个人开具复方精油，以适合不同被按摩人需要的第一人。她主张通过均衡膳食；推行健康生活方式，结合芳香疗法中所用的各种精油、精露、


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_9_0.png)


    **著名化学家盖特佛塞**


    芳香疗法之父—瓦涅医生（Dr.JeanValnet）


    芳香美容创始人—玛格丽特·摩莉


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_9_1.png)


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_9_2.png)'
  - '[PAGE 10]


    植物油及其他天然素材，让人们真正拥有健康、自然、年轻的皮肤，同时兼顾了身体和心灵的健康。


    20世纪70年代开始，植物精油和芳香疗法成为整体协调治疗体系的一个重要组成部分，在世界各地都拥有众多的使用者。


    # （四）植物精油的价值及传播


    植物一般分为木本和草本两大类，可以利用的木本植物和草本植物的器官如下：叶片、根系、茎、芽、嫩枝、根茎、心材、树皮、树脂、花、种子、果实、全株等。


    依据植物所属类型或植物器官的不同来选择提取方式，包括压榨法、蒸馏法和溶剂萃取法。芳香植物材料可以用作提取精油，是因为这些植物都具有油腺细胞，能够产生微量的精油。例如，用6万朵玫瑰花瓣能产出约0.03kg的纯玫瑰精油，大约800万朵手摘的茉莉花瓣仅仅产出约1kg的纯茉莉精油。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_10_0.png)


    某些植物原料（如檀香）必须长到一定的年限，才能用于提取精油。如檀香树生长36年，高度达到30尺时才能砍倒用于蒸馏精油。


    在人类历史发展中，许多精油原料（以下简称为香料）是可以与黄金相提并论的贵重物资。在《圣经》中曾记载着乳香和没药的故事：


    当耶稣刚刚降生的时候，有3个东方博士来到耶路撒冷，询问希律王刚刚出生的当犹太人之王的小孩在哪里，并说他们看见了他的星，特来拜见。希律王打听过后告诉他们说，就在犹太的伯利恒。3位博士就按希律王的话去了，在东方看见的那星，忽然就在他们前方行走，一直行走到小孩出生的地方。他们看见那星，非常高兴，进了房子，看见了刚出生的耶稣和他的父亲约瑟、母亲玛利亚，于是向耶稣俯伏拜见，揭开宝盒，拿出黄


    三位博士前来拜见刚刚出世的耶稣'
  - '[PAGE 11]


    **金、没药和乳香作为礼物献给他。**


    “物以稀为贵”，在栽培技术和运输条件都不发达的古代，香料昂贵的价格逐渐在商品贸易中显现出来。为了争夺香料，不知多少人发动了战争，并在带有血腥味的胜利后，拉着香料举国欢庆。在香料的背后，有战争、争夺、屠杀，有长途跋涉、背井离乡……所以有人说香料有一种危险的味道。在最初的香料贸易中，有两条路线起着重要作用：印度洋航线和丝绸之路。


    早期的香料贸易是经由印度洋航线进行的，这条海上航线的开辟，大大便利了各国的贸易往来。海员们可以从埃及出发到达印度，而欧洲和印度洋海陆之间也可以直接进行贸易交流。早期，许多香料，如产于中国的生姜、远东的肉桂和桂皮，就是通过这条航线进行贸易的，在公元前就传到了地中海地区。然而，海上航行相当危险，触礁、沉船是经常发生的事情，许多船员在做着香料美梦的同时葬身于海底……


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_11_0.png)


    **早期的海上航行**


    海上路线的危险性，让人们不得不寻找新的贸易路线。伊朗陆路，就是我们所说的“丝绸之路”是另一条重要的贸易通道。骆驼队在这条道路上通常要走上好几个月，所以只有非常贵重的产品才能支付这么庞大的运输费用。当然，在丝绸之路上交易的货物不仅仅是丝绸，很多地方香料通过这条路线的开通，逐渐走向了世界，在世界各地得到了普及，其中包括大黄、甘草和麝香。'
  - '[PAGE 12]


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_12_0.png)


    "丝绸之路"上前行的骆驼队


    大多数人使用精油是因为它们的治疗功效或仅仅是它们的香气，但也有人对精油具有的化学性质有兴趣，想了解它们的化学成份。知道构成精油的天然化学成份是件让人感兴趣的事情。不过令人惭愧的是，即使人们尽了最大的努力，在实验室按正确的比例合成的精油却仍然无法与天然精油相比拟。


    # (五) 植物精油的成份


    精油，就像其他有机成份一样，是由碳水化合物分子构成的，可以进一步分为萜烯[萜（烃）]、乙醇、酯、醛、酮和苯酚等。每种单一精油一般都由数百种成份构成。精油种类不同，构建成份的种类也多种多样。当用色谱仪分析精油时，可以发现各种各样的有机成份。其主要成份如下：


    1. 萜烯碳氢化合物


    单萜


    【基本情况】


    几乎所有的精油都含有这些单萜化合物，单萜化合物由 10 个碳原子构成，含有一个以上的双键，这 10 个碳原子是从两个异戊间二烯演变来的。


    萜烯的通式为 (C5H8)n，其中 n = 2，分子式为 C10H16的萜烯称为单萜烯。以两个异戊二烯单位“头尾”相连接而成的 2，6 - 二甲基辛烷为基本骨架。可分为：1）链状单萜烯类，如月桂烯、柠檬醛；2）单环单萜烯类如薄荷醇、柠檬烯等；3）双环单萜烯类，如龙'
- md: '## （六）植物精油的功效举例


    表 1-1 是以植物类别划分的精油治疗功效的清单。


    | 序号 | 治疗功效 | 相关精油的原植物 |

    | :--- | :--- | :--- |

    | 1 | 麻醉 | 肉桂、丁香、椒样薄荷 |

    | 2 | 抗应变性 | 甘菊、蜜蜂花 |

    | 3 | 治喘息 | 雪松、罗马甘菊、丝柏、尤加利、乳香、薰衣草 |

    | 4 | 抗生素 | 大蒜、茶树 |

    | 5 | 抗凝血剂 | 天竺葵 |

    | 6 | 抗抑郁 | 安息香、佛手柑、康乃馨、快乐鼠尾草、薰衣草、柠檬香茅、橙花、柑橘 |


    ## （七）植物精油的伴侣——基础油


    **基础油**，是从植物器官，多数是从坚果、种子中提取的一类不具有挥发性的物质。多数基础油富含不饱和酸和脂肪酸和其他的维生素类营养成份。基础油不但自身具有治疗功效，它们还可以促进皮肤对精油的吸收。


    ### 1. 基础油的主要成份及性质


    在芳香按摩中用到基础油时，总会提到植物油，它们属于液态油类，主要成份是脂肪酸。脂肪酸是人体和食物中脂肪的主要构成成份，也是一种能量来源，还是细胞膜的组成成份。脂肪酸分子包含有一个脂肪碳链和一个有机弱酸，可以是饱和的或不饱和的。饱和脂肪酸在室温下呈固态，主要来源于动物器官。这些饱和脂肪酸，尤其是长链的脂肪酸，能够提高胆固醇和增加低密度脂蛋白（LDL）含量。在我们的饮食中，不要吃太多的这类脂肪酸。因为，在一般情况下，它对我们的健康是起消极作用的。不饱和脂肪酸与“动物器官”的脂肪酸不同。因为，它们的结构是不同的，在室温下一般呈液体状态。在芳香疗法中使用的基础油通常含有不饱和脂肪酸（除了棕榈油和椰子油，它们是含有高比例的饱和脂肪酸），主要是多元不饱和脂肪酸。这些脂肪酸包括亚麻酸、亚油酸和花生四烯酸，它们都是脂肪酸中的精华。


    研究发现，虽然它们中的一部分不能由人体合成，但是却是人体维持正常生理机能的必须品。亚麻酸和花生四烯酸可以由其他的营养物质在人体内重新合成，而亚油酸就必须从饮食中摄取了。所以，从营养角度来看，把饮食结构中所有的油都去掉会严重影响人的健康。虽然，目前还缺乏科学依据，但选择一种含有高不饱和脂肪酸的基础油通常情况下对你的健康是有好处的。某些油，如月见草油含有高比例的亚油酸和亚麻酸，用在皮肤上可以有效地治疗湿疹、牛皮癣、经前综合症和风湿性关节炎，还有助于减肥。


    ### 2. 基础油的制备方法


    多数基础油的提取是采用“冷榨法”，这种方法不在外部加热以促使含油材料分泌油，大家最好购买用这种方法榨取的基础油。基础油提取出来后，还可以通过多种方法进行精炼，以获得某种合乎人意的效果。


    ### 3. 基础油的使用范围


    芳香疗法中，当使用精油做按摩油时，都会用基础油稀释。从医学角度看，这样做是为了将纯精油内某些成份浓度降低至可使用的范围。做这些时，一定不能由外行的人操作。


    ### 4. 基础油的选择方法


    虽然，在芳香疗法中，基础油是用于稀释精油的，但是其本身也具有各种对按摩有价值的功效，因为它们具备着一种或多种自己的特性。所以，基础油的选择也依临床医师所施行的按摩方法而定，因为，重一些的油给皮肤更多的“牵引”，在进行深度按摩时，会起到作用；而其他较轻的油会给予皮肤更多的“润滑”，在进行放松按摩时，可以选择。


    当用拇指的手法按摩全身时，一般需要大约 30mL 的基础油。


    ### 5. 基础油的使用注意事项


    大部分人对这些基础性的基础油不会有过敏性反应。但少数人还是可能对某种坚果有过敏性的问题，因此，明智的选择是：在使用某种坚果做基础油前先做皮肤测试。有时，人们会在日常身体按摩中使用“工业油”，但不会应用于芳香疗法中的按摩，虽然其价格比植物基础油要便宜得多，但是却不能给患者带来的相同的效果，还会令按摩者的皮肤感到“油腻”，因为这类矿物油，如婴儿油，会阻塞皮肤毛孔，从而限制了精油的渗入和皮肤的吸收，达不到精油按摩的预期治疗效果，所以要避免使用。


    ### 6. 基础油与食用油的区别


    表 1-2 基础油与食用油在美容应用方面的主要区别：


    | 类别 | 基础油 | 食用油 |

    | :--- | :--- | :--- |

    | 原料处理 | 不蒸炒 | 蒸炒 |

    | 压榨温度 | 低于 50℃ | 高于 120℃ |

    | 保质办法 | 滤纸过滤脱水，膜过滤脱菌，充氮气保鲜 | 用 270℃高温脱水杀菌 |

    | 活性成份 | 含有维生素 E 和脂溶性蛋白 | 维生素成份变性 |

    | 用途 | 芳香按摩保健 | 食用 |


    ## （八）植物精油的购买与贮藏


    当您在购买精油时，首先要确定您购买的是植物精油，而非人工合成的复制品。


    ### 1. 购买精油的注意事项


    1) 当看到瓶子上写着“芳香油”、“花香油”或其他一些含糊不清的精油名称时，您要注意了，这可能不是您希望购买的精油。

    2) 精油的商标应该是"pure essential oil"或者是"100% essential oil"，当标签是"aromatherapy oil"时，这可能是基础油与精油的混合物。

    3) 如果所有精油的标价都是一样的，就不要从这家公司购买精油了。因为不同精油在成本价格上相差很大，不可能所有产品都是相同的价格。

    4) 精油的拉丁文名称必须出现在瓶子上，这样在您购买时就会避免很多误解，因为很多同名不同种的植物都可以用来做精油。

    5) 所有的精油都必须密封在有色的瓶子里，如果将它们装在透明的瓶子内，精油是很容易变质的。

    6) 植物基础油可以装在透明的容器内，但是植物精油总要装在琥珀色或者蓝色的瓶子里。

    7) 精油瓶口必须配有带点滴器的瓶盖，这样每次用时，就会逐滴流出。


    因为植物精油是一种天然的化合物，这些成份需要仔细照顾，正确的存放才能够保证不至于失效。


    ### 2. 存放精油的要求


    1) 精油必须保存在冷凉、阴暗的地方，也可以冷藏（但不要结冰）以防止其变质。

    2) 一些精油在低温保存时会凝聚，当置于室温下就会恢复正常。一些柑橘属的精油在解冻后依然是黏稠状，这样是不会影响它们的治疗效果的。

    3) 精油瓶不能长时间没有必要地敞着盖，因为它们是很容易挥发的。

    4) 大多数精油可以保存很长时间，但是柑橘属精油的贮藏期超过 6~9 个月后就不能在皮肤上使用了，在其他芳香治疗中还可以使用，比如在香薰法中使用。'
