    # ## 2. 脚气常见防治方法


    目前，针对脚气发生的原因，主要采取以下措施进行防治：


    (1)通过药物杀死脚气致病菌，这是目前最为常用的治疗方式。其中包括外用药物，如达克宁、足光粉；或结合内服抗真菌药物进行治疗，如特比萘芬等。但外用药治疗周期长，用药次数多，不易涂抹均匀，长期使用易引起皮肤过敏；内服药物对某些特殊人群使用时存在一定风险，还可能引起病菌的耐药性。


    (2)改变足部环境条件，使之不利于脚气的发生。可以使用透气鞋袜等，避免潮湿环境；以及采用民间偏方，如将食醋和雪花膏调成糊状涂于患处，以降低患处pH值；用电吹风加热患处，以提高患处温度并降低湿度。但以上多为药物治疗的辅助方法，单独使用效果较差。部分偏方刺激性大，甚至会加重病情。


    (3)提高自身免疫力。通过饮食、锻炼等途径，加强自身体质，提高对脚气致病菌的抵御能力。但目前相关研究较少，还没有形成较为系统的理论。


    脚气属于易复发的疾病，要达到根治效果，应将预防放在首位，做到防治兼顾。因此，在日常生活中不仅要避免接触感染源，还应注意足部的日常护理。如果在日常足浴中使用本发明，结合简单的揉搓和按摩，就能有效抑制脚气发生。


    # ## 3. 芳香杏仁足浴油的作用机理


    针对脚气发生的原因和目前治疗方法的不足，通过以下途径实现脚气的防治：


    (1)芳香杏仁足浴油易于附着在皮肤组织上，形成一层保护环境，降低外界环境中脚气致病真菌的侵染机会。'
  - '[PAGE 258]


    (2) 足浴油通过简单的揉搓和按摩能够深入足部毛孔。在渗透过程中，对毛孔内油脂腺的分泌通道起到疏通、清洁和润滑的作用，既保持了毛孔畅通，又用清洁的植物油替换出人体油脂，阻断致病真菌的营养供应。

    (3) 对皮肤有一定的收敛效果，可以作用于足部汗腺，抑制脚汗。其抑汗作用对足部出汗较多的人群尤为明显，避免提供致病菌适宜生存的湿度。因此，具有良好的脚气防治效果。

    使用此油，足部有干爽和光滑的感觉，这种感觉可以持续3天左右，并能持续散发香气达2天以上。


    # **4. 芳香杏仁足浴油的成份特点**


    芳香杏仁足浴油采用源于我国的真正甜杏油S，添加适量植物精油，以及最低程度的增溶剂和乳化剂制成。


    (1) 真正甜杏仁油

    此处所用甜杏仁油S与目前国际市场上所谓的甜杏仁油（Sweet Almond oil）不同。后者是一种桃仁油，其原材料属于扁桃属(Prunus armeniaca
    L)，此甜杏仁油的原材料为我国特有的一种食仁杏树(Prunnus sibirica L)，属于杏属。


    (2) 低化学添加剂

    由于油与水互溶性差，制备足浴油时需要向天然甜杏仁油S中加入一定量的增溶剂和乳化剂，统称为表面活性剂。表面活性剂可以帮助杏仁油渗透皮肤外，还可以清除一般的污垢。本研究采用化妆品中常用的土温80和司班80作为表面活性剂。在化妆品配方中，表面活性剂比例一般为15%~35%。为降低化学添加剂的潜在刺激性，本研究将表面活性剂的用量降到最低，仅占配方比例的7%~13%，使产品性质更温和。


    (3) 植物精油

    足浴油香型以花香型较为普遍，为使足浴油散发出浓郁香味，并强化脚气治疗效果，在配方中加入具有祛除湿热作用的植物精油，如广藿香、丁香或茶树精油，达到既能防治足患，又能愉悦精神、缓解压力的效果。

    随着生活水平的提高，足疗保健日益受到人们青睐，已成为人们在工作之余缓解疲劳、舒经活络、健身治病的保健养生方法。本研究不仅适合专业足疗保健机构使用，也适合家庭日常足浴，具有广泛的应用前景。


    # **5. 芳香杏仁足浴油的配制**


    以土温80作为增溶剂，司班80作为乳化剂，按比例溶于甜杏仁油中。其中土温80最佳质量百分含量为1%~5%，司班最佳质量百分含量为6%~8%。混合后于50℃、1000v/m的条件下搅拌15分钟，可得到足浴油。'
  - '[PAGE 259]


    **6. 芳香杏仁足浴油的使用方法**


    （1）在10mL芳香杏仁足浴油中，根据个人喜好加入5～10滴植物精油，进行调香，再与水按最佳用量体积比1:200混合，最适水温为45～50℃。建议采用的植物精油有广藿香、丁香或茶树精油等。


    （2）轻轻揉搓和按摩足部约3分钟。


    （3）用干燥软毛巾擦干足部即可。


    **7. 芳香杏仁足浴油的使用效果**


    将本研究中的足浴油提供给脚气患者和非脚气患者使用，是我们几年来一直坚持不懈的工作，也是我们奉献给大众的一份赤诚。在使用期间，调查者中95%的脚气患者症状消失或好转；90%的使用者感觉足部皮肤比使用前光滑；67%的使用者在运动后发现足部汗液明显减少；调查者中无不适人群。而且95%以上的使用者感觉足浴过程中有芳香气味，使人心情愉悦、精神放松、缓解疲劳。总体分析，其能通过抑制脚汗实现预防缓解脚气（足癣）的作用。'
  - '[PAGE 260]


