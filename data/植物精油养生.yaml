    # # （七）植物精油的伴侣——基础油


    **基础油**，是从植物器官，多数是从坚果、种子中提取的一类不具有挥发性的物质。多数基础油富含不饱和酸和脂肪酸和其他的维生素类营养成份。基础油不但自身具有治疗功效，它们还可以促进皮肤对精油的吸收。


    # ## 1.基础油的主要成份及性质


    在芳香按摩中用到基础油时，总会提到植物油，它们属于液态油类，主要成份是脂肪酸。脂肪酸是人体和食物中脂肪的主要构成成份，也是一种能量来源，还是细胞膜的组成成份。脂肪酸分子包含有一个脂肪碳链和一个有机弱酸，可以是饱和的或不饱和的。饱和脂肪酸在室温下呈固态，主要来源于动物器官。这些饱和脂肪酸，尤其是长链的脂肪酸，能够提高胆固醇和增加低密度脂蛋白（LDL）含量。在我们的饮食中，不要吃太多的这类脂肪酸。因为，在一般情况下，它对我们的健康是起消极作用的。不饱和脂肪酸与“动物器官”的脂肪酸不同。因为，它们的结构是不同的，在室温下一般呈液体状态。在芳香疗法中使用的基础油通常含有不饱和脂肪酸（除了棕榈油和椰子油，它们是含有高比例的饱和脂肪酸），主要是多元不饱和脂肪酸。这些脂肪酸包括亚麻酸、亚油酸和花生四烯酸，它们都是脂肪酸中的精华。


    研究发现，虽然它们中的一部分不能由人体合成，但是却是人体维持正常生理机能的必须品。亚麻酸和花生四烯酸可以由其他的营养物质在人体内重新合成，而亚油酸就必须从饮食中摄取了。所以，从营养角度来看，把饮食结构中所有的油都去掉会严重影响人的健康。虽然，目前还缺乏科学依据，但选择一种含有高不饱和脂肪酸的基础油通常情况下对你的健康是有好处的。某些油，如月见草油含有高比例的亚油酸和亚麻酸，用在皮肤上可以有效地治疗湿疹、牛皮癣、经前综合症和风湿性关节炎，还有助于减肥。


    # ## 2.基础油的制备方法


    多数基础油的提取是采用“冷榨法”，这种方法不在外部加热以促使含油材料分泌油，大家最好购买用这种方法榨取的基础油。基础油提取出来后，还可以通过多种方法进行精炼，以获得某种合乎人意的效果。


    # ## 3.基础油的使用范围


    芳香疗法中，当使用精油做按摩油时，都会用基础油稀释。从医学角度看，这样做是为了将纯精油内某些成份浓度降低至可使用的范围。做这些时，一定不能由外行的人操'
