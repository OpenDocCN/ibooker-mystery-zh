    # # 二、植物精油养生与芳香疗法

    Essential oils health Essential oils health


    **前章谈了植物精油的有关知识，从中人们可以得出这样结论：植物精油是植物的精华，是一种有明显功效的医疗保健材料，具有神秘而神奇的作用。可想而知，用此种物质用于人们养生，一定会是最佳选择。这就又提出一个新问题——养生。那么，何谓养生？简单地说，养生即休养生息，养护身体。我国著名养生专家王大有给养生下的定义是：通过一定的方法和程序，使人体的生命状态得到休养生息、滋补，增强精、气、神，获得最佳生命质量、最佳生命功能状态为养生。可见，养生概念内涵丰富，是一个完整的复杂系统，是与所有的人都有着密切的不可忽视的关系。如果说，爱情是文艺创作永恒主题的话，那么，养生是全世界人民的共同主题。**


    **人类的发展历史已经证明，养生是人们生活的重要组成部分，忽视不得。那么，怎样养生才能更理想、更可行、更有效呢？经反复研究中外的临床实践，我们认为，用植物精油养生可达此目的。在某种意义上讲，植物精油养生是与时俱进的时尚且可行的方法和途径，是对近百年来世界盛行的芳香疗法的补充和发展，是对芳香疗法最直截了当地诠释。可以说，植物精油养生就是当代的芳香疗法，是中国式的芳香疗法。何谓芳香疗法？下面着重介绍给读者。**


    # **（一）芳香疗法的概念**


    **芳香疗法就是利用从植物材料（花、香草和其他芳香植物器官）萃取的精油，取得放松精神、缓解压力、治理失调的方法。在芳香疗法中，精油以不同方式用在人体上，包括按摩、吸入、洗浴、面霜、外敷等，一条重要的使用原则就是不能内服。**


    # **1．芳香疗法在医学方面的应用**


    **芳香疗法的逻辑性是，不同的精油成份能通过刺激人类天生的自我康复系统，来帮助身体康复。在法国，医生会开用精油进行芳香治疗的处方，包括内服。但是这些精油成份的功效十分强大，冒然内服可能会对健康造成危害，因此普通人群是不能这样做的。有人认为芳香疗法体系是一种新生事物，但其实早在古埃及、古巴比伦、古希腊和古罗马时代**'
