    # # 植物精油在芳香按摩中的应用


    虽然，人们投入了数以百万计的金钱，研究护理头发的产品和特效香波，然而，许多人包括毛发专家，正转向于依赖越来越多的天然方式，以提升毛发的生命力；同时，也开始特别注意他们的头皮养护。其中，就包括使用精油治疗头发或头皮的方法。


    我们推荐的这种复方油配制虽然价格不便宜，然而，被那些头发有严重问题的人们使用后，可以证明它是有效的和非常受欢迎的。


    我们没有吹捧这种油是治疗光秃、头发生长不良、头发质量不好、有头皮屑、银屑病或者其他医学方面疾病的偏方，也可能你正患有其中的某项疾病，但是，如果你已经尝试过所有的治疗，都没有成功，你可以考虑用这种自然疗法做个尝试。


    精油的挑选要能够应对人们经常会遇到的大多数问题的治疗，比如头发可能出现的不适，稀疏、干裂、分权，以及刚洗完头发仅仅几个小时就又变得油腻了，还有头皮屑的问题，这带给你的不仅仅是一个简单的不满意。


    我们只使用纯的荷荷芭油做底油，虽然它是一种昂贵的油，但是它的性质是最贴近人的皮肤的，人们发现使用这种油护理头发的效果非常好。实际上，荷荷芭油不是一种油，而是一种熔点很低的蜡脂，在室温下，它是液体状。


    基础油：荷荷芭油。


    精油：迷迭香、甘草、雪松、广藿香、丝柏、依兰。


    虽然，我们称“精油”为油，其实它们并没有油腻感，因为，它们是可挥发的物质，而荷荷芭油也不是一般意义上的油，实际是一种蜡脂，也不会有油腻感或油脂般的黏糊感觉。


    你要记住，你将使用的不是油性或油脂性的产品，而是富含营养的混合物，内含有活性成份的精油，它们对头发和头皮有一定的治疗功效。


    取少量复方精油，大约 1 茶匙，放在碟子里，用你的手指尖蘸些精油，然后，把手指紧贴着干燥的头皮进行按摩，要沿着头发的纹理缓慢移动，注意不要对头皮造成摩擦，那样可能会伤害到头皮和头发。'
