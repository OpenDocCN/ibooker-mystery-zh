  md: '它适用于所有的肤质，都能起到良好的保湿效果，尤其适用于干性或敏感性的皮肤，还能缓解皮肤的敏感性、炎症和瘙痒的症状。它的润滑作用是显著的。因为它不是一种快速渗透的油，所以它是一种良好的按摩中介油，有助于复方油的延展，还能让你有时间在复方油被皮肤吸收之前，做个很好的按摩。

    对皮肤效果：

    甜杏仁油不仅有助于保护皮肤的表面，还能作为一种效果非常好的润肤剂，使皮肤更加光滑、柔嫩。当经常用于护理皮肤时，能使肌肤变得鲜亮年轻；还有助于缓解肌肉的酸痛。

    虽然多数情况下，它是单独作为按摩基础油使用的，添加10%的小麦胚芽油的使用效果也很好，还有助于延长保质期。甜杏仁油是最受欢迎的基础油之一，因为它没有油腻的感觉，延展性好，还可以滋养皮肤。


    # ### 5. 杏仁油


    如果你正在寻找一种基础油，要求是手感柔润、容易被皮肤吸收、没有油腻感，那就是杏仁（Prunus armeniaca）油。杏仁油含有大量的不饱和酸，没有比它更适合做面部按摩油的。当寻找合适的面部按摩油时，细腻的杏仁油绝对是最佳的选择，因为皮肤对它的吸收非常良好。它对干燥的、细嫩的、老化的和敏感的肤质都特别适合，还有一定的消炎作用。这种油手感非常好，延展性也好，油酸和亚油酸非常丰富。具有保湿、营养和刺激皮肤再生特性的杏仁油，可以跟你选择的其他精油很好地混合，用作极好的面部按摩油。


