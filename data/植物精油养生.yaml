  md: '**植物精油在身体调理中的应用**

    Essential oils health

    ![image](https://i.imgur.com/placeholder.png)


    # **5. 麦粒肿、睑腺炎**


    睑腺炎是位于眼皮边缘的油腺上类似于丘疹的砂眼发展而成的。从外表看，它是个红色发痒的斑点，有疼痛的感觉，它会肿胀形成黄色或粉色的头状物。整个眼皮都会因此变红、发疼，感觉里面有什么东西似的。发生在眼皮内侧的睑腺炎会更疼，把眼皮抬起来能看见黄色的头状物。


    用悬钩子植物叶片泡的凉茶清洗眼睛，可以缓解疼痛。依照下面的方法，在眼睛的患处外敷材料也有用处。


    煮沸 10mL 玫瑰水，当玫瑰水冷下来后，往里添加 1 滴甘菊精油。然后，把它们放在一个容器内，摇晃均匀，用咖啡滤纸过滤混合物，使用过滤后的液体做外敷材料。


    # **6. 睑炎**


    睑炎是眼皮外面边缘发炎，症状有发红、瘙痒和灼烧，有时候觉得眼睛里有东西似的。眼睛会发红和受到刺激，这种症状在早晨更加严重。


    可以用下面的材料外敷，有助于治疗睑炎：1 滴洋甘菊精油、5mL 榛子油，混合，加入到 30mL 玫瑰水中。


    # **7. 结膜炎**


    结膜炎，通常称为红眼病，是眼睛最外层的膜发生了感染。这是一种常见的炎症，一般在 10 天左右就自己痊愈了。症状包括刺激、发红、瘙痒、灼热和流泪，不过，视力不会受到影响。


    细菌或病毒、灰尘、沙子和烟都能引起感染，使眼睛有刺激的感觉，还会加重感染。


    治疗酸疼、发痒的眼睛，可以先把外敷材料蘸上矢车菊、洋甘菊、万寿菊或茴香植物的浸剂，然后覆盖在眼睛上。


    用下列配方制成的制剂做外敷材料，也有助于缓解结膜炎：把 1 滴洋甘菊精油与 5mL 榛子油混合好后加入 30mL 的玫瑰水中，覆盖至少 7 个小时。可以用咖啡过滤纸做外敷材料，盖在闭着的眼皮上。


    # **8. 口腔溃疡**


    口腔溃疡可能是一种轻微的病毒造成的感染，不过一些研究表明，溃疡是由于焦虑或精神压抑造成的。


    （1）症状


    口腔溃疡多发于口腔内侧、舌头上、口腔上侧、嘴唇和脸颊内黏膜上，以及在齿龈和脸颊的凹槽处。它起初有烧灼和刺痛的感觉，稍微有些肿胀。每个溃疡点的中心是白色'
  merge: -1
  pgno: 220
- img_proc: true
  md: '的，其边缘发炎为红色，摸上去是柔软的感觉。溃疡可能会持续两到3周，能够自愈，而不留伤疤。


    （2）饮食调理


    当患有口腔溃疡时，不要吃酸性或辛辣的食物，因为会使伤口更疼；也不要吃硬的食物，不要喝咖啡、吸烟和饮酒。


    （3）精油调理


    用棉签蘸些纯茶树精油，清洗溃疡处，能够立即减轻疼痛。可以使用漱口水。配方是：在500mL温开水中添加5克食盐和2滴茶树精油。


    还可以使用另一种漱口水，漱口后要把漱口水吐出来，在一杯温开水添加成份如下：2滴欧薄荷精油、2滴百里香精油、2滴柠檬精油、2滴茶树精油、2滴天竺葵精油、10mL白兰地。


    # **9. 流鼻血**


    在鼻子没有骨折或受到伤害的情况下流鼻血，可以掐住鼻孔，从绵纸上吸入下列精油的混合物：3滴柠檬精油和1滴薰衣草精油。


    使用冰袋也有助于止血。


    在鼻子骨折或受到伤害的情况下流鼻血，不要迟疑，立刻去医院接受治疗。


    # **10. 脓肿、砂眼**


    典型的脓肿发生在毛囊周围，不过我们通常称其为脓疱炎症。发病初期，这个部位的皮肤开始变得红肿，逐渐发展成有疼痛感的突起肿块。虽然，一般情况下脓肿成熟后，就会从皮肤上消失；但是这个过程大约需要两周时间，除了特殊的环境以外。


    做按摩能有助于缓解疼痛，在患处，每天使用两次，精油选择如下：2滴薰衣草精油、2滴茶树精油、2滴甘菊精油。


    # **11. 牙疼**


    牙疼是最厉害的疼痛之一。牙疼时，你感觉到的只有这种疼痛。在棉签上滴1滴丁香精油，在牙疼的齿龈周围涂抹，或者塞在疼牙的牙缝里。也可以用按摩油按摩下颚骨和脸颊，配方如下：1滴丁香精油、3滴洋甘菊精油、1滴柠檬精油，稀释在5mL的植物油中。


    # **12. 咽喉疼痛**


    咽喉疼痛或咽炎通常表明咽喉发炎了，它会从口腔后面向食道扩散。常见的咽喉疼痛是由病毒或细菌感染引起的，也可能是扁桃体炎。一般，病毒感染是因感冒或流感引起'
  merge: -1
  pgno: 221
- img_proc: true
  md: '的，同时有发烧、肌肉疼和流鼻涕的症状。


    细菌性感染通常是由链状球菌引起的。这种咽喉疼痛的典型特点是发病快，疼痛剧烈，还有发烧的症状，如果不使用抗生素即使治疗，细菌有可能扩散到其他器官，造成不可逆转的伤害。扁桃体炎通常是因为扁桃体发炎引起的。


    为了缓解不适，可以使用按摩油按摩颈部和耳朵后面的部位。配方如下：4滴甘菊精油、1滴百里香精油、1滴柠檬精油、1滴茶树精油，稀释在5mL的植物基础油中。


    蒸汽吸入疗法也是有效的，在热水中添加2滴尤加利、2滴薰衣草和1滴百里香精油，可以参照我们的蒸汽吸入法网页。记住，要闭着眼睛。用加湿器保持空气的湿润，多饮液体。


    # ### 13. 嘴唇开裂


    嘴唇开裂很疼，尤其是当你舔它的时候。


    可以调配一种油，用在开裂的嘴唇上，以缓解疼痛，帮助愈合。它的配方如下：20mL芦荟精油、1滴甘菊精油、2滴天竺葵精油、1滴橙花精油、2滴玫瑰精油。


    # ### （三）植物精油与心血管系统


    # ### 1. 高血压


    高血压如果控制不当，会使心脏受损，对肾脏也是不利的。


    （1）症状


    当心脏输送血液时，动脉壁受到来自外部的过强的冲击力，这就会造成血压上升，也就是高血压症。因为发病初期没有或很少有症状，当出现头疼、头昏眼花、耳鸣和心跳过速时，人们才注意到，此时血压已经很高了。


    （2）饮食调理


    中等强度的高血压是能够控制住的，可以通过调节饮食结构，转变生活方式，戒烟，戒酒和减轻体重等方式。据研究，蒲公英茶或胶囊、生大蒜或大蒜胶囊能降低血压。


    （3）精油调理


    一种芳香疗法式的按摩也是有助于使人放松的，人在放松的状态下，血压会有所降低。适合高血压患者按摩使用的精油：快乐鼠尾草、薰衣草、甜牛至、蜜蜂花、依兰精油。


    高血压患者避免使用的精油：牛膝草、迷迭香、鼠尾草、百里香。'
