- img_proc: true
  md: '体的状况。当你往浴盆里放水的时候，添加下面的精油：4滴茶树精油、3滴薰衣草精油、1滴柠檬精油。


    盆浴以后，你还需用些按摩油，配方如下：10mL月见草油、3滴茶树精油、2滴尤加利精油。


    可以把以下精油放在吸入器或稀释在盆浴使用，也可以擦在胸前（混合后，稀释在合适的基础油中），或喷洒在手帕上，缓解因感冒引起的鼻塞：白千层、丁香、尤加利、绿花白千层和松树精油。


    用精油熏蒸房间有助于缓解症状的发生，适用精油包括丁香、薰衣草和松树精油。


    # ### 3.呼吸困难


    呼吸问题的3个共同的特点是呼吸疼痛、气短和喘息。呼吸疼痛是肺部、肌肉或骨骼严重失调的一种症状。如果排除胸腔受损和肺炎的可能性，最可能的病因就是纤维组织发炎了。


    上了年纪和不适都是气短的原因，可以用下列配方制作一种按摩油擦在胸部和后背：5滴肉豆蔻精油、2滴肉桂精油、10滴尤加利精油、10滴生姜精油、3滴迷迭香精油，稀释在30mL的植物基础油中。


    这一症状的致病原因有很多，不过，改变生活方式是最好的选择。有噪音的呼吸可能是急性的或慢性的疾病，会不断加重的。它有可能是感冒引起的，但是有时候存在更严重致病原因，比如呼吸道阻塞、哮喘、支气管炎或受到某种病毒的感染。


    在病情严重的时候，要休息，可以使用蒸汽吸入法治疗，加入4滴尤加利或牛膝草精油。


    支气管炎可以用下面配方制成的复方精油，按摩胸部、脖颈和后背：15滴尤加利精油、10滴迷迭香精油、5滴牛膝草精油，稀释在30mL的植物基础油中。


    # ### 4.咳嗽


    咳嗽是身体对呼吸系统发炎的一种反应，炎症可能存在于咽喉、肺部或支气管。咳嗽有多种形式，根据咳嗽的特点可以对潜在的疾病进行诊断。咳嗽有助于从呼吸道排除黏液、细菌或其他的刺激物。通常，咳嗽是病毒或细菌感染的信号，如患感冒。也可能是呼吸系统的感染，如发喘嗝声的咳嗽或是得了肺炎。


    灰尘、吸烟或空气污染都可能是咳嗽的刺激源。不明原因的持续咳嗽通常有可能是由更严重的疾病引起的，如癌症或肺结核。


    饮用玫瑰花瓣水，它是最有效的制剂之一。它可以作用于黏液和缓解咳嗽。还可以喝一些汤药，材料主要是化痰的，如薰衣草、蜜蜂花、薄荷、玫瑰水或百里香。采用蒸汽吸入法，吸入桉树精油，或在枕头旁边放置树叶、花瓣水，可以避免在半夜因为咳嗽翻来覆'
