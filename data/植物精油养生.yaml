    24. 晚香玉精油

    晚香玉精油是从晚香玉植物（Polianthes tuberosa）中提取的，属于石蒜科。


    (1) 精油性质

    晚香玉精油味沉，散发着稍带辛辣味的甜香味。


    (2) 来源

    晚香玉是一种高大、纤细、柔嫩的多年生植物，叶片细长，根系块茎状，花形与百合相似、巨大、芬芳，原野生于美国中部。目前在世界各地栽培，以获取鲜切花；但在埃及、中国、法国和摩洛哥还是作为提取精油的原料。


    (3) 提取方法

    固体和完全的晚香玉精油的提取方法是溶剂萃取法，以新鲜花为原料，原料是在花朵没有开放前采摘的。


    (4) 化学成份'
