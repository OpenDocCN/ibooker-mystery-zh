    味道清甜，有花香味，这种令人不易忘怀的清香味，颜色淡黄，黏性水质。购买橙花精油的时候要小心，因为有许多供应商在这种油中掺基础油，以获得更多的利润。它的气味强烈，即使稀释浓度很低时，它仍会散发出令人难以置信的气味。


    (2) 来源

    它又被称为“柑橘花”，因为用大约 1000 kg 的柑橘花才能生产 1 kg 的橙花精油。据说，它的名字同一位意大利公主有关，她用这种精油作为香水使用，还用它熏香洗浴水和手套。它至今还是制作法国科隆香水的原料。柑橘花还经常用于婚礼和洗礼的仪式上，新娘用它来修饰自己，传统上，新娘用柑橘花蕾修饰她的头发。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_43_0.png)'
