    # ### 2. 芳香疗法的安全性


    使用芳香疗法时，请留意各种各样的安全措施。坚持安全使用，芳香疗法在减轻某些疾病方面是有帮助的，也会取得令人满意的结果。必须牢记的是，这种治疗方式仅仅是帮助缓解各类医学疾病，应该被当作一种辅助治疗看待，而不能作为常规对抗疗法（西方的一种治疗方式）用药的替代品。除非得到医生的认可，否则芳香疗法不能代替常规医药。如果感觉身体有问题，还是要到正规医院看病。


    # ### 3. 进行芳香疗法的前提条件


    这种治疗形式的前提基础条件是：极少量的精油通过皮肤或肺部（吸入疗法）被身体吸收，然后与体内的化学成份发生反应，以减缓压力，增强免疫力，对其他许多身体问题也有帮助。


    # ### （二）芳香疗法与草药医术的区别


    草药医术与芳香疗法相同吗？事实上，在治病或保健方面，两者都用到了植物材料，可以归为一类，但是它们对植物材料的使用方法不一样，是两个截然不同的领域。


    1）草药医术，就像芳香疗法一样，使用了大量的植物原材料，但是，在草药医术中，提取物通常是采用内服的方式用药，而精油的摄取可以经过皮肤和肺部器官。精油内服是在严格的药物监督框架下操作的，必须有经过训练的药物人员专门从事这项监督工作。


    2）从植物材料中提取的芳香物质，对于草药医术和芳香疗法是同等重要的。然而，草药医术也用在植物中发现的丹宁酸、苦味成份、植物黏液、配糖类等物质，在多数情况下，这些物质包含有水溶性的物质。


    3）在草药医术中，内服精油数量是非常微小的，比如当成茶叶似的浸泡所内服的精油数量就更小了。在芳香疗法中，所使用的是经过各种提取方法获得的浓缩精油。例如，当饮用1杯甘菊茶时，你内服到的精油的数量将是非常少的。从晾干的植物材料中浸出的精油非常少，但当你使用经一个正确稀释后的甘菊精油做按摩治疗时，进入你体内的精油数量会急剧地增加（即使是稀释在基础油以后使用），远远高于茶水中的含有量。


    4）在芳香疗法中，可以使用到不溶于水的成份，它们的浓度一般要比植物本身的含有量更高。


    现在来回答我们起初的问题，答案是“不”，草药医术和芳香疗法是不一样的。然而，他们两者都认为，应该从整体的角度来给病人治病，两者都使用从有机植物材料中提取的'
  - '[PAGE 24]


    物质进行治病，尽管使用植物材料的方法是不同的。


    # ### （三）芳香疗法的医学性


    正如我们始终强调的那样，人们尽可能地把在芳香疗法中所用精油的成份弄清楚，操作芳香疗法的人也必须是经过培训的，只有在具有资格证的人员的指导下或监督下，才能进行芳香疗法的治疗。


    法国是近代芳香疗法的先驱。在法国，精油被配制成胶囊，可以列入处方中，被病人口服，也有制药栓使用的。法国的芳香治疗师会用到一种芳香测试法，他们先从病人受感染的地方取一点病样，在试验室培养，然后用各种精油进行测试，以找到最适合治疗那个病人感染的精油。他们已经发现：不同精油的混合体功效更好些，混合精油使用的针对性很强，即使不同的病人感染了相同的细菌，所使用的精油配方也是不同的。某类精油可能就更适合某些人群使用。


    上面所述是芳香疗法在医学方面应用的简单事例，就是为了说明芳香疗法和精油在医学领域具有的一些效果。


    # ### （四）芳香疗法的生理学效应


    当气味进入鼻腔时，它会遇到5000万多个神经原接收器，它们分布在鼻腔和鼻腔黏膜的上部，接收器的这种分布状况可以灵敏地对每种气味作出反应。这些接收器会进一步把气味转换成一种信息，这种信息被传送到嗅觉鳞状物（它被认为是前脑的一部分，主要承担感觉输入的功能，称为边缘系统）。在这里，气味开始被处理，然后被输送到大脑的其他区域，这些区域控制着人们的情绪、行为和基本的思维过程。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_24_0.png)


    例如，一些来自童年的遥远记忆也可以被气味所唤起，这种事实强调了气味对我们精神世界和快乐的重要意义。其中，边缘系统可以被描述成一种马头鱼尾的怪兽、一种拱形物、有色带环绕的脑回解、丘脑、杏仁或扁桃仁以及嗅觉鳞茎物，虽然这些描述听起来专业性太强，让人提不起兴趣，但是它能够很好地解释嗅觉器官是如何工作以及它们对我们产生了怎样的影响。在“边缘系统”这个词使用之前，这个系统被称做嗅脑，被认为是人类最古老的系统之一。'
