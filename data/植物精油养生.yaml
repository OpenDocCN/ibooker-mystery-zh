  md: '**23. 欧蓍草精油**


    欧蓍草精油是从欧蓍草植物（Achillea millefolium）中提取的，属于菊科。


    (1) **精油性质**


    欧蓍草精油味道辛辣、发甜，有水质般的黏性。


    (2) **来源**


    它是一种多年生植物，可以长到 1m高，叶片革质、叶形类似于蕨类，头状花序，花多、粉红色或白色。它又被称为西洋蓍草，因为它形状犹如羽毛，在苏格兰被当作一种符咒，它有避免邪恶的力量。


    它有着医治百病的名声，可以用它治疗各种年龄段的各种疾病，甚至在一些瑞典啤酒中也加有欧蓍草。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_123_0.png)'
