    # 4. 甜杏仁油


    在芳香疗法按摩中，这种植物（Prunus amygdalus var. dulcis）油是最常用的基础油之一。因为它有良好的延展性，很容易被皮肤吸收，有助于使肌肤柔软爽滑，而且没有油腻感，可做按摩油。


    来源：甜杏仁油是从一种扁桃树所结的干扁桃仁中提取的。它的润肤效果非常好，还能够平衡肌肤水分。


    主要成份：富含油酸和亚油酸。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_147_0.png)


