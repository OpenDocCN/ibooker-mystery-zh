    牛至精油是以干燥的花部顶端为原料，采用蒸汽蒸馏法提取的。


    (4) 化学成份


    香芹酚、麝香草酚、异丙基苯、罗勒烯和芳樟醇。


    (5) 使用注意事项


    从野牛至（Origanum vulgare）提取的和从西班牙牛至（Thymus capitatus）提取的牛至精油一样，对皮肤都有毒性，会刺激皮肤和黏膜组织，不应该在芳香疗法中使用，也避免在孕期使用。


    # ## 21. 龙蒿精油


    龙蒿精油是从龙蒿植物（Artemisia dracunculus）中提取的，属于 Compositae 科。


    (1) 精油性质


    龙蒿精油有种青草般的辛辣气味，有些像茴芹的香味。


    (2) 来源


    它是一种多年生植物，喜欢生长在小溪和河流附近；茎木质化，可以长到约 1m 高。叶片银绿色、披有细绒毛，花淡黄色。


    它最初的英文名字叫 Estragon（也是龙蒿的意思），是由摩尔入侵者带到西班牙的。它的名字是从阿拉伯语 Tharkhoum 演变来的。它的拉丁语名字 Dracunculus
    意思是“小龙”，可能是它的根系卷曲时像龙的缘故。它的叶片一般用做内服药，也可以做醋。


    (3) 提取方法


    龙蒿精油是以叶片和花的上部为原料的，采用蒸汽蒸馏法提取的。


    (4) 化学成份


    estragole（methyl chavicol），ocimene and phellandrene，cineoetc。


    (5) 治疗功效


    龙蒿精油能够刺激肠胃，能够促进消化，有助于治疗厌食、消化不良、肠胃气胀、打嗝和胃部痉挛，还可以缓解月经疼痛和调理月经周期。


    (6) 使用注意事项


    龙蒿精油没有刺激性和光敏性，但有一定的毒性，因为精油里含有 methylchavicol 成份，所以要适度使用，在孕期要避免使用。


    (7) 用法


    1) 在蒸汽治疗中或稀释在浴盆中使用


    在蒸汽疗法中或稀释在浴盆中使用，龙蒿精油有助于治疗消化不良和月经疼痛。


    2) 做复方按摩油


    龙蒿精油做复方按摩油，可以用于治疗消化问题和泌尿生殖系统的疾病。


    (8) 适合与龙蒿精油混用的精油'
