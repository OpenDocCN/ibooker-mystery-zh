    ### （六）常用复方按摩油


    #### 1. 刺激循环的复方油


    ##### （1）循环不良的表现


    没有人会说，处于最佳工作状态的循环系统可以引起身体的某些疾病。当你的血液循环缺乏活力时，你的皮肤可能就会处在欠完美的状况，身体上小的损伤和伤口痊愈的速度也会因此变得缓慢，你对寒冷的抵抗能力也会降低。一般情况下，你皮肤的弹性和活力将达不到平常的水平。


    ##### （2）循环不良的原因


    各种普通疾病可能会降低循环能力，一般的年龄增长也可以这样。引起不良循环的原因很多，虽然针对不良循环的症状进行治疗是有益的，但还是要向你的健康保健医生核实病因，并接受治疗。


    ##### （3）适宜配方


    由于多数遭受不良血液循环的人们也有皮肤干燥以及其他的皮肤问题，可以选择有保湿和含有丰富营养的天然鳄梨油，或是手感细腻的甜杏仁油。挑选精油时，首先要选具有促进血液循环功效的，同时兼有调和肤质，改善皮肤生理功能，有助于解决皮肤常见问题的精油，包括天竺葵、黑胡椒、丝柏、乳香和杜松子精油。


    ##### （4）使用方法


    在你的手掌上倒一点复方油，两只手互相搓，使油变暖，然后轻轻地擦在你感觉循环有问题的地方。根据需要，一天可以重复 2～3 次。复方油会被皮肤吸收，我们建议，要不断地摩擦，直到油全部被皮肤吸收，一些剩余的油也可以用薄纸擦掉。虽然复方油不是必须要按摩才能有效，但是，在患处轻轻地按摩是有助于改善循环和所有皮肤问题的。


    #### 2. 催情复方油


    ##### （1）性爱不良的表现


    性和性快感是纠缠在一起的两种事情，但是提高你伴侣的性快感比单纯的性需要的更多，包括足够的爱抚和性的接触。


    ##### （2）性爱不良的原因


    夫妻间的性生活因为两人过于熟悉，经常会变得生硬、迟钝、机械化而缺乏激情，深层次的相互关爱和性的快乐也因此缺失了，取而代之的就只有例行公事了。


    在我们现代的生活中，时间就是一种额外的奖赏，我们的注意力被日常工作分散开了，人们经常没有时间来安排一个亲热的夜晚，主要的原因是两人都非常的忙碌。


    ##### （3）适宜配方


    因为一些人可能对某种基础油有过敏反应，我们建议使用一种特制的没有过敏性的底油作为这种复方油的基础油。这种基础油是我国特有的真正甜杏仁油，没有油腻感。虽然，我们一般只使用天然的油类，我们建议使用这种油的目的就是想提供一种温和的没有任何过敏反应的基础油。


    记住这些，我们要做的就不仅仅是把那些有催情和壮阳功效的精油调配在一起，我们还要选择能促进两人放松的精油，这样就能提高他们对性快感和满意度的感受，并乐于接受。适宜的精油包括檀香、鼠尾草、依兰、香根草、姜、橙花、罗马甘菊、广藿香、黑胡椒、罗勒、安息香。


    ##### （4）使用方法


    当计划有个罗曼蒂克的夜晚时，要给两个人准备好足够的空闲时间，情绪是轻松的和乐于接受的。因为压力是最大的破坏激情的因素之一，所以创造一种轻松的气氛是重要的，把所有的事情都提前安排好，也不要有紧张刺激的因素存在。


    一个难忘的夜晚应该是以给伴侣用少量油按摩脖颈开始的，或是给足部用油做个轻松的技巧性按摩。你所按摩的地方不应该是最重要的地方，毕竟你不是一位受过训练的技师。在皮肤软组织间轻轻地敲击，在肌肉上稍加用力地按摩，使油渗入到皮肤中，应该是个好的开端。


    记住，按摩需要的是尽情地享受，为了自己和伴侣，所以要尝试着保持一种放松的顺序，享受着按摩伴侣皮肤带来的感觉。精油被皮肤吸收以后，精油的积极治疗功效将被传输到整个身体。


    #### 3. 防晒复方油


    ##### （1）晒斑的表现


    在太阳下滞留几个小时后，获得完美的棕褐色的皮肤，这可能是一些人愿意做的。不过，过多地晒太阳会导致皮肤极端地疼痛，甚至会脱皮、成片状、受感染，使皮肤变得幼嫩，还会形成具有潜在危险的晒斑。


    ##### （2）晒斑形成的原因


    为了追求全身晒成棕褐色，已经有数以百万计的人受到阳光造成的外伤，只是程度上不同。虽然使用复方油并不是意味着可以治疗日射病或严重的晒斑（这样的人需要到医院接受治疗），但它对针刺般的疼痛、肤质细嫩和太阳灼伤的皮肤具有很好的疗效。


    当不想把皮肤晒成褐色，可以使用一种含有合适的太阳保护成份的霜体，或是使用能遮挡阳光射线的物件。但是，如果你要在阳光下呆的时间较长，最好还是选择这种天然的药剂来帮助你缓解晒斑的症状。


    ##### （3）适宜配方


    请注意，这种复方油不会帮助皮肤晒成棕褐色。虽然有人称，这种油能使皮肤的棕褐色加深。不过，它的确能把阳光灼伤的皮肤变成棕褐色，因为它能给皮肤提供营养，有消炎作用，还能平缓阳光的灼伤。


    所挑选的基础油有营养和抚慰肌肤的功效，包括金盏草油、葡萄籽油、芦荟油以及玫瑰果油。


    精油的选择要具有缓解疼痛，降低皮肤温度，消除肿胀，有助于预防 2 次感染和伤疤的形成，能促进皮肤的修复，能激励重生新的肌肤，预防阳光对皮肤造成的伤害，包括薰衣草、椒样薄荷、茶树、花梨木、洋甘菊精油。


    ##### （4）如何使用


    虽然我们主要不是在讨论在阳光下暴晒的正确性，但是我们不提倡这样做的，因为这样会提高患癌症的危险性，会促使皮肤老化，所以我们建议使用一种能够抵挡紫外线的复方油，在无法避免过多暴晒情况下使用。在身体易受光处涂抹少量复方油，一天
    2 次，或根据需要添加使用的次数。


    #### 4. 放松复方油


    ##### （1）心情紧张的表现


    现在，我们的生活节奏快、压力大。有时候，我们需要积极地对抗压力和紧张。经常性的压抑和焦虑还是导致抑郁症的因素。缓解压力，有个轻松的心情，有助于我们的身体和精神更好地面对来自每天生活中的冲击。


    ##### （2）心情紧张的原因


    生活在这样一个竞争激烈的社会中，情绪化地使用我们的精力是没有意义的，要把它用在处理事物方面。


    ##### （3）适宜配方


    可以使用天然的药物帮助你放松，如放松复方油，这是一种整体疗法的方式，可以解决这类问题。这种复方油不含有任何有害的上瘾成份，因为它们会产生许多副作用。


    选择的精油要有镇静和抚慰情绪的功效，它在镇静和抚慰情绪的同时，还能够使紧张的肌肉放松。虽然，这类精油能够使你放松，但它不是镇静剂，也不会影响到你处理日常的工作；只会让你在更加觉醒的状态下，更好地完成工作。适宜的精油包括香根草、安息香、快乐鼠尾草、罗马甘菊、薰衣草、甜牛至。基础油可以选择甜杏仁油和葡萄籽油。


    镇静剂是不能够长期使用的，否则会引起很多的问题。我们并不是提倡，在什么情况下都不使用这样的药物，而是说对这类药物的习惯性使用，应该控制在最小的剂量范围内。


    ##### （4）如何使用


    在你感到不舒服的地方，如脖颈、后背或身体的其他部位，涂抹少量的这种油，然后轻轻地按摩以促进皮肤的吸收。虽然按摩不是吸收复方精油治疗功效所必需的，但是，按摩和按摩的动作也能有助于进一步地放松身体和精神。


    #### 5. 分解脂肪团复方油


    适宜的精油包括黑胡椒、葡萄柚、茴香、杜松浆果、天竺葵。


    虽然脂肪团多少的评价标准有很多方面，但是使用一种有效的局部按摩复方油，是能够有助于使身体的曲线更顺畅的。在要处理的地方，涂抹少许的分解脂肪团的复方油，一天
    2 次。这种油会被皮肤快速吸收，但是如果需要的话，要用丝绵把过多的油擦掉。


    #### 6. 护理干性和老化皮肤的复方油


    ##### （1）干性和老化皮肤的表现及原因


    最佳的皮肤健康要求，皮肤应该具有一定的保湿功能，可以分泌适量的润滑剂，以保持皮肤的紧实、有弹性和健康。当皮肤有减少湿润和润滑分泌物（油脂分泌减少）的趋势时，皮肤就会干燥，缺乏生命力，抗性将减弱。这种状况没有及时得到护理，皮肤就会逐渐丧失弹性，发生脱皮现象，在寒冷和干燥的气候尤其严重。


    干性肤质不仅让人感到不舒服，还很敏感，容易得皮肤病，也比正常状态的皮肤容易衰老。因为干性皮肤缺少保湿和润滑的补充物。


    ##### （2）适宜的配方


    一般适用于油性皮肤的配方不计其数，但是对干性的、易产生皮屑的和有皱纹的皮肤，真正起作用的药膏、香膏或润肤乳却寥寥无几。适宜的基础油包括荷荷芭油、甜杏仁油、鳄梨、纯的玫瑰果油。适宜的精油包括檀香、花梨木、乳香、茉莉、薰衣草。


    ##### （3）如何使用


    洗澡后，或是洗完脸后，把要抹油的地方很好地擦干，等 1～2 分钟，让洗浴后多余的水分从皮肤上蒸发掉。当皮肤彻底干爽后，在手掌上倒少量的油，双手撮，然后轻轻地擦在患处。这种复方油是容易被吸收的，会让你的皮肤感觉更柔顺。虽然我们的基础油有助于皮肤的保湿，但是精油全部功效需要两天以后才能发挥出来，它对皮肤更多的是起平衡作用。


    #### 7. 肌肉和关节用复方油


    如果你正遭受肌肉酸疼和关节僵硬不灵活带来的痛苦，不论是什么原因，选择用于肌肉和关节的复方油可能正是能够缓解你疼痛的东西。这种复方油的穿透能力很强，并有温暖的作用，可以缓解尖锐和隐约的疼痛。


    适宜的基础油包括芦荟油、葡萄籽油。


    适宜的精油包括罗勒、甘草、迷迭香、椒样薄荷、黑胡椒以及百里香。


    肌肉和关节复方油使用方法是在患处涂抹少量复方油，然后轻轻地把油按摩进皮肤里，直到完全吸收。为了获得最大的使用效果，按摩结束后，可以想办法使患处保持温暖一段时间。


    随着年龄的增长，我们的静脉和动脉可能会变得不那么完美了，静脉可能会有小的破裂，或出现蜘蛛网的状态，甚至会有静脉曲张。虽然发生这些现象不是危及生命的问题，但从美学观点方面，你也是不愿意接受的，况且，它还会让你感到不舒服。


    不过，我们所讨论的不是严重的静脉和动脉方面的疾病，而是指静脉的常规性退化带来的问题，这种退化是随着年龄的增长发生的。也就是说，我们指的这类疾病看起来是不重要的，比如当你坐着把一条腿交叉地放在另一条腿上时，会压缩到血液循环。


    适宜的基础油包括甜杏仁油、金盏草油、鳄梨油（未加工的）。


    适宜的精油包括丝柏、天竺葵、橙花、檀香、柠檬、没药。


    在患处涂抹少量复方油，1 天使用 2 次。


    #### 9. 失眠症和失眠复方油


    不能够进入睡眠是一件足够坏的事情了，但是睡眠不够同样会影响我们的生活质量。整夜辗转反侧，难以入眠，这对您准备开始第二天的工作绝对不是一个很好的经历。然而，成千上万的人正在忍受着这种失眠的煎熬。


    一个最快速的方法就是吃两片安眠药，然而这种能够让人成瘾的药物比起简单治疗失眠这一症状来说，可以导致更多的问题。


    失眠的原因我们必须找到并且及时解决，像疼痛、疲乏、焦虑、过度的紧张、不良的饮食（过量饮食或者少食），使用太多兴奋性的东西，诸如咖啡。


    现在很多人越来越排斥人工合成的药物了，他们正在寻求一种可以替代的自然疗法。例如睡前一个让人放松的温水浴有助于睡眠。


    当然，恰当地使用植物精油也是一种克服失眠的有效方法。


    适宜的基础油有甜杏仁油和葡萄籽油。


    适宜的精油包括薰衣草、罗马甘菊、依兰、橙花、檀香、牛至。


    使用方法是在睡觉前取少量失眠复方油轻轻地按摩自己容易接触到的地方，大约半小时。当您在颈部和肩部按摩时就应该给予特别的注意了，有些人也经常取少量油在太阳穴处按摩。


    另一种用法，就是在您往浴盆里放水的时候，取少量复方精油涂于全身；涂完后，把自己完全浸泡在浴盆内。


    #### 10. 头发和头皮复方油——可以护理你的头发和保护你的头皮


    你的头发是你最高的荣誉，但是，当你的头发和头皮出现问题时，比如，你的头发发生劈裂、断发和没有光泽的现象，也会让你感到头疼，引起你的烦恼。你的头发的生长是由许多因素决定的，包括营养、环境压力、护理水平、你的一般健康状况以及你的头皮健康情况，以及所选择护理头发的产品。'
  mdcn: '## 2. 精油浓度的选择


    1) 香水、梳妆水或是科隆香水的分类，要以它们所含香气的强度和所含香精的百分比为依据的。


    2) 对于香水，可以使精油的浓度达到 15% 左右，而对于味道较淡的梳妆水，使用浓度可以是 4%~8%，科隆香水用 1%~5% 浓度。


    3) 如果想计算百分率，1mL 液体相当于 20 滴。在换算过程中，要把所有添加进去的油也计算在底料中，如酒精或伏特酒或荷荷芭油，然后换算成滴数。


    4) 在调配复方油时，要先准备好一些配方、玻璃瓶、盖子，以及贮存的条件。


    ## 3. 香水配方


    ### （1）流传久远的科隆香水配方


    16 滴香柠檬、15 滴酸柠檬叶、2 滴柑橘、15 滴薰衣草、5 滴橙花油、10mL 柑橘花水、230mL 酒精或伏特加酒。


    **配制方法**


    先把底料酒精或伏特加酒倒入玻璃混合器中，添加上面所列的精油，然后混匀。装入瓶中，盖好盖，把混合物放置 4 天，然后加柑橘花水，再盖好盖子。使用前，至少要把这种混合物放置
    2 周以上，每天要轻轻摇晃瓶底。


    ### （2）“全活力”香水配方


    4 滴甜柑橘、10 滴柠檬、6 滴柑橘、8 滴橘子、5 滴乳香、1 滴没药、11mL 酒精或伏特加酒、11mL 荷荷芭油做香水的底油。


    **配制方法**


    先把底料倒入玻璃混合器中，按照顺序添加上面所列的精油，然后混匀。装入瓶中，盖好盖，就可以使用了。也可以减少底料的用量，但所加精油的浓度不能超过 15%。


    ### （3）为女士制作的煽情香水配方


    5 滴芫荽、6 滴香柠檬、4 滴橙花、1 滴复方茉莉、3 滴复方玫瑰、10mL 荷荷芭油。


    **配制方法**


    先把底料倒入玻璃混合器中，按照顺序添加上面所列的精油，然后混匀。装入瓶中，盖好盖。放置 1 周后，就可以使用了。


    ### （4）为男士制作的煽情科隆香水配方


    10 滴薰衣草、20 滴芫荽、22 滴檀香、23 滴雪松、5 滴乳香、100mL 酒精或伏特加。


    **配制方法**


    先把酒精或伏特加倒入玻璃混合器中，按照顺序添加上面所列的精油，然后混匀。在某些情况下，是可以使用人工合成物的，因为一些花的完全精油，如玫瑰和茉莉，每盎司的售价能达到数千美元。你也可以做一些仿制的香料，如康乃馨气味就可以用相同数量的黑胡椒、依兰和微量的天竺葵制成。


    ## 4. 调配程序


    精油的浓度很高，价格也很昂贵，在平时的应用时，我们很少用纯精油，都是先将精油稀释。现在，就让我们一起来学习一下调和精油的程序：


    **（1）调和各种精油的程序：**

    ① 准备好精油、空瓶及基础油；

    ② 将各种精油滴入空瓶里，盖好瓶盖，用双手滚搓瓶身，以彻底混合精油分子；

    ③ 加入基础油至正好超过瓶身与瓶颈交界处；

    ④ 盖好瓶盖，用双手迅速滚搓瓶子，以彻底混合精油及基础油。


    **（2）浓缩调和精油的调制程序：**

    ① 准备好精油及小型的深色空瓶。

    ② 将精油依照所需的滴数滴入空瓶里，注意应先加入较黏稠的精油。

    ③ 盖好瓶盖，用双手滚搓均匀，以彻底混合精油。

    ④ 倒置油瓶。

    ⑤ 瓶口朝上放置。


    **（3）单一精油稀释为按摩油的调制程序：**

    ① 将基础油倒入空瓶，直到油满至瓶颈为止。

    ② 加入精油。

    ③ 盖好瓶盖，用双手迅速滚搓瓶身，以彻底混合精油及基础油。


    ## （四）复方精油调香的注意事项


    当你在调配复方精油或给自己调配精油面霜时，你可能希望把一种精油的某些治疗功效也添加进去。这样，当把不同的精油混合在一起的时候，就能创造出某种协同增效的优势。不过，你可能仅注意到复方精油的治疗功效，不会想到香味也是需要“平衡”和协调的，这就是调香时要注意的问题了。在
    19 世纪，一位法国人根据音乐音阶的高低划分了精油香味的类别，这就是高音、中音和低音香味划分的来源。


    首先，要协调好混合体中高音、中音和低音香味之间的搭配，从这 3 个类别中挑选精油时，要注意，高音型和中音型精油的使用量要小于低音型精油。


    其次，一种丰富的香味应使高音香型精油占到 15%~25%，中音香型精油占到 30%~40%，低音香型精油占到 45%~55%。例如，用 4 滴天竺葵（中音香）、3
    滴尤加利（高音香）和 5 滴依兰（低音香）这样的比例。值得注意的是配制复方精油是要使用的，你必须喜欢才行。因为它只有令你的感觉器官喜悦才能发挥出最大的功效。比如，如果你想配制一种冬天使用的按摩油，你可能想到要在复方油中加一些椒样薄荷精油，但因为椒样薄荷精油是一种凉性油，你就需要用其他的油来平衡，如姜和檀香。


    最后，一种好的复方精油，通常是由三类精油调配而成，要同时含有高音香、中音香、低音香 3 种精油。


    ### 1. 高音香


    属于高音香的精油一般挥发速度很快，通常具有抗病毒的功效。它们共同的性质趋向于味道清新，有振奋精神的作用，价格一般也不昂贵。高音香精油通常挥发性强，起作用快，是复方油最先留给你的印象，但香味持续时间短。下列精油被认为属于高音香型：佛手柑（到中香）、葡萄柚、柠檬、酸柠檬、橙花（到中香）、酸柠檬叶、椒样薄荷、荷兰薄荷、茶树（到中香）、尤加利、罗勒（到中香）、白千层、肉桂、快乐鼠尾草（到中香）、芫荽（到中香）、牛膝草、柠檬香茅（到中香）、中国柑橘、绿花白千层、柑橘、鼠尾草、万寿菊、橘子、没药（到中香）和马鞭草精油。


    ### 2. 中音香


    大多数精油被认为是中音香型的，通常给身体的感觉是混合香的，具有平衡的功能。中音香型精油的气味不是立刻就能闻到的，可能需要两分钟的时间才能闻到，气味通常温和、柔顺。下列精油被认为属于中香型：松树、丝柏、茴香（到前香）、天竺葵、薰衣草、迷迭香、洋甘菊、甘草、黑胡椒、小豆蔻、牛膝草、刺柏、牛至、蜜蜂花、肉豆蔻、棕榈玫瑰、甘松和欧蓍草精油。


    ### 3. 低音香


    属于低音香型的精油，它们的气味一般都比较“沉”，扩散速度也慢，持续时间长，能使其他精油的蒸发速度也降下来。通常，它们的香味强烈、稳固和丰富，具有放松的功效，也是精油中价格最贵的部分。下列精油被认为是低香型的：雪松、乳香、檀香、生姜（到中香）、茉莉、玫瑰、依兰（到中香）、广藿香、桂皮（到中香）、肉桂（到中香）、丁香、没药、花梨木（到中香）、颉草、香根草精油。


    ## 植物精油在芳香按摩中的应用


    调配精油的时候不能单纯依赖香型，因为有些沉香型精油，精油的香味十分强烈，有时候是让人无法抗拒的。当用到这些芳香强烈的精油时，最好每次添加 1 滴，以防止它的气味把你的整个复方油的味道都掩盖了。


    调制复方精油是件有趣的事情，但要记住，调制的结果应该是你喜爱的味道，所以如果你没有按照“原则”使用不同香型的精油，是没有问题的。这些原则仅仅是你单独配制时的指导意见。


