    # ### 5. 黏膜炎


    黏膜炎是指由肺、咽喉、鼻腔和鼻窦分泌过多的黏液引起的。引起黏膜炎的原因，可以是感冒、流感、干草热、支气管炎、窦炎和鼻炎。一些食物过敏的人还发现，某种食物有加剧黏膜炎的倾向。


    一种痛苦但是非常有效的治疗方式是，往每个鼻孔内滴几滴稀释过的纯柠檬汁（我们不推荐这个方法，主要是因为这样做可能会引起皮肤和黏膜产生过敏反应）。


    能减轻病痛的方法是，在盛有热水的碗中各滴1滴百里香精油和1滴桉树精油，浸湿毛巾盖在头上，然后吸入蒸汽。把桉树精油添加在浴盆中使用，也有助于治疗黏膜炎。


    也可以往胸部和背部擦些按摩油，按摩油的制配方法如下：15mL月见草油、3滴茶树精油、3滴桉树精油、3滴迷迭香精油。


    # ### 6. 支气管炎


    这是支气管的感染，典型的症状是轻微的干咳，时常并发感冒。当咳嗽发展到有痰时，就会变得痛苦。较严重支气管炎的症状，胸部感到发紧、气短，痰变成浓黄的黏稠状。其他症状包括，打寒战、发烧、肌肉疼痛、流鼻涕和咽喉疼痛。


    突发性的支气管炎一般是由病毒引起的，也可能是由细菌引起。对感冒和流感的自身抵抗力弱也是一种病因，饮食不良或营养不充足也是引发疾病的因素。


    身体受凉或疲倦时，往往容易引发感染。饮大量的液体，尤其是新鲜的菠萝汁、柠檬汁和热的草药，对于支气管炎都有好处。


    精油吸入法也有助于减轻咳嗽，适合的精油包括罗勒、安息香、丁香、乳香、松树或茶树精油。在房间，精油蒸发具有一定的治疗效果。做法是在睡觉前1小时，往600mL温水中添加15滴桉树精油和5滴柑橘精油。


    # ### （六）植物精油与消化系统


    消化系统是身体巨大的化学工厂，负责将食物转化成身体可吸收的营养物质。食物与消化器官中的消化液发生相互作用后，将食物分解成易吸收的营养素，及非必要的废弃'
  - '[PAGE 230]


    物。当吃进去的食物含有一些身体不需要的异物，例如微生物或化学物质，身体就必须尽快地将这些异物排除体外，否则会造成消化系统功能的低下或生病。


    芳香疗法透过精油的香气，促进消化液的分泌，减轻胃痉挛和肠胃胀气等。它的药理作用通过按摩来发挥功效，强化平滑肌功能，有效预防及舒解消化不良症状，进而帮助消化器官排出毒素。近来有研究表明，精油对消化系统的作用主要是透过嗅觉和味觉的间接作用来达到效果的，而不是直接影响组织器官。因此，我们在使用精油时，不但要考虑它的功效，也要关注它的气味是否令人愉快。


