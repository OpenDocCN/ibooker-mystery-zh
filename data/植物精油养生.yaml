    **植物精油基础知识**


    作。精油（除了几个特例外）都不应该在没有稀释的情况下直接用在皮肤上，需要与基础油混合，以稀释浓缩的化学分子，帮助精油分子在皮肤表面均匀分布，把精油稀释在基础油中就能做到这一点。精油的稀释比例要由许多因素来决定，如使用方法、使用者年龄等。


    4. 基础油的选择方法


    **虽然，在芳香疗法中，基础油是用于稀释精油的，但是其本身也具有各种对按摩有价值的功效，因为它们具备着一种或多种自己的特性。所以，基础油的选择也依临床医师所施行的按摩方法而定，因为，重一些的油给皮肤更多的“牵引”，在进行深度按摩时，会起到作用；而其他较轻的油会给予皮肤更多的“润滑”，在进行放松按摩时，可以选择。


    当用拇指的手法按摩全身时，一般需要大约 30mL的基础油。**


    **5.基础油的使用注意事项**


    大部分人对这些基础性的基础油不会有过敏性反应。但少数人还是可能对某种坚果有过敏性的问题，因此，明智的选择是：在使用某种坚果做基础油前先做皮肤测试。有时，人们会在日常身体按摩中使用“工业油”，但不会应用于芳香疗法中的按摩，虽然其价格比植物基础油要便宜得多，但是却不能给患者带来的相同的效果，还会令按摩者的皮肤感到“油腻”，因为这类矿物油，如婴儿油，会阻塞皮肤毛孔，从而限制了精油的渗入和皮肤的吸收，达不到精油按摩的预期治疗效果，所以要避免使用。


    **6.基础油与食用油的区别**


    表1-2 基础油与食用油在美容应用方面的主要区别


    |类别|基础油|食用油|

    |---|---|---|

    |原料处理|不蒸炒|蒸炒|

    |压榨温度|低于50℃|高于120℃|

    |保质办法|滤纸过滤脱水，膜过滤脱菌，充氮气保鲜|用270℃高温脱水杀菌|

    |活性成份|含有维生素E和脂溶性蛋白|维生素成份变性|

    |用途|芳香按摩保健|食用|


    **（八）植物精油的购买与贮藏**


    当您在购买精油时，首先要确定您购买的是植物精油，而非人工合成的复制品，或是'
  - '[PAGE 21]


    **1. 购买精油的注意事项**


    1) 当看到瓶子上写着“芳香油”、“花香油”或其他一些含糊不清的精油名称时，您要注意了，这可能不是您希望购买的精油。


    2) 精油的商标应该是“pure essential oil”或者是“100% essential oil”，当标签是“aromatherapy oil”时，这可能是基础油与精油的混合物。


    3) 如果所有精油的标价都是一样的，就不要从这家公司购买精油了。因为不同精油在成本价格上相差很大，不可能所有产品都是相同的价格。


    4) 精油的拉丁文名称必须出现在瓶子上，这样在您购买时就会避免很多误解，因为很多同名不同种的植物都可以用来做精油。


    5) 所有的精油都必须密封在有色的瓶子里，如果将它们装在透明的瓶子内，精油是很容易变质的。


    6) 植物基础油可以装在透明的容器内，但是植物精油总要装在琥珀色或者蓝色的瓶子里。


    7) 精油瓶口必须配有带点滴器的瓶盖，这样每次用时，就会逐滴流出。


    因为植物精油是一种天然的化合物，这些成份需要仔细照顾，正确的存放才能够保证不至于失效。


    **2. 存放精油的要求**


    1) 精油必须保存在冷凉、阴暗的地方，也可以冷藏（但不要结冰）以防止其变质。


    2) 一些精油在低温保存时会凝聚，当置于室温下就会恢复正常。一些柑橘属的精油在解冻后依然是黏稠状，这样是不会影响它们的治疗效果的。


    3) 精油瓶不能长时间没有必要地敞着盖，因为它们是很容易挥发的。


    4) 大多数精油可以保存很长时间，但是柑橘属精油的贮藏期超过6~9个月后就不能在皮肤上使用了，在其他芳香治疗中还可以使用，比如在香薰法中使用。'
- md: '## 二、植物精油养生与芳香疗法


    前章谈了植物精油的有关知识，从中人们可以得出这样结论：植物精油是植物的精华，是一种有明显功效的医疗保健材料，具有神秘而神奇的作用。可想而知，用此种物质用于人们养生，一定会是最佳选择。这就又提出一个新问题——养生。那么，何谓养生？简单地说，养生即休养生息，养护身体。我国著名养生专家王大有给养生下的定义是：通过一定的方法和程序，使人体的生命状态得到休养生息、滋补，增强精、气、神，获得最佳生命质量、最佳生命功能状态为养生。可见，养生概念内涵丰富，是一个完整的复杂系统，是与所有的人都有着密切的不可忽视的关系。如果说，爱情是文艺创作永恒主题的话，那么，养生是全世界人民的共同主题。


    人类的发展历史已经证明，养生是人们生活的重要组成部分，忽视不得。那么，怎样养生才能更理想、更可行、更有效呢？经反复研究中外的临床实践，我们认为，用植物精油养生可达此目的。在某种意义上讲，植物精油养生是与时俱进的时尚且可行的方法和途径，是对近百年来世界盛行的芳香疗法的补充和发展，是对芳香疗法最直截了当地诠释。可以说，植物精油养生就是当代的芳香疗法，是中国式的芳香疗法。何谓芳香疗法？下面着重介绍给读者。


    ### （一）芳香疗法的概念


    芳香疗法就是利用从植物材料（花、香草和其他芳香植物器官）萃取的精油，取得放松精神、缓解压力、治理失调的方法。在芳香疗法中，精油以不同方式用在人体上，包括按摩、吸入、洗浴、面霜、外敷等，一条重要的使用原则就是不能内服。


    #### 1．芳香疗法在医学方面的应用


    芳香疗法的逻辑性是，不同的精油成份能通过刺激人类天生的自我康复系统，来帮助身体康复。在法国，医生会开用精油进行芳香治疗的处方，包括内服。但是这些精油成份的功效十分强大，冒然内服可能会对健康造成危害，因此普通人群是不能这样做的。有人认为芳香疗法体系是一种新生事物，但其实早在古埃及、古巴比伦、古希腊和古罗马时代就已经开始使用了。


    #### 2. 芳香疗法的安全性


    使用芳香疗法时，请留意各种各样的安全措施。坚持安全使用，芳香疗法在减轻某些疾病方面是有帮助的，也会取得令人满意的结果。必须牢记的是，这种治疗方式仅仅是帮助缓解各类医学疾病，应该被当作一种辅助治疗看待，而不能作为常规对抗疗法（西方的一种治疗方式）用药的替代品。除非得到医生的认可，否则芳香疗法不能代替常规医药。如果感觉身体有问题，还是要到正规医院看病。


    #### 3. 进行芳香疗法的前提条件


    这种治疗形式的前提基础条件是：极少量的精油通过皮肤或肺部（吸入疗法）被身体吸收，然后与体内的化学成份发生反应，以减缓压力，增强免疫力，对其他许多身体问题也有帮助。


    ### （二）芳香疗法与草药医术的区别


    草药医术与芳香疗法相同吗？事实上，在治病或保健方面，两者都用到了植物材料，可以归为一类，但是它们对植物材料的使用方法不一样，是两个截然不同的领域。


    1）草药医术，就像芳香疗法一样，使用了大量的植物原材料，但是，在草药医术中，提取物通常是采用内服的方式用药，而精油的摄取可以经过皮肤和肺部器官。精油内服是在严格的药物监督框架下操作的，必须有经过训练的药物人员专门从事这项监督工作。


    2）从植物材料中提取的芳香物质，对于草药医术和芳香疗法是同等重要的。然而，草药医术也用在植物中发现的丹宁酸、苦味成份、植物黏液、配糖类等物质，在多数情况下，这些物质包含有水溶性的物质。


    3）在草药医术中，内服精油数量是非常微小的，比如当成茶叶似的浸泡所内服的精油数量就更小了。在芳香疗法中，所使用的是经过各种提取方法获得的浓缩精油。例如，当饮用1杯甘菊茶时，你内服到的精油的数量将是非常少的。从晾干的植物材料中浸出的精油非常少，但当你使用经一个正确稀释后的甘菊精油做按摩治疗时，进入你体内的精油数量会急剧地增加（即使是稀释在基础油以后使用），远远高于茶水中的含有量。


    4）在芳香疗法中，可以使用到不溶于水的成份，它们的浓度一般要比植物本身的含有量更高。


    现在来回答我们起初的问题，答案是“不”，草药医术和芳香疗法是不一样的。然而，他们两者都认为，应该从整体的角度来给病人治病，两者都使用从有机植物材料中提取的物质进行治病，尽管使用植物材料的方法是不同的。


    ### （三）芳香疗法的医学性


    正如我们始终强调的那样，人们尽可能地把在芳香疗法中所用精油的成份弄清楚，操作芳香疗法的人也必须是经过培训的，只有在具有资格证的人员的指导下或监督下，才能进行芳香疗法的治疗。


    法国是近代芳香疗法的先驱。在法国，精油被配制成胶囊，可以列入处方中，被病人口服，也有制药栓使用的。法国的芳香治疗师会用到一种芳香测试法，他们先从病人受感染的地方取一点病样，在试验室培养，然后用各种精油进行测试，以找到最适合治疗那个病人感染的精油。他们已经发现：不同精油的混合体功效更好些，混合精油使用的针对性很强，即使不同的病人感染了相同的细菌，所使用的精油配方也是不同的。某类精油可能就更适合某些人群使用。


    上面所述是芳香疗法在医学方面应用的简单事例，就是为了说明芳香疗法和精油在医学领域具有的一些效果。


    ### （四）芳香疗法的生理学效应


    当气味进入鼻腔时，它会遇到5000万多个神经原接收器，它们分布在鼻腔和鼻腔黏膜的上部，接收器的这种分布状况可以灵敏地对每种气味作出反应。这些接收器会进一步把气味转换成一种信息，这种信息被传送到嗅觉鳞状物（它被认为是前脑的一部分，主要承担感觉输入的功能，称为边缘系统）。在这里，气味开始被处理，然后被输送到大脑的其他区域，这些区域控制着人们的情绪、行为和基本的思维过程。


    例如，一些来自童年的遥远记忆也可以被气味所唤起，这种事实强调了气味对我们精神世界和快乐的重要意义。其中，边缘系统可以被描述成一种马头鱼尾的怪兽、一种拱形物、有色带环绕的脑回解、丘脑、杏仁或扁桃仁以及嗅觉鳞茎物，虽然这些描述听起来专业性太强，让人提不起兴趣，但是它能够很好地解释嗅觉器官是如何工作以及它们对我们产生了怎样的影响。在“边缘系统”这个词使用之前，这个系统被称做嗅脑，被认为是人类最古老的系统之一。


    精油的生理学效应可以通过测定人体脑电波来解释，另外人类本身具有的享乐主义也符合精油的使用效应。


    #### 1. 脑电波


    当闻到薰衣草精油那种具有松弛作用的香味时，用 EEG（脑电波描记器）测定脑电波，它会记录到α-波峰升高的现象。不过，随着测试对象处于不同的精神状态，如被激励或放松，试验结果会发生变化。当使用带有警觉性质的气味时，如茉莉，也可以记录到大脑的活跃性提高了。某些气味可以降低心脏的收缩压，从而可以缓解压力，如肉豆蔻、肉豆蔻汁和颉草精油。


    在另一个有趣的测试中，我们发现，气味不需要很强就能够对身体产生影响。使用皮（肤）电活动测试（也就是测定皮肤两点之间的电流强度）时，发现闻到放松性质的气味时，如佛手柑和薰衣草，皮肤电活动减弱了。


    #### 2. 享乐主义


    不过，我们必须记住的一点是，在解释这些试验结果时，享乐主义扮演着一个重要的角色。当一个人处于一种特殊香味或气味时，享乐观可以代表一个人快乐的程度。


    边缘系统不仅是我们嗅觉系统的一部分，它还是人体连接系统的重要组成部分，因为它对我们身体的其他系统有着间接或直接影响，包括调节内分泌系统、内脏受动器工作机制、人体行为和动机的合成模式。因此，它意味着我们的嗅觉不仅仅具有捕获气味的功能，还可以很好地履行调节功能。


    虽然已经有许多科学研究，分析了气味，尤其是精油的香味是如何影响身体的生理反应，但是仍然有许多无法解释的现象需要进一步的科学调查。


    ### （五）芳香疗法与脑电波


    德国精神病学家汉斯·伯格最先使用脑电图（EEG）术语。脑电图指大脑潜在的波动的记录。由脑电图记录着脑电波，脑电波是由一系列的能起作用的神经元件流发生器产生的。


    大脑可以分为三个主要部分：大脑、脑干、小脑。大脑是成对结构，分为左、右两个半球，每个半球与身体对应的部分相关联。脑干被分为四个区域，包括长方形的骨髓、连接部分、中脑和间脑。小脑从脊髓索接受来自身体和四肢位置的信息，小脑会对这些信息进行简单化处理，可以称其为大脑的“反馈”中心。


    ### 1. 脑电波与情绪


    使用脑电波描记器时，把测量脑电波的电极放在头皮上；也可以从裸露的大脑表层获得这种记录，我们称其为皮层脑电图（ECoG）。细小的针形电极也可以被放到大脑的组织内来做记录，可以称为深层记录。脑电波可以基本地分为4种不同的类型：α、β、θ、δ。


    α脑电波发生在8~13Hz，一般产生的状态是，当人清醒地处于一种安静休息的时候。当睡觉时，这种脑电波会完全消失。


    β脑电波发生在14~30Hz，但是精神处于强烈活跃状态时，可以达到50Hz。


    θ脑电波发生在4~7Hz，主要发生在儿童时期，也可以在成年人中找到，当成年人处于情绪压抑，尤其是当失望或受挫折的时候。


    δ脑电波发生在3.5Hz，当一般深度的睡眠时发生，也可以在幼年时期、严重脑疾病时发生，这种脑电波仅仅在大脑皮层发生。


    ### 2. 反常的脑电波


    在癫痫患者发病期间，神经系统的全部或部分兴奋性的基本水平都超过了临界线。有两种类型的癫痫患者，普通的癫痫症和局部的癫痫症。普通的癫痫症包括整个大脑，而局部的癫痫症仅仅在大脑小块区域或在瞬间发病。普通癫痫症进一步被分为重大的疾病和次要的疾病，前者的发病形式会更严重些。这是脑电波在芳香疗法中的变化，使用精油可以影响到它的活动形式。因此，遭受癫痫痛苦的人要小心使用精油。


    不过，上面的陈述也有些过于片面，因为在精油促使癫痫症发病机理方面，也有一些人就成功地把精油应用于控制癫痫症发病，如提姆·贝特医生。不管精油对脑电波影响的科学依据究竟如何，事实是：当在芳香按摩或蒸汽疗法中使用精油，对于你的健康会产生有益的影响，因为它们能够对身体和精神产生平缓和减压的功效，具有一定的治疗功效。


    ### （六）芳香疗法的心理作用


    虽然气味是能够影响情绪的，每个人所喜欢的香味也相差很大，但是是一些精油的气味和它所创造的心情之间，似乎存在着某种联系。


