    脑、樟脑。萜烯的双键与水加成，可形成萜烯醇；与糖结合可形成单萜苷。单萜烯是组成挥发油的主要成份，沸点一般在 140～180℃。含氧单萜烯的沸点一般在 200～300℃。


    这类化合物遇到空气和热源很容易发生反应。柑橘属精油含有高浓度的单萜碳水化合物，接触到空气会快速发生反应，容易氧化，因此不能长期保存。


    【功效】


    这些成份有消炎、防腐杀菌、抗病毒和细菌的治疗功效；其中一些还有止痛、刺激或滋补的作用；由于它能刺激黏膜，也被用作解充血剂的成份。


    倍半萜烯


    【基本情况】


    这些倍半萜烯化合物含有 15 个碳原子，有复杂的药理学作用。如母菊，即德国甘菊，就含有它。另一种倍半萜烯化合物是法呢烯（金合欢烯）经常可以在甘菊、玫瑰和其他的花类精油中找到。


    1910 年，Otto Wallach 教授在萜烯研究方面取得重大突破，获得诺贝尔奖。他的研究成果至今仍影响着现代精油的工业化生产工艺。


    【功效】


    有消炎和抗过敏的功效。


    # ## 2. 氧化化合物


    苯酚


    【基本情况】


    在精油中发现的苯酚一般侧面带有一个碳链，如麝香草酚、丁子酚和香芹酚。它们有很好的防腐杀菌和消毒的作用，也有很好的刺激功效。因为苯酚有毒，含有苯酚浓度较高的精油，应该以低剂量并在短期内使用，如果长期使用会导致毒性反应。因为排毒的需要，肝脏要过度地工作。


    【功效】


    苯酚也属于对皮肤和黏膜有刺激作用的化合物，虽然它们有很好的防腐杀菌效果，如肉桂和丁香精油，但是它们会引起皮肤严重的刺激性反应。


    # ## 3. 醇类


    单萜醇


    【功效】


    这类精油有很好的防腐杀菌、抗病毒和真菌的功效，几乎没有副作用，如皮肤敏感性反应或中毒反应，还有振奋精神的效果。这些醇类化合物包括，芳樟醇、香茅醇和萜品醇，分别属于薰衣草、玫瑰和天竺葵精油，在刺柏和茶树精油中也可以找到。'
  - '[PAGE 14]


    **植物精油基础知识**

    Essential oils health


    **倍半萜烯醇**

    【功效】**这类化合物不是所有的精油中都有的。它们具有很好的疗效，包括对肝脏和腺体的刺激作用，以及抗过敏和消炎的作用，如在德国甘菊精油中发现的红〔甜〕没药（萜）烯。其他含有倍半萜烯醇的精油包括檀香（α-白檀油烯醇或檀香脑）、生姜、广藿香、香根草、胡萝卜籽、不调花和颉草。**


    **4. 醛类**

    【基本情况】**这些醛类化合物是构成柑橘属植物精油的主要成份，性质不稳定，与氧气接触或在稍稍加热的状态下都很容易发生氧化反应。这类精油的使用浓度约在1%。如果浓度过高，会引起皮肤的刺激性和光敏性反应，例如柠檬香茅精油。**

    【功效】**有抗真菌、消炎、消毒、镇静和振奋精神的功效，如蜜蜂花、柠檬香茅。这些性质在芳香疗法中得到了很好的应用。


    **5. 酮类**

    【基本情况】**酮类化合物是有毒的。**

    【功效】**在金钟柏和苦艾精油中发现的侧柏酮，有很好的治疗功效，尤其适用于缓解黏液过量分泌以及促进细胞和组织再生方面。其他精油，如牛膝草、尤加利和迷迭香，都含有适量的酮类化合物，如果在芳香疗法中使用得当对身体会非常有益。

    在孕期，要谨慎使用含有较高浓度酮类化合物的精油。


    **6. 酯类化合物**

    【基本情况】**酯类化合物是由醇类和酸类合成的，它的命名规律来源于构成份子的名称，把alcohols去掉ol，加上yl，把acids去掉ci，加上ate。

    精油中酯类化合物一般味道香浓，趋向于水果香味。它们的治疗功效包括镇静和止痉挛。**

    【功效】**有些酯类化合物还有抗真菌和杀菌的作用，如天竺葵精油具有的抗真菌作用。最有名的酯类化合物应该是乙〔醋〕酸里哪酯，在薰衣草、快乐鼠尾草和橙叶精油中都发现含有


