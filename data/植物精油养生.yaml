    ## 5. 红花油


    这种油相对便宜，与向日葵同属于菊科，它也是以种子为原料的。它含有高浓度的不饱和脂肪酸，但要与其他的具有抗氧化性能的基础油混用，来提高这种油的保质期，因为它自身酸败得很快。


    红花油适合做基础油，最好与其他基础油混合使用。红花按摩油有很好的保湿功效。


