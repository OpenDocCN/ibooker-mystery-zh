    ## 三、植物精油与基础油的提取方法


    ### （一）原料采集


    对大部分植物来说，应在开花前的上午 9 ~ 11 点采收不带露珠的未受损的叶子或小枝，这样药效最好。用于提取精油的原料（如玫瑰花）越早采集越好，最好在早晨太阳还没有出来的时候就要进行。采收地必须离提炼厂非常近，工人一采收就可以直接送往工厂，越快提炼越好。用于提取精油的原料，根据植物油腺结构不同，采集方式也有所不同。


    采集玫瑰花的场景


    #### 1. 未发香鲜花的保养


    茉莉、大花茉莉、晚香玉等是采集即将开放的成熟花蕾。在未开放前不发香，只有不断通过呼吸作用和代谢过程，经过一定时间后，花蕾才会开放和发香。在上述作用和过程中，花蕾会不断地释放一定热量。在运输和贮存过程中，如不加以妥善保养，花蕾因受热过度，会发酵变质。一般在运输途中，常用竹箩把花蕾松散地盛装，有时在箩的中间还设置一个竹制的通风筒。在贮存过程中，花蕾以薄层放置进行保养，花层厚度不高于5cm。


    花蕾的充分开放和发香与下述条件有关：

    1) 花层面上或花层周围的空气应适当流通。

    2) 贮存花蕾的花库中，应具有合适的室温，一般以28℃～32℃为宜。

    3) 花库中应保持适宜的相对湿度，一般以80%～90%为宜。为了使成熟花蕾能全部均匀一致的开放，应每隔一定时间，把花层轻轻地进行上下翻动。大茉莉花蕾，在干热的7～8月里，要喷洒雾水，使之开得更好，香气更浓。


    #### 2. 已开鲜花的保养


    白兰、黄兰、栀子、玫瑰、姜花等是采集当天刚开放的花。这些开放的花已具有新鲜浓郁的花香，但仍在进行着代谢过程，仍在放出热量，所以一旦采集后，应立即用竹箩松散地送厂加工，以保持香气质量，减少香气损失。如来不及加工，也必须薄层放置进行保养，使鲜花不因受热发酵而变质。


    #### 3. 鲜叶的保存


    一般鲜叶采集后，不要立即加工，应薄层放置一定时间，有时可以放置至半干，再进行加工，其出油率常高于鲜叶的出油率，如白兰叶、树兰叶、玳玳叶、橙叶、薄荷叶，放置一定时间（数天）后，其出油率常比原来鲜叶高5%～20%（按鲜重计）。但和鲜花一样，鲜叶在运输和贮存过程中，也要防止发热发酵，否则会影响出油率和质量。鲜叶经薄层放置一定时间后，叶表面水分均匀散失了一部分，而又不十分干枯，叶表面细胞孔扩大，有利于精油扩散，提高了出油率。


    娇嫩的鲜叶，苹果天竺葵，不需放置，采集后应立即加工。此类叶片即使堆放1个小时，其香味也有很大的变化。需长期保存的鲜叶，常在采集后，采用阴干或晒干办法，如香紫苏叶等，但在干燥过程中，精油会损失一部分，尤其是晒干方法，所以以采用薄层阴干为宜。


    #### 4. 树脂的收集与保存


    以乳香的采集为例，人们在8月初就开始采集乳香脂，他们用长砍刀在树上划几道口子但是不伤及小树枝，划开后的当天，人们就会看到一些有营养的树液一滴滴地流出来，这些滴液渐渐凝结成乳香脂。这些乳香脂变硬后就会落到地面上，这就是为什么树底下这么干净，乳香脂采集旺季是在8月中旬，这时候的天气比较晴朗干燥。


