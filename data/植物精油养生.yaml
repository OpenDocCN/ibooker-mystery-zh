    (2) 来源

    这种常绿的草本植物，可以长到60cm高，又被称为意大利永生草或不凋花。茎有分枝，叶片银绿色、有芳香，花色暗黄、类似于雏菊，当植物成熟时，花朵变干，然而仍保持原有颜色。蜡菊属植物大约有500个品种，但是仅有少量品种可以用于提取精油。在中世纪时期，蜡菊属植物的花朵，在全欧洲都被当作一种点缀使用。


