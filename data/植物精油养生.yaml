  md: '"真"布枯植物—Barosma crenulata—它的油富含蒲勒酮，也应小心地使用。


    # (4)治疗功效

    布枯精油的治疗功效，包括杀菌、祛风、利尿、杀虫和滋补。


    # (5)提取方法

    布枯精油是以干燥叶片为原料，采用蒸汽蒸馏法提取的。


    # (6)使用注意事项

    不能在芳香疗法中使用布枯精油。


    # (7)用法

    - 布枯叶片可以用于驱避昆虫，也是一种防腐剂，还可以作为茶饮。布枯叶片还可以用于治疗泌尿系统感染、消化问题、痛风、风湿病、咳嗽和感冒（当茶饮用，每杯热水中加1茶匙布枯叶片）。

    - 布枯叶片也可以泡在白兰地中制成“药用”白兰地，用于各种轻微疾病。

    - 布枯精油添加在以醋为主做成的洗液里，可以用于治疗瘀伤和扭伤。

    - 布枯精油一般不在芳香疗法中使用，但是，可以当作灌剂（茶饮），有助于治疗感染、消化问题、咳嗽、感冒和风湿病。


    # ## 12.桧（尖）精油

    桧（尖）精油是从刺柏植物（Juniperus sabina）提取的，属于柏科，又称为双子柏。


    # (1)精油性质

    这种无色的桧（尖）精油气味令人不愉快，味道苦，让人厌恶。


    # (2)来源

    它的树型紧凑，是一种灌木，高约1m，分枝呈水平生长的趋势，树皮淡绿色、叶片小、暗绿色，浆果黑紫色，含有3粒种子。原产于北美洲和欧洲中南部。

    桧树曾是一种药膏的成份，或用作一种敷料用于治疗水疱、梅毒以及其他的皮肤病。局部使用或内服能产生刺激性。桧（尖）精油被认为含有足叶草毒素（鬼臼毒素），不能使用，因为这种成份对细胞有破坏作用。


    # (3)提取方法

    桧（尖）精油是以嫩枝和叶片为原料的，采用蒸汽蒸馏法提取的。


    # (4)化学成份

    桧烯、1-蒎烯、柠檬烯、松油烯、杜松烯。


    # (5)使用注意事项

    刺柏 Juniperus sabina


