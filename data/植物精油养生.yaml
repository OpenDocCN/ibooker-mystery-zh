    # 1. 脑电波与情绪


    使用脑电波描记器时，把测量脑电波的电极放在头皮上；也可以从裸露的大脑表层获得这种记录，我们称其为皮层脑电图（ECoG）。细小的针形电极也可以被放到大脑的组织内来做记录，可以称为深层记录。脑电波可以基本地分为4种不同的类型：α、β、θ、δ。


    α脑电波发生在8~13Hz，一般产生的状态是，当人清醒地处于一种安静休息的时候。当睡觉时，这种脑电波会完全消失。


    β脑电波发生在14~30Hz，但是精神处于强烈活跃状态时，可以达到50Hz。


    θ脑电波发生在4~7Hz，主要发生在儿童时期，也可以在成年人中找到，当成年人处于情绪压抑，尤其是当失望或受挫折的时候。


    δ脑电波发生在3.5Hz，当一般深度的睡眠时发生，也可以在幼年时期、严重脑疾病时发生，这种脑电波仅仅在大脑皮层发生。


    # 2. 反常的脑电波


    在癫痫患者发病期间，神经系统的全部或部分兴奋性的基本水平都超过了临界线。有两种类型的癫痫患者，普通的癫痫症和局部的癫痫症。普通的癫痫症包括整个大脑，而局部的癫痫症仅仅在大脑小块区域或在瞬间发病。普通癫痫症进一步被分为重大的疾病和次要的疾病，前者的发病形式会更严重些。这是脑电波在芳香疗法中的变化，使用精油可以影响到它的活动形式。因此，遭受癫痫痛苦的人要小心使用精油。


    不过，上面的陈述也有些过于片面，因为在精油促使癫痫症发病机理方面，也有一些人就成功地把精油应用于控制癫痫症发病，如提姆·贝特医生。不管精油对脑电波影响的科学依据究竟如何，事实是：当在芳香按摩或蒸汽疗法中使用精油，对于你的健康会产生有益的影响，因为它们能够对身体和精神产生平缓和减压的功效，具有一定的治疗功效。


