    **（八）植物精油与免疫系统**


    许多妇女和年轻女孩在月经期，都经历过或轻或重的不舒服和疼痛。月经痛包括头疼、腹部偏下地方的绞痛和后背靠下地方的疼痛。在月经开始前期，食用富含钙和镁矿物质的食物，如牛奶制品、罐装鱼、坚果和种子，因为它们能够使肌肉放松。

    吃止痛药会有帮助；也可以躺在黑暗的房间，把暖水袋放在胃部，这样也能缓和疼痛。还有一种方法是，饮用由大茴香、茴香和欧芹泡制的植物茶，也有同样的效果。

    使用一种按摩油轻轻地按摩在疼痛地方的外面，也有助于缓解这类问题。配方如下：15mL 荷荷芭油做基础油、2滴甘草精油、2滴快乐鼠尾草精油、2滴天竺葵精油、2滴薰衣草精油、1滴欧薄荷精油。


