    # # 3. 芝麻油


    有些人觉得这种油的气味太过强烈，但它却是维生素 E 和维生素 B 的良好来源，还含有丰富的钙、镁和磷元素。此外芝麻油还含有蛋白质和卵磷脂。它是一种黏稠的油，可以用于治疗湿疹、牛皮癣，适用于老化的肤质。它具有良好的保湿功效。在民间医药中，有用它治疗轻微瑕疵的习俗。


    它最好与其他的基础油混合使用，如甜杏仁或葡萄籽油，以使它稀释些。芝麻按摩油具有良好的保湿、润滑和润肤的功效，用它与其他基础油混合配成复方油或作按摩油是个不错的选择。


