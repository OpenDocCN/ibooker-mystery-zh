    （七）走出悲伤


    艾伦，49岁，在当地面包店忠心地工作了10年。当店主要搬到新的地方时，他们解聘了所有员工，也包括艾伦，他们甚至没有考虑艾伦已经在那工作了一段很长的时间。她感觉被背叛了。在回家的途中，她满脸泪水地找到了她朋友的芳疗诊所，倾诉了她的故事，她说：“你能给我一些能使我开心的精油吗？”，她的朋友知道艾伦的丈夫在去年过世，她母亲是她主要的安慰，但也在6个星期后突然死去。在那段时间，艾伦一个星期没有上班，她说她整天在家不知道要做什么。朋友给了她乳香以及她挚爱的薰衣草精油，还有数'
