  md: '**Essential oils health** 植物精油在情绪调节中的应用


    # **（二）恢复嗅觉**


    有一位患者多年来都受到慢性鼻窦炎之苦，他的嗅觉也在慢慢衰退，并且持续地受到短暂失去嗅觉的痛苦。手术后，他的情况并未得到改善，而且常常地感到没有嗅觉，令他的人生很悲惨。当他下班回家，没有办法闻到太太为他准备的晚餐的香味，而他的太太是一个很出色的厨师。更惨的是，他甚至没有味觉，因为嗅觉和味觉是紧扣着的。在他太太的探听下，他们来到了一个芳香疗法诊所，芳疗师为他做了一个“三明治”式的全身穴位按摩，然后又在脸上重做一次。在配方里，芳疗师选择了两种效果强烈的精油——薄荷及蓝胶尤加利，但是他都没有察觉到。在接受第3个疗程后，他想他应该可以闻到一点东西。芳疗师在木片上加入薄荷，放在他的鼻子前面。他发出很高兴的尖叫，然后说：“我可以闻到淡淡的薄荷味了，虽然不明显，但是我能闻到它。”6个月后，他恢复了嗅觉，能享受到他太太煮饭的一些香味，这令他们两人生活得更快乐。而比恢复嗅觉更好的结果是：这让他们的婚姻更愉快，同时没有预期中的副反应。


    # **（三）减轻恐慌**


    玛格丽特的母亲是长期气喘患者。有一天晚上，当她在清洗他们的船时，突然严重发病。但是，她的呼吸器放在家里，因此她很惶恐。幸运的是，她的气喘混合精油放在手提袋内。而且她常常把橙花放在身边，因为她非常喜爱橙花。当玛格丽特将混合精油涂抹在她妈妈的上背部及足底反射点时，她让母亲深深吸入橙花，及时地减轻了她的惊慌，而精油能保持她的呼吸不恶化，直至她们回到岸上的屋子边，玛格丽特的姐姐才急忙取来母亲的呼吸器。


    # **（四）缓解压力**


    科林在加入公司11个月后，获得了最佳推销员奖。取得这个奖赏后，在年终的销售会议上他常常要发言，这个做法令他很困扰。他完成第一次发言后出现了严重的脸腺炎。以后每次的演讲都使他感到特别焦虑。芳疗师认为他的脸腺炎是因为压力而导致急躁及失眠所造成的，芳疗师要他在演讲前两星期来做一个芳疗按摩疗程，给他做甘菊眼部护理，每天滴甘菊纯露3~4次在眼睛上。3个星期后他打电话给他的芳疗师，他说，自己的脸腺炎在演讲前完全消退且没有再出现，但他仍然每天滴罗马甘菊纯露作眼部护理。他表示他在演讲时感到很轻松。在他第3次疗程时，芳疗师告诉他，他已经并不需要再做进一步的'
