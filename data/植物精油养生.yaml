    (二) 一种能祛脚气的芳香杏仁足浴油\n\n参考文献\n\n# 一、植物精油基础知识\n\n## （一）植物精油概念\n\n植物精油，简称“精油”，是从各种植物材料中获得的一类挥发性物质。它不仅来源于草本、灌木、亚灌木和木本植物的花朵，也来源于它们的其他各种器官。这里突出和强调的“植物”精油，是与化学合成精油相区别的。本书所谈的精油均是植物的提取物。\n\
    \n### 1. 几种植物精油\n\n#### （1）固体精油\n\n把要萃取的材料放在盛有溶剂的蒸馏器中，然后缓慢加热，所加热量刚好能够使溶剂保留在混合物中（这种溶剂可以反复使用），而植物材料中的挥发性物质也不会散发掉。当把溶剂转移出去后，所剩的物质接近于固体，成蜡状，我们称其为“固体”精油。\n\
    \n#### （2）树脂状精油\n\n把含有树脂的植物材料使用上述方法进行萃取，所分离出来的物质就称为“树脂状”精油。\n\n#### （3）完全精油\n\n\
    先把固体精油用酒精加热溶解，然后搅动。完全精油或一些蜡质精油、不易挥发的油和脂肪都会溶解在酒精中。然后，把这种酒精混合物在真空状态下蒸馏，去除酒精，所剩下的物质就是“完全”精油。完全精油的香味最浓，也是最贵的，主要用于香水工业。\n\
    \n### 2. 植物精油的特性及应用注意事项\n\n#### （1）精油不是油，而是一种挥发性物质\n\n精油是根据植物材料性质采取不同的提取方法从植物材料中获取的有着很浓香味的液体。精油与其他油（如橄榄油）的不同点在于精油具有挥发性，当暴露在空气中时，就会挥发掉。\n\
    \n#### （2）精油具有医疗保健功效\n\n精油还有某些治疗功效，能够用于保健和康乐方面。在精油漫长的应用历史中，许多卓越的治病术士（尤指用宗教迷信方式给人治病的人）都会使用。事实证明，这些提取物确实具有治病的功效。\n\
    \n#### （3）使用精油要注意安全\n\n在精油的使用过程中，也有一些必要的安全措施。比如，不要在皮肤上使用浓的、没有稀释过的精油。另外，某些精油是有毒的。幸运的是，一般这类精油是不销售的。不过，当第一次使用精油，或在尝试一种新的精油时，大家还是要小心。\n\
    \n#### （4）精油使用方法多种多样\n\n精油的使用方法有许多种，如芳香按摩，精油主要通过皮肤被吸收；蒸汽疗法，精油分子通过肺部进入人体循环系统等等。\n\
    \n#### （5）有少量精油可内服\n\n科学证明，有个别的植物精油也可以作为一种内服药用于医学领域，但一定要在经过训练的人或有相应行医资格的人的指导下使用。\n\
    \n#### （6）应用精油前必须做皮肤测试\n\n如果你从来没有在你的皮肤上使用过精油，我们建议你先做皮肤测试，来检验有无过敏反应。\n\n## （二）植物精油的应用历史\n\
    \n### 1. 埃及\n\n在人类历史中，埃及人可能是最早在宗教、化妆品、庆典和医疗方面广泛使用芳香疗法和芳香植物的。具有香味的植物（或动物）的精华和树脂常常被用作防腐剂的材料，最典型的应该是在木乃伊制作工艺方面的应用。\n\
    \n古埃及的统治者相信，只要尸体能够保存完整，人死后就可再生，轮回成人。人一死，他们便将其尸体的内脏（除了心脏及肾脏），包括脑部组织，全部取出放在宝瓮中。尸体被涂敷香料及药物，并用树脂填充腹腔，这样处理过的尸体经过千年也不腐败。雪松精油、没药精油以及其他的香熏植物精油在“木乃伊”制作过程中的使用，不但证明它们具有神奇的防腐作用，也说明古埃及著名的“木乃伊”与植物精油具有密不可分的关系。\n\
    \n在古代一些重要节日，香料是重要的装点工具。古埃及的演奏者们顶着香料瓶来吹奏欢歌，浓郁的香味不仅增添了节日的气氛，还给人以精神上的享受。\n\n![古埃及“木乃伊”](img/9a4032e2e8ad73992ff2b2bd7fc25509_6_0.png)\n\
    \n### 古埃及演奏者头顶香料瓶欢歌\n\n芳香植物在古代婚礼上的应用也很广泛。在阿兹特克人婚礼上，胭脂是新娘最为重要的装饰品，新娘用其将嘴唇涂红，使自己变得更加美丽，然后在松树火把的带领下，由新郎背着进入新房。夫妻双方跪在地毯上，衣服象征性地系在一起，两人中间是一碗熏香（也可能是白珂钯脂和沥青），是往壁炉中添加用的。他们下方是一篮玉米粉蒸肉和一碗炖火鸡，再往下有一坛子含有蜂蜜的龙舌兰酒。龙舌兰酒是用龙舌兰酿造成的，龙舌兰曾被哥伦布误认为是芦荟。\n\
    \n![阿兹特克人的婚礼](https://i.imgur.com/placeholder.png)\n\n![阿兹特克人婚礼细节](img/9a4032e2e8ad73992ff2b2bd7fc25509_7_1.png)\n\
    \n### 2. 中国和印度\n\n在同一时期，中国人也开始利用药草和香草植物；在中国民间家中悬挂芳香植物或点燃香料植物来驱邪避瘟、提神醒脑的习惯由来已久，人们常常点燃天然檀香木及松木来陶冶性情、舒缓紧张压力。印度草医学中也利用到了芳香疗法，在印度宗教的仪式上，檀香木制品可以用来涂抹在国王以及高级祭司的头顶上。\n\
    \n### 3. 希腊\n\n古希腊人接纳和吸收了埃及人的医学知识。那个时代最负盛名的是希腊医生希波克拉底（约公元前 460～前 377 年），他同时也是一位“整体协同治疗”的坚定支持者，其中就包括芳香按摩在内的治疗手段。\n\
    \n### 4. 古罗马\n\n古罗马人又接受了希腊人的医学知识，开始意识到卫生的重要性，并且相信香味的神奇功能，他们贮存了大量用于芳香疗法的材料，大大提升了当时医疗和健康的水平。\n\
    \n### 5. 阿拉伯帝国\n\n当罗马帝国和随后的黑暗年代结束后，我们看到了阿拉伯帝国的兴起，因为地理位置的缘故，他们不但继承了古希腊和古罗马的医学知识，而且还受到中国和印度的影响。\n\
    \n据史料记载，当时有一位波斯医生（980～1037 年）就掌握了精油的蒸馏工艺。\n\n## （三）植物精油发展历史的重要阶段\n\n### 1. 黑暗时代\n\
    \n在那段时间里，禁止没有受过培训的草药医生们提供民间疗法，巫师这样的人甚至受到迫害。但僧侣们仍躲在寺庙内坚持给病人看病，使草药医学得以流传下来。由于当时教会认为洗澡是一种罪孽，在没有其他办法的情况下，许多有香味的材料被大量使用以遮盖身上的臭味。尽管大部分芳香材料有抗菌和驱虫的作用，但均未起到医疗保健作用，而只是被用作除臭剂。经过那么一段时期，希波克拉底的整体协同疗法几乎消失。\n\
    \n### 2. 复兴时期\n\n整体协同治疗疾病观点的复兴也不是一帆风顺的，这个时期最有影响力的医生是佩拉……（原文此处截断）\n\n### 3. 花香疗法\n\
    \n爱德华·布什是一位咨询医生，也是一位受过正规培训的病理学家和细菌学家，但他并不沉迷于传统医学的说教，而是大胆地用花香进行医疗实践，并且形成了自己的一套治疗身体失调的理论。这类疾病一般没有明显的外部症状，但是患者在心理上却存在问题。他的医疗理念虽然没有明显的逻辑性，主要依赖于他自身的直觉，但是治疗的效果却是出奇的好。\n\
    \n### 4. 现代芳香疗法的出现\n\n1937 年法国化学家兼香料商盖特佛塞提出。他不相信自然疗法，但却对精油的性质感兴趣。1910 年，他在实验室烧伤了手，当时身边只有没有稀释过的薰衣草精油，情急之下把手伸进装薰衣草精油的容器中，当时，精油不但立即止住了疼痛，而且伤口愈合过程没有感染和留下伤疤。他还发现少量的精油能被身体吸收，并与体内化学物质相互作用。\n\
    \n![著名化学家盖特佛塞](img/9a4032e2e8ad73992ff2b2bd7fc25509_9_0.png)\n\n### 5. 现代芳香疗法的医疗应用\n\
    \n在第一次世界大战期间，根据盖特弗塞的试验结果，著名芳香疗法研究者珍瓦涅医生成功地利用植物精油治疗受伤的战士。他用植物精油（如薰衣草油）为伤病人员处理严重灼伤及溃疡伤口，效果非常明显，从而使精油和医疗有了密不可分的关系。人们尊他为“**芳香疗法之父**”。\n\
    \n![芳香疗法之父—瓦涅医生](img/9a4032e2e8ad73992ff2b2bd7fc25509_9_1.png)\n\n### 6. 现代芳香疗法的美容应用\n\
    \n玛格丽特·摩莉女士是近代首先以精油按摩方式发挥精油的回春、护肤及心灵呵护效果，并将精油导向美容保养领域的人。1950 年，她把精油稀释到植物基础油中，用作皮肤按摩，采用的是太比坦手法，即沿着脊柱突起两侧的神经末梢进行按摩。她也是为个人开具复方精油，以适合不同被按摩人需要的第一人。她主张通过均衡膳食；推行健康生活方式，结合芳香疗法中所用的各种精油、精露、植物油及其他天然素材，让人们真正拥有健康、自然、年轻的皮肤，同时兼顾了身体和心灵的健康。\n\
    \n20 世纪 70 年代开始，植物精油和芳香疗法成为整体协调治疗体系的一个重要组成部分，在世界各地都拥有众多的使用者。\n\n![芳香美容创始人—玛格丽特·摩莉](img/9a4032e2e8ad73992ff2b2bd7fc25509_9_2.png)\n\
    \n## （四）植物精油的价值及传播\n\n植物一般分为木本和草本两大类，可以利用的木本植物和草本植物的器官如下：叶片、根系、茎、芽、嫩枝、根茎、心材、树皮、树脂、花、种子、果实、全株等。\n\
    \n依据植物所属类型或植物器官的不同来选择提取方式，包括压榨法、蒸馏法和溶剂萃取法。芳香植物材料可以用作提取精油，是因为这些植物都具有油腺细胞，能够产生微量的精油。例如，用\
    \ 6 万朵玫瑰花瓣能产出约 0.03kg 的纯玫瑰精油，大约 800 万朵手摘的茉莉花瓣仅仅产出约 1kg 的纯茉莉精油。\n\n![某些植物原料（如檀香）必须长到一定的年限，才能用于提取精油](img/9a4032e2e8ad73992ff2b2bd7fc25509_10_0.png)\n\
    \n某些植物原料（如檀香）必须长到一定的年限，才能用于提取精油。如檀香树生长 36 年，高度达到 30 尺时才能砍倒用于蒸馏精油。\n\n在人类历史发展中，许多精油原料（以下简称为香料）是可以与黄金相提并论的贵重物资。在《圣经》中曾记载着乳香和没药的故事：\n\
    \n当耶稣刚刚降生的时候，有 3 个东方博士来到耶路撒冷，询问希律王刚刚出生的当犹太人之王的小孩在哪里，并说他们看见了他的星，特来拜见。希律王打听过后告诉他们说，就在犹太的伯利恒。3\
    \ 位博士就按希律王的话去了，在东方看见的那星，忽然就在他们前方行走，一直行走到小孩出生的地方。他们看见那星，非常高兴，进了房子，看见了刚出生的耶稣和他的父亲约瑟、母亲玛利亚，于是向耶稣俯伏拜见，揭开宝盒，拿出黄金、没药和乳香作为礼物献给他。\n\
    \n![三位博士前来拜见刚刚出世的耶稣](img/9a4032e2e8ad73992ff2b2bd7fc25509_10_0.png)\n\n“物以稀为贵”，在栽培技术和运输条件都不发达的古代，香料昂贵的价格逐渐在商品贸易中显现出来。为了争夺香料，不知多少人发动了战争，并在带有血腥味的胜利后，拉着香料举国欢庆。在香料的背后，有战争、争夺、屠杀，有长途跋涉、背井离乡……所以有人说香料有一种危险的味道。在最初的香料贸易中，有两条路线起着重要作用：印度洋航线和丝绸之路。\n\
    \n早期的香料贸易是经由印度洋航线进行的，这条海上航线的开辟，大大便利了各国的贸易往来。海员们可以从埃及出发到达印度，而欧洲和印度洋海陆之间也可以直接进行贸易交流。早期，许多香料，如产于中国的生姜、远东的肉桂和桂皮，就是通过这条航线进行贸易的，在公元前就传到了地中海地区。然而，海上航行相当危险，触礁、沉船是经常发生的事情，许多船员在做着香料美梦的同时葬身于海底……\n\
    \n![早期的海上航行](img/9a4032e2e8ad73992ff2b2bd7fc25509_11_0.png)\n\n海上路线的危险性，让人们不得不寻找新的贸易路线。伊朗陆路，就是我们所说的“丝绸之路”是另一条重要的贸易通道。骆驼队在这条道路上通常要走上好几个月，所以只有非常贵重的产品才能支付这么庞大的运输费用。当然，在丝绸之路上交易的货物不仅仅是丝绸，很多地方香料通过这条路线的开通，逐渐走向了世界，在世界各地得到了普及，其中包括大黄、甘草和麝香。\n\
    \n![“丝绸之路\"上前行的骆驼队](img/9a4032e2e8ad73992ff2b2bd7fc25509_12_0.png)\n\n大多数人使用精油是因为它们的治疗功效或仅仅是它们的香气，但也有人对精油具有的化学性质有兴趣，想了解它们的化学成份。知道构成精油的天然化学成份是件让人感兴趣的事情。不过令人惭愧的是，即使人们尽了最大的努力，在实验室按正确的比例合成的精油却仍然无法与天然精油相比拟。\n\
    \n## （五）植物精油的成份\n\n精油，就像其他有机成份一样，是由碳水化合物分子构成的，可以进一步分为萜烯 [萜（烃）]、乙醇、酯、醛、酮和苯酚等。每种单一精油一般都由数百种成份构成。精油种类不同，构建成份的种类也多种多样。当用色谱仪分析精油时，可以发现各种各样的有机成份。其主要成份如下：\n\
    \n### 1. 萜烯碳氢化合物\n\n#### 单萜\n\n**【基本情况】**\n\n几乎所有的精油都含有这些单萜化合物，单萜化合物由 10 个碳原子构成，含有一个以上的双键，这\
    \ 10 个碳原子是从两个异戊间二烯演变来的。\n\n萜烯的通式为 (C5H8)n，其中 n = 2，分子式为 C10H16 的萜烯称为单萜烯。以两个异戊二烯单位“头尾”相连接而成的\
    \ 2，6 - 二甲基辛烷为基本骨架。可分为：1）链状单萜烯类，如月桂烯、柠檬醛；2）单环单萜烯类如薄荷醇、柠檬烯等；3）双环单萜烯类，如龙……（原文此处截断）"
  mdcn: "# 一、植物精油养生的内涵\n\n植物精油养生，是一种以预防、保健及调理为主的自然整体疗法，它是利用不同功效的植物精油 (Essential oil)，通过专业人士针对性的特殊调配，采用相应的方式，比如香熏、按摩，在身体不排斥的状态下吸收，最终使影响人们身体、精神健康的一些不适状况得到改善，从而达到身心健康的目的。同时，它也是一门使用植物治疗和预防疾病的科学和艺术。\n\
    \n# 二、植物精油养生的特征\n\n植物精油养生的最大特征就是在改善身体，甚至皮肤状况时，着重于“心理”的调整和改善。植物精油养生的前身是药草学，药草学可以说是人类历史上最古老的防病治病及调养身体的基本方法。在精油蒸馏技术尚未出现前，几千年来，人们一直重视采用能萃取精油的植物作为药材以预防和改善患者的病情。可以说，植物精油养生吸收了东方医学“身心一致”的思想，是中国医学与印度医学理论融合的一种表现。\n\
    \n# 三、植物精油养生的应用现状\n\n植物精油作为一种医学辅助治疗的手段，起源于 20 世纪 40 年代的法国，随后在英国、德国和美国得到迅速的发展，人们称之为芳香疗法（Aromatherapy）。\n\
    \n在法国，芳香疗法已成为现代医学疗法的一个分支领域，药剂师会根据医生的诊断，调配出适宜的精油处方对患者的疾病进行治疗。\n\n在英国，芳香疗法的运用不同于法国，英国人是将治疗的焦点集中在将调好的香熏精油应用于按摩疗法，通过两者的结合应用取得使患者放松的疗效。\n\
    \n在德国，人们将草药治疗与食品及饮食的调理相结合，由专业的自然疗法师及营养师进行临床针对性的治疗。\n\n在美国，有许多香熏治疗店及香熏日用专卖店，在一些高档的百货公司也有香熏产品专柜，品种十分丰富。美国人比较看重香熏的心理疗效，期望借此来消除日趋紧张的经济、社会及日常生活中所带来的心理负担和精神压力。\n\
    \n# 四、植物精油养生的发展趋势\n\n植物精油养生正广泛地应用于健康人群的保健、亚健康人群的调理以及疾病的辅助治疗等方面。\n\n首先，植物精油用于身体保健的效果日趋明显。精油的常用方法是调配成复方精油用于身体皮肤的按摩，一方面能够加强皮肤的排泄功能，促进皮肤释放出身体多余的热量、排出废物、毒素及多余的水分；另一方面精油可以在按摩的帮助下进入身体血液中，顺着血液进入身体的各个部分，改善及平衡各脏腑的功能，从而达到保健的作用。\n\
    \n其次，植物精油可用于美容保养。谈到美容，常不可避免地涉及皮肤衰老的问题。皮肤衰老虽然不可避免，但是利用精油在皮肤上的清洁、补水、促进细胞再生及排毒等功效，可以改善皮肤的灰暗状况，使皮肤变得柔软和细腻。另外，植物精油和基础油\
    \ (Base oil) 的杀菌作用在皮肤保养方面也发挥了重要的作用，比如在祛痘和预防脚气方面。所以，植物精油将在民间疗法、自然疗法、美容方面占有一席之地，并发挥其独特的功效。\n\
    \n此书力求兼顾科学与实用两点，希望这本书能为一些美容机构、高校学生以及所有想要留住健康、美丽的人士提供一些借鉴。由于编者水平有限，书中错误与纰漏在所难免，恳请广大读者和同行们批评指正。\n\
    \n本书在编写过程中得到了北京农学院于九龄、宋懿、蔡晨瑶、康静、高湃、李晔等同学的友情帮助，在此，对以上同学为本书编写作出的贡献表示衷心的感谢！\n\n编者\n\
