    # ### 4. 振动类手法


    以较高频率的节律性轻重交替刺激，持续作用于人体，称为振动类手法。


    (1) 抖法


    用双手握住肢体远端做上下连续抖动，使关节肌肉产生松动感的手法。具有松解粘连、滑利关节等作用。常与搓法配合使用。


    操作要点:


    1) 抖上肢第 1 式法。宾客取坐位或站立位，保健按摩师放松其肩臂。


