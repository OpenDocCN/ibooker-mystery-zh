    # ## 1. 脚踝肿胀


    脚踝肿胀的原因很多，包括关节炎、风湿病、静脉曲张、高血压。把脚放在高处休息，是最有效的治疗方法之一。


    多喝水，用下面配方的按摩油，按摩脚到膝盖间的部位：15滴茴香精油、15滴丝柏精油稀释在30mL的月见草油中。


    # ## 2. 腰痛


    腰痛是腰部脊骨地方的严重疼痛，在背部稍低的位置。它是使用不正确的姿势搬举重东西引起的，或是一个不正确的姿势扭伤了脊骨。


    卧床休息，热敷和按摩是缓解疼痛和压力的有效方法。躺在有软垫的床上休息几天，窝着膝盖，可以让腰部得到更好的休息。


    在盆浴时，添加3滴迷迭香精油或牛至属植物精油或百里香精油，可以放松地长时间浸泡在里面。也可以用按摩油在做腰部靠下的地方按摩，直到臀部上端，但是要离开肛门的位置，因为按摩油对敏感的黏膜组织可能会有刺激作用。


    事先把下列油混合在一起：3滴迷迭香精油、1滴尤加利精油、2滴椒样薄荷精油、2滴洋甘菊精油、1滴小豆蔻精油、10mL月见草油。'
