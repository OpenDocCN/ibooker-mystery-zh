    ## 3. 松树和松针精油

    松树和松针精油，简称松树精油，是从松树（Pinus sylvestris）分泌的油脂中提取的，属于松科，又称为苏格兰松和森林松。


    尽管松树精油能引起过敏反应，但它对缓解精神、身体和性生活的疲劳非常有效，还可以用于清洁房间空气。甚至还可以用于治疗膀胱炎、肝炎和前列腺问题以及促进循环，缓解关节炎、痛风、坐骨神经痛和风湿病。但要小心使用，因为它有光敏性反应。


    ### (1) 精油性质

    松树精油有种清新的森林味道，颜色淡黄，水质黏性。


    ### (2) 来源

    这种常绿树可以长到40m高，树冠扁平，具有深裂缝的树皮微红或褐色，对生叶片针状、灰绿色，开橘黄色的花，果实褐色、圆锥形。它被广泛地栽培，以提供木料、柏油、树脂、松脂和精油，美洲土著人用它预防坏血病。床垫里填充松针有驱避虱子和跳蚤的作用。古代埃及人在烹饪中会用到松子。


    ### (3) 提取方法

    松树精油是以松树嫩枝和芽为原料的，采用蒸汽蒸馏法提取，出油率在0.1%~0.05%之间。


    ### (4) 化学成份

    龙脑、醋酸冰片酯、松萜、蒎烯和δ-3-萜烯。


    ### (5) 治疗功效

    1) 松树精油对缓解精神、身体和性生活的疲劳非常有效，还可以使空气清洁，令人感到精力充沛。

    2) 在病人的房间做蒸汽疗法，效果很好，可以促进病人的康复。

    3) 可以用它治疗割伤、疥疮，缓解疼痛和排汗过多，驱避虱子。

    4) 利用它有温暖的特性，可以治疗风湿病、关节炎、痛风和肌肉酸痛，它也可以刺激循环。

    5) 它对支气管炎、哮喘、黏膜炎、咳嗽、喉炎、感冒和流感也有疗效。还可以缓解呼吸困难和鼻窦炎。

    6) 作为一种肾脏清洁剂，它有助于治疗膀胱炎、前列腺问题和尿路感染，对神经疲劳、神经痛和精神疲劳也有疗效。


    ### (6) 使用注意事项

    尽管松树和松针精油都被认为在低剂量使用时，是无毒和无刺激的，但在皮肤上使用还是要谨慎，因为在大剂量使用时容易引起刺激，对皮肤有光敏性反应。从矮松树（Pinus
    mugo var. pumilio）提取的精油对皮肤有过敏性和光敏性反应。如果你有皮肤过敏史或在孕期，最好不要使用这种精油。


    ### (7) 用法

    松树精油可以用于治疗呼吸系统疾病、肌肉酸痛和作为一种尿路清洁剂。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，松树精油可以用于治疗哮喘、感冒、鼻窦炎、咳嗽（包括吸烟咳嗽），能缓解睡意和宿醉。


    2) 做面霜或洗液的成份

    用做面霜或洗液的成份时，松树精油可以治疗哮喘、感冒、咳嗽、感染、关节炎和风湿病，还可以分解脂肪团，缓解宿醉。在使用松树精油的时候，要小心，因为这种油会刺激皮肤和黏膜。


    (8) 适合与松树精油混用的精油

    柏木、桉树、薰衣草、绿花白千层、迷迭香和鼠尾草精油。


    ## 4. 檀香精油

    檀香精油是从檀香植物（Santalum album）中提取，属于檀香科，又称为东印度檀香。


    这种精油价格昂贵，但它对胸腔和尿路感染疗效显著；有助于皮肤的保湿；有镇静和协调的功效，可缓解紧张和混乱的思绪。


    ### (1) 精油性质

    这种精油有股木头般的异国情调香味，它的气味细腻，散发速度缓慢。它的颜色淡黄或浅金黄色。檀香精油含有90%檀香脑或白檀油烯醇，是一种高级的檀香精油。


    ### (2) 来源

    檀香是一种常绿的寄生树，它的根系扎入其他树内来吸收营养。它可以长到9m高，树干浅灰色，分枝多、光滑、柔软，叶片革质化，花小、粉红色。一棵树要生长30～60年才能完全成熟。当它被砍伐后，或用于蒸馏，或把这种黄色的木头砍成木屑销售。对这种木料的使用可追溯到4000年以前，从印度出发的沙漠大篷车把这种木料带到了埃及、希腊和罗马，许多寺庙的建造都用到了这种木料，埃及人则用这种精油给尸体防腐。


    檀香因其香味卓越而需求量较大。在沉思过程中，它可以起到镇静的作用。练瑜伽术者介绍，檀香气味和瑜伽的结合可以唤起性的力量。


    檀香木曾用于制作家具和橱柜，但当这种植物濒临绝迹时，它就只用于提取精油了。由于植物资源的匮乏，这种精油主要在印度生产，是市场上最贵重的精油之一。市场上在提供纯精油的同时，也提供一种更能让消费者接受的复方油，檀香精油的含量为25%。


    ### (3) 提取方法

    檀香精油是从檀香木的心材碎片为原料，采用蒸汽蒸馏法，产油率为4%～6.5%。


    ### (4) 化学成份

    檀香脑或白檀油烯醇、醋酸水杨酸檀香酯和檀香烯。


    ### (5) 治疗功效

    1) 这是一种放松性质的精油，具有协调和镇静的功效，能够缓解紧张和混乱的心理状态。它可以用在沮丧、兴奋过度、恐怖、压抑、神经紧张、慢性病和忧虑方面，有很理想的治疗效果。

    2) 它非常有利于治疗胸腔方面的疾病。在治疗肺部和泌尿生殖器黏膜疾病时，有卓越的疗效，还可用于尿路系统疾病的治疗。胸腔慢性感染性疾病、咽喉疼痛和干咳、支气管炎、哮喘也可以从檀香精油获益。它还有助于解决性方面的问题，包括性冷淡和阳痿。

    3) 在对皮肤利用方面，檀香精油可以缓解皮肤的瘙痒和感染，对有脱水现象的皮肤很有效果，还能淡化老年斑。它所具有的收敛性对皮肤有很好的护理效果，也适用于油性皮肤，能预防皮肤形成难看的伤疤，抵抗干性湿疹。


    ### (6) 使用注意事项

    它被认为是无毒、无刺激和无光敏性的精油。


    ### (7) 用法

    檀香精油有助于治疗神经系统疾病、胸腔和尿路感染和性问题，对皮肤护理也有效果。


    1) 香炉和蒸发器熏香。

    在蒸汽疗法中，檀香精油有催情的作用，可以用于治疗支气管炎、咳嗽、胸腔感染、哮喘、失眠、兴奋、神经紧张、焦虑和压抑，也用于驱虫。同时还可以创造一种轻松的氛围。


    2) 做复方按摩油或稀释在浴盆中使用。

    檀香精油做复方按摩油或稀释在浴盆中使用，有助于治疗膀胱炎、胸腔感染和支气管炎、咳嗽、干湿疹、失眠、抵御压力、淡化伤疤、缓解兴奋、神经紧张，还可以用于催情和放松。


    3) 做漱口剂的成份。

    把它稀释在漱口剂中，用于治疗咽喉干疼非常有效。


    4) 做面霜或润肤乳的成份。

    当用作面霜或润肤乳的成份时，檀香精油适用于有裂缝、干性或发炎的皮肤，有很好的保湿作用，可以预防老年斑的形成。当用于油性皮肤时，它的护理效果良好。


    (8) 适合与檀香精油混用的精油

    佛手柑、黑胡椒、天竺葵、薰衣草、没药、玫瑰、香根草和依兰精油。白檀精油有调气的功能，能引导芳香之气到达最高的部位，尤其适合同橙、橘之类的精油混用。


    ## （八）根系类精油


    ### 1. 圆当归精油

    圆当归精油是从圆当归植物（Angelica archangelica）中提取，属于伞形科。它具有甜草药气味、略带辛辣味，又称欧当归。


    #### (1) 精油性质

    圆当归精油具有中等的黏性，从植物根状茎、种子以及全株植物提取。


    #### (2) 来源

    据说，这种植物起源于非洲，在 16 世纪引入欧洲。也有人认为，它是欧洲北部和东部的乡土树种，在亚洲和前苏联地区也有分布，甚至在芬兰、荷兰、拉普兰、德国都有这种植物。之所以称其为圆当归，是因为它一般在5月8日开花，而这天正是天使迈克尔的大天使节。因此，修道院内外广泛种植圆当归植物，作为“天使之草”。


    它还是著名的利口酒——查特酒（法国查特修道院僧侣们酿制的黄绿色甜酒）和本笃会甜酒的制作原料之一。当黑色瘟疫席卷欧洲的时候，这种植物曾被当作一种解毒剂。当1665年伦敦发生瘟疫时，“圆当归水”被医学院出版的刊物进行宣传，还被皇家处方所收录。


    圆当归也被用于有香味的杜松子酒、香水的制作材料中，还是传统糖果的制作原料。


    它是一种大型的喜湿草药，宽大、尖形的叶片由许多较小的小叶构成，花小，白绿色。它有强烈的芳香气味和巨大的根状茎。


    #### (3) 提取方法

    采用水蒸气蒸馏法从根、根状茎和种子提取精油。


    #### (4) 化学组成

    松萜或蒎烯、茨烯、桧烯、水芹烯、月桂烯、柠檬油精、罗勒烯、异丙基甲苯或百里香素、莰品油烯或异松油烯、醋酸冰片酯、莰品烯或松油烯、隐酮、没药烯、氧化绿草烯、十五（烷酸）内酯。


    #### (5) 治疗功效

    圆当归精油有助于治疗皮肤缺少光泽、情绪愤怒、牛皮癣、毒素积累、关节炎、痛风、风湿病、水肿、支气管炎、咳嗽、贫血症、厌食症、肠胃胀气、消化不良、疲劳、偏头痛、神经紧张和因压力过大导致的失调。


    #### (6) 使用注意事项

    圆当归精油能过度刺激神经系统。从根系提取出的圆当归精油会产生光敏性。如果在皮肤上使用后暴露在阳光下，会发生过敏反应。怀孕期间的安全性还没有确定，糖尿病人不适合使用。


    #### (7) 用法

    这种精油通过改善淋巴循环系统的状态，来促进体格强健的功效是巨大的。它常常是身体的解毒剂。它也对呼吸系统疾病有良好的疗效，能帮助解决肠胃问题，包括肠胃胀气、消化不良、恶心、不舒服和消化不良。


    1) 火炉熏香和蒸馏香气

    在蒸汽疗法中，圆当归精油可以用来洁净肺脏，以缓解支气管炎、肋膜炎（胸膜炎）、平缓呼吸急促和哮喘。


    2) 复方按摩油和洗浴

    圆当归精油可以用来制作复方精油或在洗浴中使用，对淋巴循环系统有意义，能消除放射性污染，有助于消化，能缓解感冒和流感，抗真菌。


    3) 混入面霜或润肤乳中

    做面霜或润肤乳的成份，圆当归精油有益于循环系统、关节炎、痛风、坐骨神经痛、感冒和流感，还能刺激雌激素的分泌。能调节月经期和减轻经痛。


    (8) 适合与圆当归精油混用的精油

    罗勒、黄春菊、天竺葵、葡萄柚、薰衣草、柠檬、中国柑橘和广藿香精油。


    ### 2. 广藿香精油

    广藿香精油是从广藿香植物（Pogostemon cablin、Pogostemon patchouli）中提取的，属于唇形科。


    它对皮肤护理的作用是不可低估的。它也可以缓解压抑和焦虑，有很强的利尿功效，可以分解脂肪团，刺激皮肤细胞再生，加快伤口的愈合速度，预防形成难看的伤疤。


    #### (1) 精油性质

    广藿香精油有丰富的甜麝香味道，辛辣味强，暗含草味，颜色淡黄到暗褐色，黏稠状。


    #### (2) 来源

    它是一种多年生的灌木，可以长到 1m 高，茎方形、坚挺，多毛，叶片披毛、芳香，大约 4 寸长 5 寸宽，花白色或紫色。这种植物原产于菲律宾、马来西亚和印度，在那里，人们称其为
    puchaput。而 patchouli 这个单词是从印度语 patch 演变来的，意思是“绿色”，而 ilai 的意思是“叶片”。现在全世界热带和亚热带地区都有种植。它的梗、叶一年可采两次。


    在维多利亚女王时代，它被放在运往英国的印度产的开司米羊绒披肩上，以预防货物被虫蛀。如果没有这种驱避蛀虫的广藿香干叶片，这样的货物是无法运到英国的。在东方，它在肉烩菜时用作调味品，还可以用它制作香袋，或放在亚麻布中驱避臭虫。广藿香精油和樟脑一起用在印度墨水中，以创造一种特别的香味。我国主要栽培区是海南岛万宁县、陵水县、湛江地区。


    #### (3) 提取方法

    广藿香精油是以嫩叶为原料的，在蒸汽蒸馏前，先把原料干燥和发酵，出油率在 1.4% ~ 1.8%。这样提取的精油气味浓郁，使用后会显得年轻。广藿香亩产鲜草 750kg，干燥后约为
    300kg。


    #### (4) 化学成份

    绿叶烯、愈创木烯、石竹（萜）烯。


    #### (5) 治疗功效

    1) 广藿香精油对情绪有平衡和安抚的效果，可以振奋精神，消除压抑和焦虑的症状。它可以营造一种适合谈情说爱的环境。

    2) 它可以有效地治疗真菌和细菌感染，对蚊虫既能治疗叮咬，也能驱避蚊虫。还能缓解物质过敏症。它有很好的利尿功效，可以排除体内多余水分，分解脂肪团，缓解便秘，减轻体重。此外，它有很强的除臭作用，有助于缓解燥热的情绪，降低炎症，促进伤口愈合。

    3) 这种精油属于对皮肤最有疗效的精油之一，有着极好的组织再生能力，可以帮助刺激皮肤新细胞的生长。在治疗伤口方面，它不仅可以促进愈合，而且可以预防伤疤的形成。广藿香精油对皮肤龟裂、粗糙和过多脱水都有疗效，还可以治疗痤疮、湿疹、溃疡和其他真菌性感染，以及头皮养分的失调。

    4) 广藿香在亚洲草医中最普通的应用是作为春药。


    #### (6) 使用注意事项

    它是无毒、无刺激和过敏性的，但是有些人可能不喜欢广藿香的气味，大剂量使用会影响到有些人的食欲。


    #### (7) 用法

    广藿香精油对皮肤有积极的效果，可以治疗感染和蚊虫叮咬，缓解因压力过大引起的情绪问题，以及过瘾症。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，广藿香精油可以用于缓解焦虑和压抑，同时还可以创造一种浪漫的氛围。也用于驱虫。


    2) 做复方按摩油或稀释在浴盆中使用

    广藿香精油做复方按摩油或稀释在浴盆中使用，可以抵御压力，护理皮肤，淡化伤疤，治疗真菌感染，调节体内液体平衡，帮助分解脂肪团，减轻体重，缓解便秘，消除皮炎。


    3) 纯精油的使用

    可以用棉签蘸些精油涂抹在蚊虫叮咬处。


    4) 做面霜或润肤乳的成份

    用作面霜或润肤乳的成份时，广藿香精油可以作为一般的皮肤护理品，因为它有促进组织再生的作用，有使皮肤返老还童的功效，还可以刺激皮肤新细胞的生成，预防感染。加速伤口的愈合，预防伤口形成难看的伤疤；能治疗痤疮、湿疹、流脓的伤口、溃疡、愈合缓慢、头皮失调，以及其他真菌感染，如脚气。


    (8) 适合与广藿香精油混用的精油

    佛手柑、鼠尾草、天竺葵、薰衣草和没药精油。


    ### 3. 香根草精油

    香根草精油是从香根草植物（Vetiveria zizanoides、Andropogon muricatus）中提取的，属禾本科，香根草的别名为岩兰草。


    这种精油对情绪和身体都有很好的功效，能够缓解过度兴奋、生气和歇斯底里的精神状态，对荷尔蒙分泌系统有平衡的作用。对皮肤的使用效果也不错，可以淡化皱纹，收敛松弛的皮肤，还能滋养和保湿皮肤，帮助伤口愈合。


    #### (1) 精油性质

    它有股泥土般的发霉气味，很像潮湿森林中土地散发出的气味，颜色琥珀色或橄榄绿色。


    #### (2) 来源

    香根草是一种高大的成穗状的多年生香草植物，叶片细长，地下根系为白色、多分支、成复杂的花边状。它主要栽培在热带地区，如印度、塔希提岛、爪哇和海地。在加尔各答（印度东北部的港口城市）和海地，这种草被用于搭建茅草屋和做雨篷、遮阳伞；在爪哇，人们是用它的根系编织席子和搭建茅草屋，它不仅能给房间带来优雅的香味，还能驱避昆虫。它是肥皂、化妆品和香水常用的成份，种植这种草还可以预防土壤受到侵蚀。


    香根草精油又被称为“宁静之油”，因为它有很好的镇静功效。


    #### (3) 提取方法

    它是以根系（包括侧根）为原料的，原料的处理程序有清洗、剁碎、晾干和浸泡。采用蒸汽蒸馏法提取，出油率约 0.5%。


    #### (4) 化学成份

    安息香酸、岩兰草醇或香根草醇、糠醛、岩兰酮、岩兰烯。


    #### (5) 治疗功效

    香根草精油能镇静和抚慰神经系统，有助于缓解生气、不正常的兴奋和易怒的情绪，还能缓和神经质般的举动，对缓解压力和紧张心情也有好处。它能促进身体的新陈代谢，帮助缓解精神和身体的疲倦感，对于减轻疼痛也有作用，尤其是风湿病、关节炎和肌肉的疼痛。另外，对治疗失眠症也有益处。


    #### (6) 使用注意事项

    它被认为是一种安全的精油，无毒、无刺激性和光敏性。

    香根草精油的主要治疗功效有防腐杀菌、壮阳（催情）、镇定神经、镇静止痛、滋补和医治创伤。


    #### (7) 用法

    香根草精油对神经系统具有镇静和安抚的效果，能缓解肌肉的疼痛，对调节荷尔蒙平衡和治疗失眠都有积极的疗效。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，香根草精油可以用于治疗神经方面的疾病，能缓解歇斯底里、生气和易怒的情绪，还能治疗失眠症。


    2) 做复方按摩油或稀释在浴盆中使用

    香根草精油做复方按摩油或稀释在浴盆中使用，能有助于解除精神和身体方面的疲劳，治疗神经系统方面的疾病，缓解关节炎和风湿病的疼痛，治疗失眠和平衡荷尔蒙系统，对皮肤也有治疗效果。


    3) 做面霜或润肤乳的成份

    用于面霜或润肤乳的成份时，香根草精油对皮肤有保湿和滋养的作用，尤其适合干性、敏感和脱水性的皮肤。它还有助于淡化皱纹和斑痕，收敛肌肤，帮助伤口愈合。


    (8) 适合与香根草精油混用的精油

    安息香、葡萄柚、茉莉、薰衣草和依兰精油。


    ### 4. 甘松精油

    甘松精油是从甘松植物（Nardostachys jatamansi）中提取的，又称为“假”印度颉草根。


    #### (1) 精油性质

    甘松精油有着温和、薄雾般的、阴沉气味，颜色淡黄，中等黏性。


    #### (2) 来源

    甘松是一种柔弱的芳香草本植物，具有芬芳的根状茎，原产于北印度山区、中国和日'
  mdcn: '- 疹、皮炎、毛孔堵塞、牛皮癣和其他的皮肤症状。


    4) 做外敷材料

    杜松精油可以稀释后用于外敷材料中，治疗关节炎、湿疹和一般感染。


    - (8) 适合与杜松精油混用的精油

    柏木、丝柏、天竺葵、葡萄柚、薰衣草、佛手柑、酸柠檬、香根草、鼠尾草和柠檬香茅精油。


