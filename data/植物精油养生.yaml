    ## （四）樟脑味类精油


    ### 1. 白千层精油

    白千层精油是从白千层树（Melaleuca cajuputi）中提取的，属于桃金娘科，又称白茶树、哭茶树。这种精油在治疗消化、皮肤问题和帮助精神平衡方面，具有明显的疗效。它还使精神振奋，驱逐呆滞的感觉。


    #### (1) 精油性质

    白千层精油具有相当刺激的甜味。


    #### (2) 来源

    白千层树又称白茶树，原产于马来半岛沿岸的平原。它是一种生长旺盛的常绿树，高可达 30m，树皮发白、柔软，多孔像海绵，树干弯曲。在古印度，被人们称为卡亚菩提，甚至在东方，也受到人们的尊敬，因为它有神奇的功效。不仅能用来做化妆品和香水，而且具有杀菌防腐的效用，还是治疗胃病的传统良药，对霍乱、风湿病均有疗效。人们也用它作杀虫剂。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_83_0.png)

    白千层 Melaleuca cajuputi


    #### (3) 提取方法

    白千层精油是从新鲜叶片和嫩梢提取的，采用蒸汽蒸馏法。


    #### (4) 化学成份

    白千层精油的主要化学成份为α-松萜（蒎烯）、β-松萜（蒎烯）、月桂烯、柠檬油精、1，8-桉树脑、γ-不旋松油精、p-甲基异丙基苯、萜品油烯（异松油烯）、芳樟醇（沉香醇，芳樟醇）、萜品烯或松油烯、α-萜品醇、松油醇。


    #### (5) 治疗功效

    1）通过促进发汗，白千层精油可以使身体降温，有助于感染的康复，如感冒、喉炎和支气管炎，对哮喘、窦炎和咽喉疼痛也有疗效。

    2）能缓解消化系统的不适，缓解绞痛、肠炎、痢疾、呕吐、痉挛、关节炎、风湿病和肌肉疼痛。


    #### （6）使用注意事项

    白千层精油没有毒性，没有光敏性，但高浓度使用时，会刺激皮肤和黏膜组织。


    #### （7）用法

    白千层精油的最大疗效体现在对呼吸系统、泌尿系统消炎方面，如因感冒、支气管炎、喉炎引起的感染，另外，还具有缓解疼痛的功效，比如头痛、耳朵痛、牙痛、痛风和风湿病。


    #### （8）适合与白千层混用的精油

    圆当归、佛手柑、丁香、天竺葵、薰衣草和百里香精油。


    - 白千层精油可以在蒸汽疗法中使用，用于治疗呼吸系统疾病，缓解感染和疼痛。还有助于清除杂念和驱逐呆滞的感觉。

    - 有助于缓解疼痛，对痛风、风湿病、关节炎的疼痛有效。它止痉挛的功效可以在治疗疼痛期间发挥作用。还可以延迟月经和缓解月经疼痛。

    - 在盆浴中添加白千层精油，可以创造一种冷凉的环境，起到降温的作用，但要小心刺激到黏膜。

    - 用做面霜成份时，它能治疗粉刺和牛皮癣。用于其他成品的配方成份时，有助于治疗长期慢性疾病，如痤疮等。


    ## 绿花白千层精油

    - 绿花白千层精油是从绿花白千层植物（Melaleuca viridiflora、Melaleuca quinquenervia）中提取的，属于桃金娘科。它具有显著的防腐和激励功效，被广泛地用于治疗感染症，如支气管炎、黏膜炎、窦炎以及痤疮、疖子、烧伤、溃疡和割伤。

    - 绿化白千层精油味道清新、略甜，它的颜色从无色到淡黄色和绿色。

    - 这种巨大的常绿树木，原产于澳大利亚、新苏格兰和法国的太平洋岛屿，树干柔软，树皮多孔、有弹性，叶片尖角线形、微黄色花穗状、无花柄。因为大量落叶覆盖在地面上，所以有很强的消毒作用，它可以创造一种有益于健康的环境，所以也用它净化水。据记载，它的植物学名称最早是在
    1788 年出现在库克船长的航海日记里，据历史记载，因为它有防腐杀菌的功效，在法国医院产科使用过。目前，它仍是牙膏和口腔清新剂中受欢迎的成份。


    ### (3) 提取方法

    绿花白千层精油是以嫩叶和嫩枝为原料的，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    桉树脑、松油精或萜品烯、柠檬油精、水芹烯、松萜或蒎烯、芳樟醇和薄荷酮。


    ### (5) 治疗功效

    绿花白千层精油有助于提高注意力，使头脑保持清醒，还能激发灵感。因为它有很好的防腐杀菌功效，可以有效治疗感染的症状，如感冒、发烧、流感、胸腔炎症、支气管炎、肺结核、肺炎、咳嗽、哮喘、鼻窦炎、咽喉炎、黏膜炎和喉炎。此外，也有助于治疗肠炎、痢疾、肠道寄生虫、膀胱炎和泌尿器官感染，还可缓解神经和风湿病的疼痛。作为一种抗感染剂，绿花白千层精油可用于清洗伤口，去除溃疡、痤疮、疖子、烧伤、割伤、蚊虫叮咬以及作为皮肤上使用的解充血药。


    ### (6) 使用注意事项

    绿花白千层精油被认为是一种安全的精油，没有毒性、刺激性和过敏性。


    ### (7) 用法

    绿花白千层精油最有价值的功效是抗感染，增强身体抵抗感染的能力，调理消化系统，护理皮肤上的感染。


    #### 1) 香炉和蒸发器熏香

    在蒸汽疗法中，绿花白千层精油可以使注意力集中，使大脑保持清醒，抗感染，调理消化系统和缓解疼痛。


    #### 2) 做复方按摩油或稀释在浴盆中使用

    绿花白千层精油做复方按摩油或稀释在浴盆中使用，可以用于治疗感染、缓解疼痛、调理消化系统和治疗皮肤感染。


    #### 3) 做面霜或润肤乳的成份

    当用做面霜或润肤乳的成份时，它最有利于治疗发炎问题，如痤疮、疖子、割伤和蚊虫叮咬。它也有助于治疗油性皮肤的充血问题。


    ### （8）适合与绿花白千层精油混用的精油

    芫荽、茴香、杜松、薰衣草、酸柠檬、松树和椒样薄荷精油。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_85_0.png)

    绿花白千层 Melaleuca viridiflora


    茶树精油是从茶树植物（Melaleuca alternifolia）中提取的，属于桃金娘科，是最常用的精油之一。它是提高身体免疫力最有效的精油之一，可治疗突发性病毒、细菌和真菌性感染，清洁伤口，缓解肌肉酸痛症状。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_86_0.png)

    茶树 Melaleuca alternifolia


    #### (1) 精油性质

    它的气味有些辛辣和刺鼻，颜色很淡，水质般黏性。


    #### (2) 来源

    它是一种小型树，起源于澳大利亚的新南威尔士，与丝柏相似，叶片针状，头状花序，没有花柄、黄色或略带紫色，可以长到 7m 高，在湿地生长旺盛，现在已有大面积栽培。这种精油只有澳大利亚生产，当地的土著居民用它治病已有很长时间了。在第二次世界大战期间，精油加工者和原材料供应者可以免服兵役，直到贮备有足够的茶树精油。每个士兵和水手都配给一些精油，随身带着，用于治疗热带感染和发炎的伤口。


    茶树精油可以用做肥皂、面霜、润肤乳、除臭剂、消毒剂和空气清新剂。


    #### (3) 提取方法

    它是以叶片和嫩梢为原料的，采用蒸汽蒸馏法提取，出油率约是 1.8%。


    #### (4) 化学成份

    松萜或蒎烯、桧烯、月桂（香叶）烯、水芹烯、松油精或萜品烯、柠檬油精、桉树脑、异丙基甲苯或百里香素、萜品油烯或异松油烯、芳樟醇、萜品烯或松油烯。


    #### (5) 治疗功效

    1）促进免疫系统的功能效果显著，因为它是一种免疫激活剂，能够提高身体抵抗感染的能力，还可以在休克后用于身体和大脑的恢复。

    2）对治疗某些感染具有很好的效果。它对受细菌、真菌和病毒 3 种微生物感染的器官有很好的疗效。

    3）除了具有极好的抗感染的功效外，它还有助于治疗支气管炎、哮喘、咳嗽、鼻窦炎、肺结核、流感、感冒、黏膜炎、腺体发炎和齿龈炎。在手术前用茶树精油按摩，可以增强体魄，降低术后发生休克的概率。

    4）在泌尿生殖系统方面，一般可以用它治疗阴道炎、膀胱炎和男性外生殖器感染。对于皮肤，可以治疗脓肿、痤疮、烧伤、疱疹、足癣、尿疹、晒斑和感染的伤口，适用于油性皮肤，还能减少头皮屑。


    #### （6）使用注意事项

    茶树精油被认为是一种安全的精油，没有毒性和刺激性，但也有人 对这种精油过敏，在使用时要注意。


    #### （7）用法

    茶树精油是刺激免疫系统效果最好的精油之一，能够治疗各种感染，还能用于清洁皮肤。


    ##### 1）香炉和蒸发器熏香

    在蒸汽疗法中，茶树精油有助于治疗感冒、鼻窦炎、支气管炎和其他呼吸系统疾病，在休克恢复期也有作用。


    ##### 2）做复方按摩油或稀释在浴盆中使用

    茶树精油做复方按摩油或稀释在浴盆中使用，可以用于治疗所有呼吸系统疾病以及关节炎、感冒、皮炎、皮肤感染、头皮失调、鼻窦炎、病毒感染、荨麻疹、婴儿感冒和咳嗽、支气管炎和汗脚。


    ##### 3）做化妆水的成份或直接使用精油

    当把它加入水中用于洁净身体时，有助于治疗脓肿、褥疮、痤疮、疖子创伤及动物造成咬伤，也可以用棉签蘸精油直接擦在患处。治疗虱子，可以在头皮上直接擦精油，保留 40
    分钟后，清洗头发，两天做一次，12 天为一个疗程。治疗真菌病，如足癣和指甲传染病（甲沟炎），以及阴道炎，可以经常使用 2.5% 的稀释茶树油，涂抹于患处。

    请记住，它是一种强劲的精油，在皮肤上直接使用纯精油时要小心。


    ##### 4）做漱口水的成份

    茶树精油可以作为漱口水的成份，用于治疗齿龈发炎、口腔溃疡、咽喉感染和扁桃腺炎。


    ##### 5）做面霜或润肤乳的成份

    当把茶树精油混入面霜或润肤乳中用于护理皮肤时，它有助于清洁真菌、细菌和病毒的感染以及治疗各种皮肤问题，包括疖子、脓肿、痤疮、动物和人类的咬伤（需要向医生咨询后使用）、头皮屑和其他头皮失调症。它对治疗褥疮、尿疹或其他疹子也有疗效。


    #### （8）适合与茶树精油混用的精油

    肉桂、快乐鼠尾草、丁香、天竺葵、薰衣草、柠檬、没药、肉豆蔻、花梨木、迷迭香和百里香精油。


    ## 4. 尤加利精油

    尤加利精油是从桉树（Eucalyptus globulus）中提取的，属于桃金娘科，又称为蓝桉。

    在芳香疗法中，这种精油有助于使头脑清新，集中注意力，减轻黏膜的肿胀程度。在治疗呼吸道问题、感染和肌肉酸痛，以及风湿病、头疼和精神疲惫方面，它也是非常有价值的。还可以促进伤口和溃疡愈合，抚慰出疹的皮肤。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_88_0.png)

    桉树 Eucalyptus globulus


    #### (1) 精油性质

    尤加利精油具有清新、强烈、新鲜和很有特色的气味，颜色淡黄，黏性水质。


    #### (2) 来源

    澳大利亚蓝桉有时候可以长到 100m 高，是世界最高树之一。桉树约有 500 多个品种，叶片细长、坚硬、蓝绿色，花色乳白色，树皮光滑、色淡。


    桉树的英文 Eucalyptus 中的 eu 和 kalypto，希腊文的解释是“好”和“隐藏”的意思，指形状像茶杯的一层膜盖在花芽上，当花开放的时候，它就会剥离开。澳大利亚土著民，称它为“吉纳紫檀”，他们用它的叶片盖在伤口上。尤加利精油是在
    1788 年引入欧洲的，首次出口到英国的精油被称为“悉尼椒样薄荷”，它是从一种桉树上提取的，这种桉树含有较多的可用于工业生产的


    #### (3) 提取方法

    尤加利精油是以新鲜或部分干燥的叶片，以及嫩梢为原料提取的。


    #### (4) 化学成份

    松萜或蒎烯、水芹烯、桉树脑、柠檬油精、萜品烯或松油烯、酸柠檬烯、薄荷酮和蓝桉醇。


    #### (5) 治疗功效

    1) 对身体有降温和除臭的作用，有助于治疗发烧、偏头痛和疟疾。

    2) 有助于治疗呼吸系统疾病，如咳嗽、哮喘、咽喉感染、窦炎和鼻黏膜炎。还可以消炎和减少分泌黏液，缓解因感冒和干草热引起的头闷。

    3) 可以当作暖油使用，对缓解肌肉疼痛、风湿性关节炎、扭伤均有疗效。

    4) 在护理皮肤方面，它可以用于治疗烧伤、水疱、疱疹、割伤、创伤、皮肤感染和蚊虫叮咬。此外，它还可以改善免疫系统，治疗鸡皮疙瘩、感冒、流感和麻疹。


    #### (6) 使用注意事项

    要小心地使用尤加利精油，患有高血压和癫痫症的人群要避免使用。过量使用尤加利精油可以造成头痛。


    #### (7) 用法

    当用于治疗头痛、发烧、呼吸道疾病、肌肉疼和皮肤护理方面时，尤加利精油非常有利用价值。它对整个身体有抚慰和镇静的效果，也有助于改善免疫系统，还对头脑有清醒和刺激的作用，可以帮助集中注意力。


    ##### （8）适合与尤加利精油混用的精油

    安息香、百里香、薰衣草、柠檬香茅和松树精油。


    ## 5. 月桂精油

    西印度月桂精油是从月桂树（Laurus nobilis）提取出来的，属于樟科月桂属植物，又称为甜月桂、月桂和地中海月桂。

    这种温和的精油经常在芳香疗法中应用，它对呼吸系统有良好的杀菌作用，能够恢复消化系统的功能，缓解胃疼痛和肠胃气胀；同时，能提高自信心，提升勇气和洞察力。不过，它最常用于减少头发脱落，促进头皮健康。


    #### （1）精油性质

    月桂精油的味道是甜的、清新的、略带辛味的，油色深黄，具有中等水黏性。


    #### （2）来源

    这种强健的常绿月桂树是西印度、委内瑞拉和圭亚那地区的乡土树种。如今，精油的提取大部分是在墨西哥、西班牙和克罗尼西亚进行。月桂树可以长到 30m 高，叶片长矛形，有香味，花白黄色，具黑色浆果。月桂油在罗马很盛行，被认为是智慧、和平和安全的象征。拉丁文
    Laudis 是称赞的意思，这就是为什么奥运会的胜利者会获赠月桂花冠的原因。


    过去，人们蒸馏月桂叶片制朗姆酒和月桂朗姆香水，这样得到的月桂朗姆香水是非常著名的头发滋补品，擦在身体上可以防寒和缓解肌肉疼痛。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_89_0.png)


    #### (3) 提取方法

    这种树至少要有 5 年以上，才能从树上收集叶片，然后用水蒸气蒸馏法（在蒸馏时，往往要加些咸盐或海水）提取，出油率一般在 0.5% ~ 1.5%。


    #### (4) 化学成份

    松萜或蒎烯、月桂烯、柠檬油精、芳樟醇、蒿脑、柠檬醛、萜品醇或松油醇、乙酸香叶酯、丁子香酚和胡椒酚。


    #### (5) 治疗功效

    月桂精油可以用来治疗风湿病、神经痛、肌肉痛、循环系统不畅、感冒、流感、牙龈发炎、皮肤感染、腹泻，对于头发再生和头皮保健也有益处。


    #### (6) 使用注意事项

    月桂精油含有高浓度的丁子香酚，这种成份可以引起皮肤和黏膜过敏，所以，在皮肤上使用时要小心，怀孕妇女最好不要用它。


    #### (7) 用法

    月桂精油能够平缓情绪，减轻疼痛，包括因风湿引起的疼痛。它对消化系统也有益处，可以清除体内过多气体，是肝脏和肾脏的滋补品。小量使用具有刺激效果，而量大时，就会产生镇静的作用。月桂精油对头发和头皮是有帮助的，所以常常在抑制脱发时使用。对于扭伤、过度疲劳和擦伤，也有一定的疗效。


    ##### 1) 香炉和蒸汽熏香

    在薰蒸疗法中，月桂精油常用来治疗感染、发烧和一般的疼痛。它还能促进产生灵感，安抚激动的情绪。


    ##### 2) 做复方按摩油或浴盆添加成份

    做复方按摩油或稀释在浴盆中使用，月桂精油能够安抚情绪，缓解疼痛，尤其是和玫瑰、刺柏混用时，效果更好。但要注意它对黏膜有损伤作用。


    #### （8）适合与月桂精油混用的精油

    雪松、芫荽、桉树、天竺葵、姜、刺柏、薰衣草、柠檬、柑橘、玫瑰、迷迭香、百里香和依兰精油。


    ## 6. 樟脑精油

    樟脑精油是从樟树（Cinnamomum Camphora、Laurus camphora）提取的，属于樟科。


    虽然这种精油稍有毒性，但在蒸汽疗法中，还是有很好功效的；可以用于清洁肺部、丰富感情、缓解神经压抑等方面。用于治疗心理疾病时，可以收到有益的效果。


    #### (1) 精油性质

    在真空状态下，经过蒸馏和精炼，精油被加压过滤出来，精油有 3 部分，分别是白色、黄色和褐色。仅白色的樟脑精油可以使用，它有清澈和新鲜的味道。褐色的和黄色的樟脑精油有毒和致癌性，因为它含有黄樟油精，不能在芳香疗法中使用。


    #### (2) 来源

    樟树可以长到 35m 高，树的每一部分都有活性成份。樟树原产于中国台湾、中国内地和日本，寿命长，能用于产油的树龄要在 50 年以上。

    在波斯（西南亚国家，现在的伊朗）时代，它是有名的治疗瘟疫的药物，还用于尸体的防腐。在中国，人们用樟树制造船只和庙宇，因为樟树木头耐用，还可以散发香味。


    #### (3) 提取方法

    樟脑精油是以樟树木屑、根系和枝条为原料，采用蒸汽蒸馏法提取，然后在真空状态下精炼，最后加压过滤而成的。


    #### (4) 化学成份

    松萜或蒎烯、茨烯、桧烯、水芹烯、柠檬油精、桉树脑、松油精或萜品烯、异丙基甲苯或百里香素、萜品油烯或异松油烯、糠醛、樟脑、芳樟醇、醋酸冰片酯、萜品烯或松油烯、石竹（蒎）烯、龙脑、薄荷酮、香叶醇、黄樟油精、肉桂醛、甲基肉桂酸和丁子香酚。

    褐色和黄色樟脑油含高浓度的黄樟精油成份，黄色的含有 10%~20%，褐色的含有 80%。这两种精油被认为是有毒的，可以致癌。


    #### (5) 治疗功效

    樟脑精油可以用于治疗精神压抑、粉刺、发炎、关节炎、肌肉疼痛、扭伤、风湿病、支气管炎、咳嗽、感冒、发烧和传染性疾病。

    由于这种精油有毒，决不能在芳香疗法中作按摩油的成份，但是可以在蒸汽疗法中使用，用于治疗呼吸疾病。在有些情况下，也可以做外用敷料。


    #### (6) 使用注意事项

    樟脑精油功效强劲，应该小心使用。决不能在芳香疗法中使用，被划归到惊厥剂和神经毒素一类。使用剂量过大能导致抽搐、呕吐，孕妇和患有癫痫症和哮喘的人不能使用。


    #### (7) 用法

    樟脑精油是一种平衡油，它既能安抚情绪，又能振奋精神。有助于治疗感情冷漠，又能缓和发火的情绪。对于驱避昆虫，如苍蝇和蛾类，很有效果。它对于治疗感冒、流感、'
