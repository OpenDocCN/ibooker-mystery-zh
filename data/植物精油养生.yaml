  md: '天2次。这种油会被皮肤快速吸收，但是如果需要的话，要用丝绵把过多的油擦掉。


    # ### 6. 护理干性和老化皮肤的复方油


    # #### （1）干性和老化皮肤的表现及原因


    最佳的皮肤健康要求，皮肤应该具有一定的保湿功能，可以分泌适量的润滑剂，以保持皮肤的紧实、有弹性和健康。当皮肤有减少湿润和润滑分泌物（油脂分泌减少）的趋势时，皮肤就会干燥，缺乏生命力，抗性将减弱。这种状况没有及时得到护理，皮肤就会逐渐丧失弹性，发生脱皮现象，在寒冷和干燥的气候尤其严重。


    干性肤质不仅让人感到不舒服，还很敏感，容易得皮肤病，也比正常状态的皮肤容易衰老。因为干性皮肤缺少保湿和润滑的补充物。


    # #### （2）适宜的配方


    一般适用于油性皮肤的配方不计其数，但是对干性的、易产生皮屑的和有皱纹的皮肤，真正起作用的药膏、香膏或润肤乳却寥寥无几。适宜的基础油包括荷荷芭油、甜杏仁油、鳄梨、纯的玫瑰果油。适宜的精油包括檀香、花梨木、乳香、茉莉、薰衣草。


    # #### （3）如何使用


    洗澡后，或是洗完脸后，把要抹油的地方很好地擦干，等1～2分钟，让洗浴后多余的水分从皮肤上蒸发掉。当皮肤彻底干爽后，在手掌上倒少量的油，双手撮，然后轻轻地擦在患处。这种复方油是容易被吸收的，会让你的皮肤感觉更柔顺。虽然我们的基础油有助于皮肤的保湿，但是精油全部功效需要两天以后才能发挥出来，它对皮肤更多的是起平衡作用。


    # ### 7. 肌肉和关节用复方油


    如果你正遭受肌肉酸疼和关节僵硬不灵活带来的痛苦，不论是什么原因，选择用于肌肉和关节的复方油可能正是能够缓解你疼痛的东西。这种复方油的穿透能力很强，并有温暖的作用，可以缓解尖锐和隐约的疼痛。


    适宜的基础油包括芦荟油、葡萄籽油。


    适宜的精油包括罗勒、甘草、迷迭香、椒样薄荷、黑胡椒以及百里香。


    肌肉和关节复方油使用方法是在患处涂抹少量复方油，然后轻轻地把油按摩进皮肤里，直到完全吸收。为了获得最大的使用效果，按摩结束后，可以想办法使患处保持温暖一段时间。'
