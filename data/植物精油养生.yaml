    胡萝卜的英文是从希腊单词“Carotos”演变来的，在古时候，人们认为它有很强的医用疗效，尤其是它的祛风效果显著。在现代应用中，癌症病人常常食用胡萝卜，尤其是胃和咽喉有问题的人。由于胡萝卜籽精油含有胡萝卜素和维生素A，对于皮肤、头发、齿龈和牙齿的健康都非常好，还有助于保持良好的视力。


    # (3) 提取方法


