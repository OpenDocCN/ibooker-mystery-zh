    # # （三）草类精油


    # ## 1. 椒样薄荷精油


    椒样薄荷精油是从薄荷植物中（Mentha piperita）提取的，属于唇形科，又称为欧薄荷。


    在芳香疗法中，这种凉爽和清新的精油能够刺激大脑，振奋精神和提升注意力；可以使皮肤感到凉爽，淡化皮肤的红色，缓解刺激和瘙痒。此外，有助于缓解结肠痉挛、偏头痛、鼻窦炎和胸口憋气，改善消化系统的功能。


    (1) 精油性质

    椒样薄荷精油有种清新、强烈的薄荷醇味；颜色清澈或浅黄，黏质性为水性。


    (2) 来源

    它原产于地中海地区，现在意大利、美国、日本和英国都有栽培。它是一种多年生植物，可以长到1m高，叶片锯齿状、披绒毛，花朵桃红色到紫红色，呈长圆锥形。它具有地下茎，可以用作繁殖材料，这种植物有许多品种，欧薄荷是水薄荷（M.
    aquatica）和荷兰薄荷（M. spicata）的杂交种。


    希腊神话中，有位美丽的少女明忒被冥王普路托所钟爱着，他的妻子珀尔塞福涅（宙斯之女，被冥王劫持娶作冥后）非常嫉妒，就残忍地把明忒埋到了地下，于是普路托就把她变成了这种植物。他知道，当人们看到这种植物的时候，就会想到明忒过几年还会回来的。


    从古时候开始，它在日本和中国就有栽培。在埃及坟墓里找到的证据表明，远在公元前1000年，人们就已经开始使用薄荷。


    (3) 提取方法

    椒样薄荷精油是从将要开花前收割的地上整株植物中提取的。这种油采用蒸汽蒸馏法提取，以新鲜或部分晒干的植物做原料，出油率在0.1%~1.0%。


    (4) 化学成份

    薄荷醇、薄荷酮、桉树脑、醋酸甲酯、甲基乙醇呋喃、柠檬油精、松萜或蒎烯、桧烯氢氧化物和蒲勒酮。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_59_0.png)'
  - '[PAGE 60]


    (5) 治疗功效

    1) 椒样薄荷精油对于精神疲劳和压抑有良好的效果，有提神、刺激思维敏捷和集中注意力的作用。它有助于治疗感情冷淡、担惊受怕、头疼、偏头疼、神经压抑、眩晕和虚弱症状，还能缓解呼吸系统失调的症状，包括干咳、鼻窦充血、哮喘、支气管炎、肺炎、肺结核和霍乱。

    2) 对于消化系统，椒样薄荷精油对于许多疾病都有疗效，包括刺激胆囊和促进胆汁分泌。它有助于治疗腹部绞痛、抽筋、消化不良、结肠痉挛、肠胃气胀和反胃恶心，还能缓解牙痛、脚痛、风湿病、神经痛、肌肉和月经痛。

    3) 可用于缓解皮肤刺激和瘙痒，也能帮助淡化皮肤红色，有消炎的作用。它可以治疗皮炎、痤疮、癣菌病、疥疮和瘙痒症，有预防晒伤的疗效，同时有清凉肌肤的作用。


    (6) 使用注意事项

    以低剂量使用薄荷精油是无毒和无刺激的。但是因为它含有薄荷醇的成份，所以要注意它的感光性。它对皮肤和黏膜会产生刺激作用，所以使用的时候要远离眼睛。在孕期要避免使用，不要给7岁以下的孩子使用。


    (7) 用法

    椒样薄荷精油有助于治疗神经系统失常，对刺激大脑和集中注意力有很强的功效，还可以用于治疗呼吸系统感染、肌肉疼和一些皮肤方面的问题。


    1) 香炉和蒸发器熏香

    在蒸汽疗法中，椒样薄荷精油可以用于提高注意力，刺激大脑，缓解咳嗽、头疼、反胃，对于驱虫也有作用。


    2) 做复方按摩油或稀释在浴盆中使用

    椒样薄荷精油做复方按摩油或稀释在浴盆中使用，有助于治疗腹部绞痛、抽筋、后背疼痛、肠道感染、结肠痉挛、黏膜炎、大肠炎、循环不良、便秘、咳嗽、痢疾、脚部疲劳出汗、肠胃气胀、头疼、肌肉疼、神经痛、反胃、风湿病、精神疲劳。还可以治疗皮肤红肿、发痒以及其他的炎症。


    3) 用做漱口水成份

    含有椒样薄荷精油的漱口水可以改善口气，治疗齿龈发炎。


    4) 做面霜或润肤乳的成份

    当用做面霜或润肤乳的成份时，椒样薄荷精油可以缓解因太阳灼伤引起的刺痛感，缓解皮肤发炎和瘙痒症状，因有收缩血管的功效，可以降低皮肤的温度。


    (8) 适合与椒样薄荷精油混用的精油

    安息香、桉树、薰衣草、甜牛至、柠檬和迷迭香精油。'
