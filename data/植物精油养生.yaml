    \n（2）SPA的卫生\n\n因为SPA浴缸自身加热水，不是每次用完后都把水排干，水的卫生就应注意了。如果仅 是你个人使用的SPA浴缸，交叉感染的危险就被排除了，但当有朋友跟你一起使用时，你就要考虑用一些适合你使用的抗细菌和病毒的精油了。另外，水也应该有规律地排放干净。\n\
    \n（3）SPA的好处\n\n持续循环的水可以激发阴离子的产生，这对你的健康是有利的，来自旋转热水流的触摸是非常好的放松和减压的办法。如果你同时享受到了你喜爱的精油特有的芳香治疗功效时，那么，SPA的感受就会变得更加美好。\n\
    \n# 6. 坐浴\n\n坐浴尤其适用于治疗骨盆和生殖器的疾病。坐浴或是臀浴一般是在特制的澡盆中进行的，也可以在普通的澡盆中进行。在浴盆中额外添加些精油有助于提升坐浴的质量，但在坐浴之前，一定要确保精油与水充分混合，以预防精油刺激黏膜。当坐浴时，腹部以下和生殖器（男性）要泡在水中，但身体的上部和腿要露在水外，这种洗浴的特别之处是有助于促进血液流经骨盆。茶树油是坐浴时常用到的受人欢迎的精油，因为它有很好的功效。任何一种精油都可以添加，主要看你治疗什么。\n\
    \n+   - （1）坐热浴\n\n  坐热浴的水温可以控制在35~41℃，水面不要高过你的肚脐眼，有益于治疗痔疮、肌肉问题、睾丸疼、子宫痛等。\n- （2）坐冷浴\n\
    \n  在坐冷浴时，水深只需要几英寸，水温不要低于20℃，有益于治疗便秘、阳痿、炎症。\n- （3）冷热交替式的坐浴\n\n  你也可以采用冷热交替式的坐浴，你先热浴3~4分钟，然后再坐冷浴。当要结束冷热交替坐浴时，要以骨盆部位在冷浴的状态下结束，有益于治疗：腹部失调、充血、头疼、神经痛、踝骨肿胀等病症。坐浴的时间一般是20~30分钟，通常用加水的办法来维持水温。有些人喜欢用冰水来坐浴，但时间不要超过60秒。"
- md: "## （三）香熏\n\n### 1. 香熏\n\n由于精油具有各自的治疗功效，因此它们可以在熏香疗法中使用。蒸发精油的过程是强迫芳香分子在空气中传播的过程，我们可以从两方面获益：一方面是通过我们的嗅觉感应器，是一种嗅觉球形物，能激活我们的边缘系统；另外，当我们把它们吸入到肺部时，我们可以吸收精油分子，当然，它们也会被身体吸收。\n\
    \n#### （1）精油汽化器\n\n精油汽化器是最令人享受的应用于精油的设备之一，可以通过许多种汽化器把精油散发到我们呼吸的空气中。这与在房间中放置合成的花香是不同的，因为使用精油汽化器，你得到的不仅是充满芳香的房间，还可以从精油的治疗功效中受益。在房间蒸汽熏香最常用的方法，就是往蒸发器中添加几滴精油，蒸发器的制作材料有许多种，包括陶瓷的、无釉赤陶的、金属的和玻璃的等，它们都由两部分构成，上面装水和精油（或是结晶体与精油的混合体），下面可以安置蜡烛提供温和的热量。当购买蒸发器时，要为它配置一个大些的蓄水盒，这样你就不用经常地往里加水了。通常往蓄水盒添加\
    \ 6~8 滴精油，但具体数量要看房间的大小来定。蜡烛给上面的水加热，水中的精油就开始蒸发，香气就会四处扩散。使用这种蒸发器时要格外小心，尤其是周围有老人和孩子活动时，因为蜡烛是没有遮挡的火焰，水也会变得很烫。可以用电子扩散器，或一种芳香石代替蜡烛蒸发器。\n\
    \n点燃香薰灯——陶冶情操\n\n#### （2）精油自然挥发\n\n这是另一种蒸发的办法，在碗柜厨或抽屉里放几个滴有精油的小棉球。不过要小心，不能让精油接触到你的衣服，因为精油会弄脏衣服。有些人用这种方式预防衣服被虫蛀，还能给他们的衣橱增添香味。通常使用丁香精油预防虫蛀。\n\
    \n#### （3）蒸汽疗法有助于治疗呼吸道疾病\n\n蒸汽疗法有助于治疗呼吸道疾病，治疗咽喉感染、缓解鼻黏膜炎、缓解精神和身体的疲劳、缓解紧张和焦虑、镇静神经系统。\n\
    \n## 2. 蒸汽吸入法与精油\n\n当蒸汽与精油配合使用时，它们是一种治疗许多疾病的非常有效的方法，尤其适用于上呼吸道感染、鼻腔和窦炎。患有哮喘疾病的患者不应该使用这种治疗方法。\n\
    \n#### （1）蒸汽吸入法适用症状及精油\n\n*   适用于治疗呼吸困难的精油：雪松、尤加利或松树精油。\n*   治疗支气管炎的精油：罗勒、安息香、雪松、丁香、尤加利、乳香、松树、檀香、迷迭香、茶树和百里香等精油。\n\
    *   治疗感冒的精油：甘草、黑胡椒、丁香、姜、没药、柑橘、松树、迷迭香或茶树精油。\n*   治疗咳嗽的精油：安息香、黑胡椒、小豆蔻、雪松、乳香、欧薄荷、迷迭香或丝柏精油。\n\
    *   治疗窦炎的精油：罗勒、迷迭香、茶树、尤加利、薰衣草、欧薄荷或牛至精油。\n\n#### （2）蒸汽吸入法的使用说明\n\n在一个碗里倒入一些热水，滴\
    \ 3 滴你选择好的精油，把头放在碗上面约 30cm 处，头上盖一块毛巾，这样四周都被罩住了，闭上眼睛，用鼻子做深呼吸 1~2 分钟。如果你感到这种治疗对你已经够了，就把毛巾揭起来，让新鲜的空气进来，用嘴呼吸一段时间，然后再重复刚才的做法。如果你在任何时候感到不舒服都可以结束这种治疗。当给孩子或老人使用这种治疗时，一定要确保他们不会因太靠近碗而有烫伤的危险，或用于蒸汽的碗翻了，烫伤他们。\n\
    \n## 3. 做空气清新剂\n\n你可以不费力地花费很少的钱来使每个房间的空气都变得清新起来，可以得到各种各样的芳香气味。这点太容易做到了，事后，你会迷惑，自己以前怎么没有想到呢？这类空气清新剂的核心是精油。虽然纯正的精油价格昂贵，但你需要的仅是一点点，回报是巨大的。从植物材料中提取的纯天然精油散发出的香气不仅会充满你的房间，而且你也能从精油固有的治疗成份中获益。\n\
    \n#### （1）做空气清新剂方法\n\n使用精油做空气清新剂，仅需要按以下的要求去做：\n\n拿一个干净的塑料喷壶（给植物喷水的），灌半壶干净水，你最好使用过滤水或是瓶装水，以确保水中没有污染物，加\
    \ 8~10 滴凉爽的、使人提神的精油，然后摇匀。当你想使房间空气清新时，摇匀喷壶，快速喷洒一些即可。但要确保离磨光家具远一点，因为精油会损伤磨光的家具。在避光、冷凉的地方保存喷壶。\n\
    \n#### （2）几种空气清新剂配方\n\n*   去掉香烟味的喷雾：按照上面所说的水雾配制方法，在水中添加 3 滴迷迭香精油、3 滴茶树精油和 5 滴桉树精油。\n\
    *   去掉厨房烟味的喷雾：按照上面所说的水雾配制方法，在水中添加 3 滴椒样薄荷精油、3 滴薰衣草精油和 4 滴鼠尾草精油。\n\n## （四）做皮肤护理剂\n\
    \n### 1. 家庭自制面部护理和收敛品（又称为滋补品）\n\n在调制面部滋养品时，添加一些类似于金缕梅酊剂的某种成份，能够增强收敛的功效，这也是面部滋养品所需要的。请注意，有些人使用金缕梅酊剂会有皮肤干燥的感觉。在调制滋养品时最好使用玫瑰水。在家里是很容易做些简单的护肤保养的，清洁掉护肤品后，可以用湿的棉球把皮肤擦拭干净。\n\
    \n#### （1）家庭制作面部滋养品的方法\n\n滋养品的制作方法都是一样的。先把玫瑰水倒入玻璃瓶内作为底料，然后添加你选好的精油，给瓶子盖帽，剧烈摇晃瓶子，以帮助精油分散。通常商业化生产的此类产品是要添加一些助分散成份，因为家庭是现做现用就不用添加了。要把装有混合物的瓶子放置至少\
    \ 36 小时，再次剧烈摇晃瓶子，用过滤纸过滤，以去除大量的精油，把滤液再次装瓶就可以待用了。记住，用前要摇匀。\n\n#### （2）面部滋养品的种类\n\
    \n*   适合干性和一般肤质的滋补品：100mL 玫瑰水、1 滴甘菊精油、1 滴天竺葵精油。\n*   适合油性和一般肤质的滋补品：100mL 玫瑰水、1\
    \ 滴刺柏浆果精油、1 滴奥托玫瑰精油。\n*   适合一般和敏感肤质的滋补品：可以用甘菊泡制 100mL 淡的茶水，往里滴 1 滴德国甘菊精油。这种甘菊茶味淡、色黑并带有一些苦味。如果得不到新鲜的材料，可以使用好的商业化的甘菊茶。\n\
    *   一种收敛剂：25mL 金缕梅酊剂、75mL 玫瑰水、1 滴丝柏精油、2 滴檀香精油。\n\n## 2. 家庭自制的面霜和护肤品\n\n许多种面霜都可以在家里制作，包括一些化妆品、面膜和有止痛功能的护肤品以及其他一些药膏，它们有助于使你获得一种自然的健康，看起来会更年轻。精油具有各种的治疗功效，包括给面霜增加锌元素，它们中的有些精油还有非常特别的功效，可以帮助改善皮肤状况。\n\
    适合做面霜的精油：德国甘菊、胡萝卜籽（基础油）、鼠尾草、茴香、乳香、天竺葵、牛膝草、薰衣草、没药、橙花油、棕榈玫瑰、玫瑰、迷迭香、欧蓍草精油。这些精油对于帮助消除皱纹和老年斑有很强的功效。\n\
    当挑选精油为面部或身体做面霜和洗液时，不能选有光敏性的精油。\n\n#### （1）水状面霜\n\n如果你不想使面霜的成份过于复杂，你可以使用一种中性的水状面霜，就可以起到单纯保湿的效果，这种面霜可以从药房、药剂师或保健品商店买到，然后往里加些你喜欢的精油即可。在底料中使用的精油数量，不要超过被推荐的使用浓度，使用浓度过大，会烧伤皮肤。\n\
    \n#### （2）蜂蜡和精油面霜\n\n下面的这个配方要比仅有水状面霜的成份丰富的多，但请注意，要在冷凉地方保存，保质期不超过 6 周。\n在 130mL\
    \ 的甜杏仁油（甜扁桃仁油）中，溶解 15g 的纯蜂蜡，也可以用其他不会挥发的油来代替甜杏仁油，一些人对在护肤产品中使用蜂蜡存有顾虑，他们认为，蜂蜡会“阻塞毛孔”，但在混合物中使用，蜂蜡不仅会有软化皮肤的完美功效，也不会产生任何的皮肤问题。如果你使用蜂产品有过敏现象，在用的时候要小心。当蜂蜡融化后，缓慢地温热\
    \ 50mL 的玫瑰花水（或是其他种类的花水），用搅拌器或电子混合器，把花水与蜂蜡、精油相混合，这个过程要缓慢进行，然后静置一段时间，滴入 8 滴你选择好的精油。\n\
    \n## 3. 家庭自制天然面膜\n\n使用面膜是对面部最好的护理方式之一，它的用途多种多样，包括清洁、激励皮肤以延缓衰老，改善皮肤肤质等。有人认为，发黏的面膜盖在脸上会有干燥的感觉，其实它们对皮肤有很大的益处，在你保持美丽的常规护理中，是不可缺少的。绿黏土已经是有关创造美丽的热门话题，如果你在你居住地没有找到，也可以使用旧的白色高岭土粉末代替。你可以把绿黏土或高岭土粉末与一点矢车菊精油、1/4\
    \ 茶匙的生燕麦混合（使用花水，如玫瑰或纯蒸馏水）。在使用面膜的时候，皮肤先被清洗干净，然后用毛巾轻拍脸部直到干爽，在脸上敷好面膜后，要保持放松状态，让面膜在脸上停留\
    \ 15 分钟以上，然后用温和的水把它洗掉，再轻拍脸部到干爽，最后要使用些保湿剂。\n\n#### （1）普通肤质的面膜\n\n普通肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴\
    \ 1 滴天竺葵精油和 1 滴橙花油，充分混合后待用。\n\n#### （2）干性肤质的面膜\n\n干性肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后加\
    \ 1 茶匙小麦胚芽油或月见草油，滴 1 滴洋甘菊精油和 2 滴胡萝卜籽油，充分混合后待用。\n\n#### （3）油性肤质的面膜\n\n油性肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴\
    \ 1 滴薰衣草精油和 1 滴乳香或刺柏浆果油，充分混合后待用。\n\n#### （4）有皮肤问题时应采用的面膜\n\n有皮肤问题的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴\
    \ 1 滴薰衣草精油、1 滴茶树油和 1 滴橙花油，充分混合后待用。\n\n#### （5）返老还童面膜\n\n皮肤有衰老问题的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后加\
    \ 1 茶匙荷荷芭油，滴 1 滴甘菊精油、1 滴乳香油和 1 滴没药油，充分混合后待用。\n\n## 4. 头发护理\n\n随着年龄的增长，皮肤开始出现皱纹，肌肉也开始变得松懈，然而，我们却很少注意到头发的状况，只是任其自然生长。因遗传、生病、发烧、甲状腺疾病、辐射、循环系统疾病、营养不良或压力过大等因素引起的脱发，困扰着人们。虽然精油不能治好引起掉发的疾病，但有益于头发的某些精油已经有几个世纪的应用了，在帮助头发再生方面享有盛名。这些香草植物精华的优点不仅是它的香味，某些精油还有显著的治疗功效，毛发再生专家也持相同观点。\n\
    \n#### （1）掉头发（秃头症）\n\n可帮助减少掉头发的精油：柏树、薰衣草、加州荷蒙得木、迷迭香。我们建议使用迷迭香，因为它作为有效成份被应用在头发护理产品中已经很长时间了。迷迭香，或者上述中的任何一种都可以添加在洗发液中使用，也可以调配成复方油（2\
    \ 滴精油加 15mL 基础油）做成头皮按摩油。\n\n#### （2）头皮屑\n\n使用精油和芳香疗法治疗头皮屑，常用精油有：雪松、薰衣草、广藿香、迷迭香、茶树油精油。这些精油可以用做头皮按摩复方油的组成（稀释方法如上），或者掺入洗发液中使用。如果发质是油性的，可以选用茶树精油；干性的发质选用迷迭香精油。\n\
    \n#### （3）做漱口水\n\n你也可以制作各种漱口用的“花水”或“水溶胶”溶液。拿一个塑料水瓶，装 1L 凉水，然后添加 10 滴精油，盖上盖摇匀，然后取一个过滤器，把配好的溶液过滤，散发着清香的过滤液就可以做漱口水使用了。\n\
    \n## 5. 家里制作天然的面部清洁剂\n\n#### （1）面部清洁剂的作用\n\n当你照镜子时，你面对的是灰暗、干燥和满是皮屑的肌肤，这可能就到了使用一些清洁剂的时候了。它可以除掉堵塞在皮肤表层的死细胞，使隐藏在下面年轻肌肤显现出来。虽然，在市场上有各种各样的商业擦洗剂，但是，我们发现，在家里自己做的擦洗剂对皮肤的使用效果是最充满活力的，可以使肌肤泛着玫瑰红色，增进皮肤的健康。\n\
    \n#### （2）面部清洁剂的用法\n\n清洗面部以后，用毛巾轻轻地把脸擦干，以温和的手法在面部做圆弧动作来涂抹黏性的混合物，但要避开眼部范围，在面部保留混合物\
    \ 15 分钟，然后用微温的水清洗掉混合物。\n\n**面部清洁剂的配制：**取 2~3 茶匙的生燕麦（没有提前炒熟的），用手或研磨工具把它压碎成更小的块状物。在燕麦块中添加一些纯蜂蜜和\
    \ 1/4 茶匙的苹果酒醋并进行搅拌，直到形成一种滑润的混合物。也可多加些蜂蜜。最后在混合物中添 1 滴罗勒精油。对于有问题的皮肤，可以用茶树精油代替罗勒精油，以促进愈合速度。\n\
    \n#### （3）使用注意事项\n\n有皮肤问题的年轻人应该小心，不要过度地使用面部清洁剂，过度地清洁或擦洗肌肤不但不会减轻皮肤问题，效果会是相反的，因为皮肤经过度刺激以后，自己的康复能力就会受到影响。所以，皮肤不好的人可以进行清洁处理，但操作过程要轻柔，使用频率不能过高，如果有什么疑问，请向你的主治医生或皮肤科医生进行咨询。但对于那些为了消除年龄带来痕迹的人来说，皮肤的清洁有助于促进血液循环和去除那些使人看起来灰暗和干燥的皮肤死细胞，清洁皮肤可以每\
    \ 14 天做 1 次，在有些情况下，可以每周做 1 次。\n\n## 6. 花水\n\n#### （1）花水的来源\n\n花水，又称为水溶胶。许多零售商提供的“精油水喷雾”其实不是真正的花水。花水是不能制作的，是精油提取中的蒸馏法过程中产生的附属产品。在市场上有如此多见的花水，其实很多都是再生的。少量精油混入水中，加些有扩散作用的成份，这样配制的混合物不是花水。\n\
    \n#### （2）花水的用法\n\n花水是经常用于调理和滋养皮肤的一种成份，还可以用它制作一种快速提神的酒，只要简单地把它喷洒在皮肤或空气中，就能发挥作用。\n\
    \n#### （3）常用花水种类及功效\n\n*   德国甘菊花水有镇静、抚慰和放松，以及抗感染的功效；\n*   天竺葵花水能平衡和振奋情绪；\n*  \
    \ 薰衣草花水有镇静和治疗皮肤的功效；\n*   橙花花水能提升精力，适用于所有皮肤类型的，有保湿作用；\n*   迷迭香花水能激励和提升精力；\n*  \
    \ 玫瑰花水适用于所有皮肤类型，有抚慰作用；\n*   檀香花水适用于所有皮肤类型，有抚慰和协调作用；\n*   金缕梅花水有提神和收敛的功效，适用于所有类型的皮肤。\n\
    \n其中，玫瑰水和金缕梅水是最知名的花水。\n\n## 7. 外敷\n\n外敷是一种基本的治疗方式，把小块材料、绷带或是小毛巾折叠起来浸湿后放在衬垫里面，放在需要治疗的地方。有两种外敷方式可以使用，一种是冷敷，一种是热敷。外敷的放置位置是有要求的。外敷可以用来治疗肌肉疼痛、扭伤、促进循环和缓解疼痛，还可以消除内部器官的充血，促进淋巴循环。\n\
    \n#### （1）热敷\n\n做热敷时，取一盆热水，水温以你感觉舒服为宜，往盆里添加 4 滴你选择好的精油。然后，把你折叠好的材料、绷带或小毛巾放在上部的水面中，吸足水分，拧干多余水分，置于需要治疗的地方。用有点弹性的围巾、塑料袋或再用一块毛巾盖在热敷的地方，使热敷材料可以维持原状。如果热敷时不好固定热敷材料，你也可以用绷带轻轻地绑在热敷的地方，当热敷材料冷却到身体温度时，可以换取另一块热敷材料。热敷用于治疗习惯性扭伤、肌肉疼、风湿病、月经痛、疖子和牙疼。\n\
    \n#### （2）冷敷\n\n冷敷与热敷的操作过程是一样的，就是用冰或冷冻水代替热水，也是当冷敷材料接近身体温度时换新的冷敷材料。冷敷用于治疗近期扭伤、瘀伤、肿胀和发炎、发烧和头疼。当感到疲倦的时候，也可以用冷敷振奋精神。\n\
    \n# 八、植物精油在芳香按摩中的应用\n\n## （一）芳香按摩常识\n\n### 1. 芳香按摩概念\n\n芳香按摩是指对软组织的一种操作，是芳香疗法应用中实施按摩的一种方法，是要把精油的能量与按摩手法相结合，使精油进入人体，发挥它固有的治疗功效的一种具体办法。\n\
    \n### 2. 芳香按摩的方式\n\n芳香按摩的方式有多种多样，包括如下方式。\n\n*   **瑞典的按摩方法**\n    这是最流行的一种按摩手法，包括对身体不同部位的不同敲击。这种按摩方法的好处在于能够提升健康和快乐的感受，也能够降低精神和身体的压力。\n\
    *   **神经肌肉按摩法**\n    这种按摩方法是芳香按摩方法形成的基础，它又被称为“穴位”疗法，这种按摩主要的治疗效果就是使自我调节的神经系统恢复平衡。\n\
    *   **淋巴按摩**\n    这种按摩方法有助于改善淋巴循环系统的功能，对于清除体内毒素尤为有利，还可以增强免疫力。\n*   **针压按摩法和指压按摩法**\n\
    \    这种按摩方法的主要部位是身体的经脉，通过对身体特定部位点的施压按摩疏通不畅的经脉，做这种按摩，人不需要脱衣服，也不需要针。\n*   **足部按摩**\n\
    \    按摩足部时，焦点是足部的某些点位，据研究，这些点位对应着身体的其他部位或器官。\n*   **韧带按摩**\n    这种按摩技术主要是按摩韧带，韧带是肌肉的连接组织，按摩韧带，有助于身体恢复平衡。\n\
    \n### 3. 做按摩应注意事项\n\n*   刚完成暴饮（含酒精的饮料）、暴食或过瘾性物质的人，不能做按摩。\n*   做完外科手术的人，不能做按摩，除非得到医生的许可。\n\
    *   有心脏病的人，一般情况下，仅能做一些轻微的按摩，以促进循环。\n*   癌症患者不适宜做按摩。\n*   发烧或带有传染性疾病的人，不能做按摩。\n\
    *   患有静脉曲张疾病的人，不可以直接在患者的静脉曲张处按摩，也不能给患有血栓症或静脉炎的人按摩。\n*   可以在关节红肿、痛风、关节炎或风湿病患处按摩，但如果按摩地方有剧烈疼痛，应停止按摩。\n\
    *   孕妇要征得医生同意后才可做按摩。\n\n## （二）芳香按摩手法\n\n芳香按摩比按摩更有整体治疗效果，它能够改善身体的疲劳，安抚心灵，达到平衡身体、心智与灵性的目的。植物精油具有刺激人体各种腺体及内脏的功能，按摩时加入植物精油，会使按摩的效果更好，由内而外对肌肤进行调理，使皮肤真正的细腻、光泽、红润。要提高保健和治疗效果，在适当的穴位或部位上运用相宜的手法，是按摩过程中重要的环节。根据手法的动作形态，按摩手法可归纳为摩擦类、挤压类、摆动类、振动类、叩击类、运动关节类六类手法。\n\
    \n### 1. 摩擦类手法\n\n以指、掌或肢体的其他部位在体表做直线或环形移动称为摩擦类手法。\n\n#### （1）推法\n\n推法：用指、掌或肘着力于机体的一定部位，做单方向的直线移动的手法。具有疏通经络，促进血液循环的作用。\n\
    \n*   **拇指推法。**用拇指指腹着力于操作部位，沿经络循行路线或肌肉纤维平行方向推进，其余 4 指分开助力。\n*   **掌推法。**用手掌着力向一定方向推进，可根据被按摩部位与受力大小的不同，用掌根推。肘关节屈曲，用肘尖（即尺骨鹰嘴突起部）着力向一定方向推动。\n\
    *   **肘推法。**\n\n#### （2）抹法\n\n用单手或双手拇指罗纹面紧贴皮肤，作上下或左右往返运动的手法。具有开窍镇静、清醒头目的作用。操作要点是，4\
    \ 指并拢与拇指分开，4 指按住某一部位，拇指来回作往返运动。\n\n#### （3）摩法\n\n用指或掌在体表做环形摩擦移动的手法。具有理气消肿、调节肠胃蠕动的功能。可分为：\n\
    1.  **掌摩法。**手掌自然伸直，腕关节微背伸，将手掌放于体表一定部位上，以掌心、掌根着力，随腕关节连同前臂做环转移动。\n2.  **指摩法。**手指并拢，指掌部自然伸直，腕部微屈，用食中、无名、小指指面附着于一定部位，随同腕关节做环转移动。"
  mdcn: "## （三）香熏\n\n### 1. 香熏\n\n由于精油具有各自的治疗功效，因此它们可以在熏香疗法中使用。蒸发精油的过程是强迫芳香分子在空气中传播的过程，我们可以从两方面获益：一方面是通过我们的嗅觉感应器，是一种嗅觉球形物，能激活我们的边缘系统；另外，当我们把它们吸入到肺部时，我们可以吸收精油分子，当然，它们也会被身体吸收。\n\
    \n#### （1）精油汽化器\n\n精油汽化器是最令人享受的应用于精油的设备之一，可以通过许多种汽化器把精油散发到我们呼吸的空气中。这与在房间中放置合成的花香是不同的，因为使用精油汽化器，你得到的不仅是充满芳香的房间，还可以从精油的治疗功效中受益。在房间蒸汽熏香最常用的方法，就是往蒸发器中添加几滴精油，蒸发器的制作材料有许多种，包括陶瓷的、无釉赤陶的、金属的和玻璃的等，它们都由两部分构成，上面装水和精油（或是结晶体与精油的混合体），下面可以安置蜡烛提供温和的热量。当购买蒸发器时，要为它配置一个大些的蓄水盒，这样你就不用经常地往里加水了。通常往蓄水盒添加\
    \ 6~8 滴精油，但具体数量要看房间的大小来定。蜡烛给上面的水加热，水中的精油就开始蒸发，香气就会四处扩散。使用这种蒸发器时要格外小心，尤其是周围有老人和孩子活动时，因为蜡烛是没有遮挡的火焰，水也会变得很烫。可以用电子扩散器，或一种芳香石代替蜡烛蒸发器。\n\
    \n点燃香薰灯——陶冶情操\n\n#### （2）精油自然挥发\n\n这是另一种蒸发的办法，在碗柜厨或抽屉里放几个滴有精油的小棉球。不过要小心，不能让精油接触到你的衣服，因为精油会弄脏衣服。有些人用这种方式预防衣服被虫蛀，还能给他们的衣橱增添香味。通常使用丁香精油预防虫蛀。\n\
    \n#### （3）蒸汽疗法有助于治疗呼吸道疾病\n\n蒸汽疗法有助于治疗呼吸道疾病，治疗咽喉感染、缓解鼻黏膜炎、缓解精神和身体的疲劳、缓解紧张和焦虑、镇静神经系统。\n\
    \n## 2. 蒸汽吸入法与精油\n\n当蒸汽与精油配合使用时，它们是一种治疗许多疾病的非常有效的方法，尤其适用于上呼吸道感染、鼻腔和窦炎。患有哮喘疾病的患者不应该使用这种治疗方法。\n\
    \n#### （1）蒸汽吸入法适用症状及精油\n\n*   适用于治疗呼吸困难的精油：雪松、尤加利或松树精油。\n*   治疗支气管炎的精油：罗勒、安息香、雪松、丁香、尤加利、乳香、松树、檀香、迷迭香、茶树和百里香等精油。\n\
    *   治疗感冒的精油：甘草、黑胡椒、丁香、姜、没药、柑橘、松树、迷迭香或茶树精油。\n*   治疗咳嗽的精油：安息香、黑胡椒、小豆蔻、雪松、乳香、欧薄荷、迷迭香或丝柏精油。\n\
    *   治疗窦炎的精油：罗勒、迷迭香、茶树、尤加利、薰衣草、欧薄荷或牛至精油。\n\n#### （2）蒸汽吸入法的使用说明\n\n在一个碗里倒入一些热水，滴\
    \ 3 滴你选择好的精油，把头放在碗上面约 30cm 处，头上盖一块毛巾，这样四周都被罩住了，闭上眼睛，用鼻子做深呼吸 1~2 分钟。如果你感到这种治疗对你已经够了，就把毛巾揭起来，让新鲜的空气进来，用嘴呼吸一段时间，然后再重复刚才的做法。如果你在任何时候感到不舒服都可以结束这种治疗。当给孩子或老人使用这种治疗时，一定要确保他们不会因太靠近碗而有烫伤的危险，或用于蒸汽的碗翻了，烫伤他们。\n\
    \n## 3. 做空气清新剂\n\n你可以不费力地花费很少的钱来使每个房间的空气都变得清新起来，可以得到各种各样的芳香气味。这点太容易做到了，事后，你会迷惑，自己以前怎么没有想到呢？这类空气清新剂的核心是精油。虽然纯正的精油价格昂贵，但你需要的仅是一点点，回报是巨大的。从植物材料中提取的纯天然精油散发出的香气不仅会充满你的房间，而且你也能从精油固有的治疗成份中获益。\n\
    \n#### （1）做空气清新剂方法\n\n使用精油做空气清新剂，仅需要按以下的要求去做：\n\n拿一个干净的塑料喷壶（给植物喷水的），灌半壶干净水，你最好使用过滤水或是瓶装水，以确保水中没有污染物，加\
    \ 8~10 滴凉爽的、使人提神的精油，然后摇匀。当你想使房间空气清新时，摇匀喷壶，快速喷洒一些即可。但要确保离磨光家具远一点，因为精油会损伤磨光的家具。在避光、冷凉的地方保存喷壶。\n\
    \n#### （2）几种空气清新剂配方\n\n*   去掉香烟味的喷雾：按照上面所说的水雾配制方法，在水中添加 3 滴迷迭香精油、3 滴茶树精油和 5 滴桉树精油。\n\
    *   去掉厨房烟味的喷雾：按照上面所说的水雾配制方法，在水中添加 3 滴椒样薄荷精油、3 滴薰衣草精油和 4 滴鼠尾草精油。\n\n## （四）做皮肤护理剂\n\
    \n### 1. 家庭自制面部护理和收敛品（又称为滋补品）\n\n在调制面部滋养品时，添加一些类似于金缕梅酊剂的某种成份，能够增强收敛的功效，这也是面部滋养品所需要的。请注意，有些人使用金缕梅酊剂会有皮肤干燥的感觉。在调制滋养品时最好使用玫瑰水。在家里是很容易做些简单的护肤保养的，清洁掉护肤品后，可以用湿的棉球把皮肤擦拭干净。\n\
    \n#### （1）家庭制作面部滋养品的方法\n\n滋养品的制作方法都是一样的。先把玫瑰水倒入玻璃瓶内作为底料，然后添加你选好的精油，给瓶子盖帽，剧烈摇晃瓶子，以帮助精油分散。通常商业化生产的此类产品是要添加一些助分散成份，因为家庭是现做现用就不用添加了。要把装有混合物的瓶子放置至少\
    \ 36 小时，再次剧烈摇晃瓶子，用过滤纸过滤，以去除大量的精油，把滤液再次装瓶就可以待用了。记住，用前要摇匀。\n\n#### （2）面部滋养品的种类\n\
    \n*   适合干性和一般肤质的滋补品：100mL 玫瑰水、1 滴甘菊精油、1 滴天竺葵精油。\n*   适合油性和一般肤质的滋补品：100mL 玫瑰水、1\
    \ 滴刺柏浆果精油、1 滴奥托玫瑰精油。\n*   适合一般和敏感肤质的滋补品：可以用甘菊泡制 100mL 淡的茶水，往里滴 1 滴德国甘菊精油。这种甘菊茶味淡、色黑并带有一些苦味。如果得不到新鲜的材料，可以使用好的商业化的甘菊茶。\n\
    *   一种收敛剂：25mL 金缕梅酊剂、75mL 玫瑰水、1 滴丝柏精油、2 滴檀香精油。\n\n## 2. 家庭自制的面霜和护肤品\n\n许多种面霜都可以在家里制作，包括一些化妆品、面膜和有止痛功能的护肤品以及其他一些药膏，它们有助于使你获得一种自然的健康，看起来会更年轻。精油具有各种的治疗功效，包括给面霜增加锌元素，它们中的有些精油还有非常特别的功效，可以帮助改善皮肤状况。\n\
    适合做面霜的精油：德国甘菊、胡萝卜籽（基础油）、鼠尾草、茴香、乳香、天竺葵、牛膝草、薰衣草、没药、橙花油、棕榈玫瑰、玫瑰、迷迭香、欧蓍草精油。这些精油对于帮助消除皱纹和老年斑有很强的功效。\n\
    当挑选精油为面部或身体做面霜和洗液时，不能选有光敏性的精油。\n\n#### （1）水状面霜\n\n如果你不想使面霜的成份过于复杂，你可以使用一种中性的水状面霜，就可以起到单纯保湿的效果，这种面霜可以从药房、药剂师或保健品商店买到，然后往里加些你喜欢的精油即可。在底料中使用的精油数量，不要超过被推荐的使用浓度，使用浓度过大，会烧伤皮肤。\n\
    \n#### （2）蜂蜡和精油面霜\n\n下面的这个配方要比仅有水状面霜的成份丰富的多，但请注意，要在冷凉地方保存，保质期不超过 6 周。\n在 130mL\
    \ 的甜杏仁油（甜扁桃仁油）中，溶解 15g 的纯蜂蜡，也可以用其他不会挥发的油来代替甜杏仁油，一些人对在护肤产品中使用蜂蜡存有顾虑，他们认为，蜂蜡会“阻塞毛孔”，但在混合物中使用，蜂蜡不仅会有软化皮肤的完美功效，也不会产生任何的皮肤问题。如果你使用蜂产品有过敏现象，在用的时候要小心。当蜂蜡融化后，缓慢地温热\
    \ 50mL 的玫瑰花水（或是其他种类的花水），用搅拌器或电子混合器，把花水与蜂蜡、精油相混合，这个过程要缓慢进行，然后静置一段时间，滴入 8 滴你选择好的精油。\n\
    \n## 3. 家庭自制天然面膜\n\n使用面膜是对面部最好的护理方式之一，它的用途多种多样，包括清洁、激励皮肤以延缓衰老，改善皮肤肤质等。有人认为，发黏的面膜盖在脸上会有干燥的感觉，其实它们对皮肤有很大的益处，在你保持美丽的常规护理中，是不可缺少的。绿黏土已经是有关创造美丽的热门话题，如果你在你居住地没有找到，也可以使用旧的白色高岭土粉末代替。你可以把绿黏土或高岭土粉末与一点矢车菊精油、1/4\
    \ 茶匙的生燕麦混合（使用花水，如玫瑰或纯蒸馏水）。在使用面膜的时候，皮肤先被清洗干净，然后用毛巾轻拍脸部直到干爽，在脸上敷好面膜后，要保持放松状态，让面膜在脸上停留\
    \ 15 分钟以上，然后用温和的水把它洗掉，再轻拍脸部到干爽，最后要使用些保湿剂。\n\n#### （1）普通肤质的面膜\n\n普通肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴\
    \ 1 滴天竺葵精油和 1 滴橙花油，充分混合后待用。\n\n#### （2）干性肤质的面膜\n\n干性肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后加\
    \ 1 茶匙小麦胚芽油或月见草油，滴 1 滴洋甘菊精油和 2 滴胡萝卜籽油，充分混合后待用。\n\n#### （3）油性肤质的面膜\n\n油性肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴\
    \ 1 滴薰衣草精油和 1 滴乳香或刺柏浆果油，充分混合后待用。\n\n#### （4）有皮肤问题时应采用的面膜\n\n有皮肤问题的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴\
    \ 1 滴薰衣草精油、1 滴茶树油和 1 滴橙花油，充分混合后待用。\n\n#### （5）返老还童面膜\n\n皮肤有衰老问题的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后加\
    \ 1 茶匙荷荷芭油，滴 1 滴甘菊精油、1 滴乳香油和 1 滴没药油，充分混合后待用。\n\n## 4. 头发护理\n\n随着年龄的增长，皮肤开始出现皱纹，肌肉也开始变得松懈，然而，我们却很少注意到头发的状况，只是任其自然生长。因遗传、生病、发烧、甲状腺疾病、辐射、循环系统疾病、营养不良或压力过大等因素引起的脱发，困扰着人们。虽然精油不能治好引起掉发的疾病，但有益于头发的某些精油已经有几个世纪的应用了，在帮助头发再生方面享有盛名。这些香草植物精华的优点不仅是它的香味，某些精油还有显著的治疗功效，毛发再生专家也持相同观点。\n\
    \n#### （1）掉头发（秃头症）\n\n可帮助减少掉头发的精油：柏树、薰衣草、加州荷蒙得木、迷迭香。我们建议使用迷迭香，因为它作为有效成份被应用在头发护理产品中已经很长时间了。迷迭香，或者上述中的任何一种都可以添加在洗发液中使用，也可以调配成复方油（2\
    \ 滴精油加 15mL 基础油）做成头皮按摩油。\n\n#### （2）头皮屑\n\n使用精油和芳香疗法治疗头皮屑，常用精油有：雪松、薰衣草、广藿香、迷迭香、茶树油精油。这些精油可以用做头皮按摩复方油的组成（稀释方法如上），或者掺入洗发液中使用。如果发质是油性的，可以选用茶树精油；干性的发质选用迷迭香精油。\n\
    \n#### （3）做漱口水\n\n你也可以制作各种漱口用的“花水”或“水溶胶”溶液。拿一个塑料水瓶，装 1L 凉水，然后添加 10 滴精油，盖上盖摇匀，然后取一个过滤器，把配好的溶液过滤，散发着清香的过滤液就可以做漱口水使用了。\n\
    \n## 5. 家里制作天然的面部清洁剂\n\n#### （1）面部清洁剂的作用\n\n当你照镜子时，你面对的是灰暗、干燥和满是皮屑的肌肤，这可能就到了使用一些清洁剂的时候了。它可以除掉堵塞在皮肤表层的死细胞，使隐藏在下面年轻肌肤显现出来。虽然，在市场上有各种各样的商业擦洗剂，但是，我们发现，在家里自己做的擦洗剂对皮肤的使用效果是最充满活力的，可以使肌肤泛着玫瑰红色，增进皮肤的健康。\n\
    \n#### （2）面部清洁剂的用法\n\n清洗面部以后，用毛巾轻轻地把脸擦干，以温和的手法在面部做圆弧动作来涂抹黏性的混合物，但要避开眼部范围，在面部保留混合物\
    \ 15 分钟，然后用微温的水清洗掉混合物。\n\n**面部清洁剂的配制：**取 2~3 茶匙的生燕麦（没有提前炒熟的），用手或研磨工具把它压碎成更小的块状物。在燕麦块中添加一些纯蜂蜜和\
    \ 1/4 茶匙的苹果酒醋并进行搅拌，直到形成一种滑润的混合物。也可多加些蜂蜜。最后在混合物中添 1 滴罗勒精油。对于有问题的皮肤，可以用茶树精油代替罗勒精油，以促进愈合速度。\n\
    \n#### （3）使用注意事项\n\n有皮肤问题的年轻人应该小心，不要过度地使用面部清洁剂，过度地清洁或擦洗肌肤不但不会减轻皮肤问题，效果会是相反的，因为皮肤经过度刺激以后，自己的康复能力就会受到影响。所以，皮肤不好的人可以进行清洁处理，但操作过程要轻柔，使用频率不能过高，如果有什么疑问，请向你的主治医生或皮肤科医生进行咨询。但对于那些为了消除年龄带来痕迹的人来说，皮肤的清洁有助于促进血液循环和去除那些使人看起来灰暗和干燥的皮肤死细胞，清洁皮肤可以每\
    \ 14 天做 1 次，在有些情况下，可以每周做 1 次。\n\n## 6. 花水\n\n#### （1）花水的来源\n\n花水，又称为水溶胶。许多零售商提供的“精油水喷雾”其实不是真正的花水。花水是不能制作的，是精油提取中的蒸馏法过程中产生的附属产品。在市场上有如此多见的花水，其实很多都是再生的。少量精油混入水中，加些有扩散作用的成份，这样配制的混合物不是花水。\n\
    \n#### （2）花水的用法\n\n花水是经常用于调理和滋养皮肤的一种成份，还可以用它制作一种快速提神的酒，只要简单地把它喷洒在皮肤或空气中，就能发挥作用。\n\
    \n#### （3）常用花水种类及功效\n\n*   德国甘菊花水有镇静、抚慰和放松，以及抗感染的功效；\n*   天竺葵花水能平衡和振奋情绪；\n*  \
    \ 薰衣草花水有镇静和治疗皮肤的功效；\n*   橙花花水能提升精力，适用于所有皮肤类型的，有保湿作用；\n*   迷迭香花水能激励和提升精力；\n*  \
    \ 玫瑰花水适用于所有皮肤类型，有抚慰作用；\n*   檀香花水适用于所有皮肤类型，有抚慰和协调作用；\n*   金缕梅花水有提神和收敛的功效，适用于所有类型的皮肤。\n\
    \n其中，玫瑰水和金缕梅水是最知名的花水。\n\n## 7. 外敷\n\n外敷是一种基本的治疗方式，把小块材料、绷带或是小毛巾折叠起来浸湿后放在衬垫里面，放在需要治疗的地方。有两种外敷方式可以使用，一种是冷敷，一种是热敷。外敷的放置位置是有要求的。外敷可以用来治疗肌肉疼痛、扭伤、促进循环和缓解疼痛，还可以消除内部器官的充血，促进淋巴循环。\n\
    \n#### （1）热敷\n\n做热敷时，取一盆热水，水温以你感觉舒服为宜，往盆里添加 4 滴你选择好的精油。然后，把你折叠好的材料、绷带或小毛巾放在上部的水面中，吸足水分，拧干多余水分，置于需要治疗的地方。用有点弹性的围巾、塑料袋或再用一块毛巾盖在热敷的地方，使热敷材料可以维持原状。如果热敷时不好固定热敷材料，你也可以用绷带轻轻地绑在热敷的地方，当热敷材料冷却到身体温度时，可以换取另一块热敷材料。热敷用于治疗习惯性扭伤、肌肉疼、风湿病、月经痛、疖子和牙疼。\n\
    \n#### （2）冷敷\n\n冷敷与热敷的操作过程是一样的，就是用冰或冷冻水代替热水，也是当冷敷材料接近身体温度时换新的冷敷材料。冷敷用于治疗近期扭伤、瘀伤、肿胀和发炎、发烧和头疼。当感到疲倦的时候，也可以用冷敷振奋精神。\n\
    \n# 八、植物精油在芳香按摩中的应用\n\n## （一）芳香按摩常识\n\n### 1. 芳香按摩概念\n\n芳香按摩是指对软组织的一种操作，是芳香疗法应用中实施按摩的一种方法，是要把精油的能量与按摩手法相结合，使精油进入人体，发挥它固有的治疗功效的一种具体办法。\n\
    \n### 2. 芳香按摩的方式\n\n芳香按摩的方式有多种多样，包括如下方式。\n\n*   **瑞典的按摩方法**\n    这是最流行的一种按摩手法，包括对身体不同部位的不同敲击。这种按摩方法的好处在于能够提升健康和快乐的感受，也能够降低精神和身体的压力。\n\
    *   **神经肌肉按摩法**\n    这种按摩方法是芳香按摩方法形成的基础，它又被称为“穴位”疗法，这种按摩主要的治疗效果就是使自我调节的神经系统恢复平衡。\n\
    *   **淋巴按摩**\n    这种按摩方法有助于改善淋巴循环系统的功能，对于清除体内毒素尤为有利，还可以增强免疫力。\n*   **针压按摩法和指压按摩法**\n\
    \    这种按摩方法的主要部位是身体的经脉，通过对身体特定部位点的施压按摩疏通不畅的经脉，做这种按摩，人不需要脱衣服，也不需要针。\n*   **足部按摩**\n\
    \    按摩足部时，焦点是足部的某些点位，据研究，这些点位对应着身体的其他部位或器官。\n*   **韧带按摩**\n    这种按摩技术主要是按摩韧带，韧带是肌肉的连接组织，按摩韧带，有助于身体恢复平衡。\n\
    \n### 3. 做按摩应注意事项\n\n*   刚完成暴饮（含酒精的饮料）、暴食或过瘾性物质的人，不能做按摩。\n*   做完外科手术的人，不能做按摩，除非得到医生的许可。\n\
    *   有心脏病的人，一般情况下，仅能做一些轻微的按摩，以促进循环。\n*   癌症患者不适宜做按摩。\n*   发烧或带有传染性疾病的人，不能做按摩。\n\
    *   患有静脉曲张疾病的人，不可以直接在患者的静脉曲张处按摩，也不能给患有血栓症或静脉炎的人按摩。\n*   可以在关节红肿、痛风、关节炎或风湿病患处按摩，但如果按摩地方有剧烈疼痛，应停止按摩。\n\
    *   孕妇要征得医生同意后才可做按摩。\n\n## （二）芳香按摩手法\n\n芳香按摩比按摩更有整体治疗效果，它能够改善身体的疲劳，安抚心灵，达到平衡身体、心智与灵性的目的。植物精油具有刺激人体各种腺体及内脏的功能，按摩时加入植物精油，会使按摩的效果更好，由内而外对肌肤进行调理，使皮肤真正的细腻、光泽、红润。要提高保健和治疗效果，在适当的穴位或部位上运用相宜的手法，是按摩过程中重要的环节。根据手法的动作形态，按摩手法可归纳为摩擦类、挤压类、摆动类、振动类、叩击类、运动关节类六类手法。\n\
    \n### 1. 摩擦类手法\n\n以指、掌或肢体的其他部位在体表做直线或环形移动称为摩擦类手法。\n\n#### （1）推法\n\n推法：用指、掌或肘着力于机体的一定部位，做单方向的直线移动的手法。具有疏通经络，促进血液循环的作用。\n\
    \n*   **拇指推法。**用拇指指腹着力于操作部位，沿经络循行路线或肌肉纤维平行方向推进，其余 4 指分开助力。\n*   **掌推法。**用手掌着力向一定方向推进，可根据被按摩部位与受力大小的不同，用掌根推。肘关节屈曲，用肘尖（即尺骨鹰嘴突起部）着力向一定方向推动。\n\
    *   **肘推法。**\n\n#### （2）抹法\n\n用单手或双手拇指罗纹面紧贴皮肤，作上下或左右往返运动的手法。具有开窍镇静、清醒头目的作用。操作要点是，4\
    \ 指并拢与拇指分开，4 指按住某一部位，拇指来回作往返运动。\n\n#### （3）摩法\n\n用指或掌在体表做环形摩擦移动的手法。具有理气消肿、调节肠胃蠕动的功能。可分为：\n\
    1.  **掌摩法。**手掌自然伸直，腕关节微背伸，将手掌放于体表一定部位上，以掌心、掌根着力，随腕关节连同前臂做环转移动。\n2.  **指摩法。**手指并拢，指掌部自然伸直，腕部微屈，用食中、无名、小指指面附着于一定部位，随同腕关节做环转移动。"
