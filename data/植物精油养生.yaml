    | 棕榈烯酸 | C16:1 | <1.0 | 0.2 |

    | 硬脂酸 | C18:0 | 2.0 ~ 6.0 | 2.5 |

    | 油酸 | C18:1 | 12.0 ~ 39.0 | 27.3 |

