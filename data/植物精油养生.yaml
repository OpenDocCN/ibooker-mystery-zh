    2. 鼻窦炎


    鼻窦是一种细菌感染，主要在眼睛和鼻子周围骨骼上的凹处发生一处或多处的炎症。引起窦炎的病因可以是感冒、流感、扁桃腺炎、敏感症或是口腔不卫生。症状包括鼻音、流鼻血、疲劳、头疼、耳朵感染、眼周围疼痛、轻微的发烧或咳嗽。


    使用蒸汽吸入法可以缓解疼痛，蒸汽中加入2滴迷迭香精油、2滴欧薄荷精油、1滴百里香精油、1滴尤加利精油。吸完蒸汽后，在10mL合适的基础油中添加下面的精油制成按摩油：2滴尤加利精油、2滴欧薄荷精油、3滴迷迭香精油、3滴天竺葵精油、1滴茶树精油。用这种混合油按摩鼻子、耳朵的前后、前额、颧骨、鼻子和脖子。


    # ### 3. 耳朵感染或耳朵疼


    耳朵疼一般是由中耳感染引起的。


    症状包括一只或两只耳朵针刺般的疼痛、发烧、反胃、呕吐、腹泻，耳朵还有被塞满东西和有噪音的感觉。通常中耳感染是由感冒或流感引起的。如果疼痛很剧烈，伴有脖颈僵硬和发烧的症状，就要赶紧去医院治疗。


    为了缓解疼痛，把1滴丁香精油和5mL葡萄籽油混合，在脖颈和耳朵周围按摩。


    如果耳朵感染被认为是咽喉炎引起的，可以在一杯开水中滴入2滴茶树精油，用它每两个小时漱1次口。


    # ### 4. 喉炎


    喉炎，引起咽喉疼痛最常见的原因之一，是一种咽喉或声带感染，声带感染会影响发声。


    (1) 症状


    咽喉早期症状是发痒、干咳、嘶哑和疼痛。在更为严重的情况下，人可能会失声，呼吸和吞咽也变得困难。


    (2) 饮食调理


    喝一杯加有半个柠檬的汁和蜂蜜的热水，也是一种好的治疗方法。但不要抽烟。


    (3) 精油调理


    治疗咽喉疼痛，每天用含有精油的漱口水漱口5~6次，漱口水的配制方法，选择下列的任何一种精油，在一杯凉开水中滴2滴：白千层、天竺葵、绿花白千层、黑胡椒、迷迭香或茶树精油。'
