    # ## 5.月桂精油

    西印度月桂精油是从月桂树（Laurus nobilis）提取出来的，属于樟科月桂属植物，又称为甜月桂、月桂和地中海月桂。

    这种温和的精油经常在芳香疗法中应用，它对呼吸系统有良好的杀菌作用，能够恢复消化系统的功能，缓解胃疼痛和肠胃气胀；同时，能提高自信心，提升勇气和洞察力。不过，它最常用于减少头发脱落，促进头皮健康。（1）精油性质

    月桂精油的味道是甜的、清新的、略带辛味的，油色深黄，具有中等水黏性。

    （2）来源

    这种强健的常绿月桂树是西印度、委内瑞拉和圭亚那地区的乡土树种。如今，精油的提取大部分是在墨西哥、西班牙和克罗尼西亚进行。月桂树可以长到30m高，叶片长矛形，有香味，花白黄色，具黑色浆果。月桂油在罗马很盛行，被认为是智慧、和平和安全的象征。拉丁文Laudis是称赞的意思，这就是为什么奥运会的胜利者会获赠月桂花冠的


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_89_0.png)'
  - '[PAGE 90]


    原因。


    过去，人们蒸馏月桂叶片制朗姆酒和月桂朗姆香水，这样得到的月桂朗姆香水是非常著名的头发滋补品，擦在身体上可以防寒和缓解肌肉疼痛。


    # (3) 提取方法


    这种树至少要有 5 年以上，才能从树上收集叶片，然后用水蒸气蒸馏法（在蒸馏时，往往要加些咸盐或海水）提取，出油率一般在 0.5% ~ 1.5%。


    # (4) 化学成份


    松萜或蒎烯、月桂烯、柠檬油精、芳樟醇、蒿脑、柠檬醛、萜品醇或松油醇、乙酸香叶酯、丁子香酚和胡椒酚。


    # (5) 治疗功效


    月桂精油可以用来治疗风湿病、神经痛、肌肉痛、循环系统不畅、感冒、流感、牙龈发炎、皮肤感染、腹泻，对于头发再生和头皮保健也有益处。


    # (6) 使用注意事项


    月桂精油含有高浓度的丁子香酚，这种成份可以引起皮肤和黏膜过敏，所以，在皮肤上使用时要小心，怀孕妇女最好不要用它。


    # (7) 用法


    月桂精油能够平缓情绪，减轻疼痛，包括因风湿引起的疼痛。它对消化系统也有益处，可以清除体内过多气体，是肝脏和肾脏的滋补品。小量使用具有刺激效果，而量大时，就会产生镇静的作用。月桂精油对头发和头皮是有帮助的，所以常常在抑制脱发时使用。对于扭伤、过度疲劳和擦伤，也有一定的疗效。


    1) 香炉和蒸汽熏香


    在薰蒸疗法中，月桂精油常用来治疗感染、发烧和一般的疼痛。它还能促进产生灵感，安抚激动的情绪。


    2) 做复方按摩油或浴盆添加成份


    做复方按摩油或稀释在浴盆中使用，月桂精油能够安抚情绪，缓解疼痛，尤其是和玫瑰、刺柏混用时，效果更好。但要注意它对黏膜有损伤作用。


    # (8) 适合与月桂精油混用的精油


    雪松、芫荽、桉树、天竺葵、姜、刺柏、薰衣草、柠檬、柑橘、玫瑰、迷迭香、百里香和依兰精油。


    # 6. 樟脑精油


    樟脑精油是从樟树（Cinnamomum Camphora、Laurus camphora）提取的，属于樟科。


    虽然这种精油稍有毒性，但在蒸汽疗法中，还是有很好功效的；可以用于清洁肺部、丰富感情、缓解神经压抑等方面。用于治疗心理疾病时，可以收到有益的效果。'
  - '[PAGE 91]


