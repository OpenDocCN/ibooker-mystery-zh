    ### （二）洗浴


    #### 1. 盆浴


    我们每天都需要盆浴，盆浴可以让我们身上散发甜香的味道，使我们更加自信地融入社会中。然而，真正的盆浴并不是简单地每天对身体的清洁，盆浴，是一种有较高标准的真正意义的洗澡，比仅仅的清洁有更多的作用，它可以使你在一天中有一个美好的开端，可以增加克服所有困难的信心，或者可以治愈脆弱的自我，在这一天里你都会坚强，可以为你和你的爱人，营造一个美好、安静、亲密的晚间时段，或者简单地有个轻松的好睡眠。所以你需要的是这种类型的盆浴。


    如果你有一些明亮的和喜光的植物或者是新鲜的切花（即使只有一朵也可以），在洗澡的时候，放在浴室，这对你也是一种激励。当洗澡水已经放好，往里加6~7滴精油，或是几种精油的混合物（如椒样薄荷、酸柠檬叶、迷迭香、茴香、鼠尾草、黑胡椒、茉莉），洗澡水应调到35~38℃，还要加些泡沫，要求精油与水完全混合，而不是漂浮在泡沫中，因为那样会刺激你的皮肤。当你全身浸泡在水中时，会有一种被抚摸的感觉。避免有刺眼的照明，几支蜡烛散发的柔和灯光，也会让这个世界看起来更美好一些。如果同时播放你所喜爱的歌曲，你会感到极大的愉悦，但不要听感伤或悲伤的歌曲，因为你需要把自己的注意力全放在享受洗浴中。


    #### 2. 淋浴


    因节省时间的缘故，许多人都喜欢淋浴。冲个凉水澡作为一天的开始，是现代人优越生活的好方法之一，但在日本澡堂，人们把淋浴当作尽情放松前的清洗环节。晚上，水温高些、时间长些的淋浴是把一天的疲劳冲洗干净的好方法。虽然洗淋浴是为了干净，但我们也应在这种快速清洗的过程中增添一些乐趣。在你的日常清洗结束后，在毛巾或海绵上滴
    2～3 滴你喜欢的精油，快速擦洗整个身体，使其吸入芳香的气味。


    香气疗法也会对你身体的许多部位产生影响，在这种治疗中，会刺激到嗅觉细胞，淋巴循环系统也会得到加强。因此，我们建议你使用你喜欢的精油，因为当体会到享乐的感觉时，你的身体才会有积极的反应。因为这样使用精油，与皮肤接触时间不长，不会通过皮肤产生什么功效，你选择精油的时候，单纯考虑你喜欢的气味就可以了。


    #### 3. 桑拿浴


    ##### （1）什么是桑拿浴


    桑拿浴是在干热的环境使身体大量排汗的一种洗浴方法，形成一种整体的保健疗法，是当今世界使用最广的水疗法。多数健身俱乐部和体育馆都设有桑拿浴设施。土耳其浴与桑拿浴主要的不同在于，土耳其浴用热湿的水蒸气，而桑拿浴提供的是干热的环境。


    桑拿浴里面的热度一般维持恒定，湿度保持在 15%～30%。芬兰人一般把桑拿浴的湿度调节在 40%。值得注意的是，就像开始谈到的一样，有些人认为在利用水疗时，他们更愿意使用土耳其浴或水蒸气浴，而不是桑拿浴，因为他们认为桑拿浴可能太干燥，会引起皮肤的衰老，尤其是当桑拿浴的设施没有严格按标准配备时。


    ##### （2）桑拿浴的适用精油


    了解到这些，在我们谈论桑拿浴对保健的益处时，我们愿意给你的桑拿浴推荐一些精油。多数人会把尤加利的气味与桑拿浴联系在一起，但在芬兰，桑拿浴的起源地，白桦精油的气味会与桑拿浴联系在一起，因为桦树木料在传统上被用来在桑拿浴中点火。做桑拿浴的主要目的应该有助于身体排泄废弃物，你选择使用精油能加强这个用途。下面的精油可以在自己单独做桑拿浴中使用，最受欢迎的精油包括尤加利、松树和欧薄荷等精油，不过茶树、柠檬、薰衣草、绿花白千层、快乐鼠尾草、丝柏、白桦、迷迭香、酸柠檬、葡萄柚和佛手柑等精油的使用效果也很好。


    如果你想调配一种复方油，可以参照下列配方。


    配方一：檀香 10 滴、柠檬 5 滴、安息香 1 滴、天竺葵 2 滴。


    配方二：松树 3 滴、迷迭香 3 滴、绿花白千层 2 滴、佛手柑 2 滴、葡萄柚 8 滴。


    ##### （3）怎样在桑拿浴中使用精油


    纯的没有稀释的精油绝对不能放在桑拿浴中用于加热的岩石上面，要稀释后才能使用，可以用 4 滴纯精油添加在 1L 水中使用，把芳香的水浇在桑拿浴中用于加热的岩石上面。


    ##### （4）桑拿浴的好处


    虽然“排汗疗法”或是“排汗浴”已是许多民间医学疗法的一部分，但一般人们都认为桑拿浴起源于芬兰。


    **植物精油在家庭日常生活中的应用**


    桑拿浴有保健作用的原理是坐着桑拿浴时，其中的热量能人为地刺激身体“发热”，这样身体的免疫系统会被激活，反过来，可以促进红细胞的生成。有人研究发现，在“人工发热”期间，血红细胞数量增加的程度是显著的。此外，桑拿浴还有助于体内干扰素的形成。干扰素是一种抗病毒的蛋白质，具有很强的抑制癌症的功效。桑拿浴还能加快体内化学反应的速度，因此也是清除体内累积的毒素的好方法。它不仅促进了体内的新陈代谢，还促进皮肤的各种功能，皮肤是排泄废物最重要的器官，可以通过刺激排汗，帮助清除废物。依此类推，对身体的熏蒸也会有相同的效果。


    据报道，有感冒或流感征兆的人蒸桑拿，能够预防病症的进一步发展。桑拿室的温度要比皮肤温度高约10℃，身体温度也会增加约3℃，进入“人为发烧”状态，许多医生认为，这有助于杀死有害的细菌和病毒，另外还可以加强免疫系统的功能。


    在排汗的同时，你的身体也需要更多的氧气供应，据报道，增加20%，肺部也就可以排出更多的废物。如果桑拿室的空气太干燥，就像多数美洲桑拿那样，肺部的黏膜可能也会变得干燥起来，并有可能受到伤害，因此，最好要有一定的湿度。


    **桑拿浴的其他益处。** 当往上面加热的石头上浇水时，会产生许多的阴离子并进入空气。在欧洲和前苏联所做的研究认为，阴离子有助于人体健康，对身体的疾病也有许多的疗效。桑拿热有助于身体消除乳酸，因此在强体力运动后蒸桑拿浴是个很好的选择。但刚做完运动要先休息一会儿，然后洗个淋浴让体温降下来，再蒸桑拿。


    ##### （5）桑拿浴的过程


    在欧洲水疗中，桑拿浴一般在按摩之前进行，以使肌肉放松，做好按摩的准备。这个顺序在美洲以及在印度草医学中是相反的，他们是先做按摩，然后做排汗浴，以帮助排除毒素，这些毒素是在按摩过程中被驱逐到体表的。


    ##### （6）洗桑拿的一些注意事项


    蒸桑拿15分钟，人体平均会散失0.5～1.5L的水分，因此人们在蒸桑拿之前和之后都要饮用大量的水，以防脱水。做完排汗浴后，芬兰人要喝冰水让心跳减缓下来，这样做虽然有人认为对身体有积极的作用，但我们提醒人们，不要模仿，除非你的体格足够强壮。在世界各地的SPA中，人们在做完桑拿浴后，喜欢用冷水浇身，虽然这样做的刺激性比喝冰水轻，并会让人精神振奋，但患有哮喘的人是不适合这样做的，在没有征得医生同意之前，也不应该洗桑拿。桑拿浴的热对心脏有压力。蒸桑拿会加速心脏的跳动速率，虽有人认为仅仅是加快心脏的跳动速率，而不会影响到血压。但我们建议，高血压患者在没有征得医生同意之前，不要蒸桑拿。另外的一些注意事项：


    桑拿浴不适合孕妇、孩子或老年人，也不适合患有肺炎或其他呼吸系统疾病的患者采用。


    如果你有没愈合的伤口，或有些发烧，都不要洗桑拿。


    如果你有任何健康方面的疑惑，在洗桑拿之前，首先要咨询医生。


    #### 4. 足浴和手浴


    通常人们认为足浴和手浴仅仅适用于上了年纪和身体虚弱的人，然而对人的一些特别部位来说，足浴和手浴也是一种非常好的治疗方法，还可以增进人体活力和起到放松的效果。实际上，人身体的各个器官在脚底都有反射区，可对手或足部按照反射区进行指压按摩。


    **添加精油和各色花瓣的足浴**


    ##### （1）准备足浴或手浴


    盆内放入温和的水，把 1 匙苹果酒醋与 5 滴你选择好的精油相混合，加入浴盆内。苹果酒醋可以帮助驱散精油，它本身也有治疗功效。如果你不愿意使用苹果酒醋，可以用一些有活力作用的牛奶或乳化油与精油混合，也可将精油直接滴入浴盆中使用。你可以往浴盆底部放些大理石或小鹅卵石，使你的脚可以在石头上滑动。电动的足浴效果也非常好，因为它们能搅动水和使水中充满空气，产生按摩的作用。


    ##### （2）选择足浴或手浴的精油


    可根据你喜爱的香味来选择精油，精油会给你提供各种治疗功效。


    ##### （3）足浴的益处


    足浴在缓解风湿病疼痛，抑制过度流汗，解除疲劳和脚心发热（也是身体疲劳的症状）方面有很大的帮助，也是一种劳累后放松的好方法。足浴，还能让你照顾一下平时经常忽视的双足。


    ##### （4）手浴的益处


    手浴也同样可以给你经常忽视的双手许多益处。浸泡双手可以帮助缓解关节炎或风湿病的疼痛，缓和月经痛，也是给你双手额外呵护的好方法。


    ##### （5）在足浴或手浴之后


    当浸泡 10 ~ 15 分钟后，彻底擦干，然后使用一种好的保湿膏，或是一点植物油，如荷荷芭油，也可以擦一点你在盆浴中用的那种精油。


    #### 5. SPA


    涡流浴、喷水浴、矿泉浴这些洗法的共同点是浴盆里的水是流动的，当你坐到里面时，身体会受到喷射出来水的冲击。它肯定是你劳累一天后最好的放松方式之一，还是你在体育馆做完健身运动后，预防肌肉僵硬的好办法。因为水流的冲刷可以有效帮助你释放肌肉中的乳酸。很奇怪，SPA
    这么受欢迎，却很少有人提到把精油加入其中，其实这样使用精油是很好的办法，因为水一直在循环状态中，进热水时，就可以帮助扩散精油分子。但请注意，用的必须是纯精油，混有基础油的精油，可能会阻塞
    SPA 的管道。纯的和没有稀释的精油是可挥发性的，能够自行蒸发掉，是不会给昂贵的管道系统和泵造成阻塞的，要选择不太油腻和含树脂少的精油，因为精油的残留成份会滞留在管道内。


    ##### （1）SPA浴缸中加精油的方法


    当SPA浴缸加满水后，水泵工作前，在小型的SPA浴缸里加6~8滴纯精油，在大一点的浴缸，也就是可以容纳3~4个人的浴缸中，滴10滴精油。


    ##### （2）SPA的卫生


    因为SPA浴缸自身加热水，不是每次用完后都把水排干，水的卫生就应注意了。如果仅 是你个人使用的SPA浴缸，交叉感染的危险就被排除了，但当有朋友跟你一起使用时，你就要考虑用一些适合你使用的抗细菌和病毒的精油了。另外，水也应该有规律地排放干净。


    ##### （3）SPA的好处


    持续循环的水可以激发阴离子的产生，这对你的健康是有利的，来自旋转热水流的触摸是非常好的放松和减压的办法。如果你同时享受到了你喜爱的精油特有的芳香治疗功效时，那么，SPA的感受就会变得更加美好。


    #### 6. 坐浴


    坐浴尤其适用于治疗骨盆和生殖器的疾病。坐浴或是臀浴一般是在特制的澡盆中进行的，也可以在普通的澡盆中进行。在浴盆中额外添加些精油有助于提升坐浴的质量，但在坐浴之前，一定要确保精油与水充分混合，以预防精油刺激黏膜。当坐浴时，腹部以下和生殖器（男性）要泡在水中，但身体的上部和腿要露在水外，这种洗浴的特别之处是有助于促进血液流经骨盆。茶树油是坐浴时常用到的受人欢迎的精油，因为它有很好的功效。任何一种精油都可以添加，主要看你治疗什么。


    ##### （1）坐热浴


    坐热浴的水温可以控制在35~41℃，水面不要高过你的肚脐眼，有益于治疗痔疮、肌肉问题、睾丸疼、子宫痛等。


    ##### （2）坐冷浴


    在坐冷浴时，水深只需要几英寸，水温不要低于20℃，有益于治疗便秘、阳痿、炎症。


    ##### （3）冷热交替式的坐浴


    你也可以采用冷热交替式的坐浴，你先热浴3~4分钟，然后再坐冷浴。当要结束冷热交替坐浴时，要以骨盆部位在冷浴的状态下结束，有益于治疗：腹部失调、充血、头疼、神经痛、踝骨肿胀等病症。坐浴的时间一般是20~30分钟，通常用加水的办法来维持水温。有些人喜欢用冰水来坐浴，但时间不要超过60秒。'
  mdcn: '## 6. 癌症和精油


    各种癌症产生的原因是有共同之处的，许多科学家经过不断地研究，鉴别出了各种具有致癌性（对癌细胞生长的刺激作用）的致癌物质。


    ### （1）致癌精油成份


    有一些致癌精油是禁止在芳香疗法中使用的，也禁止口服。如檫木油、黄色和褐色的樟脑油精油（含有黄樟油精）。长期地每天大剂量地使用此类油，会导致癌症。


    ### （2）癌症患者使用方法


    要轻轻地按摩，避免在肌肉上和淋巴腺附近做深层地按摩。


    不要按摩化疗过的地方。


    不要在患有皮肤癌的地方按摩。


    ### （3）癌症患者避免使用的精油


    大茴香、罗勒、甘草、丁香、肉桂、茴香、月桂、肉豆蔻等精油。


    ### （4）患有雌激素型癌症的患者避免使用的精油


    大茴香、香茅、桉树、茴香、马鞭草精油。


    ### （5）患有皮肤癌和（恶性）黑色素瘤患者避免使用的精油


    香柠檬和所有光敏性的精油。


    ## 植物精油毒性与安全


    ### 1. 有毒的精油


    虽然精油对于人们的日常保健很有益处，但是我们仍然要注意它们所含的活性成份。它们中的某些成份是不能在按摩疗法中应用的，也不能口服，因为口服和皮肤接触都会有毒性反应。


    #### （1）扁桃仁（苦的）


    氢氰酸是苦扁桃仁的主要成份，即使很小的剂量的使用都有致命的危险。要从这种精油中提取扁桃仁精华素，需要先用精馏技术结合碱漂洗把氢氰酸去掉。


    #### （2）波耳多树


    它的干燥叶片是一种草药，但它的精油功效强劲，即使很小剂量的使用都会抽搐反应。


    #### （3）菖蒲


    这种植物的根系可以当做草药，治疗神经问题、头疼和眩晕等多种症状，但精油中含有致癌物，口服精油会产生抽搐反应，对肾脏和肝脏也有危害。


    #### （4）樟脑


    虽然樟脑可以用于治疗一些感染的症状和呼吸系统的疾病，但是口服是有毒的。


    #### （5）桂皮


    这种植物可以用于治疗许多消化系统的疾病，不过在皮肤上使用会有光敏性反应，还会刺激到黏膜。


    #### （6）山葵


    使用山葵植物治疗咳嗽会有明显的效果，不过山葵精油含有烯丙基硫氰酸盐或酯（芥菜精油也含有该成份），对皮肤、眼睛、鼻腔和黏膜都有刺激作用。


    #### （7）野艾


    这种植物能治疗许多种疾病，但是它的精油是有毒的，是一种堕胎剂和神经毒素。


    #### （8）芥菜


    芥菜种子和粉末不含有烯丙基硫氰酸盐或酯成份，但是当种子与水接触后就会形成这种物质。这种精油不仅因为含有高浓度的烯丙基硫氰酸盐或酯（92%以上）而具有毒性，同时还是皮肤和黏膜的刺激剂。


    #### （9）薄荷


    这种植物常被用于治疗多种疾病，包括月经不调，还是一种激励物；不过它的精油不仅是有毒的，还是一种堕胎剂，即使少量使用对肝脏和肺部也都会有损伤。


    #### （10）芸香


    芸香可以用来治疗疾病，但其精油是有毒的，会刺激和灼烧皮肤，引起堕胎，对黏膜也有刺激性反应，其精油还是一种神经毒素，能引起光敏性反应。


    #### （11）檫木


    这种植物可以用来治疗风湿病和痛风，但其精油含有高浓度的黄樟油精成份（80%~90%），这种成份是FDA禁止使用的，因为它是一种致癌物，即使小剂量使用也会有致命的危险。


    #### （12）桧


    其精油含有桧烯，是有毒的，对皮肤也有刺激性，也是一种堕胎剂。


    #### （13）艾菊


    艾菊精油含有高浓度的有毒成份，能引起抽搐反应、呕吐、子宫出血，如果影响到呼吸系统和其他器官，还会导致死亡。


    ### 植物精油安全性


    Essential oils health


    #### （14）金钟柏


    使用这种植物的灌剂会引起并发症，其精油更是一种强效的堕胎剂、有毒物和神经毒素。


    #### （15）鹿蹄草


    鹿蹄草精油中的活性成份是甲基水杨酸盐（98%），用它制作的药膏可以治疗风湿病和其他疾病，其精油即使在很小剂量的使用中，对皮肤也可能会产生刺激作用，尤其是对阿司匹林（一种水杨酸盐）过敏的人群。鹿蹄草精油也是一种毒性很强的精油。


    #### （16）土荆芥（驱虫籽）


    驱虫籽是因为它能驱除环状寄生虫和十二指肠虫而得名的，由于它对肝脏、肾脏和心脏都有毒性，还是一种神经毒素，现在已经不再使用了。


    #### （17）苦艾


    苦艾酒饮料含有苦艾成份，经常饮用会产生幻听和幻视，还可能上瘾，并产生许多令人不愉快的副作用。它的活性成份是侧柏酮，这种化合物是一种惊厥剂和神经毒素，它的精油也有堕胎的作用。


    ## 2. IFRA限制使用的精油


    圆当归、香柠檬、苦柑橘、桂皮、枯茗、葡萄柚、柠檬酸、柠檬、万寿菊、橡树苔藓、芸香、马鞭草精油。这些精油不是被禁止使用的，而是要谨慎地使用，因为精油里含有少量可能会引起光敏性反应的活性成份。


    ## 3. IFRA禁止使用的精油


    某些精油由于具有的特殊性质，如毒性、敏感性等原因，被IFRA禁止使用，包括：刺桧、菖蒲、土木香、无花果、山葵、芥菜、秘鲁香液、马鞭草、茶、檫木、苦艾、土荆芥属植物精油。


    ## 4. 精油与集中精力


    当你在开车时、正在操作危险性的机器时，或需要集中精力时，最好避免使用能降低你注意力的精油。这些精油包括：安息香、荷兰石竹（康乃馨）、洋甘菊、天竺葵、风信子、薰衣草、肉豆蔻、牛至属植物、橙花油、肉豆蔻、檀香、甘松、颉草属植物、香根草、依兰等的精油。


    ## 七、植物精油在家庭日常生活中的应用


    ### （一）稀释方法


    #### 1. 在浴盆中添加精油


    因为精油对皮肤和黏膜有刺激，所以在往浴盆添加精油之前，先把精油稀释到合适的基础油（或是一点洗浴液）中。在结束劳累的一天后，添加精油后的盆浴肯定是你清洗放松的最佳选择之一，点燃一支蜡烛，用昏暗的灯光来安抚你紧绷的神经，是一种很好的放松方法。


    一般你在每盆浴液中添加7滴左右精油即可，但正如上述，如果你的皮肤有过敏史，或者你使用没有用过的精油，最好是把精油稀释到基础油或是洗浴液中，然后再加入浴盆中。如果你不愿意把精油与基础油混合，你可以与少量的洗浴液混合，然后把混有精油的洗浴液加入到盆浴液中。虽在盆浴中添加精油能散发迷人的香味，但这样做精油会散发得很快，因此，你可以在盆浴结束后再使用精油，可以用手把精油稀释到浴盆中。


    对于4~12岁的小孩和老人来说，每盆中添加4滴精油即可。对于1~4岁的小孩和孕妇来说，每盆中添加2滴精油即可。


    #### 2. 精油在香炉、电灯泡、蒸馏器和扩散器中的使用


    当你在香炉中使用精油时，通常的使用数量是每次6滴，但具体数量还应该依据许多因素来定。如所使用的香炉、蒸馏器或者扩散器的型号，房间的大小，房间居住者的年龄，所用精油的种类，依据这些来帮助你决定应该使用的精油数量。


    陶瓷的和电流的香炉，无论尺寸大小，都是可以使用的，但一定要记住，精油应该是漂浮在水面上的，以防止点燃。在使用瓷制的电灯丝加热的香炉时，你可以不用稀释精油；但当你使用的是金属制的电灯丝加热的香炉时，你可能要让精油浮在水面上以防止燃烧。在这种情况下，你可以首先在金属环状物上添加少量的清水，然后在水的上面滴油。当你使用这些瓷制的或金属制的环状物时，你也需要看看你安置的灯泡的瓦数（强度），因为瓦数大的光要比小的发热量大得多。如果你在一个加热表面上放置一碗水，你可以往水里添加约6滴精油，用量还要依据房间大小和所用精油的种类而定。使用茶蜡在下面做热源的扩散器，一般不太热，在多数情况，精油被安放在水晶饰品上，以协助扩散香气，也可以放在扩散器上面的部分，这样，水就能进入油滴下的地方。蜡烛做热源的扩散器，在使用时一定要注意小心防火，请记住，精油是挥发性的和易燃的。大多数加湿器都有一个适合倒精油的地方，但要注意，不能把精油加到扩散器蓄水池的水中，因为，它会阻碍扩散器的正常工作，也会造成一定的危险。如果你想在喷雾器（医用的）中使用精油，请与制造商联系，征求使用方法，因为某些精油是不能在这些医学的器械中使用的。


    在老年人或小孩房间使用精油时，要减少在香炉、蒸发器、扩散器中使用精油的数量。


    #### 3. 在面霜成洗液中稀释精油


    当你在没有香味的面霜底料上添加精油时，就把精油具有的芳香和治疗功效添加到了面霜中，这样给你提供一种既使用精油，又“没有油”的方法，这是一种特别有效的方法。添加到面霜或洗液中的精油不要超过2%，精油要充分与面霜或洗液混合，所选择的精油要没有过敏反应，配置好的面霜和洗液要放在密封的容器内，于冷凉处保存。


    **表7-1 底料面霜和洗液及精油在不同年龄段中用量**


    | 年龄 | 底料面霜或洗液的用量（g） | 精油的用量（滴） |

    | :--- | :--- | :--- |

    | 65岁以上 | 50 | 10 |

    | 12~65 | 50 | 20 |

    | 4~12 | 50 | 10 |

    | 1~4 | 50 | 4 |

    | 1岁以下 | 50 | 2 |

    | 婴儿 | 50 | 4 |


    #### 4. 在洗发液中添加些精油


    精油放在洗发液中使用时，一定要把精油稀释到合适的浓度，以免对眼睛造成伤害。要小心选择没有刺激的精油或是不会引起过敏的精油，因为洗发液很容易进入人的眼睛。一般情况下迷迭香精油对头发护理效果良好。


    **表7-2 不同年龄使用洗发液及精油数量**


    | 年龄 | 洗发液数量（mL） | 精油数量（滴） |

    | :--- | :--- | :--- |

    | 65岁以上 | 100 | 10 |

    | 12~65岁 | 100 | 20 |

    | 4~12岁 | 100 | 10 |

    | 1~4岁 | 100 | 2 |

    | 1岁以下 | 100 | 不推荐使用 |

    | 孕妇 | 100 | 5 |


    ### （二）洗浴


    #### 1. 盆浴


    我们每天都需要盆浴，盆浴可以让我们身上散发甜香的味道，使我们更加自信地融入社会中。然而，真正的盆浴并不是简单地每天对身体的清洁，盆浴，是一种有较高标准的真正意义的洗澡，比仅仅的清洁有更多的作用，它可以使你在一天中有一个美好的开端，可以增加克服所有困难的信心，或者可以治愈脆弱的自我，在这一天里你都会坚强，可以为你和你的爱人，营造一个美好、安静、亲密的晚间时段，或者简单地有个轻松的好睡眠。所以你需要的是这种类型的盆浴。


    如果你有一些明亮的和喜光的植物或者是新鲜的切花（即使只有一朵也可以），在洗澡的时候，放在浴室，这对你也是一种激励。当洗澡水已经放好，往里加6~7滴精油，或是几种精油的混合物（如椒样薄荷、酸柠檬叶、迷迭香、茴香、鼠尾草、黑胡椒、茉莉），洗澡水应调到35~38℃，还要加些泡沫，要求精油与水完全混合，而不是漂浮在泡沫中，因为那样会刺激你的皮肤。当你全身浸泡在水中时，会有一种被抚摸的感觉。避免有刺眼的照明，几支蜡烛散发的柔和灯光，也会让这个世界看起来更美好一些。如果同时播放你所喜爱的歌曲，你会感到极大的愉悦，但不要听感伤或悲伤的歌曲，因为你需要把自己的注意力全放在享受洗浴中。


    #### 2. 淋浴


    因节省时间的缘故，许多人都喜欢淋浴。冲个凉水澡作为一天的开始，是现代人优越生活的好方法之一，但在日本澡堂，人们把淋浴当作尽情放松前的清洗环节。晚上，水温高些、时间长些的淋浴是把一天的疲劳冲洗干净的好方法。虽然洗淋浴是为了干净，但我们也应在这种快速清洗的过程中增添一些乐趣。在你的日常清洗结束后，在毛巾或海绵上滴
    2～3 滴你喜欢的精油，快速擦洗整个身体，使其吸入芳香的气味。


    香气疗法也会对你身体的许多部位产生影响，在这种治疗中，会刺激到嗅觉细胞，淋巴循环系统也会得到加强。因此，我们建议你使用你喜欢的精油，因为当体会到享乐的感觉时，你的身体才会有积极的反应。因为这样使用精油，与皮肤接触时间不长，不会通过皮肤产生什么功效，你选择精油的时候，单纯考虑你喜欢的气味就可以了。


    #### 3. 桑拿浴


    ##### （1）什么是桑拿浴


    桑拿浴是在干热的环境使身体大量排汗的一种洗浴方法，形成一种整体的保健疗法，是当今世界使用最广的水疗法。多数健身俱乐部和体育馆都设有桑拿浴设施。土耳其浴与桑拿浴主要的不同在于，土耳其浴用热湿的水蒸气，而桑拿浴提供的是干热的环境。


    桑拿浴里面的热度一般维持恒定，湿度保持在 15%～30%。芬兰人一般把桑拿浴的湿度调节在 40%。值得注意的是，就像开始谈到的一样，有些人认为在利用水疗时，他们更愿意使用土耳其浴或水蒸气浴，而不是桑拿浴，因为他们认为桑拿浴可能太干燥，会引起皮肤的衰老，尤其是当桑拿浴的设施没有严格按标准配备时。


    ##### （2）桑拿浴的适用精油


    了解到这些，在我们谈论桑拿浴对保健的益处时，我们愿意给你的桑拿浴推荐一些精油。多数人会把尤加利的气味与桑拿浴联系在一起，但在芬兰，桑拿浴的起源地，白桦精油的气味会与桑拿浴联系在一起，因为桦树木料在传统上被用来在桑拿浴中点火。做桑拿浴的主要目的应该有助于身体排泄废弃物，你选择使用精油能加强这个用途。下面的精油可以在自己单独做桑拿浴中使用，最受欢迎的精油包括尤加利、松树和欧薄荷等精油，不过茶树、柠檬、薰衣草、绿花白千层、快乐鼠尾草、丝柏、白桦、迷迭香、酸柠檬、葡萄柚和佛手柑等精油的使用效果也很好。


    如果你想调配一种复方油，可以参照下列配方。


    配方一：檀香 10 滴、柠檬 5 滴、安息香 1 滴、天竺葵 2 滴。


    配方二：松树 3 滴、迷迭香 3 滴、绿花白千层 2 滴、佛手柑 2 滴、葡萄柚 8 滴。


    ##### （3）怎样在桑拿浴中使用精油


    纯的没有稀释的精油绝对不能放在桑拿浴中用于加热的岩石上面，要稀释后才能使用，可以用 4 滴纯精油添加在 1L 水中使用，把芳香的水浇在桑拿浴中用于加热的岩石上面。


    ##### （4）桑拿浴的好处


    虽然“排汗疗法”或是“排汗浴”已是许多民间医学疗法的一部分，但一般人们都认为桑拿浴起源于芬兰。


    **植物精油在家庭日常生活中的应用**


    桑拿浴有保健作用的原理是坐着桑拿浴时，其中的热量能人为地刺激身体“发热”，这样身体的免疫系统会被激活，反过来，可以促进红细胞的生成。有人研究发现，在“人工发热”期间，血红细胞数量增加的程度是显著的。此外，桑拿浴还有助于体内干扰素的形成。干扰素是一种抗病毒的蛋白质，具有很强的抑制癌症的功效。桑拿浴还能加快体内化学反应的速度，因此也是清除体内累积的毒素的好方法。它不仅促进了体内的新陈代谢，还促进皮肤的各种功能，皮肤是排泄废物最重要的器官，可以通过刺激排汗，帮助清除废物。依此类推，对身体的熏蒸也会有相同的效果。


    据报道，有感冒或流感征兆的人蒸桑拿，能够预防病症的进一步发展。桑拿室的温度要比皮肤温度高约10℃，身体温度也会增加约3℃，进入“人为发烧”状态，许多医生认为，这有助于杀死有害的细菌和病毒，另外还可以加强免疫系统的功能。


    在排汗的同时，你的身体也需要更多的氧气供应，据报道，增加20%，肺部也就可以排出更多的废物。如果桑拿室的空气太干燥，就像多数美洲桑拿那样，肺部的黏膜可能也会变得干燥起来，并有可能受到伤害，因此，最好要有一定的湿度。


    **桑拿浴的其他益处。** 当往上面加热的石头上浇水时，会产生许多的阴离子并进入空气。在欧洲和前苏联所做的研究认为，阴离子有助于人体健康，对身体的疾病也有许多的疗效。桑拿热有助于身体消除乳酸，因此在强体力运动后蒸桑拿浴是个很好的选择。但刚做完运动要先休息一会儿，然后洗个淋浴让体温降下来，再蒸桑拿。


    ##### （5）桑拿浴的过程


    在欧洲水疗中，桑拿浴一般在按摩之前进行，以使肌肉放松，做好按摩的准备。这个顺序在美洲以及在印度草医学中是相反的，他们是先做按摩，然后做排汗浴，以帮助排除毒素，这些毒素是在按摩过程中被驱逐到体表的。


    ##### （6）洗桑拿的一些注意事项


    蒸桑拿15分钟，人体平均会散失0.5～1.5L的水分，因此人们在蒸桑拿之前和之后都要饮用大量的水，以防脱水。做完排汗浴后，芬兰人要喝冰水让心跳减缓下来，这样做虽然有人认为对身体有积极的作用，但我们提醒人们，不要模仿，除非你的体格足够强壮。在世界各地的SPA中，人们在做完桑拿浴后，喜欢用冷水浇身，虽然这样做的刺激性比喝冰水轻，并会让人精神振奋，但患有哮喘的人是不适合这样做的，在没有征得医生同意之前，也不应该洗桑拿。桑拿浴的热对心脏有压力。蒸桑拿会加速心脏的跳动速率，虽有人认为仅仅是加快心脏的跳动速率，而不会影响到血压。但我们建议，高血压患者在没有征得医生同意之前，不要蒸桑拿。另外的一些注意事项：


    桑拿浴不适合孕妇、孩子或老年人，也不适合患有肺炎或其他呼吸系统疾病的患者采用。


    如果你有没愈合的伤口，或有些发烧，都不要洗桑拿。


    如果你有任何健康方面的疑惑，在洗桑拿之前，首先要咨询医生。


    #### 4. 足浴和手浴


    通常人们认为足浴和手浴仅仅适用于上了年纪和身体虚弱的人，然而对人的一些特别部位来说，足浴和手浴也是一种非常好的治疗方法，还可以增进人体活力和起到放松的效果。实际上，人身体的各个器官在脚底都有反射区，可对手或足部按照反射区进行指压按摩。


    **添加精油和各色花瓣的足浴**


    ##### （1）准备足浴或手浴


    盆内放入温和的水，把 1 匙苹果酒醋与 5 滴你选择好的精油相混合，加入浴盆内。苹果酒醋可以帮助驱散精油，它本身也有治疗功效。如果你不愿意使用苹果酒醋，可以用一些有活力作用的牛奶或乳化油与精油混合，也可将精油直接滴入浴盆中使用。你可以往浴盆底部放些大理石或小鹅卵石，使你的脚可以在石头上滑动。电动的足浴效果也非常好，因为它们能搅动水和使水中充满空气，产生按摩的作用。


    ##### （2）选择足浴或手浴的精油


    可根据你喜爱的香味来选择精油，精油会给你提供各种治疗功效。


    ##### （3）足浴的益处


    足浴在缓解风湿病疼痛，抑制过度流汗，解除疲劳和脚心发热（也是身体疲劳的症状）方面有很大的帮助，也是一种劳累后放松的好方法。足浴，还能让你照顾一下平时经常忽视的双足。


    ##### （4）手浴的益处


    手浴也同样可以给你经常忽视的双手许多益处。浸泡双手可以帮助缓解关节炎或风湿病的疼痛，缓和月经痛，也是给你双手额外呵护的好方法。


    ##### （5）在足浴或手浴之后


    当浸泡 10 ~ 15 分钟后，彻底擦干，然后使用一种好的保湿膏，或是一点植物油，如荷荷芭油，也可以擦一点你在盆浴中用的那种精油。


    #### 5. SPA


    涡流浴、喷水浴、矿泉浴这些洗法的共同点是浴盆里的水是流动的，当你坐到里面时，身体会受到喷射出来水的冲击。它肯定是你劳累一天后最好的放松方式之一，还是你在体育馆做完健身运动后，预防肌肉僵硬的好办法。因为水流的冲刷可以有效帮助你释放肌肉中的乳酸。很奇怪，SPA
    这么受欢迎，却很少有人提到把精油加入其中，其实这样使用精油是很好的办法，因为水一直在循环状态中，进热水时，就可以帮助扩散精油分子。但请注意，用的必须是纯精油，混有基础油的精油，可能会阻塞
    SPA 的管道。纯的和没有稀释的精油是可挥发性的，能够自行蒸发掉，是不会给昂贵的管道系统和泵造成阻塞的，要选择不太油腻和含树脂少的精油，因为精油的残留成份会滞留在管道内。


    ##### （1）SPA浴缸中加精油的方法


    当SPA浴缸加满水后，水泵工作前，在小型的SPA浴缸里加6~8滴纯精油，在大一点的浴缸，也就是可以容纳3~4个人的浴缸中，滴10滴精油。


    ##### （2）SPA的卫生


    因为SPA浴缸自身加热水，不是每次用完后都把水排干，水的卫生就应注意了。如果仅 是你个人使用的SPA浴缸，交叉感染的危险就被排除了，但当有朋友跟你一起使用时，你就要考虑用一些适合你使用的抗细菌和病毒的精油了。另外，水也应该有规律地排放干净。


    ##### （3）SPA的好处


    持续循环的水可以激发阴离子的产生，这对你的健康是有利的，来自旋转热水流的触摸是非常好的放松和减压的办法。如果你同时享受到了你喜爱的精油特有的芳香治疗功效时，那么，SPA的感受就会变得更加美好。


    #### 6. 坐浴


    坐浴尤其适用于治疗骨盆和生殖器的疾病。坐浴或是臀浴一般是在特制的澡盆中进行的，也可以在普通的澡盆中进行。在浴盆中额外添加些精油有助于提升坐浴的质量，但在坐浴之前，一定要确保精油与水充分混合，以预防精油刺激黏膜。当坐浴时，腹部以下和生殖器（男性）要泡在水中，但身体的上部和腿要露在水外，这种洗浴的特别之处是有助于促进血液流经骨盆。茶树油是坐浴时常用到的受人欢迎的精油，因为它有很好的功效。任何一种精油都可以添加，主要看你治疗什么。


    ##### （1）坐热浴


    坐热浴的水温可以控制在35~41℃，水面不要高过你的肚脐眼，有益于治疗痔疮、肌肉问题、睾丸疼、子宫痛等。


    ##### （2）坐冷浴


    在坐冷浴时，水深只需要几英寸，水温不要低于20℃，有益于治疗便秘、阳痿、炎症。


    ##### （3）冷热交替式的坐浴


    你也可以采用冷热交替式的坐浴，你先热浴3~4分钟，然后再坐冷浴。当要结束冷热交替坐浴时，要以骨盆部位在冷浴的状态下结束，有益于治疗：腹部失调、充血、头疼、神经痛、踝骨肿胀等病症。坐浴的时间一般是20~30分钟，通常用加水的办法来维持水温。有些人喜欢用冰水来坐浴，但时间不要超过60秒。'
