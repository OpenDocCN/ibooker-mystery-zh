  md: '(6) 韧带按摩

    这种按摩技术主要是按摩韧带，韧带是肌肉的连接组织，按摩韧带，有助于身体恢复平衡。


    # **3. 做按摩应注意事项**


    +   - **刚完成暴饮（含酒精的饮料）、暴食或过瘾性物质的人，不能做按摩。**

    - **做完外科手术的人，不能做按摩，除非得到医生的许可。**

    - **有心脏病的人，一般情况下，仅能做一些轻微的按摩，以促进循环。**

    - **癌症患者不适宜做按摩。**

    - **发烧或带有传染性疾病的人，不能做按摩。**

    - **患有静脉曲张疾病的人，不可以直接在患者的静脉曲张处按摩，也不能给患有血栓症或静脉炎的人按摩。**

    - **可以在关节红肿、痛风、关节炎或风湿病患处按摩，但如果按摩地方有剧烈疼痛，应停止按摩。**

    - **孕妇要征得医生同意后才可做按摩。**


    # **(二) 芳香按摩手法**


    芳香按摩比按摩更有整体治疗效果，它能够改善身体的疲劳，安抚心灵，达到平衡身体、心智与灵性的目的。植物精油具有刺激人体各种腺体及内脏的功能，按摩时加入植物精油，会使按摩的效果更好，由内而外对肌肤进行调理，使皮肤真正的细腻、光泽、红润。要提高保健和治疗效果，在适当的穴位或部位上运用相宜的手法，是按摩过程中重要的环节。根据手法的动作形态，按摩手法可归纳为摩擦类、挤压类、摆动类、振动类、叩击类、运动关节类六类手法。


    # **1. 摩擦类手法**


    以指、掌或肢体的其他部位在体表做直线或环形移动称为摩擦类手法。


    # **(1) 推法**


    推法：用指、掌或肘着力于机体的一定部位，做单方向的直线移动的手法。具有疏通经络，促进血液循环的作用。


