    5) 双手轻轻在面部涂抹约4次，约2秒钟。


    6) 用凉清水洗面部约10秒钟。


    7) 最后用干燥软毛巾或柔软卫生纸蘸干面部即可。


    (2) 注意事项


    1) 面部干燥。植物油洗面时，切记面部是干燥状态，有汗或刚洗过脸都不能进行。因为，水会阻碍油在皮肤内的渗透能力。


    2) 用油量要充足。油洗面时，油的用量要至少1mL。因为，皮肤对该油的吸收量很大，量少时污物的溶解性会大幅降低。


    3) 弧形洗面法。以弧形的手法用手指局部按摩至全面部，有利于把毛孔内的堆积物溶解出。这是油洗面祛痤疮的关键环节，时间可以延长些。


    4) 彻底清洗双手。双手经长时间按摩面部后，会残留有污物的油，可以用香皂彻底洗掉，这也就间接把污物从面部清除掉了。


    5) 香皂用量绝对要适当。油洗面的成败因素就在如何把溶解出来的面部污物再从脸上洗掉的同时在脸部存留一层保护膜。所以，香皂用量要控制好，香皂用量多不容易在下面的环节洗掉；用量少又达不到清除污物的目的。


