  md: '# # 植物精油在家庭日常生活中的应用


    (2) 精油自然挥发


    这是另一种蒸发的办法，在碗柜厨或抽屉里放几个滴有精油的小棉球。不过要小心，不能让精油接触到你的衣服，因为精油会弄脏衣服。有些人用这种方式预防衣服被虫蛀，还能给他们的衣橱增添香味。通常使用丁香精油预防虫蛀。


    (3) 蒸汽疗法有助于治疗呼吸道疾病，治疗咽喉感染、缓解鼻黏膜炎、缓解精神和身体的疲劳、缓解紧张和焦虑、镇静神经系统。


    # ## 2. 蒸汽吸入法与精油


    当蒸汽与精油配合使用时，它们是一种治疗许多疾病的非常有效的方法，尤其适用于上呼吸道感染、鼻腔和窦炎。患有哮喘疾病的患者不应该使用这种治疗方法。


    (1) 蒸汽吸入法适用症状及精油


    适用于治疗呼吸困难的精油：雪松、尤加利或松树精油。


    治疗支气管炎的精油：罗勒、安息香、雪松、丁香、尤加利、乳香、松树、檀香、迷迭香、茶树和百里香等精油。


    治疗感冒的精油：甘草、黑胡椒、丁香、姜、没药、柑橘、松树、迷迭香或茶树精油。


    治疗咳嗽的精油：安息香、黑胡椒、小豆蔻、雪松、乳香、欧薄荷、迷迭香或丝柏精油。


    治疗窦炎的精油：罗勒、迷迭香、茶树、尤加利、薰衣草、欧薄荷或牛至精油。


    (2) 蒸汽吸入法的使用说明


    在一个碗里倒入一些热水，滴3滴你选择好的精油，把头放在碗上面约30cm处，头上盖一块毛巾，这样四周都被罩住了，闭上眼睛，用鼻子做深呼吸1~2分钟。如果你感到这种治疗对你已经够了，就把毛巾揭起来，让新鲜的空气进来，用嘴呼吸一段时间，然后再重复刚才的做法。如果你在任何时候感到不舒服都可以结束这种治疗。当给孩子或老人使用这种治疗时，一定要确保他们不会因太靠近碗而有烫伤的危险，或用于蒸汽的碗翻了，烫伤他们。


    # ## 3. 做空气清新剂


    你可以不费力地花费很少的钱来使每个房间的空气都变得清新起来，可以得到各种各样的芳香气味。这点太容易做到了，事后，你会迷惑，自己以前怎么没有想到呢？这类空气清新剂的核心是精油。虽然纯正的精油价格昂贵，但你需要的仅是一点点，回报是巨大的。从植物材料中提取的纯天然精油散发出的香气不仅会充满你的房间，而且你也能从精油固有的治疗成份中获益。


    (1) 做空气清新剂方法'
