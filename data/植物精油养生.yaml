- img_proc: true
  md: '# # 2. 糖尿病和精油


    芳香疗法中的按摩方式可以促进循环，对糖尿病人有益。但应避免使用圆当归精油。而应选用桉树、天竺葵和刺柏精油。


    # # 3. 心脏病和精油


    心脏病患者在用精油进行芳香疗法时，最好要避免使用椒样薄荷精油。而心脏外科治疗后，使用温和的橙花精油进行按摩，能够使病人心情平静，而且对心脏有滋补和止痉挛的作用。


    # # 4. 肝脏中毒和精油


    肝脏对人体有着很重要的作用，它能够帮助碳水化合物和脂类的代谢，分泌胆汁并合成蛋白，但很多人认为肝脏只是一个过滤血液中毒素的器官。一些精油可致使肝中毒，但这不是由于在按摩过程中皮肤的吸收，而是指由于吞服精油而导致的，所以口服精油只能在职业医师的指导下进行。


    +   1) 吞服可能导致肝中毒的精油：八角、罗勒、干草、布枯、肉桂、肉桂、丁香、茴香、龙蒿。

    2) 下列精油是禁用的，口服和外用都有毒性：扁桃仁油（苦）、菖蒲、樟脑、山葵、毛果芸香、艾属植物、芥末油、茄属植物、薄荷油（欧洲和北美的）、芸香、檫木、青蒿、刺蓟麻、艾菊、金钟柏、鹿蹄草、土荆芥属植物、苦艾等精油。


    # # 5. 癫痫症和精油


    患有癫痫的人群，在接受芳香理疗师的治疗时，或使用精油时，要格外小心。

    癫痫患者使用精油注意事项：

    1) 不应使用的精油有：迷迭香、茴香、鼠尾草、牛膝草樟脑、长穗薰衣草、艾菊、金钟柏和苦艾。因为这些精油含有神经毒素，会产生惊厥的后果。还有包括含有神经毒素的植物，如肉豆蔻。

    2) 中医中，牛膝草对治疗癫痫症是有作用的，但牛膝草精油却不能使用，因为芳香疗法和中医学的治病原理是有区别的。

    3) 特别注意不要在蒸汽疗法的香炉熏香中使用这些精油，也不要在准备洗浴的材料中使用；在用做其他治疗前，要先向医生进行咨询。

    癫痫症家族史和发烧的人群也应注意。

    有研究表明，一些精油对癫痫患者是有好处的，可以使用于芳香疗法中的按摩方法。

    虽然传统医学从来没有用精油治疗癫痫症的先例，但在英国伯明翰伊丽莎白皇家医院'
