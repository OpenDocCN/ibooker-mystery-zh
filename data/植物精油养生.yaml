  md: '# # 九、植物精油在情绪调节中的应用

    Essential oils health Essential oils health


    在心理学上，情绪是指人发自本能的一种内心表达，譬如愉快的时候高歌，生气的时候暴躁，焦虑的时候沮丧……人有悲欢离合，喜怒哀乐，各种情绪的产生和存在都有它的道理，如果长期压抑不良情绪，不仅会影响人的心理健康，还会导致身体上的不适。每个人的承受能力都是有限的，一旦情绪积攒到一定程度无从宣泄，就会轰然倒塌，以致精神崩溃。通过一定途径表达内心情绪，抒发感情，才是健康的心理状态。


    精油最初来到英国的时候，有些人说它主要是与治疗压力有关。后来，在医院，发现精油最能有效缓解压力，提升精神以及减轻一些因疾病而带来的不适感。精油，一剂调节情绪的良药，它所散发的阵阵香气，通过嗅觉，传到大脑中枢反射区，可以有效刺激大脑的情绪反应，对疲倦、消极或悲观等负面情绪有很好的改善作用。


    ---

    ### （一）辅助睡眠


    有一位高血压患者，由于长期服用降压药物而发生很多不良的副作用，令他非常苦恼。在一位医生朋友的建议下，他开始尝试在精油的辅助下减低药物用量，护士每两三天来测量他的血压，他能每3个月逐次减少药物用量。最后，他的药物分量减少了87.5%，而所有他不希望有的副作用都消失了。在刚开始减少药物分量的时候，这位患者非常恐慌，因为他不知道一旦开始减少药物用量，他会有什么感觉。这种不安导致他不能很好入睡，他的妻子在芳疗师的帮助下，将马郁兰和依兰两种精油滴在纸巾上，放在枕边。这样，他不但能酣睡，早上醒来时也没有因为减少药量的事感到不安。从中体现了马郁兰、依兰精油对睡眠的调节作用。马郁兰能镇静神经系统及帮助睡眠；放松紧缩的胸口——通常是恐慌的症状，并可调理呼吸，最初阶段能明显的放慢急速的呼吸，还能镇静、平衡心跳以及调理神经。依兰精油可放慢急速的心跳，放松跟消化系统相连的痉挛，那些痉挛当我们恐慌时会更加严重。


    ---

