    当你在调配复方精油或给自己调配精油面霜时，你可能希望把一种精油的某些治疗功效也添加进去。这样，当把不同的精油混合在一起的时候，就能创造出某种协同增效的优势。不过，你可能仅注意到复方精油的治疗功效，不会想到香味也是需要“平衡”和协调的，这就是调香时要注意的问题了。在
