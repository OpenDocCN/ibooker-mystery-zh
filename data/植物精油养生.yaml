    # **10.香茅精油**


    - 香茅精油是从亚香茅植物（Cymbopogon nardus）中提取出来的，属于禾本科香茅属。虽然这种精油早就被认定是一种驱虫精油（尤其是对携带疟疾的蚊子有效）。它对于清新大脑、净化房间、使皮肤软化也有很大的益处；还可以用于清洁油性皮肤和汗脚。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_73_0.png)


    - （1）精油的性质

    - 香茅精油味道清甜，有股柠檬味。


    - （2）来源

    - 原产于斯里兰卡和爪哇，是从一种坚硬的草中提取的。这种芬芳的多年生植物，可以长到1m高，使用在蜡烛里很受欢迎，可用于驱虫；香水、肥皂、皮肤清洗液和除臭剂里也常用到香茅精油。


    - （3）提取方法

    - 香茅精油是以切细的新鲜草或干燥（也可部分干燥）的草为原料，采用蒸汽蒸馏法提取的。


    - （4）化学成份

