  md: '- 味道强烈的精油，带有强烈的辛辣味道，暗含有柠檬和胡椒的味道，它闻起来就像真正的生姜。


    # - （2）来源

    - 这种植物起源于印度、中国和爪哇，在非洲和西印度也有分布。可能是在 10 ~ 15 世纪，它被当作调味品和香料引入欧洲。

    - 姜是一种多年生植物，可以长到大约 60cm 高，生有粗壮的结状根茎。每年从狭长的尖枪状叶片间长出茎，直接从根部长出黄色或白色穗状花朵。

    - 在很早的时期，它就被当作药物使用了，在梵语和中文的文献中曾有记载，在古希腊、罗马和阿拉伯文学作品中也提到过。亚洲药物学，使用干姜治疗胃部疾病，如胃疼、痢疾和恶心呕吐。我国也用它促进心脏功能，改善黏液分泌状况。

    - 姜英文名字 ginger 据说来源于印度的一个地区名 Gingi。在那里人们用姜制作茶饮，可以用于治疗反胃症状。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_113_0.png)


    - （3）提取方法

    - 这种精油是以没有剥皮的或是干燥的地上部分的根茎为原料，茎叶枯萎后适宜采收。亩产1500 ~ 1750kg。将姜块洗净冷榨后，采用蒸汽蒸馏法蒸馏24小时提取，得油率在0.27%
    ~ 0.33%。

    - （4）化学成份

    - 松萜或蒎烯、茨烯、桉树脑、芳樟醇、龙脑、松油精或萜品烯、橙花醇、橙花醛、香叶醇、香叶醛、乙酸香叶酯、红〔甜〕没药（萜）烯和姜烯。

    - （5）治疗功效

    - 姜精油可以用于治疗骨折、风湿性病、关节炎、瘀伤、痈、反胃恶心、宿醉、旅行和乘船呕吐、感冒和流感、黏膜炎、充血、咳嗽、鼻窦炎、皮肤疼痛、咽喉疼、痢疾、疝气、抽筋、打寒战和发烧。

    - （6）使用注意事项

    - 姜精油没有毒性和刺激性（除非高浓度使用）。但是，对过敏性皮肤有刺激作用，也会引起光敏性反应。

    - （7）用法

    - 姜精油非常适合治疗感冒和流感，以及晕车恶心、运动呕吐、清晨恶心、肌肉疼和关节疼痛。它温和的功效适用于感觉孤独、冬天压抑。它的增添活力特性能够促进性欲。'
