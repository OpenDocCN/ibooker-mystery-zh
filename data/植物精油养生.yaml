  md: '# # 2. 留兰香精油


    留兰香精油是从薄荷植物（Mentha spicata，Mentha viridis）中提取的，属于唇形科，又分为大叶留兰香和小叶留兰香。又称为绿薄荷和荷兰薄荷。


    虽然不如椒样薄荷受欢迎，但是这种精油更加温和，可以给孩子使用；它对消化系统有更好的功效，可以缓解肠胃气胀、便秘、呕吐和反胃；对呼吸系统也有疗效，可以缓解咳嗽、支气管炎、哮喘、黏膜炎和窦炎。在皮肤上使用，可以减缓瘙痒；对大脑也有一定的刺激作用。


    # ### （1）精油性质


    它与椒样薄荷精油的气味相似，但是甜味淡些，颜色淡黄或淡绿色。


    # ### （2）来源


    它原产于地中海地区，是一种多年生的草本植物，茎坚硬，高度约1m。叶片亮绿色、长矛形状、叶缘深锯齿状。花色粉红色或淡紫色。与椒样薄荷不同，留兰香没有含高浓度的薄荷醇。古希腊人用它熏香洗浴。它在治疗性病方面享有盛名。在中世纪时期，它被用于治疗牙龈疼，还可以美白牙齿。美国产量占世界产量的80%以上。


    # ### （3）提取方法


    留兰香精油是以开花时期的地上部分为原料，采用蒸汽蒸馏技术提取，按鲜重计，出油率为0.3%～0.4%。割下的鲜草应晒至半干（即鲜料失水50%以上），再进行蒸馏。


    # ### （4）化学成份


    松萜或蒎烯、香芹酮、桉树脑、芳樟醇、柠檬油精、月桂（香叶）烯、石竹（萜）烯和薄荷酮。荷兰薄荷精油仅含有0.5%的薄荷酮，而椒样薄荷含有40%的薄荷酮。


    # ### （5）治疗功效


    1）当你精神疲惫，需要刺激振奋的时候，留兰香精油就是你需要的东西。虽然它与椒样薄荷精油有许多相似的功效，但是由于它含有的薄荷醇非常少，对皮肤的刺激性就小，很适合孩子们使用。


    2）对于治疗消化系统的疾病非常有帮助，如肠胃气胀、便秘、痢疾和反胃恶心。它还可以舒缓胃部肌肉不适的症状，治疗打嗝。


    3）有助于治疗头痛、偏头痛、神经紧张、疲劳和压力过大症状。


    4）有利于呼吸系统，可以治疗哮喘、支气管炎、黏膜炎和窦炎。


    5）对皮肤的作用，能缓解瘙痒症，有助于治疗痤疮、皮炎。


    6）对于女性的健康，它可以缓解月经量和白带过多，保持尿路畅通。


    # ### （6）使用注意事项


    无毒、无刺激性和光敏性。


    # ### （7）用法'
