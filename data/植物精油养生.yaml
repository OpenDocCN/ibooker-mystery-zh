    本。它是古埃及人最早使用香草植物中的一种。在圣经和所罗门颂歌中都有它的记载，其中在约翰记里，玛丽曾用甘松精油涂抹耶稣的脚。贵妇用它作为香水和香体的制剂。


    # (3) 提取方法


    甘松精油是以干燥压碎的根状茎为原材料的，采用蒸汽蒸馏法提取，出油率在 1% ~3%。


    # (4) 治疗功效


    甘松精油对缓解紧张、压力、偏头痛、消化不良和失眠有效。具有返老还童的功效，尤其适用于老化的皮肤，可以有助于治疗敏感症、皮肤感染和皮疹。


    # (5) 使用注意事项


    还没有发现甘松精油的不良反应，但与其他的精油混合使用时也要谨慎。


    # (6) 用法


    1) 蒸汽治疗或稀释在盆浴中使用

    在蒸汽治疗或稀释在盆浴中使用，甘松精油有助于缓解紧张和压力，治疗失眠症。


    2) 做复方按摩油的成份

    做复方按摩油的成份，甘松精油有助于治疗紧张、压力大、偏头痛和失眠症状。


    # (7) 适合与甘松精油混用的精油


    薰衣草、柠檬、快乐鼠尾草、橙花、广藿香和香根草精油。


