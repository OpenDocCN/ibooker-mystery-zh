    金盏草有很强的抗感染和医治创伤的功效，当用于治疗难处理的创伤、溃疡、褥疮、静脉曲张、瘀伤、皮疹和湿疹时，都能取得不错的效果。金盏草油有助于治疗疼痛、红肿和皮肤发痒，对烧伤、湿疹和尿湿疹以及乳头撕裂疼痛有效。它还能用于治疗静脉曲张。


    金盏草按摩油具有康复、抚慰和软化功效，当配制复方按摩油或复方基础油时，选择金盏草油是明智的。


    # **4.月见草油**


    在远古时代，北美洲的印第安医师使用这种植物做成灌剂，用于治疗伤口。月见草油的脂肪酸含量特别高，尤其是γ-亚麻酸的含量，它的营养功效对身体有重要的作用，因为它会影响到身体内许多酶的活性。


    当用月见草油作为精油的基础油媒介时，它是一种手感性特别好的油；有着极好的保湿功效；在皮肤表面使用，可以治疗湿疹、牛皮癣、经前综合征（PMS）、风湿病、关节炎，并有减肥的作用。月见草油也可以用作面部按摩油，但是由于它黏性较大，应该与其他油混用，如葡萄籽油。有一种说法，当在婴儿和幼童身上涂抹这种油时，可以缓解他们的活动过度。


    由于月见草油的保质期不长，有个好办法，就是把它与小麦胚芽油混合，可以延长保存时间。


