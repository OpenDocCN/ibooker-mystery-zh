    (8) 适合与樟脑精油混用的精油

    罗勒、白千层、甘菊、薰衣草和蜜蜂花精油。


    # ### 7. 柠檬戟叶马鞭草精油


    柠檬戟叶马鞭草精油是从柠檬马鞭草植物（Lippia citriodora）提取的，属于防臭木科，又称为柠檬过江藤、防臭木。


    这种精油最大的特点是可以驱除压抑，刺激肝脏功能，帮助消化系统和呼吸系统；同时，还可以软化肌肤和防止虚胖。


    (1) 精油性质

    柠檬戟叶马鞭草精油有清新、甘甜的柠檬味，颜色淡橄榄色或黄色。


    (2) 来源

    它是多年生的落叶灌木，可以长到5m高，茎木质化，叶片小、芳香、形态纤细、淡绿色，开紫色花。原产于智利，是以帕尔玛公主玛利·路易沙的名字命名的。


