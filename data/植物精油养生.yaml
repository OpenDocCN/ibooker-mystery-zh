  md: '环缺乏活力时，你的皮肤可能就会处在欠完美的状况，身体上小的损伤和伤口痊愈的速度也会因此变得缓慢，你对寒冷的抵抗能力也会降低。一般情况下，你皮肤的弹性和活力将达不到平常的水平。


