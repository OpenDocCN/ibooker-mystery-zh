  md: '这种成份。这些化合物一般作用温和，可以放心地使用。


    7. 内酯和香豆素


    【基本情况】


    内酯包括一种含有一个完整碳环链的酯类化合物，香豆素也是内酯的一种类型。内酯、香豆素和酮类化合物之间的功效有许多相似的地方，因为它们都有一些神经毒素反应，会使皮肤发生光敏性和刺激性反应。不过，在山金车花中发现的倍半萜烯内酯，又称为堆心菊（土木香）内酯，可能是山金车花精油中抗感染的活性成份。一般，在精油中发现的内酯和香豆素数量很低，不会造成很大问题。


    【功效】


    内酯也有很好的促进黏液流动和化痰的功效。土木香经常被用于治疗支气管炎和胸腔炎症。有些在佛手柑精油中发现的香豆素，能使皮肤产生严重的紫外线光敏性反应，如果要在阳光下使用，应格外小心。


    8. 醚类化合物


    这类化合物在精油中普遍存在，在大茴香中发现的茴香脑，在罗勒和龙蒿中发现的甲基胡椒酚，都是重要的醚类化合物。


    9. 氧化物


    氧化物主要的治疗功效是化痰，最有名的氧化物当属桉树脑。


