    **（二）** **木本果肉类基础油**


    ### 1.鳄梨油


    虽然鳄梨油（*Persea americana*）在分类上属于植物油，实际上，它是从果实中榨出来的油，果实中或多或少地含有石细胞，可出油率仍能达到惊人的30%。在芳香按摩疗法中，它是一种非常好的基础油。它是一種黏性较强的油，渗透能力强，富含维生'
  - '[PAGE 150]


    素 A 和维生素 D、卵磷脂、钾和维生素 E。因为含有叶绿素的原因，所以天然鳄梨油的颜色是绿色的。


    鳄梨油适合皮肤干燥、老化或有湿疹、牛皮癣的人群使用。因阳光或气候造成的皮肤损伤，比如脱水或营养不良时使用，效果非常好。它还有使皮肤再生和软化皮肤组织的功能。鳄梨油容易被深层组织吸收，可以有效地软化皮肤组织，皮肤保湿效果明显，能缓解湿疹和牛皮癣的症状，所以特别适合老化皮肤的使用。它也可单独使用，但是多数情况下，它还是与甜杏仁油或葡萄籽油混合使用，其他基础油占到
    10% ~30% 的比例。


