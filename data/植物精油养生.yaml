    # # 2. 家庭自制的面霜和护肤品


    许多种面霜都可以在家里制作，包括一些化妆品、面膜和有止痛功能的护肤品以及其他一些药膏，它们有助于使你获得一种自然的健康，看起来会更年轻。精油具有各种的治疗功效，包括给面霜增加锌元素，它们中的有些精油还有非常特别的功效，可以帮助改善皮肤状况。

    适合做面霜的精油：德国甘菊、胡萝卜籽（基础油）、鼠尾草、茴香、乳香、天竺葵、牛膝草、薰衣草、没药、橙花油、棕榈玫瑰、玫瑰、迷迭香、欧蓍草精油。这些精油对于帮助消除皱纹和老年斑有很强的功效。

    当挑选精油为面部或身体做面霜和洗液时，不能选有光敏性的精油。


    # (1) 水状面霜


    如果你不想使面霜的成份过于复杂，你可以使用一种中性的水状面霜，就可以起到单纯保湿的效果，这种面霜可以从药房、药剂师或保健品商店买到，然后往里加些你喜欢的精油即可。在底料中使用的精油数量，不要超过被推荐的使用浓度，使用浓度过大，会烧伤皮肤。


    # (2) 蜂蜡和精油面霜


    下面的这个配方要比仅有水状面霜的成份丰富的多，但请注意，要在冷凉地方保存，保质期不超过 6 周。

    在130mL的甜杏仁油（甜扁桃仁油）中，溶解15g的纯蜂蜡，也可以用其他不会挥发的油来代替甜杏仁油，一些人对在护肤产品中使用蜂蜡存有顾虑，他们认为，蜂蜡会“阻塞毛孔”，但在混合物中使用，蜂蜡不仅会有软化皮肤的完美功效，也不会产生任何的皮肤问题。如果你使用蜂产品有过敏现象，在用的时候要小心。当蜂蜡融化后，缓慢地温热50mL的玫瑰花水（或是其他种类的花水），用搅拌器或电子混合器，把花水与蜂蜡、精油相混合，这个过程要缓慢进行，然后静置一段时间，滴入8滴你选择好的精油。


