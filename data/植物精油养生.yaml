    # **4.葡萄柚精油**


    葡萄柚精油是从葡萄柚植物（Citrus paradisi Macf.）中提取的，属于芸香科柑橘属，又称为文旦果。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_40_0.png)


    (1) 精油的性质

    葡萄柚精油有种能够强烈提神的味道，颜色淡黄或浅红宝石色，水质黏性。与所有的柑橘属精油一样，葡萄柚精油应该在购买期内6个月用完。

    (2) 来源

    葡萄柚起源于亚洲，现在主要在美国、巴西和以色列栽种。葡萄柚果实是从一种叶片光滑的树上采摘的，树高10m，白色花，果实巨大、淡黄色。精油腺埋入在果皮深处，只能产少量的精油。


    (3) 提取方法

    以新鲜果皮为原料的，采用冷榨方法，出油率在0.5%~1%

    (4) 化学成份

    松萜或蒎烯、桧烯、月桂烯、柠檬油精、香叶醇、芳樟醇、香茅醛、乙酸葵酯和菖品烯或松油烯。'
