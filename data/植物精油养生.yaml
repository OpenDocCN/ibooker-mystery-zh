    # ## 6. 癌症和精油


    各种癌症产生的原因是有共同之处的，许多科学家经过不断地研究，鉴别出了各种具有致癌性（对癌细胞生长的刺激作用）的致癌物质。


    +   （1）致癌精油成份


    有一些致癌精油是禁止在芳香疗法中使用的，也禁止口服。如檫木油、黄色和褐色的樟脑油精油（含有黄樟油精）。长期地每天大剂量地使用此类油，会导致癌症。


    （2）癌症患者使用方法


    要轻轻地按摩，避免在肌肉上和淋巴腺附近做深层地按摩。


    不要按摩化疗过的地方。


    不要在患有皮肤癌的地方按摩。


    （3）癌症患者避免使用的精油


    大茴香、罗勒、甘草、丁香、肉桂、茴香、月桂、肉豆蔻等精油。


    （4）患有雌激素型癌症的患者避免使用的精油


    大茴香、香茅、桉树、茴香、马鞭草精油。


    （5）患有皮肤癌和（恶性）黑色素瘤患者避免使用的精油


    香柠檬和所有光敏性的精油。


    # ### （五）植物精油毒性与安全


    # #### 1. 有毒的精油


    虽然精油对于人们的日常保健很有益处，但是我们仍然要注意它们所含的活性成份。它们中的某些成份是不能在按摩疗法中应用的，也不能口服，因为口服和皮肤接触都会有毒性反应。


    +   （1）扁桃仁（苦的）


    氢氰酸是苦扁桃仁的主要成份，即使很小的剂量的使用都有致命的危险。要从这种精油中提取扁桃仁精华素，需要先用精馏技术结合碱漂洗把氢氰酸去掉。


    （2）波耳多树'
