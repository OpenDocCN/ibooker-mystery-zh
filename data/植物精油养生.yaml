  md: '常用单方植物精油


    （5）治疗功效


    1）葡萄柚精油有激励情绪的效果，可以缓和压力和沮丧。


    2）葡萄柚精油可以帮助油性皮肤保持清洁，可以调理肌肤和组织，对治疗痤疮也有帮助。葡萄柚精油常在头发护理中用到，能促进头发生长。


    3）葡萄柚精油含有高浓度的维生素 C，因而对免疫系统非常有利用价值。可以有效地预防感冒和流感。


    4）葡萄柚精油最适合用于分解脂肪团（臀、腿部），对于减轻体重和利尿也有积极的作用，还能帮助身体排除过多的水分。通过刺激淋巴系统的循环，还可以排除体内的毒素。


    5）对于治疗肌肉疲乏和僵硬疗效显著。


    （6）使用注意事项


    没有毒性、没有刺激性和过敏性，虽然被列入到没有光敏性精油的行列，但是如果使用后暴露在强光下，可能会引起刺激性反应。


    （7）用法


    1）香炉和蒸发器熏香


    在蒸汽疗法中，葡萄柚精油可以用于治疗宿醉、头痛、性欲过度、精力耗竭和压抑。


    2）做复方按摩油或稀释在浴盆中使用


    葡萄柚精油可以在复方按摩油里使用，也可以添加在浴盆中使用，以促进脂肪团的分解，帮助治疗和缓解感冒、流感、缺乏活力、时差反应、肌肉疲劳、体重超标、头痛、闷闷不乐、精神和身体的疲乏。


    3）做洗液、面霜和润肤乳的添加成份


    当用作面霜、润肤乳或洗液的添加成份使用时，葡萄柚精油有助于洁净油脂性和带痤疮的肌肤，也可以帮助皮肤组织去除脂肪团，排除体内过多的水分。


    （8）适合与葡萄柚精油混用的精油。


    香柠檬、薰衣草、天竺葵、棕榈玫瑰和乳香精油。


    5. 佛手柑精油


