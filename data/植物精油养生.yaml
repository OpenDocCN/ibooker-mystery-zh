    佛手柑精油是从佛手树（Citrus aurantium var. bergamia、C. bergamia Risso & Poit.）中提取的，属于芸香科柑橘属，又称贝加莫柑橘、贝加毛橙。


    （1）精油性质


    精油的味道以柑橘属植物共有味道为主，然而，其特点是带有发甜的水果味，同时，还会散发一种温和的辛辣的花香味，令人想到橙花油和薰衣草油。精油的颜色在绿色到绿'
  - '[PAGE 42]


    **常用单方植精油**


    黄色间变化，油质为水黏性。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_42_0.png)


    **（2）来源**


    佛手树起源于亚洲东南部，后被引入欧洲，尤其是意大利，在象牙海岸、摩洛哥、突尼斯和阿尔及利亚（北非国家）也有种植。


    这种树可以长到4m高，花是星状的，叶片光滑，所结果实既像橘子又像葡萄柚，形状像梨。果实成熟过程，颜色从绿变成黄色。


    佛手柑精油与橙花油、薰衣草油一样是香料店、化妆品以及窗体行业使用最广泛的精油之一，还是经典的4711科隆香水的主要成份，厄尔氏灰茶也用到它。


    它的另一个名字贝加莫柑橘精油来源于意大利的贝加莫，这种精油最初是在那里开始销售的。


    **（3）提取方法**


    以成熟和没有成熟果实的果皮为原料，利用压榨方法提取精油，出油率可以达到0.5%。


    **（4）化学成份**


    松萜或蒎烯、月桂烯或香叶烯、柠檬油精、香柑内酯、红没药烯、芳樟醇、乙酸里哪酯、橙花醇、香叶醇、醋酸香叶醇、萜品醇、松油醇、苧烯。


    **（5）治疗功效**


    这种精油味道清新，在芳香疗法中是令人喜爱的，能创造一种放松和愉快的感觉。当你正在寻找一种精油来治疗精神抑郁、SAD（季节性的失调）或一般的情感问题，如缺乏自信或性格内向，可以考虑佛手柑精油。它可以缓解泌尿系统感染，对肝脏、脾和胃有利。适用于油性皮肤、痤疮（青春痘）、牛皮癣、湿疹和因感冒引起的疼痛。佛手柑精油还可以用于治疗精神忧郁、压力大、紧张、恐慌、不正常的兴奋、感染（包括各种皮肤问题)、厌食、牛皮癣、湿疹等，在帮助身体康复中有很大的作用。它还有极好的杀菌作用，经常被用于治疗皮肤病，如痤疮、油性皮肤、湿疹、牛皮癣，也可以用于治疗感冒引起的疼痛和鸡皮疙瘩、创伤。它对于激励肝脏、肠胃和脾的功能，有良好的效果。在治疗泌尿系统感染和炎症方面，效果极好，如膀胱炎。


    **（6）使用注意事项**


    在敏感皮肤上使用佛手柑精油，暴露在阳光下时会产生灼热的感觉，因为，它所含高浓度的香柑内酯能引起光毒性反应。所以，我们建议在皮肤上使用这种精油时，避免暴露在阳光下。即使把香柑内酯成份从精油中去除，光毒性能减少，但仍建议在皮肤上使用这种精油后不要暴露在阳光下，并且使用浓度要低于1%。'
  - '[PAGE 43]


    (7) 用法

    1) 香炉和蒸汽熏香

    利用蒸汽治疗，佛手柑精油可以用于治疗精神压抑、情感低落以及呼吸系统问题、感冒、PMS（经前紧张综合症）和 SAD。

    2) 做为复方按摩油和盆浴的添加成份

    它可以在复方按摩油中或者稀释在浴盆中使用，有助于治疗精神压抑、神经紧张、SAD、PMS、皮肤问题、暴饮暴食、产后抑郁、感冒、焦虑、情绪低落和厌食症。

    3) 做面霜的成份

    作为基础面霜的成份，佛手柑精油可以用于治疗创伤、牛皮癣、油性皮肤、疥疮、湿疹、痤疮、感冒和鸡皮疙瘩。

    (8) 适合与佛手柑精油混用的精油

    黑胡椒、快乐鼠尾草、柏树、乳香、天竺葵、茉莉、中国柑橘、肉豆蔻、柑橘、迷迭香、檀香、香根草和依兰精油。


    # (二) 花类精油


    # 1. 橙花精油


    橙花精油是从一种苦橙植物（Citrus aurantium var. amara、Citrus vulgaris and C. Bigardia）的花中提取的，属于芸香科。


    (1) 精油性质

    味道清甜，有花香味，这种令人不易忘怀的清香味，颜色淡黄，黏性水质。购买橙花精油的时候要小心，因为有许多供应商在这种油中掺基础油，以获得更多的利润。它的气味强烈，即使稀释浓度很低时，它仍会散发出令人难以置信的气味。


    (2) 来源

    它又被称为“柑橘花”，因为用大约 1000 kg 的柑橘花才能生产 1 kg 的橙花精油。据说，它的名字同一位意大利公主有关，她用这种精油作为香水使用，还用它熏香洗浴水和手套。它至今还是制作法国科隆香水的原料。柑橘花还经常用于婚礼和洗礼的仪式上，新娘用它来修饰自己，传统上，新娘用柑橘花蕾修饰她的头发。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_43_0.png)'
- md: "(3) 提取方法  \n以苦柑橘树上的白色的蜡质小花为原料，采用蒸汽蒸馏法提取，出油率在0.8% ~1%。  \n\n(4) 化学成分  \nα-蒎烯、茨烯、β-蒎烯、α-萜品烯、橙花醇、橙花醇乙酸酯、金合欢醇、酸酯和吲哚。\
    \  \n\n(5) 治疗功效  \n同薰衣草一样，这种精油也是最受欢迎的精油之一，它不仅有卓越的治疗功效，还有最令人难以置信的味道。它对身体有很好的放松效果，能够缓解肌肉抽筋，平缓心悸，对皮肤有返老还童的功效，预防形成伤疤，对抗面部皮肤松垮。它对治疗失眠也有好处，它是具有最佳镇静效果的精油之一。\
    \  \n\n(6) 使用注意事项  \n无毒、无刺激性和光敏性，然而，想要保持清醒的思维敏捷的头脑，就要少量使用，因为它的放松作用很强。  \n\n(7)\
    \ 用途  \n1) 香炉和蒸发器熏香  \n在蒸汽疗法中，橙花精油可以用于治疗失眠、神经紧张、头痛、眩晕、压抑和焦虑。  \n\n2) 做复方按摩油或稀释在浴盆中使用\
    \  \n橙花精油做复方按摩油或稀释在浴盆中使用，可以用于治疗失眠、头痛、神经痛、精神紧张、心悸、焦虑、压抑、大肠炎、反胃、痢疾以及护理皮肤。  \n\n\
    3) 做面霜或洗液的成份  \n当用作面霜或洗液的成份时，它不仅能够对抗皮肤松弛和治疗皮肤毛细管受损，而且还能防止伤疤的形成。它具有刺激细胞再生和促进细胞活性的功能，有助于皮肤的再生和恢复活力。\
    \  \n\n(8) 适合与橙花精油混用的精油  \n安息香、天竺葵、茉莉、薰衣草、檀香、迷迭香、依兰和柑橘属精油。  \n\n## 2. 洋甘菊（罗马和德国甘菊）精油\
    \  \n\n罗马甘菊精油是从白花春黄菊（Anthemis nobilis、Chamaemelum nobile）提取的，属于菊科。又称英国甘菊、甜甘菊和花园甘菊。罗马甘菊和德国甘菊统称为洋甘菊。\
    \  \n\n德国甘菊精油是从德国春黄菊（Matricaria recutica、chamomilla recutica）提取的，也属于菊科。又称蓝甘菊、母菊、匈牙利甘菊和单瓣甘菊。\
    \  \n\n(1) 精油性质  \n罗马甘菊气味香甜，有点像苹果的香味。颜色淡绿、清澈，具有水质般的黏性。而德国甘菊精油散发着稻草般的清香气味，颜色黑绿色，中等黏性。\
    \  \n\n白花春黄菊（Anthemis nobilis）\t德国春黄菊（Matricaria recutica）  \n\n# (2) 罗马和德国甘菊精油的来源\
    \  \n罗马甘菊是种小型多年生草本植物，高约 25cm，茎多毛，叶片羽状、柔软，雏菊白色（比德国甘菊的某些品种花大）；而德国甘菊可以长到 60cm 高，茎有分枝、无毛，叶片脆弱、革质，头茬花单朵、白色、着生在单一茎上。罗马甘菊主要栽培在德国、法国、西班牙、意大利、墨西哥和法国，而德国甘菊大部分在匈牙利、埃及、东欧和法国种植。在埃及，它是奉献给太阳的香草，能用于治疗发烧；同时，也是奉献给月亮的礼物。因为，它有冷凉的能力。它被公认为是抚慰神经紧张疾病的精油，可以在洗发精、化妆品和香水中使用。德国甘菊含有甘菊环，一种强有力的抗感染的成份，实际上，这种蓝色的结晶不在植物体内，而是在精油中形成的，仅仅需要微量就能发挥强大的作用。\
    \  \n\n# (3) 提取方法  \n这两种甘菊精油都是以花为原料的，采用蒸汽蒸馏法提取的。以鲜花为原料，罗马甘菊的出油率约是 1.7%，德国甘菊的出油率是\
    \ 0.2% ~0.4% 。  \n\n# (4) 化学成份  \n罗马甘菊精油的主要化学成份为松萜或蒎烯、茨烯、桧烯、月桂烯、桉树脑、松油精萜品烯、石竹（萜）烯。\
    \  \n\n德国甘菊油的主要化学成份为甘菊环烃、春黄菊奥（约 60%）、春黄菊醇、倍半萜类、位半萜醇、当时酸酯、当归酸丁酯、丁酸等。  \n\n# (5)\
    \ 治疗功效  \n罗马和德国这两种甘菊都有极好的镇静作用。但是，罗马甘菊对愤怒、急躁和情绪不良的效果会更好些，在治疗月经前不快症状（PMS）和其他症状、更年期问题方面也有很大的价值；而德国甘菊对皮肤有卓越的效果，不仅有平滑和安抚的作用，还有治疗和使皮肤组织再生的作用。\
    \  \n\n1) 罗马甘菊精油的使用  \n这种精油给孩子用效果非常好。可用于他们情绪急躁、缺乏耐心，在出牙期或得了疝气病时。如果妇女使用，可以缓解经前不快的症状。一般情况，对于治疗腹部疼痛、胆囊炎和咽喉感染也是有效的。此外，还能缓解敏感症、干草热和哮喘。对于皮肤，它能用于治疗粉刺、湿疹、皮疹、创伤、皮炎、干燥和发痒，以及一般的过敏状况。对于婴儿，可以用稀释得很稀的汽液，应还可以用于平息恼怒、治疗疝痛、痢疾和胃痉挛。\
    \  \n\n2) 德国甘菊精油的使用  \n这种精油对情绪和身体都有平缓的作用，在治疗各种类型的炎症都有好的疗效，无论内外的炎症。治疗尿路结石（膀胱结石）效果理想。此外，它能激发肝脏和胆囊的功能，因而可以促进消化。在治疗月经和更年期出现的问题时，也有好的效果。在皮肤上使用，会产生奇迹般的效果，能平缓发红、干燥和过敏的皮肤问题，对于敏感、湿疹、牛皮癣和其他各种脱皮的皮肤问题也有效果。\
    \  \n\n(6) 使用注意事项  \n这两种精油都没有毒性和过敏性，但因为它们具有通经的性质，当高浓度使用时，应避开怀孕期。  \n\n(7) 用途 \
    \ \n1) 香炉和蒸发器  \n罗马甘菊精油在蒸汽治疗中使用，可以治疗神经系统疾病、头疼和偏头疼。  \n\n2) 做按摩油或浴盆的添加成份。  \n罗马甘菊也可以在复方按摩油中使用，或者稀释在浴盆中，有助于敏感症、厌食症、上瘾、疝痛、背部疼痛、肌肉疼痛、关节炎、产后抑郁和肠胃失调症状的改善；而德国甘菊对哮喘、麻疹、腮腺炎、PMS（月经前不快症状）、更年期症状和风湿病都有疗效。\
    \  \n\n3) 做洗液和面霜的成份。  \n罗马甘菊做护肤面霜的成份时，可以治疗尿布湿疹、烧伤和太阳灼伤，而德国甘菊对于一般的皮肤护理有效，尤其是对过敏性皮肤。\
    \  \n\n4) 做漱口水成份。  \n罗马甘菊精油能做漱口水成份，对于牙龈肿痛和扁桃腺炎有效。  \n\n(8) 适合与洋甘菊精油混合使用的精油  \n\
    佛手柑、鼠尾草、薰衣草、天竺葵、茉莉、茶树、葡萄柚、玫瑰、柠檬和依兰精油。  \n\n## 3. 大马士革玫瑰精油  \n\n玫瑰精油是从大马士革玫瑰（Rosa\
    \ damascena）提取的，属于蔷薇科，又称为保加利亚玫瑰和土耳其玫瑰精油。  \n\n(1) 精油性质  \n大马士革玫瑰精油具有深厚、清新的味道，有典型的玫瑰型香味。精油颜色淡黄到绿色。\
    \  \n\n(2) 来源  \n英文Rosa来源于希腊文roden，意思是“红色的”，由此，人们推测，古时玫瑰的颜色是深红色的。安第斯达一位10世纪的波斯医生，第1次使用玫瑰蒸馏精油。在1612年，玫瑰蒸馏作坊在波斯（西南亚国家，现在的伊朗）的设拉子（伊朗西南部城市）诞生了。在婚礼上，抛洒玫瑰花瓣，预示着婚姻幸福，玫瑰花瓣还是爱情和纯洁的象征，在沉思和祈祷时也用些玫瑰花瓣。制造30毫升玫瑰精油，约需要60000朵玫瑰。换一种算法的话，约40000kg的花瓣可生产1L的玫瑰精油。\
    \  \n\n(3) 提取方法  \n玫瑰精油是用鲜花瓣提取的，鲜花瓣在早晨8～10时之前采摘，采用蒸汽蒸馏法，出油率在0.02%～0.05%。蒸馏过程中，要小心控制加温，如果加热过高容易导致香气损失。\
    \  \n\n(4) 化学成份  \n玫瑰精油的化学成份是最复杂的精油之一，已知成份超过300多种。主要包括香茅醇、苯基乙醇、香叶醇、橙花醇、苯基乙醛、法呢醇（金合欢醇）、玫瑰蜡、微量的壬醇、芳樟醇、壬醛、柠檬醛、香芹酮、乙酸香茅、甲基丁子香酚、丁子香酚。\
    \  \n\n(5) 治疗功效  \n虽然这种精油的销量不如薰衣草油，部分原因是价格因素，但它的确是身兼多种用途的最好的精油之一。它不仅能使你从沮丧、悲痛、愤怒和恐惧中解脱出来，还对心脏和消化系统有帮助，对女性问题的解决是最令人惊奇的；同时，也是在皮肤上使用的效果最好的精油之一。\
    \  \n\n1) 大马士革玫瑰精油能抚慰和协调情绪，对抑郁、生气、悲痛、恐惧、神经紧张和压抑有帮助；同时，还能增加性欲、自身滋养、自信和处理情感问题的能力。\
    \  \n\n2) 它对于不好的循环和心脏问题有非常大的帮助，包括心悸、心率失常和高血压；它还用于改善肝脏和胆囊的功能。  \n\n3) 对于呼吸系统，大马士革玫瑰精油有助于解决哮喘、咳嗽和干草热；在消化系统方面，对改善肝脏充血和反胃恶心有好处。\
    \  \n\n4) 大马士革玫瑰精油具有清除、净化、调节和纯化女性生殖器官的效果；可用于调节和平衡激素分泌、不规则月经、白带不正常、月经过多、子宫出血和其他子宫失调的问题，对子宫的协调作用是全面的。\
    \  \n\n5) 对于皮肤的保湿效果非常有效，它可以增加皮肤的水分，增加结合水的含量；同时，它对皮肤还有杀菌和激励的作用，适用于所有类型的肤质，但是，尤其适合干燥、成熟和过敏性的皮肤。还可用于修复断裂的毛细管，缓解炎症和皮肤发红，也有助于湿疹和疱疹的康复。玫瑰水可用于治疗结膜炎。\
    \  \n\n(6) 使用注意事项  \n大马士革玫瑰精油无毒、无刺激性和无光敏性，但是，在怀孕期间应避免使用。  \n\n(7) 用法  \n大马士革玫瑰精油给予一种康乐和幸福的感觉，以缓解紧张的神经，改善呼吸系统和消化系统的功能，对于月经问题和皮肤护理方面也有良好的效果。\
    \  \n\n1) 香炉和蒸发器熏香  \n在蒸汽疗法中，玫瑰精油有益于敏感症、哮喘、精神抑郁、头疼、偏头痛、神经紧张，能作为一种弛缓药。当处理情感问题、悲伤和失落的时候，它尤其适用，可以化解精神压抑、生气和悲痛的情绪。\
    \  \n\n2) 做按摩油的成份或添加在盆浴中适用。  \n适用作按摩油的成份或添加在浴盆中，玫瑰精油有助于治疗敏感症、精神抑郁、哮喘、干草热、头疼、压抑、偏头痛、神经紧张、悲伤，还可以改善循环、镇定心脏、激励肝脏和胆囊，调和皮肤组织。\
    \  \n\n3) 做润肤乳和面霜成份使用。  \n当玫瑰精油混在洗液或面霜中使用时，它能通过增加皮肤含水量和结合水的数量，来激励皮肤的新陈代谢，适合所有肤质，对于干燥、成熟、敏感的皮肤效果更好。它还有助于减少皮肤红色，抗感染和修复皮肤受损的毛细管，因为具有良好的收敛性，它可以作为一种常用的皮肤滋养品。\
    \  \n\n(8) 适合与大马士革玫瑰油混用的精油  \n天竺葵、茉莉、丁香和棕榈玫瑰精油。  \n\n# 4. 茉莉精油  \n\n茉莉精油是从茉莉植物（Jasminum\
    \ officinale）的花中提取的，属于木樨科，又称为素馨。一般用于提取精油的茉莉品种是非常普通的（Jasminum grandiflorum）品种。\
    \  \n\n这种精油价格昂贵的原因不仅在于它具有高雅气味，而且具有明显的放松效果，可以振奋精神，提升自信心，使分娩顺利；还能平缓咳嗽，护理和改善皮肤弹性，淡化妊娠纹和伤疤。常见的茉莉精油是含量为\
    \ 25%的复方油。  \n\n(1) 精油性质  \n味道清甜，具有异国情调和丰富的花香气味。  \n\n# (2)来源  \n茉莉是种常绿的、多年生的灌木，有的是攀缘灌木，可以长到10m高。叶片深绿，花小、星状、白色，在夜间采摘花朵时香味最浓。一个有经验的采摘者一晚上可以摘10000~15000朵花。\
    \  \n茉莉起源于中国和印度北部，它是被摩尔人（非洲西北部伊斯兰教民族）带到西班牙的。目前，法国、意大利、摩洛哥、埃及、中国、日本和土耳其生产的茉莉精油最好。\
    \  \n茉莉的英文名字Jasmine是从波斯人语yasmin演变来的。中国人、阿拉伯人和印度人在医学上用它，也用做壮阳剂，经常在一些仪式上使用。  \n\
    在土耳其，茉莉茎被用于制作绳索；在中国，人们喜欢用它制成茉莉花茶（一般用于做茉莉花茶的品种是*Jasminumsambac-Arabianjasmine）；在印度尼西亚，它是人们喜爱的一种装饰品。\
    \  \n\n茉莉植物性寒。李时珍说：本品可蒸油取液作面脂、头油，以生发、润肤。  \n(3) 提取方法  \n茉莉精油开始时是采用溶剂提取方法，以“固态形式”参与贸易的，使用时用酒精把茉莉精油从固态中提取出来，获得一种“完全”精油。现在，人们开始采用蒸汽蒸馏法获得“完全”精油。大约1000kg朵花可以生产1kg的液态固体，里面含有约0.2%的芳香分子。\
    \  \n(4) 化学成份  \n可以在茉莉精油中分析出大约100种成份，主要包括苯甲基醋酸酯、芳樟醇、苯甲基乙醇、吲哚、苯甲基安息香酯、茉莉酮、香叶醇、甲基（邻）氨基苯甲酸酯、微量的甲酚、法呢醇、乙烯基安息香酯、丁子香酚、橙花醇、安息香酸、安息香醛、萜品醇、橙花油、叶绿醇等。\
    \  \n\n# (5) 治疗功效  \n1) 它是一种治疗严重精神压抑的有效药物，可以抚慰神经，建立一种自信，有乐观和精神欢快的感觉，还可以新生和恢复精力。\
    \  \n2) 可以促进分娩顺利，它能通过加强子宫的收缩来促进婴儿的分娩，同时还有缓解疼痛的作用。它对产后抑郁症也有缓解的功效，还可以促进乳汁的分泌。  \n\
    \n3) 因为它有很强的抚慰和镇静的特性，茉莉精油可以帮助解决有关性的问题，如阳痿、早泻和性冷淡。  \n\n4) 它对治疗呼吸系统的疾病也有很好的疗效，可以减弱咳嗽，对声音嘶哑和喉炎也有疗效。此外，还可以用它缓解肌肉疼痛、扭伤和四肢僵硬的症状。\
    \  \n\n5) 茉莉精油适合护理干燥、油性、刺激性和敏感性的皮肤，增加皮肤的弹性，还经常被用于治疗妊娠纹和伤疤。  \n\n# (6) 使用注意事项 \
    \ \n茉莉精油是无毒、无刺激的，一般情况下也没有光敏性。但是，个别人对它有过激性反应。由于它有通经的作用，不能在孕期使用。因为它是一种强效放松精油，过量使用这种精油会影响注意力集中。\
    \  \n\n# (7) 用法  \n茉莉精油是种功效强劲的油，可以治疗严重的精神抑郁症，促进分娩，对治疗有关性方面的问题也有帮助，还可以用于呼吸道、肌肉、皮肤方面的治疗。\
    \  \n\n1) 香炉和蒸发器熏香  \n在蒸汽疗法中，茉莉精油可以用于治疗上瘾，振奋精神、缓解神经过敏和咳嗽、促进放松和停止紧张。  \n\n2) 做复方按摩油或稀释在浴盆中使用\
    \  \n茉莉精油做复方按摩油或稀释在浴盆中使用，可以用于治疗上瘾，振奋精神、缓解神经过敏和咳嗽、促进放松和停止紧张。  \n\n3) 做面霜或润肤乳的成份\
    \  \n当用作面霜或润肤乳时，茉莉精油适合护理干燥、油性、刺激性和敏感性的皮肤，增加皮肤的弹性，还经常被用于治疗妊娠纹和伤疤。  \n\n# (8) 适合与茉莉精油混用的精油\
    \  \n香柠檬、玫瑰、檀香和所有柑橘属植物精油。  \n\n# 5. 苹果天竺葵精油  \n\n苹果天竺葵精油是从苹果天竺葵植物（Pelargonium\
    \ odorantissimum）提取的，属于牻牛儿苗科，与从其他近亲植物提取的玫瑰天竺葵精油（又称香叶天竺葵）是不同的，因为苹果天竺葵植物中提取的精油更昂贵些。我国也有叫老鹳草的。它有一种强烈的花香气味，暗含有薄荷的气味。从苹果天竺葵植物提取的天竺葵精油有种轻微的苹果味，而从玫瑰天竺葵植物中提取的精油是玫瑰香味。这种清新的精油在芳香疗法中具有一种恒定的位置，因为它可以平衡情绪和精神。它能刺激肾上腺皮层，具有平衡荷尔蒙系统的分泌功能，以及刺激淋巴循环系统的功能。另一方面，它还可以平衡皮肤油脂的分泌数量，使皮肤保持柔软，并有助于创伤的愈合。\
    \  \n\n## 常用单方植物精油  \n### （1）精油的性质  \n这种精油基本上是无色的，但是稍带有轻微的绿色。黏质性为水性。  \n### (2)\
    \ 来源  \n这种植物原产于南非、留尼旺岛（印度洋西南面的一个法属火山岛）、马达加斯加岛（非洲岛国）、埃及和墨西哥，在 17世纪，被引入欧洲国家，如意大利、西班牙和法国。我国云南、四川栽培面积较大。\
    \  \n### (3) 提取方法  \n叶片和茎被用于提取精油，采用蒸汽蒸馏法。  \n### (4) 化学成份  \n苹果天竺葵精油的主要化学成分：松萜或蒎烯、月桂烯、柠檬油精、薄荷酮、芳樟醇、乙酸香叶酯、香茅醇、香叶醇和丁酸香叶酯。\
    \  \n### (5) 治疗功效  \n苹果天竺葵精油可以帮助治疗痤疮、瘀伤、烧伤、割伤、皮炎、湿疹、痔疮、虱子，驱除蚊子、癣菌病、溃疡、乳房充血、浮肿、不良循环、咽喉疼痛、扁桃体炎、经前紧张综合征、更年期问题，压力过大和神经痛。\
    \  \n这种有振奋作用的精油对情绪有良好的全面平衡效果，这种振奋的功效尤其可以用在护理皮肤方面，它可以帮助在油性和干燥皮肤之间创造一种平衡。它也可以帮助调节情绪，当处于压力和焦虑的情绪中时，它可以起到缓和的作用，它也可以作用于肾上腺皮层，以帮助平衡内分泌系统。它强烈的气味尤其适合驱除蚊子和头上的虱子。\
    \  \n### (6) 使用注意事项  \n苹果天竺葵精油不会引起任何的副作用，因为它无毒，没有刺激性，一般也不会产生过敏反应，然而，极少数人对它有过敏。由于，它对荷尔蒙的分泌有平衡作用；不要在孕期使用。\
    \  \n苹果天竺葵精油的治疗功效，包括收敛、止血、增强免疫力、利尿、除臭、滋补、杀虫和治疗创伤。  \n### (7) 用法  \n1) 香炉和蒸发器熏香\
    \  \n在蒸汽治疗中，天竺葵精油可以用于缓解压力、消除沮丧，有利于治疗月经前不快综合征、焦虑和紧张，更年期问题和给予精力。  \n\n2) 做复方按摩油或稀释在盆浴中使用。\
    \  \n天竺葵精油可以用在复方按摩油中，或稀释在盆浴中使用，有助于治疗经前不快综合征、沮丧、压力大、焦虑和紧张、保持水分、湿疹、带状疱疹、瘀伤、癣菌病、痔疮和经期不规律，还可以驱避蚊虫。\
    \  \n\n3) 做面霜或润肤乳的添加成份。  \n当作为面霜的底料成份时，天竺葵精油可以用于治疗湿疹、带状疱疹、烧伤和伤疤、癣菌病、瘀伤和乳房充血，还可以驱避蚊虫和分解脂肪团。它将有助于帮助平衡皮肤油脂的分泌，能使皮肤保持柔软，有助于伤口的愈合，包括烧伤、创伤和溃疡。\
    \  \n\n4) 稀释在洗发香波中使用。  \n苹果天竺葵精油也可以稀释在洗发香波中使用，以帮助去除头上的虱子。  \n\n(8) 适合与天竺葵精油混用的精油\
    \  \n圆当归、罗勒、香柠檬、胡萝卜籽、雪松、香茅、鼠尾草、葡萄柚、茉莉、薰衣草、酸柠檬、橙花和迷迭香精油。  \n\n# 6. 玫瑰天竺葵精油  \n\n\
    玫瑰天竺葵精油是从玫瑰天竺葵植物 (Pelargonium graveolens) 中提取的，属于牻牛儿苗科。这种植物比其他的品种 (Pelargonium\
    \ odorantissimum) 更有玫瑰香味。如果这种油是从叶片提取的，以开始变黄的叶片为原料比嫩些、还绿着的叶片为原料，所提取的油更有玫瑰香味。一些仿造玫瑰天竺葵精油的赝品其实是比较便宜的\
    \ (P. odorantissimum) 精油，而我们真正的精油是以 (Pelargonium graveolens) 为原料的。  \n\n这种清新的带有玫瑰香味的精油能刺激肾上腺皮层，有助于平衡神经系统，还可以振奋精神和缓解压力，对于荷尔蒙系统也有一种协调作用。对于油性皮肤有更好的清洁作用，也有促进皮肤恢复的功效。\
    \  \n\n(1) 精油性质  \n它的味道清新，带有玫瑰气味，还隐含着一种薄荷味；一般无色，但是也有浅绿色的**精油；黏质性为水性。**  \n\n（2）来源\
    \  \n这种植物原产于南非、留尼旺岛（印度洋西南面的一个法属火山岛）、马达加斯加岛（非洲岛国）、埃及和摩洛哥，在17世纪，被引入欧洲国家，包括意大利、西班牙和法国。\
    \  \n\n这种植物大约有700个不同的品种，然而，只有大约10个品种的含油量达到了提取精油的标准。常在花园栽培的玫瑰天竺葵因含油量太低，而不能作为原料使用。\
    \  \n\n它是一种多年生的灌木，全株有毛，常被用做灌木篱，高度约1m，叶片针状、边缘有锯齿，花色桃红或白色。在人类早期，人们会在房屋周围种植大量的天竺葵，用于驱邪。\
    \  \n\n（3）提取方法  \n玫瑰天竺葵精油是以叶片和茎为原料，采用蒸汽蒸馏技术提取精油的。  \n\n（4）化学成份  \n玫瑰天竺葵精油的主要化学成份：松萜或蒎烯、月桂（香叶）烯、柠檬油精、薄荷酮、芳樟醇、乙酸香叶酯、香茅醇、香叶醇和丁酸香叶酯。\
    \  \n\n（5）治疗功效  \n1) 玫瑰天竺葵精油对神经系统有平衡的作用，可以缓解压力和焦虑，能振奋灵魂，让你感觉到世界的美好。它对肾上腺皮层也有很好的平衡作用，可以缓解肾脏压力。\
    \  \n\n2) 它的止血性质有助于维持身体机能的平衡，因为它还能刺激和平衡肾上腺皮层的分泌，内分泌系统也会得到协调。对于淋巴循环系统，它有非常强的刺激作用，能起到排毒的效果，也会有助于妇女的健康，它可以缓解经前紧张综合征（PMS），还能平衡阴道分泌物和缓解排经过多的问题。\
    \  \n\n3) 它对身体有利尿的作用，可以平衡水分系统，矫正一些不良的水分和废物的排泄。它还有助于治疗黄疸、胆结石，止鼻血和其他部位的出血。  \n\n\
    4) 对于皮肤，玫瑰天竺葵精油有助于平衡皮脂的分泌，清洁油腻皮肤。还有杀菌作用，可以治疗烧伤、创伤、溃疡和其他皮肤问题。  \n\n（6）使用注意事项  \n\
    玫瑰天竺葵精油没有表现出任何的副作用，因为它无毒、无刺激性，一般情况下也无光敏性（但是有个别人会有此反应）。由于它有平衡内分泌的功效，不要在孕期使用。  \n\
    \n玫瑰天竺葵精油的主要治疗功效包括抗抑郁、防腐杀菌、收敛、利尿、除臭、止血、滋补、杀虫和医治创伤。  \n\n（7）用法  \n这是一种具有提升作用的精油，对身体有很强的全面调理作用，包括对皮肤，它可以"
  mdcn: "(3) 提取方法  \n以苦柑橘树上的白色的蜡质小花为原料，采用蒸汽蒸馏法提取，出油率在0.8% ~1%。  \n\n(4) 化学成分  \nα-蒎烯、茨烯、β-蒎烯、α-萜品烯、橙花醇、橙花醇乙酸酯、金合欢醇、酸酯和吲哚。\
    \  \n\n(5) 治疗功效  \n同薰衣草一样，这种精油也是最受欢迎的精油之一，它不仅有卓越的治疗功效，还有最令人难以置信的味道。它对身体有很好的放松效果，能够缓解肌肉抽筋，平缓心悸，对皮肤有返老还童的功效，预防形成伤疤，对抗面部皮肤松垮。它对治疗失眠也有好处，它是具有最佳镇静效果的精油之一。\
    \  \n\n(6) 使用注意事项  \n无毒、无刺激性和光敏性，然而，想要保持清醒的思维敏捷的头脑，就要少量使用，因为它的放松作用很强。  \n\n(7)\
    \ 用途  \n1) 香炉和蒸发器熏香  \n在蒸汽疗法中，橙花精油可以用于治疗失眠、神经紧张、头痛、眩晕、压抑和焦虑。  \n\n2) 做复方按摩油或稀释在浴盆中使用\
    \  \n橙花精油做复方按摩油或稀释在浴盆中使用，可以用于治疗失眠、头痛、神经痛、精神紧张、心悸、焦虑、压抑、大肠炎、反胃、痢疾以及护理皮肤。  \n\n\
    3) 做面霜或洗液的成份  \n当用作面霜或洗液的成份时，它不仅能够对抗皮肤松弛和治疗皮肤毛细管受损，而且还能防止伤疤的形成。它具有刺激细胞再生和促进细胞活性的功能，有助于皮肤的再生和恢复活力。\
    \  \n\n(8) 适合与橙花精油混用的精油  \n安息香、天竺葵、茉莉、薰衣草、檀香、迷迭香、依兰和柑橘属精油。  \n\n## 2. 洋甘菊（罗马和德国甘菊）精油\
    \  \n\n罗马甘菊精油是从白花春黄菊（Anthemis nobilis、Chamaemelum nobile）提取的，属于菊科。又称英国甘菊、甜甘菊和花园甘菊。罗马甘菊和德国甘菊统称为洋甘菊。\
    \  \n\n德国甘菊精油是从德国春黄菊（Matricaria recutica、chamomilla recutica）提取的，也属于菊科。又称蓝甘菊、母菊、匈牙利甘菊和单瓣甘菊。\
    \  \n\n(1) 精油性质  \n罗马甘菊气味香甜，有点像苹果的香味。颜色淡绿、清澈，具有水质般的黏性。而德国甘菊精油散发着稻草般的清香气味，颜色黑绿色，中等黏性。\
    \  \n\n白花春黄菊（Anthemis nobilis）\t德国春黄菊（Matricaria recutica）  \n\n# (2) 罗马和德国甘菊精油的来源\
    \  \n罗马甘菊是种小型多年生草本植物，高约 25cm，茎多毛，叶片羽状、柔软，雏菊白色（比德国甘菊的某些品种花大）；而德国甘菊可以长到 60cm 高，茎有分枝、无毛，叶片脆弱、革质，头茬花单朵、白色、着生在单一茎上。罗马甘菊主要栽培在德国、法国、西班牙、意大利、墨西哥和法国，而德国甘菊大部分在匈牙利、埃及、东欧和法国种植。在埃及，它是奉献给太阳的香草，能用于治疗发烧；同时，也是奉献给月亮的礼物。因为，它有冷凉的能力。它被公认为是抚慰神经紧张疾病的精油，可以在洗发精、化妆品和香水中使用。德国甘菊含有甘菊环，一种强有力的抗感染的成份，实际上，这种蓝色的结晶不在植物体内，而是在精油中形成的，仅仅需要微量就能发挥强大的作用。\
    \  \n\n# (3) 提取方法  \n这两种甘菊精油都是以花为原料的，采用蒸汽蒸馏法提取的。以鲜花为原料，罗马甘菊的出油率约是 1.7%，德国甘菊的出油率是\
    \ 0.2% ~0.4% 。  \n\n# (4) 化学成份  \n罗马甘菊精油的主要化学成份为松萜或蒎烯、茨烯、桧烯、月桂烯、桉树脑、松油精萜品烯、石竹（萜）烯。\
    \  \n\n德国甘菊油的主要化学成份为甘菊环烃、春黄菊奥（约 60%）、春黄菊醇、倍半萜类、位半萜醇、当时酸酯、当归酸丁酯、丁酸等。  \n\n# (5)\
    \ 治疗功效  \n罗马和德国这两种甘菊都有极好的镇静作用。但是，罗马甘菊对愤怒、急躁和情绪不良的效果会更好些，在治疗月经前不快症状（PMS）和其他症状、更年期问题方面也有很大的价值；而德国甘菊对皮肤有卓越的效果，不仅有平滑和安抚的作用，还有治疗和使皮肤组织再生的作用。\
    \  \n\n1) 罗马甘菊精油的使用  \n这种精油给孩子用效果非常好。可用于他们情绪急躁、缺乏耐心，在出牙期或得了疝气病时。如果妇女使用，可以缓解经前不快的症状。一般情况，对于治疗腹部疼痛、胆囊炎和咽喉感染也是有效的。此外，还能缓解敏感症、干草热和哮喘。对于皮肤，它能用于治疗粉刺、湿疹、皮疹、创伤、皮炎、干燥和发痒，以及一般的过敏状况。对于婴儿，可以用稀释得很稀的汽液，应还可以用于平息恼怒、治疗疝痛、痢疾和胃痉挛。\
    \  \n\n2) 德国甘菊精油的使用  \n这种精油对情绪和身体都有平缓的作用，在治疗各种类型的炎症都有好的疗效，无论内外的炎症。治疗尿路结石（膀胱结石）效果理想。此外，它能激发肝脏和胆囊的功能，因而可以促进消化。在治疗月经和更年期出现的问题时，也有好的效果。在皮肤上使用，会产生奇迹般的效果，能平缓发红、干燥和过敏的皮肤问题，对于敏感、湿疹、牛皮癣和其他各种脱皮的皮肤问题也有效果。\
    \  \n\n(6) 使用注意事项  \n这两种精油都没有毒性和过敏性，但因为它们具有通经的性质，当高浓度使用时，应避开怀孕期。  \n\n(7) 用途 \
    \ \n1) 香炉和蒸发器  \n罗马甘菊精油在蒸汽治疗中使用，可以治疗神经系统疾病、头疼和偏头疼。  \n\n2) 做按摩油或浴盆的添加成份。  \n罗马甘菊也可以在复方按摩油中使用，或者稀释在浴盆中，有助于敏感症、厌食症、上瘾、疝痛、背部疼痛、肌肉疼痛、关节炎、产后抑郁和肠胃失调症状的改善；而德国甘菊对哮喘、麻疹、腮腺炎、PMS（月经前不快症状）、更年期症状和风湿病都有疗效。\
    \  \n\n3) 做洗液和面霜的成份。  \n罗马甘菊做护肤面霜的成份时，可以治疗尿布湿疹、烧伤和太阳灼伤，而德国甘菊对于一般的皮肤护理有效，尤其是对过敏性皮肤。\
    \  \n\n4) 做漱口水成份。  \n罗马甘菊精油能做漱口水成份，对于牙龈肿痛和扁桃腺炎有效。  \n\n(8) 适合与洋甘菊精油混合使用的精油  \n\
    佛手柑、鼠尾草、薰衣草、天竺葵、茉莉、茶树、葡萄柚、玫瑰、柠檬和依兰精油。  \n\n## 3. 大马士革玫瑰精油  \n\n玫瑰精油是从大马士革玫瑰（Rosa\
    \ damascena）提取的，属于蔷薇科，又称为保加利亚玫瑰和土耳其玫瑰精油。  \n\n(1) 精油性质  \n大马士革玫瑰精油具有深厚、清新的味道，有典型的玫瑰型香味。精油颜色淡黄到绿色。\
    \  \n\n(2) 来源  \n英文Rosa来源于希腊文roden，意思是“红色的”，由此，人们推测，古时玫瑰的颜色是深红色的。安第斯达一位10世纪的波斯医生，第1次使用玫瑰蒸馏精油。在1612年，玫瑰蒸馏作坊在波斯（西南亚国家，现在的伊朗）的设拉子（伊朗西南部城市）诞生了。在婚礼上，抛洒玫瑰花瓣，预示着婚姻幸福，玫瑰花瓣还是爱情和纯洁的象征，在沉思和祈祷时也用些玫瑰花瓣。制造30毫升玫瑰精油，约需要60000朵玫瑰。换一种算法的话，约40000kg的花瓣可生产1L的玫瑰精油。\
    \  \n\n(3) 提取方法  \n玫瑰精油是用鲜花瓣提取的，鲜花瓣在早晨8～10时之前采摘，采用蒸汽蒸馏法，出油率在0.02%～0.05%。蒸馏过程中，要小心控制加温，如果加热过高容易导致香气损失。\
    \  \n\n(4) 化学成份  \n玫瑰精油的化学成份是最复杂的精油之一，已知成份超过300多种。主要包括香茅醇、苯基乙醇、香叶醇、橙花醇、苯基乙醛、法呢醇（金合欢醇）、玫瑰蜡、微量的壬醇、芳樟醇、壬醛、柠檬醛、香芹酮、乙酸香茅、甲基丁子香酚、丁子香酚。\
    \  \n\n(5) 治疗功效  \n虽然这种精油的销量不如薰衣草油，部分原因是价格因素，但它的确是身兼多种用途的最好的精油之一。它不仅能使你从沮丧、悲痛、愤怒和恐惧中解脱出来，还对心脏和消化系统有帮助，对女性问题的解决是最令人惊奇的；同时，也是在皮肤上使用的效果最好的精油之一。\
    \  \n\n1) 大马士革玫瑰精油能抚慰和协调情绪，对抑郁、生气、悲痛、恐惧、神经紧张和压抑有帮助；同时，还能增加性欲、自身滋养、自信和处理情感问题的能力。\
    \  \n\n2) 它对于不好的循环和心脏问题有非常大的帮助，包括心悸、心率失常和高血压；它还用于改善肝脏和胆囊的功能。  \n\n3) 对于呼吸系统，大马士革玫瑰精油有助于解决哮喘、咳嗽和干草热；在消化系统方面，对改善肝脏充血和反胃恶心有好处。\
    \  \n\n4) 大马士革玫瑰精油具有清除、净化、调节和纯化女性生殖器官的效果；可用于调节和平衡激素分泌、不规则月经、白带不正常、月经过多、子宫出血和其他子宫失调的问题，对子宫的协调作用是全面的。\
    \  \n\n5) 对于皮肤的保湿效果非常有效，它可以增加皮肤的水分，增加结合水的含量；同时，它对皮肤还有杀菌和激励的作用，适用于所有类型的肤质，但是，尤其适合干燥、成熟和过敏性的皮肤。还可用于修复断裂的毛细管，缓解炎症和皮肤发红，也有助于湿疹和疱疹的康复。玫瑰水可用于治疗结膜炎。\
    \  \n\n(6) 使用注意事项  \n大马士革玫瑰精油无毒、无刺激性和无光敏性，但是，在怀孕期间应避免使用。  \n\n(7) 用法  \n大马士革玫瑰精油给予一种康乐和幸福的感觉，以缓解紧张的神经，改善呼吸系统和消化系统的功能，对于月经问题和皮肤护理方面也有良好的效果。\
    \  \n\n1) 香炉和蒸发器熏香  \n在蒸汽疗法中，玫瑰精油有益于敏感症、哮喘、精神抑郁、头疼、偏头痛、神经紧张，能作为一种弛缓药。当处理情感问题、悲伤和失落的时候，它尤其适用，可以化解精神压抑、生气和悲痛的情绪。\
    \  \n\n2) 做按摩油的成份或添加在盆浴中适用。  \n适用作按摩油的成份或添加在浴盆中，玫瑰精油有助于治疗敏感症、精神抑郁、哮喘、干草热、头疼、压抑、偏头痛、神经紧张、悲伤，还可以改善循环、镇定心脏、激励肝脏和胆囊，调和皮肤组织。\
    \  \n\n3) 做润肤乳和面霜成份使用。  \n当玫瑰精油混在洗液或面霜中使用时，它能通过增加皮肤含水量和结合水的数量，来激励皮肤的新陈代谢，适合所有肤质，对于干燥、成熟、敏感的皮肤效果更好。它还有助于减少皮肤红色，抗感染和修复皮肤受损的毛细管，因为具有良好的收敛性，它可以作为一种常用的皮肤滋养品。\
    \  \n\n(8) 适合与大马士革玫瑰油混用的精油  \n天竺葵、茉莉、丁香和棕榈玫瑰精油。  \n\n# 4. 茉莉精油  \n\n茉莉精油是从茉莉植物（Jasminum\
    \ officinale）的花中提取的，属于木樨科，又称为素馨。一般用于提取精油的茉莉品种是非常普通的（Jasminum grandiflorum）品种。\
    \  \n\n这种精油价格昂贵的原因不仅在于它具有高雅气味，而且具有明显的放松效果，可以振奋精神，提升自信心，使分娩顺利；还能平缓咳嗽，护理和改善皮肤弹性，淡化妊娠纹和伤疤。常见的茉莉精油是含量为\
    \ 25%的复方油。  \n\n(1) 精油性质  \n味道清甜，具有异国情调和丰富的花香气味。  \n\n# (2)来源  \n茉莉是种常绿的、多年生的灌木，有的是攀缘灌木，可以长到10m高。叶片深绿，花小、星状、白色，在夜间采摘花朵时香味最浓。一个有经验的采摘者一晚上可以摘10000~15000朵花。\
    \  \n茉莉起源于中国和印度北部，它是被摩尔人（非洲西北部伊斯兰教民族）带到西班牙的。目前，法国、意大利、摩洛哥、埃及、中国、日本和土耳其生产的茉莉精油最好。\
    \  \n茉莉的英文名字Jasmine是从波斯人语yasmin演变来的。中国人、阿拉伯人和印度人在医学上用它，也用做壮阳剂，经常在一些仪式上使用。  \n\
    在土耳其，茉莉茎被用于制作绳索；在中国，人们喜欢用它制成茉莉花茶（一般用于做茉莉花茶的品种是*Jasminumsambac-Arabianjasmine）；在印度尼西亚，它是人们喜爱的一种装饰品。\
    \  \n\n茉莉植物性寒。李时珍说：本品可蒸油取液作面脂、头油，以生发、润肤。  \n(3) 提取方法  \n茉莉精油开始时是采用溶剂提取方法，以“固态形式”参与贸易的，使用时用酒精把茉莉精油从固态中提取出来，获得一种“完全”精油。现在，人们开始采用蒸汽蒸馏法获得“完全”精油。大约1000kg朵花可以生产1kg的液态固体，里面含有约0.2%的芳香分子。\
    \  \n(4) 化学成份  \n可以在茉莉精油中分析出大约100种成份，主要包括苯甲基醋酸酯、芳樟醇、苯甲基乙醇、吲哚、苯甲基安息香酯、茉莉酮、香叶醇、甲基（邻）氨基苯甲酸酯、微量的甲酚、法呢醇、乙烯基安息香酯、丁子香酚、橙花醇、安息香酸、安息香醛、萜品醇、橙花油、叶绿醇等。\
    \  \n\n# (5) 治疗功效  \n1) 它是一种治疗严重精神压抑的有效药物，可以抚慰神经，建立一种自信，有乐观和精神欢快的感觉，还可以新生和恢复精力。\
    \  \n2) 可以促进分娩顺利，它能通过加强子宫的收缩来促进婴儿的分娩，同时还有缓解疼痛的作用。它对产后抑郁症也有缓解的功效，还可以促进乳汁的分泌。  \n\
    \n3) 因为它有很强的抚慰和镇静的特性，茉莉精油可以帮助解决有关性的问题，如阳痿、早泻和性冷淡。  \n\n4) 它对治疗呼吸系统的疾病也有很好的疗效，可以减弱咳嗽，对声音嘶哑和喉炎也有疗效。此外，还可以用它缓解肌肉疼痛、扭伤和四肢僵硬的症状。\
    \  \n\n5) 茉莉精油适合护理干燥、油性、刺激性和敏感性的皮肤，增加皮肤的弹性，还经常被用于治疗妊娠纹和伤疤。  \n\n# (6) 使用注意事项 \
    \ \n茉莉精油是无毒、无刺激的，一般情况下也没有光敏性。但是，个别人对它有过激性反应。由于它有通经的作用，不能在孕期使用。因为它是一种强效放松精油，过量使用这种精油会影响注意力集中。\
    \  \n\n# (7) 用法  \n茉莉精油是种功效强劲的油，可以治疗严重的精神抑郁症，促进分娩，对治疗有关性方面的问题也有帮助，还可以用于呼吸道、肌肉、皮肤方面的治疗。\
    \  \n\n1) 香炉和蒸发器熏香  \n在蒸汽疗法中，茉莉精油可以用于治疗上瘾，振奋精神、缓解神经过敏和咳嗽、促进放松和停止紧张。  \n\n2) 做复方按摩油或稀释在浴盆中使用\
    \  \n茉莉精油做复方按摩油或稀释在浴盆中使用，可以用于治疗上瘾，振奋精神、缓解神经过敏和咳嗽、促进放松和停止紧张。  \n\n3) 做面霜或润肤乳的成份\
    \  \n当用作面霜或润肤乳时，茉莉精油适合护理干燥、油性、刺激性和敏感性的皮肤，增加皮肤的弹性，还经常被用于治疗妊娠纹和伤疤。  \n\n# (8) 适合与茉莉精油混用的精油\
    \  \n香柠檬、玫瑰、檀香和所有柑橘属植物精油。  \n\n# 5. 苹果天竺葵精油  \n\n苹果天竺葵精油是从苹果天竺葵植物（Pelargonium\
    \ odorantissimum）提取的，属于牻牛儿苗科，与从其他近亲植物提取的玫瑰天竺葵精油（又称香叶天竺葵）是不同的，因为苹果天竺葵植物中提取的精油更昂贵些。我国也有叫老鹳草的。它有一种强烈的花香气味，暗含有薄荷的气味。从苹果天竺葵植物提取的天竺葵精油有种轻微的苹果味，而从玫瑰天竺葵植物中提取的精油是玫瑰香味。这种清新的精油在芳香疗法中具有一种恒定的位置，因为它可以平衡情绪和精神。它能刺激肾上腺皮层，具有平衡荷尔蒙系统的分泌功能，以及刺激淋巴循环系统的功能。另一方面，它还可以平衡皮肤油脂的分泌数量，使皮肤保持柔软，并有助于创伤的愈合。\
    \  \n\n## 常用单方植物精油  \n### （1）精油的性质  \n这种精油基本上是无色的，但是稍带有轻微的绿色。黏质性为水性。  \n### (2)\
    \ 来源  \n这种植物原产于南非、留尼旺岛（印度洋西南面的一个法属火山岛）、马达加斯加岛（非洲岛国）、埃及和墨西哥，在 17世纪，被引入欧洲国家，如意大利、西班牙和法国。我国云南、四川栽培面积较大。\
    \  \n### (3) 提取方法  \n叶片和茎被用于提取精油，采用蒸汽蒸馏法。  \n### (4) 化学成份  \n苹果天竺葵精油的主要化学成分：松萜或蒎烯、月桂烯、柠檬油精、薄荷酮、芳樟醇、乙酸香叶酯、香茅醇、香叶醇和丁酸香叶酯。\
    \  \n### (5) 治疗功效  \n苹果天竺葵精油可以帮助治疗痤疮、瘀伤、烧伤、割伤、皮炎、湿疹、痔疮、虱子，驱除蚊子、癣菌病、溃疡、乳房充血、浮肿、不良循环、咽喉疼痛、扁桃体炎、经前紧张综合征、更年期问题，压力过大和神经痛。\
    \  \n这种有振奋作用的精油对情绪有良好的全面平衡效果，这种振奋的功效尤其可以用在护理皮肤方面，它可以帮助在油性和干燥皮肤之间创造一种平衡。它也可以帮助调节情绪，当处于压力和焦虑的情绪中时，它可以起到缓和的作用，它也可以作用于肾上腺皮层，以帮助平衡内分泌系统。它强烈的气味尤其适合驱除蚊子和头上的虱子。\
    \  \n### (6) 使用注意事项  \n苹果天竺葵精油不会引起任何的副作用，因为它无毒，没有刺激性，一般也不会产生过敏反应，然而，极少数人对它有过敏。由于，它对荷尔蒙的分泌有平衡作用；不要在孕期使用。\
    \  \n苹果天竺葵精油的治疗功效，包括收敛、止血、增强免疫力、利尿、除臭、滋补、杀虫和治疗创伤。  \n### (7) 用法  \n1) 香炉和蒸发器熏香\
    \  \n在蒸汽治疗中，天竺葵精油可以用于缓解压力、消除沮丧，有利于治疗月经前不快综合征、焦虑和紧张，更年期问题和给予精力。  \n\n2) 做复方按摩油或稀释在盆浴中使用。\
    \  \n天竺葵精油可以用在复方按摩油中，或稀释在盆浴中使用，有助于治疗经前不快综合征、沮丧、压力大、焦虑和紧张、保持水分、湿疹、带状疱疹、瘀伤、癣菌病、痔疮和经期不规律，还可以驱避蚊虫。\
    \  \n\n3) 做面霜或润肤乳的添加成份。  \n当作为面霜的底料成份时，天竺葵精油可以用于治疗湿疹、带状疱疹、烧伤和伤疤、癣菌病、瘀伤和乳房充血，还可以驱避蚊虫和分解脂肪团。它将有助于帮助平衡皮肤油脂的分泌，能使皮肤保持柔软，有助于伤口的愈合，包括烧伤、创伤和溃疡。\
    \  \n\n4) 稀释在洗发香波中使用。  \n苹果天竺葵精油也可以稀释在洗发香波中使用，以帮助去除头上的虱子。  \n\n(8) 适合与天竺葵精油混用的精油\
    \  \n圆当归、罗勒、香柠檬、胡萝卜籽、雪松、香茅、鼠尾草、葡萄柚、茉莉、薰衣草、酸柠檬、橙花和迷迭香精油。  \n\n# 6. 玫瑰天竺葵精油  \n\n\
    玫瑰天竺葵精油是从玫瑰天竺葵植物 (Pelargonium graveolens) 中提取的，属于牻牛儿苗科。这种植物比其他的品种 (Pelargonium\
    \ odorantissimum) 更有玫瑰香味。如果这种油是从叶片提取的，以开始变黄的叶片为原料比嫩些、还绿着的叶片为原料，所提取的油更有玫瑰香味。一些仿造玫瑰天竺葵精油的赝品其实是比较便宜的\
    \ (P. odorantissimum) 精油，而我们真正的精油是以 (Pelargonium graveolens) 为原料的。  \n\n这种清新的带有玫瑰香味的精油能刺激肾上腺皮层，有助于平衡神经系统，还可以振奋精神和缓解压力，对于荷尔蒙系统也有一种协调作用。对于油性皮肤有更好的清洁作用，也有促进皮肤恢复的功效。\
    \  \n\n(1) 精油性质  \n它的味道清新，带有玫瑰气味，还隐含着一种薄荷味；一般无色，但是也有浅绿色的**精油；黏质性为水性。**  \n\n（2）来源\
    \  \n这种植物原产于南非、留尼旺岛（印度洋西南面的一个法属火山岛）、马达加斯加岛（非洲岛国）、埃及和摩洛哥，在17世纪，被引入欧洲国家，包括意大利、西班牙和法国。\
    \  \n\n这种植物大约有700个不同的品种，然而，只有大约10个品种的含油量达到了提取精油的标准。常在花园栽培的玫瑰天竺葵因含油量太低，而不能作为原料使用。\
    \  \n\n它是一种多年生的灌木，全株有毛，常被用做灌木篱，高度约1m，叶片针状、边缘有锯齿，花色桃红或白色。在人类早期，人们会在房屋周围种植大量的天竺葵，用于驱邪。\
    \  \n\n（3）提取方法  \n玫瑰天竺葵精油是以叶片和茎为原料，采用蒸汽蒸馏技术提取精油的。  \n\n（4）化学成份  \n玫瑰天竺葵精油的主要化学成份：松萜或蒎烯、月桂（香叶）烯、柠檬油精、薄荷酮、芳樟醇、乙酸香叶酯、香茅醇、香叶醇和丁酸香叶酯。\
    \  \n\n（5）治疗功效  \n1) 玫瑰天竺葵精油对神经系统有平衡的作用，可以缓解压力和焦虑，能振奋灵魂，让你感觉到世界的美好。它对肾上腺皮层也有很好的平衡作用，可以缓解肾脏压力。\
    \  \n\n2) 它的止血性质有助于维持身体机能的平衡，因为它还能刺激和平衡肾上腺皮层的分泌，内分泌系统也会得到协调。对于淋巴循环系统，它有非常强的刺激作用，能起到排毒的效果，也会有助于妇女的健康，它可以缓解经前紧张综合征（PMS），还能平衡阴道分泌物和缓解排经过多的问题。\
    \  \n\n3) 它对身体有利尿的作用，可以平衡水分系统，矫正一些不良的水分和废物的排泄。它还有助于治疗黄疸、胆结石，止鼻血和其他部位的出血。  \n\n\
    4) 对于皮肤，玫瑰天竺葵精油有助于平衡皮脂的分泌，清洁油腻皮肤。还有杀菌作用，可以治疗烧伤、创伤、溃疡和其他皮肤问题。  \n\n（6）使用注意事项  \n\
    玫瑰天竺葵精油没有表现出任何的副作用，因为它无毒、无刺激性，一般情况下也无光敏性（但是有个别人会有此反应）。由于它有平衡内分泌的功效，不要在孕期使用。  \n\
    \n玫瑰天竺葵精油的主要治疗功效包括抗抑郁、防腐杀菌、收敛、利尿、除臭、止血、滋补、杀虫和医治创伤。  \n\n（7）用法  \n这是一种具有提升作用的精油，对身体有很强的全面调理作用，包括对皮肤，它可以"
