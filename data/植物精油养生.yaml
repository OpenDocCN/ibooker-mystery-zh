    1. 荷荷芭油


    事实上，荷荷芭（Simmondsia chinensis）油不是一种油，而是一种液体蜡。在1970年，当捕鲸被禁止以后，它就开始变得重要起来，因为它的性质与鲸油的性质十分相似。因为它主要是由蜡脂构成的，是一种非常稳定的物质，不容易变质，它的结构与我们人类的皮脂构造非常接近，可以把它作为一种极好的皮肤保湿剂，适合所有类型的肤质。当作为按摩媒介油使用时，它可以当作皮肤自然分泌皮脂的乳化剂，具有柔和疏通毛孔的作用，能清除毛孔表层和深层的污物。荷荷芭油含有头发需要的一种营养成份，因此有时也被添加到头发护理产品中，但由于它的成本很高，所以含量很低。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_156_1.png)


