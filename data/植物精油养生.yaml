- img_proc: true
  md: '用含有精油的按摩油，在腹部摩擦也可以缓解腹泻。配置按摩油的方法是，把下列精油混入10mL的基础油中：2滴椒样薄荷精油、2滴薰衣草精油、2滴洋甘菊精油、2滴桉树精油、2滴天竺葵精油。


    # ### 7. 肛裂


    典型的肛裂会引起强烈刺骨的疼痛，同时有瘙痒的感觉。通常是在排便后发作。


    肛裂可以解释为，在肛门外表皮之间有溃疡处或发炎的裂缝，黏膜组织也会发生溃疡；病因通常是多方面的联合导致的，包括干燥皮肤受到过分摩擦、粗糙的手纸、由于便秘的拉伤，甚至过大和坚硬的大便引起的。


    年龄大的老人和小孩容易发生肛裂。


    用添加5滴薰衣草精油和1滴柠檬精油的温水，清洗患处，能缓解症状。


    # ### 8. 憩室炎


    位于大肠虚弱部分的重瓣憩室能收集大肠废物，一般不会有不舒服的感觉，除非它们有了炎症。症状可能有疼痛的感觉，以及敏感、发烧、腹泻、便秘、痉挛、出血和贫血。


    通常40岁以上的人容易患憩室炎，主要病因是，由于年龄的增长，大肠内壁所受压力过大和组织衰弱引起的。当大肠内收集废物的这些憩室被填充满后，就会发生炎症。


    库拉索芦荟有促进感染部位愈合的作用。可以1天3次，每次饮125mL的芦荟汁，以帮助治疗。还可以按顺时针的方向，在胃部以上涂抹按摩油，也能够缓解不适。按摩油的配制方法如下：1滴欧薄荷精油、1滴洋甘菊精油、2滴迷迭香精油、1滴丁香精油与5mL植物基础油混合。


    # ### 9. 烧心


    烧心就是胸口有灼烧疼痛的感觉，这种感觉能够辐射到脖颈和咽喉部位，有时会到脸部。它通常在饭后发作，此时胃酸正逆流而上经过括约肌。如果括约肌的肌肉协调能力丧失，保持着开的状态（正常情况是在关闭状态），胃酸就会逆流而上，就有烧心的痛苦感觉。


    可以用下列配方制成的按摩油按摩腹部上半部：2滴尤加利精油、1滴欧薄荷精油、2滴茴香精油，稀释在5mL（约1茶匙）葡萄籽油中。


    # ### （七）植物精油与生殖系统


    生殖系统是人体最为重要的系统之一，正是由于有了生殖系统，人类才能够繁育后代，才会享受为人父母的快乐与幸福。植物精油对生殖系统的主要作用是治疗生殖系统病'
