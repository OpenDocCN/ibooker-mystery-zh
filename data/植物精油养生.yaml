    # 5. 檫木精油


    檫木精油是从檫木植物（Sassafras albidum、Sassafras officinale，S. variifolium and Laurus sassafras）中提取的，属于樟科。


    # (1) 精油性质


    檫木精油含有高浓度的黄樟油精（80% ~90%），这种成份是FDA所禁止使用的，因为它是一种致癌物质，即使小剂量使用也是致命的。


    # (2) 来源


    檫木是一种落叶植物，可以长到40m高，分枝多、柔软，树皮柔软、多孔、橘黄色，花小、黄绿色。树皮和树干都有香味。在古代草药学中，檫木被用于治疗高血压、'
