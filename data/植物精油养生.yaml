  md: '# # 植物精油在家庭日常生活中的应用

    Essential oils health


    (1) 普通肤质的面膜


    普通肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴1滴天竺葵精油和1滴橙花油，充分混合后待用。


    (2) 干性肤质的面膜


    干性肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后加1茶匙小麦胚芽油或月见草油，滴1滴洋甘菊精油和2滴胡萝卜籽油，充分混合后待用。


    (3) 油性肤质的面膜


    油性肤质的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴1滴薰衣草精油和1滴乳香或刺柏浆果油，充分混合后待用。


    (4) 有皮肤问题时应采用的面膜


    有皮肤问题的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后滴1滴薰衣草精油、1滴茶树油和1滴橙花油，充分混合后待用。


    (5) 返老还童面膜


    皮肤有衰老问题的人做面膜时，先用花水和生鸡蛋把黏土或高岭土、矢车菊和燕麦混合好，然后加1茶匙荷荷芭油，滴1滴甘菊精油、1滴乳香油和1滴没药油，充分混合后待用。


    # ## 4. 头发护理


    随着年龄的增长，皮肤开始出现皱纹，肌肉也开始变得松懈，然而，我们却很少注意到头发的状况，只是任其自然生长。因遗传、生病、发烧、甲状腺疾病、辐射、循环系统疾病、营养不良或压力过大等因素引起的脱发，困扰着人们。虽然精油不能治好引起掉发的疾病，但有益于头发的某些精油已经有几个世纪的应用了，在帮助头发再生方面享有盛名。这些香草植物精华的优点不仅是它的香味，某些精油还有显著的治疗功效，毛发再生专家也持相同观点。


    (1) 掉头发（秃头症）


    可帮助减少掉头发的精油：柏树、薰衣草、加州荷蒙得木、迷迭香。我们建议使用迷迭香，因为它作为有效成份被应用在头发护理产品中已经很长时间了。迷迭香，或者上述中的任何一种都可以添加在洗发液中使用，也可以调配成复方油（2滴精油加15mL基础油）做成头皮按摩油。


    (2) 头皮屑


    使用精油和芳香疗法治疗头皮屑，常用精油有：雪松、薰衣草、广藿香、迷迭香、茶树油精油。这些精油可以用做头皮按摩复方油的组成（稀释方法如上），或者掺入洗发液中使用。如果发质是油性的，可以选用茶树精油；干性的发质选用迷迭香精油。'
