    油可以使用，它有清澈和新鲜的味道。褐色的和黄色的樟脑

    精油有毒和致癌性，因为它含有黄樟油精，不能在芳香疗法中

    使用。


    (2) 来源

    樟树可以长到35m高，树的每一部分都有活性成份。樟

