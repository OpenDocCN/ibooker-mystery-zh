    # ## （三）草本果仁类基础油


    # ### 1. 南瓜籽油


    虽然南瓜籽油被划归到专业基础油行列，但是一些芳香保健师仍喜欢用它，因为它含有高浓度的蛋白质、锌和不饱和脂肪酸。


    它是从普通南瓜（Curcurbita pepo）提取的，尽管有人口服南瓜籽油，用于治疗尿路感染，但它也常常作为基础油的一种成份。南瓜籽油对皮肤有很强的治疗功效，如疼痛和溃疡；在按摩油或基础油中使用是个好的选择。


