    # **14. 痈**


    简单地说，痈就是一种严重的脓肿，单独地分散在毛囊上，应该找医生咨询。产生痈的原因与脓肿和疖子的病因相似。


    清洗发病部位，洗液配制方法：在 125mL 热水中添加 2 滴薰衣草精油和 2 滴茶树精油。纯茶树精油也可以用棉棒涂抹在受感染的地方。


    # **15. 瘀伤**


    瘀伤是血液从受伤的血管流出进入其周围皮下组织造成的。不同深度的皮肤瘀伤，开始的颜色是红色、黑色或是青色，也会变成黄绿色。撞击、夹拧和摔跤都会造成青肿，当骨折时也会发生。


    肥胖或者贫血的人，瘀伤会加重。多吃维生素 C 的食物可以预防和有利于瘀伤的康复。


    用下面所列精油轻轻涂抹受伤处，多数瘀伤在不经意间就恢复了。


    10mL 葡萄籽油混合有：5 滴金盏草精油、1 滴柏树精油、2 滴茴香精油。


    也可以在瘀伤处直接使用薰衣草精油。


    # **16. 扎刺**


    用消过毒的针或一双镊子尽快把刺取出。要仔细地把刺全部取出，因为留下的刺会引起感染。往扎刺的地方滴 1 滴纯薰衣草精油；如果有炎症出现要立即到医院接受治疗。


