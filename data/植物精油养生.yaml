    6. **香皂去油绝对要适当**。在多次操作过程中发现，在香皂用量控制良好的条件下，香皂洗面手法太重会使皮肤有紧张感觉，所以要轻。这种油与皂类互溶性良好，稍加接触即可互溶。皂洗面时间要绝对短，时间长就会将油洗掉，从而失去洗面的功效。

    7. **清水洗残皂时间要短**。用温凉的清水洗面上残皂时，时间也要控制好，在脸上水分蒸发前，感觉面部有水油感是正常的。水分散失后，就有清爽的感觉了。

    8. **不能用湿毛巾搽脸**。蘸干面部是必要的，可以选用柔软洁净的卫生纸。切忌用湿毛巾擦洗面部，否则会破坏油膜的完整性。

    9. **保持用清水洗脸**。在油洗面期间，仅用清水洗脸即可。

    10. **油水面的间隔可以在 3~5 天内**。油水面的时间间隔跟用者本身的皮肤状况和季节有关。偏向于干性皮肤的用者和在气候干燥的季节，间隔期可以缩短 1~2
    天。


    最后要强调一点，使用温水不要超过 30℃，否则水与油的互溶性将增加，对于清除脂溶性的污物不利。


    ### (3) 治疗痤疮


    经过案例分析认为，用该植物油洗面 1~2 个疗程，面部突起就会变得扁平，对于皮肤油脂的分泌有明显的平衡抑制作用。

    油洗面本身并不会抑制到皮脂腺排毒的功能，这也就是说，油洗面还会有粉刺的生成，但是粉刺消下去的时间会明显缩短。


    ## （二）一种能祛脚气的芳香杏仁足浴油


    ### 1. 脚气发生的原因和过程


    脚气，又称足癣，是发生于趾缝、足底和足跟部位的皮肤癣病。脚气致病菌主要为红色毛癣菌、须癣毛癣菌和絮状表皮癣菌等。脚气致病菌与足部接触后，其分泌的角质溶解酶能使致病菌迅速侵入皮肤，然后分解角蛋白组织而汲取营养。脚气致病菌的发生和繁殖主要受以下因素影响：①接触脚气致病菌是患病和复发的根本原因，如使用公共浴室的拖鞋、接触脚气患者的鞋袜等；②脚气致病菌适宜在
    25℃、pH 5～7 的潮湿环境中繁殖。因此，在夏季足部汗液分泌较多时，脚气发生严重，治愈人群也易复发；③部分患者免疫力低下，也是易于诱发脚气的原因。


    ### 2. 脚气常见防治方法


    目前，针对脚气发生的原因，主要采取以下措施进行防治：


    (1) 通过药物杀死脚气致病菌，这是目前最为常用的治疗方式。其中包括外用药物，如达克宁、足光粉；或结合内服抗真菌药物进行治疗，如特比萘芬等。但外用药治疗周期长，用药次数多，不易涂抹均匀，长期使用易引起皮肤过敏；内服药物对某些特殊人群使用时存在一定风险，还可能引起病菌的耐药性。


    (2) 改变足部环境条件，使之不利于脚气的发生。可以使用透气鞋袜等，避免潮湿环境；以及采用民间偏方，如将食醋和雪花膏调成糊状涂于患处，以降低患处 pH 值；用电吹风加热患处，以提高患处温度并降低湿度。但以上多为药物治疗的辅助方法，单独使用效果较差。部分偏方刺激性大，甚至会加重病情。


    (3) 提高自身免疫力。通过饮食、锻炼等途径，加强自身体质，提高对脚气致病菌的抵御能力。但目前相关研究较少，还没有形成较为系统的理论。


    脚气属于易复发的疾病，要达到根治效果，应将预防放在首位，做到防治兼顾。因此，在日常生活中不仅要避免接触感染源，还应注意足部的日常护理。如果在日常足浴中使用本发明，结合简单的揉搓和按摩，就能有效抑制脚气发生。


    ### 3. 芳香杏仁足浴油的作用机理


    针对脚气发生的原因和目前治疗方法的不足，通过以下途径实现脚气的防治：


    (1) 芳香杏仁足浴油易于附着在皮肤组织上，形成一层保护环境，降低外界环境中脚气致病真菌的侵染机会。

    (2) 足浴油通过简单的揉搓和按摩能够深入足部毛孔。在渗透过程中，对毛孔内油脂腺的分泌通道起到疏通、清洁和润滑的作用，既保持了毛孔畅通，又用清洁的植物油替换出人体油脂，阻断致病真菌的营养供应。

    (3) 对皮肤有一定的收敛效果，可以作用于足部汗腺，抑制脚汗。其抑汗作用对足部出汗较多的人群尤为明显，避免提供致病菌适宜生存的湿度。因此，具有良好的脚气防治效果。使用此油，足部有干爽和光滑的感觉，这种感觉可以持续
    3 天左右，并能持续散发香气达 2 天以上。


    ### 4. 芳香杏仁足浴油的成份特点


    芳香杏仁足浴油采用源于我国的真正甜杏油 S，添加适量植物精油，以及最低程度的增溶剂和乳化剂制成。


    (1) **真正甜杏仁油**

    此处所用甜杏仁油 S 与目前国际市场上所谓的甜杏仁油（Sweet Almond oil）不同。后者是一种桃仁油，其原材料属于扁桃属 (*Prunus armeniaca*
    L)，此甜杏仁油的原材料为我国特有的一种食仁杏树 (*Prunus sibirica* L)，属于杏属。


    (2) **低化学添加剂**

    由于油与水互溶性差，制备足浴油时需要向天然甜杏仁油 S 中加入一定量的增溶剂和乳化剂，统称为表面活性剂。表面活性剂可以帮助杏仁油渗透皮肤外，还可以清除一般的污垢。本研究采用化妆品中常用的土温
    80 和司班 80 作为表面活性剂。在化妆品配方中，表面活性剂比例一般为 15%~35%。为降低化学添加剂的潜在刺激性，本研究将表面活性剂的用量降到最低，仅占配方比例的
    7%~13%，使产品性质更温和。


    (3) **植物精油**

    足浴油香型以花香型较为普遍，为使足浴油散发出浓郁香味，并强化脚气治疗效果，在配方中加入具有祛除湿热作用的植物精油，如广藿香、丁香或茶树精油，达到既能防治足患，又能愉悦精神、缓解压力的效果。

    随着生活水平的提高，足疗保健日益受到人们青睐，已成为人们在工作之余缓解疲劳、舒经活络、健身治病的保健养生方法。本研究不仅适合专业足疗保健机构使用，也适合家庭日常足浴，具有广泛的应用前景。


    ### 5. 芳香杏仁足浴油的配制


    以土温 80 作为增溶剂，司班 80 作为乳化剂，按比例溶于甜杏仁油中。其中土温 80 最佳质量百分含量为 1%~5%，司班最佳质量百分含量为 6%~8%。混合后于
    50℃、1000v/m 的条件下搅拌 15 分钟，可得到足浴油。


    ### 6. 芳香杏仁足浴油的使用方法


    (1) 在 10mL 芳香杏仁足浴油中，根据个人喜好加入 5～10 滴植物精油，进行调香，再与水按最佳用量体积比 1:200 混合，最适水温为 45～50℃。建议采用的植物精油有广藿香、丁香或茶树精油等。

    (2) 轻轻揉搓和按摩足部约 3 分钟。

    (3) 用干燥软毛巾擦干足部即可。


    ### 7. 芳香杏仁足浴油的使用效果


    将本研究中的足浴油提供给脚气患者和非脚气患者使用，是我们几年来一直坚持不懈的工作，也是我们奉献给大众的一份赤诚。在使用期间，调查者中 95% 的脚气患者症状消失或好转；90%
    的使用者感觉足部皮肤比使用前光滑；67% 的使用者在运动后发现足部汗液明显减少；调查者中无不适人群。而且 95% 以上的使用者感觉足浴过程中有芳香气味，使人心情愉悦、精神放松、缓解疲劳。总体分析，其能通过抑制脚汗实现预防缓解脚气（足癣）的作用。


