  mdcn: "本段文字接上一页内容：它是古埃及人最早使用香草植物中的一种。在圣经和所罗门颂歌中都有它的记载，其中在《约翰福音》里，玛丽曾用甘松精油涂抹耶稣的脚。贵妇用它作为香水和香体的制剂。\n\
    \n## (3) 提取方法\n甘松精油是以干燥压碎的根状茎为原材料的，采用蒸汽蒸馏法提取，出油率在 1% ~ 3%。\n\n## (4) 治疗功效\n甘松精油对缓解紧张、压力、偏头痛、消化不良和失眠有效。具有返老还童的功效，尤其适用于老化的皮肤，可以有助于治疗敏感症、皮肤感染和皮疹。\n\
    \n## (5) 使用注意事项\n还没有发现甘松精油的不良反应，但与其他的精油混合使用时也要谨慎。\n\n## (6) 用法\n1. **蒸汽治疗或稀释在盆浴中使用**：在蒸汽治疗或稀释在盆浴中使用，甘松精油有助于缓解紧张和压力，治疗失眠症。\n\
    2. **做复方按摩油的成份**：作为复方按摩油的成分，甘松精油有助于治疗紧张、压力大、偏头痛和失眠症状。\n\n## (7) 适合与甘松精油混用的精油\n\
    薰衣草、柠檬、快乐鼠尾草、橙花、广藿香和香根草精油。\n\n![图片](img/9a4032e2e8ad73992ff2b2bd7fc25509_143_0.png)\n\
    **甘松 Nardostachys jatamansi**\n\n![图片](img/9a4032e2e8ad73992ff2b2bd7fc25509_143_1.png)\n\
    **檫木 Sassafras albidum**\n\n## 5. 檫木精油\n檫木精油是从檫木植物（*Sassafras albidum*, *Sassafras\
    \ officinale*, *S. variifolium* and *Laurus sassafras*）中提取的，属于樟科。\n\n### (1) 精油性质\n\
    檫木精油含有高浓度的黄樟油精（80% ~ 90%），这种成份是 FDA 所禁止使用的，因为它是一种致癌物质，即使小剂量使用也是致命的。\n\n### (2)\
    \ 来源\n檫木是一种落叶植物，可以长到 40m 高，分枝多、柔软，树皮柔软、多孔、橘黄色，花小、黄绿色。树皮和树干都有香味。在古代草药学中，檫木被用于治疗高血压、关节炎、风湿病、痛风、月经问题和肾脏问题，对皮肤疾病也有疗效。**由于檫木含有高浓度的黄樟油精，所以它是一种致癌物。**\
    \ 1983年，英国草药药典中称，檫木可以治疗头上的虱子、皮肤出疹、风湿性疾病。檫树木料和树皮可以生产出亮黄色的染色剂。\n\n### (3) 提取方法\n\
    檫木精油是从干燥屑状根皮为原料的，采用蒸汽蒸馏法提取。\n\n### (4) 化学成份\n黄樟油精、丁香酚、细辛醚、茴香脑和丁香酚。\n\n### (5)\
    \ 使用注意事项\n**⚠️ 警告：$\\S$140**  \n檫木精油不能在芳香疗法中使用，因为如果使用不当会有致癌的危险。\n\n---\n\n## #\
    \ 五、常用单方植物基础油\n\n### （一）木本果仁类基础油\n\n#### 1. 澳大利亚坚果油\n澳大利亚坚果油（*Macadamia integrifolia*\
    \ and *M. ternifolia*）是为数不多的含有大量棕榈烯酸的植物油，人类皮脂中一般也含有这种成份，因此这种油对我们的皮肤有很好的亲和力。它有非常好的软化效果，因此对干燥和老化的皮肤作用很大。皮肤老化后，皮脂的分泌减少，很适合使用澳大利亚坚果油。澳大利亚坚果按摩油有很好的柔软效果，因此适合作为按摩底油。在作面部按摩油时，可以淡化皱纹。\n\
