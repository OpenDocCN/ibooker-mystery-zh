    一个难忘的夜晚应该是以给伴侣用少量油按摩脖颈开始的，或是给足部用油做个轻松的技巧性按摩。你所按摩的地方不应该是最重要的地方，毕竟你不是一位受过训练的技师。在皮肤软组织间轻轻地敲击，在肌肉上稍加用力地按摩，使油渗入到皮肤中，应该是个好的开端。


    记住，按摩需要的是尽情地享受，为了自己和伴侣，所以要尝试着保持一种放松的顺序，享受着按摩伴侣皮肤带来的感觉。精油被皮肤吸收以后，精油的积极治疗功效将被传输到整个身体。


    # **3. 防晒复方油**


    # **（1）晒斑的表现**


    在太阳下滞留几个小时后，获得完美的棕褐色的皮肤，这可能是一些人愿意做的。不过，过多地晒太阳会导致皮肤极端地疼痛，甚至会脱皮、成片状、受感染，使皮肤变得幼嫩，还会形成具有潜在危险的晒斑。


    # **（2）晒斑形成的原因**


    为了追求全身晒成棕褐色，已经有数以百万计的人受到阳光造成的外伤，只是程度上不同。虽然使用复方油并不是意味着可以治疗日射病或严重的晒斑（这样的人需要到医院接受治疗），但它对针刺般的疼痛、肤质细嫩和太阳灼伤的皮肤具有很好的疗效。


    当不想把皮肤晒成褐色，可以使用一种含有合适的太阳保护成份的霜体，或是使用能遮挡阳光射线的物件。但是，如果你要在阳光下呆的时间较长，最好还是选择这种天然的药剂来帮助你缓解晒斑的症状。


    # **（3）适宜配方**


    请注意，这种复方油不会帮助皮肤晒成棕褐色。虽然有人称，这种油能使皮肤的棕褐色加深。不过，它的确能把阳光灼伤的皮肤变成棕褐色，因为它能给皮肤提供营养，有消炎作用，还能平缓阳光的灼伤。


    所挑选的基础油有营养和抚慰肌肤的功效，包括金盏草油、葡萄籽油、芦荟油以及玫瑰果油。


    精油的选择要具有缓解疼痛，降低皮肤温度，消除肿胀，有助于预防2次感染和伤疤的形成，能促进皮肤的修复，能激励重生新的肌肤，预防阳光对皮肤造成的伤害，包括薰'
  - '[PAGE 205]


    衣草、椒样薄荷、茶树、花梨木、洋甘菊精油。


    # (4) 如何使用


    虽然我们主要不是在讨论在阳光下暴晒的正确性，但是我们不提倡这样做的，因为这样会提高患癌症的危险性，会促使皮肤老化，所以我们建议使用一种能够抵挡紫外线的复方油，在无法避免过多暴晒情况下使用。在身体易受光处涂抹少量复方油，一天2次，或根据需要添加使用的次数。


    # 4. 放松复方油


    # (1) 心情紧张的表现


    现在，我们的生活节奏快、压力大。有时候，我们需要积极地对抗压力和紧张。经常性的压抑和焦虑还是导致抑郁症的因素。缓解压力，有个轻松的心情，有助于我们的身体和精神更好地面对来自每天生活中的冲击。


    # (2) 心情紧张的原因


    生活在这样一个竞争激烈的社会中，情绪化地使用我们的精力是没有意义的，要把它用在处理事物方面。


    # (3) 适宜配方


    可以使用天然的药物帮助你放松，如放松复方油，这是一种整体疗法的方式，可以解决这类问题。这种复方油不含有任何有害的上瘾成份，因为它们会产生许多副作用。


    选择的精油要有镇静和抚慰情绪的功效，它在镇静和抚慰情绪的同时，还能够使紧张的肌肉放松。虽然，这类精油能够使你放松，但它不是镇静剂，也不会影响到你处理日常的工作；只会让你在更加觉醒的状态下，更好地完成工作。适宜的精油包括香根草、安息香、快乐鼠尾草、罗马甘菊、薰衣草、甜牛至。基础油可以选择甜杏仁油和葡萄籽油。


    镇静剂是不能够长期使用的，否则会引起很多的问题。我们并不是提倡，在什么情况下都不使用这样的药物，而是说对这类药物的习惯性使用，应该控制在最小的剂量范围内。


    # (4) 如何使用


    在你感到不舒服的地方，如脖颈、后背或身体的其他部位，涂抹少量的这种油，然后轻轻地按摩以促进皮肤的吸收。虽然按摩不是吸收复方精油治疗功效所必需的，但是，按摩和按摩的动作也能有助于进一步地放松身体和精神。


    # 5. 分解脂肪团复方油


    适宜的精油包括黑胡椒、葡萄柚、茴香、杜松浆果、天竺葵。


    虽然脂肪团多少的评价标准有很多方面，但是使用一种有效的局部按摩复方油，是能够有助于使身体的曲线更顺畅的。在要处理的地方，涂抹少许的分解脂肪团的复方油，1'
  - '[PAGE 206]


    天2次。这种油会被皮肤快速吸收，但是如果需要的话，要用丝绵把过多的油擦掉。


    # ### 6. 护理干性和老化皮肤的复方油


    # #### （1）干性和老化皮肤的表现及原因


    最佳的皮肤健康要求，皮肤应该具有一定的保湿功能，可以分泌适量的润滑剂，以保持皮肤的紧实、有弹性和健康。当皮肤有减少湿润和润滑分泌物（油脂分泌减少）的趋势时，皮肤就会干燥，缺乏生命力，抗性将减弱。这种状况没有及时得到护理，皮肤就会逐渐丧失弹性，发生脱皮现象，在寒冷和干燥的气候尤其严重。


    干性肤质不仅让人感到不舒服，还很敏感，容易得皮肤病，也比正常状态的皮肤容易衰老。因为干性皮肤缺少保湿和润滑的补充物。


    # #### （2）适宜的配方


    一般适用于油性皮肤的配方不计其数，但是对干性的、易产生皮屑的和有皱纹的皮肤，真正起作用的药膏、香膏或润肤乳却寥寥无几。适宜的基础油包括荷荷芭油、甜杏仁油、鳄梨、纯的玫瑰果油。适宜的精油包括檀香、花梨木、乳香、茉莉、薰衣草。


    # #### （3）如何使用


    洗澡后，或是洗完脸后，把要抹油的地方很好地擦干，等1～2分钟，让洗浴后多余的水分从皮肤上蒸发掉。当皮肤彻底干爽后，在手掌上倒少量的油，双手撮，然后轻轻地擦在患处。这种复方油是容易被吸收的，会让你的皮肤感觉更柔顺。虽然我们的基础油有助于皮肤的保湿，但是精油全部功效需要两天以后才能发挥出来，它对皮肤更多的是起平衡作用。


    # ### 7. 肌肉和关节用复方油


    如果你正遭受肌肉酸疼和关节僵硬不灵活带来的痛苦，不论是什么原因，选择用于肌肉和关节的复方油可能正是能够缓解你疼痛的东西。这种复方油的穿透能力很强，并有温暖的作用，可以缓解尖锐和隐约的疼痛。


    适宜的基础油包括芦荟油、葡萄籽油。


    适宜的精油包括罗勒、甘草、迷迭香、椒样薄荷、黑胡椒以及百里香。


    肌肉和关节复方油使用方法是在患处涂抹少量复方油，然后轻轻地把油按摩进皮肤里，直到完全吸收。为了获得最大的使用效果，按摩结束后，可以想办法使患处保持温暖一段时间。'
  - '[PAGE 207]


    随着年龄的增长，我们的静脉和动脉可能会变得不那么完美了，静脉可能会有小的破裂，或出现蜘蛛网的状态，甚至会有静脉曲张。虽然发生这些现象不是危及生命的问题，但从美学观点方面，你也是不愿意接受的，况且，它还会让你感到不舒服。


    不过，我们所讨论的不是严重的静脉和动脉方面的疾病，而是指静脉的常规性退化带来的问题，这种退化是随着年龄的增长发生的。也就是说，我们指的这类疾病看起来是不重要的，比如当你坐着把一条腿交叉地放在另一条腿上时，会压缩到血液循环。


    适宜的基础油包括甜杏仁油、金盏草油、鳄梨油（未加工的）。


    适宜的精油包括丝柏、天竺葵、橙花、檀香、柠檬、没药。


    在患处涂抹少量复方油，1 天使用 2 次。


    # **9. 失眠症和失眠复方油**


    不能够进入睡眠是一件足够坏的事情了，但是睡眠不够同样会影响我们的生活质量。整夜辗转反侧，难以入眠，这对您准备开始第二天的工作绝对不是一个很好的经历。然而，成千上万的人正在忍受着这种失眠的煎熬。


    一个最快速的方法就是吃两片安眠药，然而这种能够让人成瘾的药物比起简单治疗失眠这一症状来说，可以导致更多的问题。


    失眠的原因我们必须找到并且及时解决，像疼痛、疲乏、焦虑、过度的紧张、不良的饮食（过量饮食或者少食），使用太多兴奋性的东西，诸如咖啡。


    现在很多人越来越排斥人工合成的药物了，他们正在寻求一种可以替代的自然疗法。例如睡前一个让人放松的温水浴有助于睡眠。


    当然，恰当地使用植物精油也是一种克服失眠的有效方法。


    适宜的基础油有甜杏仁油和葡萄籽油。


    适宜的精油包括薰衣草、罗马甘菊、依兰、橙花、檀香、牛至。


    使用方法是在睡觉前取少量失眠复方油轻轻地按摩自己容易接触到的地方，大约半小时。当您在颈部和肩部按摩时就应该给予特别的注意了，有些人也经常取少量油在太阳穴处按摩。


    另一种用法，就是在您往浴盆里放水的时候，取少量复方精油涂于全身；涂完后，把自己完全浸泡在浴盆内。


    # **10. 头发和头皮复方油——可以护理你的头发和保护你的头皮**


    你的头发是你最高的荣誉，但是，当你的头发和头皮出现问题时，比如，你的头发发生劈裂、断发和没有光泽的现象，也会让你感到头疼，引起你的烦恼。你的头发的生长是由许多因素决定的，包括营养、环境压力、护理水平、你的一般健康状况以及你的头皮健康情况，以及所选择护理头发的产品。'
- md: '## 植物精油在芳香按摩中的应用


    虽然，人们投入了数以百万计的金钱，研究护理头发的产品和特效香波，然而，许多人包括毛发专家，正转向于依赖越来越多的天然方式，以提升毛发的生命力；同时，也开始特别注意他们的头皮养护。其中，就包括使用精油治疗头发或头皮的方法。


    我们推荐的这种复方油配制虽然价格不便宜，然而，被那些头发有严重问题的人们使用后，可以证明它是有效的和非常受欢迎的。


    我们没有吹捧这种油是治疗光秃、头发生长不良、头发质量不好、有头皮屑、银屑病或者其他医学方面疾病的偏方，也可能你正患有其中的某项疾病，但是，如果你已经尝试过所有的治疗，都没有成功，你可以考虑用这种自然疗法做个尝试。


    精油的挑选要能够应对人们经常会遇到的大多数问题的治疗，比如头发可能出现的不适，稀疏、干裂、分叉，以及刚洗完头发仅仅几个小时就又变得油腻了，还有头皮屑的问题，这带给你的不仅仅是一个简单的不满意。


    我们只使用纯的荷荷芭油做底油，虽然它是一种昂贵的油，但是它的性质是最贴近人的皮肤的，人们发现使用这种油护理头发的效果非常好。实际上，荷荷芭油不是一种油，而是一种熔点很低的蜡脂，在室温下，它是液体状。


    **基础油：** 荷荷芭油。


    **精油：** 迷迭香、甘草、雪松、广藿香、丝柏、依兰。


    虽然，我们称“精油”为油，其实它们并没有油腻感，因为，它们是可挥发的物质，而荷荷芭油也不是一般意义上的油，实际是一种蜡脂，也不会有油腻感或油脂般的黏糊感觉。


    你要记住，你将使用的不是油性或油脂性的产品，而是富含营养的混合物，内含有活性成份的精油，它们对头发和头皮有一定的治疗功效。


    取少量复方精油，大约 1 茶匙，放在碟子里，用你的手指尖蘸些精油，然后，把手指紧贴着干燥的头皮进行按摩，要沿着头发的纹理缓慢移动，注意不要对头皮造成摩擦，那样可能会伤害到头皮和头发。


    ## 11. 婴儿复方油


    当给婴儿洗澡和穿衣服时，可以说是爱护孩子的珍贵时间，也是有孩子的最大喜悦之一。婴儿可以从精油所含的天然植物精华和功效中获益。


    当人们考虑到孩子的健康，尤其是与婴儿用品所含化学成份有关的问题时，他们常常会换用可以得到的纯天然的产品。


    婴儿的皮肤非常脆弱，一定要倍加注意，决不能使用任何可能引起过敏反应的产品。同此在选择保湿和营养婴儿皮肤的产品时要十分小心。


    要记住，尤其是给婴儿配制的产品，一定要格外的温和，不能含有任何效力强大的成份或是会在他们脆弱的皮肤上累积的成份。所加精油的浓度要极低。所有精油所占的比例仅为
    0.15%，以避免精油发生烧伤、刺激或引起任何的副作用。


    **基础油：** 葡萄籽油、荷荷芭油。


    **精油：** 罗马甘菊、薰衣草、橙花。


    像往常一样用温和的肥皂给婴儿洗澡，然后擦干。往你的手掌上倒少量的油，双手搓温暖油，轻轻地给孩子按摩。这样，孩子的肌肤就会丝般的柔滑，还会散发出清新的气味，就像世间最珍贵宝物一样。


    ## 九、植物精油在情绪调节中的应用

    Essential oils health Essential oils health


    在心理学上，情绪是指人发自本能的一种内心表达，譬如愉快的时候高歌，生气的时候暴躁，焦虑的时候沮丧……人有悲欢离合，喜怒哀乐，各种情绪的产生和存在都有它的道理，如果长期压抑不良情绪，不仅会影响人的心理健康，还会导致身体上的不适。每个人的承受能力都是有限的，一旦情绪积攒到一定程度无从宣泄，就会轰然倒塌，以致精神崩溃。通过一定途径表达内心情绪，抒发感情，才是健康的心理状态。


    精油最初来到英国的时候，有些人说它主要是与治疗压力有关。后来，在医院，发现精油最能有效缓解压力，提升精神以及减轻一些因疾病而带来的不适感。精油，一剂调节情绪的良药，它所散发的阵阵香气，通过嗅觉，传到大脑中枢反射区，可以有效刺激大脑的情绪反应，对疲倦、消极或悲观等负面情绪有很好的改善作用。


    ### （一）辅助睡眠


    有一位高血压患者，由于长期服用降压药物而发生很多不良的副作用，令他非常苦恼。在一位医生朋友的建议下，他开始尝试在精油的辅助下减低药物用量，护士每两三天来测量他的血压，他能每
    3 个月逐次减少药物用量。最后，他的药物分量减少了 87.5%，而所有他不希望有的副作用都消失了。在刚开始减少药物分量的时候，这位患者非常恐慌，因为他不知道一旦开始减少药物用量，他会有什么感觉。这种不安导致他不能很好入睡，他的妻子在芳疗师的帮助下，将马郁兰和依兰两种精油滴在纸巾上，放在枕边。这样，他不但能酣睡，早上醒来时也没有因为减少药量的事感到不安。从中体现了马郁兰、依兰精油对睡眠的调节作用。马郁兰能镇静神经系统及帮助睡眠；放松紧缩的胸口——通常是恐慌的症状，并可调理呼吸，最初阶段能明显的放慢急速的呼吸，还能镇静、平衡心跳以及调理神经。依兰精油可放慢急速的心跳，放松跟消化系统相连的痉挛，那些痉挛当我们恐慌时会更加严重。


    ### （二）恢复嗅觉


    有一位患者多年来都受到慢性鼻窦炎之苦，他的嗅觉也在慢慢衰退，并且持续地受到短暂失去嗅觉的痛苦。手术后，他的情况并未得到改善，而且常常地感到没有嗅觉，令他的人生很悲惨。当他下班回家，没有办法闻到太太为他准备的晚餐的香味，而他的太太是一个很出色的厨师。更惨的是，他甚至没有味觉，因为嗅觉和味觉是紧扣着的。在他太太的探听下，他们来到了一个芳香疗法诊所，芳疗师为他做了一个“三明治”式的全身穴位按摩，然后又在脸上重做一次。在配方里，芳疗师选择了两种效果强烈的精油——薄荷及蓝胶尤加利，但是他都没有察觉到。在接受第
    3 个疗程后，他想他应该可以闻到一点东西。芳疗师在木片上加入薄荷，放在他的鼻子前面。他发出很高兴的尖叫，然后说：“我可以闻到淡淡的薄荷味了，虽然不明显，但是我能闻到它。”6
    个月后，他恢复了嗅觉，能享受到他太太煮饭的一些香味，这令他们两人生活得更快乐。而比恢复嗅觉更好的结果是：这让他们的婚姻更愉快，同时没有预期中的副反应。


    ### （三）减轻恐慌


    玛格丽特的母亲是长期气喘患者。有一天晚上，当她在清洗他们的船时，突然严重发病。但是，她的呼吸器放在家里，因此她很惶恐。幸运的是，她的气喘混合精油放在手提袋内。而且她常常把橙花放在身边，因为她非常喜爱橙花。当玛格丽特将混合精油涂抹在她妈妈的上背部及足底反射点时，她让母亲深深吸入橙花，及时地减轻了她的惊慌，而精油能保持她的呼吸不恶化，直至她们回到岸上的屋子边，玛格丽特的姐姐才急忙取来母亲的呼吸器。


    ### （四）缓解压力


    科林在加入公司 11 个月后，获得了最佳推销员奖。取得这个奖赏后，在年终的销售会议上他常常要发言，这个做法令他很困扰。他完成第一次发言后出现了严重的脸腺炎。以后每次的演讲都使他感到特别焦虑。芳疗师认为他的脸腺炎是因为压力而导致急躁及失眠所造成的，芳疗师要他在演讲前两星期来做一个芳疗按摩疗程，给他做甘菊眼部护理，每天滴甘菊纯露
    3~4 次在眼睛上。3 个星期后他打电话给他的芳疗师，他说，自己的脸腺炎在演讲前完全消退且没有再出现，但他仍然每天滴罗马甘菊纯露作眼部护理。他表示他在演讲时感到很轻松。在他第
    3 次疗程时，芳疗师告诉他，他已经并不需要再做进一步的疗程，但可以在演讲的前 4 天将精油滴在纸巾上吸入，也可以在沐浴时利用相同精油。后来他的太太告诉大家，科林不仅睑腺炎治好了，而且心情明显地愉快起来，这也令他们夫妻的感情越来越好。


    ### （五）消除疲倦


    几乎每个职员在接近日落时都会开始感到疲倦，特别是在星期一，也许是刚刚经历了双休日，还不能很快适应工作的节奏。在学校，尤其在大学，学生在理论课刚开始及结束时
    会感到倦怠，乏味的理论课会使人无精打采。在这些情况下，在喷雾器中加入数滴迷迭香及柠檬精油和水，清新的空气会让人心情愉快，并且效率可以大大地提高。把精油滴在纸巾上让每个人吸入，大部分情况下人的注意力会集中起来，原来的疲倦也会一扫而光。在这些情况下使用的迷迭香精油可以刺激血液及淋巴循环，对消化阻塞及无精打采的肝有正面作用，它出色的激励特性能成功地去除无精打采、厌倦的情绪。而柠檬精油的清新及提振香气，能激励免疫力，消除心理障碍。


    ### （六）安抚情绪


    三年前有位朋友被抢劫，被袭击后她必须接受 5 个小时吸氧。这个事件让她很恐惧外出，很长一段时间，她都受着恐慌症之苦。她很生气，因为被抢劫，她不敢冒险单独外出，而且，还要做一些额外的练习，以应付下次同样情况的发生。为了控制及驱散这种情绪，她把棉花球放在裙子的口袋、短衫或外套，棉花球滴上数滴丝柏及佛手柑，这对生气及恐惧很有效。再加入一两滴昂贵的玫瑰油可获得舒服的感受。玫瑰在情绪上有安抚的作用。被抢劫后，她丈夫不让她在没有人的陪伴下外出，这使恐惧感减退得比她预期快，她可以在没有生气的情况下直接回去工作。


    ### （七）走出悲伤


    艾伦，49 岁，在当地面包店忠心地工作了 10 年。当店主要搬到新的地方时，他们解聘了所有员工，也包括艾伦，他们甚至没有考虑艾伦已经在那工作了一段很长的时间。她感觉被背叛了。在回家的途中，她满脸泪水地找到了她朋友的芳疗诊所，倾诉了她的故事，她说：“你能给我一些能使我开心的精油吗？”，她的朋友知道艾伦的丈夫在去年过世，她母亲是她主要的安慰，但也在
    6 个星期后突然死去。在那段时间，艾伦一个星期没有上班，她说她整天在家不知道要做什么。朋友给了她乳香以及她挚爱的薰衣草精油，还有数滴丝柏，滴一些在手帕上。因为知道她是个有责任感的人，就给她一份每周
    3 天的工作。

    艾伦太喜悦了，她爱精油，之前就已经使用精油来治疗轻微不适。之所以选择这 3 种精油是因为乳香能镇痛、舒缓跟悲伤有关的心志痛楚；薰衣草精油能帮助治疗任何因丧亲而带来的情绪伤口，以及调理神经系统，帮助释放任何生气或急躁的思想；而丝柏是著名的平衡精油，它对情绪的起伏很有效，达到放松的状态。


    ### （八）镇静安神


    玛琳在工作的时间心情很差，这也影响到她跟其他同事的关系。其中一个人建议她尝试芳疗，她完成了一个两天的课程，课堂上老师告诉她去买快乐鼠尾草，这对她能有帮助。然而，玛琳很讨厌它的气味，不用说，对她的情况没有多大改善。然后她遇到一位认识专业芳疗师的朋友。经过专业的咨询，她混合了精油，但在这些调油中没有包含快乐鼠尾草，她使用了薰衣草、马郁兰及天竺葵，这些都是镇静及调理性的，有一个很好的平衡作用。玛琳被建议每晚使用，在她经期结束后两星期开始使用，直至下一次经期开始。即使只是在第
    1 个月，同事都能感觉玛琳已经恢复她原来的本性，4 个月后，她呈现一个全新的女人，她的丈夫也感到很欣慰。另外，治疗师建议同时改变她的饮食习惯，这对她的情绪改变也有重要的影响。


    ## 十、植物精油在身体调理中的应用

    Essential oils health Essential oils health


    ### （一）植物精油与皮肤系统


    #### 1. 擦伤


    - 擦伤每天都有可能发生，孩子们到处跑着玩，就有可能碰伤自己。擦伤处唯一的危险就是发生感染。所以，一定要确定擦伤处的杂物都被取出来了，所有的脏东西都被完全清洗掉了。

    - 配制清洗液的办法：在一碗温水中，滴入 10 滴薰衣草、桉树、柠檬或茶树精油。

    - 使受伤的皮肤尽可能地露在新鲜的空气中。但是如果有再感染的危险，要做些防护性覆盖。在一块纱布上滴 3 滴薰衣草精油，然后盖在伤口上。如果可能的，一天要换两次纱布，在第三天的时候，就可以让伤口暴露在空气中了。


    #### 2. 唇疱疹


    - 唇疱疹会在嘴唇外侧形成水疱，有疼痛感，一般 10 天以后会自己痊愈。在痊愈初期，会形成硬壳。唇疱疹是一种单一性的疱疹病毒感染产生的，它可以处于休眠状态很长时间，当压力增大时，就会暴发。

    - 使用甘菊精油、金盏草油、天竺葵精油或茶树油，可以减轻疼痛和缓和病情。

    - 如果病毒的发作是由于太阳照射引起的，就要注意使用知名品牌的太阳防晒产品。


    #### 3. 痤疮、粉刺、青春痘


    - 青春痘是最常见的皮肤失调的表现。轻微的青春痘表现为黑头和疙瘩，常出现在面部、背部和颈部。

    - **(1) 症状**

    多数严重的病例会表现出极度的疼痛，伴有毛孔增大，最后留下深的疤痕。一般情况下，青春痘是由于对皮肤有保护作用的皮脂油的过度分泌而导致的。女性使用避孕药可以使内分泌失调，也可以导致青春痘的产生。饮酒和吸烟也会影响皮肤和血液的纯洁度，这些都来自于不良或者失衡的生活习惯。

    - **(2) 饮食调理**

    长有青春痘的皮肤非常敏感，要经常细心地清洁皮肤。要有一个良好的饮食习惯，避免吃一些高脂肪的食品，同时多做锻炼，尤其是户外运动。

    - **(3) 精油调理**

    某些精油可以不稀释直接用于面部的小痘痘上，如茶树油或薰衣草油，但必须慎用，因为纯精油可以导致过敏反应。调配治疗面部的复方精油时，应该选择合适的基础油，例如，以加州希蒙得木油做基础油时，可以添加安息香油、雪松油、德国黄春菊、天竺葵油、薰衣草油、柠檬香茅油或者茶树油，稀释到
    2%。

    - **(4) 使用方法**

    晚上脸部清洗后，可以用棉签蘸少量复方精油或纯精油进行擦拭。坚持使用一段时间，直到小痘痘完全消失为止。复方精油的治疗效果对于某些皮肤可能不是很理想，但是，有些人反映效果确实很不错。


    #### 4. 冻疮


    冻疮是长期暴露在寒冷环境中造成的。发病初期，受冻地方发红、变痒，逐渐变得疼痛，成水泡状；如果皮下深层组织受伤，会导致组织脱落和演变成坏疽。血液循环不好的皮肤和长期暴露在寒冷环境的皮肤容易受到影响。当第
    1 次受到寒冷伤害后，这块皮肤对冷热的敏感性就增加了。在暖和的环境下，用柠檬汁按摩受伤部位，效果良好。也可以滴 1 滴纯天竺葵或茶树油在受伤部位，一般是手指或脚趾。也可以使用复方按摩油来治疗冻疮，配方是：10mL
    金盏草精油、2 滴天竺葵精油、2 滴薰衣草精油、2 滴黑胡椒精油、2 滴茶树精油。


    #### 5. 冻伤


    冻伤会使皮肤变白、变凉和变麻木，这是因为皮肤暴露在低温下导致血液循环不良引起的。通常，手指、脚趾和耳朵最容易受到影响，在面部主要是鼻子和下颌。穿紧身衣物或鞋的地方容易变得湿润也会造成循环不良，一般会有发红和肿胀的现象发生。孩子和老人最容易受到寒冷的攻击。使受冻地方恢复循环是个痛苦的过程，这个过程要缓慢进行，不能使用热水。松树和丝柏家族的精油，尤其适合做治疗循环问题的按摩油。这些精油应该稀释在基础油中使用。在雪天外出回来后，在脚上擦一点松树精油与葡萄籽油的混合物，在皮肤患处也可以涂抹一些薰衣草精油，能预防冻伤的发生。


    #### 6. 脚气


    脚气是最常见的一种真菌感染。最初的症状是出现小水疱，不久变成潮湿、发红的斑点，有灼烧和瘙痒的感觉。这种病很顽固，令人烦恼。它有很强的传染性，在潮湿的环境滋生迅速。不好的卫生条件和汗脚创造了适合真菌生长的环境。人工合成材料制成的袜子和鞋阻碍了空气流通，容易产生潮湿的环境。到可能感染脚气的地方时，可以在去前和走后，用纯茶树精油或天竺葵精油擦脚。治疗受感染的脚，可以在
    10mL 任意的基础油中，添加 2 滴小麦胚芽油、2 滴茶树精油和 2 滴天竺葵精油，每天在脚趾和指甲周围擦拭。


    #### 7. 疖子


    疖子是一种脓肿，经常发生在臀部和手臂腋下的毛囊。发烧、劳累、有时淋巴结肿胀都有可能引发疖子。疖子经常发生在年轻的男性身上。饮食缺乏新鲜食物，吃猪肉过多，吃油榨食物和垃圾食物，这些都会导致血液不纯，进而引起疖子。对疖子有益的做法是清洗受感染的地方，配方如下：2
    滴薰衣草精油、2 滴茶树精油、1 滴刺柏精油，稀释在 200mL 的热水中。如果感染严重，再加 1 滴甘菊精油。每天清洗两次受感染的地方。感染进一步发展时，可以用棉签蘸些纯茶树精油，抹在患处。但是，如果没有很快取得效果，请到医院咨询。


    #### 8. 流血


    各种类型的流血都需要认真地对待。一般，一位成年人大约有 5L 血，即使流失 1L 血都会有生命危险。因意外事故或紧急情况导致流血时，要及时征求医生的建议。如果是个小创口，可以使用外敷的办法，同时添加下面所列成份：1
    滴天竺葵精油、1 滴柠檬精油、1 滴洋甘菊精油、1 滴茶树油。


    #### 9. 褥疮


    卧床病人容易发生溃疡的位置，一般是臀部、脚后跟和肘部。经常帮助病人翻身能防止褥疮的发生。保持皮肤干燥、清洁和血液循环正常，也能预防褥疮。发生褥疮之前或之后，把下述成份混合在一起，轻轻地按摩，使其渗入到受影响的地方。使用的按摩油配方是：20mL
    月见草油、4 滴小麦胚芽精油、3 滴黄春菊或天竺葵精油、2 滴薰衣草精油、2 滴茶树精油、2 滴乳香精油。如果褥疮已经流脓，就不能使用按摩油了。


    #### 10. 伤口


    当处理较深的伤口时，要特别地小心，因为伤口很容易发生感染。我们要做的就是不能让伤口总在流血，要设法让氧气进入伤口以消除感染的因素。所有的伤口都应快速得到治疗，否则，容易引起血液中毒现象的发生。细菌，如破伤风孢子，可以从脏东西进入伤口引起感染。感染破伤风会有生命的危险，因为会引起多处肌肉疼痛地抽搐，这种症状也可能是全身发作。先用清洗液仔细清洗伤口，清洗液的配置方法是，在
    500mL 的水中，添加 4 滴薰衣草精油、2 滴茶树精油和 1 滴桉树精油。柠檬汁可以用做突发性伤口的消毒剂，虽然会有刺痛感觉。当伤口处形成硬壳时，要保持干燥，不要剥掉它。你可以用金盏草精油一天两次地轻轻清洁伤口处。


    #### 11. 烧伤


    烧伤有 3 种严重程度，第一种程度的烧伤，是受伤处变红；第二种，是有水泡；第三种程度的烧伤，是对皮肤和皮下肌肉组织造成了伤害。烧伤的典型症状是脱水，进而在烧伤的地方发生感染。电流、化学和辐射烧伤应该当作紧急事件进行处理。造成烧伤的原因可以是，过热、连续的摩擦、化学物质、辐射、电流、火、开水或烧热的油等。对于轻微的烧伤，立即在患处涂抹纯薰衣草精油，然后用湿的敷布盖上。所有的烧伤，如果不是明显轻微的症状，都需要立即到医院就诊。


    #### 12. 水泡


    水泡可以由机械伤、烧伤、烫伤、皮肤发炎或蚊虫叮咬造成。水泡发生时，皮肤下面常有液体积累。当水泡破裂时，暴露出来的组织可能会感染。烧伤和烫伤的水泡是不能刺破的。可以在水泡上滴
    1 滴薰衣草精油或茶树精油和 1 滴洋甘菊精油。然后小心全面地拍打。


    #### 13. 蚊虫叮咬（蜘蛛、扁虱和跳蚤）


    蚊虫叮咬是可以预防的。当发生蚊虫叮咬时，你只需要一瓶薰衣草或甘菊精油就能够创造出治疗的奇迹。如果你对精油不过敏，可以直接在患处使用纯精油，能止住刺痛。要留意精油对叮咬处是否有过敏性反应，如果有必要，就到医院治疗。可以使用下列精油做驱虫剂：柠檬香茅精油、百里香精油、薰衣草精油、欧薄荷精油、香茅精油（尤其适用于蚊子）。


    #### 14. 痈


    简单地说，痈就是一种严重的脓肿，单独地分散在毛囊上，应该找医生咨询。产生痈的原因与脓肿和疖子的病因相似。清洗发病部位，洗液配制方法：在 125mL 热水中添加
    2 滴薰衣草精油和 2 滴茶树精油。纯茶树精油也可以用棉棒涂抹在受感染的地方。


    #### 15. 瘀伤


    瘀伤是血液从受伤的血管流出进入其周围皮下组织造成的。不同深度的皮肤瘀伤，开始的颜色是红色、黑色或是青色，也会变成黄绿色。撞击、夹拧和摔跤都会造成青肿，当骨折时也会发生。肥胖或者贫血的人，瘀伤会加重。多吃维生素
    C 的食物可以预防和有利于瘀伤的康复。用下面所列精油轻轻涂抹受伤处，多数瘀伤在不经意间就恢复了。10mL 葡萄籽油混合有：5 滴金盏草精油、1 滴柏树精油、2
    滴茴香精油。也可以在瘀伤处直接使用薰衣草精油。


    #### 16. 扎刺


    用消过毒的针或一双镊子尽快把刺取出。要仔细地把刺全部取出，因为留下的刺会引起感染。往扎刺的地方滴 1 滴纯薰衣草精油；如果有炎症出现要立即到医院接受治疗。


    ### （二）植物精油与五官


    #### 1. 齿龈出血


    齿龈出血主要原因是齿龈炎。在通常情况下，是口腔内的牙斑引起的这种炎症。当刷牙的时候，这种炎症就表现出流血和肿痛的特征。在牙表面的任何地方都可能形成牙斑，但是在牙缝间和靠近齿龈的地方更容易积累，因为这个地方自己不能清洁到。导致牙龈炎更主要的原因是牙齿脱落，也是牙齿退化的原因。按照下面的方法配制一种漱口水，有利于治疗齿龈炎。往玻璃杯的温水中，添加
    1 茶匙的下列混合物：3 滴百里香精油、2 滴尤加利精油、3 滴洋甘菊精油、3 滴欧薄荷精油，把上述精油混在 1 大汤匙白兰地酒中，在温水中添加 1 茶匙混合物，拌匀，漱口。'
  mdcn: '## 植物精油在芳香按摩中的应用


    虽然，人们投入了数以百万计的金钱，研究护理头发的产品和特效香波，然而，许多人包括毛发专家，正转向于依赖越来越多的天然方式，以提升毛发的生命力；同时，也开始特别注意他们的头皮养护。其中，就包括使用精油治疗头发或头皮的方法。


    我们推荐的这种复方油配制虽然价格不便宜，然而，被那些头发有严重问题的人们使用后，可以证明它是有效的和非常受欢迎的。


    我们没有吹捧这种油是治疗光秃、头发生长不良、头发质量不好、有头皮屑、银屑病或者其他医学方面疾病的偏方，也可能你正患有其中的某项疾病，但是，如果你已经尝试过所有的治疗，都没有成功，你可以考虑用这种自然疗法做个尝试。


    精油的挑选要能够应对人们经常会遇到的大多数问题的治疗，比如头发可能出现的不适，稀疏、干裂、分叉，以及刚洗完头发仅仅几个小时就又变得油腻了，还有头皮屑的问题，这带给你的不仅仅是一个简单的不满意。


    我们只使用纯的荷荷芭油做底油，虽然它是一种昂贵的油，但是它的性质是最贴近人的皮肤的，人们发现使用这种油护理头发的效果非常好。实际上，荷荷芭油不是一种油，而是一种熔点很低的蜡脂，在室温下，它是液体状。


    **基础油：** 荷荷芭油。


    **精油：** 迷迭香、甘草、雪松、广藿香、丝柏、依兰。


    虽然，我们称“精油”为油，其实它们并没有油腻感，因为，它们是可挥发的物质，而荷荷芭油也不是一般意义上的油，实际是一种蜡脂，也不会有油腻感或油脂般的黏糊感觉。


    你要记住，你将使用的不是油性或油脂性的产品，而是富含营养的混合物，内含有活性成份的精油，它们对头发和头皮有一定的治疗功效。


    取少量复方精油，大约 1 茶匙，放在碟子里，用你的手指尖蘸些精油，然后，把手指紧贴着干燥的头皮进行按摩，要沿着头发的纹理缓慢移动，注意不要对头皮造成摩擦，那样可能会伤害到头皮和头发。


    ## 11. 婴儿复方油


    当给婴儿洗澡和穿衣服时，可以说是爱护孩子的珍贵时间，也是有孩子的最大喜悦之一。婴儿可以从精油所含的天然植物精华和功效中获益。


    当人们考虑到孩子的健康，尤其是与婴儿用品所含化学成份有关的问题时，他们常常会换用可以得到的纯天然的产品。


    婴儿的皮肤非常脆弱，一定要倍加注意，决不能使用任何可能引起过敏反应的产品。同此在选择保湿和营养婴儿皮肤的产品时要十分小心。


    要记住，尤其是给婴儿配制的产品，一定要格外的温和，不能含有任何效力强大的成份或是会在他们脆弱的皮肤上累积的成份。所加精油的浓度要极低。所有精油所占的比例仅为
    0.15%，以避免精油发生烧伤、刺激或引起任何的副作用。


    **基础油：** 葡萄籽油、荷荷芭油。


    **精油：** 罗马甘菊、薰衣草、橙花。


    像往常一样用温和的肥皂给婴儿洗澡，然后擦干。往你的手掌上倒少量的油，双手搓温暖油，轻轻地给孩子按摩。这样，孩子的肌肤就会丝般的柔滑，还会散发出清新的气味，就像世间最珍贵宝物一样。


    ## 九、植物精油在情绪调节中的应用

    Essential oils health Essential oils health


    在心理学上，情绪是指人发自本能的一种内心表达，譬如愉快的时候高歌，生气的时候暴躁，焦虑的时候沮丧……人有悲欢离合，喜怒哀乐，各种情绪的产生和存在都有它的道理，如果长期压抑不良情绪，不仅会影响人的心理健康，还会导致身体上的不适。每个人的承受能力都是有限的，一旦情绪积攒到一定程度无从宣泄，就会轰然倒塌，以致精神崩溃。通过一定途径表达内心情绪，抒发感情，才是健康的心理状态。


    精油最初来到英国的时候，有些人说它主要是与治疗压力有关。后来，在医院，发现精油最能有效缓解压力，提升精神以及减轻一些因疾病而带来的不适感。精油，一剂调节情绪的良药，它所散发的阵阵香气，通过嗅觉，传到大脑中枢反射区，可以有效刺激大脑的情绪反应，对疲倦、消极或悲观等负面情绪有很好的改善作用。


    ### （一）辅助睡眠


    有一位高血压患者，由于长期服用降压药物而发生很多不良的副作用，令他非常苦恼。在一位医生朋友的建议下，他开始尝试在精油的辅助下减低药物用量，护士每两三天来测量他的血压，他能每
    3 个月逐次减少药物用量。最后，他的药物分量减少了 87.5%，而所有他不希望有的副作用都消失了。在刚开始减少药物分量的时候，这位患者非常恐慌，因为他不知道一旦开始减少药物用量，他会有什么感觉。这种不安导致他不能很好入睡，他的妻子在芳疗师的帮助下，将马郁兰和依兰两种精油滴在纸巾上，放在枕边。这样，他不但能酣睡，早上醒来时也没有因为减少药量的事感到不安。从中体现了马郁兰、依兰精油对睡眠的调节作用。马郁兰能镇静神经系统及帮助睡眠；放松紧缩的胸口——通常是恐慌的症状，并可调理呼吸，最初阶段能明显的放慢急速的呼吸，还能镇静、平衡心跳以及调理神经。依兰精油可放慢急速的心跳，放松跟消化系统相连的痉挛，那些痉挛当我们恐慌时会更加严重。


    ### （二）恢复嗅觉


    有一位患者多年来都受到慢性鼻窦炎之苦，他的嗅觉也在慢慢衰退，并且持续地受到短暂失去嗅觉的痛苦。手术后，他的情况并未得到改善，而且常常地感到没有嗅觉，令他的人生很悲惨。当他下班回家，没有办法闻到太太为他准备的晚餐的香味，而他的太太是一个很出色的厨师。更惨的是，他甚至没有味觉，因为嗅觉和味觉是紧扣着的。在他太太的探听下，他们来到了一个芳香疗法诊所，芳疗师为他做了一个“三明治”式的全身穴位按摩，然后又在脸上重做一次。在配方里，芳疗师选择了两种效果强烈的精油——薄荷及蓝胶尤加利，但是他都没有察觉到。在接受第
    3 个疗程后，他想他应该可以闻到一点东西。芳疗师在木片上加入薄荷，放在他的鼻子前面。他发出很高兴的尖叫，然后说：“我可以闻到淡淡的薄荷味了，虽然不明显，但是我能闻到它。”6
    个月后，他恢复了嗅觉，能享受到他太太煮饭的一些香味，这令他们两人生活得更快乐。而比恢复嗅觉更好的结果是：这让他们的婚姻更愉快，同时没有预期中的副反应。


    ### （三）减轻恐慌


    玛格丽特的母亲是长期气喘患者。有一天晚上，当她在清洗他们的船时，突然严重发病。但是，她的呼吸器放在家里，因此她很惶恐。幸运的是，她的气喘混合精油放在手提袋内。而且她常常把橙花放在身边，因为她非常喜爱橙花。当玛格丽特将混合精油涂抹在她妈妈的上背部及足底反射点时，她让母亲深深吸入橙花，及时地减轻了她的惊慌，而精油能保持她的呼吸不恶化，直至她们回到岸上的屋子边，玛格丽特的姐姐才急忙取来母亲的呼吸器。


    ### （四）缓解压力


    科林在加入公司 11 个月后，获得了最佳推销员奖。取得这个奖赏后，在年终的销售会议上他常常要发言，这个做法令他很困扰。他完成第一次发言后出现了严重的脸腺炎。以后每次的演讲都使他感到特别焦虑。芳疗师认为他的脸腺炎是因为压力而导致急躁及失眠所造成的，芳疗师要他在演讲前两星期来做一个芳疗按摩疗程，给他做甘菊眼部护理，每天滴甘菊纯露
    3~4 次在眼睛上。3 个星期后他打电话给他的芳疗师，他说，自己的脸腺炎在演讲前完全消退且没有再出现，但他仍然每天滴罗马甘菊纯露作眼部护理。他表示他在演讲时感到很轻松。在他第
    3 次疗程时，芳疗师告诉他，他已经并不需要再做进一步的疗程，但可以在演讲的前 4 天将精油滴在纸巾上吸入，也可以在沐浴时利用相同精油。后来他的太太告诉大家，科林不仅睑腺炎治好了，而且心情明显地愉快起来，这也令他们夫妻的感情越来越好。


    ### （五）消除疲倦


    几乎每个职员在接近日落时都会开始感到疲倦，特别是在星期一，也许是刚刚经历了双休日，还不能很快适应工作的节奏。在学校，尤其在大学，学生在理论课刚开始及结束时
    会感到倦怠，乏味的理论课会使人无精打采。在这些情况下，在喷雾器中加入数滴迷迭香及柠檬精油和水，清新的空气会让人心情愉快，并且效率可以大大地提高。把精油滴在纸巾上让每个人吸入，大部分情况下人的注意力会集中起来，原来的疲倦也会一扫而光。在这些情况下使用的迷迭香精油可以刺激血液及淋巴循环，对消化阻塞及无精打采的肝有正面作用，它出色的激励特性能成功地去除无精打采、厌倦的情绪。而柠檬精油的清新及提振香气，能激励免疫力，消除心理障碍。


    ### （六）安抚情绪


    三年前有位朋友被抢劫，被袭击后她必须接受 5 个小时吸氧。这个事件让她很恐惧外出，很长一段时间，她都受着恐慌症之苦。她很生气，因为被抢劫，她不敢冒险单独外出，而且，还要做一些额外的练习，以应付下次同样情况的发生。为了控制及驱散这种情绪，她把棉花球放在裙子的口袋、短衫或外套，棉花球滴上数滴丝柏及佛手柑，这对生气及恐惧很有效。再加入一两滴昂贵的玫瑰油可获得舒服的感受。玫瑰在情绪上有安抚的作用。被抢劫后，她丈夫不让她在没有人的陪伴下外出，这使恐惧感减退得比她预期快，她可以在没有生气的情况下直接回去工作。


    ### （七）走出悲伤


    艾伦，49 岁，在当地面包店忠心地工作了 10 年。当店主要搬到新的地方时，他们解聘了所有员工，也包括艾伦，他们甚至没有考虑艾伦已经在那工作了一段很长的时间。她感觉被背叛了。在回家的途中，她满脸泪水地找到了她朋友的芳疗诊所，倾诉了她的故事，她说：“你能给我一些能使我开心的精油吗？”，她的朋友知道艾伦的丈夫在去年过世，她母亲是她主要的安慰，但也在
    6 个星期后突然死去。在那段时间，艾伦一个星期没有上班，她说她整天在家不知道要做什么。朋友给了她乳香以及她挚爱的薰衣草精油，还有数滴丝柏，滴一些在手帕上。因为知道她是个有责任感的人，就给她一份每周
    3 天的工作。

    艾伦太喜悦了，她爱精油，之前就已经使用精油来治疗轻微不适。之所以选择这 3 种精油是因为乳香能镇痛、舒缓跟悲伤有关的心志痛楚；薰衣草精油能帮助治疗任何因丧亲而带来的情绪伤口，以及调理神经系统，帮助释放任何生气或急躁的思想；而丝柏是著名的平衡精油，它对情绪的起伏很有效，达到放松的状态。


    ### （八）镇静安神


    玛琳在工作的时间心情很差，这也影响到她跟其他同事的关系。其中一个人建议她尝试芳疗，她完成了一个两天的课程，课堂上老师告诉她去买快乐鼠尾草，这对她能有帮助。然而，玛琳很讨厌它的气味，不用说，对她的情况没有多大改善。然后她遇到一位认识专业芳疗师的朋友。经过专业的咨询，她混合了精油，但在这些调油中没有包含快乐鼠尾草，她使用了薰衣草、马郁兰及天竺葵，这些都是镇静及调理性的，有一个很好的平衡作用。玛琳被建议每晚使用，在她经期结束后两星期开始使用，直至下一次经期开始。即使只是在第
    1 个月，同事都能感觉玛琳已经恢复她原来的本性，4 个月后，她呈现一个全新的女人，她的丈夫也感到很欣慰。另外，治疗师建议同时改变她的饮食习惯，这对她的情绪改变也有重要的影响。


    ## 十、植物精油在身体调理中的应用

    Essential oils health Essential oils health


    ### （一）植物精油与皮肤系统


    #### 1. 擦伤


    - 擦伤每天都有可能发生，孩子们到处跑着玩，就有可能碰伤自己。擦伤处唯一的危险就是发生感染。所以，一定要确定擦伤处的杂物都被取出来了，所有的脏东西都被完全清洗掉了。

    - 配制清洗液的办法：在一碗温水中，滴入 10 滴薰衣草、桉树、柠檬或茶树精油。

    - 使受伤的皮肤尽可能地露在新鲜的空气中。但是如果有再感染的危险，要做些防护性覆盖。在一块纱布上滴 3 滴薰衣草精油，然后盖在伤口上。如果可能的，一天要换两次纱布，在第三天的时候，就可以让伤口暴露在空气中了。


    #### 2. 唇疱疹


    - 唇疱疹会在嘴唇外侧形成水疱，有疼痛感，一般 10 天以后会自己痊愈。在痊愈初期，会形成硬壳。唇疱疹是一种单一性的疱疹病毒感染产生的，它可以处于休眠状态很长时间，当压力增大时，就会暴发。

    - 使用甘菊精油、金盏草油、天竺葵精油或茶树油，可以减轻疼痛和缓和病情。

    - 如果病毒的发作是由于太阳照射引起的，就要注意使用知名品牌的太阳防晒产品。


    #### 3. 痤疮、粉刺、青春痘


    - 青春痘是最常见的皮肤失调的表现。轻微的青春痘表现为黑头和疙瘩，常出现在面部、背部和颈部。

    - **(1) 症状**

    多数严重的病例会表现出极度的疼痛，伴有毛孔增大，最后留下深的疤痕。一般情况下，青春痘是由于对皮肤有保护作用的皮脂油的过度分泌而导致的。女性使用避孕药可以使内分泌失调，也可以导致青春痘的产生。饮酒和吸烟也会影响皮肤和血液的纯洁度，这些都来自于不良或者失衡的生活习惯。

    - **(2) 饮食调理**

    长有青春痘的皮肤非常敏感，要经常细心地清洁皮肤。要有一个良好的饮食习惯，避免吃一些高脂肪的食品，同时多做锻炼，尤其是户外运动。

    - **(3) 精油调理**

    某些精油可以不稀释直接用于面部的小痘痘上，如茶树油或薰衣草油，但必须慎用，因为纯精油可以导致过敏反应。调配治疗面部的复方精油时，应该选择合适的基础油，例如，以加州希蒙得木油做基础油时，可以添加安息香油、雪松油、德国黄春菊、天竺葵油、薰衣草油、柠檬香茅油或者茶树油，稀释到
    2%。

    - **(4) 使用方法**

    晚上脸部清洗后，可以用棉签蘸少量复方精油或纯精油进行擦拭。坚持使用一段时间，直到小痘痘完全消失为止。复方精油的治疗效果对于某些皮肤可能不是很理想，但是，有些人反映效果确实很不错。


    #### 4. 冻疮


    冻疮是长期暴露在寒冷环境中造成的。发病初期，受冻地方发红、变痒，逐渐变得疼痛，成水泡状；如果皮下深层组织受伤，会导致组织脱落和演变成坏疽。血液循环不好的皮肤和长期暴露在寒冷环境的皮肤容易受到影响。当第
    1 次受到寒冷伤害后，这块皮肤对冷热的敏感性就增加了。在暖和的环境下，用柠檬汁按摩受伤部位，效果良好。也可以滴 1 滴纯天竺葵或茶树油在受伤部位，一般是手指或脚趾。也可以使用复方按摩油来治疗冻疮，配方是：10mL
    金盏草精油、2 滴天竺葵精油、2 滴薰衣草精油、2 滴黑胡椒精油、2 滴茶树精油。


    #### 5. 冻伤


    冻伤会使皮肤变白、变凉和变麻木，这是因为皮肤暴露在低温下导致血液循环不良引起的。通常，手指、脚趾和耳朵最容易受到影响，在面部主要是鼻子和下颌。穿紧身衣物或鞋的地方容易变得湿润也会造成循环不良，一般会有发红和肿胀的现象发生。孩子和老人最容易受到寒冷的攻击。使受冻地方恢复循环是个痛苦的过程，这个过程要缓慢进行，不能使用热水。松树和丝柏家族的精油，尤其适合做治疗循环问题的按摩油。这些精油应该稀释在基础油中使用。在雪天外出回来后，在脚上擦一点松树精油与葡萄籽油的混合物，在皮肤患处也可以涂抹一些薰衣草精油，能预防冻伤的发生。


    #### 6. 脚气


    脚气是最常见的一种真菌感染。最初的症状是出现小水疱，不久变成潮湿、发红的斑点，有灼烧和瘙痒的感觉。这种病很顽固，令人烦恼。它有很强的传染性，在潮湿的环境滋生迅速。不好的卫生条件和汗脚创造了适合真菌生长的环境。人工合成材料制成的袜子和鞋阻碍了空气流通，容易产生潮湿的环境。到可能感染脚气的地方时，可以在去前和走后，用纯茶树精油或天竺葵精油擦脚。治疗受感染的脚，可以在
    10mL 任意的基础油中，添加 2 滴小麦胚芽油、2 滴茶树精油和 2 滴天竺葵精油，每天在脚趾和指甲周围擦拭。


    #### 7. 疖子


    疖子是一种脓肿，经常发生在臀部和手臂腋下的毛囊。发烧、劳累、有时淋巴结肿胀都有可能引发疖子。疖子经常发生在年轻的男性身上。饮食缺乏新鲜食物，吃猪肉过多，吃油榨食物和垃圾食物，这些都会导致血液不纯，进而引起疖子。对疖子有益的做法是清洗受感染的地方，配方如下：2
    滴薰衣草精油、2 滴茶树精油、1 滴刺柏精油，稀释在 200mL 的热水中。如果感染严重，再加 1 滴甘菊精油。每天清洗两次受感染的地方。感染进一步发展时，可以用棉签蘸些纯茶树精油，抹在患处。但是，如果没有很快取得效果，请到医院咨询。


    #### 8. 流血


    各种类型的流血都需要认真地对待。一般，一位成年人大约有 5L 血，即使流失 1L 血都会有生命危险。因意外事故或紧急情况导致流血时，要及时征求医生的建议。如果是个小创口，可以使用外敷的办法，同时添加下面所列成份：1
    滴天竺葵精油、1 滴柠檬精油、1 滴洋甘菊精油、1 滴茶树油。


    #### 9. 褥疮


    卧床病人容易发生溃疡的位置，一般是臀部、脚后跟和肘部。经常帮助病人翻身能防止褥疮的发生。保持皮肤干燥、清洁和血液循环正常，也能预防褥疮。发生褥疮之前或之后，把下述成份混合在一起，轻轻地按摩，使其渗入到受影响的地方。使用的按摩油配方是：20mL
    月见草油、4 滴小麦胚芽精油、3 滴黄春菊或天竺葵精油、2 滴薰衣草精油、2 滴茶树精油、2 滴乳香精油。如果褥疮已经流脓，就不能使用按摩油了。


    #### 10. 伤口


    当处理较深的伤口时，要特别地小心，因为伤口很容易发生感染。我们要做的就是不能让伤口总在流血，要设法让氧气进入伤口以消除感染的因素。所有的伤口都应快速得到治疗，否则，容易引起血液中毒现象的发生。细菌，如破伤风孢子，可以从脏东西进入伤口引起感染。感染破伤风会有生命的危险，因为会引起多处肌肉疼痛地抽搐，这种症状也可能是全身发作。先用清洗液仔细清洗伤口，清洗液的配置方法是，在
    500mL 的水中，添加 4 滴薰衣草精油、2 滴茶树精油和 1 滴桉树精油。柠檬汁可以用做突发性伤口的消毒剂，虽然会有刺痛感觉。当伤口处形成硬壳时，要保持干燥，不要剥掉它。你可以用金盏草精油一天两次地轻轻清洁伤口处。


    #### 11. 烧伤


    烧伤有 3 种严重程度，第一种程度的烧伤，是受伤处变红；第二种，是有水泡；第三种程度的烧伤，是对皮肤和皮下肌肉组织造成了伤害。烧伤的典型症状是脱水，进而在烧伤的地方发生感染。电流、化学和辐射烧伤应该当作紧急事件进行处理。造成烧伤的原因可以是，过热、连续的摩擦、化学物质、辐射、电流、火、开水或烧热的油等。对于轻微的烧伤，立即在患处涂抹纯薰衣草精油，然后用湿的敷布盖上。所有的烧伤，如果不是明显轻微的症状，都需要立即到医院就诊。


    #### 12. 水泡


    水泡可以由机械伤、烧伤、烫伤、皮肤发炎或蚊虫叮咬造成。水泡发生时，皮肤下面常有液体积累。当水泡破裂时，暴露出来的组织可能会感染。烧伤和烫伤的水泡是不能刺破的。可以在水泡上滴
    1 滴薰衣草精油或茶树精油和 1 滴洋甘菊精油。然后小心全面地拍打。


    #### 13. 蚊虫叮咬（蜘蛛、扁虱和跳蚤）


    蚊虫叮咬是可以预防的。当发生蚊虫叮咬时，你只需要一瓶薰衣草或甘菊精油就能够创造出治疗的奇迹。如果你对精油不过敏，可以直接在患处使用纯精油，能止住刺痛。要留意精油对叮咬处是否有过敏性反应，如果有必要，就到医院治疗。可以使用下列精油做驱虫剂：柠檬香茅精油、百里香精油、薰衣草精油、欧薄荷精油、香茅精油（尤其适用于蚊子）。


    #### 14. 痈


    简单地说，痈就是一种严重的脓肿，单独地分散在毛囊上，应该找医生咨询。产生痈的原因与脓肿和疖子的病因相似。清洗发病部位，洗液配制方法：在 125mL 热水中添加
    2 滴薰衣草精油和 2 滴茶树精油。纯茶树精油也可以用棉棒涂抹在受感染的地方。


    #### 15. 瘀伤


    瘀伤是血液从受伤的血管流出进入其周围皮下组织造成的。不同深度的皮肤瘀伤，开始的颜色是红色、黑色或是青色，也会变成黄绿色。撞击、夹拧和摔跤都会造成青肿，当骨折时也会发生。肥胖或者贫血的人，瘀伤会加重。多吃维生素
    C 的食物可以预防和有利于瘀伤的康复。用下面所列精油轻轻涂抹受伤处，多数瘀伤在不经意间就恢复了。10mL 葡萄籽油混合有：5 滴金盏草精油、1 滴柏树精油、2
    滴茴香精油。也可以在瘀伤处直接使用薰衣草精油。


    #### 16. 扎刺


    用消过毒的针或一双镊子尽快把刺取出。要仔细地把刺全部取出，因为留下的刺会引起感染。往扎刺的地方滴 1 滴纯薰衣草精油；如果有炎症出现要立即到医院接受治疗。


    ### （二）植物精油与五官


    #### 1. 齿龈出血


    齿龈出血主要原因是齿龈炎。在通常情况下，是口腔内的牙斑引起的这种炎症。当刷牙的时候，这种炎症就表现出流血和肿痛的特征。在牙表面的任何地方都可能形成牙斑，但是在牙缝间和靠近齿龈的地方更容易积累，因为这个地方自己不能清洁到。导致牙龈炎更主要的原因是牙齿脱落，也是牙齿退化的原因。按照下面的方法配制一种漱口水，有利于治疗齿龈炎。往玻璃杯的温水中，添加
    1 茶匙的下列混合物：3 滴百里香精油、2 滴尤加利精油、3 滴洋甘菊精油、3 滴欧薄荷精油，把上述精油混在 1 大汤匙白兰地酒中，在温水中添加 1 茶匙混合物，拌匀，漱口。'
