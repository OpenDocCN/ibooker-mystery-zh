    3) 做洗液和面霜的成份。

    罗马甘菊做护肤面霜的成份时，可以治疗尿布湿疹、烧伤和太阳灼伤，而德国甘菊对于一般的皮肤护理有效，尤其是对过敏性皮肤。

    4) 做漱口水成份。

    罗马甘菊精油能做漱口水成份，对于牙龈肿痛和扁桃腺炎有效。

    (8) 适合与洋甘菊精油混合使用的精油

    佛手柑、鼠尾草、薰衣草、天竺葵、茉莉、茶树、葡萄柚、玫瑰、柠檬和依兰精油。'
