    # (四) 做皮肤护理剂


    # 1. 家庭自制面部护理和收敛品（又称为滋补品）


    在调制面部滋养品时，添加一些类似于金缕梅酊剂的某种成份，能够增强收敛的功效，这也是面部滋养品所需要的。请注意，有些人使用金缕梅酊剂会有皮肤干燥的感觉。在调制滋养品时最好使用玫瑰水。在家里是很容易做些简单的护肤保养的，清洁掉护肤品后，可以用湿的棉球把皮肤擦拭干净。


    # (1) 家庭制作面部滋养品的方法


    滋养品的制作方法都是一样的。先把玫瑰水倒入玻璃瓶内作为底料，然后添加你选好的精油，给瓶子盖帽，剧烈摇晃瓶子，以帮助精油分散。通常商业化生产的此类产品是要添加一些助分散成份，因为家庭是现做现用就不用添加了。要把装有混合物的瓶子放置至少36小时，再次剧烈摇晃瓶子，用过滤纸过滤，以去除大量的精油，把滤液再次装瓶就可以待用了。记住，用前要摇匀。


