    # # 八、植物精油在芳香按摩中的应用


    # ## （一）芳香按摩常识


    # ### 1. 芳香按摩概念


    芳香按摩是指对软组织的一种操作，是芳香疗法应用中实施按摩的一种方法，是要把精油的能量与按摩手法相结合，使精油进入人体，发挥它固有的治疗功效的一种具体办法。


    # ### 2. 芳香按摩的方式


    芳香按摩的方式有多种多样，包括如下方式。


    (1) 瑞典的按摩方法

    这是最流行的一种按摩手法，包括对身体不同部位的不同敲击。这种按摩方法的好处在于能够提升健康和快乐的感受，也能够降低精神和身体的压力。


    (2) 神经肌肉按摩法

    这种按摩方法是芳香按摩方法形成的基础，它又被称为“穴位”疗法，这种按摩主要的治疗效果就是使自我调节的神经系统恢复平衡。


    (3) 淋巴按摩

    这种按摩方法有助于改善淋巴循环系统的功能，对于清除体内毒素尤为有利，还可以增强免疫力。


    (4) 针压按摩法和指压按摩法

    这种按摩方法的主要部位是身体的经脉，通过对身体特定部位点的施压按摩疏通不畅的经脉，做这种按摩，人不需要脱衣服，也不需要针。


    (5) 足部按摩

    按摩足部时，焦点是足部的某些点位，据研究，这些点位对应着身体的其他部位或器官。'
