    它的气味有些辛辣和刺鼻，颜色很淡，水质般黏性。


    # (2) 来源


    它是一种小型树，起源于澳大利亚的新南威尔士，与丝柏相似，叶片针状，头状花序，没有花柄、黄色或略带紫色，可以长到7m高，在湿地生长旺盛，现在已有大面积栽培。这种精油只有澳大利亚生产，当地的土著居民用它治病已有很长时间了。在第二次世界大战期间，精油加工者和原材料供应者可以免服兵役，直到贮备有足够的茶树精油。每个士兵和水手都配给一些精油，随身带着，用于治疗热带感染和发炎的伤口。


    茶树精油可以用做肥皂、面霜、润肤乳、除臭剂、消毒剂和空气清新剂。


    # (3) 提取方法


    它是以叶片和嫩梢为原料的，采用蒸汽蒸馏法提取，出油率约是1.8%。


    # (4) 化学成份


    松萜或蒎烯、桧烯、月桂（香叶）烯、水芹烯、松油精或萜品烯、柠檬油精、桉树脑、异丙基甲苯或百里香素、萜品油烯或异松油烯、芳樟醇、萜品烯或松油烯。


    # (5) 治疗功效


    1）促进免疫系统的功能效果显著，因为它是一种免疫激活剂，能够提高身体抵抗感染的能力，还可以在休克后用于身体和大脑的恢复。


    2）对治疗某些感染具有很好的效果。它对受细菌、真菌和病毒3种微生物感染的器官有很好的疗效。


    3）除了具有极好的抗感染的功效外，它还有助于治疗支气管炎、哮喘、咳嗽、鼻窦炎、肺结核、流感、感冒、黏膜炎、腺体发炎和齿龈炎。在手术前用茶树精油按摩，可以增强体魄，降低术后发生休克的概率。


    4）在泌尿生殖系统方面，一般可以用它治疗阴道炎、膀胱炎和男性外生殖器感染。对于皮肤，可以治疗脓肿、痤疮、烧伤、疱疹、足癣、尿疹、晒斑和感染的伤口，适用于油性皮肤，还能减少头皮屑。'
