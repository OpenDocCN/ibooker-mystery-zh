  md: '女性使用避孕药可以使内分泌失调，也可以导致青春痘的产生。饮酒和吸烟也会影响皮肤和血液的纯洁度，这些都来自于不良或者失衡的生活习惯。

    （2）饮食调理

    长有青春痘的皮肤非常敏感，要经常细心地清洁皮肤。要有一个良好的饮食习惯，避免吃一些高脂肪的食品，同时多做锻炼，尤其是户外运动。

    （3）精油调理

    某些精油可以不稀释直接用于面部的小痘痘上，如茶树油或薰衣草油，但必须慎用，因为纯精油可以导致过敏反应。

    调配治疗面部的复方精油时，应该选择合适的基础油，例如，以加州希蒙得木油做基础油时，可以添加安息香油、雪松油、德国黄春菊、天竺葵油、薰衣草油、柠檬香茅油或者茶树油，稀释到2%。

    （4）使用方法

    晚上脸部清洗后，可以用棉签蘸少量复方精油或纯精油进行擦拭。坚持使用一段时间，直到小痘痘完全消失为止。

    复方精油的治疗效果对于某些皮肤可能不是很理想，但是，有些人反映效果确实很不错。


    # ### 4. 冻疮


    冻疮是长期暴露在寒冷环境中造成的。发病初期，受冻地方发红、变痒，逐渐变得疼痛，成水泡状；如果皮下深层组织受伤，会导致组织脱落和演变成坏疽。

    血液循环不好的皮肤和长期暴露在寒冷环境的皮肤容易受到影响。当第1次受到寒冷伤害后，这块皮肤对冷热的敏感性就增加了。

    在暖和的环境下，用柠檬汁按摩受伤部位，效果良好。也可以滴1滴纯天竺葵或茶树油在受伤部位，一般是手指或脚趾。

    也可以使用复方按摩油来治疗冻疮，配方是：10mL金盏草精油、2滴天竺葵精油、2滴薰衣草精油、2滴黑胡椒精油、2滴茶树精油。


    # ### 5. 冻伤


    冻伤会使皮肤变白、变凉和变麻木，这是因为皮肤暴露在低温下导致血液循环不良引起的。通常，手指、脚趾和耳朵最容易受到影响，在面部主要是鼻子和下颌。穿紧身衣物或鞋的地方容易变得湿润也会造成循环不良，一般会有发红和肿胀的现象发生。孩子和老人最容易受到寒冷的攻击。

    使受冻地方恢复循环是个痛苦的过程，这个过程要缓慢进行，不能使用热水。松树和丝柏家族的精油，尤其适合做治疗循环问题的按摩油。这些精油应该稀释在基础油中使'
