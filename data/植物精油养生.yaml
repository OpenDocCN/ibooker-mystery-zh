  md: '**2. 精油浓度的选择**


    1) 香水、梳妆水或是科隆香水的分类，要以它们所含香气的强度和所含香精的百分比为依据的。


    2) 对于香水，可以使精油的浓度达到15%左右，而对于味道较淡的梳妆水，使用浓度可以是4%~8%，科隆香水用1%~5%浓度。


    3) 如果想计算百分率，1mL液体相当于20滴。在换算过程中，要把所有添加进去的油也计算在底料中，如酒精或伏特酒或荷荷芭油，然后换算成滴数。


    4) 在调配复方油时，要先准备好一些配方、玻璃瓶、盖子，以及贮存的条件。


    **3. 香水配方**


    (1) 流传久远的科隆香水配方


    16滴香柠檬、15滴酸柠檬叶、2滴柑橘、15滴薰衣草、5滴橙花油、10mL柑橘花水、230mL酒精或伏特加酒。


    配制方法


    先把底料酒精或伏特加酒倒入玻璃混合器中，添加上面所列的精油，然后混匀。装入瓶中，盖好盖，把混合物放置4天，然后加柑橘花水，再盖好盖子。使用前，至少要把这种混合物放置2周以上，每天要轻轻摇晃瓶底。


    (2) “全活力”香水配方


