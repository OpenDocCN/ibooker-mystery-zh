    形态特征：成虫近梨形或楔形，足4对，雌虫体长0.4mm，雄虫0.33mm，体色暗红。


    红蜘蛛主要危害柑橘、香叶天竺葵、墨红、玫瑰、香水月季等，被害叶片失去光泽。


