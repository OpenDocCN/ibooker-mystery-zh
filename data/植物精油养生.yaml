  md: '正确刷牙后，用此混合物漱口，然后吐出。


    # ### 3. 打嗝


    打嗝可能是很痛苦的，尤其是经常性的打嗝。在一个褐色的纸袋里滴 1 滴甘菊精油，把它捂在你的嘴和鼻子上，用鼻子缓慢地做深呼吸。


    有些人介绍说，饮用 1 杯水，里面溶有 1 茶匙糖，可以使打嗝停止。


    # ### 4. 反胃


    生理的和心理的问题都会引起反胃。引起反胃的原因不仅包括不好的气味、不良的消化、扁桃腺炎、流感、偏头痛、宿醉或食物中毒，而且还包括一些敏感症和情绪方面的疾病。怀孕初期也有反胃呕吐现象。


    当反胃的时候，不要尝试吃什么东西。喝一杯薄荷、茴香或茴芹泡的茶可能对反胃有好处。


    因运动引起的反胃，呼吸些新鲜空气就会好转，不过，加些精油的气味，如薰衣草或香柠檬，效果可能会更好。可以在手帕上滴几滴这种精油，在需要的时候吸入即可。


    # ### 5. 腹部疼痛


    腹部疼痛的原因有很多，如膀胱炎、月经、消化问题或吃饭太快。甚至腹部肌肉拉伤也有可能造成疼痛。


    服用甘菊和薄荷植物泡制的茶，能够缓解某些症状。


    使用按摩油按摩也有助于缓解腹部疼痛，按摩油的配制方法如下：5mL 基础油混入 1 滴洋甘菊或金盏草精油和 1 滴丁香精油和 1 滴欧薄荷精油。


    把它们混合在一起，按顺时针的方向，轻轻地按摩胃部。如果不见好转，还有腹泻、呕吐、发烧或头疼的症状，就要到医院接受治疗。


    # ### 6. 腹泻


    腹泻是肠胃系统出现问题的信号。如果伴随有发烧，这就表明黏膜发炎了。其他的症状还有强烈的口渴、脱水。腹泻是大肠的正常反应，这样可以清除体内的毒素和其他有传染性的废物。导致腹泻的病源，包括辛辣食物、不洁净的饮水、吃得太快、吃不成熟的果实和不易消化的蔬菜、吃过多油腻、含乳脂的食物和所吃食物的种类过多。


    腹泻能引起脱水，对于婴儿和老人后果尤为严重。在治疗期间，要多饮水，避免吃一些食物，包括新鲜的水果、糠（麸）、干饼干和乳制品。


    姜茶对于抽筋和腹部疼痛有好处。食用含淀粉多的食物，如白米饭，尤其是布丁米饭（一种以面粉、牛奶、鸡蛋等为基料的糊状甜食），可以治疗腹泻。'
