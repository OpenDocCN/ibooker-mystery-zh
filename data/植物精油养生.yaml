    土荆芥精油是从土荆芥植物（Chenopodium ambrosioides、Chenopodium anthelminticum）中提取的，属于藜科。


    ### (1) 精油性质

    这种精油有毒，不能在芳香疗法中使用。


    ### (2) 来源

    它是一种粗糙的多年生植物，披有绒毛，可以长到 1m 高，茎直立、短粗，叶片披针状、椭圆形，花多、黄绿色，与叶片的颜色一样。美洲东部的土著居民用这种植物治疗妇科疾病。它还可以用于驱逐蛔虫、十二指肠虫和小绦虫。


    ### (3) 提取方法

    土荆芥精油是以整株植物为原材料的，尤其是种子或果实，采用蒸汽蒸馏法提取。


    ### (4) 化学成份


