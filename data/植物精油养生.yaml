  md: '# # 十、植物精油在身体调理中的应用

    Essential oils health Essential oils health


    # (一) 植物精油与皮肤系统


    # ## 1. 擦伤


    - 擦伤每天都有可能发生，孩子们到处跑着玩，就有可能碰伤自己。擦伤处唯一的危险就是发生感染。所以，一定要确定擦伤处的杂物都被取出来了，所有的脏东西都被完全清洗掉了。

    - 配制清洗液的办法：在一碗温水中，滴入10滴薰衣草、桉树、柠檬或茶树精油。

    - 使受伤的皮肤尽可能地露在新鲜的空气中。但是如果有再感染的危险，要做些防护性覆盖。在一块纱布上滴3滴薰衣草精油，然后盖在伤口上。如果可能的，一天要换两次纱布，在第三天的时候，就可以让伤口暴露在空气中了。


    # ## 2. 唇疱疹


    - 唇疱疹会在嘴唇外侧形成水疱，有疼痛感，一般10天以后会自己痊愈。在痊愈初期，会形成硬壳。唇疱疹是一种单一性的疱疹病毒感染产生的，它可以处于休眠状态很长时间，当压力增大时，就会暴发。

    - 使用甘菊精油、金盏草油、天竺葵精油或茶树油，可以减轻疼痛和缓和病情。

    - 如果病毒的发作是由于太阳照射引起的，就要注意使用知名品牌的太阳防晒产品。


    # ## 3. 痤疮、粉刺、青春痘


    - 青春痘是最常见的皮肤失调的表现。轻微的青春痘表现为黑头和疙瘩，常出现在面部、背部和颈部。

    - (1)症状

    - 多数严重的病例会表现出极度的疼痛，伴有毛孔增大，最后留下深的疤痕。一般情况下，青春痘是由于对皮肤有保护作用的皮脂油的过度分泌而导致的。'
