    精油的生理学效应可以通过测定人体脑电波来解释，另外人类本身具有的享乐主义也符合精油的使用效应。


    # ### 1. 脑电波


    当闻到薰衣草精油那种具有松弛作用的香味时，用 EEG（脑电波描记器）测定脑电波，它会记录到α-波峰升高的现象。不过，随着测试对象处于不同的精神状态，如被激励或放松，试验结果会发生变化。当使用带有警觉性质的气味时，如茉莉，也可以记录到大脑的活跃性提高了。某些气味可以降低心脏的收缩压，从而可以缓解压力，如肉豆蔻、肉豆蔻汁和颉草精油。


    在另一个有趣的测试中，我们发现，气味不需要很强就能够对身体产生影响。使用皮（肤）电活动测试（也就是测定皮肤两点之间的电流强度）时，发现闻到放松性质的气味时，如佛手柑和薰衣草，皮肤电活动减弱了。


    # ### 2. 享乐主义


    不过，我们必须记住的一点是，在解释这些试验结果时，享乐主义扮演着一个重要的角色。当一个人处于一种特殊香味或气味时，享乐观可以代表一个人快乐的程度。


    边缘系统不仅是我们嗅觉系统的一部分，它还是人体连接系统的重要组成部分，因为它对我们身体的其他系统有着间接或直接影响，包括调节内分泌系统、内脏受动器工作机制、人体行为和动机的合成模式。因此，它意味着我们的嗅觉不仅仅具有捕获气味的功能，还可以很好地履行调节功能。


    虽然已经有许多科学研究，分析了气味，尤其是精油的香味是如何影响身体的生理反应，但是仍然有许多无法解释的现象需要进一步的科学调查。


    # ### （五）芳香疗法与脑电波


    德国精神病学家汉斯·伯格最先使用脑电图（EEG）术语。脑电图指大脑潜在的波动的记录。由脑电图记录着脑电波，脑电波是由一系列的能起作用的神经元件流发生器产生的。


    大脑可以分为三个主要部分：大脑、脑干、小脑。大脑是成对结构，分为左、右两个半球，每个半球与身体对应的部分相关联。脑干被分为四个区域，包括长方形的骨髓、连接部分、中脑和间脑。小脑从脊髓索接受来自身体和四肢位置的信息，小脑会对这些信息进行简单化处理，可以称其为大脑的“反馈”中心。'
