    # ### （二）适宜香草栽培的环境条件


    # #### 1. 庭院栽培的土壤条件


    土壤是植物赖以生存的基础。优质的土壤才能培育出势态良好的香草植物。一般来说，排水良好、富含有机质的土壤是香草植物茁壮成长的保障。我们常见的土壤类型通常有沙土、壤土、黏土3种类型。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_241_0.png)


    - （1）黏土

    - 黏土组含黏粒数量较多，孔隙小，肥水渗透慢，因此保水保肥力强，但是易积水，透气性差。

    - （2）壤土

    - 壤土组中粗粉粒含量多，物理化学性能良好，通气透水且保水保肥的性能良好，土层深厚，是种植香草植物的理想土壤。

    - （3）沙土

    - 沙土组中黏粒较少，沙粒含量均在50%以上，粒子组成较粗，孔隙大、透气性强，但易漏水漏肥，土壤温度变化较大，晴天温度上升较快。'
  - '[PAGE 242]


    **2. 盆栽的常用介质**


    介质就是所谓的培养土，培养土并非真正的土壤，而是一些质地较土壤粗的物质，主要目的是达成有利于植物生长所需之透气、透水、保水、排水、保肥性。以下是常用的介质。



    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_242_0.png)


    **陶砾**


    （1）陶粒


    陶粒，顾名思义，就是陶质的颗粒。陶粒形状因工艺不同而各异，其外观特征大部分呈圆形或椭圆形球体，但也有一些仿碎石陶粒呈不规则碎石状。陶粒的抗渗性、抗冻性都很好，很适合作为园艺栽培的基质。



    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_242_1.png)


    **珍珠石**


    （2）珍珠石


    珍珠石是高岭石的一种，为黏土矿物。是将珍珠岩经由高温、高压烧制而成的人工培养土，白色，拥有质轻、多孔的特点，其保水、排水的效果均佳。



    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_242_2.png)


    **蛭石**


    （3）蛭石


    蛭石为一种经过高温煅烧后加以粉碎的人工培养土，一般为褐、黄、暗绿色，有油一样的光泽。它质地非常轻，细微得呈土壤状，适合作为混合土使用，也可用于播种与扦插。它具有排水、保水、保肥与通气的作用。



    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_242_3.png)


    **草炭**


    （4）草炭


    “草炭”又名“泥炭”，是沼泽发育过程中的产物，含有大量水分和未被彻底分解的植物残体、腐殖质以及一部分矿物质。它质地松软易于散碎，多呈棕色或黑色，具有可燃性和吸气性，本身就已经是无公害的绿色肥料，具有提高土壤的持水、通气和保肥的能力。'
  - '[PAGE 243]


    香草植物喜好光照充足，温度适宜的气候，绝大部分的香草植物不适合在室内进行栽培，最主要原因是植物必须依赖日光进行光合作用。一般香草植物的成长温度在 15 ~
    25℃，高温多湿是香草植物生长的忌讳。通常家庭栽种香草植物都是选择在阳台上盆栽，或是在庭院中种植。


    若发现在室内栽种的香草植物变得瘦弱细长，没有香味，考虑是不是摆放的位置光线不足，可以换个阳光充足的位置，或者直接拿到阳台上。另外，在阳光充足的情况下，也要不时转动一下花盆，使植物的每个部位都能充分得到阳光的照射。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_243_0.png)


    家庭栽种香草植物多以盆栽为主，供水的基本原则是以盆内土壤开始干燥时，才给予大量的水来保持湿润的状态。另外，还必须考虑植株的特性，如薄荷的需水性较高、迷迭香较喜微干的环境。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_243_1.png)


    若是固定浇水，夏季维持早晚各一次浇透，春、秋、冬则每天1次，尽可能选择上午6~8时或下午4~6时进行。夏季中午时分日照强烈，应避免浇水。如果不会影响到楼下邻居，尽量不用水盘，一来容易滋生蚊虫，二来易造成植物根系长期处在潮湿状态，而产生烂根现象。'
  - '[PAGE 244]


    **5. 修剪**


    修剪的目的在于调节植物体内的营养，减少无益的营养生长，平衡生长与开花结果的关系，更新老枝，疏掉病弱枝，保证植株内部通风透光，以利于植物的生长，增加开花和结果量。


    修剪时注意不要剪太多，以免对枝条的刺激太大，使新芽长不出来而死亡。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_244_0.png)


    # **（三）香草繁殖方法**


    香草植物的繁殖方法基本上可分为有性繁殖（播种）和无性繁殖（如扦插、压条、分株）两种。


    # **1. 播种法**


    播种法就是在短时间内就可栽种出大量的种苗，且培育出的植株健壮，寿命较长。此法操作简单，在家庭种植中较为实用。播种法通常有撒播、点播。金莲花、琉璃苣等大的种子适合点播，覆土较厚。小的种子如甘菊、薄荷适合撒播，覆土较浅。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_244_1.png)


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_244_2.png)'
  - '[PAGE 245]


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_245_0.png)


    ### 2. 分株法


    分株法指利用植物的根、茎或匍匐枝从母体上分割出来，另栽植成新的独立植株的繁殖方法。薄荷、留兰香是利用地下茎繁殖，紫罗兰采用地下根茎分离繁殖；鸢尾、姜、晚香玉等用块茎分株繁殖；麝香百合、蒜、水仙等用鳞茎繁殖，香根草、柠檬草、香茅等用分根繁殖。


    分株方法是先把植株从盆中小心掘出后，抓住根茎部分，顺着植株的生长与发根状态，予以分开，再将其种入新的盆具或土中。分株过程中，要注意别伤到根部。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_245_1.png)


    ### 3. 扦插法


    扦插法是利用植物的根、茎、叶等部分插入土中，生根后发育成新植株的繁殖方法。此法应用范围较广、经济而简便，尤以采用枝条扦插繁殖方法在香草植物和香草类植物生产上用的较为普遍，如桂花、栀子、茉莉、大花茉莉、含笑、香叶、月桂、薰衣草、杭菊以及芳樟等。


    扦插的方法是将植株顶芽部分 8 ~ 10cm 处剪下，剪下的枝段含水量较少，应插在水中 0.5 ~ 1 小时，去除下端的叶片。用筷子在装有培养土的盆器中挖洞，把枝条插入、压紧洞口，再给予充足的水分，约
    1 星期后就会生根，约 1 个月后可进行移植、定植。'
