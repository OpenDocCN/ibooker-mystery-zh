    (1) 精油性质


    味道发甜、刺鼻，颜色橘黄色。


    (2) 来源


    原产于我国，在1805年被引入欧洲，稍后传到美洲，现在美洲是这种精油最大的加工地。欧洲橘子的果皮颜色是深橙色，不含有种子。橘与橙最大区别在于橘皮易与果肉分离，而橙皮紧贴果肉。


    (3) 提取方法'
