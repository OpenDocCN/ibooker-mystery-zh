    # 13. 万寿菊精油


    万寿菊精油是从万寿菊植物（Tagetes minuta、Tagetes glandulifera）中提取的，属于菊科。它经常与金盏花精油相混淆，金盏花属于菊科，又称“真正的万寿菊”。


    主要应用于治疗感染，尤其适用于治疗化脓性伤口和胸腔发炎的症状。


    # (1) 精油性质


    万寿菊精油气味温和、甜，有类似于柑橘气味的果香味道，颜色黄色或红琥珀色。黏性中等，如果长期暴露在空气中，会变黏甚至成为凝胶状。


    # (2) 来源


    在非洲人们称其为“卡其布灌木”，现在法国和北美洲也有种植。一般处于野生状态，叶片革质、深绿色，花多、橘黄色，类似于康乃馨。它的叶片和花是很好的驱虫剂，经常可以看见当地的棚屋上悬挂有此物，用于驱赶成群的苍蝇和蚊子。以5%的精油浓度，可以用于杀死外露伤口的蛆，有人发现它的根系和种子有助于清除体内的毒素。万寿菊精油是许多治疗足部制剂的成份，也在某些香水中使用。


    # (3) 提取方法


    万寿菊精油是以叶片、茎和花为原料的。采集时间是当种子开始形成期。


    # (4) 化学成份


    万寿菊酮、柠檬烯、颉草酸和罗勒烯。


    # (5) 治疗功效


    万寿菊精油是一种有价值的驱虫剂，可治疗寄生物和真菌引起的感染。还可治疗胸腔炎、咳嗽和黏膜炎，可以扩大支气管，促进黏液的流动，缓解充血状态。也用于治疗皮肤


