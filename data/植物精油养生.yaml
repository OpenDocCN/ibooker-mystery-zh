  md: '苯甲酸松柏酯、肉桂酸酯、安息香酸（10% ~ 20%）、芳香醛和微量香草素。


    # (5) 用法


    +   1) 安息香精油对于抚慰神经系统紧张的治疗效果最好，对消化系统有帮助作用，对于循环系统和呼吸系统也有温和的疗效。

    2) 它能促进胰腺功能，进而可间接帮助消化系统工作，它是通过调控血糖浓度起的作用，这对于有糖尿病的人来说是很有价值的。

    3) 能增加皮肤的弹性，帮助开裂的皮肤愈合，进而有利于伤口的愈合。同时，可以淡化皮肤的红色、敏感性，减轻瘙痒。


    # (6) 使用注意事项


    当需要精力集中时，要避免使用安息香精油，因为它有很强的放松功效。


    # (7) 用法


    +   1) 香炉和蒸汽熏香

    在蒸汽疗法中，安息香精油能够用于治疗神经紧张，缓解压力，抚慰情绪。

    2) 作为复方按摩油和盆浴的添加成份

    安息香精油作为复方按摩油和盆浴的添加成份，能够帮助减轻关节炎和风湿病的疼痛；对于慢性支气管炎和咳嗽也有益处。受损的循环系统功能和肌肉僵硬的症状也可以从中受益。它还有镇静和扭转低落情绪的作用。此外，它还能给皮肤良好的呵护，包括增加皮肤弹力、降低红色、减轻敏感性和止痒，还能帮助伤口愈合。

    3) 做面霜的成份

    安息香精油对于干燥、龟裂性皮肤是一种良好的药物选择。它对于皮肤上的伤口也有帮助，还能缓解伤口疼痛、降低皮肤的敏感性，增加皮肤的弹性，并起到止痒的作用。


    # (8) 适合与安息香精油混用的精油


    香柠檬、芫荽、乳香、刺柏、薰衣草、柠檬、没药、柑橘、酸柠檬叶、玫瑰和檀香精油。


    # 2. 榄香精油


    榄香精油是从榄香树（Canarium luzonicum、C. commune）的树脂中提取的，属于橄榄科，又称为马尼拉榄香。


    # (1) 精油性质


    榄香精油味道类似于柑橘属植物，稍带辛辣，颜色暗淡。


    # (2) 来源


    原产于菲律宾岛，热带树种，可以长到 30m 高。当树萌芽时，从树上渗出淡黄色的树脂。当树脂遇到空气时，开始凝固。到落叶季节时，树脂开始停止渗出。'
