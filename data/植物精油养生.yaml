    ## （五）其他基础油


    ### 1. 荷荷芭油


    事实上，荷荷芭（Simmondsia chinensis）油不是一种油，而是一种液体蜡。在 1970 年，当捕鲸被禁止以后，它就开始变得重要起来，因为它的性质与鲸油的性质十分相似。因为它主要是由蜡脂构成的，是一种非常稳定的物质，不容易变质，它的结构与我们人类的皮脂构造非常接近，可以把它作为一种极好的皮肤保湿剂，适合所有类型的肤质。当作为按摩媒介油使用时，它可以当作皮肤自然分泌皮脂的乳化剂，具有柔和疏通毛孔的作用，能清除毛孔表层和深层的污物。荷荷芭油含有头发需要的一种营养成份，因此有时也被添加到头发护理产品中，但由于它的成本很高，所以含量很低。


    它含有肉豆蔻酸，有消炎的作用。因为它的成份与皮肤油脂的成份相类似，可以被迅速地吸收，极其适合干燥、老化以及有炎症的皮肤使用。多数情况下，它可以放心地用在有痤疮的皮肤上，因为，它有助于控制痤疮；它也是一种抗氧化剂，所以不会轻易变质，也可以防止其他油脂变质。它可以单独做按摩油的成份，也可以与其他基础油混合使用。看它的化学成份就很好理解，为什么荷荷芭油一直是人们喜爱的基础油。它常被加入到皮肤护理产品中，因为它很容易渗透到皮肤里层，适合所有类型的肤质。


