  md: '# # 11. 婴儿复方油


    当给婴儿洗澡和穿衣服时，可以说是爱护孩子的珍贵时间，也是有孩子的最大喜悦之一。婴儿可以从精油所含的天然植物精华和功效中获益。


    当人们考虑到孩子的健康，尤其是与婴儿用品所含化学成份有关的问题时，他们常常会换用可以得到的纯天然的产品。


    婴儿的皮肤非常脆弱，一定要倍加注意，决不能使用任何可能引起过敏反应的产品。同此在选择保湿和营养婴儿皮肤的产品时要十分小心。


    要记住，尤其是给婴儿配制的产品，一定要格外的温和，不能含有任何效力强大的成份或是会在他们脆弱的皮肤上累积的成份。所加精油的浓度要极低。所有精油所占的比例仅为
    0.15%，以避免精油发生烧伤、刺激或引起任何的副作用。


    基础油：葡萄籽油、荷荷芭油。


    精油：罗马甘菊、薰衣草、橙花。


    像往常一样用温和的肥皂给婴儿洗澡，然后擦干。往你的手掌上倒少量的油，双手搓温暖油，轻轻地给孩子按摩。这样，孩子的肌肤就会丝般的柔滑，还会散发出清新的气味，就像世间最珍贵宝物一样。'
