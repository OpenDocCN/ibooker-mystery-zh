    # （三）香熏


    # 1. 香熏


    由于精油具有各自的治疗功效，因此它们可以在熏香疗法中使用。蒸发精油的过程是强迫芳香分子在空气中传播的过程，我们可以从两方面获益：一方面是通过我们的嗅觉感应器，是一种嗅觉球形物，能激活我们的边缘系统；另外，当我们把它们吸入到肺部时，我们可以吸收精油分子，当然，它们也会被身体吸收。


    （1）精油汽化器


    精油汽化器是最令人享受的应用于精油的设备之一，可以通过许多种汽化器把精油散发到我们呼吸的空气中。这与在房间中放置合成的花香是不同的，因为使用精油汽化器，你得到的不仅是充满芳香的房间，还可以从精油的治疗功效中受益。在房间蒸汽熏香最常用的方法，就是往蒸发器中添加几滴精油，蒸发器的制作材料有许多种，包括陶瓷的、无釉赤陶的、金属的和玻璃的等，它们都由两部分构成，上面装水和精油（或是结晶体与精油的混合体），下面可以安置蜡烛提供温和的热量。当购买蒸发器时，要为它配置一个大些的蓄水盒，这样你就不用经常地往里加水了。通常往蓄水盒添加6~8滴精油，但具体数量要看房间的大小来定。蜡烛给上面的水加热，水中的精油就开始蒸发，香气就会四处扩散。使用这种蒸发器时要格外小心，尤其是周围有老人和孩子活动时，因为蜡烛是没有遮挡的火焰，水也会变得很烫。可以用电子扩散器，或一种芳香石代替蜡烛蒸发器。


