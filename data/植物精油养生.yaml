    佛手柑、肉桂、姜、葡萄柚、柠檬、橙花和柑橘精油。


    # 8. 肉桂皮精油


    肉桂皮精油是从肉桂树（Cinnamomum cassia、C. aromaticum、Laurus cassia）中提取的，属于樟科，又称桂树和桂皮。


