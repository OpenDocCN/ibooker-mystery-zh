    # **14.葛缕子精油**


    葛缕子精油是从葛缕子植物（Carum carvi、Apium carvi）中提取的，属于伞形科，又称藏茴香和黄蒿。

    这种温和的精油有助于缓解精神压力和疲劳，还能帮助消化，对泌尿系统和呼吸系统也有好处。同时，应用在皮肤或头皮上，效果良好。


    （1）精油性质

    葛缕子精油味道辛辣，有甜味，有些像胡椒的味道。


    （2）来源

    葛缕子一年可以完成两个生命周期，起源于亚洲。但现在主要在北欧、非洲和俄罗斯栽培。株高60cm，叶片柔软，类似于蕨类植物，伞形花序白色或粉红色，果实小、褐色。'
