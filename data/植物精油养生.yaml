- md: "## 常用单方植精油\n\n### 丁香精油\n\n持口气清新。\n\n**（3）价值与用途**\n\n3. 丁香精油的价值还在于可以缓解呼吸系统的问题，如支气管炎、哮喘和肺结核。对传染性疾病还有消毒的作用。\n\
    \n4. 在棉球上滴几滴丁香精油，然后把棉球放在亚麻布制作的食橱里，这样不仅可以熏香食橱，还可以防蛀。\n\n**（6）使用注意事项**\n\n丁香精油的功效强劲，使用时要谨慎对待。如果稀释在基础油、面霜或润肤乳中，用于皮肤时，浓度要控制在\
    \ 1% 以下。它会引起个别人的皮肤过敏反应，很容易刺激到黏膜。在孕期应避免使用。\n\n丁香精油的治疗功效：止痛、防腐杀菌、止痉挛、治神经痛、祛风、抗传染、消毒、杀虫，还可以作为刺激物、健胃品和妇女滋补品。\n\
    \n**（7）用法**\n\n1. **香炉和蒸发器**\n   在蒸汽疗法中，丁香精油可以用于治疗支气管炎和头昏眼花的毛病，帮助振奋精神、强化记忆力和抵抗虚弱、无生气的状态。\n\
    \n2. **做按摩油的成份**\n   丁香精油可以用做按摩油的成份，治疗腹泻、支气管炎、打冷战、感冒、肌肉麻木、肠胃痉挛、风湿病和关节炎。对于牙疼，可以用这种精油按摩下颌，使用的稀释浓度应不高于\
    \ 1%。\n\n3. **做面霜或润肤乳的成份**\n   用于面霜或润肤乳时，丁香精油的功效和做按摩油成份时一样，还可以帮助腿部溃疡和皮肤疼痛的愈合，使用的稀释浓度也应不高于\
    \ 1%。\n\n4. **做漱口水的成份**\n   丁香精油能以低浓度的比例添加在漱口水中，用于治疗牙疼。\n\n**（8）适合与丁香精油混用的精油**\n\
    \n罗勒、安息香、肉桂、薰衣草、姜、檀香和鼠尾草精油。\n\n## 4. 多香果精油\n\n多香果精油是从多香果植物（*Pimenta dioica* L.\
    \ Merr.）中提取的，属于桃金娘科。原植物又称为西班牙甘椒、牙买加胡椒、多香果辣椒和玉桂子。\n\n虽然，这种精油是芳香疗法中最不常用的精油之一，但是，它的确有一些好的治疗功效，也是一种很“温和”的精油，尤其适用于治疗风湿病和胸腔炎，还能缓解抑郁和压力过大的情绪。\n\
    \n### （1）精油性质\n\n从叶片或果实中都可以提取精油。多香果精油是从叶片中提取的，颜色黄褐色，与丁香的气味相似。从果实中提取的精油颜色为淡黄色，气味温和、清新、辛辣。\n\
    \n### （2）来源\n\n这种常绿植物原产于印度西部和美洲南部，高可达 10m。种植第 3 年后开始结果，每个果实含有两个肾形的绿色种子。当果实成熟时种子为黑色，并变得光滑。树皮会剥落。牙买加为主要产地。\n\
    \n之所以称其为多香果，是因为它的味道是由多种香味组成，包括丁香、杜松浆果、肉桂叶和胡椒的香味。在欧洲人到达加勒比海之前，当地人用作香料。多香果现在用作许多熟知的调味汁和作料的配料。\n\
    \n![多香果 Pimenta dioica](img/9a4032e2e8ad73992ff2b2bd7fc25509_103_0.png)\n\n###\
    \ （3）提取方法\n\n多香果精油是以叶片或果实为原料，采用蒸汽蒸馏法提取的。也有少量精油是从浆果树脂中提取的。浆果在完全成熟之前采集，因为当它们充分成熟时挥发油含量会降低。\n\
    \n### （4）化学成份\n\n丁子香酚（含量高达 80%）、甲基丁子香酚、桉树脑、水芹烯和石竹（萜）烯。\n\n### （5）治疗功效\n\n多香果精油的治疗功效：麻醉、止痛、抗氧化、防腐杀菌、祛风、肌肉放松、发红、激励和滋补。\n\
    \n### （6）使用注意事项\n\n多香果精油只能以低剂量使用，因为它对黏膜和皮肤有刺激作用。\n\n### （7）用法\n\n1. **香炉和蒸发器熏香**\n\
    \   当心情不好的时候，在香炉或蒸发器中滴 2 滴多香果精油，有助于振奋精神和缓解压力。\n\n2. **做按摩油成份**\n   可以用很小剂量的多香果精油做按摩油的成份，以治疗胸腔感染，严重的肌肉抽筋或感冒。它也有助于治疗风湿病、关节炎、肌肉僵硬、打寒战、频繁的咳嗽和支气管炎。\n\
    \n### （8）适合与多香果精油混用的精油\n\n姜、天竺葵、薰衣草、柑橘、广藿香和依兰精油。\n\n## 5. 黑胡椒精油\n\n![黑胡椒](img/9a4032e2e8ad73992ff2b2bd7fc25509_104_0.png)\n\
    \n黑胡椒精油是从胡椒（*Piper nigrum*）植物提取的，属于胡椒科胡椒属，是利用没有成熟的红色果实提取的精油；而白胡椒精油也是从相同的果实提取的，只是浆果是在完全成熟时采摘的，外果皮在晾晒前去掉。\n\
    \n这种温和的、辛辣的精油有助于提高身体温度，振奋精神，缓解肌肉和关节疼痛，改善免疫力和消化系统，刺激肾功能，通过促进皮肤循环消散皮肤瘀伤。\n\n###\
    \ （1）精油性质\n这种精油辛辣味强烈，有点像丁香精油的味道，不过还要更优雅一些。精油色泽从淡琥珀色到黄绿色间变化，具有水质般黏性。\n\n### （2）来源\n\
    黑胡椒植物起源于印度、马来群岛、马达加斯加岛（非洲岛国）、中国和印度尼西亚。精油主要是在新加坡、印度和马来群岛提取。\n\n黑胡椒起初是一种热带植物。这种向上攀缘的木本蔓性植物，利用树木或其他支撑物可以长约\
    \ 6m 高，人工栽培（或用于商业的）植物一般保持在 4m 的高度，经济使用寿命约有 20 年。\n\n英文单词 pepper 是从拉丁文 piper 演化来的，而\
    \ piper 则是从梵文单词 pippali 演变来的。在古罗马和古希腊时代，人们就开始使用胡椒。在土耳其，人们甚至可以用胡椒交税。在中世纪时期，法国人、葡萄牙人和荷兰人曾经因胡椒远东贸易利润的分配而爆发战争。\n\
    \n### （3）提取方法\n黑胡椒精油是以没有成熟的、经过阳光晾晒的胡椒子为原料，采用蒸汽蒸馏方法提取的精油，出油率大约是 2%。\n\n### （4）化学成份\n\
    侧柏酮、松萜或蒎烯、茨烯、桧烯、水芹烯、月桂烯、柠檬油精、石竹（萜）烯、法呢烯或金合欢烯、红〔甜〕没药（萜）烯、芳樟醇、萜品烯或松油烯。\n\n### （5）治疗功效\n\
    促进肠胃蠕动，调理结肠肌肉，是一种常用的帮助消化的滋补品。黑胡椒精油的治疗功效：止痛、杀菌、止痉挛、抗毒素、激发性欲、促进发汗、帮助消化、利尿、退热、放松、发红和滋补（尤其是对脾）。\n\
    \n### （6）使用注意事项\n黑胡椒精油能使敏感性皮肤发生过敏反应。如果使用过多对肾脏也不好。在怀孕期间应避免使用，因为可能会引起皮肤发生光敏反应。\n\
    \n### （7）用法\n这种温和的精油对于促进循环、消散瘀伤，尤其是对肌肉放松、四肢疼痛和风湿病非常有效。此外，它还能促进消化，对结肠和肾脏也十分有利。\n\
    \n1. **香炉和蒸馏器**\n   在蒸汽疗法中，黑胡椒精油被用来治疗寒战和感冒，增加温度，能创造一种“想做事”的气氛。\n\n2. **做复方油或盆浴的成份**\n\
    \   黑胡椒精油可以用做复方按摩油的添加成份使用，或稀释在盆浴中使用，有利于促进循环，消散瘀伤，缓解风湿性关节炎和肌肉疼痛。\n\n3. **做基础面霜的成份**\n\
    \   做复方面霜的成份能用于治疗四肢酸疼、肌肉疼痛、风湿性关节炎、促进食欲，能解决一些肠胃问题。小剂量使用有退烧的效果。它能促进皮肤的循环，因此有助于帮助皮肤恢复的功能。\n\
    \n### （8）适合与黑胡椒精油混用的精油\n\n佛手柑、快乐鼠尾草、丁香、芫荽、茴香、乳香、天竺葵、姜、葡萄柚、薰衣草、刺柏、柠檬、酸柠檬、中国柑橘、鼠尾草、檀香和依兰精油。\n\
    \n## 6. 胡萝卜籽精油\n\n![胡萝卜籽](img/9a4032e2e8ad73992ff2b2bd7fc25509_105_0.png)\n\n\
    胡萝卜籽精油是从胡萝卜植物（*Daucus carota*）中提取的，属于伞形科。这种精油是从种子中提炼出来的，不要与溶剂萃取的胡萝卜油混淆，后者是以胡萝卜为原料，浸泡在基础油中提取的。\n\
    \n这种精油在芳香疗法中最不被重视的精油之一。它有股轻柔的泥土香味道，不仅有助于缓解压力和解除疲劳，而且还是强有力的解毒剂和肝脏改善剂，一般用于激励和使皮肤恢复活力方面，能增加皮肤的弹力。同时，它还能处理多种皮肤问题，包括牛皮癣、湿疹、流脓的伤口、溃疡、疖子和痈。在外表皮明显的作用是消除皱纹，对消除老年斑也有作用。\n\
    \n### （1）精油性质\n胡萝卜籽精油味道稍甜，有股干燥的泥土香味。\n\n### （2）来源\n胡萝卜籽精油主要是从野生胡萝卜中提取的，通常可以在欧洲找到。它是一年生或是二年生植物，羽状叶，白色花序伞形、中间紫色。\n\
    \n胡萝卜的英文是从希腊单词\"Carotos\"演变来的，在古时候，人们认为它有很强的医用疗效，尤其是它的祛风效果显著。在现代应用中，癌症病人常常食用胡萝卜，尤其是胃和咽喉有问题的人。由于胡萝卜籽精油含有胡萝卜素和维生素\
    \ A，对于皮肤、头发、齿龈和牙齿的健康都非常好，还有助于保持良好的视力。\n\n### （3）提取方法\n这种油是以干燥的种子为原料，采用蒸汽蒸馏提取的。全株植物也能用于提取精油。\n\
    \n### （4）化学成份\n松萜或蕨烯、茨烯、桧烯、月桂（香叶）烯、松油精或萜品烯、柠檬油精、红没药烯、乙酸香叶酯和胡萝卜烯醇。\n\n### （5）治疗功效\n\
    \n1. 胡萝卜籽精油对肝脏有解毒的作用，有助于治疗黄疸。同时，还能洁净消化系统和身体。\n2. 它能治疗关节炎、痛风、浮肿、风湿病、清除肌肉和关节毒素的积累，也能强化鼻腔、咽喉和肺部黏膜，有利于支气管炎和流行性感冒的治愈。\n\
    3. 它能促进体液的循环，有益于缓解厌食症；可以促进皮肤再生，调和皮肤组织，有助于皮炎、湿疹和皮疹的恢复。\n\n### （6）使用注意事项\n虽然它被当作一种安全油，但在怀孕期间应尽量避免使用。\n\
    \n### （7）用法\n\n1. **香炉和蒸发器**\n   胡萝卜籽精油可以在蒸汽治疗中使用，能缓解压力，改善肝脏、消化和呼吸系统的功能，对于减轻肌肉疼痛也有效果。它不会产生过强的气味，当人在身心疲倦的时候，闻到这股淡淡的泥土气味时会帮助人们沉静下来。\n\
    \n2. **做面霜和洗液的添加成份**\n   它对皮肤的再生有一种近乎魔术般地神奇效果，它的作用不仅仅是使皮肤软化和光滑，而且能促进细胞再生和使皮肤恢复活力。\n\
    \n3. **做按摩油或在盆浴中的添加成份**\n   胡萝卜籽精油做按摩油或在盆浴中的添加成份，有助于缓解肌肉疼痛，改善呼吸系统的功能，清除身体毒素，促进制造血红细胞。\n\
    \n### （8）适合与胡萝卜籽油混用的精油\n\n佛手柑、刺柏、薰衣草、柠檬、酸柠檬、雪松、天竺葵，以及带有辛辣味的精油。\n\n## 7. 芫荽精油\n\
    \n![芫荽](img/9a4032e2e8ad73992ff2b2bd7fc25509_107_0.png)\n\n芫荽精油是从芫荽植物（*Coriandrum\
    \ sativum*）中提取的，属于伞形科，又称为芫荽、香菜。\n\n从这种古老的植物中提取的精油，在芳香疗法中是占有一席之地的，可以用于平复情绪和抵抗疲劳；同时，还能温暖和镇定消化系统，缓解关节炎和风湿病的疼痛，以及肌肉痉挛，给身体解毒。\n\
    \n### （1）精油性质\n芫荽精油味道温和、甜，具有辛辣味，接近于无色到淡黄色；黏质性为水性。\n\n### （2）来源\n原产于摩洛哥，是一年或二年生植物，可以长到\
    \ 1m 高。叶片稀疏、纤细、革质化；略带桃红色或白色花朵，结绿色种子。揉碎叶片会散发一种不愉快的气味，就如压扁一只臭虫散发出的气味。希腊名字 Koris（臭虫）就是芫荽单词\
    \ Coriander 的词根。\n\n埃及人使用种子已有数千年的历史了，作为春药或壮阳剂。罗马人和希腊人喜欢用它酿酒，而印度人喜欢烹饪中用它。在 17 世纪的法国，人们用这种种子熏香梳洗用水。目前，它还应用于酿造查特酒（法国查特修道院僧侣酿制的黄绿色甜酒）和本笃会的一种利口甜酒。\n\
    \n### （3）提取方法\n芫荽精油是以压碎的成熟种子为原料，采用蒸汽蒸馏法提取的，出油率在 0.8%~1.0%。\n\n### （4）化学成份\n龙脑、芳樟醇、桧树脑、异丙基苯、松油醇、二戊烯、水芹烯、松萘和异油松烯。\n\
    \n### （5）治疗功效\n芫荽精油可以用于恢复精力和振奋精神。它有益于消除脑力疲劳，缓解偏头痛和精神紧张，还可以治疗神经虚弱。它有暖胃和缓解月经痛的效果，同时，具有更新腺体系统的功能。它有助于缓解关节炎和风湿病疼痛，以及肌肉痉挛；对感冒和流感也有效果。它也\n\
    \n### （6）使用注意事项\n没有发现禁忌事项，但是大剂量使用这种精油时，会有麻木的反应。\n\n### （7）用法\n\n1. **熏香疗法或香炉熏香**\n\
    \   在蒸汽疗法中，芫荽精油可以激励头脑和克服疲劳，有益于治疗饮食失调和增进食欲。\n\n2. **稀释在盆浴中或做按摩油的成份**\n   稀释在盆浴中，或做按摩油的一部分，芫荽精油有利于消化系统，还可以缓解关节炎和风湿病的疼痛，治疗肌肉痉挛，排除体内毒素。\n\
    \n3. **做面霜或润肤乳的添加成份**\n   作为面霜或润肤乳的一部分，芫荽精油可以缓解紧张，消除精神疲劳，治疗偏头疼、肌肉抽筋、关节炎和风湿病疼痛以及消化系统的问题。但是，要谨慎使用，个别人对它会有敏感反应。\n\
    \n### （8）适合与芫荽精油混用的精油\n佛手柑、肉桂、姜、葡萄柚、柠檬、橙花和柑橘精油。\n\n## 8. 肉桂皮精油\n\n![肉桂树 Cinnamomum\
    \ cassia](img/9a4032e2e8ad73992ff2b2bd7fc25509_108_0.png)\n\n肉桂皮精油是从肉桂树（*Cinnamomum\
    \ cassia*, *C. aromaticum*, *Laurus cassia*）中提取的，属于樟科，又称桂树和桂皮。\n\n虽然肉桂精油能引起皮肤过敏，但它有一些好的特性，这种具有异国情调的精油散发着温和迷人的香气，可以治疗发烧、打冷战，对消化系统也有帮助。\n\
    \n### （1）精油性质\n肉桂精油味道温和、辛辣。\n\n### （2）来源\n它原产于中国，又称为桂皮或中国肉桂，是一种纤弱、常绿树，可以长到 20m\
    \ 高，叶片厚、革质，开白色小花。果实为浆果，含 1 枚种子，大小如小橄榄。桂树皮被广泛地用做调味品，给咖喱饭、烘烤食品、糖果和一些软饮料调味。\n\n###\
    \ （3）提取方法\n肉桂精油是以叶片、树皮、嫩枝和树枝为原料，采用蒸汽蒸馏法提取的。\n\n### （4）化学成份\n肉桂醛、醋酸苯丙烯酯、安息香醛或苯甲醛、芳樟醇、胡椒酚或佳味酚。\n\
    \n### （5）治疗功效\n晒干的肉桂植物可以用于治疗消化系统疾病，如胃肠胀气、绞痛、消化不良、痢疾和呕吐恶心。它也可以治疗感冒、流感、发烧、关节炎和风湿病。\n\
    \n### （6）使用注意事项\n肉桂精油最好不要在皮肤上使用，因为它会对皮肤产生刺激，使皮肤有光敏性，对黏膜也有刺激作用。孕期避免使用。\n\n### （7）用法\n\
    肉桂精油不能在保健按摩治疗中使用。\n\n1. **香炉**\n   在蒸汽疗法中，肉桂精油用于治疗发烧、感冒、流感、体质虚弱、打寒战，也能促进消化系统。\n\
    \n2. **做面霜或润肤乳的成份**\n   虽然肉桂精油对皮肤有刺激作用，但如果按照配比原则，混有低比例的肉桂精油的面霜或润肤乳对关节炎和风湿病是有益的。\n\
    \n## 9. 肉桂叶精油\n\n![肉豆蔻 Myristica fragrans](img/9a4032e2e8ad73992ff2b2bd7fc25509_111_0.png)\n\
    *(注：此处图片标题与上下文不符，根据原文逻辑应为肉桂叶相关图片或延续上一张图)*\n\n肉桂叶精油是从肉桂植物（*Cinnamomum zeylanicum*,\
    \ *C. verum*）的叶片中提取的，属于樟科。\n\n这种辛辣的精油在芳香疗法中有很大的利用价值，它可以缓解精疲力竭、精神压抑和垂头丧气的感觉。它有强大的治疗风湿病的功效，在消化系统方面也有作用，还可以治疗感冒和流感。\n\
    \n### （1）精油性质\n肉桂叶精油，味道温和、辛辣，有麝香的气味。油的颜色，从叶片中提取的精油颜色是黄色，从树皮中提取的精油颜色是红褐色。精油的黏质性介于中等到水性之间。从树皮提取的精油一般不在芳香疗法中使用。\n\
    \n### （2）来源\n这种桂树原产于印尼，在斯里兰卡和印度有栽培，树皮铁锈色，可以长到 15m 高，商业性的种植高度一般控制在 2m。它的叶片革质、有光泽、绿色，开小白花，果实为浆果、椭圆形、紫色。树皮淡褐色，如纸一样。茎羽状、茂密，叶片依次向内反卷，每两年收割\
    \ 1 次。\n\n希腊单词 Kinnamon 的意思是“管子”或“导管”的意思。肉桂精油过去常作为寺庙香味使用，在印度，用它做足部按摩和用于治疗性情暴躁。它还被当作酿制葡萄酒、制作春药的原料使用。在分娩时，用作止痛剂。它也是印度、中国和埃及之间贸易的重要日用品。\n\
    \n### （3）提取方法\n以叶片和嫩梢或内部干燥树皮做原料，采用蒸汽蒸馏法提取。叶片出油率在 1.6% ~ 1.8%，树皮的出油率在 0.5% ~ 1.0%。这里介绍的精油是从叶片提取的。因为用叶片生产出来的精油质量好。\n\
    \n### （4）化学成份\n从叶片提取的精油，主要成份为丁子香酚、醋酸丁子香酯、肉桂醛和苯甲基安息香酯。\n\n### （5）治疗功效\n\n1. 肉桂叶精油可以用于治疗呼吸系统感染、风湿病、关节炎和一般的疼痛。它可以平缓精疲力竭和受压抑的情绪，具有调和全身，激励腺体系统的功能。还能缓解周期性的疼痛。\n\
    2. 肉桂叶精油的功效在于它对呼吸系统和神经系统的调和和平缓能力；还在于治疗感冒和流感，以及周期性疼痛。\n3. 它也有平缓消化系统的功能，有助于风湿病和关节炎的治疗。虽然传统上曾用于清除疣，但我们不推荐它作为皮肤护理的产品。\n\
    \n### （6）使用注意事项\n从叶片提取的肉桂精油是没有毒的。精油中含有能使皮肤，尤其是黏膜发生过敏反应的肉桂醛和丁子香酚成份，所以要小心使用。大剂量使用可以引发抽搐反应。叶片提取的肉桂精油应避免在孕期使用，从肉桂树皮提取的精油应该完全禁用，因为它对皮肤有毒性、过敏性和感光性。\n\
    \n### （7）用法\n\n1. **香炉和蒸发器**\n   在蒸汽疗法中，肉桂叶精油可以治疗较严重的支气管炎、感冒和打喷嚏；还有助于振奋精神，恢复体力。\n\
    \n2. **做复方油或在盆浴中的添加成份**\n   肉桂叶精油可以做复方按摩油或在盆浴中的添加成份，用于治疗支气管炎、痢疾、打寒战、感染、流感、风湿病和关节炎。由于它有很强的防腐杀菌功效，对于治疗感染性疾病效果显著。此外，在平缓消化道痉挛、恶心呕吐方面也有很大的利用价值。它能刺激消化液的分泌，对因风湿病和关节炎引起的肌肉和关节疼有止痛的作用。要小心使用，防止引起皮肤和黏膜的过敏反应。\n\
    \n3. **做面霜或润肤乳的添加成份**\n   与上述的治疗功效和方法类似，当按照一定的配方制成面霜或润肤乳时，肉桂叶精油有助于治疗消化系统、风湿病和关节炎的疼痛。还能治疗感冒、流感。\n\
    \n### （8）适合与肉桂叶精油混用的精油\n安息香、丁香、芫荽、小豆蔻、乳香、姜、葡萄籽、薰衣草、迷迭香和百里香精油。\n\n## 10. 肉豆蔻精油\n\
    \n![肉豆蔻 Myristica fragrans](img/9a4032e2e8ad73992ff2b2bd7fc25509_111_0.png)\n\n\
    肉豆蔻精油是从肉豆蔻植物（*Myristica fragrans*, *Myristica officinalis*）种仁中提取的，属于肉豆蔻科。\n\n\
    这种温和辛辣的精油在芳香疗法中被用来治疗感染，缓解肌肉和风湿病的疼痛，有助于消化系统，能促进生殖系统的功能。同时，对大脑有刺激作用，可以使它处于一种精力充沛的状态。\n\
    \n### （1）精油性质\n肉豆蔻精油气味辛辣、强烈，有股麝香的味道。从肉豆蔻中提取的精油能产生一种梅斯毒气（一种暂时伤害性压缩液态毒气）。我们介绍的这种精油是从种子中提取的纯肉豆蔻精油。\n\
    \n### （2）来源\n它是一种常绿树，可以长到 15m 高。树叶互生革质，椭圆状批针形，花小、花色暗黄。原产于马六甲群岛，但在爪哇和斯里兰卡也有发现。果实与小桃相似，精油从种仁中提取。印度人用它治疗肠胃失调，埃及人用作防腐剂，意大利人用它预防瘟疫。在中世纪时期，肉豆蔻被搓碎与猪油混合，做成一种药膏治疗痔疮，但现在人们用它制作香皂、蜡烛、护牙产品和头发护理用品。\n\
    \n在印度尼西亚的摩鹿加群岛以及马来半岛，肉豆蔻树已经被广泛种植了。我国海南、广西、云南等省区有引种栽培。\n\n### （3）提取方法\n肉豆蔻精油是以干燥的种子为原料的，采用蒸汽蒸馏法提取。\n\
    \n### （4）化学成份\n松萜或蒎烯、茨烯、桧烯、香叶烯、水芹烯、萜品烯或松油烯、柠檬油精、桉树脑、松油精或萜品烯、芳樟醇、黄樟油精、甲基丁子香酚和肉豆蔻醚。\n\
    \n### （5）治疗功效\n1. 肉豆蔻精油对心脏和循环系统有刺激作用，能激励大脑，能使人从昏厥状态苏醒，可以刺激消化系统，治疗风寒、反胃、经常性呕吐和痢疾。在我国，肉豆蔻主要用于治疗腹泻。"
  mdcn: "## 常用单方植精油\n\n### 丁香精油\n\n持口气清新。\n\n**（3）价值与用途**\n\n3. 丁香精油的价值还在于可以缓解呼吸系统的问题，如支气管炎、哮喘和肺结核。对传染性疾病还有消毒的作用。\n\
    \n4. 在棉球上滴几滴丁香精油，然后把棉球放在亚麻布制作的食橱里，这样不仅可以熏香食橱，还可以防蛀。\n\n**（6）使用注意事项**\n\n丁香精油的功效强劲，使用时要谨慎对待。如果稀释在基础油、面霜或润肤乳中，用于皮肤时，浓度要控制在\
    \ 1% 以下。它会引起个别人的皮肤过敏反应，很容易刺激到黏膜。在孕期应避免使用。\n\n丁香精油的治疗功效：止痛、防腐杀菌、止痉挛、治神经痛、祛风、抗传染、消毒、杀虫，还可以作为刺激物、健胃品和妇女滋补品。\n\
    \n**（7）用法**\n\n1. **香炉和蒸发器**\n   在蒸汽疗法中，丁香精油可以用于治疗支气管炎和头昏眼花的毛病，帮助振奋精神、强化记忆力和抵抗虚弱、无生气的状态。\n\
    \n2. **做按摩油的成份**\n   丁香精油可以用做按摩油的成份，治疗腹泻、支气管炎、打冷战、感冒、肌肉麻木、肠胃痉挛、风湿病和关节炎。对于牙疼，可以用这种精油按摩下颌，使用的稀释浓度应不高于\
    \ 1%。\n\n3. **做面霜或润肤乳的成份**\n   用于面霜或润肤乳时，丁香精油的功效和做按摩油成份时一样，还可以帮助腿部溃疡和皮肤疼痛的愈合，使用的稀释浓度也应不高于\
    \ 1%。\n\n4. **做漱口水的成份**\n   丁香精油能以低浓度的比例添加在漱口水中，用于治疗牙疼。\n\n**（8）适合与丁香精油混用的精油**\n\
    \n罗勒、安息香、肉桂、薰衣草、姜、檀香和鼠尾草精油。\n\n## 4. 多香果精油\n\n多香果精油是从多香果植物（*Pimenta dioica* L.\
    \ Merr.）中提取的，属于桃金娘科。原植物又称为西班牙甘椒、牙买加胡椒、多香果辣椒和玉桂子。\n\n虽然，这种精油是芳香疗法中最不常用的精油之一，但是，它的确有一些好的治疗功效，也是一种很“温和”的精油，尤其适用于治疗风湿病和胸腔炎，还能缓解抑郁和压力过大的情绪。\n\
    \n### （1）精油性质\n\n从叶片或果实中都可以提取精油。多香果精油是从叶片中提取的，颜色黄褐色，与丁香的气味相似。从果实中提取的精油颜色为淡黄色，气味温和、清新、辛辣。\n\
    \n### （2）来源\n\n这种常绿植物原产于印度西部和美洲南部，高可达 10m。种植第 3 年后开始结果，每个果实含有两个肾形的绿色种子。当果实成熟时种子为黑色，并变得光滑。树皮会剥落。牙买加为主要产地。\n\
    \n之所以称其为多香果，是因为它的味道是由多种香味组成，包括丁香、杜松浆果、肉桂叶和胡椒的香味。在欧洲人到达加勒比海之前，当地人用作香料。多香果现在用作许多熟知的调味汁和作料的配料。\n\
    \n![多香果 Pimenta dioica](img/9a4032e2e8ad73992ff2b2bd7fc25509_103_0.png)\n\n###\
    \ （3）提取方法\n\n多香果精油是以叶片或果实为原料，采用蒸汽蒸馏法提取的。也有少量精油是从浆果树脂中提取的。浆果在完全成熟之前采集，因为当它们充分成熟时挥发油含量会降低。\n\
    \n### （4）化学成份\n\n丁子香酚（含量高达 80%）、甲基丁子香酚、桉树脑、水芹烯和石竹（萜）烯。\n\n### （5）治疗功效\n\n多香果精油的治疗功效：麻醉、止痛、抗氧化、防腐杀菌、祛风、肌肉放松、发红、激励和滋补。\n\
    \n### （6）使用注意事项\n\n多香果精油只能以低剂量使用，因为它对黏膜和皮肤有刺激作用。\n\n### （7）用法\n\n1. **香炉和蒸发器熏香**\n\
    \   当心情不好的时候，在香炉或蒸发器中滴 2 滴多香果精油，有助于振奋精神和缓解压力。\n\n2. **做按摩油成份**\n   可以用很小剂量的多香果精油做按摩油的成份，以治疗胸腔感染，严重的肌肉抽筋或感冒。它也有助于治疗风湿病、关节炎、肌肉僵硬、打寒战、频繁的咳嗽和支气管炎。\n\
    \n### （8）适合与多香果精油混用的精油\n\n姜、天竺葵、薰衣草、柑橘、广藿香和依兰精油。\n\n## 5. 黑胡椒精油\n\n![黑胡椒](img/9a4032e2e8ad73992ff2b2bd7fc25509_104_0.png)\n\
    \n黑胡椒精油是从胡椒（*Piper nigrum*）植物提取的，属于胡椒科胡椒属，是利用没有成熟的红色果实提取的精油；而白胡椒精油也是从相同的果实提取的，只是浆果是在完全成熟时采摘的，外果皮在晾晒前去掉。\n\
    \n这种温和的、辛辣的精油有助于提高身体温度，振奋精神，缓解肌肉和关节疼痛，改善免疫力和消化系统，刺激肾功能，通过促进皮肤循环消散皮肤瘀伤。\n\n###\
    \ （1）精油性质\n这种精油辛辣味强烈，有点像丁香精油的味道，不过还要更优雅一些。精油色泽从淡琥珀色到黄绿色间变化，具有水质般黏性。\n\n### （2）来源\n\
    黑胡椒植物起源于印度、马来群岛、马达加斯加岛（非洲岛国）、中国和印度尼西亚。精油主要是在新加坡、印度和马来群岛提取。\n\n黑胡椒起初是一种热带植物。这种向上攀缘的木本蔓性植物，利用树木或其他支撑物可以长约\
    \ 6m 高，人工栽培（或用于商业的）植物一般保持在 4m 的高度，经济使用寿命约有 20 年。\n\n英文单词 pepper 是从拉丁文 piper 演化来的，而\
    \ piper 则是从梵文单词 pippali 演变来的。在古罗马和古希腊时代，人们就开始使用胡椒。在土耳其，人们甚至可以用胡椒交税。在中世纪时期，法国人、葡萄牙人和荷兰人曾经因胡椒远东贸易利润的分配而爆发战争。\n\
    \n### （3）提取方法\n黑胡椒精油是以没有成熟的、经过阳光晾晒的胡椒子为原料，采用蒸汽蒸馏方法提取的精油，出油率大约是 2%。\n\n### （4）化学成份\n\
    侧柏酮、松萜或蒎烯、茨烯、桧烯、水芹烯、月桂烯、柠檬油精、石竹（萜）烯、法呢烯或金合欢烯、红〔甜〕没药（萜）烯、芳樟醇、萜品烯或松油烯。\n\n### （5）治疗功效\n\
    促进肠胃蠕动，调理结肠肌肉，是一种常用的帮助消化的滋补品。黑胡椒精油的治疗功效：止痛、杀菌、止痉挛、抗毒素、激发性欲、促进发汗、帮助消化、利尿、退热、放松、发红和滋补（尤其是对脾）。\n\
    \n### （6）使用注意事项\n黑胡椒精油能使敏感性皮肤发生过敏反应。如果使用过多对肾脏也不好。在怀孕期间应避免使用，因为可能会引起皮肤发生光敏反应。\n\
    \n### （7）用法\n这种温和的精油对于促进循环、消散瘀伤，尤其是对肌肉放松、四肢疼痛和风湿病非常有效。此外，它还能促进消化，对结肠和肾脏也十分有利。\n\
    \n1. **香炉和蒸馏器**\n   在蒸汽疗法中，黑胡椒精油被用来治疗寒战和感冒，增加温度，能创造一种“想做事”的气氛。\n\n2. **做复方油或盆浴的成份**\n\
    \   黑胡椒精油可以用做复方按摩油的添加成份使用，或稀释在盆浴中使用，有利于促进循环，消散瘀伤，缓解风湿性关节炎和肌肉疼痛。\n\n3. **做基础面霜的成份**\n\
    \   做复方面霜的成份能用于治疗四肢酸疼、肌肉疼痛、风湿性关节炎、促进食欲，能解决一些肠胃问题。小剂量使用有退烧的效果。它能促进皮肤的循环，因此有助于帮助皮肤恢复的功能。\n\
    \n### （8）适合与黑胡椒精油混用的精油\n\n佛手柑、快乐鼠尾草、丁香、芫荽、茴香、乳香、天竺葵、姜、葡萄柚、薰衣草、刺柏、柠檬、酸柠檬、中国柑橘、鼠尾草、檀香和依兰精油。\n\
    \n## 6. 胡萝卜籽精油\n\n![胡萝卜籽](img/9a4032e2e8ad73992ff2b2bd7fc25509_105_0.png)\n\n\
    胡萝卜籽精油是从胡萝卜植物（*Daucus carota*）中提取的，属于伞形科。这种精油是从种子中提炼出来的，不要与溶剂萃取的胡萝卜油混淆，后者是以胡萝卜为原料，浸泡在基础油中提取的。\n\
    \n这种精油在芳香疗法中最不被重视的精油之一。它有股轻柔的泥土香味道，不仅有助于缓解压力和解除疲劳，而且还是强有力的解毒剂和肝脏改善剂，一般用于激励和使皮肤恢复活力方面，能增加皮肤的弹力。同时，它还能处理多种皮肤问题，包括牛皮癣、湿疹、流脓的伤口、溃疡、疖子和痈。在外表皮明显的作用是消除皱纹，对消除老年斑也有作用。\n\
    \n### （1）精油性质\n胡萝卜籽精油味道稍甜，有股干燥的泥土香味。\n\n### （2）来源\n胡萝卜籽精油主要是从野生胡萝卜中提取的，通常可以在欧洲找到。它是一年生或是二年生植物，羽状叶，白色花序伞形、中间紫色。\n\
    \n胡萝卜的英文是从希腊单词\"Carotos\"演变来的，在古时候，人们认为它有很强的医用疗效，尤其是它的祛风效果显著。在现代应用中，癌症病人常常食用胡萝卜，尤其是胃和咽喉有问题的人。由于胡萝卜籽精油含有胡萝卜素和维生素\
    \ A，对于皮肤、头发、齿龈和牙齿的健康都非常好，还有助于保持良好的视力。\n\n### （3）提取方法\n这种油是以干燥的种子为原料，采用蒸汽蒸馏提取的。全株植物也能用于提取精油。\n\
    \n### （4）化学成份\n松萜或蕨烯、茨烯、桧烯、月桂（香叶）烯、松油精或萜品烯、柠檬油精、红没药烯、乙酸香叶酯和胡萝卜烯醇。\n\n### （5）治疗功效\n\
    \n1. 胡萝卜籽精油对肝脏有解毒的作用，有助于治疗黄疸。同时，还能洁净消化系统和身体。\n2. 它能治疗关节炎、痛风、浮肿、风湿病、清除肌肉和关节毒素的积累，也能强化鼻腔、咽喉和肺部黏膜，有利于支气管炎和流行性感冒的治愈。\n\
    3. 它能促进体液的循环，有益于缓解厌食症；可以促进皮肤再生，调和皮肤组织，有助于皮炎、湿疹和皮疹的恢复。\n\n### （6）使用注意事项\n虽然它被当作一种安全油，但在怀孕期间应尽量避免使用。\n\
    \n### （7）用法\n\n1. **香炉和蒸发器**\n   胡萝卜籽精油可以在蒸汽治疗中使用，能缓解压力，改善肝脏、消化和呼吸系统的功能，对于减轻肌肉疼痛也有效果。它不会产生过强的气味，当人在身心疲倦的时候，闻到这股淡淡的泥土气味时会帮助人们沉静下来。\n\
    \n2. **做面霜和洗液的添加成份**\n   它对皮肤的再生有一种近乎魔术般地神奇效果，它的作用不仅仅是使皮肤软化和光滑，而且能促进细胞再生和使皮肤恢复活力。\n\
    \n3. **做按摩油或在盆浴中的添加成份**\n   胡萝卜籽精油做按摩油或在盆浴中的添加成份，有助于缓解肌肉疼痛，改善呼吸系统的功能，清除身体毒素，促进制造血红细胞。\n\
    \n### （8）适合与胡萝卜籽油混用的精油\n\n佛手柑、刺柏、薰衣草、柠檬、酸柠檬、雪松、天竺葵，以及带有辛辣味的精油。\n\n## 7. 芫荽精油\n\
    \n![芫荽](img/9a4032e2e8ad73992ff2b2bd7fc25509_107_0.png)\n\n芫荽精油是从芫荽植物（*Coriandrum\
    \ sativum*）中提取的，属于伞形科，又称为芫荽、香菜。\n\n从这种古老的植物中提取的精油，在芳香疗法中是占有一席之地的，可以用于平复情绪和抵抗疲劳；同时，还能温暖和镇定消化系统，缓解关节炎和风湿病的疼痛，以及肌肉痉挛，给身体解毒。\n\
    \n### （1）精油性质\n芫荽精油味道温和、甜，具有辛辣味，接近于无色到淡黄色；黏质性为水性。\n\n### （2）来源\n原产于摩洛哥，是一年或二年生植物，可以长到\
    \ 1m 高。叶片稀疏、纤细、革质化；略带桃红色或白色花朵，结绿色种子。揉碎叶片会散发一种不愉快的气味，就如压扁一只臭虫散发出的气味。希腊名字 Koris（臭虫）就是芫荽单词\
    \ Coriander 的词根。\n\n埃及人使用种子已有数千年的历史了，作为春药或壮阳剂。罗马人和希腊人喜欢用它酿酒，而印度人喜欢烹饪中用它。在 17 世纪的法国，人们用这种种子熏香梳洗用水。目前，它还应用于酿造查特酒（法国查特修道院僧侣酿制的黄绿色甜酒）和本笃会的一种利口甜酒。\n\
    \n### （3）提取方法\n芫荽精油是以压碎的成熟种子为原料，采用蒸汽蒸馏法提取的，出油率在 0.8%~1.0%。\n\n### （4）化学成份\n龙脑、芳樟醇、桧树脑、异丙基苯、松油醇、二戊烯、水芹烯、松萘和异油松烯。\n\
    \n### （5）治疗功效\n芫荽精油可以用于恢复精力和振奋精神。它有益于消除脑力疲劳，缓解偏头痛和精神紧张，还可以治疗神经虚弱。它有暖胃和缓解月经痛的效果，同时，具有更新腺体系统的功能。它有助于缓解关节炎和风湿病疼痛，以及肌肉痉挛；对感冒和流感也有效果。它也\n\
    \n### （6）使用注意事项\n没有发现禁忌事项，但是大剂量使用这种精油时，会有麻木的反应。\n\n### （7）用法\n\n1. **熏香疗法或香炉熏香**\n\
    \   在蒸汽疗法中，芫荽精油可以激励头脑和克服疲劳，有益于治疗饮食失调和增进食欲。\n\n2. **稀释在盆浴中或做按摩油的成份**\n   稀释在盆浴中，或做按摩油的一部分，芫荽精油有利于消化系统，还可以缓解关节炎和风湿病的疼痛，治疗肌肉痉挛，排除体内毒素。\n\
    \n3. **做面霜或润肤乳的添加成份**\n   作为面霜或润肤乳的一部分，芫荽精油可以缓解紧张，消除精神疲劳，治疗偏头疼、肌肉抽筋、关节炎和风湿病疼痛以及消化系统的问题。但是，要谨慎使用，个别人对它会有敏感反应。\n\
    \n### （8）适合与芫荽精油混用的精油\n佛手柑、肉桂、姜、葡萄柚、柠檬、橙花和柑橘精油。\n\n## 8. 肉桂皮精油\n\n![肉桂树 Cinnamomum\
    \ cassia](img/9a4032e2e8ad73992ff2b2bd7fc25509_108_0.png)\n\n肉桂皮精油是从肉桂树（*Cinnamomum\
    \ cassia*, *C. aromaticum*, *Laurus cassia*）中提取的，属于樟科，又称桂树和桂皮。\n\n虽然肉桂精油能引起皮肤过敏，但它有一些好的特性，这种具有异国情调的精油散发着温和迷人的香气，可以治疗发烧、打冷战，对消化系统也有帮助。\n\
    \n### （1）精油性质\n肉桂精油味道温和、辛辣。\n\n### （2）来源\n它原产于中国，又称为桂皮或中国肉桂，是一种纤弱、常绿树，可以长到 20m\
    \ 高，叶片厚、革质，开白色小花。果实为浆果，含 1 枚种子，大小如小橄榄。桂树皮被广泛地用做调味品，给咖喱饭、烘烤食品、糖果和一些软饮料调味。\n\n###\
    \ （3）提取方法\n肉桂精油是以叶片、树皮、嫩枝和树枝为原料，采用蒸汽蒸馏法提取的。\n\n### （4）化学成份\n肉桂醛、醋酸苯丙烯酯、安息香醛或苯甲醛、芳樟醇、胡椒酚或佳味酚。\n\
    \n### （5）治疗功效\n晒干的肉桂植物可以用于治疗消化系统疾病，如胃肠胀气、绞痛、消化不良、痢疾和呕吐恶心。它也可以治疗感冒、流感、发烧、关节炎和风湿病。\n\
    \n### （6）使用注意事项\n肉桂精油最好不要在皮肤上使用，因为它会对皮肤产生刺激，使皮肤有光敏性，对黏膜也有刺激作用。孕期避免使用。\n\n### （7）用法\n\
    肉桂精油不能在保健按摩治疗中使用。\n\n1. **香炉**\n   在蒸汽疗法中，肉桂精油用于治疗发烧、感冒、流感、体质虚弱、打寒战，也能促进消化系统。\n\
    \n2. **做面霜或润肤乳的成份**\n   虽然肉桂精油对皮肤有刺激作用，但如果按照配比原则，混有低比例的肉桂精油的面霜或润肤乳对关节炎和风湿病是有益的。\n\
    \n## 9. 肉桂叶精油\n\n![肉豆蔻 Myristica fragrans](img/9a4032e2e8ad73992ff2b2bd7fc25509_111_0.png)\n\
    *(注：此处图片标题与上下文不符，根据原文逻辑应为肉桂叶相关图片或延续上一张图)*\n\n肉桂叶精油是从肉桂植物（*Cinnamomum zeylanicum*,\
    \ *C. verum*）的叶片中提取的，属于樟科。\n\n这种辛辣的精油在芳香疗法中有很大的利用价值，它可以缓解精疲力竭、精神压抑和垂头丧气的感觉。它有强大的治疗风湿病的功效，在消化系统方面也有作用，还可以治疗感冒和流感。\n\
    \n### （1）精油性质\n肉桂叶精油，味道温和、辛辣，有麝香的气味。油的颜色，从叶片中提取的精油颜色是黄色，从树皮中提取的精油颜色是红褐色。精油的黏质性介于中等到水性之间。从树皮提取的精油一般不在芳香疗法中使用。\n\
    \n### （2）来源\n这种桂树原产于印尼，在斯里兰卡和印度有栽培，树皮铁锈色，可以长到 15m 高，商业性的种植高度一般控制在 2m。它的叶片革质、有光泽、绿色，开小白花，果实为浆果、椭圆形、紫色。树皮淡褐色，如纸一样。茎羽状、茂密，叶片依次向内反卷，每两年收割\
    \ 1 次。\n\n希腊单词 Kinnamon 的意思是“管子”或“导管”的意思。肉桂精油过去常作为寺庙香味使用，在印度，用它做足部按摩和用于治疗性情暴躁。它还被当作酿制葡萄酒、制作春药的原料使用。在分娩时，用作止痛剂。它也是印度、中国和埃及之间贸易的重要日用品。\n\
    \n### （3）提取方法\n以叶片和嫩梢或内部干燥树皮做原料，采用蒸汽蒸馏法提取。叶片出油率在 1.6% ~ 1.8%，树皮的出油率在 0.5% ~ 1.0%。这里介绍的精油是从叶片提取的。因为用叶片生产出来的精油质量好。\n\
    \n### （4）化学成份\n从叶片提取的精油，主要成份为丁子香酚、醋酸丁子香酯、肉桂醛和苯甲基安息香酯。\n\n### （5）治疗功效\n\n1. 肉桂叶精油可以用于治疗呼吸系统感染、风湿病、关节炎和一般的疼痛。它可以平缓精疲力竭和受压抑的情绪，具有调和全身，激励腺体系统的功能。还能缓解周期性的疼痛。\n\
    2. 肉桂叶精油的功效在于它对呼吸系统和神经系统的调和和平缓能力；还在于治疗感冒和流感，以及周期性疼痛。\n3. 它也有平缓消化系统的功能，有助于风湿病和关节炎的治疗。虽然传统上曾用于清除疣，但我们不推荐它作为皮肤护理的产品。\n\
    \n### （6）使用注意事项\n从叶片提取的肉桂精油是没有毒的。精油中含有能使皮肤，尤其是黏膜发生过敏反应的肉桂醛和丁子香酚成份，所以要小心使用。大剂量使用可以引发抽搐反应。叶片提取的肉桂精油应避免在孕期使用，从肉桂树皮提取的精油应该完全禁用，因为它对皮肤有毒性、过敏性和感光性。\n\
    \n### （7）用法\n\n1. **香炉和蒸发器**\n   在蒸汽疗法中，肉桂叶精油可以治疗较严重的支气管炎、感冒和打喷嚏；还有助于振奋精神，恢复体力。\n\
    \n2. **做复方油或在盆浴中的添加成份**\n   肉桂叶精油可以做复方按摩油或在盆浴中的添加成份，用于治疗支气管炎、痢疾、打寒战、感染、流感、风湿病和关节炎。由于它有很强的防腐杀菌功效，对于治疗感染性疾病效果显著。此外，在平缓消化道痉挛、恶心呕吐方面也有很大的利用价值。它能刺激消化液的分泌，对因风湿病和关节炎引起的肌肉和关节疼有止痛的作用。要小心使用，防止引起皮肤和黏膜的过敏反应。\n\
    \n3. **做面霜或润肤乳的添加成份**\n   与上述的治疗功效和方法类似，当按照一定的配方制成面霜或润肤乳时，肉桂叶精油有助于治疗消化系统、风湿病和关节炎的疼痛。还能治疗感冒、流感。\n\
    \n### （8）适合与肉桂叶精油混用的精油\n安息香、丁香、芫荽、小豆蔻、乳香、姜、葡萄籽、薰衣草、迷迭香和百里香精油。\n\n## 10. 肉豆蔻精油\n\
    \n![肉豆蔻 Myristica fragrans](img/9a4032e2e8ad73992ff2b2bd7fc25509_111_0.png)\n\n\
    肉豆蔻精油是从肉豆蔻植物（*Myristica fragrans*, *Myristica officinalis*）种仁中提取的，属于肉豆蔻科。\n\n\
    这种温和辛辣的精油在芳香疗法中被用来治疗感染，缓解肌肉和风湿病的疼痛，有助于消化系统，能促进生殖系统的功能。同时，对大脑有刺激作用，可以使它处于一种精力充沛的状态。\n\
    \n### （1）精油性质\n肉豆蔻精油气味辛辣、强烈，有股麝香的味道。从肉豆蔻中提取的精油能产生一种梅斯毒气（一种暂时伤害性压缩液态毒气）。我们介绍的这种精油是从种子中提取的纯肉豆蔻精油。\n\
    \n### （2）来源\n它是一种常绿树，可以长到 15m 高。树叶互生革质，椭圆状批针形，花小、花色暗黄。原产于马六甲群岛，但在爪哇和斯里兰卡也有发现。果实与小桃相似，精油从种仁中提取。印度人用它治疗肠胃失调，埃及人用作防腐剂，意大利人用它预防瘟疫。在中世纪时期，肉豆蔻被搓碎与猪油混合，做成一种药膏治疗痔疮，但现在人们用它制作香皂、蜡烛、护牙产品和头发护理用品。\n\
    \n在印度尼西亚的摩鹿加群岛以及马来半岛，肉豆蔻树已经被广泛种植了。我国海南、广西、云南等省区有引种栽培。\n\n### （3）提取方法\n肉豆蔻精油是以干燥的种子为原料的，采用蒸汽蒸馏法提取。\n\
    \n### （4）化学成份\n松萜或蒎烯、茨烯、桧烯、香叶烯、水芹烯、萜品烯或松油烯、柠檬油精、桉树脑、松油精或萜品烯、芳樟醇、黄樟油精、甲基丁子香酚和肉豆蔻醚。\n\
    \n### （5）治疗功效\n1. 肉豆蔻精油对心脏和循环系统有刺激作用，能激励大脑，能使人从昏厥状态苏醒，可以刺激消化系统，治疗风寒、反胃、经常性呕吐和痢疾。在我国，肉豆蔻主要用于治疗腹泻。"
