  mdcn: '## 植物精油与消化系统


    ### （六）植物精油与消化系统


    消化系统是身体巨大的化学工厂，负责将食物转化成身体可吸收的营养物质。食物与消化器官中的消化液发生相互作用后，将食物分解成易吸收的营养素，及非必要的废弃物。当吃进去的食物含有一些身体不需要的异物，例如微生物或化学物质，身体就必须尽快地将这些异物排除体外，否则会造成消化系统功能的低下或生病。


    芳香疗法透过精油的香气，促进消化液的分泌，减轻胃痉挛和肠胃胀气等。它的药理作用通过按摩来发挥功效，强化平滑肌功能，有效预防及舒解消化不良症状，进而帮助消化器官排出毒素。近来有研究表明，精油对消化系统的作用主要是透过嗅觉和味觉的间接作用来达到效果的，而不是直接影响组织器官。因此，我们在使用精油时，不但要考虑它的功效，也要关注它的气味是否令人愉快。


    ### 1. 便秘


    便秘可以解释为大便的排泄困难，或者是排泄时缺乏气力。


    #### （1）症状

    包括没有食欲、胃部发胀、有些反胃或消化不良。月经前期、孕妇和经常服药的人容易便秘，但是主要的原因还是饮食中缺乏粗纤维。另外，肛门反复拉伤还容易产生痔疮。


    #### （2）饮食调理

    食用富含新鲜纤维的水果和蔬菜（茴香、龙蒿和胡萝卜），以及带皮谷物、豆类，或在每餐时食用些糠麸，可以缓解便秘。尽量避免食用茶、咖啡、巧克力和所有精制过的食物。要有规律地锻炼身体。


    #### （3）精油调理

    使用按摩油，按顺时针方向在腹部靠下的位置做按摩，每天 3 次，也有疗效。按摩油的配方如下：15 滴迷迭香精油、10 滴柠檬精油、5 滴欧薄荷精油与 30mL
    荷荷芭精油混合。


    ### 2. 口腔异味

    口腔异味，真是一个让人非常尴尬的事情。对于我们周围的这些人来说，他们太关注这个事情了。


    #### （1）症状

    口腔有异味虽然还不是一种疾病，但这仍然是一种疾病潜伏的征兆。其原因有很多，像在齿缝中食物腐败分解、镶牙、饮酒、抽烟还有喝咖啡等都是可能导致口腔异味的原因。刺激性的食物，像葱蒜一类的食品会让口气更加难闻。口腔异味也是胃病的一个征兆。比如消化不良、肝肾脏解毒排毒的功能不正常，这些都能够导致口腔异味。


    #### （2）精油调理

    常用漱口水的配制：4 滴薰衣草油混入 5mL 白兰地和 125mL 温水中。正确刷牙后，用此混合物漱口，然后吐出。


    ### 3. 打嗝

    打嗝可能是很痛苦的，尤其是经常性的打嗝。在一个褐色的纸袋里滴 1 滴甘菊精油，把它捂在你的嘴和鼻子上，用鼻子缓慢地做深呼吸。有些人介绍说，饮用 1 杯水，里面溶有
    1 茶匙糖，可以使打嗝停止。


    ### 4. 反胃

    生理的和心理的问题都会引起反胃。引起反胃的原因不仅包括不好的气味、不良的消化、扁桃腺炎、流感、偏头痛、宿醉或食物中毒，而且还包括一些敏感症和情绪方面的疾病。怀孕初期也有反胃呕吐现象。当反胃的时候，不要尝试吃什么东西。喝一杯薄荷、茴香或茴芹泡的茶可能对反胃有好处。因运动引起的反胃，呼吸些新鲜空气就会好转，不过，加些精油的气味，如薰衣草或香柠檬，效果可能会更好。可以在手帕上滴几滴这种精油，在需要的时候吸入即可。


    ### 5. 腹部疼痛

    腹部疼痛的原因有很多，如膀胱炎、月经、消化问题或吃饭太快。甚至腹部肌肉拉伤也有可能造成疼痛。服用甘菊和薄荷植物泡制的茶，能够缓解某些症状。使用按摩油按摩也有助于缓解腹部疼痛，按摩油的配制方法如下：5mL
    基础油混入 1 滴洋甘菊或金盏草精油和 1 滴丁香精油和 1 滴欧薄荷精油。把它们混合在一起，按顺时针的方向，轻轻地按摩胃部。如果不见好转，还有腹泻、呕吐、发烧或头疼的症状，就要到医院接受治疗。


    ### 6. 腹泻

    腹泻是肠胃系统出现问题的信号。如果伴随有发烧，这就表明黏膜发炎了。其他的症状还有强烈的口渴、脱水。腹泻是大肠的正常反应，这样可以清除体内的毒素和其他有传染性的废物。导致腹泻的病源，包括辛辣食物、不洁净的饮水、吃得太快、吃不成熟的果实和不易消化的蔬菜、吃过多油腻、含乳脂的食物和所吃食物的种类过多。


    腹泻能引起脱水，对于婴儿和老人后果尤为严重。在治疗期间，要多饮水，避免吃一些食物，包括新鲜的水果、糠（麸）、干饼干和乳制品。姜茶对于抽筋和腹部疼痛有好处。食用含淀粉多的食物，如白米饭，尤其是布丁米饭（一种以面粉、牛奶、鸡蛋等为基料的糊状甜食），可以治疗腹泻。


    用含有精油的按摩油，在腹部摩擦也可以缓解腹泻。配置按摩油的方法是，把下列精油混入 10mL 的基础油中：2 滴椒样薄荷精油、2 滴薰衣草精油、2 滴洋甘菊精油、2
    滴桉树精油、2 滴天竺葵精油。


    ### 7. 肛裂

    典型的肛裂会引起强烈刺骨的疼痛，同时有瘙痒的感觉。通常是在排便后发作。肛裂可以解释为，在肛门外表皮之间有溃疡处或发炎的裂缝，黏膜组织也会发生溃疡；病因通常是多方面的联合导致的，包括干燥皮肤受到过分摩擦、粗糙的手纸、由于便秘的拉伤，甚至过大和坚硬的大便引起的。年龄大的老人和小孩容易发生肛裂。用添加
    5 滴薰衣草精油和 1 滴柠檬精油的温水，清洗患处，能缓解症状。


    ### 8. 憩室炎

    位于大肠虚弱部分的重瓣憩室能收集大肠废物，一般不会有不舒服的感觉，除非它们有了炎症。症状可能有疼痛的感觉，以及敏感、发烧、腹泻、便秘、痉挛、出血和贫血。通常
    40 岁以上的人容易患憩室炎，主要病因是，由于年龄的增长，大肠内壁所受压力过大和组织衰弱引起的。当大肠内收集废物的这些憩室被填充满后，就会发生炎症。库拉索芦荟有促进感染部位愈合的作用。可以
    1 天 3 次，每次饮 125mL 的芦荟汁，以帮助治疗。还可以按顺时针的方向，在胃部以上涂抹按摩油，也能够缓解不适。按摩油的配制方法如下：1 滴欧薄荷精油、1
    滴洋甘菊精油、2 滴迷迭香精油、1 滴丁香精油与 5mL 植物基础油混合。


    ### 9. 烧心

    烧心就是胸口有灼烧疼痛的感觉，这种感觉能够辐射到脖颈和咽喉部位，有时会到脸部。它通常在饭后发作，此时胃酸正逆流而上经过括约肌。如果括约肌的肌肉协调能力丧失，保持着开的状态（正常情况是在关闭状态），胃酸就会逆流而上，就有烧心的痛苦感觉。可以用下列配方制成的按摩油按摩腹部上半部：2
    滴尤加利精油、1 滴欧薄荷精油、2 滴茴香精油，稀释在 5mL（约 1 茶匙）葡萄籽油中。


    ## （七）植物精油与生殖系统

    生殖系统是人体最为重要的系统之一，正是由于有了生殖系统，人类才能够繁育后代，才会享受为人父母的快乐与幸福。植物精油对生殖系统的主要作用是治疗生殖系统病症，具有治疗痛经、促进分娩和催生、催情的效果。因为一些精油具有刺激子宫收缩的作用，所以对于快速和无痛的分娩很有帮助，在某些情况下，使用植物油催生比使用化学药物更好，因为它能带来较高的安全性，减轻分娩期间的疼痛，同时降低婴儿在化学药物催化下所引发的某些损伤和不利因素。对于生殖系统问题的治疗，可以采用按摩、泡浴、坐浴等方式。


    ## （八）植物精油与免疫系统

    许多妇女和年轻女孩在月经期，都经历过或轻或重的不舒服和疼痛。月经痛包括头疼、腹部偏下地方的绞痛和后背靠下地方的疼痛。在月经开始前期，食用富含钙和镁矿物质的食物，如牛奶制品、罐装鱼、坚果和种子，因为它们能够使肌肉放松。吃止痛药会有帮助；也可以躺在黑暗的房间，把暖水袋放在胃部，这样也能缓和疼痛。还有一种方法是，饮用由大茴香、茴香和欧芹泡制的植物茶，也有同样的效果。使用一种按摩油轻轻地按摩在疼痛地方的外面，也有助于缓解这类问题。配方如下：15mL
    荷荷芭油做基础油、2 滴甘草精油、2 滴快乐鼠尾草精油、2 滴天竺葵精油、2 滴薰衣草精油、1 滴欧薄荷精油。


    是小规模的战斗，身体在几日的不舒服后就复原了，但是，如果遇到致命性的病原菌时，结果就是重病、死亡，甚至改变人类的历史。一些植物精油不仅可以抑制病原菌，更可以提高自体免疫机能，强化人体的自愈力，芳香疗法按摩可以帮助身体与心灵合而为一，提供更深度的放松效果。


    ### 1. 发烧

    发烧不是严重的疾病，是身体抗击感染保持健康的一种机制。如果发烧温度太高，会引起抽筋甚至精神错乱（暂时性的），这会影响到大脑。发烧的其他症状还有，反应迟钝、冷漠、意识不清或眼睛不能翻转。发烧的病因一般是身体受到感染性物质的侵染，如细菌、毒素、寄生虫和其他的微生物。发烧也可能是因为患流感或感冒引起的。发烧是身体发炎的一种表现，如阑尾炎、盲肠炎、大肠炎或风湿性关节炎。癌症和白血病会引起持续低烧。


    #### （1）症状

    要饮用充足的液体，像果汁和矿物质水，以弥补水分的流失。做一些草药性的茶，如洋甘菊、桉树、迷迭香和百里香，添加蜂蜜，水温适当时饮用（在 600mL 的开水中添加
    15mL 的蜂蜜，7 分钟后饮用）。


    #### （2）饮食调理

    配制些按摩油有助于缓解发烧，可用它按摩太阳穴、脖颈后部、手指和脚趾。可以参照下面所列配制按摩油：15mL 月见草油、2 滴尤加利精油、2 滴薰衣草精油、2
    滴椒样薄荷精油、1 滴黑胡椒精油、1 滴茶树精油、1 滴迷迭香精油。


    ### 2. 干草热

    干草热是一种过敏症。这种过敏性反应容易自发，能影响到身体的任何部位。最常见的过敏症是哮喘、干草热、皮肤问题和皮疹，如麻疹和湿疹。食物过敏症一般是不容易察觉的，不过，腹胀、消化不良和腹泻可能就是食物过敏的症状。事实上，过敏症是免疫系统对环境中无害物质的一种过度的反应。这些物质包括灰尘、花粉、动物的皮毛、牛奶、鸡蛋、小麦、玉米、青霉素、阿司匹林、化妆品、洗洁净和服装上的珠宝金属。可以饮用由松针、尤加利叶片或玫瑰果的煎剂。也可以在水中煮一些尤加利叶片，在你睡觉前，把这种液体喷洒在整个房间里，尤其是卧室，或用尤加利精油喷洒在房间里。在手帕上滴几滴尤加利、绿花白千层或茶树精油，当病情发作时使用。


    ## （九）植物精油与骨关节系统

    ### 1. 脚踝肿胀

    脚踝肿胀的原因很多，包括关节炎、风湿病、静脉曲张、高血压。把脚放在高处休息，是最有效的治疗方法之一。多喝水，用下面配方的按摩油，按摩脚到膝盖间的部位：15
    滴茴香精油、15 滴丝柏精油稀释在 30mL 的月见草油中。


    ### 2. 腰痛

    腰痛是腰部脊骨地方的严重疼痛，在背部稍低的位置。它是使用不正确的姿势搬举重东西引起的，或是一个不正确的姿势扭伤了脊骨。卧床休息，热敷和按摩是缓解疼痛和压力的有效方法。躺在有软垫的床上休息几天，窝着膝盖，可以让腰部得到更好的休息。在盆浴时，添加
    3 滴迷迭香精油或牛至属植物精油或百里香精油，可以放松地长时间浸泡在里面。也可以用按摩油在做腰部靠下的地方按摩，直到臀部上端，但是要离开肛门的位置，因为按摩油对敏感的黏膜组织可能会有刺激作用。事先把下列油混合在一起：3
    滴迷迭香精油、1 滴尤加利精油、2 滴椒样薄荷精油、2 滴洋甘菊精油、1 滴小豆蔻精油、10mL 月见草油。


    ## 植物精油与香草植物

    Essential oils health

    大家知道，植物精油来自香草植物，是香草植物的提取物。那么，香草植物为何物？下面将简略介绍一下有关香草的基本知识，以使人们更深入地了解植物精油的神秘和神奇。除了传统的适宜在庭院中铺陈的草皮，香草植物成为最近庭院和阳台栽种的新宠。它散发的香味具有抗氧化性及抗菌性，是清新气味和净化空气的绿色产品，如迷迭香、百里香、夜来香、薰衣草、薄荷，这些香味植物从幼苗到干株枯叶都有浓郁的香气，晚上更是香味四溢，特别适合营造庭院花香醉人的氛围。


    家庭栽培芳香植物景观（二）

    栽培香草植物其实并不难，只需把握好影响生长的几个关键因素即可种植出理想的香草。


    ### （一）适宜家庭栽培的香草种类

    #### 1. 香草贵族——迷迭香

    ##### （1）栽培方法

    通风、日照良好、排水顺畅的环境是首要条件。若由种子开始栽培，发芽期约需 20 天，且第 1 年成长缓慢。一般采用扦插法，选择春、秋两季，剪下茎部顶端或新出的茎秆，5～10cm，浸泡水中
    10～30 分钟后，斜插在带有沙质土的培养土中，充分补充水分，约 20 天左右即会发根，待植株强壮后，可再移盆或定植。半匍匐型及匍匐型迷迭香亦可用压条方式繁殖。


    ##### （2）采收保存

    迷迭香叶片可随时采收，也可以将整株茎、叶摘下，置放于阴暗处干燥后收集叶片放入密闭容器保存。采收植株时，最好不要剪到木质化部分，以免植株不易发新芽。


    ##### （3）广泛应用

    1) 料理：可结合其他香草串成香草束，增加食物风味，鱼、肉类料理及糕点皆可，花可点缀餐点盘饰。

    2) 健康：促进消化，增加记忆，杀菌驱虫。

    - 3) 美容：制成各式沐浴用品，化妆水可直接加热蒸脸，增加皮肤活化。

    4) 茶饮：可搭配月桂、玫瑰等香草植物泡茶饮用。

    5) 精油：有杀菌作用，并能促进血液循环。

    6) 花艺：是香草花园中夏季不可缺少的主角，可以组合盆栽，也可种在花园边做为围篱。新鲜茎叶也可做成花环、插花。


    #### **2. 香草公主——百里香**

    - （1）栽培方法

    性喜酸性土，需阳光充足、排水良好。种子细小，可用撒播或条播等方式繁殖，10～15天发芽。选择春、秋两季播种，第一年成长较慢，第二年则成长迅速且开花。也可采用扦插或分株方式繁殖，但其中以压条方式效果最佳，存活率高，建议初学者可使用此法。

    - （2）采收保存

    随时可采摘茎枝，直接使用，或只使用新鲜叶片。茎、叶置于阴凉处自然阴干或整株倒吊风干，置放于罐内标明日期，并及早使用。

    - （3）广泛应用

    1) 料理：叶片可结合各式肉类、鱼贝类料理，搭配牛肉更是美味；饼干糕点等各式食品加工皆可应用。

    2) 健康：促进消化，恢复体力，杀菌、防腐。

    3) 美容：溶入化妆水中可清除疲劳。

    4) 茶饮：生鲜香草或干燥之后皆可单独使用，或是结合其他香草植物共同使用。生鲜柠檬百里香口感独特，建议尝试。

    5) 精油：叶、花、茎可提炼精油，有振奋情绪的效果。

    6) 花艺：可用在干燥花、押花、插花等各项装饰上。

    7) 园艺：车库的地面间植匍匐型百里香，会有意想不到的效果。

    8) 工艺：单独应用或与其他香草搭配装饰品皆可表现其特色。


    #### **3. 香草女王——薰衣草**

    - （1）栽培方法

    不耐高温潮湿，具耐寒性是薰衣草最大特色。羽叶薰衣草具有四季开花、耐寒性弱、插枝存活率高等特色，是最为普遍的品种。种子栽培需要 20～30 天的发芽期，且不易管护，一般选择购买成株的薰衣草，剪下
    5～10 厘米的顶芽，进行插枝，约 25 天内发根，适合于 10 月至隔年 5 月进行。夏日需适度遮阴，降低温度，并进行强剪。

    - （2）采收保存

    除羽叶薰衣草，一般薰衣草在国外开花季节为 6～8 月，以夏季为主。可适时采收，连同花茎采摘，倒吊干燥或收集花朵放入罐中。也可将花、茎、叶一并采收制成精油。


    ##### (3) 广泛应用

    1) 料理：搭配料理较少，以甜薰衣草口感较佳，结合糕点效果较好。

    2) 沐浴：薰衣草系列沐浴用品自古以来即是女性的最爱。

    3) 美容：结合在各式美容保养品中，具收敛效果。

    4) 茶饮：生鲜嫩叶或干燥花朵少量搭配其他香草，可促进睡眠。

    5) 精油：运用熏香灯熏香或加基础油来按摩，有镇静、抗忧郁、消毒和改善失眠等效果。

    6) 花艺：制作成干燥花束、压花作品及生鲜花束，美丽动人。

    7) 园艺：在香草花园中最亮丽的花朵往往非薰衣草莫属。

    8) 工艺：薰衣草蚊帐、香囊和其他工艺品，都可以增添生活情趣。


    #### **4. 香草平民——鼠尾草**

    ##### (1) 栽培方法

    日照充足、排水良好、土质疏松的酸性土壤是鼠尾草栽培的绝佳环境，寒冷多湿及高温多湿会让植株显得衰弱。春、秋播种约 15 天发芽，一般可用扦插、压条等方式繁殖，第
    2 年起会开花。避免潮湿是栽培重点。

    ##### (2) 采收保存

    叶片可随时采摘，但需避免裁剪到木质化的部位。叶片干燥后置于密封罐内，可随时运用，或直接加入酒、醋、油中，也可制成鼠尾草酱汁，以增加保存的期限。

    ##### (3) 广泛应用

    1) 料理：具防腐及杀菌的功能，结合鱼类及各式肉类料理最为速配，加入糕点风味独特。

    2) 健康：杀菌、促消化，可改善生理不顺，具清血功能。

    3) 美容：鼠尾草叶片蒸脸或制成化妆水，有收敛作用。

    4) 茶饮：国外经常加入茶饮，国人一般反应平淡，可混合其他香草增加口感。

    5) 精油：精油有通经作用，妊娠妇女不宜大量使用。

    6) 花艺：紫色及红色等色彩的花朵艳丽大方，是生鲜花材的最佳选择。

    7) 园艺：与薰衣草同时栽种，不仅增添色彩，更是厨房花园中不可或缺的主角。

    8) 工艺：百草香干花、染色等工艺运用在欧美国家极为普遍。


