    # ## （二）洗浴


    # ### 1.盆浴


    我们每天都需要盆浴，盆浴可以让我们身上散发甜香的味道，使我们更加自信地融入社会中。然而，真正的盆浴并不是简单地每天对身体的清洁，盆浴，是一种有较高标准的真正意义的洗澡，比仅仅的清洁有更多的作用，它可以使你在一天中有一个美好的开端，可以增加克服所有困难的信心，或者可以治愈脆弱的自我，在这一天里你都会坚强，可以为你和你的爱人，营造一个美好、安静、亲密的晚间时段，或者简单地有个轻松的好睡眠。所以你需要的是这种类型的盆浴。


    如果你有一些明亮的和喜光的植物或者是新鲜的切花（即使只有一朵也可以），在洗澡的时候，放在浴室，这对你也是一种激励。当洗澡水已经放好，往里加6~7滴精油，或是几种精油的混合物（如椒样薄荷、酸柠檬叶、迷迭香、茴香、鼠尾草、黑胡椒、茉莉），洗澡水应调到35~38℃，还要加些泡沫，要求精油与水完全混合，而不是漂浮在泡沫中，因为那样会刺激你的皮肤。当你全身浸泡在水中时，会有一种被抚摸的感觉。避免有刺眼的照明，几支蜡烛散发的柔和灯光，也会让这个世界看起来更美好一些。如果同时播放你所喜爱的歌曲，你会感到极大的愉悦，但不要听感伤或悲伤的歌曲，因为你需要把自己的注意力全放在享受洗浴中。


    # ### 2.淋浴


    因节省时间的缘故，许多人都喜欢淋浴。冲个凉水澡作为一天的开始，是现代人优越生活的好方法之一，但在日本澡堂，人们把淋浴当作尽情放松前的清洗环节。晚上，水温高些、时间长些的淋浴是把一天的疲劳冲洗干净的好方法。虽然洗淋浴是为了干净，但我'
  merge: -1
  pgno: 169
- img_proc: true
  md: '们也应在这种快速清洗的过程中增添一些乐趣。在你的日常清洗结束后，在毛巾或海绵上滴 2～3 滴你喜欢的精油，快速擦洗整个身体，使其吸入芳香的气味。


    香气疗法也会对你身体的许多部位产生影响，在这种治疗中，会刺激到嗅觉细胞，淋巴循环系统也会得到加强。因此，我们建议你使用你喜欢的精油，因为当体会到享乐的感觉时，你的身体才会有积极的反应。因为这样使用精油，与皮肤接触时间不长，不会通过皮肤产生什么功效，你选择精油的时候，单纯考虑你喜欢的气味就可以了。


    # ### 3. 桑拿浴


    # #### （1）什么是桑拿浴


    桑拿浴是在干热的环境使身体大量排汗的一种洗浴方法，形成一种整体的保健疗法，是当今世界使用最广的水疗法。多数健身俱乐部和体育馆都设有桑拿浴设施。土耳其浴与桑拿浴主要的不同在于，土耳其浴用热湿的水蒸气，而桑拿浴提供的是干热的环境。


    桑拿浴里面的热度一般维持恒定，湿度保持在 15%～30%。芬兰人一般把桑拿浴的湿度调节在 40%。值得注意的是，就像开始谈到的一样，有些人认为在利用水疗时，他们更愿意使用土耳其浴或水蒸气浴，而不是桑拿浴，因为他们认为桑拿浴可能太干燥，会引起皮肤的衰老，尤其是当桑拿浴的设施没有严格按标准配备时。


    # #### （2）桑拿浴的适用精油


    了解到这些，在我们谈论桑拿浴对保健的益处时，我们愿意给你的桑拿浴推荐一些精油。多数人会把尤加利的气味与桑拿浴联系在一起，但在芬兰，桑拿浴的起源地，白桦精油的气味会与桑拿浴联系在一起，因为桦树木料在传统上被用来在桑拿浴中点火。做桑拿浴的主要目的应该有助于身体排泄废弃物，你选择使用精油能加强这个用途。下面的精油可以在自己单独做桑拿浴中使用，最受欢迎的精油包括尤加利、松树和欧薄荷等精油，不过茶树、柠檬、薰衣草、绿花白千层、快乐鼠尾草、丝柏、白桦、迷迭香、酸柠檬、葡萄柚和佛手柑等精油的使用效果也很好。


    如果你想调配一种复方油，可以参照下列配方。


    配方一：檀香 10 滴、柠檬 5 滴、安息香 1 滴、天竺葵 2 滴。


    配方二：松树 3 滴、迷迭香 3 滴、绿花白千层 2 滴、佛手柑 2 滴、葡萄柚 8 滴。


    # #### （3）怎样在桑拿浴中使用精油


    纯的没有稀释的精油绝对不能放在桑拿浴中用于加热的岩石上面，要稀释后才能使用，可以用 4 滴纯精油添加在 1L 水中使用，把芳香的水浇在桑拿浴中用于加热的岩石上面。


    # #### （4）桑拿浴的好处


    虽然“排汗疗法”或是“排汗浴”已是许多民间医学疗法的一部分，但一般人们都认为桑拿浴起源于芬兰。'
