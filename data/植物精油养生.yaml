    它含有肉豆蔻酸，有消炎的作用。因为它的成份与皮肤油脂的成份相类似，可以被迅速地吸收，极其适合干燥、老化以及有炎症的皮肤使用。多数情况下，它可以放心地用在有痤疮的皮肤上，因为，它有助于控制痤疮；它也是一种抗氧化剂，所以不会轻易变质，也可以防止其他油脂变质。它可以单独做按摩油的成份，也可以与其他基础油混合使用。

    看它的化学成份就很好理解，为什么荷荷芭油一直是人们喜爱的基础油。它常被加入到皮肤护理产品中，因为它很容易渗透到皮肤里层，适合所有类型的肤质。


