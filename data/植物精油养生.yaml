  md: '# # 2. 眩晕


    当大脑失去氧气，即使很短的时间，都会造成眩晕，或暂时失去知觉。这是具有危险征兆的警告信号，还包括视觉模糊、头昏眼花、注意力减弱、出汗或反胃恶心。


    眩晕的病因包括血糖低、循环失调、体力不支、站立时间太长、热、脱水、压力大、中暑、糖尿病、心脏不适、击打、体内出血、惊吓、焦虑、由于受伤和贫血引起的剧痛。


    使患者平躺，解开所有过紧处的衣服，把脚抬高，超过头顶。使用薰衣草、迷迭香或欧薄荷精油，涂抹在病人的鼻子下面，吸入。当病人恢复知觉以后，喝一杯热水，里面加半滴柠檬精油和1茶匙蜂蜜。


    # # 3. 静脉曲张


    静脉曲张可能发生在身体的各种部位，但是主要在腿部。如果血流不通，血就会滞留在静脉处，这个部位就会肿胀和扭曲，形状类似于绳索，这样是很不舒服和疼痛的。


    为了缓解症状，每天用下列配方的按摩油，轻轻地按摩腿部，从脚按摩到心脏的位置。


    20mL甜杏仁油、2滴小麦胚芽油、4滴薰衣草精油、4滴丝柏精油。


    # # 4. 心悸


    这是一个常用术语，用来描述心脏无规律跳动时的感觉，也有心脏间歇跳动或加快跳动的现象。在更年期或运动后，这是一种常见的现象；但是，它也可能是心脏失调潜在的症状。


    不要喝茶、咖啡、可乐饮料以及带酒精的饮料也不要吃巧克力。


    当发病时，把手和胳膊肘以下的部位放入冷水中，至少10秒钟，有利于缓和病情；同时，你可以往手掌上滴2滴纯薰衣草精油，双手边撮边吸气。


    服用一些有镇静作用的汤药，如洋甘菊、柑橘叶、酸柠檬、罗勒和蜜蜂花植物。


    # # 5. 休克


    休克是一种与生命危险的紧急症状，因为血压低的缘故，到达重要器官的血液含氧量都不充足。当血压降低的时候，作为一种补偿机制，血液会从皮肤和肌肉通过不同的路线输送给更重要的器官，如心脏、肺部和大脑。这就是为什么皮肤会变得苍白、发凉和出冷汗，人也感到虚弱的原因。


    虽然虚弱，但是由于心脏和肺部还要维持功能，这样脉搏跳动就会加快，呼吸速率也会加快，此时的人会感到呼吸急促，或许会表现得极端焦虑和不安宁。这种状况如果拖延下去，能导致重要的器官受伤，也可能死亡。'
  merge: -1
  pgno: 223
- img_proc: true
  md: '休克的病人要平躺着，用毯子或外套保暖，然后进行治疗或等待医生。不过，在晚上的时候，你也可以用些按摩油，按摩整个身体，对休克是有帮助的。参考配方如下：3滴柠檬精油、2滴天竺葵精油、2滴薰衣草精油、1滴德国甘菊精油、1滴酸柠檬叶精油，与20mL基础油混合。


    # ### 6. 循环问题


    不良循环的症状包括疲劳、头昏眼花、难以集中注意力、容易昏晕、手脚发凉、头疼、眩晕、身体麻痹、动脉硬化、咽喉疼痛、高血压、糖尿病、皮肤不健康。这些都是不良循环问题的信号。


    循环系统的健康主要依赖心脏和血管的健康。有些精油能够促进血液循环，按摩患处，能够改善不良循环。


    使用如下配方制成按摩油：2滴丝柏精油、2滴橙花精油、2滴柠檬精油、2滴天竺葵精油，加入15mL的基础油中。


    避免喝茶和咖啡，可以服用欧芹和鼠尾草煎的汤药。


    # ### （四）植物精油与神经系统


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_224_0.png)


    神经系统是身体的联络网，能察觉体内、体外环境的变化，并将信息加以整合，然后协调肌肉的收缩及腺体的分泌。整个神经系统的控制中枢控制我们的身体功能，如消化、呼吸，也控制意识功能如心智、思考、情绪等。


    远古时代，人们用香草植物驱除造成人体精神失调的恶灵，药草学家也经常用香草植物来治疗神经系统的一些症状，如头痛、眩晕、疲倦等。近代，大量科学研究表明：植物精油对神经系统有着积极的疗效，它安全、天然的特性对人体无任何副作用。植物精油的药理作用在于，透过皮肤吸收，引起反应，主要是通过镇定或安抚神经系统，达到止痛、扩张血管、镇痉挛的效果。对于神经系统症状的治疗，可通过按摩、泡澡等方式来进行。


    神经系统


    # ### 1. 成瘾


    成瘾是一种身体或心理对习惯性物质或化学成份的渴望或需要。多数麻醉品，甚至一些任务，都能成瘾，如训练、工作、吃东西或饮料。成瘾也跟营养匮乏有关，身体依赖型'
  merge: -1
  pgno: 224
- img_proc: true
  md: '**2. 神经痛**


    神经痛，是当神经受到刺激或压迫时，产生的一种痛苦的感觉。病因可以因带状疱疹感染引起，也可以是由骨折产生的碎片压迫神经引起的。


    单纯的感冒也可以引起面部的神经痛，甚至头疼、牙疼或窦炎。如果某根神经或某类神经易受攻击，那么一有感冒就会引起那个部位的发病。


    一种按摩油有助于缓解神经痛，可以在患处用此油按摩。推荐的复方油配方：10mL葡萄籽油、3滴洋甘菊精油、3滴黑胡椒精油、1滴丁香精油、3滴薰衣草精油。


    **3. 失眠**


    失眠是指人不能入睡。它一般是由精神压力过大或焦虑造成的，也有身体本身的原因，如经期前紧张或是正处于更年期。常见的这些失眠原因可以容易被治愈。缺乏锻炼和过量饮酒或吸烟都是导致失眠的因素。


    薰衣草是一种温和的精油，可以帮助放松和入眠，也被推荐用于缓解精神和身体的疲劳。


    在你睡觉的床边放一些干的薰衣草，或是在你睡觉前半时洗盆浴的时候，往浴盆中添加几滴薰衣草或橙花精油。


    用复方精油做放松式的按摩，对于治疗失眠也是有好处，精油可以选择薰衣草、鼠尾草、苦橙叶、檀香或依兰。


    **4. 时差反应**


    长途飞行以后会有时差反应，它的症状包括疲劳、睡眠混乱、反胃恶心和四肢疼痛或肿胀，尤其是脚。跨越几个时间区域后，你身体内大约50种生理和心理的规律被明显地打破了。在密封的加压飞机内一次呆数个小时，以及飞行的高度都会造成一些问题。在飞行中，要穿舒适、宽松的衣服，尽量抬高双脚，防止脚踝骨肿胀，经常在走廊行走，防止循环不畅。


    在飞行途中，你可以用按摩油按摩你的脚，并做些锻炼。按摩油的配制方法：在少量的基础油中添加1滴罗勒、天竺葵或葡萄柚精油。


    到达目的地后，你想提神，可以在手掌上滴10滴薰衣草精油，擦在躯干上，马上淋浴。


    当你经过飞行后，泡一个热水澡，添加下列的精油，有助于使你的身体和大脑恢复过'
