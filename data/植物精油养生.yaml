  md: '花水是经常用于调理和滋养皮肤的一种成份，还可以用它制作一种快速提神的酒，只要简单地把它喷洒在皮肤或空气中，就能发挥作用。


    # (3) 常用花水种类及功效


    德国甘菊花水有镇静、抚慰和放松，以及抗感染的功效；

    天竺葵花水能平衡和振奋情绪；

    薰衣草花水有镇静和治疗皮肤的功效；

    橙花花水能提升精力，适用于所有皮肤类型的，有保湿作用；

    迷迭香花水能激励和提升精力；

    玫瑰花水适用于所有皮肤类型，有抚慰作用；

    檀香花水适用于所有皮肤类型，有抚慰和协调作用；

    金缕梅花水有提神和收敛的功效，适用于所有类型的皮肤。

    其中，玫瑰水和金缕梅水是最知名的花水。


    # 7. 外敷


    外敷是一种基本的治疗方式，把小块材料、绷带或是小毛巾折叠起来浸湿后放在衬垫里面，放在需要治疗的地方。有两种外敷方式可以使用，一种是冷敷，一种是热敷。外敷的放置位置是有要求的。外敷可以用来治疗肌肉疼痛、扭伤、促进循环和缓解疼痛，还可以消除内部器官的充血，促进淋巴循环。


    # (1) 热敷


    做热敷时，取一盆热水，水温以你感觉舒服为宜，往盆里添加4滴你选择好的精油。然后，把你折叠好的材料、绷带或小毛巾放在上部的水面中，吸足水分，拧干多余水分，置于需要治疗的地方。用有点弹性的围巾、塑料袋或再用一块毛巾盖在热敷的地方，使热敷材料可以维持原状。如果热敷时不好固定热敷材料，你也可以用绷带轻轻地绑在热敷的地方，当热敷材料冷却到身体温度时，可以换取另一块热敷材料。热敷用于治疗习惯性扭伤、肌肉疼、风湿病、月经痛、疖子和牙疼。


    # (2) 冷敷


    冷敷与热敷的操作过程是一样的，就是用冰或冷冻水代替热水，也是当冷敷材料接近身体温度时换新的冷敷材料。冷敷用于治疗近期扭伤、瘀伤、肿胀和发炎、发烧和头疼。当感到疲倦的时候，也可以用冷敷振奋精神。'
