    # ### （8）适合与尤加利精油混用的精油

    安息香、百里香、薰衣草、柠檬香茅和松树精油。


    # ## 5.月桂精油

    西印度月桂精油是从月桂树（Laurus nobilis）提取出来的，属于樟科月桂属植物，又称为甜月桂、月桂和地中海月桂。

    这种温和的精油经常在芳香疗法中应用，它对呼吸系统有良好的杀菌作用，能够恢复消化系统的功能，缓解胃疼痛和肠胃气胀；同时，能提高自信心，提升勇气和洞察力。不过，它最常用于减少头发脱落，促进头皮健康。（1）精油性质

    月桂精油的味道是甜的、清新的、略带辛味的，油色深黄，具有中等水黏性。

    （2）来源

    这种强健的常绿月桂树是西印度、委内瑞拉和圭亚那地区的乡土树种。如今，精油的提取大部分是在墨西哥、西班牙和克罗尼西亚进行。月桂树可以长到30m高，叶片长矛形，有香味，花白黄色，具黑色浆果。月桂油在罗马很盛行，被认为是智慧、和平和安全的象征。拉丁文Laudis是称赞的意思，这就是为什么奥运会的胜利者会获赠月桂花冠的


