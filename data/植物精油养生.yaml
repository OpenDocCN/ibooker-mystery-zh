    **2) 它能够使人在面临逆境时增加勇气和力量。它对皮肤有清洁和协调的作用，有助于治疗瘀伤，清洁过于油腻的皮肤，消除过于老化皮肤的皱纹（可能是由于这种精油具有雌性激素的功效）。**


    3）它对于脾脏和肝脏有调和的作用，可以缓解过量饮酒和暴食给身体带来的压力。对于哺乳期的母亲，可以促进奶水的分泌，使用新鲜植物提取的精油促进乳汁的分泌效果会更好些，因为这种精油含有高浓度的茴香脑成份。


    (6) 使用注意事项


    **甜茴香精油的功效强劲，不能大剂量使用，因为它有麻醉的作用。孕期和患有癫痫症的患者要避免使用。因为它含有大量的茴香脑成份，会引起癌症患者的雌激素分泌紊乱。


    哺乳期妇女、孕妇和子宫内膜异位患者人都应该避免使用它。**


    苦茴香精油不能在芳香疗法中使用，也不能在皮肤上使用。


    **(7) 用法**


    茴香精油最强的功效在于能调理消化系统的功能，帮助减肥，护理肌肤。


    **1) 香炉和蒸发器熏香**


    在蒸汽疗法中，茴香精油是治疗厌食症的开胃刺激品，还可以在逆境中增加勇气和力量。


    **2) 做复方按摩油或盆浴稀释成份**


    茴香精油可以当作复方按摩油或稀释在盆浴中使用，有助于缓和发胀的胃部，消除胃部的胀气、疝气、便秘和其他消化系统疾病。它也可以作为一种利尿剂，去除体内多余水分，促进脂肪团的分解。


    **3) 做面霜和润肤乳的添加成份**


    在底料面霜和润肤乳中使用时，茴香精油可以用做皮肤的常规护理，尤其有益于消散瘀伤，使灰暗的肤色恢复活力，清洁油性皮肤，消除老年性皱纹。它对于去除脂肪团、缓解关节疼痛以及消除水肿都有帮助。


    **(8) 适合与茴香精油混用的精油**


    天竺葵、薰衣草、玫瑰和雪松精油。


    **2. 洋茴香精油**


    洋茴香精油是从大茴香的种子中提取出来的，洋茴香（Pimpinella anisum L.）又名大茴香、茴芹，属于伞形科茴芹属。它的气味辛辣，类似甘草根，又像孜然甜芹。它不同于八角茴芹，八角茴芹的果实呈星状，属于八角科。


    在芳香疗法中，这种温和的带有辛辣味的精油，经常被用来治疗性格内向并且多忧虑人群的失调症；同时，也能帮助消化，改善肺功能，治疗偏头痛和头痛。'
  - '[PAGE 100]


    ### （1）精油性质

    这种精油具有中等的黏性，在低温下呈固体状态，使用前需要用手捂化。


    ### （2）来源

    洋茴香起源于中东，目前在欧洲、美国和北非有栽培。它是一年生植物，大约80cm高，锯齿叶片成圆扇状，微小的白色伞形花，浅灰褐色种子。主要产地为土耳其和西班牙。洋茴香在埃及种植至少有4000年了，法老的临床试验指出：其种子可用作利尿剂，治疗消化不良和缓解牙痛。


    洋茴香可以制作利口酒、兴奋剂、牙膏和漱口水。在印度，被用做口腔清新剂；在土耳其，人们用它的种子制作一种广受欢迎的酒精饮料。在古代，洋茴香精油受到很高的评价，尤其是罗马人、埃及人和希腊人。罗马人用它做香味蛋糕，埃及人在做面包时会用到它，而希腊人用它治疗消化道感染。


    ### （3）提取方法

    这种精油用蒸汽蒸馏法从干燥的成熟果实和种子中提取。


    ### （4）化学成份

    70%～90%茴香脑、α-松萜或蒎烯、茨烯、β-松萜或蒎烯、芳樟醇或沉香醇或芳樟醇、黄樟油精、茴香醛和乙酰茴香醚。


    ### （5）治疗功效

    洋茴香精油有助于治疗肌肉疼痛、风湿病、支气管炎、咳嗽、疝气（绞痛，疝痛）、肠胃气胀、消化不良、黏膜炎和醉酒。


    洋茴香精油不仅对消化系统有效，它还是循环系统和呼吸系统的常用滋补品。它能有助于缓解焦虑和神经紧张，也能缓解肌肉疼痛和偏头痛引起的呕吐，可以刺激肺部排出黏痰。


    ### （6）使用注意事项

    洋茴香精油功效强劲，所含茴香脑成份会使一些人产生皮炎，皮肤有问题时要避免使用。大剂量使用时会降低循环速率，导致大脑充血。在妇女怀孕期间避免使用。


    ### （7）用法

    1）香炉和蒸汽熏蒸

    在蒸汽疗法中，大茴香精油对哮喘、感冒和其他呼吸问题都有帮助，也能平缓反胃和呕吐。


    2）手帕滴油


