    # # 六、植物精油安全性

    Essential oils health


    # ## （一）植物精油与皮肤问题


    # ### 1. 光敏感性（光线损害）


    当使用某种精油时，它所含的某种物质会导致光敏感性（光线损害）或其他方式反应，如光敏性作用。


    # #### （1）皮肤发生光敏性的反应


    某种精油会加剧皮肤对阳光的光敏性反应（实际上是对紫外线的反应）。皮肤上会发生皮疹、斑点和瘙痒的现象，有时候还会发热。


    # #### （2）皮肤发生光敏性的原因


    一般的过敏性反应过程中包括免疫系统内部发生的一种交互作用，这种反应是无害的抗原（外施精油）诱导相应的抗体产生的过程。但也有一些研究表明，皮肤的感光性反应是免疫系统相应的反应，不带有抗原抗体产生的过程。


    虽然我们还不清楚能导致皮肤感光性反应的全部物质有哪些，但据我们所知，肉桂和桂皮精油所含的苯乙烯醛会引起这种反应。另外，精油含有的香柑内脂也是引起光敏性的成份。如果精油中含香柑内脂的成份很少，一般在低于0.000075%的时候，这种油的光敏性反应就不明显，如甜柑橘油，它仅含有0.00005%。


    # #### （3）能导致光敏性反应的精油


    能引起光敏性反应的精油主要来自柑橘属，这是由于这类精油提取的方法是压榨，而不是蒸汽蒸馏。然而，也有一些精油，如柠檬，即使是采用蒸汽蒸馏法提取的，也有光敏性。已知的含有能导致光敏性反应成份的植物有：圆当归、香柠檬、苦橙（冷榨）、孜然芹、莳萝、葡萄柚（冷榨）、柠檬（冷榨和蒸馏）、柠檬马鞭草、酸柠檬（冷榨和蒸馏）、柑橘、中国柑橘、万寿菊、橘子（冷榨）、茴香（苦）、土木香、肉桂皮、肉桂。


    # #### （4）避免皮肤发生光敏性的方法


    此类精油本身不会使皮肤发生过敏性反应，但是当应用于皮肤，皮肤暴露在紫外线下'
  - '[PAGE 160]


    **植物精油安全性**


    时，光敏性反应就会发生。如果有光敏性反应的精油被用在芳香疗法的按摩油中，当按摩后要至少 12 小时避免阳光照射。有些精油没有稀释前具有很强的光敏性，如香柠檬、酸柠檬和苦柑橘精油，但如果以稀释到很低的浓度使用，可以在很大程度上减轻光敏性反应。


    **2.皮肤敏感性**


    （1）皮肤易发生敏感性反应的人群


    有些人会哮喘、食物过敏或对其他东西有过敏反应，对这些具有先天性敏感反应的人群来说，他们的皮肤一般也是倾向于会有过敏性反应。


    （2）使皮肤发生过敏性反应的其他情况


    从许多案例中发现，多数人对天然精油的复制合成精油有过敏反应。对精油某种特别的成份有敏感反应的情况也会发生。同一种精油，如果过期贮存或者长期暴露，对于某些人也会产生敏感反应。因此，我们建议不要使用过期的精油，也不要长期使用相同的精油，要换用不同的精油。


    某些精油本身就比其他精油更容易引起皮肤的敏感性反应。


    （3）敏感皮肤


    皮肤有敏感性反应时，应小心使用的精油有：罗勒、甘草、安息香、黑胡椒、桂皮、肉桂、香茅、丁香、茴香、姜、柠檬、柠檬草、柠檬马鞭草、蜜蜂花、柑橘、牛至、欧薄荷、西班牙甘椒浆果、松树、万寿菊、百里香（红色野生）、鹿蹄草。


    **(二)植物精油与不同人群**


    **1.老年人与精油**


    应用芳香疗法中的精油，对于老年人的身体健康非常有帮助。但要牢记几点注意事项，特别是给老年人调配复方精油时。因为老年人要比其他类型的人脆弱，所以在基础油中精油的稀释浓度要低。由于老年人更容易出现健康方面的问题，所以必须确认每种精油各方面的情况，以确保不会产生任何副作用。


    卧床不起的人群也可以从温和的芳香按摩油中获益，但应选择一种能帮助减缓不适和对循环系统有益的精油。


    **2.女性与精油**


    某些精油具有促进月经提前和调整月经量的能力，这些精油虽然在治疗有关这方面的问题时是有作用的，但在怀孕初期，也要避免使用。这些通经精油用在芳香疗法中时，还'
  - '[PAGE 161]


    可以治疗其他的一些失调症状，如：痛经、白带失常、无月经等。请注意，精油和芳香疗法是不能够代替药物治疗的，有任何医学方面的问题都必须先到正规医院进行咨询。


    下面所列精油被划归为通经精油：圆当归、洋甘菊、肉桂、鼠尾草、姜、茉莉、刺柏、没药、椒样薄荷、玫瑰、迷迭香、甜茴香、甜牛至属植物等。


    # ### 3. 儿童与精油


    我们首先必须记住的是，精油是一种功效强大的成份，虽然它们是从各种各样的植物材料中提取的，但它们都具有高浓度的特性，绝不能放在孩子们可以拿到的地方。临床实践证明，精油对大人和孩子的健康一般是有作用的，但需要记住的是，精油决不能口服（薰衣草精油可内服），除非得到了有行医资格大夫的同意，即使吞咽下很小剂量的精油，也会造成严重的后果。


    (1) 儿童使用精油的方法


    在为小孩准备复方油时，要减半使用浓度，如果一般情况下，精油在基础油中稀释浓度为2%，为孩子准备的，就要把精油的稀释浓度降到1%。对孩子使用低浓度复方油的原因是他们的身体比较小，他们的皮肤也更为敏感。对于成年人，在20mL基础油中可以滴10滴精油；而对于孩子，在20mL基础油中仅仅滴5滴。如果采用蒸汽吸入精油法，不能把孩子单独留下或无人看管，吸入法持续时间应控制在1分钟。


    (2) 适合孩子使用的精油


    适合孩子使用的精油（把它们缩写成TCL，以方便记忆）：茶树、薰衣草、罗马洋甘菊等精油。


    上述精油可以用于盆浴、按摩、清新房间和外敷，都是最常用的精油。


    (3) 不适合孩子使用的精油


    不能（或者要十分小心地）给孩子使用的精油有：罗勒、安息香、香柠檬、黑胡椒、桂皮、雪松木、肉桂、香茅、孜然芹、桉树、姜、刺柏、柠檬马鞭草属植物、柠檬香茅、蜜蜂花、肉豆蔻、柑橘、牛至、椒样薄荷、西班牙甘椒浆果、松树、万寿菊、百里香（红色）等。这些精油由于作用太强，或会使敏感性的皮肤产生过敏反应不适合孩子使用。未列出的一些精油也不能完全保证适合孩子使用。


    # ### （三）植物精油与孕妇


    # #### 1. 孕妇与精油


    在孕期做芳香疗法时，对于精油安全性的评价有一些不相同的观点。一种观点认为，'
  - '[PAGE 162]


    **植物精油安全性**


    芳香疗法对孕妇有很大的益处，可以缓解一些不适和疼痛。但孕妇正处于等待婴儿降生的快乐时期，最好还是避免使用一些精油。因为某些精油所含的一些成份具有类似荷尔蒙的结构和作用。虽然还没有最终的证据证明它有雌激素的作用。但在孕期，还要避免使用含茴香脑成份的精油，如茴香和大茴香。


    一些精油被列入堕胎精油行列，主要的原因是因为它们有毒性。这样的精油在任何时候、在任何芳香按摩中都不能使用。有些精油虽然没有毒性，但由于有通经的作用，也就是有帮助改善和调节月经量的效果，这种精油在孕期也是应避免使用的。这些精油包括：苦扁桃仁油、大茴香（八角）、当归、罗勒桦树、黑胡椒、菖蒲、樟脑、桂皮、雪松、甘菊、肉桂、鼠尾草、丁香、土木香、茴香、冷杉、姜、山葵、牛膝草、毛果芸香叶、茉莉、刺柏、柠檬草、牛至、蜜蜂花、芥菜、没药、茄属植物、肉豆蔻、薄荷、松树、玫瑰、迷迭香、芸香、檫木、青蒿、带刺荨麻、艾菊、金钟柏、百里香、鹿蹄草、苦艾。我们不能担保没有列在名单里的精油在孕期使用就是安全的。如果你不能确定某种精油的使用安全性，请与有关的医生联系，听听他们的意见和建议。


    2. 堕胎精油


    虽然没有大量临床医学证据证明某些精油能使人堕胎，但是民间存在许多精油能使人堕胎的事例。在一些事例中，它能诱使婴儿早产，对孕妇也会产生毒害作用。这些精油还有强烈的通经作用，它能调整每月月经循环的周期。然而，能通经的精油不见得具有堕胎的作用，但由于它能调整月经期，所以怀孕期间也不能使用这类精油。堕胎精油包括：艾属植物、欧芹种子、薄荷油、芸香、鼠尾草、檫木、金钟柏、艾菊、苦艾。


    （四）植物精油与患者


    1. 高血压和精油


    患有高血压的人需要定期测量血压，因为高血压会引起多种疾病，如心绞痛、中风、血栓症以及动脉硬化。在芳香疗法中，使用精油做轻微的按摩，对高血压患者有很大的好处，但也有一些精油是不能在按摩中使用的。


    1) 高血压者避免使用的精油：牛膝草、迷迭香、百里香。


    2) 在按摩中对高血压患者有利的精油：快乐鼠尾草、薰衣草、牛至属、蜜蜂花、依兰。'
  - '[PAGE 163]


    # # 2. 糖尿病和精油


    芳香疗法中的按摩方式可以促进循环，对糖尿病人有益。但应避免使用圆当归精油。而应选用桉树、天竺葵和刺柏精油。


    # # 3. 心脏病和精油


    心脏病患者在用精油进行芳香疗法时，最好要避免使用椒样薄荷精油。而心脏外科治疗后，使用温和的橙花精油进行按摩，能够使病人心情平静，而且对心脏有滋补和止痉挛的作用。


    # # 4. 肝脏中毒和精油


    肝脏对人体有着很重要的作用，它能够帮助碳水化合物和脂类的代谢，分泌胆汁并合成蛋白，但很多人认为肝脏只是一个过滤血液中毒素的器官。一些精油可致使肝中毒，但这不是由于在按摩过程中皮肤的吸收，而是指由于吞服精油而导致的，所以口服精油只能在职业医师的指导下进行。


    +   1) 吞服可能导致肝中毒的精油：八角、罗勒、干草、布枯、肉桂、肉桂、丁香、茴香、龙蒿。

    2) 下列精油是禁用的，口服和外用都有毒性：扁桃仁油（苦）、菖蒲、樟脑、山葵、毛果芸香、艾属植物、芥末油、茄属植物、薄荷油（欧洲和北美的）、芸香、檫木、青蒿、刺蓟麻、艾菊、金钟柏、鹿蹄草、土荆芥属植物、苦艾等精油。


    # # 5. 癫痫症和精油


    患有癫痫的人群，在接受芳香理疗师的治疗时，或使用精油时，要格外小心。

    癫痫患者使用精油注意事项：

    1) 不应使用的精油有：迷迭香、茴香、鼠尾草、牛膝草樟脑、长穗薰衣草、艾菊、金钟柏和苦艾。因为这些精油含有神经毒素，会产生惊厥的后果。还有包括含有神经毒素的植物，如肉豆蔻。

    2) 中医中，牛膝草对治疗癫痫症是有作用的，但牛膝草精油却不能使用，因为芳香疗法和中医学的治病原理是有区别的。

    3) 特别注意不要在蒸汽疗法的香炉熏香中使用这些精油，也不要在准备洗浴的材料中使用；在用做其他治疗前，要先向医生进行咨询。

    癫痫症家族史和发烧的人群也应注意。

    有研究表明，一些精油对癫痫患者是有好处的，可以使用于芳香疗法中的按摩方法。

    虽然传统医学从来没有用精油治疗癫痫症的先例，但在英国伯明翰伊丽莎白皇家医院'
- md: '## 6. 癌症和精油


    各种癌症产生的原因是有共同之处的，许多科学家经过不断地研究，鉴别出了各种具有致癌性（对癌细胞生长的刺激作用）的致癌物质。


    ### （1）致癌精油成份


    有一些致癌精油是禁止在芳香疗法中使用的，也禁止口服。如檫木油、黄色和褐色的樟脑油精油（含有黄樟油精）。长期地每天大剂量地使用此类油，会导致癌症。


    ### （2）癌症患者使用方法


    要轻轻地按摩，避免在肌肉上和淋巴腺附近做深层地按摩。


    不要按摩化疗过的地方。


    不要在患有皮肤癌的地方按摩。


    ### （3）癌症患者避免使用的精油


    大茴香、罗勒、甘草、丁香、肉桂、茴香、月桂、肉豆蔻等精油。


    ### （4）患有雌激素型癌症的患者避免使用的精油


    大茴香、香茅、桉树、茴香、马鞭草精油。


    ### （5）患有皮肤癌和（恶性）黑色素瘤患者避免使用的精油


    香柠檬和所有光敏性的精油。


    ## 植物精油毒性与安全


    ### 1. 有毒的精油


    虽然精油对于人们的日常保健很有益处，但是我们仍然要注意它们所含的活性成份。它们中的某些成份是不能在按摩疗法中应用的，也不能口服，因为口服和皮肤接触都会有毒性反应。


    #### （1）扁桃仁（苦的）


    氢氰酸是苦扁桃仁的主要成份，即使很小的剂量的使用都有致命的危险。要从这种精油中提取扁桃仁精华素，需要先用精馏技术结合碱漂洗把氢氰酸去掉。


    #### （2）波耳多树


    它的干燥叶片是一种草药，但它的精油功效强劲，即使很小剂量的使用都会抽搐反应。


    #### （3）菖蒲


    这种植物的根系可以当做草药，治疗神经问题、头疼和眩晕等多种症状，但精油中含有致癌物，口服精油会产生抽搐反应，对肾脏和肝脏也有危害。


    #### （4）樟脑


    虽然樟脑可以用于治疗一些感染的症状和呼吸系统的疾病，但是口服是有毒的。


    #### （5）桂皮


    这种植物可以用于治疗许多消化系统的疾病，不过在皮肤上使用会有光敏性反应，还会刺激到黏膜。


    #### （6）山葵


    使用山葵植物治疗咳嗽会有明显的效果，不过山葵精油含有烯丙基硫氰酸盐或酯（芥菜精油也含有该成份），对皮肤、眼睛、鼻腔和黏膜都有刺激作用。


    #### （7）野艾


    这种植物能治疗许多种疾病，但是它的精油是有毒的，是一种堕胎剂和神经毒素。


    #### （8）芥菜


    芥菜种子和粉末不含有烯丙基硫氰酸盐或酯成份，但是当种子与水接触后就会形成这种物质。这种精油不仅因为含有高浓度的烯丙基硫氰酸盐或酯（92%以上）而具有毒性，同时还是皮肤和黏膜的刺激剂。


    #### （9）薄荷


    这种植物常被用于治疗多种疾病，包括月经不调，还是一种激励物；不过它的精油不仅是有毒的，还是一种堕胎剂，即使少量使用对肝脏和肺部也都会有损伤。


    #### （10）芸香


    芸香可以用来治疗疾病，但其精油是有毒的，会刺激和灼烧皮肤，引起堕胎，对黏膜也有刺激性反应，其精油还是一种神经毒素，能引起光敏性反应。


    #### （11）檫木


    这种植物可以用来治疗风湿病和痛风，但其精油含有高浓度的黄樟油精成份（80%~90%），这种成份是FDA禁止使用的，因为它是一种致癌物，即使小剂量使用也会有致命的危险。


    #### （12）桧


    其精油含有桧烯，是有毒的，对皮肤也有刺激性，也是一种堕胎剂。


    #### （13）艾菊


    艾菊精油含有高浓度的有毒成份，能引起抽搐反应、呕吐、子宫出血，如果影响到呼吸系统和其他器官，还会导致死亡。


    ### 植物精油安全性


    Essential oils health


    #### （14）金钟柏


    使用这种植物的灌剂会引起并发症，其精油更是一种强效的堕胎剂、有毒物和神经毒素。


    #### （15）鹿蹄草


    鹿蹄草精油中的活性成份是甲基水杨酸盐（98%），用它制作的药膏可以治疗风湿病和其他疾病，其精油即使在很小剂量的使用中，对皮肤也可能会产生刺激作用，尤其是对阿司匹林（一种水杨酸盐）过敏的人群。鹿蹄草精油也是一种毒性很强的精油。


    #### （16）土荆芥（驱虫籽）


    驱虫籽是因为它能驱除环状寄生虫和十二指肠虫而得名的，由于它对肝脏、肾脏和心脏都有毒性，还是一种神经毒素，现在已经不再使用了。


    #### （17）苦艾


    苦艾酒饮料含有苦艾成份，经常饮用会产生幻听和幻视，还可能上瘾，并产生许多令人不愉快的副作用。它的活性成份是侧柏酮，这种化合物是一种惊厥剂和神经毒素，它的精油也有堕胎的作用。


    ## 2. IFRA限制使用的精油


    圆当归、香柠檬、苦柑橘、桂皮、枯茗、葡萄柚、柠檬酸、柠檬、万寿菊、橡树苔藓、芸香、马鞭草精油。这些精油不是被禁止使用的，而是要谨慎地使用，因为精油里含有少量可能会引起光敏性反应的活性成份。


    ## 3. IFRA禁止使用的精油


    某些精油由于具有的特殊性质，如毒性、敏感性等原因，被IFRA禁止使用，包括：刺桧、菖蒲、土木香、无花果、山葵、芥菜、秘鲁香液、马鞭草、茶、檫木、苦艾、土荆芥属植物精油。


    ## 4. 精油与集中精力


    当你在开车时、正在操作危险性的机器时，或需要集中精力时，最好避免使用能降低你注意力的精油。这些精油包括：安息香、荷兰石竹（康乃馨）、洋甘菊、天竺葵、风信子、薰衣草、肉豆蔻、牛至属植物、橙花油、肉豆蔻、檀香、甘松、颉草属植物、香根草、依兰等的精油。


    ## 七、植物精油在家庭日常生活中的应用


    ### （一）稀释方法


    #### 1. 在浴盆中添加精油


    因为精油对皮肤和黏膜有刺激，所以在往浴盆添加精油之前，先把精油稀释到合适的基础油（或是一点洗浴液）中。在结束劳累的一天后，添加精油后的盆浴肯定是你清洗放松的最佳选择之一，点燃一支蜡烛，用昏暗的灯光来安抚你紧绷的神经，是一种很好的放松方法。


    一般你在每盆浴液中添加7滴左右精油即可，但正如上述，如果你的皮肤有过敏史，或者你使用没有用过的精油，最好是把精油稀释到基础油或是洗浴液中，然后再加入浴盆中。如果你不愿意把精油与基础油混合，你可以与少量的洗浴液混合，然后把混有精油的洗浴液加入到盆浴液中。虽在盆浴中添加精油能散发迷人的香味，但这样做精油会散发得很快，因此，你可以在盆浴结束后再使用精油，可以用手把精油稀释到浴盆中。


    对于4~12岁的小孩和老人来说，每盆中添加4滴精油即可。对于1~4岁的小孩和孕妇来说，每盆中添加2滴精油即可。


    #### 2. 精油在香炉、电灯泡、蒸馏器和扩散器中的使用


    当你在香炉中使用精油时，通常的使用数量是每次6滴，但具体数量还应该依据许多因素来定。如所使用的香炉、蒸馏器或者扩散器的型号，房间的大小，房间居住者的年龄，所用精油的种类，依据这些来帮助你决定应该使用的精油数量。


    陶瓷的和电流的香炉，无论尺寸大小，都是可以使用的，但一定要记住，精油应该是漂浮在水面上的，以防止点燃。在使用瓷制的电灯丝加热的香炉时，你可以不用稀释精油；但当你使用的是金属制的电灯丝加热的香炉时，你可能要让精油浮在水面上以防止燃烧。在这种情况下，你可以首先在金属环状物上添加少量的清水，然后在水的上面滴油。当你使用这些瓷制的或金属制的环状物时，你也需要看看你安置的灯泡的瓦数（强度），因为瓦数大的光要比小的发热量大得多。如果你在一个加热表面上放置一碗水，你可以往水里添加约6滴精油，用量还要依据房间大小和所用精油的种类而定。使用茶蜡在下面做热源的扩散器，一般不太热，在多数情况，精油被安放在水晶饰品上，以协助扩散香气，也可以放在扩散器上面的部分，这样，水就能进入油滴下的地方。蜡烛做热源的扩散器，在使用时一定要注意小心防火，请记住，精油是挥发性的和易燃的。大多数加湿器都有一个适合倒精油的地方，但要注意，不能把精油加到扩散器蓄水池的水中，因为，它会阻碍扩散器的正常工作，也会造成一定的危险。如果你想在喷雾器（医用的）中使用精油，请与制造商联系，征求使用方法，因为某些精油是不能在这些医学的器械中使用的。


    在老年人或小孩房间使用精油时，要减少在香炉、蒸发器、扩散器中使用精油的数量。


    #### 3. 在面霜成洗液中稀释精油


    当你在没有香味的面霜底料上添加精油时，就把精油具有的芳香和治疗功效添加到了面霜中，这样给你提供一种既使用精油，又“没有油”的方法，这是一种特别有效的方法。添加到面霜或洗液中的精油不要超过2%，精油要充分与面霜或洗液混合，所选择的精油要没有过敏反应，配置好的面霜和洗液要放在密封的容器内，于冷凉处保存。


    **表7-1 底料面霜和洗液及精油在不同年龄段中用量**


    | 年龄 | 底料面霜或洗液的用量（g） | 精油的用量（滴） |

    | :--- | :--- | :--- |

    | 65岁以上 | 50 | 10 |

    | 12~65 | 50 | 20 |

    | 4~12 | 50 | 10 |

    | 1~4 | 50 | 4 |

    | 1岁以下 | 50 | 2 |

    | 婴儿 | 50 | 4 |


    #### 4. 在洗发液中添加些精油


    精油放在洗发液中使用时，一定要把精油稀释到合适的浓度，以免对眼睛造成伤害。要小心选择没有刺激的精油或是不会引起过敏的精油，因为洗发液很容易进入人的眼睛。一般情况下迷迭香精油对头发护理效果良好。


