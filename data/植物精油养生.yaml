  md: '**10. 伤口**


    当处理较深的伤口时，要特别地小心，因为伤口很容易发生感染。我们要做的就是不能让伤口总在流血，要设法让氧气进入伤口以消除感染的因素。所有的伤口都应快速得到治疗，否则，容易引起血液中毒现象的发生。


    细菌，如破伤风孢子，可以从脏东西进入伤口引起感染。感染破伤风会有生命的危险，因为会引起多处肌肉疼痛地抽搐，这种症状也可能是全身发作。


    先用清洗液仔细清洗伤口，清洗液的配置方法是，在500mL的水中，添加4滴薰衣草精油、2滴茶树精油和1滴桉树精油。


    柠檬汁可以用做突发性伤口的消毒剂，虽然会有刺痛感觉。当伤口处形成硬壳时，要保持干燥，不要剥掉它。你可以用金盏草精油一天两次地轻轻清洁伤口处。


    **11. 烧伤**


    烧伤有3种严重程度，第一种程度的烧伤，是受伤处变红；第二种，是有水泡；第三种程度的烧伤，是对皮肤和皮下肌肉组织造成了伤害。烧伤的典型症状是脱水，进而在烧伤的地方发生感染。


    电流、化学和辐射烧伤应该当作紧急事件进行处理。造成烧伤的原因可以是，过热、连续的摩擦、化学物质、辐射、电流、火、开水或烧热的油等。


    对于轻微的烧伤，立即在患处涂抹纯薰衣草精油，然后用湿的敷布盖上。


    所有的烧伤，如果不是明显轻微的症状，都需要立即到医院就诊。


    **12. 水泡**


    水泡可以由机械伤、烧伤、烫伤、皮肤发炎或蚊虫叮咬造成。水泡发生时，皮肤下面常有液体积累。当水泡破裂时，暴露出来的组织可能会感染。


    烧伤和烫伤的水泡是不能刺破的。可以在水泡上滴1滴薰衣草精油或茶树精油和1滴洋甘菊精油。然后小心全面地拍打。


    **13. 蚊虫叮咬（蜘蛛、扁虱和跳蚤）**


    蚊虫叮咬是可以预防的。当发生蚊虫叮咬时，你只需要一瓶薰衣草或甘菊精油就能够创造出治疗的奇迹。如果你对精油不过敏，可以直接在患处使用纯精油，能止住刺痛。要留意精油对叮咬处是否有过敏性反应，如果有必要，就到医院治疗。


    可以使用下列精油做驱虫剂：柠檬香茅精油、百里香精油、薰衣草精油、欧薄荷精油、香茅精油（尤其适用于蚊子）。'
