    ### 2. 玫瑰果油


    这是一种新型油，但普及速度很快，因为它具有很好的返老还童的功效，有助于治疗阳光对皮肤造成的伤害。我们已经把这种玫瑰果油列入了精油部分，虽然它更适合做基础油，用于清洁皮肤。

    它含有较多的 GLA 成份，有助于淡化老年的痕迹，尤其对淡化眼袋，以及眼睛和嘴角的皱纹效果明显，还可以抵御阳光和气候对皮肤造成的干燥，能帮助淡化因意外事故和外科手术造成的伤疤。它有助于皮肤的愈合和再生，能预防伤疤组织的增厚，对于烧伤、伤疤和皮肤松弛也有疗效。有一些报道称，它会使痤疮恶化，但是由于它主要用于治疗老年性的皮肤问题，这个问题就没有受到太多的关注。它也是维生素
    C 的好来源。


    这种成份对皮肤胶原质的合成和排序非常重要；缺乏维生素 C 的皮肤不仅会提早衰老，肤质也会变差，皮肤弹性和柔顺度都会降低。


    玫瑰果油不是一种可以挥发的精油，但由于原料短缺，价格非常昂贵，并且稀少。因此，市场上经常会销售掺假的赝品。它的主产地在智利。


    #### （1）做复方按摩油或直接使用

    它对受损伤的和暗淡的皮肤有很强的治愈功能，当你需要让你面部的肌肤滑润有光彩时，把它用作按摩油成份或是作为混合基础油的成份，也可以直接使用，都是很好的选择。


    #### （2）做面霜或润肤乳的成份

    作为面霜或润肤乳，或在皮肤上直接使用玫瑰果油时，它都是已经发现的最具有返老还童和再生功效的成份之一。因此，质量好的一些抗衰老的皮肤护理产品一般都含有玫瑰果油。


