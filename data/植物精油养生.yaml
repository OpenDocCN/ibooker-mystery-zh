    # # 五、常用单方植物基础油


    # ## （一）木本果仁类基础油


    ### 1. 澳大利亚坚果油


    澳大利亚坚果油（Macadamia integrifolia and M. ternifolia）是为数不多的含有大量棕榈烯酸的植物油，人类皮脂中一般也含有这种成份，因此这种油对我们的皮肤有很好的亲和力。它有非常好的软化效果，因此对干燥和老化的皮肤作用很大。皮肤老化后，皮脂的分泌减少，很适合使用澳大利亚坚果油。澳大利亚坚果按摩油有很好的柔软效果，因此适合作按摩底油。在作面部按摩油时，可以淡化皱纹。


