- md: '## 7. 柠檬戟叶马鞭草精油


    柠檬戟叶马鞭草精油是从柠檬马鞭草植物（Lippia citriodora）提取的，属于防臭木科，又称为柠檬过江藤、防臭木。


    这种精油最大的特点是可以驱除压抑，刺激肝脏功能，帮助消化系统和呼吸系统；同时，还可以软化肌肤和防止虚胖。


    ### (1) 精油性质

    柠檬戟叶马鞭草精油有清新、甘甜的柠檬味，颜色淡橄榄色或黄色。


    ### (2) 来源

    它是多年生的落叶灌木，可以长到5m高，茎木质化，叶片小、芳香、形态纤细、淡绿色，开紫色花。原产于智利，是以帕尔玛公主玛利·路易沙的名字命名的。


    一定不要把柠檬戟叶马鞭草精油误认为是“西班牙马鞭草”，有些人也把它称为“马鞭草精油”，不过它属于马鞭草科，是一种草本植物。


    ### (3) 提取方法

    柠檬戟叶马鞭草精油是以新采收的叶片为原料，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    龙脑、香叶醇、芳樟醇、橙花醇、柠檬醛、二戊烯、柠檬油精和月桂（香叶）烯。


    ### (5) 治疗功效


    1. 柠檬戟叶马鞭草精油有助于治疗消化系统方面的腹部绞痛和消化不良，还可以帮助狂欢和宿醉后的肝脏恢复。

    2. 对消化系统的刺激作用，表现在帮助消化脂肪，还能预防脂肪硬化和酒精中毒，它还能抚慰呼吸系统，缓解心悸，它的这种舒缓功能还有助于性方面问题的解决。

    3. 柠檬戟叶马鞭草精油有助于缓解压力，以及清新身体和精神，同时还能振奋精神和缓解压力。


    ### (6) 使用注意事项

    柠檬戟叶马鞭草精油没有太多的安全方面的数据，但是由于柠檬醛的含量较高，可能会引起光敏性反应。


    ### (7) 用法

    这种精油有助于调节神经系统的功能，尤其是有关消化系统疾病方面的神经调节功能；它还是良好的肝脏滋补品，同时还能软化肌肤和帮助缓解僵硬现象。


    1. **香炉和蒸发器熏香**

    在蒸汽疗法中，柠檬戟叶马鞭草精油可以用于治疗神经系统，在情绪低落和感到压抑的时候，有缓解压力的作用。


    2. **做复方按摩油或稀释在浴盆中使用**

    柠檬戟叶马鞭草精油做复方按摩油或稀释在浴盆中使用，可以用于治疗消化问题，促进肝脏功能，治疗失眠和神经衰弱，帮助缓解呼吸系统的问题，如支气管炎和鼻窦炎。它也可以用于调理肌肤。使用时，要留意可能发生的过敏反应。


    3. **做面霜或润肤乳的成份**

    用于面霜或润肤乳时，柠檬戟叶马鞭草精油可以降低皮肤的僵硬度，软化肌肤。但要谨慎使用，它可能会使皮肤具有感光性和产生光敏反应。


    ### (8) 适合与柠檬戟叶马鞭草精油混用的精油

    柠檬、榄香、橙花和棕榈玫瑰精油。


    ## 8. 苦橙叶精油


    苦橙叶精油是从苦橙植物（Citrus aurantium var. amara，Citrus bigardia and petitgrain bigarade）的叶片中提取的，属于芸香科。


    这种味道清新、洁净的精油最有利用价值的地方在于能够激发你的大脑有意识地接受知识，同时，还能平息愤怒和恐慌。它具有很好的放松疗效，可以使快速跳动的心脏平缓下来，有利于入睡。它在护肤方面，可以清洁油腻皮肤和治疗皮肤上的瑕疵。


    ### (1) 精油性质

    苦橙叶精油有股木头气味，同时有花的香味。这种精油的颜色淡黄或琥珀色，水质般的黏性。


    ### (2) 来源

    它是从柑橘树获得的3种精油中的一种，从花里提取的是橙花油，从果实的外壳提取的是苦橙油。苦橙叶精油是从这种树的叶片中提取的，但是曾经也有从绿色的没有成熟的柑橘中提取的，这时的果实仅有樱桃大小。

    它被广泛地应用于药物、香料中，还是有名的科隆香水的原料。


    ### (3) 提取方法

    苦橙叶精油是以新鲜叶片和小嫩枝为原料，采用蒸汽蒸馏法提取的，出油率在0.5%~1%。


    ### (4) 化学成份

    酸香叶茅、芳樟醇、橙花醇、松油精或萜品烯、乙酸香叶酯、乙酸里哪酯、月桂（香）叶）烯。


    ### (5) 治疗功效

    苦橙叶精油可以治疗神经虚弱，缓解因压力过大引起的其他症状，尤其是生气和恐慌。它可以镇静和抚慰情绪，使身体放松，能调匀呼吸，降低过快的心跳速率，缓解肌肉痉挛和胃部疼痛。在病后痊愈阶段使用苦橙叶精油，有助于加快恢复。它对于治疗失眠，清洁油腻皮肤，治疗痤疮和排汗过多都有疗效，还能滋养皮肤。


    ### (6) 使用注意事项

    苦橙叶精油一般是无毒、无刺激性、无过敏性和光敏性的。

    苦橙叶精油的主要治疗功效，包括防腐杀菌、止痉挛、抗抑郁、除臭、镇静和止痛。


    ### (7) 用法

    苦橙叶精油有助于神经系统，可以抚慰疼痛，帮助清洁和滋养皮肤。


    1. **香炉和蒸发器熏香**

    在蒸汽疗法中，苦橙叶精油可以在病后康复期使用，用于调理生气、恐慌、压抑和焦虑的情绪，还可以使身体放松，能够激发大脑有意识地接受知识。


    2. **做复方按摩油或稀释在浴盆中使用**

    苦橙叶精油做复方按摩油或稀释在浴盆中使用，可以在病后康复期使用，用于调理生气、恐慌、压抑、兴奋、紧张和焦虑的情绪以及缓和心跳过快的状况，还可以使身体放松，清洁皮肤上的瑕疵。


    3. **做面霜或洗液的成份**

    用作面霜或洗液的成份时，它对于清洁油腻皮肤很有帮助，还可以缓解皮肤充血的状况，同时能够帮助治疗痤疮、丘疹和其他的皮肤瑕疵。


    ### (8) 适合与酸柠檬叶精油混用的精油

    佛手柑、棕榈玫瑰、天竺葵、花梨木、薰衣草和檀香精油。


    ## 9. 白桦精油


    白桦精油是从白桦树植物（Betula pendula，B. verrucosa）中提取的，属于桦木科。白桦又称欧洲白桦或银色桦树。


    ### (1) 精油性质

    白桦精油有一种香油的气味，颜色淡黄色。


    ### (2) 来源

    作为园林常用树种白桦，起源于北半球，高度可达15～20m。枝条柔软、银灰色树干爆裂成疤状，叶片淡绿色、卵形。以前，把白桦芽用做头发的滋补品。在斯堪的纳维亚半岛（瑞典、挪威、丹麦、冰岛的泛称），把白桦幼树的小叶和嫩梢，绑成一束，在桑拿浴中使用，能调和皮肤颜色，加速循环。春天收集树汁可以当滋补品饮用。


    ### (3) 提取方法

    以白桦树叶芽为原材料，采用蒸汽蒸馏法提取白桦精油。

    未加工的桦树毛油是以树皮为原料，采用缓慢破坏性的蒸馏法提取的；随后，再采用蒸汽蒸馏获得提纯的桦树毛油。


    ### (4) 化学成份

    水杨酸、水杨酸甲基酯、桦木烯和三甲基亚甲基双环十一碳烯醇。


    ### (5) 治疗功效

    止痛、杀菌、收敛、净化、消毒、利尿、退热、杀虫和滋补。


    ### (6) 使用注意事项

    通常白桦精油是没有毒性、没有刺激性、没有光敏性的，但妇女怀孕期禁用，以防发生过敏反应。


    ### (7) 用法

    白桦精油对于灰暗和发炎的皮肤、湿疹、头发养护和牛皮癣是有用的，它还有利于因肌肉中毒素的累积引起的关节炎、风湿病、肌肉疼痛、浮肿和肥胖的恢复。


    1. **蒸汽疗法或在洗浴中使用**

    在蒸汽疗法或在洗浴中使用白桦精油，能够缓解肌肉疼痛、关节炎和风湿病。


    2. **做面霜和药膏成份**

    从桦树提取的未加工桦树毛油，常常在治疗皮肤病的专用药物中用到。


    ### (8) 适合与白桦精油混用的精油

    安息香、茉莉、檀香和迷迭香精油。


    ## 常用单方植精油

    Essential oils health


    ## 10. 波耳多精油


    - 波耳多油是从波耳多树（Peumus boldus、Boldu boldus）提取的，属于伞形科。


    ### （1）精油性质

    波耳多精油效力强劲，即使很少的用量都会引起抽搐。它色泽发黄，气味令人不悦。


    ### （2）来源

    波耳多精油是从波耳多树提取的，这种树野生于南美洲，多见于智利。波耳多精油有毒，对人体有害。在动物试验中，每千克体重含有0.07g的波耳多精油时，身体就会发生抽搐反应。

    草药医学使用干燥的叶片治疗泌尿生殖器官的感染、胆结石、肝脏和胆囊疼痛、膀胱炎和风湿病。


    ### （3）提取方法

    波耳多精油是从叶片提取的。


    ### （4）化学成份

    松萜或蒎烯、茨烯、柠檬油精、松油精、异丙基苯、驱蛔（脑）烯、桉树脑和芳樟醇。


    ### （5）使用注意事项

    波耳多精油有剧毒，不能在芳香疗法中使用。


    ## 11. 布枯精油


    - 布枯是从 Agothosma betulina 提取的。


    ### （1）精油性质

    布枯精油有股强烈的黑醋栗味，经常做酊剂、榨汁物和树脂使用，多数情况下用于医药。布枯精油不能在芳香疗法中使用。


    ### （2）来源

    它原产于南非，这种像石楠的常绿植物属于芳香型的灌木，叶片发皱、稀疏，长约1cm。它具有丰富的油腺，释放出强烈的、黑醋栗似的香味。春天，柔弱的茎上开着5瓣白花，花粉囊紫色。据说，布枯含有一种物质，可以阻挡紫外线。


    ### （3）化学成份

    蒲勒酮、薄荷酮。


    - 布枯精油是从布枯树（Agothosma betulina、Barosma betulina）中提取的，它属于芸香科，又称短叶布枯、南非香叶木。

    “真”布枯植物—Barosma crenulata—它的油富含蒲勒酮，也应小心地使用。


    ### （4）治疗功效

    布枯精油的治疗功效，包括杀菌、祛风、利尿、杀虫和滋补。


    ### （5）提取方法

    布枯精油是以干燥叶片为原料，采用蒸汽蒸馏法提取的。


    ### （6）使用注意事项

    不能在芳香疗法中使用布枯精油。


    ### （7）用法

    - 布枯叶片可以用于驱避昆虫，也是一种防腐剂，还可以作为茶饮。布枯叶片还可以用于治疗泌尿系统感染、消化问题、痛风、风湿病、咳嗽和感冒（当茶饮用，每杯热水中加1茶匙布枯叶片）。

    - 布枯叶片也可以泡在白兰地中制成“药用”白兰地，用于各种轻微疾病。

    - 布枯精油添加在以醋为主做成的洗液里，可以用于治疗瘀伤和扭伤。

    - 布枯精油一般不在芳香疗法中使用，但是，可以当作灌剂（茶饮），有助于治疗感染、消化问题、咳嗽、感冒和风湿病。


    ## 12. 桧（尖）精油

    桧（尖）精油是从刺柏植物（Juniperus sabina）提取的，属于柏科，又称为双子柏。


    ### (1) 精油性质

    这种无色的桧（尖）精油气味令人不愉快，味道苦，让人厌恶。


    ### (2) 来源

    它的树型紧凑，是一种灌木，高约1m，分枝呈水平生长的趋势，树皮淡绿色、叶片小、暗绿色，浆果黑紫色，含有3粒种子。原产于北美洲和欧洲中南部。

    桧树曾是一种药膏的成份，或用作一种敷料用于治疗水疱、梅毒以及其他的皮肤病。局部使用或内服能产生刺激性。桧（尖）精油被认为含有足叶草毒素（鬼臼毒素），不能使用，因为这种成份对细胞有破坏作用。


    ### (3) 提取方法

    桧（尖）精油是以嫩枝和叶片为原料的，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    桧烯、1-蒎烯、柠檬烯、松油烯、杜松烯。


    ### (5) 使用注意事项

    刺柏 Juniperus sabina

    因为有毒的原因，在许多国家这种精油是禁止面向大众销售的。它具有强烈的通经作用，用做堕胎药时，会产生致命的中毒现象。


    ## （五）辛辣味类精油


    ### 1. 茴香精油

    茴香精油是从茴香植物（Foeniculum vulgare var. dulce）提取的。这是一种甜茴香，属于伞形科，又称为罗马茴香。


    在芳香疗法中，在面对逆境的时候可以使用这种精油。它能够提升你的勇气、决心和力量，还能有助于解决消化问题、减肥、洁净油性皮肤和消除皱纹。


    #### （1）精油的性质

    茴香精油有股青草味，稍带辛辣，类似于大茴香的味道。黏质性表现为清澈的水性。


    #### （2）来源

    茴香这个名字来源于拉丁文单词foenum，是“甘草”的意思。它可以长到2m高，是一种二年生或多年生植物，叶片绿色、革质，花朵金黄色，能吸引蜜蜂。在中世纪，它又被称为Fenkle，很受古代中国人、埃及人和罗马人的喜爱。他们认为这种植物可以使人长寿，给人勇气和力量，还可以保守灵魂。另外，还能增强视力，治疗蛇毒、疝气和驱避跳蚤类生物。


    #### （3）提取方法

    甜茴香精油是以压碎的种子为原料，采用蒸汽蒸馏法提取的，产油率为2%~4%。苦茴香油，不能在芳香疗法中使用，是以压碎的种子或全株植物为原料提取的，它的拉丁文是Foeniculum
    vulgare var. amara。


    #### （4）化学成份

    松萜或蒎烯、月桂（香叶）烯、葑酮、茴香脑、甲基胡椒酚、柠檬油精、桉树脑和茴香醛。


    #### （5）治疗功效

    1. 茴香精油是治疗消化系统的良药，包括肠胃气胀、便秘、疝气、恶心晕船、呕吐、厌食消化不良和打嗝；它可以用于治疗肥胖，因为它使人有吃饱感觉；有利尿的效果，可以加速循环。

    2. 它能够使人在面临逆境时增加勇气和力量。它对皮肤有清洁和协调的作用，有助于治疗瘀伤，清洁过于油腻的皮肤，消除过于老化皮肤的皱纹（可能是由于这种精油具有雌性激素的功效）。

    3. 它对于脾脏和肝脏有调和的作用，可以缓解过量饮酒和暴食给身体带来的压力。对于哺乳期的母亲，可以促进奶水的分泌，使用新鲜植物提取的精油促进乳汁的分泌效果会更好些，因为这种精油含有高浓度的茴香脑成份。


    #### （6）使用注意事项

    甜茴香精油的功效强劲，不能大剂量使用，因为它有麻醉的作用。孕期和患有癫痫症的患者要避免使用。因为它含有大量的茴香脑成份，会引起癌症患者的雌激素分泌紊乱。

    哺乳期妇女、孕妇和子宫内膜异位患者人都应该避免使用它。

    苦茴香精油不能在芳香疗法中使用，也不能在皮肤上使用。


    #### （7）用法

    茴香精油最强的功效在于能调理消化系统的功能，帮助减肥，护理肌肤。


    1. **香炉和蒸发器熏香**

    在蒸汽疗法中，茴香精油是治疗厌食症的开胃刺激品，还可以在逆境中增加勇气和力量。


    2. **做复方按摩油或盆浴稀释成份**

    茴香精油可以当作复方按摩油或稀释在盆浴中使用，有助于缓和发胀的胃部，消除胃部的胀气、疝气、便秘和其他消化系统疾病。它也可以作为一种利尿剂，去除体内多余水分，促进脂肪团的分解。


    3. **做面霜和润肤乳的添加成份**

    在底料面霜和润肤乳中使用时，茴香精油可以用做皮肤的常规护理，尤其有益于消散瘀伤，使灰暗的肤色恢复活力，清洁油性皮肤，消除老年性皱纹。它对于去除脂肪团、缓解关节疼痛以及消除水肿都有帮助。


    #### （8）适合与茴香精油混用的精油

    天竺葵、薰衣草、玫瑰和雪松精油。


    ### 2. 洋茴香精油

    洋茴香精油是从大茴香的种子中提取出来的，洋茴香（Pimpinella anisum L.）又名大茴香、茴芹，属于伞形科茴芹属。它的气味辛辣，类似甘草根，又像孜然甜芹。它不同于八角茴芹，八角茴芹的果实呈星状，属于八角科。


    在芳香疗法中，这种温和的带有辛辣味的精油，经常被用来治疗性格内向并且多忧虑人群的失调症；同时，也能帮助消化，改善肺功能，治疗偏头痛和头痛。


    #### （1）精油性质

    这种精油具有中等的黏性，在低温下呈固体状态，使用前需要用手捂化。


    #### （2）来源

    洋茴香起源于中东，目前在欧洲、美国和北非有栽培。它是一年生植物，大约80cm高，锯齿叶片成圆扇状，微小的白色伞形花，浅灰褐色种子。主要产地为土耳其和西班牙。洋茴香在埃及种植至少有4000年了，法老的临床试验指出：其种子可用作利尿剂，治疗消化不良和缓解牙痛。


    洋茴香可以制作利口酒、兴奋剂、牙膏和漱口水。在印度，被用做口腔清新剂；在土耳其，人们用它的种子制作一种广受欢迎的酒精饮料。在古代，洋茴香精油受到很高的评价，尤其是罗马人、埃及人和希腊人。罗马人用它做香味蛋糕，埃及人在做面包时会用到它，而希腊人用它治疗消化道感染。


    #### （3）提取方法

    这种精油用蒸汽蒸馏法从干燥的成熟果实和种子中提取。


    #### （4）化学成份

    70%～90%茴香脑、α-松萜或蒎烯、茨烯、β-松萜或蒎烯、芳樟醇或沉香醇或芳樟醇、黄樟油精、茴香醛和乙酰茴香醚。


    #### （5）治疗功效

    洋茴香精油有助于治疗肌肉疼痛、风湿病、支气管炎、咳嗽、疝气（绞痛，疝痛）、肠胃气胀、消化不良、黏膜炎和醉酒。

    洋茴香精油不仅对消化系统有效，它还是循环系统和呼吸系统的常用滋补品。它能有助于缓解焦虑和神经紧张，也能缓解肌肉疼痛和偏头痛引起的呕吐，可以刺激肺部排出黏痰。


    #### （6）使用注意事项

    洋茴香精油功效强劲，所含茴香脑成份会使一些人产生皮炎，皮肤有问题时要避免使用。大剂量使用时会降低循环速率，导致大脑充血。在妇女怀孕期间避免使用。


    #### （7）用法

    1. **香炉和蒸汽熏蒸**

    在蒸汽疗法中，大茴香精油对哮喘、感冒和其他呼吸问题都有帮助，也能平缓反胃和呕吐。


    2. **手帕滴油**

    应用手帕滴油闻香的办法，有助于解决消化问题，对偏头痛和眩晕的人也是有好处的。


    #### （8）适合与洋茴香精油混用的精油

    虽然精油间都可以混用，但是特别适合与洋茴香精油混用的精油是：小豆蔻、香菜、雪松、芫荽、莳萝、茴香、中国柑橘、酸柠檬叶和花梨木精油。


    ### 3. 丁香精油

    丁香精油是从丁香植物（Syzygium aromaticum）中提取的，属于桃金娘科。


    虽然丁香精油效力很强，但在芳香疗法中要慎重使用。它能激发智力，振奋精神，帮助消化，缓解关节和风湿病的疼痛以及缓解呼吸系统疾病和腿部溃疡。


    #### （1）精油性质

    丁香精油味道温和、强劲，具有辛辣味。颜色从无色到淡黄色，黏质性中等到水性。


    #### （2）来源

    原产于印度尼西亚和马六甲海峡的岛屿，它是一种常绿树，可以长到大约 10m 高，叶片光亮绿色，花蕾指甲形状、玫瑰桃红色，翻烤烘干后变成深红褐色，可以把花蕾从树上直接打下来后烘干。


    拉丁文 Clavus 的意思是指甲形状，指花蕾。希腊人、罗马人和中国人经常用它来治疗牙痛，也用做口腔清新剂。它还有防腐杀菌的功效，经常用在预防传染性疾病方面。它是调味品贸易中重要的一种日用品，还用于制造香水、酿造葡萄酒和利口酒、春药、护牙产品。与柑橘相混可以作为润发油。在驱除蚊虫方面也会用到它。


    #### （3）提取方法

    丁香精油是以叶片、茎和花蕾为原料的。我们介绍的丁香精油是以叶片为原料的，采用蒸汽蒸馏法提取出来的，丁子香酚含量较低（为 80%）。而要从茎中提取，丁子香酚的含量会达到
    92% 。


    #### （4）化学成份

    丁子香酚、醋酸丁子香酚和石竹（萜）烯。


    #### （5）治疗功效

    1. 可以被用于治疗痤疮、瘀伤、烧伤和划伤，预防发炎和减轻疼痛。还有助于治疗牙痛、口腔疼痛、风湿病和关节炎。

    2. 有益于消化系统，可以防止呕吐、腹泻、胃肠痉挛，消除胃肠胀气和寄生虫，保护肝脏。'
  mdcn: '## 7. 柠檬戟叶马鞭草精油


    柠檬戟叶马鞭草精油是从柠檬马鞭草植物（Lippia citriodora）提取的，属于防臭木科，又称为柠檬过江藤、防臭木。


    这种精油最大的特点是可以驱除压抑，刺激肝脏功能，帮助消化系统和呼吸系统；同时，还可以软化肌肤和防止虚胖。


    ### (1) 精油性质

    柠檬戟叶马鞭草精油有清新、甘甜的柠檬味，颜色淡橄榄色或黄色。


    ### (2) 来源

    它是多年生的落叶灌木，可以长到5m高，茎木质化，叶片小、芳香、形态纤细、淡绿色，开紫色花。原产于智利，是以帕尔玛公主玛利·路易沙的名字命名的。


    一定不要把柠檬戟叶马鞭草精油误认为是“西班牙马鞭草”，有些人也把它称为“马鞭草精油”，不过它属于马鞭草科，是一种草本植物。


    ### (3) 提取方法

    柠檬戟叶马鞭草精油是以新采收的叶片为原料，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    龙脑、香叶醇、芳樟醇、橙花醇、柠檬醛、二戊烯、柠檬油精和月桂（香叶）烯。


    ### (5) 治疗功效


    1. 柠檬戟叶马鞭草精油有助于治疗消化系统方面的腹部绞痛和消化不良，还可以帮助狂欢和宿醉后的肝脏恢复。

    2. 对消化系统的刺激作用，表现在帮助消化脂肪，还能预防脂肪硬化和酒精中毒，它还能抚慰呼吸系统，缓解心悸，它的这种舒缓功能还有助于性方面问题的解决。

    3. 柠檬戟叶马鞭草精油有助于缓解压力，以及清新身体和精神，同时还能振奋精神和缓解压力。


    ### (6) 使用注意事项

    柠檬戟叶马鞭草精油没有太多的安全方面的数据，但是由于柠檬醛的含量较高，可能会引起光敏性反应。


    ### (7) 用法

    这种精油有助于调节神经系统的功能，尤其是有关消化系统疾病方面的神经调节功能；它还是良好的肝脏滋补品，同时还能软化肌肤和帮助缓解僵硬现象。


    1. **香炉和蒸发器熏香**

    在蒸汽疗法中，柠檬戟叶马鞭草精油可以用于治疗神经系统，在情绪低落和感到压抑的时候，有缓解压力的作用。


    2. **做复方按摩油或稀释在浴盆中使用**

    柠檬戟叶马鞭草精油做复方按摩油或稀释在浴盆中使用，可以用于治疗消化问题，促进肝脏功能，治疗失眠和神经衰弱，帮助缓解呼吸系统的问题，如支气管炎和鼻窦炎。它也可以用于调理肌肤。使用时，要留意可能发生的过敏反应。


    3. **做面霜或润肤乳的成份**

    用于面霜或润肤乳时，柠檬戟叶马鞭草精油可以降低皮肤的僵硬度，软化肌肤。但要谨慎使用，它可能会使皮肤具有感光性和产生光敏反应。


    ### (8) 适合与柠檬戟叶马鞭草精油混用的精油

    柠檬、榄香、橙花和棕榈玫瑰精油。


    ## 8. 苦橙叶精油


    苦橙叶精油是从苦橙植物（Citrus aurantium var. amara，Citrus bigardia and petitgrain bigarade）的叶片中提取的，属于芸香科。


    这种味道清新、洁净的精油最有利用价值的地方在于能够激发你的大脑有意识地接受知识，同时，还能平息愤怒和恐慌。它具有很好的放松疗效，可以使快速跳动的心脏平缓下来，有利于入睡。它在护肤方面，可以清洁油腻皮肤和治疗皮肤上的瑕疵。


    ### (1) 精油性质

    苦橙叶精油有股木头气味，同时有花的香味。这种精油的颜色淡黄或琥珀色，水质般的黏性。


    ### (2) 来源

    它是从柑橘树获得的3种精油中的一种，从花里提取的是橙花油，从果实的外壳提取的是苦橙油。苦橙叶精油是从这种树的叶片中提取的，但是曾经也有从绿色的没有成熟的柑橘中提取的，这时的果实仅有樱桃大小。

    它被广泛地应用于药物、香料中，还是有名的科隆香水的原料。


    ### (3) 提取方法

    苦橙叶精油是以新鲜叶片和小嫩枝为原料，采用蒸汽蒸馏法提取的，出油率在0.5%~1%。


    ### (4) 化学成份

    酸香叶茅、芳樟醇、橙花醇、松油精或萜品烯、乙酸香叶酯、乙酸里哪酯、月桂（香）叶）烯。


    ### (5) 治疗功效

    苦橙叶精油可以治疗神经虚弱，缓解因压力过大引起的其他症状，尤其是生气和恐慌。它可以镇静和抚慰情绪，使身体放松，能调匀呼吸，降低过快的心跳速率，缓解肌肉痉挛和胃部疼痛。在病后痊愈阶段使用苦橙叶精油，有助于加快恢复。它对于治疗失眠，清洁油腻皮肤，治疗痤疮和排汗过多都有疗效，还能滋养皮肤。


    ### (6) 使用注意事项

    苦橙叶精油一般是无毒、无刺激性、无过敏性和光敏性的。

    苦橙叶精油的主要治疗功效，包括防腐杀菌、止痉挛、抗抑郁、除臭、镇静和止痛。


    ### (7) 用法

    苦橙叶精油有助于神经系统，可以抚慰疼痛，帮助清洁和滋养皮肤。


    1. **香炉和蒸发器熏香**

    在蒸汽疗法中，苦橙叶精油可以在病后康复期使用，用于调理生气、恐慌、压抑和焦虑的情绪，还可以使身体放松，能够激发大脑有意识地接受知识。


    2. **做复方按摩油或稀释在浴盆中使用**

    苦橙叶精油做复方按摩油或稀释在浴盆中使用，可以在病后康复期使用，用于调理生气、恐慌、压抑、兴奋、紧张和焦虑的情绪以及缓和心跳过快的状况，还可以使身体放松，清洁皮肤上的瑕疵。


    3. **做面霜或洗液的成份**

    用作面霜或洗液的成份时，它对于清洁油腻皮肤很有帮助，还可以缓解皮肤充血的状况，同时能够帮助治疗痤疮、丘疹和其他的皮肤瑕疵。


    ### (8) 适合与酸柠檬叶精油混用的精油

    佛手柑、棕榈玫瑰、天竺葵、花梨木、薰衣草和檀香精油。


    ## 9. 白桦精油


    白桦精油是从白桦树植物（Betula pendula，B. verrucosa）中提取的，属于桦木科。白桦又称欧洲白桦或银色桦树。


    ### (1) 精油性质

    白桦精油有一种香油的气味，颜色淡黄色。


    ### (2) 来源

    作为园林常用树种白桦，起源于北半球，高度可达15～20m。枝条柔软、银灰色树干爆裂成疤状，叶片淡绿色、卵形。以前，把白桦芽用做头发的滋补品。在斯堪的纳维亚半岛（瑞典、挪威、丹麦、冰岛的泛称），把白桦幼树的小叶和嫩梢，绑成一束，在桑拿浴中使用，能调和皮肤颜色，加速循环。春天收集树汁可以当滋补品饮用。


    ### (3) 提取方法

    以白桦树叶芽为原材料，采用蒸汽蒸馏法提取白桦精油。

    未加工的桦树毛油是以树皮为原料，采用缓慢破坏性的蒸馏法提取的；随后，再采用蒸汽蒸馏获得提纯的桦树毛油。


    ### (4) 化学成份

    水杨酸、水杨酸甲基酯、桦木烯和三甲基亚甲基双环十一碳烯醇。


    ### (5) 治疗功效

    止痛、杀菌、收敛、净化、消毒、利尿、退热、杀虫和滋补。


    ### (6) 使用注意事项

    通常白桦精油是没有毒性、没有刺激性、没有光敏性的，但妇女怀孕期禁用，以防发生过敏反应。


    ### (7) 用法

    白桦精油对于灰暗和发炎的皮肤、湿疹、头发养护和牛皮癣是有用的，它还有利于因肌肉中毒素的累积引起的关节炎、风湿病、肌肉疼痛、浮肿和肥胖的恢复。


    1. **蒸汽疗法或在洗浴中使用**

    在蒸汽疗法或在洗浴中使用白桦精油，能够缓解肌肉疼痛、关节炎和风湿病。


    2. **做面霜和药膏成份**

    从桦树提取的未加工桦树毛油，常常在治疗皮肤病的专用药物中用到。


    ### (8) 适合与白桦精油混用的精油

    安息香、茉莉、檀香和迷迭香精油。


    ## 常用单方植精油

    Essential oils health


    ## 10. 波耳多精油


    - 波耳多油是从波耳多树（Peumus boldus、Boldu boldus）提取的，属于伞形科。


    ### （1）精油性质

    波耳多精油效力强劲，即使很少的用量都会引起抽搐。它色泽发黄，气味令人不悦。


    ### （2）来源

    波耳多精油是从波耳多树提取的，这种树野生于南美洲，多见于智利。波耳多精油有毒，对人体有害。在动物试验中，每千克体重含有0.07g的波耳多精油时，身体就会发生抽搐反应。

    草药医学使用干燥的叶片治疗泌尿生殖器官的感染、胆结石、肝脏和胆囊疼痛、膀胱炎和风湿病。


    ### （3）提取方法

    波耳多精油是从叶片提取的。


    ### （4）化学成份

    松萜或蒎烯、茨烯、柠檬油精、松油精、异丙基苯、驱蛔（脑）烯、桉树脑和芳樟醇。


    ### （5）使用注意事项

    波耳多精油有剧毒，不能在芳香疗法中使用。


    ## 11. 布枯精油


    - 布枯是从 Agothosma betulina 提取的。


    ### （1）精油性质

    布枯精油有股强烈的黑醋栗味，经常做酊剂、榨汁物和树脂使用，多数情况下用于医药。布枯精油不能在芳香疗法中使用。


    ### （2）来源

    它原产于南非，这种像石楠的常绿植物属于芳香型的灌木，叶片发皱、稀疏，长约1cm。它具有丰富的油腺，释放出强烈的、黑醋栗似的香味。春天，柔弱的茎上开着5瓣白花，花粉囊紫色。据说，布枯含有一种物质，可以阻挡紫外线。


    ### （3）化学成份

    蒲勒酮、薄荷酮。


    - 布枯精油是从布枯树（Agothosma betulina、Barosma betulina）中提取的，它属于芸香科，又称短叶布枯、南非香叶木。

    “真”布枯植物—Barosma crenulata—它的油富含蒲勒酮，也应小心地使用。


    ### （4）治疗功效

    布枯精油的治疗功效，包括杀菌、祛风、利尿、杀虫和滋补。


    ### （5）提取方法

    布枯精油是以干燥叶片为原料，采用蒸汽蒸馏法提取的。


    ### （6）使用注意事项

    不能在芳香疗法中使用布枯精油。


    ### （7）用法

    - 布枯叶片可以用于驱避昆虫，也是一种防腐剂，还可以作为茶饮。布枯叶片还可以用于治疗泌尿系统感染、消化问题、痛风、风湿病、咳嗽和感冒（当茶饮用，每杯热水中加1茶匙布枯叶片）。

    - 布枯叶片也可以泡在白兰地中制成“药用”白兰地，用于各种轻微疾病。

    - 布枯精油添加在以醋为主做成的洗液里，可以用于治疗瘀伤和扭伤。

    - 布枯精油一般不在芳香疗法中使用，但是，可以当作灌剂（茶饮），有助于治疗感染、消化问题、咳嗽、感冒和风湿病。


    ## 12. 桧（尖）精油

    桧（尖）精油是从刺柏植物（Juniperus sabina）提取的，属于柏科，又称为双子柏。


    ### (1) 精油性质

    这种无色的桧（尖）精油气味令人不愉快，味道苦，让人厌恶。


    ### (2) 来源

    它的树型紧凑，是一种灌木，高约1m，分枝呈水平生长的趋势，树皮淡绿色、叶片小、暗绿色，浆果黑紫色，含有3粒种子。原产于北美洲和欧洲中南部。

    桧树曾是一种药膏的成份，或用作一种敷料用于治疗水疱、梅毒以及其他的皮肤病。局部使用或内服能产生刺激性。桧（尖）精油被认为含有足叶草毒素（鬼臼毒素），不能使用，因为这种成份对细胞有破坏作用。


    ### (3) 提取方法

    桧（尖）精油是以嫩枝和叶片为原料的，采用蒸汽蒸馏法提取的。


    ### (4) 化学成份

    桧烯、1-蒎烯、柠檬烯、松油烯、杜松烯。


    ### (5) 使用注意事项

    刺柏 Juniperus sabina

    因为有毒的原因，在许多国家这种精油是禁止面向大众销售的。它具有强烈的通经作用，用做堕胎药时，会产生致命的中毒现象。


    ## （五）辛辣味类精油


    ### 1. 茴香精油

    茴香精油是从茴香植物（Foeniculum vulgare var. dulce）提取的。这是一种甜茴香，属于伞形科，又称为罗马茴香。


    在芳香疗法中，在面对逆境的时候可以使用这种精油。它能够提升你的勇气、决心和力量，还能有助于解决消化问题、减肥、洁净油性皮肤和消除皱纹。


    #### （1）精油的性质

    茴香精油有股青草味，稍带辛辣，类似于大茴香的味道。黏质性表现为清澈的水性。


    #### （2）来源

    茴香这个名字来源于拉丁文单词foenum，是“甘草”的意思。它可以长到2m高，是一种二年生或多年生植物，叶片绿色、革质，花朵金黄色，能吸引蜜蜂。在中世纪，它又被称为Fenkle，很受古代中国人、埃及人和罗马人的喜爱。他们认为这种植物可以使人长寿，给人勇气和力量，还可以保守灵魂。另外，还能增强视力，治疗蛇毒、疝气和驱避跳蚤类生物。


    #### （3）提取方法

    甜茴香精油是以压碎的种子为原料，采用蒸汽蒸馏法提取的，产油率为2%~4%。苦茴香油，不能在芳香疗法中使用，是以压碎的种子或全株植物为原料提取的，它的拉丁文是Foeniculum
    vulgare var. amara。


    #### （4）化学成份

    松萜或蒎烯、月桂（香叶）烯、葑酮、茴香脑、甲基胡椒酚、柠檬油精、桉树脑和茴香醛。


    #### （5）治疗功效

    1. 茴香精油是治疗消化系统的良药，包括肠胃气胀、便秘、疝气、恶心晕船、呕吐、厌食消化不良和打嗝；它可以用于治疗肥胖，因为它使人有吃饱感觉；有利尿的效果，可以加速循环。

    2. 它能够使人在面临逆境时增加勇气和力量。它对皮肤有清洁和协调的作用，有助于治疗瘀伤，清洁过于油腻的皮肤，消除过于老化皮肤的皱纹（可能是由于这种精油具有雌性激素的功效）。

    3. 它对于脾脏和肝脏有调和的作用，可以缓解过量饮酒和暴食给身体带来的压力。对于哺乳期的母亲，可以促进奶水的分泌，使用新鲜植物提取的精油促进乳汁的分泌效果会更好些，因为这种精油含有高浓度的茴香脑成份。


    #### （6）使用注意事项

    甜茴香精油的功效强劲，不能大剂量使用，因为它有麻醉的作用。孕期和患有癫痫症的患者要避免使用。因为它含有大量的茴香脑成份，会引起癌症患者的雌激素分泌紊乱。

    哺乳期妇女、孕妇和子宫内膜异位患者人都应该避免使用它。

    苦茴香精油不能在芳香疗法中使用，也不能在皮肤上使用。


    #### （7）用法

    茴香精油最强的功效在于能调理消化系统的功能，帮助减肥，护理肌肤。


    1. **香炉和蒸发器熏香**

    在蒸汽疗法中，茴香精油是治疗厌食症的开胃刺激品，还可以在逆境中增加勇气和力量。


    2. **做复方按摩油或盆浴稀释成份**

    茴香精油可以当作复方按摩油或稀释在盆浴中使用，有助于缓和发胀的胃部，消除胃部的胀气、疝气、便秘和其他消化系统疾病。它也可以作为一种利尿剂，去除体内多余水分，促进脂肪团的分解。


    3. **做面霜和润肤乳的添加成份**

    在底料面霜和润肤乳中使用时，茴香精油可以用做皮肤的常规护理，尤其有益于消散瘀伤，使灰暗的肤色恢复活力，清洁油性皮肤，消除老年性皱纹。它对于去除脂肪团、缓解关节疼痛以及消除水肿都有帮助。


    #### （8）适合与茴香精油混用的精油

    天竺葵、薰衣草、玫瑰和雪松精油。


    ### 2. 洋茴香精油

    洋茴香精油是从大茴香的种子中提取出来的，洋茴香（Pimpinella anisum L.）又名大茴香、茴芹，属于伞形科茴芹属。它的气味辛辣，类似甘草根，又像孜然甜芹。它不同于八角茴芹，八角茴芹的果实呈星状，属于八角科。


    在芳香疗法中，这种温和的带有辛辣味的精油，经常被用来治疗性格内向并且多忧虑人群的失调症；同时，也能帮助消化，改善肺功能，治疗偏头痛和头痛。


    #### （1）精油性质

    这种精油具有中等的黏性，在低温下呈固体状态，使用前需要用手捂化。


    #### （2）来源

    洋茴香起源于中东，目前在欧洲、美国和北非有栽培。它是一年生植物，大约80cm高，锯齿叶片成圆扇状，微小的白色伞形花，浅灰褐色种子。主要产地为土耳其和西班牙。洋茴香在埃及种植至少有4000年了，法老的临床试验指出：其种子可用作利尿剂，治疗消化不良和缓解牙痛。


    洋茴香可以制作利口酒、兴奋剂、牙膏和漱口水。在印度，被用做口腔清新剂；在土耳其，人们用它的种子制作一种广受欢迎的酒精饮料。在古代，洋茴香精油受到很高的评价，尤其是罗马人、埃及人和希腊人。罗马人用它做香味蛋糕，埃及人在做面包时会用到它，而希腊人用它治疗消化道感染。


    #### （3）提取方法

    这种精油用蒸汽蒸馏法从干燥的成熟果实和种子中提取。


    #### （4）化学成份

    70%～90%茴香脑、α-松萜或蒎烯、茨烯、β-松萜或蒎烯、芳樟醇或沉香醇或芳樟醇、黄樟油精、茴香醛和乙酰茴香醚。


    #### （5）治疗功效

    洋茴香精油有助于治疗肌肉疼痛、风湿病、支气管炎、咳嗽、疝气（绞痛，疝痛）、肠胃气胀、消化不良、黏膜炎和醉酒。

    洋茴香精油不仅对消化系统有效，它还是循环系统和呼吸系统的常用滋补品。它能有助于缓解焦虑和神经紧张，也能缓解肌肉疼痛和偏头痛引起的呕吐，可以刺激肺部排出黏痰。


    #### （6）使用注意事项

    洋茴香精油功效强劲，所含茴香脑成份会使一些人产生皮炎，皮肤有问题时要避免使用。大剂量使用时会降低循环速率，导致大脑充血。在妇女怀孕期间避免使用。


    #### （7）用法

    1. **香炉和蒸汽熏蒸**

    在蒸汽疗法中，大茴香精油对哮喘、感冒和其他呼吸问题都有帮助，也能平缓反胃和呕吐。


    2. **手帕滴油**

    应用手帕滴油闻香的办法，有助于解决消化问题，对偏头痛和眩晕的人也是有好处的。


    #### （8）适合与洋茴香精油混用的精油

    虽然精油间都可以混用，但是特别适合与洋茴香精油混用的精油是：小豆蔻、香菜、雪松、芫荽、莳萝、茴香、中国柑橘、酸柠檬叶和花梨木精油。


    ### 3. 丁香精油

    丁香精油是从丁香植物（Syzygium aromaticum）中提取的，属于桃金娘科。


    虽然丁香精油效力很强，但在芳香疗法中要慎重使用。它能激发智力，振奋精神，帮助消化，缓解关节和风湿病的疼痛以及缓解呼吸系统疾病和腿部溃疡。


    #### （1）精油性质

    丁香精油味道温和、强劲，具有辛辣味。颜色从无色到淡黄色，黏质性中等到水性。


    #### （2）来源

    原产于印度尼西亚和马六甲海峡的岛屿，它是一种常绿树，可以长到大约 10m 高，叶片光亮绿色，花蕾指甲形状、玫瑰桃红色，翻烤烘干后变成深红褐色，可以把花蕾从树上直接打下来后烘干。


    拉丁文 Clavus 的意思是指甲形状，指花蕾。希腊人、罗马人和中国人经常用它来治疗牙痛，也用做口腔清新剂。它还有防腐杀菌的功效，经常用在预防传染性疾病方面。它是调味品贸易中重要的一种日用品，还用于制造香水、酿造葡萄酒和利口酒、春药、护牙产品。与柑橘相混可以作为润发油。在驱除蚊虫方面也会用到它。


    #### （3）提取方法

    丁香精油是以叶片、茎和花蕾为原料的。我们介绍的丁香精油是以叶片为原料的，采用蒸汽蒸馏法提取出来的，丁子香酚含量较低（为 80%）。而要从茎中提取，丁子香酚的含量会达到
    92% 。


    #### （4）化学成份

    丁子香酚、醋酸丁子香酚和石竹（萜）烯。


    #### （5）治疗功效

    1. 可以被用于治疗痤疮、瘀伤、烧伤和划伤，预防发炎和减轻疼痛。还有助于治疗牙痛、口腔疼痛、风湿病和关节炎。

    2. 有益于消化系统，可以防止呕吐、腹泻、胃肠痉挛，消除胃肠胀气和寄生虫，保护肝脏。'
