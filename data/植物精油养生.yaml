- md: '## （4）擦法

    擦法。用手掌紧贴体表，稍用力下压做直线往返摩擦，使之产生一定热量的手法。具有加速血液和淋巴循环，活血止痛的作用。可以分为：

    1) 小鱼际擦法（侧擦法）。用小鱼际着力摩擦，动作要稳，必须直线往返移动，不可歪斜。

    2) 大鱼际擦法。用大鱼际着力摩擦，肩部放松，肘关节自然下垂，做到发力于臂，蓄劲于腕，使动作平稳而有节奏性。

    3) 掌擦法。全掌着力摩擦，压力要均匀适中，不可向掌下用太大的压力，以摩擦时不使皮肤起皱褶为宜。


    ## （5）搓法

    用双手捧夹住肢体相对用力，做方向相反的快速搓揉，并同时做上下往返移动的手法。具有温经通络、消除疲劳的作用。操作要点：用双手掌面夹住肢体一定部位，然后两手相对用力，做相反的快速搓揉并循序上下往返移动。


    # 2. 挤压类手法

    用指、掌或肢体其他部分按压或对称性挤压体表，称为挤压类手法。

    ## （1）按法

    用指、掌或肘深压于体表一定部位或穴位的手法。具有镇静止痛、开通闭塞的作用。可以分为：

    1) 指按法。拇指伸直，用拇指指面着力于经络穴位上，垂直向下按压，其余四指张开起支持作用，并协同助力。指按法适用于全身各部穴位。

    2) 掌按法。腕关节背伸，用掌面或掌根着力进行按压。若欲增加按压力量，可将双掌重叠进行按压。掌根按法常用于腰背及下肢部。

    3) 肘按法。肘关节屈曲，用肘尖（即尺骨鹰嘴突起部）着力进行按压。肘按法压力最大，多用于腰背、臀部和大腿部。


    ## （2）点法

    点法用指端、肘尖或屈曲的指关节突起部分着力，点压在一定部位的手法。具有活血止痛、解除痉挛、调整脏腑功能。可以分为：

    1) 拇指指端点法。手握空拳，拇指伸直并紧靠于食指中节，用拇指端点压一定部位；

    2) 屈拇指点法。拇指屈曲，用拇指指间关节桡侧点压一定部位，操作时可用拇指端抵在食指中节外缘，以助力；

    3) 屈食指点法。食指屈曲，其他手指相握，用食指第一指间关节突起部分点压一定部位。操作时，可用拇指末节内侧缘紧压食指指甲部，以助力。


    ## （3）拨法

    拨法用指端、掌根或肘尖做与肌纤维、肌腱、韧带呈垂直方向拨动的手法。具有解痉止痛、疏理肌筋的作用。操作要点：拇指伸直，用拇指指面着力于体表一定部位，适当用力下压至一定深度，待有酸胀感时，再做与肌纤维或肌腱、韧带呈垂直方向的来回拨动，其余四指轻扶于肢体旁，以助用力。


    ## （4）捏法

    捏法是用拇指和其他手指在一定部位做对称性的挤压的手法。具有舒筋通络、调理脾胃的功能，常用于头面、腰背、胸胁及四肢部位。操作要点：用拇指和食、中指指面，或用拇指和其余四指夹住肢体或肌肤，做相对用力挤压，随即放松，再用力挤压，并循序移动。


    ## （5）拿法

    用拇指和其余四指相对用力，提捏一定部位的手法。具有祛风散寒、缓解痉挛、消除肌肉酸胀的作用。可以分为：

    1) 三指拿法。用拇指和食、中指着力提捏，捏住一定部位肌肤逐渐用力内收，并将肌肤提起，做轻重交替而连续的提捏动作，用指面着力，不能用指端内抠；

    2) 五指拿法。用拇指和食、中、无名、小指着力提捏，用力由轻到重，再由重到轻，连续而有节奏，不可突然用力。


    ## （6）捻法

    捻法用拇、食指捏住一定部位做快速地搓揉的手法。一般适用于四肢小关节，具有滑利关节、消肿止痛的作用。操作要点：腕部要放松，用拇、食指捏住一定部位，搓揉动作要快，但移动要慢，所谓紧捻慢移。


    # 3. 摆动类手法

    用指、掌或腕关节在前臂的摆动带动下，做协调的连续摆动，称为摆动类手法。


    ## （1）揉法

    揉法用指、掌和前臂吸定于一定部位，做轻柔缓和的环转运动，并带动该处的皮下组织的手法。具有舒筋活络、缓解肌痉挛、软化疤痕的作用。其中常用类型是拇指揉法，即用拇指指腹着力进行揉动，主要用于某一点、某一线或面积较小的部位。揉法又可分为：

    1) 拇指揉法。将拇指作用于某一部位，做旋转运动。

    2) 二指揉法。将食指与中指并拢后，作用于某一部位，做旋转运动。

    3) 三指揉法。将食指、中指、无名指并拢后，作用于某一部位，做旋转运动。

    4) 掌根揉法。用掌根部分着力进行回旋揉动。

    5) 鱼际揉法。用大小鱼际着力进行回旋揉动。


    ## （2）滚法

    用小鱼际侧部或掌指关节部附着于一定的部位上，通过腕关节的屈伸和前臂的摆动、旋转运动，使攘动产生的力持续作用于操作部位上的手法。具有缓解肌肉和韧带痉挛、增加肌筋活力作用。其中常用手法是单手滚法，即用手掌背部近小指侧部分附着于一定部位上，掌指关节处略为屈曲，通过腕关节做主动连续的屈伸运动，带动前臂的外旋和内旋，使掌背部在宾客体表一定部位上进行持续不断的来回滚动。


    ## （3）一指禅推法

    用拇指着力于一定部位，运用腕部的往返摆动，使所产生的力持续作用于经络穴位上的手法。腕部摆动要快，拇指移动要缓慢。具有强健脾胃、调节脏腑功能。

    操作要点：

    1) 坐位姿势，使肘部的位置略低于腕部、肘关节不能外翘，腕部尺侧要低于桡侧，以使拇指着力于操作部位上。

    2) 悬腕，手握空拳，腕关节自然悬屈，在腕关节放松的状况下，使腕屈曲至 70° ~ 90°，拇指自然着力。

    3) 腕部向外摆动，肩关节放松，肩部不能耸起用力。拇指罗纹面着实吸定于操作部位，腕部向外摆动。

    4) 腕部向内摆动，肩关节放松，肩部不能耸起用力。拇指罗纹面着实吸定于操作部位，腕部向内摆动。


    # 4. 振动类手法

    以较高频率的节律性轻重交替刺激，持续作用于人体，称为振动类手法。


    ## （1）抖法

    用双手握住肢体远端做上下连续抖动，使关节肌肉产生松动感的手法。具有松解粘连、滑利关节等作用。常与搓法配合使用。

    操作要点：

    1) 抖上肢第 1 式法。宾客取坐位或站立位，保健按摩师放松其肩臂。

    2) 抖上肢第 2 式法。即抖手腕法。站在宾客前外侧，上身略为前俯，用双手握住腕部，慢慢将其向前外侧方向抬起至 60°左右，然后做连续的、小幅度的上下抖动，使抖动似波浪般地传递到肩部。


    ## （2）振法

    用指或掌着力于一定部位做强烈的振颤的手法。具有镇静安神、调节肠胃功能的作用。可以分为：

    1) 指振法。中指伸直，着力于经络和穴位，食指加压于中指指背，肘微屈，运用手臂的静止性用力，使肌肉强力收缩，发生快速而强烈的振颤，集功力于中指并传递到体内。

    2) 掌振法。用掌面着力于一定部位或捧夹住机体两侧做振颤动作。


    # 5. 叩击类手法

    用指、掌、拳或特制器械有节奏地叩打体表，称为叩击类手法。


    ## （1）拍法

    手指自然并拢，掌指关节微屈曲，用手腕部屈伸带动虚掌着力于受按摩部位，平稳而有节奏地反复拍打的手法。具有舒筋通络、解痉止痛的作用。可以分为：

    1) 指背拍打法。保健按摩师五指自然屈曲，用腕部屈伸带动手指，以指背拍打被按摩的部位。

    2) 虚掌拍打法。保健按摩师五指并拢成空掌状，在体表进行拍打。

    3) 五指散拍法。保健按摩师五指散开、伸直，顺肢体或肌筋的方向于按摩部位进行拍打的方法。


    ## （2）叩法

    以空拳或指掌尺侧叩击按摩部位的手法。具有通经活络、消除疲劳的作用。操作要点：以两手空拳的小指及小鱼际的尺侧叩击被按摩部位，以腕部屈伸带动手部，用掌根及指端着力，双手交替叩击被按摩部位。


    ## （3）击法

    用拳背、掌根、掌侧小鱼际、指尖或桑枝棒击打体表一定部位或穴位的手法。具有调和气血、安神醒脑的作用。可以分为：

    1) 指尖击法。用指端轻轻打击宾客体表，如雨点下落。腕关节要挺住，不能屈伸，利用肘关节屈伸力量击打。

    2) 拳击法。以单手或双手握拳，在臂力带动下，以空拳着力于被按摩部位，一起一落，有节奏地击打。或者以反拳（拳背）着力于被按摩部位，用贯力缓慢而轻松地击打，双手交替进行。

    3) 掌击法。手指自然分开、微屈，腕关节伸直或背伸，以掌根或小鱼际部位着力在被按摩部位，进行击打。


    ## （4）啄法

    手自然屈曲，以腕屈伸带动指端着力，垂直于被按摩部位，呈鸡啄米状的手法。具有安神醒脑、解痉止痛等作用。轻啄法起抑制神经作用，重啄法起兴奋神经作用。操作要点：五指微屈曲成爪状或聚拢呈梅花状，以指端着力，用腕部上下自然屈伸的摆动，带动指端啄击被按摩部位，形如鸡啄米状。双手交替进行啄击。


    # 6. 运动关节类手法

    对关节做被动性活动的一类手法，称为运动类手法。


    ## （1）屈伸法

    使关节被动屈伸运动的手法。具有滑利关节、理筋整复、松解粘连的作用。可以分为：

    1) 伸肩法。保健按摩师左臂肘窝抵住宾客肘下部，左右手十指交叉置于其肩上部，继而用力向上抬其肘使肩关节过度后伸。

    2) 伸肘法。保健按摩师一手扶宾客肩部，另一手握其肘部，做肘关节的屈伸活动。

    3) 伸髋法。保健按摩师一手扶宾客髋部，另一手按其膝部，做膝关节的屈伸活动。

    4) 屈髋法。宾客仰卧，保健按摩师站于宾客一侧，一手按住其膝部，另一手握其足掌部，使髋、膝、踝关节同时屈曲，随即伸直复原。

    5) 屈膝法第一式。宾客仰卧，保健按摩师立于宾客一侧，一手按住其腘窝上部，另一手握其踝部，做膝关节屈伸活动。

    6) 屈膝法第二式。保健按摩师一手托宾客踝部，另一手握其足掌部，做踝关节的屈伸活动。


    ## （2）拔伸法

    应用对抗力量对关节或肢体进行牵拉，使关节伸展的手法。具有整复错位、矫正畸形、减轻压迫刺激的作用。可以分为：

    1) 头颈部拔伸法。宾客取坐位。保健按摩师站于宾客后，用双手拇指顶按枕骨下方，掌根分别夹住下颌部助力，然后两手同时用力向上拔伸。

    2) 肩关节拔伸法。宾客坐于低凳上，上肢放松。保健按摩师站于宾客后外侧，用双手握住其腕部和肘部，逐渐用力向上拔伸，嘱宾客身体向另一侧倾斜或有一助手协助固定其身体，以牵拉之力相对抗。

    3) 腕关节拔伸法。一手握宾客前臂下端，另一手握其手部，两手相对用力做腕关节拔伸活动。

    4) 指（趾）关节拔伸法。一手握住被拔伸关节近侧端，另一手捏住远侧端，两手相对用力做指趾关节拔伸活动。


    ## （3）摇法

    使关节做被动的环转活动的手法。具有滑利关节、松解粘连、整复错位的作用。可以分为：

    1) 颈项部摇法。保健按摩师用一手扶住宾客头顶后部，另一手托住其下颌，双手协同做相反方向的左右环转摇动。

    2) 肩关节摇法。保健按摩师用一手扶住宾客肩部，另一手握住腕部或托住肘部，做环转摇动。

    3) 肘关节摇法。保健按摩师一手握宾客肘部，另一手握其腕部，在肘关节屈曲位的基础上做环转摇动。

    4) 腕关节摇法。保健按摩师一手握宾客腕部，另一手握其四指，做腕关节环转摇动。

    5) 腰部摇法第一式。宾客端坐，保健按摩师用一手搂压住宾客一侧肩部，另一手抱于其同侧腰部，然后做腰部逆时针方向的摇动。

    6) 腰部摇法第二式。宾客取站位，双手高举握杠，放松腰部。保健按摩师双手握宾客腰部，做顺时针摆动。

    7) 髋关节摇法。宾客仰卧，髋、膝屈曲。保健按摩师一手托住宾客足跟，另一手扶住膝部，做髋关节环转摇动。

    8) 踝关节摇法。宾客仰卧，下肢伸直。保健按摩师一手托宾客足跟，另一手握其足掌部，在稍用力拔伸的同时做踝关节环转摇动。


    # （三）复方精油的调配原则

    芳香按摩前的首要任务是对精油的挑选，因为挑选精油时关注的不仅是精油具有何种香味，更重要的是要看它有什么治疗功效。


    ## 1. 调配原则

    - 1) 当调配一种气味强烈的香料时，最好一点一点添加某种精油，直到合适为止。

    2) 配制精油时，要记录配方。

    3) 当调配香料时，要使用玻璃容器。塑料容器会黏附香气分子，混制时更不能用金属物体，最好使用玻璃棒。

    4) 用过的调制器材，要用强效的肥皂溶液清洗干净，用酒精擦拭干净，以去除芳香分子。反复清洗后，用干净水漂洗干净，烘干备用。

    5) 要购买蓝色或琥珀色玻璃瓶贮存混好的香料，如果用软木塞密封瓶口，外面要用石蜡密封，以防止氧化；如果用的是螺旋盖，里面要有衬垫。

    6) 当在家里调配香水时，要把精油加到酒精或基础油里，所用的酒精是乙醇，为了方便，也可以用伏特加酒。

    7) 基础油最好选择荷荷芭油，它实际是一种液体蜡。荷荷芭油保留香气的效果非常好，它本身也没有很深的颜色。

    8) 当调制香水、梳妆水或是科隆香水时，要根据需要选择酒精或伏特加酒或基础油作为底料，然后一滴一滴地添加精油。

    9) 香水中精油的使用比例较高，为了预防发生过敏反应，如果是从来没有用过的油，要先做皮试。'
  mdcn: '## （4）擦法

    擦法。用手掌紧贴体表，稍用力下压做直线往返摩擦，使之产生一定热量的手法。具有加速血液和淋巴循环，活血止痛的作用。可以分为：

    1) 小鱼际擦法（侧擦法）。用小鱼际着力摩擦，动作要稳，必须直线往返移动，不可歪斜。

    2) 大鱼际擦法。用大鱼际着力摩擦，肩部放松，肘关节自然下垂，做到发力于臂，蓄劲于腕，使动作平稳而有节奏性。

    3) 掌擦法。全掌着力摩擦，压力要均匀适中，不可向掌下用太大的压力，以摩擦时不使皮肤起皱褶为宜。


    ## （5）搓法

    用双手捧夹住肢体相对用力，做方向相反的快速搓揉，并同时做上下往返移动的手法。具有温经通络、消除疲劳的作用。操作要点：用双手掌面夹住肢体一定部位，然后两手相对用力，做相反的快速搓揉并循序上下往返移动。


    # 2. 挤压类手法

    用指、掌或肢体其他部分按压或对称性挤压体表，称为挤压类手法。

    ## （1）按法

    用指、掌或肘深压于体表一定部位或穴位的手法。具有镇静止痛、开通闭塞的作用。可以分为：

    1) 指按法。拇指伸直，用拇指指面着力于经络穴位上，垂直向下按压，其余四指张开起支持作用，并协同助力。指按法适用于全身各部穴位。

    2) 掌按法。腕关节背伸，用掌面或掌根着力进行按压。若欲增加按压力量，可将双掌重叠进行按压。掌根按法常用于腰背及下肢部。

    3) 肘按法。肘关节屈曲，用肘尖（即尺骨鹰嘴突起部）着力进行按压。肘按法压力最大，多用于腰背、臀部和大腿部。


    ## （2）点法

    点法用指端、肘尖或屈曲的指关节突起部分着力，点压在一定部位的手法。具有活血止痛、解除痉挛、调整脏腑功能。可以分为：

    1) 拇指指端点法。手握空拳，拇指伸直并紧靠于食指中节，用拇指端点压一定部位；

    2) 屈拇指点法。拇指屈曲，用拇指指间关节桡侧点压一定部位，操作时可用拇指端抵在食指中节外缘，以助力；

    3) 屈食指点法。食指屈曲，其他手指相握，用食指第一指间关节突起部分点压一定部位。操作时，可用拇指末节内侧缘紧压食指指甲部，以助力。


    ## （3）拨法

    拨法用指端、掌根或肘尖做与肌纤维、肌腱、韧带呈垂直方向拨动的手法。具有解痉止痛、疏理肌筋的作用。操作要点：拇指伸直，用拇指指面着力于体表一定部位，适当用力下压至一定深度，待有酸胀感时，再做与肌纤维或肌腱、韧带呈垂直方向的来回拨动，其余四指轻扶于肢体旁，以助用力。


    ## （4）捏法

    捏法是用拇指和其他手指在一定部位做对称性的挤压的手法。具有舒筋通络、调理脾胃的功能，常用于头面、腰背、胸胁及四肢部位。操作要点：用拇指和食、中指指面，或用拇指和其余四指夹住肢体或肌肤，做相对用力挤压，随即放松，再用力挤压，并循序移动。


    ## （5）拿法

    用拇指和其余四指相对用力，提捏一定部位的手法。具有祛风散寒、缓解痉挛、消除肌肉酸胀的作用。可以分为：

    1) 三指拿法。用拇指和食、中指着力提捏，捏住一定部位肌肤逐渐用力内收，并将肌肤提起，做轻重交替而连续的提捏动作，用指面着力，不能用指端内抠；

    2) 五指拿法。用拇指和食、中、无名、小指着力提捏，用力由轻到重，再由重到轻，连续而有节奏，不可突然用力。


    ## （6）捻法

    捻法用拇、食指捏住一定部位做快速地搓揉的手法。一般适用于四肢小关节，具有滑利关节、消肿止痛的作用。操作要点：腕部要放松，用拇、食指捏住一定部位，搓揉动作要快，但移动要慢，所谓紧捻慢移。


    # 3. 摆动类手法

    用指、掌或腕关节在前臂的摆动带动下，做协调的连续摆动，称为摆动类手法。


    ## （1）揉法

    揉法用指、掌和前臂吸定于一定部位，做轻柔缓和的环转运动，并带动该处的皮下组织的手法。具有舒筋活络、缓解肌痉挛、软化疤痕的作用。其中常用类型是拇指揉法，即用拇指指腹着力进行揉动，主要用于某一点、某一线或面积较小的部位。揉法又可分为：

    1) 拇指揉法。将拇指作用于某一部位，做旋转运动。

    2) 二指揉法。将食指与中指并拢后，作用于某一部位，做旋转运动。

    3) 三指揉法。将食指、中指、无名指并拢后，作用于某一部位，做旋转运动。

    4) 掌根揉法。用掌根部分着力进行回旋揉动。

    5) 鱼际揉法。用大小鱼际着力进行回旋揉动。


    ## （2）滚法

    用小鱼际侧部或掌指关节部附着于一定的部位上，通过腕关节的屈伸和前臂的摆动、旋转运动，使攘动产生的力持续作用于操作部位上的手法。具有缓解肌肉和韧带痉挛、增加肌筋活力作用。其中常用手法是单手滚法，即用手掌背部近小指侧部分附着于一定部位上，掌指关节处略为屈曲，通过腕关节做主动连续的屈伸运动，带动前臂的外旋和内旋，使掌背部在宾客体表一定部位上进行持续不断的来回滚动。


    ## （3）一指禅推法

    用拇指着力于一定部位，运用腕部的往返摆动，使所产生的力持续作用于经络穴位上的手法。腕部摆动要快，拇指移动要缓慢。具有强健脾胃、调节脏腑功能。

    操作要点：

    1) 坐位姿势，使肘部的位置略低于腕部、肘关节不能外翘，腕部尺侧要低于桡侧，以使拇指着力于操作部位上。

    2) 悬腕，手握空拳，腕关节自然悬屈，在腕关节放松的状况下，使腕屈曲至 70° ~ 90°，拇指自然着力。

    3) 腕部向外摆动，肩关节放松，肩部不能耸起用力。拇指罗纹面着实吸定于操作部位，腕部向外摆动。

    4) 腕部向内摆动，肩关节放松，肩部不能耸起用力。拇指罗纹面着实吸定于操作部位，腕部向内摆动。


    # 4. 振动类手法

    以较高频率的节律性轻重交替刺激，持续作用于人体，称为振动类手法。


    ## （1）抖法

    用双手握住肢体远端做上下连续抖动，使关节肌肉产生松动感的手法。具有松解粘连、滑利关节等作用。常与搓法配合使用。

    操作要点：

    1) 抖上肢第 1 式法。宾客取坐位或站立位，保健按摩师放松其肩臂。

    2) 抖上肢第 2 式法。即抖手腕法。站在宾客前外侧，上身略为前俯，用双手握住腕部，慢慢将其向前外侧方向抬起至 60°左右，然后做连续的、小幅度的上下抖动，使抖动似波浪般地传递到肩部。


    ## （2）振法

    用指或掌着力于一定部位做强烈的振颤的手法。具有镇静安神、调节肠胃功能的作用。可以分为：

    1) 指振法。中指伸直，着力于经络和穴位，食指加压于中指指背，肘微屈，运用手臂的静止性用力，使肌肉强力收缩，发生快速而强烈的振颤，集功力于中指并传递到体内。

    2) 掌振法。用掌面着力于一定部位或捧夹住机体两侧做振颤动作。


    # 5. 叩击类手法

    用指、掌、拳或特制器械有节奏地叩打体表，称为叩击类手法。


    ## （1）拍法

    手指自然并拢，掌指关节微屈曲，用手腕部屈伸带动虚掌着力于受按摩部位，平稳而有节奏地反复拍打的手法。具有舒筋通络、解痉止痛的作用。可以分为：

    1) 指背拍打法。保健按摩师五指自然屈曲，用腕部屈伸带动手指，以指背拍打被按摩的部位。

    2) 虚掌拍打法。保健按摩师五指并拢成空掌状，在体表进行拍打。

    3) 五指散拍法。保健按摩师五指散开、伸直，顺肢体或肌筋的方向于按摩部位进行拍打的方法。


    ## （2）叩法

    以空拳或指掌尺侧叩击按摩部位的手法。具有通经活络、消除疲劳的作用。操作要点：以两手空拳的小指及小鱼际的尺侧叩击被按摩部位，以腕部屈伸带动手部，用掌根及指端着力，双手交替叩击被按摩部位。


    ## （3）击法

    用拳背、掌根、掌侧小鱼际、指尖或桑枝棒击打体表一定部位或穴位的手法。具有调和气血、安神醒脑的作用。可以分为：

    1) 指尖击法。用指端轻轻打击宾客体表，如雨点下落。腕关节要挺住，不能屈伸，利用肘关节屈伸力量击打。

    2) 拳击法。以单手或双手握拳，在臂力带动下，以空拳着力于被按摩部位，一起一落，有节奏地击打。或者以反拳（拳背）着力于被按摩部位，用贯力缓慢而轻松地击打，双手交替进行。

    3) 掌击法。手指自然分开、微屈，腕关节伸直或背伸，以掌根或小鱼际部位着力在被按摩部位，进行击打。


    ## （4）啄法

    手自然屈曲，以腕屈伸带动指端着力，垂直于被按摩部位，呈鸡啄米状的手法。具有安神醒脑、解痉止痛等作用。轻啄法起抑制神经作用，重啄法起兴奋神经作用。操作要点：五指微屈曲成爪状或聚拢呈梅花状，以指端着力，用腕部上下自然屈伸的摆动，带动指端啄击被按摩部位，形如鸡啄米状。双手交替进行啄击。


    # 6. 运动关节类手法

    对关节做被动性活动的一类手法，称为运动类手法。


    ## （1）屈伸法

    使关节被动屈伸运动的手法。具有滑利关节、理筋整复、松解粘连的作用。可以分为：

    1) 伸肩法。保健按摩师左臂肘窝抵住宾客肘下部，左右手十指交叉置于其肩上部，继而用力向上抬其肘使肩关节过度后伸。

    2) 伸肘法。保健按摩师一手扶宾客肩部，另一手握其肘部，做肘关节的屈伸活动。

    3) 伸髋法。保健按摩师一手扶宾客髋部，另一手按其膝部，做膝关节的屈伸活动。

    4) 屈髋法。宾客仰卧，保健按摩师站于宾客一侧，一手按住其膝部，另一手握其足掌部，使髋、膝、踝关节同时屈曲，随即伸直复原。

    5) 屈膝法第一式。宾客仰卧，保健按摩师立于宾客一侧，一手按住其腘窝上部，另一手握其踝部，做膝关节屈伸活动。

    6) 屈膝法第二式。保健按摩师一手托宾客踝部，另一手握其足掌部，做踝关节的屈伸活动。


    ## （2）拔伸法

    应用对抗力量对关节或肢体进行牵拉，使关节伸展的手法。具有整复错位、矫正畸形、减轻压迫刺激的作用。可以分为：

    1) 头颈部拔伸法。宾客取坐位。保健按摩师站于宾客后，用双手拇指顶按枕骨下方，掌根分别夹住下颌部助力，然后两手同时用力向上拔伸。

    2) 肩关节拔伸法。宾客坐于低凳上，上肢放松。保健按摩师站于宾客后外侧，用双手握住其腕部和肘部，逐渐用力向上拔伸，嘱宾客身体向另一侧倾斜或有一助手协助固定其身体，以牵拉之力相对抗。

    3) 腕关节拔伸法。一手握宾客前臂下端，另一手握其手部，两手相对用力做腕关节拔伸活动。

    4) 指（趾）关节拔伸法。一手握住被拔伸关节近侧端，另一手捏住远侧端，两手相对用力做指趾关节拔伸活动。


    ## （3）摇法

    使关节做被动的环转活动的手法。具有滑利关节、松解粘连、整复错位的作用。可以分为：

    1) 颈项部摇法。保健按摩师用一手扶住宾客头顶后部，另一手托住其下颌，双手协同做相反方向的左右环转摇动。

    2) 肩关节摇法。保健按摩师用一手扶住宾客肩部，另一手握住腕部或托住肘部，做环转摇动。

    3) 肘关节摇法。保健按摩师一手握宾客肘部，另一手握其腕部，在肘关节屈曲位的基础上做环转摇动。

    4) 腕关节摇法。保健按摩师一手握宾客腕部，另一手握其四指，做腕关节环转摇动。

    5) 腰部摇法第一式。宾客端坐，保健按摩师用一手搂压住宾客一侧肩部，另一手抱于其同侧腰部，然后做腰部逆时针方向的摇动。

    6) 腰部摇法第二式。宾客取站位，双手高举握杠，放松腰部。保健按摩师双手握宾客腰部，做顺时针摆动。

    7) 髋关节摇法。宾客仰卧，髋、膝屈曲。保健按摩师一手托住宾客足跟，另一手扶住膝部，做髋关节环转摇动。

    8) 踝关节摇法。宾客仰卧，下肢伸直。保健按摩师一手托宾客足跟，另一手握其足掌部，在稍用力拔伸的同时做踝关节环转摇动。


    # （三）复方精油的调配原则

    芳香按摩前的首要任务是对精油的挑选，因为挑选精油时关注的不仅是精油具有何种香味，更重要的是要看它有什么治疗功效。


    ## 1. 调配原则

    - 1) 当调配一种气味强烈的香料时，最好一点一点添加某种精油，直到合适为止。

    2) 配制精油时，要记录配方。

    3) 当调配香料时，要使用玻璃容器。塑料容器会黏附香气分子，混制时更不能用金属物体，最好使用玻璃棒。

    4) 用过的调制器材，要用强效的肥皂溶液清洗干净，用酒精擦拭干净，以去除芳香分子。反复清洗后，用干净水漂洗干净，烘干备用。

    5) 要购买蓝色或琥珀色玻璃瓶贮存混好的香料，如果用软木塞密封瓶口，外面要用石蜡密封，以防止氧化；如果用的是螺旋盖，里面要有衬垫。

    6) 当在家里调配香水时，要把精油加到酒精或基础油里，所用的酒精是乙醇，为了方便，也可以用伏特加酒。

    7) 基础油最好选择荷荷芭油，它实际是一种液体蜡。荷荷芭油保留香气的效果非常好，它本身也没有很深的颜色。

    8) 当调制香水、梳妆水或是科隆香水时，要根据需要选择酒精或伏特加酒或基础油作为底料，然后一滴一滴地添加精油。

    9) 香水中精油的使用比例较高，为了预防发生过敏反应，如果是从来没有用过的油，要先做皮试。'
