    是小规模的战斗，身体在几日的不舒服后就复原了，但是，如果遇到致命性的病原菌时，结果就是重病、死亡，甚至改变人类的历史。


    一些植物精油不仅可以抑制病原菌，更可以提高自体免疫机能，强化人体的自愈力，芳香疗法按摩可以帮助身体与心灵合而为一，提供更深度的放松效果。


    # # 1. 发烧


    发烧不是严重的疾病，是身体抗击感染保持健康的一种机制。如果发烧温度太高，会引起抽筋甚至精神错乱（暂时性的），这会影响到大脑。


    # ### （1）症状


    发烧的其他症状还有，反应迟钝、冷漠、意识不清或眼睛不能翻转。发烧的病因一般是身体受到感染性物质的侵染，如细菌、毒素、寄生虫和其他的微生物。发烧也可能是因为患流感或感冒引起的。


    发烧是身体发炎的一种表现，如阑尾炎、盲肠炎、大肠炎或风湿性关节炎。癌症和白血病会引起持续低烧。


    # ### （2）饮食调理


    要饮用充足的液体，像果汁和矿物质水，以弥补水分的流失。做一些草药性的茶，如洋甘菊、桉树、迷迭香和百里香，添加蜂蜜，水温适当时饮用（在600mL的开水中添加15mL的蜂蜜，7分钟后饮用）。


    # ### （3）精油调理


    配制些按摩油有助于缓解发烧，可用它按摩太阳穴、脖颈后部、手指和脚趾。


    可以参照下面所列配制按摩油：15mL月见草油、2滴尤加利精油、2滴薰衣草精油、2滴椒样薄荷精油、1滴黑胡椒精油、1滴茶树精油、1滴迷迭香精油。


    # # 2. 干草热


    干草热是一种过敏症。这种过敏性反应容易自发，能影响到身体的任何部位。最常见的过敏症是哮喘、干草热、皮肤问题和皮疹，如麻疹和湿疹。


    食物过敏症一般是不容易察觉的，不过，腹胀、消化不良和腹泻可能就是食物过敏的症状。事实上，过敏症是免疫系统对环境中无害物质的一种过度的反应。这些物质包括灰尘、花粉、动物的皮毛、牛奶、鸡蛋、小麦、玉米、青霉素、阿司匹林、化妆品、洗洁净和服装上的珠宝金属。


    可以饮用由松针、尤加利叶片或玫瑰果的煎剂。也可以在水中煮一些尤加利叶片，在你睡觉前，把这种液体喷洒在整个房间里，尤其是卧室，或用尤加利精油喷洒在房间里。


    在手帕上滴几滴尤加利、绿花白千层或茶树精油，当病情发作时使用。'
