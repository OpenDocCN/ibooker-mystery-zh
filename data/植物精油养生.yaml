    # (1) 精油性质


    白千层精油具有相当刺激的甜味。


    # (2) 来源


    白千层树又称白茶树，原产于马来半岛沿岸的平原。它是一种生长旺盛的常绿树，高可达30m，树皮发白、柔软，多孔像海绵，树干弯曲。在古印度，被人们称为卡亚菩提，甚至在东方，也受到人们的尊敬，因为它有神奇的功效。不仅能用来做化妆品和香水，而且具有杀菌防腐的效用，还是治疗胃病的传统良药，对霍乱、风湿病均有疗效。人们也用它作杀虫剂。


