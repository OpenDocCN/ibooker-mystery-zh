    芦荟是一种很好的植物。它能帮助抑制感染、减轻疼痛和瘙痒，加速伤口愈合，是一种极好的皮肤保湿材料。另外，芦荟能有效地增强身体的免疫能力，可以自然地调节皮肤 pH
    值的平衡。


