  md: '1) 柠檬戟叶马鞭草精油有助于治疗消化系统方面的腹部绞痛和消化不良，还可以帮助狂欢和宿醉后的肝脏恢复。


    2) 对消化系统的刺激作用，表现在帮助消化脂肪，还能预防脂肪硬化和酒精中毒，它还能抚慰呼吸系统，缓解心悸，它的这种舒缓功能还有助于性方面问题的解决。


    3) 柠檬戟叶马鞭草精油有助于缓解压力，以及清新身体和精神，同时还能振奋精神和缓解压力。


    (6) 使用注意事项


    柠檬戟叶马鞭草精油没有太多的安全方面的数据，但是由于柠檬醛的含量较高，可能会引起光敏性反应。


    (7) 用法


    这种精油有助于调节神经系统的功能，尤其是有关消化系统疾病方面的神经调节功能；它还是良好的肝脏滋补品，同时还能软化肌肤和帮助缓解僵硬现象。


    1) 香炉和蒸发器熏香


    在蒸汽疗法中，柠檬戟叶马鞭草精油可以用于治疗神经系统，在情绪低落和感到压抑的时候，有缓解压力的作用。


    2) 做复方按摩油或稀释在浴盆中使用


    柠檬戟叶马鞭草精油做复方按摩油或稀释在浴盆中使用，可以用于治疗消化问题，促进肝脏功能，治疗失眠和神经衰弱，帮助缓解呼吸系统的问题，如支气管炎和鼻窦炎。它也可以用于调理肌肤。使用时，要留意可能发生的过敏反应。


    3) 做面霜或润肤乳的成份


    用于面霜或润肤乳时，柠檬戟叶马鞭草精油可以降低皮肤的僵硬度，软化肌肤。但要谨慎使用，它可能会使皮肤具有感光性和产生光敏反应。


    (8) 适合与柠檬戟叶马鞭草精油混用的精油


    柠檬、榄香、橙花和棕榈玫瑰精油。


    # 8. 苦橙叶精油


    苦橙叶精油是从苦橙植物（Citrus aurantium var. amara，Citrus bigardia and petitgrain bigarade）的叶片中提取的，属于芸香科。


    这种味道清新、洁净的精油最有利用价值的地方在于能够激发你的大脑有意识地接受知识，同时，还能平息愤怒和恐慌。它具有很好的放松疗效，可以使快速跳动的心脏平缓下来，有利于入睡。它在护肤方面，可以清洁油腻皮肤和治疗皮肤上的瑕疵。


    (1) 精油性质


    苦橙叶精油有股木头气味，同时有花的香味。这种精油的颜色淡黄或琥珀色，水质般的黏性。'
