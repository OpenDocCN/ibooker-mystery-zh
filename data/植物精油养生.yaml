    # # 6. 榛实油


    **榛实**（*Corylus avellana*）油含有大量有价值的脂肪酸精华，包括亚油酸。它有种淡淡的坚果的香味，有很强的穿透力，延展性也很好。它是含有最多不饱和脂肪酸成份的植物油之一。


    它被认为是一种有助于调理肌肤、使肌肤紧致的油，还可以强化毛细管功能，帮助细胞再生。在民间医学中，人们使用它给孩子按摩，来治疗呼吸系统疾病。榛实按摩油有很强的保湿作用，选择它作为混合按摩油成份或是混合基础油的成份，都是理想的。榛实油还有很好的收敛功效（可以帮助维持皮肤的紧实感和弹性），适用于油性和混合皮肤。


