    # (四) 樟脑味类精油


    # 1. 白千层精油


    白千层精油是从白千层树（Melaleuca cajuputi）中提取的，属于桃金娘科，又称白茶树、哭茶树。这种精油在治疗消化、皮肤问题和帮助精神平衡方面，具有明显的疗效。它还使精神振奋，驱逐呆滞的感觉。


    # (1) 精油性质


    白千层精油具有相当刺激的甜味。


    # (2) 来源


    白千层树又称白茶树，原产于马来半岛沿岸的平原。它是一种生长旺盛的常绿树，高可达30m，树皮发白、柔软，多孔像海绵，树干弯曲。在古印度，被人们称为卡亚菩提，甚至在东方，也受到人们的尊敬，因为它有神奇的功效。不仅能用来做化妆品和香水，而且具有杀菌防腐的效用，还是治疗胃病的传统良药，对霍乱、风湿病均有疗效。人们也用它作杀虫剂。


    ![](img/9a4032e2e8ad73992ff2b2bd7fc25509_83_0.png)


    白千层 Melaleuca cajuputi


    # (3) 提取方法


