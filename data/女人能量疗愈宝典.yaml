  md: '已療癒自身靈性的年輕女性，將成為一座指引周遭人們的燈塔。她能毫不費力的與親友共享女性宇宙性特質。並運用自身的判斷力評定世間事物價值。她擁有自尊並確認身分認同的體驗，因此沒有任何人可以控制或操弄她。她所作的決定能夠增進她與自己及她人的關係。對她來說，愛自己的身體是如此自然，因為她知道，自己的身體是女性的宇宙性能量的顯化。她不會為男人犧牲自己的純真或個人力量。她也會耐心等待自己的道途出現，然後熱切的擁護它。


    已療癒自身靈性的成年女性，會選擇一個尊重她的女性特質，並與她平起平坐的伴侶。她會自由的分享她的力量、創造力及內在光采，並為家庭提供一個健全的環境。她會付出特別的關懷來滋養自己的孩童。同時也會參與滋養自己並支持她靈性成長的世間活動。


    已療癒自身靈性的熟年女性，會經驗豐富的內在生命。因此她並不畏懼死亡。雖然她已經年長，仍持續愛著自己的身體，溫柔、尊重的對待它。她會自在分享自己的智慧，幫助年輕人有尊嚴的強健、成長。因為她已療癒了自己的靈性，不會對任何事即使是年輕時的錯誤感到後悔。因為她在身心靈層面，一直敞開心胸擁抱女性的宇宙性特質，她會受到同輩的尊崇。此外，身為長者，她也會持續對社區做出貢獻。'
