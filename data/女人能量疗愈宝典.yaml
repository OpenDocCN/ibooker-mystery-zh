    ## 女性腦部


    人類心智的物質部分包含腦、神經系統及支持它們的體內化學物質。腦部控管身體許多功能，並持續和心智另外兩部分交流互動。不過，並非所有人的腦皆相同，溝通中心及情緒記憶中心，在女性腦部中所占體積皆大於在男性腦部中所占體積。因此，女性腦部發展出比男性腦部優異的能力，來解讀口語及非口語的細微暗示。


    由於這些差異，女性首要重視溝通、連結、情緒感知及回應，這解釋了女性爲何崇尚上述特質勝過其他，也能解釋爲何有些人會忽略這些特質，因爲他們無法理解這些特質的重要性，他們可說是男性腦部取向的人。


    雖然科學研究讓我們明白，腦部、神經系統及荷爾蒙所扮演的角色。在現今科學界或其他學門如心理學、生物學或哲學中，仍少有人探討女性腦部與男性腦部大大不同的這個顯著事實（吳爾芙〔Wolf〕2005）。


    ## 多重任務處理的問題


    多重重務處理的案例特別不幸，因其同時進行多種活動的特性，會干擾女性腦部及精微能量場的運作。


    研究者指出，對心智來說，多重任務處理是種暴力形式。因為多重任務處理在同一時間內重複啟動腦部功能，沒多久，正常腦就會開始仿照上癮人格的腦部結構（漢澤爾（Hazel）2012），這對女性及其關係傷害極大，因為腦部影響心智網絡，而心智網絡的主要功能，就是以整體方式接受他人訊息及與其溝通。


    我們所指的整體方式是指，身體語言、話語及氣的勃發，經由腦部接收、轉譯，被精微能量場及心智網絡運用，進而創造出完整體驗。


    由於大眾心中已有父權取向的偏見，我們也不訝異，爲什麼鮮少有人探討科學或社會形式變遷，如何干擾女性腦部的功能運作，以及這些干擾如何影響女性與家庭、自我及物質界非物質界生態的各種關係。


    打字、閒聊、玩電玩及多重任務處理，都會干擾腦部正常的化學反應，並造成精微能量場的重大壓力，心智網絡及正常的接收與溝通功能也隨之崩解。


    多重任務處理，不但毀損正常腦部化學作用及人類能量場，也阻礙腦部及精微能量場進行活動整合，它還干擾女性判斷事物優先順序的能力，使其難以辨認事情重要與否。


    時間一久，多重任務處理會阻塞氣在脈輪及手腳部小型能量中心的流動。這讓女性難以和地球連結，共享豐盛，也毀損女性的同理心及達成、維持親密感的能力。


    由於多重任務處理對女性造成許多問題，本章收錄核心場冥想，協助妳克服多重任務處理造成的最頹圮局面，讓妳能繼續同理他人並與他們共享宇宙性特質的能量。


    ## 核心場


    核心場是穿透精微能量場的幾個資源場之一。不論古今，都少有文獻探討資源場及其重要性。不過，依照我們的工作經驗，當妳的個人身分認同感自能量體、鞘及精微能量系統形成後，妳的資源場會提供精微能量場和精微能量系統所需的意識和能量，協調其活動及健全運作。


    ## 核心場冥想


    在核心場冥想中,妳會體驗到心智功能——意圖、意志、渴望、耐力、臣服、接納、洞悉、選擇、承諾、拒絕、信心、享受、破壞、創造、同理及愛——成為大型意識場的一部分,也成為盈滿、環繞妳能量場之能量。一旦妳放鬆下來,就能安住在核心場中。然後妳能在核心場層次上向內觀照感官,這能讓妳清楚感知核心場。下一步,妳將選一項自己需要提升的心智功能,運用妳的意圖讓核心場充滿氣。


    首先以一個舒服的姿勢安頓好自己,背部打直,選一項想要提升的心智功能。我們在這選用享受作為範例。選好後,閉上雙眼,鼻吸鼻呼,深呼吸一到三分鐘,從五倒數到一,再從十倒數到一。運用標準法門,讓自己放鬆並安住在真實心智中。然後宣告:「我要安住在核心場中。」繼續宣告:「我要在核心場層次上向內觀照感官。」安靜幾分鐘,享受能量流動。再宣告:「我要讓自己的核心場與享受的相關區域充滿氣。」花十五分鐘感受核心場的轉變。然後由一數到五,結束此冥想。數到五時,睜開雙眼。妳會感到非常清醒,全然放鬆,感覺比之前更好。當妳需要時可做此練習。


    # 第六章 獨特的女性心智


    ## 獵人及採集者


    獵人(男性)及採集者(女性)需要不同的心理能力來增加生存機會,這解釋了為何有些男性在某些認知能力遠勝於女性,像是空間感、數學推理、方向定位及目標導向的行動能力——這些對獵人來說都是有利的能力。相對而言,女性通常有較佳的口語技巧,也能較快接收事物。在多數例子中,女性可以輕易記得路上的許多細部特徵,也能較快完成精細任務,這些都是對採集食物及維繫家庭和文化傳承有利的能力。


    性荷爾蒙是造成這些差異的主要原因。因此。許多女性擁有理解細微臉部表情及情緒暗示的能力。


    美國基因學家,同時也是女性身心健康領域領導權威的克莉絲汀·諾索普(Christine Northup)博士發現,女性心智有其特殊之處。由於荷爾蒙的影響,女性的胼胝體比男性的更大也更厚。胼胝體是連結腦部左右半球的部分。


    在功能層面上,這意味著女性同時透過腦部認知中心及身體來體驗事物,進而了解及獲取知識。也就是說,實際上,女性的身體及心智是同時運作,而女性平均說來比男性發展出更多的身體智慧(沃克(Walker)2007)。


    ## 抗憂鬱冥想


    縱使性荷爾蒙能帶來許多正面影響，當女性性荷爾蒙平衡受毀損時，能導致腦部進入憂鬱狀態達數月之久，心智網絡會自許多能量層面互動中抽離。童年的制約、創傷及來自他人的投射，皆可讓這情形加劇。在西方社會中，憂鬱的比例已達歷史新高，所以此章也收錄了抗憂鬱冥想。


    妳應一天練習一次抗憂鬱冥想，最好在早晨練習，持續到憂鬱症狀消失為止。


    要開始抗憂鬱冥想，首先以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。


    放鬆後，將心智注意力集中在右半腦，維持二到三分鐘。然後，將心智注意力集中在左半腦，維持二到三分鐘。試著察覺兩邊腦部感覺的差異。是否有一側的溫度感覺比另一側更溫暖？是否有一側比另一側感到較多壓力？是否有一側感覺麻木而另一側不會？是否有一側感到不舒服而另一側不會？試著察覺這些差異，需要花多久時間就花多久時間。然後用右拇指用力按壓頭頂的穴點（見圖11）十秒鐘，十秒後，放開拇指並等待十秒鐘，按壓再放開的過程共重複三次。


    透過刺激穴點，可以促進氣流經腦部及第六、第七脈輪。想更進一步增進氣的流動，妳可以宣告：「我要促進氣在我的腦部流動，回復平衡及和諧。」花十五分鐘享受這個過程，然後由一數到五，結束此冥想，數到五時，睜開雙眼。當妳需要時可做此練習。


    ## 業力包袱與心智


    一個女性的業力傳承，以現世及前世業力包袱的形式呈現。女性心智可能會受到它們的負面影響，因為業力包袱會干擾她的精微能量系統功能（脈輪、氣場、經絡及小型能量中心）。


    第四章提及，業力包袱是股稠密、自我設限又帶有個別特質的能量，女性（及男性）在精微能量場中累世帶有這股能量。


    業力包袱所創造出的依存，會以三種方式影響女性的精微能量場及心智：限制女性與氣的連結、創造出不為女性心智所需的局限模式（人格議題），及促使女性依附於童年或前世未處理完結的對象及關係議題。


    心智層面投射在大多數情況下會造成依存，對他人的依存以能量索方式呈現，能量索類似細長管狀，整條管狀直徑一致。當人們變得與自身能量場上的業力包袱相依存，然後將業力包袱以能量索方式投射出去時，即可阻滯被投射對象的能量場。這就是依存的發展機制，只要加害者還對其目標抱持虛假幻象，認為有他想要的事物，依存就此被創造出來。


    能量索的另一特質為，即使加害者或目標過世，能量索仍不會消失。這意味著妳可能依存於前世認識的某人，大多數情況是累世依存於某個前世情人。若其將能量索投射進妳的能量場，這種連結將干擾妳與今生所愛之人共享女性能量的宇宙性特質。


    重點是，前世情人也像妳一樣，是跨次元的存有。即使他們過世，其投射出的業力包袱及能量索也不會消失。一段時日後，它們也會隨轉世過程進入新的軀體。這意味著，妳可以累世持續依存於某個前世情人，這種依存也創造出妳對前世情人某項或某幾項最顯著特質的渴望。


    ### 蕾娜的故事


    當然,若情人已過世,妳自然無法找到對方。就算他們已經轉世,也可能是在彼此不適配的年紀或遠在世界遙遠的另一端。即使找到,若彼此進化方向不同,可能妳也不再想要這個愛人了。凡是持續依存於某前世情人和他們的某項特質,都會毀壞妳能量場的功能,並阻礙妳整合心智三元素,創造完整體驗。


    幸運的是,即使妳不記得前世情人,妳也可以透過切斷聯繫彼此的能量來克服依存。也許妳會懷疑,要如何克服對已逝者或根本沒有印象人士之依存。這是可能的,妳不必知道對方的名字或模樣,甚至不需知道彼此在前世關係如何。唯一要做的是,將妳不斷渴求的特質或毀損妳與所愛共享氣之能力的特質,隔離出來。如此,就能將前世情人投射進妳的能量場的能量索,隔離出來。當能叒索被隔離出來,就能運用合適的心智功能,切斷依附於妳的能量連結。


    蕾娜的故事顯示了能量索所造成的前世情人依存,如何干擾了女性的生活及關係。蕾娜,一位來自德國漢堡的三十一歲女性,在第一次的療程中,向我們提到,她最近遇到一個完全符合她所愛類型的男性。事實上,他們之間的吸引力強烈到第一次約會就決定和他發生關係。


    他們的約會始於在漢堡最好的餐廳共進晚餐。晚餐後,蕾娜和朋友到她的公寓,一起喝了點酒,然後開始愛撫對方。即使過程符合蕾娜浪漫的想像,她卻無法放鬆,肌肉持續緊繃,知道自己的身體語言透露出矛盾的信號,但她仍設法在當晚繼續這段關係,性交過程並不舒服,她仍勉強自己。


    蕾娜敘述完這段經驗後,接著說她其實從未達到高潮也無法與男性共享性愛。療程即將結束時,我們檢視她的能量場,發現有條能量索讓蕾娜依附於某位前世情人。這條能量索位於最麻煩的位置之——第二脈輪。


    在下一個療程裡,我們協助她釋放能量索,蕾娜立即感到煥然一新,身心舒暢。我們向她解釋,由於第二脈輪受阻,她的精微能量系統無法順暢配送氣。沒有足夠的氣,她就無法與男性共享令人滿意的性愛體驗。


    ## 切斷前世連結


    要釋放妳與前世情人間的能量索,首先選出一種渴望的感受或某種阻礙,這種感受或阻礙,持續干擾妳與他人共享女性的宇宙性特質。選好之後,以舒服的姿勢安頓好自己,背部打直,閉上雙眼,鼻吸鼻呼,深呼吸二到三分鐘,從五倒數到一,再從十倒數到一。運用標準法門讓肌肉放鬆,並安住在真實心智中。放鬆後宣告：「我要在面前創造一面二點五公尺的螢幕。」當螢幕浮現，開始持續持至樂幸福手印。然後宣告：「我要覺察那條能量索，它造成我所選擇釋放的（在此填入感受或阻礙）。」花幾分鐘觀察能量索。能量索呈現細長狀態，從妳的能量場延伸至加害者的能量場中。


    能量索檢查完畢後，宣告：「我要創造一個氣團來包圍心中所想的能量索。」然後宣告：「我要在這個氣團中注入幸福並釋放能量索、能量索來源及其延伸部分。」


    釋放能量索後，妳會感受到能量場的變化。壓力會消失，氣會更自由的流動。妳能更輕易讓自己保持安住真實心智中的狀態。像蕾娜一樣，妳可能會感到煥然一新，身心舒暢，也會有更多舒適的感覺自能量場出現。


    一旦妳釋放了能量索，讓氣團及視覺螢幕消失，然後鬆開至樂幸福手印，再花十分鐘享受這練習的效果。十分鐘後，由一數到五然後睜開雙眼。妳會感到非常清醒，全然放鬆，感覺比之前更好。和釋放前世相連的能量索一樣，相同的技巧也可被運用來釋放妳今生中與他人間相牽連的能量索。當妳需要時可做此練習。


    ## 總結


    在本章中，妳學到女性心智由三部分組成，每一部分有其獨特的能力及需求。妳也做了各種練習，它們分別被設計來克服憂鬱、提升與地球間的連結、遠離多重任務處理的高度干擾，並釋放與前世人間的依存。


    下一章妳會學到被動—侵略性模式，如何阻礙妳以健康方式顯現自身力量。然後透過擁護中庸之道，釋放持續毀壞妳生命和關係的被動—侵略性模式，來提升自己的力量。


    # 第七章 提升女性力量


    在早期世代，透過教化過程及不對等期望、機會、獎勵及懲處，男女雙方被灌輸了男性天生比女性更有力量的信念。直至現今，這種不平衡仍普遍存在於多數社會及制度中。


    這種不平衡並不只因暴力、法律歧視或社會壓力而增強。在許多社會中，男性和女性一樣飽受壓迫，被強迫接受社會的核心價值觀。這些社會為了達成目的，根據性別（性別角色）制訂了人類性格清單，期待男性及女性毫無疑問的接受，並將這些特質融入自己的生活中。


    這些社會通常要求女性應該關懷他人、溫柔、接受度高、有耐心、貞潔、富吸引力及感覺豐富等等。這些特質對女性來說是自然的，對男性來說也是。不過，直至最近，歐洲、中東及北美社會仍舊要求女性接受上述特質，作為她們的核心價值。而男性，特別是當權男性，則可以任意拒絕上述特質，接受另一套他們被教導要奉行為男性圭臬的價值，那些價值包括競爭、果斷、野心、理性、堅毅及侵略性等。


    若有人不接受被分派的特質，通常會遭受嘲諷、拒絕、指控，或者更糟的受到暴力對待。局限的信念及童年的早期制約，也會一併削弱人們自然表達自身力量的能力。由於核心價值的改變速度十分緩慢，因此，許多人及制度仍固守著那些讓女性難以接受的女性能量以及成就它們的潛能。


    ## 中庸之道


    本章將解釋，對於那些時值二十一世紀、仍被加諸於女性身上的性別特質，妳還有另一種選擇。這個選擇是中庸之道：一種平衡的生活，包含同理心及自在表達自我及女性宇宙性特質的力量。擁護中庸之道。女性可以在工作中或任何生產活動中，如同男性一樣表現，甚至表現得更好。因為她會擁有足夠的力量或能量，來支持她前進並確保結果成功。擁護中庸之道，女性將可達成自己的目標而不受過往包袱拖累。


    開始探究中庸之道前，請先記得，男性認為理所當然的力量及自在表達力量的自由，對於女性來說，並不總是輕易可得。事實上，關於女性的負面神話故事，在在提醒著我們，過往女性要擁抱她們的女性能量及誠實表達自我，是如此艱難。


    ## 關於給予力量的負面神話


    古希臘，現代西方世界文明的誕生處，充滿許多關於有力量女性的負面神話。像是透過凝視可讓男人石化的美杜莎、希臘萊斯博斯（Lesbos）島的女性、發動對抗男性戰爭的亞馬遜女戰士（Amazons），都是即刻浮上人們心頭的典型。另外還有瑟絲（Cleo），善於引誘男性並剝奪他們的男性能力，以及塞倫（Siren），她的歌聲能讓最有力量的男人也為之瘋狂。


    當然，不只希臘對有力量的女性抱持敵意。早期的不列顛人也視有力量女性為威脅。亞瑟王的姊妹摩根（Morgan），就是讓人聯想到的例子。摩根是個有力量的女性，但對那些囿於中古世紀思維的男性來說，將她視為狡詐、對權力虎視眈眈的女巫，要比視為有力量且散發光采的女性容易得多。


    在現代社會中，充滿力量並散發光采的女性，也許不會被拿來與石化男人的美杜莎或先迷惑男人再剝奪他們力量的摩根相比較，但她可能在嘗試宣告自己力量時，受到強力批判。若女性是有力量的並試圖在男性世界中取得成功，她很可能要冒著被貼上標籤的風險，這些標籤像是難搞、狡詐、易怒或更糟的字眼等。


    雖然這些帶著貶抑意味的神話和形容詞，仍被用來貶損有力量的女性，並削弱她們追求當權位置的想望。但這些貶抑神話及形容詞的描述並不真實，反而加深男性對於自由女性及她們天生力量的不合理恐懼。


    無疑的，這些神話仍具備其影響力，它們打擊許多年輕女性的志向抱負，而支持被動侵略性的人格模式，讓女性對自己及其女性力量的信任感降低。


    ## 長舌鉤


    中古時代,女性幾乎無法以健康的方式宣告自身力量,若女性因為對丈夫喋喋不休,或是試圖以被動的侵略行為影響丈夫等罪名被起訴並判有罪,她們可能就會被強迫戴上長舌鉤。


    長舌鉤是一種由金屬和皮革組成的裝置,放置在嘴中並在後方固定。這種裝置設有帶著尖刺或鋒利邊緣的壓舌器。放進女性嘴裡之後,她一說話就會疼痛。這裝置用來羞辱因喋喋不休而被男性議會判定有罪的女性。有時,長舌鉤還會在前端附上一條鏈子,便於牽著受刑者遊街示眾或將她綁在柱上。


    長舌鉤在歐洲被廣泛使用,甚至在十七世紀的美洲也有人使用。在有些判例中,只因丈夫指控妻子喋喋不休,妻子就得戴上這種刑具。不同意丈夫意見的女性、散布流言或輕微冒犯他人被判有罪的女性,都可能被強迫戴上長舌鉤。


    ## 被動—侵略性遊戲


    支持僵化性別角色的核心價值觀,仍在媒體、教育及許多家庭所抱持的態度中出現。想當然耳,許多人士仍然繼續擁護被動—侵略性行為。


    許多被動—侵略性遊戲，仍為現代女性所參與。以下列出了最普遍的三種，妳也許可以從自身或親友經驗中察覺到至少一種。


    ### 誘惑


    誘惑能以性遊戲或操弄形式來呈現。不幸的是，在許多社會中女性所受的教育，是運用誘惑從男性那得到自己想要的事物，視此為理所當然。即使時至今日，在許多社會中，女性透過誘惑方式來操弄男性，將難以和通常源自精微能量場的力量連結。


    ### 喋喋不休


    受挫的女性，或在孩提時代學會向雙親喋喋不休的女性，通常會對伴侶或家中其他男性繼續這樣的模式，以得到她們想要的。喋喋不休是無力感的極端表達方式，任何習於此種模式的女性，會因缺乏自尊而受苦，因為她無法自由表達自我的真實力量。


    ### 內疚幻象


    有些感到自己缺乏力量的女性，會運用男性的弱點或男性顯露的負面性格，讓他感到內疚。內疚幻象的危險在於，它會毀損親密感並創造出一種不良環境，必然摧毀親密伴侶間的必要信任與愛。


    ## 克服被動—侵略性模式


    若覺得十分擅長運用被動—侵略性模式得到自己所要的，可以做接下來兩個練習。第一個練習是原型跳躍，第二個則是督脈練習。


    在原形跳躍練習中，妳將以能夠提升我們力量、創造力及內在光采的肯定生命原型，取代已被整合進人格中的被動—侵略性模式。在督脈練習中，妳可以透過增強流經督脈的氣流，來增進自己的力量。


    ### 原型跳躍


