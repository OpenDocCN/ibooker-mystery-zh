    長舌鉤是一種由金屬和皮革組成的裝置,放置在嘴中並在後方固定。這種裝置設有帶著尖刺或鋒利邊緣的壓舌器。放進女性嘴裡之後,她一說話就會疼痛。這裝置用來羞辱因喋喋不休而被男性議會判定有罪的女性。有時,長舌鉤還會在前端附上一條鏈子,便於牽著受刑者遊街示眾或將她綁在柱上。


    長舌鉤在歐洲被廣泛使用,甚至在十七世紀的美洲也有人使用。在有些判例中,只因丈夫指控妻子喋喋不休,妻子就得戴上這種刑具。不同意丈夫意見的女性、散布流言或輕微冒犯他人被判有罪的女性,都可能被強迫戴上長舌鉤。


