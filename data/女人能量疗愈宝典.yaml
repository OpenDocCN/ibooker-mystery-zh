    當妳經歷創傷事件，流經妳的能量場的氣就會受到毀損。若妳移除了導致創傷的入侵能量，並重新整合散失的能量載體，如此可回復部分的能量流。不過，想讓能量之流回復至健康層級，必須重新啟動身體空間的十三個脈輪，還有身體空間上方的六個脈輪。


    # 啟動第一到第十三脈輪


    要讓能量場的氣回復流動，先以舒服的姿勢安頓好自己，背部打直。閉上雙眼，鼻吸鼻呼，深吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要啟動我的第一脈輪。」繼續宣告：「我要安住在第一脈輪場中。」以同樣的方式啟動第二、三、四、五、六及七脈輪，然後讓自己安住在其對應的能量場中。以相同方式啟動上部及下部的身體脈輪，及上部與下部的身體一物質脈輪。花幾分鐘享受其效果，然後啟動身體空間上方的第八、九、十、十一、十二及十三脈輪，再讓自己安住在其對應的脈輪場中。當十三個脈輪全被啟動，讓自己安住在身體空間的十三個脈輪場，及身體空間上方前六個脈輪場，宣告：「我要在身體空間十三個脈輪場及身體空間上方前六個脈輪場的層面上，向內觀照感官。」最後宣告：「我要讓第一至第十三個脈輪場及身體空間上方前六個脈輪場充滿氣。」


    安靜十五分鐘，享受妳所體驗到的改變，然後由一數到五，數到五時，睜開雙眼，妳會感到非常清醒，全然放鬆，感覺比之前更好。規律做這個練習，能讓氣在脈輪及脈輪場中重新回復流動，讓你克服眾多創傷事件遺留下來的後遺症。


    # 療癒前世創傷


