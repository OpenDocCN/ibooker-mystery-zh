    ## 序言


    妳的內在擁有無限的力量、創造力及內在光采，在《女人能量療癒寶典》書中，妳將運用自己的無窮力量，從身心靈層面、人類能量場及疾病根源療癒自己。


    《女人能量療癒寶典》一書的促成，有兩個理由。第一，讓讀者明白，如何療癒阻礙良好健康、活力及親密關係的業力模式，及身體不適。第二，幫助那些準備好體驗更深的自由及喜悅的讀者，擴展自己的界線，去經驗充滿無限平靜、力量與自由的內在自我。


    透過本書收錄的技巧，不論身處何種環境，妳都能體驗內在嶄新的世界，外在一時之間也許難以改變，但內在改變才是至為重要且最為持久，因為所有在身心靈層面療癒自己所需的意識、力量及創造力，都已在妳的內在之中。


    在本書中，妳將學會運用脈輪療癒、業力釋放、帝王瑜伽、按摩、舞蹈、冥想及肯定語等，永久提升自己的身心靈層面。


    書中的每一章，分別探討一個限制妳展現力量、創造力及內在光采的能量議題，以身體層面及精微能量與意識層面，來分析這議題，然後提供有助盡速療癒該議題的簡單練習。


    妳將學會愛妳原本不喜歡的身體部位，來增加自信心，學會運用心智功能克服局限的信念，還有學習創造肯定生命的生命原型，以增加自信和內在力量。其中有兩章探討脈輪療癒，還有一章探討，不論身處何種年紀，都能提升內在美及外在光采。此外，我們也特別著重療癒前世創傷、童年早期創傷及許多女性在懷孕時所遭受的失去胎兒創傷。


    妳會學到創造療癒空間來療癒自己及所愛之人，並利用簡單技巧提升自己的直覺、創造力及感官體驗。當妳找到自己的道途（人生目的及路徑）後，療癒才算完整。因此，我們提供了一套簡易法門助妳穿越阻礙找到道途。最後，妳會學到如何將傳統關係轉化成超凡關係，並和親友們分享所學。


    和其他書籍不同的是，妳能從本書中學會，從精微能量場的根源，展開對傷害、創傷及業力模式進行療癒。透過掌握自己的療癒過程，並觸及議題根源，妳將親身體驗到，喜悅、滿足的生活所需元素，早已在妳的內在之中。


    凱斯和薩賓娜在一起長達十五年之久，擁有三十年以上的療癒經驗，於北美、歐洲及非洲為各年齡層的男女案主一同合作。


    ## 第一章 來自宇宙的女性能量


    當女性能量自宇宙意識中升起，這股充滿創造力的能量就變成了演化的原動力。女性能量不僅充滿於廣裘宇宙之中，世上所有女性也都帶有這股能量，以此創造、繁衍後代，生生不息。


    女性能量存在於我們四周，帶來歡慶生命的力量，鼓舞人們彼此連結，體驗親密的感受。每個人與生俱來這股能量，因此，人人皆可成為療癒師、充滿愛意的情人，以及從深層內在散發光采的個體，透過自身所提供的服務與關係轉化世界。


    在二十一世紀的今天，男性與女性已在自由及自我覺知層面，擁有嶄新體驗且有所躍進。但若往內心深處探尋，仍可能發現，由於過往業力的牽引阻礙，無法成為期待中的人。過往殘留的業力，通常被封存在能量場的細微封閉處，而這意識及能量場的範圍，則是自體內延伸至體外四周。


    本書稍後將進一步討論精微能量場。目前需要了解的是，人們的能量場是由能量載體所組成，透過能量載體，就可以透過有形或無形方式自我表達，並與環境產生互動。能量載體同時也包含資料庫及精微的能量系統，提供生生不息的女性能量給能量場。


    能量場中的精微能量堵塞，會讓人們受困在局限的模式及信念中，這可以說明，即使在現代擁有如此多的自由，許多人仍然難以發揮與生俱來的潛能，無法如古代瑜伽及譚崔大師所教導的，運用潛能在生命各階段中發光發熱。


    ### 肯定生命的能量


    設計《女人能量療癒寶典》這本實用書的目的在於，協助讀者從身心靈層面療癒自己及所愛的人。在接下來的章節中，妳可以透過簡單練習，接觸自己內在生生不息並飽含生命力的女性能量，也可以學會如何與所愛之人或療癒的個案，分享這股能量。富含生命力的女性能量，是女性力量、創造力及內在光采的根源，每位女性都能夠學習提升這股能量。隨著各國的相異文化，女性能量被賦予許多不同稱謂。中國道家稱之為「氣」（或）。印度，則稱這股能量為「普拉那」（Prana）或夏克提（Shakti）。無論如何稱呼，這股特別能量皆可被用來療癒創傷及身體疾病，釋放個人發展及關係中造成困擾的侷限信念及行為模式。最重要的是，這股來自宇宙的能量，可以協助我們在身心靈層面達到最深層的療癒，體驗伴隨生命而來應享的愛與喜悅。


