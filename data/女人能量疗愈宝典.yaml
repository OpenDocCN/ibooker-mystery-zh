    ## 總結


    在本章中，妳學到女性心智由三部分組成，每一部分有其獨特的能力及需求。妳也做了各種練習，它們分別被設計來克服憂鬱、提升與地球間的連結、遠離多重任務處理的高度干擾，並釋放與前世人間的依存。


