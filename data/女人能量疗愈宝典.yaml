  md: '# 自我設限模式


    +   1. 批判與缺乏包容

    2. 控制及操弄

    3. 自我毀滅傾向

    4. 情緒壓抑


    當妳完成清單後，有個重點需要注意，請避免不由自主的將這些模式與負面感受連結，也不要把焦點放在覺得無法克服這些模式上。相反的，嘗試將負面模式轉由正向方式來看待。在此以清單的第一個模式，批判與缺乏包容，來示範可以怎麼做。


    若妳有此模式，意味著在前世中妳曾失去或被剝奪個人權利。因此，妳的道途應包含在此生中回復個人權利的部分。


    上述例子示範了妳如何將負面模式轉由正向角度來看待，若以同樣方式看待清單上的所有模式，妳能把自我設限模式清單轉換成自我解放模式清單。'
