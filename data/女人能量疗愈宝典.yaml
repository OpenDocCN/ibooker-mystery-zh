  md: '練習督脈冥想，有兩個步驟會讓妳更有力量。透過提升背部氣流，增加妳能獲得的肯定能量。透過平衡身體背面往上的陽性氣流及身體正面往下的陰性氣流，提升妳的自信心。


    # 督脈冥想（見圖12）


    要開始督脈冥想，首先以一個舒服的姿勢安頓好自己，背部打直。閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘。從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要啟動第一脈輪後部。」想進一步啟動第一脈輪後部，將心智注意力放在脈輪上，並用脈輪呼吸。當第一脈輪後部開始振動或是發亮，慢慢再將心智注意力及呼吸，從第一脈輪後部沿著督脈移往第二脈輪後部，到達第二脈輪後部時，宣告：「我要啟動第二脈輪後部。」享受第二脈輪後部的振動或光采幾分鐘，然後繼續用這樣的方式，沿著督脈往上，啟動所有傳統七脈輪的後部。


    啟動傳統七脈輪後部之後，宣告：「我要在傳統七脈輪的層面上，讓自己安住在脈輪場中。」花十五分鐘享受這個過程。然後由一數到五，結束此冥想，數到五時，睜開雙眼。當妳需要時可做此練習。'
