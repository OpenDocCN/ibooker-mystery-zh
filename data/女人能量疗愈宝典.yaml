    要開始這個冥想,首先以一個舒服的姿勢安頓好自己,背部打直。閉上雙眼,鼻吸鼻呼,深呼吸二到三分鐘。從五倒數到一,再從十倒數到一。運用標準法門讓肌肉放鬆,並安住在真實心智中。然後唸出此肯定語:「我要啟動我的上部身體一物質脈輪。」接著唸出下一句肯定語:「我要啟動我的下部身體一物質脈輪。」安靜幾分鐘享受能量流動。然後宣告:「我要安住在上部身體一物質脈輪場中。」繼續宣告:「我要安住在下部身體一物質脈輪場中。」安靜幾分鐘享受增強的氣流動。然後宣告:「在上部身體一物質脈輪,及下部身體一物質脈輪裡,我要安住在第一極性場域中。」


    由於妳的第一極性場域是陽性的,當妳安住其中,將有更多意圖、意志及渴望流經妳的身體一物質脈輪,這能相對增強妳與地球的連結。


