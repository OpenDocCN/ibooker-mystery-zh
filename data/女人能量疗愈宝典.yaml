  md: '# ○從傳統到超凡。


    像古代譚崔行者一樣，妳可以運用流經自己能量場的氣與覺知，轉化妳的關係。要達成這個目標，要先做到兩件事。首先，停止耽溺於那些阻礙妳體驗超凡經驗的破壞性模式。第二，學習讓自己安住在第三心場域中，因為妳經由第三心場域來體驗自己與他人間的超凡關係。不過，在正式開始前，了解超凡關係和傳統關係之間的差異將十分有益。


    從外在角度來看，傳統關係和超凡關係幾乎一樣。伴侶們可以住在一起、養育孩子，並參與社區的社交及經濟生活。


    女性必定會和所愛之人共享力量、創造力及內在光采。在本章中，我們會向妳示範如何和所愛之人共享超凡關係，首先是和自己，再來是和伴侶與小孩。


    從譚崔研究中了解，夏克緹／濕婆這對神聖伴侶是超凡關係的原型。他們之所以能處於這種超凡關係中，是因他們能與彼此自由分享能量與覺知。


    夏克緹的能量以氣的形式呈現，可以推倒疏離的藩籬。當氣與覺知結合，能讓人們進入超凡關係中。'
