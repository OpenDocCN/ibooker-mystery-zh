  md: '我們將清單上的模式都轉換過一遍，並收錄了協助妳克服這些模式的練習。妳可以用我們的清單作為參考指引，來擬定自己的清單並療癒清單上的模式。


    # 自我解放模式


    # 一、批判與缺乏包容


    這個模式顯示，妳在前世曾失去或被剝奪個人權利，需要在此生中回復個人權利。要克服這個模式，妳要啟動心輪，讓自己安住在心輪場中，並讓心輪場充滿氣（參見第三章）。


    # 二、控制及操弄


