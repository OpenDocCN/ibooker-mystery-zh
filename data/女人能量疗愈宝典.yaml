    # 妳的主導業力模式


    主導業力模式是妳帶入此生中的最強力模式。大多數人有一個主導業力模式，有些人則有兩個或三個主導業力模式。這些模式會限制妳天生的力量、創造力及內在光采，也會阻撓妳了解自己、向前邁進及療癒自己靈性的各種努力。


    在妳列出主導業力模式後，嘗試以正向角度看待它們，讓它們導引妳找到自己的道途，如此一來，妳的自我設限模式將會轉變成自我解放模式。


    為幫助妳進行這過程，我們收錄了四種最常見的自我設限模式，羅列如下。妳可以將其作為自己清單的參考基礎。在列清單的時候，盡可能誠實完整。


    渴望是對幸福及解放的渴望，而解放則是來自於了解和遵從自己的道途。


    要開始這個過程，先列出一張清單，寫下最重要的天賦及力量。天賦及力量包含了鎮定、有力的身體、強韌的性格、熱情、同理心，以及其他與運動、藝術、音樂與智識有關的天賦。我們發現，支持個人道途的天賦和力量，在童年時就會顯現。這些天賦與力量具有存在感，它們能驅動人們在世上顯化自己的意志、渴望及創造力。'
