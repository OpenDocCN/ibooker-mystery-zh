  md: '真理：進化過程中的階段。這個字彙結合了代表「那個」的梵文字根，以及代表「汝」或「妳」的梵文。因此真理象徵著一個古遠真相，那就是妳永遠與宇宙意識同在。藉由安住在真實心智中，妳也能蒙受同在的好處（包括了歡愉、愛、親密及喜悅）。根據瑜伽與譚崔的教導，物質與非物質宇宙的進化過程已經到達第三十六階段。


    第三心：參見人類之心。


    第三心能量場：一個資源場，將能量傳進妳的能量場及物質身體裡。透過第三心場域，妳能體驗與自己及與所愛之人的超凡關係。


    三心：每個人都具有三心——位於胸腔左側的物質心臟，胸腔中心的心輪，以及阿特曼——位於胸腔右側的第三心。幸福自梵我浮現，流進意識覺知中。


    傳統關係：傳統關係期待女性支持丈夫，為所愛之人犧牲自己需求，並將社會核心價值傳承給自己的小孩。不幸的，即使在二十一世紀，局限的信念和自我設限模式，仍透過社會化過程傳給下一代。


    超凡：與宇宙意識、與自己和與伴侶間的合一或親密狀態。在超凡狀態中，妳能不受干擾的體驗及分享幸福及宇宙性特質，如歡愉、愛、親密及喜悅。


    超凡關係：伴侶能共享歡愉、愛、親密及喜悅，不受障礙、業力包袱或任何事物干擾的一種關係。傳統關係生活在局限中，相反的，超凡關係則超越限制，這也是為什麼在超凡關係中，散發內在光采的女性，將


