  md: '許多被動—侵略性遊戲，仍為現代女性所參與。以下列出了最普遍的三種，妳也許可以從自身或親友經驗中察覺到至少一種。


    # 誘惑


    誘惑能以性遊戲或操弄形式來呈現。不幸的是，在許多社會中女性所受的教育，是運用誘惑從男性那得到自己想要的事物，視此為理所當然。即使時至今日，在許多社會中，女性透過誘惑方式來操弄男性，將難以和通常源自精微能量場的力量連結。


    # 喋喋不休


    受挫的女性，或在孩提時代學會向雙親喋喋不休的女性，通常會對伴侶或家中其他男性繼續這樣的模式，以得到她們想要的。喋喋不休是無力感的極端表達方式，任何習於此種模式的女性，會因缺乏自尊而受苦，因為她無法自由表達自我的真實力量。


    # 內疚幻象


    有些感到自己缺乏力量的女性，會運用男性的弱點或男性顯露的負面性格，讓他感到內疚。內疚'
