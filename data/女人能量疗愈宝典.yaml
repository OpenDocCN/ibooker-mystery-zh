    依照譚崔的古老文本，心智有四個層面。在梵文中被稱為末那（manas）、菩提（bodhi）、心（chitta）和自我（ahamkara）。


    末那能夠延伸自身，直到碰觸到外在環境中的物體、存有及能量場為止。末那將其目標與外界隔離，以利研究。我們可用觀望的方式了解末那層面。當我們觀望，視覺並沒有特定著重於什麼事物上。但當我們看的時候，則有個目標被帶入視覺範圍中，得以與其他事物作為對比。末那不觀望，而是看。藉由特別關注視野區域中的某個目標，讓這目標可以從周遭環境中獨立出來。


    菩提分析物體、人及與外在環境區分出來的能量場，並將其與已知事物相比較。縱使物體、人、能量場可能相異及改變，菩提依然保持其一致性。事實上，菩提的一致性，使它能夠將心智層面所探討分析的目标，納入特定的範圍，讓心可以賦予目標獨特的價值。


