    圖16：腹部緩解手印


    ## 懷孕期間的焦慮襲擊


    焦慮襲擊必定伴隨高度心理壓力及身體症狀，可能會發展到讓人難以承受的地步，讓女性的神經系統承載過度。


    對科學家及醫師而言，人們受焦慮襲擊的原因仍是個謎。不過，我們發現，懷孕期間的荷爾蒙波動、能量創傷、業力議題重現及支持該議題的相關能量傷害，都會導致氣的阻塞。另外，女性懷孕時，自由度降低，變得更敏感、恐懼，因此，有些女性會遭遇焦慮襲擊也不足為奇了。


    要克服焦慮襲擊，我們發展出焦慮襲擊手印（見圖17）。它是特別設計來防止女性神經系統過度承載。一旦學會持此手印，當妳感到焦慮襲擊即將來臨或已經開始時，可以將其與其他兩項活動結合運用。


    要練習焦慮襲擊手印，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一，運用標準法門讓肌肉放鬆，並安住在真實心智中，接著將舌頭輕輕頂住上顎，往上顎後端稍微移動，最後停留在上顎後端較柔軟的位置，然後將右手大拇指交疊在左手大拇指上，下一步將雙手食指彎曲，第一指節指背互觸，雙手中指向上伸展，指尖互觸，雙手無名指也和中指一樣向上伸展，指尖互觸，如此形成兩個三角形，最後將雙手小指彎曲，第二指節指背互觸。持此手印十分鐘。當妳需要時可作此練習。


    ![](img/ab4f433fa94d325ad3ce8769941e0806_207_0.png)


    圖17：焦慮襲擊手印


    ### 焦慮襲擊的能量療癒


    當焦慮襲擊即將來臨或已經開始，推薦妳做三件事。第一是淋個冷水浴，這能讓妳的身體浸潤在負離子中。負離子促進腦部分泌能提振情緒的血清素，讓妳釋放壓力並充滿活力；前兩者皆可助妳克服焦慮襲擊。


    結束淋浴幾分鐘後，找個舒適的地方坐下，開始練習焦慮襲擊手印。邊持手印邊啟動第三脈輪，並安住在第三脈輪場中。一旦妳安住在脈輪場中，鬆開手印並開始由第三脈輪唱頌嗡（OM）的聲音，直到回復平靜。


    嗡是宇宙的聲音。當宇宙被創造時它即出現，其療癒效果廣為人知，特別是與適當的冥想及手印一起搭配運用時。


    ### 流產、墮胎及死胎


    對於女性，特別是那些第一次懷孕的女性來說，由於流產、墮胎或死胎而失去寶寶，很可能成為一個極大的創傷事件。在接下來的章節中，透過探討女性及未出世胎兒的能量層面，我們會盡可能說明失去胎兒時會發生些什麼，然後提供練習來療癒流產、墮胎或死胎所造成的創傷，讓妳釋放這些事件帶來的殘留痛苦，也能幫妳未出世胎兒的靈魂，喜悅的繼續邁向進化旅程。


    #### 流產、墮胎或死胎的能量殘留


    雖然一些女性在失去胎兒後，身體可能受苦達數年之久。但不只身體付出的代價會對女性造成威脅。心理及能量上的代價，同樣也對女性、未出世胎兒及女性家屬，具有破壞性的影響（專業女性（Pro
    Femina））。


    對許多女性來說，悲傷的過程從失去胎兒的那一刻已然開始，這是一種綜合身體、心理及能量層面的創傷。女性可能試圖壓抑或控制自己的沮喪及悲傷，但通常效果不彰，這是因為潛藏在失去背後的創傷極少被療癒。因此，許多女性飽受未解決的自我譴責之苦，在事件後遠離親友，孤立自己。


    從能量角度來看，因流產、墮胎或死胎而失去胎兒，對於母親及胎兒本身都是極嚴重的創傷。因為母親的道途和轉世目的與她和胎兒間的業力連結，息息相關。當胎兒逝去，他們的連結也隨之斷裂，對母親及胎兒皆造成深遠的影響。


    ##### 塔瑪拉的故事


    塔瑪拉的經歷，顯示了失去未出世的胎兒可以造成多大的創傷。我們在二○一○年開始和塔瑪拉一同進行療癒工作，那年她三十四歲。


    與我們進行療癒近一年後，她前往生育診所就診，並在診所協助下懷孕。懷孕期間的第六個月，在機場時，她的羊水破裂，雖然當場立即進行處理，但在前往醫院的救護車上，她還是失去了自己的兒子。


    失去兒子這件事對塔瑪拉影響深遠。她隨即封閉自己，遠離親友。憂鬱狀況長達數月，荷爾蒙仍舊不平衡，以至於分泌乳汁近一年之久。


    之後幾個月，她開始敞開自己，然後我們為她及未出世的兒子，療癒他們所經歷的能量創傷。為了讓她的荷爾蒙回歸平衡，讓她服用一種另類醫療中的同類療法藥物「Homoeo」。然後，我們提供她一套能量工作養身法門，讓她持續練習十二週。在那段期間，透過移除入侵能量及重新整合三個能量載體，她回復了自我肯定生命認同，也成功啟動第二及第五脈輪，並安住在其對應的能量場中。塔瑪拉創造出一條氣繃帶（詳見第二二三頁）來療癒骨盆的創傷，然後使用我們教她的技巧讓兒子自由，並協助他的靈魂繼續喜悅的在進化過程中前進。


    療癒工作進行五個月後，塔瑪拉告訴我們她懷孕了，我們當下結束了療程。八個月後，聽說她產下了一個健康的小男嬰。


    ### 母親付出的能量代價


    未出生胎兒的靈魂，究竟在何時進入子宮內，是人們不斷爭論的議題。但我們在女性實務工作中發現，能量連結在懷孕非常早期就已經形成。


    連結一旦建立，傳送隨即開始。胎兒的靈魂元素包含能量載體，開始進入發展中的胎兒體內。若此過程受到流產、墮胎或死胎的干擾，一些能量載體會滯留在母親能量場中，另一些會在傳送過程中散失，還有一些則留在未出世胎兒的身上，徒然等待著進入胎兒體內。


    那些已經進入母親體內的能量載體，在流產、墮胎或死胎過程後，將無法輕易的與未出世的胎兒連結在一起，在大多數案例中，它們滯留在母親的能量場中，這可以解釋，為什麼大多數經歷流產、墮胎或死胎過程的女性，事隔多年仍抱持對未出世胎兒的依存。


    傳送過程中的受阻能量體也會造成影響，它們和供給能量及覺知的資源場間的連結被截斷，因此，這些能量體會不斷瘋狂找尋安全的庇護所，來提供它們能量和覺知。其他的能量體則被掠奪性的能量場及意識所占據，從中汲取具滋養性質的氣。殘留在母親身上或在他人身上找到安全庇蔭的能量體，會造成未出世的胎兒和能量體宿主間不健康的依存關係。


    由於每個能量體藉由銀色能量索與靈魂能量場相連，上述依存可能持續終生。銀色能量索是未出世胎兒非物質結構的必要部分。當未出世的胎兒最終找到另一個母親再次轉世時，他會感受到能量體的散失，然後試圖去尋找並整合它們，但若沒有相關的知識及技能，這個任務將很難達成。


    為了療癒母親及胎兒的創傷，我們收錄了一系列經過特別設計的練習，幫助母子克服因流產、墮胎或死胎造成的創傷。這個系列練習包含釋放對未出世胎兒的依存，療癒母親能量創傷，及協助未出世胎兒帶著完整能量體完成其生命旅程。


    若因疏忽或進行人工流產導致失去胎兒，因而產生的罪惡感，都該釋放對未出生胎兒靈魂的依存。釋放對未出生胎兒靈魂的依存，有助完滿業力層面上的幾個重要事項。若母親需要負責，有助於承認事實，並對干擾了胎兒的生命旅程表達真誠悔意。若非母親的錯，能讓她放下罪惡感及羞恥感，完成自我療癒過程。


    要讓這過程產生效果，必須解除業力依存及業債，這個過程必須以一種自然的方式進行。過程包含兩部分，第一部分，妳必須準確描述那些傷害未出世胎兒的行為及動作。第二部分，妳必須表達發自內心的真誠悔意，懺悔在能量層面上傷害了未出世的胎兒，妨礙了他在地球轉世的過程。


    當妳準備好開始，找個安靜的地方坐下，然後閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一，運用標準法門讓肌肉放鬆，並安住在真實心智中。


    當妳放鬆後，宣告：「我要啟動我的心輪。」然後宣告：「我要安住在心輪場中。」繼續宣告：「我要在心輪的層面上，向內觀照感官。」花一些時間享受能量流動。然後宣告：「我要在面前創造一面二點五公尺的螢幕。」繼續宣告：「我要觀想自己未出世的胎兒出現在面前的螢幕上。」胎兒的影像會顯現在螢幕上，顯示出適當年齡以繼續他的旅程。


    要釋放依存，宣告：「我讓你痛苦並干擾了你的生命旅程，我真誠的向你道歉。」當妳宣告時，一邊直視胎兒。當妳完成宣告並感覺胎兒已接受妳的真誠歉意，妳即可向這個未出世的胎兒說再見，這需要從心輪散發能量給胎兒。當未出世的胎兒接受了這股能量，宣告：「我讓你自由，好讓你繼續進化的旅程，再見。」然後釋放掉螢幕上的胎兒影像及螢幕。由一數到五，結束這個冥想。


    未出世的胎兒接受了妳的道歉後，妳能將留滯在妳的能量場的能量載體歸還給他，這能幫助他喜悅的繼續他的生命旅程。


    ## 第三章 幫助胎兒完成他的生命旅程


    開始這個過程，先放一缸熱水，然後在其中加入死海鹽（可以在各健康食品專賣店或藥局買到）。躺在水中，雙腿分開，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，運用標準法門讓肌肉放鬆，並安住在真實心智中。


    然後宣告：「我要讓熱水浴中的鹽吸收與失去未出生胎兒有關的所有扭曲能量。」海鹽能夠吸收身體物質的層面、身體層面及乙太層面的扭曲能量。花五分鐘享受這個過程，然後宣告：「我要用各個氣圈包圍住能量場中與未出生胎兒有關的各個能量載體。」然後持至樂幸福手印（參見第四章）。邊持手印邊宣告：「我要讓幸福淨化能量場中所有與未出生胎兒有關的能量載體，並讓能量載體全部直接回到它們在宇宙中適當的居處。」然後鬆開至樂幸福手印，浸在水中十五分鐘，讓未出生胎兒的能量載體被淨化，並重新與他的靈魂整合，享受妳所經歷的改變，然後由一數到五，睜開雙眼，結束這個冥想。


    ### 氣繃帶


    本章的最後一個練習是氣繃帶練習。這個練習對妳的心理及能量場健康有極佳的效果，因為它能封住因流產、墮胎或死胎造成的能量創傷。創造氣繃帶是一個為期五天的歷程。


