  md: '# ## 練習：提升第三心渴


    透過提升自己第三心的渴望，妳能驗證自己在個人道途方面所了解的部分，並且對於如何在這個世界顯化事物有更多的洞見。


    要提升第三心渴望，必須加強自己的意志、渴望及超凡之愛（幸福），再將這些特質合為一體。要達成這個目標，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆並安住在真實心智中。


    當妳讓自己安住下來，妳已準備好將自己的真實意志、渴望及無條件的愛合為一體。要達到這個目標，宣告：「我要在核心場層面上，向內觀照感官，並體驗自己的真實意志。」花幾分鐘經驗妳的真實意志。然後宣告：「我要在核心場層面上，向內觀照感官，並體驗自己的真實渴望。」花幾分鐘經驗妳的真實渴望。繼續宣告：「我要在核心場層面上，向內觀照感官，並體驗超凡之愛。」花幾分鐘經驗超凡的愛。然後宣告：「我要結合自己的真實意志、渴望及超凡之愛。」當妳將上述三者合為一體，花五分鐘體驗隨即發生的能量變化。'
