  md: '# ## 身體按摩


    當妳生產後，可以替新生兒進行寶寶按摩，加強彼此間的能重連結。為寶寶按摩能為新生兒提供安全感及歸屬感，也能增強新生兒的免疫系統。經常被碰觸及按摩的寶寶會變得更有自信，睡眠品質也較好。寶寶的動作技巧會增加、同時發展出更具表達力的人格，也更能同理他人的感受。增強流經寶寶能量場及母子之間的氣流，就能夠達到上述效果。


    開始進行寶寶按摩前，謹記讓按摩房間內變得溫暖，按摩油本身溫度也要令人感到溫暖。避免太濃稠或氣味過重的按摩油。最重要的是，以平坦的掌心來進行按摩。


    # 練習 寶寶按摩


    當妳準備好後，讓寶寶平躺在妳的大腿上，背部朝上，然後，雙手互相搓揉，增強雙手能量。接下來，用掌心碰觸寶寶的腳，感覺寶寶的反應，他喜歡妳現在做的事嗎？並非所有寶寶都喜歡被按摩，透過確認寶寶反應，可以知道自己是否得到寶寶的允許，讓妳替他按摩。'
