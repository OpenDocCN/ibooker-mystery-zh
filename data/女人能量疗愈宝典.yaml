  md: '# 克服被動—侵略性模式


    若覺得十分擅長運用被動—侵略性模式得到自己所要的，可以做接下來兩個練習。第一個練習是原型跳躍，第二個則是督脈練習。


    在原形跳躍練習中，妳將以能夠提升我們力量、創造力及內在光采的肯定生命原型，取代已被整合進人格中的被動—侵略性模式。在督脈練習中，妳可以透過增強流經督脈的氣流，來增進自己的力量。


    # 原型跳躍


    要開始進行原型跳躍，首先選擇一項妳擅長但想要釋放的被動—侵略性模式。然後以一項肯定生命的原型來取代它（肯定生命原型的清單可參見第五章）。選好模式和原型後，將它們放在心中，接下來，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒


    幻象的危險在於，它會毀損親密感並創造出一種不良環境，必然摧毀親密伴侶間的必要信任與愛。'
