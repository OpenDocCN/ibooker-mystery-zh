    場域中。」為了增加效果,宣告:「我要在第二心場域層面上,向內觀照我的感官。」花兩三分鐘享受能量流動。然後持至樂幸福手印(參見上述練習),持手印五分鐘。然後宣告:「我要讓幸福轉化我與伴侶間的關係。」之後不用做任何事情,只要一邊持手印,一邊好好享受這過程十分鐘。十分鐘後,從一數到五,鬆開手印,結束這個冥想。若妳和伴侶每天做此練習,持續至少一週,妳會開始體驗來自超凡關係的種種益處。


    與孩子間的超凡關係從懷孕時就已開始,因為未出世胎兒已完整發展出覺知,對物質及能量環境作出反應。


