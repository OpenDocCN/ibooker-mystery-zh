  md: '三、自我毀滅傾向

    這個模式顯示，在前世中，妳抱持著十分負面的自我形象。除了毀壞宇宙給予的美好事物外，看不到任何其他選項。要克服這個模式，妳要療癒自己的心智層面和釋放精微能量場的異常心智，然後練習自尊手印。


    四、情緒壓抑

    這個模式顯示，妳在前世曾被剝奪表達情緒及感受的權利，而妳必須在此生中回復自己的個人權利。要達成這個目標，妳需啟動心輪，讓自己安住在心輪場中，並讓心輪場充滿氣，然後再啟動第二到第五脈輪，讓自己安住在對應的脈輪場中，並讓這些脈輪場充滿氣（參見第三章）。


    當妳完成了力量與天賦清單，並將妳的自我設限模式轉成為自我解放模式，妳可以將這兩份清單合併，以顯示個人道途所需的必要元素。舉例來說，若妳具備身體力量並對運動抱有熱情，而妳的自我解放模式清單上寫著重新獲得個人力量及自我控制，那麼，妳的個人道途就應該涵蓋成為運動家、運動教練，或至少成為一個考察探險隊的領導者。然後，妳為找尋個人道途所該做的最後一件事，就是增強自己第三心的渴望。'
