  md: '# 督脈。


    督脈是人類能量系統中最重要的陽性經脈，它起自脊椎底部的會陰，並沿著脊椎往上延伸至位於頭頂及頭頂上方的第七脈輪，七個脈輪的陽性部分皆與它相連。


    數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要在面前創造一面二點五公尺的螢幕。」當螢幕浮現，宣告：「我要觀想自己在螢幕上，處於我想釋放的被動—侵略性模式中。我在胸前舉著一塊清楚標明這模式的告示牌。」舉例來說，若妳選擇喋喋不休作為想釋放的被動—侵略性模式，那麼螢幕上的形象應持寫著「喋喋不休的女人」的告示牌。接著在螢幕上的自我形象外畫一個黑圈，再立即用紅色在黑圈上畫上紅圈，把原來的黑圈用紅圈覆蓋。覆蓋黑圈的同時，宣告：「我要釋放心中所想的被動—侵略性模式，以及所有支持這模式的相關特質。」一旦被動—侵略性模式被釋放，就用所選的肯定生命原型取代它。宣告：「我要以（填入原型名稱）的原型取代剛剛釋放的被動—侵略性模式。」集中心力在這新形象上，維持十分鐘，感受所有與原型相關的肯定生命特質，在自己的能量場及身體中生根。十分鐘後，釋放掉影像及螢幕，然後由一數到五結束此冥想。當妳需要時可做此練習。'
