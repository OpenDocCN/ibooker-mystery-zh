    ### 卡珊德拉


    希臘神話中,卡珊德拉(Cassandra)的悲劇正是上述論點的註解。身為特洛伊國王普里姆(Prian)及王后赫庫柏(Hercuba)之女,由於個人的獨特特質,卡珊德拉被太陽神阿波羅賜予預言能力。不幸的是,當卡珊德拉拒絕阿波羅的性要求後,阿波羅卻對她及她的預知能力降下詛咒,而當初就是那股預知能力讓卡珊德拉得以與眾不同,吸引阿波羅這位醫療之神的注意。卡珊德拉的獨立、力量及聰明特質,卻也使她步向毀滅及死亡。


