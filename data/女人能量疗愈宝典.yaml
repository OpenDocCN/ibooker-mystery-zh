  md: '# 夏克緹


    夏克緹為現代女性提供另一種肯定生命的原型。在印度社會中。夏克緹的屬性幾乎全是正面的,因為印度社會深受瑜伽及譚崔教導所影響,明白人們與女性能量間的關係,會深刻及持續的影響他們的整體身心健康及關係良窳。


    夏克緹的起源可以追溯自幾千年前。她是女性及宇宙中所有富創造力之物的原型,影響了印度教、佛教,甚至是古希臘、羅馬的一些教派,如戴歐尼修斯(Dionysus)教派。


