- md: '# 釋放入侵能量


    幸運的是，由妳已學到的知識和技能來看，妳已擁有所有必要的工具來釋放精微能量場中的扭曲能量入侵。其實，釋放入侵能量不比釋放業力包袱困難。首先，選定一種感受、態度、阻礙或自我設限模式，導致妳對特定人士、地點或事物的不合理恐懼，或干擾妳成為自己、表達自我及達成自我目標的能力。


    舉例來說，入侵所導致的感受有歇斯底里、不祥感、憤怒、挫折、焦慮、孤立、傲慢、鄙視、慢性症狀及煩惱等。入侵所造成的模式有自我懷疑、自我傷害、無助、失望、依賴、不安全感、耽溺或缺乏自我價值等。


    一旦妳選好一種模式或感受來釋放，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一，運用標準法門讓肌肉放鬆，並安住在真寶心智中，然後持至樂幸福手印（參見第四章），一邊持手印一邊宣告：「我要創造一個氣團，包圍住導致心中所想（妳的感受或模式）的入侵能量。」當妳看到和感受到氣團，繼續宣告：「我要讓幸福充滿在我創造的氣團裡。」再宣告：「我要讓幸福釋放氣團中的入侵能量。」


    # 碎裂化


    當能量載體脫離妳的能量場時，能量場就會碎裂化。造成碎裂化最常見的原因，就是扭曲能量入侵了妳的能量場。碎裂化可能發生在任何次元中，也可能發生在任何人生階段中，包含從受胎到生產的九個月。碎裂化及其副作用是如此普遍，因此，淨化及重整能量載體成了療癒及能量工作的必經過程。因為能量載體承載多種重要功能，它們讓妳得以形成真實身分認同，並在物質與非物質層面上與環境互動。能量載體也助妳顯化靈魂的推進並實現自己的道途。


    想療癒碎裂化情形，首先妳需定位出散失的能量載體，隨後將其淨化並整合進能量場中。要定位出散失的能量載體並淨化它，需要運用第四章所學的定位和釋放業力包袱技巧。


    當入侵能量被釋放後，妳會有一種如釋重負的感覺，伴隨這種感受的，通常是一聲砰的聲響，表示留存在氣團中的只有幸福。


    當妳釋放了入侵能量，再將氣團釋放掉。然後鬆開至樂幸福手印。花十分鐘享受妳所經歷的改變，然後由一數到五，睜開雙眼，結束這個冥想。


    # 療癒碎裂化


    當妳定位並淨化一個能量載體後，需要將它重新整合，與其他載體相合。能量載體的相合指的是，能量載體必須位於妳的身體空間的正中央。關於相合的重要性，原因如下：它讓被整合的載體得以和能量場中的其他載體同時運作，幫助未經干擾的氣往能量載體流動，並讓妳將能量載體重新整合進真實的身分認同中。


