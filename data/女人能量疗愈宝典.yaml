    女性的第一脈輪受阻，可能是因為她的父母並不想要孩子或不想要女兒。也可能是在小女孩時期，她的自尊受到家族成員、朋友或權威人士等個別特質的能量投射干擾，也可能是這位女性仍然依附於前世的關係中。


    鮮少有人知道，依存在個別特質能量場中的人們，可以將此能量投射給他人。投射的能量會干擾被投射者的能量場（對於投射能量出去者也是如此），也會造成能量及身體疾患。


    一個女性若遭受過性虐待，第一脈輪也可能因此堵塞，尤其當加害者是權威人士時，更易造成此情況。'
