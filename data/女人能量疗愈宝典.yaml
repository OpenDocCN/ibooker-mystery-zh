    # 第七章 提升女性力量


    在早期世代，透過教化過程及不對等期望、機會、獎勵及懲處，男女雙方被灌輸了男性天生比女性更有力量的信念。直至現今，這種不平衡仍普遍存在於多數社會及制度中。


    這種不平衡並不只因暴力、法律歧視或社會壓力而增強。在許多社會中，男性和女性一樣飽受壓迫，被強迫接受社會的核心價值觀。這些社會為了達成目的，根據性別（性別角色）制訂了人類性格清單，期待男性及女性毫無疑問的接受，並將這些特質融入自己的生活中。


    這些社會通常要求女性應該關懷他人、溫柔、接受度高、有耐心、貞潔、富吸引力及感覺豐富等等。這些特質對女性來說是自然的，對男性來說也是。不過，直至最近，歐洲、中東及北美社會仍舊要求女性接受上述特質，作為她們的核心價值。而男性，特別是當權男性，則可以任意拒絕上述特質，接受另一套他們被教導要奉行為男性圭臬的價值，那些價值包括競爭、果斷、野心、理性、堅毅及侵略性等。


    若有人不接受被分派的特質，通常會遭受嘲諷、拒絕、指控，或者更糟的受到暴力對待。局限的信念及童年的早期制約，也會一併削弱人們自然表達自身力量的能力。由於核心價值的改變速度十分緩慢，因此，許多人及制度仍固守著那些讓女性難以接受的女性能量以及成就它們的潛能。


    ## 中庸之道


    本章將解釋，對於那些時值二十一世紀、仍被加諸於女性身上的性別特質，妳還有另一種選擇。這個選擇是中庸之道：一種平衡的生活，包含同理心及自在表達自我及女性宇宙性特質的力量。擁護中庸之道。女性可以在工作中或任何生產活動中，如同男性一樣表現，甚至表現得更好。因為她會擁有足夠的力量或能量，來支持她前進並確保結果成功。擁護中庸之道，女性將可達成自己的目標而不受過往包袱拖累。


    開始探究中庸之道前，請先記得，男性認為理所當然的力量及自在表達力量的自由，對於女性來說，並不總是輕易可得。事實上，關於女性的負面神話故事，在在提醒著我們，過往女性要擁抱她們的女性能量及誠實表達自我，是如此艱難。


    ## 關於給予力量的負面神話


    古希臘，現代西方世界文明的誕生處，充滿許多關於有力量女性的負面神話。像是透過凝視可讓男人石化的美杜莎、希臘萊斯博斯（Lesbos）島的女性、發動對抗男性戰爭的亞馬遜女戰士（Amazons），都是即刻浮上人們心頭的典型。另外還有瑟絲（Cleo），善於引誘男性並剝奪他們的男性能力，以及塞倫（Siren），她的歌聲能讓最有力量的男人也為之瘋狂。


    當然，不只希臘對有力量的女性抱持敵意。早期的不列顛人也視有力量女性為威脅。亞瑟王的姊妹摩根（Morgan），就是讓人聯想到的例子。摩根是個有力量的女性，但對那些囿於中古世紀思維的男性來說，將她視為狡詐、對權力虎視眈眈的女巫，要比視為有力量且散發光采的女性容易得多。


    在現代社會中，充滿力量並散發光采的女性，也許不會被拿來與石化男人的美杜莎或先迷惑男人再剝奪他們力量的摩根相比較，但她可能在嘗試宣告自己力量時，受到強力批判。若女性是有力量的並試圖在男性世界中取得成功，她很可能要冒著被貼上標籤的風險，這些標籤像是難搞、狡詐、易怒或更糟的字眼等。


    雖然這些帶著貶抑意味的神話和形容詞，仍被用來貶損有力量的女性，並削弱她們追求當權位置的想望。但這些貶抑神話及形容詞的描述並不真實，反而加深男性對於自由女性及她們天生力量的不合理恐懼。


    無疑的，這些神話仍具備其影響力，它們打擊許多年輕女性的志向抱負，而支持被動侵略性的人格模式，讓女性對自己及其女性力量的信任感降低。


    ## 長舌鉤


    中古時代,女性幾乎無法以健康的方式宣告自身力量,若女性因為對丈夫喋喋不休,或是試圖以被動的侵略行為影響丈夫等罪名被起訴並判有罪,她們可能就會被強迫戴上長舌鉤。


    長舌鉤是一種由金屬和皮革組成的裝置,放置在嘴中並在後方固定。這種裝置設有帶著尖刺或鋒利邊緣的壓舌器。放進女性嘴裡之後,她一說話就會疼痛。這裝置用來羞辱因喋喋不休而被男性議會判定有罪的女性。有時,長舌鉤還會在前端附上一條鏈子,便於牽著受刑者遊街示眾或將她綁在柱上。


    長舌鉤在歐洲被廣泛使用,甚至在十七世紀的美洲也有人使用。在有些判例中,只因丈夫指控妻子喋喋不休,妻子就得戴上這種刑具。不同意丈夫意見的女性、散布流言或輕微冒犯他人被判有罪的女性,都可能被強迫戴上長舌鉤。


    ## 被動—侵略性遊戲


    支持僵化性別角色的核心價值觀,仍在媒體、教育及許多家庭所抱持的態度中出現。想當然耳,許多人士仍然繼續擁護被動—侵略性行為。


    許多被動—侵略性遊戲，仍為現代女性所參與。以下列出了最普遍的三種，妳也許可以從自身或親友經驗中察覺到至少一種。


