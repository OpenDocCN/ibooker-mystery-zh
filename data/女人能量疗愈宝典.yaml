    首先以一個舒服的姿勢安頓好自己,背部打直,選一項想要提升的心智功能。我們在這選用享受作為範例。選好後,閉上雙眼,鼻吸鼻呼,深呼吸一到三分鐘,從五倒數到一,再從十倒數到一。運用標準法門,讓自己放鬆並安住在真實心智中。然後宣告:「我要安住在核心場中。」繼續宣告:「我要在核心場層次上向內觀照感官。」安靜幾分鐘,享受能量流動。再宣告:「我要讓自己的核心場與享受的相關區域充滿氣。」花十五分鐘感受核心場的轉變。然後由一數到五,結束此冥想。數到五時,睜開雙眼。妳會感到非常清醒,全然放鬆,感覺比之前更好。當妳需要時可做此練習。


