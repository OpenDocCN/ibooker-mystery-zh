  md: '# 散發內在光采的女性原型


    如果現代女性不需與自我設限的文化原型纏鬥,會是什麼景況?我們相信,女性將能讓自己浸淫於宇宙性能量中。這種能量對女性的靈魂和靈性皆影響深遠,讓她能以無數方式被滋養及滿足。這樣的女性願意冒險去做適合她的事情。她會將自己的身體看成是一座值得崇敬與愛護的聖殿,並用有益健康的食物滋養身體,她的身體活動也會反映她對自己的愛。


    接下來的篇章,將探討一些肯定生命的原型,這些原型能幫助女性,尤其是青春期的女性,自由表達力量、創造力和內在光采。然後,我們將學習如何釋放自我設限原型,並以尊崇女性和女性能量宇宙性特質的肯定生命女性原型,來取代它們。


    探討的第一個原型是莉莉絲(לילי)。

    依照希伯來傳統所敘述,莉莉絲是亞當的第一任妻子。她不像亞當的第二任妻子夏娃(חַוָּה)一樣,由亞當的肋骨創造出來。她和亞當一樣,由相同的泥土所創造。因此,至少在莉莉絲的心目中,她與亞當是平等的。


