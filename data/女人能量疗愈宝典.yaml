  md: '按完寶寶的腳後，按摩腿部後方。然後將雙手相對，放在寶寶背部中間，離他的脊椎一點五或五公分遠。避免直接碰觸或按摩脊椎。同時用左右掌心在寶寶脊椎左側和右側畫兩個大圈，接著，按摩寶寶的左右肩及手臂。


    繼續按摩三到四分鐘。然後將寶寶翻過來，以掌心畫圓的方式按摩寶寶的腿部前側，以同樣方式輕輕按摩他的肚子。接下來繼續按摩寶寶的胸口和肩膀，然後再按摩手臂和手。


    整個過程不要超過十分鐘。按摩結束後，將寶寶放在一旁，讓他用自己的方式回應這次的按摩。推薦妳每次選在同一時間，一週為新生兒按摩兩次。


    # 學齡前唱頌


    當他開始能夠說話，妳可運用自己的傳統七脈輪和孩童一同進行唱頌，這能提升妳們的能量連結，並發展妳與孩子間的超凡關係。要進行學齡前唱頌，坐下來面向孩童，自在的散發歡愉與喜樂，一邊注視著孩子，然後將妳的心智注意力帶到第一脈輪，開始以G大調唱頌嗡。


    G大調會和妳的第一脈輪產生相應振動。就如同敲擊一把音叉，將音叉靠近與音叉同調性的小提琴琴弦旁，琴絃會產生相應振動一般。'
