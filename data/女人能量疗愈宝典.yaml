    ## 療癒飽受忽略創傷


    飽受忽略創傷是一種常被醫師忽略的創傷。當父母親或照顧者想要兒子而非女兒，或父母過於關注自己無法給女兒適當照顧，女性可能就會遭受忽略創傷。對於孩童來說，忽略永遠涉及心理及能量上的拒絕。因為，推開孩童、忽略孩童的成人，會投射自己業力包袱的扭曲能量到孩童身上。如同所有創傷事件一般，扭曲能量的暴力投射，會造成能量入侵，導致孩童的能量場碎裂化，氣無法在能量場中順暢流動。


    雖然每位女性在孩童或青少女時期的經歷都有所不同，但某些忽略的元素是一致的。忽略導致被遺棄感及孤立感，也會干擾信任感，並讓肯定生命的身分認同難以形成。


    要克服忽略帶來的影響，提供妳一個由五部分組成的練習方案。方案結束後，暫停兩天，然後再繼續練習，直到完全回復。


    - **第一天**：釋放忽略孩童的成人為了推開妳所用的入侵能量，再重新整合那些因碎裂化而自妳的能量場散失的能量載體。之後，藉由啟動身體空間的十三個脈輪和空間之上的前六個脈輪，讓氣在妳的能量場重新回復流動。

    - **第二天**：啟動第一和第三脈輪，並讓自己安住在第一和第三脈輪場中（參見第三章）。

    - **第三天**：練習信任手印和自尊手印（參見第二章和第五章）。

    - **第四天**：運用視覺螢幕創造一個促進自信心和穩定性的原型，建議使用純真女孩原型（參見第五章）。

    - **第五天**：練習珍寶手印來加強妳與女性的宇宙性能量間的連結(參見第一章)。


    ## 性創傷


    和大多數人所想的相反，性創傷並不只和性有關。性虐待能以許多種方式呈現，但不論是何種形式，性虐待本質上與權力及控制有關。


    雖然我們清楚常見的性虐待方式，但在西方社會中，隱微的性虐待卻常被忽略。這意味著，許多遭受性虐待的人們，尤其是那些在孩提時受虐的，無法認清他們經歷何種程度的能量創傷。除此之外，他們可能也不明白，若沒有妥善處理，虐待導致的副作用可能終其一生。


    隱微的性虐待包含了不當語言、裸露、觸碰或盯視。暗藏照顧者加害性意圖的混合信號，特別容易造成創傷，因為欺騙會侵蝕信任感。這些活動會造成女孩及青少女在她們情緒及心理發展的重要時期，產生困惑與不安全感(特登和湯尼斯〔Taden
    and Thormes〕1998)。


    請謹記，當我們提及性創傷，倖存者所受的傷害，並不一定和身體動作強度成正比。隱微的虐待可能比那些明顯的性動作，對孩童、青少年或成人造成更深遠的影響。因為，這會衍生出長期的能量問題，但倖存者卻無法辨識出，性虐待才是這些症狀的肇因。更糟的是，許多青少年及成人，因為害怕他人議論或排擠，對自己所遭受的虐待絕口不提。但是，一個人不論如何試圖合理化自己受虐的事實，隱瞞本身就會為當事人加添一種羞恥感。羞恥感使倖存者更難克服性創傷所帶來的影響。


    當羞恥感被納入當事人的感覺程式中，就只剩下一種解決之道。女性必須直接面對虐待事件本身，與那個若虐待沒有發生、自己可能會變成的女性進行連結。如此一來，倖存者可以回復她的真實身分認同。當身分認同回復，倖存者就顯化自己靈魂的推進並融入親密關係之中，不被遺留的創傷所干擾。


    要克服性創傷，必須先釋放入侵能量，然後淨化及整合那些散失掉的能量載體。要讓能量場的氣回復流動，需要啟動十三個脈輪及身體空間上方的前六個脈輪。我們設計了個人重生冥想，幫助妳克服性創傷所遺留的羞恥感。當妳讓能量場的氣回復流動後，接著練習個人重生冥想。


    ### 練習：個人重生冥想


    要練習個人重生冥想，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一，運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要在面前創造一面二點五公尺的螢幕。」當螢幕浮現，宣告：「我要觀想那個若虐待沒有發生、我可能會變成的女性，出現在面前的螢幕上。」隨即，會有個女性的影像顯現在螢幕上，她是那個虐待沒有發生、可能會變成的女性。觀察她幾分鐘，注意她是否能自由的顯現她所有的心智功能，然後自問：螢幕上的女人是否比我更能向親密臣服？她是否比我更能表現出愛？她是否能在適當時機說「不」？她是否能自由表現出自己的真實渴望？她是否比現在的我更能信賴自我、有彈性且展現平衡？


    當妳回答完這些問題，告訴螢幕上的女人妳過去所經歷的，越具體越好，不要遺漏任何細節。確實的告訴她，妳在虐待過程中及過程之後的感受。完成後，從妳的核心場中選擇一項因受虐而受到阻礙的特質，那是妳想在工作或關係中更自由重現的特質。


    出現在核心場的特質，包含意圖、意志、渴望、耐力、臣服、接納、洞悉、選擇、承諾、破壞、信心、享受、拒絕、同理、創造與愛等。


    當妳選定想要回復的特質，宣告：「我要讓核心場中與（在這填入妳所選的特質）相關的區域充滿氣。」當妳安住下來，繼續宣告：「我要在核心場層面上，向內觀照感官。」之後安靜下來，別做任何事情，花十分鐘單純享受這過程，十分鐘後，宣告：「我要和螢幕上的女性共享我已回復的核心特質。」花十分鐘與螢幕上的女性共享已回復的核心特質。十分鐘後，釋放螢幕上的女性影像，然後釋放掉螢幕。多花五分鐘享受妳所體驗到的能量流動，然後由一數到五，結束這個冥想。當妳需要時可做此練習。


    若持續練習個人重生冥想，直到所有心智功能都回復為止，妳將能顯化女性宇宙性特質，恐懼和羞恥感也不會再干擾妳的生活與關係。


    本章中，妳了解創傷經驗能對人們身體及精微能量層面造成打擊，也學到運用書中的練習，來療癒能量傷害，如同療癒與它相似的所有創傷類型一樣。妳所學的練習能讓妳釋放掉入侵的扭曲能量，療癒碎裂化並增加流經能量場的氣流量。


    妳也了解療癒創傷所造成的第二代症狀，它們由人們在現代社會中最常體驗到的四種創傷所造成。在下一章中，妳將學到如何增強自己的生育力，並克服伴隨懷孕而來的複合症狀，包含了腹部抽痛及焦慮襲擊等。妳也會學到如何療癒流產、墮胎或死胎所帶來的能量創傷。


    # 第十一章 療癒生育創傷


    在本章中，我們會檢視生育力及可能伴隨懷孕及生產而來的能量傷害，然後我們會提供能量層面的解決之道，來提升妳的生育力，並永久療癒那些能量傷害。先從檢視生育力開始。


    二十一世紀，對於想生育或組成家庭的女性及伴侶們來說，生育力已變成一個重大議題。光是在美國，時值生育年齡的伴侶們，就有超過百分之十的比例有受孕方面的問題。


    許多有受孕問題的女性轉向生育診所尋求協助。雖然這也是一種選項，但經驗告訴我們，女性能量場狀況對其受孕及生產健康寶寶的能力，影響十分顯著。


    要幫助女性提升生育能力，書中收錄了一個能量處方，我們將其成功的運用於那些向我們求助的女性身上。這個處方有三部分，第一部分，妳要準備及飲用生育茶。


    對於從未將藥草茶用於療癒的人來說，應會訝異於藥草茶在亞洲的長久歷史，尤其在阿育吠陀醫學及中國醫學史上。藥草茶被用來療癒諸多症狀、促進良好健康及提高生育能力。


    ## 生育茶


    生育茶的準備過程及飲用過程同等重要，建議妳將其視為神聖儀式的一部分。妳必須為自己準備茶的原料，同時不受其他人、手機、電腦或電視干擾。準備生育茶，需要將下列成分各準備五十克：斗蓬草（Alchemilla）、聖約翰草（Hypericum）、豬殃殃（Galium）、漢紅魚腥草（Geranium
    robertianum）及甜苜蓿（Melilotus）。


    備齊生育茶的所有成分，將它們混合好使用，一湯匙即可煮出一大杯藥草茶。首先運用標準法門讓肌肉放鬆，並安住在真實心智中。當妳安住下來，睜開雙眼，在接下來的九分鐘中，煮出一大杯生育茶，煮好後趁熱喝。每天重複這樣的過程直到懷孕為止（崔伯（Yogi））。


    ## 寶寶祈願按摩


    另一個提升生育力的技巧是寶寶祈願按摩，這是一個需要妳為自己進行的按摩。寶寶祈願按摩之所以有效，是因它增進並平衡流經女性生殖器官的氣，特別是流經子宮的氣。它可提升女性的免疫系統健康，並減少身體及心理的壓力，也有助於傾斜的子宮重新歸位，改善子宮及子宮頸部位循環不良的問題，並促進健全的荷爾蒙平衡。


    ### 寶寶祈願按摩


