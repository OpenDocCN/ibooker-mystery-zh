  md: '# 第二代症狀


    的親密關係。


    依照我們的經驗，能量創傷會對創傷倖存者造成三種顯著影響。扭曲能量會猛烈入侵倖存者的能量場。這種能量入侵暴力，將導致一種或多種能量載體散失，也就是所謂的「碎裂化」(fragmentation)。而且，這種入侵會阻礙倖存者精微能量場的氣流動。倖存者得終生面對這三種影響所造成的問題，這些問題通常無法由傳統療法或當前主流藥物來導正。


    即使能量創傷會對倖存者的精微能量場產生立即影響，多數受創者仍無法辨認初期的第一代症狀。直到之後的第二代及第三代症狀產生時，才會感到有些部分相當不對勁。第二代症狀包括自我控制、信任、個人力量及活力的毀損，憂鬱跟焦慮是常見的第二代症狀。


    隨著時間流逝，這些能量及心理的症狀，可能導致動力缺乏、創造力受阻及界線問題，造成倖存者在日常生活的一般活動中表現退縮。


    當孩童受創，會另外出現長期的複雜狀況。這些狀況包含個人認同身分毀損及出現盲點，讓孩童難以成功適應學校生活，也無法與同儕形成良好關係。會出現盲點，通常是因痛苦及恐懼令孩童難以'
