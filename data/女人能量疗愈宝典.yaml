  md: '# 創傷，內在故事


    此章開頭，先探討創傷如何在身體及精微能量場層面削弱女性能量。接著，妳將學到三種練習，設計來療癒導致慢性症狀的能量創傷。然後我們會提供妳一些練習及技巧，設計來徹底克服——現代女性最常見的創傷所造成的模式及心理症狀——前世創傷、身體及心理創傷、性創傷及飽受忽略創傷。


    雖然醫師及心理健康從業人員已經研究各類創傷形式多年，他們仍難以定義創傷，這是因為，單純只想定義甚至描述一個創傷事件，而不將倖存者精微能量場所受的暴力傷害納入考量，幾乎是不可能的。原因很簡單：精微能量場所遭受的暴力，才是造成創傷倖存者飽受絕大部分急性或慢性創傷症狀折磨的主因。


    想了解創傷事件為何能對人造成長期影響。首先要明白，每個創傷事件其實都是雙重事件，包含兩種創傷——身心創傷以及存在於非物質層面卻同等真實的精微能量場創傷。


    身心創傷的記憶也許能被壓抑，但精微能量場創傷，會常年存於創傷倖存者意識之中，干擾他們的真實身分認同及性取向。也會粉碎倖存者的信任感，毀損他們的自尊，讓他們難以與他人建立長期'
