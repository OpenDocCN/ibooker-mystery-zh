  md: '在接下來的練習中，妳會啟動陽維|陰維、陽蹻|陰蹻這些經脈和手腳部的小型能量中心。透過啟動這些器官，妳能讓自己更有力量去顯化天賦並增益工作與關係，也更有力量在世上向前邁進並有所進展。


    # 陰維|陽維冥想


    陰維|陽維冥想是設計來提升在雙掌經脈匯集的迴圈中流動的氣流量，先從身體右側開始，然後左側。


    要開始陰維|陽維冥想，首先以一個舒服的姿勢安頓好自己，背部打直。閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要啟動我的心輪。」繼續宣告：「我要安住在心輪場中。」安住在心輪場後，宣告：「我要將心智注意力投射在身體右側陽維脈的上端。」若沒有什麼阻礙，當妳把注意力放在陽維脈，流經此脈的氣會帶著它沿脈沉降到位於右掌心的終點。到達陽維脈終點後，將注意力朝手掌垂直移動約二點五公分，到達陰維脈的起點（位於右掌）。若沒有什麼阻礙，當心智注意力找到此脈，它會被帶往手臂內側（由沿脈流動的氣流來帶領），然後抵達胸部右側的終點。'
