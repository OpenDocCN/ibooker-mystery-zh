  md: '# 抗憂鬱冥想


    縱使性荷爾蒙能帶來許多正面影響，當女性性荷爾蒙平衡受毀損時，能導致腦部進入憂鬱狀態達數月之久，心智網絡會自許多能量層面互動中抽離。童年的制約、創傷及來自他人的投射，皆可讓這情形加劇。在西方社會中，憂鬱的比例已達歷史新高，所以此章也收錄了抗憂鬱冥想。


    妳應一天練習一次抗憂鬱冥想，最好在早晨練習，持續到憂鬱症狀消失為止。


    要開始抗憂鬱冥想，首先以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。


    放鬆後，將心智注意力集中在右半腦，維持二到三分鐘。然後，將心智注意力集中在左半腦，維持二到三分鐘。試著察覺兩邊腦部感覺的差異。是否有一側的溫度感覺比另一側更溫暖？是否有一側比另一側感到較多壓力？是否有一側感覺麻木而另一側不會？是否有一側感到不舒服而另一側不會？試著察覺這些差異，需要花多久時間就花多久時間。然後用右拇指用力按壓頭頂的穴點（見圖11）十秒鐘，十秒後，放開拇指並等待十秒鐘，按壓再放開的過程共重複三次。'
