    人格、成為自我認同一部分的不健全原型。認同之重要步驟。不過，要完成這個過程，妳必須回復自己的心智層面，並克服那些已被整合進自己的生命的身分認同，是療癒靈魂和靈性的必要條件。脈輪療癒及釋放業力包袱，則是創造肯定生命的身分自信、自尊和同理心，是構成肯定生命的女性身分認同之基礎。對於現代女性來說，創造肯定生命的身分認同，如何回復並精煉自己的身分認同，讓它支持妳與女性的宇宙性能量及自己的關係，是必要之苦。肯定生命的身分認同，是散發內在光采的女性喜悅度日的必要元素。這一章將向妳演示；若缺乏肯定生命的身分認同作為生命定錨，一個女性的靈性會一直無所依歸，她的靈魂也遭受不必要之苦。


    心智層面與其他能量載體不同之處在於，心智層面可自能量場向外延伸，因此，它能和環境中的其他人及其他能量場接觸。這種延伸及收縮的能力，使心智層面成為獲取知識及定位自己在世上位置的理想載體。這種能力也使其特別容易受到外在環境扭曲能量場的負面影響，更糟糕的是，人們可將受汙染的心智層面投射給他人。當受汙染的心智層面與妳的能量場接觸，即可能帶著那股扭曲它的能量依附在妳的能量場中。


