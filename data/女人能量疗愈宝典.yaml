  md: '# ## 總結


    在本章中，妳學會將傳統關係轉化為超凡關係。要經歷與自己的超凡關係，首先要克服阻礙妳體驗超凡的破壞性模式。妳也學會讓自己安住在第三心場域中。為了創造出伴侶間的超凡關係，妳學會


    隨著脈輪序列上移，升高音調。第二脈輪是A大調，第三脈輪是B大調，第四脈輪是D大調，第五脈輪是E大調，而第七脈輪是F大調。


    若不清楚該唱頌哪個音調，試著從妳能發出的最低音調開始，然後微調音調，直到感覺第一脈輪出現相應的共振，如振動或發光的感受，這表示妳已唱頌出相合的音調。妳可以用同樣方式確認自己是否唱頌出七個傳統脈輪的相合音調。


    在學齡前唱頌中，先由妳從第一脈輪唱頌音調，當妳唱頌完畢，邀請孩子一起用同樣音調唱頌兩遍。然後升高一個音調，從妳的第二脈輪唱出音調，和孩子一起唱頌三次。繼續以相同方式，每升高一個音調，唱頌三次，從妳的第三、四、五、六及第七脈輪唱頌出來，並邀請孩子一起唱頌。


    當妳和孩子完成傳統七脈輪唱頌後，繼續從心輪唱頌五分鐘。只要孩子喜歡，可以一直持續進行這練習。'
