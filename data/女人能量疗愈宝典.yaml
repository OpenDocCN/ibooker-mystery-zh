    # 什麼是業力包袱？


    想了解什麼是業力包袱，以及它為何能夠干擾妳的生活及關係，首先要了解業力由來及如何運作。古梵文業力（karma）一字，是源自字根，其意為「去行動」，象徵一個行動或是行為。在西方世界，業力被定義成「行為的累積效應」。狹義來說，的確如此。但在東方的偉大宗教中，對業力的結構或功用的描述，皆超越了此定義。


    耆那教（Jainism），這個印度的古老宗教，著重美、和平及崇敬。耆那教將業力及其延伸的業力'
