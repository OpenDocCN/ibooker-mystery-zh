  md: '會體驗到身處傳統關係的女性無法得到的滿足感。


    創傷：每個創傷事件其實都是種雙重事件，包含兩種創傷，身心創傷以及存在於非物質層面，卻同等真實的精微能量場創傷。精微能量場所遭受的暴力，是造成創傷倖存者飽受絕大部分急性或慢性創傷症狀折磨的主因。


    宇宙意識：由所有男性及女性層面所組成的一體存有；陰／陽。它是真實心智及物質和非物質宇宙中萬事萬物的基礎，包含了時間、空間、能量及意識。


    女性的宇宙性能量：鼓舞人們彼此連結並體驗親密的感受。每個人與生俱來這股能量，因此，人人皆可成為療癒師、充滿愛意的情人，以及從深層內在散發光采的個體，透過自己所提供的服務與關係轉化世界。


    宇宙性特質：宇宙性特質包含歡愉、愛、親密、喜悦、真實及自由。宇宙性特質不會產生依存——它們支持道途、超凡關係及自我了悟。


    載體：一種能量載體。妳擁有兩種能量載體，能量體及鞘。能量體讓妳得以存在當下，鞘讓妳得以和其他生靈互動。


    女性療癒空間：女性療癒空間是女性在其能量場中創造出來的場域。她可以在這個場域中療癒自己及所愛之人的身心靈層面。要創造療癒空間，妳需要合併普拉克里提能量場和同理能量場這兩資源場的能量與覺知。'
