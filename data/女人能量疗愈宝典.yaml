  md: '+   ○ 陽維脈：陽維兩脈是陽性手臂通道。雙臂皆有，它們繞過雙手中指，將肩膀及掌心的小型能量中心予以連結。


    +   ○ 陰／陽：陰代表女性、身體、靈魂、地、月亮、水、黑夜、冷、黑暗及收縮。陽代表男性、心理、靈性、天、太陽、白晝、火、熱、陽光及擴張。


    +   ○ 陰維脈：陰維兩脈是兩條手臂通道，雙臂皆有，它們將掌心的小型能量中心及胸部予以連結。陰維脈自雙臂內側延伸，和陽維脈並行，構成掌心的小型能量中心。


    +   ○ 瑜伽：合一。也意指在印度發展出的一種古老科學法門，目的為達到開悟狀態。


    +   ○ 瑜伽式呼吸：一種瑜伽呼吸技巧；瑜伽式呼吸有助呼吸回復自然狀態並提升能量場流動散發的氣流量。


    +   ○ 優尼：優尼是一個梵文字彙，意指「神聖通道」或「誕生之處」。廣義來說，它亦代表起源、根基或神聖空間：一個散發內在光采的完整女性所擁有的空間，是女性的宇宙性能量顯化之處，也是性愉悅的泉源。'
