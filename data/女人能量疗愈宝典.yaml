    ### 練習 17 釋放異常心智


    在隨後的練習中，妳將學習如何釋放並淨化已依附於能量場上的異常心智層面。然後妳會學到如何淨化自己的心智層面，讓靈魂和靈性能夠得到自由，實現其真實目標。


    想要釋放並淨化已依附於能量場上的異常心智層面，請先找一個舒服的姿勢安頓下來，背部打直。從清單中選一個議題或身分認同問題來練習。若妳覺得清單所列並不適用，可以選一個干擾妳創造力且肯定生命的身分認同的議題。把議題放在心中，然後閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後持至樂幸福手印（詳見第四章）。邊持手印邊宣告：「我要在面前創造一面二點五公尺的視覺螢幕。」當螢幕浮現，宣告：「我要觀想自己的影像出現在螢幕上。」影像浮現後，宣告：「我要定位其能量與我心中議題最有關聯的異常心智層面。」若異常心智層面出現，它的樣態會像是一條具有彈性的管子，插進我們的身體空間中，並延伸出能量場外好一段距離。一旦妳確認它是異常心智層面，宣告：「我要用一個氣團來包圍心中所想的心智層面。」氣團要夠大足以緊貼包覆住心智層面，再宣告：「我要在這個氣團中注入幸福，並淨化它所包圍的心智層面。」最後宣告：「我要讓被淨化的心智層面，直接回到它的發源地。」


    當異常心智被淨化及釋放後，讓氣團消散，鬆開至樂幸福手印，並且讓視覺螢幕上的影像及螢幕消失。最後從一數到五結束這個練習。


    創造更具肯定生命特質的身分認同時，請謹記，一個議題或認同問題的背後，可能會有超過一個的異常心智層面作為能量供給來源。因此，若已淨化及釋放一個異常心智層面，卻感覺議題依舊持續。那麼，請重複這個練習，直到所有與那議題或身分認同相關的異常心智層面都被淨化及釋放。


    ### 重新整合個人的心智層面


    要創造肯定生命特質的身分認同，請注意一個重點，就是妳的個人心智層面純淨未受汙染，且被適當整合進能量場之中。想要淨化並整合個人的心智層面，首先找一個舒服的姿勢安頓下來，背部打直，然後閉上雙眼，鼻吸鼻呼，深呼吸一到三分鐘。運用標準法門讓肌肉放鬆並安住在真實心智中，然後持至樂幸福手印（詳見第四章）。邊持手印邊宣告：「我要在面前創造一面二點五公尺的螢幕。」當螢幕浮現，宣告：「我要觀想自己的影像出現在螢幕上。」影像浮現後，宣告：「我要定位出我最受汙染的心智層面。」


    若心智層面受汙染，它會扭曲，並沿著邊緣鼓脹起來。由於無法好好整合，它會傾斜在身體空間之外，或是倚躺在身體空間的邊緣。


    一旦妳從形狀及位置定位出個人心智層面，宣告：「我要用一個氣團包圍心中所想的心智層面。」再宣告：「我要在這個氣團中注入幸福，並淨化它所包圍的心智層面。」最後宣告：「我要重新整合剛被淨化的心智層面。」安靜十分鐘，不用做任何事情，只是享受這個過程。


    十分鐘後，讓氣團消散。鬆開至樂幸福手印，並且讓視覺螢幕上的影像及螢幕消失。最後從一數到五結束這個練習。


    一旦妳淨化並釋放個人心智層面，會感到如釋重負，重新擁有自信心。若妳繼續淨化及整合所有受汙染的心智層面，短時間內，妳會擁有更有力及更肯定生命的身分認同。


    ### 克服自我設限原型


    學會療癒心智層面之後，妳已準備好學習克服女性的自我設限原型。自我設限原型是一種扭曲及膚淺的女性形象。這種原型會扭曲女性對身體及自我的感覺，讓女性難以創造健康、肯定生命的身分認同，進而限制女性的力量、創造力和內在光采。


    妳可能覺得自己對自我設限的文化原型免疫，但在多數人的生活中，娛樂產業跟宗教制度仍舊影響深遠，它們對於女性的描述依舊充滿許多扭曲跟貶抑。事實上，也許法律已讓女性從過往的壓迫中解放，但遍布現代社會中的女性自我設限原型，仍將女性局限在扭曲、不合時宜的框架中。


    女性原型有許多類型。在多數現代社會中，具有各種針對不同類型女性和女性生活重要階段的各種正向及負向原型。令人驚訝的是，即使是現代社會中的正向原型，仍可能負向的限制女性的天生力量、創造力和內在光采。


    女孩在青春期所面對的艱難轉換過程，驗證了以上觀點。年輕女性在這段生命重要時期，因缺乏健康、肯定生命的原型，因此，對於這段時期中身體和能量場的改變和自然需求，反應近乎震驚。的確，在這段重要時期中，西方世界的年輕女性幾乎無法與強健、肯定生命身分認同的健康原型接觸。相反的，只能和無法支持她們處理重要議題的文化原型共處，而這些重要議題，包含了性、避孕、孩子養育和婚姻。


    相反的，傳統的母系社會則提供年輕女性大量支持及更健康的女性原型（D-Maria 2011）。'
  mdcn: '## 釋放業力包袱


    現在妳已經學會至樂幸福手印，準備好開始運用自己的幸福、意圖及心智注意力，來釋放精微能量場中的業力包袱沉積。


    首先，決定想要釋放哪一種業力包袱沉積。既然能量阻塞、自我設限模式、負面和自我毀滅態度、情緒及感受等狀況，都源於業力包袱，選擇一種來釋放應該不難。困惑、混亂及曖昧不明通常源於業力包袱，嫉妒、羨慕、自我懷疑與譴責、憤怒、挫折、焦慮、空虛、煩悶，以及阻隔妳連結身心靈的麻木感，同樣也是源於業力包袱。妳可選擇一種身體狀況如背痛或磨牙來釋放，因為這些狀況同樣來自於業力包袱。


    選擇完畢，請謹記業力包袱是帶有個別特質的，因此，它會比氣更沉重，也更稠密。


    一旦選定了一種議題或模式來解決，就是先運用標準法門讓肌肉放鬆，並安住在真實心智中，接著持至樂幸福手印。然後，讓意圖運作心智注意力來定位，並釋放妳心中所設定的業力包袱的沉積。


    ## 釋放業力包袱的沉積


    開始之前，請先以舒服的姿勢坐好，打直背部。選定一種源自業力的議題、模式或不適狀況來釋放。


    當妳選好要釋放的議題、模式或不適狀況，閉上眼睛，鼻吸鼻呼，深呼吸二到三分鐘。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後練習至樂幸福手印。繼續持此手印，宣告：「我要在面前創造一面二點五公尺的視覺螢幕。」當視覺螢幕浮現，宣告：「我要觀想自己的影像出現在視覺螢幕上。」影像浮現後，宣告：「我要在影像上定位出業力包袱，這個業力包袱造成我在空格內填入要解決的議題、模式或身體不適的狀況」。


    妳可能會在視覺螢幕上看到或感受到業力包袱的沉積。不論是看到或感受到，相對於背景，它們都會顯得特別突出，因為它們的樣態會比較稠密、沉重、看來比較晦暗，或讓妳的能量場倍感壓力。


    在一些情況下，它們甚至會導致身體的不適。


    當妳在視覺螢幕上定位好業力包袱，接著想像一個氣團將它包圍起來，氣團的大小與形狀盡可能與業力包袱沉積相同。想像氣團時，宣告：「我要想像一個氣團來包圍心中所想的業力包袱沉積。」看到或感覺到這個氣團後，宣告：「我要在這個氣團中注入幸福，並釋放它所包圍的業力包袱。」然後靜靜等待，不需任何動作。幸福會自動進入妳所創造的氣團中。由於幸福遠比任何帶有個別特質的能量更有力量，在氣團中的業力包袱將被永久釋放。


    有些人可能會感到鬆了一口氣或是有種爆裂的感覺。這些都是業力包袱被釋放，由幸福取代它原有位置的跡象。


    釋放掉業力包袱後，讓氣團消失並鬆開至樂幸福手印。然後從一數到五，回歸到平時意識狀態。當妳數到五時，睜開雙眼，妳會感到非常清醒，全然放鬆，感覺比之前更好。


    ## 克服局限的信念


    現在妳已能釋放業力包袱，接下來也可運用同樣的技巧，釋放局限的信念所帶來的影響，因為局限的信念同樣根植於業力包袱的沉積中。


    局限的信念是那些廣為社會制度所接納，卻妨礙人們自由表達的信念。此信念阻礙了氣的流動，也導致人們難以安住在自己的能量場中。這些信念對女性影響尤其顯著，削弱女性的力量、創造力及內在光采，讓女性對自己的身體及自我感覺產生扭曲，也對創造健全真實的身分認同造成阻礙。


    局限的信念讓女性在能量層面無法開展，增加自我設限和自我毀滅的傾向，造成如長期缺乏安全感等狀況。


    ## 絕妙的心智功能


    一九五五年，當時廣受歡迎的作家庫明斯（e.e. cummings）提及：「在這世上，只成為自己而不成為任何人最上策。日日夜夜仿效他人，代表你將參加一場人類史上最艱難的戰役。」


    想要克服局限的信念，讓這些信念不再阻礙妳享受及分享氣，必須運用心智功能來達成這個目的。心智功能如同意圖，源自於妳的真實心智。它能協助妳自由參與物質與非物質世界的所有活動，直接體驗這個世界，不受局限的信念所干擾。它也提供妳力量，以克服妳生活中所有因局限的信念所造成的阻礙。


    妳的心智有十六種重要功能，力量、創造力及內在光采也由此產生。妳已經學到其中一種，運用意圖來進行脈輪療癒並釋放業力包袱。另外的十五種包括意志、渴望、耐力、臣服、接納、洞悉、選擇、承諾、拒絕、信心、享受、破壞、創造、同理及愛。


    ### 踏出第一步


    想克服局限的信念，妳需將心智功能及正向肯定語一同並用。正向肯定語可被定義為真的宣言。「我是一個散發內在光采的女性，擁有所有女性的宇宙性特質。」此種宣言，就客觀而言始終為真，是因它無法被任何文化或局限的信念所修改，在任何情況中始終不改其真實性。


    用一句真實的肯定語取代局限的信念，會對妳造成深刻的影響。它會增強妳的自尊及能量場中的女性能量流動，也讓妳能持續安住在自己的真實心智中。


    ### 二十一世紀的肯定語


    傳統的肯定語通常運用一項心智功能來克服局限的信念。但在我們的經驗中，同時運用一項以上的心智功能來克服局限的信念，將會更有效果。妳有一個好理由這麼做：每項心智功能都會釋放一個特定範圍內的氣，先前這個範圍內的氣，因為局限的信念而受到阻礙。


    這也表示，藉由運用一項以上的心智功能，妳能夠逐步遠離生活中局限的信念所造成的影響，然後克服它。「我必須掌控生活中的各個層面。」就是一個能說明局限信念的論點。當局限的信念出現，妳能藉由肯定語宣告來遠離其影響：「我對宇宙的女性能量有信心並喜愛它，因此我不需掌控生活中的各個層面。」然後再運用另外兩個心智功能——洞悉和接納，來克服這個局限的信念，宣告：「我知道並接納自己能在各種狀況中保持開放、有彈性。」當妳清楚且堅決的唸出肯定語時，它將會發揮最大的效果。


    每當妳受局限的信念干擾，就可運用正面肯定語來解除此情況。當然，也可把正面肯定語作為日常冥想的一部分或能量工作法門。首先，將干擾妳體驗女性力量、創造力和內在光采的局限信念，列出一份簡短清單。在每個局限的信念下方留下書寫空間，然後選擇合適的肯定語與心智功能來釋放這些信念，將其寫在信念下方。在心中想著局限的信念幾分鐘。然後重複唸出與其對應的肯定語，要唸出而非在在心中默想，讓選定的心智功能支持妳。重複唸出肯定語至少五分鐘，或唸到感覺自己不再受局限的信念干擾為止。一次處理一個或兩個局限的信念將會是個好主意。在釋放信念後，妳可以另選時間，重複這個過程，來處理清單上其餘的局限信念。


    以下是一份局限信念的清單範例：


    1. 我需要把每件事物做到完美。

    2. 我必須有苗條的身材來吸引人。

    3. 對男女間的親密關係臣服是脆弱的象徵。

    4. 我必須掌控生活中的各個層面。

    5. 我沒有足夠的力量成為自己，並讓氣流經我的身心靈。

    6. 我做的事情比我是誰更重要。

    7. 我擁有越多，我越成功。

    8. 有力量的女人是過度陽剛的。


    為了導引妳們順利經驗這歷程，以上述清單中的三個局限信念為例，列出妳們可以參考使用的肯定語及心智功能，來釋放這些信念。建議一次運用兩項心智功能，來削減局限信念的影響，再用兩項心智功能來克服它。舉例來說，想遠離並克服「我擁有越多，我越成功。」這個局限的信念，妳能運用妥心和洞悉這兩項功能，宣告：「我相信並了解，成功取決於能否做我自己同時自由的表達自我。」然後妳能使用洞悉和承諾這兩項功能，宣告：「我知道這麼做很恰當，而且我也承諾在工作和關係中分享我的力量、創造力和內在光采。」


    想克服「我必須有苗條的身材來吸引人。」這個信念，妳可以用接納及享受這兩項心智功能，宣告：「我接納並且享受自己的身心靈，它們是宇宙送給我的禮物。」然後妳可以運用洞悉和信心這兩項功能，宣告：「我知道並相信內在美是女性最偉大的寶藏。」


    想遠離「我做的事情比我是誰更重要。」這個局限的信念。妳能運用渴望和洞悉這兩項心智功能，宣告：「我渴望且知道我的成功取決於，成為我能成為的那種——充滿最多力量、創造力和內在光采的女性。」然後妳能使用意圖及渴望，宣告：「我想要並渴望在此生中成為我應成為的那種女性，充滿力量、創造力和內在光采。」


    請運用書中提供的肯定語為基礎，盡情發揮，創造出自己的肯定語。若無法立即削弱及克服局限的信念，請別氣餒。繼續運用肯定語及對應的心智功能，短期內，妳將會克服局限的信念所帶來的影響。


    ## 肯定語法門


    正向肯定語及心智功能，不僅可用來釋放局限的信念，也可被運用來提升身心的健全發展。以下清單，列出一些客觀真實的積極肯定語，以及一個或一個以上的心智功能。當時間允許，妳又有渴望，可以練習這些肯定語：


    1. 我接納並了解，我的內在有無限的女性能源供給我用。

    2. 我接納並了解，自由的表達力量、創造力和內在光采是我與生俱來的權利。

    3. 我相信且接納，爲自己作決定是恰當的。

    4. 我相信且知道，我比自己以為的更有力量；我是一個散發光采、有力量的女人。

    5. 我接納且知道，我超越所知自己的總和。我是女性的宇宙性能量的顯化。

    6. 我渴望並決意轉化自己信念系統中的限制性元素。

    7. 我要愛我本來的樣子，而非其他人想要我成爲的樣子。

    8. 我渴望並決意表達自己真實的女性身分。

    9. 我有意圖、渴望及意志去愛能帶給我歡愉的一切。

    10. 我有意圖、渴望及意志去愛自己的身體及性別。


    在這一章中，妳學到業力包袱的沉積——如何干擾妳和自我、女性的宇宙性能量及所愛之人的關係。接著妳學會如何運用意圖、心智注意力和幸福，來釋放業力包袱的沉積，然後也學到運用心智功能克服局限的信念，並以支持妳自身力量、創造力和內在光采的生命肯定語，來取代它們。下一章妳將學習如何療癒心智層面及克服自我限制原型，來創造能夠肯定生命的身分認同。


