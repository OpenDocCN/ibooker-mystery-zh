  md: '章)。一邊持手印,一邊宣告:「我要讓幸福充滿在我創造的氣團裡,並釋放其中的扭曲能量。」完成後,閉上雙眼,安靜十分鐘享受妳所經歷的改變。然後由一數到五,結束這個練習。按摩結束後,喝杯生育茶。


