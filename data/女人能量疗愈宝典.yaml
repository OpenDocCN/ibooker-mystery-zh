  md: '# ## 其他文化的过渡仪式


    狄波(Dio)族(阿坎[Akan]文化)——一个迦纳北部的小族群，是个良好示范。在阿坎文化中，女人和女孩被教导与健康、适龄的原型相连，让年轻女性保有她们的美丽、纯淨及尊严，让她们不致堕落。阿坎文化相信，受到良好传统教导的母亲，能够养育出富有力量的女儿。因此，相對於男性，此文化更著重女性的过渡历程仪式。


    在族群王后的关係下，首次来月经的女孩们被带到一隔离之处。在随后的二到三个星期中，女孩们开始探索性别的祕密。此外，对于避孕、性交及如何经营婚姻，且同时维持自己的尊严和社会价值等议题，女孩们也学习所有有关这些议题的必要知识(博阿奇[Boatye]2009)。


    阿坎文化对于年轻女性的延伸关係及相闗准备，是现代西方社会完全匮乏的。


    有个理由可以解释这种匮乏。女性的原型，特别在现代文化中，是根据男性理想及认知来取舍的。令人迷惘的是，现代世界的许多原型是由企业所型塑。不管企业的公共关係部门要妳相信什应，这些亿方获利公司的主要利益就是这部分：支持父权价值及营利。事实上，传统或现代的女性原型，都鲜少提供年轻女性重视自我价值或真实自由的角色典范，也没有提供实用的指引，协助年轻女性在亲密关係中找到满足感和成就感。


