  md: '# 78個簡單技巧和練習，啟動女性直覺感官，

    運用妳無限的宇宙性能量，療癒自己及所愛之人


    凱斯和薩賓娜兩位療癒大師，從事女性能量療癒工作將近30年，深入女人沒自信、自我否定、不愛自己等等能量閉鎖的議題根源：包括業力、制約、情緒、受虐或生育創傷。他們融合東西方古老及現代智慧，透過精微能量場運作，協助每一個女人觸及創傷和業力模式，參與療癒過程，強化自己的力量中心，發現喜悅與豐盛的生命活力、創造力，原來就在自己之內。


    書中分享的技巧和練習：脈輪、業力釋放、帝王瑜伽、呼吸、按摩、舞蹈、手印、冥想及肯定語等等，協助女人從各層面療癒創傷，重新整合並提升自己，重新回復女性內在的喜悅與光采。


    妳將學到：


    +   - 自由表達女性能量

    - 欣賞並喜愛自己的身體，增加自信

    - 超越局限的信念

    - 破除舊有負面的女性原型

    - 提升直覺、創傷修復力及感官體驗

    - 將傳統關係轉化成超凡關係'
