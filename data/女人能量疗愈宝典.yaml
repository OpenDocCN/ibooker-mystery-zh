    ### 遠古以來的女性傳承


    鮮少有人注意到，頌讚歡慶女性美好的宇宙性特質，是許多傳統社會中重要的信仰核心，雖然這些傳統社會多數已消失許久，或是融入只保存少許遠古習俗的主流社會之中。


    在現代，只有少數社會仍保留完整古老的女性傳承，其中最大的聚落應屬蘇門答臘的米南加保（Minangkabau）族群。米南加保是現今極力保存平衡男女需求的文化傳統，對富含生命力的女性宇宙性特質保持開放的少數社會之一。


    像米南加保這樣的母系社會，對於尋求身心靈療癒的女性，提供豐富的資源，也讓她們無拘無束的分享與生俱來的女性力量、創造力及內在光華。


    己也是美好的女性宇宙性特質的一部分，將會更能展現真正的自己，發展更加完整、也更能與他人共享生命的美好。


    事實上，不論是單身或是有伴侶，當妳試著在日常生活中整合女性能量，並發自內心讚揚她的美好特質，相信妳也會同意以下的真理：約翰·馬佛博士（Dr. John Mumford）在《譚崔至樂》（Ecstasy
    Through Tantra）一書中提及的佛陀語錄：「女性是神，女性是生命，女性是豐富多樣的。」


    母系社會曾經無比富足的存在於世界各地，身在其中的女性，自然散發著與生俱來的女性的宇宙性特質，被社會視為珍貴寶物般的呵護。


    ### 珍貴寶藏


    時至今日，女性能量的珍貴，仍反映在印度社會的神廟舞女（Devadasi）儀式中。自古以來，神廟舞女能以舞蹈療癒他人，這是因為她們從小被教導——如何自由發揮自身的女性能量精髓，來彰顯生命及療癒。神廟舞女們在舞蹈及療癒過程中，會用手印來增強並讚頌女性能量。


    手印（mudrā），通常由手指或手掌構成某種姿態，有其象徵性意義。除了手指及手掌外，有時也會加入舌頭和腳部的動作。手印一字源自梵文中的字根√mud，表示「愉悅自在」或「喜樂」。


    手印在西方社會流傳的時間不長，在東方社會卻已有幾世紀的歷史，用以幫助身體、心理、情緒及靈性層面的健全發展。古代中國道家用手印來尋求內在平靜。


    印第安神祕文化用手印進入三摩地（samādhi）（開悟）的境界；療癒師則運用手印療癒從頭痛到關節炎的各類疾病。


    手印能發揮效果，是因它能促進精微能量——氣，在能量系統的中心及經脈上流動。透過手印刺


    激穴點，通常經過五分鐘或更長時間，就可以釋放阻塞的能量，進一步療癒自我限制及負面的想法與模式，並達成更深層的自我覺知。


    如同神廟舞女一般，妳可以用珍寶手印來啟動寶貴閃耀的內在能量。這個手印的設計是因為，我們內在的珍貴能量與亢達里尼（Kundalini）能量息息相關。亢達里尼—夏克緹（Kundalini-Shakti）是人體中最偉大的女性能量寶庫，對於已準備好增進自己女性宇宙性特質的人來說，它是內在力量與自信心的泉源。當妳啟動寶貴的內在能量，就已朝體驗遠古力量傳承、創造力及女性宇宙性特質的路上，踏出極重要的一步。


    請先以舒服的姿勢坐好，挺直背部。接著將舌頭輕輕頂住上顎，往上顎後端稍微移動，最後停留在上顎後端較柔軟的位置，並將雙腳腳掌朝內相互碰觸。雙手食指朝掌內彎曲，第一節指背相觸，接著將雙手中指指尖互觸，形成一個三角形，然後將雙手無名指朝掌內彎曲，第二節指背相觸，再將雙手小指伸直，指尖互觸，形成另一個三角形，最後將雙手大拇指交叉碰觸已彎曲的食指，先將左手大拇指放在右手食指上，再將右手大拇指放在左手食指上。


