    女性並不總是身陷和凱特琳娜相似的扭曲性模式中。東方的古老年代，對女性性欲及感官感受有相當不同的觀點，對先祖女性來說，性不是肉慾也不是追逐高潮，相反的，它是一系列緩慢展開的活動——心理上、情緒上、感官上和性行為上——讓女性得以親密的感覺她的伴侶並和他共享性的熱情（沃克〔Walker〕2007，1019-1020）。'
