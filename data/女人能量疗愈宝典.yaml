    業力包袱由帶有個別特質的沉重能量所組成。只要少量的業力包袱，就足以影響精微能量場中氣的流動，並造成能量阻塞及自我設限的模式，干擾妳成為真實的自己及達成個人目標。業力包袱造成的能量阻塞及自我設限模式，也會影響妳的信念系統，因為它為那些被妳整合進人格層面的局限信念，提供能量支持。確實，業力包袱的存在，說明了為什麼想克服局限的信念或改變對自己及他人的觀感，是如此之難。


    ### 什麼是業力包袱？


    想了解什麼是業力包袱，以及它為何能夠干擾妳的生活及關係，首先要了解業力由來及如何運作。古梵文業力（karma）一字，是源自字根，其意為「去行動」，象徵一個行動或是行為。在西方世界，業力被定義成「行為的累積效應」。狹義來說，的確如此。但在東方的偉大宗教中，對業力的結構或功用的描述，皆超越了此定義。


    耆那教（Jainism），這個印度的古老宗教，著重美、和平及崇敬。耆那教將業力及其延伸的業力包袱，看作是累積在人類能量場中的精微物質。這個古老的教派認為，業力包袱會讓理解力及覺知變得模糊不清；它偽造出感官感受、感覺及情緒，蒙蔽真相，創造自我設限的模式，決定人們的清醒狀態及精神健全程度，它也毀損個人的力量。


    我們應該清楚，業力包袱的原理比那保證妳種瓜得瓜、種豆得豆的抽象因果概念，更為複雜。業力包袱是一種自然力量，顯化意志、意圖並在所有可預測的世界與次元中，連結因果效應。


    這表示業力包袱的作用和地心引力十分相似。如同地心引力，由因果效應創造出的極性業力，能將妳吸引至人、事、物的扭曲能量場，並依附其上。只要妳依附在這種帶有個別特質的能量場中，一種偏頗關係就此形成，開始將扭曲的能量自扭曲能量場中，傳送至妳的精微能量場。這也說明了業力包袱是如何在精微能量場中累積的。當妳的依存越多，妳的精微能量場會越偏離平衡狀態，而當精微能量場越偏離平衡狀態，妳越容易深陷扭曲能量之中。這種狀態若不斷持續而未被覺察，精微能量場中就會累積層層疊疊的業力包袱，導致妳的能量場堵塞，讓妳難以從事日常生活中的活動或和他人維持親密關係。


    當妳在靈魂（智能、感覺、情緒）層面累積了一定程度的業力包袱，這些包袱會讓妳難以順暢感受或表達自己的情緒。它們也會干擾妳的覺知、創造力及推演歸納能力間的平衡。


    如此一來，妳可能會發現自己陷入內在對話中（個人心智及人格間不斷對話），並對個別特質的能量場有所回應。這些情況會讓妳覺得身陷五里霧中或是感覺超速失控。


    當妳在靈性層面累積了一定程度的業力包袱，妳會難以和自己與內在自我（妳的幸福來源）連結時一樣，能夠向內觀照、體驗內在平靜及享受幸福，它們也會干擾妳辨認及遵循自己的道途。


    靈性可視為一種心智的宇宙性層面，與其他生靈共享親密的感覺。直覺、知見及洞察力也從靈性深處浮現。


    妳的道途是個人目標、個人自我療癒路徑及自我了解。個人目標也包含妳的作為及其對他人造成的影響。遵循自己的道途，妳會了解到自己是誰及可在此生成就些什麼。當妳遵循自己的道途，宇宙會助妳一臂之力，為妳移除阻礙並提供資源助妳克服生命的挑戰。


    遵循自己的道途，要全然投入真實心智想從事的活動。這些活動促進氣流經妳的精微能量系統，並讓妳持續安住在真實心智及女性的宇宙性特質中。


    在精神層面上，業力包袱所創造的依存，將讓妳像無頭蒼蠅般漫無目的，永遠依照舊有的業力模式行動。這種沒有結果的無限迴圈，終究是自我欺騙且不利於自我覺察及自由的自我表達。「住在靈性沙漠裡」，通常是這種情況的註解。


    女性想要療癒自己的靈魂和靈性，必須克服自身能量場中的業力包袱，並持續對來自真實心智之最真切的宇宙性特質抱持信心。解開業力包袱束縛，看似像普羅米修斯推石上山的任務一樣艱難。事實上，卻有許多女性完成這種任務。當然，妳也可以。書中的練習，可運用來釋放業力包袱，並讓妳永遠脫離其束縛。


    ### ◎向業力包袱說再見。


    釋放業力包袱的工具，其實都已配備在妳的精微能量場中。不過，它們是經由真實心智而進入意識覺知中。我們所提到的工具，包含意圖、心智注意力以及轉化為祝福形式的超凡意識。將這三個工具妥善整合，妳將能準確定位出精微能量場中的業力包袱，辨認它們的性質，然後永久釋放它們。


    ### 妳的意圖


    意圖是真實心智中的一種功能，作用於物質及非物質宇宙中的所有世界及次元。在接下來的練習中，妳會用意圖運作心智的注意力，以定位精微能量場中的業力包袱集中處。這些包袱造成妳身體不適、能量場阻礙，自我設限模式、負面及自我毀滅態度、情緒，還有感受。在妳用意圖運作心智的注意力後，便能讓意圖與幸福結合，進一步釋放業力包袱。


    ### 妳的心智注意力


    心智注意力同時在在物質及非物質宇宙中的所有世界運作。以意圖為導引，妳的心智注意力能夠定位精微能量場中的業力包袱所在，並提供妳必要資訊以釋放這些包袱。資訊包含了業力包袱的大小、形狀、密度、極性以及活躍程度。


    ### 至樂幸福


    至樂幸福是宇宙間最強大的力量。每個人都處於幸福中，雖然大多數人都沒有覺察到這一點。根據譚崔教導，至樂幸福是種持久狀態，存在於妳的能量場深處，源於意識（濕婆（Shiva））及能量（夏克緹（Shakti））匯集之處。帶有宇宙性特質的意識及能量融合後，可為妳帶來一股持續的力量之流，釋放最沉重的業力包袱沉積。


    不過，想要運用至樂幸福釋放業力包袱，必須讓至樂幸福得以出現在意識層面，並在療癒過程中持續存在。因為妳必須有意識的讓幸福散發其力量，讓那些經由意圖運作心智的注意力來定位的業力包袱，得以永久釋放。


    要讓幸福得以出現在意識層面，要先學習為此目的而設計的手印，這個手印稱為至樂幸福手印。


    請特別注意，幸福並不是女性能量的一種形式，而是人類所能達到的最高層級意識狀態。


    ### 至樂幸福手印


    練習至樂幸福手印前（見圖9），先運用標準法門讓肌肉放鬆，並安住在真實心智中。接著將舌尖輕輕頂住上顎，往上顎後端稍微移動，最後停留在上顎後端較柔軟的位置。當舌尖定位後，雙腳腳掌朝內，腳跟相互碰觸。然後將雙手放在太陽神經叢前方，兩拇指指尖互觸，再將雙手食指彎曲，第一指節外側互觸，然後雙手中指彎曲，第二指節外側互觸，無名指及小指則向掌心彎曲，當舌頭、手指和腳部都就定位後，閉上雙眼，鼻吸鼻呼。


    練習這個手印十分鐘後，即可放鬆雙手及雙腳腳跟，讓舌頭回歸到平常的位置。然後從一數到五，回歸到平時的意識狀態。當妳數到五時，睜開雙眼，妳會感到非常清醒，全然放鬆，感覺比之前更好。


