  md: '# ## 練習 與未出世胎兒的連結練習


    創造健全的能量連結,可以提升懷孕女性與其尚未出世、還在子宮內成長胎兒間的關係。這不僅對胎兒有益,對母親也是。與未出世孩童共享能量連結,母親較不容易經歷產後憂鬱或遭遇業力阻礙,業力阻礙會干擾氣流在母親與發育中胎兒的能量場間自在流動。


    根據上述理念,我們設計了與未出世胎兒連結的冥想,女性可以在懷孕第二個月開始練習。找一個安靜不受打擾的地方,仰躺下來,將注意力放在掌心的小型能量中心,從掌心吸氣,啟動小型能量中心,呼氣時,從心輪唱頌嗡,心輪與樂曲的C大調共振。透過由心輪唱頌嗡,妳能創造一種感應式振動,進一步啟動掌心的小型能量中心。


    唱頌嗡二到三分鐘,合掌放在腹部,雙手手指相對,繼續從心輪唱頌嗡,並讓唱頌所產生的振動,形成妳與未出世胎兒健全持久的能量連結。


    繼續這過程十多分鐘,然後移開雙手,從一數到五,當妳數到五時,結束這個冥想。每天進行一次練習,直到懷孕為止。


