  mdcn: '## 練習光體能量場冥想


    要練習光體能量場冥想，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要安住在光體能量場中。」繼續宣告：「我要在光體能量場層面上，讓感官向內觀照。」花幾分鐘享受能量轉變。繼續宣告：「我要讓我的光體能量場充滿氣。」花五分鐘享受這歷程。然後宣告：「我要和所愛之人共享充滿我光體能量場的氣。」當氣在妳的周身散發流動時，花十分鐘體驗光體能量場的轉變，然後由一數到五，結束此冥想，數到五時，睜開雙眼，妳會感到非常清醒，全然放鬆，感覺比之前更好。當妳需要時可做此練習。


    現在妳已擁有所需工具來療癒自己靈性，並讓靈性自由散發它的力量和愛，妳已準備好歡慶女性宇宙性能量。為了達到此目標，我們收錄了三種活動：散發內在光采女性的步行，散發內在光采女性的舞蹈及女性歡慶日。透過這三個練習，妳將可在任何愉悦時刻歡慶女性靈性。


    ## 散發內在光采女性的步行


    要進行散發內在光采女性的步行，先找一個喜歡的地方，在那步行不會受到干擾。樹林或靜謐沙灘會是好選擇。當妳準備好了，開始步行。步行時，感覺自己的雙腳與大地及從大地涌出的女性的宇宙性能量接觸。保持專注，不用多久，就會感到腳底的小型能量中心散發光芒。


    當妳覺察到光芒，將注意力轉向手掌的小型能量中心。繼續走，掌心朝上，感覺手掌的小型能量中心與穿透空氣的女性的宇宙性能量接觸，當妳感到手掌的小型能量中心散發光芒，將注意力放在心輪。持續從心輪呼吸，直到心輪開始活躍。然後宣告：「我要從心輪散發氣，流經我的雙眼，照進我周圍的世界。」繼續內在光采的女性步行二十分鐘。在每一步中，盡情享受體會，流經妳雙眼的氣如何豐富妳對世界的體驗。


    ## 散發內在光采女性的舞蹈


    進行散發內在光采女性的舞蹈時，有沒有背景音樂都可以。開始時站直，雙肩往後挺，頭抬高，用鼻子進行深呼吸，呼吸時，感受自己的呼吸及情緒變成散發光采能量之流的一部分，繼續以這種方式呼吸，持續五分鐘。然後開始轉動妳的右手腕，朝各個方向轉動手腕，讓妳感覺到了限制手腕活動的能量淤結，然後以同樣方式轉動左手腕。再來是妳的右手肘跟左手肘，接下來，朝各個方向轉動妳的脖子和肩膀，繼續轉動妳的右腳踝、左腳踝、右膝蓋、左膝蓋、右髖關節及左髖關節。最後，朝各個方向轉動腹部，帶動整個骨盆轉動。當妳朝各方向轉動骨盆後，會感到所有淤結都被鬆開，所有的關節開始與動作合為一體，讓妳可以自然而然的進行散發內在光采的女性之舞。


