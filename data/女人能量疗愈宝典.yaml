    ## 脈輪療癒


    現在，妳已回復自己身體及精微能量場的強健中心，也學會了創造視覺螢幕，是開始學習脈輪療癒的時候了。妳可以療癒各種源於精微能量場的身心靈及關係的不適和障礙。


    開始脈輪療癒前，請先了解，第一：宇宙有兩種類型的能量，一種帶有宇宙性特質，另一種則帶有個別特質。第二：妳的精微能量場及能量系統只能夠轉化和傳送帶有宇宙性特質的能量，無法轉化和傳送帶有個別特質的能量。


    ### 帶有宇宙性特質的能量


    帶有宇宙性特質的能量，在物質與非物質宇宙中，創造生命的多樣性。若沒有這股能量，令人敬畏又充滿啟發性的宇宙將不存在，具備精微能量場及物質身體的有情眾生，也無法覺知宇宙。自然沒有歡愉、愛、親密和喜悅的存在。


    有些人可能已經了解這股能量的特殊力量。當這股能量在妳的能量場閃耀的自由流動時，妳會體悟到它的強大力量，它可以療癒疾病，也可以讓妳快速躍進超凡脫俗的狀態，生命中的問題和擔憂消失不見，妳開始能和富含生命脈動的宇宙同在，持續領受這樣的幸福。


    ### 帶有個別特質的能量


    前面已經談過，帶有宇宙性特質的能量，它是非物質宇宙初始時所形成的女性能量原型。不過，另有一股能量隨後形成。這是一股由感官接納的能量，它具有個別特質且不停在變動。


    在物質層面上，熱、電及光是帶有個別特質能量的良好範例。帶有個別特質的能量，無法在物質層面上被界定。不過在非物質宇宙中，仍有些帶有個別特質的能量場，有其可以被形容的性質，或稱為「特色」。其實妳已經熟悉這種能量，它就如同在壓力狀態下時，讓妳感到沉重又肌肉緊繃的能量，或是在有意識或無意識下被挑起的焦慮、自我懷疑或困惑的感受。事實上，各種形式的個別特質能量，很有可能是人們受苦或罹病的主因。譚崔大師以屬性來描寫帶有個別特質的能量場。梵文
    guna 代表「特質或屬性」，在古典譚崔中，悦性 (Sattva) 、惰性 (Ragas) 及變性 (Tamas) 三種屬性被用來描寫個別特質的能量。


    變性能量，是個別特質能量中最沉重也最扭曲的一種，過量的變性能量附著在精微能量場時，會導致嚴重疾病，對整體身心健康造成毀滅性的影響。


    惰性能量比變性能量輕盈一些，在大多數例子裡，對健全身心的危害較少，但過量的惰性能量，仍會讓妳偏離自己的強健中心，令妳難以敞開心胸接納女性能量的宇宙性特質。


    悦性性能比變性及惰性性能量更輕盈一些，對人類整體的身心健康傷害最小，但是它仍能阻礙妳連結自己身體及精微能量場的強健中心，讓妳難以成為自己，無法自由的表達自我。


    ### 精微能量系統


    妳的精微能量場，具有穿透妳的物質身體的宇宙性特質。精微能量場包含兩種能量載體——能量和鞘。除了能量載體外，妳的能量場也包含了資源場，資源場提供滋養妳的能量載體，和精微能量系統的能量及意識。


    妳的精微能量系統包含了脈輪、脈輪場、經脈、氣場，及散布在精微能量場中的許多小型能量中心。


    如同輸電網絡為居家及商業環境提供能源，妳的精微能量系統器官也傳送、轉化所有妳的身體及能量載體所需的氣，以維持它們的健全運作。


    接下來，會更深入探討妳的精微能量系統的器官，特別著重在脈輪、脈輪場及小型能量中心。因為在脈輪療癒時，妳若有技巧的運用這些器官，將可為最常干擾妳的生活及關係的那些問題，找到能量解決之道，這些問題通常都發源於能量場中的阻礙。


    ### 脈輪


    一般來說，當個別特質能量聚集，阻礙氣（宇宙性特質能量）自在的在脈輪或小型能量中心流動閃耀時，就會在精微能量場中形成堵塞。我們所說的這種能量聚集，可以視為由沉重能量形成的浪潮或池塘，具有活性及流動性，尤其在妳特別關注它時。由於它的密度及流動性，它會阻礙氣的順暢運行，如同灰塵會阻礙來自空氣清淨機中的新鮮氣流。


    這些阻礙造成了自我設限及消極信念等依存，它們通常會伴隨妳經歷很多世，因為妳在精微能量場中支持這些阻礙，讓它們得以伴隨妳輪迴轉世。


    脈輪、脈輪場及小型能量中心，主要負責控管非物質宇宙中的能量活動。這些能量活動，包含了許多被人們誤解只能發生在物質層面的互動。同理心、動力、熱情及人類的愛與親密等能量互動，皆由脈輪、脈輪場及位於手部及腳部的能量中心所控管。


    這意味著，能量系統的狀態，足以影響妳的感知能力及情感表達能力。不幸的是，這也表示，當妳的精微能量場中存有阻礙，妳會發現，自己與環境及人群的互動能力也同樣受阻。


