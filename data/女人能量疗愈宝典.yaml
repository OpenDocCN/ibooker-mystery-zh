    誘惑能以性遊戲或操弄形式來呈現。不幸的是，在許多社會中女性所受的教育，是運用誘惑從男性那得到自己想要的事物，視此為理所當然。即使時至今日，在許多社會中，女性透過誘惑方式來操弄男性，將難以和通常源自精微能量場的力量連結。


    ### 喋喋不休


    受挫的女性，或在孩提時代學會向雙親喋喋不休的女性，通常會對伴侶或家中其他男性繼續這樣的模式，以得到她們想要的。喋喋不休是無力感的極端表達方式，任何習於此種模式的女性，會因缺乏自尊而受苦，因為她無法自由表達自我的真實力量。


    ### 內疚幻象


    有些感到自己缺乏力量的女性，會運用男性的弱點或男性顯露的負面性格，讓他感到內疚。內疚幻象的危險在於，它會毀損親密感並創造出一種不良環境，必然摧毀親密伴侶間的必要信任與愛。


    ## 克服被動—侵略性模式


    若覺得十分擅長運用被動—侵略性模式得到自己所要的，可以做接下來兩個練習。第一個練習是原型跳躍，第二個則是督脈練習。


    在原形跳躍練習中，妳將以能夠提升我們力量、創造力及內在光采的肯定生命原型，取代已被整合進人格中的被動—侵略性模式。在督脈練習中，妳可以透過增強流經督脈的氣流，來增進自己的力量。


    ### 原型跳躍


    要開始進行原型跳躍，首先選擇一項妳擅長但想要釋放的被動—侵略性模式。然後以一項肯定生命的原型來取代它（肯定生命原型的清單可參見第五章）。選好模式和原型後，將它們放在心中，接下來，以一個舒服的姿勢安頓好自己，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要在面前創造一面二點五公尺的螢幕。」當螢幕浮現，宣告：「我要觀想自己在螢幕上，處於我想釋放的被動—侵略性模式中。我在胸前舉著一塊清楚標明這模式的告示牌。」舉例來說，若妳選擇喋喋不休作為想釋放的被動—侵略性模式，那麼螢幕上的形象應持寫著「喋喋不休的女人」的告示牌。接著在螢幕上的自我形象外畫一個黑圈，再立即用紅色在黑圈上畫上紅圈，把原來的黑圈用紅圈覆蓋。覆蓋黑圈的同時，宣告：「我要釋放心中所想的被動—侵略性模式，以及所有支持這模式的相關特質。」一旦被動—侵略性模式被釋放，就用所選的肯定生命原型取代它。宣告：「我要以（填入原型名稱）的原型取代剛剛釋放的被動—侵略性模式。」集中心力在這新形象上，維持十分鐘，感受所有與原型相關的肯定生命特質，在自己的能量場及身體中生根。十分鐘後，釋放掉影像及螢幕，然後由一數到五結束此冥想。當妳需要時可做此練習。


    ### 督脈


    督脈是人類能量系統中最重要的陽性經脈，它起自脊椎底部的會陰，並沿著脊椎往上延伸至位於頭頂及頭頂上方的第七脈輪，七個脈輪的陽性部分皆與它相連。'
