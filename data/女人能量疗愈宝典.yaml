    # 妳的心智注意力


    心智注意力同時在在物質及非物質宇宙中的所有世界運作。以意圖為導引，妳的心智注意力能夠定位精微能量場中的業力包袱所在，並提供妳必要資訊以釋放這些包袱。資訊包含了業力包袱的大小、形狀、密度、極性以及活躍程度。


    # 至樂幸福


    至樂幸福是宇宙間最強大的力量。每個人都處於幸福中，雖然大多數人都沒有覺察到這一點。根據譚崔教導，至樂幸福是種持久狀態，存在於妳的能量場深處，源於意識（濕婆（Shiva））及能量（夏克緹（Shakti））匯集之處。帶有宇宙性特質的意識及能量融合後，可為妳帶來一股持續的力量之流，釋放最沉重的業力包袱沉積。


    不過，想要運用至樂幸福釋放業力包袱，必須讓至樂幸福得以出現在意識層面，並在療癒過程中持續存在。因為妳必須有意識的讓幸福散發其力量，讓那些經由意圖運作心智的注意力來定位的業力包袱，得以永久釋放。


    要讓幸福得以出現在意識層面，要先學習為此目的而設計的手印，這個手印稱為至樂幸福手印。


    請特別注意，幸福並不是女性能量的一種形式，而是人類所能達到的最高層級意識狀態。'
