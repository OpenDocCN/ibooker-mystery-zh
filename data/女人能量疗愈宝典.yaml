  md: '# 中庸之道


    本章將解釋，對於那些時值二十一世紀、仍被加諸於女性身上的性別特質，妳還有另一種選擇。這個選擇是中庸之道：一種平衡的生活，包含同理心及自在表達自我及女性宇宙性特質的力量。擁護中庸之道。女性可以在工作中或任何生產活動中，如同男性一樣表現，甚至表現得更好。因為她會擁有足夠的力量或能量，來支持她前進並確保結果成功。擁護中庸之道，女性將可達成自己的目標而不受過往包袱拖累。


    開始探究中庸之道前，請先記得，男性認為理所當然的力量及自在表達力量的自由，對於女性來說，並不總是輕易可得。事實上，關於女性的負面神話故事，在在提醒著我們，過往女性要擁抱她們的女性能量及誠實表達自我，是如此艱難。


    # 關於給予力量的負面神話


    古希臘，現代西方世界文明的誕生處，充滿許多關於有力量女性的負面神話。像是透過凝視可讓男人石化的美杜莎、希臘萊斯博斯（Lesbos）島的女性、發動對抗男性戰爭的亞馬遜女戰士'
  merge: -1
  pgno: 137
- img_proc: true
  md: '（Amazons），都是即刻浮上人們心頭的典型。另外還有瑟絲（Cleo），善於引誘男性並剝奪他們的男性能力，以及塞倫（Siren），她的歌聲能讓最有力量的男人也為之瘋狂。


    當然，不只希臘對有力量的女性抱持敵意。早期的不列顛人也視有力量女性為威脅。亞瑟王的姊妹摩根（Morgan），就是讓人聯想到的例子。摩根是個有力量的女性，但對那些囿於中古世紀思維的男性來說，將她視為狡詐、對權力虎視眈眈的女巫，要比視為有力量且散發光采的女性容易得多。


    在現代社會中，充滿力量並散發光采的女性，也許不會被拿來與石化男人的美杜莎或先迷惑男人再剝奪他們力量的摩根相比較，但她可能在嘗試宣告自己力量時，受到強力批判。若女性是有力量的並試圖在男性世界中取得成功，她很可能要冒著被貼上標籤的風險，這些標籤像是難搞、狡詐、易怒或更糟的字眼等。


    雖然這些帶著貶抑意味的神話和形容詞，仍被用來貶損有力量的女性，並削弱她們追求當權位置的想望。但這些貶抑神話及形容詞的描述並不真實，反而加深男性對於自由女性及她們天生力量的不合理恐懼。


    無疑的，這些神話仍具備其影響力，它們打擊許多年輕女性的志向抱負，而支持被動侵略性的人格模式，讓女性對自己及其女性力量的信任感降低。'
