    諾斯替教教徒（Gnostics）採用了上述的部分理念，將經血運用於教派儀式中，直至十七世紀，所有與經血有關儀式皆被禁止於教堂舉行。


    科學已經證明了經血的療癒特質。研究者發現，經血高度含氧，經血中取出的細胞能被培養，及如幹細胞一般運用來修復受損的心臟組織。


    近期日本的實驗中，東京的慶應大學醫學院心臟專家——三好俊一郎博士及其同僚，運用九名志願者捐贈的經血，培養出名為間葉細胞（MMCs）的前驅細胞。


    將間葉細胞放入從老鼠心臟取出的心臟細胞群，有百分之二十的間葉細胞自動產生脈動，最終形成心臟肌肉組織膜。


    根據 AFP 新聞社的報導，人類骨髓中取出幹細胞進行的實驗，其成功率只有百分之零點二到零點三，相形之下，這個實驗的成功率高達百倍（三好）。


    至少在醫學研究者看來，顯而易見的，女性經血的確有其療癒性質，但許多社會仍然恐懼其力量。這種不合理的恐懼並不罕見。


    聖熱羅尼莫（Saint Hieronymus），一位第七世紀的基督教學者，曾寫到：「沒有什麼比女性生理期更為不潔；在這期間，她所碰觸的所有事物也變得不潔。」這觀點普遍為教堂接受。因此，第七世紀時，女性生理期間禁止進入教堂（聖熱羅尼莫）。


    ### ○經血的力量○


    現今情況已經改變，醫學研究證明，具有規律生理期的女性是健康的，她的身體經歷排毒及細胞再生的過程。從能量角度來看，生理期反映出女性的創造力及再生循環。子宮具備回應特別關係的能力，而這種特別關係，存在於女性和女性的宇宙性能量及滋養身心靈的地球之間。


    這意味著，我們該明白女性不只是人，還是一種渦輪載體，承接生命力並將其導向世界，世界因而得到滋養及療癒。這是一種每位女性都該珍惜的角色。


    不幸的是，儘管生理期有這麼多益處，許多女性仍視其為一種負擔及現代生活中的障礙，有時會帶來痛苦且常伴隨著令人不舒服的症狀。


    我們相信，一個散發內在光采的女性，應該捨棄對生理期的偏見並釋放出經血的力量。為啟動這過程，我們發展出生命週期冥想的練習。生命循環冥想，被設計來幫助女性克服關於生理期的負面感受及認知，並認清生理期的循環其實是女性力量、創造力及內在光采的顯化。


    當妳明白自己有力量接受與排除，宣告：「我要接受經血中的肯定生命力量，並從子宮及陰道釋放阻礙它的扭曲能量。」


    妳幾乎可以立即感受到，自己的女性能量開展了一個新的面向，能量的內涵變得更細緻也更豐富。享受這個過程十分鐘，然後從一數到五結束這個冥想。當妳需要時可做此練習。


    ## 總結


    在本章中，妳學會透過創造自己的療癒空間來提升療癒力，然後學會透過療癒空間來療癒自己、他人及妳和療癒資源間的關係。再來，妳學到了運用生命週期冥想來釋放自己的經血力量。下一章中，妳會學到如何將傳統關係轉化成超凡關係。要達到這種轉變，首先讓自己安住在第三心場域中，然後妳將學到一些練習，幫助妳發展與自己、伴侶及孩子間的超凡關係。


    ## 第四章 怪人的圈套


    ### ○從傳統到超凡。


    像古代譚崔行者一樣，妳可以運用流經自己能量場的氣與覺知，轉化妳的關係。要達成這個目標，要先做到兩件事。首先，停止耽溺於那些阻礙妳體驗超凡經驗的破壞性模式。第二，學習讓自己安住在第三心場域中，因為妳經由第三心場域來體驗自己與他人間的超凡關係。不過，在正式開始前，了解超凡關係和傳統關係之間的差異將十分有益。


    從外在角度來看，傳統關係和超凡關係幾乎一樣。伴侶們可以住在一起、養育孩子，並參與社區的社交及經濟生活。


    女性必定會和所愛之人共享力量、創造力及內在光采。在本章中，我們會向妳示範如何和所愛之人共享超凡關係，首先是和自己，再來是和伴侶與小孩。


    從譚崔研究中了解，夏克緹／濕婆這對神聖伴侶是超凡關係的原型。他們之所以能處於這種超凡關係中，是因他們能與彼此自由分享能量與覺知。


    夏克緹的能量以氣的形式呈現，可以推倒疏離的藩籬。當氣與覺知結合，能讓人們進入超凡關係中。


    ## 必須避免的七件事


    但傳統關係期待女性支持丈夫，為所愛之人犧牲自己的需求，並將社會的核心價值傳承給自己的小孩。不幸的是，即使在二十一世紀，局限的信念和自我設限模式，仍透過社會化過程傳給下一代。我們並不是指傳統關係無法令人滿足。在一些例子中，家庭成員仍可共享歡愉、愛及彼此交融的親密感。但是，超凡關係中共享的永久親密及喜悦，對傳統關係的家庭成員來說，仍是個遙遠的夢想。因此，重要的是，了解傳統關係其實是生活在局限中。相反的，超凡關係則超越限制，這也是為什麼，在超凡關係中，散發內在光采的女性，將會體驗到身處傳統關係的女性無法得到的滿足感。


    要達到超凡關係，必須停止沉溺於七種破壞性模式之中。這七種模式有共通重要特徵，它們會讓妳遠離與自己、伴侶及孩童間的超凡關係。這七種模式羅列如下。在每種模式之後，妳會找到一個可以助妳克服該模式的練習。若妳困於以下所列的模式中，請進行書中的練習，直到該模式不再讓妳困擾為止。


    ### 模式一——貶低自己


    為了克服貶低自己的衝動，以一個舒服的姿勢坐好，背部打直，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要啟動我的第一脈輪。」繼續宣告：「我要讓自己安住在第一脈輪場之中。」安靜一會兒享受能量流動。然後用慣用手的拇指，右撇子用右手拇指，左撇子用左手拇指，去啟動頭部後方的穴點。這個穴點位在頭骨後方，連結頭部與後頸的凹槽處（見圖19）。


    透過啟動這穴點，妳能讓氣延著督脈向上攀升，這股被提升的氣流能夠刺激督脈上的七個脈輪。這會增進妳的洞見與覺知，讓妳感到更有信心。它也能促進腦內啡的分泌，而腦內啡與愉快的感覺相關。


    ![圖19：後頸上的穴點](img/ab4f433fa94d325ad3ce8769941e0806_252_0.png)


    安住在自己的第一脈輪場中，按壓穴點持續十分鐘。藉由啟動適當的能量中心（穴點及脈輪），妳能釋放自己能量場中的能量，提升自我價值感及自尊。規律的練習，短時間內將不再貶低自己。


    ### 模式二——犧牲妳的表層界線


    表層界線是妳的能量場的表層，它們環繞妳的所有能量場域（氣場及資源場）和妳的能量載體（參見圖7）。一個界線模糊薄弱的女性，會缺乏安全感，也無法全然體現女性能量的宇宙性特質。


    要增強妳的表層界線，以一個舒服的姿勢坐好，背部打直。閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要在面前創造一面二點五公尺的螢幕。」繼續觀想某個不尊重妳的界線的人出現在螢幕上，可能是某個要求過度的老闆或是一個有控制欲的家庭成員。當這個人的影像一出現在螢幕上，就開始持拒絕手印（見圖20）。


    拒絕手印的設計是用來增強決心，讓妳能夠維持清楚堅定的界線。要練習拒絕手印，將雙手的拇指與食指圈成兩個彼此套住的圓環，像鏈條中互相套住的兩個環節。下一步，將雙手中指相對、指尖互觸，構成三角形的兩邊，雙手無名指及小指亦如是。


    持續持此手印，一邊以清楚聲音向螢幕上的人宣告：「不。」持續五分鐘，或直到他們不再闖入妳的個人空間中。鬆開手印，釋放那人在螢幕上的影像，也釋放掉螢幕，接下來，從一數到五結束這個冥想。當妳需要時可做此練習。


    ![圖20：拒絕手印](img/ab4f433fa94d325ad3ce8769941e0806_254_0.png)


    ### 模式三——拿自己和他人比較


    妳是一個散發內在光采的女性，連結所有妳需要的氣和意識，在工作和關係中達到成功。因此，將自己和他人作比較是沒有意義的。不過，若持續與他人相比而感到自己矮人一截，或是必須事事達到完美，才能讓自己感覺良好。那麼，以一個舒服的姿勢坐好，背部打直。閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。繼續這個過程，宣告：


    「我要啟動我的第三脈輪。」然後宣告：「我要讓自己安住在第三脈輪場後，進行單鼻孔交替呼吸十分鐘。」


    單鼻孔交替呼吸是種古老的瑜伽技巧，可以提升妳的穩定性和自我覺知，這兩個特質能讓妳克服與他人比較的需求。


    要開始單鼻孔交替呼吸，用右拇指擋住右邊鼻孔，用左鼻孔吸氣，持續五秒，然後用右手無名指和小指擋住左邊鼻孔，同時將右拇指從右鼻孔移開，用右鼻孔呼氣持續八秒。接下來，由右鼻孔吸氣持續五秒，用右拇指擋住右邊鼻孔，用左鼻孔呼氣持續八秒，如此為一回合。


    在前兩週，一週進行三回合。兩週後，每週增加一回合，直到七回合的極限為止。


    若妳的鼻腔堵塞，就不應該進行單鼻孔交替呼吸。此外，任何情況下都不該強迫自己進行練習。妳可以重複這個練習，直到不再受此模式困擾。


    ### 模式四——放棄個人責任


    若妳放棄了個人責任，將其交託給他人或外在制度，那麼，是時候將之取回了。要達成這個目標，站在鏡前，宣告十次：「我掌握自己的能量場，並為自己的作為負起責任。」重複十次後，雙手互相搓揉然後分開，將妳的陰性之手，右撇子是右手，左撇子是左手，放在心輪上方約十公分處。然後將陽性之手，放在第六脈輪上方七點五公分處。雙手分別放在這兩個位置，直到妳感覺這兩脈輪的能量形成了一個大型氣場，與妳的能量場互相交會。當妳覺察這個氣場，宣告：「我要安住在我剛創造的氣場中。」繼續宣告：「我要在我剛創造的氣場層面上，向內觀照我的感官。」安靜十分鐘，享受身體和能量層面上的改變。然後從一數到五，數到五時，睜開雙眼結束這個練習。重複此練習，直到不再被此模式干擾為止。


    ### 模式五——凡事都認為是自己的問題


    認為凡事都是自己問題的女性，在個人權利方面有其議題。妳的個人權利由心輪所控管，在許多社會中，當家庭成員或當權者在能量層面上侵犯女性時，女性的個人權利就會因而受損，這種情況所在多有。


    接下來的練習中，妳將取回自己的個人權利。為達成此目標，妳需要將兩張白紙剪成兩個直徑半公尺的圓盤，將每個圓盤的其中一面塗上祖母綠的顏色，重要的是要自己著色，並將整個圓面塗滿顏料。


    完成第一步後，把一個圓盤放在地上，有色面朝上，然後仰躺下來，讓自己的心輪中心對準圓盤的中心點，把另一塊圓盤放在胸口，顏色面朝胸口，貼在心輪的前方。


    在身體下方的圓盤，會促進身體背面的氣往上流動，在身體上方的圓盤，會促進身體正面的氣往下流動。


    當妳將圓盤放在適當位置後，閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要啟動我的第四脈輪。」繼續宣告：「我要讓自己安住在第四脈輪場中。」安住在妳的第四脈輪場中，一邊重複這句真言五分鐘，要誦唸出來，而非默想：「我不再認為凡事都是我的問題。」持續誦唸這真言五分鐘，再用十分鐘來享受自己感受到的改變。然後從一數到五，數到五時結束這個冥想。重複此練習，直到這模式不再干擾妳為止。


    ### 模式六——將自身力量極小化


    大多數男性難以接受自己的脆弱。大多數女性難以接受自己的力量。為了接受妳自己是一個有力又能幹的女性，要啟動第一和第七脈輪來為自己的能量場增壓，然後練習自我接受手印。


    開始這個練習，要找一個舒服的姿勢安頓好自己，背部打直。閉上雙眼，鼻吸鼻呼，深呼吸二到三分鐘，從五倒數到一，再從十倒數到一。運用標準法門讓肌肉放鬆，並安住在真實心智中。然後宣告：「我要啟動我的第一脈輪。」繼續宣告：「我要讓自己安住在第一脈輪場中。」安靜一會兒享受能量流動。然後宣告：「我要啟動我的第七脈輪。」繼續宣告：「我要讓自己安住在第七脈輪場中。」安靜一會兒享受能量流動，然後練習自我接納手印（見圖3）。


    要練習這個手印，將舌頭輕輕頂住上顎，往上顎後端稍微移動，最後停留在上顎後端較柔軟的位置，讓舌尖持續與上顎接觸，一邊讓雙腳腳跟相觸，接下來，將雙手大拇指側邊相觸，雙手金星丘側邊亦如是，然後將右手食指疊在左手食指上，右手食指指尖靠在左手食指第二指關節上。雙手中指向上伸展，指尖相觸。雙手中指互觸後，再將雙手無名指向掌心彎折，第二指節指背相觸。雙手小指尖尖相觸，形成一個三角形。繼續讓雙手無名指朝掌內彎曲，第二指節指背相觸，然後將雙手小指向上伸展，十分鐘後鬆開手印，從一數到五，結束這個練習。重複練習自我接受手印，直到這個模式不再干擾妳為止。


    ![圖3（重複）：自我接納手印](img/ab4f433fa94d325ad3ce8769941e0806_258_0.png)


    ### 模式七——自我妨害


    若女性的第三脈輪堵塞，她可能會在家庭生活、工作、關係甚至是與自我的關係中，妨害到自已。第三脈輪堵塞，會讓女性在各種互動之中感到缺乏安全感。它會毀損自我信任感、滿足感及歸屬感。不幸的是，第三脈輪堵塞是現代社會女性常見的問題。


    為克服自我妨害模式及支持此模式的第三脈輪堵塞情形，妳需要將一張白紙剪成直徑半公尺的圓盤。將圓盤其中一面塗上黃色，重要的是要自己著色，並將整個圓面塗滿顏料。


