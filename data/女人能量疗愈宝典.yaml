    開始按摩前，先讓房間暖和起來，然後仰躺，運用標準法門放鬆肌肉，並安住在真實心智中。將按摩油塗在腹部及骨盆部位。開始用慣用手的掌心按摩骨盆區域，右撇子用右手按摩，左撇子用左手按摩。幾分鐘後，將掌心以對角線方向朝臀骨方向移動，先按摩右側骨盆，再按摩左側骨盆，重複這過程三次。然後將慣用手微向內彎曲，像用鏟子鏟東西一般，將手掌由恥骨處朝太陽神經叢方向向上撥鏟。使用足夠的力道，好讓自己能感受到子宮肌肉因按摩而放鬆。當妳按摩得越來越有信心後，可以改用手掌側邊按摩以便加壓。在每一次按摩中，吸氣，並讓呼吸帶領妳的手朝上按摩。


