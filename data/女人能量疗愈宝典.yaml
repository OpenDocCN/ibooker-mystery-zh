    達到一致後，妳會體驗到滿足感、更大內在力量及穩定感。


    # 回復氣的流動


    既然創傷事件可能導致一個以上的能量載體散失，妳可能需要多次重複這個過程，先從重新整合離妳的能量場最遠處的散失能量載體開始，再繼續重新整合所有因創傷經驗而散失的能量載體。


