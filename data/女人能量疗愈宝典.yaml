  md: '# 多重任務處理的問題


    多重重務處理的案例特別不幸，因其同時進行多種活動的特性，會干擾女性腦部及精微能量場的運作。


    研究者指出，對心智來說，多重任務處理是種暴力形式。因為多重任務處理在同一時間內重複啟動腦部功能，沒多久，正常腦就會開始仿照上癮人格的腦部結構（漢澤爾（Hazel）2012），這對女性及其關係傷害極大，因為腦部影響心智網絡，而心智網絡的主要功能，就是以整體方式接受他人訊息及與其溝通。


    我們所指的整體方式是指，身體語言、話語及氣的勃發，經由腦部接收、轉譯，被精微能量場及心智網絡運用，進而創造出完整體驗。


    由於大眾心中已有父權取向的偏見，我們也不訝異，爲什麼鮮少有人探討科學或社會形式變遷，如何干擾女性腦部的功能運作，以及這些干擾如何影響女性與家庭、自我及物質界非物質界生態的各種關係。'
