  md: '# ## 陽維脈


    陽維脈是陽性手臂通道。雙臂皆有，它們繞過雙手中指，將肩膀及掌心的小型能量中心予以連結。


    # ## 陰維脈


    陰維兩脈是兩條手臂通道。雙臂皆有，它們將掌心的小型能量中心及胸部予以連結。陰維脈自雙臂內側延伸，和陽維脈並行，構成掌心的小型能量中心。


    # ## 陽蹻脈


    陽蹻兩脈從雙腳腳跟中心出發，沿著雙腳腳踝及雙腿外側延伸，與會陰底部的其他經脈連結。


    # ## 陰蹻脈


    陰蹻兩脈從雙腳腳跟的中心出發，沿著雙腳腳踝及雙腿內側延伸，與會陰底部的其他經脈連結。相對於陽蹻脈，它們是陰性的，因此被稱為負極腿部通道。陰蹻脈和陽蹻脈並行，構成腳部的小型能量中心。'
