    ## 身體按摩


    當妳生產後，可以替新生兒進行寶寶按摩，加強彼此間的能重連結。為寶寶按摩能為新生兒提供安全感及歸屬感，也能增強新生兒的免疫系統。經常被碰觸及按摩的寶寶會變得更有自信，睡眠品質也較好。寶寶的動作技巧會增加、同時發展出更具表達力的人格，也更能同理他人的感受。增強流經寶寶能量場及母子之間的氣流，就能夠達到上述效果。


    開始進行寶寶按摩前，謹記讓按摩房間內變得溫暖，按摩油本身溫度也要令人感到溫暖。避免太濃稠或氣味過重的按摩油。最重要的是，以平坦的掌心來進行按摩。


    ### 練習：寶寶按摩


    當妳準備好後，讓寶寶平躺在妳的大腿上，背部朝上，然後，雙手互相搓揉，增強雙手能量。接下來，用掌心碰觸寶寶的腳，感覺寶寶的反應，他喜歡妳現在做的事嗎？並非所有寶寶都喜歡被按摩，透過確認寶寶反應，可以知道自己是否得到寶寶的允許，讓妳替他按摩。


    按完寶寶的腳後，按摩腿部後方。然後將雙手相對，放在寶寶背部中間，離他的脊椎一點五或五公分遠。避免直接碰觸或按摩脊椎。同時用左右掌心在寶寶脊椎左側和右側畫兩個大圈，接著，按摩寶寶的左右肩及手臂。


    繼續按摩三到四分鐘。然後將寶寶翻過來，以掌心畫圓的方式按摩寶寶的腿部前側，以同樣方式輕輕按摩他的肚子。接下來繼續按摩寶寶的胸口和肩膀，然後再按摩手臂和手。


    整個過程不要超過十分鐘。按摩結束後，將寶寶放在一旁，讓他用自己的方式回應這次的按摩。推薦妳每次選在同一時間，一週為新生兒按摩兩次。


    ### 學齡前唱頌


    當他開始能夠說話，妳可運用自己的傳統七脈輪和孩童一同進行唱頌，這能提升妳們的能量連結，並發展妳與孩子間的超凡關係。要進行學齡前唱頌，坐下來面向孩童，自在的散發歡愉與喜樂，一邊注視著孩子，然後將妳的心智注意力帶到第一脈輪，開始以G大調唱頌嗡。


    G大調會和妳的第一脈輪產生相應振動。就如同敲擊一把音叉，將音叉靠近與音叉同調性的小提琴琴弦旁，琴絃會產生相應振動一般。


    隨著脈輪序列上移，升高音調。第二脈輪是A大調，第三脈輪是B大調，第四脈輪是D大調，第五脈輪是E大調，而第七脈輪是F大調。


    若不清楚該唱頌哪個音調，試著從妳能發出的最低音調開始，然後微調音調，直到感覺第一脈輪出現相應的共振，如振動或發光的感受，這表示妳已唱頌出相合的音調。妳可以用同樣方式確認自己是否唱頌出七個傳統脈輪的相合音調。


    在學齡前唱頌中，先由妳從第一脈輪唱頌音調，當妳唱頌完畢，邀請孩子一起用同樣音調唱頌兩遍。然後升高一個音調，從妳的第二脈輪唱出音調，和孩子一起唱頌三次。繼續以相同方式，每升高一個音調，唱頌三次，從妳的第三、四、五、六及第七脈輪唱頌出來，並邀請孩子一起唱頌。


    當妳和孩子完成傳統七脈輪唱頌後，繼續從心輪唱頌五分鐘。只要孩子喜歡，可以一直持續進行這練習。


