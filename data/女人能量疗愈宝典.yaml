  md: '在早期世代，透過教化過程及不對等期望、機會、獎勵及懲處，男女雙方被灌輸了男性天生比女性更有力量的信念。直至現今，這種不平衡仍普遍存在於多數社會及制度中。


    這種不平衡並不只因暴力、法律歧視或社會壓力而增強。在許多社會中，男性和女性一樣飽受壓迫，被強迫接受社會的核心價值觀。這些社會為了達成目的，根據性別（性別角色）制訂了人類性格清單，期待男性及女性毫無疑問的接受，並將這些特質融入自己的生活中。


    這些社會通常要求女性應該關懷他人、溫柔、接受度高、有耐心、貞潔、富吸引力及感覺豐富等等。這些特質對女性來說是自然的，對男性來說也是。不過，直至最近，歐洲、中東及北美社會仍舊要求女性接受上述特質，作為她們的核心價值。而男性，特別是當權男性，則可以任意拒絕上述特質，接受另一套他們被教導要奉行為男性圭臬的價值，那些價值包括競爭、果斷、野心、理性、堅毅及侵略性等。


    若有人不接受被分派的特質，通常會遭受嘲諷、拒絕、指控，或者更糟的受到暴力對待。局限的信念及童年的早期制約，也會一併削弱人們自然表達自身力量的能力。由於核心價值的改變速度十分緩慢，因此，許多人及制度仍固守著那些讓女性難以接受的女性能量以及成就它們的潛能。'
