    # 至樂幸福手印


    練習至樂幸福手印前（見圖9），先運用標準法門讓肌肉放鬆，並安住在真實心智中。接著將舌尖輕輕頂住上顎，往上顎後端稍微移動，最後停留在上顎後端較柔軟的位置。當舌尖定位後，雙腳腳掌朝內，腳跟相互碰觸。然後將雙手放在太陽神經叢前方，兩拇指指尖互觸，再將雙手食指彎曲，第一指節外側互觸，然後雙手中指彎曲，第二指節外側互觸，無名指及小指則向掌心彎曲，當舌頭、手指和腳部都就定位後，閉上雙眼，鼻吸鼻呼。


    練習這個手印十分鐘後，即可放鬆雙手及雙腳腳跟，讓舌頭回歸到平常的位置。然後從一數到五，回歸到平時的意識狀態。當妳數到五時，睜開雙眼，妳會感到非常清醒，全然放鬆，感覺比之前更好。


