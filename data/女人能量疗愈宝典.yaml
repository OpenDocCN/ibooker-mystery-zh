  md: '透過啟動傳統七脈輪後部,沿著督脈提升氣流量,妳可以增進個人力量。這也有助於如實表達真實的自己,而非別人期望妳成為的樣子。


    另一種可以增進妳個人力量,並在這世界向前邁進、有所進展的方式,就是增加流經手部及腳部小型能量中心的氣流量。妳已在第三章學到如何啟動小型能量中心,在接下來的兩個練習中,妳會進一步啟動手部及腳部的小型能量中心,增加流經支持這些中心的主要經脈之氣流量。要達成以上目標,首先要詳細了解經脈系統,以及如何運用這系統來讓自己更有力量。


    如妳在第三章所學到的,經脈像是氣的通道,有兩個主要功能;將脈輪與散布能量系統裡的小型能量中心相互連結,並將氣運送到人類能量場最需要的地方。雖然人體中有數百條重要的經脈,中國及印第安文化的古代文獻認為,人體的主要經脈有十條;其中兩條直接連結手部的小型能量中心,兩條直接連結腳部的小型能量中心。陽脈將氣帶離身體中心,陰脈將氣帶往身體中心。'
