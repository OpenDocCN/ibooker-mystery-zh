  md: '獨太陽和太陰有違常情，因此我們有理由懷疑它。


    根據星曜賦性的作用，太陽爲官祿主，主掌官祿事項。既然是主掌官祿，它應該在名利權勢上有充分明確的顯現現象，依四化賦性的原理和作用，若以化祿代表財利，化權代表權柄，化科代表聲譽，化忌代表衰落，我們有理由說「太陽爲官祿主」也必須有這四種現象，才能充分符合人生一輩子在事業上的得失與消長的實際現象。當一個人的專業成就時，不只在財富和權威，他的聲譽也就會隨之而來，所謂名利雙收、權傾一時。因此我們認爲，太陽必有化科，用以顯其名聲。


    在古傳四化規則上，由於庚年的太陽祿、武曲權、太陰科、天同忌，而癸年破軍祿、巨門權、太陰科、貪狼忌，我們懷疑癸年的太陰化科可能有誤，正確的應該是太陽化科。因爲太陽不可能在庚年既化祿又化科，至於爲什麼在古籍記載上會發生這種錯誤？很可能是出之於輾轉抄寫的筆誤，因爲太陽與太陰的陽陰兩個字，不留神就很容易造成錯誤。當然我們也曾作過太陽在癸年爲化科在實際論命上的應用，似乎並不離譜，只是由於化科所顯現的聲名問題，較不受一般問命者所重視，因此在論命的機會上，並不很多。我們不敢僅據少數命例就遽然作肯定的答案認定，'
