    - 老奶奶聽到媳婦生小孩，關心的是弄璋或是弄瓦。因此通常第一句話大概都是問生男或是生女。而現代的新媽媽，除了想知道是否讓奶奶抱到孫子以外，更關心小生命是否健全健康。因爲誰都希望生的是一個健康的小寶寶，時代已不同，反正男孩女孩一樣好。


    一隻健全的母雞一定能下好蛋，但是一個健全的女人，卻不一定保證能生個健康的娃娃。一個健康的寶貴要有健全的肢體五官，要有正常的生理功能，也要有常人應有的智能，任缺其一都不是一個健全又健康的小寶寶。但是，生小孩並不能與生雞蛋同論。小孩生下後，有些可不是健全又健康，而造成不健全或不健康的理'
