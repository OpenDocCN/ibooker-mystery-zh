    個完整了解它的真義和概念。我對這方面的認識也不多，所提供的個人看法，充其只能作爲參考，而不敢斷然肯定一定符合古傳的意義和道理。


    一般把斗數命盤上的命宮說成先天，身宮說成後天，但並沒有把真正的先天和後天，作個清楚的界限交代。因此很難去了解究竟什麼是先天？後天又到底指的是什麼？若我們從斗數命盤的命身宮的起排法，都是根據一個人先天出生資料而排定來講，根本就沒什麼分別。但一般人都都知道命身宮並不可混爲一談。因此有人說，命身宮是斗數命理的一體兩面，可是又提不出個所以然的道理來，因此很使人因之而感到迷惑。


    什麼叫做「先天」？假使我們從人類的行爲舉止表現來看，一個剛出生的嬰孩，肚子餓時會哭，身體不舒服或尿片潮濕時也會哭。這幅行爲表現是與生俱來的、不敎自會的一種自然的反應，這是一個先天性賦的本能。有一種人，在很小的時候就顯現出他不管在那一方面，跟同齡的兒童比較，顯得要聰明很多。若以現代的智商（IQ）測驗，他可能高到
    IQ 一六○以上。現在的人已經知道人類的這種 IQ 等級是與生俱來，後天並不可能作任何改變，因此 IQ 特高的人學習起任何事物都會比較快。'
