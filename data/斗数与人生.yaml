  md: '**短期內所能倖得。**


    若容我們不客氣的指出，古傳的命理學為什麼千百年來一直登不了大雅之堂，個中的主因，完全在於學命論命者的一種對命理基本觀念無知和誤解。他們把命理視為一種神仙之學。更爲了提高他們崇高的超然地位，硬是把命理神秘化，讓人們誤認只有他們這羣仙風道骨的神仙人家，才能洞澈人間的天機。因此把一項原本可


