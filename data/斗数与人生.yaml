  md: '林太太和林先生結婚，是在一種半新不舊的婚姻習俗下結合，即親友介紹、八字由雙方父母向算命先生酌教，共認婚姻美滿、子息無既、福澤綿綿，又經一段不算短的交遊，待兩情相悅後，才走進禮堂，送入洞房。


