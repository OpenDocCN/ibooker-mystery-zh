- img_proc: true
  md: '就像一個醫生他必須了解人體上任何一個器官功能，才能給人器病的道理一樣。因此，四化的功能，我們就試著借用醫學上的知識來探討。


    一個嬰孩，他得自父母精母血（卵）結合而成，當他經十月懷胎而呱呱墜地後，我們在很多方面可以說他是父母的一個縮影。但這個縮影卻另具單獨擁有的特質，並不完全是他父母其中之一的同模型複印製品。嬰孩經過養育，由嬰孩而兒童，而少年、青少年、青年、中年、壯年，與最後的老年期，不但每個年齡時期他在體能體形上有所改變，而且在心理上、生理上，甚至思想觀念上、知識上，都有其明顯的改變。


    人一旦活着，幾乎無不日日處在一種不一定很明顯的、逐漸性的改變中，短暫時段也許不顯著，但在每一個不同年齡的階段期間的比較上，差別就很大。若我們把斗數四化作用視之如人一生的這種改變，似乎就很容易搞通。一個命盤的星曜依程式排好後，再用上生年天干四化，就如同一個剛出母體的嬰孩。一個用上生年天干以後的命盤，就如同一個出了母體時就有屬於他自有的特質的嬰孩一樣。由於從胎兒變成嬰孩已成了獨立個體，他身體的生理功能必要自行運作，以維持正常生'
  merge: -1
  pgno: 236
- img_proc: true
  md: '**理成長。**


    因此，人一出生，命宮上的大限天干就開始運作。我們若把生年干比之於與生俱來的一種星曜特質，而大限天干比之於一個人人生下來後，每隔一段期間他的生理功能作用的不同現象，應該甚爲妥當（其實一個人的心智成長和心態的改變也是一樣的道理）。因此我們不贊同，一個小孩要在入五行局的歲數後（如本三局三成起，火六局六成起），才應用第一大限命宮天干的四化星。我們認爲應該從他出生後的「落土時」一開始就使用，因爲他已脫離母體，有必要以自己的生理功能來維持生命。


    當然我們也不贊成小孩一定要在從童限後（一命宮、二財帛、三疾厄、四夫妻、五福祿、六官禄），才動用第一大限天干。因爲我們認爲這種說法沒有道理，根本違背大自然的原則，若命理違背大自然的道理原則，就不再是用以談人的命理。


    人一辈子裡，在不同的年齡階段，即童年、少年、青少年、青年、中年、壯年、老年，由於心身上及知能成熟的差別，因此斗數把大限運的宮星及四化，視如一個人在不同階段的一種身心狀況，不能不說是一個極爲合理的设计。有人說，一個人在大限的三方四正上的星曜，就是代表這階段的環境状况。我們不以爲全是如此，


    **原理**


    四化的基本'
  merge: -1
