    |---|---|---|---|---|

    | 癸巳遷移63-72 | 甲午疾厄 | 乙未命 (二) 丙子年十月三十日子時 | 丁酉七殺文屬科天姚、陀星 |

    | 陀羅草日曲龍池天府魔貞忌壬辰53-62 | 木三周孔先生 | 紫微天機地劫左弼右弼庚寅田宅33-42 | 己亥命宮3-12身 |


    我們且把六親及血親、姻親，甚至義結金蘭的異姓兄弟這些具有親和情的人際關係排開不講，純粹以除了上述這些人以外的所有認識的人列爲朋友，必須加以關係上的分類。老陳是我從小的玩伴、求學的同學，出社會後除了純友情外，別無利害關係；老林是我大學時高兩班的學長，十幾年後，由於諸事順遂，現在變成我職業上的頂頭上司；老李與我同期，現在服務同機構，擔任與我相同級職的單位主管；小張是晚兩年的小老弟，現在擔任我職務上的助理……。這些人，在下班之餘也許無大無小的稱兄道弟，到酒廊喝起花酒，可能花樣百出，胡鬧在一起，早忘了白天上班時的身份地位和工作煩惱。我和所有同在一個辦公廳上班的人，在玩樂場所，不爲公事應酬而盡興歡樂的時候，他們和我的關係如同我和老陳一樣。但當上班工作時，就彼此身份分明，再不能涇渭不分，否則就擾亂了公事和人事管理上的制度。


    在這些人之間，常依斗數法則推演的時候，只有這個當我助理的小張，才能列入我的斗數命盤上的「僕役宮」，其他人不是我的上司就是同等職位的同僚，豈可淪入這個帶有「主」「從」意味的「僕役宮」？儘管現代職務上主從關係的性質已不同於古時富貴大戶人家的奴婢或管家用人，但彼此身份帶有主與從的本質仍然存在。


    因此，我們以爲，原本作爲解說主從關係的這個宮位，以改稱僕役宮爲部屬宮較適宜（了無居士曾寫爲職員宮也甚恰當）。至於其他的老林、老李，由於在公事上利害關係各有差別，自然他們會有所屬的宮位，但決不能把他們置於「僕役宮」。


    在這個錯綜複雜的工商業社會裡，人與人的關係，光用錯綜複雜還不足以描述分明，不但一般人概念難分，就是搞命理的人，恐怕也沒多少人能分清楚。多年前，我就曾經碰過這麼一位朋友，有一天哭喪着臉跟我說某一位大師提醒他說，今年預防小人，否則會因小人而大敗其財。這位朋友堪稱視錢如命，什麼都不怕，就是怕破財，使人懷疑他大概前輩子因破財窮怕了，因此一聽到破財的事，就連晚上睡覺都會作惡夢。


    於是他無論如何纏着我，一定要搞清楚究竟犯了什麼樣的小人？又怎麼樣的破了財？又破了多少財？他以爲我是財神趙公明投胎轉世，專管人間賺錢虧錢的大事。我只好問明他的生辰資料，排起斗數命盤，依理推論之餘，就針對他可能因小人而失財的事項，一一加以詢問和診斷。


    原來他老兄除了經營一家以出口爲主的貿易公司以外，還兼賺借貸轉手的高利貸，也就是憑他在銀行已建立好的信用關係，大借其款，再以民間的高利貸出借，在轉手之間，每個月的利息差額不少，可算讓他賺了不少利息錢，而他的貿易公司在當年也跟台灣很多不明就裡的小貿易公司一樣，以爲在省本多利之下，以口\A甚至口\A二百二十天出口，都可以跟北非洲，以爲開到金礦的奈及利亞，作起出口生意來。金額之大，令人咋舌。萬一對方進口商的信用出了差錯，他就算買盡全部家當財產，也會吃不了兜着走。


    我們依稀還記得，這個命盤的運限，不只田宅與福德具破，遷移宮、僕役宮甚至財帛宮，無一不凶，怎能不說大破其財？說不定還得躲債跑路呢！福德與僕役皆凶，高利貸一旦沾上，必血本無歸。遷移宮、財帛宮俱破，出口貿易生意必須以經由國際信用列名排行有份的銀行確認（Confirm）後的
    L/C，才可以接生意。否則貨品出口，將如同肉包子打狗，有去無回。總之命盤上的凶象，他都應上了，看來就算財神爺御駕親臨也幫不上大忙。


    沒想到在我還和他大談接出口生意訂單應該如何去注意某些事項時，他老兄好像胸有成竹的表示，貿易他在行，只怕沒生意上門，既然如此，那我又何必多嘴舌，也就沒把防患未然的意見告訴他。


    事隔兩三年，有次在路上和他太太不期而遇，據她說，他先生因爲自信心太強，不聽人家的勸告，結果高利貸跑了，出口的貨款因爲進口國外匯短缺，未能依約付款，最後房子被銀行查封了、廠商債主找上門，他只好跑到國外去要債。人在倒楣的時候，愈怕的事愈會接踵而來，真是禍不單行、福無雙至。我不知道他究竟是要債去了？或是躲債走了？至今還沒有他回台灣的消息。


    [補註]


    僕役宮犯沖、福德宮破的結果，是高利貸被倒帳，此時，債務人常有從或局的性質，債權人則爲主，所以高利貸的債務人出現在僕役宮。這裡的僕役宮受沖破，不必去跟出口被倒帳扯上關係。若從退移大吉，可以發跡於遠郡一意經營會到，當退移宮和財帛宮俱破時，就不利於從事國際貿易生意。蓋這宮位的凶煞，就是表示遇人不淑、因人敗事而損財，本質上，是有別於僕役宮的小人，又作武市的批發生意，也同此研判和論斷。


    ## 用人不當

    [命例]


    中南部出差回來，老婆告訴我說，范先生從日本回來向總公司述職，約定在禮拜天晚上到舍下來聊聊。對這個老朋友每次回來，總會在百忙中撥空來看我，總覺得老友如陳年好酒，越陳越香。每次見面都有聊不完的話題，這次見而，已不復當年生意挫敗時的喪志和憂鬱。我爲他能再度站起來，覺得很高興。雖然他已不再當老板，而是上班領薪。


    我這位老朋友，是我衆多同學和朋友中，才華頗爲出衆的一位，頭腦清晰、思考敏銳，中英日語文俱佳，作起事來用心、肯幹負責。處事待人，在彼此論交卅年中，似乎還少有人可以比較。但這和人在這個時代，幷不一定事事吃得開，特別是他自己當老板的最後幾年。事後他自己回想起來，那幾年的確是他一輩子，難以忘懷的恐怖黑暗時代。


    若以創業而言，他是位少年得志的年輕人，約在癸卯大限後期，他離開了原服


    | | 天機科星羅餘46-55癸丑36~45壬寅 |

    |---|---|

    | **牛放與人生** · 162· | |


    務的一家民間財團法人的事業機構，憑着些微的資金和一股年輕人的翻志出來創業。由於他語文通暢，也正好碰到當時台灣正在以各種加工產品，積極開拓出口市場的時候，他就協助廠商向國外報價和國外接訂單交工廠生產，這種內外交接的出口商生意，經過十來年的慘淡經營，不但在國外建立良好的信用，在國內廠商也信譽昭著。幾乎在接單、交單、出口的業務推動上，都不必用上大資金，就可以從中得到頗為優厚的利潤。


    也許由於生意越來越多，也越大，他整年幾乎都在國外跑，在國內時也整天忙着和國內廠商接洽生意，因而把一些經常性的業務交給公司內的職員承辦，甚至把一般公司引爲生命交關的公司印鑑，一概委由會計保管和用印。也許由於老板的疏漏和職員的無知，就在癸卯大限的己未年（一九七九年）年初，一位承辦出口生意，負責和廠商聯繫的職員，不知道由於怎樣的錯誤，竟造成一批數萬美元的出口產品在出口後，買主以品質和規格不符拒付款要退貨，最後還苦了范老板迢迢地跑了趟國外，才以半賣半送的方式消了災。到了年底左右，有一天，接到一個陌生人的電話，莫名其妙的在電話中請范老板把支票背書的幾千萬票款，限定於某日前準備好，換回支票，否則將到法院相見。


    這下可把這個年輕老板搞昏了頭，不知道追災禍究竟因何而來？後來才從保管支票印鑑的會計小姐處得知，上半年就在范先生到國外考察市場的時候，有一位往來多年的廠商為了供應范老板所下長期供應貨品的訂單單所要出口的購買原料，廠商用工廠老板的支票來請范老板背口，以便以期票方式交易。不知道是會計小姐無知或是為什麼，沒弄清楚支票金額和期限，就依要求地蓋上印鑑、背起口來，根本也弄不清楚支票背口，需要擔負起支付責任的法令規定，更糟的是，背口乙事，一直沒跟范老板知道。事情大概就是如此追般地使范老板背起黑鍋，而最後導致傾家蕩產，使經營十年有成的事業毀之於一旦。一個事業的興起，有待員工的通力協助，但用人不當，也會使一個經營得好好的事業趨於毀滅，事業之於用人，豈能不慎重？


    壬寅大限，天梁化祿、紫微化權、左輔化科、武曲化忌。天梁化祿是先天福德宮、後天僕役宮（良辰吉位），武曲化忌是先天僕役宮、是後天財帛宮。己未年祿存在午、流羊在未、流陀在巳、武曲化權、文曲化忌。此一年內先後發生兩次因職員職責疏漏和無知失貨，給范老板帶來事業大災禍。在僕役宮方面，壬寅大限會先天僕'
  mdcn: '硬板板，井必須一一解決的現實問題。否則儘管你的意願再大，你在斗數命盤上的命理條件再好，也將難能讓你如願。


    幾年前，我就碰過這麼一個命例：一個矍矍斗數的青年，也曾經得遇高人以斗數祿命法指點，使他對服完兵役後接着放洋留學充滿信心。因此在他服兵役期間，就處心積慮地準備服完兵役後的出國留學。但經過一年多，不曉得寄出多少封學校申請函，仍得不到一份接受申請的入學許可證明。在眼看着學期開學在即，而仍無著落時，找上了我。他問我為什麼在斗數行運上如此大吉大利的現象下，他竟然得不到一所學校的接納？到底是斗數理論有誤或是為了什麼？記得當時在詳談之下才知道，他老弟在大學時，憑着他的小聰明稀里糊塗地混過四年，因此成績不怎麼樣，只差沒補考和重修。而他所申請的國外學校，却都是頗具名氣的大學，所學的科系也是頂熱門的，因此他怎能憑他那份破成飆單，申請得了入學許可證，甚至還要帶有獎助學金？我不知道，他是犯了一般年輕人所共有的無知毛病，或是受了斗數命理之誤，以爲他既然通過了所有留學測驗，入學許可兼獎學金便是垂手可得，沒想到事與願違。


    後來經過我的建議，要他改向比較藉藉無名的大學發函申請，能有獎助學金最好，沒有也無所謂，至少他的家境可以勉強寫他解決學費的問題。秋季班來不及，春季班應該可以趕得上。現在我只記得這個年輕人當時略帶感傷地回去，但就在那年年底接近春節不久時，我突然接到他辭行赴國外留學的電話，井感謝我，在他迷惑時所給的指點，使他終能達到出國深造的希望，我除了祝福他順利成功之外，也深以能給他適當的建議，而感到安慰。


    命理談的是最現實的人間事，因此命理的推演和研判，不能光憑命盤上的現象而作純理論的高談闊論。一個人究竟能否成龍成鳳，除了命理上的因素以外，我們更應該考慮到現實層面的條件因素。命理因素固然重要，現實環境也是頗具關鍵性的重要條件。我們不能說，在當今之世，一個大學生只要行限上都具有利於出國留學的良好命理條件，只要他想出國留學，都可以辦得到。因為這種事不能單憑個人的條件和意願就可以達成，他所處的社會背景，和所要去的地方，往往也是一個主要的關鍵。


    諸位大師們，當你成天面對著形形色色，進門求教的善男信女，談及無奇不有的衆生相時，你曾否撫心自問，你對這個花花綠綠的大千世界的所有凡塵俗事，究竟了解多少？你究竟能談出些什麼？人生一輩子的疑難雜症并不是憑你一句諳事大吉、凡事大凶，就可以了結的。


    ## 離鄉背井

    [命例]


    一個人一生都住在老家過完一輩子，或是年輕時就離鄉背井覓跡在外，往往有他時代背景、社會因素和家庭條件的限制或促成。大體上說，在農業社會時代，由於人們的一種守成的想法，造成一般人普遍存有安土重遷的觀念。時至工商業高度繁榮發展以後，不但由於謀生的需要，也由於交通的發展與便捷，一個人他可能憑藉他的意願和條件，到人地兩疏的異鄉別地去謀求發展。


    但是我們在家多離鄉背井的命例當中，發現到，並不是人人都能飛黃騰達，而發跡於遠郡。有些人口在落魄他鄉，無顏回鄉再見家鄉父老。當然也有些人的確如同蛟龍歸大海，發跡得志於他鄉。在同樣的時代背景裡，同樣是異鄉人，竟然會造成如此大的不同結果，我們從斗數命理上發現了他們不同的個別條件和命理因素，可能就是造成他們所以有不同結果現象的原因。


    這個「發跡於遠郡」的命例，是我學習斗數命理時，同門拜師的師兄弟，亦是芸公的第二公子。他於丁卯大限末，和家人移居美國，在歷經十多年後，不但事業有成，於經商之餘並爲國直勞，擔負僑務委員職務，每次樸樸風塵來往於台灣和美國之間，無不在盡其想爲國家多做點事（師弟的話）。


    記得還同在老師門下學習斗數時，有一次老師還特別以師弟的命例作爲說明，這種命格的人，將來得機緣出外闖蕩天下，必能鴻圖大展，富貴揚名。當時師弟全家尚無舉家移民的打算，沒想到事過廿多年，師弟亦移居美國十來年，已開創出一番事業。如今年屆盛壯之年，正當英年有爲的時候，來日事業的鵬程萬里，應當指日可待。


    葉師弟命座天府陀羅在丑宮昌曲輔，身在巳位，爲天相，乃加重的府相朝垣格。命爲天魁、遷移天鉞，坐貴向貴。遷移宮七殺井廉貞化祿，嘉會權科爲三奇，雖有地劫地空沖動，但會左輔和右弼，使能於助益中得扶持，亦每於變動中求發展，退


