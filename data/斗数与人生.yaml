    # # 父母宮


    在古傳的斗數祿命法則裡，不管是男命或女命，父母宮都不被列為重要宮位。所以一般論命除了命身宮外，男人以財帛和官祿宮為主，遷移宮為次；婦女則以夫妻宮和子女宮爲重，福德次之，其他宮位都不甚重視。這也許在古代那種比較封閉的農業社會，反正男主外，最重要的是作事業賺錢養家；女人主內，子女、婚姻好，生活過得去，就是福氣。因此在古傳的命理上，幾乎都着重於這方面的探討。


    今人則受這些概念的影響，也因這幾樣確是生活上，甚至是人生一號子裡的榮耀大要事，因此常常是問命與談命上比較常談的話題。至於這個左鄰而居的父母宮，也是這個命盤的生身父母，反而談得不多，好像沒什麼實際的重要性。


    若我們從理論上來說，這個宮位應該是六親（父、母、兄、弟、妻、子）之首位，生我者父母，養育我的也是父母，一個人至少要依賴父母親到十幾廿歲，能獨立生'
  - '[PAGE 199]


    - 199 -

    父母官

    計為止，一個人依賴父母到這種程度，但在論命時竟然只在命盤上佔了一個虛有其表的宮位，勿寧是怪事。若說命理談的是一個人一生大事，在古代極重視倫常的社會裡，而特別不重視這個父母宮，我們真不了解究竟為了什麼？在談兄弟宮一文裡，我們提到父母宮和兄弟宮夾輔着命宮，由這接鄰兩宮星曜廟旺利陷的強弱，會對所夾的命宮起一種強旺扶弱陷的影響作用。若我們從一個人一出生到成長過程中受父母影響之大的情形去設想，就不難體會出父母宮在斗數的實際論命上，應該是具有相當份量的重要性。


    有一次跟幾位朋友在擺龍門陣時，由近年來台灣開始重視資賦優異兒童（學生）的特殊教育問題，談起了一位由初中而高中而大學，步步三級跳，以三年時間修完大學課程，而提早畢業的年輕人楊柏因。有位略懂命理的朋友問說，這在斗數命理上有沒有什麼特別的道理或理由？我曾說，斗數命理上有一種格局叫「陽梁昌祿」格，格局較高的，智商高、書讀得很好，具有過日不忘的聰明才智，在科學時代，進士及第無疑。在現代，升學考試如癡中取物，楊柏因可能是格局中最最高的一級，因此讀書對他來講是件相當輕鬆的事。'
  - '[PAGE 200]


    這位朋友接著又問，跟他父親是個知識份子有沒關係？我說當然有關係。我們知道他父親是某大學的數學教授，因此我們可以確定，楊柏因是生在一個極重視教


    育的家庭，何況他父親早在他讀初中，甚至讀小學的時候，就給他殷殷善誘，不但


    爲他說疑解難，也必定指導他如何作學問，使他在早年裡就啓開了他的聰明智慧。


    若他是出生在一個販夫走卒的家庭，父母靠出賣勞力維生，根本不識字，別說教他


    讀書認字，若能讓他跟一般孩子一樣上學讀書，已經很好了，如何又能及時發現他


    孩子的聰明，給他及時啓發教導？因此，楊柏因在學業上的順利成就，除了聰明才


    智以外，還要加上環境上的因素，特別他還可能得到他父親那種屬於資賦優異的先


    天遺傳。


    從遺傳學上，我們知道一個人的天賦，屬於遺傳的結果，而不是後天任何作爲


    所能作根本上的太大改變。一個人的聰明智慧可以遺傳，體質、體形與外表，甚至


    脾氣都可以遺傳。遺傳病理學上，依例有太多的疾病，全都來自祖先先天血緣上的


    遺傳結果。當然，在遺傳上，好壞並陳，遺傳到好的因子則好，遺傳到壞的因子則


    壞，若有人還搞不清楚這種遺傳因子的影響之大，你不妨看看你周遭認識的朋友，'
