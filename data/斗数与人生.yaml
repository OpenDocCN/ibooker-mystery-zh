  md: '- 地兩疏的新環境，要求順利鴻圖大展，能像在老家的樣子，則不經十年八年的艱苦奮鬥、絕難有成。我們以爲這些情形應該是屬於常識層面的問題，就是不用命理的推論都可以理解和預料，但偏偏有太多的命理大師，却只考慮到命理的層面，而不作現實問題的合參，我們很爲這道於盲的人悲哀，也爲命理界這種除了命理還是命理的狹窄觀念深感無奈。


    - (五)現代知識

    常人都說，現代是一個知識爆發的時代，任何一種專門知識都在繼續不斷地快速進步中。在老爺爺時代，一個人會莫名其妙的肚子痛，痛不了幾天竟然藥石罔效、因此而死亡。肚子痛而會在短期死亡的病因很多，可能是急性盲腸炎、胃瘡瘍穿孔、腸阻塞，這些疼痛往往不是單靠藥物來醫治能得救。在現代，醫生碰到這種病人，最好的醫療是及時將病人送上手術枱開刀救治，因此現在很少聽到因肚子痛而死得不明不白的人。究竟類似這孤開腔剖腹的手術，對現代的醫生而言，已經是件極其'
  merge: -1
  pgno: 276
- img_proc: true
  md: '# # 輕鬆的醫療方法。


    近年來可更好，腎臟衰竭可以換腎，連換心手術都有如老爺汽車調換新引擎那麼簡單。再過些年，醫學可能有辦法予所欲求地換人體的任何部位器官，都能在醫生巧奪天工的妙手之下，如同機械的換裝零件品。我們都知道，外科醫生所作的較大手術，實際上包括醫學上的好多項專門知識，絕對不只一位可以操外科手術刀的醫生就可以作得了事。比如以換心手術來講，我們以外行人的常識，也應該可想像得到，除心臟外科外，一定是需要和心臟內科、麻醉科、血液科、病理檢驗科、免疫科，甚至一般的內科專門醫生的通力合作。其實任何一位醫生，在行醫爲病人作診療之前，早就學有人體密理和醫療上相當多的有關學識。


    但反觀搞命理的人，好像只要遵古炮製地學了一些一知半解的命理法則，就可足百歲，倉促來去，也確如百代過客，但在這短短的幾十年歲月裡，却也充滿著太多恐慌和無奈。因此，古往今來的專文，用以探討可爲人生所用的學術與研究，代代無不推陳出新。我們就以專門探討對人們有直接或間接用途的學術來講，不只形'
  merge: -1
  pgno: 277
- img_proc: true
  md: '而下的自然科學在日新月異地進步中，影響人類思想觀念的形而上的哲學，以及用以改善人群社會秩序的典章制度，也都在不斷地進步，唯獨我們千古傳下的這套斗數命理，卻好像一直可以彌久常新，而又能放之四海皆準。


    我們認爲古傳的這套斗數命理法則，在推演人生一輩子的命理上，有它相當程度的可用性，但我們並不認爲，現代人也一定要沿用古傳而來的命理觀念。比如賽財子祿，在現代的命理上，不再是探討現代命理的全部內容，因爲現代人有他們所異於古人的社會背景和人生觀念，古人可以一輩子安居於出生的老家，但現代人很多卻需離鄉背井，向外謀生，另求發展。這種完全不同的人生境遇，必然是不可同日而語。一個人出外謀生，就必須憑據條件，但他要憑什麼條件？他要謀什麼職？創什麼業？這些問題不只屬於他個人的問題，也是屬於社會背景的問題。


    我們都知道，在一個工商業高度發達、經濟繁榮的社會裡，有太多的工作機會可作，有太多的事業可創，但實際上，也有很多人找不到適當的工作，也有太多的行業公司經營不善而歸於倒閉，正如人人都吃同樣的五穀雜糧和蔬菜，但有些人能健壯無病，有些人卻病魔纏身。假使人們能從命理的解析中，有如醫生治病一樣，'
  merge: -1
  pgno: 278
