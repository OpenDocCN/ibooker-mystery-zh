    先天殘障


    老奶奶聽到媳婦生小孩，關心的是弄璋或是弄瓦。因此通常第一句話大概都是問生男或是生女。而現代的新媽媽，除了想知道是否讓奶奶抱到孫子以外，更關心小生命是否健全健康。因爲誰都希望生的是一個健康的小寶寶，時代已不同，反正男孩女孩一樣好。


    一隻健全的母雞一定能下好蛋，但是一個健全的女人，卻不一定保證能生個健康的娃娃。一個健康的寶貴要有健全的肢體五官，要有正常的生理功能，也要有常人應有的智能，任缺其一都不是一個健全又健康的小寶寶。但是，生小孩並不能與生雞蛋同論。小孩生下後，有些可不是健全又健康，而造成不健全或不健康的理由太多，比如得之父母血統上的不良遺傳，如兔唇、色盲、血友病等等。胎兒在十月懷胎成長期間，由於某種原因造成生理器官功能的不健全，如先天性心臟病等等，還有由於媽媽在懷孕期間服用了某些藥物，而導致胎兒的畸形變化，缺隻手、少條腳，亦不是什麼稀罕的事。


    小孩這種先天性的殘障，在老爺爺的時代，會認爲是祖宅或祖墳的風水出了問題，也可能由於媳婦懷胎期間，家裡房間敲敲打打，甚至搬動床位而動了胎氣，因此才使媳婦生出一個不正常的怪胎來。提起這些老爺爺時代的老觀念，使我想起小學時候的一個同學，他家裡開了一家打鐵店，爸爸打鐵、媽媽幫忙鼓風爐，臥房就在同屋簷下，和打鐵間只隔一層壁，但我那位同學的幾個兄弟，卻個個健壯如牛、腦筋精靈不輸他人。現代的媽媽，都已接受新時代新知識的洗禮，應該都會了解，爲了要生個健全又健康的好寶寶，打從妊娠懷胎開始，一直到娃娃出生落地前，必須注意那些保健和醫療，畢竟生小孩還是一生中的一件大事，何況想要有個健全又健康的好娃娃。


    儘管醫學已經發達到胎兒懷上了七個月左右，就可以用超音波測定是男孩或女孩，更進步的用一種性荷爾蒙的測定法，在妊娠更早期間，就可以分辨男女，還有很多方法，可以早期預測胎兒是否健全或畸型。現代醫學的進步，絕對不是老奶奶時代所能想像，但是醫學所能研究和了解的，還是要到胎兒成形，並生長到某個程度以後，才能據以測定檢查、研究和了解。目前爲止，除了遺傳和藥物受害的因素已知道外，對於某些嬰孩有先天的生理缺陷，並不能全盤清楚究竟爲什麼？生命的造成，究竟是巧奪天工的礙，因此有些還是無法了解，恐怕只有老天爺才能知道。


    這命例是個生下就帶有先天性器官功能不健全的小孩，是我老家鄰居，在太太連生五千金後，再接再勵，而得的命根子。但老天不垂鄰，這個小孩生下彌月期之前，就帶有怪病，一哭叫就滿臉發青，後來經過醫生的診斷，才知道是先天性的心臟病，除了開刀以外，尚無藥物可醫。


    這個孩子的爸爸，有次在我南下出差，順道回老家時，要我幫他打聽台北能診治小兒心臟科的醫院，以便北上診療，我知道台北就有那麼一家私人興建的財團法人大醫院，案以心臟手術聞名。歷經幾番週折，在經心導管檢查證實，是由於兩心房間的房中隔上的那小孔在胎兒出生後，沒有自然合閉，由於這個小孔，使左右心房的血液不能依正常流通管道循環，以這個小孩的症狀，假使不及時開刀診治，隨時有猝死的危險。因此經其父母的要求下，醫生冒著成功比率不大的危險，毅然決定擇時開刀。雖然經我奔走之下，硬是請到了當時某權威教授醫生來操刀，但很遺憾的是，這個小孩仍然回天乏術，這是我多年爲親友協助醫療的唯一一大憾事。


    這麼好的命身格局，這麼好的大限行運，怎麼會因為先天性心臟病而夭折？這是一種到現在都原因不明的疾病，命理上能看出什麼來？我們不贊成這種說一定有這種疾病。閣下高見如何？


