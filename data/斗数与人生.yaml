  md: '# # 福德宮


    關於福德宮的論說更多，有的說事關一個人一生的福澤厚薄，一個人的長壽或短命，一個人的脾氣個性和人品，一個人的物質享受，一個人是成大功立大業、富貴顯赫或一輩子一事無成、窮困潦倒，一個人是否勞碌命，一個人能否享清福，甚至一個女人的婚姻是否美滿、白頭偕老，全部與福德宮關係密切，好像不扯上福德宮，就沒辦法說理完全。


    我們不能說這種論調全對或是全錯，但我們另以為，福德宮的星曜作用現象，完全因人而異。因男女而不同、因所處的時代背景、社會環境而有所差別，更因個人的價值觀念而大異其趣。我們因此不能把同一命盤（同時辰生）的兩個以上的人，認為他們在福德宮上的作用完全相似，這種道理和其他宮位一樣，完全是因人而異。


    有一次，有個年輕人曾經拿一張自己排的斗數命盤問我說，他的先天田宅宮和'
  merge: -1
  pgno: 189
- img_proc: true
  md: '福德宮都不錯，大限的這兩個宮也不很差，為什麼老想買一輛汽車來開而不可得？雖然還有一部摩托車可以代步，但每當炎暑和寒冬，特別是狂風暴雨的時日，騎機車不但難過，而且危險。我和他家裡熟悉，知道他的家境不錯，父親也有頗具規模的事業在經營，但卻是一個相當理性的企業家，他要他這個剛走進社會的寶貝兒子，以公開應徵的方式，到一家和他家庭毫無淵源的民營公司去服務，從一個最基本的職員幹起，甚至要他利用極有限的薪資在省吃儉用之餘，自行買部二手貨的機車來代步，否則就乾脆去擠公車。


    我以為在這個年頭還有這種父親，的確讓人肅然起敬，他這種作法，正是古人所謂的易子而教，讓他的兒子在一個陌生的環境中去接受磨鍊，使他能在困逆的工作環境中長大，也讓他體會賺錢不易，如想要求生活上的享受，必須付出相當的代價。我也知道他父親所以會如此狠下心來，最重要的還是寄望他兒子將來有足夠的能力繼承家業。當一個成功的企業家不容易，要當一個好父親，真正望子成龍的好父親，也著實不簡單。


    一個人先後天的田宅宮和福德宮都不錯，特別是家境又不錯，別說買輛新機車，'
  merge: -1
  pgno: 190
- img_proc: true
  md: '就是買部全新的騙車都沒問題。但問題就在他剛走入社會，剛進入一個一切都要從頭學起的私人公司，資淺職微，薪水好不到那裡去，若與家人同住，把薪水當零用錢還綽綽有餘，想要從節餘當中買部車子用它代步，談何容易？雖管家財萬貫，究竟是他老爸的錢，而他偏偏碰上這麼一位嚴父型的老爸，只好以機車代步。


    在斗數命盤上，一個人的田宅宮很好，不一定表示他目前必定擁有龐大可觀的「不動產」也許將來可能，但對這個年輕人來說，在這個時候只能表示居家環境不錯。福德宮好，並不意味着他現在很有錢，只能說他當前生活無虞。我們可以以常理預期，有朝一日，當他繼承了父親的家產和全部事業的時候，何至可以買部國產汽車代步，甚至去買一部勞斯來斯的豪華汽車並雇用專用司機，也絕對是輕而易舉的事。


    因此在斗數論命上，我們千萬不可單憑命盤上宮位星曜的現象，就鋤口直斷他現在必定如何，或者將來必定如何。我們不能光談理論，而不考慮到現實上所遭遇的一面。正如這個年輕人，我們或許可依命盤的星曜現象，論定他在命理的歸類方面，是比較屬於從小就會生在家庭環境富裕的一種類型（但並非絕對如此），將來一輩子在財富方面也比較屬於富有的典型，一旦他後天也具備了這些叫他富有的條件，'
  merge: -1
  pgno: 191
- img_proc: true
  md: '比如，繼承祖先龐大的財產，再加上生財有道的企業經營能力，即使不變成鉅富，也必定會成爲一個比較富有的人家。我們以爲，命理既然談到先天和後天，我們就不能光憑「落土時」（出生時辰），就認定已經決定了一個人一生的命運。


    以這個理念，我們可以放眼當今世界上，某些三國民所得在一萬美金以上的國家，和那些所得不及幾百美元的國家，他們國民的生活水準和生活品質上的巨大差異。若要探求造成這種差異的原因，我們會從居住環境上、資源豐缺上、人口多寡上教育文化水準上、政治制度上、經濟活動上，甚至其他的天災和人禍上去分析，必然可以找出不離譜的答案。一件事物的存在，必有他存在的道理，而且他的道理，常常又爲多種因素所造成。若我們一定要把造成某一結果的現象，硬推到某個單一因素（譬如說，命理因果），那將會與事實差之毫厘而失之千里。


    因此，我們盡可以依斗數理論來分辨一個人的福德宮如何，大概可以知道他目前生活的情况（福祿宮顯示功成情況）和經濟是否寬裕。


    從田宅宮，可以推定他的家居和不動產情況。但這只是依理類推，實際上；我們更應該從對話中去了解實際的狀況，否則你將永遠沒法搞清楚兩個年逾化中的人，'
  merge: -1
  pgno: 192
- img_proc: true
  md: '從小不只隔臨而居，而且在同一個時辰出生，但是由於以後境遇不同，一個在工商界鴻圖大展，另一個却只能一輩子守耕家裡的幾分薄田。如今兩個人不只過着不盡相同的生活方式，也各擁有不同的家庭和財富，我們以爲''在根本上他們兩人出生於不同的家庭，自然造成他們兩人以後不同的境遇。假使你以爲那是祖德和祖墳風水的作弄結果，那只是代表你個人的看法，實際上是否就是如此，我們以爲就是強辯也不會有實在的結論。如果有人認爲，這是一前世的陰德，今世的福報—不同，也未嘗不可。


