  - '[PAGE 14]


    和年齡稍長，對人生的體會加深，而在拜師十年後，再度經由老師繼續不斷的耳提面命的教導，才使我漸漸的體會到一個人命運的造成，命理只是其中的一個因素，而不是全部的原由。一個人的命運，除了他所具有的命理因素外，應該還需考慮到他所處時代背景、社會環境、家庭條件，以及個人際遇遭遇。要把這些因素全部合併考慮，然後才能據命理法則分析和描繪出他的命運走向，絕不是傳統觀念上，完全單憑命理因素來決定一切。


    比如婚姻和生育子女，古今以來就差別很大，就是當前因所處環境不同，往往也相差很多。在這裡實行的是一夫一妻制，但在回教國家就不是如此。前人的多子多孫多福氣，今人的「一個孩子恰恰好，一個孩子不嫌少」。這種婚姻和生育的觀念，無不受到所處環境的嚴重影響。特別是在近代人類思想觀念，如同科技進步地在日新月異的變化中。我們社會亦由保守、封閉而變成進步開放。這些現象，也必然衝擊著我們這個社會所有人們的生活。


    以我個人多年對斗數命理學習的了解，命理既然談的是實際的人生，因此命理的道理應該可以用極其常識化和生活化的現象來加以說明。比如說，一個人小時候'
  - '[PAGE 15]


    得到家庭妥善的教养，使他的人格趋于正常，稍大得受正规的教育，使他学有专长，长大进入一个产业发达的社会环境里，应该比较有他立足和发挥的余地。相反的，若他是在一个破碎的家庭长大、从小没得到好教养，使他的人格趋于偏激，以后又没受较好的教育，当他进入社会，他将会无所适从。这种教养和教育，往往是造成和影响到一个人一生的命运走向，我们当然不会以为完全是一种天生注定的命理安排。


    再如以一个已开发国家，人民的高水平教育和高水准的国民所得，来和开发中国家，一般国民的较低教育水准与较低的国民所得作比较，我们会发现，大部份高所得的国家人民，都因为他们有高水平的学校教育（以现在发达的国家除外）。又如，一个国家国民的平均寿命长短，一定和他的生活品质、医疗条件、环境卫生的良劣，有相对性的关联。凡此种种，绝不是单由命理因素所造成。


    因此我们发观到，几乎所有的命理现象都不能排除这些环境和实际遭遇的因素，而这些因素都是一般常识，丝毫不是玄虚不可理解的现象。


