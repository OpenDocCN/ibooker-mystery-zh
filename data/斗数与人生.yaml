  - '[PAGE 185]


    但亦很難作爲必然的現象說明。大限壬子，天梁雙化祿、武曲雙化忌，又因鈴星同躔，成爲正格寡宿，但不會父母宮，何況父母宮的天梁還化雙祿，竟會在童年喪父？

    先天田宅宮在卯，在寅有七殺爲火星所剋，在辰有武曲化忌和鈴星的寡宿格來夾制，這大概是先天田宅受惡煞夾害，才會住那種房屋的原因。先天兄弟宮組合不錯，所以以兄弟衆多，但大哥却是同母異父，因此也就成異姓半親的兄弟。但依我觀察，他們兄弟都對這位異父兄長敬重有加，斗數命盤就不知道如何解說？

    陳先生在丁未（一九六七）年，即壬寅大限間加入本公司。由於初入公司時，家境並不寬裕，因此一直租屋在負責業務地區居住，直到癸卯大限，限入先天田宅宮初期，才買了一幢上下兩層樓總共十三坪大的小房子住，總算不再過那種寄人籬下的質居生活。也許，有恒產斯有恒心，從此陳先生事業逐漸步入坦途。在省吃儉用之餘，把事業上的賺錢盈餘，除了留用週轉金外，儘找機會購買了些可作建築用的土地。據我所知，這些土地他一直保留著，如今已不再是身無片土的窮苦人家，而是擁有家產的有產階級。

    癸卯大限爲先天田宅宮，癸使後天田宅宮破軍化祿，因此使他雖住十三坪的鴉'
  - '[PAGE 186]


    籠小屋，但却有餘力去接二連三地購買土地不動產。也許午宮另受三方四正諸多惡煞的沖擊影響，因此在這段期間的購地，大概不是跟人合買就是先貸款買地，以後分期償還，並不是大手筆的一人一次付款買清。但癸卯大限因買地所借的款項，據陳先生所說，都在癸卯大限間償清。


    由於小時家居房子簡陋，又受人口衆多擁擠之苦，因此陳先生幾年來一直把興建一棟比較像樣子的房子，作爲他生平的最大宿願。人的境遇有時很奇妙，在癸卯大限間，他同樣以借貸補足才向官方標購而得一塊不顯眼的土地，竟在癸卯大限末，規劃變成商業區，四十米寬的大馬路，就在他所標購而有的土地接鄰而過，馬路闢建之後，沿大道兩旁的高樓如雨後春筍般的蓋了起來。曾經有人要以原價五倍的價格向他買走這塊地，他一直不爲所動。


    到了甲子（一九八四）年，我曾經聽他提起想利用這塊土地興建大樓，只是當時興建資金還相差太多，遲遲不敢策劃興建。這時已四十三歲，大限入甲辰，也就是先天官祿宮。到了次年乙丑（一九八五）年，經得一位陳先生一張子引爲大恩人的財神爺，羅先生好像及時雨般地告訴他，現在正是建築界不景氣的時候，建材很便宜，'
  - '[PAGE 187]


    若有意蓋大樓，他可以在銀行貸款上助他一臂之力。在有了靠山之後，他終於在這

    年的秋天左右破土開工，興建宿願已久的洋房大樓。


    人在潮退當頭的時候，好像什麼事都會迎合著他的需要來幫助他，營造商因不

    景氣，表示將全力配合，只要夠開支成本就接受委託土木工程，建材商更顯得格外

    熟絡，建材價既廉，物亦美。等到開工後更妙，各大銀行的分行經理亦都自動前來

    表示，可以以最低利優惠方式提供貸款，期限任定。人間就是這個樣子，想想十多

    年前租房子的時候，房東還怕他付不起每月租金，必定要先拿一筆錢作爲租屋押金。

    現在這銀行經理都跑來低三下四地拜託借錢，真的，人實在不能太窮，否則連鬼見

    了都怕。我想陳先生的感慨更多，否則他不會在意於興建大樓，將之引爲生平的宿

    願。


    甲辰大限，廉貞化祿、破軍化權、武曲化科、太陽化忌，引動先天命宮的三奇

    嘉會，大限又爲先天官祿宮。這個大限開始，他兼營另家廠商產品的經銷，也頗有

    進帳，因此更加速他完成平生心願的建大樓計劃。乙丑年，天機化祿使先天田宅宮

    流祿同宮，後天田宅宮呈化祿，井佳會亥宮祿存。丙寅年，天同化祿再度會入後天


    田宅宮


    ·187·'
  - '[PAGE 188]


    - 188 -


    人生與效率


    - 的大限田宅宫（木），仍有玄位的禄存；丁卯年，行先天田宅宫，又得太阴化祿由四宫

    对照。在这种连续三年使先后天田宅宫都有活祯的吉化之下，一幢七层的大楼得顺利的在丁卯年中落成。对于一个原是家徒四壁的穷家子弟，能在中年期间就有如此成果，也很令人为他庆幸。

    为了要向这位商场上的老战友、老伙伴表示祝贺，我特别以他的大楼名称的头两字，撰了两句贺词，请公司的营业部曾经理（这位年长人曾以筲奋得过日本昭和天皇奖

    的书法名家）密写成对联，并裱作成框，当为贺礼。陈先生是位不忘本的人，现在他在嘉义事业有成，但他仍没忘记来自麻豆，所以对联撰成这個样子：

    假使你在嘉义路遇，看到这幢大楼，那就是我的好朋友陈先生；一个从两袖清

    风经过廿多年努力后，得以建立的成果。


    - 麻生沃野培之枝繁葉茂

    花經心田發為利厚財盈


