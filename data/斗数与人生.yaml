- img_proc: true
  md: '更重要的代表這個人在這大限階段的一種心理狀況，而這個大限的天干四化，才是促使他潛在心理狀況發揮出來的力量。


    若我們以不同兩個人在年齡相同、家世相似、教育一樣，甚至服務在同一個機構裡，從三十五歲（比如第四個大限）到四十四歲期間，一個高陞到高級主管，另一個只當部門主管，職務級資、待遇，都差上一大截。我們以常理可以認為，張先生當高級主管是由於他努力與表現傑出的結果，王先生他表現平平，僅算稱職，只因年資而累升部門主管。環境相同，而表現不一樣，應該是個人在工作上所採取的態度不同所致，也就是說，差異乃是由兩種不同心態所造成，而不是因為工作環境有別。


    若在斗數命盤上，我們以爲老張有雙權照會，甚至合祿煞寫也在他的大限運上，而老王只是大限的祿權照會而已，因此老張會提高他的工作意願和表現，老王就太那麼一回事。兩個在環境條件幾乎相同的人，但在工作的表現上截然不同，這完全是工作心態不同所表現的結果。


    禪宗有個公案，看山是山和看山不是山，我們以爲完全在自主觀念上的一個問題，而不在於客觀上的是不是真山。因此我們以爲四化在每一大限上，它是扮演著'
