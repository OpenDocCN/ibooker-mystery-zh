    ②本書著重於斗數基本理念的反覆申述，在命盤推演的具體方法方面，僅作重點式的、原則性的析論。


    紫雲先生目前正以當代名人為論命主題，對於每一事項的原因、現象、結果都做具體深入的推論過程，讀者可以從他的精闢分析學到活盤論命的完整方法。敬請諷者拭目以待！'
