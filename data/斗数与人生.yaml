  md: '問題，常因人而異，更何況，人生除了妻、財、子、祿之外，還有太多談都談不完的事項。一個論命者所能辦到的，也是比較實際的，就是針對所訴求的事項來加以推廣和解析，我們不以爲論命者一排好命盤，就馬上能從命盤裡，知道問命者究竟想要談些什麼事，正如一個醫生對一個初診的內科病人，不經病人說出他那一個地方不舒服，就無法着手診斷一般。


    幾年前，我就曾經碰過這麼一位問命者，一位幾乎快要耽誤適婚期的小姐，她不像一般未婚者，要我談論關於感情婚姻的事，反倒問我這一兩年內她和她的家人會不會搬家。本來搬家在這個人口流動極爲頻繁的社會，似乎沒有用命理來研究的必要，但她却愼乎其事地要我表示意見，甚至她也表示曾以這個問題請教過很多命理大師，但都不得其解，由此可見，她很在乎搬不搬家這一件事（詳見了無居士著紫微論命，小姐爲何搬家乙文）。


    像這種問命的訴求，我個人不以爲是特例，因爲在我二十多年的斗數學習過程中，幾乎經常碰到一些似乎是很冷僻的問題，但確實造成當事者的某些困擾，在百思不得其解、求教無門之下，想藉命理的探討來加以了解或是請求解決之道。因此'
