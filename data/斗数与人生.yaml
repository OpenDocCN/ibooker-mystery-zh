    僕役宮犯沖、福德宮破的結果，是高利貸被倒帳，此時，債務人常有從或局的性質，


    債權人則爲主，所以高利貸的債務人出現在僕役宮。這裡的僕役宮受沖破，不必去跟出口被倒帳扯上關係。若從退移大吉，可以發跡於遠郡一意經營會到，當退移宮和財帛宮俱破時，就不利於從事國際貿易生意。蓋這宮位的凶煞，就是表示遇人不淑、因人敗事而損財，本質上，是有別於僕役宮的小人，又作武市的批發生意，也同此研判和論斷。'
