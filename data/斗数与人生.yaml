  md: '策則而得到解決。再因命宮七殺、擎羊來會，讓他一旦握有權柄時，一切經營下的

    事業，將會依他特有創意來辦理，而不仿照傳統或一般常規的經營方法。他這種堅

    強的自信心，和強旺的鬬志，若用在賭場上去賭那種一翻兩瞪眼的梭哈，恐怕對手

    都會給他的氣勢所攝住，而爲之嚇倒。


    但這種氣勢，並不一定代表着他凡事都會成功。究竟企業經營非同賭錢，不能

    席手氣的順背。我們只是以身宮的星曜組合，用以說明由於身宮的這種「增強作用」

    （特別是紫微化權），對他在事業的處理上，甚至在其他方面上（尤其紫相所應宮位），他

    也會有那種強烈自信心，幾乎到了霸道的現象。


    我們可以和前例一樣的在他的限運中發現到，由四化引動，而激發身宮所產生

    的這種後天的「增強作用」的強烈跡象。命宮不會先天化權（紫微在戌），但却爲身宮

    所會，他也是從第一大限的壬子運開始，到癸卯大限，相連四個大限，不是使身宮

    紫微再化權，就是大限會巨門化權。這連權作用一旦聯上三大限以上，就會使這個

    權引起一種加量的「增強作用」。到了甲辰大限，破軍大限化權自座，也會了先天命

    宮，以及先天紫微化權，因此使他在權威方面，由於這種不斷增強，使化權作用發

    揮到極點。若以他命身宮部不會六吉現象而言，他的這種自信心和權威心之重，可'
  merge: -1
  pgno: 299
- img_proc: true
  md: '能會以爲在那一個行業上，已可以讓他隨心所欲的爲所欲爲。因爲他會自負地自己

    認爲，在他經營籌創下的事業，已到所向披糜，凡事垂手可得。


    特別是到了甲辰大限，廉貞化祿、破軍化權、武曲化科，更會使他覺得他當時的事業充滿著一片美景，也會使他大權在握，名利雙收。因此他會更大展鴻圖，繼續不斷的推出他精心策劃的更大事業。但以斗數命理的現象來說，廉貞化祿受到空亡的冲破，大限官祿宮（也）亦有地劫的興風作浪，再加以大限田宅宮（木）太陽化忌和太陰、鈴星（十惡格）形成財庫的空虛。我們以爲，就是策劃再好，也將無財力去支持他事業上的開展。也許，張先生的事業謀略，的確很好，若換成別人來當老

    板，人家在大財力的支持下，可以順利成功，但對他來說，却是鏡花水月，因爲巧婦確是難爲無米之炊，何況是投資龐大的房地產事業，事業經營更非大量資金支援莫辦。


    我們以爲，張先生最後會變成在房地產業上的破敗，在命理上，身宮發揮的道種「增強作用」應該是一種很重要的因素。當然，我們不能以勝敗論英雄，究竟張先生在台灣的房地產業，也有過一段風光的日子。他在這一行業上，亦應該有過他輝煌的建樹，我們並不能以他最後的結果，而否定他曾經成功過的一切。'
  merge: -1
  pgno: 300
- img_proc: true
  md: '# # 斗數命理無窮無盡


    廿多年前因緣巧合地碰上了何老師，也因之拜在門下，學這套為家人齒冷的斗數命理。我不知道究竟斗數命理太過於深奧難懂，或是個人太過於笨拙，總覺得有太多的事未明、理未清。有時回想起來，在學習斗數過程中的曲折和崎嶇往事，不禁多少有所感慨。所幸廿多年來，我在工作上由困境而趨於安定，雖然過著一種與富貴無緣的上班族生活，好在我生性淡泊，倒是還能安之若素，也因此使我有閒逸趣去搞這個當不了飯吃的斗數命理學。


    不過，在這個生存極度競爭的社會裡，尤其置身於這個如十里洋場的大都會，討生活也不是很簡單的事。人事的悲歡離合、工作的紛爭困擬，使我心領意會了人間的甜酸苦辣。老板的苛求，商場上優勝劣敗的無情打擊，總難以使人釋懷而無憂。一個在商場曾遭挫敗的人，才能體會經商失敗的苦惱，一個事業曾經落入低潮而瀕'
  merge: -1
  pgno: 301
- img_proc: true
  md: '臨倒閉的商人，才懂得企業經營上如何挽救危亡、轉敗為勝之道。有人說，人是不

    經一事、不長一智的動物！一個年輕人絕難領會滿身風霜的中老年人所歷經的辛酸

    苦楚。正如一個憑依父兄財勢的富家瀟少，他無論如何不能體會孤苦人家的悲慘遭

    遇。人生雖苦短，但在幾十年間也點綴着太多叫人眼花撩亂、太難於捉摸、太禍福

    無常的遭遇。多年來藉着業餘論命，着实多少領略到人生充滿着太多無常的原由和

    道理，但有時也會爲着太多的無常而甚感茫然。


    幾年前我曾帶了了無居士和慈耕去拜見何老師，以聆聽教益。記得何老師曾經

    語重心長地敎誨着說：「斗數命理無窮無盡，一個人研究一張子，也不一定能了解

    多少。」老師年已古稀，學命論命已近一甲子，都還心存此念，口作此說。我想老師

    寥寥數語的敎誨聽在他倆人的耳裏，亦必銘記在心中，伴隨着他倆往後一輩子在鑽

    研斗數命理之學，成爲崎嶇道上的暮鼓晨鐘。


    歲次丁卯，太陰化祿、天同化權、天機化科、巨門化忌，若閣下的斗數命盤天

    同居卯宮，那今年正逢三奇嘉會，這個在斗數命理上是一個威權在握、名利雙收的

    上好格局，我們祝你鴻圖大展，經商的發財、當官的高陞。若你曾得高人指點，


    人生與斗數

    ·302·'
  merge: -1
  pgno: 302
- img_proc: true
  md: 在這種大吉大利的格局下力爭大展鴻圖，結果還是經商血本無歸、當官的陞遷無望，那算你時運不濟，你碰到的只是一個虛有其名的高人或大師，因為斗數論命不應該只憑此論斷。況且人生命運，除了命理因素外，還有太多的其他條件，這些條件在斗數命盤上並不會呈現出來，你只好自認倒楣，你正好碰上了這麼一位只會叫你事與願違、如假包換的斗數命理大師，怎能怪得了他人？該怪的是你自己！
  merge: -1
  pgno: 303
