  md: '到了庚申和己未大限交接左右，除了原有採茶機代理販賣生意外，加工生意大有後來居上之勢。於是乾脆就在附近的一家大樓地下室，租了一百多坪當廠地，樓上租了一間辦公廳，員工也在幾十個人以上，看來已不再是家庭式的小家子公司。


    大概即在己未大限的下五年，就在台北近郊的某一個小型工業區買了廠房，擁有那棟工廠大樓的兩層樓，總面積約在四百多坪數，員工近百。目前我只知道他生意越作越大，出入有專用司機開著朋馳汽車代步，有事找他時，不是聽說人在國外考察，就是人在南北奔跑，老師的預言，果真的在近十多年後應了驗。


    從斗數命盤上，我們發現到，林老板在庚申大限有如上面所提的命理因素外，還能把握機會，草創了小小的小公司。但由於己未大限運入先天財帛宮，會上先天命宮，已干使武曲化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。這一引動，使他先天命宮變成武破雙化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。這一引動，使他先天命宮變成武破雙化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。這一引動，使他先天命宮變成武破雙化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。這一引動，使他先天命宮變成武破雙化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。這一引動，使他先天命宮變成武破雙化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。這一引動，使他先天命宮變成武破雙化祿，貪狼由先天忌轉而爲化權，天梁化科、文曲化忌。


    祿宮，使他在生意的源源不絕與雄心萬丈的良性循環下，事業蒸蒸日上。


    大限見先天貪狼忌和陀羅，使他更趨向於生產工廠的經營。天府在對宮，受地空和羊刃干擾，但得火星由巳位的制化，雖使這個大限在事業上略有起伏，但由於'
