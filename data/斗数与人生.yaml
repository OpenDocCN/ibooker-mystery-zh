- img_proc: true
  md: '我曾經不厭其煩地舉化學反應的例子，用以說明命理上的道理。銅，可以溶在鹽酸、

    硫酸和硝酸裡，一塊銅片，若把它比之如人的命格（命盤），在這銅片還沒投入任何

    溶劑以前，它是一塊純銅，一旦投入不同的溶劑，銅片在酸溶劑裡頭，必定會產生

