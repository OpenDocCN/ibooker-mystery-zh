  md: '斷學習，精益求精，以誠惶誠恐的研究態度，在我有生之年，一輩子皓首窮經地去鑽研紫微斗數，使師門的絕學，傳之千秋萬世，以報老先生和何老師的知遇和教導之恩於萬一。


    開課之後，原有六位師兄弟，後來不知何故，約過半年後只剩下四位，一位鐵工廠的李老板，一位如今移民美國休斯頓的葉老先生的二公子致君兄，另有一位，我的師姊陳女士。


    據何老師事後談及，我們四人是他以斗數正式開班授徒的第一遭，但也是課開得最久，講得比較完整的一班，課程每週兩個晚上，每晚七時開班，除了陳師姊以外，其他的三個徒弟和老師，都是大煙槍，每當煙癮一來時，停下課，老師和三個師兄弟就吞雲吐霧起來，只是苦了陳師姊，陪著我們大抽二手煙，就在這種邊上課邊抽煙的輕鬆氣氛下，課程常常上到午夜而不知終止。由於徒弟都是「生牛仔」（生手），因此，老師就得從天干、地支順序念法教起，然後接著請授斗數的基本原理原則、排盤、星斗賦性、活盤演練……'
  merge: -1
