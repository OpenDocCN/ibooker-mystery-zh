  md: '加以了解，不只產品在市場上的行銷評估，同時對公司經營管理制度、財務結構，甚至公司營運的「損益平衡」分析……等等維繫着公司賺錢與否的關鍵問題，都必須深入研究，然後逐項提出分析和研判，最後才擬出具體因應改革的意見，提供給這個大老板作爲經營上的參考。絕不是單憑一句上上大吉就擔保能財源滾滾，或是下下大凶就關門倒閉，而毫無挽回餘地。我們絕不相信，任何一位再高明的算命先生，能一無所誤地逐一斷出大老闆王永慶先生名下所有企業單位中，今年有那個公司會賺？爲什麼賺？那個公司虧？爲什麼虧？但我相信，到了年底，在王大老闆的腦海裡，對他旗下的所有公司，盡管在還沒見到任何公司的結算報告以前（一般都在次年上半年前才結算清楚），那一個公司可能盈虧及原因，應該都相當了然。


    我們不以爲王老闆他有神機妙算的神通，我們只知道他擁有很健全的事業管理機構，網羅各種學有專精的企業管理專家，隨時爲他事業王國下的每一個企業單位，懾精寶神和獻策。一個算命仙仔，若只死纏着殘缺的古祿命法則，而不知企業經營爲何物，他到底何德何能，竟能根據一張死命盤，甚至單憑財帛宮的星曜，就去斷人家今年賺了多少錢、虧了多少本？我們以爲，還是省了吧，因爲誰聰了，誰就倒'
