    違逆，但也有人說，事業是一種選擇，仕、農、工、商，任憑你的意願去選擇，只

    要你高興，你可以一年換一種職業，甚至一年換一個老板。


    在學術的研究立場上，我個人贊同，任何主張的自由發揮，只要你能言之成理、

    擲地有聲，都可以成爲理論或命理思想上的一派宗師。我也不揣冒味地提出斗數命

    理探討事業方面的個人淺見，作爲同好者的參考。


    這個命盤的主人翁，與我大學四年同窗，畢業後因緣巧合地又在同一家官民合

    資的企業機構幹基層的業務員。當時的頂頭上司、業務主管，正是八月中旬在台中

    墜樓身亡的某企業管理大師（據傳政一分鐘，以表哀吊）。由於兩人都是初出茅蘆的年輕

    人，主管大人又是老學長，因此我們無不在唯命是從、戰戰兢兢的環境中，既工作

    又學習。老實講，當時的工作並不輕鬆，而且待遇又差，有時在主管大人的嚴厲磨

    練和要求之下，常有一股年輕人所有的暴燥牛脾氣想要發作。但每當想起工作難找

    時，總得向現實環境低頭而忍下來。現在想起往後老林和我會繼續走上工商界，不

    能不說跟這一段並不怎麼好過的日子，是個緣起的契機。


    老林也許是個作生意的料子，在追家公司一待就十來年，由一個小業務員當到'
