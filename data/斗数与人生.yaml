    ## **寅大限前就結婚了**（大限夫妻宮，形成足緣婚配）。他既然生在現代，又當醫生，多半在學中不會結婚，最快也得延到乙丑大限學校畢業，到社會服務，當上醫生以後的事。也就是說，最快也要到乙丑大限內才能結成婚。這全因時代不同，跟他遭遇上的關係，不能全說是命理原因。


    小李又說：「楊醫師人長得還不錯，家世也算得上優裕，個人條件幾無什麼缺點」在乙丑大限川一歲以前，儘管媒人來來去去，門戶爲穿，還是結不成婚。是否因爲先天夫妻宮太凶，當大限進入先天夫妻宮的乙丑大限後，又碰到大限夫妻宮（才）成爲文昌化忌，和貪狼造成昌貪凶格，所以才沒把婚結成？我說：「一般的命理現象，可以這麼說，不過在這個命例上，若要把沒結婚全歸在這個上面，我以為也不盡然。最重要的是，楊醫師在命宮和夫妻宮顯現的星曜組合上，顯示著在楊醫師的潛意識裡，對擇偶有某種特有的偶像條件，即精明又能幹、高品性型的期望，至於那種台灣俗話所說「水某富丈人」（太太漂亮，丈人富有）一類型的太太，並不是他想要追求的對象。


    我們不能說他返種潛意識對不對，因爲這是他對擇偶的一種潛在的意念，在沒碰到合他意的對象前，你要說他為什麼人家給他介紹那麼多好女孩他却不接受？他也講不出個道理來。「基本上」紫微得破軍化祿的強化，使他在婚姻方面形成一種正面的制化，形成一種制煞爲用的功能。貪狼化忌由巳宮來會，更加重他這種擇善固執的掘偶意識，特別他身宮還在先天夫妻宮，這些現象使楊醫師大有寧缺勿濫的、更堅強的觀念。」


    在這種情形下，就算請下了月下老仙翁，恐怕也無濟於事。「因此」對乙丑大限夫妻宮（女）的昌貪格，我的看法不是楊醫師不想結婚，而是根本碰不上他理想中的女孩子」。小李接著問說：「日前三十五歲（丁卯年）大限行甲子運，大限夫妻宮太陽化忌，恐怕又會歲月磋陀，青春虛度，而繼續找不到老婆了」，我說：「我看你還是被星曜所迷惑了，我還是強調，一旦他碰上他心目中的偶像，他就會很快結婚，你別只是注意到後天夫妻宮的戌位，爲什麼不看重這個大限（甲子），正爲雙祿輔祿（廉貞化祿作用到亥宮來）？由於丑宮是先天夫妻宮，對還沒結婚的人而言，也是一種可能結婚的吉相」，「再說，後天夫妻宮太陽化忌，受地劫冲破，常有去凶的轉化作用，並不必全作凶論。我倒認為，楊醫師今年很可能就會碰到心目中的理想對象，你該準備紅包吃喜酒了。


    小李接著問說，何以見得？我說待你收到楊醫師的訂婚禮餅，把它轉送給我時，我才告訴你如何看法。這個傢伙單憑一籃水果，就想學得那麼多，未免太便宜他了。


    接著他又拿出另一許小姐的命盤，說是一位女牙醫師。小李說：「這個女孩子，命宮坐貴向賤，又是陽梁昌祿，難怪能考上牙科，當個女牙醫師。不過女孩子婚姻很重要，夫妻宮亦是身宮，天機獨坐在巳位，受三方羊刃、鈴星、火星和天同化忌來沖煞，在婚姻來說，恐怕也是凶多吉少」，我說：「小李啊，你又被星曜，特別是忌煞諸凶星所迷惑了！看到忌煞好像看到魔鬼一般可怕，難道你對五行的生剋制化完全不了解？『鈴星腐火，可制羊刃金，巨門水可制火星火，以命盤的靜態來看，不一定就代表對天機會有什麼傷害，若不在行運限時，再有忌來引動，這些凶星在制化的抵制下，形成平衡，並不一定會產生爲害作用。特別是婚姻一宮，事涉兩個人，因此不能單憑一個人的命盤，就來鐵口直斷他的婚姻如何？否則老爺爺時代也用不著配婚再娶媳婦。」


