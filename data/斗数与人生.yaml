  md: '認為乃得之先天遺傳，並不是後天所能改變。


    我們以爲，一個人得自父母母血（卵）孕育而成，而生辰正是一個人在母胎孕育完成，呱呱墜地而進入人間的緣起時，因此我們據以排定斗數命盤。這個命盤即代表這個人先天與生俱來的所有特質，也就是一種先天特質。若我們根據這種理念而推演一個人的命盤，實際上就是代表著一個人的先天秉賦——也即所謂的先天命格，不管他在命盤上的命宮或身宮，都可以作此認定。


    一個人受先天遺傳而得的，除了IQ、體格外，還有性格（其他項我們暫不論）。


    除了IQ為後天所不能改變外，體格和性格雖也多少會受後天際遇的影響而略有改變，但基本上，先天禀賦的現象還是有相當大的存留，很難全部的被改變。絕大部份的人，體格外形還是大半受到先天遺傳條件上的影響。因此我們相信沒有一個人會同意，任何一個小孩從小就給他很好的營養和適當的體力運動和訓練，將來長大後也都會有紀政和楊傳廣的體魄，而能接受十項全能訓練後，亦都能有世界級的優異成績。性格更是如此，絕大部份的人，雖然可以藉修心養性來訓練，但很難能求得把天性性格完全改變，即所謂「江山易改，本性難移」指的就是先天（造份）上的'
  merge: -1
  pgno: 290
- img_proc: true
  md: '這種禀賦，很難徹底的改變。


    在斗數命理上，我們發現到一個人的一生中，這種先天的特質——特別是聰明才智和性格這兩樣，往往是對一個人一輩子命運上有著相當大的影響作用，特別是在命理因素（從天條件以外）的條件上。


    根據心理學上的說法，一個人碰到一件利害相關的事情以後，他會直覺的想到這件事情的利害關係，將會影響他到什麼程度？而這個利害關係程度的大小或重輕，完全是他個人所作的一種價值判斷，然後再根據這個價值判斷來考慮如何來處理這件事項，接著再考慮如何付之行動的實際方式。真正的處理行動，應該是經過這些思維後才施行。


    比如說，甲乙跟丙都是好朋友，丙有急需，同時向甲乙兩人借同額的錢，後來無法如約歸還，某甲以和丙是好朋友一場，朋友有通財之義，既然丙有困難，反正自己生活還可以過得去，也就不刻意去追求丙一定還錢。但某乙想法不一樣，朋友歸朋友，既然是借，必定要還，不管自己的生活有否受影響，借出去的錢一定要索還。因此在幾次討債無果後，一狀告到法院，依法追討某丙還錢。同樣的被欠債，'
