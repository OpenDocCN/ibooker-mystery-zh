  md: '關於「斗數與人生」這本書


    如果您是初學者，《斗數與人生》這本書可以完整而有系統的建立學習斗數的正確觀念；如果您已稍有基礎，這本書可以突破研習斗數的瓶頸；如果您自認對斗數頗有心得，這本書可以拓寬您的新視野、提高您論命的層次！


    當您讀完嚴耕的《紫微斗數開運全集》，然後回頭再讀幾遍紫雲先生的《斗數與人生》，您將更能掌握紫微斗數這門千年絕學的精髓！


