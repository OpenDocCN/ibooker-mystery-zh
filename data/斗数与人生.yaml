  md: '強作用」，變成了嚴重的負面結果。


    至於癸亥（一九八三）年、甲子（一九八四）年兩年，只不過他還在艱苦的作困獸之鬥。這種身宮組合，我們以爲一旦再有行運上的忌星連續干擾，由於「增強作用」而來的任何作爲，都會造成與目的形成極大的反作用。因此我們以爲，這是蔡先生事業破敗，在命理現象上，成爲一項不可忽視的重大命理理由。


    再以張克東先生的命例來說（命理分析詳見了無居士著《現代紫微》第二冊），這位以房地產起家，最後又因房地產而破敗的張先生，命座七殺、擎羊在子，爲殺破狼格局，可惜三方四正不見六吉，倒有擎羊、地劫和武曲化忌並會，這是個生性勇猛、無畏不懼、衝鋒陷陣的大殺將格局。他的出身，沒有蔡辰洲先生的家世和財富，但他在事業所表現的才華方面，應該具有他獨特的一面才對，尤其他在事業上所充滿的那一種壯志豪情和信心。當他還在房地產界叱吒風雲的時候，恐怕他的氣魄在同


    行間少有人能出其右。


    這些現象，我們在命宮的組合裡好像很難看出他的命理現象，但若我們改從身宮來看時，我們可以發現到身宮紫微化權使他的「化權」得到有力的強化（天府武曲會合後之作用），也使武曲化忌，再受地空沖擊後，使他以爲任何難關都可以經由謀客'
