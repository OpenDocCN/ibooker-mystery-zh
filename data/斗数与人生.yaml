  md: '差，但若能各探其專長而用，應該是最理想的用人之道。斗數命盤，用以推論命理，正是居於這種趨勢現象的運用，而把已知的條件或假定的因素，輸入命盤，並依理推論而循其趨勢的傾向軌跡。


    # ### (三) 個別差異性


    斗數命盤依出生年、月、日、時辰排定，因此依理論數目計算，將會排出259200個命盤，也就是說，斗數就用這麼多類型的命盤來探討世人的一生命理，比起西洋的十二星座只要十二種類型要來得精確。也有人認爲，從依五行局及出生日演算而定的起紫微表裡，可以看出，在同一五行局裡只要月份相同，出生時辰一樣，日子就算不同，也會有紫微同宮的可能。這種現象特別在水二局裡，除了初一和三十日兩日外，其他每日都是紫微星座同樣地支宮位。其他五行局只是日子空隔較長，亦有相同現象。由於依日子排出的星曜如恩光、天貴、三台、八座，在實際論命時用上的機會不多，因此真正關係大局的命盤，僅約半數。'
  merge: -1
  pgno: 268
- img_proc: true
  md: '對持這兩種看法的人，我們認為都對，只是他們似乎太強調命盤在命理推論上成為唯一的論命條件，因此才有這種命盤究竟有多少個的紛爭。我們卻認為，命理的推論固然必須根據命盤，而依星曜的組合賦性依理推論，但斗數命盤詳列的星曜組合，只是代表這個人的命理因素或命理條件，而這些命理條件或因素，主要的只是代表在命理上的一種類型，和作用上的一種趨勢，至於這種類型，在一個人的一生裡，將會造成某種發展趨勢傾向，應該還有命理以外的條件。而這些條件，無論如何，我們是無法從命盤上看出來的。據說，台灣目前在一個時辰裡，約有一百個男孩以一張命盤代表，五十個女孩另用一張代表（男女行運順逆相反），然後，我們提出幾個很簡單的問題：


    第一，在兄弟或姊妹的長幼排行都一樣嗎？


    第二，出生後在第一大限間的健康都一樣好嗎？


    第三，他們的父母和家庭背景都很類似嗎？'
