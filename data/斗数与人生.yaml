- md: '硬板板，井必須一一解決的現實問題。否則儘管你的意願再大，你在斗數命盤上的命理條件再好，也將難能讓你如願。


    幾年前，我就碰過這麼一個命例：一個矍矍斗數的青年，也曾經得遇高人以斗數祿命法指點，使他對服完兵役後接着放洋留學充滿信心。因此在他服兵役期間，就處心積慮地準備服完兵役後的出國留學。但經過一年多，不曉得寄出多少封學校申請函，仍得不到一份接受申請的入學許可證明。在眼看着學期開學在即，而仍無著落時，找上了我。他問我為什麼在斗數行運上如此大吉大利的現象下，他竟然得不到一所學校的接納？到底是斗數理論有誤或是為了什麼？記得當時在詳談之下才知道，他老弟在大學時，憑着他的小聰明稀里糊塗地混過四年，因此成績不怎麼樣，只差沒補考和重修。而他所申請的國外學校，却都是頗具名氣的大學，所學的科系也是頂熱門的，因此他怎能憑他那份破成飆單，申請得了入學許可證，甚至還要帶有獎助學金？我不知道，他是犯了一般年輕人所共有的無知毛病，或是受了斗數命理之誤，以爲他既然通過了所有留學測驗，入學許可兼獎學金便是垂手可得，沒想到事與願違。


    後來經過我的建議，要他改向比較藉藉無名的大學發函申請，能有獎助學金最好，沒有也無所謂，至少他的家境可以勉強寫他解決學費的問題。秋季班來不及，春季班應該可以趕得上。現在我只記得這個年輕人當時略帶感傷地回去，但就在那年年底接近春節不久時，我突然接到他辭行赴國外留學的電話，井感謝我，在他迷惑時所給的指點，使他終能達到出國深造的希望，我除了祝福他順利成功之外，也深以能給他適當的建議，而感到安慰。


    命理談的是最現實的人間事，因此命理的推演和研判，不能光憑命盤上的現象而作純理論的高談闊論。一個人究竟能否成龍成鳳，除了命理上的因素以外，我們更應該考慮到現實層面的條件因素。命理因素固然重要，現實環境也是頗具關鍵性的重要條件。我們不能說，在當今之世，一個大學生只要行限上都具有利於出國留學的良好命理條件，只要他想出國留學，都可以辦得到。因為這種事不能單憑個人的條件和意願就可以達成，他所處的社會背景，和所要去的地方，往往也是一個主要的關鍵。


    諸位大師們，當你成天面對著形形色色，進門求教的善男信女，談及無奇不有的衆生相時，你曾否撫心自問，你對這個花花綠綠的大千世界的所有凡塵俗事，究竟了解多少？你究竟能談出些什麼？人生一輩子的疑難雜症并不是憑你一句諳事大吉、凡事大凶，就可以了結的。


    ## 離鄉背井

    [命例]


    一個人一生都住在老家過完一輩子，或是年輕時就離鄉背井覓跡在外，往往有他時代背景、社會因素和家庭條件的限制或促成。大體上說，在農業社會時代，由於人們的一種守成的想法，造成一般人普遍存有安土重遷的觀念。時至工商業高度繁榮發展以後，不但由於謀生的需要，也由於交通的發展與便捷，一個人他可能憑藉他的意願和條件，到人地兩疏的異鄉別地去謀求發展。


    但是我們在家多離鄉背井的命例當中，發現到，並不是人人都能飛黃騰達，而發跡於遠郡。有些人口在落魄他鄉，無顏回鄉再見家鄉父老。當然也有些人的確如同蛟龍歸大海，發跡得志於他鄉。在同樣的時代背景裡，同樣是異鄉人，竟然會造成如此大的不同結果，我們從斗數命理上發現了他們不同的個別條件和命理因素，可能就是造成他們所以有不同結果現象的原因。


    這個「發跡於遠郡」的命例，是我學習斗數命理時，同門拜師的師兄弟，亦是芸公的第二公子。他於丁卯大限末，和家人移居美國，在歷經十多年後，不但事業有成，於經商之餘並爲國直勞，擔負僑務委員職務，每次樸樸風塵來往於台灣和美國之間，無不在盡其想爲國家多做點事（師弟的話）。


    記得還同在老師門下學習斗數時，有一次老師還特別以師弟的命例作爲說明，這種命格的人，將來得機緣出外闖蕩天下，必能鴻圖大展，富貴揚名。當時師弟全家尚無舉家移民的打算，沒想到事過廿多年，師弟亦移居美國十來年，已開創出一番事業。如今年屆盛壯之年，正當英年有爲的時候，來日事業的鵬程萬里，應當指日可待。


    葉師弟命座天府陀羅在丑宮昌曲輔，身在巳位，爲天相，乃加重的府相朝垣格。命爲天魁、遷移天鉞，坐貴向貴。遷移宮七殺井廉貞化祿，嘉會權科爲三奇，雖有地劫地空沖動，但會左輔和右弼，使能於助益中得扶持，亦每於變動中求發展，退


