    (六)入世


    記得在一九五九年暑期，我曾參加農復會（全名爲中國農村復興聯合委員會）由中華民國和美國聯合組成的一個機構，利用其撥基金來協助發展台灣的農業。台灣光復後的農業發展得自這個機關幫助很大，這做稱早已助成身退，不復存在），委託我們學校系裡（與大農經系）所作的一個農家經濟的訪問調查。這個調查的目的，是爲了了解當時農家的人口組成結構、農業經營狀況、農家經濟收入，舉凡足以顯示當時台灣農村農業活動，和農家經濟有關的內容，都包括在調查內容裡。農復會希望藉著實際的調查，用計以訂定有效發展台灣農業，促使農村經濟繁榮的有效政策。很多屬於社會科學層面的學術研究，或制度辦法的訂定，往往都透過這種訪問調查彙集的資料，再加以統'
  - '[PAGE 281]


    計分析和研判，來加以了解，作學術理論研究的參考，或政策擬定的依據。


    在學術研究方面，有光對純物質研究和由人類行為發展而來的學術研究，所採行的研究方法，由於本質的不同，因此所採用的方法，並不一致。前者如物理與化學，研究人員可以整天躲在實驗室裡，藉著精密儀器反覆實驗的研究；而後者除了學理上的推論以外，還需要透過實況的調查了解，才能證實在學術推論上的正確與否。因此，這種調查上的空隙了解，往往對這門社會科學的學術研究，扮演著效用功能重大的角色。


