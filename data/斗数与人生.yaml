- img_proc: true
  md: '# # 斗數的學習

    由於老師並非以命理謀生，更無開班授徒的打算。因此當時授課雖發有提綱領的一份講義，但似乎都沒有超出日後在坊間看到之斗數所例述的賦文一類的內容，反而在活潑應用和涉及斗數在五術運用範圍上的原理與法則，內容之廣泛，幾乎將五術兼容幷顧，而不是純以斗數談命理的課程。但是徒弟們毫無命理根基，程度太淺，所以這個課程前後開了將近三年。據老師的說法，三年的時間其實才算勉強把斗數的基本道理作了最初淺的交待，而非已把這門學術徹頭徹尾地講完，徒弟們雖歷經三年的聽課並不意味著在紫微斗數方面已能了解多少莫說登堂入室而能窺其道理於萬一充其量也只能說在斗數這門學術上有所啓發罷了。

    記得老師曾經意味深長的比喻一個夠格的醫生儘管在受滿七年的嚴格醫學教育後，並不表示他在學校畢業後就能馬上開業行醫他仍須經過一段期間的在'
  merge: -1
  pgno: 27
- img_proc: true
  md: '**職臨床訓練和經驗**，才能勉強的獨立診病行醫。至於成爲名醫者，往往又需加上十幾廿年之久的長期行醫和繼續不斷的悉心研究之下，才能有成。這也是醫生遍天下，名醫沒幾人的原因。用以療治病痛的醫理如此，而用以探討人生百態的命理，更涉及萬丈紅塵的衆生相，其錯綜複雜，何止於恒河沙數？就算用盡八萬四千法門，也不一定能洞徹得了個中奧秘。因此老師曾經不止一次的說過：『起碼要詳盡推敲過五千命盤的經驗』才能勉強夠格爲人論命。


    廿多年來，我也數不清究竟看過多少命例，但一直仍覺斗數具有無窮無盡的奧妙，也許因天生愚魯，或許用功尚有不足，因此迄今我仍不敢說我已經通過了何老師一再強調的五千個命盤……


    **或許是老天垂憐**，在開始拜師學斗數後的日子，由於工作環境的逐漸改善，個人的家庭生活亦趨於穩定，至今雖僅足溫飽，但對一個鄉下孩子來說，能在這十里洋場似的大都會，懷息安身，已經太感謝天地的厚待。由於個人生性淡泊，因此在工作之餘，晨夕不輟地翻閱老師的講義和聽課的筆記，拜藉著親朋好友提供的生辰資料和事跡反覆研討推敲，那股狂熱的傻勁至今絲毫不減……'
  merge: -1
  pgno: 28
- img_proc: true
  md: '在廿多年前，斗數書籍除了那本翻印錯誤百出的《紫微斗數全書》以外，幾無另書可作參考，老師又遠住大龍峒，雖有公車可以輾轉來回，但往返費時，加以當時尚無電話可以事前約定，因此很難每次都能順利碰面請教，以致常有一個命盤苦思數月而不得其解，那種挫敗的沮喪，真不足爲外人道，因而也曾多次想要放棄，以撫心中的折磨。


    記得當時孩子太小，而我却在下班回家後，除了吃飯之外，全心於斗數，忽視了幫忙料理家事，以致內人在激烈抗議無效之後，御狀告到遠住鄉下的兩位老人家，使我受到兩老的責難。我很羨慕了無居士，能得夫人經常半夜爬起來燒水泡咖啡，給他精神上的支持；感耕得夫人的精神鼓勵，文昌居士更得夫人精神以外的實際行動支持；很爲他們慶幸。我的確很羨慕他們，但我除了爲我內人的「遇人不淑」而感到抱歉外，絕不敢心存絲毫怨言。


    由於工作上的方便，常年出差，幾乎跑遍全省的大城小鎮，因此每當看到報載的斗數命理廣告時，必定尋機利用下次出差之便，前往算命，以藉著高人論命的機會裡聽聽前輩的高論。若以就近的台北來說，只要有門路可尋，遲早必登門討教。'
  merge: -1
