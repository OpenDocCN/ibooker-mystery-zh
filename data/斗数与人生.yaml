    來作事後，除了花自己的薪水以外，每年差不多還花上家裡的四、五十萬元。彭老

    板這才知道他表親寧可讓他孩子賦閒在家白養他的原因。

    由於他這個衰婭已同無業遊民，但因家裡富裕，尚無凍餒之苦。不過這個時代，

    一個年輕人已不能單賴家裡來養活，如今年紀已卅六歲，也因無業而娶不到老婆。

    老彭問我說：「他這個人到底是什麼命？有那麼好的家世，竟會搞成這種地步？」


