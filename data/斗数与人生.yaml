  md: '涉及的友人到舍下聊天，彼此交換斗數命理上的看法。由於這些朋友深知我對斗數

    命理一直採取一種學術研究的開放態度，因此一有心得的時候，很樂得光臨舍下品

    茶、談談他們新發現的高見，我也爲足不出戶而能聽得一些命理奇聞感到高興。

    由於這位年輕朋友對他所學的斗數，自負到幾乎旁若無人的地步，往往在口沫

    橫飛、高談闊論的時候，會令不懂命理的人認爲這個年不及卅的年輕人，命理的修

    習已到了道通天地的境界。我爲了挫挫他的銳氣，希望他別自信太滿，以免走火入

    魔，而妨害了他在修習斗數命理上的正確發展，因此在書櫃上，找出了這個己卯年

    （一九三九）一月十四日子時生的男命斗數盤來，要他針對這個命例在命格及財、官

    三項上的得失發表高見。


    當他接過命盤，喵過幾眼後，滿似胸羅萬機、智珠在握，朗朗上口的說道：「此

    人命身宮七殺座寅廟旺，紫府在中，爲七殺仰斗格，旺地逢紫微加吉，有生殺之權，

    武職最利，加左右昌曲魁鉞會合，極品之貴。本命六吉已會其半，雖不極品，不中

    亦不遠矣！」看來這個年青人，對星曜與格局賦性，背得滾瓜爛熟，難怪他那麼信

    心十足。接著又說：「由於命身同在寅，爲四馬之地，紫府在遷移宮，佳會魁鉞，'
