    ## **斗破**人生 · 106·

    [再記]在此祝賀楊醫師和許小姐即將文訂之喜，並預祝他們的百年好合。又本書所提及中西口袋理論點，蒙楊醫師指正，特中謝忱。


    ## 子女宫


    「不孝有三，无后为大」这种重男轻女的观念，不仅牵涉到宗祧上的香火问题，也多少带有家庭功能上养儿防老的实质考虑。因此，子女宫位在古传的命理以及实际论命上，仍像他宫位一样的重要。儘管近代由於宗嗣必须有以後继的观念渐趋淡薄，以及老人退休制度逐渐完备，不必再有防老的顾虑，使得近代的家庭不再存有多子多孙多福气的想法，而代之以重质不重量的观念。


    但这并不意味著一般家庭不再重视生男育女的问题，这正是当前医疗科技上，一方面千方百计地在想尽办法使绝大多败的人能少生孩子，以免人满为患；另一方面却也在竭尽所能，想尽办法为不少结婚多年而一直不育的夫妇，解决生个一男半女的问题。毕竟，在一个家庭裡，就算什麽都有，若是没有孩子，似乎就不像个「家」，正如有女难有子，才能变成个「好」字一样的道理。因此，无论如何我们可以肯定，


    在人類社會裡，只要有男女婚姻和家庭制度的存在，生養孩子的事，應該是絕大多數人所關心的。當然，在命理的解說和探討上，仍是值得深究追源的一項。


    從生物學的觀點來說，男女之間由結合而生子的事，必定由男女之間來共同完成，女人生小孩，不可能像植物一樣可以無性繁殖，以枝條來衍生，也不像某些低等生物可以單性生殖（如馬齒莧植物的紅蜘蛛），甚至以單細胞分裂來繁殖的某些原生動物。這種現象不是什麼大道理，而是天地間一種共知共識的事實。


    但是一般的論命者，當談到子女宮時，卻都單憑著一張命盤高談闊論起來，以為只從這一張命盤就可窮盡天機。有無子嗣、能生幾男幾女，只要命盤在手，事關子女的一切，全部可以鐵口直斷，必定了無疏漏。那種充滿權威性的口氣，會使人懷疑他就是主宰生男育女的神明的化身，他（她）是註生娘座下的使者，他無視於生男育女之事，必須男女雙方在生育的機能上能夠健全才能辦到。


    夫婦之間，只要任何一方在生育的生理功能方面有缺陷，想要得個一男半女，就變成可望而不可得。在古時，人們對生理，特別是涉及生育生理功能的知識，還認識不多。但他們也知道，一旦元配夫人在婚後多年不育時，會再找個女人來完


    成傳宗接代的大事，這種事就是在當今的社會也屢見不鮮。元配夫人的不能生育，並不意味著責任全在女方，男方同樣也有可能造成不能生育的生理缺陷。因此生男育女之事，我們仍須考慮到單張命盤以外的其他因素或條件。


    生育這麼一回事，跟天之間的很多事一樣，決不會只如斗數古論命法則那麼單純、簡單，也不是你我在專門知識上的淺薄所能充分了解。我們不妨看看，對於「不育」的原因，以當今婦產科醫師的專業知識，究竟有些什麼精闢的高見。


    民 76、6、9 婦產科醫師詹益宏在民生報發表的專論「開玩笑，我們夫妻感情好得很，怎麼會不合呢？」


    這是筆者在替一對不孕症夫婦做完「同房試驗」，向病人宣布不孕的原因是：由於太太的子宮頸分泌物與先生的精蟲不合時，那位先生的反應。


    另一種「夫妻不合」


    所谓子宫颈的分泌物与先生的精虫有敌意，或者有抗凝，使得先生的精虫进入子宫腔内时，无法生存，因此无法成孕。并不是指夫妻之间的感情不「和」。

    根据大多数医师的经验，属于这种情形的不孕症，大约佔了百分之五至十五。因此一对夫妇如果做过各种检查，仍然找不出不孕的原因时，必需安排做「同房试验」。

    「同房试验」是夫妻同房数小时后，到医院由医师取出子宫腔内的精虫，在显微镜下观察它的活动力，如果多数精虫的活动力良好，即表示没有这方面的问题。反之，如果所有的精虫都不动，或只有少数几隻具有活动力，即表示情况不好。

    这位检查通常选择在排卵期当天、或前後一天，分泌物较多的时候做。如第一次的检查显示正常，医师通常会安排再做一次；连续两次检查不正常，医师才会正式宣布不孕的原因是属于精虫与子宫颈分泌物不合。


