    ## 斗數的新命理觀（代序）


    紫雲


    斗數命運是中國古傳衆多命理學之一。從文化和歷史觀點來看，一種學術能傳延千年而不至湮沒，應該有它的存在理由。特別是在近代文明對凡事物的探討，一切講究科學方法和拿出證據的今天，對於古來國人就以形而上的玄學來看待的斗數命理，不但沒被摒棄，甚至還給予相當份量的肯定。


    雖然這門學術，古來就進不了大雅之堂，但我們却也發現到，民間廣爲流傳。特別是近年來，參與研究的人，已不再是殘障朋友或販夫走卒，多的是學有專長、擁有學位的高級知識份子，利用命理論斷，作爲何去何從的資訊指標。這些斗數研究者當中，不乏身居社會要津的高官顯要和事業有成的企業領導人士，並不顯然都是府府豫豫的社會大衆。


    我們當然不能以很多人參與研究和運用，就對這門學術作全部的肯定，最重要的還是近幾年來，在無數接受現代高級知識訓練人士的鑽研以後，已經開始發揮它的真實功能。把這個古傳的玄學落實到正如其他社會科學一樣的，可以經世致用。


    我們發現這套古傳的命理學，在整個理論架構上以及其所用的推演法則上，用來詮釋人生命運的現象，扮演著一種其他科學無法能及的特殊功能。因此我們可以肯定它的確有存在價值和必要。


    不可諱言，這套命理學由於古傳典籍太少，甚至所有的文字，幾乎簡潔到必須推敲才能了解它的文義。特別是對一些理論文字的敘述和一些關鍵性的文意，因缺少實例的引用使人讀來如墜五里霧中。比如，命宮謂之爲先天、身宮謂之後天，究竟什麼是先天？什麼是後天？根本不加闡釋。又如「七殺廉貞」，既可以爲一積富之人，亦可以一路上埋屍」。類似這種語焉不詳的文字，都讓人覺得這些古傳典籍簡直成了看不懂的有字天書。


    也許人生本就充滿著太多的詭譎離奇，使得用以探討人生際遇的命理之學，也因之而帶有太多不易了解的神秘性。這種神秘性特別在我國自古以來的那種既敬又畏天的社會意識裡，人們原本把人生的一切委之於一種天命的安排，因此更加深了命理的神秘化。這種神秘化，對斗數命理不但沒有提高它的學術地位，甚至嚴重的阻礙了它的進步。因此我們很遺憾的發現到，打從斗數訂定命理法則的一千多年以來，斗數學術不但未有顯著進步，甚至變質到荒誕無稽的地步。


    斗數命理，所以會如此，也許與它的特殊功能有關。但我們以爲最主要的，還是在於一種時代文化背景的有以使然。這種時代的文化背景，一直到了近代，當西方文明東漸，西方文明那種凡事寬事求是、一切講求理性，以及拿出證據來的學術理念以後，才使斗數產生一種衝擊，使鑽研斗數命理的人，不能再抱殘守缺，泥守舊觀念，而必須採用新觀念和新方法，把時代新知融入古傳的斗數理念中，再用以重新詮釋斗數命理在實際人生，可能產生的應用和價值。


    斗數命理對人生的探討，雖然不能像自然科學一樣的拿出具體物質的證據來，但人生的存在本是一種「事實」，而「孩子的遭遇也是一種「實際」，命理既然用以探討人生的這種「事實」和「實際」，它當然也就有它的道理存在，決不能憑空遐想和臆測。比如說，一個小孩，爲什麼會有他的「存在」？以及他存在以後所表現出來的種種「事實」。在古人也許只知道因爲有其父母，才會有這個小孩，至於爲什麼會產生他種種存在以後的事實？就茫無所知。但今人已經可以從生理學和遺傳學，了解這些「存在」和「事實」的原由。比如這個小孩是個健康活潑、智商很高或是先天殘障、智能不足，現在我們已經知道爲什麼會如此，但古人却始终不知道究竟爲什麼？他們會認爲全部都是天命的安排。因此近代人們探討命理，由於具備這種文明新知，已經不再爲這些「存在」和「事實」感到迷惑。


    因此我們以爲一種學術，只要它確是有道理，必能透過現代文明的新知來加以剖析闡釋。任何一種學術，只要能以文明新知加以實證，並受嚴格考驗，它就能彌久長新，而放之四海皆準。我們以爲斗數命理，正如其他的很多近代學術一樣經得起文明的考驗，可作經世之用，因此絕對可以冠冕堂皇的走入殿堂。


    不可諱言的，我個人在斗敗命理的學習，經由很傳統的正式拜師學起，也的確從我老師學得完整的命理法則，但由於這種太過傳統式的命理觀念，使我在最初十年歷盡了千辛、也吃盡了苦頭。好在我還是個受到新文明洗禮的人，並沒有因而爲之氣餒，反而對傳統下的命理，產生根本的懷疑，對於傳統上所持的命理觀點和法則，總覺得無法落實到實際的人生，而成爲具體可用的命理資訊。也許由於長年累和年齡稍長，對人生的體會加深，而在拜師十年後，再度經由老師繼續不斷的耳提面命的教導，才使我漸漸的體會到一個人命運的造成，命理只是其中的一個因素，而不是全部的原由。一個人的命運，除了他所具有的命理因素外，應該還需考慮到他所處時代背景、社會環境、家庭條件，以及個人際遇遭遇。要把這些因素全部合併考慮，然後才能據命理法則分析和描繪出他的命運走向，絕不是傳統觀念上，完全單憑命理因素來決定一切。


    比如婚姻和生育子女，古今以來就差別很大，就是當前因所處環境不同，往往也相差很多。在這裡實行的是一夫一妻制，但在回教國家就不是如此。前人的多子多孫多福氣，今人的「一個孩子恰恰好，一個孩子不嫌少」。這種婚姻和生育的觀念，無不受到所處環境的嚴重影響。特別是在近代人類思想觀念，如同科技進步地在日新月異的變化中。我們社會亦由保守、封閉而變成進步開放。這些現象，也必然衝擊著我們這個社會所有人們的生活。


    以我個人多年對斗數命理學習的了解，命理既然談的是實際的人生，因此命理的道理應該可以用極其常識化和生活化的現象來加以說明。比如說，一個人小時候得到家庭妥善的教养，使他的人格趋于正常，稍大得受正规的教育，使他学有专长，长大进入一个产业发达的社会环境里，应该比较有他立足和发挥的余地。相反的，若他是在一个破碎的家庭长大、从小没得到好教养，使他的人格趋于偏激，以后又没受较好的教育，当他进入社会，他将会无所适从。这种教养和教育，往往是造成和影响到一个人一生的命运走向，我们当然不会以为完全是一种天生注定的命理安排。


    再如以一个已开发国家，人民的高水平教育和高水准的国民所得，来和开发中国家，一般国民的较低教育水准与较低的国民所得作比较，我们会发现，大部份高所得的国家人民，都因为他们有高水平的学校教育（以现在发达的国家除外）。又如，一个国家国民的平均寿命长短，一定和他的生活品质、医疗条件、环境卫生的良劣，有相对性的关联。凡此种种，绝不是单由命理因素所造成。


    因此我们发观到，几乎所有的命理现象都不能排除这些环境和实际遭遇的因素，而这些因素都是一般常识，丝毫不是玄虚不可理解的现象。


    斗败命理，既然不能把人生实际遭遇排除于不顾，以致和实际人生形成严重脱節，因此我們以爲要使命理成爲有用的經世致用之學，就應該採取一種能與實際人生結合的命理觀，才能使命理落實到實際的人生裡。基於這個理由，這門古傳命理就應該從基本的觀念上加以現代化，把時代的新觀念和新知識融入命理中，然後才能以一種新方法來加以發揚光大。若不如此，這門學術將不爲新時代所用，遲早會被時代所淘汰。


    我不知道個人是否由於天資遲鈍，或是因爲用功尚有不足，總覺得自己在斗數初學階段拉得很長。從正式拜師，到我覺得在推演方法上稍微有點譜的時候，已經是十年以後的事。因此我很羨慕那些得秘笈，一眼就可在命盤上窺盡天機的人。在這前十年間，我也曾參加了其他的斗數命理補習班，想藉經九個月，由初級、中級而高級的補習中，使論命功力提到高級境界。但很遺憾的是，我上完所有課程後，論命能力還是逗留在靈竅不開的階段，每當面臨命盤，那種茫然無知的洩氣，真是不足爲外人道。


    如今時過境遷，學習斗數前後算來亦有廿多年，雖然已經略有領會，但我還不知究竟懂了多少，只是使我深深的體會到，命理這種學術的學習和研究，絕對不是短期內所能倖得。


    若容我們不客氣的指出，古傳的命理學為什麼千百年來一直登不了大雅之堂，個中的主因，完全在於學命論命者的一種對命理基本觀念無知和誤解。他們把命理視為一種神仙之學。更爲了提高他們崇高的超然地位，硬是把命理神秘化，讓人們誤認只有他們這羣仙風道骨的神仙人家，才能洞澈人間的天機。因此把一項原本可以爲人指點迷津的談命說理，變成一種高深莫測，又兼莫名其妙的神仙論斷，使人聽來如墜五里霧中，使本可經世致用的學術，變成天大的鬼扯談。


    對於這種命理作用的扭曲，最主要是在於他們的論命，完全憑據單純的命理因素來加以論斷，他們以爲一個人在出生的那一剎那，就已決定了他一生的榮枯禍福。


    他們無法、亦無能力去判定命運的造成，究竟應該涵蓋那些條件或因素？我們很迷惑這些命理研究者的知識水平究竟如何？也許不祇最基本的命理觀念一無所知，甚甚至連人間的基本常識也不及格，因此才會在命理的表現上顯得那麼無知和無能。


    時代在變，社會環境也在變，一個人的生活必然會受到這種大環境變動的影響。每個人有他的家庭條件，也有他的個別遭遇，我們堅信這些因素都是造成命運的重要原因，不光是單憑出生的那一刻時間，而這些塑造和左右命運的因素條件，無一不有其個別的大問題和大學問。


    探討命理，若往這一層面去著想，我們將會發現到命理之學絕對不是一項很單純很簡單的學問。只是學海無涯、人生苦短，我們實在不知道一個人窮其一生去研究這門學術，究竟能在這整個命理的範疇裡了解多少？


    教我斗數命理者何老師，但指引我拜師的是葉禾田先生，葉先生是我們公司的前任董事長，他對我另有結草銜環之恩，如今他已仙逝。在我生平第一本斗數圖籍出版之時，謹以最大的誠敬之心，簡要的敘述葉先生的斗數命理，聊表對他的感激和敬意。其他命盤，我嘗試以另一種不太傳統的新角度來加以論析，以一個命盤談論一個主題。由於篇幅有限，我把主題之外的次要的因素，略而不述，掛一漏萬之處，在所難免，得請讀者海涵，並希前踞和同好，不吝指教。


    一個人當了一輩子的上班族，每天為生活而奔波勞碌，本來不敢心存出書念頭，奈何經不起了無居士的屢次相激，只好硬著頭皮，以口代筆。老來學當鼓吹手，五音不全、荒腔走板，在所難免。好在口述期間得到慈耕多方提供寶貴意見，並得天相出版社編輯部協助錄音和文字整理，還有，謝老板不怕血本無歸的慨允付梓，一併表示感謝不盡。


    紫雲


    於台北寫


    丁卯年（一九八七）戊申月


