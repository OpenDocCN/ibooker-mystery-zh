    開姓名地址，還能落個耳根清靜。


    倒是近年來由於「了無」的囂張氣燄，因此曾經在某個不期而遇的宴席上和幾


    位搞命理的朋友，由命理而談到當前大師級的一些妙聞逸事，由於我的孤陋寡聞，


    我一直不敢置喙，但聽到一位見多聞廣的年輕朋友，帶着幾分興奮的口吻說，他最


