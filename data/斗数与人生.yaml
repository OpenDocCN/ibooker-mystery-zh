  md: '**174**


    照。


    庚申大限中期離開原來服務的公司，出來當老板，代理並進口販賣採茶機。這


    大限太陽化祿，雖落陷地，但有祿存同坐，官祿宮還可算是雙祿並陳，也許正是一


    稱小本經營，但卻頗獲實利的好生意。辰宮會巨門先天化權，庚干也使本命的武曲


    化權，這種先後天的化權，使他好像吃了豹子膽，橫下心辭去職高位置兼薪豐的工


    作，幹起一向生疏的代理生意。


    記得就在他自己當老板後沒幾年，有一次老同學碰面，無意間我提起學命理的


    事，他竟然要我爲他論命談事業。老实講，我當時還在六吉不分、六煞不明的迷糊


    階段，怎麼敢輕易爲他論？於是我就帶他迢迢的跑到劍潭去請教何老師，爲他論命。


    當時，老師的詳細論斷，已不復記憶，但對老師給老陳鼓勵再三的一句話：「連接


    著三十年的大好行運，可以好好的把握機會，將來必定是大老板一位」，至今仍是記


    憶猶新。


