    遷移宮強旺、吉祥，在斗數命理上，是利於離鄉背井，向外來發展的類型。但我們以爲這只是命理因素，若無其他後天因素來配合，也未必盎然。這是一個大體上配合得很好的例子，所以他能得意於他鄉。


    **正是師弟外相厚重，內心意氣風發**，有守有為的主要關鍵與表徵。


    葉師弟約於丁卯大限末和家人移居美國，先住舊金山，於戊辰限上遷往德州休士頓市。丁卯大限，會遷移宮的殺破狼格局，太陰化祿，爲先天父母宮、後天兄弟宮，巨門化忌爲先天田宅宮，似可表示得父兄之助而離鄉背井，移居新大陸。戊辰大限上半限間邊居德州，開始經營餐廳和汽車旅館（Hotel），以貪狼化祿、太陰化權、右弼化科、天機化忌，引動先天遷移宮之吉化，又使大限官祿宮爲双祿所輔，在這一限運接連己巳大限左右，開始步入多元化的事業經營。除原有事業外，另與當地權貴合營日進斗金之休閒娛樂事業，並和多位資金雄厚、別具金融事業經營長才的友人，籌辦銀行。


    末及三年，如今已創下良好的基礎，看來在己巳大限間才是葉師弟一生事業步入巔峯的開始。


    **己巳大限武曲化祿、貪狼化權**，引動先天遷移宮三奇嘉會；再度發揮正面功能。武曲化祿亦爲本限的吉化，特別是上限之貪狼化祿在本限後，再度三合（在酉宮），和化權的吉化作用，形成有利的延綿現象。


    斗數命理上的類似延續吉化，不但是吉象的延續，若再得星曜組合成格並強旺，有使原有事業移限後，更上一層樓的趨勢。


    一九七七年，我曾休假赴美一遊，順道到休斯頓師弟府上小住半月，眼看師弟成天餐廳和汽車旅館兩頭跑。一九八六年再度前往渡假，住在他家，不但住家遷入高級住宅區，各事業單位也有專人負責處理，師弟只做決策和簽字，所經營事業大權都在師弟一人掌握之中。看來本限能會先天破軍化權，和後天貪狼化權（照會百宮），這雙化權的確權威甚大。


    葉師弟能得意新大陸，我們以爲除先天命理因素外，仍有因時代背景及當地社會環境可以任他自由發揮，和家庭條件的充分配合，都有相當密切關係。若缺其一，我們無法想像他這一輩子將有何種命運走向。我想這將是一個沒有人能證實或預知的答案。


    前幾天接到朋友的電話通知，葉師弟最近又有返國之行。十多年來每當他返國時，總會在百忙中，找出時間拜見何老師請安，並通知陳師姊、李師弟和我，碰面敘敘小酌，順便請教和聆聽老師的教益。慚愧的是，我們其他三個師兄弟一直都成白吃客，葉師弟一直都是付錢的東道主。在此人情淡薄如雲煙的社會裡，我何其有幸能遇見何老師，何其幸運地能和他們三位同師門，我想大概不能全部都歸之緣份的關係吧！


    【命例二】


    這位孔先生約在庚寅大限末左右，要我爲他談談他舉家移民中南美洲某開發中國家（西班牙語系），闖天下的事。至今尚記得他當時滿懷雄心壯志，對未來的新天地充滿把握和希望，不過我還是忠告他，由於往後三十年在命理的現象上，並不見得順利得意，因此心理上有個逆來順受的充分準備。能夠順利移民，並不代表出國後的順利成功，言者諄諄，聽者藐藐，我不知他能聽進多少。約在幾年後聽到一位朋友說，老林早已出國，太太辭去學校教職，他把家產房子賣光，舉家移民。


    由於人地兩疏，原來一道移民的朋友，打算以經營農場爲業，後來幾經波折，合伙折了，好在帶去的錢還買下了住用的房子。目前夫婦就在一位早期移民的同鄉工廠打工，以維生計。今年又聽說，由於罹患心臟病，經由住美國的老朋友接濟和幫助下，一個人到美國醫院開刀治療，真是屋漏偏逢連夜雨。異地貧病，爲何歸鄉還情怯？胡不歸！


    斗敗命盤，命身在亥四馬地。天機化權坐命，地空地劫同躉，祿存在遷移宮。也許這是他在年近中年遯離鄉背井的先天命理因素：大限庚寅、太陽化祿、武曲化權、太陰化科、天同化忌，使雙祿輔後天天大限遷移宮（申），再有武曲化權，因此對移民充滿信心。但奈何辛卯大限，雖有巨門化祿和先天天同化祿在大限官祿宮（未），似美景一片，但卻無力承擔。


    尤其壬辰天梁化祿、紫微化權、左輔化科、武曲化忌。大限正座本命化忌，使大限成爲雙忌的「鈴昌陀武」的大凶局。大限雖有雙祿輔官祿宮位（申），但本命已敗，何談事業？再好也只能僞倣做事、領薪糊口爲生；何能奢談什麼事業經營發展？


    癸巳大限又使貪狼化忌，恰如先天廉貞化忌所夾制。限運正入先天遷移宮，這對離鄉背井的人有如落井下石。


    這種先天命格既不強，後天限運又欠佳的人，除非靠有大財力到國外當寓公；否則怎麼單憑赤手空拳打出名堂來？實在不知道這個到底是咎由自取，或是造化弄人？


    ## 僕役宮


    在斗數十二事項宮位中，這個爲遷移宮和官祿宮所夾的宮位，是近二十年來學習斗數論命學的人，所最容易誤解和誤用。早期的典籍，註明是奴僕宮或僕役宮，但近年或許由於某大著作的更改爲一交友」宮，再由這本口的暢銷，因此在斗數界很普遍地跟隨着沿用起來。甚至以爲，在人樹高張的今天，人們不應再存有什麼主仆的觀念，也正應上了這種觀念不洽、理念不明的錯誤，導致斗敗命盤上一說到人際關係時，不管兩者之間的關係如何（六鼠除外），一概以一交友」宮來論定，以一朋友一就是家門以外所有認識人的總稱。雖然我們可以同意這福泛論式的一般說法，但用在斗數命理的推演上，我們卻不能苟同這種魚魯不分、馬馮不別的胡亂歪理。這不但犯了以文官袋之弊，而且也扭曲了斗敗法則在這個宮位上的功能本義。


