  md: '我們且把六親及血親、姻親，甚至義結金蘭的異姓兄弟這些具有親和情的人際關係排開不講，純粹以除了上述這些人以外的所有認識的人列爲朋友，必須加以關係上的分類。老陳是我從小的玩伴、求學的同學，出社會後除了純友情外，別無利害關係；老林是我大學時高兩班的學長，十幾年後，由於諸事順遂，現在變成我職業上的頂頭上司；老李與我同期，現在服務同機構，擔任與我相同級職的單位主管；小張是晚兩年的小老弟，現在擔任我職務上的助理……。這些人，在下班之餘也許無大無小的稱兄道弟，到酒廊喝起花酒，可能花樣百出，胡鬧在一起，早忘了白天上班時的身份地位和工作煩惱。我和所有同在一個辦公廳上班的人，在玩樂場所，不爲公事應酬而盡興歡樂的時候，他們和我的關係如同我和老陳一樣。但當上班工作時，就彼此身份分明，再不能涇渭不分，否則就擾亂了公事和人事管理上的制度。


    在這些人之間，常依斗數法則推演的時候，只有這個當我助理的小張，才能列入我的斗數命盤上的「僕役宮」，其他人不是我的上司就是同等職位的同僚，豈可淪入這個帶有「主」「從」意味的「僕役宮」？儘管現代職務上主從關係的性質已不同於古時富貴大戶人家的奴婢或管家用人，但彼此身份帶有主與從的本質仍然存在。'
