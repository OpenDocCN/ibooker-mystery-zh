  md: '貸，也就是憑他在銀行已建立好的信用關係，大借其款，再以民間的高利貸出借，在轉手之間，每個月的利息差額不少，可算讓他賺了不少利息錢，而他的貿易公司在當年也跟台灣很多不明就裡的小貿易公司一樣，以爲在省本多利之下，以口\A甚至口\A二百二十天出口，都可以跟北非洲，以爲開到金礦的奈及利亞，作起出口生意來。金額之大，令人咋舌。萬一對方進口商的信用出了差錯，他就算買盡全部家當財產，也會吃不了兜着走。


