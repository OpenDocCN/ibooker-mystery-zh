  md: '- 273 -

    斗數命理的本質

    主，婚姻的結合是一種父母之命、媒妁之言。生兒育女，無不抱持多子多孫多福氣的觀念。大部份的人，一輩子很難得走出老家的方圓百里，老家是他一生的活動世界。但現在和以後，你我和你我的兒孫們，已都可以有千百個理由，在每個人羽毛既豐的成年後，千方百計地離開老家，獨闖世面，而不為老家所困。因此一個家庭裡的孩子們，一旦長大後勢必振翼飛去，從此任他海闊天空。


    職業工作可以憑自己的意願和才能去任選，婚姻亦多在兩性相悅下而結合，生男育女也代之以「二個恰恰好、一個不嫌少」的重質不重量的觀念。人們這種與往昔截然兩樣的生活表現和方式，正是由時代所造成，因社會背景不同所促使這種由社會環境變遷，而造成對一個人一生的影響，絕對不是生存在當代社會裡的個人所能抗拒和改變。


    在老爺爺的時代，他可以單憑祖宗產業和家世的庇蔭而優閒安逸地過一輩子；但現在就須憑據個人的才能和努力去謀事創業，否則將難以謀生。這兩種不同背景下的社會環境，所造成人們生活層面的差異，在斗數論命上不只重點不同，十二項宮位的探討和訴求也都不一樣。以婚姻來說，老爺爺時代只要他高興也能娶得起；'
  merge: -1
  pgno: 273
- img_proc: true
  md: '他 可以 同時 娶 幾個 老婆，一般來講，婚變情形不多見。但你我現在必須守着一夫一妻制，而且婚姻多有不甚穩固，不再像以前的「嫁雞隨雞、嫁狗隨狗」，而是一旦認為兩情綠盡，就可以分道揚鑣（基於創業，不一定再全賴家業和祖蔭，憑的是個人的才華能力，以及因緣際會）。命理上，千古以來探討的也許離不開妻、財、子、祿，但這些事項古今以來，在實質上和形態上已有太多和太大的變化，因此我們在斗數命理的闡釋上，必須基於時代的現實社會背景據以演繹，否則人家將以為，你是在談老奶奶時代的往日瑣事。


    社會環境不但因時代不同而有所差異，就是同一時代亦會因地域不同，在生活的方式上、在思想觀念上、在社會習俗上，亦會有相當的差異性，若再加上政治典章制度的差別，那人們一切活動方式和生活的訴求，相差更多。就以當前散居在全世界的中國人來講，由於所居住的社會環境不同，儘管外表都一樣，甚至可以相通的北京語對談溝通，但我們可以肯定認為，在不同居住社會環境的不同中國人，每個人對於人生一輩子的很多事體，不僅想法不一樣，處理的方式亦必不盡相同。人不能離群獨居，因此他的言行思想和觀念，必受他所處的社會環境所影響。'
