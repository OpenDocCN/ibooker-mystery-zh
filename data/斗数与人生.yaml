  md: '事業經營。由於長袖善舞，加以經營得法，在癸未大限著實賺了不少（癸未大限，使先位天田宅宮皆化祿，廉昌財星）。有錢人家，不會像上班族，就算聊有餘錢，亦必視之如寶貝的存進銀行，以保萬無一失。但作生意的人，就是懂得生財之道，知道如何來運用有餘的資金以錢滾錢。陳女士也深通此道，因此就在癸未大限的末期幾年，開始把剩錢借給經營大買賣的朋友週轉融通，由於利息優厚，朋友又殷實可靠，樂得她一有餘錢就往那位朋友放，因此得到不少利息。


    直到一九八四（甲子）年初，也就是壬午大限的第一年，由於一個命理大師告訴她，大運行入壬午限後會大破財，但是並沒說出爲什麼破財、爲何破財的道理和現象。後來經人介紹找上我來探求破財的原因，我才告訴她，假使她目前有錢借人生息，又從癸未大限出借，而延續至今，即將「劉備借荆州，有借無還」，最好收回。


    她告訴我，大概從一九八○（庚申）年起，每年都陸續借錢給同一位商場的好朋友，由於佢用好、招牌又大，因此近一兩年又增加了不少金額。她又說，這位朋友小她六歲，由於雙方家庭誼屬世交，從小就親暱地喊她大姊長大，所以她信得過這個人。'
  merge: -1
  pgno: 195
- img_proc: true
  md: '經過我依理依實的推論，肯定地告訴陳女士，她的破財必將應在今年，同時也一定應在這個喊她大姊的殷實商人上。遺憾的是，我的依理推論，並沒得她的採信。


    就在年中左右，有一天我在辦公廳接到她有氣無力的電話，才知道她幾年來的積蓄，果真被這個喊她大姊的殷實商人倒閉一空。


    我們從她的大限運程可看出被倒債的現象和原因。


    第一，先天財帛宮甚爲佳美，福德宮武府右弼旺地，三方又會合佳美的星曜，這是善於理財、又生財有道的類型組合，一旦有餘錢，就不會把錢呆板地存進銀行去生微薄利息，還得扣繳所得稅。


    第二，癸未大限和她先生經營事業賺了錢，再加上原來就富有，足以讓她發揮生財有道的潛在能力。


    第三，當壬午大限時，她的先天財帛宮爲雙祿所輔，將極度發揮出她生財理財的才華來。因此當流年行入庚申（一九八〇）年後（癸未限後半運），就逐漸進入壬午大限運勢，借出去的錢，一年比一年更多。


    第四，當癸未大限時，已先引動貪狼化忌在前，待壬午大限後再有武曲化忌來'
