- img_proc: true
  md: '但我也从此沦为有其名而无其实的一家之长。我不知道追究竟是我命中注定，或是因我未经配八字和择取黄道吉日结婚，而招来的咎由自取？由于这段终身难忘的婚事，使我想起了自古以来，中国人在娶儿媳与选女婿时，都慎乎其事的请算命先生配婚的事，如今我已不再排斥命理之说，因此亦就觉得传之千古的婚配，应该会有他的道理存在。


    因此就把桌上存放多日的四个生辰资料排出命盘，试看看能否从以一对三的命盘中看出什么端倪，终于在几个夜晚的绞尽脑汁、搜索枯肠之后，把三个女命和男命在命理上的相配得失，扼要的写出，并在一个礼拜天约好何老师，带着命盘和论点择要，直赴剑潭（何老师已退居），当面聆聪教益。经过老师审阅当面呈上的择要后，在各个命盘就配婚方面的特异差别略有补充外，认为我那份择要尚称合理，不但没有违背斗数原理法则，并把婚配的要件全部考虑上了。


    经过老师道这么一番话以后，不但使我能向族亲交差，甚至从此导引我由配婚的道理，进一步思攷斗数命理在一般人际关系与六亲缘份上，互为因果的关键。进一念之间，开阔了我在斗数命理方面的一个新契机，我不敢学著阿姆斯壮一脚踏上月'
  merge: -1
  pgno: 60
- img_proc: true
  md: '**球時的那種豪言壯語**——這是他的一小步，卻是人類的一大步。古希臘物理學家阿幾米德，有一天洗澡，身浸浴缸，看到缸裡的水滿溢而出，忽然忘其自身裸體，狂奔衝出戶外大喊：「我發現了！我發現了！」那種渾然忘我的喜悅，決非局外人所能體會；一身泡浴缸水滿而出，這是稀鬆平常的現象，但是阿基米德石光火花的靈機一動，卻悟出了物理學上比薩定理的大發現，奠定了往後物理學在相關學術的大放異彩。在斗數方面的這一項領悟，雖然我不敢和這位千古的大師和太空專家的大英雄


    **比擬**，但歡愉之心却也離形之於言詞。


    斗數涉及人際關係方面的探討法則，個人經過一段不短時間的推演後，又透過同好者不斷的嘗試運用，共同發現到這些原理法則確實有相當程度的可用性。[人事]


    **無常**，畢竟和具有其固定性和必然性的物理現象有別。因此，從事斗數理論和實務的探討，我們不能以自然科學的尺度來等量齊觀。命理之學若一定要分門別類，也只能列入極其廣泛的人文科學；而在人文科學的範圍裡，古今以來似乎只有學說上的主張，而沒有類似物理化學方面的那種頭摸不破的定律存在。


    **緣起緣滅**，因果循環。其實世上每件事物的存在，自有其存在的道理或因緣。


    ·61·


    啟發和頓悟'
  merge: -1
  pgno: 61
- img_proc: true
  md: '大至宇宙星雲的運行，小如個人一生的得失遭遇，無不有其存在與造成現象的充份理由。從命理的法則來說，我們不可能憑空的光依一個人的八字或斗數命盤，就高談濶論，大言這個命造必定如何。生辰資料依程式所排出來的四柱八字或命盤，充其量只能說，它是代表這個時辰出生的人在命理上的所屬類型。


    若以聰明才智為標準來劃分，也許硬是可以分出甲乙丙丁等級的不同差別來，正如近代測定學童的智商，以因高智商或資賦優異而施以特殊教育，來造化特殊人才。在教育上這個方式不失爲一個很理想與可行的途徑，但若我們從教育的另一個觀點來觀察，一個人從小雖然具備有極高的智商、極佳的優異資賦，並施以教育或訓練，也只能代表他們領悟力比較好，因此學習能力比較高、比較快，但並不意味將來他們在任何一方面或特殊的某一方面，有必然的某種界定以上的成就。因爲人畢竟是有生命的個體，一個有生命的個體，在他一生的過程之中必定會受周遭環境的影響。


    數千年的老神木，它可以傲視人間千百世，但并不意味着，同科同屬同種的松柏，不管生長在什麼環境都會成爲屹立千古的老神木，這也是老神木珍貴的地方。'
  merge: -1
  pgno: 62
- img_proc: true
  md: '一個人打從呱呱墜地開始，從幼而小，從小而大，在整個成長過程中，可遇的周遭環境，比起一棵老神木要複雜多了，而不是只關係著土壤、氣候、溫度、濕度、沒遇到特別的天然災害，就有可能成爲千年老神木。我們意不在以生命的長短和神木來相提並論，我們只是用以比喻一個人一罐子的成就，除了大自然的環境和神木有某些共同點之外，還參有更錯綜複雜的、屬於人類特有的時代與文化背景。在同一地區，由於時代的不同，人們所接觸到的，不盡屬於大自然的條件，環境的不同，人文方面差異更大；就是在同一時代裡，更因地域的相異，而有截然兩樣的人文和自然環境的差別。就是以隔鄰而居的張林兩家，儘管大社會的環境完全相似，却因家庭背景的淵源不同，我們自難肯定張林兩家有必然性的家庭狀況。


    若再以遺傳學上的了解，儘管同父母所生長的子女，每個子女亦會由於遺傳因子不同，而造成資賦的個別差異，何況，後天又有屬於其個體的特殊遭遇！因此，我們很難斬釘截鐵地說，只要具備那些條件，一個人便會變成怎麼個樣子。我們只能說，一個人若具備了某些條件，很可能會變成怎麼個樣子。李政道、李哲遠這兩位爲中國人揚眉吐氣的諾貝爾獎得主，我們知道，他們的兄弟也都在學術界頗負盛'
  merge: -1
  pgno: 63
- img_proc: true
  md: '- 64 -


    名，但我們似乎很難冀求他們的兄弟亦都能夠個個抱個諾貝爾獎回來。我們認爲這不全是資賦的問題，更應該重視的是他們各人在學術上所走的路線與環境的差別。


    尤其是個人學術價值觀上的認定結果。


    楊傳廣和紀政在田徑方面臻於國際水準的成就，我們也可以作比較上的幾種肯定。首先，他們必須具備田徑運動的優越體魄；在適當的機會接受最好的訓練；同時，他們也必須具備一般成功者不可或缺的毅力與全力以赴的、堅苦卓絕的意志。


    這些條件缺一不可。我們不能夠說：「在衆多的中國人口裡，只有他們兩個夠得上資賦優異。」運動員誰不想在奧林匹克揚名立萬？但能因緣際會集一切必要的條件於一身的，到目前為止，僅見的只有他兩人。


    這可以說明，事體的存在，必有其存在的必然道理；而這些必然性不管在同樣的一個人、或不同的兩個人，往往由於些微的差異而造成截然不同的結果。若以人生與一切事物的因緣起滅，或因果循環而言，何者是因的起？何者是緣的滅？那件是因？那件是果？往往是一體的兩面；很難有明確的劃分。


    也許起與滅、因與果之間，根本就存著一種相互循環的關係。儘管如此，但從這個循環的觀點來探討命理'
