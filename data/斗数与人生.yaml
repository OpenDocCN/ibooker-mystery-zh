  md: '第三限起即略起作用，其後大限作用漸強，由於入世漸深，人與事關係接觸漸入頻繁，所以身宮的作用才會漸大，就是根據這個理由。這也是在古賦文裡，雖然對身宮記述的文字不多，但每提到，字字句句無不強烈指明，身宮在整個斗數命盤命理論斷上的重要地位。


    但是很遺憾的，我們在古今以來的斗數典籍上卻不曾看到有類此對身宮作用作強調性的詳細說明，甚至在命例的列舉分析上，對於格局的認定，也僅限於對命宮的重視，身宮總是諱莫如深，甚至把它看成聾子的耳朵，只是裝個樣子，不以爲他在斗數命理上有些微的作用。然而我們却在很多實際的命例中，特別是對於一些一輩子的命運比較特出、異於一般人的命盤上，發現了一個很特別的現象。這些人的成敗，除了命格（命宮）和限運以外，身宮的現象往往扮演著非常重要的角色。命盤固然亦可以單憑命格和行限運依理來推演，但是若我們再根據身宮的格局，和限運引動對身宮所呈現的作用參入析理和說明，似乎更能使命理的分析更詳盡，更深入和符合事實。因此我們在斗數命理的推理上，把身宮的重要性和命宮作等量齊觀的並重，同時也從此明瞭了古賦文上所以會對身宮如此看重的原因。


