  md: '• 239 • 四化的基本原理


    一種改變或修正或發揮的心態，或其基本能力上的一種修正功能。這種現象的作用，特別當一種客觀環境發生較大的變化時，看一個人是否有足夠的能力去應變，就完全決定在限運（大限、流年）的四化星變化現象來決定。


