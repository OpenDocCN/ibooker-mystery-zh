    他們無法、亦無能力去判定命運的造成，究竟應該涵蓋那些條件或因素？我們很迷


    **惑這些命理研究者的知識水平究竟如何？**也許不祇最基本的命理觀念一無所知，甚


    **至連人間的基本常識也不及格**，因此才會在命理的表現上顯得那麼無知和無能。


    時代在變，社會環境也在變，一個人的生活必然會受到這種大環境變動的影響。每個人有他的家庭條件，也有他的個別遭遇，我們堅信這些因素都是造成命運的重'
