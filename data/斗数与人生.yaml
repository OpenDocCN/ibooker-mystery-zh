  md: '妙藥，我們總不能單憑一張命盤，就能使一個如同沉疴癱瘓的大企業，由你命理談論上的三兩句話，就可以起死回生，就能夠從此鴻圖大展。


    [命例]


    一個中小企業的佼佼者


    女問婚姻、男問事業。有多年論命經驗的人，大概都會同意，男女之間的問命，多少有點這種偏向。但並不是說當今社會已經女男平等。現在多的是女中強人，社會上有太多的女性在各行各業上，表現特出，你不可能再抱著老祖母時代的觀念，以為女人問命不會談及事業。據我玩票性的業餘論命所知，當今社會問命乙事，不管男女，事業乙項很可能是所有命理談論中機會最多的事項。


    古人談命理，多根據一個人在八字五行屬性的現象，來告訴問命者，應該去經營木、火、土、金、水中的那一項，最能發財。甚至告訴他事業的將來趨勢傾向。


    近代由於產業發達，社會上的營生行業包羅萬象，再也不能以五行的簡單模式就可以說清。在命理的主張上，有人主張說，什麼命就作什麼事，認定事業對天命不可'
