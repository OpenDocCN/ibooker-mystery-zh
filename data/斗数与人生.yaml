  md: "**不明确的论断**，和對醫療後可能產生的后果有离谱的预测。老师这种神乎其技的高妙论命，绝不是我退等徒弟所能想像，因此我曾把命理与中医在基本理论上的关联提出请教。\n\
    \n据老师的说法：中国的五术——山、医、卜、相虽然各成体系与理路，但基本的原则仍渊源于中国的易理。尤其是中医在医理上有某些理念和斗数的理论上就很相近；只是经由药物来治病健身，而斗数是用来分析一个人一生的起伏变化，再从中用以趋吉避凶；方法虽不同，手段有所不一，但同样的有益人生，正所谓‘医病即心’同样都可救苦救难。因此五术之道其源于易理，其法有别，而衡用之目的则殊途同归矣！\n\
    \n老师的这段教诲因而使我回老家找寻家父生前留下的早已尘封的中医书籍。\n\n（家父生前是位考试院通过的合格中医师），并报名中华易经学会的《易与中医》的课程——全篇的《伤寒论》、《金匮要略》，以近两年的辛苦，听完了诸老夫子的中医基本课程。我并无意于学医以悬壶，但对这些中国古传医学经典的确引为必读的经典之著。”\n\
    \t\t}"
