- img_proc: true
  md: '我們不否認，這些事在「親兄弟」的情份上，一般人都會關心，但在斗數的論命法則上，重點並不在這個「關心」。我個人以爲這個宮位既然是本命宮的鄰接宮位，這個宮位的星曜之強弱氣勢，對左鄰所在的命宮具有相當大的影響作用，也許只提命宮右鄰的兄弟宮，不足以說明鄰宮的要要，若再提起命宮爲父母宮與兄弟宮所夾輔的現象，就更可以強調出這兩個鄰宮所顯示對命宮的重要性。一個左右鄰宮（即父母宮及兄弟宮）的星曜都是廟旺，豈不正如一幅大樓興建在一大片堅固的地基上，當然比起一邊靠山，另一邊卻是懸崖絕壁，隨時會因地基陷落而有倒塌之處的大樓穩固、安全。這是一個很淺顯的道理，因爲左右鄰宮吉輔，正是斗敗論命法則上所引爲的吉格。


    若我們改從另一個屬於倫理性、教育性的觀點來說，一個人從小由父母養育和兄弟姊妹同在一個屋簷下長大，由襁褓而幼童而少年、成人，長期的朝夕相處，我們勿須談什麼管教的大道理，單以耳濡目染，近朱者赤、近墨者黑的俗話，就可以知道一個人一輩子所受父母兄弟間潛移默化的大影響。若以心理學家的話來說，一個人從小的家庭生活是影響一個人心理和人格最大的階段和環境。而人格和心理，


