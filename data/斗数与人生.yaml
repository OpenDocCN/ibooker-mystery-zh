  md: '碰到合他意的對象前，你要說他為什麼人家給他介紹那麼多好女孩他却不接受？他也講不出個道理來。「基本上」紫微得破軍化祿的強化，使他在婚姻方面形成一種正面的制化，形成一種制煞爲用的功能。貪狼化忌由巳宮來會，更加重他這種擇善固執的掘偶意識，特別他身宮還在先天夫妻宮，這些現象使楊醫師大有寧缺勿濫的、更堅強的觀念。」


