    # # 夫妻宮


    自古以來的男女婚姻制度和觀念，不只因時代不同而差異太大，甚至在同一時代或因地域或宗教信仰的差別而大異其趣。當今之世，若把各地婚姻的現象、制度和習性，作個詳盡的調查和報導，必定成為一部洋洋的大巨著。


    歐美爲一夫一妻制，但對性的觀念，相當開放；中東的回教國家，一夫可以多妻，但卻視姦淫爲罪大惡極；咱們國人除了特殊原因外，只有少數人可以公開享有齊人之福，男人或女人儘管偶而偷吃腥或作第三類接觸，無不偷偷摸摸的不好意思，也不敢大胆的拋頭露面。這種現象，不單是由於法律的限制，甚至還帶有相當大的性關係，致使相當多的婚姻問題亮起警戒紅燈。未婚的未盛是童男和處女，已婚多的是婚姻上的困擾和波折，不免使人懷疑究竟這個婚姻制度有什麼不對？清官難斷'
  - '[PAGE 92]


    家務事，家庭懇談中心亦未必能提出什麼好意見。張老師對婚姻問題也不一定就能

    提出什麼好辦法，因此在命理的談論個案上，婚姻問題的案件才會特別多。我不以

    為一個泥守古法的相命仙，能憑古泡製出什麼仙丹妙藥，能用一成不變的古傳命理

    法則，給現代婚姻作調解人。現代的婚姻已不是老祖母時代的父母之命、媒妁之言，

    就可以終生隨狗走、隨雞飛。

    算命仙們可曾想到未婚者的遲遲不婚，不只是八字少了一撇，還可能牽扯到個

    人某些心理上、生理上的問題，專業問題、求學問題、家庭問題，甚至一些莫名奇

