  md: '左輔與武曲化祿，出外多吉助，必遇貴人提攜，為離鄉背井，謀求發展極佳格局。

    況且，田宅宮太陽居巳位，雖旺地，但子時生人失輝，且受三方空劫及火星煞沖，

    故必離故居而異鄉得志，是爲祖業無靠、白手成家之格局。看來這個年輕人都已掌

    握到論命要點，難怪他自鳴得意。

    「官祿宮破軍在午廟旺，祿存同座，事業開創中有守成，是爲能攻能守、出將

    入相不可多得之人材。」看命盤的確是一位不可多得的成功企業家材料。「財帛宮貪

    狼化權，吉會左右與武曲化祿，雖有文曲化忌來沖，但本宮鈴星已成鈴貪吉格，故

    影響不大，且有祿存在午來會，是爲雙祿一權，左右扶持，鈴貪得以發揮其爲所欲

    爲，並能予取予求之願望。」大限甲戌，行財帛宮，四化引動先天官祿宮之破軍化

    權，成爲雙祿雙權一科之防薄氣勢，事業威權在握，名利雙收，應爲目前企業界之

    佼佼者，不爲公司之大老闆，亦必爲大企業所倚重之總經理級職大員」。

    「若以其財官星曜組合，此命尤擅長生財與理財之道」。看來王永慶先生若得不

    到這個人材來用，是他企業王國上的一大損失。這個年輕人目不暇給順理成章的引

    經據典，幾至無懈可擊。至少在命理的分析上，在座的其他人沒人敢說他分析的有'
