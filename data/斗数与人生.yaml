- md: '## 四化的基本原理


    就像一個醫生他必須了解人體上任何一個器官功能，才能給人器病的道理一樣。因此，四化的功能，我們就試著借用醫學上的知識來探討。


    一個嬰孩，他得自父母精母血（卵）結合而成，當他經十月懷胎而呱呱墜地後，我們在很多方面可以說他是父母的一個縮影。但這個縮影卻另具單獨擁有的特質，並不完全是他父母其中之一的同模型複印製品。嬰孩經過養育，由嬰孩而兒童，而少年、青少年、青年、中年、壯年，與最後的老年期，不但每個年齡時期他在體能體形上有所改變，而且在心理上、生理上，甚至思想觀念上、知識上，都有其明顯的改變。


    人一旦活着，幾乎無不日日處在一種不一定很明顯的、逐漸性的改變中，短暫時段也許不顯著，但在每一個不同年齡的階段期間的比較上，差別就很大。若我們把斗數四化作用視之如人一生的這種改變，似乎就很容易搞通。一個命盤的星曜依程式排好後，再用上生年天干四化，就如同一個剛出母體的嬰孩。一個用上生年天干以後的命盤，就如同一個出了母體時就有屬於他自有的特質的嬰孩一樣。由於從胎兒變成嬰孩已成了獨立個體，他身體的生理功能必要自行運作，以維持正常生理成長。


    因此，人一出生，命宮上的大限天干就開始運作。我們若把生年干比之於與生俱來的一種星曜特質，而大限天干比之於一個人人生下來後，每隔一段期間他的生理功能作用的不同現象，應該甚爲妥當（其實一個人的心智成長和心態的改變也是一樣的道理）。因此我們不贊同，一個小孩要在入五行局的歲數後（如本三局三成起，火六局六成起），才應用第一大限命宮天干的四化星。我們認爲應該從他出生後的「落土時」一開始就使用，因爲他已脫離母體，有必要以自己的生理功能來維持生命。


    當然我們也不贊成小孩一定要在從童限後（一命宮、二財帛、三疾厄、四夫妻、五福祿、六官禄），才動用第一大限天干。因爲我們認爲這種說法沒有道理，根本違背大自然的原則，若命理違背大自然的道理原則，就不再是用以談人的命理。


    人一辈子裡，在不同的年齡階段，即童年、少年、青少年、青年、中年、壯年、老年，由於心身上及知能成熟的差別，因此斗數把大限運的宮星及四化，視如一個人在不同階段的一種身心狀況，不能不說是一個極爲合理的设计。有人說，一個人在大限的三方四正上的星曜，就是代表這階段的環境状况。我們不以爲全是如此，更重要的代表這個人在這大限階段的一種心理狀況，而這個大限的天干四化，才是促使他潛在心理狀況發揮出來的力量。


    若我們以不同兩個人在年齡相同、家世相似、教育一樣，甚至服務在同一個機構裡，從三十五歲（比如第四個大限）到四十四歲期間，一個高陞到高級主管，另一個只當部門主管，職務級資、待遇，都差上一大截。我們以常理可以認為，張先生當高級主管是由於他努力與表現傑出的結果，王先生他表現平平，僅算稱職，只因年資而累升部門主管。環境相同，而表現不一樣，應該是個人在工作上所採取的態度不同所致，也就是說，差異乃是由兩種不同心態所造成，而不是因為工作環境有別。


    若在斗數命盤上，我們以爲老張有雙權照會，甚至合祿煞寫也在他的大限運上，而老王只是大限的祿權照會而已，因此老張會提高他的工作意願和表現，老王就太那麼一回事。兩個在環境條件幾乎相同的人，但在工作的表現上截然不同，這完全是工作心態不同所表現的結果。


    禪宗有個公案，看山是山和看山不是山，我們以爲完全在自主觀念上的一個問題，而不在於客觀上的是不是真山。因此我們以爲四化在每一大限上，它是扮演著一種改變或修正或發揮的心態，或其基本能力上的一種修正功能。這種現象的作用，特別當一種客觀環境發生較大的變化時，看一個人是否有足夠的能力去應變，就完全決定在限運（大限、流年）的四化星變化現象來決定。


    因此我們以爲，四化的作用在使命盤上的某幾個特定星曜，產生某方面的突顯作用，而這些突顯的作用，強化了這些星曜在命盤所產生的一種整體性的影響，因此生年干的四化和星曜的組合，成爲這個命盤的特具條件，而大限和流年的四化，也各自代表命盤那一段時間的一種特有現象。


    ## 四化星的正確應用


    四化的應用，在古傳典籍裡用得很單純，只有生年、大限和流年，用以代表每個時間階段的星曜現象，不但理念完整正確，而且應用時簡便而思路清晰。但時至近年，我們發現到四化的新理念和新用法，幾乎有百花齊放、百鳥爭鳴的熱鬧非凡現象。並且各派大師莫不提出高深莫測的大道理來，令人無所適從。本來，凡事在窮盡時，希冀能藉由變的道理達到通的目的，不但無可厚非，也是一種研究學問的應有態度。但是我們發現到，這些近年來所發衰和應用的四化大道理，根本離了譜，有點像孫悟空在歷經魔劫而仍不得解決時，就需請出如來佛一樣。當論命無法通達的時候，就以一種道通天地有形外、思入風雲變化中（王陽明的詩）的不知所云的大道理，拿來強作解說，正如了無居士曾說那是在淪命，而不是在依理推命。我們以爲四化星的作用和應用，不能違背某些基本上的道理和法則。


    第一，人是個有生命、有生長的階段的個體，而這種階段性，各有其特具現象。人生正如馬前卒，也許可以作短暫的停留，但只能往前走，而不能後退，因此人生一輩子裡不可能有時光的倒流。四化的作用現象，既然代表人生的每一個階段，它的任何一個天干四化作用，一輩子只能出現一次，不該重複出現，除非一個人的壽命能夠超過一百廿歲，才有可能碰到命盤中的四化使星曜在十二事項宮位上，能有重複作用的現象。也許正因爲這個理由，因此古今以來，在可靠的記錄上能長壽高於一百二十歲的老壽星，才會寥如晨星。


    斗數命盤用來論人的命理，人是有生命的個體，因此我們以爲命盤上的任何一個宮位，也是代表一種有生命活力的組合。既然是有生命的組合，它應該有其時間上的延續性，而不應該有它的重複性。


    第二，天干四化在本質方面有其必然的共同性，並無根本的差異性。比如一九八七年歲行丁卯，所有的命盤在流年上，都面對著共同的值星官，天干是丁當值，而地支是卯當值，所有的命盤都是太陰祿、天同權、天機科、巨門忌，而流年太歲都共同的在卯宮，並不會因人而有所不同。當然，在實際的論命裡，我們在考慮流年的四化作用時，必須以先天命和大限為基礎，再來據以分析。因此我們只能說，在流年受到同樣四化星曜的影響之下，造成每一個人在命運上的不同表現，乃是牽涉到本命和大限的星曜組合（本命及大限四化的差別也應一併考慮），以及各個命盤在十二事項宮位的差異現象，才會有在同一流年裡，造成大家四化星雖一樣而命運卻互異的結果。


    但為了要理清這種差別的原因所在，我們只能說，不同命盤對丁卯流年四化上的感應，只是反應在事項宮位或地支宮位的差別，而不是天干四化本身的根本差異。


    當然，在兩個不同命盤上，由於所在事項宮位星曜的不同，而造成四化作用的互為差異，才造成不同結果。我們以爲這是十二事項宮位和星曜組合的問題，而不是流年太歲上，天干四化對不同命盤有不同四化作用，比方說，老張在丁年太陰化祿，老王在同樣的丁年一定也是太陰化祿，絕不會變成天同化祿。


    我們所以會提出這個問題，就因爲有部份的研習斗數者，在丁卯流年裡除了應用丁的四化外，也同時使用卯宮原有由五虎遁定出的天干四化，甚至再加用小限原有宮位的四化，而造成在同一個流年裡，使命盤呈現太多的化星，而混淆了真正四化功能，竟造成辨別上的困難。我們不反對，在流年推論上有人合參小限的作用，但我們以爲，在流年的四化上，只能使用太歲當值的天干四化。小限宮位上的原有天干，和流年當值地支宮位上的原有天干，不可同時並用，否則你一定會違背流年干支當一值星官一時才能發號施令的道理，也違背了時光不能倒流的基本法則。


    第三，四化的作用和運用在傳統上，還存留另外一個我們認爲不甚合理的问题，就是：一個祿是吉，兩個祿是大吉，三個祿是滅吉，四個祿是不吉。以忌來說，一個忌是凶，二個忌是大凶，三個忌是減凶，四個忌是不凶（否極泰來）。其他的星和科同論過，四化星是代表一個人在每一個時間階段上的心理狀況的突顯現象。在前面我們已經盤的運用上，化星扮演着一種如化學變化上的觸媒劑，由於這種觸媒物質的作用，使得某一種物質特別顯出平常不易呈現出來的一種作用。這種作用，特別當兩種物質相混合而不能互相發生化學變化的時候，只要加入觸媒，兩種物質一旦混合，就會引起化學變化。化星在斗數命盤作用上，我們認爲它的功能就像化學上用的觸媒劑。四化可以根據這種理念而用之於斗數推論上。


    比如說，「廉貞七殺」的格局，我們都知道尚需會見擎羊，並使廉貞又化忌（同宮最凶），才會引助。這個廉貞忌，正是如觸媒劑般使七殺廉貞和擎羊間作了一種催化作用，而使這三者如同三種物質起了化學變化。我們再三地強調，斗數命理學是一種有道理的命理之學，因此它的道理，應該和天下間的一切道理相同，否則它不會成爲一種言之成理的入世學問。


    根據這種觸媒作用的理論，我們認爲祿、權、科、忌這四化星，它們出現在斗數命盤上，是扮演著一種催動星曜、發揮它某特殊作用的功能。至於是吉象，吉到什麼程度？是凶象，凶到什麼結果？應該還牽涉到其他星曜及其組合上的問題。基本上，不能單憑四化的現象，就來作根據而加以論斷。


    由於四化在命盤上包括有生年四化、大限四化、和流年四化（月、日同忌），這些四化，各自扮演不同時段的功能，又在實際命盤論命的時候，我們採用一種如同樹木必須根部、樹幹和枝葉相聯的看法，也就是流年必須基於大限，大限必須基於本命（格局），一種不容分開的理念。因此當運用化星時，我們很重視本命、大限和流年，當他們相同的四化在某一限運上所湊成的會合現象，而引起的巨大作用。比如，丁卯年在三方四正上出現有本命、大限、和流年的同一化星（即都是祿，或都是權，都曜因化星而產生特別突顯、加強現象的作用，而不是如同傳統上的所謂抵消。


    化星的這個作用，不僅在三方四正的作用上如此，在夾輔宮位上也會產生它的觸媒的催化作用。比如流年太歲座流年化祿，官祿宮爲本命和大限的化祿所夾輔，它也能得到化祿的一種特殊強化作用。甚至在我們的經驗中，類似於這種集本命、大限和流年所引起的同一化星（都是權、都是根、都是科、都是忌），它的作用最強烈，若是要把強烈的層次分辨清楚，大體上可以分爲，本命和大限化星的運合主這十年，出作用最強烈的一年。若本命和流年運合化星，主這一年在這個大限十年裡，所呈現來的更密切一般。


    第四，十個天干代表時序上的十個時間階段，在理論上，由於當值星官的天干不同，他們所化出的四化星曜也應該會有所差異，正如在朝的掌權大官，每一個掌權者，都會有不同的部屬來爲他效勞，我們審視古傳十干化星上，就是類似這種現象。同時我們也發現到，十干化星也出現某些規則性（詳見丁無居士著《紫微命學》庚的科思研究乙文）的現象，我們沒法了解古人如何去訂定這十干化星，諒必有他的道理存在。但很使我們疑惑的，在一般的化星應用上，太陰却在庚年和癸年同樣都化科。居於時序不同的理由，我們認爲不應該如此。假使太陰在十年裡會出現兩次化科，同樣的，在其他星曜上也會有類似的重複出現現象，但實際上並沒有，因此我有充分的理由來懷疑這兩個化科，必定有一個錯誤，另一個化科不是太陰。


    在斗數星曜的分類上，太陽和太陰不列屬南北斗的紫府系列，而歸類於中天星曜，在命盤的運用上，視同互爲作用的成對星曜。因此我們以爲，在化星的原則上，太陰有的四化，太陽也該會有，但是在古傳的四化上並不盡然如此。以太陰來說，它的四化俱全（丁年化祿、戊年化權、庚年和癸年化科、乙年化忌），但太陽的四化並不俱全（皮年化祿、辛年化權、甲年化忌），獨缺化科。在十干化科裡，雖然並不是每一個星曜都四化俱全，但是却形成某一種規則性，因此我們不以爲會有太大的不合理，唯獨太陽和太陰有違常情，因此我們有理由懷疑它。


    根據星曜賦性的作用，太陽爲官祿主，主掌官祿事項。既然是主掌官祿，它應該在名利權勢上有充分明確的顯現現象，依四化賦性的原理和作用，若以化祿代表財利，化權代表權柄，化科代表聲譽，化忌代表衰落，我們有理由說「太陽爲官祿主」也必須有這四種現象，才能充分符合人生一輩子在事業上的得失與消長的實際現象。當一個人的專業成就時，不只在財富和權威，他的聲譽也就會隨之而來，所謂名利雙收、權傾一時。因此我們認爲，太陽必有化科，用以顯其名聲。


    在古傳四化規則上，由於庚年的太陽祿、武曲權、太陰科、天同忌，而癸年破軍祿、巨門權、太陰科、貪狼忌，我們懷疑癸年的太陰化科可能有誤，正確的應該是太陽化科。因爲太陽不可能在庚年既化祿又化科，至於爲什麼在古籍記載上會發生這種錯誤？很可能是出之於輾轉抄寫的筆誤，因爲太陽與太陰的陽陰兩個字，不留神就很容易造成錯誤。當然我們也曾作過太陽在癸年爲化科在實際論命上的應用，似乎並不離譜，只是由於化科所顯現的聲名問題，較不受一般問命者所重視，因此在論命的機會上，並不很多。我們不敢僅據少數命例就遽然作肯定的答案認定，只是提出個人的一己之見，作為同好者的參考。亦盼望諸大師們能提出寶貴的高見，使此一直混淆不清的問題能夠澄清它的真面目，使四化的應用，更能臻於完善，則功德無量。


    ## 斗數推論的基本方法


    在中華易經學會近兩年的中醫講座聽課裡，雖然使我對中醫醫理僅及皮毛的淺認識，但也因這些聽課讓我體會到斗數命理上的一些道理。《醫宗金鑑》一四診心法一篇開宗明義所提：醫生診病時的四個重要步驟：


    **望**：以目察五色，察看病人的外觀病態。


    **聞**：以耳識五音，聽病人的說話聲音和聽病人訴說病情。


    **問**：以言審五病，問病人來訴說的詳情，來鑑別病情。


    **切和處方**：以指別五脈，以脈象合參病症的狀況。


    醫生對一個初診的病人，也許可以從病人的外表，多少看出某些現象，但不一定能看出病情的全部真相，因此他們必須加之以問、聞、切的三種方式來協助診斷。到底有些病痛除非病人說出，要不然醫生很難從外表的審視中看出，甚至把脈而了解的脈象也只是整個診療上的一種手段，並不足以洞悉病人的全部病情。因此，中醫學上的四診心法，成爲修習中醫的必要課程。


    我們以爲，對人生一輩子的榮枯禍福變化的探時，並不比一個醫生診斷病人的病情來得簡單。俗語說：「一樣米養百樣人」，人雖然都同樣爲父母所生，也都同樣要度過數十寒暑的歲月，但這數十年寒暑歲月的旅程，每個人的遭遇，却不儘相同。由於時空上或個別條件的差異，往往造成一個人一生遭遇異於他人，正如一句老話說：「人生之不同，各如其臉」。因此我們以爲用以探討人生百態的斗數命理學，應該也要如診療人身病痛的醫學，以一種嚴謹的、合理的科學態度和方法，否則，將失去研究命理以求趨吉避凶的積極意義。


    決定一個人一輩子的遭遇或命運的原因很多，正如一個人肚子痛但有各種不同的病情（如胃痛、十二指腸潰瘍痛、盲腸炎痛、腸炎引起的痛、消化不良的痛……），造成同樣病情的原因也不盡一致，因此我們雖然以命理的方法來探討人生，但我們不以爲決定人生命運的一切，唯有命理上的單獨因素。我們很明確地認爲，造成一個人一輩子的命運，命理上的條件只是其中一個重要的因素，除此之外，應該還有很多相等的因素，然後才湊成一個人一生的命運如何。據以這種理念，因此我以爲在用斗數命盤來探討一個人的命運消長時，我們必須掌握某些必要的方法步驟，也許中醫診病的四診心法，可以提供我們一個很恰當的模式。


    首先我們須將依生辰排出的命盤先行檢視，有否時辰上的錯誤。往往由於問命者所提供的生辰資料不正確，而排出一個不能符合當事人的命盤，因此有驗證時辰的必要。據個人的經驗，特別在一九六○年以前出生的人，不是由於缺乏時鐘不能確定該命盤符合其人，應該是推論命理的第一道手續。


    # ### 第一、望


    其次，再將判定無誤的命盤作整體性的審視。比如命、身宮的格局問題，星曜在所在地支宮位的組合和廟旺利陷，行限運後的星曜變化，六吉、六煞和四化，在十二事項宮位的配置組合，以及對每一個宮位可能引動的現象，作個概約性的了解。


    因爲，我們既然以斗數命盤作爲論命的命理上的條件依據，這種論命前對命盤星曜組合現象的初步概念，就不能不事前作個了解。


    # ## 第二、問


    由於每個問命者對命理問題的訴求事項，幾乎都因人而異，雖然大部份的人不外乎妻、財、子、祿事項，但每個人同樣在妻、財、子、祿方面所要了解和解決的問題，常因人而異，更何況，人生除了妻、財、子、祿之外，還有太多談都談不完的事項。一個論命者所能辦到的，也是比較實際的，就是針對所訴求的事項來加以推廣和解析，我們不以爲論命者一排好命盤，就馬上能從命盤裡，知道問命者究竟想要談些什麼事，正如一個醫生對一個初診的內科病人，不經病人說出他那一個地方不舒服，就無法着手診斷一般。


    幾年前，我就曾經碰過這麼一位問命者，一位幾乎快要耽誤適婚期的小姐，她不像一般未婚者，要我談論關於感情婚姻的事，反倒問我這一兩年內她和她的家人會不會搬家。本來搬家在這個人口流動極爲頻繁的社會，似乎沒有用命理來研究的必要，但她却愼乎其事地要我表示意見，甚至她也表示曾以這個問題請教過很多命理大師，但都不得其解，由此可見，她很在乎搬不搬家這一件事（詳見了無居士著紫微論命，小姐爲何搬家乙文）。


    像這種問命的訴求，我個人不以爲是特例，因爲在我二十多年的斗數學習過程中，幾乎經常碰到一些似乎是很冷僻的問題，但確實造成當事者的某些困擾，在百思不得其解、求教無門之下，想藉命理的探討來加以了解或是請求解決之道。因此我們以爲，在就命理因素加以推理和研判之前，論命者有必要先弄清楚：問命者究竟想要探求些什麼？


    第三、間


    我們一再強調「一件事實的存在」必定有它的道理；也就是有它所以存在的理由。而且這個事實的存在，常和造成這個事實的原因或條件有某種必然性的因果關係，甚至往往是互爲因果，形成某一種循環現象。


    一個人事業上名利雙收，另一個卻事業無成、名利無緣，他們兩人之間所以會造成不同結果的道理，我們很容易了解。但是這並不意味着同樣都是成功的人，在命理的探討上，有其必然相同的條件；同樣是失敗者，在命理的因素上也部一樣。


    比如說：同樣賺大錢的兩個商人，一個可能是靠長袖善舞、龐大資金，經營大宗買賣生意而財利滾滾；另一個可能靠工廠製造出某些特殊產品而大發利市——事業上的名利雙收結果一致，但是造成名利雙收的方法或是原因，並不相同。若從企業經營的角度來看，這兩種不同的成功路徑，反映了內在條件與外在環境的交互作用，這正是斗數命理學需要深入探討的核心課題。'
  mdcn: '## 四化的基本原理


    就像一個醫生他必須了解人體上任何一個器官功能，才能給人器病的道理一樣。因此，四化的功能，我們就試著借用醫學上的知識來探討。


    一個嬰孩，他得自父母精母血（卵）結合而成，當他經十月懷胎而呱呱墜地後，我們在很多方面可以說他是父母的一個縮影。但這個縮影卻另具單獨擁有的特質，並不完全是他父母其中之一的同模型複印製品。嬰孩經過養育，由嬰孩而兒童，而少年、青少年、青年、中年、壯年，與最後的老年期，不但每個年齡時期他在體能體形上有所改變，而且在心理上、生理上，甚至思想觀念上、知識上，都有其明顯的改變。


    人一旦活着，幾乎無不日日處在一種不一定很明顯的、逐漸性的改變中，短暫時段也許不顯著，但在每一個不同年齡的階段期間的比較上，差別就很大。若我們把斗數四化作用視之如人一生的這種改變，似乎就很容易搞通。一個命盤的星曜依程式排好後，再用上生年天干四化，就如同一個剛出母體的嬰孩。一個用上生年天干以後的命盤，就如同一個出了母體時就有屬於他自有的特質的嬰孩一樣。由於從胎兒變成嬰孩已成了獨立個體，他身體的生理功能必要自行運作，以維持正常生理成長。


    因此，人一出生，命宮上的大限天干就開始運作。我們若把生年干比之於與生俱來的一種星曜特質，而大限天干比之於一個人人生下來後，每隔一段期間他的生理功能作用的不同現象，應該甚爲妥當（其實一個人的心智成長和心態的改變也是一樣的道理）。因此我們不贊同，一個小孩要在入五行局的歲數後（如本三局三成起，火六局六成起），才應用第一大限命宮天干的四化星。我們認爲應該從他出生後的「落土時」一開始就使用，因爲他已脫離母體，有必要以自己的生理功能來維持生命。


    當然我們也不贊成小孩一定要在從童限後（一命宮、二財帛、三疾厄、四夫妻、五福祿、六官禄），才動用第一大限天干。因爲我們認爲這種說法沒有道理，根本違背大自然的原則，若命理違背大自然的道理原則，就不再是用以談人的命理。


    人一辈子裡，在不同的年齡階段，即童年、少年、青少年、青年、中年、壯年、老年，由於心身上及知能成熟的差別，因此斗數把大限運的宮星及四化，視如一個人在不同階段的一種身心狀況，不能不說是一個極爲合理的设计。有人說，一個人在大限的三方四正上的星曜，就是代表這階段的環境状况。我們不以爲全是如此，更重要的代表這個人在這大限階段的一種心理狀況，而這個大限的天干四化，才是促使他潛在心理狀況發揮出來的力量。


    若我們以不同兩個人在年齡相同、家世相似、教育一樣，甚至服務在同一個機構裡，從三十五歲（比如第四個大限）到四十四歲期間，一個高陞到高級主管，另一個只當部門主管，職務級資、待遇，都差上一大截。我們以常理可以認為，張先生當高級主管是由於他努力與表現傑出的結果，王先生他表現平平，僅算稱職，只因年資而累升部門主管。環境相同，而表現不一樣，應該是個人在工作上所採取的態度不同所致，也就是說，差異乃是由兩種不同心態所造成，而不是因為工作環境有別。


    若在斗數命盤上，我們以爲老張有雙權照會，甚至合祿煞寫也在他的大限運上，而老王只是大限的祿權照會而已，因此老張會提高他的工作意願和表現，老王就太那麼一回事。兩個在環境條件幾乎相同的人，但在工作的表現上截然不同，這完全是工作心態不同所表現的結果。


    禪宗有個公案，看山是山和看山不是山，我們以爲完全在自主觀念上的一個問題，而不在於客觀上的是不是真山。因此我們以爲四化在每一大限上，它是扮演著一種改變或修正或發揮的心態，或其基本能力上的一種修正功能。這種現象的作用，特別當一種客觀環境發生較大的變化時，看一個人是否有足夠的能力去應變，就完全決定在限運（大限、流年）的四化星變化現象來決定。


    因此我們以爲，四化的作用在使命盤上的某幾個特定星曜，產生某方面的突顯作用，而這些突顯的作用，強化了這些星曜在命盤所產生的一種整體性的影響，因此生年干的四化和星曜的組合，成爲這個命盤的特具條件，而大限和流年的四化，也各自代表命盤那一段時間的一種特有現象。


    ## 四化星的正確應用


    四化的應用，在古傳典籍裡用得很單純，只有生年、大限和流年，用以代表每個時間階段的星曜現象，不但理念完整正確，而且應用時簡便而思路清晰。但時至近年，我們發現到四化的新理念和新用法，幾乎有百花齊放、百鳥爭鳴的熱鬧非凡現象。並且各派大師莫不提出高深莫測的大道理來，令人無所適從。本來，凡事在窮盡時，希冀能藉由變的道理達到通的目的，不但無可厚非，也是一種研究學問的應有態度。但是我們發現到，這些近年來所發衰和應用的四化大道理，根本離了譜，有點像孫悟空在歷經魔劫而仍不得解決時，就需請出如來佛一樣。當論命無法通達的時候，就以一種道通天地有形外、思入風雲變化中（王陽明的詩）的不知所云的大道理，拿來強作解說，正如了無居士曾說那是在淪命，而不是在依理推命。我們以爲四化星的作用和應用，不能違背某些基本上的道理和法則。


    第一，人是個有生命、有生長的階段的個體，而這種階段性，各有其特具現象。人生正如馬前卒，也許可以作短暫的停留，但只能往前走，而不能後退，因此人生一輩子裡不可能有時光的倒流。四化的作用現象，既然代表人生的每一個階段，它的任何一個天干四化作用，一輩子只能出現一次，不該重複出現，除非一個人的壽命能夠超過一百廿歲，才有可能碰到命盤中的四化使星曜在十二事項宮位上，能有重複作用的現象。也許正因爲這個理由，因此古今以來，在可靠的記錄上能長壽高於一百二十歲的老壽星，才會寥如晨星。


    斗數命盤用來論人的命理，人是有生命的個體，因此我們以爲命盤上的任何一個宮位，也是代表一種有生命活力的組合。既然是有生命的組合，它應該有其時間上的延續性，而不應該有它的重複性。


    第二，天干四化在本質方面有其必然的共同性，並無根本的差異性。比如一九八七年歲行丁卯，所有的命盤在流年上，都面對著共同的值星官，天干是丁當值，而地支是卯當值，所有的命盤都是太陰祿、天同權、天機科、巨門忌，而流年太歲都共同的在卯宮，並不會因人而有所不同。當然，在實際的論命裡，我們在考慮流年的四化作用時，必須以先天命和大限為基礎，再來據以分析。因此我們只能說，在流年受到同樣四化星曜的影響之下，造成每一個人在命運上的不同表現，乃是牽涉到本命和大限的星曜組合（本命及大限四化的差別也應一併考慮），以及各個命盤在十二事項宮位的差異現象，才會有在同一流年裡，造成大家四化星雖一樣而命運卻互異的結果。


    但為了要理清這種差別的原因所在，我們只能說，不同命盤對丁卯流年四化上的感應，只是反應在事項宮位或地支宮位的差別，而不是天干四化本身的根本差異。


    當然，在兩個不同命盤上，由於所在事項宮位星曜的不同，而造成四化作用的互為差異，才造成不同結果。我們以爲這是十二事項宮位和星曜組合的問題，而不是流年太歲上，天干四化對不同命盤有不同四化作用，比方說，老張在丁年太陰化祿，老王在同樣的丁年一定也是太陰化祿，絕不會變成天同化祿。


    我們所以會提出這個問題，就因爲有部份的研習斗數者，在丁卯流年裡除了應用丁的四化外，也同時使用卯宮原有由五虎遁定出的天干四化，甚至再加用小限原有宮位的四化，而造成在同一個流年裡，使命盤呈現太多的化星，而混淆了真正四化功能，竟造成辨別上的困難。我們不反對，在流年推論上有人合參小限的作用，但我們以爲，在流年的四化上，只能使用太歲當值的天干四化。小限宮位上的原有天干，和流年當值地支宮位上的原有天干，不可同時並用，否則你一定會違背流年干支當一值星官一時才能發號施令的道理，也違背了時光不能倒流的基本法則。


    第三，四化的作用和運用在傳統上，還存留另外一個我們認爲不甚合理的问题，就是：一個祿是吉，兩個祿是大吉，三個祿是滅吉，四個祿是不吉。以忌來說，一個忌是凶，二個忌是大凶，三個忌是減凶，四個忌是不凶（否極泰來）。其他的星和科同論過，四化星是代表一個人在每一個時間階段上的心理狀況的突顯現象。在前面我們已經盤的運用上，化星扮演着一種如化學變化上的觸媒劑，由於這種觸媒物質的作用，使得某一種物質特別顯出平常不易呈現出來的一種作用。這種作用，特別當兩種物質相混合而不能互相發生化學變化的時候，只要加入觸媒，兩種物質一旦混合，就會引起化學變化。化星在斗數命盤作用上，我們認爲它的功能就像化學上用的觸媒劑。四化可以根據這種理念而用之於斗數推論上。


    比如說，「廉貞七殺」的格局，我們都知道尚需會見擎羊，並使廉貞又化忌（同宮最凶），才會引助。這個廉貞忌，正是如觸媒劑般使七殺廉貞和擎羊間作了一種催化作用，而使這三者如同三種物質起了化學變化。我們再三地強調，斗數命理學是一種有道理的命理之學，因此它的道理，應該和天下間的一切道理相同，否則它不會成爲一種言之成理的入世學問。


    根據這種觸媒作用的理論，我們認爲祿、權、科、忌這四化星，它們出現在斗數命盤上，是扮演著一種催動星曜、發揮它某特殊作用的功能。至於是吉象，吉到什麼程度？是凶象，凶到什麼結果？應該還牽涉到其他星曜及其組合上的問題。基本上，不能單憑四化的現象，就來作根據而加以論斷。


    由於四化在命盤上包括有生年四化、大限四化、和流年四化（月、日同忌），這些四化，各自扮演不同時段的功能，又在實際命盤論命的時候，我們採用一種如同樹木必須根部、樹幹和枝葉相聯的看法，也就是流年必須基於大限，大限必須基於本命（格局），一種不容分開的理念。因此當運用化星時，我們很重視本命、大限和流年，當他們相同的四化在某一限運上所湊成的會合現象，而引起的巨大作用。比如，丁卯年在三方四正上出現有本命、大限、和流年的同一化星（即都是祿，或都是權，都曜因化星而產生特別突顯、加強現象的作用，而不是如同傳統上的所謂抵消。


    化星的這個作用，不僅在三方四正的作用上如此，在夾輔宮位上也會產生它的觸媒的催化作用。比如流年太歲座流年化祿，官祿宮爲本命和大限的化祿所夾輔，它也能得到化祿的一種特殊強化作用。甚至在我們的經驗中，類似於這種集本命、大限和流年所引起的同一化星（都是權、都是根、都是科、都是忌），它的作用最強烈，若是要把強烈的層次分辨清楚，大體上可以分爲，本命和大限化星的運合主這十年，出作用最強烈的一年。若本命和流年運合化星，主這一年在這個大限十年裡，所呈現來的更密切一般。


    第四，十個天干代表時序上的十個時間階段，在理論上，由於當值星官的天干不同，他們所化出的四化星曜也應該會有所差異，正如在朝的掌權大官，每一個掌權者，都會有不同的部屬來爲他效勞，我們審視古傳十干化星上，就是類似這種現象。同時我們也發現到，十干化星也出現某些規則性（詳見丁無居士著《紫微命學》庚的科思研究乙文）的現象，我們沒法了解古人如何去訂定這十干化星，諒必有他的道理存在。但很使我們疑惑的，在一般的化星應用上，太陰却在庚年和癸年同樣都化科。居於時序不同的理由，我們認爲不應該如此。假使太陰在十年裡會出現兩次化科，同樣的，在其他星曜上也會有類似的重複出現現象，但實際上並沒有，因此我有充分的理由來懷疑這兩個化科，必定有一個錯誤，另一個化科不是太陰。


    在斗數星曜的分類上，太陽和太陰不列屬南北斗的紫府系列，而歸類於中天星曜，在命盤的運用上，視同互爲作用的成對星曜。因此我們以爲，在化星的原則上，太陰有的四化，太陽也該會有，但是在古傳的四化上並不盡然如此。以太陰來說，它的四化俱全（丁年化祿、戊年化權、庚年和癸年化科、乙年化忌），但太陽的四化並不俱全（皮年化祿、辛年化權、甲年化忌），獨缺化科。在十干化科裡，雖然並不是每一個星曜都四化俱全，但是却形成某一種規則性，因此我們不以爲會有太大的不合理，唯獨太陽和太陰有違常情，因此我們有理由懷疑它。


    根據星曜賦性的作用，太陽爲官祿主，主掌官祿事項。既然是主掌官祿，它應該在名利權勢上有充分明確的顯現現象，依四化賦性的原理和作用，若以化祿代表財利，化權代表權柄，化科代表聲譽，化忌代表衰落，我們有理由說「太陽爲官祿主」也必須有這四種現象，才能充分符合人生一輩子在事業上的得失與消長的實際現象。當一個人的專業成就時，不只在財富和權威，他的聲譽也就會隨之而來，所謂名利雙收、權傾一時。因此我們認爲，太陽必有化科，用以顯其名聲。


    在古傳四化規則上，由於庚年的太陽祿、武曲權、太陰科、天同忌，而癸年破軍祿、巨門權、太陰科、貪狼忌，我們懷疑癸年的太陰化科可能有誤，正確的應該是太陽化科。因爲太陽不可能在庚年既化祿又化科，至於爲什麼在古籍記載上會發生這種錯誤？很可能是出之於輾轉抄寫的筆誤，因爲太陽與太陰的陽陰兩個字，不留神就很容易造成錯誤。當然我們也曾作過太陽在癸年爲化科在實際論命上的應用，似乎並不離譜，只是由於化科所顯現的聲名問題，較不受一般問命者所重視，因此在論命的機會上，並不很多。我們不敢僅據少數命例就遽然作肯定的答案認定，只是提出個人的一己之見，作為同好者的參考。亦盼望諸大師們能提出寶貴的高見，使此一直混淆不清的問題能夠澄清它的真面目，使四化的應用，更能臻於完善，則功德無量。


    ## 斗數推論的基本方法


    在中華易經學會近兩年的中醫講座聽課裡，雖然使我對中醫醫理僅及皮毛的淺認識，但也因這些聽課讓我體會到斗數命理上的一些道理。《醫宗金鑑》一四診心法一篇開宗明義所提：醫生診病時的四個重要步驟：


    **望**：以目察五色，察看病人的外觀病態。


    **聞**：以耳識五音，聽病人的說話聲音和聽病人訴說病情。


    **問**：以言審五病，問病人來訴說的詳情，來鑑別病情。


    **切和處方**：以指別五脈，以脈象合參病症的狀況。


    醫生對一個初診的病人，也許可以從病人的外表，多少看出某些現象，但不一定能看出病情的全部真相，因此他們必須加之以問、聞、切的三種方式來協助診斷。到底有些病痛除非病人說出，要不然醫生很難從外表的審視中看出，甚至把脈而了解的脈象也只是整個診療上的一種手段，並不足以洞悉病人的全部病情。因此，中醫學上的四診心法，成爲修習中醫的必要課程。


    我們以爲，對人生一輩子的榮枯禍福變化的探時，並不比一個醫生診斷病人的病情來得簡單。俗語說：「一樣米養百樣人」，人雖然都同樣爲父母所生，也都同樣要度過數十寒暑的歲月，但這數十年寒暑歲月的旅程，每個人的遭遇，却不儘相同。由於時空上或個別條件的差異，往往造成一個人一生遭遇異於他人，正如一句老話說：「人生之不同，各如其臉」。因此我們以爲用以探討人生百態的斗數命理學，應該也要如診療人身病痛的醫學，以一種嚴謹的、合理的科學態度和方法，否則，將失去研究命理以求趨吉避凶的積極意義。


    決定一個人一輩子的遭遇或命運的原因很多，正如一個人肚子痛但有各種不同的病情（如胃痛、十二指腸潰瘍痛、盲腸炎痛、腸炎引起的痛、消化不良的痛……），造成同樣病情的原因也不盡一致，因此我們雖然以命理的方法來探討人生，但我們不以爲決定人生命運的一切，唯有命理上的單獨因素。我們很明確地認爲，造成一個人一輩子的命運，命理上的條件只是其中一個重要的因素，除此之外，應該還有很多相等的因素，然後才湊成一個人一生的命運如何。據以這種理念，因此我以爲在用斗數命盤來探討一個人的命運消長時，我們必須掌握某些必要的方法步驟，也許中醫診病的四診心法，可以提供我們一個很恰當的模式。


    首先我們須將依生辰排出的命盤先行檢視，有否時辰上的錯誤。往往由於問命者所提供的生辰資料不正確，而排出一個不能符合當事人的命盤，因此有驗證時辰的必要。據個人的經驗，特別在一九六○年以前出生的人，不是由於缺乏時鐘不能確定該命盤符合其人，應該是推論命理的第一道手續。


    # ### 第一、望


    其次，再將判定無誤的命盤作整體性的審視。比如命、身宮的格局問題，星曜在所在地支宮位的組合和廟旺利陷，行限運後的星曜變化，六吉、六煞和四化，在十二事項宮位的配置組合，以及對每一個宮位可能引動的現象，作個概約性的了解。


    因爲，我們既然以斗數命盤作爲論命的命理上的條件依據，這種論命前對命盤星曜組合現象的初步概念，就不能不事前作個了解。


    # ## 第二、問


    由於每個問命者對命理問題的訴求事項，幾乎都因人而異，雖然大部份的人不外乎妻、財、子、祿事項，但每個人同樣在妻、財、子、祿方面所要了解和解決的問題，常因人而異，更何況，人生除了妻、財、子、祿之外，還有太多談都談不完的事項。一個論命者所能辦到的，也是比較實際的，就是針對所訴求的事項來加以推廣和解析，我們不以爲論命者一排好命盤，就馬上能從命盤裡，知道問命者究竟想要談些什麼事，正如一個醫生對一個初診的內科病人，不經病人說出他那一個地方不舒服，就無法着手診斷一般。


    幾年前，我就曾經碰過這麼一位問命者，一位幾乎快要耽誤適婚期的小姐，她不像一般未婚者，要我談論關於感情婚姻的事，反倒問我這一兩年內她和她的家人會不會搬家。本來搬家在這個人口流動極爲頻繁的社會，似乎沒有用命理來研究的必要，但她却愼乎其事地要我表示意見，甚至她也表示曾以這個問題請教過很多命理大師，但都不得其解，由此可見，她很在乎搬不搬家這一件事（詳見了無居士著紫微論命，小姐爲何搬家乙文）。


    像這種問命的訴求，我個人不以爲是特例，因爲在我二十多年的斗數學習過程中，幾乎經常碰到一些似乎是很冷僻的問題，但確實造成當事者的某些困擾，在百思不得其解、求教無門之下，想藉命理的探討來加以了解或是請求解決之道。因此我們以爲，在就命理因素加以推理和研判之前，論命者有必要先弄清楚：問命者究竟想要探求些什麼？


    第三、間


    我們一再強調「一件事實的存在」必定有它的道理；也就是有它所以存在的理由。而且這個事實的存在，常和造成這個事實的原因或條件有某種必然性的因果關係，甚至往往是互爲因果，形成某一種循環現象。


    一個人事業上名利雙收，另一個卻事業無成、名利無緣，他們兩人之間所以會造成不同結果的道理，我們很容易了解。但是這並不意味着同樣都是成功的人，在命理的探討上，有其必然相同的條件；同樣是失敗者，在命理的因素上也部一樣。


    比如說：同樣賺大錢的兩個商人，一個可能是靠長袖善舞、龐大資金，經營大宗買賣生意而財利滾滾；另一個可能靠工廠製造出某些特殊產品而大發利市——事業上的名利雙收結果一致，但是造成名利雙收的方法或是原因，並不相同。若從企業經營的角度來看，這兩種不同的成功路徑，反映了內在條件與外在環境的交互作用，這正是斗數命理學需要深入探討的核心課題。'
