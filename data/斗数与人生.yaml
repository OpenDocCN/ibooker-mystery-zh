    我們不以爲王老闆他有神機妙算的神通，我們只知道他擁有很健全的事業管理機構，網羅各種學有專精的企業管理專家，隨時爲他事業王國下的每一個企業單位，懾精寶神和獻策。一個算命仙仔，若只死纏着殘缺的古祿命法則，而不知企業經營爲何物，他到底何德何能，竟能根據一張死命盤，甚至單憑財帛宮的星曜，就去斷人家今年賺了多少錢、虧了多少本？我們以爲，還是省了吧，因爲誰聰了，誰就倒'
