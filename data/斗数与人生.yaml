  md: '硬板板，井必須一一解決的現實問題。否則儘管你的意願再大，你在斗數命盤上的

    命理條件再好，也將難能讓你如願。


    幾年前，我就碰過這麼一個命例：一個矍矍斗數的青年，也曾經得遇高人以斗

    數祿命法指點，使他對服完兵役後接着放洋留學充滿信心。因此在他服兵役期間，

    就處心積慮地準備服完兵役後的出國留學。但經過一年多，不曉得寄出多少封學校

    申請函，仍得不到一份接受申請的入學許可證明。在眼看着學期開學在即，而仍無

    著落時，找上了我。他問我爲什麼在斗數行運上如此大吉大利的現象下，他竟然得

    不到一所學校的接納？到底是斗數理論有誤或是爲了什麼？記得當時在詳談之下才

    知道，他老弟在大學時，憑着他的小聰明稀里糊塗地混過四年，因此成績不怎麼樣，

    只差沒補考和重修。而他所申請的國外學校，却都是頗具名氣的大學，所學的科系

    也是頂熱門的，因此他怎能憑他那份破成飆單，申請得了入學許可證，甚至還要帶

    有獎助學金？我不知道，他是犯了一般年輕人所共有的無知毛病，或是受了斗數命

    理之誤，以爲他既然通過了所有留學測驗，入學許可兼獎學金便是垂手可得，沒想

    到事與願違。'
