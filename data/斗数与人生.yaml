- md: '## 漢帝國王朝何關？


    兩者之間似乎是遠隔在兩個不同的星球，但現在當你從報紙或電視裡頭看到荷姆斯海峽的戰事如箭在弦、一觸即發，一發就幾乎不可收拾的時候，你將會聯想到因為產油國的阻抗，而導致汽油的漲價。你的汽車一個月將會多耗幾千元，甚至公車亦會漲價。


    若你是老闆，當你聽到美金在明日又將貶值幾分時，你會擔心，在美金不斷地貶值之下，你就職的公司會否因而關門倒閉；一旦倒閉，也許不難心有無米之炊的困境，但是却不能太久找不到工作而長期失業。因此今日的中東和美國，跟我們再不是遠如兩個老死不相往來的星球，而是形同隔鄰而居、息息相關。


    這是人類文明進化的必然結果，不再是單純的牛車換上卡車、煤油燈換上由核子反應而來的電燈問題。更大的還是在人文方面的變化，不只在社會的、在政治的、在文化的、在思想上，在其他屬於人類活動任何層面上，都有太大的變動，而這變動在地球上，再也不是老祖宗時代的老死不相往來，而是逃不了的互爲相關。


    悲天憫人的宗教家、社會學家、思想家、政治家、心理學家、教育家、科學家，無不在處心積慮地作着入世，甚至入地獄的苦行，欲以匡救世道人心。但唯獨這些窮搞命理的人，一輩子抱守老祖宗傳下來的殘缺不全的破道理，甚至學了幾手花招，就在那兒賣弄玄虛，好像遺世而飄逸、不食人間煙火的仙人，其實他在自欺欺人之餘，也在爲自己造下孽障。


    若把命理比喻爲醫理，醫者必須研讀許多相關醫理的書籍、充實學識，而命理，用來探討人生由生到死一切遭遇上的問題，涉及範圍應更廣泛，從人性的探討、生理的研究、心理的觀察、時代和社會背景的熟悉、人際關係的了解、人生價值觀上的差異，舉凡涉及人生一切層面的知識，豈能不去一一探討？因爲這些都是影響到一個人一生的環環節節，而人生也就由這種大小不同的環環節節，相拍而成。


    個人只是大社會裡的一份子，人不能離群而獨居，一個人即使擁有太多的優越條件，不但不能離開這個群衆的社會，也難獨自違抗這社會而生活。因此，論命之道，決不止於醫生在診治一個單獨的病人，完全可以依個人和個案來處理。不過由於近代人們活動範圍的擴張，因此若論及流行瘟疫上的醫療，就不再限於個人和個案。醫療如此，談論命理的論題內容，絕大部份幾乎必須涉及個人以外的一些人、事、物的互動關係，而這些人、事、物，又不單純的僅限於某些特定的個體，往往關係着更大的範圍背景，甚至時代和社會。


    因此我們若單憑一個命盤（或八字）來依理推論，而不知他（或她）究竟是何許人，我們究竟要依明朝、清朝人的命例來論斷，或是你我的鄰居來作答？甚至是個紅髮碧眼的洋人來論析？因此在斗數的論命上，我們不僅要引用有關人生的一切知識，更要先加確定命盤所指的人，他的切身資料與時空背景，否則無論如何再了不起的高談濶論，必定是一場荒誕無稽的大笑話。


    記得在拜師聽課的時候，有一次，何老師在黑板上排了個命盤，要我們四個徒弟就命例上的某些宮位的成敗得失，發表論析方法，現在依稀記得，那是一個命宮座卯，太陽、天梁，壬寅年生的命造，因此無不異口同聲大發妙論，圍繞者這是一個日月並明、雙祿交馳，又兼陽梁昌祿、天魁座命，極聰明又富貴的大好格局，因此這個小孩將來不但學業無阻，甚至可以放洋順利地拿個極其風光的大博士回來光宗耀祖。我們四個笨徒弟却也不問清楚，這個壬寅年究竟是民前十年的壬寅年，或是民國五十年的壬寅年，儘管胡亂地抓着斗數的格局法則大作文章，而鬧出一場至今記憶猶新的大笑話。


    在民前十年的台灣老百姓，就算再聰明的小孩，莫說讀大學拿洋博士，在鄉下窮苦人家的孩子，多的是連進個小學校門的機會都不可得，因此儘管有資質再聰慧的孩子，也與諷口無緣。因此，儘管他是個陽梁昌祿的讀書好材料，也就是所謂智商頗高的小孩，一旦與諷會求知識無緣，也將如一顆不得琢磨的寶石，永難發出它耀眼奪目的光華，因此這個命造儘管能如斗數原理所說的，呈現相當程度的聰明才智，但決難與接受高等教育的大博士，所擁有超高知識可相比擬。時代環境、個人背景條件的完全差異，必定會影響個人一輩子的命運走向，絕對不是單就所謂的「落土時，八字命」，就能決定一個人的一生如何。


    ## 醫理和命理


    老家是個鳥不生蛋的窩鄉僻壤，鄉人都以務農為生。由於地處偏遠加上醫療設備的欠缺，地方上雖然也不乏開業行醫的小診所，但由於設備的簡陋，對一般的小毛病還能夠醫治，但對一些疑難雜症，或需開刀動手術之類的大病，卻是一籌莫展。


    人往往是無辜天地廣，有事則天地窄。鄉人偶有碰到求醫無門的時候，就會找上這個落魄台北的老同鄕，認爲我得地利之便，能為他們設法安排醫療機構，得以醫治家人的病痛。


    因此幾年來，從眼科、胸腔外科到心臟科的開刀手術，使我幾乎跑遍了各大醫院，並認識一些頗具權威性的醫生。也許是興趣使然，我曾經陸續把這些病人排上命盤，先後請教何老師談論那些疾病在命盤上所顯現的現象如何，以及可能得到的療治效果。


    老師對所有我提出的病例命盤所給予的分析論斷，幾乎不曾有過不明确的论断，和對醫療後可能產生的后果有离谱的预测。老师这种神乎其技的高妙论命，绝不是我退等徒弟所能想像，因此我曾把命理与中医在基本理论上的关联提出请教。


    据老师的说法：中国的五术——山、医、卜、相虽然各成体系与理路，但基本的原则仍渊源于中国的易理。尤其是中医在医理上有某些理念和斗数的理论上就很相近；只是经由药物来治病健身，而斗数是用来分析一个人一生的起伏变化，再从中用以趋吉避凶；方法虽不同，手段有所不一，但同样的有益人生，正所谓‘医病即心’同样都可救苦救难。因此五术之道其源于易理，其法有别，而衡用之目的则殊途同归矣！


    老师的这段教诲因而使我回老家找寻家父生前留下的早已尘封的中医书籍。（家父生前是位考试院通过的合格中医师），并报名中华易经学会的《易与中医》的课程——全篇的《伤寒论》、《金匮要略》，以近两年的辛苦，听完了诸老夫子的中医基本课程。我并无意于学医以悬壶，但对这些中国古传医学经典的确引为必读的经典之著。”


    感到相當震撼與讚歎，更深深體會到中國古文化的博大精深。兩年的講座，雖然不能使我了解多少高深的中醫醫理，但我也能從中了解到易理在中國文化所造成的深遠影響，以及易理與五術的血脈淵源。


    說來慚愧，在正式拜師學斗數近十年後，雖然已漸能照命盤依樣畫葫蘆的論起命來，有時偶有神乎其技的高言妙論，使人驚歎不可思議，但自己總是心裡有數：雖然依理推論的結果，總是八九不離十，但個中的道理依據，總有理有未明之憾！我自信已把斗數的星曜賦性、格局組成、運程變化，甚至四化星的活用，運用得滾瓜爛熟，但總有說不出其所以然來的道理，因此在斗數論斷上一直停留在「結果」的論斷上，至於所以會造成「結果」的「因」，由此「因」而導致事體演變的過程，就無法深入，更別說再去作如何趨吉避凶的判斷和建議了！


    我一直不知原因在那裡，我無論如何還無法像何老師，每次都能給來論者提出適當的解決之道，或何去何從的建言。當我在上過中醫的基本課程後，儘管醫理的認識還屬皮毛，微不足道，但却從中了解了五術通用的陰陽五行的基本真義，原來所謂陰陽與五行的道理，談的是以相對和屬性來劃分事物的屬性，所以陽不限於光熱井兼的太陽，而陰不限於只有折射光華的月亮，木非木頭，火非火燄，土非泥巴，金非金銀銅鐵，水非河川之流，五行之所指的是萬物所呈顯的各別特具的屬性，而在其不同的屬性之間可能引起的互相的作用，即所謂陰陽相輔與五行生剋制化的現象。


    中國古文明的這種陰陽五行的學說，由於典籍文字的艱澀難懂，竟造成了後人視之為荒誕無稽，認爲古人由於知識淺薄而造成的荒謬理論，豈知近代引爲推動現代文明的物理、生物與化學，都已明確的證實了，宇宙萬物間的個別物性和萬物（含生物）之間，所可能發生的關聯，存在着正如陰陽五行之說的現象。


    不知道是歪打正着，或是曲徑通幽，老實講，在近兩年的中醫夜間講座課程，對我這個架著老花眼鏡，一頭華髮的半老頭，決不是賞心悅事的好玩意，但這些醫學經典經過夫子的詳細講解後，確也獲益不少。我雖志不在學醫，但經由藥物學（本草備要）裡所獲知的藥物性質的一鱗半爪，却也讓我聯想起斗數星曜賦性之所以有其特殊作用的道理來！在《本草備要》（清·汪昂著）藥性總藏章節裡，所提到的諸藥入諸經（背景與異同之義），各藥物就其個別的功用品質、主治、禁忌、異同、炮製、使


    我聯想和領悟到，斗數星曜的賦性，所以分別有其賦性作用，“主”於何事項（如天機爲主兄弟和主宰祿），每個星曜在命身十二宮和地支十二宮的作用，星曜賦性在不同現象的作用之極致和限制，星曜在斗數命盤所呈現吉不靈吉和凶不靈凶的道理。


    在一刪補名醫方論”裡，亦從某些古來醫學上所傳留下的處方裡，看到明明是極其微不足道的幾味藥物的組合，卻可以療治人體上的某些重大疾病，這正好和斗數上某些星曜若單憑它的個別賦性就無法明辨吉凶，但是當它和其他星曜在三方四正一旦會合，形成格局以後，所發出的重大作用，豈不有不謀而合的共通現象？在診斷學上，特別是“四診心法”（中醫珍病的四大方法和步驟，即望、聞、問、切），所提出的高深醫理上的理論，“八十一難經”用以辨證古來醫學上的疑難懸案……凡此無不深深地體驗醫理的艱深和深奧，一個醫生，若無法把這些醫學搞清弄通，無論如何，不能隨便辨症處方，療病之道絕對不是隨便草藥一把抓就可以醫人病。中醫如此，西醫更不簡單，除了必要的醫學醫療學上的必修課程外，甚至物理、化學、動植物學、心理學……都是主修的課程，幾手要排滿整整六年十二學期的課程表（第七年作臨床實習），至於正式行醫後所用以涉及協助診斷和療治上的方法之多，更不是中醫所能望其項背的。


    人吃五穀雜糧以獲身活命，但却因之而傷身致病，更何况有數不清的「內因外感」（中醫論說的話）而引起的大小病痛或疑難雜症，因此，古今以來，中西醫儘管都在日新月異的不斷進步，至今仍有治不完和治不了的奇難大症。或許，妥當的醫療能使人延年益壽，但若單就醫理的途徑而言，恐怕永遠難以突破人生必有死的自然律，醫者雖有仁心仁術，但面對無法挽救的病患，也只能盡人事而已。


    醫生治療人體之病，命理探討人生的榮枯禍福，同樣的都是有益世道人心。然而，一個醫生在貫通醫學上相關的基礎學識之後，尚且不能治好天下蒼生的疾病苦痛，同樣的，一個斗數的命理學者，如何能單憑幾篇斗數賦文，或一招半式的特別論析方法，就可以洞察人生的吉凶禍福？如此則未免太抬舉命理、太小看了這個大千世界！連古來聖賢對人生都很難大徹大悟，就算以佛陀的八萬四千個法門，亦難以普渡得了芸芸衆生。


    由於藥物各有其藥理的存在和道理，因此可以使醫生在辨識病人的病痛之後，能依病情依藥理而下處方。東方古傳的藥理，正和西方文明的西藥依其藥理治病的理論一樣，竟然是不謀而合。以西藥的衆多抗生素（Penicillin）來說，雖然都同具殺菌的消炎作用，而廣泛地應用在發炎方面，但是由於衍生素藥品品質在Tetacycline與Erythromycin上的差異，因此同樣由真菌造成的抗生索，在療效方面就產生了重大差別。比如紅黴素（Erythromycin）和四環素（Tetracycline）在藥理作用上的根本差異，使得前者應用於上體腔的炎症，後者則應用於下腹腔的消炎上。也許有人會懷疑，為什麼同具殺菌消炎作用的抗生素，竟然在療效上會有這麼大的差別，主要原因是在人的上體腔部份，尤其上呼吸道，比較會受一格蘭姆氏陰性菌（Gram-Negative）的危害而引起病變；而下體腔諸如膀胱尿道，就比較容易引起一格蘭姆氏陽性菌（Grama-Positive）的感染病變。這兩種細菌雖然都會使人體內引起的發炎危害部位，但是它們到底在細菌種的本質上有所差別，所以在人體內引起的發炎危害部位，就會不盡相似。


    因此儘管都是發炎類的病變，就需要依發炎的器官部位，而投用有效的抗生素。根據西醫療法，沒有一個合格的醫生會隨便採用任何一種消炎藥劑，用來治療人體上的任何發炎病症。西醫的這種藥理作用，正和中醫上的某藥主入某一經一的理論不謀而和。因為每一種中藥也有它的特別藥理作用，而發生在人體每個不同臟腑的病變機轉，會隨臟腑經絡而有所不同。比如同為消化器官系統上的病症，因胃病而引起的肚子痛，和由小腸或大腸引起的疼痛，在用藥和處方上，一定會有差別。


    曾聽藥學博士許興智教授約客談起，由於藥物的各具特性，因此醫生才能用藥，麻醉醫生也才能依手術開刀上的需要，施用各種不同藥性的麻醉劑。這種藥物上的理論，儘管我還僅止於極其膚淺的知識，但更使我由此而體會到斗數星曜賦性上的各種現象、宮位、組合，它們之間同中有異、異中有同的道理。若不能分辨個中的特性與作用而囫圇吞棗，結果將會造成庸醫錯把醫治頭痛的藥用來醫腹痛，雖然都是鎮痛藥物，但藥療效果不喻可知。


    很多斗數的命理研究者，正是犯了庸醫的這種錯誤，不辨星曜所在事項宮位，不合理會星曜組成的變化現象，也不懂運用四化的方法，竟然照本宣科，依斗數星曜的基本賦性斷起命來，甚至還表示鐵口直斷、論斷如神。


    中西藥物和藥理，由於文化環境上的差別，也許有太多的相異處，但既然都能用來療病止痛，使人延年益壽，應該在某些道理上不至於背道而馳。只是這兩者之間在醫理和藥理的說法不同，并不代表根本上的相違背和大衝突，否則，必然有一個不能達到醫人癲病的目的。


    理不通，則事不達，理通而後事達，這該是中國醫學所以會流傳千古而不墜，能在近世和日新月異的西方醫學同爲世人共同承認，個中道理絕不是理不明而妄想道可通的人所能想像的！


    ## 啟發和頓悟


    一個人生病看醫生，事業單位出了差錯找企業管理師作企業經營診斷。在這個社會裡，人人都會覺得是理所當然的事！但是當一個人在心裡對某事物或某人有所疑惑時，找找相命仙、問問吉凶、卜卜休咎，本來也是極其稀鬆平常的事，但你可以肯定，當你在路上碰到一位朋友時，若他要去
    看醫生，他會直言不諱地說看醫生去；若他想要看一個算命先生，他絕對不會跟你明言。


    這個現象正如某些大老闆，他可以公開表示，他的公司除了律師顧問外，還有會計師顧問、投資顧問、管理顧問，甚至任何屬於專業性的專家顧問。但他決不會在大庭廣眾提到他有任何命理師、地理師這類顧問。（儘管他每年在這兩類顧問方面所費不貲），但他會像金屋藏嬌般地避人耳目！甚至是公司同仁而靜悄悄地獨來獨往去會見算命仙仔，好像讓人知道了會跟老婆找上小公館一樣的尷尬和嚴重。


    對於這個問題，我不知道一些大師級的高人們曾否想過？這也許正好應證了所謂「冰凍三尺，非一日之寒」的道理。大老板甚至達官貴人，他們為什麼在聆聽諸大師的高論後都秘而不宣，應該不全然是怕人譏為怪力亂神而已，而是怕被人恥笑他的問道於盲。


    我們不必妄自菲薄，搞命理的人並不全如許興智博士所說的，只能躲在陰暗不見天日的小巷裡，擺不出大街面更進不了大殿堂，命理自有一套經世致用的大道理，足以彌補古往今來任何學問都無法對人生命運態勢作預測和分析的缺憾！只是近百以來，命理由於諸多的「內因外感」，才變成一項不怎麼好笑的笑話，若是命理再不自立自強，不能把老祖宗傳下的道理注入新生命、新觀念、新內容，那麼它將從此腐朽，而為時代所淘汰。


    大師們可曾知道，在這個工商業極度繁榮又競爭劇烈的時代裡，那些扮演企業管理顧問角色的公司，它們大力網羅了企業經營上的各種人才——具有執照資格的會計師，除了精通會計原理、財務分析之外，還需搞懂稅務法則，以利節稅甚至避稅的道理和方法：財務專家，精通於財務調度、資金融通、投資企劃和審核；其他諸如行銷專家、廣告專家、企劃專家、市場調查專家……等，不勝枚舉。


    這些專家不僅學有專長，多的是碩士和博士，諷言萬卷，井不斷吸取先進國家在企業經營上的成敗先例。他們絕不想空耍嘴皮，他們決不談莫測高深兼莫名奇妙的大道理，他們必須提出駭針該灸的地方和原因，并提出立竿見影的策略或辦法。


    若你曾經在公私營利事業機構作過事，當你聽完一堂企業顧問專家的講座之後，你會覺得勝讀萬卷書，也許更會茅塞頓開地解決了你公司經營管理上的疑難。這正是工商業愈發達，企業管理顧問公司的行業愈興盛，各種管理顧問人才需求愈見孔急的道理。因此有人說，一個國家工商業的發達，這些管理顧問專家也該記上一筆不小的功勞。


    反觀命理界，拋棄那些藉以養生活口的殘障朋友不談，近年來有不少受過很好教育，甚至高等教育的朋友加入了行列，本來這是一個很好的現象，若經由這些接受新時代新知識教育的高水準知識份子來研究探討，應該可以使中國的命理之學成為有益於世道人心，亦能同所有的管理顧問師一樣的有助於工商經營和發展，但很遺憾，目前多的是近視短見的命理研習者，以爲單憑那幾篇賦文、歌訣，幾手花招，就可以解决人间的一切痛苦。


    他们似乎无视于时代的变动、工商业经营上的瞬息万变。他们仍以为老祖宗的那些道理已足够应付当前与以后世界上所有的万千变化。他们何曾知道一个人一旦签发了太多的空头支票，不但会使他事业垮台、坐牢、身败名裂、倾家荡产，甚至在他身后他的家人还必须宣告放弃继承遗产，否则将会祸延子孙，而难以收拾。


    至于被牵连而受灾殃祸延之广，可曾是搞命理的人能以命中註定一了百了的。三言两语可以概括论断。


    因此我们以为在命理的探讨上若你以为追眞是一门可以有益世道人心的学术你就必须先充实自己的学识和见闻不只要博贺当代的新知识更应积极入世的探索生活也许不必学著苦行僧的历劫万难才能悟道但是积极的入世、积极的参与你才不会和社会脱节你才会由认识而了解由于解而知其然知其所以然。


    若你学著隐于山林当个不闻俗事的隐士或蜗居斗室不適出大门一步你将不会知今世何世儘管你是活在今世的這個年頭裡。


    学验渊博见多间广的许兴智博士曾经提到他在美国大学讲学时所碰过的一件事，他認識一位教授專門主持一種包括心理、性向和生理多項綜合測驗研究機構的負責人，根據他們設計的內容，作好一個人的問卷調查記錄以後，把這些資料輸入電腦處理幷分析，可以提供一份詳細資料，頗能反應出這個人的才能、性向以及心理和生理週期性的起伏變化，能提供給事業機構做爲用人的參考。尤其對於某些特殊工作人員如何去調整特殊任務時間，特別具有參考價值。


    經過他們長期追根究底的查證，諸如一些飛航上的失誤空難，除了部份的確由於機械突然的故障，或事前無法掌握的突發變故之外，很多是由於飛航人員（特別是飛行員）個人處理不當所引起，而會造成飛行員這種不得當的反應，常常因爲某種週期性或潛伏性的心理或生理的反應結果。而這種現象卻不能由一般的醫療方法所能診斷得出，若能經由某種方法探討得出飛行員心理與生理上的反應規則或傾向趨勢，只要令這種人在某特定的期間不要他出勤開飛機，另作他事，甚至休假休息，將會避免很多飛航上的事故。


    在這種理念之下，他們經過各種專家的設計、調查、研究、分析，果真讓他們發現到飛航事故與飛行員個人資料所顯示的，具有某種程度的相關。由於這個機構'
  mdcn: '## 漢帝國王朝何關？


    兩者之間似乎是遠隔在兩個不同的星球，但現在當你從報紙或電視裡頭看到荷姆斯海峽的戰事如箭在弦、一觸即發，一發就幾乎不可收拾的時候，你將會聯想到因為產油國的阻抗，而導致汽油的漲價。你的汽車一個月將會多耗幾千元，甚至公車亦會漲價。


    若你是老闆，當你聽到美金在明日又將貶值幾分時，你會擔心，在美金不斷地貶值之下，你就職的公司會否因而關門倒閉；一旦倒閉，也許不難心有無米之炊的困境，但是却不能太久找不到工作而長期失業。因此今日的中東和美國，跟我們再不是遠如兩個老死不相往來的星球，而是形同隔鄰而居、息息相關。


    這是人類文明進化的必然結果，不再是單純的牛車換上卡車、煤油燈換上由核子反應而來的電燈問題。更大的還是在人文方面的變化，不只在社會的、在政治的、在文化的、在思想上，在其他屬於人類活動任何層面上，都有太大的變動，而這變動在地球上，再也不是老祖宗時代的老死不相往來，而是逃不了的互爲相關。


    悲天憫人的宗教家、社會學家、思想家、政治家、心理學家、教育家、科學家，無不在處心積慮地作着入世，甚至入地獄的苦行，欲以匡救世道人心。但唯獨這些窮搞命理的人，一輩子抱守老祖宗傳下來的殘缺不全的破道理，甚至學了幾手花招，就在那兒賣弄玄虛，好像遺世而飄逸、不食人間煙火的仙人，其實他在自欺欺人之餘，也在爲自己造下孽障。


    若把命理比喻爲醫理，醫者必須研讀許多相關醫理的書籍、充實學識，而命理，用來探討人生由生到死一切遭遇上的問題，涉及範圍應更廣泛，從人性的探討、生理的研究、心理的觀察、時代和社會背景的熟悉、人際關係的了解、人生價值觀上的差異，舉凡涉及人生一切層面的知識，豈能不去一一探討？因爲這些都是影響到一個人一生的環環節節，而人生也就由這種大小不同的環環節節，相拍而成。


    個人只是大社會裡的一份子，人不能離群而獨居，一個人即使擁有太多的優越條件，不但不能離開這個群衆的社會，也難獨自違抗這社會而生活。因此，論命之道，決不止於醫生在診治一個單獨的病人，完全可以依個人和個案來處理。不過由於近代人們活動範圍的擴張，因此若論及流行瘟疫上的醫療，就不再限於個人和個案。醫療如此，談論命理的論題內容，絕大部份幾乎必須涉及個人以外的一些人、事、物的互動關係，而這些人、事、物，又不單純的僅限於某些特定的個體，往往關係着更大的範圍背景，甚至時代和社會。


    因此我們若單憑一個命盤（或八字）來依理推論，而不知他（或她）究竟是何許人，我們究竟要依明朝、清朝人的命例來論斷，或是你我的鄰居來作答？甚至是個紅髮碧眼的洋人來論析？因此在斗數的論命上，我們不僅要引用有關人生的一切知識，更要先加確定命盤所指的人，他的切身資料與時空背景，否則無論如何再了不起的高談濶論，必定是一場荒誕無稽的大笑話。


    記得在拜師聽課的時候，有一次，何老師在黑板上排了個命盤，要我們四個徒弟就命例上的某些宮位的成敗得失，發表論析方法，現在依稀記得，那是一個命宮座卯，太陽、天梁，壬寅年生的命造，因此無不異口同聲大發妙論，圍繞者這是一個日月並明、雙祿交馳，又兼陽梁昌祿、天魁座命，極聰明又富貴的大好格局，因此這個小孩將來不但學業無阻，甚至可以放洋順利地拿個極其風光的大博士回來光宗耀祖。我們四個笨徒弟却也不問清楚，這個壬寅年究竟是民前十年的壬寅年，或是民國五十年的壬寅年，儘管胡亂地抓着斗數的格局法則大作文章，而鬧出一場至今記憶猶新的大笑話。


    在民前十年的台灣老百姓，就算再聰明的小孩，莫說讀大學拿洋博士，在鄉下窮苦人家的孩子，多的是連進個小學校門的機會都不可得，因此儘管有資質再聰慧的孩子，也與諷口無緣。因此，儘管他是個陽梁昌祿的讀書好材料，也就是所謂智商頗高的小孩，一旦與諷會求知識無緣，也將如一顆不得琢磨的寶石，永難發出它耀眼奪目的光華，因此這個命造儘管能如斗數原理所說的，呈現相當程度的聰明才智，但決難與接受高等教育的大博士，所擁有超高知識可相比擬。時代環境、個人背景條件的完全差異，必定會影響個人一輩子的命運走向，絕對不是單就所謂的「落土時，八字命」，就能決定一個人的一生如何。


    ## 醫理和命理


    老家是個鳥不生蛋的窩鄉僻壤，鄉人都以務農為生。由於地處偏遠加上醫療設備的欠缺，地方上雖然也不乏開業行醫的小診所，但由於設備的簡陋，對一般的小毛病還能夠醫治，但對一些疑難雜症，或需開刀動手術之類的大病，卻是一籌莫展。


    人往往是無辜天地廣，有事則天地窄。鄉人偶有碰到求醫無門的時候，就會找上這個落魄台北的老同鄕，認爲我得地利之便，能為他們設法安排醫療機構，得以醫治家人的病痛。


    因此幾年來，從眼科、胸腔外科到心臟科的開刀手術，使我幾乎跑遍了各大醫院，並認識一些頗具權威性的醫生。也許是興趣使然，我曾經陸續把這些病人排上命盤，先後請教何老師談論那些疾病在命盤上所顯現的現象如何，以及可能得到的療治效果。


    老師對所有我提出的病例命盤所給予的分析論斷，幾乎不曾有過不明确的论断，和對醫療後可能產生的后果有离谱的预测。老师这种神乎其技的高妙论命，绝不是我退等徒弟所能想像，因此我曾把命理与中医在基本理论上的关联提出请教。


    据老师的说法：中国的五术——山、医、卜、相虽然各成体系与理路，但基本的原则仍渊源于中国的易理。尤其是中医在医理上有某些理念和斗数的理论上就很相近；只是经由药物来治病健身，而斗数是用来分析一个人一生的起伏变化，再从中用以趋吉避凶；方法虽不同，手段有所不一，但同样的有益人生，正所谓‘医病即心’同样都可救苦救难。因此五术之道其源于易理，其法有别，而衡用之目的则殊途同归矣！


    老师的这段教诲因而使我回老家找寻家父生前留下的早已尘封的中医书籍。（家父生前是位考试院通过的合格中医师），并报名中华易经学会的《易与中医》的课程——全篇的《伤寒论》、《金匮要略》，以近两年的辛苦，听完了诸老夫子的中医基本课程。我并无意于学医以悬壶，但对这些中国古传医学经典的确引为必读的经典之著。”


    感到相當震撼與讚歎，更深深體會到中國古文化的博大精深。兩年的講座，雖然不能使我了解多少高深的中醫醫理，但我也能從中了解到易理在中國文化所造成的深遠影響，以及易理與五術的血脈淵源。


    說來慚愧，在正式拜師學斗數近十年後，雖然已漸能照命盤依樣畫葫蘆的論起命來，有時偶有神乎其技的高言妙論，使人驚歎不可思議，但自己總是心裡有數：雖然依理推論的結果，總是八九不離十，但個中的道理依據，總有理有未明之憾！我自信已把斗數的星曜賦性、格局組成、運程變化，甚至四化星的活用，運用得滾瓜爛熟，但總有說不出其所以然來的道理，因此在斗數論斷上一直停留在「結果」的論斷上，至於所以會造成「結果」的「因」，由此「因」而導致事體演變的過程，就無法深入，更別說再去作如何趨吉避凶的判斷和建議了！


    我一直不知原因在那裡，我無論如何還無法像何老師，每次都能給來論者提出適當的解決之道，或何去何從的建言。當我在上過中醫的基本課程後，儘管醫理的認識還屬皮毛，微不足道，但却從中了解了五術通用的陰陽五行的基本真義，原來所謂陰陽與五行的道理，談的是以相對和屬性來劃分事物的屬性，所以陽不限於光熱井兼的太陽，而陰不限於只有折射光華的月亮，木非木頭，火非火燄，土非泥巴，金非金銀銅鐵，水非河川之流，五行之所指的是萬物所呈顯的各別特具的屬性，而在其不同的屬性之間可能引起的互相的作用，即所謂陰陽相輔與五行生剋制化的現象。


    中國古文明的這種陰陽五行的學說，由於典籍文字的艱澀難懂，竟造成了後人視之為荒誕無稽，認爲古人由於知識淺薄而造成的荒謬理論，豈知近代引爲推動現代文明的物理、生物與化學，都已明確的證實了，宇宙萬物間的個別物性和萬物（含生物）之間，所可能發生的關聯，存在着正如陰陽五行之說的現象。


    不知道是歪打正着，或是曲徑通幽，老實講，在近兩年的中醫夜間講座課程，對我這個架著老花眼鏡，一頭華髮的半老頭，決不是賞心悅事的好玩意，但這些醫學經典經過夫子的詳細講解後，確也獲益不少。我雖志不在學醫，但經由藥物學（本草備要）裡所獲知的藥物性質的一鱗半爪，却也讓我聯想起斗數星曜賦性之所以有其特殊作用的道理來！在《本草備要》（清·汪昂著）藥性總藏章節裡，所提到的諸藥入諸經（背景與異同之義），各藥物就其個別的功用品質、主治、禁忌、異同、炮製、使


    我聯想和領悟到，斗數星曜的賦性，所以分別有其賦性作用，“主”於何事項（如天機爲主兄弟和主宰祿），每個星曜在命身十二宮和地支十二宮的作用，星曜賦性在不同現象的作用之極致和限制，星曜在斗數命盤所呈現吉不靈吉和凶不靈凶的道理。


    在一刪補名醫方論”裡，亦從某些古來醫學上所傳留下的處方裡，看到明明是極其微不足道的幾味藥物的組合，卻可以療治人體上的某些重大疾病，這正好和斗數上某些星曜若單憑它的個別賦性就無法明辨吉凶，但是當它和其他星曜在三方四正一旦會合，形成格局以後，所發出的重大作用，豈不有不謀而合的共通現象？在診斷學上，特別是“四診心法”（中醫珍病的四大方法和步驟，即望、聞、問、切），所提出的高深醫理上的理論，“八十一難經”用以辨證古來醫學上的疑難懸案……凡此無不深深地體驗醫理的艱深和深奧，一個醫生，若無法把這些醫學搞清弄通，無論如何，不能隨便辨症處方，療病之道絕對不是隨便草藥一把抓就可以醫人病。中醫如此，西醫更不簡單，除了必要的醫學醫療學上的必修課程外，甚至物理、化學、動植物學、心理學……都是主修的課程，幾手要排滿整整六年十二學期的課程表（第七年作臨床實習），至於正式行醫後所用以涉及協助診斷和療治上的方法之多，更不是中醫所能望其項背的。


    人吃五穀雜糧以獲身活命，但却因之而傷身致病，更何况有數不清的「內因外感」（中醫論說的話）而引起的大小病痛或疑難雜症，因此，古今以來，中西醫儘管都在日新月異的不斷進步，至今仍有治不完和治不了的奇難大症。或許，妥當的醫療能使人延年益壽，但若單就醫理的途徑而言，恐怕永遠難以突破人生必有死的自然律，醫者雖有仁心仁術，但面對無法挽救的病患，也只能盡人事而已。


    醫生治療人體之病，命理探討人生的榮枯禍福，同樣的都是有益世道人心。然而，一個醫生在貫通醫學上相關的基礎學識之後，尚且不能治好天下蒼生的疾病苦痛，同樣的，一個斗數的命理學者，如何能單憑幾篇斗數賦文，或一招半式的特別論析方法，就可以洞察人生的吉凶禍福？如此則未免太抬舉命理、太小看了這個大千世界！連古來聖賢對人生都很難大徹大悟，就算以佛陀的八萬四千個法門，亦難以普渡得了芸芸衆生。


    由於藥物各有其藥理的存在和道理，因此可以使醫生在辨識病人的病痛之後，能依病情依藥理而下處方。東方古傳的藥理，正和西方文明的西藥依其藥理治病的理論一樣，竟然是不謀而合。以西藥的衆多抗生素（Penicillin）來說，雖然都同具殺菌的消炎作用，而廣泛地應用在發炎方面，但是由於衍生素藥品品質在Tetacycline與Erythromycin上的差異，因此同樣由真菌造成的抗生索，在療效方面就產生了重大差別。比如紅黴素（Erythromycin）和四環素（Tetracycline）在藥理作用上的根本差異，使得前者應用於上體腔的炎症，後者則應用於下腹腔的消炎上。也許有人會懷疑，為什麼同具殺菌消炎作用的抗生素，竟然在療效上會有這麼大的差別，主要原因是在人的上體腔部份，尤其上呼吸道，比較會受一格蘭姆氏陰性菌（Gram-Negative）的危害而引起病變；而下體腔諸如膀胱尿道，就比較容易引起一格蘭姆氏陽性菌（Grama-Positive）的感染病變。這兩種細菌雖然都會使人體內引起的發炎危害部位，但是它們到底在細菌種的本質上有所差別，所以在人體內引起的發炎危害部位，就會不盡相似。


    因此儘管都是發炎類的病變，就需要依發炎的器官部位，而投用有效的抗生素。根據西醫療法，沒有一個合格的醫生會隨便採用任何一種消炎藥劑，用來治療人體上的任何發炎病症。西醫的這種藥理作用，正和中醫上的某藥主入某一經一的理論不謀而和。因為每一種中藥也有它的特別藥理作用，而發生在人體每個不同臟腑的病變機轉，會隨臟腑經絡而有所不同。比如同為消化器官系統上的病症，因胃病而引起的肚子痛，和由小腸或大腸引起的疼痛，在用藥和處方上，一定會有差別。


    曾聽藥學博士許興智教授約客談起，由於藥物的各具特性，因此醫生才能用藥，麻醉醫生也才能依手術開刀上的需要，施用各種不同藥性的麻醉劑。這種藥物上的理論，儘管我還僅止於極其膚淺的知識，但更使我由此而體會到斗數星曜賦性上的各種現象、宮位、組合，它們之間同中有異、異中有同的道理。若不能分辨個中的特性與作用而囫圇吞棗，結果將會造成庸醫錯把醫治頭痛的藥用來醫腹痛，雖然都是鎮痛藥物，但藥療效果不喻可知。


    很多斗數的命理研究者，正是犯了庸醫的這種錯誤，不辨星曜所在事項宮位，不合理會星曜組成的變化現象，也不懂運用四化的方法，竟然照本宣科，依斗數星曜的基本賦性斷起命來，甚至還表示鐵口直斷、論斷如神。


    中西藥物和藥理，由於文化環境上的差別，也許有太多的相異處，但既然都能用來療病止痛，使人延年益壽，應該在某些道理上不至於背道而馳。只是這兩者之間在醫理和藥理的說法不同，并不代表根本上的相違背和大衝突，否則，必然有一個不能達到醫人癲病的目的。


    理不通，則事不達，理通而後事達，這該是中國醫學所以會流傳千古而不墜，能在近世和日新月異的西方醫學同爲世人共同承認，個中道理絕不是理不明而妄想道可通的人所能想像的！


    ## 啟發和頓悟


    一個人生病看醫生，事業單位出了差錯找企業管理師作企業經營診斷。在這個社會裡，人人都會覺得是理所當然的事！但是當一個人在心裡對某事物或某人有所疑惑時，找找相命仙、問問吉凶、卜卜休咎，本來也是極其稀鬆平常的事，但你可以肯定，當你在路上碰到一位朋友時，若他要去
    看醫生，他會直言不諱地說看醫生去；若他想要看一個算命先生，他絕對不會跟你明言。


    這個現象正如某些大老闆，他可以公開表示，他的公司除了律師顧問外，還有會計師顧問、投資顧問、管理顧問，甚至任何屬於專業性的專家顧問。但他決不會在大庭廣眾提到他有任何命理師、地理師這類顧問。（儘管他每年在這兩類顧問方面所費不貲），但他會像金屋藏嬌般地避人耳目！甚至是公司同仁而靜悄悄地獨來獨往去會見算命仙仔，好像讓人知道了會跟老婆找上小公館一樣的尷尬和嚴重。


    對於這個問題，我不知道一些大師級的高人們曾否想過？這也許正好應證了所謂「冰凍三尺，非一日之寒」的道理。大老板甚至達官貴人，他們為什麼在聆聽諸大師的高論後都秘而不宣，應該不全然是怕人譏為怪力亂神而已，而是怕被人恥笑他的問道於盲。


    我們不必妄自菲薄，搞命理的人並不全如許興智博士所說的，只能躲在陰暗不見天日的小巷裡，擺不出大街面更進不了大殿堂，命理自有一套經世致用的大道理，足以彌補古往今來任何學問都無法對人生命運態勢作預測和分析的缺憾！只是近百以來，命理由於諸多的「內因外感」，才變成一項不怎麼好笑的笑話，若是命理再不自立自強，不能把老祖宗傳下的道理注入新生命、新觀念、新內容，那麼它將從此腐朽，而為時代所淘汰。


    大師們可曾知道，在這個工商業極度繁榮又競爭劇烈的時代裡，那些扮演企業管理顧問角色的公司，它們大力網羅了企業經營上的各種人才——具有執照資格的會計師，除了精通會計原理、財務分析之外，還需搞懂稅務法則，以利節稅甚至避稅的道理和方法：財務專家，精通於財務調度、資金融通、投資企劃和審核；其他諸如行銷專家、廣告專家、企劃專家、市場調查專家……等，不勝枚舉。


    這些專家不僅學有專長，多的是碩士和博士，諷言萬卷，井不斷吸取先進國家在企業經營上的成敗先例。他們絕不想空耍嘴皮，他們決不談莫測高深兼莫名奇妙的大道理，他們必須提出駭針該灸的地方和原因，并提出立竿見影的策略或辦法。


    若你曾經在公私營利事業機構作過事，當你聽完一堂企業顧問專家的講座之後，你會覺得勝讀萬卷書，也許更會茅塞頓開地解決了你公司經營管理上的疑難。這正是工商業愈發達，企業管理顧問公司的行業愈興盛，各種管理顧問人才需求愈見孔急的道理。因此有人說，一個國家工商業的發達，這些管理顧問專家也該記上一筆不小的功勞。


    反觀命理界，拋棄那些藉以養生活口的殘障朋友不談，近年來有不少受過很好教育，甚至高等教育的朋友加入了行列，本來這是一個很好的現象，若經由這些接受新時代新知識教育的高水準知識份子來研究探討，應該可以使中國的命理之學成為有益於世道人心，亦能同所有的管理顧問師一樣的有助於工商經營和發展，但很遺憾，目前多的是近視短見的命理研習者，以爲單憑那幾篇賦文、歌訣，幾手花招，就可以解决人间的一切痛苦。


    他们似乎无视于时代的变动、工商业经营上的瞬息万变。他们仍以为老祖宗的那些道理已足够应付当前与以后世界上所有的万千变化。他们何曾知道一个人一旦签发了太多的空头支票，不但会使他事业垮台、坐牢、身败名裂、倾家荡产，甚至在他身后他的家人还必须宣告放弃继承遗产，否则将会祸延子孙，而难以收拾。


    至于被牵连而受灾殃祸延之广，可曾是搞命理的人能以命中註定一了百了的。三言两语可以概括论断。


    因此我们以为在命理的探讨上若你以为追眞是一门可以有益世道人心的学术你就必须先充实自己的学识和见闻不只要博贺当代的新知识更应积极入世的探索生活也许不必学著苦行僧的历劫万难才能悟道但是积极的入世、积极的参与你才不会和社会脱节你才会由认识而了解由于解而知其然知其所以然。


    若你学著隐于山林当个不闻俗事的隐士或蜗居斗室不適出大门一步你将不会知今世何世儘管你是活在今世的這個年頭裡。


    学验渊博见多间广的许兴智博士曾经提到他在美国大学讲学时所碰过的一件事，他認識一位教授專門主持一種包括心理、性向和生理多項綜合測驗研究機構的負責人，根據他們設計的內容，作好一個人的問卷調查記錄以後，把這些資料輸入電腦處理幷分析，可以提供一份詳細資料，頗能反應出這個人的才能、性向以及心理和生理週期性的起伏變化，能提供給事業機構做爲用人的參考。尤其對於某些特殊工作人員如何去調整特殊任務時間，特別具有參考價值。


    經過他們長期追根究底的查證，諸如一些飛航上的失誤空難，除了部份的確由於機械突然的故障，或事前無法掌握的突發變故之外，很多是由於飛航人員（特別是飛行員）個人處理不當所引起，而會造成飛行員這種不得當的反應，常常因爲某種週期性或潛伏性的心理或生理的反應結果。而這種現象卻不能由一般的醫療方法所能診斷得出，若能經由某種方法探討得出飛行員心理與生理上的反應規則或傾向趨勢，只要令這種人在某特定的期間不要他出勤開飛機，另作他事，甚至休假休息，將會避免很多飛航上的事故。


