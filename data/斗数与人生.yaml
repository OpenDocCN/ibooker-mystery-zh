  md: '年，當他們相同的四化在某一限運上所湊成的會合現象，而引起的巨大作用。比如，丁卯年在三方四正上出現有本命、大限、和流年的同一化星（即都是祿，或都是權，都曜因化星而產生特別突顯、加強現象的作用，而不是如同傳統上的所謂抵消。


    化星的這個作用，不僅在三方四正的作用上如此，在夾輔宮位上也會產生它的觸媒的催化作用。比如流年太歲座流年化祿，官祿宮爲本命和大限的化祿所夾輔，它也能得到化祿的一種特殊強化作用。甚至在我們的經驗中，類似於這種集本命、大限和流年所引起的同一化星（都是權、都是根、都是科、都是忌），它的作用最強烈，若是要把強烈的層次分辨清楚，大體上可以分爲，本命和大限化星的運合主這十年，出作用最強烈的一年。若本命和流年運合化星，主這一年在這個大限十年裡，所呈現來的更密切一般。


