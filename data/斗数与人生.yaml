  md: '- 166 -


    理，理由極爲淺顯，但很奇怪，偏偏有太多問命理的人。一開口問職業或生意類別時，就問說應該從事於金木水火土那一種行業比較妥當，我想這種問話，一定不是客人自作主張的意見，必定有太多的算命先生曾經有過如此的說法，才會讓這麼多

    人興口同聲的作如此問法。


    我們以爲在職業類別上，若以職業功能作爲歸類，應該可以分爲生產事業、服務業和買賣業三大類；若以職業機構歸屬來分，則可分爲官方和民間機構：以職務功能來分別，則爲利文職或利武職。利文在官方則爲文官或文職的行政人員，在民間則主公司行號的行政業務管理，利武在官方即爲軍、警、刑、法職務，在民間則


    至於在官方能達到高宮願要的人，不管文武戰務，不再是單純職務分類上的問題。或是單純的以官祿宮來看，最重大的關鍵，往往是在命身格局的根本條件上。


    以民間公司行號來說，一個成功的老板，一定有他命格和行運上的條件，而另一個一輩子當上班族的人，也同樣受命格和行運的限制，反而不是單就事業宮的問題。一般來說，在政府機關做事的人，雖有官途升遷上的困擾，但一個人只要奉公'
  merge: -1
  pgno: 166
- img_proc: true
  md: '守法、盡忠職守不犯大錯，若再沒有當高官願要的野心，決不會有官海浮沈的痛苦。


    因此一個平常又平凡的公務員，一輩子不致於有太大的事業上的煩惱，儘可逍遙自在。但是一個在民間經營事業的老板階級人士，就不一定能那麼自在逍遙，也許你看他有私用司機開着高級轎車載他，進進出出地滿爲風光，但你卻不一定知道他內心正在爲着某些事業上的困擾而絞盡腦汁、口苦心機，到處奔波眠託。你可以準時下班，他却却在下班後逗留在辦公室裡，盤算着明天如何去調度三點半的燃眉之急。


    我曾經有過這麼一位被他當作長期廉價顧問的老板級朋友，他也算少年得志，三十出頭時，辭去民間某大企業的司機工程師以後，捲起衣袖以年輕人所擁有的堅苦卓絕的勇氣投入商場，當起一支可話、一張桌子、一個人的公司老板來，不知道是福至心口，或是行運使然，他竟然由一個當黑手的工程師，在幾年的慘淡經營之下，却也闖出頗具規模的雜貨出口公司，麾下已擁有廿多名業務人員在爲他賺錢效勞。


    一個人常常在太順利的時候，以爲賺錢是一項最容易不過的事，事業經營盡可恣意自如，在出口業績一直蒸蒸日上賺大錢新台幣之餘，竟幹起國際性藝術買賣'
  merge: -1
  pgno: 167
- img_proc: true
  md: '的生意。他透過某些地區國家經營某種當代藝術品的行商或經紀人，搜購版畫進口，賣給國內的富豪和喜附風雅的有錢人家。經營之初正逢台灣經濟成長快速，社會普遍賺錢多多的時候，因此這個生意又的確給他帶來了更多的金錢財富，也更刺激了他事業擴大經營的雄心，因此他為了作更多更大的生意，進一步和有志一同的朋友，合伙組成了另一家更具規模的專營這種藝術品的公司，以求求鴻圖大展。沒想到三年的經營結果，也許由於經營方式的不對，再加上以後幾年台灣工商業景氣的衰退，使那些本昂價買的藝術品，形同廢物地堆在倉庫。在長期脫售無門之下，形成事業經營上資金的積壓和短缺，利息也不勝長期的負擔，結果在合夥人設計的圈套之下，賴貨是出清了，但從此也負下巨額債務，更進一步地拖垮了原本經營得有聲有色的出口公司。


    我以爲他的失敗，除了命理上的因素以外，還犯上了企業經營上的某些大忌，對藝術品這個行業並不很在行，台灣市場也未達到那種大規模的經營水準，何況它不是生活上或是生產事業上的必要物品，它在市場上的需求屬於彈性很大的商品，需要時視同寶物，不要時如同廢物垃圾，以不甚內行去經營行家才能作好的事業，'
