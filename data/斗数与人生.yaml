  md: '四化星的正確應用


    四化的應用，在古傳典籍裡用得很單純，只有生年、大限和流年，用以代表每個時間階段的星曜現象，不但理念完整正確，而且應用時簡便而思路清晰。但時至近年，我們發現到四化的新理念和新用法，幾乎有百花齊放、百鳥爭鳴的熱鬧非凡現象。並且各派大師莫不提出高深莫測的大道理來，令人無所適從。本來，凡事在窮盡時，希冀能藉由變的道理達到通的目的，不但無可厚非，也是一種研究學問的應有態度。但是我們發現到，這些近年來所發衰和應用的四化大道理，根本離了譜，有點像孫悟空在歷經魔劫而仍不得解決時，就需請出如來佛一樣。當論命無法通達的時候，就以一種道通天地有形外、思入風雲變化中（王陽明的詩）的不知所云的大道理，拿來強作解說，正如了無居士曾說那是在淪命，而不是在依理推命。我們以


    為四化星的作用和應用，不能違背某些基本上的道理和法則。'
  merge: -1
  pgno: 240
- img_proc: true
  md: '第一，人是個有生命、有生長的階段的個體，而這種階段性，各有其特具現象。人生正如馬前卒，也許可以作短暫的停留，但只能往前走，而不能後退，因此人生一輩子裡不可能有時光的倒流。四化的作用現象，既然代表人生的每一個階段，它的任何一個天干四化作用，一輩子只能出現一次，不該重複出現，除非一個人的壽命能夠超過一百廿歲，才有可能碰到命盤中的四化使星曜在十二事項宮位上，能有重複作用的現象。也許正因爲這個理由，因此古今以來，在可靠的記錄上能長壽高於一百二十歲的老壽星，才會寥如晨星。


    斗數命盤用來論人的命理，人是有生命的個體，因此我們以爲命盤上的任何一個宮位，也是代表一種有生命活力的組合。既然是有生命的組合，它應該有其時間上的延續性，而不應該有它的重複性。


    第二，天干四化在本質方面有其必然的共同性，並無根本的差異性。比如一九八七年歲行丁卯，所有的命盤在流年上，都面對著共同的值星官，天干是丁當值，而地支是卯當值，所有的命盤都是太陰祿、天同權、天機科、巨門忌，而流年太歲都共同的在卯宮，並不會因人而有所不同。當然，在實際的論命裡，我們在考慮流'
  merge: -1
  pgno: 241
- img_proc: true
  md: '年的四化作用時，必須以先天命和大限為基礎，再來據以分析。因此我們只能說，

    在流年受到同樣四化星曜的影響之下，造成每一個人在命運上的不同表現，乃是牽

    涉到本命和大限的星曜組合（本命及大限四化的差別也應一併考慮），以及各個命盤在十

    二事項宮位的差異現象，才會有在同一流年裡，造成大家四化星雖一樣而命運卻互

    異的結果。


    但為了要理清這種差別的原因所在，我們只能說，不同命盤對丁卯流年四化上

    的感應，只是反應在事項宮位或地支宮位的差別，而不是天干四化本身的根本差異。


    當然，在兩個不同命盤上，由於所在事項宮位星曜的不同，而造成四化作用的互為

    差異，才造成不同結果。我們以爲這是十二事項宮位和星曜組合的問題，而不是流

    年太歲上，天干四化對不同命盤有不同四化作用，比方說，老張在丁年太陰化祿，

    老王在同樣的丁年一定也是太陰化祿，絕不會變成天同化祿。


    我們所以會提出這個問題，就因爲有部份的研習斗數者，在丁卯流年裡除了應

