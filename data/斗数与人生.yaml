    # 關於「斗數與人生」這本書


    《斗數與人生》是一本由紫雲先生親自口述，本社編輯部錄音整理的書。為了存真的緣故，在整理成文字時我們盡可能保留原來的口述風格，而不刻意加以修飾、雕琢。以這樣親切、自然的方式，把紫雲先生二十多年的斗數體驗原原本本的呈現出來，相信讀者會感覺自己就像面對紫雲先生，和他促膝深談斗數一樣。


    能聽紫雲先生深談斗數，是相當難得的機緣——這本口的內容，其實就是當年紫雲先生和恩耕了無居士師徒三人相互研討紫微斗數的基本主題。對於想要一窺斗數堂奧的讀者而言，《斗數與人生》的確是一本千載難求的啓蒙經典！


    卷上「斗數簡傳」，是紫雲先生探索斗數二十餘年的心路歷程：


    紫雲先生以第一人稱的口述方式現身說法，娓娓道出他為什麼要學習紫微斗數？是什麼樣的機緣，使他一腳踏進斗數的無窮天地，終至「無法自拔」？（見「斗數因緣」）；他怎樣學習斗數？如何從一個連子丑寅卯都無法順口唸出的門外漢變成一個狂熱的斗數研習者？（見「斗數的學習」）；他怎樣從日以繼夜的摸索和論命體驗中，悟出千年斗數的正確法則和理念？（見「斗數的探索和啟發」）；他怎樣打破歷來「象牙塔式」的斗數神話，把正確的斗數法則、理念和實際人生結合在一起？（見「斗數與實際人生」）；他怎樣從中國傳統醫理領悟出斗數星曜賦性的各種現象、宮位、組合的原理，並據以發展出一套前人未曾發現的斗數推演法則？（見「醫理和命理」）；他怎樣突破千年以來的斗數瓶頸，找出斗數命理在人際關係與六親緣份上互為因果的關鍵？（見「啓發和領悟」）……。


    卷下「斗數新理念」，是紫雲先生為千年斗數注入新觀念和新方法的具体說明：


    除了十二事項宮位的專題論述和各宮所附的命盤實例之外，其他像「星曜基本賦性和作用」、「各種『廟旺利陷』」、「四化的基本原理」、「四化星的正確應用」、「斗數推論的基本方法」、「斗數命理的本質」、「身宮的作用」……等等，每一個主題的論點幾乎都是翻遍古今所有斗數書籍也找不到的獨到見解。


