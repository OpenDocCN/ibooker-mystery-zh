    人體病痛雖，但要了解這個日新月異的大千世界，何當簡單？光以職業來說，


    當今的職業類別已不再是三百六十行，恐怕三萬六千行都數不清，因此在職業類型


    上，已不再是用簡單的木火土金水的五行所可以涵蓋的，因為有些時代性的行業，


    無論如何是無法把它的類型歸入任何一個五行當中，因此決難再以遵古泡製的方法，


    依五行來類分職別行業。命理假使不能跟上時代來闡釋它的新義，將會如同爺爺時


    代的老牛破車，遲早會送進民俗館，作後代子孫的博覽展品。


