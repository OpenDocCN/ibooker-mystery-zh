    關於「斗數與人生」這本書


    如果您是初學者，《斗數與人生》這本書可以完整而有系統的建立學習斗數的正確觀念；如果您已稍有基礎，這本書可以突破研習斗數的瓶頸；如果您自認對斗數頗有心得，這本書可以拓寬您的新視野、提高您論命的層次！


    當您讀完嚴耕的《紫微斗數開運全集》，然後回頭再讀幾遍紫雲先生的《斗數與人生》，您將更能掌握紫微斗數這門千年絕學的精髓！


    # 【附記】


    ① 本書除「斗數的新命理觀」（代序）、「芸公的命盤」（命身宮）的命例兩篇為紫雲先生親筆撰述之外，其餘各篇都是本社編輯部根據他的口述整理而成。


    ② 本書著重於斗數基本理念的反覆申述，在命盤推演的具體方法方面，僅作重點式的、原則性的析論。


    紫雲先生目前正以當代名人為論命主題，對於每一事項的原因、現象、結果都做具體深入的推論過程，讀者可以從他的精闢分析學到活盤論命的完整方法。敬請諷者拭目以待！


