- img_proc: true
  md: '熱井兼的太陽，而陰不限於只有折射光華的月亮，木非木頭，火非火燄，土非泥巴，金非金銀銅鐵，水非河川之流，五行之所指的是萬物所呈顯的各別特具的屬性，而在其不同的屬性之間可能引起的互相的作用，即所謂陰陽相輔與五行生剋制化的現象。


    中國古文明的這種陰陽五行的學說，由於典籍文字的艱澀難懂，竟造成了後人視之為荒誕無稽，認爲古人由於知識淺薄而造成的荒謬理論，豈知近代引爲推動現代文明的物理、生物與化學，都已明確的證實了，宇宙萬物間的個別物性和萬物（含生物）之間，所可能發生的關聯，存在着正如陰陽五行之說的現象。


    不知道是歪打正着，或是曲徑通幽，老實講，在近兩年的中醫夜間講座課程，對我這個架著老花眼鏡，一頭華髮的半老頭，決不是賞心悅事的好玩意，但這些醫學經典經過夫子的詳細講解後，確也獲益不少。我雖志不在學醫，但經由藥物學（本草備要）裡所獲知的藥物性質的一鱗半爪，却也讓我聯想起斗數星曜賦性之所以有其特殊作用的道理來！在《本草備要》（清·汪昂著）藥性總藏章節裡，所提到的諸藥入諸經（背景與異同之義），各藥物就其個別的功用品質、主治、禁忌、異同、炮製、使'
  merge: -1
  pgno: 46
