  md: '高級主管。由於常跑國外，特別是日本跑多了，竟和日本的廠商熱絡起來。後來在某日本廠商的默許之下，毅然辭去了原來的差事，接下了日本某機械採茶機的台灣獨家代理權。在一九七○年代，這是一項熱門的好生意，於是奠下了他以後事業鴻圖大展的基石。近十多年來，生意越作越大，不但代理國外多項商品引進國內銷售，繼而蓋起工廠，作起加工製造的生意來，出口產品銷遍五大洲。雖然他的公司仍屬中小企業型態，但我以爲他是台灣衆多中小企業經營成功的佼佼者，值得拿來做命理上的探討。


    一個人在企業經營上的成功，當然有他成功的條件，我們不是企業管理行家，無法把老林成功的道理以行家的行話來詳加剖析，但我們也可以藉斗數命盤行限運的趨勢傾向，來提供事業經營者在事業攻守之間作抉擇參考。


    老林命座武破在亥宮，會左右見魁鉞，身宮紫貪在卯，天魁同坐，會左右，是標準的雙料殺破狼格局。命宮陀羅，火星巳宮來會，身宮貪狼化忌空亡沖，且爲科權所輔，似乎把忌煞全化爲有用。老林平常不怒而威的一種天生的老板相，處事穩重中不失機敏變化，莊敬自強、處變不驚，也許正是老林的處理生意事務的最好寫'
