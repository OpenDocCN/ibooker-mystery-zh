    # 斗數薪傳

    [卷上]


    一門學術能溯遠流長，傳逾千年，必定有它的理由存在。斗數命理能夠隨著時代而發展，除了具有顛仆不破的進理外，更賴歷代有心人的發揚和薪傳。


    很遺憾的，由於近代中國受西方文明的衝擊，古術術數又遭到不明就裡者的輕視和扭曲，有識之士更因致私和秘傳的心理作祟，使這門斗數命理幾將失去真傳。


    筆者有幸，能得恩師的傳授，雖然個人受學甚限制，仍難貫通於萬一。但願不揣冒昧，以一己之得，公開於同好，藉更多人參與探討，使這門學術能發揚光大。


    ---


    ## 斗數因緣


    記得在一九八一年（辛酉年）春節放假回南部老家過年時，有一天在鄰居的一個族親家裡碰到了無居士。由於在座的都是族親，因此也就東聊西扯地擺起龍門陣，當時了無儱談一些稀奇古怪的見聞，我還以爲由於他從事幾年的記者生涯，所以才會見多開廣。沒想到假期一過，回台北上班後沒幾天，卻收到了他的著作「現代人的八字」和「關公作天公」。千萬也沒想到，在我腦海中多半還留著「放牛孩子」印象的毛頭小子，事過幾年不但練就生花妙筆的文才思格，且也研究起命理，丼著會立說起來了。


    由於好奇心，因此就在一次南下出差的機會，約定時間登門造訪，本來還存心想要試試這小生後跟究竟有何能耐，年紀輕輕的竟膽敢著書立說，還開起業餘命相館，爲人談禍福、論吉凶。在心裡有所打算之下，因此早就準備好一個命例，據'
