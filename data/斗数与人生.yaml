    # # 疾厄宮


    人吃五穀，怎能不生病？這是我在聽「易與中醫」講座時，有一位老夫子開宗明義，第一堂上課時講的第一句話，至今記憶猶新。儘管尖端的太空科技已經能把人送進太空遨遊，醫療科技也發展到器官的移植已易如機器的更換零件，可以使人延年益壽，但至今仍然不能醫好人們的所有病痛，大概正是老夫子所謂「人吃五穀焉能不生病」的道理。


    其實人的病痛不但名堂多，而且致病的原因也不少，不只限於吃五穀才會生病，若以一言概括，也許只有中醫學上所說的「內因外感」而致病，可以作籠統的說明。生老病死是人生過程的常態規則，一個人之生，誰也瞞不上要與否，老、死也是所有生命的無奈趨勢和終結。一個人所能有所企求與想避免的，唯有健康和不生病。一個人一旦宮上了罹天大症，就算把天底下的榮華富貴全歸給他，也無福享受。因'
