    宮、後天僕役宮（良辰吉位），武曲化忌是先天僕役宮、是後天財帛宮。己未年祿存在


    午、流羊在未、流陀在巳、武曲化權、文曲化忌。此一年內先後發生兩次因職員職


    責疏漏和無知失貨，給范老板帶來事業大災禍。在僕役宮方面，壬寅大限會先天僕'
