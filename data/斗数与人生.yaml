    命理談的是最現實的人間事，因此命理的推演和研判，不能光憑命盤上的現象而作純理論的高談闊論。一個人究竟能否成龍成鳳，除了命理上的因素以外，我們更應該考慮到現實層面的條件因素。命理因素固然重要，現實環境也是頗具關鍵性的重要條件。我們不能說，在當今之世，一個大學生只要行限上都具有利於出國留學的良好命理條件，只要他想出國留學，都可以辦得到。因為這種事不能單憑個人的條件和意願就可以達成，他所處的社會背景，和所要去的地方，往往也是一個主要的關鍵。


