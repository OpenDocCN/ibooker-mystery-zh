  md: '籠小屋，但却有餘力去接二連三地購買土地不動產。也許午宮另受三方四正諸多惡煞的沖擊影響，因此在這段期間的購地，大概不是跟人合買就是先貸款買地，以後分期償還，並不是大手筆的一人一次付款買清。但癸卯大限因買地所借的款項，據陳先生所說，都在癸卯大限間償清。


    由於小時家居房子簡陋，又受人口衆多擁擠之苦，因此陳先生幾年來一直把興建一棟比較像樣子的房子，作爲他生平的最大宿願。人的境遇有時很奇妙，在癸卯大限間，他同樣以借貸補足才向官方標購而得一塊不顯眼的土地，竟在癸卯大限末，規劃變成商業區，四十米寬的大馬路，就在他所標購而有的土地接鄰而過，馬路闢建之後，沿大道兩旁的高樓如雨後春筍般的蓋了起來。曾經有人要以原價五倍的價格向他買走這塊地，他一直不爲所動。


    到了甲子（一九八四）年，我曾經聽他提起想利用這塊土地興建大樓，只是當時興建資金還相差太多，遲遲不敢策劃興建。這時已四十三歲，大限入甲辰，也就是先天官祿宮。到了次年乙丑（一九八五）年，經得一位陳先生一張子引爲大恩人的財神爺，羅先生好像及時雨般地告訴他，現在正是建築界不景氣的時候，建材很便宜，'
