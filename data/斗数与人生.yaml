    談起古文明、提起歷史文化，我們國人常以擁有五千年的悠久歷史文化而驕傲。我們的確以老祖宗爲榮，但我們也太以不肖的後代子孫而感到無限遺憾！先人發明火藥，我僅止於炮竹的發展，指南針用來探龍脈尋吉地，紙張印刷術更是瞠乎西洋和扶桑之後。以五術來說，誰敢否認日韓在中醫藥的研究上，比我們更有前瞻性？剩下只有山、命、卜、相，也許他國還不甚了解個中奧秘，但更遺憾的是後代子孫却一直死抱不求甚解的秘傳訣竅，沾沾自喜、敝帚自珍，以爲憑這些就可以成爲人間的活神仙，足可爲人間解困脫離，因此使這些原本是老祖宗的高超智慧遺產，淪爲江湖術士養生糊口的工具，等而下焉者，用以騙財騙色，不僅使這些原本可以入殿堂以有益世道人心的學術，好似築了一道萬丈高牆，隔絕了殿堂之路，也開出了深不可測的鴻溝，阻斷了造福人類的通道。面對着無知的阿公阿婆、販夫走卒，與成爲軍事國防單位航空大公司的顧問，其差異之大，豈是你我所能想像？


    個人對斗數的狂熱，雖然并未因臨盤不知所云的困擾而消退，但在遍訪名師而不得機緣、到補習班聽課又被聘請當講師的經驗，在這種求教無門、到處碰壁的情形之下，儘管狂熱不減，但挫折之心却也難免。


    直到有一天接到鄉下一位族親寄來了他兒子的生辰八字（出生年月日時辰）、和三個女孩子的生辰資料，要我這個在他心目中學富五車的大學士，從命理的角度幫他提供意見，看看他兒子究竟要選那一家姑娘當媳婦比較妥當。我不知道這個族親究竟是爲了要省幾個娶媳婦請算命仙配八字的先生禮，或是信以爲眞地認定只有我這個在他心目中學貫中西又精通命理的飽學之士，才值得信賴？他根本不知道我當時對命理的所知，充其量也只能唬唬外行人，絕對還不敢去碰這個中國人自古以來，一向認爲必須慎乎其事的重要大事。


    因此這封信也就一直擺在家裡的樟頭案上，不敢輕易地動筆答覆，但族親的這個請託，我却也不敢淡而忘之，只是日夜盤繞在腦海裡窮研苦思，真有百思不得其解的挫折感。直到有一天，忽然想起當年與內人想要完成終身大事而稟告家父時，家父要我提供未來媳婦的生辰資料，以便選個黃道吉日迎娶新娘的往事。由於我當時的固執己見，言明我的事我自有主張，不會隨便去聽信算命先生的信口雌黃，因而引起家父的斥責。記得當時我一直堅拒提出新娘子的生辰資料，只告訴那一年出生，其他就不得而知，因此我和內人的婚禮就在一種不中不西的形式下，完成了大事。


    婚後廿多年來，內人給我的感覺，雖然仍不失中國傳統上宜室宜家的好媳婦，但我也从此沦为有其名而无其实的一家之长。我不知道追究竟是我命中注定，或是因我未经配八字和择取黄道吉日结婚，而招来的咎由自取？由于这段终身难忘的婚事，使我想起了自古以来，中国人在娶儿媳与选女婿时，都慎乎其事的请算命先生配婚的事，如今我已不再排斥命理之说，因此亦就觉得传之千古的婚配，应该会有他的道理存在。


    因此就把桌上存放多日的四个生辰资料排出命盘，试看看能否从以一对三的命盘中看出什么端倪，终于在几个夜晚的绞尽脑汁、搜索枯肠之后，把三个女命和男命在命理上的相配得失，扼要的写出，并在一个礼拜天约好何老师，带着命盘和论点择要，直赴剑潭（何老师已退居），当面聆聪教益。经过老师审阅当面呈上的择要后，在各个命盘就配婚方面的特异差别略有补充外，认为我那份择要尚称合理，不但没有违背斗数原理法则，并把婚配的要件全部考虑上了。


    经过老师道这么一番话以后，不但使我能向族亲交差，甚至从此导引我由配婚的道理，进一步思攷斗数命理在一般人际关系与六亲缘份上，互为因果的关键。进一念之间，开阔了我在斗数命理方面的一个新契机，我不敢学著阿姆斯壮一脚踏上月球時的那種豪言壯語——這是他的一小步，卻是人類的一大步。古希臘物理學家阿幾米德，有一天洗澡，身浸浴缸，看到缸裡的水滿溢而出，忽然忘其自身裸體，狂奔衝出戶外大喊：「我發現了！我發現了！」那種渾然忘我的喜悅，決非局外人所能體會；一身泡浴缸水滿而出，這是稀鬆平常的現象，但是阿基米德石光火花的靈機一動，卻悟出了物理學上比薩定理的大發現，奠定了往後物理學在相關學術的大放異彩。在斗數方面的這一項領悟，雖然我不敢和這位千古的大師和太空專家的大英雄比擬，但歡愉之心却也離形之於言詞。


    斗數涉及人際關係方面的探討法則，個人經過一段不短時間的推演後，又透過同好者不斷的嘗試運用，共同發現到這些原理法則確實有相當程度的可用性。


    **無常**，畢竟和具有其固定性和必然性的物理現象有別。因此，從事斗數理論和實務的探討，我們不能以自然科學的尺度來等量齊觀。命理之學若一定要分門別類，也只能列入極其廣泛的人文科學；而在人文科學的範圍裡，古今以來似乎只有學說上的主張，而沒有類似物理化學方面的那種頭摸不破的定律存在。


    **緣起緣滅**，因果循環。其實世上每件事物的存在，自有其存在的道理或因緣。


    啟發和頓悟


    大至宇宙星雲的運行，小如個人一生的得失遭遇，無不有其存在與造成現象的充份理由。從命理的法則來說，我們不可能憑空的光依一個人的八字或斗數命盤，就高談濶論，大言這個命造必定如何。生辰資料依程式所排出來的四柱八字或命盤，充其量只能說，它是代表這個時辰出生的人在命理上的所屬類型。


    若以聰明才智為標準來劃分，也許硬是可以分出甲乙丙丁等級的不同差別來，正如近代測定學童的智商，以因高智商或資賦優異而施以特殊教育，來造化特殊人才。在教育上這個方式不失爲一個很理想與可行的途徑，但若我們從教育的另一個觀點來觀察，一個人從小雖然具備有極高的智商、極佳的優異資賦，並施以教育或訓練，也只能代表他們領悟力比較好，因此學習能力比較高、比較快，但並不意味將來他們在任何一方面或特殊的某一方面，有必然的某種界定以上的成就。因爲人畢竟是有生命的個體，一個有生命的個體，在他一生的過程之中必定會受周遭環境的影響。


    數千年的老神木，它可以傲視人間千百世，但并不意味着，同科同屬同種的松柏，不管生長在什麼環境都會成爲屹立千古的老神木，這也是老神木珍貴的地方。


    一個人打從呱呱墜地開始，從幼而小，從小而大，在整個成長過程中，可遇的周遭環境，比起一棵老神木要複雜多了，而不是只關係著土壤、氣候、溫度、濕度、沒遇到特別的天然災害，就有可能成爲千年老神木。我們意不在以生命的長短和神木來相提並論，我們只是用以比喻一個人一罐子的成就，除了大自然的環境和神木有某些共同點之外，還參有更錯綜複雜的、屬於人類特有的時代與文化背景。在同一地區，由於時代的不同，人們所接觸到的，不盡屬於大自然的條件，環境的不同，人文方面差異更大；就是在同一時代裡，更因地域的相異，而有截然兩樣的人文和自然環境的差別。就是以隔鄰而居的張林兩家，儘管大社會的環境完全相似，却因家庭背景的淵源不同，我們自難肯定張林兩家有必然性的家庭狀況。


    若再以遺傳學上的了解，儘管同父母所生長的子女，每個子女亦會由於遺傳因子不同，而造成資賦的個別差異，何況，後天又有屬於其個體的特殊遭遇！因此，我們很難斬釘截鐵地說，只要具備那些條件，一個人便會變成怎麼個樣子。我們只能說，一個人若具備了某些條件，很可能會變成怎麼個樣子。李政道、李哲遠這兩位爲中國人揚眉吐氣的諾貝爾獎得主，我們知道，他們的兄弟也都在學術界頗負盛名，但我們似乎很難冀求他們的兄弟亦都能夠個個抱個諾貝爾獎回來。我們認爲這不全是資賦的問題，更應該重視的是他們各人在學術上所走的路線與環境的差別。


    尤其是個人學術價值觀上的認定結果。


    楊傳廣和紀政在田徑方面臻於國際水準的成就，我們也可以作比較上的幾種肯定。首先，他們必須具備田徑運動的優越體魄；在適當的機會接受最好的訓練；同時，他們也必須具備一般成功者不可或缺的毅力與全力以赴的、堅苦卓絕的意志。


    這些條件缺一不可。我們不能夠說：「在衆多的中國人口裡，只有他們兩個夠得上資賦優異。」運動員誰不想在奧林匹克揚名立萬？但能因緣際會集一切必要的條件於一身的，到目前為止，僅見的只有他兩人。


    這可以說明，事體的存在，必有其存在的必然道理；而這些必然性不管在同樣的一個人、或不同的兩個人，往往由於些微的差異而造成截然不同的結果。若以人生與一切事物的因緣起滅，或因果循環而言，何者是因的起？何者是緣的滅？那件是因？那件是果？往往是一體的兩面；很難有明確的劃分。


    也許起與滅、因與果之間，根本就存著一種相互循環的關係。儘管如此，但從這個循環的觀點來探討命理上人事的千絲萬縷，是否就能萬無一失呢？也許能描繪出它相互間的相關軌跡，也許很難理出個所以然來。人生就算百歲，但寄旅倥偬，如何能以有限之年去洞徹天地間的奧秘於萬一，有識之士只能學着老驥伏櫪，心存盡其在之心。


    莊子有言：吾生也有涯，而知也無涯。我想，這正是我斗數生涯二十多年來，與日俱增的感受。


    ## 斗數新理念


    [卷下]


    人們的生活方式，隨着環境而改變。人亦不能離群而獨居，因此任何人的生活就會受到所處環境的影響。


    古今以來，每個時代人們的生活方式都不盡相同，生活的理念自然會有差異，所以古往今來命概念應該不會完全相似。


    斗數的基本道理可以彌久常新但必須注入新時代的新觀念和新方法否則這套祖命法則將會不符時代所用而被淘汰。


    ## 命身宮


    假定斗數命理的程式和規則起之於五代末，由陳希夷築大成而制定，井且經過歷代高人修訂和增補，但命理究竟談的都是人間的衆生相，而衆生古往今來唯一千古不變的，就是「有生必有死」。除此之外，在追段生與死之間的生活形態，歷代有著太多太多的變化！也許，變化是漸近的，在短期間并不明顯，但我們總不能說，古人與今人在一輩子裡過的都是極其類似的生活型態。


    由時代的演進，思想文化的改變，使政治制度、社會思想及習俗，必然跟着變遷。因此，我們可以肯定在每一段時空裡，人們實際上的生活方式、生活索求，必定歷代有所不同。人是過着群居性的社會生活，絕難脫離社會而獨自生存，因此這種由時代性而形成的社會生活模式，必定會影響那個時代社會全體人們的生活方式。


    這種實際現象的存在事實，使我們必須放應到，古傳命理在面對着當前與古社會截然不同的現象，如何以古理論今事的可能性和適合性。我們儘管能把古傳的賦文倒背如流，但若食古不化，將會使古傳的命理法則與當今世代格格不入。因為，最竟人、事與環境，古昔和今日已有太多的變化，不但是有形的典章制度和無形的思想觀念有所差異，幾乎所有方面都大不相同，因此實際的斗數論命，必須要符合時代的論法。


    在我學習斗數的廿多年裡，不管是閒暇之餘玩票性質的論命，或是和同好間的斗數討論，經常發現到有太多傳統上牢不可破的落伍觀念。碰到對古有觀念比較執著的人，無論如何，就算你能有舌燦蓮花之能，你都沒有辦法讓他接受新理念論析上的觀點。這種情形，若是發生在對一般命理毫無概念的人還沒話說，但對於斗數同好，就會使你氣結慨歎。我們不能不承認，有些也許因古藉上的文字艱澀難懂，致有所曲解，那倒也罷了，偏偏是，明明以一些極其淺顯的常識，就可以分辨道理何在的事，却總是意識不明，讓人以爲他的知識仍舊停留在不經現代文明教育洗禮的半開化社會，這未免太說不過去！


    且以斗數命盤來說，論命必先察命、身兩宮的組合格局，經山這兩個重點宮位再作整個命盤推論和分析。這個原則，古今以來大概都不會變。但是命、身宮的組合結構如何，甚至任何一個命盤的排列和組合如何，在命理上只代表「屬性」上的「類型」，並不意味着這個人由於命身宮具備這種組合格局，他將來必定會怎麼樣。


    每個人固然有其先天稟賦的特別條件，我們大體上可由命身宮和整個命盤上，大略看出端倪，但決不可據以鐵口直斷，斬釘截鐵地肯定這個人必定如何。田徑名將楊傳廣先生和紀政女士在他們年輕時，經過體育專家看過他們在田徑方面的良好表現後，都肯定這兩人若能假以良好的嚴格訓練，將來必定會在國際的田徑界上有傑出的表現。事後的證明，果真如此。


    因此在命理上，我們可以這麼說，因為他們具備這種「類型」，更重要的，他們又得到了所屬「類型」上充分發揮的良好機緣，因此他們才能如此。因此，先天的條件和後天的條件，幾乎是缺一不可。我們可以肯定的說，若沒有先天的條件，而一些身高不滿一百七十公分，甚至不具運動細胞的人，就算接受再好的訓練，絕對不可能在十項（或五項）全能運動上，有超國際水準的演出，正如楊、紀兩人曾經締下的佳績。


    有位年輕的朋友曾經提起，命（身）宮陽梁昌祿的人，在當今的社會裡，是否必能順利的讀到博士學位？對於這個問題，我們只能說，這個人他一定要出生在教育制度普遍和完整的社會，他還要出生在一個容得了他上學，受正規學校教育的家庭，最好又是比較重視子女教育的家庭，那麼由於天資聰穎和好學，一旦環境配合得上，不但在現代拿個碩士博士，易如反掌，就是在科學時代，若能十年寒窗苦讀，最起碼的進士及第，應該不致有問題。


    這正是命理上的條件，所謂先天的稟賦，和後天可能的機運和力行，而不是命格好，這個人將來必定如何飛黃騰達，命格壞的就導致如何得坎坷遭殃。因此，我們也可以肯定，在亞馬遜河文明未開的土著，儘管生個智商高達一百六十以上的孩子，或者是陽梁昌祿的上上格局，只要他一輩子與文明社會絕緣，只要他一輩子都住在跡近洪荒未開的地方，那麼他在聰明才智上的表現，或許比其他同族的人更擅於漁獵，抓魚鳥、獵走獸的技術特別好罷了。


    他一輩子的遭遇和表現，絕對和文明社會的一般人無法相提幷論。其實在整個斗數的論命上，不只由命（身）宮的格局必須作如此說，就是其他宮位，亦得如此論。


    我曾經不厭其煩地舉化學反應的例子，用以說明命理上的道理。銅，可以溶在鹽酸、硫酸和硝酸裡，一塊銅片，若把它比之如人的命格（命盤），在這銅片還沒投入任何溶劑以前，它是一塊純銅，一旦投入不同的溶劑，銅片在酸溶劑裡頭，必定會產生不同的化合物（氯化銅、硫酸銅和硝酸銅）。這也正可以說，同樣的一個命格或是命盤，在不同的'
  mdcn: '結合各種專家，所以其理也真，其道也明，且極其科學，一切都可以拿出證實、一切都可以經由無數案例中得到明證，因此他們的研究報告可以得到有識者的信任與採用。據說這個機構現在已做起政府和航空公司的生意，諸如軍方派遣飛行員出任務、航空公司調派飛行機師、何時飛航、何時休假，都可以依據資料，做最適當的決定。


    我個人當然不曾看過這種文獻或報告，但不因爲這是許博士如此說我才相信。


    我以爲這是絕對行得通的一條路。他們既然根據一個人的資料，將所有會造成或影響到一個人生理機能和心理情緒變化的各種相關因素加以統計、研判，再運用醫學上已知的，人在心理和生理週期起伏變化的道理，一定可以找出其中互爲因果的關係來。因此這個絕對不是神話，而是有理可尋、有象可徵的事實。這正是集合各種學術之長的上乘結晶，儘管這個學術還僅是個起步，但絕對是人類史上值得大寫特書的大貢獻。


    談起古文明、提起歷史文化，我們國人常以擁有五千年的悠久歷史文化而驕傲。我們的確以老祖宗爲榮，但我們也太以不肖的後代子孫而感到無限遺憾！先人發明火藥，我僅止於炮竹的發展，指南針用來探龍脈尋吉地，紙張印刷術更是瞠乎西洋和扶桑之後。以五術來說，誰敢否認日韓在中醫藥的研究上，比我們更有前瞻性？剩下只有山、命、卜、相，也許他國還不甚了解個中奧秘，但更遺憾的是後代子孫却一直死抱不求甚解的秘傳訣竅，沾沾自喜、敝帚自珍，以爲憑這些就可以成爲人間的活神仙，足可爲人間解困脫離，因此使這些原本是老祖宗的高超智慧遺產，淪爲江湖術士養生糊口的工具，等而下焉者，用以騙財騙色，不僅使這些原本可以入殿堂以有益世道人心的學術，好似築了一道萬丈高牆，隔絕了殿堂之路，也開出了深不可測的鴻溝，阻斷了造福人類的通道。面對着無知的阿公阿婆、販夫走卒，與成爲軍事國防單位航空大公司的顧問，其差異之大，豈是你我所能想像？


    個人對斗數的狂熱，雖然并未因臨盤不知所云的困擾而消退，但在遍訪名師而不得機緣、到補習班聽課又被聘請當講師的經驗，在這種求教無門、到處碰壁的情形之下，儘管狂熱不減，但挫折之心却也難免。


    直到有一天接到鄉下一位族親寄來了他兒子的生辰八字（出生年月日時辰）、和三個女孩子的生辰資料，要我這個在他心目中學富五車的大學士，從命理的角度幫他提供意見，看看他兒子究竟要選那一家姑娘當媳婦比較妥當。我不知道這個族親究竟是爲了要省幾個娶媳婦請算命仙配八字的先生禮，或是信以爲眞地認定只有我這個在他心目中學貫中西又精通命理的飽學之士，才值得信賴？他根本不知道我當時對命理的所知，充其量也只能唬唬外行人，絕對還不敢去碰這個中國人自古以來，一向認爲必須慎乎其事的重要大事。


    因此這封信也就一直擺在家裡的樟頭案上，不敢輕易地動筆答覆，但族親的這個請託，我却也不敢淡而忘之，只是日夜盤繞在腦海裡窮研苦思，真有百思不得其解的挫折感。直到有一天，忽然想起當年與內人想要完成終身大事而稟告家父時，家父要我提供未來媳婦的生辰資料，以便選個黃道吉日迎娶新娘的往事。由於我當時的固執己見，言明我的事我自有主張，不會隨便去聽信算命先生的信口雌黃，因而引起家父的斥責。記得當時我一直堅拒提出新娘子的生辰資料，只告訴那一年出生，其他就不得而知，因此我和內人的婚禮就在一種不中不西的形式下，完成了大事。


    婚後廿多年來，內人給我的感覺，雖然仍不失中國傳統上宜室宜家的好媳婦，但我也从此沦为有其名而无其实的一家之长。我不知道追究竟是我命中注定，或是因我未经配八字和择取黄道吉日结婚，而招来的咎由自取？由于这段终身难忘的婚事，使我想起了自古以来，中国人在娶儿媳与选女婿时，都慎乎其事的请算命先生配婚的事，如今我已不再排斥命理之说，因此亦就觉得传之千古的婚配，应该会有他的道理存在。


    因此就把桌上存放多日的四个生辰资料排出命盘，试看看能否从以一对三的命盘中看出什么端倪，终于在几个夜晚的绞尽脑汁、搜索枯肠之后，把三个女命和男命在命理上的相配得失，扼要的写出，并在一个礼拜天约好何老师，带着命盘和论点择要，直赴剑潭（何老师已退居），当面聆聪教益。经过老师审阅当面呈上的择要后，在各个命盘就配婚方面的特异差别略有补充外，认为我那份择要尚称合理，不但没有违背斗数原理法则，并把婚配的要件全部考虑上了。


    经过老师道这么一番话以后，不但使我能向族亲交差，甚至从此导引我由配婚的道理，进一步思攷斗数命理在一般人际关系与六亲缘份上，互为因果的关键。进一念之间，开阔了我在斗数命理方面的一个新契机，我不敢学著阿姆斯壮一脚踏上月球時的那種豪言壯語——這是他的一小步，卻是人類的一大步。古希臘物理學家阿幾米德，有一天洗澡，身浸浴缸，看到缸裡的水滿溢而出，忽然忘其自身裸體，狂奔衝出戶外大喊：「我發現了！我發現了！」那種渾然忘我的喜悅，決非局外人所能體會；一身泡浴缸水滿而出，這是稀鬆平常的現象，但是阿基米德石光火花的靈機一動，卻悟出了物理學上比薩定理的大發現，奠定了往後物理學在相關學術的大放異彩。在斗數方面的這一項領悟，雖然我不敢和這位千古的大師和太空專家的大英雄比擬，但歡愉之心却也離形之於言詞。


    斗數涉及人際關係方面的探討法則，個人經過一段不短時間的推演後，又透過同好者不斷的嘗試運用，共同發現到這些原理法則確實有相當程度的可用性。


    **無常**，畢竟和具有其固定性和必然性的物理現象有別。因此，從事斗數理論和實務的探討，我們不能以自然科學的尺度來等量齊觀。命理之學若一定要分門別類，也只能列入極其廣泛的人文科學；而在人文科學的範圍裡，古今以來似乎只有學說上的主張，而沒有類似物理化學方面的那種頭摸不破的定律存在。


    **緣起緣滅**，因果循環。其實世上每件事物的存在，自有其存在的道理或因緣。


    啟發和頓悟


    大至宇宙星雲的運行，小如個人一生的得失遭遇，無不有其存在與造成現象的充份理由。從命理的法則來說，我們不可能憑空的光依一個人的八字或斗數命盤，就高談濶論，大言這個命造必定如何。生辰資料依程式所排出來的四柱八字或命盤，充其量只能說，它是代表這個時辰出生的人在命理上的所屬類型。


    若以聰明才智為標準來劃分，也許硬是可以分出甲乙丙丁等級的不同差別來，正如近代測定學童的智商，以因高智商或資賦優異而施以特殊教育，來造化特殊人才。在教育上這個方式不失爲一個很理想與可行的途徑，但若我們從教育的另一個觀點來觀察，一個人從小雖然具備有極高的智商、極佳的優異資賦，並施以教育或訓練，也只能代表他們領悟力比較好，因此學習能力比較高、比較快，但並不意味將來他們在任何一方面或特殊的某一方面，有必然的某種界定以上的成就。因爲人畢竟是有生命的個體，一個有生命的個體，在他一生的過程之中必定會受周遭環境的影響。


    數千年的老神木，它可以傲視人間千百世，但并不意味着，同科同屬同種的松柏，不管生長在什麼環境都會成爲屹立千古的老神木，這也是老神木珍貴的地方。


    一個人打從呱呱墜地開始，從幼而小，從小而大，在整個成長過程中，可遇的周遭環境，比起一棵老神木要複雜多了，而不是只關係著土壤、氣候、溫度、濕度、沒遇到特別的天然災害，就有可能成爲千年老神木。我們意不在以生命的長短和神木來相提並論，我們只是用以比喻一個人一罐子的成就，除了大自然的環境和神木有某些共同點之外，還參有更錯綜複雜的、屬於人類特有的時代與文化背景。在同一地區，由於時代的不同，人們所接觸到的，不盡屬於大自然的條件，環境的不同，人文方面差異更大；就是在同一時代裡，更因地域的相異，而有截然兩樣的人文和自然環境的差別。就是以隔鄰而居的張林兩家，儘管大社會的環境完全相似，却因家庭背景的淵源不同，我們自難肯定張林兩家有必然性的家庭狀況。


    若再以遺傳學上的了解，儘管同父母所生長的子女，每個子女亦會由於遺傳因子不同，而造成資賦的個別差異，何況，後天又有屬於其個體的特殊遭遇！因此，我們很難斬釘截鐵地說，只要具備那些條件，一個人便會變成怎麼個樣子。我們只能說，一個人若具備了某些條件，很可能會變成怎麼個樣子。李政道、李哲遠這兩位爲中國人揚眉吐氣的諾貝爾獎得主，我們知道，他們的兄弟也都在學術界頗負盛名，但我們似乎很難冀求他們的兄弟亦都能夠個個抱個諾貝爾獎回來。我們認爲這不全是資賦的問題，更應該重視的是他們各人在學術上所走的路線與環境的差別。


    尤其是個人學術價值觀上的認定結果。


    楊傳廣和紀政在田徑方面臻於國際水準的成就，我們也可以作比較上的幾種肯定。首先，他們必須具備田徑運動的優越體魄；在適當的機會接受最好的訓練；同時，他們也必須具備一般成功者不可或缺的毅力與全力以赴的、堅苦卓絕的意志。


    這些條件缺一不可。我們不能夠說：「在衆多的中國人口裡，只有他們兩個夠得上資賦優異。」運動員誰不想在奧林匹克揚名立萬？但能因緣際會集一切必要的條件於一身的，到目前為止，僅見的只有他兩人。


    這可以說明，事體的存在，必有其存在的必然道理；而這些必然性不管在同樣的一個人、或不同的兩個人，往往由於些微的差異而造成截然不同的結果。若以人生與一切事物的因緣起滅，或因果循環而言，何者是因的起？何者是緣的滅？那件是因？那件是果？往往是一體的兩面；很難有明確的劃分。


    也許起與滅、因與果之間，根本就存著一種相互循環的關係。儘管如此，但從這個循環的觀點來探討命理上人事的千絲萬縷，是否就能萬無一失呢？也許能描繪出它相互間的相關軌跡，也許很難理出個所以然來。人生就算百歲，但寄旅倥偬，如何能以有限之年去洞徹天地間的奧秘於萬一，有識之士只能學着老驥伏櫪，心存盡其在之心。


    莊子有言：吾生也有涯，而知也無涯。我想，這正是我斗數生涯二十多年來，與日俱增的感受。


    ## 斗數新理念


    [卷下]


    人們的生活方式，隨着環境而改變。人亦不能離群而獨居，因此任何人的生活就會受到所處環境的影響。


    古今以來，每個時代人們的生活方式都不盡相同，生活的理念自然會有差異，所以古往今來命概念應該不會完全相似。


    斗數的基本道理可以彌久常新但必須注入新時代的新觀念和新方法否則這套祖命法則將會不符時代所用而被淘汰。


    ## 命身宮


    假定斗數命理的程式和規則起之於五代末，由陳希夷築大成而制定，井且經過歷代高人修訂和增補，但命理究竟談的都是人間的衆生相，而衆生古往今來唯一千古不變的，就是「有生必有死」。除此之外，在追段生與死之間的生活形態，歷代有著太多太多的變化！也許，變化是漸近的，在短期間并不明顯，但我們總不能說，古人與今人在一輩子裡過的都是極其類似的生活型態。


    由時代的演進，思想文化的改變，使政治制度、社會思想及習俗，必然跟着變遷。因此，我們可以肯定在每一段時空裡，人們實際上的生活方式、生活索求，必定歷代有所不同。人是過着群居性的社會生活，絕難脫離社會而獨自生存，因此這種由時代性而形成的社會生活模式，必定會影響那個時代社會全體人們的生活方式。


    這種實際現象的存在事實，使我們必須放應到，古傳命理在面對着當前與古社會截然不同的現象，如何以古理論今事的可能性和適合性。我們儘管能把古傳的賦文倒背如流，但若食古不化，將會使古傳的命理法則與當今世代格格不入。因為，最竟人、事與環境，古昔和今日已有太多的變化，不但是有形的典章制度和無形的思想觀念有所差異，幾乎所有方面都大不相同，因此實際的斗數論命，必須要符合時代的論法。


    在我學習斗數的廿多年裡，不管是閒暇之餘玩票性質的論命，或是和同好間的斗數討論，經常發現到有太多傳統上牢不可破的落伍觀念。碰到對古有觀念比較執著的人，無論如何，就算你能有舌燦蓮花之能，你都沒有辦法讓他接受新理念論析上的觀點。這種情形，若是發生在對一般命理毫無概念的人還沒話說，但對於斗數同好，就會使你氣結慨歎。我們不能不承認，有些也許因古藉上的文字艱澀難懂，致有所曲解，那倒也罷了，偏偏是，明明以一些極其淺顯的常識，就可以分辨道理何在的事，却總是意識不明，讓人以爲他的知識仍舊停留在不經現代文明教育洗禮的半開化社會，這未免太說不過去！


    且以斗數命盤來說，論命必先察命、身兩宮的組合格局，經山這兩個重點宮位再作整個命盤推論和分析。這個原則，古今以來大概都不會變。但是命、身宮的組合結構如何，甚至任何一個命盤的排列和組合如何，在命理上只代表「屬性」上的「類型」，並不意味着這個人由於命身宮具備這種組合格局，他將來必定會怎麼樣。


    每個人固然有其先天稟賦的特別條件，我們大體上可由命身宮和整個命盤上，大略看出端倪，但決不可據以鐵口直斷，斬釘截鐵地肯定這個人必定如何。田徑名將楊傳廣先生和紀政女士在他們年輕時，經過體育專家看過他們在田徑方面的良好表現後，都肯定這兩人若能假以良好的嚴格訓練，將來必定會在國際的田徑界上有傑出的表現。事後的證明，果真如此。


    因此在命理上，我們可以這麼說，因為他們具備這種「類型」，更重要的，他們又得到了所屬「類型」上充分發揮的良好機緣，因此他們才能如此。因此，先天的條件和後天的條件，幾乎是缺一不可。我們可以肯定的說，若沒有先天的條件，而一些身高不滿一百七十公分，甚至不具運動細胞的人，就算接受再好的訓練，絕對不可能在十項（或五項）全能運動上，有超國際水準的演出，正如楊、紀兩人曾經締下的佳績。


    有位年輕的朋友曾經提起，命（身）宮陽梁昌祿的人，在當今的社會裡，是否必能順利的讀到博士學位？對於這個問題，我們只能說，這個人他一定要出生在教育制度普遍和完整的社會，他還要出生在一個容得了他上學，受正規學校教育的家庭，最好又是比較重視子女教育的家庭，那麼由於天資聰穎和好學，一旦環境配合得上，不但在現代拿個碩士博士，易如反掌，就是在科學時代，若能十年寒窗苦讀，最起碼的進士及第，應該不致有問題。


    這正是命理上的條件，所謂先天的稟賦，和後天可能的機運和力行，而不是命格好，這個人將來必定如何飛黃騰達，命格壞的就導致如何得坎坷遭殃。因此，我們也可以肯定，在亞馬遜河文明未開的土著，儘管生個智商高達一百六十以上的孩子，或者是陽梁昌祿的上上格局，只要他一輩子與文明社會絕緣，只要他一輩子都住在跡近洪荒未開的地方，那麼他在聰明才智上的表現，或許比其他同族的人更擅於漁獵，抓魚鳥、獵走獸的技術特別好罷了。


    他一輩子的遭遇和表現，絕對和文明社會的一般人無法相提幷論。其實在整個斗數的論命上，不只由命（身）宮的格局必須作如此說，就是其他宮位，亦得如此論。


    我曾經不厭其煩地舉化學反應的例子，用以說明命理上的道理。銅，可以溶在鹽酸、硫酸和硝酸裡，一塊銅片，若把它比之如人的命格（命盤），在這銅片還沒投入任何溶劑以前，它是一塊純銅，一旦投入不同的溶劑，銅片在酸溶劑裡頭，必定會產生不同的化合物（氯化銅、硫酸銅和硝酸銅）。這也正可以說，同樣的一個命格或是命盤，在不同的'
