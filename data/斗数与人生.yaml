    人興口同聲的作如此問法。


    我們以爲在職業類別上，若以職業功能作爲歸類，應該可以分爲生產事業、服務業和買賣業三大類；若以職業機構歸屬來分，則可分爲官方和民間機構：以職務功能來分別，則爲利文職或利武職。利文在官方則爲文官或文職的行政人員，在民間則主公司行號的行政業務管理，利武在官方即爲軍、警、刑、法職務，在民間則


