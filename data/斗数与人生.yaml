- img_proc: true
  md: '得到家庭妥善的教养，使他的人格趋于正常，稍大得受正规的教育，使他学有专长，长大进入一个产业发达的社会环境里，应该比较有他立足和发挥的余地。相反的，若他是在一个破碎的家庭长大、从小没得到好教养，使他的人格趋于偏激，以后又没受较好的教育，当他进入社会，他将会无所适从。这种教养和教育，往往是造成和影响到一个人一生的命运走向，我们当然不会以为完全是一种天生注定的命理安排。


    再如以一个已开发国家，人民的高水平教育和高水准的国民所得，来和开发中国家，一般国民的较低教育水准与较低的国民所得作比较，我们会发现，大部份高所得的国家人民，都因为他们有高水平的学校教育（以现在发达的国家除外）。又如，一个国家国民的平均寿命长短，一定和他的生活品质、医疗条件、环境卫生的良劣，有相对性的关联。凡此种种，绝不是单由命理因素所造成。


    因此我们发观到，几乎所有的命理现象都不能排除这些环境和实际遭遇的因素，而这些因素都是一般常识，丝毫不是玄虚不可理解的现象。


    斗败命理，既然不能把人生实际遭遇排除于不顾，以致和实际人生形成严重脱


