- md: '## 事業經營與命理診斷的差異


    在事業經營上，我們可以將前者類分於買口業，而後者屬於生產事業，兩者不只事業型態不一致，在管理經營上也不一致，可能發生的有利條件和不利困難，根本就大不相同。


    近觀職業類型的差異，不只一般工商企業管理顧問的診斷方法不同，而且在診斷後對應與應革的建議上差異更大。而在命理方面，我們以爲儘管在職業類型方面，近代斗數命理的研習者已能將星曜組合情況，作爲事業類型的理論分類，但並不能肯定某一種星曜類型，必定從事於某種行業。因爲一個人對所從事的行業，往往都是集合很多的條件和原因，而不一定全是想怎麼樣就能怎麼樣的充分自由意願；但這些條件也好、原因也好、意願也罷，常常是因人而異。


    在斗數的命盤上，並沒能充分顯出這些種種現象來。而這些種種現象，卻成爲我們根據斗數命盤依理推論的必要根據資料。若缺乏這些資料的輸入，我們無論如何不能單靠命盤的星曜組合現象，就能談出與事實相符合的命理道理來。


    就以買口業和生產事業來說，在斗數命盤上顯示之有利星曜的結構並不相同，因此一個有利於從事買口業的人，並不意味著他一定也能經營生產事業而同樣順利。賺錢，反之亦然。這種命理的現象，和實際的工商業經營一樣。要不然，天下間的老板，豈不都全部同時經營好多不同類型的公司？而旗下的事業，也不會有兩個賠了、只有一個賺了錢的現象！


    再以感情和婚姻來說，當一個問命者提出「夫妻宮」方面的問題時，我們更有必要就他（她）想要知道的問題先問清楚。一個未婚者，他（她）可能想要知道什麼時候才有結婚的希望，也可能問他在好幾個追求者的名單上，哪一位是比較理想的對象；也可能是感情受到波折或是形成三角甚至多角競爭時，應該要怎麼辦？反正感情的問題多得叫局外人無從理解和數不清。對於已婚者，可能問到婚姻道上的和諧問題，能否白頭偕老？婚姻已亮起紅燈，可能是彼此的感情融洽問題，也許是某一方面不貞的外遇問題、金錢問題、健康問題、生育問題……太多叫清官亦難斷的家務事，都會造成婚姻上的波折。我們以爲當問命者指出問題所在後，論命者有必要要求知道所要探討事項的相關資料，先行問清楚，然後把這些資料根據命盤的星曜現象，依理推論，再加判斷。


    我曾經在一個聽人高談闊論的龍門陣裡，聽到一位年輕的命理大師斬釘截鐵、口出狂言地說：「陳先生你今年財庫大破財，必將大破財無疑！」沒想到陳先生冷冷地問說：「我今年除了經營多年的一家公司以外，偶爾亦玩玩股票、炒炒地皮、放錢生利息，有時也在期貨上押押寶，你說我在那一項會賠錢？該不會都賠錢吧！」很難形容當時這位年輕大師啞口無言的表情。


    簡單地說，過去的什麼，造成現在的什麼，現在的什麼又將造成以後的什麼。這種事理現象的趨勢，可以說是因果關係（在此並不指涉一般宗教上「善惡因果」的概念），不只命理上如此，醫生診病及以後的處方療病、企業管理上的診斷和策劃，無不都採行這個道理和方法。我們搞現代命理的人，假使不採用這種理念和方法，而總是抱殘守缺地只知道使用一些老舊祕訣，將如江湖老郎中，只靠幾帖秘方來爲人治病，永遠無法和現代大醫院裡的醫生可比。江湖郎中除了那幾帖秘方可適症而醫外，對絕大部份的病痛，都束手無策。很遺憾的，在當前的斗數命理界，到處充斥著類似這種江湖郎中的斗數大師，不但掛牌論命，如同天上掉下來的活神仙，而且廣收門徒，纔是教些連自己都不知所云的大道理。


    但算命有時不能單憑一個人的生辰資料排上斗數命盤，就可以頭頭是道、無不個個中鈞的論對。曾經在某個大醫院裡，傳出這麼一個杏壇笑話：有個病人到某大醫院的門診去看病，當門診醫生看清楚病歷表後，原來是一個初診的病人。病歷表除了個人最基本的性別、姓名、地址、年齡、體重以外，其他甚麼都沒有。因此醫生帶著一種職業性的口吻問病人說：「那個地方不舒服？」醫生的這種口吻，幾乎是千篇一律的一句問話，除非是外伤急救或是昏迷不醒人事，没办法回話（小孩還有大人陪去可问），但千萬也没想到，病人竟冷冷的说：「你看我那裡不舒服嘛！」這位门诊医师行医改年，诊治的病患也不晓得有几万人，但听到病人的這麼一句话，倒是第一次。因此，脑筋不禁一楞，他话也不再问下去，却要在旁助理的护士小姐帮他搬一个电话，请农学院的某某教授回话。等电话接通后，只听到医生在电话中客约地说：「我這裡有个病患，应该到你们那边诊疗，请你安排时间，我会介绍他到你们那边看病……」。原来接电话的是某大学的兽医学教授，对各种牲畜的疑难杂症颇为权威，也只有兽医才有能耐去诊疗不会讲话的畜牲。如今这个看人病痛的医生，碰到只要医生看病而不诉病情的病人，如何能叫他着手？只好请他去看可以不诉说病情就可以诊病治疗的兽医。


    「诊病医病」，中医有所谓「望、闻、问、切」的手续。所谓「望」即是医生以眼看病人的情形；「问」是由医生根据他的「望」和病人诉说的「闻」（医生所闻），然后再详问病人有关他目前病痛上其他未诉说的状况，甚至包括既往有否过的病痛情况、发病时间，以及病变的经过、目前的感覺等等；「切」才是最後根據脈象的情況，再加上上面三種診斷，綜合研判這個病人究竟是什麼病？病在那個臟腑？那個經絡？然後才能作到辨症處方，才能可望藥到病除。至於西醫的診療方式更多，何僅止於中醫的望、聞、問、切，必要時還要抽血驗血、大小便、照
    X 光、量血壓、病理切片、細菌培養、心電圖、斷層掃瞄等等，不厭其煩地協助。診病時，先要經過科學檢查和化驗，碰到真的疑難雜症時，有時即使用盡所有尖端科學儀器，也弄不清楚究竟病源在那裡，而難於處方下藥。因為究竟醫學發達到現在，還有太多的病痛，沒辦法醫治，甚至不知道病因。醫生碰到一個擺在眼前的病人，有時都會苦於病因不明而束手無策；但似乎只有搞命理的人，好像是不食人間煙火的活神仙，只要看到一個人的八字、一個斗數命盤，就可以口沫橫飛地推斷出這個人如何又如何。若有人能夠作到如此超凡入聖的境界，那他的命理之術，正如中醫四診心法上所提到的，「望而知之謂之神」（開而知之謂之聖，問而知之謂之巧），臻於出神入化的境界；而這種工夫，在古今以來的正統中醫學上，似乎只是一種最高的理想，我們以爲古今以來能達到這個境界的中醫師應屬鳳毛麟角。


    搞的惡性循環之下，而逐漸走入窮途末路。者也幾乎把論命的算命先生當作無所不知的活神仙。中國命理也就是在一種盲目亂太多搞命理的人，以爲他們的命理境界都已達到這種神乎其技的境界，而同命。


    ## 第五、處方


    診病爲療病，療病必須處方，然後抓藥服用，才可望藥到病除。我們從整個命盤加上必要的資料，經過處理、分析、和研判，然後根據所訴求事項的可能演變趨勢，原原本本地提供給問命者作爲將來處理或應變上的參考，甚至提出具體的方案意見。也許我們發現到，對某些可能發生的事件上，由於不在行，不能提出有用的具體參考意見，我們也應該建議問命者去向那些專家就專業上的請教。比如事業經營，在某個時間內，會發生資金週轉困難，除了應未雨綢繆地先行接洽銀行的資金融通外，也應該去請教財務專家作財務上的分析，以了解財務困難的癥結所在，以及解決和因應之道。我們總不能說，在明年春節前，你的公司會週轉不靈、支票無法兌現，除了關門倒閉外，別無他途。假使斗數命理就是這麼個樣子，那與一個醫生跟一個病人宣佈：「你已害了癌症，癌細胞已漫延全身，回家去準備後事吧！」一般，那我們搞斗數命理的人，不只連暗巷都不夠格逗留，簡直要如垃圾般被丟進垃圾山。


    當然，面對著這個日新月異、變動急劇的工商業社會，我們不能寄望命理能解決人間所有的千劫萬難，但至少我們要了解這個社會。這是一個多元化的社會，不只人際關係的複雜化，所有一個人在一輩子所可能遭遇的，不只與古人不同，同時代的你我他，也可能完全不一樣，我們必須要了解這些，才能掌握正確的命理觀念。現代的人會有太多古人所沒有的遭遇和煩惱，你不能在命理的診斷上，單憑一句大吉或大凶，就可以交待了事。假使我們不認清這一點，那從此斗數命理必將沒落，而不爲後人所聽聞。


    至此，不禁使我想起，許興智博士以一位藥學權威的尊貴，而苦心孤詣地鑽研著這一門一直無法進入時代文明殿堂的斗數之學，希望能給這門千古的絕學注入新生命，而爲世人所用。許博士的這種治學精神和高瞻遠矚的眼光，怎麼不使人欽佩與讚歎。


    ## 斗數命理的本質


    ### （一）斗數命盤的本質｜類型


    你可以設定任何包括年月日時辰的資料，依斗數排盤的程式規則排出一個斗數命盤來。追命盤只能說是，如同數目字套進數學公式加以演算後，會產生某一個計算結果。數學的演算在基本上，並不一定代表某些什麼特別意義，但一旦應用在某種現象的解說時，它就有它的特別涵意和功能。斗數命盤也是這樣子，只要我們輸入的是根據一個人的出生資料時，它將是成爲一張可以用作論命的命盤，這個道理就跟卦爻一樣，一個卦象並不一定代表某種特別意義，但當你藉以斷某些事物現象時，它就有了他的特殊意義和道理。正如一個卜卦先生，當他卜出卦象後，他必須要問，問卦的人究竟要談些什麼事。其實我們若把斗數命盤十二宮位的星曜組合，每一宮看成一個卦象，而整個命盤又看成一組集十二個卦象的卦爻也未嘗不可，每個宮位有它單獨的卦象，而整個命盤也有它整體性的卦象。


    斗數命盤既然是根據一個人的出生資料來設定，我們可以視同它因緣起滅之於這個人，因此我們可以據此命盤，來推論這個人一生遭遇上榮枯禍福的消長本質和趨勢上的一種概約狀況。我們認為斗數命盤所顯示的，也只能說是一種現象、一種特質，或者說它是一種類型，但這個類型並不一定意味著它必然會有什麼際遇和變化。正如我們前文提及一塊銅片，它可以在鹽酸、硫酸和硝酸中，起不同的化學變化。若說銅能在這三種化學溶劑中起化學變化，是銅的一種特有本質，但它在三種溶劑裡，卻產生三種不同的鹽類化合物。若我們把斗數命盤或是每一個宮位比喻成這塊銅片，而後天環境的遭遇差別，比之此三種酸性溶劑對銅片的化學作用，我們可以明瞭，命盤在命理上所具有的本質和意義。


    不過我們特別要強調，我們把命盤比之以銅片，後天的個別遭遇差異比之以三種溶劑，只是用以說明斗數命盤上的一種基本意義，並不意味著人生的遭遇變化，會如同物質起化學變化時的單純和易於掌握。不同的人，有不同的個別遭遇條件，就是單獨個人，有時你也很難事先充分明瞭，究竟會有什麼直接和間接的事或物，會對你造成影響。因此很難在原因不明的情形下，充分掌握命盤上的星曜究竟代表着什麼涵意。


    我們以爲在斗數命理的探討上，假使對斗數命盤的這種本質上的類型，不加以了解，而其餘的推演和論說，將會和實際的人生造成決然不符的差異。我們若再舉例，命格是陽梁昌祿的人，是屬於聰明、好學、利於考場功名的命格類型，但他能否得到充分發揮他的有利類型的賦性特質，必須要看他後天環境能否有個適合的環境可以配合。命理上這種先後的條件配合，必須加以充分的配合和考慮。這正是楊柏因這個年輕人，不會有其他同時出生、相同命格的其他年輕人，也能在求學過程中，有相同的類似表現的道理。


    ### （二）傾向趨勢


    關於斗數命盤十二宮位星曜的組合，和整個命盤的結構，我們曾在前文提過，可以把它視同如一個卦象，用在論命的時候，它代表某一種現象的類型；因此在追個類型的現象上，一旦引發作用時，將會產生某一種趨勢。由於斗數命盤的追種趨勢功能，我們才能用以推演命理。


    但是追種趨勢或傾向，却和某些非命理因素有相當大的絕對關係。比如兩棵同樣品種的樹木，栽種在不同的土地環境，一棵種在土壤肥沃、濕度適當的土地上，一棵種在既貧瘠又乾旱的山丘上，經過十年八年後，儘管樹齡相同，但是長出來的樣品一定不一樣。一棵會是樹幹粗壯、綠葉成蔭，另一棵却枝葉蕭條、形同枯木。


    兩棵樹的本質一樣，也都種在土地上，但由於土壤條件的差異，最後產生不同的生長樹相來。斗數命盤用以推論命理的時候，也應該視同追種道理來應用，並不是說，他只要在命盤上具備追種類型或特質，這個人一輩子一定變成怎麼樣。


    不過有一點，我們一定要先搞清楚，在命盤上若不具備某一種特質和追種特質可能產生的某種趨勢傾向，就算加上再多的非命理因素，以求達到某一種傾向趨勢，還是沒法作到。我們再以仙人掌來作個比喻，由於它在生理結構上不同於一般植物，若我們把它種植在既肥沃、又潮濕的土地上，它不但不會像長在乾旱又貧瘠的沙漠中那麼壯大茂盛，甚至都將枯萎而活不下去。這正是物各有其性，適性者生存，不適性者難存的原因。這種道理用於斗數論命上，也是一個極爲重要的觀念。


    若以斗數上的命格來說，有兩個人在命格上分屬兩種類型：老陳是君臣慶會格，富貴祿權；而老張是機月同梁格，嘉會祿科。在限運的運轉上，亦都幾乎行相似的吉兇。兩人同時進同一家公司，同在業務單位，從一個基本的業務員幹起，歷經兩大限的廿年後，兩個人都表現不錯，亦都有相當不錯的晉陞；但老陳當上了業務主管，帶領衆多業務人員在爲公司的鴻圖大展衝刺於國內外的商場上；而老張由於個性使然，以及長於謀略和思慮細密，亦當上了公司老板的幕僚參謀，幫老板審核例行作業和提供策略企劃。


    我們作此比較，不在他兩人誰較爲老板所倚重，而是用以說明，兩人由於命格類型的差別，在同樣工作環境之下，自然會發展出屬於他自己類型的趨勢現象出來。當然，老板亦可以把他們兩人的職務調動，很可能也不會表現得太差（當然也可能太差），但若能各探其專長而用，應該是最理想的用人之道。斗數命盤，用以推論命理，正是居於這種趨勢現象的運用，而把已知的條件或假定的因素，輸入命盤，並依理推論而循其趨勢的傾向軌跡。


    ### （三）個別差異性


    斗數命盤依出生年、月、日、時辰排定，因此依理論數目計算，將會排出 259200 個命盤；也就是說，斗數就用這麼多類型的命盤來探討世人的一生命理，比起西洋的十二星座只要十二種類型要來得精確。也有人認爲，從依五行局及出生日演算而定的起紫微表裡，可以看出，在同一五行局裡只要月份相同，出生時辰一樣，日子就算不同，也會有紫微同宮的可能。這種現象特別在水二局裡，除了初一和三十日兩日外，其他每日都是紫微星座同樣地支宮位。其他五行局只是日子空隔較長，亦有相同現象。由於依日子排出的星曜如恩光、天貴、三台、八座，在實際論命時用上的機會不多，因此真正關係大局的命盤，僅約半數。


    對持這兩種看法的人，我們認為都對，只是他們似乎太強調命盤在命理推論上成為唯一的論命條件，因此才有這種命盤究竟有多少個的紛爭。我們卻認為，命理的推論固然必須根據命盤，而依星曜的組合賦性依理推論，但斗數命盤詳列的星曜組合，只是代表這個人的命理因素或命理條件；而這些命理條件或因素，主要的只是代表在命理上的一種類型，和作用上的一種趨勢。至於這種類型，在一個人的一生裡，將會造成某種發展趨勢傾向，應該還有命理以外的條件。而這些條件，無論如何，我們是無法從命盤上看出來的。據說，台灣目前在一個時辰裡，約有一百個男孩以一張命盤代表，五十個女孩另用一張代表（男女行運順逆相反）。然後，我們提出幾個很簡單的問題：


    1. 在兄弟或姊妹的長幼排行都一樣嗎？

    2. 出生後在第一大限間的健康都一樣好嗎？

    3. 他們的父母和家庭背景都很類似嗎？

    4. 他們將來在事業的表現都很近似嗎？


    若根據古傳祿命法則，有其命盤必有其人；近代的鐵口直斷的大師們也會說，他們的命盤如此，必然會有那種命理現象。但是一個現代人，只要他有現代人的一般常識，他們一定會同意這些同時出生的小孩，在兄弟姊妹的排行上究竟是老大或老二不一定相同；他們在一般體弱多病痛的幼年期，健康情況甚至在比較重大的病痛上，也不盡相似。他們的父母不只年齡不同、出身背景、當前家庭環境更不一定相似，可能有富貴人家，也有中產階級，甚至苦哈哈的勞工家庭。


    至於和先天遺傳極有密切關係的體格和聰明才智，更會因生身父母的不同而造成很大的差異。我們以爲實際上應該如此，這種現象用既知的常識就可判斷，用不着再作任何的統計和調查。假使有人又以出生時辰前、中、後又有很大的差別來揣測，那麼我們就以一百二十分鐘生五十個男孩（女孩）來計算，那麼平均每二點四分鐘生一個；也就是說十分鐘裡將生有四個小孩，假定其中有個小孩生下來不到滿月就夭折，或是生下就有先天性的生理缺陷，我們也不會認定同在十分鐘內生的小孩都會有類似的現象。


    這種同時辰生竟然會有不同結果的現象，在古傳命理似未曾提及，而近代的斗數命理研究者亦從不曾探討，究竟為什麼會造成同命盤而不同命運的現象。我們以為，必然有它的原因和道理存在；若我們在人之初生就無法解決這些疑難，那麼我們又如何探討一個人長大後，投入萬丈紅塵中的人群社會，將有怎麼樣的命理走向？


    我們以為這個正是命理上的個別差異（條件）問題，才會有這種現象。剛出生的小孩如此，長大以後的大人更是如此，人人有個別的差異條件；而這些條件往往都摻雜著不同的命理因素和不同的非命理因素，但當這些所有的因素條件聚合在一起，如同物質因混合而起化學變化時，自然就產生很大的差異。因此我們認為，命運的走向趨勢，應將命理條件和所實際參合的其他非命理因素（條件），合參研判和分析；否則會產生偏倚的推論，將無法使命理分析能和實際人生的際遇互相吻合。


    了解斗數命盤推演命理的道種道理後，我們自然不會再去對究竟有多少萬個命盤而耿耿於懷。


    ### （四）時間性和空間性


    人類的文明因時間而演進，因此，時代不同，表現在文明和生活上的訴求層次，往往差別很大。這種因時間上的差別而導致人們在生活訴求的不一致，特別是當社會背景有所變遷時，差別最大。


    以台灣來說，在老爺爺的時代，由於整個社會環境對外閉鎖、思想守舊，在那種典型的農業社會裡，人們不只生活方式幾乎跟老爺爺的老爺爺的時代沒有多大不同，而且習俗和思想觀念方面，幾乎也沒什麼兩樣。這種農業時代的社會文化，就算有所變化，也是很緩慢的，幾乎讓人家覺察不到什麼變化。但時至今日，已由接近靜態的農業社會而變成功商業高度發展的社會，不再是幾代不變，取而代之的是天天在變，而且變化多端。


    以往很多必然的事體，現在已截然不同。在老爺爺時代，兒孫們多的是安土重遷、堅守家園，一輩子與家人共住，而有幾代同堂的大家庭，職業以家承的農耕爲主，婚姻的結合是一種父母之命、媒妁之言。生兒育女，無不抱持多子多孫多福氣的觀念。大部份的人，一輩子很難得走出老家的方圓百里，老家是他一生的活動世界。但現在和以後，你我和你我的兒孫們，已都可以有千百個理由，在每個人羽毛既豐的成年後，千方百計地離開老家，獨闖世面，而不為老家所困。因此一個家庭裡的孩子們，一旦長大後勢必振翼飛去，從此任他海闊天空。


    職業工作可以憑自己的意願和才能去任選，婚姻亦多在兩性相悅下而結合，生男育女也代之以「二個恰恰好、一個不嫌少」的重質不重量的觀念。人們這種與往昔截然兩樣的生活表現和方式，正是由時代所造成，因社會背景不同所促使這種由社會環境變遷，而造成對一個人一生的影響，絕對不是生存在當代社會裡的個人所能抗拒和改變。


    在老爺爺的時代，他可以單憑祖宗產業和家世的庇蔭而優閒安逸地過一輩子；但現在就須憑據個人的才能和努力去謀事創業，否則將難以謀生。這兩種不同背景下的社會環境，所造成人們生活層面的差異，在斗數論命上不只重點不同，十二項宮位的探討和訴求也都不一樣。以婚姻來說，老爺爺時代只要他高興也能娶得起；'
  mdcn: '## 事業經營與命理診斷的差異


    在事業經營上，我們可以將前者類分於買口業，而後者屬於生產事業，兩者不只事業型態不一致，在管理經營上也不一致，可能發生的有利條件和不利困難，根本就大不相同。


    近觀職業類型的差異，不只一般工商企業管理顧問的診斷方法不同，而且在診斷後對應與應革的建議上差異更大。而在命理方面，我們以爲儘管在職業類型方面，近代斗數命理的研習者已能將星曜組合情況，作爲事業類型的理論分類，但並不能肯定某一種星曜類型，必定從事於某種行業。因爲一個人對所從事的行業，往往都是集合很多的條件和原因，而不一定全是想怎麼樣就能怎麼樣的充分自由意願；但這些條件也好、原因也好、意願也罷，常常是因人而異。


    在斗數的命盤上，並沒能充分顯出這些種種現象來。而這些種種現象，卻成爲我們根據斗數命盤依理推論的必要根據資料。若缺乏這些資料的輸入，我們無論如何不能單靠命盤的星曜組合現象，就能談出與事實相符合的命理道理來。


    就以買口業和生產事業來說，在斗數命盤上顯示之有利星曜的結構並不相同，因此一個有利於從事買口業的人，並不意味著他一定也能經營生產事業而同樣順利。賺錢，反之亦然。這種命理的現象，和實際的工商業經營一樣。要不然，天下間的老板，豈不都全部同時經營好多不同類型的公司？而旗下的事業，也不會有兩個賠了、只有一個賺了錢的現象！


    再以感情和婚姻來說，當一個問命者提出「夫妻宮」方面的問題時，我們更有必要就他（她）想要知道的問題先問清楚。一個未婚者，他（她）可能想要知道什麼時候才有結婚的希望，也可能問他在好幾個追求者的名單上，哪一位是比較理想的對象；也可能是感情受到波折或是形成三角甚至多角競爭時，應該要怎麼辦？反正感情的問題多得叫局外人無從理解和數不清。對於已婚者，可能問到婚姻道上的和諧問題，能否白頭偕老？婚姻已亮起紅燈，可能是彼此的感情融洽問題，也許是某一方面不貞的外遇問題、金錢問題、健康問題、生育問題……太多叫清官亦難斷的家務事，都會造成婚姻上的波折。我們以爲當問命者指出問題所在後，論命者有必要要求知道所要探討事項的相關資料，先行問清楚，然後把這些資料根據命盤的星曜現象，依理推論，再加判斷。


    我曾經在一個聽人高談闊論的龍門陣裡，聽到一位年輕的命理大師斬釘截鐵、口出狂言地說：「陳先生你今年財庫大破財，必將大破財無疑！」沒想到陳先生冷冷地問說：「我今年除了經營多年的一家公司以外，偶爾亦玩玩股票、炒炒地皮、放錢生利息，有時也在期貨上押押寶，你說我在那一項會賠錢？該不會都賠錢吧！」很難形容當時這位年輕大師啞口無言的表情。


    簡單地說，過去的什麼，造成現在的什麼，現在的什麼又將造成以後的什麼。這種事理現象的趨勢，可以說是因果關係（在此並不指涉一般宗教上「善惡因果」的概念），不只命理上如此，醫生診病及以後的處方療病、企業管理上的診斷和策劃，無不都採行這個道理和方法。我們搞現代命理的人，假使不採用這種理念和方法，而總是抱殘守缺地只知道使用一些老舊祕訣，將如江湖老郎中，只靠幾帖秘方來爲人治病，永遠無法和現代大醫院裡的醫生可比。江湖郎中除了那幾帖秘方可適症而醫外，對絕大部份的病痛，都束手無策。很遺憾的，在當前的斗數命理界，到處充斥著類似這種江湖郎中的斗數大師，不但掛牌論命，如同天上掉下來的活神仙，而且廣收門徒，纔是教些連自己都不知所云的大道理。


    但算命有時不能單憑一個人的生辰資料排上斗數命盤，就可以頭頭是道、無不個個中鈞的論對。曾經在某個大醫院裡，傳出這麼一個杏壇笑話：有個病人到某大醫院的門診去看病，當門診醫生看清楚病歷表後，原來是一個初診的病人。病歷表除了個人最基本的性別、姓名、地址、年齡、體重以外，其他甚麼都沒有。因此醫生帶著一種職業性的口吻問病人說：「那個地方不舒服？」醫生的這種口吻，幾乎是千篇一律的一句問話，除非是外伤急救或是昏迷不醒人事，没办法回話（小孩還有大人陪去可问），但千萬也没想到，病人竟冷冷的说：「你看我那裡不舒服嘛！」這位门诊医师行医改年，诊治的病患也不晓得有几万人，但听到病人的這麼一句话，倒是第一次。因此，脑筋不禁一楞，他话也不再问下去，却要在旁助理的护士小姐帮他搬一个电话，请农学院的某某教授回话。等电话接通后，只听到医生在电话中客约地说：「我這裡有个病患，应该到你们那边诊疗，请你安排时间，我会介绍他到你们那边看病……」。原来接电话的是某大学的兽医学教授，对各种牲畜的疑难杂症颇为权威，也只有兽医才有能耐去诊疗不会讲话的畜牲。如今这个看人病痛的医生，碰到只要医生看病而不诉病情的病人，如何能叫他着手？只好请他去看可以不诉说病情就可以诊病治疗的兽医。


    「诊病医病」，中医有所谓「望、闻、问、切」的手续。所谓「望」即是医生以眼看病人的情形；「问」是由医生根据他的「望」和病人诉说的「闻」（医生所闻），然后再详问病人有关他目前病痛上其他未诉说的状况，甚至包括既往有否过的病痛情况、发病时间，以及病变的经过、目前的感覺等等；「切」才是最後根據脈象的情況，再加上上面三種診斷，綜合研判這個病人究竟是什麼病？病在那個臟腑？那個經絡？然後才能作到辨症處方，才能可望藥到病除。至於西醫的診療方式更多，何僅止於中醫的望、聞、問、切，必要時還要抽血驗血、大小便、照
    X 光、量血壓、病理切片、細菌培養、心電圖、斷層掃瞄等等，不厭其煩地協助。診病時，先要經過科學檢查和化驗，碰到真的疑難雜症時，有時即使用盡所有尖端科學儀器，也弄不清楚究竟病源在那裡，而難於處方下藥。因為究竟醫學發達到現在，還有太多的病痛，沒辦法醫治，甚至不知道病因。醫生碰到一個擺在眼前的病人，有時都會苦於病因不明而束手無策；但似乎只有搞命理的人，好像是不食人間煙火的活神仙，只要看到一個人的八字、一個斗數命盤，就可以口沫橫飛地推斷出這個人如何又如何。若有人能夠作到如此超凡入聖的境界，那他的命理之術，正如中醫四診心法上所提到的，「望而知之謂之神」（開而知之謂之聖，問而知之謂之巧），臻於出神入化的境界；而這種工夫，在古今以來的正統中醫學上，似乎只是一種最高的理想，我們以爲古今以來能達到這個境界的中醫師應屬鳳毛麟角。


    搞的惡性循環之下，而逐漸走入窮途末路。者也幾乎把論命的算命先生當作無所不知的活神仙。中國命理也就是在一種盲目亂太多搞命理的人，以爲他們的命理境界都已達到這種神乎其技的境界，而同命。


    ## 第五、處方


    診病爲療病，療病必須處方，然後抓藥服用，才可望藥到病除。我們從整個命盤加上必要的資料，經過處理、分析、和研判，然後根據所訴求事項的可能演變趨勢，原原本本地提供給問命者作爲將來處理或應變上的參考，甚至提出具體的方案意見。也許我們發現到，對某些可能發生的事件上，由於不在行，不能提出有用的具體參考意見，我們也應該建議問命者去向那些專家就專業上的請教。比如事業經營，在某個時間內，會發生資金週轉困難，除了應未雨綢繆地先行接洽銀行的資金融通外，也應該去請教財務專家作財務上的分析，以了解財務困難的癥結所在，以及解決和因應之道。我們總不能說，在明年春節前，你的公司會週轉不靈、支票無法兌現，除了關門倒閉外，別無他途。假使斗數命理就是這麼個樣子，那與一個醫生跟一個病人宣佈：「你已害了癌症，癌細胞已漫延全身，回家去準備後事吧！」一般，那我們搞斗數命理的人，不只連暗巷都不夠格逗留，簡直要如垃圾般被丟進垃圾山。


    當然，面對著這個日新月異、變動急劇的工商業社會，我們不能寄望命理能解決人間所有的千劫萬難，但至少我們要了解這個社會。這是一個多元化的社會，不只人際關係的複雜化，所有一個人在一輩子所可能遭遇的，不只與古人不同，同時代的你我他，也可能完全不一樣，我們必須要了解這些，才能掌握正確的命理觀念。現代的人會有太多古人所沒有的遭遇和煩惱，你不能在命理的診斷上，單憑一句大吉或大凶，就可以交待了事。假使我們不認清這一點，那從此斗數命理必將沒落，而不爲後人所聽聞。


    至此，不禁使我想起，許興智博士以一位藥學權威的尊貴，而苦心孤詣地鑽研著這一門一直無法進入時代文明殿堂的斗數之學，希望能給這門千古的絕學注入新生命，而爲世人所用。許博士的這種治學精神和高瞻遠矚的眼光，怎麼不使人欽佩與讚歎。


    ## 斗數命理的本質


    ### （一）斗數命盤的本質｜類型


    你可以設定任何包括年月日時辰的資料，依斗數排盤的程式規則排出一個斗數命盤來。追命盤只能說是，如同數目字套進數學公式加以演算後，會產生某一個計算結果。數學的演算在基本上，並不一定代表某些什麼特別意義，但一旦應用在某種現象的解說時，它就有它的特別涵意和功能。斗數命盤也是這樣子，只要我們輸入的是根據一個人的出生資料時，它將是成爲一張可以用作論命的命盤，這個道理就跟卦爻一樣，一個卦象並不一定代表某種特別意義，但當你藉以斷某些事物現象時，它就有了他的特殊意義和道理。正如一個卜卦先生，當他卜出卦象後，他必須要問，問卦的人究竟要談些什麼事。其實我們若把斗數命盤十二宮位的星曜組合，每一宮看成一個卦象，而整個命盤又看成一組集十二個卦象的卦爻也未嘗不可，每個宮位有它單獨的卦象，而整個命盤也有它整體性的卦象。


    斗數命盤既然是根據一個人的出生資料來設定，我們可以視同它因緣起滅之於這個人，因此我們可以據此命盤，來推論這個人一生遭遇上榮枯禍福的消長本質和趨勢上的一種概約狀況。我們認為斗數命盤所顯示的，也只能說是一種現象、一種特質，或者說它是一種類型，但這個類型並不一定意味著它必然會有什麼際遇和變化。正如我們前文提及一塊銅片，它可以在鹽酸、硫酸和硝酸中，起不同的化學變化。若說銅能在這三種化學溶劑中起化學變化，是銅的一種特有本質，但它在三種溶劑裡，卻產生三種不同的鹽類化合物。若我們把斗數命盤或是每一個宮位比喻成這塊銅片，而後天環境的遭遇差別，比之此三種酸性溶劑對銅片的化學作用，我們可以明瞭，命盤在命理上所具有的本質和意義。


    不過我們特別要強調，我們把命盤比之以銅片，後天的個別遭遇差異比之以三種溶劑，只是用以說明斗數命盤上的一種基本意義，並不意味著人生的遭遇變化，會如同物質起化學變化時的單純和易於掌握。不同的人，有不同的個別遭遇條件，就是單獨個人，有時你也很難事先充分明瞭，究竟會有什麼直接和間接的事或物，會對你造成影響。因此很難在原因不明的情形下，充分掌握命盤上的星曜究竟代表着什麼涵意。


    我們以爲在斗數命理的探討上，假使對斗數命盤的這種本質上的類型，不加以了解，而其餘的推演和論說，將會和實際的人生造成決然不符的差異。我們若再舉例，命格是陽梁昌祿的人，是屬於聰明、好學、利於考場功名的命格類型，但他能否得到充分發揮他的有利類型的賦性特質，必須要看他後天環境能否有個適合的環境可以配合。命理上這種先後的條件配合，必須加以充分的配合和考慮。這正是楊柏因這個年輕人，不會有其他同時出生、相同命格的其他年輕人，也能在求學過程中，有相同的類似表現的道理。


    ### （二）傾向趨勢


    關於斗數命盤十二宮位星曜的組合，和整個命盤的結構，我們曾在前文提過，可以把它視同如一個卦象，用在論命的時候，它代表某一種現象的類型；因此在追個類型的現象上，一旦引發作用時，將會產生某一種趨勢。由於斗數命盤的追種趨勢功能，我們才能用以推演命理。


    但是追種趨勢或傾向，却和某些非命理因素有相當大的絕對關係。比如兩棵同樣品種的樹木，栽種在不同的土地環境，一棵種在土壤肥沃、濕度適當的土地上，一棵種在既貧瘠又乾旱的山丘上，經過十年八年後，儘管樹齡相同，但是長出來的樣品一定不一樣。一棵會是樹幹粗壯、綠葉成蔭，另一棵却枝葉蕭條、形同枯木。


    兩棵樹的本質一樣，也都種在土地上，但由於土壤條件的差異，最後產生不同的生長樹相來。斗數命盤用以推論命理的時候，也應該視同追種道理來應用，並不是說，他只要在命盤上具備追種類型或特質，這個人一輩子一定變成怎麼樣。


    不過有一點，我們一定要先搞清楚，在命盤上若不具備某一種特質和追種特質可能產生的某種趨勢傾向，就算加上再多的非命理因素，以求達到某一種傾向趨勢，還是沒法作到。我們再以仙人掌來作個比喻，由於它在生理結構上不同於一般植物，若我們把它種植在既肥沃、又潮濕的土地上，它不但不會像長在乾旱又貧瘠的沙漠中那麼壯大茂盛，甚至都將枯萎而活不下去。這正是物各有其性，適性者生存，不適性者難存的原因。這種道理用於斗數論命上，也是一個極爲重要的觀念。


    若以斗數上的命格來說，有兩個人在命格上分屬兩種類型：老陳是君臣慶會格，富貴祿權；而老張是機月同梁格，嘉會祿科。在限運的運轉上，亦都幾乎行相似的吉兇。兩人同時進同一家公司，同在業務單位，從一個基本的業務員幹起，歷經兩大限的廿年後，兩個人都表現不錯，亦都有相當不錯的晉陞；但老陳當上了業務主管，帶領衆多業務人員在爲公司的鴻圖大展衝刺於國內外的商場上；而老張由於個性使然，以及長於謀略和思慮細密，亦當上了公司老板的幕僚參謀，幫老板審核例行作業和提供策略企劃。


    我們作此比較，不在他兩人誰較爲老板所倚重，而是用以說明，兩人由於命格類型的差別，在同樣工作環境之下，自然會發展出屬於他自己類型的趨勢現象出來。當然，老板亦可以把他們兩人的職務調動，很可能也不會表現得太差（當然也可能太差），但若能各探其專長而用，應該是最理想的用人之道。斗數命盤，用以推論命理，正是居於這種趨勢現象的運用，而把已知的條件或假定的因素，輸入命盤，並依理推論而循其趨勢的傾向軌跡。


    ### （三）個別差異性


    斗數命盤依出生年、月、日、時辰排定，因此依理論數目計算，將會排出 259200 個命盤；也就是說，斗數就用這麼多類型的命盤來探討世人的一生命理，比起西洋的十二星座只要十二種類型要來得精確。也有人認爲，從依五行局及出生日演算而定的起紫微表裡，可以看出，在同一五行局裡只要月份相同，出生時辰一樣，日子就算不同，也會有紫微同宮的可能。這種現象特別在水二局裡，除了初一和三十日兩日外，其他每日都是紫微星座同樣地支宮位。其他五行局只是日子空隔較長，亦有相同現象。由於依日子排出的星曜如恩光、天貴、三台、八座，在實際論命時用上的機會不多，因此真正關係大局的命盤，僅約半數。


    對持這兩種看法的人，我們認為都對，只是他們似乎太強調命盤在命理推論上成為唯一的論命條件，因此才有這種命盤究竟有多少個的紛爭。我們卻認為，命理的推論固然必須根據命盤，而依星曜的組合賦性依理推論，但斗數命盤詳列的星曜組合，只是代表這個人的命理因素或命理條件；而這些命理條件或因素，主要的只是代表在命理上的一種類型，和作用上的一種趨勢。至於這種類型，在一個人的一生裡，將會造成某種發展趨勢傾向，應該還有命理以外的條件。而這些條件，無論如何，我們是無法從命盤上看出來的。據說，台灣目前在一個時辰裡，約有一百個男孩以一張命盤代表，五十個女孩另用一張代表（男女行運順逆相反）。然後，我們提出幾個很簡單的問題：


    1. 在兄弟或姊妹的長幼排行都一樣嗎？

    2. 出生後在第一大限間的健康都一樣好嗎？

    3. 他們的父母和家庭背景都很類似嗎？

    4. 他們將來在事業的表現都很近似嗎？


    若根據古傳祿命法則，有其命盤必有其人；近代的鐵口直斷的大師們也會說，他們的命盤如此，必然會有那種命理現象。但是一個現代人，只要他有現代人的一般常識，他們一定會同意這些同時出生的小孩，在兄弟姊妹的排行上究竟是老大或老二不一定相同；他們在一般體弱多病痛的幼年期，健康情況甚至在比較重大的病痛上，也不盡相似。他們的父母不只年齡不同、出身背景、當前家庭環境更不一定相似，可能有富貴人家，也有中產階級，甚至苦哈哈的勞工家庭。


    至於和先天遺傳極有密切關係的體格和聰明才智，更會因生身父母的不同而造成很大的差異。我們以爲實際上應該如此，這種現象用既知的常識就可判斷，用不着再作任何的統計和調查。假使有人又以出生時辰前、中、後又有很大的差別來揣測，那麼我們就以一百二十分鐘生五十個男孩（女孩）來計算，那麼平均每二點四分鐘生一個；也就是說十分鐘裡將生有四個小孩，假定其中有個小孩生下來不到滿月就夭折，或是生下就有先天性的生理缺陷，我們也不會認定同在十分鐘內生的小孩都會有類似的現象。


    這種同時辰生竟然會有不同結果的現象，在古傳命理似未曾提及，而近代的斗數命理研究者亦從不曾探討，究竟為什麼會造成同命盤而不同命運的現象。我們以為，必然有它的原因和道理存在；若我們在人之初生就無法解決這些疑難，那麼我們又如何探討一個人長大後，投入萬丈紅塵中的人群社會，將有怎麼樣的命理走向？


    我們以為這個正是命理上的個別差異（條件）問題，才會有這種現象。剛出生的小孩如此，長大以後的大人更是如此，人人有個別的差異條件；而這些條件往往都摻雜著不同的命理因素和不同的非命理因素，但當這些所有的因素條件聚合在一起，如同物質因混合而起化學變化時，自然就產生很大的差異。因此我們認為，命運的走向趨勢，應將命理條件和所實際參合的其他非命理因素（條件），合參研判和分析；否則會產生偏倚的推論，將無法使命理分析能和實際人生的際遇互相吻合。


    了解斗數命盤推演命理的道種道理後，我們自然不會再去對究竟有多少萬個命盤而耿耿於懷。


    ### （四）時間性和空間性


    人類的文明因時間而演進，因此，時代不同，表現在文明和生活上的訴求層次，往往差別很大。這種因時間上的差別而導致人們在生活訴求的不一致，特別是當社會背景有所變遷時，差別最大。


    以台灣來說，在老爺爺的時代，由於整個社會環境對外閉鎖、思想守舊，在那種典型的農業社會裡，人們不只生活方式幾乎跟老爺爺的老爺爺的時代沒有多大不同，而且習俗和思想觀念方面，幾乎也沒什麼兩樣。這種農業時代的社會文化，就算有所變化，也是很緩慢的，幾乎讓人家覺察不到什麼變化。但時至今日，已由接近靜態的農業社會而變成功商業高度發展的社會，不再是幾代不變，取而代之的是天天在變，而且變化多端。


    以往很多必然的事體，現在已截然不同。在老爺爺時代，兒孫們多的是安土重遷、堅守家園，一輩子與家人共住，而有幾代同堂的大家庭，職業以家承的農耕爲主，婚姻的結合是一種父母之命、媒妁之言。生兒育女，無不抱持多子多孫多福氣的觀念。大部份的人，一輩子很難得走出老家的方圓百里，老家是他一生的活動世界。但現在和以後，你我和你我的兒孫們，已都可以有千百個理由，在每個人羽毛既豐的成年後，千方百計地離開老家，獨闖世面，而不為老家所困。因此一個家庭裡的孩子們，一旦長大後勢必振翼飛去，從此任他海闊天空。


    職業工作可以憑自己的意願和才能去任選，婚姻亦多在兩性相悅下而結合，生男育女也代之以「二個恰恰好、一個不嫌少」的重質不重量的觀念。人們這種與往昔截然兩樣的生活表現和方式，正是由時代所造成，因社會背景不同所促使這種由社會環境變遷，而造成對一個人一生的影響，絕對不是生存在當代社會裡的個人所能抗拒和改變。


    在老爺爺的時代，他可以單憑祖宗產業和家世的庇蔭而優閒安逸地過一輩子；但現在就須憑據個人的才能和努力去謀事創業，否則將難以謀生。這兩種不同背景下的社會環境，所造成人們生活層面的差異，在斗數論命上不只重點不同，十二項宮位的探討和訴求也都不一樣。以婚姻來說，老爺爺時代只要他高興也能娶得起；'
