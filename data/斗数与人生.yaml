    「同房试验」是夫妻同房数小时后，到医院由医师取出子宫腔内的精虫，

    在显微镜下观察它的活动力，如果多数精虫的活动力良好，即表示没有这方面

    的问题。反之，如果所有的精虫都不动，或只有少数几隻具有活动力，即表示

