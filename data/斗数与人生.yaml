    談起民間企業合夥經營的問題，在命理上，我們必要加以劃分，一個人在企業

    經營上應該扮演那種比較適合的角色，某一種命格比較適合於當合夥式的老板，或

    是獨資型的老板，還是當股東也需參與事業的經營，亦是當股東但只宜掌權到總經

