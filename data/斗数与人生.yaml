    # # 星曜基本赋性和作用

    宫位的作用现象，及诸星曜在十二地支宫位的配置组合。视星曜在十二事体兹列举「天機星」的賦性，來說明斗數論命如何藉星曜賦性作用，來解析命盤上的現象


    (二)天機陰木，南斗第三星。乃益母之宿，兄弟之主，化氣曰善。

    白色、老年青黄色，中等身材，入庙则肥胖，陷地刑瘦弱，性格多计较精明，且勤劳谨慎，若与天梁同度於身命之地，多为好说喜辩论，有特殊技能之人；心地善良。有宗教之信仰。此星若加煞曜昌曲，主多学多能，如有擎羊冲破'
