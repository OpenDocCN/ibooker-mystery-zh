  md: '拜訪他。起初，我還以爲是生意上的事，後來搞清楚了才知道，是一位命理先生的地址。


    由於原本對命理的排斥，因此那張紙，雖然留在辦公室的抽屜裡，却一直打不起前往算命的念頭。事隔多日，有一位劉姓同事要找何先生論命，因此也就在好奇以及順便搭車之便，跟著去湊熱鬧。萬萬沒想到，這一湊熱鬧，却導致我日後正式拜師跟何先生學起斗數來，甚至一頭栽進去，將是一輩子迷失在命理的迷團霧裡，而不知其所終。


    這一次命理的談論，竟然使我這個，極端排斥命理的人，作了一百八十多度的大轉變，進而拜師學習，決不是空穴來風，若無真憑實據，絕難叫我這個頑石點頭。一個受現代教育的人，很難相信和接受，居然有人能從一個人的生辰資料裡（斗數命盤），看出他太太的長相與個性而幾近完全符合，更斷出了隔年因難產而剖腹，又因剖腹輸血而導致肝疾，不只事項吻合而且時間月份絲毫不爽。當然，近年來在醫療上有超音波或掃描儀器，可以準確的診斷出女人生產的順利與否，但若說單憑傳統上的診療方法，除非女人臨盆，否則恐難確實的預知，將會難產和何時生產（很多難'
