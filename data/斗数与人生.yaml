    我們且把六親及血親、姻親，甚至義結金蘭的異姓兄弟這些具有親和情的人際關係排開不講，純粹以除了上述這些人以外的所有認識的人列爲朋友，必須加以關係上的分類。老陳是我從小的玩伴、求學的同學，出社會後除了純友情外，別無利害關係；老林是我大學時高兩班的學長，十幾年後，由於諸事順遂，現在變成我職業上的頂頭上司；老李與我同期，現在服務同機構，擔任與我相同級職的單位主管；小張是晚兩年的小老弟，現在擔任我職務上的助理……。這些人，在下班之餘也許無大無小的稱兄道弟，到酒廊喝起花酒，可能花樣百出，胡鬧在一起，早忘了白天上班時的身份地位和工作煩惱。我和所有同在一個辦公廳上班的人，在玩樂場所，不爲公事應酬而盡興歡樂的時候，他們和我的關係如同我和老陳一樣。但當上班工作時，就彼此身份分明，再不能涇渭不分，否則就擾亂了公事和人事管理上的制度。


    在這些人之間，常依斗數法則推演的時候，只有這個當我助理的小張，才能列入我的斗數命盤上的「僕役宮」，其他人不是我的上司就是同等職位的同僚，豈可淪入這個帶有「主」「從」意味的「僕役宮」？儘管現代職務上主從關係的性質已不同於古時富貴大戶人家的奴婢或管家用人，但彼此身份帶有主與從的本質仍然存在。


    因此，我們以爲，原本作爲解說主從關係的這個宮位，以改稱僕役宮爲部屬宮較適宜（了無居士曾寫爲職員宮也甚恰當）。至於其他的老林、老李，由於在公事上利害關係各有差別，自然他們會有所屬的宮位，但決不能把他們置於「僕役宮」。


    在這個錯綜複雜的工商業社會裡，人與人的關係，光用錯綜複雜還不足以描述分明，不但一般人概念難分，就是搞命理的人，恐怕也沒多少人能分清楚。多年前，我就曾經碰過這麼一位朋友，有一天哭喪着臉跟我說某一位大師提醒他說，今年預防小人，否則會因小人而大敗其財。這位朋友堪稱視錢如命，什麼都不怕，就是怕破財，使人懷疑他大概前輩子因破財窮怕了，因此一聽到破財的事，就連晚上睡覺都會作惡夢。


    於是他無論如何纏着我，一定要搞清楚究竟犯了什麼樣的小人？又怎麼樣的破了財？又破了多少財？他以爲我是財神趙公明投胎轉世，專管人間賺錢虧錢的大事。我只好問明他的生辰資料，排起斗數命盤，依理推論之餘，就針對他可能因小人而失財的事項，一一加以詢問和診斷。


    原來他老兄除了經營一家以出口爲主的貿易公司以外，還兼賺借貸轉手的高利貸，也就是憑他在銀行已建立好的信用關係，大借其款，再以民間的高利貸出借，在轉手之間，每個月的利息差額不少，可算讓他賺了不少利息錢，而他的貿易公司在當年也跟台灣很多不明就裡的小貿易公司一樣，以爲在省本多利之下，以口\A甚至口\A二百二十天出口，都可以跟北非洲，以爲開到金礦的奈及利亞，作起出口生意來。金額之大，令人咋舌。萬一對方進口商的信用出了差錯，他就算買盡全部家當財產，也會吃不了兜着走。


    我們依稀還記得，這個命盤的運限，不只田宅與福德具破，遷移宮、僕役宮甚至財帛宮，無一不凶，怎能不說大破其財？說不定還得躲債跑路呢！福德與僕役皆凶，高利貸一旦沾上，必血本無歸。遷移宮、財帛宮俱破，出口貿易生意必須以經由國際信用列名排行有份的銀行確認（Confirm）後的
    L/C，才可以接生意。否則貨品出口，將如同肉包子打狗，有去無回。總之命盤上的凶象，他都應上了，看來就算財神爺御駕親臨也幫不上大忙。


    沒想到在我還和他大談接出口生意訂單應該如何去注意某些事項時，他老兄好像胸有成竹的表示，貿易他在行，只怕沒生意上門，既然如此，那我又何必多嘴舌，也就沒把防患未然的意見告訴他。


    事隔兩三年，有次在路上和他太太不期而遇，據她說，他先生因爲自信心太強，不聽人家的勸告，結果高利貸跑了，出口的貨款因爲進口國外匯短缺，未能依約付款，最後房子被銀行查封了、廠商債主找上門，他只好跑到國外去要債。人在倒楣的時候，愈怕的事愈會接踵而來，真是禍不單行、福無雙至。我不知道他究竟是要債去了？或是躲債走了？至今還沒有他回台灣的消息。


    [補註]


    僕役宮犯沖、福德宮破的結果，是高利貸被倒帳，此時，債務人常有從或局的性質，債權人則爲主，所以高利貸的債務人出現在僕役宮。這裡的僕役宮受沖破，不必去跟出口被倒帳扯上關係。若從退移大吉，可以發跡於遠郡一意經營會到，當退移宮和財帛宮俱破時，就不利於從事國際貿易生意。蓋這宮位的凶煞，就是表示遇人不淑、因人敗事而損財，本質上，是有別於僕役宮的小人，又作武市的批發生意，也同此研判和論斷。


    ## 用人不當

    [命例]


    中南部出差回來，老婆告訴我說，范先生從日本回來向總公司述職，約定在禮拜天晚上到舍下來聊聊。對這個老朋友每次回來，總會在百忙中撥空來看我，總覺得老友如陳年好酒，越陳越香。每次見面都有聊不完的話題，這次見而，已不復當年生意挫敗時的喪志和憂鬱。我爲他能再度站起來，覺得很高興。雖然他已不再當老板，而是上班領薪。


    我這位老朋友，是我衆多同學和朋友中，才華頗爲出衆的一位，頭腦清晰、思考敏銳，中英日語文俱佳，作起事來用心、肯幹負責。處事待人，在彼此論交卅年中，似乎還少有人可以比較。但這和人在這個時代，幷不一定事事吃得開，特別是他自己當老板的最後幾年。事後他自己回想起來，那幾年的確是他一輩子，難以忘懷的恐怖黑暗時代。


    若以創業而言，他是位少年得志的年輕人，約在癸卯大限後期，他離開了原服


