    一個企業經營的成敗，必定有他的原因。在現代企業的經營，能使從業人員的人盡其才、各在其工作崗位的大開竅。當前職責與本份，常常是企業經營成敗的一大關鍵。當我們有很多中小企業，由於有家族成員參與經營，結果最後把整個事業弄砸了，這種企業所有權和經營權的混淆不清，普遍的存在我國的企業界中，這個現象會讓企業的高度升級和長久發展，蒙上陰憂。


    一來讓他們有份較安定的工作，二來也想能藉兄弟間的同心協力，把這個父親傳下來的事業好好的發揮，讓大家有利共享。我們很能了解林老板這一種手足情深的一股善念。


    礦業經營，在林老板初掌的階段，兄弟間倒也和睦共濟，其利斷金地一股和樂氣氛下欣欣向榮。但到了戊戌大限的後半期，林老板逐漸發現，弟妹們對公司營運上的意見愈來愈多，甚至無不表現出他們人人都是公司的所有權人，有權利表示和表現一個老板的充分權力和權利，於是常因此而搞得經營羣權分歧，徒生很多因意見不一，而造成的經營上困難。


    到了丁酉大限，情況更糟，幾個弟妹在公司作事，根本就是憑自個的意願行事，特別是會計小姐，經常向林老板報告，他的弟妹經常有人向她預支公款，但老是不正式報帳，讓她在帳務處理上造成許多困難，而不知道怎麼了結。林老板每碰到這種窩囊事，也只有痛心疾首，而無以回答。


    林老板命座天機在丑位，依墨曜賦性，天機爲兄弟主，化氣曰善。這種人在兄弟間大都會表現出一種兄友弟恭的手足之情，因此他才會在父命接掌事業大權後，為他的弟妹們在自己的公司安排工作。


    己亥大限，林老板座落陷的太陽先天化權，已干使武曲化祿、貪狼化權。禄權引動在後天的兄弟宮位上，在此兄弟宮，本來氣勢強過林老板的大限宮位，但由於化祿的解危制厄，火貪的煉制和左右的扶持，使他的弟妹們還不敢絲毫表現任何嚣張。再說，當時弟妹們初入社會，年紀都輕，亦還未婚，公司事務亦都能聽諸於林老板的吩咐辦事，及至戊戌大限下半期，弟妹年紀稍長，並已結婚，家庭再不是單純同母所生、同父所養的成員，對於這個家族經營的事業，意見也就多起來。


    戊戌大限，貪狼化祿、太陰化權、右弼化科、天機化忌；這個忌會入後天的兄弟宮（酉），和文昌化忌一攬和，使得林老板深受和弟妹合伙經營事業意見不合的痛苦（丑酉和巳宮
    | 先天官祿宮為三合方）。但兩顆後天的兄弟宮忌星，究竟還不是什麼剛烈惡星，何況林老板大限三方四正會強宮，這個大限亦使他的身宫會見兩個化權。因此弟妹們意見雖多，但事業還可勉強維持運作。但到了丁酉大限，儘管林老板自座大限的天同化權，但由於文昌化忌會了巨門化忌，經道兩忌的破壞之下，使天同化權失去威風，從此以後他的弟妹們幾乎到了私無尊長、公無法紀的地步。


    在斗數命盤除上述現象以外，我們發現到林老板的先天兄弟宮，破軍犯地劫之餘，這個官位三方四正的星曜組合，甚為強旺，氣勢凌架命宮之上。己亥和戊戌兩個大限的兄弟宮，一個是貪狼化權、一個是會太陰化權，大有喧賓奪主之勢，更奇怪的就是，林老板從第一個大限的辛丑限到第五個大限的丁酉限，不是使先天的官祿宮已位會了後天大限的化忌星，就是讓文曲由科變忌，巨門亦由祿轉忌，這種命理上的一連串化忌的沖擊，更加上兄弟姊妹間共事的不能和諧，使林老板對這個分崩離析、家族經營的事業，失去了信心，也感到無比的痛心，使稟性和善友愛的林老板，不知何去何從？


    像林老板他們這種典型的家族企業，很多都會碰上這些經營上的困擾。這種因親人參加經營的公司，最後變成一個公司會有好幾個老板，而導致事業的最後瓦解。我告訴林老板，最好請出老太爺出來裁決，由老太爺指定，把這個公司交給子女間最適合的人選，出來負責經營，其他人一律以擁有股權的方式，作爲股東，但必須退出公司的經營管理。公司用人一律公開甄選，唯才是用，任何親族皆在摒棄之列。若是沒法辦到，乾脆把這個公司頂讓，兄弟姊妹間各分得應有的所得，然後各奔前程，否則一旦拖下去，恐怕這個事業毀掉不說，兄弟間亦將視同陌路。因為，丙申大限，廉貞化忌，會先天的兄弟宮。這是一個中小企業，特別又是一個家族公司，在經營上的大悲哀。


    ## 夫妻宮


    自古以來的男女婚姻制度和觀念，不只因時代不同而差異太大，甚至在同一時代或因地域或宗教信仰的差別而大異其趣。當今之世，若把各地婚姻的現象、制度和習性，作個詳盡的調查和報導，必定成為一部洋洋的大巨著。


    歐美爲一夫一妻制，但對性的觀念，相當開放；中東的回教國家，一夫可以多妻，但卻視姦淫爲罪大惡極；咱們國人除了特殊原因外，只有少數人可以公開享有齊人之福，男人或女人儘管偶而偷吃腥或作第三類接觸，無不偷偷摸摸的不好意思，也不敢大胆的拋頭露面。這種現象，不單是由於法律的限制，甚至還帶有相當大的性關係，致使相當多的婚姻問題亮起警戒紅燈。未婚的未盛是童男和處女，已婚多的是婚姻上的困擾和波折，不免使人懷疑究竟這個婚姻制度有什麼不對？清官難斷家務事，家庭懇談中心亦未必能提出什麼好意見。張老師對婚姻問題也不一定就能提出什麼好辦法，因此在命理的談論個案上，婚姻問題的案件才會特別多。我不以爲一個泥守古法的相命仙，能憑古泡製出什麼仙丹妙藥，能用一成不變的古傳命理法則，給現代婚姻作調解人。現代的婚姻已不是老祖母時代的父母之命、媒妁之言，就可以終生隨狗走、隨雞飛。


    算命仙們可曾想到未婚者的遲遲不婚，不只是八字少了一撇，還可能牽扯到個人某些心理上、生理上的問題，專業問題、求學問題、家庭問題，甚至一些莫名奇妙的原因。結婚後的婚姻波折，究竟出在那一方和那些事體上，這些亂七八糟的一籮筐又一籮筐的理由，可以使專家教授們連續公開演講幾年都談不完，因為任何雞毛蒜皮的理由，都可以叫婚姻觸礁，一個算命先生也許可以從命盤裡頭推演斷出這椿婚姻觸了礁？但如果你不去考慮到究竟觸了什麼礁？又為什麼會觸礁？以及如何去排除這些礁石？那你的論命也等於白論。因為問題還是存在。


    而你要去了解這些問題，除了稍通斗數命理法則以外，至少你還需要兼備相關的學識、通達人情世故。婚姻事關兩個人相處一輩子的事，雖然也是一人際關係上的一種，但他的「類型」絕對異於其他人際關係的「類型」，我們固然可以用命理方式來釋疑解難，但若獨用老祖宗傳下來的那一套，一定很難去爲天下的怨偶，或爲找不到另一半的人，幫上什麼大忙。


    ### 斗數合婚


    台灣最起碼在近一甲子以來，你很可能聽到某些人一輩子因爲什麼條件差，娶不到老婆，但當醫生而一輩子不結婚的並不多見。老一輩的醫生，甚至元配以外還會娶上小老婆，都是司空見慣的事。因爲女人有個醫生丈夫，一輩子就好像開到金礦，何至生活無缺，甚至享盡生活上的優裕。所以以前一個醫生要討幾個老婆，都相當簡單的事。


    因此近一、二十年來，一個年輕人只要咬緊牙關擠進醫學院的醫科窄門，不管他家窮得住破屋、吃地瓜過日，也許還在爲學費籌措傷腦筋尙無著落的時候，就有富貴人家透過媒人找上門來，想結兒女親家。這一下子可好，如花似玉的大閨女，將來可當老婆，富有的準泰山岳父，也可解決當前和往後不短期間的學費大難題。尤其畢業後，開診所需要樓房和設備等龐大資金，亦都有了著落。


    古人說，富中自有黃金屋、口中自有顏如玉，對今人來說，也許只有諷上醫科的醫生和準醫生，才有這種希望。難怪近幾十年來，每個醫學院的醫科，都叫有志於此的年輕人擠破了門。


    不過，凡事都會有例外。這個命例的楊醫師，他不但目前擔任某公立大醫院的內科門診主治大夫，而且還擁有考試院中醫師特考通過所認定的合格中醫師資格，因此診斷起病人來，可算中西醫理戰長補短，互為合參辨症，用起藥來，可比一般只用一種中或西診療法的醫生，來得神妙無比。這也許是這幾年來醫療主管單位積極提倡中西醫合併研究的成果，這更是二千多年前的中醫祖師爺張仲景先生，沒能始料所及。


    這個命例是好友小李提供的。李先生，大學時學的是中國文學，然而涉獵之廣，除了本科外，諸凡西洋哲學文學、心理學、邏輯學、社會學，特別是咱們老祖宗所特有的易理之學，更是心得非泛泛。近些年，小李也跟著人流行起探肘斗敗命理**學**，據他自己說，完全沒拜師，也沒進過補習班，單憑自己看書研究。由於學識根基深厚，雖然他自己說時間還不很長，但在朋儕閒閒談斗數命理時，常有驚人之語。但他也很有自知之明，不敢就引爲自傲。究竟會讀多了，他還能知道學術這麼一種東西，實在是無窮無盡，單憑他幾年對斗數的探研，自己有幾兩重，倒是心知肚明，並不像一般卅來歲的年輕人，就把自已看成一派大師般的妄自尊大，看來他沒把書白讀了。


    **前些日子**，他在我上班時來電話，說是好久不見，要向我問安。我知道這小子不會無緣無故地來問安，他總是無事不登三寶殿，大概又是碰上斗數難題，才找上門來。他要和我約個時間登門造訪。正如預料中，他又碰到斗數難題。幾天以後一個晚上，他帶著一籃時節水果到舍下來，這小子，就以一籃水果抵充先生禮金，算盤之精，我也只好認了，誰叫我不幸碰上這個年輕人。


    **他從口袋裡掏出這**個楊醫師的命盤，問我說：「夫妻宮紫破在丑，羊刃同坐」會鈴星和貪狼化忌；又不見左右，這麼凶的格局，能不能討到老婆？我說：「爲什麼時不到老婆？」這個命盤，假使早生一甲子，只要家世中等，身體無殘障，早就在甲'
