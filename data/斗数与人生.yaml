    | 己酉 | | | | |'
- md: '但亦很難作爲必然的現象說明。大限壬子，天梁雙化祿、武曲雙化忌，又因鈴星同躔，成爲正格寡宿，但不會父母宮，何況父母宮的天梁還化雙祿，竟會在童年喪父？先天田宅宮在卯，在寅有七殺爲火星所剋，在辰有武曲化忌和鈴星的寡宿格來夾制，這大概是先天田宅受惡煞夾害，才會住那種房屋的原因。先天兄弟宮組合不錯，所以以兄弟衆多，但大哥却是同母異父，因此也就成異姓半親的兄弟。但依我觀察，他們兄弟都對這位異父兄長敬重有加，斗數命盤就不知道如何解說？


    陳先生在丁未（一九六七）年，即壬寅大限間加入本公司。由於初入公司時，家境並不寬裕，因此一直租屋在負責業務地區居住，直到癸卯大限，限入先天田宅宮初期，才買了一幢上下兩層樓總共十三坪大的小房子住，總算不再過那種寄人籬下的質居生活。也許，有恒產斯有恒心，從此陳先生事業逐漸步入坦途。在省吃儉用之餘，把事業上的賺錢盈餘，除了留用週轉金外，儘找機會購買了些可作建築用的土地。據我所知，這些土地他一直保留著，如今已不再是身無片土的窮苦人家，而是擁有家產的有產階級。


    癸卯大限爲先天田宅宮，癸使後天田宅宮破軍化祿，因此使他雖住十三坪的鴉籠小屋，但却有餘力去接二連三地購買土地不動產。也許午宮另受三方四正諸多惡煞的沖擊影響，因此在這段期間的購地，大概不是跟人合買就是先貸款買地，以後分期償還，並不是大手筆的一人一次付款買清。但癸卯大限因買地所借的款項，據陳先生所說，都在癸卯大限間償清。


    由於小時家居房子簡陋，又受人口衆多擁擠之苦，因此陳先生幾年來一直把興建一棟比較像樣子的房子，作爲他生平的最大宿願。人的境遇有時很奇妙，在癸卯大限間，他同樣以借貸補足才向官方標購而得一塊不顯眼的土地，竟在癸卯大限末，規劃變成商業區，四十米寬的大馬路，就在他所標購而有的土地接鄰而過，馬路闢建之後，沿大道兩旁的高樓如雨後春筍般的蓋了起來。曾經有人要以原價五倍的價格向他買走這塊地，他一直不爲所動。


    到了甲子（一九八四）年，我曾經聽他提起想利用這塊土地興建大樓，只是當時興建資金還相差太多，遲遲不敢策劃興建。這時已四十三歲，大限入甲辰，也就是先天官祿宮。到了次年乙丑（一九八五）年，經得一位陳先生一張子引爲大恩人的財神爺，羅先生好像及時雨般地告訴他，現在正是建築界不景氣的時候，建材很便宜，若有意蓋大樓，他可以在銀行貸款上助他一臂之力。在有了靠山之後，他終於在這年的秋天左右破土開工，興建宿願已久的洋房大樓。


    人在潮退當頭的時候，好像什麼事都會迎合著他的需要來幫助他，營造商因不景氣，表示將全力配合，只要夠開支成本就接受委託土木工程，建材商更顯得格外熟絡，建材價既廉，物亦美。等到開工後更妙，各大銀行的分行經理亦都自動前來表示，可以以最低利優惠方式提供貸款，期限任定。人間就是這個樣子，想想十多年前租房子的時候，房東還怕他付不起每月租金，必定要先拿一筆錢作爲租屋押金。現在這銀行經理都跑來低三下四地拜託借錢，真的，人實在不能太窮，否則連鬼見了都怕。我想陳先生的感慨更多，否則他不會在意於興建大樓，將之引爲生平的宿願。


    甲辰大限，廉貞化祿、破軍化權、武曲化科、太陽化忌，引動先天命宮的三奇嘉會，大限又爲先天官祿宮。這個大限開始，他兼營另家廠商產品的經銷，也頗有進帳，因此更加速他完成平生心願的建大樓計劃。乙丑年，天機化祿使先天田宅宮流祿同宮，後天田宅宮呈化祿，井佳會亥宮祿存。丙寅年，天同化祿再度會入後天田宅宮。丁卯年，行先天田宅宫，又得太阴化祿由四宫对照。在这种连续三年使先后天田宅宫都有活祯的吉化之下，一幢七层的大楼得顺利的在丁卯年中落成。对于一个原是家徒四壁的穷家子弟，能在中年期间就有如此成果，也很令人为他庆幸。


    为了要向这位商场上的老战友、老伙伴表示祝贺，我特别以他的大楼名称的头两字，撰了两句贺词，请公司的营业部曾经理（这位年长人曾以筲奋得过日本昭和天皇奖的书法名家）密写成对联，并裱作成框，当为贺礼。陈先生是位不忘本的人，现在他在嘉义事业有成，但他仍没忘记来自麻豆，所以对联撰成这個样子：


    假使你在嘉义路遇，看到这幢大楼，那就是我的好朋友陈先生；一个从两袖清风经过廿多年努力后，得以建立的成果。


    麻生沃野培之枝繁葉茂

    花經心田發為利厚財盈


    假使你在嘉義路遇，看到这幢大楼，那就是我的好朋友陈先生；一个从两袖清风经过廿多年努力后，得以建立的成果。


    ## 福德宮


    關於福德宮的論說更多，有的說事關一個人一生的福澤厚薄，一個人的長壽或短命，一個人的脾氣個性和人品，一個人的物質享受，一個人是成大功立大業、富貴顯赫或一輩子一事無成、窮困潦倒，一個人是否勞碌命，一個人能否享清福，甚至一個女人的婚姻是否美滿、白頭偕老，全部與福德宮關係密切，好像不扯上福德宮，就沒辦法說理完全。


    我們不能說這種論調全對或是全錯，但我們另以為，福德宮的星曜作用現象，完全因人而異。因男女而不同、因所處的時代背景、社會環境而有所差別，更因個人的價值觀念而大異其趣。我們因此不能把同一命盤（同時辰生）的兩個以上的人，認為他們在福德宮上的作用完全相似，這種道理和其他宮位一樣，完全是因人而異。


    有一次，有個年輕人曾經拿一張自己排的斗數命盤問我說，他的先天田宅宮和福德宮都不錯，大限的這兩個宮也不很差，為什麼老想買一輛汽車來開而不可得？雖然還有一部摩托車可以代步，但每當炎暑和寒冬，特別是狂風暴雨的時日，騎機車不但難過，而且危險。我和他家裡熟悉，知道他的家境不錯，父親也有頗具規模的事業在經營，但卻是一個相當理性的企業家，他要他這個剛走進社會的寶貝兒子，以公開應徵的方式，到一家和他家庭毫無淵源的民營公司去服務，從一個最基本的職員幹起，甚至要他利用極有限的薪資在省吃儉用之餘，自行買部二手貨的機車來代步，否則就乾脆去擠公車。


    我以為在這個年頭還有這種父親，的確讓人肅然起敬，他這種作法，正是古人所謂的易子而教，讓他的兒子在一個陌生的環境中去接受磨鍊，使他能在困逆的工作環境中長大，也讓他體會賺錢不易，如想要求生活上的享受，必須付出相當的代價。我也知道他父親所以會如此狠下心來，最重要的還是寄望他兒子將來有足夠的能力繼承家業。當一個成功的企業家不容易，要當一個好父親，真正望子成龍的好父親，也著實不簡單。


    一個人先後天的田宅宮和福德宮都不錯，特別是家境又不錯，別說買輛新機車，就是買部全新的騙車都沒問題。但問題就在他剛走入社會，剛進入一個一切都要從頭學起的私人公司，資淺職微，薪水好不到那裡去，若與家人同住，把薪水當零用錢還綽綽有餘，想要從節餘當中買部車子用它代步，談何容易？雖管家財萬貫，究竟是他老爸的錢，而他偏偏碰上這麼一位嚴父型的老爸，只好以機車代步。


    在斗數命盤上，一個人的田宅宮很好，不一定表示他目前必定擁有龐大可觀的「不動產」也許將來可能，但對這個年輕人來說，在這個時候只能表示居家環境不錯。福德宮好，並不意味着他現在很有錢，只能說他當前生活無虞。我們可以以常理預期，有朝一日，當他繼承了父親的家產和全部事業的時候，何至可以買部國產汽車代步，甚至去買一部勞斯來斯的豪華汽車並雇用專用司機，也絕對是輕而易舉的事。


    因此在斗數論命上，我們千萬不可單憑命盤上宮位星曜的現象，就鋤口直斷他現在必定如何，或者將來必定如何。我們不能光談理論，而不考慮到現實上所遭遇的一面。正如這個年輕人，我們或許可依命盤的星曜現象，論定他在命理的歸類方面，是比較屬於從小就會生在家庭環境富裕的一種類型（但並非絕對如此），將來一輩子在財富方面也比較屬於富有的典型，一旦他後天也具備了這些叫他富有的條件，比如，繼承祖先龐大的財產，再加上生財有道的企業經營能力，即使不變成鉅富，也必定會成爲一個比較富有的人家。我們以爲，命理既然談到先天和後天，我們就不能光憑「落土時」（出生時辰），就認定已經決定了一個人一生的命運。


    以這個理念，我們可以放眼當今世界上，某些三國民所得在一萬美金以上的國家，和那些所得不及幾百美元的國家，他們國民的生活水準和生活品質上的巨大差異。若要探求造成這種差異的原因，我們會從居住環境上、資源豐缺上、人口多寡上教育文化水準上、政治制度上、經濟活動上，甚至其他的天災和人禍上去分析，必然可以找出不離譜的答案。一件事物的存在，必有他存在的道理，而且他的道理，常常又爲多種因素所造成。若我們一定要把造成某一結果的現象，硬推到某個單一因素（譬如說，命理因果），那將會與事實差之毫厘而失之千里。


    因此，我們盡可以依斗數理論來分辨一個人的福德宮如何，大概可以知道他目前生活的情况（福祿宮顯示功成情況）和經濟是否寬裕。從田宅宮，可以推定他的家居和不動產情況。但這只是依理類推，實際上；我們更應該從對話中去了解實際的狀況，否則你將永遠沒法搞清楚兩個年逾化中的人，從小不只隔臨而居，而且在同一個時辰出生，但是由於以後境遇不同，一個在工商界鴻圖大展，另一個却只能一輩子守耕家裡的幾分薄田。如今兩個人不只過着不盡相同的生活方式，也各擁有不同的家庭和財富，我們以爲''在根本上他們兩人出生於不同的家庭，自然造成他們兩人以後不同的境遇。假使你以爲那是祖德和祖墳風水的作弄結果，那只是代表你個人的看法，實際上是否就是如此，我們以爲就是強辯也不會有實在的結論。如果有人認爲，這是一前世的陰德，今世的福報—不同，也未嘗不可。


    ### 有借無還


    **[命例]**

    從陳女士的命盤，可以看出他在斗敗命理命的格類型上，是屬於精明能幹、不讓皺眉的一女強人」由於娘家和婆家都是富有人家，因此婚後家計一直優裕無缺。出門可都是高級進口汽車代步。


