  md: '這位朋友接著又問，跟他父親是個知識份子有沒關係？我說當然有關係。我們知道他父親是某大學的數學教授，因此我們可以確定，楊柏因是生在一個極重視教


    育的家庭，何況他父親早在他讀初中，甚至讀小學的時候，就給他殷殷善誘，不但


    爲他說疑解難，也必定指導他如何作學問，使他在早年裡就啓開了他的聰明智慧。


    若他是出生在一個販夫走卒的家庭，父母靠出賣勞力維生，根本不識字，別說教他


    讀書認字，若能讓他跟一般孩子一樣上學讀書，已經很好了，如何又能及時發現他


    孩子的聰明，給他及時啓發教導？因此，楊柏因在學業上的順利成就，除了聰明才


    智以外，還要加上環境上的因素，特別他還可能得到他父親那種屬於資賦優異的先


    天遺傳。


    從遺傳學上，我們知道一個人的天賦，屬於遺傳的結果，而不是後天任何作爲


    所能作根本上的太大改變。一個人的聰明智慧可以遺傳，體質、體形與外表，甚至


    脾氣都可以遺傳。遺傳病理學上，依例有太多的疾病，全都來自祖先先天血緣上的


    遺傳結果。當然，在遺傳上，好壞並陳，遺傳到好的因子則好，遺傳到壞的因子則


