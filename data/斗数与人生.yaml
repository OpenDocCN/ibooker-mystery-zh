  md: '全是天仙下凡，因此在實際論命時，莫不作神仙論斷。我們很為中國的命理學悲哀，更爲這種不正確的命理之論而誤盡天下的問命者，感到無限的遺憾！


    因此我們以爲，一個命盤格局即使跟楊柏因完全一樣的人，但若在求學方面沒有如楊柏因的所有大小環境，來作很適當的配合，我們以爲，他很難達到楊柏因的成就。儘管命格好，但在一種惡劣的環境裡，他也很難充分地發揮；我們以爲，這種環境上的配合不來，就會造成個人的無力感，而這種無力感所造成的限制，也是命理上的一種陷弱。


    我們且用台塑企業集團大老板的一席話，來作爲環境影響一個人的詮釋，也許可以讓我們搞命理的人更能體會到，學命理不能老鑽在象牙塔內，胡說八道地作着夢語般的瞎話。


    王永慶先生曾經在一個公開場合約略地談到，台塑企業機構所以能有現在的成果，不單是人爲的努力因素，假定他的這些企業提早在數十年前經營，或晚數十年才經營，不一定就能如此，假使他的企業發展在東南亞的任何其他國家，而不是在台灣，也不可能會這樣。一位被台灣工商企業界喻爲企業經營之神的王先生，在功'
