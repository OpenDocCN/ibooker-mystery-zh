  raw:
  - '[PAGE 291]


    這種禀賦，很難徹底的改變。


    在斗數命理上，我們發現到一個人的一生中，這種先天的特質——特別是聰明才智和性格這兩樣，往往是對一個人一輩子命運上有著相當大的影響作用，特別是在命理因素（從天條件以外）的條件上。


    根據心理學上的說法，一個人碰到一件利害相關的事情以後，他會直覺的想到這件事情的利害關係，將會影響他到什麼程度？而這個利害關係程度的大小或重輕，完全是他個人所作的一種價值判斷，然後再根據這個價值判斷來考慮如何來處理這件事項，接著再考慮如何付之行動的實際方式。真正的處理行動，應該是經過這些思維後才施行。


    比如說，甲乙跟丙都是好朋友，丙有急需，同時向甲乙兩人借同額的錢，後來無法如約歸還，某甲以和丙是好朋友一場，朋友有通財之義，既然丙有困難，反正自己生活還可以過得去，也就不刻意去追求丙一定還錢。但某乙想法不一樣，朋友歸朋友，既然是借，必定要還，不管自己的生活有否受影響，借出去的錢一定要索還。因此在幾次討債無果後，一狀告到法院，依法追討某丙還錢。同樣的被欠債，'
  - '[PAGE 292]


    但會產生甲、乙二人對欠債最後處理的不同方式。這正是甲乙兩人對那筆出借的錢，所持的價值觀的不一樣，因此最後才會有截然兩樣的處理方式。這正是心理學上所

    謂的「增強作用」（Reinforcement）。

    我們發現到，斗數命盤上的命身宮在這種「增強作用」的現象上都有作用。但

    是這種由價值觀而作用到「增強作用」時，身宮的作用，似乎強過命宮，也就是對

    一個人在一輩子裡頭，每當碰到他所遭遇的實際境遇，而需以解決時，往往身宮所

    扮演的重大作用會大於命宮。而身宮在這種「增強作用」的顯著功能，由於它都是

    表現在後天的行運上，因此古今以來斗數命理才會把身宮視之爲後天，理由正是在

    此，而並不是指的另有一張身宮的命盤，或是後天環境的實際遭遇才謂之身宮。

    在斗數命理上，我們通常會留意到，身宮所按置在十二事項宮的那一個宮位時，

    比如身宮按在「夫妻宮」，它代表著這個命盤的主人在「夫妻宮」上的一種「增強作

    用」。同樣的，在「財帛宮」、「在「遷移宮」、「在「官祿宮」、「在「福德宮」，也無不代

    表，對該宮的一種「增強作用」。身宮分佈這些宮位，除了這種「增強作用」以外，

    也由於它的三方四正星宿組合和命宮三方四正的星曜組合互爲差異，因而產生一種

    向身宮功能上的調合作用（命身同宮大此調合作用）。因此有人認爲，人到中年起（約在'
  - '[PAGE 293]


    第三限起即略起作用，其後大限作用漸強，由於入世漸深，人與事關係接觸漸入頻繁，所以身宮的作用才會漸大，就是根據這個理由。這也是在古賦文裡，雖然對身宮記述的文字不多，但每提到，字字句句無不強烈指明，身宮在整個斗數命盤命理論斷上的重要地位。


    但是很遺憾的，我們在古今以來的斗數典籍上卻不曾看到有類此對身宮作用作強調性的詳細說明，甚至在命例的列舉分析上，對於格局的認定，也僅限於對命宮的重視，身宮總是諱莫如深，甚至把它看成聾子的耳朵，只是裝個樣子，不以爲他在斗數命理上有些微的作用。然而我們却在很多實際的命例中，特別是對於一些一輩子的命運比較特出、異於一般人的命盤上，發現了一個很特別的現象。這些人的成敗，除了命格（命宮）和限運以外，身宮的現象往往扮演著非常重要的角色。命盤固然亦可以單憑命格和行限運依理來推演，但是若我們再根據身宮的格局，和限運引動對身宮所呈現的作用參入析理和說明，似乎更能使命理的分析更詳盡，更深入和符合事實。因此我們在斗數命理的推理上，把身宮的重要性和命宮作等量齊觀的並重，同時也從此明瞭了古賦文上所以會對身宮如此看重的原因。


