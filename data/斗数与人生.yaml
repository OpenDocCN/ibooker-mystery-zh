  md: '# # 財帛宮


    從人類求生存演變進化過程來看，首先是自給自足，接着才是以物易物、交換有無。再接着才是以某種物體來代替某些事物價值的償付。這個能代表某事物品價值的东西就是金錢。

    若我們套用經濟學上對貨幣（金銀）的三種主要功能的認定：


    (一) 交換的媒介 (二) 價值的標準 (三) 價值的儲藏，就可以知道金錢的重要。

    人一旦過着群居的社會生活、一輩子艱苦勞碌，就不能排斥金錢的謀取。因為沒錢，究竟就談不上最起碼的柴米油鹽的基本生活。這正是無財則難以安身立命的道理。


    因此，財帛之事就變成斗數命理探討上的重要宮位。

    我們姑且不論古傳斗數在「財帛」這一方面的推演法則如何，但我們首先必須要搞清楚：一財帛宮這一個宮位在命盤上究竟扮演者一種怎樣的功能。太多的斗數論命者，一直把這個宮位的功能混淆不清，以為有錢無錢、賺錢虧錢，全部都應在這'
