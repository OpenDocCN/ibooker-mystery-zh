  md: '# # 斗數新理念

    [卷下]


    人們的生活方式，隨着環境而改變。人亦不能離群而獨居，因此任何人的生活

    就會受到所處環境的影響。

    古今以來，每個時代人們的生活方式都不盡相同，生活的理念自然會有差異,

    所以古往今來命概念應該不會完全相似。

    斗數的基本道理可以彌久常新但必須注入新時代的新觀念和新方法否則


    這套祖命法則將會不符時代所用而被淘汰。'
  merge: -1
  pgno: 66
- img_proc: true
  md: '# # 命身宮


    假定斗數命理的程式和規則起之於五代末，由陳希夷築大成而制定，井且經過

    歷代高人修訂和增補，但命理究竟談的都是人間的衆生相，而衆生古往今來唯一千

    古不變的，就是「有生必有死」。除此之外，在追段生與死之間的生活形態，歷代有

    著太多太多的變化！也許，變化是漸近的，在短期間并不明顯，但我們總不能說，

    古人與今人在一輩子裡過的都是極其類似的生活型態。


    由時代的演進，思想文化的改變，使政治制度、社會思想及習俗，必然跟着變

    遷。因此，我們可以肯定在每一段時空裡，人們實際上的生活方式、生活索求，必

    定歷代有所不同。人是過着群居性的社會生活，絕難脫離社會而獨自生存，因此這

    種由時代性而形成的社會生活模式，必定會影響那個時代社會全體人們的生活方式。


    這種實際現象的存在事實，使我們必須放應到，古傳命理在面對着當前與古社'
  merge: -1
  pgno: 67
- img_proc: true
  md: '會截然不同的現象，如何以古理論今事的可能性和適合性。我們儘管能把古傳的賦文倒背如流，但若食古不化，將會使古傳的命理法則與當今世代格格不入。因為，最竟人、事與環境，古昔和今日已有太多的變化，不但是有形的典章制度和無形的思想觀念有所差異，幾乎所有方面都大不相同，因此實際的斗數論命，必須要符合時代的論法。


    在我學習斗數的廿多年裡，不管是閒暇之餘玩票性質的論命，或是和同好間的斗數討論，經常發現到有太多傳統上牢不可破的落伍觀念。碰到對古有觀念比較執著的人，無論如何，就算你能有舌燦蓮花之能，你都沒有辦法讓他接受新理念論析上的觀點。這種情形，若是發生在對一般命理毫無概念的人還沒話說，但對於斗數同好，就會使你氣結慨歎。我們不能不承認，有些也許因古藉上的文字艱澀難懂，致有所曲解，那倒也罷了，偏偏是，明明以一些極其淺顯的常識，就可以分辨道理何在的事，却總是意識不明，讓人以爲他的知識仍舊停留在不經現代文明教育洗禮的半開化社會，這未免太說不過去！


    且以斗數命盤來說，論命必先察命、身兩宮的組合格局，經山這兩個重點宮位'
  merge: -1
  pgno: 68
- img_proc: true
  md: '再作整個命盤推論和分析。這個原則，古今以來大概都不會變。但是命、身宮的組合結構如何，甚至任何一個命盤的排列和組合如何，在命理上只代表「屬性」上的「類型」，並不意味着這個人由於命身宮具備這種組合格局，他將來必定會怎麼樣。


    每個人固然有其先天稟賦的特別條件，我們大體上可由命身宮和整個命盤上，大略看出端倪，但決不可據以鐵口直斷，斬釘截鐵地肯定這個人必定如何。田徑名將楊傳廣先生和紀政女士在他們年輕時，經過體育專家看過他們在田徑方面的良好表現後，都肯定這兩人若能假以良好的嚴格訓練，將來必定會在國際的田徑界上有傑出的表現。事後的證明，果真如此。


    因此在命理上，我們可以這麼說，因為他們具備這種「類型」，更重要的，他們又得到了所屬「類型」上充分發揮的良好機緣，因此他們才能如此。因此，先天的條件和後天的條件，幾乎是缺一不可。我們可以肯定的說，若沒有先天的條件，而一些身高不滿一百七十公分，甚至不具運動細胞的人，就算接受再好的訓練，絕對不可能在十項（或五項）全能運動上，有超國際水準的演出，正如楊、紀兩人曾經締下的佳績。'
  merge: -1
  pgno: 69
- img_proc: true
  md: '有位年輕的朋友曾經提起，命（身）宮陽梁昌祿的人，在當今的社會裡，是否必能順利的讀到博士學位？對於這個問題，我們只能說，這個人他一定要出生在教育制度普遍和完整的社會，他還要出生在一個容得了他上學，受正規學校教育的家庭，最好又是比較重視子女教育的家庭，那麼由於天資聰穎和好學，一旦環境配合得上，不但在現代拿個碩士博士，易如反掌，就是在科學時代，若能十年寒窗苦讀，最起碼的進士及第，應該不致有問題。


    這正是命理上的條件，所謂先天的稟賦，和後天可能的機運和力行，而不是命格好，這個人將來必定如何飛黃騰達，命格壞的就導致如何得坎坷遭殃。因此，我們也可以肯定，在亞馬遜河文明未開的土著，儘管生個智商高達一百六十以上的孩子，或者是陽梁昌祿的上上格局，只要他一輩子與文明社會絕緣，只要他一輩子都住在跡近洪荒未開的地方，那麼他在聰明才智上的表現，或許比其他同族的人更擅於漁獵，抓魚鳥、獵走獸的技術特別好罷了。


    他一輩子的遭遇和表現，絕對和文明社會的一般人無法相提幷論。其實在整個斗數的論命上，不只由命（身）宮的格局必須作如此說，就是其他宮位，亦得如此論。'
  merge: -1
