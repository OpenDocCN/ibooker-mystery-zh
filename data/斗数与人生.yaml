    他 可以 同時 娶 幾個 老婆，一般來講，婚變情形不多見。但你我現在必須守着一夫一妻制，而且婚姻多有不甚穩固，不再像以前的「嫁雞隨雞、嫁狗隨狗」，而是一旦認為兩情綠盡，就可以分道揚鑣（基於創業，不一定再全賴家業和祖蔭，憑的是個人的才華能力，以及因緣際會）。命理上，千古以來探討的也許離不開妻、財、子、祿，但這些事項古今以來，在實質上和形態上已有太多和太大的變化，因此我們在斗數命理的闡釋上，必須基於時代的現實社會背景據以演繹，否則人家將以為，你是在談老奶奶時代的往日瑣事。


    社會環境不但因時代不同而有所差異，就是同一時代亦會因地域不同，在生活的方式上、在思想觀念上、在社會習俗上，亦會有相當的差異性，若再加上政治典章制度的差別，那人們一切活動方式和生活的訴求，相差更多。就以當前散居在全世界的中國人來講，由於所居住的社會環境不同，儘管外表都一樣，甚至可以相通的北京語對談溝通，但我們可以肯定認為，在不同居住社會環境的不同中國人，每個人對於人生一輩子的很多事體，不僅想法不一樣，處理的方式亦必不盡相同。人不能離群獨居，因此他的言行思想和觀念，必受他所處的社會環境所影響。'
