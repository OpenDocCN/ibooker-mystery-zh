  md: '但會產生甲、乙二人對欠債最後處理的不同方式。這正是甲乙兩人對那筆出借的錢，所持的價值觀的不一樣，因此最後才會有截然兩樣的處理方式。這正是心理學上所

    謂的「增強作用」（Reinforcement）。

    我們發現到，斗數命盤上的命身宮在這種「增強作用」的現象上都有作用。但

