  md: "- 教育的機會。在這種大環境上，楊柏因有，其他的小孩也有，但實際的求學過程和結果，在同一時間裡，卻沒有第二個楊柏因的出現。\n- 情形所以會如此，我們以爲楊柏\n\
    - 因具有他人所沒有的特殊條件，尤其來自家庭和父母方面的條件，因爲他的父親楊維哲教授，曾給他孩子作過適期又適當的啓蒙和指導，使他的聰穎資優智慧能夠充分得到訓練、發揮。而其他同命盤的人並沒有具備這麼好的讀書環境，自然在求學的過程表現上，不可能會有相同的結果現象。\n\
