    # # 財來財去

    [命例]


    斗數十二宮各有所主，財帛宮主生財理財之道。一個人除非能得祖蔭，一出生就擁有家財萬貫，並能守成，則一辈子食用無缺，可以不必為財來財去而擔憂煩惱。


    但是這個世界絕大多數的人，一旦獨自謀生後，必須爲五斗米而奔波勞碌，上焉者財源滾滾，好像財利跟他特別有緣，有求必應，呼之即來。下焉者，拚著老命絞盡腦汁，但財利似乎與他緣薄，愈是追它，它愈跑得比你更快更遠，能夠讓你逮到，算是你的幸運。更糟的是還有一種人，像過路財神，賺錢生財之道很積極，也很有辦法，但是往往賺虧之間形成一種兩極化的現象，有時赚的比虧的多還好，但時運不濟時，就變成虧大於賺，到頭來在追求財利上，變成一場空。


