  md: '什麼離譜甚至些微的瑕疵，都認為聽到了一篇精闢的命理分析。


    我本來還存著多少爲人顧全而子的想法，不想在大庭廣衆前，指出他這些論斷


    全部都是有理無命，根本和事實形成牛頭不對馬嘴的歪論，以免讓他當衆出醜，待


