  md: '斗數命理的本質


    （一）斗數命盤的本質｜類型


    你可以設定任何包括年月日時辰的資料，依斗數排盤的程式規則排出一個斗數命盤來。追命盤只能說是，如同數目字套進數學公式加以演算後，會產生某一個計算結果。數學的演算在基本上，並不一定代表某些什麼特別意義，但一旦應用在某種現象的解說時，它就有它的特別涵意和功能。斗數命盤也是這樣子，只要我們輸入的是根據一個人的出生資料時，它將是成爲一張可以用作論命的命盤，這個道理就跟卦爻一樣，一個卦象並不一定代表某種特別意義，但當你藉以斷某些事物現'
  merge: -1
  pgno: 263
- img_proc: true
  md: '象時，它就有了他的特殊意義和道理。正如一個卜卦先生，當他卜出卦象後，他必須要問，問卦的人究竟要談些什麼事。其實我們若把斗數命盤十二宮位的星曜組合，每一宮看成一個卦象，而整個命盤又看成一組集十二個卦象的卦爻也未嘗不可，每個宮位有它單獨的卦象，而整個命盤也有它整體性的卦象。


    斗數命盤既然是根據一個人的出生資料來設定，我們可以視同它因緣起滅之於這個人，因此我們可以據此命盤，來推論這個人一生遭遇上榮枯禍福的消長本質和趨勢上的一種概約狀況。我們認為斗數命盤所顯示的，也只能說是一種現象、一種特質，或者說它是一種類型，但這個類型並不一定意味著它必然會有什麼際遇和變化。正如我們前文提及一塊銅片，它可以在鹽酸、硫酸和硝酸中，起不同的化學變化。若說銅能在這三種化學溶劑中起化學變化，是銅的一種特有本質，但它在三種溶劑裡，卻產生三種不同的鹽類化合物。若我們把斗數命盤或是每一個宮位比喻成這塊銅片，而後天環境的遭遇差別，比之此三種酸性溶劑對銅片的化學作用，我們可以明瞭，命盤在命理上所具有的本質和意義。


    不過我們特別要強調，我們把命盤比之以銅片，後天的個別遭遇差異比之以三'
