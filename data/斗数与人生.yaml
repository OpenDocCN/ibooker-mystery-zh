  md: '不過，若從行限和子女宮推演命理的現象，單由林太太的命盤上，似乎構不成生不了小孩的理由。甲申大限廉貞化祿，照酉宮的紫貪，由於子女宮無甲級星，使紫貪的作用全盤進入，再與原來的祿存引動。同時廉貞化祿也會照了大限子女宮的已位武破。武破只會吉，不會忌煞，正利於六親宮，因此在這個甲申大限，林太太竟生不出一男半女，寧非怪事？乙酉大限，天機化祿、太陰化忌，太陰化忌，雖然天機化雙祿，不會先天子女宮，也不直接會入大限的子女宮，太陰化忌，也不對先後子女宮造成不利作用。我們可以認爲，最影響大局的化祿和化忌，都對子女宮沒起什麼大影響。但基於大限走入田宅宮，應該是田宅和子女宮作用較大的原則和理由，何況大限遷紫貪會左右見祿存，更有鈴合成格的大好局面，沒有理由仍然生育無望，最後搞到竟以抱頭蛤子收場，真是難以用命理推論，作任何合理的解說。


