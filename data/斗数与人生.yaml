  md: '在老爺爺的時代，當時還是個封閉的農業社會，社會上的行業也許三百六十行

    已經可以概括了，因此那個時代裡，三家村裡算八字的老先生們就用金木水火土五

    行的屬性跟客人說，你命中喜木相生，因此，可以去經營木材生意，必將大發利市、

    發大財。你命格土太旺，宜作五金生意，土可生金，除可使事業興旺發展外，尚可

    藉暑洩土太旺之氣，以求中和，既利財官，又可延年益壽。這是傳統命理上，用五

    行歸屬來談一個人一輩子應該利於何種行業的經營。

    時至今日，環境變了，行業之多，何止三百六十行？恐怕誰也數不清。因此現

    在談命理在論及職業行別種類時，若再以五行來歸類，客人將會搞不清楚，一個在

    官方機構上班從事行政文書職務工作的人，究竟五行屬什麼？若五行不合，能否有

    升遷機會，甚至可否平安無事，上班到告老退休？五行應用在職業類別上極爲不合


    # # 官祿宮'
