  md: '劑。四化可以根據這種理念而用之於斗數推論上。


    比如說，「廉貞七殺」的格局，我們都知道尚需會見擎羊，並使廉貞又化忌（同宮最凶），才會引助。這個廉貞忌，正是如觸媒劑般使七殺廉貞和擎羊間作了一種催化作用，而使這三者如同三種物質起了化學變化。我們再三地強調，斗數命理學是一種有道理的命理之學，因此它的道理，應該和天下間的一切道理相同，否則它不會成爲一種言之成理的入世學問。


    根據這種觸媒作用的理論，我們認爲祿、權、科、忌這四化星，它們出現在斗數命盤上，是扮演著一種催動星曜、發揮它某特殊作用的功能。至於是吉象，吉到什麼程度？是凶象，凶到什麼結果？應該還牽涉到其他星曜及其組合上的問題。基本上，不能單憑四化的現象，就來作根據而加以論斷。


    由於四化在命盤上包括有生年四化、大限四化、和流年四化（月、日同忌），這些四化，各自扮演不同時段的功能，又在實際命盤論命的時候，我們採用一種如同樹木必須根部、樹幹和枝葉相聯的看法，也就是流年必須基於大限，大限必須基於本命（格局），一種不容分開的理念。因此當運用化星時，我們很重視本命、大限和流'
