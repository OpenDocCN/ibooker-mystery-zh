  - '[PAGE 47]


    我聯想和領悟到，斗數星曜的賦性，所以分別有其賦性作用，“主”於何事項（如天機爲主兄弟和主宰祿），每個星曜在命身十二宮和地支十二宮的作用，星曜賦性在不同現象的作用之極致和限制，星曜在斗數命盤所呈現吉不靈吉和凶不靈凶的道理。


