    # # 財帛宮


    從人類求生存演變進化過程來看，首先是自給自足，接着才是以物易物、交換有無。再接着才是以某種物體來代替某些事物價值的償付。這個能代表某事物品價值的东西就是金錢。

    若我們套用經濟學上對貨幣（金銀）的三種主要功能的認定：


    (一) 交換的媒介 (二) 價值的標準 (三) 價值的儲藏，就可以知道金錢的重要。

    人一旦過着群居的社會生活、一輩子艱苦勞碌，就不能排斥金錢的謀取。因為沒錢，究竟就談不上最起碼的柴米油鹽的基本生活。這正是無財則難以安身立命的道理。


    因此，財帛之事就變成斗數命理探討上的重要宮位。

    我們姑且不論古傳斗數在「財帛」這一方面的推演法則如何，但我們首先必須要搞清楚：一財帛宮這一個宮位在命盤上究竟扮演者一種怎樣的功能。太多的斗數論命者，一直把這個宮位的功能混淆不清，以為有錢無錢、賺錢虧錢，全部都應在這'
  - '[PAGE 119]


    個宮位上，幾乎把事關金錢（財帛）上的一切有無和功過，一概賴在這個財帛宮上。


    返種稻麥不分、魚目混珠的錯誤論命方法和理念，使得論命的真實性常常和現實格


    格不入，亦使論命的層次每況愈下。


    在基本的斗敗論命法則上，我們以爲，財帛宮若僅針對金錢的得失而言，它應


    該是指關於金錢來源上的有關現象。贏得更實際一些，能不能賺錢，賺錢的多少和


    離易，以及在賺錢乙享可能產生的性質和變化，才是財帛宮的真正功能。


    一個人現在或今後可能賺很多錢，是財帛宮的問題，一個人現在手頭很拮据，


    帛宮不好的原因，因爲他很可能有很好的收入，但老是存不了錢。這事牽涉的範圍


    很廣，但絕不能單以財帛一宮來論斷。若以偏錢一享來說，一個人在作生意時，由


    於貨帳收不到被倒帳而所受的金錢損失，跟他把錢出借收不回，導致血本無歸的損


    失，雖然同樣都是金錢上的損失，但是造成損失的原因和性質却完全兩樣。因此在


