- md: '## 兄弟宮


    兄弟宮在斗數的十二宮位佔了一席之地，因為它是人倫的一個部分，它緣之於血親，代表大部份的人都有這一份親情存在。但是在傳統斗數的論命法則上，似乎只是聊備一格，因為在強調男女論命的重點宮位上，不管男女命，都不把兄弟宮列入重要宮位，因此常為斗數的論命者所忽視。


    我們不能否認，與「我」在一生中關係最密切的，先是父母，後是太太（先生），再來是子女，兄弟固然亦是血緣之親，但不能與直系血親的父母和子女相比，套用現代的法理說法，他只是旁系血親，在和「我」的利害關係上，並沒有如太太（先生）那樣地密切、那樣地休戚相關。也許是基於這些理由，因而在古命理（斗數）法則上對於兄弟宮這方面，多偏向於論及兄弟間的情份和多寡，以及兄弟們大體上的一生情況。


    ## 手足之情


    我們不否認，這些事在「親兄弟」的情份上，一般人都會關心，但在斗數的論命法則上，重點並不在這個「關心」。我個人以爲這個宮位既然是本命宮的鄰接宮位，這個宮位的星曜之強弱氣勢，對左鄰所在的命宮具有相當大的影響作用，也許只提命宮右鄰的兄弟宮，不足以說明鄰宮的要要，若再提起命宮爲父母宮與兄弟宮所夾輔的現象，就更可以強調出這兩個鄰宮所顯示對命宮的重要性。一個左右鄰宮（即父母宮及兄弟宮）的星曜都是廟旺，豈不正如一幅大樓興建在一大片堅固的地基上，當然比起一邊靠山，另一邊卻是懸崖絕壁，隨時會因地基陷落而有倒塌之處的大樓穩固、安全。這是一個很淺顯的道理，因爲左右鄰宮吉輔，正是斗敗論命法則上所引爲的吉格。


    若我們改從另一個屬於倫理性、教育性的觀點來說，一個人從小由父母養育和兄弟姊妹同在一個屋簷下長大，由襁褓而幼童而少年、成人，長期的朝夕相處，我們勿須談什麼管教的大道理，單以耳濡目染，近朱者赤、近墨者黑的俗話，就可以知道一個人一輩子所受父母兄弟間潛移默化的大影響。若以心理學家的話來說，一個人從小的家庭生活是影響一個人心理和人格最大的階段和環境。而人格和心理，往往是決定一個人一生何去何從，和一輩子將扮演什麼樣角色的重大關鍵。我們不是不同同從兄弟宮討論兄弟關係方面的吉凶和得失，但我們更應該從斗數命盤整體上分辨這個宮位和本命宮甚至命盤星曜上所呈現之可能發揮出來的正面與負面的作用。


    [一命例]


    台灣近卅年拜工商業發達、經濟繁榮之賜，使國人的生活提高很多，甚至社會結構附帶引起相當大的變化，政治制度和社会的思想觀念亦由保守而進入開放自由。


    我們可以樂觀的預期，我們的國家和社會將來會更快速的邁向康莊大道。


    提起經濟發展，國人會想起台灣是一個天然資源缺乏的地方，經濟發展是以國際貿易為導向的工商業模式。這種模式使台灣經濟繁榮成爲遠東地區經濟發展的奇蹟。四條龍之一亦成爲世界開發中國家經濟發展的奇蹟。


    一般國人提起工商業腦海裏馬上浮出國內幾十個規模龐大的企業王國，特別是個中的龍頭老大，台塑企業集團。這個企業王國的輝煌成就，就算是不同行的人士，亦都知道台塑有這麼一位大老板王永慶先生。由於國內的這些大企業，的確在台灣的工商界起了一種舉足輕重的影響作用，因此很多人認為，台灣工商業發達、經濟繁榮，多半是由於他們這些大老板大企業的帶頭有方。


    其實我們若根據實際的資料所載，以一九八五年來說，全國登記有案的大小公司，高達七十二萬七千多家，而營業實績作爲大小（中）企業分類，列入大企業規模經營的大企業公司，所佔的比率數不足
    2%，反而有 98% 以上的公司是屬於中小企業。若以出口貿易總金額來講，一九八五年的三百零七億美元當中，中小企業的業績比率佔了 61% 強，而各大企業的總合才有
    39% 弱；到了一九八六年出口貿易纖縮快速成長，而中小企業業績不但隨著增大，而且在整年的出口貿易所佔的業績比率，更提高到 70% 左右（這些資料，得自好友黃會計師提供，節錄自經濟部中小企業處所公佈，境中謝意），可見台灣的中小企業，在整個經濟發展上，扮演著相當重要的地位。


    但近兩年來，當新台幣節節升值，中小企業在大感吃不消的時候，某些官員不明究裡的大發厥論說，趁此機會淘汰一些不健全的小廠商。好在經過王永慶先生的大聲呼籲，要求政府的主管機關給這些中小企業作必要的輔導和協助，使他們能夠順利渡過經營上的大難關。偉哉斯言！總算有個深知民間疾苦以及充分瞭解台灣工商業結構的王大老板，能使義執言。


    在工商界服務的人，很多人會了解，大企業和小公司在經營上各有其優劣點，若真的要檢討起來，真可以一籮筐一籮筐的列舉成冊，寫成幾本大書，都不一定寫得完。但他們之中，在一般來說，有個比較明顯的差別，就是大企業在用人方面趨向於唯一才是用，而中小企業，特別是很多家族型的公司，在用人方面卻是唯親是用。前者的用人，公開徵才，人事管道暢通，人人都能發揮他的專長能力，貢獻公司；後者用人來自家族親人，人事無制度，人人以老板自居，作事以抓權爲主，搞得公司欲振無力，名義上的負責人董事長，常常徒呼無奈！


    這個命例的主人翁林老板，正是這種典型家族經營的一個生產事業公司的負責人。他在己亥大限後期，由於兄弟排行是老大，因此儘管接管的事業並非他所學，還是不得不挑起他令尊大人所經營的事業。接管事業之初，他眼看著幾個兄弟姊妹剛出社會，都沒能找上理想的差事，因此他要這些兄弟姊妹共同來參與公司的經營。


