    認為乃得之先天遺傳，並不是後天所能改變。


    我們以爲，一個人得自父母母血（卵）孕育而成，而生辰正是一個人在母胎孕育完成，呱呱墜地而進入人間的緣起時，因此我們據以排定斗數命盤。這個命盤即代表這個人先天與生俱來的所有特質，也就是一種先天特質。若我們根據這種理念而推演一個人的命盤，實際上就是代表著一個人的先天秉賦——也即所謂的先天命格，不管他在命盤上的命宮或身宮，都可以作此認定。


    一個人受先天遺傳而得的，除了IQ、體格外，還有性格（其他項我們暫不論）。


    除了IQ為後天所不能改變外，體格和性格雖也多少會受後天際遇的影響而略有改變，但基本上，先天禀賦的現象還是有相當大的存留，很難全部的被改變。絕大部份的人，體格外形還是大半受到先天遺傳條件上的影響。因此我們相信沒有一個人會同意，任何一個小孩從小就給他很好的營養和適當的體力運動和訓練，將來長大後也都會有紀政和楊傳廣的體魄，而能接受十項全能訓練後，亦都能有世界級的優異成績。性格更是如此，絕大部份的人，雖然可以藉修心養性來訓練，但很難能求得把天性性格完全改變，即所謂「江山易改，本性難移」指的就是先天（造份）上的'
- md: '## 這種禀賦，很難徹底的改變。


    在斗數命理上，我們發現到一個人的一生中，這種先天的特質——特別是聰明才智和性格這兩樣，往往是對一個人一輩子命運上有著相當大的影響作用，特別是在命理因素（從天條件以外）的條件上。


    根據心理學上的說法，一個人碰到一件利害相關的事情以後，他會直覺的想到這件事情的利害關係，將會影響他到什麼程度？而這個利害關係程度的大小或重輕，完全是他個人所作的一種價值判斷，然後再根據這個價值判斷來考慮如何來處理這件事項，接著再考慮如何付之行動的實際方式。真正的處理行動，應該是經過這些思維後才施行。


    比如說，甲乙跟丙都是好朋友，丙有急需，同時向甲乙兩人借同額的錢，後來無法如約歸還，某甲以和丙是好朋友一場，朋友有通財之義，既然丙有困難，反正自己生活還可以過得去，也就不刻意去追求丙一定還錢。但某乙想法不一樣，朋友歸朋友，既然是借，必定要還，不管自己的生活有否受影響，借出去的錢一定要索還。因此在幾次討債無果後，一狀告到法院，依法追討某丙還錢。同樣的被欠債，但會產生甲、乙二人對欠債最後處理的不同方式。這正是甲乙兩人對那筆出借的錢，所持的價值觀的不一樣，因此最後才會有截然兩樣的處理方式。這正是心理學上所稱的「增強作用」（Reinforcement）。


    我們發現到，斗數命盤上的命身宮在這種「增強作用」的現象上都有作用。但是這種由價值觀而作用到「增強作用」時，身宮的作用，似乎強過命宮，也就是對一個人在一輩子裡頭，每當碰到他所遭遇的實際境遇，而需以解決時，往往身宮所扮演的重大作用會大於命宮。而身宮在這種「增強作用」的顯著功能，由於它都是表現在後天的行運上，因此古今以來斗數命理才會把身宮視之爲後天，理由正是在此，而並不是指的另有一張身宮的命盤，或是後天環境的實際遭遇才謂之身宮。


    在斗數命理上，我們通常會留意到，身宮所按置在十二事項宮的那一個宮位時，比如身宮按在「夫妻宮」，它代表著這個命盤的主人在「夫妻宮」上的一種「增強作用」。同樣的，在「財帛宮」、「遷移宮」、「官祿宮」、「福德宮」，也無不代表示對該宮的一種「增強作用」。身宮分佈這些宮位，除了這種「增強作用」以外，也由於它的三方四正星宿組合和命宮三方四正的星曜組合互爲差異，因而產生一種向身宮功能上的調合作用（命身同宮大此調合作用）。因此有人認爲，人到中年起（約在第三限起即略起作用，其後大限作用漸強，由於入世漸深，人與事關係接觸漸入頻繁，所以身宮的作用才會漸大，就是根據這個理由。這也是在古賦文裡，雖然對身宮記述的文字不多，但每提到，字字句句無不強烈指明，身宮在整個斗數命盤命理論斷上的重要地位。


    但是很遺憾的，我們在古今以來的斗數典籍上卻不曾看到有類此對身宮作用作強調性的詳細說明，甚至在命例的列舉分析上，對於格局的認定，也僅限於對命宮的重視，身宮總是諱莫如深，甚至把它看成聾子的耳朵，只是裝個樣子，不以爲他在斗數命理上有些微的作用。然而我們却在很多實際的命例中，特別是對於一些一輩子的命運比較特出、異於一般人的命盤上，發現了一個很特別的現象。這些人的成敗，除了命格（命宮）和限運以外，身宮的現象往往扮演著非常重要的角色。命盤固然亦可以單憑命格和行限運依理來推演，但是若我們再根據身宮的格局，和限運引動對身宮所呈現的作用參入析理和說明，似乎更能使命理的分析更詳盡，更深入和符合事實。因此我們在斗數命理的推理上，把身宮的重要性和命宮作等量齊觀的並重，同時也從此明瞭了古賦文上所以會對身宮如此看重的原因。


    我們若以衆所週知的命例，蔡辰洲先生的命盤來作說明（詳細命理分析參見《現代紫微》第二冊）。他命座天相在丑，紫府相朝垣格，六吉只有天鉞由酉來會，祿存在巳來合，煞星有火星和地劫，生年天干四化皆不見。命宮星曜組合，怎麼看都不像是一位一生會是既富且貴的格局，可是他出生在一個豪富之家。身宮祿存在巳位獨坐，為羊陀夾的組合。這種組合（成刑格局）本質上相當脆弱，易爲三方酉、亥、丑宮位星曜作用的侵入而受影響。其中對巳宮形響作用最大的，首推亥位上的暗星。身宮的這種祿存獨座，當行運沒有忌星沖照時，不會引起身宮（亦即巳位）的不良形響作用。


    從蔡先生第一個大限辛丑的太陽化權，使巳宮爲雙權所輔，庚寅大限，武曲化權會入亥宮，照入巳宮，辛卯大限亦使巳宮爲雙權所輔，這種連續三個大權使蔡先生的身宮得到「化權」的感應，他又出生在豪富家庭，在命理的現象上，他這種由小到三十多歲的過程中，將會在不同的階段上，呈現出一種「威權」至高的「增強作用」。這種命理因素，和他的家庭環境，若又給他嬌寵，會使身宮受化權感應的「增強作用」加強。


    這種命理因素加上家庭條件會把「威權」發揮到最高峯。特別是由辛丑到辛卯，不同大限的兩個辛干，使他的先天命宮成爲雙祿所輔，而且辛干的文昌化忌和庚干的天同化忌，都沒會入命宮，也沒會入身宮的巳位。因此我們以爲這三大限，才與正使蔡先生過着名符其實的豪富人家日子。在這些日子裡，隨着年齡的增長，在他心目中，以爲凡事可以任他呼風喚雨，爲所欲爲。


    由於限運四化一直不曾入侵命身宮，因此凡事幾乎很少阻礙打格。直到壬辰大限，天梁化祿在寅，巳不直接對命身宮產生直接作用，更重要的是紫微化權照入亥宮，武曲化忌也同時的會到。化權使已位的身宮延續着由第一大限而來的權柄「權威至上」的心理，但武曲化忌却和先天的廉貞化忌聯合而成了狼狽爲奸的極大破壞作用。我們以爲在蔡先生限入壬辰大限以後的初幾年，他若不認爲自己在事業上已漸暴露困境，就是這種由於身宮「化權」「增強作用」的作祟，使他一直採取一種不甚合道理的處事方式，並不代表凡事順遂如意。


    這種情況到了一九八二年的壬戌，可以脫「增強作用」已到了最危險的臨界邊緣。尤其在癸亥（一九八三年），雖然他在這年當選立法委員，但我們以爲這年才是他由於命理上的這種「增強作用」而所採取的企業經營手段，已經使他真正墜入萬劫不復的深淵。因爲這種壬戌和癸亥連續兩年的武曲化忌和貪狼化忌，使巳位三方所會原有忌煞星，作連線性的引動，而冲躔已位，使他的這種由巳宮而產生的「增強作用」徹底崩潰。


    ### 蔡辰洲先生命盤資料

    | |癸巳身|壬辰|辛卯|庚寅|

    |---|---|---|---|---|

    |大耗存天虛白虎紫微破軍廉貞地劫殺羊|甲午|乙未|丙申|丁酉戊戌己亥|

    |太陽三台陀羅天刑35-41|武曲七殺右弼咸池地空25-34|蔡辰洲先生命二〇一六年六月六日申時土五局辛丑命宮5-14庚子|巨門文曲昌廩破軍|廉貞貪狼天鉞左輔陀羅鈴星|

    |天同梁文昌科龍池台輔|戊子


    **蔡先生由富豪之家，統領龐大企業，因他的經營不當，最後敗亡。斗數界的論說很多，亦多很精彩。但在這位主人翁安息後，這個命例，一般大師已認為再無新聞價值。而個人以爲，學術應該不必去理會這種價值的問題，所以才不厭其煩的以另一種方法，再加討論。冷飯熱炒，閣下不會以爲忤吧！'
