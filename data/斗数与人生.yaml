  md: '若把國內的中國人和不同人種的外國人加以比較，那更有太多方面的差別。因

    此當我們面對著一張命盤來推演一個人的命理時，我更有必要先弄清楚這個「他」

    所處的社会背景。


    我曾經看過好多命例，在國內的事業上形成一種連續好幾個大限的財官雙美，

