    # 命座武、相、右弼、文昌在寅位，是個祿權嘉會的紫府相朝垣格局。紫微廟旺入午位，為身宮所在地，三方左右昌曲嘉會，無煞，可主一生財官順利無碍。根據星曜賦性，武曲司財帛之主，又名將星，天相專司衣食，化氣曰印，為官祿之主宰；天府為財帛之主宰，號令星；廉貞司品秩與權令，化氣曰囚。從命宮和財帛星曜組合上，大部份星曜的賦性都對財帛一項具有相當突顯的作用，這種命格一旦在他後天行運能得充分發揮，在求財方面，將會有比較強旺的傾向。


    不過，由於財帛宮（戌）為火鈴雙煞所夾，亥位的鈴星和太陰合為十惡，酉位的火羊為兩大凶星的相剋（也是剋制），如此五行生剋制化的道理，酉亥對戌位還成火來生土的作用，因此使此命格，形成生財與理財的積極和正面的作用，特別常有吉化來引動時，更爲明顯。但如遇酉戌亥三宮任一宮爲忌煞來引動時，就造成任何求財方式，都會造成負面反效果的虧累。


