  md: '斗數命盤將人生大事分成十二類，配置十二地支宮，經由各宮位星曜的配置組合形成的作用，來推論各個事項宮位星曜作用所象徵的現象。在單獨某一個宮位時，大體上是以該宮位爲主題來論事。比如談官祿宮，就以官祿宮這個宮位所牽引三方四正星曜的現象來推論，但基本上，任何一個主體宮位，不能僅憑這個宮位來論，還須配合先天的命格（命、身宮所形成的格局），作爲基礎來衡量。


