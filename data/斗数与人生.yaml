  md: '在斗數祿命法則，把遷移宮當作一個人一旦離鄉背井時可能的遭遇，也作爲一個人一輩子大體上的縮影寫照。其實在可運用的推演功能上，這宮位也充分突顯出它在人際關係上具備了相當大的功能。這種用法絕對不是意識上過份膨脹，你可以想像一個人離了家鄉，到人地兩疏的地方時，能否順利和諧的打入人群裡，能否得到有力人士的幫助提携，常常是決定他能否得意於異鄉的重要條件。因此在斗數命盤中，探討人際關係的好壞時，這個宮位常常是扮演著相當重大的角色。


    老爺爺以前的社會，是一個思想閉鎖、安土重遷的農業社會，加以交通不便的阻隔，絕大部份的人除非碰到大環境上不可抗拒的重大災害，諸如天災或戰亂，要不然人們一輩子都很難得走出老家方圓百里之外。但時至子孫輩的你我大家，由於社會大環境的邁入工商業時代，產業型態和性質的巨大改變，人們已不再是一輩子


