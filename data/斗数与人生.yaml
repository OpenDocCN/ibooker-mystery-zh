    務的一家民間財團法人的事業機構，憑着些微的資金和一股年輕人的翻志出來創業。由於他語文通暢，也正好碰到當時台灣正在以各種加工產品，積極開拓出口市場的時候，他就協助廠商向國外報價和國外接訂單交工廠生產，這種內外交接的出口商生意，經過十來年的慘淡經營，不但在國外建立良好的信用，在國內廠商也信譽昭著。幾乎在接單、交單、出口的業務推動上，都不必用上大資金，就可以從中得到頗為優厚的利潤。


    也許由於生意越來越多，也越大，他整年幾乎都在國外跑，在國內時也整天忙着和國內廠商接洽生意，因而把一些經常性的業務交給公司內的職員承辦，甚至把一般公司引爲生命交關的公司印鑑，一概委由會計保管和用印。也許由於老板的疏漏和職員的無知，就在癸卯大限的己未年（一九七九年）年初，一位承辦出口生意，負責和廠商聯繫的職員，不知道由於怎樣的錯誤，竟造成一批數萬美元的出口產品在出口後，買主以品質和規格不符拒付款要退貨，最後還苦了范老板迢迢地跑了趟國外，才以半賣半送的方式消了災。到了年底左右，有一天，接到一個陌生人的電話，莫名其妙的在電話中請范老板把支票背書的幾千萬票款，限定於某日前準備好，換回支票，否則將到法院相見。


    這下可把這個年輕老板搞昏了頭，不知道追災禍究竟因何而來？後來才從保管支票印鑑的會計小姐處得知，上半年就在范先生到國外考察市場的時候，有一位往來多年的廠商為了供應范老板所下長期供應貨品的訂單單所要出口的購買原料，廠商用工廠老板的支票來請范老板背口，以便以期票方式交易。不知道是會計小姐無知或是為什麼，沒弄清楚支票金額和期限，就依要求地蓋上印鑑、背起口來，根本也弄不清楚支票背口，需要擔負起支付責任的法令規定，更糟的是，背口乙事，一直沒跟范老板知道。事情大概就是如此追般地使范老板背起黑鍋，而最後導致傾家蕩產，使經營十年有成的事業毀之於一旦。一個事業的興起，有待員工的通力協助，但用人不當，也會使一個經營得好好的事業趨於毀滅，事業之於用人，豈能不慎重？


