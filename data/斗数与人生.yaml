  md: '- 格大、官祿宮旺，就可以在商場上鴻圖大展、財源滾滾。前面曾提到，大企業公司的高級主管，既然職位高，薪水一定優厚，諒必財官兩旺，但實際上，他們不一定自已就能當得了老板一樣。因此在斗數上的論命，就不能光看官祿宮如何就推論他的事業也必須如何。


    在整個斗數的論命，任何一個單項宮位狀況的論斷，幾乎都不能光依那一個宮位的現象來單獨推論。因為斗數命盤是個完整性個體，它好像一個人，一個完整的人，它不但有藏在體內的各种臟腑器官，還有長在體外的肢體五官，雖然各具不同功能，但卻也缺不得任何一樣，若有一個部位或一個器官欠缺，不但只是那個失缺的部位不能作用，也將必定連帶影響到其他部位的正常功能。這種現象不單人如此，任何高等的動植物，無不有其正常器官（部份），以發揮他正常的生理功能。


    一個斗數命盤既然是用以談論人生一輩子可能遭遇到的所有人、事、物的現象，不該只是一張無生命的命盤。佛家說「一沙一世界」中醫更把人體看成一個陰陽調和、五行平衡的宇宙，因此我們若把斗數命盤，看成代表一個屬於個人的宇宙的縮影，也未嘗不可。'
  merge: -1
  pgno: 210
- img_proc: true
  md: '一個人的行為，除了因他個別條件而具有個別現象以外，還帶有時間性和空間性的差異，由時間性所特有的社會環境的思想、習俗、典章制度差異，空間上自然環境的差別，往往都會對人生產生極大的影響和變化，因此以斗數祿命用來推論一個人的命理時，除了個別的條件因素和意願外，必須考慮到人的時代社會與所處自然環境。


    以婚姻來說，在中國歷代的婚姻律法，就不盡一致。當老爺爺的時代，老爺爺們只要能買得起，他可以高興娶幾個老婆就娶幾個老婆，只要犯上七出（據《辭海》記載，古禮出妻之七出，有：無子、淫佚、不孝舅姑、口舌、盜竊、妬忌、惡疾七項。）的任何一條禁令，就會被休妻。但現在你我卻可不能如此，也許有老爺爺時代所沒有的婚前戀愛，但一旦結婚，就容不得你在婚姻上不守一夫一妻制的法定制度，你敢亂來，一旦碰到悍妻，就會讓你吃不了兜著走，有時就算你有二心，當你想到必須與下堂妾（夫）平分財產或擔負贍養債時，你就會不敢輕舉妄動，不敢娶小或休妻。但這個時代的婚姻制度或現象，並不像我們一樣，在信仰回教的國家裡，他們却有另一套婚姻的習俗和制度。他們可以合法地娶得四個太太，高興的話可能更


    們却有另一套婚姻的習俗和制度。他們可以合法地娶得四個太太，高興的話可能更'
