  md: '個宮位上，幾乎把事關金錢（財帛）上的一切有無和功過，一概賴在這個財帛宮上。


    返種稻麥不分、魚目混珠的錯誤論命方法和理念，使得論命的真實性常常和現實格


    格不入，亦使論命的層次每況愈下。


    在基本的斗敗論命法則上，我們以爲，財帛宮若僅針對金錢的得失而言，它應


    該是指關於金錢來源上的有關現象。贏得更實際一些，能不能賺錢，賺錢的多少和


    離易，以及在賺錢乙享可能產生的性質和變化，才是財帛宮的真正功能。


    一個人現在或今後可能賺很多錢，是財帛宮的問題，一個人現在手頭很拮据，


    帛宮不好的原因，因爲他很可能有很好的收入，但老是存不了錢。這事牽涉的範圍


    很廣，但絕不能單以財帛一宮來論斷。若以偏錢一享來說，一個人在作生意時，由


