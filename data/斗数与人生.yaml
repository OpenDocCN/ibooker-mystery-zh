    斗數命理的本質


    （一）斗數命盤的本質｜類型


    你可以設定任何包括年月日時辰的資料，依斗數排盤的程式規則排出一個斗數命盤來。追命盤只能說是，如同數目字套進數學公式加以演算後，會產生某一個計算結果。數學的演算在基本上，並不一定代表某些什麼特別意義，但一旦應用在某種現象的解說時，它就有它的特別涵意和功能。斗數命盤也是這樣子，只要我們輸入的是根據一個人的出生資料時，它將是成爲一張可以用作論命的命盤，這個道理就跟卦爻一樣，一個卦象並不一定代表某種特別意義，但當你藉以斷某些事物現'
  - '[PAGE 264]


    象時，它就有了他的特殊意義和道理。正如一個卜卦先生，當他卜出卦象後，他必須要問，問卦的人究竟要談些什麼事。其實我們若把斗數命盤十二宮位的星曜組合，每一宮看成一個卦象，而整個命盤又看成一組集十二個卦象的卦爻也未嘗不可，每個宮位有它單獨的卦象，而整個命盤也有它整體性的卦象。


    斗數命盤既然是根據一個人的出生資料來設定，我們可以視同它因緣起滅之於這個人，因此我們可以據此命盤，來推論這個人一生遭遇上榮枯禍福的消長本質和趨勢上的一種概約狀況。我們認為斗數命盤所顯示的，也只能說是一種現象、一種特質，或者說它是一種類型，但這個類型並不一定意味著它必然會有什麼際遇和變化。正如我們前文提及一塊銅片，它可以在鹽酸、硫酸和硝酸中，起不同的化學變化。若說銅能在這三種化學溶劑中起化學變化，是銅的一種特有本質，但它在三種溶劑裡，卻產生三種不同的鹽類化合物。若我們把斗數命盤或是每一個宮位比喻成這塊銅片，而後天環境的遭遇差別，比之此三種酸性溶劑對銅片的化學作用，我們可以明瞭，命盤在命理上所具有的本質和意義。


    不過我們特別要強調，我們把命盤比之以銅片，後天的個別遭遇差異比之以三'
  - '[PAGE 265]


    - 265 -

    斗數命理的木質

    種溶劑，只是用以說明斗數命盤上的一種基本意義，並不意味著人生的遭遇變化，會如同物質起化學變化時的單純和易於掌握。不同的人，有不同的個別遭遇條件，就是單獨個人，有時你也很難事先充分明瞭，究竟會有什麼直接和間接的事或物，會對你造成影響。因此很難在原因不明的情形下，充分掌握命盤上的星曜究竟代表着什麼涵意。


    我們以爲在斗數命理的探討上，假使對斗數命盤的這種本質上的類型，不加以了解，而其餘的推演和論說，將會和實際的人生造成決然不符的差異。我們若再舉例，命格是陽梁昌祿的人，是屬於聰明、好學、利於考場功名的命格類型，但他能否得到充分發揮他的有利類型的賦性特質，必須要看他後天環境能否有個適合的環境可以配合。命理上這種先後的條件配合，必須加以充分的配合和考慮。這正是楊柏因這個年輕人，不會有其他同時出生、相同命格的其他年輕人，也能在求學過程中，有相同的類似表現的道理。


    (二) 傾向趨勢'
  - '[PAGE 266]


    關於斗數命盤十二宮位星曜的組合，和整個命盤的結構，我們曾在前文提過，可以把它視同如一個卦象，用在論命的時候，它代表某一種現象的類型，因此在追個類型的現象上，一旦引發作用時，將會產生某一種趨勢，由於斗數命盤的追種趨勢功能，我們才能用以推演命理。


    但是追種趨勢或傾向，却和某些非命理因素有相當大的絕對關係。比如兩棵同樣品種的樹木，栽種在不同的土地環境，一棵種在土壤肥沃、濕度適當的土地上，一棵種在既貧瘠又乾旱的山丘上，經過十年八年後，儘管樹齡相同，但是長出來的樣品一定不一樣。一棵會是樹幹粗壯、綠葉成蔭，另一棵却枝葉蕭條、形同枯木。


    兩棵樹的本質一樣，也都種在土地上，但由於土壤條件的差異，最後產生不同的生長樹相來。斗數命盤用以推論命理的時候，也應該視同追種道理來應用，並不是說，他只要在命盤上具備追種類型或特質，這個人一輩子一定變成怎麼樣。


    不過有一點，我們一定要先搞清楚，在命盤上若不具備某一種特質和追種特質可能產生的某種趨勢傾向，就算加上再多的非命理因素，以求達到某一種傾向趨勢，'
  - '[PAGE 267]


    還是沒法作到。我們再以仙人掌來作個比喻，由於它在生理結構上不同於一般植物，若我們把它種植在既肥沃、又潮濕的土地上，它不但不會像長在乾旱又貧瘠的沙漠中那麼壯大茂盛，甚至都將枯萎而活不下去。這正是物各有其性，適性者生存，不適性者難存的原因。這種道理用於斗數論命上，也是一個極爲重要的觀念。


    若以斗數上的命格來說，有兩個人在命格上分屬兩種類型，老陳是君臣慶會格，富貴祿權，而老張是機月同梁格，嘉會祿科，在限運的運轉上，亦都幾乎行相似的吉兇，兩人同時進同一家公司，同在業務單位，從一個基本的業務員幹起，歷經兩大限的廿年後，兩個人都表現不錯，亦都有相當不錯的晉陞，但老陳當上了業務主管，帶領衆多業務人員在爲公司的鴻圖大展衝刺於國內外的商場上；而老張由於個性使然，以及長於謀略和思慮細密，亦當上了公司老板的幕僚參謀，幫老板審核例行作業和提供策略企劃。


    我們作此比較，不在他兩人誰較爲老板所倚重，而是用以說明，兩人由於命格類型的差別，在同樣工作環境之下，自然會發展出屬於他自己類型的趨勢現象出來。當然，老板亦可以把他們兩人的職務調動，很可能也不會表現得太差（當然也可能太'
  - '[PAGE 268]


    差，但若能各探其專長而用，應該是最理想的用人之道。斗數命盤，用以推論命理，正是居於這種趨勢現象的運用，而把已知的條件或假定的因素，輸入命盤，並依理推論而循其趨勢的傾向軌跡。


    # ### (三) 個別差異性


    斗數命盤依出生年、月、日、時辰排定，因此依理論數目計算，將會排出259200個命盤，也就是說，斗數就用這麼多類型的命盤來探討世人的一生命理，比起西洋的十二星座只要十二種類型要來得精確。也有人認爲，從依五行局及出生日演算而定的起紫微表裡，可以看出，在同一五行局裡只要月份相同，出生時辰一樣，日子就算不同，也會有紫微同宮的可能。這種現象特別在水二局裡，除了初一和三十日兩日外，其他每日都是紫微星座同樣地支宮位。其他五行局只是日子空隔較長，亦有相同現象。由於依日子排出的星曜如恩光、天貴、三台、八座，在實際論命時用上的機會不多，因此真正關係大局的命盤，僅約半數。'
  - '[PAGE 269]


    對持這兩種看法的人，我們認為都對，只是他們似乎太強調命盤在命理推論上成為唯一的論命條件，因此才有這種命盤究竟有多少個的紛爭。我們卻認為，命理的推論固然必須根據命盤，而依星曜的組合賦性依理推論，但斗數命盤詳列的星曜組合，只是代表這個人的命理因素或命理條件，而這些命理條件或因素，主要的只是代表在命理上的一種類型，和作用上的一種趨勢，至於這種類型，在一個人的一生裡，將會造成某種發展趨勢傾向，應該還有命理以外的條件。而這些條件，無論如何，我們是無法從命盤上看出來的。據說，台灣目前在一個時辰裡，約有一百個男孩以一張命盤代表，五十個女孩另用一張代表（男女行運順逆相反），然後，我們提出幾個很簡單的問題：


    第一，在兄弟或姊妹的長幼排行都一樣嗎？


    第二，出生後在第一大限間的健康都一樣好嗎？


    第三，他們的父母和家庭背景都很類似嗎？'
  - '[PAGE 270]


    # # 第四 他們將來在事業的表現都很近似嗎？


    若根據古傳祿命法則，有其命盤必有其人，近代的鐵口直斷的大師們也會說，他們的命盤如此，必然會有那種命理現象。但是一個現代人，只要他有現代人的一般常識，他們一定會同意這些同時出生的小孩，在兄弟姊妹的排行上究竟是老大或老二不一定相同，他們在一般體弱多病痛的幼年期，健康情況甚至在比較重大的病痛上，也不盡相似。他們的父母不只年齡不同、出身背景、當前家庭環境更不一定相似，可能有富貴人家，也有中產階級，甚至苦哈哈的勞工家庭。


    至於和先天遺傳極有密切關係的體格和聰明才智，更會因生身父母的不同而造成很大的差異。我們以爲實際上應該如此，這種現象用既知的常識就可判斷，用不着再作任何的統計和調查。假使有人又以出生時辰前、中、後又有很大的差別來揣測，那麼我們就以一百二十分鐘生五十個男孩（女孩）來計算，那麼平均每二點四分鐘生一個，也就是說十分鐘裡將生有四個小孩，假定其中有個小孩生下來不到滿月就夭折，或是生下就有先天性的生理缺陷，我們也不會認定同在十分鐘內生的小孩'
  - '[PAGE 271]


    都會有類似的現象。


    這種同時辰生竟然會有不同結果的現象，在古傳命理似未曾提及，而近代的斗數命理研究者亦從不曾探討，究竟為什麼會造成同命盤而不同命運的現象。我們以為，必然有它的原因和道理存在，若我們在人之初生就無法解決這些疑難，那麼我們又如何探討一個人長大後，投入萬丈紅塵中的人群社會，將有怎麼樣的命理走向？


    我們以為這個正是命理上的個別差異（條件）問題，才會有這種現象。剛出生的小孩如此，長大以後的大人更是如此，人人有個別的差異條件，而這些條件往往都摻雜著不同的命理因素和不同的非命理因素，但當這些所有的因素條件聚合在一起，如同物質因混合而起化學變化時，自然就產生很大的差異。因此我們認為，命運的走向趨勢，應將命理條件和所實際參合的其他非命理因素（條件），合參研判和分析否則會產生偏倚的推論，將無法使命理分析能和實際人生的際遇互相吻合。


    了解斗數命盤推演命理的道種道理後，我們自然不會再去對究竟有多少萬個命盤而耿耿於懷。'
  - '[PAGE 272]


    （四）時間性和空間性


    人類的文明因時間而演進，因此，時代不同，表現在文明和生活上的訴求層次，往往差別很大。這種因時間上的差別而導致人們在生活訴求的不一致，特別是當社會背景有所變遷時，差別最大。


    以台灣來說，在老爺爺的時代，由於整個社會環境對外閉鎖、思想守舊，在那種典型的農業社會裡，人們不只生活方式幾乎跟老爺爺的老爺爺的時代沒有多大不同，而且習俗和思想觀念方面，幾乎也沒什麼兩樣。這種農業時代的社會文化，就算有所變化，也是很緩慢的，幾乎讓人家覺察不到什麼變化。但時至今日，已由接近靜態的農業社會而變成功商業高度發展的社會，不再是幾代不變，取而代之的是天天在變，而且變化多端。


    以往很多必然的事體，現在已截然不同。在老爺爺時代，兒孫們多的是安土重遷、堅守家園，一輩子與家人共住，而有幾代同堂的大家庭，職業以家承的農耕為'
  - '[PAGE 273]


    - 273 -

    斗數命理的本質

    主，婚姻的結合是一種父母之命、媒妁之言。生兒育女，無不抱持多子多孫多福氣的觀念。大部份的人，一輩子很難得走出老家的方圓百里，老家是他一生的活動世界。但現在和以後，你我和你我的兒孫們，已都可以有千百個理由，在每個人羽毛既豐的成年後，千方百計地離開老家，獨闖世面，而不為老家所困。因此一個家庭裡的孩子們，一旦長大後勢必振翼飛去，從此任他海闊天空。


    職業工作可以憑自己的意願和才能去任選，婚姻亦多在兩性相悅下而結合，生男育女也代之以「二個恰恰好、一個不嫌少」的重質不重量的觀念。人們這種與往昔截然兩樣的生活表現和方式，正是由時代所造成，因社會背景不同所促使這種由社會環境變遷，而造成對一個人一生的影響，絕對不是生存在當代社會裡的個人所能抗拒和改變。


    在老爺爺的時代，他可以單憑祖宗產業和家世的庇蔭而優閒安逸地過一輩子；但現在就須憑據個人的才能和努力去謀事創業，否則將難以謀生。這兩種不同背景下的社會環境，所造成人們生活層面的差異，在斗數論命上不只重點不同，十二項宮位的探討和訴求也都不一樣。以婚姻來說，老爺爺時代只要他高興也能娶得起；'
- md: '他同時可以娶幾個老婆，一般來說婚變情形不多見。但你我現在必須守著一夫一妻制，而且婚姻多有不甚穩固，不再像以前的「嫁雞隨雞、嫁狗隨狗」，而是一旦認為兩情盡，就可以分道揚鑣（基於創業，不一定再全賴家業和祖蔭，憑的是個人的才華能力，以及因緣際會）。命理上，千古以來探討的也許離不開妻、財、子、祿，但這些事項古今以來，在實質上和形態上已有太多和太大的變化，因此我們在斗數命理的闡釋上，必須基於時代的現實社會背景據以演繹，否則人家將以為你是在談老奶奶時代的往日瑣事。


    社會環境不但因時代不同而有所差異，就是同一時代亦會因地域不同，在生活的方式上、在思想觀念上、在社會習俗上，亦會有相當的差異性；若再加上政治典章制度的差別，那人們一切活動方式和生活的訴求，相差更多。就以當前散居在全世界的中國人來講，由於所居住的社會環境不同，儘管外表都一樣，甚至可以相通的北京語對談溝通，但我們可以肯定認為：在不同居住社會環境的不同中國人，每個人對於人生一輩子的很多事體，不僅想法不一樣，處理的方式亦必不盡相同。人不能離群獨居，因此他的言行思想和觀念，必受他所處的社會環境所影響。


    若把國內的中國人和不同人種的外國人加以比較，那更有太多方面的差別。因此當我們面對著一張命盤來推演一個人的命理時，我更有必要先弄清楚這個「他」所處的社会背景。


    我曾經看過好多命例，在國內的事業上形成一種連續好幾個大限的財官雙美；這些命例包括商人和醫生，他們很多以為挾著多年來的商場經驗和財勢，或是高明的醫療技術，就可以同樣地在國外鴻圖大展，沒想到幾年後又在國內碰面時，才知道他們在國外期間歷盡艱辛，最後只好鎩羽而歸，大有不聽我寧先勸止而悔不當初的慨嘆。也有幾位事後告知：當初出國前曾得某些高人的指點，告訴他一旦出國謀求發展，以財官兩旺的氣勢，必能鵬程萬里；他本人一聽之下自信滿滿、雄心勃勃，千萬也沒想到最後竟然半空折翅，灰頭土臉地又回到國內重整爐灶。


    我們以為這種事與願違、命理現象和事實不一致的問題，不在於全是命理的要素，而是論命者和問命者同樣疏忽了一個嚴重的實際考慮：譬如當事人他對要去的那個地方的語言表達能力如何？對所去當地的法制典章了解和適應如何？當事人不像是孤家寡人單身一個的年輕留學生，而是攜家帶眷且又年近中年的人；想到一個人兩地疏的新環境，要求順利鴻圖大展、能像在老家的樣子，則不經十年八年的艱苦奮鬥絕難有成。我們以為這些情形應該是屬於常識層面的問題，就是不用命理的推論都可以理解和預料，但偏偏有太多的命理大師卻只考慮到命理的層面，而不作現實問題的合參；我們很為這道於盲的人悲哀，也為命理界這種除了命理還是命理的狹窄觀念深感無奈。


    (五) 現代知識

    常人都說，現代是一個知識爆發的時代，任何一種專門知識都在繼續不斷地快速進步中。在老爺爺時代，一個人會莫名其妙的肚子痛，痛不了幾天竟然藥石罔效、因此而死亡；肚子痛而會在短期死亡的病因很多，可能是急性盲腸炎、胃瘡瘍穿孔、腸阻塞，這些疼痛往往不是單靠藥物來醫治能得救。在現代，醫生碰到這種病人，最好的醫療是及時將病人送上手術枱開刀救治，因此現在很少聽到因肚子痛而死得不明不白的人；究竟類似這割開腔剖腹的手術，對現代的醫生而言，已經是件極其輕鬆的醫療方法。


    近年來可更好：腎臟衰竭可以換腎，連換心手術都有如老爺汽車調換新引擎那麼簡單；再過些年，醫學可能有辦法予所欲求地換人體的任何部位器官，都能在醫生巧奪天工的妙手之下，如同機械的換裝零件品。我們都知道，外科醫生所作的較大手術，實際上包括醫學上的好多項專門知識，絕對不只一位可以操外科手術刀的醫生就可以作得了事；比如以換心手術來講，我們以外行人的常識也應該可想像得到：除心臟外科外，一定是需要和心臟內科、麻醉科、血液科、病理檢驗科、免疫科，甚至一般的內科專門醫生的通力合作。其實任何一位醫生，在行醫為病人作診療之前，早就學有人體生理和醫療上相當多的有關學識。


    但反觀搞命理的人，好像只要遵古炮製地學了一些一知半解的命理法則，就可足百歲；倉促來去也確如百代過客，但在這短短的幾十年歲月裡，却也充滿著太多恐慌和無奈。因此，古往今來的專文用以探討可為人生所用的學術與研究，代代無不推陳出新。我們就以專門探討對人們有直接或間接用途的學術來講：不只形而下的自然科學在日新月異地進步中，影響人類思想觀念的形而上的哲學、以及用以改善人群社會秩序的典章制度也都在不斷地進步；唯獨我們千古傳下的這套斗數命理卻好像一直可以彌久常新，而又能放之四海皆準。


    我們認爲古傳的這套斗數命理法則在推演人生一輩子的命理上，有它相當程度的可用性，但我們並不認爲現代人也一定要沿用古傳而來的命理觀念；比如賽財子祿，在現代的命理上不再是探討現代命理的全部內容，因為現代人有他們所異於古人的社會背景和人生觀念：古人可以一輩子安居於出生的老家，但現代人很多卻需離鄉背井向外謀生、另求發展。這種完全不同的人生境遇必然是不可同日而語；一個人出外謀生就必須憑據條件，但他要憑什麼條件？他要謀什麼職？創什麼業？這些問題不只屬於他個人的問題，也是屬於社會背景的問題。


    我們都知道在一個工商業高度發達、經濟繁榮的社會裡有太多的工作機會可作，也有太多的事業可創；但實際上也有很多找不到適當的工作的人，也有太多的行業公司經營不善而歸於倒閉：正如人人都吃同樣的五穀雜糧和蔬菜，但有些人能健壯無病，有些人卻病魔纏身。假使人們能從命理的解析中有如醫生治病一樣使人人投身在這個有如萬花筒的社會裡得到充份解答和指引、不使迷失而有所作為，那將是有益世道人心的一種經世致用的大學問。


    但是很遺憾的是命理界顯然無視於人類文明的演進和社會的進步；就在各種文化科技和人文典章制度不斷的改進中成長，搞命理的人由於現代知識的隔閡和無知因此把人生一輩子在社會表現上的消長完全認定全部都是唯一命理因素使然：好像任何不屬於命理的社會大背景因素完全和一個人的命運際遇無關，只是咄咄怪事！當一個人來請教算命先生他的事業因資金短缺而發生困難的時候，算命先生只告訴他「命該如此」別無解決辦法；算命先生把一個人的吉凶現象完全歸之於命理現象的結果而不能像醫生的能為病人診療病痛。若在他的意識裏還有企業經營觀念就算他不能提出資金短缺的解決方案他也應該建議問命者去請教企業管理專家以謀求解決困難的方法！


    因此我們認爲一個現代的斗數論命者，他應該像一個大醫院裡的一般內科門診醫師一樣：一旦碰到分屬專門科別的病人時就須把那病人轉診到專門科的門診去以便由專科醫生診療。在這個萬丈紅塵的人間裡我們不能奢求一個論命者扮演無事不曉的萬事通，但我們認爲斗數論命既然擔負一種為衆生指點迷津的論命工作就應該對衆生可能遭遇的任何事理要有個基本上的概念；因此除了斗數命理法則必須熟練外另需具備很多知識條件。


    (六) 入世

    記得在一九五九年暑期我曾參加農復會（全名為中國農村復興聯合委員會）由中華民國和美國聯合組成的一個機構利用其撥基金來協助發展台灣的農業：台灣光復後的農業發展得自這個機關幫助很大；這做稱早已助成身退不復存在，委託我們學校系裡（與大農經系）所作的一個農家經濟的訪問調查。這個調查的目的是為了了解當時農家的人口組成結構、農業經營狀況、農家經濟收入：舉凡足以顯示當時台灣農村農業活動和農家經濟有關的內容都包括在調查內容裡；農復會希望藉著實際的调查用計以訂定有效發展台灣農業促使農村經濟繁榮的有效政策。很多屬於社會科學層面的學術研究或制度辦法的訂定往往都透過這種訪問调查彙集的資料再加以統計分析和研判來加以了解作學術理論研究的參考或政策擬定的依據。


    在學術研究方面，有光對純物質研究和由人類行為發展而來的學術研究所採行的研究方法由於本質的不同因此所採用的方法並不一致：前者如物理與化學研究人員可以整天躲在實驗室裡藉著精密儀器反覆實驗的研究；而後者除了學理上的推論以外還需要透過實況的调查了解才能證實在學術推論上的正確與否。因此這種調查上的空隙了解往往對這門社會科學的學術研究扮演著效用功能重大的角色。


    這種對群體現象了解的调查工作在當今工商業興盛的時代被廣泛地採用：一個大企業的經營隨時要去了解企業經營上的狀況和趨勢必須透過调查了解企業经营相關事項方面的市場取向以作爲知己知彼的判断參考然後才能訂出合理的經營策略；一個政治家也須了解民情疾苦然後才能佈行有效的政治措施，就以醫人救命的醫生來說必要時也要對地方性的某種特殊疾病作個案調查與研究否則無法辨明某種疾病的起因和有效的治療方法：台灣西南沿海某地區由於水質含砷過量引起的一種烏腳病就是一個很好的例子。


    命理探討的是以人生為主題的一種入世的學問，若我們把它套用學術上的方法斗數命理也是探討人類行為的一種學術也是社會科學中的一門學問；因此我們認爲這門學問也將不能異於其他社會科學必須對人類社會情況加以深入地探讨和了解：一個命理的研究者他不能像理化學家躲進實驗室與社会隔絕仍能作出大學問。我們認爲一個長期隱居林泉不問俗事的遁世者除了他個人獨善其身的修心養性外不知道他對人間凡事還能知道多少？一個躲在象牙塔內作著社會科學研究的人會為人所詬病；然而在我們斗數命理界却有太多的大師和高人偏偏自鳴清高鄙視人間俗事而整天盤居在象牙塔內或如閒雲野鶴般地悠遊人間而不聞問俗事以為人間凡事都早已掌握在他的股掌之間這不是太自大了嗎？


    學術的探讨也許有很多方便法門但屬於人類行為科學的斗數命理亦必須如同其他的社會科學一樣必須去洞澈人間的百態因此諳萬卷書行萬里路和積極地入世非常重要否則你將無法了解由人類行為而造成的人間凡事：比如說今年來由於新台幣對美元一直持續著升值從一年多前的一與四十元的滙兌比率降到目前接近一一和三十元兌換比使所有作出口生意的廠商叫苦連天幾至無法承受大叫已到流血出口的慘境；我們不相信國內幾千家的出口廠商老板他們能有人倖免於匯兌上的利益損失同時我們也不相信這幾千位大老板他們在斗數命盤上全部顯現出財帛宮方面的不利現象。我們也許可以根據命盤推論他們在這種台幣升值的大風暴之下所受的衝擊能否支持得過去但我們根本無法提供什麼神機妙法的好對策因為企業型態的改變甚至產品種類頻繁的更換絕對不是脫作就可以馬上作成；企業經營上的這種難關只是千萬個規矩中的一個例子大師們又能值多少？又能忍什麼去給這些愁眉苦臉作出口生意的老板們提供一個轉敗為勝的絕好良策？


    禍福根基

    談身宮作用


    秘書小姐告訴我有位華先生來過幾次電話；由於我這些天來不是忙著開會就是公事外出很多電話都無法接聽因此華先生要她轉告我禮拜六中午在一家廣式飲茶餐廳見面。我以爲大概又想要藉餐敘機會聊聊天：待星期六中午下班我準時到達餐廳時才看到郭先生亦來了；郭先生是某大公司的高級主管他和另一位王姓年輕人約於一九八五年中經由無居士先後介紹以都住在台北的方便前來和我討論斗數命理而認識。大概就在那年底直到翌年年中他們兩位和另外幾位亦都对斗數命理頗有興趣的朋友要我撥出時間能和他們作非定期性的見面研討斗數；認識華先生就是在那時候。


    在這段研讨期間，以他們的三人的反應最為熱烈：我很為老師的這套斗數理念有更多有心人的參與而感到欣慰但這件事到後來也頗使我覺得有時事常與願違；因此像今天的這個聚會那位王姓的年輕人不在參加我已不感到意外。華先生高齡已近七十但精力旺盛不輸年輕人；他年輕時服務軍旅由於精通英文因此在韓戰期間應聘為聯軍某種特殊軍務的高級幕僚：後來以上校官階退伍而改在新竹地區的某大電子公司服務；在電子公司的這段時間因職務輕鬆閒暇之餘對命理之學由開始的買書來研究到以後的正式參加斗數命理補習班。


    前些年從電子公司退休後為了要排遣退休後的無聊日子就在竹北附近開了一家為人釋疑指解迷津以「華軒居士」為道號的命相館；這是我和华先生以「斗數會友」的一段因緣。餐點上桌後華先生和郭先生以茶代酒的舉杯向我祝福生日快樂這才使我從迷糊中蕩然記起再過幾天就是我的生日：對於生平不作任何生日慶祝儀式的人來說真叫人受寵若驚；我頂在承受不起由比我高齡的華先生來為我祝壽。親不言老更不能為自己作壽我的老母還健在年近九十我怎麼可以在自己的生辰作任何慶祝？除非為這個「母雞日」特申感念之外：尤其像我這個當了大半輩子的上班族年已近退休之齡早成了過河的馬前卒一生乏善可陳剩餘的利用價值已不多搞斗數命理只是花不起其他太昂貴的休閒娛樂而用以打發下班後的閒暇時間倒沒曾考慮到想利用命理來得到什麼。


    飯後到一家茶蓬館聊天郭先生提起一些新近碰到的奇特命例；華先生更談了不少容人的一些稀奇古怪的際遇和聽聞：後來接著談到斗數命盤上的身宮問題他兩人表示對於斗數命盤上的這個身宮作用一直模糊不清要我表示點意見。


    身宮的作用在古傳典籍上的記述不多只見到零零碎碎的散見在先賢名論賦文裡但也都一筆帶過欠加詳細釋註：比如「太微賦」的「以身命為福德之本」「玉蟾發微論」的「身遇殺不但貧且賤」「命身相剋則心亂而不閑」「骨賦」的「立命可知貴賤安身便曉根基」「命好、身好、限好到老榮昌。命衰、身衰、限衰終身乞丐」「七殺守身終禍夭」等等的記載；但這些文字雖然寫得如金科玉律般的劃切分明對身宮的重要性作了相當重而有力的提示字意真是鏗鏘有力擲地有聲但由於沒加詳細註釋因此很難從這些吉光片羽中使人確能對身宮有個完整了解它的真義和概念。我對這方面的認識也不多所提供的個人看法充其只能作爲參考而不敢斷然肯定一定符合古傳的意義和道理。


    一般把斗數命盤上的命宮說成先天身宮說成後天但並沒有把真正的先天和後天作個清楚的界限交代；因此很難去了解究竟什麼是先天？後天又到底指的是什麼？若我們從斗數命盤的命身宮的起排法都是根據一個人先天出生資料而排定來講根本就沒什麼分別：但一般人都都知道命身宮並不可混爲一談。因此有人說命身宮是斗數命理的一體兩面可是又提不出個所以然的道理來因此很使人因之而感到迷惑。


    什麼叫做「先天」？假使我們從人類的行為舉止表現來看一個剛出生的嬰孩肚子餓時會哭身體不舒服或尿片潮濕時也會哭：這幅行爲表現是與生俱來的不敎自會的一種自然的反應這是一個先天性賦的本能；有一種人在很小的時候就顯現出他不管在那一方面跟同齡的兒童比較顯得要聰明很多。若以現代的智商（IQ）測驗他可能高到
    IQ 一六○以上：現在的人已經知道人類的這種 IQ 等級是與生俱來後天並不可能作任何改變因此 IQ 特高的人學習起任何事物都會比較快；這也是先天稟賦的一種。還有人類的身體或個性的現象有部份還是和先天遺傳的因素有關但後天卻也有相當程度的影響因此這兩樣和先天的關係在一個人成長以後已經不再是純先天（近世）的原有現象。


    我們知道一個人從小得自家庭的教養和學校的教育使他學習到各種技能這種人在生下和長大以後所受到環境上的教養會影響到一個人一輩子的命運走向：一個農夫的孩子從小學著耕田長大以後也多半以耕田爲業；一個做生意家庭的孩子長大以後會去做生意我們不能說這兩種孩子先天上有什麼根本上的不同而是因後天的影響才會有不同的行業。因此我們說這種行業所造成的差別完全在於後天的境遇所塑造根本和先天上沒有絕對關係：但是在傳統的理念上很多人都把這種現象混爲一談一個人耕田、一個人作生意完全是先天的關係；持這種看法的人由於誤把一個人的影馨視爲先天作用誤把斗數命理上的先後天混爲一談在解釋無方之下認定命身宮爲人生命運的一體兩面。我們認爲這是根本誤解了先天和後天的根本意義也誤用了先後天是命運的一體兩面的道理。


    智商（IQ）是不能改變但知識和能力却可以藉教育訓練和学习來取得和提高因此一個 IQ 属于常态型级的人若加以良好訓練、教育和學習他的处事能力完全比一個 IQ
    高人一等而根本不曾接受任何教育和訓練的人要来得好很多：說不定在作某一些工作上會由 IQ 较低的人来指挥 IQ 较高的人动手工作；一个土木工程在进行时我们可以肯定由工程师来指挥工人作活但我们不能肯定这个工程师的
    IQ 一定比全部的工人高。因为主要的是由于这位工程师他有专门的知藏而这些工人只能发挥他的体力劳动：因此我们以为人的能力问题并不全在先天的 IQ 上因为这个只能代表他的智商品位的高低而不能用它来衡量一个人真正的全部作事能力。


    若把人類這種 IQ 再作个說明假定某甲的 IQ 是一六○某乙是一二○在同样的學習環境里某甲的學習能力会比乙强因此他們兩人所学得同樣的專門知識甲会比乙多將來在同一個單位做事處理起相同事務的能力表現甲自然会比乙好（其他因素排除）：甲一辈子的成就也会比乙大；這種甲、乙在
    IQ 方面的差異（先天的差异）自然会造以后截然不同的成果这种 IQ 上的差别在近代科学認為乃得之先天遺傳並不是後天所能改變。


    我們以爲一個人得自父母母血（卵）孕育而成而生辰正是一個人在母胎孕育完成呱呱墜地而進入人間的緣起時因此我們據以排定斗數命盤：這個命盤即代表這個人先天與生俱來的所有特質也就是一種先天特質；若我們根據這種理念而推演一個人的命盤實際上就是代表著一個人的先天秉賦——也即所謂的先天命格不管他在命盤上的命宮或身宮都可以作此認定。一個人受先天遺傳而得的除了
    IQ、體格外還有性格（其他項我們暫不論）：除了 IQ 為後天所不能改變外體格和性格雖也多少會受後天際遇的影響而略有改變但基本上先天禀賦的現象還是有相當大的存留很難全部的被改變；絕大部份的人體格外形還是大半受到先天遺傳條件上的影響。因此我們相信沒有一個人會同意任何一個小孩從小就給他很好的營養和適當的體力運動和訓練將來長大後也都會有紀政和楊傳廣的體魄而能接受十項全能訓練後亦都能有世界級的優異成績；性格更是如此絕大部份的人雖然可以藉修心養性來訓練但很難能求得把天性性格完全改變即所謂「江山易改本性難移」指的就是先天（造份）上的。'
  mdcn: '他同時可以娶幾個老婆，一般來說婚變情形不多見。但你我現在必須守著一夫一妻制，而且婚姻多有不甚穩固，不再像以前的「嫁雞隨雞、嫁狗隨狗」，而是一旦認為兩情盡，就可以分道揚鑣（基於創業，不一定再全賴家業和祖蔭，憑的是個人的才華能力，以及因緣際會）。命理上，千古以來探討的也許離不開妻、財、子、祿，但這些事項古今以來，在實質上和形態上已有太多和太大的變化，因此我們在斗數命理的闡釋上，必須基於時代的現實社會背景據以演繹，否則人家將以為你是在談老奶奶時代的往日瑣事。


    社會環境不但因時代不同而有所差異，就是同一時代亦會因地域不同，在生活的方式上、在思想觀念上、在社會習俗上，亦會有相當的差異性；若再加上政治典章制度的差別，那人們一切活動方式和生活的訴求，相差更多。就以當前散居在全世界的中國人來講，由於所居住的社會環境不同，儘管外表都一樣，甚至可以相通的北京語對談溝通，但我們可以肯定認為：在不同居住社會環境的不同中國人，每個人對於人生一輩子的很多事體，不僅想法不一樣，處理的方式亦必不盡相同。人不能離群獨居，因此他的言行思想和觀念，必受他所處的社會環境所影響。


    若把國內的中國人和不同人種的外國人加以比較，那更有太多方面的差別。因此當我們面對著一張命盤來推演一個人的命理時，我更有必要先弄清楚這個「他」所處的社会背景。


    我曾經看過好多命例，在國內的事業上形成一種連續好幾個大限的財官雙美；這些命例包括商人和醫生，他們很多以為挾著多年來的商場經驗和財勢，或是高明的醫療技術，就可以同樣地在國外鴻圖大展，沒想到幾年後又在國內碰面時，才知道他們在國外期間歷盡艱辛，最後只好鎩羽而歸，大有不聽我寧先勸止而悔不當初的慨嘆。也有幾位事後告知：當初出國前曾得某些高人的指點，告訴他一旦出國謀求發展，以財官兩旺的氣勢，必能鵬程萬里；他本人一聽之下自信滿滿、雄心勃勃，千萬也沒想到最後竟然半空折翅，灰頭土臉地又回到國內重整爐灶。


    我們以為這種事與願違、命理現象和事實不一致的問題，不在於全是命理的要素，而是論命者和問命者同樣疏忽了一個嚴重的實際考慮：譬如當事人他對要去的那個地方的語言表達能力如何？對所去當地的法制典章了解和適應如何？當事人不像是孤家寡人單身一個的年輕留學生，而是攜家帶眷且又年近中年的人；想到一個人兩地疏的新環境，要求順利鴻圖大展、能像在老家的樣子，則不經十年八年的艱苦奮鬥絕難有成。我們以為這些情形應該是屬於常識層面的問題，就是不用命理的推論都可以理解和預料，但偏偏有太多的命理大師卻只考慮到命理的層面，而不作現實問題的合參；我們很為這道於盲的人悲哀，也為命理界這種除了命理還是命理的狹窄觀念深感無奈。


    (五) 現代知識

    常人都說，現代是一個知識爆發的時代，任何一種專門知識都在繼續不斷地快速進步中。在老爺爺時代，一個人會莫名其妙的肚子痛，痛不了幾天竟然藥石罔效、因此而死亡；肚子痛而會在短期死亡的病因很多，可能是急性盲腸炎、胃瘡瘍穿孔、腸阻塞，這些疼痛往往不是單靠藥物來醫治能得救。在現代，醫生碰到這種病人，最好的醫療是及時將病人送上手術枱開刀救治，因此現在很少聽到因肚子痛而死得不明不白的人；究竟類似這割開腔剖腹的手術，對現代的醫生而言，已經是件極其輕鬆的醫療方法。


    近年來可更好：腎臟衰竭可以換腎，連換心手術都有如老爺汽車調換新引擎那麼簡單；再過些年，醫學可能有辦法予所欲求地換人體的任何部位器官，都能在醫生巧奪天工的妙手之下，如同機械的換裝零件品。我們都知道，外科醫生所作的較大手術，實際上包括醫學上的好多項專門知識，絕對不只一位可以操外科手術刀的醫生就可以作得了事；比如以換心手術來講，我們以外行人的常識也應該可想像得到：除心臟外科外，一定是需要和心臟內科、麻醉科、血液科、病理檢驗科、免疫科，甚至一般的內科專門醫生的通力合作。其實任何一位醫生，在行醫為病人作診療之前，早就學有人體生理和醫療上相當多的有關學識。


    但反觀搞命理的人，好像只要遵古炮製地學了一些一知半解的命理法則，就可足百歲；倉促來去也確如百代過客，但在這短短的幾十年歲月裡，却也充滿著太多恐慌和無奈。因此，古往今來的專文用以探討可為人生所用的學術與研究，代代無不推陳出新。我們就以專門探討對人們有直接或間接用途的學術來講：不只形而下的自然科學在日新月異地進步中，影響人類思想觀念的形而上的哲學、以及用以改善人群社會秩序的典章制度也都在不斷地進步；唯獨我們千古傳下的這套斗數命理卻好像一直可以彌久常新，而又能放之四海皆準。


    我們認爲古傳的這套斗數命理法則在推演人生一輩子的命理上，有它相當程度的可用性，但我們並不認爲現代人也一定要沿用古傳而來的命理觀念；比如賽財子祿，在現代的命理上不再是探討現代命理的全部內容，因為現代人有他們所異於古人的社會背景和人生觀念：古人可以一輩子安居於出生的老家，但現代人很多卻需離鄉背井向外謀生、另求發展。這種完全不同的人生境遇必然是不可同日而語；一個人出外謀生就必須憑據條件，但他要憑什麼條件？他要謀什麼職？創什麼業？這些問題不只屬於他個人的問題，也是屬於社會背景的問題。


    我們都知道在一個工商業高度發達、經濟繁榮的社會裡有太多的工作機會可作，也有太多的事業可創；但實際上也有很多找不到適當的工作的人，也有太多的行業公司經營不善而歸於倒閉：正如人人都吃同樣的五穀雜糧和蔬菜，但有些人能健壯無病，有些人卻病魔纏身。假使人們能從命理的解析中有如醫生治病一樣使人人投身在這個有如萬花筒的社會裡得到充份解答和指引、不使迷失而有所作為，那將是有益世道人心的一種經世致用的大學問。


    但是很遺憾的是命理界顯然無視於人類文明的演進和社會的進步；就在各種文化科技和人文典章制度不斷的改進中成長，搞命理的人由於現代知識的隔閡和無知因此把人生一輩子在社會表現上的消長完全認定全部都是唯一命理因素使然：好像任何不屬於命理的社會大背景因素完全和一個人的命運際遇無關，只是咄咄怪事！當一個人來請教算命先生他的事業因資金短缺而發生困難的時候，算命先生只告訴他「命該如此」別無解決辦法；算命先生把一個人的吉凶現象完全歸之於命理現象的結果而不能像醫生的能為病人診療病痛。若在他的意識裏還有企業經營觀念就算他不能提出資金短缺的解決方案他也應該建議問命者去請教企業管理專家以謀求解決困難的方法！


    因此我們認爲一個現代的斗數論命者，他應該像一個大醫院裡的一般內科門診醫師一樣：一旦碰到分屬專門科別的病人時就須把那病人轉診到專門科的門診去以便由專科醫生診療。在這個萬丈紅塵的人間裡我們不能奢求一個論命者扮演無事不曉的萬事通，但我們認爲斗數論命既然擔負一種為衆生指點迷津的論命工作就應該對衆生可能遭遇的任何事理要有個基本上的概念；因此除了斗數命理法則必須熟練外另需具備很多知識條件。


    (六) 入世

    記得在一九五九年暑期我曾參加農復會（全名為中國農村復興聯合委員會）由中華民國和美國聯合組成的一個機構利用其撥基金來協助發展台灣的農業：台灣光復後的農業發展得自這個機關幫助很大；這做稱早已助成身退不復存在，委託我們學校系裡（與大農經系）所作的一個農家經濟的訪問調查。這個調查的目的是為了了解當時農家的人口組成結構、農業經營狀況、農家經濟收入：舉凡足以顯示當時台灣農村農業活動和農家經濟有關的內容都包括在調查內容裡；農復會希望藉著實際的调查用計以訂定有效發展台灣農業促使農村經濟繁榮的有效政策。很多屬於社會科學層面的學術研究或制度辦法的訂定往往都透過這種訪問调查彙集的資料再加以統計分析和研判來加以了解作學術理論研究的參考或政策擬定的依據。


    在學術研究方面，有光對純物質研究和由人類行為發展而來的學術研究所採行的研究方法由於本質的不同因此所採用的方法並不一致：前者如物理與化學研究人員可以整天躲在實驗室裡藉著精密儀器反覆實驗的研究；而後者除了學理上的推論以外還需要透過實況的调查了解才能證實在學術推論上的正確與否。因此這種調查上的空隙了解往往對這門社會科學的學術研究扮演著效用功能重大的角色。


    這種對群體現象了解的调查工作在當今工商業興盛的時代被廣泛地採用：一個大企業的經營隨時要去了解企業經營上的狀況和趨勢必須透過调查了解企業经营相關事項方面的市場取向以作爲知己知彼的判断參考然後才能訂出合理的經營策略；一個政治家也須了解民情疾苦然後才能佈行有效的政治措施，就以醫人救命的醫生來說必要時也要對地方性的某種特殊疾病作個案調查與研究否則無法辨明某種疾病的起因和有效的治療方法：台灣西南沿海某地區由於水質含砷過量引起的一種烏腳病就是一個很好的例子。


    命理探討的是以人生為主題的一種入世的學問，若我們把它套用學術上的方法斗數命理也是探討人類行為的一種學術也是社會科學中的一門學問；因此我們認爲這門學問也將不能異於其他社會科學必須對人類社會情況加以深入地探讨和了解：一個命理的研究者他不能像理化學家躲進實驗室與社会隔絕仍能作出大學問。我們認爲一個長期隱居林泉不問俗事的遁世者除了他個人獨善其身的修心養性外不知道他對人間凡事還能知道多少？一個躲在象牙塔內作著社會科學研究的人會為人所詬病；然而在我們斗數命理界却有太多的大師和高人偏偏自鳴清高鄙視人間俗事而整天盤居在象牙塔內或如閒雲野鶴般地悠遊人間而不聞問俗事以為人間凡事都早已掌握在他的股掌之間這不是太自大了嗎？


    學術的探讨也許有很多方便法門但屬於人類行為科學的斗數命理亦必須如同其他的社會科學一樣必須去洞澈人間的百態因此諳萬卷書行萬里路和積極地入世非常重要否則你將無法了解由人類行為而造成的人間凡事：比如說今年來由於新台幣對美元一直持續著升值從一年多前的一與四十元的滙兌比率降到目前接近一一和三十元兌換比使所有作出口生意的廠商叫苦連天幾至無法承受大叫已到流血出口的慘境；我們不相信國內幾千家的出口廠商老板他們能有人倖免於匯兌上的利益損失同時我們也不相信這幾千位大老板他們在斗數命盤上全部顯現出財帛宮方面的不利現象。我們也許可以根據命盤推論他們在這種台幣升值的大風暴之下所受的衝擊能否支持得過去但我們根本無法提供什麼神機妙法的好對策因為企業型態的改變甚至產品種類頻繁的更換絕對不是脫作就可以馬上作成；企業經營上的這種難關只是千萬個規矩中的一個例子大師們又能值多少？又能忍什麼去給這些愁眉苦臉作出口生意的老板們提供一個轉敗為勝的絕好良策？


    禍福根基

    談身宮作用


    秘書小姐告訴我有位華先生來過幾次電話；由於我這些天來不是忙著開會就是公事外出很多電話都無法接聽因此華先生要她轉告我禮拜六中午在一家廣式飲茶餐廳見面。我以爲大概又想要藉餐敘機會聊聊天：待星期六中午下班我準時到達餐廳時才看到郭先生亦來了；郭先生是某大公司的高級主管他和另一位王姓年輕人約於一九八五年中經由無居士先後介紹以都住在台北的方便前來和我討論斗數命理而認識。大概就在那年底直到翌年年中他們兩位和另外幾位亦都对斗數命理頗有興趣的朋友要我撥出時間能和他們作非定期性的見面研討斗數；認識華先生就是在那時候。


    在這段研讨期間，以他們的三人的反應最為熱烈：我很為老師的這套斗數理念有更多有心人的參與而感到欣慰但這件事到後來也頗使我覺得有時事常與願違；因此像今天的這個聚會那位王姓的年輕人不在參加我已不感到意外。華先生高齡已近七十但精力旺盛不輸年輕人；他年輕時服務軍旅由於精通英文因此在韓戰期間應聘為聯軍某種特殊軍務的高級幕僚：後來以上校官階退伍而改在新竹地區的某大電子公司服務；在電子公司的這段時間因職務輕鬆閒暇之餘對命理之學由開始的買書來研究到以後的正式參加斗數命理補習班。


    前些年從電子公司退休後為了要排遣退休後的無聊日子就在竹北附近開了一家為人釋疑指解迷津以「華軒居士」為道號的命相館；這是我和华先生以「斗數會友」的一段因緣。餐點上桌後華先生和郭先生以茶代酒的舉杯向我祝福生日快樂這才使我從迷糊中蕩然記起再過幾天就是我的生日：對於生平不作任何生日慶祝儀式的人來說真叫人受寵若驚；我頂在承受不起由比我高齡的華先生來為我祝壽。親不言老更不能為自己作壽我的老母還健在年近九十我怎麼可以在自己的生辰作任何慶祝？除非為這個「母雞日」特申感念之外：尤其像我這個當了大半輩子的上班族年已近退休之齡早成了過河的馬前卒一生乏善可陳剩餘的利用價值已不多搞斗數命理只是花不起其他太昂貴的休閒娛樂而用以打發下班後的閒暇時間倒沒曾考慮到想利用命理來得到什麼。


    飯後到一家茶蓬館聊天郭先生提起一些新近碰到的奇特命例；華先生更談了不少容人的一些稀奇古怪的際遇和聽聞：後來接著談到斗數命盤上的身宮問題他兩人表示對於斗數命盤上的這個身宮作用一直模糊不清要我表示點意見。


    身宮的作用在古傳典籍上的記述不多只見到零零碎碎的散見在先賢名論賦文裡但也都一筆帶過欠加詳細釋註：比如「太微賦」的「以身命為福德之本」「玉蟾發微論」的「身遇殺不但貧且賤」「命身相剋則心亂而不閑」「骨賦」的「立命可知貴賤安身便曉根基」「命好、身好、限好到老榮昌。命衰、身衰、限衰終身乞丐」「七殺守身終禍夭」等等的記載；但這些文字雖然寫得如金科玉律般的劃切分明對身宮的重要性作了相當重而有力的提示字意真是鏗鏘有力擲地有聲但由於沒加詳細註釋因此很難從這些吉光片羽中使人確能對身宮有個完整了解它的真義和概念。我對這方面的認識也不多所提供的個人看法充其只能作爲參考而不敢斷然肯定一定符合古傳的意義和道理。


    一般把斗數命盤上的命宮說成先天身宮說成後天但並沒有把真正的先天和後天作個清楚的界限交代；因此很難去了解究竟什麼是先天？後天又到底指的是什麼？若我們從斗數命盤的命身宮的起排法都是根據一個人先天出生資料而排定來講根本就沒什麼分別：但一般人都都知道命身宮並不可混爲一談。因此有人說命身宮是斗數命理的一體兩面可是又提不出個所以然的道理來因此很使人因之而感到迷惑。


    什麼叫做「先天」？假使我們從人類的行為舉止表現來看一個剛出生的嬰孩肚子餓時會哭身體不舒服或尿片潮濕時也會哭：這幅行爲表現是與生俱來的不敎自會的一種自然的反應這是一個先天性賦的本能；有一種人在很小的時候就顯現出他不管在那一方面跟同齡的兒童比較顯得要聰明很多。若以現代的智商（IQ）測驗他可能高到
    IQ 一六○以上：現在的人已經知道人類的這種 IQ 等級是與生俱來後天並不可能作任何改變因此 IQ 特高的人學習起任何事物都會比較快；這也是先天稟賦的一種。還有人類的身體或個性的現象有部份還是和先天遺傳的因素有關但後天卻也有相當程度的影響因此這兩樣和先天的關係在一個人成長以後已經不再是純先天（近世）的原有現象。


    我們知道一個人從小得自家庭的教養和學校的教育使他學習到各種技能這種人在生下和長大以後所受到環境上的教養會影響到一個人一輩子的命運走向：一個農夫的孩子從小學著耕田長大以後也多半以耕田爲業；一個做生意家庭的孩子長大以後會去做生意我們不能說這兩種孩子先天上有什麼根本上的不同而是因後天的影響才會有不同的行業。因此我們說這種行業所造成的差別完全在於後天的境遇所塑造根本和先天上沒有絕對關係：但是在傳統的理念上很多人都把這種現象混爲一談一個人耕田、一個人作生意完全是先天的關係；持這種看法的人由於誤把一個人的影馨視爲先天作用誤把斗數命理上的先後天混爲一談在解釋無方之下認定命身宮爲人生命運的一體兩面。我們認爲這是根本誤解了先天和後天的根本意義也誤用了先後天是命運的一體兩面的道理。


    智商（IQ）是不能改變但知識和能力却可以藉教育訓練和学习來取得和提高因此一個 IQ 属于常态型级的人若加以良好訓練、教育和學習他的处事能力完全比一個 IQ
    高人一等而根本不曾接受任何教育和訓練的人要来得好很多：說不定在作某一些工作上會由 IQ 较低的人来指挥 IQ 较高的人动手工作；一个土木工程在进行时我们可以肯定由工程师来指挥工人作活但我们不能肯定这个工程师的
    IQ 一定比全部的工人高。因为主要的是由于这位工程师他有专门的知藏而这些工人只能发挥他的体力劳动：因此我们以为人的能力问题并不全在先天的 IQ 上因为这个只能代表他的智商品位的高低而不能用它来衡量一个人真正的全部作事能力。


    若把人類這種 IQ 再作个說明假定某甲的 IQ 是一六○某乙是一二○在同样的學習環境里某甲的學習能力会比乙强因此他們兩人所学得同樣的專門知識甲会比乙多將來在同一個單位做事處理起相同事務的能力表現甲自然会比乙好（其他因素排除）：甲一辈子的成就也会比乙大；這種甲、乙在
    IQ 方面的差異（先天的差异）自然会造以后截然不同的成果这种 IQ 上的差别在近代科学認為乃得之先天遺傳並不是後天所能改變。


    我們以爲一個人得自父母母血（卵）孕育而成而生辰正是一個人在母胎孕育完成呱呱墜地而進入人間的緣起時因此我們據以排定斗數命盤：這個命盤即代表這個人先天與生俱來的所有特質也就是一種先天特質；若我們根據這種理念而推演一個人的命盤實際上就是代表著一個人的先天秉賦——也即所謂的先天命格不管他在命盤上的命宮或身宮都可以作此認定。一個人受先天遺傳而得的除了
    IQ、體格外還有性格（其他項我們暫不論）：除了 IQ 為後天所不能改變外體格和性格雖也多少會受後天際遇的影響而略有改變但基本上先天禀賦的現象還是有相當大的存留很難全部的被改變；絕大部份的人體格外形還是大半受到先天遺傳條件上的影響。因此我們相信沒有一個人會同意任何一個小孩從小就給他很好的營養和適當的體力運動和訓練將來長大後也都會有紀政和楊傳廣的體魄而能接受十項全能訓練後亦都能有世界級的優異成績；性格更是如此絕大部份的人雖然可以藉修心養性來訓練但很難能求得把天性性格完全改變即所謂「江山易改本性難移」指的就是先天（造份）上的。'
