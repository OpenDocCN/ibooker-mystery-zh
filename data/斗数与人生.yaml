  md: '在會是早產，我夜的老二就是如此），更不用提剖腹生產後，會罹患肝疾。事前的談論，


    我還是半信半疑，但事後一一應驗，就不能不使我懷疑，這究竟隱藏著什麼樣的玄機。


    因葉先生的鼓勵並送我一本竹林書局出版的《紫微斗數全書》，於是在幾晚挑燈夜讀之下，依樣葫蘆地排出了斗數命盤，但卻無法像何先生那樣看出任何些微的道理出來。後來雖曾發奮逐字研習書上的每個文字，但總覺得還是一本不知所云的天書。我不知道這個究竟是命，或是天意的垂憐，竟然在我求救無門的時候，何先生在葉先生的敦請之下，同意出來開班授徒，但對一個幾至貧窮無立錐之地的我來說，卻又產生了難以解決的困難，老師的束脩費，雖然收的不高，但也將近我每月薪水的一半，逼得心有餘而力不逮的事，真使我無法回覆葉老先生的愛護與盛意，事後當葉老先生發現我一開始就沒參加聽課之後，他委婉地告訴我，我的束脩費，可以由我隨意給多少，表示一下心意就可以，不必比照其他學生的標準。我至今仍然不知道，我沒付足的束脩費，究竟是何老師同意少收，或是葉老先生幫我付的。


    如今老先生已作古仙逝，老師已年近古稀，但我仍然難以啓口問起。因此我唯有不'
