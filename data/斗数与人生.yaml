    **球時的那種豪言壯語**——這是他的一小步，卻是人類的一大步。古希臘物理學家阿幾米德，有一天洗澡，身浸浴缸，看到缸裡的水滿溢而出，忽然忘其自身裸體，狂奔衝出戶外大喊：「我發現了！我發現了！」那種渾然忘我的喜悅，決非局外人所能體會；一身泡浴缸水滿而出，這是稀鬆平常的現象，但是阿基米德石光火花的靈機一動，卻悟出了物理學上比薩定理的大發現，奠定了往後物理學在相關學術的大放異彩。在斗數方面的這一項領悟，雖然我不敢和這位千古的大師和太空專家的大英雄


    **比擬**，但歡愉之心却也離形之於言詞。


    斗數涉及人際關係方面的探討法則，個人經過一段不短時間的推演後，又透過同好者不斷的嘗試運用，共同發現到這些原理法則確實有相當程度的可用性。[人事]


    **無常**，畢竟和具有其固定性和必然性的物理現象有別。因此，從事斗數理論和實務的探討，我們不能以自然科學的尺度來等量齊觀。命理之學若一定要分門別類，也只能列入極其廣泛的人文科學；而在人文科學的範圍裡，古今以來似乎只有學說上的主張，而沒有類似物理化學方面的那種頭摸不破的定律存在。


