- md: '## # 小數與人生 · 298 ·


    **強作用」，變成了嚴重的負面結果。**


    至於癸亥（一九八三）年、甲子（一九八四）年兩年，只不過他還在艱苦的作困獸之鬥。這種身宮組合，我們以爲一旦再有行運上的忌星連續干擾，由於「增強作用」而來的任何作為，都會造成與目的形成極大的反作用。因此我們以爲，這是蔡先生事業破敗，在命理現象上，成爲一項不可忽視的重大命理理由。


    再以張克東先生的命例來說（命理分析詳見了無居士著《現代紫微》第二冊），這位以房地產起家，最後又因房地產而破敗的張先生，命座七殺、擎羊在子，爲殺破狼格局，可惜三方四正不見六吉，倒有擎羊、地劫和武曲化忌並會，這是個生性勇猛、無畏不懼、衝鋒陷陣的大殺將格局。他的出身，沒有蔡辰洲先生的家世和財富，但他在事業所表現的才華方面，應該具有他獨特的一面才對，尤其他在事業上所充滿的那一種壯志豪情和信心。當他還在房地產界叱吒風雲的時候，恐怕他的氣魄在同


    行間少有人能出其右。


    這些現象，我們在命宮的組合裡好像很難看出他的命理現象，但若我們改從身宮來看時，我們可以發現到身宮紫微化權使他的「化權」得到有力的強化（天府武曲會合後之作用），也使武曲化忌，再受地空沖擊後，使他以爲任何難關都可以經由謀客


    策則而得到解決。再因命宮七殺、擎羊來會，讓他一旦握有權柄時，一切經營下的

    事業，將會依他特有創意來辦理，而不仿照傳統或一般常規的經營方法。他這種堅

    強的自信心，和強旺的鬬志，若用在賭場上去賭那種一翻兩瞪眼的梭哈，恐怕對手

    都會給他的氣勢所攝住，而爲之嚇倒。


    但這種氣勢，並不一定代表着他凡事都會成功。究竟企業經營非同賭錢，不能

    席手氣的順背。我們只是以身宮的星曜組合，用以說明由於身宮的這種「增強作用」

    （特別是紫微化權），對他在事業的處理上，甚至在其他方面上（尤其紫相所應宮位），他

    也會有那種強烈自信心，幾乎到了霸道的現象。


    我們可以和前例一樣的在他的限運中發現到，由四化引動，而激發身宮所產生

    的這種後天的「增強作用」的強烈跡象。命宮不會先天化權（紫微在戌），但却爲身宮

    所會，他也是從第一大限的壬子運開始，到癸卯大限，相連四個大限，不是使身宮

    紫微再化權，就是大限會巨門化權。這連權作用一旦聯上三大限以上，就會使這個

    權引起一種加量的「增強作用」。到了甲辰大限，破軍大限化權自座，也會了先天命

    宮，以及先天紫微化權，因此使他在權威方面，由於這種不斷增強，使化權作用發

    揮到極點。若以他命身宮部不會六吉現象而言，他的這種自信心和權威心之重，可


    能會以爲在那一個行業上，已可以讓他隨心所欲的爲所欲爲。因爲他會自負地自己

    認爲，在他經營籌創下的事業，已到所向披糜，凡事垂手可得。


