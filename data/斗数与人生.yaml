    由於長袖善舞，加以經營得法，在癸未大限著實賺了不少（癸未大限，使先位天田宅宮皆化祿，廉昌財星）。有錢人家，不會像上班族，就算聊有餘錢，亦必視之如寶貝的存進銀行，以保萬無一失。但作生意的人，就是懂得生財之道，知道如何來運用有餘的資金以錢滾錢。陳女士也深通此道，因此就在癸未大限的末期幾年，開始把剩錢借給經營大買賣的朋友週轉融通，由於利息優厚，朋友又殷實可靠，樂得她一有餘錢就往那位朋友放，因此得到不少利息。


    直到一九八四（甲子）年初，也就是壬午大限的第一年，由於一個命理大師告訴她，大運行入壬午限後會大破財，但是並沒說出為什麼破財、為何破財的道理和現象。後來經人介紹找上我來探求破財的原因，我才告訴她，假使她目前有錢借人生息，又從癸未大限出借，而延續至今，即將「劉備借荆州，有借無還」，最好收回。


    她告訴我，大概從一九八○（庚申）年起，每年都陸續借錢給同一位商場的好朋友，由於佢用好、招牌又大，因此近一兩年又增加了不少金額。她又說，這位朋友小她六歲，由於雙方家庭誼屬世交，從小就親暱地喊她大姊長大，所以她信得過這個人。


    經過我依理依實的推論，肯定地告訴陳女士，她的破財必將應在今年，同時也一定應在這個喊她大姊的殷實商人上。遺憾的是，我的依理推論，並沒得她的採信。


    就在年中左右，有一天我在辦公廳接到她有氣無力的電話，才知道她幾年來的積蓄，果真被這個喊她大姊的殷實商人倒閉一空。


    我們從她的大限運程可看出被倒債的現象和原因。


    第一，先天財帛宮甚爲佳美，福德宮武府右弼旺地，三方又會合佳美的星曜，這是善於理財、又生財有道的類型組合，一旦有餘錢，就不會把錢呆板地存進銀行去生微薄利息，還得扣繳所得稅。


    第二，癸未大限和她先生經營事業賺了錢，再加上原來就富有，足以讓她發揮生財有道的潛在能力。


    第三，當壬午大限時，她的先天財帛宮爲雙祿所輔，將極度發揮出她生財理財的才華來。因此當流年行入庚申（一九八〇）年後（癸未限後半運），就逐漸進入壬午大限運勢，借出去的錢，一年比一年更多。


    第四，當癸未大限時，已先引動貪狼化忌在前，待壬午大限後再有武曲化忌來沖，使兩忌成延續性引動進入大限壬午宮，這種引動力量巨大無比。


    （夾鈴星武曲忌之凶局）之败格，既是金主，怎能不被倒債？


    第五，先天福德宮待壬午限時形成鈴星武曲忌之凶格，甲子年巧成雙忌夾忌（亦）。


    第六，福德宮的錢財指的是既有錢財，如有破財，就是一种既已擁有錢財上的亏失。所以陳女士在事实和命理現象都应上了，借出去的債，怎能收回？


    命理的推論就是要據實分析，有時有命理的现象而无事实的作為，就像地雷没踏到信管并不会引發爆炸。因此我們很肯定命理是一種診斷，如同醫生診療病人一般，我們只能從命盤上看出一種類型，以及它的可能趨勢，但不可能看出命盤的主人，一定會有那種行為的必然現象。而是看出類型和趨勢後，再以實際的行為現象參入推論，才可能寫出它的實際現象和結果出來。


    ## 父母宮


    在古傳的斗數祿命法則裡，不管是男命或女命，父母宮都不被列為重要宮位。所以一般論命除了命身宮外，男人以財帛和官祿宮為主，遷移宮為次；婦女則以夫妻宮和子女宮爲重，福德次之，其他宮位都不甚重視。這也許在古代那種比較封閉的農業社會，反正男主外，最重要的是作事業賺錢養家；女人主內，子女、婚姻好，生活過得去，就是福氣。因此在古傳的命理上，幾乎都着重於這方面的探討。


    今人則受這些概念的影響，也因這幾樣確是生活上，甚至是人生一號子裡的榮耀大要事，因此常常是問命與談命上比較常談的話題。至於這個左鄰而居的父母宮，也是這個命盤的生身父母，反而談得不多，好像沒什麼實際的重要性。


    若我們從理論上來說，這個宮位應該是六親（父、母、兄、弟、妻、子）之首位，生我者父母，養育我的也是父母，一個人至少要依賴父母親到十幾廿歲，能獨立生計為止，一個人依賴父母到這種程度，但在論命時竟然只在命盤上佔了一個虛有其表的宮位，勿寧是怪事。若說命理談的是一個人一生大事，在古代極重視倫常的社會裡，而特別不重視這個父母宮，我們真不了解究竟為了什麼？在談兄弟宮一文裡，我們提到父母宮和兄弟宮夾輔着命宮，由這接鄰兩宮星曜廟旺利陷的強弱，會對所夾的命宮起一種強旺扶弱陷的影響作用。若我們從一個人一出生到成長過程中受父母影響之大的情形去設想，就不難體會出父母宮在斗數的實際論命上，應該是具有相當份量的重要性。


    有一次跟幾位朋友在擺龍門陣時，由近年來台灣開始重視資賦優異兒童（學生）的特殊教育問題，談起了一位由初中而高中而大學，步步三級跳，以三年時間修完大學課程，而提早畢業的年輕人楊柏因。有位略懂命理的朋友問說，這在斗數命理上有沒有什麼特別的道理或理由？我曾說，斗數命理上有一種格局叫「陽梁昌祿」格，格局較高的，智商高、書讀得很好，具有過日不忘的聰明才智，在科學時代，進士及第無疑。在現代，升學考試如癡中取物，楊柏因可能是格局中最最高的一級，因此讀書對他來講是件相當輕鬆的事。


    這位朋友接著又問，跟他父親是個知識份子有沒關係？我說當然有關係。我們知道他父親是某大學的數學教授，因此我們可以確定，楊柏因是生在一個極重視教育的家庭，何況他父親早在他讀初中，甚至讀小學的時候，就給他殷殷善誘，不但爲他說疑解難，也必定指導他如何作學問，使他在早年裡就啓開了他的聰明智慧。


    若他是出生在一個販夫走卒的家庭，父母靠出賣勞力維生，根本不識字，別說教他讀書認字，若能讓他跟一般孩子一樣上學讀書，已經很好了，如何又能及時發現他孩子的聰明，給他及時啓發教導？因此，楊柏因在學業上的順利成就，除了聰明才智以外，還要加上環境上的因素，特別他還可能得到他父親那種屬於資賦優異的先天遺傳。


    從遺傳學上，我們知道一個人的天賦，屬於遺傳的結果，而不是後天任何作爲所能作根本上的太大改變。一個人的聰明智慧可以遺傳，體質、體形與外表，甚至脾氣都可以遺傳。遺傳病理學上，依例有太多的疾病，全都來自祖先先天血緣上的遺傳結果。當然，在遺傳上，好壞並陳，遺傳到好的因子則好，遺傳到壞的因子則壞，若有人還搞不清楚這種遺傳因子的影響之大，你不妨看看你周遭認識的朋友，特別兄弟姊妹衆多的，你就可以發現到同母所生同父所養所教，在同一個環境相同的家庭長大，到成人後，由於天賦的有形與無形差異，結果造成兄弟間在往後某些境遇上有，有很多不同的現象和結果。


    我們曾經長期試着利用父母的資料，來探討他們對一個孩子在命理上所造成的影響，以尋出父母子女命理之間的某些關連性。也許我們還不能加以肯定、證實某些特殊的跡象，確與父母資料產生互爲因果的必然關係，但我們却在很多的個案裡，發現到父母資料的應用在很多事項的推演處理方面，的確具有脈絡相通的作用。因此我們初步以爲，父母宮這個自古以來聊備一格的宮位，實際上對整個命盤而言，實在蘊藏着太多的玄機，我們很難相信，古籍上所列述的，由於和疾厄宮遙遙相對，因此一個人的健康是來自父母的間淺含義，道理應該不是那麼簡單。


    ## 影響命理的因素：類型、背景和條件


    斗數命盤將人生大事分成十二類，配置十二地支宮，經由各宮位星曜的配置組合形成的作用，來推論各個事項宮位星曜作用所象徵的現象。在單獨某一個宮位時，大體上是以該宮位爲主題來論事。比如談官祿宮，就以官祿宮這個宮位所牽引三方四正星曜的現象來推論，但基本上，任何一個主體宮位，不能僅憑這個宮位來論，還須配合先天的命格（命、身宮所形成的格局），作爲基礎來衡量。


    理論上，一個命格大的人，他的官祿宮廟旺，可以據以推論，他在官祿宮方面，必有相當好的發揮，這好比兩個營業額大小不同的公司，大公司年營業額十億美元，小公司營業額一億美元，年終結算結果，純利都是營業額的
    6%，兩個公司的營業純利百分點完全相似（以一般企業經營來說，這種純利百分率已經相當不錯），但在絕對的淨利金額上，大公司高在六千萬美元，而小公司却只有六百萬美元。


    儘管兩個規模不同的公司，在各自的經營上都認爲得利很理想，但公司規模太小，當然關係到他的營業額（經營效率假定都得到充分發揮），營業額又影響到絕對純利金額的多少，這是很淺顯並很容易理解的道理。我們可以把命格大比之於大公司，命格小比之於小公司，用以理解官祿宮的作用如何，必須以命格來衡量的道理。


    若再以事業經營來比喻斗數官祿宮的作用現象，來推論一個公司經營的成果，還需牽涉到該公司經營運作的某些關鍵問題。比如，產品的良劣、產品行銷量的大小、難易、市場形象、產品的獲利與呆帳情形、財務結構的健全與資金融通調度、人員的能力發揮，我們將可依據命盤上的官祿宮、遷移宮、財帛宮、福德宮、田宅宮、僕役宮，個別分析推演，進而作綜合性的判斷。


    一個公司經營的成效，往往個個事項部需兼顧，一旦有一個環節發生了問題而不得解決，往往使這個公司的經營功虧一簣，斗數運用到企業經營的推演與論斷方面，也必須合參到這些事體，而利用各相關宮位的現象來綜合判斷，並不是單憑命格大、官祿宮旺，就可以在商場上鴻圖大展、財源滾滾。前面曾提到，大企業公司的高級主管，既然職位高，薪水一定優厚，諒必財官兩旺，但實際上，他們不一定自已就能當得了老板一樣。因此在斗數上的論命，就不能光看官祿宮如何就推論他的事業也必須如何。


    在整個斗數的論命，任何一個單項宮位狀況的論斷，幾乎都不能光依那一個宮位的現象來單獨推論。因為斗數命盤是個完整性個體，它好像一個人，一個完整的人，它不但有藏在體內的各种臟腑器官，還有長在體外的肢體五官，雖然各具不同功能，但卻也缺不得任何一樣，若有一個部位或一個器官欠缺，不但只是那個失缺的部位不能作用，也將必定連帶影響到其他部位的正常功能。這種現象不單人如此，任何高等的動植物，無不有其正常器官（部份），以發揮他正常的生理功能。


    一個斗數命盤既然是用以談論人生一輩子可能遭遇到的所有人、事、物的現象，不該只是一張無生命的命盤。佛家說「一沙一世界」中醫更把人體看成一個陰陽調和、五行平衡的宇宙，因此我們若把斗數命盤，看成代表一個屬於個人的宇宙的縮影，也未嘗不可。


    一個人的行為，除了因他個別條件而具有個別現象以外，還帶有時間性和空間性的差異，由時間性所特有的社會環境的思想、習俗、典章制度差異，空間上自然環境的差別，往往都會對人生產生極大的影響和變化，因此以斗數祿命用來推論一個人的命理時，除了個別的條件因素和意願外，必須考慮到人的時代社會與所處自然環境。


    以婚姻來說，在中國歷代的婚姻律法，就不盡一致。當老爺爺的時代，老爺爺們只要能買得起，他可以高興娶幾個老婆就娶幾個老婆，只要犯上七出（據《辭海》記載，古禮出妻之七出，有：無子、淫佚、不孝舅姑、口舌、盜竊、妬忌、惡疾七項。）的任何一條禁令，就會被休妻。但現在你我卻可不能如此，也許有老爺爺時代所沒有的婚前戀愛，但一旦結婚，就容不得你在婚姻上不守一夫一妻制的法定制度，你敢亂來，一旦碰到悍妻，就會讓你吃不了兜著走，有時就算你有二心，當你想到必須與下堂妾（夫）平分財產或擔負贍養債時，你就會不敢輕舉妄動，不敢娶小或休妻。但這個時代的婚姻制度或現象，並不像我們一樣，在信仰回教的國家裡，他們却有另一套婚姻的習俗和制度。他們可以合法地娶得四個太太，高興的話可能更多。


    ## 命例：虎父出犬子


    [命例]


    前些日子為了主持公司各部門主管擬定一九八八年公司營業計劃，作最後修訂，特別 是兄弟姊妹衆多的，你就可以發現到同母所生同父所養所教，在同一個環境相同的家庭長大，到成人後，由於天賦的有形與無形差異，結果造成兄弟間在往後某些境遇上有，有很多不同的現象和結果。


    我們曾經長期試着利用父母的資料，來探討他們對一個孩子在命理上所造成的影響，以尋出父母子女命理之間的某些關連性。也許我們還不能加以肯定、證實某些特殊的跡象，確與父母資料產生互爲因果的必然關係，但我們却在很多的個案裡，發現到父母資料的應用在很多事項的推演處理方面，的確具有脈絡相通的作用。因此我們初步以爲，父母宮這個自古以來聊備一格的宮位，實際上對整個命盤而言，實在蘊藏着太多的玄機，我們很難相信，古籍上所列述的，由於和疾厄宮遙遙相對，因此一個人的健康是來自父母的間淺含義，道理應該不是那麼簡單。


    [PAGE 202]


    的審議會，搞得頭昏腦脹時，有一天秘書小姐在我辦公桌上留下老彭幾次電話留言，要我得空時回電話。人一上了年紀後，就是不能太忙，老彭來電話的記錄單還釘在備忘錄板上，但却一連好幾天沒給回電話。直到秘書小姐再告訴我老彭又來電話時，我才猛然記起，把他的電話給忘了。經過秘書小姐幫我打通老彭的電話轉過來時，才知道他要跟我約時間，談些命理上的問題。


    老彭來自花蓮鄉下，獨自一個人跑到台北闖天下，雖然大學畢業，但却有股鄉下人腳踏實地的苦幹勁。經過廿多年的努力後，目前已是一家擁有工廠的外銷公司董事長。我原以爲由於一年多來美元的節節下降，使他的工廠也面臨這種新台幣升值，作出口生意利潤已到退無可退的離開，要我提出命理上的建議。直到後來，兩人見面後，我才知道他並不全爲他自己的事來約我見面。


    原來他有一表親的孩子，從某大學企管系畢業後，十多年來在幾個公司任職過，但一直半途而廢。前些年，老彭看在這位表親在他創業艱難時曾經給他在財務上幫忙的份上，不忍心看他這個表姪的失業而無所事事，因而把他找到自己公司來，幫忙一些出口例行業務工作。


