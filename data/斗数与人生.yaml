    節，因此我們以爲要使命理成爲有用的經世致用之學，就應該採取一種能與實際人生結合的命理觀，才能使命理落實到實際的人生裡。基於這個理由，這門古傳命理就應該從基本的觀念上加以現代化，把時代的新觀念和新知識融入命理中，然後才能以一種新方法來加以發揚光大。若不如此，這門學術將不爲新時代所用，遲早會被時代所淘汰。


