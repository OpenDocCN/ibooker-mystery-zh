  md: '由於宗祧觀念的根深蒂固，因此在老祖母時代選媳婦、配八字時，子息有無或多少，便成爲考慮的必要條件。就算娶來的媳婦，生小孩如同母雞下雞蛋般的容易，但是若老是弄瓦而不弄璋，將會使老祖母引爲生平最大憾事。從現代的遺傳學，我們已經知道，生男的遺傳因子決定在男人的身上，只要含有Y因子的精子和卵子結合受胎，必定生男，否則生女，也就是媳婦老是弄瓦，其罪不在媳婦。這個道理，在老祖母時代當然不滿意，難怪她們會怪罪媳婦肚皮不爭氣。


