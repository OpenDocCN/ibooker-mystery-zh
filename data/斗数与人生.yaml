    在斗數論命上，由於理念的不清，因此常有這種雞鴨同籠的錯誤觀念，以爲只要屬於金錢損失，就都是財帛宮的問題。斗數論命像這種理念不清之處太多了！我們又怎能渴求這門學術，能發揮出它的實用功能呢？


    當人類懂得使用某一種東西代表某一定的價值（即錢幣）之後，人們不但爲着其基本生活而謀求財利，同時也爲着更多更大的金錢而盤算着如何去賺取。這就是自古以來所謂的生財之道，也就是當今講求的理財方式或方法。生財亦好，理財也罷，古今以來，謀求財利之道，已經產生太大的變化，不僅目的不同，方法也有差異。


    古人多爲生活而賺取蠅頭小利，今人固然亦爲生活，但已不再單純只爲生活，求財理財爲的是更多更大的目標。


    我們千萬不要以爲只是單純在理財工具上，由算盤變成電子計算機、電腦，這些個完全只屬文明利器的問題，因爲在這些文明利器之下，的確還藏有太多的大學問。一個作生意的大老板，若就今年生意上可能的得失去請教一位算命仙，算命仙固然可以依據命理上的道理，預卜可能的吉凶，但也只能得到吉凶的結果答案。若是去問一個深諳企業管理與理財之道的專家，他必先從這個公司目前經營的資料上'
