    的還是近幾年來，在無數接受現代高級知識訓練人士的鑽研以後，已經開始發揮它的真實功能。把這個古傳的玄學落實到正如其他社會科學一樣的，可以經世致用。

    我們發現這套古傳的命理學，在整個理論架構上以及其所用的推演法則上，用來詮釋人生命運的現象，扮演著一種其他科學無法能及的特殊功能。因此我們可以肯定它的確有存在價值和必要。


    不可諱言，這套命理學由於古傳典籍太少，甚至所有的文字，幾乎簡潔到必須推敲才能了解它的文義。特別是對一些理論文字的敘述和一些關鍵性的文意，因缺少實例的引用使人讀來如墜五里霧中。比如，命宮謂之爲先天、身宮謂之後天，究竟什麼是先天？什麼是後天？根本不加闡釋。又如「七殺廉貞」，既可以爲一積富之人，亦可以一路上埋屍」。類似這種語焉不詳的文字，都讓人覺得這些古傳典籍簡直成了看不懂的有字天書。


    也許人生本就充滿著太多的詭譎離奇，使得用以探討人生際遇的命理之學，也因之而帶有太多不易了解的神秘性。這種神秘性特別在我國自古以來的那種既敬又畏天的社會意識裡，人們原本把人生的一切委之於一種天命的安排，因此更加'
  - '[PAGE 12]


    深了命理的神秘化。這種神秘化，對斗數命理不但沒有提高它的學術地位，甚至嚴重的阻礙了它的進步。因此我們很遺憾的發現到，打從斗數訂定命理法則的一千多年以來，斗數學術不但未有顯著進步，甚至變質到荒誕無稽的地步。


    斗數命理，所以會如此，也許與它的特殊功能有關。但我們以爲最主要的，還是在於一種時代文化背景的有以使然。這種時代的文化背景，一直到了近代，當西方文明東漸，西方文明那種凡事寬事求是、一切講求理性，以及拿出證據來的學術理念以後，才使斗數產生一種衝擊，使鑽研斗數命理的人，不能再抱殘守缺，泥守舊觀念，而必須採用新觀念和新方法，把時代新知融入古傳的斗數理念中，再用以重新詮釋斗數命理在實際人生，可能產生的應用和價值。


    斗數命理對人生的探討，雖然不能像自然科學一樣的拿出具體物質的證據來，但人生的存在本是一種「事實」，而「孩子的遭遇也是一種「實際」，命理既然用以探討人生的這種「事實」和「實際」，它當然也就有它的道理存在，決不能憑空遐想和臆測。比如說，一個小孩，爲什麼會有他的「存在」？以及他存在以後所表現出來的種種「事實」。在古人也許只知道因爲有其父母，才會有這個小孩，至於爲什麼會'
  - '[PAGE 13]


    產生他種種存在以後的事實？就茫無所知。但今人已經可以從生理學和遺傳學，了解這些「存在」和「事實」的原由。比如這個小孩是個健康活潑、智商很高或是先天殘障、智能不足，現在我們已經知道爲什麼會如此，但古人却始终不知道究竟爲什麼？他們會認爲全部都是天命的安排。因此近代人們探討命理，由於具備這種文明新知，已經不再爲這些「存在」和「事實」感到迷惑。


    因此我們以爲一種學術，只要它確是有道理，必能透過現代文明的新知來加以剖析闡釋。任何一種學術，只要能以文明新知加以實證，並受嚴格考驗，它就能彌久長新，而放之四海皆準。我們以爲斗數命理，正如其他的很多近代學術一樣經得起文明的考驗，可作經世之用，因此絕對可以冠冕堂皇的走入殿堂。


