  md: '• 259 • 斗殴推诿的基本方法


    篇一律的一句问话，除非是外伤急救或是昏迷不醒人事，没办法回话（小孩还有大人陪去可问），但千万也没想到，病人竟冷冷的说：「你看我那裡不舒服嘛！」这位门诊医师行医改年，诊治的病患也不晓得有几万人，但听到病人的這麼一句话，倒是第一次。因此，脑筋不禁一楞，他话也不再问下去，却要在旁助理的护士小姐帮他搬一个电话，请农学院的某某教授回话，等句话接通后，只听到医生在电话中客约地说：「我這裡有个病患，应该到你们那边诊疗，请你安排时间，我会介绍他到你们那边看病……」。原来接电话的是某大学的兽医学教授，对各种牲畜的疑难杂症颇为权威，也只有兽医才有能耐去诊疗不会讲话的畜牲。如今这个看人病痛的医生，碰到只要医生看病而不诉病情的病人，如何能叫他着手？只好请他去看可以不诉说病情就可以诊病治疗的兽医。


