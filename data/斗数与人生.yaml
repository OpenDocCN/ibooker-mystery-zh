  md: '士著《現代紫微》第二冊，他命座天相在丑，紫府相朝垣格，六吉只有天鉞由酉來會，

    祿存在巳來合，煞星有火星和地劫，生年天干四化皆不見。命宮星曜組合，怎麼看

    都不像是一位一生會是既富且貴的格局，可是他出生在一個豪富之家。身宮祿存在

    巳位獨坐，為羊陀夾的組合。這種組合（成刑格局）本質上相當脆弱，易爲三方酉、

    亥、丑宮位星曜作用的侵入而受影響。其中對巳宮形響作用最大的，首推亥位上的

    暗星。身宮的這種祿存獨座，當行運沒有忌星沖照時，不會引起身宮（亦即巳位）的

    不良形響作用。


    從蔡先生第一個大限辛丑的太陽化權，使巳宮爲雙權所輔，庚寅大限，武曲化

    權會入亥宮，照入巳宮，辛卯大限亦使巳宮爲雙權所輔，這種連續三個大權使蔡先

    生的身宮得到「化權」的感應，他又出生在豪富家庭，在命理的現象上，他這種由

    小到三十多歲的過程中，將會在不同的階段上，呈現出一種「威權」至高的「增強

    作用」。這種命理因素，和他的家庭環境，若又給他嬌寵，會使身宮受化權感應的「增

    強作用」加強。


    這種命理因素加上家庭條件會把「威權」發揮到最高峯。特別是由辛丑到辛卯，

    不同大限的兩個辛干，使他的先天命宮成爲雙祿所輔，而且辛干的文昌化忌和庚干'
