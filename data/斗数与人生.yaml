  md: '宮（亥）成爲祿存和武曲化祿的雙祿同宮，庚戌大限的福德宮太陽化祿（子），從命理現象顯現出，他從小到三十五歲，何止茶來伸手飯來張口？在生活享受上，幾乎有求必應。假使你表姪是個窮苦人家出身的子弟，命理出現的這個跡象也許會表現在生活上的逐漸改善。然而他是出生在一個富裕人家，我的看法是你表親對你表姪從小就給嬌生慣養，特別是金錢上有求必應，讓他從小養成只管享受，不知金錢爲何物的浪費習慣，這正是富有人家特有那種頑袴子弟的標準人物。


