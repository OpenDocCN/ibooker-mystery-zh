    因此我們以爲一個論命者，若要根據命盤依理推論一個人的健康問題，除了熟悉命理推演的理則以外，更應該着手於醫理上的認識。也許不必像醫生那樣的精通醫理之道，但是總該吸收一些醫理上的基本知識，這樣一來，面對命盤談論疾厄宮的問題時，才不會腑臟不分、經絡不明，把消化系統上的各種病變，如腐醫治病似的，一概服以「張國周強胃散」，把女人因爲經期不調不順，以致難於受胎懷孕，但尚可療治的毛病，竟然鐵口直斷地說成因爲命帶孤剋、子女宮忌煞交加，所以無法生育，因而誤了人家的醫療時機。


