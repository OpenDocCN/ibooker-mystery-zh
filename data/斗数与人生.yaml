- md: "## 星曜基本赋性和作用\n宫位的作用现象，及诸星曜在十二地支宫位的配置组合。视星曜在十二事体兹列举「天机星」的赋性，来说明斗数论命如何藉星曜赋性作用，来解析命盘上的现象\n\
    \n(二) 天机阴木，南斗第三星。乃益母之宿，兄弟之主，化气曰善。\n白色、老年青黄色，中等身材，入庙则肥胖，陷地刑瘦弱，性格多计较精明，且勤劳谨慎，若与天梁同度于身命之地，多为好说喜辩论，有特殊技能之人；心地善良。有宗教之信仰。此星若加煞曜昌曲，主多学多能，如有擎羊冲破\n\
    或加空劫，则孤甚，或是僧道之命。天机遇巨门于旺地，主武赋荣身，若与太阴同度于寅申二地，为探花格，吉多可贵，不然平常，煞多反不吉，此格女命逢之，不论贫贱，多是二度婚娶，不然填房偏房方可偕老，如加煞，有淫行。\n\
    且女命得此星，除子午入庙加吉为佳外，余宫即有吉拱，亦有美中不足，若与巨门同度于酉宫，男命东南生人可吉，西北之人，即或有成就，终必不利，女命更忌，伤夫克子，淫贱无疑，大运逢之，亦作此论断。天机入限，主有限境\n\
    之变动，会天马，有远行异乡之兆，且除子午庙地外，余皆主家务多纷扰，不\n详，且此星会天梁天同，则无论有煞来冲，亦主有高寿，再如行限，如逢机梁\n日月四星会合于旺地，必多增财利，再加吉多，更有贵。天机于疾病，主有肝\n\
    胆之疾，性燥惊恐之类，眼花齿落之象，女命经血亏损，于田宅，主有争执拚\n较之人。\n从上面这一段文字，可以得知，学习斗数的人，必须熟悉每个星曜的基本赋性\n\
    和星曜组合后，综合作用现象。关于这方面，古今以来著述说明已经很多，但有些\n\n## 各种「庙旺利陷」\n古传上列为「法则」的星赋作用和现象，似为近代斗数论命者所忽视或遗漏，因而\n\
    使得命盘上依理推演的结果，竟然和事实不尽符合。我们以为失却了这些原则性的\n运用，将很难解释命理上的很多现象。\n\n斗数星曜，至少在紫微系列和天府系列的诸甲级星上划分为南北斗星，不属南\n\
    北斗星系的太阳和太阴，则列为中天星主。一般只知道，北斗星生早，南斗星生晚\n（或一快一慢，比后上如此），而不知还有刚柔之分。在星曜的基本赋性，北斗主刚，南\n\
    斗主柔（比较上），这种刚柔现象，若用于命、身两宫来论，就作用分明。命身宫以\n兼备南北星为佳。（命宫北斗、身宫南斗，反之亦然。问宫为两星时，以其向北斗星都有为佳），\n\
    如此可收刚柔并济的好处，若命身都为北斗或南斗星，则不是失之过刚，就是失之\n太柔弱。这种刚柔，尤其在一个人的个性脾气上，特别显著（在此暂不提及六吉和六煞\n\
    方面的问题）。\n\n在斗数论命上，一般都以以为格局为首要，而忽视这种南北斗配合上是否刚柔并\n济的问题。实际上，若以经商当老板一事来说，一个成功的大老板，若命、身得不\n\
    到这种南北北斗属性上刚柔相济的配合，将很难谈上有什么太大的成就。失之过刚，\n\n主能当冲锋陷阵的大战将或勇士；失之过柔，亦只能胜任运筹帷幄的幕僚之宾。一个出将入相，武可带兵、文可治国的将相之材，若不刚柔并济，将无以办到。若用于现代企业经营、人材的运用上，刚毅者可以当经理或执行人，柔弱者可当幕僚企划。只有刚柔并济、南北斗兼并的人，才创得了业，才干得起有声有色的董事长（俗以刚论，太阴以柔论，七杀为南斗之刚星）。我们中国有一句老话，一个成功的人，待人必须温和、处事必须有原则，即所谓「外圆内方」的道理。论斗数、若不知道个重要的原则，将何至差之毫厘而失之千里？所论与所断，将与事实南辕北辙，背道而驰。\n\
    \n中国的阴阳五行之说，相传久远。在斗政命理上所采用星曜的阴阳原理，即用\n以表示星曜赋性上的阳刚与阴柔（与南北斗赋性上有些类似，但基本上仍有差别）方面的\n\
    一种特性。阳则为显著、快速、突出，主表面，阴则为不明显、较缓、不很突出，\n主里层。若以同是五行属木的北斗星贪狼，五行阳木，和南斗的天机五行阴木来比\n较（亦只能作比较上的说明与实际应用上的例容说明），那么命宫坐贪狼的人（以庙旺为忌然\n\
    时也），体型较壮硕、五官俊美、动作快捷、性格好动，病属木时，主胆疾（胆为肝\n\n• 223 • 星曜基本阴性和作用\n\n主表，中医论说），天机座命（以府旺无忌然瑜）主人体形长高、五官清秀，较好静。病\n\
    属木时，主肝疾（肝为脏，主视，中医论说）。阴阳之说在星曜的作用上，有如上例。只\n能意会而运用，实在很难言传而说得很清楚。或许就是由于这个原因，使得很多探\n\
    讨斗数命理之学的人，因道理不明而不知如何运用。\n\n阴阳的道理，除了在星曜的赋性上有这些作用现象外，在论及五行的生克制化\n时，那就作用更大。因此我们以为，星曜的这种赋性，特别在南北斗主星及其南北\n\
    斗助星的功能作用上，也占有相当大的重要份围。\n\n在斗数依星曜的组合上，我们常提到星曜的相生与相克。我们可以用火贪和铃\n贪两种由相生而成格的组合来加以说明，并分辨他们的差别。由于火星为南斗助星，\n\
    属阳火，铃星亦为南斗助星，属阴火，这种同为属火而形成的格局（其他条件暂不论），\n如何分辨呢？我们可以从这两个同由阳木的贪狼相生而成的格局加以认定，火贪在\n\
    气势上趋向于一种作用较强烈的现象，并较快发生作用，作用时间较短；而铃贪就\n有些不同，他的作用较温和、较缓慢，作用时间也较长。\n\n再以擎羊（北斗、助星、阳金）受南斗助星、火星（阳火）和铃星（阴火）克制后，\n\
    \n产生制煞为权的比较来说，火羊组合倾向一种强烈、快速而明显的现象，而铃羊组合则又倾向另一种较温和、缓慢、较不明显的作用现象（暂不论其他星曜现象）。两个组合之间，由于阴阳属性的不同作用，就会有这么一些基本上的差异，而这些差异在论命上就产生关键性的差别。\n\
    \n这只是列举两个星曜在阴阳五行上所产生的一种现象，若一旦一个组合有三个星以上时，那就不止于单纯的相生或相克。若五行和阴阳配合得宜，更有由三个以上的星曜，表面看是杀气腾腾的星曜，但实际上由于阴阳五行的配合得当，甚至再因十二地支宫位上的五行因素，使得整组星曜作用化戾气为祥和，或是本就相生的吉相格局，反成大败。正如廉贞、贪狼在巳位为落陷，在亥位却成「绝处逢生」，巨机在卯位为「位居三台之贵」，但移至酉位，就成了「木死水败、纵有财官亦不荣」的凶格。\n\
    \n在古传的典籍里，类似这种引用五行生克制化的章句很多，我们弄不懂，今人学斗数，不知是因为搞不清楚而不晓得应用，或是认为阴阳五行之说太过空洞而弃之不用？一个医生要用中药医病，你必须根据中医的医理才能奏效，同样的，你要\n\
    \n**斗技与人生** ·226·\n\n学好斗数的命理之学，若一直弄不清楚这套理论，你将一辈子也搞不通，甚至走入死胡同而永远不知道为什么老是「此路不通」？\n\
    \n## 各种「庙旺利陷」\n宫位，显出作用上力道差别的现象？也就是所谓庙旺利陷的问题？关于这个问题，古今斗数典籍上各有不同的解释，有些似乎很有道理，但有些好像也是似通非通。甚至有人根本否定星曜在十二地支宫位，存在着所谓庙旺利陷的现象，而完全根据星曜在三方四正和夹辅宫位上的组合，以及经过「四化」之后，才能定该星曜于所在宫位上的强弱现象。这派不赞成传统上星曜在十二地支的庙旺利陷的论法，我们认为只对了一半，既不全对，也不全错。\n\
    \n紫微斗数既然设定这些星曜，并藉它的个别特有赋性来推演命理，我们不管它究竟是如假包换的天体裡真有这些星曜或仅是假借而用的符号，但它既然有他的赋性作用，我们似乎可以把它看成带有「生命」的一种物体。我们从大自然景象中，\n\
    \n斗数与人生 · 228 ·\n\n可以观察得知，绝大部份有生命的物体，如植物或动物，几乎都生长在属于他适合生存的某特定空间。寒带地区有寒带地区的林木，热带地区有热带地区的林木，动\n\
    物更有寒热带之分。不同地区有不同的生态环境，这对有生命的物体，不论是动植物，都会造成不同的影响，道理非常明显。当然我们也可以在热带地区种植寒带的\n林木，和养寒带地区的动物，但无论如何，这些寒带也区内林木和动物，一旦移到\n\
    热带地区以后，就很难长得很好。我们已经知道，动植物所以会如此，完全是由寒\n热不同地区动植物，在不同地区裡有某些生理结构上的根本差异，因此才会有这种\n比较难于适应的现象。\n\
    \n若我们把星曜视如这些具有生命的动植物，它们的生理作用现象，自然也会因\n空间的差别，而显出他们生理作用上的差异性。我们以为，斗数星曜在十二地支宫\n位上的庙旺利陷的道理，应该是相通于这个理由。至于斗数命盘所应用的众多星曜，\n\
    在各地支宫位上，每个单独星曜的庙旺利陷现象的认识，应该是经历千年经验上的\n累积，否则，我们只能说是祖师爷陈希夷道长入禅定后，达到天人合一的境界时，\n所悟出来的结果。\n\
    \n我们知道，星曜在十二地支宫位的作用如何，并不只限于单独星曜庙旺利陷的作用，正如我们上述，它还会和三方四正所会合的星曜，具有相当密切的关系，不管他是吉格或凶格。但是我们从经验上得知，若我们舍弃主体宫位（十二地支或十二宫）形成的吉或凶象，究竟会有什么样的程度差别，这种斗数论命的法则，我们以为谁都不能忽视或否认。\n\
    \n其实斗数星曜不只在十二地支宫位有其庙旺利陷的现象，甚至在十二事体宫位上，也有其吉凶作用的差别。以古传斗数赋文为例，「天机天梁，擎羊会，早主刑克晚见孤」的这一个格局，明白地指出这个格局在六亲方面的一种凶象，因此这个格局要应到本命宫或是六亲宫位上，才比较会显出六亲上的刑克，假使它出现在非六亲宫位上，我们或许可以认定它也是一个不很好的格局，但它应该不是六亲上的刑克问题。因此我们若从另一个观点来分辨，星曜及其组合的吉凶问题，天机天梁尽管是在庙旺之地，一旦它入了命宫或六亲宫，又与擎羊会合，对六亲的刑克依然存在，并不能说因为庙旺之地就可以刑克全免。我们只能说，也许因有吉救，可以降\n\
    \n低刑克的程度，而当落陷而又无吉救时，它的刑克会加重。因此我们以为，在斗数\n论命裡，我们固然要重视星曜在十二地支宫的旺弱外（即庙旺利陷），同时也应该重视\n\
    它在十二事体宫位的作用现象。\n\n前面提到星曜在十二地支宫位和十二事体宫位所发挥的作用，除了因地支宫位\n的差别以外，还有因事体宫位而异。其实星曜不管在地支宫位或事体宫位，在论命\n\
    时，都必须根据每个宫位的三方四正和夹辅宫位的组合结构来研判，不能作单独一\n颗星和一宫位的独立论法。前述的举例，只是用以说明星曜的赋性作用，有这么一\n些现象，至于三方四正和夹辅宫位的关系，在此暂不论述。\n\
    \n若我们再另从命盘只依紫府系列的甲级星，所排出的十二个命盘（实际上其中六\n个是另外六个命盘的相反排列），我们约略可以分为：紫府在寅申，十二地支宫每宫都有\n\
    甲级星；紫微七杀同临巳、亥宫，则有四个地支是空无星曜；其他八个命盘，必有\n二地支宫无星。若我们假定，地支宫位只要有甲级星不一定全作庙旺论，那么无甲\n级星的空宫，全部作陷弱论。因为本宫无甲级星，虽以照入的对宫甲级星曜的作用\n\
    来论，但其力道，究竟比较弱，特别当一个命盘的命身宫都座在空宫时，或是命身\n\n之一为空宫，另一虽座甲级星的宫位，但星曜却陷弱，这种命身星曜作用皆陷弱的\n\
    人，一辈子就比较吃亏。尽管三奇嘉会，限运再好，也将委屈终生。这种现象可以\n说是宫位上的另一种陷弱。\n\n还有一种陷弱，就是紫杀在巳，而命宫若在午宫时，则无主星，那么限运顺行，\n\
    或是命宫在戌无主星，限运逆行，这种命格再好，一辈子也将比较委屈。盖命身宫\n已不甚强，而限运大部分都行空宫（只有商宫有廉破），这就使他因陷弱无力，而会有\n\
    委屈的命运。紫杀在亥，命在子，限运顺行，或命在戌，限运逆行，也由于行运大\n部分是空宫（卯、辰、戌），因此也是一辈子比较委屈不得志。因此我们以为命盘上宫\n\
    位的庙旺利陷问题，不能单指星曜在地支宫位上作用的强弱来论，往往还需顾及诸\n如上述的举例现象。\n\n我们可以列举一个浅显的例子来说明。杨柏因这个年轻人，我们不以在台湾\n\
    只有这么一张命盘（男孤、同时生），但为什么我们没在报纸上，在同一个时间看到有\n类似杨柏因在求学上，表现几乎相似的两个人？台湾这几年来，\n在教育方面几乎达到均等机会的现象，一个小孩只要好学，他一定可以拥有循序受\n\
    \n- 教育的機會。在这种大环境上，杨柏因有，其他的小孩也有，但实际的求学过程和结果，在同一时间裡，却没有第二个杨柏因的出现。\n- 情形所以会如此，我们以为杨柏\n\
    - 因具有他人所没有的特殊条件，尤其来自家庭和父母方面的条件，因为他的父亲杨维哲教授，曾给他孩子作过适期又适当的启蒙和指导，使他的聪颖资优智慧能够充分得到训练、发挥。而其他同命盘的人并没有具备这么好的读书环境，自然在求学的过程表现上，不可能会有相同的结果现象。\n\
    - 好像一颗植物幼苗，从苗木阶段就长\n- 小苗木，长在环境恶劣的土地上，其往后的成长所能比较。\n- \n- 一个人一辈子的遭遇如何？他的荣枯祸福的消长现象如何？我们以为促成的原因太多，命盘上出现的星曜现象，只是一种类型。这种类型，并不能肯定将来必定\n\
    - 如何，若要说他将来一定怎么样，应该还须附有条件。\n- \n- 因此我们以为，在基本上，\n- 命理的分析要如医生诊断病人的病痛一样，一定要知道问命者的一些背景情形，对事项的研判，更必要有它的相关资料。否则论命将无法切入问题所在。\n\
    \n很遗憾的是，古今以来，太多的论命者都不作这种想法，问命者更以为谈命者\n全是天仙下凡，因此在实际论命时，莫不作神仙论断。我们很为中国的命理学悲哀，更为这种不正确的命理之论而误尽天下的问命者，感到无限的遗憾！\n\
    \n因此我们以为，一个命盘格局即使跟杨柏因完全一样的人，但若在求学方面没有如杨柏因的所有大小环境，来作很适当的配合，我们以为，他很难达到杨柏因的成就。尽管命格好，但在一种恶劣的环境裡，他也很难充分地发挥；我们以为，这种环境上的配合不来，就会造成个人的无力感，而这种无力感所造成的限制，也是命理上的一种陷弱。\n\
    \n我们且用台塑企业集团大老板的一席话，来作为环境影响一个人的诠释，也许可以让我们搞命理的人更能体会到，学命理不能老钻在象牙塔内，胡说八道地作着梦语般的瞎话。\n\
    \n王永庆先生曾经在一个公开场合约略地谈到，台塑企业机构所以能有现在的成果，不单是人为的努力因素，假定他的这些企业提早在数十年前经营，或晚数十年才经营，不一定就能如此，假使他的企业发展在东南亚的任何其他国家，而不是在台湾，也不可能会这样。一位被台湾工商企业界喻为企业经营之神王先生，在功\n\
    \n成名就之后，竟然会谕出这种肺腑之言，而不把大功全揽在他一人身上，我们可以从他的谈话中意会出，他的全部事业乃在天时（不早不晚）、地利（良好的工商发达环境）、人和（企业人员的贡献心力）配合之下，才能有成（这些配合对王老闆都是顺旺的条件）。王老板的企业王国如此，一个人的一生会是怎麽样的一个样子？不应该除了命理的條件以外就再无其他因素吧！？这应该是一件很浅显的道理，但我们不了解为什么命理界却不作如此想法。\n\
    \n四化的基本原理\n四化星的作用可以说是斗数论命方法上的一部分，它的重要性跟紫府系列上所\n有的十四颗甲级星一样重要，因此我们以为对四化星的根本赋性与作用不懂的人，\n\
    就谈不上应用，而不值得用四化星，更无法用斗数命盘论命。有人说，四化星是斗\n数的精髓。我们以为四化星的確很重要，可以算是斗数的精髓，但并不意味著懂得\n运用四化，就真正会论命。\n\
    \n由于四化星在作用上特树一格，它与一般星曜不太一样，在古籍版本与各家秘\n传互异，因此四化星的论说与应用方法，几乎如同硝火烟花，五彩缤纷，使人不胜\n撩乱，更使一般学者不知所从。\n\
    \n我们以为，四化是整个斗数论命上的一部分，只是一部分而已，不能说是唯一\n的精华，正如人体很多重要器官中的一个。我们认爲论命必须了解四化星的作用"
  mdcn: "## 星曜基本赋性和作用\n宫位的作用现象，及诸星曜在十二地支宫位的配置组合。视星曜在十二事体兹列举「天机星」的赋性，来说明斗数论命如何藉星曜赋性作用，来解析命盘上的现象\n\
    \n(二) 天机阴木，南斗第三星。乃益母之宿，兄弟之主，化气曰善。\n白色、老年青黄色，中等身材，入庙则肥胖，陷地刑瘦弱，性格多计较精明，且勤劳谨慎，若与天梁同度于身命之地，多为好说喜辩论，有特殊技能之人；心地善良。有宗教之信仰。此星若加煞曜昌曲，主多学多能，如有擎羊冲破\n\
    或加空劫，则孤甚，或是僧道之命。天机遇巨门于旺地，主武赋荣身，若与太阴同度于寅申二地，为探花格，吉多可贵，不然平常，煞多反不吉，此格女命逢之，不论贫贱，多是二度婚娶，不然填房偏房方可偕老，如加煞，有淫行。\n\
    且女命得此星，除子午入庙加吉为佳外，余宫即有吉拱，亦有美中不足，若与巨门同度于酉宫，男命东南生人可吉，西北之人，即或有成就，终必不利，女命更忌，伤夫克子，淫贱无疑，大运逢之，亦作此论断。天机入限，主有限境\n\
    之变动，会天马，有远行异乡之兆，且除子午庙地外，余皆主家务多纷扰，不\n详，且此星会天梁天同，则无论有煞来冲，亦主有高寿，再如行限，如逢机梁\n日月四星会合于旺地，必多增财利，再加吉多，更有贵。天机于疾病，主有肝\n\
    胆之疾，性燥惊恐之类，眼花齿落之象，女命经血亏损，于田宅，主有争执拚\n较之人。\n从上面这一段文字，可以得知，学习斗数的人，必须熟悉每个星曜的基本赋性\n\
    和星曜组合后，综合作用现象。关于这方面，古今以来著述说明已经很多，但有些\n\n## 各种「庙旺利陷」\n古传上列为「法则」的星赋作用和现象，似为近代斗数论命者所忽视或遗漏，因而\n\
    使得命盘上依理推演的结果，竟然和事实不尽符合。我们以为失却了这些原则性的\n运用，将很难解释命理上的很多现象。\n\n斗数星曜，至少在紫微系列和天府系列的诸甲级星上划分为南北斗星，不属南\n\
    北斗星系的太阳和太阴，则列为中天星主。一般只知道，北斗星生早，南斗星生晚\n（或一快一慢，比后上如此），而不知还有刚柔之分。在星曜的基本赋性，北斗主刚，南\n\
    斗主柔（比较上），这种刚柔现象，若用于命、身两宫来论，就作用分明。命身宫以\n兼备南北星为佳。（命宫北斗、身宫南斗，反之亦然。问宫为两星时，以其向北斗星都有为佳），\n\
    如此可收刚柔并济的好处，若命身都为北斗或南斗星，则不是失之过刚，就是失之\n太柔弱。这种刚柔，尤其在一个人的个性脾气上，特别显著（在此暂不提及六吉和六煞\n\
    方面的问题）。\n\n在斗数论命上，一般都以以为格局为首要，而忽视这种南北斗配合上是否刚柔并\n济的问题。实际上，若以经商当老板一事来说，一个成功的大老板，若命、身得不\n\
    到这种南北北斗属性上刚柔相济的配合，将很难谈上有什么太大的成就。失之过刚，\n\n主能当冲锋陷阵的大战将或勇士；失之过柔，亦只能胜任运筹帷幄的幕僚之宾。一个出将入相，武可带兵、文可治国的将相之材，若不刚柔并济，将无以办到。若用于现代企业经营、人材的运用上，刚毅者可以当经理或执行人，柔弱者可当幕僚企划。只有刚柔并济、南北斗兼并的人，才创得了业，才干得起有声有色的董事长（俗以刚论，太阴以柔论，七杀为南斗之刚星）。我们中国有一句老话，一个成功的人，待人必须温和、处事必须有原则，即所谓「外圆内方」的道理。论斗数、若不知道个重要的原则，将何至差之毫厘而失之千里？所论与所断，将与事实南辕北辙，背道而驰。\n\
    \n中国的阴阳五行之说，相传久远。在斗政命理上所采用星曜的阴阳原理，即用\n以表示星曜赋性上的阳刚与阴柔（与南北斗赋性上有些类似，但基本上仍有差别）方面的\n\
    一种特性。阳则为显著、快速、突出，主表面，阴则为不明显、较缓、不很突出，\n主里层。若以同是五行属木的北斗星贪狼，五行阳木，和南斗的天机五行阴木来比\n较（亦只能作比较上的说明与实际应用上的例容说明），那么命宫坐贪狼的人（以庙旺为忌然\n\
    时也），体型较壮硕、五官俊美、动作快捷、性格好动，病属木时，主胆疾（胆为肝\n\n• 223 • 星曜基本阴性和作用\n\n主表，中医论说），天机座命（以府旺无忌然瑜）主人体形长高、五官清秀，较好静。病\n\
    属木时，主肝疾（肝为脏，主视，中医论说）。阴阳之说在星曜的作用上，有如上例。只\n能意会而运用，实在很难言传而说得很清楚。或许就是由于这个原因，使得很多探\n\
    讨斗数命理之学的人，因道理不明而不知如何运用。\n\n阴阳的道理，除了在星曜的赋性上有这些作用现象外，在论及五行的生克制化\n时，那就作用更大。因此我们以为，星曜的这种赋性，特别在南北斗主星及其南北\n\
    斗助星的功能作用上，也占有相当大的重要份围。\n\n在斗数依星曜的组合上，我们常提到星曜的相生与相克。我们可以用火贪和铃\n贪两种由相生而成格的组合来加以说明，并分辨他们的差别。由于火星为南斗助星，\n\
    属阳火，铃星亦为南斗助星，属阴火，这种同为属火而形成的格局（其他条件暂不论），\n如何分辨呢？我们可以从这两个同由阳木的贪狼相生而成的格局加以认定，火贪在\n\
    气势上趋向于一种作用较强烈的现象，并较快发生作用，作用时间较短；而铃贪就\n有些不同，他的作用较温和、较缓慢，作用时间也较长。\n\n再以擎羊（北斗、助星、阳金）受南斗助星、火星（阳火）和铃星（阴火）克制后，\n\
    \n产生制煞为权的比较来说，火羊组合倾向一种强烈、快速而明显的现象，而铃羊组合则又倾向另一种较温和、缓慢、较不明显的作用现象（暂不论其他星曜现象）。两个组合之间，由于阴阳属性的不同作用，就会有这么一些基本上的差异，而这些差异在论命上就产生关键性的差别。\n\
    \n这只是列举两个星曜在阴阳五行上所产生的一种现象，若一旦一个组合有三个星以上时，那就不止于单纯的相生或相克。若五行和阴阳配合得宜，更有由三个以上的星曜，表面看是杀气腾腾的星曜，但实际上由于阴阳五行的配合得当，甚至再因十二地支宫位上的五行因素，使得整组星曜作用化戾气为祥和，或是本就相生的吉相格局，反成大败。正如廉贞、贪狼在巳位为落陷，在亥位却成「绝处逢生」，巨机在卯位为「位居三台之贵」，但移至酉位，就成了「木死水败、纵有财官亦不荣」的凶格。\n\
    \n在古传的典籍里，类似这种引用五行生克制化的章句很多，我们弄不懂，今人学斗数，不知是因为搞不清楚而不晓得应用，或是认为阴阳五行之说太过空洞而弃之不用？一个医生要用中药医病，你必须根据中医的医理才能奏效，同样的，你要\n\
    \n**斗技与人生** ·226·\n\n学好斗数的命理之学，若一直弄不清楚这套理论，你将一辈子也搞不通，甚至走入死胡同而永远不知道为什么老是「此路不通」？\n\
    \n## 各种「庙旺利陷」\n宫位，显出作用上力道差别的现象？也就是所谓庙旺利陷的问题？关于这个问题，古今斗数典籍上各有不同的解释，有些似乎很有道理，但有些好像也是似通非通。甚至有人根本否定星曜在十二地支宫位，存在着所谓庙旺利陷的现象，而完全根据星曜在三方四正和夹辅宫位上的组合，以及经过「四化」之后，才能定该星曜于所在宫位上的强弱现象。这派不赞成传统上星曜在十二地支的庙旺利陷的论法，我们认为只对了一半，既不全对，也不全错。\n\
    \n紫微斗数既然设定这些星曜，并藉它的个别特有赋性来推演命理，我们不管它究竟是如假包换的天体裡真有这些星曜或仅是假借而用的符号，但它既然有他的赋性作用，我们似乎可以把它看成带有「生命」的一种物体。我们从大自然景象中，\n\
    \n斗数与人生 · 228 ·\n\n可以观察得知，绝大部份有生命的物体，如植物或动物，几乎都生长在属于他适合生存的某特定空间。寒带地区有寒带地区的林木，热带地区有热带地区的林木，动\n\
    物更有寒热带之分。不同地区有不同的生态环境，这对有生命的物体，不论是动植物，都会造成不同的影响，道理非常明显。当然我们也可以在热带地区种植寒带的\n林木，和养寒带地区的动物，但无论如何，这些寒带也区内林木和动物，一旦移到\n\
    热带地区以后，就很难长得很好。我们已经知道，动植物所以会如此，完全是由寒\n热不同地区动植物，在不同地区裡有某些生理结构上的根本差异，因此才会有这种\n比较难于适应的现象。\n\
    \n若我们把星曜视如这些具有生命的动植物，它们的生理作用现象，自然也会因\n空间的差别，而显出他们生理作用上的差异性。我们以为，斗数星曜在十二地支宫\n位上的庙旺利陷的道理，应该是相通于这个理由。至于斗数命盘所应用的众多星曜，\n\
    在各地支宫位上，每个单独星曜的庙旺利陷现象的认识，应该是经历千年经验上的\n累积，否则，我们只能说是祖师爷陈希夷道长入禅定后，达到天人合一的境界时，\n所悟出来的结果。\n\
    \n我们知道，星曜在十二地支宫位的作用如何，并不只限于单独星曜庙旺利陷的作用，正如我们上述，它还会和三方四正所会合的星曜，具有相当密切的关系，不管他是吉格或凶格。但是我们从经验上得知，若我们舍弃主体宫位（十二地支或十二宫）形成的吉或凶象，究竟会有什么样的程度差别，这种斗数论命的法则，我们以为谁都不能忽视或否认。\n\
    \n其实斗数星曜不只在十二地支宫位有其庙旺利陷的现象，甚至在十二事体宫位上，也有其吉凶作用的差别。以古传斗数赋文为例，「天机天梁，擎羊会，早主刑克晚见孤」的这一个格局，明白地指出这个格局在六亲方面的一种凶象，因此这个格局要应到本命宫或是六亲宫位上，才比较会显出六亲上的刑克，假使它出现在非六亲宫位上，我们或许可以认定它也是一个不很好的格局，但它应该不是六亲上的刑克问题。因此我们若从另一个观点来分辨，星曜及其组合的吉凶问题，天机天梁尽管是在庙旺之地，一旦它入了命宫或六亲宫，又与擎羊会合，对六亲的刑克依然存在，并不能说因为庙旺之地就可以刑克全免。我们只能说，也许因有吉救，可以降\n\
    \n低刑克的程度，而当落陷而又无吉救时，它的刑克会加重。因此我们以为，在斗数\n论命裡，我们固然要重视星曜在十二地支宫的旺弱外（即庙旺利陷），同时也应该重视\n\
    它在十二事体宫位的作用现象。\n\n前面提到星曜在十二地支宫位和十二事体宫位所发挥的作用，除了因地支宫位\n的差别以外，还有因事体宫位而异。其实星曜不管在地支宫位或事体宫位，在论命\n\
    时，都必须根据每个宫位的三方四正和夹辅宫位的组合结构来研判，不能作单独一\n颗星和一宫位的独立论法。前述的举例，只是用以说明星曜的赋性作用，有这么一\n些现象，至于三方四正和夹辅宫位的关系，在此暂不论述。\n\
    \n若我们再另从命盘只依紫府系列的甲级星，所排出的十二个命盘（实际上其中六\n个是另外六个命盘的相反排列），我们约略可以分为：紫府在寅申，十二地支宫每宫都有\n\
    甲级星；紫微七杀同临巳、亥宫，则有四个地支是空无星曜；其他八个命盘，必有\n二地支宫无星。若我们假定，地支宫位只要有甲级星不一定全作庙旺论，那么无甲\n级星的空宫，全部作陷弱论。因为本宫无甲级星，虽以照入的对宫甲级星曜的作用\n\
    来论，但其力道，究竟比较弱，特别当一个命盘的命身宫都座在空宫时，或是命身\n\n之一为空宫，另一虽座甲级星的宫位，但星曜却陷弱，这种命身星曜作用皆陷弱的\n\
    人，一辈子就比较吃亏。尽管三奇嘉会，限运再好，也将委屈终生。这种现象可以\n说是宫位上的另一种陷弱。\n\n还有一种陷弱，就是紫杀在巳，而命宫若在午宫时，则无主星，那么限运顺行，\n\
    或是命宫在戌无主星，限运逆行，这种命格再好，一辈子也将比较委屈。盖命身宫\n已不甚强，而限运大部分都行空宫（只有商宫有廉破），这就使他因陷弱无力，而会有\n\
    委屈的命运。紫杀在亥，命在子，限运顺行，或命在戌，限运逆行，也由于行运大\n部分是空宫（卯、辰、戌），因此也是一辈子比较委屈不得志。因此我们以为命盘上宫\n\
    位的庙旺利陷问题，不能单指星曜在地支宫位上作用的强弱来论，往往还需顾及诸\n如上述的举例现象。\n\n我们可以列举一个浅显的例子来说明。杨柏因这个年轻人，我们不以在台湾\n\
    只有这么一张命盘（男孤、同时生），但为什么我们没在报纸上，在同一个时间看到有\n类似杨柏因在求学上，表现几乎相似的两个人？台湾这几年来，\n在教育方面几乎达到均等机会的现象，一个小孩只要好学，他一定可以拥有循序受\n\
    \n- 教育的機會。在这种大环境上，杨柏因有，其他的小孩也有，但实际的求学过程和结果，在同一时间裡，却没有第二个杨柏因的出现。\n- 情形所以会如此，我们以为杨柏\n\
    - 因具有他人所没有的特殊条件，尤其来自家庭和父母方面的条件，因为他的父亲杨维哲教授，曾给他孩子作过适期又适当的启蒙和指导，使他的聪颖资优智慧能够充分得到训练、发挥。而其他同命盘的人并没有具备这么好的读书环境，自然在求学的过程表现上，不可能会有相同的结果现象。\n\
    - 好像一颗植物幼苗，从苗木阶段就长\n- 小苗木，长在环境恶劣的土地上，其往后的成长所能比较。\n- \n- 一个人一辈子的遭遇如何？他的荣枯祸福的消长现象如何？我们以为促成的原因太多，命盘上出现的星曜现象，只是一种类型。这种类型，并不能肯定将来必定\n\
    - 如何，若要说他将来一定怎么样，应该还须附有条件。\n- \n- 因此我们以为，在基本上，\n- 命理的分析要如医生诊断病人的病痛一样，一定要知道问命者的一些背景情形，对事项的研判，更必要有它的相关资料。否则论命将无法切入问题所在。\n\
    \n很遗憾的是，古今以来，太多的论命者都不作这种想法，问命者更以为谈命者\n全是天仙下凡，因此在实际论命时，莫不作神仙论断。我们很为中国的命理学悲哀，更为这种不正确的命理之论而误尽天下的问命者，感到无限的遗憾！\n\
    \n因此我们以为，一个命盘格局即使跟杨柏因完全一样的人，但若在求学方面没有如杨柏因的所有大小环境，来作很适当的配合，我们以为，他很难达到杨柏因的成就。尽管命格好，但在一种恶劣的环境裡，他也很难充分地发挥；我们以为，这种环境上的配合不来，就会造成个人的无力感，而这种无力感所造成的限制，也是命理上的一种陷弱。\n\
    \n我们且用台塑企业集团大老板的一席话，来作为环境影响一个人的诠释，也许可以让我们搞命理的人更能体会到，学命理不能老钻在象牙塔内，胡说八道地作着梦语般的瞎话。\n\
    \n王永庆先生曾经在一个公开场合约略地谈到，台塑企业机构所以能有现在的成果，不单是人为的努力因素，假定他的这些企业提早在数十年前经营，或晚数十年才经营，不一定就能如此，假使他的企业发展在东南亚的任何其他国家，而不是在台湾，也不可能会这样。一位被台湾工商企业界喻为企业经营之神王先生，在功\n\
    \n成名就之后，竟然会谕出这种肺腑之言，而不把大功全揽在他一人身上，我们可以从他的谈话中意会出，他的全部事业乃在天时（不早不晚）、地利（良好的工商发达环境）、人和（企业人员的贡献心力）配合之下，才能有成（这些配合对王老闆都是顺旺的条件）。王老板的企业王国如此，一个人的一生会是怎麽样的一个样子？不应该除了命理的條件以外就再无其他因素吧！？这应该是一件很浅显的道理，但我们不了解为什么命理界却不作如此想法。\n\
    \n四化的基本原理\n四化星的作用可以说是斗数论命方法上的一部分，它的重要性跟紫府系列上所\n有的十四颗甲级星一样重要，因此我们以为对四化星的根本赋性与作用不懂的人，\n\
    就谈不上应用，而不值得用四化星，更无法用斗数命盘论命。有人说，四化星是斗\n数的精髓。我们以为四化星的確很重要，可以算是斗数的精髓，但并不意味著懂得\n运用四化，就真正会论命。\n\
    \n由于四化星在作用上特树一格，它与一般星曜不太一样，在古籍版本与各家秘\n传互异，因此四化星的论说与应用方法，几乎如同硝火烟花，五彩缤纷，使人不胜\n撩乱，更使一般学者不知所从。\n\
    \n我们以为，四化是整个斗数论命上的一部分，只是一部分而已，不能说是唯一\n的精华，正如人体很多重要器官中的一个。我们认爲论命必须了解四化星的作用"
