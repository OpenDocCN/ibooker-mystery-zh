    # # 影響命理的因素

    類型、背景和條件


    斗數命盤將人生大事分成十二類，配置十二地支宮，經由各宮位星曜的配置組合形成的作用，來推論各個事項宮位星曜作用所象徵的現象。在單獨某一個宮位時，大體上是以該宮位爲主題來論事。比如談官祿宮，就以官祿宮這個宮位所牽引三方四正星曜的現象來推論，但基本上，任何一個主體宮位，不能僅憑這個宮位來論，還須配合先天的命格（命、身宮所形成的格局），作爲基礎來衡量。


    理論上，一個命格大的人，他的官祿宮廟旺，可以據以推論，他在官祿宮方面，必有相當好的發揮，這好比兩個營業額大小不同的公司，大公司年營業額十億美元，小公司營業額一億美元，年終結算結果，純利都是營業額的6%，兩個公司的營業'
  - '[PAGE 209]


    • 209 • 影究命理的因系


    純利百分點完全相似（以一般企業經營來說，這種純利百分率已經相當不錯），但在絕對的淨利金額上，大公司高在六千萬美元，而小公司却只有六百萬美元。


    儘管兩個規模不同的公司，在各自的經營上都認爲得利很理想，但公司規模太小，當然關係到他的營業額（經營效率假定都得到充分發揮），營業額又影響到絕對純利金額的多少，這是很淺顯並很容易理解的道理。我們可以把命格大比之於大公司，命格小比之於小公司，用以理解官祿宮的作用如何，必須以命格來衡量的道理。


    若再以事業經營來比喻斗數官祿宮的作用現象，來推論一個公司經營的成果，還需牽涉到該公司經營運作的某些關鍵問題。比如，產品的良劣、產品行銷量的大小、難易、市場形象、產品的獲利與呆帳情形、財務結構的健全與資金融通調度、人員的能力發揮，我們將可依據命盤上的官祿宮、遷移宮、財帛宮、福德宮、田宅宮、僕役宮，個別分析推演，進而作綜合性的判斷。


    一個公司經營的成效，往往個個事項部需兼顧，一旦有一個環節發生了問題而不得解決，往往使這個公司的經營功虧一簣，斗數運用到企業經營的推演與論斷方面，也必須合參到這些事體，而利用各相關宮位的現象來綜合判斷，並不是單憑命'
  - '[PAGE 210]


    - 格大、官祿宮旺，就可以在商場上鴻圖大展、財源滾滾。前面曾提到，大企業公司的高級主管，既然職位高，薪水一定優厚，諒必財官兩旺，但實際上，他們不一定自已就能當得了老板一樣。因此在斗數上的論命，就不能光看官祿宮如何就推論他的事業也必須如何。


    在整個斗數的論命，任何一個單項宮位狀況的論斷，幾乎都不能光依那一個宮位的現象來單獨推論。因為斗數命盤是個完整性個體，它好像一個人，一個完整的人，它不但有藏在體內的各种臟腑器官，還有長在體外的肢體五官，雖然各具不同功能，但卻也缺不得任何一樣，若有一個部位或一個器官欠缺，不但只是那個失缺的部位不能作用，也將必定連帶影響到其他部位的正常功能。這種現象不單人如此，任何高等的動植物，無不有其正常器官（部份），以發揮他正常的生理功能。


    一個斗數命盤既然是用以談論人生一輩子可能遭遇到的所有人、事、物的現象，不該只是一張無生命的命盤。佛家說「一沙一世界」中醫更把人體看成一個陰陽調和、五行平衡的宇宙，因此我們若把斗數命盤，看成代表一個屬於個人的宇宙的縮影，也未嘗不可。'
  - '[PAGE 211]


    一個人的行為，除了因他個別條件而具有個別現象以外，還帶有時間性和空間性的差異，由時間性所特有的社會環境的思想、習俗、典章制度差異，空間上自然環境的差別，往往都會對人生產生極大的影響和變化，因此以斗數祿命用來推論一個人的命理時，除了個別的條件因素和意願外，必須考慮到人的時代社會與所處自然環境。


    以婚姻來說，在中國歷代的婚姻律法，就不盡一致。當老爺爺的時代，老爺爺們只要能買得起，他可以高興娶幾個老婆就娶幾個老婆，只要犯上七出（據《辭海》記載，古禮出妻之七出，有：無子、淫佚、不孝舅姑、口舌、盜竊、妬忌、惡疾七項。）的任何一條禁令，就會被休妻。但現在你我卻可不能如此，也許有老爺爺時代所沒有的婚前戀愛，但一旦結婚，就容不得你在婚姻上不守一夫一妻制的法定制度，你敢亂來，一旦碰到悍妻，就會讓你吃不了兜著走，有時就算你有二心，當你想到必須與下堂妾（夫）平分財產或擔負贍養債時，你就會不敢輕舉妄動，不敢娶小或休妻。但這個時代的婚姻制度或現象，並不像我們一樣，在信仰回教的國家裡，他們却有另一套婚姻的習俗和制度。他們可以合法地娶得四個太太，高興的話可能更


    們却有另一套婚姻的習俗和制度。他們可以合法地娶得四個太太，高興的話可能更'
- md: '多，不但別個人家不會有閒言，就是元配太太也阻擋不了。高雄有位家世顯赫的望族，老先生現在除了元配夫人以外，還擁有四個妾，好像一把茶壺配了五個茶杯（民初大儒辜鴻銘曾說過「一把茶壺配六個茶杯」的話），倒也能維持得和諧相處。人間事就是這麼光怪陸離，好像無論如何很難有個必定的原則。


    因此在斗數論命上，我們只能說，這個人人在斗數命盤上顯示某一種類型的特性，而這個人在他一輩子裡，又如何去因應這種類型，然後我們才可能從這種類型現象，加上因應的條件去探討他，去研判他可能造成某種現象的結果。


    在斗數命理的推演上，我們不但要考慮到那個命盤所具備的個別條件，而且還要考慮到他的社會時代背景，即使如此，也並不意味着你就可以懂得推命，並能向問命者提供適中有用的建議。


    你可知道，一個醫生在他七年的醫學院學生時期，他要讀多少科目？除去共同科目不說，單就專業上的必修學分就高到二三○學分以上！一個醫學院剛畢業的年輕醫生，他仍須經過三、五年的臨床實習，才可能成爲一個稱職的醫生；至於功成名就的醫生，多半已經是四十歲以後的事。命理的推演雖然不像醫生療治身體上的病痛，但就以人間榮枯禍福所牽涉到的問題之多之雜，恐怕也不見得比醫生醫病來得容易簡單。


    因此我們以爲，關於牽涉到人生一切層面的所有知識，必須廣泛，一個論命者可知道一個公司，以當前所擁有的條件及經營方式，三五年內的經營結果將如何？值得生產和工廠管理嗎？值得行銷管理嗎？值得財務管理和分析嗎？值得人事制度和管理嗎？懂得稅制法令嗎？如果在這些方面一無概念，在命理概念上只有「吉」和「凶」兩個正反的兩極答案，那將如何去告訴人家，他的事業已出現或將出現什麼樣的問題？應該如何去解決或防患？若多少有些認識，即使不很在行，但至少可以提醒問命者，將發生問題的部份，去請敦相關專家，要不然若只有「吉」或「凶」的答案，不但論命的人糊塗，問命者更會覺得茫然而不知所從。


    ## 命、運不符—談一個農夫的命格


    一九八六年（丙戌）中，有位自認對斗數命理頗有心得的年輕朋友和幾位也略有涉及的友人到舍下聊天，彼此交換斗數命理上的看法。由於這些朋友深知我對斗數命理一直採取一種學術研究的開放態度，因此一有心得的時候，很樂得光臨舍下品茶、談談他們新發現的高見，我也爲足不出戶而能聽得一些命理奇聞感到高興。


    由於這位年輕朋友對他所學的斗數，自負到幾乎旁若無人的地步，往往在口沫橫飛、高談闊論的時候，會令不懂命理的人認爲這個年不及卅的年輕人，命理的修習已到了道通天地的境界。我爲了挫挫他的銳氣，希望他別自信太滿，以免走火入魔，而妨害了他在修習斗數命理上的正確發展，因此在書櫃上，找出了這個己卯年（一九三九）一月十四日子時生的男命斗數盤來，要他針對這個命例在命格及財、官三項上的得失發表高見。


