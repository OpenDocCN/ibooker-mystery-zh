- md: '## 財帛宮


    從人類求生存演變進化過程來看，首先是自給自足，接著才是以物易物、交換有無。再接著才是以某種物體來代替某些事物價值的償付。這個能代表某事物品價值的东西就是金錢。

    若我們套用經濟學上對貨幣（金銀）的三種主要功能的認定：


    (一) 交換的媒介 (二) 價值的標準 (三) 價值的儲藏，就可以知道金錢的重要。

    人一旦過著群居的社會生活、一輩子艱苦勞碌，就不能排斥金錢的謀取。因為沒錢，究竟就談不上最起碼的柴米油鹽的基本生活。這正是無財則難以安身立命的道理。


    因此，財帛之事就變成斗數命理探討上的重要宮位。

    我們姑且不論古傳斗數在「財帛」這一方面的推演法則如何，但我們首先必須要搞清楚：一財帛宮這一個宮位在命盤上究竟扮演者一種怎樣的功能。太多的斗數論命者，一直把這個宮位的功能混淆不清，以為有錢無錢、賺錢虧錢，全部都應在這


    個宮位上，幾乎把事關金錢（財帛）上的一切有無和功過，一概賴在這個財帛宮上。


    返種稻麥不分、魚目混珠的錯誤論命方法和理念，使得論命的真實性常常和現實格格不入，亦使論命的層次每況愈下。


    在基本的斗數論命法則上，我們以爲，財帛宮若僅針對金錢的得失而言，它應該是指關於金錢來源上的有關現象。贏得更實際一些，能不能賺錢，賺錢的多少和離易，以及在賺錢乙享可能產生的性質和變化，才是財帛宮的真正功能。


    一個人現在或今後可能賺很多錢，是財帛宮的問題，一個人現在手頭很拮据，帛宮不好的原因，因爲他很可能有很好的收入，但老是存不了錢。這事牽涉的範圍很廣，但絕不能單以財帛一宮來論斷。若以偏錢一享來說，一個人在作生意時，由於貨帳收不到被倒帳而所受的金錢損失，跟他把錢出借收不回，導致血本無歸的損失，雖然同樣都是金錢上的損失，但是造成損失的原因和性質却完全兩樣。因此在斗敗論命上，我們可以把前者貨帳方面的損失，列入財帛宮，但後者借貸方面的失財，却不能一視同論爲財帛宮的因素。


    在斗數論命上，由於理念的不清，因此常有這種雞鴨同籠的錯誤觀念，以爲只要屬於金錢損失，就都是財帛宮的問題。斗數論命像這種理念不清之處太多了！我們又怎能渴求這門學術，能發揮出它的實用功能呢？


    當人類懂得使用某一種東西代表某一定的價值（即錢幣）之後，人們不但爲著其基本生活而謀求財利，同時也爲著更多更大的金錢而盤算著如何去賺取。這就是自古以來所謂的生財之道，也就是當今講求的理財方式或方法。生財亦好，理財也罷，古今以來，謀求財利之道，已經產生太大的變化，不僅目的不同，方法也有差異。


    古人多爲生活而賺取蠅頭小利，今人固然亦爲生活，但已不再單純只爲生活，求財理財爲的是更多更大的目標。


    我們千萬不要以爲只是單純在理財工具上，由算盤變成電子計算機、電腦，這些個完全只屬文明利器的問題，因爲在這些文明利器之下，的確還藏有太多的大學問。一個作生意的大老板，若就今年生意上可能的得失去請教一位算命仙，算命仙固然可以依據命理上的道理，預卜可能的吉凶，但也只能得到吉凶的結果答案。若是去問一個深諳企業管理與理財之道的專家，他必先從這個公司目前經營的資料上加以了解，不只產品在市場上的行銷評估，同時對公司經營管理制度、財務結構，甚至公司營運的「損益平衡」分析……等等維繫著公司賺錢與否的關鍵問題，都必須深入研究，然後逐項提出分析和研判，最後才擬出具體因應改革的意見，提供給這個大老板作爲經營上的參考。絕不是單憑一句上上大吉就擔保能財源滾滾，或是下下大凶就關門倒閉，而毫無挽回餘地。我們絕不相信，任何一位再高明的算命先生，能一無所誤地逐一斷出大老闆王永慶先生名下所有企業單位中，今年有那個公司會賺？爲什麼賺？那個公司虧？爲什麼虧？但我相信，到了年底，在王大老闆的腦海裡，對他旗下的所有公司，盡管在還沒見到任何公司的結算報告以前（一般都在次年上半年前才結算清楚），那一個公司可能盈虧及原因，應該都相當了然。


    我們不以爲王老闆他有神機妙算的神通，我們只知道他擁有很健全的事業管理機構，網羅各種學有專精的企業管理專家，隨時爲他事業王國下的每一個企業單位，懾精寶神和獻策。一個算命仙仔，若只死纏著殘缺的古祿命法則，而不知企業經營爲何物，他到底何德何能，竟能根據一張死命盤，甚至單憑財帛宮的星曜，就去斷人家今年賺了多少錢、虧了多少本？我們以爲，還是省了吧，因爲誰聰了，誰就倒


    ## 財來財去

    [命例]


    斗數十二宮各有所主，財帛宮主生財理財之道。一個人除非能得祖蔭，一出生就擁有家財萬貫，並能守成，則一辈子食用無缺，可以不必為財來財去而擔憂煩惱。


    但是這個世界絕大多數的人，一旦獨自謀生後，必須爲五斗米而奔波勞碌，上焉者財源滾滾，好像財利跟他特別有緣，有求必應，呼之即來。下焉者，拚著老命絞盡腦汁，但財利似乎與他緣薄，愈是追它，它愈跑得比你更快更遠，能夠讓你逮到，算是你的幸運。更糟的是還有一種人，像過路財神，賺錢生財之道很積極，也很有辦法，但是往往賺虧之間形成一種兩極化的現象，有時赚的比虧的多還好，但時運不濟時，就變成虧大於賺，到頭來在追求財利上，變成一場空。


    這個命例是我公司屬下的一個經銷商。十多年來，歷盡賺錢和虧錢的美測變幻，同樣的求財和理財方式，但在不同的限運裡，却出現截然兩樣的財利赚虧現象。我作生意，货报变成呆帐，把现出借生息，被倒帐，都是破财，但这两段的破财原因有别，因此斗数分析方法亦异，这是我们的看法，阁下高见如何？


    ## 命座武、相、右弼、文昌在寅位，是個祿權嘉會的紫府相朝垣格局。紫微廟旺入午位，為身宮所在地，三方左右昌曲嘉會，無煞，可主一生財官順利無碍。根據星曜賦性，武曲司財帛之主，又名將星，天相專司衣食，化氣曰印，爲官祿之主宰；天府爲財帛之主宰，號令星；廉貞司品秩與權令，化氣曰囚。從命宮和財帛星曜組合上，大部份星曜的賦性都對財帛一項具有相當突顯的作用，這種命格一旦在他後天行運能得充分發揮，在求財方面，將會有比較強旺的傾向。


    不過，由於財帛宮（戌）爲火鈴雙煞所夾，亥位的鈴星和太陰合爲十惡，酉位的火羊爲兩大凶星的相剋（也是剋制），如此五行生剋制化的道理，酉亥對戌位還成火來生土的作用，因此使此命格，形成生財與理財的積極和正面的作用，特別常有吉化來引動時，更爲明顯。但如遇酉戌亥三宮任一宮爲忌煞來引動時，就造成任何求財方式，都會造成負面反效果的虧累。


    這位黃先生於庚辰限初期加入本公司，爲本公司某一縣所有產品獨家經銷商。


    由於經營得法，在這大限間，除銷售本公司產品外，亦作純投資（人不參與經營）某一種化工原料產品的生產生意，結果兩邊都發了財，使他在年紀輕輕的三十多歲，由兩袖清風而變成住有富麗洋房，出入有富豪牌洋汽車代步。


    我們在斗敗命盤上發現到，在庚辰大限時，限運正是先天福德宮（限運好時，主財利的興發），先天的財帛宮（戊），得太陽雙化祿在酉宮的吉化引動，使酉宮和亥宮的兩組星曜吉輔戌宮，造成先天吉象的正面凸顯。後天的財帛宮子位，由於貪狼、文曲（不見然，有富貴那粒豎打正著的正面有利作用），及左輔會由申而來的破軍、祿存，這種先後天財帛宮的吉象，使他對生財發生濃厚的意念。人往往在福運當頭時，都會福至心靈，因此原爲一個不甚起眼的市場，竟會在他得心應手的經營下漸入佳境。


    任何有錢人都不願投資經營的某種廉價的化工原料生產生意，亦都讓他賺上不少錢。


    當然在這個大限時，並不是只賺而不虧，生意上的呆帳有時亦難免，由於有天同化忌在丑宮，當乙卯年太陰化忌時，使子宮爲雙忌所夾，當庚申（一九八〇）年爲天同化雙忌來會入酉宮（忌忌力並強大），亦激發火星的凶性，使與亥宮的鈴星產生互動作用，因此在這兩年，就曾經發生經銷本公司貨品上的貨帳無法收取，而變成呆帳損失。只是在連續幾年的大賺其錢下，偶而一次的呆帳損失也造不成致命傷。作生意若只賺不賠，天下所有的生意人，豈不人人發財，而絕無倒閉跑路的事？


    但大限行入辛巳位後，除了先前投資的化工原料產品，已見好即收外，原有地區獨家販賣的產品，還繼續擴大經營。本來對一個作買作業的商人，歷經十年以上的經驗後，經驗會更老到，生意經也會越來越精，但沒想到，他老弟卻越混越回去。打從三十五歲（一九八四年）開始，每年都聽到他被倒帳的事，甚至倒帳的金額，一年比一年大，簡直使他窮於應付。因此今年（丁卯），又再度被一位十來年的老客戶宣佈倒閉，經由律師宣佈處理債務後，他實在應付不過來，而找上公司的營業主管，要求通融支援，協助渡過被倒帳的難關。


    辛巳大限，巨門化祿、太陽化權、文昌化科、文昌化忌，對先後天財帛宮（戌和亥）來說，和庚辰大限形成相當程度的變化。以吉凶兩極化的簡要說明，先天財帛宮（戌原有火鈴夾制（魚凶忌煞引動時，爲火鈴生成位），由於文昌化忌（也是先天命宮）的沖動，使戌位受到沖擊，造成火鈴夾制的凶性發作。大限財宮（亥）成爲天同化忌和巨門化祿的忌祿冲（吉凶混雜），此宮又爲寅和子兩宮的夾輔，吉相是左右輔、昌曲輔，


    ## 財帛宮

    • 127 •


    凶相則是文昌化忌，使文昌化忌和貪狼化忌成爲一種「昌貪」凶局。因此在辛巳大限的先後天財帛宮上，呈現一種吉凶參半的不穩狀況，不再如庚辰大限時吉象大於凶象（指先級天財帛宮）。因此限運進入辛巳宮後，還再由流年引動的忌煞作用，造成年年被倒帳的風波。


    甲子年（一九八四）三十五歲入大限辛巳，此年廉貞化祿、太陽化忌，寅宮成爲雙祿輔祿（甲年流祿在寅），也變成雙忌夾忌，這年在生意上該賺到的都賺到了，不該有的倒帳也都發生，因爲未宮和酉宮都沒主星，經由卯、丑兩宮忌祿照入的作用，使流年財宮（申）形成雙祿輔祿，也有雙忌所夾，又受文昌化忌的沖害，那一年賺虧之間，幾乎兩相抵銷。據所知，年終結算多少賠了一些。乙丑年（一九八五），天機化祿、太陰化忌，生意繼續作，利潤固定，生意作大自然有賺頭，只是擔當不起呆帳的再發生，否則又會造成一年的辛苦將成白費。由於流年入後天大限的財帛宮，這時正是昌貪所夾的凶宮，太陰化忌和火鈴造成十惡的格局，還和兩宮的火星狼狽爲奸地夾殺戌位，流年同時引動先天財宮的凶象。流年財帛酉宮有火星羊刃兩煞虎視眈眈，諸凡先天、大限和流年的財帛，皆形成不穩的凶相，因此今年又再度發生呆帳，又平白的辛苦一年，得失相抵之後，帳目上還是浮上赤字。


    丙寅年（一九八六）三十七歲，天同由化忌轉化祿，經銷業務在順利中拓展市場，營業蒸蒸日上，樂以爲今年大概否極泰來，利潤將隨生意的擴大而大有賺頭，沒想到下半年快近年終結帳時，又來了幾次大倒帳。幾個來往多年的大客戶大跳其票，使手中持有的未兌現支票，形同廢紙，一年的努力又告泡湯，年終結算的赤字更大。


    流年坐大限的文昌化忌，流年財宮廉貞又化忌，再由所夾制的火鈴的加重陣虐，若再加上流羊由午宮會入，更成了「刑囚夾印」的大凶格。這種流年財帛的大凶畢集，有如冰上加霜，生意上的呆帳不但金額大，而且不只一筆（一個客戶），兩三個客戶原以爲信用可靠的，全部出了問題，一概週轉不靈。這種連續三年的凶象，都發生在同一事項宮裡，所引起的爲害，成爲對該宮位的致命打擊。


    丁卯年（一九八七）三十八歲，由於在連受三年生意貨款呆帳的暗累，已到不勝負擔地步，因此這一年作起生意格外小心，抱著少呆帳，才有得賺的穩當作法。但人算不如天算，到了下半年度，恐懼中的倒楣事又再度發生，一個十年左右的大客戶，又再度宣告破產，清理債務。在老黃手上未兌現的支票和未結算的貨帳，金額之大，使他變成清理債務時所有債權人的爐主（台灣俗稱廟會時的主事者），使他在週轉成大問題之下，只好拜託總公司的主管經理懇求公司能給通融支援以解倒帳所引起的危機。丁年使太陰化祿、巨門化忌特別這個大限財帛宮的巨門由大限的化祿轉成化忌，大限財帛宮的丑位形成二個化忌，使它的破壞力道如同雷霆萬鈞之勢而不是流年太陽、太陰日月並明的雙祿交馳所能補救或力敵。


    他在電話中用一種極其無奈又喪氣的語氣跟我說他究竟要到幾歲以後才能免去厄運？往日那種英挺風發所充滿的十足信心似乎都已不復存在人生果真是十年河東、十年河西如同滄海桑田般難能逆料？


    ## 疾厄宮


    人吃五穀，怎能不生病？這是我在聽「易與中醫」講座時，有一位老夫子開宗明義，第一堂上課時講的第一句話，至今記憶猶新。儘管尖端的太空科技已經能把人送進太空遨遊，醫療科技也發展到器官的移植已易如機器的更換零件，可以使人延年益壽，但至今仍然不能醫好人們的所有病痛，大概正是老夫子所謂「人吃五穀焉能不生病」的道理。


    其實人的病痛不但名堂多，而且致病的原因也不少，不只限於吃五穀才會生病，若以一言概括，也許只有中醫學上所說的「內因外感」而致病，可以作籠統的說明。生老病死是人生過程的常態規則，一個人之生，誰也瞞不上要與否，老、死也是所有生命的無奈趨勢和終結。一個人所能有所企求與想避免的，唯有健康和不生病。一個人一旦宮上了罹天大症，就算把天底下的榮華富貴全歸給他，也無福享受。因此，也許一個人不敢奢求大富和大貴，但祈求身體的健康，應該是很自然而且是很普遍的正常現象。


    根據中西醫的醫學道理，關係到個人健康的因素，範圍至廣，從無形的先天遺傳影響到生理體質、心理和精神狀況，到有形的後天環境條件、環境差異和不利的種種致病因素，個人體骸上受到的創傷，以及在心理或精神上的某些特殊遭遇，種種不勝枚舉的理由，都會影響到偏廢或者是立即性的病痛。


    從古傳的斗數法則上，我們也許可以從命盤上，多少看出一個人在健康上的某一種大概情況，但我們決不以爲，單憑古傳的命理法則，就可以如醫生經由醫理診斷而出的病症詳情。套用了無居士的一句話，「否則同樣命盤的人（同時辰生），都會在同時數裡，生同樣的毛病，并在同樣的年齡來主厄召」。若果真是這個樣子，那麼大學堂的醫學學生，就算教育部沒有硬性規定，他們也必定會主動去選修這門神通廣大，勝過任何醫理和診察儀器的命理之學。


    實際上，並不是如此，這正是我們所以爲這門學術叫屈和悲哀的原因。


    我們懷疑，一個論命者既不諳中醫的醫理之道，也不通西醫的病理之學，甚至對人體器官機能 和結構一無所知的算命先生，如何憑一張命盤去鐵口直斷一個人的健康情況，以及致病的根源和病徵？更別說在病痛時，如何去提供趨吉避凶、解除病痛之苦的建議。


    因此我們以爲一個論命者，若要根據命盤依理推論一個人的健康問題，除了熟悉命理推演的理則以外，更應該著手於醫理上的認識。也許不必像醫生那樣的精通醫理之道，但是總該吸收一些醫理上的基本知識，這樣一來，面對命盤談論疾厄宮的問題時，才不會腑臟不分、經絡不明，把消化系統上的各種病變，如腐醫治病似的，一概服以「張國周強胃散」，把女人因爲經期不調不順，以致難於受胎懷孕，但尚可療治的毛病，竟然鐵口直斷地說成因爲命帶孤剋、子女宮忌煞交加，所以無法生育，因而誤了人家的醫療時機。


    如果論命竟然是這樣草率，那麼千萬要記得，由於信口雌黃的一句話，因而造成人家夫婦的婚姻失和，或是由於未能及時療治而不能生育，使人斷了子嗣，那麼這個算命仙仔所造的孽障就太大了！若真有善惡因果的輪迴報應，這個孽，必定會回報在你的子孫身上或是你的再世來生，也會叫你的宗嗣斷了香煙。'
  mdcn: '## 財帛宮


    從人類求生存演變進化過程來看，首先是自給自足，接著才是以物易物、交換有無。再接著才是以某種物體來代替某些事物價值的償付。這個能代表某事物品價值的东西就是金錢。

    若我們套用經濟學上對貨幣（金銀）的三種主要功能的認定：


    (一) 交換的媒介 (二) 價值的標準 (三) 價值的儲藏，就可以知道金錢的重要。

    人一旦過著群居的社會生活、一輩子艱苦勞碌，就不能排斥金錢的謀取。因為沒錢，究竟就談不上最起碼的柴米油鹽的基本生活。這正是無財則難以安身立命的道理。


    因此，財帛之事就變成斗數命理探討上的重要宮位。

    我們姑且不論古傳斗數在「財帛」這一方面的推演法則如何，但我們首先必須要搞清楚：一財帛宮這一個宮位在命盤上究竟扮演者一種怎樣的功能。太多的斗數論命者，一直把這個宮位的功能混淆不清，以為有錢無錢、賺錢虧錢，全部都應在這


    個宮位上，幾乎把事關金錢（財帛）上的一切有無和功過，一概賴在這個財帛宮上。


    返種稻麥不分、魚目混珠的錯誤論命方法和理念，使得論命的真實性常常和現實格格不入，亦使論命的層次每況愈下。


    在基本的斗數論命法則上，我們以爲，財帛宮若僅針對金錢的得失而言，它應該是指關於金錢來源上的有關現象。贏得更實際一些，能不能賺錢，賺錢的多少和離易，以及在賺錢乙享可能產生的性質和變化，才是財帛宮的真正功能。


    一個人現在或今後可能賺很多錢，是財帛宮的問題，一個人現在手頭很拮据，帛宮不好的原因，因爲他很可能有很好的收入，但老是存不了錢。這事牽涉的範圍很廣，但絕不能單以財帛一宮來論斷。若以偏錢一享來說，一個人在作生意時，由於貨帳收不到被倒帳而所受的金錢損失，跟他把錢出借收不回，導致血本無歸的損失，雖然同樣都是金錢上的損失，但是造成損失的原因和性質却完全兩樣。因此在斗敗論命上，我們可以把前者貨帳方面的損失，列入財帛宮，但後者借貸方面的失財，却不能一視同論爲財帛宮的因素。


    在斗數論命上，由於理念的不清，因此常有這種雞鴨同籠的錯誤觀念，以爲只要屬於金錢損失，就都是財帛宮的問題。斗數論命像這種理念不清之處太多了！我們又怎能渴求這門學術，能發揮出它的實用功能呢？


    當人類懂得使用某一種東西代表某一定的價值（即錢幣）之後，人們不但爲著其基本生活而謀求財利，同時也爲著更多更大的金錢而盤算著如何去賺取。這就是自古以來所謂的生財之道，也就是當今講求的理財方式或方法。生財亦好，理財也罷，古今以來，謀求財利之道，已經產生太大的變化，不僅目的不同，方法也有差異。


    古人多爲生活而賺取蠅頭小利，今人固然亦爲生活，但已不再單純只爲生活，求財理財爲的是更多更大的目標。


    我們千萬不要以爲只是單純在理財工具上，由算盤變成電子計算機、電腦，這些個完全只屬文明利器的問題，因爲在這些文明利器之下，的確還藏有太多的大學問。一個作生意的大老板，若就今年生意上可能的得失去請教一位算命仙，算命仙固然可以依據命理上的道理，預卜可能的吉凶，但也只能得到吉凶的結果答案。若是去問一個深諳企業管理與理財之道的專家，他必先從這個公司目前經營的資料上加以了解，不只產品在市場上的行銷評估，同時對公司經營管理制度、財務結構，甚至公司營運的「損益平衡」分析……等等維繫著公司賺錢與否的關鍵問題，都必須深入研究，然後逐項提出分析和研判，最後才擬出具體因應改革的意見，提供給這個大老板作爲經營上的參考。絕不是單憑一句上上大吉就擔保能財源滾滾，或是下下大凶就關門倒閉，而毫無挽回餘地。我們絕不相信，任何一位再高明的算命先生，能一無所誤地逐一斷出大老闆王永慶先生名下所有企業單位中，今年有那個公司會賺？爲什麼賺？那個公司虧？爲什麼虧？但我相信，到了年底，在王大老闆的腦海裡，對他旗下的所有公司，盡管在還沒見到任何公司的結算報告以前（一般都在次年上半年前才結算清楚），那一個公司可能盈虧及原因，應該都相當了然。


    我們不以爲王老闆他有神機妙算的神通，我們只知道他擁有很健全的事業管理機構，網羅各種學有專精的企業管理專家，隨時爲他事業王國下的每一個企業單位，懾精寶神和獻策。一個算命仙仔，若只死纏著殘缺的古祿命法則，而不知企業經營爲何物，他到底何德何能，竟能根據一張死命盤，甚至單憑財帛宮的星曜，就去斷人家今年賺了多少錢、虧了多少本？我們以爲，還是省了吧，因爲誰聰了，誰就倒


    ## 財來財去

    [命例]


    斗數十二宮各有所主，財帛宮主生財理財之道。一個人除非能得祖蔭，一出生就擁有家財萬貫，並能守成，則一辈子食用無缺，可以不必為財來財去而擔憂煩惱。


    但是這個世界絕大多數的人，一旦獨自謀生後，必須爲五斗米而奔波勞碌，上焉者財源滾滾，好像財利跟他特別有緣，有求必應，呼之即來。下焉者，拚著老命絞盡腦汁，但財利似乎與他緣薄，愈是追它，它愈跑得比你更快更遠，能夠讓你逮到，算是你的幸運。更糟的是還有一種人，像過路財神，賺錢生財之道很積極，也很有辦法，但是往往賺虧之間形成一種兩極化的現象，有時赚的比虧的多還好，但時運不濟時，就變成虧大於賺，到頭來在追求財利上，變成一場空。


    這個命例是我公司屬下的一個經銷商。十多年來，歷盡賺錢和虧錢的美測變幻，同樣的求財和理財方式，但在不同的限運裡，却出現截然兩樣的財利赚虧現象。我作生意，货报变成呆帐，把现出借生息，被倒帐，都是破财，但这两段的破财原因有别，因此斗数分析方法亦异，这是我们的看法，阁下高见如何？


    ## 命座武、相、右弼、文昌在寅位，是個祿權嘉會的紫府相朝垣格局。紫微廟旺入午位，為身宮所在地，三方左右昌曲嘉會，無煞，可主一生財官順利無碍。根據星曜賦性，武曲司財帛之主，又名將星，天相專司衣食，化氣曰印，爲官祿之主宰；天府爲財帛之主宰，號令星；廉貞司品秩與權令，化氣曰囚。從命宮和財帛星曜組合上，大部份星曜的賦性都對財帛一項具有相當突顯的作用，這種命格一旦在他後天行運能得充分發揮，在求財方面，將會有比較強旺的傾向。


    不過，由於財帛宮（戌）爲火鈴雙煞所夾，亥位的鈴星和太陰合爲十惡，酉位的火羊爲兩大凶星的相剋（也是剋制），如此五行生剋制化的道理，酉亥對戌位還成火來生土的作用，因此使此命格，形成生財與理財的積極和正面的作用，特別常有吉化來引動時，更爲明顯。但如遇酉戌亥三宮任一宮爲忌煞來引動時，就造成任何求財方式，都會造成負面反效果的虧累。


    這位黃先生於庚辰限初期加入本公司，爲本公司某一縣所有產品獨家經銷商。


    由於經營得法，在這大限間，除銷售本公司產品外，亦作純投資（人不參與經營）某一種化工原料產品的生產生意，結果兩邊都發了財，使他在年紀輕輕的三十多歲，由兩袖清風而變成住有富麗洋房，出入有富豪牌洋汽車代步。


    我們在斗敗命盤上發現到，在庚辰大限時，限運正是先天福德宮（限運好時，主財利的興發），先天的財帛宮（戊），得太陽雙化祿在酉宮的吉化引動，使酉宮和亥宮的兩組星曜吉輔戌宮，造成先天吉象的正面凸顯。後天的財帛宮子位，由於貪狼、文曲（不見然，有富貴那粒豎打正著的正面有利作用），及左輔會由申而來的破軍、祿存，這種先後天財帛宮的吉象，使他對生財發生濃厚的意念。人往往在福運當頭時，都會福至心靈，因此原爲一個不甚起眼的市場，竟會在他得心應手的經營下漸入佳境。


    任何有錢人都不願投資經營的某種廉價的化工原料生產生意，亦都讓他賺上不少錢。


    當然在這個大限時，並不是只賺而不虧，生意上的呆帳有時亦難免，由於有天同化忌在丑宮，當乙卯年太陰化忌時，使子宮爲雙忌所夾，當庚申（一九八〇）年爲天同化雙忌來會入酉宮（忌忌力並強大），亦激發火星的凶性，使與亥宮的鈴星產生互動作用，因此在這兩年，就曾經發生經銷本公司貨品上的貨帳無法收取，而變成呆帳損失。只是在連續幾年的大賺其錢下，偶而一次的呆帳損失也造不成致命傷。作生意若只賺不賠，天下所有的生意人，豈不人人發財，而絕無倒閉跑路的事？


    但大限行入辛巳位後，除了先前投資的化工原料產品，已見好即收外，原有地區獨家販賣的產品，還繼續擴大經營。本來對一個作買作業的商人，歷經十年以上的經驗後，經驗會更老到，生意經也會越來越精，但沒想到，他老弟卻越混越回去。打從三十五歲（一九八四年）開始，每年都聽到他被倒帳的事，甚至倒帳的金額，一年比一年大，簡直使他窮於應付。因此今年（丁卯），又再度被一位十來年的老客戶宣佈倒閉，經由律師宣佈處理債務後，他實在應付不過來，而找上公司的營業主管，要求通融支援，協助渡過被倒帳的難關。


    辛巳大限，巨門化祿、太陽化權、文昌化科、文昌化忌，對先後天財帛宮（戌和亥）來說，和庚辰大限形成相當程度的變化。以吉凶兩極化的簡要說明，先天財帛宮（戌原有火鈴夾制（魚凶忌煞引動時，爲火鈴生成位），由於文昌化忌（也是先天命宮）的沖動，使戌位受到沖擊，造成火鈴夾制的凶性發作。大限財宮（亥）成爲天同化忌和巨門化祿的忌祿冲（吉凶混雜），此宮又爲寅和子兩宮的夾輔，吉相是左右輔、昌曲輔，


    ## 財帛宮

    • 127 •


    凶相則是文昌化忌，使文昌化忌和貪狼化忌成爲一種「昌貪」凶局。因此在辛巳大限的先後天財帛宮上，呈現一種吉凶參半的不穩狀況，不再如庚辰大限時吉象大於凶象（指先級天財帛宮）。因此限運進入辛巳宮後，還再由流年引動的忌煞作用，造成年年被倒帳的風波。


    甲子年（一九八四）三十五歲入大限辛巳，此年廉貞化祿、太陽化忌，寅宮成爲雙祿輔祿（甲年流祿在寅），也變成雙忌夾忌，這年在生意上該賺到的都賺到了，不該有的倒帳也都發生，因爲未宮和酉宮都沒主星，經由卯、丑兩宮忌祿照入的作用，使流年財宮（申）形成雙祿輔祿，也有雙忌所夾，又受文昌化忌的沖害，那一年賺虧之間，幾乎兩相抵銷。據所知，年終結算多少賠了一些。乙丑年（一九八五），天機化祿、太陰化忌，生意繼續作，利潤固定，生意作大自然有賺頭，只是擔當不起呆帳的再發生，否則又會造成一年的辛苦將成白費。由於流年入後天大限的財帛宮，這時正是昌貪所夾的凶宮，太陰化忌和火鈴造成十惡的格局，還和兩宮的火星狼狽爲奸地夾殺戌位，流年同時引動先天財宮的凶象。流年財帛酉宮有火星羊刃兩煞虎視眈眈，諸凡先天、大限和流年的財帛，皆形成不穩的凶相，因此今年又再度發生呆帳，又平白的辛苦一年，得失相抵之後，帳目上還是浮上赤字。


    丙寅年（一九八六）三十七歲，天同由化忌轉化祿，經銷業務在順利中拓展市場，營業蒸蒸日上，樂以爲今年大概否極泰來，利潤將隨生意的擴大而大有賺頭，沒想到下半年快近年終結帳時，又來了幾次大倒帳。幾個來往多年的大客戶大跳其票，使手中持有的未兌現支票，形同廢紙，一年的努力又告泡湯，年終結算的赤字更大。


    流年坐大限的文昌化忌，流年財宮廉貞又化忌，再由所夾制的火鈴的加重陣虐，若再加上流羊由午宮會入，更成了「刑囚夾印」的大凶格。這種流年財帛的大凶畢集，有如冰上加霜，生意上的呆帳不但金額大，而且不只一筆（一個客戶），兩三個客戶原以爲信用可靠的，全部出了問題，一概週轉不靈。這種連續三年的凶象，都發生在同一事項宮裡，所引起的爲害，成爲對該宮位的致命打擊。


    丁卯年（一九八七）三十八歲，由於在連受三年生意貨款呆帳的暗累，已到不勝負擔地步，因此這一年作起生意格外小心，抱著少呆帳，才有得賺的穩當作法。但人算不如天算，到了下半年度，恐懼中的倒楣事又再度發生，一個十年左右的大客戶，又再度宣告破產，清理債務。在老黃手上未兌現的支票和未結算的貨帳，金額之大，使他變成清理債務時所有債權人的爐主（台灣俗稱廟會時的主事者），使他在週轉成大問題之下，只好拜託總公司的主管經理懇求公司能給通融支援以解倒帳所引起的危機。丁年使太陰化祿、巨門化忌特別這個大限財帛宮的巨門由大限的化祿轉成化忌，大限財帛宮的丑位形成二個化忌，使它的破壞力道如同雷霆萬鈞之勢而不是流年太陽、太陰日月並明的雙祿交馳所能補救或力敵。


    他在電話中用一種極其無奈又喪氣的語氣跟我說他究竟要到幾歲以後才能免去厄運？往日那種英挺風發所充滿的十足信心似乎都已不復存在人生果真是十年河東、十年河西如同滄海桑田般難能逆料？


    ## 疾厄宮


    人吃五穀，怎能不生病？這是我在聽「易與中醫」講座時，有一位老夫子開宗明義，第一堂上課時講的第一句話，至今記憶猶新。儘管尖端的太空科技已經能把人送進太空遨遊，醫療科技也發展到器官的移植已易如機器的更換零件，可以使人延年益壽，但至今仍然不能醫好人們的所有病痛，大概正是老夫子所謂「人吃五穀焉能不生病」的道理。


    其實人的病痛不但名堂多，而且致病的原因也不少，不只限於吃五穀才會生病，若以一言概括，也許只有中醫學上所說的「內因外感」而致病，可以作籠統的說明。生老病死是人生過程的常態規則，一個人之生，誰也瞞不上要與否，老、死也是所有生命的無奈趨勢和終結。一個人所能有所企求與想避免的，唯有健康和不生病。一個人一旦宮上了罹天大症，就算把天底下的榮華富貴全歸給他，也無福享受。因此，也許一個人不敢奢求大富和大貴，但祈求身體的健康，應該是很自然而且是很普遍的正常現象。


    根據中西醫的醫學道理，關係到個人健康的因素，範圍至廣，從無形的先天遺傳影響到生理體質、心理和精神狀況，到有形的後天環境條件、環境差異和不利的種種致病因素，個人體骸上受到的創傷，以及在心理或精神上的某些特殊遭遇，種種不勝枚舉的理由，都會影響到偏廢或者是立即性的病痛。


    從古傳的斗數法則上，我們也許可以從命盤上，多少看出一個人在健康上的某一種大概情況，但我們決不以爲，單憑古傳的命理法則，就可以如醫生經由醫理診斷而出的病症詳情。套用了無居士的一句話，「否則同樣命盤的人（同時辰生），都會在同時數裡，生同樣的毛病，并在同樣的年齡來主厄召」。若果真是這個樣子，那麼大學堂的醫學學生，就算教育部沒有硬性規定，他們也必定會主動去選修這門神通廣大，勝過任何醫理和診察儀器的命理之學。


    實際上，並不是如此，這正是我們所以爲這門學術叫屈和悲哀的原因。


    我們懷疑，一個論命者既不諳中醫的醫理之道，也不通西醫的病理之學，甚至對人體器官機能 和結構一無所知的算命先生，如何憑一張命盤去鐵口直斷一個人的健康情況，以及致病的根源和病徵？更別說在病痛時，如何去提供趨吉避凶、解除病痛之苦的建議。


    因此我們以爲一個論命者，若要根據命盤依理推論一個人的健康問題，除了熟悉命理推演的理則以外，更應該著手於醫理上的認識。也許不必像醫生那樣的精通醫理之道，但是總該吸收一些醫理上的基本知識，這樣一來，面對命盤談論疾厄宮的問題時，才不會腑臟不分、經絡不明，把消化系統上的各種病變，如腐醫治病似的，一概服以「張國周強胃散」，把女人因爲經期不調不順，以致難於受胎懷孕，但尚可療治的毛病，竟然鐵口直斷地說成因爲命帶孤剋、子女宮忌煞交加，所以無法生育，因而誤了人家的醫療時機。


    如果論命竟然是這樣草率，那麼千萬要記得，由於信口雌黃的一句話，因而造成人家夫婦的婚姻失和，或是由於未能及時療治而不能生育，使人斷了子嗣，那麼這個算命仙仔所造的孽障就太大了！若真有善惡因果的輪迴報應，這個孽，必定會回報在你的子孫身上或是你的再世來生，也會叫你的宗嗣斷了香煙。'
