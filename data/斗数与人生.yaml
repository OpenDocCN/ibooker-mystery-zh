  md: '計分析和研判，來加以了解，作學術理論研究的參考，或政策擬定的依據。


    在學術研究方面，有光對純物質研究和由人類行為發展而來的學術研究，所採行的研究方法，由於本質的不同，因此所採用的方法，並不一致。前者如物理與化學，研究人員可以整天躲在實驗室裡，藉著精密儀器反覆實驗的研究；而後者除了學理上的推論以外，還需要透過實況的調查了解，才能證實在學術推論上的正確與否。因此，這種調查上的空隙了解，往往對這門社會科學的學術研究，扮演著效用功能重大的角色。


    這種對群體現象了解的調查工作，在當今工商業興盛的時代，被廣泛地採用。


    一個大企業的經營，隨時要去了解企業經營上的狀況和趨勢，必須透過調查，了解企業經營相關事項方面的市場取向，以作爲知己知彼的判斷參考，然後才能訂出合理的經營策略。一個政治家也須了解民情疾苦，然後才能佈行有效的政治措施，就以醫人救命的醫生來說，必要時也要對地方性的某種特殊疾病，作個案調查與研究，否則無法辨明某種疾病的起因和有效的治療方法。台灣西南沿海某地區，由於水質含砷過量引起的一種烏腳病，就是一個很好的例子。'
