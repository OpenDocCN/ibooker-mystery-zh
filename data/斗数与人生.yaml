  md: '• 209 • 影究命理的因系


    純利百分點完全相似（以一般企業經營來說，這種純利百分率已經相當不錯），但在絕對的淨利金額上，大公司高在六千萬美元，而小公司却只有六百萬美元。


    儘管兩個規模不同的公司，在各自的經營上都認爲得利很理想，但公司規模太小，當然關係到他的營業額（經營效率假定都得到充分發揮），營業額又影響到絕對純利金額的多少，這是很淺顯並很容易理解的道理。我們可以把命格大比之於大公司，命格小比之於小公司，用以理解官祿宮的作用如何，必須以命格來衡量的道理。


    若再以事業經營來比喻斗數官祿宮的作用現象，來推論一個公司經營的成果，還需牽涉到該公司經營運作的某些關鍵問題。比如，產品的良劣、產品行銷量的大小、難易、市場形象、產品的獲利與呆帳情形、財務結構的健全與資金融通調度、人員的能力發揮，我們將可依據命盤上的官祿宮、遷移宮、財帛宮、福德宮、田宅宮、僕役宮，個別分析推演，進而作綜合性的判斷。


    一個公司經營的成效，往往個個事項部需兼顧，一旦有一個環節發生了問題而不得解決，往往使這個公司的經營功虧一簣，斗數運用到企業經營的推演與論斷方面，也必須合參到這些事體，而利用各相關宮位的現象來綜合判斷，並不是單憑命'
