    在老爺爺的時代，當時還是個封閉的農業社會，社會上的行業也許三百六十行已經可以概括了，因此那個時代裡，三家村裡算八字的老先生們就用金木水火土五行的屬性跟客人說，你命中喜木相生，因此，可以去經營木材生意，必將大發利市、發大財。你命格土太旺，宜作五金生意，土可生金，除可使事業興旺發展外，尚可藉暑洩土太旺之氣，以求中和，既利財官，又可延年益壽。這是傳統命理上，用五行歸屬來談一個人一輩子應該利於何種行業的經營。


    時至今日，環境變了，行業之多，何止三百六十行？恐怕誰也數不清。因此現在談命理在論及職業行別種類時，若再以五行來歸類，客人將會搞不清楚，一個在官方機構上班從事行政文書職務工作的人，究竟五行屬什麼？若五行不合，能否有升遷機會，甚至可否平安無事，上班到告老退休？五行應用在職業類別上極爲不合理，理由極爲淺顯，但很奇怪，偏偏有太多問命理的人。一開口問職業或生意類別時，就問說應該從事於金木水火土那一種行業比較妥當，我想這種問話，一定不是客人自作主張的意見，必定有太多的算命先生曾經有過如此的說法，才會讓這麼多人興口同聲地作如此問法。


    ## 官祿宮


    - 166 -

    我們以爲在職業類別上，若以職業功能作爲歸類，應該可以分爲生產事業、服務業和買賣業三大類；若以職業機構歸屬來分，則可分爲官方和民間機構：以職務功能來分別，則爲利文職或利武職。利文在官方則爲文官或文職的行政人員，在民間則主公司行號的行政業務管理，利武在官方即爲軍、警、刑、法職務，在民間則


    至於在官方能達到高宮願要的人，不管文武戰務，不再是單純職務分類上的問題。或是單純的以官祿宮來看，最重大的關鍵，往往是在命身格局的根本條件上。


    以民間公司行號來說，一個成功的老板，一定有他命格和行運上的條件，而另一個一輩子當上班族的人，也同樣受命格和行運的限制，反而不是單就事業宮的問題。一般來說，在政府機關做事的人，雖有官途升遷上的困擾，但一個人只要奉公守法、盡忠職守不犯大錯，若再沒有當高官願要的野心，決不會有官海浮沈的痛苦。


    因此一個平常又平凡的公務員，一輩子不致於有太大的事業上的煩惱，儘可逍遙自在。但是一個在民間經營事業的老板階級人士，就不一定能那麼自在逍遙，也許你看他有私用司機開着高級轎車載他，進進出出地滿爲風光，但你卻不一定知道他內心正在爲着某些事業上的困擾而絞盡腦汁、口苦心機，到處奔波眠託。你可以準時下班，他却却在下班後逗留在辦公室裡，盤算着明天如何去調度三點半的燃眉之急。


    我曾經有過這麼一位被他當作長期廉價顧問的老板級朋友，他也算少年得志，三十出頭時，辭去民間某大企業的司機工程師以後，捲起衣袖以年輕人所擁有的堅苦卓絕的勇氣投入商場，當起一支可話、一張桌子、一個人的公司老板來，不知道是福至心口，或是行運使然，他竟然由一個當黑手的工程師，在幾年的慘淡經營之下，却也闖出頗具規模的雜貨出口公司，麾下已擁有廿多名業務人員在爲他賺錢效勞。


    一個人常常在太順利的時候，以爲賺錢是一項最容易不過的事，事業經營盡可恣意自如，在出口業績一直蒸蒸日上賺大錢新台幣之餘，竟幹起國際性藝術買賣的生意。他透過某些地區國家經營某種當代藝術品的行商或經紀人，搜購版畫進口，賣給國內的富豪和喜附風雅的有錢人家。經營之初正逢台灣經濟成長快速，社會普遍賺錢多多的時候，因此這個生意又的確給他帶來了更多的金錢財富，也更刺激了他事業擴大經營的雄心，因此他為了作更多更大的生意，進一步和有志一同的朋友，合伙組成了另一家更具規模的專營這種藝術品的公司，以求求鴻圖大展。沒想到三年的經營結果，也許由於經營方式的不對，再加上以後幾年台灣工商業景氣的衰退，使那些本昂價買的藝術品，形同廢物地堆在倉庫。在長期脫售無門之下，形成事業經營上資金的積壓和短缺，利息也不勝長期的負擔，結果在合夥人設計的圈套之下，賴貨是出清了，但從此也負下巨額債務，更進一步地拖垮了原本經營得有聲有色的出口公司。


    我以爲他的失敗，除了命理上的因素以外，還犯上了企業經營上的某些大忌，對藝術品這個行業並不很在行，台灣市場也未達到那種大規模的經營水準，何況它不是生活上或是生產事業上的必要物品，它在市場上的需求屬於彈性很大的商品，需要時視同寶物，不要時如同廢物垃圾，以不甚內行去經營行家才能作好的事業，其結果不難預卜。更糟的是，在合夥經營上真的遇人不淑，屋漏偏逢連夜雨，怎能不叫他的事業由高山的頂峯跌到谷底，也真令人慨歎！


    談起民間企業合夥經營的問題，在命理上，我們必要加以劃分，一個人在企業經營上應該扮演那種比較適合的角色，某一種命格比較適合於當合夥式的老板，或是獨資型的老板，還是當股東也需參與事業的經營，亦是當股東但只宜掌權到總經理的職位，不宜當需負全部成敗權責的董事長，可以僅作資金投資，等領紅利營餘的純股東。凡此種種，不只是個人才華能力的問題，也常常是命理上的條件問題，要不然怎麼會有這麼多在大企業王國下，成天爲大老板動腦筋、獻計謀，學有專技的企業專家，甘願長期的當上班族，否則豈不個個都當了企業家。


    個人在企業界打滾了半輩子，嘗盡了企業經營上的甜酸苦辣，也從多年爲企業界的朋友論命當中，體會到隔行如隔山的真象。因此常以斗數命盤談起事業的興衰起伏時，除了提供命理上的一種趨勢現象外，無不盡可能地就企業經營上某些關鍵性的專項措施，加以事先了解，然後再加以提供可行的經營意見和方案，必要時甚至要他再去請教某些學有專精的專家學者的寶貴意見，究竟命理並不是萬靈的仙丹妙藥，我們總不能單憑一張命盤，就能使一個如同沉疴癱瘓的大企業，由你命理談論上的三兩句話，就可以起死回生，就能夠從此鴻圖大展。


    [命例]


    ### 一個中小企業的佼佼者


    女問婚姻、男問事業。有多年論命經驗的人，大概都會同意，男女之間的問命，多少有點這種偏向。但並不是說當今社會已經女男平等。現在多的是女中強人，社會上有太多的女性在各行各業上，表現特出，你不可能再抱著老祖母時代的觀念，以為女人問命不會談及事業。據我玩票性的業餘論命所知，當今社會問命乙事，不管男女，事業乙項很可能是所有命理談論中機會最多的事項。


    古人談命理，多根據一個人在八字五行屬性的現象，來告訴問命者，應該去經營木、火、土、金、水中的那一項，最能發財。甚至告訴他事業的將來趨勢傾向。


    近代由於產業發達，社會上的營生行業包羅萬象，再也不能以五行的簡單模式就可以說清。在命理的主張上，有人主張說，什麼命就作什麼事，認定事業對天命不可違逆，但也有人說，事業是一種選擇，仕、農、工、商，任憑你的意願去選擇，只要你高興，你可以一年換一種職業，甚至一年換一個老板。


    在學術的研究立場上，我個人贊同，任何主張的自由發揮，只要你能言之成理、擲地有聲，都可以成爲理論或命理思想上的一派宗師。我也不揣冒味地提出斗數命理探討事業方面的個人淺見，作爲同好者的參考。


    這個命盤的主人翁，與我大學四年同窗，畢業後因緣巧合地又在同一家官民合資的企業機構幹基層的業務員。當時的頂頭上司、業務主管，正是八月中旬在台中墜樓身亡的某企業管理大師（據傳政一分鐘，以表哀吊）。由於兩人都是初出茅蘆的年輕人，主管大人又是老學長，因此我們無不在唯命是從、戰戰兢兢的環境中，既工作又學習。老實講，當時的工作並不輕鬆，而且待遇又差，有時在主管大人的嚴厲磨練和要求之下，常有一股年輕人所有的暴燥牛脾氣想要發作。但每當想起工作難找時，總得向現實環境低頭而忍下來。現在想起往後老林和我會繼續走上工商界，不得不說跟這一段並不怎麼好過的日子，是個緣起的契機。


    老林也許是個作生意的料子，在追家公司一待就十來年，由一個小業務員當到'
