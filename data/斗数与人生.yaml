  md: '的衆生相時，你曾否撫心自問，你對這個花花綠綠的大千世界的所有凡塵俗事，究

    竟了解多少？你究竟能談出些什麼？人生一輩子的疑難雜症并不是憑你一句諳事大

    吉、凡事大凶，就可以了結的。


    # 離鄉背井

    [命例]


    一個人一生都住在老家過完一輩子，或是年輕時就離鄉背井覓跡在外，往往有

    他時代背景、社會因素和家庭條件的限制或促成。大體上說，在農業社會時代，由

    於人們的一種守成的想法，造成一般人普遍存有安土重遷的觀念。時至工商業高度

    繁榮發展以後，不但由於謀生的需要，也由於交通的發展與便捷，一個人他可能憑

    藉他的意願和條件，到人地兩疏的異鄉別地去謀求發展。


    但是我們在家多離鄉背井的命例當中，發現到，並不是人人都能飛黃騰達，而

    發跡於遠郡。有些人口在落魄他鄉，無顏回鄉再見家鄉父老。當然也有些人的確如

    同蛟龍歸大海，發跡得志於他鄉。在同樣的時代背景裡，同樣是異鄉人，竟然會造'
