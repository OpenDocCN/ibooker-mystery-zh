  md: '任何慶祝？除非為這個「母雞日」特申感念之外。尤其像我這個當了大半輩子的上班族，年已近退休之齡，早成了過河的馬前卒，一生乏善可陳，剩餘的利用價值已不多，搞斗數命理只是花不起其他太昂貴的休閒娛樂，而用以打發下班後的閒暇時間，倒沒曾考慮到，想利用命理來得到什麼。


    飯後到一家茶蓬館聊天，郭先生提起一些新近碰到的奇特命例。華先生更談了不少容人的一些稀奇古怪的際遇和聽聞。後來接著談到斗數命盤上的身宮問題，他兩人表示，對於斗數命盤上的這個身宮作用，一直模糊不清，要我表示點意見。


    身宮的作用，在古傳典籍上的記述不多，只見到零零碎碎的散見在先賢名論賦文裡，但也都一筆帶過，欠加詳細釋註。比如「太微賦」的「以身命為福德之本」，「玉蟾發微論」的「身遇殺，不但貧且賤」、「命身相剋，則心亂而不閑」、「骨賦」的「立命可知貴賤，安身便曉根基」、「命好、身好、限好，到老榮昌。命衰、身衰、限衰，終身乞丐」、「七殺守身，終禍夭」等等的記載。但這些文字雖然寫得如金科玉律般的劃切分明，對身宮的重要性作了相當重而有力的提示，字意真是鏗鏘有力、擲地有聲，但由於沒加詳細註釋，因此很難從這些吉光片羽中，使人確能對身宮有


