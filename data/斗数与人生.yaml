- img_proc: true
  md: '產生他種種存在以後的事實？就茫無所知。但今人已經可以從生理學和遺傳學，了解這些「存在」和「事實」的原由。比如這個小孩是個健康活潑、智商很高或是先天殘障、智能不足，現在我們已經知道爲什麼會如此，但古人却始终不知道究竟爲什麼？他們會認爲全部都是天命的安排。因此近代人們探討命理，由於具備這種文明新知，已經不再爲這些「存在」和「事實」感到迷惑。


    因此我們以爲一種學術，只要它確是有道理，必能透過現代文明的新知來加以剖析闡釋。任何一種學術，只要能以文明新知加以實證，並受嚴格考驗，它就能彌久長新，而放之四海皆準。我們以爲斗數命理，正如其他的很多近代學術一樣經得起文明的考驗，可作經世之用，因此絕對可以冠冕堂皇的走入殿堂。


    不可諱言的，我個人在斗敗命理的學習，經由很傳統的正式拜師學起，也的確從我老師學得完整的命理法則，但由於這種太過傳統式的命理觀念，使我在最初十年歷盡了千辛、也吃盡了苦頭。好在我還是個受到新文明洗禮的人，並沒有因而爲之氣餒，反而對傳統下的命理，產生根本的懷疑，對於傳統上所持的命理觀點和法則，總覺得無法落實到實際的人生，而成爲具體可用的命理資訊。也許由於長年累


    斗數的新命理觀


    產生他種種存在以後的事實？就茫無所知。但今人已經可以從生理學和遺傳學，了解這些「存在」和「事實」的原由。比如這個小孩是個健康活潑、智商很高或是先天殘障、智能不足，現在我們已經知道爲什麼會如此，但古人却始终不知道究竟爲什麼？他們會認爲全部都是天命的安排。因此近代人們探討命理，由於具備這種文明新知，已經不再爲這些「存在」和「事實」感到迷惑。


    因此我們以爲一種學術，只要它確是有道理，必能透過現代文明的新知來加以剖析闡釋。任何一種學術，只要能以文明新知加以實證，並受嚴格考驗，它就能彌久長新，而放之四海皆準。我們以爲斗數命理，正如其他的很多近代學術一樣經得起文明的考驗，可作經世之用，因此絕對可以冠冕堂皇的走入殿堂。


    不可諱言的，我個人在斗敗命理的學習，經由很傳統的正式拜師學起，也的確從我老師學得完整的命理法則，但由於這種太過傳統式的命理觀念，使我在最初十年歷盡了千辛、也吃盡了苦頭。好在我還是個受到新文明洗禮的人，並沒有因而爲之氣餒，反而對傳統下的命理，產生根本的懷疑，對於傳統上所持的命理觀點和法則，總覺得無法落實到實際的人生，而成爲具體可用的命理資訊。也許由於長年累'
