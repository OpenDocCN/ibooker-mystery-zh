    探討命理，若往這一層面去著想，我們將會發現到命理之學絕對不是一項很單純很簡單的學問。只是學海無涯、人生苦短，我們實在不知道一個人窮其一生去研究這門學術，究竟能在這整個命理的範疇裡了解多少？


