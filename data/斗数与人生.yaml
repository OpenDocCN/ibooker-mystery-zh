  md: '役宮，武曲井為化忌，再受午位火星照會，巧成寡宿。己未流年雖有太限天梁化祿，但仍無法抵住文曲化忌和双羊的肆虐爲凶，而這個宮位正是大限的僕役宮。這種先


    後天僕役宮的凶性引動，實在是凶悍無比。


    若以大限的官祿宮來看，己未年雖有流祿和先天祿存同座，又有流年的武曲化


    祿來會，但仍然難抵本命巨門化忌、流年文曲化忌和双羊陀夾煞（火星）的夾制，若


    再加上武曲的大限化忌冲擊，實在是表面平硯，而裏頭危機四伏。也許范老板在基


    本命格類型上，就不屬於大發特發的老板命，因此才會在英年有爲、正當鴻圖大展


    之時，偏偏用上這種成事不足、敗事有餘的職員。我真不知道究竟是誰的錯？但是


