    # # 醫理和命理



    老家是個鳥不生蛋的窩鄉僻壤，鄉人都以務農為生。由於地處偏遠加上醫療設備的欠缺，地方上雖然也不乏開業行醫的小診所，但由於設備的簡陋，對一般的小毛病還能夠醫治，但對一些疑難雜症，或需開刀動手術之類的大病，卻是一籌莫展。

    人往往是無辜天地廣，有事則天地窄。鄉人偶有碰到求醫無門的時候，就會找上這個落魄台北的老同鄕，認爲我得地利之便，能為他們設法安排醫療機構，得以醫治家人的病痛。


    因此幾年來，從眼科、胸腔外科到心臟科的開刀手術，使我幾乎跑遍了各大醫院，並認識一些頗具權威性的醫生。也許是興趣使然，我曾經陸續把這些病人排上命盤，先後請教何老師談論那些疾病在命盤上所顯現的現象如何，以及可能得到的療治效果。


    老師對所有我提出的病例命盤所給予的分析論斷，幾乎不曾有過'
  - "[PAGE 44]\n\n**不明确的论断**，和對醫療後可能產生的后果有离谱的预测。老师这种神乎其技的高妙论命，绝不是我退等徒弟所能想像，因此我曾把命理与中医在基本理论上的关联提出请教。\n\
    \n据老师的说法：中国的五术——山、医、卜、相虽然各成体系与理路，但基本的原则仍渊源于中国的易理。尤其是中医在医理上有某些理念和斗数的理论上就很相近；只是经由药物来治病健身，而斗数是用来分析一个人一生的起伏变化，再从中用以趋吉避凶；方法虽不同，手段有所不一，但同样的有益人生，正所谓‘医病即心’同样都可救苦救难。因此五术之道其源于易理，其法有别，而衡用之目的则殊途同归矣！\n\
    \n老师的这段教诲因而使我回老家找寻家父生前留下的早已尘封的中医书籍。\n\n（家父生前是位考试院通过的合格中医师），并报名中华易经学会的《易与中医》的课程——全篇的《伤寒论》、《金匮要略》，以近两年的辛苦，听完了诸老夫子的中医基本课程。我并无意于学医以悬壶，但对这些中国古传医学经典的确引为必读的经典之著。”\n\
    \t\t}"
