    因緣」，他怎樣學習斗數？如何從一個連子丑寅卯都無法順口唸出的門外漢變成一個狂熱的斗數研習者？（見「斗數的學習）」；他怎樣從日以繼夜的摸索和論命體驗中，悟出千年斗數的正確法則和理念？（見「斗數的探索和啟發）」；他怎樣打破歷來「象牙塔式」的斗數神話，把正確的斗數法則、理念和實際人生結合在一起？（見「斗數與實際人生）」；他怎樣從中國傳統醫理領悟出斗數星曜賦性的各種現象、宮位、組合的原理，並據以發展出一套前人未曾發現的斗數推演法則？（見「醫理和命理）」；他怎樣突破千年以來的斗數瓶頸，找出斗數命理在人際關係與六親緣份上互為因果的關鍵？（見「啓發和領悟」）……。


