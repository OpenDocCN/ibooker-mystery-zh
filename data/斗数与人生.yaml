  md: '本命和大限的格局形成，以及氣勢強旺，所有難題都能化解。


    戊午大限，貪狼化祿、太陰化權、右弼化科、天機化忌，使先天的官祿宮貪狼化祿，也使大限官祿宮戌位變成祿祿所輔，使得他的事業一直興旺不退。二十年來，我曾戲稱他在前些年出口並不怎麼景氣的時候，假使國貿局長問林老板出口景氣如何，林老板的答案一定跟局長所知道的不景氣不一樣。


    我們在斗數命盤發現到，由庚申到戊午三個大限上，在官祿宮上所以會如此順利，具有幾個關鍵性的特點：第一，先天官祿宮強旺；第二，三個大限官祿形成「連珠」格；第三，三大限皆會化權。格局既成，氣勢連續壯旺，難怪事業會蒸蒸日上。


    命理因素既成，又適逢台灣近二十年來整個工商業的繁榮發展，這種大環境上的順風助力，再加上林老板全力以赴，要說這種人事業不成功，誰能成功？'
  merge: -1
  pgno: 178
- img_proc: true
  md: '斗數典籍，不管古傳或是今作，對田宅宮的闡釋已經很多，但這並不意味着今人對這個宮位已能掌握到正確的論法。尤其是古今社會變化太大，不只社會法律與典章制度的改弦更張，甚至人們對於某些事物已經產生了完全不同的價值觀念，因此，在斗數的論命法則上，決不能泥古而不化，但也容不得你愛怎麼用就怎麼用，否則斗數論命，將如同「大家樂迷」視某些所謂「明牌」，愛怎麼解說就怎麼解說，豈不變成癡人說夢話。


    由於升學競爭及大衆對教育的重視，什麼人都寄望自己的小孩能進入至今仍是校門太窄的明星學校。因此在課外惡性補習之餘，還要把戶籍遷入明星國中的學區，以致造成多方面的困擾。小孩進國中，竟然還需經由法院的戶籍公證，這不能不說是天下奇聞，豈是孟母三遷所能比擬的？有一次我碰到一位客碰斗數的朋友，他問


    # # 田宅宮'
  merge: -1
  pgno: 179
- img_proc: true
  md: '我說，他先天的田宅宮，都見貴和化科，但他這幾年來，小孩子陸續地參加大學升學考試，怎麼都不甚理想？


    這個問題使我想起幾年前，某個電視台由一些「命理大師」製作的一個叫作什麼「機」的命理節目，其中有位大師，大概是打鐵趁熱，趁升學的季節裡，以命理大談考運之道，至今印象深刻，還留有他的這麼一句話：「先天田宅宮化科，必生聰明佳子，行運遇田宅宮化科，小孩考試必高中！」我不知道這種歪理傳自何處？或是什麼高人的獨家訣竅？我們只知道，田宅與子女宮遙遙相對，星曜作用會互為影響，但若把孩子的聰明才智和考試如何，完全賴在田宅宮，未免太荒謬、太過於意識膨脹！或者他以爲，田宅者，可以集山川之靈氣，必能生龍生鳳，必能敎住在其中的孩兒子女聰明絕頂。因此我告訴這位朋友，對孩子的教育最好能因材施教，天生我才必有用，爲什麼非進大學堂不可？專科學校照樣也可以造就可用之才。再說書讀得很好，也不一定保證一個人必定能飛黃騰達。


    更妙的，還有位朋友由於夫婦的省吃節用，大概也存了些錢，就在一九八○年（庚申年）時，經過一位「斗數大師」的高明指點，以大限太陽巨門在庚寅位，亦是'
  merge: -1
  pgno: 180
- img_proc: true
  md: '先天的田宅宫，由于田宅太阳双化禄，告诉他可以投资房地产，赚他一票。他老兄就在某一个环境不错的住宅区，在部份银行贷款之下，啃下了数百万元的一间公寓，以为该发财的时机到来，不发一箧更待何时？没想到，往后几年房地产景气每况愈下，他老兄偷鸡不着蚀把米，事经五、六年後，房子是卖掉了，但却赔累了不少。


    他问我說，难道那位指导他的斗数大师搞错了？我说，正是如此，因为你买房子并非想住，而是想藉以赚钱，在斗数命理上，那是一樁买卖，一件生意，怎能和置产居住相提并论？


    近年来，房地产业因经济繁荣，国民所得不断提高，再拜银行提供购屋长期低利贷款之赐，使这个行业呈现一片蓬勃发展。搞房地产营建的大老板们，为使他们的房子好卖多利，要求建筑师务必要配合堪舆风水的绝活来设计施工。买房子的客人，为了表示慎重，在精挑细选的决定之前，也必定找一位风水仙，去勘察一番，一切以堪舆和风水仙的指点马首是瞻。


    我们弄不懂，一位经营营房地产事业的大老板，他们应该更重视什麽地方该盖什麽等级和用途的房子，当地的交通状况、环境上必要的公私设施，才是吸引客'
  merge: -1
  pgno: 181
- img_proc: true
  md: '**182**


    人來買房子的根本條件。而買房子的人，也應該注意到房子品質與外在環境上的良劣，才是居住的重要條件，怎能單憑一個羅盤就決定一切？任何人都不會否定，有世界公園之稱的瑞士，他們的建築物不管是大都會的高樓大廈，或湖光之濱、山林之間恍如人間仙境的高雅住宅，絕對不是咱們這種好用堪輿之學的房子所能相提並論的。


    **田宅宮大吉**，一個人必成巨富，因為藏財之所興旺。一個人田宅宮煞忌交加，他必與祖產無緣，並會離鄉背井。我們不能說這個古祿命法則上有什麼謬誤，但我們更應該體認到，社會環境不只古今不同，以後也會和現在有異，我們若不能在掌握祿命原理原則的真實道理之餘，再配合時代背景的理念，否則，那我們可以肯定地說，這門祿命法，不但不是經世致用之學，一旦誤用，反而將有害世道人心。


    # # **平地起高樓**


    [命例]


    **陳先生和我共事已逾二十年，只是他在外、我在內**，他目前亦是我們公司一個'
  merge: -1
  pgno: 182
- img_proc: true
  md: '地區的產品獨家經銷商，由於長時間的共事，因此對他的家世和廿年來的經歷，也有相當程度的清楚和了解。


    陳先生他兄弟八個，老大是同母異父，但相處和睦，就是沒有姊妹，這是陳老太媽一生中引以爲憾的事。因爲她常說她有很多孝順的媳婦，就是少了個女婿，好羨慕他人有女婿家可走動，是人生一大樂事。老人家身體健朗、樂觀，年逾八十好幾，我看她長命百歲應該是很簡單的事。不過陳老太爺在陳先生第一限時就過世，因此他是陳家的老么。


    他老家在麻豆鄉下，老家以磚塊爲地基，牆壁以竹片和灰土築成的老厝還在。


    擬陳先生說，由於早期兄弟衆多，加以經濟不甚寬裕，雖住鄉下，但無自己的田可耕，家計就在胼手胝足中挨過。也許陳先生得了老么的便宜，當他小學畢業時，已經台光復，更由於兄長的長大成年，都可以賺錢幫忙家計，因此他才有幸飄到高雄畢業。在癸卯大限，一方面作工，一方面上夜間學校，在日夜辛勤幾年之後，總也在一家國立農專畢業，多少暑補年輕時沒能繼續升學的遺憾。


    我們在斗敗命盤上，也許在宮位的類型上，發現到似乎有如所遭遇的現象。'
