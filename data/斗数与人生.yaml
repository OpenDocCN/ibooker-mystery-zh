    # # 斗數因緣


    記得在一九八一年（辛酉年）春節放假回南部老家過年時，有一天在鄰居的一個族親家裡碰到了無居士。由於在座的都是族親，因此也就東聊西扯地擺起龍門陣，當時了無儱談一些稀奇古怪的見聞，我還以爲由於他從事幾年的記者生涯，所以才會見多開廣。沒想到假期一過，回台北上班後沒幾天，卻收到了他的著作「現代人的八字」和「關公作天公」。千萬也沒想到，在我腦海中多半還留著「放牛孩子」印象的毛頭小子，事過幾年不但練就生花妙筆的文才思格，且也研究起命理，丼著會立說起來了。


    由於好奇心，因此就在一次南下出差的機會，約定時間登門造訪，本來還存心想要試試這小生後跟究竟有何能耐，年紀輕輕的竟膽敢著書立說，還開起業餘命相館，爲人談禍福、論吉凶。在心裡有所打算之下，因此早就準備好一個命例，據'
- md: '## 斗數的學習


    由於老師並非以命理謀生，更無開班授徒的打算。因此當時授課雖發有提綱領的一份講義，但似乎都沒有超出日後在坊間看到之斗數所例述的賦文一類的內容，反而在活潑應用和涉及斗數在五術運用範圍上的原理與法則，內容之廣泛，幾乎將五術兼容幷顧，而不是純以斗數談命理的課程。但是徒弟們毫無命理根基，程度太淺，所以這個課程前後開了將近三年。據老師的說法，三年的時間其實才算勉強把斗數的基本道理作了最初淺的交待，而非已把這門學術徹頭徹尾地講完，徒弟們雖歷經三年的聽課並不意味著在紫微斗數方面已能了解多少，莫說登堂入室而能窺其道理於萬一，充其量也只能說在斗數這門學術上有所啓發罷了。


    記得老師曾經意味深長的比喻：一個夠格的醫生，儘管在受滿七年的嚴格醫學教育後，並不表示他在學校畢業後就能馬上開業行醫，他仍須經過一段期間的在職臨床訓練和經驗，才能勉強的獨立診病行醫。至於成爲名醫者，往往又需加上十幾廿年之久的長期行醫和繼續不斷的悉心研究之下，才能有成。這也是醫生遍天下，名醫沒幾人的原因。用以療治病痛的醫理如此，而用以探討人生百態的命理，更涉及萬丈紅塵的衆生相，其錯綜複雜，何止於恒河沙數？就算用盡八萬四千法門，也不一定能洞徹得了個中奧秘。因此老師曾經不止一次的說過：『起碼要詳盡推敲過五千命盤的經驗』才能勉強夠格爲人論命。


    廿多年來，我也數不清究竟看過多少命例，但一直仍覺斗數具有無窮無盡的奧妙，也許因天生愚魯，或許用功尚有不足，因此迄今我仍不敢說我已經通過了何老師一再強調的五千個命盤……


    **或許是老天垂憐**，在開始拜師學斗數後的日子，由於工作環境的逐漸改善，個人的家庭生活亦趨於穩定，至今雖僅足溫飽，但對一個鄉下孩子來說，能在這十里洋場似的大都會，懷息安身，已經太感謝天地的厚待。由於個人生性淡泊，因此在工作之餘，晨夕不輟地翻閱老師的講義和聽課的筆記，拜藉著親朋好友提供的生辰資料和事跡反覆研討推敲，那股狂熱的傻勁至今絲毫不減……


    在廿多年前，斗數書籍除了那本翻印錯誤百出的《紫微斗數全書》以外，幾無另書可作參考，老師又遠住大龍峒，雖有公車可以輾轉來回，但往返費時，加以當時尚無電話可以事前約定，因此很難每次都能順利碰面請教，以致常有一個命盤苦思數月而不得其解，那種挫敗的沮喪，真不足爲外人道，因而也曾多次想要放棄，以撫心中的折磨。


    記得當時孩子太小，而我却在下班回家後，除了吃飯之外，全心於斗數，忽視了幫忙料理家事，以致內人在激烈抗議無效之後，御狀告到遠住鄉下的兩位老人家，使我受到兩老的責難。我很羨慕了無居士，能得夫人經常半夜爬起來燒水泡咖啡，給他精神上的支持；感耕得夫人的精神鼓勵，文昌居士更得夫人精神以外的實際行動支持；很爲他們慶幸。我的確很羨慕他們，但我除了爲我內人的「遇人不淑」而感到抱歉外，絕不敢心存絲毫怨言。


    由於工作上的方便，常年出差，幾乎跑遍全省的大城小鎮，因此每當看到報載的斗數命理廣告時，必定尋機利用下次出差之便，前往算命，以藉著高人論命的機會裡聽聽前輩的高論。若以就近的台北來說，只要有門路可尋，遲早必登門討教。


    在這段遍訪名師論命的時間裡，的確花了我不少錢，而這些錢卻都在我盡可能節省香煙錢、午餐費，及出差旅費中省吃儉用下的零星用金，甚至常須盤算還要積蓄多久，才足夠再去拜見下一位算命先生。以當時的那股傻勁，若不是還有養妻兒的後顧之憂，很可能都會爲此而當掉褲子。也許皇天不負苦心人，雖然，幾年來不斷地找人論命，費我不貲，但也的確從論命的這些老前輩中，吸取不少寶貴的經驗，更使我在往後苦思窮慮中領悟了不少斗數論命的道理。


    五術補習班的公開招生開課，似乎起於一九七〇年左右，當時雖然已經是在我正式拜師後幾年，由於狂熱未減，幷已歷經艱辛，不再像先前面對命盤時那樣茫然無知，但對論命的認知，仍覺太多不足，因此我就向當時一家開在信義路的補習班正式報名，重新做個老學生。


    課程分初級和高級班兩期，每期三個月，每週一次，每次兩節課。由於學員都是在職的社會人士，因此開的是夜間課。參加這個補習班，我原存着多聽多問的心態，希望多從老師處學習到不同的高論和新知。但沒想到，在初級班三個月沒上完前，我幾乎變成了學堂裡頭的助教，甚至同班同學在課餘的互相討論中，我反而有喧賓奪主之勢，言得我向當時的老師黃老師再三表示，我的確是心誠意正的來聽他的課。


    更妙的是，在我聽完初高級兩期課程後不久，館主潘先生來電話，要我還不在不同的日子在他那邊掛名開課。當時我對自己在斗數方面的認知心裡有數，無論如何，我不敢去領受他的好意，錢不賺事小，若因之而誤人子弟，茲事體大，何況我在工作上的收入，已足溫飽，也不必再爲省算命錢而折辱自己。為人師，豈可輕易。


    ## 斗數的摸索和體驗


    我在工作上的安定，并不意味着工作趋于静态的固定，或许是人在江湖，难免有身不由己的事。因为服务单位是个私人的营利事业机构，因此廿多年来，这个公司不仅有事业的起伏和人事的更替，于团体、于个人的得失之间，更是休戚相关、利害与共，有些固然事出有因，事前可以预期，事后可以掌握，但商场上突如其来的风云变色，却也令人难于事前逆料和设想。


    尽管在企业管理上，我们儘可能地作了最週全的企划，但往往却会因为某些突如其来的意外变动，而导致全盘计划的功亏一篑，或是重新检讨得失的结果，但这些往往不是经营管理上事前所能充份掌握。


    个人由于职务上的关系，有功未必受禄，但有过且需受责，因此常为着公司经营上的盈亏得失而耿耿于怀，究竟我还需要仰赖这份薪资来维持家小的温饱。虽然公司的經營可藉各個學有專長的部門主管提供意見，也可經由財務分析和業務資料作為經營策略判斷上的依據，但往往在事理未能充分瞭解或掌握前，却也經常徬徨而不知所從，因而常使必要的決策判斷猶豫不決，我想這不該是我這個上班吃薪的人才有的痛苦，一些掌管企業經營大權的人士，都會領略到個中的苦衷。


    假使企業的成敗，都能經由企管理論中獲得充分解決，那麼天下間將沒有破敗的大企業，而且那些擁有企業管理學位或專才的人，人人都會變成大企業家，或者光憑當企業管理顧問，也必將財源滾滾。但理論歸理論、事實歸事實，有時企業大王國也會頹敗，企業管理公司也會門可羅雀，因為事業經營，不僅牽扯到事、物，還有人，要把這三項綜合而運用自如，究竟不是光憑空談理論所能輕易處理得當，甚至有時以實際兼理論相互配合得天衣無縫的企劃，一旦實行後，往往也有出乎意料之外的失誤。


    假使失落徬徨會促使一個人去求神問卜，那我也經常在職務挫敗中，繼續不斷的去鑽研公司內部幾位關鍵人物的斗數命盤，從每一件事體成敗所涉及的事、物、時間、地點、與人的因緣契合，透過相關命盤，推尋其蛛絲馬跡，把所推論（由來而推恩的現象理由作成摘要，利用星期例假，勤跑何老師府上聆聽教益！我不敢說老師的耳提面命能使我一點即通，但在我無數次的劍湖之行和長期苦思默想的摸索之下，總算慢慢地悟出了所謂的緣起緣滅，和因果關聯性在斗數論命上的道理，從此理出了一些斗數法則與理念，才真正的體會到斗數之所以會流傳千年而不衰，更敬歎中國文明的可貴，和先賢道通天地的偉大。


    也許個人從年輕時，一直在十里洋場的台北討生活，以及工作環境所特具的遭遇，二十多年來雖然看過不少達官顯貴和富商巨賈的命例，但這些對我在斗數鑽研的幫助上，聊勝於無，也不足以據此炫耀，倒是在以文會友，但藉論命之便認識了不少商場上的朋友，在這些朋友中，有不少位把我看成他們事業經營中的另一種接觸。企業命理顧問，而且這一顧一問之間好多都已逾十年以上，也許他們樂得有這麼一個只要一杯咖啡、一頓便餐，就可以打發的既長期又便宜的顧問可以顧問問之，但我卻也在不同的大老闆的不同問題裡，得到不少的寶貴啓發與經驗，這使我想起老師曾說，一個稱職的醫生，必先經過長期的臨床訓練，一位名醫更需要十幾廿年以上繼續研究與磨練的道理。


    ## 斗數與實際人生


    醫生療人之病，命理探討人的榮枯福禍。若說醫生必須去熟悉醫理的相關學問，而搞命理的人只要曉得天干地支、陰陽五行的簡易道理，以及各類術數上的推演招式就可以為人斷休咎問福禍，那也未免太抬舉自己，而小看了這個如萬花筒般的大千世界。如果這個世界就是這麼單純簡單，那佛陀也不必以尊貴之身拋棄人生的榮華富貴、歷盡千劫萬難而悟道，更不必用八萬四千法門去普渡衆生，還要費盡口舌地爲他的門徒講經說法。


    我們知道人生一世由生而死，雖同禽鳥走獸、花草林木一樣最後仍要歸之於塵土，但人在這兩個起止點之間卻與其他萬物有太大的不同，何況是千億萬人，之衆絕難有二個人會有極近相似的相同命運，在古代如此，現代如此，將來更是如此。


    是從文明演變的觀點而言，當然有其無休止的進步和變化，我們的老祖宗說，后羿以神箭射日、嫦娥偷食靈藥而奔上月球，但是我們現在知道的是阿姆斯壯一九六九年登上月球，美國的太空船已在多年前脫離了太陽系，而奔向浩瀚無涯的太空，將來我們的子孫，將會登上太空飛行器作星際之旅，正如你我搭上七四七的噴射客機，往來世界觀光旅遊。


    儘管有些人一直在強調物質文明的進步，而人類的精神文明將是千古不變的，變也不離其宗。那麼讓我提醒你，若你對太老朽的歷史認識不多，可以問問老爺爺爺或老祖母，三、四十年前他們年輕時代所過的居住環境究竟如何？他們在食、衣、住、行、育、樂方面又是如何？問問老人家，從台南到台北，或是住在台灣西部的人，如何往來台東和花蓮之間？更要問問，當時的民情風俗、世道人心，究竟與現在有什麼相異差別！你儘管可以把老祖母的話當作白髮宮女話天寶蔥事一樣，當作故事在聽，但你却不能講老祖母在說謊話。


    若是你還上過現代的學堂，你應該念過羅馬大帝國的極盛期，但與吾中土的大人類的外觀長相，以生物進化論的觀點來說，千萬年之間，也許變化不多，但斗教與人生 · 38
