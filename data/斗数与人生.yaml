  md: '成傳宗接代的大事，這種事就是在當今的社會也屢見不鮮。元配夫人的不能生育，並不意味著責任全在女方，男方同樣也有可能造成不能生育的生理缺陷。因此生男育女之事，我們仍須考慮到單張命盤以外的其他因素或條件。


