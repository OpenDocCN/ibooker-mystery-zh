    這也是先天稟賦的一種。還有，人類的身體或個性的現象，有部份還是和先天遺傳的因素有關，但後天卻也有相當程度的影響，因此，這兩樣和先天的關係，在一個

    人成長以後已經不再是純先天（近世）的原有現象。


    我們知道，一個人從小得自家庭的教養和學校的教育，使他學習到各種技能，這種人在生下和長大以後，所受到環境上的教養，會影響到一個人一輩子的命運走向。一個農夫的孩子，從小學著耕田，長大以後也多半以耕田爲業。一個做生意家庭的孩子，長大以後，會去做生意，我們不能說這兩種孩子，先天上有什麼根本上的不同，而是因後天的影響才會有不同的行業。


    因此我們說，這種行業所造成的差別，完全在於後天的境遇所塑造，根本和先天上沒有絕對關係。但是在傳統的理念上，很多人都把這種現象混爲一談，一個人耕田、一個人作生意，完全是先天的關係。持這種看法的人，由於誤把一個人的影馨視爲先天作用，誤把斗數命理上的先

    後天混爲一談，在解釋無方之下，認定命身宮爲人生命運的一體兩面。我們認爲，這是根本誤解了先天和後天的根本意義，也誤用了先後天是命運的一體兩面的道理。'
