  md: '# # 僕役宮


    在斗數十二事項宮位中，這個爲遷移宮和官祿宮所夾的宮位，是近二十年來學習斗數論命學的人，所最容易誤解和誤用。早期的典籍，註明是奴僕宮或僕役宮，但近年或許由於某大著作的更改爲一交友」宮，再由這本口的暢銷，因此在斗數界很普遍地跟隨着沿用起來。甚至以爲，在人樹高張的今天，人們不應再存有什麼主僕的觀念，也正應上了這種觀念不洽、理念不明的錯誤，導致斗敗命盤上一說到人際關係時，不管兩者之間的關係如何（六鼠除外），一概以一交友」宮來論定，以一朋友一就是家門以外所有認識人的總稱。雖然我們可以同意這福泛論式的一般說法，但用在斗數命理的推演上，我們卻不能苟同這種魚魯不分、馬馮不別的胡亂歪理。這不但犯了以文官袋之弊，而且也扭曲了斗敗法則在這個宮位上的功能本義。'
