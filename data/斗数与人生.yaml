  md: '節，因此我們以爲要使命理成爲有用的經世致用之學，就應該採取一種能與實際人生結合的命理觀，才能使命理落實到實際的人生裡。基於這個理由，這門古傳命理就應該從基本的觀念上加以現代化，把時代的新觀念和新知識融入命理中，然後才能以一種新方法來加以發揚光大。若不如此，這門學術將不爲新時代所用，遲早會被時代所淘汰。


    V 我不知道個人是否由於天資遲鈍，或是因爲用功尚有不足，總覺得自己在斗數初學階段拉得很長。從正式拜師，到我覺得在推演方法上稍微有點譜的時候，已經是十年以後的事。因此我很羨慕那些得秘笈，一眼就可在命盤上窺盡天機的人。在這前十年間，我也曾參加了其他的斗數命理補習班，想藉經九個月，由初級、中級而高級的補習中，使論命功力提到高級境界。但很遺憾的是，我上完所有課程後，論命能力還是逗留在靈竅不開的階段，每當面臨命盤，那種茫然無知的洩氣，真是不足爲外人道。


    如今時過境遷，學習斗數前後算來亦有廿多年，雖然已經略有領會，但我還不知究竟懂了多少，只是使我深深的體會到，命理這種學術的學習和研究，絕對不是'
