  md: '# # 第四 他們將來在事業的表現都很近似嗎？


    若根據古傳祿命法則，有其命盤必有其人，近代的鐵口直斷的大師們也會說，他們的命盤如此，必然會有那種命理現象。但是一個現代人，只要他有現代人的一般常識，他們一定會同意這些同時出生的小孩，在兄弟姊妹的排行上究竟是老大或老二不一定相同，他們在一般體弱多病痛的幼年期，健康情況甚至在比較重大的病痛上，也不盡相似。他們的父母不只年齡不同、出身背景、當前家庭環境更不一定相似，可能有富貴人家，也有中產階級，甚至苦哈哈的勞工家庭。


    至於和先天遺傳極有密切關係的體格和聰明才智，更會因生身父母的不同而造成很大的差異。我們以爲實際上應該如此，這種現象用既知的常識就可判斷，用不着再作任何的統計和調查。假使有人又以出生時辰前、中、後又有很大的差別來揣測，那麼我們就以一百二十分鐘生五十個男孩（女孩）來計算，那麼平均每二點四分鐘生一個，也就是說十分鐘裡將生有四個小孩，假定其中有個小孩生下來不到滿月就夭折，或是生下就有先天性的生理缺陷，我們也不會認定同在十分鐘內生的小孩'
  merge: -1
  pgno: 270
- img_proc: true
  md: '都會有類似的現象。


    這種同時辰生竟然會有不同結果的現象，在古傳命理似未曾提及，而近代的斗數命理研究者亦從不曾探討，究竟為什麼會造成同命盤而不同命運的現象。我們以為，必然有它的原因和道理存在，若我們在人之初生就無法解決這些疑難，那麼我們又如何探討一個人長大後，投入萬丈紅塵中的人群社會，將有怎麼樣的命理走向？


    我們以為這個正是命理上的個別差異（條件）問題，才會有這種現象。剛出生的小孩如此，長大以後的大人更是如此，人人有個別的差異條件，而這些條件往往都摻雜著不同的命理因素和不同的非命理因素，但當這些所有的因素條件聚合在一起，如同物質因混合而起化學變化時，自然就產生很大的差異。因此我們認為，命運的走向趨勢，應將命理條件和所實際參合的其他非命理因素（條件），合參研判和分析否則會產生偏倚的推論，將無法使命理分析能和實際人生的際遇互相吻合。


    了解斗數命盤推演命理的道種道理後，我們自然不會再去對究竟有多少萬個命盤而耿耿於懷。'
