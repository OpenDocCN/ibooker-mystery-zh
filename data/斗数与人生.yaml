    王永慶先生曾經在一個公開場合約略地談到，台塑企業機構所以能有現在的成果，不單是人爲的努力因素，假定他的這些企業提早在數十年前經營，或晚數十年才經營，不一定就能如此，假使他的企業發展在東南亞的任何其他國家，而不是在台灣，也不可能會這樣。一位被台灣工商企業界喻爲企業經營之神的王先生，在功'
  - '[PAGE 234]


    成名就之后，竟然会谕出这种肺腑之言，而不把大功全揽在他一人身上，我们可以从他的谈话中意会出，他的全部事业乃在天时（不早不晚）、地利（良好的工商发达环境）、人和（企业人员的贡献心力）配合之下，才能有成（这些配合对王老闆都是顺旺的条件）。王老闆的企业王国如此，一个人的一生会是怎麽样的一个样子？不应该除了命理的條件以外就再无其他因素吧！？这应该是一件很浅显的道理，但我们不了解为什么命理界却不作如此想法。'
  - '[PAGE 235]


