  md: '說是在子平論法上，頗爲不簡單的八字，存心要考考他，試試他究竟有多少斤兩，竟敢明目張膽地想要揚名立萬。但千萬也沒想到，當我一進他的命相館時，他介紹完館裡的兩位朋友後，接著說「黃先生是我的父執輩，你們用斗數論命的那個命例正好可以討教，他在斗數的造詣，絕非你我所能比擬……」。如今我只記得，當時腦袋一楞，彷彿有常年饑餓，却被鷹啄著眼睛的感覺，千萬沒想到他會先下手爲強的這麼一手，常言道：「是非皆因多開口，禍福全爲強出頭」，若真是惹出丟人現眼的尷尬來，皆是咎由自取。因此也就既來之則安之，硬著頭皮，一腳踏進他們預佈的陣仗裡。


    現在已不再記得，那個極其希奇古怪，一生充滿傳奇性的命例內容，只記得，從此以後了無居士陸續不斷的以書信、電話和在碰面時跟我討論一些紫微斗數的問題，并利用我每次南下出差高雄的機會，找來客人要我論命。在這段高雄客串論命期間，經由了無居士而認識了慧耕，從此我不但過無寧日，甚至視出差高雄爲畏途。


