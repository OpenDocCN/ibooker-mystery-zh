    商以工廠老板的支票來請范老板背口，以便以期票方式交易。不知道是會計小姐無


    知或是為什麼，沒弄清楚支票金額和期限，就依要求地蓋上印鑑、背起口來，根本


    也弄不清楚支票背口，需要擔負起支付責任的法令規定，更糟的是，背口乙事，一


    直沒跟范老板知道。事情大概就是如此追般地使范老板背起黑鍋，而最後導致傾


    家蕩產，使經營十年有成的事業毀之於一旦。一個事業的興起，有待員工的通力協


    助，但用人不當，也會使一個經營得好好的事業趨於毀滅，事業之於用人，豈能不慎重？


    壬寅大限，天梁化祿、紫微化權、左輔化科、武曲化忌。天梁化祿是先天福德


    宮、後天僕役宮（良辰吉位），武曲化忌是先天僕役宮、是後天財帛宮。己未年祿存在


    午、流羊在未、流陀在巳、武曲化權、文曲化忌。此一年內先後發生兩次因職員職


    責疏漏和無知失貨，給范老板帶來事業大災禍。在僕役宮方面，壬寅大限會先天僕'
