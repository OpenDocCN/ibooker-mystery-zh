    第五，先天福德宫待壬午限时形成铃星武曲忌之凶格，甲子年巧成双忌夹忌（亦


    第六，福德宫的钱财指的是既有钱财，如有破财，就是一种既已拥有钱财上的


    亏失。所以陈女士在事实和命理现象都应上了，借出去的债，怎能收回？


    命理的推论就是要据实分析，有时有命理的现象而无事实的作为，就像地雷没


    踏到信管并不会引发爆炸。因此我们很肯定命理是一种诊断，如同医生诊疗病人一


