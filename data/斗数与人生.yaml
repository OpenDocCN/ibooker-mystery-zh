  md: '業經營上，我們可以把前者類分於買口業，而後者屬於生產事業，兩者不只事業型態不一致，在管理經營上也不一致，可能發生的有利條件和不利困難，根本就大不相同。


    近職業類型的差異，不只一般工商企業管理顧問的診斷上方法不同，而且在診斷後對應與應革的建議上差異更大。而在命理方面，我們以爲儘管在職業類型方面，近代斗數命理的研習者已能將星曜組合情況，作爲事業類型的理論分類，但並不能肯定某一種星曜類型，必定從事於某種行業，因爲一個人對所從事的行業，往往都是集合很多的條件和原因，而不一定全是想怎麼樣就能怎麼樣的充分自由意願，但這些條件也好、原因也好、意願也罷，常常是因人而異。


    在斗數的命盤上，並沒能充分顯出這些種種現象來。而這些種種現象，却成爲我們根據斗數命盤依理推論的必要根據資料，若缺乏這些資料的輸入，我們無論如何不能單靠命盤的星曜組合現象，就能談出與事實相符合的命理道理來。


    就以買口業和生產事業來說，在斗數命盤上顯示之有利星曜的結構並不相同，因此一個有利於從事買口業的人，並不意味著他一定也能經營生產事業而同樣順利。'
