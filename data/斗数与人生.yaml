  - '[PAGE 212]


    多，不但別個人家不會有閒言，就是元配太太也阻擋不了。高雄有位家世顯赫的望族，老先生現在除了元配夫人以外，還擁有四個妾，好像一把茶壺配了五個茶杯（民初大儒辜鴻銘曾說過「一把茶壺配六個茶杯」的話），倒也能維持得和諧相處。人間事就是這麼光怪陸離，好像無論如何很難有個必定的原則。


    因此在斗數論命上，我們只能說，這個人人在斗數命盤上顯示某一種類型的特性，而這個人在他一輩子裡，又如何去因應這種類型，然後我們才可能從這種類型現象，加上因應的條件去探討他，去研判他可能造成某種現象的結果。


    在斗數命理的推演上，我們不但要考慮到那個命盤所具備的個別條件，而且還要考慮到他的社會時代背景，即使如此，也並不意味着你就可以懂得推命，並能向問命者提供適中有用的建議。


    你可知道，一個醫生在他七年的醫學院學生時期，他要讀多少科目？除去共同科目不說，單就專業上的必修學分就高到二三○學分以上！一個醫學院剛畢業的年輕醫生，他仍須經過三、五年的臨床實習，才可能成爲一個稱職的醫生；至於功成名就的醫生，多半已經是四十歲以後的事。命理的推演雖然不像醫生療治身體上的'
  - '[PAGE 213]


    • 213 • 彩定命理的因索

    病痛，但就以人間榮枯禍福所牽涉到的問題之多之雜，恐怕也不見得比醫生醫病來

    得容易簡單。

    因此我們以爲，關於牽涉到人生一切層面的所有知識，必須廣泛，一個論命者

    可知道一個公司，以當前所擁有的條件及經營方式，三五年內的經營結果將如何？

    值得生產和工廠管理嗎？值得行銷管理嗎？值得財務管理和分析嗎？值得人事制度

    和管理嗎？懂得稅制法令嗎？如果在這些方面一無概念，在命理概念上只有「吉」

    和「凶」兩個正反的兩極答案，那將如何去告訴人家，他的事業已出現或將出現什

    麼樣的問題？應該如何去解決或防患？若多少有些認識，即使不很在行，但至少可

    以提醒問命者，將發生問題的部份，去請敦相關專家，要不然若只有「吉」或「凶」

    的答案，不但論命的人糊塗，問命者更會覺得茫然而不知所從。

    命、運不符—談一個農夫的命格

    一九八六年（丙戌）中，有位自認對斗數命理頗有心得的年輕朋友和幾位也略有'
  - '[PAGE 214]


    涉及的友人到舍下聊天，彼此交換斗數命理上的看法。由於這些朋友深知我對斗數

    命理一直採取一種學術研究的開放態度，因此一有心得的時候，很樂得光臨舍下品

    茶、談談他們新發現的高見，我也爲足不出戶而能聽得一些命理奇聞感到高興。

    由於這位年輕朋友對他所學的斗數，自負到幾乎旁若無人的地步，往往在口沫

    橫飛、高談闊論的時候，會令不懂命理的人認爲這個年不及卅的年輕人，命理的修

    習已到了道通天地的境界。我爲了挫挫他的銳氣，希望他別自信太滿，以免走火入

    魔，而妨害了他在修習斗數命理上的正確發展，因此在書櫃上，找出了這個己卯年

    （一九三九）一月十四日子時生的男命斗數盤來，要他針對這個命例在命格及財、官

    三項上的得失發表高見。


    當他接過命盤，喵過幾眼後，滿似胸羅萬機、智珠在握，朗朗上口的說道：「此

    人命身宮七殺座寅廟旺，紫府在中，爲七殺仰斗格，旺地逢紫微加吉，有生殺之權，

    武職最利，加左右昌曲魁鉞會合，極品之貴。本命六吉已會其半，雖不極品，不中

    亦不遠矣！」看來這個年青人，對星曜與格局賦性，背得滾瓜爛熟，難怪他那麼信

    心十足。接著又說：「由於命身同在寅，爲四馬之地，紫府在遷移宮，佳會魁鉞，'
  - '[PAGE 215]


