    張先生在事業經營上的挫折，我們試着從另一方面來分析。他的原因，我們發現到在命理的條件上，有他的一種特有的現象存在，或者亦因爲這個現象，使他起家，亦叫他落敗。這是個人的意見，僅提供同好者參考；若閣下不以爲然，不必去在意，更不值得大加批伐。因為對這種文字，個人了無興趣。


