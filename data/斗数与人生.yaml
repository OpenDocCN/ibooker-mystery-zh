    若以大限的官祿宮來看，己未年雖有流祿和先天祿存同座，又有流年的武曲化祿來會，但仍然難抵本命巨門化忌、流年文曲化忌和双羊陀夾煞（火星）的夾制，若再加上武曲的大限化忌冲擊，實在是表面平硯，而裏頭危機四伏。也許范老板在本命格類型上，就不屬於大發特發的老板命，因此才會在英年有爲、正當鴻圖大展之時，偏偏用上這種成事不足、敗事有餘的職員。我真不知道究竟是誰的錯？但是范老板却要獨自承擔一切苦果，這大概是中國人所說的恨命莫怨天吧！


