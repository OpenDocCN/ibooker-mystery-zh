    籮筐又一籮筐的理由，可以使專家教授們連續公開演講幾年都談不完，因為任何雞

    毛蒜皮的理由，都可以叫婚姻觸礁，一個算命先生也許可以從命盤裡頭推演斷出這

    椿婚姻觸了礁？但如果你不去考慮到究竟觸了什麼礁？又為什麼會觸礁？以及如何

    去排除這些礁石？那你的論命也等於白論。因為問題還是存在。

    而你要去了解這些問題，除了稍通斗數命理法則以外，至少你還需要兼備相關

