  md: '梅香一想到這些事，就有一種不祥的感覺，莫不是診所裡鬧鬼了？


    謝內兒科開業已近二十年，謝醫師不但醫術高明，也很有醫德，可以說是一位仁心仁術的好醫師；診所裡也從來沒發生過醫療糾紛，這二十年來一直平安順利。診所是一棟三樓的透天厝，謝醫師一家人就住在二樓和三樓，他們另有樓梯出入，不必經過診所。診所後院加蓋的房間是宿舍，梅香就住在那裡。


    這三個星期來，怪事連連發生，住在後院的梅香，下了班也不敢在診所多停留，只敢待在自己的房裡。後院有一個小門可以出入，她有時要上街逛逛，寄信或買點東西，就不必穿越診所，直接從後門走就行了。


    怪事接連著發生，謝醫師一家人都感到困惑，又不敢張揚，怕驚動鄰居，也怕病人知道了不敢上門。平時不信邪的謝醫師，這幾天也會趁著沒病人的空檔，躺在注射室的病床上，雖然沒有被不明的力量推下床，但不知是不是心理作用，他也能感覺到一股陰森之氣，還恍惚覺得屋裡有人影晃動。


