    「她會不會好奇跟著同學一起吸毒,你們當家長的被蒙在鼓裡?」

    「我女兒絕對不會吸毒!」醫生的懷疑令岑風不禁生起氣來。

    也難怪醫生會這麼懷疑,因為媛媛的行為就像吸毒之後的反應,醫生總要問個清楚,才好辨別病情。


    經過各種檢查,驗血、驗尿、照X光,一切都很正常,既沒有像醫生所懷疑吃錯過敏藥,也沒有服用迷幻藥,但是媛媛的病例上寫的是一「行為異常」。

    以「行為異常」住進醫院的媛媛,躺在病床上,反而顯得異常的安靜,不但不再哭鬧,還睡得很沉,想叫她吃飯、喝水,卻怎麼也叫不醒。岑風和玉嬋以爲女兒哭累了、鬧累了,才會睡得這麼沉。就這樣在醫院睡了一天,看著好像沒事了,才出院回家了。回家的車上,媛媛仍然熟睡不醒;回到家,岑風抱她上床,她的眼睛都沒睜開過。


    媛媛這一睡,又睡了三天。三天以來不吃,不喝,不拉,還叫不醒。三天過後,她揉揉眼睛,悠悠的醒了過來,卻完全記不得這些三天來所發生的任何事。這是李家惡夢的開始。

    媛媛生病了,而且還病得不輕。這第一次病發,從烤肉回來開始發燒,接著過敏,精


