    這麼多多年來，小嫻幾乎已經死了心了，也好累了，於是她不再到處奔波求診，只定期的來看姜大夫的門診，拿一點肌肉鬆弛或止痛的藥，在必要時服用。


    不可捉摸的疼痛，漸漸使她的左腳開始萎縮。愛漂亮的小嫻，不再穿短裙了，只能穿長褲或長裙遮掩她有點變形的腿。她的外表看去雖然仍舊光鮮亮麗，但是隨時都在疼痛的腳，經常使她不由自主的皺起眉頭；有點萎縮的腿，使她走起路來備感吃力，不知不覺的竟跛了起來。這對時髦漂亮的小嫻來說，真是情何以堪！


