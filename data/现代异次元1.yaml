    # 深山何處鐘


    手握著方向盤，眼睛望著前方，時而向四處張望一下，吳慕涵把車速定在八十公里，不快不慢，以方便自己做事。


    上了高速公路以後，開了好長一段路，已經過了苗栗，這一路上，都平靜無事，讓他覺得意外。路上如此乾淨，有點反常，令他感到不安。


    每隔一段時間，吳慕涵總會開著自己那一輛小車，到全省各地轉一轉，超渡在外遊蕩的孤魂野鬼。可是今年以來，不肯歸位的靈界朋友忽然變少，這原本是件好事，但是令他不安的原因是國家社會如此不平靜，正是天災人禍的多事之秋，很多天理昭彰的事，變得速戰速決，各種報應來得比以前快，現世報的情況也越來越多，連靈界朋友也有點心急，以前可以慢慢遊蕩的，現在卻急於找到氣場相近的人相隨，在外遊蕩的自然就少了許多，'
  - '[PAGE 288]


    因此會有更多的人受到干擾而出事，怎不令他憂心忡忡。

    他的這種憂心，旁人是無法了解的。為靈界做事這十五年來，他看到的實在太多了，各種無奇不有的事，令人無法想像。也因爲遇到過各式各樣的情況，所以他的應變能力，也愈來愈靈活。他心想，這一切對他來說，都是考驗。在不斷的考驗中，他才能進步。


    。


    。


    。


    這一趟南下，除了一路超渡之外，他還要去見幾位老朋友。下了台中交流道，幾個拐彎之後，他看到一個身穿白色汗衫、深咖啡色短褲的靈界朋友，輕飄飄的在一處工地上徘徊，好像迷失了方向。那身影好熟悉，很像是周仔的父親周老伯，難道周老伯是在這附近車禍過世的嗎？為什麼魂魄沒有引回家中，還在外面飄蕩？

    吳慕涵加快速度，直奔周仔家中。周仔是他多年老友，周老伯半個月前過世時，他正在印度雲遊，沒能到靈前捻香，所以回國後無論如何也要到台中走一趟。

    到了周仔家，他們一家人都還在喪親的哀悽中，吳慕涵張眼一看，周老伯的靈位牌上是空的。


