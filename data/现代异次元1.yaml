    # 超生？


    吳慕涵曾經告訴我們,嬰靈是還未出生就被終結的犧牲者,難免有不滿和怨氣,才會留連不去;若爲他立了牌位,他可能會因貪戀供養而更無法離開,因此而永世不得超生。這雖是嬰靈本身的無明而引起,但是卻是殘忍的人類所設下的陷阱。爲祖先立牌位是完全不同的,祖先已經順利出生,而且活了一輩子,在該走的時候離開人世,可能早就投胎轉世或往生極樂世界了,爲祖先立牌位,是後世子孫飲水思源,慎終追遠的孝思,有家族血脈相傳,延續香火的用意;更有人類社會生生不息和民族傳承的意義在內。


    也有人問,為何祖墳的氣場會影響到子孫的氣場?其影響的方法為何總是讓子孫生病?或事業婚姻有障礙?


    長久以來以訛傳訛,讓許多人以爲祖墳的風水出了問題,會禍及子孫,甚至有人認爲祖先可能有什麼不滿而向子孫報復。這些說法是一場誤會,也冤枉了祖先。吳慕涵常被問到這種問題,他會義正嚴辭的說,祖先生前疼愛子孫,死後庇佑子孫,怎會做出對子孫不利的事呢?祖先和後世子孫因爲血緣關係而一脈相傳,這是割不斷的臍帶,因此祖先和子孫之間磁場是相連的,這種磁場無遠弗屆,子孫即使長年旅居海外也一樣能緊密相連。所


