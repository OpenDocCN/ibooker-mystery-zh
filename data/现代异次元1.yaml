    # 虛空界驅魔的執照？


    不管電影的結局如何，佛教、道教、天主教和基督教都有驅魔的說法，而我國也有很多跟捉鬼有關的民間故事。或許，除了人，宇宙間還存在著許多看不見的生命，平時大家相安無事，在自己的空間裡過日子，但偶而會時空錯亂，為某種原因而碰撞出火花。


    曾惠英的事，使卓敏對事物的看法有了改變。的確，發生這麼不可思議的事，使她的許多基本認知都動搖了。下了班，她不想直接回家，她必須一個人靜一靜，好好想一想。


    她把車開到山坡上，停在半山腰，打開車窗，讓有點微寒的風吹進車裡。


    山腳下萬家燈火，點點燈光彷彿閃亮的星子。天空中閃爍的星光，反而比不上人工的星光亮，但那種遙遠的、稀落的、幽靜的光，在黑沉沉的天幕上，散發出一種不可及的、幽遠的神秘光采。


    卓敏凝視著那遙遠國度裡的神秘，感覺那正像第四空間般的令人費解。人，的確很渺小，而宇宙太大，也太不可知。


    天上的星星好像在移動位置，正在重新排列組合。莫不是她眼花了，重新排列的圖案，竟是那位神秘男子吳慕涵的臉，他的嘴角還帶著笑意，彷彿正在「笑傲人間」。


