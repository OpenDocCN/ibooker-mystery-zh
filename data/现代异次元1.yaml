    解決的方法沒有公式，必須視個別的狀況而決定。

    先談談如何保護自己。吳慕涵常常告訴我們，最重要的是隨時都要保持正信正念，對外面的世界要以是否合乎正法正道來判斷，只要不合乎正道的，聰明的人就要即刻遠離。還有，自己的直覺也很重要。有一次與陳國鎭敎授聊天，談到如何辨別正和邪，他說要相信自己的直覺。直覺，是當事情發生的剎那，自己的第一個反應。直覺，其實就是靈感，是我們自己靈性的感應，一般來說是滿正確的，除非你的靈已經被干擾了或衰弱無力，那當然另當別論。


    另外，吳慕涵很強調的一點就是前面提過的——尊重。他常說不管你相不相信靈界的存在，心存尊重，總不會錯。平日待人處世，也該如此，何況對待無所不在的無形界呢！你尊重他，他也以禮相待，彼此就不容易磨擦碰撞，各過各的，互不干擾。有時候，我們覺得自己受到干擾了，事實上是我們干擾了他們，因為人類過度開發，把許多靈界的地盤納入人的版圖，我們侵犯了他們，對不起他們在先，又不尊重他們，再有修養的靈界衆生也會不高興。人類令他們無家可歸，他們自然而然的會找與其氣場相近的人跟隨左右，受影響的人當然會感覺不對勁，因爲會來干擾人的靈界朋友，也是被無明所惑才會如此。


