    # 何去了解靈的世界?


    此書中收錄的十個故事,全部都是真人真事,但為了保護當事人,故事中主角的身分、背景和姓名都加以變更,連書中具有特異功能且通靈的高人也用化名。這本書的出版,不是為任何人做宣傳,只是筆者寫出近幾年來的所見所聞,比較了存在已久的民間靈療,以及長久以來以訛傳訛,積非成是的許多觀念之後,覺得有必要將這些故事寫出來,提供給讀者一個反面的思考。


    或許很多人會認為靈療是無稽之談,是迷信,因為不論是靈受傷或是有高人能為靈魂療傷,都是看不見,摸不到,嗅不著的事,叫人難以相信其真實性。這裡要特別強調一個例子,〈落花時節又逢君〉故事中的翠玲和莉莉,她們長期受到電磁場的影響,一個身體感到不適,一個甚至無法生育,醫生均查不出原因,後來經過高人指點,把床頭和床尾的音響、電視移開,身體的不適不但不藥而癒,不能生育的也很快就懷孕了。電磁場是看不到、摸不到、嗅不到的,不過,當你打開電源開關,電燈即刻大放光明;打開音響,廣播節目或音樂就透過天線的接收而發音;打開電視,精采的節目就呈現在螢光幕上;可見肉眼看不見的電波、磁波、輻射充斥在四周,我們毫無所覺;從事電磁場與電磁輻射相關報


