  md: '# 人生密碼


    李玉屏，作家，曾獲梁實秋文學獎、中國文藝獎章報導文學獎、《中央日報》探親文學獎、省新聞處與《中華日報》合辦短篇小說獎、教育部創作研究獎等


    認識本書的靈魂人物吳慕涵，是少雯介紹的。

    我和少雯是「以文相會」。那是民國七十七年。那年，少雯以一篇〈鴛鴦被面〉得了台灣省新聞處和《中華日報》合辦的短篇小說獎。在頒獎典禮上，我們同台受獎，因此認識而成了朋友。


    這個時期的少雯，受託於行政院農業委員會和綠化協會的聘請，走遍全省的名山大川，寫就了一篇篇的大塊文章，如〈森林是水的故鄉〉、〈山到絕頂我為峰〉、〈泥岩世界〉、〈綠滿人間〉，以及〈又見桃花舞春風〉等大著。她的生花妙筆、她的專業知識和她實地採訪的親身感受，讓她獲得《中央日報》的報導文學獎、《聯合報》的環保文學


    ◇人生密碼⋯⋯1'
