    ## 人生密碼


    李玉屏，作家，曾獲梁實秋文學獎、中國文藝獎章報導文學獎、《中央日報》探親文學獎、省新聞處與《中華日報》合辦短篇小說獎、教育部創作研究獎等


    認識本書的靈魂人物吳慕涵，是少雯介紹的。

    我和少雯是「以文相會」。那是民國七十七年。那年，少雯以一篇〈鴛鴦被面〉得了台灣省新聞處和《中華日報》合辦的短篇小說獎。在頒獎典禮上，我們同台受獎，因此認識而成了朋友。


    這個時期的少雯，受託於行政院農業委員會和綠化協會的聘請，走遍全省的名山大川，寫就了一篇篇的大塊文章，如〈森林是水的故鄉〉、〈山到絕頂我為峰〉、〈泥岩世界〉、〈綠滿人間〉，以及〈又見桃花舞春風〉等大著。她的生花妙筆、她的專業知識和她實地採訪的親身感受，讓她獲得《中央日報》的報導文學獎、《聯合報》的環保文學獎，中國文藝獎章散文獎，以及國家級的中山文藝散文獎。


    少雯的專題採訪，大部分是由中興新村的水土保持局安排的。她從台北下來，總是先到我中興新村的家住上一晚。有時候，我倆同受行政院新聞局或是省新聞處之邀，作專題採訪時，也經常在外地住上幾天，同房共室，喝茶聊天，我們就這樣越來越近了。


    跟少雯相處，非常容易，因為少雯單純實在，看人看物，總是看到好的一面，所以她創作的小說裡，沒有壞人；她周遭的世界中，俱是美學：路邊的一朵小花、葉上的一滴露珠、靜靜的流水，或是清晨的朝陽，都令她感動。好多個早上，她讓我坐在她家的陽台上，欣賞觀音山的莊嚴、淡水河的柔情，以及藍天上雲層的千變萬化⋯⋯。她常說：以青山為伴、看綠水長流、與好友談心、有文章可寫，人生之幸也！


    少雯要寫的文章實在太多了：為了把綠化和環保的概念往下紮根，她為《國語日報》的小朋友寫下長篇連載的〈樹哥哥花妹妹〉、〈神奇的汗衫〉，以及人物的報導，如〈跑啊！跑！〉寫的是亞洲羚羊紀政，《心向太陽》寫的是黃乃輝（腦神經痲痺患者）的成長過程。此外，少雯還寫電視劇本，在華視頻道播出的「詩歌童唱」，以及大愛電視台的「佳勳姐姐說故事」，都是少雯的傑作，還有她的《氣功不神秘》。


    少雯練氣功是十幾年前的事，當時的少雯，身體不好，經常鼻塞感冒，嚴重的時候手腳還有腫脹現象。她開始學打坐，練氣功。


    練了氣功，少雯的體質有了改變，不僅健康如昔，因每日練氣的關係，還知道了許多「氣」能治病的原理。她把自己練功的心得寫了出來，在《中華日報》刊出後，引起了相當大的迴響，她就這樣以自身的經歷，一篇篇地寫，許多讀者，隨著她的文章，靜坐練氣，和她一同精進。這個「氣功不神秘」的專欄，每週刊出一篇，連續了四年之久。她的「氣功」專欄，被大地出版社的前任社長姚宜媖大姐相中，她喜歡少雯以文學的筆觸來闡述練功的心得，把氣功文學化了。姚大姐在出版界向以精挑細選出名，果然少雯的《氣功不神秘》出版後，很受歡迎。在問世近十年後，最近大地出版社又將此一套三本的書，重新改版推出，仍然暢銷，少雯的功力，可見一斑！


    因「氣功」的媒介，少雯認識了吳慕涵先生。說來都是緣分吧！那一次，少雯參加中央研究院的氣功研究計劃，這個氣功營在宜蘭的棲蘭山莊舉行。氣功營的學員中，有人覺得混身不舒服，晚上也不好睡，總是惡夢連連，於是一位師姊就請來了具有特異功能的吳慕涵先生。吳先生的到來，以及他為學員解惑除「病」的手法，讓少雯了解到宇宙是個多度空間而又開闊的世界。這種觀念的形成，改變了她對時空的看法。


    吳慕涵原本服務於紡織界，一念之間，放棄了一切，踏入一個更寬廣、更無邊的境界。外人看來，他是「從有到無」。但是對他本人來說，這人生的轉折，絕非偶然，失去的只是紅塵俗念，換來的卻是一種前所未有的時空異能，這種「從無到有」的能力，讓他面對另一番的人生境地。


    那一天，我到台北去看少雯。

    天，下著濛濛的細雨⋯⋯。

    少雯說，我們到陽明山去聽聽雨聲、喝喝咖啡，再給妳介紹吳慕涵先生。

    我對吳先生的印象，早從少雯的細述中，有了相當的認識，雖是初次見面，心理上總覺得像是去看望老朋友般的自在。可是見到吳先生的剎那，卻讓我有些兒驚奇，他不是我想像中的仙風道骨型；他的體形壯碩，兩肩開闊，深沉的眼睛和一根挺直的鼻梁，再加上黑中帶紅的膚色，我的第一個反應是，他像一位南美洲的酋長。


    吳先生看到我們，說聲哈囉，也不問我們愛不愛喝咖啡，就開始煮水。當陣陣的濃香隨著咖啡的沸騰，在屋裡迴盪時，我在心裡說：果然是從南美來的！


    吳先生的房子，布置得簡單、清雅，客廳有擺滿書的書櫃和幾幅字畫，還有一張長桌、幾把椅子；打坐間裡擺了三、四個竹墊；牆上掛了一幅南美洲秘魯印加古國馬丘比丘的太陽圖騰；另個房間擺了一台造形典雅、色澤圓潤的古琴和一個豎立的琴譜架。


    我們進門的時候，吳先生正在聽古琴，少雯說：好聽。我們三人就在古琴和雨聲的雙重奏中，喝著咖啡，聊起天來⋯⋯。


    說著說著，說到他自己，說他如何從一個什麼都不信的無神論者，變成不但相信各種宗教，尊重各種教派，而且認爲不同的宗教是爲了順應當地的風土民情和種族而有區分，它們的源頭都是相同的；接著又談到他如何從「人」的身上，得到種種訊息。


    吳先生的前段話，我聽懂了，後段話中的一「訊息」兩字，我聽不懂。吳先生舉例說，就像兩個初次見面的陌生人，他們看到的只是對方的外表。就像一台電腦擺在桌上，一個不懂電腦的人，看到的只是電腦的外殼，那只是一個硬體，若沒有去實際操作，就無法了解裡面的軟體。但是當兩個陌生人變成朋友之後，彼此有了深入的認識，知道對方的家庭情況、工作、人品、信仰，以及身體的健康與否等。這些資訊，就是這個「人」的軟體。簡單地說，只要跟這個人有關的事，都可以從這些軟體上得到訊息。


    我想到我家老公。我請吳先生解讀一下。


    吳先生笑笑，要我伸出手掌，他用他的手輕放在我的手掌上。然後，像透視鏡般地，描繪那個和我結縭了三十多年的老伴：高高瘦瘦的身材、滿含文墨的氣質，以及他外柔內剛的個性等⋯⋯。


    一個完全陌生的人，竟能在剎那間，進入到我遠在中部的家，看到我的家人、了解他的個性。我驚訝地看著吳先生，這雙看似平常的手，卻有如此不凡的能力！同時，我也對自己的身體肅然起敬，原來以爲我們的身體只是個酒囊飯袋，想不到身體內居然還隱藏了我的人生密碼。


    幸運的，我認識了一位能解讀密碼的人。


    之後，我每次上台北，總會和少雯到陽明山去喝杯咖啡，和吳先生聊聊天。經常，會在那裡遇到一些奇妙的事：


    有一次，有位教書法的老師送了一幅《三國演義》的「滾滾長江東逝水⋯⋯」給他的學生。這個學生很高興地把老師的字拿來給吳先生看。吳先生看了看，皺皺眉頭，用手在這幅字上慢慢地感覺，然後說，寫這個字的人肝部有病。這個學生一臉訝異，這位書法老師在半個月前，才因爲肝癌到醫院動過手術，目前仍在家中療養！


    還有一次，有位朋友的長輩到苗栗去旅遊，莫名其妙地失蹤了，兩天沒有消息，家人和旅行社的人都急得不得了，也報了警，仍然下落不明。這位朋友到山上來找吳先生幫忙。吳先生要他拿那位失蹤者的照片和一張苗栗的地圖來。


    那位朋友汗流浹背地跑下山；很快地，就匆匆拿著照片和地圖跑上山來了。


    吳先生看過照片後，就用手在地圖上慢慢地找。忽然手停止了。吳先生指著地圖上的那一點說：老人家就在這裡，很安全，只是身體很虛弱。這位朋友一聽，飛也似跑下山去找人了。


    果然，那位七十歲的老人家就在地圖的那一點上被家人找到了。原來他一個人去上厕所，蹲得太久，走出廁所時，看不到和他同遊的遊伴，他東找西找，結果迷了方向，越走越偏，走到了山崖處，摔了跤，腳踝受了傷。他只得在荒涼的草叢中，等人來救⋯⋯。


    一張久遠的書法、一張老照片都留有與這個人相關的訊息。這就是「人生密碼」吧！


    「人生密碼」除了透露這個人的身體情況、心懷思念、婚姻關係、兒女緣分外，甚至還隱藏了這個人的前世今生，以及前世今生所造成的因果和業障，夠玄吧！


    好奇心的關係，我就這樣經常來到這間半山腰的小屋。這兒，總是客來客往的，我在這裡認識了那位得過肝癌的書法老師、年輕活潑的睡美人、患紅斑性狼瘡的快樂母親、古琴的女主人，以及多位本書中的主角。


    有一次，大夥兒在聊天，聊到一些民間的民俗療法，譬如有些人家碰上有原因不明的夜哭小兒時，經常會寫張紙貼在人來人往的牆上或電線桿上，上面寫著：「我家有個夜啼郎，⋯⋯仁人君子唸一遍，小兒一覺到天明。」民間一般常用這種簡單的方法，來驅除夜魔。還有些人無緣無故的生病，醫藥都治不好，大都認爲這是被外靈侵入後，產生驚嚇或附身所致。


    這種被外靈入侵，令人受到「驚嚇」或「鬼附身」之說，早在中國的《春秋左傳》中，就有記載：


    周成公十年（西元前五八一年），晉侯做了個夢。夢見一個長髮著地的惡鬼。這個惡鬼說，因為晉侯無緣無故地殺了他的兩個孫子，所以他在得到地府閻君的允許後，來向晉侯討命。


    晉侯夢醒,心驚肉跳,因懼而病,特地派人到秦國去請來當時最好的醫師來為他治病。醫師尚未到達,晉侯終日昏睡。睡夢中,夢見他身體內有兩個小鬼在商議該怎麼辦。一個說:「從秦國來的名醫,醫術非常高明,如果他傷害我們,我們逃到哪裡去呢?」另一個小鬼說:「放心啦,只要我們躲在肓之上、膏之下,就安全了。因為在這兩個穴道之間,針灸不達、藥石不至,豈奈我何!」果然,當秦國的名醫為晉侯看診後,搖搖頭說:「晉侯之病在膏肓之間,良醫也不可為也!」這是成語「病入膏肓」的來源。


    七年前,我曾把這個歷史事件編成舞台劇。劇中的晉侯就是晉景公。晉景公受屠岸賈之惑,殺了晉國的開國元勳趙盾全家。晉景公體內的兩個小鬼就是當時被殺的趙同與趙括。趙家唯一倖免於難的,是一位身懷有孕的莊姬公主。莊姬公主在宮中生下一名男嬰,怕屠岸賈趕盡殺絕、斬草除根,偷偷地將男嬰交給趙家的忠僕程嬰,由程嬰帶出宮去撫養。這名男嬰就是舞台上的趙氏孤兒,長大成人後,報了家仇血恨,又重整家國,他就是歷史上有名的趙武。


    從整個事件的來龍去脈來看,「病入膏肓」的另個意義,就是一般人所說的因果報應，也就是前面提到的「前世今生的因果」。同時，我們也發現，身體內除了五臟六腑外，還有空間可藏外靈。外靈的入侵影響到身體的正常運轉，產生了聽筒聽不見、顯微鏡顯不出的「另類疾病」。


    少雯在本書中所寫的，大都是這種另類疾病，另類疾病就得要另類醫師來治；此書中的「另類醫師」就是吳慕涵先生。


    少雯把吳先生治癒病人的經過與原由，一篇篇地寫出來，結集成這本書。其目的只是告訴讀者如何修練我們的身心。身體要健康，心靈更要澄淨。因為當心靈受到污染時，身體就處於虛弱。虛弱的身心，即使沒有受到因果律的循環影響，也容易招惹到外靈的干擾，這就叫「乘虛而入」。


    少雯的書要出版了。她要我爲她寫篇序文，主要的原因是她書中的人物，我幾乎都認識，也知道吳先生在處理事情時的整個過程。另外，少雯下筆，一向謹慎，對她來說，寫出這些故事，是爲了提供讀者另一個思考的空間。


    我有幸在少雯出版此書時，爲我的兩位好友：少雯和吳先生，以文字表達我的慶賀之意。同時，也讓自己在這本書中，留下一絲訊息，和少許的「人生密碼」。


    ## 生命之奇也多


    陳國鎮，清華大學物理學博士，曾任東吳大學理學院院長、物理系系主任、圓覺文教基金會董事長，現任東吳大學物理學系專任教授、圓覺文教基金會董事、教師


    繁多的生命類型，奇特的生命現象，絕非想像所能企及，也無法用文字罄書其情景。生命之存在與互動，既精微、奧妙且緊密相繫。面對十方皆有生命的世界，唯有捐除一隅成見，以仁慈而開明之心懷相與對待，方能彼此認識而共存共榮。


    隨著年紀之增長，我慶幸沒有自我囿限，能踏出專業認知而涉獵其他事物。尤足安慰者，在生命廣度的認知上，竟能逐年有些開展。年輕時的茅塞漸漸撥開，如此見識之增長，要感謝我所遇到的奇人異士，從他們異乎常人的知覺與言行裡，讓我看懂諸多生命的通性，逐漸明白生命之形式不可勝數，形形色色存在宇宙裡，瀰漫六合無處不有，但都要遵循一定的法則，無一能夠胡作非為。許多奇妙的生命現象，雖然常有悖俗難解之處，卻無不隱然合乎大自然之情理。


    自科技高度發展以後，大家逐漸崇尚物質文明的生活，精神文明之進展非但相形見絀，甚且常被視為無用不實之舉。長期以來，物質文明的標準凌駕一切，處處以它的尺度來衡量事物，彷彿它成了揭示真理的不二法門，是非或舉措之定奪，捨此即無他途可行。但凡不合其準則者，即遭鄙夷或斥逐，皆判為非科學或無稽怪誕之事。殊不知科學原有其嚴守之分際，守分者絕不逾越雷池一步，非其分內所能評議之事，誓不輕易置喙，言行何其謹慎。然逾分自恃者，常妄作非議之詞，橫議外行之事，陷科學於猖狂、傲慢與無限上綱之威權，辱沒科學之清名而不自知，其過之大何可言之！


    及今生命科學縱然已研究至基因解碼，總其事功仍不脫離生命物質與能量之探索，至於生命其餘層次之幽微、深奧與奇妙，依舊遠在生命科學工作者所能思議之上。接觸生命並非始自近代，古聖先賢早已循不同途徑深入細究過，所得見地既深且廣，較之今人亦不遑多讓。因此面逢生命奇異現象時，爰引前賢之所識，自然可以妥為理解其中之曲折。


    現代知識分子常礙於專業之見，又多喜新厭舊，不愛引述古人先見之明，自阻於一己門戶之閉鎖，而不敢向前邁步，因之生命視野不開，心胸不能廣闊，陷自己身心與才智於困厄之境者舉目皆是。百年來人類生活雖極富裕，然精神文明之進展卻甚為有限，非但遠殿於物質文明之後，甚且倒退者亦有之，世道人心故此失衡且日漸趨向偏激與暴力。


    生命實無一可獨自生存，都需要與周遭衆生維持良好關係，方能長久存活與增長靈性。環繞在每一個人身旁，皆有許多有緣衆生。親密者近，生疏者遠，統而言之，約可大分為兩界，一是有形，一是無形。有形者具有身軀以爲表象，無形者雖無身軀，依然存在屬實。


    形體有無兩界雖是實虛立判，卻能彼此互動不息，共同交織成宇宙中廣袤無垠的生態。人世之順逆情境，非僅軀體可究其因果，常需上溯法身或報身之緣由。故區區人力與知識，常無力以挽回傾頹之勢。遇此迷障或執此冤結之難，非藉寬闊之生命頻譜以爲參稽，不足以斷疑解惑。如何衡情酌理以化解惱人心神、傷人體膚之苦患，皆需依此而行，始能應乎天理。


    何人得以執其事而勝其職？無他！唯有能受命於天，且能爲而不有、功成不居者，才堪榮任其職。如此之人，胸中無得利失意之情，一心燭照青蒼，替天行道而已，故其志意遠非好開宗立戶者所能望其項背。託熱心朋友之引介，有幸得以認識吳慕涵先生，始知綏撫三界之事，依舊須名正言順而始可為之，非自告奮勇即能荷擔其重責。


    在知名作家林少雯小姐流暢的筆勢下，每個慕涵先生所化解的故事，皆有神來之筆、扣人心弦的情節，直叫人讀之驚奇不已。慕涵先生撥亂返正之靈心妙法，實在難以盡按常理索解。當他為人指點迷津時，實似常人之親眼目睹，皆一語道破問題癥結，教人當下心折信服；在他收攝迭宕的危厄之時，則如激流斷水，讓苦難倏然轉向或消失，讓人得以回歸風平浪靜之日；在引人入道時，他又如行雲流水，教人悅服以從，意正心誠走回正道，讓當事者與旁觀者宛如登高遠望，心境與智慧亦隨之開顯。如是點撥度化世人於危難之中，任運善巧方便常不落痕跡者，直可謂「智度衆生」。


    書中一一故事俱是實情所記，聚十則以成此書者，非供茶餘趣談之資，乃以勸醒世人應及時勤行八正道，修身養性，慈愛衆生，廣結善緣，庶幾心智靈性得以提昇，普天之下方有河清海晏之日，而衆生亦有甘露共沐之期。


    ## 自序：當靈魂受傷時


    修行、修道或靈修，已經成為現代人的一種時髦追求。


    想要追求靈性成長的，可以分為好幾種。有些人是生活到了一個水準之後，想要彌補心中失去的那個區域，因此走上修行路；有些人天生就比較有靈性，也喜歡接觸跟靈或宗教相關的事物；有些人一心想要提昇自己，讓心靈有所皈依；也有些人是因為身邊有想要修行的朋友，所以也一起參與，尋求一種認同。


    修行要修什麼？從字面上來看，修行就是修正自己的行為，如何修正呢？當然是必須放下一些染污我們靈魂的事物，才能增長靈性，讓蓋住靈性光芒的障礙，一層層的剝除。


    東方人所說的修行，或許並不完全等同於西方人所謂的靈修，不過追求靈性成長的用信相信是一樣的。修行的人要將生活和觀念擺在佛陀教導我們的八正道，或是儒家所教導我們的四維八德，以及靜、定、安、慮、得上，而且能確實做到，讓行住坐臥等日常生活、思想、待人接物、言語、態度都合乎中庸之道，就是一個好的修行者。靈修也是一樣，不論是大師、指導者、成長課程，都是在教人如何調攝其心，提昇靈魂的層次。


    更加精進的修行，是能夠讓靈魂清淨無染。很多修行者會遇到的問題，是在修行時總是障礙重重，這些障礙有身體上的、心靈上的；因此，他們尋尋覓覓，一年一年，總尋不到個出口，心越修越不安，身體也越修越不好。離身心安適似乎越來越遠。


    為什麼會這樣呢？是機緣未到？是走錯路？是繞了遠路？還是迷路？原因可能是沒能遇見真正的善知識，所以總是在修行路上徘徊；或跟錯了導師，讓自己暴露在不好氣場之中，而不知不覺，甚至不進反退。但是，自己深層的自性其實不斷的在排斥，在抗拒，想要去除這些干擾，因此，感覺比較敏銳的人，就經常會覺得心中不夠踏實，或者身體不適，甚至愈來愈沒自信，有人甚至開始懷疑起自己該不該走上這條路。


    修行的最終目的，如果是為了讓靈魂提昇，讓自己更清楚明白的話，那麼應該在一個正確的基礎上起步，也就是靈魂必須是完整的，因為當一個人的靈魂不完整時，只會越修越糟。'
