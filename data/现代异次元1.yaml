  - '[PAGE 236]


    「真的是妳！」翠玲驚異的打量小嫻。

    「當然是我，不一樣了吧！」小嫻說著轉了一下圈子。

    「真的不痛了？」翠玲又不信的問。

    「真的不痛了。」小嫻肯定的回答。

    「好替你高興！」翠玲忍不住站起來擁抱了一下小嫻。

    「怎麼那麼親熱啊？發生了什麼事嗎？」後面有人說話，還輕拍了她們的肩膀。

    「莉莉，我的腳好了，妳看！」小嫻回頭看見莉莉，急忙展示她的雙腳。

    「真的？」莉莉仔細端詳她的腳，萎縮變形的地方都不見了，回復了從前的勻稱細緻。

    「恭喜！恭喜！」


    咖啡的香濃氣味，在空氣中縈繞，起士蛋糕的香甜滋味，在舌尖停佇；三個從高中時代就是死黨的好朋友，分享著這一段日子來的生活經歷。


    ◇現代異次元——十則靈療的故事 196'
  - '[PAGE 237]


    五、六年前，小嫻的腳忽然開始覺得疼痛，這種疼痛常常令她坐立難安，去看醫生又說不出個痛處，因爲疼痛的位置似乎經常轉移，時而左腳，時而右腳，時而大腿，時而小腿，無法捉摸。起先的一點小疼痛，小嫻因爲上班忙，並不在意，後來愈來愈痛，再忙也得去求診了。


    她先看了西醫骨科，照了X光，兩隻腳都沒事，可是疼痛未減，令醫生都皺起了眉頭，不知該如何向她解釋。看了一段期間的西醫，毫無進展之後，她轉而向中醫求診，試過針灸、推拿、拔罐，還有親戚朋友推薦的各種偏方，全告失效。


    失望之餘，小嫻常常看著自己的雙腳，不知這外表毫無異狀，肌肉和骨骼也都正常的腳，為何會不明原因的疼痛？她心想，會疼痛，一定是有原因的，她非把原因找出來不可。


    在朋友的介紹下，她又轉向西醫，開始看神經內科。親切的姜大夫，是相當有聲望的醫生，詳細的為她做所有該做的檢查，仍然找不出問題在哪裡？在給姜大夫診治期間，小嫻的病情依舊，不但沒有改善，還漸漸趨於嚴重。小嫻透過一個長輩介紹，特地去日本找一位神經內科的權威醫師診治，一樣一點幫助也沒有。


    ◇落花時節又逢君…… 197'
  - '[PAGE 238]


    這麼多多年來，小嫻幾乎已經死了心了，也好累了，於是她不再到處奔波求診，只定期的來看姜大夫的門診，拿一點肌肉鬆弛或止痛的藥，在必要時服用。


    不可捉摸的疼痛，漸漸使她的左腳開始萎縮。愛漂亮的小嫻，不再穿短裙了，只能穿長褲或長裙遮掩她有點變形的腿。她的外表看去雖然仍舊光鮮亮麗，但是隨時都在疼痛的腳，經常使她不由自主的皺起眉頭；有點萎縮的腿，使她走起路來備感吃力，不知不覺的竟跛了起來。這對時髦漂亮的小嫻來說，真是情何以堪！


    最讓她心酸的還是相戀了五年，已經論及婚嫁的男友胡秉康，竟在四處陪她求診，病情毫無改善，而且愈來愈嚴重後，逐漸疏遠她，最後消失無蹤。要不是莉莉和翠玲不斷的安慰她，為她打氣，她可能早就崩潰了。


    事情開始有轉機是在兩個多月前，有一天，小嫻參加同事的婚宴。坐在小嫻身邊的映雪，一直絮絮叨叨跟她說著話，剛開始小嫻並沒有很注意聽，心中還覺得有點煩，嘴裡有一句沒一句的應和著。後來映雪提到她媽媽的失眠，二十幾年來看遍了中西醫，吃盡了各種偏方都好不了，上個月親戚介紹一位高人，她媽只看了一次，到現在一個多月了，每天晚上都很好睡，連安眠藥都丟掉了。


    ◇現代異次元——十則靈療的故事 198'
  - '[PAGE 239]


    「那位高人開了什麼藥給你媽吃？」小嫻很有興趣的問道。

    「什麼藥也沒開，他又不是醫生。」

    「那他怎麼看？」

    「他看人的靈，從靈上為人解決問題。」

    「這是哪一門醫術？我從來沒聽說過？」

    「這位高人是用特異功能幫人治病的，怎麼治我也不清楚，不過我媽就這樣好了，不信也得信。」

    「可不可以介紹我認識，妳知道我的腳⋯⋯。」

    「我就是想介紹妳去給這位高人看看，所以才跟妳提這件事。」

    就這樣，熱心的映雪帶著小嫻一起去拜見這位異人。

    當她們來到吳慕涵的小屋時，屋中高朋滿座，幾個朋友把小屋擠滿，正在喝茶嗑瓜子和花生。平日落落大方的小嫻，面對一堆陌生人，忽然覺得靦腆起來，不知如何開口說話。

    吳慕涵瞥了她一眼，丟下客人，把映雪和小嫻讓到一旁的小廳。


    ◇落花時節又逢君⋯⋯199'
  - '[PAGE 240]


    「吳老師，這位就是我跟你提起過的鄭小嫻。」

    吳慕涵仔細端詳小嫻，似乎在感應什麼，然後微笑著說：

    「我們素不相識，但是朋友一介紹妳就來了，我想你一定已經走投無路了，該看該做的都經歷了。」吳慕涵微笑著說。

    聽吳慕涵這一說，小嫻多年來的辛酸一湧而上，又想起秉康棄她而去的心傷，不禁悲從中來，但她強忍著淚，只是點點頭表示回答。

    「既然妳來了，妳就相信我，先不要問為什麼，去做就好了，妳願意嗎？」

    理智告訴她，應該先問清楚要做些什麼才能考慮該不該做，萬一這位高人只是騙人的神棍，豈不是太危險了嗎？但是吳慕涵親切的語氣，值得信賴的濃眉大眼和堅定的眼神，使她毫不遲疑的答應了。

    「妳到某某寺院去，禮拜兩次水懺，拜完之後再來找我。不過在拜的期間，妳的腳可能會更痛，要忍耐。」

    吳慕涵不願意多說什麼，小嫻有一肚子疑問，也不知該從何問起，而且吳慕涵也不希望她多問，只要她去做就好了。'
  - '[PAGE 241]


    走出吳慕涵小屋的時候，小嫻感到好無助。要她去拜拜，這算什麼看病呢？她到底是去或不去，著實很叫人掙扎。拜了，她的腳痛病因就能找出來？或是，她的病就能痊癒？都好叫人費思量。是不是她身上有一些醫學無法解釋的致病原因，吳慕涵不願意說出來，難道真相很嚇人？或根本就是他在裝神弄鬼，想嚇唬她？只要她信了一次，接下去就會有第二次、第三次，神棍騙人詐財騙色的事不是時有所聞嗎？她要往下跳嗎？這會是個陷阱嗎？很多被騙的人，不也是因爲走投無路，姑且一試因此才吃虧上當的嗎？


    「妳就去試試看嘛！又沒什麼損失，當成是運動，對身體也有幫助。」映雪看她猶豫不決，反倒勸起她來。


    「好吧！」在自己無法拿定主意時，有朋友在一旁幫忙做決定還是不錯的。


    映雪還好心的幫小嫻查了某某寺院水懺的時間，才知道水懺法會一個月才做一次，所以拜完是兩個月以後的事了。


    既然決心要去拜拜，小嫻就找了翠玲和莉莉陪她一起去，小嫻在寺院佛堂裡跟隨法師和信衆一起禮拜時，翠玲和莉莉就在佛堂外爲她加油打氣。


    從小嫻決定要去拜拜後，她的腳痛得比以前厲害，拜完第一次之後，腳痛更加劇，翠


