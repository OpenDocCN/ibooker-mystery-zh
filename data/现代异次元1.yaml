    「因為，她在阿財身上看到一位洋鬼子在玩二十一點。」

    「真的有這回事？」

    「阿品伯這才說出他們去賭城的事。阿喜就說阿財是被賭鬼上身了；她說好賭的人聚在一起賭博時，旁邊經常會有賭鬼圍一圈在觀戰，所以到底是他們在玩，還是賭鬼在玩，都分不清哩。」

    「別嚇人好不好，亂恐怖的！」

    「妳怕什麼？妳又不賭博。」

    「賭鬼就是那時候上身的嗎？」

    「有可能。好賭的人，有時候內心也是很掙扎的，他想戒賭，只是意志力不夠，為什麼不夠？有些是自己的問題，有些是因為受到這些無形界所影響，不但很難戒，賭性還越來越堅強。」

    「你的意思是說，那些生前好賭，賭到傾家蕩產，最後不得善終的人，死後還不瞑目，成了賭鬼，流連賭場，還上賭徒的身，使他們天天都想去賭博，想戒也戒不掉，還越來越上癮？」

    「對，我就是想說這個。」

    「那阿喜怎麼救阿財？」

    「她畫了兩張符，一張燒了，要阿財喝符水，一張貼在他房間門口。」

    「好神喔！阿財現在都不賭了，原來是這樣好起來的。」

    「媽，我告訴你這件事的意思，是在想要不要請阿喜來看看阿爸？」

    「阿興，你真的覺得阿爸中邪了？」

    「不是中邪怎麼會這樣？」

    「那就請阿喜來看看你阿爸好了。」

    「媽，妳既然說好，我就去請阿品伯打電話，麻煩他安排阿喜來我們家一趟。」


    不知為何，阿喜的電話老是打不通，會不會出國？在等待的那些日子，阿海的情況愈來愈嚴重了。


    不過，說也奇怪，阿霞發現阿海早上都很正常，每天天還沒亮，就和阿霞騎著摩托車到田裡去收割花卉，等著車子來把花收走，他就開始在田裡忙，一直到中午回家吃過午飯，過了一點以後人才開始不對勁，尤其到了晚上，情況更嚴重。


    「黃色的影子又過來了！走開，走開！」有時他會無緣無故的大叫。

    「好美的姬百合，黃色的喔！」有時他會摸摸自己的臉，輕聲的自言自語，看起來溫柔極了。


    過了中午以後，家裡每個人都密切注意阿海的行蹤，只要他走到大門前，想出去時，就會有人過來拉著他坐下來，不讓他出門。


    「阿爸，來吃水果啦！」今天輪到正興的妹妹正瑜負責盯住阿海，爲此，她特別請了一天休假。


    「誰是妳阿爸？」

    「你不是我阿爸，那你是誰？」

    「我是誰關妳什麼事？我姓張，妳又是誰？妳姓什麼？」


    不管阿海說什麼，正瑜都能跟他對答如流，想盡辦法留住他，分散他的注意力，使他忘了要出門這回事。


    「這黃色的衣服，好漂亮。」阿海扯著身上的T恤。

    「這件衣服很好看，但不是黃色的，是藍色的。」

    「真奇怪，這衣服一下子藍色，一下又變成黃色，是我的眼睛花了。」

    「對，你六十幾歲，老花眼了。」

    「亂講，我才四十幾歲，把我說得那麼老，人人都叫我帥哥呢。」

    「蟀哥，是蟋蟀的蟀嗎？」

    「妳這女孩，真是不懂禮貌，我可是頂頂有名的大情聖呢！」

    「我有眼不識泰山，失敬，失敬！」


    正瑜最會跟胡言亂語的阿海聊個沒完，阿音在廚房裡聽了，都會忍不住笑出來。阿海自從中邪之後，常常神情恍惚，自己在做什麼都不知道，不過溫和的時候，跟他胡說八道，他都很高興的有說有笑。但是，有時候脾氣拗起來，就會破口大罵，還直追著阿霞跑，吵個沒完沒了，被家人關進房間裡，慾望又無法得逞時，就會不停的敲打著門，像個瘋子一樣。


    憂心的阿霞，只能每天在神桌前燒香拜拜，祈求菩薩和祖先保佑，不要讓阿海鬧出什麼事來。


    「媽，阿喜一直聯絡不上，我們乾脆直接去北部找她。」有一天正興下班回來跟阿霞建議。


    「這樣也好，不然要等到哪一天，阿爸越來越嚴重了，好叫人擔心喔！」不等阿霞回答，正瑜就搶著說。


    「這樣也好，正興你去問阿品伯要阿喜的地址，我們帶你阿爸去。」決定北上之後，他和正瑜都請了一天休假，陪著母親，帶著父親，開著車一起上北部一趟。


    找到阿喜家時，他們嚇了一跳，因為門裡門外都擠滿了人，一片嗡嗡的講話聲。


    「沒想到這裡這麼興，早知道就該早一點來。」正瑜說。


    「你們來找阿喜收驚？」旁邊一位老先生問。


    「是啊！這麼多人，看样子要等很久。」

    「阿喜已經不能幫人看了。」

    「為什麼，這麼多人不是都來給她看的嗎？」

    「他們是來看熱鬧的。」

    「看什麼熱鬧？」

    「你不知道喔！阿喜幫人收驚，自己反而被驚嚇到。」

    「怎麼會？」

    「怎麼不會。這行不是人人能做的，要有天命，又領有靈界執照的人，才可以替天行道。」

    「阿喜不是嗎？聽說她很靈驗。」

    「以前是很靈驗沒錯，她忽然有了神通，會起乩，能預測村中即將發生的大小事情，開始有人來她家中求神問卜，她也幫人驅邪看病，不過現在出事啦！」

    「哥，看样子阿喜不是神通，是被鬼魅上身。」正瑜小聲的在正興耳邊說。

    「這麼多人來看什麼熱鬧？」


    「今天有個不知死活的人，從台北來治阿喜，大家都認爲他是來送死的。那個人姓吳，是那邊理大平頭那位阿泰的親戚，這個姓吳的竟然敢答應這攤子事，不知他有多大本領，我真是替他擔心。」老先生指著門口一位叫阿泰的中年男人說著。


    「為什麼？阿喜有那麼嚴重嗎？」


    「不嚴重怎麼會花了一百多萬都沒看好呢！阿喜天天都像見到鬼一樣，每晚燒金紙燒到天亮。」


    「怎麼發生的？」


    「阿喜自己覺得不對勁，沒事也在自言自語，她很害怕，原來她不是神通，而是不知惹到了那一路的魔煞，她覺得事態嚴重，到處找神壇幫她驅邪，可是越驅越嚴重，後來找了一間很有名望的神壇，把神轎和乩童都請來，搖旗、做法，忙了一大攤，還是沒有用，這樣前前後後就花了上百萬，加上自己天天燒那麼多紙錢⋯⋯。」


    「聽起來怪可怕的，哥，我看我們還是回去吧！」正瑜說。


    「阿喜都已經泥菩薩過河，自身難保了，媽，我們回去再想辦法好了。」


    「你們不看熱鬧啊！今天這攤很有看頭，可能會有一場大鬥法。」


    「不看了，怪嚇人的！還是回家好了。」正瑜又說。


    正興一家人正準備動身回去，這時人群中一陣騷動。

    「來了，來了！」好幾個人邊伸長脖子往外望邊說著。


    正興轉頭望去，只見穿著T恤和牛仔褲，腳下踏著一雙涼鞋的吳慕涵大踏步走了進來。他微昂著頭，走路的姿勢也四平八穩，眼神有點銳利，一副自信又不亢不卑的樣子。


    阿泰一見吳慕涵，立刻迎了上去，將他接進屋裡，與阿喜的先生寒喧了幾句。正興很注意觀察這位被人質疑的吳慕涵，他似乎不願意多說話，只用眼光掃了在場的村人一眼。


    這時村人都在議論紛紛，因為這位據說有特異功能的人，不但單槍匹馬，而且兩手空空而來，他們不知道這位看去很有把握的高人，要如何對付阿喜身上的魔煞。因為，來看熱鬧的人，幾乎都期待著看到一場搖旗吶喊，鑼鼓喧天，刀光劍影和紙錢火焰飛舞的場面。


    阿喜這時候才由她的婆婆扶著出來，夜夜失眠的她，臉色慘敗鐵青，滿面黑氣，那樣子有點嚇人，見到她，人群中又是一陣騷動。


    「你們一家人都有事，身體都出了狀況，但是我要從神桌先看起，把陽宅和陰宅的氣場先調整好。因為陽宅和陰宅像一個家庭的屋頂和地基，這些基礎安好沒事，住在裡面的人才會平安。若是只看人，人沒事了，但是仍然住在氣場有問題的屋子裡，很快又有事了，等於白看。」吳慕涵看著阿喜一家人說道。


    「老師，拜託你救救我。」阿喜有氣沒力的請求。


    吳慕涵回頭朝神桌望去，他看到神桌上一片烏煙瘴氣，氣場大亂。


    「你們家供養了三尊神像，太多了，要真的神佛有靈也只會有一位過來跟你們共修，人不應該太貪心，想把神佛都請回家，那是不可能的，除非你是什麼大聖人，要真的是大聖人，不必請那麼多神回家拜，神佛自然都會來護持。請來那麼多神像，如果自己的修持不夠，神明早就離開了，空的神像容易被其他界佔據，享用你供養的香火，家裡的氣場就不對了，住在裡面的人自然受到影響。」吳慕涵看著阿喜家的神桌語重心長的說，似乎也有意說給在場的人聽。


    「那現在該怎麼辦？」阿喜問。


    「中國人都說家家觀世音，戶戶阿彌陀，我幫你留一尊觀音菩薩像，其他兩尊收起來燒掉。」


    「請老師作主就好。」阿喜說。


    吳慕涵直視著桌上的神像，喉嚨裡發出大大小小的嗝聲。


    「那位老師不知在做什麼？」正瑜很好奇，小聲的問正興。


    「我不知道。」正興說。


    「他正在跟靈界對話。」阿泰正好在他們後面，於是回答道。


    「跟靈界對話？好神奇喔！這麼直接就可以溝通？他是怎麼做到的？」正瑜又問。


    「天生的使命吧！他可以看到一般人看不到的，還會使用靈界的語言，像他這樣的人不多了。」


    這時，吳慕涵忽然大嗝了三聲，聲音之大，把在場的人都嚇了一跳。


    「這是怎麼一回事啊？」正瑜問道。


    「那三尊神像都被不好的東西佔了，吳老師跟他們溝通了半天，他們終於同意讓他渡走，現在已經走了。」阿泰說。


    「這樣就走了？不必做法什麼的嗎？」老先生問。


    「這位老師不是道士，不是法師，也不是乩童，他不必藉助那些人間法，就可以直接做事。」

    「哇！那他是什麼人啊？」

    「你自己去想囉！」


    正興和正瑜一聽，看看阿霞，大家心裡都想著同一件事，就是想請這位老師看看阿海。


    阿海今天出奇的安靜，他看著吳慕涵的眼神，有幾分畏懼，所以時常把頭垂得低低的，還一直想要出去，但是阿霞緊緊的牽著他的手，不讓他走。


    「他這麼簡單就把事情辦完了？」老先生不信的問，他似乎有些失望，因為以為有一場熱鬧好看。


    「沒錯，他現在用紅布把兩尊神像包起來，神桌上只留一尊觀音像。」


    只見吳慕涵把另兩尊用紅布包住的神像拿到門口，一把火把它們燒了。


    圍觀的人都在竊竊私語，有人覺得這是對神明大大的不敬。


    「沒有靈的神像，只是泥塑木雕而已，有什麼敬不敬的。」吳慕涵有意的反駁道。


    燒完了神像，吳慕涵走回神桌前，大夥兒又跟著他走進去。


    「現在，只剩一尊觀世音菩薩像了，不過，這一尊神像目前還是空的，靈還沒有上去。」阿泰小聲在正瑜耳邊說。


    這時，吳慕涵又大大的嗝了一聲。


    「他這一聲，是請來一位跟阿喜家有緣，願意跟他們一起共修的觀世音菩薩，請祂上座。」


    這時，吳慕涵站在神桌左邊阿喜家的祖先牌位前，又嗝了幾聲。


    「靈界的語言，我們很難聽懂。」正瑜說。


    「這幾聲，是把阿喜家被惡煞趕跑的祖先請回來歸位。」阿泰又在講解著。


    「陽宅和陰宅已調整好，神桌上現在清淨了，整間屋子也乾淨了，外在因素都去除，以後只要不再去招惹，家裡就可以平安。」吳慕涵對阿喜說。


    「那阿喜人呢，她身上還是不平安。」有人叫著。


    「現在可以開始清身體了，家裡氣場一團糟，住在裡面不會太好過，人是貪心不得的，人在做，天在看；想求神通，自己修爲要夠，這種事不是求得來的，但是有求的心，就容易被利用，很危險，請神容易送神難。本分做人最重要。」吳慕涵說著走到沙發上坐下來。


    他幫阿喜的家人一一檢查身體，把他們身上不好的氣場排除。由於這些不好氣場的影響，阿喜的公公天天腰痠，婆婆頭痛、心悸，丈夫胸口悶，兒子和女兒讀書精神無法集中，全家人都經常做惡夢，每一樣症狀都被吳慕涵說中，不僅阿喜一家人覺得訝異，連在場的人都嘖嘖稱奇。


    「老師，看你這麼簡單就把一切都弄好，不知道你是怎麼弄的，真的很神奇！這裡面有很多我們凡夫俗子不懂的東西，我們本來是來看熱鬧的，現在不但大開了眼界，還很佩服。可不可以也請你幫我們檢查一下身體。」老先生改變態度，很誠懇的提出要求。


    「有何不可？」吳慕涵說著，環顧在場的人，然後用手指著幾個人，接著說：「這幾位，請你們出去，不信的人我是不看的。」


    正興和正瑜覺得吳慕涵真是厲害，他點出來的這幾個人，今天都是來湊熱鬧的，剛才不停的在低聲交談，一直說這些都是迷信，都是裝神弄鬼，這次阿喜一定又被騙了。


    被點名的這幾個人，都嚇了一跳，他們小聲的講話，吳慕涵是聽不到的，莫非他懂讀心術？被點出來，他們感覺很沒面子，幾個人悻悻然的出去了。


    吳慕涵為在場的每一個人檢查身體時，一一指出他們身上的不適之處，並加以排除。


    「這人怎麼這麼厲害，完全不必用醫學的檢驗儀器，就知道人們身上有肝病、糖尿病、血脂肪過高，高血壓，連便秘、腸子脹氣他都知道，實在神奇！」老先生對坐在他身旁的正興說。


    老先生剛剛被吳慕涵檢查出心臟三條血管中的一條阻塞了。


    「這是屬於身體的疾病，你要去找醫生治療，我沒辦法，我只幫人治靈體的病。」吳慕涵這樣對他說。


    「真準，我前天才檢查出心血管有問題，醫生幫我預約了下星期住院做心導管檢查，太不可思議了，佩服，佩服！」


    吳慕涵在檢查阿海時，皺了一下眉頭，阿霞的心馬上一沉，知道阿海的情況特殊。而阿海更是奇怪，他坐在吳慕涵前面，不但坐立不安，還不敢直視他，一副很害怕的樣子。


    「阿海，坐好。」阿霞用手肘輕碰他。


    「沒關係，他的反應很正常。這位先生，你的情形在這裡是看不好的，你家陽宅有事，要到家裡去看才可以解決。」吳慕涵果然如是說。


    正興立刻向吳慕涵要了電話，準備等他忙完再與他約時間，請他到家中去一趟。


    「媽，那我們就帶阿爸先回家。」正瑜建議。


    正興一家人謝過吳慕涵和主人家之後，先行離去。


    回家之後幾天，正興用電話和阿喜聯絡，得知她的情況在第二天開始好轉，三天以後完全回復正常。正興問她以後還幫人看嗎？她回答說再也不敢了。


    「吳先生，請進。」阿霞很恭敬的迎在門口。


    吳慕涵走進阿海家時，是一個星期天的早上。


    阿音奉上茶水，阿霞請吳慕涵在客廳坐下。


    「我家阿海今天一直想出去，不知道在害怕什麼？嘴裡不停說著『怕怕！怕怕！』我們不讓他出去，他就躲在房間裡。」阿霞很煩惱的說著。


    「這是很正常的現象，因為他身上的無形界朋友很害怕見到我。」

    「害怕什麼？」阿霞疑惑的問。


    「媽，因為他知道有高人來了。」正興小聲在阿霞耳邊說著。

    「喔！原來是這樣！」阿霞恍然大悟。

    「吳先生，我阿爸躲起來了，現在該怎麼辦？」正瑜也很憂心的問。


    吳慕涵喝著茶，看了一眼他們家客廳的角落，那裡晃過一個黃色的影子，一霎時閃進旁邊的房間裡。


    「沒關係，不急，你們想辦法把他請出來。他的本靈還在，本靈出來的時候，聽到你們叫他，自然就會走出來。」


    阿霞走到阿海的房間門口，輕言輕語的說道：

    「海仔，茶泡好了，快出來喝。」

    「怕怕！怕怕！我不出去。」

    「家裡有客人來，你是主人，這樣太沒禮貌了。」

    「不行，我不能出去，這位客人太厲害了，我很怕他。」

    「不會的，這位客人是個大好人，他很想跟你聊聊天。」


    阿霞費了許多唇舌，後來連正興和正瑜也加入勸說，好不容易才把阿海從房間裡騙出來。


    阿霞牽著阿海的手，帶他坐在吳慕涵的對面。


    「喫茶啦！阿海。」吳慕涵遞過去一杯茶。


    阿海很害怕的接過來，一口就乾杯了。


    「免驚，愛穿黃色的衣服啊？黃色的百合花也很漂亮。」吳慕涵看著阿海說。


    阿海頭垂得低低的，不回答。


    正瑜聽了，不由得睜大了眼睛。他忽然想起阿爸在不對勁時，經常跟她提到黃色的衣服和花的事，她都以為那只是阿爸在胡說八道，原來阿爸真的是被這些事物所困，在裡面掙扎著，無法脫身。


    「你坐在這裡，慢慢喝茶，等我一下，好嗎？」吳慕涵安撫著阿海，然後自己站起來在客廳和房間四處走走看看。


    吳慕涵看似閒閒的瀏覽著，其實他正在清理屋中的煞氣，一切都處理好，沒問題了，才又走過來坐在阿海對面，直視著他，喉嚨裡大大的嗝了一聲，這時候的阿海一剎時清醒了過來，眼神中的迷惘一掃而空，忽然變得又清又亮。


    「阿爸回過神了。」正興一臉的興奮，看著身旁的阿霞和正瑜說。

    「謝天謝地！」正瑜也說道。

    「真是阿彌陀佛，多虧了吳老師。」阿霞的眼裡含著淚。

    「阿海，現在你沒事了。」

    「謝謝老師的大恩大德。」阿海說話的語氣也回復了正常。

    「不必謝，算我們有緣吧！」

    「老師，我最近知道自己出事了，因為有一股很強的力量拉著我去做一些莫名奇妙的事，有時候自己可以控制，有時候又控制不了。」阿海說。

    「你身上有一位穿著黃色衣服男人的靈，大約四十幾歲，那位男人很風流，經常出入風月場所，他愛上一位妓女，那位妓女很喜歡一種非常少見的黃色百合花，所以你經常會以爲自己穿著黃色衣服，手上還拿著黃百合，我有沒有說錯？」

    「老師，你說的都對，我以爲自己發瘋了，或是有幻想，原來是被色鬼上身了。」

    「老師，阿海為什麼會被色鬼上身？」阿霞問。

    「有時候是因為氣場弱，人倒楣時也容易被上身；有時候是自己心念引來的。人的起心動念，會跟四周的氣場相應，所以經常要有正念，才不會到處招惹。」

    「聽到老師說的沒有，心裡不要黑白想，自己去招惹，能怪誰？」阿霞指著阿海說。

    「我哪有！」

    「媽，過去就算了，以後小心點就好。」正興為父母親打圓場。

    「我們行事做人，最重要的是行八正道，八正道不只是佛教法輪常轉的教義而已，也是我們老祖宗傳下來的孔孟思想的精神所在，就連基督教裡面的一個很大的教派，叫東正教的，他們也是用八正道來轉法輪的。」


    吳慕涵要正興拿出紙和筆，他在紙上寫著：正見、正思維、正語、正業、正命、正精進、正念、正定等八正道。


    「船在大海上航行，除了依靠指南針辨別東西南北，還要靠舵來轉到正確的方向，可見這舵有多重要。舵的形狀也是法輪的形狀，這是在告訴航海的人，要學習八正道的法輪，不偏不倚，走中道，才不會迷航。」

    「老師，你今天說的話，對我們來說一輩子都受用無窮，人生是不能迷航的，有時候一迷，走不回來就慘了。」


    大夥兒說說聊聊的，談得非常投機。靈巧的阿音早已經在廚房裡大顯身手，準備一桌清淡的素菜，要好好請這位有緣的高人享用一頓素宴。


    阿海就這樣痊癒了。


    阿海身上乾淨了，阿霞也不再避他，從三樓搬下來住回她和阿海的房間，夫妻生活也回復了正常。


    阿海每天照常在花田裡工作，和阿霞出雙入對的。


    只是，當阿海又走進黃色姬百合田裡時，剛開始心理覺得有點毛毛的，不過他想起吳慕涵說的話，爲自己做足了心理建設，讓身上充滿正氣，才走進田裡去。


    現在，阿海不但不再害怕，當他直視黃色姬百合時，還覺得姬百合美得出奇，跟以前看起來大不相同。


    ## 落花時節又逢君


    午後的陽光，亮燦燦的穿透樹葉的縫隙，潑灑在紅磚人行道上，像灑下白花花的碎銀子。


    翠玲倚著玻璃窗往外望，街上人來人往，腳步匆忙。走在大都會時髦街道上的男女，個個衣著光鮮，尤其是女人，更是時尚的追求者，每次和小嫻、莉莉約在這家咖啡店喝下午茶，她都會提前半個多小時前來，只爲了欣賞窗外紅男綠女的英姿和倩影。


    遠遠的，她看到一位打扮入時的女子，腳蹬兩吋高跟鞋，抬頭挺胸，婀娜多姿的穿過街道，朝這邊的騎樓過來。直到走近了，她才猛然認出那是小嫻。


    怎麼可能？不會是自己眼花了吧？這個充滿了自信的女子會是小嫻嗎？翠玲心中還在疑惑著，只見那位女子已經推門而入，直直朝她走過來。'
  mdcn: '「她為什麼會這樣問？」

    「因為，她在阿財身上看到一位洋鬼子在玩二十一點。」

    「真的有這回事？」

    「阿品伯這才說出他們去賭城的事。阿喜就說阿財是被賭鬼上身了；她說好賭的人聚在一起賭博時，旁邊經常會有賭鬼圍一圈在觀戰，所以到底是他們在玩，還是賭鬼在玩，都分不清哩。」

    「別嚇人好不好，亂恐怖的！」

    「妳怕什麼？妳又不賭博。」

    「賭鬼就是那時候上身的嗎？」

    「有可能。好賭的人，有時候內心也是很掙扎的，他想戒賭，只是意志力不夠，為什麼不夠？有些是自己的問題，有些是因為受到這些無形界所影響，不但很難戒，賭性還越來越堅強。」

    「你的意思是說，那些生前好賭，賭到傾家蕩產，最後不得善終的人，死後還不瞑目，成了賭鬼，流連賭場，還上賭徒的身，使他們天天都想去賭博，想戒也戒不掉，還越來越上癮？」

    「對，我就是想說這個。」

    「那阿喜怎麼救阿財？」

    「她畫了兩張符，一張燒了，要阿財喝符水，一張貼在他房間門口。」

    「好神喔！阿財現在都不賭了，原來是這樣好起來的。」

    「媽，我告訴你這件事的意思，是在想要不要請阿喜來看看阿爸？」

    「阿興，你真的覺得阿爸中邪了？」

    「不是中邪怎麼會這樣？」

    「那就請阿喜來看看你阿爸好了。」

    「媽，妳既然說好，我就去請阿品伯打電話，麻煩他安排阿喜來我們家一趟。」


    不知為何，阿喜的電話老是打不通，會不會出國？在等待的那些日子，阿海的情況愈來愈嚴重了。


    不過，說也奇怪，阿霞發現阿海早上都很正常，每天天還沒亮，就和阿霞騎著摩托車到田裡去收割花卉，等著車子來把花收走，他就開始在田裡忙，一直到中午回家吃過午飯，過了一點以後人才開始不對勁，尤其到了晚上，情況更嚴重。


    「黃色的影子又過來了！走開，走開！」有時他會無緣無故的大叫。

    「好美的姬百合，黃色的喔！」有時他會摸摸自己的臉，輕聲的自言自語，看起來溫柔極了。


    過了中午以後，家裡每個人都密切注意阿海的行蹤，只要他走到大門前，想出去時，就會有人過來拉著他坐下來，不讓他出門。


    「阿爸，來吃水果啦！」今天輪到正興的妹妹正瑜負責盯住阿海，爲此，她特別請了一天休假。


    「誰是妳阿爸？」

    「你不是我阿爸，那你是誰？」

    「我是誰關妳什麼事？我姓張，妳又是誰？妳姓什麼？」


    不管阿海說什麼，正瑜都能跟他對答如流，想盡辦法留住他，分散他的注意力，使他忘了要出門這回事。


    「這黃色的衣服，好漂亮。」阿海扯著身上的T恤。

    「這件衣服很好看，但不是黃色的，是藍色的。」

    「真奇怪，這衣服一下子藍色，一下又變成黃色，是我的眼睛花了。」

    「對，你六十幾歲，老花眼了。」

    「亂講，我才四十幾歲，把我說得那麼老，人人都叫我帥哥呢。」

    「蟀哥，是蟋蟀的蟀嗎？」

    「妳這女孩，真是不懂禮貌，我可是頂頂有名的大情聖呢！」

    「我有眼不識泰山，失敬，失敬！」


    正瑜最會跟胡言亂語的阿海聊個沒完，阿音在廚房裡聽了，都會忍不住笑出來。阿海自從中邪之後，常常神情恍惚，自己在做什麼都不知道，不過溫和的時候，跟他胡說八道，他都很高興的有說有笑。但是，有時候脾氣拗起來，就會破口大罵，還直追著阿霞跑，吵個沒完沒了，被家人關進房間裡，慾望又無法得逞時，就會不停的敲打著門，像個瘋子一樣。


    憂心的阿霞，只能每天在神桌前燒香拜拜，祈求菩薩和祖先保佑，不要讓阿海鬧出什麼事來。


    「媽，阿喜一直聯絡不上，我們乾脆直接去北部找她。」有一天正興下班回來跟阿霞建議。


    「這樣也好，不然要等到哪一天，阿爸越來越嚴重了，好叫人擔心喔！」不等阿霞回答，正瑜就搶著說。


    「這樣也好，正興你去問阿品伯要阿喜的地址，我們帶你阿爸去。」決定北上之後，他和正瑜都請了一天休假，陪著母親，帶著父親，開著車一起上北部一趟。


    找到阿喜家時，他們嚇了一跳，因為門裡門外都擠滿了人，一片嗡嗡的講話聲。


    「沒想到這裡這麼興，早知道就該早一點來。」正瑜說。


    「你們來找阿喜收驚？」旁邊一位老先生問。


    「是啊！這麼多人，看样子要等很久。」

    「阿喜已經不能幫人看了。」

    「為什麼，這麼多人不是都來給她看的嗎？」

    「他們是來看熱鬧的。」

    「看什麼熱鬧？」

    「你不知道喔！阿喜幫人收驚，自己反而被驚嚇到。」

    「怎麼會？」

    「怎麼不會。這行不是人人能做的，要有天命，又領有靈界執照的人，才可以替天行道。」

    「阿喜不是嗎？聽說她很靈驗。」

    「以前是很靈驗沒錯，她忽然有了神通，會起乩，能預測村中即將發生的大小事情，開始有人來她家中求神問卜，她也幫人驅邪看病，不過現在出事啦！」

    「哥，看样子阿喜不是神通，是被鬼魅上身。」正瑜小聲的在正興耳邊說。

    「這麼多人來看什麼熱鬧？」


    「今天有個不知死活的人，從台北來治阿喜，大家都認爲他是來送死的。那個人姓吳，是那邊理大平頭那位阿泰的親戚，這個姓吳的竟然敢答應這攤子事，不知他有多大本領，我真是替他擔心。」老先生指著門口一位叫阿泰的中年男人說著。


    「為什麼？阿喜有那麼嚴重嗎？」


    「不嚴重怎麼會花了一百多萬都沒看好呢！阿喜天天都像見到鬼一樣，每晚燒金紙燒到天亮。」


    「怎麼發生的？」


    「阿喜自己覺得不對勁，沒事也在自言自語，她很害怕，原來她不是神通，而是不知惹到了那一路的魔煞，她覺得事態嚴重，到處找神壇幫她驅邪，可是越驅越嚴重，後來找了一間很有名望的神壇，把神轎和乩童都請來，搖旗、做法，忙了一大攤，還是沒有用，這樣前前後後就花了上百萬，加上自己天天燒那麼多紙錢⋯⋯。」


    「聽起來怪可怕的，哥，我看我們還是回去吧！」正瑜說。


    「阿喜都已經泥菩薩過河，自身難保了，媽，我們回去再想辦法好了。」


    「你們不看熱鬧啊！今天這攤很有看頭，可能會有一場大鬥法。」


    「不看了，怪嚇人的！還是回家好了。」正瑜又說。


    正興一家人正準備動身回去，這時人群中一陣騷動。

    「來了，來了！」好幾個人邊伸長脖子往外望邊說著。


    正興轉頭望去，只見穿著T恤和牛仔褲，腳下踏著一雙涼鞋的吳慕涵大踏步走了進來。他微昂著頭，走路的姿勢也四平八穩，眼神有點銳利，一副自信又不亢不卑的樣子。


    阿泰一見吳慕涵，立刻迎了上去，將他接進屋裡，與阿喜的先生寒喧了幾句。正興很注意觀察這位被人質疑的吳慕涵，他似乎不願意多說話，只用眼光掃了在場的村人一眼。


    這時村人都在議論紛紛，因為這位據說有特異功能的人，不但單槍匹馬，而且兩手空空而來，他們不知道這位看去很有把握的高人，要如何對付阿喜身上的魔煞。因為，來看熱鬧的人，幾乎都期待著看到一場搖旗吶喊，鑼鼓喧天，刀光劍影和紙錢火焰飛舞的場面。


    阿喜這時候才由她的婆婆扶著出來，夜夜失眠的她，臉色慘敗鐵青，滿面黑氣，那樣子有點嚇人，見到她，人群中又是一陣騷動。


    「你們一家人都有事，身體都出了狀況，但是我要從神桌先看起，把陽宅和陰宅的氣場先調整好。因為陽宅和陰宅像一個家庭的屋頂和地基，這些基礎安好沒事，住在裡面的人才會平安。若是只看人，人沒事了，但是仍然住在氣場有問題的屋子裡，很快又有事了，等於白看。」吳慕涵看著阿喜一家人說道。


    「老師，拜託你救救我。」阿喜有氣沒力的請求。


    吳慕涵回頭朝神桌望去，他看到神桌上一片烏煙瘴氣，氣場大亂。


    「你們家供養了三尊神像，太多了，要真的神佛有靈也只會有一位過來跟你們共修，人不應該太貪心，想把神佛都請回家，那是不可能的，除非你是什麼大聖人，要真的是大聖人，不必請那麼多神回家拜，神佛自然都會來護持。請來那麼多神像，如果自己的修持不夠，神明早就離開了，空的神像容易被其他界佔據，享用你供養的香火，家裡的氣場就不對了，住在裡面的人自然受到影響。」吳慕涵看著阿喜家的神桌語重心長的說，似乎也有意說給在場的人聽。


    「那現在該怎麼辦？」阿喜問。


    「中國人都說家家觀世音，戶戶阿彌陀，我幫你留一尊觀音菩薩像，其他兩尊收起來燒掉。」


    「請老師作主就好。」阿喜說。


    吳慕涵直視著桌上的神像，喉嚨裡發出大大小小的嗝聲。


    「那位老師不知在做什麼？」正瑜很好奇，小聲的問正興。


    「我不知道。」正興說。


    「他正在跟靈界對話。」阿泰正好在他們後面，於是回答道。


    「跟靈界對話？好神奇喔！這麼直接就可以溝通？他是怎麼做到的？」正瑜又問。


    「天生的使命吧！他可以看到一般人看不到的，還會使用靈界的語言，像他這樣的人不多了。」


    這時，吳慕涵忽然大嗝了三聲，聲音之大，把在場的人都嚇了一跳。


    「這是怎麼一回事啊？」正瑜問道。


    「那三尊神像都被不好的東西佔了，吳老師跟他們溝通了半天，他們終於同意讓他渡走，現在已經走了。」阿泰說。


    「這樣就走了？不必做法什麼的嗎？」老先生問。


    「這位老師不是道士，不是法師，也不是乩童，他不必藉助那些人間法，就可以直接做事。」

    「哇！那他是什麼人啊？」

    「你自己去想囉！」


    正興和正瑜一聽，看看阿霞，大家心裡都想著同一件事，就是想請這位老師看看阿海。


    阿海今天出奇的安靜，他看著吳慕涵的眼神，有幾分畏懼，所以時常把頭垂得低低的，還一直想要出去，但是阿霞緊緊的牽著他的手，不讓他走。


    「他這麼簡單就把事情辦完了？」老先生不信的問，他似乎有些失望，因為以為有一場熱鬧好看。


    「沒錯，他現在用紅布把兩尊神像包起來，神桌上只留一尊觀音像。」


    只見吳慕涵把另兩尊用紅布包住的神像拿到門口，一把火把它們燒了。


    圍觀的人都在竊竊私語，有人覺得這是對神明大大的不敬。


    「沒有靈的神像，只是泥塑木雕而已，有什麼敬不敬的。」吳慕涵有意的反駁道。


    燒完了神像，吳慕涵走回神桌前，大夥兒又跟著他走進去。


    「現在，只剩一尊觀世音菩薩像了，不過，這一尊神像目前還是空的，靈還沒有上去。」阿泰小聲在正瑜耳邊說。


    這時，吳慕涵又大大的嗝了一聲。


    「他這一聲，是請來一位跟阿喜家有緣，願意跟他們一起共修的觀世音菩薩，請祂上座。」


    這時，吳慕涵站在神桌左邊阿喜家的祖先牌位前，又嗝了幾聲。


    「靈界的語言，我們很難聽懂。」正瑜說。


    「這幾聲，是把阿喜家被惡煞趕跑的祖先請回來歸位。」阿泰又在講解著。


    「陽宅和陰宅已調整好，神桌上現在清淨了，整間屋子也乾淨了，外在因素都去除，以後只要不再去招惹，家裡就可以平安。」吳慕涵對阿喜說。


    「那阿喜人呢，她身上還是不平安。」有人叫著。


    「現在可以開始清身體了，家裡氣場一團糟，住在裡面不會太好過，人是貪心不得的，人在做，天在看；想求神通，自己修爲要夠，這種事不是求得來的，但是有求的心，就容易被利用，很危險，請神容易送神難。本分做人最重要。」吳慕涵說著走到沙發上坐下來。


    他幫阿喜的家人一一檢查身體，把他們身上不好的氣場排除。由於這些不好氣場的影響，阿喜的公公天天腰痠，婆婆頭痛、心悸，丈夫胸口悶，兒子和女兒讀書精神無法集中，全家人都經常做惡夢，每一樣症狀都被吳慕涵說中，不僅阿喜一家人覺得訝異，連在場的人都嘖嘖稱奇。


    「老師，看你這麼簡單就把一切都弄好，不知道你是怎麼弄的，真的很神奇！這裡面有很多我們凡夫俗子不懂的東西，我們本來是來看熱鬧的，現在不但大開了眼界，還很佩服。可不可以也請你幫我們檢查一下身體。」老先生改變態度，很誠懇的提出要求。


    「有何不可？」吳慕涵說著，環顧在場的人，然後用手指著幾個人，接著說：「這幾位，請你們出去，不信的人我是不看的。」


    正興和正瑜覺得吳慕涵真是厲害，他點出來的這幾個人，今天都是來湊熱鬧的，剛才不停的在低聲交談，一直說這些都是迷信，都是裝神弄鬼，這次阿喜一定又被騙了。


    被點名的這幾個人，都嚇了一跳，他們小聲的講話，吳慕涵是聽不到的，莫非他懂讀心術？被點出來，他們感覺很沒面子，幾個人悻悻然的出去了。


    吳慕涵為在場的每一個人檢查身體時，一一指出他們身上的不適之處，並加以排除。


    「這人怎麼這麼厲害，完全不必用醫學的檢驗儀器，就知道人們身上有肝病、糖尿病、血脂肪過高，高血壓，連便秘、腸子脹氣他都知道，實在神奇！」老先生對坐在他身旁的正興說。


    老先生剛剛被吳慕涵檢查出心臟三條血管中的一條阻塞了。


    「這是屬於身體的疾病，你要去找醫生治療，我沒辦法，我只幫人治靈體的病。」吳慕涵這樣對他說。


    「真準，我前天才檢查出心血管有問題，醫生幫我預約了下星期住院做心導管檢查，太不可思議了，佩服，佩服！」


    吳慕涵在檢查阿海時，皺了一下眉頭，阿霞的心馬上一沉，知道阿海的情況特殊。而阿海更是奇怪，他坐在吳慕涵前面，不但坐立不安，還不敢直視他，一副很害怕的樣子。


    「阿海，坐好。」阿霞用手肘輕碰他。


    「沒關係，他的反應很正常。這位先生，你的情形在這裡是看不好的，你家陽宅有事，要到家裡去看才可以解決。」吳慕涵果然如是說。


    正興立刻向吳慕涵要了電話，準備等他忙完再與他約時間，請他到家中去一趟。


    「媽，那我們就帶阿爸先回家。」正瑜建議。


    正興一家人謝過吳慕涵和主人家之後，先行離去。


    回家之後幾天，正興用電話和阿喜聯絡，得知她的情況在第二天開始好轉，三天以後完全回復正常。正興問她以後還幫人看嗎？她回答說再也不敢了。


    「吳先生，請進。」阿霞很恭敬的迎在門口。


    吳慕涵走進阿海家時，是一個星期天的早上。


    阿音奉上茶水，阿霞請吳慕涵在客廳坐下。


    「我家阿海今天一直想出去，不知道在害怕什麼？嘴裡不停說著『怕怕！怕怕！』我們不讓他出去，他就躲在房間裡。」阿霞很煩惱的說著。


    「這是很正常的現象，因為他身上的無形界朋友很害怕見到我。」

    「害怕什麼？」阿霞疑惑的問。


    「媽，因為他知道有高人來了。」正興小聲在阿霞耳邊說著。

    「喔！原來是這樣！」阿霞恍然大悟。

    「吳先生，我阿爸躲起來了，現在該怎麼辦？」正瑜也很憂心的問。


    吳慕涵喝著茶，看了一眼他們家客廳的角落，那裡晃過一個黃色的影子，一霎時閃進旁邊的房間裡。


    「沒關係，不急，你們想辦法把他請出來。他的本靈還在，本靈出來的時候，聽到你們叫他，自然就會走出來。」


    阿霞走到阿海的房間門口，輕言輕語的說道：

    「海仔，茶泡好了，快出來喝。」

    「怕怕！怕怕！我不出去。」

    「家裡有客人來，你是主人，這樣太沒禮貌了。」

    「不行，我不能出去，這位客人太厲害了，我很怕他。」

    「不會的，這位客人是個大好人，他很想跟你聊聊天。」


    阿霞費了許多唇舌，後來連正興和正瑜也加入勸說，好不容易才把阿海從房間裡騙出來。


    阿霞牽著阿海的手，帶他坐在吳慕涵的對面。


    「喫茶啦！阿海。」吳慕涵遞過去一杯茶。


    阿海很害怕的接過來，一口就乾杯了。


    「免驚，愛穿黃色的衣服啊？黃色的百合花也很漂亮。」吳慕涵看著阿海說。


    阿海頭垂得低低的，不回答。


    正瑜聽了，不由得睜大了眼睛。他忽然想起阿爸在不對勁時，經常跟她提到黃色的衣服和花的事，她都以為那只是阿爸在胡說八道，原來阿爸真的是被這些事物所困，在裡面掙扎著，無法脫身。


    「你坐在這裡，慢慢喝茶，等我一下，好嗎？」吳慕涵安撫著阿海，然後自己站起來在客廳和房間四處走走看看。


    吳慕涵看似閒閒的瀏覽著，其實他正在清理屋中的煞氣，一切都處理好，沒問題了，才又走過來坐在阿海對面，直視著他，喉嚨裡大大的嗝了一聲，這時候的阿海一剎時清醒了過來，眼神中的迷惘一掃而空，忽然變得又清又亮。


    「阿爸回過神了。」正興一臉的興奮，看著身旁的阿霞和正瑜說。

    「謝天謝地！」正瑜也說道。

    「真是阿彌陀佛，多虧了吳老師。」阿霞的眼裡含著淚。

    「阿海，現在你沒事了。」

    「謝謝老師的大恩大德。」阿海說話的語氣也回復了正常。

    「不必謝，算我們有緣吧！」

    「老師，我最近知道自己出事了，因為有一股很強的力量拉著我去做一些莫名奇妙的事，有時候自己可以控制，有時候又控制不了。」阿海說。

    「你身上有一位穿著黃色衣服男人的靈，大約四十幾歲，那位男人很風流，經常出入風月場所，他愛上一位妓女，那位妓女很喜歡一種非常少見的黃色百合花，所以你經常會以爲自己穿著黃色衣服，手上還拿著黃百合，我有沒有說錯？」

    「老師，你說的都對，我以爲自己發瘋了，或是有幻想，原來是被色鬼上身了。」

    「老師，阿海為什麼會被色鬼上身？」阿霞問。

    「有時候是因為氣場弱，人倒楣時也容易被上身；有時候是自己心念引來的。人的起心動念，會跟四周的氣場相應，所以經常要有正念，才不會到處招惹。」

    「聽到老師說的沒有，心裡不要黑白想，自己去招惹，能怪誰？」阿霞指著阿海說。

    「我哪有！」

    「媽，過去就算了，以後小心點就好。」正興為父母親打圓場。

    「我們行事做人，最重要的是行八正道，八正道不只是佛教法輪常轉的教義而已，也是我們老祖宗傳下來的孔孟思想的精神所在，就連基督教裡面的一個很大的教派，叫東正教的，他們也是用八正道來轉法輪的。」


    吳慕涵要正興拿出紙和筆，他在紙上寫著：正見、正思維、正語、正業、正命、正精進、正念、正定等八正道。


    「船在大海上航行，除了依靠指南針辨別東西南北，還要靠舵來轉到正確的方向，可見這舵有多重要。舵的形狀也是法輪的形狀，這是在告訴航海的人，要學習八正道的法輪，不偏不倚，走中道，才不會迷航。」

    「老師，你今天說的話，對我們來說一輩子都受用無窮，人生是不能迷航的，有時候一迷，走不回來就慘了。」


    大夥兒說說聊聊的，談得非常投機。靈巧的阿音早已經在廚房裡大顯身手，準備一桌清淡的素菜，要好好請這位有緣的高人享用一頓素宴。


    阿海就這樣痊癒了。


    阿海身上乾淨了，阿霞也不再避他，從三樓搬下來住回她和阿海的房間，夫妻生活也回復了正常。


    阿海每天照常在花田裡工作，和阿霞出雙入對的。


    只是，當阿海又走進黃色姬百合田裡時，剛開始心理覺得有點毛毛的，不過他想起吳慕涵說的話，爲自己做足了心理建設，讓身上充滿正氣，才走進田裡去。


    現在，阿海不但不再害怕，當他直視黃色姬百合時，還覺得姬百合美得出奇，跟以前看起來大不相同。


