    秋風清，秋月明。落葉聚還散，寒鴨棲復驚。相親相見知何日？此時此夜難為情。入我相思門，知我相思苦；長相思兮長相憶，短相思兮無盡極。早知如此絆人心，何如當初莫相識，何如當初莫相識！


    書廷一邊低聲吟唱著李白的《秋風詞》，一邊輕撫著那張七弦古琴。清越的琴音，時而琤琮，如玉石相擊；時而寬厚，如古木涵春。他修長的指尖挑起的淳淡美妙音韻，以及由他喉間唱出的低沉渾厚嗓音，從琴室飄揚出來，穿過縷空的薄紗窗簾，迴盪在屋外的松樹林裡。


    ◇蓉圓琴韻……1'
  merge: -1
  pgno: 41
- img_proc: true
  md: '# 現代異次元——十則靈療的故事 2


    正當書廷陶醉在古琴清奇透靜的旋律中時,院子的柴門咿然而響,他微微抬起頭,看見妻子秀瑾帶著女兒小珊推門而入,他即刻起身,迎了出去。在他起身的那一剎那間,感覺身子輕輕的搖晃了一下,最近幾年他每次鼓琴後起身都會如此,他以爲只是坐久了忽然站起來所致,所以並不在意。


    就在他起身的一剎那間,蓉蓉從他身上脫離出來,輕飄飄的又進入小珊的身體裡。小珊頓時覺得一陣寒意襲來,不禁打了一個冷顫。她經常有這種感覺,已經習已爲常,所以也不去理會。


    「感冒了,小珊的喉嚨發炎紅腫,江大夫開了藥,囑咐要多喝水。」


    「來,爸爸弄藥給妳吃。」


    「藥好苦耶!」


    「不怕,小珊乖,爸爸有巧克力,吃了藥可以含在嘴裡。」


    秀瑾整個人放鬆下來,把身子窩進沙發裡。每次小珊一生病,書廷和她都如臨大敵,一顆心總是七上八下,因爲這幾年來小珊已經進出醫院的加護病房好幾次,每次都從鬼門關裡被搶救回來,所以現在只要小珊有一點不舒服,夫妻倆都不敢輕忽,一定馬上帶她去'
  merge: -1
