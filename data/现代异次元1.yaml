    才回到家，媛媛的身上開始發癢，玉嬋帶她去看醫生，吃了兩天的藥，身上過敏發癢的症狀緩和了些，但是，她的精神狀況似乎不太對勁，忽然沒來由的胡言亂語，還又哭又鬧的，跟她說話她好像都沒聽見。岑風和玉嬋一直哄著她，仍然無法讓她停止哭鬧，正不知該怎麼辦時，媛媛出乎意料的將自己身上的衣服一件一件的脫下來扔在地上，光著身子就要往屋外衝出去。


    岑風和玉嬋見狀簡直嚇壞了，立即上前將媛媛抓住，趕緊將衣服一一為她穿上。媛媛雖然乖乖穿上了衣服，但是仍然是一副神智不清的樣子，不停的哭鬧著，岑風守著大門不讓她出去，她就在屋子裡到處奔跑。


    媛媛從來沒有過這種情形，嚇得岑風和玉嬋慌了手腳，只好打電話給在台北某教學醫院擔任護理長的妹妹求助。媛媛的姑姑一聽，病情很不尋常，建議他們趕緊過來掛急診。於是，岑風和玉蟬連夜將媛媛從新竹送到台北，住進姑姑任職醫院所附設的兒童醫院就診。


