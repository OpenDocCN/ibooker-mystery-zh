    ## 現代睡美人


    「你要我怎麼證明？檢查了這麼久，該做的都做了，還是查不出病因，我無法開診斷證明給你，因為我不知道證明上要寫什麼病名？如果校長一定要診斷書才肯准假，你請他去問上帝好了，問到了答案，一定要回來告訴我。」王主任說著，還無奈的攤開雙手。


    王主任是這家規模宏大的教學醫院腦神經內科主任，李媛媛因為嗜睡，帶來給他看病已有一段時間了，一直找不到病因。


    岑風聽到王主任這樣說，只能楞楞的看著他，目送著他漸行漸遠的身影，消失在醫院走廊的轉彎處，不知怎麼辦才好。


    找王主任開診斷證明，是因為女兒媛媛這幾年來，每個月都得請十天到半個月的假，請假期間不但不能上課，遇到考試也無法參加，除了影響她的在學成績，也造成學校極大的困擾。


    岑風知道女兒的病不是女性每個月生理痛的問題，若是這個問題就好解決了，也不會如此困擾他。從小學三年級到國三，整整六年的時間，媛媛從每個月昏睡七天到現在的十天，為人父母的著急心情有誰能夠了解？


    「李先生、李太太，媛媛老是不來上課，進度跟不上，都國三了，怎麼去參加高中聯考？」每次要請假，媛媛的級任鄧老師就老大不高興。


    「我女兒的命能夠保住最重要，去你的高中聯考！」岑風心裡這麼罵著。


    「能不能活著參加高中聯考都還不知道呢？」媛媛的媽媽玉嬋心裡也悲傷的想著。


    他們不怪校長和老師的疑慮，校方知道媛媛請假只是在家睡覺，以爲她是偷懶不想上學，或是逃避考試，認爲父母這樣縱容她，是一件後患無窮的事。


    校長幾次向岑風提起要診斷證明的事，他只好向王主任開口，沒想到王主任意竟這樣回答他，讓他當場楞住了。


    「爸爸，快來，這邊有一個山洞⋯⋯。」


    岑風聽到女兒高聲的叫著，他回過頭去，看到媛媛活潑的身影繞過山腳下那塊岩石消失了蹤影，立刻好奇的起身跟了過去。


    「爸爸，進來嘛！好涼快喔！」媛媛又在山洞裡叫著。


    岑風走到山洞口，一陣涼風襲來，真的是涼快無比，他張開雙臂，站成一個大字，享受著洞口的陰涼。他往洞內望去，黑壓壓的一片，什麼也看不見。


    「媛媛，裡面太暗了，快出來吧！小心摔跤。」他邊喊邊在洞外的石頭上坐下。


    才說著，他就看到媛媛慌慌張張的跑出來，一臉的驚惶。


    「爸爸，走啦！走啦！裡面有黏黏滑滑的東西，不知道是什麼，我不小心摸到了，好噁心喔！」她說著將手在長褲上使勁的擦著。


    「要走你自己走，這裡好涼快，我不走。」


    「爸爸——，快走啦！裡面有好多好多的骷髏頭耶！好可怕喔！」


    「你亂講，這裡這麼多人來烤肉露營，有骷髏頭的話早就被人撿走了。」岑風把女兒被風吹亂的頭髮理順，接著說：「你回去幫忙烤肉，幫爸爸烤一根玉米，烤好了拿過來給我吃。」


    媛媛聽話的繞過岩石，跑向湖邊，加入熱鬧的烤肉活動。


    這是媛媛剛剛升上小學三年級那年的暑假，爸爸、媽媽約了乾爹、乾媽一家人到湖邊烤肉。大夥兒又吃又喝，又唱又跳的玩了大半天，直到下午四點多才依依不捨的收拾好東西準備回家。


    媛媛拎著自己的小背包，鑽進爸爸車子的後座時，忽然覺得意識模糊，人昏昏沉沉的，頭也痛得厲害，她半閉著眼睛，把頭往後靠。


    「媽，姊姊的身體好燙喔！」弟弟強強無意間碰到媛媛的手臂，朝站在車窗外的玉嬋大叫著。


    玉嬋走過來摸摸媛媛的額頭，不由得嚇了一跳，十幾分鐘前媛媛還和她有說有笑的，怎麼才一會兒工夫，這孩子就病成這樣了。


    「一定是玩水，衣服濕了，又吹到涼風，感冒了。」岑風也過來摸摸媛媛。'
