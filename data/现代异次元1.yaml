  md: '有一天大夥兒在聊天時，吳慕涵也說我們的法身不論修行不修行，都會受到干擾，這是投胎成為人身所必受的考驗。尤其當我們的靈衰弱時，更容易受到不好氣場的影響，這種影響如果長期存在，靈就會受傷害。有些人身體上的許多病痛，長年看醫生，不但看不好，甚至還檢查不出疾病的原因，有可能就是因為法身靈受傷了，這是醫學無法檢查，也不予承認的。


