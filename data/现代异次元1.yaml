    惠英把決定告訴媽媽，但是已經來不及了，性急又心急的媽媽當天就去找了間寺廟，在廟裡為嬰靈立了牌位。


    「傻孩子，我這樣做是為妳好，妳懂不懂！」


    媽媽愛女心切，惠英當然懂，既然已經造成事實了，惠英只好硬著頭皮上山去請教吳慕涵。


    「什麼！妳簡直是胡搞，妳這樣亂來，我不幫妳看了，妳走吧！」


    當惠英把為嬰靈立牌位的事告訴吳慕涵，吳慕涵臉色一變，氣得幾乎要跳起來。


    「吳先生，你別生氣，我這樣做錯了嗎？」惠英差點哭出來。


    「妳大錯特錯了，這下你們的怨結得更深了！」


    「可以請你告訴我為什麼嗎？」


    「唉！眾生愚痴，實在也不能怪妳，人云亦云，不分黑白就去做，害人害己。」吳慕涵態度緩和了些。


    「害人害己」這四字聽在惠英耳裡，令她心生恐懼，難道這樣做害了嬰靈，也害了自己嗎？既然如此，媽媽為什麼說很多拿過孩子的人都這麼做呢？


    「世人無知，所以很多人這麼做。」吳慕涵的回答正好是惠英心中的疑問。


    「為嬰靈立牌位，只是求自己心安，也希望他不要再作祟，這是很自私的行為，有了牌位，等於把他捆綁在人間，永世不得超生，妳本來就覺得對不起他，現在不是欠他更多，生生世世都還不了。」


    「那該怎麼辦？吳先生請你救我。」


    「就是跟他和解、超渡他啊！這樣他才能再去投胎轉世。」


    「可是，我媽說很多人為了嬰靈，花大錢請人超渡，但是身體還是不舒服。」


    「那是沒渡走啊！妳以爲花大錢請道士或法師超渡就保證可以渡走嗎？處理虛空界的事也要有牌照的，不然誰服他們。」


    「誰有牌照誰沒牌照，該怎麼看？」


    「怎麼看？一般人是沒辦法看的，怎麼看，我就領有虛空界的牌照，妳看得出來嗎？牌照又沒掛在身上，也沒寫在臉上？」


    惠英很想知道吳先生的無形牌照是怎麼來的，但她不敢問，若卓敏今天也來的話，可能就會問。


    「給嬰靈立牌位的人，有幾個身上的病好了？妳的病好了嗎？」


    「沒有，前兩天我膝蓋又腫得不能走。」


    「妳來給我看就要相信我，照我的方法去做，不然妳來幹什麼！把手伸出來！」吳慕涵兇巴巴地說。


    惠英趕緊把手伸過去擺在桌面上，一句話也不敢吭。


    吳慕涵用手掌再度去感應，一連串的嗝聲又從他喉嚨裡冒出來。這次的溝通，花了稍長的時間，因為吳慕涵必須先為惠英的愚痴和無知，請嬰靈原諒她，希望他仍然能遵守前次的約定，接受水懺法會的超渡。嬰靈起先不同意，吳慕涵勸他留在人間對他沒有好處，為今之計應該早日超生⋯⋯，他終於同意了，但是，原本只需拜一次水懺法會的，現在要連本帶利，拜三次他才願意走。


    > 「李太太，我再幫妳一次忙，做不做也是妳自己的事，我原來可以直接超渡妳身上的嬰靈，但是拿掉孩子的是妳，自己做必須自己受，現在妳必須拜三次水懺，拜完之後再來找我。」


    > 「拜三次，那要三個月，拖那麼久，我⋯⋯。」


    > 「那我也沒辦法，去不去隨妳。在這三個月裡，妳自己要小心，也要到醫院密切追蹤腫瘤的變化。」


    > 「我會的，吳先生，謝謝你。」


    > 「我每次聽到有人為嬰靈立牌位，就覺得很可恨，摧折他的生命、剝奪他生的權利，已經很殘忍了，他可能等了幾世紀才輪到這家來投胎，希望落了空，他已夠氣憤，也夠怨恨了，還立個牌位困住他，使他想再投胎都沒機會，這種二度傷害，是更加殘酷。」


    惠英聽了心裡十分難過，雖然為嬰靈立牌位不是她的意思，但「我不殺伯仁，伯仁因我而死」，她必須負責。


    「妳別難過了，妳媽去立的牌位是空的，沒有作用。因為嬰靈還在妳身上，妳們的錢被騙走了。」


    聽吳慕涵這麼說，惠英心裡覺得比較安慰些。


    「到嬰靈廟去，總是覺得陰森森的，因為怨氣太重了，那些被困住的嬰靈都在哭啊！」


    惠英也忍不住哽咽地低泣。


    水懺法會的日子到了，惠英一大早就趕了去。


    正如吳慕涵所說，自己做得自己受，在頌經、跪拜的過程中，惠英全身有無以名狀的痛苦，那種痛比平日加倍，使她幾乎窒息。她告訴自己，堅強、堅強、忍耐、忍耐，絕不埋怨，要歡喜受，要真心懺悔、誠心贖罪。


    儘管真心誠意在贖罪，儘管意志力再堅持，但身體的不適，尤其肚子的疼痛，幾度讓她接近昏厥，最後實在撐不住，眼前一陣發黑，什麼也看不見，她真的暈了過去。陪她一起來媽媽慌了手腳，旁邊的信徒趕忙過來一起扶起她，讓她到一旁休息。吳慕涵特別交代，無論如何不能離開法會會場，拜不動了，搬張椅子坐在一邊也要堅持到底。


    種種的痛，對贖罪的人也是一種考驗。惠英撐過了第一次的法會，第二次和第三次就不再那麼難過了。


    在這三個月裡，惠英的日子很不好過，她憂心身上的腫瘤，在密切的追蹤下，腫瘤沒有什麼變化，因為只要有任何不利於病人，或有立即生命危險的，卓敏就會要她立刻動手術，所以惠英希望在拜完水懺前，那兩個腫瘤可以暫時平安無事。


    在擔驚受怕中渡過了漫長的三個月，拜完第三次水懺的第二天，惠英馬上邀卓敏上山去看吳慕涵。


    「恭喜，妳已經沒事。」吳慕涵詳細掃描了惠英全身，然後笑著告訴她。


    「真的！」惠英如釋重負。


    「嬰靈走了？」卓敏也驚奇地說。


    「三天後，妳再去醫院檢查，把結果告訴我。」吳慕涵又說。


    「吳先生，你以前說惠英身上的腫瘤是假象，現在嬰靈走了，假象是不是會消失？」卓敏問。


    「這種情形會有兩種現象，一種是外靈不在，假象就隨著消失；另一種是外靈侵害本身的靈太久了，已經從靈體傷到肉體。外靈走了，外在因素除去，剩下的就是肉體的病，那去找醫生就有用，這方面我就不能撈過界。」


    「喔！我懂了，你的意思是說，有很多醫生看不好的病，是因為病人受到外靈的作祟。」卓敏又問。


    「這是原因之一，其他像業障、因果造成的疾病，也是你們醫生看不好的，所以吃藥、手術都沒有用。」


    吳慕涵說的這些道理，卓敏很難接受，但她也沒必要反駁，只是這番話又引出了她的新問題。


    「那要怎麼避免？」


    「外靈的侵入，有很多是自己的意念招來的；至於業障和因果嘛！妳有沒有聽過『欲知前世因，今生受者是，欲知來世果，今生做者是』這句話，妳那麼聰明，該知道怎麼避免了吧！」


    「這好像是佛教的三世因果論。」


    「不錯，原來妳也讀過佛經。」


    「是聽我媽說的。說真的，佛經、聖經、可蘭經我好久以前就想讀了，只是一直還沒開始。」


    「或許現在正是時候。」


    三天後，惠英到醫院掛卓敏的門診。


    不可思議的事發生了，超音波掃描竟然找不到腫瘤，X光片也照不到，卓敏和惠英簡直不敢相信這是真的。兩個人你看我，我看你的，脸上的表情難以形容，尤其是惠英，更是激動得痛哭失聲，幾個月來的擔驚受怕，那份沉重的壓力和低沉的心情，忽然被解放了。


    卓敏緊握著惠英的手，她跟她一樣激動。靈學向醫學挑戰，這一役靈學戰勝，使卓敏開始懷疑，若三個月前沒有遇到吳慕涵，惠英進了手術房，切除了腫瘤，後果會怎樣？


    這也使她想到，許多被送進手術房的病人，有哪些是靈體生病所造成的假象，又有哪些是真正肉體的病，這一刀切下去，切到的又是什麼？想到這裡，卓敏不禁起了雞皮疙瘩。


    她扶著哭泣的惠英走出診間，又回來看下一位病人時，她心裡也知道，以惠英的個性，為了慎重起見，一定還會去找別的教學醫院再做檢查；不管她再找多少醫生檢查，至少在這裡，她一定會繼續長期追蹤惠英的病情。


    昨天，她已經開始看聖經，雖然只是取下書架上封塵已久的那本黑皮書，隨意的翻到一頁，就看到〈馬可福音〉第一章第五節，裡面寫著：西門的岳母害熱病，就有人告訴耶穌，耶穌進前來，拉起她的手，扶她起來，熱就退了⋯⋯天黑時有人帶著一切害病的、被鬼附的來到耶穌跟前⋯⋯耶穌治好了害各種各樣病的人，又趕出了許多鬼⋯⋯接著卓敏又隨手翻到一頁，上面寫的是一位婦人生了十八年的病，耶穌說你被魔附身了十八年，於是將魔趕走，婦人就站了起來⋯⋯。聖經裡處處都是耶穌以神通治病及驅魔趕鬼的故事。


    在翻著聖經的同時，卓敏想起二十年前看過的一部老片子「大法師」，電影描述一位少女被魔鬼附身，天主教的神父為她驅魔，在經過激烈的鬥法後，邪不勝正，魔鬼被趕跑了，但神父也陣亡。卓敏心想神父的死，是因為厲鬼太惡使神父受創太深，或是神父缺少虛空界驅魔的執照？


    不管電影的結局如何，佛教、道教、天主教和基督教都有驅魔的說法，而我國也有很多跟捉鬼有關的民間故事。或許，除了人，宇宙間還存在著許多看不見的生命，平時大家相安無事，在自己的空間裡過日子，但偶而會時空錯亂，為某種原因而碰撞出火花。


    曾惠英的事，使卓敏對事物的看法有了改變。的確，發生這麼不可思議的事，使她的許多基本認知都動搖了。下了班，她不想直接回家，她必須一個人靜一靜，好好想一想。


    她把車開到山坡上，停在半山腰，打開車窗，讓有點微寒的風吹進車裡。


    山腳下萬家燈火，點點燈光彷彿閃亮的星子。天空中閃爍的星光，反而比不上人工的星光亮，但那種遙遠的、稀落的、幽靜的光，在黑沉沉的天幕上，散發出一種不可及的、幽遠的神秘光采。


    卓敏凝視著那遙遠國度裡的神秘，感覺那正像第四空間般的令人費解。人，的確很渺小，而宇宙太大，也太不可知。


    天上的星星好像在移動位置，正在重新排列組合。莫不是她眼花了，重新排列的圖案，竟是那位神秘男子吳慕涵的臉，他的嘴角還帶著笑意，彷彿正在「笑傲人間」。


    一陣強風吹進窗子，風聲裡恍惚聽到淒厲的哭聲，會是遠去的嬰靈的道別聲嗎？


    卓敏全身又起了雞皮疙瘩，她搖下車窗，發動引擎，加足馬力往山下開去。還是找一家咖啡店喝杯香醇的咖啡或叫杯美酒，來平復一下起伏盪漾的心情吧！


    ## 第三章


    ## 現代睡美人


    「你要我怎麼證明？檢查了這麼久，該做的都做了，還是查不出病因，我無法開診斷證明給你，因為我不知道證明上要寫什麼病名？如果校長一定要診斷書才肯准假，你請他去問上帝好了，問到了答案，一定要回來告訴我。」王主任說著，還無奈的攤開雙手。


    王主任是這家規模宏大的教學醫院腦神經內科主任，李媛媛因為嗜睡，帶來給他看病已有一段時間了，一直找不到病因。


    岑風聽到王主任這樣說，只能楞楞的看著他，目送著他漸行漸遠的身影，消失在醫院走廊的轉彎處，不知怎麼辦才好。


    找王主任開診斷證明，是因為女兒媛媛這幾年來，每個月都得請十天到半個月的假，請假期間不但不能上課，遇到考試也無法參加，除了影響她的在學成績，也造成學校極大的困擾。


    岑風知道女兒的病不是女性每個月生理痛的問題，若是這個問題就好解決了，也不會如此困擾他。從小學三年級到國三，整整六年的時間，媛媛從每個月昏睡七天到現在的十天，為人父母的著急心情有誰能夠了解？


    「李先生、李太太，媛媛老是不來上課，進度跟不上，都國三了，怎麼去參加高中聯考？」每次要請假，媛媛的級任鄧老師就老大不高興。


    「我女兒的命能夠保住最重要，去你的高中聯考！」岑風心裡這麼罵著。


    「能不能活著參加高中聯考都還不知道呢？」媛媛的媽媽玉嬋心裡也悲傷的想著。


    他們不怪校長和老師的疑慮，校方知道媛媛請假只是在家睡覺，以爲她是偷懶不想上學，或是逃避考試，認爲父母這樣縱容她，是一件後患無窮的事。


    校長幾次向岑風提起要診斷證明的事，他只好向王主任開口，沒想到王主任意竟這樣回答他，讓他當場楞住了。


    「爸爸，快來，這邊有一個山洞⋯⋯。」


    岑風聽到女兒高聲的叫著，他回過頭去，看到媛媛活潑的身影繞過山腳下那塊岩石消失了蹤影，立刻好奇的起身跟了過去。


    「爸爸，進來嘛！好涼快喔！」媛媛又在山洞裡叫著。


    岑風走到山洞口，一陣涼風襲來，真的是涼快無比，他張開雙臂，站成一個大字，享受著洞口的陰涼。他往洞內望去，黑壓壓的一片，什麼也看不見。


    「媛媛，裡面太暗了，快出來吧！小心摔跤。」他邊喊邊在洞外的石頭上坐下。


    才說著，他就看到媛媛慌慌張張的跑出來，一臉的驚惶。


    「爸爸，走啦！走啦！裡面有黏黏滑滑的東西，不知道是什麼，我不小心摸到了，好噁心喔！」她說著將手在長褲上使勁的擦著。


    「要走你自己走，這裡好涼快，我不走。」


    「爸爸——，快走啦！裡面有好多好多的骷髏頭耶！好可怕喔！」


    「你亂講，這裡這麼多人來烤肉露營，有骷髏頭的話早就被人撿走了。」岑風把女兒被風吹亂的頭髮理順，接著說：「你回去幫忙烤肉，幫爸爸烤一根玉米，烤好了拿過來給我吃。」


    媛媛聽話的繞過岩石，跑向湖邊，加入熱鬧的烤肉活動。


    這是媛媛剛剛升上小學三年級那年的暑假，爸爸、媽媽約了乾爹、乾媽一家人到湖邊烤肉。大夥兒又吃又喝，又唱又跳的玩了大半天，直到下午四點多才依依不捨的收拾好東西準備回家。


    媛媛拎著自己的小背包，鑽進爸爸車子的後座時，忽然覺得意識模糊，人昏昏沉沉的，頭也痛得厲害，她半閉著眼睛，把頭往後靠。


    「媽，姊姊的身體好燙喔！」弟弟強強無意間碰到媛媛的手臂，朝站在車窗外的玉嬋大叫著。


    玉嬋走過來摸摸媛媛的額頭，不由得嚇了一跳，十幾分鐘前媛媛還和她有說有笑的，怎麼才一會兒工夫，這孩子就病成這樣了。


    「一定是玩水，衣服濕了，又吹到涼風，感冒了。」岑風也過來摸摸媛媛。'
