  md: '這麼多多年來，小嫻幾乎已經死了心了，也好累了，於是她不再到處奔波求診，只定期的來看姜大夫的門診，拿一點肌肉鬆弛或止痛的藥，在必要時服用。


    不可捉摸的疼痛，漸漸使她的左腳開始萎縮。愛漂亮的小嫻，不再穿短裙了，只能穿長褲或長裙遮掩她有點變形的腿。她的外表看去雖然仍舊光鮮亮麗，但是隨時都在疼痛的腳，經常使她不由自主的皺起眉頭；有點萎縮的腿，使她走起路來備感吃力，不知不覺的竟跛了起來。這對時髦漂亮的小嫻來說，真是情何以堪！


    最讓她心酸的還是相戀了五年，已經論及婚嫁的男友胡秉康，竟在四處陪她求診，病情毫無改善，而且愈來愈嚴重後，逐漸疏遠她，最後消失無蹤。要不是莉莉和翠玲不斷的安慰她，為她打氣，她可能早就崩潰了。


    事情開始有轉機是在兩個多月前，有一天，小嫻參加同事的婚宴。坐在小嫻身邊的映雪，一直絮絮叨叨跟她說著話，剛開始小嫻並沒有很注意聽，心中還覺得有點煩，嘴裡有一句沒一句的應和著。後來映雪提到她媽媽的失眠，二十幾年來看遍了中西醫，吃盡了各種偏方都好不了，上個月親戚介紹一位高人，她媽只看了一次，到現在一個多月了，每天晚上都很好睡，連安眠藥都丟掉了。


