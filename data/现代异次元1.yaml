    「你們雖然不信教，但心裡也知道自殺是不能上天堂的，你想超渡有用嗎？」

    一聽說超渡沒用，慧美就哭了起來。

    「那他的靈會到哪裡去？」

    「我們是老朋友，不能因為怕你們傷心，就故意說些安慰的話。自殺，也是一種殺生，罪業很重的，他下一個輪迴不可能到人道來，在下一個輪迴之前，有些罪要受的，這


    ◇深山何處鐘……265'
  - '[PAGE 306]


    是他自己選擇的功課，無法逃避。


    「既然無法逃避，為什麼他還在這裡？


    「時間還沒到，到了他就得去。」


    「這一段時間他會一直跟著我們嗎？」


    「你們那麼悲傷，他捨不得走，你們要節哀，他才走得開。」


    老何夫婦的眼淚忍不住滾滾而下。


    「阿松生前常常問我，死亡是什麼感覺，死後會到哪裡去？」


    「我們都很擔心，但沒想到他真的會去尋死，我們那麼疼他⋯⋯。」


    「你看，這是阿松的畫，和他自己製作的筆記書，這麼有才華的孩子實在叫人不忍心。」


    老何把他兒子的畫和書攤在桌子上。吳慕涵和阿齊、來好翻閱著阿松的遺物。那是幾幅抽象畫，畫面上有許多曲扭的黑色線條，還有一片閃閃發光的影子。筆記書，像是他的日記，記載著他迷失的心。


    「這些畫，我看不懂，不過畫得不錯。」阿齊說。'
  - '[PAGE 307]


    「好抽象,我也不懂。」來好也說。

    「你們懂得他在表達什麼嗎?」吳慕涵問老何夫妻。

    「我們也不懂。」


    「這些黑色的線條,是死神捉拿人的鐵鍊,這發光的影子,是他用來割腕的刀片

    ⋯⋯。」


    「啊!啊!沒想到⋯⋯,他這麼嚮往死亡。」老何黯然的說。

    「你錯了,不是他嚮往死亡,而是他原本只想探索死亡遊戲,可是心裡常常想到『死』,死神就一直跟著他,隨時準備捉拿他⋯⋯,常常想自殺的人,也會招來死神,後來變得身不由己,是因為死神在身邊,那種晦暗不祥的氣場,更加強了他們尋死的念頭。」


    「那這些畫,不是阿松畫的,其實是死神的作品。」

    「可以這麼說。」


    「唉!人應該要樂觀,往好處去想,死是解決不了問題的,只會製造問題。」

    「人的起心動念,各種貪、瞋、痴、慢都會影響自己的氣場,跟四周的氣場相應,所


    ◇深山何處鐘⋯⋯267'
  - '[PAGE 308]


    以會招來同氣相投的靈界衆生。


    「做父母的，常常只注意孩子的成績，其他的都不夠關心，這是我們的錯，雖然捨不得，也沒辦法挽回，只是，不知有什麼能夠幫他做的？」


    「我只能幫他一個忙，不讓他受到外面孤魂野鬼的欺負。」吳慕涵說道。


    「要做什麼我們都願意。」


    「我可以把他帶到土地公那裡，請土地公暫時收留。」


    「那以後呢？」


    「時間到了，他就會到該去的地方。」


    「這樣我們已經很感謝了。」


    「你們回去準備些鮮花、素果到離家最近的土地公廟拜謝，這樣就行了。」


    老何夫妻謝過吳慕涵，傷心的離去。阿松的亡魂，這回沒有再跟著父母一起離去，吳慕涵見他朝自己一拜，然後隨著在門外等候多時的土地公走了。


    「人生無常啊！」


    「沒想到老何家會發生這樣的不幸。」


    ◇現代異次元——十則靈療的故事 268'
  - '[PAGE 309]


    「現在年輕人心裡在想什麼，我們都不知道。

    「這就是代溝嘛！」


    「跟代溝無關，這是一種人生價值的錯亂。我們年輕的時候，心裡想的都是將來長大後要怎樣報效國家，服務人群，貢獻一己的心力。現在的年輕人，連小學生都想賺大錢，想一夜成名，你看那些衣服穿得很少的寫真集，其實就是裸女畫集，都是書場上的暢銷書，一上架就賣光，那些明星、歌星的傳記也是，好多都是小學女生買的，她們也想像寫真女郎那樣一脫成名⋯⋯。」


    「是我們老了，趕不上這個時代的變動。

    「我寧願回到從前那純樸的時代，那時候社會多祥和啊！大家日子過得多快樂啊！」


    「對啊！雖然物質生活不如現在，但是精神生活可充實了。

    「那時候的人也善良多了。」


    大家你一句、我一句的聊了起來，來好準備了花生、瓜子，還搬出了她拿手的八寶素糕⋯⋯。


    在阿齊家用過晚餐，吳慕涵才騎著腳踏車慢慢的回家。


    ◇深山何處鐘⋯⋯269'
  - '[PAGE 310]


    月牙兒掛在黝黑的夜空中，滿天的星斗閃閃發光。他騎著腳踏車，經過一條水圳。夜裡，水圳的流水聲顯得格外沸揚，水波也在月光下發著光。鄉野間霧氣升起，有點迷濛。


    好久沒在鄉下的田野間騎車了，尤其在這樣的晚上，真捨不得回家，他停下車，把車靠在水圳旁，坐下來欣賞著美麗的夜色。


    回想起這兩天所處理的事，的確感到人生無常，周仔、周老伯、老高、美倩、丁老先生、還有老何的兒子阿松，都處在人生的轉彎處，轉得過轉不過，雖然都是由於業力在牽引，說白一點是命運早有安排，覺得非常無奈，但是命運其實是可以改變的。


    中國人相信命運有個定數，命運又是怎麼來的呢？其實，命運是自己創造的。那是經過累世因果相循而來的，是自己所布下的網路。每一世，不論在哪一道，都種下些因，等著下一世坐收成果。因，有善因、惡因；果，有善果、惡果；因此就形成了善緣、惡緣，善報、惡報。人的每一世，遇到過無數人，說過無數話，起過無數念頭，做過無數事，也造過無數業，因而造就了數不清的因果關係，像一片密密麻麻的網，每一條網路相連著過'
  - '[PAGE 311]


    去、現在，也創造著未來。

    宿命論者，相信生死有命，富貴在天，認爲命運天注定，真的是大錯特錯了，命運其實是自己創造的，完全掌握在自己手上，由生生世世因果相續而來的。知道了這樣的關係，只要在某一個環節，忽然醒悟了，忽然看清了這原來是一種無止境的遊戲時，心不再動念，不再分別、妄想、執著，身心都清淨了，業力沒有可著力之處，自然可以跳脫因果業障，甚至可以跳脫輪迴。


    世間人有多少能想通這一點呢？人人沉淪於俗世的分別、妄想和執著之中，讓起心動念主宰著一切，使自己的氣場大亂，讓其他界的衆生有機會趁虛而入，使虛妄的心更加沉淪，更無法自拔。


    當人們被外靈所纏而來向他求救時，他常想，他救的到底是人，還是那無端被招惹的靈界朋友。雖然他一出手，人和靈同時都得到解脫，但是，人，是如此的無明，會一次又一次的重犯，常常令他打從內心感到絕望，他寧願抱著解救無形界朋友的心，這樣讓他覺得好過些。


    他常想，若一個人真能放下分別、妄想、執著時，就是把自己放空，或是把自己縮到


    ◇深山何處鐘⋯⋯271'
  - '[PAGE 312]


    最小之時，達到忘我的境界，這是修行的最高境界。常常有人問他什麼是修行，修行不是吃齋、念佛、打坐、讀經、打禪七、法會、閉關，而是在日常生活中修正錯誤的行為，使自己漸漸往存好念、說好話、行好事、做好人的方向去。生活中少了計較，快樂自然就多。


    少想到自己，少以自我為中心，也讓自己更心平氣和。這十多年，他一路走來，真正了解他的人少之又少，像他这样的人也不是一般人所能了解的，他也不期望別人能了解。


    一直以來，他其實更嚮往能在山上有一間竹籬茅舍，一個讓他蒔花種菜的小小院落，清晨或黃昏時分，可以走入林深之處，體驗與天地同在的感受。「古木無人徑，深山何處鐘？」在人跡罕至，古木參天的山間小徑上，靜聽深山之中不知何處傳來的鐘聲。


    他相信總有一天，他能夠擁有這樣的生活，過最簡樸且與世無爭的日子。


    一顆流星劃過天際，稍縱即逝的光亮，就像人的一生那樣短暫。在短暫的人生中，有夢想是很美的，在夢想實現以前，他決心把握每一個當下，做好自己份內的事，對得起天、地和自己，其餘的，毀譽由他。


    ◇現代異次元——十則靈療的故事 272'
  - '[PAGE 313]


