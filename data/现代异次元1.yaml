  md: '身的，都是自己的意念招惹來的。瞋恚、愛恨、欲求⋯⋯等種種七情六慾，種種的心海波瀾，都會使人體的磁場有所改變，這些改變，就是招惹靈界朋友的因；對靈界的好奇、貪求，像有人修行或練功想求神通，也是爲自己造了入魔的因。孔老夫子早就告訴凡夫俗子們要「敬鬼神而遠之」，可見他老人家不但清楚有靈界的存在，也深知對靈界要保持尊重的態度，不應主動去招惹；畢竟生活在不同次元的衆生，各有各的生存空間，互不干擾才能平安順利過日子。


    《聊齋誌異》這本家喻戶曉的古典名著，每一則故事都是人與靈界相遇的驚險傳奇；這是老祖先苦口婆心告誡我們的智慧之語，可惜很多人只把它當成靈異的鬼故事來閱讀和傳誦，沒能記取其中的教訓，這是非常可惜的。


    現代社會有一種非常奇異的現象，就是在大街小巷裡都出現了不少神宮和神壇，這給人一種強烈的感覺，似乎妖魔鬼怪充斥人間，而且很多都附在人的身上，因此許多人都要尋求神明的幫助，來驅魔鎮妖。神明透過道士或乩童來傳遞訊息並爲人治病，乩童成了靈媒，也是神明的代言人。這是民間大爲流行且被普遍認同的靈療方式，大部分都很有效。


    但是，吳慕涵曾經告訴我們，這些代言人良莠不齊，難免有些是騙人錢財的神棍混充


    ◇現代異次元——十則靈療的故事 26'
