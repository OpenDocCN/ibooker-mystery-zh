    # ◇現代異次元——十則靈療的故事32


    以當祖先所居住的陰宅，受到氣場干擾而住得不舒服時，因磁場相連，子孫自然也會覺得不舒服。只是，人人忙於逐鹿紅塵，有幾個人會想到是陰宅出了問題？身體不舒服時，自會自己找理由解釋，如太忙了，太累了，壓力太大，睡眠不足，冷氣太強，運動不夠⋯⋯等等。當事業、婚姻出狀況時，也有理由解釋，像時運不濟，人生不如意事十之八九嘛！兩人世界哪有不磨擦的？也沒有人會想到陰宅是否出了問題？因此，一年年過去，祖先越來越不舒服，子孫也越來越不順利。陰宅的氣場影響了子孫的靈體，反應在肉體上就是病痛，只要陰宅氣場一調整，很多事就迎刃而解了。


    另一個問題，為何虛空界靈體的力量總比我們來得大？靈體的形狀為何？虛空界時、空間和我們一樣嗎？靈體有沒有是非道德的觀念？為何喜歡找弱者？《翠玉屏風》故事中的大姊頭，憑什麼能在許多靈體中稱王？


    虛空界是無形的，由能量聚集而成，可以來無影，去無蹤，甚至可以有穿透的能力。他們來去自如，身形也是變化無窮的，可以小得像一根針，也能大如須彌山。據吳慕涵說，靈體脫離肉身時，跟生前大小是一樣的，像電影「第六感生死戀」中，男主角不幸遇刺身亡，靈體離開肉身的情形一樣。人身由於有肉體的束縛，血肉之軀，太過於沉重，又'
  - '[PAGE 35]


    有地心引力不斷的將我們向下拉，所以只能待在地面上生活。虛空界的時間和空間和我們不一樣，但是他們如果附在人身上，就只能跟我們一起過日子。靈界的生活當然有是非道德的觀念，他們的社會跟我們一樣，是有組織、有秩序的，任何一道都相同。但是，就像人類社會一樣，總是有些不守規矩的人，逾越了界線而造成混亂。《翠玉屏風》中的大姊頭，爲何能稱王？就跟人類社會有大哥一樣，強者爲王，經常欺凌或控制弱者。有些在外遊蕩的孤魂野鬼，會欺負氣場弱的人類，所以倒楣的人容易遇到鬼，這種說法不無道理。有些人是因爲前世果報，或被怨親債主纏身索債所致，來索債或索命的靈界朋友，有的也是領了旨公然來要債的，通靈者想爲他們和解也很困難。


    最後一個問題，爲何古董特別容易附靈？是否有善靈，如玉鐲相傳可保身？


    古董並非特別容易附靈，而是許多陪葬後出土的，有時候會被一些無明的靈體所跟隨，這些物品或許是他們生前所使用的，不捨的心，可能讓他們放不下，而致有許多古董被靈所附的事發生。只要是被靈所附，不管是善靈、惡靈，對人都不利，因爲陰陽兩隔，人鬼殊途；陰氣會干擾人的磁場，使人不舒服。至於玉鐲能否保身，中國人認爲可以。好人的玉，的確會散發好的磁場。玉文化在我國相傳已久且持續發揚光大。人們深愛美玉，認


    ◇當靈魂受傷時⋯⋯33'
