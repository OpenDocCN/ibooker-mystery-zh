    用各種方法去驅、去趕、去鎮，真的有用嗎？⋯⋯就算有慧根的人，學了個八十分，可以運用各種法器、道具、令旗、符咒、咒語甚至念經⋯⋯等等來驅邪，但這些人間的有为法，真的能夠究竟嗎？虛空界真的會理會這些？害怕這些？因而離開嗎？


    ## 深山何處鐘


    他常想，若一個人真能放下分別、妄想、執著時，就是把自己放空，或是把自己縮到最小之時，達到忘我的境界，這是修行的最高境界。常常有人問他什麼是修行，修行不是吃齋、念佛、打坐、讀經、打禪七、法會、閉關，而是在日常生活中修正錯誤的行為，使自己漸漸往存好念、說好話、行好事、做好人的方向去。生活中少了計較，快樂自然就多。


    ## 蓉圓琴韻


    秋風清，秋月明。落葉聚還散，寒鴨棲復驚。相親相見知何日？此時此夜難為情。入我相思門，知我相思苦；長相思兮長相憶，短相思兮無盡極。早知如此絆人心，何如當初莫相識，何如當初莫相識！


    書廷一邊低聲吟唱著李白的《秋風詞》，一邊輕撫著那張七弦古琴。清越的琴音，時而琤琮，如玉石相擊；時而寬厚，如古木涵春。他修長的指尖挑起的淳淡美妙音韻，以及由他喉間唱出的低沉渾厚嗓音，從琴室飄揚出來，穿過縷空的薄紗窗簾，迴盪在屋外的松樹林裡。


    正當書廷陶醉在古琴清奇透靜的旋律中時，院子的柴門咿然而響，他微微抬起頭，看見妻子秀瑾帶著女兒小珊推門而入，他即刻起身，迎了出去。在他起身的那一剎那間，感覺身子輕輕的搖晃了一下，最近幾年他每次鼓琴後起身都會如此，他以爲只是坐久了忽然站起來所致，所以並不在意。


    就在他起身的一剎那間，蓉蓉從他身上脫離出來，輕飄飄的又進入小珊的身體裡。小珊頓時覺得一陣寒意襲來，不禁打了一個冷顫。她經常有這種感覺，已經習已爲常，所以也不去理會。


    「感冒了，小珊的喉嚨發炎紅腫，江大夫開了藥，囑咐要多喝水。」


    「來，爸爸弄藥給妳吃。」


    「藥好苦耶！」


    「不怕，小珊乖，爸爸有巧克力，吃了藥可以含在嘴裡。」


    秀瑾整個人放鬆下來，把身子窩進沙發裡。每次小珊一生病，書廷和她都如臨大敵，一顆心總是七上八下，因爲這幾年來小珊已經進出醫院的加護病房好幾次，每次都從鬼門關裡被搶救回來，所以現在只要小珊有一點不舒服，夫妻倆都不敢輕忽，一定馬上帶她去給醫生看，幸好這次只是小小的感冒。


    女兒生病，書廷可心疼了，今天是假日不必去畫廊，她陪著女兒一起午睡。躺在小珊房間的床上，書廷握著她的小手，父女倆有說有笑的聊著天。小珊的童言童語，不時惹得書廷哈哈大笑。聊累了，小珊哈欠連連，眼皮漸漸合上，不知不覺睡著了。看著女兒可愛的小臉蛋，書廷一陣恍惚，彷佛看到一張十六、七歲的妙齡少女的臉，他甩甩頭，揉揉眼，再定睛看去，仍然是女兒那張熟睡的小臉。


    書廷坐直身子，下得床來，脊背一陣發涼。這已經不是第一次，這個穿著古代服飾的少女，經常在他腦海裡若隱若現，也偶而在女兒的房間裡似有似無的飄著。有幾次，書廷一個人睡在這個房間裡，在似睡非睡、迷迷糊糊之際，總覺得聽見衣袂飄飄，環佩叮噹之聲，每次他都以為自己在做夢，但每次的夢境都那麼相同，令他毛骨悚然。女兒好久以來都不肯睡在這個房間，問她為什麼，她也說不出個所以然來。今天是因為爸爸陪她，她才肯回到自己的房間睡。


    他再一次仔細端詳女兒的臉，看見她雙眼的眼瞼上，從前長過疣痊癒後留下的疤，醒著睜開眼睛時，被雙眼皮一遮，若隱若現，看得不是很清楚，但這會兒睡著了閉著眼睛，'
  mdcn: '## 現代異次元——十則靈療的故事


    身的，都是自己的意念招惹來的。瞋恚、愛恨、欲求⋯⋯等種種七情六慾，種種的心海波瀾，都會使人體的磁場有所改變，這些改變，就是招惹靈界朋友的因；對靈界的好奇、貪求，像有人修行或練功想求神通，也是爲自己造了入魔的因。孔老夫子早就告訴凡夫俗子們要「敬鬼神而遠之」，可見他老人家不但清楚有靈界的存在，也深知對靈界要保持尊重的態度，不應主動去招惹；畢竟生活在不同次元的衆生，各有各的生存空間，互不干擾才能平安順利過日子。


    《聊齋誌異》這本家喻戶曉的古典名著，每一則故事都是人與靈界相遇的驚險傳奇；這是老祖先苦口婆心告誡我們的智慧之語，可惜很多人只把它當成靈異的鬼故事來閱讀和傳誦，沒能記取其中的教訓，這是非常可惜的。


    現代社會有一種非常奇異的現象，就是在大街小巷裡都出現了不少神宮和神壇，這給人一種強烈的感覺，似乎妖魔鬼怪充斥人間，而且很多都附在人的身上，因此許多人都要尋求神明的幫助，來驅魔鎮妖。神明透過道士或乩童來傳遞訊息並爲人治病，乩童成了靈媒，也是神明的代言人。這是民間大爲流行且被普遍認同的靈療方式，大部分都很有效。


    但是，吳慕涵曾經告訴我們，這些代言人良莠不齊，難免有些是騙人錢財的神棍混充其間；也有些宮廟神壇因主持人不正法，供奉的神明不想與他共修，早就遠走高飛，神桌上供養的雖是觀音、媽祖、濟公或三太子，其實坐享香火的說不定是個大魔頭。無法分辨正邪的人們，仍然走進去尋求表面上看去是神明，其實是魔的幫助，求魔比求神更有求必應，因為「道高一尺，魔高一丈」，正道的神佛必須依循正法辦事，而魔卻可以不依循正道，隨著人們的貪瞋癡起舞，讓人的慾望更容易達成。只是嚐了甜頭的人，是要付出代價的，他的靈魂已被收買，成了魔子、魔孫、魔眷屬而仍不自知。


    兩千五百多年前，釋迦牟尼佛在滅度之前，魔王波旬曾經告訴他，末法時期要讓魔子魔孫都來出家，敗壞佛法。釋迦牟尼佛也告訴弟子們，末法時期佛法將毀於僧衆之手。因爲許多魔都以出家之相，披上袈裟，販賣佛法。民衆對於法會趨之若鶩，甚至到處趕場，忙得不可開交，以爲花了大錢去參加法會，可以得到大功德。這些想法都是錯誤的。這跟對外的布施、行善一樣沒有功德，得到的是福德，爲下輩子種福田。梁武帝建了四百八十座寺院，供養十幾萬僧衆，達摩祖師說他一點功德也沒有，這道理是一樣的。功德，是要往內修，而不是向外求的。況且佛陀教導我們的不是爲來生享福而儲存資糧，那又墮入六道之中，而是要求生淨土，不再輪迴，才是究竟之道。


    ## 當靈魂受傷時


    淨空法師說修戒定慧，才是真功德。戒，是一種功，把戒修好，得到的果就是定。定，能生智慧，這才叫德。修行，是讓自己靜、定和清淨，那是一種內省的功夫，是往裡修，而不是往外修，心越往外跑就越動，況且如果跑錯道場，跑進魔所主持的寺廟，靈就容易受干擾，甚而受到傷害，修行路就愈走愈艱苦了。


    魔充斥在我們四周，這話聽起來有點恐怖，其實沒什麼好害怕的，這個世界本來就好壞各半，像白天和黑夜各半一樣。有一點佛學知識的人也知道六道眾生皆具佛性，而且眾生也都是平等的，沒有高下之分，別看他是魔，或正在水深火熱的地獄中受苦的眾生，但是哪一天忽然覺悟了，馬上就可以成佛。所以，即使是魔，我們也要尊重他，因為他是未來佛。只是在他未成佛之前，會來干擾你的修行。這種事，連釋迦牟尼佛在未成道時，坐在菩提樹下都遇到過，何況是我們這些意念不夠清淨的凡夫俗子，染污的意念每天都在不知招來多少魔考哩！因此，魔來了，不必害怕，就當作是在考試吧！沒考過再重來一次，一直考到及格爲止。不過，話雖如此說，但是最好還是收攝心念，不去招惹魔爲妙。


    當靈魂受到干擾，肉身感到不適時，沒有透過靈療是否能夠痊癒呢？或者我們該如何保護自己？減少干擾呢？當一個人受到不好的氣場干擾時，不管是魔也好，其他的也好，解決的方法沒有公式，必須視個別的狀況而決定。


    先談談如何保護自己。吳慕涵常常告訴我們，最重要的是隨時都要保持正信正念，對外面的世界要以是否合乎正法正道來判斷，只要不合乎正道的，聰明的人就要即刻遠離。還有，自己的直覺也很重要。有一次與陳國鎭敎授聊天，談到如何辨別正和邪，他說要相信自己的直覺。直覺，是當事情發生的剎那，自己的第一個反應。直覺，其實就是靈感，是我們自己靈性的感應，一般來說是滿正確的，除非你的靈已經被干擾了或衰弱無力，那當然另當別論。


    另外，吳慕涵很強調的一點就是前面提過的——尊重。他常說不管你相不相信靈界的存在，心存尊重，總不會錯。平日待人處世，也該如此，何況對待無所不在的無形界呢！你尊重他，他也以禮相待，彼此就不容易磨擦碰撞，各過各的，互不干擾。有時候，我們覺得自己受到干擾了，事實上是我們干擾了他們，因為人類過度開發，把許多靈界的地盤納入人的版圖，我們侵犯了他們，對不起他們在先，又不尊重他們，再有修養的靈界衆生也會不高興。人類令他們無家可歸，他們自然而然的會找與其氣場相近的人跟隨左右，受影響的人當然會感覺不對勁，因爲會來干擾人的靈界朋友，也是被無明所惑才會如此。


    無緣遇到可信任的靈療者時，該怎麼辦？許多正法正道的寺廟，供養的神佛，在人間渡化眾生，為眾生消災解厄；神佛充滿陽氣，是正能量，這是一種祥瑞之氣，當我們踏入這種正法的寺廟，會生出虔誠的心，也會心生歡喜，像回到家一樣，在這樣的場合，外靈有時會自動離去。也有許多有修為的法師、道士、善知識等，在人間散播法音，讓人心中充滿法喜，聽到的人靈漸漸清淨了，慢慢能夠放下煩惱、習氣，不但自己生活得更自在，連追隨左右的外靈也得渡而離開了，這也是一種靈療。事在人為，這正是近朱者赤，近墨者黑的道理，我國自古即有名訓，這句古訓能讓我們在此五濁惡世之中，選擇自己心靈的導師，並有所歸屬。


    讀過本書的十個故事後，有人提出一些疑問，例如為何老邁的身體被外靈附身後，身體的功能也因此改變，老者也變成猛男？被外靈所佔時，本靈到哪裡去了？


    這兩個問題答案是相同的，吳慕涵說過本靈弱而被外靈所佔時，本靈即被外靈所操控而失去自我。這種靈體是陰的，充滿著負的能量，是一種陰煞。中了陰煞的人，大部分都在中午過後陰氣漸重時，人開始感覺到不舒服，早上陽氣重，會比較清醒些。


    另一個問題是，為何立了牌位，嬰靈就無法離開？同理，祖先牌位是否也令祖先無法超生？


    吳慕涵曾經告訴我們，嬰靈是還未出生就被終結的犧牲者，難免有不滿和怨氣，才會留連不去；若爲他立了牌位，他可能會因貪戀供養而更無法離開，因此而永世不得超生。這雖是嬰靈本身的無明而引起，但是卻是殘忍的人類所設下的陷阱。爲祖先立牌位是完全不同的，祖先已經順利出生，而且活了一輩子，在該走的時候離開人世，可能早就投胎轉世或往生極樂世界了，爲祖先立牌位，是後世子孫飲水思源，慎終追遠的孝思，有家族血脈相傳，延續香火的用意；更有人類社會生生不息和民族傳承的意義在內。


    也有人問，為何祖墳的氣場會影響到子孫的氣場？其影響的方法為何總是讓子孫生病？或事業婚姻有障礙？


    長久以來以訛傳訛，讓許多人以爲祖墳的風水出了問題，會禍及子孫，甚至有人認爲祖先可能有什麼不滿而向子孫報復。這些說法是一場誤會，也冤枉了祖先。吳慕涵常被問到這種問題，他會義正嚴辭的說，祖先生前疼愛子孫，死後庇佑子孫，怎會做出對子孫不利的事呢？祖先和後世子孫因爲血緣關係而一脈相傳，這是割不斷的臍帶，因此祖先和子孫之間磁場是相連的，這種磁場無遠弗屆，子孫即使長年旅居海外也一樣能緊密相連。所以當祖先所居住的陰宅，受到氣場干擾而住得不舒服時，因磁場相連，子孫自然也會覺得不舒服。只是，人人忙於逐鹿紅塵，有幾個人會想到是陰宅出了問題？身體不舒服時，自會自己找理由解釋，如太忙了，太累了，壓力太大，睡眠不足，冷氣太強，運動不夠⋯⋯等等。當事業、婚姻出狀況時，也有理由解釋，像時運不濟，人生不如意事十之八九嘛！兩人世界哪有不磨擦的？也沒有人會想到陰宅是否出了問題？因此，一年年過去，祖先越來越不舒服，子孫也越來越不順利。陰宅的氣場影響了子孫的靈體，反應在肉體上就是病痛，只要陰宅氣場一調整，很多事就迎刃而解了。


    另一個問題，為何虛空界靈體的力量總比我們來得大？靈體的形狀為何？虛空界時、空間和我們一樣嗎？靈體有沒有是非道德的觀念？為何喜歡找弱者？《翠玉屏風》故事中的大姊頭，憑什麼能在許多靈體中稱王？


    虛空界是無形的，由能量聚集而成，可以來無影，去無蹤，甚至可以有穿透的能力。他們來去自如，身形也是變化無窮的，可以小得像一根針，也能大如須彌山。據吳慕涵說，靈體脫離肉身時，跟生前大小是一樣的，像電影「第六感生死戀」中，男主角不幸遇刺身亡，靈體離開肉身的情形一樣。人身由於有肉體的束縛，血肉之軀，太過於沉重，又有地心引力不斷的將我們向下拉，所以只能待在地面上生活。虛空界的時間和空間和我們不一樣，但是他們如果附在人身上，就只能跟我們一起過日子。靈界的生活當然有是非道德的觀念，他們的社會跟我們一樣，是有組織、有秩序的，任何一道都相同。但是，就像人類社會一樣，總是有些不守規矩的人，逾越了界線而造成混亂。《翠玉屏風》中的大姊頭，爲何能稱王？就跟人類社會有大哥一樣，強者爲王，經常欺凌或控制弱者。有些在外遊蕩的孤魂野鬼，會欺負氣場弱的人類，所以倒楣的人容易遇到鬼，這種說法不無道理。有些人是因爲前世果報，或被怨親債主纏身索債所致，來索債或索命的靈界朋友，有的也是領了旨公然來要債的，通靈者想爲他們和解也很困難。


    最後一個問題，爲何古董特別容易附靈？是否有善靈，如玉鐲相傳可保身？


    古董並非特別容易附靈，而是許多陪葬後出土的，有時候會被一些無明的靈體所跟隨，這些物品或許是他們生前所使用的，不捨的心，可能讓他們放不下，而致有許多古董被靈所附的事發生。只要是被靈所附，不管是善靈、惡靈，對人都不利，因爲陰陽兩隔，人鬼殊途；陰氣會干擾人的磁場，使人不舒服。至於玉鐲能否保身，中國人認爲可以。好人的玉，的確會散發好的磁場。玉文化在我國相傳已久且持續發揚光大。人們深愛美玉，認爲那是權力、財富、名位的象徵，也深信玉可以避邪，因此玉的魅力愈發不可擋。不過，佩戴在身上的玉，或擺放在家中的玉器，如果已經被邪氣所侵，那不但不能避邪，反而會更加招邪。


    在閱讀本書的故事之前，有一句話要和讀者共勉，那就是六祖在《無相偈》裡頭所說的「菩提只向心覓，何勞向外求玄」。想要修行提昇靈魂的人，切記靈山不遠求，只在自己心中。


