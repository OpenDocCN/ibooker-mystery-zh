    三天後，惠英到醫院掛卓敏的門診。


    不可思議的事發生了，超音波掃描竟然找不到腫瘤，X光片也照不到，卓敏和惠英簡直不敢相信這是真的。兩個人你看我，我看你的，脸上的表情難以形容，尤其是惠英，更是激動得痛哭失聲，幾個月來的擔驚受怕，那份沉重的壓力和低沉的心情，忽然被解放了。


    卓敏緊握著惠英的手，她跟她一樣激動。靈學向醫學挑戰，這一役靈學戰勝，使卓敏開始懷疑，若三個月前沒有遇到吳慕涵，惠英進了手術房，切除了腫瘤，後果會怎樣？


    這也使她想到，許多被送進手術房的病人，有哪些是靈體生病所造成的假象，又有哪些是真正肉體的病，這一刀切下去，切到的又是什麼？想到這裡，卓敏不禁起了雞皮疙瘩。


    她扶著哭泣的惠英走出診間，又回來看下一位病人時，她心裡也知道，以惠英的個性，為了慎重起見，一定還會去找別的教學醫院再做檢查；不管她再找多少醫生檢查，至少在這裡，她一定會繼續長期追蹤惠英的病情。


    昨天，她已經開始看聖經，雖然只是取下書架上封塵已久的那本黑皮書，隨意的翻到一頁，就看到〈馬可福音〉第一章第五節，裡面寫著：西門的岳母害熱病，就有人告訴耶穌，耶穌進前來，拉起她的手，扶她起來，熱就退了⋯⋯天黑時有人帶著一切害病的、被鬼附的來到耶穌跟前⋯⋯耶穌治好了害各種各樣病的人，又趕出了許多鬼⋯⋯接著卓敏又隨手翻到一頁，上面寫的是一位婦人生了十八年的病，耶穌說你被魔附身了十八年，於是將魔趕走，婦人就站了起來⋯⋯。聖經裡處處都是耶穌以神通治病及驅魔趕鬼的故事。


    在翻著聖經的同時，卓敏想起二十年前看過的一部老片子「大法師」，電影描述一位少女被魔鬼附身，天主教的神父為她驅魔，在經過激烈的鬥法後，邪不勝正，魔鬼被趕跑了，但神父也陣亡。卓敏心想神父的死，是因為厲鬼太惡使神父受創太深，或是神父缺少虛空界驅魔的執照？


    不管電影的結局如何，佛教、道教、天主教和基督教都有驅魔的說法，而我國也有很多跟捉鬼有關的民間故事。或許，除了人，宇宙間還存在著許多看不見的生命，平時大家相安無事，在自己的空間裡過日子，但偶而會時空錯亂，為某種原因而碰撞出火花。


    曾惠英的事，使卓敏對事物的看法有了改變。的確，發生這麼不可思議的事，使她的許多基本認知都動搖了。下了班，她不想直接回家，她必須一個人靜一靜，好好想一想。


    她把車開到山坡上，停在半山腰，打開車窗，讓有點微寒的風吹進車裡。


    山腳下萬家燈火，點點燈光彷彿閃亮的星子。天空中閃爍的星光，反而比不上人工的星光亮，但那種遙遠的、稀落的、幽靜的光，在黑沉沉的天幕上，散發出一種不可及的、幽遠的神秘光采。


    卓敏凝視著那遙遠國度裡的神秘，感覺那正像第四空間般的令人費解。人，的確很渺小，而宇宙太大，也太不可知。


    天上的星星好像在移動位置，正在重新排列組合。莫不是她眼花了，重新排列的圖案，竟是那位神秘男子吳慕涵的臉，他的嘴角還帶著笑意，彷彿正在「笑傲人間」。


    一陣強風吹進窗子，風聲裡恍惚聽到淒厲的哭聲，會是遠去的嬰靈的道別聲嗎？


    卓敏全身又起了雞皮疙瘩，她搖下車窗，發動引擎，加足馬力往山下開去。還是找一家咖啡店喝杯香醇的咖啡或叫杯美酒，來平復一下起伏盪漾的心情吧！


