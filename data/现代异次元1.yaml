    # 現代睡美人


    「你要我怎麼證明？檢查了這麼久，該做的都做了，還是查不出病因，我無法開診斷證明給你，因為我不知道證明上要寫什麼病名？如果校長一定要診斷書才肯准假，你請他去問上帝好了，問到了答案，一定要回來告訴我。」王主任說著，還無奈的攤開雙手。

    王主任是這家規模宏大的教學醫院腦神經內科主任，李媛媛因為嗜睡，帶來給他看病已有一段時間了，一直找不到病因。

    岑風聽到王主任這樣說，只能楞楞的看著他，目送著他漸行漸遠的身影，消失在醫院走廊的轉彎處，不知怎麼辦才好。

    找王主任開診斷證明，是因為女兒媛媛這幾年來，每個月都得請十天到半個月的假，請假期間不但不能上課，遇到考試也無法參加，除了影響她的在學成績，也造成學校極大


    ◇現代睡美人……63'
  - '[PAGE 104]


    的困擾。


    岑風知道女兒的病不是女性每個月生理痛的問題，若是這個問題就好解決了，也不會如此困擾他。從小學三年級到國三，整整六年的時間，媛媛從每個月昏睡七天到現在的十天，為人父母的著急心情有誰能夠了解？


    「李先生、李太太，媛媛老是不來上課，進度跟不上，都國三了，怎麼去參加高中聯考？」每次要請假，媛媛的級任鄧老師就老大不高興。


    「我女兒的命能夠保住最重要，去你的高中聯考！」岑風心裡這麼罵著。


    「能不能活著參加高中聯考都還不知道呢？」媛媛的媽媽玉嬋心裡也悲傷的想著。


    他們不怪校長和老師的疑慮，校方知道媛媛請假只是在家睡覺，以爲她是偷懶不想上學，或是逃避考試，認爲父母這樣縱容她，是一件後患無窮的事。


    校長幾次向岑風提起要診斷證明的事，他只好向王主任開口，沒想到王主任意竟這樣回答他，讓他當場楞住了。'
