    「這我就不知道了，可能這股煞氣太強了，又不願意走。虛空界的事，人們不甚了解，有時又驅，又趕，又鎮的，不見得有效，反而氣場會反彈，物極必反，就是這個道理。」


    「如果我們幾年前就遷墳，是不是可以避開？」張老太太問。


    「陰宅出了問題，不是遷墳就能解決的，那有錢人可以花大錢遷墳，個個都可以升天了？最根本的解決之道，是化解障礙，冤家宜解不宜結，問題沒解決，把墳遷得再遠，那股煞氣一樣會緊緊跟隨。」


    「這股煞氣為什麼會影響我們全家人？」志高的大哥心中的疑問依然難解。


    「大師，我以前聽人家說，這是死去的祖先在作怪，有這樣的事嗎？」志高的三哥也問道。


    「這種觀念是大錯特錯的，祖先活著的時候，疼愛子孫都來不及，哪一位祖先不希望自己的後代萬世其昌，怎麼可能死後還來危害子孫？」吳慕涵說著有點生起氣來，世間人愚蠢，因此怪罪祖先的時有所聞。


    「是嘛！我也不相信祖先會對子孫不利，違反常理嘛！」


    「煞氣作怪，祖先是第一個受害者，祖先雖然已經去世長埋地下，但他的氣場仍然跟整個家族相連，煞氣使先人受害，子孫自然而然也跟著受苦，不是死去的祖先作怪危害子孫，這種想法是不對的。」


    「我們家族這麼不順，都是大家太大意了，身體、事業出了狀況，起先都沒有往陰宅的方向去想，後來有親戚提醒我們，找了人來處理，做得又不得法，反而越做越糟。我們都是凡夫俗子，對另外一界的事一點也不懂，幸好能遇見大師，否則再拖下去更不得了。」志高的大哥也說。


    「不要這麼叫我，我不是什麼大師，只不過比你們多懂一點點而已。你們一家人該受的也受得差不多了，才會有緣遇到我，大家才有機會結個緣。」


    「很冒昧請問吳先生，你一個人空手而來，什麼也沒帶，是怎麼化解煞氣的？」


    「我用溝通的，剛才我在做事時，發出來的那一個大的嗝聲，有很大的能量，可以直接將不該在這裡，但是願意被超渡的另一界衆生直接渡走。」


    「吳先生真是高明。」


    吳慕涵笑了一笑不置可否。接著他就叫張家的子孫們把帶來的鮮花、水果擺在墳前祭拜祖先。張家一家大小齊聚一堂，上香並鞠躬如儀，一張張虔誠的臉上都有如釋重負的笑意。


    祭拜完成，吳慕涵將每一個人身上長期累積的不好氣場一一清除，才算大功告成。


    回到台北的第二天，志高發現困擾他多年的腰酸背痛的毛病忽然好了，若梅的腰酸背痛在隔一天也奇蹟似的消除，更高興的是第三天，小寶身上豆大的、透明水亮，痛徹心扉的疱疹，竟也離奇的收水，變乾，就這樣痊癒。


    現在他們終於相信很多人身上的病痛，的確不是病在肉體上，而是病在靈體上，只要將靈體上的干擾去除，疾病自然痊癒，這種疾病難怪在醫學裡找不到答案。


    少了病痛，志高更加生龍活虎般充滿了鬥志，第二年在王董的合夥投資下，他著手計劃東山再起。小寶也不再動不動就被飛蛇纏身，享受著健康活潑的童年。


    若梅時常想起吳慕涵，想必他仍然在救渡相信他的有緣人吧！那或許正是他來到人間的特殊任務。


    # 姬百合的迷思


    日頭正當中，初春的陽光照得人暖洋洋的。


    阿海抬頭審視整片花田，臉上不禁露出笑容，這一季的花，種得巧，當初不知哪來的靈感，把這一甲地分成三份，分別種了劍蘭、香水百合和姬百合；劍蘭和香水百合他已經連續種了好幾年，收成都不錯，尤其過年前花卉的需求量大增，他每天一大早交到花卉拍賣中心的貨又好又新鮮，都可以拍到好價錢，所以劍蘭和香水百合他年年都種，只是今年分出一部分地種黃色的姬百合，價錢賣得更好，出乎他的意料，他心想可能因為種的人少，奇貨可居的緣故。


    說真的，雖然姬百合讓他賺了一筆，但他並不很喜歡這種花。說不上什麼原因，他經常望著花兒看半天，想到的唯一理由，可能因為它的顏色吧！黃色的菊花，他覺得很美，黃色的百合,他也覺得很美,但是那種美,總覺得怪怪的,他習慣百合花該是白色的,或是白中帶一點水紅色,黃色姬百合那種鮮黃到令人炫目的顏色,平整得不太真實的花瓣,讓他覺得不夠自然,也美得詭異。


    每次這樣想時,阿海就會恍惚一下,彷彿看見一個黃色的影子從花上飛過來,鑽進自己的身體裡面,跟他合而爲一。


    「又在發什麼呆?該回去吃午飯了。」花叢中傳來妻子阿霞的聲音。


    「知道啦!」他回答著，但是他的聲音，自己聽起來都覺得有點陌生，好像從很遠的地方傳來，還有點回音。


    夫妻倆各騎了一部摩托車,一前一後的回到家,媳婦阿音已經做好午飯,飯菜已擺上桌;讀一年級的孫子放學回到家,三歲的孫女直吵肚子餓,就等二老回來開飯。


    飯後看一會兒電視,天沒亮就起床下田的阿海夫妻,習慣去睡個午覺。不過,最近這對老夫妻,關係有點微妙,說他們感情不好,絕非如此,但是,阿霞卻受不了阿海,一個人搬到三樓客房去住，而且睡覺的時候，還把房門牢牢的鎖住，為的是防阿海進來。


    小心翼翼的防著阿海，不是阿霞願意的事，但是阿海最近很不正常，逼得她幾乎是逃到三樓去睡。阿海六十幾歲了，從他二十三歲娶阿霞進門到現在，從來沒有在性事方面那麼勇猛過，最近他不但天天需要，一天還可以來好幾次，這根本不是他，像換了一個人似的。拒絕他，他還會生氣；生起氣來，那嘴臉也像變了一個人，陌生得讓阿霞打從心理害怕。


    這種情形有好一段時間了，阿霞簡直有苦無處訴。家裡有兒孫居住在一起，阿霞只能忍著，但是兒子正興和媳婦阿音也看出了二老之間的不對勁。


    有一天，事情爆發了開來，全家人才一起面對，共謀解決之道。


    那天，傍晚時分，讀下午班的小孫子仔仔放學回家，他一進門，見阿海坐在客廳看雜誌，立刻丟下書包挨在他身邊。


    「阿公，講故事。」


    「走開，走開，去寫功課。」阿海看得正起勁，不耐煩的說。


    「阿公，你在看什麼書？」


    「這書是專門給大人看的。」阿海說著把書本合上。


    「我要看！」仔仔伸手去搶。


    阿海沒防到仔仔這一招，書本被動作靈巧的孫子搶了過去。


    「哈哈！阿公，我贏了！」仔仔得意的拿著書跑開，要阿公來追他，他覺得這是在跟阿公玩。


    「把書還給我，這種書小孩不能看的。」阿海氣急敗壞的說著，真的追著孫子跑。


    「唉呀！」冷不防仔仔大叫一聲，撞上從廚房走出來的阿霞，手上拿著的书掉在地上。


    「跟你說過多少遍了，要看這種書，自己關在房間裡去看，誰也管不著，別在客廳裡丟人現眼。」阿霞撿起掉在地上的色情雜誌，氣沖沖的丟回給阿海。


    阿海拿了書，瞪了阿霞一眼，乖乖的回自己房間去。難怪阿霞生氣，阿海最近的表現，簡直快讓她抓狂，他像一個需求無度的猛男，不但買了許多色情雜誌來看，還租了色情影帶，趁媳婦和孫子不在家時偷看。被她發現，罵了幾次以後，他乾脆去買了一台電視機和放影機，安裝在自己房間裡，一個人躲在房裡看個過癮。


    「仔仔，去寫功課。你的書櫃裡有一本媽媽今天買的童話書，功課寫好了才能看喔！」阿音給仔仔使個眼色。


    「好！」仔仔高興的拿起書包走進自己的房間去。


    「真是不像樣！老番癲！」阿霞生氣的罵著。


    「媽，最近正興和我都覺得爸爸怪怪的，正興還懷疑爸爸是不是吃了那種藍色小藥丸？」阿音問。


    「那倒沒有，我覺得他是發神經了。」阿霞不習慣跟媳婦談這種事，臉都紅了起來。


    昨天，睡午覺時，阿海上三樓拼命敲阿霞的房門，阿霞不肯開門，阿海不死心，下得樓來，繞到屋子後面，拿梯子爬上二樓，再學泰山一樣沿著排水管攀上三樓，破窗而入，非要得逞不可。


    阿海的舉動，像個身手敏捷的年輕小伙子，三兩下就爬上梯子，躍上陽台，進入阿霞的房間。面對的是自己的丈夫，兒子又休假在家，正跟媳婦和孫子在樓下，這時阿霞不能和阿海吵，只能由他。


    這個一反常態，像隻猛獸一樣的男人，真的不像他那位忠厚、老實又靦腆的阿海。


    「媽，阿爸可能生病了，要不要帶他去看醫生？」


    「看哪一科的醫生？」


    「精神科啊！」


    「鄰居知道了，人人都會把他當瘋子，不太好吧？」


    「不看也不行，阿爸的情況很嚴重，妳不怕出事啊？」


    「會出什麼事？」


    「我當媳婦的是不應該說這種話，但是，這事發生在我們家，我很擔心。」


    「阿音，妳就像我女兒一樣，有話直說沒關係，我們可以一起想辦法。」


    「我聽人說阿爸在外面嫖妓，本來認爲是人家在造謠，說什麼也不信，可是最近看阿爸這種情形，覺得很有可能。」


    「那怎麼辦？妳阿爸像中了邪一樣，這樣下去怕真的會出事。」


    「這幾天，阿爸在街上走來走去，一直盯著年輕的女孩子看，還會跟蹤人家，住在村尾的阿玫就被阿爸嚇得不敢一個人走路回家。」


    「那我得看牢他，不能讓他一個人出門。」阿霞憂心忡忡的說。


    「阿爸真的像變了一個人，眼神都不對了。」


    「如果真的要去精神科，就去吧！紙包不住火，村子裡的人既然已經知道了，我們只好勇敢的面對。」


    中午，阿霞提前從田裡回來。


    「媽，回來啦！」正興也剛進門。


    「阿興，什麼事這麼急，不能等中午吃飯時再講？」


    「中午吃飯時阿爸在家不方便講。」


    「什麼事阿爸在不能講？」


    「阿爸撞邪的事。」


    「我都快煩惱死了，你說該怎麼辦？」


    「找人來驅邪。」


    「唉！找誰啊？我也是這麼想，最近我偷偷把你阿爸的衣服、指甲、頭髮，拿到廟裡去收驚，那道士說阿爸身上的無形朋友太強了，他沒辦法，我也不知道該怎麼辦？還有，上星期你帶阿音回娘家那天，我又請了一位法師到家裡來看你阿爸，那人也說他動不了，這位無形界的朋友太癡迷了，趕不走；你有認識的人嗎？」


    「我倒沒有認識的人，不過，媽，去年妳和阿爸參加旅行團出國去玩，隔壁莊開雜貨店的阿財不是也一起去嗎？」


    「是啊！他現在還玩不玩二十一點？」阿霞問。


    「很恐怖耶！阿財愛賭博，聽說連田產都賭掉了，是不是真的？」阿音也問。


    「是真的。阿財賭到他爸阿品伯要砍斷他的手，要不是他老婆哭哭啼啼的用自己的手去護著他的手，阿品伯那把菜刀就真砍下去了。」


    「誰不知道啊！這件事聽說鬧得他們全莊雞飛狗跳的。」


    「他現在不但不賭了，問他賭博的事，他還莫名其妙，好像都不記得了。」


    「田產都被他賭輸了，哪還有臉？一定是痛改前非了。」阿音很肯定的說。


    「不，他是真的不記得賭博的事，看起來不像是裝出來的。」正興說。


    「怎麼會這樣，他到底怎麼一回事，難道撞邪了不成？賭成那樣，還會忘記？」


    「阿音，你想想，阿財跟我是小學同學，我認識他一輩子了，他以前哪會賭博？連骰子都不知道怎麼丟呢！他從小到大最不喜歡的就是玩牌，也從來不玩。」


    「那他怎麼會迷上玩二十一點？」


    「說起來才奇怪呢！他是那次出國去美西玩回來以後才開始賭的。」


    「團裡每個人都互相認識，不知道誰敎他賭博的，說不定是跟他同房間的。」


    「才不是，他跟阿品伯一起去的。」


    「那更奇怪了。」


    「一點也不奇怪，你們不是去了賭城拉斯維加斯嗎？聽說他進了賭場，只是圍在賭桌旁看人賭二十一點，就像個賭王一樣下注了。」


    「真有這種事？」


    「事情隔了這麼久，大家也沒想到就是那時候出事的。」


    「出了什麼事啊？」阿音好奇的問。


    「出了大事！他就是那時被賭鬼上身了。」


    「被賭鬼上身？什麼跟什麼啊？第三類接觸？還是靈異第六感？」阿音開玩笑的說。


    「誰說他被賭鬼上身的？」


    「那次阿品伯不是要砍他的手嗎？第二天，有一個親戚，碰巧從北部回來，路過他們家，進來坐坐。這位親戚是個女的，名叫阿喜，阿財還叫她表姊，是幫神明辦事的乩身。她看阿財臉色發青，手還在發抖，就說阿財中邪了。阿品伯忽然想起這位親戚是很奇怪的一個人，原本在一家紡織廠當領班，有一天忽然就起乩了，聽說各路神明都會借她的身來辦事，解決了許多人身體、家庭和事業上的問題，在她住的村莊裡還小有名氣呢。阿品伯就求她無論如何都要幫幫忙，說這個兒子已經變款，他不認得了，賭博賭到汽車輸掉了，田產輸掉了，差點兒連這片店也輸掉。」


    阿霞和阿音聚精會神的望著正興，阿霞聽得手上的茶都忘了喝。


    「阿喜立刻起乩，她身上的神明問阿財最近是不是出國過？」


    「他是跟我們去過美西，那又怎樣？」


    「她又問出國時是不是有去賭博？」'
