- md: '# 穿牆而來的不速之客


    拉下診所的鐵捲門，一陣涼意爬上脊背，梅香不由自主的打了一個寒顫，全身都起了雞皮疙瘩。


    她朝候診室看了一眼，裡面空蕩蕩地，她真希望這時候有幾個病人坐在那裡候診，最好是有小孩子的哭叫聲，可以把一屋子的寂靜趕走。


    但是，想歸想，梅香聽到的卻只有自己的腳步聲，因為現在已經晚上九點多，診所已經下班，謝醫師回樓上去了，另一位護士小潔也下班走了，只有她一個人在診所裡。她快步的走進候診室，把電視機打開，綜藝節目裡主持人和受訪來賓打情罵俏的聲音，配上誇張的音響和笑聲，剎那間充滿了整個診所。平時最討厭看綜藝節目的她，此時竟覺得主持人那「嘿！嘿！嘿！」的笑聲聽起來分外可愛。


    梅香到謝醫師診所當護士已經一年多了，對診所裡的一切早已熟悉。但是最近這三個星期來，她總覺得診所裡怪怪的，在給病人打針或擦藥時，常常感覺到一股冷颼颼的涼意，從脊椎骨間直闖進來，常使她情不自禁的打起噴嚏。


    「被傳染感冒了？」好心的病人有時候會這樣問她。


    她知道這不是感冒，也不是過敏，因為就那麼一下子就沒事了，她只是覺得那股涼意來得奇怪。


    梅香生長在鄉下，從小膽子就很大，同學們常說她是天不怕地不怕的人，不過這三個多星期以來，怪事連連，使一向大膽的她都有點害怕起來。


    她手裡加快速度，把該消毒的紗布、棉球趕緊處理好，病歷歸回架子上，關掉電視，留一盞壁燈照亮診所，快步穿過注射室、儲藏室，回到後院加蓋的小房間，那是她的宿舍。


    進了房間，鎖好門，她立刻打開收音機，讓輕柔的音樂流瀉在房間的每個角落，她的心才安定下來。


    洗了個澡，把一身的疲憊洗掉；她泡了杯咖啡，坐在桌前，一邊品著咖啡，讓香香甜甜又帶點兒苦味的咖啡，輕撫她的身心，一邊翻開自己心愛的散文集，才感到真正的放鬆，白天診所裡發生的怪事才一股腦兒地被她拋到腦後。


    第二天，早上十點多，一位上吐下瀉的中年男人來看診，病人有嚴重的脫水現象，謝醫師囑咐梅香準備鹽水針，要給病人打點滴。


    病人躺在注射室的白色病床上，手腕上插著針頭，生理食鹽水正一滴滴的由細細的、透明的小水管流入針管，再注入更細的血管中。梅香要病人盡量放輕鬆，最好能睡一覺。那位中年男人很聽話的閉上眼睛，緊皺的眉頭慢慢舒展開來，呼吸也逐漸均勻，不一會兒竟真的睡著了。


    注射室裡傳來中年男人的打鼾聲，梅香一邊忙著，一邊不時的走到注射室門口張望，注意點滴的情況。


    「不要！不要拉我！」忽然注射室裡傳來中年男子的叫喊聲。


    謝醫師和梅香聽到聲音立刻趕過來，那位中年男子已經跌坐在地上，莫名其妙的四處張望，對自己為什麼會坐在地上似乎感到很奇怪。


    「我越睡越冷，越睡越冷，好像覺得四周有很多黑影在走動。」


    梅香和謝醫師幫忙把病人從地上拉起來。連在藥房裡的小潔也跑過來看發生了什麼事？


    「一定是你睡著在做夢。」謝醫師說。


    病人躺下身子，梅香趕緊過去把點滴調整好。


    「可能吧！這個夢好奇怪，夢裡有好幾個人合力把我推下床，醒來時，睜開眼睛，人就真的坐在地上。」中年男子說著笑了起來，他相信自己做夢了，只是夢境太真實了，讓他心有餘悸。


    梅香聽了謝醫師和病人的對話，心裡直發毛，她相信謝醫師和她一樣，心理也犯嘀咕，只是外表強自鎮定，裝成沒事一般。


    躺在這張病床上注射的病人，夢到被好幾個人合力推下床，這已經是這個月來的第三次了。是巧合嗎？三個人都做同樣的夢，太令人難以置信了。


    梅香記得第一個被推下床的，是個腹瀉的小學男生。他跌下來時，頭還撞到點滴瓶的鐵架，腫了一個包。那小男生很勇敢，沒哭，但臉色嚇得發白。


    「護士阿姨，我好像夢見鬼耶！」小男生驚悸猶存的說著，自己從地上爬起來，還四處張望著。


    「胡說，大白天的，哪來的鬼？」


    「真的耶！有好幾個鬼，要趕我下床，我嚇死了，躺著不敢動，他們就把我抓起來，用力扔到地上。」


    「哪有這種事？是你生病了，才會做惡夢。」


    「可是很像真的耶！不然我怎麼會掉到地上？」


    「我問你，你平時在家睡覺，有沒有掉到床下過？」


    「有，每次掉下來，我就在床下繼續睡。」


    「就是嘛！自己的壞習慣，別拿來嚇我！」


    小男孩天真的一笑，自己爬上病床躺好。梅香去拿了消腫的藥膏，幫他揉額頭上的那個包。


    「媽媽還要半小時才會過來，你躺著，不要怕，阿姨就在外面。」


    那次，梅香真的以為小男孩在做惡夢。


    隔了兩天，一位阿婆因為感冒引起肺炎，發高燒，也在注射室裡躺著打點滴。


    點滴打不到半瓶，就聽到阿婆大叫一聲，跌下床來。梅香和謝醫師趕到注射室時，阿婆的媳婦正緊張兮兮的扶著差點兒被撞倒的點滴架。


    「怎麼好好的躺著，會忽然摔下來，真是奇怪！」


    謝醫師和梅香幫著那位媳婦，把重達九十公斤的阿婆扶起來，讓她躺回床上。


    「這房間越坐越冷，怎麼回事啊？」


    「不會吧！我不覺得啊！」梅香才說著，忽覺一股涼意自脊背升起，直衝腦門，使她頭皮一陣發麻。


    「醫生，我好像看到很多人影在房間裡走來走去。」阿婆也說。


    「阿婆，你做夢啦！這房間裡沒有別人。」謝醫師摸摸阿婆發燙的額頭說。


    「媽，你下床做什麼？是不是要去上廁所？」媳婦問。


    「我沒有要下床，好像迷迷糊糊被好幾個人推下來的。」


    「媽，妳愛說笑，誰推妳，妳一定是發高燒，頭殼燒壞了！」媳婦又說。


    「阿婆，妳還在發燒，躺好，不要再起來了。」謝醫師也說。


    阿婆應了一聲好，但她的眼神茫然，似乎還沒回過神，對自己是怎麼跌下床的也搞不清楚。


    但敏感的梅香，好像感覺到謝醫師的身子抖了幾下，又看到他的眼光在房間四周搜尋，她心想，難道他也感受到那股涼意嗎？


    「我是在發燒，但頭殼沒燒壞，我是被人推下床的。」阿婆嘟噥著，語氣很肯定。梅香正在重新調整點滴的速度，聽阿婆這麼一說，她機靈的看著謝醫師，他也正好看向她這邊，四道目光相遇，兩人很有默契的同時說：


    「阿婆，妳休息一下。」


    阿婆沒再說什麼，閉上眼睛休息。謝醫師和梅香也走出注射室，去招呼下一位病人。接下來就是今天發生的事了。那位患了腸胃炎上吐下瀉的中年男子，是第三位躺在病床上莫名其妙跌下來的人。


    梅香一想到這些事，就有一種不祥的感覺，莫不是診所裡鬧鬼了？


    謝內科開業已近二十年，謝醫師不但醫術高明，也很有醫德，可以說是一位仁心仁術的好醫師；診所裡也從來沒發生過醫療糾紛，這二十年來一直平安順利。診所是一棟三樓的透天厝，謝醫師一家人就住在二樓和三樓，他們另有樓梯出入，不必經過診所。診所後院加蓋的房間是宿舍，梅香就住在那裡。


    這三個星期來，怪事連連發生，住在後院的梅香，下了班也不敢在診所多停留，只敢待在自己的房裡。後院有一個小門可以出入，她有時要上街逛逛，寄信或買點東西，就不必穿越診所，直接從後門走就行了。


    怪事接連著發生，謝醫師一家人都感到困惑，又不敢張揚，怕驚動鄰居，也怕病人知道了不敢上門。平時不信邪的謝醫師，這幾天也會趁著沒病人的空檔，躺在注射室的病床上，雖然沒有被不明的力量推下床，但不知是不是心理作用，他也能感覺到一股陰森之氣，還恍惚覺得屋裡有人影晃動。


    儘管不信邪，但謝醫師並不是很鐵齒的人，他學生時代喜歡讀四書，對孔孟思想很著迷，對儒家更是敬佩。對「敬鬼神而遠之」這句話，他印象深刻。他想這麼有道德和學問的聖人，都說對鬼和神要敬而遠之，表示相信有鬼神的存在，只是認為鬼神跟人存在於不同的世界裡，本來就不相往來，各過各的，所以凡間的人應當對肉眼看不見的虛空界眾生，敬而遠之。


    但是，這種長久的平衡，在這三個多星期來，為什麼忽然被打破？互相尊重、互不干擾和保持距離既然已經不可能，謝醫師心裡知道他必須有所行動，想辦法化解這一場突然其來的災難。


    診所裡鬧鬼，這事非同小可，不但要趕快解決，還得暗地裡進行。為了不讓人認為他迷信，也為了維護自己身爲醫師的專業形象，他不能公然請地理風水師、道士或乩童來診所做法。他知道好事不出門，壞事傳千里，事情一旦公開，一傳十，十傳百，對診所的名聲也有影響。


    謝太太對這件事也慌了手腳，不知該怎麼辦好？這事本來不想驚動高齡八十的公公，但她的焦慮藏不住，謝老先生年紀雖大，人卻依然硬朗，觀察力也清楚敏銳，他也看出家裡出了事，追問之下，謝太太只好一五一十的向老人家報告這件事。


    謝老先生不愧見多識廣，他告訴兒子這種事不要驚動社區裡的人，應該從別的地方請人來處理。


    「這代誌交給我來辦。」謝老先生拍拍胸脯，要兒子和媳婦放心。「還有，叫梅香和小潔免驚，記得叫她們不要出去黑白講，病人才不會驚嚇到。」他又交代著。


    「知道了，我已經跟他們講過。」謝醫師回答。


    「這幾天，梅香如果不敢住樓下，叫伊來樓上住。」謝老先生對媳婦說。


    梅香並沒有搬到樓上去住，她雖然心理毛毛的感到有些不安，但也不至於害怕到不敢住樓下。而且經過她多天的觀察，發現怪事的發生都集中在診所的注射室，其他地方都沒有這種怪現象。所以，下了班她一個人時就不走進注射室，倒也相安無事。


    「我是吃人頭路，賺錢奉養父母，現在客居他鄉，暫時在這裡安身，診所如果真的鬧鬼，跟我也無冤無仇，相信他們也是講道理的，況且冤有頭債有主，應該不會找上我。」梅香抱著「不做虧心事，夜半敲門心不驚」的篤定心情，依舊住在後院那間溫暖的小窩裡。


    發生這種事是很麻煩的，梅香也知道，通常一般人都會去請地理風水師或道士來做法驅邪。她有一位親戚就是做這一行的，每次見他去幫人家做法事，真的解決了對方的問題，那真是皆大歡喜。但也經常聽到不久之後，那家人又出事了。


    她心理經常思考這樣的問題，用各種方法去驅、去趕、去鎮，真的有用嗎？她有時候會懷疑，做法的人使用的方法都是學來的，只是不知道他學習的成績是一百分，或是六十分低空掠過，勉強及格，或者根本就是胡亂學來的，只會做個樣子⋯⋯，總之，他們在這一行裡，有模有樣的為人去病消災或解決各種問題。就算有慧根的人，學了個八十分，可以運用各種法器、道具、令旗、符咒、咒語甚至念經等等來驅邪，但這些人間的有為法，真的能夠究竟嗎？虛空界真的會理會這些？害怕這些？因而離開嗎？虛空界的朋友們，難道不會在孤掌難鳴，不敵道士法術的情況下，暫且收兵離去，然後去招兵買馬，成群結隊的再捲土重來嗎？所以常會有人家裡平安無事了一段時間之後，不久情況不但重演，還變本加厲，更加不可收拾！甚至連做法的道士，都不敢再來嘗試。


    梅香也聽阿嬤講過，有一位開水電行的親戚，有一段時間家中很不平靜，連連出狀況，一下有人車禍，一下有人生病，生意也一落千丈，他本人也天天頭昏，根本無法工作；於是就到附近的神壇去問，說是卡到陰的，要他燒紙錢來化解。那位親戚無計可施，只好照做。第一次花了二十萬元新台幣，請神壇的主持人燒紙錢，果然情況好轉；不過不到一個月時間，又故態復萌。神壇那邊又要他燒紙錢，結果又燒了二十萬；就這樣每隔一段時間就得花個二十萬，沒完沒了，總共已經燒了一百多萬了，事情還是沒解決。


    阿嬤說送錢給陰界的朋友，不是個好辦法，她說這就像賄賂一樣，等到錢用完了，他們可能還會再來要，想要擺平不是那麼簡單。那時梅香還是個學生，阿嬤的意思她並不完全懂，慢慢長大以後，她才了解陰間和人間一樣，這種賄賂的方式是一種暫時的安撫，無法發揮長久的作用，如果繼續賄賂，仍然是養不足貪心者的胃口，會變成填不滿的無底洞。


    她不曉得，當陰陽兩界磨擦而迸出火花時，該如何來化解？如何才能找到真正有能力的人來把這種衝突平息？古時候，有巫師可以溝通陰陽兩界，為人消災解厄。巫師，是在天地間被委以重任的人，他們透過種種方法與靈界溝通。至今，許多與世隔絕的原住民部落裡仍然有巫師的存在，他們的地位崇高，是部落裡最具權威和地位的人。在中國人的社會裡，遇到這種陰陽兩界畫不清界線而互相干擾時，一般人習慣請道士來做法。


    梅香心理想著，謝老先生是位精明又幹練的人，一定可以請到高人來化解。果然，過沒幾天，謝老先生多方打聽，最後透過遠方親戚的介紹，請來了一位在家修行的居士。


    聽說這位修行人吳先生，不是一般的地理師或道士，他用的方法和別人通通不一樣，因為他是一位有天命的天生通靈者，不但有很強的感應能力，還有天眼通，又能與虛空界直接對話，簡直像一位活菩薩。


    梅香對謝老先生形容的這位高人很好奇，不知他用的是什麼方法。阿嬤以前常告訴她：「道高一尺，魔高一丈。」要制服魔是很難的，就像警察抓強盜一樣。她還反問阿嬤為什麼？阿嬤說警察在執行公權力時，有許多限制，像用槍用棍等，不能隨意去傷害人，就算這個人是個殺人狂也一樣。但是歹徒可不同了，他們做壞事是沒有規則的，尤其和警察玩官兵抓強盜的遊戲時，什麼把戲都使得出來。梅香很愛看電影，當她看警匪片時，看到壞人無所不用其極的犯罪手法，就真的了解什麼叫做「道高一尺，魔高一丈」了。


    謝老先生挑了一個診所休診的日子，把吳先生請了來。吳先生是謝醫師的叔公非常推崇的特異功能人士。梅香那天本來想要回家，還改了期，特地留下來一睹這位高人的廬山真面目。


    吳先生一走進診所，梅香就趕緊為他端上一杯茶，並仔細的打量他。他是一位身材中等，皮膚黝黑的中年男子，看去像一位莊稼漢。梅香倒想看看這位高人有本多事。


    寒喧沒幾句，吳先生就放下茶杯，在診所裡到處看了一遍，當他走到注射室時，不禁皺了一下眉頭。


    「這間不對。」吳先生很肯定的說。


    「對，這間經常出事。」謝醫師和謝太太同時回答。


    「事情沒這麼簡單，不會只有這間有事。」


    「請問老師，哪裡還有事？」謝老先生一聽立刻問道。


    「這裡是診所，你們住家在哪裡？」


    「在樓上。」


    「帶我去看看。」


    由謝老先生領路，大家尾隨在後，上了二樓，連梅香也好奇的跟了上去。吳先生在二樓四處看了一遍，好像沒找到他想找的。


    「你們有拜佛或拜祖先嗎？」吳先生問。


    「有，佛桌在三樓。」謝老先生說著帶吳先生走上樓梯。


    謝家有一間佛堂，布置得華麗又莊嚴，中間擺了一張神桌，神桌的中央供奉觀世音菩薩，左邊是謝家的祖先牌位。可是吳先生在這間富麗堂皇的佛堂裡，看到的可大不相同。觀世音菩薩的雕像裡，坐的不是觀世音，而是一個青面獠牙的大魔頭；謝家的祖先牌位裡，空空如也，祖先早就被魔嚇跑，不知躲到何方去了。這位魔頭一看到吳先生，立刻想溜，但吳先生一揮手，把他定住，讓他動彈不得。


    「你們每天在拜佛敬祖，可是家裡的氣場一團亂，佛像都被佔了，拜什麼都不知道！幸好祖上積德，祖先牌位沒有被佔，只是空了，否則更慘！你們祖先現在在外面受苦了。」


    謝老先生一聽，覺得事態嚴重，如果拜佛變成在拜魔，那還得了。祖先都不見了，更不得了。


    「大師，請幫幫忙。」謝老先生很恭敬的說。


    吳先生沒什麼，他面對佛桌，目視觀世音菩薩的像，喉嚨裡發出一陣陣的聲音，好像在講話一樣，神情非常專注。然後又走到謝家祖先牌位這邊，喉嚨裡又是一陣咕噥。在一旁一直不發一語的梅香直覺的認為，吳先生似乎正在與凡人看不見的虛空界對話。


    「有一位身上穿著灰布棉衣，個子高高瘦瘦，背挺得很直，抽一支這麼長的黑色煙斗的老先生⋯⋯」吳先生一邊用手比出一個長度，然後又接著說：「是你們家的誰？」


    「是我爸爸。」


    「是我阿公。」


    謝老先生和謝醫師異口同聲的說。


    「好了，陰界的朋友渡走了，觀世音菩薩請回來了，你們家的祖先也幫你們找回來了。」


    「謝謝！謝謝大師。」謝家的每個人都非常感恩，也都心服口服。


    梅香更是驚訝萬分，她想這位吳先生真是高人，也不見他有什麼動作，也沒看到他用任何法器、道具，就把事情辦好了，真是太不可思議了。


    「你們的菩薩和祖先都歸位了，準備些鮮花素果，祭拜一下。」


    「都準備好了。」謝太太說著，立刻端出供品擺好。


    由謝老先生主祭，謝家人虔誠的禮佛和祭拜祖先。


    「現在這裡沒事了，我們再回到診所去，還有事情沒了。」吳先生說道。


    一行人又下得樓來，走進診所裡去。吳先生逕自走到注射室，這裡面一堆黑影，早在上樓前就全被他定在原地，一個也跑不了。此時，他又是一陣咕噥，那些個好兄弟，一個個都同意離開，不再留連人世，於是，吳先生一揮手將他們全渡走了。


    「這裡有一堆不該屬於人間的朋友，我把他們全請走了。」


    大夥兒一聽，鬆了一口氣，全都放了心。


    吳先生環顧四週，似乎在感應著，然後走到病床對面那片牆，指著靠牆儲放醫療用品的櫃子說：


    「櫃子後面這片牆是一個通道，無形界的朋友都是從那裡穿牆過來的。你們隔壁是做什麼的？」


    「本來是一家文具店，後來搬走了，一個月前，房東又把它租出去了，現在開了一家神壇。」謝太太說。


    「這片牆的後面正好是神壇的供桌，桌上有很多神像，還插了一些旗子。」謝老先生也說道。


    「神壇的黑令旗，招來了許多陰界的朋友，他們從這裡進進出出的，還躺在這張病床上，所以你的病人一躺上去，就被他們推下來。」


    「隔壁的事，我們也干涉不了，那該怎麼辦？」


    「我要把這個通道堵起來，只要他們過不來，隔壁做什麼，是他們的事，不影響這邊就好。」


    「請大師想想辦法。」謝老先生請求著。


    吳先生在診所裡前前後後又看了一遍，似乎正動著腦筋。


    「這座儲物櫃可以搬走嗎？」


    「可以，可以。」謝醫師回答。


    「這樣吧！把這個櫃子搬到別的地方去，把候診室的電視機搬到這裡來。」


    「好，立刻就搬。」謝老先生二話不說，馬上就和家人一起動手搬東西，連梅香也主動過來幫忙。


    電視機就了定位，替代了原先的儲物櫃後，吳先生又仔細的在注射室裡感應了一下。


    「好了，現在都沒事了。」吳先生終於滿意的說。


    原以為要大費周章，沒想到這麼簡單就解決了，謝老先生非常佩服。活了一大把年紀，看過很多人處理過類似的靈異事件，但從來沒見過像吳先生這樣的人，可以不藉助任何人間使用的工具或儀式，直接就可以和靈界接觸；而靈界也似乎很尊重他，甚至聽命於他，好像他是一位靈界派來人間的使者，任務就是帶這些迷途的靈魂回家。


    「大師，我很好奇，可以請問您一些問題嗎？」


    事情都解決了，謝老先生請吳先生上樓去喝茶。謝太太端出許多精緻的小點心，殷勤地招呼這位異人。女傭今天休假，梅香主動幫忙端茶遞水。謝醫師忍不住心中的疑問，於是提出問題請教。


    「我不是什麼大師，不過你有什麼問題，我知道的一定會回答。」


    「我想知道為什麼電視機擺在那裡，就可以把無形界的通道堵起來？」


    「電視機的輻射很強，可以接收和放射磁波，這是大家都知道的；牆壁上那個無形的通道，也是由不同的磁場造成的，我把電視機擺在那個通道上，是利用它的磁場來干擾另一個時空的磁場，破壞通道的磁場，等於把通道堵起來了，使他們沒有辦法再從這片牆穿越過來。」


    「沒想到電視機的磁場那麼厲害！」


    「輻射是很傷人的，大家只知道太近看電視會傷眼睛，其實只傷到眼睛嗎？應該不止吧！眼睛只是最早被發現受到影響的器官，其他身體的器官可能需要累積更多的輻射，才會顯出症狀，時間久了，大家沒有把這些症狀跟看電視聯想在一起而已。」


    「有道理，我倒沒有想過這樣的事。」'
  mdcn: '# 穿牆而來的不速之客


    拉下診所的鐵捲門，一陣涼意爬上脊背，梅香不由自主的打了一個寒顫，全身都起了雞皮疙瘩。


    她朝候診室看了一眼，裡面空蕩蕩地，她真希望這時候有幾個病人坐在那裡候診，最好是有小孩子的哭叫聲，可以把一屋子的寂靜趕走。


    但是，想歸想，梅香聽到的卻只有自己的腳步聲，因為現在已經晚上九點多，診所已經下班，謝醫師回樓上去了，另一位護士小潔也下班走了，只有她一個人在診所裡。她快步的走進候診室，把電視機打開，綜藝節目裡主持人和受訪來賓打情罵俏的聲音，配上誇張的音響和笑聲，剎那間充滿了整個診所。平時最討厭看綜藝節目的她，此時竟覺得主持人那「嘿！嘿！嘿！」的笑聲聽起來分外可愛。


    梅香到謝醫師診所當護士已經一年多了，對診所裡的一切早已熟悉。但是最近這三個星期來，她總覺得診所裡怪怪的，在給病人打針或擦藥時，常常感覺到一股冷颼颼的涼意，從脊椎骨間直闖進來，常使她情不自禁的打起噴嚏。


    「被傳染感冒了？」好心的病人有時候會這樣問她。


    她知道這不是感冒，也不是過敏，因為就那麼一下子就沒事了，她只是覺得那股涼意來得奇怪。


    梅香生長在鄉下，從小膽子就很大，同學們常說她是天不怕地不怕的人，不過這三個多星期以來，怪事連連，使一向大膽的她都有點害怕起來。


    她手裡加快速度，把該消毒的紗布、棉球趕緊處理好，病歷歸回架子上，關掉電視，留一盞壁燈照亮診所，快步穿過注射室、儲藏室，回到後院加蓋的小房間，那是她的宿舍。


    進了房間，鎖好門，她立刻打開收音機，讓輕柔的音樂流瀉在房間的每個角落，她的心才安定下來。


    洗了個澡，把一身的疲憊洗掉；她泡了杯咖啡，坐在桌前，一邊品著咖啡，讓香香甜甜又帶點兒苦味的咖啡，輕撫她的身心，一邊翻開自己心愛的散文集，才感到真正的放鬆，白天診所裡發生的怪事才一股腦兒地被她拋到腦後。


    第二天，早上十點多，一位上吐下瀉的中年男人來看診，病人有嚴重的脫水現象，謝醫師囑咐梅香準備鹽水針，要給病人打點滴。


    病人躺在注射室的白色病床上，手腕上插著針頭，生理食鹽水正一滴滴的由細細的、透明的小水管流入針管，再注入更細的血管中。梅香要病人盡量放輕鬆，最好能睡一覺。那位中年男人很聽話的閉上眼睛，緊皺的眉頭慢慢舒展開來，呼吸也逐漸均勻，不一會兒竟真的睡著了。


    注射室裡傳來中年男人的打鼾聲，梅香一邊忙著，一邊不時的走到注射室門口張望，注意點滴的情況。


    「不要！不要拉我！」忽然注射室裡傳來中年男子的叫喊聲。


    謝醫師和梅香聽到聲音立刻趕過來，那位中年男子已經跌坐在地上，莫名其妙的四處張望，對自己為什麼會坐在地上似乎感到很奇怪。


    「我越睡越冷，越睡越冷，好像覺得四周有很多黑影在走動。」


    梅香和謝醫師幫忙把病人從地上拉起來。連在藥房裡的小潔也跑過來看發生了什麼事？


    「一定是你睡著在做夢。」謝醫師說。


    病人躺下身子，梅香趕緊過去把點滴調整好。


    「可能吧！這個夢好奇怪，夢裡有好幾個人合力把我推下床，醒來時，睜開眼睛，人就真的坐在地上。」中年男子說著笑了起來，他相信自己做夢了，只是夢境太真實了，讓他心有餘悸。


    梅香聽了謝醫師和病人的對話，心裡直發毛，她相信謝醫師和她一樣，心理也犯嘀咕，只是外表強自鎮定，裝成沒事一般。


    躺在這張病床上注射的病人，夢到被好幾個人合力推下床，這已經是這個月來的第三次了。是巧合嗎？三個人都做同樣的夢，太令人難以置信了。


    梅香記得第一個被推下床的，是個腹瀉的小學男生。他跌下來時，頭還撞到點滴瓶的鐵架，腫了一個包。那小男生很勇敢，沒哭，但臉色嚇得發白。


    「護士阿姨，我好像夢見鬼耶！」小男生驚悸猶存的說著，自己從地上爬起來，還四處張望著。


    「胡說，大白天的，哪來的鬼？」


    「真的耶！有好幾個鬼，要趕我下床，我嚇死了，躺著不敢動，他們就把我抓起來，用力扔到地上。」


    「哪有這種事？是你生病了，才會做惡夢。」


    「可是很像真的耶！不然我怎麼會掉到地上？」


    「我問你，你平時在家睡覺，有沒有掉到床下過？」


    「有，每次掉下來，我就在床下繼續睡。」


    「就是嘛！自己的壞習慣，別拿來嚇我！」


    小男孩天真的一笑，自己爬上病床躺好。梅香去拿了消腫的藥膏，幫他揉額頭上的那個包。


    「媽媽還要半小時才會過來，你躺著，不要怕，阿姨就在外面。」


    那次，梅香真的以為小男孩在做惡夢。


    隔了兩天，一位阿婆因為感冒引起肺炎，發高燒，也在注射室裡躺著打點滴。


    點滴打不到半瓶，就聽到阿婆大叫一聲，跌下床來。梅香和謝醫師趕到注射室時，阿婆的媳婦正緊張兮兮的扶著差點兒被撞倒的點滴架。


    「怎麼好好的躺著，會忽然摔下來，真是奇怪！」


    謝醫師和梅香幫著那位媳婦，把重達九十公斤的阿婆扶起來，讓她躺回床上。


    「這房間越坐越冷，怎麼回事啊？」


    「不會吧！我不覺得啊！」梅香才說著，忽覺一股涼意自脊背升起，直衝腦門，使她頭皮一陣發麻。


    「醫生，我好像看到很多人影在房間裡走來走去。」阿婆也說。


    「阿婆，你做夢啦！這房間裡沒有別人。」謝醫師摸摸阿婆發燙的額頭說。


    「媽，你下床做什麼？是不是要去上廁所？」媳婦問。


    「我沒有要下床，好像迷迷糊糊被好幾個人推下來的。」


    「媽，妳愛說笑，誰推妳，妳一定是發高燒，頭殼燒壞了！」媳婦又說。


    「阿婆，妳還在發燒，躺好，不要再起來了。」謝醫師也說。


    阿婆應了一聲好，但她的眼神茫然，似乎還沒回過神，對自己是怎麼跌下床的也搞不清楚。


    但敏感的梅香，好像感覺到謝醫師的身子抖了幾下，又看到他的眼光在房間四周搜尋，她心想，難道他也感受到那股涼意嗎？


    「我是在發燒，但頭殼沒燒壞，我是被人推下床的。」阿婆嘟噥著，語氣很肯定。梅香正在重新調整點滴的速度，聽阿婆這麼一說，她機靈的看著謝醫師，他也正好看向她這邊，四道目光相遇，兩人很有默契的同時說：


    「阿婆，妳休息一下。」


    阿婆沒再說什麼，閉上眼睛休息。謝醫師和梅香也走出注射室，去招呼下一位病人。接下來就是今天發生的事了。那位患了腸胃炎上吐下瀉的中年男子，是第三位躺在病床上莫名其妙跌下來的人。


    梅香一想到這些事，就有一種不祥的感覺，莫不是診所裡鬧鬼了？


    謝內科開業已近二十年，謝醫師不但醫術高明，也很有醫德，可以說是一位仁心仁術的好醫師；診所裡也從來沒發生過醫療糾紛，這二十年來一直平安順利。診所是一棟三樓的透天厝，謝醫師一家人就住在二樓和三樓，他們另有樓梯出入，不必經過診所。診所後院加蓋的房間是宿舍，梅香就住在那裡。


    這三個星期來，怪事連連發生，住在後院的梅香，下了班也不敢在診所多停留，只敢待在自己的房裡。後院有一個小門可以出入，她有時要上街逛逛，寄信或買點東西，就不必穿越診所，直接從後門走就行了。


    怪事接連著發生，謝醫師一家人都感到困惑，又不敢張揚，怕驚動鄰居，也怕病人知道了不敢上門。平時不信邪的謝醫師，這幾天也會趁著沒病人的空檔，躺在注射室的病床上，雖然沒有被不明的力量推下床，但不知是不是心理作用，他也能感覺到一股陰森之氣，還恍惚覺得屋裡有人影晃動。


    儘管不信邪，但謝醫師並不是很鐵齒的人，他學生時代喜歡讀四書，對孔孟思想很著迷，對儒家更是敬佩。對「敬鬼神而遠之」這句話，他印象深刻。他想這麼有道德和學問的聖人，都說對鬼和神要敬而遠之，表示相信有鬼神的存在，只是認為鬼神跟人存在於不同的世界裡，本來就不相往來，各過各的，所以凡間的人應當對肉眼看不見的虛空界眾生，敬而遠之。


    但是，這種長久的平衡，在這三個多星期來，為什麼忽然被打破？互相尊重、互不干擾和保持距離既然已經不可能，謝醫師心裡知道他必須有所行動，想辦法化解這一場突然其來的災難。


    診所裡鬧鬼，這事非同小可，不但要趕快解決，還得暗地裡進行。為了不讓人認為他迷信，也為了維護自己身爲醫師的專業形象，他不能公然請地理風水師、道士或乩童來診所做法。他知道好事不出門，壞事傳千里，事情一旦公開，一傳十，十傳百，對診所的名聲也有影響。


    謝太太對這件事也慌了手腳，不知該怎麼辦好？這事本來不想驚動高齡八十的公公，但她的焦慮藏不住，謝老先生年紀雖大，人卻依然硬朗，觀察力也清楚敏銳，他也看出家裡出了事，追問之下，謝太太只好一五一十的向老人家報告這件事。


    謝老先生不愧見多識廣，他告訴兒子這種事不要驚動社區裡的人，應該從別的地方請人來處理。


    「這代誌交給我來辦。」謝老先生拍拍胸脯，要兒子和媳婦放心。「還有，叫梅香和小潔免驚，記得叫她們不要出去黑白講，病人才不會驚嚇到。」他又交代著。


    「知道了，我已經跟他們講過。」謝醫師回答。


    「這幾天，梅香如果不敢住樓下，叫伊來樓上住。」謝老先生對媳婦說。


    梅香並沒有搬到樓上去住，她雖然心理毛毛的感到有些不安，但也不至於害怕到不敢住樓下。而且經過她多天的觀察，發現怪事的發生都集中在診所的注射室，其他地方都沒有這種怪現象。所以，下了班她一個人時就不走進注射室，倒也相安無事。


    「我是吃人頭路，賺錢奉養父母，現在客居他鄉，暫時在這裡安身，診所如果真的鬧鬼，跟我也無冤無仇，相信他們也是講道理的，況且冤有頭債有主，應該不會找上我。」梅香抱著「不做虧心事，夜半敲門心不驚」的篤定心情，依舊住在後院那間溫暖的小窩裡。


    發生這種事是很麻煩的，梅香也知道，通常一般人都會去請地理風水師或道士來做法驅邪。她有一位親戚就是做這一行的，每次見他去幫人家做法事，真的解決了對方的問題，那真是皆大歡喜。但也經常聽到不久之後，那家人又出事了。


    她心理經常思考這樣的問題，用各種方法去驅、去趕、去鎮，真的有用嗎？她有時候會懷疑，做法的人使用的方法都是學來的，只是不知道他學習的成績是一百分，或是六十分低空掠過，勉強及格，或者根本就是胡亂學來的，只會做個樣子⋯⋯，總之，他們在這一行裡，有模有樣的為人去病消災或解決各種問題。就算有慧根的人，學了個八十分，可以運用各種法器、道具、令旗、符咒、咒語甚至念經等等來驅邪，但這些人間的有為法，真的能夠究竟嗎？虛空界真的會理會這些？害怕這些？因而離開嗎？虛空界的朋友們，難道不會在孤掌難鳴，不敵道士法術的情況下，暫且收兵離去，然後去招兵買馬，成群結隊的再捲土重來嗎？所以常會有人家裡平安無事了一段時間之後，不久情況不但重演，還變本加厲，更加不可收拾！甚至連做法的道士，都不敢再來嘗試。


    梅香也聽阿嬤講過，有一位開水電行的親戚，有一段時間家中很不平靜，連連出狀況，一下有人車禍，一下有人生病，生意也一落千丈，他本人也天天頭昏，根本無法工作；於是就到附近的神壇去問，說是卡到陰的，要他燒紙錢來化解。那位親戚無計可施，只好照做。第一次花了二十萬元新台幣，請神壇的主持人燒紙錢，果然情況好轉；不過不到一個月時間，又故態復萌。神壇那邊又要他燒紙錢，結果又燒了二十萬；就這樣每隔一段時間就得花個二十萬，沒完沒了，總共已經燒了一百多萬了，事情還是沒解決。


    阿嬤說送錢給陰界的朋友，不是個好辦法，她說這就像賄賂一樣，等到錢用完了，他們可能還會再來要，想要擺平不是那麼簡單。那時梅香還是個學生，阿嬤的意思她並不完全懂，慢慢長大以後，她才了解陰間和人間一樣，這種賄賂的方式是一種暫時的安撫，無法發揮長久的作用，如果繼續賄賂，仍然是養不足貪心者的胃口，會變成填不滿的無底洞。


    她不曉得，當陰陽兩界磨擦而迸出火花時，該如何來化解？如何才能找到真正有能力的人來把這種衝突平息？古時候，有巫師可以溝通陰陽兩界，為人消災解厄。巫師，是在天地間被委以重任的人，他們透過種種方法與靈界溝通。至今，許多與世隔絕的原住民部落裡仍然有巫師的存在，他們的地位崇高，是部落裡最具權威和地位的人。在中國人的社會裡，遇到這種陰陽兩界畫不清界線而互相干擾時，一般人習慣請道士來做法。


    梅香心理想著，謝老先生是位精明又幹練的人，一定可以請到高人來化解。果然，過沒幾天，謝老先生多方打聽，最後透過遠方親戚的介紹，請來了一位在家修行的居士。


    聽說這位修行人吳先生，不是一般的地理師或道士，他用的方法和別人通通不一樣，因為他是一位有天命的天生通靈者，不但有很強的感應能力，還有天眼通，又能與虛空界直接對話，簡直像一位活菩薩。


    梅香對謝老先生形容的這位高人很好奇，不知他用的是什麼方法。阿嬤以前常告訴她：「道高一尺，魔高一丈。」要制服魔是很難的，就像警察抓強盜一樣。她還反問阿嬤為什麼？阿嬤說警察在執行公權力時，有許多限制，像用槍用棍等，不能隨意去傷害人，就算這個人是個殺人狂也一樣。但是歹徒可不同了，他們做壞事是沒有規則的，尤其和警察玩官兵抓強盜的遊戲時，什麼把戲都使得出來。梅香很愛看電影，當她看警匪片時，看到壞人無所不用其極的犯罪手法，就真的了解什麼叫做「道高一尺，魔高一丈」了。


    謝老先生挑了一個診所休診的日子，把吳先生請了來。吳先生是謝醫師的叔公非常推崇的特異功能人士。梅香那天本來想要回家，還改了期，特地留下來一睹這位高人的廬山真面目。


    吳先生一走進診所，梅香就趕緊為他端上一杯茶，並仔細的打量他。他是一位身材中等，皮膚黝黑的中年男子，看去像一位莊稼漢。梅香倒想看看這位高人有本多事。


    寒喧沒幾句，吳先生就放下茶杯，在診所裡到處看了一遍，當他走到注射室時，不禁皺了一下眉頭。


    「這間不對。」吳先生很肯定的說。


    「對，這間經常出事。」謝醫師和謝太太同時回答。


    「事情沒這麼簡單，不會只有這間有事。」


    「請問老師，哪裡還有事？」謝老先生一聽立刻問道。


    「這裡是診所，你們住家在哪裡？」


    「在樓上。」


    「帶我去看看。」


    由謝老先生領路，大家尾隨在後，上了二樓，連梅香也好奇的跟了上去。吳先生在二樓四處看了一遍，好像沒找到他想找的。


    「你們有拜佛或拜祖先嗎？」吳先生問。


    「有，佛桌在三樓。」謝老先生說著帶吳先生走上樓梯。


    謝家有一間佛堂，布置得華麗又莊嚴，中間擺了一張神桌，神桌的中央供奉觀世音菩薩，左邊是謝家的祖先牌位。可是吳先生在這間富麗堂皇的佛堂裡，看到的可大不相同。觀世音菩薩的雕像裡，坐的不是觀世音，而是一個青面獠牙的大魔頭；謝家的祖先牌位裡，空空如也，祖先早就被魔嚇跑，不知躲到何方去了。這位魔頭一看到吳先生，立刻想溜，但吳先生一揮手，把他定住，讓他動彈不得。


    「你們每天在拜佛敬祖，可是家裡的氣場一團亂，佛像都被佔了，拜什麼都不知道！幸好祖上積德，祖先牌位沒有被佔，只是空了，否則更慘！你們祖先現在在外面受苦了。」


    謝老先生一聽，覺得事態嚴重，如果拜佛變成在拜魔，那還得了。祖先都不見了，更不得了。


    「大師，請幫幫忙。」謝老先生很恭敬的說。


    吳先生沒什麼，他面對佛桌，目視觀世音菩薩的像，喉嚨裡發出一陣陣的聲音，好像在講話一樣，神情非常專注。然後又走到謝家祖先牌位這邊，喉嚨裡又是一陣咕噥。在一旁一直不發一語的梅香直覺的認為，吳先生似乎正在與凡人看不見的虛空界對話。


    「有一位身上穿著灰布棉衣，個子高高瘦瘦，背挺得很直，抽一支這麼長的黑色煙斗的老先生⋯⋯」吳先生一邊用手比出一個長度，然後又接著說：「是你們家的誰？」


    「是我爸爸。」


    「是我阿公。」


    謝老先生和謝醫師異口同聲的說。


    「好了，陰界的朋友渡走了，觀世音菩薩請回來了，你們家的祖先也幫你們找回來了。」


    「謝謝！謝謝大師。」謝家的每個人都非常感恩，也都心服口服。


    梅香更是驚訝萬分，她想這位吳先生真是高人，也不見他有什麼動作，也沒看到他用任何法器、道具，就把事情辦好了，真是太不可思議了。


    「你們的菩薩和祖先都歸位了，準備些鮮花素果，祭拜一下。」


    「都準備好了。」謝太太說著，立刻端出供品擺好。


    由謝老先生主祭，謝家人虔誠的禮佛和祭拜祖先。


    「現在這裡沒事了，我們再回到診所去，還有事情沒了。」吳先生說道。


    一行人又下得樓來，走進診所裡去。吳先生逕自走到注射室，這裡面一堆黑影，早在上樓前就全被他定在原地，一個也跑不了。此時，他又是一陣咕噥，那些個好兄弟，一個個都同意離開，不再留連人世，於是，吳先生一揮手將他們全渡走了。


    「這裡有一堆不該屬於人間的朋友，我把他們全請走了。」


    大夥兒一聽，鬆了一口氣，全都放了心。


    吳先生環顧四週，似乎在感應著，然後走到病床對面那片牆，指著靠牆儲放醫療用品的櫃子說：


    「櫃子後面這片牆是一個通道，無形界的朋友都是從那裡穿牆過來的。你們隔壁是做什麼的？」


    「本來是一家文具店，後來搬走了，一個月前，房東又把它租出去了，現在開了一家神壇。」謝太太說。


    「這片牆的後面正好是神壇的供桌，桌上有很多神像，還插了一些旗子。」謝老先生也說道。


    「神壇的黑令旗，招來了許多陰界的朋友，他們從這裡進進出出的，還躺在這張病床上，所以你的病人一躺上去，就被他們推下來。」


    「隔壁的事，我們也干涉不了，那該怎麼辦？」


    「我要把這個通道堵起來，只要他們過不來，隔壁做什麼，是他們的事，不影響這邊就好。」


    「請大師想想辦法。」謝老先生請求著。


    吳先生在診所裡前前後後又看了一遍，似乎正動著腦筋。


    「這座儲物櫃可以搬走嗎？」


    「可以，可以。」謝醫師回答。


    「這樣吧！把這個櫃子搬到別的地方去，把候診室的電視機搬到這裡來。」


    「好，立刻就搬。」謝老先生二話不說，馬上就和家人一起動手搬東西，連梅香也主動過來幫忙。


    電視機就了定位，替代了原先的儲物櫃後，吳先生又仔細的在注射室裡感應了一下。


    「好了，現在都沒事了。」吳先生終於滿意的說。


    原以為要大費周章，沒想到這麼簡單就解決了，謝老先生非常佩服。活了一大把年紀，看過很多人處理過類似的靈異事件，但從來沒見過像吳先生這樣的人，可以不藉助任何人間使用的工具或儀式，直接就可以和靈界接觸；而靈界也似乎很尊重他，甚至聽命於他，好像他是一位靈界派來人間的使者，任務就是帶這些迷途的靈魂回家。


    「大師，我很好奇，可以請問您一些問題嗎？」


    事情都解決了，謝老先生請吳先生上樓去喝茶。謝太太端出許多精緻的小點心，殷勤地招呼這位異人。女傭今天休假，梅香主動幫忙端茶遞水。謝醫師忍不住心中的疑問，於是提出問題請教。


    「我不是什麼大師，不過你有什麼問題，我知道的一定會回答。」


    「我想知道為什麼電視機擺在那裡，就可以把無形界的通道堵起來？」


    「電視機的輻射很強，可以接收和放射磁波，這是大家都知道的；牆壁上那個無形的通道，也是由不同的磁場造成的，我把電視機擺在那個通道上，是利用它的磁場來干擾另一個時空的磁場，破壞通道的磁場，等於把通道堵起來了，使他們沒有辦法再從這片牆穿越過來。」


    「沒想到電視機的磁場那麼厲害！」


    「輻射是很傷人的，大家只知道太近看電視會傷眼睛，其實只傷到眼睛嗎？應該不止吧！眼睛只是最早被發現受到影響的器官，其他身體的器官可能需要累積更多的輻射，才會顯出症狀，時間久了，大家沒有把這些症狀跟看電視聯想在一起而已。」


    「有道理，我倒沒有想過這樣的事。」'
