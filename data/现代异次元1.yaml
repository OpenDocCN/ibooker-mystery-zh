- md: '## 現代異次元——十則靈療的故事


    看得特別明顯。這時，那張妙齡少女的臉閃入腦際，讓書廷的脊背更是一陣發涼，她清楚地看見少女兩眼的眼瞼上也各有一個黑點，像是畫上去的眼線或眼影。這一驚非同小可，他幾乎奪門而出，直接衝上二樓的琴室，把自己關在裡面。


    有美人兮。見之不忘。


    一日不見兮。思之如狂。


    鳳飛翱翔兮。四海求凰。


    無奈佳人兮。不在東牆。


    將琴代語兮。聊寫衷腸。


    何時見許兮。慰我彷徨。


    不得于飛兮。使我淪亡。


    秀瑾在樓下廚房忙著做晚餐，悠揚的琴音從樓上的琴室傳來；是書廷在鼓琴，還自彈自唱。又是那曲司馬相如情挑卓文君的《鳳求凰》。這首曲子已被書廷彈得滾瓜爛熟，因此彈唱自如，有如行雲流水。琴音聽起來是如此熟悉，但是，聽著聽著，秀瑾忍不住深深歎了一口氣。對這個結婚近十年的枕邊人，她竟覺得像個陌生人一般，不但不想親近他，對他還有一種排斥感，甚至不想跟他同住一個房間。這種感覺不知道從什麼時候開始，認真算起來應該是生下小珊不久的事。


    記得那年，書廷歡歡喜喜的買回了一床從中國大陸渡海而來的七弦古琴，寶貝似的把它放在客廳的一張長桌上。那陣子家裡又忙又亂，他根本沒能好好的去彈它。那段時間小珊才出生不久，又是奶瓶又是尿布，夫妻倆忙得不可開交，那有閒情去操琴吟唱。


    小珊六個月大時，有一天書廷抱著她走到擺放古琴的桌旁，他把小珊往桌上一放，一手扶著她，一手撫著琴，隨意的撥弄著琴弦。琴音吸引了小珊的注意力，她肥肥短短的小手上正拿著一個小瓷杯，於是用力的將瓷杯往琴身上敲去，光滑的琴面上立刻出現了一個小凹痕，夫妻倆都覺得好心疼。秀瑾抱過孩子，叫書廷即刻將琴收到別的地方去。書廷聞言馬上去將琴盒拿過來，將琴放進盒子裡收藏起來。


    ### 蓉圓琴韻


    從此秀瑾再沒見過那張琴，久而久之，也忘了家裡還有那張琴。書廷鼓琴時常用的是琴室裡另外一張琴。可是從那時候開始，秀瑾就覺得不對勁。首先是小珊睡在她自己的房間時，總是睡不安穩，經常會被驚醒，然後哭鬧不休。而且從小珊用瓷杯將琴敲出一個凹痕後，第二天起，就開始生病了。秀瑾抱著女兒四處求醫，各大醫院都跑遍了，就是查不出病因，最後還是抱著孩子到相熟的一家診所給江大夫看，這位經驗豐富的小兒科醫師，仔細看過小珊後，竟聽出孩子的心臟有雜音，斷定心臟有破洞現象。秀瑾心中一驚，非同小可，怎麼會這樣？書廷和秀瑾兩家都沒有這種病史，小珊怎會在這麼小的年紀，不可思議的患了如此嚴重的心臟病，一時之間讓秀瑾難以接受。


    秀瑾帶小珊到一家教學醫院做了詳細的檢查，並且動了手術將破損的心臟修補起來。這時，小珊已經十一個月大了。書廷和秀瑾心疼孩子，對她更是無微不至的照顧。不過更不可思議的事又接連發生了。令書廷和秀瑾心中存在著的陰影更加擴散。


    蓉蓉隱身在長桌上那床古琴裡，午睡正酣。


    一陣小孩的哭鬧聲，把她吵醒。她見到書廷手上抱著小奶娃兒又搖又哄的。心想這個做爹爹的還真辛苦，經常得哄著孩子。這個叫小珊的女娃兒未免太愛哭了，常讓這對夫妻手忙腳亂，家裡又沒有奶媽和丫頭可以使喚，做爹娘的還真得有三頭六臂才夠用。


    書廷抱著哭鬧著的小珊走向長桌，讓娃兒雙腳踩在桌上，他空出一隻手來撫弄著古琴；隨著他指尖所到之處，琴弦發出美妙的樂音。


    蓉蓉喜歡書廷修長的手指，輕輕撫過琴弦的感覺，好輕柔、好溫暖也好多情。這位清秀俊美的男子，跟她自小定過親的范家二公子家軒有點像。她見過家軒的相片，雖然是黑白的，不能分辨他身上穿什麼顏色的衣服，但是可以看出脣紅齒白的俊秀臉上，雙眼炯炯有神，跟書廷一樣。自從蓉蓉隨著古琴來到這個家，她一直都在古琴裡藏身，只有在書廷鼓琴時，她才會進入他的身體，和他一起彈。


    哭鬧的娃兒被琴音吸引，雙腳用力一蹬，正好踩到蓉蓉的右側腰間，她眉頭一皺，正想起身離去，冷不防這個小娃兒將手上拿著的磁杯，猛的往她心臟的部位用力一敲，痛得她飛身而起。她用手摀住疼痛的左胸，驚懼的看著這床她守護了兩百多年的古琴，琴面上已經被敲出一個凹痕。一陣急怒攻心，她不假思索的衝進小珊的身體裡，書廷只覺得女兒的身子猛烈的晃動了一下，然後開始大哭。


    那卷底片終於拍完了。愛玩相機的他，為了呈現女兒最真實的一面，還特別選用黑白底片來拍攝。小珊入院開刀後，書廷才將拍完的底片拿到相館裡沖洗出來。當他一張張的欣賞自己的傑作時，竟震懾得不寒而慄。相片裡的小女孩是他心愛的乖乖女小珊嗎？是的，沒錯，但是，那眼神卻不是小珊這種年紀的小女孩該有的，那種書廷熟悉的天真無邪不見了，相片上女孩的眼神像大海一樣深邃，像星星一樣晶亮，而且極盡勾魂攝魄，多看不會兒就像要被催眠一般，令人心驚膽跳，不敢逼視。書廷心中感到非常不安。


    他想過，女兒生病會不會跟古琴有關？或是與用黑白底片拍照有關？為什麼？難道這張古琴是有來歷的？他記得買琴時，老闆曾說這張琴是漢木製的。書廷並沒有真正弄明白到底是漢墓或漢木？但他知道這一面一底合成的古琴，主要部分為桐木的琴面和梓木的底，古時候也有用松木，或是舊棺木、木魚、屋梁等做爲琴材的。這張古琴難道會是漢墓出土的棺木製造的嗎？因此琴上跟隨著陰魂不散的冤魂？每次想到這裡，那張少女的臉就浮出他的腦海，令他愈想愈心驚，全身都覺得不自在。


    讓他又一個不安的原因，就是每次他用黑白底片幫小珊拍照之後，這孩子就會大病一場。這種情形是碰巧嗎？可是這種巧合也未免太離奇了，讓人忍不住會賦予太多的想像。為了終止這種莫須有的緊張，在小珊開過刀之後，他就將黑白底片放進冰箱裡保存，改以彩色底片為女兒拍照，將她成長過程中的嬌憨模樣兒一一留影。經過一年多，小珊已經兩歲，一直健健康康而且活潑可愛。兩歲的孩子正值活蹦亂跳牙牙學語之際，也最是惹人憐愛。有一天，書廷打開冰箱看到冰封已久的黑白底片，心想，過了這麼久，應該不會再有事吧！他一時手癢，取出一卷底片想再試一試。


    才拍沒幾張，小珊竟然又莫名其妙的生病了，高燒不退，半夜裡夫妻倆急急忙忙的將女兒送到醫院掛急診，檢查結果又是肺炎，而且病況嚴重，立刻被轉到加護病房進行急救。書廷非常後悔用黑白底片為女兒拍照，他氣急敗壞的將底片從相機裡抽出來扔了。


    小珊的這場病使書廷心中的疑惑更深，他知道底片無罪，那到底是什麼原因讓小珊突然生病呢？他直覺的猜測小珊生病絕非偶然，不是跟古琴有關，就是跟拍黑白相片有關。


    官拜翰林的謝靜安假藉生病為由辭官，退隱回故鄉揚州。謝府就座落在清雅秀麗、柳絲處處、輕煙綠霧的瘦西湖畔。亭台樓閣依傍著蜿蜒如帶的一灣綠水，更襯得謝府書香門第的高雅華貴。


    謝家幾代都是鹽商，這座林園已有一些年代。園內清幽雅致，園中府邸更見畫棟雕梁，處處長廊曲徑，小橋流水、碧瓦飛簷，一派官家氣象。


    謝靜安膝下有二子一女，小女蓉蓉十歲那年生了一場大病。病因來得奇異。有一次謝靜安請了攝相師到府裡來為全家人照相，當攝相師把頭鑽進黑布裡，然後舉起手來高叫一聲：「看這裡！」接著用力按一下手上的圓球，攝相機猛的一陣閃光驚嚇到蓉蓉，使她大病一場。


    她病癒躺在病床上調養時，家裡的丫環和老媽子們總是在竊竊私語，猜測著她生病的原因，說得繪聲繪影的。她的貼身丫頭英娥也會在端湯送藥時，忍不住埋怨：「都是老爺啦！非要小姐照相不可，一定是攝相機把小姐的魂給攝了去，小姐才會生病。」


    「妳這丫頭胡說些什麼？誰說照相會把魂攝了去？」


    「才不是我胡說，整理花園的長工阿貴，他從前的主子，也是照了相後就得了瘋病，他說這新潮的玩意兒真的會攝魂，不然怎的一陣閃光，這人的影子就給印到紙上去了，總有什麼被攝了去的。」


    蓉蓉可不信英娥的胡說八道，不過她的確被那道閃光給嚇著了，接連幾個白天，人都迷迷糊糊的，總覺得週遭的一切都很不真實，別人跟她講話她也聽不真切，的確像失了魂一般。晚上也睡不好覺，還噩夢連連，鬧得英娥也幾夜不得好睡；接著她就莫名其妙的發起燒來，一連幾天不退，燒得迷糊了，還囈語不斷。有一度大夫還直搖頭表示可能沒救了，把爹急得六神無主，娘也哭得死去活來。但隔天她竟奇蹟似的好了起來，像沒事人一樣的自己從床上爬起來，把府裡上上下下的人都嚇了一跳。


    下人們又開始耳語，有人說小姐失了魂，有人說小姐被附身，總之，最後小姐又回魂了。


    從此，蓉蓉再也不肯照相，爹娘也不再勉強她。


    小珊痊癒出院後，家中的生活又回復了秩序。書廷每天到自己經營的畫廊去轉一轉，接洽畫家、買畫或開畫展這些大事由他親自決定之外，其他事都交給員工們去處理。秀瑾則在家全心全意的照顧著女兒。


    不過，那種奇妙和不安的氣氛始終還籠罩在家中。


    小珊慢慢長大，三歲時已經能走能跑也能用語言表達意思。她再也不肯睡在自己的房間，而秀瑾不想親近書廷，對他的那份排斥感也始終沒有減退，因此母女倆一直睡在客房裡。書廷對妻子和女兒的這種反常現象，似乎也很能諒解。他有時會一個人跑到小珊的房間裡睡，他說不清這是一種什麼樣的心理，或許只是想證明這個房間並沒有什麼好害怕的吧！


    其實，書廷的內心裡，對那張古琴和黑白底片的事從來都沒有釋懷過，只是表面上裝著這件事已經過去，至少他不願再提起。對秀瑾來說，就不是這麼一回事了。她是個愛乾淨的人，喜歡把家裡打點得窗明几淨。每天，秀瑾在家打掃，必定搬動桌椅，連死角的灰塵都不放過。但奇怪的是，每次走進小珊房間，她總是匆匆將吸塵器在地上比畫兩下，連床底下都沒清理就草草結束，一秒鐘也不願多待的立刻逃出這個房間。


    那種逃出來的感覺，說不上是害怕，應該說是一種排斥和不安，或者說是一種無形的力量在阻止她進入那個房間，以及把她推出那個房間。秀瑾想過，小珊不願意睡在這個房間，可能也是這原因吧！


    這兩年來，蓉蓉出落得更見標緻了。一頭雲鬢烏黑亮麗，兩道秀眉墨色含黛，雙眼有神，神色清澈；雖然有時稚氣未脫，仍顯頑皮慧黠，但少女的嬌柔和知書達禮的穩重，使她無形中有一種難以言喻的大家風範。


    蓉蓉自幼就聰穎過人，跟著兩位哥哥在家塾裡讀書識字。她能詩能文，還彈得一手好琴。自小學古箏的她，有一次看見爹爹鼓琴自娛，真是羨慕極了，也吵著要學琴，爹爹拗不過她，就請了一位先生專門來敎她。她果然一學就會，從此棄了古箏再也不彈，鎮日裡就與七弦琴為伍，經常見她獨坐琴室，一邊鼓琴，一邊吟唱，自得其樂，把女孩兒家該學的女紅擺在一邊全不管了。


    別看她小小年紀，彈起《高山》和《流水》這樣的曲子還韻味十足，爹爹偶而站在琴室外聽她彈奏，不禁連連點頭，暗自驚異愛女的出眾才情，琴棋書畫樣樣都行，比起她兩位兄長真是有過之而無不及。


    老漁翁 一釣竿 靠山涯 傍水灣

    扁舟來往無牽掛 沙鷗點點輕波遠

    荻港蕭蕭白晝寒 高歌一曲斜陽晚

    一霎時波搖金影 驀抬頭月上東山


    女兒輕輕吟唱著《道情》的曲子，似乎很能領略詞曲中的淡泊意境。他忖度著把女兒嫁給范家二公子家軒，應該不至誤了她的終身。范家是揚州有名的鹽商，富甲一方，兩家門當戶對，又是世交；家軒才氣縱橫，遠近馳名，女兒與她匹配，堪稱才子佳人。范家託人來提親時，他一口就答應了。今年蓉蓉都十三歲了，過兩年也該讓他們完婚。


    那一陣子書廷學了一首新的曲子〈道情〉，在家沒事時就努力的練習。


    書廷沈迷於七弦琴，已到了不可自拔的程度，他幾乎把所有業餘的時間都用來練琴。若是以以前秀瑾會覺得很歡喜，但是這幾年家裡的氣氛詭異，女兒又幾次莫名其妙的生病，因此看到書廷一反常態的迷戀著古琴，她心理總覺得很不安。


    小珊最近又生了幾次病，每次都是因為無意中去翻閱相片簿，看到書廷以前幫她拍的黑白相片，隔天就頭疼、肚子疼甚至瀉肚或感冒，秀瑾只好把黑白相片從相本裡抽出來，收進抽屜裡鎖上。可是，這幾年來雖然平安無事，但小珊雙眼的眼瞼上，在兩歲多時各長了一顆像疣一樣的癤子，起初秀瑾以爲那是針眼，就帶她去眼科看診，醫生開了藥，卻怎麼也擦不好，一年兩年過去了，始終未見好轉，眼科和皮膚科都看不好，也只能遵從醫囑不斷的熱敷和擦藥。醫生說若要根除只有開刀挖掉一途。這兩個疣既不痛又不癢，秀瑾也就沒讓小珊又去動刀。


    小珊眼皮上的這兩個疣，有一天忽然自動破了，擠出了兩粒膿，傷口收口之後留下了兩個圓圓的疤，這兩個疤，有著淡淡的黑色。這件事讓秀瑾想起來內心裡的憂愁又隱然浮現。因為不信邪的書廷，至今仍然對用黑白底片為女兒拍照就會出事抱持著存疑的態度，他想，又隔了這麼久了，應該不會再這樣了吧！不死心的他，有一天又試著為女兒拍了一張黑白相片，第二天，小珊眼瞼上的疣就破裂、擠出膿來。秀瑾心裡有一種怪異的感覺，但是她把不安的情緒擺在心裡，什麼也沒說。


    這次小珊又因為嚴重的肺炎住進了加護病房，原因是一不小心她又被拍了一張黑白相片。


    那天家裡來了幾位和書廷畫廊合作的畫家，大夥兒鬧著書廷用古琴彈了幾首曲子。書廷認真的為每個人泡上香茗，然後焚香上坐。一縷沉香，氤氳氳氳飄飄渺渺的在琴室中縈繞，讓每個人的心境慢慢的沉靜下來。


    這幾年來，書廷熱愛古琴，更勤於操琴，故而琴藝精進。他每次只要一鼓琴，滿室琴音，繞梁不絕，連屋外的小鳥兒和小松鼠都凝翅駐足，側耳傾聽。清越的琴音，時而通透，時而寬厚，時而有若金石齊鳴。清晨或夜深人靜時，琴音聽起來格外透著一股輕快、寧靜、圓潤和清新，秀瑾在屋中任何角落都能感受到書廷的專注，以及音波的蕩氣迴腸，也能領略琴音和歌詞所傳達的那種意境。


    書廷調好坐姿，試撥了幾下琴弦，清了清喉嚨，準備要開始鼓琴了。這時候，秀瑾忽然覺得他變了一個人，那姿態、那神情彷彿是一個十六、七歲的少女一般。那少女一頭雲鬢輕輕在腦後挽個髻，一根翠玉髮簪斜斜插在秀髮上，他朝客人微微欠身，輕顰淺笑，無限嬌羞。秀瑾心下一驚，頭皮一陣發麻，她揉揉眼睛再仔細看去，卻是她的丈夫書廷。


    今古悠悠 世事底那浮漚 英雄須是早回頭

    夕陽西下 江水底那東流 山嶽底那荒邱

    山嶽底那荒邱 愁消去是酒醉了底那方休

    歎不盡 楚火底那秦灰

    望不盡 望不盡 吳越底那樓台

    世遠人何在 明月照去又照來


    故鄉風景 空自底那花開

    日月如梭 行雲流水若何

    嗟美人啊 東風芳草底那怨愁多

    六朝舊事時空過 漢家蕭鼓 魏北底那山河

    天荒地老終是底那消磨 消磨消磨更消磨

    慨當年 龍爭虎鬥 半生事業 有何多


    這是一首悲今弔古的的曲子〈太古引〉，聽起來宛若說唱，透過歌詞和曲調，在座的人都感受到歷史長河中，浪淘盡千古人物的蒼涼和無奈。那天，書廷大顯身手，還彈了〈酒狂〉、〈醉漁唱晚〉、〈高山〉、〈流水〉和〈關山月〉，在香茗和琴韻中賓主盡歡。


    書廷在鼓琴時，小珊一直在他身邊幫忙翻琴譜。從小耳濡目染，小珊也喜歡彈弄古琴，書廷得空便敎她看譜和彈琴，她已經能彈好幾首曲子。這天小珊的興致很高，書廷趁此讓她也小露了一手，彈了一曲〈對雪〉。


    密密無聲墜碧空

    霏霏有韻舞微風

    幽人吟望搜靜處

    飄入窗來落硯中


    這時小珊已讀小學二年級，長得清秀甜美，是個聰明伶俐又活潑可愛的小女孩，客人沒有不喜歡她的。見她小小年紀就彈得一手好琴，而且彈起琴來那姿容竟然如此氣定神閒，都嘖嘖稱奇。帶了照相機的老黃，調好鏡頭咔嚓一聲為小珊拍了張相，準備留作紀念。


    見鎂光燈一閃，書廷心中暗叫一聲不好，因為老黃是專業的攝影師，跟他一樣都喜歡拍紀錄片，因此慣用黑白底片。秀瑾見書廷眉頭一緊，心下已經知道發生了什麼事，心裡也暗叫一聲苦。


    客人離去之後，書廷和秀瑾密切觀察女兒的動靜，果然，半夜裡小珊忽然發起高燒，因為有過幾次經驗，夫妻倆立即將她送到醫院掛急診，醫生一診斷又是肺炎，馬上進行急救。


    秀瑾看到女兒受到如此折磨，心中感到既無奈又無助。書廷對家中接二連三發生的怪事也是有苦無處訴。


    上次小珊感冒，書廷陪她一起午睡，恍惚間見到那位古裝少女，眼瞼上有兩個黑點，跟小珊眼瞼上的疤痕位置一樣，難道這位少女跟小珊有什麼因緣？到他們家來有什麼用意？跟那張古琴和黑白相片又有什麼關係？或者，少女是衝著他來的？會不會是他前輩子虧欠了她什麼？這輩子她才緊緊纏著他不放？經常，書廷忍不住會胡思亂想。


    一大堆的疑問，該去哪裡尋找答案？他寧願這些都是自己的想像。


    天有不測風雲，太平的日子總是不長久。大清帝國以北京為都城，統治漢民族。但是反清的勢力一直在四處醞釀著，清廷也風聲鶴唳的積極掃蕩。


    就在蓉蓉十六歲那年，范家提議讓這一對郎才女貌的才子佳人完婚，大喜的日子就訂在中秋過後。就在嫁衣繡得差不多快好時，范家竟然來退婚，這對蓉蓉猶如晴天霹靂，她聽到消息當場就昏了過去。


    當時，江南一帶情勢一度緊張，因為京城裡來了特使，正在徹查反清勢力。揚州人心惶惶，這裡多鹽商，財力雄厚，因此成為目標。相傳謝家也在黑名單中，范家聽到風聲，為了自保，也怕受牽連，所以提出退婚要求。


    果然不久，謝家資助反清復明東窗事發，滿門抄斬。因受退婚打擊臥病在床的蓉蓉，事先被娘藏在床下的地窖裡，逃過一劫。但是苦命的她卻躲不過第二劫；家中的惡僕夥同一班強盜趁亂搶奪財物，為了湮滅證據，乾脆一把火把整座宅邸燒了，蓉蓉來不及逃生，被濃煙活活嗆死。一縷幽魂飄飄渺渺的不知該奔向何方，於是就在宅邸附近流連飄蕩。謝家的房子被燒了，廢墟裡殘留的可用之物，也被掠奪一空，守著廢墟不願離去的蓉蓉，眼看著燒得半毀的屋樑，被幾個大漢趁夜黑風高時偷走，她心急的跟著走，一心想著護著自家的家產。雖然那只是一根燒得半毀的樑木，但那代表著爹和娘，也代表著過去謝家的繁華和富貴，怎能讓無恥的賊人就這樣帶走呢！況且她聽爹爹說過，謝家這棟老宅邸，是曾祖父那蓋的，大廳那根屋樑，還是漢朝時種的古木所建造的，樑木上刻了歷代祖先的名諱，是他們謝家精神之所在。


    星期六的早晨，書廷開著車帶著秀瑾和女兒，一起下山去接一位朋友介紹的異人。秋天正是欒樹開花的季節，整排的路樹都開出了紅色和黃色的花，非常搶眼，也相當壯觀。看到欒樹開花，秀瑾驚覺日子快速的流失，一轉眼幾年過去了。家裡這些年來所發生的事，不足為外人道，但是卻困擾他們許久。書廷和她都是很有理性的知識分子，不輕易相信那些怪力亂神的事，但奈何這些事卻經常出現在他們的生活裡。


    其實，從小讀儒家書，她想過「子不語怪力亂神」這句話的意思。孔子是大學問家，重禮教、作學問、講道德，他只是不語怪力亂神，並不否認有怪力亂神的存在。經歷這許多事之後，秀瑾和書廷不是沒有想過，也請地理風水師到家裡來看過，做過超渡法事，但是家中的情形依然。


    昨天書廷的高中同學晴美來家中作客，她是學藝術的，第六感極強，一進屋，就打了一個大大的哆嗦，全身起了雞皮疙瘩。書廷問她怎麼回事？她直言無諱的說：「這屋裡一股陰氣，你們家一定常有人生病吧！」


    書廷和秀瑾一聽，都覺得像遇見了知己一般。話匣子一打開，書廷就忍不住把小珊這幾年來不斷生病的事說給好友聽。


    晴美也提起這幾年有緣遇見的這位異人，讓她明白人外有人，天外有天。平凡的人類，在宇宙間實在太渺小了，但是卻有許多自以爲是的人，一廂情願的只相信自己小小的、有限的五官所能感知的世界。他們滿足於這樣的世界，把「世界之大，無奇不有」這句老祖先深具智慧的話置之腦後，以眼見爲憑作爲衡量事物的標準，把一切看不到、聽不到、嗅不到、摸不到、感應不到的事，都當成子虛烏有，一聽到有人談起這些事，就嗤之以鼻的認爲這是迷信。她說，這幾年來，她有一個很深的感觸，就是終於體驗到人類不該有想勝過天的想法，如此驕傲自大是不對的。人，必須要尊天、敬天，甚至要尊重一切看得見和看不見的衆生。


    晴美臨告別時，給了他們一個電話，還說如果有需要可以打電話給這位異人，他是一位在家的修行人，既不是一般的地理師、風水師，也不是法師和道士，是一位有使命的通靈人。'
  mdcn: '## 現代異次元——十則靈療的故事


    看得特別明顯。這時，那張妙齡少女的臉閃入腦際，讓書廷的脊背更是一陣發涼，她清楚地看見少女兩眼的眼瞼上也各有一個黑點，像是畫上去的眼線或眼影。這一驚非同小可，他幾乎奪門而出，直接衝上二樓的琴室，把自己關在裡面。


    有美人兮。見之不忘。


    一日不見兮。思之如狂。


    鳳飛翱翔兮。四海求凰。


    無奈佳人兮。不在東牆。


    將琴代語兮。聊寫衷腸。


    何時見許兮。慰我彷徨。


    不得于飛兮。使我淪亡。


    秀瑾在樓下廚房忙著做晚餐，悠揚的琴音從樓上的琴室傳來；是書廷在鼓琴，還自彈自唱。又是那曲司馬相如情挑卓文君的《鳳求凰》。這首曲子已被書廷彈得滾瓜爛熟，因此彈唱自如，有如行雲流水。琴音聽起來是如此熟悉，但是，聽著聽著，秀瑾忍不住深深歎了一口氣。對這個結婚近十年的枕邊人，她竟覺得像個陌生人一般，不但不想親近他，對他還有一種排斥感，甚至不想跟他同住一個房間。這種感覺不知道從什麼時候開始，認真算起來應該是生下小珊不久的事。


    記得那年，書廷歡歡喜喜的買回了一床從中國大陸渡海而來的七弦古琴，寶貝似的把它放在客廳的一張長桌上。那陣子家裡又忙又亂，他根本沒能好好的去彈它。那段時間小珊才出生不久，又是奶瓶又是尿布，夫妻倆忙得不可開交，那有閒情去操琴吟唱。


    小珊六個月大時，有一天書廷抱著她走到擺放古琴的桌旁，他把小珊往桌上一放，一手扶著她，一手撫著琴，隨意的撥弄著琴弦。琴音吸引了小珊的注意力，她肥肥短短的小手上正拿著一個小瓷杯，於是用力的將瓷杯往琴身上敲去，光滑的琴面上立刻出現了一個小凹痕，夫妻倆都覺得好心疼。秀瑾抱過孩子，叫書廷即刻將琴收到別的地方去。書廷聞言馬上去將琴盒拿過來，將琴放進盒子裡收藏起來。


    ### 蓉圓琴韻


    從此秀瑾再沒見過那張琴，久而久之，也忘了家裡還有那張琴。書廷鼓琴時常用的是琴室裡另外一張琴。可是從那時候開始，秀瑾就覺得不對勁。首先是小珊睡在她自己的房間時，總是睡不安穩，經常會被驚醒，然後哭鬧不休。而且從小珊用瓷杯將琴敲出一個凹痕後，第二天起，就開始生病了。秀瑾抱著女兒四處求醫，各大醫院都跑遍了，就是查不出病因，最後還是抱著孩子到相熟的一家診所給江大夫看，這位經驗豐富的小兒科醫師，仔細看過小珊後，竟聽出孩子的心臟有雜音，斷定心臟有破洞現象。秀瑾心中一驚，非同小可，怎麼會這樣？書廷和秀瑾兩家都沒有這種病史，小珊怎會在這麼小的年紀，不可思議的患了如此嚴重的心臟病，一時之間讓秀瑾難以接受。


    秀瑾帶小珊到一家教學醫院做了詳細的檢查，並且動了手術將破損的心臟修補起來。這時，小珊已經十一個月大了。書廷和秀瑾心疼孩子，對她更是無微不至的照顧。不過更不可思議的事又接連發生了。令書廷和秀瑾心中存在著的陰影更加擴散。


    蓉蓉隱身在長桌上那床古琴裡，午睡正酣。


    一陣小孩的哭鬧聲，把她吵醒。她見到書廷手上抱著小奶娃兒又搖又哄的。心想這個做爹爹的還真辛苦，經常得哄著孩子。這個叫小珊的女娃兒未免太愛哭了，常讓這對夫妻手忙腳亂，家裡又沒有奶媽和丫頭可以使喚，做爹娘的還真得有三頭六臂才夠用。


    書廷抱著哭鬧著的小珊走向長桌，讓娃兒雙腳踩在桌上，他空出一隻手來撫弄著古琴；隨著他指尖所到之處，琴弦發出美妙的樂音。


    蓉蓉喜歡書廷修長的手指，輕輕撫過琴弦的感覺，好輕柔、好溫暖也好多情。這位清秀俊美的男子，跟她自小定過親的范家二公子家軒有點像。她見過家軒的相片，雖然是黑白的，不能分辨他身上穿什麼顏色的衣服，但是可以看出脣紅齒白的俊秀臉上，雙眼炯炯有神，跟書廷一樣。自從蓉蓉隨著古琴來到這個家，她一直都在古琴裡藏身，只有在書廷鼓琴時，她才會進入他的身體，和他一起彈。


    哭鬧的娃兒被琴音吸引，雙腳用力一蹬，正好踩到蓉蓉的右側腰間，她眉頭一皺，正想起身離去，冷不防這個小娃兒將手上拿著的磁杯，猛的往她心臟的部位用力一敲，痛得她飛身而起。她用手摀住疼痛的左胸，驚懼的看著這床她守護了兩百多年的古琴，琴面上已經被敲出一個凹痕。一陣急怒攻心，她不假思索的衝進小珊的身體裡，書廷只覺得女兒的身子猛烈的晃動了一下，然後開始大哭。


    那卷底片終於拍完了。愛玩相機的他，為了呈現女兒最真實的一面，還特別選用黑白底片來拍攝。小珊入院開刀後，書廷才將拍完的底片拿到相館裡沖洗出來。當他一張張的欣賞自己的傑作時，竟震懾得不寒而慄。相片裡的小女孩是他心愛的乖乖女小珊嗎？是的，沒錯，但是，那眼神卻不是小珊這種年紀的小女孩該有的，那種書廷熟悉的天真無邪不見了，相片上女孩的眼神像大海一樣深邃，像星星一樣晶亮，而且極盡勾魂攝魄，多看不會兒就像要被催眠一般，令人心驚膽跳，不敢逼視。書廷心中感到非常不安。


    他想過，女兒生病會不會跟古琴有關？或是與用黑白底片拍照有關？為什麼？難道這張古琴是有來歷的？他記得買琴時，老闆曾說這張琴是漢木製的。書廷並沒有真正弄明白到底是漢墓或漢木？但他知道這一面一底合成的古琴，主要部分為桐木的琴面和梓木的底，古時候也有用松木，或是舊棺木、木魚、屋梁等做爲琴材的。這張古琴難道會是漢墓出土的棺木製造的嗎？因此琴上跟隨著陰魂不散的冤魂？每次想到這裡，那張少女的臉就浮出他的腦海，令他愈想愈心驚，全身都覺得不自在。


    讓他又一個不安的原因，就是每次他用黑白底片幫小珊拍照之後，這孩子就會大病一場。這種情形是碰巧嗎？可是這種巧合也未免太離奇了，讓人忍不住會賦予太多的想像。為了終止這種莫須有的緊張，在小珊開過刀之後，他就將黑白底片放進冰箱裡保存，改以彩色底片為女兒拍照，將她成長過程中的嬌憨模樣兒一一留影。經過一年多，小珊已經兩歲，一直健健康康而且活潑可愛。兩歲的孩子正值活蹦亂跳牙牙學語之際，也最是惹人憐愛。有一天，書廷打開冰箱看到冰封已久的黑白底片，心想，過了這麼久，應該不會再有事吧！他一時手癢，取出一卷底片想再試一試。


    才拍沒幾張，小珊竟然又莫名其妙的生病了，高燒不退，半夜裡夫妻倆急急忙忙的將女兒送到醫院掛急診，檢查結果又是肺炎，而且病況嚴重，立刻被轉到加護病房進行急救。書廷非常後悔用黑白底片為女兒拍照，他氣急敗壞的將底片從相機裡抽出來扔了。


    小珊的這場病使書廷心中的疑惑更深，他知道底片無罪，那到底是什麼原因讓小珊突然生病呢？他直覺的猜測小珊生病絕非偶然，不是跟古琴有關，就是跟拍黑白相片有關。


    官拜翰林的謝靜安假藉生病為由辭官，退隱回故鄉揚州。謝府就座落在清雅秀麗、柳絲處處、輕煙綠霧的瘦西湖畔。亭台樓閣依傍著蜿蜒如帶的一灣綠水，更襯得謝府書香門第的高雅華貴。


    謝家幾代都是鹽商，這座林園已有一些年代。園內清幽雅致，園中府邸更見畫棟雕梁，處處長廊曲徑，小橋流水、碧瓦飛簷，一派官家氣象。


    謝靜安膝下有二子一女，小女蓉蓉十歲那年生了一場大病。病因來得奇異。有一次謝靜安請了攝相師到府裡來為全家人照相，當攝相師把頭鑽進黑布裡，然後舉起手來高叫一聲：「看這裡！」接著用力按一下手上的圓球，攝相機猛的一陣閃光驚嚇到蓉蓉，使她大病一場。


    她病癒躺在病床上調養時，家裡的丫環和老媽子們總是在竊竊私語，猜測著她生病的原因，說得繪聲繪影的。她的貼身丫頭英娥也會在端湯送藥時，忍不住埋怨：「都是老爺啦！非要小姐照相不可，一定是攝相機把小姐的魂給攝了去，小姐才會生病。」


    「妳這丫頭胡說些什麼？誰說照相會把魂攝了去？」


    「才不是我胡說，整理花園的長工阿貴，他從前的主子，也是照了相後就得了瘋病，他說這新潮的玩意兒真的會攝魂，不然怎的一陣閃光，這人的影子就給印到紙上去了，總有什麼被攝了去的。」


    蓉蓉可不信英娥的胡說八道，不過她的確被那道閃光給嚇著了，接連幾個白天，人都迷迷糊糊的，總覺得週遭的一切都很不真實，別人跟她講話她也聽不真切，的確像失了魂一般。晚上也睡不好覺，還噩夢連連，鬧得英娥也幾夜不得好睡；接著她就莫名其妙的發起燒來，一連幾天不退，燒得迷糊了，還囈語不斷。有一度大夫還直搖頭表示可能沒救了，把爹急得六神無主，娘也哭得死去活來。但隔天她竟奇蹟似的好了起來，像沒事人一樣的自己從床上爬起來，把府裡上上下下的人都嚇了一跳。


    下人們又開始耳語，有人說小姐失了魂，有人說小姐被附身，總之，最後小姐又回魂了。


    從此，蓉蓉再也不肯照相，爹娘也不再勉強她。


    小珊痊癒出院後，家中的生活又回復了秩序。書廷每天到自己經營的畫廊去轉一轉，接洽畫家、買畫或開畫展這些大事由他親自決定之外，其他事都交給員工們去處理。秀瑾則在家全心全意的照顧著女兒。


    不過，那種奇妙和不安的氣氛始終還籠罩在家中。


    小珊慢慢長大，三歲時已經能走能跑也能用語言表達意思。她再也不肯睡在自己的房間，而秀瑾不想親近書廷，對他的那份排斥感也始終沒有減退，因此母女倆一直睡在客房裡。書廷對妻子和女兒的這種反常現象，似乎也很能諒解。他有時會一個人跑到小珊的房間裡睡，他說不清這是一種什麼樣的心理，或許只是想證明這個房間並沒有什麼好害怕的吧！


    其實，書廷的內心裡，對那張古琴和黑白底片的事從來都沒有釋懷過，只是表面上裝著這件事已經過去，至少他不願再提起。對秀瑾來說，就不是這麼一回事了。她是個愛乾淨的人，喜歡把家裡打點得窗明几淨。每天，秀瑾在家打掃，必定搬動桌椅，連死角的灰塵都不放過。但奇怪的是，每次走進小珊房間，她總是匆匆將吸塵器在地上比畫兩下，連床底下都沒清理就草草結束，一秒鐘也不願多待的立刻逃出這個房間。


    那種逃出來的感覺，說不上是害怕，應該說是一種排斥和不安，或者說是一種無形的力量在阻止她進入那個房間，以及把她推出那個房間。秀瑾想過，小珊不願意睡在這個房間，可能也是這原因吧！


    這兩年來，蓉蓉出落得更見標緻了。一頭雲鬢烏黑亮麗，兩道秀眉墨色含黛，雙眼有神，神色清澈；雖然有時稚氣未脫，仍顯頑皮慧黠，但少女的嬌柔和知書達禮的穩重，使她無形中有一種難以言喻的大家風範。


    蓉蓉自幼就聰穎過人，跟著兩位哥哥在家塾裡讀書識字。她能詩能文，還彈得一手好琴。自小學古箏的她，有一次看見爹爹鼓琴自娛，真是羨慕極了，也吵著要學琴，爹爹拗不過她，就請了一位先生專門來敎她。她果然一學就會，從此棄了古箏再也不彈，鎮日裡就與七弦琴為伍，經常見她獨坐琴室，一邊鼓琴，一邊吟唱，自得其樂，把女孩兒家該學的女紅擺在一邊全不管了。


    別看她小小年紀，彈起《高山》和《流水》這樣的曲子還韻味十足，爹爹偶而站在琴室外聽她彈奏，不禁連連點頭，暗自驚異愛女的出眾才情，琴棋書畫樣樣都行，比起她兩位兄長真是有過之而無不及。


    老漁翁 一釣竿 靠山涯 傍水灣

    扁舟來往無牽掛 沙鷗點點輕波遠

    荻港蕭蕭白晝寒 高歌一曲斜陽晚

    一霎時波搖金影 驀抬頭月上東山


    女兒輕輕吟唱著《道情》的曲子，似乎很能領略詞曲中的淡泊意境。他忖度著把女兒嫁給范家二公子家軒，應該不至誤了她的終身。范家是揚州有名的鹽商，富甲一方，兩家門當戶對，又是世交；家軒才氣縱橫，遠近馳名，女兒與她匹配，堪稱才子佳人。范家託人來提親時，他一口就答應了。今年蓉蓉都十三歲了，過兩年也該讓他們完婚。


    那一陣子書廷學了一首新的曲子〈道情〉，在家沒事時就努力的練習。


    書廷沈迷於七弦琴，已到了不可自拔的程度，他幾乎把所有業餘的時間都用來練琴。若是以以前秀瑾會覺得很歡喜，但是這幾年家裡的氣氛詭異，女兒又幾次莫名其妙的生病，因此看到書廷一反常態的迷戀著古琴，她心理總覺得很不安。


    小珊最近又生了幾次病，每次都是因為無意中去翻閱相片簿，看到書廷以前幫她拍的黑白相片，隔天就頭疼、肚子疼甚至瀉肚或感冒，秀瑾只好把黑白相片從相本裡抽出來，收進抽屜裡鎖上。可是，這幾年來雖然平安無事，但小珊雙眼的眼瞼上，在兩歲多時各長了一顆像疣一樣的癤子，起初秀瑾以爲那是針眼，就帶她去眼科看診，醫生開了藥，卻怎麼也擦不好，一年兩年過去了，始終未見好轉，眼科和皮膚科都看不好，也只能遵從醫囑不斷的熱敷和擦藥。醫生說若要根除只有開刀挖掉一途。這兩個疣既不痛又不癢，秀瑾也就沒讓小珊又去動刀。


    小珊眼皮上的這兩個疣，有一天忽然自動破了，擠出了兩粒膿，傷口收口之後留下了兩個圓圓的疤，這兩個疤，有著淡淡的黑色。這件事讓秀瑾想起來內心裡的憂愁又隱然浮現。因為不信邪的書廷，至今仍然對用黑白底片為女兒拍照就會出事抱持著存疑的態度，他想，又隔了這麼久了，應該不會再這樣了吧！不死心的他，有一天又試著為女兒拍了一張黑白相片，第二天，小珊眼瞼上的疣就破裂、擠出膿來。秀瑾心裡有一種怪異的感覺，但是她把不安的情緒擺在心裡，什麼也沒說。


    這次小珊又因為嚴重的肺炎住進了加護病房，原因是一不小心她又被拍了一張黑白相片。


    那天家裡來了幾位和書廷畫廊合作的畫家，大夥兒鬧著書廷用古琴彈了幾首曲子。書廷認真的為每個人泡上香茗，然後焚香上坐。一縷沉香，氤氳氳氳飄飄渺渺的在琴室中縈繞，讓每個人的心境慢慢的沉靜下來。


    這幾年來，書廷熱愛古琴，更勤於操琴，故而琴藝精進。他每次只要一鼓琴，滿室琴音，繞梁不絕，連屋外的小鳥兒和小松鼠都凝翅駐足，側耳傾聽。清越的琴音，時而通透，時而寬厚，時而有若金石齊鳴。清晨或夜深人靜時，琴音聽起來格外透著一股輕快、寧靜、圓潤和清新，秀瑾在屋中任何角落都能感受到書廷的專注，以及音波的蕩氣迴腸，也能領略琴音和歌詞所傳達的那種意境。


    書廷調好坐姿，試撥了幾下琴弦，清了清喉嚨，準備要開始鼓琴了。這時候，秀瑾忽然覺得他變了一個人，那姿態、那神情彷彿是一個十六、七歲的少女一般。那少女一頭雲鬢輕輕在腦後挽個髻，一根翠玉髮簪斜斜插在秀髮上，他朝客人微微欠身，輕顰淺笑，無限嬌羞。秀瑾心下一驚，頭皮一陣發麻，她揉揉眼睛再仔細看去，卻是她的丈夫書廷。


    今古悠悠 世事底那浮漚 英雄須是早回頭

    夕陽西下 江水底那東流 山嶽底那荒邱

    山嶽底那荒邱 愁消去是酒醉了底那方休

    歎不盡 楚火底那秦灰

    望不盡 望不盡 吳越底那樓台

    世遠人何在 明月照去又照來


    故鄉風景 空自底那花開

    日月如梭 行雲流水若何

    嗟美人啊 東風芳草底那怨愁多

    六朝舊事時空過 漢家蕭鼓 魏北底那山河

    天荒地老終是底那消磨 消磨消磨更消磨

    慨當年 龍爭虎鬥 半生事業 有何多


    這是一首悲今弔古的的曲子〈太古引〉，聽起來宛若說唱，透過歌詞和曲調，在座的人都感受到歷史長河中，浪淘盡千古人物的蒼涼和無奈。那天，書廷大顯身手，還彈了〈酒狂〉、〈醉漁唱晚〉、〈高山〉、〈流水〉和〈關山月〉，在香茗和琴韻中賓主盡歡。


    書廷在鼓琴時，小珊一直在他身邊幫忙翻琴譜。從小耳濡目染，小珊也喜歡彈弄古琴，書廷得空便敎她看譜和彈琴，她已經能彈好幾首曲子。這天小珊的興致很高，書廷趁此讓她也小露了一手，彈了一曲〈對雪〉。


    密密無聲墜碧空

    霏霏有韻舞微風

    幽人吟望搜靜處

    飄入窗來落硯中


    這時小珊已讀小學二年級，長得清秀甜美，是個聰明伶俐又活潑可愛的小女孩，客人沒有不喜歡她的。見她小小年紀就彈得一手好琴，而且彈起琴來那姿容竟然如此氣定神閒，都嘖嘖稱奇。帶了照相機的老黃，調好鏡頭咔嚓一聲為小珊拍了張相，準備留作紀念。


    見鎂光燈一閃，書廷心中暗叫一聲不好，因為老黃是專業的攝影師，跟他一樣都喜歡拍紀錄片，因此慣用黑白底片。秀瑾見書廷眉頭一緊，心下已經知道發生了什麼事，心裡也暗叫一聲苦。


    客人離去之後，書廷和秀瑾密切觀察女兒的動靜，果然，半夜裡小珊忽然發起高燒，因為有過幾次經驗，夫妻倆立即將她送到醫院掛急診，醫生一診斷又是肺炎，馬上進行急救。


    秀瑾看到女兒受到如此折磨，心中感到既無奈又無助。書廷對家中接二連三發生的怪事也是有苦無處訴。


    上次小珊感冒，書廷陪她一起午睡，恍惚間見到那位古裝少女，眼瞼上有兩個黑點，跟小珊眼瞼上的疤痕位置一樣，難道這位少女跟小珊有什麼因緣？到他們家來有什麼用意？跟那張古琴和黑白相片又有什麼關係？或者，少女是衝著他來的？會不會是他前輩子虧欠了她什麼？這輩子她才緊緊纏著他不放？經常，書廷忍不住會胡思亂想。


    一大堆的疑問，該去哪裡尋找答案？他寧願這些都是自己的想像。


    天有不測風雲，太平的日子總是不長久。大清帝國以北京為都城，統治漢民族。但是反清的勢力一直在四處醞釀著，清廷也風聲鶴唳的積極掃蕩。


    就在蓉蓉十六歲那年，范家提議讓這一對郎才女貌的才子佳人完婚，大喜的日子就訂在中秋過後。就在嫁衣繡得差不多快好時，范家竟然來退婚，這對蓉蓉猶如晴天霹靂，她聽到消息當場就昏了過去。


    當時，江南一帶情勢一度緊張，因為京城裡來了特使，正在徹查反清勢力。揚州人心惶惶，這裡多鹽商，財力雄厚，因此成為目標。相傳謝家也在黑名單中，范家聽到風聲，為了自保，也怕受牽連，所以提出退婚要求。


    果然不久，謝家資助反清復明東窗事發，滿門抄斬。因受退婚打擊臥病在床的蓉蓉，事先被娘藏在床下的地窖裡，逃過一劫。但是苦命的她卻躲不過第二劫；家中的惡僕夥同一班強盜趁亂搶奪財物，為了湮滅證據，乾脆一把火把整座宅邸燒了，蓉蓉來不及逃生，被濃煙活活嗆死。一縷幽魂飄飄渺渺的不知該奔向何方，於是就在宅邸附近流連飄蕩。謝家的房子被燒了，廢墟裡殘留的可用之物，也被掠奪一空，守著廢墟不願離去的蓉蓉，眼看著燒得半毀的屋樑，被幾個大漢趁夜黑風高時偷走，她心急的跟著走，一心想著護著自家的家產。雖然那只是一根燒得半毀的樑木，但那代表著爹和娘，也代表著過去謝家的繁華和富貴，怎能讓無恥的賊人就這樣帶走呢！況且她聽爹爹說過，謝家這棟老宅邸，是曾祖父那蓋的，大廳那根屋樑，還是漢朝時種的古木所建造的，樑木上刻了歷代祖先的名諱，是他們謝家精神之所在。


    星期六的早晨，書廷開著車帶著秀瑾和女兒，一起下山去接一位朋友介紹的異人。秋天正是欒樹開花的季節，整排的路樹都開出了紅色和黃色的花，非常搶眼，也相當壯觀。看到欒樹開花，秀瑾驚覺日子快速的流失，一轉眼幾年過去了。家裡這些年來所發生的事，不足為外人道，但是卻困擾他們許久。書廷和她都是很有理性的知識分子，不輕易相信那些怪力亂神的事，但奈何這些事卻經常出現在他們的生活裡。


    其實，從小讀儒家書，她想過「子不語怪力亂神」這句話的意思。孔子是大學問家，重禮教、作學問、講道德，他只是不語怪力亂神，並不否認有怪力亂神的存在。經歷這許多事之後，秀瑾和書廷不是沒有想過，也請地理風水師到家裡來看過，做過超渡法事，但是家中的情形依然。


    昨天書廷的高中同學晴美來家中作客，她是學藝術的，第六感極強，一進屋，就打了一個大大的哆嗦，全身起了雞皮疙瘩。書廷問她怎麼回事？她直言無諱的說：「這屋裡一股陰氣，你們家一定常有人生病吧！」


    書廷和秀瑾一聽，都覺得像遇見了知己一般。話匣子一打開，書廷就忍不住把小珊這幾年來不斷生病的事說給好友聽。


    晴美也提起這幾年有緣遇見的這位異人，讓她明白人外有人，天外有天。平凡的人類，在宇宙間實在太渺小了，但是卻有許多自以爲是的人，一廂情願的只相信自己小小的、有限的五官所能感知的世界。他們滿足於這樣的世界，把「世界之大，無奇不有」這句老祖先深具智慧的話置之腦後，以眼見爲憑作爲衡量事物的標準，把一切看不到、聽不到、嗅不到、摸不到、感應不到的事，都當成子虛烏有，一聽到有人談起這些事，就嗤之以鼻的認爲這是迷信。她說，這幾年來，她有一個很深的感觸，就是終於體驗到人類不該有想勝過天的想法，如此驕傲自大是不對的。人，必須要尊天、敬天，甚至要尊重一切看得見和看不見的衆生。


    晴美臨告別時，給了他們一個電話，還說如果有需要可以打電話給這位異人，他是一位在家的修行人，既不是一般的地理師、風水師，也不是法師和道士，是一位有使命的通靈人。'
