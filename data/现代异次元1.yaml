- md: "## 現代異次元——十則靈療的故事\n\n  境中的不好氣場，都會使人生病的，這種病不在肉身，而是在靈體上，這在醫學上是檢查不出來的。──吳慕涵回答。\n\
    \n  吳慕涵的話，讓他想起媛媛檢查了六年的昏睡症，會不會就是靈體被佔？這他早已懷疑，才會東奔西跑的找了許多寺廟、神壇、乩童、法師、道士等來驅魔，難道是因為他找的這些人道行不夠，不敵邪魔？那他倒要看看吳慕涵有多大本事？\n\
    \n  這六年來，他也懷疑過家裡的陽宅出了問題，因此請過幾位地理風水師到家裡來看，有的說他家的神桌擺的方位不對，幫他換了個方向，不過媛媛的病並沒好轉，印刷廠的生意也沒有起色；最近朋友又介紹的一位風水師，說他家裡不順，事業受影響，孩子生病，是因為房子的座向有問題，建議他另外買一塊地，而且面積愈大愈好，還說等地找好了，再來幫他規劃建房子的方位。岑風就這件事請教吳慕涵，想知道他有什麼看法？\n\
    \n  吳慕涵聽了很不以為然的搖搖頭說：「大部分的小老百姓，都是辛苦了一輩子才籌足了自備款買房子，還有二十年的銀行貸款要繳，因為風水不好就要換房子，談何容易？照這麼說，窮人家出了事，就只能等死囉？有人不想搬家，就聽風水師的建議，改門，改窗，敲牆，換方位，用這種方法來避開煞氣。\n\
    \n  「這樣有用嗎？」「你認爲有用嗎？」「我不知道，可是很多人都這樣做，不得已啊！爲了求平安嘛！所以才有人幾個月就改個門或改個窗，一年到頭家裡都有工程在進行。」「你想，就算家裡真的有煞氣存在，改門改窗有用嗎？」「避開它，應該有一點用吧！」「或許暫時有用，但是煞氣還在，隨時都蠢蠢欲動，像定時炸彈一樣，所以問題仍然沒有解決。」「有人在家裡貼了一些符或八卦，那樣有用嗎？」「有用也只是短時間，時間過了，沒拿下來，反而會招更多煞氣。」「那要用什麼辦法才能真正解決？」「不管那團煞氣是不好的氣場，或是不該留在人間的外靈，最好的辦法就是將他們請走，請的方式最好也不要用驅、用鎮、用趕，因爲那樣對他們太不尊重了，說不定他們會呼朋引伴再回來，就更難收拾了。\n\
    \n  吳慕涵的這番話，岑風非常認同。記得在許多靈異電影裡頭就經常看到這樣的情節，道士驅魔不成，邪魔反而出去調兵遣將再回來鬧得天翻地覆的，原來這都是真的，並非導演在搞笑。\n\
    \n  一番對談之後，岑風對吳慕涵的印象完全改觀，從言談之中就知道他絕對不是神棍之流。自詡從來不迷信的他，漸漸的覺得有些無法解釋的靈異現象，不是你不相信就會自動消失，也不會因為你看不見就不存在。流傳了千百年的傳說和故事，仍然風行於世的，必定有其存在的價值，這可能就是先人的智慧，透過傳說傳遞給後代子孫，無非也是告訴後人，對看不到、摸不到、聽不到的另一界衆生，要給予尊重；畢竟人類的感官能力非常有限，因此對存在我們週遭的許多信息都接收不到，當然，視而不見，聽而不聞，這種情形有助於人類在這個空間裡生存，不至於與其他空間衆生擦撞；但是一味否定其他空間生靈的存在，就是一種不尊重；尤其，這些年來，經歷了這麼多事，他和玉嬋都秉持著寧可信其有的態度，因此，心不但變柔軟了，也更包容了。\n\
    \n  繼續上路後，很快就到了新竹。岑風的房子座落在一條巷子裡，是一棟透天厝，樓下是印刷廠，樓上住家。吳慕涵一進門就感應到一股極爲強大的煞氣，他循著這個大氣場找了去，用眼睛一望，原來是神桌上土地公的像被一個大魔頭強佔了去，坐在那裡耀武揚威，見到吳慕涵來了，還張牙舞爪的想嚇他。\n\
    \n  吳慕涵見狀不但不怕，反而趨前走到神桌前站定，喉嚨裡發出一連串的聲音，彷彿在與人對話一般，但是站在一旁的岑風卻一句也聽不懂。不一會兒，似乎溝通完了，吳慕涵大喝一聲，將魔頭及神桌上其他神像上的外靈也一一渡走。然後他退後幾步，轉頭對岑風說：\n\
    \n  「你供的是土地公，但是土地公早就被趕跑了，我現在把祂請回來了。」\n\n  岑風一聽，有點半信半疑，但是說也奇怪，他忽然覺得家中的氣場不一樣了，令他感到異常的清淨和舒適，不像以前那樣總是覺得悶悶的，人也不清爽。\n\
    \n  家裡要供神明，擺一尊神像就夠了，不要貪心，想要請來那麼多神仙，那是不可能的，如果正神上位了，祂只能住在一尊像裡，祂不但自己要修行，還要照顧你一家人，你又弄來許多神像擺在神桌上，你可知道這些神像如果沒有靈，就只是泥塑木雕的工藝品而已，全都是空位的，家中這位正神還要忙著照顧這些雕像，以防它們被其他外靈佔據，神仙即使有三頭六臂也會忙不過來的。──\n\
    \n  岑風一聽，吳慕涵說的還真是有道理，一般人好像都沒想過這樣的事。其實仔細一想，確是如此，一般人何德何能，能請到一桌子的菩薩和神仙？能真正請到一尊，就已經很了不起了。他擺在神桌上的觀音像，是有一次到大陸旅遊，被這尊觀音的法像吸引，又聽老闆說這是多年在山洞中面壁苦修的高僧，在洞中坐化後，用洞內的石壁雕刻的，所以他就很虔誠的將神像請回來，供在神桌上，沒想到這麼莊嚴美麗的雕像也會被外靈侵入。\n\
    \n  「家裡既然有供神，就要把神桌擺在最好的位置，正神才願意上座，你在農曆十五那天早上，把神桌搬到這裡來。」吳慕涵說著用手比出了放置神桌的位置。\n\n\
    \  吳慕涵指的這個位置，不就是神桌先前擺放的地方嗎？原來這裡是個好方位！上次請來的地理師，將神桌搬到現在這個地方之後，不但媛媛的病情開始加劇，印刷廠的生意也幾乎停頓，自己也病了一場，半邊身子不能動，他本來以爲一切都完了，幸好病情逐漸好轉，他可以動了，卻又不小心摔了一跤，骨頭裂傷，真是倒楣透頂。\n\
    \n  「搬神桌可以自己動手嗎？」岑風很懷疑的問。\n  「當然可以！你供奉土地公，祂就是你家中的一份子，移一個好位子給祂，祂會很高興的。這種事自己來就可以，不必再花錢請地理師。」\n\
    \n  這倒是很新鮮的事，移動神桌一般人都會請地理師，沒有人自己動手的，不過吳慕涵的說法很合理，家神是家中的保護神，跟自己最親近，親自動手再好不過。從吳慕涵的建議也可看出他是個不貪財的人，否則他可以在農曆十五日那天為了移神桌再來一次，任何人都會覺得那是理所當然的。\n\
    \n  吳慕涵告訴岑風移動神桌時該做的事，講完之後，他幫岑風一家人這幾年來受到不好氣場影響的身體，一個個加以清理，把晦氣排除。頓時，每個人都覺得神清氣爽。\n\
    \n  媛媛的情況比較特別，她身上不僅有晦氣，還被外靈附了身，這麼多年來，以她身體為家的，還不只一個，這是因為物以類聚，所以越招越多。六年前是因為岑風家中的神像先被佔，使得媛媛身上的氣場不好，而吸引了邪魔上身；也可能是因為媛媛先在外面招惹了邪靈，將不好的氣場帶回家中，把家裡供奉的土地公都嚇跑了，於是邪靈鳩佔鵲巢，還招來越多同道，以此為家，一起接受供養。由於有外靈在家中作亂，才使得這一家人身體健康受到影響，事業也不順利。吳慕涵透過意念與他們溝通，在徵求同意後，一次將他們全部渡走。\n\
    \n## 現代異次元——十則靈療的故事\n\n  吳慕涵到家裡來時，正好是媛媛即將發病的時間，不過，真的很靈，媛媛安然的渡過了這次的昏睡週期，而且自此她的怪病就好了；說也奇怪，造成家中晦氣的障礙排除後，印刷廠的生意應接不暇，想偷閒休息一下都難。\n\
    \n  媛媛的病就這樣好了起來，她順利的考上高中，三年之後，又順利的就讀中部的一所醫專，如今的媛媛已經是一位亭亭玉立的美少女了。\n\n  一向鐵齒的岑風，現在變得更謙虛了，他相信宇宙之大，無奇不有，只要不是迷信，他對許多玄妙之事，都寧可信其有，那是對宇宙萬物的一種尊敬。他每天在給土地公上香的時候，都會想起吳慕涵到家中渡走外靈的情形，他只是往神桌前一站，用意念與他們溝通，就把事情解決了，可見得這個人雖然是肉身，而且生活在凡間，但是他在靈界一定是有地位的，而且地位應該還蠻高的，否則靈界衆生怎麼肯聽命於他。他看過道士作法驅魔，需要用到許多法器，並進行一些相當繁複的儀式，還不見得能把魔趕走；他也看過西洋驅魔的電影，像一部經典影片「大法師」，和近年来的新片「魂飛魄散」，裡面都有天主教神父驅魔的情節，神父也需要用到十字架、法袍、聖水、聖經等代表上帝的聖物；像吳先生這樣赤手空拳，什麼都不需要的，他還是頭一回看見。\n\
    \n  「老公，你看《西遊記》裡面那些神和魔只要一遇上，就打得死去活來，尤其是孫悟空想收妖，那更是從天上打到地下，又從地下打到天上，打了幾晝夜，各種法寶都用盡，還是打得都難分難解，但是只要請來觀世音菩薩或其他菩薩，根本什麼也不需要，菩薩只要用手輕輕一指，再大的魔頭都乖乖就範。」每次岑風和玉嬋提起這事，玉嬋就會這樣回答他。\n\
    \n  老婆這樣說，可見得吳慕涵在她心目中的地位了。\n\n  能遇到吳慕涵，他覺得很幸運，這位奇人異士真的是他們家的救命恩人。媛媛痊癒後不久，他在《中國時報》醫藥版上，看到一篇〈現代睡美人〉的報導（八十八年六月五日），內容談的是有一些年齡從八歲到二十六歲不等的學生，罹患了「克萊列文症候群」的疾病，這是一種嗜睡的怪病，罹病的學生經常處於昏昏沉沉的狀態中，上課打瞌睡，怎麼也叫不醒，還會產生幻覺、幻聽、幻視和獨自胡言亂語的現象；這種情形往往被醫師診斷為憂鬱症或精神分裂症，病發時，患者每次睡眠期從數日、一週、兩週到一個月的都有，睡眠專科醫師有的會建議服用興奮劑來改善症狀。患者在睡眠期結束就自動清醒，不藥而癒。撰文的是某市立療養院的醫檢師，他說美國有「二十四小時多功能睡眠檢查」，一次費用為三千美金，還建議將這種檢查納入健保以造福病患。岑風看了這篇報導不禁哈哈大笑，玉嬋問他笑什麼，他把報紙遞過去給她看，然後說：\n\
    \n  > 「症狀明明就是嗜睡，還要花這麼多錢去檢查來證明是嗜睡，證明了以後又無法治療，真是多此一舉。」\n\n  「檢查還算是好的，只有受點苦加上吃錯藥而已，你看『大法師』電影裡邪的小女孩，為了檢查生的是什麼病，吃了多少苦頭，看了叫爲人父母的多心疼啊！腦科醫生沒辦法了，將她轉到精神科，經過多少權威醫生會診，最後竟然建議女孩的媽媽去請神父驅魔，把這個媽媽嚇得快崩潰了。我聽玉露說，有一個女孩子也是跟媛媛一樣嗜睡，檢查好久都查不出病因，醫生竟然爲她做腦部手術，把腦打開來看了還是找不到病因，又縫回去。」\n\
    \n  > 「實在有夠冤枉的，真慶幸不是媛媛。」\n\n  > 「這篇報導裡寫說，醫生建議患了嗜睡症的人，就多睡多休息，睡飽了自然就清醒，就可以恢復正常生活。這是什麼話！簡直就是讓患者自生自滅嘛！別人的孩子他們一點都不心疼，也不想想想有這種病人的家庭過的是什麼日子！那簡直不是人過的，那種痛苦有誰能真正了解！\n\
    \n  「這也不能怪醫生，他們也不是不想醫，只是無從醫起而已。」\n\n  「那也不能亂按病名，還亂開藥給病人吃啊！」岑風一想起多年來的折磨和焦慮，心中就有氣，說話不禁大聲了起來。\n\
    \n  「好了，好了，都過去了，別在往事上浪費精力。」\n\n  「老婆，《大法師》的電影是根據小說改編的，這位作者真厲害，他竟然也知道當家中有一個人撞了邪，這不好的氣場，會影響家裡其他人，連到他們家拜訪和作客的人也會受到影響，電影裡有一個叫布克的，去看了小女孩，結果被魔給殺死，還把他丟出窗外，連驅魔的兩位神父也都一命嗚呼，真是嚇人！」\n\
    \n  「你差點半身不遂，又摔一跤骨頭都裂了，事業也不順，最能感同身受。」\n\n  岑風和玉嬋是從一場惡夢中甦醒的過來人，而媛媛親歷其境，感觸更是良多。他們家的惡夢已經過去了，媛媛病癒前每週上台北看的腦神經內科，也沒有追蹤過她的病情。倒是有一次岑風到醫院去探病，在走廊巧遇了王主任，主任很親切的問他：\n\
    \n  「你女兒現在怎麼樣了？」\n\n  「她已經好了！」\n\n  「怎麼好的？」\n\n  「說了你也不信！你自己去問上帝好了。」\n\n  岑風和主任打了個哈哈，什麼也沒說，就跟他揮揮手說再見。\n\
    \n  這下換王主任莫名奇妙的看著他，目送他的背影漸行漸遠。\n\n## 一枝紅艷露凝香\n\n  「格、格、格」的高跟鞋聲，遠遠地從辦公室那頭傳來；在辦公桌前低頭工作的人紛紛抬起頭來，往聲音來處望去。\n\
    \n  如大家所期待的，是隔壁辦公室的李君儀來了。\n\n  李君儀捧著一疊卷宗，在衆多目光的注視下，泰若自然，面帶微笑的從辦公室這頭走向辦公室那頭。\n\n\
    \  她那自信滿滿的表情和氣定神閒的舉止，比那張美麗的臉龐和修長窈窕的身材更吸引人。在這家外商機構裡，有衆多優秀的職場高手，但能兼具美貌、氣質、學識和交際手腕的，非李君儀莫屬。\n\
    \n  研究所畢業後，李君儀考進了這家外商公司，短短兩年多就以超強的能力連跳數級，升上了副理的職位。她的快速升遷，令很多由基層幹起，按部就班、循序漸進的同事忌妒。但是那些對她議論紛紛的人，私底下卻也很欣賞她的才華、風度和能力。\n\
    \n  像今天，君儀這身打扮，就夠令人刮目相看。一件淺灰套頭高領T恤，一條及膝的深灰色窄裙，一雙半高跟黑色皮鞋，在如此素雅的妝扮下，只點綴了胸前那只精緻的別針，以及挽起的秀髮上那支小巧的髮簪，就使她煥發出一種無與倫比的高貴風華。\n\
    \n  在公司裡，似乎沒有人真正摸清楚她的實際狀況。大家只知道她的人事資料上填的是未婚，但是無名指上卻一直都戴著一只小小的鑽戒。有人問她結婚沒或是要為她介紹男朋友，她就舉起手，鑽戒在日光燈下閃閃發光。因此，公司裡就傳聞她已經訂婚。\n\
    \n  美，加上讓人摸不著，猜不透的神秘，使她成為公司同事喜愛談論的對象，她向來處之泰然。\n\n  每星期二早上十點半，是公司例行的主管會報，副理以上的主管都必須參加。會報的內容是由各部門報告上週的業務執行進度以及本週的預定進度。由於採購、財務、業務、生產、行銷各部門的主管都到齊了，因此很多業務推展和生產方面的問題，在會中都可以一併提出來研擬解決對策。這個重要的會議，君儀從不缺席，因為她也是這個會議的即席記錄；她一邊開會，一邊以手提電腦寫下會議紀錄，會一開完只需列印出來，再讓小妹拿去影印，就可以在散會後半小時發給與會的各主管。\n\
    \n  今天在開會的時候，君儀就覺得額頭有點兒發燙，人也輕飄飄的，她知道自己感冒了。下了班，她到住家附近的診所去看病，拿了三天的藥，吃得她成天昏昏沉沉的。不輕易請假的她仍然天天去上班。藥吃完了，病情好像愈嚴重了，她開始咳嗽，又去看了幾次醫生，病情也沒有好轉。\n\
    \n  她知道一般感冒有一定的病程，吃藥只是緩解症狀，不管吃不吃藥，兩個禮拜總會痊癒的，但是她的病已經拖了一個月，一直還在咳著，令她覺得有點煩躁。有一天下了班，她開著車直接到一家大規模教學醫院的夜間門診掛號，心想換個醫生，換不同的藥吃吃看，希望能早日痊癒。\n\
    \n  坐在候診室裡，她沒來由的身體忽然搖晃了一下，然後感覺到一股冷颼颼的氣直往毛孔裡鑽，讓她全身都起了雞皮疙瘩。她看看四週，前後排的候診椅上雖然都坐了人，但是離她有一點距離，附近也沒有人走動。但是那一陣搖晃是如此真實，絕不是她的想像。那一陣涼意也的確存在過。她注意了一下四週的環境，她坐的位子既不是冷氣口，也不靠近門口和窗口，那一股涼意從何而來呢？\n\
    \n  護士把頭探出診間，呼喚她的名字，打斷了她的思緒。她起身去看病，接著又等候拿藥，身上一直都覺得冷冷的，手腳尤其冰涼，該不會又再度感冒吧！她心想。\n\n\
    \  從醫院回來後，她就感到迷迷糊糊，恍恍惚惚地，好像忘了自己是誰。晚上睡覺也難以安枕，總是翻來覆去的，好不容易折騰到下半夜才睡著。\n\n  才剛剛睡沉，君儀就開始做夢，睡睡醒醒之間，夢斷斷續續的，但是情節相連，劇情還環環相扣，彷彿連續劇一樣。\n\
    \n  夢中，一位年輕貌美名喚蘋兒的女子，憑著媒妁之言，嫁到了門當戶對的夫家。剛進門時，她是一位婆婆疼惜的媳婦兒，鎮日裡穿金戴銀，丫環和老媽子任她使喚，是一位享盡榮華富貴的少奶奶。夫婿對她也疼愛有加，使她覺得幸福美滿。\n\
    \n  但是，好景不常，嫁進夫家三年，蘋兒一直未能生育，婆婆開始臉色就不對了，受了婆婆的影響，夫婿對她的態度也有了一百八十度的轉變。很快的他就納了妾，那位姿色不錯的小妾，進門才兩年，就連續為夫家生了兩個胖兒子，自此，蘋兒的地位一落千丈，只差沒有被休妻趕回娘家。\n\
    \n  不久，婆婆過世，夫婿對她更是不聞不問，她心中倒也沒有怨夫家對她不好，至少她在家中衣食無缺，身邊還有一位丫頭和老媽子伺候。她在自己獨居的院落裡，加蓋了一間佛堂，開始茹素禮佛，每日晨起「叩！叩！叩！」的木魚聲，伴隨著她低沉的誦經聲，就在院落裡輕輕傳開。\n\
    \n  蘋兒的生活裡，除了古佛青燈和念經禮佛之外，已經沒有其他重要的事。虔心向佛，使她心情平靜。三十七歲那年，她一病不起，臨終前想起在夫家受到的不公平待遇，眼淚不禁直落，一股怨氣也油然而生，向來平和的心境，有了一絲波動，就那麼一點兒不平的意念，使她在嚥下最後一口氣，靈魂離體的一剎那，無法被等在一旁的觀世音菩薩接引到西方極樂世界而流落在人間。\n\
    \n  在一身冷汗中醒來，君儀似乎無法掙脫夢中女子蘋兒的影子，她常常覺得她就是蘋兒，蘋兒就是她，已分不清彼此了。從此，她每天晚上睡覺都會做夢，夢到自己穿著一身素白的長衫，一邊在敲木魚，一邊念經。\n\
    \n  晚上總是無法睡好覺，白天又要強打精神上班，君儀自然無法像以前那樣意氣風發。每天撐到下午，她就感到精神不濟，從前的光鮮亮麗也黯淡了不少。這種情形當然早就引起同事們的注意，難免又議論紛紛。和她開會或談話時經常聽她輕咳幾聲，有人勸她要去檢查氣管和肺，她也認真去做了檢查，一切都正常，但是她的咳嗽始終就是好不了，胸口也經常悶得發慌。\n\
    \n  又到了每週二的主管會報，輪到君儀發言的時候，她一反常態的站起來，落落大方的望了在場的每一位一眼，接著說了聲：「阿彌陀佛」。\n\n  長橢圓形的會議桌，四週坐滿了人，全被君儀突如其來的舉動楞住了，會場頓時鴉雀無聲，每個人都抬起頭來看著她。\n\
    \n  君儀無視於那些驚訝和疑問的眼光，繼續說道：\n  「我開悟了！這是我多年苦修的結果。修行這條路，不是那麼容易走的，有很多事都必須看開，也必須放下。放下，說起來簡單，做起來可不簡單，那是一種捨。我現在終於懂了，能捨，才有得，這是一種無形的收穫，讓人心胸更開闊、更平靜。」\n\
    \n  與會的主管們，一時不知該如何反應，一個個聚精會神的聽著。君儀看大家好像聽得很有興趣，她欣慰的朝衆人微笑著，接著又說：\n  「從今天起，我要開始宣揚佛法，希望你們都是有緣人，可以一起來皈依佛門。」\n\
    \n  在這種場合宣揚起佛法，使會場的氣氛忽然僵住了，主管們這時似乎已回過神來，紛紛交換著意見，有人說：「不可思議！」有人問：「怎麼回事？」但是不知怎的，就是沒人起來阻止她。\n\
    \n  「佛法是佛的教育，佛法中最主要的精神之一，就是在告訴衆生人生是無常的，世間的一切也都是無常的⋯⋯。」\n\n  君儀向來是個無神論者，忽然大談佛法已經夠讓人感到驚異，更令人不解的是，君儀說話的口氣和神態也跟以前大不相同，好像變了一個人似的。\n\
    \n  幾個跟她比較相熟的主管，知道她從來不看佛經也不懂佛法，今天卻忽然說自己開悟了，而且講起佛法還頭頭是道，聽得都傻住了。\n\n  君儀發言時，主管會報已經接近尾聲，所以她想多講也沒時間，下班鈴聲響了起來，"
  mdcn: "## 現代異次元——十則靈療的故事\n\n  境中的不好氣場，都會使人生病的，這種病不在肉身，而是在靈體上，這在醫學上是檢查不出來的。──吳慕涵回答。\n\
    \n  吳慕涵的話，讓他想起媛媛檢查了六年的昏睡症，會不會就是靈體被佔？這他早已懷疑，才會東奔西跑的找了許多寺廟、神壇、乩童、法師、道士等來驅魔，難道是因為他找的這些人道行不夠，不敵邪魔？那他倒要看看吳慕涵有多大本事？\n\
    \n  這六年來，他也懷疑過家裡的陽宅出了問題，因此請過幾位地理風水師到家裡來看，有的說他家的神桌擺的方位不對，幫他換了個方向，不過媛媛的病並沒好轉，印刷廠的生意也沒有起色；最近朋友又介紹的一位風水師，說他家裡不順，事業受影響，孩子生病，是因為房子的座向有問題，建議他另外買一塊地，而且面積愈大愈好，還說等地找好了，再來幫他規劃建房子的方位。岑風就這件事請教吳慕涵，想知道他有什麼看法？\n\
    \n  吳慕涵聽了很不以為然的搖搖頭說：「大部分的小老百姓，都是辛苦了一輩子才籌足了自備款買房子，還有二十年的銀行貸款要繳，因為風水不好就要換房子，談何容易？照這麼說，窮人家出了事，就只能等死囉？有人不想搬家，就聽風水師的建議，改門，改窗，敲牆，換方位，用這種方法來避開煞氣。\n\
    \n  「這樣有用嗎？」「你認爲有用嗎？」「我不知道，可是很多人都這樣做，不得已啊！爲了求平安嘛！所以才有人幾個月就改個門或改個窗，一年到頭家裡都有工程在進行。」「你想，就算家裡真的有煞氣存在，改門改窗有用嗎？」「避開它，應該有一點用吧！」「或許暫時有用，但是煞氣還在，隨時都蠢蠢欲動，像定時炸彈一樣，所以問題仍然沒有解決。」「有人在家裡貼了一些符或八卦，那樣有用嗎？」「有用也只是短時間，時間過了，沒拿下來，反而會招更多煞氣。」「那要用什麼辦法才能真正解決？」「不管那團煞氣是不好的氣場，或是不該留在人間的外靈，最好的辦法就是將他們請走，請的方式最好也不要用驅、用鎮、用趕，因爲那樣對他們太不尊重了，說不定他們會呼朋引伴再回來，就更難收拾了。\n\
    \n  吳慕涵的這番話，岑風非常認同。記得在許多靈異電影裡頭就經常看到這樣的情節，道士驅魔不成，邪魔反而出去調兵遣將再回來鬧得天翻地覆的，原來這都是真的，並非導演在搞笑。\n\
    \n  一番對談之後，岑風對吳慕涵的印象完全改觀，從言談之中就知道他絕對不是神棍之流。自詡從來不迷信的他，漸漸的覺得有些無法解釋的靈異現象，不是你不相信就會自動消失，也不會因為你看不見就不存在。流傳了千百年的傳說和故事，仍然風行於世的，必定有其存在的價值，這可能就是先人的智慧，透過傳說傳遞給後代子孫，無非也是告訴後人，對看不到、摸不到、聽不到的另一界衆生，要給予尊重；畢竟人類的感官能力非常有限，因此對存在我們週遭的許多信息都接收不到，當然，視而不見，聽而不聞，這種情形有助於人類在這個空間裡生存，不至於與其他空間衆生擦撞；但是一味否定其他空間生靈的存在，就是一種不尊重；尤其，這些年來，經歷了這麼多事，他和玉嬋都秉持著寧可信其有的態度，因此，心不但變柔軟了，也更包容了。\n\
    \n  繼續上路後，很快就到了新竹。岑風的房子座落在一條巷子裡，是一棟透天厝，樓下是印刷廠，樓上住家。吳慕涵一進門就感應到一股極爲強大的煞氣，他循著這個大氣場找了去，用眼睛一望，原來是神桌上土地公的像被一個大魔頭強佔了去，坐在那裡耀武揚威，見到吳慕涵來了，還張牙舞爪的想嚇他。\n\
    \n  吳慕涵見狀不但不怕，反而趨前走到神桌前站定，喉嚨裡發出一連串的聲音，彷彿在與人對話一般，但是站在一旁的岑風卻一句也聽不懂。不一會兒，似乎溝通完了，吳慕涵大喝一聲，將魔頭及神桌上其他神像上的外靈也一一渡走。然後他退後幾步，轉頭對岑風說：\n\
    \n  「你供的是土地公，但是土地公早就被趕跑了，我現在把祂請回來了。」\n\n  岑風一聽，有點半信半疑，但是說也奇怪，他忽然覺得家中的氣場不一樣了，令他感到異常的清淨和舒適，不像以前那樣總是覺得悶悶的，人也不清爽。\n\
    \n  家裡要供神明，擺一尊神像就夠了，不要貪心，想要請來那麼多神仙，那是不可能的，如果正神上位了，祂只能住在一尊像裡，祂不但自己要修行，還要照顧你一家人，你又弄來許多神像擺在神桌上，你可知道這些神像如果沒有靈，就只是泥塑木雕的工藝品而已，全都是空位的，家中這位正神還要忙著照顧這些雕像，以防它們被其他外靈佔據，神仙即使有三頭六臂也會忙不過來的。──\n\
    \n  岑風一聽，吳慕涵說的還真是有道理，一般人好像都沒想過這樣的事。其實仔細一想，確是如此，一般人何德何能，能請到一桌子的菩薩和神仙？能真正請到一尊，就已經很了不起了。他擺在神桌上的觀音像，是有一次到大陸旅遊，被這尊觀音的法像吸引，又聽老闆說這是多年在山洞中面壁苦修的高僧，在洞中坐化後，用洞內的石壁雕刻的，所以他就很虔誠的將神像請回來，供在神桌上，沒想到這麼莊嚴美麗的雕像也會被外靈侵入。\n\
    \n  「家裡既然有供神，就要把神桌擺在最好的位置，正神才願意上座，你在農曆十五那天早上，把神桌搬到這裡來。」吳慕涵說著用手比出了放置神桌的位置。\n\n\
    \  吳慕涵指的這個位置，不就是神桌先前擺放的地方嗎？原來這裡是個好方位！上次請來的地理師，將神桌搬到現在這個地方之後，不但媛媛的病情開始加劇，印刷廠的生意也幾乎停頓，自己也病了一場，半邊身子不能動，他本來以爲一切都完了，幸好病情逐漸好轉，他可以動了，卻又不小心摔了一跤，骨頭裂傷，真是倒楣透頂。\n\
    \n  「搬神桌可以自己動手嗎？」岑風很懷疑的問。\n  「當然可以！你供奉土地公，祂就是你家中的一份子，移一個好位子給祂，祂會很高興的。這種事自己來就可以，不必再花錢請地理師。」\n\
    \n  這倒是很新鮮的事，移動神桌一般人都會請地理師，沒有人自己動手的，不過吳慕涵的說法很合理，家神是家中的保護神，跟自己最親近，親自動手再好不過。從吳慕涵的建議也可看出他是個不貪財的人，否則他可以在農曆十五日那天為了移神桌再來一次，任何人都會覺得那是理所當然的。\n\
    \n  吳慕涵告訴岑風移動神桌時該做的事，講完之後，他幫岑風一家人這幾年來受到不好氣場影響的身體，一個個加以清理，把晦氣排除。頓時，每個人都覺得神清氣爽。\n\
    \n  媛媛的情況比較特別，她身上不僅有晦氣，還被外靈附了身，這麼多年來，以她身體為家的，還不只一個，這是因為物以類聚，所以越招越多。六年前是因為岑風家中的神像先被佔，使得媛媛身上的氣場不好，而吸引了邪魔上身；也可能是因為媛媛先在外面招惹了邪靈，將不好的氣場帶回家中，把家裡供奉的土地公都嚇跑了，於是邪靈鳩佔鵲巢，還招來越多同道，以此為家，一起接受供養。由於有外靈在家中作亂，才使得這一家人身體健康受到影響，事業也不順利。吳慕涵透過意念與他們溝通，在徵求同意後，一次將他們全部渡走。\n\
    \n## 現代異次元——十則靈療的故事\n\n  吳慕涵到家裡來時，正好是媛媛即將發病的時間，不過，真的很靈，媛媛安然的渡過了這次的昏睡週期，而且自此她的怪病就好了；說也奇怪，造成家中晦氣的障礙排除後，印刷廠的生意應接不暇，想偷閒休息一下都難。\n\
    \n  媛媛的病就這樣好了起來，她順利的考上高中，三年之後，又順利的就讀中部的一所醫專，如今的媛媛已經是一位亭亭玉立的美少女了。\n\n  一向鐵齒的岑風，現在變得更謙虛了，他相信宇宙之大，無奇不有，只要不是迷信，他對許多玄妙之事，都寧可信其有，那是對宇宙萬物的一種尊敬。他每天在給土地公上香的時候，都會想起吳慕涵到家中渡走外靈的情形，他只是往神桌前一站，用意念與他們溝通，就把事情解決了，可見得這個人雖然是肉身，而且生活在凡間，但是他在靈界一定是有地位的，而且地位應該還蠻高的，否則靈界衆生怎麼肯聽命於他。他看過道士作法驅魔，需要用到許多法器，並進行一些相當繁複的儀式，還不見得能把魔趕走；他也看過西洋驅魔的電影，像一部經典影片「大法師」，和近年来的新片「魂飛魄散」，裡面都有天主教神父驅魔的情節，神父也需要用到十字架、法袍、聖水、聖經等代表上帝的聖物；像吳先生這樣赤手空拳，什麼都不需要的，他還是頭一回看見。\n\
    \n  「老公，你看《西遊記》裡面那些神和魔只要一遇上，就打得死去活來，尤其是孫悟空想收妖，那更是從天上打到地下，又從地下打到天上，打了幾晝夜，各種法寶都用盡，還是打得都難分難解，但是只要請來觀世音菩薩或其他菩薩，根本什麼也不需要，菩薩只要用手輕輕一指，再大的魔頭都乖乖就範。」每次岑風和玉嬋提起這事，玉嬋就會這樣回答他。\n\
    \n  老婆這樣說，可見得吳慕涵在她心目中的地位了。\n\n  能遇到吳慕涵，他覺得很幸運，這位奇人異士真的是他們家的救命恩人。媛媛痊癒後不久，他在《中國時報》醫藥版上，看到一篇〈現代睡美人〉的報導（八十八年六月五日），內容談的是有一些年齡從八歲到二十六歲不等的學生，罹患了「克萊列文症候群」的疾病，這是一種嗜睡的怪病，罹病的學生經常處於昏昏沉沉的狀態中，上課打瞌睡，怎麼也叫不醒，還會產生幻覺、幻聽、幻視和獨自胡言亂語的現象；這種情形往往被醫師診斷為憂鬱症或精神分裂症，病發時，患者每次睡眠期從數日、一週、兩週到一個月的都有，睡眠專科醫師有的會建議服用興奮劑來改善症狀。患者在睡眠期結束就自動清醒，不藥而癒。撰文的是某市立療養院的醫檢師，他說美國有「二十四小時多功能睡眠檢查」，一次費用為三千美金，還建議將這種檢查納入健保以造福病患。岑風看了這篇報導不禁哈哈大笑，玉嬋問他笑什麼，他把報紙遞過去給她看，然後說：\n\
    \n  > 「症狀明明就是嗜睡，還要花這麼多錢去檢查來證明是嗜睡，證明了以後又無法治療，真是多此一舉。」\n\n  「檢查還算是好的，只有受點苦加上吃錯藥而已，你看『大法師』電影裡邪的小女孩，為了檢查生的是什麼病，吃了多少苦頭，看了叫爲人父母的多心疼啊！腦科醫生沒辦法了，將她轉到精神科，經過多少權威醫生會診，最後竟然建議女孩的媽媽去請神父驅魔，把這個媽媽嚇得快崩潰了。我聽玉露說，有一個女孩子也是跟媛媛一樣嗜睡，檢查好久都查不出病因，醫生竟然爲她做腦部手術，把腦打開來看了還是找不到病因，又縫回去。」\n\
    \n  > 「實在有夠冤枉的，真慶幸不是媛媛。」\n\n  > 「這篇報導裡寫說，醫生建議患了嗜睡症的人，就多睡多休息，睡飽了自然就清醒，就可以恢復正常生活。這是什麼話！簡直就是讓患者自生自滅嘛！別人的孩子他們一點都不心疼，也不想想想有這種病人的家庭過的是什麼日子！那簡直不是人過的，那種痛苦有誰能真正了解！\n\
    \n  「這也不能怪醫生，他們也不是不想醫，只是無從醫起而已。」\n\n  「那也不能亂按病名，還亂開藥給病人吃啊！」岑風一想起多年來的折磨和焦慮，心中就有氣，說話不禁大聲了起來。\n\
    \n  「好了，好了，都過去了，別在往事上浪費精力。」\n\n  「老婆，《大法師》的電影是根據小說改編的，這位作者真厲害，他竟然也知道當家中有一個人撞了邪，這不好的氣場，會影響家裡其他人，連到他們家拜訪和作客的人也會受到影響，電影裡有一個叫布克的，去看了小女孩，結果被魔給殺死，還把他丟出窗外，連驅魔的兩位神父也都一命嗚呼，真是嚇人！」\n\
    \n  「你差點半身不遂，又摔一跤骨頭都裂了，事業也不順，最能感同身受。」\n\n  岑風和玉嬋是從一場惡夢中甦醒的過來人，而媛媛親歷其境，感觸更是良多。他們家的惡夢已經過去了，媛媛病癒前每週上台北看的腦神經內科，也沒有追蹤過她的病情。倒是有一次岑風到醫院去探病，在走廊巧遇了王主任，主任很親切的問他：\n\
    \n  「你女兒現在怎麼樣了？」\n\n  「她已經好了！」\n\n  「怎麼好的？」\n\n  「說了你也不信！你自己去問上帝好了。」\n\n  岑風和主任打了個哈哈，什麼也沒說，就跟他揮揮手說再見。\n\
    \n  這下換王主任莫名奇妙的看著他，目送他的背影漸行漸遠。\n\n## 一枝紅艷露凝香\n\n  「格、格、格」的高跟鞋聲，遠遠地從辦公室那頭傳來；在辦公桌前低頭工作的人紛紛抬起頭來，往聲音來處望去。\n\
    \n  如大家所期待的，是隔壁辦公室的李君儀來了。\n\n  李君儀捧著一疊卷宗，在衆多目光的注視下，泰若自然，面帶微笑的從辦公室這頭走向辦公室那頭。\n\n\
    \  她那自信滿滿的表情和氣定神閒的舉止，比那張美麗的臉龐和修長窈窕的身材更吸引人。在這家外商機構裡，有衆多優秀的職場高手，但能兼具美貌、氣質、學識和交際手腕的，非李君儀莫屬。\n\
    \n  研究所畢業後，李君儀考進了這家外商公司，短短兩年多就以超強的能力連跳數級，升上了副理的職位。她的快速升遷，令很多由基層幹起，按部就班、循序漸進的同事忌妒。但是那些對她議論紛紛的人，私底下卻也很欣賞她的才華、風度和能力。\n\
    \n  像今天，君儀這身打扮，就夠令人刮目相看。一件淺灰套頭高領T恤，一條及膝的深灰色窄裙，一雙半高跟黑色皮鞋，在如此素雅的妝扮下，只點綴了胸前那只精緻的別針，以及挽起的秀髮上那支小巧的髮簪，就使她煥發出一種無與倫比的高貴風華。\n\
    \n  在公司裡，似乎沒有人真正摸清楚她的實際狀況。大家只知道她的人事資料上填的是未婚，但是無名指上卻一直都戴著一只小小的鑽戒。有人問她結婚沒或是要為她介紹男朋友，她就舉起手，鑽戒在日光燈下閃閃發光。因此，公司裡就傳聞她已經訂婚。\n\
    \n  美，加上讓人摸不著，猜不透的神秘，使她成為公司同事喜愛談論的對象，她向來處之泰然。\n\n  每星期二早上十點半，是公司例行的主管會報，副理以上的主管都必須參加。會報的內容是由各部門報告上週的業務執行進度以及本週的預定進度。由於採購、財務、業務、生產、行銷各部門的主管都到齊了，因此很多業務推展和生產方面的問題，在會中都可以一併提出來研擬解決對策。這個重要的會議，君儀從不缺席，因為她也是這個會議的即席記錄；她一邊開會，一邊以手提電腦寫下會議紀錄，會一開完只需列印出來，再讓小妹拿去影印，就可以在散會後半小時發給與會的各主管。\n\
    \n  今天在開會的時候，君儀就覺得額頭有點兒發燙，人也輕飄飄的，她知道自己感冒了。下了班，她到住家附近的診所去看病，拿了三天的藥，吃得她成天昏昏沉沉的。不輕易請假的她仍然天天去上班。藥吃完了，病情好像愈嚴重了，她開始咳嗽，又去看了幾次醫生，病情也沒有好轉。\n\
    \n  她知道一般感冒有一定的病程，吃藥只是緩解症狀，不管吃不吃藥，兩個禮拜總會痊癒的，但是她的病已經拖了一個月，一直還在咳著，令她覺得有點煩躁。有一天下了班，她開著車直接到一家大規模教學醫院的夜間門診掛號，心想換個醫生，換不同的藥吃吃看，希望能早日痊癒。\n\
    \n  坐在候診室裡，她沒來由的身體忽然搖晃了一下，然後感覺到一股冷颼颼的氣直往毛孔裡鑽，讓她全身都起了雞皮疙瘩。她看看四週，前後排的候診椅上雖然都坐了人，但是離她有一點距離，附近也沒有人走動。但是那一陣搖晃是如此真實，絕不是她的想像。那一陣涼意也的確存在過。她注意了一下四週的環境，她坐的位子既不是冷氣口，也不靠近門口和窗口，那一股涼意從何而來呢？\n\
    \n  護士把頭探出診間，呼喚她的名字，打斷了她的思緒。她起身去看病，接著又等候拿藥，身上一直都覺得冷冷的，手腳尤其冰涼，該不會又再度感冒吧！她心想。\n\n\
    \  從醫院回來後，她就感到迷迷糊糊，恍恍惚惚地，好像忘了自己是誰。晚上睡覺也難以安枕，總是翻來覆去的，好不容易折騰到下半夜才睡著。\n\n  才剛剛睡沉，君儀就開始做夢，睡睡醒醒之間，夢斷斷續續的，但是情節相連，劇情還環環相扣，彷彿連續劇一樣。\n\
    \n  夢中，一位年輕貌美名喚蘋兒的女子，憑著媒妁之言，嫁到了門當戶對的夫家。剛進門時，她是一位婆婆疼惜的媳婦兒，鎮日裡穿金戴銀，丫環和老媽子任她使喚，是一位享盡榮華富貴的少奶奶。夫婿對她也疼愛有加，使她覺得幸福美滿。\n\
    \n  但是，好景不常，嫁進夫家三年，蘋兒一直未能生育，婆婆開始臉色就不對了，受了婆婆的影響，夫婿對她的態度也有了一百八十度的轉變。很快的他就納了妾，那位姿色不錯的小妾，進門才兩年，就連續為夫家生了兩個胖兒子，自此，蘋兒的地位一落千丈，只差沒有被休妻趕回娘家。\n\
    \n  不久，婆婆過世，夫婿對她更是不聞不問，她心中倒也沒有怨夫家對她不好，至少她在家中衣食無缺，身邊還有一位丫頭和老媽子伺候。她在自己獨居的院落裡，加蓋了一間佛堂，開始茹素禮佛，每日晨起「叩！叩！叩！」的木魚聲，伴隨著她低沉的誦經聲，就在院落裡輕輕傳開。\n\
    \n  蘋兒的生活裡，除了古佛青燈和念經禮佛之外，已經沒有其他重要的事。虔心向佛，使她心情平靜。三十七歲那年，她一病不起，臨終前想起在夫家受到的不公平待遇，眼淚不禁直落，一股怨氣也油然而生，向來平和的心境，有了一絲波動，就那麼一點兒不平的意念，使她在嚥下最後一口氣，靈魂離體的一剎那，無法被等在一旁的觀世音菩薩接引到西方極樂世界而流落在人間。\n\
    \n  在一身冷汗中醒來，君儀似乎無法掙脫夢中女子蘋兒的影子，她常常覺得她就是蘋兒，蘋兒就是她，已分不清彼此了。從此，她每天晚上睡覺都會做夢，夢到自己穿著一身素白的長衫，一邊在敲木魚，一邊念經。\n\
    \n  晚上總是無法睡好覺，白天又要強打精神上班，君儀自然無法像以前那樣意氣風發。每天撐到下午，她就感到精神不濟，從前的光鮮亮麗也黯淡了不少。這種情形當然早就引起同事們的注意，難免又議論紛紛。和她開會或談話時經常聽她輕咳幾聲，有人勸她要去檢查氣管和肺，她也認真去做了檢查，一切都正常，但是她的咳嗽始終就是好不了，胸口也經常悶得發慌。\n\
    \n  又到了每週二的主管會報，輪到君儀發言的時候，她一反常態的站起來，落落大方的望了在場的每一位一眼，接著說了聲：「阿彌陀佛」。\n\n  長橢圓形的會議桌，四週坐滿了人，全被君儀突如其來的舉動楞住了，會場頓時鴉雀無聲，每個人都抬起頭來看著她。\n\
    \n  君儀無視於那些驚訝和疑問的眼光，繼續說道：\n  「我開悟了！這是我多年苦修的結果。修行這條路，不是那麼容易走的，有很多事都必須看開，也必須放下。放下，說起來簡單，做起來可不簡單，那是一種捨。我現在終於懂了，能捨，才有得，這是一種無形的收穫，讓人心胸更開闊、更平靜。」\n\
    \n  與會的主管們，一時不知該如何反應，一個個聚精會神的聽著。君儀看大家好像聽得很有興趣，她欣慰的朝衆人微笑著，接著又說：\n  「從今天起，我要開始宣揚佛法，希望你們都是有緣人，可以一起來皈依佛門。」\n\
    \n  在這種場合宣揚起佛法，使會場的氣氛忽然僵住了，主管們這時似乎已回過神來，紛紛交換著意見，有人說：「不可思議！」有人問：「怎麼回事？」但是不知怎的，就是沒人起來阻止她。\n\
    \n  「佛法是佛的教育，佛法中最主要的精神之一，就是在告訴衆生人生是無常的，世間的一切也都是無常的⋯⋯。」\n\n  君儀向來是個無神論者，忽然大談佛法已經夠讓人感到驚異，更令人不解的是，君儀說話的口氣和神態也跟以前大不相同，好像變了一個人似的。\n\
    \n  幾個跟她比較相熟的主管，知道她從來不看佛經也不懂佛法，今天卻忽然說自己開悟了，而且講起佛法還頭頭是道，聽得都傻住了。\n\n  君儀發言時，主管會報已經接近尾聲，所以她想多講也沒時間，下班鈴聲響了起來，"
