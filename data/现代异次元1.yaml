  md: '神錯亂、哭鬧、脫衣、奔跑到昏睡不醒,最後醒過來,全程總共七天。從此,她每個月時間一到就會開始昏睡,從每月睡七天到六年後的一個月十五天。這時的媛媛也已經從一個小學三年級的小女孩,長大成爲一位國中三年級少女。


    雖然已經國三了,但是,不知是否因爲她大半的時間都在昏睡中度過,所以媛媛在醒著的日子裡,行爲舉止都像是小女孩一樣的天真,完全不像一位已經十六歲的少女,但是她因爲吃了許多中藥和西藥,身材卻有過度發育的現象。


