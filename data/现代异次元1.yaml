    「這些古董家具，又不是出土的陪葬物，怎會附有這麼多無形朋友？」


    「靈界朋友藏身的地方，不僅是古董，任何東西他們都能附身的。古董因為年代久了，經歷的人事也多，有的晦氣重些，會吸引氣場相近的來依附。」


    ## 陰飛蛇


    這股煞氣像天羅地網般將張家的祖墳團團包圍住，看去簡直就是一片烏雲罩頂，不見天日。墳墓邊的皇天、后土立碑，也都剩空位。鎮守墳前的土地公，早就不敵這股煞氣，被逼離開，在一旁乾着急。這座陰宅裡的張家祖先，那就更不必說了，不但被煞氣逼得無處可去，還被傷得魂飛魄散，更可憐的是被趕了出去，在四周徘徊流浪，無家可歸；陽間的子孫們，也幾乎個個都受到這種不好的氣場所影響……


    ## 姬百合的迷思


    你們一家人都有事，身體都出了狀況，但是我要從神桌先看起，把陽宅和陰宅的氣場先調整好。因為陽宅和陰宅像一個家庭的屋頂和地基，這些基礎安好沒事，住在裡面的人才會平安。若是只看人，人沒事了，但是仍然住在氣場有問題的屋子裡，很快又有事了，等於白看。


