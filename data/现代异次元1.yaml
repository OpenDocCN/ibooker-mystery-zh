    黃總經理領著吳慕涵來到位於中部鄉下的李家時，親戚朋友和鄰居圍了一屋子。


    吳慕涵的出現，引起一陣騷動。他穿一件白色圓領長袖T恤，留一頭長髮，很像一位藝術創作者。來到李家的人，有的是真心關懷君儀的，有的是來看門道的，有的是來看熱鬧的。


    四周圍的人心裡在想些什麼，吳慕涵從空氣的波動中就得到了訊息。這一堆好奇的人，想的不外是：


    - 「這個人會不會是個騙子?」

    - 「請這種不明來歷的人來，能做什麼?太迷信了吧!」

    - 「看這一副德性，八成是來騙財的江湖術士。」


    吳慕涵那幾分冷峻，幾分銳利又帶幾分慈悲的眼神，橫掃在場的人一眼，那一眼裡他已經看出哪一些是相信的，哪一些是不信的。


    「把你的右手伸出來。」吳慕涵對君儀說。


    今天的君儀，是原來的君儀，她乖乖的伸出右手。她的手和腳這兩個多月來，一直都是冰冰涼涼的。


    吳慕涵伸出他那細長而又骨節分明的手，用手指在君儀的手掌上又點又按的。


    「是用氣功治療嗎？」

    「是在點穴吧？」

    「他點的是不是手掌上的人體反射區？」

    「都不像！沒見過這樣幫人看病的。」


    人群裡傳來嗡嗡嗡的討論聲，吳先生一臉嚴肅，兩眼既不看君儀，也不看她的手，反而凝神注視著茶几上的玻璃。她感覺君儀如凝脂般的冰冷小手，微微的出汗，汗水也是冰涼的。


    吳先生凝視前方，彷彿入定一般，專注的在感應著君儀手上傳來的信息。他看到一位穿著素白長衫的女子，正在敲打木魚，並認真的誦經。


    「我喜歡待在李君儀身上，你別多管閒事。」那女子轉身望著吳慕涵說。


    「你跟李君儀有什麼前世的宿業嗎？為什麼要待在她身上？」


    「沒有，我和她沒什麼關係的。」


    「那你應該離開，不能佔用她的身體。」


    「我喜歡她，她去醫院看病時，我一眼見到她就喜歡。你看見沒，她手指頭上戴了一個小小的鑽石戒子，讓人以爲她訂親了，其實是想擋掉男人的追求，這女孩很純淨，是個獨身主義的人，對修行很有幫助，我會要她去皈依佛門，跟我一起修。」


    「你這樣做是不對的，你生前是個修行人，有些根基了，佔用別人的身體，強迫人跟她一起修，這樣是修不成的，這人不是自願的，況且陰陽兩隔，沒有用的。」


    「是這樣的嗎？我怎麼沒想到，多虧你提醒我。不！你是騙我的吧！想騙我離開，沒那麼容易，我偏不走。」


    「我絕不是在騙妳，你想想，你在李君儀身上已經好幾個月了，修行上有沒有長進啊？」


    「咦？好像真的沒長進。」白衣女子想了一想說。


    「妳佔用了李君儀的身體，爲難了她，也毀了她，還弄得這一家人雞犬不寧，有違妳修行人的慈悲。這樣好了，我可以渡妳。」


    「你想渡我？我可是修得不錯的，你要渡我到哪兒去？」


    「妳想到哪兒去？」吳慕涵反問她。


    女子沉吟了好一會兒，似乎考慮了又考慮，覺得這是個大好機會，於是她試著要求：


    「你要是能作主，渡我到二地菩薩的階位，我就走。」


    這下換吳慕涵考慮了。他心想這白衣女子，自以為修得很好，其實修得不正道，不是真正佛門中人。無明又使她起了貪念，在陽間佔用無辜人的身體修煉；只是她心地善良，沒有害人之心。他思索了一會兒，決定渡她到二地菩薩的階位，若她的道行夠，就坐得住，否則自然會往下落，所以答應她無妨。


    「好，我可以作主渡妳到二地，妳好自為之。」


    吳慕涵以意念與白衣女子做了最後的溝通之後，即刻出定，他的喉嚨裡忽然發出一聲巨大的「嗝」聲，把在場的人都嚇了一跳。


    隨著那巨大的嗝聲，君儀那悶得緊緊的，呼吸都覺困難的胸口，忽然間開了；那種喉嚨口刺癢，隨時想咳嗽的感覺消失了，冰冷的手也漸漸回暖，她整個人一下子輕鬆了起來。


    「好了，李小姐，妳沒事了。」


    「這樣就好了嗎？」李媽媽懷疑的問。


    在場的人也多持懷疑的態度，他們前來原來是準備見識一場法會或是法術，但是吳慕涵好像什麼也沒做，只是摸摸君儀的手，似乎有點令他們失望。


    「這樣就好了。」吳慕涵肯定的說。


    「吳先生，請問你，君儀生的是什麼病？」


    「她的病已經好了，這是最重要的，是嗎？」


    「是的。」好幾個人同聲回答。


    吳慕涵並不想回答任何問題，虛空界的許多事也不是人間該知道的。即使說了，世俗中也無法盡信，還有那不信的人會以爲他在裝神弄鬼，所以不說也罷。


    吳慕涵站起來，朝門口走去，黃總經理緊跟了出去。君儀和李媽媽隨後也追了出去，母女倆撲通一聲在吳慕涵跟前跪下道謝。吳慕涵趕緊上前一步扶起她們。


    「別這樣，我擔當不起。」


    「大恩不言謝！」君儀用清澈的眼神感激的望著吳慕涵。


    「多多保重。」


    吳慕涵就在一群人的目送下，坐上黃總經理的車走了。


    除了君儀之外，在場的親友都很難相信她已經痊癒了。


    一星期之後，君儀銷假上班了。


    「格！格！格！」的高跟鞋聲又在辦公室響起。


    君儀恢復正常了，在辦公室宣揚佛法的日子，像一場夢般的過去了。那夢，奇蹟似的來，又奇蹟似的走；但夢醒時刻，似乎留下了些什麼，並不是毫無痕跡。


    大家都覺得君儀跟以前不一樣了，她的美依舊那樣吸引人，只是那種美，總覺得帶著冷艷，像皚皚白雪中開放的一枝紅梅，冰清玉潔又冷艷凝香。


    君儀，依舊是辦公室的焦點人物，人們的話題總是喜歡圍繞著她打轉。但是，不論人們說什麼，君儀還是君儀，她一點也不在乎。因為那既不能增她一分，也不能減她一分，反而使她愈顯冷艷，更像雪地裡那枝紅梅。


    ## 翠玉屏風


    一陣風來，簷前的風鈴，發出叮叮噹噹的清脆聲音，聽起來分外悅耳。


    青鵠舒服的半卧在門廊躺椅上，獨自喝著下午茶。香醇的咖啡和精緻的小點心，溶化在嘴裡，帶給他一種極爲幸福的感覺。他瞇著眼睛，眼角眉梢都帶著笑意。


    那種幸福和滿足，當然不完全來自於咖啡和點心，而是前些天家裡又添了一件古董——一座古色古香的翠玉屏風。


    想起這座屏風，青鵠就忍不住端著咖啡走進畫室，站在屏風面前仔細欣賞。只見這座用紫壇木雕刻而成的屏風，中間鑲嵌了一塊方形翠玉。這塊翠玉上更是精工雕鑿了一位丰姿綽約的古裝仕女。這位二八年華的美女，手上拿著一把扇子，在牡丹花叢中追逐著蝴蝶；她纖細的身子，細嫩的小手，柔美的姿態真是撩人。


    青鵠越看越喜歡，他用手輕輕觸摸著涼冷的玉，感受玉石細緻滑潤的紋理，也欣賞著仕女畫像的藝術美感。


    這座屏風真是得來不易，能擁有它，他才會這麼滿足。那是去年他應邀到北京開畫展時，在一位收藏家那裡看到的。他只看一眼，立刻就愛上了，但是主人不肯割愛，他回到台灣後，透過朋友一次又一次的向那位收藏家遊說，終於說服他。上星期才千里迢迢的運到，他即刻把屏風安置在畫室最顯眼的位置，一進門就可以看到。


    此刻，他一時興起，舖開一張畫紙，拿起畫筆，沾濕墨水，三兩筆就勾勒出翠玉屏風裡那位婀娜多姿的仕女，那神態，那姿韻，真有十分的像。


    「加上背景，這張也可以加入畫展。」姿敏走進畫室，靠在畫桌邊微笑著說。


    「可以嗎？老婆。」青鵠退後兩步認真的看著。


    「這個女人被你畫活了，好像要從畫裡走出來似的。」


    「有那麼好？」


    「把別的女人畫得那麼美，我都要忌妒了。」


    「真的嗎？老婆，那背景讓妳畫，我們倆合作完成這幅畫，妳還忌妒嗎？」


    「你要我錦上添花，為那女人的美加分？」


    「不論這位紙上美人有多美，老婆大人，妳永遠是我心目中最美的女人。」


    「衝著你這句甜言蜜語，我投降了。」


    姿敏拿起畫筆，為這張仕女圖添上假山、流水、欄杆和幾叢修竹，把這位纖弱的女子，襯托得更加嬌柔。


    李青鵠和何姿敏是一對才情出衆的書畫家，夫婦倆合開過幾次書畫展，都相當成功，在國內外擁有相當的知名度。夫婦倆合開了一間書畫室，平日除了收學生敎書畫之外，也在學校裡兼課敎書法和美術。最近他們夫婦又準備開一次聯展，除了自己的作品，還邀請了學生一起參展，是一次規模不小的師生聯展。


    吳蓮生從家裡出來，手上抱了一疊書法和國畫作品，匆匆走進巷口的一家裱畫店，她手上又是手機又是皮包的。下垂的皮包帶子勾到了一座畫架，不但畫架倒了，這一拉扯，連她手上的東西也全掉在地上。'
