- img_proc: true
  md: '月牙兒掛在黝黑的夜空中，滿天的星斗閃閃發光。他騎著腳踏車，經過一條水圳。夜裡，水圳的流水聲顯得格外沸揚，水波也在月光下發著光。鄉野間霧氣升起，有點迷濛。


    好久沒在鄉下的田野間騎車了，尤其在這樣的晚上，真捨不得回家，他停下車，把車靠在水圳旁，坐下來欣賞著美麗的夜色。


    回想起這兩天所處理的事，的確感到人生無常，周仔、周老伯、老高、美倩、丁老先生、還有老何的兒子阿松，都處在人生的轉彎處，轉得過轉不過，雖然都是由於業力在牽引，說白一點是命運早有安排，覺得非常無奈，但是命運其實是可以改變的。


    中國人相信命運有個定數，命運又是怎麼來的呢？其實，命運是自己創造的。那是經過累世因果相循而來的，是自己所布下的網路。每一世，不論在哪一道，都種下些因，等著下一世坐收成果。因，有善因、惡因；果，有善果、惡果；因此就形成了善緣、惡緣，善報、惡報。人的每一世，遇到過無數人，說過無數話，起過無數念頭，做過無數事，也造過無數業，因而造就了數不清的因果關係，像一片密密麻麻的網，每一條網路相連著過'
  merge: -1
  pgno: 310
- img_proc: true
  md: '去、現在，也創造著未來。

    宿命論者，相信生死有命，富貴在天，認爲命運天注定，真的是大錯特錯了，命運其實是自己創造的，完全掌握在自己手上，由生生世世因果相續而來的。知道了這樣的關係，只要在某一個環節，忽然醒悟了，忽然看清了這原來是一種無止境的遊戲時，心不再動念，不再分別、妄想、執著，身心都清淨了，業力沒有可著力之處，自然可以跳脫因果業障，甚至可以跳脫輪迴。


    世間人有多少能想通這一點呢？人人沉淪於俗世的分別、妄想和執著之中，讓起心動念主宰著一切，使自己的氣場大亂，讓其他界的衆生有機會趁虛而入，使虛妄的心更加沉淪，更無法自拔。


    當人們被外靈所纏而來向他求救時，他常想，他救的到底是人，還是那無端被招惹的靈界朋友。雖然他一出手，人和靈同時都得到解脫，但是，人，是如此的無明，會一次又一次的重犯，常常令他打從內心感到絕望，他寧願抱著解救無形界朋友的心，這樣讓他覺得好過些。


    他常想，若一個人真能放下分別、妄想、執著時，就是把自己放空，或是把自己縮到


    ◇深山何處鐘⋯⋯271'
  merge: -1
  pgno: 311
- img_proc: true
  md: '最小之時，達到忘我的境界，這是修行的最高境界。常常有人問他什麼是修行，修行不是吃齋、念佛、打坐、讀經、打禪七、法會、閉關，而是在日常生活中修正錯誤的行為，使自己漸漸往存好念、說好話、行好事、做好人的方向去。生活中少了計較，快樂自然就多。


    少想到自己，少以自我為中心，也讓自己更心平氣和。這十多年，他一路走來，真正了解他的人少之又少，像他这样的人也不是一般人所能了解的，他也不期望別人能了解。


    一直以來，他其實更嚮往能在山上有一間竹籬茅舍，一個讓他蒔花種菜的小小院落，清晨或黃昏時分，可以走入林深之處，體驗與天地同在的感受。「古木無人徑，深山何處鐘？」在人跡罕至，古木參天的山間小徑上，靜聽深山之中不知何處傳來的鐘聲。


    他相信總有一天，他能夠擁有這樣的生活，過最簡樸且與世無爭的日子。


    一顆流星劃過天際，稍縱即逝的光亮，就像人的一生那樣短暫。在短暫的人生中，有夢想是很美的，在夢想實現以前，他決心把握每一個當下，做好自己份內的事，對得起天、地和自己，其餘的，毀譽由他。


    ◇現代異次元——十則靈療的故事 272'
