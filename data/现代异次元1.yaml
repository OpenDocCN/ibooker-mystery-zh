  md: '給醫生看，幸好這次只是小小的感冒。

    女兒生病，書廷可心疼了，今天是假日不必去畫廊，她陪著女兒一起午睡。躺在小珊

    房間的床上，書廷握著她的小手，父女倆有說有笑的聊著天。小珊的童言童語，不時惹得

    書廷哈哈大笑。聊累了，小珊哈欠連連，眼皮漸漸合上，不知不覺睡著了。看著女兒可愛

    的小臉蛋，書廷一陣恍惚，彷佛看到一張十六、七歲的妙齡少女的臉，他甩甩頭，揉揉

    眼，再定睛看去，仍然是女兒那張熟睡的小臉。

    書廷坐直身子，下得床來，脊背一陣發涼。這已經不是第一次，這個穿著古代服飾的

    少女，經常在他腦海裡若隱若現，也偶而在女兒的房間裡似有似無的飄著。有幾次，書廷

    一個人睡在這個房間裡，在似睡非睡、迷迷糊糊之際，總覺得聽見衣袂飄飄，環佩叮噹之

    聲，每次他都以為自己在做夢，但每次的夢境都那麼相同，令他毛骨悚然。女兒好久以來

    都不肯睡在這個房間，問她為什麼，她也說不出個所以然來。今天是因為爸爸陪她，她才

    肯回到自己的房間睡。

    他再一次仔細端詳女兒的臉，看見她雙眼的眼瞼上，從前長過疣痊癒後留下的疤，醒

    著睜開眼睛時，被雙眼皮一遮，若隱若現，看得不是很清楚，但這會兒睡著了閉著眼睛，


