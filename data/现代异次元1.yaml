    「全部都不准走，這是一個多麼難得的機會啊！這麼多人在這裡，我要把我最近悟到的一些道理跟各位分享，請大家坐好，聽我慢慢說⋯⋯。」


    大夥兒像被一股無形的力量留住，紛紛又坐了下來，好奇的聽君儀講經說法。她口若懸河的說個沒完沒了一直說到十二點半，還沒有要停止的意思。黃經理看時間一分一秒的過去，心裡愈發著急，因為大會的時間是由他控制的，他想不阻止她都不行了。於是走到她身邊，用一種既婉轉又權威的語氣對她說：


    「李副理，我知道講經說法是很神聖的事，今天大家都很有緣，聽妳深入淺出的講佛法，真是受益良多，不過，現在已經十二點半，午休時間過去一半了，大夥兒還沒吃飯呢，待會兒一點鐘就要上班，這樣好了，可不可以請你暫停一下，有空時再請你來講。」


    君儀身體忽然搖晃了一下，回過神來，茫然的看著黃經理，似乎不理解他在說什麼。


    「會開完了，我把會議紀錄拿去給小妹影印，一點鐘以前交到各位手上。」君儀邊說著邊收拾桌上的資料，對剛才的事似乎渾然不知。


    一場臨時的弘法就這樣結束，大家站起身來的同時，會場一片嗡嗡的輕語聲，都在低聲討論君儀的表現。反倒君儀像沒事人一般，抱起她的手提電腦昂首闊步的往外走，回到她的辦公室去。


    會議一結束，大夥兒踏出會議室那一刻，君儀言行反常的消息就傳開了，辦公室的事們只要聚在一起，就在談論這件事，向來引人注意的她，又成了焦點中的焦點人物。


    從那一次開悟演說之後，君儀的日常表現，有時像平日一樣，有時完全走了樣，好像變成另外一個人，做事不像以前那樣俐落，說話也不再那麼明快，性情變得比較溫吞。但是，只要一時興起，走到任何同事面前，她可以拉張椅子坐下來就講佛法，這一坐下去可以談一個多小時，被選中的聽衆真是無可奈何，聽也不是，不聽也不是。


    最令人覺得奇怪的是，當君儀在講經說法時，她的表情認真，態度誠懇，完全像個虔誠的佛教徒。佛經中的道理透過她的體悟，竟相當能打動人心。但是一轉身，她又變成一個沒接觸過佛經，不懂佛法的李君儀。


    君儀的情況愈來愈嚴重，甚至在辦公室裡也很少見到她的影子。她到處去宣揚佛法，黃經理必須到別的辦公室，或是醫務室、收發室、總機房去把她找回來。她的舉動讓人覺得既好笑又教人替她擔心害怕。很明顯的可以看出她的精神異常，一定是哪裡出了問題。


