    書廷看吳先生辦事，真是大開了眼界，不但沒有像道士那樣做法，也不像乩童那樣被靈界上身，更不必祭拜、燒紙錢，只需要用意念相互溝通，幽靈就順從的願意被渡走。他心想，若吳先生是有天命的，那他在虛空界裡的地位必定不低，否則怎會有能力超渡？像吳先生這種不平凡的人，其實就是替代佛菩薩來渡化迷途的無形界朋友……


    ## 哭泣的嬰靈


    看著護理長一扭一扭地走遠，卓敏心中的迷惑也越來越深。行醫二十多年了，身為婦產科醫師的她，什麼樣的病例都看過，但從來沒有見過已經經過三家頗具規模的醫院的各種檢查，都懷疑是卵巢癌，且轉移到胃，排定好開刀時間的病人，在一夜之間兩個要切除的腫瘤會忽然消失不見，這種奇蹟竟然讓她親眼目睹，是醫學在開她玩笑？還是上帝在開她的玩笑？


    ## 現代睡美人


    台灣的森林多，林子裡原本住著許多精靈，遠離人類，和人類的世界互不干擾，但是，現在森林被破壞了，精靈無處可去，只好往人間跑，遇到氣場相近的人，就暫借此人的身體居住，所以很多人莫名其妙的生病，卻總是查不出病因。


    ## 一枝紅艷露凝香


    人有三身，分別是法身、應身、報身。法身就是我們生生不息的靈體，應身是因緣際會輪迴轉世的這個身體，報身是因果業障受報而來的，因果業障是前世留下來的原罪，會報在應身上，讓應身來承受，所以才叫報應。這三身合而為一，組成一個有靈魂和肉體的人。


