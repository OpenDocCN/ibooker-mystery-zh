    為那是權力、財富、名位的象徵，也深信玉可以避邪，因此玉的魅力愈發不可擋。不過，佩戴在身上的玉，或擺放在家中的玉器，如果已經被邪氣所侵，那不但不能避邪，反而會更加招邪。


