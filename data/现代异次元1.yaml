    既然決心要去拜拜，小嫻就找了翠玲和莉莉陪她一起去，小嫻在寺院佛堂裡跟隨法師和信衆一起禮拜時，翠玲和莉莉就在佛堂外爲她加油打氣。


    從小嫻決定要去拜拜後，她的腳痛得比以前厲害，拜完第一次之後，腳痛更加劇，翠玲和莉莉內心都很懷疑拜水懺這回事，但是她們也認爲試試無妨，但是看到小嫻病情更嚴重，她們有些動搖。


