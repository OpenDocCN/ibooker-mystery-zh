  md: '的人來把這種衝突平息？古時候，有巫師可以溝通陰陽兩界，為人消災解厄。巫師，是在天地間被委以重任的人，他們透過種種方法與靈界溝通。至今，許多與世隔絕的原住民部落裡仍然有巫師的存在，他們的地位崇高，是部落裡最具權威和地位的人。在中國人的社會裡，遇到這種陰陽兩界畫不清界線而互相干擾時，一般人習慣請道士來做法。


