  md: '的人身來修。人的身體是可見的色相，色即是空，因為肉體是地火風水四大和合而成，是會分解的，是假的，我們要以假來修真，讓不生不滅的靈更加清淨，清淨才能提昇，不必再落入六道之中。


    吳慕涵也說過，法身是最原始的靈魂，是自性，也是佛陀所說「佛性」。如果法身受了干擾，受了傷，沒有修補好，怎麼努力修行都是障礙重重的，因為法身不清淨，要修行是非常辛苦，也難以成就的。有一次聽淨空法師講經，他說，佛陀說眾生皆具佛性，所以人人都能成佛，為什麼大部分人還是凡夫俗子，無法成佛呢？那是因為佛性被妄想、分別、執著，被貪、瞋、痴、慢、疑所蒙蔽。若能去除這些障礙，達到「無我相」時，就可以跳出六道輪迴。


    淨空法師還說，若想超越這至高境界，再上層樓，並非不可能。放下「我相」，只是基礎功夫而已，若能精進到沒有「人相、衆生相、壽者相」的分別，靈就已經出到十法界的邊緣；若是能修到「無我見，無人見，無衆生見，無壽者見」時，靈就出脫十法界而進入一真法界；沒有了「四相」和「四見」的念頭時，「寂」就現前，那才是真正的自性清淨，達到初住菩薩的境界了。


