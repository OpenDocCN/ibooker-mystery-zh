    吳慕涵一進門，就感覺不一樣了，屋子裡陰氣雖然仍未完全散去，但已不是第一次來時的劍拔弩張。他看到藏身在玉屏風裡的宋珮瑛，不論神情和臉色都變溫馴了。她必恭必敬的站在玉屏風前，十八位聽命於她的夥伴們在她身後一字排開。


    吳慕涵一時之間，彷彿入定一般，不發一語，他開始用意念和宋珮瑛溝通。


    「妳要求的，這家人都已經做到，妳不該再留戀人間，而且冤有頭債有主，李青鵠夫婦和妳沒什麼關係，妳應該早點離去，不要在他們家遊蕩，還他們的安寧。」


    宋珮瑛淚流滿面的跪下來，她身後的夥伴們也隨她一起跪下。


    「吳先生，我代表大家請求您，希望讓我們在投胎轉世之後，可以順利找到前世的仇人。」


    「這我不能作主，只能看你們個人的緣分，天理昭彰，不是不報，時候未到。」


    「謝謝吳先生指點。」


    「不過，我還是要勸妳，冤家宜解不宜結，冤冤相報何時了，一心想要報仇，心中無法平靜，投胎轉世之後日子不會好過，能夠忘了冤仇，擺脫桎梏，才能在來世得到解脫，也才能有幸福快樂的日子。」


    「謝謝吳先生的金玉良言，也謝謝吳先生超渡我們。我們已經準備好要走了。」


    吳先生點點頭，對他們一揮手，宋珮瑛等十九位無形界朋友，就被他渡走了。


    蓮生和青鵠夫婦見吳慕涵在入定狀態，都不敢驚擾他。這時忽然見他一揮手，接著就回過神來，朝大家一笑說：


    「十九位，全部渡走了。」


    青鵠夫婦莫名奇妙看著他，聽不懂他的話。


    「你總共有十九件古董，都住滿了靈界的朋友，其中佔住翠玉屏風的那位，是其中的大姊大，清朝人，名叫宋珮瑛，她是被人推落井裡枉死的，怨氣很重，可以說是厲鬼，其他十八位都要聽她的⋯⋯。」


    吳慕涵的話，聽得青鵠夫婦和蓮生毛骨悚然。


    「我知道若三天前告訴你們，你們會害怕，說不定連自己家都不敢住，所以我今天才講，現在你們可以安心，他們全都走了。」


    「他們為什麼都跑到我們家來？」青鵠問。


    「你們最早買的是不是房間那張古董床？」


    「是，沒錯。」


    「那床上躺著一位被人用毒藥害死的女人，屋子裡有了陰氣，自然而然就吸引過往的孤魂野鬼進來，呼朋引伴的住在一起。」


    「我身上長腫瘤，跟這些有關係嗎？」姿敏問。


    「當然有，屋子裡陰氣重，陰陽兩隔，人鬼殊途，氣場不同，一定會影響到主人，有的影響身體，有的會影響夫妻感情或事業。像你現在要開刀，如果身上不乾淨，開刀不會順利，或開了刀，又回到氣場不好的屋子裡居住，不久又會在別的地方長出腫瘤。」


    「吳先生，半年前你看到我寫的字，就說我左邊腰不對，如果那時候認識你就好了。」


    「那時候緣分還不到。」


    「是啊！何老師，那時候說這些事，妳也不會相信。」


    「這些古董家具又不是出土的陪葬物，怎會附有這麼多無形朋友？」


    「靈界朋友藏身的地方，不僅是古董，任何東西他們都能附身的。古董因為年代久了，經歷的人事也多，有的晦氣重些，會吸引氣場相近的來依附。」


    「那如果沒處理的話，我是不是要搬家，或是把這些家具扔了？」青鵠望著身邊一座高腳花架問道。


    「搬家，你怎麼知道他們不會跟著你們搬到新家？把這些家具扔了，萬一被別人撿去，不是害了人家嗎？就算把家具扔了，也不見扔得掉靈界的朋友，他們是來去自如的，你有沒有聽說過請神容易送神難這句話？」


    「聽過，只是沒想到這句話會應在我們身上。」


    「我三天前來的時候，就跟藏身在玉屏風裡的大姊大溝通過了，我問她，要怎麼做她才肯走？她要你們為她誦三天的《地藏王菩薩本願經》，她就願意走。那十八朵蓮花，是為其他十八位朋友準備的。」


    「那其他的十八位，也都願意一起走？」


    「大姊大點頭了，其他的她就一起帶走了。」


    蓮生和青鵠夫婦你看我，我看你的，覺得真是不可思議。


    「吳先生，請問你，為什麼那天我會忽然覺得胸口悶，喉嚨癢，咳得這麼厲害？好奇怪，我從來沒這樣過。」蓮生問。


    「那是因為有一陣晦氣衝進妳的身體，講得明白點，就是有靈界朋友上了你的身，妳本身的靈起來反抗，想要把它排擠出去。」


    「是不是那位大姊大嫌我多管閒事，在修理我啊？」蓮生又問。


    吳慕涵只是笑一笑，沒有說什麼。


    「啊！我想起來了，我看過一部電影，片名叫『綠色奇蹟』，是我的偶像湯姆·漢克斯主演的，片中那位有特異功能的黑人，能夠將別人身上的邪氣吸到自己體內，再排除掉，那生病的人立刻就痊癒了，好神奇喔！他從病人身上吸出來的邪氣都是黑色的，好像是邪靈耶！好恐怖喔！那位黑人若沒有把邪氣立刻從身上排除，他就會咳個不停，我是不是像他這樣？」蓮生興奮的再問。


    吳慕涵微笑著點點頭。


    「為什麼我們住在裡面，都沒什麼感覺呢？」


    「這些靈界朋友住在古董家具裡，但是屋子裡的氣場就不同了。有的人很敏感，一感受到不同氣場，立刻有反應；有的人比較遲鈍，不知不覺，但是在不好的氣場裡待久了身體就出狀況，看醫生都找不出病因，藥也吃不好。」


    青鵠和姿敏互相看一眼，沒想到自己都屬於不知不覺型。


    阿水嬸這時端來現榨的新鮮果汁，為客人和主人各倒上一杯，然後轉身就要離去。吳慕涵朝她微微一笑，要她走到他身邊來。


    阿水嬸看了主人一眼，姿敏做了請她過去的手勢，阿水嬸順從的走到吳先生跟前，吳先生要她在一旁的椅子坐下，打量著她，然後問道：


    「妳腰痛了半年了？」


    「對啊！看醫生、按摩、貼藥布、泡溫泉都沒用，尤其每天下午到晚上，痛得好厲害，晚上都睡不好，不停的做夢。」


    「受到不好氣場影響的人，早上時間陽氣旺，大多沒事，不過到了下午或晚上，陰氣重了，敵不過，就開始發作，各種痛都發出來了，不要怕，我幫你清一清。」


    這時阿水嬸雖然還坐在椅子上，但是吳先生其實已經將她整個人調到他跟前站著，然後朝只有他看得見，在場的其他人都看不見的虛空中點了一下，把不屬於阿水嬸身上的氣場排除，阿水嬸立即感覺到腰部一陣輕鬆，半年來的疼痛剎那間消除，她喜形於色，大喊：「奇蹟！奇蹟！」


    「阿水嬸的腰痛，並不是肉體的痛，是因為她的靈受到不好氣場影響，所以只要把不好的氣場排除，她的病就好了，這就叫靈療囉！那我也要試試！」蓮生興奮的伸出手。


    「妳又沒事，不必看了。」


    接著吳慕涵將青鵠和姿敏長期以來身上所累積的晦氣，一一加以解除。他解釋說，他們的屋子裡，古董所帶來的晦氣，使陽宅氣場出了問題，有些人知道自己家裡出事了，會'
  mdcn: '## 現代異次元——十則靈療的故事


    裱畫店的老闆是蓮生相熟的朋友，他趕緊過來幫她撿拾東西。這時店裡有一位鄰居吳慕涵，見狀也走過來幫忙。慕涵就住在蓮生的隔壁，幾乎天天都會見到面，也算是熟朋友了。


    蓮生把要裱的一疊字畫往台子上一擺，慕涵眼角掃過最上面的一張，忍不住走近前來看個究竟。


    「這是妳寫的？」


    「不是，是我的老師。」


    「幸好不是妳。」


    「怎麼啦！這字有什麼問題嗎？」


    「字本身沒問題，但是從這字體的力道上看，我覺得妳的老師左邊的腰好像不大對勁。」


    「真的！我一定會問問她。」


    慕涵是一位具有特異功能的奇人異士，一個人獨居在巷子裡的一間老房子裡，和鄰居相處和睦，附近的鄰居雖然覺得他有點神秘，但都很尊敬他。


    「今天裱那麼多字畫？」


    「要開師生聯展，這裡面的作品，有老師的，有我的，也有同學的。」


    從裱畫店出來，蓮生回到辦公室，她是電腦公司的系統工程師，為了調劑緊張的生活，也為了追求藝術，她拜姿敏為師，每週一次到她的書法教室上課。坐回電腦前，她開始忙碌，一直到下班前才忽然想起在裱畫店時吳慕涵說過的話，於是她撥了一通電話。


    「何老師，妳左邊腰會痛、會痠嗎？」


    「不會，怎麼啦？為什麼問起這事？」


    蓮生把在裱畫店遇見鄰居吳慕涵的事告訴姿敏，又聊了一些書畫展的事，就掛了電話。


    書畫展在社教館舉辦，熱熱鬧鬧的非常成功，各報的藝文版也都詳加報導。來參觀的人絡繹不絕，造成了一次小小的轟動。


    用手撫著左邊的腰，姿敏的面色凝重，她坐在畫室的翠玉屏風前正想站起來，又重重的跌坐回椅子上。這時電話響了起來，她勉強的起身，走過去接聽。是蓮生打來請假的，今晚有事不能來上書法課。姿敏告訴她，最近要停課兩個月。


    「何老師，為什麼要停課？妳怎麼啦？說話有氣沒力的。」蓮生問。


    「我前一陣子摸到肚子裡有一個腫塊，剛從醫院檢查回來，醫生說是卵巢長了個腫瘤，直徑十八公分，壓迫到輸尿管和腎臟，造成水腎了，一邊的腎臟都快完了。」


    「怎麼會這樣！十八公分耶！那是很大的一個腫瘤，妳怎麼都沒感覺？那現在怎麼辦？」蓮生一連串的發出問號。


    「要開刀，明天就要住院，後天手術，聽醫生的口氣，情況很緊急。」


    「是哪邊的卵巢？」


    「左邊。」


    「何老師，妳記不記得半年前，我的一位鄰居吳先生，在裱畫店看了妳寫的字，問我妳左邊的腰是不是有事？」蓮生忽然想起來。


    姿敏早就忘了，蓮生這一提，她立刻想起來，難道這位吳先生有未卜先知的能力？那麼說，她身上的腫瘤在半年前就已經存在了？她知道有一些高人能夠在書法字跡裡看出寫字的人氣旺或氣虛，甚至可以從字跡中，判斷出寫字的人的身體狀況、運勢。半年前當蓮生問她時，她太大意了，沒想到這麼多。


    「我真想去見見這位吳先生，他還住在妳家隔壁嗎？」


    「是啊！我天天都會遇見他。」


    「那就麻煩妳幫我約一下。」


    說不上為什麼，姿敏沒來由的想見見這位高人，是因為他的未卜先知？還是想從他那兒得到更多的資訊？或是期望吳先生可以為她指點迷津？總之，現在的她有點茫然，很難接受自己得了癌症的事實。


    姿敏頹喪的坐下來，一抬頭正好看見翠玉屏風上那位仕女正瞧著她笑，那笑容如此溫婉，如此貼慰人心，她忍不住伸出手去摸，一陣刺骨的冰涼從指間透進來，直穿腦門，嚇得她輕叫一聲。


    「什麼事？這麼緊張？」青鵠剛好走進畫室。


    「你摸摸這玉屏風，冰得會刺人，太不尋常了。」


    「不會吧！」青鵠說著把手貼在玉面上，那種宛如冰塊的冷冽，讓他立即把手縮回來。


    「真的！好奇怪！是很不尋常！」青鵠鐵青著臉拉著姿敏往後退了幾步。


    姿敏看青鵠嚇成那樣，不禁也緊緊捉住他的手臂。青鵠拉著她，兩人匆匆走出畫室，跑到大廳外的門廊下，坐在小桌前。這時候，西斜的夕陽，溫和的照著院子，扶疏的花木被夕陽染紅，顯現出一片沉靜。


    黃昏時分，院子裡一片靜謐，但是青鵠和姿敏的內心卻起伏不定。關於古董，尤其是出土的陪葬物，經常被無形的東西所附，這樣的傳聞，他們耳熟能詳，但對這種說法，總是半信半疑的一笑置之；難道，真有其事？而且竟然就發生在他們家？他想起半年前翠玉屏風運到家裡那天，家中正好有一位練氣功的朋友在；那位朋友說他感覺到屏風傳出來一股不尋常的陰涼之氣，但青鵠和姿敏毫無感覺，而且興奮之情也沖昏了他們的頭，哪裡還聽得進去。


    姿敏不知不覺又把手往左邊肚子上摸，這麼大的腫瘤，她竟然毫無知覺，也未免太粗心了，可能是因為這幾年她長胖了，給了腫瘤一個藏身的地方，讓她以為腹部鼓脹是自己發胖的關係。奇怪的是腫瘤這麼大，她卻毫無自覺症狀，所以壓根兒沒想到自己生病了。


    檢查的結果似乎並不樂觀，讓她憂心忡忡，幾乎要亂了方寸。此時，青鵠過來拉緊她的手，手心裡傳來與她共度難關的心意，她感激的把頭依偎在他肩上。


    幫忙做家事的阿水嬸正在廚房做晚餐，鍋鏟的鏗鏘聲，聽得分外清楚。這種家常的聲音，平時聽起來覺得有點吵，現在聽來卻顯得格外親切，令人安心。


    本來和朋友約了吃晚飯的蓮生，哪裡還有心情去赴飯局，下了班匆匆趕回家，剛把車停好，就見到吳慕涵出現在門口。


    「吳先生，你好，又要去公園散步了。」她立刻上前打招呼。


    「這是每天的例行公事。」


    她近來也常聽附近的鄰居提起吳慕涵，說他像一位活菩薩，來人間是有任務的；說他可以看到一般人看不到的東西，還說他為人靈療，把附在人身上的外靈超渡走，生病的人就忽然好了。這些久病不癒，看遍中西醫，吃遍各種偏方的人，就這樣不藥而癒，實在令人驚奇。前幾天，蓮生的母親還帶從高雄來的嬸嬸去給吳慕涵看，有二十多年偏頭痛的嬸嬸竟霍然而癒，真是奇蹟。原來嬸嬸是受不好氣場的影響，使她生病了，所以醫藥無法治療，也根本檢查不出來病因，其實，像嬸嬸這樣的人不知有多少！


    「吳先生，半年前你看過我書法老師寫的字，你問我她左邊的腰是不是有事，真的有事耶！她想來看你，可以嗎？」


    吳慕涵微笑的看著蓮生表情豐富的敘述著姿敏的病情，其實他早就忘了半年前說過的話。不過他還是好心的答應眼前這位熱心腸的鄰居女孩。


    因為情況緊急，所以蓮生約了當晚就見面，青鵠和姿敏趕緊開了車過來。慕涵看過青鵠夫婦後，認為問題出在他們住的房子，於是又立刻前往青鵠家中一探究竟。


    兩部車直接開進姿敏家院子，停好車，青鵠和姿敏站在家門口迎接客人，雖然面帶笑容，但可以看出他們眼神間所隱藏的憂愁。


    吳慕涵才走到門口，就停住腳步，往屋裡望了過去，露出沉重的表情。


    「這屋子有一股不小的晦氣。」


    青鵠夫婦和蓮生一聽，不知怎的全身都起了雞皮疙瘩。尤其是姿敏，她馬上聯想到，自己生病跟屋子裡晦氣重是否有關？青鵠也立刻將晦氣重與翠玉屏風出奇的冰冷聯想到一起。難道會是這件古董家具出了問題？屏風裡的妙齡仕女，近來更顯得活靈活現，就像要從畫裡走出來似的，青鵠就覺得有點蹊蹺。


    進得門來，平日安安靜靜的屋子，似乎刮起一陣陰風，連青鵠夫婦都隱約感覺得到。他們感到不可思議，為何平時他們都不知不覺呢？直到現在生病了才有所感覺。


    蓮生平時進出姿敏家，也沒有任何不對勁的感覺，可是今天一走進門，就感到一陣涼氣直撲而來，是因為她帶進來了一位能通陰陽兩界的高人？所以潛藏在屋內的靈界朋友，都在屋裡騷動起來了嗎？才這樣想著，喉嚨裡忽然一陣刺癢，她忍不住咳了起來。這一咳，還非同小可，咳得她昏天黑地，人都幾乎站不住；咳得臉紅脖子粗，好像被掐住脖子，透不過氣來似的。


    吳慕涵見狀，走過來在她背上用力一拍，說也奇怪，蓮生立即停止了咳嗽。只見她漲得通紅的臉上，眼淚都咳出來了。


    青鵠夫婦看得目瞪口呆，嚇得站在一邊，不知如何是好？不過吳慕涵這一出手，他們已經看出他不是一位普通人，一定有辦法可以幫他們的。


    「你們家，有很多古董嗎？」吳先生站在客廳中央，他神色專注，凝神向四周望去。


    雖然他不動聲色，但是可以從他的語氣和眼神中看出他已經找到原因。


    「我喜歡古董家具⋯⋯。」青鵠回答。


    「你帶我看看這些古董。」吳慕涵說。


    青鵠率先走在前面，開始帶吳慕涵參觀家中的古董。


    他們在屋裡走著，一件件的看。屋中的古董總共有十九件，有書桌、五斗櫃、洗臉架、書櫃、床、梳妝台、花架⋯⋯等家具，也有花瓶、玉雕獅子、筆架等小件古董，還有畫室裡的翠玉屏風。


    在屋子裡轉了一圈，吳慕涵搖搖頭說：


    「如果你們相信我，就先不要問問題，照著我說的做，你們願意嗎？」


    「當然願意，我們相信你。」


    「好，那你們請人來誦三天的《地藏王菩薩本願經》，準備十八朵紙摺的蓮花，每天燒六朵，另外再準備一些鮮花素果祭拜，三天後我再來。」


    「明天我們就請人來誦經。」青鵠二話不說的就決定照吳慕涵吩咐的做。


    「明天要住院開刀的事，我先請假，另外再安排時間。」姿敏也算計著。


    吳慕涵把話說完，立刻起身走了出去。蓮生跟青鵠和姿敏揮揮手，說聲再見，也急忙跟著出去。


    他們上了蓮生的車，車子開上了高架橋。


    「你們書法老師的家，應該白天來比較好處理。」吳慕涵說。


    「為什麼？」蓮生疑惑的問。


    「裡面晦氣很重，現在是晚上，正是靈界朋友最活躍的時間，硬碰硬，可辛苦了。」


    「裡面情況很糟嗎？」


    「我在你們老師家不敢明講，怕嚇壞他們夫婦。那間屋子裡的十九件古董，每一件都住了一位靈界朋友，尤其是翠玉屏風裡那一位，雖然是一位女的，到他們家的時間也最短，但是力量最大。那位大姊大，名叫宋珮瑛，怨氣很重，有點頑固，我花了很大的工夫才跟她溝通好。」


    「有沒有傷到你啊？」


    「還好吧！」吳慕涵說著靠向椅背，閉上眼睛休息，一副疲累已極的模樣。


    蓮生把車開上路，不時轉頭去看吳慕涵，她不敢說話，也不敢打開音響，怕吵到他。


    小時候看多了神怪電影的她，想像著剛才在姿敏家時，吳慕涵跟靈界的朋友在鬥法的情形，會不會像電影或電視裡面的特技鏡頭一樣，互相扔出法寶在空中交戰，最後靈界的朋友鬥輸了，終於同意和談。只是這些精采鏡頭，她這位凡人的肉眼看不到。蓮生又想到，吳慕涵連那位靈界大姊大的名字都知道，實在是太神奇了。


    蓮生對身邊這位奇人，真是非常好奇，但又不便多問，只好專心開車。


    三天後，蓮生又陪吳慕涵來到姿敏家。青鵠和姿敏已經請人來家裡誦了三天的《地藏王菩薩本願經》。


    吳慕涵一進門，就感覺不一樣了，屋子裡陰氣雖然仍未完全散去，但已不是第一次來時的劍拔弩張。他看到藏身在玉屏風裡的宋珮瑛，不論神情和臉色都變溫馴了。她必恭必敬的站在玉屏風前，十八位聽命於她的夥伴們在她身後一字排開。


    吳慕涵一時之間，彷彿入定一般，不發一語，他開始用意念和宋珮瑛溝通。


    「妳要求的，這家人都已經做到，妳不該再留戀人間，而且冤有頭債有主，李青鵠夫婦和妳沒什麼關係，妳應該早點離去，不要在他們家遊蕩，還他們的安寧。」


    宋珮瑛淚流滿面的跪下來，她身後的夥伴們也隨她一起跪下。


    「吳先生，我代表大家請求您，希望讓我們在投胎轉世之後，可以順利找到前世的仇人。」


    「這我不能作主，只能看你們個人的緣分，天理昭彰，不是不報，時候未到。」


    「謝謝吳先生指點。」


    「不過，我還是要勸妳，冤家宜解不宜結，冤冤相報何時了，一心想要報仇，心中無法平靜，投胎轉世之後日子不會好過，能夠忘了冤仇，擺脫桎梏，才能在來世得到解脫，也才能有幸福快樂的日子。」


    「謝謝吳先生的金玉良言，也謝謝吳先生超渡我們。我們已經準備好要走了。」


    吳先生點點頭，對他們一揮手，宋珮瑛等十九位無形界朋友，就被他渡走了。


    蓮生和青鵠夫婦見吳慕涵在入定狀態，都不敢驚擾他。這時忽然見他一揮手，接著就回過神來，朝大家一笑說：


    「十九位，全部渡走了。」


    青鵠夫婦莫名奇妙看著他，聽不懂他的話。


    「你總共有十九件古董，都住滿了靈界的朋友，其中佔住翠玉屏風的那位，是其中的大姊大，清朝人，名叫宋珮瑛，她是被人推落井裡枉死的，怨氣很重，可以說是厲鬼，其他十八位都要聽她的⋯⋯。」


    吳慕涵的話，聽得青鵠夫婦和蓮生毛骨悚然。


    「我知道若三天前告訴你們，你們會害怕，說不定連自己家都不敢住，所以我今天才講，現在你們可以安心，他們全都走了。」


    「他們為什麼都跑到我們家來？」青鵠問。


    「你們最早買的是不是房間那張古董床？」


    「是，沒錯。」


    「那床上躺著一位被人用毒藥害死的女人，屋子裡有了陰氣，自然而然就吸引過往的孤魂野鬼進來，呼朋引伴的住在一起。」


    「我身上長腫瘤，跟這些有關係嗎？」姿敏問。


    「當然有，屋子裡陰氣重，陰陽兩隔，人鬼殊途，氣場不同，一定會影響到主人，有的影響身體，有的會影響夫妻感情或事業。像你現在要開刀，如果身上不乾淨，開刀不會順利，或開了刀，又回到氣場不好的屋子裡居住，不久又會在別的地方長出腫瘤。」


    「吳先生，半年前你看到我寫的字，就說我左邊腰不對，如果那時候認識你就好了。」


    「那時候緣分還不到。」


    「是啊！何老師，那時候說這些事，妳也不會相信。」


    「這些古董家具又不是出土的陪葬物，怎會附有這麼多無形朋友？」


    「靈界朋友藏身的地方，不僅是古董，任何東西他們都能附身的。古董因為年代久了，經歷的人事也多，有的晦氣重些，會吸引氣場相近的來依附。」


    「那如果沒處理的話，我是不是要搬家，或是把這些家具扔了？」青鵠望著身邊一座高腳花架問道。


    「搬家，你怎麼知道他們不會跟著你們搬到新家？把這些家具扔了，萬一被別人撿去，不是害了人家嗎？就算把家具扔了，也不見扔得掉靈界的朋友，他們是來去自如的，你有沒有聽說過請神容易送神難這句話？」


    「聽過，只是沒想到這句話會應在我們身上。」


