- md: '減姿色，依然美艷如昔。女人，在男人心目中，是不是經常連一朵花都不如？


    「小嫻，你看，那不是你以前的男朋友嗎？」麗珍拉了她一下。


    小嫻順著她手指著的方向望去，只見一群人在導遊的帶領下朝她這邊走來。導遊身邊的那位男人，正是秉康。


    世界怎麼這麼小？心裡正想著秉康的無情無義，他就在這節骨眼上出現。太意外了。


    「小嫻⋯⋯」秉康也發現了她，雖然顯得有點猶豫，但是四目交接，同時認出了對方，招呼又不能不打，只好走過來。


    「來觀光？」小嫻大方的問他。


    「對，跟團來的。好久不見，妳都好嗎？」


    「我很好，來出差。」


    「妳跟以前不一樣了。」


    「是嗎？」小嫻淡淡的回答。


    面對秉康，她還是覺得傷口未癒。但是秉康審視她，目光卻是一種竊喜，他已經發現她走路不再跛，而且比以前出落得更標緻。


    「我脫隊，我們找個地方吃飯，喝咖啡，好好聚一聚。」秉康提議。


    「對不起，我跟同事一起，中午還有事要辦，謝謝你。」


    秉康沒想到小嫻一口就拒絕了，很覺得面子上掛不住。


    「小嫻，時間到了，車子在等我們了。」麗珍故意大聲說。


    「那這樣好了，回台灣我們再聯絡。」秉康立刻接口說，然後跑回去歸隊。


    「妳還給他找台階下。」小嫻朝麗珍一笑。


    「好聚好散，不必讓他太難堪。」


    「我也這麼想，這種無情無義的男人，分手後還要當朋友，實在叫人為難。」


    「那以後就別理他了，失去妳，是他這一生最重大的損失，說真的。」


    小嫻和麗珍在浪漫的櫻花樹下繼續散步，把秉康丟在腦後。


    回到台灣，第二個星期，小嫻、翠玲又應莉莉之邀，到東勢林場一遊，同來的貴賓還有吳慕涵。


    這次活動是李建坤公司的員工春季旅遊，身爲老闆的他，最近心情特別愉快，因為他的太太莉莉懷孕了。


    上次請吳慕涵到家裡看過，建議他移動音響，他說什麼也不願意，拖了半年後，他終於想通，願意妥協，將音響移到吳慕涵指定的位置。不過，他仍然不相信這對太太受孕會有絲毫幫助，只是他也沒有其他方法可想，又熬不過母親的嘮叨，最後在母親一句話的感召下，他終於答應搬了。那是由於有一天李老太太對他說：


    「把音響換個位置擺，還是在你房間裡，你又沒什麼損失，就算爲我這個抱孫心切的老太婆搬的，都做不到嗎？」


    「沒想到，搬了音響之後三個月，莉莉真的懷孕了。建坤不再鐵齒，現在他完全相信吳慕涵說的：「環境氣場對人體有潛在的殺傷力。」這句話。


    五月的東勢林場，油桐花飄落一地，猶如一片皚皚白雪。


    清晨，小嫻和翠玲步出小木屋，走在花間小徑上，不經意的一抬頭，只見迎面跑過來一個熟悉的身影，定睛一看，竟又是秉康。


    世界未免太小了，竟在此狹路相逢。


    「早啊！沒想到在這裡會遇見妳。」秉康先開了口。


    「早！你怎麼也來？」


    「我們公司借這兒開兩天的研討會，昨晚就住進來了。從日本回來後，我一直跟妳聯絡，妳好像都在上課很忙。」


    「我最近事情多，請你不要再打電話給我，等我忙完了，我會打給你，好嗎？」小嫻和顏悅色的說。


    「那我等妳電話。」秉康深情的望了一眼小嫻，似乎覺得滿懷希望，高興的繼續他的晨跑。


    聽著他的腳步聲漸去漸遠，小徑上回復了寧靜。林鳥的鳴叫聲此起彼落，露珠兒在飛鳥的振翅中紛紛墮落，樹林中像灑落無數的碎鑽般的閃閃發光。


    小嫻和翠玲都沒講話，誰也不想破壞眼前的寧靜氣氛。


    左邊的岔路上出現一對手牽手散步的影子，走近了才發現是莉莉夫妻倆。懷孕三個月的莉莉，身材還沒走樣，只是體態稍見豐盈，臉上蕩漾著幸福的笑意。


    「小嫻，我剛才看見胡秉康耶！」莉莉說道。


    「剛剛小嫻還說忙過這一陣子，要打電話給他。」翠玲試探著說。


    「是真的嗎？」建坤懷疑的問。


    「你們想，我會打這通電話嗎？」


    「不會！」翠玲、莉莉和建坤異口同聲的說。


    「還是你們最了解我！」小嫻愉快的笑了。


    從日本回來以後，這幾位好友第一次看到小嫻笑得這麼燦爛。'
