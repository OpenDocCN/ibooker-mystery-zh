    # 翠玉屏風


    一陣風來，簷前的風鈴，發出叮叮噹噹的清脆聲音，聽起來分外悅耳。


    青鵠舒服的半卧在門廊躺椅上，獨自喝著下午茶。香醇的咖啡和精緻的小點心，溶化在嘴裡，帶給他一種極爲幸福的感覺。他瞇著眼睛，眼角眉梢都帶著笑意。


    那種幸福和滿足，當然不完全來自於咖啡和點心，而是前些天家裡又添了一件古董——一座古色古香的翠玉屏風。


