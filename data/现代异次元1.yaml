  md: '儘管不信邪,但謝醫師並不是很鐵齒的人,他學生時代喜歡讀四書,對孔孟思想很著迷,對儒家更是敬佩。對「敬鬼神而遠之」這句話,他印象深刻。他想這麼有道德和學問的聖人,都說對鬼和神要敬而遠之,表示相信有鬼神的存在,只是認爲鬼神跟人存在於不同的世界裡,本來就不相往來,各過各的,所以凡間的人應當對肉眼看不見的虛空界衆生,敬而遠之。


    但是,這種長久的平衡,在這三個多星期來,爲什麼忽然被打破?互相尊重、互不干擾和保持距離既然已經不可能,謝醫師心裡知道他必須有所行動,想辦法化解這一場突然其來的災難。


    診所裡鬧鬼,這事非同小可,不但要趕快解決,還得暗地裡進行。爲了不讓人認爲他迷信,也爲了維護自己身爲醫師的專業形象,他不能公然請地理風水師、道士或乩童來診所做法。他知道好事不出門,壞事傳千里,事情一旦公開,一傳十,十傳百,對診所的名聲也有影響。


