    同事們你一句，我一句的，句句都聽在黃總經理耳朵裡，他心中自然非常難過。他一向愛護君儀，不但因為君儀和他的女兒是大學時最要好的同學，也因爲君儀是他重要的左手，發生了這種事，是他所不樂見的。在他的職權範圍內，他盡量的維護著她，有什麼事都替她先擋著，她的工作也暫時先交給另一位副理頂著。私下，他也請相當疼愛君儀的妻子帶她去看精神科，可是病情並沒有好轉。


    黃總經理實在無法可想，最後只有通知君儀住在鄉下的父母親，把詳細情形向他們報告，並為她辦理三個月的留職停薪，讓她回家去修養。


    請了長假，回到中部的家，君儀又開始向左鄰右舍、親戚朋友甚至路人宣揚佛法，弄得街坊鄰居啼笑皆非。李媽媽更是不知所措，她不知道這個乖巧的女兒怎麼忽然變了一個人，看君儀天天都像演戲一樣的好像過著別人的生活，她真是心疼，又不知道該拿她怎麼辦。


    「君儀呀！我的乖孩子，妳到底是怎麼啦！妳告訴媽啊！」李媽媽心急了，有時會忍不住捉住女兒的肩膀搖著她。


    「我是蘋兒，你這老媽子，怎麼這樣搖我，都快把我搖散了，你快住手吧！」君儀邊說著邊捉住媽媽的手，輕輕放下。


    李媽媽急得天天以淚洗面，君儀還會拿條手帕幫她擦眼淚。


    「妳怎麼又掉淚了，沒事兒的，看，眼睛都哭紅了，真是的。」


    君儀時而迷糊，時而清醒，清醒時，媽媽把她迷糊時發生的事告訴她，她可一點也記得。不過留職停薪已是事實，可見她病得不輕，所以清醒時看見媽媽哭，母女倆就抱頭痛哭。


    君儀的爸爸向來重男輕女，心目中只有事業成功的兒子和媳婦，對女兒不是那麼看重，又認為女兒是替別人家養的，遲早是別人家的人，所以希望她早些兒嫁人，偏偏君儀是個獨身主義者，根本就不想受婚姻的束縛，每次有熱心的親戚朋友要給她介紹男朋友，她總是推三阻四的回絕，幾次以後，爸爸非常生氣，父女倆為此還吵過幾次。這次君儀生病回家，得的又是這種莫名其妙的病，爸爸覺得很丟臉。面對街坊鄰居異樣的眼光，愛面子的爸爸，頭都不知該往那裡擺，因此他一直主張把她送進精神病院，讓她長期住在那兒，有專人照顧也省點事。媽媽哪裡肯依，夫妻倆天天為這事兒吵架。


    李媽媽一面求神問卜，一面不辭辛勞的帶女兒到廟裡去收驚，但是沒什麼效果，還進城到大醫院去看精神科，醫生實在也診斷不出病因，只說是工作壓力太大，要她休個長假；也有醫生診斷說可能是人格分裂症，但還要觀察。李媽媽對醫生的說法很不滿意，但沒有其他好方法，在求救無門之下，只能吃精神科醫生開的藥。藥一包包的吃下肚，君儀安靜了，不再天天跑到鄰居家去宣揚佛法，但卻像個遊魂似的在家中走來走去。她眼神散渙，人也變呆了，常一個人痴痴的笑著。


    蘋兒又在那兒「叩！叩！叩……」的敲著木魚，一邊低聲的念著《妙法蓮華經》中的《觀世音菩薩普門品》。


    三更半夜的，李媽媽被「叩！叩！叩！叩……」的聲音吵醒，又是從女兒房間傳來的。她睜著惺忪的睡眼，披了一件睡袍起身查看。


    打開女兒的房間門，李媽媽看見君儀跪在床前，拿著一根小木棍，有節奏的、不輕不重的敲打著床沿，口中念念有詞的。


    「君儀，現在都夜裡一點多了，別再念經了，明天白天再念，快，上床睡覺去。」


    「誰是君儀來著？說過多少遍了，我是蘋兒，妳這位老媽子，記性還真是不好！」


    「蘋兒就蘋兒吧！」李媽媽無可奈何的回應著。


    「妳知道的，白天我精神不好，總是昏昏沉沉的，夜裡精神可來了。」


    「可夜裡是睡覺時間啊！上床睡覺才是正事。」


    「我才醒來，剛剛我躺在床上，都睡著了，觀世音菩薩來到我床前，親了一下我的臉頰，我就醒過來了，祂要我起來念經。」


    「妳是在做夢吧！觀世音菩薩怎麼不來親我，只親妳一個人呀？」


    「我跟菩薩有緣，菩薩喜歡我，祂說我修得好，所以來給我加持，將來還要渡我升天的。妳又不信佛，菩薩當然不親妳。」


    「菩薩不是普渡眾生的嗎？祂也會渡我的。」


    「佛渡有緣人，不信的人，祂們想渡都渡不了的。」


    「妳說的倒也有理，我不跟你爭，只是現在半夜了，我和老爺子都要睡覺了，你又唸經又敲木魚的，可吵著呢！叫人家怎麼睡？」


    「那我小聲點好了。」


    李媽媽無奈的回自己房間，果然君儀敲木魚和念經的聲音都小了。但是，李媽媽卻睡不著了，睜著眼睛一直到天亮，眼淚都溼了枕頭。躺在身邊的老伴，也翻來覆去的，直到天濛濛亮時，才傳來均勻的鼾聲。


    當黃總經理透過朋友的兒子，請到一位具有特異功能的奇人異士吳慕涵時，君儀發病已經三個月了。


    君儀在公司請的長假期限快到了，若病情沒有好轉，無法回去上班的話，她就必須辭去工作，黃總經理想再為她續假的可能也不大，所以他也很著急，每個禮拜都會和妻子來探望君儀，看看她情況如何？有一次遠嫁美國的女兒梅香回國來，也和他們一起去看過君儀。那天君儀正和蘋兒扯不清，所以連老同學都不認識了。梅香見到自己的好朋友變成這模樣，背著李媽媽偷偷的拭淚。


    能夠請到吳慕涵，實在也是個難得的機緣。有一天黃總經理和朋友一起吃飯，席中這位身為醫生的朋友，提起自己的兒媳婦患了腦瘤，做過各種檢查都確定無誤之後，已經住進病房，也安排好動手術的時間，但是在開刀的前一天，兒子堅持妻子向醫院請兩小時外出假，帶她去給認識的一位異人看。經他看過之後，再回醫院去檢查，重做核磁共振，找不到腫瘤，再做電腦斷層，還是不見腫瘤的蹤影，腦袋裡直徑十公分的腫瘤就這樣平空消失，真是跌破醫生眼鏡，醫院裡的醫生和護士都覺得不可思議，既然腫瘤不見了，只好取消手術，辦理出院。


    「你媳婦的頭部到底有沒有長瘤呢？」黃總經理好奇的問。


    「真的有，我自己是醫生，這種事怎麼能開玩笑。我媳婦到醫院去檢查還是我安排的，兩家都是大型的教學醫院，腦瘤開刀非同小可，至少要經過兩家醫院證實，才能真正確定。」


    「既然腫瘤是真有。又怎會平空消失呢？」


    「那位有特異功能的吳先生說，人有三身，分別是法身、應身、報身。法身就是我們生生不息的靈體，應身是因緣際會輪迴轉世的這個身體，報身是因果業障受報而來的，因果業障是前世留下來的原罪，會報在應身上，讓應身來承受，所以才叫報應。這三身合而為一，組成一個有靈魂和肉體的人。我媳婦兒的腦瘤是長在靈體上的，醫學檢查雖然查出有個實體的腫瘤存在，但這個病灶是依附在靈體上的假象，因此不是真的，但是手術還是可以割出腫瘤。這事說起來很玄，不該是我這個資歷這麼深的醫生該說的話，你大概也聽糊塗了。」


    「我可是聽得興趣盎然，希望你把知道的多說點，我也好增廣見識。」黃總經理很誠懇的說。


    「咱們是幾十年的老朋友了，我當然有話就說。」


    「那我請問你，這位吳先生有沒有說你兒媳婦的腦瘤是怎麼來，又怎麼去的？」


    「我們是病家，自然會問起這事。這位吳先生可真厲害，他直接就開口問我兒媳婦三年前是不是曾經出國，去了哪裡？我兒媳婦想了一想，回憶起來三年前曾經陪我兒子到東歐，白天我兒子去接洽商務，她一個人就參加當地的遊覽，去參觀了二次大戰時納粹的集中營。那個集中營曾經以生化毒氣處決了幾十萬的猶太人。我兒媳婦一走進那裡，人就覺得不舒服，胸口悶的緊，她本來就經常會頭痛，這以後每天下午開始，她就胸口悶，頭也痛得要裂開似的，怎麼檢查也查不出原因，她幾乎每兩三個小時就要吃一次止痛藥，否則無法過日子的。胸口悶和頭痛這兩個症狀，折磨了她三年。」


    「你兒媳婦的病跟去集中營有關係嗎？」


    「那集中營可不是什麼好地方，這麼多冤死的人，有很多陰魂不散，還在那兒遊蕩，氣弱的人到了那裡，容易受影響，有的還會被附身呢！我兒媳婦身上就帶回一個猶太男人，寄住在她頭部，難怪她頭痛，身上有東西使她胸悶。」


    「我請問你，如果你兒媳婦沒遇見吳先生，她進了手術房開刀取出腫瘤的話，那猶太男人的靈會到哪裡去？」


    「哪裡也不去，他會躲到別的器官，不久以後，別的器官又長瘤，醫生會認爲是癌細胞轉移，病人也是這樣認爲。」


    「吳先生是怎麼處理的？」


    「他把猶太人的靈渡走了，腫瘤就消失了。」


    「真是神奇！太不可思議了！老友，不瞞你說，我之所以會問得這麼清楚，是因為我手下有一位副理，就像我女兒一樣，她三個多月以前出事了，忽然瘋瘋癲癲的，醫生認爲是精神上的疾病，我看她的情況就像是被外靈附身，不知道方不方便請吳先生去看看她？」


    「那有什麼問題，我讓小犬跟你聯絡，先介紹你認識吳先生。」


    黃總經理領著吳慕涵來到位於中部鄉下的李家時，親戚朋友和鄰居圍了一屋子。


    吳慕涵的出現，引起一陣騷動。他穿一件白色圓領長袖T恤，留一頭長髮，很像一位藝術創作者。來到李家的人，有的是真心關懷君儀的，有的是來看門道的，有的是來看熱鬧的。


    四周圍的人心裡在想些什麼，吳慕涵從空氣的波動中就得到了訊息。這一堆好奇的人，想的不外是：


    - 「這個人會不會是個騙子?」

    - 「請這種不明來歷的人來，能做什麼?太迷信了吧!」

    - 「看這一副德性，八成是來騙財的江湖術士。」


    吳慕涵那幾分冷峻，幾分銳利又帶幾分慈悲的眼神，橫掃在場的人一眼，那一眼裡他已經看出哪一些是相信的，哪一些是不信的。


    「把你的右手伸出來。」吳慕涵對君儀說。


    今天的君儀，是原來的君儀，她乖乖的伸出右手。她的手和腳這兩個多月來，一直都是冰冰涼涼的。


    吳慕涵伸出他那細長而又骨節分明的手，用手指在君儀的手掌上又點又按的。


    「是用氣功治療嗎？」

    「是在點穴吧？」

    「他點的是不是手掌上的人體反射區？」

    「都不像！沒見過這樣幫人看病的。」


    人群裡傳來嗡嗡嗡的討論聲，吳先生一臉嚴肅，兩眼既不看君儀，也不看她的手，反而凝神注視著茶几上的玻璃。她感覺君儀如凝脂般的冰冷小手，微微的出汗，汗水也是冰涼的。


    吳先生凝視前方，彷彿入定一般，專注的在感應著君儀手上傳來的信息。他看到一位穿著素白長衫的女子，正在敲打木魚，並認真的誦經。


    「我喜歡待在李君儀身上，你別多管閒事。」那女子轉身望著吳慕涵說。


    「你跟李君儀有什麼前世的宿業嗎？為什麼要待在她身上？」


    「沒有，我和她沒什麼關係的。」


    「那你應該離開，不能佔用她的身體。」


    「我喜歡她，她去醫院看病時，我一眼見到她就喜歡。你看見沒，她手指頭上戴了一個小小的鑽石戒子，讓人以爲她訂親了，其實是想擋掉男人的追求，這女孩很純淨，是個獨身主義的人，對修行很有幫助，我會要她去皈依佛門，跟我一起修。」


    「你這樣做是不對的，你生前是個修行人，有些根基了，佔用別人的身體，強迫人跟她一起修，這樣是修不成的，這人不是自願的，況且陰陽兩隔，沒有用的。」


    「是這樣的嗎？我怎麼沒想到，多虧你提醒我。不！你是騙我的吧！想騙我離開，沒那麼容易，我偏不走。」


    「我絕不是在騙妳，你想想，你在李君儀身上已經好幾個月了，修行上有沒有長進啊？」


    「咦？好像真的沒長進。」白衣女子想了一想說。


    「妳佔用了李君儀的身體，爲難了她，也毀了她，還弄得這一家人雞犬不寧，有違妳修行人的慈悲。這樣好了，我可以渡妳。」


    「你想渡我？我可是修得不錯的，你要渡我到哪兒去？」


    「妳想到哪兒去？」吳慕涵反問她。


    女子沉吟了好一會兒，似乎考慮了又考慮，覺得這是個大好機會，於是她試著要求：


    「你要是能作主，渡我到二地菩薩的階位，我就走。」


    這下換吳慕涵考慮了。他心想這白衣女子，自以為修得很好，其實修得不正道，不是真正佛門中人。無明又使她起了貪念，在陽間佔用無辜人的身體修煉；只是她心地善良，沒有害人之心。他思索了一會兒，決定渡她到二地菩薩的階位，若她的道行夠，就坐得住，否則自然會往下落，所以答應她無妨。


    「好，我可以作主渡妳到二地，妳好自為之。」


    吳慕涵以意念與白衣女子做了最後的溝通之後，即刻出定，他的喉嚨裡忽然發出一聲巨大的「嗝」聲，把在場的人都嚇了一跳。


    隨著那巨大的嗝聲，君儀那悶得緊緊的，呼吸都覺困難的胸口，忽然間開了；那種喉嚨口刺癢，隨時想咳嗽的感覺消失了，冰冷的手也漸漸回暖，她整個人一下子輕鬆了起來。


    「好了，李小姐，妳沒事了。」


    「這樣就好了嗎？」李媽媽懷疑的問。


    在場的人也多持懷疑的態度，他們前來原來是準備見識一場法會或是法術，但是吳慕涵好像什麼也沒做，只是摸摸君儀的手，似乎有點令他們失望。


    「這樣就好了。」吳慕涵肯定的說。


    「吳先生，請問你，君儀生的是什麼病？」


    「她的病已經好了，這是最重要的，是嗎？」


    「是的。」好幾個人同聲回答。


    吳慕涵並不想回答任何問題，虛空界的許多事也不是人間該知道的。即使說了，世俗中也無法盡信，還有那不信的人會以爲他在裝神弄鬼，所以不說也罷。


    吳慕涵站起來，朝門口走去，黃總經理緊跟了出去。君儀和李媽媽隨後也追了出去，母女倆撲通一聲在吳慕涵跟前跪下道謝。吳慕涵趕緊上前一步扶起她們。


    「別這樣，我擔當不起。」


    「大恩不言謝！」君儀用清澈的眼神感激的望著吳慕涵。


    「多多保重。」


    吳慕涵就在一群人的目送下，坐上黃總經理的車走了。


    除了君儀之外，在場的親友都很難相信她已經痊癒了。


    一星期之後，君儀銷假上班了。


    「格！格！格！」的高跟鞋聲又在辦公室響起。


    君儀恢復正常了，在辦公室宣揚佛法的日子，像一場夢般的過去了。那夢，奇蹟似的來，又奇蹟似的走；但夢醒時刻，似乎留下了些什麼，並不是毫無痕跡。


    大家都覺得君儀跟以前不一樣了，她的美依舊那樣吸引人，只是那種美，總覺得帶著冷艷，像皚皚白雪中開放的一枝紅梅，冰清玉潔又冷艷凝香。


    君儀，依舊是辦公室的焦點人物，人們的話題總是喜歡圍繞著她打轉。但是，不論人們說什麼，君儀還是君儀，她一點也不在乎。因為那既不能增她一分，也不能減她一分，反而使她愈顯冷艷，更像雪地裡那枝紅梅。


    ## 翠玉屏風


    一陣風來，簷前的風鈴，發出叮叮噹噹的清脆聲音，聽起來分外悅耳。


    青鵠舒服的半卧在門廊躺椅上，獨自喝著下午茶。香醇的咖啡和精緻的小點心，溶化在嘴裡，帶給他一種極爲幸福的感覺。他瞇著眼睛，眼角眉梢都帶著笑意。


    那種幸福和滿足，當然不完全來自於咖啡和點心，而是前些天家裡又添了一件古董——一座古色古香的翠玉屏風。


    想起這座屏風，青鵠就忍不住端著咖啡走進畫室，站在屏風面前仔細欣賞。只見這座用紫壇木雕刻而成的屏風，中間鑲嵌了一塊方形翠玉。這塊翠玉上更是精工雕鑿了一位丰姿綽約的古裝仕女。這位二八年華的美女，手上拿著一把扇子，在牡丹花叢中追逐著蝴蝶；她纖細的身子，細嫩的小手，柔美的姿態真是撩人。


    青鵠越看越喜歡，他用手輕輕觸摸著涼冷的玉，感受玉石細緻滑潤的紋理，也欣賞著仕女畫像的藝術美感。


    這座屏風真是得來不易，能擁有它，他才會這麼滿足。那是去年他應邀到北京開畫展時，在一位收藏家那裡看到的。他只看一眼，立刻就愛上了，但是主人不肯割愛，他回到台灣後，透過朋友一次又一次的向那位收藏家遊說，終於說服他。上星期才千里迢迢的運到，他即刻把屏風安置在畫室最顯眼的位置，一進門就可以看到。


