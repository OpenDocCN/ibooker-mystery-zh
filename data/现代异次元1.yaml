    事情開始有轉機是在兩個多月前，有一天，小嫻參加同事的婚宴。坐在小嫻身邊的映雪，一直絮絮叨叨跟她說著話，剛開始小嫻並沒有很注意聽，心中還覺得有點煩，嘴裡有一句沒一句的應和著。後來映雪提到她媽媽的失眠，二十幾年來看遍了中西醫，吃盡了各種偏方都好不了，上個月親戚介紹一位高人，她媽只看了一次，到現在一個多月了，每天晚上都很好睡，連安眠藥都丟掉了。


    「那位高人開了什麼藥給你媽吃？」小嫻很有興趣的問道。


    「什麼藥也沒開，他又不是醫生。」


