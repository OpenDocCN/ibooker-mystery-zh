    # 自序：當靈魂受傷時


    修行、修道或靈修，已經成為現代人的一種時髦追求。


    想要追求靈性成長的，可以分為好幾種。有些人是生活到了一個水準之後，想要彌補心中失去的那個區域，因此走上修行路；有些人天生就比較有靈性，也喜歡接觸跟靈或宗教相關的事物；有些人一心想要提昇自己，讓心靈有所皈依；也有些人是因為身邊有想要修行的朋友，所以也一起參與，尋求一種認同。


    修行要修什麼？從字面上來看，修行就是修正自己的行為，如何修正呢？當然是必須放下一些染污我們靈魂的事物，才能增長靈性，讓蓋住靈性光芒的障礙，一層層的剝除。


    東方人所說的修行，或許並不完全等同於西方人所謂的靈修，不過追求靈性成長的用


    心相信是一樣的。修行的人要將生活和觀念擺在佛陀教導我們的八正道，或是儒家所教導'
  - '[PAGE 18]


    我們的四維八德，以及靜、定、安、慮、得上，而且能確實做到，讓行住坐臥等日常生活、思想、待人接物、言語、態度都合乎中庸之道，就是一個好的修行者。靈修也是一樣，不論是大師、指導者、成長課程，都是在教人如何調攝其心，提昇靈魂的層次。


    更加精進的修行，是能夠讓靈魂清淨無染。很多修行者會遇到的問題，是在修行時總是障礙重重，這些障礙有身體上的、心靈上的；因此，他們尋尋覓覓，一年一年，總尋不到個出口，心越修越不安，身體也越修越不好。離身心安適似乎越來越遠。


    為什麼會這樣呢？是機緣未到？是走錯路？是繞了遠路？還是迷路？原因可能是沒能遇見真正的善知識，所以總是在修行路上徘徊；或跟錯了導師，讓自己暴露在不好氣場之中，而不知不覺，甚至不進反退。但是，自己深層的自性其實不斷的在排斥，在抗拒，想要去除這些干擾，因此，感覺比較敏銳的人，就經常會覺得心中不夠踏實，或者身體不適，甚至愈來愈沒自信，有人甚至開始懷疑起自己該不該走上這條路。


    修行的最終目的，如果是為了讓靈魂提昇，讓自己更清楚明白的話，那麼應該在一個正確的基礎上起步，也就是靈魂必須是完整的，因為當一個人的靈魂不完整時，只會越修越糟。


    ◇現代異次元——十則靈療的故事16'
- md: '## 靈魂就是靈魂，有完整和不完整之分嗎？


    靈魂就是靈魂，有完整和不完整之分嗎？當然有，不完整的靈魂就是受傷的靈魂、衰弱的靈魂；當你越想像行時，障礙就會越多；不安、驚疑、恐懼、迷惑，被無明佔據和侵蝕的靈魂，如何能無所罣礙呢？


    我有幸認識了幾位善知識，在經常性的聚會中，都會互相討論彼此的經驗和體會。本篇每一篇故事中都出現的吳慕涵（化名），曾經告訴我們靈魂為什麼會受傷？這要先從靈魂是什麼講起。吳慕涵常說，人的三身，即法身、報身、應身；法身是不生不滅的靈魂；身是受因緣果報而來投胎轉世的靈，而應身則是受報而來的肉體。這法身、報身和應身，也就是基督教所說的聖靈、聖父、聖子。佛教所說的法身，在基督教就稱為永生不滅的靈魂。法身若清淨，就能像《心經》裡頭所說的不生、不滅、不垢、不淨、不增不減；它是無色、無相、無受想行識，無眼、耳、鼻、舌、身、意，無色、聲、香、味、觸、法，無眼界，無意識界，無無明，無老死，無苦集滅道的，為什麼呢？因為諸法空相，所以法身也是無相的，色即是空，空即是色。我們所調的修行，也是要修到法身清淨。


    人們要修的是法身，但是法身既與肉身結合來到人間，該如何修呢？就必須依靠難得的人身來修。人的身體是可見的色相，色即是空，因為肉體是地火風水四大和合而成，是會分解的，是假的，我們要以假來修真，讓不生不滅的靈更加清淨，清淨才能提昇，不必再落入六道之中。


    ### 當靈魂受傷時……


    吳慕涵也說過，法身是最原始的靈魂，是自性，也是佛陀所說「佛性」。如果法身受了干擾，受了傷，沒有修補好，怎麼努力修行都是障礙重重的，因為法身不清淨，要修行是非常辛苦，也難以成就的。有一次聽淨空法師講經，他說，佛陀說眾生皆具佛性，所以人人都能成佛，為什麼大部分人還是凡夫俗子，無法成佛呢？那是因為佛性被妄想、分別、執著，被貪、瞋、痴、慢、疑所蒙蔽。若能去除這些障礙，達到「無我相」時，就可以跳出六道輪迴。


    淨空法師還說，若想超越這至高境界，再上層樓，並非不可能。放下「我相」，只是基礎功夫而已，若能精進到沒有「人相、衆生相、壽者相」的分別，靈就已經出到十法界的邊緣；若是能修到「無我見，無人見，無衆生見，無壽者見」時，靈就出脫十法界而進入一真法界；沒有了「四相」和「四見」的念頭時，「寂」就現前，那才是真正的自性清淨，達到初住菩薩的境界了。


    有一天大夥兒在聊天時，吳慕涵也說我們的法身不論修行不修行，都會受到干擾，這是投胎成為人身所必受的考驗。尤其當我們的靈衰弱時，更容易受到不好氣場的影響，這種影響如果長期存在，靈就會受傷害。有些人身體上的許多病痛，長年看醫生，不但看不好，甚至還檢查不出疾病的原因，有可能就是因為法身靈受傷了，這是醫學無法檢查，也不予承認的。


    哪些狀況會使法身靈受傷呢？例如，發生車禍，靈因為驚嚇過度而受傷了；或前世死於火災的人，今生莫名其妙的怕火，甚至連打火機都不敢使用，這也是受創的靈未能復原之故。車禍後，受傷的身體沒有復原，肉身的創痛也會影響靈體，人死後受傷的靈脫離身體，在投胎之前，若無緣將傷療好，來生也可能會是一位殘障者。


    累世的因果業障或是怨親債主纏綿不去，造成身心受創，醫藥無效的例子也時有所聞；東方人所說的業障，就是西方宗教所謂的原罪。這是「萬般帶不去，唯有業纏身」的最好印證。這些與生俱來的靈性障礙，都是自己所造做，因此，也必須自己懺悔和贖罪，自己做，本來就該自己受，也該自己去解決，這是天經地義的事，在哪一界都一樣。若是無法覺悟，不信因果，將使自己的靈愈來愈沉重，要提昇就難上加難，只能在六道中一次次的輪迴，直到覺悟的一天。有許多法師、道士、大師揚言可以幫人消業障，那是不正確的觀念。


    《現代異次元》書中所敘述的，大多是靈魂受傷而使人生病，甚至久病不癒，或是發生各種意想不到狀況的故事。《陰飛蛇》故事中被帶狀皰疹纏身的男孩小寶，是因為受到家中陰宅氣場干擾而生病，他家族中的親友也因此而健康受損，甚至發生意外傷亡。《翠玉屏風》故事中為卵巢腫瘤所苦的畫家姿敏，是因為家中收藏許多出土的而且被外靈所附的古董，致使陽宅氣場受到干擾，久而久之也影響她的應身而致病。《一枝紅艷露凝香》故事中精神分裂的李君儀，被外靈所附，完全變了一個人，差一點被家人送進精神病院。《哭泣的嬰靈》故事中的曾惠英，身受墮胎後遺症所折磨，這是自己作必須自己受的最好例子。《現代睡美人》故事中的媛媛，也因爲受陽宅和外靈影響，連續六年每個月時間一到就要昏睡幾天；《蓉圓琴韻》故事中女孩小珊，受家中收藏的一張古琴影響而莫名其妙一再生病，這又是一個外靈影響陽宅，進而干擾到人的靈體和肉體的例子。《姬百合的迷思》故事中的阿海和阿喜，一個被色魔附身，六十多歲的老實人忽然變成猛男；一個因家中氣場不對，招來邪靈，以爲自己忽然神通，竊竊自喜的爲人看病，沒想到請魔容易送魔難,最後竟無法收拾。〈落花時節又逢君〉故事中的小嫻、翠玲和莉莉,因為業障以及家宅被電磁場干擾,身體氣場也被擾亂而致病。〈深山何處鐘〉故事中罹患腦瘤的美倩,自殺身亡的阿松等等,都因為靈受了傷及靈被操控,反應到肉體和神志上,因而造成身體或精神的異常。這種種不但查無病因,也藥石枉然。


    〈現代睡美人〉故事中,每個月都要昏睡幾天的媛媛,從小學三年級第一次發病病程七天,一直到國中三年級,一個月已經昏睡到十五天;六年,是多麼漫長的時間,媛媛能做的檢查全部都做過,就是查不出任何病因,他的父母為了這個寶貝女兒,中醫、西醫不知看了多少,靈療也從台灣頭求到台灣尾,跑了多少廟、宮、神壇,求助過多少神明,都沒能解決問題;醫生根據自己的判斷,也開了許多藥給她吃。既然查不出病因,所以這些藥想必也無法對症,吃進身體裡,不知造成了多少副作用。後來媛媛遇到高人,將她家以及她身上的障礙去除之後,昏睡症不藥而癒。她痊癒後,有幾篇相關的報導,稱這種昏睡症為「克來列文症候群」或「猝睡症」。醫院的「睡眠中心」對這種病人相當好奇,會以高昂的花費為他們做檢查,甚至做腦部開刀,但在查無病因也無藥可醫的情形下,醫生也一籌莫展,只能任病人自生自滅。當然，這也不能怪醫生，因為醫學畢竟是人的世界，如何去了解靈的世界?


    此書中收錄的十個故事,全部都是真人真事,但為了保護當事人,故事中主角的身分、背景和姓名都加以變更,連書中具有特異功能且通靈的高人也用化名。這本書的出版,不是為任何人做宣傳,只是筆者寫出近幾年來的所見所聞,比較了存在已久的民間靈療,以及長久以來以訛傳訛,積非成是的許多觀念之後,覺得有必要將這些故事寫出來,提供給讀者一個反面的思考。


    或許很多人會認為靈療是無稽之談,是迷信,因為不論是靈受傷或是有高人能為靈魂療傷,都是看不見,摸不到,嗅不著的事,叫人難以相信其真實性。這裡要特別強調一個例子,〈落花時節又逢君〉故事中的翠玲和莉莉,她們長期受到電磁場的影響,一個身體感到不適,一個甚至無法生育,醫生均查不出原因,後來經過高人指點,把床頭和床尾的音響、電視移開,身體的不適不但不藥而癒,不能生育的也很快就懷孕了。電磁場是看不到、摸不到、嗅不到的,不過,當你打開電源開關,電燈即刻大放光明;打開音響,廣播節目或音樂就透過天線的接收而發音;打開電視,精采的節目就呈現在螢光幕上;可見肉眼看不見的電波、磁波、輻射充斥在四周,我們毫無所覺;從事電磁場與電磁輻射相關報導的資深環保記者馬克·平斯基（Mark
    A. Pinsky）所著，黃玉如翻譯，幼獅公司出版的《遠離輻射電磁場》一書中，很詳實的敘述了電磁場與電磁輻射在動物實驗的結果，以及對人體造成的可能影響。書中也提及這些看不見的磁場和輻射，在癌症的催化、遺傳、行為、生殖、視覺⋯⋯等等影響的相關研究；連這種與日常生活緊密相連的電磁場和電磁輻射，人們都感覺不到，又怎能感受到和我們靈魂擦撞，或是侵擾到我們靈魂，使靈體受傷的那種更加細微的撞擊呢？看不見的磁場，我們承認它的存在；看不見的靈界，卻有許多人不願相信；但是已經存在的，不會因爲你不相信而消失。


    台灣大學教務長也是電機系教授李嗣涔，多年來不斷的在研究「靈界」的相關議題；他從手指識字等特異功能開始進入，如今已從透過特異功能人士（即通靈者）以及神聖的字彙（如耶穌、藥師佛）和密碼，進入天國和藥師佛的網站，甚至遨遊天國和藥師佛的樂園。李教授的論文裡以網址、網際網路、密碼、信息場、靈界、高智能信息場、神靈、功能人、意識、潛意識、物質世界、宇宙時空、外星文明、有形、無形、向神靈發送電子郵件⋯⋯等等科學研究的語言來敘述。很高興有科學家願意花如此多的精神和研究經費，來證明靈界和特異功能的存在。有了這樣的報告，或許會引起許多高知識分子，以及認爲靈界是迷信的人的好奇心和注意，或開始相信真有其事。


    李教授的研究，是想要證明民間自古以來千千萬萬人早已相信的事，這個研究只是在說服他自己以及鐵齒的人，而對本來就相信的人來說是沒有必要的。對於靈界的認識，人們早就透過通靈者、靈媒等，以直接溝通的方式，或以扶鸞來接收靈界的訊息。只是，他們用的是民間的語言。學者專家所用專業語言，和民間所用的通俗語言，敘述的是同一件事；學者專家研究的結果，是對？是錯？沒有人可以去檢驗他們。對了，通靈者和靈界可能一笑置之；錯了，也沒人會去指正。就像有人想以某種學門來印證佛學一樣，這些人間的知識，是多麼狹隘，是多麼的有限，如何能印證佛學的廣闊無邊；那種遍虛空周法界的宇宙真相，如何能歸納為某一種公式？某一種學說？意念到靈體剎那即到，超越光速音速以及一切學說的靈界，科學對他們來說可能是一種貶低。或許科學再研究發展幾百個世紀以後，說不定才能解釋到一點佛學的邊吧！


    淨空法師說過，佛經不是拿來研究的，是拿來讀誦的。這種說法深獲我心，因為每個人在念誦佛經時，因悟性不同，各自心領神會，心中有自己的解釋，這樣才能印證在自己的生活上，才能從中獲得靈性的提昇，這才是真正的人間佛法。將佛經做了錯誤的解釋，而誤導衆生的話，自己的靈魂也會受到重傷的。這種傷要療養起來，就大費周章了。


    吳慕涵也經常告訴我們，法身、報身和應身的傷，會互相影響。受報而來的應身，受累世和今生的污染，深深影響了靈體的清淨，因此要一世一世的修，修到沒有妄想、分別、執著，修到放下貪瞋痴，意念不受污染了，法身才能清淨，自性才能顯現。


    當靈魂受到干擾時，人們會去尋求靈療的幫助。靈療，從遠古至今在民間都很風行，只是一般人不叫它做靈療。在世界各地的原住民部落裡，有通靈的巫師作為靈界和人間的橋梁，為人們帶來靈界的訊息，並為人驅邪治病；在中國，自古人們被外靈入侵時，都仰賴道士或得道的高人來驅魔鎮妖；基督教也有驅魔儀式，天主教更有驅魔的歷史。風靡一時，震撼人心的電影「大法師」，以及近幾年的新片「魂飛魄散」，都是天主教神父驅魔的影片。翻開舊約聖經，耶穌驅魔的故事比比皆是，這都是靈療。近代西方醫學中的催眠療法，進入前世尋找疾病根源的方式，這也是一種靈療。只是被催眠出來的前世經驗，若留存到今世的記憶中，是否會造成新的傷害，這就不得而知了。


    人道、魔道、鬼道等，本來各有各的空間，互相見不到、碰不到，但是當人的氣場弱，頻率和其他空間的靈界相通時，有時候就會不小心遇上了。其實，很多被靈界朋友上'
  mdcn: '## 靈魂就是靈魂，有完整和不完整之分嗎？


    靈魂就是靈魂，有完整和不完整之分嗎？當然有，不完整的靈魂就是受傷的靈魂、衰弱的靈魂；當你越想像行時，障礙就會越多；不安、驚疑、恐懼、迷惑，被無明佔據和侵蝕的靈魂，如何能無所罣礙呢？


    我有幸認識了幾位善知識，在經常性的聚會中，都會互相討論彼此的經驗和體會。本篇每一篇故事中都出現的吳慕涵（化名），曾經告訴我們靈魂為什麼會受傷？這要先從靈魂是什麼講起。吳慕涵常說，人的三身，即法身、報身、應身；法身是不生不滅的靈魂；身是受因緣果報而來投胎轉世的靈，而應身則是受報而來的肉體。這法身、報身和應身，也就是基督教所說的聖靈、聖父、聖子。佛教所說的法身，在基督教就稱為永生不滅的靈魂。法身若清淨，就能像《心經》裡頭所說的不生、不滅、不垢、不淨、不增不減；它是無色、無相、無受想行識，無眼、耳、鼻、舌、身、意，無色、聲、香、味、觸、法，無眼界，無意識界，無無明，無老死，無苦集滅道的，為什麼呢？因為諸法空相，所以法身也是無相的，色即是空，空即是色。我們所調的修行，也是要修到法身清淨。


    人們要修的是法身，但是法身既與肉身結合來到人間，該如何修呢？就必須依靠難得的人身來修。人的身體是可見的色相，色即是空，因為肉體是地火風水四大和合而成，是會分解的，是假的，我們要以假來修真，讓不生不滅的靈更加清淨，清淨才能提昇，不必再落入六道之中。


    ### 當靈魂受傷時……


    吳慕涵也說過，法身是最原始的靈魂，是自性，也是佛陀所說「佛性」。如果法身受了干擾，受了傷，沒有修補好，怎麼努力修行都是障礙重重的，因為法身不清淨，要修行是非常辛苦，也難以成就的。有一次聽淨空法師講經，他說，佛陀說眾生皆具佛性，所以人人都能成佛，為什麼大部分人還是凡夫俗子，無法成佛呢？那是因為佛性被妄想、分別、執著，被貪、瞋、痴、慢、疑所蒙蔽。若能去除這些障礙，達到「無我相」時，就可以跳出六道輪迴。


    淨空法師還說，若想超越這至高境界，再上層樓，並非不可能。放下「我相」，只是基礎功夫而已，若能精進到沒有「人相、衆生相、壽者相」的分別，靈就已經出到十法界的邊緣；若是能修到「無我見，無人見，無衆生見，無壽者見」時，靈就出脫十法界而進入一真法界；沒有了「四相」和「四見」的念頭時，「寂」就現前，那才是真正的自性清淨，達到初住菩薩的境界了。


    有一天大夥兒在聊天時，吳慕涵也說我們的法身不論修行不修行，都會受到干擾，這是投胎成為人身所必受的考驗。尤其當我們的靈衰弱時，更容易受到不好氣場的影響，這種影響如果長期存在，靈就會受傷害。有些人身體上的許多病痛，長年看醫生，不但看不好，甚至還檢查不出疾病的原因，有可能就是因為法身靈受傷了，這是醫學無法檢查，也不予承認的。


    哪些狀況會使法身靈受傷呢？例如，發生車禍，靈因為驚嚇過度而受傷了；或前世死於火災的人，今生莫名其妙的怕火，甚至連打火機都不敢使用，這也是受創的靈未能復原之故。車禍後，受傷的身體沒有復原，肉身的創痛也會影響靈體，人死後受傷的靈脫離身體，在投胎之前，若無緣將傷療好，來生也可能會是一位殘障者。


    累世的因果業障或是怨親債主纏綿不去，造成身心受創，醫藥無效的例子也時有所聞；東方人所說的業障，就是西方宗教所謂的原罪。這是「萬般帶不去，唯有業纏身」的最好印證。這些與生俱來的靈性障礙，都是自己所造做，因此，也必須自己懺悔和贖罪，自己做，本來就該自己受，也該自己去解決，這是天經地義的事，在哪一界都一樣。若是無法覺悟，不信因果，將使自己的靈愈來愈沉重，要提昇就難上加難，只能在六道中一次次的輪迴，直到覺悟的一天。有許多法師、道士、大師揚言可以幫人消業障，那是不正確的觀念。


    《現代異次元》書中所敘述的，大多是靈魂受傷而使人生病，甚至久病不癒，或是發生各種意想不到狀況的故事。《陰飛蛇》故事中被帶狀皰疹纏身的男孩小寶，是因為受到家中陰宅氣場干擾而生病，他家族中的親友也因此而健康受損，甚至發生意外傷亡。《翠玉屏風》故事中為卵巢腫瘤所苦的畫家姿敏，是因為家中收藏許多出土的而且被外靈所附的古董，致使陽宅氣場受到干擾，久而久之也影響她的應身而致病。《一枝紅艷露凝香》故事中精神分裂的李君儀，被外靈所附，完全變了一個人，差一點被家人送進精神病院。《哭泣的嬰靈》故事中的曾惠英，身受墮胎後遺症所折磨，這是自己作必須自己受的最好例子。《現代睡美人》故事中的媛媛，也因爲受陽宅和外靈影響，連續六年每個月時間一到就要昏睡幾天；《蓉圓琴韻》故事中女孩小珊，受家中收藏的一張古琴影響而莫名其妙一再生病，這又是一個外靈影響陽宅，進而干擾到人的靈體和肉體的例子。《姬百合的迷思》故事中的阿海和阿喜，一個被色魔附身，六十多歲的老實人忽然變成猛男；一個因家中氣場不對，招來邪靈，以爲自己忽然神通，竊竊自喜的爲人看病，沒想到請魔容易送魔難,最後竟無法收拾。〈落花時節又逢君〉故事中的小嫻、翠玲和莉莉,因為業障以及家宅被電磁場干擾,身體氣場也被擾亂而致病。〈深山何處鐘〉故事中罹患腦瘤的美倩,自殺身亡的阿松等等,都因為靈受了傷及靈被操控,反應到肉體和神志上,因而造成身體或精神的異常。這種種不但查無病因,也藥石枉然。


    〈現代睡美人〉故事中,每個月都要昏睡幾天的媛媛,從小學三年級第一次發病病程七天,一直到國中三年級,一個月已經昏睡到十五天;六年,是多麼漫長的時間,媛媛能做的檢查全部都做過,就是查不出任何病因,他的父母為了這個寶貝女兒,中醫、西醫不知看了多少,靈療也從台灣頭求到台灣尾,跑了多少廟、宮、神壇,求助過多少神明,都沒能解決問題;醫生根據自己的判斷,也開了許多藥給她吃。既然查不出病因,所以這些藥想必也無法對症,吃進身體裡,不知造成了多少副作用。後來媛媛遇到高人,將她家以及她身上的障礙去除之後,昏睡症不藥而癒。她痊癒後,有幾篇相關的報導,稱這種昏睡症為「克來列文症候群」或「猝睡症」。醫院的「睡眠中心」對這種病人相當好奇,會以高昂的花費為他們做檢查,甚至做腦部開刀,但在查無病因也無藥可醫的情形下,醫生也一籌莫展,只能任病人自生自滅。當然，這也不能怪醫生，因為醫學畢竟是人的世界，如何去了解靈的世界?


    此書中收錄的十個故事,全部都是真人真事,但為了保護當事人,故事中主角的身分、背景和姓名都加以變更,連書中具有特異功能且通靈的高人也用化名。這本書的出版,不是為任何人做宣傳,只是筆者寫出近幾年來的所見所聞,比較了存在已久的民間靈療,以及長久以來以訛傳訛,積非成是的許多觀念之後,覺得有必要將這些故事寫出來,提供給讀者一個反面的思考。


