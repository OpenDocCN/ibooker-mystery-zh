  md: '其間；也有些宮廟神壇因主持人不正法，供奉的神明不想與他共修，早就遠走高飛，神桌上供養的雖是觀音、媽祖、濟公或三太子，其實坐享香火的說不定是個大魔頭。無法分辨正邪的人們，仍然走進去尋求表面上看去是神明，其實是魔的幫助，求魔比求神更有求必應，因為「道高一尺，魔高一丈」，正道的神佛必須依循正法辦事，而魔卻可以不依循正道，隨著人們的貪瞋癡起舞，讓人的慾望更容易達成。只是嚐了甜頭的人，是要付出代價的，他的靈魂已被收買，成了魔子、魔孫、魔眷屬而仍不自知。


