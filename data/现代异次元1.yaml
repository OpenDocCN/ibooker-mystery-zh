  md: '無緣遇到可信任的靈療者時，該怎麼辦？許多正法正道的寺廟，供養的神佛，在人間渡化眾生，為眾生消災解厄；神佛充滿陽氣，是正能量，這是一種祥瑞之氣，當我們踏入這種正法的寺廟，會生出虔誠的心，也會心生歡喜，像回到家一樣，在這樣的場合，外靈有時會自動離去。也有許多有修為的法師、道士、善知識等，在人間散播法音，讓人心中充滿法喜，聽到的人靈漸漸清淨了，慢慢能夠放下煩惱、習氣，不但自己生活得更自在，連追隨左右的外靈也得渡而離開了，這也是一種靈療。事在人為，這正是近朱者赤，近墨者黑的道理，我國自古即有名訓，這句古訓能讓我們在此五濁惡世之中，選擇自己心靈的導師，並有所歸屬。


