    # 現代異次元——十則靈療的故事 28


    淨空法師說修戒定慧，才是真功德。戒，是一種功，把戒修好，得到的果就是定。定，能生智慧，這才叫德。修行，是讓自己靜、定和清淨，那是一種內省的功夫，是往裡修，而不是往外修，心越往外跑就越動，況且如果跑錯道場，跑進魔所主持的寺廟，靈就容易受干擾，甚而受到傷害，修行路就愈走愈艱苦了。


    魔充斥在我們四周，這話聽起來有點恐怖，其實沒什麼好害怕的，這個世界本來就好壞各半，像白天和黑夜各半一樣。有一點佛學知識的人也知道六道眾生皆具佛性，而且眾生也都是平等的，沒有高下之分，別看他是魔，或正在水深火熱的地獄中受苦的眾生，但是哪一天忽然覺悟了，馬上就可以成佛。所以，即使是魔，我們也要尊重他，因為他是未來佛。只是在他未成佛之前，會來干擾你的修行。這種事，連釋迦牟尼佛在未成道時，坐在菩提樹下都遇到過，何況是我們這些意念不夠清淨的凡夫俗子，染污的意念每天都在不知招來多少魔考哩！因此，魔來了，不必害怕，就當作是在考試吧！沒考過再重來一次，一直考到及格爲止。不過，話雖如此說，但是最好還是收攝心念，不去招惹魔爲妙。


    當靈魂受到干擾，肉身感到不適時，沒有透過靈療是否能夠痊癒呢？或者我們該如何保護自己？減少干擾呢？當一個人受到不好的氣場干擾時，不管是魔也好，其他的也好，'
