- md: '才回到家，媛媛的身上開始發癢，玉嬋帶她去看醫生，吃了兩天的藥，身上過敏發癢的症狀緩和了些，但是，她的精神狀況似乎不太對勁，忽然沒來由的胡言亂語，還又哭又鬧的，跟她說話她好像都沒聽見。岑風和玉嬋一直哄著她，仍然無法讓她停止哭鬧，正不知該怎麼辦時，媛媛出乎意料的將自己身上的衣服一件一件的脫下來扔在地上，光著身子就要往屋外衝出去。


    岑風和玉嬋見狀簡直嚇壞了，立即上前將媛媛抓住，趕緊將衣服一一為她穿上。媛媛雖然乖乖穿上了衣服，但是仍然是一副神智不清的樣子，不停的哭鬧著，岑風守著大門不讓她出去，她就在屋子裡到處奔跑。


    媛媛從來沒有過這種情形，嚇得岑風和玉嬋慌了手腳，只好打電話給在台北某教學醫院擔任護理長的妹妹求助。媛媛的姑姑一聽，病情很不尋常，建議他們趕緊過來掛急診。於是，岑風和玉嬋連夜將媛媛從新竹送到台北，住進姑姑任職醫院所附設的兒童醫院就診。


    > 「這孩子有服用毒品嗎？」醫生問。

    > 「沒有。」


    「她會不會好奇跟著同學一起吸毒，你們當家長的被蒙在鼓裡？」

    「我女兒絕對不會吸毒！」醫生的懷疑令岑風不禁生起氣來。


    也難怪醫生會這麼懷疑，因為媛媛的行為就像吸毒之後的反應，醫生總要問個清楚，才好辨別病情。


    經過各種檢查，驗血、驗尿、照X光，一切都很正常，既沒有像醫生所懷疑吃錯過敏藥，也沒有服用迷幻藥，但是媛媛的病例上寫的是一「行為異常」。


    以「行為異常」住進醫院的媛媛，躺在病床上，反而顯得異常的安靜，不但不再哭鬧，還睡得很沉，想叫她吃飯、喝水，卻怎麼也叫不醒。岑風和玉嬋以為女兒哭累了、鬧累了，才會睡得這麼沉。就這樣在醫院睡了一天，看著好像沒事了，才出院回家了。回家的車上，媛媛仍然熟睡不醒；回到家，岑風抱她上床，她的眼睛都沒睜開過。


    媛媛這一睡，又睡了三天。三天以來不吃，不喝，不拉，還叫不醒。三天過後，她揉揉眼睛，悠悠的醒了過來，卻完全記不得這三天來所發生的任何事。這是李家惡夢的開始。


    媛媛生病了，而且還病得不輕。這第一次病發，從烤肉回來開始發燒，接著過敏，精神錯亂、哭鬧、脫衣、奔跑到昏睡不醒，最後醒過來，全程總共七天。從此，她每個月時間一到就會開始昏睡，從每月睡七天到六年後的一個月十五天。這時的媛媛也已經從一個小學三年級的小女孩，長大成爲一位國中三年級少女。


    雖然已經國三了，但是，不知是否因爲她大半的時間都在昏睡中度過，所以媛媛在醒著的日子裡，行爲舉止都像是小女孩一樣的天真，完全不像一位已經十六歲的少女，但是她因爲吃了許多中藥和西藥，身材卻有過度發育的現象。


    每次岑風和玉嬋只要看到活潑好動的媛媛，忽然變安靜，變傻，眼神呆滯起來，就知道即將發病了，果然，在意識不清之後，媛媛接著就昏睡不醒。如果，媛媛在學校上課，忽然發現注意力無法集中，老師說什麼她都聽不真切，變成一片嗡嗡聲，或是同學們下課時的嬉笑打鬧聲變模糊不清時，她會試著跟同學講話，但是張開大口，甚至用力大喊，同學都聽不見，這時，她就會趕快請假回家，即使老師不准，她也會堅持要回家，因爲她知道自已隨時都會失去意識，等她醒來，已經是十幾天以後的事了。


    媛媛就這樣躺著，若不是還在呼吸，玉嬋會以為她已經魂歸西天。


    內心的憂愁，使玉嬋多年來睡不安枕，每每夜裡會驚醒過來，連拖鞋都顧不得穿，就匆匆起身衝進媛媛的房間，急急的伸出手去摸摸媛媛有沒有鼻息，她最怕媛媛昏睡時會一覺不起。


    每次坐在昏睡的女兒身邊，摸摸她的頭，摸摸她的手，玉嬋的心中有一種深沉的悲傷和疑惑。悲傷的是不忍女兒這樣莫名其妙的昏睡，一個人每天利用三分之一的時間睡覺，那是正常的，但是連續不吃不喝不起床的睡上十幾天，這就不正常了。疑惑的是，這樣的昏睡，到底是媛媛身上哪個器官出了問題？是哪種疾病所引起的？竟然都查無原因。她這個做媽媽的若能夠爲心愛的女兒做什麼，好讓她趕快好起來，過正常人的生活，她什麼都願意去做。六年來她和丈夫岑風已經心力交瘁，但他們從不放棄，只要有人介紹哪裡有好醫生，他們都會帶女兒去就醫，但是，始終沒能查出女兒的病因。如果媛媛真是生病了，一定會有原因的，因此，讓她感到很疑惑。


    此刻，夜裡三點，玉嬋緊緊握著昏睡中女兒的手，看著她熟睡中沒有表情的臉，眼淚不禁撲簌簌的落下來。在媛媛床沿坐了一會兒後，玉嬋搖搖熟睡中的女兒，媛媛嘟嘟噥噥的發出聲音，但是並沒有醒來，玉嬋輕輕的把女兒從床上拉起，媛媛並沒有反抗，玉嬋再扶著媛媛下床，半扶半攙的帶她去上廁所，然後幫女兒穿好褲子，帶她回床上睡覺。在整個過程中，媛媛始終閉著眼睛沒有醒來。雖然這樣，玉嬋仍然每天帶女兒到浴室去洗澡和上廁所，以維持媛媛身體的清潔和衛生。


    看媛媛又睡回床上，玉嬋把女兒床頭擺著的餅乾換上另外一種口味，把玻璃杯裡的水也重新換過。在媛媛床頭準備點吃的和喝的，是六年來的習慣，這是以防昏睡中的媛媛，忽然醒來時若肚子餓了，一伸手就可以找到東西吃；但是，在昏睡期間媛媛是不吃東西的，岑風夫婦和兒子強強，剛開始很擔心，怕她不吃不喝會餓死或渴死，所以一直硬塞食物到她嘴裡。媛媛有時會吞下這些食物，也會迷迷糊糊的回答家人跟她說的話，但是，大多數時候她都將食物推開，因爲她一點也不餓，她只想睡覺。當她真正醒來時，問她這些事，她又完全記不得。


    儘管如此，吃下去的食物畢竟有限，又怕會噎到發生危險；何況後來媛媛也不肯吃，也就不勉強她。家人看她不吃不喝竟也活得好好的，也感到很奇怪。


    今天是媛媛昏睡的第十一天了，不知道她還要睡幾天才會醒來？或是就這樣永遠躺著醒不過來？玉嬋想到這裡不禁悲從中來，把女兒的手貼在自己的臉上，眼淚濕了媛媛的手指。看著媛媛那正在發育的身體，很明顯的又瘦了一圈，心疼加上心酸，讓玉嬋回到自己床上時，眼淚還沒止住。岑風不捨的摟住她，有一位這樣的女兒，對他們來說，是一種煎熬，也是一種考驗，所以他們算得上是一對患難夫妻；為了治療女兒，他們的確是夫妻共同，而且盡心盡力。


    一覺醒來，伸了個大大的懶腰，媛媛覺得肚子好餓呀！


    什麼？這次整整睡了半個月，慘了！月考又沒參加，老師和校長一定會對她吹鬍子瞪眼睛，她又得補考，麻煩大了！


    媛媛醒來了！這可是李家的大事，表示媛媛又從鬼們關裡平安的逃了出來。岑風鬆了一口氣，玉嬋鬆了一口氣，和媛媛姊弟情深的強強也鬆了一口氣。


    從媛媛開始有甦醒跡象，嘴裡不斷的發出嗯嗯啊啊的聲音，強強就一直守在姊姊身邊，他一見姊姊醒過來了，就趕緊遞過去一杯水，媛媛才喝第一口，強強就開始在她耳邊絮絮叨叨的說個不停，報告這次昏睡期間他對她說了什麼話？為她做了什麼事？


    「哪有？」媛媛一律以這句話回答。她真的是一點印象也沒有，連媽媽帶她去洗澡、上廁所，她都不記得了，怎會記得弟弟跟她說什麼？


    每次昏睡醒來，因為沒有進食，媛媛都會瘦個五、六公斤；睜開眼睛後，她立刻感到飢腸轆轆，媽媽早已煮了好吃的等著幫她進補，她也老實不客氣的大吃一頓。上學時她還會在書包裡擺許多零食，大包小包的像要去遠足一樣。下了課，她就吃個不停，上課時也偶而會偷吃幾口，她實在餓太久了。瘦了一圈的身材，在她下次昏睡前又會胖回五、六公斤。


    「妳到底生什麼病啊？」同學們常好奇的問她。

    「妳請假，只是在家睡覺嗎？」老師、主任和校長也很懷疑的問媛媛。


    她知道，六年來爸爸和媽媽能做的都做了，為了她的病，家裡也花了不少錢，雖然如此，但是爸爸和媽媽從來都沒有放棄過她，還是經常帶她東奔西跑的到處治病。


    她記得剛發病的那幾年，爸爸媽媽只要聽人說哪家醫院好，哪位醫生行，就會帶她去看，所以中醫和西醫她都看過，不過中醫和西醫都找不出她的病因，中醫要她吃四物丸，吃了一年，並沒有治好她的昏睡；台北最大的教學醫院有名的婦科醫生也跟中醫一樣，認為她「轉大人」轉不過，給她按上「經前症候群」的病名，開了避孕藥給她吃，調節她體內的賀爾蒙；媛媛吞了許多賀爾蒙，同樣也沒治好她的病，甚至連病因都是猜測的，但是卻使她的身體過度發育，擁有一副超出少女該有的凹凸有致的身材。


    中醫和西醫都束手無策，爸爸和媽媽開始尋求一些民間的療法，只要有親戚朋友介紹，他們都去嘗試，所以各種偏方也吃了不少，可是每個月時間一到，睡蟲照樣上身，一點也不管用。非常鐵齒的爸爸，認爲自己是知識分子，向來不信怪力亂神，常說這些都是迷信，但是心急女兒的病又無計可施，也開始在親友的介紹下，求助於神明的幫助，相信媛媛是因爲中了邪，才會生這種怪病，盼望法力高強的人可以幫她驅邪。


    求神的事，似乎一開始就無法停止，因為看了這間寺廟，這位神明無效，總抱著下一間神壇或道觀的神仙，可能會有有效的希望；因此，他們從台灣頭看到了台灣尾，不知燒了多少紙錢，添了多少香油錢，花了多少作法會和超渡亡靈的錢，病情依然沒有改善。


    媛媛記得爸媽花了最多錢的那一次，也是一位親戚介紹的，說那間廟有多靈，爸爸抱了無限的希望，把全家都帶到高雄鄉下那間很大的廟裡，去尋求道士的幫助。乩童在神明附身以後，告訴爸媽說是她的身邊有兩位去世親戚的亡靈緊緊跟隨著，要求超渡。岑風夫婦也只能姑且信之，但是道士作法和超渡的花費不便宜，爸爸和媽媽東拼西湊的付了錢，結果媛媛的病情仍然絲毫沒有好轉。


    白花花的銀子就這麼大把大把的花出去，每次都像丟進水中一樣不見了蹤影。要說爸爸和媽媽不灰心，那是騙人的，但是為了醫好她的病，爸爸和媽媽什麼都願意去試，至少那也是一線希望。但是，久而久之，岑風對降魔、驅邪、超渡、收驚、法會等也漸漸失去信心。


    家中一向平靜的生活，因為她的病全亂了腳步。媽媽是公務人員，每天要按時上班，除了假日，平常帶她看病的重任就落在爸爸身上。爸爸開的印刷廠這幾年生意也莫名其妙的一落千丈，因此有很多時間可以陪她去看病。在多年到處奔波求醫均宣告無效之後，爸爸和媽媽商量的結果，決定走回正統醫療的路子，看看能不能查出病因。


    新竹並沒有什麼大醫院，要查出病因還非到台北不可，於是，父女倆經常奔波於新竹和台北之間，去找親友介紹的教學醫院的名醫，在某醫院看婦科，查不出原因後，經人介紹又到另一家看精神科，經過一段時間的檢查，仍然不知病因何在，倒是吃了不少冤枉藥，對病情一點改善也沒有。爸爸和媽媽天天看她吃一堆藥，心裡實在擔心得不得了，深怕這些不對症的藥會有許多副作用，更加影響媛媛的健康。


    最後，各處求醫讓爸爸和媽媽精疲力盡，於是，他們回到原點，再回頭去找媛媛的姑姑。小學三年級第一次發病時，爸爸媽媽就是將她送到姑姑服務醫院附設的兒童醫院就診，現在她已經長大，不再是兒童，因此姑姑就介紹她到本院看新陳代謝科。醫生在仔細聽過病情後，建議媛媛看腦神經內科。


    從此，媛媛成了這家醫院腦神經內科的長期病號。媛媛是腦神經內科王主任的病人，王主任爲她做了所有該做的檢查，像清醒腦波、睡眠腦波、腦斷層攝影、核磁共振⋯⋯等等，結果顯示腦部一切正常。在沒查出病因之前，王主任無法爲媛媛治療，只能針對她的症狀，即她在昏睡前的劇烈頭痛，開些幫助血液循環的藥來緩解疼痛。


    對媛媛的病情，王主任一直在進行著長期的觀察。他要她在沒昏睡的期間，每週來看一次門診，還囑咐她每天寫日記，記下生活中的點點滴滴，每週來向王主任報告。王主任每次都帶著六位醫生一起聆聽媛媛一週來的生活內容，想從她的日常活動中找出蛛絲馬跡，用來研判可能的病因。但是長久以來，一點進展也沒有。


    六年了，媛媛從病發至今已經過了長長的六年時間。在這六年裡，她也曾有一段長期的清醒，那是她念國一那一年，幾乎有一年的時間病情沒有發作，全家人都以爲她痊癒了，但是忽然有一天她又開始昏睡，再次發病，情況更嚴重了，她從每個月昏睡七天，變成九天、十天、十三天到十五天，似乎一發不可收拾。


    媛媛清楚的記得，暫停一年的昏睡症再度復發的那一天，是一個星期天。爸爸帶著全家人一起去喝喜酒。爸爸開著車，車子搖呀搖的在路上走著，媛媛和強強很快就睡著了。快到鄉下親戚家時，媽媽才叫醒她和弟弟。下車時，他們經過一條巷子，有一戶人家正在辦喪事，她打從喪家門口走過時，忽然覺得一陣恍惚，在無意中，彷彿看到了一個黑影一直在向她招手，一時之間她全身都起了雞皮疙瘩，從頭到腳都感到非常不舒服。


    媛媛立刻大聲呼叫走在前面兩三步遠的媽媽，但是她雖然張開大口卻發不出聲音，所以媽媽根本沒聽到。她只好勉強撐著，跟在媽媽後面走，想追上前去，卻一點也沒力氣。


    進了餐廳，媽媽慢下了腳步，她伸手抱住媽媽，意識開始不清楚起來，頭也漸漸昏沉，滿桌的山珍海味她一口也吃不下。爸爸看到她眼神呆滯、渙散，心想大事不妙了，很擔心的問道：


    「想睡？」


    這時媛媛已經快失去知覺，她張開口，說不出來，但還能用最後一點力氣朝爸爸點點頭。


    「完了！」岑風和玉嬋心中暗叫一聲慘了。


    一切又重來了，而且病情更加嚴重。舊病復發後，昏睡的天數比以前更長久。醒來後要面對老師和同學更加奇異的眼光，尤其對年輕的男老師，簡直不知要如何解釋她為何總是請假去看婦科，因為老師會認爲即使生理痛，也不至於需要在一個月內請半個月的假，所以老師始終認爲媛媛是在逃避壓力和考試。跟老師有理說不清，又提不出病假證明，媛媛覺得好委屈，生的是什麼病，她自己也不知道。經常請假是不得已的，校方跟家長溝通又無效，有時候爲了阻止她請假，老師會叫她在教室外的走廊罰站，讓她傷心得眼淚直流。


    站在走廊上，來來往往的同學會對她指指點點，令她無地自容。生病已經很委屈了，查不出病因，無法治療，更是令人困惑，加上老師不諒解，媛媛的內心深處其實是很沒有安全感也很悲傷的。


    媛媛國三了，但是岑風和玉嬋從來沒有要求女兒要有好的成績，能否考上好的高中，他們更是不敢期待。夫妻倆最大的心願，就是希望媛媛能夠平安順利的長大，要先有這條命，才能考慮教育、前途以及其他的人生規劃，若命都沒了，其他的就免談了。


    是緣分吧！在媛媛昏睡了六年，岑風和玉嬋也早就認命之後，他們竟在一位老朋友的介紹下，認識了吳慕涵。


    學校放春假，媛媛正值清醒期間，於是和弟弟強強一起北上，到台北近郊的外婆家玩。阿姨玉露一時興起，帶他們姊弟兩一起去逛百貨公司，買了大包小包的東西，提得手都痠了，腳也走累了，又不甘心這麼早回去，就叫了一部計程車，到玉露大學時一位要好的同學明麗家裡。


    明麗家是玉露最常來的地方，她養的那隻獵犬阿威，家中來了客人從來都不亂吠，誰來牠都歡迎，跟玉露尤其要好，總是黏著她跟前跟後的。但是說也奇怪，那天玉露一踏進門，阿威竟然狂吠不止，嚇得她和媛媛姊弟倆動也不敢動。明麗見狀，大聲喝止也沒有用，只好把阿威關在後陽台，牠才停止吠叫。


    更奇怪的是，玉露他們來到明麗家時，她正在電腦前面打一篇文件，只是起身去開個門，然後把阿威拉到後陽台去，再回頭竟然發現她的電腦當機了。這是從來不曾有過的現象，明麗先關了電腦，去廚房為客人準備飲料，玉露也跟了進去。


    「媛媛是不是每個月都會昏睡的那位？」明麗問。

    「就是她。」玉露回答。

    「媛媛身上真的有事，可能被靈界附了身。」

    「你怎麼知道？」

    「你聽說過嗎？狗的眼睛是看得見的，你什麼時候見過我家阿威又吼又叫的，一定是看見了什麼東西，狗很靈的。還有，我的電腦也當機了，也是因為受到干擾。」


    「電腦會因為這樣而當機嗎？」

    「會的，你別不相信。」

    「我姊和我姊夫該做的都做了，你又不是不知道，還能怎樣？」

    「我最近認識一個很特別的人，他姓吳，這個人可以直接和靈界溝通，是領了靈界執照，專門解決靈界問題的異人。」

    「天底下還有這種人？」

    「有，不多就是了。」

    「是法師或是道士嗎？」

    「都不是，是一位很正直，很有個性也很有修為的人，他不僅有特異功能，還負有幫助靈界朋友回家的任務。我跟他認識雖然不久，但是我的舅舅跟他很熟，聽我舅舅說，這位有特異功能的吳先生，一、二十年來救了很多醫生都醫不好的疑難雜症，被他救過的人，有的要幫他蓋廟，有的要幫他建道場，也有人要花大錢買房子給他，他一律拒絕，這個人不是斂財之徒，不隨便貪人家的供養，也不開價，不要名，不要利，被他救過的人隨緣包一點紅包給他，他就這樣一個人過著清貧又清淨的日子。」


    「那可真是難得，現在有一點神通力的人，就假宗教之名，自創門派，佔山爲王，自稱教主，開名牌轎車，住豪宅，奇怪的是還有很多人傾家蕩產的把一切都奉獻給這種宗教騙子。」

    「吳先生真的是一位奇人，他對目前宗教的亂象很無奈，也很痛心，但是又無法力挽狂瀾，只能做好他自己該做的事。」

    「媛媛既然有這方面的問題，你就好心點，幫我們介紹一下吧！」

    「你盡快帶媛媛去給他看，反正你們也到處都看過了，不差不多看一位，頂多沒效而已，不過，我相信這次應該會有效，這個人是真正有功力的。」


    明麗立刻拿起電話打給吳慕涵，他正好在家，於是飲料也顧不得喝，就由明麗開車，四個人直奔吳慕涵的住處。


    「妳身上有事，妳家也有事，這種情形我要先到你家去，把家裡的問題解決了，看妳才有用，不然我現在把妳看好了，妳又回家去，我不是白看了嗎？」


    吳慕涵看到媛媛後對她這樣說，並叫她回家去徵求父母的同意。


    媛媛回家向爸爸報告這件事，六年來岑風也遇到很多高人，那些高人都沒能治好媛媛的病；但是他不排斥再見見吳慕涵，因為就像明麗說的，看不好也沒什麼損失。


    岑風專程開車從新竹到台北，來接這位異人到他們家中去。初見吳慕涵，岑風並不覺得這位皮膚黝黑的中年人和其他高人有什麼不同。說真的，他對眼前這位穿著普通，腳蹬涼鞋的人，第一眼並沒有什麼好的印象。


    車子開上高速公路，初次見面的陌生感讓兩個人都不大願意開口。一直到了休息站，停下車兩人去上了廁所，出來後站在車旁，岑風遞過去一支菸，兩人都點起煙，才開始談起話來。


    「台灣的森林多，林子裡原本住著許多精靈，遠離人類，和人類的世界互不干擾，但是，現在森林被破壞了，精靈無處可去，只好往人間跑，遇到氣場相近的人，就暫借此人的身體居住，所以很多人莫名其妙的生病，卻總是查不出病因。」


    「被靈界上身或被不好的氣場干擾，人為什麼會生病？」岑風覺得吳慕涵的話蠻有理的，於是繼續追問。


    「聖經裡面寫的，很多著了魔的人不是都生病了嗎？耶穌用手摸摸他們，他們的病就好了，那是因為耶穌把不好的氣場排掉了。可見得不論是魔帶來的不好氣場，或者是大環'
  mdcn: '才回到家，媛媛的身上開始發癢，玉嬋帶她去看醫生，吃了兩天的藥，身上過敏發癢的症狀緩和了些，但是，她的精神狀況似乎不太對勁，忽然沒來由的胡言亂語，還又哭又鬧的，跟她說話她好像都沒聽見。岑風和玉嬋一直哄著她，仍然無法讓她停止哭鬧，正不知該怎麼辦時，媛媛出乎意料的將自己身上的衣服一件一件的脫下來扔在地上，光著身子就要往屋外衝出去。


    岑風和玉嬋見狀簡直嚇壞了，立即上前將媛媛抓住，趕緊將衣服一一為她穿上。媛媛雖然乖乖穿上了衣服，但是仍然是一副神智不清的樣子，不停的哭鬧著，岑風守著大門不讓她出去，她就在屋子裡到處奔跑。


    媛媛從來沒有過這種情形，嚇得岑風和玉嬋慌了手腳，只好打電話給在台北某教學醫院擔任護理長的妹妹求助。媛媛的姑姑一聽，病情很不尋常，建議他們趕緊過來掛急診。於是，岑風和玉嬋連夜將媛媛從新竹送到台北，住進姑姑任職醫院所附設的兒童醫院就診。


    > 「這孩子有服用毒品嗎？」醫生問。

    > 「沒有。」


    「她會不會好奇跟著同學一起吸毒，你們當家長的被蒙在鼓裡？」

    「我女兒絕對不會吸毒！」醫生的懷疑令岑風不禁生起氣來。


    也難怪醫生會這麼懷疑，因為媛媛的行為就像吸毒之後的反應，醫生總要問個清楚，才好辨別病情。


    經過各種檢查，驗血、驗尿、照X光，一切都很正常，既沒有像醫生所懷疑吃錯過敏藥，也沒有服用迷幻藥，但是媛媛的病例上寫的是一「行為異常」。


    以「行為異常」住進醫院的媛媛，躺在病床上，反而顯得異常的安靜，不但不再哭鬧，還睡得很沉，想叫她吃飯、喝水，卻怎麼也叫不醒。岑風和玉嬋以為女兒哭累了、鬧累了，才會睡得這麼沉。就這樣在醫院睡了一天，看著好像沒事了，才出院回家了。回家的車上，媛媛仍然熟睡不醒；回到家，岑風抱她上床，她的眼睛都沒睜開過。


    媛媛這一睡，又睡了三天。三天以來不吃，不喝，不拉，還叫不醒。三天過後，她揉揉眼睛，悠悠的醒了過來，卻完全記不得這三天來所發生的任何事。這是李家惡夢的開始。


    媛媛生病了，而且還病得不輕。這第一次病發，從烤肉回來開始發燒，接著過敏，精神錯亂、哭鬧、脫衣、奔跑到昏睡不醒，最後醒過來，全程總共七天。從此，她每個月時間一到就會開始昏睡，從每月睡七天到六年後的一個月十五天。這時的媛媛也已經從一個小學三年級的小女孩，長大成爲一位國中三年級少女。


    雖然已經國三了，但是，不知是否因爲她大半的時間都在昏睡中度過，所以媛媛在醒著的日子裡，行爲舉止都像是小女孩一樣的天真，完全不像一位已經十六歲的少女，但是她因爲吃了許多中藥和西藥，身材卻有過度發育的現象。


    每次岑風和玉嬋只要看到活潑好動的媛媛，忽然變安靜，變傻，眼神呆滯起來，就知道即將發病了，果然，在意識不清之後，媛媛接著就昏睡不醒。如果，媛媛在學校上課，忽然發現注意力無法集中，老師說什麼她都聽不真切，變成一片嗡嗡聲，或是同學們下課時的嬉笑打鬧聲變模糊不清時，她會試著跟同學講話，但是張開大口，甚至用力大喊，同學都聽不見，這時，她就會趕快請假回家，即使老師不准，她也會堅持要回家，因爲她知道自已隨時都會失去意識，等她醒來，已經是十幾天以後的事了。


    媛媛就這樣躺著，若不是還在呼吸，玉嬋會以為她已經魂歸西天。


    內心的憂愁，使玉嬋多年來睡不安枕，每每夜裡會驚醒過來，連拖鞋都顧不得穿，就匆匆起身衝進媛媛的房間，急急的伸出手去摸摸媛媛有沒有鼻息，她最怕媛媛昏睡時會一覺不起。


    每次坐在昏睡的女兒身邊，摸摸她的頭，摸摸她的手，玉嬋的心中有一種深沉的悲傷和疑惑。悲傷的是不忍女兒這樣莫名其妙的昏睡，一個人每天利用三分之一的時間睡覺，那是正常的，但是連續不吃不喝不起床的睡上十幾天，這就不正常了。疑惑的是，這樣的昏睡，到底是媛媛身上哪個器官出了問題？是哪種疾病所引起的？竟然都查無原因。她這個做媽媽的若能夠爲心愛的女兒做什麼，好讓她趕快好起來，過正常人的生活，她什麼都願意去做。六年來她和丈夫岑風已經心力交瘁，但他們從不放棄，只要有人介紹哪裡有好醫生，他們都會帶女兒去就醫，但是，始終沒能查出女兒的病因。如果媛媛真是生病了，一定會有原因的，因此，讓她感到很疑惑。


    此刻，夜裡三點，玉嬋緊緊握著昏睡中女兒的手，看著她熟睡中沒有表情的臉，眼淚不禁撲簌簌的落下來。在媛媛床沿坐了一會兒後，玉嬋搖搖熟睡中的女兒，媛媛嘟嘟噥噥的發出聲音，但是並沒有醒來，玉嬋輕輕的把女兒從床上拉起，媛媛並沒有反抗，玉嬋再扶著媛媛下床，半扶半攙的帶她去上廁所，然後幫女兒穿好褲子，帶她回床上睡覺。在整個過程中，媛媛始終閉著眼睛沒有醒來。雖然這樣，玉嬋仍然每天帶女兒到浴室去洗澡和上廁所，以維持媛媛身體的清潔和衛生。


    看媛媛又睡回床上，玉嬋把女兒床頭擺著的餅乾換上另外一種口味，把玻璃杯裡的水也重新換過。在媛媛床頭準備點吃的和喝的，是六年來的習慣，這是以防昏睡中的媛媛，忽然醒來時若肚子餓了，一伸手就可以找到東西吃；但是，在昏睡期間媛媛是不吃東西的，岑風夫婦和兒子強強，剛開始很擔心，怕她不吃不喝會餓死或渴死，所以一直硬塞食物到她嘴裡。媛媛有時會吞下這些食物，也會迷迷糊糊的回答家人跟她說的話，但是，大多數時候她都將食物推開，因爲她一點也不餓，她只想睡覺。當她真正醒來時，問她這些事，她又完全記不得。


    儘管如此，吃下去的食物畢竟有限，又怕會噎到發生危險；何況後來媛媛也不肯吃，也就不勉強她。家人看她不吃不喝竟也活得好好的，也感到很奇怪。


    今天是媛媛昏睡的第十一天了，不知道她還要睡幾天才會醒來？或是就這樣永遠躺著醒不過來？玉嬋想到這裡不禁悲從中來，把女兒的手貼在自己的臉上，眼淚濕了媛媛的手指。看著媛媛那正在發育的身體，很明顯的又瘦了一圈，心疼加上心酸，讓玉嬋回到自己床上時，眼淚還沒止住。岑風不捨的摟住她，有一位這樣的女兒，對他們來說，是一種煎熬，也是一種考驗，所以他們算得上是一對患難夫妻；為了治療女兒，他們的確是夫妻共同，而且盡心盡力。


    一覺醒來，伸了個大大的懶腰，媛媛覺得肚子好餓呀！


    什麼？這次整整睡了半個月，慘了！月考又沒參加，老師和校長一定會對她吹鬍子瞪眼睛，她又得補考，麻煩大了！


    媛媛醒來了！這可是李家的大事，表示媛媛又從鬼們關裡平安的逃了出來。岑風鬆了一口氣，玉嬋鬆了一口氣，和媛媛姊弟情深的強強也鬆了一口氣。


    從媛媛開始有甦醒跡象，嘴裡不斷的發出嗯嗯啊啊的聲音，強強就一直守在姊姊身邊，他一見姊姊醒過來了，就趕緊遞過去一杯水，媛媛才喝第一口，強強就開始在她耳邊絮絮叨叨的說個不停，報告這次昏睡期間他對她說了什麼話？為她做了什麼事？


    「哪有？」媛媛一律以這句話回答。她真的是一點印象也沒有，連媽媽帶她去洗澡、上廁所，她都不記得了，怎會記得弟弟跟她說什麼？


    每次昏睡醒來，因為沒有進食，媛媛都會瘦個五、六公斤；睜開眼睛後，她立刻感到飢腸轆轆，媽媽早已煮了好吃的等著幫她進補，她也老實不客氣的大吃一頓。上學時她還會在書包裡擺許多零食，大包小包的像要去遠足一樣。下了課，她就吃個不停，上課時也偶而會偷吃幾口，她實在餓太久了。瘦了一圈的身材，在她下次昏睡前又會胖回五、六公斤。


    「妳到底生什麼病啊？」同學們常好奇的問她。

    「妳請假，只是在家睡覺嗎？」老師、主任和校長也很懷疑的問媛媛。


    她知道，六年來爸爸和媽媽能做的都做了，為了她的病，家裡也花了不少錢，雖然如此，但是爸爸和媽媽從來都沒有放棄過她，還是經常帶她東奔西跑的到處治病。


    她記得剛發病的那幾年，爸爸媽媽只要聽人說哪家醫院好，哪位醫生行，就會帶她去看，所以中醫和西醫她都看過，不過中醫和西醫都找不出她的病因，中醫要她吃四物丸，吃了一年，並沒有治好她的昏睡；台北最大的教學醫院有名的婦科醫生也跟中醫一樣，認為她「轉大人」轉不過，給她按上「經前症候群」的病名，開了避孕藥給她吃，調節她體內的賀爾蒙；媛媛吞了許多賀爾蒙，同樣也沒治好她的病，甚至連病因都是猜測的，但是卻使她的身體過度發育，擁有一副超出少女該有的凹凸有致的身材。


    中醫和西醫都束手無策，爸爸和媽媽開始尋求一些民間的療法，只要有親戚朋友介紹，他們都去嘗試，所以各種偏方也吃了不少，可是每個月時間一到，睡蟲照樣上身，一點也不管用。非常鐵齒的爸爸，認爲自己是知識分子，向來不信怪力亂神，常說這些都是迷信，但是心急女兒的病又無計可施，也開始在親友的介紹下，求助於神明的幫助，相信媛媛是因爲中了邪，才會生這種怪病，盼望法力高強的人可以幫她驅邪。


    求神的事，似乎一開始就無法停止，因為看了這間寺廟，這位神明無效，總抱著下一間神壇或道觀的神仙，可能會有有效的希望；因此，他們從台灣頭看到了台灣尾，不知燒了多少紙錢，添了多少香油錢，花了多少作法會和超渡亡靈的錢，病情依然沒有改善。


    媛媛記得爸媽花了最多錢的那一次，也是一位親戚介紹的，說那間廟有多靈，爸爸抱了無限的希望，把全家都帶到高雄鄉下那間很大的廟裡，去尋求道士的幫助。乩童在神明附身以後，告訴爸媽說是她的身邊有兩位去世親戚的亡靈緊緊跟隨著，要求超渡。岑風夫婦也只能姑且信之，但是道士作法和超渡的花費不便宜，爸爸和媽媽東拼西湊的付了錢，結果媛媛的病情仍然絲毫沒有好轉。


    白花花的銀子就這麼大把大把的花出去，每次都像丟進水中一樣不見了蹤影。要說爸爸和媽媽不灰心，那是騙人的，但是為了醫好她的病，爸爸和媽媽什麼都願意去試，至少那也是一線希望。但是，久而久之，岑風對降魔、驅邪、超渡、收驚、法會等也漸漸失去信心。


    家中一向平靜的生活，因為她的病全亂了腳步。媽媽是公務人員，每天要按時上班，除了假日，平常帶她看病的重任就落在爸爸身上。爸爸開的印刷廠這幾年生意也莫名其妙的一落千丈，因此有很多時間可以陪她去看病。在多年到處奔波求醫均宣告無效之後，爸爸和媽媽商量的結果，決定走回正統醫療的路子，看看能不能查出病因。


    新竹並沒有什麼大醫院，要查出病因還非到台北不可，於是，父女倆經常奔波於新竹和台北之間，去找親友介紹的教學醫院的名醫，在某醫院看婦科，查不出原因後，經人介紹又到另一家看精神科，經過一段時間的檢查，仍然不知病因何在，倒是吃了不少冤枉藥，對病情一點改善也沒有。爸爸和媽媽天天看她吃一堆藥，心裡實在擔心得不得了，深怕這些不對症的藥會有許多副作用，更加影響媛媛的健康。


    最後，各處求醫讓爸爸和媽媽精疲力盡，於是，他們回到原點，再回頭去找媛媛的姑姑。小學三年級第一次發病時，爸爸媽媽就是將她送到姑姑服務醫院附設的兒童醫院就診，現在她已經長大，不再是兒童，因此姑姑就介紹她到本院看新陳代謝科。醫生在仔細聽過病情後，建議媛媛看腦神經內科。


    從此，媛媛成了這家醫院腦神經內科的長期病號。媛媛是腦神經內科王主任的病人，王主任爲她做了所有該做的檢查，像清醒腦波、睡眠腦波、腦斷層攝影、核磁共振⋯⋯等等，結果顯示腦部一切正常。在沒查出病因之前，王主任無法爲媛媛治療，只能針對她的症狀，即她在昏睡前的劇烈頭痛，開些幫助血液循環的藥來緩解疼痛。


    對媛媛的病情，王主任一直在進行著長期的觀察。他要她在沒昏睡的期間，每週來看一次門診，還囑咐她每天寫日記，記下生活中的點點滴滴，每週來向王主任報告。王主任每次都帶著六位醫生一起聆聽媛媛一週來的生活內容，想從她的日常活動中找出蛛絲馬跡，用來研判可能的病因。但是長久以來，一點進展也沒有。


    六年了，媛媛從病發至今已經過了長長的六年時間。在這六年裡，她也曾有一段長期的清醒，那是她念國一那一年，幾乎有一年的時間病情沒有發作，全家人都以爲她痊癒了，但是忽然有一天她又開始昏睡，再次發病，情況更嚴重了，她從每個月昏睡七天，變成九天、十天、十三天到十五天，似乎一發不可收拾。


    媛媛清楚的記得，暫停一年的昏睡症再度復發的那一天，是一個星期天。爸爸帶著全家人一起去喝喜酒。爸爸開著車，車子搖呀搖的在路上走著，媛媛和強強很快就睡著了。快到鄉下親戚家時，媽媽才叫醒她和弟弟。下車時，他們經過一條巷子，有一戶人家正在辦喪事，她打從喪家門口走過時，忽然覺得一陣恍惚，在無意中，彷彿看到了一個黑影一直在向她招手，一時之間她全身都起了雞皮疙瘩，從頭到腳都感到非常不舒服。


    媛媛立刻大聲呼叫走在前面兩三步遠的媽媽，但是她雖然張開大口卻發不出聲音，所以媽媽根本沒聽到。她只好勉強撐著，跟在媽媽後面走，想追上前去，卻一點也沒力氣。


    進了餐廳，媽媽慢下了腳步，她伸手抱住媽媽，意識開始不清楚起來，頭也漸漸昏沉，滿桌的山珍海味她一口也吃不下。爸爸看到她眼神呆滯、渙散，心想大事不妙了，很擔心的問道：


    「想睡？」


    這時媛媛已經快失去知覺，她張開口，說不出來，但還能用最後一點力氣朝爸爸點點頭。


    「完了！」岑風和玉嬋心中暗叫一聲慘了。


    一切又重來了，而且病情更加嚴重。舊病復發後，昏睡的天數比以前更長久。醒來後要面對老師和同學更加奇異的眼光，尤其對年輕的男老師，簡直不知要如何解釋她為何總是請假去看婦科，因為老師會認爲即使生理痛，也不至於需要在一個月內請半個月的假，所以老師始終認爲媛媛是在逃避壓力和考試。跟老師有理說不清，又提不出病假證明，媛媛覺得好委屈，生的是什麼病，她自己也不知道。經常請假是不得已的，校方跟家長溝通又無效，有時候爲了阻止她請假，老師會叫她在教室外的走廊罰站，讓她傷心得眼淚直流。


    站在走廊上，來來往往的同學會對她指指點點，令她無地自容。生病已經很委屈了，查不出病因，無法治療，更是令人困惑，加上老師不諒解，媛媛的內心深處其實是很沒有安全感也很悲傷的。


    媛媛國三了，但是岑風和玉嬋從來沒有要求女兒要有好的成績，能否考上好的高中，他們更是不敢期待。夫妻倆最大的心願，就是希望媛媛能夠平安順利的長大，要先有這條命，才能考慮教育、前途以及其他的人生規劃，若命都沒了，其他的就免談了。


    是緣分吧！在媛媛昏睡了六年，岑風和玉嬋也早就認命之後，他們竟在一位老朋友的介紹下，認識了吳慕涵。


    學校放春假，媛媛正值清醒期間，於是和弟弟強強一起北上，到台北近郊的外婆家玩。阿姨玉露一時興起，帶他們姊弟兩一起去逛百貨公司，買了大包小包的東西，提得手都痠了，腳也走累了，又不甘心這麼早回去，就叫了一部計程車，到玉露大學時一位要好的同學明麗家裡。


    明麗家是玉露最常來的地方，她養的那隻獵犬阿威，家中來了客人從來都不亂吠，誰來牠都歡迎，跟玉露尤其要好，總是黏著她跟前跟後的。但是說也奇怪，那天玉露一踏進門，阿威竟然狂吠不止，嚇得她和媛媛姊弟倆動也不敢動。明麗見狀，大聲喝止也沒有用，只好把阿威關在後陽台，牠才停止吠叫。


    更奇怪的是，玉露他們來到明麗家時，她正在電腦前面打一篇文件，只是起身去開個門，然後把阿威拉到後陽台去，再回頭竟然發現她的電腦當機了。這是從來不曾有過的現象，明麗先關了電腦，去廚房為客人準備飲料，玉露也跟了進去。


    「媛媛是不是每個月都會昏睡的那位？」明麗問。

    「就是她。」玉露回答。

    「媛媛身上真的有事，可能被靈界附了身。」

    「你怎麼知道？」

    「你聽說過嗎？狗的眼睛是看得見的，你什麼時候見過我家阿威又吼又叫的，一定是看見了什麼東西，狗很靈的。還有，我的電腦也當機了，也是因為受到干擾。」


    「電腦會因為這樣而當機嗎？」

    「會的，你別不相信。」

    「我姊和我姊夫該做的都做了，你又不是不知道，還能怎樣？」

    「我最近認識一個很特別的人，他姓吳，這個人可以直接和靈界溝通，是領了靈界執照，專門解決靈界問題的異人。」

    「天底下還有這種人？」

    「有，不多就是了。」

    「是法師或是道士嗎？」

    「都不是，是一位很正直，很有個性也很有修為的人，他不僅有特異功能，還負有幫助靈界朋友回家的任務。我跟他認識雖然不久，但是我的舅舅跟他很熟，聽我舅舅說，這位有特異功能的吳先生，一、二十年來救了很多醫生都醫不好的疑難雜症，被他救過的人，有的要幫他蓋廟，有的要幫他建道場，也有人要花大錢買房子給他，他一律拒絕，這個人不是斂財之徒，不隨便貪人家的供養，也不開價，不要名，不要利，被他救過的人隨緣包一點紅包給他，他就這樣一個人過著清貧又清淨的日子。」


    「那可真是難得，現在有一點神通力的人，就假宗教之名，自創門派，佔山爲王，自稱教主，開名牌轎車，住豪宅，奇怪的是還有很多人傾家蕩產的把一切都奉獻給這種宗教騙子。」

    「吳先生真的是一位奇人，他對目前宗教的亂象很無奈，也很痛心，但是又無法力挽狂瀾，只能做好他自己該做的事。」

    「媛媛既然有這方面的問題，你就好心點，幫我們介紹一下吧！」

    「你盡快帶媛媛去給他看，反正你們也到處都看過了，不差不多看一位，頂多沒效而已，不過，我相信這次應該會有效，這個人是真正有功力的。」


    明麗立刻拿起電話打給吳慕涵，他正好在家，於是飲料也顧不得喝，就由明麗開車，四個人直奔吳慕涵的住處。


    「妳身上有事，妳家也有事，這種情形我要先到你家去，把家裡的問題解決了，看妳才有用，不然我現在把妳看好了，妳又回家去，我不是白看了嗎？」


    吳慕涵看到媛媛後對她這樣說，並叫她回家去徵求父母的同意。


    媛媛回家向爸爸報告這件事，六年來岑風也遇到很多高人，那些高人都沒能治好媛媛的病；但是他不排斥再見見吳慕涵，因為就像明麗說的，看不好也沒什麼損失。


    岑風專程開車從新竹到台北，來接這位異人到他們家中去。初見吳慕涵，岑風並不覺得這位皮膚黝黑的中年人和其他高人有什麼不同。說真的，他對眼前這位穿著普通，腳蹬涼鞋的人，第一眼並沒有什麼好的印象。


    車子開上高速公路，初次見面的陌生感讓兩個人都不大願意開口。一直到了休息站，停下車兩人去上了廁所，出來後站在車旁，岑風遞過去一支菸，兩人都點起煙，才開始談起話來。


    「台灣的森林多，林子裡原本住著許多精靈，遠離人類，和人類的世界互不干擾，但是，現在森林被破壞了，精靈無處可去，只好往人間跑，遇到氣場相近的人，就暫借此人的身體居住，所以很多人莫名其妙的生病，卻總是查不出病因。」


    「被靈界上身或被不好的氣場干擾，人為什麼會生病？」岑風覺得吳慕涵的話蠻有理的，於是繼續追問。


    「聖經裡面寫的，很多著了魔的人不是都生病了嗎？耶穌用手摸摸他們，他們的病就好了，那是因為耶穌把不好的氣場排掉了。可見得不論是魔帶來的不好氣場，或者是大環'
