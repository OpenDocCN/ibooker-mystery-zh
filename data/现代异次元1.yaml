    正當書廷陶醉在古琴清奇透靜的旋律中時，院子的柴門咿然而響，他微微抬起頭，看見妻子秀瑾帶著女兒小珊推門而入，他即刻起身，迎了出去。在他起身的那一剎那間，感覺身子輕輕的搖晃了一下，最近幾年他每次鼓琴後起身都會如此，他以爲只是坐久了忽然站起來所致，所以並不在意。


    就在他起身的一剎那間，蓉蓉從他身上脫離出來，輕飄飄的又進入小珊的身體裡。小珊頓時覺得一陣寒意襲來，不禁打了一個冷顫。她經常有這種感覺，已經習已爲常，所以也不去理會。


    「感冒了，小珊的喉嚨發炎紅腫，江大夫開了藥，囑咐要多喝水。」


    「來，爸爸弄藥給妳吃。」


