    # 陰飛蛇


    華燈初上，台北市車如流水。


    陷在擁擠的車陣中，若梅的心情有點浮躁。扶著方向盤的手，不停握起拳頭，當她發現自己這種不由自主的習慣性動作時，立刻調整坐姿，放開手指，將收音機轉換頻道，原來的路況報導馬上變成輕快的音樂，使她的心情稍微放鬆了些。


    每天下班，必定遇到塞車的交通顛峰時段，她的耐心總在這時候發揮到極致，等到車子牛步似的擠出擁擠路段，開上往郊區的回家路上時，在辦公室裡衝鋒陷陣，以及在車流中聚精會神武裝自己的高昂情緒，開始慢慢的瓦解。


    等到若梅那輛紅色的歐寶車彎進座落於半山腰的別墅社區，家門在望時，她的情緒就像洩了氣的皮球般的低沉，疲憊感席捲全身。將車停進車庫，要進門的剎那，她甚至有點裹足不前，似乎再多走一步，就會跌入無底的深淵中，無法自拔。


    「太太，妳回來啦！」


    聽到若梅車子的聲音，菲傭漢娜已經等在門口迎接。


    「先生剛才打電話回來，說他晚上有應酬，不回家吃飯。」漢娜用英語對正在脫高跟鞋的若梅說。


    「小寶呢？」若梅將車鑰匙放在鞋櫃上，抬頭往二樓望去。


    「他的功課寫完了，在房間裡打電動，今天沒聽到他叫痛。」


    若梅微笑點了一下頭，漢娜才又鑽進廚房去忙晚餐。若梅上樓，走到小寶的房門口，小寶背對她，正在打電動，並沒有發現媽媽站在他背後。


    從兒子的背影看去，若梅感受到小寶進入電玩世界的專注，她不忍打斷他，因為兒子只有在這種短暫的忘我時刻裡，才能享有童年的歡樂。


    小寶從三、四歲起，沒來由的患了俗稱「纏腰蛇」或「飛蛇症」的帶狀疱疹，始終治不好，這種沿著神經生長的帶狀疹，似乎一發生就永遠無法醫治般，像陰魂纏身似的怎麼也趕不走。


    已經八年了，八年來若梅帶著小寶看遍了中西名醫，也吃盡了所有親朋好友介紹的偏方，更塗盡了各方推薦的藥膏，但小寶背腰上的蛇疹就是好不了。每次發病，那如米粒大的疹子，看了實在嚇人，更難過的是那種錐心的刺痛，讓小小年紀的兒子哀哀嚎叫，她這個做母親的卻只能在一旁陪著流淚，她的心比小寶的疹子還疼。多少次她祈求上天，願意替兒子承受這種痛苦，但是兒子的痛依然如舊，使她不知道該怎麼辦才好。


    八年了，兒子的病時好時壞，醫生說是小寶幼兒時長水痘留下來的病毒，只要身體的抵抗力弱就會發病，而且這種病沒有所謂痊癒可言，只要不發就是好。小寶發病時，不一定每次都會長疹子，但是疹子雖然沒長出來，不過沿著神經帶仍然會疼痛，那種痛也同樣令人痛不欲生。小寶十二歲了，一想到這種病要折磨他一生，她這個做媽媽的心情就異常沉重。


    最讓她想不透的，是小寶的身體一向很好，從小到現在一直是一個健康寶寶，說他是因為抵抗力弱，才會讓體內的殘留病毒不定時的肆虐，令她很懷疑；醫生說的其他可能原因，像壓力大、工作勞累、營養不良、長期睡眠不足等，都沒發生在小寶身上，所以他的病是怎麼來的，醫生也說不出個理由。


    志高請客戶吃過晚飯，回到家已經晚上十點多。


    換下了西裝，穿上舒服的家居服，至高牽著若梅的手，夫妻倆一起到小寶的房間去看他。小寶那熟睡的小臉，紅潤潤的，真是可愛。這星期小寶的情況算是很好的，身上不痛，可以好好睡覺，讓志高和若梅很欣慰。小寶發起病來的時候，止痛藥也止不了那種劇痛。在那樣的夜晚，志高和若梅總是陪著兒子徹夜難眠。


    他們輕手輕腳的回到自己房間，若梅在浴缸裡滴了幾滴植物精油，頓時浴室裡充滿了來自大自然的香氣。志高放鬆的泡在浴缸裡，若梅幫他在肩、頸上按摩。


    志高一邊享受著妻子柔嫩的手滑過肌膚的溫存，一邊敘述著今天為公司敲定的那張外銷訂單的事。若梅為志高的業績感到高興，她知道丈夫的能力。從前他們夫妻倆一起經營一家玩具工廠，廠裡有一百多位員工，內銷和外銷訂單接不完，常常還要委託同業代為加工。但是四、五年前，有幾筆大額的資金週轉不靈，替人做保又被牽連賠了一大筆錢，在這種倒楣的情況下，財務經理又捲款逃走，逍遙國外，使得整個工廠雪上加霜，勉強又撐了一年多，最後還是支持不下去，將公司轉手他人。


    志高和若梅雙雙失業，但兩人都學有專精，很快就找到工作；志高擔任一家貿易公司的業務經理，最近又榮升爲總經理，若梅在一家規模頗大的外商公司擔任總經理的英文秘書。他們雖然生活無缺，但是志高總有龍困淺灘之憾，總希望有一天能夠再創業。


    「哦！對了，王董事長家明天辦了一桌素宴，特別邀請妳去。」志高說。


    「你們王董又不吃素，爲什麼請吃素齋？」


    「不久前王董一位老朋友到公司來，這位吳先生走進他的辦公室時，我正好在裡面，王董都還沒替我們介紹，吳先生就開始打嗝，還嗝個不停，聲音時大時小，中間還會停頓，聽起來好像是在跟人對話似的，嗝聲一停，他就問王董，你的辦公桌擺在這裡多久了了，王董回答他說前年重新裝潢辦公室時，就把桌子搬到這裡了。」


    「王董的辦公室布置得很雅致，桌椅都是進口傢俱，很氣派的。」


    「氣派有什麼用，那位吳先生問王董是不是搬了辦公桌後，公司就開始不順利？王董想了一想說，是啊！這兩年不但生意不好，公司裡有幾筆帳一直收不回來，加起來有三千多萬，有夠他煩惱的。」


    「幸好你今天談成了一筆大生意，王董一定很高興。」


    「先不說這個，這位吳先生要王董把辦公桌向左邊挪過去一些。」


    「你們董事長也信風水啊？」若梅不以爲然的說。


    「我們當場就把桌子挪了過去。」


    「結果呢？難道這樣帳就收回來了嗎？」若梅有點不屑的問。


    「說也奇怪，才兩個月不到，三千多萬的應收帳款不但全都回來了，收到的還是即期支票，最近公司生意也好得不得了。」


    「你的意思是今天談成的那筆生意，都是因爲董事長搬了辦公桌的緣故？」


    「當然這是我的努力，不過這不是很神奇嗎？不全是巧合吧！」


    「我相信我老公的能力，你們董事長也太迷信了吧！連這樣也要請吃素齋！」


    「請吃素齋是因爲主客吳先生吃素，董事長希望大家見見他。妳去不去？是家庭聚會哦！每位主管都要帶家眷的。」


    「王董請客當然要去，但可不是為了要見那位吳先生。」


    「認識一下也無妨，聽董事長說，這位吳先生是很有修持的人，道行很高，能通陰陽兩界⋯⋯。」


    若梅沒有找理由拒絕出席，志高衷心的感謝，因為她一向不信這些，還認為特異功能、鬼神、陰陽界、乩童、附身、地理、風水等這些玄之又玄的事，都是神棍騙人的把戲，她從小就是個無神論者，向來不信上帝、佛祖、耶穌、真神阿拉等。


    前幾年，大伯、二伯、三伯家裡都不太順利，連連發生一些事故，志高的事業又垮了，還有小寶生病的事，親戚朋友都說是家裡祖墳出了問題，婆婆特地請了一位風水先生到老家去看，也到墳上去看過，為此，還請了道士來做法，燒了許多紙錢，花了幾十萬，結果情況不但沒有好轉，反而變本加厲，前年一年之內，二伯一家祖孫三代的男丁，都不幸相繼暴斃，嚇得婆婆從此每天吃齋唸佛。這事一傳開去，婆婆出再高的價錢，也沒有風水師敢接這筆生意，沒有人敢去動他們張家的墳。若梅是張家最小的媳婦，這種事根本沒有她講話的餘地，否則她會說這些都是迷信，有哪一家的祖先會這麼整子孫的，她相信任何人的祖先都希望自己的後代子孫福蔭綿延，昌隆興盛，所以祖墳出事之說，她是完全不信。


    近年來，國內的宗教興盛，她雖不信教，但是並不排斥宗教，她認爲宗教有規範和教化人心的作用，也提供人們一個澄清心境，暫時放下世間俗事的避風港灣，讓人們精神有所皈依，是相當不錯的；不過近幾年來有些特異功能人士自創教派，建立大道場，以身、發光、賣蓮花座來騙財，她就非常反感。還有不時鬧上新聞的神棍騙財騙色事件，也讓她覺得怎麼有人這麼傻，這麼容易受騙，把身家財產都賠進去了，才發現受騙上當，太不可思議了。


    因為有了這樣的認知，讓若梅對所謂的特異功能人士，都存有先入爲主的不良印象，所以她會答應去赴董事長的飯局，志高感到很意外，他其實已經爲若梅不能出席編排好理由了，沒想到竟派不上用場。


    「家庭聚會，那小寶也要去囉！我提前一個鐘頭下班，先去接小寶，我會叫他在學校把功課先寫完。」


    「謝謝妳。」志高憐愛的拉起若梅的手，吻著她的手心和手背，他知道若梅完全是爲了陪他應酬，絕不是爲了想見那位有特異功能的吳先生。


    這些年他們攜手走過許多艱困的日子，若梅一直是他精神上最大的支柱，如果不是她一路上相扶相攜，他很可能在玩具工廠轉手讓人時就崩潰了。


    浴室裡溫暖的熱流和大自然清新的香氣，提昇著愛的溫度，若梅也脫下睡衣，泡進浴缸裡，讓柔軟的水和恰到好處的水溫，釋放身心的疲勞。


    在董事長家見到吳慕涵時，若梅還真是吃了一驚，因為他跟她想像中的模樣相差了十萬八千里。


    「這位是吳慕涵先生，這位是張總經理的夫人。」


    一進門，王董事長就忙著為她介紹吳慕涵，她伸出手去與他相握時，握到的是一隻粗糙的大手掌，看到的是一位蓄著長髮，黑黑壯壯的中年人。吳慕涵這位王董事長口中很有修持的異人，給她的第一個印象是，他很像住在台灣高山上的原住民，也像尼泊爾或西藏山區的少數民族，更像中南美洲的印地安人，完全不是她想像中仙風道骨或長髯飄飄的模樣。


    用餐時，吳慕涵的表現更令她驚訝，因為他不但抽菸，還喝酒，喝得臉紅脖子粗之外，還加上酒話連篇，說話的音量蓋過在場的每一個人。


    「媽，那位長頭髮的吳伯伯好像醉了。」小寶小聲的在若梅耳邊說著。


    「這位吳先生怎麼看也不像是一位有修持的人。」若梅也在心裡這樣想著。


    「張經理，張太太，敬你們。」這時吳慕涵忽然向若梅這邊舉杯。「你們一定覺得很奇怪，看到我又喝酒又抽煙的，不像一位修行人；其實，修行人是別人說的，我自己從來不這麼認爲，我又不是出家人，沒受五戒，菸酒不禁，跟朋友在一起喝幾杯，大家盡興，氣氛也熱絡些。況且，修行，修的是心，是意念。」他說著用手指向自己的頭和胸口，接著又說：「很多人，只修口，吃齋、戒煙酒，卻不修心，反而愈修愈糟。」


    吳慕涵的這番話，讓若梅嚇了一跳，因為這分明是針對她剛才心中所想的回應，難不成吳慕涵真的有神通！


    「吳先生的話，有道理，敬您。」志高站起來舉杯，若梅只好跟著站起來。


    吳慕涵喝了一大口酒，然後不經意的看了小寶一眼，有意無意的說：


    「張小弟是個小帥哥，可惜病魔纏身。」


    這句話聽得若梅心中又是一驚，素昧平生，初次相見，吳慕涵竟能一眼看穿外表活潑健康的小寶身染惡疾。這話立刻在若梅心中起了漣漪。


    「這個當爸爸的也好不到哪裡去，天天腰酸背痛。」吳慕涵看著志高又說。


    「吳先生真是高人。」志高趕緊立正站好，訝異得說不出話來。


    「張總，飯後你們好好聊聊。」董事長接口說。


    用餐前，王董特別央請吳慕涵幫他的愛將志高一家人看一看，所以吳慕涵才會藉機會開口，否則他向來是不主動的。


    「待會兒再向吳先生討教，請吳先生指點迷津。」


    飯後，客人們都移到客廳，各自散開，三三兩兩的坐下來喝茶、聊天。


    吳慕涵和志高一家人圍著一個小茶壺坐著。


    「張總，你會頭痛、腰背酸痛，晚上睡不好，經常惡夢連連，像演連續劇似的，半夜起來上廁所之後再睡，夢還會繼續不斷的演下去；妳太太的毛病跟你完全一樣，至於你兒子，他腰背上也有種時常會痛的毛病，痛到連止痛藥都止不了。」吳慕涵很仔細的看著志高，不禁皺起了眉頭說道。


    在吳慕涵的凝視中，他已經感應到志高全身的訊息，包括身、心、靈和陰宅、陽宅、因果業障，甚至身上是否有外靈存在，他都一清二楚。


    「吳先生你真高明，說的全對，有什麼辦法可以解決嗎？」志高趕緊問。


    若梅這下不得不服了，她現在承認眼前這位貌不驚人的吳慕涵的確是一位高人，竟能在志高的身上讀出全家人的訊息。


    「你們家兄弟幾人？」吳慕涵又問。


    「我們有四兄弟，我排行老么。」志高回答。


    「爸爸皮夾裡有我們全家合照的相片。」小寶插嘴說。


    「可不可以給我一下？」


    志高掏出皮夾，從裡面抽出一張相片，相片裡密密麻麻的擠了兩排人，後排的站著，前排坐著。


    「中間的是我奶奶，吳伯伯，你看，這是我。」小寶指著相片中一個年約三、四歲的小孩說道。


    「哇！這是小時候的你喔！好可愛！」


    「吳伯伯，媽媽說這時候我還沒有生病，我的病是會很痛的帶狀疱疹。」小寶天真的說。


    「這位、這位⋯⋯還有旁邊這個小孩，摸不到訊息，是不是不在人世了。」吳慕涵用手去感應相片上的每一個人，最後指著其中三個人問道。


    志高一聽，驚訝得張開了嘴，若梅更是紅了眼睛；因為吳慕涵指的那三位，正是二伯一家祖孫三代。


    「他們都不在了，這是我二哥，前年心肌梗塞暴斃，他唯一的兒子開車載著媳婦和孫子，在高速公路上出車禍，兒子和孫子當場死亡，媳婦重傷，經過急救開刀搶回一條命。」志高很悲痛的說，這件事公司裡沒有任何人知道，吳慕涵能一語道中，實在讓他驚奇。


    「你們這一房，一定也出過問題，事業和健康都出了狀況。」


    吳慕涵說著，他已經在虛空中看到了張家祖墳的情況。他要了一張紙，拿出筆來在紙上畫了一個墳場，墳地上有幾門橫七豎八的墳墓。


    「這個墳是誰的？」吳慕涵指著其中的一門墳墓問道。


    志高和若梅再度驚奇的對望了一下，因為吳慕涵畫的墳正是他們家祖父的。驚愕之餘，志高一五一十的將祖墳出事，請人做法之後，他二哥祖孫三代一年內相繼暴斃的事說了出來。


    「這門墳墓，受到一股很強大的煞氣干擾，不但亡者不安寧，連後代子孫也不平安，所以你們家族才會連連出事。」


    「吳先生，既然我們有緣相識，請您務必幫忙化解。」


    「我已經指出問題所在，當然要幫你們消災。我必須去看你們祖墳，而且你們三兄弟都要在場，你先跟家人商量，大家都同意了，我才去。」


    「吳先生，謝謝您。」


    吳慕涵和志高的對話，若在以前若梅不但不會相信，還會覺得很可笑，但是今天聽來，讓她彷彿進入另一個時空，聽聞到另一個世界的事。從前的認知，在剎那間都被擊碎，她忽然感到人外有人，天外有天，宇宙間有太多事，是人的境界所無法進入和了解的，像吳慕涵這種人大概就是兩界之間溝通的橋梁。


    吳慕涵的特異功能的確令她震撼。喝酒使他的臉漲紅，但他的眼神仍是那麼清明，彷彿裡面有一個人的境界所不能理解的領域，那個領域是一般凡夫俗子永遠踏不進去的一片淨土。


    志高和若梅為了祖墳的事，專程南下回到鄉下老家，把全家人都請到家中共商大計。其實家中每位成員都知道祖墳出了問題，只是苦於找不到敢來處理的人，現在好不容易有人願意來為祖墳把脈，婆婆當然很高興，兄弟們也都沒有意見，大家擔心的是吳先生不知會如何處理？因為村前的阿福伯家，前一陣子也因爲祖墳出事，地理師建議他們遷墳，花了一百多萬。大家商量的結果，只要能解決問題，讓全家平安、順利，花錢沒有關係，即使要遷墳，他們也願意照辦。


    全家都無異議通過之後，志高通知了吳慕涵。他選了一個合適的日子，由志高和若梅陪同，買好機票，恭請吳慕涵南下；那天張家也全家都到墳地集合。


    吳慕涵到了張家祖墳一看，墳墓的位置以及周圍的環境，果然跟他畫在紙上給志高看的一模一樣。其實他還沒走到，遠遠的就感覺到一股強烈的煞氣，當他走近時，這股煞氣如泉湧一般撲面而來。


    這股煞氣像天羅地網般將張家的祖墳團團包圍住，看去簡直就是一片烏雲罩頂，不見天日。墳墓邊的皇天、后土立碑，也都剩空位。鎮守墳前的土地公，早就不敵這股煞氣，被逼離開，在一旁乾著急。這座陰宅裡的張家祖先，那就更不必說了，不但被煞氣逼得無處可去，還被傷得魂飛魄散，更可憐的是被趕了出去，在四週徘徊流浪，無家可歸；陽間的子孫們，也幾乎個個都受到這種不好的氣場所影響，有的疾病纏身，卻查無病因，常年看病吃藥，也不見好轉；有的莫名其妙經常出些大小意外，防不勝防；最慘的是有的會忽然暴斃，令家人傷痛欲絕。會落到這步田地，主要是因爲拖了太久，一直沒有解決，讓煞氣越積越多，最後到了難以收拾的地步。


    吳慕涵站在墳前，觀察著張家陰宅和四周的環境，一語不發。


    張家全家大小站在墳地的四周，每個人都覺得胸口發悶，呼吸困難，不過人人都強忍不適，聚精會神的注視著吳慕涵的一舉一動。若梅扶著小寶站在志高身邊，她臉上愁眉不展，小寶也臉色慘白，因為這兩天小寶又發病了，而且才一天的功夫，疹子就長得像米粒一般大小，這種情形幾乎是八年來最恐怖的一次。劇痛加上水疱，讓小寶在醫院躺了兩天，今天是特地從醫院請假出來的。小寶一臉的疲憊困頓，眉頭深鎖，站在風中搖搖欲墜，若不是若梅扶著他，他幾乎要站不住了。小寶的情況令若梅心如刀割，志高也心急如焚，大家都寄望吳慕涵能夠解救張家的劫難。


    張家兄弟們也都心中有數，有高人來指點迷津，讓他們脫離苦難之前，障礙會更大，身上有病痛的會更加劇，這是障礙離去前的臨門一腳。志高和若梅的腰，這兩天都痛得快直不起來；大哥的血壓高得令人捏一把冷汗；三哥莫名其妙的跌得鼻青臉腫；張老太太的頭也痛得要裂開一般，但大家仍然打起精神很虔誠的在一旁站著。


    吳慕涵在墳地四周走了一圈。他邊走邊以靈界的語言和虛空界溝通，他的喉嚨裡發出一連串大夥兒都聽不懂的聲音。


    「媽，吳伯伯好像在跟誰說話耶！他在說什麼啊？」小寶雖然身體極為不適，但好奇心仍使他提起精神發問。


