    由謝老先生主祭，謝家人虔誠的禮佛和祭拜祖先。


    「現在這裡沒事了，我們再回到診所去，還有事情沒了。」吳先生說道。

    一行人又下得樓來，走進診所裡去。吳先生逕自走到注射室，這裡面一堆黑影，早在

    他上樓前就全被他定在原地，一個也跑不了。此時，他又是一陣咕噥，那些個好兄弟，一

    個個都同意離開，不再留連人世，於是，吳先生一揮手將他們全渡走了。


    「這裡有一堆不該屬於人間的朋友，我把他們全請走了。」「大夥兒一聽，鬆了一口氣，全都放了心。

    吳先生環顧四週，似乎在感應著，然後走到病床對面那片牆，指著靠牆儲放醫療用品

    的櫃子說：


    ◇ 穿牆而來的不速之客……239'
  - '[PAGE 280]


    「櫃子後面這片牆是一個通道，無形界的朋友都是從那裡穿牆過來的。你們隔壁是做什麼的？」


    「本來是一家文具店，後來搬走了，一個月前，房東又把它租出去了，現在開了一家神壇。」謝太太說。


    「這片牆的後面正好是神壇的供桌，桌上有很多神像，還插了一些旗子。」謝老先生也說道。


    「神壇的黑令旗，招來了許多陰界的朋友，他們從這裡進進出出的，還躺在這張病床上，所以你的病人一躺上去，就被他們推下來。」


    「隔壁的事，我們也干涉不了，那該怎麼辦？」「我要把這個通道堵起來，只要他們過不來，隔壁做什麼，是他們的事，不影響這邊就好。」


    「請大師想想辦法。」謝老先生請求著。


    吳先生在診所裡前前後後又看了一遍，似乎正動著腦筋。


    「這座儲物櫃可以搬走嗎？」


    ◇現代異次元——十則靈療的故事 240'
  - '[PAGE 281]


    可以，可以。謝醫師回答。


    「這樣吧！把這個櫃子搬到別的地方去，把候診室的電視機搬到這裡來。」「好，立刻就搬。」謝老先生二話不說，馬上就和家人一起動手搬東西，連梅香也主動過來幫忙。


    電視機就了定位，替代了原先的儲物櫃後，吳先生又仔細的在注射室裡感應了一下。


    「好了，現在都沒事了。」吳先生終於滿意的說。


    原以爲要大費周章，沒想到這麼簡單就解決了，謝老先生非常佩服。活了一大把年


    紀，看過很多人處理過類似的靈異事件，但從來沒見過像吳先生這樣的人，可以不藉助任何人間使用來和靈界接觸的工具或儀式，直接就可以和靈界溝通；而靈界也似乎很尊重他，甚至聽命於他，好像他是一位靈界派來人間的使者，任務就是帶這些迷途的靈魂回家。家。


    「大師，我很好奇，可以請問您一些問題嗎？」


    ◇穿牆而來的不速之客……241'
  - '[PAGE 282]


    事情都解決了，謝老先生請吳先生上樓去喝茶。謝太太端出許多精緻的小點心，殷勤地招呼這位異人。女傭今天休假，梅香主動幫忙端茶遞水。謝醫師忍不住心中的疑問，於是提出問題請教。


    「我不是什麼大師，不過你有什麼問題，我知道的一定會回答。」「我想知道為什麼電視機擺在那裡，就可以把無形界的通道堵起來？」「電視機的輻射很強，可以接收和放射磁波，這是大家都知道的；牆壁上那個無形的通道，也是由不同的磁場造成的，我把電視機擺在那個通道上，是利用它的磁場來干擾另一個時空的磁場，破壞通道的磁場，等於把通道堵起來了，使他們沒有辦法再從這片牆穿越過來。」「沒想到電視機的磁場那麼厲害！」「輻射是很傷人的，大家只知道太近看電視會傷眼睛，其實只傷到眼睛嗎？應該不止吧！眼睛只是最早被發現受到影響的器官，其他身體的器官可能需要累積更多的輻射，才會顯出症狀，時間久了，大家沒有把這些症狀跟看電視聯想在一起而已。」「有道理，我倒沒有想過這樣的事。」'
- md: "## 現代異次元——十則靈療的故事\n\n  「吳先生，您超渡虛空界的朋友，需要徵求他們的同意嗎？」\n\n  「我會跟他們講道理，讓他們了解當孤魂野鬼沒好處，早超生早投胎，重新來過，又是一條好漢，有些不肯走的，多勸勸也都會同意走。」\n\
    \n  「為什麼您能夠渡走他們呢？」謝太太提出心中的疑問。這也是梅香最想知道的。\n\n  「妳先生當醫生，要有執照才不會成爲密醫。我做這事也需要執照，無形界的朋友才會服我。我有空的時候，也經常開著車到全省各地去超渡一些孤魂野鬼，尤其那些車禍意外死亡的魂魄，家人請人來招魂，沒有成功招回去，流落在外的⋯⋯。」\n\
    \n  「吳先生，您做這事，真是功德。」\n\n  「對我來說，這跟功德無關，這是我的職責，沒做反而是失職。」\n\n  「吳先生，請問您的特異功能是天生的嗎？」\n\
    \n  「是天生的，這種事學不來。」\n\n  梅香覺得吳先生真是一位很特別的人，他下星期回鄉下老家，一定要把吳先生的事講給阿嬤聽。\n\n## 現代異次元——十則靈療的故事\n\
    \n  吳先生來過之後，診所裡果然安寧了，再沒聽病人抱怨注射室裡愈躺愈冷，或看到黑影晃動，當然也沒有人再被推下床或做惡夢了。\n\n  梅香安心地住在樓下的診所，也不再害怕走進注射室。下了班後，她還經常一個人留在注射室裡看第四台播放的電影。\n\
    \n  她常常想起那位神秘的吳先生，不知他從哪裡來，現在到哪裡去了？\n\n  她想到吳先生為陰間的眾生找到回家的路，送他們到該去的地方；也為陽間的眾生找回安寧，讓人們可以安居樂業；這是一件多麼神奇而又有意義的工作。\n\
    \n  梅香雖然沒有宗教信仰，但每當她想起吳先生，就覺得他是一位活菩薩。\n\n  > 「他可能真的是菩薩乘願而來人間的。」\n\n  > 「或者，他是一位天使？」\n\
    \n  梅香這樣想的時候，自己會忍不住笑起來。因為吳先生若是天使，那這位天使長得可真是又黑又醜哩！跟一般人心目中想像的長著翅膀，娃娃臉，白淨可愛，手拿魔棒的樣子，相去太遠了。不過，當她看了惠妮·休斯頓和丹佐·華盛頓主演的電影「天使保鑣」之後，她就不覺得好笑了，原來天使也有黑人，那吳先生就不算太黑了。\n\
    \n  梅香每晚下班拉下診所鐵門的那一刻，總不忘說聲：\n  「吳先生，謝謝您！」\n\n## 深山何處鐘\n\n  手握著方向盤，眼睛望著前方，時而向四處張望一下，吳慕涵把車速定在八十公里，不快不慢，以方便自己做事。\n\
    \n  上了高速公路以後，開了好長一段路，已經過了苗栗，這一路上，都平靜無事，讓他覺得意外。路上如此乾淨，有點反常，令他感到不安。\n\n  每隔一段時間，吳慕涵總會開著自己那一輛小車，到全省各地轉一轉，超渡在外遊蕩的孤魂野鬼。可是今年以來，不肯歸位的靈界朋友忽然變少，這原本是件好事，但是令他不安的原因是國家社會如此不平靜，正是天災人禍的多事之秋，很多天理昭彰的事，變得速戰速決，各種報應來得比以前快，現世報的情況也越來越多，連靈界朋友也有點心急，以前可以慢慢遊蕩的，現在卻急於找到氣場相近的人相隨，在外遊蕩的自然就少了許多，因此會有更多的人受到干擾而出事，怎不令他憂心忡忡。\n\
    \n  他的這種憂心，旁人是無法了解的。為靈界做事這十五年來，他看到的實在太多了，各種無奇不有的事，令人無法想像。也因爲遇到過各式各樣的情況，所以他的應變能力，也愈來愈靈活。他心想，這一切對他來說，都是考驗。在不斷的考驗中，他才能進步。\n\
    \n  這一趟南下，除了一路超渡之外，他還要去見幾位老朋友。下了台中交流道，幾個拐彎之後，他看到一個身穿白色汗衫、深咖啡色短褲的靈界朋友，輕飄飄的在一處工地上徘徊，好像迷失了方向。那身影好熟悉，很像是周仔的父親周老伯，難道周老伯是在這附近車禍過世的嗎？為什麼魂魄沒有引回家中，還在外面飄蕩？\n\
    \n  吳慕涵加快速度，直奔周仔家中。周仔是他多年老友，周老伯半個月前過世時，他正在印度雲遊，沒能到靈前捻香，所以回國後無論如何也要到台中走一趟。\n\n\
    \  到了周仔家，他們一家人都還在喪親的哀悽中，吳慕涵張眼一看，周老伯的靈位牌上是空的。\n\n  「周仔，老伯是在哪裡被卡車撞的？」\n  「就在鐵路平交道下一個十字路口那裡。」\n\
    \  「老伯往生那天是不是穿白色汗衫、咖啡色短褲？」\n  「是啊！你怎麼知道？」\n  「老伯的靈沒有回家，我剛剛在路上看見了。」吳慕涵把剛才經過十字路口時看到的景象告訴周仔。\n\
    \n  「難怪，每次擲筊杯，怎麼擲都沒杯，原來我阿爸沒回來。」\n  「是啊！我們都覺得很奇怪，還以爲阿爸在生我們的氣。」\n  「你們沒請道士去招魂嗎？」\n\
    \  「有啊！沒想到竟然沒招回來。」\n  「那道士功夫太差了，亡魂沒請回來他都不知道。」\n  「擲不到杯，我們還問他是不是亡魂沒回來，他一直說當然回來了。」\n\
    \  「我就說嘛！那位道士不負責任，草草了事，急著要收攤回去。」\n  「那現在怎麼辦呢？」\n\n  「再請一次囉！走。」\n\n  於是他們開著車，到了車禍現場。\n\
    \n  「卡車速度太快，撞得老伯魂飛魄散，魂魄飛得老遠，已經不在現場，所以在這裡招請不到老伯的亡靈。」\n\n  有許多車禍死亡者，家人請來道士招請亡魂，亡魂卻沒有跟著回家，就是因為亡魂並不在現場。車禍死亡的剎那，靈魂脫體而出，被噴得老遠，又迷失了方向，因此會在外遊蕩。\n\
    \n  這會兒周老伯的亡魂，已經不在剛剛吳慕涵看見的地方，不知遊蕩到哪裡去了。\n\n  「這附近有沒有土地公廟？」吳慕涵問。\n  「有，我帶你去。」\n\
    \n  他們到土地公廟前，吳慕涵看到土地公帶著周老伯的靈站在路邊等候。他在心裡謝過土地公，然後對周仔說：\n  「我把老伯的靈，請在你的肩膀上，跟你一起回家。」\n\
    \n  周仔頓時覺得左邊肩膀一片冰涼，心中也一陣酸楚，覺得很對不起父親，讓他的魂魄在外受苦，幸虧土地公慈悲，收留了父親，也幸虧有吳慕涵這種能與靈界溝通的好朋友，不然父親豈不是要成為孤魂野鬼，那他就太不孝了，想到這裡不禁悲從中來，忍不住痛哭了起來。\n\
    \n  開車回到周仔家，吳慕涵叫周仔下車後一直向靈位前走去，不要回頭。待周仔站在靈位前時，吳慕涵將周老伯的靈請上靈位，周仔肩膀的冰冷立即消失。周家子孫哭成一片，重新上香祭拜。\n\
    \n  祭拜過後，周仔再重擲筊杯，連擲三杯都有了回應。\n  「阿爸回來了。」\n\n  拈過香，吳慕涵沒有久留，即刻上路，繼續南下。\n\n  到了嘉義，才下交流道，就看到老高站在路邊不斷向他招手。他把車靠過去，讓老高上車，在他的指揮下避開塞車路段，抄捷徑往高家而去。\n\
    \n  老高是吳慕涵以前生意上的夥伴，前幾年都還有聯絡，這兩年吳慕涵搬了幾次家，電話也換了，又經常出國，這次他從印度回來，老高才輾轉聯絡上他，沒想到短短兩年時間，老高家中經常不順，不但生意每況愈下，家人也經常生病，他那位在念大學的女兒美倩還長了腦瘤，已經住進醫院，經過檢查確定，明天就要開刀。\n\
    \n  吳慕涵一聽說，今天一大早即刻南下，老高也很配合的幫住院的女兒請假，帶回家中，等著先給吳慕涵看過後，才敢放心去動手術。\n\n  > 「美倩的情況很不好，智力忽然退化，國字都忘了怎麼寫，考試時全部寫注音，精神也不是很穩定，學校通知我把她帶回來，到醫院一檢查，醫生說是腦瘤，我怕萬一是其他原因，不是真的腫瘤，刀開下去，豈不是冤枉。」\n\
    \n  老高知道，有時候人體的病是氣場引起的假象，雖然醫學檢查出有實體的腫瘤，但是只要能找到高人化解，腫瘤就可以立即消失，所以他才著急的找尋吳慕涵這位老友。\n\
    \n  > 「你別急，我先看過再說，希望能幫上忙。」吳慕涵只能先安慰他。\n\n  到了老高家，他看過美倩，發現這位亭亭玉立的二十歲女孩，腦中的腫瘤的確是受到住家氣場異常而引發的。\n\
    \n  他起身在老高家裡裡外外查看，發現老高家跟以前不一樣了，半年前，老高買下隔壁的空屋，將兩間屋子中間打通，使得原本屋中的佛桌，面對了新開闢的通道，一股強大的氣場直衝進來，誰也抵擋不住，因此他們全家開始頭痛，最嚴重的是美倩，頭部還長瘤。\n\
    \n  「老吳，最近半年，我找了好幾個人來家裡看過，單單佛桌就搬了好幾個位置，越搬越糟，門窗的方向也一改再改，情況沒有好轉，反而愈來愈嚴重。」\n\n  吳慕涵也不多說話，當場和老高兩個人將佛桌轉了個方向，讓氣場穩定下來。\n\
    \n  「這水晶是做什麼用的？」吳慕涵指著另一張桌子上供著的水晶問道。\n  「那是一位出家師父教我擺的。」\n  「有什麼用處？」\n\n  「美倩頭腦不清楚，師父要我在水晶上面貼紅紙，紙上寫美倩的生辰八字，全家早晚禮拜水晶，她說這樣美倩的心才能不散亂。」\n\
    \n  吳慕涵一聽，忍不住笑了起來。真是天下父母心，為了兒女什麼錢都願意花，什麼事都願意做。\n\n  「美倩都被你們拜到長腦瘤了！那有為人父母的天天在拜女兒，女兒都被你們折死了。這種不正法的出家人說的話，能信嗎？」\n\
    \n  「我就是不懂，又不知道該怎麼辦，才會相信啊！」\n\n  「你真是聰明一世，糊塗一時。只要稍微用點腦筋想一想，也知道這是騙人的。若是這樣拜就能降服人的心，使心不散亂的話，那警政署就好做事了，只要天天拜那些無惡不做大壞蛋，社會不就平安無事了，警察也不用忙翻天。」\n\
    \n  老高一聽，吳慕涵說得有道理，當初自己為什麼沒想到呢！真的是鬼迷了心竅。\n\n  「這些都收起來，以後不要再亂拜了。」\n\n  吳慕涵走到門邊，看到左右兩邊的地上，各擺了一塊仿古的龍形玉。\n\
    \n  「這又是做什麼用的？」\n  「最近做生意周轉困難點，那位師父說這樣可以財運亨通。」\n  「結果呢？」\n  「沒用。」\n  「最有用的方法就是請那位師父開一張即期支票給你，你的財運立刻亨通。」\n\
    \  「我真笨，又上當了。」\n  「那位師父還騙了你什麼錢？」\n\n  「我兒子阿明要參加聯考前，那位師父也跑來說要做一場《孔雀明王經》法會，才能考得上。」\n\
    \  「結果做了沒？」\n  「做了。」\n  「花了多少錢？」\n  「花了⋯⋯一百萬。」老高似乎不太願意說出價錢。\n\n  「兒子考取了沒？」\n \
    \ 「唉！沒有。」\n  「沒有考取也是預料中的事，也許本來可以考取的，不過⋯⋯。」\n\n  「阿明現在蹲補習班，明年再重考。」\n\n  「這種出家人說的話怎麼能信呢？出家是修行的法門之一，既然出家就要身心清淨，他要你買水晶、買玉就不對了，又把做法會當成生意買賣，太不正法了，佛教就是被這些不正法的僧衆搞壞了。」吳慕涵搖搖頭。\n\
    \n  「我也不知道這位師父為什麼要收這麼多錢，又不好意思跟他討價還價。」\n\n  「兩千多年前釋迦牟尼佛涅槃前就說過,末法時期佛教將毀於僧眾之手,因為僧眾販賣佛法,佛祖真是料事如神。」\n\
    \n  「是我不對,我也太迷信了。」老高說。\n\n  「現在不正法的出家人多了,佛陀在世時說過,出家人不能賣藥、占卜,也不能為人治病。」\n\n  「可是現在出家人賣藥、賣往生被、賣法會經懺的大有人在。」\n\
    \n  「出家人那一身形貌,代表佛門的清淨無染。披上袈裟更要懂得萬法皆空,一切放下,專心向佛;怎麼能做生意呢,做了生意,就會一心想賺錢,想賺錢,就離不開貪、瞋、痴,若已經接受眾生供養,還來騙眾生的錢財,真的是太不應該了。」\n\
    \n  「我也沒想過這種事,出家師父願意來幫忙,一般人都對他們很恭敬。」\n\n  「不正法的出家人,就叫邪師,佛陀也說過,邪師說法如恆河沙,所以現在親近出家人要格外小心。」\n\
    \n  「這位師父在我們這裡很有名的,請他幫忙的人很多。」\n\n  吳慕涵不願意對這位有名的出家人多做批評,他知道「地獄門前僧道多」,自己不好修心做功課，只知貪取世間財富的僧道，地獄大門永遠為他們而開。\n\
    \n  將老高家前前後後都巡了一遍，把氣場都調整好之後，吳慕涵為老高全家人檢查身體，把受到不好氣場干擾所造成的不適清除掉，頓時，每個人都覺得神清氣爽。\n\n\
    \  「美倩，你傍晚銷假回醫院，明天開刀前，一定要再檢查一次腦部，看看腫瘤有沒有什麼變化？」\n  「我知道，吳叔叔，謝謝你！」美倩很有禮貌的回答。\n\n\
    \  這時廚房裡已經準備好一桌素食，吳慕涵接受老高的招待，兩人邊用餐邊聊天。兩年多沒見面，一聊起來可以天南地北，加上幾杯老酒下肚，談興更濃，一餐飯吃到下午三點多才結束。\n\
    \n  本來想繼續南下行程的，但是幾口酒就滿臉通紅的吳慕涵，也知道酒後不宜開車，於是在高家小寐了一下，傍晚時分醒來時，高太太告訴他，有一位鄰居在客廳等他，有事想要請教。\n\
    \n  他走到客廳，看到一位中年婦人滿臉憂悽的坐在沙發上，一看到他，眼淚忍不住撲簌簌的直往下落。\n\n  「吳老師，這是前面開書店的丁太太。」高太太介紹道。\n\
    \  「吳老師，想請你幫幫忙，我公公走失了，我們找了三天都找不到⋯⋯。」丁太太還沒說完已經泣不成聲。\n\n  「你公公走失了，要報警呀！」吳慕涵心裡雖然很同情，但是他能幫什麼忙呢。\n\
    \  「已經報警，警察在找，我們全家也都在找，我先生找得都累出病了。」\n\n  「老吳，丁太太很擔心，他公公快九十歲，失眠了好幾個月，覺得活著很痛苦，吞了安眠藥，留了遺書後，離家出走，三天了還沒找到，不知是死是活⋯⋯」老高在一旁幫著說明情況。\n\
    \n  「這樣的話⋯⋯」吳慕涵一聽事態嚴重，他沉思了一下，腦中靈光一閃，接著問丁太太：「妳先生呢？」\n  「他累倒了，剛剛才睡著。」\n  「妳先生是直系親屬，我可以從他身上來感應妳公公，你去叫醒他，叫他過來，順便帶一張妳公公的相片來。」\n\
    \n  丁太太即刻起身回去，一會兒就把丁先生叫了過來。丁先生眼睛紅紅的，布滿了血丝，一看果然是睡眠不足加上過度勞累的模样。\n\n  吳慕涵拿過丁老先生的相片，用手摸著、感應著。\n\
    \  「你父親還活著。」相片裡傳來老先生的信息，吳慕涵很高興的說。\n\n  丁先生、丁太太一聽，不禁喜極而泣。\n  「好啦！老伯還活著是好消息，別哭了，找人要緊。」老高說。\n\
    \  「我們動員了所有的親戚，這附近，還有更遠的地方都找遍了，我爸服了幾十顆安眠藥，他能走多遠？可是就找不到，不知道跑到哪裡去了？」\n  「他想尋短，可能會找隱蔽的地方躲起來，那就難找了。」\n\
    \  「難找也要找，他現在即使還活著，大概也奄奄一息，三天沒吃飯了，他身上一點錢都沒帶。」丁先生哭著說。\n  「老吳，妳有沒有辦法指出個方向，這樣會好找些。」老高問道。\n\
    \  「這真是在考我，不過我剛剛想到一個辦法，可以試試，這裡有沒有嘉義縣市的地圖？」\n  「地圖，我有。」美倩說著，立刻跑去取來地圖。\n\n  吳慕涵攤開地圖，一手摸著丁先生，藉著他們血緣關係的信息來感應，一手在地圖上尋找。只見他的手指，先從丁先生的住家附近找起，漸漸往四周摸著，很快就停在一個點上不動。\n\
    \  「在這裡。」\n  「這個地方我已經找過三次，不可能的。」丁先生說。\n  「你再去找找看，一定是你找得不夠徹底。」吳慕涵很肯定的說。\n  「就在這附近，又不遠，走，我們大家一起幫忙找。」老高提議。\n\
    \n  大夥兒說走就走，出了門直接朝吳慕涵所指的地點走去。\n\n  到了那裡一看，是一座廢棄的大倉庫，後面倚著一片土坡，四周的空地雜草叢生，看去非常荒涼。\n\
    \n  大家分頭在倉庫內外和四周的草叢中搜尋，不見丁老伯的身影。著急的丁先生失望之餘，坐在草堆中哭了起來。\n  「在這兒呢，大家快過來。」忽然吳慕涵在倉庫後面大叫。\n\
    \n  大夥兒聞聲即刻往倉庫後面奔去。只見倉庫後面土坡下的排水溝裡躺了一位已經昏迷且氣息微弱的老先生。\n\n  這個地方真的不容易被發現，丁先生也來這兒找過，但是沒注意到被雜草覆蓋的水溝，幸好這幾天沒下雨，水溝是乾的，不然後果不堪設想。\n\
    \n  丁老先生渾身是傷，在場的人都知道不能移動他，於是叫來救護車，送到醫院去急救。丁先生和丁太太對吳慕涵千謝萬謝之後，隨著救護車到醫院去了。\n\n  「丁老先生會好起來的，吃了這麼多安眠藥，又那麼多天沒進食，還能活著，算是奇蹟。從他身上的傷看來，可能是吃了藥後，藥性發作，從土坡上面滾下來，掉進排水溝裡，受了這麼多折磨，還能活到現在，真是命大。」吳慕涵分析著丁老先生可能的遭遇。\n\
    \n  「老吳，多年不見，你的功力大大精進了。」\n  「這麼多年來，遇到的情況千百種，我也是邊走邊學，慢慢領悟。」\n\n  這時天漸漸黑了，他們慢慢走回家去。晚飯後，老高帶美倩回醫院，準備第二天要進手術房。老高現在安心多了，請吳慕涵看過，把家中和美倩身上一些外來的因素、不好的氣場清除，身上乾淨了，再去開刀，就不會受到干擾，可以較為順利。\n\
    \n  晚上在老高家住了一宿，第二天一大早吳慕涵就上路，繼續南下。\n\n  到了屏東，剛回到老家門前，車都還沒停好，他的手機響了，是老高打來的。\n  「老吳，奇蹟，奇蹟，真是太謝謝你了，美倩下午要出院了，她今天早上再做一次電腦斷層檢查，頭裡面的腫瘤不見了，醫生都莫名其妙，拿著前幾天的報告和X光片對照了半天，無法解釋，既然腫瘤不見了，當然就不必開刀，可以出院回家了。」\n\
    \  「那太好了，真是恭喜！」\n  「什麼時候再來嘉義，我好好請你，要好好謝謝你！」\n  「好了最重要，以後自己要多保重。」\n\n  掛了電話，屋內的姪兒已經聽到他說話的聲音，衝出來拉著他的手，往屋裡大叫：\n\
    \  「阿伯回來了，阿伯回來了。」\n\n  回家的感覺，跟以前不一樣了，因為母親去年已往生，那一份對家的牽掛不再那麼刻骨，或許是老天爺要他更能放下吧！親情的割捨本就不易，生、老、病、死常常成為改變命運的轉捩點，讓人跳過一個個關卡，改變一些想法和生活的方向，織就另一片人生風景。\n\
    \n  在家吃過午飯，小睡一會兒，他騎上腳踏車去找和他一起成長的小學同學阿齊。阿齊永遠張開手臂歡迎他，並馬上泡老人茶和他對飲。阿齊已經當外公了，女兒把小外孫放在家中，讓他和老婆來好忙得不亦樂乎。\n\
    \n  「等一下，有人要來找你。」阿齊一邊沖茶一邊說。\n  「誰？」\n  「老何。」\n  「好幾年沒見到他了，他怎麼知道我回來？」\n  「是我叫他來的，他們夫妻最近哭斷了肝腸。」\n\
    \  「發生什麼事嗎？」\n  「他那資優生兒子考上研究所了，可是上星期割腕自殺。」\n  「怎麼會這樣？」\n  「這孩子太優秀了，思想也太成熟了，急於要了解人生，也自認爲自己對什麼都很了解，只有對生和死很迷惑，常常在想『死』到底是怎麼一回事？死後的世界又是如何？愈想不透，愈要去嘗試。」阿齊搖搖頭說。\n\
    \  「會自殺的人就是因為思想不夠成熟，想不透什麼是死亡，就要親身去體驗，這種孩子，怎能算是思想成熟。」\n  「也有可能是因爲他看見世界的黑暗，所以不想留在世間。」\n\
    \  「他那麽年輕就能感知世界的黑暗，就該等長大後努力去改變這個世界，使世界變好。他不這麼做，反而以自殺來逃避，這也是因為不夠成熟。」\n\n  才說著話，就見到來好帶著老何夫婦走了進來。老何夫婦的氣色都很不好，人好像一下子變老了許多。\n\
    \  「我剛剛聽阿齊說了你兒子的事，請節哀！」\n  「這對我和太太打擊很大，阿松平時很乖巧，怎麼會做出這種糊塗事。」老何悲傷的說。「我的心都跟著他死了。」何太太慧美一說到兒子就流淚。\n\
    \  「傷心也沒有用，自己身體要保重。」\n  「吳仔，我是想請問你，我兒子自殺死了，他現在會到哪裡去？」"
  mdcn: "## 現代異次元——十則靈療的故事\n\n  「吳先生，您超渡虛空界的朋友，需要徵求他們的同意嗎？」\n\n  「我會跟他們講道理，讓他們了解當孤魂野鬼沒好處，早超生早投胎，重新來過，又是一條好漢，有些不肯走的，多勸勸也都會同意走。」\n\
    \n  「為什麼您能夠渡走他們呢？」謝太太提出心中的疑問。這也是梅香最想知道的。\n\n  「妳先生當醫生，要有執照才不會成爲密醫。我做這事也需要執照，無形界的朋友才會服我。我有空的時候，也經常開著車到全省各地去超渡一些孤魂野鬼，尤其那些車禍意外死亡的魂魄，家人請人來招魂，沒有成功招回去，流落在外的⋯⋯。」\n\
    \n  「吳先生，您做這事，真是功德。」\n\n  「對我來說，這跟功德無關，這是我的職責，沒做反而是失職。」\n\n  「吳先生，請問您的特異功能是天生的嗎？」\n\
    \n  「是天生的，這種事學不來。」\n\n  梅香覺得吳先生真是一位很特別的人，他下星期回鄉下老家，一定要把吳先生的事講給阿嬤聽。\n\n## 現代異次元——十則靈療的故事\n\
    \n  吳先生來過之後，診所裡果然安寧了，再沒聽病人抱怨注射室裡愈躺愈冷，或看到黑影晃動，當然也沒有人再被推下床或做惡夢了。\n\n  梅香安心地住在樓下的診所，也不再害怕走進注射室。下了班後，她還經常一個人留在注射室裡看第四台播放的電影。\n\
    \n  她常常想起那位神秘的吳先生，不知他從哪裡來，現在到哪裡去了？\n\n  她想到吳先生為陰間的眾生找到回家的路，送他們到該去的地方；也為陽間的眾生找回安寧，讓人們可以安居樂業；這是一件多麼神奇而又有意義的工作。\n\
    \n  梅香雖然沒有宗教信仰，但每當她想起吳先生，就覺得他是一位活菩薩。\n\n  > 「他可能真的是菩薩乘願而來人間的。」\n\n  > 「或者，他是一位天使？」\n\
    \n  梅香這樣想的時候，自己會忍不住笑起來。因為吳先生若是天使，那這位天使長得可真是又黑又醜哩！跟一般人心目中想像的長著翅膀，娃娃臉，白淨可愛，手拿魔棒的樣子，相去太遠了。不過，當她看了惠妮·休斯頓和丹佐·華盛頓主演的電影「天使保鑣」之後，她就不覺得好笑了，原來天使也有黑人，那吳先生就不算太黑了。\n\
    \n  梅香每晚下班拉下診所鐵門的那一刻，總不忘說聲：\n  「吳先生，謝謝您！」\n\n## 深山何處鐘\n\n  手握著方向盤，眼睛望著前方，時而向四處張望一下，吳慕涵把車速定在八十公里，不快不慢，以方便自己做事。\n\
    \n  上了高速公路以後，開了好長一段路，已經過了苗栗，這一路上，都平靜無事，讓他覺得意外。路上如此乾淨，有點反常，令他感到不安。\n\n  每隔一段時間，吳慕涵總會開著自己那一輛小車，到全省各地轉一轉，超渡在外遊蕩的孤魂野鬼。可是今年以來，不肯歸位的靈界朋友忽然變少，這原本是件好事，但是令他不安的原因是國家社會如此不平靜，正是天災人禍的多事之秋，很多天理昭彰的事，變得速戰速決，各種報應來得比以前快，現世報的情況也越來越多，連靈界朋友也有點心急，以前可以慢慢遊蕩的，現在卻急於找到氣場相近的人相隨，在外遊蕩的自然就少了許多，因此會有更多的人受到干擾而出事，怎不令他憂心忡忡。\n\
    \n  他的這種憂心，旁人是無法了解的。為靈界做事這十五年來，他看到的實在太多了，各種無奇不有的事，令人無法想像。也因爲遇到過各式各樣的情況，所以他的應變能力，也愈來愈靈活。他心想，這一切對他來說，都是考驗。在不斷的考驗中，他才能進步。\n\
    \n  這一趟南下，除了一路超渡之外，他還要去見幾位老朋友。下了台中交流道，幾個拐彎之後，他看到一個身穿白色汗衫、深咖啡色短褲的靈界朋友，輕飄飄的在一處工地上徘徊，好像迷失了方向。那身影好熟悉，很像是周仔的父親周老伯，難道周老伯是在這附近車禍過世的嗎？為什麼魂魄沒有引回家中，還在外面飄蕩？\n\
    \n  吳慕涵加快速度，直奔周仔家中。周仔是他多年老友，周老伯半個月前過世時，他正在印度雲遊，沒能到靈前捻香，所以回國後無論如何也要到台中走一趟。\n\n\
    \  到了周仔家，他們一家人都還在喪親的哀悽中，吳慕涵張眼一看，周老伯的靈位牌上是空的。\n\n  「周仔，老伯是在哪裡被卡車撞的？」\n  「就在鐵路平交道下一個十字路口那裡。」\n\
    \  「老伯往生那天是不是穿白色汗衫、咖啡色短褲？」\n  「是啊！你怎麼知道？」\n  「老伯的靈沒有回家，我剛剛在路上看見了。」吳慕涵把剛才經過十字路口時看到的景象告訴周仔。\n\
    \n  「難怪，每次擲筊杯，怎麼擲都沒杯，原來我阿爸沒回來。」\n  「是啊！我們都覺得很奇怪，還以爲阿爸在生我們的氣。」\n  「你們沒請道士去招魂嗎？」\n\
    \  「有啊！沒想到竟然沒招回來。」\n  「那道士功夫太差了，亡魂沒請回來他都不知道。」\n  「擲不到杯，我們還問他是不是亡魂沒回來，他一直說當然回來了。」\n\
    \  「我就說嘛！那位道士不負責任，草草了事，急著要收攤回去。」\n  「那現在怎麼辦呢？」\n\n  「再請一次囉！走。」\n\n  於是他們開著車，到了車禍現場。\n\
    \n  「卡車速度太快，撞得老伯魂飛魄散，魂魄飛得老遠，已經不在現場，所以在這裡招請不到老伯的亡靈。」\n\n  有許多車禍死亡者，家人請來道士招請亡魂，亡魂卻沒有跟著回家，就是因為亡魂並不在現場。車禍死亡的剎那，靈魂脫體而出，被噴得老遠，又迷失了方向，因此會在外遊蕩。\n\
    \n  這會兒周老伯的亡魂，已經不在剛剛吳慕涵看見的地方，不知遊蕩到哪裡去了。\n\n  「這附近有沒有土地公廟？」吳慕涵問。\n  「有，我帶你去。」\n\
    \n  他們到土地公廟前，吳慕涵看到土地公帶著周老伯的靈站在路邊等候。他在心裡謝過土地公，然後對周仔說：\n  「我把老伯的靈，請在你的肩膀上，跟你一起回家。」\n\
    \n  周仔頓時覺得左邊肩膀一片冰涼，心中也一陣酸楚，覺得很對不起父親，讓他的魂魄在外受苦，幸虧土地公慈悲，收留了父親，也幸虧有吳慕涵這種能與靈界溝通的好朋友，不然父親豈不是要成為孤魂野鬼，那他就太不孝了，想到這裡不禁悲從中來，忍不住痛哭了起來。\n\
    \n  開車回到周仔家，吳慕涵叫周仔下車後一直向靈位前走去，不要回頭。待周仔站在靈位前時，吳慕涵將周老伯的靈請上靈位，周仔肩膀的冰冷立即消失。周家子孫哭成一片，重新上香祭拜。\n\
    \n  祭拜過後，周仔再重擲筊杯，連擲三杯都有了回應。\n  「阿爸回來了。」\n\n  拈過香，吳慕涵沒有久留，即刻上路，繼續南下。\n\n  到了嘉義，才下交流道，就看到老高站在路邊不斷向他招手。他把車靠過去，讓老高上車，在他的指揮下避開塞車路段，抄捷徑往高家而去。\n\
    \n  老高是吳慕涵以前生意上的夥伴，前幾年都還有聯絡，這兩年吳慕涵搬了幾次家，電話也換了，又經常出國，這次他從印度回來，老高才輾轉聯絡上他，沒想到短短兩年時間，老高家中經常不順，不但生意每況愈下，家人也經常生病，他那位在念大學的女兒美倩還長了腦瘤，已經住進醫院，經過檢查確定，明天就要開刀。\n\
    \n  吳慕涵一聽說，今天一大早即刻南下，老高也很配合的幫住院的女兒請假，帶回家中，等著先給吳慕涵看過後，才敢放心去動手術。\n\n  > 「美倩的情況很不好，智力忽然退化，國字都忘了怎麼寫，考試時全部寫注音，精神也不是很穩定，學校通知我把她帶回來，到醫院一檢查，醫生說是腦瘤，我怕萬一是其他原因，不是真的腫瘤，刀開下去，豈不是冤枉。」\n\
    \n  老高知道，有時候人體的病是氣場引起的假象，雖然醫學檢查出有實體的腫瘤，但是只要能找到高人化解，腫瘤就可以立即消失，所以他才著急的找尋吳慕涵這位老友。\n\
    \n  > 「你別急，我先看過再說，希望能幫上忙。」吳慕涵只能先安慰他。\n\n  到了老高家，他看過美倩，發現這位亭亭玉立的二十歲女孩，腦中的腫瘤的確是受到住家氣場異常而引發的。\n\
    \n  他起身在老高家裡裡外外查看，發現老高家跟以前不一樣了，半年前，老高買下隔壁的空屋，將兩間屋子中間打通，使得原本屋中的佛桌，面對了新開闢的通道，一股強大的氣場直衝進來，誰也抵擋不住，因此他們全家開始頭痛，最嚴重的是美倩，頭部還長瘤。\n\
    \n  「老吳，最近半年，我找了好幾個人來家裡看過，單單佛桌就搬了好幾個位置，越搬越糟，門窗的方向也一改再改，情況沒有好轉，反而愈來愈嚴重。」\n\n  吳慕涵也不多說話，當場和老高兩個人將佛桌轉了個方向，讓氣場穩定下來。\n\
    \n  「這水晶是做什麼用的？」吳慕涵指著另一張桌子上供著的水晶問道。\n  「那是一位出家師父教我擺的。」\n  「有什麼用處？」\n\n  「美倩頭腦不清楚，師父要我在水晶上面貼紅紙，紙上寫美倩的生辰八字，全家早晚禮拜水晶，她說這樣美倩的心才能不散亂。」\n\
    \n  吳慕涵一聽，忍不住笑了起來。真是天下父母心，為了兒女什麼錢都願意花，什麼事都願意做。\n\n  「美倩都被你們拜到長腦瘤了！那有為人父母的天天在拜女兒，女兒都被你們折死了。這種不正法的出家人說的話，能信嗎？」\n\
    \n  「我就是不懂，又不知道該怎麼辦，才會相信啊！」\n\n  「你真是聰明一世，糊塗一時。只要稍微用點腦筋想一想，也知道這是騙人的。若是這樣拜就能降服人的心，使心不散亂的話，那警政署就好做事了，只要天天拜那些無惡不做大壞蛋，社會不就平安無事了，警察也不用忙翻天。」\n\
    \n  老高一聽，吳慕涵說得有道理，當初自己為什麼沒想到呢！真的是鬼迷了心竅。\n\n  「這些都收起來，以後不要再亂拜了。」\n\n  吳慕涵走到門邊，看到左右兩邊的地上，各擺了一塊仿古的龍形玉。\n\
    \n  「這又是做什麼用的？」\n  「最近做生意周轉困難點，那位師父說這樣可以財運亨通。」\n  「結果呢？」\n  「沒用。」\n  「最有用的方法就是請那位師父開一張即期支票給你，你的財運立刻亨通。」\n\
    \  「我真笨，又上當了。」\n  「那位師父還騙了你什麼錢？」\n\n  「我兒子阿明要參加聯考前，那位師父也跑來說要做一場《孔雀明王經》法會，才能考得上。」\n\
    \  「結果做了沒？」\n  「做了。」\n  「花了多少錢？」\n  「花了⋯⋯一百萬。」老高似乎不太願意說出價錢。\n\n  「兒子考取了沒？」\n \
    \ 「唉！沒有。」\n  「沒有考取也是預料中的事，也許本來可以考取的，不過⋯⋯。」\n\n  「阿明現在蹲補習班，明年再重考。」\n\n  「這種出家人說的話怎麼能信呢？出家是修行的法門之一，既然出家就要身心清淨，他要你買水晶、買玉就不對了，又把做法會當成生意買賣，太不正法了，佛教就是被這些不正法的僧衆搞壞了。」吳慕涵搖搖頭。\n\
    \n  「我也不知道這位師父為什麼要收這麼多錢，又不好意思跟他討價還價。」\n\n  「兩千多年前釋迦牟尼佛涅槃前就說過,末法時期佛教將毀於僧眾之手,因為僧眾販賣佛法,佛祖真是料事如神。」\n\
    \n  「是我不對,我也太迷信了。」老高說。\n\n  「現在不正法的出家人多了,佛陀在世時說過,出家人不能賣藥、占卜,也不能為人治病。」\n\n  「可是現在出家人賣藥、賣往生被、賣法會經懺的大有人在。」\n\
    \n  「出家人那一身形貌,代表佛門的清淨無染。披上袈裟更要懂得萬法皆空,一切放下,專心向佛;怎麼能做生意呢,做了生意,就會一心想賺錢,想賺錢,就離不開貪、瞋、痴,若已經接受眾生供養,還來騙眾生的錢財,真的是太不應該了。」\n\
    \n  「我也沒想過這種事,出家師父願意來幫忙,一般人都對他們很恭敬。」\n\n  「不正法的出家人,就叫邪師,佛陀也說過,邪師說法如恆河沙,所以現在親近出家人要格外小心。」\n\
    \n  「這位師父在我們這裡很有名的,請他幫忙的人很多。」\n\n  吳慕涵不願意對這位有名的出家人多做批評,他知道「地獄門前僧道多」,自己不好修心做功課，只知貪取世間財富的僧道，地獄大門永遠為他們而開。\n\
    \n  將老高家前前後後都巡了一遍，把氣場都調整好之後，吳慕涵為老高全家人檢查身體，把受到不好氣場干擾所造成的不適清除掉，頓時，每個人都覺得神清氣爽。\n\n\
    \  「美倩，你傍晚銷假回醫院，明天開刀前，一定要再檢查一次腦部，看看腫瘤有沒有什麼變化？」\n  「我知道，吳叔叔，謝謝你！」美倩很有禮貌的回答。\n\n\
    \  這時廚房裡已經準備好一桌素食，吳慕涵接受老高的招待，兩人邊用餐邊聊天。兩年多沒見面，一聊起來可以天南地北，加上幾杯老酒下肚，談興更濃，一餐飯吃到下午三點多才結束。\n\
    \n  本來想繼續南下行程的，但是幾口酒就滿臉通紅的吳慕涵，也知道酒後不宜開車，於是在高家小寐了一下，傍晚時分醒來時，高太太告訴他，有一位鄰居在客廳等他，有事想要請教。\n\
    \n  他走到客廳，看到一位中年婦人滿臉憂悽的坐在沙發上，一看到他，眼淚忍不住撲簌簌的直往下落。\n\n  「吳老師，這是前面開書店的丁太太。」高太太介紹道。\n\
    \  「吳老師，想請你幫幫忙，我公公走失了，我們找了三天都找不到⋯⋯。」丁太太還沒說完已經泣不成聲。\n\n  「你公公走失了，要報警呀！」吳慕涵心裡雖然很同情，但是他能幫什麼忙呢。\n\
    \  「已經報警，警察在找，我們全家也都在找，我先生找得都累出病了。」\n\n  「老吳，丁太太很擔心，他公公快九十歲，失眠了好幾個月，覺得活著很痛苦，吞了安眠藥，留了遺書後，離家出走，三天了還沒找到，不知是死是活⋯⋯」老高在一旁幫著說明情況。\n\
    \n  「這樣的話⋯⋯」吳慕涵一聽事態嚴重，他沉思了一下，腦中靈光一閃，接著問丁太太：「妳先生呢？」\n  「他累倒了，剛剛才睡著。」\n  「妳先生是直系親屬，我可以從他身上來感應妳公公，你去叫醒他，叫他過來，順便帶一張妳公公的相片來。」\n\
    \n  丁太太即刻起身回去，一會兒就把丁先生叫了過來。丁先生眼睛紅紅的，布滿了血丝，一看果然是睡眠不足加上過度勞累的模样。\n\n  吳慕涵拿過丁老先生的相片，用手摸著、感應著。\n\
    \  「你父親還活著。」相片裡傳來老先生的信息，吳慕涵很高興的說。\n\n  丁先生、丁太太一聽，不禁喜極而泣。\n  「好啦！老伯還活著是好消息，別哭了，找人要緊。」老高說。\n\
    \  「我們動員了所有的親戚，這附近，還有更遠的地方都找遍了，我爸服了幾十顆安眠藥，他能走多遠？可是就找不到，不知道跑到哪裡去了？」\n  「他想尋短，可能會找隱蔽的地方躲起來，那就難找了。」\n\
    \  「難找也要找，他現在即使還活著，大概也奄奄一息，三天沒吃飯了，他身上一點錢都沒帶。」丁先生哭著說。\n  「老吳，妳有沒有辦法指出個方向，這樣會好找些。」老高問道。\n\
    \  「這真是在考我，不過我剛剛想到一個辦法，可以試試，這裡有沒有嘉義縣市的地圖？」\n  「地圖，我有。」美倩說著，立刻跑去取來地圖。\n\n  吳慕涵攤開地圖，一手摸著丁先生，藉著他們血緣關係的信息來感應，一手在地圖上尋找。只見他的手指，先從丁先生的住家附近找起，漸漸往四周摸著，很快就停在一個點上不動。\n\
    \  「在這裡。」\n  「這個地方我已經找過三次，不可能的。」丁先生說。\n  「你再去找找看，一定是你找得不夠徹底。」吳慕涵很肯定的說。\n  「就在這附近，又不遠，走，我們大家一起幫忙找。」老高提議。\n\
    \n  大夥兒說走就走，出了門直接朝吳慕涵所指的地點走去。\n\n  到了那裡一看，是一座廢棄的大倉庫，後面倚著一片土坡，四周的空地雜草叢生，看去非常荒涼。\n\
    \n  大家分頭在倉庫內外和四周的草叢中搜尋，不見丁老伯的身影。著急的丁先生失望之餘，坐在草堆中哭了起來。\n  「在這兒呢，大家快過來。」忽然吳慕涵在倉庫後面大叫。\n\
    \n  大夥兒聞聲即刻往倉庫後面奔去。只見倉庫後面土坡下的排水溝裡躺了一位已經昏迷且氣息微弱的老先生。\n\n  這個地方真的不容易被發現，丁先生也來這兒找過，但是沒注意到被雜草覆蓋的水溝，幸好這幾天沒下雨，水溝是乾的，不然後果不堪設想。\n\
    \n  丁老先生渾身是傷，在場的人都知道不能移動他，於是叫來救護車，送到醫院去急救。丁先生和丁太太對吳慕涵千謝萬謝之後，隨著救護車到醫院去了。\n\n  「丁老先生會好起來的，吃了這麼多安眠藥，又那麼多天沒進食，還能活著，算是奇蹟。從他身上的傷看來，可能是吃了藥後，藥性發作，從土坡上面滾下來，掉進排水溝裡，受了這麼多折磨，還能活到現在，真是命大。」吳慕涵分析著丁老先生可能的遭遇。\n\
    \n  「老吳，多年不見，你的功力大大精進了。」\n  「這麼多年來，遇到的情況千百種，我也是邊走邊學，慢慢領悟。」\n\n  這時天漸漸黑了，他們慢慢走回家去。晚飯後，老高帶美倩回醫院，準備第二天要進手術房。老高現在安心多了，請吳慕涵看過，把家中和美倩身上一些外來的因素、不好的氣場清除，身上乾淨了，再去開刀，就不會受到干擾，可以較為順利。\n\
    \n  晚上在老高家住了一宿，第二天一大早吳慕涵就上路，繼續南下。\n\n  到了屏東，剛回到老家門前，車都還沒停好，他的手機響了，是老高打來的。\n  「老吳，奇蹟，奇蹟，真是太謝謝你了，美倩下午要出院了，她今天早上再做一次電腦斷層檢查，頭裡面的腫瘤不見了，醫生都莫名其妙，拿著前幾天的報告和X光片對照了半天，無法解釋，既然腫瘤不見了，當然就不必開刀，可以出院回家了。」\n\
    \  「那太好了，真是恭喜！」\n  「什麼時候再來嘉義，我好好請你，要好好謝謝你！」\n  「好了最重要，以後自己要多保重。」\n\n  掛了電話，屋內的姪兒已經聽到他說話的聲音，衝出來拉著他的手，往屋裡大叫：\n\
    \  「阿伯回來了，阿伯回來了。」\n\n  回家的感覺，跟以前不一樣了，因為母親去年已往生，那一份對家的牽掛不再那麼刻骨，或許是老天爺要他更能放下吧！親情的割捨本就不易，生、老、病、死常常成為改變命運的轉捩點，讓人跳過一個個關卡，改變一些想法和生活的方向，織就另一片人生風景。\n\
    \n  在家吃過午飯，小睡一會兒，他騎上腳踏車去找和他一起成長的小學同學阿齊。阿齊永遠張開手臂歡迎他，並馬上泡老人茶和他對飲。阿齊已經當外公了，女兒把小外孫放在家中，讓他和老婆來好忙得不亦樂乎。\n\
    \n  「等一下，有人要來找你。」阿齊一邊沖茶一邊說。\n  「誰？」\n  「老何。」\n  「好幾年沒見到他了，他怎麼知道我回來？」\n  「是我叫他來的，他們夫妻最近哭斷了肝腸。」\n\
    \  「發生什麼事嗎？」\n  「他那資優生兒子考上研究所了，可是上星期割腕自殺。」\n  「怎麼會這樣？」\n  「這孩子太優秀了，思想也太成熟了，急於要了解人生，也自認爲自己對什麼都很了解，只有對生和死很迷惑，常常在想『死』到底是怎麼一回事？死後的世界又是如何？愈想不透，愈要去嘗試。」阿齊搖搖頭說。\n\
    \  「會自殺的人就是因為思想不夠成熟，想不透什麼是死亡，就要親身去體驗，這種孩子，怎能算是思想成熟。」\n  「也有可能是因爲他看見世界的黑暗，所以不想留在世間。」\n\
    \  「他那麽年輕就能感知世界的黑暗，就該等長大後努力去改變這個世界，使世界變好。他不這麼做，反而以自殺來逃避，這也是因為不夠成熟。」\n\n  才說著話，就見到來好帶著老何夫婦走了進來。老何夫婦的氣色都很不好，人好像一下子變老了許多。\n\
    \  「我剛剛聽阿齊說了你兒子的事，請節哀！」\n  「這對我和太太打擊很大，阿松平時很乖巧，怎麼會做出這種糊塗事。」老何悲傷的說。「我的心都跟著他死了。」何太太慧美一說到兒子就流淚。\n\
