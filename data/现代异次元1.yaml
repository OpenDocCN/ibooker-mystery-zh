    吳慕涵到家裡來超渡之後，真的不一樣了，書廷和秀瑾變得很平靜也很安心；秀瑾最高興的是覺得自己的丈夫又回來了，這些年來想親近他時會被一股無形力量推開的感覺消失了。不過，奇怪的是，書廷的琴藝忽然退步了不少，可見得這幾年來沒來由的迷戀古琴的那個男人，並不是她真正的丈夫，現在這個對古琴興趣濃厚，但是卻琴藝平平的才是她熟悉的另一半。


    「這張古琴雖然已經沒事了，但是擺在家裡總覺得怪怪的，想把它送人，不知該送給誰好？」書廷打電話謝謝晴美時，順便問道。


    「送給誰都不好，知道的人心裡都有疙瘩，我覺得只有送給吳先生最合適，而且吳先生以前學過古琴的。」晴美想了一想說。


    第二天，這張古琴就被送到吳慕涵位於半山腰的家中。


    蓉蓉離去了，還給古琴清淨的琴身和琴弦。擺在桌上的古琴，看去顯得格外清新亮麗。吳慕涵為這張琴取名為「蓉圓」，一方面為紀念蓉蓉這位純情又苦命的少女，她的魂魄終於找到回家的路；一方面為慶賀古琴找到真正的主人，有了圓滿的結局，結束流浪了兩百多年的歲月。


    ## 哭泣的嬰靈


    卓敏收拾好東西，把白色的醫師服脫下，披在椅背上，換上那件水藍色的絲質外套。


    「卓醫師，明天見！」護理長從門口走過，向她招招手。


    「等一下，護理長。」卓敏追出去叫著。


    護理長停下腳步，回頭笑容可掬地看著卓敏。


    「我知道妳要說什麼，是曾惠英的事對不對？」不等卓敏開口，護理長就胸有成竹地說。


    卓敏點點頭。最近她太困惑了，整天想著曾惠英的事，這件事情太令她震撼了，使她對醫學和醫生能做的事產生了懷疑。


    「曾惠英的腫瘤不見了，是值得高興的事，別想那麼多了，妳現在終於知道宇宙間有很多不可思議的事，所以有時候對自己不懂的，還是寧可信其有，只要不過分入迷，變成不可救藥的迷信就好了。」護理長說。


    「護理長。」走廊那頭護士密司陳在叫。


    「我還有事要忙，拜拜！」


    看著護理長一扭一扭地走遠，卓敏心中的迷惑也越來越深。行醫二十多年了，身爲婦產科醫師的她，什麼樣的病例都看過，但從來沒有見過已經經過三家頗具規模的醫院的各種檢查，都懷疑是卵巢癌，且轉移到胃，排定好開刀時間的病人，在一夜之間兩個要切除的腫瘤會忽然消失不見，這種奇蹟竟然讓她親眼目睹，是醫學在開她玩笑？還是上帝在開她的玩笑？


    卓敏的腦海裡剎那間又浮出一張臉，那是一張布滿風霜又粗又黑的中年婦人的臉。很多年前，這位住在漁村的討海婦人，沒來由的肚子痛，痛起來時雙倍的止痛藥都發揮不了止痛效果，村子裡和鎮上的醫生全看遍了，都治不好。有一次痛得暈了過去，被送到這家頗具盛名的教學醫院急診，查不出什麼毛病，後來轉到婦科門診成爲卓敏的病人，經過一連串的检查，仍然查不出病因，只能開點鬆弛劑、止痛藥給她吃。經過了幾個月之後，這位婦人再度出現在診間，但不是她本人要看病，是她女兒經痛來看診，婦人一見到她，就說：


    「醫生，我的肚子都不痛了。」


    「那很好呀！」卓敏一眼就認出她。


    「給妳看了幾個月，檢查都說沒毛病。結果我是真的沒有毛病，只是被煞氣沖到，我師父叫我去收驚，又到廟裡去拜拜，現在都不痛了。」


    卓敏臉上保持著笑容，但心裡卻很不以為然，去收驚、拜拜就能把病治好，真是笑話！那還要醫院和醫生幹嗎？若收驚、拜拜有效，這位婦人為什麼還要帶女兒來看病，這不是自打嘴巴嗎？


    卓敏對這種村夫村婦般的愚行向來不敢苟同。這時候再想起這件事，忽然有了不同的意義，當時她沒有追蹤婦人疼痛消失的原因是她的疏忽，但是去拜拜，病就好了，這樣的事情該如何去探究？就像曾惠英一樣，她身上已經確定的兩個腫瘤平空消失，在醫學上又該如何解釋呢？「自己不相信的事，不見得不存在，所以看待萬事萬物都要用一顆包容的心。」父親常常這樣告訴她，現在回想父親的話，她才真正覺得聽懂了。或許，天地間真的有許多人類肉眼看不見、耳朵聽不到，但卻存在我們身邊的事物，人們不該因為看不見、聽不到而否定了它們。


    曾惠英多年來一直是卓敏的病人，她卵巢裡的水瘤，定期在作追蹤，觀察它的大小和變化。卓敏覺得能夠不開刀就盡量不要開刀，切除卵巢對婦女來說，是一種很大的傷害，除非迫不得已，她總是盡力保存病人的子宮和卵巢。當然病人也要非常配合，定期來醫院追蹤。


    可能因為忙吧，曾惠英有大半年沒來檢查，上個月她再來時，卵巢裡的水瘤竟然已成了癌症，而且轉移到胃，事態非常嚴重，卓敏建議她立即住院動手術切除。曾惠英雖然心慌意亂，覺得自己生命垂危，人一下子垮掉了似的，但也積極又慎重的即刻到另外兩家醫院再作檢查，結果仍然相同。曾惠英只好死了心又回來找卓敏，勇敢地面對現實，並排定了下週三動手術。


    曾惠英來看診那天正好是星期六，下了班以後卓敏約了幾個球友一起去打高爾夫球；打完十八洞，天已經黑了，大夥兒就決定在球場的餐廳用晚餐。


    一踏進那裝潢雅緻的西餐廳，就看到大學時的同學梁修明也在裡面，正和一位蓄著長髮紮一條馬尾的中年男子在吃飯。


    「嗨！卓敏，過來一起坐。」梁修明一見到卓敏就叫，他還是那副大嗓門，一點也沒變。


    「你不是出國了嗎？什麼風把你吹回來？」卓敏問。


    「回來自己開業，下禮拜就開張，招牌是『梁婦產科』。喂，妳送個『仁心仁術』匾額給我掛在診所。」


    「真是臭屁！」卓敏罵了他一句。


    坐在一旁的長髮男子聽到他們的對話，不禁笑了起來，他抬頭打量著卓敏。


    「來，跟妳介紹，這位是吳慕涵先生。吳先生，這是我大學同學卓敏，當年是我們班花，品學兼優，現在是優秀的婦產科權威醫師。」梁修明用誇張的口氣介紹著。


    卓敏也介紹了同來的三位伙伴，然後點了餐。


    「我診所的風水，就是請吳先生幫我看的。」梁修明說。


    卓敏一聽，對吳慕涵的印象立刻打了折扣，原來這位長髮男子是地理師、風水先生之流，這些她向來不信的。


    「台灣子宮頸癌的病人很多，死亡率也很高，這邊的婦女都不定期做抹片檢查嗎？」梁修明又問。


    話匣子一打開，話題就繞著婦科的病症聊起來。


    「我早上看了一位病人，從卵巢水瘤轉成了癌，還轉移到胃，這個病人我看了很多年，都變成好朋友了，要爲她開刀，心裡覺得很難過。」卓敏說。


    「這個刀開下去就玩完了。」在一旁靜靜聽他們聊天的吳慕涵忽然說。


    「卓敏，吳先生很通靈的，他講這句話一定有他的道理。」梁修明立刻接著說。


    「通靈？就是有神通嗎？」卓敏的球友阿鑾好奇地問，「吳先生，爲什麼這個刀不能開？」她又接著問。


    「我想卓醫師是不信這一套的，不過，她如果想聽，我倒願意說明一下。」


    「有何不可！吳先生你請說。」卓敏是不信，她相信自己的判斷，她覺得這個刀非開不可，先把腫瘤切除，再深入作組織的檢查，以確定是惡性或良性。但現在有一個不是醫生的通靈者在質疑她的決定，她非常不服，很想聽聽他說什麼。


    「請把妳的手給我。」吳慕涵說。


    卓敏不知道吳慕涵要她的手幹什麼，但她還是將手伸了過去。她伸出手的姿勢和她臉上的表情，分明擺出一副「我看你能玩什麼把戲？」及「我是不會受騙的。」的姿態。


    吳慕涵把手掌蓋在卓敏的手掌上，眼睛看著桌上白色小瓷瓶裡的玫瑰花，凝神專注了好一會兒，然後說：


    「卓醫師，妳早上看的那位病人，是不是長得很嬌小，頭髮及肩，背有一點微駝？」


    卓敏驚訝地看著吳慕涵，從她的眼神和表情裡，可以看出這份驚訝非同小可。


    「你怎麼可能從我這裡看到這位病人？」卓敏的驕傲心去了大半，很好奇地問道。


    「妳早上才看過這位病人，身上還留有她的信息，我可以從這些信息中，將這個人組合出來。」


    「這是神通？還是特異功能？」


    「這是不是叫天眼通？」


    「好神奇喔！你是天生就會，還是學來的？」


    大家七嘴八舌地問，吳慕涵笑笑，並不回答。


    「妳這位病人，肚子和胃裡的瘤是假象，不是肉體的病，開刀沒有用，瘤會跑到別處去。」


    「什麼叫做不是肉體的病，兩個腫瘤那麼大，照過X光片，做了超音波和斷層掃描，看得清清楚楚的，難道還會假嗎？」


    「好，妳再聽我說，這位病人身上經常這裡痛那裡痛，這種痛會跑來跑去，我說的對不對？」


    卓敏又睜大了眼睛，一臉的詫異，因為吳慕涵說的都對，曾惠英經常沒來由的這裡痛幾天，那裡痛幾天，檢查身體又一切正常，但疼痛不時來襲，吃止痛藥也沒有用，痛個兩三天，又忽然好了。


    「我說對了吧！」見卓敏沒講話，吳慕涵又繼續說。


    「為什麼會這樣？」卓敏忍不住還是問了。


    「妳問我為什麼，我沒看到她本人，無法告訴妳。」


    「可是，你剛剛說，那不是肉體的病……」卓敏拿出她打破砂鍋問到底的本領。


    「卓醫師，剛才我說的症狀如果都是對的，就印證了我看到的沒錯，妳相信了這部分，也可以考慮一下另外那部分的正確性。」


    卓敏一聽，楞了一下，她知道眼前這位吳慕涵並非省油的燈，也不會浪費唇舌在不相信他的人身上，但她才不管，好奇心使她不發問很難過。


    「吳先生，我想請教你，人生病了，症狀在肉體上，看得到，感覺得到痛苦，醫學也檢驗到東西，若這不是肉體上的病，那麼會是什麼病呢？」


    「這種情形，有的確實是肉體上的病，但有的不是，像妳那位病人，是屬於靈體上的病。」


    「靈體上的病？什麼是靈體？」


    「就是靈魂，人是靈魂和肉體結合而成的。」


    人是靈魂和肉體的結合，平時人們常常這樣講，但那只是嘴巴講講，並沒有真正去思考它的意義，甚至忘了人有靈魂這回事。靈魂會生病，真有這回事嗎？


    「我們平常講靈感，什麼是靈感，就是直覺，什麼是直覺，就是直接的感覺，那麼，是我們身上的哪個部分去直接感覺？就是靈魂啊！」


    對呀！靈感，這是日常生活中的常用語言，但是有幾個人真正去深思它的意義？


    「心靈舒暢，又該怎麼解釋？心，是內心、是肉體的一種感覺，很容易受到化學作用的影響，像人在談戀愛或人的喜、怒、哀、樂，都會對心情起作用。而靈，是靈魂、心和靈都舒適，才叫心靈舒暢，靈不安，身心就不會舒暢，身心靈三者是合一的，身體當然就會出狀況。」


    「吳先生，你能說善道，說的也很有理，到目前為止，我都相信你，明天下午我沒有門診，如果你有空，我帶這位病人給你看，可不可以？」


    「沒問題。」吳慕涵很爽快的答應。


    這時候，侍者上菜，打斷了他們的談話。


    卓敏就坐在吳慕涵的正對面，她觀察這位具有特異功能的人，長相普通，但舉手投足充滿了自信。她心想，人還真是不可貌相。


    一邊用餐，大夥兒一邊閒聊，卓敏心裡打算著，明天帶曾惠英給吳慕涵看，對惠英的病情會有什麼幫助，她倒不信，但是，若吳慕涵是位騙子，她可要不客氣的當場拆穿。


    依著地址，找到了吳慕涵的住處。那是在半山腰的一間簡樸平房。


    卓敏走進那間屋子之後，眼光一掃，看到室內的家具和布置，就知道他過的確實是清修的日子。


    「請坐，不必拘束。」吳慕涵自己先坐了下來。


    桌上已擺好茶具，熱茶在杯裡冒著熱氣，看樣子吳慕涵已獨酌多時，並非為了等待客人上門才泡茶。


    曾惠英怯怯地站著，她感到很不以在，有一種想逃的念頭。不知道為什麼，卓醫師昨天晚上打電話告訴她有這麼一位異人，問她願不願意給他看一看，跟他聊一聊，還強調反正也沒什麼損失。惠英聽卓敏的聲音那麼急切，她知道那是醫生對病人的關切，也是好友的關心，只是卓敏一向排斥神通、特異功能、氣功之類的事，竟會主動要帶她去，看這麼同類的人，一定有特別的原因和用意，她一直都很信任卓敏，也很依賴她，既然她覺得有需要，而且在這樣的緊要關頭，確實也不會再有什麼損失，去看看又何妨，所以她也就答應了。只是，在她坐進卓敏的那部喜美轎車的那一刻起，她就一直想逃，尤其此刻，面對這位神祕的吳慕涵，她更覺得心慌意亂，使她幾乎想奪門而出。


    「別怕，也不必逃，給我坐下。」吳慕涵忽然擺出一副很嚴肅的臉色，斥責站在那裡想走的曾惠英。


    曾惠英和卓敏都嚇了一跳，尤其是惠英，她想這位異人竟然可以感應到她的心思，難道他有他心通不成？心中更加恐懼，想立即拔腿就走。


    「坐這裡，手伸出來放這裡，」吳慕涵不等惠英有所行動，又大聲命令著，並指著桌子和椅子。


    惠英又楞住了，回過神來之後，就乖乖的坐下，把手伸出來放在桌面上。


    吳慕涵也坐下來，慢條斯理的先喝了一口茶，然後把他的手掌蓋住曾惠英的手，之後他就凝神不動，好似在感應著什麼，喉嚨裡發出一陣陣輕微的打嗝聲。


    一個男嬰在吳慕涵眼前一晃，一忽兒又不見了蹤影，吳慕涵更專注地尋找，這個男嬰的魂魄帶著哀傷的哭聲在惠英的體內躲躲藏藏，他的影子時大時小，大時可以佔滿全身，小時細如一根針，把惠英的五臟六腑、四肢百骸，當成高山大海丘陵江河和湖泊港口，穿梭來穿梭去。經過好一會兒細細的搜尋之後，吳慕涵終於在惠英膝關節的骨縫裡將嬰靈定住，他用意念和嬰靈溝通，叫他不要再躲了，先暫時停一下，嬰靈乖乖地聽命，不再亂跑。


    「貴姓？」吳慕涵開口了。


    「我姓曾，我先生姓李。」惠英回答。'
  mdcn: '## 蓉圓琴韻


    客人走後，書廷和秀瑾商量了一下，覺得晴美是信得過的，不妨請這位高人來家中看看，所以拿起電話就打，還約了今天去接他。


    乍見吳慕涵，他們發現這位通靈人和晴美形容的很像，的確像一位山野村夫，但他的眼神清澈明亮，瑩瑩有光，似乎可以直透人心。


    把吳慕涵接到家裡來，他二話不說的先在屋裡屋外看了一遍。


    「這個房間有事。」吳慕涵用手指著小珊的房間說。


    「那該怎麼辦？」書廷問，心中想著吳先生真是高人，赤手空拳的來，沒有任何道具、法器、令旗或是八卦羅盤之類的東西，光憑感應就能知道哪裡有事，而且跟他心裡想的很吻合。


    吳慕涵走進小珊的房間又繞了一圈，他覺得事有蹊蹺，於是問道：


    「這間房裡有從中國大陸帶回來的古董、古物之類的東西嗎？」


    書廷一聽，心裡真是詫異得不得了，竟然被他一語道中，於是毫不遲疑的立刻彎下身子，把頭探進床底下，將那張塵封已久的古琴拖出來，擺在書桌上。只見琴盒上面蓋了一層厚厚的灰，秀瑾一見才想起這張久違了的古琴，幾乎從她記憶中消失。


    書廷撢去灰塵，打開盒蓋，解開包裏琴身的紅色絲絨布套，那張古琴終於重見天日。雖然久未彈奏，但是琴面依然亮燦燦的，光可鑑人。不過在打開琴盒的那一剎那，似乎有一股涼氣冒出，令書廷不禁打了一個冷顫，忙不迭的退後一步。


    秀瑾看到琴面上被小珊用磁杯敲出來的凹痕，才想起這床琴原來被書廷收藏在小珊的床底下，那麼多年來她始終都不知道。


    吳慕涵凝視著那張古琴，不動聲色，不一會兒，展顏而笑說：


    「有一位十六、七歲叫謝蓉蓉的女孩子，穿著古裝，盤著髮髻，長得滿清秀的，守著古琴不肯離開。這個女孩臉上的化妝有一點奇怪，眼皮上畫了圓圓的黑點，大概是眼影或是眼線吧！」


    這時書廷和秀瑾全身都起了雞皮疙瘩。他們幾乎同時想起小珊眼皮上長疣以及留下疤痕的事。


    書廷更是驚疑的張大了嘴，吳先生形容的不就是他經常看到的那位少女嗎？果真不是他的幻覺，沒想到他這幾年來糊裡糊塗的接觸了其他空間的生命，實在太不可思議了。


    「咦！這位古裝少女跟相片裡的小女孩長得很像。」吳慕涵一回頭，看見擺在床頭櫃上的一個相框，順手指著。那是小珊的相片。


    書廷腦海裡浮現出那位古裝少女的模樣，的確跟小珊長得很像。秀瑾想起她也曾在恍惚間看見過吳先生所形容的那位少女，當時還以爲是自己的幻覺。


    「古琴裡的女孩，現在就站在房間裡嗎？」秀瑾環顧四周不安的問道。


    「是的，她正在生氣，而且提出一個最後的要求，若滿足了，就心甘情願的同意讓我渡走她。」


    「是什麼要求，辦得到的我們一定盡力去辦。」書廷說。


    「她很不高興你們把這張琴收到床底下，她的要求很簡單，希望你們把琴擦乾淨，好彈幾首曲子，如此而已。」


    「那很容易，我立刻照辦。」書廷拿來一塊柔軟的布，仔細擦拭琴身，並認真調整琴弦。


    「守著古琴的女孩，很害怕照相，有一次照完相，生了一場病，把她嚇壞了。」吳慕涵說。


    「有一種傳說，認爲照相會把人的魂攝去一部分，這個女孩會不會因爲這樣所以才經常生病？相片裡會顯出影像來，一定有某種信息被底片抓了去⋯⋯」書廷一邊調整琴弦一邊說。


    > 「這個女孩喜歡彈琴，也彈得一手好琴⋯⋯，兩百多年來古琴換了許多主人，但是每一位主人都不曾真正擁有它。這些無緣的人，從古琴一進門，家中就事故連連，不是丟了官，就是生意失敗，再不就是家人生病。偶而有雅興想撥弄一下琴弦，不是發不出聲音，就是弦忽然斷了，根本無法彈奏，因此，擁有它的人大都將它束之高閣，或是轉手賣給別人。你算跟她有緣的，她喜歡附在你身上跟你一起彈琴，也常附在你女兒身上，所以她常生病。」


    吳慕涵說著，他看到古琴裡那位眼神幽怨的少女，心中一震，強烈感受到她歷經兩個多世紀以來的那種不捨和堅持，真是世間多少痴兒女，可憐天下父母心。這位穿著古裝的少女，一縷幽魂牢牢的看守著這張古琴，一步也不肯離開。他看到她家的府邸被火吞噬後，她日日夜夜的苦苦守著那根燒得半毀的屋梁。那根屋梁後來被製成一張古琴，她就一直跟隨古琴至今。


    宇宙是多麼奧妙呀！只是一個小小的執著，竟能夠讓一條無明的靈魂，陷入無法自拔和萬劫不復的境地，真是可悲又可憐！人們不明白世間的一切，不論你擁有多少，都不是你的，你只有使用權，不該有這麼多的不捨，牽牽絆絆的不願放下，讓靈魂變得如此沉重，重到無法出發前往下一個目的地，重到淪為遊魂而無法自拔。


    兩百多年來，蓉蓉改變了許多人的命運。善良的蓉蓉，其實一點也沒有害人之心，但是陰陽兩隔，人鬼殊途，不同的磁場有不同的頻率，蓉蓉迷失在人間，凡是與她有所接觸的人，難免受到她的影響。幸好有緣遇到了吳慕涵，經他好言相勸，她終於想通了，也看開了，願意讓他超渡，投奔早在兩百多年前就該去的地方。


    書廷將古琴準備好後，小心的搬到琴室，虔誠的焚香，在沉香的香氣和煙霧中，他坐上琴椅，虔敬的彈唱起來。


    琤琮的琴音由書廷那靈巧的指間流出，時而輕快，時而幽怨，時而激昂，時而滑潤，他的心隨著琴音進入不同的情境；彈著彈著，琴音的清奇、幽遠把他帶進一個深不可測的境界，琴音的寬容、厚實、透靜，也將在場的人帶進深沉的寂靜中去。


