    好奇心的關係，我就這樣經常來到這間半山腰的小屋。這兒，總是客來客往的，我在這裡認識了那位得過肝癌的書法老師、年輕活潑的睡美人、患紅斑性狼瘡的快樂母親、古琴的女主人，以及多位本書中的主角。


    有一次，大夥兒在聊天，聊到一些民間的民俗療法，譬如有些人家碰上有原因不明的夜哭小兒時，經常會寫張紙貼在人來人往的牆上或電線桿上，上面寫著：「我家有個夜啼郎，⋯⋯仁人君子唸一遍，小兒一覺到天明。」民間一般常用這種簡單的方法，來驅除夜魔。還有些人無緣無故的生病，醫藥都治不好，大都認爲這是被外靈侵入後，產生驚嚇或附身所致。


    這種被外靈入侵，令人受到「驚嚇」或「鬼附身」之說，早在中國的《春秋左傳》中，就有記載：


    周成公十年（西元前五八一年），晉侯做了個夢。夢見一個長髮著地的惡鬼。這個惡鬼說，因為晉侯無緣無故地殺了他的兩個孫子，所以他在得到地府閻君的允許後，來向晉'
  - '[PAGE 11]


    侯討命。


    晉侯夢醒,心驚肉跳,因懼而病,特地派人到秦國去請來當時最好的醫師來為他治病。醫師尚未到達,晉侯終日昏睡。睡夢中,夢見他身體內有兩個小鬼在商議該怎麼辦。一個說:「從秦國來的名醫,醫術非常高明,如果他傷害我們,我們逃到哪裡去呢?」另一個小鬼說:「放心啦,只要我們躲在肓之上、膏之下,就安全了。因為在這兩個穴道之間,針灸不達、藥石不至,豈奈我何!」果然,當秦國的名醫為晉侯看診後,搖搖頭說:「晉侯之病在膏肓之間,良醫也不可為也!」這是成語「病入膏肓」的來源。


    七年前,我曾把這個歷史事件編成舞台劇。劇中的晉侯就是晉景公。晉景公受屠岸賈之惑,殺了晉國的開國元勳趙盾全家。晉景公體內的兩個小鬼就是當時被殺的趙同與趙括。趙家唯一倖免於難的,是一位身懷有孕的莊姬公主。莊姬公主在宮中生下一名男嬰,怕屠岸賈趕盡殺絕、斬草除根,偷偷地將男嬰交給趙家的忠僕程嬰,由程嬰帶出宮去撫養。這名男嬰就是舞台上的趙氏孤兒,長大成人後,報了家仇血恨,又重整家國,他就是歷史上有名的趙武。


    從整個事件的來龍去脈來看,「病入膏肓」的另個意義,就是一般人所說的因果報


