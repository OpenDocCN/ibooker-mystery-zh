    閉上嘴。這時候吳慕涵喉嚨裡發出一個極大的嗝聲，把四周的人都嚇了一跳。


    這一聲之後，吳慕涵臉上的嚴肅表情，換成了微笑，看到他鬆了一口氣，所有人緊繃的神經也才鬆了開來。他向張老太太走過來，若梅發現他滿頭大汗，一顆顆汗珠子在額頭上閃閃發光。


    「好了，沒事了！」吳慕涵輕鬆的說。


    「這樣就化解了？」張老太太很懷疑的問。


    張老太太的疑問也是張家兄弟的疑問，這麼簡單就解決了？太令人難以相信了！他們心理早已準備好，也期待著吳慕涵在墳前揮劍、搖鈴、搖旗、口念咒語、畫符、燒紙錢等驅邪的動作，結果什麼也沒有，只見到他在墳墓四周轉了一圈，怎麼就把事情辦好了？這是真的嗎？重修墳墓，改變方位甚至覓地遷墳都不需要了嗎？一大堆的疑問寫在每個人的臉上。


    「有一位高高壯壯，肩膀寬闊，眼睛細長，鼻子有點勾，站得筆直的男人，頭頂還有禿髮，大約六十幾歲的模樣，是你們的什麼人？」吳慕涵看到這麼一個老人站在面前，於是問道。


