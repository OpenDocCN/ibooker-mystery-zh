    ## 現代異次元——十則靈療的故事


    「這麼說，是嬰靈在作怪？」惠英問。


    卓敏聽到這樣的對話，耳朵都豎了起來，這太新鮮了，天底下真有這樣的事？以前她也聽人說過嬰靈會作祟，讓拿掉孩子的婦女受罪，但是她認爲那是無稽之談，是可笑的迷信，可是今天卻讓她參與了這場審判，太神奇了！


