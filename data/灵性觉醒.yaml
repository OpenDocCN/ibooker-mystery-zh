  md: '這並非事情的本質。通靈傳導的本質在於創造通道，通往更高的意識、更高的自我接受度，以及更多的理解與愛。通靈時，我的意識被提升，超越了日常生活中我所習慣的那個層面。我與宏大、永恆且充滿愛和光的能量場連結，覺得既熟悉又自然。事實上，我與自己的靈魂連結，所傳導的訊息是我的靈魂與約書亞或馬利亞合作的成果。


    我問過馬利亞，通靈時我身上發生了些什麼。她答道：


    「通靈時，你想起自己是誰，暫時回到了家，並看見你所有的擔憂和恐懼之間的關連。這讓你心中充滿了快樂，並將喜悅和無憂的能量傳遞給他人。以我的名義說話時，你進入了我們彼此合一的那個層次——人類目前對此還無法理解。是你在說話，還是我？那是我們之間充滿喜悅的合作。我在天堂以無條件的愛澆灌你，讓你的頭腦充滿喜悅和洞見，然後你將它們轉譯成詞彙、句子和故事。我們的目的是讓你們想起自己的本來面目，想起你擁有愛、喜悅及被珍惜的權利。你們需要具體的訊息：『為什麼我會在這裡？我該怎樣做？我該何去何從？』我了解這一點，並盡量滿足你們的需求。然而，我們所帶來的最基本訊息一直都是：『上帝愛你，祂從未遺棄你；你是安全的，此地此時，你就在家裡。』如果你們在聆聽或閱讀這些靈訊時，可以對這一點有真切的感受，我們的目的就達到了。」


    通靈時，我並未失去自己的意識，也沒有出體，而是處於「有意識的接收狀態」，將感受到的洞見轉譯成具體的語言。在轉譯過程中，我很清楚自己無法將約書亞和馬利亞給予我的愛'
  merge: -1
  pgno: 15
- img_proc: false
  md: '# ### 遇見約書亞之前


    我想先說說我這個人,好讓大家更清楚這本書的背景。我從小對各種哲學和靈性問題深感興趣,小時候就很喜歡《新約聖經》中提到的耶穌故事。我並不是成長於一個宗教色彩濃厚的環境,我的家人對宗教其實抱持中立態度,是我自己去閱讀兒童聖經裡的故事,至今書中的插圖和書頁的芳香依然在我記憶中徘徊。耶穌的形象深深觸動了我,他所代表的美與純潔,讓我在讀那本書的時候,心中充滿無法言喻的渴望。


    十八歲時,我進入萊登大學研讀哲學,開始學習以理性的方式對待和處理各種生命問題。這使我著迷,和令人窒息的中學相比,大學對我來說是個綠洲,可以自由且毫無限制地思考各種本質性的問題,讓我充滿熱情地投入學習之中。一九九二年,我以優異的成績畢業,之後又


    和鼓勵完全轉換成人間的詞彙和概念;與他們充滿愛的能量相比,語言顯得蒼白。本書中的訊息先是在參加工作坊或各種聚會的人們面前娓娓道出,之後我重新編輯列印出來的文字。編輯時,我不斷與約書亞或馬利亞商量,希望盡量準確地描述我接收到的智慧和洞見。在這個過程中,我並不是「自動書寫」,我的意識也沒有被某種外在能量「接管」,我是以轉譯者和設計師的身分,有意識地參與那些傳導過程。'
  merge: -1
