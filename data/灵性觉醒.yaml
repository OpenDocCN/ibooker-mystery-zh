- img_proc: false
  md: '在內梅亨大學攻讀博士學位，研究的主題是科學哲學，主要探討心智和物質世界的關係，研究的中心問題則是：物質實相是不是客觀可知的？科學能否揭示物質實相（包括我們人類的心智）的基本原理？科學本身是否受到某個主觀因素——決定理論的形成方向，卻絲毫不被我們質疑的隱性世界觀——所影響？我帶著極大的興趣不斷研究和探索這些問題，然而，在取得博士學位的前一年，我陷入了生命的困境。


    那時我已經和一位我認為會與他廝守終生的男人住在一起四年了，他是個科學研究人員，以理性的觀點看待生命，我深受他的影響，忽視自己的感受和靈性。我偶爾會閱讀一兩本略帶靈性色彩的書，但不敢讓他知道，看見他走進來，我會立刻將書藏在枕頭底下！我自認為已經把靈性方面的東西拋在腦後。


    後來，我在大學裡遇見一個男生，剛認識不久，我們便開始熱烈討論各種關於哲學和靈性的問題。他的神采和個性喚醒我內在的某個部分，我深深地愛上了他，而對他的愛也從根本上改變了我那有條理、有規律的生活，讓我開始懷疑以前認爲理所當然的所有事情。某些深藏於內心深處的感受也開始蘇醒，在我的生命中處於停滯狀態的激情與靈感，現在以愛情的形式湧現出來。經過情緒激烈震盪的一年，我離開了以前的伴侶，希望與我深愛的這個男生展開美好的生活。然而，事與願違。經過一段時間的努力磨合，我們不得不承認，雖然我和他真心相愛，也擁有共同的興趣，卻不適合彼此。'
  merge: -1
  pgno: 17
- img_proc: false
  md: '經歷這個沉重的打擊之後，我接受了美國哈佛大學提供的獎學金，決定去國外暫住一段時

    間。在那裡，我覺得異常孤獨，有時甚至感到絕望。課間休息時，我坐在這所世界知名學府的

    臺階上，目光空洞無神地看著前方。學術知識再也無法讓我感到充實，即使它們來自這個世界

    上最明晰的心智。雖然我完成了科學哲學方面的博士論文，但我知道自己對於在大學謀職並不

    感興趣。我渴望汲取充滿生命力的知識，不再以理智，而是以感受來理解人生。


    我在哈佛大學對面的一家書店看到珍·羅勃茲傳導的《賽斯資料》，賽斯在其中敘述了信

    念的創造力、平行宇宙的存在，以及心智的靈性來源和運作方式。閱讀《賽斯資料》時，我不

    僅感受到這些訊息——更高層次的哲學——對我的感染力，也感受到充滿字裡行間的能量，這

    股能量來自超越物質實相的次元。《賽斯資料》中洋溢的靈感、光明與幽默使我重新認識生命

    的意義，我開始對「通靈傳導」感興趣，把進行博士研究必須閱讀的書扔在一邊，不過一走進

    課堂，我就趕忙把《賽斯資料》藏起來，彷彿那是違法的。只是，我無法一直堅持這種「捉迷

    藏」遊戲。


    一九九七年博士班畢業後，我告別了大學，開始尋找可以將我對哲學和靈性的興趣付諸實

    踐的機會。我一邊教哲學課，一邊透過仲介公司的介紹，先後做過幾份祕書工作。在大學時，

    我習慣了一個人獨立完成各項工作，因此很不能適應充滿社交和階級特性的辦公室生活。屢戰

    屢敗幾年之後，我在二○○年拜訪了一位住在荷蘭祖特爾梅爾的靈性治療師及生物能量場解'
