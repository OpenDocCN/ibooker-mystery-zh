  md: '# 與約書亞相遇


    傑瑞特和我有個習慣，就是會在晚上進行一次催眠，讓擁有多年催眠經驗和興趣的傑瑞特將我帶入催眠狀態。我們以這種方式探索自己的心理面向，例如前世記憶或情緒堵塞，並提出一些人生和靈性方面的問題。二〇〇二年的某個夜晚，我感受到一個陌生存有出現了。在此之前，我曾經接觸過一些指導靈，它們給予我溫柔的能量和充滿愛的建議，但這個存有卻完全不同，它比較端莊肅穆，且富於感染力，我們決定探明它到底是誰——或它是什麼。當我開始與這股能量溝通時，我感受到這是一個充滿智慧的男性存有，而它的名字「約瑟之子約書亞」（Joshua
    ben Joseph）——耶穌的阿拉姆語名字——清晰地出現在我的「內在之眼」中。那一瞬間，我內在的深層覺知被喚醒了，我確切地知道自己感受到的是耶穌的能量。雖然我有長一段時間都在懷疑這一切的真實性——更別說向外界透露——但從一開始，約瑟之子約書亞的能量就讓我感到很熟悉。在祖特爾梅爾進行回溯催眠時，我回到了某個前世，那時我是約書亞的忠實信徒，他的訊息和神采征服了我的靈魂，他的死則讓我心灰意冷。我還記得那個回溯療法治療師對我說：「那一世是你的靈感之源、靈魂之火。」當時我一臉困惑地望著他，現在我明白他的意思了。我要在這一世再次拾起這個靈感，並在這個時代——和兩千年前相比時機更成'
