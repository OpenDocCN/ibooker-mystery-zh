- img_proc: false
  md: '# 作者導讀


    這時，傑瑞特出現了。那時我剛剛開始上網，四處在網路上搜尋關於前世、業力和轉世的資料。我看到傑瑞特的網站，很快便開始和他頻繁地連繫。我感覺到自己和他有著強烈的內在連結，彷彿兩人已經相知很久了。當我們在二〇〇一年第一次見面時，我的感覺得到驗證。那是我第一次去看他，離開時，他送我去火車站，我們一起在月臺上等火車。


    我和他默默地並肩坐在椅子上，雖然四周人聲嘈雜，我卻覺得有一種深刻的寧靜圍繞著我們，彷彿通往其他次元的門暫時為我們打開，我和他的靈魂在無言的溫柔中互相問候、互相擁抱。我的內心深處湧起無邊的喜悅，彷彿已經回到了家，理所當然地享受著親密，這是多麼溫柔、快樂和輕鬆啊。我遇到了我的丈夫。


    幾個月後，我辭去工作，並退掉在祖特爾梅爾租的房子，搬到蒂爾堡和傑瑞特住在一起。我很快就懷孕了，並在二〇〇二年生下我們的女兒蘿拉。那一年，我的工作室也正式開張，提供生物能量場的解讀服務。一切都進展得非常快、非常順利，我很滿足。歷經各種變動和波折之後，我真切地感覺到自己被某個更高的力量引導著，那是我靈魂的力量。我內心深處的靈感終於與地球實相建立了連結，我開始跟隨靈魂的聲音而活。'
