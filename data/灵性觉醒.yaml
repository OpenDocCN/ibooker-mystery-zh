- img_proc: false
  md: '讀師。她解讀了我的能量場，告訴我她看到的顏色和畫面，以及隨之而來的感受，我被她的解讀方式深深觸動。她對我說：「是時候了，你要跟隨內心深處的靈感而活，不要再受制於內在的恐懼和缺乏自信。」這讓我覺得難以接受，卻不得不承認她是對的。那時的我工作做得不快樂，親密關係中也沒有任何激情，內心不安寧，而我卻不知如何是好。


    去拜訪優柯（譯注：前面提到的那位靈性治療師）是我人生的轉捩點。那一年，我參加了她講授的「提高直覺力」課程，這門課對我的情緒衝擊很大，舊有的痛苦、憤怒和恐懼浮出表面，我從來沒有如此清晰地覺察到它們。我覺得情緒層面上發生了顛覆性的變化，讓我受益匪淺。我感受到內心的平靜，也覺得自己更有力量，並且有生以來第一次覺得自己真正「住在」我的身體裡，也第一次感受到與地球的連結。我在靈性方面一向如魚得水，很快就學會解讀生物能量場。不過，與地球實相建立連結並面對因此喚起的情緒，卻不是那麼容易。優柯像母親一樣引導我走過這個階段，讓我彷彿獲得了重生。


    那一年，我也接受了回溯催眠，在催眠狀態中，我回到了不同的前世。這趟神奇之旅使我認識了靈魂的次元，它遠遠超過活在這一世的我們。我看見自己在地球上的多次轉世中——甚至在來地球轉世之前——所經歷的善與惡、黑暗與光明。那時我已經可以自發地看到前世的一些畫面，而對前世的回憶讓我留下深刻的印象，一切逐漸變得明瞭。我那時的男友——我們已經同居了幾年——很難理解我的所作所為，於是，我們分手了。'
  merge: -1
