  md: '世界。這是我們已經習慣的世界樣貌。這就好像是癮頭很大的老菸槍。天啊，接著我們竟然得馬上戒菸！沒有人能處理那樣的事。這種改變太巨大了。帷幕並非在 2027
    年才會拉下。我們已經在舞台上，朝著改變匍匐前進。


