    這是他聽到的精確說法。是玉龍把這個宇宙、這個還沒誕生的整體，帶到準備誕生的外在世界。這個整體有唯一個性，而玉龍則在宇宙規模上提供了類似人類新皮質的東西。


    要把我們對閘門的已知詮釋用在玉龍身上時，請務必謹慎。就像人類拍攝的電影裡，外星異形的形貌總類似某種生物體，因為那就是我們唯一理解的生命模式。我們很難把玉龍喚作生物，所以最好還是用玉龍稱呼就好。我們面對的不是那種會入世然後離世或者演化的物種。在此，我們獲得的是終極的答案。這就是完美的形體原則。再也沒有進行突變實驗的必要了。它有著無與倫比且幾乎堅不可摧的特性。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_252_0.png)


    是覺醒的自我意識。它在本質上是社會化的，在感官層次上，每個玉龍都有所差異，但他們全都被精心編排，以運作出極佳的和諧。


    如果我們不採用基因概念來面對閘門，就得以不同的角度來看見他們的價值。玉龍的閘門不再是基因編碼。它是一種與生俱來的固有編碼，以恆常不變的基礎結構運作。我們試圖以人類的語言表述它。在玉龍的設計裡，你看見的是微中子海如何影響這個特殊物體的電路圖。


    唯一存留的能量中心，或者說，唯一相同的就是愛的中心。我們已經知道裡頭沒有解決中心，但有了造型奇特還附加一個閘門的欲望中心。


    玉龍是一個巨大的回應機制。服務的能量中心是一切的核心，它也取代了往昔所有道路相接在一起的那個分享中心。在意識的驅使下，被產製出的能量有著更多的任務。能量中心本身的價值會完全不同。試圖用任何我們已知的價值來與它們打交道，都將一籌莫展，此外，Ra
    被告知的某些事情充滿細節，但有些則是連解釋都沒有。


    玉龍是沒有心智的生命，因為那並不重要。他們將大大受到自身的兩種覺察變體影響。而心智不是他們的東西。玉龍並不是個性，但將是個性的基底。玉龍的存在不是為了在心理上對任何事情產生興趣。他有更優先的目標，且當然也有他的身分特徵。玉龍與幾何學及研究調查的連結更深。你可以把他看做一種多重通道系統，透過共性鏈結，這個機制注入冰凍的二氧化矽，與意識一同運作。這個意識是鮮活的，我猜這是它能被展現的唯一方式。載具不算活著、也沒有死去，它是單純的無生物，但意識則在裡頭存活。這個灰色區塊為意識灌注了生機。這個程式是個非常巧妙而精確的形體，這個形體就只是單純讓意識駐守其中。如同我們所理解的，形體本身並不依賴意識。它就只是水晶基底的頻率產物。


    你可以看見玉龍有三顆意識水晶。


    名為 DH 的是源自人類的設計水晶。而 DM 則是來自哺乳類的設計水晶。PE 則是源於中心水晶系統的個性水晶。PE 水晶坐落於我們所稱的欲望中心，但我們不能把這個名字用在玉龍身上，我們沒有和它相稱的名字可用。


    所有的玉龍都在同樣的時間被創造，所以出生時的木星或土星位於何處已經不再重要。他們被以截然不同的方式編程並留下印記。我們擁有的玉龍相關知識是模糊晦澀的，這門知識和我們所賴以為生的那種完全迥異。


    「孩子」這宇宙實體的組建與成長，是個偉大的奇蹟。某程度上，它會擁有一種生命，無論這到底意味著什麼，它將出現在所屬的任何維度。當你看著玉龍設計裡的灰色區塊，你會獲得超越性的體驗。畢竟，我們可以把這些偉大整體的構成元件，視為一種奇點。


    每一顆玉龍的個性水晶全都一模一樣，所以，玉龍被設計來支持的那個宇宙心智的潛能，將被普遍地展現出來。為了提供個性最佳感知優勢可能性，玉龍必須建立的參數標軸就位於設計圖裡的那三個角落以及駐有
    PE 的能量中心。這是提供整體心智協作的藍圖。別忘了，玉龍並非生命體。不是玉龍的身體在活，活著的是其內的那個獨特的意識。這正是我們所說的奇蹟。


    你得明白，諸多存在皆有這麼一個命運；就是他們的意識水晶將搭乘玉龍這艘無與倫比的載具，越過「無法穿越的環」，進入只能以「難以想像」來形容的維度。要確實理解我們與我們身而為人的掙扎奮鬥，最終能透過啟示來掌握「我們是形體原則與其意識的體現」這個道理。如果我們不能落實運作這些形體——我們這種人類形體——就無法獲得我們應得的報酬。但形體原則終究不會再浪費時間閒晃度日。它將成為某種神奇的定型。而這個奇異的東西，我們稱之為玉龍。


