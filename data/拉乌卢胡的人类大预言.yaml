  md: '單獨的銳確實是無助的。然而，銳的伍群絕對不是無助的，反而能接收並整理所有訊息，提供給融合意識進行存取。銳要能存活下來，不依賴人類的慈善機構或人道主義照顧，唯一的辦法就是擁有策略能力。他們身為單一個體時不具備這種能力，但那個內建覺知、有意志力和意識的伍群就辦得到。那是一種融合的意識。


