  md: '知識之外，什麼都沒有。


    在這段奇遇之後，他經歷了此生唯一一段消沉期，畢竟這不是那種你可以跟太多人傾吐的故事。這是個弔詭的故事，以我們文化的運作模式看來，甚至會嚇壞某些人，因為他們會賦予這件事別種錯誤的投射。走過這般歷程，處在那樣的時空，接著，把一切拋掉，重新回到凡人身軀，實在痛苦。


