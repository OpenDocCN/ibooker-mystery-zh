    # 如果到了 2027 年，世界將分崩離析，你會相信嗎？


    人類設計祖師爺 Ra，1987 年在西班牙的伊維薩島上，遇到神祕的聲音。連續八天八夜，他接收關於我們這個宇宙的訊息，預言了人類的未來：


    - 我們的電力逐漸耗盡，繁殖力匱乏，本世紀後半，人口將大幅度減少。

    - 創新改革的時期即將結束，集體的研究、共享將邁入尾聲，民族國家將走到盡頭。

    - 人類與哺乳類的關係將發生重大變化，2027 年之後，將有龐大的業力懲罰降臨在濫生者身上。

    - 新人類即將誕生，接下來將有 1300 年的時間，人與新人類會共存在地球上。

    - 未來地球將遭受某物體的撞擊，地球上的生命也將隨之而去。


    面對如此遽變的未來，我們究竟該何去何從？


    ---

