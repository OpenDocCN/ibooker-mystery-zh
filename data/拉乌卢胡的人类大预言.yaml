    ## 回合


    ### 紀元階段


    這門知識的機制非常特別。它讓我們得以藉由不同的方式來觀察。但這並不是算命工具。它比較像是能引導你的邏輯知識。我們身陷於一個龐大的機制程序，而且對此無能為力。從上個章節開始，我們漸漸了解朝向合一的演化動向。


    有許多東西，譬如龐大整體的合一意識，是我們無法理解的，但我們可以欣賞這個程式運作了幾十億年的方法。對於有限的時間空間，我們必須全然接受。人類這個物種正處於存在的加冕點上，但很不幸，這也是深淵旁的斷崖。2027年開始，對我們來說就只有「墜落」而已。程式正在碾壓我們。接下來的1300年，對於可以再轉世為人的人來說，是實現我們之所以為人的潛能的最後機會。我們所要探索的，是程式那影響深遠的卓越力量。它並不抽象。我們面對的是程式的邏輯與其力量的活動。


    很多人會假設程式就在某處，但如果你看著圓，就會發現接受能力這樣的天生特質。我們擁有所需的接收器。在出生時，有些細節被打印在我們身上，但我們仍得有接收器，否則就無法加入生命的進程。我們擁有應對程式的受體，來接收最深邃的編碼程序。我們每個人內在都帶著這些東西。


    觀察愛的中心時，我們必須知道這是磁單極的所在，並將我們從各自分離的幻象中聯繫在一起。這是程式的終極工具，這個宏偉的神祕創造了生命，但它並未被科學認可與建立。磁單極藏有「量子與其相對境界確實是共同運作」的答案。它不只將我們相繫，也在幾何軌跡之中帶領我們前進。它是地球上諸多生命元素的協調器，也是人們可以想像得到的最難以置信的舞蹈。


    磁單極確保不會有兩個物體同時棲身於同一個地方。它的領域是愛的中心，其核心意義是身分/認同。


    我們人類常將欲望中心理解為身分，讓那個我、那個我是來發言。


    但愛的中心的身分其實更勝於此。它是有著更高法則的調節器。是愛的中心掌握一切跟我們有關的事物。這個能量中心裡的閘門充滿神奇與美好。它的主題是凝聚一切。你看著的，是一張蜘蛛網，將整體聯繫在一起。正是它將我們鎖定於程式。


    ## 二分點的歲差


    人類設計最為重要的觀察面向，那就是太陽與地球，它們呈現出我們 70% 的編程。在曼陀羅輪裡，它們以 88 度構成十字。


    這個十字與更大的程式十字的相異點在於：後者與二分點的歲差有關、而不是太陽，且呈固定的 90 度。人類是突變、是生命，所以我們的十字是 88 度。外頭的那個程式則不是。它的幅條固定在
    90 度。


    ## 文明的回合——鎖與鑰


    在 19776 年的回合中，有 48 個地球週期。我們目前活在文明的回合，這回合始於西元前 16101 年，將在西元 3675 年結束。每一回合有 6 個紀元階段，在裡頭有著不同的週期。我們生活的當前紀元始於西元
    379 年，並將在進入尾聲時終結地球上的一切生命。


    地球週期以稱為鎖與鑰的系統 (lock and key system) 運作。輪中每進行 8 次回歸運動，鎖就會改變。如果研究例圖，你會發現鎖與鑰匙總是有著特別的關係。目前這個紀元的鎖是下面這幾個閘門：


    - 10 本質

    - 1 範例

    - 46 聖殿

    - 7 領袖

    - 15 模式

    - 2 計畫

    - 25 道路

    - 13 見證


    寫書的這個時間點①，紀元位於 37 閘門（鑰匙），並與閘門 25（鎖）有著特別的關係。那就表示我們的時代道路（閘門 25）被閘門 37 賦予特性。


    也就是說，如果你的設計圖裡有閘門 25，就會和某個擁有閘門 37 的人相連。


    在 2027 年，會變成閘門 55 的道路。這基本上是內圈與外圈這兩個曼陀羅輪以反方向而運轉所致。


    閘門 10 代表本質或我們的行為。現在與閘門 10 相應的是代表聚焦及專注的閘門 9。包括工業時代、學校體制和政府組織，全都是這組鎖與鑰匙的產物。


    這個週期始於 1615 年，也將在 2027 年結束。


    ①本書原文初版是 2012 年發行。


    所以,當你看著愛的中心,你看的也是鎖。是這個鎖將我們鎖定在程式裡。是這個鎖將萬物維繫在這部演化的電影裡。它內建於我們之中。一把把鑰匙輪流與這些鎖配對。它們呈現了這個進化程序的週期。如果你看著道路的鎖,你也能握有一把對應任何週期的鑰匙。


    現在是計畫十字的時期。我們握有閘門37,並將在2027年轉變為55號鑰匙。這組特別的鎖與鑰匙已經存在許久。有好幾百年之久。道路被家庭主導著。但其實不只有單一道路。道路有很多條。它們以一種進化模式呈現,是因為曼陀輪的運轉就是如此。如果你觀察某一紀元時期的閘門卦象的下層配置,就以從閘門10到19這個區塊為例好了,你會發現它們都一樣。這是所謂的共同主題。在這個紀元裡,它們都帶著相同的化學性。那是本質這個主題的次要發展。你在這裡所看見的,是演化的運作方式。這是你我都有幸能擁有的絕倫美妙視角。


    幾百年來,我們的道路就是家庭導向的道路。我們從中得到了什麼呢?我們的一切制度、社群、城邦、國度,以及對彼此的關心。凡事都是協議與契約。這完全取決於公民對國家的所有權、國家對公民的所有權,公民對牧師的責任以及牧師欠公民的權利。這就是集體迴路,畢竟,閘門37就隸屬這個迴路。


    在另一邊,你可以看到對應閘門46聖殿的鑰匙是閘門40。關於聖殿有趣的部分在於近400年來對於靈性的否認;挑戰靈性的科學思維問世,也是這個週期的一部分。


    我的設計裡, 閘門25有啟動。我是個上鎖的人, 但我沒有37閘門。當我遇到擁有37的人, 這段關係就會非常重要。這把鑰匙會插入這個鎖, 這個進程在曼陀輪旋轉的此時,
    在這個演化點上, 因應程式的要求而出現。


    ①以上這幾個閘門的底部都是「兌為澤」結構。


