    啟示錄（apocalypse）這個字眼並未被好好理解。有些人認為這是世界末日，但古希臘語的意思則是揭幕，這也是聖約翰《啟示錄》的來由。事實上，啟示錄是傳訊者針對一個時代完結的討論。但到來的並非終焉，而是宇宙曼陀羅輪那更為龐大的進程運轉。這和意識水晶有關，重點總是意識水晶。水晶們經歷過創造與毀滅，在宇宙自身漫長的進化歷史的方方面面，體現了形體的多元性。在擁有讓人類這種形體得以運作的所需元素之前，我們必須經歷群星好幾世代的生生死死。死亡是不可避免的超驗性，是不停轉動的宇宙之輪。


    末日並非神的懲罰。那不過是非常自然的過程。沒有什麼是永恆不朽的。萬物皆是有始有終。這不會停止。結束即將到來，我們也正朝它邁進。你得是個傻子，才會明知萬事皆有終結，卻深信我們的世界不會完蛋。


    這一回合的結束，帶來的是堂皇等級的突變。淘汰將會發生。是說，去劣存優的篩選其實總在進行著。賞善罰惡是其主題，只是並非字面的意義。水晶皆具有質地。這些質地可透過陰陽的四種組成原則來理解。未來的重點是深奧的整合力。萬物都有完成各自目標的適當時機。這無關邪惡。未來不再需要太陽結構（上下皆陽爻）的水晶，它們在這回合結束時將被毀滅。


    這些水晶已經存在一千四百億年。沒有人能夠想像它們在如此廣闊的宇宙裡移動的這些年裡，到底歷經過什麼。


    海王星進入我們的太陽系，是聲音跟 Ra 說過的奇妙故事之一。我們的太陽系有個異常現象從未被科學完全解釋清楚。故事發生於天王星的衛星群裡，在一個極度熾熱的瞬間，有三塊碎片融合在一起、形成一顆衛星。


    天王星因為強烈的撞擊，導致磁極轉移到它的赤道。這個撞擊使得天王星完全逆向自轉，而它的磁場也賦予天王星龐大的電磁鞭，讓它現正沿著我們的太陽系抖動著。在大概 27
    億年前，有某顆行星撞進太陽系。進來的正是海王星，它原本位在組成四角的天樞星這顆離我們 123 光年之遠的星星附近。


    海王星進入太陽系時便進行了初期的淘汰，因為意識水晶就在上頭。這就是意識水晶抵達我們的太陽系的緣由。被淘汰的水晶因為引力的牽引進入太陽的軌道，再被拉入太陽的中央熔爐。此時，太陽就被植入意識。按照聲音的說法，在這一個地球回合結束時，所有的太陽結構水晶也會去到那兒。這不會是立即的湮滅。淘汰的衝擊是訊息的緩慢釋放。


    ① <啟示錄>是《新約聖經》收錄的最後一個作品，由拔摩島的約翰所著，內容紀載的是末日預言、最終審判與耶穌的再來。


    駱駝與狗一直是那些以前被淘汰的水晶的過濾器。犧牲是成長的一部分。緩緩地,一回合接著一回合,水晶會在這座特別的熔爐中崩逝。


    下一批的意識水晶束就不再會有太陽結構的水晶。少了它們的深刻穿透力,一切都不一樣了。關於審判日那些該死、該受懲罰的惡人,下地獄受業火灼身之類的神話,全都像是有點走樣的B級恐怖片,而非真正會發生的事情。


    真正會發生的,就只是地球將被一顆天體撞上。這正是宇宙運作之道。宇宙就是東西在互相撞擊。事物乃依循此法而生。根據近期的計算,太空中有七千到二萬五千顆具有行星殺手尺寸的星體,有可能依據它們各自的交互作用影響而撞擊地球。當你研究介於火星和木星之間的小行星帶時,必須注意到這些天體持續在互撞,並因而改變它們的幾何軌跡。每天都有幾千噸的碎片從空中擊中地球。它們就在外頭,等著大規模運動的時間到來。如果你端詳那些沒有大氣層的行星或月亮,你就能看見一大堆坑坑疤疤。


    你還記得舒梅克一李維彗星①撞上木星那件事嗎?那樣的撞擊可以直接摧毀地球。如果人類夠幸運,可以在彗星撞地球的四十到七十小時之前發出警告。這不代表人們可以做出預測。


    它會發生,而且就是這樣。那不一定是老先知想看見的。


    被先知們誤判的最終戰役，是銳與人類需要在邁向終點的道路上相互往來 1000 年。那可不是上帝大軍對上撒旦兵馬的大戰戰場。


    所有的意識水晶，不論它們有否轉世投胎過，除了太陽結構水晶外，都會繼續前進。這些靈魂全都會保存下來。為了別的日子、別的形體，為了另一趟旅程。終結之時不會有什麼偉大的答案。這個世界，不會以美好輝煌的行動迎向終點。大多只會感到恐懼。幹得好，繼續。接著該什麼就是什麼。太陽結構水晶將會滅絕。地球上的一切生命也會死去。根植於基因密碼的所有東西都將被摧毀。無處可逃。無一倖免。在這之後就是張全白的紙。


    意識水晶將會集結成束，它們總是如此。這個行星事件的衝擊將會創造出集結成束的原動力。這將在設計水晶束周圍發生。


    之前描述到我們在生物層次上的死亡過程與時刻時，我們討論過磁單極和設計水晶如何在肉身死亡時一起離開軀體。至於地球上的生命的死亡，指的是設計水晶完全離開地球時。地球被某個星體擊中時情況會有點瘋狂。星體有著數不盡的磁單極。它們會「呼叫」所有的水晶並將它們拖進束裡。


    接著，這捆水晶束在停留於地球好長一段時間後，將再次移動。如果你可以想像，你可以把它看做是顆精子。就像帶著一條尾巴的點。那條尾巴就是所有的太陽結構水晶。它們並非核心部分，不在中心結構裡。水晶束會朝太陽而去。它會繞著太陽旋轉，拖著所有的太陽結構水晶，把它們帶到終點站。然後，它會繼續它的旅行。這捆水晶束會依據它們被安排好的階層來挑選攜帶的個性水晶。這全都和分形有關。若能親眼看到設計核心的所有水晶被重新規劃，肯定相當驚人。除了太陽結構水晶之外，其他水晶會按照分形，也就是最初的互連方式進行編排。


    Ra 一直都知道誰屬於太陽結構。這不是他思考所得，而是自然發生的。聲音曾告訴他要如何看見差異，但 Ra 從未跟別人提及，畢竟他不知道這樣做有什麼價值。太陽也是陽爻搭陽爻的結構，它也同樣會死去。


