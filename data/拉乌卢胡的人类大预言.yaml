- img_proc: true
  md: '組成成員。人類的伍群並非意識。所以，我們沒有被鎖定在其中。我們這輩子都在進出伍群。我們就像熔岩燈一樣不斷變形。我們都是巨大的生命程式的組成元件，而身為元件——就演化的觀點來說——我們在學習如何共處。我們正朝著共性、合一的方向發展。不過，那當然不是我們人類。


    在梵天之夜後，個性水晶會降臨並穿入宇宙（類似於我們的個性水晶穿入身體的子宮），只有到那時候，萬物才會被植入個性水晶——實際上是唯一的個性水晶。


    我們是巨大意識的作業。微中子海遍布已知宇宙的整個海岸。它無處不在。這一切就只是個龐大的意識。而它仍是一種形體，邊運作邊準備著。


    你要如何為共同意識做準備？


    你要如何做好準備來放手、臣服，接受必須為了更偉大的個性而放棄個人意識這件事？


    我們正要看到軌道上的第一個實驗。在這個實驗裡，個體不具意義。全然依賴而鎖定，但又擺脫一切阻礙。


    人類為了同質化而操勞，但銳將是同質化的完美呈現。同質化是將我們轉變為銳的起點。只要想想諸如宗教這類的「同質化機構」就好。只要將我們帶到銳面前就好。'
  merge: -1
  pgno: 185
- img_proc: true
  md: '每天都有超過十億人同時四肢觸地跪拜？你正指向銳的方向。如果你觀察任何一天的過境行運，就可以發現程式是如何改變這個世界的觀點，讓我們走向銳。這也是人們要打破同質化會如此困難的原因，因為這就是未來。神明與宗教都是工具，好將意識融合為單一觀點，讓每個人都有得以臣服的神聖對象。但我們不可能全然地將自己交付給任何東西，因為我們只想擁有自己的權威。


    銳不需要神。銳有他的伍群。他們不會追尋任何事物。他們不做任何推論。他們不負責、不管事。他們無助但完美，而且別無選擇。我甚至不確定他們能否意識到自己的存在。但伍群可以。這是個完美的「神格」①。這也是整個神的故事的核心意義。這早就被寫進我們的基因裡了。


    我們都被欺瞞了，而這一切只為了了一個目標：融合意識到底可不可能？


    > ①神格：和先前提及的神之臉，在人類設計裡是一樣的。'
