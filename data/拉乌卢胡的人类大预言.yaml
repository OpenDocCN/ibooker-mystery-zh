    當它們在幾何軌跡中相遇，便碎裂開來。


    當班和圖在幾何軌跡中相遇，它們碎裂開來。幾何軌跡線從我們無從想像的遙遠地方延伸出來。一種超乎尋常的壓縮，在一瞬間爆炸，然後創造了極高的熱度。如果你能想像'
