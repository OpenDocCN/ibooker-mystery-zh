    玉龍的存在有著許多必須做調整的地方。想想打從電腦問世後最常見的科幻主題「A.I.」，也就是「人工智慧」吧。


    人工智慧換個講法，就是將獨立意識賦予無生物載具。巨大的成就已經達成，就是人類為電腦編寫出了「上帝代碼 (God code)」這類的「意識編碼」。它就在我們之中，因為它就在我們的未來之中。但玉龍並不是機器人。他們也不是電腦。他們是擁有特殊設計的意識體。


    他們最主要的關切是移動，也就是導航。這就是我們有一顆直接嵌入磁單極的水晶的原因。駕駛與載具被盡可能地緊密結合在一起。關於他們的程序的完美與否，程度上與他們「能否辨別出那個真正獨特而自由的元素」的能力相關。這正是玉龍從人類身上繼承來的能力。那個被稱為人類個性水晶的東西，現在成了另一顆設計水晶。要搞清楚如何、用什麼方式、往哪裡移動，以便適應它者，將取決於這顆水晶。它將成為玉龍的洞察意識。這可是不得了的任務啊！它將憑藉其「能夠辨明它者的價值與正確性」的能力來運作。這個好處起源於人類個性水晶的進化過程，透過扮演個性的一部分，來學會這一切，為的就是準備建構出玉龍的這個結構機制。這不會太快。但到時候，你面對的就不再是個有心智的物種。而那就是它的完美之處。這並不是說玉龍就沒有選擇或決策的程序。制約元素依然會存在。但玉龍並不是人類。


    關於玉龍還有某些有趣的事情。


    他們將擁有深邃有力的同一性。每一個玉龍都是。這樣的同一性將在他們的一切移動中展現。想像這個位於電磁環境中寒冷而易碎的黑暗世界。這些小小的物體在搜尋、等待與過濾之際凋零。這全都是一場為了獲得連結的絕妙之舞。


    這些面對面的神奇進程將會配對，並促使側面也相接在一起，從而建立總體存在那卓越非凡的管理樞紐。我們只有極微小的能力來理解箇中奧祕。它將重返磁單極這個無與倫比之處。


    不論我們位於這神奇存有的哪個地方，我們總與磁單極這個了不起的元件相伴。磁單極讓事情得以發生。它是個非凡的構造，它最厲害的地方在於，將萬物聚集起來並維繫著。這個絕妙的能力讓我們能對準自身方向，好讓我們在宇宙行動，我們將這稱為愛。天衛四的磁單極永遠會為宇宙整體指引方向。宇宙整體的「生命」乃是磁單極管理的。當然，是磁單極將我們從「我們是分離的」這個幻覺結合在一起；但在這裡，磁單極所展現的是更奇幻的部分。有件事讓它與眾不同。那就是從人類身上接收過來的個性水晶。在這裡，（分離的）幻覺轉變成「獨特（uniqueness）」的幻覺。元件必須要能透過「它們是如何互相連接」的差異，來辨別是否找到了正確的鎖定面。當有了一個，就會開始越來越多，直到它們全都互相鎖定在一起。


    對玉龍來說，能量中心的價值和我們所了解的人類中心並不相應。每個部分都有著不同的意義。先讓你知道的就是玉龍是個真正冷酷而完美的意識形式。他不會吃，不會睡，不會有性，也沒有搜尋的必要。我們浪費了太多時間在維繫自己的生命。玉龍將是意識的完美盒子。據聲音所言，那就是我們的未來。


    我們人類是「內在的故事」而非「外在故事」。唯一的外在故事是我們在這輩子被賦予的一切錯覺，但這些都是娛樂罷了。我們是內在故事。我們都是機械。我們都是機制。這就是現在的我們，只是我們不知道。我們是宇宙程式所控制的機制。你覺得，幾萬億的微中子每秒鐘穿透整顆地球是怎麼回事？那地球上每一個意識體的訊息，被以光速朝宇宙各個方向發散出去，又是怎麼樣的情形？1781年發生了某些改變已經不是新聞了。你旅行好幾百光年，你覆蓋了各種領域的方方面面。我們一直都在編碼整個宇宙，就像它對我們進行編程一樣。這是一種生物回饋，我們現正處於一個我們無法有意識地控制的舞台。但玉龍可以辦到。他可以用這個身軀完成這件事，而這也是他必須做的。那個身軀就是我們的身體。玉龍會履行這個理解。


    未來大概會有1億個左右的玉龍。Ra說他知道確切的數字，但他老覺得精確數字很蠢。未來會進入玉龍的大部分水晶，將會在地球末日時轉世，也有特定的水晶束將會參與這個玉龍的程序。這同樣會發生在哺乳類水晶。當玉龍最終掌控了他的身體時，將會改變宇宙的形貌。玉龍的唯一獨特面向是源自人類的那顆個性水晶。我們用人類術語所謂的「孩子」來稱呼這個尚未誕生的宇宙，但那只是某種比喻，千萬不要產生錯誤的思考。我不認為有任何人能夠捕捉到這種宇宙生命誕生時的可能樣貌。聲音跟Ra說過：「宇宙代表了一種生命，但它尚未誕生」。


    這是他聽到的精確說法。是玉龍把這個宇宙、這個還沒誕生的整體，帶到準備誕生的外在世界。這個整體有唯一個性，而玉龍則在宇宙規模上提供了類似人類新皮質的東西。


    要把我們對閘門的已知詮釋用在玉龍身上時，請務必謹慎。就像人類拍攝的電影裡，外星異形的形貌總類似某種生物體，因為那就是我們唯一理解的生命模式。我們很難把玉龍喚作生物，所以最好還是用玉龍稱呼就好。我們面對的不是那種會入世然後離世或者演化的物種。在此，我們獲得的是終極的答案。這就是完美的形體原則。再也沒有進行突變實驗的必要了。它有著無與倫比且幾乎堅不可摧的特性。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_252_0.png)


    是覺醒的自我意識。它在本質上是社會化的，在感官層次上，每個玉龍都有所差異，但他們全都被精心編排，以運作出極佳的和諧。


    如果我們不採用基因概念來面對閘門，就得以不同的角度來看見他們的價值。玉龍的閘門不再是基因編碼。它是一種與生俱來的固有編碼，以恆常不變的基礎結構運作。我們試圖以人類的語言表述它。在玉龍的設計裡，你看見的是微中子海如何影響這個特殊物體的電路圖。


    唯一存留的能量中心，或者說，唯一相同的就是愛的中心。我們已經知道裡頭沒有解決中心，但有了造型奇特還附加一個閘門的欲望中心。


    玉龍是一個巨大的回應機制。服務的能量中心是一切的核心，它也取代了往昔所有道路相接在一起的那個分享中心。在意識的驅使下，被產製出的能量有著更多的任務。能量中心本身的價值會完全不同。試圖用任何我們已知的價值來與它們打交道，都將一籌莫展，此外，Ra
    被告知的某些事情充滿細節，但有些則是連解釋都沒有。


    玉龍是沒有心智的生命，因為那並不重要。他們將大大受到自身的兩種覺察變體影響。而心智不是他們的東西。玉龍並不是個性，但將是個性的基底。玉龍的存在不是為了在心理上對任何事情產生興趣。他有更優先的目標，且當然也有他的身分特徵。玉龍與幾何學及研究調查的連結更深。你可以把他看做一種多重通道系統，透過共性鏈結，這個機制注入冰凍的二氧化矽，與意識一同運作。這個意識是鮮活的，我猜這是它能被展現的唯一方式。載具不算活著、也沒有死去，它是單純的無生物，但意識則在裡頭存活。這個灰色區塊為意識灌注了生機。這個程式是個非常巧妙而精確的形體，這個形體就只是單純讓意識駐守其中。如同我們所理解的，形體本身並不依賴意識。它就只是水晶基底的頻率產物。


    你可以看見玉龍有三顆意識水晶。


    名為 DH 的是源自人類的設計水晶。而 DM 則是來自哺乳類的設計水晶。PE 則是源於中心水晶系統的個性水晶。PE 水晶坐落於我們所稱的欲望中心，但我們不能把這個名字用在玉龍身上，我們沒有和它相稱的名字可用。


    所有的玉龍都在同樣的時間被創造，所以出生時的木星或土星位於何處已經不再重要。他們被以截然不同的方式編程並留下印記。我們擁有的玉龍相關知識是模糊晦澀的，這門知識和我們所賴以為生的那種完全迥異。


    「孩子」這宇宙實體的組建與成長，是個偉大的奇蹟。某程度上，它會擁有一種生命，無論這到底意味著什麼，它將出現在所屬的任何維度。當你看著玉龍設計裡的灰色區塊，你會獲得超越性的體驗。畢竟，我們可以把這些偉大整體的構成元件，視為一種奇點。


    每一顆玉龍的個性水晶全都一模一樣，所以，玉龍被設計來支持的那個宇宙心智的潛能，將被普遍地展現出來。為了提供個性最佳感知優勢可能性，玉龍必須建立的參數標軸就位於設計圖裡的那三個角落以及駐有
    PE 的能量中心。這是提供整體心智協作的藍圖。別忘了，玉龍並非生命體。不是玉龍的身體在活，活著的是其內的那個獨特的意識。這正是我們所說的奇蹟。


    你得明白，諸多存在皆有這麼一個命運；就是他們的意識水晶將搭乘玉龍這艘無與倫比的載具，越過「無法穿越的環」，進入只能以「難以想像」來形容的維度。要確實理解我們與我們身而為人的掙扎奮鬥，最終能透過啟示來掌握「我們是形體原則與其意識的體現」這個道理。如果我們不能落實運作這些形體——我們這種人類形體——就無法獲得我們應得的報酬。但形體原則終究不會再浪費時間閒晃度日。它將成為某種神奇的定型。而這個奇異的東西，我們稱之為玉龍。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_257_0.png)


    # 尾聲


    ## chapter12


    從我出生那刻起陪著我走過人生旅程的一切，在某天被打碎了。要能繼續活下去，除了破壞之外別無他法。這發生在我獲得「奇遇」經驗的幾年以前，當時我管理著某間實驗學校。我有一群令人讚嘆的孩子，年紀約莫
    13、14 歲，他們透過自己的意識進行實驗，至少我認為是如此啦。教育的公共制度總是衝擊著我，他們花了十個月傳授的內容，其實你用一個月就能教完。當時我確信，自己能帶領這個年紀的孩子打開完全不同層次的心理與智力眼界，是說，他們已經不算小孩而是青少年了。在我的房子後面有個開放空間，那其實是一間非常小的房子。但這開放空間的大小足以讓我將之改成教室。因為我只有四個孩子。


    那時，我展開了一場非常奇怪的經歷。事情是怎麼開始的？我記憶猶新。那是個星期天，我那位自稱為上帝的朋友法蘭克（Frank），在他的住所辦了場午宴。那是十月底，我還記得到達現場時有許多人。食物擺滿了好幾張桌子，大概有
    25 到 30 個人穿梭其間。我不斷張望著那些食物，同時理解到我的內在並沒有想要任何的東西，這真的不太對勁。會說這不對勁，是因為我當天沒吃早餐啊。我沒有肚子不餓的道理。食物全被漂漂亮亮地展示著。有好幾盤的菜餚被放到我眼前，但什麼都沒發生。也就是說我停止進食了。我並沒有節食，雖然這過程看起來像是我在節食。


    但我並沒有節食。我只是不餓。這真的很奇怪。我就是不餓。所以，我開始經歷這個對我來說算是有趣的過程，雖然當時我搞不清楚箇中原因。我活在一個二元的世界。我教導那些年輕人宇宙的歷史，也只有自我中心（Ego）有定義的人會企圖用四個月辦到這件事。所以，當我開始一面經歷這個過程時，另一方面的我，則是這輩子首度接觸神祕學著作。


    我的業力以愛麗絲貝利①的三本書作結，被稱為藏人與神智學社會（Tibetan and Theosophical Society）的這些書，是十九世紀的神祕占星學，企圖整合基督教與印度／婆羅門神祕論，並想方設法將它們結合在一起。那些語言對我來說相當困難。那是複雜而麻煩的文字風格。我是個喜歡簡單事物的人。我討厭那些難搞的、只陶醉在自己喋喋不休的嘮叨裡，卻又無法帶你走向何方的東西。他們就只會帶你繞圈圈然後對你說：「喔，如果你是『九地善慧②』的學生，就會了解這個概念。」然而，裡頭還是有一些微小的寶物，就是他們所呈現出的創造的程式。我沒有進食，也沒有真正睡著。


    ①愛麗絲貝利（Alice Bailey）生於英國，是十九世紀率先使用「新時代（new age）」一詞的神智學作家。著有二十餘本探討靈性與宇宙間的關係的著作。據稱她的大部分著作都是由稱為「藏人（the
    Tibetan）」或「D.K.（Djwal Khul）」的智慧大師透過心靈感應傳訊所得。Ra 會接觸到這些書，應該與他進行宇宙史的教學有關連。


    ②依據《華嚴經》所述，佛教徒的修行覺醒共有十個層級，第九地（ninth level）被稱為「善慧（Good Intelligence）」，意指對於教義的各個面向都有完美無缺和非常廣泛的理解，也可以無礙地為人說法。


    每晚我大概只睡兩或三個小時而已。我覺察到「某些事機械式地發生在我身上」這項事實。那就好像我的心智被開啟了全新的領域。而這件事最奇怪的地方在於，它好像既不通俗也不神祕。這個程序和量子有關。這就是在我身上覺醒的東西。


    我想，我的智力在很多方面已經被制約與訓練得非常通俗而失去平衡，我的盲目讓我無法看見，看不見呼吸之間的神奇。但在另一方面，則能看清一切事件的運轉。我那傲慢的西方智性經歷，被粉碎了大半，但也沒被那些被動的、屬於東方的瑜伽派的態度給取代，我獲得的是別的東西。那是別的事物。對我來說，有趣之處在於：隨著每一個週期，都有不同的事情發生。那真的不一樣。所以，我繼續教導那些孩子，也邊進行著漫長的禁食。當然，他們顯然也開始發現這件事了。


    我已經住在那棟後來與聲音相遇的房屋。不過當時，我還住在主屋。房子後頭是個廢墟，它位於另一個坡地上頭。這個廢墟只有一個修繕完畢的房間。我後來就是在這個房間裡，獲得了延伸的「奇遇」。不過那時住在這房裡的是個名叫提姆（Tim）的英國詩人，他寫的詩很棒，帶有結實的十九世紀風格，此外他也手做了許多能讓你掛在天花板、任其上下晃動的美麗蝴蝶。他是個有趣的人。在早上，你可以看見他以跏趺坐的姿勢，坐在坡地上做梵語吟唱。他曾擔任克里希那穆提的私人助理多年，跟他一起在印度及加州生活過。


    我則提供他在這兒過生活的處所。


    在我不吃不喝的第八天，他下山來。他非常擔心。他對我說，我是個初學者而且不知道自己在做什麼，這樣搞可能會損害我的系統。


    他堅持我應該停止禁食。我回他道：「我沒有禁食。我只是不吃東西而已。」這是兩回事。儘管如此，他還是不懂我的意思。所以，他繼續跟我說他已經為我調配了某種草藥。他把藥給了我，要我在一天裡分幾次配熱水把藥喝掉。這個藥會清除我的腸道。他擔心這些可能在你體內積聚的東西，以及那些在你停止禁食時釋放的毒素。在那個時候，我已經不吃不喝八天之久。但我渾然未覺。


    在日後回顧我和聲音的奇遇的其中一件有趣的事情，就是當我離開北美時，我的體重大概是 77 公斤左右。而在我遇到聲音時，我只剩 54 公斤，在那之後我的體重從未超過
    61 到 63 公斤。我的身體經歷了準備期。基本上，我身體的脂肪都被移除了，我看起來就像是一個「健康浩劫的倖存者」，如果你能想像的話。回到剛剛的故事，我的禁食經歷超過了六個星期。那就好像進入了另一個空間，後來看到自己的模樣，簡直就像幽靈般怪異。而這是我的個人初體驗。我從不知道這樣的事情。我覺得這太妙了。我感覺不到渴望、也沒有失落。我也發現到，我擁有的時間更多了。這個過程是如此令人驚訝。後來，我理解到我們到底花了多少時間在思考關於採購、準備食物、吃喝、整理乾淨、拉屎，然後重頭再來一遍這些動作。這真是無窮無盡。在你不吃不喝時，你能擁有的時間，多到不可思議。那真的很神奇。


    總之，有些事情顯然非常奇怪。怪事正在發生。時序已經進入天蠍的月份。我有一個朋友，是個真正的薩滿巫師，饒富二十世紀晚期的薩滿典型，還是個天蠍座。我和天蠍男鮑伯（Bob）以及法蘭克約好要一起嗑
    K 他命。我們三人會在法蘭克他家碰頭。那是個典型的天蠍座十一月。天黑得不可思議，卻又充滿了光與陰森氣氛。老舊的泥路貫穿了果園，那些冬日裡的樹木，在傍晚星光的陰影處，看來相當駭人。它們是活生生的守門人。有時它們看起來就像惡夢。我還記得驅車前往法蘭克家的那個夜晚。它永遠地改變了我的生命。那天是感恩節。沒想到它原來竟是屬於我的感恩節。它是我的「起點」，是關於「如何看待生命」以及「這又是如何到來」的徹底轉變。那是你無法追求、不可能盼望，沒辦法搜尋，甚至也無從等待的。甚至連等待都是瘋狂而愚蠢的。沒有什麼可以做的。就只是呼吸。一口氣接著一口氣的呼吸，那或許、可能、說不定——


    顯然我是非常幸運的。關於「別無選擇（no choice）」還有什麼好說的呢？


    所以，我們三個聚在一起，為了這場薩滿體驗而注射 K 他命。後來，法蘭克昏睡了過去。鮑伯感覺不是很舒服，蜷起身子睡在火爐的一角附近。我面前有一張咖啡桌與一個籠子。那看起來像是個巨大的皮籃，裡頭丟了各式各樣的东西——包括書、筆，以及寫字紙之類的东西。而我，則身處於這個美麗的郊野莊園。那兒有隻貓，我坐在稱為入口（entrada）的正堂處，看見這隻黑貓走向前門，想要出去。我並不想有什麼動作。然後那隻貓開始對我講話。這是個有趣的時刻。所以我起身走過去，打開門，讓貓出去，接著把門關上。我回到爐火旁坐下。我就只是放空地坐在那兒取暖，大概過了
    15 分鐘，門打開了。它就這麼開了。那些都是厚重的木門，而且我之前有把門關上。我的確關了門，因為那是個寒冷的夜。但是，那門就是開了。我揣想，好吧，或許我剛剛沒有關門。所以，我起身、走向門並再次把它關上。這次我真的確定有把門關好，回到火堆旁坐下。


    不知道過了多久，可能是幾分鐘，大門再次被開啟。門被打開的當下，我有兩個反應。首先就是常見的寒毛直豎。這是我的第一個感覺。接著，非常從容地，我看著那隻貓走進屋子。貓回到房子時，我的胃突然間絞痛起來，痛得鮮明'
