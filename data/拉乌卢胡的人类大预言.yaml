- img_proc: true
  md: '所處環境。


    如果我們能進入另一個回合（以前有過很多回合，不是只有一個而已），銳會是擁有十一個能量中心的存在。九中心形體只是個過渡期。我們拋下七中心版本，目標是到達十一中心形體。要實現這個目標，你需要在這一側與另一側都能起作用的基礎結構。也就是橋樑。對銳來說，順服根本不是問題，他們也不會去問「我該成為這個伍群的一部分嗎？」他們不是人類。沒有「策略」。沒有個體。他們是完美的收集者，他們的完美造就了伍群超級強大的表現。如果你湊齊了
    81 組伍群，他們將會控制一切，並將擋路的東西全數推開。


    一組運作的銳伍群和單一人類完全無法相比。我試著保持樂觀來看待銳的本質，以及人類可能會如何與之互動，但是談到人類的本性時，你也必須要客觀務實地看待。


    人類必須活出策略的完美與可能性，因為「程式」發現到：發揮自我觀照意識的潛能，是生物形體最有效的生存方式。當個生物形體真的有夠麻煩啊！想想那些必須為了別的物種的生存而死去的其他生物。看看你每天花費多少時間來處理身為生物的一切難題，又得發展多少策略來活下去。我們人類是有史以來最厲害的生物。那麼，銳呢？


    面對生物，你不可能放棄策略。因為如果缺乏策略性，你就會死。而意識伍群則是最強大的策略體。伍群會照顧其'
  merge: -1
