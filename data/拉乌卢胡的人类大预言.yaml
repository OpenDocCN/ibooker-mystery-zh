- img_proc: true
  md: '我也許還只是香港的一個 HD 小小分析師，不可能為人生描繪出更美的生命藍圖，不停地擴張直至今日。


    包括史提夫老師著作及網站的中文化工作，一直由 Simon 負責；奈何天妒英才，他在系列書籍中文化的過程中病逝。而後，史提夫老師對 HD 知識有了新的發現與見解，不但撤下早前發行的《班圖》及《人類設計：解讀之道》二書，也重新編輯這本「預言之書」，並撰寫了更為宏大的班圖新學說《The
    God Code》（暫譯：神聖密碼）來體現突變的本質。


    過去兩年，我持續協助班圖網站的資訊更新與書籍中文化的工作，會這麼做除了契合對於推廣 HD 多元知識的自我期許，也是為了完成 Simon 的夢想；即便工作與家庭再忙，手頭資金也不算闊綽，我仍認為這些都勢在必行。


    預言之書終於發行，內容繼往開來，資訊量豐富，相信會是令人滿足的好作品。慶幸這段期間獲得諸多配合與支持，以及《基因天命》譯者之一的 Gwai 從台南幫忙校稿與北上辦理前導宣傳活動。一切付出都是值得的。再次感謝支持我們向全球華人推動人類設計知識的同好與朋友，也祝願大家不論有錢沒錢，都不再輕易被制約，能夠找到自己的豐盛天地，也為社會作出更大的貢獻，謝謝！


