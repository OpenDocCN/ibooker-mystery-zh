  md: '古中國哲學家邵雍❶早就運用環形的六十四卦布局，而卡巴拉派學者瑪格麗特❷則將易經諸卦配置在黃道帶上，但那些模式與聲音對 Ra 所闡述的或許並不相同。


    黃道帶代表的是從地球觀察到的眾星沿著太陽運轉的平面。當你仰望這些星星、太陽與月亮，它們似乎沿著黃道移動，


    太陽會花一整年回到原來的位置。星星、月亮跟太陽以逆時針的方向繞行黃道帶，月亮的南北交點則是反方向（順時針）。因為我們是從地球上（它本身也繞著太陽轉）觀察這個太陽系的天體位置，星體在某些時間點看起來像是倒著走，這就是所謂的逆行（太陽除外，太陽永遠是順行的）。


