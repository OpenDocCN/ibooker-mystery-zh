    # 尾聲


    ## chapter12


    從我出生那刻起陪著我走過人生旅程的一切，在某天被打碎了。要能繼續活下去，除了破壞之外別無他法。這發生在我獲得「奇遇」經驗的幾年以前，當時我管理著某間實驗學校。我有一群令人讚嘆的孩子，年紀約莫
    13、14 歲，他們透過自己的意識進行實驗，至少我認為是如此啦。教育的公共制度總是衝擊著我，他們花了十個月傳授的內容，其實你用一個月就能教完。當時我確信，自己能帶領這個年紀的孩子打開完全不同層次的心理與智力眼界，是說，他們已經不算小孩而是青少年了。在我的房子後面有個開放空間，那其實是一間非常小的房子。但這開放空間的大小足以讓我將之改成教室。因為我只有四個孩子。


    那時，我展開了一場非常奇怪的經歷。事情是怎麼開始的？我記憶猶新。那是個星期天，我那位自稱為上帝的朋友法蘭克（Frank），在他的住所辦了場午宴。那是十月底，我還記得到達現場時有許多人。食物擺滿了好幾張桌子，大概有
    25 到 30 個人穿梭其間。我不斷張望著那些食物，同時理解到我的內在並沒有想要任何的東西，這真的不太對勁。會說這不對勁，是因為我當天沒吃早餐啊。我沒有肚子不餓的道理。食物全被漂漂亮亮地展示著。有好幾盤的菜餚被放到我眼前，但什麼都沒發生。也就是說我停止進食了。我並沒有節食，雖然這過程看起來像是我在節食。


    但我並沒有節食。我只是不餓。這真的很奇怪。我就是不餓。所以，我開始經歷這個對我來說算是有趣的過程，雖然當時我搞不清楚箇中原因。我活在一個二元的世界。我教導那些年輕人宇宙的歷史，也只有自我中心（Ego）有定義的人會企圖用四個月辦到這件事。所以，當我開始一面經歷這個過程時，另一方面的我，則是這輩子首度接觸神祕學著作。


    我的業力以愛麗絲貝利①的三本書作結，被稱為藏人與神智學社會（Tibetan and Theosophical Society）的這些書，是十九世紀的神祕占星學，企圖整合基督教與印度／婆羅門神祕論，並想方設法將它們結合在一起。那些語言對我來說相當困難。那是複雜而麻煩的文字風格。我是個喜歡簡單事物的人。我討厭那些難搞的、只陶醉在自己喋喋不休的嘮叨裡，卻又無法帶你走向何方的東西。他們就只會帶你繞圈圈然後對你說：「喔，如果你是『九地善慧②』的學生，就會了解這個概念。」然而，裡頭還是有一些微小的寶物，就是他們所呈現出的創造的程式。我沒有進食，也沒有真正睡著。


    ①愛麗絲貝利（Alice Bailey）生於英國，是十九世紀率先使用「新時代（new age）」一詞的神智學作家。著有二十餘本探討靈性與宇宙間的關係的著作。據稱她的大部分著作都是由稱為「藏人（the
    Tibetan）」或「D.K.（Djwal Khul）」的智慧大師透過心靈感應傳訊所得。Ra 會接觸到這些書，應該與他進行宇宙史的教學有關連。


    ②依據《華嚴經》所述，佛教徒的修行覺醒共有十個層級，第九地（ninth level）被稱為「善慧（Good Intelligence）」，意指對於教義的各個面向都有完美無缺和非常廣泛的理解，也可以無礙地為人說法。


    每晚我大概只睡兩或三個小時而已。我覺察到「某些事機械式地發生在我身上」這項事實。那就好像我的心智被開啟了全新的領域。而這件事最奇怪的地方在於，它好像既不通俗也不神祕。這個程序和量子有關。這就是在我身上覺醒的東西。


    我想，我的智力在很多方面已經被制約與訓練得非常通俗而失去平衡，我的盲目讓我無法看見，看不見呼吸之間的神奇。但在另一方面，則能看清一切事件的運轉。我那傲慢的西方智性經歷，被粉碎了大半，但也沒被那些被動的、屬於東方的瑜伽派的態度給取代，我獲得的是別的東西。那是別的事物。對我來說，有趣之處在於：隨著每一個週期，都有不同的事情發生。那真的不一樣。所以，我繼續教導那些孩子，也邊進行著漫長的禁食。當然，他們顯然也開始發現這件事了。


    我已經住在那棟後來與聲音相遇的房屋。不過當時，我還住在主屋。房子後頭是個廢墟，它位於另一個坡地上頭。這個廢墟只有一個修繕完畢的房間。我後來就是在這個房間裡，獲得了延伸的「奇遇」。不過那時住在這房裡的是個名叫提姆（Tim）的英國詩人，他寫的詩很棒，帶有結實的十九世紀風格，此外他也手做了許多能讓你掛在天花板、任其上下晃動的美麗蝴蝶。他是個有趣的人。在早上，你可以看見他以跏趺坐的姿勢，坐在坡地上做梵語吟唱。他曾擔任克里希那穆提的私人助理多年，跟他一起在印度及加州生活過。


