  md: '# 天狼星之死


    如果你重返偉大的埃及文明起點，來到歷史遺跡中最早的一座建築，觀察那個年代的建築師和宇宙學家的工作方式，你會發現所有的一切都對準著天龍座。那是天空中最耀眼的星。時至今日，它仍然是一顆相當明亮的星。但在一夕之間，一切都變了。


    對於已經習慣天龍星存在的人來說，那是一樁非常神祕的事件。突然之間，天上毫無徵兆地冒出一顆新星。好幾千人望向夜空，那個夜空比我們所能想像的更為黑暗且滿是星辰，因為我們生活在一個充滿人造光的世界。在六千年前，天空出現一顆比其他所有星星都還要明亮的新星，那可是大事一件。彷彿魔法一般，就這麼憑空出現了。


    如果當時的人有望遠鏡，就能在這顆星成為大人物之前瞧見它的身影，畢竟肉眼無法看見。所以，到底發生了什麼事？是什麼讓它突然亮成那樣？'
