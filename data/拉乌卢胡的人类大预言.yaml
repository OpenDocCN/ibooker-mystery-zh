    為至少卡車每天都會載來食物。日復一日皆然。


    你有想過要讓紐約市有早餐可吃需要什麼嗎？你知道計畫週期為我們做了哪些事情嗎？人類在最基本的程度上，到底有多無能呢？當電力消失時，他們的生存機率，是 0 嗎？當這樣的時代來臨，不再有人會出於本性支持你該怎麼辦？


    進化就像一氧化碳。就像個偷偷摸摸的小人，然後——轟一聲！什麼都沒了！雖然，這並不會一夜消失。被計畫十字制約的所有人，都將抗拒這樣的改變。他們仍想堅持聯合國、政府與工會。


    想像一下倘若墨西哥市沒有早餐可吃。當支援機制壞了時，人們會採取什麼行動？當沒有警力、沒有學校時又會如何？你以為因為現在存在，所以所有事物會繼續存在嗎？這一切都是因應我們而生。但銳不需要這些。他們不需要制度。400
    年前，我們為了自己創建了這一切。如果網路在未來 100 年裡還能存在，那我們就夠幸運了。


    我喜歡程式曼陀羅輪轉動的方式。人類的終結與銳的起始會帶來指引。這全被寫在地圖裡。新的開始與眾不同。即將臨來的沉睡鳳凰週期會進行篩選。你將見證人類繁殖力的基礎結構崩解，銳將會出現。這會是一段不穩定的時期，因為我們不再受保護。現今大部分的孩子是抱著計畫幻象這張安心毯長大，他們眼前有著各式各樣的工作與有條理系統的'
  - '[PAGE 203]


    世界。這是我們已經習慣的世界樣貌。這就好像是癮頭很大的老菸槍。天啊，接著我們竟然得馬上戒菸！沒有人能處理那樣的事。這種改變太巨大了。帷幕並非在 2027 年才會拉下。我們已經在舞台上，朝著改變匍匐前進。


    未來的一切都是為了銳。城市的毀滅並不會困擾他們。他們不「看」。這一切對他們來說根本不重要。他們會有自己的世界，為了意識伍群這碼子事而忙。但人類沒有這種優勢。


    我們的世界與活動，都是細節、事實與一切的邏輯所驅動。這是我們的行動方式，在這樣的意義上，就算某些事實是謊言，我們還是照樣遵循。集體的事實與細節，成了實行計畫的領導力。你無法想像即將到來並取代
    62 閘門的閘門 53 會是多麼不同。53 閘門不帶細節或事實。它想做的只是開始一些事。所以只會有一個開端，還不會有什麼事實。就只是從終點來到一個新的開始。


    對我們人類來說，這表示要成為倖存者，要能從衝擊中存活下來。


    要成為活出靈魂的獨特成就的生還者。我並不懼怕我們的孩子。我害怕的只是會有太多人就這麼迷失在這龐大的轉變之中，蒙受不必要的生命之苦；而不去活出生命的美好與優雅、活出生命的獨特，活出不一樣的真實。'
