    如此看來我是在描繪一幅黑暗的圖畫。但這是我們必須牢記的，天狼星的能量到底留下了什麼？畢竟，在這回合結束之前，我們仍會持續接收到它的殘餘能量。


    現在天狼星有它的新生命，不再與人類相關，也跟整體意識的程式化毫無關係。那已經結束了。我們面對的是死亡的殘跡，因為那是一段緩慢的死亡，帶著黑暗的一面。那麼光呢？光又帶來了什麼？


    光能夠引導群體的焦點與能量，將之轉變為強而有力的形態，因此擴展了整個基因庫的智能。我們今日所享有的科學，已不再是與世隔絕、自個兒坐在城堡實驗室裡的天才的副產品。現在科學是在科學工廠裡生產的。數百萬個科學工廠，加上數百萬個專業科學家。而這一切的起源可回溯至古埃及，龐大的官僚制度也在那兒被創建。這就是天狼星。


    位於天狼星的那顆水晶——那顆在暗伴星來臨時，對我們的意識發揮巨大作用的水晶——已經不復存在。它永遠不會再來。在這回合結束後，不會再有下一次的輪迴週期。一千三百年就人類而言似乎頗漫長，但對宇宙來說，死亡幾乎是瞬間的事。


    當你仰望天空，你看到的是過往。緩慢但確實地，過去將在後來的某處趕上未來。天狼星真的已經不存在了，它的水晶在瑞士。那顆曾經耀眼奪目的星星已經死去。


    當暗伴星奪去天狼星僅存的生命時，剩下的只有殘跡和那猛烈的最後喘息。這表示我們的程式不再正確。四角已缺了一角——有些東西被帶走了。那不只是單純的消失，而是一種退化的現象。也就是說，這是個緩慢的過程。順帶一提，從宇宙的層次來看，這個退化其實非常快速。但從我們的時間觀來看呢？在這一回合接近尾聲時，會有人去關掉那道光。不過，光還是會持續往我們而來，微中子場的殘存訊息仍會湧入（微中子場一直釋放到
    1991 年為止），我們也繼續接收這些資訊。這不會是瞬間的崩潰。


    ## 少陽的退化


    天狼星在卦象上的影響


    想想看少陽的爻線組，出現在六十四卦的哪些地方——要看的可不只是它所連接的那個區塊❶而已。在曼陀羅輪上，該區塊對面的整個二元區塊，每一卦都有少陽的爻線組❷。


    整個少陽的連接以及它所代表的部分都正在崩解，在我們的化學性和生物性上都產生質變。這是相當神奇的事。當看著陰爻在下、陽爻在上的二元配置時，我們看見的不再是三位一體。取而代之，我們看見的是基本的三聯體，宛如
    DNA 密碼子或是六爻卦的建構方式——也就是三對爻線組。我們可以發現，因為這個組成正在退化，最後的結構體才得以出現。換句話說，這是必須的發展，而退化得最快的，就是上面的陽爻。


    每個帶有少陽成分的密碼子，都會發生質變並藉此放出訊息。因為我們在這裡看到的一切，都和訊息的發送有關。所有這一切都是訊息系統，全部都是。


    木星與它所生產的細小微中子流所做的工作，是接收訊息後進行轉譯，接著調低頻率，再發送出微中子訊息，經衛星過濾後傳給十六張臉與卦象。


    我們現正迎接的是「門戶的閉鎖」。我們在 1961 年進入目前的這個週期。它將在 2027 年結束，並移往新的主題。（詳見 180 頁）


    我們進入當前這個主題的時刻——如果你從總體回合圖裡的鎖與匙來看——你會發現這是 61 闡門的紀元。也就是說，只有在這個紀元，唯有現在，「內在真實」才可能存在，併存於神祕與通俗之中。


    這是智慧之樹結實累累的時代，但你仍得設法讓人們摘食果子。因為時代之門就要關上了。


    創新改革的世紀即將結束——對於存在本質的研究，集體共享的合作調查已近尾聲——一切都將走到盡頭。所有與此相關的啟示也會隨之完結。這全是因為四角的一隅不再正確運作。


    隨著我們走向 2027 年，「覺知」的時候到了。當 2026 年出生的世代死亡時，最後殘存的那些曾指引我們生命進程的真實啟發，也將完全消失。一切就此結束。啟示之類的事物將進入尾聲。從現在到
    2027 年這段期間，如果有答案沒被發掘或分享出去，將來就無從得知。門是真的會關起來。事物消逝中，也將無法再為人類意識所用。我們身處改變的偉大時代，可以帶著覺察地活，認清宇宙的機制並親眼見證其運作，真的很美好。


    看見整個過程那龐大、浩瀚、綺麗、絕美而光彩奪目的組織，真是太不可思議了。能清楚看見入世化身走向結束（如果我能那樣說的話），對意識而言是個偉大的勝利。走到這一步，對我們而言相當重要，因為這開啟了接收整體意識的平台，也展現出整體發展的最終階段。


    這是實驗的漫漫长路——人類承受著折磨，所有不知緣由的痛苦不斷來來去去、進進出出——這一切的一切，都是為了實現「讓意識能真正地棲身於形體」這個我們甚至無法一瞥的遠大目標。如果你依循這個程式，我們似乎都在正軌上實現這個可能性。這是因為第一角已不復存在。


    這個機制程序，這個宇宙的整體目標，就是要創造出理想的形體。理想形體能支持並過濾意識，直到意識能夠自我觀照，生成瑪雅幻象，直白的說其副作用就是會擁有大智慧。無論我的人類世俗觀點會是什麼樣貌，我的宇宙觀都會充滿龐大的樂趣。在許多的生命體內，都有這樣的意識火花。不管是生命的目標或宇宙的目的，都是形體的原則。當你建構形體原則時，事物會在某一個舞台上運作，而不會在別處運作。想一想，打字機和電報後來怎麼了？那些形體在目標完成後便消失無蹤。


