    第一個出現的伍群，或許會在實際可達成的範圍裡，找到最與世隔絕的地方。我們需要入世，但銳不必。如同前面提及的，他們的進食方法也不會像我們一樣。他們有不同的食物，並且以不同的方式來處理能量。銳真的有太多面向跟我們不一樣。肯定的是，伍群會找出方法來面對我們，或許伍群中會有個代表來和我們溝通。在伍群的脈絡裡，他們或許是最佳發言人，但永遠都是伍群透過他們在說話。


