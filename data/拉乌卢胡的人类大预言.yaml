    ### 一個六爻卦擁有三對爻線


    ## 天狼星之死


    如果你重返偉大的埃及文明起點，來到歷史遺跡中最早的一座建築，觀察那個年代的建築師和宇宙學家的工作方式，你會發現所有的一切都對準著天龍座。那是天空中最耀眼的星。時至今日，它仍然是一顆相當明亮的星。但在一夕之間，一切都變了。


    對於已經習慣天龍星存在的人來說，那是一樁非常神祕的事件。突然之間，天上毫無徵兆地冒出一顆新星。好幾千人望向夜空，那個夜空比我們所能想像的更為黑暗且滿是星辰，因為我們生活在一個充滿人造光的世界。在六千年前，天空出現一顆比其他所有星星都還要明亮的新星，那可是大事一件。彷彿魔法一般，就這麼憑空出現了。


    如果當時的人有望遠鏡，就能在這顆星成為大人物之前瞧見它的身影，畢竟肉眼無法看見。所以，到底發生了什麼事？是什麼讓它突然亮成那樣？


    天狼星本屬於單星系統，它沿著一條軌道移動，在軌道上遇到了一顆暗星。我們不知道暗星來自何方。天狼星吸引了這顆暗淡的伴星——天狼星 B❶。這顆星星不會自行發光，因為它只吸收光線。換句話說，天狼星
    B 是密度超大的星體。它具有不成比例的引力，引力還強大到能把光拉進來轉換成物質。這顆相對次要的星星，突然間成了聯星❷。


    這顆暗伴星是個高密度甚或超密度的坍縮星❸，也可能是早期經過劇烈爆炸而生成的中子星。它在宇宙間航行，然後被天狼星的重力場抓住。當這顆伴星被拉進天狼星的軌道時，它所做的第一件事就是吸取天狼星的能量，或者你可以說，把天狼星的光拉到自己身上。


    北非有個名為多貢人的部落，相當讓人著迷。他們有些神話不只敬拜天狼星，竟然連這顆伴星的存在也知道，並有繪圖記載。他們發現了這個事件的機制。這真的很了不起。沒錯，這是個古老的文明，但他們確實知道些什麼。他們的發現非同小可。


    基本上發生的事情是，這顆更小、更高密度的星體開始繞著天狼星運行，並藉由這個過程，開始把天狼星撕裂開來。不僅僅是撕裂，同時還把它吃掉。在這顆伴星被天狼星重力場捕捉到的那一刻，它們在幾何軌跡中相遇了。而在地球上，就在這一刻（考慮它和我們之間的距離，對應到我們的時間），我們倏地看見天空中出現了這顆亮得驚人的新星。


    在那之後，埃及文化的一切都對準天狼星這顆狗星④。狗星成了天空的主星。包括古埃及神殿阿布辛貝和人面獅身像斯芬克斯，統統和天狼星對齊。


    所有的幾何結構與殿堂建物的中心點，全都直指天狼星。想想坐落於天狼星的個性水晶的本質，以及它在這幾千年裡被不斷撕裂的經歷，這不是很有趣嗎？


    - ① 德國天文學家弗里德里希·威廉·貝塞爾（Friedrich Wilhelm Bessel）在 1884 年觀測天狼星自行運動時，推論應有一顆伴星。1862
    年美國天文學家阿凡·格雷厄姆·克拉克（Alvan Graham Clark）首次觀測到這顆暗淡的伴星。天文學家有時會稱之為「小狼」。

    - ② 聯星（binary star）指的是由兩顆恆星組成的系統，其中一顆恆星圍繞另一顆恆星旋轉，又或者兩顆恆星圍繞一個共同中心旋轉。

    - ③ 坍縮星（俗稱黑洞）和中子星都是恆星演化到末期，因重力坍縮發生超新星爆炸之後可能形成的樣貌。當恆星外殼的動能轉化為熱能向外爆發後，根據恆星質量的不同，內部區域可能被壓縮成白矮星、中子星或黑洞。

    - ④ 天狼星又名「狗星」（Dog Star）。不只是埃及這樣稱呼它，包括古中國、古迦勒底、亞述和阿卡德，甚至北美原住民部落，都有以狗星稱呼天狼星的文化紀錄。這是相當重大的事件。


    地球蒙受的痛苦是否和天狼星有關？痛苦真的要結束了嗎？這只是個有趣的論點。畢竟，我們所接收的其中一個深刻的程式主題（如果你想以一般通則來看的話，占了我們所接收的編碼的
    25%），其源頭正被緩慢而粗暴地啃食至死。當此事發生時，天狼星發送一組微中子訊息流。但現在，它不存在了，它已經消失很久了，至少對我們而言是如此。它在 1991
    年就逝去了。


    天狼星對地球上固有的暴力價值有很大的貢獻。我們看看神話和埃及歷史，從中找尋可能的關聯：這些虛榮的巨大石碑就是最強大的例證。這些紀念碑都在讚頌戰爭，除了描繪戰役之外別無他用。真誠的紀錄非常罕見，大多都是政治宣傳。這就是天狼星。這些龐大、有組織的社會，在許多方面被他們的神明所奴役。從天狼星開始異常發光的那一刻起，它帶來了控制以及隨之而來的一切。天空中最明亮的光被它的黑暗伴星吞食，直到某個時間點，光將消逝無蹤。當光消失時，這一回合便走到盡頭，地球上的生命也將終結。


    四角的每一角都以特殊的化學作用來影響我們。但它們不是完整的化學，他們只是某些化學的面向。所以，不管天狼星發生了什麼，都能從我們每個卦（閘門）的運作方式裡，看見與之相關的影響。換句話說，就是在持續變異的過程裡看到影響。


    天狼星被其伴星殘暴吞食，帶給我們的是：它帶來了國家，以法律與制度為政，以「掌權者」或「大明星」為治理原則。天狼星為我們帶來的，是對個性水晶的崇拜，那是帶有巨大感染性的崇拜。拉美西斯二世——我的老天，這傢伙真是個笑話！他成了法老王，就已經夠厲害了。換作是你，應該只會好好享受吧？但對他說來，這還不夠。他還年輕，他想證明自己就是掌權者——天狼星。所以，他前去攻打西臺人（位於現在於南黎巴嫩地區的兇惡部落）。他領著軍隊橫越沙漠，在今日仍暴力頻傳的加薩走廊附近與敵人交鋒。西臺人屠殺了拉美西斯的兵馬，而他能活著逃離算是幸運。出發時率軍數千，最後或許剩不到幾百人。


    後來的二十年裡，整個下埃及區到處都是紀念碑，記載著他在這場戰役裡的非凡勝利。這就是天狼星。這就是天狼星帶給我們的東西。


    如此看來我是在描繪一幅黑暗的圖畫。但這是我們必須牢記的，天狼星的能量到底留下了什麼？畢竟，在這回合結束之前，我們仍會持續接收到它的殘餘能量。


    現在天狼星有它的新生命，不再與人類相關，也跟整體意識的程式化毫無關係。那已經結束了。我們面對的是死亡的殘跡，因為那是一段緩慢的死亡，帶著黑暗的一面。那麼光呢？光又帶來了什麼？


    光能夠引導群體的焦點與能量，將之轉變為強而有力的形態，因此擴展了整個基因庫的智能。我們今日所享有的科學，已不再是與世隔絕、自個兒坐在城堡實驗室裡的天才的副產品。現在科學是在科學工廠裡生產的。數百萬個科學工廠，加上數百萬個專業科學家。而這一切的起源可回溯至古埃及，龐大的官僚制度也在那兒被創建。這就是天狼星。


    位於天狼星的那顆水晶——那顆在暗伴星來臨時，對我們的意識發揮巨大作用的水晶——已經不復存在。它永遠不會再來。在這回合結束後，不會再有下一次的輪迴週期。一千三百年就人類而言似乎頗漫長，但對宇宙來說，死亡幾乎是瞬間的事。


    當你仰望天空，你看到的是過往。緩慢但確實地，過去將在後來的某處趕上未來。天狼星真的已經不存在了，它的水晶在瑞士。那顆曾經耀眼奪目的星星已經死去。


    當暗伴星奪去天狼星僅存的生命時，剩下的只有殘跡和那猛烈的最後喘息。這表示我們的程式不再正確。四角已缺了一角——有些東西被帶走了。那不只是單純的消失，而是一種退化的現象。也就是說，這是個緩慢的過程。順帶一提，從宇宙的層次來看，這個退化其實非常快速。但從我們的時間觀來看呢？在這一回合接近尾聲時，會有人去關掉那道光。不過，光還是會持續往我們而來，微中子場的殘存訊息仍會湧入（微中子場一直釋放到
    1991 年為止），我們也繼續接收這些資訊。這不會是瞬間的崩潰。


    ## 少陽的退化


    天狼星在卦象上的影響


    想想看少陽的爻線組，出現在六十四卦的哪些地方——要看的可不只是它所連接的那個區塊❶而已。在曼陀羅輪上，該區塊對面的整個二元區塊，每一卦都有少陽的爻線組❷。


    整個少陽的連接以及它所代表的部分都正在崩解，在我們的化學性和生物性上都產生質變。這是相當神奇的事。當看著陰爻在下、陽爻在上的二元配置時，我們看見的不再是三位一體。取而代之，我們看見的是基本的三聯體，宛如
    DNA 密碼子或是六爻卦的建構方式——也就是三對爻線組。我們可以發現，因為這個組成正在退化，最後的結構體才得以出現。換句話說，這是必須的發展，而退化得最快的，就是上面的陽爻。


    每個帶有少陽成分的密碼子，都會發生質變並藉此放出訊息。因為我們在這裡看到的一切，都和訊息的發送有關。所有這一切都是訊息系統，全部都是。


    木星與它所生產的細小微中子流所做的工作，是接收訊息後進行轉譯，接著調低頻率，再發送出微中子訊息，經衛星過濾後傳給十六張臉與卦象。


    我們現正迎接的是「門戶的閉鎖」。我們在 1961 年進入目前的這個週期。它將在 2027 年結束，並移往新的主題。（詳見 180 頁）


    我們進入當前這個主題的時刻——如果你從總體回合圖裡的鎖與匙來看——你會發現這是 61 闡門的紀元。也就是說，只有在這個紀元，唯有現在，「內在真實」才可能存在，併存於神祕與通俗之中。


    這是智慧之樹結實累累的時代，但你仍得設法讓人們摘食果子。因為時代之門就要關上了。


    創新改革的世紀即將結束——對於存在本質的研究，集體共享的合作調查已近尾聲——一切都將走到盡頭。所有與此相關的啟示也會隨之完結。這全是因為四角的一隅不再正確運作。


    隨著我們走向 2027 年，「覺知」的時候到了。當 2026 年出生的世代死亡時，最後殘存的那些曾指引我們生命進程的真實啟發，也將完全消失。一切就此結束。啟示之類的事物將進入尾聲。從現在到
    2027 年這段期間，如果有答案沒被發掘或分享出去，將來就無從得知。門是真的會關起來。事物消逝中，也將無法再為人類意識所用。我們身處改變的偉大時代，可以帶著覺察地活，認清宇宙的機制並親眼見證其運作，真的很美好。


    看見整個過程那龐大、浩瀚、綺麗、絕美而光彩奪目的組織，真是太不可思議了。能清楚看見入世化身走向結束（如果我能那樣說的話），對意識而言是個偉大的勝利。走到這一步，對我們而言相當重要，因為這開啟了接收整體意識的平台，也展現出整體發展的最終階段。


    這是實驗的漫漫长路——人類承受著折磨，所有不知緣由的痛苦不斷來來去去、進進出出——這一切的一切，都是為了實現「讓意識能真正地棲身於形體」這個我們甚至無法一瞥的遠大目標。如果你依循這個程式，我們似乎都在正軌上實現這個可能性。這是因為第一角已不復存在。


    這個機制程序，這個宇宙的整體目標，就是要創造出理想的形體。理想形體能支持並過濾意識，直到意識能夠自我觀照，生成瑪雅幻象，直白的說其副作用就是會擁有大智慧。無論我的人類世俗觀點會是什麼樣貌，我的宇宙觀都會充滿龐大的樂趣。在許多的生命體內，都有這樣的意識火花。不管是生命的目標或宇宙的目的，都是形體的原則。當你建構形體原則時，事物會在某一個舞台上運作，而不會在別處運作。想一想，打字機和電報後來怎麼了？那些形體在目標完成後便消失無蹤。


