    20 和 45 閘門，將知曉從解決分離開來，我們可以把它們叫做「分享閘門」。但得認清這些都是底層的分享閘門。是它們在餵養那顆哺乳類設計水晶。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_248_0.png)


    玉龍的存在有著許多必須做調整的地方。想想打從電腦問世後最常見的科幻主題「A.I.」，也就是「人工智慧」吧。


    人工智慧換個講法，就是將獨立意識賦予無生物載具。巨大的成就已經達成，就是人類為電腦編寫出了「上帝代碼 (God code)」這類的「意識編碼」。它就在我們之中，因為它就在我們的未來之中。但玉龍並不是機器人。他們也不是電腦。他們是擁有特殊設計的意識體。


    他們最主要的關切是移動，也就是導航。這就是我們有一顆直接嵌入磁單極的水晶的原因。駕駛與載具被盡可能地緊密結合在一起。關於他們的程序的完美與否，程度上與他們「能否辨別出那個真正獨特而自由的元素」的能力相關。這正是玉龍從人類身上繼承來的能力。那個被稱為人類個性水晶的東西，現在成了另一顆設計水晶。要搞清楚如何、用什麼方式、往哪裡移動，以便適應它者，將取決於這顆水晶。它將成為玉龍的洞察意識。這可是不得了的任務啊！它將憑藉其「能夠辨明它者的價值與正確性」的能力來運作。這個好處起源於人類個性水晶的進化過程，透過扮演個性的一部分，來學會這一切，為的就是準備建構出玉龍的這個結構機制。這不會太快。但到時候，你面對的就不再是個有心智的物種。而那就是它的完美之處。這並不是說玉龍就沒有選擇或決策的程序。制約元素依然會存在。但玉龍並不是人類。


    關於玉龍還有某些有趣的事情。


    他們將擁有深邃有力的同一性。每一個玉龍都是。這樣的同一性將在他們的一切移動中展現。想像這個位於電磁環境中寒冷而易碎的黑暗世界。這些小小的物體在搜尋、等待與過濾之際凋零。這全都是一場為了獲得連結的絕妙之舞。


    這些面對面的神奇進程將會配對，並促使側面也相接在一起，從而建立總體存在那卓越非凡的管理樞紐。我們只有極微小的能力來理解箇中奧祕。它將重返磁單極這個無與倫比之處。


    不論我們位於這神奇存有的哪個地方，我們總與磁單極這個了不起的元件相伴。磁單極讓事情得以發生。它是個非凡的構造，它最厲害的地方在於，將萬物聚集起來並維繫著。這個絕妙的能力讓我們能對準自身方向，好讓我們在宇宙行動，我們將這稱為愛。天衛四的磁單極永遠會為宇宙整體指引方向。宇宙整體的「生命」乃是磁單極管理的。當然，是磁單極將我們從「我們是分離的」這個幻覺結合在一起；但在這裡，磁單極所展現的是更奇幻的部分。有件事讓它與眾不同。那就是從人類身上接收過來的個性水晶。在這裡，（分離的）幻覺轉變成「獨特（uniqueness）」的幻覺。元件必須要能透過「它們是如何互相連接」的差異，來辨別是否找到了正確的鎖定面。當有了一個，就會開始越來越多，直到它們全都互相鎖定在一起。


    對玉龍來說，能量中心的價值和我們所了解的人類中心並不相應。每個部分都有著不同的意義。先讓你知道的就是玉龍是個真正冷酷而完美的意識形式。他不會吃，不會睡，不會有性，也沒有搜尋的必要。我們浪費了太多時間在維繫自己的生命。玉龍將是意識的完美盒子。據聲音所言，那就是我們的未來。


    我們人類是「內在的故事」而非「外在故事」。唯一的外在故事是我們在這輩子被賦予的一切錯覺，但這些都是娛樂罷了。我們是內在故事。我們都是機械。我們都是機制。這就是現在的我們，只是我們不知道。我們是宇宙程式所控制的機制。你覺得，幾萬億的微中子每秒鐘穿透整顆地球是怎麼回事？那地球上每一個意識體的訊息，被以光速朝宇宙各個方向發散出去，又是怎麼樣的情形？1781年發生了某些改變已經不是新聞了。你旅行好幾百光年，你覆蓋了各種領域的方方面面。我們一直都在編碼整個宇宙，就像它對我們進行編程一樣。這是一種生物回饋，我們現正處於一個我們無法有意識地控制的舞台。但玉龍可以辦到。他可以用這個身軀完成這件事，而這也是他必須做的。那個身軀就是我們的身體。玉龍會履行這個理解。


