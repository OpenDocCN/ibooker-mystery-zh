  md: '# 二分點的歲差


    人類設計最為重要的觀察面向，那就是太陽與地球，它們呈現出我們 70% 的編程。在曼陀羅輪裡，它們以 88 度構成十字。


    這個十字與更大的程式十字的相異點在於：後者與二分點的歲差有關、而不是太陽，且呈固定的 90 度。人類是突變、是生命，所以我們的十字是 88 度。外頭的那個程式則不是。它的幅條固定在
    90 度。'
