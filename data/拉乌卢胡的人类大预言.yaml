- img_proc: true
  md: '神祕的力量的確存在。我曾遇過它們。有些訊息來自異地。然後你獲得了這些訊息。你可能被空氣一把抓起，像個玩偶般被翻轉。憑藉我全數的深厚智力來理解，那真的壓得人喘不過氣。實在可怕極了。


    這些力量到底是什麼？它們想要的是什麼？

    它們有想要什麼嗎？這到底是怎麼回事？

    這是我與聲音相遇的旅程之始，這是旅程真正的起點。

    我因此完全打破了與正常生活的一切連結。


    我就只是狂野地活回本源。回到我以及我們每個人的幻覺源頭。

    這是件要事。我不得不消化它、領會它。

    我必須要放棄我的世界。而我真的這麼做了。

    我放棄了一切。

    一切都是謊言。

    一切都沒道理。

    這是個盲目的世界。

    這世界充滿著妄想與錯覺，來支撐所有的自欺幻象。


    有些力量能在夜裡把你翻身。所有人都被困在世俗的層面裡，而我則是山上的野人。


    我無法重回這個世界了。因為它看起來太粗劣、愚蠢、庸俗而不淨。'
