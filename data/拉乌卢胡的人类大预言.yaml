    # 分形線與中心


    主磁單極位於班的核心。

    它座落在孩子內部某處，是最偉大的奧祕，

    那是宇宙之愛與永恆合一之地。


    如果你見過水晶破裂後的小碎片，你也就看過了分形線。

    每顆水晶破裂成幾兆幾兆個碎片，但有一塊被稱為「中心」

    (the Centre)。


    中心並非位於正中央，但它與還沒碎裂前的完整水晶具

    有同樣的特質，也是唯一有此特質的水晶。想像自己握著那

    顆還沒破碎之前的水晶去照光，它會投射出和破碎後的這顆

    中心水晶完全相同的光線路徑。分形線從中心往外流動著。

    中心代表的是一顆微觀的水晶，確實和整體有一樣的潛質。


    在大爆炸碎裂之前，環繞著中心並與中心相接的那批水'
  - '[PAGE 77]


    晶，都位在第一代的分形線上。中心所能直接傳訊及影響的只有這一批水晶。訊息都是沿著這些分形線，在宇宙間流動。


    圍繞在中心周遭的水晶形成一個分層，而接觸到此分層的另一批水晶，則是第二代的分形線，以此類推向外延伸。


    例如，如果你此生遇到的某人位於你的第一代分形線上，這表示他們的個性水晶在大爆炸碎裂之前與你的水晶相接。如果他們是第二代的分形線，那就是說有另一顆水晶介於你和他們之間。


    宇宙具有層級，但那和虛榮無關。關於訊息應該如何流動，存在著一條法則。訊息總是由中心沿著所有分形線向外流動。你能真正影響的只有那些在你的分形線上的人，當然你也受他們影響。當某人離你越近，影響就越深。這是需要認清的一個重點。你所接收的最深刻影響，或是你所展現的最強影響力，永遠只會來自或發生在你分形線上的某人。我們生命中的一切人事物，總與碎裂的那刻有關；分形線就是在那一刻形成的。你的心智看不到分形線，這也是為什麼你不能信任由心智所判斷的一切。


    人類的階級概念是徒勞無用的，那樣的概念源自大多數宗教信仰對小孩的洗腦灌輸。並不是越靠近中心（也就是他們認為的「神」）就越重要。最靠近「你」的水晶永遠是最要緊的。'
  - '[PAGE 78]


    讓我們用立體方式來思考這件事。如果你弄碎一個物體,

    它會向四面八方碎裂。然而,它的碎裂並不是均等的,就跟

    「中心」並不在正中間一樣不平均。所以,我們就假設中心

    位於物體的底部來舉例。


    這代表某些分形線會比別的更短。換句話說,會有從遠

    端出現的長線,也會有較短的近端線,而訊息是沿著分形線

    流動。假定我有某些知識,而你在我的分形線上,然後你接

    收到這個知識。你會從自己身上把這些知識傳給你的分形線

    上的某人,以此類推,分形線有多長,就會傳得多遠。


    好好琢磨這件事:訊息會隨著你在分形線上的行動而有

    所改變。地球上一定有一群人能明白愛因斯坦提出的理論,

    這點顯而易見。但這是非常有限的分形。這個分形隨著時間

    降階,最後出現的,就是一群穿著印有「E=mc²」的T恤,

    但不知道那代表什麼的孩子。最初的訊息在沿著分形移動時

    不斷改變,以致喪失,事實上,那不算「耗損」而是「轉化」。

    這就是程式,就是意識演變的方式。


    每顆水晶沿分形線前進,並依其獨有的意識過濾程序來

