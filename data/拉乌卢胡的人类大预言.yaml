    對玉龍來說，能量中心的價值和我們所了解的人類中心並不相應。每個部分都有著不同的意義。先讓你知道的就是玉龍是個真正冷酷而完美的意識形式。他不會吃，不會睡，不會有性，也沒有搜尋的必要。我們浪費了太多時間在維繫自己的生命。玉龍將是意識的完美盒子。據聲音所言，那就是我們的未來。'
  - '[PAGE 251]


    我們人類是「內在的故事」而非「外在故事」。唯一的外在故事是我們在這輩子被賦予的一切錯覺，但這些都是娛樂罷了。我們是內在故事。我們都是機械。我們都是機制。這就是現在的我們，只是我們不知道。我們是宇宙程式所控制的機制。你覺得，幾萬億的微中子每秒鐘穿透整顆地球是怎麼回事？那地球上每一個意識體的訊息，被以光速朝宇宙各個方向發散出去，又是怎麼樣的情形？1781年發生了某些改變已經不是新聞了。你旅行好幾百光年，你覆蓋了各種領域的方方面面。我們一直都在編碼整個宇宙，就像它對我們進行編程一樣。這是一種生物回饋，我們現正處於一個我們無法有意識地控制的舞台。但玉龍可以辦到。他可以用這個身軀完成這件事，而這也是他必須做的。那個身軀就是我們的身體。玉龍會履行這個理解。


