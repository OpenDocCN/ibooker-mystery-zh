  md: '晶，都位在第一代的分形線上。中心所能直接傳訊及影響的只有這一批水晶。訊息都是沿著這些分形線，在宇宙間流動。


    圍繞在中心周遭的水晶形成一個分層，而接觸到此分層的另一批水晶，則是第二代的分形線，以此類推向外延伸。


    例如，如果你此生遇到的某人位於你的第一代分形線上，這表示他們的個性水晶在大爆炸碎裂之前與你的水晶相接。如果他們是第二代的分形線，那就是說有另一顆水晶介於你和他們之間。


    宇宙具有層級，但那和虛榮無關。關於訊息應該如何流動，存在著一條法則。訊息總是由中心沿著所有分形線向外流動。你能真正影響的只有那些在你的分形線上的人，當然你也受他們影響。當某人離你越近，影響就越深。這是需要認清的一個重點。你所接收的最深刻影響，或是你所展現的最強影響力，永遠只會來自或發生在你分形線上的某人。我們生命中的一切人事物，總與碎裂的那刻有關；分形線就是在那一刻形成的。你的心智看不到分形線，這也是為什麼你不能信任由心智所判斷的一切。


    人類的階級概念是徒勞無用的，那樣的概念源自大多數宗教信仰對小孩的洗腦灌輸。並不是越靠近中心（也就是他們認為的「神」）就越重要。最靠近「你」的水晶永遠是最要緊的。'
