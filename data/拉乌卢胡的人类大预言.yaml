    這個迴路確實展現出這個物種不為自己而做的奉獻。從我們的觀點來看，銳是連接伍群的一顆「硬碟」。人類都想用自己擁有的東西去做點什麼，翻越每座高山。所以銳在我們眼裡幾乎是可悲的。伍群是物質策略性的，但它對自己並沒有意識。伍群不會注意它的成員，也不在乎該如何餵養他們。然而，這些成員卻能意識到它。伍群並非一種形體，而是一種跨氣場形體。它是一個能量場，一個頻率場，是意識展現的地方。它非常複雜。伍群比我們複雜得多，我們的意識在大腦結構這個像盒子的框架中演出，並且因為我們的語言能力，只能粗淺地表達出來。


