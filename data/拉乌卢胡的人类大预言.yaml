  md: '被先知們誤判的最終戰役，是銳與人類需要在邁向終點的道路上相互往來 1000 年。那可不是上帝大軍對上撒旦兵馬的大戰戰場。


    所有的意識水晶，不論它們有否轉世投胎過，除了太陽結構水晶外，都會繼續前進。這些靈魂全都會保存下來。為了別的日子、別的形體，為了另一趟旅程。終結之時不會有什麼偉大的答案。這個世界，不會以美好輝煌的行動迎向終點。大多只會感到恐懼。幹得好，繼續。接著該什麼就是什麼。太陽結構水晶將會滅絕。地球上的一切生命也會死去。根植於基因密碼的所有東西都將被摧毀。無處可逃。無一倖免。在這之後就是張全白的紙。


    意識水晶將會集結成束，它們總是如此。這個行星事件的衝擊將會創造出集結成束的原動力。這將在設計水晶束周圍發生。


    之前描述到我們在生物層次上的死亡過程與時刻時，


    ①舒梅克－李維彗星（Shoemaker-Levy）在 1994 年 7 月 16 至 22 日因為木星引力碎裂成 21 塊碎片並陸續撞上木星。這是人類史上第一次直接觀測到太陽系的天體撞擊事件。此外，這次撞擊所釋放能量遠大於人類擁有的核子武器加總的威力，也在木星大氣上留下幾個比地球大上幾倍的撞痕。'
