  md: '梵天之夜是重返空無，回到虛無。某種意義上，甚至是超越虛無的。我們對此並不熟悉。這具有可怕而恐懼的風味。每個孩子在沉思自身的死亡時都會感受到這種空無。每個小孩都會在某個時刻進行這種探索，也終會走到因為理解不了虛無而覺得奇怪的境界。有些孩子會被嚇壞，有些則是因此而興奮激動。我不認為有誰可以真的領會到，在梵天之夜這樣的空無中，到底會發生什麼事。


    我們離未來越近，就越能感受到自身的無力程度的高低有多少。某些事情會被揭曉，讓我們好奇箇中意義究竟是什麼。未來在現在不過是個故事。就只是故事而已。答案只能靠時間來證明。


    極有可能會是一顆流星在這回合的尾聲終結地球上的生命。介於火星與木星間的小行星帶，宛若失敗的原行星①的集散地。那兒的天體數量多得驚人，而且有好幾顆的尺寸相當巨大。有專門的科學家試著盡可能地追蹤這些小行星，但這是個沒有希望的任務。問題在於這些小行星不斷地互相撞擊並因此改變軌道。因此，要追蹤可能成為行星殺手的天體，其實非常困難。那就好似一張巨大的撞球檯上有著數不盡的球。你幾乎無法做出預測。


    這個小行星帶中，有個區域十分接近我們。


    它被稱為近地球小行星群（NEAs, near-Earth asteroids），這些星體的軌道與地球軌道相交。因為它們的尺寸十分接近我們的太陽系大小，我們所能發出警告的實際時間真的相當'
