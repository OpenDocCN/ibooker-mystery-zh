  md: '人類曾有的神與女神都可以在十六張臉找到。這十六張神之臉，就是眾神。這很值得思考。想想看我們所謂的「神」，事實上只是無生命形體中的一顆個性水晶。就只是一種無機程式。它們並未活著，不是我們所理解的那種生命的概念。它們是生命力的一部分。它們的運作來自恆星的生命，畢竟這是個終端的狀態。


    地球位於個性水晶建立的鞘裡。當你看著十六張臉，你看見的是核心基礎。在某種意義上，每張臉就像是圍繞著我們的水晶束的一個中心。地球被這些個性水晶束包裹著。這


