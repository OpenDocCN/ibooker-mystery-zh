    ## 四角


    四角坐落於木星、天狼星、天樞星與昴宿六。班核心水晶（個性）通常只坐落在恆星而非行星，但木星是一顆失敗的恆星①，還是能產生很少量的微中子。四角直接參與了人類與銳的個性程式，並建立了世界的本質。它們有規律地化身入世，展現出四個原型。至少每一百年，至少有一角在一個形體中，會取樣環境來作為自身編碼的持續進程。它們能化身為任何東西——微生物、昆蟲、草葉、天鵝、羊，偶爾才會化身為人。以動物的形態來到地球，可以避免它們被困在這裡太久。


    化身的編制及意識在形體內的重要程式，都由四角控管，特別是木星（邏各斯）這個眾神之王②。這相當近似於所謂一神論上帝的描述。不過這個程序現在正在崩毀。事實上，這一回合在
    1991 年就已經開始收尾，我們即將來到終點。


    1991 年時，第一角離開了天狼星，在瑞士化身為一株紫杉③。而距今 1300 年後，當這棵樹死亡時，地球上的生命也會終結。


    這份「全編制規劃」（Global Orchestration Directory，簡稱 GOD）已經崩壞，因為其中一角遺失，無法再程式化。這就好像有人燒了阿卡西紀錄④。我們必須理解到，這些規劃是相當複雜的。你得保存所有紀錄。要維護這些規劃，必須用上規模龐大的組織與資源。從這樣的角度來看，這些規劃正在凋零。整個結構體已經開始四分五裂。因為第一角不再發揮作用，能維持轉世化身的程式便開始崩塌。


    如果你想要，可以把四角稱為「神明」，但你真正面對的是非常成熟的個性水晶，它們棲身於繁星，沒有活在人體裡的負擔。那只是一種機制。不用把它們吹捧為神。它們並非不朽，也會死去。有時候它們的生命持續很久，但仍終將一死。


    天狼星已經山窮水盡。它們會死。包括我們的恆星，太陽也會死去。而已經運作了一萬六千年的這一回合，主宰者是木星。宙斯萬歲！


    這一回合透過輪迴實驗來進行測定。換句話說，同一顆個性水晶透過不斷變換載具來持續測試，看看意識能否在形體裡展現，以及可行性有多高。這聽起來好像有「某人」在試驗，但其實沒有。它就只是在發生的事。這從來就無關乎水晶（或是靈魂成長之類的蠢概念），而是關於形體，讓形體盡善盡美。我們被設計來迎接這個過程的結束。緊接著到來的「玉龍」將不再有任何輪迴轉世。當你仰望天空，你看到的是過去。天狼星已然消逝，只是我們還沒親眼見證。這顆水晶早已落在瑞士。四角少了一角。


