  md: '大時代，可以帶著覺察地活，認清宇宙的機制並親眼見證其運作，真的很美好。


    看見整個過程那龐大、浩瀚、綺麗、絕美而光彩奪目的組織，真是太不可思議了。能清楚看見入世化身走向結束（如果我能那樣說的話），對意識而言是個偉大的勝利。走到這一步，對我們而言相當重要，因為這開啟了接收整體意識的平台，也展現出整體發展的最終階段。


    這是實驗的漫漫长路——人類承受著折磨，所有不知緣由的痛苦不斷來來去去、進進出出——這一切的一切，都是為了實現「讓意識能真正地棲身於形體」這個我們甚至無法一瞥的遠大目標。如果你依循這個程式，我們似乎都在正軌上實現這個可能性。這是因為第一角已不復存在。


    這個機制程序，這個宇宙的整體目標，就是要創造出理想的形體。理想形體能支持並過濾意識，直到意識能夠自我觀照，生成瑪雅幻象，直白的說其副作用就是會擁有大智慧。無論我的人類世俗觀點會是什麼樣貌，我的宇宙觀都會充滿龐大的樂趣。在許多的生命體內，都有這樣的意識火花。不管是生命的目標或宇宙的目的，都是形體的原則。當你建構形體原則時，事物會在某一個舞台上運作，而不會在別處運作。想一想，打字機和電報後來怎麼了？那些形體在目標完成後便消失無蹤。'
