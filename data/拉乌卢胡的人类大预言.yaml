    # 每個獨特的知識，

    總有它的獨一無二故事


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_3_0.png)


    人類設計（Human Design，下稱 HD）的故事，不管從哪個面向切入，都非常引人入勝，因而這門學問從問世以來，在全球掀起了一波學習、探詢與實驗的風潮。不管你知不知道、相不相信
    Ra 接收 HD 訊息與宇宙奧秘的奇遇，這套知識卻是真實存在，並全面展現出經得起測試的完美可能。


    本書發行的緣起與過程蘊含著滿滿的故事。作為策劃人，能順利推出中文版，要率先感謝故事的主人翁、也是故事的傳訊者—人類設計系統的創辦人—拉．烏盧．胡，沒有他，這套學說不知何時才會出現，甚至沒可能出現。


    第二位要感謝的是作者史提夫．羅德斯老師。任何跟金錢或名譽沾上邊的事情，總有它的 drama。若非因際會使他離開原本所屬的體系、並創立了既傳承又嶄新的獨立學派，這本書同樣可能只會石沉大海。


    而特別要鄭重感謝的，是推動史提夫老師著作中文化的前策劃人，也是我已故的閉門學生及戰友冼耀華先生（朋友喚他 Simon，HD 同修叫他 Mensa）。沒有他的認同與支持，'
