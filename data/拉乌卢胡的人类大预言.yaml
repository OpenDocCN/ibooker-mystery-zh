    身而為人不再是特權，優雅退場反而是我們這個物種的義務。這正是這門知識的用途，特別是從現在開始的一、兩百年內，當這個週期的深度開始發揮作用時，計畫的殘跡將會永遠消失。


    這個層次上，結束並不神祕。人類或許在它到來之前就已察覺其動向。銳則是一定會知道。銳必須與天堂的幾何軌跡共譜宏偉之舞。萬物會互相碰撞。這是必然的走向。我們被星體圍繞著，以不可思議的速度飛馳、互撞，然後改變軌道。我們以大量的專用智能與電腦，試著盡可能標註出更多的小行星所在，因為我們知道它們其中的某一顆很可能成為行星殺手。這不會是上帝與祂的人馬從天堂降臨來跟惡魔打聖戰。從
    2851 年到 3262 年的解釋十字（Cross of Explanation）這段終結前的時間，或將是銳的潛能唯一能被確實見證的時期。屆時將有足夠的意識銳伍群，讓他們可以開始形成最低限度的原始社群來掌控環境，並藉此發展他們的認知力。這能讓他們建構某種我們理解不了的幻象（Maya）。


