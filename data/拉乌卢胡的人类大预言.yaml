  md: '我則提供他在這兒過生活的處所。


    在我不吃不喝的第八天，他下山來。他非常擔心。他對我說，我是個初學者而且不知道自己在做什麼，這樣搞可能會損害我的系統。


    他堅持我應該停止禁食。我回他道：「我沒有禁食。我只是不吃東西而已。」這是兩回事。儘管如此，他還是不懂我的意思。所以，他繼續跟我說他已經為我調配了某種草藥。他把藥給了我，要我在一天裡分幾次配熱水把藥喝掉。這個藥會清除我的腸道。他擔心這些可能在你體內積聚的東西，以及那些在你停止禁食時釋放的毒素。在那個時候，我已經不吃不喝八天之久。但我渾然未覺。


    在日後回顧我和聲音的奇遇的其中一件有趣的事情，就是當我離開北美時，我的體重大概是 77 公斤左右。而在我遇到聲音時，我只剩 54 公斤，在那之後我的體重從未超過
    61 到 63 公斤。我的身體經歷了準備期。基本上，我身體的脂肪都被移除了，我看起來就像是一個「健康浩劫的倖存者」，


    +   1. 在本書第一章裡，作者在描繪 Ra 的奇遇時提到這些蝴蝶吊飾是一個法國藝術家做的，這個由 Ra 自述的章節則寫道那是英國詩人做的，本書謹照原文翻譯。

    2. 克里希那穆提（Krishnamurti）是印度哲學家，被喻為二十世紀最偉大的靈性導師之一。'
