  md: '於氣泡之中是種意外的機緣。是的，它很有趣，但那是個氣泡，終究是個氣泡。門開啟。我終於不再感到絞痛，這是好事，畢竟那真的有夠痛。那兒有件法蘭克在穿的披風，那是那種附帶兜帽的厚重毯棉披風。


    法蘭克身形十分高大，比我大上許多。他可能有 188 至 190 公分高而且骨架魁梧。所以，那是一件很大的外套，而我冷得要命。我不想在外面受凍，所以我伸手抓過這件披風，披在我的肩膀上後再用兜帽把頭蓋著，往外走去。


    我不知道我在外面幹什麼。我只是順著經驗之流。我走到外面，走下階梯。我發現下樓梯時，我竟然能看見眼前的我的身影的不可思議細節。你必須是住在鄉間，才能知道月亮的陰影有多令人難以置信。


    在這一刻，我肩膀上方的月亮又大又圓。走到階梯底部時，我轉過身來看著那顆滿月。當我站在那兒，望著滿月時，我又聽到那個聲音、那個「沒有都卜勒效應的飛機」了。我已品嚐過驚奇。我已體驗過興奮，但我可沒準備好要面對恐懼啊。


    有所突破是令人興奮的，但接著，你在哪裡呢？你不再身處於任何一個自己知道或了解的地方了。有個東西物理性地抓住了我，用那種大人抓著六歲小孩的方式，雙手緊抓住我的前臂與肩膀，然後把我轉過身來。就是那種感覺。那是'
  merge: -1
  pgno: 269
- img_proc: true
  md: '個糟糕透頂的經驗。我沒有任何辦法可以描述它。


    幸運的是，我已經禁食好長一段時間，因為我告訴你：光是現在想到那個經驗，就喚起了我心中的恐怖。


    被那樣一把抓起然後轉身。接著，更怪的事情發生了。在旋轉的同時，我可以聽見公雞、狗、馬兒和鳥——全部都在叫。狗兒吠著，而遠方某處的馬兒也嘶鳴著。在我被轉過來時，我望著東方的地平面。我看見太陽的日冕開始浮現，那是微小的、剛剛破曉的晨光。但在光裡頭，有一個炙熱的白點。一個高溫的白點——它美麗至極——就在地平線的邊緣。在右側則是一個小污點。當我看著那個熱點和旁邊的汗點時，我喪失了意識與眼界的尋常感知力。就好像是被運作中的閃光燈閃到眼睛一樣。但那個閃光燈有多重色彩與基本的模式。


    那感覺就像是我被淋浴，幾乎是沐浴在模式之中，被流動的模式、來自源頭的流動淋灑一般。持續的時間我覺得沒有超過一分鐘。但對我而言，那似乎是永恆的。我不知道我能不能活下來。對於發生在我身上的一切，我全然沒有頭緒。而被抓著轉圈的我，仍處在全然的腎上腺素狂潮中。


    當這一切停止時，陽光已布滿天空。在黎明時分，這顆太陽以不可思議的速度躍升。我聽見法蘭克從屋子走了出來。他問我在幹嘛。我對他說：'
  merge: -1
  pgno: 270
- img_proc: true
  md: '「你有聽到嗎？」

    「聽到什麼？」

    「你有聽到嗎？」——因為我腦中的那聲音實在太大。

    在持續了三或四個小時之後，那聲音才離開。


    那個早晨我所張望的地平線，剛好是太陽、水星與哈雷衛星的三重合相。這是我怪得可以的神祕奇遇之一。我從來不知道這種事真的會發生。我曾挖苦、嘲笑、輕視這種事。對我來說，這些故事、童話之類的玩意兒，似乎——都不是「事實」。某程度上，它們不過是失敗的心理狀態的副產品。我不相信上帝或神格。我沒有任何信仰。我跟很多人一樣，差不多就是個自戀的虛無主義者。


    但是，後來——轟隆！我的人生走到了這一夜。


    我所以為的世界全數消失。


    什麼都不見了。在那一刻，我不再相信任何事了，我辦不到。


    我理解到人們是如何盲目，他們看不見存在於每個地方持續運作著的力量。我的整個人生改變了，一切都變了。

    從字面上看來，我開始死去。我這個聰明的西方人，突然間就這麼邁向死亡。關於自己的一切，都不再與我所理解的知識潛力有任何連貫性。全都破滅了。'
