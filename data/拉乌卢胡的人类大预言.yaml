  md: '經驗迴路和人類的感覺迴路①類似，但還是有些基本差異，這與關門 49 有關，它是完成 2027 年突變過程的其中一個執行者。此迴路的关键字是收集。銳所分享的東西，是以最特殊的方式收集的事物。就算是看來極其無助脆弱的銳嬰孩，他吸收訊息的程度也比我們深上幾千倍。他們是厲害的收集者，但那並非為了自己而做。在能夠組成伍群之前，他們不會知道原因。他們不會試圖去理解所收集的資料，而是將數據解構並儲存到非特定的位元，這樣就可以再進行重組。他們的經驗層面與成就無關，他們臣服於一個更大的力量，由它來挖掘資訊，並且提供個體所沒有的東西。沒有人能想像遇到第一個有意識的伍群時，將為我們帶來什麼樣的衝擊。他們將不再脆弱易損，也不再為生存而感到恐懼，因為那不是他們的生命重點。只有人類才會有恐懼。


