    集體迴路的成功與感覺這兩種面向，各自擁有甜美的幾何軌跡，以自己的方式來「分享」。但社群迴路的一切都要透過「欲望」來進行。社群的唯一重點是：支持。這是部落形成的原因，若非如此，我們不會喜歡提供支援。我們帶來了美好的社會支持。這包括社會契約與社會交易，食物、庇護以及教育。我們就是一個家族。我們必須照顧彼此，也不該忘記那些弱勢、貧窮、盲啞或殘疾的人。那就是人類，你幾乎可以說：「真好！」社群迴路的支持和集體迴路的分享或個體迴路的創造並不一樣。為了支持某人，為了關心與照顧對方，我們有親密而深刻的連結。不論賺多賺少，我們天生就有仁慈之心。這就是支持。我們並沒有那麼壞，畢竟這是基因的設計。我們有恰當的方式來處理物質層面的事情。


    但採集跟支持不同。你看過蝗禍嗎？蝗蟲是非常漂亮的昆蟲，但牠們具有毀滅性，會像巨大的雲團一樣到來，並且吃光所有東西。牠們不是種植者。人類學到如果只是單純地採集，就勢必只能當遊牧人，持續不停地遷徙，而永遠無法建立文明。所以我們發展出採集和重建的本事，這樣就可以再次進行採集。


