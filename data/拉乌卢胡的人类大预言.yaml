  md: '這是七中心人類最基礎的突變。


    也是這個突變，將人類和我們的靈長類親戚分隔開來。我們和牠們之間唯一真正相似的，只有我們一歲前的樣貌。在那個時期，我們能夠做到靈長類動物一輩子都會做的事，也就是一邊呼吸一邊喝東西。我們在被餵奶的嬰兒身上可以發現這件事。嬰兒可以在吸奶時，同時用鼻子呼吸。事實上，如果嬰兒感冒，會非常恐怖。但突然間，他開始成熟，等到準備好斷奶時，就不太能夠邊呼吸邊喝東西，他會開始積聚氣體並開始吐出液體。這就是發生了突變。身為人類，我們無法邊喝東西邊呼吸，但我們因此有機會能展現聲音複雜的細微差異。嬰兒在這時期的聲音詞彙有限，等級跟黑猩猩相同。銳不需要依賴說話來表達，這個事實很清楚。在這組迴路裡我們就看得出來。這組迴路並不活躍，你也可以稱之為「停滯迴路」。它斷絕了個人主義的趨向。人類以擁有個體性為豪，但對於銳來說，個體性是原始的。所以你在面對擁有這個迴路的銳時，他會對你說：「抱歉喔，這真的太原始了！這根本過時了！」他們無法有任何的個體性展現。


    Ra 的假設是，你可以在嬰兒介於九個月到一歲之間時，判斷出他是不是銳。你會發現這個嬰兒可以繼續邊呼吸邊喝東西。


