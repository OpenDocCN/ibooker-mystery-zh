  md: '爆炸而消失無蹤。筋疲力竭的 Ra，往後倒向平台。他覺得自己好像浮著，身體完全感覺不到平台。接著，聲音開始教導他。


    這感覺很棒，因為在聲音說話時，Ra 沒有痛苦。他漂浮在一種「訊息場」中。聲音跟他講大霹靂的故事，但它稱之為意識水晶及存在本質的故事。Ra 從沒聽過類似的東西。他沉默著。他從來不知道自己能這麼沉默。這一切都非常奇怪。外頭正在下雨，事實上，不只是下雨，而是滂沱大雨。Ra
