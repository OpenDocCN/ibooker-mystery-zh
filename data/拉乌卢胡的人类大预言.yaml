    在伍群的生活裡，我們將成為次要的存在，就像螞蟻之於我們一樣。除非螞蟻在一年中的錯誤時節出現在廚房，否則我們根本不會理牠們。你不會想以人類之姿，在錯誤的時間闖進「銳廚房」吧。那可是他們的時代。我們無法擁有銳的感官配置。我們與他們的世界格格不入。他們就是像活在另一個星球。就算我們像伍群那樣湊在一起，也不可能取得同樣的優勢。我們沒辦法與之競爭。


    你的兒孫將伴隨這樣的印記生活。他們不會像我們那樣自大與傲慢。我們曾是自身時代的寵兒，但他們會被安置在他們的位置上。想想恐龍被程式所擁抱著的那三億年①吧。牠們統治著我們所未知的世界。世界一直在變化。我們不會活在程式所設計的新世界。我們不會活在銳的世界，但這並不表示我們的世界就會消失。這只是意味銳的世界沒有我們容身之處。現在是人類的時代，但時間所剩無幾。多數人的水晶將不再轉世為人。降生在這世界的人口會越來越少。曼陀羅輪轉動著，而且是以對抗我們的方式在運轉。它有更大條的魚要料理。事實就是這樣。不論你生活在什麼時代，要做的就只是優雅地向形體鞠躬，臣服於它的智慧，讓它活出相應的生命罷了。


    ① 一般說法是，恐龍最早出現在二億三千萬年前的三疊紀，並在六千六百萬年前的白堊紀滅絕，應該只存在於地球上一億六千萬年左右。但恐龍的確受到眷顧，因為有些恐龍的壽命長達三百歲。


