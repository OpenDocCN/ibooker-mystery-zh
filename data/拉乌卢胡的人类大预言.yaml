    在房屋的右前方是個果園。當你走進果園，那兒有株相當巨大而美麗的橄欖樹。我走向橄欖樹，在樹下蹲著，想看看自己能不能擺脫那些絞痛。當我坐在那裡時，我可以看見滿月。月亮已經升到房子的上方。我蹲坐在被夜幕籠罩的橄欖樹下向外望去。月亮就在我面前。從你身體裡排出的東西可能非常不可思議。那就像是黑色的油。那著實令人吃驚。在這場經歷之後，我不認為我會再有這種程度的內在清理過程了。在我排泄而月亮也持續升高時，我聽到了什麼。它沒有消失。在我凝視著月亮並承受這絞痛的過程裡，我聽到了一個聲音。那顯然是女性的聲線。它說：「這聽起來好像一架飛機啊。」而那聲音聽起來確實就是那樣。它聽起來就是飛機。但那聽起來像是一架不會靠近也沒有飛離的飛機。它不具備都卜勒效應❶的特質。只有這個飛機所發出的非常奇怪的哀鳴聲。我無法將這聲音從腦袋趕出去。所以我就繼續那個清理自己的程序。但天氣真的有夠冷的。


    我回到屋子裡並把門關上。我坐在爐火旁邊取暖。我猜我必須坐在那兒大概十分鐘，等到門被打開以及肚子的絞痛感再次來襲。所以我回來，然後做了同樣的事，從頭到尾再'
