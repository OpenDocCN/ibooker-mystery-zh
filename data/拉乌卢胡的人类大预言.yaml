  md: '日。當隕石接近大氣層時，若能親眼目睹其熾熱、光芒與聲響，我猜那會相當奇妙。能見證萬物的脆弱與生命的易損真的頗有趣啊。這是突變的一大步。


    行星的撞擊將會驅逐設計水晶束，如同字面一般，將它扔出地球、扔到大氣層之外。人類的死亡是：設計水晶和磁單極匯合後一起離開人體，而行星的死亡模式也如出一轍。


    當設計水晶束離開所在環境，對於生命的所有支援都將喪失。這樣的解雇並非自願。畢竟少了保護不可能感覺舒服。這就是設計水晶束棲居於地球的地幔深處的原因。所以，在它離開地球時的情況會是：設計水晶束的磁單極把所有的個性水晶束吸引過來，讓這些個性水晶將它籠罩起來。籠罩的發生並非隨機的。磁單極會在特定時間召喚特定的水晶及水晶束。


    離設計水晶束表面最接近的水晶，會是太陰結構的水晶，而在外殼上的最後一束水晶則是太陽結構的。那就像某種進行中的舞碼。


    意識場會移動。宇宙意識的潛在核心是活動的。在過去的 140 億年裡，我們所攜帶的每一顆水晶都已經旅行了好長好長的距離。光是用想的就覺得太了不起了。整個宇宙的歷史就在每個人的體內。它們是一切的見證者。名叫地球的這顆美麗星體只是路途上的一個休息站，是用來休憩放鬆與發'
