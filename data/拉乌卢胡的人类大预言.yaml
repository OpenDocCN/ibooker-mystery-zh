    班遺失了愛，但找到了形體。不在形體內，它休眠。進入形體時，它創建。班水晶坐落於太陽核心並過濾弦線。但弦並非由它創造。那是狗的工作。中心是我們意識的源頭，不代表它創造了整體意識。它只是龐大進程的開端。雖然中心確實沿著分形線而下，對一切產生影響，但只有當包括你在內的每一顆水晶，都善盡過濾之責，於自身所在的分形線上，接收前頭的水晶訊息，並加以解碼，整體意識才會存在。因此，是所有的水晶共同創造了意識的訊息之海。意識從未靜止不動。狗水晶產生微中子，其他水晶則沿著分形線持續改變微中子流。永遠在接收、改變並傳送訊息。也因此，意'
