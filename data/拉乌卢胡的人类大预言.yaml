    每天都有超過十億人同時四肢觸地跪拜？你正指向銳的方向。如果你觀察任何一天的過境行運，就可以發現程式是如何改變這個世界的觀點，讓我們走向銳。這也是人們要打破同質化會如此困難的原因，因為這就是未來。神明與宗教都是工具，好將意識融合為單一觀點，讓每個人都有得以臣服的神聖對象。但我們不可能全然地將自己交付給任何東西，因為我們只想擁有自己的權威。


    銳不需要神。銳有他的伍群。他們不會追尋任何事物。他們不做任何推論。他們不負責、不管事。他們無助但完美，而且別無選擇。我甚至不確定他們能否意識到自己的存在。但伍群可以。這是個完美的「神格」①。這也是整個神的故事的核心意義。這早就被寫進我們的基因裡了。


    我們都被欺瞞了，而這一切只為了了一個目標：融合意識到底可不可能？


