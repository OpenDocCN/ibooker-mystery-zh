    ## 沉睡的鳳凰週期


    地毯正緩慢但確實地從我們人類這個物種的腳下抽出。這不像某種龐大天災降臨。這比較像是玩笑，而且它並非來自外部。它是內建的。如果可以用我的黑色幽默來描述，我們有點變得無用。從大概
    1960 年起，我們擁有無與倫比的豐饒繁殖力，但那不過是程式，而且將在 2027 年結束全程。電力逐漸耗光。各方各面都會呈現繁殖力的匱乏。我們正邁入一個無比黑暗的時期。


    要觀察一個週期的方向，通常要從三叉戟開始。要理解一個週期的常規運轉，就從 2 號閘門計畫開始。這是磁單極所在之處，而且有三種變異的發揮方式。分別是閘門 7、閘門
    1 和閘門 13。這就是三叉戟，三叉式的矛。計畫是一種九度空間的路線圖。打從十七世紀起，我們的計畫是 42 閘門。


    當我們研究人類的終結與銳的到來時，你會發現，我們的確擁有正確的閘門。它和完結事物有關。這是一個「終結閘門（end-Gate）」而非「起始閘門（beginning-Gate）」。這個計畫表明了我們就將發展成熟，並完結我們的週期。接著到來的閘門
    51 和帶來衝擊有關。如果你告訴人們，2027 年一到，世界就將分崩離析，他們不可能相信你。但這門知識的意義就在於為即將到來的做一些準備。


    這個計畫將會擊碎人類的虛榮自大。以這種形式來結束這個週期，還真是不錯。


    一切將在 2027 年發生改變。我們將不再擁有支援。從 2027 年開始，程式的興趣不會在人類身上。它並未帶著特別要給人類的任何東西。它將完全投身於即將到來的銳。這是一種改善，畢竟，進化本是如此。我們的世界在未來幾百年裡會是碎裂的。回想一下羅馬帝國的隕落吧。看看從西元
    400 年到 800 年這段期間，變遷的歐洲那複雜的社會是如何解散與分裂。想想如何失去又怎麼獲得。瞧瞧萬物是如何改變的。我們將拋下「我將好好照顧你」這甜美的集體主題。


    這是計畫十字，是計畫的週期。是我們這個物種所曾擁有的最棒週期。對我們人類來說，歷史上從未有過比這還要偉大的時刻。


    當我們跨過 2027 年這條終點線，所有的主題都不再有任何力量。我們創建所有的生活制度，我們學會在老鼠的迷宮裡共同生活，在稠密的人口過剩環境中不互相屠殺。這是因'
