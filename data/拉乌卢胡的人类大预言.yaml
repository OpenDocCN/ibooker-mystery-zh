    銳最終的生物形體有十一個能量中心，將會在我們現在這個過渡的九中心形體之後到來，但銳其實沒機會住進去。銳會受限於這個九中心的載體內，就如同人類所受的限制一樣。形體原則的發展是
    3-5-7-9-11。如果時間沒有縮短，到了 3263 年，地球的新一回合將以十一中心的形體開始，那就是銳最終將成為的樣子。就像我們永遠無法真正體驗七中心人類的設計，出生在這個過渡期的銳，也無法經歷到可能的完整轉換，成為新的物種。時限將被縮短。銳不會有機會棲身於那個十一中心的生物形體，因為地球上的生命在那之前就會先滅絕。


