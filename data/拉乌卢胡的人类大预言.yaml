  md: '它創造了一種形體來安置兩種物種。九中心的天王星身體能提供人類和銳棲身之處。最終，在幾萬年後，將會演化成擁有十一個壓力中心的形體，屆時人類將會滅絕，就像以前的尼安德塔人一樣。這個進程可能會縮短，因為地球上的生命或許在大概
    1300 年後將全數終結。但我們已經站上了標記人類終點的門檻。真正的人類身體早就被奪走，我們也必須妥協讓步，活在不是給我們用的身體裡。我們得要學會適應銳的世界。


    如果想獲得自己的人體圖，可以上 https://humandesign.plus/ 查詢。你只需要備妥精確的出生日期與時間。


    上上頁的這張圖是根據特定的兩個時間點而計算出的結果。圖右側的計算值來自你確切的出生時間，屬於個性水晶。左側的數值和設計水晶有關，是根據太陽在黃道上比出生時間早
    88 度（大概是三個月前）的時間點計算而得。在這兩個不同的時間點上，我們會觀察十三個天體的位置。這些天體包括：太陽、地球、月亮、南北月交點以及其他八個行星。


    太陽在黃道帶繞一整圈需要大概 365 天，冥王星則得花上 248 年。'
