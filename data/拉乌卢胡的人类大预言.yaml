    12 條通道可供策略運作。這與我們所能運用的相比，真的受限不少。


    在這裡，我們看到所謂的欲望中心❶和伍群漩渦（伍群的中央磁力場）之間的特別關係。最終，這會讓伍群有機會'
  - '[PAGE 152]


    展現特殊的意志力能量。伍群不僅跟人類有著相同的物質主義導向，而且它的物質主義導向還帶有意志力。伍群具有能恣意表達的覺知，那是我們未曾擁有且無法理解的東西。


    在銳的脈絡裡，59-6 通道更像是一種將萬物拉進其氣場的磁力。所有這一切，最終都是為了擁有可存活的基因庫，而這表示必須有大量的伍群被建立起來，所以銳非常聚焦於吸引氣場。


    孤閉迴路的一切都與食物有關。銳會非常挑食，只選擇孤閉迴路能處理的東西，而肉類不在他們可以好好消化的清單裡。銳也不再因為部落的需求而感到壓力，因為他們沒有社群迴路②。他們不是策略性的。他們懂得如何協調訊息，並根據這樣的覺知來運作。因為沒有情緒波，他們不會喜怒無常。這就是為什麼他們看起來非常冷淡的原因。當一條通道的運作是出自於覺知而非情緒波時，那狀態是非常不同的。


    想想那些你在一公里外就能嗅到的陰晴不定的人。他們將不復存在。


    +   ① 欲望中心：即人類設計系統中的 Heart/Ego Center，另譯為心中心或意志力中心。

    ② 社群迴路：即人類設計系統中的 Tribal Circuit，另譯為部落或家族迴路。'
  - '[PAGE 153]


    單獨的銳確實是無助的。然而，銳的伍群絕對不是無助的，反而能接收並整理所有訊息，提供給融合意識進行存取。銳要能存活下來，不依賴人類的慈善機構或人道主義照顧，唯一的辦法就是擁有策略能力。他們身為單一個體時不具備這種能力，但那個內建覺知、有意志力和意識的伍群就辦得到。那是一種融合的意識。


    如果銳數量夠多的時刻到來，你就不用一對一地與他們溝通。你可以和伍群的融合意識互動，但沒辦法跟單一個體對話。伍群的意識並不等於其貢獻者的意識。若以最廣的角度來看孤閉迴路，它代表著一種工具，讓意識伍群得以存在。'
  - '[PAGE 154]


