  md: '我們討論過磁單極和設計水晶如何在肉身死亡時一起離開軀體。至於地球上的生命的死亡，指的是設計水晶完全離開地球時。地球被某個星體擊中時情況會有點瘋狂。星體有著數不盡的磁單極。它們會「呼叫」所有的水晶並將它們拖進束裡。


    接著，這捆水晶束在停留於地球好長一段時間後，將再次移動。如果你可以想像，你可以把它看做是顆精子。就像帶著一條尾巴的點。那條尾巴就是所有的太陽結構水晶。它們並非核心部分，不在中心結構裡。水晶束會朝太陽而去。它會繞著太陽旋轉，拖著所有的太陽結構水晶，把它們帶到終點站。然後，它會繼續它的旅行。這捆水晶束會依據它們被安排好的階層來挑選攜帶的個性水晶。這全都和分形有關。若能親眼看到設計核心的所有水晶被重新規劃，肯定相當驚人。除了太陽結構水晶之外，其他水晶會按照分形，也就是最初的互連方式進行編排。


    Ra 一直都知道誰屬於太陽結構。這不是他思考所得，而是自然發生的。聲音曾告訴他要如何看見差異，但 Ra 從未跟別人提及，畢竟他不知道這樣做有什麼價值。太陽也是陽爻搭陽爻的結構，它也同樣會死去。'
