  md: '![](img/826d9e60a4e27f605a07c3f849b1e3a2_146_0.png)


    關於銳的本質，你要了解的是，他的動力中心位於孤閉迴路裡。銳就是這麼一回事，而這也是我們人類無法理解的能量運作方式。我們面對的是突然出現的覺知潛能。孤閉迴路就是個動能的配置。它的主要任務是傳送與接收訊息，但我們無法真正領會。這個迴路的關鍵字是「融合」。這個有趣的字眼並不常見，也沒有太大的價值。當眾多獨特事物仍設法尋求真正成為一體的方式時，融合就發生了；這個方式讓他們彼此連結的程度，遠超乎我們表面的理解，那是一種無縫隙的共有狀態。融合是拋下個體的差異，並敞開自己去融入更大的整體。


