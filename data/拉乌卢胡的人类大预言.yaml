  md: '教袈裟。那道光穿過了袈裟，所以 Ra 把它披上。光接著往書區去，點選了英王欽定本《新約》聖經、印度教的《薄伽梵歌》和史丹佛大學的生物學課本。根據指示，他將那幾本書全放在平台上。屋內還有一張皮革編織的棋盤，與一卷以前藝術家拿來看做蝴蝶的銅線。Ra
