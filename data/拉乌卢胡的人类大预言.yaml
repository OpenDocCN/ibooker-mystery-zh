    日。當隕石接近大氣層時，若能親眼目睹其熾熱、光芒與聲響，我猜那會相當奇妙。能見證萬物的脆弱與生命的易損真的頗有趣啊。這是突變的一大步。


    行星的撞擊將會驅逐設計水晶束，如同字面一般，將它扔出地球、扔到大氣層之外。人類的死亡是：設計水晶和磁單極匯合後一起離開人體，而行星的死亡模式也如出一轍。


    當設計水晶束離開所在環境，對於生命的所有支援都將喪失。這樣的解雇並非自願。畢竟少了保護不可能感覺舒服。這就是設計水晶束棲居於地球的地幔深處的原因。所以，在它離開地球時的情況會是：設計水晶束的磁單極把所有的個性水晶束吸引過來，讓這些個性水晶將它籠罩起來。籠罩的發生並非隨機的。磁單極會在特定時間召喚特定的水晶及水晶束。


    離設計水晶束表面最接近的水晶，會是太陰結構的水晶，而在外殼上的最後一束水晶則是太陽結構的。那就像某種進行中的舞碼。


    意識場會移動。宇宙意識的潛在核心是活動的。在過去的 140 億年裡，我們所攜帶的每一顆水晶都已經旅行了好長好長的距離。光是用想的就覺得太了不起了。整個宇宙的歷史就在每個人的體內。它們是一切的見證者。名叫地球的這顆美麗星體只是路途上的一個休息站，是用來休憩放鬆與發'
  - '[PAGE 220]


    展自我觀照意識的好地方。但地球是個暫時住所。有個截然不同的形體將會到來。當我們走到這回合的終點，我們的實驗也就無法再有進展。


    當意識銳伍群發展的時間一到，我們也抵達了生物型態明顯的極限。無論你變得多老練世故，生物型態仍有其問題。它的限制極深。因為有太多工作要進行、有太多部分得運作。它得被餵養又很脆弱，還需要一顆帶有適合生物發展潛能的特別行星。但它能帶給你的也就這麼多而已。有限的壽命一直是生物學的問題。地球上有太多的東西只存在一會兒。死亡就是生物學的核心要旨。生死不斷重複循環。就連摩擦一下手掌，你都會殺死幾百萬顆細胞。我們得要非常專心地觀察並維持生物型態的運作。這也是水晶束必須繼續前進的理由，因為地球並不是能因應未來的正確媒介。


    即將到來的根本不是生物型態，至少不是我們窮盡一切想像所能理解的形體。如同我們所知，這是生命的終結。生物型態有趣的地方在於具有突變潛能。當你離開生物型態，就等於是拋下了突變的可能。這真的值得深思。生物型態有其不可思議之處。持續繁衍的突變在每個世代發生。如果回到二十五億年前、地球上的生命起源之時，你就會知道這花了多長的時間。四百萬年前，我們人類還沒什麼見識，也才剛學會怎麼直立行走。一萬年前，我們終於搞清楚動植物如何成長。七千年前，我們開始寫字。想想看要發展這些自我觀照意識的基底究竟花了多少時間。'
  - '[PAGE 221]


    程式說：「好的，我們已經花了二十五億年來做這件事。這相當有意思。沒錯，我們確實獲得了自我觀照意識。非常棒，但我們需要做得比這更好。要更加老練、更有成效才行。」所以，它用了一個非凡的東西來取代突變。那是某種永生不朽。是相對的不朽。不是生物型態，所以沒有死亡。不是生物型態，所以毋須繁衍。它非常不同，超乎地球末日之外，也超乎這一回合的結束。我們來自一個罕見的星球。它有著可供應生物型態需求的特殊環境，而我們要去的地方反而非常普通。可以說在離開生物型態後，我們會變成外星人。當我們抵達這本書所描繪的我們該去的地方時，就會像你所能想像的任何科幻故事一樣棒。


    當設計水晶束離開地球，它會把地球上所有生命的設計水晶一併拉走。萬物會在一瞬間全數死亡。當這件事發生時？哇賽！來討論一波吧！真的難以置信。舉目皆是死亡。不計其數的魚在幾分鐘裡死去。這是生命力的滅亡。這是形體原則的死亡。這條水晶束移動時，便把地球上的所有生命撕裂，在那麼做時，它也將個性水晶層層堆放而創造出一把鞘，作為它在宇宙移動時的保護。


    你必須要知道：一旦水晶離開地球，光就會被關掉。不再有「思考」與「觀看」。不會有硬體、不會有存在、沒有宇宙、沒有獨特的生活，也沒有獨特的才智。


    什麼都沒有。這就是空無。但它並非真的一無所有。因'
  - '[PAGE 222]


    為設計水晶束與它的個性水晶鞘都確實在運動。一切都和活動有關。在設計水晶束的魔力以及它的個性水晶鞘離開地球後，它們會繼續一段彈弓般的旅程。


