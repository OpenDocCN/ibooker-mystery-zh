    # 訊息之流


    一切都是從一顆微中子穿越一個意識水晶開始。什麼是微中子呢？那是一種具有質量的極微小粒子，以近乎光速的速度移動。它們穿透萬物：行星、人類，甚至是一面厚達好幾光年的鉛牆①（如果這種東西存在的話）。但因為微中子帶有質量，它們也和所穿越的物件交換訊息。它們的振動是會改變的。


    星星會產生微中子，而我們的太陽則提供地球上百分之七十的微中子。與太陽垂直的每一平方公分，每秒大約有 650 億個太陽微中子穿過。微中子是訊息的攜帶者，它們帶著訊息穿梭宇宙的每個角落。它們並非亂無章法地與萬物接觸，而是透過一種特別的秩序——你或可稱之為階層——讓訊息在宇宙間流動。這就是水晶能彼此溝通的原因。藉由穿透它們的微中子，水晶持續接收並傳送訊息。我們也將這些階層稱為分形線（Fractal
    Lines），這和兩顆水晶如何從宇宙大霹靂及宇宙的誕生（班 [Baan] 和圖 [Tu]）有關。


    ![分形線示意圖](img/826d9e60a4e27f605a07c3f849b1e3a2_50_0.png)


    有辦法把所有的碎片拼回宇宙大爆炸之前的模樣，就能看見那些碎裂的線。訊息正是沿著這些線而流動。生命中的一切，都是沿著這些碎裂的線而發生，這就是我們所謂的分形線（但別和碎形圖案［fractal
    patterns］❷搞混）。


    從哲學的角度來說，你可以稱這些微中子為宇宙的意識海，我則稱之為「創建計畫」。不過，微中子及所攜帶的訊息只是整個故事的一部分。水晶就像解碼器，但它不只是解碼而已，而比較像是當微中子通過時，再加上水晶獨特的訊息，這也是我們稱之為意識水晶的原因。它們確實是意識程式的創造者。星辰只負責產出能攜帶意識的媒介。


    宇宙裡，每顆水晶的形體和特質都獨一無二，沒有哪兩顆水晶會用同樣的方式過濾微中子。我們的心智與身體所接收到的確切訊息（你可以稱之為「生命藍圖」），出自於兩個部分：微中子和你的水晶。這些水晶以非常特別的方式詮釋微中子。水晶也只會聆聽對其有意義的正確訊息——也就是那些已經先穿過其他水晶的訊息。那些在大爆炸的碎裂之前與我們相鄰的水晶都很重要。碎裂前與我們越接近，它們帶給我們的訊息就越重要。你這輩子會遇到的最為重要的人，無論是給了你什麼或僅僅與你擦身而過，他們所帶有的水晶，都在大爆炸之前與你相近——也就是那些在你的分形線上的人。


    當微中子穿過這些水晶，會產生不同「頻率」來影響我們的行為。


    # 水晶束與轉生入世的過程


    我們人類、其他形體和所有細胞擁有的設計水晶，都是來自同一條位於地球中心、接近地核的水晶束。


    另一方面，個性水晶在地球大氣層周圍建立了鞘，它們沒有居於形體之中時，就會棲身此處。個性水晶組成非常多的水晶束，不像設計水晶只有一條。舉例來說，有基督水晶束、佛陀水晶束等等。最初只有與十六張臉①相應的十六條水晶束，但現在的數量多得驚人。你必須想像一下：有一整層的水晶包圍整個地球。這些水晶束穿過大氣層，也能穿越斗室。所有的微中子在觸及地球上的生命前，都必須穿透這些意識水晶。若你能從夠遠的距離望向地球，你會看到的是這些水晶，而不是地球本身。你看見的其實是地球似乎被水晶球面給包覆著。你會看到一顆大水晶。


    ①本書 107 頁起有關於十六張臉的說明。


    Ra 在他的奇遇中所接收的訊息來自設計水晶束，如同先前所提，設計水晶束通常位於地球中心。他以身而為人的極限經歷了那一切。他的人類形體虛擬出聲音，只有在我們能處理的情況下，才能解釋某些事情。


    我們以自己做得到的方式來描繪事物，我們盡可能用最好的方式來辨認事物，不論它們的真實本質到底是什麼。你可以把水晶束稱為鬼怪、惡魔、神靈或天使，但事實上，那不過是整體意識場的一部分罷了。


    # 人類的受孕


    受孕時，來自地核的設計水晶束裡的那顆水晶，便開始建構你的載具（身體）。性高潮的那一瞬間，精子帶著設計水晶，依循內嵌的磁單極引導，找到並進入你母親子宮中的那顆卵子。


    約莫你出生的三個月前，當你的身體做好準備，新皮質也發展足夠時，磁單極會從大氣層裡某一條特定的個性水晶束，召喚一顆個性水晶過來。這顆水晶在你死後會回歸同一條水晶束。


    你的個性水晶已經這樣做過成千上萬次，它不斷經歷不同層次的形體發展。這樣的實驗途徑，這樣的人生煎熬，進進出出的一切苦痛，都是為了一個更偉大的潛在目的：一個真正可以乘載意識之形體的可能性。


    # 死亡


    在你死去的過程裡，設計水晶會重新和磁單極合而為一，接著一起離開你的身體。這是你物理上的死亡時刻。


    生理上的你已經死亡，但個性水晶依然與你的心智相連，它尚未被釋放。頭腦裡還有一小撮氧氣讓你保有自我觀照的意識。為了讓個性水晶完成整個程序，死掉的身體依然有用。大腦仍活動著。


    每個人從生理死亡的那刻起，都應當經過一段程序來徹底完成這趟轉生。這得花上七十二小時，之後個性水晶才終於能被原先的個性水晶束領回。


    為了讓水晶再投胎，身體必須得有三天的不受打擾。這或許意味著：舉行葬禮、火化、器官移植。下葬或解剖當然統統不行。死亡並沒有將個性水晶從身體解放開來。如果在逝世後七十二小時之內就被下葬了，水晶可能就無法回到原來的水晶束裡。這顆水晶將會四處遊蕩，永遠無法再投胎為人。這就是為什麼當今的水晶束，會比我們最初轉世的十六條多了那麼多。


    ![死亡過程示意圖](img/826d9e60a4e27f605a07c3f849b1e3a2_56_0.png)


    正因如此，我們稱為「神」的十六張臉，正在失去它們的力量。它們是十六條原始水晶束的中心，但現在，尤其是在近五百年人口大爆炸的影響下，相較那些無法回歸本源的水晶所突變出的水晶束，實在寡不敵眾。已有大量來自原始十六個本源的水晶消耗殆盡。神明已然失去力量。如果你觀察地球上的所有宗教，找到方法存活下來的，都是以一神論為中心導向的宗教。人們不再關注已喪失太多力量的十六張臉，這終將引領我們迎向門的閉鎖。我們所接收的訊息品質遭逢阻礙。這是計畫十字週期❶的尾聲。在
