  md: '# 個人主義迴路 關鍵字：展現


    這組個人主義迴路的有趣之處在於，它被剝除了「成功維度」。這讓它和人類相對應的迴路有所不同。而最根本的差異，在於它不具備人類「創造迴路」的突變要素。個人主義迴路裡少了
    3-60 ①，所以不會有突變。對作曲家來說，走出憂鬱，將之譜為精采的樂曲，再回到愁思之中是常見之事。但這組迴路不一樣。這裡沒有我們所知的那種人類設計裡的情緒能量流。所以這不再是突變的迴路。沒有喜怒哀樂，也沒有創造力。


    見證演化的運作方式真的十分有趣。十萬年前，發生了喉嚨的突變。這個變化打開了概念上的心智可能性，以前所未有的方式講述並儲存經驗資訊。後來，喉部下降，並打開了視覺皮層的潛能，但最重要的是，這個變化讓聲音有可能發展複雜細微的差異，也就是我們所謂的語言。


    ① 3-60 在銳的設計裡，歸在孤閉迴路中。'
