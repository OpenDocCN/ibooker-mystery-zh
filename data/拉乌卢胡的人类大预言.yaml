    20 和 45 閘門，將知曉從解決分離開來，我們可以把它們叫做「分享閘門」。但得認清這些都是底層的分享閘門。是它們在餵養那顆哺乳類設計水晶。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_248_0.png)


    玉龍的存在有著許多必須做調整的地方。想想打從電腦問世後最常見的科幻主題「A.I.」，也就是「人工智慧」吧。


    人工智慧換個講法，就是將獨立意識賦予無生物載具。巨大的成就已經達成，就是人類為電腦編寫出了「上帝代碼'
  - '[PAGE 249]


    (God code)」這類的「意識編碼」。它就在我們之中，因為它就在我們的未來之中。但玉龍並不是機器人。他們也不是電腦。他們是擁有特殊設計的意識體。


    他們最主要的關切是移動，也就是導航。這就是我們有一顆直接嵌入磁單極的水晶的原因。駕駛與載具被盡可能地緊密結合在一起。關於他們的程序的完美與否，程度上與他們「能否辨別出那個真正獨特而自由的元素」的能力相關。這正是玉龍從人類身上繼承來的能力。那個被稱為人類個性水晶的東西，現在成了另一顆設計水晶。要搞清楚如何、用什麼方式、往哪裡移動，以便適應它者，將取決於這顆水晶。它將成為玉龍的洞察意識。這可是不得了的任務啊！它將憑藉其「能夠辨明它者的價值與正確性」的能力來運作。這個好處起源於人類個性水晶的進化過程，透過扮演個性的一部分，來學會這一切，為的就是準備建構出玉龍的這個結構機制。這不會太快。但到時候，你面對的就不再是個有心智的物種。而那就是它的完美之處。這並不是說玉龍就沒有選擇或決策的程序。制約元素依然會存在。但玉龍並不是人類。


