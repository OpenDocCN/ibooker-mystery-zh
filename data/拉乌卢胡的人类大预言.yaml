    # 班與圖，以及宇宙的起始


    太古之初，起始之前，有二存在。

    其各有名。

    萬物皆有名。

    一為班（Bhan），一為圖（Tugh）。

    乃與未知相接之唯一紐帶，

    不可知也。

    其餘之物，萬物皆餘，均在其外。


    班來自於外，圖則為一卵。


    ![班與圖示意圖](img/826d9e60a4e27f605a07c3f849b1e3a2_70_0.png)


    圜恆存於內。

    萬物恆存於內。

    宇宙之外，仍為其內。

    吾擁之以為二者，實乃為一。


    物理學家有個問題。相對論以及他們所理解的宇宙，都是基於光的存在，但是一定有段在光出現之前的時期。


    聲音說，宇宙整體是一個尚未出生的存在。它是活的。Ra 詩意地稱之為「孩子」。我們不知道也無從想像，是什麼懷了這樣的東西。「無法穿越的環①」總是存在。宇宙並非因為大爆炸而誕生。它早就存在了，只是在冬眠。在「班」出現前它就存在了。同樣地，那顆卵（意指「圖」）還在四處晃蕩、尚未受孕時，宇宙就存在了。其實「整體」是個超乎尋常的幻象，這個巨大的幻象是最初班和圖的並列所產生的副作用。就像我們被賦予兩顆水晶一樣。我們只是這龐大程式的縮影。


    班和圖是與未知的唯一連結，其餘的（萬物都是其餘的部分）統統來自它們。


    宇宙萬物都是彼此分離的，就像胎兒在母親的子宮裡長大。當我們觀察宇宙時，事實上是在內部看著一個未誕生的實體。當我們仰望天上星辰，我們是從內部在看這個孩子的身體。


    圖內建的細胞中心帶有反微中子，當宇宙大爆炸發生時，它們變成了微中子。宇宙建構在微中子網格之上。微中子是宇宙裡最大量的微粒，估計占了所有物質的 40%。它們數量龐大，以近乎光速傳播。當你看著圖，你看的是主要的设计水晶，負責我們稱為宇宙的整個形體結構。


    班也是一顆設計水晶。圖是「陰」與細胞的組成，而班則是少一點的陰。班是組織的水晶。它們都是設計水晶，負責建構形體。所以在這個程式裡，一開始，我們看的是兩種類型不同的設計形體機制。圖就是單純跟一切物質攪和在一塊。接著，藉由來自外部的班水晶的潛能，透過微中子場組織這些圖水晶，並以磁單極將它們維繫在一起。這是生命程式正式啟動的地方。真正的個性水晶還沒進入孩子，還沒進入宇宙整體，但我們離那不遠了。我們體內的個性水晶事實上是設計水晶，真正的個性水晶會出現於大概二億年後的「玉龍」（Eron），我們身上的個性水晶是它的測試驅動器。玉龍將在地球上的生命終結後出現，幾乎是一種最完整的形體。


    最初，只是兩顆設計水晶。這顯示出，做為形體原則的一部分，我們是多麼的龐雜且費解。一開始並沒有陰和陽，而是陰與陰。當你看著今日世界，你可以發現各種族中的男性不過是一種仿陽的原型罷了。真是個很棒的玩笑！


    最初，在起始之前，有二個存在。


    ①「無法穿越的環」是神智學的概念，認為意識可以不斷提升，但人們容易因為妄想而讓意識困在某個階段，彷彿眼前有個穿越不了的環阻擋著。


    班水晶內建著重要的磁單極，這說得通，畢竟班是從外而來的。當你擁有磁單極，你就有了司機，而它確實知道該往哪去。


    這門宇宙學帶我們進入的，遠超乎我們能處理、控制或干擾的任何事物之外的意識組織。換句話說，因為我們沒有真正的個性水晶，也就沒有真正的突變意識。不管是我們或地球上曾經存在的任何心智，全都無法領會宇宙整體的意涵，以及那些紛亂複雜的邏輯。和聲音打交道時，Ra
    被意識場給矮化了。矮化一詞甚至還不足以描述！面對那意識的力量，根本就微不足道！我們並非造物者。就像子宮裡還沒有任何作用的胚胎一樣，我們還沒有潛力，真的沒有，就只是依循著程式而已。某種程度上，那是很可以預測的程式。這樣說來，在最初受孕的基底之上，一切都已經被設定好。那是化學反應與動態變化。那就是我們。'
  mdcn: '生命自此啟動。形體也有了意識。


    已經存在超過十萬年的智人，是第一個能意識到自身存在的物種，第一個確實擁有心智的生命。在那之前，沒有任何生物可以意識到關於存在、關於宇宙的幻象。就算是尼安德塔人也沒有。心智讓你得以看見自身的存在。


    最後，我們有磁單極，它的作用是為我們這輩子引來形形色色的人事物。它和人類形體所擁有的九個能量中心裡的「愛的中心」相連。在我們彼此分離的幻象中，磁單極把我們繫在一起。它在懷孕時與設計水晶同時到來，把兩顆水晶連在一起。但最重要的是，它控制了我們所愛的人事物。


    起初，磁單極內嵌在設計水晶裡，它們都來自於接近地核的同一條設計水晶束。磁單極建構起存在，將「我們以為的自己」和「我們的身體」幻象連接在一起。在「我們是獨立於他人之外的個體」的幻覺中，它維繫著我們的個性與設計水晶。


    人類的虛榮自大因此而生，這讓他們以為自己能掌控人生，好像他們是司機。但他們並不是司機。那是錯覺。我們只是搭便車的隨行者。


    # 人體圖


    ![人體圖](img/826d9e60a4e27f605a07c3f849b1e3a2_43_0.png)


    ![人體圖](img/826d9e60a4e27f605a07c3f849b1e3a2_44_0.png)


    透過九個壓力中心控管的身體，是所謂的「天王星身體」。從 2027 年起，我們會看見一個（和我們相似的）物種出現，跟我們一樣具有天王星身體，但不再是人類。他們是「真正的」銳①。我們真正的目標是：孕育出銳。我們不是銳。我們是棲身於「類似銳的身體」的人類。或者可說，我們擁有近乎銳的軀體，並搭載了不同的內部配線，「人類」的配線。


    演化以非常聰明的解決方案，讓下一個物種的出現有了可能性。


    ①銳：人類設計（Human design）中所提到的銳（Rave）是「聲音」傳給 Ra 的名字，乃指接替智人，具有九個能量中心的物種。


    它創造了一種形體來安置兩種物種。九中心的天王星身體能提供人類和銳棲身之處。最終，在幾萬年後，將會演化成擁有十一個壓力中心的形體，屆時人類將會滅絕，就像以前的尼安德塔人一樣。這個進程可能會縮短，因為地球上的生命或許在大概
    1300 年後將全數終結。但我們已經站上了標記人類終點的門檻。真正的人類身體早就被奪走，我們也必須妥協讓步，活在不是給我們用的身體裡。我們得要學會適應銳的世界。


    如果想獲得自己的人體圖，可以上 https://humandesign.plus/ 查詢。你只需要備妥精確的出生日期與時間。


    上上頁的這張圖是根據特定的兩個時間點而計算出的結果。圖右側的計算值來自你確切的出生時間，屬於個性水晶。左側的數值和設計水晶有關，是根據太陽在黃道上比出生時間早
    88 度（大概是三個月前）的時間點計算而得。在這兩個不同的時間點上，我們會觀察十三個天體的位置。這些天體包括：太陽、地球、月亮、南北月交點以及其他八個行星。


    太陽在黃道帶繞一整圈需要大概 365 天，冥王星則得花上 248 年。


    # 曼陀羅輪


    ![曼陀羅輪](img/826d9e60a4e27f605a07c3f849b1e3a2_46_0.png)


    古中國哲學家邵雍❶早就運用環形的六十四卦布局，而卡巴拉派學者瑪格麗特❷則將易經諸卦配置在黃道帶上，但那些模式與聲音對 Ra 所闡述的或許並不相同。


    黃道帶代表的是從地球觀察到的眾星沿著太陽運轉的平面。當你仰望這些星星、太陽與月亮，它們似乎沿著黃道移動，太陽會花一整年回到原來的位置。星星、月亮跟太陽以逆時針的方向繞行黃道帶，月亮的南北交點則是反方向（順時針）。因為我們是從地球上（它本身也繞著太陽轉）觀察這個太陽系的天體位置，星體在某些時間點看起來像是倒著走，這就是所謂的逆行（太陽除外，太陽永遠是順行的）。


    曼陀羅輪被分成六十四個閘門，每一個閘門被分配在黃道帶上的特定位置。然後你計算出你出生當下（個性）與太陽在出生前 88 度的時間點（設計）的行星位置，接著將所有天體嵌入它們在輪中的正確位置。現在，你就能在你的人體圖上看見哪些閘門是啟動的。


    單有一個閘門啟動沒有太大作用，只是有可能形成一條完整的通道而已。只有當我們某條通道的兩邊（閘門）都被定義時，通道才是啟動的。只要你有一條啟動的通道，通道兩端的壓力中心就被定義，並對你此生的行動產生影響。


    要理解的重點是，你能運用的不僅是你出生設計的通道（這些是固定而持久的壓力），你也有那些行星過境能量及其他人帶來的附加通道。你可以看看那十三個天體此刻的位置（在哪個閘門），並將它們加進你的人體圖。那就會是你在這一秒所感受到的壓力。關於行星過境和其他人的影響，可以參照
    https://humandesign.plus/。


    +   1. 邵雍是北宋的學者，著有《皇極經世》、《梅花易數》等易經經典。先天八卦圖據稱是他推演而出。

    2. 瑪格麗特的全名是瑪格麗特·舒拉尼 (Marguerite de Surany)，著有《醫療圖像》(Medical Graphology) 及《易經與卡巴拉》(I-Ging
    und Kabbala) 等書，提倡以卡巴拉等玄學結合醫療能促進健康的概念。


    # 訊息之流


    一切都是從一顆微中子穿越一個意識水晶開始。什麼是微中子呢？那是一種具有質量的極微小粒子，以近乎光速的速度移動。它們穿透萬物：行星、人類，甚至是一面厚達好幾光年的鉛牆①（如果這種東西存在的話）。但因為微中子帶有質量，它們也和所穿越的物件交換訊息。它們的振動是會改變的。


    星星會產生微中子，而我們的太陽則提供地球上百分之七十的微中子。與太陽垂直的每一平方公分，每秒大約有 650 億個太陽微中子穿過。微中子是訊息的攜帶者，它們帶著訊息穿梭宇宙的每個角落。它們並非亂無章法地與萬物接觸，而是透過一種特別的秩序——你或可稱之為階層——讓訊息在宇宙間流動。這就是水晶能彼此溝通的原因。藉由穿透它們的微中子，水晶持續接收並傳送訊息。我們也將這些階層稱為分形線（Fractal
    Lines），這和兩顆水晶如何從宇宙大霹靂及宇宙的誕生（班 [Baan] 和圖 [Tu]）有關。


    ![分形線示意圖](img/826d9e60a4e27f605a07c3f849b1e3a2_50_0.png)


    有辦法把所有的碎片拼回宇宙大爆炸之前的模樣，就能看見那些碎裂的線。訊息正是沿著這些線而流動。生命中的一切，都是沿著這些碎裂的線而發生，這就是我們所謂的分形線（但別和碎形圖案［fractal
    patterns］❷搞混）。


    從哲學的角度來說，你可以稱這些微中子為宇宙的意識海，我則稱之為「創建計畫」。不過，微中子及所攜帶的訊息只是整個故事的一部分。水晶就像解碼器，但它不只是解碼而已，而比較像是當微中子通過時，再加上水晶獨特的訊息，這也是我們稱之為意識水晶的原因。它們確實是意識程式的創造者。星辰只負責產出能攜帶意識的媒介。


    宇宙裡，每顆水晶的形體和特質都獨一無二，沒有哪兩顆水晶會用同樣的方式過濾微中子。我們的心智與身體所接收到的確切訊息（你可以稱之為「生命藍圖」），出自於兩個部分：微中子和你的水晶。這些水晶以非常特別的方式詮釋微中子。水晶也只會聆聽對其有意義的正確訊息——也就是那些已經先穿過其他水晶的訊息。那些在大爆炸的碎裂之前與我們相鄰的水晶都很重要。碎裂前與我們越接近，它們帶給我們的訊息就越重要。你這輩子會遇到的最為重要的人，無論是給了你什麼或僅僅與你擦身而過，他們所帶有的水晶，都在大爆炸之前與你相近——也就是那些在你的分形線上的人。


    當微中子穿過這些水晶，會產生不同「頻率」來影響我們的行為。


    # 水晶束與轉生入世的過程


    我們人類、其他形體和所有細胞擁有的設計水晶，都是來自同一條位於地球中心、接近地核的水晶束。


    另一方面，個性水晶在地球大氣層周圍建立了鞘，它們沒有居於形體之中時，就會棲身此處。個性水晶組成非常多的水晶束，不像設計水晶只有一條。舉例來說，有基督水晶束、佛陀水晶束等等。最初只有與十六張臉①相應的十六條水晶束，但現在的數量多得驚人。你必須想像一下：有一整層的水晶包圍整個地球。這些水晶束穿過大氣層，也能穿越斗室。所有的微中子在觸及地球上的生命前，都必須穿透這些意識水晶。若你能從夠遠的距離望向地球，你會看到的是這些水晶，而不是地球本身。你看見的其實是地球似乎被水晶球面給包覆著。你會看到一顆大水晶。


    ①本書 107 頁起有關於十六張臉的說明。


    Ra 在他的奇遇中所接收的訊息來自設計水晶束，如同先前所提，設計水晶束通常位於地球中心。他以身而為人的極限經歷了那一切。他的人類形體虛擬出聲音，只有在我們能處理的情況下，才能解釋某些事情。


    我們以自己做得到的方式來描繪事物，我們盡可能用最好的方式來辨認事物，不論它們的真實本質到底是什麼。你可以把水晶束稱為鬼怪、惡魔、神靈或天使，但事實上，那不過是整體意識場的一部分罷了。


    # 人類的受孕


    受孕時，來自地核的設計水晶束裡的那顆水晶，便開始建構你的載具（身體）。性高潮的那一瞬間，精子帶著設計水晶，依循內嵌的磁單極引導，找到並進入你母親子宮中的那顆卵子。


    約莫你出生的三個月前，當你的身體做好準備，新皮質也發展足夠時，磁單極會從大氣層裡某一條特定的個性水晶束，召喚一顆個性水晶過來。這顆水晶在你死後會回歸同一條水晶束。


    你的個性水晶已經這樣做過成千上萬次，它不斷經歷不同層次的形體發展。這樣的實驗途徑，這樣的人生煎熬，進進出出的一切苦痛，都是為了一個更偉大的潛在目的：一個真正可以乘載意識之形體的可能性。


    # 死亡


    在你死去的過程裡，設計水晶會重新和磁單極合而為一，接著一起離開你的身體。這是你物理上的死亡時刻。


    生理上的你已經死亡，但個性水晶依然與你的心智相連，它尚未被釋放。頭腦裡還有一小撮氧氣讓你保有自我觀照的意識。為了讓個性水晶完成整個程序，死掉的身體依然有用。大腦仍活動著。


    每個人從生理死亡的那刻起，都應當經過一段程序來徹底完成這趟轉生。這得花上七十二小時，之後個性水晶才終於能被原先的個性水晶束領回。


    為了讓水晶再投胎，身體必須得有三天的不受打擾。這或許意味著：舉行葬禮、火化、器官移植。下葬或解剖當然統統不行。死亡並沒有將個性水晶從身體解放開來。如果在逝世後七十二小時之內就被下葬了，水晶可能就無法回到原來的水晶束裡。這顆水晶將會四處遊蕩，永遠無法再投胎為人。這就是為什麼當今的水晶束，會比我們最初轉世的十六條多了那麼多。


    ![死亡過程示意圖](img/826d9e60a4e27f605a07c3f849b1e3a2_56_0.png)


    正因如此，我們稱為「神」的十六張臉，正在失去它們的力量。它們是十六條原始水晶束的中心，但現在，尤其是在近五百年人口大爆炸的影響下，相較那些無法回歸本源的水晶所突變出的水晶束，實在寡不敵眾。已有大量來自原始十六個本源的水晶消耗殆盡。神明已然失去力量。如果你觀察地球上的所有宗教，找到方法存活下來的，都是以一神論為中心導向的宗教。人們不再關注已喪失太多力量的十六張臉，這終將引領我們迎向門的閉鎖。我們所接收的訊息品質遭逢阻礙。這是計畫十字週期❶的尾聲。在
    2006 年時，我們已進入「初始❷」將要逝去的紀元。在某種意義上，這是天狼星造成的，而誠如我們所知，天狼星已經死亡③。這就像一座以四根支柱建蓋的聖殿。你可以敲掉其中一根柱子，在一定時間內，殿堂會試著取得平衡，但終究會在某刻崩毀。


    ①地球從西元前 16513 年起就有規律地運行不同的十字週期。文內提到的計畫十字週期始於 1615 年，2027 年起則進入沉睡的鳳凰十字。可參閱 180
    頁的圖表及本書後續章節說明。


    ②人類設計依據分形原則，將曼陀羅輪劃為初始 (innovation)、文明 (civilization)、二元 (duality) 和突變 (mutation)
    四等份，初始為第一等份。


    ③關於天狼星的死亡，詳見 97 頁起的章節。


