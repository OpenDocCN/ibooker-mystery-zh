  md: '# # 伽利略衛星木衛二


    木衛二是顆卓越、絕美的木星衛星。它的表層之下是凍結的水。與木星相比,木衛二尺寸很小。因為木星的電磁連結以及重力影響,水晶束與外鞘抵達這兒後,會與木衛二保持平行。它將在這裡停留很長一段時間。水晶束將隨著木衛二而運轉,某程度上可以說,它在繞行木星的眾多週期裡,都會待在木衛二的陰影處。聲音有提到,它在這一回合結束後,將花上二億年來重組生命、重組意識場。換句話說,會將意識水晶放回到自我觀照的形體裡頭。


    將近二億年的空無。但那不重要,這只是個笑話。並沒有誰會去關心或等待。直到某一刻,當程序進展到對的地方與時間,它就會突然出現。突如其來地,這些意識水晶帶著所有的可能性、搭載它們的本質軟體,就這麼得到了嶄新的硬體,並開始末期程序,而這得再多花上二億年。畢竟這個宇宙、這個孩子,是個巨大的實體。'
