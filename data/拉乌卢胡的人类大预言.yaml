  md: '在那之後,埃及文化的一切都對準天狼星這顆狗星④。狗星成了天空的主星。包括古埃及神殿阿布辛貝和人面獅身像斯芬克斯,統統和天狼星對齊。


    所有的幾何結構與殿堂建物的中心點,全都直指天狼星。想想坐落於天狼星的個性水晶的本質,以及它在這幾千年裡被不斷撕裂的經歷,這不是很有趣嗎?


    +   ①德國天文學家弗里德里希·威廉·貝塞爾(Friedrich Wilhelm Bessel)在1884年觀測天狼星自行運動時,推論應有一顆伴星。1862年美國天文學家阿凡·格雷厄姆·克拉克(Alvan
    Graham Clark)首次觀測到這顆暗淡的伴星。天文學家有時會稱之為「小狼」。

    ②聯星(binary star)指的是由兩顆恆星組成的系統,其中一顆恆星圍繞另一顆恆星旋轉,又或者兩顆恆星圍繞一個共同中心旋轉。

    ③坍縮星(俗稱黑洞)和中子星都是恆星演化到末期,因重力坍縮發生超新星爆炸之後可能形成的樣貌。當恆星外殼的動能轉化為熱能向外爆發後,根據恆星質量的不同,內部區域可能被壓縮成白矮星、中子星或黑洞。

    ④天狼星又名「狗星」(Dog Star)。

    不只是埃及這樣稱呼它,包括古中國、古迦勒底、亞述和阿卡德,甚至北美原住民部落,都有以狗星稱呼天狼星的文化紀錄。這是相當重大的事件。'
