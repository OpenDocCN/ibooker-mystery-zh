    # 奇遇


    ## chapter1


    關於這個故事，Ra 一開始覺得除了「瘋狂」之外不做他想。這並不尋常。就算跟多數真相揭示的方式相比，還是極不尋常。因為他生性多疑，經過那麼多年都不去說這段奇遇故事，對他而言並不困難；畢竟那太瘋狂也無從證明。但這正是說故事的樂趣。


    反正他早就瘋了。以任何社會標準來看，Ra 在這段奇遇之前早就發狂了。當時，他住在伊維薩（Ibiza）這座地中海島的荒郊野嶺，過著極為孤獨的日子，但他毫不在意。他逢場作戲；也不去想自己經歷的一切，因為那太駭人。他裝作自己早已失去，無論那代表什麼。他時值中年，對於事物的運作也明白得夠多。關於自己的瘋狂，讓他意外的是其實那非常具娛樂性。縱情瘋狂，徹底擺脫定義西方文明的一切，是發生在他身上最好玩的事。


    那是 1987 年 1 月 3 日。Ra 住在一處被當地人稱為「ruina」①的廢墟。數百年前建造的這幢破屋，前面有一窪乾涸的池子和一口舊時的水井。原本的前門和房子的大部分結構早已崩壞，只有一個入口及一條拱道，通往現在看來似乎是院子的地方。約莫兩百年前的住戶把水用光了。在過去，一旦你把水用光，就不可能在這樣的住所過活。


    你無法種植任何東西來謀生。這棟建物的屋況隨著時間緩慢惡化。1984 年時，Ra 首次看到這座廢墟，當時他向產權所有人承租位於廢墟下方，名為「C''as Coxtu」的主屋。那是他在開始荒野生活的幾年之前。地主過去曾把廢墟轉為主屋的某種客房，是個簡樸、小巧的封閉處所。原屋唯一保留下來的就只有這間房。其餘部分皆化為殘壁。房子看來不怎麼樣，但還算實用。


    Ra 有個英國詩人朋友，曾經沒有棲身之處。Ra 跟他說可以來那座小廢墟住，那時他自個兒仍住在租來的主屋。不久之後，Ra 從自己的生活出走、拋下一切，而詩人朋友則給他報了恩。有天，詩人來找
    Ra，跟他說：「我有個地方給你住。你應該真正地遠離現實。你身處世俗太久了。何不過來住在當初給我的這座廢墟呢？反正我得回英國去了。」而這，就是 Ra 最後踏入那奇異之處的緣由。


    這廢墟有扇巨大的木門，得用十九世紀那種非常古老風格的大把鐵製萬能鑰匙打開。早在 Ra 知道伊維薩島這地方之前，他一天到晚塗鴉。而他最常畫的就是這把鑰匙。一次又一次反覆地畫。在他女兒出生的那段期間，他都畫在日記裡。那是他生命的圖像日記，沒有隻字片語，裡頭都是塗鴉。每一頁都畫有這把鑰匙，而後來，他手上拿著這把鑰匙，在只有用這鑰匙才能打開的房間裡生活。


    ❶ ruina 是西班牙文的廢墟。


    天色漸暗。時間不算晚，但一月的伊維薩島天黑得比較早。Ra 正在回廢墟的路上。他剛被招待完免費的一頓飯，這對他總是一大樂事，畢竟那些日子裡他不太常進食。他身上幾乎只有肌肉和骨頭，沒有太多其他東西。當地有對荷蘭夫妻，著迷於
    Ra 的人生，儘管有些人認為 Ra 根本是惡名昭彰，甚至危險。他們單純被 Ra 吸引，所以一星期會去接他一次。他們把他帶回家，打開錄音機，然後讓他講話。Ra
    會聊他的過往經歷，接著這對夫妻會給他一頓美味的午餐、一些西班牙幣，再送他回家。這讓他得以過活。


    那特別之日的早晨，他的嘴巴因為牙疼而痛苦不已。荷蘭夫妻為他做了些順勢療法，但那對他沒什麼作用。然後他們載他回到最靠近廢墟的大路旁。他開始走上山坡，從馬路沿著小徑，拖著疲憊的步伐往廢墟前進。而他那頭半野生的狗兒大麥·巴克，聞到他的氣味，就從山上跑下來迎接他。大麥十分凶惡。牠是天生的殺手。牠有個從不餵牠的主人，畢竟主人自己也沒食物可吃。大麥得自求溫飽，所以牠會去獵羊。牠在出生後兩天認識了
    Ra，是朋友的女兒送他的。狗兒認得他的氣味也喜歡他，但牠不怎麼喜歡其他人。牠獸性十足。Ra 曾在某天，眼看牠在一場狗架中幹掉了另一隻狗。Ra 一踏上通往廢墟的小徑，大麥就感應到他了。當時
    Ra 的生命和動物有著深刻的連結，所以，在大麥過來打了招呼後，他們開始一同朝廢墟走去。


    廢墟只有一個房間，非常簡樸，而且也許只有 12.5 公尺大。房裡有個平台, Ra 就睡在上頭。只要一開門, 立刻就能看到平台。裡頭還有一張用磚頭堆疊並鋪上木板做成的桌子,
    以及一把椅子。有一面滿是架子的牆; 牆的左手邊擺滿各式各樣的書, 而右邊則是瓶瓶罐罐的草藥植物。這些都是他那位詩人朋友的。屋內還有一些當地的法籍藝術家帕斯可製作的面具。他以前也製作蝴蝶吊飾在市場裡販售,
    他那裝滿材料和工具的箱子同樣也在屋裡。睡覺用的平台上方, 吊著一盞完全乾枯的煤油燈。要取得煤油得去到島的另一邊。但 Ra 既沒錢也沒交通工具, 所以除了偶爾點燃的蠟燭之外,
    廢墟入夜後總是一片漆黑。Ra 是牡羊座, 而他也把生活過得像羊一樣。日出起床, 日落睡覺。而這也是他在走回廢墟時打算做的, 睡覺。


    廢墟就在眼前, 有光從門底下透了出來。當一人一犬抵達、看見門底下的光時, Ra 覺得滑稽。就是種古怪的感覺。確實, 在那道光映入眼簾之前, 他就已經感受到胃部肌肉的緊縮,
    他也知道狗狗同樣覺得干擾。大麥通常會在前頭領路, 但現在卻躲在他身後。廢墟的鑰匙只有 Ra 手上這把, 其他人不可能有這麼古老的鑰匙, 而門是鎖著的, 沒有別條路可以進到屋子裡,
    何況根本不會有誰這麼閒閒沒事幹。畢竟他被認為是當地的瘋子。沒有人會想靠近他。這真的很詭異。


    黑暗已將夜幕完全調黑, 萬千星光開始在天空閃耀。現在, Ra 離門非常近, 並對著門大叫。他喊出極具諷刺意味的「誰在那? (Who is there?)」但沒得到任何答案。廢墟位在山丘上，下面是山谷。另一側則是群山環繞。那一刻，在黑暗之中，伴著那道門下之光，他聽到自己的聲音透过山谷迴盪。「誰在那裡？」（Hu
    在那裡。）❶


    他緊張地把鑰匙插進門裡。而接著發生的事情並不是循序相繼的。那是某種整合在一起的動作，他在後來可以將這一切拆解成好幾部分，但那和他所經歷的並不相同。他開了門鎖，用手將門往左推進屋內。煤油燈被點亮並沿著他的床順時針轉動。這是他注意到的第一件事。就在同時，他的狗兒大麥跨過了門檻。當他也這麼做時，他覺得就像被近距離開了槍一般。突如其來的壓力湧入
    Ra 的腦袋，在壓力之中，Ra 聽到了一個聲音。那並不悅耳，像是個帶有菸嗓的 155 歲老女人的聲音。那聲音黑暗、嚴厲、冷酷且嚇人，還帶有 Ra 搞不清楚的智慧韻味。


    當他聽到那個聲音——在狗兒攤垮在地而提燈不斷盤旋時——他的身體轟然出水。水從他的頭部、手臂、腿和股溝噴湧而出。地板上有一大灘體液。這種超速脫水的身體感受極為痛苦。而伴隨著痛苦出現的，是那個聲音。它說：「你準備好工作了嗎？」


    這可不是個問句。真的不是。狗兒躺在地上的水池裡，聲音下了「把狗移開」的命令，所以 Ra 把狗拖到桌子底下，而牠接下來的八天也都待在那兒。這段期間大麥動也不動，牠看起來也沒在呼吸。接著，Ra
    把門關上。'
