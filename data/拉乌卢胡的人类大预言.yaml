    # 班與圖，以及宇宙的起始


    太古之初，起始之前，有二存在。

    其各有名。

    萬物皆有名。

    一為班（Bhan），一為圖（Tugh）。

    乃與未知相接之唯一紐帶，

    不可知也。

    其餘之物，萬物皆餘，均在其外。


    班來自於外，圖則為一卵。'
  - '[PAGE 70]


