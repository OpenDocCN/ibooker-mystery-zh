- md: '## 伽利略衛星木衛二


    木衛二是顆卓越、絕美的木星衛星。它的表層之下是凍結的水。與木星相比，木衛二尺寸很小。因為木星的電磁連結以及重力影響，水晶束與外鞘抵達這兒後，會與木衛二保持平行。它將在這裡停留很長一段時間。水晶束將隨著木衛二而運轉，某程度上可以說，它在繞行木星的眾多週期裡，都會待在木衛二的陰影處。聲音有提到，它在這一回合結束後，將花上二億年來重組生命、重組意識場。換句話說，會將意識水晶放回到自我觀照的形體裡頭。


    將近二億年的空無。但那不重要，這只是個笑話。並沒有誰會去關心或等待。直到某一刻，當程序進展到對的地方與時間，它就會突然出現。突如其來地，這些意識水晶帶著所有的可能性、搭載它們的本質軟體，就這麼得到了嶄新的硬體，並開始末期程序，而這得再多花上二億年。畢竟這個宇宙、這個孩子，是個巨大的實體。


    水晶束邊跳著繞行木星的無盡之舞，邊接收殘餘的電磁場。在木星這個環境中，也能發現人類轉世程式中發生的一切。這段舞蹈將形塑出獨特的未來。因為梵天之夜的空無也是一種承諾。


    它對於空無渾然未覺。是外太陽系在為未來做準備。我們現在還活在「表揚與送金表①的時間」裡。


    「十分謝謝你，但我們已經有新的機型了。再花個幾億年就能準備就緒。天啊，到時候一定酷斃了。」


    我們正在建造一種不可思議的意識體，而這個程序相當浩大。請記住，如果未來（的物種）不是生物型態，那麼它就不能指望藉由突變來彌補糟糕的工程。它必須設計得宜。形體原則必須正確產生，為此，就得花上數億年做準備。


    我們正朝三重結構的水晶規格發展，那是搭載三顆水晶的載具，其中之一是來自哺乳類層面。在人類與哺乳類動物之間已發展出非凡的關係。雖然牠們在許多方面看起來比我們劣等，尤其是在自我觀照意識這部份，但牠們所學會的那與環境共處的能力，對於未來至關重要。我們不懂哺乳類進化的更深層目標是什麼，聲音也沒告訴我們，但其特殊性相當明顯。


    聲音說，哺乳類的個性水晶和人類的個性水晶完全相同。其中的一個徵兆，預示了與哺乳類的關係的變化，那就是2027年之後19-49通道被打破這件事。我認為，在那之後，將會有龐大的業力懲罰降臨在那些殺生者身上。可能必須付出代價。


    我們現正確實經歷的，是宇宙整體的大腦建造工程。這是令人驚嘆的事情。我們是整體的身體意識、是身體智力。這個宇宙是個成熟的載具，但尚未出現在它所屬的世界。這全都是創造單一、龐大的自我觀照意識的一部分。


    在這回合的尾聲到來時，大部分的個性意識水晶將永遠不會離開梵天之夜。它們永遠不會再次轉世，因為投胎的席次有限。只有特定的個性水晶可以取得門票，它們也不會都是人類水晶。至於那些沒有票的水晶又會如何？對它們來說没啥差别。能够明白自己在万物的运作中所扮演的角色，是种恩典，光是得以见证，就已是美好。我们是带有心智的生命，要应付头脑真的是件苦差事，但如果能将心智衔接上这份美好，我想，真的很难蹒跚回头，去继续当个荒唐傻瓜了吧。


    ## 再造重建


    天衛四及


    天衛四在太陽系裡極為與眾不同。天王星的所有衛星，都是以莎士比亞或亞歷山大·波普❶的作品角色命名。天衛四（奧伯龍，Oberon）是莎翁戲劇作品《仲夏夜之夢》中的精靈王。就連天衛四上的諸多地方也都是以莎士比亞劇作的角色為名❷。這是我們太陽系中最沒規則的反常天體命名法。我們在前面有提到，歷經了這麼長的時間，這是水晶束初次呈現出截然不同的配置。事實上，某些分形隨著太陽結構水晶的剝除不復存在。


    在未來的幾百萬年裡，水晶們會沿著與木衛二平行的軌道來繞著木星轉。而梵天之夜就是這段為了重建的預備時間。在這個過程裡所發生的事情，沒有任何人能夠掌握。此外，在一段長達一百五十億年的過程裡，梵天之夜的二億年不過是打個小盹而已。總之，重要的轉型正在發生。伽利略衛星們正是為此而推移著訊息。整個過程需要二十億年，但這些衛星不會走完全程。接著，我們也能開始看見太陽的死亡。在死去時，它會吞食木星的內行星與衛星。這也是訊息得花上二億年沿著木星的軌道來傳遞的原因。


    分形線是一種階層結構。每當基礎元件進行了淘汰或轉換，分形就會被重新定義。在這樣的活動史當中，有個獨特而離奇的狀態。有一百四十億年之久，中心水晶總都是跟著水晶束的遷徙而動。


    但它們將不再這樣前進。它們將被棄置並且煙消雲散。


    「中心」不復存在。一種新的階層會被建立。在 140 億年的時間裡，永遠都有主要的中心分形線，因為中心並非在正中央，所以分形有長有短。水晶束正在重新排列，但我們不知道箇中奧妙。當你從梵天之夜醒來，將會上演一部嶄新的電影，但意識水晶無法停留在此。那是該啟程的時刻。像這樣的事件只會以暴力行為觸發。水晶束會因為某種碰撞，被送上它的最終旅程。它將前往天王星的主要衛星之一：天衛四。


    關於天王星的衛星，前面的章節有提到，在海王星進入我們的太陽系時，它撞上了天王星。而天衛五③這顆天王星衛星，看起來就像是拼貼在一起的補丁。事實上，它是我們太陽系裡最不尋常的其中一個天體，因為這顆衛星由三種不同


