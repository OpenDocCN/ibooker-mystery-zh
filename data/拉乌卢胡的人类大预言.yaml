    # 策劃人序


    # 每個獨特的知識，

    總有它的獨一無二故事


    人類設計（Human Design，下稱 HD）的故事，不管從哪個面向切入，都非常引人入勝，因而這門學問從問世以來，在全球掀起了一波學習、探詢與實驗的風潮。不管你知不知道、相不相信
    Ra 接收 HD 訊息與宇宙奧秘的奇遇，這套知識卻是真實存在，並全面展現出經得起測試的完美可能。


    本書發行的緣起與過程蘊含著滿滿的故事。作為策劃人，能順利推出中文版，要率先感謝故事的主人翁、也是故事的傳訊者—人類設計系統的創辦人—拉．烏盧．胡，沒有他，這套學說不知何時才會出現，甚至沒可能出現。


    第二位要感謝的是作者史提夫．羅德斯老師。任何跟金錢或名譽沾上邊的事情，總有它的 drama。若非因際會使他離開原本所屬的體系、並創立了既傳承又嶄新的獨立學派，這本書同樣可能只會石沉大海。


    而特別要鄭重感謝的，是推動史提夫老師著作中文化的前策劃人，也是我已故的閉門學生及戰友冼耀華先生（朋友喚他 Simon，HD 同修叫他 Mensa）。沒有他的認同與支持，我也許還只是香港的一個
    HD 小小分析師，不可能為人生描繪出更美的生命藍圖，不停地擴張直至今日。


    包括史提夫老師著作及網站的中文化工作，一直由 Simon 負責；奈何天妒英才，他在系列書籍中文化的過程中病逝。而後，史提夫老師對 HD 知識有了新的發現與見解，不但撤下早前發行的《班圖》及《人類設計：解讀之道》二書，也重新編輯這本「預言之書」，並撰寫了更為宏大的班圖新學說《The
    God Code》（暫譯：神聖密碼）來體現突變的本質。


    過去兩年，我持續協助班圖網站的資訊更新與書籍中文化的工作，會這麼做除了契合對於推廣 HD 多元知識的自我期許，也是為了完成 Simon 的夢想；即便工作與家庭再忙，手頭資金也不算闊綽，我仍認為這些都勢在必行。


    預言之書終於發行，內容繼往開來，資訊量豐富，相信會是令人滿足的好作品。慶幸這段期間獲得諸多配合與支持，以及《基因天命》譯者之一的 Gwai 從台南幫忙校稿與北上辦理前導宣傳活動。一切付出都是值得的。再次感謝支持我們向全球華人推動人類設計知識的同好與朋友，也祝願大家不論有錢沒錢，都不再輕易被制約，能夠找到自己的豐盛天地，也為社會作出更大的貢獻，謝謝！


    總策劃人


    大中華首席人類設計專家及指導師 // 基因天命亞洲區導師


    Eric Chan 陳冠達


    # 推薦序


    # 你受夠人生了？

    要不試試從宇宙的宏觀角度，

    重審自身存在價值？


    對於有在接觸人類設計的同好來說，又一本 HD 著作的中文版問世，實在是個好消息。因為這本涵蓋了過去、現在、未來以及很久很久以後的未來的預言之書，是再開啟另一段新鮮旅程的契機。


    出自跟著祖師爺學習人類設計七年之久的學生 Steve 之手的這份紀錄，為讀者揭露了人類設計課程《宇宙學》的諸多奧祕。全書呈現出的奇幻與現實，在協助校對的過程中，不斷帶來又驚又喜又困惑的衝擊，讓我屢屢放下書稿，拿出筆記本塗塗寫寫，甚至討教
    HD 專家，試圖釐清那些乍看簡單卻充滿複雜細節的內涵，來累積我對人類設計的認識，並修正我過往以為的「事實」。我認為這是本書的最大魅力。


    正因如此，我覺得預言之書對某些朋友可能會是一本不太容易親近的讀物。畢竟行為經濟學理論派對人類心智的定論是：「人類是那種會優先處理較近未來的事，而非較遠未來的事的物種。」


    也就是說，比起因為讀了這本書而知道 2027 年 2 月開始將陸續誕生在地球上的銳（Rave）的模樣，乃至幾十億年後的物種玉龍（Eron）有多完美等知識，相較於我們現在要怎麼活得快樂？該如何找到自己、進而愛自己？之類的「現實問題」，感覺起來並不是太重要的事情。


    所以，我在三月中旬應人類設計同好邀請而辦理的本書發行前導活動中，跟與會的朋友分享道：這是一本「有答案、但答案和你不太相關」的故事書。


    這不是說這本書不具可讀性，只是如果你打開、閱覽這本書的出發點是「想搞定自己」，那這本書也許不是你企求的「解決之道」。


    可若是你所進行的人類設計實驗，正因為過度聚焦在自己身上而遇到某種瓶頸（對，沒人跟你保證過「做自己」人生就會從此高枕無憂一帆風順），想要從另一種角度來思索人生意義，那麼，翻看這本宏觀談論宇宙運作機制的預言書，可能就是某種解套。


    人類設計這門學問關注的真的不只是個人層面的議題，讀了這本書，你會知道宇宙是如此之大、如此不可思議，且以「億」為基本單位在運作的整個演化機制期程是如此綿長。相對之下，你我所棲身的這副僅能存在八十餘年的區區天王星身體所主演的電影，對宇宙總體來說真的是一眨眼的事。而對你十足重要的喜悅、煩惱、憤怒、執著，某程度上，其實也都不算什麼了，不是嗎？


    Steve 在本書舊版中有段作者後記（中文版所依據的原文版本裡並未收錄），我特別喜歡他所提的一段話：


    > 許多人在把人類設計摸得滾瓜爛熟後所犯下的最大錯誤是：他們認為自己知道自己是誰，明白自己的可能模樣以及將臨的未來景況。但真正覺醒的人從不知道自己的真實樣貌，他們不會拿腦袋用來自我描繪的術語去定義自己。人類設計如同世間其他的知識、真理乃至尋常資訊一般，會不斷透過不同分形線上相異的水晶過濾並加入特定訊息而流竄，是不斷變化的智慧。


    你今天懂很多，不代表你真的認識自己，既然不可能完全認識自己，那好好的、慢慢的、以各式各樣的方式做實驗，大概就是這一輩子都得繼續的旅程。意識水晶進駐於我們體內，你我也會跟著進化，無需自以為是、不用跟別人比高低，敞開胸懷迎接各種可能性（再好好篩選什麼適合你、哪些不OK），這就是完美，這就是做自己。


    感恩祖師爺傳遞了 Human Design 的智慧，謝謝 Steve 以自己的方式分享了獨特的資訊，也恭喜 Eric 完成了本書中文化上市的目標，還要感激在校對期間提供專業意見的朋友們以及辛苦的譯者，更要祝福拿起、購買這本書的有緣人，願你能盡情享受這本書帶來的樂趣，從中獲得生命的智慧！


    《基因天命》譯者、本書審定校對

    deeps gwai 1/3 生產者


    # 推薦序


    # 一個傳奇的誕生！

    人類設計尋本溯源必讀


    感謝 Eric 老師繼《基因天命》後再一次將善知識帶給華文世界。Steve Rhodes 老師的 The Prophecy of Ra Uru Hu 原版面世時我就在亞馬遜入手了，卻非常慚愧沒有讀完。後來立心翻找祖師爺
    Ra 的歷史並進行中譯時借用當中一小段落，並成立《人類設計譯史館》（https://medium.com/humandesignhistory）這個小園地意圖讓大家了解更多人類設計歷史。但要探究最原始最精深的內容，當然要讓專業的來。


    這本由 Eric 老師策劃，Deeps Gwai 監修的巨作由決定出版到面世，勘誤和推敲原文的功夫絕對不會比《基因天命》少，期間團隊更多次向 Steve 老師進行確認務求達致最佳演繹，絕對是心血之作。Ra
    的天啟經歷是癡人說夢還是真有奇事？由 Ra 的入室弟子 Steve 老師將此段奇遇娓娓道來絕對是最適合人選。


    除此以外，Steve 老師亦將自 2003 年開始直接跟隨 Ra 學習以來所得毫無保留地與大眾分享。這絕對不是「一本讀懂______」類型的著作，卻能引領大家了解人類設計當中更深入、更廣闊的面向。例如家中寵物有沒有人類設計架構？人類設計談死亡是什麼、2027
    年後將何去何從……這些或多或少於各派不同人類設計課程曾經談論的內容在書中都有涉獵，相信能滿足對人類設計知識有進一步追求的讀者。


    最後感謝已故香港人類設計學會副主席 Mensa 思聞老師，是他帶領我們認識 Steve 老師的學習系統，開啟我們的眼界。願你在天家安好。


    總策劃人

    《人類設計譯史館》主理

    Daisy Maris Fung 5/1 執行者


