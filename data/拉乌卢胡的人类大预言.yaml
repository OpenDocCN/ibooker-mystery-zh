    ## 2027 及以後


    # 九中心過渡形體


    1781 年以前，人類擁有七中心的程式，那是七個印度脈輪的佛陀體。地球上沒有其他物種以如此快的速度，經歷這麼多的演變。我們是極具突變性的生物。以七個中心構成人體圖，曾經只有五中心，更早之前則是三個能量中心。七中心人算是某種「完美」，而九中心的存在則是「潛力」的設計。


    智人這個物種在 1781 年走到終點，現在的我們處於過渡期。這正是日子為何如此艱難的原因，但也帶來某些從未存在過的事物：


    如果你觀察所有的宗教信仰，全部都屬於七中心人。對於九中心人而言，它們不再占有一席之地。我們都受制於七中心的歷史。譬如道德準則，以及那些是非對錯的基本主題。它們全都發展自七中心的「單一世界」，突然間，你來到
    1781 年，英國天文學家赫歇爾爵士首度發現天王星，這是一場神信仰終結的開端，也讓追尋合一的七中心之旅邁向終點。


    從往昔至今，我們仍保有的是心智的力量，但擺脫腦袋的時機即將到來。


    銳會大大受到感受中心①的影響，對他們來說那就是一切。而我們則必須將自己解放出來，不再只是一種不復存在的形體的劣質複製品。心智真的不再是重點。


    過渡期的形體得要同時服務兩種存在、兩種相異的物種。認真一想，這個形體實在太無與倫比了。它在過去就這樣存在了。我們一直擁有這樣的過渡形體，讓新形體能從舊形體中現身。


    ①感受中心：即人類設計系統中的 Solar Plexus Center，另譯為太陽神經叢或情緒中心。


    2027 年時，銳將從我們的過渡期形體中誕生。這帶給我們巨大的機會，也在我們面前設下巨大的阻礙。真正的人類已經不在了。想想在 1781 年之前生下來的最後一批七中心設計的寶寶。這是不久前的事——他們當中的某些人已經活到
    90 歲——世界上仍有他們的身影。而隨著 2027 年一日又一日地逼近，我們所運作的這個形體也不斷發生改變。


    負責這個機制的主要是冥王星。冥王星不太一樣，它並不在太陽系的行星家族中。它是個推進器，推動這個逐步變化的過渡期。它一步步地打開銳的可能性，並減弱人類的潛能。它是偉大的冥界之神。能領受這位「閉門者」的力量，是一種恩典。這正是
    Ra Uru Hu 的「Hu」的意涵。這個頭銜由聲音授與 Ra。「Hu」就是「閉門者」。門可以很完美地關閉，因為隨著我們愈加靠近，事態也將陸續明朗。冥王星是
    1781 到 2027 年這段轉換期的推手，推動以感知為基礎的新型態意識誕生。它正在等待發光發熱的一刻。


    我們將有 1300 年的時間，有兩種不同的生物共存於這個層次。在全盤理解的可能性實現之前，你無法將門關上。但這並不表示每個人都做得到。這不可能發生。總是有某些分形可以達成，而有些則被拒之門外。


    為了在 2027 年發生突變，人口大爆炸是必須的，但人類個體不會因此受益。另外還有溫室效應。這些都是必要條件。我們是為了意識的進化而存在——沒有選擇。自閉症和攝護腺癌是突變發生所導致的副作用，所有的犧牲都是為了轉化。


    當銳孩童出現，他們都會基於感知來決定優先次序。銳將進入你我全然未知的世界。雖然我們也身處同樣的地方，但就維度來說，我們是活在截然不同的世界。


    當 2027 年到來，有兩個議題需要面對：首先是我們自身的責任，再者，是以人類物種的身分，正確地把門關上。我們的責任是以利他主義的犧牲，來支持那些要取代我們的銳的誕生。當我們回顧所處紀元的這最後
    300 年，會發現這真的很特別，可以視為人類之門被關上的時期。1781 到 2027 年是一段極為特殊的時間，將由沉睡的鳳凰十字（Cross of the
    Sleeping Phoenix）完結。


    我們站在某種深奧事物的邊界之上。初始的階段已經結束，在 2006 年之前出生的人會逐漸消逝。這個過程緩慢，但已是進行式。我們在 2027 年會跨過分界線，再也回不去過往。現在每個人都擁有某種美好，但當週期轉換的震動發生時，也會出現許多醜惡。有許多人將為此受苦，但也會有人因而成長茁壯。


