    # 訊息之流


    一切都是從一顆微中子穿越一個意識水晶開始。什麼是微中子呢？那是一種具有質量的極微小粒子，以近乎光速的速度移動。它們穿透萬物：行星、人類，甚至是一面厚達好幾光年的鉛牆①（如果這種東西存在的話）。但因為微中子帶有質量，它們也和所穿越的物件交換訊息。它們的振動是會改變的。


    星星會產生微中子，而我們的太陽則提供地球上百分之七十的微中子。與太陽垂直的每一平方公分，每秒大約有 650 億個太陽微中子穿過。微中子是訊息的攜帶者，它們帶著訊息穿梭宇宙的每個角落。它們並非亂無章法地與萬物接觸，而是透過一種特別的秩序——你或可稱之為階層——讓訊息在宇宙間流動。這就是水晶能彼此溝通的原因。藉由穿透它們的微中子，水晶持續接收並傳送訊息。我們也將這些階層稱為分形線（Fractal
    Lines），這和兩顆水晶如何從宇宙大霹靂及宇宙的誕生（班 [Baan] 和圖 [Tu]）有關。如果你'
