  md: '一個墨西哥因地震被埋在瓦礫中的孕婦，她子宮內的孩子，帶著一顆水晶。那不是尋常人類會有的水晶。而在奇遇歷程中出現的那個英國訪客，則是個送貨員。在他覺得被強逼回伊維薩島完成任務之前，一定是從法國的某個人身上收到那道光。他們都在別無選擇的情況下，被抓進這齣戲裡。


