- img_proc: true
  md: '「中心」不復存在。一種新的階層會被建立。在 140 億年的時間裡，永遠都有主要的中心分形線，因為中心並非在正中央，所以分形有長有短。水晶束正在重新排列，但我們不知道箇中奧妙。當你從梵天之夜醒來，將會上演一部嶄新的電影，但意識水晶無法停留在此。那是該啟程的時刻。像這樣的事件只會以暴力行為觸發。水晶束會因為某種碰撞，被送上它的最終旅程。它將前往天王星的主要衛星之一：天衛四。


    關於天王星的衛星，前面的章節有提到，在海王星進入我們的太陽系時，它撞上了天王星。而天衛五③這顆天王星衛星，看起來就像是拼貼在一起的補丁。事實上，它是我們太陽系裡最不尋常的其中一個天體，因為這顆衛星由三種不同


    +   1. 亞歷山大·波普（Alexander Pope）是 18 世紀英國最偉大的詩人。天衛一（Ariel）、天衛二（Umbriel）、天衛十四（Belinda）都是出自他
    1712 年所寫的諷刺詩《奪髮記》（The Rape of the Lock）。

    2. 包括《羅密歐與茱麗葉》、《馬克白》、《奧賽羅》、《哈姆雷特》等莎劇中的角色名稱，都被拿來命名天衛四上的深谷與撞擊坑。

    3. 天衛五（Miranda）是天王星主要衛星中最小並位於最內側的衛星，在 1948 年被荷蘭天文學家古柏（Gerard Peter Kuiper）發現。'
