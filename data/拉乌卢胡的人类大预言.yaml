  md: '導那些年輕人宇宙的歷史，也只有自我中心（Ego）有定義的人會企圖用四個月辦到這件事。所以，當我開始一面經歷這個過程時，另一方面的我，則是這輩子首度接觸神祕學著作。


    我的業力以愛麗絲貝利①的三本書作結，被稱為藏人與神智學社會（Tibetan and Theosophical Society）的這些書，是十九世紀的神祕占星學，企圖整合基督教與印度／婆羅門神祕論，並想方設法將它們結合在一起。那些語言對我來說相當困難。那是複雜而麻煩的文字風格。我是個喜歡簡單事物的人。我討厭那些難搞的、只陶醉在自己喋喋不休的嘮叨裡，卻又無法帶你走向何方的東西。他們就只會帶你繞圈圈然後對你說：「喔，如果你是『九地善慧②』的學生，就會了解這個概念。」然而，裡頭還是有一些微小的寶物，就是他們所呈現出的創造的程式。我沒有進食，也沒有真正睡著。


    ①愛麗絲貝利（Alice Bailey）生於英國，是十九世紀率先使用「新時代（new age）」一詞的神智學作家。著有二十餘本探討靈性與宇宙間的關係的著作。據稱她的大部分著作都是由稱為「藏人（the
    Tibetan）」或「D.K.（Djwal Khul）」的智慧大師透過心靈感應傳訊所得。Ra 會接觸到這些書，應該與他進行宇宙史的教學有關連。


    ②依據《華嚴經》所述，佛教徒的修行覺醒共有十個層級，第九地（ninth level）被稱為「善慧（Good Intelligence）」，意指對於教義的各個面向都有完美無缺和非常廣泛的理解，也可以無礙地為人說法。'
