  md: '們就不能指望藉由突變來彌補糟糕的工程。它必須設計得宜。形體原則必須正確產生，為此，就得花上數億年做準備。


    我們正朝三重結構的水晶規格發展，那是搭載三顆水晶的載具，其中之一是來自哺乳類層面。在人類與哺乳類動物之間已發展出非凡的關係。雖然牠們在許多方面看起來比我們劣等，尤其是在自我觀照意識這部份，但牠們所學會的那與環境共處的能力，對於未來至關重要。我們不懂哺乳類進化的更深層目標是什麼，聲音也沒告訴我們，但其特殊性相當明顯。


    聲音說，哺乳類的個性水晶和人類的個性水晶完全相同。其中的一個徵兆，預示了與哺乳類的關係的變化，那就是2027年之後19-49通道被打破這件事。我認為，在那之後，將會有龐大的業力懲罰降臨在那些殺生者身上。可能必須付出代價。


    我們現正確實經歷的，是宇宙整體的大腦建造工程。這是令人驚嘆的事情。我們是整體的身體意識、是身體智力。這個宇宙是個成熟的載具，但尚未出現在它所屬的世界。這全都是創造單一、龐大的自我觀照意識的一部分。


    在這回合的尾聲到來時，大部分的個性意識水晶將永遠不會離開梵天之夜。它們永遠不會再次轉世，因為投胎的席次有限。只有特定的個性水晶可以取得門票，它們也不會都是人類水晶。至於那些沒有票的水晶又會如何？對它們來說'
