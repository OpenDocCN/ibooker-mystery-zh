    梵天之夜是重返空無，回到虛無。某種意義上，甚至是超越虛無的。我們對此並不熟悉。這具有可怕而恐懼的風味。每個孩子在沉思自身的死亡時都會感受到這種空無。每個小孩都會在某個時刻進行這種探索，也終會走到因為理解不了虛無而覺得奇怪的境界。有些孩子會被嚇壞，有些則是因此而興奮激動。我不認為有誰可以真的領會到，在梵天之夜這樣的空無中，到底會發生什麼事。


    我們離未來越近，就越能感受到自身的無力程度的高低有多少。某些事情會被揭曉，讓我們好奇箇中意義究竟是什麼。未來在現在不過是個故事。就只是故事而已。答案只能靠時間來證明。


    極有可能會是一顆流星在這回合的尾聲終結地球上的生命。介於火星與木星間的小行星帶，宛若失敗的原行星①的集散地。那兒的天體數量多得驚人，而且有好幾顆的尺寸相當巨大。有專門的科學家試著盡可能地追蹤這些小行星，但這是個沒有希望的任務。問題在於這些小行星不斷地互相撞擊並因此改變軌道。因此，要追蹤可能成為行星殺手的天體，其實非常困難。那就好似一張巨大的撞球檯上有著數不盡的球。你幾乎無法做出預測。


    這個小行星帶中，有個區域十分接近我們。


    它被稱為近地球小行星群（NEAs, near-Earth asteroids），這些星體的軌道與地球軌道相交。因為它們的尺寸十分接近我們的太陽系大小，我們所能發出警告的實際時間真的相當短。有許多人的試著對太空中的所有天體進行編目以便進行追蹤。我們一直都知道這對我們相當重要。就拿恐龍來說吧。牠們是地球這個巨大的爬蟲類異世界的主宰。其他一切生物型態都得倉皇藏進暗處來躲避牠們。接著,突然間一顆極為帶勁的隕石從天而降並引發了核冬天❷,太陽被封住好幾年,因而恐龍這些冷血爬蟲類就死光了。就像這樣。就是這部電影,而劇情並不新鮮。這就是故事的進展,這就是突變的運作方式。你可曾看過銀河星系互相撞擊的精采照片?難以置信對吧!這是個龐大的突變程式。從我們的觀點來看,那好像頗為粗暴,但看看你身體裡的T細胞❸,不也是攻擊並侵入微生物,再將之生吞活剝嗎?外太空有顆標示了我們的號碼的隕石在等待著。它就坐落在那些區域之中。


    關鍵從來就不是假如。而是何時,根據聲音的說法,關於何時發生有個時間框架。但我們從未沒被告知精確的年月日。當隕石接近大氣層時，若能親眼目睹其熾熱、光芒與聲響，我猜那會相當奇妙。能見證萬物的脆弱與生命的易損真的頗有趣啊。這是突變的一大步。


    行星的撞擊將會驅逐設計水晶束，如同字面一般，將它扔出地球、扔到大氣層之外。人類的死亡是：設計水晶和磁單極匯合後一起離開人體，而行星的死亡模式也如出一轍。


    當設計水晶束離開所在環境，對於生命的所有支援都將喪失。這樣的解雇並非自願。畢竟少了保護不可能感覺舒服。這就是設計水晶束棲居於地球的地幔深處的原因。所以，在它離開地球時的情況會是：設計水晶束的磁單極把所有的個性水晶束吸引過來，讓這些個性水晶將它籠罩起來。籠罩的發生並非隨機的。磁單極會在特定時間召喚特定的水晶及水晶束。


    離設計水晶束表面最接近的水晶，會是太陰結構的水晶，而在外殼上的最後一束水晶則是太陽結構的。那就像某種進行中的舞碼。


    意識場會移動。宇宙意識的潛在核心是活動的。在過去的 140 億年裡，我們所攜帶的每一顆水晶都已經旅行了好長好長的距離。光是用想的就覺得太了不起了。整個宇宙的歷史就在每個人的體內。它們是一切的見證者。名叫地球的這顆美麗星體只是路途上的一個休息站，是用來休憩放鬆與發展自我觀照意識的好地方。但地球是個暫時住所。有個截然不同的形體將會到來。當我們走到這回合的終點，我們的實驗也就無法再有進展。


    當意識銳伍群發展的時間一到，我們也抵達了生物型態明顯的極限。無論你變得多老練世故，生物型態仍有其問題。它的限制極深。因為有太多工作要進行、有太多部分得運作。它得被餵養又很脆弱，還需要一顆帶有適合生物發展潛能的特別行星。但它能帶給你的也就這麼多而已。有限的壽命一直是生物學的問題。地球上有太多的東西只存在一會兒。死亡就是生物學的核心要旨。生死不斷重複循環。就連摩擦一下手掌，你都會殺死幾百萬顆細胞。我們得要非常專心地觀察並維持生物型態的運作。這也是水晶束必須繼續前進的理由，因為地球並不是能因應未來的正確媒介。


    即將到來的根本不是生物型態，至少不是我們窮盡一切想像所能理解的形體。如同我們所知，這是生命的終結。生物型態有趣的地方在於具有突變潛能。當你離開生物型態，就等於是拋下了突變的可能。這真的值得深思。生物型態有其不可思議之處。持續繁衍的突變在每個世代發生。如果回到二十五億年前、地球上的生命起源之時，你就會知道這花了多長的時間。四百萬年前，我們人類還沒什麼見識，也才剛學會怎麼直立行走。一萬年前，我們終於搞清楚動植物如何成長。七千年前，我們開始寫字。想想看要發展這些自我觀照意識的基底究竟花了多少時間。


    程式說：「好的，我們已經花了二十五億年來做這件事。這相當有意思。沒錯，我們確實獲得了自我觀照意識。非常棒，但我們需要做得比這更好。要更加老練、更有成效才行。」所以，它用了一個非凡的東西來取代突變。那是某種永生不朽。是相對的不朽。不是生物型態，所以沒有死亡。不是生物型態，所以毋須繁衍。它非常不同，超乎地球末日之外，也超乎這一回合的結束。我們來自一個罕見的星球。它有著可供應生物型態需求的特殊環境，而我們要去的地方反而非常普通。可以說在離開生物型態後，我們會變成外星人。當我們抵達這本書所描繪的我們該去的地方時，就會像你所能想像的任何科幻故事一樣棒。


    當設計水晶束離開地球，它會把地球上所有生命的設計水晶一併拉走。萬物會在一瞬間全數死亡。當這件事發生時？哇賽！來討論一波吧！真的難以置信。舉目皆是死亡。不計其數的魚在幾分鐘裡死去。這是生命力的滅亡。這是形體原則的死亡。這條水晶束移動時，便把地球上的所有生命撕裂，在那麼做時，它也將個性水晶層層堆放而創造出一把鞘，作為它在宇宙移動時的保護。


    你必須要知道：一旦水晶離開地球，光就會被關掉。不再有「思考」與「觀看」。不會有硬體、不會有存在、沒有宇宙、沒有獨特的生活，也沒有獨特的才智。


    什麼都沒有。這就是空無。但它並非真的一無所有。因為設計水晶束與它的個性水晶鞘都確實在運動。一切都和活動有關。在設計水晶束的魔力以及它的個性水晶鞘離開地球後，它們會繼續一段彈弓般的旅程。


    這些水晶將繞著太陽走，但它們不會回到起點。你有太陰，然後是少陽，接著是少陰，而在水晶束的外頭，則是太陽結構的個性水晶群。當它們繞著太陽轉並抵達定點時，外鞘的太陽結構水晶會被拉進太陽的核心，待在那兒直到太陽本身死亡時一同消逝。


    結束繞行太陽的行程後，這些水晶會繼續前往木星的旅途。那並非它們的終點站，卻是得要前往的重要地點。我們已經討論過木星以及它的四個伽利略衛星①的重要性，也就是它們與木星的電磁互動所攜帶的一切訊息，運作著地球上的編程機制。


    ①伽利略衛星：木星的四顆大型衛星，是義大利天文學家伽利略在1610年1月7日首次發現，所以命名為伽利略衛星（Galilean moons）。


    ① 一般說法是，恐龍最早出現在二億三千萬年前的三疊紀，並在六千六百萬年前的白堊紀滅絕，應該只存在於地球上一億六千萬年左右。但恐龍的確受到眷顧，因為有些恐龍的壽命長達三百歲。


    ①舒梅克－李維彗星（Shoemaker-Levy）在 1994 年 7 月 16 至 22 日因為木星引力碎裂成 21 塊碎片並陸續撞上木星。這是人類史上第一次直接觀測到太陽系的天體撞擊事件。此外，這次撞擊所釋放能量遠大於人類擁有的核子武器加總的威力，也在木星大氣上留下幾個比地球大上幾倍的撞痕。


    +   ❶原行星(protoplanet)是還未成為真正的行星之前的「胚胎行星」,會透過在運行軌道上的擾動,導致撞擊或碰撞來成為行星。太陽系內較知名的原行星包括穀神星、智神星和灶神星。)

    ❷核冬天(nuclear winter)是關於氣候變化的理論,最早出現在1980年代的科學雜誌,認為核爆後產生的大量濃煙與煤塵將會進入大氣層，並導致非常寒冷的天氣。但這樣的理論在2006年的研究中被認為原始的理論模型有誤。

    ❸T細胞(T cell)屬於淋巴細胞,功能種類多元,在免疫系統裡扮演重要角色。'
