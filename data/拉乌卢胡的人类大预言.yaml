    3. 天衛五（Miranda）是天王星主要衛星中最小並位於最內側的衛星，在 1948 年被荷蘭天文學家古柏（Gerard Peter Kuiper）發現。


    的部份構成。第一個部分看起來跟一般有隕坑的衛星沒兩樣，另一個部分則如海綿一般鬆軟，至於第三個部分，則是某種被淘挖而滿是鼻涕般黏液的斷層泥。這三個部分熔接在一起。要將這些岩石區塊熔在一起，必須要有熱到驚人的溫度，而這樣的事件就發生在
    20 億年前。Ra 被告知說，天衛四和其他的天王星主要衛星都是伴隨海王星而來。它們，事實上曾是尺寸更大的海王星的組成部分。


    天衛四酷寒無比。我們絕對無法承受這樣的地方。


    本質上它和月球很相似。正因為天衛四長得太像我們的月球，所以它有著「月亮的雙胞胎」這個暱稱。它們具有近乎相同的物質、看起來很像，也有著同樣的表面特徵。意識水晶會以此為家達二十億年。與待在地球上的漫長時間相比，這個時期較短。那兒的環境如何其實並不怎麼重要，事實上，那是寒冷至極的地方。形體原則出現在天衛四上是必須的，但它將有所不同。我們對於「何謂生命？」的所有想法都將完結。老實說，我們無法認出玉龍這種新的「生命」形式。你不會知道怎麼辨別。你可以將之理解為一種意識的「科幻概念」，而非生命。玉龍和我們所了解的生命毫無關連。玉龍並不是生物體。或許可以說，玉龍是連線接通而非遺傳創生。整個生命的原則並不一樣。天衛四上的一切，其價值對於人類來說毫無意義。它看起來不是什麼友善的鄰居，也不會是個有任何建設的世界。這是個連表面都不會被碰觸的世界。


    水晶束繞著天衛四運行時，個性水晶鞘將會脫落，在完全打開後，設計水晶束才會進入天衛四的核心。這和我們所理解的意識水晶在地球上的運作結構是一樣的。唯一的不同點在於被建構的形式，因為那並非生物體，所以將會極為長壽。這個形體不只能在接下來的二十億年裡存活，或許能存在好幾千億年甚至更久。


    我們所討論的是一種不會再生的存在。我們對轉世輪迴的既有理解，將不復存在。


    我們沒辦法用「生命」來稱呼這樣的存有。生與死是同一件事，是一體的。我們現在談及的是無生命的。它不是活生生的。只有特定百分比的個性水晶，能開創這趟旅程，並得以進入形體裡頭——這數量很少。其他的水晶永遠無法再次進入形體。它們將處於永久性的非存在過濾狀態，類似環繞著地球的那些水晶束。


    這是為了完成特殊化狀態的長期程序。這些化身為玉龍的水晶都經過了高度的特化。它們在分形上執行這段「壯遊」。自始至終都是。它們在本質上是宇宙整體的設計水晶的基礎元件。事實上，這所有的水晶都是。它們是整體設計水晶的一切樣貌。設計水晶會在這裡鎖定程式，鎖定其載具程序。


    在好幾萬億的水晶中，只有數百萬顆能夠化身入世。大部分的都將無法轉世。但這不代表它們就不具價值。它們將意識場作為特殊的過濾媒介，也始終是不斷進行的程序中的一份子，只是無法真正成為程式的組成元件。它們註定不是玉龍的一部分。


    那是個有趣的過渡動態。首先，水晶束離開地球，接著拋下太陽結構的水晶，這個欠缺中心的長期更迭程序動態，最後將抵達天衛四。個性水晶鞘緩慢展開，然後設計水晶進入，並終於展開浩大的播種催化要事。


    時間決定了我們身而為人的獨特性。譬如，我們的出生時間。因為在不同的時間地點降生，我們也分別與相異的力量進行不一樣的校準。但關於天衛四那不可思議的重建則發生在一瞬之間。一眨眼立即完成。生日只有一個。這才是所謂的同質化、一體化。這是我們難以想像的未來模樣。這些都是一個更偉大的元件中的成分。總體始終大於各部分的總和。我們攜帶的水晶，事實上是宇宙整體的身體智力。它們以光速傳送入宇宙的微中子海，而且永不停歇。整體充滿了它們的程序，等到它們在天衛四上重建時，就會成為究極的雙向道。這個整體，就是我們的身軀。而如果它是我們的身軀，就不僅僅是來移動我們而已。是我們要移動它。是我們我們在維持它。


    會有一批被遴選出來的工作人員，在木星上組織成隊，跟著木衛二一起旅行。那是篩選程序被安排的真正地方。接著，在好幾百萬年後才會建立完備。這是形而上的。到底會如何發生其實難以想像，但的確會在物理世界裡發生。


    這是個真實的程序。只是進行得緩慢，就像冰川一樣。一點又一點，然後就水到渠成。當它們抵達天衛四，就全被安排進這齣舞碼、這場移動裡了。磁單極會將個性水晶釋放至天衛四的重力場裡。差不多就像它們之前將太陽結構水晶送入太陽那樣。正是磁單極與水晶束一起往核心前進的。


    如果你研究人類所有的科幻故事與電影，它們都是人類精神的變形。它們從來就不真的令人感到陌生。因為創作者的想像基礎從來就不是真正的外星人。而當我想到玉龍時，我真的認為那才是異形。那才是像外星人般的外星人。Ra
    曾說，儘管他被傳授了關於玉龍的設計（我們在最後一章可以簡略一探），但他對這個資訊真的無能為力。他說，那場奇遇是段不斷進行的長篇故事。他在第一天被告知了意識水晶的故事。故事從宇宙大爆炸開始，而當講到玉龍這部份時他早已筋疲力竭。但故事就是那樣沒完沒了地繼續講不停。


    Ra 被賦予了轉譯玉龍機制的途徑，但這不代表他知道玉龍的可能樣貌。Ra 的確有看見他們的模樣，畢竟那段奇遇是非常視覺化的。玉龍並不是機器人。在深邃的層次上，他們擁有意識，但他們不會明白自己從何而來。他們全都同時出生，而且擁有新鮮的起始。Ra
    曾說他總是喜愛好故事，而聲音是他所遇過最會說故事的傢伙，所以他樂在其中。


    他就那樣被這個故事的美好淹沒了。


    這是一段奇蹟之舞。不管我們每個人曾貢獻過什麼，都永遠不會消失。我們無時無刻往四處散播能量流。沒有什麼會丟失。


    ## 玉龍


    沒有感覺，危機或變化。沒有飢餓。

    沒有評判、糾正或天賦。沒有味覺。

    沒有開放。沒有內外之分。

    沒有喉嚨，沒有聲音與心智。

    沒有死亡。


    在 Ra 被賦予這門知識時，讓他卡關的是各種形體的設計。不只是聚焦在人類設計上，而是所有其他形體的設計。這也成了啟示的一種模式。一天又一天，有某種形體被呈現了出來。身處於瘋狂的境地，裡頭還有許多瘋狂的課題，著實離奇。被超俗的高等智力不斷灌輸關於幾萬億年後的未來資訊，Ra
    說他真的很難解釋這樣的經驗。而某部分的他，也曾問到：「知道這些要做什麼？」


    但他也從未知道答案。他猜測將會有特定的水晶駕駛這些載具，任何觸及它們的訊息，都會留下實質上的影響，無論這種影響是什麼。開頭的材料是理解現在事物構造的必要因素。但未來呢？玉龍呢？天衛四呢？花兩億年繞行木衛二呢？你只能視之為故事而已。


    根據聲音的說法，玉龍是宇宙整體的基礎展現。我們則是那基礎的構成元件。那個基礎是種單一生命。要用這種說法來理解剛剛講的話，根本就不可能。我們不知道要把這放在什麼脈絡來理解。我們以有限的方式認識「生命」。要搞清楚所謂的「宇宙是『單一生命』，而這個它又不是一個萬物的集合體？」其實不容易。能定義它的不在想像裡面，能定義它的是超出想像的定義。對於總體的定義幻想，真的無法言喻或想像。你可以用「無法穿越的環」這個十九世紀的詞句來稱呼它。


    當我們開始談論、弄清玉龍，我們就開始觸及某個事實。


    為了要讓水晶束離開木衛二，必須發生一個重大事件。這事件相當壯觀。事實上，在微觀宇宙裡，在我們渺小的生命中，我們慶祝它。


    ## 唯一個性進入整體


    首先，你必須了解，當 Ra 初次談及「我們帶有個性與設計水晶」這件事，其實是騙了我們。他這麼做有其目的，我們在先前關於意識水晶的故事章節已經討論過。這兩種意識水晶在本質上都是設計水晶。我們所指涉的所謂個性水晶，只是另一種形式的設計水晶。並沒有真正的個性水晶（尚未出現）。事實上，它們是某種為了讓編程正確的「訓練載具」。這一切全都是為即將到來的整體唯一個性所做的準備。我們所謂的人類個性水晶，是一種設計水晶，它的任務是測試究竟自我觀照意識在形體中是否可行。我們對基礎結構進行測試，所以，當真正的個性水晶抵達玉龍時，它就能擁有可運作的載具。我們是為還沒到來的個性水晶先行卡位的設計水晶，當我們死亡後，會全數回歸為設計水晶。


    在宇宙孩子的微觀宇宙裡，設計水晶的作用是什麼呢？它和磁單極共同運作，創建載具、創建有特殊用途的事物。關於我們的身體這個載具的一切，都是被建造來安置自我觀照意識的可能性，當能夠接收到個性水晶時，這個意識的潛能就會浮現。事實上，這並不只是單純地接收水晶，而是把水晶召喚過來。將個性水晶召來的，是宇宙孩子的磁單極。


    位於天衛四那兒的水晶束算是準備就緒了。就緒意指整體已經準備好接收它的唯一个性。宇宙是一個「它」。我們不清楚「接收」在宇宙的大比例尺上到底會是怎樣。我們一無所知。但某程度上有點像是迷你規模的大霹靂。我們無從得知這會發生在何處，不知道整體將在哪兒被滲透擴散。它將在一種我們無法了解的宇宙規模下，由外向內深入。我們只知道，由此而生的連鎖反應，會把水晶束從木衛二解開，最終並為伽利略衛星帶來毀滅。這將會是一件重量級的大事。當個性在宇宙層次上深入了整體，宇宙本身將會碎裂。這次的碎裂將以難以理解的方式進行。


    以前，設計水晶碎裂後的每一個水晶都長得不一樣，唯有中心水晶的樣貌像是宇宙整體的微觀版本。但真正的個性水晶將會被完美地碎裂。這顆水晶的每一個碎裂面都會是整體的縮影。每一面都是精準的鏡子。它們本質上都會是能量中心，都將被召喚進玉龍這個載具裡。召喚它們進玉龍的，不單單是一顆設計水晶和一個磁單極。那邊會有兩顆水晶把它們召喚進去。其中一顆就是我們以前以為的個性水晶。我們所理解的這些人類的個性水晶，事實上都是設計水晶，之後將會成為提供真正的個性水晶所用的「大腦程式
    (brain program)」的基底。


    每個玉龍擁有的個性水晶都一樣。這是用來創建獨特的整體宇宙個性水晶的機制，且將花上另外二十億年來進行。


    得花上二十億年，宇宙整體才會準備好誕生。誕生成我們不認識的東西。宇宙要經歷的這些個二十億年，就像是人類嬰兒正式誕生的前三個月。


    玉龍是一種（幾近）永恆的形體。它和我們所能理解的「生命」完全不同。天衛四將會成為宇宙整體的腦部核心。就恆星場來說，宇宙整體的這顆大腦十分巨大，且充斥著其對於微中子海的專屬過濾與啟動作用。宇宙大腦的核心、它的中央控制機制會位在天衛四的表面。


    設計水晶並非只負責所屬形體的生命維繫而已，也肩負宇宙整體的生命發展。無論會迎向什麼樣的境界，設計水晶都需要演示其相對認知來供作基礎結構。


    我們所討論的，是宇宙的個性水晶插進我們所發展的集體意識的潛在可能。這些曾化身進人類體內的水晶，也將進入玉龍過日子，它們的這段過程，將會是宇宙整體的物理壽命的重要部分。我們無法明白或理解在「外面」的生命模樣，就如同我們無法想像我們所處的「內部」生命是怎麼回事一樣。這是不可能的。但到底它會是什麼、壽命有多長呢？譬如，一千億年？或兩千億年？但這些真的重要嗎？


    無論它的壽命多長，關鍵都在於載具有沒有可能被好好維護。


    關於宇宙整體的諸多可能樣貌，都將由我們的設計水晶負責過濾（天衛四則會是宇宙的設計水晶核心）。那不會是單純的過濾，而是會影響的過濾。屆時，水晶將會開始對載具採取智能控制。所謂的智能控制，和我們人類受到外在程式編碼控制的經歷與掙扎不同，那不僅僅是執行模式而已。水晶將會變成程式，與此同時也被編碼。


    「冰冷」還不足以形容天衛四上的寒冷程度。那種冷很難在實驗室裡複製出來。天衛四離太陽非常非常遠。就算太陽用其最後的十億年壽命來發光發熱，天衛四的寒冷也永遠不會消失。這是天衛四的絕對本質。沒有哪種我們所理解的生物能在天衛四上存活。我們面對的這顆天體，緊鄰天王星這顆巨星以及其抖動的電磁場。所以，天衛四就是陷在電磁海中的一個凍到極點的地方。


    玉龍是一種四面的軀體，而不是像椎體的那種五面體。更精確來說，它有三個側面一個正面，你可以用人類的一張臉有兩個側面這種方式來想像。但程度上來說，它不是那樣的。玉龍的迴路都是依據側面來運作，並且只會透過正面進行均質處理。你在這個章節開頭所看到的那張圖，就是正面的動態圖。玉龍的「正臉」相當重要。玉龍這個物體尺寸不大。它有點像是由石英構成的。純粹的石英，是這顆星球上數量最大的物質，而且具有無與倫比的特性。它是一顆冰冷的石英體，而且不到一公尺高，有三個側面和一個正面。


    它從未觸碰到衛星的表面。它只盤旋於電磁場上。如果你能看見它，你會看到的是永遠在移動著的三角形。那是可以被控制的移動。你擁有一個無生命的物體，至少就我們的理解而言，它被賦予三顆意識水晶，在一顆冰凍的衛星上、在一片電磁海上漂浮著。它們這麼浮動有個目的。而它們的目的就是一個正面。


    有大量的水晶已經被消滅，而稍後到來的真正的個性水晶也相互抵消掉了。這些因磁力而懸浮著的玉龍，有一套將在 20 億年的進程中運作 10 億年的程式。實際上，它鎖定了環繞著衛星的球體，就像一顆巨大的水晶球。這些玉龍都將運作一套精確的程式，來銜接並形塑完美的表面，也就是整體的設計水晶。但天知道，這裡頭還有玄機啊！


    我們人類喜歡「面對面」。好比戀人的擁抱就是一例。面對面對我們人類來說意義重大。而無論情人有多甜蜜，不管面對面的互動有多重要，到頭來，結束時就能轉身離開，總是某種解脫。但當你讓玉龍面對面可不只是一場小小的相遇而已——那將是一切。這個程式需要某樣東西來創造宇宙整體的設計水晶。它需要一種遠超乎人類想像的締結形式。玉龍就是設計來面對面相扣的。一旦它們鎖在一起了，就永遠不會解開。


