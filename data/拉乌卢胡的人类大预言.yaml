    am）。但銳不是那樣。銳是「反我」（anti I am）的。他們的支持方式完全不是我們所理解的那樣。伍群是物質策略的存在，若你幫它裝上一組意識庫，它會非常擅於採集。但它的採集並不用作支出。他們的智力不會用來生產。他們的採集方式和我們不同。我不認為他們會遊走各處進行採集。他們的採集會以另一種方法進行，我們將會看到它顯現的方式。關於銳的大多數事情，我們都只能猜測而已。


    人類為了發展眼睛的力量，放棄了大部分感官的深度。我們是非常視覺化的生物。眼睛的力量在銳身上會被大大消減，但是啊，他們會擁有其他力量！我們自己開始注意到那些從
    1781 年就存在著的頻率，例如所有超自然現象的調查，可以追溯到十九世紀初。


    銳的其中一個面向是要接受所有生物與無生物的頻率訊息。


    在另一個層面，他會進行實體的接觸，探測任何與之接觸的對象。事實上，他們有能力操控身體所接觸到的一切東西。關鍵就是這種頻率能力。人類跟那些頻率沒啥關係，我們也並未真正了解。而你得明白這代表什麼：當你把這些生物湊成一堆，變成伍群時，在量子層次上會發生驚人的事。


    伍群將因為其頻率能力而具有侵入性，並藉此自我保護。觀察這種能力能做什麼，並看看我們的感受如何，這會相當有趣。


    伍群的成員是這些單純的接收型採集者。他們讓收集資訊的大門保持敞開，沒有懷疑、問題、理由或評斷，而伍群作為一個融合的意識，會將這些全部收為己用。對銳來說，只要不在伍群之內，就會有策略上的障礙。但只要他們組成伍群，就換我們人類在策略上居於劣勢。畢竟，如果他們要在這個被人類主宰的世界裡存活，他們就必須非常厲害才行。他們必須能夠在策略上自給自足。


    他們會怎麼做呢？推測這件事頗有意思。伍群的其中一個成員，有可能把手放在電腦上，就能透過伍群實際傳送訊息，甚至操控電腦嗎？我們討論的是對頻率和訊息收集的敏感度。他們不需要知道如何使用訊息。他們是天真、甜美的小活佛。他們連蒼蠅都不會傷害。一切都是「我為你呼吸」，而那個你也就是它。


    而它就是伍群。就是這個它在挖掘事物。


    它所展現的策略力，會讓我們人類看起來就像尼安德塔人。拖著巨大的棒子沉重地走著，希望有比我們還蠢的東西出現，讓我們宰來吃。


    銳的伍群會活在它專屬的世界。它沒有興趣待在我們的世界。從他們的角度來看，我們是一團混亂。


    他們要接收非常多的頻率訊息，因此會希望和人類保持一定程度的氣場間距，以免不斷吸收所有來自人類場域的訊息轟炸。我們可以推測，他們的頻率範圍將會長達好幾公里。


    第一個出現的伍群，或許會在實際可達成的範圍裡，找到最與世隔絕的地方。我們需要入世，但銳不必。如同前面提及的，他們的進食方法也不會像我們一樣。他們有不同的食物，並且以不同的方式來處理能量。銳真的有太多面向跟我們不一樣。肯定的是，伍群會找出方法來面對我們，或許伍群中會有個代表來和我們溝通。在伍群的脈絡裡，他們或許是最佳發言人，但永遠都是伍群透過他們在說話。


    銳到來時我們會發現，要創造出一種意識狀態，形體不再是最重要的部分。伍群的感知才是關鍵。


    伍群是一種演化，伍群的意識會利用資源，並且以無形體亦無身軀的存在狀態活著。


    當我們在邏輯上得出認知演化程序的結論，最終會得到一種固定的載具，沒有可以移動的部分，因此無論如何都不會扭曲這個意識的過程。你不用餵養它，照料它的健康，或是做其他任何事情。那就是我們的軌跡。


    我們正從在世界上的形體體驗，轉向超越世界的意識體驗。那就是銳的潛能：成為超越形體的意識體驗的其中一員，他們對形體的需求並不在意，只重視維持特定伍群的策略能力。


    不管所處環境有什麼，他們統統接收，或許還會以那樣的方式吸收養分，誰知道呢？Ra 沒聽說關於他們飲食過程的任何資訊，只知道肉類無法也不會成為銳身體的一部分。經過突變的胃到底會如何運作呢？我們只能等著看。他們會接受怎樣的食物？我們不知道，但總會有方法的。伍群的物質能力會確保這件事。'
