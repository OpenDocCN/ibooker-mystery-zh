    # 人類的設計


    ## 水晶與磁單極


    人類全都擁有一顆設計水晶（Design Crystal）、一顆個性水晶（Personality Crystal）與一個磁單極（Magnetic Monopole）。


    這兩顆意識水晶①的尺寸都非常小。他們只比微中子這一切之始的非凡粒子略大一些。我將之稱為「水晶」，以便於理解它們的特性與原理。


    它們並不是真的水晶。但冠上這樣的名稱有助於理解其碎裂、過濾及分形的面向。科學家將它們解讀為「暗物質」，我們藉之篩選訊息，從微中子海中過濾出意識。每顆水晶的形貌都獨一無二，所以，也必然以獨特的方式過濾訊息。經由這樣的過濾篩選，確實會產製出更多訊息。這是一種雙向程序。我們接收訊息，也同時傳遞出已經被我們的水晶變更過的訊息。


    這就是意識決定宇宙撰寫自身程式的方式。這是個永不停歇的循環。所以，人們會假想有個偉大的智識在運作，認為一定有某種超智慧存在。其實不然，我們就是那個智識，它就是我們，而且這是持續進化的。我們是意識場的共同創造者。打從一百四十億年前，甚至是在睡夢中，我們就不斷在做這件事。


    在懷孕時，設計水晶開始在媽媽的子宮裡建構我們的身體，和大腦（brain）相接。約莫六個月後，身體已經發展到足以接收第二顆水晶進入，也就是個性水晶，而等太陽再運行
    88 度（也就是將近三個月後），你就誕生了。


    個性水晶和我們的心智（mind）相接。有些人會把它稱作「靈魂」，那是我們體內不朽的部分，一次又一次轉生入形體裡。正是這個部分賦予了我們特質，也就是「個性」。


    當個性水晶離開形體（沒有再投胎轉世）時，它會居留於地球表面的大氣層中。個性水晶在離開形體後會回到水晶束中。在地球周圍有非常多的水晶束，其中某些水晶束十分巨大，內含難以想像的超量水晶。有趣的是，大多數的水晶並沒有具象地顯化為形體。化為人類形體的我們，其實只是那些個性水晶裡的少數，可算是投胎行家。


    我們來看看人類轉世的過程。首先，設計水晶以人類孕期約三分之二的時間來建構身體，讓大腦新皮質發展成熟來接受個性水晶。個性水晶一就定位，幻象便開始運作。你的


