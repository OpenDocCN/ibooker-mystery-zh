    # 每個人都是奇蹟—

    我們都是獨一無二的


    在你真正擁抱自身獨特的那一刻，你就是神。但這對人類而言太過困難。我們身陷龐大的概括整合與同質化。我們被混為一談，然而你我在內每個人的獨特潛能，都是絕對的、無與倫比的完美，我們的完美耀眼眩目。沒有任何東西像你一樣。因碎裂而生的每個面向都很獨特，也創造獨一無二的可能性。你是整體必不可缺的要素。這並不是說你可以選擇去留與否，而是要認清自己有多精采、多了不起。我們都很重要。但我們並沒有真正明白這件事。難道你認為在你前額葉裡工作的細胞，會知道你的生命經驗到底是怎麼回事嗎？


    你位於分形結構的哪個層級、哪個位置，其實沒有差別。我們都是重要的本質。所以，「愛自己」真的是非常神奇的事。你是唯一。不會有另一個你存在。沒有對比，沒有好或壞，沒有這個或那個。你要怎麼做比較呢？生命會確保你永遠身處對的地方，與對的人在一起。你在分形裡是高或低並不重要，你是否過著大人物般的物質生活也非重點。一切只關乎你是否出現在生命需要你的地方，而不是憑著自己虛榮的心智，認為自己應在何處。


    活著，是愛的展現。我們並沒有被愛著。我們是愛。我們就是它。所以，你或許可以停止探尋它了，因為它就是你啊。


