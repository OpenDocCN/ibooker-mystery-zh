    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_154_0.png)'
  - '[PAGE 155]


    經驗迴路和人類的感覺迴路①類似，但還是有些基本差異，這與關門 49 有關，它是完成 2027 年突變過程的其中一個執行者。此迴路的关键字是收集。銳所分享的東西，是以最特殊的方式收集的事物。就算是看來極其無助脆弱的銳嬰孩，他吸收訊息的程度也比我們深上幾千倍。他們是厲害的收集者，但那並非為了自己而做。在能夠組成伍群之前，他們不會知道原因。他們不會試圖去理解所收集的資料，而是將數據解構並儲存到非特定的位元，這樣就可以再進行重組。他們的經驗層面與成就無關，他們臣服於一個更大的力量，由它來挖掘資訊，並且提供個體所沒有的東西。沒有人能想像遇到第一個有意識的伍群時，將為我們帶來什麼樣的衝擊。他們將不再脆弱易損，也不再為生存而感到恐懼，因為那不是他們的生命重點。只有人類才會有恐懼。


    > ①感覺迴路：即人類設計系統中的 Sensing Circuit，另譯為感知迴路。'
  - '[PAGE 156]


    # 集體迴路 關鍵字：完美


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_156_0.png)'
  - '[PAGE 157]


    解決中心❶原本是人類成功迴路❷的一部分，但你馬上就會發現它已不在其中。成功永遠不夠，也從未被滿足。拿鋼琴家來說吧。巴哈協奏曲他們彈了兩千次。有些人可以演奏得相當精采，但你永遠可以表現得更好。再回頭來看銳，想想所謂的以感知為基礎是什麼意思。你根本不可能策略化。銳的這組迴路沒有訊息輸入。銳沒有恐懼，沒有質疑，也沒有上帝。那些都是人類的策略價值。銳不會像我們一樣，發展出關於成功的新模式。他們就只是接收一切，並將之提供給伍群使用。處理訊息並非銳的任務，但我們無法了解箇中道理。人類是透過發掘自己獨特的道路來實踐生命，銳則是釋放自己到超驗的意識中。如此不同，卻出自同樣的「盒子」，來自同樣的形體。


    如果去研究從尼安德塔人到銳的演化動態，你會發現身體的強度以及骨量結構的大小已經不是重點。


    策略讓智人優於肉體更強壯的尼安德塔人。只要有把槍，身材嬌小的女人也能支配全局。形體的發展已經遠離強壯和快速了。在肉體層面上，我們的身體似乎看起來不怎麼完好。


    如果研究銳的迴路，你會發現在生存的過程中，「個性」並未被邀請入列。舉例來說，解決中心就被從集體迴路切除。銳本身已經不再對自己感興趣。


    銳最終的生物形體有十一個能量中心，將會在我們現在'
