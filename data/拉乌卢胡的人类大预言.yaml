  md: '短。有許多人的試著對太空中的所有天體進行編目以便進行追蹤。我們一直都知道這對我們相當重要。就拿恐龍來說吧。牠們是地球這個巨大的爬蟲類異世界的主宰。其他一切生物型態都得倉皇藏進暗處來躲避牠們。接著,突然間一顆極為帶勁的隕石從天而降並引發了核冬天❷,太陽被封住好幾年,因而恐龍這些冷血爬蟲類就死光了。就像這樣。就是這部電影,而劇情並不新鮮。這就是故事的進展,這就是突變的運作方式。你可曾看過銀河星系互相撞擊的精采照片?難以置信對吧!這是個龐大的突變程式。從我們的觀點來看,那好像頗為粗暴,但看看你身體裡的T細胞❸,不也是攻擊並侵入微生物,再將之生吞活剝嗎?外太空有顆標示了我們的號碼的隕石在等待著。它就坐落在那些區域之中。


    關鍵從來就不是假如。而是何時,根據聲音的說法,關於何時發生有個時間框架。但我們從未沒被告知精確的年月


    +   ❶原行星(protoplanet)是還未成為真正的行星之前的「胚胎行星」,會透過在運行軌道上的擾動,導致撞擊或碰撞來成為行星。太陽系內較知名的原行星包括穀神星、智神星和灶神星。)

