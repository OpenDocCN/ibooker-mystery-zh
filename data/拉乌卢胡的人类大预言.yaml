  md: '次重複。月亮變得更大，並已高掛夜空。而那個聲音持續存在著。那幾近惱人。我一次又一次清理自己、進入房子、關上門。我回到火堆旁坐著。而當我坐在火堆旁時，我看著面前的籃子，那看起來就像是間文具店，有著待售的可愛小書，書的內頁完全空白、也沒線條。


