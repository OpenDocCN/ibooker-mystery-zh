  md: '# 啟動生命程序


    圖水晶和它的反微中子核心，是孩子身體的構築者。


    在啟動之前，核心的程式規則是壓縮與休眠。


    在衝擊之後，比賽正式開始。


    首先是刺穿黑暗的光。


