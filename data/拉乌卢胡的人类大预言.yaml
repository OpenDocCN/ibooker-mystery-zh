  md: '凡事皆有兩面。畢竟我們活在二元世界裡。一邊會說：「這不是很棒嗎？這不是很不可思議嗎？媽的，是啦，我們正在死去，但管他的咧——新的也正在到來啊！難道我們不能將自己獻給銳，證明自己有多棒、多精巧、多無私而美好嗎？」但同時也有另外一面。當你將銳聚集起來時，他們就不再無能無助了。事實上，還得考慮到他們形成伍群時，可能會因為年輕而無法保持穩定地運用所擁有的力量。你必須了解，伍群會捍衛自己、照顧自己。那是個策略性的存在。伍群擁有龐大的訊息庫可供使用。每種生物的生命力都是無與倫比的。不管環境的狀況如何、無論年紀長幼或智慧多寡，沒有哪個生物會直接臣服於死亡。伍群意識當然也不會。所以，這是故事的另一個面向。我們或許能輕鬆地擁抱銳，但我懷疑人類在那時候能夠真正理解他們的本質是什麼。幸運的是，在人類的頻譜裡，總會有人去做這些事。


