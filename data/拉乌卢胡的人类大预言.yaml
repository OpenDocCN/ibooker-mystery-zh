  md: '解決中心❶原本是人類成功迴路❷的一部分，但你馬上就會發現它已不在其中。成功永遠不夠，也從未被滿足。拿鋼琴家來說吧。巴哈協奏曲他們彈了兩千次。有些人可以演奏得相當精采，但你永遠可以表現得更好。再回頭來看銳，想想所謂的以感知為基礎是什麼意思。你根本不可能策略化。銳的這組迴路沒有訊息輸入。銳沒有恐懼，沒有質疑，也沒有上帝。那些都是人類的策略價值。銳不會像我們一樣，發展出關於成功的新模式。他們就只是接收一切，並將之提供給伍群使用。處理訊息並非銳的任務，但我們無法了解箇中道理。人類是透過發掘自己獨特的道路來實踐生命，銳則是釋放自己到超驗的意識中。如此不同，卻出自同樣的「盒子」，來自同樣的形體。


    如果去研究從尼安德塔人到銳的演化動態，你會發現身體的強度以及骨量結構的大小已經不是重點。


    策略讓智人優於肉體更強壯的尼安德塔人。只要有把槍，身材嬌小的女人也能支配全局。形體的發展已經遠離強壯和快速了。在肉體層面上，我們的身體似乎看起來不怎麼完好。


    如果研究銳的迴路，你會發現在生存的過程中，「個性」並未被邀請入列。舉例來說，解決中心就被從集體迴路切除。銳本身已經不再對自己感興趣。


