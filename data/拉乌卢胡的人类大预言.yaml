    黃道帶代表的是從地球觀察到的眾星沿著太陽運轉的平面。當你仰望這些星星、太陽與月亮，它們似乎沿著黃道移動，太陽會花一整年回到原來的位置。星星、月亮跟太陽以逆時針的方向繞行黃道帶，月亮的南北交點則是反方向（順時針）。因為我們是從地球上（它本身也繞著太陽轉）觀察這個太陽系的天體位置，星體在某些時間點看起來像是倒著走，這就是所謂的逆行（太陽除外，太陽永遠是順行的）。


    曼陀羅輪被分成六十四個閘門，每一個閘門被分配在黃道帶上的特定位置。然後你計算出你出生當下（個性）與太陽在出生前 88 度的時間點（設計）的行星位置，接著將所有天體嵌入它們在輪中的正確位置。現在，你就能在你的人體圖上看見哪些閘門是啟動的。


