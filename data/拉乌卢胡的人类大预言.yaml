    # 班與圖，以及宇宙的起始


    太古之初，起始之前，有二存在。

    其各有名。

    萬物皆有名。

    一為班（Bhan），一為圖（Tugh）。

    乃與未知相接之唯一紐帶，

    不可知也。

    其餘之物，萬物皆餘，均在其外。


    班來自於外，圖則為一卵。


    ![班與圖示意圖](img/826d9e60a4e27f605a07c3f849b1e3a2_70_0.png)


    圜恆存於內。

    萬物恆存於內。

    宇宙之外，仍為其內。

    吾擁之以為二者，實乃為一。


    物理學家有個問題。相對論以及他們所理解的宇宙，都是基於光的存在，但是一定有段在光出現之前的時期。


    聲音說，宇宙整體是一個尚未出生的存在。它是活的。Ra 詩意地稱之為「孩子」。我們不知道也無從想像，是什麼懷了這樣的東西。「無法穿越的環①」總是存在。宇宙並非因為大爆炸而誕生。它早就存在了，只是在冬眠。在「班」出現前它就存在了。同樣地，那顆卵（意指「圖」）還在四處晃蕩、尚未受孕時，宇宙就存在了。其實「整體」是個超乎尋常的幻象，這個巨大的幻象是最初班和圖的並列所產生的副作用。就像我們被賦予兩顆水晶一樣。我們只是這龐大程式的縮影。


    班和圖是與未知的唯一連結，其餘的（萬物都是其餘的部分）統統來自它們。


    宇宙萬物都是彼此分離的，就像胎兒在母親的子宮裡長大。當我們觀察宇宙時，事實上是在內部看著一個未誕生的實體。當我們仰望天上星辰，我們是從內部在看這個孩子的身體。


    圖內建的細胞中心帶有反微中子，當宇宙大爆炸發生時，它們變成了微中子。宇宙建構在微中子網格之上。微中子是宇宙裡最大量的微粒，估計占了所有物質的 40%。它們數量龐大，以近乎光速傳播。當你看著圖，你看的是主要的设计水晶，負責我們稱為宇宙的整個形體結構。


    班也是一顆設計水晶。圖是「陰」與細胞的組成，而班則是少一點的陰。班是組織的水晶。它們都是設計水晶，負責建構形體。所以在這個程式裡，一開始，我們看的是兩種類型不同的設計形體機制。圖就是單純跟一切物質攪和在一塊。接著，藉由來自外部的班水晶的潛能，透過微中子場組織這些圖水晶，並以磁單極將它們維繫在一起。這是生命程式正式啟動的地方。真正的個性水晶還沒進入孩子，還沒進入宇宙整體，但我們離那不遠了。我們體內的個性水晶事實上是設計水晶，真正的個性水晶會出現於大概二億年後的「玉龍」（Eron），我們身上的個性水晶是它的測試驅動器。玉龍將在地球上的生命終結後出現，幾乎是一種最完整的形體。


    最初，只是兩顆設計水晶。這顯示出，做為形體原則的一部分，我們是多麼的龐雜且費解。一開始並沒有陰和陽，而是陰與陰。當你看著今日世界，你可以發現各種族中的男性不過是一種仿陽的原型罷了。真是個很棒的玩笑！


    最初，在起始之前，有二個存在。


    ①「無法穿越的環」是神智學的概念，認為意識可以不斷提升，但人們容易因為妄想而讓意識困在某個階段，彷彿眼前有個穿越不了的環阻擋著。


    班水晶內建著重要的磁單極，這說得通，畢竟班是從外而來的。當你擁有磁單極，你就有了司機，而它確實知道該往哪去。


    這門宇宙學帶我們進入的，遠超乎我們能處理、控制或干擾的任何事物之外的意識組織。換句話說，因為我們沒有真正的個性水晶，也就沒有真正的突變意識。不管是我們或地球上曾經存在的任何心智，全都無法領會宇宙整體的意涵，以及那些紛亂複雜的邏輯。和聲音打交道時，Ra
    被意識場給矮化了。矮化一詞甚至還不足以描述！面對那意識的力量，根本就微不足道！我們並非造物者。就像子宮裡還沒有任何作用的胚胎一樣，我們還沒有潛力，真的沒有，就只是依循著程式而已。某種程度上，那是很可以預測的程式。這樣說來，在最初受孕的基底之上，一切都已經被設定好。那是化學反應與動態變化。那就是我們。'
