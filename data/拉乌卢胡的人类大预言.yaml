    62 閘門的閘門 53 會是多麼不同。53 閘門不帶細節或事實。它想做的只是開始一些事。所以只會有一個開端，還不會有什麼事實。就只是從終點來到一個新的開始。


    對我們人類來說，這表示要成為倖存者，要能從衝擊中存活下來。


