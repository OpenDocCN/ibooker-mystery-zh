- md: '## 二元迴路 關鍵字：關懷


    銳展現了銳有多麼不同，並協助我們認清人類與銳的差異。人類那幾條自我生存的通道被詮釋為孤狼，是個體生存過程的骨幹。但現在，這裡多了 25-51 這條帶有強烈欲求的通道。所以突然之間，我們把來自人類三種迴路的過程結合在一起。這邊的關懷和你從人類身上理解到的那種關懷並不相同。當我們在
    2027 年來到以 20-34 通道為主的時代，也就是沉睡的鳳凰十字，我們會覺得那似乎是個人主義的時代，但對銳而言卻是反個人主義的。正是這個二元迴路剝奪了銳的個體性。


    如果有對夫妻生了一個銳小孩，或許會驚慌失措，因為他們會以為自己生了個不正常也不健全的孩子，覺得一切都染上了悲傷色彩。他們會思考該怎麼做，諸如要背負的重擔、要付出的代價等等。從我們的認知來看，我們已經知道銳的個體會有嚴重的生理缺陷，而且他的運動神經作用和肌肉發展都會相當遲緩，因為銳是第一個真正的天王星身體的生物。他們在身體上的成熟會比人類慢上許多。你也可以假設他們的新陳代謝會跟我們不同。這個特別迴路的有趣之處在於，它終結了個人主義。


    假設有兩個銳嬰兒恰好在同一間機構裡，他們會立即認出彼此，就算還沒形成伍群，還是會有某些效應，那就是這組迴路所帶來的。只要其中一個銳知道這裡有兩個銳，他們就立刻被賦予生存的力量，直到第三個銳出現。一旦有兩個銳，他們就會啟動這個活躍的過程。銳來到這裡不是要獨自一人，也不是要湊成一對，但那顯然是個跳板。就算一開始只發現一個銳，就算銳的人數還不夠多，都會是很大的安慰。他們以二為單位開始，而不是像我們這樣從單一個體起始。


    而我們在這之中的責任是什麼呢？即便他們在數量上根本是瀕臨滅絕的物種，人類能否忍住不去對抗這股更強大的策略力量呢？有太多可能性，所以不容易做出判斷。當我們離開計畫十字的週期後，活在那個缺乏覺知的同質化世界會怎麼樣呢？這真的很難想像。有多少銳嬰兒會孤立無援地死去呢？有多少成雙的銳會在「沒有明天」的空虛中彼此扶持，直到可存活的伍群終於出現呢？只有一件事是確定的：當得以生存的伍群成形時，銳就不再需要任何協助了。


    ## 個人主義迴路 關鍵字：展現


    這組個人主義迴路的有趣之處在於，它被剝除了「成功維度」。這讓它和人類相對應的迴路有所不同。而最根本的差異，在於它不具備人類「創造迴路」的突變要素。個人主義迴路裡少了
    3-60，所以不會有突變。對作曲家來說，走出憂鬱，將之譜為精采的樂曲，再回到愁思之中是常見之事。但這組迴路不一樣。這裡沒有我們所知的那種人類設計裡的情緒能量流。所以這不再是突變的迴路。沒有喜怒哀樂，也沒有創造力。


    見證演化的運作方式真的十分有趣。十萬年前，發生了喉嚨的突變。這個變化打開了概念上的心智可能性，以前所未有的方式講述並儲存經驗資訊。後來，喉部下降，並打開了視覺皮層的潛能，但最重要的是，這個變化讓聲音有可能發展複雜細微的差異，也就是我們所謂的語言。


    > 註：3-60 在銳的設計裡，歸在孤閉迴路中。


    這是七中心人類最基礎的突變。也是這個突變，將人類和我們的靈長類親戚分隔開來。我們和牠們之間唯一真正相似的，只有我們一歲前的樣貌。在那個時期，我們能夠做到靈長類動物一輩子都會做的事，也就是一邊呼吸一邊喝東西。我們在被餵奶的嬰兒身上可以發現這件事。嬰兒可以在吸奶時，同時用鼻子呼吸。事實上，如果嬰兒感冒，會非常恐怖。但突然間，他開始成熟，等到準備好斷奶時，就不太能夠邊呼吸邊喝東西，他會開始積聚氣體並開始吐出液體。這就是發生了突變。身為人類，我們無法邊喝東西邊呼吸，但我們因此有機會能展現聲音複雜的細微差異。嬰兒在這時期的聲音詞彙有限，等級跟黑猩猩相同。銳不需要依賴說話來表達，這個事實很清楚。在這組迴路裡我們就看得出來。這組迴路並不活躍，你也可以稱之為「停滯迴路」。它斷絕了個人主義的趨向。人類以擁有個體性為豪，但對於銳來說，個體性是原始的。所以你在面對擁有這個迴路的銳時，他會對你說：「抱歉喔，這真的太原始了！這根本過時了！」他們無法有任何的個體性展現。


    Ra 的假設是，你可以在嬰兒介於九個月到一歲之間時，判斷出他是不是銳。你會發現這個嬰兒可以繼續邊呼吸邊喝東西。假設這個嬰兒沒有發生喉嚨下降的突變，我們就確定他會是個銳。如果你是人類，在一段時間之後就會開始吐奶，但如果是銳，就不會有這種現象。


    銳或許甚至不能像我們一樣理解語言。對他們來說，那聽起來比較像是噪音。比起刺耳的聲音，音調和頻率帶給他們的訊息反而更多。我們面對的是似乎非常脆弱、不健全的生物，但他們並不脆弱，也很健康。如今人類設計這門知識，很可能為那些生下銳小孩、卻不知道自己在面對什麼而憂心如焚的家長，帶來希望與勇氣，因為他們不知道自己在面對什麼。或許並非百分之百，但有九成的機率，當小孩的發聲能力有限，且仍能邊喝東西邊呼吸地活過一歲，他就很有可能是銳。而這個銳也就必須被帶去和其他銳聚在一起。


    這組迴路清楚呈現了這個事實。這裡沒有突變而停滯不前。12-22 通道所保留的是其社交的特質，但其中完全欠缺自我個性。愛的中心將只會透過伍群來表達其定位。銳非常單調，他們的情緒波被固定在平淡而停滯的狀態。他們不會有任何一種人類的情緒波，因為他們的感受中心以不同的方式運作。


    若你著眼於性的部份，這兒沒有譚崔能量，沒有性的魔力，也沒有浪漫。銳是否能體驗到浪漫的吸引力呢？這點值得懷疑。


    > 註：譚崔能量：譚崔（Tantra）是密宗對性能量的概稱。這是基本的能量，可以被轉化為更高的形式來提升自我。


    對於沒有自我意識的生物來說，那樣的事情似乎不可能發生。突變與繁衍將會從個體迴路移除，被放進孤閉迴路。這裡沒有展現自我的需求。沒有我們所理解的心智，只剩下純粹的儲存而已。這樣的轉變看來驚人，而其真正的意涵是，我們人類不再擁有與自我過程連結的魔法了。就更深一層的意義而言，它與銳的突變有關。這真的唱出了我們的死亡。它讓我們知道包括我們在內的一切，全都是原始的。地球上曾出現彼此競逐的克羅馬儂人，也有活在非競爭的社群結構中的尼安德塔人。他們都被徹底擊垮了。他們的時代已經完結。他們失去了自身的方向與突變能力。他們開始喪失繁殖力然後死去。這宇宙之輪的流轉，看起來很美。此時我們理當有意識地看看。看看銳，看看他們拒絕了什麼，又留下了什麼。答案就是我們。


    在過去，人類總是屠殺一切具有威脅性的意識體。太過聰明或太具挑戰性的，都被消滅殆盡。人類證明自己是地球上最複雜且最有能力的生物，而登上了基因庫的頂端。人類唯一會包容的只有可愛的事物。只要孑然無依，銳絕對會無助到活不下去的程度。但如果你把他們湊成三個，甚或只要兩個，他們組合起來的氣場就能引來第三個銳，轉眼間就是另一個故事了。


    凡事皆有兩面。畢竟我們活在二元世界裡。一邊會說：「這不是很棒嗎？這不是很不可思議嗎？媽的，是啦，我們正在死去，但管他的咧——新的也正在到來啊！難道我們不能將自己獻給銳，證明自己有多棒、多精巧、多無私而美好嗎？」但同時也有另外一面。當你將銳聚集起來時，他們就不再無能無助了。事實上，還得考慮到他們形成伍群時，可能會因為年輕而無法保持穩定地運用所擁有的力量。你必須了解，伍群會捍衛自己、照顧自己。那是個策略性的存在。伍群擁有龐大的訊息庫可供使用。每種生物的生命力都是無與倫比的。不管環境的狀況如何、無論年紀長幼或智慧多寡，沒有哪個生物會直接臣服於死亡。伍群意識當然也不會。所以，這是故事的另一個面向。我們或許能輕鬆地擁抱銳，但我懷疑人類在那時候能夠真正理解他們的本質是什麼。幸運的是，在人類的頻譜裡，總會有人去做這些事。


    我們必須著眼於這即將發生的突變，就算這一切很美好，仍要用實際的眼光來觀察。這也許會在各方面產生許多令人不快的事情。對任何幫助建立意識伍群的人類來說，除了他們本來就會有的收穫以外，可以得到的回報少之又少。你不會從銳獲得任何報酬。事實上，你會失去他們。任何一對夫婦的銳小孩——身處於個人的無助之中，但仍是個有名字的存在，是愛與痛苦的焦點——一旦身在伍群，他就會完全與人類世界隔絕。他會進入專屬的世界，並永遠不回頭。我們無法知道在他們的世界裡，我們會是什麼模樣。他們會以我們無從想像的方式看待我們。那會是一種激進的方式，而他們將以這種方式來體驗環境。


    就像克羅馬儂人擁有雙眼視覺，但尼安德塔人的視皮層較弱，只有運動視覺且似乎只看得見黑白兩色。這在貓和狗身上也是一樣，牠們靜止時沒有真的在看東西。銳的觀看方式或許與我們不同。但這種比較並不公平。就好像看著你的狗兒時，狗從牠的世界觀看我們的方式，從很多標準來看，都是我們人類比不上的。這絕對不是感覺優越的問題。我們臆測狗狗如何看待我們，但這些都是我們天真的投射。你無法預測銳會看到我們的世界，看見你我、建築物或電腦圖像。他們擁有的是另一種世界。在他們變成伍群時，世界就有了目標。伍群將運用我們不會使用、甚至認不得的力量來完成目標。他們真的跟我們不一樣。就好像你或許很愛生活裡有貓狗的陪伴，但你永遠不可能體驗牠們的世界。我們也活在自身的維度之中。


    離群索居的銳就像伊甸園裡的人。他們不得不被丟進世界。但只要銳孤立無援，這個過程就不會開始。唯有他們啟動了伍群的程序，才能建構出自己的世界。他們從我們的子宮誕生於這個世界，當伍群出現時，他們穿過鑰匙孔，進入我們永遠不得其門而入的另一個維度。


    銳都是偉大的收集者。就算在我們看來是無能自理的寶寶，他們所收集的訊息量也超過我們好幾千倍。他們收集，但並非為了自己。直到成為伍群之前，他們不會知道為何要收集。接著他們就會知道此生的唯一目標是什麼。


    在人類形成伍群時，會不斷改變伍群的組成，也會離開伍群；但銳不會打破他們所建構出的伍群。要打破建好的伍群會非常困難，甚至根本辦不到。這麼說吧，如果有四個銳被帶到診所，而有人準備對他們進行個別體檢。我幾乎可以向你保證這不會發生。一旦伍群被建立，我不認為有任何人或事能夠打破伍群的連結。銳建構的是恆久存在的正式實體，他們會保持這種狀態。


    另一個問題是：如果他們會傳宗接代，那要如何繁衍呢？伍群會和伍群合併嗎？伍群是無性的，是融合為一的過程，沒有性別之分。顯然，如果銳最終會蓬勃發展為十一個能量中心的形體，他們就必須能夠生育與繁殖。那他們需要另一組伍群嗎？功能正常的銳伍群可以複製更多的自己嗎？他真的在乎有沒有後代嗎？九中心形體的意識伍群還會在意這件事嗎？這到底有沒有可能呢？當我們把他們聚在一起、形成伍群後，我懷疑我們甚至無法一窺他們的世界。我們無從進入他們的世界。我們所能看到的只是奇蹟；那終究可能發生，而我們可以觀賞。


    ## 有意識的銳伍群


    我們所面對的突變，將把「策略的實驗」拋諸腦後。策略是人類的產物，只有人類才有策略。這個突變會關掉身體的特定區域，將儲存的能量資源轉換為控制環境的能力，而不是拿去處理身體層面的運作。銳看起來會比自閉症更嚴重。他們所擁有的是天王星的載體。在這個新的天王星週期的身體裡，身為人類的我們無法全然發揮。因為我們仍然和土星週期有所連結。透過自我觀照的意識，我們因而發展出種種方式來提高自身載體的潛能，讓我們可以活久一點，並且好好利用身體。銳的裝備則是完全不同的方式。他們不需要那些麻煩的基本配備。人體圖發生的變化，在最後的最後（也就是我們），開啟了新的開始（也就是他們）。這真的很不一樣。他們能夠掌控環境的方式遠比我們複雜得多，因為我們受到了「個人主義」的詛咒。


    有個故事叫《盲人摸象》。一個盲人握住大象的鼻子，說這是條蛇。另一個盲人摸著象腿，說這是棵樹。伍群就是那頭大象。象鼻和象腿說的是什麼呢？我們可以那樣思考嗎？我們能夠理解就這麼活著而沒有目標與功能的存在嗎？沒有能力做任何事？這樣的存在如果沒得到幫助就會死亡，我們可以想想這代表什麼。


    你會傾向以看待人類的方式來看他們，但你不能這麼做。事實上，他們什麼都不是。他們是象鼻，也可能是象腿，但這不是重點。你要留意的是大象。這才是真正的核心。人類該怎麼理解呢？若要找出類似的存在，我們會想到的可能是植物人；但事實上，我們必須面對的是伍群這頭大象。當他們來到這世界，可以把他們想像成「裝成一包的肉」，因為他們看起來就是這樣。試想看看：當你把其中三個帶到一起，他們成了一頭擁有可怕能力的大象時，那會是什麼情況。


    光憑研究銳的設計並無法探討意識伍群。化為意識的不是他們，他們只是參與過程。這很像觀察你的心智。他們都會觀看他們的心智，但並沒有所謂的心智，只有資源的運用。相信我，伍群會非常擅長運用資源。


    我們正邁向這一回合尾聲的特殊事件。我們將成為整體生命潛能的一部分。宇宙整體將接收其唯一的個性。而我們現正經歷的這一切乃是整體意識的準備工作。包括銳與演化，一切都是關於如何臣服於唯一的個性，如何讓這個過程盡善盡美。在本書接下來的梵天之夜與玉龍（即地球生命終結後出現的形體）的章節，我們會看到這個浩瀚的宇宙將被賦予唯一的個性。


    我們抵達了某個終點。某種意義上，我們來到了自私的終點。我們處於故事的尾聲，上頭寫著「你得自個兒到達那兒！」所有發展出來的基礎架構，都是為了演化的進程。我們就快就會成為明日黃花。銳被我們生下，看來也像我們，但他們和我們完全不同，我們必須明白這點。


    現在這個進化舞台，展現出個性得以棲於形體的可能性。這是關於宇宙大爆炸這個起源的故事；事實上，班水晶與圖水晶是兩顆設計水晶。真正的個性水晶還沒出現。我們的個性水晶只是真正的個性水晶的「替身」。我們每個人都是一個實驗，用來驗證獨特的個性是否能真實展現。這也是我們身而為人的目的。當我們進入九中心的身體，明顯地，個性能夠在形體中運作，而現在演化走到了下一步：個性可以是諸多形體的中心點嗎？你因此得到了更深刻而強大的力量。這個階段的影響很廣泛，但與此同時，當你從整體角度觀察，這也只是個小舞台。而這正是我們要前往的地方。我們所迎向的未來，不同的形體各自擁有完美的獨特性，而它們一起讓意識有了棲身之所。這是為了最終的自我意識原則而存在的完美形體。


    宇宙就是意識。這是相當重要的事。當我們坐在黑暗裡，好奇著「宇宙整體之光何在？」時，光就出現在這部深刻的內在電影的尾聲，伴隨著超過二十億年後的宇宙誕生而來。


    相較於人類處理訊息的方式，伍群的資訊運用力強得驚人。可別以為這些銳嬰兒會缺東缺西，一旦連結成伍群，他們就無所匱乏。他們的世界沒有我們的那些疆界。只要你躲在門後，就沒人會發現你，但伍群卻看得見你。伍群並非真的「看見」，但就是知道你身在何處。不只是知道你的位置，還知道你的心率、知道你正散發什麼樣的化學反應——還有一大堆的事——但伍群不會像我們的心智那樣詮釋一切。伍群很不可思議。


    尼安德塔人是怎麼滅亡的？是克羅馬儂人殺光他們的嗎？我們不知道。他們會像我們看待猴子一般看待他們嗎？他們沒有欲望。他們不具策略性，他們的生活風格極為不同，可能會類似任何一種食草的哺乳類，以被動的方式與他們的世界互動。那是屬於他們的時代嗎？他們是因為繁殖力下降而滅絕嗎？抑或是全部加起來的結果？顯然，人類的生育力將越來越低，但人類顯然也將繼續存在，直到
    1300 年後這一回合結束。滅絕不會匆促發生。尼安德塔人和克羅馬儂人曾在現今的西班牙等地共同生活了大概兩萬年。當人類發現第一組伍群出現時，會採取「獵巫行動」嗎？我們也不知道。無論我們談了多少這類話題，仍沒有人能夠想像，最後遇見這個「東西」以及他的個性時，會有多麼驚人。


    伍群總想跟類似的伍群在一起。就好像人類會在各個城市和區域，集結成不同文化和語言的群體。那是伍群喜愛的。銳的伍群會尋找其他的銳伍群。當你將 81 個銳小孩湊在一塊兒，這就是他們可以真正消滅人類的時候。Ra
    曾推測，只要地球還存在，我們就永遠不會看到 81 個銳湊在一起，但說真的，天曉得？81 是個神奇的數字。它是可以長期運作的基因庫的基礎。只要你建立了這樣的基因庫，它就能成長並主宰所處環境。


    如果我們能進入另一個回合（以前有過很多回合，不是只有一個而已），銳會是擁有十一個能量中心的存在。九中心形體只是個過渡期。我們拋下七中心版本，目標是到達十一中心形體。要實現這個目標，你需要在這一側與另一側都能起作用的基礎結構。也就是橋樑。對銳來說，順服根本不是問題，他們也不會去問「我該成為這個伍群的一部分嗎？」他們不是人類。沒有「策略」。沒有個體。他們是完美的收集者，他們的完美造就了伍群超級強大的表現。如果你湊齊了
    81 組伍群，他們將會控制一切，並將擋路的東西全數推開。


    一組運作的銳伍群和單一人類完全無法相比。我試著保持樂觀來看待銳的本質，以及人類可能會如何與之互動，但是談到人類的本性時，你也必須要客觀務實地看待。人類必須活出策略的完美與可能性，因為「程式」發現到：發揮自我觀照意識的潛能，是生物形體最有效的生存方式。當個生物形體真的有夠麻煩啊！想想那些必須為了別的物種的生存而死去的其他生物。看看你每天花費多少時間來處理身為生物的一切難題，又得發展多少策略來活下去。我們人類是有史以來最厲害的生物。那麼，銳呢？


    面對生物，你不可能放棄策略。因為如果缺乏策略性，你就會死。而意識伍群則是最強大的策略體。伍群會照顧其組成成員。人類的伍群並非意識。所以，我們沒有被鎖定在其中。我們這輩子都在進出伍群。我們就像熔岩燈一樣不斷變形。我們都是巨大的生命程式的組成元件，而身為元件——就演化的觀點來說——我們在學習如何共處。我們正朝著共性、合一的方向發展。不過，那當然不是我們人類。


    在梵天之夜後，個性水晶會降臨並穿入宇宙（類似於我們的個性水晶穿入身體的子宮），只有到那時候，萬物才會被植入個性水晶——實際上是唯一的個性水晶。


    我們是巨大意識的作業。微中子海遍布已知宇宙的整個海岸。它無處不在。這一切就只是個龐大的意識。而它仍是一種形體，邊運作邊準備著。


    你要如何為共同意識做準備？你要如何做好準備來放手、臣服，接受必須為了更偉大的個性而放棄個人意識這件事？


    我們正要看到軌道上的第一個實驗。在這個實驗裡，個體不具意義。全然依賴而鎖定，但又擺脫一切阻礙。人類為了同質化而操勞，但銳將是同質化的完美呈現。同質化是將我們轉變為銳的起點。只要想想諸如宗教這類的「同質化機構」就好。只要將我們帶到銳面前就好。'
  mdcn: '## 二元迴路 關鍵字：關懷


    銳展現了銳有多麼不同，並協助我們認清人類與銳的差異。人類那幾條自我生存的通道被詮釋為孤狼，是個體生存過程的骨幹。但現在，這裡多了 25-51 這條帶有強烈欲求的通道。所以突然之間，我們把來自人類三種迴路的過程結合在一起。這邊的關懷和你從人類身上理解到的那種關懷並不相同。當我們在
    2027 年來到以 20-34 通道為主的時代，也就是沉睡的鳳凰十字，我們會覺得那似乎是個人主義的時代，但對銳而言卻是反個人主義的。正是這個二元迴路剝奪了銳的個體性。


    如果有對夫妻生了一個銳小孩，或許會驚慌失措，因為他們會以為自己生了個不正常也不健全的孩子，覺得一切都染上了悲傷色彩。他們會思考該怎麼做，諸如要背負的重擔、要付出的代價等等。從我們的認知來看，我們已經知道銳的個體會有嚴重的生理缺陷，而且他的運動神經作用和肌肉發展都會相當遲緩，因為銳是第一個真正的天王星身體的生物。他們在身體上的成熟會比人類慢上許多。你也可以假設他們的新陳代謝會跟我們不同。這個特別迴路的有趣之處在於，它終結了個人主義。


    假設有兩個銳嬰兒恰好在同一間機構裡，他們會立即認出彼此，就算還沒形成伍群，還是會有某些效應，那就是這組迴路所帶來的。只要其中一個銳知道這裡有兩個銳，他們就立刻被賦予生存的力量，直到第三個銳出現。一旦有兩個銳，他們就會啟動這個活躍的過程。銳來到這裡不是要獨自一人，也不是要湊成一對，但那顯然是個跳板。就算一開始只發現一個銳，就算銳的人數還不夠多，都會是很大的安慰。他們以二為單位開始，而不是像我們這樣從單一個體起始。


    而我們在這之中的責任是什麼呢？即便他們在數量上根本是瀕臨滅絕的物種，人類能否忍住不去對抗這股更強大的策略力量呢？有太多可能性，所以不容易做出判斷。當我們離開計畫十字的週期後，活在那個缺乏覺知的同質化世界會怎麼樣呢？這真的很難想像。有多少銳嬰兒會孤立無援地死去呢？有多少成雙的銳會在「沒有明天」的空虛中彼此扶持，直到可存活的伍群終於出現呢？只有一件事是確定的：當得以生存的伍群成形時，銳就不再需要任何協助了。


    ## 個人主義迴路 關鍵字：展現


    這組個人主義迴路的有趣之處在於，它被剝除了「成功維度」。這讓它和人類相對應的迴路有所不同。而最根本的差異，在於它不具備人類「創造迴路」的突變要素。個人主義迴路裡少了
    3-60，所以不會有突變。對作曲家來說，走出憂鬱，將之譜為精采的樂曲，再回到愁思之中是常見之事。但這組迴路不一樣。這裡沒有我們所知的那種人類設計裡的情緒能量流。所以這不再是突變的迴路。沒有喜怒哀樂，也沒有創造力。


    見證演化的運作方式真的十分有趣。十萬年前，發生了喉嚨的突變。這個變化打開了概念上的心智可能性，以前所未有的方式講述並儲存經驗資訊。後來，喉部下降，並打開了視覺皮層的潛能，但最重要的是，這個變化讓聲音有可能發展複雜細微的差異，也就是我們所謂的語言。


    > 註：3-60 在銳的設計裡，歸在孤閉迴路中。


    這是七中心人類最基礎的突變。也是這個突變，將人類和我們的靈長類親戚分隔開來。我們和牠們之間唯一真正相似的，只有我們一歲前的樣貌。在那個時期，我們能夠做到靈長類動物一輩子都會做的事，也就是一邊呼吸一邊喝東西。我們在被餵奶的嬰兒身上可以發現這件事。嬰兒可以在吸奶時，同時用鼻子呼吸。事實上，如果嬰兒感冒，會非常恐怖。但突然間，他開始成熟，等到準備好斷奶時，就不太能夠邊呼吸邊喝東西，他會開始積聚氣體並開始吐出液體。這就是發生了突變。身為人類，我們無法邊喝東西邊呼吸，但我們因此有機會能展現聲音複雜的細微差異。嬰兒在這時期的聲音詞彙有限，等級跟黑猩猩相同。銳不需要依賴說話來表達，這個事實很清楚。在這組迴路裡我們就看得出來。這組迴路並不活躍，你也可以稱之為「停滯迴路」。它斷絕了個人主義的趨向。人類以擁有個體性為豪，但對於銳來說，個體性是原始的。所以你在面對擁有這個迴路的銳時，他會對你說：「抱歉喔，這真的太原始了！這根本過時了！」他們無法有任何的個體性展現。


    Ra 的假設是，你可以在嬰兒介於九個月到一歲之間時，判斷出他是不是銳。你會發現這個嬰兒可以繼續邊呼吸邊喝東西。假設這個嬰兒沒有發生喉嚨下降的突變，我們就確定他會是個銳。如果你是人類，在一段時間之後就會開始吐奶，但如果是銳，就不會有這種現象。


    銳或許甚至不能像我們一樣理解語言。對他們來說，那聽起來比較像是噪音。比起刺耳的聲音，音調和頻率帶給他們的訊息反而更多。我們面對的是似乎非常脆弱、不健全的生物，但他們並不脆弱，也很健康。如今人類設計這門知識，很可能為那些生下銳小孩、卻不知道自己在面對什麼而憂心如焚的家長，帶來希望與勇氣，因為他們不知道自己在面對什麼。或許並非百分之百，但有九成的機率，當小孩的發聲能力有限，且仍能邊喝東西邊呼吸地活過一歲，他就很有可能是銳。而這個銳也就必須被帶去和其他銳聚在一起。


    這組迴路清楚呈現了這個事實。這裡沒有突變而停滯不前。12-22 通道所保留的是其社交的特質，但其中完全欠缺自我個性。愛的中心將只會透過伍群來表達其定位。銳非常單調，他們的情緒波被固定在平淡而停滯的狀態。他們不會有任何一種人類的情緒波，因為他們的感受中心以不同的方式運作。


    若你著眼於性的部份，這兒沒有譚崔能量，沒有性的魔力，也沒有浪漫。銳是否能體驗到浪漫的吸引力呢？這點值得懷疑。


    > 註：譚崔能量：譚崔（Tantra）是密宗對性能量的概稱。這是基本的能量，可以被轉化為更高的形式來提升自我。


    對於沒有自我意識的生物來說，那樣的事情似乎不可能發生。突變與繁衍將會從個體迴路移除，被放進孤閉迴路。這裡沒有展現自我的需求。沒有我們所理解的心智，只剩下純粹的儲存而已。這樣的轉變看來驚人，而其真正的意涵是，我們人類不再擁有與自我過程連結的魔法了。就更深一層的意義而言，它與銳的突變有關。這真的唱出了我們的死亡。它讓我們知道包括我們在內的一切，全都是原始的。地球上曾出現彼此競逐的克羅馬儂人，也有活在非競爭的社群結構中的尼安德塔人。他們都被徹底擊垮了。他們的時代已經完結。他們失去了自身的方向與突變能力。他們開始喪失繁殖力然後死去。這宇宙之輪的流轉，看起來很美。此時我們理當有意識地看看。看看銳，看看他們拒絕了什麼，又留下了什麼。答案就是我們。


    在過去，人類總是屠殺一切具有威脅性的意識體。太過聰明或太具挑戰性的，都被消滅殆盡。人類證明自己是地球上最複雜且最有能力的生物，而登上了基因庫的頂端。人類唯一會包容的只有可愛的事物。只要孑然無依，銳絕對會無助到活不下去的程度。但如果你把他們湊成三個，甚或只要兩個，他們組合起來的氣場就能引來第三個銳，轉眼間就是另一個故事了。


    凡事皆有兩面。畢竟我們活在二元世界裡。一邊會說：「這不是很棒嗎？這不是很不可思議嗎？媽的，是啦，我們正在死去，但管他的咧——新的也正在到來啊！難道我們不能將自己獻給銳，證明自己有多棒、多精巧、多無私而美好嗎？」但同時也有另外一面。當你將銳聚集起來時，他們就不再無能無助了。事實上，還得考慮到他們形成伍群時，可能會因為年輕而無法保持穩定地運用所擁有的力量。你必須了解，伍群會捍衛自己、照顧自己。那是個策略性的存在。伍群擁有龐大的訊息庫可供使用。每種生物的生命力都是無與倫比的。不管環境的狀況如何、無論年紀長幼或智慧多寡，沒有哪個生物會直接臣服於死亡。伍群意識當然也不會。所以，這是故事的另一個面向。我們或許能輕鬆地擁抱銳，但我懷疑人類在那時候能夠真正理解他們的本質是什麼。幸運的是，在人類的頻譜裡，總會有人去做這些事。


    我們必須著眼於這即將發生的突變，就算這一切很美好，仍要用實際的眼光來觀察。這也許會在各方面產生許多令人不快的事情。對任何幫助建立意識伍群的人類來說，除了他們本來就會有的收穫以外，可以得到的回報少之又少。你不會從銳獲得任何報酬。事實上，你會失去他們。任何一對夫婦的銳小孩——身處於個人的無助之中，但仍是個有名字的存在，是愛與痛苦的焦點——一旦身在伍群，他就會完全與人類世界隔絕。他會進入專屬的世界，並永遠不回頭。我們無法知道在他們的世界裡，我們會是什麼模樣。他們會以我們無從想像的方式看待我們。那會是一種激進的方式，而他們將以這種方式來體驗環境。


    就像克羅馬儂人擁有雙眼視覺，但尼安德塔人的視皮層較弱，只有運動視覺且似乎只看得見黑白兩色。這在貓和狗身上也是一樣，牠們靜止時沒有真的在看東西。銳的觀看方式或許與我們不同。但這種比較並不公平。就好像看著你的狗兒時，狗從牠的世界觀看我們的方式，從很多標準來看，都是我們人類比不上的。這絕對不是感覺優越的問題。我們臆測狗狗如何看待我們，但這些都是我們天真的投射。你無法預測銳會看到我們的世界，看見你我、建築物或電腦圖像。他們擁有的是另一種世界。在他們變成伍群時，世界就有了目標。伍群將運用我們不會使用、甚至認不得的力量來完成目標。他們真的跟我們不一樣。就好像你或許很愛生活裡有貓狗的陪伴，但你永遠不可能體驗牠們的世界。我們也活在自身的維度之中。


    離群索居的銳就像伊甸園裡的人。他們不得不被丟進世界。但只要銳孤立無援，這個過程就不會開始。唯有他們啟動了伍群的程序，才能建構出自己的世界。他們從我們的子宮誕生於這個世界，當伍群出現時，他們穿過鑰匙孔，進入我們永遠不得其門而入的另一個維度。


    銳都是偉大的收集者。就算在我們看來是無能自理的寶寶，他們所收集的訊息量也超過我們好幾千倍。他們收集，但並非為了自己。直到成為伍群之前，他們不會知道為何要收集。接著他們就會知道此生的唯一目標是什麼。


    在人類形成伍群時，會不斷改變伍群的組成，也會離開伍群；但銳不會打破他們所建構出的伍群。要打破建好的伍群會非常困難，甚至根本辦不到。這麼說吧，如果有四個銳被帶到診所，而有人準備對他們進行個別體檢。我幾乎可以向你保證這不會發生。一旦伍群被建立，我不認為有任何人或事能夠打破伍群的連結。銳建構的是恆久存在的正式實體，他們會保持這種狀態。


    另一個問題是：如果他們會傳宗接代，那要如何繁衍呢？伍群會和伍群合併嗎？伍群是無性的，是融合為一的過程，沒有性別之分。顯然，如果銳最終會蓬勃發展為十一個能量中心的形體，他們就必須能夠生育與繁殖。那他們需要另一組伍群嗎？功能正常的銳伍群可以複製更多的自己嗎？他真的在乎有沒有後代嗎？九中心形體的意識伍群還會在意這件事嗎？這到底有沒有可能呢？當我們把他們聚在一起、形成伍群後，我懷疑我們甚至無法一窺他們的世界。我們無從進入他們的世界。我們所能看到的只是奇蹟；那終究可能發生，而我們可以觀賞。


    ## 有意識的銳伍群


    我們所面對的突變，將把「策略的實驗」拋諸腦後。策略是人類的產物，只有人類才有策略。這個突變會關掉身體的特定區域，將儲存的能量資源轉換為控制環境的能力，而不是拿去處理身體層面的運作。銳看起來會比自閉症更嚴重。他們所擁有的是天王星的載體。在這個新的天王星週期的身體裡，身為人類的我們無法全然發揮。因為我們仍然和土星週期有所連結。透過自我觀照的意識，我們因而發展出種種方式來提高自身載體的潛能，讓我們可以活久一點，並且好好利用身體。銳的裝備則是完全不同的方式。他們不需要那些麻煩的基本配備。人體圖發生的變化，在最後的最後（也就是我們），開啟了新的開始（也就是他們）。這真的很不一樣。他們能夠掌控環境的方式遠比我們複雜得多，因為我們受到了「個人主義」的詛咒。


    有個故事叫《盲人摸象》。一個盲人握住大象的鼻子，說這是條蛇。另一個盲人摸著象腿，說這是棵樹。伍群就是那頭大象。象鼻和象腿說的是什麼呢？我們可以那樣思考嗎？我們能夠理解就這麼活著而沒有目標與功能的存在嗎？沒有能力做任何事？這樣的存在如果沒得到幫助就會死亡，我們可以想想這代表什麼。


    你會傾向以看待人類的方式來看他們，但你不能這麼做。事實上，他們什麼都不是。他們是象鼻，也可能是象腿，但這不是重點。你要留意的是大象。這才是真正的核心。人類該怎麼理解呢？若要找出類似的存在，我們會想到的可能是植物人；但事實上，我們必須面對的是伍群這頭大象。當他們來到這世界，可以把他們想像成「裝成一包的肉」，因為他們看起來就是這樣。試想看看：當你把其中三個帶到一起，他們成了一頭擁有可怕能力的大象時，那會是什麼情況。


    光憑研究銳的設計並無法探討意識伍群。化為意識的不是他們，他們只是參與過程。這很像觀察你的心智。他們都會觀看他們的心智，但並沒有所謂的心智，只有資源的運用。相信我，伍群會非常擅長運用資源。


    我們正邁向這一回合尾聲的特殊事件。我們將成為整體生命潛能的一部分。宇宙整體將接收其唯一的個性。而我們現正經歷的這一切乃是整體意識的準備工作。包括銳與演化，一切都是關於如何臣服於唯一的個性，如何讓這個過程盡善盡美。在本書接下來的梵天之夜與玉龍（即地球生命終結後出現的形體）的章節，我們會看到這個浩瀚的宇宙將被賦予唯一的個性。


    我們抵達了某個終點。某種意義上，我們來到了自私的終點。我們處於故事的尾聲，上頭寫著「你得自個兒到達那兒！」所有發展出來的基礎架構，都是為了演化的進程。我們就快就會成為明日黃花。銳被我們生下，看來也像我們，但他們和我們完全不同，我們必須明白這點。


    現在這個進化舞台，展現出個性得以棲於形體的可能性。這是關於宇宙大爆炸這個起源的故事；事實上，班水晶與圖水晶是兩顆設計水晶。真正的個性水晶還沒出現。我們的個性水晶只是真正的個性水晶的「替身」。我們每個人都是一個實驗，用來驗證獨特的個性是否能真實展現。這也是我們身而為人的目的。當我們進入九中心的身體，明顯地，個性能夠在形體中運作，而現在演化走到了下一步：個性可以是諸多形體的中心點嗎？你因此得到了更深刻而強大的力量。這個階段的影響很廣泛，但與此同時，當你從整體角度觀察，這也只是個小舞台。而這正是我們要前往的地方。我們所迎向的未來，不同的形體各自擁有完美的獨特性，而它們一起讓意識有了棲身之所。這是為了最終的自我意識原則而存在的完美形體。


    宇宙就是意識。這是相當重要的事。當我們坐在黑暗裡，好奇著「宇宙整體之光何在？」時，光就出現在這部深刻的內在電影的尾聲，伴隨著超過二十億年後的宇宙誕生而來。


    相較於人類處理訊息的方式，伍群的資訊運用力強得驚人。可別以為這些銳嬰兒會缺東缺西，一旦連結成伍群，他們就無所匱乏。他們的世界沒有我們的那些疆界。只要你躲在門後，就沒人會發現你，但伍群卻看得見你。伍群並非真的「看見」，但就是知道你身在何處。不只是知道你的位置，還知道你的心率、知道你正散發什麼樣的化學反應——還有一大堆的事——但伍群不會像我們的心智那樣詮釋一切。伍群很不可思議。


    尼安德塔人是怎麼滅亡的？是克羅馬儂人殺光他們的嗎？我們不知道。他們會像我們看待猴子一般看待他們嗎？他們沒有欲望。他們不具策略性，他們的生活風格極為不同，可能會類似任何一種食草的哺乳類，以被動的方式與他們的世界互動。那是屬於他們的時代嗎？他們是因為繁殖力下降而滅絕嗎？抑或是全部加起來的結果？顯然，人類的生育力將越來越低，但人類顯然也將繼續存在，直到
    1300 年後這一回合結束。滅絕不會匆促發生。尼安德塔人和克羅馬儂人曾在現今的西班牙等地共同生活了大概兩萬年。當人類發現第一組伍群出現時，會採取「獵巫行動」嗎？我們也不知道。無論我們談了多少這類話題，仍沒有人能夠想像，最後遇見這個「東西」以及他的個性時，會有多麼驚人。


    伍群總想跟類似的伍群在一起。就好像人類會在各個城市和區域，集結成不同文化和語言的群體。那是伍群喜愛的。銳的伍群會尋找其他的銳伍群。當你將 81 個銳小孩湊在一塊兒，這就是他們可以真正消滅人類的時候。Ra
    曾推測，只要地球還存在，我們就永遠不會看到 81 個銳湊在一起，但說真的，天曉得？81 是個神奇的數字。它是可以長期運作的基因庫的基礎。只要你建立了這樣的基因庫，它就能成長並主宰所處環境。


    如果我們能進入另一個回合（以前有過很多回合，不是只有一個而已），銳會是擁有十一個能量中心的存在。九中心形體只是個過渡期。我們拋下七中心版本，目標是到達十一中心形體。要實現這個目標，你需要在這一側與另一側都能起作用的基礎結構。也就是橋樑。對銳來說，順服根本不是問題，他們也不會去問「我該成為這個伍群的一部分嗎？」他們不是人類。沒有「策略」。沒有個體。他們是完美的收集者，他們的完美造就了伍群超級強大的表現。如果你湊齊了
    81 組伍群，他們將會控制一切，並將擋路的東西全數推開。


    一組運作的銳伍群和單一人類完全無法相比。我試著保持樂觀來看待銳的本質，以及人類可能會如何與之互動，但是談到人類的本性時，你也必須要客觀務實地看待。人類必須活出策略的完美與可能性，因為「程式」發現到：發揮自我觀照意識的潛能，是生物形體最有效的生存方式。當個生物形體真的有夠麻煩啊！想想那些必須為了別的物種的生存而死去的其他生物。看看你每天花費多少時間來處理身為生物的一切難題，又得發展多少策略來活下去。我們人類是有史以來最厲害的生物。那麼，銳呢？


    面對生物，你不可能放棄策略。因為如果缺乏策略性，你就會死。而意識伍群則是最強大的策略體。伍群會照顧其組成成員。人類的伍群並非意識。所以，我們沒有被鎖定在其中。我們這輩子都在進出伍群。我們就像熔岩燈一樣不斷變形。我們都是巨大的生命程式的組成元件，而身為元件——就演化的觀點來說——我們在學習如何共處。我們正朝著共性、合一的方向發展。不過，那當然不是我們人類。


    在梵天之夜後，個性水晶會降臨並穿入宇宙（類似於我們的個性水晶穿入身體的子宮），只有到那時候，萬物才會被植入個性水晶——實際上是唯一的個性水晶。


    我們是巨大意識的作業。微中子海遍布已知宇宙的整個海岸。它無處不在。這一切就只是個龐大的意識。而它仍是一種形體，邊運作邊準備著。


