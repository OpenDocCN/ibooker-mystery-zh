- md: "# 受孕的魔法\n\n  銳擁有個性水晶和設計水晶。它們同樣是班。在外側的班，是設計水晶。圖是一顆卵。\n\n  孩子的個性水晶還沒進到身體。設計水晶是天生的二元體。圖是「細胞」，班是「基礎」。當它們在幾何軌跡中相遇，便碎裂開來。\n\
    \n  當班和圖在幾何軌跡中相遇，它們碎裂開來。幾何軌跡線從我們無從想像的遙遠地方延伸出來。一種超乎尋常的壓縮，在一瞬間爆炸，然後創造了極高的熱度。如果你能想像太陽有多熱，那我們所談的就是十億百億個太陽的炙熱。當這樣的熱度出現，也就有了光。\n\
    \n  我們每個人都被賦予那些水晶的其中兩個碎片。那兩顆主要水晶的碎裂，播下了宇宙擴張的種子，讓宇宙得以接收並過濾意識場。\n\n# 分形線與中心\n\n\
    \  主磁單極位於班的核心。它座落在孩子內部某處，是最偉大的奧祕，那是宇宙之愛與永恆合一之地。\n\n  如果你見過水晶破裂後的小碎片，你也就看過了分形線。每顆水晶破裂成幾兆幾兆個碎片，但有一塊被稱為「中心」（the\
    \ Centre）。中心並非位於正中央，但它與還沒碎裂前的完整水晶具有同樣的特質，也是唯一有此特質的水晶。想像自己握著那顆還沒破碎之前的水晶去照光，它會投射出和破碎後的這顆中心水晶完全相同的光線路徑。分形線從中心往外流動著。中心代表的是一顆微觀的水晶，確實和整體有一樣的潛質。\n\
    \n  在大爆炸碎裂之前，環繞著中心並與中心相接的那批水晶，都位在第一代的分形線上。中心所能直接傳訊及影響的只有這一批水晶。訊息都是沿著這些分形線，在宇宙間流動。\n\
    \n  圍繞在中心周遭的水晶形成一個分層，而接觸到此分層的另一批水晶，則是第二代的分形線，以此類推向外延伸。\n\n  例如，如果你此生遇到的某人位於你的第一代分形線上，這表示他們的個性水晶在大爆炸碎裂之前與你的水晶相接。如果他們是第二代的分形線，那就是說有另一顆水晶介於你和他們之間。\n\
    \n  宇宙具有層級，但那和虛榮無關。關於訊息應該如何流動，存在著一條法則。訊息總是由中心沿著所有分形線向外流動。你能真正影響的只有那些在你的分形線上的人，當然你也受他們影響。當某人離你越近，影響就越深。這是需要認清的一個重點。你所接收的最深刻影響，或是你所展現的最強影響力，永遠只會來自或發生在你分形線上的某人。我們生命中的一切人事物，總與碎裂的那刻有關；分形線就是在那一刻形成的。你的心智看不到分形線，這也是為什麼你不能信任由心智所判斷的一切。\n\
    \n  人類的階級概念是徒勞無用的，那樣的概念源自大多數宗教信仰對小孩的洗腦灌輸。並不是越靠近中心（也就是他們認為的「神」）就越重要。最靠近「你」的水晶永遠是最要緊的。\n\
    \n  讓我們用立體方式來思考這件事。如果你弄碎一個物體，它會向四面八方碎裂。然而，它的碎裂並不是均等的，就跟「中心」並不在正中間一樣不平均。所以，我們就假設中心位於物體的底部來舉例。這代表某些分形線會比別的更短。換句話說，會有從遠端出現的長線，也會有較短的近端線，而訊息是沿著分形線流動。假定我有某些知識，而你在我的分形線上，然後你接收到這個知識。你會從自己身上把這些知識傳給你的分形線上的某人，以此類推，分形線有多長，就會傳得多遠。\n\
    \n  好好琢磨這件事：訊息會隨著你在分形線上的行動而有所改變。地球上一定有一群人能明白愛因斯坦提出的理論，這點顯而易見。但這是非常有限的分形。這個分形隨著時間降階，最後出現的，就是一群穿著印有「E=mc²」的T恤，但不知道那代表什麼的孩子。最初的訊息在沿著分形移動時不斷改變，以致喪失，事實上，那不算「耗損」而是「轉化」。這就是程式，就是意識演變的方式。\n\
    \n  每顆水晶沿分形線前進，並依其獨有的意識過濾程序來增添訊息。如果你理解這點，就會發現意識並非從中心出現的。沒有什麼「全知的」中心，也沒有所謂的神明。意識只是結果，由一顆顆獨立水晶過濾沿著分形線流動的訊息而來。沿分形線而下的最後一顆水晶，其重要性不亞於中心或較靠近中心的其他水晶。如果你的水晶收到的訊息直接來自中心，那對你就毫無用處。訊息必須經過與中心相連的分形線上的所有水晶加工後，才會具有價值。\n\
    \n  你可以把那些水晶想成數據流（我們稱為微中子）的資訊解碼器，在同一時間會根據你獨特的水晶增添訊息。包括你的水晶在內，所有水晶都是宇宙意識的創造者。\n\
    \n  你必須了解到：我們每個人攜帶的水晶從一開始就存在。如果你能把我們的個性和設計水晶放回原處，最後得出的是破碎前的班與圖。我們是整體的各個層面。獨特的碎裂面。因此，如果某天有人來到你面前對你說：「我覺得你擁有老靈魂！」「你也一樣啊！」你可以這麼回覆。你的個性水晶在\
    \ 140 億年前就存在，並非每一顆水晶都等同於整體，而是要表現整體，每一顆水晶都是必要的。所以，天底下沒有什麼好虛榮自大的，這點再清楚不過了。\n\n \
    \ 在大爆炸的破裂後，出現了光，電子以光速往外移動，照亮了黑暗。這股能量波將圖水晶的大部分剝離掉，隨著熱度下降，能量開始凝結成形，環繞在圓的細胞周圍。第一批基本元素就此形成，宇宙體（孩子）的建構於焉展開。圖建構身體，班建構孩子的腦。水晶束將在\
    \ 1300 年後開始往天衛四①移動，在那之前，我們的太陽系是這個宇宙大腦的中心，地球則是孩子的設計水晶所在之處。\n\n  ①天衛四（Oberon）是天王星衛星之一，由發現天王星的天文家威廉·赫雪爾（Friedrich\
    \ Wilhelm Herschel）於西元1787年發現，這是他發現的第四顆天王星衛星。第一至四號衛星皆由發現者的兒子約翰·赫雪爾命名。Oberon是歐洲傳說中的妖精之王，莎士比亞的《仲夏夜之夢》也曾出現以此為名的妖精。\n\
    \n# 微中子——星辰的氣息\n\n  星星產製出微中子，它們是意識的源頭。微中子是意識的介質，就像電腦裡的資料。但不要誤將來自星星的資料解讀為意識。那並不完整。唯有當微中子穿過所有的水晶，我們才有辦法將意識視為整體。微中子藉由穿過水晶的過程，創造宇宙的意識。所有的水晶（包括你和我擁有的）無時無刻透過自身獨有的樣貌來增添並改變微中子訊息，整體因此誕生。群星所產製的只是其中一部分，那不過是整個龐大程序的開端。我們在地球上所接收到的微中子，有70%來自太陽。我們生活在非常濃密的意識海之中。如果我們能看見微中子，那麼我們就看不見其他東西了。單單是太陽散發的微中子，每秒大約有640億顆穿過每平方公分的面積。微中子攜帶的訊息會透過我們的意識水晶以獨特的形式過濾。水晶一次接收一個微中子。現在你可以明白為什麼我們的水晶被稱為意識水晶了。它們不僅過濾意識，也藉由修改微中子流、添附其獨特面向來創造意識，再以近乎光速的速度向外四射。\n\
    \n  宇宙中只有4.6%是原子，其他都是暗物質與暗能量。微中子具有質量（不到電子的百萬分之一），並以近乎光速移動且穿透萬物。\n\n  微中子藉由穿透萬物，在通過意識水晶（暗物質）時，和水晶交換訊息。它們往四面八方移動並穿透一切。我們生活在意識海裡，微中子為其介質，而水晶進行過濾。你可以稱它們所過濾的是「程式」。這套程式建構了孩子，而宇宙裡的所有水晶不斷修改微中子訊息，來維護程式運作。\n\
    \n  就算有一面厚達一千光年的鉛牆，也無法讓微中子降速。微中子能穿透萬事萬物，是非常了不得的東西。\n\n  帶著質量的微中子就像張網，編織出一片訊息海，將包括我們在內的所有形體綁在一起。\n\
    \n  ①此處所稱 640 億顆的微中子與作者在 40 頁所提到的 650 顆有所差異，僅依原文譯出。\n\n# 星辰\n\n  有超過20億年的時間，磁單極與設計水晶一直是一體。有些星星比初始點還古老。圖與班並非在真空中相遇。它們會合於內部，而內部早已存在。那兒有面星牆。在遙遠的某一天，當星星開始逝去，它們將成為敵人。在那之前，它們是孩子最大的盟友。\n\
    \n  有些星星早在起始之前便已存在，那是比宇宙還古老的星星。圖與班並非在真空中相遇。那兒有面掛著星星的牆。宇宙以及宇宙在外頭那無以名狀的部分之間有著一條連結。入口由星辰控管。如果以母親與嬰兒的概念來看（這是個非常鬆散的比喻，所以要當心），你看到的是臍帶。\n\
    \n# 開始之前的起點\n\n  有一條幾何軌跡線從遙遠的地方延伸過來，我們無從想像。碎裂的二元，由磁單極抓著，乘駕不思議的能量波，與那條線相接。\n\n\
    \  相較於其他因碰撞而衝出的一切，水晶束——大部分的班水晶碎片與磁單極——移動緩慢。能量波剝除了絕大多數的圓水晶碎片。隨著熱度下降，能量開始凝結成形，環繞在圓的細胞層面。第一批基本元素就此形成。宇宙體的建構於焉展開。\n\
    \n  遠早於這個宇宙出現之前，就有一條幾何軌跡線。但對我們來說，永遠都有個難解之謎，將某個時間或地點鎖上，讓我們無法往前更進一步。那條線是一根微中子弦，這表示有個意識的編程媒介，超越了「無法穿越的環」，並與我們接觸。這種說法有點危險，因為那打開了一扇門，讓上帝的手指穿過屋頂而下。\n\
    \n  儘管如此，你也大可不用這麼想。我確實認為，在這裡發展的意識，在初期階段就被另一個更加古老、存在於初始之前的意識賦予了訊息。所以，這條弦一直都在。在初始前就存在著。\n\
    \n  關於物理學與宇宙學，每個人都有一趟關於物理學與宇宙學的旅程，某種程度上這是一種無中生有的奇蹟。但事實並非如此。物理學說的「無物」，只是因為你看不見，畢竟，得要有光線你才能看見東西。沒有光就無法看見。\n\
    \n  班從外部而來。它必須進來。所以，你開始明白班擁有磁單極的原因。當你有了磁單極，就有辦法駕駛了。你有了駕駛員。你有了終極司機，清楚知道要往哪兒去。班水晶內建了這個主磁單極，知道該往何處去找尋圖水晶。\n\
    \n  在程式的開端，我們看的是兩種不同類型的設計形體機制。其一是圖水晶，它單純將一切物質，以及連結著所有材料的微中子潛質攪和在一塊。這表示有個意識的程式媒介，超越了與我們接觸的「無法穿越的環」。我們擁有的另一個機制則是班水晶，它來自外部，擁有潛在的組織能力，能透過微中子場組織其他的設計水晶，再以磁單極將它們維繫在一起。生命的程式就此真正啟動。\n\
    \n  班水晶的某些碎片，最後將扮演個性水晶的角色，或者講得再精確點，是「模擬」個性水晶。人類擁有的個性水晶就是一例。我們還得注意的是：所有控制我們意識場的工具——包含星星與月亮在內——這些天體都被賦予了班水晶。就是班水晶與微中子程式連接的潛能，給了我們所有思維，將我們帶到這個關乎意識場本質的奇蹟裡。\n\
    \n# 班\n\n| 水晶體 | = | 設計水晶 |\n| :--- | :--- | :--- |\n| 圍繞著「中心」的核心區 | = | 個性水晶\
    \ |\n\n# 啟動生命程序\n\n  圖水晶和它的反微中子核心，是孩子身體的構築者。\n\n  在啟動之前，核心的程式規則是壓縮與休眠。\n\n  在衝擊之後，比賽正式開始。\n\
    \n  首先是刺穿黑暗的光。\n\n  弦則緊接在後，鋪設了一條條的線。\n\n  請記住，早在開始之前，弦就一直存在著。\n\n  圖水晶的碎裂，是「路徑的分流」。\n\
    \n  這個宇宙，就是穿過無盡的碎裂之鏡，映照而生的變動影像。\n\n  意識、覺察、愛、方向——所有可以經驗的形式——都源自班水晶。\n\n  班水晶不是陽，而是陰。光以外的萬物，都是陰。而光也只是幻象。圖建構身體。班創建腦部。銳蓋起神殿。方舟是空的。我們還沒到達那個地方。\n\
    \n  宇宙進化的階段，以猛烈狂暴的事件開啓。水晶束在幾十億年裡，由設計水晶內的磁單極指引，朝著展現愛的可能性前進，最終抵達開創的源頭，與星星之牆相遇。愛在那一天逝去。而那正是存有的起點。當它們再次相遇，死亡就會降臨，黑暗更勝梵天之夜❶，對孩子而言，那就是終結。\n\
    \n  水晶束滲透星牆的核心。星星因裂縫而崩解。主設計水晶碎裂，而主磁單極也與之脫鉤。銳的個性水晶因此誕生。磁單極沖離成群的破裂水晶，捲入宇宙的自旋。當蘇菲的苦行僧狂舞❷，就是在歡慶那創建了意識的愛。\n\
    \n  在碎裂之後，有超過二十億年的時間，磁單極和設計水晶仍是一體的。隨著磁單極的引領，最終它們與星牆相會，抵達創始的原點。當再次發生，主磁單極也因此脫離了主設計水晶。\n\
    \n  這另一次碎裂的發生，主角是磁單極。我們在此看到真正的形體原則的起點。這和細胞無關。細胞早已成形並持續擴展中。這次是程式媒介的啟動。透過碎裂的班水晶與磁單極，開始了控制與程式的過程；在這層意義上，被賦與意識的形體，具備了最終極的性能，事情就是這樣。\n\
    \n  愛在那天消逝。磁單極與設計水晶是真正的一體。它們分離的那刻，我們成為愛的表現。我們不是愛。我們無法擁有愛，我們是愛的副作用。我們是愛的展現。\n\n\
    \  班水晶失去了愛，但找到了形體。脫離形體時，設計水晶是休眠的。在形體中，它則負責構建。\n\n  核心區的碎片，全都開始顯化各自的模樣。舉例來說，「狗」③水晶建構了太陽的形體。當它和星星融為一體，水晶束還有許多其他的成份存在。在事件發生前，「群集」是主磁單極的最佳寫照。磁單極的力量是吸引力。在此階段，它的所有面向——磁單極與主要設計水晶相調和——都是一體的。當設計水晶破裂，和諧也被打破。磁單極的法則是把萬物抓住。碎裂事件動搖了磁單極群集。宇宙旋轉的威力，遠遠大過主磁單極維繫群集的能力。設計水晶破裂後，每個碎片都被埋入一面從群集分離出來的磁單極。\n\
    \n  ①印度神話中，梵天是創造之神，和保護神毗濕奴及破壞神濕婆不間斷地為世間帶來生死循環。當梵天的創造行為停止，世界將融入黑暗，也無一物得以留存，這就是梵天之夜。\n\
    \  ② Dervish dances 為蘇菲派的儀式。\n  ③「狗」與「駱駝」是兩顆位於太陽的特殊水晶，也是中心的第一代分形。後續章節會有進一步說明。\n\
    \n# 死亡與重生總在發生\n\n  磁單極脫離設計水晶，是存在的開始。它們再次相會時死亡就會降臨——那是比梵天之夜更暗的黑——因為那將是孩子的終結。聲音從未吐露孩子會存在多久。聲音只有說明它出現在超越自己本身的世界，不論那到底代表什麼。\n\
    \n  可以假設的是，或許它將會存在幾十或幾百億年（天曉得到底多久），但它在某一刻也必然會死去。規模不是重點——死亡永遠都在。而重生也總在發生。這是個無止盡的程式。\n\
    \n# 中心\n\n  中心有兩個。圖中心呈現宇宙的身體，班中心則顯示宇宙的心智。圖中心棲身於地球核心區已有 24 億年之久。目前的「總體回合」（Global\
    \ Round）約莫從西元前 16000 年開始，在這段期間，圖中心已經化身為人類形體 62 次。班中心棲身於太陽的核心，位於弦的源頭。在這個回合裡，當班未待在太陽時，也經歷過八次的轉生。\n\
    \n  班遺失了愛，但找到了形體。不在形體內，它休眠。進入形體時，它創建。班水晶坐落於太陽核心並過濾弦線。但弦並非由它創造。那是狗的工作。中心是我們意識的源頭，不代表它創造了整體意識。它只是龐大進程的開端。雖然中心確實沿著分形線而下，對一切產生影響，但只有當包括你在內的每一顆水晶，都善盡過濾之責，於自身所在的分形線上，接收前頭的水晶訊息，並加以解碼，整體意識才會存在。因此，是所有的水晶共同創造了意識的訊息之海。意識從未靜止不動。狗水晶產生微中子，其他水晶則沿著分形線持續改變微中子流。永遠在接收、改變並傳送訊息。也因此，意識持續進行演化。意識並非絕對。唯一絕對的只有我們水晶的過濾潛能。\n\
    \n  這是我們稱之為意識水晶的原因。隨著時間的推移，這個程式會不斷編寫自己的密碼和自己的軟體。它會自我進化。因此，我們全都是別無選擇的創造者。我們都受整體的某個面向所牽動。不會只有一個真實。\n\
    \n# 駱駝與狗\n\n  駱駝水晶與狗水晶把中心罩在中間。這是兩顆特別的水晶，它們住在太陽裡，與我們的意識有關。只有駱駝與狗是中心的第一代分形。其實太陽裡共有三顆水晶，這個事實讓我們了解到，自古以來各種信仰體系裡不同的三位一體觀念：像是印度的梵天—毗濕奴—濕婆，或聖父—聖子—聖靈等等。不過，根據基督教神話，《新約聖經》寫到：因為某種理由，天堂不歡迎狗①，我覺得這很有趣也頗奇怪。為此我們或許應該重新思考。狗代表了人類意識的基礎程式。太陽之犬，是我們的知識源頭。\n\
    \n  駱駝和狗會輪流入世，大約每一萬九千年一個回合，但不會化身為人形或銳。狗顯化了太陽的本體，並且維持其生命。狗生產了微中子流，確實地維持太陽的本體。\n\
    \n  它和我們這些旁人無關，其焦點只放在維持太陽的能量。核融合的進程就是它的生命程序。出自狗水晶的微中子訊息，會被中心過濾，濾篩後的才是真正的程式源頭，並為太陽系所用。\n\
    \n  在目前這一回合，狗尚未轉生入世。微中子弦是由狗所產生，因此當它化身在地球上時，微中子弦將無法從這裡生產。這表示，在天文物理的層次上，太陽的核融合引擎會有噴發的現象。當這樣的情況發生，對地球而言是嚴重的創傷。因為紫外線能量波的輸出量大幅增加，太陽本體會受到干擾。狗通常是以較低階的生命形體入世，且從未在形體內超過三個月。狗下一次的降生將會在\
    \ 2084 年 7 月。\n\n  狗也許將化身為生命僅有 18 秒的微生物。聲音並沒有說。但假使它活超過 10 分鐘，那麼從邏輯上來說，這將對地球帶來非常干擾的影響。不過，以前發生過，但最近這一萬九千年裡沒發生過，天知道過去發生了什麼，結局又是如何。\n\
    \n  這不是經常發生的事，顯然是個特別的里程碑。當狗化身入世時，就不會有來自太陽的訊息。換句話說，一旦狗化身了，太陽的程式就會停止，而屆時唯一存在的恆星程式，就是來自木星微中子的編碼指令。這種情況發生時，月交點將會最顯著的活化。我們無從得知，身處缺乏太陽程式印記的世界會是什麼感覺。畢竟我們的編碼有七成來自太陽。想想將來那些出生時不會接收到太陽印記的孩子，我們真的不知道那意味著什麼。\n\
    \n  而接著會有什麼副作用也很難說。舉例來說，地球的臭氧層據信是因為溫室效應與環境污染的副作用，而巨量地耗損。臭氧層破洞讓紫外線射入只是問題之一。進來的紫外線會造成不孕與致育。所以，高能量的紫外線放射及臭氧層的持續破裂，事實上，也表示這段時間可能對生命造成大量的傷害。其實很難對此做出什麼預言，因為\
    \ Ra 沒有得到任何解釋，只被告知「會有重大創傷」而已。這將帶來巨大的動亂，也關係到人類的幾何軌跡。\n\n  ①原文的「dogs are not welcome\
    \ in heaven」並未出現在《新約聖經》中。但聖經中的確有許多將狗視為不潔、卑劣的語句出現。"
  mdcn: "# 受孕的魔法\n\n  銳擁有個性水晶和設計水晶。它們同樣是班。在外側的班，是設計水晶。圖是一顆卵。\n\n  孩子的個性水晶還沒進到身體。設計水晶是天生的二元體。圖是「細胞」，班是「基礎」。當它們在幾何軌跡中相遇，便碎裂開來。\n\
    \n  當班和圖在幾何軌跡中相遇，它們碎裂開來。幾何軌跡線從我們無從想像的遙遠地方延伸出來。一種超乎尋常的壓縮，在一瞬間爆炸，然後創造了極高的熱度。如果你能想像太陽有多熱，那我們所談的就是十億百億個太陽的炙熱。當這樣的熱度出現，也就有了光。\n\
    \n  我們每個人都被賦予那些水晶的其中兩個碎片。那兩顆主要水晶的碎裂，播下了宇宙擴張的種子，讓宇宙得以接收並過濾意識場。\n\n# 分形線與中心\n\n\
    \  主磁單極位於班的核心。它座落在孩子內部某處，是最偉大的奧祕，那是宇宙之愛與永恆合一之地。\n\n  如果你見過水晶破裂後的小碎片，你也就看過了分形線。每顆水晶破裂成幾兆幾兆個碎片，但有一塊被稱為「中心」（the\
    \ Centre）。中心並非位於正中央，但它與還沒碎裂前的完整水晶具有同樣的特質，也是唯一有此特質的水晶。想像自己握著那顆還沒破碎之前的水晶去照光，它會投射出和破碎後的這顆中心水晶完全相同的光線路徑。分形線從中心往外流動著。中心代表的是一顆微觀的水晶，確實和整體有一樣的潛質。\n\
    \n  在大爆炸碎裂之前，環繞著中心並與中心相接的那批水晶，都位在第一代的分形線上。中心所能直接傳訊及影響的只有這一批水晶。訊息都是沿著這些分形線，在宇宙間流動。\n\
    \n  圍繞在中心周遭的水晶形成一個分層，而接觸到此分層的另一批水晶，則是第二代的分形線，以此類推向外延伸。\n\n  例如，如果你此生遇到的某人位於你的第一代分形線上，這表示他們的個性水晶在大爆炸碎裂之前與你的水晶相接。如果他們是第二代的分形線，那就是說有另一顆水晶介於你和他們之間。\n\
    \n  宇宙具有層級，但那和虛榮無關。關於訊息應該如何流動，存在著一條法則。訊息總是由中心沿著所有分形線向外流動。你能真正影響的只有那些在你的分形線上的人，當然你也受他們影響。當某人離你越近，影響就越深。這是需要認清的一個重點。你所接收的最深刻影響，或是你所展現的最強影響力，永遠只會來自或發生在你分形線上的某人。我們生命中的一切人事物，總與碎裂的那刻有關；分形線就是在那一刻形成的。你的心智看不到分形線，這也是為什麼你不能信任由心智所判斷的一切。\n\
    \n  人類的階級概念是徒勞無用的，那樣的概念源自大多數宗教信仰對小孩的洗腦灌輸。並不是越靠近中心（也就是他們認為的「神」）就越重要。最靠近「你」的水晶永遠是最要緊的。\n\
    \n  讓我們用立體方式來思考這件事。如果你弄碎一個物體，它會向四面八方碎裂。然而，它的碎裂並不是均等的，就跟「中心」並不在正中間一樣不平均。所以，我們就假設中心位於物體的底部來舉例。這代表某些分形線會比別的更短。換句話說，會有從遠端出現的長線，也會有較短的近端線，而訊息是沿著分形線流動。假定我有某些知識，而你在我的分形線上，然後你接收到這個知識。你會從自己身上把這些知識傳給你的分形線上的某人，以此類推，分形線有多長，就會傳得多遠。\n\
    \n  好好琢磨這件事：訊息會隨著你在分形線上的行動而有所改變。地球上一定有一群人能明白愛因斯坦提出的理論，這點顯而易見。但這是非常有限的分形。這個分形隨著時間降階，最後出現的，就是一群穿著印有「E=mc²」的T恤，但不知道那代表什麼的孩子。最初的訊息在沿著分形移動時不斷改變，以致喪失，事實上，那不算「耗損」而是「轉化」。這就是程式，就是意識演變的方式。\n\
    \n  每顆水晶沿分形線前進，並依其獨有的意識過濾程序來增添訊息。如果你理解這點，就會發現意識並非從中心出現的。沒有什麼「全知的」中心，也沒有所謂的神明。意識只是結果，由一顆顆獨立水晶過濾沿著分形線流動的訊息而來。沿分形線而下的最後一顆水晶，其重要性不亞於中心或較靠近中心的其他水晶。如果你的水晶收到的訊息直接來自中心，那對你就毫無用處。訊息必須經過與中心相連的分形線上的所有水晶加工後，才會具有價值。\n\
    \n  你可以把那些水晶想成數據流（我們稱為微中子）的資訊解碼器，在同一時間會根據你獨特的水晶增添訊息。包括你的水晶在內，所有水晶都是宇宙意識的創造者。\n\
    \n  你必須了解到：我們每個人攜帶的水晶從一開始就存在。如果你能把我們的個性和設計水晶放回原處，最後得出的是破碎前的班與圖。我們是整體的各個層面。獨特的碎裂面。因此，如果某天有人來到你面前對你說：「我覺得你擁有老靈魂！」「你也一樣啊！」你可以這麼回覆。你的個性水晶在\
    \ 140 億年前就存在，並非每一顆水晶都等同於整體，而是要表現整體，每一顆水晶都是必要的。所以，天底下沒有什麼好虛榮自大的，這點再清楚不過了。\n\n \
    \ 在大爆炸的破裂後，出現了光，電子以光速往外移動，照亮了黑暗。這股能量波將圖水晶的大部分剝離掉，隨著熱度下降，能量開始凝結成形，環繞在圓的細胞周圍。第一批基本元素就此形成，宇宙體（孩子）的建構於焉展開。圖建構身體，班建構孩子的腦。水晶束將在\
    \ 1300 年後開始往天衛四①移動，在那之前，我們的太陽系是這個宇宙大腦的中心，地球則是孩子的設計水晶所在之處。\n\n  ①天衛四（Oberon）是天王星衛星之一，由發現天王星的天文家威廉·赫雪爾（Friedrich\
    \ Wilhelm Herschel）於西元1787年發現，這是他發現的第四顆天王星衛星。第一至四號衛星皆由發現者的兒子約翰·赫雪爾命名。Oberon是歐洲傳說中的妖精之王，莎士比亞的《仲夏夜之夢》也曾出現以此為名的妖精。\n\
    \n# 微中子——星辰的氣息\n\n  星星產製出微中子，它們是意識的源頭。微中子是意識的介質，就像電腦裡的資料。但不要誤將來自星星的資料解讀為意識。那並不完整。唯有當微中子穿過所有的水晶，我們才有辦法將意識視為整體。微中子藉由穿過水晶的過程，創造宇宙的意識。所有的水晶（包括你和我擁有的）無時無刻透過自身獨有的樣貌來增添並改變微中子訊息，整體因此誕生。群星所產製的只是其中一部分，那不過是整個龐大程序的開端。我們在地球上所接收到的微中子，有70%來自太陽。我們生活在非常濃密的意識海之中。如果我們能看見微中子，那麼我們就看不見其他東西了。單單是太陽散發的微中子，每秒大約有640億顆穿過每平方公分的面積。微中子攜帶的訊息會透過我們的意識水晶以獨特的形式過濾。水晶一次接收一個微中子。現在你可以明白為什麼我們的水晶被稱為意識水晶了。它們不僅過濾意識，也藉由修改微中子流、添附其獨特面向來創造意識，再以近乎光速的速度向外四射。\n\
    \n  宇宙中只有4.6%是原子，其他都是暗物質與暗能量。微中子具有質量（不到電子的百萬分之一），並以近乎光速移動且穿透萬物。\n\n  微中子藉由穿透萬物，在通過意識水晶（暗物質）時，和水晶交換訊息。它們往四面八方移動並穿透一切。我們生活在意識海裡，微中子為其介質，而水晶進行過濾。你可以稱它們所過濾的是「程式」。這套程式建構了孩子，而宇宙裡的所有水晶不斷修改微中子訊息，來維護程式運作。\n\
    \n  就算有一面厚達一千光年的鉛牆，也無法讓微中子降速。微中子能穿透萬事萬物，是非常了不得的東西。\n\n  帶著質量的微中子就像張網，編織出一片訊息海，將包括我們在內的所有形體綁在一起。\n\
    \n  ①此處所稱 640 億顆的微中子與作者在 40 頁所提到的 650 顆有所差異，僅依原文譯出。\n\n# 星辰\n\n  有超過20億年的時間，磁單極與設計水晶一直是一體。有些星星比初始點還古老。圖與班並非在真空中相遇。它們會合於內部，而內部早已存在。那兒有面星牆。在遙遠的某一天，當星星開始逝去，它們將成為敵人。在那之前，它們是孩子最大的盟友。\n\
    \n  有些星星早在起始之前便已存在，那是比宇宙還古老的星星。圖與班並非在真空中相遇。那兒有面掛著星星的牆。宇宙以及宇宙在外頭那無以名狀的部分之間有著一條連結。入口由星辰控管。如果以母親與嬰兒的概念來看（這是個非常鬆散的比喻，所以要當心），你看到的是臍帶。\n\
    \n# 開始之前的起點\n\n  有一條幾何軌跡線從遙遠的地方延伸過來，我們無從想像。碎裂的二元，由磁單極抓著，乘駕不思議的能量波，與那條線相接。\n\n\
    \  相較於其他因碰撞而衝出的一切，水晶束——大部分的班水晶碎片與磁單極——移動緩慢。能量波剝除了絕大多數的圓水晶碎片。隨著熱度下降，能量開始凝結成形，環繞在圓的細胞層面。第一批基本元素就此形成。宇宙體的建構於焉展開。\n\
    \n  遠早於這個宇宙出現之前，就有一條幾何軌跡線。但對我們來說，永遠都有個難解之謎，將某個時間或地點鎖上，讓我們無法往前更進一步。那條線是一根微中子弦，這表示有個意識的編程媒介，超越了「無法穿越的環」，並與我們接觸。這種說法有點危險，因為那打開了一扇門，讓上帝的手指穿過屋頂而下。\n\
    \n  儘管如此，你也大可不用這麼想。我確實認為，在這裡發展的意識，在初期階段就被另一個更加古老、存在於初始之前的意識賦予了訊息。所以，這條弦一直都在。在初始前就存在著。\n\
    \n  關於物理學與宇宙學，每個人都有一趟關於物理學與宇宙學的旅程，某種程度上這是一種無中生有的奇蹟。但事實並非如此。物理學說的「無物」，只是因為你看不見，畢竟，得要有光線你才能看見東西。沒有光就無法看見。\n\
    \n  班從外部而來。它必須進來。所以，你開始明白班擁有磁單極的原因。當你有了磁單極，就有辦法駕駛了。你有了駕駛員。你有了終極司機，清楚知道要往哪兒去。班水晶內建了這個主磁單極，知道該往何處去找尋圖水晶。\n\
    \n  在程式的開端，我們看的是兩種不同類型的設計形體機制。其一是圖水晶，它單純將一切物質，以及連結著所有材料的微中子潛質攪和在一塊。這表示有個意識的程式媒介，超越了與我們接觸的「無法穿越的環」。我們擁有的另一個機制則是班水晶，它來自外部，擁有潛在的組織能力，能透過微中子場組織其他的設計水晶，再以磁單極將它們維繫在一起。生命的程式就此真正啟動。\n\
    \n  班水晶的某些碎片，最後將扮演個性水晶的角色，或者講得再精確點，是「模擬」個性水晶。人類擁有的個性水晶就是一例。我們還得注意的是：所有控制我們意識場的工具——包含星星與月亮在內——這些天體都被賦予了班水晶。就是班水晶與微中子程式連接的潛能，給了我們所有思維，將我們帶到這個關乎意識場本質的奇蹟裡。\n\
    \n# 班\n\n| 水晶體 | = | 設計水晶 |\n| :--- | :--- | :--- |\n| 圍繞著「中心」的核心區 | = | 個性水晶\
    \ |\n\n# 啟動生命程序\n\n  圖水晶和它的反微中子核心，是孩子身體的構築者。\n\n  在啟動之前，核心的程式規則是壓縮與休眠。\n\n  在衝擊之後，比賽正式開始。\n\
    \n  首先是刺穿黑暗的光。\n\n  弦則緊接在後，鋪設了一條條的線。\n\n  請記住，早在開始之前，弦就一直存在著。\n\n  圖水晶的碎裂，是「路徑的分流」。\n\
    \n  這個宇宙，就是穿過無盡的碎裂之鏡，映照而生的變動影像。\n\n  意識、覺察、愛、方向——所有可以經驗的形式——都源自班水晶。\n\n  班水晶不是陽，而是陰。光以外的萬物，都是陰。而光也只是幻象。圖建構身體。班創建腦部。銳蓋起神殿。方舟是空的。我們還沒到達那個地方。\n\
    \n  宇宙進化的階段，以猛烈狂暴的事件開啓。水晶束在幾十億年裡，由設計水晶內的磁單極指引，朝著展現愛的可能性前進，最終抵達開創的源頭，與星星之牆相遇。愛在那一天逝去。而那正是存有的起點。當它們再次相遇，死亡就會降臨，黑暗更勝梵天之夜❶，對孩子而言，那就是終結。\n\
    \n  水晶束滲透星牆的核心。星星因裂縫而崩解。主設計水晶碎裂，而主磁單極也與之脫鉤。銳的個性水晶因此誕生。磁單極沖離成群的破裂水晶，捲入宇宙的自旋。當蘇菲的苦行僧狂舞❷，就是在歡慶那創建了意識的愛。\n\
    \n  在碎裂之後，有超過二十億年的時間，磁單極和設計水晶仍是一體的。隨著磁單極的引領，最終它們與星牆相會，抵達創始的原點。當再次發生，主磁單極也因此脫離了主設計水晶。\n\
    \n  這另一次碎裂的發生，主角是磁單極。我們在此看到真正的形體原則的起點。這和細胞無關。細胞早已成形並持續擴展中。這次是程式媒介的啟動。透過碎裂的班水晶與磁單極，開始了控制與程式的過程；在這層意義上，被賦與意識的形體，具備了最終極的性能，事情就是這樣。\n\
    \n  愛在那天消逝。磁單極與設計水晶是真正的一體。它們分離的那刻，我們成為愛的表現。我們不是愛。我們無法擁有愛，我們是愛的副作用。我們是愛的展現。\n\n\
    \  班水晶失去了愛，但找到了形體。脫離形體時，設計水晶是休眠的。在形體中，它則負責構建。\n\n  核心區的碎片，全都開始顯化各自的模樣。舉例來說，「狗」③水晶建構了太陽的形體。當它和星星融為一體，水晶束還有許多其他的成份存在。在事件發生前，「群集」是主磁單極的最佳寫照。磁單極的力量是吸引力。在此階段，它的所有面向——磁單極與主要設計水晶相調和——都是一體的。當設計水晶破裂，和諧也被打破。磁單極的法則是把萬物抓住。碎裂事件動搖了磁單極群集。宇宙旋轉的威力，遠遠大過主磁單極維繫群集的能力。設計水晶破裂後，每個碎片都被埋入一面從群集分離出來的磁單極。\n\
    \n  ①印度神話中，梵天是創造之神，和保護神毗濕奴及破壞神濕婆不間斷地為世間帶來生死循環。當梵天的創造行為停止，世界將融入黑暗，也無一物得以留存，這就是梵天之夜。\n\
    \  ② Dervish dances 為蘇菲派的儀式。\n  ③「狗」與「駱駝」是兩顆位於太陽的特殊水晶，也是中心的第一代分形。後續章節會有進一步說明。\n\
    \n# 死亡與重生總在發生\n\n  磁單極脫離設計水晶，是存在的開始。它們再次相會時死亡就會降臨——那是比梵天之夜更暗的黑——因為那將是孩子的終結。聲音從未吐露孩子會存在多久。聲音只有說明它出現在超越自己本身的世界，不論那到底代表什麼。\n\
    \n  可以假設的是，或許它將會存在幾十或幾百億年（天曉得到底多久），但它在某一刻也必然會死去。規模不是重點——死亡永遠都在。而重生也總在發生。這是個無止盡的程式。\n\
    \n# 中心\n\n  中心有兩個。圖中心呈現宇宙的身體，班中心則顯示宇宙的心智。圖中心棲身於地球核心區已有 24 億年之久。目前的「總體回合」（Global\
    \ Round）約莫從西元前 16000 年開始，在這段期間，圖中心已經化身為人類形體 62 次。班中心棲身於太陽的核心，位於弦的源頭。在這個回合裡，當班未待在太陽時，也經歷過八次的轉生。\n\
    \n  班遺失了愛，但找到了形體。不在形體內，它休眠。進入形體時，它創建。班水晶坐落於太陽核心並過濾弦線。但弦並非由它創造。那是狗的工作。中心是我們意識的源頭，不代表它創造了整體意識。它只是龐大進程的開端。雖然中心確實沿著分形線而下，對一切產生影響，但只有當包括你在內的每一顆水晶，都善盡過濾之責，於自身所在的分形線上，接收前頭的水晶訊息，並加以解碼，整體意識才會存在。因此，是所有的水晶共同創造了意識的訊息之海。意識從未靜止不動。狗水晶產生微中子，其他水晶則沿著分形線持續改變微中子流。永遠在接收、改變並傳送訊息。也因此，意識持續進行演化。意識並非絕對。唯一絕對的只有我們水晶的過濾潛能。\n\
    \n  這是我們稱之為意識水晶的原因。隨著時間的推移，這個程式會不斷編寫自己的密碼和自己的軟體。它會自我進化。因此，我們全都是別無選擇的創造者。我們都受整體的某個面向所牽動。不會只有一個真實。\n\
    \n# 駱駝與狗\n\n  駱駝水晶與狗水晶把中心罩在中間。這是兩顆特別的水晶，它們住在太陽裡，與我們的意識有關。只有駱駝與狗是中心的第一代分形。其實太陽裡共有三顆水晶，這個事實讓我們了解到，自古以來各種信仰體系裡不同的三位一體觀念：像是印度的梵天—毗濕奴—濕婆，或聖父—聖子—聖靈等等。不過，根據基督教神話，《新約聖經》寫到：因為某種理由，天堂不歡迎狗①，我覺得這很有趣也頗奇怪。為此我們或許應該重新思考。狗代表了人類意識的基礎程式。太陽之犬，是我們的知識源頭。\n\
    \n  駱駝和狗會輪流入世，大約每一萬九千年一個回合，但不會化身為人形或銳。狗顯化了太陽的本體，並且維持其生命。狗生產了微中子流，確實地維持太陽的本體。\n\
    \n  它和我們這些旁人無關，其焦點只放在維持太陽的能量。核融合的進程就是它的生命程序。出自狗水晶的微中子訊息，會被中心過濾，濾篩後的才是真正的程式源頭，並為太陽系所用。\n\
    \n  在目前這一回合，狗尚未轉生入世。微中子弦是由狗所產生，因此當它化身在地球上時，微中子弦將無法從這裡生產。這表示，在天文物理的層次上，太陽的核融合引擎會有噴發的現象。當這樣的情況發生，對地球而言是嚴重的創傷。因為紫外線能量波的輸出量大幅增加，太陽本體會受到干擾。狗通常是以較低階的生命形體入世，且從未在形體內超過三個月。狗下一次的降生將會在\
    \ 2084 年 7 月。\n\n  狗也許將化身為生命僅有 18 秒的微生物。聲音並沒有說。但假使它活超過 10 分鐘，那麼從邏輯上來說，這將對地球帶來非常干擾的影響。不過，以前發生過，但最近這一萬九千年裡沒發生過，天知道過去發生了什麼，結局又是如何。\n\
    \n  這不是經常發生的事，顯然是個特別的里程碑。當狗化身入世時，就不會有來自太陽的訊息。換句話說，一旦狗化身了，太陽的程式就會停止，而屆時唯一存在的恆星程式，就是來自木星微中子的編碼指令。這種情況發生時，月交點將會最顯著的活化。我們無從得知，身處缺乏太陽程式印記的世界會是什麼感覺。畢竟我們的編碼有七成來自太陽。想想將來那些出生時不會接收到太陽印記的孩子，我們真的不知道那意味著什麼。\n\
    \n  而接著會有什麼副作用也很難說。舉例來說，地球的臭氧層據信是因為溫室效應與環境污染的副作用，而巨量地耗損。臭氧層破洞讓紫外線射入只是問題之一。進來的紫外線會造成不孕與致育。所以，高能量的紫外線放射及臭氧層的持續破裂，事實上，也表示這段時間可能對生命造成大量的傷害。其實很難對此做出什麼預言，因為\
    \ Ra 沒有得到任何解釋，只被告知「會有重大創傷」而已。這將帶來巨大的動亂，也關係到人類的幾何軌跡。\n\n  ①原文的「dogs are not welcome\
    \ in heaven」並未出現在《新約聖經》中。但聖經中的確有許多將狗視為不潔、卑劣的語句出現。"
