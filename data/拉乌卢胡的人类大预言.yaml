    比、一等一的科幻故事。當中揉合了驚奇、恐懼與興奮。它太令人驚異了。當我握著它時, 手就像是被火燒到一樣。那也是我第一次得以看見 G 這個摺疊循環的奧祕。喔,
    G 真是了不起。我花了好多年才掌握到我在那個狀態下所繪製的這個簡單圖像。它太神奇了。書裡滿是這些符文, 這些與你相關聯的基礎符文。更勝於此的怪異之處是, 如同它們奇特的存在,
    我知道它們屬於我。某程度上, 它們屬於我。它們是我的。這不是某種被撿起來的隨機「傳真」。我很清楚我必須以完全不同的觀點來看待我的過程。順帶一提, 但不是在那一夜。


    所以, 我手握著那本書坐著, 我打開它, 看了其中一頁後把書閤上然後咯咯地笑。


    我不知道該如何描述。那就有點像是你發生了車禍但沒受傷, 然後你笑了出來的感覺。我翻閱那些書頁, 然後閤上,接著就是笑聲與驚喜。這是種驚喜。啊, 真的是驚喜。沒有「這到底打哪兒來的?」的疑問。只有這絕對的驚喜。


    接著, 當我經歷了這頭暈般的過程後, 門打開了。有些怪事是無法用合理方式理解的。沒有能打開門的風。而且門是關著的。我不知道是什麼打開了門。這也是我被「碎裂」的一部分。或許那門根本沒被打開。也可能我就只是看見它開著然後走了出去。我不知道。因為當你身處於這樣的體驗時,
    你就像在氣泡裡。氣泡是個魔法。神奇的不是你。身處


    ch12 尾聲


    259'
  - '[PAGE 269]


    於氣泡之中是種意外的機緣。是的，它很有趣，但那是個氣泡，終究是個氣泡。門開啟。我終於不再感到絞痛，這是好事，畢竟那真的有夠痛。那兒有件法蘭克在穿的披風，那是那種附帶兜帽的厚重毯棉披風。


    法蘭克身形十分高大，比我大上許多。他可能有 188 至 190 公分高而且骨架魁梧。所以，那是一件很大的外套，而我冷得要命。我不想在外面受凍，所以我伸手抓過這件披風，披在我的肩膀上後再用兜帽把頭蓋著，往外走去。


    我不知道我在外面幹什麼。我只是順著經驗之流。我走到外面，走下階梯。我發現下樓梯時，我竟然能看見眼前的我的身影的不可思議細節。你必須是住在鄉間，才能知道月亮的陰影有多令人難以置信。


    在這一刻，我肩膀上方的月亮又大又圓。走到階梯底部時，我轉過身來看著那顆滿月。當我站在那兒，望著滿月時，我又聽到那個聲音、那個「沒有都卜勒效應的飛機」了。我已品嚐過驚奇。我已體驗過興奮，但我可沒準備好要面對恐懼啊。


    有所突破是令人興奮的，但接著，你在哪裡呢？你不再身處於任何一個自己知道或了解的地方了。有個東西物理性地抓住了我，用那種大人抓著六歲小孩的方式，雙手緊抓住我的前臂與肩膀，然後把我轉過身來。就是那種感覺。那是'
  - '[PAGE 270]


    個糟糕透頂的經驗。我沒有任何辦法可以描述它。


    幸運的是，我已經禁食好長一段時間，因為我告訴你：光是現在想到那個經驗，就喚起了我心中的恐怖。


    被那樣一把抓起然後轉身。接著，更怪的事情發生了。在旋轉的同時，我可以聽見公雞、狗、馬兒和鳥——全部都在叫。狗兒吠著，而遠方某處的馬兒也嘶鳴著。在我被轉過來時，我望著東方的地平面。我看見太陽的日冕開始浮現，那是微小的、剛剛破曉的晨光。但在光裡頭，有一個炙熱的白點。一個高溫的白點——它美麗至極——就在地平線的邊緣。在右側則是一個小污點。當我看著那個熱點和旁邊的汗點時，我喪失了意識與眼界的尋常感知力。就好像是被運作中的閃光燈閃到眼睛一樣。但那個閃光燈有多重色彩與基本的模式。


    那感覺就像是我被淋浴，幾乎是沐浴在模式之中，被流動的模式、來自源頭的流動淋灑一般。持續的時間我覺得沒有超過一分鐘。但對我而言，那似乎是永恆的。我不知道我能不能活下來。對於發生在我身上的一切，我全然沒有頭緒。而被抓著轉圈的我，仍處在全然的腎上腺素狂潮中。


    當這一切停止時，陽光已布滿天空。在黎明時分，這顆太陽以不可思議的速度躍升。我聽見法蘭克從屋子走了出來。他問我在幹嘛。我對他說：'
  - '[PAGE 271]


    「你有聽到嗎？」

    「聽到什麼？」

    「你有聽到嗎？」——因為我腦中的那聲音實在太大。

    在持續了三或四個小時之後，那聲音才離開。


    那個早晨我所張望的地平線，剛好是太陽、水星與哈雷衛星的三重合相。這是我怪得可以的神祕奇遇之一。我從來不知道這種事真的會發生。我曾挖苦、嘲笑、輕視這種事。對我來說，這些故事、童話之類的玩意兒，似乎——都不是「事實」。某程度上，它們不過是失敗的心理狀態的副產品。我不相信上帝或神格。我沒有任何信仰。我跟很多人一樣，差不多就是個自戀的虛無主義者。


    但是，後來——轟隆！我的人生走到了這一夜。


    我所以為的世界全數消失。


    什麼都不見了。在那一刻，我不再相信任何事了，我辦不到。


    我理解到人們是如何盲目，他們看不見存在於每個地方持續運作著的力量。我的整個人生改變了，一切都變了。

    從字面上看來，我開始死去。我這個聰明的西方人，突然間就這麼邁向死亡。關於自己的一切，都不再與我所理解的知識潛力有任何連貫性。全都破滅了。'
  - '[PAGE 272]


    神祕的力量的確存在。我曾遇過它們。有些訊息來自異地。然後你獲得了這些訊息。你可能被空氣一把抓起，像個玩偶般被翻轉。憑藉我全數的深厚智力來理解，那真的壓得人喘不過氣。實在可怕極了。


    這些力量到底是什麼？它們想要的是什麼？

    它們有想要什麼嗎？這到底是怎麼回事？

    這是我與聲音相遇的旅程之始，這是旅程真正的起點。

    我因此完全打破了與正常生活的一切連結。


    我就只是狂野地活回本源。回到我以及我們每個人的幻覺源頭。

    這是件要事。我不得不消化它、領會它。

    我必須要放棄我的世界。而我真的這麼做了。

    我放棄了一切。

    一切都是謊言。

    一切都沒道理。

    這是個盲目的世界。

    這世界充滿著妄想與錯覺，來支撐所有的自欺幻象。


    有些力量能在夜裡把你翻身。所有人都被困在世俗的層面裡，而我則是山上的野人。


    我無法重回這個世界了。因為它看起來太粗劣、愚蠢、庸俗而不淨。'
  - '[PAGE 273]


    我停止飲食，一周又一周再一周地不吃不喝。我就只是坐著讓太陽餵養。這是件怪事。


    但我很平靜，因為我體內儲存的這些東西，慢慢開始從我身上濾出。


    解構完成了。


    我猜這些際遇，是與聲音相遇的準備階段的序曲。我不知道後來會發生什麼事。我毫無頭緒。在這當口，我就只是死撐活賴著。我不知道接下來的人生發展。沒有人能知道。你無從得知……你觸及了另外一面，所有規則都改變了。


    一切都不一樣了。


    > ——Ra Uru Hu'
