    # # 奇遇


    chapter1'
  - '[PAGE 19]


    關於這個故事，Ra 一開始覺得除了「瘋狂」之外不做他想。這並不尋常。就算跟多數真相揭示的方式相比，還是極不尋常。因為他生性多疑，經過那麼多年都不去說這段奇遇故事，對他而言並不困難；畢竟那太瘋狂也無從證明。但這正是說故事的樂趣。


    反正他早就瘋了。以任何社會標準來看，Ra 在這段奇遇之前早就發狂了。當時，他住在伊維薩（Ibiza）這座地中海島的荒郊野嶺，過著極為孤獨的日子，但他毫不在意。他逢場作戲；也不去想自己經歷的一切，因為那太駭人。他裝作自己早已失去，無論那代表什麼。他時值中年，對於事物的運作也明白得夠多。關於自己的瘋狂，讓他意外的是其實那非常具娛樂性。縱情瘋狂，徹底擺脫定義西方文明的一切，是發生在他身上最好玩的事。


    那是 1987 年 1 月 3 日。Ra 住在一處被當地人稱為「ruina」①的廢墟。數百年前建造的這幢破屋，前面有一窪乾涸的池子和一口舊時的水井。原本的前門和房子的大部分結構早已崩壞，只有一個入口及一條拱道，通往現在看來似乎是院子的地方。約莫兩百年前的住戶把水用光了。在過去，一旦你把水用光，就不可能在這樣的住所過活。


    你無法種植任何東西來謀生。這棟建物的屋況隨著時間緩慢惡化。1984 年時，Ra 首次看到這座廢墟，當時他向產權所有人承租位於廢墟下方，名為「C''as Coxtu」的主屋。那是'
  - '[PAGE 20]


    在他開始荒野生活的幾年之前。地主過去曾把廢墟轉為主屋的某種客房，是個簡樸、小巧的封閉處所。原屋唯一保留下來的就只有這間房。其餘部分皆化為殘壁。房子看來不怎麼樣，但還算實用。


    Ra 有個英國詩人朋友，曾經沒有棲身之處。Ra 跟他說可以來那座小廢墟住，那時他自個兒仍住在租來的主屋。不久之後，Ra 從自己的生活出走、拋下一切，而詩人朋友則給他報了恩。有天，詩人來找
    Ra，跟他說：「我有個地方給你住。你應該真正地遠離現實。你身處世俗太久了。何不過來住在當初給我的這座廢墟呢？反正我得回英國去了。」而這，就是 Ra 最後踏入那奇異之處的緣由。


    這廢墟有扇巨大的木門，得用十九世紀那種非常古老風格的大把鐵製萬能鑰匙打開。早在 Ra 知道伊維薩島這地方之前，他一天到晚塗鴉。而他最常畫的就是這把鑰匙。一次又一次反覆地畫。在他女兒出生的那段期間，他都畫在日記裡。那是他生命的圖像日記，沒有隻字片語，裡頭都是塗鴉。每一頁都畫有這把鑰匙，而後來，他手上拿著這把鑰匙，在只有用這鑰匙才能打開的房間裡生活。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_20_0.png)


    ❶ ruina 是西班牙文的廢墟。'
  - '[PAGE 21]


    天色漸暗。時間不算晚，但一月的伊維薩島天黑得比較早。Ra 正在回廢墟的路上。他剛被招待完免費的一頓飯，這對他總是一大樂事，畢竟那些日子裡他不太常進食。他身上幾乎只有肌肉和骨頭，沒有太多其他東西。當地有對荷蘭夫妻，著迷於
    Ra 的人生，儘管有些人認為 Ra 根本是惡名昭彰，甚至危險。他們單純被 Ra 吸引，所以一星期會去接他一次。他們把他帶回家，打開錄音機，然後讓他講話。Ra
    會聊他的過往經歷，接著這對夫妻會給他一頓美味的午餐、一些西班牙幣，再送他回家。這讓他得以過活。


    那特別之日的早晨，他的嘴巴因為牙疼而痛苦不已。荷蘭夫妻為他做了些順勢療法，但那對他沒什麼作用。然後他們載他回到最靠近廢墟的大路旁。他開始走上山坡，從馬路沿著小徑，拖著疲憊的步伐往廢墟前進。而他那頭半野生的狗兒大麥·巴克，聞到他的氣味，就從山上跑下來迎接他。大麥十分凶惡。牠是天生的殺手。牠有個從不餵牠的主人，畢竟主人自己也沒食物可吃。大麥得自求溫飽，所以牠會去獵羊。牠在出生後兩天認識了
    Ra，是朋友的女兒送他的。狗兒認得他的氣味也喜歡他，但牠不怎麼喜歡其他人。牠獸性十足。Ra 曾在某天，眼看牠在一場狗架中幹掉了另一隻狗。Ra 一踏上通往廢墟的小徑，大麥就感應到他了。當時
    Ra 的生命和動物有著深刻的連結，所以，在大麥過來打了招呼後，他們開始一同朝廢墟走去。


    廢墟只有一個房間，非常簡樸，而且也許只有 12.5 公尺'
  - '[PAGE 22]


    大。房裡有個平台, Ra 就睡在上頭。只要一開門, 立刻就能看到平台。裡頭還有一張用磚頭堆疊並鋪上木板做成的桌子, 以及一把椅子。有一面滿是架子的牆; 牆的左手邊擺滿各式各樣的書,
    而右邊則是瓶瓶罐罐的草藥植物。這些都是他那位詩人朋友的。屋內還有一些當地的法籍藝術家帕斯可製作的面具。他以前也製作蝴蝶吊飾在市場裡販售, 他那裝滿材料和工具的箱子同樣也在屋裡。睡覺用的平台上方,
    吊著一盞完全乾枯的煤油燈。要取得煤油得去到島的另一邊。但 Ra 既沒錢也沒交通工具, 所以除了偶爾點燃的蠟燭之外, 廢墟入夜後總是一片漆黑。Ra 是牡羊座,
    而他也把生活過得像羊一樣。日出起床, 日落睡覺。而這也是他在走回廢墟時打算做的, 睡覺。


    廢墟就在眼前, 有光從門底下透了出來。當一人一犬抵達、看見門底下的光時, Ra 覺得滑稽。就是種古怪的感覺。確實, 在那道光映入眼簾之前, 他就已經感受到胃部肌肉的緊縮,
    他也知道狗狗同樣覺得干擾。大麥通常會在前頭領路, 但現在卻躲在他身後。廢墟的鑰匙只有 Ra 手上這把, 其他人不可能有這麼古老的鑰匙, 而門是鎖著的, 沒有別條路可以進到屋子裡,
    何況根本不會有誰這麼閒閒沒事幹。畢竟他被認為是當地的瘋子。沒有人會想靠近他。這真的很詭異。


    黑暗已將夜幕完全調黑, 萬千星光開始在天空閃耀。現在, Ra 離門非常近, 並對著門大叫。他喊出極具諷刺意味的「誰在那? (Who is there?)」但沒得到任何答案。廢墟位'
  - '[PAGE 23]


    在山丘上，下面是山谷。另一側則是群山環繞。那一刻，在黑暗之中，伴著那道門下之光，他聽到自己的聲音透过山谷迴盪。「誰在那裡？」（Hu 在那裡。）❶


    他緊張地把鑰匙插進門裡。而接著發生的事情並不是循序相繼的。那是某種整合在一起的動作，他在後來可以將這一切拆解成好幾部分，但那和他所經歷的並不相同。他開了門鎖，用手將門往左推進屋內。煤油燈被點亮並沿著他的床順時針轉動。這是他注意到的第一件事。就在同時，他的狗兒大麥跨過了門檻。當他也這麼做時，他覺得就像被近距離開了槍一般。突如其來的壓力湧入
    Ra 的腦袋，在壓力之中，Ra 聽到了一個聲音。那並不悅耳，像是個帶有菸嗓的 155 歲老女人的聲音。那聲音黑暗、嚴厲、冷酷且嚇人，還帶有 Ra 搞不清楚的智慧韻味。


    當他聽到那個聲音——在狗兒攤垮在地而提燈不斷盤旋時——他的身體轟然出水。水從他的頭部、手臂、腿和股溝噴湧而出。地板上有一大灘體液。這種超速脫水的身體感受極為痛苦。而伴隨著痛苦出現的，是那個聲音。它說：「你準備好工作了嗎？」


    這可不是個問句。真的不是。狗兒躺在地上的水池裡，聲音下了「把狗移開」的命令，所以 Ra 把狗拖到桌子底下，而牠接下來的八天也都待在那兒。這段期間大麥動也不動，牠看起來也沒在呼吸。接著，Ra
    把門關上。'
- md: '如果你曾經對 Ra 下過指導棋，很有可能他這輩子都不會再看你一眼。他大半的成人歲月，都是個會貶抑他人智商的囂張自大狂。他不屑任何權威。但在那個時間、那個狀態下，他幾乎就像條受到驚嚇、乖乖聽話的狗。他覺得自己宛如跑了場沒有飲料補給的馬拉松，身體的每條肌肉都開始抽筋絞痛。那樣的疼痛程度難以言喻，畢竟痛苦是比較出來的，但他這輩子從未有過比這還痛的經驗。他的身體遭受侵犯。他承受極大的苦楚，覺得自己好像被強暴了。這一切發生得太快，有一瞬間他還以為自己就要死去。但奇怪的事接著發生。他的右髖骨浮現某種感覺。「能量衣」大概是最適切的描述詞。它從髖骨開始同時向上也向下移動，感覺像是你的腳陷入昏迷而漸漸麻木。


    這件能量衣並沒有讓痛苦消失不見，但把痛苦變得可以忍受。在接下來的八天八夜，Ra 摸不著也感受不到自己的皮膚。而聲音則派了不少工作給他。


    房裡有一具帶有兩個爐口的瓦斯爐。Ra 要做的第一件事是在上頭點火。在爐火點燃之際，他脖子上的汗毛直豎而起。一道直徑大概兩寸的霓虹藍光倏地在房間中央盤旋。聲音要
    Ra 跟隨那道光。在早年那狂野的解構主義時期，Ra 始終戴著一頂回教頭飾，家裡牆上還掛著一件某人從緬甸買給他的佛①教袈裟。那道光穿過了袈裟，所以 Ra 把它披上。光接著往書區去，點選了英王欽定本《新約》聖經、印度教的《薄伽梵歌》和史丹佛大學的生物學課本。根據指示，他將那幾本書全放在平台上。屋內還有一張皮革編織的棋盤，與一卷以前藝術家拿來看做蝴蝶的銅線。Ra
    必須把這各式各樣的物品搜集起來，跟平台上的書擺在一起。


    接著，他被要求從架上取來草藥——當然，他根本不知道罐子裡裝的到底是什麼。先前住在那裡的傢伙算是某種草藥師，會在島上來回搜尋各式各樣的根莖與草本，來製作這些奇怪的調合物。那道光會往特定的罐子移動，並要
    Ra 把那些草藥直接放在火上燃燒。漸漸地，房間開始瀰漫煙霧。Ra 得戴上帕斯可留在房裡的其中一張面具。


    那張面具的中間，有條橫過鼻子的裂縫。這畫面看來相當瘋狂。


    在燃燒草藥而滿是煙霧的屋裡，Ra 盤腿坐在平台上，頭上披著袈裟，還戴了張有裂縫的面具。面前是棋盤、線圈、書本和被他湊在一塊的其他物品。


    接下來，最奇怪的事發生了。那道光飛到書架最頂端的右側，那兒看來有個橘色的條板箱。他得爬上桌子才能搆到並把箱子拉下來。箱子裡裝的是巨大的蝴蝶翅膀半成品。那道光進了箱子，接著猛然往下飛向一疊報紙。Ra
    摸到報紙後把它抽了出來。那份刊物是西班牙當地的《馬略卡島日報》。頭版頭條是 1986 年 12 月的墨西哥地震，就發生在 Ra 這場奇遇的不久之前。頭版還有另一篇故事，一個名叫以色列·狄亞茲的男士，試圖把埋在瓦礫堆底下八天的懷孕妻子挖出來。這篇故事報導了他如何把妻子連同腹中胎兒一起拯救出來。然後，Ra
    把報紙的頭版取出，鋪在他床上那一堆東西上頭。在床腳邊，還有一些射線圖（Ray charts），那是他對神智學思想的研究。他給認識的人都畫了圖。聲音要 Ra
    從中挑出一張他認識的男人的圖，再將圖放到火上。Ra 把圖放在悶燒的草藥上頭，就回平台坐下。


    突然間，他聽到許多聲音。那很怪異。


    他聽到的主要是西班牙語的交談，所以他根本不懂那些聲音在講什麼。但無所謂，反正 Ra 已經被眼前所見嚇著了：一張在火焰上頭的紙竟然沒被燒著。雖然紙沒有燃燒，卻充斥著像說話聲和噪音等各種聲響。在某一刻，他變得非常疲憊，並接收到一段話，那是他將接獲的三句真言中的頭一句。他絲毫不知箇中意義。在覆誦幾次真言後，那張紙在火焰中爆炸而消失無蹤。筋疲力竭的
    Ra，往後倒向平台。他覺得自己好像浮著，身體完全感覺不到平台。接著，聲音開始教導他。


    這感覺很棒，因為在聲音說話時，Ra 沒有痛苦。他漂浮在一種「訊息場」中。聲音跟他講大霹靂的故事，但它稱之為意識水晶及存在本質的故事。Ra 從沒聽過類似的東西。他沉默著。他從來不知道自己能這麼沉默。這一切都非常奇怪。外頭正在下雨，事實上，不只是下雨，而是滂沱大雨。Ra
    記得自己漂浮了整夜，沒有清醒也不算睡著。那樣的痛苦讓他無法入眠，睡著沒他想像得容易，而他不餓也不渴。終於，晨光照了進來，聲音說屋外有人，他應該去開門。那兒的確站了兩個人。一個英國人和他的印度女友。Ra
    放進火裡燒的圖就是他的。


    英國人的表情看起來非常困惑，因為他倆本來在離開這座島前往法國的路上，已經搭船渡海，但不知道為什麼，他們突然就覺得非得來見 Ra 不可而折返。所以他們站在門口，而聲音叫
    Ra 讓他們進去，他也照辦了。那場景相當古怪。女子坐在椅子上，旁邊是一動也不動、沒有呼吸，也沒被注意到的狗。英國人則坐在平台離 Ra 最遠的那端。接著，聲音要
    Ra 跟他們講解意識水晶。


    然後，聲音騙了 Ra。它跟 Ra 說：「告訴那個英國人，你可以把屬於他的水晶交給他。」Ra 告訴他們要拿水晶就傍晩再過來。接著聲音跟 Ra 說，把他們趕出去，他也就這麼幹了。


    把門關上後，他往桌子走去，緊接而來的，是這段奇遇中他首度體會到的具象魔幻。他畫了張圖。這是超乎想像的經驗。他感受不到手上的筆。關於那些數字和其他有的沒的，統統都是他被告知如何做、怎麼畫、什麼該放在哪個位置的，總之，這個經驗非常奇特。


    當晚，英國人和女友照指示回到廢墟。Ra 邀他們進屋然後關門。女子和白天一樣坐在桌子旁的位子上，英國人則和 Ra 坐在平台上。Ra 再次披上袈裟，戴上破掉的面具，也給了英國人另一副。接著，他像之前那樣再次把草藥丟進火裡，房間滿是煙霧。


    對於自己正在做的事情，Ra 根本一點也搞不懂。他別無選擇地被捲入這部荒誕電影裡。英國人盯著 Ra，好奇接下來會發生什麼，可是 Ra 毫無頭緒。Ra 曾跟他說，會讓他得到應得的水晶，但這句話的意思他一無所知。這時，緊張感升高，突然間，一道光從英國人的右耳跑出來。這是一道微小、顫動著的立體白光。它筆直上揚後，飛往
    Ra 的頭部並鑽了進去。光進入 Ra 頭部的那瞬間，英國人開始嘔吐。不只是乾嘔而已，他開始吐出一堆 Ra 從沒看過的東西。他感到腎上腺素急速激增。接著，聲音要
    Ra 把他們送走。


    女人起身出了門，但英國人動彈不得還持續嘔吐。Ra 抓起英國人屁股下的床單，連同人一起拖拉，把他扔到廢墟門外的水坑後，用力把門甩上。


    大概三年後，Ra 和英國人重逢，對方宣稱 Ra 竊取了他的心智。也因受此事件影響，他有好幾年無法自理生活。


    在 Ra 進入這段體驗時，他的名字只是 Ra。但這之後，他成了 Ra Uru Hu，這是聲音為他加上的封號。Uru 就是進入他身體的那道白光。只要他閉上眼睛，就能看到它。直到去世之前，Ra
    不斷地看到它。這道光是活的。他會和這道光溝通。


    曼陀羅輪和閘門位置是其中一件神奇的事。弄出這些的是 Uru，而不是 Ra。這樣的共生很奇怪，而 Ra 也不知道那到底是什麼。它不像光所說的那樣。


    在英國人和女人離開後，聲音嚴肅了起來。Ra 記得他背靠牆坐在平台上，對體內的那道白光困惑不已。在恐慌之間，他突然覺得有人帶著他動作。他的頭以你能想像的最大程度急速回轉。扭轉的角度大到讓他幾乎無法呼吸，而就在這一刻，有另外三道光直接竄入他的身軀。Ra
    從沒受過槍擊，但這感覺起來大概就是那樣。當時他覺得自己就快死了。他不可能熬得過去。他無法呼吸，而且從光進去的地方到他的胸口，也都痛得要命。無論那是什麼，他都能感覺到那些東西。他知道那些光在體內，卻不知道它們做了什麼。他也無法確定它們到底有沒有離開。他所知道的就只有無法形容的痛苦。當這一切結束時，他漂浮著，沒有碰到任何東西。他閉著眼睛看著光，意識到它會以上上下下和繞圈的動作來回應對錯有無。


    後來，他和光更進一步找到真正的溝通方式。這場奇遇後的幾年裡，Ra 老是認為光應該會離開。不管其目的為何，光從沒告訴他該做什麼，他們的溝通也總深受限制。在這段經歷後，Ra
    過著比較正常的生活，組織了家庭，做了一些對世界有建設性的好事，但體內那個奇怪的東西，仍不時有話要說。


    第三天相當駭人，Ra 記得在他親眼看見之前，就已經感受到那樣的恐怖。但前幾晚也同樣離奇。他無法入眠，卻也沒有全然清醒。所以，當第三天那道光乍現時，對於接下來會發生的事，Ra
    也有那麼點概念了。他覺得古怪，在他睜眼試著聚焦時，他發現自己沒了皮膚，全身被鱗片覆蓋。他的性徵也消失得無影無蹤。如果你想知道所謂的恐慌與驚嚇是什麼，這就是了。不管是誰，此時會在意的應該就只有鱗片到底會不會褪去，生殖器會不會回來。那就像某種科幻的爬蟲類生物一樣嚇人。不過鱗片終究還是消失了。經過好幾小時，在某一瞬間都不見了。他的身體總算復元。


    這一晚，聲音帶他出門進到院子。那裡有一塊破鏡子，Ra 不得不站在它前面。他獲得一趟神奇奧妙的前世之旅。各式各樣的景像充斥其中，一張又一張如煙霧般的朦朧臉龐接續浮現。這並不像他在看故事。每當他盯著一張臉時，就有種奇怪的感覺。展現在他眼前的，全都是他的個性水晶在這一回合①中，經歷過的數以百計的生生世世。這段旅程十分冗長，所回顧的數量多到可怕。Ra
    後來曾說，和整個奇遇的其他強烈經歷相比，這部分無聊得很。對於前世種種，他沒有啥感覺或特別的興趣。事實上，當聲音對他訴說關於他自己的事情時，他並未樂在其中。比起處理這些他聽到的「你曾是這個那個」的瘋狂訊息，從這段經歷中存活下來更為有趣。


    聲音並沒有跟 Ra 說明這些知識的用途，以及這段經驗的意義。很明顯地，他得自己猜。這段經歷既精采又令人困惑。他感覺這就像多重人格。


    舉例來說，在他被傳授關於圖像②的內容時，圖裡的每個能量中心突然都有了聲音。它們從他體內，從他擁有的中心對他說話。非常奇妙，也相當可怕。內在的這些聲音有男有女、有老有少，彼此議論交談著。


    人們總好奇 Ra 如何接收到的這些訊息，畢竟數量多到令人難以置信。我猜，能夠說明這件事的唯一方式，就是某些訊息被植入他體內了。


    在那八天八夜裡，Ra 沒怎麼說話。他只提過兩個疑問，聲音也做了回應。其中一個是他對狗兒的擔心，另一個則是他對於這些訊息的困惑。他想知道起源是什麼，聲音的回答是：「從字母之書③來的（From
    the Book of Letters）」。


    許多年後的一趟美國行，有位女子去找 Ra，跟他聊了她的一個朋友。那個朋友在 1987 年一月時發瘋，並就此失去自理生活的能力。那個人做的最後一件事，就是在日誌上寫下：「從字母之書來的。」之後他從未再提筆寫下任何東西。


    到底 Ra 是如何接收到這些訊息？這可以解釋成 Ra 十分接近源頭。廢墟座落於乾涸的水池之上，並連接到設計水晶束①出現的洞穴。那是過去的其他信使從未接觸過的。其他人所連結的通常是個性水晶束。而
    Ra 所接收的則是源自形體原則②的總體。他就坐在其上，透過微中子流和氣場的交流而吸收。


    他親眼、親耳接收了許多神奇難解的事物。他多年以後回顧，理解到能擁有這麼奇特的經驗，是多麼不可思議、多麼榮幸，但在當下，他只有對痛苦的厭倦而已。


    奇遇的尾聲很美，是所有結局該有的樣子。第八天，聲音要他登上比廢墟更高的山上，那是有著壯麗景觀、絕美而遺世的地方。所以他爬上去，然後坐下。時間約莫正午，聲音告訴他，它要離開了，接著又對他下了最詭異的要求：它要
    Ra 直視太陽。「開什麼玩笑啊！」他對於經歷了那些瘋狂之後還得盯著太陽看這件事十分惱火，但他還是照辦了。他認為自己應該會瞎掉。聲音給了他最後的真言，並對他說：「你的名字是
    Ra，而太陽是你的狗，所以，看著它。」


    所以 Ra 坐著，對著太陽睜眼。當他這麼做時，聲音走了。


    睜大眼睛直視太陽是種驚人的經驗，陽光燒進他的眼裡，往下延伸到食道。那種灼熱感，就像你猛然喝下一杯威士忌。它一路燒進胃，就像在裡頭點了火。


    那時，Ra 看見了神祕的藍天使，與太陽的脈衝共舞著。當你望向太陽，你會發現它是活生生的，如果你只是這樣行走於世的話，你不會注意到這件事。你看不見它的呼吸。當你全然注視它而毫無畏懼，你會看見它鮮活的呼吸與脈動。你甚至能感知太陽的意識。


    他坐在那裡好幾小時。在某一刻，他站了起來並緩緩地動身下山。當他這麼做時，跑上來迎接他的，是狗兒大麥。整整八天，牠毫無動靜、沒有呼吸、沒有進食飲水，而牠仍健在，沿路搖尾蹦蹦跳跳而來。


    這一切結束了，但他仍未放下。雖然他以為他辦得到。你得夠幸運，才能在長長的人生中擁有這種魔法，來跳脫、甚至超越生命的面紗。像 Ra 這樣的虛無主義者，卻與這個力量相遇。Ra
    仍只是個孑然於世的怪胎，一無所有，除了這門知識之外，什麼都沒有。


    在這段奇遇之後，他經歷了此生唯一一段消沉期，畢竟這不是那種你可以跟太多人傾吐的故事。這是個弔詭的故事，以我們文化的運作模式看來，甚至會嚇壞某些人，因為他們會賦予這件事別種錯誤的投射。走過這般歷程，處在那樣的時空，接著，把一切拋掉，重新回到凡人身軀，實在痛苦。


    你知道這身皮囊有重量與形體；它需要食物，而這世界充滿了蠢蛋。你不可能到處跑來跑去，跟別人說「聲音」告訴你這世界如何運作。


    某種程度上，Ra 對自己感到抱歉，但不是因為自己過去的作為——他已經是個異於尋常的怪胎，過著怪人的生活。他沒錢也沒房。他認為他曾擁有歡快的時光，但那已經結束——所以現在，他試著擺脫，卻無能為力。他燒掉所有東西，包括每份筆記，但什麼都沒離開。後來大概有九個月，他在平靜的世間載浮載沉，試著不當
