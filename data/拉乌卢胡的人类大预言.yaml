  md: '# # 存取的閘門


    我們有兩個領域，一個是接收的能量流，一個是訴說的能量流。然後我們還有存取的閘門，也就是 49 閘門。它的意義重大。它是個協調點，將接收的動力和訴說的能量結合在一起，讓一切得以顯現。我們先前已經提過，銳將仰賴伍群而生，伍群把銳融合在一起，而銳則透過有意識的伍群來運作。


    這和人類的伍群機制不同。我們的伍群是運用動力柱❶的通道，從服務中心穿過愛的中心，再來到分享中心。但這些通道並不在孤閉迴路裡。


    ❶動力柱：動力柱是人類設計的薦骨中心連接 G 中心的三條通道，以及 G 中心連接喉嚨中心的三條通道。人類的伍群分析是另一套所謂「團體動力解讀」的知識，主要用來分析
