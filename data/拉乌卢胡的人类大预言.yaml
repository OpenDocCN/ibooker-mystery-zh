  md: '啟示錄（apocalypse）這個字眼並未被好好理解。有些人認為這是世界末日，但古希臘語的意思則是揭幕，這也是聖約翰《啟示錄》的來由。事實上，啟示錄是傳訊者針對一個時代完結的討論。但到來的並非終焉，而是宇宙曼陀羅輪那更為龐大的進程運轉。這和意識水晶有關，重點總是意識水晶。水晶們經歷過創造與毀滅，在宇宙自身漫長的進化歷史的方方面面，體現了形體的多元性。在擁有讓人類這種形體得以運作的所需元素之前，我們必須經歷群星好幾世代的生生死死。死亡是不可避免的超驗性，是不停轉動的宇宙之輪。


    末日並非神的懲罰。那不過是非常自然的過程。沒有什麼是永恆不朽的。萬物皆是有始有終。這不會停止。結束即將到來，我們也正朝它邁進。你得是個傻子，才會明知萬事皆有終結，卻深信我們的世界不會完蛋。


    這一回合的結束，帶來的是堂皇等級的突變。淘汰將會發生。是說，去劣存優的篩選其實總在進行著。賞善罰惡是其主題，只是並非字面的意義。水晶皆具有質地。這些質地可透過陰陽的四種組成原則來理解。未來的重點是深奧的整合力。萬物都有完成各自目標的適當時機。這無關邪惡。未來不再需要太陽結構（上下皆陽爻）的水晶，它們在這回合結束時將被毀滅。


    這些水晶已經存在一千四百億年。沒有人能夠想像它們'
