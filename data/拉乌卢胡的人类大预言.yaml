    隨著時間過去，每一張臉都獲得了不同的價值。它們被賦予了神與女神的個性，包括佛陀意識場、基督意識場，這些人們試圖表述的不同方式，其實都只是機制的實際情況。有個過濾系統持續運作，直接對我們產生影響。


    在微中子流抵達地球之前，必須穿過所有的水晶束。水晶束不僅過濾來自太陽的訊息流，也過濾那些源自四角的恆星背景場的微中子流。


    我們皆源起於十六條水晶束的其中之一。在這一回合的尾聲——也就是1300年內——有四條水晶束會被消滅。它們是位於突變區塊的黑帝斯、普羅米修斯、毗濕奴和守輪者①。它們都是太陽結構的水晶。在這之前，已經有大量的個性水晶被剔除。這四條水晶束經過一段漫長的時間後，將在太陽的中心長時間燃燒，並因此釋放出微中子訊息。沒有任何事


