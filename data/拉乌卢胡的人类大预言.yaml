    關於銳，我們需要明白的是：他和我們不同。銳追求同質化，但這裡所謂的同質化，並不是我們以為的那種「會讓我們遠離自己」的形式，而是一種融合的意識，個體不再是重點。如果你把一個銳隔離起來，他就會像放了一星期的蔬菜湯般腐敗、壞死。對人類來說，能獨立是一件光榮的事。我們是「我是」（I
    am）。但銳不是那樣。銳是「反我」（anti I am）的。他們的支持方式完全不是我們所理解的那樣。伍群是物質策略的存在，若你幫它裝上一組意識庫，它會非常擅於採集。但它的採集並不用作支出。他們的智力不會用來生產。他們的採集方式和我們不同。我不認為他們會遊走各處進行採集。他們的採集會以另一種方法進行，我們將會看到它顯現的方式。關於銳的大多數事情，我們都只能猜測而已。


