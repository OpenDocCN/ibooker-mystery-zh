  md: '我停止飲食，一周又一周再一周地不吃不喝。我就只是坐著讓太陽餵養。這是件怪事。


    但我很平靜，因為我體內儲存的這些東西，慢慢開始從我身上濾出。


    解構完成了。


    我猜這些際遇，是與聲音相遇的準備階段的序曲。我不知道後來會發生什麼事。我毫無頭緒。在這當口，我就只是死撐活賴著。我不知道接下來的人生發展。沒有人能知道。你無從得知……你觸及了另外一面，所有規則都改變了。


    一切都不一樣了。


    > ——Ra Uru Hu'
