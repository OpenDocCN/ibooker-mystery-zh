  md: '程式說：「好的，我們已經花了二十五億年來做這件事。這相當有意思。沒錯，我們確實獲得了自我觀照意識。非常棒，但我們需要做得比這更好。要更加老練、更有成效才行。」所以，它用了一個非凡的東西來取代突變。那是某種永生不朽。是相對的不朽。不是生物型態，所以沒有死亡。不是生物型態，所以毋須繁衍。它非常不同，超乎地球末日之外，也超乎這一回合的結束。我們來自一個罕見的星球。它有著可供應生物型態需求的特殊環境，而我們要去的地方反而非常普通。可以說在離開生物型態後，我們會變成外星人。當我們抵達這本書所描繪的我們該去的地方時，就會像你所能想像的任何科幻故事一樣棒。


    當設計水晶束離開地球，它會把地球上所有生命的設計水晶一併拉走。萬物會在一瞬間全數死亡。當這件事發生時？哇賽！來討論一波吧！真的難以置信。舉目皆是死亡。不計其數的魚在幾分鐘裡死去。這是生命力的滅亡。這是形體原則的死亡。這條水晶束移動時，便把地球上的所有生命撕裂，在那麼做時，它也將個性水晶層層堆放而創造出一把鞘，作為它在宇宙移動時的保護。


    你必須要知道：一旦水晶離開地球，光就會被關掉。不再有「思考」與「觀看」。不會有硬體、不會有存在、沒有宇宙、沒有獨特的生活，也沒有獨特的才智。


    什麼都沒有。這就是空無。但它並非真的一無所有。因'
