  md: '為至少卡車每天都會載來食物。日復一日皆然。


    你有想過要讓紐約市有早餐可吃需要什麼嗎？你知道計畫週期為我們做了哪些事情嗎？人類在最基本的程度上，到底有多無能呢？當電力消失時，他們的生存機率，是 0 嗎？當這樣的時代來臨，不再有人會出於本性支持你該怎麼辦？


    進化就像一氧化碳。就像個偷偷摸摸的小人，然後——轟一聲！什麼都沒了！雖然，這並不會一夜消失。被計畫十字制約的所有人，都將抗拒這樣的改變。他們仍想堅持聯合國、政府與工會。


    想像一下倘若墨西哥市沒有早餐可吃。當支援機制壞了時，人們會採取什麼行動？當沒有警力、沒有學校時又會如何？你以為因為現在存在，所以所有事物會繼續存在嗎？這一切都是因應我們而生。但銳不需要這些。他們不需要制度。400
    年前，我們為了自己創建了這一切。如果網路在未來 100 年裡還能存在，那我們就夠幸運了。


    我喜歡程式曼陀羅輪轉動的方式。人類的終結與銳的起始會帶來指引。這全被寫在地圖裡。新的開始與眾不同。即將臨來的沉睡鳳凰週期會進行篩選。你將見證人類繁殖力的基礎結構崩解，銳將會出現。這會是一段不穩定的時期，因為我們不再受保護。現今大部分的孩子是抱著計畫幻象這張安心毯長大，他們眼前有著各式各樣的工作與有條理系統的'
