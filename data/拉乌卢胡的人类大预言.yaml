  md: '如果你能想像的話。回到剛剛的故事，我的禁食經歷超過了六個星期。那就好像進入了另一個空間，後來看到自己的模樣，簡直就像幽靈般怪異。而這是我的個人初體驗。我從不知道這樣的事情。我覺得這太妙了。我感覺不到渴望、也沒有失落。我也發現到，我擁有的時間更多了。這個過程是如此令人驚訝。後來，我理解到我們到底花了多少時間在思考關於採購、準備食物、吃喝、整理乾淨、拉屎，然後重頭再來一遍這些動作。這真是無窮無盡。在你不吃不喝時，你能擁有的時間，多到不可思議。那真的很神奇。


    總之，有些事情顯然非常奇怪。怪事正在發生。時序已經進入天蠍的月份。我有一個朋友，是個真正的薩滿巫師，饒富二十世紀晚期的薩滿典型，還是個天蠍座。我和天蠍男鮑伯（Bob）以及法蘭克約好要一起嗑
