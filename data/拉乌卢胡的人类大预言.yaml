    # 如果到了 2027 年，世界將分崩離析，你會相信嗎？


    人類設計祖師爺 Ra，1987 年在西班牙的伊維薩島上，遇到神祕的聲音。連續八天八夜，他接收關於我們這個宇宙的訊息，預言了人類的未來：


    - 我們的電力逐漸耗盡，繁殖力匱乏，本世紀後半，人口將大幅度減少。

    - 創新改革的時期即將結束，集體的研究、共享將邁入尾聲，民族國家將走到盡頭。

    - 人類與哺乳類的關係將發生重大變化，2027 年之後，將有龐大的業力懲罰降臨在濫生者身上。

    - 新人類即將誕生，接下來將有 1300 年的時間，人與新人類會共存在地球上。

    - 未來地球將遭受某物體的撞擊，地球上的生命也將隨之而去。


    面對如此遽變的未來，我們究竟該何去何從？


    ---

    ① 都卜勒效應（Doppler effect）是奧地利物理學家都卜勒在 1842 年發現的物理現象。指的是當波源和觀察者有相對運動時，觀察者接受到的波頻與波源發出的頻率並不相同的現象。好比火車朝我們駛來時的鳴笛聲變得尖細、離去時鳴笛聲變得低沉就是都卜勒效應的例子。'
  mdcn: '至極。那是會痛到讓你叫出「哎喲喂呀」的程度。這已經是我拿到草藥後的第六天，而那玩意兒理當馬上有效，至少在 24 小時裡就會清理我的腸道才是。但六天後的當時，因為身體太虛弱了，我突然絞痛到無法置信的地步。我走進屋內的浴室，發現我並不想待在那裡，於是就抓起一整捆的衛生紙，從打開的大門離開房子。


    在房屋的右前方是個果園。當你走進果園，那兒有株相當巨大而美麗的橄欖樹。我走向橄欖樹，在樹下蹲著，想看看自己能不能擺脫那些絞痛。當我坐在那裡時，我可以看見滿月。月亮已經升到房子的上方。我蹲坐在被夜幕籠罩的橄欖樹下向外望去。月亮就在我面前。從你身體裡排出的東西可能非常不可思議。那就像是黑色的油。那著實令人吃驚。在這場經歷之後，我不認為我會再有這種程度的內在清理過程了。在我排泄而月亮也持續升高時，我聽到了什麼。它沒有消失。在我凝視著月亮並承受這絞痛的過程裡，我聽到了一個聲音。那顯然是女性的聲線。它說：「這聽起來好像一架飛機啊。」而那聲音聽起來確實就是那樣。它聽起來就是飛機。但那聽起來像是一架不會靠近也沒有飛離的飛機。它不具備都卜勒效應①的特質。只有這個飛機所發出的非常奇怪的哀鳴聲。我無法將這聲音從腦袋趕出去。所以我就繼續那個清理自己的程序。但天氣真的有夠冷的。


    我回到屋子裡並把門關上。我坐在爐火旁邊取暖。我猜我必須坐在那兒大概十分鐘，等到門被打開以及肚子的絞痛感再次來襲。所以我回來，然後做了同樣的事，從頭到尾再重複。月亮變得更大，並已高掛夜空。而那個聲音持續存在著。那幾近惱人。我一次又一次清理自己、進入房子、關上門。我回到火堆旁坐著。而當我坐在火堆旁時，我看著面前的籃子，那看起來就像是間文具店，有著待售的可愛小書，書的內頁完全空白、也沒線條。


    我記得我從籃子抽了一本出來，發現書裡空空如也。上頭沒有任何文字。


    籃子裡還有支非常美麗的筆。它具有某種質地。這筆是金色的，我記得我把它拿在手上。但我不知該如何描繪接下來發生的事情，因為我人並不在那裡。我猜我是昏厥了。我不清楚那是怎麼運作的。我只曉得在我回神，或者說至少相對有了點意識時，我重返到這個我所謂的世界，而那本書已不再空白。它被填得滿滿的。當我翻頁時——沒有任何語言能夠描述那種「明明不理解、但就是知道某些東西的意義」的狀況。我不知道該如何解釋——我辦不到。書裡滿是我不認識的字符、數字、形狀和文字。有人說這叫自動書寫（automatic
    writing）。但我不知道要如何稱呼這種事。我的「載具」寫下了這所有的圖文，而我的「乘客意識」則是在度假，完全不在圈內，對我來說，這仍是生命中十足神祕的事件之一。這是一本無與倫比的神奇之書。書中有許多我不明白但有所領會的事物。我花了十年，才終能確實有意識地明白這本書展現在我面前的某些東西。但發生在我身上的到底是什麼——我真的不懂。


    這本書對我而言十分神聖。它是我跨越了某種界線的證物。它讓我不再是部主觀的電影，轉而成為一種客觀的經驗。對我的意識而言，這是相當重要的一步。這是我的證物。只屬於我的證物。它不是、也無法是別人的根據。但對我而言，它證實了生命的多重性、我們看待事物進行的方式，以及各式各樣的力量。


    沒有人曾看過這本書。這是本魔法小書。我搖醒我的朋友並對他說：「你絕對不會相信！你絕對不會相信！沒有人會相信的。你真該看看。它完全就是來自異世界啊，太不可思議了！」但他答道：「你在鬼扯什麼啊？我只想好好睡覺，不要吵我啦！」我接著說：「你一定得看看！」他回：「我不想看！」於是我說：「好，那你就永遠看不到。」我在三個月後把書燒掉，但那又是另一個故事了。


    它十分不可思議。也非常難以置信，因為我很清楚書裡的玩兒不是我的意識記憶體所能擁有或與之產生聯繫的東西。它就像是本科幻小說。我對天發誓，它絕對是一部無與倫比、一等一的科幻故事。當中揉合了驚奇、恐懼與興奮。它太令人驚異了。當我握著它時，手就像是被火燒到一樣。那也是我第一次得以看見
    G 這個摺疊循環的奧祕。喔，G 真是了不起。我花了好多年才掌握到我在那個狀態下所繪製的這個簡單圖像。它太神奇了。書裡滿是這些符文，這些與你相關聯的基礎符文。更勝於此的怪異之處是，如同它們奇特的存在，我知道它們屬於我。某程度上，它們屬於我。它們是我的。這不是某種被撿起來的隨機「傳真」。我很清楚我必須以完全不同的觀點來看待我的過程。順帶一提，但不是在那一夜。


    所以，我手握著那本書坐著，我打開它，看了其中一頁後把書閤上然後咯咯地笑。


    我不知道該如何描述。那就有點像是你發生了車禍但沒受傷，然後你笑了出來的感覺。我翻閱那些書頁，然後閤上，接著就是笑聲與驚喜。這是種驚喜。啊，真的是驚喜。沒有「這到底打哪兒來的？」的疑問。只有這絕對的驚喜。


    接著，當我經歷了這頭暈般的過程後，門打開了。有些怪事是無法用合理方式理解的。沒有能打開門的風。而且門是關著的。我不知道是什麼打開了門。這也是我被「碎裂」的一部分。或許那門根本沒被打開。也可能我就只是看見它開著然後走了出去。我不知道。因為當你身處於這樣的體驗時，你就像在氣泡裡。氣泡是個魔法。神奇的不是你。身處於氣泡之中是種意外的機緣。是的，它很有趣，但那是個氣泡，終究是個氣泡。門開啟。我終於不再感到絞痛，這是好事，畢竟那真的有夠痛。那兒有件法蘭克在穿的披風，那是那種附帶兜帽的厚重毯棉披風。


    法蘭克身形十分高大，比我大上許多。他可能有 188 至 190 公分高而且骨架魁梧。所以，那是一件很大的外套，而我冷得要命。我不想在外面受凍，所以我伸手抓過這件披風，披在我的肩膀上後再用兜帽把頭蓋著，往外走去。


    我不知道我在外面幹什麼。我只是順著經驗之流。我走到外面，走下階梯。我發現下樓梯時，我竟然能看見眼前的我的身影的不可思議細節。你必須是住在鄉間，才能知道月亮的陰影有多令人難以置信。


    在這一刻，我肩膀上方的月亮又大又圓。走到階梯底部時，我轉過身來看著那顆滿月。當我站在那兒，望著滿月時，我又聽到那個聲音、那個「沒有都卜勒效應的飛機」了。我已品嚐過驚奇。我已體驗過興奮，但我可沒準備好要面對恐懼啊。


    有所突破是令人興奮的，但接著，你在哪裡呢？你不再身處於任何一個自己知道或了解的地方了。有個東西物理性地抓住了我，用那種大人抓著六歲小孩的方式，雙手緊抓住我的前臂與肩膀，然後把我轉過身來。就是那種感覺。那是個糟糕透頂的經驗。我沒有任何辦法可以描述它。


    幸運的是，我已經禁食好長一段時間，因為我告訴你：光是現在想到那個經驗，就喚起了我心中的恐怖。


    被那樣一把抓起然後轉身。接著，更怪的事情發生了。在旋轉的同時，我可以聽見公雞、狗、馬兒和鳥——全部都在叫。狗兒吠著，而遠方某處的馬兒也嘶鳴著。在我被轉過來時，我望著東方的地平面。我看見太陽的日冕開始浮現，那是微小的、剛剛破曉的晨光。但在光裡頭，有一個炙熱的白點。一個高溫的白點——它美麗至極——就在地平線的邊緣。在右側則是一個小污點。當我看著那個熱點和旁邊的汗點時，我喪失了意識與眼界的尋常感知力。就好像是被運作中的閃光燈閃到眼睛一樣。但那個閃光燈有多重色彩與基本的模式。


    那感覺就像是我被淋浴，幾乎是沐浴在模式之中，被流動的模式、來自源頭的流動淋灑一般。持續的時間我覺得沒有超過一分鐘。但對我而言，那似乎是永恆的。我不知道我能不能活下來。對於發生在我身上的一切，我全然沒有頭緒。而被抓著轉圈的我，仍處在全然的腎上腺素狂潮中。


    當這一切停止時，陽光已布滿天空。在黎明時分，這顆太陽以不可思議的速度躍升。我聽見法蘭克從屋子走了出來。他問我在幹嘛。我對他說：


    「你有聽到嗎？」

    「聽到什麼？」

    「你有聽到嗎？」——因為我腦中的那聲音實在太大。


    在持續了三或四個小時之後，那聲音才離開。


    那個早晨我所張望的地平線，剛好是太陽、水星與哈雷衛星的三重合相。這是我怪得可以的神祕奇遇之一。我從來不知道這種事真的會發生。我曾挖苦、嘲笑、輕視這種事。對我來說，這些故事、童話之類的玩意兒，似乎——都不是「事實」。某程度上，它們不過是失敗的心理狀態的副產品。我不相信上帝或神格。我沒有任何信仰。我跟很多人一樣，差不多就是個自戀的虛無主義者。


    但是，後來——轟隆！我的人生走到了這一夜。


    我所以為的世界全數消失。


    什麼都不見了。在那一刻，我不再相信任何事了，我辦不到。


    我理解到人們是如何盲目，他們看不見存在於每個地方持續運作著的力量。我的整個人生改變了，一切都變了。從字面上看來，我開始死去。我這個聰明的西方人，突然間就這麼邁向死亡。關於自己的一切，都不再與我所理解的知識潛力有任何連貫性。全都破滅了。


    神祕的力量的確存在。我曾遇過它們。有些訊息來自異地。然後你獲得了這些訊息。你可能被空氣一把抓起，像個玩偶般被翻轉。憑藉我全數的深厚智力來理解，那真的壓得人喘不過氣。實在可怕極了。


    這些力量到底是什麼？它們想要的是什麼？

    它們有想要什麼嗎？這到底是怎麼回事？

    這是我與聲音相遇的旅程之始，這是旅程真正的起點。

    我因此完全打破了與正常生活的一切連結。


    我就只是狂野地活回本源。回到我以及我們每個人的幻覺源頭。

    這是件要事。我不得不消化它、領會它。

    我必須要放棄我的世界。而我真的這麼做了。

    我放棄了一切。

    一切都是謊言。

    一切都沒道理。

    這是個盲目的世界。

    這世界充滿著妄想與錯覺，來支撐所有的自欺幻象。


    有些力量能在夜裡把你翻身。所有人都被困在世俗的層面裡，而我則是山上的野人。


    我無法重回這個世界了。因為它看起來太粗劣、愚蠢、庸俗而不淨。


    我停止飲食，一周又一周再一周地不吃不喝。我就只是坐著讓太陽餵養。這是件怪事。


    但我很平靜，因為我體內儲存的這些東西，慢慢開始從我身上濾出。


    解構完成了。


    我猜這些際遇，是與聲音相遇的準備階段的序曲。我不知道後來會發生什麼事。我毫無頭緒。在這當口，我就只是死撐活賴著。我不知道接下來的人生發展。沒有人能知道。你無從得知……你觸及了另外一面，所有規則都改變了。


    一切都不一樣了。


    > ——Ra Uru Hu


    # 關於作者


    史蒂夫羅德斯（Steve Rhodes）是班圖（BaanTu）的創辦人。他身兼英倫音樂家、電腦工程師、作者等多重身分，還是一間唱片公司的老闆。出生於奧地利，在搬到倫敦之前，他主修機械工程管理。就讀大學時，史蒂夫從海選中贏得全國最佳音樂新人的頭銜，並與哥倫比亞唱片簽約。隨後陸續在各大電視、廣播與其他媒體展現才華。2010
    年時，史蒂夫在倫敦經營名為「半人馬座阿爾法星（Alpha Centaur）」的頂尖錄音室，包括肯伊·威斯特（Kanye West）、米亞（M.I.A.）和流行尖端樂團（Depeche
    Mode）等音樂人都曾在這兒錄音。對史蒂夫最新的音樂有興趣的話，請上 marquii.net 聆聽。


    # Ra Uru Hu


    羅伯特·亞倫·克拉克沃爾（Robert Alan Krakower）在 1983 年留下元配、拋開工作與家庭之後消失無蹤，最後被宣告死亡。後來，他改稱自己為
    Ra。他本來在加拿大經營一間媒體公司，曾拍出史上首批搖滾樂影片的某部分作品，以及一些電視廣告和流行節目。他的人間蒸發在地中海的伊維薩島結束。過了幾年沒錢的野人生活後，他
    1987 年 1 月經歷了改變人生的奇遇，他遇見了聲音。而 Uru Hu 這個稱號，也是聲音給他的。


