    19 閘門也和部落的需求有關，是部落與家族的驅動力。但這個需求的驅動力會消失。社群的支撐結構將不復存在。部落的宗教儀式、黏著力以及共同信仰的神明，都開始衰落崩壞。這樣的巨大變遷將對一切造成深遠的影響。我們必須了解到，人類進入的是非常個人主義的時期。而這也是人類的完美時代。'
