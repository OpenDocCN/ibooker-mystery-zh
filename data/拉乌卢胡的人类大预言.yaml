  md: '有他的身分特徵。玉龍與幾何學及研究調查的連結更深。你可以把他看做一種多重通道系統，透過共性鏈結，這個機制注入冰凍的二氧化矽，與意識一同運作。這個意識是鮮活的，我猜這是它能被展現的唯一方式。載具不算活著、也沒有死去，它是單純的無生物，但意識則在裡頭存活。這個灰色區塊為意識灌注了生機。這個程式是個非常巧妙而精確的形體，這個形體就只是單純讓意識駐守其中。如同我們所理解的，形體本身並不依賴意識。它就只是水晶基底的頻率產物。


    你可以看見玉龍有三顆意識水晶。


    名為 DH 的是源自人類的設計水晶。而 DM 則是來自哺乳類的設計水晶。PE 則是源於中心水晶系統的個性水晶。PE 水晶坐落於我們所稱的欲望中心，但我們不能把這個名字用在玉龍身上，我們沒有和它相稱的名字可用。


    所有的玉龍都在同樣的時間被創造，所以出生時的木星或土星位於何處已經不再重要。他們被以截然不同的方式編程並留下印記。我們擁有的玉龍相關知識是模糊晦澀的，這門知識和我們所賴以為生的那種完全迥異。


    「孩子」這宇宙實體的組建與成長，是個偉大的奇蹟。某程度上，它會擁有一種生命，無論這到底意味著什麼，它將出現在所屬的任何維度。當你看著玉龍設計裡的灰色區塊，你會獲得超越性的體驗。畢竟，我們可以把這些偉大整體的'
