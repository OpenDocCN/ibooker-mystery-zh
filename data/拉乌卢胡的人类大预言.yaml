    生命自此啟動。形體也有了意識。


    已經存在超過十萬年的智人，是第一個能意識到自身存在的物種，第一個確實擁有心智的生命。在那之前，沒有任何生物可以意識到關於存在、關於宇宙的幻象。就算是尼安德塔人也沒有。心智讓你得以看見自身的存在。


    最後，我們有磁單極，它的作用是為我們這輩子引來形形色色的人事物。它和人類形體所擁有的九個能量中心裡的「愛的中心」相連。在我們彼此分離的幻象中，磁單極把我們繫在一起。它在懷孕時與設計水晶同時到來，把兩顆水晶連在一起。但最重要的是，它控制了我們所愛的人事物。


    起初，磁單極內嵌在設計水晶裡，它們都來自於接近地核的同一條設計水晶束。磁單極建構起存在，將「我們以為的自己」和「我們的身體」幻象連接在一起。在「我們是獨立於他人之外的個體」的幻覺中，它維繫著我們的個性與設計水晶。


    人類的虛榮自大因此而生，這讓他們以為自己能掌控人生，好像他們是司機。但他們並不是司機。那是錯覺。我們只是搭便車的隨行者。'
