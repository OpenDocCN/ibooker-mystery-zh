    15 分鐘，門打開了。它就這麼開了。那些都是厚重的木門，而且我之前有把門關上。我的確關了門，因為那是個寒冷的夜。但是，那門就是開了。我揣想，好吧，或許我剛剛沒有關門。所以，我起身、走向門並再次把它關上。這次我真的確定有把門關好，回到火堆旁坐下。


