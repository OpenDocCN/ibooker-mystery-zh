    ## 2027 及以後


    # 九中心過渡形體


    1781 年以前，人類擁有七中心的程式，那是七個印度脈輪的佛陀體。地球上沒有其他物種以如此快的速度，經歷這麼多的演變。我們是極具突變性的生物。以七個中心構成人體圖，曾經只有五中心，更早之前則是三個能量中心。七中心人算是某種「完美」，而九中心的存在則是「潛力」的設計。


    智人這個物種在 1781 年走到終點，現在的我們處於過渡期。這正是日子為何如此艱難的原因，但也帶來某些從未存在過的事物：


    如果你觀察所有的宗教信仰，全部都屬於七中心人。對於九中心人而言，它們不再占有一席之地。我們都受制於七中心的歷史。譬如道德準則，以及那些是非對錯的基本主題。它們全都發展自七中心的「單一世界」，突然間，你來到
    1781 年，英國天文學家赫歇爾爵士首度發現天王星，這是一場神信仰終結的開端，也讓追尋合一的七中心之旅邁向終點。


    從往昔至今，我們仍保有的是心智的力量，但擺脫腦袋的時機即將到來。


    銳會大大受到感受中心①的影響，對他們來說那就是一切。而我們則必須將自己解放出來，不再只是一種不復存在的形體的劣質複製品。心智真的不再是重點。


    過渡期的形體得要同時服務兩種存在、兩種相異的物種。認真一想，這個形體實在太無與倫比了。它在過去就這樣存在了。我們一直擁有這樣的過渡形體，讓新形體能從舊形體中現身。


    ①感受中心：即人類設計系統中的 Solar Plexus Center，另譯為太陽神經叢或情緒中心。


    2027 年時，銳將從我們的過渡期形體中誕生。這帶給我們巨大的機會，也在我們面前設下巨大的阻礙。真正的人類已經不在了。想想在 1781 年之前生下來的最後一批七中心設計的寶寶。這是不久前的事——他們當中的某些人已經活到
    90 歲——世界上仍有他們的身影。而隨著 2027 年一日又一日地逼近，我們所運作的這個形體也不斷發生改變。


    負責這個機制的主要是冥王星。冥王星不太一樣，它並不在太陽系的行星家族中。它是個推進器，推動這個逐步變化的過渡期。它一步步地打開銳的可能性，並減弱人類的潛能。它是偉大的冥界之神。能領受這位「閉門者」的力量，是一種恩典。這正是
    Ra Uru Hu 的「Hu」的意涵。這個頭銜由聲音授與 Ra。「Hu」就是「閉門者」。門可以很完美地關閉，因為隨著我們愈加靠近，事態也將陸續明朗。冥王星是
    1781 到 2027 年這段轉換期的推手，推動以感知為基礎的新型態意識誕生。它正在等待發光發熱的一刻。


    我們將有 1300 年的時間，有兩種不同的生物共存於這個層次。在全盤理解的可能性實現之前，你無法將門關上。但這並不表示每個人都做得到。這不可能發生。總是有某些分形可以達成，而有些則被拒之門外。


    為了在 2027 年發生突變，人口大爆炸是必須的，但人類個體不會因此受益。另外還有溫室效應。這些都是必要條件。我們是為了意識的進化而存在——沒有選擇。自閉症和攝護腺癌是突變發生所導致的副作用，所有的犧牲都是為了轉化。


    當銳孩童出現，他們都會基於感知來決定優先次序。銳將進入你我全然未知的世界。雖然我們也身處同樣的地方，但就維度來說，我們是活在截然不同的世界。


    當 2027 年到來，有兩個議題需要面對：首先是我們自身的責任，再者，是以人類物種的身分，正確地把門關上。我們的責任是以利他主義的犧牲，來支持那些要取代我們的銳的誕生。當我們回顧所處紀元的這最後
    300 年，會發現這真的很特別，可以視為人類之門被關上的時期。1781 到 2027 年是一段極為特殊的時間，將由沉睡的鳳凰十字（Cross of the
    Sleeping Phoenix）完結。


    我們站在某種深奧事物的邊界之上。初始的階段已經結束，在 2006 年之前出生的人會逐漸消逝。這個過程緩慢，但已是進行式。我們在 2027 年會跨過分界線，再也回不去過往。現在每個人都擁有某種美好，但當週期轉換的震動發生時，也會出現許多醜惡。有許多人將為此受苦，但也會有人因而成長茁壯。


    但你無能為力。


    銳的設計圖與我們雷同，但銳和人類各有各的設計「維度」。兩者的迴路截然不同，相異的意識棲身於同一張圖中。銳的設計有著不一樣的解讀方式。倘若我們時間足夠——可惜我們沒有，因為我們會在
    1300 年後邁入這個層次的尾聲——我們人類終將滅絕。而在這個過渡期形體結束後，會出現終極的形體設計，也就是十一個能量中心的銳。


    銳來到這裡，是要成為共享意識的一部分；這樣的認知處理程序，是我們演化軌跡的完成。


    想一想，我們人類花了多久的時間，從受制於各種力量，進化到可以用雙腳走路，乃至擁有自身的權威？脫離無明，追尋覺知，然後獲得我們各自不同的獨特真相，這真的是一趟漫長的旅程。但銳無法和人類一樣有如此奢侈的時間。我們以將近十五萬年的時間演化成現在的樣子。銳只有一千三百年。他們一開始只有很小的族群，這樣特殊的情況將限制他們的成長潛能，更重要的是，他們必須學會如何以融合的意識來運作。


    我們面對的是一種先進的形體，這種形體的自身發展相對原始，並且對其同類有很深的依賴。這和我們真的太不一樣了！


    我們獨自出門，但他們來這裡是要成為群體中的一員。而且他們採用的是不同的認知方式。


    先來看看人類：我們擁有單一的功能與目標，在這個脈絡上我們稱之為策略。這十萬年來，以七中心形體運作的人類所達成的成就，是透過其策略性的認知，在地球上奠定了優勢地位。


    打從 1781 年起，我們大多數人突然對某些事物感到不適，像是對待動物的方式，或是人類想征服一切的貪欲；這並不奇怪。事實上，我們現在會這麼做相當自然。雖然我們是策略導向的人類，但我們同時棲身於過渡期形體中，因為感知的出現而深受衝擊。這種作用將不會出現在銳身上，卻對我們人類的運作帶來影響。


    七中心人是純粹的策略性存在。每件事都是基於「成功」和「找出答案」的主題。一切都與安不安全、確不確定有關。


    人類的視覺敏銳，因為兩眼距離相近，我們天生擁有非凡的空間距離感。而這也是策略性過程的一部分。人類仍以策略性的思維來理解生命，這是一種同質化的思考方式。不管是哪個地方或哪種社會，你會發現年輕人受的都是策略性的教育。


    他們學到的不外乎是如何聚焦於問題、如何找到解決方法、如何保護自己。


    隨著沉睡的鳳凰十字到來，我們來到人類生育力的終點。


    關於人類的生殖過程，我們所認知的一切都將徹底改變。


    基本上，我們現今擁有的所有技術都是七中心世界留下的產物，沒有什麼新科技能改變一切，沒有什麼「奇蹟能源系統」能取代被我們消耗殆盡的自然資源。繁榮已經完結。就像一台用光汽油的車，而恰巧山腳下有個加油站。我們人類位在山頂，就只能往下滾。我們沒電了。這就是人類的現況。而美好的是——因為美好總是存在——我們可以有意識地覺察，而且對於即將來到世上的那些感知導向的孩子來說，我們的貢獻是有價值的。


    人類的協調區域是「心智」，對銳來說則是「記憶」。明白這點對我們非常重要。記憶不會像心智一樣執行視覺概念化的作業，它是一個儲存區域。


    銳沒有心智，但當銳處於「伍群」①的狀態時，伍群就會像心智一樣運作，變成一個巨大、複雜且極有力量的存在。它不是個人的自我觀照意識，而是某種我們難以理解的意識場域。一個意識場不只有單一成員，而是由三到五人組成，一旦集結在一起，他們內在的深度都將透過伍群的活動而展現。伍群成為生命，而且那不是單獨的生命。


    談到社會演化，人類並不擅於此道。蟻群才是社會演化的縮影。我們人類不懂。我們必須使用網路和電話。事實上，我們的目標是滿足我們各自分離的獨特性。我們不是銳。你會發現銳的脆弱，他們的感知驅動意識在孤立狀態下是殘缺的。


    當你遇到一個未處於伍群狀態的銳，他看來會是個無力自理的殘障，需要被照顧，因為他似乎連最基本的策略都搞不清楚。單獨的銳只有一個優勢，就是有希望被送到養護機構看照。然而，只要他們在這些看護所裡聚結成伍群，劇情就會急轉直下，因為他們的心智將成形，擁有概念化的能力。


    如果你是個以情緒為驅力的人類，那麼你已透過制約學會善用策略性的心智，這當然會引發策略性思維的諸多不安全感，儘管如此，你使用心智的方式已被制約成形。但銳寶寶完全無法接受這樣的制約。他們活在我們無法了解的領域。這跟我們一同共享這個地球沒什麼關係，因為事實上，我們在很多層面都不會意識到對方。


    在你探索銳的伍群策略時，很有趣的是，伍群沒有所謂的成功中心、知曉中心②以及感受中心。


    +   ①伍群（Penta）原意為「5」。本書以中國古代軍隊「五人為伍」的編制單位，將 Penta 譯為「伍群」。

    +   ②成功中心即人類設計系統中的 Splenic Center，譯為脾或直覺中心。知曉中心即 Ajna Center，譯為阿基納或邏輯中心。


    伍群是一個獨立的存在，無需依靠那些中心。其獨有的內建策略是物質層面的優勢。好笑的是，當你想著要提供協助、為他們鋪路時，他們的意識卻比我們更有能力主宰世界。如果時間足夠的話，那就是最終會發生的事。伍群是動態的物質性存在，也就是關於物質導向、物質發展和物質表現。這是最棒的形體機制。比起單獨的銳，伍群強大許多。它極為複雜精密，其強大的能力是我們未曾擁有的。


    人類歷史上最特別的突變之一，是喉嚨的突變。這個突變讓我們得以表達，發展語言能力，這是策略性人類的驕傲。但很明顯的，銳不會是善於表達的形體。他們沒有這個需要。在策略上，語言能力深具價值，能夠迅速且大範圍地分享訊息，賦予人類凌駕其獵物的優勢；提供繁複的資訊，也是極為有利的條件，讓我們有能力征服地球。所以，語言是策略的重要元素。但銳對此毫無興趣，也沒有溝通的必要，因為他們是伍群。我們不懂箇中奧妙，連要猜測那可能意味著什麼，對我們來說都相當困難。


    在下一頁的圖中，我們看到的是銳的「孤閉迴路」（Autive）。裡頭並沒有 49-19 通道。這些在 2027 年 2 月 15 日之後出生的小孩，不論他們是銳或人類，都會有一條不正常的
    49-19。


    這兩個閘門僅保留啟動的潛能。這對我們人類來說差別不大，但銳將擁有全新的迴路，卻又具備相同的通道及閘門。'
