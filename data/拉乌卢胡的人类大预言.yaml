  md: '性徵也消失得無影無蹤。如果你想知道所謂的恐慌與驚嚇是什麼，這就是了。不管是誰，此時會在意的應該就只有鱗片到底會不會褪去，生殖器會不會回來。那就像某種科幻的爬蟲類生物一樣嚇人。不過鱗片終究還是消失了。經過好幾小時，在某一瞬間都不見了。他的身體總算復元。


