  md: '上數量最大的物質，而且具有無與倫比的特性。它是一顆冰冷的石英體，而且不到一公尺高，有三個側面和一個正面。


    它從未觸碰到衛星的表面。它只盤旋於電磁場上。如果你能看見它，你會看到的是永遠在移動著的三角形。那是可以被控制的移動。你擁有一個無生命的物體，至少就我們的理解而言，它被賦予三顆意識水晶，在一顆冰凍的衛星上、在一片電磁海上漂浮著。它們這麼浮動有個目的。而它們的目的就是一個正面。


    有大量的水晶已經被消滅，而稍後到來的真正的個性水晶也相互抵消掉了。這些因磁力而懸浮著的玉龍，有一套將在 20 億年的進程中運作 10 億年的程式。實際上，它鎖定了環繞著衛星的球體，就像一顆巨大的水晶球。這些玉龍都將運作一套精確的程式，來銜接並形塑完美的表面，也就是整體的設計水晶。但天知道，這裡頭還有玄機啊！


    我們人類喜歡「面對面」。好比戀人的擁抱就是一例。面對面對我們人類來說意義重大。而無論情人有多甜蜜，不管面對面的互動有多重要，到頭來，結束時就能轉身離開，總是某種解脫。但當你讓玉龍面對面可不只是一場小小的相遇而已——那將是一切。這個程式需要某樣東西來創造宇宙整體的設計水晶。它需要一種遠超乎人類想像的締結形式。玉龍就是設計來面對面相扣的。一旦它們鎖在一起了，就永遠不會解開。'
  merge: -1
  pgno: 246
- img_proc: true
  md: '你看見的是這些機制在龐大的意識系統組織中的壯麗演出，它們都是這個意識的構成元件。它們最終會藉由個性水晶的獨特統一性合而為一，但這個創造鞘的任務並不容易。我們談論的已不再是真正的無生物，而是確確實實的生命。


    這個意識程式的完美之處在於它不需要生物學。這是它的重大成功。沒有感覺，沒有危機，也沒有變化。沒有實驗方式，沒有飢餓，沒有評判、糾正或天賦。沒有味覺。沒有開放。沒有內在的外在，像是鼻子、嘴巴和耳朵。實心而固定。沒有喉嚨，沒有聲音也沒有心智。沒有心智。這是最後的「大腦建造者」。這是沒有心智的。它創建並組織宇宙之腦。而且不會死亡。


    在人類的設計圖中，欲望和服務這兩個能量中心從未直接相接。但當我們看著玉龍時，我們看到的不再是位於曼陀羅輪中的東西。這是一個嶄新的運作結構。如果你觀察介於欲望和服務中心之間的這條讓玉龍永生不朽的通道，你看到的會是
    8-1 通道。在這兒發現 8-1 可真是有趣啊。分享不復存在。


    你會發現，黑色的知曉中心區塊刺進了愛的中心。這是象徵性的。我們知道，舉例來說，在死亡與受孕之間，我們的磁單極與設計水晶不是分離就是相聚。這在玉龍身上別有意涵。請記住，玉龍的設計裡有三顆水晶。玉龍的設計水晶（來自我們地球的哺乳類世界）將會鎖在磁單極上。它們會'
  merge: -1
  pgno: 247
- img_proc: true
  md: '彼此相嵌。


    而我們所稱的個性水晶，只是另一顆設計水晶，則將會被拉進愛的中心裡頭。它並不會被牢牢內嵌，而是有點像被拉進了磁單極與哺乳類設計水晶的軌道那樣。個性水晶將坐落在黑色的知曉中心上面的空間。但你看著的這個設計之中，並沒有真正具功能性的解決或知曉中心。在那個區塊的
    20 和 45 閘門，將知曉從解決分離開來，我們可以把它們叫做「分享閘門」。但得認清這些都是底層的分享閘門。是它們在餵養那顆哺乳類設計水晶。


    ![](img/826d9e60a4e27f605a07c3f849b1e3a2_248_0.png)


    玉龍的存在有著許多必須做調整的地方。想想打從電腦問世後最常見的科幻主題「A.I.」，也就是「人工智慧」吧。


    人工智慧換個講法，就是將獨立意識賦予無生物載具。巨大的成就已經達成，就是人類為電腦編寫出了「上帝代碼'
  merge: -1
  pgno: 248
- img_proc: true
  md: '(God code)」這類的「意識編碼」。它就在我們之中，因為它就在我們的未來之中。但玉龍並不是機器人。他們也不是電腦。他們是擁有特殊設計的意識體。


    他們最主要的關切是移動，也就是導航。這就是我們有一顆直接嵌入磁單極的水晶的原因。駕駛與載具被盡可能地緊密結合在一起。關於他們的程序的完美與否，程度上與他們「能否辨別出那個真正獨特而自由的元素」的能力相關。這正是玉龍從人類身上繼承來的能力。那個被稱為人類個性水晶的東西，現在成了另一顆設計水晶。要搞清楚如何、用什麼方式、往哪裡移動，以便適應它者，將取決於這顆水晶。它將成為玉龍的洞察意識。這可是不得了的任務啊！它將憑藉其「能夠辨明它者的價值與正確性」的能力來運作。這個好處起源於人類個性水晶的進化過程，透過扮演個性的一部分，來學會這一切，為的就是準備建構出玉龍的這個結構機制。這不會太快。但到時候，你面對的就不再是個有心智的物種。而那就是它的完美之處。這並不是說玉龍就沒有選擇或決策的程序。制約元素依然會存在。但玉龍並不是人類。


    關於玉龍還有某些有趣的事情。


    他們將擁有深邃有力的同一性。每一個玉龍都是。這樣的同一性將在他們的一切移動中展現。想像這個位於電磁環境中寒冷而易碎的黑暗世界。這些小小的物體在搜尋、等待與過濾之際凋零。這全都是一場為了獲得連結的絕妙之舞。'
  merge: -1
  pgno: 249
- img_proc: true
  md: '這些面對面的神奇進程將會配對，並促使側面也相接在一起，從而建立總體存在那卓越非凡的管理樞紐。我們只有極微小的能力來理解箇中奧祕。它將重返磁單極這個無與倫比之處。


    不論我們位於這神奇存有的哪個地方，我們總與磁單極這個了不起的元件相伴。磁單極讓事情得以發生。它是個非凡的構造，它最厲害的地方在於，將萬物聚集起來並維繫著。這個絕妙的能力讓我們能對準自身方向，好讓我們在宇宙行動，我們將這稱為愛。天衛四的磁單極永遠會為宇宙整體指引方向。宇宙整體的「生命」乃是磁單極管理的。當然，是磁單極將我們從「我們是分離的」這個幻覺結合在一起；但在這裡，磁單極所展現的是更奇幻的部分。有件事讓它與眾不同。那就是從人類身上接收過來的個性水晶。在這裡，（分離的）幻覺轉變成「獨特（uniqueness）」的幻覺。元件必須要能透過「它們是如何互相連接」的差異，來辨別是否找到了正確的鎖定面。當有了一個，就會開始越來越多，直到它們全都互相鎖定在一起。


    對玉龍來說，能量中心的價值和我們所了解的人類中心並不相應。每個部分都有著不同的意義。先讓你知道的就是玉龍是個真正冷酷而完美的意識形式。他不會吃，不會睡，不會有性，也沒有搜尋的必要。我們浪費了太多時間在維繫自己的生命。玉龍將是意識的完美盒子。據聲音所言，那就是我們的未來。'
  merge: -1
  pgno: 250
- img_proc: true
  md: '我們人類是「內在的故事」而非「外在故事」。唯一的外在故事是我們在這輩子被賦予的一切錯覺，但這些都是娛樂罷了。我們是內在故事。我們都是機械。我們都是機制。這就是現在的我們，只是我們不知道。我們是宇宙程式所控制的機制。你覺得，幾萬億的微中子每秒鐘穿透整顆地球是怎麼回事？那地球上每一個意識體的訊息，被以光速朝宇宙各個方向發散出去，又是怎麼樣的情形？1781年發生了某些改變已經不是新聞了。你旅行好幾百光年，你覆蓋了各種領域的方方面面。我們一直都在編碼整個宇宙，就像它對我們進行編程一樣。這是一種生物回饋，我們現正處於一個我們無法有意識地控制的舞台。但玉龍可以辦到。他可以用這個身軀完成這件事，而這也是他必須做的。那個身軀就是我們的身體。玉龍會履行這個理解。


    未來大概會有1億個左右的玉龍。Ra說他知道確切的數字，但他老覺得精確數字很蠢。未來會進入玉龍的大部分水晶，將會在地球末日時轉世，


    也有特定的水晶束將會參與這個玉龍的程序。這同樣會發生在哺乳類水晶。當玉龍最終掌控了他的身體時，將會改變宇宙的形貌。玉龍的唯一獨特面向是源自人類的那顆個性水晶。我們用人類術語所謂的「孩子」來稱呼這個尚未誕生的宇宙，但那只是某種比喻，千萬不要產生錯誤的思考。我不認為有任何人能夠捕捉到這種宇宙生命誕生時的可能樣貌。聲音跟Ra說過：「宇宙代表了一種生命，但它尚未誕生」。'
