    那是瑪雅幻象的基礎。你早上起床，張開眼睛，這就是你已經習慣了的幻象。這個幻象透過你的雙眼運作，而在我們的演化故事裡，上一代的運作媒介是鼻子。現在，銳則是透過頻率來運作。他們透過頻率來感知，觀看方式有別於人類。他們從外在視覺轉變成內在視覺，進入一個沒有樹木、道路，也沒有天空的世界。除了頻率之外，其他都不存在。事物會透過伍群進行轉譯，再由銳分享出去。我們無法明白這樣的世界。


