    有他的身分特徵。玉龍與幾何學及研究調查的連結更深。你可以把他看做一種多重通道系統，透過共性鏈結，這個機制注入冰凍的二氧化矽，與意識一同運作。這個意識是鮮活的，我猜這是它能被展現的唯一方式。載具不算活著、也沒有死去，它是單純的無生物，但意識則在裡頭存活。這個灰色區塊為意識灌注了生機。這個程式是個非常巧妙而精確的形體，這個形體就只是單純讓意識駐守其中。如同我們所理解的，形體本身並不依賴意識。它就只是水晶基底的頻率產物。


