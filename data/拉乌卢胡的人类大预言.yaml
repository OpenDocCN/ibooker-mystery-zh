  md: '這是他聽到的精確說法。是玉龍把這個宇宙、這個還沒誕生的整體，帶到準備誕生的外在世界。這個整體有唯一個性，而玉龍則在宇宙規模上提供了類似人類新皮質的東西。


    要把我們對閘門的已知詮釋用在玉龍身上時，請務必謹慎。就像人類拍攝的電影裡，外星異形的形貌總類似某種生物體，因為那就是我們唯一理解的生命模式。我們很難把玉龍喚作生物，所以最好還是用玉龍稱呼就好。我們面對的不是那種會入世然後離世或者演化的物種。在此，我們獲得的是終極的答案。這就是完美的形體原則。再也沒有進行突變實驗的必要了。它有著無與倫比且幾乎堅不可摧的特性。這


