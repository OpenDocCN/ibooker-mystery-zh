    我知道它們屬於我。某程度上, 它們屬於我。它們是我的。這不是某種被撿起來的隨機「傳真」。我很清楚我必須以完全不同的觀點來看待我的過程。順帶一提, 但不是在那一夜。


    所以, 我手握著那本書坐著, 我打開它, 看了其中一頁後把書閤上然後咯咯地笑。


    我不知道該如何描述。那就有點像是你發生了車禍但沒受傷, 然後你笑了出來的感覺。我翻閱那些書頁, 然後閤上,接著就是笑聲與驚喜。這是種驚喜。啊, 真的是驚喜。沒有「這到底打哪兒來的?」的疑問。只有這絕對的驚喜。


    接著, 當我經歷了這頭暈般的過程後, 門打開了。有些怪事是無法用合理方式理解的。沒有能打開門的風。而且門是關著的。我不知道是什麼打開了門。這也是我被「碎裂」的一部分。或許那門根本沒被打開。也可能我就只是看見它開著然後走了出去。我不知道。因為當你身處於這樣的體驗時,
