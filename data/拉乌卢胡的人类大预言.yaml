    這本書對我而言十分神聖。它是我跨越了某種界線的證

    物。它讓我不再是部主觀的電影,轉而成為一種客觀的經驗。

    對我的意識而言,這是相當重要的一步。這是我的證物。只

    屬於我的證物。它不是、也無法是別人的根據。但對我而言,

    它證實了生命的多重性、我們看待事物進行的方式,以及各

    式各樣的力量。


    沒有人曾看過這本書。這是本魔法小書。我搖醒我的朋

    友並對他說:「你絕對不會相信!你絕對不會相信!沒有人

    會相信的。你真該看看。它完全就是來自異世界啊,太不可

    思議了!」但他答道:「你在鬼扯什麼啊?我只想好好睡覺,

    不要吵我啦!」我接著說:「你一定得看看!」他回:「我

    不想看!」於是我說:「好,那你就永遠看不到。」我在三

    個月後把書燒掉,但那又是另一個故事了。


    它十分不可思議。也非常難以置信,因為我很清楚書裡

    的玩兒不是我的意識記憶體所能擁有或與之產生聯繫的東

    西。它就像是本科幻小說。我對天發誓,它絕對是部無與倫'
