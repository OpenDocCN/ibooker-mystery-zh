  md: '關於銳，我們需要明白的是：他和我們不同。銳追求同質化，但這裡所謂的同質化，並不是我們以為的那種「會讓我們遠離自己」的形式，而是一種融合的意識，個體不再是重點。如果你把一個銳隔離起來，他就會像放了一星期的蔬菜湯般腐敗、壞死。對人類來說，能獨立是一件光榮的事。我們是「我是」（I
