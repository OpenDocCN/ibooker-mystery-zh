  md: '讀了這本書，你會知道宇宙是如此之大、如此不可思議，且以「億」為基本單位在運作的整個演化機制期程是如此綿長。相對之下，你我所棲身的這副僅能存在八十餘年的區區天王星身體所主演的電影，對宇宙總體來說真的是一眨眼的事。而對你十足重要的喜悅、煩惱、憤怒、執著，某程度上，其實也都不算什麼了，不是嗎？


    Steve 在本書舊版中有段作者後記（中文版所依據的原文版本裡並未收錄），我特別喜歡他所提的一段話：


    > 許多人在把人類設計摸得滾瓜爛熟後所犯下的最大錯誤是：他們認為自己知道自己是誰，明白自己的可能模樣以及將臨的未來景況。但真正覺醒的人從不知道自己的真實樣貌，他們不會拿腦袋用來自我描繪的術語去定義自己。人類設計如同世間其他的知識、真理乃至尋常資訊一般，會不斷透過不同分形線上相異的水晶過濾並加入特定訊息而流竄，是不斷變化的智慧。


    你今天懂很多，不代表你真的認識自己，既然不可能完全認識自己，那好好的、慢慢的、以各式各樣的方式做實驗，大概就是這一輩子都得繼續的旅程。意識水晶進駐於我們體內，你我也會跟著進化，無需自以為是、不用跟別人比高低，敞開胸懷迎接各種可能性（再好好篩選什麼適合你、哪些不OK），這就是完美，這就是做自己。


