  md: '天狼星本屬於單星系統，它沿著一條軌道移動，在軌道上遇到了一顆暗星。我們不知道暗星來自何方。天狼星吸引了這顆暗淡的伴星——天狼星 B ❶。這顆星星不會自行發光，因為它只吸收光線。換句話說，天狼星
    B 是密度超大的星體。它具有不成比例的引力，引力還強大到能把光拉進來轉換成物質。這顆相對次要的星星，突然間成了聯星❷。


    這顆暗伴星是個高密度甚或超密度的坍縮星❸，也可能是早期經過劇烈爆炸而生成的中子星。它在宇宙間航行，然後被天狼星的重力場抓住。當這顆伴星被拉進天狼星的軌道時，它所做的第一件事就是吸取天狼星的能量，或者你可以說，把天狼星的光拉到自己身上。


    北非有個名為多貢人的部落，相當讓人著迷。他們有些神話不只敬拜天狼星，竟然連這顆伴星的存在也知道，並有繪圖記載。他們發現了這個事件的機制。這真的很了不起。沒錯，這是個古老的文明，但他們確實知道些什麼。他們的發現非同小可。


    基本上發生的事情是，這顆更小、更高密度的星體開始繞著天狼星運行，並藉由這個過程，開始把天狼星撕裂開來。不僅僅是撕裂，同時還把它吃掉。在這顆伴星被天狼星重力場捕捉到的那一刻，它們在幾何軌跡中相遇了。而在地球上，就在這一刻（考慮它和我們之間的距離，對應到我們的時間），我們倏地看見天空中出現了這顆亮得驚人的新星。'
