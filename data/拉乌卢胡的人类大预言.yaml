    # 關於作者


    史蒂夫羅德斯（Steve Rhodes）是班圖（BaanTu）的創辦人。他身兼英倫音樂家、電腦工程師、作者等多重身分，還是一間唱片公司的老闆。出生於奧地利，在搬到倫敦之前，他主修機械工程管理。就讀大學時，史蒂夫從海選中贏得全國最佳音樂新人的頭銜，並與哥倫比亞唱片簽約。隨後陸續在各大電視、廣播與其他媒體展現才華。2010年時，史蒂夫在倫敦經營名為「半人馬座阿爾法星（Alpha
    Centaur）」的頂尖錄音室，包括肯伊·威斯特（Kanye West）、米亞（M.I.A.）和流行尖端樂團（Depeche Mode）等音樂人都曾在這兒錄音。對史蒂夫最新的音樂有興趣的話，請上marquii.net聆聽。'
