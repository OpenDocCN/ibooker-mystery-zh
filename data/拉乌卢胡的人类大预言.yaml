  md: '天衛四在太陽系裡極為與眾不同。天王星的所有衛星,都是以莎士比亞或亞歷山大·波普❶的作品角色命名。天衛四(奧伯龍, Oberon)是莎翁戲劇作品《仲夏夜之夢》中的精靈王。就連天衛四上的諸多地方也都是以莎士比亞劇作的角色為名❷。這是我們太陽系中最沒規則的反常天體命名法。我們在前面有提到,歷經了這麼長的時間,這是水晶束初次呈現出截然不同的配置。事實上,某些分形隨著太陽結構水晶的剝除不復存在。


    在未來的幾百萬年裡,水晶們會沿著與木衛二平行的軌道來繞著木星轉。而梵天之夜就是這段為了重建的預備時間。在這個過程裡所發生的事情,沒有任何人能夠掌握。此外,在一段長達一百五十億年的過程裡,梵天之夜的二億年不過是打個小盹而已。總之,重要的轉型正在發生。伽利略衛星們正是為此而推移著訊息。整個過程需要二十億年,但這些衛星不會走完全程。接著,我們也能開始看見太陽的死亡。在死去時,它會吞食木星的內行星與衛星。這也是訊息得花上二億年沿著木星的軌道來傳遞的原因。


    分形線是一種階層結構。每當基礎元件進行了淘汰或轉換,分形就會被重新定義。在這樣的活動史當中,有個獨特而離奇的狀態。有一百四十億年之久,中心水晶總都是跟著水晶束的遷徙而動。


    但它們將不再這樣前進。它們將被棄置並且煙消雲散。'
  merge: -1
