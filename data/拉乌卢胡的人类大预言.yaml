    # 梵天之夜


    chapter9'
  - '[PAGE 217]


    梵天之夜是重返空無，回到虛無。某種意義上，甚至是超越虛無的。我們對此並不熟悉。這具有可怕而恐懼的風味。每個孩子在沉思自身的死亡時都會感受到這種空無。每個小孩都會在某個時刻進行這種探索，也終會走到因為理解不了虛無而覺得奇怪的境界。有些孩子會被嚇壞，有些則是因此而興奮激動。我不認為有誰可以真的領會到，在梵天之夜這樣的空無中，到底會發生什麼事。


    我們離未來越近，就越能感受到自身的無力程度的高低有多少。某些事情會被揭曉，讓我們好奇箇中意義究竟是什麼。未來在現在不過是個故事。就只是故事而已。答案只能靠時間來證明。


    極有可能會是一顆流星在這回合的尾聲終結地球上的生命。介於火星與木星間的小行星帶，宛若失敗的原行星①的集散地。那兒的天體數量多得驚人，而且有好幾顆的尺寸相當巨大。有專門的科學家試著盡可能地追蹤這些小行星，但這是個沒有希望的任務。問題在於這些小行星不斷地互相撞擊並因此改變軌道。因此，要追蹤可能成為行星殺手的天體，其實非常困難。那就好似一張巨大的撞球檯上有著數不盡的球。你幾乎無法做出預測。


    這個小行星帶中，有個區域十分接近我們。


    它被稱為近地球小行星群（NEAs, near-Earth asteroids），這些星體的軌道與地球軌道相交。因為它們的尺寸十分接近我們的太陽系大小，我們所能發出警告的實際時間真的相當'
  - '[PAGE 218]


    短。有許多人的試著對太空中的所有天體進行編目以便進行追蹤。我們一直都知道這對我們相當重要。就拿恐龍來說吧。牠們是地球這個巨大的爬蟲類異世界的主宰。其他一切生物型態都得倉皇藏進暗處來躲避牠們。接著,突然間一顆極為帶勁的隕石從天而降並引發了核冬天❷,太陽被封住好幾年,因而恐龍這些冷血爬蟲類就死光了。就像這樣。就是這部電影,而劇情並不新鮮。這就是故事的進展,這就是突變的運作方式。你可曾看過銀河星系互相撞擊的精采照片?難以置信對吧!這是個龐大的突變程式。從我們的觀點來看,那好像頗為粗暴,但看看你身體裡的T細胞❸,不也是攻擊並侵入微生物,再將之生吞活剝嗎?外太空有顆標示了我們的號碼的隕石在等待著。它就坐落在那些區域之中。


    關鍵從來就不是假如。而是何時,根據聲音的說法,關於何時發生有個時間框架。但我們從未沒被告知精確的年月


    +   ❶原行星(protoplanet)是還未成為真正的行星之前的「胚胎行星」,會透過在運行軌道上的擾動,導致撞擊或碰撞來成為行星。太陽系內較知名的原行星包括穀神星、智神星和灶神星。)

    ❷核冬天(nuclear winter)是關於氣候變化的理論,最早出現在1980年代的科學雜誌,認為核爆後產生的大量濃煙與煤塵將會進入大氣層,並導致非常寒冷的天氣。但這樣的理論在2006年的研究中被認為原始的理論模型有誤。

    ❸T細胞(T cell)屬於淋巴細胞,功能種類多元,在免疫系統裡扮演重要角色。


