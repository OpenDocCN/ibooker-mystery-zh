    ## ch5 2027 及以後


    ## ch6 銳的設計


    ### 孤閉迴路 關鍵字:融合


    關於銳的本質，你要了解的是，他的動力中心位於孤閉迴路裡。銳就是這麼一回事，而這也是我們人類無法理解的能量運作方式。我們面對的是突然出現的覺知潛能。孤閉迴路就是個動能的配置。它的主要任務是傳送與接收訊息，但我們無法真正領會。這個迴路的關鍵字是「融合」。這個有趣的字眼並不常見，也沒有太大的價值。當眾多獨特事物仍設法尋求真正成為一體的方式時，融合就發生了；這個方式讓他們彼此連結的程度，遠超乎我們表面的理解，那是一種無縫隙的共有狀態。融合是拋下個體的差異，並敞開自己去融入更大的整體。


    如果你觀察感受中心的中央，會看到 49 閘門，而在根中心的中央則是 19 閘門。它們沒有形成通道。19 閘門並不屬於孤閉迴路。


    所以，你在圖裡看不到它。當我們的 49-19 通道被淘汰時，49 閘門就擔負起截然不同的功能。稍後我們會看到 19 閘門的新特質，那也會在 2027 年之後出生的人類身上運作。


    ### 孤閉迴路的訴說能量流


    在看迴路時，我們都會去研究其中的能量流。當我們去看訴說能量流時，看到的是分享與融合的能量，能夠帶來頻率訊息，也能釋放頻率訊息。


    ### 孤閉迴路的接收能量流


    孤閉迴路的另一條能量流是接收能量流。所以,我們有一條能量流負責訴說,然後還有一條負責接收。這種接收至關重要。它是接收的覺知來源。而這裡所謂的接收,比較像是我們人類的吸氣。


    ### 存取的閘門


    我們有兩個領域，一個是接收的能量流，一個是訴說的能量流。然後我們還有存取的閘門，也就是 49 閘門。它的意義重大。它是個協調點，將接收的動力和訴說的能量結合在一起，讓一切得以顯現。我們先前已經提過，銳將仰賴伍群而生，伍群把銳融合在一起，而銳則透過有意識的伍群來運作。


    這和人類的伍群機制不同。我們的伍群是運用動力柱❶的通道，從服務中心穿過愛的中心，再來到分享中心。但這些通道並不在孤閉迴路裡。


