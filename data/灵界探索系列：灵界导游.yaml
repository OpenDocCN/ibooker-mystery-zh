    在此一层级从事建筑的也一样，他们同样不能创造原料，只有从最上层热心的居民那儿获得砂、水泥、石材、木材等等的原料供应，然后同样以意念去构筑各式各样的屋宇住宅，亭台楼阁，由于原料精细又比阳世有创意，所以还是相当美观的，但是他们也不是为了谋生赚钱，而纯粹是为了“喜欢盖房了”，所以他们也很热心地盖其他不太善于用意念盖房子的各村居民（也许'
