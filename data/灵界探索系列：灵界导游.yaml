    # 第十一章


    # 丰都城里来娇客


    “阴音”（灵界）是一个与“阳世”对称的名词。是有情生命死后的归处，也是所有众生死前等候轮迴的暂居之所。是另一度空间，是另一个次元，一般人经常产生的一个误解就是“阴间”就是“地狱”，充满了阴森恐怖的气氛，是一个魑魅魍魉，无常恶鬼居住的地方。然而，事实上“阴间”只是一个通称，真正的意思指的是“灵界”，包含了极乐的“天堂”，过渡地带的“冥国”和恐怖黑暗的“地狱”。阳世的肉体活动仅只是刹那间生命现象的投影，而灵魂才是永恒的生命本质。举世所有宗教的基本教义，莫不肇建在“灵魂不灭”的原始主张之上。自古以来，世界各民族都各自拥有不同的“灵界沟通方式”，其中最普通的就是以“灵界”做桥梁与灵界亲友沟通的“附灵术”，但在我国除此之外，却拥有更奇妙，更具有实证性的“观灵大法”。相关的资料经过长期归集分析，不只是单纯的灵异事件实录，更是研究灵学与灵界架构弥足珍贵的第一手'
