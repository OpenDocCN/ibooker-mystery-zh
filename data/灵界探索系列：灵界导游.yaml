    类（智性生物）和人类是不共处在相同的区域内，相互之间并不来往。事实上连人类自身也一样，中国人有中国人的区域，外国人有外国人的区域，甚至同为中国人，由于多民族、多省分，各自不同的生活方式也因为物以类聚而各成聚落。


    从“观灵术”众多的纪录中可以看出来，绝大多数死后进入灵界者都是来到中阴界（轮回过境室）中层的这个区域，经过推究其原因；是因为阳世功过两平的一般人毕竟占大多数，所以死后能登入“涅”的少之又少，能晋入各层黑暗世界的也占少数，基中至少超过半数以上的灵体依照其灵性层级依然是处于和阳世景况差不多的中层，当然也有部分生前全心专注于各种文学、艺术、美术或其他能提升人类精神文明创造的人，也依灵性高低，自私心的高低而能进入中阴界最上层或上层。


    由于前面说过：中阴界各层级间并设有明显的界限，而是渐层（渐进）方式交融的，所以即使在所谓“中层”这一广大区域中，所有居民依其能力也有高、中、低之分，却共同亲处其间；


    高能力的居民可以获得衣、食、住及生活日用品，甚至嗜好品（如烟、酒、茶、咖啡）之类的供应，同样是具有变化能力，所以过得相当富足，但由于能力有限，并不能以之供应其他灵体，也不可能大量制造来供买卖，但是也由于自私较重，所以不能晋升至上层或最上层，同时又受限于灵界法则，所以也不能接济其他较下层衣食不足的亲朋好友。只不过他们不必再来向阳世亲友索取，即使阳世亲友经“观灵术”进入灵界与之见面并询及是否需要钱，他们都会很肯定地表示自己过得很富足，并不缺钱，所以也不接受阳世亲友的济助。


    高能力的居民另外有一种“超能力”；就是他们会以将对阳世的记忆幻化成三度空间的虚像（也许是直接影响阳世来人的脑波），使得进入灵界者可以看到一如阳世的景致，这点从作家边'
