  md: '当然，不只是地球人类才如此，其他外星球的人类（智性生物），不论其科技文明是高过地球或低过地球，只要在精神及心灵层级和地球人类差不多的，死后也是会来此报到。这点我们不妨看看地球上的情形，今日人类的科技文明当然比三、四千年前不知超出了多少，甚至是古人做梦都无法想像的，但是在精神及心灵的层级上我们并没有长足的提升，相反地人类社会高度都市化的结果，使人逐渐远离了大自然，忽略了人类与大自然共荣共存的互相关系，为了追求物质文明所带来的方便与享受，早已严重地污染和破坏了大自然，再加上人欲横流日超严重，因此在精神及心灵层面甚至有日渐退化的现象。


