    B、“天眼通”：可用意念看见被密封在盒中的文字或物件。


    C、“念力”：以意念移动或改变物质（简称 PK）这三种能力，被莱因博士定名为“超感官知道”（简称 ESP）。


    其中第①、②项属于超心理学研究部份。


    第③、④、⑤项属于灵魂学研究部份。


    +   - ①人的肉体死亡后，是否有灵魂的存在？

    - ②灵魂是物质性的？或非物质性的？

    - ③灵魂的存在（生活）方式？

    - ④天堂、地狱或另一种死后的灵魂世界是否存在？

    - ⑤灵魂与人的生命及生、死的关系（即是否真的有轮回转世？）


    +   - ⑥鬼魂骚扰现象。

    - ⑦恶灵附体的研究及驱除。

    - ⑧灵魂的能力？


    一百年来，灵学（包括超心理学及灵魂学两大部门）的研究一直是西方人的天下，反而普遍相信“灵魂不灭、轮回转世”之说的东方人却一直让其归属于宗教之中，而仍未提出来单纯地作科学研究，甚至任何人试图去作研究，就会被冠以“怪力乱神、倡导迷信”的大帽子。


    然而在西方的灵学研究中，百年来，参与研究的学者专家极多，对“超心理学”部份已经有了长足的进步及丰硕的研究成果，但却也一致认定在“死后生命”（灵魂学）的研究上极难掌握，虽然大多数学者专家都认为“死后生命的是否存在”对我们每一个人都非常重要，但是遗憾的是，迄今为止我们仍不得不同意麦尔斯在一百年前所说：“有史以来从没有人经由科学方法解答出人类灵魂的是否存在，其能力及轮回等问题。”


    的确，一百年来，灵学的研究已完全偏重在“超心理学部'
  - '[PAGE 263]


    # 第二十三章 灵学的回顾与展望


    份”，越来越人愿意去碰触“灵魂学”的研究，甚至“超心理学”也早已独立成一门学科，和早先的灵学已分道扬镳，划清界限。


    同样的，我们仍然必须承认“死后生命的是否存在”对每一个现存的活人都异常重要，只要能找到确切的解答证明灵魂的实存，证明轮回转世的实存，那么绝大多数的灵学问题甚至人生问题或一些神秘的鬼魂附身之谜必定可以迎刃而解。


    我们不得不感谢一百年前创立“灵学研究社”的先贤以及历来专家学者们的努力，但我们也不得不承认直到现今在科学对灵魂的研究上，我们和远古人类相比，也未必知道得更多。


    因此，灵学的未来是什么？


    是因为科技文明的持续进步，总有一天我们透过科学的方式，先进的精密仪器而侦察到灵魂与灵界的存在？一如巴斯德发明了显微镜而发现了细菌的存在？


    或者我们必须及早的发现那可能只是一条永远走不通的死胡同，我们必须赶紧另辟新径，从另外的方向来研究？


    编者不想也不能去预测什么，但是却也不愿去等待科技文明的进步；在下个世纪或数世纪之后的发明，万一其结果仍像今日一般地令人失望，那该怎么办呢？何况现世的生命如此短暂，对生命真义追求的欲望却是无穷的。是否我们应该放弃对仪器探索的期望与枯等，只是采用科学客观、系统的分析方法、以理智逻辑的认知，重新清理出那条荒烟蔓草中的古老途径，去探索灵魂与灵界的存在是否较好呢？


    > 曾有科学家悲观地认为：“以人的大脑去认知大脑全部的奥秘那是不可能的！”


    同样地，以人有限的物质性生命想要去了解无限的非物质性生命，那也是不可能的。正如同我们不可能用解剖刀及显微镜在人的肉体上找到“爱”存在与否的证据是一样的。'
  - '[PAGE 264]


    或许未来我们可以找到可行的其他途径、但是在今天，编者却愿意以一切之努力，留下相关的纪录。


