    # 第六章


    ## 中国人和佛教


    “有钱能使鬼推磨”，这句俗话可说是所有中国人个个耳熟能详的，除了背后隐藏着强烈嘲讽的意味之外，也说明了在世俗观念中，人死后做了鬼还是要用钱的，而且因为拥有钱财的多寡还有富鬼、穷鬼之分。


    在佛教的经典中，佛曰七有：“地狱有，旁生有，饿鬼有，天有，人有，业有，中阴有。”


    此外所说的“有”是指“确实存在”的意思，那么，六道轮回中的“饿鬼道”既然实有，所有饿鬼又可分为：


    - （一）无财鬼：贫无福德，常受饥饿烦恼。

    - （二）少财鬼：可以得到很少的饮食，但常感不足。

    - （三）多财鬼：可以有妙饮食，且能满足。


    据佛教的说法：无财、少财、多财之别原是指饮食获取的能力，但因为名称上的混淆，反而形成民俗观察中富鬼、穷鬼之分。


    # 第六章 中国人和佛教


    佛教在传入中国之前，如两汉、先秦以至更早的世代中，祖先祭祀甚或原始报道满教的祭祀习俗中，除了实物供品的直接奉祭，也常伴随有焚烧实物或焚烧代用品奉祭的行为。


    推而广之，则不得不提到中国人原始陪葬的习俗，依据考古学者对“山顶洞人”及“西安半坡遗址”研究中发现：


    在原始人的观念中，生与死之间的界限并不很明确，甚至也没有“有、无”的鸿沟来将活人和死人隔开，似乎总以为：死去的人只不过是到遥远的地方去过另外一种方式的生活，甚至比他原来的生活过得更好，而且仍然与活着的人保持着很密切的联系。我们有理由相信这种观念绝不是因为对死亡所代表的“结束、虚无、绝望”一种补偿心理所产生的幻想，而应该是一种相信“灵魂不灭”的宗教雏型。原始人这种观念从何而来，迄今我们仍不清楚，但是至少在许多对远古文物的考古研究上，却提供了不少这种原始信仰的证据。在中国，迄自发现的最早具有墓葬仪式的，是生活在距今一万八千多年前的山顶洞人，相当于旧石器时代的晚期，经考古学家的掘发现；山顶沿人居住的洞穴分上下两层，上层供活人居住，除了有用火的生活迹象，还有骨针，石器和一些装物以及婴儿头骨的碎片。下层则是安置死者遗体之处，除了有三件完整的人头骨和部分份躯干骨骸，在遗骸四周还放置有石珠、骨器坠子、钻孔的兽齿等饰品陪葬物，最主要的是骨骸周围还散布着红色的粉末（赤铁矿粉），可能是用来象征血液，表示亲人对死者生命复活的期望，加上陪葬物的证据，或可证明山顶洞人时代对生与死之间的观念，这也是在中国所发现最早的相信死后生命依旧存在并继续生活的原始信仰证据。


    此后，在属于新石器时代，距今六、七千年前的黄河流域“半坡遗址”(属仰韶文化系统)，考古学家也发现了具有规模的氏族公墓地，并具有各式各样的埋葬方法，其中主要的除了陶制、骨制的日常生活用器、饰品的陪葬物之外，还有米壳等真的食物，在在显示了相信死者是去到另一个地方过新生活的信仰。而最重要的则是在此出土的孩童瓮棺葬，孩童的遗骸是被安置在瓮罐之中，但用来做盖子的陶钵或陶盆上却有人为刻意钻通的小孔，经考古研究家认为这是留供死去孩童的灵魂出入的孔道。


    其次，在同属新石器时代的“裴李岗墓葬”的考古中也发现了为数颇多的陪葬物，而且男女有别：男性多为石刀、石斧，女性多为纺轮及磨盘，除了显示生前男主外、妇主内的分工，甚至相信死者在死后的世界仍是依照其生前的性别继续分工合作的过生活。


    同时，由于亲族合葬墓的发现，也可证明当时的人们是相信死后的生命与生活型态以及亲族关系也是一如其生前的，而孩童棺盖上的孔道，更证明了当时的人们已经有着“灵魂不灭”的坚定信仰。


    也正因为这种原始信仰，中国人对死后生命的存在与继续在另一世界生活的观念一直沿袭下来，并不因为后期正式宗教出现而受到丝毫的影响，也因此陪葬的习俗在中国历代的丧礼仪式中是非常重要的一环，从秦始皇陵地下的，庞大兵马俑阵仗、马王堆汉墓中全套贵族专用的珍宝器皿，到清朝十余位皇帝后妃陵墓中价值连城的金银珠宝陪葬品，甚至一般民间陶瓷、玉石的宝物冥器，数千年来，中国人不惜将珍贵的金银珠宝，日常生活用品，生产工具，甚至烟、酒、赌具等嗜好品姑且同死者埋进地下，都在在显示了这种相信“死后生命”及“阳间灵魂世界”的观念是如何的根深蒂固了。


    尤其是不少历朝历代的帝王贵族，更不惜以众多的活或活的牲品（特别是马匹）来殉葬，以供其在阴间驱使差遣，虽然后来渐为陶俑纸人来取代，但其基本用意却是完全相同的。


    现今，活人或实物的陪葬风气已被各种代用品所取代，除了金银首饰仍用实物之外，其他一应生活用品全都代之纸扎的冥器，从屋宇宅院、厨房、箱匣到桌椅梳妆台，甚至连金山银山，童男婢女甚至现代化的收录音机、电视、名牌轿车或麻将赌具，无不可用纸扎品来替代，当然这几乎是为了经济上的考虑以及便于快速焚烧或许人们是相信与实物陪葬物相比，纸扎代用品在焚烧后化为无形的意念，将更能合乎阴间无形的死者亡灵所用。


    传统陪葬品除了实物或纸扎的代用冥器，各式各样的纸钱，冥币自然也是不可或缺的主要必备物。


    先谈求神祈愿方面，焚烧的金纸有福金、寿金、刈金、天公金、五色金等等，令人不禁怀疑有千变万化大神通、法力无边的神明，难道也需要没有什么本事的升斗小民焚烧金银财定（象征性的代用品）供应日常所需吗？这岂不是像大富翁拿着金饭碗向乞丐要饭一般讽刺而可笑？


    但是古话说“钱能通神”，的确所有人都知道“有钱能使鬼推磨”，而绝大多数人却不知道这句的下一句是“怀币可差神扫地”，充分说明了神也是需要钱的，为什么呢？


    其实从原始“萨满教”万物有灵论以来，中国传统道教以及民俗宗教中几乎是凡天地山川、树石花草、碗筷桌椅、床灶门梁全都封了神，其中不乏因笼络谄媚而被“神化”的鬼怪精灵、魑魅魍魉，也有原本神格就不高的，如社神（土地公）、灶神以及神祇周围的兵将（阴兵阴将），而在民俗宗教中，极多明明扛着正神招牌的，往往又是略有鬼通的孤魂野鬼在那儿装神弄鬼、狐假虎威而已，在此附录清朝大才子袁枚在其笔记小说《子不语》一书中所载的一则故事——“成神不必贤人”：


    有位叫李海仲的秀才，为了前往京师参加秋试，从苏州雇船北上，到淮上时，突然来了一位旧时姓王的邻居要求搭个便船，李海仲答应了，但是到了晚间，这位姓王的邻居明白地表示自己不是人而是鬼，此去是为了向一位在京师刑部任职的汪某人索债，由于这位汪某人是李海仲的亲戚，李海仲闻言大惊，只有好言相劝，试图居中化解……


    姓王的鬼魂终于同意只要汪某肯还钱，必不伤害他的性命，一人一鬼来到京城之后，由于鬼魂作祟，汪某突得疯病，终于李海仲居中调停，汪家还了债，鬼魂才放过他……


    李海仲终究没考中，一人一鬼又同船回江南，鬼在船上时，一切食，只闻一闻而不吞食，但热的食物被他一闻，立即变冷……


    船行至宿迁（江苏省北边的小城）时，鬼魂说：“某村唱戏，我们不妨一起去观赏！”李海仲答应了，一人一鬼在戏台下看了几出戏，鬼魂突然不见了，只听到附近突然传来飞砂走石之声，李海仲一个人独自回到船上，傍晚之时，鬼魂竟然穿了华丽的官服回来跟他说：“我不回去了，我要留在此地做关帝了！”


    李海仲吃惊地问他：“你怎么敢做关帝？”鬼魂笑着答说：“世上观音关帝，皆鬼冒充。村中唱戏是为向村中关庙中的关帝还愿，那位在村中冒充关帝，接受村民牲礼香火供奉的孤魂野鬼，比我更无赖，连我见了他都很生气，所以和他打斗了一场，打败了他又把他赶走了，刚才你没听见飞砂走石之声吗？正是我在和他打斗……”


    最后，姓王的鬼魂就这样留在村中，冒充关帝接受村民的供奉，而李海仲则一人返乡，并且替他把讨债要回来的钱带给了他的妻子。


    虽然这只是一则笔记小说中的故事，但是重点不在于去追究其真假，而是在这则故事中透露的一个信息；


    在我个人的研究及认识中，神佛是客观存在的，不论是世俗所以为的佛，菩萨及各路神明、或高级灵、高层级的智慧生命，当然包括了故事中所说的观音关帝，但是这并不意味着全世界各种宗教在各地庙宇教堂上所膜拜的神祇就一定全是真的，特别是那种有具体偶像崇拜，有牺牲血食际祀风俗的庙寺神祇，冒名来接受祭祀供食的孤魂鬼甚至魑魅魍魉等低等动物类也就特别多，举例而言：在这世界上，顶级名牌服饰确实是存在的，但各地的劣质仿冒品也是存在的，我们不能因为看见或买到一件挂有唯妙唯肖名牌标志的服饰就相信这是真品，同样的，也不能有因为总是发现或听闻有太多的仿冒品就否定了真品名牌服饰的客观存在，两者都是过于武断而欠思考的。


    同样的，在我个人的研究与认知中，高层级的灵体（神祇）是完全不需要接受凡人供食的，而层级越低的灵体则越需要供食，所谓层级低的则不分正或精怪邪鬼，但是此处所说的供食并非物质性的，而是能量的代用。


    以食物而言，不论是素界或荤性牲礼，层级低的灵是以鼻嗅的方式吸收其中的能量，并不直接食用（否则祭祀鬼神时，只见神像伸手抓起鸡腿猪大头嚼，或者代祀的水果，鱼肉突然在眼前不翼而飞岂不是会吓死一堆活人？当然若真有此事随时在发生，那么也就不必去探讨或争论鬼神及灵界的有无了。）


    对于纸钱，原理也相同，根据质能互换，能量不灭的定律，纸钱经过焚烧之后，会转变为能量，低级灵可以吸收这种能量，情形一如充电。


    在此有两项关键性的理论必须先确立：


    - 一、灵的层级及能力有高低，心性及作为也为也有正邪之别，经正式封有官职称为神的，能力层级有高低之分，连最低层的土地公（通常被视为阴神）有些像阳间的里长，没人把他当成官，但却是正式任命的并有一定的权力。没有官职的高级灵称为仙，而没有官职的低级灵则是一般所谓的亡灵鬼魂。至于修为超越仙，超高层级的灵则为佛、菩萨。

    - 二、意念可以发出能量，能量可以形成物质，而且三者可以构成一转换的循环。


    由此可以再谈到低层级的神与鬼是需要吸收能量的，而这种能量全来自物质界（阳世）的物质经焚烧分解时释放转化的能量。中层级的神与鬼及高层级的灵可自行吸收宇宙能量（藉阳光或宇宙射线），也可吸收物质转化的能量。而超高层级的灵则可自行制造或放射能量，而不必吸收其他能量。


    （注：即使放鞭炮也能产生吸引鬼神前来的能量，很多人依据传统观念很强，足以满足它们的需求而欣然离去）。


    在祭祀祖先或亡灵鬼魂时，焚烧的多为银纸、锡箔、元宝（锡箔折成的空心锡锭）、库钱或往生线，对阴兵阴将或阴差鬼卒还要加烧“甲马”（相当于汇标或礼券），晚近则也有焚烧“冥币”，一如阳世的钞标，上印有面额，差别只在这种冥币是印了“冥国银行”发行，通常面额极大，一张有万元、拾万元、百万元的。


    焚烧冥币有用吗？亡灵鬼魂收得到这些钱吗？而这些钱真的可以在阴间（灵界）流通或购买东西吗？”


    一些无神论或持怀疑论者经常会提出非难：


    - 一、假如真的死后有灵魂，灵魂已经没有了肉体，为什么会需要物质的供应或非要钱财去购买东西呢？

    - 二、大量的焚烧纸钱一如超额的发行货币，难道不会在阴间造成通货膨胀吗？

    - 三、金银纸钱或冥币都是民间自行印制，规格币值全无章法，到了阴间可以互相兑换流通吗？

    - 四、焚烧纸钱给亡亲故友时，又不像阳间的汇票支票或现金袋均能指定受款人，谁知道亡亲故友是否真的收得到呢？中途会不会被其他孤魂野鬼抢走了呢？

    - 五、一个生前作恶多端、为富不仁的人，死后如果能得到家人大量焚烧纸钱的资助成为富鬼，而一个穷人或信奉其他宗教，不主张焚烧纸钱的人，死后岂不是依然一穷二白成了穷鬼而三餐不继？这样公平吗？'
