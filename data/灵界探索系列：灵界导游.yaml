    当天下午,普哈里奇与友人返抵圣保罗后,细看里西尼拍摄的影片,但找不到任作伪的凭证。阿里戈的名字迅速即见报,动手术的详情也披露。


    这样促使法庭迅速采取行动。一九六四年十一月二十日,阿里戈被判人狱十六个月。由于刑罚即时执行,他获准向妻儿告别。他回到家里,与妻儿话别后,就等警察来送他到监狱去。


    但是整个镇的警察部队中没有一个人愿意来把阿里戈送到监狱去,刑警也不想冒险通过聚集在他家外边的人群,至夜幕低垂,阿里戈等得不耐烦,自己走到监狱去。


    即使在监狱里,阿里戈也没有停止治病,有一次他协助平息狱中一场暴动,随后典狱长特许他外出,也只是去探视病人。狱警故意采取视而不见的态度。阿里戈开始诊治患病的犯人,然后又替在监狱巷中苦候的群众看病。


    一九六五年十一月,阿里戈出狱了。不久,普哈里奇带了一名研究助手重临镇上。他的计划是要试验阿里戈判断病症的能力。试验时,阿里戈对每个病人即时作了出口头诊断。在随意挑选的一千个病人中,五百四十五人带来正式的病历,其中五百一十八人的记录显示,阿里戈即时的诊断与病历上的诊断记录相符。


    普哈里奇问阿里戈怎么能作出诊断,并且用现代医术说出来。阿里戈说:“那很容易,我只是留心弗里兹医生的话,然后重述一遍而已。我常常在左耳听到他的声音。”


    普哈里奇进一步展开其他测验,使用的仪器有脑电图仪、心电图仪、X光、血刑签定机、显微镜、录音机、摄影机等,在病人接受治疗前后和接受治疗期间测试。摄影机也拍摄阿里戈处理各种肿瘤、囊肿、内障等等病的外科技巧。


    报界听到风声后,一大群记者和摄影师蜂拥而至,研究无法继续进行。普哈里奇带着物证回到圣保罗,把资料给不少对此事'
