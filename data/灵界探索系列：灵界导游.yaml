    # 第二十一章 无师自通的医生


    国动手术的结果十分理想。他又对惊讶莫名的比登科特解释，肿瘤是用一种“巴西还没有人懂的技术”切除的，康复的机会极高。这时，比登科特才说出事情的始末，还把这件事四处传播，巴西全国的报纸都报导了这件事。


    在孔贡阿斯·多坎波镇，佩里多神甫对此深信不疑，警告阿里戈不可再替人动手术。然而，阿里戈也不知道怎样才可以停止这种自己也记不起的举动。当地的灵魂学家纷纷恭维阿里戈，说他是真正的灵媒。阿里戈拒绝接受这种称誉，但是弗里兹医生的幻象如常出现。


    其后六年，阿里戈每天差不多替三百个看病，他把“诊所”从家里搬到对街一年空置的教堂。一九五六年，在医学界和天主教教会的压力下，当局以“非法行医”的罪名指控阿里戈。


    “你是怎样替人治病的？”法官问道。


    “我先念圣经。”阿里戈诚挚地回答道，“随后，我就陷入迷精状态。病人说我看病后就开药单，但是我完全记不起来。”


    “动手术后又怎样？”法官问。


    “同样，我也不明白自己当时的精神状态，我只知道要帮助穷人。”


    “不过，你的确是非法行医，不是吧？？”


    “不是我干的。”阿里戈回答说，“我只是病人和弗里兹医生灵魂的中间人罢了。”


    法官不为所动。阿里戈可以使弗里兹出庭应讯吗？巴西各地报纸都刊登审讯的消息和无数替阿里戈辩白的证明。根据一位教育历史哲学教授派雷斯指出：“全盘否定阿里戈的事迹是可笑的。医学专家、名记者、知识分子和政界显要，都曾经目睹这些事迹。我们不能否认事实。”


    虽然舆论对阿里戈有利，不过他还是被判入狱十五个月，罚款二百七十美元。稍后上诉法庭把刑期减为八个月，缓刑一年。'
- md: '## 第二十一章 无师自通的医生


    在这段时期，阿里戈要先获法官批准才可离开孔贡阿斯·多坎波镇，还要停止行医。


    他只好听命，但头痛又发作了，过了一段短时间，由于当地警察似乎有意对他宽容，他开始偷偷替人看病，手术则暂停施行，一九五八年五月，库比希总统给阿里戈颁发特赦令。


    一九六一年，库比希已不在任。宗教领袖和医学界再施压力，要当局对阿里戈采取行动。但要找一名控方证人十分困难，调查行动几个月都没有多大进展。到一九六三年八月，阿里戈替来自美国的调查员普哈里奇医生动手术，使他的名字再一次出现全国报纸的大标题上。


    普哈里奇是一位超自然现象的调查员，也是伊利诺州西北大学的医学士。他听说阿里戈之事后，决定前去亲眼看看。阿里戈欢迎他和三个同伴留下观察，还请他们随便访问病人。


    调查的第一天，普哈里奇和同伴发现近二百人聚集在教堂外等候阿里戈开诊。开诊时间是早上二点。群众排队进入教堂后，阿里戈首先对病人说，虽然实际治好他们的是耶稣基督，但是并不介意替其他宗教教徒看病。说完，他请在场的人跟他念圣经，然后他退进一间小室内。


    不久，阿里戈再出现，普哈里奇给他完全改变的神态吓了一跳。阿里戈神色庄重，说话明快。翻译员注意到他说的葡萄牙语有很重的德国口音，还不时夹杂德语单字和短语。阿里戈请几位调查员到诊室，一百说：“来吧！这里没有什么要隐瞒的。我欢迎你们在此旁观。”


    当天的事使普哈里奇大为震惊。第一个病人是个老人，阿里戈粗暴地把他推到墙边，接着他拿出一把四寸长的不锈钢水果刀，插入病人左眼球和眼盖间，用力刮并向上压进眼窝。旁观的普哈里奇看得心惊胆战，病人却一点也不紧张。最后阿里戈拔出刀来，刀口上有一点脓溃。他安慰过老伯，把刀在衬衣上擦了一下，然后召唤下一个病人，普哈里奇检查病人的眼睛，没有发现血迹和伤口，整个手术历时不到一分钟。


    整个早上，阿里戈就这样不停工作，既不用麻醉剂，也不须进行预防感染的措施。就普哈里奇所见，他完全没有用催眠术；动手术病人出血很少，也没感到痛楚。阿里戈诊症多半只是写药单，而且总是挥笑疾书，毫不犹豫。到十一点，他宣布上午诊症时间结束，说要回任职的政府福利机构把分内的工作做好，下午再开诊，就众人所知，阿里戈从来没有收过诊金。离开诊所后，他的德国口音和严谨态度随即消息，恢复往常老实和气的性格。


    当天黄昏，普哈里奇和来自圣保罗的记者里西尼，在诊症室内设置电影摄影机，假使阿里戈是一名手法熟练的骗子，拍得的影片就可以揭穿他的伎俩。那天晚上，阿里戈一直工作到凌晨一点，整天总共诊治了二百名病人。


    普哈里奇满腹疑惑，他知道要对这位异人的工作进行彻底研究和得出令人信服的结果，需要大量时间、金钱和装备。返美国前还可以进行什么试验呢？他的右肘内侧，有一个小脂肪瘤，虽属良性，却使他很不安。他决定翌日叫阿里戈切除肿瘤，由自己亲自作试验品。


    阿里戈一口答应。“没问题”他说，“谁有小刀借给我来替这个美国人开刀呢？”几个人拿出小刀来，阿里戈很快地挑了一把。普哈里奇突然心生凉意，可是已骑虎难下了。他抬头看着里西尼把电影摄影机准备好了没有。


    “医生，卷起袖子来吧。”


    普哈里奇卷起袖子，提起精神要看阿里戈怎样开刀，但是，阿里戈请他望向别的地方。


    不到十秒钟，普哈里奇觉得阿里戈把一些湿滑的东西放在他的手里。他看了看，原来就是切除出来的脂肪瘤。他的前臂上有一个整齐的半寸切口，只淌出一点血丝。他完全感觉不到痛楚。


    ## 灵界导游


    当天下午，普哈里奇与友人返抵圣保罗后，细看里西尼拍摄的影片，但找不到任作伪的凭证。阿里戈的名字迅速即见报，动手术的详情也披露。


    这样促使法庭迅速采取行动。一九六四年十一月二十日，阿里戈被判人狱十六个月。由于刑罚即时执行，他获准向妻儿告别。他回到家里，与妻儿话别后，就等警察来送他到监狱去。


    但是整个镇的警察部队中没有一个人愿意来把阿里戈送到监狱去，刑警也不想冒险通过聚集在他家外边的人群，至夜幕低垂，阿里戈等得不耐烦，自己走到监狱去。


    即使在监狱里，阿里戈也没有停止治病，有一次他协助平息狱中一场暴动，随后典狱长特许他外出，也只是去探视病人。狱警故意采取视而不见的态度。阿里戈开始诊治患病的犯人，然后又替在监狱巷中苦候的群众看病。


    一九六五年十一月，阿里戈出狱了。不久，普哈里奇带了一名研究助手重临镇上。他的计划是要试验阿里戈判断病症的能力。试验时，阿里戈对每个病人即时作了出口头诊断。在随意挑选的一千个病人中，五百四十五人带来正式的病历，其中五百一十八人的记录显示，阿里戈即时的诊断与病历上的诊断记录相符。


    普哈里奇问阿里戈怎么能作出诊断，并且用现代医术说出来。阿里戈说：“那很容易，我只是留心弗里兹医生的话，然后重述一遍而已。我常常在左耳听到他的声音。”


    普哈里奇进一步展开其他测验，使用的仪器有脑电图仪、心电图仪、X光、血刑签定机、显微镜、录音机、摄影机等，在病人接受治疗前后和接受治疗期间测试。摄影机也拍摄阿里戈处理各种肿瘤、囊肿、内障等等病的外科技巧。


    报界听到风声后，一大群记者和摄影师蜂拥而至，研究无法继续进行。普哈里奇带着物证回到圣保罗，把资料给不少对此事有兴趣的专业人士观看，其中有眼科医生、核子物理学家、心理学家、心脏科专家和巫师。他们都同意阿里戈的确能替人治病。


    普哈里奇返抵纽约，把阿里戈施手术的彩色影片放映给罗斯福医院前任精神科主任莱德劳医生看。莱德劳注意阿里戈动手术时面上带有异乎寻常的神色，他的手和手指活动得又快速又熟练，即使他望向别处也能如此，而且手术的切口不用针缝即可自行愈合。阿里戈的外科技巧，连许多受过专业训练的处科医生也未能掌握，莱德劳不能解释阿里戈究竟是怎样学会的。


    下列的事实反驳了阿里戈是身怀绝技的魔术师：他的确治好了数之不尽的病人，或更准确一点说，无数病人经他治疗后立即或很快就痊愈；他确实替不少病人开过刀，尽管卫生条件差，切口却出血少，愈合快；他虽没有使用麻醉药，但病人在手术进行中或完成后都不感到痛楚；他虽然只受过一点正式教育，更没有受过医学训练，但能未检查即写出正确药方；据众人所知，他行医济世，从不收钱。


    一九七一年一月十一日，阿里戈在车祸中丧生，出事前两个星期，他曾经说过：“恐怕我在世上的工作已经完了，不久我便要离开这里。


    ## 第二十二章 别信神棍们


    插在信箱的快信，有一截被雨淋湿了。我发现得晚，拿垃圾去丢的傍晚才看到。所幸信笺上的字，只有一角被水浸蚀。全文是这样的：


    老师：


    我是个平凡的家庭主妇，却生了个不平凡的儿子。现在，我必须为这个不平凡的儿子天天担惊受怕。他一定是中了邪。附近的寺庙、法师几乎都找遍了，就是拿他没办法。读完你的书，不禁浮起一丝希望。你肯伸援手救救我儿子吗？我只有这么个儿子呀！


    我应该尊称你法师或大师什么的，可又怕冒失犯忌。请多多包涵！


    冷淑仪 敬上


    这一定是位冷静、理智又能干的家庭主妇。发生这样的不幸，居然还保有一份幽默感。尽管是调弄的，仍留给我很深的印象。我比较喜欢和这一型的人打交道。


    当下回了这封快信，表达我乐于效力的意思。不直接利用信末的电话号码；我有特殊的顾忌。


    第三天中午，冷太太来了电话。问明是我本人，她如释重负地说：


    “感谢你肯帮忙。明天上午我带阿强去拜望你，可以吗？”


    “我等你。开车来吗？”


    “搭车。”


    放下电话，我进入静室查察这位冷太太身世。透过电话线传来的信息，通常都能找出些蛛丝马迹。果不出所料，冷态度太干干净净净，问题出在儿子身上。


    第二天上午十时许，门铃就响了，来得够早，可是进门的却只有冷太太一个人。三十多岁，中等身材，是那种和和气气、讨人喜欢的朴实农村女人。


    “真不好意思，都到门口了，他忽然像发神经般掉头开溜，也不知跑到哪去？这孩子，不知道中了什么邪？”坐定之后，冷太太颇为焦灼地解释阿强临阵脱逃的事。


    “德原——他熟吗？”


    “他两个伯父都在德原，还有几个在德原工作的同学。一放假，就往德原跑，惹了不少麻烦。”


    水开了，我沏茶。“都是些什么麻烦呢？”


    “唉，”话一出口，随着一声长叹，冷太太眼眶先红了。“就来造孽，高中读得好好的，忽然性情大变，不上学了，被朋友拉到一间铁工厂学技工，晚上四处游荡。学会抽烟喝酒不说，经常打架滋事，害我一趟趟跑派出所、跑刑事组。他爸爸在林业局上班，经年住在山上林里，一个月难得回家一次。有天晚上他爸爸忍无可忍，把他捆起来狠狠揍了一顿。没料到变得更糟，他半夜会无缘无故跑到街上去砍人。”


    “哦？！”


    “一定是中了什么邪，你一定要救救他。我只有这么个儿子呀。”


    “平常呢？对家人态度还好吗？”


    “平常在家都好好的。除对个妹妹不大理睬，喜欢一个人关在房里听音乐，没什么古怪举止。”


    “还在铁工厂工作？”


    “出了几回事，老板害怕啦，把他辞掉了。”


    “那些朋友，还继续来往？”


    “好像少了。他们顶多吃吃喝喝、玩玩闹闹，不像我们阿强，会拿刀子乱来。”


    “请喝茶。”我替冷太太斟了杯茶。


    趁她喝茶的当儿，我仔细查看她气色、头顶上的光，以验证我从电话里捕捉到的信息是否走了样。结果一切正常。问题是出在阿强的身上。


    “我得见到阿强本人，才知道能不能帮他。照你讲的情形判断，的确出了问题。”


    “是不是被什么不干净的东西缠上身啦？”冷太太倾过身子，压低声音说：“好端端的，何以突然丧失了理智呢？”


    “这个年龄的青少年，很难说。不过从他在家的情形，理智应该还没完全丧失。”


    “拿起刀子乱砍人，还有理智？”


    “那只在迷惑的时刻。所以要见到他本人，才能查出迷惑的原因。”


    “那……”冷太太站起身：“我这就找他去。”走到门口，又回转身问：“这种病……可以治吗？”


    我微微一笑安慰她说：“尽力吧。还这么年轻，一定有办法的。”


    冷太太哈着腰，千谢万谢地离去。


    傍晚时分，冷太太忽然来了电话，声音十分急迫。


    “不好啦，不好啦，阿强被人砍伤了，现在住在医院，能不能麻烦你过来看看？”


    问明地址，我立即赶到医院。


    急诊室灯火通明。两张床位都躺着人，床前则围满焦灼的家属。一位胖胖的、着白制服的医生，正在为病者做人工呼吸急救；看样子病情相当危急。独不见冷太太人影，问一位护士，才知道已转往普通病房。


    病房并不比超市冷清，人生痛苦百态，每张失去欢颜的脸孔扮演着不同角色，挨间搜寻，终于找到默默发呆的冷太太。


    阿强头、手裹着绷带，伤势不轻，靠坐床头的姿势，一动也不动。两眼平视，眼神空茫，无法判断焦点落在何处？身体倒还结实，否则应不是块砍人的料子。


    冷太太投来感激的一瞥，比了个让坐的手势。


    静静站一会，体察着屋内生物场情形。隔壁一张空床有些异样，我暂不理会，慢慢蹁到阿强床头，和他面对面地四目交会。他微微颤抖一下，脸上掠过一抹惊异，但随即无动于衷，眼神已越过我，投身到我脑后什么不知名的地方去了。我不由自己地呈出一声叹息：可叹！叹啊！


    我不清楚自己在这一瞬有没有摇首，竟被冷太太察觉出来，她一直盯着我，直到我坐到那张发出凉意的空床上。


    “这张床的病人刚走吗？”


    冷太太吓得立即用手捂住嘴，半晌才回过神来。


    “你都查得出来？是一位好心的清洁妇悄悄告诉我的。她要换个房间，说那张床上的病人是个车祸伤者，刚送走。”冷太太换用气息的声调又补充了一句：“太平间。”


    我一面听，一面注视阿强的反应，他完全像个聋子。


    我点点头。凝注全力在阿强头部。渐渐地我闭上眼，心底涌了感慨：年纪轻轻的，怎落到如此地步呢？


    不一会，阿强的大伯父到了，向我致过谢意后，说：“派出所那边没事啦，已和对方达成和解，医药费各自负担。偶发事件嘛，就不再追究啦。”


    可能还有另外的伤者，这里又不便说话，于是我先告辞了。


    第二天一早，冷太太来了电话。


    “已经把阿强带回家来了。我大伯开车送的，医生说隔几天去外科医院换药就可以了，伤势不是很重。我担心这种事会一再重演，该怎么办呢？”


    冷太太不敢开门见山问我能不能治好阿强的病，是怕我的回答，揉碎她最后一线希望吧？可怜天下父母心！


    “不用担心，冷太太。我已经查出原因来了。”


    “哦，有救吗？”


    “有。”我十分肯定，“比较麻烦而已。”


    “没关系，花多少钱我都愿意，只要能治好我们阿强，我愿意把这栋房子卖啦，搬到山上去和他爸爸一起住。”


    “搬到山上住倒是个好主意，不过房子不用卖了，我不收钱。”


    “不收钱？”显然，电话那头冷太太完全不相信。“我们已经花了不少钱了啊。”


    “我讲的是真的。”我尽量把语气放得平淡。“我说的比较麻烦不是指钱。这是个少见的病例，可能要花更多的时间和精力。”


    “噢，你真是活菩萨，需要我们上德原吗？”


    “不必了。等他伤势好点，可以解掉绷带时，我到清平去。”


    “啊，那真是太感激啦，要怎样谢你？”


    “调理好了再说吧。”


    我的确没有把握，但又似乎有那么点信心。现在，我必须倾全力追查阿强的“灵魂”现在何处？目前，他只是个空壳子，是一具人们所谓的“行尸走肉”。因为失了灵魂，所以才做出一连串丧尽人性、超越常轨的砍人事件来。灵魂主宰理智，无怨无仇的砍杀，便是失去理智的明证。可是，一个正值发育，茁壮的少年，阳气旺盛，又何至于失了灵魂呢？


    晚上，我把自己关在静室，用功闭目冥思，我在冷如冰家绕圈子，仿佛找到那么一丝线索，沿着追下去，很快又陷进渺渺茫茫迷雾中，失去踪迹。


    连续几个晚上，都是如此：功亏一篑，查不出任何结论。这若有若无的线索，很可能就是阿强失去灵魂时留下的残余信息。


    一星期后，阿强父亲来了电话——


    “为了彻底治好阿强的病，我请了十天休假，有必要的话我可以带阿强到德原去，他伤势也快完全好了。”


    “我去清平吧。明天，好吗？”


    “太感谢啦，我们到车站接你。”


    第二天下午，刚走出清平车站，远远地望见冷太太和她先生已等在出口处了。我是买好票后在车站大厅打的电话。


    经过冷太太介绍，和中等身材的冷先生握手时，那只有力的、长满茧疤的手掌，告诉我阿强挨的那顿打，不是非同小可的。不过那张黧黑的脸孔，却又透着老实人的憨厚与耿直。这种人通常都有一颗热忱而负责的心。


    “太麻烦你啦，真不知该怎样感激你。”


    在“三脚鸡”车中，冷先生的恳切诚挚，留给我很深的印象。益发坚定我竭尽所能，帮助这一家人脱出困境的决心。


    “要如何着手呢？”冷太太说。


    “到家再慢慢谈吧。”


    这是一排旧公寓。夹杂在璃帷幕的新大厦之间，显得格外寒酸卑贱。冷家住三楼，约莫三十多平方，格局还方正。


    在客厅坐定之后，冷太太端给我泡好的一大杯茶，没有奉烟，证明她是个细心的女人。


    “我阿强是被鬼魂附身了吗？”冷先生瞄一眼一扇紧闭的房门。我知道那一定是阿强房间。


    我摇头。打开茶杯盖子，端到鼻前享受乌龙茶特有的芳香。喝了一口，接着又一口。留在舌尖唇上的甘味，驱走我旅途劳顿。放下杯子，我说：


    “这不是鬼魂附身，是一种罕见的‘失灵魂’症。特别是在他这个年龄，几乎是很难理解的事。通常中、老年人比较容易发生。”


    “失灵魂？”冷先生大惑不解地盯着我。


    冷太太则张口结舌，半天说不出话。


    “不错。”我淡淡地肯定。不希望掀起他们夫妇太大的情绪波澜。“所以才会失去理性，拿刀乱砍人；这是一种毫无意识的行为。”


    “如何证明呢？”冷先生说。


    “行为本身便是明证。因为灵魂是由意识、意志等精神物质结合而成。失了灵魂，精神便会一片空白、一片茫然，他根本不知道自己在做什么。”


    “是精神病吗？”


    “我不太清楚医学上所谓精神病的定义是怎样的？如果和丧失心志相近的话，那么阿强目前的情况，也可以用精神病三个字来描述。”


    “丧失心志？”


    “对呀，我喝了口茶，藉以和缓紧绷的气氛。“中医有所谓‘心藏灵、肝藏魂、肺藏魄、脾藏志、肾藏精’的说法，丧失心志，不就失了灵魂吗？”


    “哎呀，如果是精神病，麻烦就大啦！”冷太太不安地说。


    “本来，我也打算送他到精神病院去的，接到我太太电话，才知道你肯帮忙……”


    “精神病院未必治得好阿强，”我打断冷先生的话。“电击和药物不过治标而已，这种病得从根本着手。而医界甚至连灵魂都还在怀疑，如何能相信我这一套理论？和精神科医师谈灵魂，不骂我神经病才怪。”


    “和鬼神有关系吗？”冷太太问。


    “那看对鬼魂理解多少。”我一面品茶，一面解说：“不过，绝对不是迷信那一套。”


    “好吧，”冷先生说：“那现在该怎么做？”


    “已经在做了。”我郑重其事地扫了他们夫妇一眼。“让你们了解这些，是我治疗的第一步。所谓从根本着手，也包括你们在内，你们必须先深信不疑，往后的调理才会有效，我需要你们的配合。”


    互望一眼，冷太太抢先说：“我们相信。我们绝对相信。”


    “要我们怎样配合？”冷先生说。


    “这种事虽不是迷信，却要求比迷信更深人的迷信，必须发自内心的虔诚，深信不疑，效果才彰显得出来。我也才有发挥的空间。”


    “你放心，老师，实际上应该尊称你大师才对。”冷先生恳切地说：“听完你这番解说与分析，我知道你不是一般江湖术士，更非妖言惑众。仿佛都有道理、有依据；虽不完全懂，我已经很相信了，要我们怎样配合，我们一定照办，确确实实地去做。”


    “那好，”冷先生爱子心切的亲情溢于言表，我可以放手做为了。”待会儿先把阿强那些朋友约出来，能约到几位算几位，我要查出阿强的灵魂现在在何处？”


    我特别注意他们夫妇对我最后一句话的反应，结果令人满意，他们已经不再惊讶。


    步德在二楼靠厕所角落，连同冷先生总共坐了六个人。冷太太陪我抵达的时候，五张年轻脸蛋上的眼瞳一起瞪着我。不知道冷先生是怎样介绍我的？每对眼瞳都射出不安、畏葸、告饶的神色。我不得不摆出亲切的笑容，以松弛他们内心的紧张。


    “各位很了不起，”我说：“年纪轻轻的就能克苦耐劳、自食其力，很教人佩服。工作还好吧？”


    大家笑一笑，代替了回答。


    “他们都是阿强的好朋友，常在一起玩的。”冷先生笑着说。


    “现在阿强变成这个样子，都是他自己的命。”冷太太说：“你们心里也不好受吧，我当然不会怪怨谁罗。”


    “是啦，人各有命。”我接着切入话题中心，“他现在需要你们帮助，只有你们可救他。”


    五个人面面相觑，有些手足失措。


    “想想看，你们在一起的时候，有没有发生过什么令你们印象深刻的大事？任何事都可以讲出来，我保证绝不追究。”停一会，我又补充说，“追究起来，阿强也有问题，当然不会再雪上加霜啦。”


    许久，其中一个说：“我们玩在一起，只为了不被欺侮，绝无胡作非为的想法。否则，也无须辛辛苦苦做铁工了。”


    “这个我们非常清楚。”冷先生说：“所以才没禁止你们来往。”


    “年轻人嘛，下班后难免去寻点开心。”我说，“多少碰到些意料不到的事吧？”


    “是有过。”一个个子比较高的说，“为争座位，争面子，看不顺眼，话不投机，骂几句，甚至打几下，过去也就算了，如此而已。大部分时间我们都是自己唱唱闹闹，很少与人冲突。”


    “KTV 唱歌？”我说。


    “唔，下班无聊嘛。”两三个异口同声说。


    “有没交女朋友？”


    “对！”一个小个子高声说，“阿强交过一个女朋友，非常要好。”随即像泄了气似地放低声音，“后来吹啦，我们好替他不平。”


    “哦，怎样吹的呢？”我追问着。同时用眼神制止冷先生与冷太太插嘴。


    “被她爸爸知道了，抓回去关了起来，还带人来警告阿强，不行再去找她。”另一个留着长头发的说。


    “有这种事？”我心头一震，闪过一抹诡异的感应。“知道这位小姐的地址吗？”


    “知道，”小个子抢着说，“我们想帮阿强，在她家门口守候三个晚上，传张字条给她。结果，连个影子都没有见到。”


    “方便带我去吗？”我对小个子的年轻人说，“指给我是哪家门口就好。她叫什么名字？”


    “郝嘟嘟。也是在KTV 唱歌认识的，她歌唱得像彭彭，极棒！”小个子说。“带你去没问题，我不进门哦。”


    “当然，到门口就没你的事啦。”我说，“现在走好吗？”


    “走！”小个子表现了可爱的义气。


    “你们再坐一会，”我对冷先生说：“回头我去家里找你。”


    “找得到地方吗？”冷先生说。


    “我有地址，找得到的。”


    到了大街上，我说：“你贵姓？要叫的士吗？”


    “我姓曲，叫我阿直好了，大家都这么叫我的。她家离这儿不远，走几分钟就到啦。”'
  mdcn: '## 第二十一章 无师自通的医生


    在这段时期，阿里戈要先获法官批准才可离开孔贡阿斯·多坎波镇，还要停止行医。


    他只好听命，但头痛又发作了，过了一段短时间，由于当地警察似乎有意对他宽容，他开始偷偷替人看病，手术则暂停施行，一九五八年五月，库比希总统给阿里戈颁发特赦令。


    一九六一年，库比希已不在任。宗教领袖和医学界再施压力，要当局对阿里戈采取行动。但要找一名控方证人十分困难，调查行动几个月都没有多大进展。到一九六三年八月，阿里戈替来自美国的调查员普哈里奇医生动手术，使他的名字再一次出现全国报纸的大标题上。


    普哈里奇是一位超自然现象的调查员，也是伊利诺州西北大学的医学士。他听说阿里戈之事后，决定前去亲眼看看。阿里戈欢迎他和三个同伴留下观察，还请他们随便访问病人。


    调查的第一天，普哈里奇和同伴发现近二百人聚集在教堂外等候阿里戈开诊。开诊时间是早上二点。群众排队进入教堂后，阿里戈首先对病人说，虽然实际治好他们的是耶稣基督，但是并不介意替其他宗教教徒看病。说完，他请在场的人跟他念圣经，然后他退进一间小室内。


    不久，阿里戈再出现，普哈里奇给他完全改变的神态吓了一跳。阿里戈神色庄重，说话明快。翻译员注意到他说的葡萄牙语有很重的德国口音，还不时夹杂德语单字和短语。阿里戈请几位调查员到诊室，一百说：“来吧！这里没有什么要隐瞒的。我欢迎你们在此旁观。”


    当天的事使普哈里奇大为震惊。第一个病人是个老人，阿里戈粗暴地把他推到墙边，接着他拿出一把四寸长的不锈钢水果刀，插入病人左眼球和眼盖间，用力刮并向上压进眼窝。旁观的普哈里奇看得心惊胆战，病人却一点也不紧张。最后阿里戈拔出刀来，刀口上有一点脓溃。他安慰过老伯，把刀在衬衣上擦了一下，然后召唤下一个病人，普哈里奇检查病人的眼睛，没有发现血迹和伤口，整个手术历时不到一分钟。


    整个早上，阿里戈就这样不停工作，既不用麻醉剂，也不须进行预防感染的措施。就普哈里奇所见，他完全没有用催眠术；动手术病人出血很少，也没感到痛楚。阿里戈诊症多半只是写药单，而且总是挥笑疾书，毫不犹豫。到十一点，他宣布上午诊症时间结束，说要回任职的政府福利机构把分内的工作做好，下午再开诊，就众人所知，阿里戈从来没有收过诊金。离开诊所后，他的德国口音和严谨态度随即消息，恢复往常老实和气的性格。


    当天黄昏，普哈里奇和来自圣保罗的记者里西尼，在诊症室内设置电影摄影机，假使阿里戈是一名手法熟练的骗子，拍得的影片就可以揭穿他的伎俩。那天晚上，阿里戈一直工作到凌晨一点，整天总共诊治了二百名病人。


    普哈里奇满腹疑惑，他知道要对这位异人的工作进行彻底研究和得出令人信服的结果，需要大量时间、金钱和装备。返美国前还可以进行什么试验呢？他的右肘内侧，有一个小脂肪瘤，虽属良性，却使他很不安。他决定翌日叫阿里戈切除肿瘤，由自己亲自作试验品。


    阿里戈一口答应。“没问题”他说，“谁有小刀借给我来替这个美国人开刀呢？”几个人拿出小刀来，阿里戈很快地挑了一把。普哈里奇突然心生凉意，可是已骑虎难下了。他抬头看着里西尼把电影摄影机准备好了没有。


    “医生，卷起袖子来吧。”


    普哈里奇卷起袖子，提起精神要看阿里戈怎样开刀，但是，阿里戈请他望向别的地方。


    不到十秒钟，普哈里奇觉得阿里戈把一些湿滑的东西放在他的手里。他看了看，原来就是切除出来的脂肪瘤。他的前臂上有一个整齐的半寸切口，只淌出一点血丝。他完全感觉不到痛楚。


    ## 灵界导游


    当天下午，普哈里奇与友人返抵圣保罗后，细看里西尼拍摄的影片，但找不到任作伪的凭证。阿里戈的名字迅速即见报，动手术的详情也披露。


    这样促使法庭迅速采取行动。一九六四年十一月二十日，阿里戈被判人狱十六个月。由于刑罚即时执行，他获准向妻儿告别。他回到家里，与妻儿话别后，就等警察来送他到监狱去。


    但是整个镇的警察部队中没有一个人愿意来把阿里戈送到监狱去，刑警也不想冒险通过聚集在他家外边的人群，至夜幕低垂，阿里戈等得不耐烦，自己走到监狱去。


    即使在监狱里，阿里戈也没有停止治病，有一次他协助平息狱中一场暴动，随后典狱长特许他外出，也只是去探视病人。狱警故意采取视而不见的态度。阿里戈开始诊治患病的犯人，然后又替在监狱巷中苦候的群众看病。


    一九六五年十一月，阿里戈出狱了。不久，普哈里奇带了一名研究助手重临镇上。他的计划是要试验阿里戈判断病症的能力。试验时，阿里戈对每个病人即时作了出口头诊断。在随意挑选的一千个病人中，五百四十五人带来正式的病历，其中五百一十八人的记录显示，阿里戈即时的诊断与病历上的诊断记录相符。


    普哈里奇问阿里戈怎么能作出诊断，并且用现代医术说出来。阿里戈说：“那很容易，我只是留心弗里兹医生的话，然后重述一遍而已。我常常在左耳听到他的声音。”


    普哈里奇进一步展开其他测验，使用的仪器有脑电图仪、心电图仪、X光、血刑签定机、显微镜、录音机、摄影机等，在病人接受治疗前后和接受治疗期间测试。摄影机也拍摄阿里戈处理各种肿瘤、囊肿、内障等等病的外科技巧。


    报界听到风声后，一大群记者和摄影师蜂拥而至，研究无法继续进行。普哈里奇带着物证回到圣保罗，把资料给不少对此事有兴趣的专业人士观看，其中有眼科医生、核子物理学家、心理学家、心脏科专家和巫师。他们都同意阿里戈的确能替人治病。


    普哈里奇返抵纽约，把阿里戈施手术的彩色影片放映给罗斯福医院前任精神科主任莱德劳医生看。莱德劳注意阿里戈动手术时面上带有异乎寻常的神色，他的手和手指活动得又快速又熟练，即使他望向别处也能如此，而且手术的切口不用针缝即可自行愈合。阿里戈的外科技巧，连许多受过专业训练的处科医生也未能掌握，莱德劳不能解释阿里戈究竟是怎样学会的。


    下列的事实反驳了阿里戈是身怀绝技的魔术师：他的确治好了数之不尽的病人，或更准确一点说，无数病人经他治疗后立即或很快就痊愈；他确实替不少病人开过刀，尽管卫生条件差，切口却出血少，愈合快；他虽没有使用麻醉药，但病人在手术进行中或完成后都不感到痛楚；他虽然只受过一点正式教育，更没有受过医学训练，但能未检查即写出正确药方；据众人所知，他行医济世，从不收钱。


    一九七一年一月十一日，阿里戈在车祸中丧生，出事前两个星期，他曾经说过：“恐怕我在世上的工作已经完了，不久我便要离开这里。


    ## 第二十二章 别信神棍们


    插在信箱的快信，有一截被雨淋湿了。我发现得晚，拿垃圾去丢的傍晚才看到。所幸信笺上的字，只有一角被水浸蚀。全文是这样的：


    老师：


    我是个平凡的家庭主妇，却生了个不平凡的儿子。现在，我必须为这个不平凡的儿子天天担惊受怕。他一定是中了邪。附近的寺庙、法师几乎都找遍了，就是拿他没办法。读完你的书，不禁浮起一丝希望。你肯伸援手救救我儿子吗？我只有这么个儿子呀！


    我应该尊称你法师或大师什么的，可又怕冒失犯忌。请多多包涵！


    冷淑仪 敬上


    这一定是位冷静、理智又能干的家庭主妇。发生这样的不幸，居然还保有一份幽默感。尽管是调弄的，仍留给我很深的印象。我比较喜欢和这一型的人打交道。


    当下回了这封快信，表达我乐于效力的意思。不直接利用信末的电话号码；我有特殊的顾忌。


    第三天中午，冷太太来了电话。问明是我本人，她如释重负地说：


    “感谢你肯帮忙。明天上午我带阿强去拜望你，可以吗？”


    “我等你。开车来吗？”


    “搭车。”


    放下电话，我进入静室查察这位冷太太身世。透过电话线传来的信息，通常都能找出些蛛丝马迹。果不出所料，冷态度太干干净净净，问题出在儿子身上。


    第二天上午十时许，门铃就响了，来得够早，可是进门的却只有冷太太一个人。三十多岁，中等身材，是那种和和气气、讨人喜欢的朴实农村女人。


    “真不好意思，都到门口了，他忽然像发神经般掉头开溜，也不知跑到哪去？这孩子，不知道中了什么邪？”坐定之后，冷太太颇为焦灼地解释阿强临阵脱逃的事。


    “德原——他熟吗？”


    “他两个伯父都在德原，还有几个在德原工作的同学。一放假，就往德原跑，惹了不少麻烦。”


    水开了，我沏茶。“都是些什么麻烦呢？”


    “唉，”话一出口，随着一声长叹，冷太太眼眶先红了。“就来造孽，高中读得好好的，忽然性情大变，不上学了，被朋友拉到一间铁工厂学技工，晚上四处游荡。学会抽烟喝酒不说，经常打架滋事，害我一趟趟跑派出所、跑刑事组。他爸爸在林业局上班，经年住在山上林里，一个月难得回家一次。有天晚上他爸爸忍无可忍，把他捆起来狠狠揍了一顿。没料到变得更糟，他半夜会无缘无故跑到街上去砍人。”


    “哦？！”


    “一定是中了什么邪，你一定要救救他。我只有这么个儿子呀。”


    “平常呢？对家人态度还好吗？”


    “平常在家都好好的。除对个妹妹不大理睬，喜欢一个人关在房里听音乐，没什么古怪举止。”


    “还在铁工厂工作？”


    “出了几回事，老板害怕啦，把他辞掉了。”


    “那些朋友，还继续来往？”


    “好像少了。他们顶多吃吃喝喝、玩玩闹闹，不像我们阿强，会拿刀子乱来。”


    “请喝茶。”我替冷太太斟了杯茶。


    趁她喝茶的当儿，我仔细查看她气色、头顶上的光，以验证我从电话里捕捉到的信息是否走了样。结果一切正常。问题是出在阿强的身上。


    “我得见到阿强本人，才知道能不能帮他。照你讲的情形判断，的确出了问题。”


    “是不是被什么不干净的东西缠上身啦？”冷太太倾过身子，压低声音说：“好端端的，何以突然丧失了理智呢？”


    “这个年龄的青少年，很难说。不过从他在家的情形，理智应该还没完全丧失。”


    “拿起刀子乱砍人，还有理智？”


    “那只在迷惑的时刻。所以要见到他本人，才能查出迷惑的原因。”


    “那……”冷太太站起身：“我这就找他去。”走到门口，又回转身问：“这种病……可以治吗？”


    我微微一笑安慰她说：“尽力吧。还这么年轻，一定有办法的。”


    冷太太哈着腰，千谢万谢地离去。


    傍晚时分，冷太太忽然来了电话，声音十分急迫。


    “不好啦，不好啦，阿强被人砍伤了，现在住在医院，能不能麻烦你过来看看？”


    问明地址，我立即赶到医院。


    急诊室灯火通明。两张床位都躺着人，床前则围满焦灼的家属。一位胖胖的、着白制服的医生，正在为病者做人工呼吸急救；看样子病情相当危急。独不见冷太太人影，问一位护士，才知道已转往普通病房。


    病房并不比超市冷清，人生痛苦百态，每张失去欢颜的脸孔扮演着不同角色，挨间搜寻，终于找到默默发呆的冷太太。


    阿强头、手裹着绷带，伤势不轻，靠坐床头的姿势，一动也不动。两眼平视，眼神空茫，无法判断焦点落在何处？身体倒还结实，否则应不是块砍人的料子。


    冷太太投来感激的一瞥，比了个让坐的手势。


    静静站一会，体察着屋内生物场情形。隔壁一张空床有些异样，我暂不理会，慢慢蹁到阿强床头，和他面对面地四目交会。他微微颤抖一下，脸上掠过一抹惊异，但随即无动于衷，眼神已越过我，投身到我脑后什么不知名的地方去了。我不由自己地呈出一声叹息：可叹！叹啊！


    我不清楚自己在这一瞬有没有摇首，竟被冷太太察觉出来，她一直盯着我，直到我坐到那张发出凉意的空床上。


    “这张床的病人刚走吗？”


    冷太太吓得立即用手捂住嘴，半晌才回过神来。


    “你都查得出来？是一位好心的清洁妇悄悄告诉我的。她要换个房间，说那张床上的病人是个车祸伤者，刚送走。”冷太太换用气息的声调又补充了一句：“太平间。”


    我一面听，一面注视阿强的反应，他完全像个聋子。


    我点点头。凝注全力在阿强头部。渐渐地我闭上眼，心底涌了感慨：年纪轻轻的，怎落到如此地步呢？


    不一会，阿强的大伯父到了，向我致过谢意后，说：“派出所那边没事啦，已和对方达成和解，医药费各自负担。偶发事件嘛，就不再追究啦。”


    可能还有另外的伤者，这里又不便说话，于是我先告辞了。


    第二天一早，冷太太来了电话。


    “已经把阿强带回家来了。我大伯开车送的，医生说隔几天去外科医院换药就可以了，伤势不是很重。我担心这种事会一再重演，该怎么办呢？”


    冷太太不敢开门见山问我能不能治好阿强的病，是怕我的回答，揉碎她最后一线希望吧？可怜天下父母心！


    “不用担心，冷太太。我已经查出原因来了。”


    “哦，有救吗？”


    “有。”我十分肯定，“比较麻烦而已。”


    “没关系，花多少钱我都愿意，只要能治好我们阿强，我愿意把这栋房子卖啦，搬到山上去和他爸爸一起住。”


    “搬到山上住倒是个好主意，不过房子不用卖了，我不收钱。”


    “不收钱？”显然，电话那头冷太太完全不相信。“我们已经花了不少钱了啊。”


    “我讲的是真的。”我尽量把语气放得平淡。“我说的比较麻烦不是指钱。这是个少见的病例，可能要花更多的时间和精力。”


    “噢，你真是活菩萨，需要我们上德原吗？”


    “不必了。等他伤势好点，可以解掉绷带时，我到清平去。”


    “啊，那真是太感激啦，要怎样谢你？”


    “调理好了再说吧。”


    我的确没有把握，但又似乎有那么点信心。现在，我必须倾全力追查阿强的“灵魂”现在何处？目前，他只是个空壳子，是一具人们所谓的“行尸走肉”。因为失了灵魂，所以才做出一连串丧尽人性、超越常轨的砍人事件来。灵魂主宰理智，无怨无仇的砍杀，便是失去理智的明证。可是，一个正值发育，茁壮的少年，阳气旺盛，又何至于失了灵魂呢？


    晚上，我把自己关在静室，用功闭目冥思，我在冷如冰家绕圈子，仿佛找到那么一丝线索，沿着追下去，很快又陷进渺渺茫茫迷雾中，失去踪迹。


    连续几个晚上，都是如此：功亏一篑，查不出任何结论。这若有若无的线索，很可能就是阿强失去灵魂时留下的残余信息。


    一星期后，阿强父亲来了电话——


    “为了彻底治好阿强的病，我请了十天休假，有必要的话我可以带阿强到德原去，他伤势也快完全好了。”


    “我去清平吧。明天，好吗？”


    “太感谢啦，我们到车站接你。”


    第二天下午，刚走出清平车站，远远地望见冷太太和她先生已等在出口处了。我是买好票后在车站大厅打的电话。


    经过冷太太介绍，和中等身材的冷先生握手时，那只有力的、长满茧疤的手掌，告诉我阿强挨的那顿打，不是非同小可的。不过那张黧黑的脸孔，却又透着老实人的憨厚与耿直。这种人通常都有一颗热忱而负责的心。


    “太麻烦你啦，真不知该怎样感激你。”


    在“三脚鸡”车中，冷先生的恳切诚挚，留给我很深的印象。益发坚定我竭尽所能，帮助这一家人脱出困境的决心。


    “要如何着手呢？”冷太太说。


    “到家再慢慢谈吧。”


    这是一排旧公寓。夹杂在璃帷幕的新大厦之间，显得格外寒酸卑贱。冷家住三楼，约莫三十多平方，格局还方正。


    在客厅坐定之后，冷太太端给我泡好的一大杯茶，没有奉烟，证明她是个细心的女人。


    “我阿强是被鬼魂附身了吗？”冷先生瞄一眼一扇紧闭的房门。我知道那一定是阿强房间。


    我摇头。打开茶杯盖子，端到鼻前享受乌龙茶特有的芳香。喝了一口，接着又一口。留在舌尖唇上的甘味，驱走我旅途劳顿。放下杯子，我说：


    “这不是鬼魂附身，是一种罕见的‘失灵魂’症。特别是在他这个年龄，几乎是很难理解的事。通常中、老年人比较容易发生。”


    “失灵魂？”冷先生大惑不解地盯着我。


    冷太太则张口结舌，半天说不出话。


    “不错。”我淡淡地肯定。不希望掀起他们夫妇太大的情绪波澜。“所以才会失去理性，拿刀乱砍人；这是一种毫无意识的行为。”


    “如何证明呢？”冷先生说。


    “行为本身便是明证。因为灵魂是由意识、意志等精神物质结合而成。失了灵魂，精神便会一片空白、一片茫然，他根本不知道自己在做什么。”


    “是精神病吗？”


    “我不太清楚医学上所谓精神病的定义是怎样的？如果和丧失心志相近的话，那么阿强目前的情况，也可以用精神病三个字来描述。”


    “丧失心志？”


    “对呀，我喝了口茶，藉以和缓紧绷的气氛。“中医有所谓‘心藏灵、肝藏魂、肺藏魄、脾藏志、肾藏精’的说法，丧失心志，不就失了灵魂吗？”


    “哎呀，如果是精神病，麻烦就大啦！”冷太太不安地说。


    “本来，我也打算送他到精神病院去的，接到我太太电话，才知道你肯帮忙……”


    “精神病院未必治得好阿强，”我打断冷先生的话。“电击和药物不过治标而已，这种病得从根本着手。而医界甚至连灵魂都还在怀疑，如何能相信我这一套理论？和精神科医师谈灵魂，不骂我神经病才怪。”


    “和鬼神有关系吗？”冷太太问。


    “那看对鬼魂理解多少。”我一面品茶，一面解说：“不过，绝对不是迷信那一套。”


    “好吧，”冷先生说：“那现在该怎么做？”


    “已经在做了。”我郑重其事地扫了他们夫妇一眼。“让你们了解这些，是我治疗的第一步。所谓从根本着手，也包括你们在内，你们必须先深信不疑，往后的调理才会有效，我需要你们的配合。”


    互望一眼，冷太太抢先说：“我们相信。我们绝对相信。”


    “要我们怎样配合？”冷先生说。


    “这种事虽不是迷信，却要求比迷信更深人的迷信，必须发自内心的虔诚，深信不疑，效果才彰显得出来。我也才有发挥的空间。”


    “你放心，老师，实际上应该尊称你大师才对。”冷先生恳切地说：“听完你这番解说与分析，我知道你不是一般江湖术士，更非妖言惑众。仿佛都有道理、有依据；虽不完全懂，我已经很相信了，要我们怎样配合，我们一定照办，确确实实地去做。”


    “那好，”冷先生爱子心切的亲情溢于言表，我可以放手做为了。”待会儿先把阿强那些朋友约出来，能约到几位算几位，我要查出阿强的灵魂现在在何处？”


    我特别注意他们夫妇对我最后一句话的反应，结果令人满意，他们已经不再惊讶。


    步德在二楼靠厕所角落，连同冷先生总共坐了六个人。冷太太陪我抵达的时候，五张年轻脸蛋上的眼瞳一起瞪着我。不知道冷先生是怎样介绍我的？每对眼瞳都射出不安、畏葸、告饶的神色。我不得不摆出亲切的笑容，以松弛他们内心的紧张。


    “各位很了不起，”我说：“年纪轻轻的就能克苦耐劳、自食其力，很教人佩服。工作还好吧？”


    大家笑一笑，代替了回答。


    “他们都是阿强的好朋友，常在一起玩的。”冷先生笑着说。


    “现在阿强变成这个样子，都是他自己的命。”冷太太说：“你们心里也不好受吧，我当然不会怪怨谁罗。”


    “是啦，人各有命。”我接着切入话题中心，“他现在需要你们帮助，只有你们可救他。”


    五个人面面相觑，有些手足失措。


    “想想看，你们在一起的时候，有没有发生过什么令你们印象深刻的大事？任何事都可以讲出来，我保证绝不追究。”停一会，我又补充说，“追究起来，阿强也有问题，当然不会再雪上加霜啦。”


    许久，其中一个说：“我们玩在一起，只为了不被欺侮，绝无胡作非为的想法。否则，也无须辛辛苦苦做铁工了。”


    “这个我们非常清楚。”冷先生说：“所以才没禁止你们来往。”


    “年轻人嘛，下班后难免去寻点开心。”我说，“多少碰到些意料不到的事吧？”


    “是有过。”一个个子比较高的说，“为争座位，争面子，看不顺眼，话不投机，骂几句，甚至打几下，过去也就算了，如此而已。大部分时间我们都是自己唱唱闹闹，很少与人冲突。”


    “KTV 唱歌？”我说。


    “唔，下班无聊嘛。”两三个异口同声说。


    “有没交女朋友？”


    “对！”一个小个子高声说，“阿强交过一个女朋友，非常要好。”随即像泄了气似地放低声音，“后来吹啦，我们好替他不平。”


    “哦，怎样吹的呢？”我追问着。同时用眼神制止冷先生与冷太太插嘴。


    “被她爸爸知道了，抓回去关了起来，还带人来警告阿强，不行再去找她。”另一个留着长头发的说。


    “有这种事？”我心头一震，闪过一抹诡异的感应。“知道这位小姐的地址吗？”


    “知道，”小个子抢着说，“我们想帮阿强，在她家门口守候三个晚上，传张字条给她。结果，连个影子都没有见到。”


    “方便带我去吗？”我对小个子的年轻人说，“指给我是哪家门口就好。她叫什么名字？”


    “郝嘟嘟。也是在KTV 唱歌认识的，她歌唱得像彭彭，极棒！”小个子说。“带你去没问题，我不进门哦。”


    “当然，到门口就没你的事啦。”我说，“现在走好吗？”


    “走！”小个子表现了可爱的义气。


    “你们再坐一会，”我对冷先生说：“回头我去家里找你。”


    “找得到地方吗？”冷先生说。


    “我有地址，找得到的。”


    到了大街上，我说：“你贵姓？要叫的士吗？”


    “我姓曲，叫我阿直好了，大家都这么叫我的。她家离这儿不远，走几分钟就到啦。”'
