    原来，在“玉历宝钞”的十殿地狱景况文中，还列有哪一种罪行会被判入那一种地狱的解说，有些好像很合理，有些又实在令人难以接受，因为“玉历宝钞”成书年代是在宋朝，一千年前的社会型态与现今自然不能相比，譬如：


    1. 妻子不顺从丈夫命令的要入“黑绳大地狱”。

    现今如果还如此主张，肯定会被妇女团体活活打死。


    2. 受人托带家书(信件)没有立即送达的要入“合大地狱”。

    那么邮局里可能有不少人要去报到了。


    3. 抱怨天气太冷、太热、太阳大、下雨的人要入“大叫唤大地狱”。

    哇!未免太苛刻了吧!


    4. 吃牛肉狗肉的也要入“大叫唤大地狱”。

    那只怕全世界以牛肉为肉类主食的国家人民岂不全要下地狱?


    所以编者以为：


    1. 以上的说法是因时因地因人的一种教化方式，只能做参考，有志灵学研究的人千万不能一骨脑地照单全收，否则尽信书不如无书。


    2. 为什么有地狱？为什么有人会下地狱？绝不是基于这样的逻辑。


    之前就谈过：“轮回”的目的是为了净化，轮回是一个慈悲的法则，其目的并不是为了奖励好人，折磨坏人，那么又为何会有这么残忍恐怖的“地狱”呢？


    其实全是人类中那些深深痴迷于“贪痴”而至死不悟的人，自己不停投射出去的“心灵垃圾”所制造出来的境界。


    而且任何的恶念恶行都可能在未来将自己投入中阴界下层、最下层或“畜牲道”、“饿鬼道”去的。


    但由这些恶念恶行如果您生出严重的伤害或甚至杀戮行为时，就会落入“地狱道”。


    因为不只是“人身难得”，事实上所有生命都应受到尊重，所有的生命都有生存的权利，也都为净化而转生的，如果为了人类的贪、嗔、痴所引发的恶念恶行而残害其他生灵（包括“人”）。那么第一是这种恶念恶行必然形成一种强大的“恶”的能量并逐渐具体化的化为铁、石、毒火，尖锐锋利的器具而落入另一个界中堆积着。第二是被残豁或杀戮者临死前那种极度“怨恨”及“报复”的强大“恶念”也会形成一种强大的“恶”的能量，同样会具体化地化为铁、石、毒火、尖锐锋利的器具落入另一个空间中堆积着，千百万年来，堆积出一个广大的恐怖区域，那就是“地狱”。


    杀戮的恶念恶行又分两种，一种是实际的残害与杀戮，另一种是杀人不见血的方式，但其意义却是完全相同的，譬如一个汪洋大盗可能亲手杀了十几个人，另一个经济犯虽没有实际杀人，但因为数以千计万计的人被他设计坑害，一生积蓄全部化为乌有，因而引发自杀，同样也死了十几个人，那么哪一个的恶行较严重呢？


    那些开赌场的，搞地下钱庄的，制造或贩卖海洛因、古柯的，他们又何需亲手去杀人？至于那些权力欲薰心的独裁者或一些邪教根本不必亲自动手也可杀害千万人。


    一个人一旦为自己贪、嗔、痴的执迷不悟，为了满足自己极端利己的欲与杀戮时，不论生前是否被判刑，死后必然会被因果；被自己一手投射出去的“心灵垃圾堆积场”（地狱）所吸引。


    根据“贝尔定律”：将一个物体分成两个部份，即使其中一部份移到宇宙另一端，互相仍有着关连性，我们如果对其中一部份施以任何行动或力量，另一部分也会立即发生反应。


    所以，我们投射出的每一个意念，每一个行为绝不会完全消失的，只是我们肉眼看不见，我们就认为它不存在了。事实上在另一个空间中它不但存在而且会转化为实体。如果是极端的恶念恶行，它必然会化成“地狱”中的毒火烈焰，臭烟毒雾，化成刀斧锯叉，剑戟钩刺，甚至是怪魔恶兽，一旦死后在“贝尔定律”所主张的情形下，必定发生反应而被吸引落入“地狱”，那是千万年来人类共业所造的一个极端残忍恐怖的境界，如果我们没有本事去收拾那些自己投射制造的“心灵垃圾”，那就会被“心灵垃圾”给收拾掉。


    > 所以佛祖才会在二千年前肯定地说：“地狱有、旁.(畜)生有、饿鬼有、天有、人有、业有、中阴有。”


    “有”就是“肯定存在”的意思。


    在“地狱道”中受苦的也一样是众生，地狱也是生命净化的方式之一，为在“地狱道”中受苦的也一样是众生，地狱也是生命净化的方式之一，为什么呢？是为了去净化排除自己所制造的“心灵垃圾”，这种“心灵垃圾”除了本人，任何人也无法代劳，就算神通广大、法力无边的神佛菩萨即使再慈悲也爱莫能助，否则地藏王菩萨既然发了宏愿“地狱不空，誓不成佛”，如此这般的慈悲，何不禅仗一挥，让所有在地狱受苦的众生全都超生天界，岂不皆大欢喜，功德无量？


    非不为也，是不能也。就像一个人要想学会游泳，如果硬是不肯下水，任何一位天才教练也不能让他变成游泳健将。


    # 人生八苦与诸界奇观


    我们常常听到“神通”或“神通广大”这样的成语，而且不论在各种宗教上或一般的神话传说中，也可看到描写神佛都拥有大小不一样的变化神通，从“移山倒海”到“来去无踪”，善知过去未来，也可为人消炎解厄。


    以“欲界六天”的天神来说，从金碧辉煌，珍宝碧玉所构筑的天上宫阙，吃的奇异美食，饮的琼浆玉液，穿的无缝天衣等等无不是以神通变化而来，只要他们觉得有需要，只要起到任何物件，那些物件立刻就会出现在眼前，既不需要花钱去买，也不必与别人争夺，甚至想听美妙的天籁，只要心念才动，音乐已在四周响起，而且那种音乐是真正方体的，各种音符旋律都化做七彩绚丽的光晕轻烟向四下飘散，连四周的琼花玉树也都会随着音乐轻摇起舞，仿佛与天人同乐。


    以阳世的凡人来相比，这世界上最轻柔的绫罗绸缎与天人之衣相比也成了不堪使用的粗布。再可口的山珍海味与天人美食相比，也成了难以入口的垃圾。再豪华的宫殿与天上的宫阙相比也成了破屋陋宅。再好听的音乐与天籁相比也成了刺耳的噪音。何况身为凡人，即使绫罗绸缎，山珍海味，豪屋巨宅等等都只有极少数人能享有，而且为了追求这样豪华的物质享受，甚至还要费尽心机去巧取豪夺或必须杀掉一大堆敌人异己才能获得。若是不幸投胎到贫穷落后的地区，如非洲、中南美洲的小国家，不但挨俄受冻加上战火连年，一生中能吃几顿饮饭都求之不可得。


    人生八苦之中，就有一项是“求不得”之苦，就算富可敌国的大富家也有一生中梦寐以求却又求之不可得的事物，何况是一般人？


    但是“需求”就是“欲”，不论“食谷”、“性欲”或“物欲”。不只是“人道”如此，天神因为有需求所以同在“欲界”，天神也和人一样要吃饭，作爱和需求其他物件，至于其他“阿修罗道”、“畜生道”、“鬼道”、“地狱道”一样有着强烈的需求欲望。


    人之所以为人，之所以为“众生”，之所以在六道之中转来转去、轮回不已，就是因为有着大同小异的“需求欲望”，只要意念中存在着这种“欲”，那么就一定只能在“欲界”之中打转而难以超脱。


    古人说“无欲则刚”，人一旦能无欲，则必然是“跳出三界外，不在五行中”，臻人极高的觉悟境界，不过“无欲”和“禁欲”不同，“禁欲”就表示还是有欲需要禁，那么既然还有“欲念”，不论禁得了禁不了，都还是要在“欲界”来去。


    那么生活在中阴界(轮渡过境室)的中阴身(阴魂)又如何呢？


    既然会暂居在中阴界，就表示尚未因无欲而臻人觉悟之境，当然也会有着不同的欲望，所谓的“不同”指的是境界的不同。


    # 第十七章 人生八苦与诸界奇观


    除了“神通”，许多读者大概也听过“鬼有鬼通”的说法。


    既然“鬼有鬼通”，那么只要像天神一样：一旦有什么需要，只要心念所及，那些东西就立即会出现在眼前，不管是金银财宝、不管是锦衣玉食，不管是亭台楼阁，不管是音乐歌舞全都是想要就有，那么为什么经常又有很多的鬼会藉着托梦，或附身头形来向阳世的亲友索讨香礼财帛等等的祭礼呢？


    其实中阴身（就是人死后仍然存在知觉生命，不论你称他为鬼或灵魂）所处的中阴界（狭义的灵界，就是笔者所说的“轮迴过境室”）也是有等级层次的。


    如果要想把所有中阴界的层级细细划分，一一列举出来，那真是难以胜数，而且只会徒增困惑而已，所以为了叙述的方便，笔者依据个人的研究与认知，只做了以下概略的划分，并由高层往低层一一说明如下：


    # 一、天界先修班


    这一层级的灵，全是生前有过大善行，或一生之中善心多过恶心，善行多过恶行者，虽然未能大彻大悟地跳出三界之外，但也具有转生“欲界六天”去享受长短不一的福报之资格。然而，因为其生前对灵界及死后生命种种缺乏正确认知或完全不了解（是否信教或信何种宗教没有关系），又或者所信之宗教对灵界的认知有所谬误，因此使他在死后进入灵界时会发生严重的迷惑与不适应，因而必须先在“天界先修班”接受长短不一的“人境前训练”。这是一种善意，自由而且绝对必要的训练，通常由已入天界的亲朋好友或高层级灵界导师来指导他，帮助他适应天界的环境及天界的一些规范。这种先修班的班级人数不一，可以大到数万人，也可以一对一，也有时好几位高层级的灵同时来指导一位先修班的新生。


    授课的型态不是像阳间学校新生训练的刻板，有时会让这些新生暂时居住在一个社区型的地方，并且还要教导他如何正确地发挥其变化能力来“创造”自己需要的物件，从屋宇、衣食到其他享受品，一直等他完全适应了天界的生活，他就可以自由地转生天界，享受他应得的福报。


    (注①：所谓的不能适应，举例来说：好像突然把一个生活在亚热带的人一夜之间载到北极圈内去，如果他先前不知道极地之内有“半年永昼、半年永夜”的自然现象，那么在半年中二十四小时都可以看到太阳时，一定会陷于迷惑，甚至因而搞乱了生理时钟，不知何时该醒？何时该睡？必须会因此感到无法适应。所以如果能事先有心现准备或者在突然来到极地之时，有热心的前辈的指点及协助，他慢慢地自然会适应，并怡然地在该地生活下去。


    (注②：在“先修班”中尚未转生，因为还要依他悟性的程度及个人性向以及对他最有帮助的天界层级不同，才能决定转生到哪一天界，所以在“天界先修班”的灵在未转生前，仍属层中阴身的阶段。)


    注③：在“天界先修班”进修并等候转生的灵体，在“观灵术”中，虽然阳世的亲友有时也可与之会面，但通常他都不开口，甚至也不主动与阳世亲友寒喧，有时进入灵界的阳世亲友只能见到他在美丽的天界闭目打坐，而完全无法沟通。有时引领阳世凡人进入灵界的神佛或光灵会劝慰地告诉进入灵界的阳世凡人道：这位亲友已潜心修持，必须离开阳世的种种羁绊，所以为了让他静下心来，最好不要去打扰他。当然阳世亲友之所以会藉“观灵术”法事进入灵界去探望过世之亲友，一是思念，二是担心他会在“阴间”受苦，如今见他已准备进入天界去当天神享受'
  mdcn: '尽，读者只要稍加思索，发挥一下推理能力就不难归类出来。


    最后是谈的是“地狱道”：


    中国人诅咒人的时候，喜欢说：“这种人死了一定下十八层地狱（阿鼻地狱）！”


    外国人也一样，总是说：“去下地狱吧！”


    可见“地狱”是一个多么恐怖又痛苦不堪的地方？


    但是“地狱”既不是神佛上帝所造，也不是阎罗王所造，更不是地藏王菩萨所造，而是人类自己共业所造，但地狱何时开始有，大概是难以知道了。


    “地藏王菩萨”是在见到众生因执迷于贪、疾不悟而造成恶业；所以才会附入地狱道去受苦。于心不忍，而发了慈悲的宏愿，要一直济渡地狱众生，并至“地狱不空，誓不成佛”。


    有关地狱的层级及其中的景况，自古以来就有很多不同的说法，不论东方的，西方的，道教的，佛教的，要全列出来，可以再写三大本书，笔者为了方便说明只试举“地藏菩萨本愿经”以及“玉历宝钞”中的地狱景况，但是内中所说的景况并不重要，重要的是在后半段的探讨部份。景况只是纯粹列出供作参考资料而已：


    一、“地藏菩萨本愿经”：


    “……诸有地狱，在大铁围山之内。其大地狱，有一十八所。次有五百名号各别。次有千百，名字亦别。无间狱者，其狱城，周围八万余里，其城纯铁，高一万里，城上火聚，少有空缺。其狱城中，诸狱相连，各号各别。独有一狱，名曰无间。其狱周围万八千里，狱墙高一千里，悉是铁为，上火撤下，下火撒上，铁蛇铁狗，吐火驰逐，狱墙之上，东西而走，狱中有床，遍满万里。一人受罪，自见其身，遍卧满床。千万人受罪，亦亦压自见，身满床上。众业所感，获报如是。又诸罪人，备受众苦。千百夜叉，及以恶性鬼，口牙如剑，眼如电光，手复铜爪，拖拽罪人。复有夜叉执大铁叉，中罪人身，或中口鼻，或中腹背，抛空翻接，或置床上。复有铁鹰，啖罪人目。复有铁蛇，绕罪人颈。百肢节内，悉下长钉，拔舌耕犁，抽肠剉斩，烊铜灌口，热铁浇身。万死千生，业感如是。”


    “……阎浮提东方有山，号曰铁围，其山黑黝，无日月光。有大地狱，号极无间。又有地狱，名大阿鼻。复有地狱，名曰四角。复有地狱，名曰飞刀。复有地狱，名曰火箭。复有地狱，名曰夹山。复有地狱，名曰铁驴。复有地狱，名曰烊铜。复有地狱，名曰抱柱。复有地狱，名曰流火。复有地狱，名曰耕舌。复有地狱，名曰剉首。复有地狱，名曰烧脚。复有地狱，名曰啖眼。复有地狱，名曰铁丸。复有地狱，名曰争论。复有地狱，名曰铁钑。复有地狱，名曰多瞋。”地藏白言：“仁者，铁围之内，有如是等地狱，其数无限。更有叫唤地狱，拔舌地狱、粪尿地狱、铜巢地狱、火象地狱、火狗地狱、火马地狱、火牛地狱、火山地狱、火石地狱、火床地狱、火梁地狱、火鹰地狱、锯牙地狱、剥皮地狱、饮血地狱、烧手地狱、烧脚地狱、倒刺地狱、火屋地狱、铁屋地狱、火狼地狱。如是等地狱，其中各各复有诸小地狱，或一或二，或三或四，乃至百千。其中名号，各各不同。”


    “……地狱罪报，其事如是：或有地狱，取罪人舌，使牛耕之。或有地狱，取罪人心，夜叉食之。或有地狱，釜汤盛沸，煮罪人身。或有地狱，赤烧铜柱，使罪人抱。或有地狱，使诸火烧，趁及罪人。或有地狱，一向寒冰。或有地狱，无限粪尿。或有地狱纯飞疾黎。或有地狱，多攒火枪。或有地狱，唯撞胸背。或有地狱，但烧手足。或有地狱，盘缴铁蛇。或有地狱，驱逐铁狗。或有地狱，尽驾铁骡。仁者，如是等报，各各狱中，有百千种业道之器，无非是铜，是铁，是石，是火。此四种物，众业行感。若广说地狱罪报等事，一一狱中，更有百千种苦楚，何况多狱。……”


    # 二、玉历宝钞


    ①一殿秦广王：主管人间生死，幽冥吉凶。有名的“孽镜台”即设在此处，台上有七个大字：“孽镜台前无好人”，因为有善心善行的好人已升天界，不好不坏的在中阴界中层以上。只有为恶的才会来到此处，这块孽镜对灵体的“阿赖耶识”会发生感应，就像从电脑光碟片中读取资料一样，此一灵体生前的一切行为意念都会快速的一一显现，没有丝毫遗漏。但是这只是具像化的说明，其实孽镜不一定有实体的镜，有些频死经验的纪录中；大多数人都表示在灵魂离体的那一刹那，会有眼前看到一生所有事情快速地闪过。而留在中阴界的也一样，也同样是会先见到自己一生的过程，巨细无遗地在空中一一显现。


