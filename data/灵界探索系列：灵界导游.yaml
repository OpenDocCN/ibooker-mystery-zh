    在这段时期，阿里戈要先获法官批准才可离开孔贡阿斯·多坎波镇，还要停止行医。


    他只好听命，但头痛又发作了，过了一段短时间，由于当地警察似乎有意对他宽容，他开始偷偷替人看病，手术则暂停施行，一九五八年五月，库比希总统给阿里戈颁发特赦令。


    一九六一年，库比希已不在任。宗教领袖和医学界再施压力，要当局对阿里戈采取行动。但要找一名控方证人十分困难，调查行动几个月都没有多大进展。到一九六三年八月，阿里戈替来自美国的调查员普哈里奇医生动手术，使他的名字再一次出现全国报纸的大标题上。


    普哈里奇是一位超自然现象的调查员，也是伊利诺州西北大学的医学士。他听说阿里戈之事后，决定前去亲眼看看。阿里戈欢迎他和三个同伴留下观察，还请他们随便访问病人。


    调查的第一天，普哈里奇和同伴发现近二百人聚集在教堂外等候阿里戈开诊。开诊时间是早上二点。群众排队进入教堂后，阿里戈首先对病人说，虽然实际治好他们的是耶稣基督，但是并不介意替其他宗教教徒看病。说完，他请在场的人跟他念圣经，然后他退进一间小室内。


    不久，阿里戈再出现，普哈里奇给他完全改变的神态吓了一跳。阿里戈神色庄重，说话明快。翻译员注意到他说的葡萄牙语有很重的德国口音，还不时夹杂德语单字和短语。阿里戈请几位调查员到诊室，一百说：“来吧！这里没有什么要隐瞒的。我欢迎你们在此旁观。”


