    # 第十九章 人生八苦与诸界奇观


    虽然市容很古老，但却显得非常繁华热闹。市区中商店林立，酒肆茶坊、市集摊贩随处可见，闹区中“人”潮汹涌，男女杂处，摩肩擦踵，车水马龙，一如阳世。这也是亡魂死亡超过一年以上，由“亡魂山”迁移此处的定居之所，但大半是生前原居于都市之中或原本以经商买卖为业之人。


    # 十九、亡魂山


    这是新魂来到灵界的暂居之处，但是迁居此处多在死亡的百日之后，因为从死亡之后的一百日之间，新魂要接受各殿阎王的审判，善者升入天界或阿修罗界，恶者判入地狱、畜牲、饿鬼等界，而善恶相当的，则暂时移居到“亡魂山”，此处可说是一个过渡地带，让情绪、思虑及灵性都还不稳定的新魂在此处先行适应，等一年后完全适应了灵界的生活之后，再依各人的喜好，移居“六角庄”(郊区农居)或“丰都市”(都市)，交依个人意愿从事各种行业，多半的亡魂在此仍是重操旧业，但也可自由转业。


    在甄师父的施法过程中，加上如果有神祇的引领之下，进入灵界的当事人并非循序前进，而是可以任意地由其中一段路程或关卡切入，有时甚至直接进入“丰都市”或“亡魂山”。


    阳世之人经过“观灵术”施法进入灵界者在来到中层之后，如果得到神祇的恩准，也可由此一游天界(或天界先修班)，最上层、上层的中阴界，或下层及最下层的中阴界，甚至“地狱”。


    不过，不论中层级居民其生活情形如何，终究只是一种暂时的过境或居留而已，不论能待上多久，最后还是会去轮回转世。


