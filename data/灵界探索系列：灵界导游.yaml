    # 第八章 “阳世”与“阴间”


    老师说：那是亡魂山）。我们在城外降落地面，步行入城。


    城门守卫见到济公师父，相当恭敬地将城门打开；倒是两边有四位着古代军装的护城将军，目如电光，对我一直上下打量；我被他们瞧得有点没来由地心虚起来。入城之后，街景与我们阳世间在电视上欣赏古装连续剧的街道布景，极其相近，没多大差别。街道很宽，两旁皆是平房矮屋，大都是土砌砖造。街道路面是硬石板铺成，古朴整齐。


    济公师父领着我信步前行。我因初到“丰都”，颇觉好奇，东张西望；师父也不厌其烦，随景解说。走着走着，目光一一清，原来有些往家在屋子门口种花植树，使人感觉清新悦目，济公师父说这一带是“丰都”的住宅区；复又前行，又用蒲扇指着眼前出现的一批更典雅的房屋，告诉我这一区是在“丰都”担任“公职”人员的官舍，大概类似我们阳世的公家宿舍吧！


    济公师父解说：“丰都是冥界首都亦即行政中心。在这里的住民，不外乎是冥界官吏及其眷属、平民及应该投胎尚等待分发而暂行配住于此的民众。”我听了还是不太明白，师父又详细解释：“所谓平民，就是生前之行善，为恶之功过不致相差太悬殊，无须投胎转世者，便安排在此设籍落户。除了日常生活作息之外，尚须至‘讲经所’听神佛讲经说法。经‘审核通过’便可选择任职冥官或上天界任神职。而‘讲经所’是地藏王菩萨及东岳大帝直辖设立，依各种不同程度、资质而设不同等级，讲授不同经典；类似你们凡间的各级学校。当然，对住在这里的平民而言，上‘讲经所’所经闻法是他们的‘义务’。如果住在这里超过一百年的期限，而未通过审核的话，便得再强迫轮回。若通过审核后，便依个人修习结果，参考前世、累世功果表现及个人意愿，分发至冥府任职或派赴阳间担任福德正神、城隍、阴差、日夜游神等神职。再好一点的，便升至天界继续修行；到了天界便成了‘准神明’，随时都有被分派至凡间任神祇，享人间香火的'
