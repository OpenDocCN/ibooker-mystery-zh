  md: '# 第十四章 跳出三界外


    十公分，这两条断尾会不停地扭动并互相靠近，仿佛对方有某种磁性吸力一般，最后这两条断尾终于碰触在一起，并互相缠绕，扭曲一团。即使在存储雄守宫本体死亡之后，两条断尾的这种“交尾”（交配）的本能仍然可持续数小时之久，可见“魄”的力量，也正因为蛇、晰蜴这类爬虫类动物具有超强的生物性本能，才能从远古的恐龙时代，历经数亿年仍能幸存到今天。


    面对这样令人诧异的现象，前苏联科学家据此推论：雌雄异体的动物，相互之间“性”的吸引，可能不单纯只是心理性的行动而驱使肉体行动，而似乎有物质性的自然吸引力存在其间，并且这种吸引力在反覆的验证中是可以明确观察到的。


