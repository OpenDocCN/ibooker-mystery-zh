    下，然后召唤下一个病人，普哈里奇检查病人的眼睛，没有发现血迹和伤口，整个手术历时不到一分钟。


    整个早上，阿里戈就这样不停工作，既不用麻醉剂，也不须进行预防感染的措施。就普哈里奇所见，他完全没有用催眠术；动手术病人出血很少，也没感到痛楚。阿里戈诊症多半只是写药单，而且总是挥笑疾书，毫不犹豫。到十一点，他宣布上午诊症时间结束，说要回任职的政府福利机构把分内的工作做好，下午再开诊，就众人所知，阿里戈从来没有收过诊金。离开诊所后，他的德国口音和严谨态度随即消息，恢复往常老实和气的性格。


    当天黄昏，普哈里奇和来自圣保罗的记者里西尼，在诊症室内设置电影摄影机，假使阿里戈是一名手法熟练的骗子，拍得的影片就可以揭穿他的伎俩。那天晚上，阿里戈一直工作到凌晨一点，整天总共诊治了二百名病人。


    普哈里奇满腹疑惑，他知道要对这位异人的工作进行彻底研究和得出令人信服的结果，需要大量时间、金钱和装备。返美国前还可以进行什么试验呢？他的右肘内侧，有一个小脂肪瘤，虽属良性，却使他很不安。他决定翌日叫阿里戈切除肿瘤，由自己亲自作试验品。


    阿里戈一口答应。“没问题”他说，“谁有小刀借给我来替这个美国人开刀呢？”几个人拿出小刀来，阿里戈很快地挑了一把。普哈里奇突然心生凉意，可是已骑虎难下了。他抬头看着里西尼把电影摄影机准备好了没有。


    “医生，卷起袖子来吧。”


    普哈里奇卷起袖子，提起精神要看阿里戈怎样开刀，但是，阿里戈请他望向别的地方。


    不到十秒钟，普哈里奇觉得阿里戈把一些湿滑的东西放在他的手里。他看了看，原来就是切除出来的脂肪瘤。他的前臂上有一个整齐的半寸切口，只淌出一点血丝。他完全感觉不到痛楚。'
