  md: '我的确没有把握，但又似乎有那么点信心。现在，我必须倾全力追查阿强的“灵魂”现在何处？目前，他只是个空壳子，是一具人们所谓的“行尸走肉”。因为失了灵魂，所以才做出一连串丧尽人性、超越常轨的砍人事件来。灵魂主宰理智，无怨无仇的砍杀，便是失去理智的明证。可是，一个正值发育，茁壮的少年，阳气旺盛，又何至于失了灵魂呢？


    晚上，我把自己关在静室，用功闭目冥思，我在冷如冰家绕圈子，仿佛找到那么一丝线索，沿着追下去，很快又陷进渺渺茫茫迷雾中，失去踪迹。


    连续几个晚上，都是如此：功亏一篑，查不出任何结论。这若有若无的线索，很可能就是阿强失去灵魂时留下的残余信息。


    一星期后，阿强父亲来了电话——


    “为了彻底治好阿强的病，我请了十天休假，有必要的话我可以带阿强到德原去，他伤势也快完全好了。”


    “我去清平吧。明天，好吗？”


    “太感谢啦，我们到车站接你。”


    第二天下午，刚走出清平车站，远远地望见冷太太和她先生已等在出口处了。我是买好票后在车站大厅打的电话。


    经过冷太太介绍，和中等身材的冷先生握手时，那只有力的、长满茧疤的手掌，告诉我阿强挨的那顿打，不是非同小可的。不过那张黧黑的脸孔，却又透着老实人的憨厚与耿直。这种人通常都有一颗热忱而负责的心。


    “太麻烦你啦，真不知该怎样感激你。”


    在“三脚鸡”车中，冷先生的恳切诚挚，留给我很深的印象。益发坚定我竭尽所能，帮助这一家人脱出困境的决心。


    “要如何着手呢？”冷太太说。


    “到家再慢慢谈吧。”


    这是一排旧公寓。夹杂在璃帷幕的新大厦之间，显得格外寒'
