    # 第三章 轮回的法则


    然而六道、三界无不是轮回之所，众生因执迷而来去其中。佛教曰“三界火宅”，正是希冀众生能澈悟生命的真意，而逃离三界轮回之所。


    其次，“若问前世因，今生受者是；欲知来世果，今生做者是。”这句话虽然在阐释因果上容易使人明了，但轮回转世，因果循环绝不是善有善报、恶有恶报这么简单，我们实在有必要深入探索。


    举个有趣的例子来说；


    地狱的鬼卒阴差从何而来？


    很简单，全是生前在阳世居心正直却嫉恶如仇的人，为什么这些人会成为阴差鬼卒呢？


    因为居心正真是为人最低的道德标准，平生不做坏事也只是一个常人而已，所以死后上不了天堂，讲不了天界，但是因为他们的愤世嫉俗，嫉恶如仇，见到他人的恶行时，每每恨不得自己就是执掌刑罚或生杀大权的官员，对情节轻微者抓来打一顿皮鞭，抓到小偷砍去手掌，抓到强奸犯施以宫刑去势，抓到杀人犯，处以斩首枪决之刑，如果抓到的是十恶不赦的汪洋大盗或身负十几条人命的杀人魔，则恨不得剥皮抽筋或来个五马分尸，务求大快人心，求其公道，他们无不是主张治乱世用重典，并且把这种“以牙还牙、以眼还眼”的想法坚决地认为是在替天行道。


    固然，这些人本身的确正直，也从无恶念恶行，他们的嫉恶如仇也确实也是自义愤，但是他们却少了一份慈悲的心怀，一般人对好人慈悲是很容易的，但难的是对坏人的慈悲，诚如印度圣雄甘地在被暗杀将死，人人愤怒要追缉凶手偿命时，他充满慈悲地说：“原谅他吧！因为他不知道自己在做什么。”


    正因为众生的执迷，所以才会造下恶业，恶人歹徒也正因为执迷所以才会为恶，因为一个真正了解生命真义的觉者是不会造此恶业的，所以对执迷的众生而言，正因为他们执迷的可悲所以


