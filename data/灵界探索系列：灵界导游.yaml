    至于国籍、民族、性别和前世也没有必然的关联，譬如前世是美国人，这世可能会选择当中国人，因为他需要净化的部份是亲族关系，比较起来，中国人在家庭观念上要比美国人浓厚，所以再选择当美国人助益不大；反而投胎为中国人较有益。也有些人前一世是男人，特别是大男人主义的日本人或韩国人，一向以“男尊女卑”而习以为常，一旦在灵界得到教诲，知道灵体是不分性别的，都需要得到相同尊重。为了深切地去体验这种风俗习惯的不当以及前一世自己的缺失，或过于阳刚暴躁，需要女性温柔仁慈方面的弥补，也许会决定在下一世投胎为女性。


    某些宗教、民俗信仰或甚至命相师自古以来一向将人这一世的美丑智愚、贫富贵残说成前世的因果，并认为这一世能够长相英俊或美丽、身强体壮、家境富有，头脑聪明、一生顺遂等等的好条件是因为前世行善的福报，而容貌丑陋、体弱多病，愚笨或智障残障，家境穷困，一生潦倒的认为是前世的恶报，其实这是不正确的，因为只要是再来转世为人就称不上是“福报”，所谓得到福报必然是转生天界去了，又何需投胎人世来受生老病死之苦？若说英俊美丽是福报，且看古来那些伟人、名人，大哲中有几位是俊男美女？许多俊男美女终其一生往往是一事无成，甚至有些美人受不了“美人迟暮”而自杀身亡，俊美者反受俊美之害，何来“福报”。


    聪明就是福报吗？苏东坡总算是顶尖聪明吧？空有满腹学问，一生仕途却极其坎坷，到老来终于悟出了其中的道理，长叹道：


    > 人皆生子望聪明，

    > 我被聪明误一生，

    > 但愿生子愚且鲁，

    > 无灾无难到公卿。”


    他是一位亲身感受到“聪明无用”的名人，看看现今人满为患的各地监所中的人犯，是不是一个比一个聪明，其中又有几个是笨蛋或智障者？


    爱迪生、爱因斯坦少年时期都是被学校认定不堪造就的低能儿，但其一生努力的成就，却永远照耀人寰。所以聪明绝不足恃，更不是福报，甚至有可能聪明反被聪明误。


    家庭环境好就是“福报”吗？古话说：“富不过三代”，为什么？就算家财万贯，一生不愁吃穿，但要是游手好闲、坐吃山空，甚至染上赌博、嫖妓、吸毒等等的恶习，甚至年纪轻轻的就倾家荡产、饿死路边、反不如在穷困家庭中成长的子女，自小刻苦勤俭，甚至艰苦卓绝、白手起家，开创一番事业，而且古来的伟人大哲也极少是富家子弟。显然这也不是“福报”。


    所以，“如何前世因，今生受者是；欲知来世果，今生做者是”这句话的真正含意，绝不是字面上这么简单，任意解释也许可以满足某些人的疑惑，但是深究至灵学的领域时，就会有更高一层的含意。


    假设大学的课程没有修养年限长短的限制，任何人只要把该系所有的学分修满，不论他是花了一年或者十年八年均可获得文凭及学位，那么自然会有些人拼死拼活地在一年中全数修满，有些人按部就班修个四年才毕业，而有些人则希望轻轻松松地修个八年十年才拿文凭，这全凭个人的自由意愿。


    某部分的“轮回转世”也一样，单以投胎为人来说，在具有选择权利的灵体（注：有些灵体的轮回转世是被迫，而无选择权的）中，有些人深深感到多次转世去经历生老病死是很无谓的，于是鼓足勇气选择一次修完，因而把所有的课程全集中起来，那么这一生必然是坎坷不顺，倍尝辛酸苦楚的，甚至他必须选择一个残障或多病身体，或一个不幸的家庭，遭受无数的打击才能通过毕业考试。这好比琢磨宝石，我们一定会用最坚硬的工具去切削研磨，想想看；如果这颗宝石会说话的话，它一定会在切削研磨的过程中不停地喊痛，因为磨练一定是痛苦的，但是不经痛苦的切削研磨，宝石是不会闪烁出璀璨耀眼光芒的。同样的，灵性如果不经痛苦的历练，也同样是难以提升。也所以在三界六道中，只有人间才是最佳的修行道场，在天界享受福报的境域是难以收到修行效果的。


    当然有些灵体没这么大的勇气，所以只好选择分段修完的方式，甚至必须投胎转世数次、数十次才能修满人间的学分。（注：这其中又出现了一个在“轮回法则”中看起来是例外或漏失但事实上既不是例外，也不是漏失之处；那就是“立即转世”，有些人一死，灵体根本没有经过灵界报到手续就立即再次投胎了，其原因正是因为一个灵体可能选择了连续几次的投胎，两世之间并不需要暂时回去“过境室”休养与等待，而是“立即转世”。这种实例在东方西方都曾有过可查证的记录，所以也引发了对中阴间“轮回过境室”存在与否的疑惑，事实上这纯属误解，而有时有些灵体既没有去报到也没有“立即转世”，而是飘飘荡荡地在阳世等待了数日，数十日甚至几个月才再度投胎转世为人，也因此造成了人死后数十日会投胎转世的，但这仍然只是一个误解，读者看到此处，一定要深入地了解，才不会造成为何各家各派对轮回有着不同说法的无谓困扰。）


    在中阴界（轮回过境室）中层区域，也是“冥府”的行政中心所在，也就是位于“丰都城”中的“冥王殿”，或称为“丰都大帝殿”，下设有各种大大小小的行政机关，重要的职务多由高层级的灵担任,
    但一般不重要行政事务, 也由中层级之内能力较高的居民来兼任。


    除此而外, 其他高能力的灵体在此就纯只是休养, 修持检讨及等待轮回转世。不过他们的能力依然有限, 仍不足以知道自己何时会投胎转世, 在不少 “观灵术” 或以其他方式接触的纪录中,
    当询及这个问题时, 他们也都会做相同的表示。


    在中阴界 (轮回过境室) 各层级中的居也有一种升迁的法则, 由于每一层级都有依灵性及悟性不同所特别安排的课程, 如果修习完课程, 灵性达到某种程度的净化时,
    他就可往上升级, “去到” 较高的层级, 所谓的 “去到” 并不表示赴达异地, 而是原来层级那个世界的人、事、地、物会逐渐淡化, 成为虚无飘渺之境而终于消失。而原先无法知晓、不可接触甚至完全看不见的上一层级世界,
    其中的人、事、地、物则由模糊飘渺进而越变越清晰, 终至完全实存, 这好比是看电影及电视时, 两个不同场景重叠时 “淡入、淡出” 的效果, 差别只在灵界的变化在灵界居民的感觉中,
    那是完全真实立体的。


    这种情形是一个灵界共同的法则, 所以在西方神智学家的研究报告中, 也有相同的纪录。


    不过, 由此又出现了另一种现象, 一旦灵界的亲友有升级的情形, 而升入较高层级去时, 藉由 “观灵术” 进入灵界的阳世之人, 通常会被明确地告之 “他们要往上升级到另一个较好的境界去继续修行,
    以后就不容易再 ‘会面’ 或接触了。”


    但是, 有时灵界亲友不知道是受到某种法则的限制或其他原因, 往往只是很委婉隐晦地告之前来探亲的阳世亲友说: 我在这里很好, 以后不用再来看我了!


    也或者有时阳世之人进入灵界成功地探视了一次或数次之后, 隔了一段时间即使再进入, 也无法与这位灵界亲友见面或沟通, 询问引领的神祇或其他灵界居民时, 会答说
    “去玩了!” “不在!” 或由神祇告之: “去天界了!”、又甚至就似乎不明所以地不见了而 “找不到!”


    其他以 “牵亡魂” 或西方 “降灵会” 以亡灵附身来沟通的方式中, 也有相同的情形, 甚至亡灵会明白地表示自己即将升级,以后就不能再来附身于灵界而与阳世亲友沟通,
    甚至一些经常被灵媒请来附身谈话的亡灵在数年或十余年之后, 也会表示类似的情形, 如果是职业灵媒, 这时就必须另等新的 “热心” 亡灵来建立新的沟通管道。


    不过, 阳世的亲友一旦遇到这种情形, 不但不该感到伤感或不舍, 反而应该祝福这位灵界的亲友, 因为升级毕竟是有益灵界亲友的好事, 否则不停地用各种沟通方式去打扰他或牵绊他,
    只会使他停驻不前, 而难以精进, 对他未来的投胎转世是有妨害的。


    在中层级之中, 为数最多就是属于 “中能力” 的灵体, 由于执着于阳世的种种积习, 来到灵界依然不参拜彻悟, 所以多半仍会从事着与生前完全相同的行业, 但这种行业一定是他生前有浓厚兴趣的,
    如果对生前的行业毫无兴趣, 十分厌烦, 只是为了谋生糊口不得不做, 譬如清道夫, 譬如某些职业军人, 那么来到灵界就不可能再重操旧业, 而是选择生前有兴趣但一直未实现的工作去做。


    除了一些灵界不需要的行业, 如丧葬业、色情业等等之外,中层区域内有着与阳世相同的各种行业, 每位中能力的灵界居民仍需要工作才能谋生, 也因此有着交易买卖,
    也因此有了各种货币银钱, 而且这些士、农、工、商、各行各业的居民中, 也一如阳世以拥有钱财的多寡而有贫富之分。通常这些有正当职业, 谋生能力的居民是不会主动用托梦、发炉的方式去向阳世亲友索取金钱或供品祭祀的;不过在“观灵术”或以其他方式有所接触时,如果阳世亲友主动焚烧纸钱给他们,他们也是多多益善,不会拒绝,而且越是贫穷的,越有这种需要。


    如果是生前好吃懒做,没有正当职业,也没有一技之长,或是仗着家境富有,游手好闲的富家子弟,阳世的财富生不带来,死不带去,但是一生虽然没有善行,但也没有什么恶行者,尤其是对生命也没有正确的认知者,在阳世充其量只是一个混吃等死的米虫而已,那么死后来到灵界,通常会落入中层级而成为低能力者,不但没有创造能力也没有基本的谋生能力,于是只有变成灵界的乞丐甚至于三餐不继,衣不蔽体,也因此就不得不常常藉着托梦,发炉或灵媒或“观灵术”的机会来向阳世亲友索取纸钱供品的祭祀。如果万一阳世亲友根本不相信灵界之说,也没有祭祀习惯的,他们的景况就会很凄惨,只好在灵界做苦力来混碗饭吃,一旦碰上可以回到阳世的放假日,往往前往有祭祀之处乞讨而分一杯羹,也有时会穷极无聊地附于碟仙、钱仙、扶乩的方式上向不认识的人乞讨索取。


    在中层级的居民,由于“创造”的变化能力有限,不足以靠“变化”来构筑建筑物,完全必须靠工匠来建造,这一样是要花钱的,因此有较好住宅的只限于比较富有的“高能力”阶层或一些冥府的行政人员。其他中能力者多半会接受分配,而住在历代先灵(已投胎转世)所留下来的屋宇之中,也因此,在这一层级中,新的建筑极少,而先灵留下的屋宇房舍多半是依当时对阳世记忆中的样式兴建,连其中的家具用品也一样,以至于那些房舍屋宇几乎全是几十年前甚至几百年前的模样,而使得这一层整个景观都仿佛时光倒流回到了半世纪或一世纪前的感觉。这也是为什么经由“观灵术”进入灵界者至少百分之九十九都有共同的惊异与观感,一致认为:那边的市容景观、建筑式样及生活用品都是这样古老，让人仿佛回到了古代的社会一样。


    从“观灵术”的诸多资料中显示：一般进入灵界的路程或关卡，都是属于中阴界（轮回过境室）中层级这个区域；为了方便了解，再次简单列出进入灵界的路线与关卡来说明：


    ### 一、草仔路


    进入灵界的起点，有时也是一个进入灵界的转运点，这是一片青葱的草地，草长得不长，地势很平坦，范围却很大，中间有一条弯弯曲曲的小径往前延伸到目力所不可及的远方……


    通常，在“草仔路”出现之前，被引入灵界的当事人会先看到光，或见到佛、菩萨、各种神祇显现法相前来引领，如果是以步行、骑马、乘轿方式前进，将会经过“草仔路”，如果是随着佛、菩萨、各种神只以飞行、乘船方式前进，则会越过“草仔路”。有时也有的当事人并未见到光或佛菩萨神明，而表示直接见到了这一大片的青草地，那么在法师施法念咒之下，也有单独通过“草仔路”自行往前走的。


    ### 二、赤土路


    这也是一片广大的旷野，但寸草不生，只是干涸的红土地，或者有些进入灵界的当事人只是单纯地看见一条红土路，弯弯曲曲地往前延伸……


    ### 三、黑土路


    与“赤土路”的景况相似，有些当事人见到的是一片黑土的旷野，路径不是很清楚，但有的当事人却只是见到一条弯弯曲曲的黑土路，有的表示这条黑土路很松软，走起来很舒服，但也有的却表示相当泥泞，很难走，为什么会有这样的差异则不得而知。


    ### 四、马齿沙路


    就是一般乡间的石子路或细石路，石子不大，有如马的牙齿，因而得名。这些石子有棱有角，相当尖锐，有些当事人曾表示走在这条路上，脚底刺痛难行。


    ### 五、恶狗村


    “恶狗村”有狗而无居民，一大群各类品种的恶狗，对进入的当事人狺狺而吠，来势汹汹，逼得当事人往往不敢前进，这时法师会施法让当事人离开或绕道而行。


    ### 六、龙坤井


    路边上一口石质的古井成了路标，有时会见到一些路“人”在此掏水而饮或洗手洗脸及洗衣服，这是进入灵界后第一处可见到“人”影之处。


    ### 七、冷水坑


    是一泓山间的小湖，湖水清澈，但寒气逼人，法师会施法让当事人绕过湖边的小路往前行。


    ### 八、杀牛坑


    当事人是经过山腰上的羊肠小道往前行，而谷地中则有许多多的屠夫在杀牛，牛数成千上万，画面相当血腥恐怖。


    ### 九、奈何桥


    这条桥真的鼎鼎大名，只要是中国人，不论信奉的是哪一种宗教，不论是否相信相世阴间之说，但却是人人都听说过“奈何桥”的名称，桥下的水名为“阴阳河”，这是一条阳世通往阴间（灵界）的必经之路，也可视作是阳世与阴间最明确的分界线，一旦越过此桥，就完全进入了“阴间”（灵界），对于死者的灵魂而言，这更是一条有去无回的单行道、不归路。一旦走过此桥，就等于确定被列入鬼籍，阳寿告终，绝对不能复生了，所以所有亡魂来到此处，也只有“无可奈何”地往前行，一切阳世的前程往事都化成泡影，再也无能为力了，所以这条桥才会被称为“奈何桥”。


    ### 十、阴阳河


    就是“奈河桥”下的这条河水，是阳世与阴间（灵界）最明确的分界线，在一般的情况下，在某些案例中，当事人在佛菩萨或神只的引领下，若是乘船进入灵界，则会弃先前步行的路途，直接由阴阳河的水路往前行。


    若是由陆路步行前进的，来到阴阳河边，则可选择经过奈何桥继续前行，也有的则乘船渡过此河，在下一程的“洛阳港”上岸继续步行的，过桥步行的则会绕过“洛阳港”，顺着河边往下一程走去⋯⋯


    ### 十一、洛阳港


    为什么会被称之为“洛阳港”，和阳世真正的名城古都——洛阳之间有什么关连不得而知，或许单纯只是一个水边的河港而已。


    ### 十二、阴阳山


    进入灵界山岳地带的第一座山，山势并不高。


    ### 十三、果子山


    顾名思义，这是一个满山遍野种满果树的山丘，有阳间常见的各种水果，也有些则是阳间从来没见过的水果，据曾经过此间、不同的当事人描述：有些人见到的是正好成熟的水果，有些则见到的光秃秃的枝芽，未见到果实，或者水果还半生不熟。


    ### 十四、福德山


    若是没有神佛引领而乍行进人灵界者，路经此山时，将会遇见“福德正神”（土地公），经祈求后，福德正神多会热心地领路前行，但凡凡是由福德正神引领前行的当事人多会因为福德正神的行路迟缓而感到不耐，尤其在翻山越岭时更是倍觉疲累。


    ### 十五、离歧岭


    这是进入灵界的途径中，最陡直难行一座山岭，承接前一座


    ### 十六、八角亭


    这也是一座山，因山腰上有一座八角的凉亭而得名，是步行进入灵界的中途休息站，也是进入灵界山岳地带最后一座山，由此再向前行，地势渐趋平缓，而终于来到平地。


    ### 十七、六角庄


    “六角庄”是丰都市的一个村镇，也是非常重要的一个地点，而其范围之大，完全超越了想像，因为此地有一望无际的大花园，一片广大无垠的树林和一大片栉比鳞次的里弄住宅；花园是女性进入灵界探看“本命花丛”的地方。


    树园是男性进入灵界探看“本命树丛”的地方。


    里弄住宅是男女探看“本命元神”及“流年生死簿”的地方。


    除此之外，“六角庄”范围以内的农家，是亡魂死后超过一年以上（俗称“对年”），由“亡魂山”迁移此处定居之所，但多半是生前生长于农村乡下或务农之人。


    ### 十八、丰都市


    “丰都”和“奈何桥”一样，在中国人的世界里同是赫赫有名，代表了阴间的幽冥地府，也是死亡的同义词，在甄师父这派的观灵法术中，“丰都”一直是以古老的风貌呈现，各种建筑及市容古色古香，好像维持在八十年前或甚至一百年前的古城，让人有时光倒流的感觉，而少见比较现代化的建筑及交通工具。'
