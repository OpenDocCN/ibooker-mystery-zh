  md: '没有尾巴和角一样。那么既然有“欲”又何必“禁”呢？


    想想看：禁了食欲，用不了几天，全世界的人就饿死光了，那又何必来转生人世？


    禁了性欲，百年之后，世上也没有人了。


    禁了物欲，人类必定还处在远古时代，连语言沟通都有问题，还谈什么追求真理？


    想想如果禁欲的主张在几千年前就被实现，现在还会有你我可以 在这里探索灵界、追求真理吗？


    所以根本就不需要“禁欲”，如果绝食就可以得道成佛，那些被活活饿死的非洲难民，尤其是一出生就饿死的婴儿岂不全成了佛？


    如果禁绝性行为就可得道成佛，自古以来从小“净身”人宫当太监的岂不人人成佛？


    其实绝食及禁绝性行为也不足以“禁欲”，绝食的人或被迫挨饿的人一样有“想吃东西”的欲望，被迫禁绝性行为的（如古代的太监或受宫刑）或自愿禁绝性行为的人一样有性的欲望，这根本不叫“禁欲”。


    但是，编者绝不主张“纵欲”，而是主张“节欲”，就是适可而止。


    “贪”的意思是指超过所需而不知厌足


    “淫”的意思也是过多，如“淫雨”指的是下得过多过久的雨。


    一般人满足于生活所需不叫“贪”，正常的性行为也不叫“淫”。


    所以，依照习惯一天吃三顿饭，吃到可以维持生命及身体健康那是绝对必需的。如果误解了“贪”字，而故意挨饿甚至造成营养不良，反而以为这是追求真理之道，那就是倒行逆施，大谬'
