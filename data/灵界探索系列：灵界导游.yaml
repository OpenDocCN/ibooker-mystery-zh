    # 第一章 寻找迷失的自我


    去。


    就着昏暗的灯光一看，那老道士在大殿上满地打滚，显得非常痛苦。


    司徒倩的前身俯身问那老道士，是否病了？要不要请个郎中来看看？


    那老道士痛苦地摇了摇头，说道：“用不着请郎中了，我今年一百二十岁了，要死了。”


    两人闻言，大吃一惊。


    两人想再问问他的身世时，老道士已经停止了呻吟，脚一蹬，登遐而去。


    两人见老道士已死，便为他念经，道士祝颂他早升仙界，和尚祝他早生净土。要是老道士之魂有知，真不知是往道士（司徒倩前身）指引的仙界去，抑或是往和尚（李娃前身）指引的西方佛国去好，说来令人可笑得紧。


    也许是老道士之魂被他们的念经声弄糊涂了，又走了回来，不知何去何从，那僵硬的尸体又动了一下。两人吓了一跳，便低声商量了一会，决定和尚（李娃的前身）不念经了，由道士（司徒倩的前身）念，于是尸体不再动弹了。


    因为不是同门，和尚在天亮后便告辞了道长和同来的道士朋友，一个人杖锡前去寻找佛寺挂单，一僧一道两位朋友从此分手，各自东西。


    司徒倩的前身即道士掏出自己的钱，买了一副棺木，请了几个仵作，将老道士埋在观后。为老道士办完后事，道士便在观中住下，诵读观中的秘藏《道藏》，用心修炼。


    元世祖忽必烈年间，朝廷听信僧人的状告，说《道藏》都是伪经，因而三次下令全国道观，除《道德经》外，其余道教经书一概焚烧，因而很多道教经书被付之一炬。因为宝鸡远离京师，山高皇帝远，一大套《道藏》得以秘密保存下来，只在同门中人'
  - '[PAGE 20]


    # 灵界导游


    偷偷诵读。司徒倩的前身得此机会，便潜心诵读起来，有如久旱逢甘霖一般。


    道教和佛教一门，修持的过程，也就是练功的过程，悟得的道有多高深，功力便也随之增长多少。因而，司徒倩的前身在悟道的同时，也增进了功力。


    到了第七日，司徒倩的前身正在入神地读着《道藏》，突然听得“咚”的一声巨响，她又吓了一跳，谛听一会，又是“咚”的一声巨响，她吓了一跳，谛听一会，又是“咚”的一声巨响，声音发自观后。司徒倩的前身向观后走去，搜寻着发出声音的地方。观后是那老道的墓，墓后是一片树林。又是“咚”的一声，还有咕噜咕噜的声音。这回，司徒倩听明白了，那声音正发自墓中。


    难道是老道士的鬼魂回来了？大天白日的，鬼魂不可能出现。难道是他返生复活了？


    司徒倩不管三七二十一，拿起一把铲，将墓上的土铲掉，下面就是棺木了，棺盖在震颤着。


    “老道长，老前辈，是你老人家返生了么？”司徒倩的前身向下面喊道。


    “嗯，哼，好闷……嗯。”棺中传出哼唧呻吟之声，“嗯哼，闷死俺也！”'', ''bbox_2d'': [78, 669, 808, 721]


    “嘭！”一声巨响，棺盖被震开了好几寸高，棺钉松动了。是棺中的老道士在用力蹬那棺盖。


    “嘭！”震天动地的一声巨响之后，棺盖飞上了半空，棺中的老道士疲惫地蜷缩在那里，用衣袖遮住阳光，因为多日未见阳光，怕阳光灼伤了眼睛。


    司徒倩的前身又惊又喜，惊的是老道士分明在七日前就已经死去，七日来没吃没喝，而今返生了，竟有如此神力，将牢牢钉死的棺盖踢飞开去，实在是不可思议。喜的是他老人家真的回返'
  - '[PAGE 21]


    生天了。


    司徒倩的前身连忙走下墓坑，俯身将老道士扶上来，回到观中大殿上，让他坐下，自己去舀了一碗粥，喂那老道士。老道士吃下一碗粥，脸上生动多了。


    观中的道长和道士们，见死了七日的游方老道士又返生了，尽皆吃惊，知道他是非常之人，又觉前番怠慢了他，这会儿都心怀愧疚之情，因而想补偿一下过去的简慢，但一齐上前，七手八脚将老道士扶到一处净室中躺下。


    老道士望了众人一眼，转身向里而睡。道长和众道士讪讪地走了出去，司徒倩的前身则陪坐在老道士身边，一步不离。


    一会，老道士悠悠醒来，对司徒倩的前身微微一笑，说道：“小道友，你是个好心人，会有好报的。”


    司徒倩的前身向都道长稽首为礼道：“老道长，你没事了，小子就安心了，管他好报歹报。”


    老道士颔首而笑。沉吟一会，老道士向司徒倩讲起了自己的身世：


    我是张三丰，辽阳积翠村人，原名张通，又名君实，有人称我君宝，其实是读错了。我六岁那年，双目失明，一位道士将我收入道观中，治好了我的眼疾。十四岁时，在少林寺与刘秉忠成为师兄弟，跟海云法师学佛法，刘秉忠后来当了元朝的宰相，他硬要我出来做官，于是我在十七岁时做了河北行省中山的县令，后来我辞官不做，回到辽阳积翠村，侍奉父母，娶妻生子。三十二岁时，抛妻子，带了十万两银子，遍寻明师，在恒山一住就是十六年。忽忽一个甲子过去，银子用个净光。自付学得的只是小法小术，离大道尚有好远好远。六十七岁那年，我西入陕西，在终南山遇见火龙祖师，他向我传授大道，命我再寻名山修炼。于是，我到了武当山，在山上一练就是二十三年，已炼成金刚不坏之身，然后我下江南，遍游金陵、苏、杭等地，在金陵想超度'
  - '[PAGE 22]


    # 吴界导游


    首富沈万三，那知沈万三仙缘未到，内丹未成，用了数百万两银子炼丹，仍是肉身凡胎一躯。可是，他倾家荡产之后，并未放弃修仙之念，家道复兴之后，又与妻、妾、儿女炼起金丹来，再假以时日，他就可以名登仙籍了。你我有缘，想不想跟老朽修仙？


    司徒倩的前身立时扑倒在地，向张三丰纳头便拜，请张仙师收自己为小徒，指点迷津。早就闻听得张三丰的大名了，也早就听得金陵首富沈万三，为了跟张三丰学仙，倾家荡产，九死其犹未悔的事，如今仙师就在自己眼前，司徒倩的前身如何不欣喜若狂，欣然景从？


    于是，两个道士，一老一少，成为师徒。


    几日之后，张三丰吟诗一首：


    元气茫茫返太清，

    又随朱雀下瑶京。

    剥床七日魂来复，

    天下齐看日月明。


    当时，司徒倩的前身，听了张三丰的诗，以为只是写他魂入太清之界，然后再下凡尘的经历，两年之后，才明白，张三丰在两年前就知道元朝气数将尽，朱元璋将要取代元朝，建立新的朝廷，并且预见到这个新朝廷的名字是“明朝”。诗的末句“天下齐看日月明”就暗示了这一层意思。未当皇帝前，朱元璋称为“吴王”，有谁会想到吴王两年后会成为明朝的开国皇帝呢？只有张三丰。可见，张三丰的预见在周颠仙、刘伯温之上，只是，他不往那方面发展而已。


    张三丰又向司徒倩的前身说了灵魂出窍的经历。


    却说当日张三丰一缕孤魂，飘飘荡荡，过枉死城，奈何桥之后，来到地府阎君面前。阎君往下一看，认得是张三丰，便道：'
  - '[PAGE 23]


    “张老道，你不归本王管辖，快快离开冥界。”张三丰向阎君一揖到地，笑道：“今日我死了，阎王爷不肯管俺，那俺到何处安身?”


    阎王爷道：“你属天上管辖，不属小王所辖，速速去罢!”阎王爷显得很不耐烦。


    张三丰之魂只得离开地府，上到阳间，早有一位慈眉善目的女仙接着，她在天上的仙阶是“西华帝君”，道号何一阳，人称何仙姑。当下，何仙姑对一百二十岁的张三丰喝道：“三丰小子，随我走罢。”何仙姑已经近千岁了，所以将张三丰视为黄口小儿。张三丰乖乖地随了何仙姑，腾云驾雾，来到太清天上，何仙姑安置一所琼楼玉宇让张三丰住下，都是仙酒仙果招待，又有玉女服侍着。也不知过了多久，何仙姑对张三丰道：“小子，你尘缘未了，再度下凡间为人罢。”何仙姑袍袖一拂，张三丰的魂魄便悠悠离了琼楼，下降到地上，回复到昔日的躯体之上……


    张三丰为司徒倩的前身取了个圆阳子的道号。


    “圆阳子，好好修炼罢，天上比凡尘美妙多了。”张三丰吩咐道。'
- md: "## 第二章\n\n  圆阳子（即司徒倩的前身）随张三丰学道的第二年，明朝建立，朱元璋当了皇帝。朱元璋闻得张三丰的大名，想将他请入宫中，传授长生不老之术。\n\
    \n  可是张三丰不贪恋富贵，带了圆阳子，到了武当山上，修炼道术。\n\n  张三丰严饬圆阳子，不可混迹官场。圆阳子满口答应，并且也无心在官场中混日子。\n\
    \n  圆阳子随张三丰在武当山修炼，刚巧，在宝鸡分手的佛家朋友（即李娃的前身）也到了武当山，两位朋友相见，很是高兴。在宝鸡时，这位佛家弟子也关心过张三丰，张三丰自然忘不了他，也将一套功法传授于他。那时武当山还未成为道教的中心，门户之见并不严。张三丰又是同时修习过佛、道两家之法的人物，因而师徒三人相处也甚融洽。\n\
    \n  光阴似箭，转眼间三十一年过去，朱元璋驾崩，传位于孙子朱允炆，史称建文帝。可是朱元璋之子燕王朱棣不服，起兵靖难。\n\n## 第二章 山在虚无缥缈间\n\
    \n  此时，张三丰到了云南，超度沈万三一家升仙，一僧一道两位弟子留在武当山，继续修炼。\n\n  一日，朱棣的军师僧人道衍，带了一批人马，来到武当山下的丹江口。不久，又有一队人马经过，为首的也是一个僧人，这个僧人相貌堂堂，不同凡俗。\n\
    \n> 道衍冷笑一声道：“建文帝，你就是烧成了灰我也认得你，你以为改装成僧人就能逃出我的手心么？”\n\n  那相貌堂堂的僧人原来竟是建文帝。燕王朱棣的大军攻打金陵时，建文帝的人马抵挡不住，纷纷被杀死，建文帝放了一把火，将皇宫烧了，趁乱化装成僧人，在随从们的簇拥下，逃出金陵，在路上逃了多日，竟来到武当山下。想不到，那僧人道衍竟算无遗策，早已以此设伏，安排金钩巨鳌。\n\
    \n  建文帝当下大吃一惊，慌忙往山上逃去。\n\n  张三丰的两个弟子，一僧一道，已冷眼旁观多时。他们觉得，朱棣已夺了皇位，还不知足，又追杀侄儿建文帝至此，欲斩尽杀绝方才甘心，两位师兄弟悠然而生恻隐之心，有心要救拔建文帝于苦厄之中。看着道衍的追兵已杀至，师兄弟俩大喝一声：“住手！”便一齐挥舞手中之剑，截住厮杀起来。\n\
    \n  师兄弟俩早已炼成绝顶武功，道衍手下兵将哪里是他俩对手？早就被杀得落花流水，丢下一大片尸体，活着的四散而逃。建文帝得到师兄弟俩的援手，当下大喜，也挥手回身与道衍之众相斗。\n\
    \n  师兄弟俩仗着武功高强，全无惧色，越斗越勇，杀人无数。他们还不肯罢手，又追杀道衍而去。\n\n  正追杀间，忽然听得天上有人大喝一声：“住手！”接着一位仙道飘飘而下，师兄弟俩一看，见是师父张三丰，连忙停下手来，与师父相见。\n\
    \n  道衍逃得性命，带领残兵败将，狼狈而去。\n\n  这边，张三丰指着两个弟子，跌足叹息：“你们闯了大祸了，犯了杀戒了，以前俺教你们的道法功法，都将付之东流了！”原来，张三丰已是仙身，两位弟子在武当山的一举一动，都逃不出他的眼睛，当他在云南那边见他们与道衍厮杀时，大吃一惊。因为他知道，朱棣人主金陵，乃是天意所属，朱棣史称明成祖。既然如此，就难以违抗天命，两位弟子犯了杀戒，今生今世就再也修不成仙身了，所以他懊丧不已。\n\
    \n  两位弟子此时听得师父如此说，皆大吃一惊，深感懊悔。\n\n  逃得性命的建文帝，此时向张三丰师徒连声道谢相救之恩，并请求张三丰饶恕两位弟子的过失，并表示愿意自己承担过失。\n\
    \n  张三丰连看都不看建文帝一眼，挥挥手道：“你走罢，这里没你的事。”\n\n  建文帝向张三丰跪拜这相救之恩，带领手下人马离开武当山，开始了流亡生涯。\n\
    \n  张三丰仍在叹息不已。虽然他在口中责备着两个弟子，心中却也开始原谅了两个弟子。心想：两个弟子也是出于悲天悯人之心，救助困围厄中的建文帝。别说两个弟子，当时若是在自己在山中，说不定也会出手相助的。不过，自己法力高深，不会伤人家性命，只将道衍他们吓走就算了。怪中怪自己未能及时赶回山中，制止一场杀戮。\n\
    \n  两位弟子将死亡的官军收殓，埋葬了，日夜为他们祈祷冥福，愿他们早日超生为人。\n\n  说也奇怪，自杀人之后，两位弟子昔日高深的武功全消失了，悟性也没有了，变成了寻常之人。\n\
    \n  想想师父多年的培育全白费了，两位弟子深感对不起师父。又思及今世今生，再也修不成正果了，难逃轮回之苦，反正迟早都是一死，不如早死早投生为人，再随师父修道炼功？于是，两个弟子在一天深夜，双双自尽了。\n\
    \n  张三丰知道他们寻短见，也是天数注定，伤感一回，他随了两位弟子的魂魄，下鬼门关，过奈何桥，入阎罗殿，代两弟子向阎王求情，请他老人家手下留情，将两弟子尽快转生。\n\
    \n  阎王看过生死簿，对张三丰叹息道：“张先生，不是我老阎不肯给你面子，实在是生死簿上已注明两人的劫运，该有一番劫难，我可不敢徇私情呀。”\n\n  张三丰想想也是实情，与两弟子相拥着，痛哭一场，然后张三丰擦干泪水回转阳间。\n\
    \n  张三丰仍不肯罢休，又到庭天之上，向西华帝君求情，请她代转天帝，饶恕两弟子嗜杀之罪。可是，西华帝君表示爱莫能助，劝他节哀顺变。\n\n  张三丰颓丧极了。\n\
    \n  李娃和司徒倩从几百年前回到了现在，眼睛还红红的。\n\n  “当时，阎王爷还算给张三丰祖师一点面子，没将我们打下十八层地狱，只是留在阎王殿中供他老人家差遣，因而并无甚吃苦。”司徒倩说道。\n\
    \n  李娃道：“我杀的人太多，所以转世比司徒医师迟。”\n\n  司徒倩又道：“那些被我们杀死的人，下到阴间，虽然原谅了我们，知道那也是天意，而我们却觉得害了他们，心中愧疚不已，便轮流着侍候他们。”\n\
    \n  “啊，我们又到了下一世的边缘了，吕医生，请再给我们催眠一下，让我们回到那一世去。”李娃道。\n\n  于是，我给她们再次催眠。\n\n  在一处繁华的市镇，有一座豪华的住宅，青砖绿瓦，花木扶疏，气概不凡，宅中住着两兄弟，他们一个十五岁，一个十三岁，自幼父母双亡，兄弟便相依为命。他们的父母是官宦，生前挣下了泼天富贵，却撒手人寰，让兄弟俩享受。\n\
    \n## 灵界导游\n\n  这两兄弟一个名方富，一个叫方贵，因为父母不在世了，没人管束他们，因而他们都无心读书，只是坐吃山空，游手好闲。可除这些之外，他们再无其他恶习，不嫖不赌，也对家中的婢女并不秽行。很多有女儿的人家都想与他俩攀亲，可是都被他们婉拒了。他们年纪也实在是还小，并不想这么早成亲。再说，一娶了亲，有了家小，兄弟俩就要分家产，他们不想这样。\n\
    \n  这方富、方贵兄弟俩，就是司徒倩、李娃的前身。阎王爷让他们投胎于富贵人家，算是对她们格外开恩了。\n\n  兄弟俩和和睦睦，守着偌大的家产过日子，不知惹来多少人羡慕的目光，当然也有不怀好意的目光暗中窥伺着他们，打着鬼主意。\n\
    \n  打主意的是兄弟俩的堂兄弟。\n\n  方家兄弟俩的堂兄弟却是前生的冤家对头，也就是当年被杀死在武当山上的几个官兵。真真是：不是冤家不聚头。他们想霸占方富、方贵的产业，但一直苦苦思虑，近日才找到一条“借刀杀人”的计策。\n\
    \n  方家附近的深山中，住着一班剽悍的土匪，他们杀人越货，连官府对他们也无可奈何。方富、方贵的堂兄弟们想起了这些土匪，于是走入深山中，向土匪们献计，将方富、方贵杀死，金银细软归山大王们，房屋和田地归他们。土匪们听罢，大喜，双方一拍即合，土匪们大碗酒、大块肉款待他们，约定一个月黑风高的夜晚“出草”，堂兄弟们为内应，又约好了接头地方，他们尽兴而归。\n\
    \n  这班土匪也是前世在武当山上被杀死的官兵，在这一世啸聚山林、风高放火，月黑杀人，尽干恶业，与方富方贵兄弟亦算是宿世仇人。\n\n  一场血光之灾正悄悄向方家兄弟俩逼近。\n\
    \n  出事的当日白天，镇中之人都进入了梦乡，土匪们下山了，在镇外一棵古树下与方富、方贵的堂兄弟们接上头，于是唿哨一声，众匪跟着内应，摸近方家大院。\n\n\
    \  方家大院毫无防备，土匪们轻易地进入院中，将家人都杀了，把熟睡中的方富、方贵兄弟俩从被窝中提了出来。\n\n  土匪头目见方家兄弟俩面相甚善，一时竟动了恻隐之心，不想杀死他们，而是抢入山中，做他们的军师。\n\
    \n  可是方家兄弟的堂兄弟们明白了，若是方富、方贵活下来，又是山中的人，日后对他们是一对祸害，因而不断地怂恿土匪们将兄弟俩杀掉。\n\n  方富方贵见堂兄弟们原来是土匪们的内应，比土匪们更可恶，于是骂道：“你们这班人面兽心的家伙，竟敢勾结歹人，杀我们兄弟，夺我们家产！”他们悔恨自己在日间不听老道士的话，不跟老道士走，真是遗恨千古了。\n\
    \n  堂兄弟们见方富、方贵死到临头，还敢骂自己，一时凶相毕露，将方富方贵杀死。\n\n  方富、方贵两缕冤魂，再次下到阴曹地府。\n\n  张三丰也再次下阴间，向阎王爷求情，让方家兄弟俩早日返生。\n\
    \n  可是他们孽业未尽，仍要留在阎王殿中听候差遣，不过这回侍候的是阎王爷。\n\n  却说方家大宅中，众土匪夺了金银细软，又将几个婢女押了，准备回山之后慢慢消受。\n\
    \n  方富方贵的堂兄弟们自恃有功，将土匪们送出镇外。\n\n  本来，众匪并不想对他们怎么样的，而是想遵守事前的诺言，将浮财抢上山，将房屋和田地留给他们，可是见他们擅作主张，亲自动手将方富、方贵杀死了，土匪们心中愤愤不平。\n\
    \n  到了镇外一处偏僻的地方，土匪头目站住了，面对内应们道：“今番出草获胜，全靠你等相助。我等上山之后，怕连累你等，我如今送你等去一个地方避避风头吧。”\n\
    \n  “大王要送我等等去什么地方？”众内应陪着笑脸，问道。\n\n  大王冷笑道：“送你们到阴曹地府，与方家两位公子一起。”\n\n  众内道：“大王是开玩笑么？”他们已吓得魂飞魄散，说话时声颤颤的。\n\
    \n  大王冷笑道：“我何时与人开过玩笑的？”\n\n  众内应跪下叩头，表示情愿不要田地房屋了，一发让给大王们，只愿大王饶他们不死。\n\n  可是大王们却不能将田地房屋拿上山去。\n\
    \n  内应中一个年纪较长的，知道大王已动了杀机，求他不杀反正拾不回自己一命，因而豁出去了，沉声道：“大王，做人总得有点良心吧？我们兄弟为你献计，今夜大王旗开得胜，不奖赏我们，反而要将我将杀掉，于天理人心上头，怕说不过去吧？”\n\
    \n  大王仰天大笑，说道：“良心？你们的良心在哪里？设谋害死自家堂兄弟，谋夺家产，这就是良心么？我等本已动了恻隐之心，要将两位公子接上山去，饶他们不死，可是你们竟亲自动手杀了他俩，这是良心么？”\n\
    \n  那年长的方家堂兄，被大王驳斥得哑口无言。他闭上眼睛，等待无常鬼前来拘魂。\n\n  大王一声令下，土匪们一齐动手，将内应们统统杀掉。\n\n  方家有一义仆，住在庄园中，因而侥幸不死。他见两位公子被贼人杀死，满腔义愤，作主将一半家产献给一位总兵，请总兵出师剿灭山中的草寇。\n\
    \n  得人钱财，替人消灾，总兵官带领手下一千人马，在深山中将草寇们一鼓荡平。得胜之后，将方家的另一半田地写在义仆的名下。\n\n  这真是一个惊心动魄的故事，李娃、司徒倩说到这里，仍心有余悸。文化亦心惊不已。\n\
    \n  我说：“这是一场连环报啊，作孽的人都没有好下场。”\n\n  李娃补充道：“总兵官白得了我们一半的遗产，令同僚眼红，同僚暗中向皇上参了一本，皇上龙颜大怒，命人将总兵官革职查办，讯问明白，那贪官也难逃一死。”\n\
    \n  “不宁惟是，”司徒倩插话道：“那总兵官虽然贪，但亦有些功劳，上天哀悯他的后代，结果他的后代都是累世簪缨。”\n\n  “只有那义仆平安无事，天上掉下来一大笔财富，令他家几代都受用无穷。”李娃道。\n\
    \n  果真是：“举头三尺有神明”，报应丝毫不爽。我思想道。\n\n## 第三章 轮回的法则\n\n  李娃和司徒倩与一队官兵之间的恩怨，几番轮回，几番仇杀的故事，令我想得很多很多。\n\
    \n  “轮回” 是什么？\n\n  “轮回” 的原意就是不停地来来去去。是指绝大多数未能觉悟的众生，因为自身的执迷以及造出的业因牵扯，不停地经历生死，又不停地投生在各类物种之间，或为动物，或为植物，或为人，或为畜，有时朝生而暮死，有时生存千百年而死，除非终于觉醒于物质生命的虚幻不实，掌握了生命的实相，否则就将一直不停地沉沦在来来去去的生命轮回过程中而不得出。\n\
    \n  在人类的文明史中，对“轮回”的观念阐述得最完整而自成体系的当然要属佛教，在佛教传入中国以后，带来了整套完整的“轮回转世”思想，与中国本土的道教渗溶之后又形成了中国人自有的轮回观，尤其在相传完成于相朝真宗时代的“玉历至宝钞”（现称“玉历宝钞劝世文”，淡凝道人撰）广泛流传之后，中国式的十殿阎王及十八层地狱、一百二十八层小地狱等观念已深植民间，近千年以来，深深影响了中国人的传统思想，“善有善报，恶有恶报，不是不报，时候未到”的说法也牢不可破地溶入中国人的生活之中，迄今也并无多大的改变。\n\
    \n  但是，这种传统的中国轮回观虽然对千年来的世道人心，因恐惧死后的酷刑惩处而对恶行及犯罪多少有吓阻之功，然而，越过民俗的层级往上探究时就会发现其中基本理念的谬误。\n\
    \n  许多人一听到轮回之说，立即就会联想到佛教，甚至误以为轮回之说是佛教的专属。\n\n  其实，佛教的轮回转世之说是承继了古印度教（婆罗门教）的轮回理论而来，从释迦牟尼降临，经历了历代高僧的阐释发扬才逐步成为定论。\n\
    \n  但是，早在释迦牟尼出生前的二千五百年前，印度教的主要经典“四部韦陀”（主要为赞美诗歌）、“婆罗门书”为供奉赞歌的礼仪或圣典形式）、“森林书”和“奥义书”（纪录了对知识、理解和理性的追求）以及“薄伽梵歌”（为韦陀经的精华，阐释了灵修的过程及终极目标）之中早已记述了完整的“轮回”理论。\n\
    \n  所以，“轮回”的架构或“轮回”的法则并非佛教或任何其他宗教所专属，如果轮回的法则是实存的，那么各种宗教（特别是早期的印度教）对于此的伟大而令人震惊，但仍然只是了现。就如同牛顿发现了“地心引力”，“地心引力”是自然界实存的定律，牛顿未发现之前，“地心引力”也是一直实存的，并非到了被牛顿发现之后才存在。\n\
    \n  也正因为印度教的教义是根源于“轮回转世”的观念，相信所有人今生的贫富贵贱全是缘自前世善恶的业因，所以形成了牢不可破的阶级差别（种姓制度），分为“婆罗门”（僧侣）、“刹帝利”（贵族与武士）、“吠舍”（一般平民）、“首陀罗”（贱民或奴隶）第四大阶级，不但互相不可跳越，没有升降，一切都是天生注定，任何人都不得改变，不同阶级之间不能通婚，甚至不能平起平坐或平等交往，这种制度数千年来一直没有太多改变，迄今依然如此。\n\
    \n  当然，这不只是对“轮回”或“业报”的曲解或矫枉过正，而有理曲相信这种牢不可破的种姓制度完全是“政教合一”的刻意结果，政治上的统治者（或政治权利既得集团）为了保有权力必然全力支持僧侣婆罗门这样的主张，而僧侣为了巩固自身阶级的地位及权力，自然也乐于坚持这样的理论基础与统治阶级联手。虽然因此使得阶级的人因“认命”而带来国家社会假象的安定，然而对生命的真义及“轮回”架构无疑是背道而驰的。\n\
    \n  到了释迦牟尼时，虽然接受印度教“轮回”之说，却坚决反对这种不合理，主张“众生平等”。\n\n  自从“玉历到宝钞”一书从宋朝以来在民间广为流传之后，中国式“善恶有报”的轮回观念深植人心，对世道人心容或有莫大的助益，标榜善有善报，死后可进入极乐世界或自在快活的神仙界又或者来世可投生富贵人家。消极地以恶有恶报吓阻恶行及犯罪，以免死后坠入阿鼻地狱永不得超生，或在地狱、饿鬼当道受苦，又或者来世投生为低贱的牲畜等等。\n\
    \n  但是，这样的观念在对“轮回”架构及对生命真义的追求上是莫大谬误也是极其不可取的。\n\n  在中国人传统“轮回转世”的观念中，认为冥冥中有一尊司掌善恶的大神，具象化地为“阎罗王”，在人死后，根据其生前行善作恶的轻重纪录分别给予奖励或严厉的惩罚，特别是十八层地狱及一百二十八处小地狱之中惨不忍睹的各式酷刑，如上刀山、下油锅、剥皮、挖心……彷佛“轮回”是极端严峻恐怖的，是完全不慈悲的。\n\
    \n  然而事实并非如此，综观十八层地狱及一百二十八处小地狱之中种种酷刑活脱脱的只是中国历代以来人世间各种杀戮方式及酷刑的翻版而已，可说毫无新意。如果地狱的酷刑仅止于此，那么以中国人的残忍民族性，从商朝的“炮烙”、“脯醢”（将人做成肉干或剁成肉酱）之刑以至后世历朝历代官定的各种残忍肉刑（伤害肉体为处罚的刑法）来说是狱根本就在人间。\n\
    \n  又或者，以在中国人隐隐约约地地狱观念中，阎罗王是位刚正不阿，擅断曲直却又嫉恶如仇之人，所以也才会有包公死后成为五殿阎君的传说，显然的仍不脱离把“轮回”视为一种奖善惩恶的法则。\n\
    \n  然而事实上“轮回”的真义绝非如此。\n\n  “轮回”只是一种生命现象的变化，不仅不是残酷或惨无人道的，相反地却是一种极其自然，极其慈悲的规律，在这个规律恒定如轨道般的运作中，所有众生（包括人类）依照他的意愿在死亡后前往他应处之地，这种意愿并非临时起意，而是在一生之中长期累积下来的超强意念。\n\
    \n  “轮回”的真义绝不是在奖励补偿好人与惩罚折磨坏人，以求得与阳世一生的平衡。当然更是为了补偿阳世“善无善报，恶无恶报”的不公平，而形成大快人心的末世大审判。\n\
    \n  “六道轮回”也绝不是一种处罚性的分发作业，什么杀牛的来世变牛被人杀、秦桧三世投胎变猪、为富不仁的人来世投胎变饿鬼等等那只是在民智未开的时代，未能对广大群众做形而上的阐释时，一种方便法门的教化，更是一种讲述自身没有透澈地了悟“轮回”真义，以讹传讹的结果。\n\
    \n  “轮回”的法则不是佛定的，不是神定的，不是阎罗王定的，更不是人定的，只是一种自然运行的现象，广大流行、普遍包罗，甚至不是外在的法则，而是所有众生与生俱来、内在的一种生命特质，就如同觅食与传宗接代的本能，是所有物种（众生）的天赋使命或能力、任何众生只要一旦为众生，或者说任何生命的本质一旦投射在六道的生命型态时就注定了“轮回”的命运，除非他能在有限的物质生命中了悟到生命的本质及轮回的真义而成为觉者（佛），超脱了生死轮回。否则就将不停地在各种生命的轮回中来来去去，不停地出生、不停地死亡，再不停地出生，而且将遍历各种生命的型态，如神仙、如人、如精灵、如畜牲、如饿鬼，甚至植物、矿物（矿物如各种石头也是生命型态之一）。\n\
    \n  “轮回”是自然的，非拟人化的，但若要以人的主观观点来看，轮回却是慈悲而善体人意的，它完全同意每个人的自由意愿，让他在下一世达成心愿，适得其所地投生在符合他意愿的生命型态之中。\n\
    \n  前面说过所谓的“自由意愿”绝非一时兴起的决定，而是一生意念及行为互为因果所形成的强烈意愿（业力）；因此一个生前成心险恶、专以损人利己为能事的人，终此一生乐此不疲，不改其志，虽然死前一心希望能在死后进入极乐世界或天堂，不论只是想法或实际要求家人为其延聘高僧法师大做超级法事，却依然不可得。依据永恒不变的轮回定律，他必然适得其所地去到符合他业力应往之处，或许投生为一只野生蛮荒世界的狐狸，在弱肉强食的世界中，擅用它的计谋生存下去；或者投生为一只蟑螂或蝎子，终生躲在暗处捕食（注：所以佛教将六道又称“六趣”，趣就是去处。）\n\
    \n  轮回的法则既然是慈悲的，不是为了奖善惩恶，那么为什么这样一个为恶之人不能去到极乐世界或天堂呢？这并不是轮回不肯，或阎罗王不肯，而是当事人自己愿意，以一只蟑螂来做比喻，它最感到安全舒适的环境就是阴暗、脏乱、充满食物碎屑（虽然只是腐臭的食物）的场所，如果硬要将一只蟑螂安置在光亮洁净的无尘室中，它一定痛苦万分甚至导致死亡。再打个比方：一位梦游患者，赤裸着身体站立在大庭广众之中，早上他突然清醒过来，由于别人的注目与惊叫，让他发觉自己竟然是赤身露体、一丝不挂的，这时必然羞愧得无地自容而急于藏到一处隐蔽"
  mdcn: "## 第二章\n\n  圆阳子（即司徒倩的前身）随张三丰学道的第二年，明朝建立，朱元璋当了皇帝。朱元璋闻得张三丰的大名，想将他请入宫中，传授长生不老之术。\n\
    \n  可是张三丰不贪恋富贵，带了圆阳子，到了武当山上，修炼道术。\n\n  张三丰严饬圆阳子，不可混迹官场。圆阳子满口答应，并且也无心在官场中混日子。\n\
    \n  圆阳子随张三丰在武当山修炼，刚巧，在宝鸡分手的佛家朋友（即李娃的前身）也到了武当山，两位朋友相见，很是高兴。在宝鸡时，这位佛家弟子也关心过张三丰，张三丰自然忘不了他，也将一套功法传授于他。那时武当山还未成为道教的中心，门户之见并不严。张三丰又是同时修习过佛、道两家之法的人物，因而师徒三人相处也甚融洽。\n\
    \n  光阴似箭，转眼间三十一年过去，朱元璋驾崩，传位于孙子朱允炆，史称建文帝。可是朱元璋之子燕王朱棣不服，起兵靖难。\n\n## 第二章 山在虚无缥缈间\n\
    \n  此时，张三丰到了云南，超度沈万三一家升仙，一僧一道两位弟子留在武当山，继续修炼。\n\n  一日，朱棣的军师僧人道衍，带了一批人马，来到武当山下的丹江口。不久，又有一队人马经过，为首的也是一个僧人，这个僧人相貌堂堂，不同凡俗。\n\
    \n> 道衍冷笑一声道：“建文帝，你就是烧成了灰我也认得你，你以为改装成僧人就能逃出我的手心么？”\n\n  那相貌堂堂的僧人原来竟是建文帝。燕王朱棣的大军攻打金陵时，建文帝的人马抵挡不住，纷纷被杀死，建文帝放了一把火，将皇宫烧了，趁乱化装成僧人，在随从们的簇拥下，逃出金陵，在路上逃了多日，竟来到武当山下。想不到，那僧人道衍竟算无遗策，早已以此设伏，安排金钩巨鳌。\n\
    \n  建文帝当下大吃一惊，慌忙往山上逃去。\n\n  张三丰的两个弟子，一僧一道，已冷眼旁观多时。他们觉得，朱棣已夺了皇位，还不知足，又追杀侄儿建文帝至此，欲斩尽杀绝方才甘心，两位师兄弟悠然而生恻隐之心，有心要救拔建文帝于苦厄之中。看着道衍的追兵已杀至，师兄弟俩大喝一声：“住手！”便一齐挥舞手中之剑，截住厮杀起来。\n\
    \n  师兄弟俩早已炼成绝顶武功，道衍手下兵将哪里是他俩对手？早就被杀得落花流水，丢下一大片尸体，活着的四散而逃。建文帝得到师兄弟俩的援手，当下大喜，也挥手回身与道衍之众相斗。\n\
    \n  师兄弟俩仗着武功高强，全无惧色，越斗越勇，杀人无数。他们还不肯罢手，又追杀道衍而去。\n\n  正追杀间，忽然听得天上有人大喝一声：“住手！”接着一位仙道飘飘而下，师兄弟俩一看，见是师父张三丰，连忙停下手来，与师父相见。\n\
    \n  道衍逃得性命，带领残兵败将，狼狈而去。\n\n  这边，张三丰指着两个弟子，跌足叹息：“你们闯了大祸了，犯了杀戒了，以前俺教你们的道法功法，都将付之东流了！”原来，张三丰已是仙身，两位弟子在武当山的一举一动，都逃不出他的眼睛，当他在云南那边见他们与道衍厮杀时，大吃一惊。因为他知道，朱棣人主金陵，乃是天意所属，朱棣史称明成祖。既然如此，就难以违抗天命，两位弟子犯了杀戒，今生今世就再也修不成仙身了，所以他懊丧不已。\n\
    \n  两位弟子此时听得师父如此说，皆大吃一惊，深感懊悔。\n\n  逃得性命的建文帝，此时向张三丰师徒连声道谢相救之恩，并请求张三丰饶恕两位弟子的过失，并表示愿意自己承担过失。\n\
    \n  张三丰连看都不看建文帝一眼，挥挥手道：“你走罢，这里没你的事。”\n\n  建文帝向张三丰跪拜这相救之恩，带领手下人马离开武当山，开始了流亡生涯。\n\
    \n  张三丰仍在叹息不已。虽然他在口中责备着两个弟子，心中却也开始原谅了两个弟子。心想：两个弟子也是出于悲天悯人之心，救助困围厄中的建文帝。别说两个弟子，当时若是在自己在山中，说不定也会出手相助的。不过，自己法力高深，不会伤人家性命，只将道衍他们吓走就算了。怪中怪自己未能及时赶回山中，制止一场杀戮。\n\
    \n  两位弟子将死亡的官军收殓，埋葬了，日夜为他们祈祷冥福，愿他们早日超生为人。\n\n  说也奇怪，自杀人之后，两位弟子昔日高深的武功全消失了，悟性也没有了，变成了寻常之人。\n\
    \n  想想师父多年的培育全白费了，两位弟子深感对不起师父。又思及今世今生，再也修不成正果了，难逃轮回之苦，反正迟早都是一死，不如早死早投生为人，再随师父修道炼功？于是，两个弟子在一天深夜，双双自尽了。\n\
    \n  张三丰知道他们寻短见，也是天数注定，伤感一回，他随了两位弟子的魂魄，下鬼门关，过奈何桥，入阎罗殿，代两弟子向阎王求情，请他老人家手下留情，将两弟子尽快转生。\n\
    \n  阎王看过生死簿，对张三丰叹息道：“张先生，不是我老阎不肯给你面子，实在是生死簿上已注明两人的劫运，该有一番劫难，我可不敢徇私情呀。”\n\n  张三丰想想也是实情，与两弟子相拥着，痛哭一场，然后张三丰擦干泪水回转阳间。\n\
    \n  张三丰仍不肯罢休，又到庭天之上，向西华帝君求情，请她代转天帝，饶恕两弟子嗜杀之罪。可是，西华帝君表示爱莫能助，劝他节哀顺变。\n\n  张三丰颓丧极了。\n\
    \n  李娃和司徒倩从几百年前回到了现在，眼睛还红红的。\n\n  “当时，阎王爷还算给张三丰祖师一点面子，没将我们打下十八层地狱，只是留在阎王殿中供他老人家差遣，因而并无甚吃苦。”司徒倩说道。\n\
    \n  李娃道：“我杀的人太多，所以转世比司徒医师迟。”\n\n  司徒倩又道：“那些被我们杀死的人，下到阴间，虽然原谅了我们，知道那也是天意，而我们却觉得害了他们，心中愧疚不已，便轮流着侍候他们。”\n\
    \n  “啊，我们又到了下一世的边缘了，吕医生，请再给我们催眠一下，让我们回到那一世去。”李娃道。\n\n  于是，我给她们再次催眠。\n\n  在一处繁华的市镇，有一座豪华的住宅，青砖绿瓦，花木扶疏，气概不凡，宅中住着两兄弟，他们一个十五岁，一个十三岁，自幼父母双亡，兄弟便相依为命。他们的父母是官宦，生前挣下了泼天富贵，却撒手人寰，让兄弟俩享受。\n\
    \n## 灵界导游\n\n  这两兄弟一个名方富，一个叫方贵，因为父母不在世了，没人管束他们，因而他们都无心读书，只是坐吃山空，游手好闲。可除这些之外，他们再无其他恶习，不嫖不赌，也对家中的婢女并不秽行。很多有女儿的人家都想与他俩攀亲，可是都被他们婉拒了。他们年纪也实在是还小，并不想这么早成亲。再说，一娶了亲，有了家小，兄弟俩就要分家产，他们不想这样。\n\
    \n  这方富、方贵兄弟俩，就是司徒倩、李娃的前身。阎王爷让他们投胎于富贵人家，算是对她们格外开恩了。\n\n  兄弟俩和和睦睦，守着偌大的家产过日子，不知惹来多少人羡慕的目光，当然也有不怀好意的目光暗中窥伺着他们，打着鬼主意。\n\
    \n  打主意的是兄弟俩的堂兄弟。\n\n  方家兄弟俩的堂兄弟却是前生的冤家对头，也就是当年被杀死在武当山上的几个官兵。真真是：不是冤家不聚头。他们想霸占方富、方贵的产业，但一直苦苦思虑，近日才找到一条“借刀杀人”的计策。\n\
    \n  方家附近的深山中，住着一班剽悍的土匪，他们杀人越货，连官府对他们也无可奈何。方富、方贵的堂兄弟们想起了这些土匪，于是走入深山中，向土匪们献计，将方富、方贵杀死，金银细软归山大王们，房屋和田地归他们。土匪们听罢，大喜，双方一拍即合，土匪们大碗酒、大块肉款待他们，约定一个月黑风高的夜晚“出草”，堂兄弟们为内应，又约好了接头地方，他们尽兴而归。\n\
    \n  这班土匪也是前世在武当山上被杀死的官兵，在这一世啸聚山林、风高放火，月黑杀人，尽干恶业，与方富方贵兄弟亦算是宿世仇人。\n\n  一场血光之灾正悄悄向方家兄弟俩逼近。\n\
    \n  出事的当日白天，镇中之人都进入了梦乡，土匪们下山了，在镇外一棵古树下与方富、方贵的堂兄弟们接上头，于是唿哨一声，众匪跟着内应，摸近方家大院。\n\n\
    \  方家大院毫无防备，土匪们轻易地进入院中，将家人都杀了，把熟睡中的方富、方贵兄弟俩从被窝中提了出来。\n\n  土匪头目见方家兄弟俩面相甚善，一时竟动了恻隐之心，不想杀死他们，而是抢入山中，做他们的军师。\n\
    \n  可是方家兄弟的堂兄弟们明白了，若是方富、方贵活下来，又是山中的人，日后对他们是一对祸害，因而不断地怂恿土匪们将兄弟俩杀掉。\n\n  方富方贵见堂兄弟们原来是土匪们的内应，比土匪们更可恶，于是骂道：“你们这班人面兽心的家伙，竟敢勾结歹人，杀我们兄弟，夺我们家产！”他们悔恨自己在日间不听老道士的话，不跟老道士走，真是遗恨千古了。\n\
    \n  堂兄弟们见方富、方贵死到临头，还敢骂自己，一时凶相毕露，将方富方贵杀死。\n\n  方富、方贵两缕冤魂，再次下到阴曹地府。\n\n  张三丰也再次下阴间，向阎王爷求情，让方家兄弟俩早日返生。\n\
    \n  可是他们孽业未尽，仍要留在阎王殿中听候差遣，不过这回侍候的是阎王爷。\n\n  却说方家大宅中，众土匪夺了金银细软，又将几个婢女押了，准备回山之后慢慢消受。\n\
    \n  方富方贵的堂兄弟们自恃有功，将土匪们送出镇外。\n\n  本来，众匪并不想对他们怎么样的，而是想遵守事前的诺言，将浮财抢上山，将房屋和田地留给他们，可是见他们擅作主张，亲自动手将方富、方贵杀死了，土匪们心中愤愤不平。\n\
    \n  到了镇外一处偏僻的地方，土匪头目站住了，面对内应们道：“今番出草获胜，全靠你等相助。我等上山之后，怕连累你等，我如今送你等去一个地方避避风头吧。”\n\
    \n  “大王要送我等等去什么地方？”众内应陪着笑脸，问道。\n\n  大王冷笑道：“送你们到阴曹地府，与方家两位公子一起。”\n\n  众内道：“大王是开玩笑么？”他们已吓得魂飞魄散，说话时声颤颤的。\n\
    \n  大王冷笑道：“我何时与人开过玩笑的？”\n\n  众内应跪下叩头，表示情愿不要田地房屋了，一发让给大王们，只愿大王饶他们不死。\n\n  可是大王们却不能将田地房屋拿上山去。\n\
    \n  内应中一个年纪较长的，知道大王已动了杀机，求他不杀反正拾不回自己一命，因而豁出去了，沉声道：“大王，做人总得有点良心吧？我们兄弟为你献计，今夜大王旗开得胜，不奖赏我们，反而要将我将杀掉，于天理人心上头，怕说不过去吧？”\n\
    \n  大王仰天大笑，说道：“良心？你们的良心在哪里？设谋害死自家堂兄弟，谋夺家产，这就是良心么？我等本已动了恻隐之心，要将两位公子接上山去，饶他们不死，可是你们竟亲自动手杀了他俩，这是良心么？”\n\
    \n  那年长的方家堂兄，被大王驳斥得哑口无言。他闭上眼睛，等待无常鬼前来拘魂。\n\n  大王一声令下，土匪们一齐动手，将内应们统统杀掉。\n\n  方家有一义仆，住在庄园中，因而侥幸不死。他见两位公子被贼人杀死，满腔义愤，作主将一半家产献给一位总兵，请总兵出师剿灭山中的草寇。\n\
    \n  得人钱财，替人消灾，总兵官带领手下一千人马，在深山中将草寇们一鼓荡平。得胜之后，将方家的另一半田地写在义仆的名下。\n\n  这真是一个惊心动魄的故事，李娃、司徒倩说到这里，仍心有余悸。文化亦心惊不已。\n\
    \n  我说：“这是一场连环报啊，作孽的人都没有好下场。”\n\n  李娃补充道：“总兵官白得了我们一半的遗产，令同僚眼红，同僚暗中向皇上参了一本，皇上龙颜大怒，命人将总兵官革职查办，讯问明白，那贪官也难逃一死。”\n\
    \n  “不宁惟是，”司徒倩插话道：“那总兵官虽然贪，但亦有些功劳，上天哀悯他的后代，结果他的后代都是累世簪缨。”\n\n  “只有那义仆平安无事，天上掉下来一大笔财富，令他家几代都受用无穷。”李娃道。\n\
    \n  果真是：“举头三尺有神明”，报应丝毫不爽。我思想道。\n\n## 第三章 轮回的法则\n\n  李娃和司徒倩与一队官兵之间的恩怨，几番轮回，几番仇杀的故事，令我想得很多很多。\n\
    \n  “轮回” 是什么？\n\n  “轮回” 的原意就是不停地来来去去。是指绝大多数未能觉悟的众生，因为自身的执迷以及造出的业因牵扯，不停地经历生死，又不停地投生在各类物种之间，或为动物，或为植物，或为人，或为畜，有时朝生而暮死，有时生存千百年而死，除非终于觉醒于物质生命的虚幻不实，掌握了生命的实相，否则就将一直不停地沉沦在来来去去的生命轮回过程中而不得出。\n\
    \n  在人类的文明史中，对“轮回”的观念阐述得最完整而自成体系的当然要属佛教，在佛教传入中国以后，带来了整套完整的“轮回转世”思想，与中国本土的道教渗溶之后又形成了中国人自有的轮回观，尤其在相传完成于相朝真宗时代的“玉历至宝钞”（现称“玉历宝钞劝世文”，淡凝道人撰）广泛流传之后，中国式的十殿阎王及十八层地狱、一百二十八层小地狱等观念已深植民间，近千年以来，深深影响了中国人的传统思想，“善有善报，恶有恶报，不是不报，时候未到”的说法也牢不可破地溶入中国人的生活之中，迄今也并无多大的改变。\n\
    \n  但是，这种传统的中国轮回观虽然对千年来的世道人心，因恐惧死后的酷刑惩处而对恶行及犯罪多少有吓阻之功，然而，越过民俗的层级往上探究时就会发现其中基本理念的谬误。\n\
    \n  许多人一听到轮回之说，立即就会联想到佛教，甚至误以为轮回之说是佛教的专属。\n\n  其实，佛教的轮回转世之说是承继了古印度教（婆罗门教）的轮回理论而来，从释迦牟尼降临，经历了历代高僧的阐释发扬才逐步成为定论。\n\
    \n  但是，早在释迦牟尼出生前的二千五百年前，印度教的主要经典“四部韦陀”（主要为赞美诗歌）、“婆罗门书”为供奉赞歌的礼仪或圣典形式）、“森林书”和“奥义书”（纪录了对知识、理解和理性的追求）以及“薄伽梵歌”（为韦陀经的精华，阐释了灵修的过程及终极目标）之中早已记述了完整的“轮回”理论。\n\
    \n  所以，“轮回”的架构或“轮回”的法则并非佛教或任何其他宗教所专属，如果轮回的法则是实存的，那么各种宗教（特别是早期的印度教）对于此的伟大而令人震惊，但仍然只是了现。就如同牛顿发现了“地心引力”，“地心引力”是自然界实存的定律，牛顿未发现之前，“地心引力”也是一直实存的，并非到了被牛顿发现之后才存在。\n\
    \n  也正因为印度教的教义是根源于“轮回转世”的观念，相信所有人今生的贫富贵贱全是缘自前世善恶的业因，所以形成了牢不可破的阶级差别（种姓制度），分为“婆罗门”（僧侣）、“刹帝利”（贵族与武士）、“吠舍”（一般平民）、“首陀罗”（贱民或奴隶）第四大阶级，不但互相不可跳越，没有升降，一切都是天生注定，任何人都不得改变，不同阶级之间不能通婚，甚至不能平起平坐或平等交往，这种制度数千年来一直没有太多改变，迄今依然如此。\n\
    \n  当然，这不只是对“轮回”或“业报”的曲解或矫枉过正，而有理曲相信这种牢不可破的种姓制度完全是“政教合一”的刻意结果，政治上的统治者（或政治权利既得集团）为了保有权力必然全力支持僧侣婆罗门这样的主张，而僧侣为了巩固自身阶级的地位及权力，自然也乐于坚持这样的理论基础与统治阶级联手。虽然因此使得阶级的人因“认命”而带来国家社会假象的安定，然而对生命的真义及“轮回”架构无疑是背道而驰的。\n\
    \n  到了释迦牟尼时，虽然接受印度教“轮回”之说，却坚决反对这种不合理，主张“众生平等”。\n\n  自从“玉历到宝钞”一书从宋朝以来在民间广为流传之后，中国式“善恶有报”的轮回观念深植人心，对世道人心容或有莫大的助益，标榜善有善报，死后可进入极乐世界或自在快活的神仙界又或者来世可投生富贵人家。消极地以恶有恶报吓阻恶行及犯罪，以免死后坠入阿鼻地狱永不得超生，或在地狱、饿鬼当道受苦，又或者来世投生为低贱的牲畜等等。\n\
    \n  但是，这样的观念在对“轮回”架构及对生命真义的追求上是莫大谬误也是极其不可取的。\n\n  在中国人传统“轮回转世”的观念中，认为冥冥中有一尊司掌善恶的大神，具象化地为“阎罗王”，在人死后，根据其生前行善作恶的轻重纪录分别给予奖励或严厉的惩罚，特别是十八层地狱及一百二十八处小地狱之中惨不忍睹的各式酷刑，如上刀山、下油锅、剥皮、挖心……彷佛“轮回”是极端严峻恐怖的，是完全不慈悲的。\n\
    \n  然而事实并非如此，综观十八层地狱及一百二十八处小地狱之中种种酷刑活脱脱的只是中国历代以来人世间各种杀戮方式及酷刑的翻版而已，可说毫无新意。如果地狱的酷刑仅止于此，那么以中国人的残忍民族性，从商朝的“炮烙”、“脯醢”（将人做成肉干或剁成肉酱）之刑以至后世历朝历代官定的各种残忍肉刑（伤害肉体为处罚的刑法）来说是狱根本就在人间。\n\
    \n  又或者，以在中国人隐隐约约地地狱观念中，阎罗王是位刚正不阿，擅断曲直却又嫉恶如仇之人，所以也才会有包公死后成为五殿阎君的传说，显然的仍不脱离把“轮回”视为一种奖善惩恶的法则。\n\
    \n  然而事实上“轮回”的真义绝非如此。\n\n  “轮回”只是一种生命现象的变化，不仅不是残酷或惨无人道的，相反地却是一种极其自然，极其慈悲的规律，在这个规律恒定如轨道般的运作中，所有众生（包括人类）依照他的意愿在死亡后前往他应处之地，这种意愿并非临时起意，而是在一生之中长期累积下来的超强意念。\n\
    \n  “轮回”的真义绝不是在奖励补偿好人与惩罚折磨坏人，以求得与阳世一生的平衡。当然更是为了补偿阳世“善无善报，恶无恶报”的不公平，而形成大快人心的末世大审判。\n\
    \n  “六道轮回”也绝不是一种处罚性的分发作业，什么杀牛的来世变牛被人杀、秦桧三世投胎变猪、为富不仁的人来世投胎变饿鬼等等那只是在民智未开的时代，未能对广大群众做形而上的阐释时，一种方便法门的教化，更是一种讲述自身没有透澈地了悟“轮回”真义，以讹传讹的结果。\n\
    \n  “轮回”的法则不是佛定的，不是神定的，不是阎罗王定的，更不是人定的，只是一种自然运行的现象，广大流行、普遍包罗，甚至不是外在的法则，而是所有众生与生俱来、内在的一种生命特质，就如同觅食与传宗接代的本能，是所有物种（众生）的天赋使命或能力、任何众生只要一旦为众生，或者说任何生命的本质一旦投射在六道的生命型态时就注定了“轮回”的命运，除非他能在有限的物质生命中了悟到生命的本质及轮回的真义而成为觉者（佛），超脱了生死轮回。否则就将不停地在各种生命的轮回中来来去去，不停地出生、不停地死亡，再不停地出生，而且将遍历各种生命的型态，如神仙、如人、如精灵、如畜牲、如饿鬼，甚至植物、矿物（矿物如各种石头也是生命型态之一）。\n\
    \n  “轮回”是自然的，非拟人化的，但若要以人的主观观点来看，轮回却是慈悲而善体人意的，它完全同意每个人的自由意愿，让他在下一世达成心愿，适得其所地投生在符合他意愿的生命型态之中。\n\
    \n  前面说过所谓的“自由意愿”绝非一时兴起的决定，而是一生意念及行为互为因果所形成的强烈意愿（业力）；因此一个生前成心险恶、专以损人利己为能事的人，终此一生乐此不疲，不改其志，虽然死前一心希望能在死后进入极乐世界或天堂，不论只是想法或实际要求家人为其延聘高僧法师大做超级法事，却依然不可得。依据永恒不变的轮回定律，他必然适得其所地去到符合他业力应往之处，或许投生为一只野生蛮荒世界的狐狸，在弱肉强食的世界中，擅用它的计谋生存下去；或者投生为一只蟑螂或蝎子，终生躲在暗处捕食（注：所以佛教将六道又称“六趣”，趣就是去处。）\n\
    \n  轮回的法则既然是慈悲的，不是为了奖善惩恶，那么为什么这样一个为恶之人不能去到极乐世界或天堂呢？这并不是轮回不肯，或阎罗王不肯，而是当事人自己愿意，以一只蟑螂来做比喻，它最感到安全舒适的环境就是阴暗、脏乱、充满食物碎屑（虽然只是腐臭的食物）的场所，如果硬要将一只蟑螂安置在光亮洁净的无尘室中，它一定痛苦万分甚至导致死亡。再打个比方：一位梦游患者，赤裸着身体站立在大庭广众之中，早上他突然清醒过来，由于别人的注目与惊叫，让他发觉自己竟然是赤身露体、一丝不挂的，这时必然羞愧得无地自容而急于藏到一处隐蔽"
