    有，因而引发自杀，同样也死了十几个人，那么哪一个的恶行较严重呢？


    那些开赌场的，搞地下钱庄的，制造或贩卖海洛因、古柯的，他们又何需亲手去杀人？至于那些权力欲薰心的独裁者或一些邪教根本不必亲自动手也可杀害千万人。


    一个人一旦为自己贪、嗔、痴的执迷不悟，为了满足自己极端利己的欲与杀戮时，不论生前是否被判刑，死后必然会被因果；被自己一手投射出去的“心灵垃圾堆积场”（地狱）所吸引。


    根据“贝尔定律”：将一个物体分成两个部份，即使其中一部份移到宇宙另一端，互相仍有着关连性，我们如果对其中一部份施以任何行动或力量，另一部分也会立即发生反应。


