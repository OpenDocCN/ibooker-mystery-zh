    看树丛或是元辰宫。要讲清楚。”


    丁女士再度合掌，口中念动着。四周的同学，都瞪大了眼睛看着，有的还相视而笑。


    “一柱明香透天庭，二柱明香请神明……”甄师父念起带往树丛、元辰宫的咒语，没多久。


    丁：“看一个房间。”


    甄：“我看门口有没有挂着你的名字的名牌?”


    丁：“我看到的名字了。”


    甄：“好，菩萨先带你来元辰宫，我们就进去看看里面有什么缺失，请菩萨帮忙。”


    丁：“好。”


    丁女士说，她一进门，就看到一个供桌，上面有两盏灯，桌上还有一本书。


    甄：“你看看那两盏灯；火焰够大吗？整个房间亮度够吗?”


    丁：“不够亮。火焰也小小的。”


    甄：“再看看供桌上有没有灰尘?”


    丁：“有一点。”


    甄：“你用双手摇摇那张桌，会不会晃动?”


    这时，丁女士双手举了起来，掌心向上，好像扶住什么东西一样。


    丁：“很稳，不会晃动。”


    甄：“很好，现在你等一下，我请人来帮你整理。”


    甄师父手持木鱼，有力地敲着，念着咒语夹杂丁同学的生辰资料，催请宫公宫婆、童男童女前来帮忙……


    念毕，甄师父问：“有没有人来?”


    丁：“没有，但是有一枝扫把自动在扫地。”


    甄：“哦！那我再请一次，你等一下。”


    咒语再起，木鱼伴奏着……


    # 第五章 少妇闯灵界


    甄：“有没有人来?”


    丁：“还是没有，可是层顶上现在有一天窗。一道光束射下来，房间变得很亮很亮，而且光束还射在我身。”


    甄：“好，感谢菩萨慈悲加持，让你元辰宫变得光亮，对你的功名，事业一定会助益良多。”


    甄：“现在你看看房间两旁有没有走道，往后面走，我们去厨房，看你的柴火、米够不够?”


    > (注:柴、米就是一生的食禄。)


    丁：“好。”


    一阵咒语念后，甄问道：“有否来到厨房?”


    丁：“没有，还在厅内，可是看到漩涡。”


    甄：“喔!不知那尊神明降临，你向他拜拜。”


    甄师父紧接着念起“毫光咒”……念到一半……


    丁：“喔!是妈祖娘娘啦!”


    语气非常兴奋，旁边的同学也一阵骚动。


    甄：“很好，难得的机缘，今天妈祖能慈祥降临，希望能对你的元辰宫内的缺点，加持祝彩，使各方面能改善，你内心有何希望也可求她。”


    丁：“好。”


    甄：“能不能形容一下妈祖的法像?”


    丁：“她头戴帽子，帽沿有一条条的珠串。她是坐着，很慈祥地笑着。”


    甄：“身穿什么样的衣服?”


    丁：“衣服都是金色的。她手上有一本书，要拿给我看。”


    同学们又是一阵骚动，大大都露出好奇的眼光。心里想：是否就是所谓的生死簿?


    甄：“你就双手把它接来，仔细地看。”


    丁：“我翻开了书看到我的名字。还有;我的生辰八字”


    甄:“那是怎样的字体?”


    丁:“非常工整的毛笔字。”


    甄:“这也可证明这间是你的元辰宫没弄错。再往下看,注意几岁,几岁有什么喜事或灾难?”


    丁:再往后看,有字但是看不清楚呢!”“


    甄:“那大概是往后都很平安,没什么事啦。现在你请妈娘娘娘能带往厨房,为你加点柴米。”


    丁:“妈祖已转身向里面走了。”


    甄:“好。”接着念着前进咒语。


    丁:“妈祖娘娘有多高?”


    甄:“跟我们差不多高。”


    甄师父在咒语中,问了丁女士。


    一阵咒语之后……


    甄:“有没有来到厨房?”


    丁:“有。”


    甄:“你看看厨房内柴火堆积的多不多?还有米缸内的米有多少?自己看看讲出来。”


    丁:“好。……柴米差不多是八分满,要烧的柴一捆一捆的往上叠不到一人高。”


    甄:“想不想加一点?”


    丁:“嗯——”丁女士,还在迟疑,旁观的人却你一句一句的说了:“加啦!加啦!机会难得啦。”


    甄:“好,我帮你加加看。”


    “太上说法时,金钟响玉音……”咒语像玑珠落盘,倾泻而下,甄师父念着。


    丁:“米缸的米慢慢地加起了,好像卡通影片一样,自动加多了,满了。我又看到一枝扫把,自动在扫地。”


    同学们听了，都笑起来，觉得好有趣哟!


    甄：“你再看看堆积的火柴，有增加否?”


    丁：“没有！跟刚才一样。”


    甄：“好，那我们不要强求，我们再转回客厅来。”


    丁：“好。”


    前进咒语过后。


