    # ## 第十七章 人生八苦与诸界奇观


    除了“神通”，许多读者大概也听过“鬼有鬼通”的说法。


    既然“鬼有鬼通”，那么只要像天神一样：一旦有什么需要，只要心念所及，那些东西就立即会出现在眼前，不管是金银财宝、不管是锦衣玉食，不管是亭台楼阁，不管是音乐歌舞全都是想要就有，那么为什么经常又有很多的鬼会藉着托梦，或附身头形来向阳世的亲友索讨香礼财帛等等的祭礼呢？


    其实中阴身（就是人死后仍然存在知觉生命，不论你称他为鬼或灵魂）所处的中阴界（狭义的灵界，就是笔者所说的“轮迴过境室”）也是有等级层次的。


    如果要想把所有中阴界的层级细细划分，一一列举出来，那真是难以胜数，而且只会徒增困惑而已，所以为了叙述的方便，笔者依据个人的研究与认知，只做了以下概略的划分，并由高层往低层一一说明如下：


    # ## 一、天界先修班


    这一层级的灵，全是生前有过大善行，或一生之中善心多过恶心，善行多过恶行者，虽然未能大彻大悟地跳出三界之外，但也具有转生“欲界六天”去享受长短不一的福报之资格。然而，因为其生前对灵界及死后生命种种缺乏正确认知或完全不了解（是否信教或信何种宗教没有关系），又或者所信之宗教对灵界的认知有所谬误，因此使他在死后进入灵界时会发生严重的迷惑与不适应，因而必须先在“天界先修班”接受长短不一的“人境前训练”。这是一种善意，自由而且绝对必要的训练，通常由已入天界的亲朋好友或高层级灵界导师来指导他，帮助他适应天界的环境及天界的一些规范。这种先修班的班级人数不一，可以大到数万人，也可以一对一，也有时好几位高层级的灵同时来指导一'
