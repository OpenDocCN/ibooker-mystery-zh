  md: '# 第二十章


    # 人身难得须珍惜


    人之生而为人是极其幸运的，也是需要莫大勇气的。


    因为要想大彻大悟地发现生命的真义与宇宙的实相而成为觉者（佛），人间的修持是绝对必要的，也是唯一的途径，如果不历经人世的沧桑与磨难，要想跳出三界、立地成佛，那犹如水中捞月，缘木求鱼。更像是抱着钻石的原矿，希望它不经琢磨就能自然璀璨发光一样的荒谬。


    人在投胎转世到这个五光十色，苦乐参半的阳世间之间，全都明白此生的目的及需要重修的科目，然而绝大多数人来到人世之后，却纷纷迷失在人欲的洪流之中，轻忽了真如灵性，而由着生物性的本能牵着鼻子跑，一生为名利权色奔波劳碌，甚至连停下来喘口气，回头想想自己到底“所为何哉？的机会都没有。就此昏昏噩噩，匆匆忙忙过完一生，然后依旧是两手空空，脑袋空空地回去，于是乎下一世又再重新来过，重新接受生、老、病、'
