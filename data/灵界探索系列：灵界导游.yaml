    ## 第十三章

    ## 灵界采访记


    “摄影机不要拍我!”

    “把摄影机放远一点，你要拍的话，从远距离拍过来好了，靠得太近，灯光会影响我!”


    这是境外名摄影记者蓝光在接受“观灵术”施法；很快地进入灵界之后，在完全清醒与自主的情况下，向与他一同搭档前来采访的同事所说的，虽然当时他的眼睛紧紧地被毛巾蒙住，可是他仍然可以听到摄影机在近距离拍摄时的“沙沙”声，同时也感到聚光灯打在身上的灼热感，而此刻他已在“灵界”见到了一些模糊的景象，为了避免骚扰，他主动地要求自己的同事把摄影机和灯光移远一些。


    为了实际了解“观灵术”的玄异境界，两位男士自告奋勇地接受了施法，结果蓝先生很快地就进入了灵界，而助理摄影是自行决定中断，而赶紧架起所有摄影设备进行实况的摄录，以下就是这段精彩实况的纪录：


    “光一直在闪动，非常的亮，并且在往前移动，我一直跟着光往前走，可是一直保持了相当的距离。”


    “那么你现在在哪里?”


    “好象在一大片云层的上面，光也在云的上面!”


    “那么，你可以看见云层下面有什么吗?”


    他低下头，似乎很认真地看了一会儿，就道：“好像有山，嗯！我看到有一座山峰!”


    “山上有什么?”


    没有！什么都没有!”


    很快地，就看不到那座山，而完全被云雾所笼罩起来，四周白茫茫一片，除了先前的光以外，什么也看不见……


    继续接受施法约半分钟之后，他突然开口说：“我见到了一条路，而先前的光就在这条路上。


    奇妙的是，他的身体仍然飘浮在云端，百路却是在他的下面，很白很亮，一直通向很远很远的地方，几乎看不到的尽头。


    但可异的是，很快地暗了下来，什么都看不见了，只好暂时告一段落，蓝先生取下毛巾之后，其他二位同事立即持着略带怀疑的态度来询问他，他却很明确地表示他见到了很强很亮的光，在光的中间还隐约见到一个模糊的人影，印象最深的就是见到飘动的宽松衣袂，同事仍然不肯相信地问他：可不可能是摄影时聚光灯的影响？蓝先生却肯定回答说：“不是！并强调说：我自己是摄影师，那绝不是聚光灯的效果，而且你们把灯移开之后也闭了很久，我见到的光并没有移动，而且一直亮着，可以说非常刺眼，同时我看到的山也非常清楚。


    对于这一段蓝先生一直努力地在回想与判断，希望了解究竟只是个人的幻觉抑或是真实的，最后他表示：“不太像“幻觉”，而且他一直是清醒的。


    随即，他又接受了再一次的施法；这次同样是很快地就有了景象接触，而进入了“灵界”，他见到了一座很大的山峰，他正顺着弯曲的山间小道往前走，走了一会儿，他就看到了一大堆人在路旁或坐或站的，男女老幼都有，一排一排的，也不知道他们在路旁等待着什么？


    他好奇地看了看，就继续顺着逐渐平缓的山路往前走，感觉起来路很远，走了一会儿，他就看到了路的尽头之处好像有一些民房，大部份是红瓦搭造的屋顶，可是由于太远，看不太清楚，也没再看到人，只感觉左边的山比较高，右边的山坡较平缓，而那些屋宇就在山坡下面，远处有一些稻田。


    他很快地穿过这些民宅，却没有看到人影，也没有什么特殊的接触。接着他爬上了一座非常陡峭的山峰，只感觉有个体型胖胖的人莞尔一笑就擦身而过，但是两人的速度都很快，快得来不及开口招呼。


    在山顶上，他又看到蓝蓝的大海和沙滩，在穿过一片杂乱的树林之后，他突然发觉自己居然“无翼而飞”，在空中快速地飞翔起来，十分逍遥自在，而且立即看到前方不远处出现了一个很大的城市，屋子栉比鳞次，非常的热闹繁华，他随心所欲地从空中降到地上的一处住宅门口，却没有见到什么人，而那些屋子全是一排排地，不像是市中心，而比较像都市近效的景色。


    他离开郊区，信步想往较热闹的市区走去，却反而越走越觉得四周的房屋更加破烂，好像是贫民区一样……


    走了好一会，他终于来到了一处像茶楼般的地方，竟然发现有一位瘦瘦的老先生，正悠闲地在里面喝茶，却完全无视于他这位来自不同时空的不速之客，他连问了几声也不见回答，他有些窘急起来，为了赶紧找到“丰都大帝”庙宇，只好鼓起勇气开口问了声，那老先生却显然懒得开口，只是伸手指了指方向……


    谢过这位老先生之后，他继续顺阒指引的方向前行，果然很快地就找到了这座大庙，在“丰都大帝”庙门口，他停下脚步，仰望了一会才十分赞叹的形容道:这座庙很大、很高,也很气派,装设得很漂亮,庙顶尖尖翘了上去……


    跨进庙门之后,对着高坐堂上的“丰都大帝”,他报上自己姓名和生辰:“我是蓝光,×年×月×日时生,希望能看到自己的“元神”!


    停了一会儿,他突然出声笑了起来,旁观的众人都十分好奇,他却说:“有一本大书在我面前的供桌上,自己翻动起来,没有人去动它,就像有风吹着一样,可是却是一页一页有顺序地在翻着……”


    由于书面翻动的很快,完全没有停下来的意思,旁观者好奇地要趁翻书的空档,好好把这座大庙中的陈设叙述一下,他抬头四处端详了一会儿就说:


    “里面有很多好多神像,可是我都不认得!”


    “你以前没有见过这样的神象吗?”


    “没有!从没见过!”


    “那么,你的意思是说:这些神像都不是你记忆中的东西?”


    “是的,这不是我自己记忆中的,因为我跟宗教没有什么接触,所以我不认得这些神明!”


    此刻这本大书越翻越慢,他又再次报上自己的姓名、生辰和目的,书终于停住翻动了停在某一页上,整个摊开在他面前,他形容这本书十分大,是他从未见过的,几乎是他双手夹早向左右的极限(他一面说,并且一面向手势来比,但是这本书也不知是什么质料做的,居然金光闪闪,像一页一页的黄金般,此是正是金光闪烁,耀眼夺目,使他无法看到任何内容……


    他试了半天,仍然看不见,只好满怀愧意的暂时放弃,希望“丰都大帝”能批准他到“元神宫”去查看,默祷了一会,只见眼前一片光亮,就全不见了,什么都消失了,而他自己又飞回到一大片民房上,
    落地之后, 只见面前有一口很大很大的古井, 黑漆漆的深不见底。


    他绕过这口古井之后, 顺着一排排的民宅往前走, 逐间去找门牌上的姓名, 可是却没有找到, 一直在原地打转……


    他据目录找了半终于发现了大门上有了第一门牌, 上书 “丁年生” 三字, 对他而言, 这是个十分陌生也没有意义的名字, 所以并没有吸引住他继续前行之后, 又来到一处非常宽大的民宅前面,
    像是一户大户人家的宅第, 见到了一个很大的院子, 也没有见到任何人影。


    他继续逐户去寻找门牌, 但是, 他突然发现自己竟然被弹了出来, 弹到半空中, 迅速地远离这个村庄, 越来越高, 越来越远, 好不容易降了下来, 却无法降到地面,
    而是一直在屋顶上飞翔打转, 又降下来一点之后, 他就仿佛是 “超人” 一样, 在街道上做低空飞翔, 但是由于速度非常非常的快, 完全无法看清一户户门口的门牌,
    而且, 他发觉自己不太容易停下来, 只是在低空穿街越巷地快速飞翔, 顺着街道绕来绕去的, 既新鲜又刺激, 这是他从未有过的经验, 也是一般人不可能有过的经验。


    等他好不容易降到地上之后, 到处浏览, 仍然无法找到其他的门牌, 却发现在某户门前搭了一个布棚子, 好像是遮太阳用的, 但仍然没有看到人影。


    他跨进这间大宅之门, 找了半天, 也唤不出人来, 只见里面客厅的摆设全是中国古老样式的家俱看来还很新, 客厅正中有一个供桌, 上面供的不是神像, 而是许多大大小小的牌位,
    上书 “韩氏历代祖先之牌位”, 可以肯定这户人家大概是姓韩的。


    他喊了半天, 不见有人答应, 就大起胆子往里面走, 看到里面房间中有张床, 却没见到到有任何特殊的陈设或字书。


