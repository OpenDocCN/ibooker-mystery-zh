    （注：也许有人会非难编者故意忽略或避开了“吃素与杀生”的问题。不得不补充说明？）


    “杀生”，顾名思义就是杀害其他的生命（生灵），非常多的人以为吃素就可以不杀生，试问：植物就不是生命形式之一了吗？把整棵蔬菜、菇类、或种子及块根拿来煎煮炒炸难道不是杀生吗？如果硬要说这不算“杀生”，那是强词夺理，睁着眼睛说瞎话！


    于是有不少人又说了：虽然那也是杀生，但是由于植物的灵性较低，所以吃素没有罪过，也没有因果。


    这种逻辑岂不更奇怪了？搞了半天原来是吃灵性较低的生命就没有罪过，那么动物中不也有许多所谓的“低等动物”，吃了有没有罪过？有没有因果呢？


