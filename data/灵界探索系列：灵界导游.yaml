    因此之故, 若是恳切地希望对亡亲故友有所助益时, 编者的建议如下：


    一、对于因老、病自然过世的亡亲故友, 有宗教信仰者可藉由各种宗教仪式的仪轨来进行。(无宗教信仰者请看第十则以后的方式)。


    二、对于因意外、急症、自杀过世的亡亲故友, 最好能有仪式, 并且在过世现场进行, 但一定要请足堪依赖的人来主持。


    三、年节、忌辰或其他特定日子的牲礼果品焚烧纸钱供奉,在不浪费, 无污染的顾虑下可以进行。祭品纸钱不必太多, 心念最重要, 祭祀及焚烧纸钱时只要集中心念, 一本诚意,
    观想祭品纸钱化做万千倍, 则效果极佳 (注: 但这绝不是根本之道)。


    四、亡亲故友死后去往何方? 处于何种境界? 固然可经由 “牵亡魂”、“观灵术” 而得之, 但是依据 “轮回法则” (本书各章均已详述, 请自行参阅), 可以静下心来肯、客观而不偏颇地去评估推断,
    就可明确地获知。能大彻大悟, 证得涅槃的数千年来绝无仅有, 即使菩萨、诸 罗汉果位的也少之又少, 其他绝大多数一般人必然仍在三界之中, 善者即时转生天界享受福报,
    恶者坠入地狱, 饿鬼道, 其他则必然仍处于中阴界 (轮回过境室)的各层级等候转世, 甚至或仍停留在阳世。


