    何：“她说没有关系啦！”


    何太太：“她说湘语吗？”


    何：“都可以啦！湘语也可以呀！我现在听到的她也听得到!”


    何太太：“噢！那我们讲的话她也听得到啊?”


    何：“她知道啊！有时候我还没开口她就知道了!” ……


