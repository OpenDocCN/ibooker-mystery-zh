  md: '# 第十章


    # 洋人游灵界


    长久以来，观灵法师曾大师一直有个心愿：希望能有更多的机会引领一些外国朋友进入阴间（灵界）去游历，主要目的则在看究竟东西方的阴间（灵界）有什么差异？而外国朋友在接受观灵大法的引导后，所进入的究竟是西方模式的阴间或纯东方式的。


    往昔，比较突出的例子，是位外籍老妇人；她在顺利地进入之后，才发觉自己竟然进入了一个中国式操华语的阴间，一切的建筑及生活形态是纯中国式，以致完全不会说中国话的她，却在阴间发生了语言沟通的障碍，必然依赖陪同前来会说中国话的亲友双向转译才能了解意思，于是她必须将在阴间听到的语言模仿出来，由阳世亲友翻成印语告诉她，同时将回答的印语先译成中国话，让她模仿语音之后再回答，虽然十分困难，却竟也能够沟通而顺利完成游历，真是不可思议，同时也对“观灵大法是催眠术”的说法提出了最有力的反证。'
