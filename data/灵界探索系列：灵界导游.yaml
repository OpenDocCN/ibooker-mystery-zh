    四、在翻阅生死簿的空档，在阳世围观的同事要他描述一下庙中的景象，他答说见到很多以前没见过的神象，重点在于同事问他：“……这些神象都是你记忆中的东西？”他答说：“是的！这不是我自己记忆中的，因为我跟宗教没有任何关系的人，进入灵界所看到的景象应该有其客观的存在，并不受以往经验的影响。这是好比有很多幼小的儿童，如果未经父母详细地说明，对“小人国”的感觉一定误以为是有一群活生生的小人儿居住的国度，直到亲自前去游玩之后才会了解到原来那些屋宇及人物都是缩小的模型而已。而且也不会因为这些小朋友先前的“以为”而使得客观存在的模型小人变成有生命的活物。同样地，灵界的景象其观存在的事实也并不会因为进入灵界当事人原先的认知或经验而改变。更重要的是；当事人当时他是清醒而完全自主判断能力的。


