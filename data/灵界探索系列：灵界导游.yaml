    # 第一章


    # 寻找迷失的自我


    又是一个秋高气爽的季节来到了，脱去了炎夏的溽暑，告别了汗流浃背的夏日，人们都精神为之一爽。


    在一个秋日的夜晚，李娃和司徒医生来寒舍串门，文化和我都很高兴。几位女士聚在一起，说了些近日社会治安方面的严峻局面，说了各自亲友的遭遇，又谈论了一番物价。


    “近日不知买什么菜好了，样样买不起。那新出的荷兰豆卖到五元一斤，真下不得手掏口袋中的钱去买。”我的太太文化慨然叹道。


    李娃和司徒医生附和着文化，表示亦有同感。我虽不是君子，却远离庖厨，更远离市肆，不知道这方面的情况，也就没有发言权了。不过，对于主妇的苦衷，我还是满怀同情之心的。


    发了一番议论之后，几位女士话题一转，说到灵异事物方面去。


    “我一位同学的女儿，今年十岁了，在五、六岁时，她父亲亲就发现她有透视方面的功能。一次她们一家子上街，那女孩子指着脚下的街道，对父母说，这底下是空的。后来一打听，果然如此，街道下边是防空洞，是二十余年前挖的。”李娃说道。


    司徒医生附和道：“真有其事。那女孩儿我见过，是圆圆不是？一双水灵灵的眼睛，瓜子脸，长得俊死了。上个月我还见过她呢，她的功能是前生带来的。据她说，她还知道前生的事呢。”


    “这叫‘宿命通’，是不是？”文化插嘴问道。


    “正是，正是。佛教有五通、六通、十通等名目，一般只讲五通，即：神足通、天耳通、天眼通、他心通、宿命通。五神通都有了，就具足无漏之慧了。”司徒医生说道。


    听她们说得眉飞色舞，我不甘寂寞，也插话道：“司徒医生，看来你已具足了五神通了。”司徒医生近日去了一趟马来西亚，宣弘佛法，传授气功，很受当地佛教人士的欢迎。


    “吕医生过奖了，我还未得初果哩，何来的‘五神通’？”司徒医生笑道。她的笑容很纯真，像十七岁少女的笑容一般。


    “司徒医生，那位高僧还经常到府上给你护持吗？他还是背对着你吗？”我又问。


    “是这样。”司徒倩应道。


    我笑道：“如果那高僧面对着你的时候，可能就是您修成正果的时候了。”


    司徒倩莞尔一笑，不置可否。


    我笑道：“能得到张三丰和高僧这样的明师护持，你的缘份真不浅哪。”


    司徒倩双手合十，肃容道：“阿弥陀佛，不是我司徒倩有多重要，而是我罪孽深重，才惊动两位祖师前辈前来示现哀悯。”


    见司徒倩如此庄重，我不敢再说开玩笑的话了。我沉思道：或许，我、文化、李娃前世与司徒倩有缘，不然的话，今生怎么会如此投缘呢？于是我想为司徒倩和李娃催眠，看看她们说些什么。她们同意了。于是，我为她们进行催眠。


    “我们进入了元顺帝二十六年。”司徒倩说道。


    “也就是公元1366年，我们走在大都的街上，蒙古贵族骑着马，腰挎弯刀，马蹄得得地驰骋在大街上，路人纷纷往两边躲避。蒙古女人头戴顾姑帽，身穿高丽长袍，一摇一摆地走过来。”李娃说道。不爱文学的李娃，描述历史的场景却特别细致生动，这令我诧异不已。李娃所说的“大都”，就是今天的北京，是元朝的首都。


    “哈，那时我是道士，李娃是和尚，我们很要好。现在，我们都骑在马上，并辔齐驱，出了大都西门，往西驰去。”司徒倩说道。


    “嗬，好快哟，我们胯下的骏马，四蹄腾空，快如闪电，一座座村庄、树木，飞快地闪到后面去。转眼间，我们已驰离大都好远好远。”李娃说道。


    她们驰过了河北、山西，不知怎么过了黄河，仍往西驰去，到了陕西宝鸡城外的一座道观，此时两匹骏马停驻下来，她们下了马，往道观内走去。（本该用“他们”的，怕引起称谓的混乱，所以仍用“她们”。）


    无根树，

    花正幽，

    贪恋红尘谁肯修？

    浮生事，

    苦海舟，

    荡去飘来不自由。

    无边无岸难泊系，

    长在鱼龙险处游。

    肯回首，

    是岸头，

    莫待风波坏了舟。


    两人正行走间，突然道观中传出唱道情的歌声，那声音显得苍老，但却又口齿清楚，声音宏亮。两人抬头一望，只见一个极老极老的老道士，坐在观中，身上的玄色道袍又破又脏，积满尘垢，却又闻不到臭味，脸上的皱纹如黄土高原一样，坑坑洼洼，一双手如鸟爪一般，正在捉身上的虱子。那道情正是他唱的。


    两人听了那道情的义蕴，又见了老道士的模样，知道他是得道之人，便向他跪下，求他收自己为徒。


    可是老道士白了他们一眼，挥手道：“去去去，别误了我的工夫。”


    两人很不高兴地走了开来。看看天色已晚，两人便在观中挂单住下。本来，和尚是不能住道观的，应该寻个寺院挂单才是，可那时正是乱世，纲纪松驰，另外两人又是朋友，一时也难再寻寺院安歇，观中道长便让和尚（李娃的前身）住下。和尚对道长说了一番感激的话。


    他们又问道长，老道士是哪里来的？道长很不高兴地说，不知道他的来历，因见他是同门中人，便让他住下。可是老道士邋邋遢遢，也不爱和人说话，自顾一个人说些疯疯颠颠的话，观中的道士都不喜欢他，但又不忍心赶他走，因为他年纪太大了，怕已过一百岁了，也捱不了多少时日了。


    道士（司徒倩的前身）听了道长的话，顿生侧隐之心，心中惦念着老道士。


    当夜，两人正酣睡间，突然听得一阵痛苦的呻吟声，两人细听，听出是日间见过的老道士呻吟声，于是便披衣起床，走了出去。


    就着昏暗的灯光一看，那老道士在大殿上满地打滚，显得非常痛苦。


    司徒倩的前身俯身问那老道士，是否病了？要不要请个郎中来看看？


    那老道士痛苦地摇了摇头，说道：“用不着请郎中了，我今年一百二十岁了，要死了。”


    两人闻言，大吃一惊。


    两人想再问问他的身世时，老道士已经停止了呻吟，脚一蹬，登遐而去。


    两人见老道士已死，便为他念经，道士祝颂他早升仙界，和尚祝他早生净土。要是老道士之魂有知，真不知是往道士（司徒倩前身）指引的仙界去，抑或是往和尚（李娃前身）指引的西方佛国去好，说来令人可笑得紧。


    也许是老道士之魂被他们的念经声弄糊涂了，又走了回来，不知何去何从，那僵硬的尸体又动了一下。两人吓了一跳，便低声商量了一会，决定和尚（李娃的前身）不念经了，由道士（司徒倩的前身）念，于是尸体不再动弹了。


    因为不是同门，和尚在天亮后便告辞了道长和同来的道士朋友，一个人杖锡前去寻找佛寺挂单，一僧一道两位朋友从此分手，各自东西。


    司徒倩的前身即道士掏出自己的钱，买了一副棺木，请了几个仵作，将老道士埋在观后。为老道士办完后事，道士便在观中住下，诵读观中的秘藏《道藏》，用心修炼。


    元世祖忽必烈年间，朝廷听信僧人的状告，说《道藏》都是伪经，因而三次下令全国道观，除《道德经》外，其余道教经书一概焚烧，因而很多道教经书被付之一炬。因为宝鸡远离京师，山高皇帝远，一大套《道藏》得以秘密保存下来，只在同门中人偷偷诵读。司徒倩的前身得此机会，便潜心诵读起来，有如久旱逢甘霖一般。


    道教和佛教一门，修持的过程，也就是练功的过程，悟得的道有多高深，功力便也随之增长多少。因而，司徒倩的前身在悟道的同时，也增进了功力。


    到了第七日，司徒倩的前身正在入神地读着《道藏》，突然听得“咚”的一声巨响，她又吓了一跳，谛听一会，又是“咚”的一声巨响，她吓了一跳，谛听一会，又是“咚”的一声巨响，声音发自观后。司徒倩的前身向观后走去，搜寻着发出声音的地方。观后是那老道的墓，墓后是一片树林。又是“咚”的一声，还有咕噜咕噜的声音。这回，司徒倩听明白了，那声音正发自墓中。


    难道是老道士的鬼魂回来了？大天白日的，鬼魂不可能出现。难道是他返生复活了？


    司徒倩不管三七二十一，拿起一把铲，将墓上的土铲掉，下面就是棺木了，棺盖在震颤着。


    “老道长，老前辈，是你老人家返生了么？”司徒倩的前身向下面喊道。


    “嗯，哼，好闷……嗯。”棺中传出哼唧呻吟之声，“嗯哼，闷死俺也！”


    “嘭！”一声巨响，棺盖被震开了好几寸高，棺钉松动了。是棺中的老道士在用力蹬那棺盖。


    “嘭！”震天动地的一声巨响之后，棺盖飞上了半空，棺中的老道士疲惫地蜷缩在那里，用衣袖遮住阳光，因为多日未见阳光，怕阳光灼伤了眼睛。


    司徒倩的前身又惊又喜，惊的是老道士分明在七日前就已经死去，七日来没吃没喝，而今返生了，竟有如此神力，将牢牢钉死的棺盖踢飞开去，实在是不可思议。喜的是他老人家真的回返生天了。


    司徒倩的前身连忙走下墓坑，俯身将老道士扶上来，回到观中大殿上，让他坐下，自己去舀了一碗粥，喂那老道士。老道士吃下一碗粥，脸上生动多了。


    观中的道长和道士们，见死了七日的游方老道士又返生了，尽皆吃惊，知道他是非常之人，又觉前番怠慢了他，这会儿都心怀愧疚之情，因而想补偿一下过去的简慢，但一齐上前，七手八脚将老道士扶到一处净室中躺下。


    老道士望了众人一眼，转身向里而睡。道长和众道士讪讪地走了出去，司徒倩的前身则陪坐在老道士身边，一步不离。


    一会，老道士悠悠醒来，对司徒倩的前身微微一笑，说道：“小道友，你是个好心人，会有好报的。”


    司徒倩的前身向都道长稽首为礼道：“老道长，你没事了，小子就安心了，管他好报歹报。”


    老道士颔首而笑。沉吟一会，老道士向司徒倩讲起了自己的身世：


    我是张三丰，辽阳积翠村人，原名张通，又名君实，有人称我君宝，其实是读错了。我六岁那年，双目失明，一位道士将我收入道观中，治好了我的眼疾。十四岁时，在少林寺与刘秉忠成为师兄弟，跟海云法师学佛法，刘秉忠后来当了元朝的宰相，他硬要我出来做官，于是我在十七岁时做了河北行省中山的县令，后来我辞官不做，回到辽阳积翠村，侍奉父母，娶妻生子。三十二岁时，抛妻子，带了十万两银子，遍寻明师，在恒山一住就是十六年。忽忽一个甲子过去，银子用个净光。自付学得的只是小法小术，离大道尚有好远好远。六十七岁那年，我西入陕西，在终南山遇见火龙祖师，他向我传授大道，命我再寻名山修炼。于是，我到了武当山，在山上一练就是二十三年，已炼成金刚不坏之身，然后我下江南，遍游金陵、苏、杭等地，在金陵想超度首富沈万三，那知沈万三仙缘未到，内丹未成，用了数百万两银子炼丹，仍是肉身凡胎一躯。可是，他倾家荡产之后，并未放弃修仙之念，家道复兴之后，又与妻、妾、儿女炼起金丹来，再假以时日，他就可以名登仙籍了。你我有缘，想不想跟老朽修仙？


    司徒倩的前身立时扑倒在地，向张三丰纳头便拜，请张仙师收自己为小徒，指点迷津。早就闻听得张三丰的大名了，也早就听得金陵首富沈万三，为了跟张三丰学仙，倾家荡产，九死其犹未悔的事，如今仙师就在自己眼前，司徒倩的前身如何不欣喜若狂，欣然景从？


    于是，两个道士，一老一少，成为师徒。


    几日之后，张三丰吟诗一首：


    元气茫茫返太清，

    又随朱雀下瑶京。

    剥床七日魂来复，

    天下齐看日月明。


    当时，司徒倩的前身，听了张三丰的诗，以为只是写他魂入太清之界，然后再下凡尘的经历，两年之后，才明白，张三丰在两年前就知道元朝气数将尽，朱元璋将要取代元朝，建立新的朝廷，并且预见到这个新朝廷的名字是“明朝”。诗的末句“天下齐看日月明”就暗示了这一层意思。未当皇帝前，朱元璋称为“吴王”，有谁会想到吴王两年后会成为明朝的开国皇帝呢？只有张三丰。可见，张三丰的预见在周颠仙、刘伯温之上，只是，他不往那方面发展而已。


    张三丰又向司徒倩的前身说了灵魂出窍的经历。


    却说当日张三丰一缕孤魂，飘飘荡荡，过枉死城，奈何桥之后，来到地府阎君面前。阎君往下一看，认得是张三丰，便道：“张老道，你不归本王管辖，快快离开冥界。”张三丰向阎君一揖到地，笑道：“今日我死了，阎王爷不肯管俺，那俺到何处安身?”


    阎王爷道：“你属天上管辖，不属小王所辖，速速去罢!”阎王爷显得很不耐烦。


    张三丰之魂只得离开地府，上到阳间，早有一位慈眉善目的女仙接着，她在天上的仙阶是“西华帝君”，道号何一阳，人称何仙姑。当下，何仙姑对一百二十岁的张三丰喝道：“三丰小子，随我走罢。”何仙姑已经近千岁了，所以将张三丰视为黄口小儿。张三丰乖乖地随了何仙姑，腾云驾雾，来到太清天上，何仙姑安置一所琼楼玉宇让张三丰住下，都是仙酒仙果招待，又有玉女服侍着。也不知过了多久，何仙姑对张三丰道：“小子，你尘缘未了，再度下凡间为人罢。”何仙姑袍袖一拂，张三丰的魂魄便悠悠离了琼楼，下降到地上，回复到昔日的躯体之上……


    张三丰为司徒倩的前身取了个圆阳子的道号。


    “圆阳子，好好修炼罢，天上比凡尘美妙多了。”张三丰吩咐道。'
