    那么在半年中二十四小时都可以看到太阳时, 一定会陷于迷惑, 甚至因而搞乱了生理时钟, 不知何时该醒? 何时该睡? 必须会因此感到无法适应。所以如果能事先有心现准备或者在突然来到极地之时,
    有热心的前辈的指点及协助, 他慢慢地自然会适应, 并怡然地在该地生活下去。


    (注②: 在“先修班”中尚未转生, 因为还要依他悟性的程度及个人性向以及对他最有帮助的天界层级不同, 才能决定转生到哪一天界, 所以在“天界先修班”的灵在未转生前,
    仍属层中阴身的阶段。)


    注③: 在“天界先修班”进修并等候转生的灵体, 在“观灵术”中, 虽然阳世的亲友有时也可与之会面, 但通常他都不开口, 甚至也不主动与阳世亲友寒喧, 有时进入灵界的阳世亲友只能见到他在美丽的天界闭目打坐,
