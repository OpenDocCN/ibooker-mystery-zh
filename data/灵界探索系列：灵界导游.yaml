- img_proc: true
  md: '的焦点是“灵魂的有无”，对于完全不相信或半信半疑的大多数人，连“灵魂”这两个字都不愿接受或不能理解之际，这时只能将“灵魂”当成一个泛称，暂时借用来称呼死后的生命或生命的根本体。所以在这种情况下如果说“灵魂不灭”，那么此一说法可以被当作是正确的。因为这还在入门之后“厅堂”的阶段。因此（包括编者这本书中）也不惜列举了许多真实的个案，来证明“灵魂不灭”或“灵界实存”或将涅槃境界的佛说成“超高级灵体”，但是这真的只是在不得已的情况下勉强的权宜之计，将“灵魂不灭”或“灵体”当成泛称，暂时借用。正如同出门碰下大雨没有带伞也没有穿雨衣，暂时用张报纸遮一下，但这并非长久之计，最好是赶紧躲进骑楼下，屋子里，或撑把伞，穿件雨衣再出门。而且报纸也不是根本之道，总不可能每次下雨出门，都一直拿报纸来遮啊。


    其实佛都是不谈也不主张“灵魂不灭”的，因为必也正名乎，探究其要源，佛教认为“灵魂”也是不究竟的，并不是生命的根本，而只是一个暂时性的现象。


    既然“灵魂”只是暂时性的现象，有如海市蜃楼一般，所以佛教认为灵魂是没有永恒性的，那么“灵魂不灭”的说法当然也就不成立了。


    不过这并不矛盾：


    前面说了，其实这只是个名词上的问题，因为佛教认为的生命本体叫做“识”；


    小乘说“六识”，以第六识当作连贯生命之流的主体。


    大乘说“八识”却以第八识作为连贯生命之流的主体，这“八识”分别为：


    +   一、眼识——眼根缘色尘

    二、耳识——耳根缘声尘

    三、鼻识——鼻根缘香尘'
