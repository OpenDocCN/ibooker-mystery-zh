    # 第三章 轮回的法则


    除非他能在有限的物质生命中了悟到生命的本质及轮回的真义而成为觉者（佛），超脱了生死轮回。否则就将不停地在各种生命的轮回中来来去去，不停地出生、不停地死亡，再不停地出生，而且将遍历各种生命的型态，如神仙、如人、如精灵、如畜牲、如饿鬼，甚至植物、矿物（矿物如各种石头也是生命型态之一）。


    “轮回”是自然的，非拟人化的，但若要以人的主观观点来看，轮回却是慈悲而善体人意的，它完全同意每个人的自由意愿，让他在下一世达成心愿，适得其所地投生在符合他意愿的生命型态之中。


    前面说过所谓的“自由意愿”绝非一时兴起的决定，而是一生意念及行为互为因果所形成的强烈意愿（业力）；因此一个生前成心险恶、专以损人利己为能事的人，终此一生乐此不疲，不改其志，虽然死前一心希望能在死后进入极乐世界或天堂，不论只是想法或实际要求家人为其延聘高僧法师大做超级法事，却依然不可得。依据永恒不变的轮回定律，他必然适得其所地去到符合他业力应往之处，或许投生为一只野生蛮荒世界的狐狸，在弱肉强食的世界中，擅用它的计谋生存下去；或者投生为一只蟑螂或蝎子，终生躲在暗处捕食（注：所以佛教将六道又称“六趣”，趣就是去处。）


    轮回的法则既然是慈悲的，不是为了奖善惩恶，那么为什么这样一个为恶之人不能去到极乐世界或天堂呢？这并不是轮回不肯，或阎罗王不肯，而是当事人自己愿意，以一只蟑螂来做比喻，它最感到安全舒适的环境就是阴暗、脏乱、充满食物碎屑（虽然只是腐臭的食物）的场所，如果硬要将一只蟑螂安置在光亮洁净的无尘室中，它一定痛苦万分甚至导致死亡。再打个比方：一位梦游患者，赤裸着身体站立在大庭广众之中，早上他突然清醒过来，由于别人的注目与惊叫，让他发觉自己竟然是赤身露体、一丝一挂的，这时必然羞愧得无地自容而急于藏到一处隐蔽'
- md: '# 灵界导游


    之所。


    同样地在天堂、极乐世界或甚至高层级的灵界，所有灵体都是透明的，一览无余的，没有恶念的。任何细微的念头都可藉心电感应来沟通（心念才起，对方已经完全了解），因此灵与灵之间是完全自然坦诚的，那么一个生前作恶多端、心怀险恶的灵，要如何快乐地生活其间呢？不正像一位赤身露体之人突然发现自己竟站在人潮汹涌之所，同样的羞愧尴尬，无地自容而急欲逃离吗？所以不是轮回定律不让他去到高层灵界或极乐世界，而是他自己不能适存其中。


    再假设一个人，生前嗜吃，无论天上飞的，水里游的、地上爬的，也不论山珍海味或臭豆腐、臭鸭蛋，甚至最残忍的活烫鹅掌、生吃猴脑，他都能吃得津津有味，唯恐不足，那么虽然是昏昧而死或死前希望能在死后荣登极乐也必不可得，同样不是轮回在对他惩处，而相反的是在遂其心愿，因为既然他生前什么都吃，而且荤素不拘、生冷不忌，那么最好的去处当然是投胎去做一只猪，因为猪的胃口是最好的，而且任何食物都被视为美食，从不挑剔，甚至在饲料中不慎混入了纸张、塑胶袋、鱼刺、碎骨，猪也囫囵吞下，吃得津津有味。事实上这正是他最快乐的归宿，否则要硬逼他上天堂甚至极乐世界，那才是最残忍的刑罚。


    六道之中（包括欲界六天）众生都是有食欲、性欲的，自然也有食物的供应，层级越高，食物越精美可口，但到了色界及无色界已经没有了食欲或性欲，自然地不需要食物的供应，那么一个贪吃之徒去到一个没有食物供应的天界或极乐世界，只是比叫他下地狱还痛苦，更别说什么极乐了。


    当然食欲和性欲及其他一切不明确的欲望都是来自肉体习性（或惯性）的残存，而这些欲望也是众生之所以会造孽的缘由，能剔除这些欲望才能晋升至色界、无色界，但唯有大彻大悟才能晋入觉者（佛）的涅槃之境。


    # 第三章 轮回的法则


    然而六道、三界无不是轮回之所，众生因执迷而来去其中。佛教曰“三界火宅”，正是希冀众生能澈悟生命的真意，而逃离三界轮回之所。


    其次，“若问前世因，今生受者是；欲知来世果，今生做者是。”这句话虽然在阐释因果上容易使人明了，但轮回转世，因果循环绝不是善有善报、恶有恶报这么简单，我们实在有必要深入探索。


    举个有趣的例子来说：


    地狱的鬼卒阴差从何而来？


    很简单，全是生前在阳世居心正直却嫉恶如仇的人，为什么这些人会成为阴差鬼卒呢？


    因为居心正真是为人最低的道德标准，平生不做坏事也只是一个常人而已，所以死后上不了天堂，讲不了天界，但是因为他们的愤世嫉俗，嫉恶如仇，见到他人的恶行时，每每恨不得自己就是执掌刑罚或生杀大权的官员，对情节轻微者抓来打一顿皮鞭，抓到小偷砍去手掌，抓到强奸犯施以宫刑去势，抓到杀人犯，处以斩首枪决之刑，如果抓到的是十恶不赦的汪洋大盗或身负十几条人命的杀人魔，则恨不得剥皮抽筋或来个五马分尸，务求大快人心，求其公道，他们无不是主张治乱世用重典，并且把这种“以牙还牙、以眼还眼”的想法坚决地认为是在替天行道。


    固然，这些人本身的确正直，也从无恶念恶行，他们的嫉恶如仇也确实也是自义愤，但是他们却少了一份慈悲的心怀，一般人对好人慈悲是很容易的，但难的是对坏人的慈悲，诚如印度圣雄甘地在被暗杀将死，人人愤怒要追缉凶手偿命时，他充满慈悲地说：“原谅他吧！因为他不知道自己在做什么。”


    正因为众生的执迷，所以才会造下恶业，恶人歹徒也正因为执迷所以才会为恶，因为一个真正了解生命真义的觉者是不会造此恶业的，所以对执迷的众生而言，正因为他们执迷的可悲所以对好人应当慈悲，对坏人更应慈悲因为好人因执迷而一样要入轮回，而坏人则因执迷得较深，所以更要倍受轮回之苦，所以佛家才会主张同体大悲，众生其实都是我们自身的投影，所以都要慈悲以待。


    也因此，如果对坏人不能待之以慈悲而嫉恶如仇者，一样也是一种执迷，这种人虽然在阳世为官必是正直不阿的清官，在民间会是被四邻赞颂的正直好人，但因为这种嫉恶如仇的强烈意愿，死后在轮回慈悲的安排下，最好的去处自然是去任鬼卒阴差了，上善者为阎罗城隍，下善者为皂隶刑役，不论是上刀山、下油锅、挖心割肾，全都要靠这些人来动手执刑，而他们必然也会因为在阳世不能动私刑逞一时之快，分发到地狱去专门修理坏人不正合其意而做得不亦乐乎吗？所以假若有包公，其生平事一如笔记小说所言，那么死后任职阎王，不正是适得其所吗？


    除非他真有悲天悯人的慈悲之心，生前在对犯人行刑时真心悲悯，否则五殿阎君也是不过如此的轮回过境之处，而一般的阴差鬼卒也一样。地藏王菩萨发下宏愿：“地狱不空，誓不成佛”，地狱何时能空呢？除非众生皆醒，再执迷，否则地狱誓无空理。


    其实，“轮回”的真义是为了生命（灵魂）的“进化”（或净化），轮回像一条永不停息的大河，载着浮浮沉沉的众生，流向圆满至善的大海，在轮回之河行进的过程中，如同淘金一样地在沉淀汰洗生命中负面的杂质，除尽，只剩下纯净的真金，才能回归到圆满至善的大海。


    所以三界六道的轮回之所都是不究竟的，全是境由心生，由众生其业所造的“虚拟实境”，只有执迷不悟的众生因认假为真而陷身其中，不停来去，求出不得。


    所以有“顿悟”、“渐悟”之说。


    所以，有的无心地念经不会成佛。


    所以，造桥铺路不会成佛。


    所以，做功德不会成佛。


    所以，放生不会成佛。


    所以，吃素不会成佛。


    所以，苦修不会成佛。


    所以，禁欲不会成佛。


    所以，信不信宗教不重要，信教未必成佛，不信教也未必不能成佛，重要的是，是否能了悟生命的真义？是否能在此生之中不再为来世“虚拟实境”，否则必然会在轮回永恒不变的定律下，一次又一次将自己投入自己虚拟的实境中去，对于轮回中的众生而言，轮回是慈悲的，所以轮回是实有的，三界六道是实有的，所以地狱有、旁生有、饿鬼有、天有、人有、业有、中阴有。也所以陷身于轮回是可悲的，如何能拥有渡到彼岸的智慧，正是人此生最重要的课程。


    # 第四章 商人到此一游


    一班商界朋友，与司徒倩医生极熟，听司徒讲起观灵术，绘形绘声，于是跃跃欲试想在这个淡季去甄师傅那里寻找些刺激，放松一下，于是结伴前去。宾主寒暄了几句之后，甄师父开始放录音带。


    录音带中可清晰地听到的咒语声，由设坛转为请神，全体同仁绑好毛巾，把神座前的椅子通统坐满，准备接受有生以来从未有过的挑战。大约二十分钟，陆陆续续有人举手示意，说是看到忽隐忽现的闪光，翻滚的云，还有闪电或流星，时间只停留几秒钟，很快地又消失了。因为没有进一步的发展，所以请他们暂时休息一下，起来走动走动保持清醒，以免打瞌睡。


    甄师父第二轮施法不久，感应比较强烈，坐在最前排的一位商家，说他好像在一个地道里面，看到菩萨及杨柳。


    甄：请把四周所能看到的景像描述一下！


    商：本来观世音菩萨出现了，后来变成有很多火球绕来绕去。


    甄：如果菩萨再出现，你就把来意说清楚，希望能参观灵界，探讨一些问题。


    商：好！稍早之前，他在一个宫殿里，后来也就飞上来了。


    甄：宫殿的规模大吗？


    商：第一个比较小，飞上来以后又飞到很高很高的地方，还有很多很多喷来喷去的发光物。


    甄：你现在在什么位置？


    商：在天空上面。


    甄：我们现在降到地面上来，然后我再帮你请求菩萨降临。


    甄法师向神座一鞠躬，诵念恭请菩萨现身的咒语……


    司徒：现在有没有看到菩萨出现？


    商摇头示意。


    司徒：那么旁边都是哪些景像？


    商再摇头示意。


    甄法师不断地加强咒语，节奏很快，木鱼声也非常密集，对于现场有相当大的震撼力。


    甄：那现在呢？


    商：我从空中下来，上下都有城堡的样子。


    甄：走进城堡参观一下好不好？


    商：好！进城以后我来到一座拱形的桥上。


    甄：什么材质的桥？


    商：黄黄的，颜色黄黄的石头。


    甄：那你看得到桥下的水吗？


    商：看得到，是黑黑蓝蓝的。


    甄：你要不要走到河边，试试那边水的感觉？


    商：太远摸不到哦！


    甄：过了这座桥又有哪些景像？


    商：是一个古老的城。里面很暗，有红的东西跑来跑去。甄法师念一阵毫光咒以后……


    商：里面有一间房子，有亮光，外面还有楼梯。


    商：从这个阶梯爬上去，看看有没有菩萨在那边好不好！


    商：看到了，两边有极红红的两个人。


    甄：现在走到里面没有？


    商：（点头）


    甄：这房子的规模大不大？


    商：不大！里面有很高高高的桌子，有一尊金色的佛像在那边。


    甄：是什么样的佛像？


    商：不知道是什么佛。


    甄：你看过那种佛像吗？


    商：好像看过。


    甄：他的称呼知道吗？


    商：不知道。


    甄：你要不要看你自己的事情？


    商：不想。


    甄：当你向他拜的时候，他的表情怎样？


    商：很严肃。


    甄：你心里有所求吗？


    商：没有。


    甄：那么除了他以外，旁边还有哪些神？


    商：人，都站在我的旁边，穿着好像古代战士的那种盔甲衣服。我求他带我去开开眼界，但他们在那里站着，好像没听到我讲话。


    甄：你是要继续看下去？还是休息一下再来？


    商：继续看。现在又来了一个脸白白的，是男的。脸很白，也是一样穿着盔甲，我求他带我参观，他向前走，来到一个亭子，很孤单的亭子。四周暗暗的，好像是黄昏的那种感觉。


    甄：你们刚刚过来，是走的还是飘的？


    商：飘的。速度不很快，亭旁有个池子，水是黑色的。池中还有荷花。


    甄：师父听说有荷花，赶快诵念恭请菩萨的咒语——


    商：刚刚池子里面，有一个女孩飞出来。飞出来后……凉亭上好像有酒！他要请我喝酒！


    甄：试试看那酒喝起来味道怎么样？


    商：酸酸的。


    甄：好不好喝？


    商：味道像剑南春。


    众人大笑，笑得好开心，想不到连味道的感觉都有。


    甄：有下酒的菜吗？


    商：有花生……差不多有五盘。


    甄：你们现有喝了多少酒？


    商：好像喝了小杯。


    甄：你能喝酒吗？不能喝就不要喝太多哦！不要醉倒了！感谢这位将军的招待，我们到另外一个地方去参观好不好？


    商：好！他站起来了，我们走过一座桥，有一条很小的路，前面可以看到围墙。


    甄：路边有那些景像？


    商：树！还有一个圆形的门。有围墙。


    凭甄师父的经验，已经知道这位将军准备带他去看生命树了，于是再持诵开路咒……


    甄：你赶快把你的名字报给那位将军，说今天难得的机缘，能不能进去看看你的树丛？


    商：我告诉他，他答应了。我进到里面，看到一个红红的……好像门但不是门。门边有个雕像，还是什么……


    甄：什么雕像？


    商：像猫头鹰的眼睛，不过眼睛是红色的。


    商：不是！是现在才看到的。


    甄：现在没有告诉你，哪一棵树是你的？


    商：有！高高的、绛色的。有果实，红红的果实。


    甄：是什么样的树，名称你知道吗？


    商：他的皮像白千层一样，不过比白千层还黑。


    甄：你看那棵树的各部位，有什么不满意的地方？


    商：很绿，墨绿色的。


    甄：枝干你认为有缺点吗？


    商：枝干都看不到，因为叶子太密了，主干的皮好像要剥落了。


    甄：根部吗？有杂草吗？


    商：根部不甚扎实的，没有杂草。


    甄：这棵树你自己看起来还满意吗？


    商：普通啦！不过主干毛毛的，树皮好像要剥落了！


    甄：确定一下树干上有没有你的名字？


    商：看到我的名字。


    甄：我请人过来帮你整理一下！


    接着甄师父的念咒声跟木鱼声……


    甄：有人过来了吗？


    商：有！一个人戴着帽子。调过以后变白色了。


    甄：他怎么处理？


    商：他根本没整理，手就随便一挥，看起来树皮就不像要剥落的样子。其它的也都恢复了。


    甄：你要不要去元辰宫看看自己的未来？


    商：不想！


    甄：要继续看还是稍微休息一下？


    商：休息。


    这次休息，因为大家都在听那位商人的进入感想，所以时间耽搁得比较久一些，半小时以后，第三轮施法才再开始。因为有刚才的实证，大家都非常有信心，除了甄师父的咒语声，全场静悄悄的，再也看不到变得不耐烦的人。连那些远道而来，无法参加的信众，都摒息地等待另一次奇迹的出现。


    甄：有出现什么景像吗？


    商：仙人掌，还有一片草原，有一间破房子，像被烧坏了一样，我看有些像是神明。有一个炉灶。里有没有人。


    甄：那我们走出来好了。


    商：嗯！


    因为只有景像没有神明，不容易前进，所以甄法师又在催念请神咒……


    甄：有哪尊神明降临吗？


    商：不知道，刚刚打雷，好像闪电一样，然后我就被吸了上去，吸上来的地方，还是没看到神明。我正在腾云驾雾！


    甄：确定没有神明在指引吗？


    商：哦！有啦！在后面。


    甄：请把神明法相形容一下！


    商：是观世音菩萨。穿着长长的白衣服。


    甄：她的高度呢？


    商：哦！好高！比我还高，我看起来很小。


    甄：面部的表情呢？


    商：怎么讲？不是很瘦！不算瘦。


    停顿了片刻，他说看到了一个大眼睛。一个外表青色的，像是一面墙还是城，看起来很凶，有很尖锐的牙齿而且有人在看守。


    甄：你要不要进去看看？


    商：进去好了。


    甄：现在有进到里面吗？


    商：没有！她说不要进去。


    甄：菩萨说不要进去，就不要去好了，我们到别的地方去看。


    商：有一座木造桥，木板好像不坚固，我摔下去了。


    甄：水很浅吗？


    商：水是黑色的。


    甄：你爬上来就可以了，刚刚摔到桥下碰到水的感觉怎么样？


    商：脏脏的。


    甄：桥是怎么搞的？滑下去还是一


    商：塌下去！


    甄：我想跟着菩萨再走一阵。


    念开路咒——


    商：我们刚才已爬过山，是用腾云驾雾的。


    甄：你这次不是纯探讨的吗？请她带你去到可以实际体会的地方去。


    商：半空中有很多星星，下面是山，我们降到山里面去！一片柠檬园，现在我是站在椰子树下面。


    甄：其他还有哪些水果？


    商：木瓜，另外好像是青苹果。


    甄：你看哪一种比较成熟，成熟的话我们尝一下。


    商：椰子，我现在正在爬树。


    甄：慢慢来没关系；摘到了没有？


    商：有，我把它丢下来！


    甄：丢下来就下来，尝尝看味道如何？


    商：涩涩的味道，大概还没熟。


    甄：你刚才说还有木瓜，木瓜熟了没有？


    商：半青半黄的。


    甄：找比较黄的试试看！


    商：有了！有了。


    甄：味道怎么样？


    商：还没吃。


    甄：试试看嘛！跟这边的木瓜有什么不一样？


    商：比较大。木瓜的肉黄中带红，比这边好吃，没有烂烂的感觉。


    甄：你摘水果的时候，菩萨的表情如何？


    商：在笑，她那种笑不是取笑，好像看小孩在玩那样。


    甄：现在来到什么地方？


    商：一个岸边，有一个和尚在那边。


    甄：怎么样的打扮？


    商：就穿那种和尚衣服，头发很短，看起来好像没有钱的样子。


    甄：他在那边干嘛？


    商：就静静地坐在那边。刚才我们是半走半飘的过来，不是很快，绕了几个弯就到了。


    甄：现在又是什么地方？


    商：下雪的地方！冰凉的感觉，树上全都是雪。


    甄：那你要继续往前走，还是休息一下？


    商：休息好了。


    甄师父口中念念有词，举手一拍，这位商家解下毛巾，全部法会结束。


    # 第五章 少妇闯灵界


    李娃昔日的女同学们今都是少妇了，她们抱着好奇的心理，请李娃带她们去看“花丛”。


    盛夏溽暑，火伞高张，前年六月十日一行几位同学来到了甄师父家中。30岁出头的她们，经过甄师父粗略地介绍了观灵术，个个眼神及反应，都充满了好奇、新鲜、不可思议。还有的，带着质疑的表情：“真的吗”？世上哪有这种奇事？


    说明观灵的程序，注意事项后，“一声法旨响灵灵，破秽……”甄师父左手托着净杯，右手剑指净洒整个道场，声音宏亮地念起了“净咒”紧接着：“手执法记座乾坤……”“老君咒”的咒语开启了今天少妇们新奇的“灵界之旅”。


    甄师父请神咒一条一条地念，手中的木鱼声有规律地敲着，堂上的弟子助手也有节奏地伴敲着，甄师父来回穿梭着整个道场，注视着每一个同学的表情及呼吸状况。虽然刚才观灵之前，曾说明以什么样的心情来观灵，但是少妇们都是生平头一遭，眼睛被毛巾一蒙着，眼睛闭着，眼前一片黑。有一个紧张型的少妇，没多久呼吸就开始急促起来了，心跳也加快了，于是甄师父便建议她把毛巾解下来，休息片刻，先观摩一下别人是怎样观灵的。


    仪式继续行进者，咒语声、木鱼声在整个道场环绕着，经过了十多分钟少妇们举手开始此起彼落。有的看到蓝光，有的红光，有的金色光，有的看到白雾……甄师父及弟子助手来回询问及指导：又过十分钟，大家没有再进一步的感应，甄师父喊停，解下毛巾，大家休息一下。


    毛巾一解下，同学们议论纷纷，这个人看到什么，那个人看到什么，有的人黑鸦鸦的，什么都没有看到，其中一位丁少妇说：


    > “师父，我刚才好像看到庙宇的屋角呢！”


    > 甄：“那你刚才为什么不讲？”


    > 丁：“我以为是幻想，而且不太清楚呢！不敢讲。”


    > 甄：“没有关系，等一下再观灵时要讲出来就对了，其他人也一样，不要以为是幻想，而且还质疑是真的抑是幻境，不好意思讲。”


    经过了十分钟的休息，大家坐定后，便开始了第二回合的观灵。电风扇的转动声，在旁信众的轻语声，衬托着甄师父有规律的咒语声、木鱼声，引导着同学们迎向灵界，同学们也切盼着，这时，刚才的那位丁女士说了：我看到前面白白的，一个人全身的轮廓”。


    > 甄：“是男的还是女的?”


    > 丁：是男的”。


    > 甄：“是什么神明得出来吗?”


    > 丁：“白白的，看不出来。”


    > 甄：“你双掌合十，向他拜拜。告诉他说，你是谁，今天想


    > 要看你的花丛、元辰宫，请他带你去。”


    丁：“好。”双掌合十，口中念念有词。


    甄师父这时念着请神咒，紧接着念着开路咒，开始往前带路，这时在旁助理的师兄问道：


    “现在四周的景像，你看到什么了？”


    丁：“前面有一条路。”


    师兄：“好，你一直往前走就对了。旁边有没有神明在带路？”


    丁：“没有，两旁是高山的石壁。”


    甄：“你看看，四周漂亮不漂亮？”


    丁：“没有啊，两边都是山壁，围成一条长长的窄山路，我沿着山路往前走。”


    甄：“现在请你举手向虚空祈祷，我帮你请神降临。”


    这时甄师父铿锵有力、抑扬顿挫地念起请神咒，切请菩萨能慈悲临，引导丁女士达成心愿……


    南无经，“南无经门遇见……”咒语将毕。


    师兄：“你现在看见什么？”


    丁：“我看到漩涡。”


    师兄：“刚才的山路，山壁都不见了？”


    丁：“对！我已进入漩涡，中间有一团亮光。”


    师兄：那好，你请他能现出金身，希望能带你去看树丛、元辰宫，双掌合十向他求。”


    丁举起手来，喃啁地念着……


    这时，甄师父继续念着开路咒……


    丁：“那团光现在一闪一闪的，好亮哟！啊！变成一个圈了。啊！我看到观世音菩萨了！”


    甄：“很好，你赶快举手向她参拜。”


    这时大家都忍不住围了过来，包括参加观灵的同学，赶快解下毛巾，或坐或蹲或站，围成一圈。充满了好奇，兴奋及新鲜的眼光，紧盯蒙着眼睛的丁同学，竖着耳朵，仔细的听，深怕漏了什么似的。


    # 第五章 少妇阅灵界


    甄：“菩萨是什么样子？请你形容一下，让大家共享。”


    丁：“那是一个四方形的池子，菩萨就盘坐在莲花上，而莲花就紧接着法坛上，菩萨身穿白衣。”


    甄：“好，今天难得机缘能遇到菩萨，你祈求菩萨能带你去看你树丛、元神宫。”


    开路咒再起来，木鱼声有规律的伴着……


    丁：“菩萨站起来了，背对着我。”


    师兄：“那就对了，你在后面，跟着走。”


    丁：我看到菩萨在前面前进，衣摆飘动着。”


    师兄：“菩萨离你多远？”


    丁：“有一段距离。”


    师兄：“你们是走路还是用飘的？”


    丁：“在空中飘。”


    师兄：“四周的景像怎样？形容一下。”


    丁：“四周都是云朵，好在飞机上看到外面一样，一直飘向前去。”


    对话中，甄师父开路咒继续念着，过了一会儿——


    丁：“现在飘下来了，看到一个门，方形的门。”


    甄：“什么颜色？”


    丁：“白色的。”


    甄：“除了门以外，旁边有什么景像吗？”


    丁：“没有，哟！现在菩萨向门走去。”


    甄：“那你也跟进去吧！”


    丁：“我也进来了。”


    甄：“好，你把姓名、住址、八字告诉菩萨，祈求她带你去'
  mdcn: '# 灵界导游


    之所。


    同样地在天堂、极乐世界或甚至高层级的灵界，所有灵体都是透明的，一览无余的，没有恶念的。任何细微的念头都可藉心电感应来沟通（心念才起，对方已经完全了解），因此灵与灵之间是完全自然坦诚的，那么一个生前作恶多端、心怀险恶的灵，要如何快乐地生活其间呢？不正像一位赤身露体之人突然发现自己竟站在人潮汹涌之所，同样的羞愧尴尬，无地自容而急欲逃离吗？所以不是轮回定律不让他去到高层灵界或极乐世界，而是他自己不能适存其中。


    再假设一个人，生前嗜吃，无论天上飞的，水里游的、地上爬的，也不论山珍海味或臭豆腐、臭鸭蛋，甚至最残忍的活烫鹅掌、生吃猴脑，他都能吃得津津有味，唯恐不足，那么虽然是昏昧而死或死前希望能在死后荣登极乐也必不可得，同样不是轮回在对他惩处，而相反的是在遂其心愿，因为既然他生前什么都吃，而且荤素不拘、生冷不忌，那么最好的去处当然是投胎去做一只猪，因为猪的胃口是最好的，而且任何食物都被视为美食，从不挑剔，甚至在饲料中不慎混入了纸张、塑胶袋、鱼刺、碎骨，猪也囫囵吞下，吃得津津有味。事实上这正是他最快乐的归宿，否则要硬逼他上天堂甚至极乐世界，那才是最残忍的刑罚。


    六道之中（包括欲界六天）众生都是有食欲、性欲的，自然也有食物的供应，层级越高，食物越精美可口，但到了色界及无色界已经没有了食欲或性欲，自然地不需要食物的供应，那么一个贪吃之徒去到一个没有食物供应的天界或极乐世界，只是比叫他下地狱还痛苦，更别说什么极乐了。


    当然食欲和性欲及其他一切不明确的欲望都是来自肉体习性（或惯性）的残存，而这些欲望也是众生之所以会造孽的缘由，能剔除这些欲望才能晋升至色界、无色界，但唯有大彻大悟才能晋入觉者（佛）的涅槃之境。


    # 第三章 轮回的法则


    然而六道、三界无不是轮回之所，众生因执迷而来去其中。佛教曰“三界火宅”，正是希冀众生能澈悟生命的真意，而逃离三界轮回之所。


    其次，“若问前世因，今生受者是；欲知来世果，今生做者是。”这句话虽然在阐释因果上容易使人明了，但轮回转世，因果循环绝不是善有善报、恶有恶报这么简单，我们实在有必要深入探索。


    举个有趣的例子来说：


    地狱的鬼卒阴差从何而来？


    很简单，全是生前在阳世居心正直却嫉恶如仇的人，为什么这些人会成为阴差鬼卒呢？


    因为居心正真是为人最低的道德标准，平生不做坏事也只是一个常人而已，所以死后上不了天堂，讲不了天界，但是因为他们的愤世嫉俗，嫉恶如仇，见到他人的恶行时，每每恨不得自己就是执掌刑罚或生杀大权的官员，对情节轻微者抓来打一顿皮鞭，抓到小偷砍去手掌，抓到强奸犯施以宫刑去势，抓到杀人犯，处以斩首枪决之刑，如果抓到的是十恶不赦的汪洋大盗或身负十几条人命的杀人魔，则恨不得剥皮抽筋或来个五马分尸，务求大快人心，求其公道，他们无不是主张治乱世用重典，并且把这种“以牙还牙、以眼还眼”的想法坚决地认为是在替天行道。


    固然，这些人本身的确正直，也从无恶念恶行，他们的嫉恶如仇也确实也是自义愤，但是他们却少了一份慈悲的心怀，一般人对好人慈悲是很容易的，但难的是对坏人的慈悲，诚如印度圣雄甘地在被暗杀将死，人人愤怒要追缉凶手偿命时，他充满慈悲地说：“原谅他吧！因为他不知道自己在做什么。”


    正因为众生的执迷，所以才会造下恶业，恶人歹徒也正因为执迷所以才会为恶，因为一个真正了解生命真义的觉者是不会造此恶业的，所以对执迷的众生而言，正因为他们执迷的可悲所以对好人应当慈悲，对坏人更应慈悲因为好人因执迷而一样要入轮回，而坏人则因执迷得较深，所以更要倍受轮回之苦，所以佛家才会主张同体大悲，众生其实都是我们自身的投影，所以都要慈悲以待。


    也因此，如果对坏人不能待之以慈悲而嫉恶如仇者，一样也是一种执迷，这种人虽然在阳世为官必是正直不阿的清官，在民间会是被四邻赞颂的正直好人，但因为这种嫉恶如仇的强烈意愿，死后在轮回慈悲的安排下，最好的去处自然是去任鬼卒阴差了，上善者为阎罗城隍，下善者为皂隶刑役，不论是上刀山、下油锅、挖心割肾，全都要靠这些人来动手执刑，而他们必然也会因为在阳世不能动私刑逞一时之快，分发到地狱去专门修理坏人不正合其意而做得不亦乐乎吗？所以假若有包公，其生平事一如笔记小说所言，那么死后任职阎王，不正是适得其所吗？


    除非他真有悲天悯人的慈悲之心，生前在对犯人行刑时真心悲悯，否则五殿阎君也是不过如此的轮回过境之处，而一般的阴差鬼卒也一样。地藏王菩萨发下宏愿：“地狱不空，誓不成佛”，地狱何时能空呢？除非众生皆醒，再执迷，否则地狱誓无空理。


    其实，“轮回”的真义是为了生命（灵魂）的“进化”（或净化），轮回像一条永不停息的大河，载着浮浮沉沉的众生，流向圆满至善的大海，在轮回之河行进的过程中，如同淘金一样地在沉淀汰洗生命中负面的杂质，除尽，只剩下纯净的真金，才能回归到圆满至善的大海。


    所以三界六道的轮回之所都是不究竟的，全是境由心生，由众生其业所造的“虚拟实境”，只有执迷不悟的众生因认假为真而陷身其中，不停来去，求出不得。


    所以有“顿悟”、“渐悟”之说。


    所以，有的无心地念经不会成佛。


    所以，造桥铺路不会成佛。


    所以，做功德不会成佛。


    所以，放生不会成佛。


    所以，吃素不会成佛。


    所以，苦修不会成佛。


    所以，禁欲不会成佛。


    所以，信不信宗教不重要，信教未必成佛，不信教也未必不能成佛，重要的是，是否能了悟生命的真义？是否能在此生之中不再为来世“虚拟实境”，否则必然会在轮回永恒不变的定律下，一次又一次将自己投入自己虚拟的实境中去，对于轮回中的众生而言，轮回是慈悲的，所以轮回是实有的，三界六道是实有的，所以地狱有、旁生有、饿鬼有、天有、人有、业有、中阴有。也所以陷身于轮回是可悲的，如何能拥有渡到彼岸的智慧，正是人此生最重要的课程。


    # 第四章 商人到此一游


    一班商界朋友，与司徒倩医生极熟，听司徒讲起观灵术，绘形绘声，于是跃跃欲试想在这个淡季去甄师傅那里寻找些刺激，放松一下，于是结伴前去。宾主寒暄了几句之后，甄师父开始放录音带。


    录音带中可清晰地听到的咒语声，由设坛转为请神，全体同仁绑好毛巾，把神座前的椅子通统坐满，准备接受有生以来从未有过的挑战。大约二十分钟，陆陆续续有人举手示意，说是看到忽隐忽现的闪光，翻滚的云，还有闪电或流星，时间只停留几秒钟，很快地又消失了。因为没有进一步的发展，所以请他们暂时休息一下，起来走动走动保持清醒，以免打瞌睡。


    甄师父第二轮施法不久，感应比较强烈，坐在最前排的一位商家，说他好像在一个地道里面，看到菩萨及杨柳。


    甄：请把四周所能看到的景像描述一下！


    商：本来观世音菩萨出现了，后来变成有很多火球绕来绕去。


    甄：如果菩萨再出现，你就把来意说清楚，希望能参观灵界，探讨一些问题。


    商：好！稍早之前，他在一个宫殿里，后来也就飞上来了。


    甄：宫殿的规模大吗？


    商：第一个比较小，飞上来以后又飞到很高很高的地方，还有很多很多喷来喷去的发光物。


    甄：你现在在什么位置？


    商：在天空上面。


    甄：我们现在降到地面上来，然后我再帮你请求菩萨降临。


    甄法师向神座一鞠躬，诵念恭请菩萨现身的咒语……


    司徒：现在有没有看到菩萨出现？


    商摇头示意。


    司徒：那么旁边都是哪些景像？


    商再摇头示意。


    甄法师不断地加强咒语，节奏很快，木鱼声也非常密集，对于现场有相当大的震撼力。


    甄：那现在呢？


    商：我从空中下来，上下都有城堡的样子。


    甄：走进城堡参观一下好不好？


    商：好！进城以后我来到一座拱形的桥上。


    甄：什么材质的桥？


    商：黄黄的，颜色黄黄的石头。


    甄：那你看得到桥下的水吗？


    商：看得到，是黑黑蓝蓝的。


    甄：你要不要走到河边，试试那边水的感觉？


    商：太远摸不到哦！


    甄：过了这座桥又有哪些景像？


    商：是一个古老的城。里面很暗，有红的东西跑来跑去。甄法师念一阵毫光咒以后……


    商：里面有一间房子，有亮光，外面还有楼梯。


    商：从这个阶梯爬上去，看看有没有菩萨在那边好不好！


    商：看到了，两边有极红红的两个人。


    甄：现在走到里面没有？


    商：（点头）


    甄：这房子的规模大不大？


    商：不大！里面有很高高高的桌子，有一尊金色的佛像在那边。


    甄：是什么样的佛像？


    商：不知道是什么佛。


    甄：你看过那种佛像吗？


    商：好像看过。


    甄：他的称呼知道吗？


    商：不知道。


    甄：你要不要看你自己的事情？


    商：不想。


    甄：当你向他拜的时候，他的表情怎样？


    商：很严肃。


    甄：你心里有所求吗？


    商：没有。


    甄：那么除了他以外，旁边还有哪些神？


    商：人，都站在我的旁边，穿着好像古代战士的那种盔甲衣服。我求他带我去开开眼界，但他们在那里站着，好像没听到我讲话。


    甄：你是要继续看下去？还是休息一下再来？


    商：继续看。现在又来了一个脸白白的，是男的。脸很白，也是一样穿着盔甲，我求他带我参观，他向前走，来到一个亭子，很孤单的亭子。四周暗暗的，好像是黄昏的那种感觉。


    甄：你们刚刚过来，是走的还是飘的？


    商：飘的。速度不很快，亭旁有个池子，水是黑色的。池中还有荷花。


    甄：师父听说有荷花，赶快诵念恭请菩萨的咒语——


    商：刚刚池子里面，有一个女孩飞出来。飞出来后……凉亭上好像有酒！他要请我喝酒！


    甄：试试看那酒喝起来味道怎么样？


    商：酸酸的。


    甄：好不好喝？


    商：味道像剑南春。


    众人大笑，笑得好开心，想不到连味道的感觉都有。


    甄：有下酒的菜吗？


    商：有花生……差不多有五盘。


    甄：你们现有喝了多少酒？


    商：好像喝了小杯。


    甄：你能喝酒吗？不能喝就不要喝太多哦！不要醉倒了！感谢这位将军的招待，我们到另外一个地方去参观好不好？


    商：好！他站起来了，我们走过一座桥，有一条很小的路，前面可以看到围墙。


    甄：路边有那些景像？


    商：树！还有一个圆形的门。有围墙。


    凭甄师父的经验，已经知道这位将军准备带他去看生命树了，于是再持诵开路咒……


    甄：你赶快把你的名字报给那位将军，说今天难得的机缘，能不能进去看看你的树丛？


    商：我告诉他，他答应了。我进到里面，看到一个红红的……好像门但不是门。门边有个雕像，还是什么……


    甄：什么雕像？


    商：像猫头鹰的眼睛，不过眼睛是红色的。


    商：不是！是现在才看到的。


    甄：现在没有告诉你，哪一棵树是你的？


    商：有！高高的、绛色的。有果实，红红的果实。


    甄：是什么样的树，名称你知道吗？


    商：他的皮像白千层一样，不过比白千层还黑。


    甄：你看那棵树的各部位，有什么不满意的地方？


    商：很绿，墨绿色的。


    甄：枝干你认为有缺点吗？


    商：枝干都看不到，因为叶子太密了，主干的皮好像要剥落了。


    甄：根部吗？有杂草吗？


    商：根部不甚扎实的，没有杂草。


    甄：这棵树你自己看起来还满意吗？


    商：普通啦！不过主干毛毛的，树皮好像要剥落了！


    甄：确定一下树干上有没有你的名字？


    商：看到我的名字。


    甄：我请人过来帮你整理一下！


    接着甄师父的念咒声跟木鱼声……


    甄：有人过来了吗？


    商：有！一个人戴着帽子。调过以后变白色了。


    甄：他怎么处理？


    商：他根本没整理，手就随便一挥，看起来树皮就不像要剥落的样子。其它的也都恢复了。


    甄：你要不要去元辰宫看看自己的未来？


    商：不想！


    甄：要继续看还是稍微休息一下？


    商：休息。


    这次休息，因为大家都在听那位商人的进入感想，所以时间耽搁得比较久一些，半小时以后，第三轮施法才再开始。因为有刚才的实证，大家都非常有信心，除了甄师父的咒语声，全场静悄悄的，再也看不到变得不耐烦的人。连那些远道而来，无法参加的信众，都摒息地等待另一次奇迹的出现。


    甄：有出现什么景像吗？


    商：仙人掌，还有一片草原，有一间破房子，像被烧坏了一样，我看有些像是神明。有一个炉灶。里有没有人。


    甄：那我们走出来好了。


    商：嗯！


    因为只有景像没有神明，不容易前进，所以甄法师又在催念请神咒……


    甄：有哪尊神明降临吗？


    商：不知道，刚刚打雷，好像闪电一样，然后我就被吸了上去，吸上来的地方，还是没看到神明。我正在腾云驾雾！


    甄：确定没有神明在指引吗？


    商：哦！有啦！在后面。


    甄：请把神明法相形容一下！


    商：是观世音菩萨。穿着长长的白衣服。


    甄：她的高度呢？


    商：哦！好高！比我还高，我看起来很小。


    甄：面部的表情呢？


    商：怎么讲？不是很瘦！不算瘦。


    停顿了片刻，他说看到了一个大眼睛。一个外表青色的，像是一面墙还是城，看起来很凶，有很尖锐的牙齿而且有人在看守。


    甄：你要不要进去看看？


    商：进去好了。


    甄：现在有进到里面吗？


    商：没有！她说不要进去。


    甄：菩萨说不要进去，就不要去好了，我们到别的地方去看。


    商：有一座木造桥，木板好像不坚固，我摔下去了。


    甄：水很浅吗？


    商：水是黑色的。


    甄：你爬上来就可以了，刚刚摔到桥下碰到水的感觉怎么样？


    商：脏脏的。


    甄：桥是怎么搞的？滑下去还是一


    商：塌下去！


    甄：我想跟着菩萨再走一阵。


    念开路咒——


    商：我们刚才已爬过山，是用腾云驾雾的。


    甄：你这次不是纯探讨的吗？请她带你去到可以实际体会的地方去。


    商：半空中有很多星星，下面是山，我们降到山里面去！一片柠檬园，现在我是站在椰子树下面。


    甄：其他还有哪些水果？


    商：木瓜，另外好像是青苹果。


    甄：你看哪一种比较成熟，成熟的话我们尝一下。


    商：椰子，我现在正在爬树。


    甄：慢慢来没关系；摘到了没有？


    商：有，我把它丢下来！


    甄：丢下来就下来，尝尝看味道如何？


    商：涩涩的味道，大概还没熟。


    甄：你刚才说还有木瓜，木瓜熟了没有？


    商：半青半黄的。


    甄：找比较黄的试试看！


    商：有了！有了。


    甄：味道怎么样？


    商：还没吃。


    甄：试试看嘛！跟这边的木瓜有什么不一样？


    商：比较大。木瓜的肉黄中带红，比这边好吃，没有烂烂的感觉。


    甄：你摘水果的时候，菩萨的表情如何？


    商：在笑，她那种笑不是取笑，好像看小孩在玩那样。


    甄：现在来到什么地方？


    商：一个岸边，有一个和尚在那边。


    甄：怎么样的打扮？


    商：就穿那种和尚衣服，头发很短，看起来好像没有钱的样子。


    甄：他在那边干嘛？


    商：就静静地坐在那边。刚才我们是半走半飘的过来，不是很快，绕了几个弯就到了。


    甄：现在又是什么地方？


    商：下雪的地方！冰凉的感觉，树上全都是雪。


    甄：那你要继续往前走，还是休息一下？


    商：休息好了。


    甄师父口中念念有词，举手一拍，这位商家解下毛巾，全部法会结束。


    # 第五章 少妇闯灵界


    李娃昔日的女同学们今都是少妇了，她们抱着好奇的心理，请李娃带她们去看“花丛”。


    盛夏溽暑，火伞高张，前年六月十日一行几位同学来到了甄师父家中。30岁出头的她们，经过甄师父粗略地介绍了观灵术，个个眼神及反应，都充满了好奇、新鲜、不可思议。还有的，带着质疑的表情：“真的吗”？世上哪有这种奇事？


    说明观灵的程序，注意事项后，“一声法旨响灵灵，破秽……”甄师父左手托着净杯，右手剑指净洒整个道场，声音宏亮地念起了“净咒”紧接着：“手执法记座乾坤……”“老君咒”的咒语开启了今天少妇们新奇的“灵界之旅”。


    甄师父请神咒一条一条地念，手中的木鱼声有规律地敲着，堂上的弟子助手也有节奏地伴敲着，甄师父来回穿梭着整个道场，注视着每一个同学的表情及呼吸状况。虽然刚才观灵之前，曾说明以什么样的心情来观灵，但是少妇们都是生平头一遭，眼睛被毛巾一蒙着，眼睛闭着，眼前一片黑。有一个紧张型的少妇，没多久呼吸就开始急促起来了，心跳也加快了，于是甄师父便建议她把毛巾解下来，休息片刻，先观摩一下别人是怎样观灵的。


    仪式继续行进者，咒语声、木鱼声在整个道场环绕着，经过了十多分钟少妇们举手开始此起彼落。有的看到蓝光，有的红光，有的金色光，有的看到白雾……甄师父及弟子助手来回询问及指导：又过十分钟，大家没有再进一步的感应，甄师父喊停，解下毛巾，大家休息一下。


    毛巾一解下，同学们议论纷纷，这个人看到什么，那个人看到什么，有的人黑鸦鸦的，什么都没有看到，其中一位丁少妇说：


    > “师父，我刚才好像看到庙宇的屋角呢！”


    > 甄：“那你刚才为什么不讲？”


    > 丁：“我以为是幻想，而且不太清楚呢！不敢讲。”


    > 甄：“没有关系，等一下再观灵时要讲出来就对了，其他人也一样，不要以为是幻想，而且还质疑是真的抑是幻境，不好意思讲。”


    经过了十分钟的休息，大家坐定后，便开始了第二回合的观灵。电风扇的转动声，在旁信众的轻语声，衬托着甄师父有规律的咒语声、木鱼声，引导着同学们迎向灵界，同学们也切盼着，这时，刚才的那位丁女士说了：我看到前面白白的，一个人全身的轮廓”。


    > 甄：“是男的还是女的?”


    > 丁：是男的”。


    > 甄：“是什么神明得出来吗?”


    > 丁：“白白的，看不出来。”


    > 甄：“你双掌合十，向他拜拜。告诉他说，你是谁，今天想


    > 要看你的花丛、元辰宫，请他带你去。”


    丁：“好。”双掌合十，口中念念有词。


    甄师父这时念着请神咒，紧接着念着开路咒，开始往前带路，这时在旁助理的师兄问道：


    “现在四周的景像，你看到什么了？”


    丁：“前面有一条路。”


    师兄：“好，你一直往前走就对了。旁边有没有神明在带路？”


    丁：“没有，两旁是高山的石壁。”


    甄：“你看看，四周漂亮不漂亮？”


    丁：“没有啊，两边都是山壁，围成一条长长的窄山路，我沿着山路往前走。”


    甄：“现在请你举手向虚空祈祷，我帮你请神降临。”


    这时甄师父铿锵有力、抑扬顿挫地念起请神咒，切请菩萨能慈悲临，引导丁女士达成心愿……


    南无经，“南无经门遇见……”咒语将毕。


    师兄：“你现在看见什么？”


    丁：“我看到漩涡。”


    师兄：“刚才的山路，山壁都不见了？”


    丁：“对！我已进入漩涡，中间有一团亮光。”


    师兄：那好，你请他能现出金身，希望能带你去看树丛、元辰宫，双掌合十向他求。”


    丁举起手来，喃啁地念着……


    这时，甄师父继续念着开路咒……


    丁：“那团光现在一闪一闪的，好亮哟！啊！变成一个圈了。啊！我看到观世音菩萨了！”


    甄：“很好，你赶快举手向她参拜。”


    这时大家都忍不住围了过来，包括参加观灵的同学，赶快解下毛巾，或坐或蹲或站，围成一圈。充满了好奇，兴奋及新鲜的眼光，紧盯蒙着眼睛的丁同学，竖着耳朵，仔细的听，深怕漏了什么似的。


    # 第五章 少妇阅灵界


    甄：“菩萨是什么样子？请你形容一下，让大家共享。”


    丁：“那是一个四方形的池子，菩萨就盘坐在莲花上，而莲花就紧接着法坛上，菩萨身穿白衣。”


    甄：“好，今天难得机缘能遇到菩萨，你祈求菩萨能带你去看你树丛、元神宫。”


    开路咒再起来，木鱼声有规律的伴着……


    丁：“菩萨站起来了，背对着我。”


    师兄：“那就对了，你在后面，跟着走。”


    丁：我看到菩萨在前面前进，衣摆飘动着。”


    师兄：“菩萨离你多远？”


    丁：“有一段距离。”


    师兄：“你们是走路还是用飘的？”


    丁：“在空中飘。”


    师兄：“四周的景像怎样？形容一下。”


    丁：“四周都是云朵，好在飞机上看到外面一样，一直飘向前去。”


    对话中，甄师父开路咒继续念着，过了一会儿——


    丁：“现在飘下来了，看到一个门，方形的门。”


    甄：“什么颜色？”


    丁：“白色的。”


    甄：“除了门以外，旁边有什么景像吗？”


    丁：“没有，哟！现在菩萨向门走去。”


    甄：“那你也跟进去吧！”


    丁：“我也进来了。”


