    在知己好友面前吹嘘吹嘘，便斗胆陪师父喝了两杯。没想到，两杯下肚，顿时头昏脑胀，天旋地转，几乎分不清楚东南西北。师父看到我酒后的傻样子，笑着说能喝到他老人家赐的酒，有益无害的啦！话虽如此，那个酒确实相当醇烈，大概仙界神酒，凡人总是消受不起吧！


    堂中的曾老师见我醉意醺然，恐有不妥，再加以这趟游历至此耗用不少时间（据曾老师云：毕竟阴阳两界环境不同，凡人在阴界待得太久，总非合宜）；便教我禀明济公师父，此趟旅程可否到这告一段落，有机缘时他日再探灵界。


