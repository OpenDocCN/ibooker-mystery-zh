    曾：刚才进入地狱时有没有阴森森的感觉？


    徐：不会！有一阵凉风吹来，菩萨的莲花灯一照，就暖和了。


    曾：今天探讨的内容，可以发表上吗？不用本名也没关系！


    徐：没有关系呀！不过要看我先生的意思。


    徐小姐的先生：我觉得这个事情既然是你看到，然后向世人发表，让大家了解，应该没有什么不对！


    信众们：你看到地狱那些现象，心中会不会害怕？


    徐：不会！我觉得他们好可怜。


    宁：你看他们斩头的时候有没有血喷出来？


    徐：没有血。


    宁：近看还是远看？


    徐：近看！我就在断头台的下面，不会怕。


    ## 第二十章

    ### 人身难得须珍惜


    人之生而为人是极其幸运的，也是需要莫大勇气的。


    因为要想大彻大悟地发现生命的真义与宇宙的实相而成为觉者（佛），人间的修持是绝对必要的，也是唯一的途径，如果不历经人世的沧桑与磨难，要想跳出三界、立地成佛，那犹如水中捞月，缘木求鱼。更像是抱着钻石的原矿，希望它不经琢磨就能自然璀璨发光一样的荒谬。


    人在投胎转世到这个五光十色，苦乐参半的阳世间之间，全都明白此生的目的及需要重修的科目，然而绝大多数人来到人世之后，却纷纷迷失在人欲的洪流之中，轻忽了真如灵性，而由着生物性的本能牵着鼻子跑，一生为名利权色奔波劳碌，甚至连停下来喘口气，回头想想自己到底“所为何哉？”的机会都没有。就此昏昏噩噩，匆匆忙忙过完一生，然后依旧是两手空空，脑袋空空地回去，于是乎下一世又再重新来过，重新接受生、老、病、死等八苦的煎熬，或竟而投入其他恶道，而减少了修行的机会。


    编者一再强调：“轮回过境室”的灵界三书是给一般人看的，不是给佛菩萨、大修行者看的，所有的观点都是以一般常人的观点出发。


    所以，不必去觉得“身是菩提树、心如明镜台”的说法如何幼稚可笑，相较于“菩提本无树，明镜亦非台”有如脑筋急转弯、耍嘴皮子的论点，对一般人而言，前者必然更实在。因为一般人是不可能有六祖的天生慧要悟性，站在一个不平等的立足点上去苛求凡人当下开悟，立地成佛，那是驱牛入瓮、渺不可得的。


    也所以“时时勤拂拭，忽使惹尘埃”是适当可行的。


    人之所以为人，是必经尘世历练的，没有人可以因为远离红尘道场，离群索居，由于深山清修，不惹尘埃而得道成佛的。


    因为人之所以投胎转世为人，必然是有着未尽的修行、未了的因果，否则为何要来？如果是超高层级的佛、菩萨倒转慈航为慈悲渡世而来，那原本就不同于一般人，根本不在我们探讨之列。


    所谓“山中修十年，不如人间修一天”，出家不是发现生命真义和宇宙实相的唯一途径。佛说出家是大丈夫的行为，但绝不是任何人遁人空门就能成佛。否则全世界的人一出生就一一剃度出家，个个成佛、鸡犬升天，那又何必有人间道场呢？而且果真如此，一百年后，地球上就不会有人类了。


    不要误以为编者反对出家，我真心敬重那些发心潜修，特别是确定知道自己为什么出家的出家人。但是绝不是某些人误以为避开红尘道场，舍弃人生责任，不落因果就能成佛。


    达摩祖师面壁九年才得道，那该不该面壁呢？面壁对不对呢？


    如果已经有了这样的修为，认为该去面壁那就去面壁。如果一般人没有正确的认知与相当的修为，面壁也不过是徒然，只怕面壁九年之后，只会变成一具骷髅而已。


    在此为了探究真理：实话实说，编者甘冒大不讳地举个实例：


    民国初年有位百年难得一见的旷世奇才，出身于富裕世家，国学的要基极深，又留学西洋，不论文学、音乐、美术、戏剧都有着极高的造诣，并留下了许许多多脍炙人口的作品。


    年少轻狂的时代，一如当时文人风流的行径，琴棋书画、风花雪月、饮酒嫖妓的浪荡人生，中年时却突然“自以为顿悟”而遁人空门，留给世人一片惊愕，并在青灯古佛中度过馀生直到圆寂，并一直被尊为大师迄今。


    但是从他一生的传记中，却发观到他在出家之前，有红尘道场 上有着许多实实在在不可原谅的行为。


    一、为了不孝：从早年的浪荡、飘泊异国到出家以后，对早逝的父亲及寡母，从未尽过一天孝道。即使家境富有，父母并无冻馁之虞，但中国人所说的孝道并不尽然只是金钱物质上的甘旨奉养。何况他连一天的甘旨奉养也没做到过。


    二、为夫不忠：虽然民国初年的时代，一夫多妻仍是社会普遍的风气，但这位旷世奇才对发妻几乎是视同陌路，在外或逢场作戏或另结新欢，先后至少有两位美妾，除了享受齐人之福外，从来不曾见他负起过做丈夫的义务。


    三、为夫无情：在决心出家之后，完全不告之妻妾，虽然他事先做了经济上的安排，但试问夫妻之情只在于“钱”吗？一只狗养了几年，也不至如此绝情地弃之如敝履吧？


    四、为父不慈：获知其出家的消息，外藉妻子伤心欲绝地携了幼子兼程赶来寺外，希望他能打消此念，他果然是铁石心肠，竟然连见一面都不肯，对已身所生的子女从未尽到一天做父亲教养的责任，出家时连这一面也不愿意见。


    不慈如此，够资格为人父吗？而令人惊愕的是宗教界迄今仍将他这种行为大肆歌颂，认为这才是真正的“能舍”。


    五、为友不义：出家时，他正在学校教书，连至交好友也一概隐瞒不肯告之，好像深怕朋友抢了他成佛的名额，有友如此，不如割席绝交。


    的确的，以他这种非人类所能有的修行决心，出家后真的是弃去一切及食享受，如苦行僧般地潜心佛法，而且以天纵之奇才果然也有相当成就，晚年时四处阐扬佛法，校定佛经，不可说没有贡献。


    但编者想要问的就是：一个几乎“五伦”全亏，冷血绝情到如此地步的人，遁入空门就算“彻悟”吗？圆寂后就能得道成佛，证得涅槃、不入轮回吗？”


    编者认为不论宗教界是如何歌之颂之，那只是纯粹的本位主义，一如往昔某些医生，为了标榜自己医术的精湛或为了实质利益，经常鼓励无病无痛的正常人割去盲肠一般的无谓。更像卖药的绝不会在广告上谈这种药的副作用的。


    他最大的罪过并不只是五伦有亏而已，而是给后世的一般人留下了一个最坏的榜样；使人误以为父母子女配偶朋友之情皆是空的，是可以冷血无情弃之不顾的，美其名曰“看破红尘”。误以为只要毅然舍弃迷些遁入空门就可证道成佛，而不管高堂正待奉养，妻儿嗷嗷待哺。


    一个人如果一心只追求自己证道成佛，而不管其他众生死活（即使那是父母子女配偶朋友），就算把几万部经文读得滚瓜烂熟，敲破几万个木鱼，坐破几万块蒲团也不过是缘木求鱼而已。


    “红尘”绝不是用这样的方式来“看破”的。


    宗教只是追求真理的方式之一，每一个人都有选择自己追求各种方式的自由，所以儿童的出家是绝对不应该被鼓励的，因为儿童的心智尚未成熟，并没有正确选择的能力。


    编者也不以为学校刚毕业的年轻人适合出家，试想连红尘尚未踏入又何来看破呢？如果只是为了人生的无常，恐惧于尘世中的人欲横流而不敢去接受历练，早早遁入空门，眼不见为净，如同下决心不去参加会考，就不会有“落榜”的问题。如果是抱着这种心态，那不是“看破”而是逃避，那又何必来人世中走一遭呢？


    生而为人，就有“做人”的天赋责任，如果人都做不好，或者根本不想做人，只是一心想成佛，那要产是水中捞月而已。


    至于那些把剃渡穿袈裟的生涯当成了职业、不事生产、贪图供养的人，那就更是等而下之，不必浪费笔墨口水去谈了。


    出家去追求真理好吗？当然很好，但是一定是在已经完成了做人的责任之后，不是在之前，更不是在中途放弃做人的责任。


    所以“在家”也一样可以追求真理，而且是必须的，如果认为先昏昏噩噩地混日子，反正等以后正式出了家再来修行，这种想法是大错特错，因为真理无处不在，一日三餐藏道理，在日常生活中的一念一行、一事一物都可以发现真理。


    每个人都应该要结婚的，因为婚姻而与配偶发生的互动关系是最好的修持方式。（否则人类就应该天生是中性的，何必有男女之别？）


    于是又要谈到“欲”这个问题了。生命所以落入轮回，难以超脱，全是因为贪嗔痴等等的欲念。


    那么“禁欲”对不对？是否修行就一定要“禁欲”？


    生而为人就不可能“无欲”，连欲界天神都有欲，何况是凡人？


    如果“欲”是不必要的，那么人生来就该“无欲”，就像人没有尾巴和角一样。那么既然有“欲”又何必“禁”呢？


    想想看：禁了食欲，用不了几天，全世界的人就饿死光了，那又何必来转生人世？


    禁了性欲，百年之后，世上也没有人了。


    禁了物欲，人类必定还处在远古时代，连语言沟通都有问题，还谈什么追求真理？


    想想如果禁欲的主张在几千年前就被实现，现在还会有你我可以 在这里探索灵界、追求真理吗？


    所以根本就不需要“禁欲”，如果绝食就可以得道成佛，那些被活活饿死的非洲难民，尤其是一出生就饿死的婴儿岂不全成了佛？


    如果禁绝性行为就可得道成佛，自古以来从小“净身”人宫当太监的岂不人人成佛？


    其实绝食及禁绝性行为也不足以“禁欲”，绝食的人或被迫挨饿的人一样有“想吃东西”的欲望，被迫禁绝性行为的（如古代的太监或受宫刑）或自愿禁绝性行为的人一样有性的欲望，这根本不叫“禁欲”。


    但是，编者绝不主张“纵欲”，而是主张“节欲”，就是适可而止。


    “贪”的意思是指超过所需而不知厌足


    “淫”的意思也是过多，如“淫雨”指的是下得过多过久的雨。


    一般人满足于生活所需不叫“贪”，正常的性行为也不叫“淫”。


    所以，依照习惯一天吃三顿饭，吃到可以维持生命及身体健康那是绝对必需的。如果误解了“贪”字，而故意挨饿甚至造成营养不良，反而以为这是追求真理之道，那就是倒行逆施，大谬不然。


    吃素好不好? 从医学上的证明的确很好。但是人是杂食性的动物, 人的身体也需要适量的动物性蛋白质, 学医或学营养的都知道, 蛋白质对人体而言也有好坏之分, 某些动物性的蛋白质中也有对人体健康有益的。所以在吃素以外,
    适当地补充牛奶、蛋是合理的。有些吃纯素的人, 因为不吃肉类, 所以对米、面及含大量不饱和脂肪 (油脂) 及高普林的豆类、含醣量过高的水果摄取过多, 反而引发了高血脂及高胆固醇的毛病,
    更甚而引发了心血管毛病及中风, 如果是这样, 再坚持吃素有道理吗? 如果一个人必须舍弃健康去追求真理, 那绝对是违反自然而且也是一种执迷。


    在食物方面的不贪, 就是不要太贪求口腹之欲, 明明吃饱了还不停地吃, 或者太执着于食物的精美与珍奇, 如果单只是为了满足口腹之欲或夸耀财富, 恨不得吃遍山珍海味,
    或以各种奇怪残忍的方法去残杀各种生物, 那就不只是 “贪” 而已了!


    我们有幸生活在中国, 各种正常的食物供应无缺, 选择那些能维持生命又有益健康的, 吃到适可而止就好了, 在这个范围以内是无所谓罪过不罪过, 至于要不要坚持
    “吃素” 那是随个人的自由—— “欢喜就好!”


    如果误以为单靠吃素就能得道成佛, 那牛、羊、马百分之百的胎里素, 岂不只只升天?


    至于 “性欲”, 那是传宗接代、延续种族所必须, 要不要去做爱, 也是随个人的自由, 但要求每个人都禁绝性行为, 那是大谬不然的。


    在婚姻中的性行为是权利也是义务, 不然干嘛要结婚? 所谓的 “做爱”, 不论做或不做都必须是基于双方共同的意愿, 性行为不是 “恶”, 断绝性行为也不是 “善”,
    没有肮脏干净之分, 更'
  mdcn: '俱来的，那是原罪吗？


    当然不是，没有食欲无以养生，没有性欲，生命无以创造，没有物欲何来发明创作？


    从灵性蛮高的欲界天神都有食欲、性欲及其他物欲来看，这些欲望不能算是“原罪”，但生而为人、既有灵性，就不可放弃灵性的提升，不可放弃对生命真义及宇宙实相的追求，如果只是一味贪求食欲、性欲、物欲的追求甚而永不厌足，那么将自己完全视之为“物”，灵性完全被蒙蔽而完全不反光时，那么不论是死后来到中阴界下层或最下层报到，又或者未来在转生六道时，其结局一定是很可悲的。


    阳世间的恶心恶行，无法胜数，也无法去写一本灵界的“六法全书”，将各种罪行一一判刑，只能举例式地点到为止，其他的则要靠读者自行去思索，必然会明了，所谓有“公道自在人心”。


    ## 第十九章

    ### 灵界观刑记


    灵界是怎么动刑的呢？有位徐小姐在曾师父施术后，游灵界看到了惊心动魄的一幕。


    讲解完毕，曾法师手捧净水，敲动木鱼，开始绕场诵咒净坛。经过二十分钟，全场无人感应，曾法师要大家解下毛巾，暂时休息十分钟，并起来走动以保持清醒。


    第二次施法，有位徐小姐举手示意：说她看到菩萨的影像。宁师兄提着录音机在她旁边询问，准备录音。


    曾法师：请把菩萨的法相描述一下！


    徐小姐：左右各五只手在摆动，这边第一只手拿香，第二只手莲花指，第三只手是果。


    曾：什么果？


    徐：像苹果又像梨，绿色的。他盘著脚……


    曾：我来请她显现得清楚一点！启请祖师发毫光，本师发毫光，七祖祖师发毫光……


    徐：现在脸部出来了，眉间有个红点，黑发，非常朴素，有十只手，摆的时候金光闪闪。这边是莲花，中间有火，当初没看见，像是莲花灯。


    曾：菩萨的法相到底有多慈祥，请你形容一下，让大家共享你的福缘。


    徐：她很简单，真的是很简单，头发梳得高高的，她说要我好好看他的舞姿。


    众人大笑，徐小姐也笑了。


    曾：你是听到声音吗？


    徐：对！她说她的手不停摆动，就是跳舞给我看。


    曾：是打手印？还是……


    徐：就是一直在摆动。


    曾：你在看的时候，那种感觉是怎么样？


    徐：很好看啊！


    曾：除了跳舞以外是不是能让你到外逛逛？


    徐：我不想看跳舞，我想去看看地狱！不过她刚刚跟我说，等她跳完舞才带我去。


    宁：那你就慢慢看吧！


    此刻徐小姐正聚精会神地在看菩萨的手印，所以沉寂了五分钟。


    徐：她把东西收好，把手上的东西收起来，要带我去。


    哦：——我们来到一座金光闪闪的屋子，就像庙一样。屋顶尖尖的，外观好堂皇富丽，好亮哦！眼睛都看不到里面。


    曾：你可随菩萨进去参观一下！


    徐：外面很刺眼，里面给人的感觉就很舒服。有很多窗户，好凉快，摆设也很简单，不像外观那么富丽，有一张很大的桌子。


    曾：能看到什么神像吗？


    徐：中间神像好高！


    宁：请把神像法相形容一下。


    徐：有一点像佛的大神像，但戴着一顶皇冠好高哦！


    曾：你可以向他求一些事情，例如是否可能让你的先生顺利地进去看看？


    曾：法师的建议，徐小姐不以为然，她说：我可以求别的吗？


    曾：可以呀！如果不想让人知道，默求即可！


    此时徐小姐双掌合十，嘴唇微动，祈求三分钟左右，她说菩萨说可以走了，不要太多。


    曾：现在来到什么境界？请形容一下。


    徐：里面很黑，有一条路，她现在带我进去。


    曾：你们现在走路的还是飘的？


    徐：走路！


    曾：速度快不快？


    徐：慢慢，但是她的手也还在摆动。


    宁：路是什么样的路？


    徐：泥土路，暗暗的——耶？现在有莲花灯出来了！


    宁：这边能看到什么呢？


    徐：我看到有人泡在水里，那个水是好烫的水，烟雾弥漫。他们的脸很红很红，有一个人想爬起来，但是起不来，爬不起是因为他带着脚镣，太重了。菩萨说可以帮他解除脚镣，但他不能离开那个地方，因为他做的坏事太多。


    曾：这里的景观范围很宽广吗？


    徐：好广好广！


    曾：你可以请示菩萨，人在世的时候，做了什么样的缺德事，死后要在这里接受处罚？请她开示！


    徐：杀人……偷情……然后……还是一个……偷情又杀人，则才那个红脸带着脚铐的人就是偷情又杀了人。


    曾：我们再继续向前参观。


    ——开路咒语声——


    徐：我看到斩头的，就像以前看电视叫什么狗（虎）头铡的。


    曾：正在处罚中吗？


    黄：没有！……哦！有带人来了！是个男的，头发乱七八糟，脖子套着绳子。先把他吊起来，舌头伸得好长！然后把头按在刀口上。


    曾：如果你不敢看，可以把头转过去，会怕吗？


    徐：不会！


    曾：押他过来的人是怎样装扮？


    徐：一般的士卒。就像衙门内的捕快似的，戴着帽子。


    曾：请示菩萨，犯了什么罪孽，应受此罚？


    徐：诈了别人的钱财，诈人家庭，又去破坏别人的名声。所以吊起来让他吐出舌头一阵子以后，时间到了再斩头。


    曾：斩头的现场总是不太好看，继续求菩萨再往前走好了。


    徐：菩萨走得很愉快，可是我走得好累！我请菩萨的莲花灯往左边照，我看到鞭子在抽打女人！


    宁：为什么被抽打？


    徐：奸夫淫妇！


    曾：很多人吗？


    徐：好多人，古装时装都有，最多的是现代的，穿得花枝招展，抽打得皮开肉绽。可是很奇怪，还是一样的花枝招展！古装的在哭，哭得很伤心，时装的没哭，抽打的人在骂现代的人。


    宁：骂什么呢？


    徐：不要脸！打得这么厉害都还嬉皮笑脸！


    ……


    徐：菩萨停下来了。她说她也要休息休息，她站着，手的动作这样子……这样子……除了手的摆动，还转个圈圈。哦——她的脚指头好漂亮！她的脚好修长！我们又开始走了，我看到一个老爷！


    曾：什么老爷？


    徐：关老爷！（编者按：红脸之故，应该是一位官差才对）有两根柱子，他坐在桌子后面，正准备处罚人，旁边站了很多官差。来这里的都是拨弄是非、小偷等罪犯，人数很多，将军气得脸红红的。


    宁：那柱子有多高？


    徐：好高好粗，绳子有钩，套住脖子往上一拉，上面有刀……（此时徐小姐小声地自语：我看到头掉下来了！）


    曾：请示将军，像这样轻微的过错，为何受此重罚？


    徐：他说阴间律法与阳间不同，不像阳间，小错就可以算了。在这边看来是蛮严重的！因为他们没有断手断脚，即使向人乞讨，一样可以维生，为什么要偷呢？做人一定要做好本份的事，不要破坏人家的名誉……


    徐：他说还要走！前面是非常广大的地方。菩萨说人在阳间做了很多很多坏事，来此接受处罚，所以看不完的。一般人想象中认为没什么的丁点过错，到此都要接受重罚，而且在转世投胎时会影响其去处。


    曾：即然说到转世，是否可以请菩萨带你去看转世投胎的情况？


    徐：……


    ——念开路咒——


    徐：现在有人要投胎，菩萨说这两位能投到很好的地方，好好做人，但是不要到太好的人家，宁可苦一点，否则因太舒服而不知长进，反而害了他。


    旁观者哄然大笑。


    曾：你决定以后，看到他们投到那里去了吗？


    徐：是一个小康的家庭，我看到他们的房子，看得好清楚。


    曾：看到这里，你想不想休息一下？


    徐：菩萨不愿休息，她手指上面，要带我去看天庭。


    ——念咒声——


    曾：你现在到了什么地方？


    徐：我好像在爬楼梯，菩萨不是有很多手吗？她的手一直循环而上，我就是攀她的手上去。


    宁：爬的时候觉得很轻松吗？


    徐：好像小猴子吊单杠！


    此语一出，旁观的人实在忍不住大声地笑了起来。


    徐：到了！我看到两块匾额，中国字，但不太清楚。地上一片绿油油的草苹，屋子的后面有光芒，我看到一棵水果树。因为我的口好渴，她要摘水果给我吃——哦——就是刚刚她手里拿的水果，不是苹果也不是梨。样子像五爬苹果，但比苹果小，绿绿的，你们没有看过！


    旁观信众无法领会水果的样子，按捺不住，七嘴八舌提供了一大堆水果的名字，诸如龙眼、芒果等等，但都不是。


    徐：我把水果接过来了！


    徐的先生：尝尝看什么味道？


    徐：没有味道也没有香气，我现在咬下去，有喝茶的那种感觉，甘甜甘甜的。为什么这种水果有点像吃甘蔗一样？甜汁吞下以后，要把口中剩余的东西吐掉。


    曾：你刚刚说那房子会发光，究竟是什么情况？


    徐：屋子是中式的，但有点像西方。它的光芒就像人家基督教天主教那种光芒。


    （注：这时外面正有迎神乐队路过，锣鼓声吵翻天，无法录音。）


    曾：因为外面太吵，你向菩萨礼拜，感谢她给你这种奇遇，以后有机会再请她帮忙。


    徐：好！


    曾法师手握真诀，在徐小姐印堂前比划比划，猛一跺脚，徐小姐解开毛巾，满脸喜悦。大家都以羡慕的眼光缠着徐小姐问东问西。徐小姐的先生很体贴地说：“你刚才已吃过那甘甜的水果！”


    为了验证，每次法会结束，总会跟“进去的人”聊聊更详细的实况。曾法师指着堂上供的一尊千手观音，问徐小姐刚才菩萨的法相，是不是像这样？


    徐：头上没有戴冠，只有黑色头发的高髻，脸部比较长，不像这尊这么圆，把这尊的冠拿掉就像了。


    曾：你刚才在庙内祈求时，说了一句不要太多，是什么意思？


    徐：她说人不要太贪心，不要求得太多，我只求了我先生的事业，然后他的家庭、我的家庭、他的父母、我的父母、及兄弟姐妹都能事事如意，还有我的身体健康。


    曾法师此时心有所感，举出往日一位小姐进去的实例也是千手观音带路，内容十分精彩。


    徐：人不能做坏事，那边真的在处罚耶！是好广好广的地方，一路上都是在处罚。


    曾：整个过程从头到尾你都很清醒吗？


    徐：很清醒！而且还记得，不用录音带我都可以讲得很完整。


    曾：这点可以证明这种法术绝对不是催眠术。


    徐：我觉得没有被催眠，因为我进去看的景像全都记得。


    曾：刚才进入地狱时有没有阴森森的感觉？


    徐：不会！有一阵凉风吹来，菩萨的莲花灯一照，就暖和了。


    曾：今天探讨的内容，可以发表上吗？不用本名也没关系！


    徐：没有关系呀！不过要看我先生的意思。


    徐小姐的先生：我觉得这个事情既然是你看到，然后向世人发表，让大家了解，应该没有什么不对！


    信众们：你看到地狱那些现象，心中会不会害怕？


    徐：不会！我觉得他们好可怜。


    宁：你看他们斩头的时候有没有血喷出来？


    徐：没有血。


    宁：近看还是远看？


    徐：近看！我就在断头台的下面，不会怕。


    ## 第二十章

    ### 人身难得须珍惜


    人之生而为人是极其幸运的，也是需要莫大勇气的。


    因为要想大彻大悟地发现生命的真义与宇宙的实相而成为觉者（佛），人间的修持是绝对必要的，也是唯一的途径，如果不历经人世的沧桑与磨难，要想跳出三界、立地成佛，那犹如水中捞月，缘木求鱼。更像是抱着钻石的原矿，希望它不经琢磨就能自然璀璨发光一样的荒谬。


    人在投胎转世到这个五光十色，苦乐参半的阳世间之间，全都明白此生的目的及需要重修的科目，然而绝大多数人来到人世之后，却纷纷迷失在人欲的洪流之中，轻忽了真如灵性，而由着生物性的本能牵着鼻子跑，一生为名利权色奔波劳碌，甚至连停下来喘口气，回头想想自己到底“所为何哉？”的机会都没有。就此昏昏噩噩，匆匆忙忙过完一生，然后依旧是两手空空，脑袋空空地回去，于是乎下一世又再重新来过，重新接受生、老、病、死等八苦的煎熬，或竟而投入其他恶道，而减少了修行的机会。


    编者一再强调：“轮回过境室”的灵界三书是给一般人看的，不是给佛菩萨、大修行者看的，所有的观点都是以一般常人的观点出发。


    所以，不必去觉得“身是菩提树、心如明镜台”的说法如何幼稚可笑，相较于“菩提本无树，明镜亦非台”有如脑筋急转弯、耍嘴皮子的论点，对一般人而言，前者必然更实在。因为一般人是不可能有六祖的天生慧要悟性，站在一个不平等的立足点上去苛求凡人当下开悟，立地成佛，那是驱牛入瓮、渺不可得的。


    也所以“时时勤拂拭，忽使惹尘埃”是适当可行的。


    人之所以为人，是必经尘世历练的，没有人可以因为远离红尘道场，离群索居，由于深山清修，不惹尘埃而得道成佛的。


    因为人之所以投胎转世为人，必然是有着未尽的修行、未了的因果，否则为何要来？如果是超高层级的佛、菩萨倒转慈航为慈悲渡世而来，那原本就不同于一般人，根本不在我们探讨之列。


    所谓“山中修十年，不如人间修一天”，出家不是发现生命真义和宇宙实相的唯一途径。佛说出家是大丈夫的行为，但绝不是任何人遁人空门就能成佛。否则全世界的人一出生就一一剃度出家，个个成佛、鸡犬升天，那又何必有人间道场呢？而且果真如此，一百年后，地球上就不会有人类了。


    不要误以为编者反对出家，我真心敬重那些发心潜修，特别是确定知道自己为什么出家的出家人。但是绝不是某些人误以为避开红尘道场，舍弃人生责任，不落因果就能成佛。


    达摩祖师面壁九年才得道，那该不该面壁呢？面壁对不对呢？


    如果已经有了这样的修为，认为该去面壁那就去面壁。如果一般人没有正确的认知与相当的修为，面壁也不过是徒然，只怕面壁九年之后，只会变成一具骷髅而已。


    在此为了探究真理：实话实说，编者甘冒大不讳地举个实例：


    民国初年有位百年难得一见的旷世奇才，出身于富裕世家，国学的要基极深，又留学西洋，不论文学、音乐、美术、戏剧都有着极高的造诣，并留下了许许多多脍炙人口的作品。


    年少轻狂的时代，一如当时文人风流的行径，琴棋书画、风花雪月、饮酒嫖妓的浪荡人生，中年时却突然“自以为顿悟”而遁人空门，留给世人一片惊愕，并在青灯古佛中度过馀生直到圆寂，并一直被尊为大师迄今。


    但是从他一生的传记中，却发观到他在出家之前，有红尘道场 上有着许多实实在在不可原谅的行为。


    一、为了不孝：从早年的浪荡、飘泊异国到出家以后，对早逝的父亲及寡母，从未尽过一天孝道。即使家境富有，父母并无冻馁之虞，但中国人所说的孝道并不尽然只是金钱物质上的甘旨奉养。何况他连一天的甘旨奉养也没做到过。


    二、为夫不忠：虽然民国初年的时代，一夫多妻仍是社会普遍的风气，但这位旷世奇才对发妻几乎是视同陌路，在外或逢场作戏或另结新欢，先后至少有两位美妾，除了享受齐人之福外，从来不曾见他负起过做丈夫的义务。


    三、为夫无情：在决心出家之后，完全不告之妻妾，虽然他事先做了经济上的安排，但试问夫妻之情只在于“钱”吗？一只狗养了几年，也不至如此绝情地弃之如敝履吧？


    四、为父不慈：获知其出家的消息，外藉妻子伤心欲绝地携了幼子兼程赶来寺外，希望他能打消此念，他果然是铁石心肠，竟然连见一面都不肯，对已身所生的子女从未尽到一天做父亲教养的责任，出家时连这一面也不愿意见。


    不慈如此，够资格为人父吗？而令人惊愕的是宗教界迄今仍将他这种行为大肆歌颂，认为这才是真正的“能舍”。


    五、为友不义：出家时，他正在学校教书，连至交好友也一概隐瞒不肯告之，好像深怕朋友抢了他成佛的名额，有友如此，不如割席绝交。


    的确的，以他这种非人类所能有的修行决心，出家后真的是弃去一切及食享受，如苦行僧般地潜心佛法，而且以天纵之奇才果然也有相当成就，晚年时四处阐扬佛法，校定佛经，不可说没有贡献。


    但编者想要问的就是：一个几乎“五伦”全亏，冷血绝情到如此地步的人，遁入空门就算“彻悟”吗？圆寂后就能得道成佛，证得涅槃、不入轮回吗？”


    编者认为不论宗教界是如何歌之颂之，那只是纯粹的本位主义，一如往昔某些医生，为了标榜自己医术的精湛或为了实质利益，经常鼓励无病无痛的正常人割去盲肠一般的无谓。更像卖药的绝不会在广告上谈这种药的副作用的。


    他最大的罪过并不只是五伦有亏而已，而是给后世的一般人留下了一个最坏的榜样；使人误以为父母子女配偶朋友之情皆是空的，是可以冷血无情弃之不顾的，美其名曰“看破红尘”。误以为只要毅然舍弃迷些遁入空门就可证道成佛，而不管高堂正待奉养，妻儿嗷嗷待哺。


    一个人如果一心只追求自己证道成佛，而不管其他众生死活（即使那是父母子女配偶朋友），就算把几万部经文读得滚瓜烂熟，敲破几万个木鱼，坐破几万块蒲团也不过是缘木求鱼而已。


    “红尘”绝不是用这样的方式来“看破”的。


    宗教只是追求真理的方式之一，每一个人都有选择自己追求各种方式的自由，所以儿童的出家是绝对不应该被鼓励的，因为儿童的心智尚未成熟，并没有正确选择的能力。


    编者也不以为学校刚毕业的年轻人适合出家，试想连红尘尚未踏入又何来看破呢？如果只是为了人生的无常，恐惧于尘世中的人欲横流而不敢去接受历练，早早遁入空门，眼不见为净，如同下决心不去参加会考，就不会有“落榜”的问题。如果是抱着这种心态，那不是“看破”而是逃避，那又何必来人世中走一遭呢？


    生而为人，就有“做人”的天赋责任，如果人都做不好，或者根本不想做人，只是一心想成佛，那要产是水中捞月而已。


    至于那些把剃渡穿袈裟的生涯当成了职业、不事生产、贪图供养的人，那就更是等而下之，不必浪费笔墨口水去谈了。


    出家去追求真理好吗？当然很好，但是一定是在已经完成了做人的责任之后，不是在之前，更不是在中途放弃做人的责任。


    所以“在家”也一样可以追求真理，而且是必须的，如果认为先昏昏噩噩地混日子，反正等以后正式出了家再来修行，这种想法是大错特错，因为真理无处不在，一日三餐藏道理，在日常生活中的一念一行、一事一物都可以发现真理。


    每个人都应该要结婚的，因为婚姻而与配偶发生的互动关系是最好的修持方式。（否则人类就应该天生是中性的，何必有男女之别？）


    于是又要谈到“欲”这个问题了。生命所以落入轮回，难以超脱，全是因为贪嗔痴等等的欲念。


    那么“禁欲”对不对？是否修行就一定要“禁欲”？


    生而为人就不可能“无欲”，连欲界天神都有欲，何况是凡人？


    如果“欲”是不必要的，那么人生来就该“无欲”，就像人没有尾巴和角一样。那么既然有“欲”又何必“禁”呢？


    想想看：禁了食欲，用不了几天，全世界的人就饿死光了，那又何必来转生人世？


    禁了性欲，百年之后，世上也没有人了。


    禁了物欲，人类必定还处在远古时代，连语言沟通都有问题，还谈什么追求真理？


    想想如果禁欲的主张在几千年前就被实现，现在还会有你我可以 在这里探索灵界、追求真理吗？


    所以根本就不需要“禁欲”，如果绝食就可以得道成佛，那些被活活饿死的非洲难民，尤其是一出生就饿死的婴儿岂不全成了佛？


    如果禁绝性行为就可得道成佛，自古以来从小“净身”人宫当太监的岂不人人成佛？


    其实绝食及禁绝性行为也不足以“禁欲”，绝食的人或被迫挨饿的人一样有“想吃东西”的欲望，被迫禁绝性行为的（如古代的太监或受宫刑）或自愿禁绝性行为的人一样有性的欲望，这根本不叫“禁欲”。


    但是，编者绝不主张“纵欲”，而是主张“节欲”，就是适可而止。


    “贪”的意思是指超过所需而不知厌足


    “淫”的意思也是过多，如“淫雨”指的是下得过多过久的雨。


    一般人满足于生活所需不叫“贪”，正常的性行为也不叫“淫”。


    所以，依照习惯一天吃三顿饭，吃到可以维持生命及身体健康那是绝对必需的。如果误解了“贪”字，而故意挨饿甚至造成营养不良，反而以为这是追求真理之道，那就是倒行逆施，大谬不然。


