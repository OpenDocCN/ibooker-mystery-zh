    在英美两国的前导之下,欧洲各国的灵学研究机构也在专家学者的积极参与之下纷纷设立;法国成立了“国际灵学研究所”,德国、瑞士、意大利、荷兰、挪威、丹麦、瑞典各国也相继成立了以科学、客观、超然的态度来研究灵魂学的机构——


    “超心理学研究社”。


    在著作方面:


    一八八六年,英国“灵学研究社”的创始人之一古尼教授出版了“生命之灵”上下两册、记载各种幽灵出现的报告,是历史上第一部灵魂学研究的巨著,迄今仍为灵学研究的常用工具书。


    一八九四年,英国“灵学研究社”根据社内长期对灵魂学的分析研究,出版了“幻觉调查”一书成为第二部灵魂学的著作。


    一九〇三年,麦尔斯总结了“灵学研究社”前二十年的研究,出版了“人格与肉体死亡后的生命”上下两册,是为灵魂学研究的第三部著作。


    除了团体研究,欧美各国也陆续成立了不少私人的灵魂学研究室,如英国的普里斯,美国的卡灵通等等。


    灵魂学研究起先一直是民间团体的性质,一直到一九二七年,著名的英国心理学家麦克道卡在美国克拉克大学以“将灵学纳入大学研究”为题做专题演讲时,受到美国杜克大学创办人费尔博士的赏识并聘请他到杜克大学主持心理学系并筹设超心理实验室,同时听到这场演讲的生物学者约瑟夫·莱因夫妇也深受感'
