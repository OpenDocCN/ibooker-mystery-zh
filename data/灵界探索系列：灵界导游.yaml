    其中的人、事、地、物则由模糊飘渺进而越变越清晰, 终至完全实存, 这好比是看电影及电视时, 两个不同场景重叠时 “淡入、淡出” 的效果, 差别只在灵界的变化在灵界居民的感觉中,
