  md: '成模式）吸收各种相同的物质元素，包裹在“因身”的外面，而成为物质化的灵体或肉体。如果是决定转生人世，那么在构成肉体的物质元素上，人和畜是相同的，所不同的只是“以太模式”就是人的“共业”或人的共同构成模式。这种“以太”类似道家所说的“气”（不是“气体”的气）。这个物质化的肉体就是佛教所称的“应身”。


