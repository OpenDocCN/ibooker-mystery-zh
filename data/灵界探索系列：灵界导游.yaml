  md: '# 第二十二章 别信神捉们


    当下回了这封快信,表达我乐于效力的意思。不直接利用信末的电话号码;我有特殊的顾忌。


    第三天中午,冷太太来了电话。问明是我本人,她如释重负地说:


    “感谢你肯帮忙。明天上午我带阿强去拜望你,可以吗?”


    “我等你。开车来吗?”


    “搭车。”


    放下电话,我进入静室查察这位冷太太身世。透过电话线传来的信息,通常都能找出些蛛丝马迹。果不出所料,冷态度太干干净净净,问题出在儿子身上。


    第二天上午十时许,门铃就响了,来得够早,可是进门的却只有冷太太一个人。三十多岁,中等身材,是那种和和气气、讨人喜欢的朴实农村女人。


    “真不好意思,都到门口了,他忽然像发神经般掉头开溜,也不知跑到哪去?这孩子,不知道中了什么邪?”坐定之后,冷太太颇为焦灼地解释阿强临阵脱逃的事。


    “德原——他熟吗?”


    “他两个伯父都在德原,还有几个在德原工作的同学。一放假,就往德原跑,惹了不少麻烦。”


    水开了,我沏茶。“都是些什么麻烦呢?”


    “唉,”话一出口,随着一声长叹,冷太太眼眶先红了。“就来造孽,高中读得好好的,忽然性情大变,不上学了,被朋友拉到一间铁工厂学技工,晚上四处游荡。学会抽烟喝酒不说,经常打架滋事,害我一趟趟跑派出所、跑刑事组。他爸爸在林业局上班,经年住在山上林里,一个月难得回家一次。有天晚上他爸爸忍无可忍,把他捆起来狠狠揍了一顿。没料到变得更糟,他半夜会无缘无故跑到街上去砍人。”


    “哦?!”


