    但如果是被迫自杀的不在此列，例如父母吵架、一时气愤、强灌子女农药而死的。强迫他人自杀致死者罪行极大，即使自己也是自杀而死，也不会落入“迷魂林”中，而是直接下“枉死城”报到而已。


    那么帮助自杀及鼓励自杀有罪吗？


    像国外有医生帮助久病厌世的病人“安乐死”，这很复杂，因为现代医药发达，原本一定会死的，因为药物及人工维生系统的长足进步，使病人得以继续苟延残喘地“活”下去，但如果是完全没有希望康复的，那不只是残忍也是违反自然的。因为死亡是最自然不过的事。除非有把握能让病人康复，否则徒使他多受苦刑而已。这时如果是出自病人自己的意愿，那么以慈悲心怀协助使他安乐死的医生可以说是无罪的，但若是这位医生其目的只是为了赚钱，那么就必定有罪。


