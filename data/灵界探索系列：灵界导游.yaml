    这一类型的“鬼”与“以太体”的“鬼”最大的不同，是它不具有阳世的物质成份，而是由精细的灵界物质组成，在中阴身的灵界来看，它是有形有体的，所以称之为“灵体”。但是在阳世，因为其组成的灵界物质非我们活人肉眼可见，所以基本上我们是看不见这种“灵体”的，但是只有几种例外情形可见到这种“鬼”：


    一、活人因天生的“阴阳眼”或后天修炼而有“灵视”能力，具有捕捉那种灵界物质的特长时，就可以看见。


    二、这种“鬼”（灵体）因为对阳世仍存有某种强烈欲念，或满心怨恨时，它也可以聚强大的念力，吸附阳世物质界细微的物质，而在短的时间内存在的。如果是为了作弄人、吓人或报仇，则也可以显现恐怖的模样来，甚至于意念强大时，也可移动阳世的物体，如飞砂走石，造成小小的旋风、砸盘丢碗等等，因此这种“鬼”要显现穿什么样的衣服或拿什么东西的样貌那也不是难事。


    不过，它们的力量仍未大到可以掐死活人或什么把长指甲插入人体的地步。


    当然这种“鬼”一旦飘渺无依时也会被邪法师所利用，通常是提供一个舒适的能量环境给它们依附，并不时供应能量，而且还要谈条件，所以自古就有“养鬼、役鬼”的说法，不过由于邪法师本身也要输能量给这种鬼，久而久之对其本身能量耗损也极大，下场通常是不会太好的。


    编者并不打算把这本书变成恐怖小说，只是为了解释一些灵学上的现象才提及，所以就此打住。'
