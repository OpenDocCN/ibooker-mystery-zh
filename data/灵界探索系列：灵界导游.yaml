    # 第二十一章


    # 无师自通的医生


    他有把“魔刀”。


    巴西神医阿里戈是超自然医术史上最不可思议的人物之一，逝世时有二万人参加他的丧礼。


    阿里戈原名何塞·弗雷达斯，是一个农夫的儿子，一九一八年生于巴西美景市，以绰号“阿里戈”为世人所知。这个名字得自童年，原文的意思是来自乡下的家伙。


    阿里戈念书时，偶尔会受幻觉困扰。他看到炫目的异光，有时又听到一个声音用陌生的语言说话。长大后，他到附近一个铁矿场工作，二十五岁时当选当地工会主席。他曾领导工人罢工，迫使当局改善工作环境，因而遭资方解雇。随后，阿里戈在孔贡阿斯·多坎波镇一家酒吧工作。


    他每晚都受梦魔困扰，醒后往往头痛欲裂，这些梦比年轻时的幻觉更厉害。在梦境中，他看到一家医院的手术室，一个体格魁梧的秃头人正向一群医生和护士讲话。那粗哑的声音正是他年轻时就开'
  - '[PAGE 234]


    始听到的。由于怪梦与头痛连续不断, 阿里戈备受困扰, 只好经常到教堂祈祷求助。


    后来, 梦里的形象透露自己是弗里兹医生, 德国人, 死于第一次世界大战期间, 所以无法继续工作, 他知道阿里戈是个极富同情心的人, 所以选择他来继承自己的事业,
    他说此后阿里戈只有帮助周围饱受疾病折磨的人才能得到安宁。


    随后几年, 这些印象深刻的噩梦和剧烈的头痛一直缠绕阿里戈。到一九五〇年, 事情发展到他也不能控制了。


    那一年正值举行大选。到镇上访问的人中, 包括比登科特,他十分支持矿工的行动。见到阿里戈后, 深受他对矿工的热烈支持感动, 于是邀请他出席邻近美景市举行的政治集会。集会因事延期,
    比登科特请阿里戈到自己住宿的酒店过夜。


    当时, 比登科特患了肺癌, 他的医生曾劝他马上到美国动手术。阿里戈对此事一无所知。


    那天晚上, 比登科特快要进入梦乡时, 房门突然打开, 有人把灯亮了。这人赫然是阿里戈, 他的目光呆滞, 手里拿着一柄剃刀。说也奇怪, 比登科特并不害怕。阿里戈用重浊的德国口音说话,
    声调和他平日的不一样。他说这是急症, 要马上动手术。接着, 比登科特失去知觉。


    比登科特醒后, 发现他的睡衣被割开, 染满鲜血, 背腔有一个整齐的切口。他穿好衣服后走到阿里戈的房间。


    阿里戈初时以为比登科特喝醉了, 但随即看到切口, 也看到血迹斑斑的睡衣。不过, 他记不起曾经到过比登科特的房间, 也断然否认有参与这件荒诞的事情。比登科特大为震惊,
    立即赶飞机到里约热内卢去看自己的医生。


    这时阿里戈很害怕, 心想或者自己会有阴魂附体, 真的替比登科特动了手术; 很可能这就是那些梦中的声音指示他做的。


    消息不久传来, 医生检查了 X 光照片, 认为比登科特在美'
