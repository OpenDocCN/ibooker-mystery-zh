    # 第六章 中国人和佛教


    佛教在传入中国之前，如两汉、先秦以至更早的世代中，祖先祭祀甚或原始报道满教的祭祀习俗中，除了实物供品的直接奉祭，也常伴随有焚烧实物或焚烧代用品奉祭的行为。


    推而广之，则不得不提到中国人原始陪葬的习俗，依据考古学者对“山顶洞人”及“西安半坡遗址”研究中发现：


    在原始人的观念中，生与死之间的界限并不很明确，甚至也没有“有、无”的鸿沟来将活人和死人隔开，似乎总以为：死去的人只不过是到遥远的地方去过另外一种方式的生活，甚至比他原来的生活过得更好，而且仍然与活着的人保持着很密切的联系。我们有理由相信这种观念绝不是因为对死亡所代表的“结束、虚无、绝望”一种补偿心理所产生的幻想，而应该是一种相信“灵魂不灭”的宗教雏型。原始人这种观念从何而来，迄今我们仍不清楚，但是至少在许多对远古文物的考古研究上，却提供了不少这种原始信仰的证据。在中国，迄自发现的最早具有墓葬仪式的，是生活在距今一万八千多年前的山顶洞人，相当于旧石器时代的晚期，经考古学家的掘发现；山顶沿人居住的洞穴分上下两层，上层供活人居住，除了有用火的生活迹象，还有骨针，石器和一些装物以及婴儿头骨的碎片。下层则是安置死者遗体之处，除了有三件完整的人头骨和部分份躯干骨骸，在遗骸四周还放置有石珠、骨器坠子、钻孔的兽齿等饰品陪葬物，最主要的是骨骸周围还散布着红色的粉末（赤铁矿粉），可能是用来象征血液，表示亲人对死者生命复活的期望，加上陪葬物的证据，或可证明山顶洞人时代对生与死之间的观念，这也是在中国所发现最早的相信死后生命依旧存在并继续生活的原始信仰证据。


    此后，在属于新石器时代，距今六、七千年前的黄河流域“半坡遗址”(属仰韶文化系统)，考古学家也发现了具有规模的氏族公墓地，并具有各式各样的埋葬方法，其中主要的除了陶制、骨制的日常生活用器、饰品的陪葬物之外，还有米壳等真的'
  - '[PAGE 64]


    # 灵界导游


    食物，在在显示了相信死者是去到另一个地方过新生活的信仰。而最重要的则是在此出土的孩童瓮棺葬，孩童的遗骸是被安置在瓮罐之中，但用来做盖子的陶钵或陶盆上却有人为刻意钻通的小孔，经考古研究家认为这是留供死去孩童的灵魂出入的孔道。


    其次，在同属新石器时代的“裴李岗墓葬”的考古中也发现了为数颇多的陪葬物，而且男女有别：男性多为石刀、石斧，女性多为纺轮及磨盘，除了显示生前男主外、妇主内的分工，甚至相信死者在死后的世界仍是依照其生前的性别继续分工合作的过生活。


    同时，由于亲族合葬墓的发现，也可证明当时的人们是相信死后的生命与生活型态以及亲族关系也是一如其生前的，而孩童棺盖上的孔道，更证明了当时的人们已经有着“灵魂不灭”的坚定信仰。


    也正因为这种原始信仰，中国人对死后生命的存在与继续在另一世界生活的观念一直沿袭下来，并不因为后期正式宗教出现而受到丝毫的影响，也因此陪葬的习俗在中国历代的丧礼仪式中是非常重要的一环，从秦始皇陵地下的，庞大兵马俑阵仗、马王堆汉墓中全套贵族专用的珍宝器皿，到清朝十余位皇帝后妃陵墓中价值连城的金银珠宝陪葬品，甚至一般民间陶瓷、玉石的宝物冥器，数千年来，中国人不惜将珍贵的金银珠宝，日常生活用品，生产工具，甚至烟、酒、赌具等嗜好品姑且同死者埋进地下，都在在显示了这种相信“死后生命”及“阳间灵魂世界”的观念是如何的根深蒂固了。


    尤其是不少历朝历代的帝王贵族，更不惜以众多的活或活的牲品（特别是马匹）来殉葬，以供其在阴间驱使差遣，虽然后来渐为陶俑纸人来取代，但其基本用意却是完全相同的。


    现今，活人或实物的陪葬风气已被各种代用品所取代，除了金银首饰仍用实物之外，其他一应生活用品全都代之纸扎的冥'
  - '[PAGE 65]


    器，从屋宇宅院、厨房、箱匣到桌椅梳妆台，甚至连金山银山，童男婢女甚至现代化的收录音机、电视、名牌轿车或麻将赌具，无不可用纸扎品来替代，当然这几乎是为了经济上的考虑以及便于快速焚烧或许人们是相信与实物陪葬物相比，纸扎代用品在焚烧后化为无形的意念，将更能合乎阴间无形的死者亡灵所用。


    传统陪葬品除了实物或纸扎的代用冥器，各式各样的纸钱，冥币自然也是不可或缺的主要必备物。


    先谈求神祈愿方面，焚烧的金纸有福金、寿金、刈金、天公金、五色金等等，令人不禁怀疑有千变万化大神通、法力无边的神明，难道也需要没有什么本事的升斗小民焚烧金银财定（象征性的代用品）供应日常所需吗？这岂不是像大富翁拿着金饭碗向乞丐要饭一般讽刺而可笑？


    但是古话说“钱能通神”，的确所有人都知道“有钱能使鬼推磨”，而绝大多数人却不知道这句的下一句是“怀币可差神扫地”，充分说明了神也是需要钱的，为什么呢？


    其实从原始“萨满教”万物有灵论以来，中国传统道教以及民俗宗教中几乎是凡天地山川、树石花草、碗筷桌椅、床灶门梁全都封了神，其中不乏因笼络谄媚而被“神化”的鬼怪精灵、魑魅魍魉，也有原本神格就不高的，如社神（土地公）、灶神以及神祇周围的兵将（阴兵阴将），而在民俗宗教中，极多明明扛着正神招牌的，往往又是略有鬼通的孤魂野鬼在那儿装神弄鬼、狐假虎威而已，在此附录清朝大才子袁枚在其笔记小说《子不语》一书中所载的一则故事——“成神不必贤人”：


    有位叫李海仲的秀才，为了前往京师参加秋试，从苏州雇船北上，到淮上时，突然来了一位旧时姓王的邻居要求搭个便船，李海仲答应了，但是到了晚间，这位姓王的邻居明白地表示自己不是人而是鬼，此去是为了向一位在京师刑部任职的汪某人索债，由于这位汪某人是李海仲的亲戚，李海仲闻言大惊，只有好'
  - '[PAGE 66]


    言相劝，试图居中化解……


    姓王的鬼魂终于同意只要汪某肯还钱，必不伤害他的性命，一人一鬼来到京城之后，由于鬼魂作祟，汪某突得疯病，终于李海仲居中调停，汪家还了债，鬼魂才放过他……


    李海仲终究没考中，一人一鬼又同船回江南，鬼在船上时，一切食，只闻一闻而不吞食，但热的食物被他一闻，立即变冷……


    船行至宿迁（江苏省北边的小城）时，鬼魂说：“某村唱戏，我们不妨一起去观赏！”李海仲答应了，一人一鬼在戏台下看了几出戏，鬼魂突然不见了，只听到附近突然传来飞砂走石之声，李海仲一个人独自回到船上，傍晚之时，鬼魂竟然穿了华丽的官服回来跟他说：“我不回去了，我要留在此地做关帝了！”


    李海仲吃惊地问他：“你怎么敢做关帝？”鬼魂笑着答说：“世上观音关帝，皆鬼冒充。村中唱戏是为向村中关庙中的关帝还愿，那位在村中冒充关帝，接受村民牲礼香火供奉的孤魂野鬼，比我更无赖，连我见了他都很生气，所以和他打斗了一场，打败了他又把他赶走了，刚才你没听见飞砂走石之声吗？正是我在和他打斗……”


    最后，姓王的鬼魂就这样留在村中，冒充关帝接受村民的供奉，而李海仲则一人返乡，并且替他把讨债要回来的钱带给了他的妻子。


    虽然这只是一则笔记小说中的故事，但是重点不在于去追究其真假，而是在这则故事中透露的一个信息；


    在我个人的研究及认识中，神佛是客观存在的，不论是世俗所以为的佛，菩萨及各路神明、或高级灵、高层级的智慧生命，当然包括了故事中所说的观音关帝，但是这并不意味着全世界各种宗教在各地庙宇教堂上所膜拜的神祇就一定全是真的，特别是那种有具体偶像崇拜，有牺牲血食际祀风俗的庙寺神祇，冒名来'
  - '[PAGE 67]


    接受祭祀供食的孤魂鬼甚至魑魅魍魉等低等动物类也就特别多，举例而言：在这世界上，顶级名牌服饰确实是存在的，但各地的劣质仿冒品也是存在的，我们不能因为看见或买到一件挂有唯妙唯肖名牌标志的服饰就相信这是真品，同样的，也不能有因为总是发现或听闻有太多的仿冒品就否定了真品名牌服饰的客观存在，两者都是过于武断而欠思考的。


    同样的，在我个人的研究与认知中，高层级的灵体（神祇）是完全不需要接受凡人供食的，而层级越低的灵体则越需要供食，所谓层级低的则不分正或精怪邪鬼，但是此处所说的供食并非物质性的，而是能量的代用。


    以食物而言，不论是素界或荤性牲礼，层级低的灵是以鼻嗅的方式吸收其中的能量，并不直接食用（否则祭祀鬼神时，只见神像伸手抓起鸡腿猪大头嚼，或者代祀的水果，鱼肉突然在眼前不翼而飞岂不是会吓死一堆活人？当然若真有此事随时在发生，那么也就不必去探讨或争论鬼神及灵界的有无了。）


    对于纸钱，原理也相同，根据质能互换，能量不灭的定律，纸钱经过焚烧之后，会转变为能量，低级灵可以吸收这种能量，情形一如充电。


    在此有两项关键性的理论必须先确立：


    +   一、灵的层级及能力有高低，心性及作为也为也有正邪之别，经正式封有官职称为神的，能力层级有高低之分，连最低层的土地公（通常被视为阴神）有些像阳间的里长，没人把他当成官，但却是正式任命的并有一定的权力。没有官职的高级灵称为仙，而没有官职的低级灵则是一般所谓的亡灵鬼魂。至于修为超越仙，超高层级的灵则为佛、菩萨。


    +   二、意念可以发出能量，能量可以形成物质，而且三者可以构成一转换的循环。


    由此可以再谈到低层级的神与鬼是需要吸收能量的，而这种'
  - '[PAGE 68]


    # 灵界导游


    能量全来自物质界（阳世）的物质经焚烧分解时释放转化的能量。中层级的神与鬼及高层级的灵可自行吸收宇宙能量（藉阳光或宇宙射线），也可吸收物质转化的能量。而超高层级的灵则可自行制造或放射能量，而不必吸收其他能量。


    （注：即使放鞭炮也能产生吸引鬼神前来的能量，很多人依据传统观念很强，足以满足它们的需求而欣然离去）。


    在祭祀祖先或亡灵鬼魂时，焚烧的多为银纸、锡箔、元宝（锡箔折成的空心锡锭）、库钱或往生线，对阴兵阴将或阴差鬼卒还要加烧“甲马”（相当于汇标或礼券），晚近则也有焚烧“冥币”，一如阳世的钞标，上印有面额，差别只在这种冥币是印了“冥国银行”发行，通常面额极大，一张有万元、拾万元、百万元的。


    焚烧冥币有用吗？亡灵鬼魂收得到这些钱吗？而这些钱真的可以在阴间（灵界）流通或购买东西吗？”


    一些无神论或持怀疑论者经常会提出非难：


    +   一、假如真的死后有灵魂，灵魂已经没有了肉体，为什么会需要物质的供应或非要钱财去购买东西呢？


    +   二、大量的焚烧纸钱一如超额的发行货币，难道不会在阴间造成通货膨胀吗？


    +   三、金银纸钱或冥币都是民间自行印制，规格币值全无章法，到了阴间可以互相兑换流通吗？


    +   四、焚烧纸钱给亡亲故友时，又不像阳间的汇票支票或现金袋均能指定受款人，谁知道亡亲故友是否真的收得到呢？中途会不会被其他孤魂野鬼抢走了呢？


    +   五、一个生前作恶多端、为富不仁的人，死后如果能得到家人大量焚烧纸钱的资助成为富鬼，而一个穷人或信奉其他宗教，不主张焚烧纸钱的人，死后岂不是依然一穷二白成了穷鬼而三餐不继？这样公平吗？'
- md: '# 第六章 中国人和佛教


    许多人因为以上种种逻辑上的矛盾而断然否定了烧纸钱的功效，武断地以为这是一种迷信的民俗，更进而全盘否定了生命不死、灵界实存。


    其实这是只知其一不知其二，以阳世的逻辑硬套在灵界的规则上，无怪乎方枘圆凿，矛盾百出而不以为然了。


    笔者依据个人的研究与认知兹说明如下：


    一、人死后进入灵界，依据生前的认知及作为（业报）在轮回前暂居灵界过境时，已有层级之别，高层级灵入于天界、中层级灵留在灵界，均可自行变化，吸收宇宙能量，偶尔也可吸引来自物质界的供食（经物质转化的能量），而所有低层级的灵则仍未摆脱对物质的需求（欲界的食欲、性欲），譬如阳世的山珍海味、绫罗绸缎、华屋广厦甚至烟、酒等嗜好品。然而这些纯只是内心精神层面的执迷不悟，亡灵已经没有了肉体，完全不需要物质上的供应，但是因为生前的习惯及执迷，所以还是会有饥饿、口渴、寒冷、炎热的感觉，甚至仍然带着烟瘾、酒瘾或甚至麻醉品的药瘾，在没有像高、中层级灵所拥有的变化能力及吸收宇宙能力的本事来自由变化时，因此就时时感到匮乏与不足，靠焚烧纸钱（注：这正是原始祖先灵祭祀文化的起源，原始先民认为若非如此，祖先将会作祟降灾，相反的丰盛的祭祀则将博得神的欢心而赐福），而飘荡到各处的孤魂野鬼则装神弄鬼、和向完全不认识的人要来钱索食，或依附于神像，甚至石头、大树上卖弄鬼、装神充仙来欺惑无知的村夫愚妇争相前来膜拜，再接受牺牲血食供物及焚烧的纸钱。


    前面说过，不论食物或纸钱，亡灵所需要的其实只是能量，但是由于低层级灵的执迷，认假为真，因此他们向阳间索取衣、食、纸钱时，在他们眼中衣服依旧是衣服、烤鸭烧鸡，水果就是水果，而纸钱冥币就是现钞，元宝就是元宝，亡灵只是嗅其气（能量），但是对食物的口味依然有品尝的能力及乐趣，甚至有的亡灵会指定要什么牌子的酒或那一家餐馆的烧鸭；那么由此又引出了两个问题：


    1. 既然亡灵有鉴别食物口味的能力，为什么又会将锡箔折的假元宝当成真的银元宝，将镀金铝箔的假金元宝当成真的金元宝而见钱眼开，喜不自胜呢？这问题真的委实复杂，历为牵扯到意念的问题因为境由心生，连阳世物质世界的一切以至灵界全是共同业力（意念）所造，所以，当阳世亲友焚烧这些假的金银元宝，前面说过意念会产生能量，这种意念越强烈，能量也越强，于是这又证明了心诚则灵的说法，同时在佛门显教的放焰口及密教的观音施法、火供、烟供中，同样是以强大集中的意念将供物经焚化后化做万千倍，经供食三千大千世界的疾苦众生，也因此说明了一位修持高的佛家师父或道教法师，因为擅于集中意念而发射出超强的能量，因此在布施于阴间亡灵时，就比常人的布施，功效高出万千倍。同时，在中元节时，通常是竖灯笼来招各处水陆亡魂，灯笼的高度是依主持法师的道行功力而有高低之别，法力低的绝不敢任意加高灯笼，免得布施不足，而遭鬼欺鬼辱。


    2. 祭祀时的荤素供品被亡灵吸取了气（能量）之后会有什么差别呢？依据经验法则及非正式的实验研究；祭祀过的荤素供品特别容易腐败，譬如以一串香蕉为例，一半作供品去祭祀，另一半不经祭祀，那么祭祀过的那一半香蕉较早变黑变烂，这是因为气（能量）被吸收的关系，甚至祭祀过的荤素供品在味道上也较不可品，当然这只是一种现象，实际情形仍需要经过长期的反覆验证才有定论。


    二、既然亡灵在阳世亲友焚烧纸钱时所获取的只是能量，所以当然不会造成阴间（灵界）的通货膨胀。


    三、阳世由不同地方印制的纸钱冥币虽然材料、币值及规格各自不同、花样百出，但一经焚烧化为能量时，则能量的型态相同，只有能量的强弱大小之别，所以没有兑换流通上的问题。


    四、焚烧冥币纸钱时，只要诚心思念对方的姓名、生前的容貌，所指定的亡灵一定可以如数收到，尤其是在做法事或年节祭祖时，敬神如神在，亡灵会返家接受祭祀的，更可以“当面点交”，但这只限于尚来转世的自由灵，凡是已升入天界的或在地狱服刑、枉死城修缮的亡灵是暂时收不到这些钱的，正如阳世的监狱规则，服刑人是不可以接受家人寄送现金的，但也不是没收充公，而是由狱方暂时保管。中途被劫的情形也有，只有在最低层级的灵界才会发生，特别是那些未入籍的孤魂野鬼，相当于阳世“跑路”的地痞流氓，不过一旦被逮获，会加重罪刑的。


    五、生前作恶多端、为富不仁者，死后必然被判入地狱服刑，阳世亲人烧再多纸钱冥币也无济于事，若转生饿鬼道，好坏更是花几千座金山银山也没用了。但是对于无神论或不同宗教信仰没有焚烧纸钱习俗的人死后就可能麻烦了，笔者曾在一处著名的“牵亡魂”庙堂法会听到一件趣事：亡魂附在灵媒身上与阳世亲友沟通叙旧之后，家人问及一个新近过世的邻居时，亡魂竟然答说：“啊！他以前信奉洋教，家人都没有烧纸钱给他，他现在穷得要命，好可怜呢！”


    在此必聾声明的是；笔者从未皈依任何宗教，也从不偏颇于任何宗教，但是有一点希望读者深切了解的就是：“世间任何宗教都只是人类追求宇宙真理及生命真义的方式之一，灵学（灵魂不灭的理论）是所有宗教的基础，而灵界是超越所有宗教派别客观实存的，并不依附于任何宗教，也绝非任何宗教所专属的境界。


    因此信不信宗教没有关系，魂不灭、灵界实存的也没有关系，因为死后终究要来到“轮回过境室”——灵界而从无例外的。


    因此在焚烧纸钱的问题上，不相信或信仰的宗教中没有这种习俗甚至严厉禁止的，必定要虔诚的信奉自己原先的宗教，遵守戒律，诸善奉行，诸恶莫作，那么死后必定会去到该宗教所标榜的天堂或乐园中，没有物质上的缺乏。而不相信任何宗教者只要修其心，死后一样可以去到至善之境。永恒的生命，并不因为其不相信而化为乌有。否则一旦未能如此，死后落入低层级的灵界，只怕不向阳世亲友伸手要钱也很难。


    那么，纸钱是否一定要焚烧才有用？这点可看看各地庙宇审明出巡时撒的是未经焚烧的纸钱，可看出民俗信仰中仍然相信金银纸钱未经焚烧依然是有效的。为什么呢？


    焚烧纸钱，是经由焚烧而将物质转化（释放）放能量，但前面说过了；意念也可转化成能量，意念越强，能量也越强，未经焚烧的纸钱此时的作用则成了载具，它附载了阳世之人的意念，所以仍然有其效用，但终究没有焚烧时所产生的能量来得大。


    在“观灵术”过程中，如果亡灵表示需要钱师父只要烧上三、五张，进入灵界的生魂就会见到一大堆燃金光闪闪的钞票由天而降，落在亡灵手中，或突然在灵手中“变”出来，而这钱在灵界显然很奇特，面额（购买力）也很大，以致许多亡灵都会表现出惊喜的神色，也有不少亡灵明确地表示这种往生钱比市售的金纸冥币更值钱。这是因为有师父加持的关系。


    因为亡灵之所以会向阳世要钱要食物、要衣服、甚至要房子（纸扎的），乃是因为他们的执迷于物质欲望而不悟，所处的层级是相当低的。求更高的、非物质的自然本性，才能超凡人圣，即使不能成佛究竟涅槃，至少也能进入较高的灵界层级，自行放射能量或吸收宇宙自然能量，而不必再时时以托梦，发炉或甚至变怪、作祟阳世亲友来乞讨祭祀，则庶几人灵同享安乐，不亦乐哉？


    # 第七章 灵界乔迁


    很多事如果不是亲身经历，说起来不但你不相信，连我自己都无法接受但事实总归是事实，虽然相隔这么久，我的印象依旧十分深刻……


    叶镇洪先生有个小孩，三岁不幸夭折，就葬在附近墓地已经几年了。按照我们中国人的习俗，婴儿夭折是“若丧”，大多交由专业人员草草埋掉，因为他是晚辈所以入土以后再也没有上坟的必要，只知道他葬在靠近稻田的小沟旁边。时间经过这么久，加上墓地新坟不断的扩增，使整个地形起了很大的变化，小小的婴儿早就被挤得失去踪影。洪家连续找了好几天还是没有找到，可是迁坟期限所剩不多，总不能眼睁睁看着自己的亲人骨骸被夷为平地！有一天洪先生跟师父联络，想借“观灵术”的法力，把亡者找出来，问问他骨骸的正确位置，这个办法可不可行？我临场经验毕竟有限，到底行不行得通也没有把握，所以师父仅能给洪先生建议：“试试看好了！”


    那天下午一点钟左右我们开始“观灵”，地点在洪先生的家中，参加的人员只有六位，师父摆好各种法器供果，然后请他们净手上香，随意找个位置坐好，每人发给一条毛巾把眼睛蒙起来。法术开始前师父常会要求信众保持平常心，不要紧张兮兮的才比较容易成功，大约经过二十分钟的净路、请神诵咒，其中有个小男孩突然举手示意，说他看到一团强光，从光团中跳出一个小孩子，这时大家非常兴奋，同时以一种惊奇尊敬的眼光瞄着师父，师父猜他们心中一定在想：“这是真的耶！”


    师父：“你先合掌拜拜，然后详细描述一下！”


    洪：“他穿着一件红色小兜，头上绑两个小髻，白胖胖的好可爱，脚上还踩着火球飞来飞去，问我来这里有什么事？”


    洪先生夫妻忙靠过来，双手合十很恭敬地说：“小儿幻年夭折，现在找不到他的坟墓，恭请这位尊神帮忙，可否让我们跟小儿讲几句话？”


    洪：“小孩子没有说话，但点点头。”


    师者：“我来开路，如果那小孩转身，你就跟着他走吧！”


    洪：“好！可是他的动作很快，我跟不上他！”


    师父：“没有关系我来请他慢一点好了！”


    ……念开路咒……


    洪：“现在他牵着我的手，飞过一条宽广的河流，轻飘飘的真好玩！前面有一座山……”


    师父：“山上都有些什么景像？”


    洪：“好多的树，密密麻麻的一大片森林，光线很暗影象没有刚才清楚，我们穿过树林后，看到一片比较空旷的地方，这里有很多水果树，梨子啦，橘子啦，好多哦！”


    师父：“你想不想尝尝？看看跟我们这边有什么不同？”


    洪：“可以吃吗？”


    师父：“当然可以！”


    这时洪娃小孩子高举双手，作一个摘取水果的动作，并搓揉两下，张口吃得津津有味。


    师父：“怎么样？味道如何？”


    洪：“我在吃梨子，好甜！”他用双掌弯成圆形说，“个子有这么大！”


    师父：“时间的关系，我们继续往前走吧！”


    洪：“很奇怪，那个小孩也这么说！我们现在沿着一条很陡峭的路飞过去，地上渐渐平坦，看到的是绿油油的村庄。”


    师父：“地界快到了，你求求那位带路的小孩，直接降到地面上，我们就在这里把洪先生的小孩调出来。”


    用小铲子我试着用铲尖凿那被填平的水泥，大概是历经长久的日晒雨淋，老化的水泥一铲就掉下来，露出一个“洪”字，接着“光”字。我好高兴，感到全血脉贲张，至今仍无法形容那一刻的骇叹！找到坟墓的人不是洪先生而竟然是师父！分析探讨：


    （一）那时洪小孩才十二岁，家居乡下，生活单纯，小小年纪对灵异接触全无概念，此次参加观灵又是临时受邀，根本不需要什么心理准备，而且绝对可以肯定的：“他完全不知道墓地在那里！”但是亡灵却能透过他精确地指出那根“电线柱”……“往前走五十步”……“碑牌被遮去一半”……等等，像这样的准确度绝对不是“巧合”、“下意识”、“幻想”、“催眠”所能达到的。幸好这件事从头到尾我适逢其会，因而增加了我无比的信心，站在灵学探索的立场，实证是很重要的否则空空洞洞大谈理论，常会令人莫明其妙不知所云。


    （二）自从当年走完那五十小步以后，坚毅的理念使我在漫长的岁月中迈开大步，如果一年算一步，那么在灵异探讨方面已经走了三十五步，希望未来我所能走的路，不仅是那区区的三十五步；而是将经年累月的探讨心得向信众提供最完善的服务。


    （编者按：这是一个相当特殊的个案，值得深入探讨的重点非常多：


    一、一座小小的婴墓被荒烟蔓草湮没了几年的，为了迁葬事宜，家人找了好久都没有找到，最后只好求助于“观灵术”；直接去问亡灵，结果一位小朋友进入后，在哪吒三太子的引领下与亡灵见面，才查出了婴墓确切的位置。这个个案十分离奇但也提供了灵魂或灵界实存的证据。也许一些自命科学或心理学家，精神学大夫会认为进入者年纪小容易被暗示，但是从这件个案在场所有人都没有正确资料的情况下，根本无从暗示。也许有人会改口说这是超感官知觉的“读心术”，现在问题来了；这小朋友“读”的是谁的心？当事人夫妇或在场的概况吗？当然他们知道当年的埋葬地点，问题是十五年来，地形地貌已经改变极多（否则他们也不至于找不到则而只好求助于观灵术了），现况和他们潜意识中的记忆已经有了很大的差别，不存在于心（潜意识）中的资料如何“读”呢？再者“读心术”本身在目前的科学研究中仍是异样的能力，本身就值得再深入探索，如果学者专家用此项自己不清楚的事物来解释更不清楚的事物，岂不是痴人说梦，徒使真相更扑逆迷离罢了？而且一骨脑的全推给仍不明了的“读心术”，就是死不肯承认“灵魂”的客观存在，好，那么“读心术”和“灵魂”之间怎么说也只是名词的代换而已，毫无差别，反正同样是超自然的事物。


    二、小朋友进入灵界之后，在哪吒三太子的引领下，飞越了“阴阳河”，来到了“栗子山”，并吃了一个梨子，看到了“六角庄”，然后来到了“八角亭”，并在此处调来了亡灵。


    三、过程中，师父怕小孩顾着吃梨而耽误了正事，提醒道：“时间的关系，我们继续往前走吧！”而小孩却表示：“很奇怪，那个小孩（注：指哪吒三太子，但滩小孩当时并不认识这位神祇，所以以“那个小孩”来称呼）！可见不论是否当事人记忆中原有的，哪吒仍然以他的特征出现（穿着红肚兜，头上绑两个小髻，脚上踩着火球），洪小孩既然不认得这位就是大名鼎鼎的哪吒，只好将形貌形容出来，但这么鲜明的物微，旁观者可说一听就知道他是何方神圣了。可见现场没有暗示，也不可能来自幻想，否则李文魁在幻想中为什么不是出现比较熟悉的人物呢？


    四、师父要求小孩求“那位带路的小孩”直接降到地面，在这里把孩子调出来……”却表示“咦！你说的话他都听到了，他点点头……”这点在观灵术的个案中极多，不论是神祇或亡灵都能听到阳世其他旁观者或施法者的声音，甚至看到动作。究竟灵界和阳世是否完全重叠，只是频率不同而已呢？这点值得深入研究。


    五、最奇特的是：亡灵在灵界一样会成长，洪婴是三岁时夭折，几年后出现在观灵法会中另一小孩见面时，竟然是位十几岁的年轻人，这项灵界的法则可以说是绝大多数人所完全不知道的，何况是年纪很小的？以他的常识甚至对灵界的认知上都不可能做出这样的判断与说法，如果纯粹出自他的想像（幻想）或即使一般成年人的想象；小孩应该仍是当年三岁时婴幼儿的模样，怎么会相信亡灵在灵界也会成长呢？其实根据灵界的法则：亡灵来到灵界，如果是婴幼儿及孩童或青少年会一直长到二十岁左右的模样，然后一直保持这样的外貌直到转世投胎，而中年人死亡后来的灵界，会保持原样或变和稍年轻，而老年人来到灵界则一律会变年轻，有些像中年人，有些也会退回到二十来岁的模样，这种情形在层次稍高的灵界越是明显，由于灵具备某种程度的变化能力，所以在形貌上也可随自己心意改变，通常不论男女，当然都会选择有如阳世二十来岁、年轻力壮、青年貌美的表貌，而一些残疾或伤疤到灵界也会康复或消失。所以在观灵术的个案中，进入灵界中见到老年才过世的亲友，通常多会表示他（她）们变年轻、更漂亮或更健康了。但这只是发生于自由灵，被囚禁或层次极低的灵则不会出现这样的情况。


    六、亡灵说他的墓碑被遮了一半，结果事后果真被师父找到，竟然是被水泥抹去了，完全相符。难道这也是“读心术”吗？读谁的心呢？


    # 第八章 “阳世”与“阴间”


    我们凡人生存的世界，包括所有生物存在及活动的空间，泛称为“阳间”、“阳世”，而人或动物在阳间以行动的肉体，在生命现象终止后，所残存的精神能量——亦即俗称的“灵魂”，是否亦会随着肉体生命现象的终止而“结束”呢？若非如此，那么“生从何来死何去？”“生我之前谁是我？”“我死之后我是谁？”就是值得我们好好深思与探讨的课题了！


    一般人相信，人死之后，“灵魂”会脱离肉体，前往另一个“不可知”的世界。因为人的肉体生命现象，目前尚必须依存于地球的三度空间即日夜交替、四季循环的大环境。换言之，脱离了这个空间与环境条件，人的肉体是否能存活而完全无恙，尚待未来科技的开发与努力；但是精神能量似乎可不必受此环境条件与空间的限制，有许多大修行者，或眼通、或心通、或某些人偶尔为之的灵魂出窍穿越时空的效果。


    既是历来即有“阳世”、“阴间”之分别流传于世间，再加上世俗间对生死关口，阴阳界、人鬼轶闻、鬼仙幽魂……等相关题材的传说故事诸多描绘，使人既熟悉又疑惑。熟悉的是，此类题材的传说故事流传甚广，或父老长辈讲古时提及，或知已好友聚谈闲聊时转述。而令人疑惑的是，虽然言者历历如绘，而实际了解且曾真正接触到灵界的又有几人？能经得起查证，事理仍能不破的灵异实例，更是凤毛麟角了！


    在难得的机缘下，笔者透过曾老师的施法，得到太上道祖师济公师父的圣恩，进行了数十次的灵界之旅，在这些探讨强有力及印证之中，使我深深体出“冥冥之中自有天律”、“幽冥世界廓然有序”、“因果报应属实，灵魂不灭非虚”的至理，岂是一般人“眼未见不足为凭”之轻言淡语就能一笔抹煞的呢？以是之故，特记述此文，以资见证。


    前年初秋某日下午，照例同门在堂中为探讨灵界进行观灵法事。


    我被蒙上红布的双眼，原先眼前是漆黑一片；在木鱼有规律的节奏声及熟稔的咒语声里，漆黑的逐渐转成光亮的一片。光亮之中，显出一个圆球；定神，原来是一葫芦。脑中灵光一现，此葫芦系济公师父的信物，那么今日前来接引的圣尊，应是济公师父了。转念间，忽闻酒味扑鼻，随即身着半黄半褐僧袍，手执蒲扇，腰悬葫芦，面颊削瘦不修篇幅，脸上带着微笑的济公师父法相示现了。


    济公师父未等我请安及说明来意，就直接了当地说：“今天带你到（丰都）游历游历，增广见闻。”


    我一时反应不过来，反问曾老师：“老师，济公师父说要带我去（丰都）耶！丰都不是在四川省吗？”说守后，就听到堂中大伙儿笑成一团，王师兄笑着提醒：“是阴间的（丰都），不是四川的丰都县，别搞混了！”


    曾老师指示说：“这是千载难逢的机会啊，快感谢济公师父——我赶紧行礼如仪——）；那么我们现在就请济公师父带你上路吧！”


    接着耳边又复响起曾老师的念咒声、木鱼声，随着咒语的变换，景像也由原本空荡的背景来到了荒僻的山径。只见济公师父拖拉着僧鞋，步履踉跄摇摇晃晃地在前领路，看似途步，我卯足了劲，却跟得气喘如牛。


    走了好一会儿，身旁的景色单调，好像都没什么变化。忽然济公师父回头告诉我，只要过了山头，就快到“丰都”了。我抬头略微打量四周，在这荒僻的山野里，似乎只有这么一条路通往山腰，呼！喘了口气，……我就是那粒过河“卒”子，继续向前吧！


    翻过山头，景物已与阳世间并无差异只是给人一种有点“平面”的感觉；就好像我们进入了一幅画中似的，山川景物俱备，沈寂幽静，并无生气，置身其中，虽不致于阴森，但却感到荒凉空旷。


    不知道又走了多久，济公师父大概是看出跟在身后的我，体力有不济的样子；便将手中的蒲扇往地上一抛，薄扇立即变大到足可以供两人并立的尺寸。济公师父对我慈蔼地笑笑，要我别怕，跟着他站上去便可。站上之后，济公师父口中念动真言，立即蒲扇飞起，飞腾云队。这种御扇飞行的感觉，就像在游乐场搭乘悬在半空中的三百六十度旋转的大摩天轮一般；而前进的速度，则像云宵飞车一样。我心中着实有点害怕，要是站不稳摔了下去，岂不一命呜呼哀哉，也不用回阳，直接到阎王爷那里报到去也！（一时心里害怕，忘了有“靠山”济公师父在身边，穷紧张！不好意思。）


    很快地，前方不远处，出现了一座大城，城门上写着斗大的“丰都”二字。城的背后远景是一座大山，看来灰暗阴森（据曾'
  mdcn: '# 第六章 中国人和佛教


    许多人因为以上种种逻辑上的矛盾而断然否定了烧纸钱的功效，武断地以为这是一种迷信的民俗，更进而全盘否定了生命不死、灵界实存。


    其实这是只知其一不知其二，以阳世的逻辑硬套在灵界的规则上，无怪乎方枘圆凿，矛盾百出而不以为然了。


    笔者依据个人的研究与认知兹说明如下：


    一、人死后进入灵界，依据生前的认知及作为（业报）在轮回前暂居灵界过境时，已有层级之别，高层级灵入于天界、中层级灵留在灵界，均可自行变化，吸收宇宙能量，偶尔也可吸引来自物质界的供食（经物质转化的能量），而所有低层级的灵则仍未摆脱对物质的需求（欲界的食欲、性欲），譬如阳世的山珍海味、绫罗绸缎、华屋广厦甚至烟、酒等嗜好品。然而这些纯只是内心精神层面的执迷不悟，亡灵已经没有了肉体，完全不需要物质上的供应，但是因为生前的习惯及执迷，所以还是会有饥饿、口渴、寒冷、炎热的感觉，甚至仍然带着烟瘾、酒瘾或甚至麻醉品的药瘾，在没有像高、中层级灵所拥有的变化能力及吸收宇宙能力的本事来自由变化时，因此就时时感到匮乏与不足，靠焚烧纸钱（注：这正是原始祖先灵祭祀文化的起源，原始先民认为若非如此，祖先将会作祟降灾，相反的丰盛的祭祀则将博得神的欢心而赐福），而飘荡到各处的孤魂野鬼则装神弄鬼、和向完全不认识的人要来钱索食，或依附于神像，甚至石头、大树上卖弄鬼、装神充仙来欺惑无知的村夫愚妇争相前来膜拜，再接受牺牲血食供物及焚烧的纸钱。


    前面说过，不论食物或纸钱，亡灵所需要的其实只是能量，但是由于低层级灵的执迷，认假为真，因此他们向阳间索取衣、食、纸钱时，在他们眼中衣服依旧是衣服、烤鸭烧鸡，水果就是水果，而纸钱冥币就是现钞，元宝就是元宝，亡灵只是嗅其气（能量），但是对食物的口味依然有品尝的能力及乐趣，甚至有的亡灵会指定要什么牌子的酒或那一家餐馆的烧鸭；那么由此又引出了两个问题：


    1. 既然亡灵有鉴别食物口味的能力，为什么又会将锡箔折的假元宝当成真的银元宝，将镀金铝箔的假金元宝当成真的金元宝而见钱眼开，喜不自胜呢？这问题真的委实复杂，历为牵扯到意念的问题因为境由心生，连阳世物质世界的一切以至灵界全是共同业力（意念）所造，所以，当阳世亲友焚烧这些假的金银元宝，前面说过意念会产生能量，这种意念越强烈，能量也越强，于是这又证明了心诚则灵的说法，同时在佛门显教的放焰口及密教的观音施法、火供、烟供中，同样是以强大集中的意念将供物经焚化后化做万千倍，经供食三千大千世界的疾苦众生，也因此说明了一位修持高的佛家师父或道教法师，因为擅于集中意念而发射出超强的能量，因此在布施于阴间亡灵时，就比常人的布施，功效高出万千倍。同时，在中元节时，通常是竖灯笼来招各处水陆亡魂，灯笼的高度是依主持法师的道行功力而有高低之别，法力低的绝不敢任意加高灯笼，免得布施不足，而遭鬼欺鬼辱。


    2. 祭祀时的荤素供品被亡灵吸取了气（能量）之后会有什么差别呢？依据经验法则及非正式的实验研究；祭祀过的荤素供品特别容易腐败，譬如以一串香蕉为例，一半作供品去祭祀，另一半不经祭祀，那么祭祀过的那一半香蕉较早变黑变烂，这是因为气（能量）被吸收的关系，甚至祭祀过的荤素供品在味道上也较不可品，当然这只是一种现象，实际情形仍需要经过长期的反覆验证才有定论。


    二、既然亡灵在阳世亲友焚烧纸钱时所获取的只是能量，所以当然不会造成阴间（灵界）的通货膨胀。


    三、阳世由不同地方印制的纸钱冥币虽然材料、币值及规格各自不同、花样百出，但一经焚烧化为能量时，则能量的型态相同，只有能量的强弱大小之别，所以没有兑换流通上的问题。


    四、焚烧冥币纸钱时，只要诚心思念对方的姓名、生前的容貌，所指定的亡灵一定可以如数收到，尤其是在做法事或年节祭祖时，敬神如神在，亡灵会返家接受祭祀的，更可以“当面点交”，但这只限于尚来转世的自由灵，凡是已升入天界的或在地狱服刑、枉死城修缮的亡灵是暂时收不到这些钱的，正如阳世的监狱规则，服刑人是不可以接受家人寄送现金的，但也不是没收充公，而是由狱方暂时保管。中途被劫的情形也有，只有在最低层级的灵界才会发生，特别是那些未入籍的孤魂野鬼，相当于阳世“跑路”的地痞流氓，不过一旦被逮获，会加重罪刑的。


    五、生前作恶多端、为富不仁者，死后必然被判入地狱服刑，阳世亲人烧再多纸钱冥币也无济于事，若转生饿鬼道，好坏更是花几千座金山银山也没用了。但是对于无神论或不同宗教信仰没有焚烧纸钱习俗的人死后就可能麻烦了，笔者曾在一处著名的“牵亡魂”庙堂法会听到一件趣事：亡魂附在灵媒身上与阳世亲友沟通叙旧之后，家人问及一个新近过世的邻居时，亡魂竟然答说：“啊！他以前信奉洋教，家人都没有烧纸钱给他，他现在穷得要命，好可怜呢！”


    在此必聾声明的是；笔者从未皈依任何宗教，也从不偏颇于任何宗教，但是有一点希望读者深切了解的就是：“世间任何宗教都只是人类追求宇宙真理及生命真义的方式之一，灵学（灵魂不灭的理论）是所有宗教的基础，而灵界是超越所有宗教派别客观实存的，并不依附于任何宗教，也绝非任何宗教所专属的境界。


    因此信不信宗教没有关系，魂不灭、灵界实存的也没有关系，因为死后终究要来到“轮回过境室”——灵界而从无例外的。


    因此在焚烧纸钱的问题上，不相信或信仰的宗教中没有这种习俗甚至严厉禁止的，必定要虔诚的信奉自己原先的宗教，遵守戒律，诸善奉行，诸恶莫作，那么死后必定会去到该宗教所标榜的天堂或乐园中，没有物质上的缺乏。而不相信任何宗教者只要修其心，死后一样可以去到至善之境。永恒的生命，并不因为其不相信而化为乌有。否则一旦未能如此，死后落入低层级的灵界，只怕不向阳世亲友伸手要钱也很难。


    那么，纸钱是否一定要焚烧才有用？这点可看看各地庙宇审明出巡时撒的是未经焚烧的纸钱，可看出民俗信仰中仍然相信金银纸钱未经焚烧依然是有效的。为什么呢？


    焚烧纸钱，是经由焚烧而将物质转化（释放）放能量，但前面说过了；意念也可转化成能量，意念越强，能量也越强，未经焚烧的纸钱此时的作用则成了载具，它附载了阳世之人的意念，所以仍然有其效用，但终究没有焚烧时所产生的能量来得大。


    在“观灵术”过程中，如果亡灵表示需要钱师父只要烧上三、五张，进入灵界的生魂就会见到一大堆燃金光闪闪的钞票由天而降，落在亡灵手中，或突然在灵手中“变”出来，而这钱在灵界显然很奇特，面额（购买力）也很大，以致许多亡灵都会表现出惊喜的神色，也有不少亡灵明确地表示这种往生钱比市售的金纸冥币更值钱。这是因为有师父加持的关系。


    因为亡灵之所以会向阳世要钱要食物、要衣服、甚至要房子（纸扎的），乃是因为他们的执迷于物质欲望而不悟，所处的层级是相当低的。求更高的、非物质的自然本性，才能超凡人圣，即使不能成佛究竟涅槃，至少也能进入较高的灵界层级，自行放射能量或吸收宇宙自然能量，而不必再时时以托梦，发炉或甚至变怪、作祟阳世亲友来乞讨祭祀，则庶几人灵同享安乐，不亦乐哉？


    # 第七章 灵界乔迁


    很多事如果不是亲身经历，说起来不但你不相信，连我自己都无法接受但事实总归是事实，虽然相隔这么久，我的印象依旧十分深刻……


    叶镇洪先生有个小孩，三岁不幸夭折，就葬在附近墓地已经几年了。按照我们中国人的习俗，婴儿夭折是“若丧”，大多交由专业人员草草埋掉，因为他是晚辈所以入土以后再也没有上坟的必要，只知道他葬在靠近稻田的小沟旁边。时间经过这么久，加上墓地新坟不断的扩增，使整个地形起了很大的变化，小小的婴儿早就被挤得失去踪影。洪家连续找了好几天还是没有找到，可是迁坟期限所剩不多，总不能眼睁睁看着自己的亲人骨骸被夷为平地！有一天洪先生跟师父联络，想借“观灵术”的法力，把亡者找出来，问问他骨骸的正确位置，这个办法可不可行？我临场经验毕竟有限，到底行不行得通也没有把握，所以师父仅能给洪先生建议：“试试看好了！”


    那天下午一点钟左右我们开始“观灵”，地点在洪先生的家中，参加的人员只有六位，师父摆好各种法器供果，然后请他们净手上香，随意找个位置坐好，每人发给一条毛巾把眼睛蒙起来。法术开始前师父常会要求信众保持平常心，不要紧张兮兮的才比较容易成功，大约经过二十分钟的净路、请神诵咒，其中有个小男孩突然举手示意，说他看到一团强光，从光团中跳出一个小孩子，这时大家非常兴奋，同时以一种惊奇尊敬的眼光瞄着师父，师父猜他们心中一定在想：“这是真的耶！”


    师父：“你先合掌拜拜，然后详细描述一下！”


    洪：“他穿着一件红色小兜，头上绑两个小髻，白胖胖的好可爱，脚上还踩着火球飞来飞去，问我来这里有什么事？”


    洪先生夫妻忙靠过来，双手合十很恭敬地说：“小儿幻年夭折，现在找不到他的坟墓，恭请这位尊神帮忙，可否让我们跟小儿讲几句话？”


    洪：“小孩子没有说话，但点点头。”


    师者：“我来开路，如果那小孩转身，你就跟着他走吧！”


    洪：“好！可是他的动作很快，我跟不上他！”


    师父：“没有关系我来请他慢一点好了！”


    ……念开路咒……


    洪：“现在他牵着我的手，飞过一条宽广的河流，轻飘飘的真好玩！前面有一座山……”


    师父：“山上都有些什么景像？”


    洪：“好多的树，密密麻麻的一大片森林，光线很暗影象没有刚才清楚，我们穿过树林后，看到一片比较空旷的地方，这里有很多水果树，梨子啦，橘子啦，好多哦！”


    师父：“你想不想尝尝？看看跟我们这边有什么不同？”


    洪：“可以吃吗？”


    师父：“当然可以！”


    这时洪娃小孩子高举双手，作一个摘取水果的动作，并搓揉两下，张口吃得津津有味。


    师父：“怎么样？味道如何？”


    洪：“我在吃梨子，好甜！”他用双掌弯成圆形说，“个子有这么大！”


    师父：“时间的关系，我们继续往前走吧！”


    洪：“很奇怪，那个小孩也这么说！我们现在沿着一条很陡峭的路飞过去，地上渐渐平坦，看到的是绿油油的村庄。”


    师父：“地界快到了，你求求那位带路的小孩，直接降到地面上，我们就在这里把洪先生的小孩调出来。”


    用小铲子我试着用铲尖凿那被填平的水泥，大概是历经长久的日晒雨淋，老化的水泥一铲就掉下来，露出一个“洪”字，接着“光”字。我好高兴，感到全血脉贲张，至今仍无法形容那一刻的骇叹！找到坟墓的人不是洪先生而竟然是师父！分析探讨：


    （一）那时洪小孩才十二岁，家居乡下，生活单纯，小小年纪对灵异接触全无概念，此次参加观灵又是临时受邀，根本不需要什么心理准备，而且绝对可以肯定的：“他完全不知道墓地在那里！”但是亡灵却能透过他精确地指出那根“电线柱”……“往前走五十步”……“碑牌被遮去一半”……等等，像这样的准确度绝对不是“巧合”、“下意识”、“幻想”、“催眠”所能达到的。幸好这件事从头到尾我适逢其会，因而增加了我无比的信心，站在灵学探索的立场，实证是很重要的否则空空洞洞大谈理论，常会令人莫明其妙不知所云。


    （二）自从当年走完那五十小步以后，坚毅的理念使我在漫长的岁月中迈开大步，如果一年算一步，那么在灵异探讨方面已经走了三十五步，希望未来我所能走的路，不仅是那区区的三十五步；而是将经年累月的探讨心得向信众提供最完善的服务。


    （编者按：这是一个相当特殊的个案，值得深入探讨的重点非常多：


    一、一座小小的婴墓被荒烟蔓草湮没了几年的，为了迁葬事宜，家人找了好久都没有找到，最后只好求助于“观灵术”；直接去问亡灵，结果一位小朋友进入后，在哪吒三太子的引领下与亡灵见面，才查出了婴墓确切的位置。这个个案十分离奇但也提供了灵魂或灵界实存的证据。也许一些自命科学或心理学家，精神学大夫会认为进入者年纪小容易被暗示，但是从这件个案在场所有人都没有正确资料的情况下，根本无从暗示。也许有人会改口说这是超感官知觉的“读心术”，现在问题来了；这小朋友“读”的是谁的心？当事人夫妇或在场的概况吗？当然他们知道当年的埋葬地点，问题是十五年来，地形地貌已经改变极多（否则他们也不至于找不到则而只好求助于观灵术了），现况和他们潜意识中的记忆已经有了很大的差别，不存在于心（潜意识）中的资料如何“读”呢？再者“读心术”本身在目前的科学研究中仍是异样的能力，本身就值得再深入探索，如果学者专家用此项自己不清楚的事物来解释更不清楚的事物，岂不是痴人说梦，徒使真相更扑逆迷离罢了？而且一骨脑的全推给仍不明了的“读心术”，就是死不肯承认“灵魂”的客观存在，好，那么“读心术”和“灵魂”之间怎么说也只是名词的代换而已，毫无差别，反正同样是超自然的事物。


    二、小朋友进入灵界之后，在哪吒三太子的引领下，飞越了“阴阳河”，来到了“栗子山”，并吃了一个梨子，看到了“六角庄”，然后来到了“八角亭”，并在此处调来了亡灵。


    三、过程中，师父怕小孩顾着吃梨而耽误了正事，提醒道：“时间的关系，我们继续往前走吧！”而小孩却表示：“很奇怪，那个小孩（注：指哪吒三太子，但滩小孩当时并不认识这位神祇，所以以“那个小孩”来称呼）！可见不论是否当事人记忆中原有的，哪吒仍然以他的特征出现（穿着红肚兜，头上绑两个小髻，脚上踩着火球），洪小孩既然不认得这位就是大名鼎鼎的哪吒，只好将形貌形容出来，但这么鲜明的物微，旁观者可说一听就知道他是何方神圣了。可见现场没有暗示，也不可能来自幻想，否则李文魁在幻想中为什么不是出现比较熟悉的人物呢？


    四、师父要求小孩求“那位带路的小孩”直接降到地面，在这里把孩子调出来……”却表示“咦！你说的话他都听到了，他点点头……”这点在观灵术的个案中极多，不论是神祇或亡灵都能听到阳世其他旁观者或施法者的声音，甚至看到动作。究竟灵界和阳世是否完全重叠，只是频率不同而已呢？这点值得深入研究。


    五、最奇特的是：亡灵在灵界一样会成长，洪婴是三岁时夭折，几年后出现在观灵法会中另一小孩见面时，竟然是位十几岁的年轻人，这项灵界的法则可以说是绝大多数人所完全不知道的，何况是年纪很小的？以他的常识甚至对灵界的认知上都不可能做出这样的判断与说法，如果纯粹出自他的想像（幻想）或即使一般成年人的想象；小孩应该仍是当年三岁时婴幼儿的模样，怎么会相信亡灵在灵界也会成长呢？其实根据灵界的法则：亡灵来到灵界，如果是婴幼儿及孩童或青少年会一直长到二十岁左右的模样，然后一直保持这样的外貌直到转世投胎，而中年人死亡后来的灵界，会保持原样或变和稍年轻，而老年人来到灵界则一律会变年轻，有些像中年人，有些也会退回到二十来岁的模样，这种情形在层次稍高的灵界越是明显，由于灵具备某种程度的变化能力，所以在形貌上也可随自己心意改变，通常不论男女，当然都会选择有如阳世二十来岁、年轻力壮、青年貌美的表貌，而一些残疾或伤疤到灵界也会康复或消失。所以在观灵术的个案中，进入灵界中见到老年才过世的亲友，通常多会表示他（她）们变年轻、更漂亮或更健康了。但这只是发生于自由灵，被囚禁或层次极低的灵则不会出现这样的情况。


    六、亡灵说他的墓碑被遮了一半，结果事后果真被师父找到，竟然是被水泥抹去了，完全相符。难道这也是“读心术”吗？读谁的心呢？


    # 第八章 “阳世”与“阴间”


    我们凡人生存的世界，包括所有生物存在及活动的空间，泛称为“阳间”、“阳世”，而人或动物在阳间以行动的肉体，在生命现象终止后，所残存的精神能量——亦即俗称的“灵魂”，是否亦会随着肉体生命现象的终止而“结束”呢？若非如此，那么“生从何来死何去？”“生我之前谁是我？”“我死之后我是谁？”就是值得我们好好深思与探讨的课题了！


    一般人相信，人死之后，“灵魂”会脱离肉体，前往另一个“不可知”的世界。因为人的肉体生命现象，目前尚必须依存于地球的三度空间即日夜交替、四季循环的大环境。换言之，脱离了这个空间与环境条件，人的肉体是否能存活而完全无恙，尚待未来科技的开发与努力；但是精神能量似乎可不必受此环境条件与空间的限制，有许多大修行者，或眼通、或心通、或某些人偶尔为之的灵魂出窍穿越时空的效果。


    既是历来即有“阳世”、“阴间”之分别流传于世间，再加上世俗间对生死关口，阴阳界、人鬼轶闻、鬼仙幽魂……等相关题材的传说故事诸多描绘，使人既熟悉又疑惑。熟悉的是，此类题材的传说故事流传甚广，或父老长辈讲古时提及，或知已好友聚谈闲聊时转述。而令人疑惑的是，虽然言者历历如绘，而实际了解且曾真正接触到灵界的又有几人？能经得起查证，事理仍能不破的灵异实例，更是凤毛麟角了！


    在难得的机缘下，笔者透过曾老师的施法，得到太上道祖师济公师父的圣恩，进行了数十次的灵界之旅，在这些探讨强有力及印证之中，使我深深体出“冥冥之中自有天律”、“幽冥世界廓然有序”、“因果报应属实，灵魂不灭非虚”的至理，岂是一般人“眼未见不足为凭”之轻言淡语就能一笔抹煞的呢？以是之故，特记述此文，以资见证。


    前年初秋某日下午，照例同门在堂中为探讨灵界进行观灵法事。


    我被蒙上红布的双眼，原先眼前是漆黑一片；在木鱼有规律的节奏声及熟稔的咒语声里，漆黑的逐渐转成光亮的一片。光亮之中，显出一个圆球；定神，原来是一葫芦。脑中灵光一现，此葫芦系济公师父的信物，那么今日前来接引的圣尊，应是济公师父了。转念间，忽闻酒味扑鼻，随即身着半黄半褐僧袍，手执蒲扇，腰悬葫芦，面颊削瘦不修篇幅，脸上带着微笑的济公师父法相示现了。


    济公师父未等我请安及说明来意，就直接了当地说：“今天带你到（丰都）游历游历，增广见闻。”


    我一时反应不过来，反问曾老师：“老师，济公师父说要带我去（丰都）耶！丰都不是在四川省吗？”说守后，就听到堂中大伙儿笑成一团，王师兄笑着提醒：“是阴间的（丰都），不是四川的丰都县，别搞混了！”


    曾老师指示说：“这是千载难逢的机会啊，快感谢济公师父——我赶紧行礼如仪——）；那么我们现在就请济公师父带你上路吧！”


    接着耳边又复响起曾老师的念咒声、木鱼声，随着咒语的变换，景像也由原本空荡的背景来到了荒僻的山径。只见济公师父拖拉着僧鞋，步履踉跄摇摇晃晃地在前领路，看似途步，我卯足了劲，却跟得气喘如牛。


    走了好一会儿，身旁的景色单调，好像都没什么变化。忽然济公师父回头告诉我，只要过了山头，就快到“丰都”了。我抬头略微打量四周，在这荒僻的山野里，似乎只有这么一条路通往山腰，呼！喘了口气，……我就是那粒过河“卒”子，继续向前吧！


    翻过山头，景物已与阳世间并无差异只是给人一种有点“平面”的感觉；就好像我们进入了一幅画中似的，山川景物俱备，沈寂幽静，并无生气，置身其中，虽不致于阴森，但却感到荒凉空旷。


    不知道又走了多久，济公师父大概是看出跟在身后的我，体力有不济的样子；便将手中的蒲扇往地上一抛，薄扇立即变大到足可以供两人并立的尺寸。济公师父对我慈蔼地笑笑，要我别怕，跟着他站上去便可。站上之后，济公师父口中念动真言，立即蒲扇飞起，飞腾云队。这种御扇飞行的感觉，就像在游乐场搭乘悬在半空中的三百六十度旋转的大摩天轮一般；而前进的速度，则像云宵飞车一样。我心中着实有点害怕，要是站不稳摔了下去，岂不一命呜呼哀哉，也不用回阳，直接到阎王爷那里报到去也！（一时心里害怕，忘了有“靠山”济公师父在身边，穷紧张！不好意思。）


    很快地，前方不远处，出现了一座大城，城门上写着斗大的“丰都”二字。城的背后远景是一座大山，看来灰暗阴森（据曾'
