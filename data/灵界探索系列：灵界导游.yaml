  md: '# 灵界导游


    了感慨：年纪轻轻的，怎落到如此地步呢？


    不一会，阿强的大伯父到了，向我致过谢意后，说：“派出所那边没事啦，已和对方达成和解，医药费各自负担。偶发事件嘛，就不再追究啦。”


    可能还有另外的伤者，这里又不便说话，于是我先告辞了。


    第二天一早，冷太太来了电话。


    “已经把阿强带回家来了。我大伯开车送的，医生说隔几天去外科医院换药就可以了，伤势不是很重。我担心这种事会一再重演，该怎么办呢？”


    冷太太不敢开门见山问我能不能治好阿强的病，是怕我的回答，揉碎她最后一线希望吧？可怜天下父母心！


    “不用担心，冷太太。我已经查出原因来了。”


    “哦，有救吗？”


    “有。”我十分肯定，“比较麻烦而已。”


    “没关系，花多少钱我都愿意，只要能治好我们阿强，我愿意把这栋房子卖啦，搬到山上去和他爸爸一起住。”


    “搬到山上住倒是个好主意，不过房子不用卖了，我不收钱。”


    “不收钱？”显然，电话那头冷太太完全不相信。“我们已经花了不少钱了啊。”


    “我讲的是真的。”我尽量把语气放得平淡。“我说的比较麻烦不是指钱。这是个少见的病例，可能要花更多的时间和精力。”


    “噢，你真是活菩萨，需要我们上德原吗？”


    “不必了。等他伤势好点，可以解掉绷带时，我到清平去。”


    “啊，那真是太感激啦，要怎样谢你？”


    “调理好了再说吧。”'
