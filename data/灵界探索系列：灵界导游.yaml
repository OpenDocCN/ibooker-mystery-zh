    # 第二章 山在虚无缥缈间


    此时，张三丰到了云南，超度沈万三一家升仙，一僧一道两位弟子留在武当山，继续修炼。


    一日，朱棣的军师僧人道衍，带了一批人马，来到武当山下的丹江口。不久，又有一队人马经过，为首的也是一个僧人，这个僧人相貌堂堂，不同凡俗。


    > 道衍冷笑一声道：“建文帝，你就是烧成了灰我也认得你，你以为改装成僧人就能逃出我的手心么？”


    那相貌堂堂的僧人原来竟是建文帝。燕王朱棣的大军攻打金陵时，建文帝的人马抵挡不住，纷纷被杀死，建文帝放了一把火，将皇宫烧了，趁乱化装成僧人，在随从们的簇拥下，逃出金陵，在路上逃了多日，竟来到武当山下。想不到，那僧人道衍竟算无遗策，早已以此设伏，安排金钩巨鳌。


    建文帝当下大吃一惊，慌忙往山上逃去。


    张三丰的两个弟子，一僧一道，已冷眼旁观多时。他们觉得，朱棣已夺了皇位，还不知足，又追杀侄儿建文帝至此，欲斩尽杀绝方才甘心，两位师兄弟悠然而生恻隐之心，有心要救拔建文帝于苦厄之中。看着道衍的追兵已杀至，师兄弟俩大喝一声：“住手！”便一齐挥舞手中之剑，截住厮杀起来。


    师兄弟俩早已炼成绝顶武功，道衍手下兵将哪里是他俩对手？早就被杀得落花流水，丢下一大片尸体，活着的四散而逃。建文帝得到师兄弟俩的援手，当下大喜，也挥手回身与道衍之众相斗。


    师兄弟俩仗着武功高强，全无惧色，越斗越勇，杀人无数。他们还不肯罢手，又追杀道衍而去。


    正追杀间，忽然听得天上有人大喝一声：“住手！”接着一位仙道飘飘而下，师兄弟俩一看，见是师父张三丰，连忙停下手来，与师父相见。


    道衍逃得性命，带领残兵败将，狼狈而去。'
  - '[PAGE 26]


    这边，张三丰指着两个弟子，跌足叹息：“你们闯了大祸了，犯了杀戒了，以前俺教你们的道法功法，都将付之东流了！”原来，张三丰已是仙身，两位弟子在武当山的一举一动，都逃不出他的眼睛，当他在云南那边见他们与道衍厮杀时，大吃一惊。因为他知道，朱棣人主金陵，乃是天意所属，朱棣史称明成祖。既然如此，就难以违抗天命，两位弟子犯了杀戒，今生今世就再也修不成仙身了，所以他懊丧不已。


    两位弟子此时听得师父如此说，皆大吃一惊，深感懊悔。


    逃得性命的建文帝，此时向张三丰师徒连声道谢相救之恩，并请求张三丰饶恕两位弟子的过失，并表示愿意自己承担过失。


    张三丰连看都不看建文帝一眼，挥挥手道：“你走罢，这里没你的事。”


    建文帝向张三丰跪拜这相救之恩，带领手下人马离开武当山，开始了流亡生涯。


    张三丰仍在叹息不已。虽然他在口中责备着两个弟子，心中却也开始原谅了两个弟子。心想：两个弟子也是出于悲天悯人之心，救助困围厄中的建文帝。别说两个弟子，当时若是在自己在山中，说不定也会出手相助的。不过，自己法力高深，不会伤人家性命，只将道衍他们吓走就算了。怪中怪自己未能及时赶回山中，制止一场杀戮。


    两位弟子将死亡的官军收殓，埋葬了，日夜为他们祈祷冥福，愿他们早日超生为人。


    说也奇怪，自杀人之后，两位弟子昔日高深的武功全消失了，悟性也没有了，变成了寻常之人。


    想想师父多年的培育全白费了，两位弟子深感对不起师父。又思及今世今生，再也修不成正果了，难逃轮回之苦，反正迟早都是一死，不如早死早投生为人，再随师父修道炼功？于是，两个弟子在一天深夜，双双自尽了。'
