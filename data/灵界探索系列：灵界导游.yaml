    # 第十四章


    # 跳出三界外


    “灵魂学”所探讨的主题当然就是灵魂。


    在某些宗教中，灵学研究者，甚至一般人的认知上，“灵魂”的意义是代表着一个（团）类人的精神体，生前依附于肉体，成为人思想行动的主宰，死后则脱离肉体继续存活世间、天堂、地狱、另一度空间，或宇宙中某处。


    但是在中国，“灵魂”的意义却有些含混不明；


    有时“灵魂”只是名词，指的是单一的人类精神体。譬如“灵魂出窍”。


    有“灵”和“魂”是同义的重叠字，譬如“亡灵”等于“亡魂”是“灵体”，“魂”是“幽体”。


    有时“灵魂”一词成了泛称，涵混了“魂魄”。


    我们先从“魂魄”谈起。


    “礼记·祭义篇”中说：'
  - '[PAGE 126]


    “众生必死，死必归土，此谓之鬼。”又说：


    “魂气聚于天，形魄聚于地（指人死之后）。”


    而且在道家的观念中认为：魂属阳，附于气，魄属阴，附于形（体），并且一向认为“魂善”而“魄恶”。


    也因此，中国人很早就有了“三魂七魄”的说法，先说“七魄”，其名称分别为“尸狗、伏矢、雀阴、容贼、非毒、除移、臭肺”，有人认为七魄代表了“喜、怒、哀、乐、爱、恶、欲”的七情（或分别主掌了人的七情），或可说“魄”（七魄）正是一种生物性的本能，例如食欲，逃避危险等等以及无意识的反射作用。所以“魄”必须依附在肉体上才会发生作用，一旦肉体死亡时，“魄”也就随着肉体的腐烂而自然的消散于无形，所以古人会有“形魄归于地”的说法。如果笼统地把“魄”视做生物性的本能，那么就“魄”而言，当然就不是人类所专有，只要是生物就都有这种代表本能活动的“魄”。


    “魄”虽然只是一种无意识的生物性本能，但是，“魄”与“魂”的关系很微妙，“魄”并不完全接受“魂”的指挥，而是有着无意部分的“自主机械动作”（自律神经），譬如人的心跳就是“魄”的作用之一，正常人是很难用意识（魂）命令心即时停止跳动的，因为心跳也是生物性本能之一。但是我们也不能说“魄”和“魂”一点关系也没有，因为“三魂”一旦离开肉体，“魄”的作用也跟着停止，这时我们就会识为这个人已经“死亡”了。


    但，有时候，“魄”的力量是很强的，譬如蛇或蜥蜴之类的动物，即使头部被砍断了，魂已离体，但其躯体即仍然不停的扭曲蠕动，甚至可达数小时之久才停止。


    性欲也是生物性本能之一，其目的是为了传宗接代、繁衍子孙。前苏联科学家曾对蜥蜴类的“守宫”做过研究，将一雄一雌的尾切断，将两条断尾放置于一块平滑的桌面上，相距约三、四'
- md: "## 第十四章 跳出三界外\n\n  十公分，这两条断尾会不停地扭动并互相靠近，仿佛对方有某种磁性吸力一般，最后这两条断尾终于碰触在一起，并互相缠绕，扭曲一团。即使在存储雄守宫本体死亡之后，两条断尾的这种“交尾”（交配）的本能仍然可持续数小时之久，可见“魄”的力量，也正因为蛇、蜥蜴这类爬虫类动物具有超强的生物性本能，才能从远古的恐龙时代，历经数亿年仍能幸存到今天。\n\
    \n  面对这样令人诧异的现象，前苏联科学家据此推论：雌雄异体的动物，相互之间“性”的吸引，可能不单纯只是心理性的行动而驱使肉体行动，而似乎有物质性的自然吸引力存在其间，并且这种吸引力在反覆的验证中是可以明确观察到的。\n\
    \n  因而，由此可以看出同种动物雌雄性之间“情不自禁”的性行动或性吸引力是一种超强的物性作用（或不自主的机械动作），不单纯只是先有了为了追求快感的“意念”，然后在不自觉的状态下完成传宗接代的天赋使命而已。当然这也是“魄”的作用之一，虽然与“灵体”无关，与“真如”无关，（证诸佛教所说“三界”的状态；“色界”、“无色界”甚至“涅槃”境界已经没有食和性的欲望。可以证明食俗、性欲及其他物欲并非由“灵体”或“真如”先天所带来的，而是先天由“魄”的作用所产生的，但是由“魄”的生物性本能所产生的食欲、性欲及其他物欲却是非常强烈，强到任何动物若不去满足它（甚至不惜冒着生命危险以暴力强夺劫掠，所谓“鸟为食亡，人为财死”，就可能造成自身死亡或亡族绝种的危机，因此在生物的本能及后天长久的交互作用下，这种食欲、性欲及其他物欲的强烈需求还是或多或少地必定会烙印在“灵体”的记忆上，当然重点不在于食或性的物性动作上的满足，最重要的是“欲”（欲念），因为灵体是不需要物质化食物或性交来获满足的，可是那种欲念却强烈到可以在灵体上留下烙印，并在人死后，一起带入灵界，加上外力的牵引而入于六道，因此在（今其他五道）的众生仍然会有这样的欲念，也正因为这种强烈欲念不能根除,\
    \ 所以才会不停地在六道中轮回,而无法往上精进地进入生命的实相。\n\n  所以 “魄” 的作用是超乎我们想像的存在, 绝不能只全心附在 “魂” 上而对 “魄”\
    \ 等闲视之。\n\n  其次再谈 “三魂”, 古称 “胎光、爽灵、幽情”, 也有人称之为 “主魂、觉魂、生魂” 或 “无神、阳神、阴神” 或 “天魂、识魂、人魂”。\n\
    \n  “三魂” 的根本是“真如” (生命实相), “三魂” 是由于 “真如动念” 所产生的一种能量形态并吸附了灵质而具形体。所以;\n\n  “真如” 属于\
    \ “涅槃境界”。\n\n  “三魂” 属于 “灵界”。\n\n  “肉体及魄” 属于 “阳世的物质世界”。\n\n  因而, “真如动念” 可产生 “能量”\
    \ (灵魂)、“能理”、凝聚 “物质” (肉体)。\n\n  为了方便解说, 在此必须概略地谈一下灵界的架构:\n\n  一、大灵界 (广义的灵界): 指含所有灵界层级在内的境域:\n\
    \  ①佛教: 欲界 (含六道)、色界、无色界、涅槃界。\n  ②西方神智学派: 物质层面、灵界层面 (狭义 “灵界”)、精神层面、觉悟层面、涅槃层面, 另有两层比\
    \ “涅槃境界” 更高的未定名境界。\n\n  以上这两派的说法, 西方神智学派所说的 “物质层面” 及狭义的 “灵界层面” 相当于佛教所说的 “欲界”,\
    \ 精神层面” 相当于 “色界”, “觉悟层面” 相当于 “无色界”。\n\n  二、灵界 (狭义的灵界): “色界” 以下, “物质层面” 以外的层面,\
    \ 含天道中的欲界六天 (四天王天、舍利天、夜摩天、兜率天、化天, 他化自在天)、阿修罗道、地狱道、饿鬼道及 “中阴身界”。\n\n  但是据研究认知,狭义的灵界指的应该是含六道在内的“欲界”,与“人道”的阳世相比,层级是相等的,没有高低尊卑之分,也就是说狭义的灵界是涵盖了人道、畜道在内的“物质界”。而且大部份是重叠的,也因此一层面相互之间的沟通相当频繁,也相互影响。图示如下:\n\
    \n  ![](img/e0e3e5a5012f1a9c2a2dc491fd3cf9be_129_0.png)\n\n## 生命的层级\n\n  所以“狭义的灵界”包含了所有欲界（欲界六天、阿修罗、人道、畜牲道、饿鬼道、地狱道）以及中阴身界（“中阴身界”（轮回过境室）指的是死后到转生前的境域，包括有光世界及黑暗世界）。\n\
    \n  其实，单以“物质界”来称呼“人道、畜道”也是不够周沿的，因为既然与其他四道及中阴身界众生同属“欲界”，自然会有食欲、性欲、物欲，所以必然有“物质”的存在，只是其他四道及中阴身界之中所存在的“物质”和存在各界的重叠处，我们人道、畜道的众生也不能感知其他各界物质的实存性，但是在其他四道及中阴身界的众生而言，各种物件仍是实存的“物质”。\n\
    \n  譬如：天界众生所见到的天上宫殿，吃到的蟠桃、美酒，甚至自身的形体，阿修罗道所见到的美女，饿鬼道所见的食物，地狱道所见的油锅、刀山，中阴身界所见到的山河大地、房舍街道，在各界众生自我的观点中，那些都是真实的特质。\n\
    \n  因此，或许我们还应该接受西方“神智学派”的划分法：将这个“狭义的灵界”全部纳入“物质界”，将较为“宏观”，因为再上去的“色界”已经有形无体、“无色界”无形无体，都已超脱了“物质”层面（“体”的层面）。\n\
    \n  确定了“灵界”的初步概念之后，再回头来谈“三魂”：\n\n  我们先假设一位已晋入“涅槃”境界的“佛”（觉者，不是专指释迦牟尼）如果也决定要来转生人世，若按步就班地迭次下降，那么他会将无形无体的“法身”因“念动”而以“光能”的形式在“无色界”显现，在降到“色界”时，他将会给这种光的“因身”赋予一个相当的外形（凝聚成具象的“形”），在降到“欲界”（物质界）时，就会依据，此众生的“共业”（共同的构成模式）吸收各种相同的物质元素，包裹在“因身”的外面，而成为物质化的灵体或肉体。如果是决定转生人世，那么在构成肉体的物质元素上，人和畜是相同的，所不同的只是“以太模式”就是人的“共业”或人的共同构成模式。这种“以太”类似道家所说的“气”（不是“气体”的气）。这个物质化的肉体就是佛教所称的“应身”。\n\
    \n  那么，反过来进行时，人在死亡离开人世之时，首先抛开的是肉体。\n\n  所谓“来自净土，归于净土”，这具肉体躯壳不论如何处理，最后终究会化为净土。将原本组成的基本物质元素——分解之后还原于大自然。\n\
    \n  编者在研究中发现，前述的“以太模式”极可能是我们在生物学上所说的“基因模式”，几乎是从我们远古的动物祖先就一直遗传下来，存在于父母双方生殖细胞中各半的23个染色体中，在受精完成的同时，这种基因模式即已组成，也决定这个胎儿未来的人种、肤色、生理状况甚至基本性格等等。而“以太体”（基因模式）是布满全身每一细胞的，并在此时由大的共同基因模式（人类）投入小的基因模式（特定的个人）。它和“七魄”的关系不是指挥，而是将“七魄”局限在一定的范围内，在他活着的任何时候都能依照此人特有的生物性本能持续地运作。\n\
    \n  在一个人死亡的同时，他的“以太体”（三魂中的“人魂”或“生魂”或“阴神”）也会脱离肉体并与其他二魂分离，以“气”的方式存在于物质界一段时间。\n\n\
    \  在正常情况下，这种“以太体”仿佛一团淡淡的蒸气，由于其构成分子因惯性作用的持续运转，不能立即停止，所以才会继续凝聚成原貌留存一段时间，然后随着运转的逐渐变慢，这团气终于越变越稀疏，范围越缩越小，最后终将消散于无形，就好像寒冷的冬天，我们用嘴对着玻璃或镜子上哈气一样，可以清楚地看那团白气因蒸发而逐渐小最后终于消失,但这只是比喻,“以太体”的消失没有这么快,有时甚至会延续上几个月的时间。\n\
    \n  “以太体”是半透明的蒸气状,所以在明亮的白天是看不见的,但是在夜晚、阴暗的房间或暗色的背景下,是可以被一般人肉眼所看见的。\n\n  “以太体”多半会被死者遗体所吸引而飘荡在墓地附近,但这种“以太体”是无意识的,虽然在人刚死时,因为以太分子活动的快速,所以仍然具备了死者生前的模样,甚至五官清晰,使得有些原本认识他的亲友(活人)在乍然见到这团以太体时,会在惊吓之余而误以为是死者显灵,但其实并不是那人,只是一团汽状,没有意识的以太体而已。\n\
    \n  这团以太体由于随着分子运转的逐渐缓慢,所以模样会越变越模糊,首先是离身体中心最远的足部渐渐消失,其次是手指间,再来是五官,接着是四肢,最后是头部也消失了,只剩下中间一团。\n\
    \n  既然因为以太分子的惯行运转,使这俗称“阴神”、“阴魂”的形体(注:以太体也是有体称的,只是像气体一样,我们摸不着而已)会续存一段时间,所以分子运转的快慢就决定了它的清晰程度,因此年轻人,身体原本强壮者死后的以太体呈白色,较不透明。老年人的缠绵病床多年而死者,以太体则呈灰色较透明。因为后者在将死之前,以太体分子的运转已经比较慢。这勉强可用自然界的“龙卷风”来比拟,龙卷风初形成时,因为旋转急速,所以可以清楚看见,但旋转逐渐变慢时,变得逐渐模糊而终致看不见。\n\
    \n  由于“以太体”在人死亡之后由人体脱离出来至逐渐消散之间有着以上的特性,所以也就引发了一些现象:\n\n  一、许多“见鬼”的目击报告中,鬼最常出现的地点就是墓地、乱葬岗、殡仪馆、太平间或停柩在家的期间。\n\
    \n  二、在极多的目击报告或传说的鬼故事中都几乎大量地提到“鬼没有脚”或“膝盖以下看不清楚”，这也几乎成了“鬼”的标准特徵。（以太体消散中的前期）\n\n\
    \  三、有些人见到“鬼”是没有五官，头部几乎像颗煮熟剥壳的白色鸡蛋。（以太体消散的中朝）\n\n  四、有些人见到的“鬼”只是一团好似拖着一条尾巴的白色烟雾。（以太体消散的后期）\n\
    \n  五、很多见“鬼”的目击报告中也都提到“鬼”是半透明的，目击者甚至可以透过“鬼”的形体看见它背后的物件。\n\n  六、绝大多数见“鬼”的目击报告或传说，其时间多在夜晚，出现在白天的极少（除非是在阴暗的室内），而出在大太阳底下的那更是闻所未闻。\n\
    \n  七、许多的目击都几乎只是单纯的“见”到鬼，而且所见到鬼都几乎是面无表情或神情黯然，了无生气的，因为这种“以太体”是完全没有自主意识的，所以也就不会说话，也不会显出喜怒哀乐表情上的变化，甚至不会有手舞足蹈的大动作。\n\
    \n  八、中国人对“鬼”的传说中有“新鬼大、旧鬼小”的说法，正是由于随着时间，以太分子运转减缓而使得那团白色的气状物逐渐缩小的缘故。\n\n  九、这种“鬼”对人几乎是全然无害的，人若遇上了因惊吓过度而导致生病，那纯粹是人自身的因素，与这种“以太体”的鬼无关，因为它既然是无意识的，自然也不会有“害人之心”。\n\
    \n  由以上种种现象，我们可以看出：“人活见鬼”是可能的，很多“见鬼”的目击报告，可信度可能超出我们一向认为的那样，绝不全是穿凿附会的市井传闻或主观意识的错觉幻象而已。\n\
    \n  在此不得不提两件事：\n\n  一、有人一听到“鬼故事”总是嗤之以鼻地认为是无稽之谈, 也因此绝大多数人总认为“鬼故事”当然是没有逻辑、漫无章法的。其实这是完全错误的见解;\
    \ “魄”的出现与目击是有一定条件的, 譬如夜晚或阴暗的室内提供了“见鬼”最好的环境,但是也不能是伸手不见五指的全黑状态, 因为在一间全黑的暗室内, 连一张全开大的白纸都看不见\
    \ (肉眼视物是因为看见该物的反射光), 又怎能看见白色雾状的“以太体”呢? 所以给“鬼故事”安排场景时; 有月光或星光的晚上比伸手不见五指的环境要好。其次是这种反馈可能会吓到人,\
    \ 但绝不会掐人的脖子或把长长的指甲插进人的身体, 把鬼写成这副德性的鬼故事作者是该打屁股的。\n\n  二、确实有些邪法师可以用诡异的邪法去驱使这些无意识的“以太体”凝聚或残留的时间,\
    \ 并以咒语符法之类的法术去驱使这些无意识的“以太体”为其所用以遂行其某种邪恶目的 (譬如引鬼入室, 惊吓居住者), 但其作用也止于惊吓, 使其心神不安而已,\
    \ 但仍然不会造成实质的伤害。因此也从而又产生了反其道的“驱鬼”仪式, 甚至有些邪法师为了赚取金钱的私心, 竟然先引鬼入宅去吓人, 再毛遂自荐地去为主人驱鬼,\
    \ 这在传说中也屡见不鲜, 并不尽然只是虚称的鬼故事而已, 不过只要了解其中的原理, 大可不必大惊小怪, 中国人所谓“见怪不怪、其怪自败”是很有道理也有实际效应的。\n\
    \n  接着谈到的是“觉魂” ( “识魂”、“心识” 或以“阿赖耶识”为主的八识综合体), 它蕴藏人一生甚至无数前世的记忆及“业”, 一般众生食欲、性欲、物欲的残留记忆因执着也深深地烙印在其中,\
    \ 通常它总是紧紧包裹在“真如”而形成了一种蒙蔽,众生之所以为众生, 而永在轮回中打转, 不能觉悟而成佛, 体现“真如”, 进入生命实相的涅槃之境, 就是因它的包裹蒙蔽。\n\
    \n  “真如”就是俗称的“主魂”, 和“觉魂”总是这样的纠缠不清, 一定要到“无色界”的觉悟层面才能甩开, 这个“觉魂”也正是我们所说的真正“灵体”。\n\
    \n  不能觉悟的众生, “主魂”被裹在“觉魂”的灵体之内成为“中阴身”。这种“灵体”依照由有着少量灵界的物质所组成, 在人死后, 就会前往灵界去报到, 在中阴身界的“灵界”等候轮回转世。但是也有例外之时:\n\
    \n  一、意外死亡者, 灵魂离体后会突然感到茫茫然的不知何去何从? 甚至不知道自身已死, 如果没有神佛慈悲引领或亡亲故友来接引, 又没有法师为其超渡, 将会一直羁留阳世或在死亡地点附近徘徊,\
    \ 这是与 “以太体” 不同的另一种 “鬼”。\n\n  二、意外死亡却心生怨恨, 死不瞑目的, 因为执着, 会羁留在死亡之处, 如车祸、淹死的, 往往会在该处\
    \ “找替死鬼”, 其实根本没有所谓的 “替死鬼” 或 “替身”, 它们只是愤愤不平地对不认识的活人报复, 拉去做同伴而已 (注: 严格来说也不是 “拉”,\
    \ 而是在刹那间, 以意识能量影响了活人的意识, 造成判断错误而致死。)\n\n  三、被谋害致死又不肯去阴司告状而一心要亲手报仇的, 则会直接去找仇家报复,\
    \ 但一时不能得手, 也将因此羁留世上。\n\n  四、死后因心念生前未完成之事或贪恋生前的种种而羁留阳世, 终于成了孤魂野鬼。\n\n  五、生前没有任何信仰,\
    \ 特别是根本不相信灵魂不灭、灵界实存的人, 死后的灵魂必然飘飘渺渺地羁留阳世, 不知何去何从 (或落入 “迷魂林” 之中)。\n\n  六、自杀而死的,\
    \ 有部份也会被羁留在死亡之处不停徘徊而不知何去何从?\n\n  七、以上这些 “孤魂野鬼” 有的会以坟墓为家, 有的会依家中牌位, 有的会依附大树、巨石之中。有的则依附在別人家的牌位之中,\
    \ 接受供奉。有的则附于人身, 有的更无赖地则附于庙宇的神像中装神弄鬼, 贪求食物纸钱的供奉。\n\n  这一类型的“鬼”与“以太体”的“鬼”最大的不同，是它不具有阳世的物质成份，而是由精细的灵界物质组成，在中阴身的灵界来看，它是有形有体的，所以称之为“灵体”。但是在阳世，因为其组成的灵界物质非我们活人肉眼可见，所以基本上我们是看不见这种“灵体”的，但是只有几种例外情形可见到这种“鬼”：\n\
    \n  一、活人因天生的“阴阳眼”或后天修炼而有“灵视”能力，具有捕捉那种灵界物质的特长时，就可以看见。\n\n  二、这种“鬼”（灵体）因为对阳世仍存有某种强烈欲念，或满心怨恨时，它也可以聚强大的念力，吸附阳世物质界细微的物质，而在短的时间内存在的。如果是为了作弄人、吓人或报仇，则也可以显现恐怖的模样来，甚至于意念强大时，也可移动阳世的物体，如飞砂走石，造成小小的旋风、砸盘丢碗等等，因此这种“鬼”要显现穿什么样的衣服或拿什么东西的样貌那也不是难事。\n\
    \n  不过，它们的力量仍未大到可以掐死活人或什么把长指甲插入人体的地步。\n\n  当然这种“鬼”一旦飘渺无依时也会被邪法师所利用，通常是提供一个舒适的能量环境给它们依附，并不时供应能量，而且还要谈条件，所以自古就有“养鬼、役鬼”的说法，不过由于邪法师本身也要输能量给这种鬼，久而久之对其本身能量耗损也极大，下场通常是不会太好的。\n\
    \n  编者并不打算把这本书变成恐怖小说，只是为了解释一些灵学上的现象才提及，所以就此打住。\n\n## 第十五章 生命的层级\n\n  在很多宗教中；或部份有灵论者经常会提到一个大家耳熟能详的名词，那就是“灵魂不灭”。\n\
    \  究竟这样的说法正确吗？灵魂就是生命的根本吗？\n\n  这样的说法，可以说“对”！也可说“不对”！\n  这话怎么说呢？真理只有一个，怎么可以又对不对地互相矛盾呢？\n\
    \n  其实这是“登堂”与“入室”的阶段问题\n  （注：这章至为重要，敬请读者用心看，否则必须疑窦丛生）\n\n  世人之中能透彻了悟佛法或精研高等灵学的人毕竟不多，绝大多数人对生命的真义，死后世界的种种多半是半信半疑，更有部份人迷信物质，坚决认为人死后就化为乌有，根本就没有“灵魂”。\n\
    \n  而且在习惯于“二分法”不是有就是无的逻辑上，宗教或“有灵论者”不得不勉强用“灵魂不灭”这个名词来驳斥或对抗唯物论，因为这时争执的焦点是“灵魂的有无”，对于完全不相信或半信半疑的大多数人，连“灵魂”这两个字都不愿接受或不能理解之际，这时只能将“灵魂”当成一个泛称，暂时借用来称呼死后的生命或生命的根本体。所以在这种情况下如果说“灵魂不灭”，那么此一说法可以被当作是正确的。因为这还在入门之后“厅堂”的阶段。因此（包括编者这本书中）也不惜列举了许多真实的个案，来证明“灵魂不灭”或“灵界实存”或将涅槃境界的佛说成“超高级灵体”，但是这真的只是在不得已的情况下勉强的权宜之计，将“灵魂不灭”或“灵体”当成泛称，暂时借用。正如同出门碰下大雨没有带伞也没有穿雨衣，暂时用张报纸遮一下，但这并非长久之计，最好是赶紧躲进骑楼下，屋子里，或撑把伞，穿件雨衣再出门。而且报纸也不是根本之道，总不可能每次下雨出门，都一直拿报纸来遮啊。\n\
    \n  其实佛都是不谈也不主张“灵魂不灭”的，因为必也正名乎，探究其要源，佛教认为“灵魂”也是不究竟的，并不是生命的根本，而只是一个暂时性的现象。\n\n\
    \  既然“灵魂”只是暂时性的现象，有如海市蜃楼一般，所以佛教认为灵魂是没有永恒性的，那么“灵魂不灭”的说法当然也就不成立了。\n\n  不过这并不矛盾：\n\
    \n  前面说了，其实这只是个名词上的问题，因为佛教认为的生命本体叫做“识”；\n\n  小乘说“六识”，以第六识当作连贯生命之流的主体。\n\n  大乘说“八识”却以第八识作为连贯生命之流的主体，这“八识”分别为：\n\
    \n  一、眼识——眼根缘色尘\n  二、耳识——耳根缘声尘\n  三、鼻识——鼻根缘香尘\n  四、舌识——舌根缘味尘\n  五、身识——身根缘触尘\n\
    \  六、意识——意根缘法尘\n  七、末那识——前六识所依之根\n  八、阿赖耶识——（藏识）\n\n  这八识的作用的职掌，简单地来说，以“阳世”为例；我们人活在世上，完全依前面五种识（五感），就是眼睛视觉所看见的，耳朵听觉所听见的，鼻子嗅觉所闻到的，舌头味觉所尝到的，身体触觉所感受到的（冷、热、麻、痒、痛等）来感知阳世物质界的一切，并且经过第六识的辨别之后，将觉得对我们有意义的（我们俗称为“意识到……”）才交给第七识“末那识”这位仓库总管，收藏进第八识“阿赖耶识”之中去。\n\
    \n  什么是有意义或“意识到……”呢，譬如以听觉为例：一对热恋中的男女走在东街百货公司的骑楼人行道中，尽管周遭人声、车声、叫卖声吵得震天价响，他们明明听到了，但他内却几乎充耳不闻，反而是对方一丁点轻声细语却能听得一字不漏，因为这时双方第六识的“意识”只专心接收对方的言语，认为这才是有意义的，而其他声音再大，虽然明明也听到了，但对他们两人当时的“意识”而言也是毫无意义的。\n\
    \n  所以第六识“意识”的作用是将我们看到、听到、闻到、尝到，碰到的反应一一过滤之后就搬进第七识“末那识”，糟的是这“末那识”并没有分辨真假的能力，于是他将前五识收集的外界资讯（经第六识筛选过的）完全信以为真，认定那是真实的，然后收进到第八识的“阿赖耶识”去（并且认定“阿赖耶识”就是它真的主人），这被藏进去的就是“业因”，这所有的资讯将会造成我们心中大小不一的激荡反应，然后这种反应又会引发我们行为的动机并命令我们去做某些事，这就是“业果”。\n\
    \n  譬如：当我们正好肚子很饿的时候，在一家熟悉的面包店门"
  mdcn: "## 第十四章 跳出三界外\n\n  十公分，这两条断尾会不停地扭动并互相靠近，仿佛对方有某种磁性吸力一般，最后这两条断尾终于碰触在一起，并互相缠绕，扭曲一团。即使在存储雄守宫本体死亡之后，两条断尾的这种“交尾”（交配）的本能仍然可持续数小时之久，可见“魄”的力量，也正因为蛇、蜥蜴这类爬虫类动物具有超强的生物性本能，才能从远古的恐龙时代，历经数亿年仍能幸存到今天。\n\
    \n  面对这样令人诧异的现象，前苏联科学家据此推论：雌雄异体的动物，相互之间“性”的吸引，可能不单纯只是心理性的行动而驱使肉体行动，而似乎有物质性的自然吸引力存在其间，并且这种吸引力在反覆的验证中是可以明确观察到的。\n\
    \n  因而，由此可以看出同种动物雌雄性之间“情不自禁”的性行动或性吸引力是一种超强的物性作用（或不自主的机械动作），不单纯只是先有了为了追求快感的“意念”，然后在不自觉的状态下完成传宗接代的天赋使命而已。当然这也是“魄”的作用之一，虽然与“灵体”无关，与“真如”无关，（证诸佛教所说“三界”的状态；“色界”、“无色界”甚至“涅槃”境界已经没有食和性的欲望。可以证明食俗、性欲及其他物欲并非由“灵体”或“真如”先天所带来的，而是先天由“魄”的作用所产生的，但是由“魄”的生物性本能所产生的食欲、性欲及其他物欲却是非常强烈，强到任何动物若不去满足它（甚至不惜冒着生命危险以暴力强夺劫掠，所谓“鸟为食亡，人为财死”，就可能造成自身死亡或亡族绝种的危机，因此在生物的本能及后天长久的交互作用下，这种食欲、性欲及其他物欲的强烈需求还是或多或少地必定会烙印在“灵体”的记忆上，当然重点不在于食或性的物性动作上的满足，最重要的是“欲”（欲念），因为灵体是不需要物质化食物或性交来获满足的，可是那种欲念却强烈到可以在灵体上留下烙印，并在人死后，一起带入灵界，加上外力的牵引而入于六道，因此在（今其他五道）的众生仍然会有这样的欲念，也正因为这种强烈欲念不能根除,\
    \ 所以才会不停地在六道中轮回,而无法往上精进地进入生命的实相。\n\n  所以 “魄” 的作用是超乎我们想像的存在, 绝不能只全心附在 “魂” 上而对 “魄”\
    \ 等闲视之。\n\n  其次再谈 “三魂”, 古称 “胎光、爽灵、幽情”, 也有人称之为 “主魂、觉魂、生魂” 或 “无神、阳神、阴神” 或 “天魂、识魂、人魂”。\n\
    \n  “三魂” 的根本是“真如” (生命实相), “三魂” 是由于 “真如动念” 所产生的一种能量形态并吸附了灵质而具形体。所以;\n\n  “真如” 属于\
    \ “涅槃境界”。\n\n  “三魂” 属于 “灵界”。\n\n  “肉体及魄” 属于 “阳世的物质世界”。\n\n  因而, “真如动念” 可产生 “能量”\
    \ (灵魂)、“能理”、凝聚 “物质” (肉体)。\n\n  为了方便解说, 在此必须概略地谈一下灵界的架构:\n\n  一、大灵界 (广义的灵界): 指含所有灵界层级在内的境域:\n\
    \  ①佛教: 欲界 (含六道)、色界、无色界、涅槃界。\n  ②西方神智学派: 物质层面、灵界层面 (狭义 “灵界”)、精神层面、觉悟层面、涅槃层面, 另有两层比\
    \ “涅槃境界” 更高的未定名境界。\n\n  以上这两派的说法, 西方神智学派所说的 “物质层面” 及狭义的 “灵界层面” 相当于佛教所说的 “欲界”,\
    \ 精神层面” 相当于 “色界”, “觉悟层面” 相当于 “无色界”。\n\n  二、灵界 (狭义的灵界): “色界” 以下, “物质层面” 以外的层面,\
    \ 含天道中的欲界六天 (四天王天、舍利天、夜摩天、兜率天、化天, 他化自在天)、阿修罗道、地狱道、饿鬼道及 “中阴身界”。\n\n  但是据研究认知,狭义的灵界指的应该是含六道在内的“欲界”,与“人道”的阳世相比,层级是相等的,没有高低尊卑之分,也就是说狭义的灵界是涵盖了人道、畜道在内的“物质界”。而且大部份是重叠的,也因此一层面相互之间的沟通相当频繁,也相互影响。图示如下:\n\
    \n  ![](img/e0e3e5a5012f1a9c2a2dc491fd3cf9be_129_0.png)\n\n## 生命的层级\n\n  所以“狭义的灵界”包含了所有欲界（欲界六天、阿修罗、人道、畜牲道、饿鬼道、地狱道）以及中阴身界（“中阴身界”（轮回过境室）指的是死后到转生前的境域，包括有光世界及黑暗世界）。\n\
    \n  其实，单以“物质界”来称呼“人道、畜道”也是不够周沿的，因为既然与其他四道及中阴身界众生同属“欲界”，自然会有食欲、性欲、物欲，所以必然有“物质”的存在，只是其他四道及中阴身界之中所存在的“物质”和存在各界的重叠处，我们人道、畜道的众生也不能感知其他各界物质的实存性，但是在其他四道及中阴身界的众生而言，各种物件仍是实存的“物质”。\n\
    \n  譬如：天界众生所见到的天上宫殿，吃到的蟠桃、美酒，甚至自身的形体，阿修罗道所见到的美女，饿鬼道所见的食物，地狱道所见的油锅、刀山，中阴身界所见到的山河大地、房舍街道，在各界众生自我的观点中，那些都是真实的特质。\n\
    \n  因此，或许我们还应该接受西方“神智学派”的划分法：将这个“狭义的灵界”全部纳入“物质界”，将较为“宏观”，因为再上去的“色界”已经有形无体、“无色界”无形无体，都已超脱了“物质”层面（“体”的层面）。\n\
    \n  确定了“灵界”的初步概念之后，再回头来谈“三魂”：\n\n  我们先假设一位已晋入“涅槃”境界的“佛”（觉者，不是专指释迦牟尼）如果也决定要来转生人世，若按步就班地迭次下降，那么他会将无形无体的“法身”因“念动”而以“光能”的形式在“无色界”显现，在降到“色界”时，他将会给这种光的“因身”赋予一个相当的外形（凝聚成具象的“形”），在降到“欲界”（物质界）时，就会依据，此众生的“共业”（共同的构成模式）吸收各种相同的物质元素，包裹在“因身”的外面，而成为物质化的灵体或肉体。如果是决定转生人世，那么在构成肉体的物质元素上，人和畜是相同的，所不同的只是“以太模式”就是人的“共业”或人的共同构成模式。这种“以太”类似道家所说的“气”（不是“气体”的气）。这个物质化的肉体就是佛教所称的“应身”。\n\
    \n  那么，反过来进行时，人在死亡离开人世之时，首先抛开的是肉体。\n\n  所谓“来自净土，归于净土”，这具肉体躯壳不论如何处理，最后终究会化为净土。将原本组成的基本物质元素——分解之后还原于大自然。\n\
    \n  编者在研究中发现，前述的“以太模式”极可能是我们在生物学上所说的“基因模式”，几乎是从我们远古的动物祖先就一直遗传下来，存在于父母双方生殖细胞中各半的23个染色体中，在受精完成的同时，这种基因模式即已组成，也决定这个胎儿未来的人种、肤色、生理状况甚至基本性格等等。而“以太体”（基因模式）是布满全身每一细胞的，并在此时由大的共同基因模式（人类）投入小的基因模式（特定的个人）。它和“七魄”的关系不是指挥，而是将“七魄”局限在一定的范围内，在他活着的任何时候都能依照此人特有的生物性本能持续地运作。\n\
    \n  在一个人死亡的同时，他的“以太体”（三魂中的“人魂”或“生魂”或“阴神”）也会脱离肉体并与其他二魂分离，以“气”的方式存在于物质界一段时间。\n\n\
    \  在正常情况下，这种“以太体”仿佛一团淡淡的蒸气，由于其构成分子因惯性作用的持续运转，不能立即停止，所以才会继续凝聚成原貌留存一段时间，然后随着运转的逐渐变慢，这团气终于越变越稀疏，范围越缩越小，最后终将消散于无形，就好像寒冷的冬天，我们用嘴对着玻璃或镜子上哈气一样，可以清楚地看那团白气因蒸发而逐渐小最后终于消失,但这只是比喻,“以太体”的消失没有这么快,有时甚至会延续上几个月的时间。\n\
    \n  “以太体”是半透明的蒸气状,所以在明亮的白天是看不见的,但是在夜晚、阴暗的房间或暗色的背景下,是可以被一般人肉眼所看见的。\n\n  “以太体”多半会被死者遗体所吸引而飘荡在墓地附近,但这种“以太体”是无意识的,虽然在人刚死时,因为以太分子活动的快速,所以仍然具备了死者生前的模样,甚至五官清晰,使得有些原本认识他的亲友(活人)在乍然见到这团以太体时,会在惊吓之余而误以为是死者显灵,但其实并不是那人,只是一团汽状,没有意识的以太体而已。\n\
    \n  这团以太体由于随着分子运转的逐渐缓慢,所以模样会越变越模糊,首先是离身体中心最远的足部渐渐消失,其次是手指间,再来是五官,接着是四肢,最后是头部也消失了,只剩下中间一团。\n\
    \n  既然因为以太分子的惯行运转,使这俗称“阴神”、“阴魂”的形体(注:以太体也是有体称的,只是像气体一样,我们摸不着而已)会续存一段时间,所以分子运转的快慢就决定了它的清晰程度,因此年轻人,身体原本强壮者死后的以太体呈白色,较不透明。老年人的缠绵病床多年而死者,以太体则呈灰色较透明。因为后者在将死之前,以太体分子的运转已经比较慢。这勉强可用自然界的“龙卷风”来比拟,龙卷风初形成时,因为旋转急速,所以可以清楚看见,但旋转逐渐变慢时,变得逐渐模糊而终致看不见。\n\
    \n  由于“以太体”在人死亡之后由人体脱离出来至逐渐消散之间有着以上的特性,所以也就引发了一些现象:\n\n  一、许多“见鬼”的目击报告中,鬼最常出现的地点就是墓地、乱葬岗、殡仪馆、太平间或停柩在家的期间。\n\
    \n  二、在极多的目击报告或传说的鬼故事中都几乎大量地提到“鬼没有脚”或“膝盖以下看不清楚”，这也几乎成了“鬼”的标准特徵。（以太体消散中的前期）\n\n\
    \  三、有些人见到“鬼”是没有五官，头部几乎像颗煮熟剥壳的白色鸡蛋。（以太体消散的中朝）\n\n  四、有些人见到的“鬼”只是一团好似拖着一条尾巴的白色烟雾。（以太体消散的后期）\n\
    \n  五、很多见“鬼”的目击报告中也都提到“鬼”是半透明的，目击者甚至可以透过“鬼”的形体看见它背后的物件。\n\n  六、绝大多数见“鬼”的目击报告或传说，其时间多在夜晚，出现在白天的极少（除非是在阴暗的室内），而出在大太阳底下的那更是闻所未闻。\n\
    \n  七、许多的目击都几乎只是单纯的“见”到鬼，而且所见到鬼都几乎是面无表情或神情黯然，了无生气的，因为这种“以太体”是完全没有自主意识的，所以也就不会说话，也不会显出喜怒哀乐表情上的变化，甚至不会有手舞足蹈的大动作。\n\
    \n  八、中国人对“鬼”的传说中有“新鬼大、旧鬼小”的说法，正是由于随着时间，以太分子运转减缓而使得那团白色的气状物逐渐缩小的缘故。\n\n  九、这种“鬼”对人几乎是全然无害的，人若遇上了因惊吓过度而导致生病，那纯粹是人自身的因素，与这种“以太体”的鬼无关，因为它既然是无意识的，自然也不会有“害人之心”。\n\
    \n  由以上种种现象，我们可以看出：“人活见鬼”是可能的，很多“见鬼”的目击报告，可信度可能超出我们一向认为的那样，绝不全是穿凿附会的市井传闻或主观意识的错觉幻象而已。\n\
    \n  在此不得不提两件事：\n\n  一、有人一听到“鬼故事”总是嗤之以鼻地认为是无稽之谈, 也因此绝大多数人总认为“鬼故事”当然是没有逻辑、漫无章法的。其实这是完全错误的见解;\
    \ “魄”的出现与目击是有一定条件的, 譬如夜晚或阴暗的室内提供了“见鬼”最好的环境,但是也不能是伸手不见五指的全黑状态, 因为在一间全黑的暗室内, 连一张全开大的白纸都看不见\
    \ (肉眼视物是因为看见该物的反射光), 又怎能看见白色雾状的“以太体”呢? 所以给“鬼故事”安排场景时; 有月光或星光的晚上比伸手不见五指的环境要好。其次是这种反馈可能会吓到人,\
    \ 但绝不会掐人的脖子或把长长的指甲插进人的身体, 把鬼写成这副德性的鬼故事作者是该打屁股的。\n\n  二、确实有些邪法师可以用诡异的邪法去驱使这些无意识的“以太体”凝聚或残留的时间,\
    \ 并以咒语符法之类的法术去驱使这些无意识的“以太体”为其所用以遂行其某种邪恶目的 (譬如引鬼入室, 惊吓居住者), 但其作用也止于惊吓, 使其心神不安而已,\
    \ 但仍然不会造成实质的伤害。因此也从而又产生了反其道的“驱鬼”仪式, 甚至有些邪法师为了赚取金钱的私心, 竟然先引鬼入宅去吓人, 再毛遂自荐地去为主人驱鬼,\
    \ 这在传说中也屡见不鲜, 并不尽然只是虚称的鬼故事而已, 不过只要了解其中的原理, 大可不必大惊小怪, 中国人所谓“见怪不怪、其怪自败”是很有道理也有实际效应的。\n\
    \n  接着谈到的是“觉魂” ( “识魂”、“心识” 或以“阿赖耶识”为主的八识综合体), 它蕴藏人一生甚至无数前世的记忆及“业”, 一般众生食欲、性欲、物欲的残留记忆因执着也深深地烙印在其中,\
    \ 通常它总是紧紧包裹在“真如”而形成了一种蒙蔽,众生之所以为众生, 而永在轮回中打转, 不能觉悟而成佛, 体现“真如”, 进入生命实相的涅槃之境, 就是因它的包裹蒙蔽。\n\
    \n  “真如”就是俗称的“主魂”, 和“觉魂”总是这样的纠缠不清, 一定要到“无色界”的觉悟层面才能甩开, 这个“觉魂”也正是我们所说的真正“灵体”。\n\
    \n  不能觉悟的众生, “主魂”被裹在“觉魂”的灵体之内成为“中阴身”。这种“灵体”依照由有着少量灵界的物质所组成, 在人死后, 就会前往灵界去报到, 在中阴身界的“灵界”等候轮回转世。但是也有例外之时:\n\
    \n  一、意外死亡者, 灵魂离体后会突然感到茫茫然的不知何去何从? 甚至不知道自身已死, 如果没有神佛慈悲引领或亡亲故友来接引, 又没有法师为其超渡, 将会一直羁留阳世或在死亡地点附近徘徊,\
    \ 这是与 “以太体” 不同的另一种 “鬼”。\n\n  二、意外死亡却心生怨恨, 死不瞑目的, 因为执着, 会羁留在死亡之处, 如车祸、淹死的, 往往会在该处\
    \ “找替死鬼”, 其实根本没有所谓的 “替死鬼” 或 “替身”, 它们只是愤愤不平地对不认识的活人报复, 拉去做同伴而已 (注: 严格来说也不是 “拉”,\
    \ 而是在刹那间, 以意识能量影响了活人的意识, 造成判断错误而致死。)\n\n  三、被谋害致死又不肯去阴司告状而一心要亲手报仇的, 则会直接去找仇家报复,\
    \ 但一时不能得手, 也将因此羁留世上。\n\n  四、死后因心念生前未完成之事或贪恋生前的种种而羁留阳世, 终于成了孤魂野鬼。\n\n  五、生前没有任何信仰,\
    \ 特别是根本不相信灵魂不灭、灵界实存的人, 死后的灵魂必然飘飘渺渺地羁留阳世, 不知何去何从 (或落入 “迷魂林” 之中)。\n\n  六、自杀而死的,\
    \ 有部份也会被羁留在死亡之处不停徘徊而不知何去何从?\n\n  七、以上这些 “孤魂野鬼” 有的会以坟墓为家, 有的会依家中牌位, 有的会依附大树、巨石之中。有的则依附在別人家的牌位之中,\
    \ 接受供奉。有的则附于人身, 有的更无赖地则附于庙宇的神像中装神弄鬼, 贪求食物纸钱的供奉。\n\n  这一类型的“鬼”与“以太体”的“鬼”最大的不同，是它不具有阳世的物质成份，而是由精细的灵界物质组成，在中阴身的灵界来看，它是有形有体的，所以称之为“灵体”。但是在阳世，因为其组成的灵界物质非我们活人肉眼可见，所以基本上我们是看不见这种“灵体”的，但是只有几种例外情形可见到这种“鬼”：\n\
    \n  一、活人因天生的“阴阳眼”或后天修炼而有“灵视”能力，具有捕捉那种灵界物质的特长时，就可以看见。\n\n  二、这种“鬼”（灵体）因为对阳世仍存有某种强烈欲念，或满心怨恨时，它也可以聚强大的念力，吸附阳世物质界细微的物质，而在短的时间内存在的。如果是为了作弄人、吓人或报仇，则也可以显现恐怖的模样来，甚至于意念强大时，也可移动阳世的物体，如飞砂走石，造成小小的旋风、砸盘丢碗等等，因此这种“鬼”要显现穿什么样的衣服或拿什么东西的样貌那也不是难事。\n\
    \n  不过，它们的力量仍未大到可以掐死活人或什么把长指甲插入人体的地步。\n\n  当然这种“鬼”一旦飘渺无依时也会被邪法师所利用，通常是提供一个舒适的能量环境给它们依附，并不时供应能量，而且还要谈条件，所以自古就有“养鬼、役鬼”的说法，不过由于邪法师本身也要输能量给这种鬼，久而久之对其本身能量耗损也极大，下场通常是不会太好的。\n\
    \n  编者并不打算把这本书变成恐怖小说，只是为了解释一些灵学上的现象才提及，所以就此打住。\n\n## 第十五章 生命的层级\n\n  在很多宗教中；或部份有灵论者经常会提到一个大家耳熟能详的名词，那就是“灵魂不灭”。\n\
    \  究竟这样的说法正确吗？灵魂就是生命的根本吗？\n\n  这样的说法，可以说“对”！也可说“不对”！\n  这话怎么说呢？真理只有一个，怎么可以又对不对地互相矛盾呢？\n\
    \n  其实这是“登堂”与“入室”的阶段问题\n  （注：这章至为重要，敬请读者用心看，否则必须疑窦丛生）\n\n  世人之中能透彻了悟佛法或精研高等灵学的人毕竟不多，绝大多数人对生命的真义，死后世界的种种多半是半信半疑，更有部份人迷信物质，坚决认为人死后就化为乌有，根本就没有“灵魂”。\n\
    \n  而且在习惯于“二分法”不是有就是无的逻辑上，宗教或“有灵论者”不得不勉强用“灵魂不灭”这个名词来驳斥或对抗唯物论，因为这时争执的焦点是“灵魂的有无”，对于完全不相信或半信半疑的大多数人，连“灵魂”这两个字都不愿接受或不能理解之际，这时只能将“灵魂”当成一个泛称，暂时借用来称呼死后的生命或生命的根本体。所以在这种情况下如果说“灵魂不灭”，那么此一说法可以被当作是正确的。因为这还在入门之后“厅堂”的阶段。因此（包括编者这本书中）也不惜列举了许多真实的个案，来证明“灵魂不灭”或“灵界实存”或将涅槃境界的佛说成“超高级灵体”，但是这真的只是在不得已的情况下勉强的权宜之计，将“灵魂不灭”或“灵体”当成泛称，暂时借用。正如同出门碰下大雨没有带伞也没有穿雨衣，暂时用张报纸遮一下，但这并非长久之计，最好是赶紧躲进骑楼下，屋子里，或撑把伞，穿件雨衣再出门。而且报纸也不是根本之道，总不可能每次下雨出门，都一直拿报纸来遮啊。\n\
    \n  其实佛都是不谈也不主张“灵魂不灭”的，因为必也正名乎，探究其要源，佛教认为“灵魂”也是不究竟的，并不是生命的根本，而只是一个暂时性的现象。\n\n\
    \  既然“灵魂”只是暂时性的现象，有如海市蜃楼一般，所以佛教认为灵魂是没有永恒性的，那么“灵魂不灭”的说法当然也就不成立了。\n\n  不过这并不矛盾：\n\
    \n  前面说了，其实这只是个名词上的问题，因为佛教认为的生命本体叫做“识”；\n\n  小乘说“六识”，以第六识当作连贯生命之流的主体。\n\n  大乘说“八识”却以第八识作为连贯生命之流的主体，这“八识”分别为：\n\
    \n  一、眼识——眼根缘色尘\n  二、耳识——耳根缘声尘\n  三、鼻识——鼻根缘香尘\n  四、舌识——舌根缘味尘\n  五、身识——身根缘触尘\n\
    \  六、意识——意根缘法尘\n  七、末那识——前六识所依之根\n  八、阿赖耶识——（藏识）\n\n  这八识的作用的职掌，简单地来说，以“阳世”为例；我们人活在世上，完全依前面五种识（五感），就是眼睛视觉所看见的，耳朵听觉所听见的，鼻子嗅觉所闻到的，舌头味觉所尝到的，身体触觉所感受到的（冷、热、麻、痒、痛等）来感知阳世物质界的一切，并且经过第六识的辨别之后，将觉得对我们有意义的（我们俗称为“意识到……”）才交给第七识“末那识”这位仓库总管，收藏进第八识“阿赖耶识”之中去。\n\
    \n  什么是有意义或“意识到……”呢，譬如以听觉为例：一对热恋中的男女走在东街百货公司的骑楼人行道中，尽管周遭人声、车声、叫卖声吵得震天价响，他们明明听到了，但他内却几乎充耳不闻，反而是对方一丁点轻声细语却能听得一字不漏，因为这时双方第六识的“意识”只专心接收对方的言语，认为这才是有意义的，而其他声音再大，虽然明明也听到了，但对他们两人当时的“意识”而言也是毫无意义的。\n\
    \n  所以第六识“意识”的作用是将我们看到、听到、闻到、尝到，碰到的反应一一过滤之后就搬进第七识“末那识”，糟的是这“末那识”并没有分辨真假的能力，于是他将前五识收集的外界资讯（经第六识筛选过的）完全信以为真，认定那是真实的，然后收进到第八识的“阿赖耶识”去（并且认定“阿赖耶识”就是它真的主人），这被藏进去的就是“业因”，这所有的资讯将会造成我们心中大小不一的激荡反应，然后这种反应又会引发我们行为的动机并命令我们去做某些事，这就是“业果”。\n\
    \n  譬如：当我们正好肚子很饿的时候，在一家熟悉的面包店门"
