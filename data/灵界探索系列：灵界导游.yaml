- md: '# 第十章 洋人游灵界


    一日一位英籍的桥梁设计名家约翰先生在本国籍友人的陪同下，欲前往传说中的阴间地府一游，对曾大师来说这也是一个兴奋难得的机会。


    这位远从英国来的朋友虽然不会说中国话，但有本国籍的友人翻译，所以语言上的隔阂并不大。


    这天下午，约翰先生杂在其他来此参加观灵的善信之中，按照规矩净手上香，然后脱除了鞋子，端坐椅子上，同时以毛巾蒙住了眼睛，静侯曾大师施法……


    等一切就绪之后，曾大师敲了两下木鱼净场之后就持续地敲走来并念着独门的咒语。


    念完一段咒之后约翰用英语说出了他异样的感觉，透过友人的翻译：“看到了光，会移动的光，但是不清楚……”


    曾老师：“好！好！继续感应，看看能不能看得更清楚？请朝着光亮的方向前进！”


    持续的念咒……


    约翰：“有一座山，我看到了一座山！”


    曾老师：“再看清楚一点，除了山以外还有没有其他的东西？”


    约翰：“没有！”


    曾老师：“看看能不能与山接近？”


    约翰：“好的！”


    曾老师再次念咒并敲击木鱼……


    约翰：“现在除了山，还看到了云！”


    曾老师：“再仔细地看看！”


    约翰：“……在旁边好像有一个山谷，但是很暗看不清楚！”


    曾老师即时焚烧符令并念起了毫光咒：


    “七祖祖师发毫光，发起毫光焰焰光……生魂看清清，看明明，开口说分明!”


    然后拍一声敲了下法器……


    约翰：“有一个山谷，我是从上往下俯视，很远，仍然不是很清楚……”


    曾老师：“试试看，尽量往光亮的方向前进!”


    约翰：“好的!”


    约翰：“山越来越近，我好像看到山壁上有黑点?”


    曾老师念了一之后：“看清楚一点，那是什么呢?”


    约翰：“嗯……好像是个隧道的洞口!”


    曾老师：“好! 现在你试着走进去! 。”


    曾老师一直不停地念着咒语，念了好长一段，约翰都没有再说话，曾老师问：“现在呢?”


    约翰：“我看到了山!”


    曾老师：“走出隧道了吗?”


    负责翻译的友人以英文询问了之后转达说：“他现在出了洞口，坐在外面，没有走! 。”


    曾老师：“请他继续往前走，不要坐在那里!”


    友人转告给约翰之后，曾老师念了一小段咒：“现在呢? 是不是在往前走，可不中可以详细地描述一下四周的景象?”


    曾老师：“好! 好! 继续走! 。”接着就念起了开路咒：“……


    亓仓路上草青青，草仔路上草发芽，献金献钱买路地，献金献钱买路行，速速去，速速行……”


    约翰：“我看到了两双动物! 路边有两双动物!”


