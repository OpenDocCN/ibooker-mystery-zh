    画家：不是!是那尊比较小的。


    曾：她有多少双手?六双还是八双?


    画家：不止!


    曾：她的动作看得很清楚吗?


    画家：比刚才清楚!我看到她的脚，穿着印度的衣服，一直走一直走，好高，好像西藏的喇嘛庙一样。天气蛮凉的。


    曾：这样有什么景象形容一下吧!


    画家：那个阶梯好高，柱子也好高，红色的，然后是金色的装饰，很宏伟。


    曾：阶梯是什么做的?


    画家：是石头，白色的石头，原石的，不是水泥，象牙色，上面有些布条在飘，那个鼓跟钟好大!


    曾：里面可以看到很多人吗?


    画家：都是喇嘛，都是和尚，有好几千人，全部都在打坐，好像在办什么会似的。有一尊神像是穿袈裟的，金色的头。


    曾：你可认得他是什么神?


    画家：不知道，没有看过!好像是西藏的宗师那样的。


    曾：这庙规模很大吗?


    画家：好大!好大!庙内有几千人坐在那里，外面有一个很大的广场，光线很亮!


    刚才那位带你的神还在吗?


    画家：是的，她在前面。我们已经走到广场中间，两边也都是喇嘛。我们刚来的时候，喇嘛们都在恭敬地拜她，现在则都在打坐……广场中央有个柱子很高，好像是纪念碑或是什幺。我们又走楼梯上去，看到一个水池，有几条小鱼，水是蛮清的，还有喷水设备……我们再往更高的地方上去，楼梯旁有一些鸽子。


    曾：你们前时的时候是走的？还是飘的？


    画家：她是在走，但我是飘的！哦！那个殿堂好大，都是好大好粗的石柱子做的，好像是希腊或是印度那种皇宫。


    曾：都是什么材质？


    画家：大理石，好高！大概有十层楼那么高，前面广场楼梯上有些鸽子。


    曾：跟我们平常看的鸽子一样吗？


    画家：一样，它们在吃东西，不过到目前为止，都是静悄悄的，我怎样才能证明这是真的？


    曾：你可以请求神明帮你加持。


    画家：她现在摸我的头！


    曾：有“摸”的感觉吗？


    画家：好像有又好像没有！


    曾：加持后你的感觉如何？


    画家：很舒服！


    曾：你再请求，使你有更进一步的感觉。


    画家：说了以后，她好像很不高兴我这样的要求！


    曾：怎么了？


    画家：从他的眼神可以看出来，不太高兴！


    说到这里所有的影像全部破掉，裂开的影像忽然变成一片黑色，师父才把他带回来，他解下毛巾满脸困惑，他说影像留最久的，就是那尊千手观音。大约有八分钟左右，这八分钟，对于一个观察敏锐的画家来说，很快地就能体会神意。在走往宏伟殿堂的高处时，他感到天气变凉，还有加持摸头时的感觉，他说“很舒服”！


    ## 第十三章

    ## 灵界采访记


    “摄影机不要拍我!”

    “把摄影机放远一点，你要拍的话，从远距离拍过来好了，靠得太近，灯光会影响我!”


    这是境外名摄影记者蓝光在接受“观灵术”施法；很快地进入灵界之后，在完全清醒与自主的情况下，向与他一同搭档前来采访的同事所说的，虽然当时他的眼睛紧紧地被毛巾蒙住，可是他仍然可以听到摄影机在近距离拍摄时的“沙沙”声，同时也感到聚光灯打在身上的灼热感，而此刻他已在“灵界”见到了一些模糊的景象，为了避免骚扰，他主动地要求自己的同事把摄影机和灯光移远一些。


    为了实际了解“观灵术”的玄异境界，两位男士自告奋勇地接受了施法，结果蓝先生很快地就进入了灵界，而助理摄影是自行决定中断，而赶紧架起所有摄影设备进行实况的摄录，以下就是这段精彩实况的纪录：


    “光一直在闪动，非常的亮，并且在往前移动，我一直跟着光往前走，可是一直保持了相当的距离。”


    “那么你现在在哪里?”


    “好象在一大片云层的上面，光也在云的上面!”


    “那么，你可以看见云层下面有什么吗?”


    他低下头，似乎很认真地看了一会儿，就道：“好像有山，嗯！我看到有一座山峰!”


    “山上有什么?”


    没有！什么都没有!”


    很快地，就看不到那座山，而完全被云雾所笼罩起来，四周白茫茫一片，除了先前的光以外，什么也看不见……


    继续接受施法约半分钟之后，他突然开口说：“我见到了一条路，而先前的光就在这条路上。


    奇妙的是，他的身体仍然飘浮在云端，百路却是在他的下面，很白很亮，一直通向很远很远的地方，几乎看不到的尽头。


    但可异的是，很快地暗了下来，什么都看不见了，只好暂时告一段落，蓝先生取下毛巾之后，其他二位同事立即持着略带怀疑的态度来询问他，他却很明确地表示他见到了很强很亮的光，在光的中间还隐约见到一个模糊的人影，印象最深的就是见到飘动的宽松衣袂，同事仍然不肯相信地问他：可不可能是摄影时聚光灯的影响？蓝先生却肯定回答说：“不是！并强调说：我自己是摄影师，那绝不是聚光灯的效果，而且你们把灯移开之后也闭了很久，我见到的光并没有移动，而且一直亮着，可以说非常刺眼，同时我看到的山也非常清楚。


    对于这一段蓝先生一直努力地在回想与判断，希望了解究竟只是个人的幻觉抑或是真实的，最后他表示：“不太像“幻觉”，而且他一直是清醒的。


    随即，他又接受了再一次的施法；这次同样是很快地就有了景象接触，而进入了“灵界”，他见到了一座很大的山峰，他正顺着弯曲的山间小道往前走，走了一会儿，他就看到了一大堆人在路旁或坐或站的，男女老幼都有，一排一排的，也不知道他们在路旁等待着什么？


    他好奇地看了看，就继续顺着逐渐平缓的山路往前走，感觉起来路很远，走了一会儿，他就看到了路的尽头之处好像有一些民房，大部份是红瓦搭造的屋顶，可是由于太远，看不太清楚，也没再看到人，只感觉左边的山比较高，右边的山坡较平缓，而那些屋宇就在山坡下面，远处有一些稻田。


    他很快地穿过这些民宅，却没有看到人影，也没有什么特殊的接触。接着他爬上了一座非常陡峭的山峰，只感觉有个体型胖胖的人莞尔一笑就擦身而过，但是两人的速度都很快，快得来不及开口招呼。


    在山顶上，他又看到蓝蓝的大海和沙滩，在穿过一片杂乱的树林之后，他突然发觉自己居然“无翼而飞”，在空中快速地飞翔起来，十分逍遥自在，而且立即看到前方不远处出现了一个很大的城市，屋子栉比鳞次，非常的热闹繁华，他随心所欲地从空中降到地上的一处住宅门口，却没有见到什么人，而那些屋子全是一排排地，不像是市中心，而比较像都市近效的景色。


    他离开郊区，信步想往较热闹的市区走去，却反而越走越觉得四周的房屋更加破烂，好像是贫民区一样……


    走了好一会，他终于来到了一处像茶楼般的地方，竟然发现有一位瘦瘦的老先生，正悠闲地在里面喝茶，却完全无视于他这位来自不同时空的不速之客，他连问了几声也不见回答，他有些窘急起来，为了赶紧找到“丰都大帝”庙宇，只好鼓起勇气开口问了声，那老先生却显然懒得开口，只是伸手指了指方向……


    谢过这位老先生之后，他继续顺阒指引的方向前行，果然很快地就找到了这座大庙，在“丰都大帝”庙门口，他停下脚步，仰望了一会才十分赞叹的形容道:这座庙很大、很高,也很气派,装设得很漂亮,庙顶尖尖翘了上去……


    跨进庙门之后,对着高坐堂上的“丰都大帝”,他报上自己姓名和生辰:“我是蓝光,×年×月×日时生,希望能看到自己的“元神”!


    停了一会儿,他突然出声笑了起来,旁观的众人都十分好奇,他却说:“有一本大书在我面前的供桌上,自己翻动起来,没有人去动它,就像有风吹着一样,可是却是一页一页有顺序地在翻着……”


    由于书面翻动的很快,完全没有停下来的意思,旁观者好奇地要趁翻书的空档,好好把这座大庙中的陈设叙述一下,他抬头四处端详了一会儿就说:


    “里面有很多好多神像,可是我都不认得!”


    “你以前没有见过这样的神象吗?”


    “没有!从没见过!”


    “那么,你的意思是说:这些神像都不是你记忆中的东西?”


    “是的,这不是我自己记忆中的,因为我跟宗教没有什么接触,所以我不认得这些神明!”


    此刻这本大书越翻越慢,他又再次报上自己的姓名、生辰和目的,书终于停住翻动了停在某一页上,整个摊开在他面前,他形容这本书十分大,是他从未见过的,几乎是他双手夹早向左右的极限(他一面说,并且一面向手势来比,但是这本书也不知是什么质料做的,居然金光闪闪,像一页一页的黄金般,此是正是金光闪烁,耀眼夺目,使他无法看到任何内容……


    他试了半天,仍然看不见,只好满怀愧意的暂时放弃,希望“丰都大帝”能批准他到“元神宫”去查看,默祷了一会,只见眼前一片光亮,就全不见了,什么都消失了,而他自己又飞回到一大片民房上,
    落地之后, 只见面前有一口很大很大的古井, 黑漆漆的深不见底。


    他绕过这口古井之后, 顺着一排排的民宅往前走, 逐间去找门牌上的姓名, 可是却没有找到, 一直在原地打转……


    他据目录找了半终于发现了大门上有了第一门牌, 上书 “丁年生” 三字, 对他而言, 这是个十分陌生也没有意义的名字, 所以并没有吸引住他继续前行之后, 又来到一处非常宽大的民宅前面,
    像是一户大户人家的宅第, 见到了一个很大的院子, 也没有见到任何人影。


    他继续逐户去寻找门牌, 但是, 他突然发现自己竟然被弹了出来, 弹到半空中, 迅速地远离这个村庄, 越来越高, 越来越远, 好不容易降了下来, 却无法降到地面,
    而是一直在屋顶上飞翔打转, 又降下来一点之后, 他就仿佛是 “超人” 一样, 在街道上做低空飞翔, 但是由于速度非常非常的快, 完全无法看清一户户门口的门牌,
    而且, 他发觉自己不太容易停下来, 只是在低空穿街越巷地快速飞翔, 顺着街道绕来绕去的, 既新鲜又刺激, 这是他从未有过的经验, 也是一般人不可能有过的经验。


    等他好不容易降到地上之后, 到处浏览, 仍然无法找到其他的门牌, 却发现在某户门前搭了一个布棚子, 好像是遮太阳用的, 但仍然没有看到人影。


    他跨进这间大宅之门, 找了半天, 也唤不出人来, 只见里面客厅的摆设全是中国古老样式的家俱看来还很新, 客厅正中有一个供桌, 上面供的不是神像, 而是许多大大小小的牌位,
    上书 “韩氏历代祖先之牌位”, 可以肯定这户人家大概是姓韩的。


    他喊了半天, 不见有人答应, 就大起胆子往里面走, 看到里面房间中有张床, 却没见到到有任何特殊的陈设或字书。


    一直往后走, 走过天井之后, 才在后面的厨房在看到了一老太太, 她正忙着在炒菜, 他有些高兴地向她借问: 这儿是什么地


    方?


    老太太回头似乎洞悉一切地答道:“我知道你是从外地来的啦!”


    他又问:“请问这儿是什么地方,我迷路了!”


    老太太却笑而不答,在笑的时候还露出了嘴中的金牙,只是摇摇手,就不理他,继续去炒菜。


    他忍不住又问了一句:“请告诉我‘元神宫’在哪里好吗?”老太太才朝了一个方指了指,他道谢之后就照着老太太所指方向往前去寻找,可是此时他却觉得全身疲惫不堪,就坐在门外一棵大树下休息,而且不停地喘气,好半天仍然没有恢复过来,只好略感遗憾地放弃了下面的行程,要求返回阳世。


    在快速的施法之下,他终于顺利地回到了现实的世界中来,对于这一段奇妙又不可思议,甚至以他的经验也无法合理给予解释的经历,他一直感到十分惊异,但是,最令他兴奋不已的却是生平第一次成为能自由飞翔的“超人”,那种快速的飞行,不论是高空或低空,完全是逼真的,而非纯粹是个人的幻觉而已,这也是他从未经历过的,相信不论是依靠飞机或滑翔翼,在这世界是也绝没有人经历过在街道巷弄之中,以靠近地面做超低空飞行的经验,这位名摄影记者,可能是世界上第一个拥有这种愉快刺激的奇异经历的第一人。


    (编著者按:当事人本身为资深摄影记者,为采访报道之工作前来,为了实际了解“观灵术”而亲自接受施法,其中值得探索的一些关键性问题,试条列如下:


    一、当事人在同一天里一共接受了三次施法才成功进入灵界,前二次虽未成功,但仍看到了强光及一些摄像,当同事以质的态度来询问时,他除了表示自己一直很清醒之外,对他所见到的刺眼强光(当时他是用毛巾蒙着双眼)也肯定表示不是摄影机上聚光灯所造成的影响,而且在他的要求下,聚光灯称开并关熄很久之后，他仍然看到刺眼的强光，同时也看到了山及人影及衣摆，再印证于他第二次接受施法顺利进入灵界后所亲历的景况，先前所见的强证及山脉显然并非出于想像之幻觉，当然也绝无任何暗示。


    二、在灵界的茶楼中遇见一位瘦瘦的老先生，连问了好几次，老先生根本懒得开口，只是用手指点了方向。由此推想；灵界居民对阳世来的访客显然一点也不感到怪异或好奇，不知是司空见惯，因常有阳世的访客的光临而不以为意，还是对阴阳界一线之隔的这种现象已了然于心，认为一点也不奇怪？因为阴间的自由亡灵可以轻松地来到阳间走动。反倒是阳世之人，必须经过大费周章的各种方法（如入定或观灵术的施法）才能进入阴间（灵界），所以免不了会大惊小怪。而灵界居民对阳世来人丝毫不以为奇的态度更是令有觉得不可思议。编著者以为譬如毛毛虫和蝴蝶一样：如果毛毛虫知道可以在空中自由飞翔数十万公里，而且可以轻易飞越河流高山的蝴蝶竟然是自己的同类（长大后的成虫）时，想必也会大惊小怪的，但相对的，飞翔中的蝴蝶见到正在树枝上蹒跚爬行、十分辛苦的毛毛虫，恐怕也同样是不以为意，绝不会大惊小怪希腊先哲柏拉图曾说过：“灵魂之投入人躯体（注：指转世为人），是从大知的环境投入小知的环境，出生是睡与忘，死亡是醒与忆。”因此，人死后回到灵界，被躯体所束缚的种种能力都立即被释放出，因此有着比活在有躯体的阳世时更广阔更灵敏的知觉。


    三、当事人在“丰都大帝”庙中见到了一本超大的生死簿，书页是像黄金薄片打成的一般金光闪闪，而且无风自动地在快速翻页，这点和许多进入灵界见到生死簿的人（包括名作家边灵）所形容的有其一致性。


    四、在翻阅生死簿的空档，在阳世围观的同事要他描述一下庙中的景象，他答说见到很多以前没见过的神象，重点在于同事问他：“……这些神象都是你记忆中的东西？”他答说：“是的！这不是我自己记忆中的，因为我跟宗教没有任何关系的人，进入灵界所看到的景象应该有其客观的存在，并不受以往经验的影响。这是好比有很多幼小的儿童，如果未经父母详细地说明，对“小人国”的感觉一定误以为是有一群活生生的小人儿居住的国度，直到亲自前去游玩之后才会了解到原来那些屋宇及人物都是缩小的模型而已。而且也不会因为这些小朋友先前的“以为”而使得客观存在的模型小人变成有生命的活物。同样地，灵界的景象其观存在的事实也并不会因为进入灵界当事人原先的认知或经验而改变。更重要的是；当事人当时他是清醒而完全自主判断能力的。


    五、当事人在中段以后不但能在空中飞翔，还能在大街道巷弄中作超低空飞行，简直就像电影中的超人一样，但是在现实的生活中，超人是不存在的，而一般人要想飞翔空中，一定要藉各种飞行器具，就算是轻航机或滑翔翼也难以和这种“无翼而飞”的自由感觉相比，当然这种感觉也绝非经验的重组。


    六、当事人在一处民宅的厨房在遇见一位正在炒菜的老太太，老太太似乎洞悉一切地告诉他：“我知道你是外地来的啦！”似乎可以看出，灵界的居民（亡灵）可以清楚地认出来者是“生魂”，而且知道是从“阳世”而来，同样又是司空见惯地不以为意，完全不会感到大惊小怪。由此也可证明只知所以然的阳世活人对于阴阳两界竟然能沟通，生魂竟然可藉由特定方式进入灵界，灵界蜀竟然客观的实存而不只是想像之地等等之事会大感惊异，会不会真的是我们这些阳世的人一直在瞎子摸象的目以为是，对于这么平常地自然法则视而不见，一旦见到了反而吓得不知所措？就如同生活在深海中的某些鱼类，如果让它们知道海水以外的陆地上还有许许多多的生物（生命），想必它们也会大惊失色的。


    ## 第十四章

    ## 跳出三界外


    “灵魂学”所探讨的主题当然就是灵魂。


    在某些宗教中，灵学研究者，甚至一般人的认知上，“灵魂”的意义是代表着一个（团）类人的精神体，生前依附于肉体，成为人思想行动的主宰，死后则脱离肉体继续存活世间、天堂、地狱、另一度空间，或宇宙中某处。


    但是在中国，“灵魂”的意义却有些含混不明；


    有时“灵魂”只是名词，指的是单一的人类精神体。譬如“灵魂出窍”。


    有“灵”和“魂”是同义的重叠字，譬如“亡灵”等于“亡魂”是“灵体”，“魂”是“幽体”。


    有时“灵魂”一词成了泛称，涵混了“魂魄”。


    我们先从“魂魄”谈起。


    “礼记·祭义篇”中说：


    “众生必死，死必归土，此谓之鬼。”又说：


    “魂气聚于天，形魄聚于地（指人死之后）。”


    而且在道家的观念中认为：魂属阳，附于气，魄属阴，附于形（体），并且一向认为“魂善”而“魄恶”。


    也因此，中国人很早就有了“三魂七魄”的说法，先说“七魄”，其名称分别为“尸狗、伏矢、雀阴、容贼、非毒、除移、臭肺”，有人认为七魄代表了“喜、怒、哀、乐、爱、恶、欲”的七情（或分别主掌了人的七情），或可说“魄”（七魄）正是一种生物性的本能，例如食欲，逃避危险等等以及无意识的反射作用。所以“魄”必须依附在肉体上才会发生作用，一旦肉体死亡时，“魄”也就随着肉体的腐烂而自然的消散于无形，所以古人会有“形魄归于地”的说法。如果笼统地把“魄”视做生物性的本能，那么就“魄”而言，当然就不是人类所专有，只要是生物就都有这种代表本能活动的“魄”。


    “魄”虽然只是一种无意识的生物性本能，但是，“魄”与“魂”的关系很微妙，“魄”并不完全接受“魂”的指挥，而是有着无意部分的“自主机械动作”（自律神经），譬如人的心跳就是“魄”的作用之一，正常人是很难用意识（魂）命令心即时停止跳动的，因为心跳也是生物性本能之一。但是我们也不能说“魄”和“魂”一点关系也没有，因为“三魂”一旦离开肉体，“魄”的作用也跟着停止，这时我们就会识为这个人已经“死亡”了。


    但，有时候，“魄”的力量是很强的，譬如蛇或蜥蜴之类的动物，即使头部被砍断了，魂已离体，但其躯体即仍然不停的扭曲蠕动，甚至可达数小时之久才停止。


    性欲也是生物性本能之一，其目的是为了传宗接代、繁衍子孙。前苏联科学家曾对蜥蜴类的“守宫”做过研究，将一雄一雌的尾切断，将两条断尾放置于一块平滑的桌面上，相距约三、四'
