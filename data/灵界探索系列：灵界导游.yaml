    资料。


    我国特有的“观灵法”完全不同于“牢亡魂”或西洋灵媒的“附灵术”。因为以灵媒为桥梁，而召请亡魂附身与阳世亲友对答的方式，不论真假都难免有种隔靴搔痒不落实的感觉。同时有时也容易被神棍或假灵媒靠唱作俱佳的演技，假藉亡魂之名需索，在真伪难辨的情况下，在一般人的观念中总有着造假的怀疑，甚至有着“牵巫姨，循话尾”的谚语：所谓的“牵巫姨”就是“牵亡魂”的俗称，民间总认为执行这类仪式的灵媒，若不是事先控知当事人的家中隐私与亲族关系，就是见风转舵，随机应变，顺着当事人的心意曲意逢迎。这十足说明了民间普遍的怀疑心态，但是“观音法”却完全不同，并不需透过灵媒做“转播站”，而是由法师施法后，让当事人自己亲自进入“灵界”（阴间）探望过世的亲友或观光，虽然成功的机率是因人而异，大约只有四成左右，但是只要是成功进入者，由于眼见到实景，而且又是完全清醒的状态下进行沟通，不但神奇而且真实，所以除非一直无法进入，一旦顺利进入，返回后都大感不可思议，却少有怀疑。


    为了研究灵学及探索灵界架构，有人曾长期针对“古传观灵”进行专题研究，十余年来曾参予的“观灵法”仪式超过百次以上，本身亲自接受施法体验也有三十余次。曾亲眼目睹的成功实例相当多，但由于着眼点置于“灵界架构”的法则问题，因此，对于故事性的强弱与曲折与否自然较少考虑。最近承蒙观灵术曾先生再提供宝贵而罕见的资料，使我们对“观灵法”的神奇又有了更深的了解，对于有志灵学研究者，这些资料使我们对灵界的法则与架构提供了明确而清晰的蓝图。


