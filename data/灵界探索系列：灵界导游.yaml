    他好奇地看了看，就继续顺着逐渐平缓的山路往前走，感觉起来路很远，走了一会儿，他就看到了路的尽头之处好像有一些民房，大部份是红瓦搭造的屋顶，可是由于太远，看不太清楚，也没再看到人，只感觉左边的山比较高，右边的山坡较平缓，而那些屋宇就在山坡下面，远处有一些稻田。


    他很快地穿过这些民宅，却没有看到人影，也没有什么特殊的接触。接着他爬上了一座非常陡峭的山峰，只感觉有个体型胖胖的人莞尔一笑就擦身而过，但是两人的速度都很快，快得来不及开口招呼。


    在山顶上，他又看到蓝蓝的大海和沙滩，在穿过一片杂乱的树林之后，他突然发觉自己居然“无翼而飞”，在空中快速地飞翔起来，十分逍遥自在，而且立即看到前方不远处出现了一个很大的城市，屋子栉比鳞次，非常的热闹繁华，他随心所欲地从空中降到地上的一处住宅门口，却没有见到什么人，而那些屋子全是一排排地，不像是市中心，而比较像都市近效的景色。


    他离开郊区，信步想往较热闹的市区走去，却反而越走越觉得四周的房屋更加破烂，好像是贫民区一样……


    走了好一会，他终于来到了一处像茶楼般的地方，竟然发现有一位瘦瘦的老先生，正悠闲地在里面喝茶，却完全无视于他这位来自不同时空的不速之客，他连问了几声也不见回答，他有些窘急起来，为了赶紧找到“丰都大帝”庙宇，只好鼓起勇气开口问了声，那老先生却显然懒得开口，只是伸手指了指方向……


    谢过这位老先生之后，他继续顺阒指引的方向前行，果然很快地就找到了这座大庙，在“丰都大帝”庙门口，他停下脚步，'
