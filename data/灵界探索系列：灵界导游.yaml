  md: '# 第十七章 人生八苦与诸界奇观 · 161 ·


    福报，自然倍感欣慰，即使有些不舍，但也就当然不会去扰乱他的精修。事实上根据许多录音实证的纪录显示以及笔者的研究，能直接转生“天界”或能进入“先修班”进修的灵，其本身对阳世的种种已相当淡泊，甚至多少已经悟到阳世的亲情、友情、爱情不过是缘起缘灭，因缘际会的一个大戏而已，一时曲终戏散，那些父子、母子、兄弟、夫妻、朋友等关系也就不存在了。虽然不是完全的绝情漠然，但反而已经不像阳世亲友如此这般的思思念念，魂牵梦萦了。因而阳世之人如果一旦知道自己的亲友已经生天界或在“先修班”清修时，最好能淡化那种情感上的“不舍”，应该默默地祝福他及感谢他在生命的一小段历程中曾经与我们有缘而成为家人朋友，并接受每个人或每个众生都是一个独立“知觉生命”的事实。不要常常去打扰他，也许有朝一日，自己也去到灵界时，他可能是第一位来欢迎你的灵界亲友呢?)


    (注④：“天界先修班”是中阴界相当特殊的一个境界，但既然仍在等候转生，所以仍然属于“轮迥过境室”的灵界，只是景观及规律已几乎完全如天界，而不同于其他各层的中阴界，特此说明。)


    # 二、中阴界（轮迥过境室）最上层


    这是整个阴界(轮迥过境室)所有层级中最美丽也最壮观的境界，虽然不能和天界相比，但已经不是人间的景色所能比拟的。


    从外往内来说，在其外围有着阳世人类用尽所有美好想象所不能想象以至完全无法想象的大自然风光，有著像地球上洪荒时代完全未被污染的碧海蓝天，洁白闪亮的细柔沙滩。积着白雪的高峰，各种颜色如织锦的秋山，青翠葱绿的夏山，粉红嫩绿的春山时存在一个空间之中而又如此和谐。清沏的绿色小溪像一首童'
