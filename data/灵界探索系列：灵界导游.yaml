  md: '# 灵界导游


    对好人应当慈悲，对坏人更应慈悲因为好人因执迷而一样要入轮回，而坏人则因执迷得较深，所以更要倍受轮回之苦，所以佛家才会主张同体大悲，众生其实都是我们自身的投影，所以都要慈悲以待。


    也因此，如果对坏人不能待之以慈悲而嫉恶如仇者，一样也是一种执迷，这种人虽然在阳世为官必是正直不阿的清官，在民间会是被四邻赞颂的正直好人，但因为这种嫉恶如仇的强烈意愿，死后在轮回慈悲的安排下，最好的去处自然是去任鬼卒阴差了，上善者为阎罗城隍，下善者为皂隶刑役，不论是上刀山、下油锅、挖心割肾，全都要靠这些人来动手执刑，而他们必然也会因为在阳世不能动私刑逞一时之快，分发到地狱去专门修理坏人不正合其意而做得不亦乐乎吗？所以假若有包公，其生平事一如笔记小说所言，那么死后任职阎王，不正是适得其所吗？


    除非他真有悲天悯人的慈悲之心，生前在对犯人行刑时真心悲悯，否则五殿阎君也是不过如此的轮回过境之处，而一般的阴差鬼卒也一样。地藏王菩萨发下宏愿：“地狱不空，誓不成佛”，地狱何时能空呢？除非众生皆醒，再执迷，否则地狱誓无空理。


    其实，“轮回”的真义是为了生命（灵魂）的“进化”（或净化），轮回像。一条永不停息的大河，载着浮浮沉沉的众生，流向圆满至善的大海，在轮回之河行进的过程中，如同淘金一样地在沉淀汰洗生命中负面的杂质，除尽，只剩下纯净的真金，才能回归到圆满至善的大海。


    所以三界六道的轮回之所都是不究竟的，全是境由心生，由众生其业所造的“虚拟实境”，只有执迷不悟的众生因认假为真而陷身其中，不停来去，求出不得。


    所以有“顿悟”、“渐悟”之说。


    所以，有的无心地念经不会成佛。'
