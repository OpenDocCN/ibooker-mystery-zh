    曾大师的施法之下，何生经历了一次奇妙的体验后，顺利地从阴间返回。


    在此同时，方先生也同时进入灵界，但两人却在异途分道扬镳，各寻已过世亲友，以致行程不一致。


    这次的“阴间之旅”固然已经顺利完成，但可喜的是也提供了一些“法则”性的架构，使我们对灵界能有进一步的认知，特别为有志灵学研究的读者归纳出来，以供参考：


    - （一）阴间（灵界）的风景非常美，色彩十分艳丽。

    - （二）地狱景象非常凄惨恐怖之外，阴间（灵界）的气氛和阳世相比则更为祥和。

    - （三）阴间（灵界）的亡魂仍有物质的需求，甚至会向阳世亲友索取。

    - （四）在阳世怀孕未及生产而过世者，在阴间仍会生产，并与阳世一样需要抚养婴儿。

    - （五）在阴间（灵界）的亡魂可以知道家人未来的吉凶。

    - （六）亡魂经常会在晚上回家来探视阳世的亲友，并且不受空间的限制，甚至可飘洋过海前往外国。

    - （七）亡魂可享受阳世亲友的菜肴，一样会品尝味道。

    - （八）在阳世犯下恶行，到了阴间将被押往地狱受罪，各种酷刑加身，痛苦万分。

    - （九）这次的游历提供了一个新的观念：“刀山”并不是单一地在地面竖立，将罪魂往下抛去刺戮，而是在上面另设一个剑山往下压。

    - （十）当事人并不认得“丰都城”而误念为“礼都城”，或可证明这并非记忆库中原有的资料，因此对于某些人将“观灵法”视为一种催眠术的见解，提出了一个极有力的反证。

