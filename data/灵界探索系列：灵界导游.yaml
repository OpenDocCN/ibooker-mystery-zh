  md: '接受祭祀供食的孤魂鬼甚至魑魅魍魉等低等动物类也就特别多，举例而言：在这世界上，顶级名牌服饰确实是存在的，但各地的劣质仿冒品也是存在的，我们不能因为看见或买到一件挂有唯妙唯肖名牌标志的服饰就相信这是真品，同样的，也不能有因为总是发现或听闻有太多的仿冒品就否定了真品名牌服饰的客观存在，两者都是过于武断而欠思考的。


