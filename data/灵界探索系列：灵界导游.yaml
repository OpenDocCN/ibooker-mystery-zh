    最好不要去打扰他。当然阳世亲友之所以会藉“观灵术”法事进入灵界去探望过世之亲友, 一是思念, 二是担心他会在“阴间”受苦, 如今见他已准备进入天界去当天神享受'
- md: '第十七章 人生八苦与诸界奇观


    福报，自然倍感欣慰，即使有些不舍，但也就当然不会去扰乱他的精修。事实上根据许多录音实证的纪录显示以及笔者的研究，能直接转生“天界”或能进入“先修班”进修的灵，其本身对阳世的种种已相当淡泊，甚至多少已经悟到阳世的亲情、友情、爱情不过是缘起缘灭，因缘际会的一个大戏而已，一时曲终戏散，那些父子、母子、兄弟、夫妻、朋友等关系也就不存在了。虽然不是完全的绝情漠然，但反而已经不像阳世亲友如此这般的思思念念，魂牵梦萦了。因而阳世之人如果一旦知道自己的亲友已经生天界或在“先修班”清修时，最好能淡化那种情感上的“不舍”，应该默默地祝福他及感谢他在生命的一小段历程中曾经与我们有缘而成为家人朋友，并接受每个人或每个众生都是一个独立“知觉生命”的事实。不要常常去打扰他，也许有朝一日，自己也去到灵界时，他可能是第一位来欢迎你的灵界亲友呢？


    注④：“天界先修班”是中阴界相当特殊的一个境界，但既然仍在等候转生，所以仍然属于“轮回过境室”的灵界，只是景观及规律已几乎完全如天界，而不同于其他各层的中阴界，特此说明。


    ## 二、中阴界（轮回过境室）最上层


    这是整个阴界（轮回过境室）所有层级中最美丽也最壮观的境界，虽然不能和天界相比，但已经不是人间的景色所能比拟的。


    从外往内来说，在其外围有着阳世人类用尽所有美好想象所不能想象以至完全无法想象的大自然风光，有着像地球上洪荒时代完全未被污染的碧海蓝天，洁白闪亮的细柔沙滩。积着白雪的高峰，各种颜色如织锦的秋山，青翠葱绿的夏山，粉红嫩绿的春山时存在一个空间之中而又如此和谐。清澈的绿色小溪像一首谣似的缓缓流过。碧绿的湖泊和池塘像被碎一地的透明琉璃。天空中有着比七彩或更多彩的彩虹，而且随时在变幻着。太阳非常之亮，但一点也不刺眼，也不会灼热难当，它只是为此地的万物镀上一层金光，也便原本红的更红，绿的更绿，白的更白，彩色的更鲜艳。这里的草原，仿佛就像一块散发着浓浓草香、软绿的特长毛地毯，让人见了恨不得就躺了下去……


    接着就会见到稀稀落落地一些村庄，每个村庄的建筑特色都不一样，有德国瑞士类童话式还有水车磨坊、尖顶小教堂似的可爱小镇，也有美国西部粗犷农庄似的乡村；有中国江南小桥流水似的农村；有日本合掌草屋那样的小小聚落。也有些根本就是画中才看得到的景色，是雷诺瓦、梵高的油画，连堆积的颜料也立体地成了实物。也有中国水墨画色烟雨江南的风光，连蒙蒙的烟雨都是完全真实的，你可以在一、二秒之中从梵高油画似的阳光中跨进烟雨蒙蒙的中国苏州小桥上，也可以从中国山水画中的一叶扁舟上一脚跨上威尼斯水上人家的台阶……


    别担心会乱成一团，不会的，这儿各种东方、西方、古代、现代的景观是出奇的谐调，浑然天成，甚至找不出一丁点不对劲的地方。


    不过这里每个村落都有每个村落的特色，有些是有着一致的景观建筑，有些是有着相同的兴趣，譬如有个村落的像德国啤酒节一样的在热闹地庆祝，喝着大杯大杯凉凉早晨泡的啤酒，吃着肥美香脆的猪脚，跳着传统的舞蹈，悦耳欢乐的音乐声让人也禁不住手舞足蹈起来……


    而邻近另一个村落却是静悄悄的，每一位村民都在室内外、制作晶莹亮丽的水晶艺术品，但他们不是用“手”做，而是用“意念”在做。如果靠近一些去看，你会大吃一惊！原来他们只要用意念去想桌上、手上，或甚至面前的空中就会出现一团闪着各种梦幻般光彩的玻璃块。不需要动手不需要工具或用火焰加温，大小可以随意增减，可以大到几十米，也可以小到像一颗弹珠，只要用意念，几乎就像一双看不见的手在那里捏一团透明的黏土似的，形状不停地在变化，“制作者”却很专注地在沉思，有的几乎是转眼间就已成型，有些则需要很久很久，全看“制作者”的想法，但是就算成型了，那也只是一个立体的虚像而已。“制作者”最后再做一次检视，如果确定符合他的创意，完全满意了，他只要凝聚意念，对着眼前这团各种造型的立体虚像赋予一个“完成”的肯定指令，这团立体虚像瞬间就会凝结成真实的立体物件，不但有着厚实的重量感，也立即闪烁着比阳世水晶玻璃更瑰丽的彩光，而且是自动散发出并变幻不定的。


    不过，奇怪的是也有另一群村民不“制作”实品，而是专门用意念生产大量的水晶原料，有长的，有圆的，有大的，有小的，而且各种色彩的都有。


    原来，他们非常地热心，用意念生产大量的可塑性水晶原料，专门免费供应比他们低一层（注：中阴界上层）的居民，因为那边某一村的居民只能用意念“制作”各种水晶艺术品，但却无法用意念“制造”原料。


    前两个村落虽然相距蛮近的，但那个在庆祝啤酒节村落的吵闹声完全不会传过来，所以这个“水晶艺术村”是完全静悄悄的。


    附近另一个村落是“东方美食村”，所有的村民不论是在室内室外，都不需要炉子或任何烹调工具，他们只要用“意念”去想：在桌上或空中就会出现各种蔬果或鱼肉及其他配料，他可以任意地用“意念”去煎煮炒炸爆烤蒸，一道道的美食就会出现在眼前，而且是色、香、味俱美，他可以先尝一尝，如果味道很好，他可以呼朋引伴（不是用喊的，这儿的居民完全用心意来沟通，根本不用开口讲话，甚至不必用眼神手势来暗示）一起来品尝，也可以独自享用，更可以免费供应其他各村的村民，同样地，如果味道不错，他就用意念下令肯定，如果觉得味道不好，他只要下个指令，这食物立即在眼前消失。


    也同样地，这个村的村民中也有许多热心人士，他们不“制作”美食，而是专门“生产”各种米、面、蔬果、鱼、肉等等的原料，免费提供给低一层的居民来使用，而低一层（中阴界上层）的居民也同样可以用意念烹调食物，但却不能“生产”食物原料。


    还有“工匠村”、“石匠村”、“铁匠村”、“珠宝加工村”、“时装村”、“新产品发明村”、“立体图画村”、“景观设计村”、“天体村”、“无所事事逍遥村”等等等等，还有许许多多想都想不到的村落。


    但是大概惟一没有的就是“车辆村”，因为这边的居民根本不需要任何交通工具，近的地方走几步就到了，远的地方只要心意所及，再远也可以在瞬间抵达。


    当然，各式各样的“制造村”也都不停地在“生产”各式各样的原料，免费供应给低一层的居民。


    这一层级的居民平常最重要的事就是“灵修”，都是由更高层级的灵，如色界、无色界，甚至涅槃界的导师来此指导解脱，可以帮助他们在未来转世时投生较有益的处所。


    往这一层级的中心去，就是市区了，这里绝对是人类还未想像到的“未来都市”，各种奇形怪状，但超级新颖充满智慧的大楼房都鳞次栉比地耸立着，而且一望无际，这里的地上、天空、海河之中也有各式各样的怪异交通工具，连阳世科幻小说所难形容的也不及此处的万分之一，甚至还有飞碟和各种太空船（注：外星人也是众生之一，一样是在轮回的定律之中，外星人的种族比地球人种还人多，但基本灵格是相同的，和地球人相比，无所谓高级和低级之分。但由于习性不同，在灵界的各层级中和来自地球人类的灵体不处于同一区域，这是因为仍有形象的差别心，一直升到“无色界”以光灵无形无体的境界，才会不分彼此地共处一起），为什么这儿竟然有比阳世先进好几世纪的未来都市呢？刚才不是说此间居民不需要交通工具吗？为什么这里又有超高科技的交通工具呢？


    因为这儿是一个科技实验场，都是由阳世死后来的灵，生前就是略有善心善行的科学家聚集之处，为了延续生前的专长或兴趣，发挥其科技头脑及专业技术，以意念继续创造各种新的产品并实际制造出来，但在此并不实际用来居住或乘用，只是因为他们喜欢发明制造，所以死后未转世前是暂住在此地，继续发明创造，也才有了比阳世更先进的科技，而且这些在未来转世之时，会存放在潜意识中（阿赖耶识），如果降生阳世的地球（或其他星球）时都会被封存而遗忘，但一旦被触发释放，他们就会创造相似的发明、雕塑、绘画的才能也是如此，所以这也完全解释了阳世所谓某些人具有“艺术天分”，某些人创作发明靠“灵感”的现象。


    基于这样的现象，所以中国人一向认为“文章本天成，妙手偶得之”的说法可说是完全正确的，一些伟大的文学名著、绘画、雕塑、音乐名曲等等，其原型在中阴界最上层这一“灵界”就已完成而存在，在这位“制作者”转生阳世的“人道”之后，会藏在潜意识中，只要一旦被触发，就会激发灵感而被表达出来，成为震惊世人的名著。而且有史以来出现的许多天才诗人、天才艺术家、天才发明家、天才音乐家以及神童都是因此而来，例如莫扎特四岁就能作曲，如果不是先天所带来的禀赋，单靠后天的音乐环境训练培养那根本是不可能的。


    ### 灵界导游


    在这一层级等候的灵体，未来多半会转生“人道”的阳世地球或其他外星世界，其中有许多都带有各行各业的天分，譬如音乐、美术、雕刻、建筑、演艺、科技、发明、哲学等等，但是在转生之后，也未必能将灵界所有先进的事物全数在阳世的人间重现，其主要原因有二：


    一、残留在潜意识之中的“灵界印象”未必能全部挖掘与发挥，如果这个人在转生阳世之后，因为因果关系，降生于不容易发挥天分的地区或家庭，又或者他本身迷惑于物质的享受而没有认真地动员创造时。


    二、某些灵界精细的物质或元素，在阳世可能找不到，于是，在无法克服某些技术性的问题时，自然也难创造出来。而且就算在阳世能找到代用品，所制造出来的东西或建筑物和灵界相当类似，但在精粗程度上却可能有着天壤之别，因此在灵界所拥有建筑景观，奇花异草，毫无污染的环境，那是阳世绝对无法比拟的。以建筑来说，灵界没有污染风化的问题，任何一幢建筑物从玻璃到石材都是百年如新，但同一幢建筑物在阳世，不到十年廿年就显得老旧了。


    这一层的居民是没有钱和信用卡的，完全是各尽所能，各取所需，甚至不必以物易物，那些各自聚集成村的灵体，他们会去从事艺术创作及科技发明，是因为他们出自内心喜欢创作和发明，而不是以此为谋生的职业，他们更欣喜于自己的创作或发明的成果被别人所接受与欣赏。


    生前从事创作发明的人，如果是真心喜欢，那么如果能来到此一层级时会持续生前的兴趣，如果生前只是把创作或发明纯粹视为职业或谋生的技术，并不是真正的喜欢，那么如果来到此处也不会继续从事与生前相同的工作，有一些生前是他种职业，但对创作或发明有着浓厚兴趣，却碍于生活无法放手去做的，来到此处就真正可以一尝宿愿。总之，这是一个完全自由的空间，可以去做任何您想做的事，当然也可以什么都不做。有些人在阳世时因工作或发明而劳苦一生，来此之后抱着“生为徭役，死为休息”的心态想好好休息，又或者有些人打算暂时无所事事地休息逍遥一阵，那也是完全被同意的，没有人会去干涉，也没有人会去嘲笑他“游手好闲、好吃懒做”，而且任何食物、衣物、房屋家具等等都可得到充分的供应，其他从事创作发明的人仍然乐于供应，绝不会另眼相看，因为在这一层级中每个人的意识都受到充分的尊重。


    生活在“中阴界最上层”的灵体，虽然好像拥有很丰富的变化能力，但是，他们仍然是在因果轮回的定律下无法超脱，因为“神通不敌业力”、“鬼通”自然也不敌业力，而且虽然他们相互之间可以靠心念来沟通，相互之间完全坦白无隐私的，但是他们的能力却不足以知道整个轮回的架构，甚至也不知道自己何时会轮回转世。一旦因缘成熟，时候到了，还是不得不去轮回，那时就会有许多高层级的灵界导师会来为他做善意的规划，并协助他做最适合的选择，在此一层级的灵体绝大多数是转生“人道”，因为在正确的选择下，再次前往“人世”除了是因为发挥将音乐、美术、文学等等高精神层面的创作发明贡献世人，以提升人类的精神层次外，他们也必须来“重修”前一世未完成或不及格的课业—做人。


    为什么呢？


    如果他们前一世就通过了必修的做人科目，这一世就不必再来重修了，但他们前一世可能着重于“物”的创造发明而过于疏忽了亲情、友情、爱情的学习责任，又或者他们前一世的创作发明虽然有益于人类，但几乎纯粹是为了获取金钱上的报酬或只是为了博得喝采，比较欠缺贡献人类的情操，所以在此层灵界时获得高层导师的善意纠正教导下，就会明白自己前一世的缺失，所以都会欣然接受再世为人的另一次考验，如果一旦通过，下一世就可往上晋升到其他更高的境界。


    所以这一层级的灵体在轮回时，是完全非强制性的，因为他们已经有相当的了悟，知道“人道”是最好的修炼场所，所以即使明知道人道的阳世绝没有灵界生活的愉快，又充满了生老病死之苦，但为了净化自己的生命，并在未来往上晋升的目的，都会毅然地转生人道。这就好像许多人在学校毕业之后，还会抽空去让补校或补习班来充实自己，明知道很累很苦，但为了精进，还是奋力向学的情形一样。


    此一層级的灵界居民，平常很少跟阳世的人间打交道，几乎不会被扶乩、碟仙之类所招请，他们会觉得没空去做那些无聊或无谓的事，连“牵亡魂”或“观灵术”也很少触及这个层级，因为这一层级是中阴界最上层，灵界的物质成份很稀薄，除非进入者是对灵界有相当认知的大修行者，否则一般人是很难认清其真貌的，而且通常只能看到其中一角，多半是最靠外围的大片面积景区，所以藉观灵术进入者，通常所形容的只是那边的风景很美屋宇很华丽，但在笔者手边的资料中，还没有进入到中心地带“未来都市”区去的，据推断，这是受到了灵界法则的限制。而一般进入者甚至也搞不清楚自己进入的是哪一层级的中阴界，不过如果以“风景很美”来推断，应该是在“中阴界最上层”或“上层”，因为“中层”和阳间的景致差不多，“下层”及“最下层”属于黑暗世界，穷山恶水，枯树败草的绝不可能“风景很美”。


    在此需特别说明一点，“中阴界”各层之间是没有明显界限的，有如一张美工印刷用的“渐层纸”，从上面百分之百的“白”到最下层百分之百的“黑”，是以渐进方式交融的，但下层居民一层级居民（灵体）的创造能力不如最上层的，所以不论自然景观或建筑市貌都差了一截，虽然如此，但由于没有污染风化，物质元素也比阳世来得精细，所以还是要比阳世美好得多。


    前面提过：这一层级的居民没有“创造”原料的能力，他们只能从最上层的热心居民那里得到原料的供应，然后再根据自己的创意，将这些原料加以利用，但制作的方式，仍然是靠“意念”，以“七彩水晶黏土”为例，他们只要捏塑成型，但是由于他们在集中意念及创意上的能量都比最上层的居民略差一些；所以成品成型的过程比较慢，也比较辛苦，而造型自然也不像最上层居民的作品那么富于变化而感动人心。当然这并不是因为他们得不到“成品”的供应，而他们只是单纯喜欢创作。以阳世为例，人们不会因为有了米开朗基罗或罗丹的旷世巨作，其他对雕塑有狂热的人就会失去创作的兴趣，即使他们的作品是不能和前两位大师相比的。


    在此一层级从事建筑的也一样，他们同样不能创造原料，只有从最上层热心的居民那儿获得砂、水泥、石材、木材等等的原料供应，然后同样以意念去构筑各式各样的屋宇住宅，亭台楼阁，由于原料精细又比阳世有创意，所以还是相当美观的，但是他们也不是为了谋生赚钱，而纯粹是为了“喜欢盖房了”，所以他们也很热心地盖其他不太善于用意念盖房子的各村居民（也许他们比较擅长于七彩水晶雕塑或擅长于制作可口的西点面包）构筑一幢幢他们喜欢的住宅别墅。


    这一层级的居民同样可以靠心念互相沟通，可以靠意念前往想去的地方，同样也要受到轮回转世定律的涵盖，但也同样不知道自己何时会投胎转世？


    他们在转世前也一样会得到高层级灵界导师的协助及指导，帮助他选择最适合并且对提升生命层级的修行有益的“来世”。


    注：最上层及上层居民有自行吸收灵界能量，创造自己需要的能力，所以完全不必向阳世亲友索取任何祭祀供品，或钱财等物。


    ## 三、中阴界（轮回过境室）上层


    ## 四、中阴界（轮回过境室）中层


    这是整个中阴界（轮回过境室）中最大的一层，景观及生活方式最接近阳世人间，也是与阳世沟通交往最频繁的一个层级。


    由于在阳世，自古以来，真正大善大恶的人所占的比例很小，绝大多数人都属于“功过两平”的，也就是没有什么太多的善心善行，也没有过多的恶心恶行。一生只是吃喝拉撒睡地顺着“人”的本能在过日子、安安份份，普平凡凡，既没有长期虔诚的信仰，对生命的真义，宇宙的真相也抱着无关紧要，昏昏噩的态度，一点也不想深入去解，甚至即使常常礼拜或上教堂，其动机也只不过是出自“自我保护”的本能，更或者将拜神当成了谈条件的交易行为，所期望的也全是物质上的贪求，如升官发财之类的，绝少是为了提升精神或心灵上的进阶与净化。


    因此绝大多数的平凡人，死后通常都是来到中阴界的中层报到，因为这里的一切都最类似阳世的人间，也最适合他们暂时居住；


    当然，不只是地球人类才如此，其他外星球的人类（智性生物），不论其科技文明是高过地球或低过地球，只要在精神及心灵层级和地球人类差不多的，死后也是会来此报到。这点我们不妨看看地球上的情形，今日人类的科技文明当然比三、四千年前不知超出了多少，甚至是古人做梦都无法想像的，但是在精神及心灵的层级上我们并没有长足的提升，相反地人类社会高度都市化的结果，使人逐渐远离了大自然，忽略了人类与大自然共荣共存的互相关系，为了追求物质文明所带来的方便与享受，早已严重地污染和破坏了大自然，再加上人欲横流日趋严重，因此在精神及心灵层面甚至有日渐退化的现象。


    所以科技（物质文明）的进步与否，与精神心灵没有任何必然的关系，因此即使科技文明比地球超出几十世纪的某些外星球，在精神心灵方面的层级也未必比地球高，如果是挟其高科技而以统治奴役其他科技文明较差地区（星球）为目的外星人类，其灵性层级甚至是比人类更低下的。不过外星世界极大，不是我们渺小的人类可以想像的，其中也有不少在灵性层级超过我们很多的，死后就不会在此一中层的层级，甚至直接进入色界或无色界，如大彻大悟的，甚至直接进入“涅槃”之境。因此不可一概而论，外星人类的灵性并不一定比地球人类高级。


    但是依据“物以类聚”的共业法则，相同来源，相同种族，相同观念，相同生活方式的灵体，在灵界也是互相聚集在一起的，不过只有灵性高低才决定其所居留的层级，并不一定要阳世的血源亲族的关系，因此即使同一家人的父母子女、兄弟姐妹、夫妻，就算因某种原因同时进入灵界，能相处一起的时间也很短暂，不久之后就会依据灵性的高低不同及各人生前的业因而分别进入不同的灵界层级去。


    依据这样的法则，在中阴界中层的广大区域中，其他外星人类（智性生物）和人类是不共处在相同的区域内，相互之间并不来往。事实上连人类自身也一样，中国人有中国人的区域，外国人有外国人的区域，甚至同为中国人，由于多民族、多省分，各自不同的生活方式也因为物以类聚而各成聚落。


    从“观灵术”众多的纪录中可以看出来，绝大多数死后进入灵界者都是来到中阴界（轮回过境室）中层的这个区域，经过推究其原因；是因为阳世功过两平的一般人毕竟占大多数，所以死后能登入“涅槃”的少之又少，能晋入各层黑暗世界的也占少数，其中至少超过半数以上的灵体依照其灵性层级依然是处于和阳世景况差不多的中层，当然也有部分生前全心专注于各种文学、艺术、美术或其他能提升人类精神文明创造的人，也依灵性高低，自私心的高低而能进入中阴界最上层或上层。


    由于前面说过：中阴界各层级间并没有明显的界限，而是渐层（渐进）方式交融的，所以即使在所谓“中层”这一广大区域中，所有居民依其能力也有高、中、低之分，却共同亲处其间；


    高能力的居民可以获得衣、食、住及生活日用品，甚至嗜好品（如烟、酒、茶、咖啡）之类的供应，同样是具有变化能力，所以过得相当富足，但由于能力有限，并不能以之供应其他灵体，也不可能大量制造来供买卖，但是也由于自私较重，所以不能晋升至上层或最上层，同时又受限于灵界法则，所以也不能接济其他较下层衣食不足的亲朋好友。只不过他们不必再来向阳世亲友索取，即使阳世亲友经“观灵术”进入灵界与之见面并询及是否需要钱，他们都会很肯定地表示自己过得很富足，并不缺钱，所以也不接受阳世亲友的济助。


    高能力的居民另外有一种“超能力”；就是他们会以将对阳世的记忆幻化成三度空间的虚像（也许是直接影响阳世来人的脑波），使得进入灵界者可以看到一如阳世的景致，这点从作家边'
  mdcn: '第十七章 人生八苦与诸界奇观


    福报，自然倍感欣慰，即使有些不舍，但也就当然不会去扰乱他的精修。事实上根据许多录音实证的纪录显示以及笔者的研究，能直接转生“天界”或能进入“先修班”进修的灵，其本身对阳世的种种已相当淡泊，甚至多少已经悟到阳世的亲情、友情、爱情不过是缘起缘灭，因缘际会的一个大戏而已，一时曲终戏散，那些父子、母子、兄弟、夫妻、朋友等关系也就不存在了。虽然不是完全的绝情漠然，但反而已经不像阳世亲友如此这般的思思念念，魂牵梦萦了。因而阳世之人如果一旦知道自己的亲友已经生天界或在“先修班”清修时，最好能淡化那种情感上的“不舍”，应该默默地祝福他及感谢他在生命的一小段历程中曾经与我们有缘而成为家人朋友，并接受每个人或每个众生都是一个独立“知觉生命”的事实。不要常常去打扰他，也许有朝一日，自己也去到灵界时，他可能是第一位来欢迎你的灵界亲友呢？


    注④：“天界先修班”是中阴界相当特殊的一个境界，但既然仍在等候转生，所以仍然属于“轮回过境室”的灵界，只是景观及规律已几乎完全如天界，而不同于其他各层的中阴界，特此说明。


    ## 二、中阴界（轮回过境室）最上层


    这是整个阴界（轮回过境室）所有层级中最美丽也最壮观的境界，虽然不能和天界相比，但已经不是人间的景色所能比拟的。


    从外往内来说，在其外围有着阳世人类用尽所有美好想象所不能想象以至完全无法想象的大自然风光，有着像地球上洪荒时代完全未被污染的碧海蓝天，洁白闪亮的细柔沙滩。积着白雪的高峰，各种颜色如织锦的秋山，青翠葱绿的夏山，粉红嫩绿的春山时存在一个空间之中而又如此和谐。清澈的绿色小溪像一首谣似的缓缓流过。碧绿的湖泊和池塘像被碎一地的透明琉璃。天空中有着比七彩或更多彩的彩虹，而且随时在变幻着。太阳非常之亮，但一点也不刺眼，也不会灼热难当，它只是为此地的万物镀上一层金光，也便原本红的更红，绿的更绿，白的更白，彩色的更鲜艳。这里的草原，仿佛就像一块散发着浓浓草香、软绿的特长毛地毯，让人见了恨不得就躺了下去……


    接着就会见到稀稀落落地一些村庄，每个村庄的建筑特色都不一样，有德国瑞士类童话式还有水车磨坊、尖顶小教堂似的可爱小镇，也有美国西部粗犷农庄似的乡村；有中国江南小桥流水似的农村；有日本合掌草屋那样的小小聚落。也有些根本就是画中才看得到的景色，是雷诺瓦、梵高的油画，连堆积的颜料也立体地成了实物。也有中国水墨画色烟雨江南的风光，连蒙蒙的烟雨都是完全真实的，你可以在一、二秒之中从梵高油画似的阳光中跨进烟雨蒙蒙的中国苏州小桥上，也可以从中国山水画中的一叶扁舟上一脚跨上威尼斯水上人家的台阶……


    别担心会乱成一团，不会的，这儿各种东方、西方、古代、现代的景观是出奇的谐调，浑然天成，甚至找不出一丁点不对劲的地方。


    不过这里每个村落都有每个村落的特色，有些是有着一致的景观建筑，有些是有着相同的兴趣，譬如有个村落的像德国啤酒节一样的在热闹地庆祝，喝着大杯大杯凉凉早晨泡的啤酒，吃着肥美香脆的猪脚，跳着传统的舞蹈，悦耳欢乐的音乐声让人也禁不住手舞足蹈起来……


    而邻近另一个村落却是静悄悄的，每一位村民都在室内外、制作晶莹亮丽的水晶艺术品，但他们不是用“手”做，而是用“意念”在做。如果靠近一些去看，你会大吃一惊！原来他们只要用意念去想桌上、手上，或甚至面前的空中就会出现一团闪着各种梦幻般光彩的玻璃块。不需要动手不需要工具或用火焰加温，大小可以随意增减，可以大到几十米，也可以小到像一颗弹珠，只要用意念，几乎就像一双看不见的手在那里捏一团透明的黏土似的，形状不停地在变化，“制作者”却很专注地在沉思，有的几乎是转眼间就已成型，有些则需要很久很久，全看“制作者”的想法，但是就算成型了，那也只是一个立体的虚像而已。“制作者”最后再做一次检视，如果确定符合他的创意，完全满意了，他只要凝聚意念，对着眼前这团各种造型的立体虚像赋予一个“完成”的肯定指令，这团立体虚像瞬间就会凝结成真实的立体物件，不但有着厚实的重量感，也立即闪烁着比阳世水晶玻璃更瑰丽的彩光，而且是自动散发出并变幻不定的。


    不过，奇怪的是也有另一群村民不“制作”实品，而是专门用意念生产大量的水晶原料，有长的，有圆的，有大的，有小的，而且各种色彩的都有。


    原来，他们非常地热心，用意念生产大量的可塑性水晶原料，专门免费供应比他们低一层（注：中阴界上层）的居民，因为那边某一村的居民只能用意念“制作”各种水晶艺术品，但却无法用意念“制造”原料。


    前两个村落虽然相距蛮近的，但那个在庆祝啤酒节村落的吵闹声完全不会传过来，所以这个“水晶艺术村”是完全静悄悄的。


    附近另一个村落是“东方美食村”，所有的村民不论是在室内室外，都不需要炉子或任何烹调工具，他们只要用“意念”去想：在桌上或空中就会出现各种蔬果或鱼肉及其他配料，他可以任意地用“意念”去煎煮炒炸爆烤蒸，一道道的美食就会出现在眼前，而且是色、香、味俱美，他可以先尝一尝，如果味道很好，他可以呼朋引伴（不是用喊的，这儿的居民完全用心意来沟通，根本不用开口讲话，甚至不必用眼神手势来暗示）一起来品尝，也可以独自享用，更可以免费供应其他各村的村民，同样地，如果味道不错，他就用意念下令肯定，如果觉得味道不好，他只要下个指令，这食物立即在眼前消失。


    也同样地，这个村的村民中也有许多热心人士，他们不“制作”美食，而是专门“生产”各种米、面、蔬果、鱼、肉等等的原料，免费提供给低一层的居民来使用，而低一层（中阴界上层）的居民也同样可以用意念烹调食物，但却不能“生产”食物原料。


    还有“工匠村”、“石匠村”、“铁匠村”、“珠宝加工村”、“时装村”、“新产品发明村”、“立体图画村”、“景观设计村”、“天体村”、“无所事事逍遥村”等等等等，还有许许多多想都想不到的村落。


    但是大概惟一没有的就是“车辆村”，因为这边的居民根本不需要任何交通工具，近的地方走几步就到了，远的地方只要心意所及，再远也可以在瞬间抵达。


    当然，各式各样的“制造村”也都不停地在“生产”各式各样的原料，免费供应给低一层的居民。


    这一层级的居民平常最重要的事就是“灵修”，都是由更高层级的灵，如色界、无色界，甚至涅槃界的导师来此指导解脱，可以帮助他们在未来转世时投生较有益的处所。


    往这一层级的中心去，就是市区了，这里绝对是人类还未想像到的“未来都市”，各种奇形怪状，但超级新颖充满智慧的大楼房都鳞次栉比地耸立着，而且一望无际，这里的地上、天空、海河之中也有各式各样的怪异交通工具，连阳世科幻小说所难形容的也不及此处的万分之一，甚至还有飞碟和各种太空船（注：外星人也是众生之一，一样是在轮回的定律之中，外星人的种族比地球人种还人多，但基本灵格是相同的，和地球人相比，无所谓高级和低级之分。但由于习性不同，在灵界的各层级中和来自地球人类的灵体不处于同一区域，这是因为仍有形象的差别心，一直升到“无色界”以光灵无形无体的境界，才会不分彼此地共处一起），为什么这儿竟然有比阳世先进好几世纪的未来都市呢？刚才不是说此间居民不需要交通工具吗？为什么这里又有超高科技的交通工具呢？


    因为这儿是一个科技实验场，都是由阳世死后来的灵，生前就是略有善心善行的科学家聚集之处，为了延续生前的专长或兴趣，发挥其科技头脑及专业技术，以意念继续创造各种新的产品并实际制造出来，但在此并不实际用来居住或乘用，只是因为他们喜欢发明制造，所以死后未转世前是暂住在此地，继续发明创造，也才有了比阳世更先进的科技，而且这些在未来转世之时，会存放在潜意识中（阿赖耶识），如果降生阳世的地球（或其他星球）时都会被封存而遗忘，但一旦被触发释放，他们就会创造相似的发明、雕塑、绘画的才能也是如此，所以这也完全解释了阳世所谓某些人具有“艺术天分”，某些人创作发明靠“灵感”的现象。


    基于这样的现象，所以中国人一向认为“文章本天成，妙手偶得之”的说法可说是完全正确的，一些伟大的文学名著、绘画、雕塑、音乐名曲等等，其原型在中阴界最上层这一“灵界”就已完成而存在，在这位“制作者”转生阳世的“人道”之后，会藏在潜意识中，只要一旦被触发，就会激发灵感而被表达出来，成为震惊世人的名著。而且有史以来出现的许多天才诗人、天才艺术家、天才发明家、天才音乐家以及神童都是因此而来，例如莫扎特四岁就能作曲，如果不是先天所带来的禀赋，单靠后天的音乐环境训练培养那根本是不可能的。


    ### 灵界导游


    在这一层级等候的灵体，未来多半会转生“人道”的阳世地球或其他外星世界，其中有许多都带有各行各业的天分，譬如音乐、美术、雕刻、建筑、演艺、科技、发明、哲学等等，但是在转生之后，也未必能将灵界所有先进的事物全数在阳世的人间重现，其主要原因有二：


    一、残留在潜意识之中的“灵界印象”未必能全部挖掘与发挥，如果这个人在转生阳世之后，因为因果关系，降生于不容易发挥天分的地区或家庭，又或者他本身迷惑于物质的享受而没有认真地动员创造时。


    二、某些灵界精细的物质或元素，在阳世可能找不到，于是，在无法克服某些技术性的问题时，自然也难创造出来。而且就算在阳世能找到代用品，所制造出来的东西或建筑物和灵界相当类似，但在精粗程度上却可能有着天壤之别，因此在灵界所拥有建筑景观，奇花异草，毫无污染的环境，那是阳世绝对无法比拟的。以建筑来说，灵界没有污染风化的问题，任何一幢建筑物从玻璃到石材都是百年如新，但同一幢建筑物在阳世，不到十年廿年就显得老旧了。


    这一层的居民是没有钱和信用卡的，完全是各尽所能，各取所需，甚至不必以物易物，那些各自聚集成村的灵体，他们会去从事艺术创作及科技发明，是因为他们出自内心喜欢创作和发明，而不是以此为谋生的职业，他们更欣喜于自己的创作或发明的成果被别人所接受与欣赏。


    生前从事创作发明的人，如果是真心喜欢，那么如果能来到此一层级时会持续生前的兴趣，如果生前只是把创作或发明纯粹视为职业或谋生的技术，并不是真正的喜欢，那么如果来到此处也不会继续从事与生前相同的工作，有一些生前是他种职业，但对创作或发明有着浓厚兴趣，却碍于生活无法放手去做的，来到此处就真正可以一尝宿愿。总之，这是一个完全自由的空间，可以去做任何您想做的事，当然也可以什么都不做。有些人在阳世时因工作或发明而劳苦一生，来此之后抱着“生为徭役，死为休息”的心态想好好休息，又或者有些人打算暂时无所事事地休息逍遥一阵，那也是完全被同意的，没有人会去干涉，也没有人会去嘲笑他“游手好闲、好吃懒做”，而且任何食物、衣物、房屋家具等等都可得到充分的供应，其他从事创作发明的人仍然乐于供应，绝不会另眼相看，因为在这一层级中每个人的意识都受到充分的尊重。


    生活在“中阴界最上层”的灵体，虽然好像拥有很丰富的变化能力，但是，他们仍然是在因果轮回的定律下无法超脱，因为“神通不敌业力”、“鬼通”自然也不敌业力，而且虽然他们相互之间可以靠心念来沟通，相互之间完全坦白无隐私的，但是他们的能力却不足以知道整个轮回的架构，甚至也不知道自己何时会轮回转世。一旦因缘成熟，时候到了，还是不得不去轮回，那时就会有许多高层级的灵界导师会来为他做善意的规划，并协助他做最适合的选择，在此一层级的灵体绝大多数是转生“人道”，因为在正确的选择下，再次前往“人世”除了是因为发挥将音乐、美术、文学等等高精神层面的创作发明贡献世人，以提升人类的精神层次外，他们也必须来“重修”前一世未完成或不及格的课业—做人。


    为什么呢？


    如果他们前一世就通过了必修的做人科目，这一世就不必再来重修了，但他们前一世可能着重于“物”的创造发明而过于疏忽了亲情、友情、爱情的学习责任，又或者他们前一世的创作发明虽然有益于人类，但几乎纯粹是为了获取金钱上的报酬或只是为了博得喝采，比较欠缺贡献人类的情操，所以在此层灵界时获得高层导师的善意纠正教导下，就会明白自己前一世的缺失，所以都会欣然接受再世为人的另一次考验，如果一旦通过，下一世就可往上晋升到其他更高的境界。


    所以这一层级的灵体在轮回时，是完全非强制性的，因为他们已经有相当的了悟，知道“人道”是最好的修炼场所，所以即使明知道人道的阳世绝没有灵界生活的愉快，又充满了生老病死之苦，但为了净化自己的生命，并在未来往上晋升的目的，都会毅然地转生人道。这就好像许多人在学校毕业之后，还会抽空去让补校或补习班来充实自己，明知道很累很苦，但为了精进，还是奋力向学的情形一样。


    此一層级的灵界居民，平常很少跟阳世的人间打交道，几乎不会被扶乩、碟仙之类所招请，他们会觉得没空去做那些无聊或无谓的事，连“牵亡魂”或“观灵术”也很少触及这个层级，因为这一层级是中阴界最上层，灵界的物质成份很稀薄，除非进入者是对灵界有相当认知的大修行者，否则一般人是很难认清其真貌的，而且通常只能看到其中一角，多半是最靠外围的大片面积景区，所以藉观灵术进入者，通常所形容的只是那边的风景很美屋宇很华丽，但在笔者手边的资料中，还没有进入到中心地带“未来都市”区去的，据推断，这是受到了灵界法则的限制。而一般进入者甚至也搞不清楚自己进入的是哪一层级的中阴界，不过如果以“风景很美”来推断，应该是在“中阴界最上层”或“上层”，因为“中层”和阳间的景致差不多，“下层”及“最下层”属于黑暗世界，穷山恶水，枯树败草的绝不可能“风景很美”。


    在此需特别说明一点，“中阴界”各层之间是没有明显界限的，有如一张美工印刷用的“渐层纸”，从上面百分之百的“白”到最下层百分之百的“黑”，是以渐进方式交融的，但下层居民一层级居民（灵体）的创造能力不如最上层的，所以不论自然景观或建筑市貌都差了一截，虽然如此，但由于没有污染风化，物质元素也比阳世来得精细，所以还是要比阳世美好得多。


    前面提过：这一层级的居民没有“创造”原料的能力，他们只能从最上层的热心居民那里得到原料的供应，然后再根据自己的创意，将这些原料加以利用，但制作的方式，仍然是靠“意念”，以“七彩水晶黏土”为例，他们只要捏塑成型，但是由于他们在集中意念及创意上的能量都比最上层的居民略差一些；所以成品成型的过程比较慢，也比较辛苦，而造型自然也不像最上层居民的作品那么富于变化而感动人心。当然这并不是因为他们得不到“成品”的供应，而他们只是单纯喜欢创作。以阳世为例，人们不会因为有了米开朗基罗或罗丹的旷世巨作，其他对雕塑有狂热的人就会失去创作的兴趣，即使他们的作品是不能和前两位大师相比的。


    在此一层级从事建筑的也一样，他们同样不能创造原料，只有从最上层热心的居民那儿获得砂、水泥、石材、木材等等的原料供应，然后同样以意念去构筑各式各样的屋宇住宅，亭台楼阁，由于原料精细又比阳世有创意，所以还是相当美观的，但是他们也不是为了谋生赚钱，而纯粹是为了“喜欢盖房了”，所以他们也很热心地盖其他不太善于用意念盖房子的各村居民（也许他们比较擅长于七彩水晶雕塑或擅长于制作可口的西点面包）构筑一幢幢他们喜欢的住宅别墅。


    这一层级的居民同样可以靠心念互相沟通，可以靠意念前往想去的地方，同样也要受到轮回转世定律的涵盖，但也同样不知道自己何时会投胎转世？


    他们在转世前也一样会得到高层级灵界导师的协助及指导，帮助他选择最适合并且对提升生命层级的修行有益的“来世”。


    注：最上层及上层居民有自行吸收灵界能量，创造自己需要的能力，所以完全不必向阳世亲友索取任何祭祀供品，或钱财等物。


    ## 三、中阴界（轮回过境室）上层


    ## 四、中阴界（轮回过境室）中层


    这是整个中阴界（轮回过境室）中最大的一层，景观及生活方式最接近阳世人间，也是与阳世沟通交往最频繁的一个层级。


    由于在阳世，自古以来，真正大善大恶的人所占的比例很小，绝大多数人都属于“功过两平”的，也就是没有什么太多的善心善行，也没有过多的恶心恶行。一生只是吃喝拉撒睡地顺着“人”的本能在过日子、安安份份，普平凡凡，既没有长期虔诚的信仰，对生命的真义，宇宙的真相也抱着无关紧要，昏昏噩的态度，一点也不想深入去解，甚至即使常常礼拜或上教堂，其动机也只不过是出自“自我保护”的本能，更或者将拜神当成了谈条件的交易行为，所期望的也全是物质上的贪求，如升官发财之类的，绝少是为了提升精神或心灵上的进阶与净化。


    因此绝大多数的平凡人，死后通常都是来到中阴界的中层报到，因为这里的一切都最类似阳世的人间，也最适合他们暂时居住；


    当然，不只是地球人类才如此，其他外星球的人类（智性生物），不论其科技文明是高过地球或低过地球，只要在精神及心灵层级和地球人类差不多的，死后也是会来此报到。这点我们不妨看看地球上的情形，今日人类的科技文明当然比三、四千年前不知超出了多少，甚至是古人做梦都无法想像的，但是在精神及心灵的层级上我们并没有长足的提升，相反地人类社会高度都市化的结果，使人逐渐远离了大自然，忽略了人类与大自然共荣共存的互相关系，为了追求物质文明所带来的方便与享受，早已严重地污染和破坏了大自然，再加上人欲横流日趋严重，因此在精神及心灵层面甚至有日渐退化的现象。


    所以科技（物质文明）的进步与否，与精神心灵没有任何必然的关系，因此即使科技文明比地球超出几十世纪的某些外星球，在精神心灵方面的层级也未必比地球高，如果是挟其高科技而以统治奴役其他科技文明较差地区（星球）为目的外星人类，其灵性层级甚至是比人类更低下的。不过外星世界极大，不是我们渺小的人类可以想像的，其中也有不少在灵性层级超过我们很多的，死后就不会在此一中层的层级，甚至直接进入色界或无色界，如大彻大悟的，甚至直接进入“涅槃”之境。因此不可一概而论，外星人类的灵性并不一定比地球人类高级。


    但是依据“物以类聚”的共业法则，相同来源，相同种族，相同观念，相同生活方式的灵体，在灵界也是互相聚集在一起的，不过只有灵性高低才决定其所居留的层级，并不一定要阳世的血源亲族的关系，因此即使同一家人的父母子女、兄弟姐妹、夫妻，就算因某种原因同时进入灵界，能相处一起的时间也很短暂，不久之后就会依据灵性的高低不同及各人生前的业因而分别进入不同的灵界层级去。


    依据这样的法则，在中阴界中层的广大区域中，其他外星人类（智性生物）和人类是不共处在相同的区域内，相互之间并不来往。事实上连人类自身也一样，中国人有中国人的区域，外国人有外国人的区域，甚至同为中国人，由于多民族、多省分，各自不同的生活方式也因为物以类聚而各成聚落。


    从“观灵术”众多的纪录中可以看出来，绝大多数死后进入灵界者都是来到中阴界（轮回过境室）中层的这个区域，经过推究其原因；是因为阳世功过两平的一般人毕竟占大多数，所以死后能登入“涅槃”的少之又少，能晋入各层黑暗世界的也占少数，其中至少超过半数以上的灵体依照其灵性层级依然是处于和阳世景况差不多的中层，当然也有部分生前全心专注于各种文学、艺术、美术或其他能提升人类精神文明创造的人，也依灵性高低，自私心的高低而能进入中阴界最上层或上层。


    由于前面说过：中阴界各层级间并没有明显的界限，而是渐层（渐进）方式交融的，所以即使在所谓“中层”这一广大区域中，所有居民依其能力也有高、中、低之分，却共同亲处其间；


    高能力的居民可以获得衣、食、住及生活日用品，甚至嗜好品（如烟、酒、茶、咖啡）之类的供应，同样是具有变化能力，所以过得相当富足，但由于能力有限，并不能以之供应其他灵体，也不可能大量制造来供买卖，但是也由于自私较重，所以不能晋升至上层或最上层，同时又受限于灵界法则，所以也不能接济其他较下层衣食不足的亲朋好友。只不过他们不必再来向阳世亲友索取，即使阳世亲友经“观灵术”进入灵界与之见面并询及是否需要钱，他们都会很肯定地表示自己过得很富足，并不缺钱，所以也不接受阳世亲友的济助。


    高能力的居民另外有一种“超能力”；就是他们会以将对阳世的记忆幻化成三度空间的虚像（也许是直接影响阳世来人的脑波），使得进入灵界者可以看到一如阳世的景致，这点从作家边'
