  md: '谣似的缓缓流过。碧绿的湖泊和池塘像被碎一地的透明琉璃。天空中有着比七彩或更多彩的彩虹,而且随时在变幻着。太阳非常之亮,但一点也不刺眼,也不会灼热难当,它只是为此地的万物镀上一层金光,也便原本红的更红,绿的更绿,白的更白,彩色的更鲜艳。这里的草原,仿佛就像一块散发着浓浓草香、软绿的特长毛地毯,让人见了恨不得就躺了下去……


