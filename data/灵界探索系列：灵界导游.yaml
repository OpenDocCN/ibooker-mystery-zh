  md: '# 第二十二章


    # 别信神棍们


    插在信箱的快信，有一截被雨淋湿了。我发现得晚，拿垃圾去丢的傍晚才看到。所幸信笺上的字，只有一角被水浸蚀。全文是这样的：

    老师：


    我是个平凡的家庭主妇，却生了个不平凡的儿子。现在，我必须为这个不平凡的儿子天天担惊受怕。他一定是中了邪。附近的寺庙、法师几乎都找遍了，就是拿他没办法。读完你的书，不禁浮起一丝希望。你肯伸援手救救我儿子吗？我只有这么个儿子呀！


    我应该尊称你法师或大师什么的，可又怕冒失犯忌。请多多包涵！


    冷淑仪 敬上


    这一定是位冷静、理智又能干的家庭主妇。发生这样的不幸，居然还保有一份幽默感。尽管是调弄的，仍留给我很深的印象。我比较喜欢和这一型的人打交道。'
