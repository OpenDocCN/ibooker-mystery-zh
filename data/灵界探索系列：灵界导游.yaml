    # 第十七章 人生八苦与诸界奇观


    于是鼓足勇气选择一次修完，因而把所有的课程全集中起来，那么这一生必然是坎坷不顺，倍尝辛酸苦楚的，甚至他必须选择一个残障或多病身体，或一个不幸的家庭，遭受无数的打击才能通过毕业考试。这好比琢磨宝石，我们一定会用最坚硬的工具去切削研磨，想想看；如果这颗宝石会说话的话，它一定会在切削研磨的过程中不停地喊痛，因为磨练一定是痛苦的，但是不经痛苦的切削研磨，宝石是不会闪烁出璀璨耀眼光芒的。同样的，灵性如果不经痛苦的历练，也同样是难以提升。也所以在三界六道中，只有人间才是最佳的修行道场，在天界享受福报的境域是难以收到修行效果的。


    当然有些灵体没这么大的勇气，所以只好选择分段修完的方式，甚至必须投胎转世数次、数十次才能修满人间的学分。（注：这其中又出现了一个在“轮回法则”中看起来是例外或漏失但事实上既不是例外，也不是漏失之处；那就是“立即转世”，有些人一死，灵体根本没有经过灵界报到手续就立即再次投胎了，其原因正是因为一个灵体可能选择了连续几次的投胎，两世之间并不需要暂时回去“过境室”休养与等待，而是“立即转世”。这种实例在东方西方都曾有过可查证的记录，所以也引发了对中阴间“轮回过境室”存在与否的疑惑，事实上这纯属误解，而有时有些灵体既没有去报到也没有“立即转世”，而是飘飘荡荡地在阳世等待了数日，数十日甚至几个月才再度投胎转世为人，也因此造成了人死后数十日会投胎转世的，但这仍然只是一个误解，读者看到此处，一定要深入地了解，才不会造成为何各家各派对轮回有着不同说法的无谓困扰。）


    在中阴界（轮回过境室）中层区域，也是“冥府”的行政中心所在，也就是位于“丰都城”中的“冥王殿”，或称为“丰都大帝殿”，下设有各种大大小小的行政机关，重要的职务多由高


    177'
  - '[PAGE 186]


    层级的灵担任, 但一般不重要行政事务, 也由中层级之内能力较高的居民来兼任。


    除此而外, 其他高能力的灵体在此就纯只是休养, 修持检讨及等待轮迴转世。不过他们的能力依然有限, 仍不足以知道自己何时会投胎转世, 在不少 “观灵术” 或以其他方式接触的纪录中,
    当询及这个问题时, 他们也都会做相同的表示。


    在中阴界 (轮回过境室) 各层级中的居也有一种升迁的法则, 由于每一层级都有依灵性及悟性不同所特别安排的课程, 如果修习完课程, 灵性达到某种程度的净化时,
    他就可往上升级, “去到” 较高的层级, 所谓的 “去到” 并不表示赴达异地, 而是原来层级那个世界的人、事、地、物会逐渐淡化, 成为虚无飘渺之境而终于消失。而原先无法知晓、不可接触甚至完全看不见的上一层级世界,
    其中的人、事、地、物则由模糊飘渺进而越变越清晰, 终至完全实存, 这好比是看电影及电视时, 两上不同场景重叠时 “淡入、淡出” 的效果, 差别只在灵界的变化在灵界居民的感觉中,
    那是完全真实立体的。


    这种情形是一个灵界共同的法则, 所以在西方神智学家的研究报告中, 也有相同的纪录。


    不过, 由此又出现了另一种现象, 一旦灵界的亲友有升级的情形, 而升入较高层级去时, 藉由 “观灵术” 进入灵界的阳世之人, 通常会被明确地告之 “他们要往上升级到另一个较好的境界去继续修行,
    以后就不容易再 ‘会面’ 或接触了。”


    但是, 有时灵界亲友不知道是受到某种法则的限制或其他原因, 往往只是很委婉隐世地告之前来探亲的阳世亲友说: 我在这里很好, 以后不用再来看我了!


    也或者有时阳杨之人进入灵界成功地探视了一次或数次之后, 隔了一段时间即使再进入, 也无法与这位灵界亲友见面或沟'
  - '[PAGE 187]


    通, 询问引领的神祇或其他灵界居民时, 会答说 “去玩了!” “不在!” 或由神祇告之: “去天界了!”、又甚至就似乎不明所以地不见了而 “找不到!”


    其他以 “牵亡魂” 或西方 “降灵会” 以亡灵附身来沟通的方式中, 也有相同的情形, 甚至亡灵会明白地表示自己即将升级,以后就不能再来附身于灵界而与阳世亲友沟通,
    甚至一些经常被灵媒请来附身谈话的亡灵在数年或十余年之后, 也会表示类似的情形, 如果是职业灵媒, 这时就必须另等新的 “热心” 亡灵来建立新的沟通管道。


    不过, 阳世的亲友一旦遇到这种情形, 不但不该感到伤感或不舍, 反而应该祝福这位灵界的亲友, 因为升级毕竟是有益灵界亲友的好事, 否则不停地用各种沟通方式去打扰他或牵绊他,
    只会使他停驻不前, 而难以精进, 对他未来的投胎转世是有防害的。


    在中层级之中, 为数最多就是属于 “中能力” 的灵体, 由于执着于阳世的种种积习, 来到灵界依然不参拜彻悟, 所以多半仍会从事着与生前完全相同的行业, 但这种行业一定是他生前有浓厚兴趣的,
    如果对生前的行业毫无兴趣, 十分厌烦, 只是为了谋生糊口不得不做, 譬如清道夫, 譬如某些职业军人, 那么来到灵界就不可能再重操旧业, 而是选择生前有兴趣但一直未实现的工作去做。


    除了一些灵界不需要的行业, 如丧葬业、色情业等等之外,中层区域内有着与阳世相同的各种行业, 每位中能力的灵国居民仍需要工作才能谋生, 也因此有着交易买卖,
    也因此有了各种货币银钱, 而且这些士、农、工、商、各行各业的居民中, 也一如阳世以拥有钱财的多寡而有贫富之分。通常这些有正当职业, 谋生能力的居民是不会主动用托梦、发炉的方式去向阳世亲友索取'
  - '[PAGE 188]


    金钱或供品祭祀的;不过在“观灵术”或以其他方式有所接触时,如果阳世亲友主动焚烧纸钱给他们,他们也是多多益善,不会拒绝,而且越是贫穷的,越有这种需要。


    如果是生前好吃懒做,没有正当职业,也没有一技之长,或是仗着家境富有,游手好闲的富家子弟,阳世的财富生不带来,死不带去,但是一生虽然没有善行,但也没有什么恶行者,尤其是对生命也没有正确的认知者,在阳世充其量只是一个混吃等死的米虫而已,那么死后来到灵界,通常会落入中层级而成为低能力者,不但没有创造能力也没有基本的谋生能力,于是只有变成灵界的乞丐甚至于三餐不继,衣不蔽体,也因此就不得不常常藉着托梦,发炉或灵媒或“观灵术”的机会来向阳世亲友索取纸钱供品的祭祀。如果万一阳世亲友根本不相信灵界之说,也没有祭祀习惯的,他们的景况就会很凄惨,只好在灵界做苦力来混碗饭吃,一旦碰上可以回到阳世的放假日,往往前往有祭祀之处乞讨而分一杯羹,也有时会穷极无聊地附于碟仙、钱仙、扶乩的方式上向不认识的人乞讨索取。


    在中层级的居民,由于“创造”的变化能力有限,不足以靠“变化”来构筑建筑物,完全必须靠工匠来建造,这一样是要花钱的,因此有较好住宅的只限于比较富有的“高能力”阶层或一些冥府的行政人员。其他中能力者多半会接受分配,而住在历代先灵(已投胎转世)所留下来的屋宇之中,也因此,在这一层级中,新的建筑极少,而先灵留下的屋宇房舍多半是依当时对阳世记忆中的样式兴建,连其中的家具用品也一样,以至于那些房舍屋宇几乎全是几十年前甚至几百年前的模样,而使得这一层整个景观都仿佛时光倒流回到了半世纪或一世纪前的感觉。这也是为什么经由“观灵术”进入灵界者至少百分之九十九都有共同的惊异与观感,一致认为:那边的市容景观、建筑式样及生活用品都'
