  md: '不然。


    吃素好不好? 从医学上的证明的确很好。但是人是杂食性的动物, 人的身体也需要适量的动物性蛋白质, 学医或学营养的都知道, 蛋白质对人体而言也有好坏之分, 某些动物性的蛋白质中也有对人体健康有益的。所以在吃素以外,
    适当地补充牛奶、蛋是合理的。有些吃纯素的人, 因为不吃肉类, 所以对米、面及含大量不饱和脂肪 (油脂) 及高普林的豆类、含醣量过高的水果摄取过多, 反而引发了高血脂及高胆固醇的毛病,
    更甚而引发了心血管毛病及中风, 如果是这样, 再坚持吃素有道理吗? 如果一个人必须舍弃健康去追求真理, 那绝对是违反自然而且也是一种执迷。


    在食物方面的不贪, 就是不要太贪求口腹之欲, 明明吃饱了还不停地吃, 或者太执着于食物的精美与珍奇, 如果单只是为了满足口腹之欲或夸耀财富, 恨不得吃遍山珍海味,
    或以各种奇怪残忍的方法去残杀各种生物, 那就不只是 “贪” 而已了!


