  md: '酸卑贱。冷家住三楼，约莫三十多平方，格局还方正。


    在客厅坐定之后，冷太太端给我泡好的一大杯茶，没有奉烟，证明她是个细心的女人。


    “我阿强是被鬼魂附身了吗？”冷先生瞄一眼一扇紧闭的房门。我知道那一定是阿强房间。


    我摇头。打开茶杯盖子，端到鼻前享受乌龙茶特有的芳香。喝了一口，接着又一口。留在舌尖唇上的甘味，驱走我旅途劳顿。放下杯子，我说：


    “这不是鬼魂附身，是一种罕见的‘失灵魂’症。特别是在他这个年龄，几乎是很难理解的事。通常中、老年人比较容易发生。”


    “失灵魂？”冷先生大惑不解地盯着我。


    冷太太则张口结舌，半天说不出话。


    “不错。”我淡淡地肯定。不希望掀起他们夫妇太大的情绪波澜。“所以才会失去理性，拿刀乱砍人；这是一种毫无意识的行为。”


    “如何证明呢？”冷先生说。


    “行为本身便是明证。因为灵魂是由意识、意志等精神物质结合而成。失了灵魂，精神便会一片空白、一片茫然，他根本不知道自己在做什么。”


    “是精神病吗？”


    “我不太清楚医学上所谓精神病的定义是怎样的？如果和丧失心志相近的话，那么阿强目前的情况，也可以用精神病三个字来描述。”


    “丧失心志？”


    “对呀，我喝了口茶，藉以和缓紧绷的气氛。“中医有所谓‘心藏灵、肝藏魂、肺藏魄、脾藏志、肾藏精’的说法，丧失心志，不就失了灵魂吗?”'
