  md: '# 第三章 轮回的法则


    注定，任何人都不得改变，不同阶级之间不能通婚，甚至不能平起平坐或平等交往，这种制度数千年来一直没有太多改变，迄今依然如此。


    当然，这不只是对“轮回”或“业报”的曲解或矫枉过正，而有理曲相信这种牢不可破的种姓制度完全是“政教合一”的刻意结果，政治上的统治者（或政治权利既得集团）为了保有权力必然全力支持僧侣婆罗门这样的主张，而僧侣为了巩固自身阶级的地位及权力，自然也乐于坚持这样的理论基础与统治阶级联手。虽然因此使得阶级的人因“认命”而带来国家社会假象的安定，然而对生命的真义及“轮回”架构无疑却是背道而驰的。


