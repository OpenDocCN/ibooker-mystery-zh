  md: '族比地球人种还人多，但基本灵格是相同的，和地球人相比，无所谓高级和低级之分。但由于习性不同，在灵界的各层级中和来自地球人类的灵体不处于同一区域，这是因为仍有形象的差别心，一直升到“无色界”以光灵无形无体的境界，才会不分彼此地共处一起)，为什么这儿竟然有比阳世先进好几世纪的未来都市呢？刚才不是说此间居民不需要交通工具吗？为什么这里又有超高科技的交通工具呢？


    因为这儿是一个科技实验场，都是由阳世死后来的灵，生前就是略有善心善行的科学家聚集之处，为了延续生前的专长或兴趣，发挥其科技头脑及专业技术，以意念继续创造各种新的产品并实际制造出来，但在此并不实际用来居住或乘用，只是因为他们喜欢发明制造，所以死后未转世前是暂住在此地，继续发明创造，也才有了比阳世更先进的科技，而且这些在未来转世之时，会存放在潜意识中（阿赖耶识），如果降生阳世的地球（或其他星球）时都会被封存而遗记遗忘，但一旦被触发释放，他们就会创造相似的发明、雕塑、绘画的才能也是如此，所以这也完全全解释了阳世所谓某些人具有“艺术天分”，某些人创作发明靠“灵感”的现象。


    基于这样的现象，所以中国人一向认为“文章本天成，妙手偶得之”的说法可说是完全正确的，一些伟大的文学名著、绘画、雕塑、音乐名曲等等，其原型在中阴界最上层这一“灵界”就已完成而存在，在这位“制作者”转生阳世的“人道”之后，会藏在潜意识中，只要一旦被触发，就会激发灵感而被表达出来，成为震惊世人的名著。而且有史以来出现的许多天才诗人、天才艺术家、天才发明家、天才音乐家以及神童都是因此而来，例如莫扎特四岁就能作曲，如果不是先天所带来的禀赋，单靠后天的音乐环境训练培养那根本是不可能的。'
