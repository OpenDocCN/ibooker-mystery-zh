  md: '# 第十七章 人生八苦与诸界奇观


    来到此处就真正可以一尝宿愿。总之，这是一个完全自由的空间，可以去做任何您想做的事，当然也可以什么都不做。有些人在阳世时因工作或发明而劳苦一生，来此之后抱着“生为徭役，死为休息”的心态想好好休息，又或者有些人打算暂时无所事事地休息逍遥一阵，那也是完全被同意的，没有人会去干涉，也没有人会去嘲笑他“游手好闲、好吃懒做”，而且任何食物、衣物、房屋家具等等都可得到充分的供应，其他从事创作发明的人仍然乐于供应，绝不会另眼相看，因为在这一层级中每个人的意识都受到充分的尊重。


    生活在“中阴界最上层”的灵体，虽然好像拥有很丰富的变化能力，但是，他们仍然是在因果轮迴的定律下无法超脱，因为“神通不敌业力”、“鬼通”自然也不敌业力，而且虽然他们相互之间可以靠心念来沟通，相互之间完全坦白无隐私的，但是他们的能力却不足以知道整个轮回的架构，甚至也不知道自己何时会轮回转世。一旦因缘成熟，时候到了，还是不得不去轮回，那时就会有许多高层级的灵界导师会来为他做善意的规划，并协助他做最适合的选择，在此一层级的灵体绝大多数是转生“人道”，因为在正确的选择下，再次前往“人世”除了是因为发挥将音乐、美术、文学等等高精神层面的创作发明贡献世人，以提升人类的精神层次外，他们也必须来“重修”前一世未完成或不及格的课业—做人。


    为什么呢？


    如果他们前一世就通过了必修的做人科目，这一世就不必再来重修了，但他们前一世可能着重于“物”的创造发明而过于疏忽了亲情、友情、爱情的学习责任，又或者他们前一世的创作发明虽然有益于人类，但几乎纯粹办是为了获取金钱上的报酬或只是为了博得喝采，比较欠缺贡献人类的情操，所以在此层灵界时'
