    # 十六、八角亭


    这也是一座山，因山腰上有一座八角的凉亭而得名，是步行进入灵界的中途休息站，也是进入灵界山岳地带最后一座山，由此再向前行，地势渐趋平缓，而终于来到平地。


    # 十七、六角庄


    “六角庄”是丰都市的一个村镇，也是非常重要的一个地点，而其范围之大，完全超越了想像，因为此地有一望无际的大花园，一片广大无垠的树林和一大片栉比鳞次的里弄住宅；花园是女性进入灵界探看“本命花丛”的地方。


    树园是男性进入灵界探看“本命树丛”的地方。


    里弄住宅是男女探看“本命元神”及“流年生死簿”的地方。


    除此之外，“六角庄”范围以内的农家，是亡魂死后超过一年以上（俗称“对年”），由“亡魂山”迁移此处定居之所，但多半是生前生长于农村乡下或务农之人。


    # 十八、丰都市


    “丰都”和“奈何桥”一样，在中国人的世界里同是赫赫有名，代表了阴间的幽冥地府，也是死亡的同义词，在甄师父这派的观灵法术中，“丰都”一直是以古老的风貌呈现，各种建筑及市容古色古香，好像维持在八十年前或甚至一百年前的古城，让人有时光倒流的感觉，而少见比较现代化的建筑及交通工具。'
- md: "## 第十九章 人生八苦与诸界奇观\n\n  虽然市容很古老，但却显得非常繁华热闹。市区中商店林立，酒肆茶坊、市集摊贩随处可见，闹区中“人”潮汹涌，男女杂处，摩肩擦踵，车水马龙，一如阳世。这也是亡魂死亡超过一年以上，由“亡魂山”迁移此处的定居之所，但大半是生前原居于都市之中或原本以经商买卖为业之人。\n\
    \n## 十九、亡魂山\n\n  这是新魂来到灵界的暂居之处，但是迁居此处多在死亡的百日之后，因为从死亡之后的一百日之间，新魂要接受各殿阎王的审判，善者升入天界或阿修罗界，恶者判入地狱、畜牲、饿鬼等界，而善恶相当的，则暂时移居到“亡魂山”，此处可说是一个过渡地带，让情绪、思虑及灵性都还不稳定的新魂在此处先行适应，等一年后完全适应了灵界的生活之后，再依各人的喜好，移居“六角庄”(郊区农居)或“丰都市”(都市)，交依个人意愿从事各种行业，多半的亡魂在此仍是重操旧业，但也可自由转业。\n\
    \n  在甄师父的施法过程中，加上如果有神祇的引领之下，进入灵界的当事人并非循序前进，而是可以任意地由其中一段路程或关卡切入，有时甚至直接进入“丰都市”或“亡魂山”。\n\
    \n  阳世之人经过“观灵术”施法进入灵界者在来到中层之后，如果得到神祇的恩准，也可由此一游天界(或天界先修班)，最上层、上层的中阴界，或下层及最下层的中阴界，甚至“地狱”。\n\
    \n  不过，不论中层级居民其生活情形如何，终究只是一种暂时的过境或居留而已，不论能待上多久，最后还是会去轮回转世。\n\n  在很多的实例中，我们可看到这层级之中；高、中能力的灵界居民，其生活是很快活的，比阳世要自由快乐得多，同样也可在瞬间以意念去到想去的地方，原本在阳世有病痛残障的来到此处也都变成健康正常，老年人也变得更年轻。他们可以任意跟喜欢的人聚在一起，夫妻倒不一定非要再厮守下去，尤其是那种同床异梦的夫妻，来到此处就不受阳世法律或传统习俗所拘束，可以各奔前程去追寻真心所爱。一些在阳世两心相许却不能结合的男女在此都能“有情人终成眷属”（殉情自杀者不在此例，下章将详述），所以有少数这层居民甚至不想再去投胎转世，但这却是不可能的，（连天界的天神因缘成熟一样要投胎转世），所以即使有这样的意愿也是不可能实现的。\n\
    \n  也因此就会出现欣然同意去投胎重修的，有勉强同意的，也有一些冥顽不灵的，不论高层级灵界导师如何苦口婆心的劝导也不肯去的，这时就会被强制执行，或根本未被强迫，而是自己迷迷糊糊就投胎转世的。\n\
    \n  特别需要说明的是：中阴界的中层级区域是比地球更广大，并将地球（阳世）包裹在内的，某些区域和阳世完全重叠，只是其构成元素及频率不同，所以两界居民互相不能感知，但由此可以证明古来先贤在难以说明这种情形之下，以“阴阳两界”来形容的说法是近似可信的。\n\
    \n## 第十八章 奇特的中阴界\n\n  如果把所有探讨的范围局限在中阴界（轮回过境室）的所有层级，那么其中最上层、上层、中层都属于“有光世界”，而下层及最下层则属于“黑暗世界”。\n\
    \n  前面说过了，中阴界各级是以“渐层”（渐进）的方式的相融，并没有明显的界限，在下层及最下层的“黑暗世界”也一样，几乎是从傍晚六、七点钟到深夜乌漆麻黑的夜晚景象，也就是越往下走，天色越黑。\n\
    \n  为什么会这样呢？\n\n  因为那边的居民他们喜欢；就像蟑螂蚊子喜欢躲在黑暗之处一样，他们最讨厌的就是光洁明亮的环境；那会使他们无所遁形而浑身不自在。就算神佛慈悲，一人发一张通行证，让他们自由前往中阴界最上层或上层，别说他们受不了那边的光亮环境，甚至因为完全不能适应强光而导致什么都看不见，也因此，他们甚而不能感知或不能承认其他高层级世界的存在。\n\
    \n  别以为这很好笑，人不也一样？我们习惯于阳世地球的生活，所以不能感知其他世界的存在，就算自古以来，就有许多先知及大智慧者甚至神佛教诲了三界六道，涅槃以至三大千世界的实存，以及其他外星世界的存在，但我们人类又有多少人承认了？绝大多数人还不是“夏虫不可以语冰”地不肯相信？\n\
    \n  想想：如果你家厨房里的蟑螂能听得懂你说的话；当你正经八百地告诉它们；除了你住的这地方之外还有其他都市，四周的海水之外还有其他国家，其他国家的蟑螂吃的食物和它们不一样，德国蟑螂喜欢吃香肠、猪脚，荷兰的蟑螂喜欢吃乳酪、火腿……猜猜看，你家厨房中的蟑螂会怎么反应？肯定是要你“少胡扯！”\n\
    \n  所谓“境由心生”、“三界唯心所造”，人死了之后一旦抛开了血肉之躯，原本被锁住，呈冬眠状态的第八识（阿赖耶识）中的资料将悉数被释放出来，所有三界六道、天堂地狱都是由这些“阿赖耶识”中的基本资料所构筑完成，这就是所谓的业力，相同业力的灵体物以类聚地在一起共同构筑相同的境界。不论三界六道、天堂地狱各种不同的境界，虽然从涅槃的层级来看全是境由心生的虚幻不实之境，但对于各自能构筑那种境界的众生而言，对自己所构筑境界中的一砖一石，一草一木，甚或自身的形体，他们都是确信为真，而坚固不假的。\n\
    \n  譬如人间也一样，一堵厚实的高墙可以挡住你，也可以挡住我，也可以挡住任何“人”，要走到另一边去，不是绕路，就只有攀爬，再不然办好来个撑竿跳，为什么呢？因为我们都是人，有着人类相同共业，我们相信那些砖块是实存而坚固的，我们也相信以那些砖块砌起来的高墙是实存而坚固的，所以不用上述方式一定过不去而会被挡住。但是对于神、鬼或灵体，那堵墙根本就不存在，顶多也只是个不实的虚相而已，他们轻松地穿进穿出，毫无阻碍，甚至完全没有意识到墙的存在。所以讲个笑话；如果遇见“鬼”，把门窗关得更紧，其至躲进防弹库里去也是没用的。\n\
    \n  因为构成人体及阳世墙壁的物质元素与构成灵体或灵界物件的物质元素是完全不同的。\n\n  譬如对阳世的人来说；同样是五厘米厚的钢铁，果冻、水及烟雾（注：烟雾也是一种悬附粒子的物质）。我们很难用手指头刺穿一块钢铁，但可以刺穿一块果冻，不容易刺穿水，却更容易刺穿一团烟雾，而事实上在我们人类眼中坚硬无比的钢铁如果在高倍的电子显微镜下，那也不过只是原子排列整齐的一块海绵状物，如果再进入分子的世界，那么那些分子如果像太空中的星球，而分子与分子间的空隙则犹如太空一样空旷。\n\
    \n  因此即使我们用钢铁来构筑一个固若金汤的保险库，一旦关闭起来，别说人，可能连一只小蚂蚁也钻不进去，但是对鬼（灵体）来说，要穿过钢墙进入这仓库，就好像一团雾要穿过蚊帐一样轻而易举。\n\
    \n  同样地，在中阴界以至三界六道之中的众生也无不相信各自所处境界中的一切物质是坚固实存的，这在佛教中称之为“坚固幻觉”。\n\n  但由此会引出两点法则：\n\
    \n  - 一、低层级的较难或甚至完全不能感知高层级其中的景况及一切物件的存在。\n  - 二、高层级的可以明确感知低层级灵界的景况，但却不受限于物件的限制，譬如墙壁或大山、巨石，几乎完全不能限制其行动，他同样可以轻松地穿越。\n\
    \n  现在，我们再回头来谈谈“观灵术”中的问题，由于在师父的施术之下，真正进入灵界者不是当事人的肉体，而是他的灵（魂），所以在灵界中一样要受到灵界法则的涵盖，也因此所见到\n\
    \n## 中阴界（轮回过境室）下层\n\n  如果一定要求探究这一层级的所在位置，据编者所知，大概包括了我们人类所生活的阳世地表以及地表以下的一大片区域，并衔接中阴界最下层而涵盖了整个地壳，而地壳之内的岩浆区一直到地心则就是我们所说的“地狱”或西方人所说的“炼狱”。\n\
    \n  不要以为地壳那么坚硬密实，下层或最下层的灵界居民怎么可能有生活的空间，前面花了好几页篇幅来解说可不是闲谈打趣，正是为了说明灵界与阳世组成的物质元素不同，我们阳世之人以为坚硬密实的地壳，对灵界居民而言就像一团似有还无的烟雾而已，所以他们生存的空间甚至比地表还大。\n\
    \n  先来谈下层及最下层为什么是一个黑暗世界，千万不要误以为是住于地表之下，暗无天日所致，和这并没有关系。而是这两层居民生前所投射（自行制造）的黑暗物质所致，我们可以给它一个名词叫做“心灵垃圾”。\n\
    \n  这种“心灵垃圾”不但污染了灵界下二层的大地，污染了水源，也污染了灵界下二层的天空，而二层之间又有程度的差别，“下层”的天空是灰蒙蒙的，感觉起来像傍晚至入夜的天空，但可别以为会有晚霞夕阳的美景，这边只有清一色的灰色调，差别只在色调的深浅而已。而“最下层”则更糟，几乎是黑色调的夜景，但也不完全是伸手不见五指的漆黑，依程度不一，多少还见得到一些景物的轮廓。\n\
    \n  先说这些“心灵垃圾”怎么来的。\n\n  第一种是有形的，真的是那些工业废水、废气，但不是物质的，而是那些排放者的心态意念，不论他是公营或民营，也不管是一个单位，或单一的个人，全都是为了一个“贪”字，才会罔顾地球的生态，罔顾其他人类及生灵的死活。举例而言：一个人将一瓶有毒的液体或重金属随便倒进水沟里，以致污染了整条水沟，即使排进了河里，海里仍然会造成污染，因此这个人的这种“意念”就是一种“心灵垃圾”会沉重地下降至中阴界的下层及最下层去。如果是一家企业排放了有毒的废气，这种从老板到执行的厂长，员工的“意念”也同样汇集成更沉重的“心灵垃圾”，污染了整个下层及最下层的天空，至于焚烧废五金产生毒害人体“戴奥辛”，制造毒油、伪药、残害人体的那些见利忘义者的心态意念，或制造化学战剂、生物战剂的科学家，只为了自身利益，罔顾所有生灵死活者他们的心态意念，自古以来就不停地在污染下层及最下层的灵界。\n\
    \n  另一种则是无形的，例如人的自私心、贪心、悭吝之心、残暴不仁之心、猜疑之心、幸灾乐祸之心、无明怒火之心、损人利己之心等等等等这些负面的“意念”，别以为是看不见就不存在了，一旦兴起，除了被纪录在阿赖耶识中，也将具体地物质化而沉积到下层及最下层的中阴界去，有些化为无生命的嶙峋怪石，荆棘藤蔓，或污臭黏液，有些化为臭烟毒火，有些甚至在长期不停地投射中，幻化成看似有生命的臭草毒花、妖树怪木，而无数丑陋、恶臭、恶心、有毒的虫蛇怪兽也全靠人类不停投射抛弃的“心灵垃圾”而在下层及最下层的中阴间得到充分的饲料而赖以存活。\n\
    \n  举例来说，一个粗暴的卡车司机，超速行驶于街道上，闯红灯时差点撞倒了路人，他不但不觉得自己不对，反而探头而出恶狠狠地对那位路人大骂一声：“操!你想找死是吗?”\n\
    \n  这句话停留在空中不会超过五秒钟，但伴随着的那种恶毒的心念却永远存在，并立即化为“心灵垃圾”而投射到下层及最下层去，也许化做了污臭黏稠的黑色浓液四处窜流。\n\
    \n  当然这也是一种共业，是长时期由多数众生所共同堆积了大量“心灵垃圾”所造成……\n\n  而重要的是，一个经常有类似意念或行为的众生，久而久之，习惯成自然，必定会形成一种“见光死”的性格，也许是因为做的都是偷偷摸摸，见不得人的事，久而久之在潜意识中会日趋喜好黑暗、肮脏、恶臭的环境，一如蟑螂。也于是一旦死后到灵界去报到时，不由自主地受到阿赖耶识的牵引，就会径自选择了下层甚至最下层去暂时居留。\n\
    \n  不过别以为只是这样而已，如果因为自身的行为已造成人命或其他实质的伤害，那些被害人一定不肯善罢甘休，这种因果更严重，并不一定要打阳间官司或阴间官司，而是由于被害人(或其他被害生灵)的共同怨恨意念会形成一股强大的力量，把这心思歹毒之人推入“地狱”去，在其中受苦而求出无门。\n\
    \n  譬如最近某餐厅的大火造成六十几人死亡，想想看这六十几人怨恨的意念有多大?不只是负责人及肇事者，如果主管机关的公务人员若是因贪念收了红包，而草菅人命的放水让安全检查过关，其未来的下场当然也不只是落入中阴界的下层或最下面已。\n\
    \n  其次还要再加以说明的是中阴界下层及最下层之所以如此昏暗不明的形成“黑暗世界”的另一个原因;\n\n  我们的视觉必须靠光才能看见景物及色彩，而一件东西的明暗及色彩是因为其对光(注:光有七色)的感应不同而造成，譬如一件东西吸收了所有其他颜色的光，(只反射出红光，所以我们看见它是红色的。如果它完全不吸收，七色全反射，我们就会看见它是白色的，但如果它全数吸收却完全不反射，则我们就会看见它是黑色的。\n\
    \n  因此在中阴界下层的居民，因为灵性被物欲蒙蔽了大部分，只能微微地反射少许的光，所以是暗灰色的这边的“心灵垃圾”所制造的山河大地及天空同样是暗灰色的。\n\
    \n  而最下层的居民其灵性是几乎完全被蒙蔽了，所以几乎完全不反射，那当然是很暗很暗的甚至成了黑色，而这层的山河大地，甚至天空也是黑乎乎的只能依稀见到一些影子。\n\
    \n  在中阴界下层有一个很特殊的区域不得不提，那就是广大无垠的“迷魂林”。\n\n  这片丛林中全是张牙舞爪的怪树和纠葛扭曲的攀藤，但却又了无生气，阴沉沉，灰蒙蒙，落入其中根本分不清方向，也难以找到出口，其中甚至见不到任何活动的生物，连风都没有……\n\
    \n  这就是最有名的“自杀者之林”，很多人在阳世时因为失恋，生意失败，考试落榜，升学压力，失业、赌气，误信邪教以为自杀可以成神升天，或者男女因不能结合而双双殉情等等，死后会直接落入此处。\n\
    \n  只是若是为了忠孝节义或殉道、殉国，或其目的是为了成全他人(例如情报人员基于爱国心，被捕后为了怕遭严刑逼供而连累同志而自杀的，即使只是出于愚忠。)这些将立即转生天界，不会落入此地。\n\
    \n  像久病厌世，一种是剧烈的痛苦实在难以忍受，一种是害怕自己的病体会拖累家人者，自杀后也不会落入此地，而是去“枉死城”报到，在那里会受到慈悲的照顾及有关生命真义方面的教诲，虽非惩罚，却仍然要失去自由很长一段时间。\n\
    \n  由于轮回的法则中，阳世的修行是极其重要的，所有生命经历了阳世人道的修行并修满所有学分才能成佛，不再入轮回，因此任何人只要中途因为一点小小的挫折而轻生自杀，也不顾家人亲友的悲伤，而放弃了做人的责任（为人父母、为人子女、为人夫或妻都积压有其责任），那么这种人第一是太过自私，第二是完全不明白生命的真义，在灵性上是相当昏昧的，以至于死后会落入“迷魂林”中，终日前形，却始终在林中打转，而不知何去何从，还要忍受饥渴、寂寞孤单，恐惧惊慌的煎熬。而且就算男女双双殉情，到了灵界不但不能如愿地结合，反而互相不见对方的踪影而分别在“迷魂林”中迷失独行，除非诚心忏悔，又遇见高层级的灵（神祇）出现指引搭救，否则也一样是求出无期。\n\
    \n  但如果是被迫自杀的不在此列，例如父母吵架、一时气愤、强灌子女农药而死的。强迫他人自杀致死者罪行极大，即使自己也是自杀而死，也不会落入“迷魂林”中，而是直接下“枉死城”报到而已。\n\
    \n  那么帮助自杀及鼓励自杀有罪吗？\n\n  像国外有医生帮助久病厌世的病人“安乐死”，这很复杂，因为现代医药发达，原本一定会死的，因为药物及人工维生系统的长足进步，使病人得以继续苟延残喘地“活”下去，但如果是完全没有希望康复的，那不只是残忍也是违反自然的。因为死亡是最自然不过的事。除非有把握能让病人康复，否则徒使他多受苦刑而已。这时如果是出自病人自己的意愿，那么以慈悲心怀协助使他安乐死的医生可以说是无罪的，但若是这位医生其目的只是为了赚钱，那么就必定有罪。\n\
    \n  另一种鼓励自杀，譬如一些邪教，迷惑信徒，让其以为透过某种仪式再自杀就可成神进入天堂或极乐世界。又或者最近有位日本作家写了一本教人如何“完善自杀”的书，书中详列了各种自杀的方式，据了解在日本已经有数十人是看了这本书后，照章行事而自杀成功的。当然这些自杀者必定是自己先有了自杀的动机，并不是看了书才决定，但据了解这位作家不但不关心因书而自杀的死者，认为那是个人自由，反而只是关心这本书的销路。\n\
    \n  对这本书所引发的严重社会问题却是视而不见，那么这本书的作者，出版商，无疑的都是直接或间接地在鼓励自杀，其未来的下场，编者不说，相信读者也可想像得出来。\n\
    \n  此外，迷失在“迷魂林”中的还有另一种人，那就是生前迷信物质坚决认为没有灵魂这回事，人死后就什么都没有了，根本就没有什么灵界存在的人。\n\n  轮回的法则是慈悲的，绝不会因为这些冥顽不灵的人坚决不相信灵魂的存在就一一加以消灭使他们魂飞魄散而不存在（灵魂是永存的，没有任何方法可以消灭，就算你坚决不相信，他也一样存在），因此，这些人死后一定落入最适合他们的处境，完全没有生气，也不知何去何从的“迷魂林”中，一直到他们了悟一些生命的真义，才有超越的可能。\n\
    \n  至于在中阴界下层的其他居民，日常生活是很惨淡的，因为灵体变化能力的高低是取决于他灵性的高低，因此下层居民因为灵性的大部分被蒙蔽而几乎没有任何变化能力，这里也有一些相当原始落后的谋生方式，勉强可以供应有职业者的食物，普遍的情形却一如阳世那些闹饥荒的地区，绝大多数的居民都难得温饱，并且还要忍受污浊的空气及肮脏恶劣的环境。因此他们几乎都随时想向阳世的亲友索取钱财衣食的祭祀，由于这一层跟阳世几乎重叠，因而很容易“偷渡”来阳世，有些附于碟仙、钱仙、扶乩或灵媒身上的有部分就是这一层的居民，或聚集在阳世的屠宰场、垃圾场、赌场、妓院等地，依附在臭气相投的活人身边，吸一点食、色等气而苟活。\n\
    \n  这层居民由于灵性被物欲所蒙蔽，可算相当的昏昧，就算有高层级的灵，甚至神佛时常前来授课讲解，他们也不容易领悟，而一如在阳世时的拼命想贪求物欲，性欲的满足。所以往往是言之谆谆，听之藐藐，偶尔有少数能领悟的，或可升入中层去。但大多数却依然故我的，甚至很快就落入最下层去，而最后这些居民多半被迫去投胎，一旦是被迫时，不是“畜生道”，就是“饿鬼道”，落入“地狱道”的也有，但不算多，因为与最下层相比，这层还算好一点。\n\
    \n  (注：所谓“被迫”，不是被高层级灵界导师或神佛所迫，他们没有那么残忍也没有这么大的权力，而是被整个“轮回法则”所迫，这时就算神佛再慈悲，也是爱莫能助。)\n\
    \n## 中阴界（轮回过境室）最下层\n\n  早在四千多年前有一位埃及僧侣阶级的书记“艾尼”，可能籍由入定方法或某种秘术进入此一层级，并在返回后于一份古文资料中记载着这层的情形：\n\
    \n  “我所来到的这个地方，让我无法确知它是一个什么样的世界，没有水，也没有风，黑暗又深不可测，好像除了无尽的恐怖无望而其他一无所有，居民们只是不知何去何从又无可奈何地走来走去，我认为没有任何活人可以生活其中……”\n\
    \n  的确，这一层是中阴界最恶劣的区域，天空黑漆漆的，永远是昏黑的夜晚，山河大地及残破的道路房舍及一切居民和物件都像剪影一般，地面上到处是污臭的烂泥或恶臭黏稠的黑色浓液，空气也污浊到令人有随时会窒息的难受，而且整个空间都浓浊到仿佛要用身体挤过一洼恶臭的胶水似的。\n\
    \n  这边更是一个百分之百的弱肉强食的世界，没有法律，没有警察，没有什么可信守的规则。各种衣物食物的供应少得可怜，唯一可吃的就是人类不停投射过来的“心灵垃圾”，因此打、砸、抢、掳、掠、奸随时随处可见，就算杀人，被杀的也不会死亡，一会儿又回复了原状了。而且蓬头垢面，形容羞陋的男男女女几乎不停地追逐，或勾引或骗，或强暴，随地就展开性交，即使是在恶臭的烂泥堆中也一样。由于“阿赖耶识”在此已彻底释放出来，在阳世时潜藏于假面具之下最邪恶的部分全部在这层浮现出来，甚至具象地投射在形体之上，有些明明是人却长了长毛，有些长了尾巴，有些甚至头上长了两只角，也有些犬齿变得又长又尖，那些中国人所谓“满口仁义道德，一肚子男盗女娼”的人，死后来到此地可真是适得其所，因为在阳世要装，在这里完全不用装，高兴怎样就怎样。\n\
    \n  那些在阳世的地痞流氓，逞凶斗狠，专门欺压善良、白吃白喝的，如果没有伤人性命的，会落在此处发挥专长，如果杀人伤人的则落入“地狱”。而一些烂仔，老鸨也一样，逼人致死的下地狱，其他操作是贪图钱财而逼良为娼的则落入此地。\n\
    \n  那些为了钱及物质享受或贪图淫欲，自甘坠落以为卖淫为生的男男女妇也全落入此地。\n\n  那些生平只恨钱少，拼命聚敛，完全信奉“弱肉强食、物竞天择”的大富豪，也必定落入此地，因为这里正是一处弱强食、纵情各种欲望的天堂。\n\
    \n  空气中的成分，地面上四处流泻的液体，四下熊熊燃烧的毒火，全是这些人在阳世时长期以“意念”所创造出来的杰作“心灵垃圾”，至于那些荆棘毒草，邪旱毒蛇也一样是这么创造出来的。\n\
    \n  到此，这还是个“自由”的世界，可以自由到完全无政府、无法律，也无任何保障，没有一丁点安全感的状态。\n\n  紧邻的一边就是“饿鬼道”，再下层则“地狱道”了。\n\
    \n  中阴界最下层的居民比下层的更冥顽不灵，根本已经成了人兽不分的地位，所以极少能超升到上层去的，最后几乎大多数都转生“畜生道”中最低等的生物或落入“饿鬼道”、“地狱道”。\n\
    \n  其实从高层级的慈悲观点来看，生而为人有时也是蛮可怜的，除了生老病死等八苦，那些食欲、性欲及其他物欲全是与生"
  mdcn: "## 第十九章 人生八苦与诸界奇观\n\n  虽然市容很古老，但却显得非常繁华热闹。市区中商店林立，酒肆茶坊、市集摊贩随处可见，闹区中“人”潮汹涌，男女杂处，摩肩擦踵，车水马龙，一如阳世。这也是亡魂死亡超过一年以上，由“亡魂山”迁移此处的定居之所，但大半是生前原居于都市之中或原本以经商买卖为业之人。\n\
    \n## 十九、亡魂山\n\n  这是新魂来到灵界的暂居之处，但是迁居此处多在死亡的百日之后，因为从死亡之后的一百日之间，新魂要接受各殿阎王的审判，善者升入天界或阿修罗界，恶者判入地狱、畜牲、饿鬼等界，而善恶相当的，则暂时移居到“亡魂山”，此处可说是一个过渡地带，让情绪、思虑及灵性都还不稳定的新魂在此处先行适应，等一年后完全适应了灵界的生活之后，再依各人的喜好，移居“六角庄”(郊区农居)或“丰都市”(都市)，交依个人意愿从事各种行业，多半的亡魂在此仍是重操旧业，但也可自由转业。\n\
    \n  在甄师父的施法过程中，加上如果有神祇的引领之下，进入灵界的当事人并非循序前进，而是可以任意地由其中一段路程或关卡切入，有时甚至直接进入“丰都市”或“亡魂山”。\n\
    \n  阳世之人经过“观灵术”施法进入灵界者在来到中层之后，如果得到神祇的恩准，也可由此一游天界(或天界先修班)，最上层、上层的中阴界，或下层及最下层的中阴界，甚至“地狱”。\n\
    \n  不过，不论中层级居民其生活情形如何，终究只是一种暂时的过境或居留而已，不论能待上多久，最后还是会去轮回转世。\n\n  在很多的实例中，我们可看到这层级之中；高、中能力的灵界居民，其生活是很快活的，比阳世要自由快乐得多，同样也可在瞬间以意念去到想去的地方，原本在阳世有病痛残障的来到此处也都变成健康正常，老年人也变得更年轻。他们可以任意跟喜欢的人聚在一起，夫妻倒不一定非要再厮守下去，尤其是那种同床异梦的夫妻，来到此处就不受阳世法律或传统习俗所拘束，可以各奔前程去追寻真心所爱。一些在阳世两心相许却不能结合的男女在此都能“有情人终成眷属”（殉情自杀者不在此例，下章将详述），所以有少数这层居民甚至不想再去投胎转世，但这却是不可能的，（连天界的天神因缘成熟一样要投胎转世），所以即使有这样的意愿也是不可能实现的。\n\
    \n  也因此就会出现欣然同意去投胎重修的，有勉强同意的，也有一些冥顽不灵的，不论高层级灵界导师如何苦口婆心的劝导也不肯去的，这时就会被强制执行，或根本未被强迫，而是自己迷迷糊糊就投胎转世的。\n\
    \n  特别需要说明的是：中阴界的中层级区域是比地球更广大，并将地球（阳世）包裹在内的，某些区域和阳世完全重叠，只是其构成元素及频率不同，所以两界居民互相不能感知，但由此可以证明古来先贤在难以说明这种情形之下，以“阴阳两界”来形容的说法是近似可信的。\n\
    \n## 第十八章 奇特的中阴界\n\n  如果把所有探讨的范围局限在中阴界（轮回过境室）的所有层级，那么其中最上层、上层、中层都属于“有光世界”，而下层及最下层则属于“黑暗世界”。\n\
    \n  前面说过了，中阴界各级是以“渐层”（渐进）的方式的相融，并没有明显的界限，在下层及最下层的“黑暗世界”也一样，几乎是从傍晚六、七点钟到深夜乌漆麻黑的夜晚景象，也就是越往下走，天色越黑。\n\
    \n  为什么会这样呢？\n\n  因为那边的居民他们喜欢；就像蟑螂蚊子喜欢躲在黑暗之处一样，他们最讨厌的就是光洁明亮的环境；那会使他们无所遁形而浑身不自在。就算神佛慈悲，一人发一张通行证，让他们自由前往中阴界最上层或上层，别说他们受不了那边的光亮环境，甚至因为完全不能适应强光而导致什么都看不见，也因此，他们甚而不能感知或不能承认其他高层级世界的存在。\n\
    \n  别以为这很好笑，人不也一样？我们习惯于阳世地球的生活，所以不能感知其他世界的存在，就算自古以来，就有许多先知及大智慧者甚至神佛教诲了三界六道，涅槃以至三大千世界的实存，以及其他外星世界的存在，但我们人类又有多少人承认了？绝大多数人还不是“夏虫不可以语冰”地不肯相信？\n\
    \n  想想：如果你家厨房里的蟑螂能听得懂你说的话；当你正经八百地告诉它们；除了你住的这地方之外还有其他都市，四周的海水之外还有其他国家，其他国家的蟑螂吃的食物和它们不一样，德国蟑螂喜欢吃香肠、猪脚，荷兰的蟑螂喜欢吃乳酪、火腿……猜猜看，你家厨房中的蟑螂会怎么反应？肯定是要你“少胡扯！”\n\
    \n  所谓“境由心生”、“三界唯心所造”，人死了之后一旦抛开了血肉之躯，原本被锁住，呈冬眠状态的第八识（阿赖耶识）中的资料将悉数被释放出来，所有三界六道、天堂地狱都是由这些“阿赖耶识”中的基本资料所构筑完成，这就是所谓的业力，相同业力的灵体物以类聚地在一起共同构筑相同的境界。不论三界六道、天堂地狱各种不同的境界，虽然从涅槃的层级来看全是境由心生的虚幻不实之境，但对于各自能构筑那种境界的众生而言，对自己所构筑境界中的一砖一石，一草一木，甚或自身的形体，他们都是确信为真，而坚固不假的。\n\
    \n  譬如人间也一样，一堵厚实的高墙可以挡住你，也可以挡住我，也可以挡住任何“人”，要走到另一边去，不是绕路，就只有攀爬，再不然办好来个撑竿跳，为什么呢？因为我们都是人，有着人类相同共业，我们相信那些砖块是实存而坚固的，我们也相信以那些砖块砌起来的高墙是实存而坚固的，所以不用上述方式一定过不去而会被挡住。但是对于神、鬼或灵体，那堵墙根本就不存在，顶多也只是个不实的虚相而已，他们轻松地穿进穿出，毫无阻碍，甚至完全没有意识到墙的存在。所以讲个笑话；如果遇见“鬼”，把门窗关得更紧，其至躲进防弹库里去也是没用的。\n\
    \n  因为构成人体及阳世墙壁的物质元素与构成灵体或灵界物件的物质元素是完全不同的。\n\n  譬如对阳世的人来说；同样是五厘米厚的钢铁，果冻、水及烟雾（注：烟雾也是一种悬附粒子的物质）。我们很难用手指头刺穿一块钢铁，但可以刺穿一块果冻，不容易刺穿水，却更容易刺穿一团烟雾，而事实上在我们人类眼中坚硬无比的钢铁如果在高倍的电子显微镜下，那也不过只是原子排列整齐的一块海绵状物，如果再进入分子的世界，那么那些分子如果像太空中的星球，而分子与分子间的空隙则犹如太空一样空旷。\n\
    \n  因此即使我们用钢铁来构筑一个固若金汤的保险库，一旦关闭起来，别说人，可能连一只小蚂蚁也钻不进去，但是对鬼（灵体）来说，要穿过钢墙进入这仓库，就好像一团雾要穿过蚊帐一样轻而易举。\n\
    \n  同样地，在中阴界以至三界六道之中的众生也无不相信各自所处境界中的一切物质是坚固实存的，这在佛教中称之为“坚固幻觉”。\n\n  但由此会引出两点法则：\n\
    \n  - 一、低层级的较难或甚至完全不能感知高层级其中的景况及一切物件的存在。\n  - 二、高层级的可以明确感知低层级灵界的景况，但却不受限于物件的限制，譬如墙壁或大山、巨石，几乎完全不能限制其行动，他同样可以轻松地穿越。\n\
    \n  现在，我们再回头来谈谈“观灵术”中的问题，由于在师父的施术之下，真正进入灵界者不是当事人的肉体，而是他的灵（魂），所以在灵界中一样要受到灵界法则的涵盖，也因此所见到\n\
    \n## 中阴界（轮回过境室）下层\n\n  如果一定要求探究这一层级的所在位置，据编者所知，大概包括了我们人类所生活的阳世地表以及地表以下的一大片区域，并衔接中阴界最下层而涵盖了整个地壳，而地壳之内的岩浆区一直到地心则就是我们所说的“地狱”或西方人所说的“炼狱”。\n\
    \n  不要以为地壳那么坚硬密实，下层或最下层的灵界居民怎么可能有生活的空间，前面花了好几页篇幅来解说可不是闲谈打趣，正是为了说明灵界与阳世组成的物质元素不同，我们阳世之人以为坚硬密实的地壳，对灵界居民而言就像一团似有还无的烟雾而已，所以他们生存的空间甚至比地表还大。\n\
    \n  先来谈下层及最下层为什么是一个黑暗世界，千万不要误以为是住于地表之下，暗无天日所致，和这并没有关系。而是这两层居民生前所投射（自行制造）的黑暗物质所致，我们可以给它一个名词叫做“心灵垃圾”。\n\
    \n  这种“心灵垃圾”不但污染了灵界下二层的大地，污染了水源，也污染了灵界下二层的天空，而二层之间又有程度的差别，“下层”的天空是灰蒙蒙的，感觉起来像傍晚至入夜的天空，但可别以为会有晚霞夕阳的美景，这边只有清一色的灰色调，差别只在色调的深浅而已。而“最下层”则更糟，几乎是黑色调的夜景，但也不完全是伸手不见五指的漆黑，依程度不一，多少还见得到一些景物的轮廓。\n\
    \n  先说这些“心灵垃圾”怎么来的。\n\n  第一种是有形的，真的是那些工业废水、废气，但不是物质的，而是那些排放者的心态意念，不论他是公营或民营，也不管是一个单位，或单一的个人，全都是为了一个“贪”字，才会罔顾地球的生态，罔顾其他人类及生灵的死活。举例而言：一个人将一瓶有毒的液体或重金属随便倒进水沟里，以致污染了整条水沟，即使排进了河里，海里仍然会造成污染，因此这个人的这种“意念”就是一种“心灵垃圾”会沉重地下降至中阴界的下层及最下层去。如果是一家企业排放了有毒的废气，这种从老板到执行的厂长，员工的“意念”也同样汇集成更沉重的“心灵垃圾”，污染了整个下层及最下层的天空，至于焚烧废五金产生毒害人体“戴奥辛”，制造毒油、伪药、残害人体的那些见利忘义者的心态意念，或制造化学战剂、生物战剂的科学家，只为了自身利益，罔顾所有生灵死活者他们的心态意念，自古以来就不停地在污染下层及最下层的灵界。\n\
    \n  另一种则是无形的，例如人的自私心、贪心、悭吝之心、残暴不仁之心、猜疑之心、幸灾乐祸之心、无明怒火之心、损人利己之心等等等等这些负面的“意念”，别以为是看不见就不存在了，一旦兴起，除了被纪录在阿赖耶识中，也将具体地物质化而沉积到下层及最下层的中阴界去，有些化为无生命的嶙峋怪石，荆棘藤蔓，或污臭黏液，有些化为臭烟毒火，有些甚至在长期不停地投射中，幻化成看似有生命的臭草毒花、妖树怪木，而无数丑陋、恶臭、恶心、有毒的虫蛇怪兽也全靠人类不停投射抛弃的“心灵垃圾”而在下层及最下层的中阴间得到充分的饲料而赖以存活。\n\
    \n  举例来说，一个粗暴的卡车司机，超速行驶于街道上，闯红灯时差点撞倒了路人，他不但不觉得自己不对，反而探头而出恶狠狠地对那位路人大骂一声：“操!你想找死是吗?”\n\
    \n  这句话停留在空中不会超过五秒钟，但伴随着的那种恶毒的心念却永远存在，并立即化为“心灵垃圾”而投射到下层及最下层去，也许化做了污臭黏稠的黑色浓液四处窜流。\n\
    \n  当然这也是一种共业，是长时期由多数众生所共同堆积了大量“心灵垃圾”所造成……\n\n  而重要的是，一个经常有类似意念或行为的众生，久而久之，习惯成自然，必定会形成一种“见光死”的性格，也许是因为做的都是偷偷摸摸，见不得人的事，久而久之在潜意识中会日趋喜好黑暗、肮脏、恶臭的环境，一如蟑螂。也于是一旦死后到灵界去报到时，不由自主地受到阿赖耶识的牵引，就会径自选择了下层甚至最下层去暂时居留。\n\
    \n  不过别以为只是这样而已，如果因为自身的行为已造成人命或其他实质的伤害，那些被害人一定不肯善罢甘休，这种因果更严重，并不一定要打阳间官司或阴间官司，而是由于被害人(或其他被害生灵)的共同怨恨意念会形成一股强大的力量，把这心思歹毒之人推入“地狱”去，在其中受苦而求出无门。\n\
    \n  譬如最近某餐厅的大火造成六十几人死亡，想想看这六十几人怨恨的意念有多大?不只是负责人及肇事者，如果主管机关的公务人员若是因贪念收了红包，而草菅人命的放水让安全检查过关，其未来的下场当然也不只是落入中阴界的下层或最下面已。\n\
    \n  其次还要再加以说明的是中阴界下层及最下层之所以如此昏暗不明的形成“黑暗世界”的另一个原因;\n\n  我们的视觉必须靠光才能看见景物及色彩，而一件东西的明暗及色彩是因为其对光(注:光有七色)的感应不同而造成，譬如一件东西吸收了所有其他颜色的光，(只反射出红光，所以我们看见它是红色的。如果它完全不吸收，七色全反射，我们就会看见它是白色的，但如果它全数吸收却完全不反射，则我们就会看见它是黑色的。\n\
    \n  因此在中阴界下层的居民，因为灵性被物欲蒙蔽了大部分，只能微微地反射少许的光，所以是暗灰色的这边的“心灵垃圾”所制造的山河大地及天空同样是暗灰色的。\n\
    \n  而最下层的居民其灵性是几乎完全被蒙蔽了，所以几乎完全不反射，那当然是很暗很暗的甚至成了黑色，而这层的山河大地，甚至天空也是黑乎乎的只能依稀见到一些影子。\n\
    \n  在中阴界下层有一个很特殊的区域不得不提，那就是广大无垠的“迷魂林”。\n\n  这片丛林中全是张牙舞爪的怪树和纠葛扭曲的攀藤，但却又了无生气，阴沉沉，灰蒙蒙，落入其中根本分不清方向，也难以找到出口，其中甚至见不到任何活动的生物，连风都没有……\n\
    \n  这就是最有名的“自杀者之林”，很多人在阳世时因为失恋，生意失败，考试落榜，升学压力，失业、赌气，误信邪教以为自杀可以成神升天，或者男女因不能结合而双双殉情等等，死后会直接落入此处。\n\
    \n  只是若是为了忠孝节义或殉道、殉国，或其目的是为了成全他人(例如情报人员基于爱国心，被捕后为了怕遭严刑逼供而连累同志而自杀的，即使只是出于愚忠。)这些将立即转生天界，不会落入此地。\n\
    \n  像久病厌世，一种是剧烈的痛苦实在难以忍受，一种是害怕自己的病体会拖累家人者，自杀后也不会落入此地，而是去“枉死城”报到，在那里会受到慈悲的照顾及有关生命真义方面的教诲，虽非惩罚，却仍然要失去自由很长一段时间。\n\
    \n  由于轮回的法则中，阳世的修行是极其重要的，所有生命经历了阳世人道的修行并修满所有学分才能成佛，不再入轮回，因此任何人只要中途因为一点小小的挫折而轻生自杀，也不顾家人亲友的悲伤，而放弃了做人的责任（为人父母、为人子女、为人夫或妻都积压有其责任），那么这种人第一是太过自私，第二是完全不明白生命的真义，在灵性上是相当昏昧的，以至于死后会落入“迷魂林”中，终日前形，却始终在林中打转，而不知何去何从，还要忍受饥渴、寂寞孤单，恐惧惊慌的煎熬。而且就算男女双双殉情，到了灵界不但不能如愿地结合，反而互相不见对方的踪影而分别在“迷魂林”中迷失独行，除非诚心忏悔，又遇见高层级的灵（神祇）出现指引搭救，否则也一样是求出无期。\n\
    \n  但如果是被迫自杀的不在此列，例如父母吵架、一时气愤、强灌子女农药而死的。强迫他人自杀致死者罪行极大，即使自己也是自杀而死，也不会落入“迷魂林”中，而是直接下“枉死城”报到而已。\n\
    \n  那么帮助自杀及鼓励自杀有罪吗？\n\n  像国外有医生帮助久病厌世的病人“安乐死”，这很复杂，因为现代医药发达，原本一定会死的，因为药物及人工维生系统的长足进步，使病人得以继续苟延残喘地“活”下去，但如果是完全没有希望康复的，那不只是残忍也是违反自然的。因为死亡是最自然不过的事。除非有把握能让病人康复，否则徒使他多受苦刑而已。这时如果是出自病人自己的意愿，那么以慈悲心怀协助使他安乐死的医生可以说是无罪的，但若是这位医生其目的只是为了赚钱，那么就必定有罪。\n\
    \n  另一种鼓励自杀，譬如一些邪教，迷惑信徒，让其以为透过某种仪式再自杀就可成神进入天堂或极乐世界。又或者最近有位日本作家写了一本教人如何“完善自杀”的书，书中详列了各种自杀的方式，据了解在日本已经有数十人是看了这本书后，照章行事而自杀成功的。当然这些自杀者必定是自己先有了自杀的动机，并不是看了书才决定，但据了解这位作家不但不关心因书而自杀的死者，认为那是个人自由，反而只是关心这本书的销路。\n\
    \n  对这本书所引发的严重社会问题却是视而不见，那么这本书的作者，出版商，无疑的都是直接或间接地在鼓励自杀，其未来的下场，编者不说，相信读者也可想像得出来。\n\
    \n  此外，迷失在“迷魂林”中的还有另一种人，那就是生前迷信物质坚决认为没有灵魂这回事，人死后就什么都没有了，根本就没有什么灵界存在的人。\n\n  轮回的法则是慈悲的，绝不会因为这些冥顽不灵的人坚决不相信灵魂的存在就一一加以消灭使他们魂飞魄散而不存在（灵魂是永存的，没有任何方法可以消灭，就算你坚决不相信，他也一样存在），因此，这些人死后一定落入最适合他们的处境，完全没有生气，也不知何去何从的“迷魂林”中，一直到他们了悟一些生命的真义，才有超越的可能。\n\
    \n  至于在中阴界下层的其他居民，日常生活是很惨淡的，因为灵体变化能力的高低是取决于他灵性的高低，因此下层居民因为灵性的大部分被蒙蔽而几乎没有任何变化能力，这里也有一些相当原始落后的谋生方式，勉强可以供应有职业者的食物，普遍的情形却一如阳世那些闹饥荒的地区，绝大多数的居民都难得温饱，并且还要忍受污浊的空气及肮脏恶劣的环境。因此他们几乎都随时想向阳世的亲友索取钱财衣食的祭祀，由于这一层跟阳世几乎重叠，因而很容易“偷渡”来阳世，有些附于碟仙、钱仙、扶乩或灵媒身上的有部分就是这一层的居民，或聚集在阳世的屠宰场、垃圾场、赌场、妓院等地，依附在臭气相投的活人身边，吸一点食、色等气而苟活。\n\
    \n  这层居民由于灵性被物欲所蒙蔽，可算相当的昏昧，就算有高层级的灵，甚至神佛时常前来授课讲解，他们也不容易领悟，而一如在阳世时的拼命想贪求物欲，性欲的满足。所以往往是言之谆谆，听之藐藐，偶尔有少数能领悟的，或可升入中层去。但大多数却依然故我的，甚至很快就落入最下层去，而最后这些居民多半被迫去投胎，一旦是被迫时，不是“畜生道”，就是“饿鬼道”，落入“地狱道”的也有，但不算多，因为与最下层相比，这层还算好一点。\n\
    \n  (注：所谓“被迫”，不是被高层级灵界导师或神佛所迫，他们没有那么残忍也没有这么大的权力，而是被整个“轮回法则”所迫，这时就算神佛再慈悲，也是爱莫能助。)\n\
    \n## 中阴界（轮回过境室）最下层\n\n  早在四千多年前有一位埃及僧侣阶级的书记“艾尼”，可能籍由入定方法或某种秘术进入此一层级，并在返回后于一份古文资料中记载着这层的情形：\n\
    \n  “我所来到的这个地方，让我无法确知它是一个什么样的世界，没有水，也没有风，黑暗又深不可测，好像除了无尽的恐怖无望而其他一无所有，居民们只是不知何去何从又无可奈何地走来走去，我认为没有任何活人可以生活其中……”\n\
    \n  的确，这一层是中阴界最恶劣的区域，天空黑漆漆的，永远是昏黑的夜晚，山河大地及残破的道路房舍及一切居民和物件都像剪影一般，地面上到处是污臭的烂泥或恶臭黏稠的黑色浓液，空气也污浊到令人有随时会窒息的难受，而且整个空间都浓浊到仿佛要用身体挤过一洼恶臭的胶水似的。\n\
    \n  这边更是一个百分之百的弱肉强食的世界，没有法律，没有警察，没有什么可信守的规则。各种衣物食物的供应少得可怜，唯一可吃的就是人类不停投射过来的“心灵垃圾”，因此打、砸、抢、掳、掠、奸随时随处可见，就算杀人，被杀的也不会死亡，一会儿又回复了原状了。而且蓬头垢面，形容羞陋的男男女女几乎不停地追逐，或勾引或骗，或强暴，随地就展开性交，即使是在恶臭的烂泥堆中也一样。由于“阿赖耶识”在此已彻底释放出来，在阳世时潜藏于假面具之下最邪恶的部分全部在这层浮现出来，甚至具象地投射在形体之上，有些明明是人却长了长毛，有些长了尾巴，有些甚至头上长了两只角，也有些犬齿变得又长又尖，那些中国人所谓“满口仁义道德，一肚子男盗女娼”的人，死后来到此地可真是适得其所，因为在阳世要装，在这里完全不用装，高兴怎样就怎样。\n\
    \n  那些在阳世的地痞流氓，逞凶斗狠，专门欺压善良、白吃白喝的，如果没有伤人性命的，会落在此处发挥专长，如果杀人伤人的则落入“地狱”。而一些烂仔，老鸨也一样，逼人致死的下地狱，其他操作是贪图钱财而逼良为娼的则落入此地。\n\
    \n  那些为了钱及物质享受或贪图淫欲，自甘坠落以为卖淫为生的男男女妇也全落入此地。\n\n  那些生平只恨钱少，拼命聚敛，完全信奉“弱肉强食、物竞天择”的大富豪，也必定落入此地，因为这里正是一处弱强食、纵情各种欲望的天堂。\n\
    \n  空气中的成分，地面上四处流泻的液体，四下熊熊燃烧的毒火，全是这些人在阳世时长期以“意念”所创造出来的杰作“心灵垃圾”，至于那些荆棘毒草，邪旱毒蛇也一样是这么创造出来的。\n\
    \n  到此，这还是个“自由”的世界，可以自由到完全无政府、无法律，也无任何保障，没有一丁点安全感的状态。\n\n  紧邻的一边就是“饿鬼道”，再下层则“地狱道”了。\n\
    \n  中阴界最下层的居民比下层的更冥顽不灵，根本已经成了人兽不分的地位，所以极少能超升到上层去的，最后几乎大多数都转生“畜生道”中最低等的生物或落入“饿鬼道”、“地狱道”。\n\
    \n  其实从高层级的慈悲观点来看，生而为人有时也是蛮可怜的，除了生老病死等八苦，那些食欲、性欲及其他物欲全是与生"
