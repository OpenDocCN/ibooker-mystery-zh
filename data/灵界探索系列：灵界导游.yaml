  md: '# 第十三章 灵界采访记


    很久之后，他仍然看到刺眼的强光，同时也看到了山及人影及衣摆，再印证于他第二次接受施法顺利进入灵界后所亲历的景况，先前所见的强证及山脉显然并非出于想像之幻觉，当然也绝无任何暗示。


    二、在灵界的茶楼中遇见一位瘦瘦的老先生，连问了好几次，老先生根本懒得开口，只是用手指点了方向。由此推想；灵界居民对阳世来的访客显然一点也不感到怪异或好奇，不知是司空见惯，因常有阳世的访客的光临而不以为意，还是对阴阳界一线之隔的这种现象已了然于心，认为一点也不奇怪？因为阴间的自由亡灵可以轻松地来到阳间走动。反倒是阳世之人，必须经过大费周章的各种方法（如入定或观灵术的施法）才能进入阴间（灵界），所以免不了会大惊小怪。而灵界居民对阳世来人丝毫不以为奇的态度更是令有觉得不可思议。编著者以为譬如毛毛虫和蝴蝶一样：如果毛毛虫知道可以在空中自由飞翔数十万公里，而且可以轻易飞越河流高山的蝴蝶竟然是自己的同类（长大后的成虫）时，想必也会大惊小怪的，但相对的，飞翔中的蝴蝶见到正在树枝上蹒跚爬行、十分辛苦的毛毛虫，恐怕也同样是不以为意，绝不会大惊小怪希腊先哲柏拉图曾说过：“灵魂之投入人躯体（注：指转世为人），是从大知的环境投入小知的环境，出生是睡与忘，死亡是醒与忆。”因此，人死后回到灵界，被躯体所束缚的种种能力都立即被释放出，因此有着比活在有躯体的阳世时更广阔更灵敏的知觉。


