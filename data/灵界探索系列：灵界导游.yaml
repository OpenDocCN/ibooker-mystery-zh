  md: '# 灵界导游


    在这一层级等候的灵体, 未来多半会转生“人道”的阳世地球或其他外星世界, 其中有许多都带有各行各业的天分, 譬如音乐、美术、雕刻、建筑、演艺、科技、发明、哲学等等,
    但是在转生之后, 也未必能将灵界所有先进的事物全数在阳世的人间重现, 其主要原因有二:


    一、残留在潜意识之中的“灵界印象”未必能全部挖掘与发挥, 如果这个人在转生阳世之后, 因为因果关系, 降生于不容易发挥天分的地区或家庭, 又或者他本身迷惑于物质的享受而没有认真地动员创造时。


    二、某些灵界精细的物质或元素, 在阳世可能找不到, 于是, 在无法克服某些技术性的问题时, 自然也难创造出来。而且就算在阳世能找到代用品, 所制造出来的东西或建筑物和灵界相当类似,
    但在精粗程度上却可能有着天壤之别, 因此在灵界所拥有建筑景观, 奇花异草, 毫无污染的环境, 那是阳世绝对无法比拟的。以建筑来说, 灵界没有污染风化的问题,
    任何一幢建筑物从玻璃到石材都是百年如新, 但同一幢建筑物在阳世, 不到十年廿年就显得老旧了。


    这一层的居民是没有钱和信用卡的, 完全是各尽所能, 各取所需, 甚至不必以物易物, 那些各自聚集成村的灵体, 他们会去从事艺术创作及科技发明, 是因为他们出自内心喜欢创作和发明,
    而不是以此为谋生的职业, 他们更欣喜于自己的创作或发明的成果被别人所接受与欣赏。


