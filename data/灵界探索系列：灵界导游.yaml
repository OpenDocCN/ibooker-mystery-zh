- md: "## 第八章 “阳世”与“阴间”\n\n  老师说：那是亡魂山。我们在城外降落地面，步行入城。\n\n  城门守卫见到济公师父，相当恭敬地将城门打开；倒是两边有四位着古代军装的护城将军，目如电光，对我一直上下打量；我被他们瞧得有点没来由地心虚起来。入城之后，街景与我们阳世间在电视上欣赏古装连续剧的街道布景，极其相近，没多大差别。街道很宽，两旁皆是平房矮屋，大都是土砌砖造。街道路面是硬石板铺成，古朴整齐。\n\
    \n  济公师父领着我信步前行。我因初到“丰都”，颇觉好奇，东张西望；师父也不厌其烦，随景解说。走着走着，目光一清，原来有些往家在屋子门口种花植树，使人感觉清新悦目，济公师父说这一带是“丰都”的住宅区；复又前行，又用蒲扇指着眼前出现的一批更典雅的房屋，告诉我这一区是在“丰都”担任“公职”人员的官舍，大概类似我们阳世的公家宿舍吧！\n\
    \n  济公师父解说：“丰都是冥界首都亦即行政中心。在这里的住民，不外乎是冥界官吏及其眷属、平民及应该投胎尚等待分发而暂行配住于此的民众。”我听了还是不太明白，师父又详细解释：“所谓平民，就是生前之行善，为恶之功过不致相差太悬殊，无须投胎转世者，便安排在此设籍落户。除了日常生活作息之外，尚须至‘讲经所’听神佛讲经说法。经‘审核通过’便可选择任职冥官或上天界任神职。而‘讲经所’是地藏王菩萨及东岳大帝直辖设立，依各种不同程度、资质而设不同等级，讲授不同经典；类似你们凡间的各级学校。当然，对住在这里的平民而言，上‘讲经所’所经闻法是他们的‘义务’。如果住在这里超过一百年的期限，而未通过审核的话，便得再强迫轮回。若通过审核后，便依个人修习结果，参考前世、累世功果表现及个人意愿，分发至冥府任职或派赴阳间担任福德正神、城隍、阴差、日夜游神等神职。再好一点的，便升至天界继续修行；到了天界便成了‘准神明’，随时都有被分派至凡间任神祇，享人间香火的机会。而另一部分等待投胎的人呢，便是业已经过十殿审判完毕，等待分批到孟婆亭饮孟婆汤（即亡魂汤），便投胎转世去了；所以这一部分人，算是丰都城的‘流动户口’，暂住于此，随时会‘退出’。明白了吗？哈哈！”\n\
    \n  师父详细解说了这一大番话，略觉口渴，拿起腰间的葫芦，仰首朝口中灌起酒来，喝了两口，垂下葫芦在耳边摇了摇，怎么？没啦！颇为懊恼，搔了搔头皮，自言自语：“没酒了！怎么办……？看来待会儿，得到市集酒店打酒了！”堂上曾老师及师兄们听我转述济公师父此刻的模样，也觉得莞尔。\n\
    \n  走过两条大马路，眼前是另外一番景象的市镇街景，这一带应该是“丰都”的商业精华区吧！人来人往，川流不息。市集摊贩、酒馆客栈、商店杂货一应俱全。市招叫卖，好不热闹。但是教人不解的是，为什么路上其他的人，对走在前头的济公师父他老人家都没什么意见；而对走在后头的我，不论男女老幼都拿一种奇怪的眼神盯住不放，好像我多个鼻子或少个眼睛似的；一路过去，不是斜眼偷望便是指指点点、交头接耳，让我觉得浑身不自在，心里发慌。济公师父倒是悠悠哉哉若无其事地，在前头遛我摇漫步。无奈我只有请教堂中曾老师，曾老师一时也弄不清楚是何缘故，要我直接请示济公师父。这时济公师父已知觉我和堂中的对话，转过身来看我一眼，便恍然大悟地笑了起来，用蒲扇指了指我道：“你看看自己身上穿的，和他们有什么不同？”我低头瞧了瞧，原来如此！我身上穿的是阳间现流行的时装，跟其他人穿着古装当然不同嘛，难怪如此。我把此景此情转述给堂中的众人，结果又引起堂中大伙儿一阵哄笑。\n\
    \n  于是济公师父用他的薄扇在我身上一挥，刹时，我全身上下换成一套古装，真是好玩！换装之后，便继续跟着师父“逛街”。这时候，天色略暝，华灯初上。师父说：“快到吃晚饭的时刻了，待会儿找个客栈打个酒，祭祭五脏庙，你说好不好？”我点头说好。\n\
    \n  “逛”着“逛”着，迎面有一小贩扛着一大串糖葫芦，正沿街叫卖，越走越近，引得我嘴馋不已。这时，有三、四个小孩童原本在一个高可及腰的古井旁嬉戏，听到小贩叫卖声，一窝蜂地跑了过来。师父看我停步观望，便问我道：“怎么样？想不想吃吃看！”我当然说好，连小贩身旁围观的小孩童们也拍手叫好。\n\
    \n  我摸了摸口袋，呀！没钱买呀！怎么办？堂中曾老师及在场的师兄们闻知，便念咒烧了一些金钱，“急汇”到我这边。不一会儿时间，曾老师问我，现场情况有没有变化？收到没有。我又摸口袋，哇！口袋鼓鼓的，“老师，我收到了！”堂中众人听此，也觉得很新鲜，神奇！\n\
    \n  我这边收到钱后，马上跟小贩要了五支糖葫芦。先敬师父，师父说他不吃这玩意儿，他只对酒有兴趣。我就留一支自己解馋，另外四块请那些小孩童吃；那些小孩童接过糖葫芦，高兴地向我道过谢后，便又一溜烟地跑掉了。我尝了尝糖葫芦，跟阳间的比起来，味道差不多，只是多了一分沁凉的感觉。\n\
    \n  小贩说五支共要十文钱，我掏出一张银票给他，他看了银票之后，眼睛突然瞪得好大，很惊讶的样子，大概是面额太大吧！我笑着跟他说不用找了（因为找了钱我也用不着），于是小贩满心欢喜，一谢再谢地带着难以置信的神情离开。师父在一旁嘀咕地催我快点，说他肚子饿了倒不打紧，酒瘾发作、酒虫作怪才教他难过呢！\n\
    \n  于是我们走进一家二层楼高的古楼式酒店，师父点了几道菜，外加一瓶白干，咱们两人便吃将起来。我一面用餐一面把现场情形转述给堂中曾老师及众人听，我跟师父是吃得津津有味，他们是听得津津有味。\n\
    \n  济公师父食量蛮惊人的，吃喝的模样更令人叹为观止。师父说他一个人独酌没意思，要我陪他尽兴一番。我自忖酒量不佳，一来不想拂逆师父的圣意，二来能陪师父喝酒是一种殊荣，可以在知己好友面前吹嘘吹嘘，便斗胆陪师父喝了两杯。没想到，两杯下肚，顿时头昏脑胀，天旋地转，几乎分不清楚东南西北。师父看到我酒后的傻样子，笑着说能喝到他老人家赐的酒，有益无害的啦！话虽如此，那个酒确实相当醇烈，大概仙界神酒，凡人总是消受不起吧！\n\
    \n  堂中的曾老师见我醉意醺然，恐有不妥，再加以这趟游历至此耗用不少时间（据曾老师云：毕竟阴阳两界环境不同，凡人在阴界待得太久，总非合宜）；便教我禀明济公师父，此趟旅程可否到这告一段落，有机缘时他日再探灵界。\n\
    \n  济公师父便带我步出酒店，行至大街空旷处，要我立定脚步，先挥动蒲扇施法替我“醒酒”，随即叫我闭上双眼，他口中“叽哩咕噜”念动真言，蒲扇向我扇了三下，刹时觉得四周黑无光，耳边风声呼啸作响，不一会儿便回到堂上。\n\
    \n  我元灵归回到堂中本身肉体后，取下蒙在双眼的红布，睁眼就看见坐在神案旁曾老师关爱的神情，垂问我“感觉怎么样？”；还有围在身边众师兄们亲切地招呼，并纷纷询问查证这趟“丰都之旅”的细枝末节，我均一一据实作答。\n\
    \n  终于，这次探讨灵界的“丰都之旅”，就此圆满结束。而令人真正称奇的是，元灵回肉体之后，醉意却未立即全消，脸颊泛红、步履不稳、酒味环身，与未观灵游历前之身心状态截然不同，尚有劳了曾老师施法替我二次“解酒”。灵界的酒力，能带到现实的空间？至今事隔年余，回想起来，都教我百思不解。\n\
    \n## 第九章 上界的恩怨\n\n  听了这么多观灵趣闻，司徒倩也想自己试试。李娃陪同她前去曾家。\n\n  从下午一点半开始仪式，断断续续都没有完整的进入情况，到四点半结束，平常就此休息。\n\
    \n  但是，司徒倩却说：我家路途遥远，不知何时才有机会再来，能否破例再做一次？成功与否都没关系！\n\n  既然她有这一份虔诚，曾大师实在没有拒绝的理由。司徒倩很高兴地重新净手上香，结果在曾大师的引导下，十分钟之内就成功地踏上旅途……司徒倩很兴奋地形容着：“前面有一座庙，很大很大的庙。”\n\
    \n  曾大师：“你向庙拜拜，然后走进去！”\n  司徒倩：“我进不去耶！”语气十分无奈。\n  曾：“请你稍等一下，我带你过这个门槛。”\n  曾大师听了立即念咒……司徒有点畏缩地说：“不行，旁边有两只狮子，我不敢进去！里面有亮亮的东西，门槛很高，我跨不过去！”\n\
    \n  在曾大师念咒的协助下，司徒女士顺利跨过门槛!\n\n  司徒：“现在前面是天井，正中间有一位穿白衣服站在莲花上的神像，手还拿着拂尘。”\n  曾大师：“是不是观世音菩萨？”\n\
    \  司徒：“不知道！脸看不清楚！”\n  曾大师再次念咒……\n  司徒忽然尖声叫嚷着：“好漂亮的脸！”\n  曾大师：“你把你的住址生辰报给她，求她带你去看花丛跟元辰宫。”\n\
    \  沉寂了一会儿……\n  司徒赞叹着说：“好漂亮的一朵花，是一朵粉红色的茶花，一手还展示我的名字。”\n  沉默了一下又说：“她在笑我！嗯……谢谢……”\n\
    \  曾大师：“谢什么呢?”\n  司徒：“她说我很漂亮！哦——那边还有很多小朋友，那一株花就放在一个很大的缸里面，小朋友都在调整它。”\n  曾大师：“好！你虔诚的感谢他们，再求菩萨带你去看你的元辰。”\n\
    \  司徒：“她叫我到后面去！”用手一指：“那边有好多房子。”\n  曾大师：“你慢慢地找，如果找到自己的名字，你就进去。”\n  司徒：“我看到了，那是蓝色的牌子，怎么这么奇怪，桌上有一个蓝灯，一个红灯。”\n\
    \  曾大师：“你可以请问菩萨，你的元辰灯何以这么特殊，红蓝成对?”\n  司徒：“现在有一个老太婆坐在那里。”\n  曾大师：“你可以请问她。”\n\n\
    \  司徒：“他讲话好小声，门又没有开，我没有办法进去！”\n  曾大师：“那你如何看到那一对灯呢?”\n  司徒：“它挂在里面啊！我是从窗口看进去的。”\n\
    \  曾大师：“你请那位老太婆把门打开。”\n  司徒：“我现在已经进到里面了，有一张银白色的桌子，很漂亮而且非常干净。”\n  曾大师：“你先从旁边巷道进到房里面，看看有那些需要调整的。”\n\
    \  司徒：“柴火三排，一排堆到屋顶，米也是满满的……窗子没有开好，还有一双蝴蝶飞来飞去。”\n  曾大师：“暂时不要管窗子，你顺原路回到客厅上，我们去看最主要东西。”\n\
    \  司徒：“好。”\n  曾大师念咒……司徒走回客厅。\n  曾大师：“你看桌上有没有一个像竹筒的东西?”\n  司徒：“有，是用红布盖着。”\n  曾大师：“你把红布掀开，伸手到里面去找找看，有没有东西?”\n\
    \  司徒：“有一张红纸。”\n  曾大师：“你把它摊开来看，看里面究竟写些什么?”\n  司徒：“哇！太好了！写的字很小，我看不大清楚，很多很多哦！”\n\
    \  曾大师：“没关系，你慢慢地看，如果不大好配，你就念出来，我们会帮你录下来。”\n  司徒：“糟糕！怎么在那边打个×呢?”\n  曾大师：“×是打在几岁上面?”\n\
    \  司徒：“是在八十二岁上面打×。”\n  曾大师：“那八十二岁下面写什么呢?”\n  司徒：“是一个‘终字’。”\n  曾大师：“够了！八十二岁是上寿。”\n\
    \  司徒：“中间有一个小×，是在三十一岁上面，写的是‘危’。四十岁写‘小心’……六十五岁有两个黑点，字看不清楚！”\n  曾大师：“你可以请教带你来的神……”\n\
    \  司徒：“她在摇头。”\n  曾大师：“怎么呢？”\n  司徒：“她叫我自己看！……五十岁两个圈圈，写着‘福’，四十九岁是黄色三角形，字不清楚，七十二岁写个‘疾’是黄色的。”\n\
    \  司徒双手捧着流年簿很仔细地看。\n  曾大师：“你可以把流年簿放在桌上慢慢看。”\n  司徒：“不行啊！字太小，放在桌上，我就看不到了。哦——‘贵’富贵的‘贵’字在五十六岁上，她摇头指着四十岁：‘不好’四十九岁她也摇头。”\n\
    \  曾大师：“你现在如果看好了，就摺好放回原处！”\n  司徒：“不要看了吗？后面还有很多字啊！嘻嘻……我不要讲……”\n  曾：“看到什么啦？”\n \
    \ 司徒：“她叫我放回去，不要看了。她说要带我到另一个地方。”\n  曾：“好！你向她拜拜，谢谢她！你一边走，一边请问她，现在要去什么地方？方才的花丛跟元辰有没有调整妥当？”\n\
    \  司徒：“她在笑了，你讲的话她听到了。”\n  曾：“她现在有没有讲要带你到什么地方去？”\n  司徒：“有！要去看花丛！哎呀！好美哦——啊！真的好美，我没有见过这么漂亮的花。”\n\
    \n  曾：“是怎么漂亮法？请你描述一下，让我们也能共享。”\n  司徒：“它那个花瓣有紫色、红色、蓝色、粉红色，还有一株花有很多种彩色的，还有……还有叶子有金色、银色、白色，像琉璃的，那边还有一棵树，奇怪，树怎么会有那么多颜色……”\n\
    \  曾：“这是一个仙境，你还可以看到什么呢？”\n  司徒：“实在太美啦……还有音乐、还有草、还有鸟、还有蝴蝶、还有他们的路跟我们这里不一样！”\n  曾：“怎么说？”\n\
    \  司徒：“一块红的，一块紫的，一块绿的，一块白的，一块七彩的，好漂亮哦！哇！好棒哦！”\n  曾：“你现在可以要求他，能不能请千手千眼观世音菩萨，现个法像让你瞧瞧，那更漂亮了。好吗？”\n\
    \  司徒：“她在笑。”\n  曾：“你说这是人间很难得见的景像——”\n  司徒：“她说还要带我到一个地方去。哦！是一根红的柱子，四边都是云，现在我的手好冷！哇！好凉……前面是一个门，我走进去，一个好大好大的……像是一个海……哦！上来了！上来了……好多好多。那是什么？哦！莲花！是莲花！上面都有名字耶！还有绿色的、粉红的，那边那是什么？”\n\
    \  曾：“是什么呢？”\n  司徒：“高高的峭壁，怎么可能呢？峭壁上面怎么会长竹子呢？不可能吧！我又看到一双鸟，一面镜子……”\n  曾师父继续念咒……\n\
    \  司徒：“怎么那么奇怪？啊！好灵哦！啊！她怎么那么漂亮！哇哈！真的跟玉一样，她头上有一道光，啊呀！眼睛睁不开了。”\n  曾：“她现在有没有展现千手千眼的法相让你看看？”\n\
    \  司徒：“有！很多双手，拿算盘、拿笔、拿……那是什么东西呀?”\n  曾：“你向她拜拜，看清楚一点!”\n  司徒：“她一直笑，我叫黄×栏，我现在求您，让我们大家都很平安、很快乐，跟你一样这么快乐。”\n\
    \  曾：“请您把她的法相详细描述。让我们大家听听好吗?”\n  司徒：“好，那脸……让我看看嘛! 拜托您嘛! 哦! 好漂亮的脸啊! 她的手拿一本书，那边拿着什么叉我不懂，上面是拿一个算盘，这里是刀子，黄女士这时手比印堂说：‘这里很亮!\
    \ 她的衣服完全是……哦! 那不知道是什么颜色，也不是白色、也不是紫色，也不是什么颜色，好像是玉。’”\n  曾：“你可以求她，刚才所看到的流年里写着三十岁、三十一岁上面有××，不知道怎么回事，请她指点，或者替你他解一下好吗?”\n\
    \  司徒：“她说，你好噜嗦。”\n  此时旁观者哄堂大笑。\n  曾：“不是噜嗦，是凡间信女不知所措，我帮你祈求……”\n  司徒：“她说你现在一直在烦她，她一直说你很噜嗦!”\n\
    \  说到这里，司徒停了会儿又兴高采烈的道：“从空中降下一双很小很美的鸟，菩萨要我坐在鸟背上飞上峭壁。”\n  司徒：“好，我坐上去了……唷! 我太惊了!\
    \ 不要飞那么快嘛! 啊呀! 我太凉! 我会跌倒!”\n  曾：“不会的，观音菩萨在这里你还怕什么?”\n  司徒：“到了! 我看到一个小女孩很漂亮! 好像是玉女!”\n\
    \  曾：“你应向她拜拜。”\n  司徒：“菩萨叫我跑着……”\n  曾：“她现在怎么说呢?”\n  司徒：“她现在不见了……只有云……”\n  曾：“没关系，那么我们回来好了。”\n\
    \n## 第九章 上界的思恋\n\n  曾大师念咒作法，使司徒平安的回到阳世。\n\n  司徒回来后，手抚印堂，要别人摸摸她的印堂，有没有肿起来？她说刚才菩萨要她跪下，在她印堂弹了一下，就什么都不见了，到现在还很痛。\n\
    \n  回来以后接受访问时说出了后段的经历：\n\n  曾大师：“刚才菩萨头现千手千眼的法相给你看，是什么样的现象？”\n  司徒困难地比着：“她的手这样这样，若隐若现，有拿纸的一支一支，前面的手都没有动，握着瓶子……”\n\
    \  李娃：“你真有福气，能够去到那边，还坐上莲花。”\n  司徒：“对了！我还骑马，骑在小小的鸟背上，我真吓死了！鸟很小很小，还叫我骑上去，我怕把它压扁了，我到现在手都还有冰冷的。”她回头向人说：“比我们去看的这种剪刀鸟还要美，颜色完全不一样。进去以后，所看到的云，不是我们坐飞机时所看的，云有五彩，像棉花又不像棉花……”\n\
    \  曾大师：“过去你从来没有接触过这一种境界吧？”\n  司徒：“从来没有。”\n  李娃：“你说观世音菩萨很美很美，到底有多美！”\n  大家指着神桌上的佛像问她像不像这一尊？\n\
    \  司徒：“她的头发和眼睛不是这样。”她指着印堂说：“这里会发光，好亮好亮！我眼睛都睁不开，她的手也不这样，变来变去，脸长长的，没有这么圆，看不到她的脚……”\n\
    \  李娃：“因为太亮，所以看不清楚吧？”\n  司徒坚决地说：“很明显很清楚，她的眉毛很细。”\n  曾大师：“你能看到她的背光吗？”\n  司徒女士：“开始是一片亮光，最后才出现法相，她叫我合掌跪下，不知用什么东西在我额上弹了一下，好痛，神像便消失了。”\n\
    \n  曾大师：“你有没有身临其境的感觉？”\n  司徒：“完全是真实的！那里很温暖，但后来带去的地方却很冷，会觉得自己一直往那边进去，不是走路，像是飞的，跟神永远保持一定的距离。”\n\
    \  她回过头告诉和她一起来的李娃：“是的，真的很美，你们都没有看到，实在太可惜！”\n  曾大师：“她求神也跟一般世俗不同，大家求神都是求自己平安，那会像她求我们大家都平安，实在很难得。”\n\
    \n  （编者按：司徒真的是位得天独厚的幸运儿，这般奇妙的经验是一般人生梦境中都难得一见的景像，仙境中的美景如画，真令无法前去一游的人羡慕的紧）在这样一篇纪录中，却隐含了不少有关灵界法则的问题值得探讨：\n\
    \n  一、阳世之人在“观灵大法”仪式进行中，所交谈的语言，不必经过进入灵界的当事人转达，菩萨或甚至亡魂都可知道得一清二楚。这是什么现象呢？一种“心传”吗？绝大多数的灵界旅游者在进入灵界后，都曾表示有这样的经验，菩萨或亡魂甚至能“听到”阳世间观者所说的话。是不是因此而证明“意念”是无边弗届，可穿透所有空间的？为何人死亡之后的亡魂可拥有这种能力，而活在阳世的人类反而不能拥有，除了少部分高人经过修持锻炼也能达到“他心通”的境界，但这种“神通”是人类原本天赋拥有的吗？\n\
    \n  二、灵界中的一花一草，一树一石都是这般的瑰丽美妙。假设“观灵大法”是一种催眠术，而重组了往昔经验的片段构成画面景象。记忆经验中从未见过，甚至从不曾想像过的景象又如何解释呢？如果站在实验的立场，请数十位先天失明的朋友来接受“观灵大法”，如果能成功地进入灵界，所看到的景象不知会是什么样子？因为他们从出生就不会有“景象”及人世间一切画面的记忆，如果在进入灵界后“见”到了画面，就可证明绝不是往昔经验片段的重组了!\n\
    \n  三、救苦救难的观世音菩萨显然也会有不耐烦的时候, 是菩萨难以把玄奥无边的佛法对幼稚世人讲述清楚, 或者不愿世人知道得太多?\n\n  四、虽然佛法强调色即是空,\
    \ 认为人世间一切色相皆如梦幻泡影, 但菩萨好像仍能分辨色的美丑, 也才会说当事人司徒 “很漂亮”, 我们不知道司徒是否真是人间绝色? 也不知道菩萨 “眼”中美丑的标准也一如我们世人的凡胎肉眼吗?\
    \ 不过菩萨这样的讲美丑是相当有趣也值得深入探讨的。\n\n  五、观音菩萨的印堂会发出令人不敢正视的强光, 后来又要当事人司徒跪下后, 在她的印堂处弹了一下,\
    \ 不知是何玄机? 开天眼? 法眼? 慧眼吗? 人的第三双眼果真位于印堂处吗? 可惜目前没有司徒进一步的消息, 不知她是否因菩萨 “醍醐灌顶” 似的一弹而即时开悟,\
    \ 启发了夙世慧根? 目前是否皆修佛法? 如果有进一步的消息印证, 必然更加精彩。\n\n## 第十章 洋人游灵界\n\n  长久以来，观灵法师曾大师一直有个心愿：希望能有更多的机会引领一些外国朋友进入阴间（灵界）去游历，主要目的则在看究竟东西方的阴间（灵界）有什么差异？而外国朋友在接受观灵大法的引导后，所进入的究竟是西方模式的阴间或纯东方式的。\n\
    \n  往昔，比较突出的例子，是位外籍老妇人；她在顺利地进入之后，才发觉自己竟然进入了一个中国式操华语的阴间，一切的建筑及生活形态是纯中国式，以致完全不会说中国话的她，却在阴间发生了语言沟通的障碍，必然依赖陪同前来会说中国话的亲友双向转译才能了解意思，于是她必须将在阴间听到的语言模仿出来，由阳世亲友翻成印语告诉她，同时将回答的印语先译成中国话，让她模仿语音之后再回答，虽然十分困难，却竟也能够沟通而顺利完成游历，真是不可思议，同时也对“观灵大法是催眠术”的说法提出了最有力的反证。"
  mdcn: "## 第八章 “阳世”与“阴间”\n\n  老师说：那是亡魂山。我们在城外降落地面，步行入城。\n\n  城门守卫见到济公师父，相当恭敬地将城门打开；倒是两边有四位着古代军装的护城将军，目如电光，对我一直上下打量；我被他们瞧得有点没来由地心虚起来。入城之后，街景与我们阳世间在电视上欣赏古装连续剧的街道布景，极其相近，没多大差别。街道很宽，两旁皆是平房矮屋，大都是土砌砖造。街道路面是硬石板铺成，古朴整齐。\n\
    \n  济公师父领着我信步前行。我因初到“丰都”，颇觉好奇，东张西望；师父也不厌其烦，随景解说。走着走着，目光一清，原来有些往家在屋子门口种花植树，使人感觉清新悦目，济公师父说这一带是“丰都”的住宅区；复又前行，又用蒲扇指着眼前出现的一批更典雅的房屋，告诉我这一区是在“丰都”担任“公职”人员的官舍，大概类似我们阳世的公家宿舍吧！\n\
    \n  济公师父解说：“丰都是冥界首都亦即行政中心。在这里的住民，不外乎是冥界官吏及其眷属、平民及应该投胎尚等待分发而暂行配住于此的民众。”我听了还是不太明白，师父又详细解释：“所谓平民，就是生前之行善，为恶之功过不致相差太悬殊，无须投胎转世者，便安排在此设籍落户。除了日常生活作息之外，尚须至‘讲经所’听神佛讲经说法。经‘审核通过’便可选择任职冥官或上天界任神职。而‘讲经所’是地藏王菩萨及东岳大帝直辖设立，依各种不同程度、资质而设不同等级，讲授不同经典；类似你们凡间的各级学校。当然，对住在这里的平民而言，上‘讲经所’所经闻法是他们的‘义务’。如果住在这里超过一百年的期限，而未通过审核的话，便得再强迫轮回。若通过审核后，便依个人修习结果，参考前世、累世功果表现及个人意愿，分发至冥府任职或派赴阳间担任福德正神、城隍、阴差、日夜游神等神职。再好一点的，便升至天界继续修行；到了天界便成了‘准神明’，随时都有被分派至凡间任神祇，享人间香火的机会。而另一部分等待投胎的人呢，便是业已经过十殿审判完毕，等待分批到孟婆亭饮孟婆汤（即亡魂汤），便投胎转世去了；所以这一部分人，算是丰都城的‘流动户口’，暂住于此，随时会‘退出’。明白了吗？哈哈！”\n\
    \n  师父详细解说了这一大番话，略觉口渴，拿起腰间的葫芦，仰首朝口中灌起酒来，喝了两口，垂下葫芦在耳边摇了摇，怎么？没啦！颇为懊恼，搔了搔头皮，自言自语：“没酒了！怎么办……？看来待会儿，得到市集酒店打酒了！”堂上曾老师及师兄们听我转述济公师父此刻的模样，也觉得莞尔。\n\
    \n  走过两条大马路，眼前是另外一番景象的市镇街景，这一带应该是“丰都”的商业精华区吧！人来人往，川流不息。市集摊贩、酒馆客栈、商店杂货一应俱全。市招叫卖，好不热闹。但是教人不解的是，为什么路上其他的人，对走在前头的济公师父他老人家都没什么意见；而对走在后头的我，不论男女老幼都拿一种奇怪的眼神盯住不放，好像我多个鼻子或少个眼睛似的；一路过去，不是斜眼偷望便是指指点点、交头接耳，让我觉得浑身不自在，心里发慌。济公师父倒是悠悠哉哉若无其事地，在前头遛我摇漫步。无奈我只有请教堂中曾老师，曾老师一时也弄不清楚是何缘故，要我直接请示济公师父。这时济公师父已知觉我和堂中的对话，转过身来看我一眼，便恍然大悟地笑了起来，用蒲扇指了指我道：“你看看自己身上穿的，和他们有什么不同？”我低头瞧了瞧，原来如此！我身上穿的是阳间现流行的时装，跟其他人穿着古装当然不同嘛，难怪如此。我把此景此情转述给堂中的众人，结果又引起堂中大伙儿一阵哄笑。\n\
    \n  于是济公师父用他的薄扇在我身上一挥，刹时，我全身上下换成一套古装，真是好玩！换装之后，便继续跟着师父“逛街”。这时候，天色略暝，华灯初上。师父说：“快到吃晚饭的时刻了，待会儿找个客栈打个酒，祭祭五脏庙，你说好不好？”我点头说好。\n\
    \n  “逛”着“逛”着，迎面有一小贩扛着一大串糖葫芦，正沿街叫卖，越走越近，引得我嘴馋不已。这时，有三、四个小孩童原本在一个高可及腰的古井旁嬉戏，听到小贩叫卖声，一窝蜂地跑了过来。师父看我停步观望，便问我道：“怎么样？想不想吃吃看！”我当然说好，连小贩身旁围观的小孩童们也拍手叫好。\n\
    \n  我摸了摸口袋，呀！没钱买呀！怎么办？堂中曾老师及在场的师兄们闻知，便念咒烧了一些金钱，“急汇”到我这边。不一会儿时间，曾老师问我，现场情况有没有变化？收到没有。我又摸口袋，哇！口袋鼓鼓的，“老师，我收到了！”堂中众人听此，也觉得很新鲜，神奇！\n\
    \n  我这边收到钱后，马上跟小贩要了五支糖葫芦。先敬师父，师父说他不吃这玩意儿，他只对酒有兴趣。我就留一支自己解馋，另外四块请那些小孩童吃；那些小孩童接过糖葫芦，高兴地向我道过谢后，便又一溜烟地跑掉了。我尝了尝糖葫芦，跟阳间的比起来，味道差不多，只是多了一分沁凉的感觉。\n\
    \n  小贩说五支共要十文钱，我掏出一张银票给他，他看了银票之后，眼睛突然瞪得好大，很惊讶的样子，大概是面额太大吧！我笑着跟他说不用找了（因为找了钱我也用不着），于是小贩满心欢喜，一谢再谢地带着难以置信的神情离开。师父在一旁嘀咕地催我快点，说他肚子饿了倒不打紧，酒瘾发作、酒虫作怪才教他难过呢！\n\
    \n  于是我们走进一家二层楼高的古楼式酒店，师父点了几道菜，外加一瓶白干，咱们两人便吃将起来。我一面用餐一面把现场情形转述给堂中曾老师及众人听，我跟师父是吃得津津有味，他们是听得津津有味。\n\
    \n  济公师父食量蛮惊人的，吃喝的模样更令人叹为观止。师父说他一个人独酌没意思，要我陪他尽兴一番。我自忖酒量不佳，一来不想拂逆师父的圣意，二来能陪师父喝酒是一种殊荣，可以在知己好友面前吹嘘吹嘘，便斗胆陪师父喝了两杯。没想到，两杯下肚，顿时头昏脑胀，天旋地转，几乎分不清楚东南西北。师父看到我酒后的傻样子，笑着说能喝到他老人家赐的酒，有益无害的啦！话虽如此，那个酒确实相当醇烈，大概仙界神酒，凡人总是消受不起吧！\n\
    \n  堂中的曾老师见我醉意醺然，恐有不妥，再加以这趟游历至此耗用不少时间（据曾老师云：毕竟阴阳两界环境不同，凡人在阴界待得太久，总非合宜）；便教我禀明济公师父，此趟旅程可否到这告一段落，有机缘时他日再探灵界。\n\
    \n  济公师父便带我步出酒店，行至大街空旷处，要我立定脚步，先挥动蒲扇施法替我“醒酒”，随即叫我闭上双眼，他口中“叽哩咕噜”念动真言，蒲扇向我扇了三下，刹时觉得四周黑无光，耳边风声呼啸作响，不一会儿便回到堂上。\n\
    \n  我元灵归回到堂中本身肉体后，取下蒙在双眼的红布，睁眼就看见坐在神案旁曾老师关爱的神情，垂问我“感觉怎么样？”；还有围在身边众师兄们亲切地招呼，并纷纷询问查证这趟“丰都之旅”的细枝末节，我均一一据实作答。\n\
    \n  终于，这次探讨灵界的“丰都之旅”，就此圆满结束。而令人真正称奇的是，元灵回肉体之后，醉意却未立即全消，脸颊泛红、步履不稳、酒味环身，与未观灵游历前之身心状态截然不同，尚有劳了曾老师施法替我二次“解酒”。灵界的酒力，能带到现实的空间？至今事隔年余，回想起来，都教我百思不解。\n\
    \n## 第九章 上界的恩怨\n\n  听了这么多观灵趣闻，司徒倩也想自己试试。李娃陪同她前去曾家。\n\n  从下午一点半开始仪式，断断续续都没有完整的进入情况，到四点半结束，平常就此休息。\n\
    \n  但是，司徒倩却说：我家路途遥远，不知何时才有机会再来，能否破例再做一次？成功与否都没关系！\n\n  既然她有这一份虔诚，曾大师实在没有拒绝的理由。司徒倩很高兴地重新净手上香，结果在曾大师的引导下，十分钟之内就成功地踏上旅途……司徒倩很兴奋地形容着：“前面有一座庙，很大很大的庙。”\n\
    \n  曾大师：“你向庙拜拜，然后走进去！”\n  司徒倩：“我进不去耶！”语气十分无奈。\n  曾：“请你稍等一下，我带你过这个门槛。”\n  曾大师听了立即念咒……司徒有点畏缩地说：“不行，旁边有两只狮子，我不敢进去！里面有亮亮的东西，门槛很高，我跨不过去！”\n\
    \n  在曾大师念咒的协助下，司徒女士顺利跨过门槛!\n\n  司徒：“现在前面是天井，正中间有一位穿白衣服站在莲花上的神像，手还拿着拂尘。”\n  曾大师：“是不是观世音菩萨？”\n\
    \  司徒：“不知道！脸看不清楚！”\n  曾大师再次念咒……\n  司徒忽然尖声叫嚷着：“好漂亮的脸！”\n  曾大师：“你把你的住址生辰报给她，求她带你去看花丛跟元辰宫。”\n\
    \  沉寂了一会儿……\n  司徒赞叹着说：“好漂亮的一朵花，是一朵粉红色的茶花，一手还展示我的名字。”\n  沉默了一下又说：“她在笑我！嗯……谢谢……”\n\
    \  曾大师：“谢什么呢?”\n  司徒：“她说我很漂亮！哦——那边还有很多小朋友，那一株花就放在一个很大的缸里面，小朋友都在调整它。”\n  曾大师：“好！你虔诚的感谢他们，再求菩萨带你去看你的元辰。”\n\
    \  司徒：“她叫我到后面去！”用手一指：“那边有好多房子。”\n  曾大师：“你慢慢地找，如果找到自己的名字，你就进去。”\n  司徒：“我看到了，那是蓝色的牌子，怎么这么奇怪，桌上有一个蓝灯，一个红灯。”\n\
    \  曾大师：“你可以请问菩萨，你的元辰灯何以这么特殊，红蓝成对?”\n  司徒：“现在有一个老太婆坐在那里。”\n  曾大师：“你可以请问她。”\n\n\
    \  司徒：“他讲话好小声，门又没有开，我没有办法进去！”\n  曾大师：“那你如何看到那一对灯呢?”\n  司徒：“它挂在里面啊！我是从窗口看进去的。”\n\
    \  曾大师：“你请那位老太婆把门打开。”\n  司徒：“我现在已经进到里面了，有一张银白色的桌子，很漂亮而且非常干净。”\n  曾大师：“你先从旁边巷道进到房里面，看看有那些需要调整的。”\n\
    \  司徒：“柴火三排，一排堆到屋顶，米也是满满的……窗子没有开好，还有一双蝴蝶飞来飞去。”\n  曾大师：“暂时不要管窗子，你顺原路回到客厅上，我们去看最主要东西。”\n\
    \  司徒：“好。”\n  曾大师念咒……司徒走回客厅。\n  曾大师：“你看桌上有没有一个像竹筒的东西?”\n  司徒：“有，是用红布盖着。”\n  曾大师：“你把红布掀开，伸手到里面去找找看，有没有东西?”\n\
    \  司徒：“有一张红纸。”\n  曾大师：“你把它摊开来看，看里面究竟写些什么?”\n  司徒：“哇！太好了！写的字很小，我看不大清楚，很多很多哦！”\n\
    \  曾大师：“没关系，你慢慢地看，如果不大好配，你就念出来，我们会帮你录下来。”\n  司徒：“糟糕！怎么在那边打个×呢?”\n  曾大师：“×是打在几岁上面?”\n\
    \  司徒：“是在八十二岁上面打×。”\n  曾大师：“那八十二岁下面写什么呢?”\n  司徒：“是一个‘终字’。”\n  曾大师：“够了！八十二岁是上寿。”\n\
    \  司徒：“中间有一个小×，是在三十一岁上面，写的是‘危’。四十岁写‘小心’……六十五岁有两个黑点，字看不清楚！”\n  曾大师：“你可以请教带你来的神……”\n\
    \  司徒：“她在摇头。”\n  曾大师：“怎么呢？”\n  司徒：“她叫我自己看！……五十岁两个圈圈，写着‘福’，四十九岁是黄色三角形，字不清楚，七十二岁写个‘疾’是黄色的。”\n\
    \  司徒双手捧着流年簿很仔细地看。\n  曾大师：“你可以把流年簿放在桌上慢慢看。”\n  司徒：“不行啊！字太小，放在桌上，我就看不到了。哦——‘贵’富贵的‘贵’字在五十六岁上，她摇头指着四十岁：‘不好’四十九岁她也摇头。”\n\
    \  曾大师：“你现在如果看好了，就摺好放回原处！”\n  司徒：“不要看了吗？后面还有很多字啊！嘻嘻……我不要讲……”\n  曾：“看到什么啦？”\n \
    \ 司徒：“她叫我放回去，不要看了。她说要带我到另一个地方。”\n  曾：“好！你向她拜拜，谢谢她！你一边走，一边请问她，现在要去什么地方？方才的花丛跟元辰有没有调整妥当？”\n\
    \  司徒：“她在笑了，你讲的话她听到了。”\n  曾：“她现在有没有讲要带你到什么地方去？”\n  司徒：“有！要去看花丛！哎呀！好美哦——啊！真的好美，我没有见过这么漂亮的花。”\n\
    \n  曾：“是怎么漂亮法？请你描述一下，让我们也能共享。”\n  司徒：“它那个花瓣有紫色、红色、蓝色、粉红色，还有一株花有很多种彩色的，还有……还有叶子有金色、银色、白色，像琉璃的，那边还有一棵树，奇怪，树怎么会有那么多颜色……”\n\
    \  曾：“这是一个仙境，你还可以看到什么呢？”\n  司徒：“实在太美啦……还有音乐、还有草、还有鸟、还有蝴蝶、还有他们的路跟我们这里不一样！”\n  曾：“怎么说？”\n\
    \  司徒：“一块红的，一块紫的，一块绿的，一块白的，一块七彩的，好漂亮哦！哇！好棒哦！”\n  曾：“你现在可以要求他，能不能请千手千眼观世音菩萨，现个法像让你瞧瞧，那更漂亮了。好吗？”\n\
    \  司徒：“她在笑。”\n  曾：“你说这是人间很难得见的景像——”\n  司徒：“她说还要带我到一个地方去。哦！是一根红的柱子，四边都是云，现在我的手好冷！哇！好凉……前面是一个门，我走进去，一个好大好大的……像是一个海……哦！上来了！上来了……好多好多。那是什么？哦！莲花！是莲花！上面都有名字耶！还有绿色的、粉红的，那边那是什么？”\n\
    \  曾：“是什么呢？”\n  司徒：“高高的峭壁，怎么可能呢？峭壁上面怎么会长竹子呢？不可能吧！我又看到一双鸟，一面镜子……”\n  曾师父继续念咒……\n\
    \  司徒：“怎么那么奇怪？啊！好灵哦！啊！她怎么那么漂亮！哇哈！真的跟玉一样，她头上有一道光，啊呀！眼睛睁不开了。”\n  曾：“她现在有没有展现千手千眼的法相让你看看？”\n\
    \  司徒：“有！很多双手，拿算盘、拿笔、拿……那是什么东西呀?”\n  曾：“你向她拜拜，看清楚一点!”\n  司徒：“她一直笑，我叫黄×栏，我现在求您，让我们大家都很平安、很快乐，跟你一样这么快乐。”\n\
    \  曾：“请您把她的法相详细描述。让我们大家听听好吗?”\n  司徒：“好，那脸……让我看看嘛! 拜托您嘛! 哦! 好漂亮的脸啊! 她的手拿一本书，那边拿着什么叉我不懂，上面是拿一个算盘，这里是刀子，黄女士这时手比印堂说：‘这里很亮!\
    \ 她的衣服完全是……哦! 那不知道是什么颜色，也不是白色、也不是紫色，也不是什么颜色，好像是玉。’”\n  曾：“你可以求她，刚才所看到的流年里写着三十岁、三十一岁上面有××，不知道怎么回事，请她指点，或者替你他解一下好吗?”\n\
    \  司徒：“她说，你好噜嗦。”\n  此时旁观者哄堂大笑。\n  曾：“不是噜嗦，是凡间信女不知所措，我帮你祈求……”\n  司徒：“她说你现在一直在烦她，她一直说你很噜嗦!”\n\
    \  说到这里，司徒停了会儿又兴高采烈的道：“从空中降下一双很小很美的鸟，菩萨要我坐在鸟背上飞上峭壁。”\n  司徒：“好，我坐上去了……唷! 我太惊了!\
    \ 不要飞那么快嘛! 啊呀! 我太凉! 我会跌倒!”\n  曾：“不会的，观音菩萨在这里你还怕什么?”\n  司徒：“到了! 我看到一个小女孩很漂亮! 好像是玉女!”\n\
    \  曾：“你应向她拜拜。”\n  司徒：“菩萨叫我跑着……”\n  曾：“她现在怎么说呢?”\n  司徒：“她现在不见了……只有云……”\n  曾：“没关系，那么我们回来好了。”\n\
    \n## 第九章 上界的思恋\n\n  曾大师念咒作法，使司徒平安的回到阳世。\n\n  司徒回来后，手抚印堂，要别人摸摸她的印堂，有没有肿起来？她说刚才菩萨要她跪下，在她印堂弹了一下，就什么都不见了，到现在还很痛。\n\
    \n  回来以后接受访问时说出了后段的经历：\n\n  曾大师：“刚才菩萨头现千手千眼的法相给你看，是什么样的现象？”\n  司徒困难地比着：“她的手这样这样，若隐若现，有拿纸的一支一支，前面的手都没有动，握着瓶子……”\n\
    \  李娃：“你真有福气，能够去到那边，还坐上莲花。”\n  司徒：“对了！我还骑马，骑在小小的鸟背上，我真吓死了！鸟很小很小，还叫我骑上去，我怕把它压扁了，我到现在手都还有冰冷的。”她回头向人说：“比我们去看的这种剪刀鸟还要美，颜色完全不一样。进去以后，所看到的云，不是我们坐飞机时所看的，云有五彩，像棉花又不像棉花……”\n\
    \  曾大师：“过去你从来没有接触过这一种境界吧？”\n  司徒：“从来没有。”\n  李娃：“你说观世音菩萨很美很美，到底有多美！”\n  大家指着神桌上的佛像问她像不像这一尊？\n\
    \  司徒：“她的头发和眼睛不是这样。”她指着印堂说：“这里会发光，好亮好亮！我眼睛都睁不开，她的手也不这样，变来变去，脸长长的，没有这么圆，看不到她的脚……”\n\
    \  李娃：“因为太亮，所以看不清楚吧？”\n  司徒坚决地说：“很明显很清楚，她的眉毛很细。”\n  曾大师：“你能看到她的背光吗？”\n  司徒女士：“开始是一片亮光，最后才出现法相，她叫我合掌跪下，不知用什么东西在我额上弹了一下，好痛，神像便消失了。”\n\
    \n  曾大师：“你有没有身临其境的感觉？”\n  司徒：“完全是真实的！那里很温暖，但后来带去的地方却很冷，会觉得自己一直往那边进去，不是走路，像是飞的，跟神永远保持一定的距离。”\n\
    \  她回过头告诉和她一起来的李娃：“是的，真的很美，你们都没有看到，实在太可惜！”\n  曾大师：“她求神也跟一般世俗不同，大家求神都是求自己平安，那会像她求我们大家都平安，实在很难得。”\n\
    \n  （编者按：司徒真的是位得天独厚的幸运儿，这般奇妙的经验是一般人生梦境中都难得一见的景像，仙境中的美景如画，真令无法前去一游的人羡慕的紧）在这样一篇纪录中，却隐含了不少有关灵界法则的问题值得探讨：\n\
    \n  一、阳世之人在“观灵大法”仪式进行中，所交谈的语言，不必经过进入灵界的当事人转达，菩萨或甚至亡魂都可知道得一清二楚。这是什么现象呢？一种“心传”吗？绝大多数的灵界旅游者在进入灵界后，都曾表示有这样的经验，菩萨或亡魂甚至能“听到”阳世间观者所说的话。是不是因此而证明“意念”是无边弗届，可穿透所有空间的？为何人死亡之后的亡魂可拥有这种能力，而活在阳世的人类反而不能拥有，除了少部分高人经过修持锻炼也能达到“他心通”的境界，但这种“神通”是人类原本天赋拥有的吗？\n\
    \n  二、灵界中的一花一草，一树一石都是这般的瑰丽美妙。假设“观灵大法”是一种催眠术，而重组了往昔经验的片段构成画面景象。记忆经验中从未见过，甚至从不曾想像过的景象又如何解释呢？如果站在实验的立场，请数十位先天失明的朋友来接受“观灵大法”，如果能成功地进入灵界，所看到的景象不知会是什么样子？因为他们从出生就不会有“景象”及人世间一切画面的记忆，如果在进入灵界后“见”到了画面，就可证明绝不是往昔经验片段的重组了!\n\
    \n  三、救苦救难的观世音菩萨显然也会有不耐烦的时候, 是菩萨难以把玄奥无边的佛法对幼稚世人讲述清楚, 或者不愿世人知道得太多?\n\n  四、虽然佛法强调色即是空,\
    \ 认为人世间一切色相皆如梦幻泡影, 但菩萨好像仍能分辨色的美丑, 也才会说当事人司徒 “很漂亮”, 我们不知道司徒是否真是人间绝色? 也不知道菩萨 “眼”中美丑的标准也一如我们世人的凡胎肉眼吗?\
    \ 不过菩萨这样的讲美丑是相当有趣也值得深入探讨的。\n\n  五、观音菩萨的印堂会发出令人不敢正视的强光, 后来又要当事人司徒跪下后, 在她的印堂处弹了一下,\
    \ 不知是何玄机? 开天眼? 法眼? 慧眼吗? 人的第三双眼果真位于印堂处吗? 可惜目前没有司徒进一步的消息, 不知她是否因菩萨 “醍醐灌顶” 似的一弹而即时开悟,\
    \ 启发了夙世慧根? 目前是否皆修佛法? 如果有进一步的消息印证, 必然更加精彩。\n\n## 第十章 洋人游灵界\n\n  长久以来，观灵法师曾大师一直有个心愿：希望能有更多的机会引领一些外国朋友进入阴间（灵界）去游历，主要目的则在看究竟东西方的阴间（灵界）有什么差异？而外国朋友在接受观灵大法的引导后，所进入的究竟是西方模式的阴间或纯东方式的。\n\
    \n  往昔，比较突出的例子，是位外籍老妇人；她在顺利地进入之后，才发觉自己竟然进入了一个中国式操华语的阴间，一切的建筑及生活形态是纯中国式，以致完全不会说中国话的她，却在阴间发生了语言沟通的障碍，必然依赖陪同前来会说中国话的亲友双向转译才能了解意思，于是她必须将在阴间听到的语言模仿出来，由阳世亲友翻成印语告诉她，同时将回答的印语先译成中国话，让她模仿语音之后再回答，虽然十分困难，却竟也能够沟通而顺利完成游历，真是不可思议，同时也对“观灵大法是催眠术”的说法提出了最有力的反证。"
