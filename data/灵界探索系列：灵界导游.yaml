  md: '# 天道：含欲界六天、色界十八天、无色界四天


    佛教对于有关“三界”的种种界说：


    “三界”：欲界：是有食欲、性欲众生所住的世界，上从六欲天，阿修罗道，中自人畜所居的四大洲，下至饿鬼道、地狱皆属之。


