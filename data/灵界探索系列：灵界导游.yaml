    最后是谈的是“地狱道”：


    中国人诅咒人的时候，喜欢说：“这种人死了一定下十八层地狱（阿鼻地狱）！”


    外国人也一样，总是说：“去下地狱吧！”


    可见“地狱”是一个多么恐怖又痛苦不堪的地方？


    但是“地狱”既不是神佛上帝所造，也不是阎罗王所造，更不是地藏王菩萨所造，而是人类自己共业所造，但地狱何时开始有，大概是难以知道了。


    “地藏王菩萨”是在见到众生因执迷于贪、疾不悟而造成恶业；所以才会附入地狱道去受苦。于心不忍，而发了慈悲的宏愿，要一直济渡地狱众生，并至“地狱不空，誓不成佛”。


    有关地狱的层级及其中的景况，自古以来就有很多不同的说法，不论东方的，西方的，道教的，佛教的，要全列出来，可以再写三大本书，笔者为了方便说明只试举“地藏菩萨本愿经”以及“玉历宝钞”中的地狱景况，但是内中所说的景况并不重要，重要的是在后半段的探讨部份。景况只是纯粹列出供作参考资料而已：


    一、“地藏菩萨本愿经”：


    “……诸有地狱，在大铁围山之内。其大地狱，有一十八所。次有五百名号各别。次有千百，名字亦别。无间狱者，其狱城，周围八万余里，其城纯铁，高一万里，城上火聚，少有空缺。其狱城中，诸狱相连，各号各别。独有一狱，名曰无间。其狱周围万八千里，狱墙高一千里，悉是铁为，上火撤下，下火撒上，铁蛇铁狗，吐火驰逐，狱墙之上，东西而走，狱中有床，遍满万里。一人受罪，自见其身，遍卧满床。千万人受罪，亦亦压自见，身满床上。众业所感，获报如是。又诸罪人，备受众苦。千百夜叉，及以恶性鬼，口牙如剑，眼如电光，手复铜爪，拖拽罪人。复有夜叉执大铁叉，中罪人身，或中口鼻，或中腹背，抛空翻接，或置床上。复有铁鹰，啖罪人目。复有铁蛇，绕罪人颈。百肢节内，悉下长钉，拔舌耕犁，抽肠剉斩，烊铜灌口，热铁浇身。万死千生，业感如是。”


    “……阎浮提东方有山，号曰铁围，其山黑黝，无日月光。有大地狱，号极无间。又有地狱，名大阿鼻。复有地狱，名曰四角。复有地狱，名曰飞刀。复有地狱，名曰火箭。复有地狱，名曰夹山。复有地狱，名曰铁驴。复有地狱，名曰烊铜。复有地狱，名曰抱柱。复有地狱，名曰流火。复有地狱，名曰耕舌。复有地狱，名曰剉首。复有地狱，名曰烧脚。复有地狱，名曰啖眼。复有地狱，名曰铁丸。复有地狱，名曰争论。复有地狱，名曰铁钑。复有地狱，名曰多瞋。”地藏白言：“仁者，铁围之内，有如是等地狱，其数无限。更有叫唤地狱，拔舌地狱、粪尿地狱、铜巢地狱、火象地狱、火狗地狱、火马地狱、火牛地狱、火山地狱、火石地狱、火床地狱、火梁地狱、火鹰地狱、锯牙地狱、剥皮地狱、饮血地狱、烧手地狱、烧脚地狱、倒刺地狱、火屋地狱、铁屋地狱、火狼地狱。如是等地狱，其中各各复有诸小地狱，或一或二，或三或四，乃至百千。其中名号，各各不同。”


    “……地狱罪报，其事如是：或有地狱，取罪人舌，使牛耕之。或有地狱，取罪人心，夜叉食之。或有地狱，釜汤盛沸，煮罪人身。或有地狱，赤烧铜柱，使罪人抱。或有地狱，使诸火烧，趁及罪人。或有地狱，一向寒冰。或有地狱，无限粪尿。或有地狱纯飞疾黎。或有地狱，多攒火枪。或有地狱，唯撞胸背。或有地狱，但烧手足。或有地狱，盘缴铁蛇。或有地狱，驱逐铁狗。或有地狱，尽驾铁骡。仁者，如是等报，各各狱中，有百千种业道之器，无非是铜，是铁，是石，是火。此四种物，众业行感。若广说地狱罪报等事，一一狱中，更有百千种苦楚，何况多狱。……”


