    # 第三章 轮回的法则


    注定，任何人都不得改变，不同阶级之间不能通婚，甚至不能平起平坐或平等交往，这种制度数千年来一直没有太多改变，迄今依然如此。


    当然，这不只是对“轮回”或“业报”的曲解或矫枉过正，而有理曲相信这种牢不可破的种姓制度完全是“政教合一”的刻意结果，政治上的统治者（或政治权利既得集团）为了保有权力必然全力支持僧侣婆罗门这样的主张，而僧侣为了巩固自身阶级的地位及权力，自然也乐于坚持这样的理论基础与统治阶级联手。虽然因此使得阶级的人因“认命”而带来国家社会假象的安定，然而对生命的真义及“轮回”架构无疑却是背道而驰的。


    到了释迦牟尼时，虽然接受印度教“轮回”之说，却坚决反对这种不合理，主张“众生平等”。


    自从“玉历到宝钞”一书从宋朝以来在民间广为流传之后，中国式“善恶有报”的轮回观念深植人心，对世道人心容或有莫大的助益，标榜善有善报，死后可进入极乐世界或自在快活的神仙界又或者来世可投生富贵人家。消极地以恶有恶报吓阻恶行及犯罪，以免死后坠入阿鼻地狱永不得超生，或在地狱、饿鬼当道受苦，又或者来世投生为低贱的牲畜等等。


    但是，这样的观念在对“轮回”架构及对生命真义的追求上是莫大谬误也是极其不可取的。


    在中国人传统“轮回转世”的观念中，认为冥冥中有一尊司掌善恶的大神，具象化地为“阎罗王”，在人死后，根据其生前行善作恶的轻重纪录分别给予奖励或严厉的惩罚，特别是十八层地狱及一百二十八处小地狱之中惨不忍睹的各式酷刑，如上刀山、下油锅、剥皮、挖心……彷佛“轮回”是极端严峻恐怖的，是完全不慈悲的。


    然而事实并非如此，综观十八层地狱及一百二十八处小地狱之中种种酷刑活脱脱的只是中国历代以来人世间各种杀戮方式及'
  - '[PAGE 36]


    酷刑的翻版而已, 可说毫无新意。如果地狱的酷刑仅止于此, 那么以中国人的残忍民族性, 从商朝的“炮烙”、“脯醢”（将人做成肉干或剁成肉酱）之刑以至后世历朝历代官定的各种残忍肉刑（伤害肉体为处罚的刑法）来说是狱根本就在人间。


    又或者, 以在中国人隐隐约约地地狱观念中, 阎罗王是位刚正不阿, 擅断曲直却又嫉恶如仇之人, 所以也才会有包公死后成为五殿阎君的传说, 显然的仍不脱离把“轮回”视为一种奖善惩恶的法则。


    然而事实上“轮回”的真义绝非如此。


    “轮回”只是一种生命现象的变化, 不仅不是残酷或惨无人道的, 相反地却是一种极其自然, 极其慈悲的规律, 在这个规律恒定如轨道般的运作中, 所有众生（包括人类）依照他的意愿在死亡后前往他应处之地,
    这种意愿并非临时起意, 而是在一生之中长期累积下来的超强意念。


    “轮回”的真义绝不是在奖励补偿好人与惩罚折磨坏人, 以求得与阳世一生的平衡。当然更是为了补偿阳世“善无善报, 恶无恶报”的不公平, 而形成大快人心的末世大审判。


    “六道轮回”也绝不是一种处罚性的分发作业, 什么杀牛的来世变牛被人杀、秦桧三世投胎变猪、为富不仁的人来世投胎变饿鬼等等那只是在民智未开的时代, 未能对广大群众做形而上的阐释时,
    一种方便法门的教化, 更是一种讲述自身没有透澈地了悟“轮回”真义, 以讹传讹的结果。


    “轮回”的法则不是佛定的, 不是神定的, 不是阎罗王定的, 更不是人定的, 只是一种自然运行的现象, 广大流行、普遍包罗, 甚至不是外在的法则, 而是所有众生与生俱来、内在的一种生命特质,
    就如同觅食与传宗接代的本能, 是所有物种（众生）的天赋使命或能力、任何众生只要一旦为众生, 或者说任何生命的本质一旦投射在六道的生命型态时就注定了“轮回”的命运,'
