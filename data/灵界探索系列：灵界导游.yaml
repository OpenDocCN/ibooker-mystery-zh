    方?


    老太太回头似乎洞悉一切地答道:“我知道你是从外地来的啦!”


    他又问:“请问这儿是什么地方,我迷路了!”


    老太太却笑而不答,在笑的时候还露出了嘴中的金牙,只是摇摇手,就不理他,继续去炒菜。


    他忍不住又问了一句:“请告诉我‘元神宫’在哪里好吗?”老太太才朝了一个方指了指,他道谢之后就照着老太太所指方向往前去寻找,可是此时他却觉得全身疲惫不堪,就坐在门外一棵大树下休息,而且不停地喘气,好半天仍然没有恢复过来,只好略感遗憾地放弃了下面的行程,要求返回阳世。


    在快速的施法之下,他终于顺利地回到了现实的世界中来,对于这一段奇妙又不可思议,甚至以他的经验也无法合理给予解释的经历,他一直感到十分惊异,但是,最令他兴奋不已的却是生平第一次成为能自由飞翔的“超人”,那种快速的飞行,不论是高空或低空,完全是逼真的,而非纯粹是个人的幻觉而已,这也是他从未经历过的,相信不论是依靠飞机或滑翔翼,在这世界是也绝没有人经历过在街道巷弄之中,以靠近地面做超低空飞行的经验,这位名摄影记者,可能是世界上第一个拥有这种愉快刺激的奇异经历的第一人。


    (编著者按:当事人本身为资深摄影记者,为采访报道之工作前来,为了实际了解“观灵术”而亲自接受施法,其中值得探索的一些关键性问题,试条列如下:


    一、当事人在同一天里一共接受了三次施法才成功进入灵界,前二次虽未成功,但仍看到了强光及一些摄像,当同事以质的态度来询问时,他除了表示自己一直很清醒之外,对他所见到的刺眼强光(当时他是用毛巾蒙着双眼)也肯定表示不是摄影机上聚光灯所造成的影响,而且在他的要求下,聚光灯称开并关熄很久之后，他仍然看到刺眼的强光，同时也看到了山及人影及衣摆，再印证于他第二次接受施法顺利进入灵界后所亲历的景况，先前所见的强证及山脉显然并非出于想像之幻觉，当然也绝无任何暗示。


