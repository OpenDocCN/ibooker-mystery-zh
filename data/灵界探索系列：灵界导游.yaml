  md: '酷刑的翻版而已, 可说毫无新意。如果地狱的酷刑仅止于此, 那么以中国人的残忍民族性, 从商朝的“炮烙”、“脯醢”（将人做成肉干或剁成肉酱）之刑以至后世历朝历代官定的各种残忍肉刑（伤害肉体为处罚的刑法）来说是狱根本就在人间。


