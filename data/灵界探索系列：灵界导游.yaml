    放松与愉悦的心情下，才能静下心来思索，接受高层级灵界导师的教诲，更进一步地了解宇宙的实相及生命的真义，以俾使在投胎转世时下一世去之后，能比前一生过得更有意义，并完成在阳世必须科目的修习，譬如孝顺父母，友爱兄弟家人，尊敬师长，爱护配偶子女，帮助邻居，以爱心去对待乡里、同胞以致世人。也或者是为了除去前世性格上负面的缺失，譬如自私自利、吝啬、妒忌、偏执、暴躁、冷漠、骄傲、猜忌、贪小便宜、迷信(迷信财富、迷信邪说)、好争斗、酗酒及麻醉药品的嗜好，赌博、幸炎乐祸、奢侈浪费等等，不过这些都还算情节轻微的。否则如果严重到为富不仁，见死不救，因争强门胜或嗜赌如命弄得倾家荡产、家破人亡，因吸食鸦片、海洛因等等而杀害自己及他人性命，因超车逞血气之勇无故伤人及其他的恶心恶行则就会每况愈下地落入中阴界最下层黑暗世界甚至饿鬼、地狱诸道。


