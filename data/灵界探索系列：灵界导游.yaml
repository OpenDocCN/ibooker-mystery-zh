    # 第六章 中国人和佛教


    许多人因为以上种种逻辑上的矛盾而断然否定了烧纸钱的功效, 武断地以为这是一种迷信的民俗、更进而全盘否定了生命不死、灵界实存。


    其实这是只知其一不知其二, 以阳世的逻辑硬套在灵界的规则上, 无怪乎方枘圆凿, 矛盾百出而不以为然了。


    笔者依据个人的研究与认知兹说明如下:


    一、人死后进入灵界, 依据生前的认知及作为 (业报) 在轮回前暂居灵界过境时, 已有层级之别, 高层级灵入于天界、中层级灵留在灵界, 均可自行变化, 吸收宇宙能量,
    偶尔也可吸引来自物质界的供食 (经物质转化的能量), 而所有低层级的灵则仍未摆脱对物质的需求 (欲界的食欲、性欲), 譬如阳世的山珍海味、绫罗绸缎。


    华屋广厦甚至烟、酒等嗜好品, 然而这些纯只是内心精神层面的执迷不悟, 亡灵已经没有了肉体, 完全不需要物质上的供应, 但是因为生前的习惯及执迷, 所以还是会有饥饿、口渴、寒冷、炎热的感觉,
    甚至仍然带着烟瘾、酒瘾或甚至麻醉品的药瘾, 在没有像高、中层级灵所拥有的变化能力及吸收宇宙能力的本事来自由变化时, 因此就时时感到匮乏与不足, 靠焚烧纸钱
    (注: 这正是原始祖先灵祭祀文化的起源, 原始先民认为若非如此, 祖先将会作祟降灾, 相反的丰盛的祭祀则将博得神的欢心而赐福), 而飘荡到各处的孤魂野鬼则装神弄鬼、和向完全不认识的人要来钱索食,
    或依附于神像, 甚至石头, 大树上卖弄鬼、装神充仙来欺惑无知的村夫愚妇争相前来膜拜, 再接受牺牲血食供物及焚烧的纸钱。


