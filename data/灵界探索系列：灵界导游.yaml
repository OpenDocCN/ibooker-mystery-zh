  md: '# 第二十章 人身难得须珍惜


    各种方式的自由，所以儿童的出家是绝对不应该被鼓励的，因为儿童的心智尚未成熟，并没有正确选择的能力。


    编者也不以为学校刚毕业的年轻人适合出家，试想连红尘尚未踏入又何来看破呢？如果只是为了人生的无常，恐惧于尘世中的人欲横流而不敢去接受历练，早早遁入空门，眼不见为净，如同下决心不去参加会考，就不会有“落榜”的问题。如果是抱着这种心态，那不是“看破”而是逃避，那又何必来人世中走一遭呢？


    生而为人，就有“做人”的天赋责任，如果人都做不好，或者根本不想做人，只是一心想成佛，那要产是水中捞月而已。


    至于那些把剃渡穿袈裟的生涯当成了职业、不事生产、贪图供养的人，那就更是等而下之，不必浪费笔墨口水去谈了。


    出家去追求真理好吗？当然很好，但是一定是在已经完成了做人的责任之后，不是在之前，更不是在中途放弃做人的责任。


    所以“在家”也一样可以追求真理，而且是必须的，如果认为先昏昏噩噩地混日子，反正等以后正式出了家再来修行，这种想法是大错特错，因为真理无处不在，一日三餐藏道理，在日常生活中的一念一行、一事一物都可以发现真理。


    每个人都应该要结婚的，因为婚姻而与配偶发生的互动关系是最好的修持方式。（否则人类就应该天生是中性的，何必有男女之别？）


    于是又要谈到“欲”这个问题了。生命所以落入轮回，难以超脱，全是因为贪嗔痴等等的欲念。


    那么“禁欲”对不对？是否修行就一定要“禁欲”？


    生而为人就不可能“无欲”，连欲界天神都有欲，何况是凡人？


    如果“欲”是不必要的，那么人生来就该“无欲”，就像人'
