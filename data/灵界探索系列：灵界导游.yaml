    几百年前，欧洲的一些海权强国奉行殖民主义，在北美洲、中南美洲、亚洲、非洲、澳洲对当地的土著，不也同样是认定从他们的原始落后可以证明灵性一定较白种人为低，所以就理直气壮地加以屠杀(在英国上议院甚至为了澳洲土著究竟是是人类还是动物?
    可不可以任意错杀而引发正式的激辨), 那么“灵性”高低的标准是谁定的? 天? 佛菩萨? 上帝? 结果还不是人自己定的?


    如果非要说植物的灵性较低 (比动物低), 那也未必, 就因为植物不能动、不能跑、不能说话, 不会喊痛, 它的灵性就一定比动物低吗?


    猪笼草、毛毯苔会吃小昆虫, 它们的灵性高不高? 它们可全是植物呢? (细菌具有细胞壁, 在生物学上的分类是属于植物)。所以结果还是人自己一厢情愿去定的。


    其实, 植物的灵性未必比人低, 所有的动物不论肉食性、草食性或杂食性, 吃的全是其他生命 (不论动物或植物), 所以百分之百是“利己”的。


    而植物则几乎千分之九百九十九 (除了各种捕虫草) 都不会去杀或吃其他生物的, 反而多半是被其他动物所吃, 所以几乎是完全“利他”的。


    各种宗教一直在教训我们的不就是在修持“利他”的高尚情操吗? 简而言之, 人类灵性的超升不就在减少“利己”之心而多抱持“利他”之心吗?


    那么植物的灵性较高, 还是动物的灵性较高呢? 有没有罪过? 有没有因果呢?


    那么人如果又吃了这株植物, 要不要负连带责任呢?


    反过来说: 一具灵魂已经离体的动物尸体或甚至人的尸体,那么有人吃了他 (它), 有没有罪过? 有没有因果呢? (如果是在以灵性的有无与高低来决定可不可以吃为标准的条件下)。


    从动物的身体构造来比较: 草食性的动物如牛、羊、马、犀牛、河马都有个大肚子, 那都是为了植物较难消化之故, 比如牛就有四个胃, 还要反刍。


    而老虎、狼、豹等等肉食性动物，肚子一定是凹进去的，因为它们不需要长时间来消化，而且也是为了适合捕猎其他动物时的快速奔跑。


    既不是草食性，也不是肉食性，而是杂食性。无可否认的人在这方面是和其他灵长类相似的。


    如果看到此处，读者以为编者反对吃素那就错了!


    编者绝不反对吃素，但更主张健康地吃素，因为有条件地摄取素食不但有益健康，可减低欲望的程度，也有助于灵性的提升，但是绝不是僵化而成了僵片的教条，好像一旦吃了动物类的食物就罪大恶极的该打入十八层地狱。


    前面说过了：为了有益健康，保持营养的均衡是必须的，所以某些必要而有益的动物性蛋白质是必须的，根本不必要因此而定下十恶不赦的罪状来限制，如果吃纯素吃到健康出了毛病，那才真的是大谬不然。


    而且吃素与否是随人自由一“欢喜就好!”


    拜托!吃素没什么天大的功德啦!自然界吃纯素的草食性动物太多了，你见过哪只超凡人圣、不可一世了?


    吃素更不是护身符，以为吃素就是不杀生，就有天大的功德，就可以不落因果，那就更是大笑话了!


    吃素和修行或修为更没有绝对的关系，和心地善恶也无关，自古以来很多邪法师也是坚持吃纯素的。


    真的，吃素只是很单纯的想法和行为而已，单纯到实在不值得浪费这么多的墨水和精神来谈。更单纯到没有必要去高唱入云。


    如果吃素吃到一桌素席比荤席还要贵，素食店的自助餐比排骨便当还贵，或者非日本的花菇不吃，非梨山落霜的大白菜不食，非要把素菜做得和虾仁、腰花、鸡鸭鱼肉唯妙唯肖的话，这种口腹之欲的贪只怕比只求以杂食果腹的一般人罪过更大，更有害于修行。


    虎行天下吃肉，牛行天下吃草。


    肉食、草食都是天性使然，连消化器官的构造都大不相同，就算一位师父有通天的本事能使老虎听了经而开悟、戴起了念珠改吃素食，用不了几天，它定一命呜呼。


    肉食性动物杀生而食，有多大的罪过？要背负多少的因果？草食性动物又有没有罪过？有没有因果？


    如果肉食性动物顺着天性吃肉就有天大的罪过，草食性动物顺着天性吃草就有天大的功德，公平吗？合理吗？


    真的，这样的争论是既无谓又无聊的！


    真的，吃素没有这么大的功德啦！


    真的，只是为了填饱肚子，肉食也没有天大的罪过啦！


    但是，一旦是贪口腹之欲，不论素食、荤食，同样是执迷在一个“贪欲”，这才严重，更严重的是为贪口腹之欲而“残杀”。


    如果有人非生猛海鲜不爱、非奇禽异兽不吃的，甚至活炸鲤鱼、生炙驴肉、活烫鹅掌、生吃猴脑都能吃得津津有味，面不改色，更甚至刨鸭助兴的，他可以不相信因果报应，他可以不相信灵魂永生，但是那些不会因为人们不相信而消失的，三恶道也不会因此不存在的。而且很快就会“昔日戏言身后事，如今一一到眼前”的。


    当挚爱的亲友不幸过世时，除了呼天抢地哀痛俞恒烧纸钱供他礼之外，你还能为他做些什么有助益的事？


    自古艰难惟一死。


    “死亡”是人类最恐惧，最迷惑也最无能为力的一件事，不论一生如何的叱咤风云、如何的富可敌国、如何的美貌英俊、如何的聪明绝顶、如何的法力高强、如何的力拔山河，一旦死神来叩门时，没有一个人可以豁免，所以“死亡”也是这世界上唯一最公平的事。


    想想：这世界上每天有多少人死亡？单单一个非洲及印度每年就要饿死数百万人。


    不论是每年饿死的数百万人对你，对我，对所有的一般人，那真的只不过是一个统计数字而已，会为此事哀伤的有几个？


    依据儒家的说法？爱是有亲疏等差的；人最爱的是自己，其次是子女配偶，其次是家人兄弟，其次是亲友邻居，再才是乡里同胞……


    因此，与我们关系越疏远远的人，其死亡往往越是不关痛痒。在看此章的同时，假若澳洲有一位中年男子过马路时被车当场撞死了，那又怎么样呢，就算任何一国的总统就在此刻生病或被暗杀死了，那又怎么样呢？你会为此痛哭流涕、不吃不喝不睡吗？肯定是不会啦！


    但是一旦是挚爱的亲友过世，不论是老病而死，意外死亡或甚至自杀身亡的，那情况就完全不同了，往往会令我们呼天抢地、哀痛逾恒，久久不能自己！


    为什么会这样呢？


    除了“死亡”象征了亲情友情、爱情等的关系被正式宣告结束，又加上了我们对“死亡”的恐惧、迷惑，对死后一切的不确定甚至无知。


    但是除了极度的哀伤与悲痛，在这时候，几乎每一个人都会希冀能做些什么来弥补或减少遗憾。


    因此从隆重的葬礼到各种超度仪式，从供饭烧金钱的祭拜到往后各种企图沟通见面的方式，也无不是在达成这样的心念而又唯恐不及。


    有一位美国哈佛大学的人类学博士一戴思客先生，他曾长期研究“乩童”，主要的研究课题是“乩童与该特定社区群众心理及行为的互动关系。”为了旁及相关的民俗信仰，经常前往各地做田野调查，在多次接触“灵媒”及“观灵术”等等的现场探索中，他肯定地表示：


    > “对过去亲友哀伤及追思的心态是全人类所共用的，但在其他国家很难藉具体的行动；如灵媒、牵亡魂、观灵术，甚至一般冥器牲礼的祭祀来追思、接触、或协助亡者，在美国就算想找个灵媒，往往要开车越过好几个州才能找到，因此不论对死者是否真的有实际的助益，但抚慰生者心灵的伤痛上却有着极大的正面功能。”


    他如此一针见血的看法，令我们不得不反问；应该是我们长久以来一直沉浸在这种文化背景中习以为常而轻忽了其正面的功能吧？而一些一味将之视为迷信必除之而后快的专家学者，是不是同样也因为习以为常，以至对其正面的功能视而不见？


    所以，如果只是为了抚慰生者心灵上的伤痛与不适，那么方式上是很多的，而且只要认为对当事人（生者）有助益，做做都可以。


    然而，一旦是希望对过世的亲友有实际助益时，那牵涉的范围就比较多：


    - 第一是宗教信仰，有时一家人或至亲好友也可能会有着不同的宗教信仰或有的信教、有的不信教，而且各种宗教对死后世界以及追思仪式也不尽相同。

    - 第二是认知不同，同是一家人或至亲好友也有坚决不相信灵魂不灭，不相信灵界存在的。

    - 第三是虽然有心想透过各种方式或仪式去忆思、接触或希望对挚爱的亡亲故友有所协助进展，却往往很难在急切之间寻得正确的管道，又或者对一般常见的仪式缺乏依赖时。

    - 第四是即使做了各种仪式或一般焚烧纸钱、供奉牲礼的祭拜, 也完全无法确知对亡亲故友是否确实有所助益?


    因此之故, 若是恳切地希望对亡亲故友有所助益时, 编者的建议如下：


    一、对于因老、病自然过世的亡亲故友, 有宗教信仰者可藉由各种宗教仪式的仪轨来进行。(无宗教信仰者请看第十则以后的方式)。


    二、对于因意外、急症、自杀过世的亡亲故友, 最好能有仪式, 并且在过世现场进行, 但一定要请足堪依赖的人来主持。


    三、年节、忌辰或其他特定日子的牲礼果品焚烧纸钱供奉,在不浪费, 无污染的顾虑下可以进行。祭品纸钱不必太多, 心念最重要, 祭祀及焚烧纸钱时只要集中心念, 一本诚意,
    观想祭品纸钱化做万千倍, 则效果极佳 (注: 但这绝不是根本之道)。


    四、亡亲故友死后去往何方? 处于何种境界? 固然可经由 “牵亡魂”、“观灵术” 而得之, 但是依据 “轮回法则” (本书各章均已详述, 请自行参阅), 可以静下心来肯、客观而不偏颇地去评估推断,
    就可明确地获知。能大彻大悟, 证得涅槃的数千年来绝无仅有, 即使菩萨、诸 罗汉果位的也少之又少, 其他绝大多数一般人必然仍在三界之中, 善者即时转生天界享受福报,
    恶者坠入地狱, 饿鬼道, 其他则必然仍处于中阴界 (轮回过境室)的各层级等候转世, 甚至或仍停留在阳世。


    五、“超渡” 有用吗? 先说其意义, 指的是超越烦恼, 度脱生死, 意指不再入轮回。其过程是讲述经文中有关生命真义、宇宙实相、轮回法则及境由心生的事实给亡者听闻,
    助其开悟。而不是靠大法师的神通法力把亡者 “保送” 去跳出三界, 成佛证道, 不要说一般法师, 连释迦牟尼佛都没这个本事。所以不要误以为只要做几场超渡法事就能把亡者祭奠定去成佛。但如果法师的修为高超,能让亡者有所开悟,那么对其在中阴界或之后转世的去向,多少会有些帮助。


    六、因此能使亡者开悟的不一定专指某一宗教的某一部经典, 轮回法则是涵盖一切生命的, 所以不是哪一种宗教的专利。因而没有宗教信仰的一般人, 只要能集中心念,
    并能为亡者讲述生命的真义, 宇宙的实相及轮回法则的道理, 同等有效果, 至于繁文褥节的仪式只是在帮助集中中心念, 并没有绝对的影响。


    七、如果亡亲故友已转生天界, 那只是出于生前的善心善行, 其灵性的层级未必比别人高, 如果依然不明了生命的真义及宇宙的实相而不能开悟, 福报享尽一样要再人轮回,
    甚至坠人三恶道。所以就算确定亡亲故友已转生天界, 除非他在高层级灵界导师的指导下正在潜心修行。否则万一他是一心在享乐 (如兜率天的天人居处) 而沉迷其中,
    如果你有诚心为其讲述上述道理,助其开悟, 一样也有帮助, 特别是生前没有任何信仰的。


    八、如果亡亲故友是落入恶 道或仍处于中阴界 (轮回过空室) 的各层级, 或甚至羁留阳世的, 那么为其讲述上述道理更是必须而有实际效用的, 如果一本诚意, 集中中心念去讲述,
    而助其开悟, 则必 定能提升其所处的层级甚至转生普道。


    九、不用怀疑! 死后所处的层级是缘于善恶的意念及行为,这些善恶的意念及行为又是缘自对生命真义、宇宙实相的开悟程度, 所以只要能助其开悟, 知道 “境由心生”
    的道理, 必能提升其层级。


    十、有宗教信仰的, 可以选择该宗教中适用的经典与为亡亲故讲述。


    十一、没有宗教信仰的, “轮回过空室” 的灵界三书是相当适合用于讲述已了解其中的要旨, 在静室中, 供上亡亲故友的遗照，一本诚意，集中心念，呼请其姓名称谓，再为其讲述其中之内容（实例可省略）。如果觉得自己没有讲述的能力，单纯用念的也可发，本书相当白话平易，亡亲故友一定听得懂得的。讲述完毕再诚心祝祷他早日超升。一次讲述不完，分几次讲述也可以，而多讲述几遍，功效更好。


    十三、当然，人生前就能经由各种方式了解生命的真义、宇宙实相及轮回法则那是最好不过的。因此生前能读完灵界三书也会有相当大的助益。


    # 第二十章 人身难得须珍惜


    # 第二十一章


    # 无师自通的医生


    他有把“魔刀”。


    巴西神医阿里戈是超自然医术史上最不可思议的人物之一，逝世时有二万人参加他的丧礼。


    阿里戈原名何塞·弗雷达斯，是一个农夫的儿子，一九一八年生于巴西美景市，以绰号“阿里戈”为世人所知。这个名字得自童年，原文的意思是来自乡下的家伙。


    阿里戈念书时，偶尔会受幻觉困扰。他看到炫目的异光，有时又听到一个声音用陌生的语言说话。长大后，他到附近一个铁矿场工作，二十五岁时当选当地工会主席。他曾领导工人罢工，迫使当局改善工作环境，因而遭资方解雇。随后，阿里戈在孔贡阿斯·多坎波镇一家酒吧工作。


    他每晚都受梦魔困扰，醒后往往头痛欲裂，这些梦比年轻时的幻觉更厉害。在梦境中，他看到一家医院的手术室，一个体格魁梧的秃头人正向一群医生和护士讲话。那粗哑的声音正是他年轻时就开始的。由于怪梦与头痛连续不断,
    阿里戈备受困扰, 只好经常到教堂祈祷求助。


    后来, 梦里的形象透露自己是弗里兹医生, 德国人, 死于第一次世界大战期间, 所以无法继续工作, 他知道阿里戈是个极富同情心的人, 所以选择他来继承自己的事业,
    他说此后阿里戈只有帮助周围饱受疾病折磨的人才能得到安宁。


    随后几年, 这些印象深刻的噩梦和剧烈的头痛一直缠绕阿里戈。到一九五〇年, 事情发展到他也不能控制了。


    那一年正值举行大选。到镇上访问的人中, 包括比登科特,他十分支持矿工的行动。见到阿里戈后, 深受他对矿工的热烈支持感动, 于是邀请他出席邻近美景市举行的政治集会。集会因事延期,
    比登科特请阿里戈到自己住宿的酒店过夜。


    当时, 比登科特患了肺癌, 他的医生曾劝他马上到美国动手术。阿里戈对此事一无所知。


    那天晚上, 比登科特快要进入梦乡时, 房门突然打开, 有人把灯亮了。这人赫然是阿里戈, 他的目光呆滞, 手里拿着一柄剃刀。说也奇怪, 比登科特并不害怕。阿里戈用重浊的德国口音说话,
    声调和他平日的不一样。他说这是急症, 要马上动手术。接着, 比登科特失去知觉。


    比登科特醒后, 发现他的睡衣被割开, 染满鲜血, 背腔有一个整齐的切口。他穿好衣服后走到阿里戈的房间。


    阿里戈初时以为比登科特喝醉了, 但随即看到切口, 也看到血迹斑斑的睡衣。不过, 他记不起曾经到过比登科特的房间, 也断然否认有参与这件荒诞的事情。比登科特大为震惊,
    立即赶飞机到里约热内卢去看自己的医生。


    这时阿里戈很害怕, 心想或者自己会有阴魂附体, 真的替比登科特动了手术; 很可能这就是那些梦中的声音指示他做的。


    消息不久传来, 医生检查了 X 光照片, 认为比登科特在美国动手术的结果十分理想。他又对惊讶莫名的比登科特解释，肿瘤是用一种“巴西还没有人懂的技术”切除的，康复的机会极高。这时，比登科特才说出事情的始末，还把这件事四处传播，巴西全国的报纸都报导了这件事。


    在孔贡阿斯·多坎波镇，佩里多神甫对此深信不疑，警告阿里戈不可再替人动手术。然而，阿里戈也不知道怎样才可以停止这种自己也记不起的举动。当地的灵魂学家纷纷恭维阿里戈，说他是真正的灵媒。阿里戈拒绝接受这种称誉，但是弗里兹医生的幻象如常出现。


    其后六年，阿里戈每天差不多替三百个看病，他把“诊所”从家里搬到对街一年空置的教堂。一九五六年，在医学界和天主教教会的压力下，当局以“非法行医”的罪名指控阿里戈。


    “你是怎样替人治病的？”法官问道。


    “我先念圣经。”阿里戈诚挚地回答道，“随后，我就陷入迷精状态。病人说我看病后就开药单，但是我完全记不起来。”


    “动手术后又怎样？”法官问。


    “同样，我也不明白自己当时的精神状态，我只知道要帮助穷人。”


    “不过，你的确是非法行医，不是吧？？”


    “不是我干的。”阿里戈回答说，“我只是病人和弗里兹医生灵魂的中间人罢了。”


    法官不为所动。阿里戈可以使弗里兹出庭应讯吗？巴西各地报纸都刊登审讯的消息和无数替阿里戈辩白的证明。根据一位教育历史哲学教授派雷斯指出：“全盘否定阿里戈的事迹是可笑的。医学专家、名记者、知识分子和政界显要，都曾经目睹这些事迹。我们不能否认事实。”


    虽然舆论对阿里戈有利，不过他还是被判入狱十五个月，罚款二百七十美元。稍后上诉法庭把刑期减为八个月，缓刑一年。'
