    约翰：“有个漂亮的女孩有前面跑过，她的动作像跳舞一样！”


    曾老师：“是什么样的装扮？是西洋式的还是中国式的？”


    约翰：“不！是日本式的！”


    曾老师：“哦！影像很清晰吗？”


    约翰：“是的！很清晰！”


    曾老师：“还在吗？”


    约翰：“不！消失了！很快地从我面前跑过去，然后就消失了，现在只剩下光芒而已！”


    …………


    约翰：“那光在变化，从黄色的变成绿色的，然后变成白色的！”


    曾老师继续念咒……


    ## 灵界导游


    约翰：“还是看到山和云，可是我没有办法出去!”


    曾老师：“景象清楚吗?”


    约翰：“清楚，但是不能往前走!”


    曾老师：“为什么?”


    约翰：“一往前走，景象就改变，变模糊!”


    ............


    约翰：“有一对眼睛看了我一眼，很快就消失了!”


    曾老师：“什么样的?”


    约翰：“只有一对眼睛，看了我一眼而已!”


    曾老师：“没有办法前进吗?”


    约翰：“不行!”


    曾老师：“好吧! 你是打算继续走下去? 还是要休息一下再做?”


    约翰说愿意休息一下再做，经曾老师施法之后，他就开始再度叙述刚才在灵界所经历的……


    曾老师：“刚才看到的面具怎么回事?”


    约翰：“一个日本人戴的面具，头上好像有两个很大的角，后来就看到是一个女孩戴着面具在跳舞，她穿的裙子很大，转动的时候可以感到裙子在轻轻飘动!”


    曾老师：“在那边的感觉怎么样? 自己很清醒吗?”


    约翰：“是的! 很清醒!”


    曾老师：“感觉呢? 很舒服 吗?”


    约翰：“对的! 很舒服，那女孩儿在跳舞的，我也跟着她一起跳! 很愉快!”


    旁观的人听他这么说，都笑了起来……


    曾老师：“有多少时间?”


    约翰：“很快，只是从我的左边跑到右边，大概只有几秒钟而已。”


    约翰又与友人交换了一下意见，友人才恍然大悟地说：他说刚才看到的面具很像是一张马的脸，好像是我们说的马面!


    之后约翰又接受了一次施法却没有更深入的接触，于是只好结束了未完成的“灵界之旅”。


    ### 探讨:


    虽然这位好奇的外国朋友的灵界之旅并不算很成功，但仍然留下了一些值得探讨的问题:


    - 一、外国人不一定进入他们观念中的阴间，反而在灵界看到了东方的景物，这是因为地域的关系吗？而灵界（阴间）是否也有东西之分？

    - 二、约翰先生完全不懂中文，而曾大师不懂英文，因此不可能在施法过程中给予任何暗示，但在念起“毫光咒”之后，约翰立即就表示看到了光亮，这是个相当值得研究的问题。


    # 第十一章 丰都城里来娇客


    “阴音”（灵界）是一个与“阳世”对称的名词。是有情生命死后的归处，也是所有众生死前等候轮迴的暂居之所。是另一度空间，是另一个次元，一般人经常产生的一个误解就是“阴间”就是“地狱”，充满了阴森恐怖的气氛，是一个魑魅魍魉，无常恶鬼居住的地方。然而，事实上“阴间”只是一个通称，真正的意思指的是“灵界”，包含了极乐的“天堂”，过渡地带的“冥国”和恐怖黑暗的“地狱”。阳世的肉体活动仅只是刹那间生命现象的投影，而灵魂才是永恒的生命本质。举世所有宗教的基本教义，莫不肇建在“灵魂不灭”的原始主张之上。自古以来，世界各民族都各自拥有不同的“灵界沟通方式”，其中最普通的就是以“灵界”做桥梁与灵界亲友沟通的“附灵术”，但在我国除此之外，却拥有更奇妙，更具有实证性的“观灵大法”。相关的资料经过长期归集分析，不只是单纯的灵异事件实录，更是研究灵学与灵界架构弥足珍贵的第一手资料。


    我国特有的“观灵法”完全不同于“牢亡魂”或西洋灵媒的“附灵术”。因为以灵媒为桥梁，而召请亡魂附身与阳世亲友对答的方式，不论真假都难免有种隔靴搔痒不落实的感觉。同时有时也容易被神棍或假灵媒靠唱作俱佳的演技，假藉亡魂之名需索，在真伪难辨的情况下，在一般人的观念中总有着造假的怀疑，甚至有着“牵巫姨，循话尾”的谚语：所谓的“牵巫姨”就是“牵亡魂”的俗称，民间总认为执行这类仪式的灵媒，若不是事先控知当事人的家中隐私与亲族关系，就是见风转舵，随机应变，顺着当事人的心意曲意逢迎。这十足说明了民间普遍的怀疑心态，但是“观音法”却完全不同，并不需透过灵媒做“转播站”，而是由法师施法后，让当事人自己亲自进入“灵界”（阴间）探望过世的亲友或观光，虽然成功的机率是因人而异，大约只有四成左右，但是只要是成功进入者，由于眼见到实景，而且又是完全清醒的状态下进行沟通，不但神奇而且真实，所以除非一直无法进入，一旦顺利进入，返回后都大感不可思议，却少有怀疑。


    为了研究灵学及探索灵界架构，有人曾长期针对“古传观灵”进行专题研究，十余年来曾参予的“观灵法”仪式超过百次以上，本身亲自接受施法体验也有三十余次。曾亲眼目睹的成功实例相当多，但由于着眼点置于“灵界架构”的法则问题，因此，对于故事性的强弱与曲折与否自然较少考虑。最近承蒙观灵术曾先生再提供宝贵而罕见的资料，使我们对“观灵法”的神奇又有了更深的了解，对于有志灵学研究者，这些资料使我们对灵界的法则与架构提供了明确而清晰的蓝图。


    在长期的特殊个案资料归集中，所得到的都是单一个人进入灵界的经历，虽然在种种证据显示中；二人以至多数人“结伴同行”进入灵界，双方同时能在进入及安全返回后，互相印证所见所闻的情形应该是合理可行的，但事实上却一直未曾遇见，直到最近，才从曾师父处优先获得这样一则罕见而珍贵的第一手资料：


    这次进行的“观灵大法”，在场接受施法的人数相当多，但是却发生了两人同时进入灵界，互相在灵界见面结伴而行的罕见例子：


    “……扶起僮身起，扶起僮身行……草仔路上草青青，草仔路上草发芽，献金献钱买路过，献金献钱买路行……”在师父持续焚化纸钱，并吟唱出包括一大串地名的开路咒，配合法尺木鱼有节奏的敲击声，何方两位先生很顺利地进入了灵界，首先是何的一阵惊呼：


    “有的！有的！我看见了；我看见方先生在旁边，可是他低着头不知道在找什么？”


    曾师父：“噢？那你喊他名字看看？”


    何：“方先生！你有没有看到我？”


    何：“方先生！你有没有看到我？”


    曾：“他怎么说？”


    何：“他一直在那儿笑，他的头一直转来转去不知道在找什么东西？”


    等候了一阵子，不见反应，何先生急着要去见他已过世的大姨子，而“观世音菩萨”化现身在一旁。


    曾：“那你赶快求菩萨带你去见她！”


    曾念了一阵咒文之后再问他。


    “现在菩萨答应要带我去了！”


    曾：“好！好！好！你赶快跟着菩萨走。”


    何：“现在菩萨带我驾着云往前飞去，影像好清晰！但是现在看不到方先生。”


    在一旁观看的何太太提醒他：“你还不赶紧谢谢菩萨？”


    ## 第十一章 丰都城里来娇客


    曾师父再念咒文并敲击木鱼后，何先生就开口道：“观音菩萨走了，只留下我一个人站在云上……”


    “有没有看见什么？”


    “……有像一位好像神仙来了！”


    何太太：“哪一位神仙？”


    曾：“你形容一下她的模样？”


    何先生：“雍容华贵的样子，穿着金色和红色发亮的衣裳，头发梳得高高的，旁边站了三个女孩子，其中一个好像××姐（注：何的大姨子）。


    隔了会他又开口：“对了，这位神仙正是王母娘娘，旁边一个女孩是××姐没错，她长得很漂亮。”


    曾：“看得清楚吗？”


    何：“很清楚，现在我们都站在云上，天空好蓝哦！”


    曾：“距离近不近？”


    何：“很近！”


    何太太：“可以直接跟她谈话吗？”


    何：“可以！××姐看到我很高兴，她过来跟我握手！”


    何太太很兴奋地催促他：“你跟她说：要她待会儿带我去好不好？我老是进不去！”


    何：“她骂你笨！”


    由于事先何太太曾以其他方式与已过世的姐姐取得联络，姐姐并曾交待她一些事情，因此正好此机会可以得到印证，就要何生代问：“你问她，她要我某日准备一百个红蛋和酒，有没有这回事？”


    何经询问后答说：“她说有的！”


    何太太：“那我要几点拜给她？”


    何太太：“她没有说！”


    何太太：“那照正常的时间；中午十二点拜给她可不可以?”


    何：“她说可以!”


    何太太：“问她还缺什么吗?”


    何：“缺一双鞋子，男鞋，小孩子要穿，她说小孩子在那里也很好，但是缺钱用!”停了会，他又转告，“她要我们要多孝顺父母，然后她又在骂××，骂她不孝顺，她说天下没有不是之父母，父母生我们养我们，不应该摆脸色给父母看!”


    何太太：“你问她××是不是一定要到三十岁才会结婚?”


    何：“她说差不多那时候啦，她说××会这么晚才结婚也是一种报应!”


    何太太：“你问她，我们要去请一尊王母娘娘的金尊回来供奉，为什么找遍了也找不到？你直接请示王母娘娘好了?”


    何：“王母娘娘已经走了，现在只有××姐在跟我说话！她说：我们直接到××宫就可以了!”


    何太太皱起了眉头：“找不到啊!”


    何：“她说只要有诚心，一定可以找到，她说天下的事没有这么容易的，而在我们家发生的那些事也是一种考验啦!”


    何太太：“你问她：你是不是没有儿子的命?”


    何：“她笑笑说有啦有啦!”


    停了一阵子，方先生说：“她要你不要玩的太大。”


    这时在场的众人先是一愣，但很快就能悟指的是什么。太太追问：“是不是没那个福气?”


    何：“她笑笑没说话!”接着他却形容说，“她身材不错，很漂亮，身材高矮跟你差不多，但是比你苗条……”


    何太太：“她以前每次也说她最漂亮……”


    何太太：“你问她们夫妻感情好不好?”


    何：“很好啊?”


    何太太：“对了！你问她哦；有一天晚上半夜里，我在家里听到有人叹息声，是不是她？”


    何：“对啊！”


    何太太惊呼一声道：“是她哦！有一天晚上二点还是三点多，我突然很清楚的听到一声叹息声！原来是她。”


    何：“她说像她们这种鬼魂，晚上都会回家看看，她常去你家、我家，也去×家！”


    何太太：“哇！她去×国啊？”


    何：“……”


    何太太：“你问她，我胆子这么小要怎么办？晚上都会怕！”


    何：“……”


    何太太：“你问她；是师父烧给她的那种钱比较大还是我们烧给她的比较大？”


    何：“她说师父烧的那种钱比较大。”


    何太太即时转头祈求曾大师；“师父，可不可以麻烦你再烧一点那种纸钱！”


    曾点点头：“可以！可以！”


    何：“××姐说以后能多烧一些纸钱给她，因为她现在多了一个小孩子，开销比较大！”


    何太太：“好的！你跟她说：“以后我会固定烧给她。哦！对了！你问她；“我烧的菜好吃吗？”


    何：“她说好吃，就是咸了一点！”


    曾大师这时一面念咒，一面焚化一种特殊的纸张，很快地，那边就有了反应，何表示在阴间的大姨子已经收到了……


    何太太：“你问她够吗？”


    何：“她说暂时够用了！接着又自言自语地叹息：‘唉，看她在那里好像也很缺钱！’”


    在场的众人无不异口同声地叹息：“真可怜！”


    何太太：“你请她帮大哥看一看好吗？”


    何：“她一直摇头；要我把自己的事管好就好了，不要操别人的心！”


    隔了一会儿，何又道：“我请她带我去地狱看看！”


    何太太一听却惊呼道：“地狱吗？”


    何：“不一定啦！天堂也好啊！”


    对方答应了之后，曾大师就敲起木鱼，再次念咒……


    何：“……上面有一个牌子，写着……‘礼都城’！”（编按：应为“丰都城”之误，拥猜测牌子上的“丰”字可能简写为“丰”，当事人缺乏概念，而误念为“礼”音）。


    何太太：“我姐姐还在你旁边吗？”


    何：“没有了！”


    曾大师：“里面看得清楚吗？”


    何：“看得清楚，都是牛头马面的！”


    曾大师；“你赶快求他们，请了们带你进去参观，这机会十分难得！”


    沉寂了片刻，只听何惊呼了声：“看到了！看到了！一个大油锅，哗！好大！大概比一间教室还要大的大油锅，两边各有一个台子，两个台子都有台阶，一边上一边下，有很多打着赤膊的壮汉站在台子上，有很多鬼魂的罪犯铐着手铐脚镣被壮健的鬼卒押上台子，推下油锅，马上就被滚油炸酥了，然后再被捞上来，从另外一边的台子推下去，马上就恢复了原状，可是看不到脸……”


    曾大师：“有没有挣扎？”


    何：“当然有！鬼哭神号的，叫得很大声很惨，哎哟！看了会怕哩！”


    何：“我现在又进到另一个大房间……里面有一个像插花用的那种剑山，可是很大很大，也很尖，那些犯罪的鬼魂一个一个被带进来，躺在剑山上，上面还有一个向下的剑山，压下来……”


    这时何太太插嘴问：“你现在一个人在走，没有人陪你吗？”


    何被她这一提醒，才突然感到害怕。“哎哟！我不要再看了！我要回来了！好怕……”


    旁观的众一阵哄笑……


    曾师念了一段咒语……


    何：“走出来了，在一条路上……”


    何太太：“有没有人来带你吗？”


    何：“有啊！××姐来了，她陪我走！”


    何：“她说你们家的高祖父母跟曾祖父母的牌子有问题！”


    何太太：“对！以前就说过了！”


    何：“她说那牌子是空的，根本没有请到他们的灵，拜的只是一块木头而已，他们在那边过得很痛苦，一定要请一位道行高的法师帮他们超度才行！”


    何太太：“你问她：是不是因为这样的原因，才让我们的家运很坏！”


    何：“她说对啦！她还要我转告在座的各位：做人一定要多做善事，孝顺父母！”


    何太太：“她现在能不能投胎？”


    何：“还不能，她说只要我们多做好事，将来在天上还能见面！”


    何：“我现在跟她坐在一棵大树下面聊天，四周的景色很美，田园的景色……”


    何太太：“她不是还在坐月子，怎么能出来？”


    何：“她说没有关系啦！”


    何太太：“她说湘语吗？”


    何：“都可以啦！湘语也可以呀！我现在听到的她也听得到!”


    何太太：“噢！那我们讲的话她也听得到啊?”


    何：“她知道啊！有时候我还没开口她就知道了!” ……


    何：“她走了……好！我也要回来了!”


    曾大师的施法之下，何生经历了一次奇妙的体验后，顺利地从阴间返回。


    在此同时，方先生也同时进入灵界，但两人却在异途分道扬镳，各寻已过世亲友，以致行程不一致。


    这次的“阴间之旅”固然已经顺利完成，但可喜的是也提供了一些“法则”性的架构，使我们对灵界能有进一步的认知，特别为有志灵学研究的读者归纳出来，以供参考：


    - （一）阴间（灵界）的风景非常美，色彩十分艳丽。

    - （二）地狱景象非常凄惨恐怖之外，阴间（灵界）的气氛和阳世相比则更为祥和。

    - （三）阴间（灵界）的亡魂仍有物质的需求，甚至会向阳世亲友索取。

    - （四）在阳世怀孕未及生产而过世者，在阴间仍会生产，并与阳世一样需要抚养婴儿。

    - （五）在阴间（灵界）的亡魂可以知道家人未来的吉凶。

    - （六）亡魂经常会在晚上回家来探视阳世的亲友，并且不受空间的限制，甚至可飘洋过海前往外国。

    - （七）亡魂可享受阳世亲友的菜肴，一样会品尝味道。

    - （八）在阳世犯下恶行，到了阴间将被押往地狱受罪，各种酷刑加身，痛苦万分。

    - （九）这次的游历提供了一个新的观念：“刀山”并不是单一地在地面竖立，将罪魂往下抛去刺戮，而是在上面另设一个剑山往下压。

    - （十）当事人并不认得“丰都城”而误念为“礼都城”，或可证明这并非记忆库中原有的资料，因此对于某些人将“观灵法”视为一种催眠术的见解，提出了一个极有力的反证。

    - （十一）亡魂可以听闻阳世之人的语言，与亡魂沟通不完全靠语言，心念才动，对方即可知悉。


    ## 第十二章 灵界的风景异常优美


    一位很有名的画家，想实际体验一下。这位画家年青精于工笔书，说明他的来意只是想看看能否扩充他的创作题材。于是就在画家依式入座后，展开了这次颇为精彩的“灵界之旅”。


    在一阵悠扬的咒语声中，画家说他看到光……看到一条龙……接着说正在过一座吊桥。因为是刚刚进入，所以师父咒声一直念个不停。


