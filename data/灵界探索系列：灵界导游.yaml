  md: '# 灵界导游


    这时洪娃小孩子高举双手，作一个摘取水果的动作，并搓揉两下，张口吃得津津有味。


    师父：“怎么样？味道如何？”


    洪：“我在吃梨子，好甜！”他用双掌弯成圆形说，“个子有这么大！”


    师父：“时间的关系，我们继续往前走吧！”


    洪：“很奇怪，那个小孩也这么说！我们现在沿着一条很陡峭的路飞过去，地上渐渐平坦，看到的是绿油油的村庄。”


    师父：“地界快到了，你求求那位带路的小孩，直接降到地面上，我们就在这里把洪先生的小孩调出来。”


    用小铲子我试着用铲尖凿那被填平的水泥，大概是历经长久的日晒雨淋，老化的水泥一铲就掉下来，露出一个“洪”字，接着“光”字。我好高兴，感到全血脉贲张，至今仍无法形容那一刻的骇叹！找到坟墓的人不是洪先生而竟然是师父！分析探讨：


    （一）那时洪小孩才十二岁，家居乡下，生活单纯，小小年纪对灵异接触全无概念，此次参加观灵又是临时受邀，根本不需要什么心理准备，而且绝对可以肯定的：“他完全不知道墓地在那里！”但是亡灵却能透过他精确地指出那根“电线柱”……“往前走五十步”……“碑牌被遮去一半”……等等，像这样的准确度绝对不是“巧合”、“下意识”、“幻想”、“催眠”所能达到的。幸好这件事从头到尾我适逢其会，因而增加了我无比的信心，站在灵学探索的立场，实证是很重要的否则空空洞洞大谈理论，常会令人莫明其妙不知所云。


    （二）自从当年走完那五十小步以后，坚毅的理念使我在漫长的岁月中迈开大步，如果一年算一步，那么在灵异探讨方面已经走了三十五步，希望未来我所能走的路，不仅是那区区的三十五步；而是将经年累月的探讨心得向信众提供最完善的服务。


    （编者按：这是一个相当特殊的个案，值得深入探讨的重点'
