    甚至仍然带着烟瘾、酒瘾或甚至麻醉品的药瘾, 在没有像高、中层级灵所拥有的变化能力及吸收宇宙能力的本事来自由变化时, 因此就时时感到匮乏与不足, 靠焚烧纸钱
