  md: '# ## 第十七章 人生八苦与诸界奇观


    是这样古老，让人仿佛回到了古代的社会一样。


    从“观灵术”的诸多资料中显示：一般进入灵界的路程或关卡，都是属于中阴界（轮回过境室）中层级这个区域；为了方便了解，再次简单列出进入灵界的路线与关卡来说明：


    # ### 一、草仔路


    进入灵界的起点，有时也是一个进入灵界的转运点，这是一片青葱的草地，草长得不长，地势很平坦，范围却很大，中间有一条弯弯曲曲的小径往前延伸到目力所不可及的远方……


    通常，在“草仔路”出现之前，被引入灵界的当事人会先看到光，或见到佛、菩萨、各种神祇显现法相前来引领，如果是以步行、骑马、乘轿方式前进，将会经过“草仔路”，如果是随着佛、菩萨、务种神只以飞行、乘船方式前进，则会越过“草仔路”。有时也有的当事人并未见到光或佛菩萨神明，而表示直接见到了这一大片的青草地，那么在法师施法念咒之下，也有单独通过“草仔路”自行往前走的。


    # ### 二、赤土路


    这也是一片广大的旷野，但寸草不生，只是干涸的红土地，或者有些进入灵界的当事人只是单纯地看见一条红土路，弯弯曲曲地往前延伸……


    # ### 三、黑土路


    与“赤土路”的景况相似，有些当事人见到的是一片黑土的旷野，路径不是很清楚，但有的当事人却只是见到一条弯弯曲曲的黑土路，有的表示这条黑土路很松软，走起来很舒服，但也有的却表示相当泥泞，很难走，为什么会有这样的差异则不得而知。


    # ### 四、马齿沙路


    就是一般乡间的石子路或细石路，石子不大，有如马的牙'
