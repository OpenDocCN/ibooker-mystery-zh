    # 四、舌识——舌根缘味尘

    五、身识——身根缘触尘

    六、意识——意根缘法尘

    七、末那识——前六识所依之根

    八、阿赖耶识——（藏识）


    这八识的作用的职掌，简单地来说，以“阳世”为例；我们人活在世上，完全依前面五种识（五感），就是眼睛视觉所看见的，耳朵听觉所听见的，鼻子嗅觉所闻到的，舌头味觉所尝到的，身体触觉所感受到的（冷、热、麻、痒、痛等）来感知阳世物质界的一切，并且经过第六识的辨别之后，将觉得对我们有意义的（我们俗称为“意识到……”）才交给第七识“末那识”这位仓库总管，收藏进第八识“阿赖耶识”之中去。


    什么是有意义或“意识到……”呢，譬如以听觉为例：一对热恋中的男女走在东街百货公司的骑楼人行道中，尽管周遭人声、车声、叫卖声吵得震天价响，他们明明听到了，但他内却几乎充耳不闻，反而是对方一丁点轻声细语却能听得一字不漏，因为这时双方第六识的“意识”只专心接收对方的言语，认为这才是有意义的，而其他声音再大，虽然明明也听到了，但对他们两人当时的“意识”而言也是毫无意义的。


    所以第六识“意识”的作用是将我们看到、听到、闻到、尝到，碰到的反应一一过滤之后就搬进第七识“末那识”，糟的是这“末那识”并没有分辨真假的能力，于是他将前五识收集的外界资讯（经第六识筛选过的）完全信以为真，认定那是真实的，然后收进到第八识的“阿赖耶识”去（并且认定“阿赖耶识”就是它真的主人），这被藏进去的就是“业因”，这所有的资讯将会造成我们心中大小不一的激荡反应，然后这种反应又会引发我们行为的动机并命令我们去做某些事，这就是“业果”。


    譬如：当我们正好肚子很饿的时候，在一家熟悉的面包店门'
- md: '中经过，眼睛看到油亮金黄刚出炉的热面包，鼻子闻到了奶油和麦香，而将这个资讯，传给了第六“意识”，“意识”立即反应：一面从“阿赖耶识”中调出以往诸多有关食的资料来比对，发现这些面包是可以吃而且很可口又可以填饱肚子的，但在经验资料中，这家店所制作的红豆面包最合我们的口味（这同时，我们从口袋掏钱去买来吃，在吃的同时，舌头把味觉，牙齿把咬下去又热又软的触觉，鼻子把奶油及红豆的香味全传去给“意识”，意识这时不但要决定要吃几个，吃多快，还要去比对“阿赖耶识”中的原始资料，最后才能断定：“嗯！真好吃！跟以前的味道一模一样，正是我最喜欢的那种味道！”


    但是万一这家店前一天才换了做面包的师傅，这时透过舌头、牙齿、鼻子等传回去的资讯有异，“意识”将“阿赖耶识”中的原始资料一比对，可能就会立即反应：“味道不对了！面包硬了点，豆馅太甜了！”


    再举一例：


    一位失业很久，三餐不继的男子，深夜在银行外面提款机那儿看见一位少妇刚把几万大钞装进皮包中去，再一“看”正是月黑风高，四下无人之际，这时“意识”立即会把资讯传给“末那识”又藏进“阿赖耶识”，并且从“阿赖耶识”搬出种种的资料，再经过意识的重组及思考：


    - 一、肚子很饿，没钱吃饭，找不到工作，赚不到钱，下一餐不知怎么办？以后又该怎么办？

    - 二、非常需要钱。

    - 三、那少妇的皮包中有一堆钱。为什么她有我没有？

    - 四、用偷的方式没技术，那少妇只有单身一个人，用暴力去抢，应该很容易得手。

    - 五、这是不道德的，也是犯法的，万一被警察抓到怎么办？会不会被判死刑？

    - 六、现在夜深人静，附近没有其他人，再不下手没有机会了。

    - 七、抢完之后该往哪边跑才不容易被捉到？


    于是其结果可能有两种：


    - 一、基于道德感，害怕被抓去判刑与“强夺而获得”之间的挣扎冲突，最后终于放弃了。

    - 二、被“饥寒起盗心”的强大欲念所蒙蔽，终于下决心；悄悄接近那少妇，抢了皮包就拔腿飞奔，逃之夭夭。


    当然，这时是前五识不停地在输入资讯（前五识不会判别是非善恶，只是忠实地把资讯全数传给第六识的“意识”），由“意识”去决定那些资讯是有意义，那些是没有意义的，最后由“意识”、“末那识”及“阿赖耶识”共同的运作下，决定“下手抢劫”，当然在动作上，前五识也不是没有作用的，在接到“下手抢劫”的命令之后，眼睛的视觉一面要“看准”皮包的位置，还要注意四周的“风吹草动”，是否会突然出现警察或路人？


    耳朵也要“听”附近有没有警车的声音或走近的脚步声。


    脚的触觉会告诉抢劫者：脚步会不会太用力，造成声音而使被害的少妇有所警觉？


    手的“触觉”在动手的一刹那，也会传来“抓到皮包了！”“抓紧了！”、“拉扯”等等的讯息。


    当然这些由五识传来的资讯是整体的“协同动作”，不是各自独立不相关的。


    于是，由这个例子，我们可以看到“业因”是如何进入，又如何被下令传出来而造成“业果”的。


    当然，这名歹徒可能在得手之后而逍遥法外，也可能很快就被警察抓到了，但这不是此处要探讨的重点，在此我们要探讨的只是“八识”的作用。


    也由此可以看出，这“八识”其实都只是暂时性的假相，连“阿赖耶识”也不是生命或心的本体（实相），如果我们将之代换成对等的名词“灵魂”时，那么在佛教的观点上，这个灵魂也是不究竟的，更不可能永久不灭了，因为佛教否定第八识，也等于否定了“灵魂”，认为只有否定了“由烦恼无明接连而假现的第八识”之后，才是彻底的解脱。


    但是，到此可能有很多人会以为如果根本否定了“灵魂不灭”，甚至否定了“灵魂”那岂不是正好跟唯物论者所主张的：“人死之后一切化为乌有，灵魂是不存在的”一样了？


    其实并非如此，而且完全不同；在佛教的观点中，“八识”之外并非完全没有了，还有一个“阿摩罗识”（“无垢识”或第九识），这个阿摩罗识”才是“真如”、“真心”是心与生命的根本实相。


    “真如”的意思就是“真实如此”、恒常如此、不变不异、不生不灭、不增不减、不垢不净，就是“无为法”，是所有众生的自性清净心，也就是“佛性”。


    但是，“真如”如果不守自性（动念），一念无明，就会造成万种“妄法虚相”，所以又有“不变真如”和“随缘真如”之分。


    “不变真如”指的是动念后被一切“妄法虚相”包裹的生命实相。所以从佛教主张“众生皆有佛性”来看佛的意思是觉者，能觉悟而抛开外在一切“妄法虚相”，追求到最终生命实相“不变真如”的就是“佛”。而执迷于缘起缘灭所生成的一切“妄法虚相”而认假为真的就是“众生”。


    在此已进入了“入宝”的阶段。


    因而，如果我们从“名词”上着眼，以一般的认知；提到“灵魂”这一名词，表示所指的是“不变真如”（生命实相）的本身或者是包裹了一切妄法虚相的“承缘真如”（其中仍有“不变真如”），那么，“灵魂不灭”的主张或说法是正确。


    举例来说：


    “蛋”指的是蛋壳和其中蛋黄蛋白的内容物。如果有人说“我想吃蛋”或“我早上吃了一个蛋”，那么任何人都一定知道他指的是“吃蛋壳里的内容物 (蛋黄及蛋白)”，而绝不可能是连蛋壳一起吃下去，因为蛋壳是要被抛弃不吃的部份。


    那么有壳的，也有蛋黄蛋白的我们称之为“蛋”。


    去掉壳打在碗里生的蛋黄蛋白或已经去掉壳煮熟煎熟的，我们仍然称之为蛋。


    因此，“灵魂”也一样，被“妄法虚相”(相当于壳)包裹的“不变真如”(相当于蛋黄蛋白)我们可统称为“灵魂”。


    我们也可把“不变真如”(相当于去壳之后的蛋黄蛋白)也称之为“灵魂”。


    这是一般的人看法，大家习惯于那种“统称”，其实我们应该很明确地知道一般社会大众在提到“灵魂”这个名词时的真正含意，事实上已包含了“不变真如”(生命实相)在内，所以一般人所说的“灵魂不灭”，严格来说也并没有错。


    但是，有许多佛教界人士，特别是不少大师级的人物，他们由于深知佛法精深的个中三昧，所以把“灵魂”这个名词专指那个“妄法虚相”或“八识”(蛋壳)，认为那是不究竟的，是最终总要抛弃的。他们只承认“不变真如”才是不生不灭的，才是根本究竟的生命实相。


    所以他们才会否定“灵魂不灭”，但是他们当然也没有错。


    当然，在与一般的见解相较之下，其实完全只是“名词”及“定义”上的问题，所以如果从佛教的观点来看一般人“灵魂不灭”的见解，比较周延而包容的，应该只是认为名词定义上的易于混淆，而不是执着于名词上的差异而坚决地予以否定，否则只怕是弊多于利。


    # 第十五章 生命的层级


    # 灵界导游


    在探究到高等灵学的西方“神智学派”与东方佛的观点也大同小异，认为“灵魂”只是一个暂时性的壳，最终根本的只是“生命的实相”，他们认为无论物质界阳世的肉体，灵界层面的“灵体”（仍含着少量灵界的物质）都是暂时性的，在晋入“觉悟层面”时都会被抛弃的。


    有些佛教界的大师否定“灵魂不灭”或嘲笑世欲“三魂七魄”的说法，其实这并没什么可笑的。


    在“三魂七魄”的说法中，其实和佛教的说法除了名词上的不同，本义上却是对等的“三魂”中的“无神”（或“主魂”）指的正是“不变真如”“识魂”（或“觉魂”）指的正是“八识”。


    有些佛教人士认为众生死后只留下“真如”及第八识的“阿赖耶识”，这点在笔者的研究及认知上是不能同意的；因为人的前五识在活着的时候固然依附于五种肉体器官（眼、耳、鼻、舌、身）来作用“意识”则依附于大脑来作用。但于死后并没有消失，否则中阴身界的“灵”为何同样有“视、听、嗅、尝、触”的感觉及“思考”能力呢。所以笔者认为一般众生在死后的“中阴身”依然有着和生前一样被“八识”包裹的“真如”（就是一般俗称的二魂），和活人相比，他们只少了肉体和“以太体”而已。（注：这只是从功能并没有消失的论点上来谈，并不意味着笔者主张灵体有五官及大脑的实体。）


    也因此，“灵魂不灭”的说法并没有错。


    认为“灵魂会灭”的说法也没有错全要看在何种定义下来谈，也要看跟什么样的人来谈，编者认为为了避免困扰，混淆无谓的争论，“灵魂会灭”最好是针对“入室”者关起门来谈。而大多数时候面对绝大多数社会大众时，最好还是主张“灵魂不灭”较好。


    但是，千万要注意“灵魂会灭”绝不等唯物论的“没有灵魂”！


    # 第十六章


    # 游历地狱和天堂


    关于“三界”与“六道”，这只是划分方法的不同，实际上所指的范围是完全相同的：


    “三界”：


    欲界：人道、阿修罗道、畜牲道、饿鬼道、地狱道、天道（六天）


    色界：十八天


    无色界：四天


    “六道”：


    人道、阿修罗道、畜牲道、饿鬼道、地狱道、天道（含欲界六天、色界十八天、无色界四天）


    佛教对于有关“三界”的种种界说：


    “三界”：


    欲界：是有食欲、性欲众生所住的世界，上从六欲天，阿修罗道，中自人畜所居的四大洲，下至饿鬼道、地狱皆属之。


    色界：是没有食欲、性欲但还有色相的众生所住的世界，四禅十八天皆属之。


    无色界：是色相俱无，只有心识住于深妙禅定的众生所住的世界，四空天属之。而这三界都是凡夫生死往来的境界，所以佛教行者是以跳出三界为目的。


    “三界八苦”：生活在三界之中的众生都共同有着八种痛苦：生苦、老苦、病苦、死苦、爱别离苦、怨憎会苦、求不得苦、五阴炽盛苦。


    “三界火宅”：三界之中充满了悲苦，生生死死。轮回不已，众生住在其中就好像住在一幢着火的房子里一样。


    “三界唯一心”：三界中一切境界和事物其实都是由我们自己的心所造的迷离幻境而已。


    现在，我们先从六道中的“天道”逐项往下说：


    一、欲界六天：


    1. 四天王天：由持国天王、广目天王、增长天王、多闻天王等分别职掌的东南西北四天。

    2. 忉利天：又细分成三十三天，中间为喜见天，其他东南西北各有八天。

    3. 焰摩天。

    4. 兜率天：又分内院、外院，外院是所有天人所居之处，有着各种酒、色、财、气的享乐，很多天人都因为着迷于此，不能精进，等福报享尽，甚至直接坠入畜牲、饿鬼、地狱等三恶道。内院是每位菩萨要成佛前暂住之处，现为弥勒菩萨所住，所以又称弥勤内院。

    5. 化乐天：这里的天人因为有着高超的变化能力，能变化出各种非常快乐的境界来供自己变享乐。

    6. 他化自在天：这里的天人可以变化许多的境界使别人，甚至来到世间迷惑世人沉迷于享乐，他们自己也以此为乐，所以被认为是有害追求正法精进的天魔。


    在欲界六天中的天人 (神)，还有三种好处：一是 “化生”，他们不需经过怀胎十月和生产的痛苦，而直接转生。二是 “自胜”：“凡是人身上所有一切鼻涕、痰、大小便、口水、精液、油垢等等，他们都没有，而且男的个个英俊挺拔，有潘安宋玉之美，玉树临风之姿。而女的则个个是国色天香，沉鱼落雁之美，这就是为什么会有
    “美如天仙” 的形容词了。三是 “衣食，思之自至”：不论任何锦衣玉食，意念才起，东西已现在眼前，可以尽情享用。连宫殿楼台也一样，与中阴界最上层相比，此处天人根本连
    “创作” 都不必，也不需要具备这种特殊才能，人人都可得到最好的物质享受。


    在性欲方面，欲界六天更是性爱的天堂，这里几乎没有任何婚姻、法律、情欲等等的束缚，只要郎有情、妹有意，就可立即去云雨巫山一番。


    欲界六天中性爱的方式不一，越往上层方式越简单，但所得到的快感越强： “四天王” 和 “忉利天” 的男女天人的性交方式和人间一样，只是不射精。


    “舍摩天” 的男女天人只是搂搂抱抱，就可得到超过前两层天的性爱快乐。


    “兜率天” 的男女天人只需牵着手，又比 “舍摩天” 搂抱方式更快乐。


    “化乐天” 的男女天人只要相互一笑，就又比前四层天更快乐。


    “他化自在天”的男女天人有性欲时，只是互望一眼就行了，同样也是欲界六天中性爱最快乐的一层，当然也是天上、人间、地下性爱最快乐的一层，因为再上去的色界，无色界、涅槃界都没有这种男女之欲了。


    而“化乐天”、“他化自在天”这种不实际接触就可满足性欲的方式正是最高境界的“意淫”。


    二、色界十八天：


    “色”就是形想的意思，到了“色界”已经没有食欲、性欲和物欲的需求，但这里的天人欲仍执着于精妙美好的外在形象。


    1. 初禅天：梵众天、梵辅天、大梵天

    2. 二禅天：少光天、无量光天、光音天

    3. 三禅天：少净天、无量净天、遍净天

    4. 四禅天：无云天、福生天、广果天、无想天、无烦天、无热天、善见天、善现天、色究竟天


    三、无色界：


    到了“无色界”连形相也完全没有了，只剩下代表意识能量的光，如果不显现时，一般人、神、鬼都无法看见，只有住此高层的佛、菩萨、罗汉可以看见。共有四天：


    1. 空无边外天

    2. 识无边外天

    3. 无所有处天

    4. 非想非非想处天


    不论是“欲界六天”、“色界十八天”、“无色界四天”，从渺小的人类来讲，对那些天界快乐的生活可真是无知的紧，但是，众佛、菩萨、罗汉阶层来看，天界和人间其实是一样的，而且其未来可能更糟。为什么呢？


    因为福报或修行才能超生天界，但福报不是永恒的，所有天人也不可能永远在天界快乐逍遥，一旦福报享尽，又要重新去轮回，而且天人也一样会死。


    欲界天神将死时，会出现“天人五衰”的现象：


    1. 衣裳变得油腻肮脏。

    2. 每位天人头上都有的那朵花会开始枯萎。

    3. 身体发出臭味

    4. 腋下开始流汗。

    5. 心中生出无明的烦恼而坐立不安。


    欲界天人也有夫妻、子女等等的亲人，可是一旦出现“天人五衰”的现象时，这些亲人不但不感到难过，反而会生苦恼，不再觉得色界是快乐之处。“无色界”天神将死之前，身体就好像被万箭穿心一样地非常痛苦。


    其实这三界的天人（神）并非没有精进而跳出三界之外，成为罗汉、菩萨及佛的。但由于这三界的天界实在太快乐了，所以只愿意沉迷于逸乐，而忘了继续修持，也因而最后福报享尽，一样要再附入轮回，而且大多附入畜牲、饿鬼、地狱三恶道去受苦，比人还惨。


    “阿修罗”又称为“非天”、“无端”或“无酒”，因而这道所享的福报和欲界六天一样，也是同等的快乐，但是他们不像天神一样修德，反而爱好争战，所以称为非天。而且这里男性极端丑陋，所以称为“无端”，加上任何酒都无法酿成，所以又称“无酒”。


    “阿修罗道”的众生大多居住在须弥山的洞窟之中，或海边，或住在海底，一样有着华丽的宫殿屋宇，这道中男性出奇丑陋，但女性却相反的出奇娇美妖艳，几乎比天道的美女更有过之而无不及，而阿修罗道虽有美食却不及天道的可口，加上无酒，所以和天道众神常常发生争战，一边是为了得到美酒佳丽，一边却是为了得到美女。


    能转生阿修罗道是因为生前有大善行的，但却又充满了争斗愤恨之心（瞋）、骄傲自大（慢）、多疑，所以才会转生此处。


    会转生为阴差鬼卒，是指没有特殊善行的。如有善行但嫉恶如仇、忌心太重、缺乏慈悲心的则会生阿修罗道。


    由于阿修罗道的争斗好战，所以也很擅长发明各种武器，编者曾听过不少修行很高的大师说，现今世上许多擅于发明制造杀人武器的顶尖人物，有不少是由阿修罗道转世而来。


    如果转世“阿修罗道”，只愿着满足贪欲，而且贪心不止，争战不休，其未来福报享尽，再入轮回时，下场会比天道更可悲。


    接着是“人道”及“畜生道”，由于是我们所熟悉并能实际接触到的，所以不再赘述而略过。


    再谈的是“饿鬼道”：


    “饿鬼道”的所在，是和中阴界最下层“黑暗世界”接壤，但也附会出入阳世，依附在石头，大树或一些阴庙邪坛之中，贪食祭品。


    一、无财鬼：


    （一）炬口鬼：不但自己的口中时常喷出火焰，任何食物一到口中立即化成炭火或焦臭之物，因此完全不能吃东西。


    （二）针喉鬼：肚子很大，像一个大球，但是咽喉却细得像针孔一般，所以只能吃到很少一点点的食物，而永远喂不饱他的大肚子。


    （三）臭口鬼：任何美味可口的食物，一入口就变得腐臭不堪，难以下咽。


    二、少财鬼：


    （一）针毛鬼：全身长满了像钢针一样的长刺，随便移动一下身体就会刺到自己而疼痛不堪。


    （二）臭毛鬼：和针毛鬼一样，但更加恶臭。


    （三）大瘿鬼：咽喉之下垂了一团藏着脓血的大瘤，因为饿得受不了，就啃吃自己之团大瘤来果腹，被吃掉的部份又立刻会长出来。


    三、多财鬼：


    （一）得弃鬼：常常捡拾人间祭祀后的食物。


    （二）得失鬼：常常捡拾人间吃剩的残渣饭水而食。


    （三）得势鬼：有些成为夜叉、罗刹，也有的就在阳世人间依附石头、大树、阴庙邪坛贪求祭品而食。


    在佛教中有一种“放焰口”的仪式，就是普遍施食给这些饿鬼吃，在“目莲救母”的民间故事中，目莲（目犍连）的母亲死后就是落入饿鬼道，成了“炬口鬼”。


    什么样的人死后会落入饿鬼道呢？


    不外一个“贪”字。


    什么叫“贪”呢？一般人除了正当职业，又去做个副业，赚点外快，算不算贪呢？一位家庭主妇把几万的私房钱去买几张股票，希望股价上涨能赚点钱算不算贪呢？


    事实上，在正常的运作下，世上的财富物资供应给所有人类用以维持生命，过一个中等的生活是绝对足够的，但是因为人类的贪念，以弱肉强食的方法来竞争，以至造成了贫富悬殊。


    贪的正确意思是超过所需仍不知厌足之谓。


    在一个社会普遍的标准下，维持中等的生活所需是合理的，但已经拥有仍不停追求物质上的满足或者甚至到了后来只是在追求财富（银行存款数字）的堆积时，那就是贪了。因为有人拥有超过所需的财富物资时，就一定有人会不足，甚至挨饿受冻以至死亡。


    最可怕的是那种富可敌国仍然不知厌足而拼命 以各种方法，大肆聚敛的，而且这种人又往往是异常悭啬，真是拔一毛利天下也不肯为。


    世界上这类的人相当多，即使他们已经拥有千、百世都花用不尽的财富，但是他们仍然不满足，一生最大的乐趣就是看着财富的堆积或只是银行存款的抽象数字增加。


    也许有些人会认为那是他的赚钱本事，或者认为这种人天生命好，或认为那是他前世积了德所以有此福报。


    其实都是错误的，因为财富只是一个工具，不论多或少，都是藉以考验一个人处理的方式的，而且如果一个社会中贫富悬殊的情形严重到“朱门酒肉臭，路有冻死骨”时，这个社会已经出了大问题，而且也绝不是某些人赚钱的本事特别高，其中必定有着诈欺、巧取豪夺，甚至杀人不见血的行为，越发达的国家，这种行为的层级越高，而且会形成集团性或普遍层级性，现代的名词叫做“官商勾结”。


    偶尔也可看到某些这类的富豪，会在各种义卖会中“慷慨解囊”地花一百万买件不值钱的东西，有些人认为这就叫“善行”了，事实上这一百万用来打广告或美化企业的形象，绝对是物超所值的如意算盘，举例来说：


    国外某些超级大富豪，其拥有的财富单单每天的利息收入就高达五、六千万，那么隔个一、二年才捐个一百万，不过日收入的五十分之一而已，正如同一个月入二、三万的薪水阶级隔个一、二年才奉献个十元、二十元。如果再因为这种美化的手法收到成效，促使他因而赚到更多的钱，那不仅不是善，反而是恶了。


    轮回是慈悲的，不会罚人去受苦，但是这种贪欲的积习却会在他死后牵引他去投入一个适合的身体，想想看什么样的身体最适合呢？


    尖口大肚的“针口鬼”不是最适合的吗？他事实上只能吃进一点点的物资（财富），却有着永不厌足的胃口和永远填不满的大肚子，这样的意念及贪欲当然会在未来给自己这样一个特征的身体与处境。


    “浪费”也是附入饿鬼道的原因之一，汉朝的邓通因为得到皇帝的宠爱，特准他可以拥有铜山并自行铸造钱币，他因暴富而生活奢靡到了难以想像的地步，甚至日食万钱却还嫌无处下筷子，最后竟终于饿死，可算是活着就入了饿鬼道。


    古罗马帝国最强盛富庶的时代，贵族们终日歌舞升平，酒池肉林的贪求享乐，每个贵族人家的屋外都有一口大缸。那些男男女女美酒佳肴吃到撑不下去了，就到层外大缸那儿用手抠喉咙。把胃中的食物全吐出来，再进去继续吃，如此反复再三，吃了吐，吐完再吃，罗马帝国也终于很快就灭亡了。


    如果一生只知道追求自身的享乐不知厌足，却无视他人的存在，甚至好几世用不完的多余财富物资宁可自己白白浪费糟蹋掉，对他人的苦难却是冷血超然的，死后落入“饿鬼道”成了“大瘪鬼”自己吃自己不也是适得其所吗”


    世界上有资格去“饿鬼道”报到的行为太多，无法一一写'
  mdcn: '中经过，眼睛看到油亮金黄刚出炉的热面包，鼻子闻到了奶油和麦香，而将这个资讯，传给了第六“意识”，“意识”立即反应：一面从“阿赖耶识”中调出以往诸多有关食的资料来比对，发现这些面包是可以吃而且很可口又可以填饱肚子的，但在经验资料中，这家店所制作的红豆面包最合我们的口味（这同时，我们从口袋掏钱去买来吃，在吃的同时，舌头把味觉，牙齿把咬下去又热又软的触觉，鼻子把奶油及红豆的香味全传去给“意识”，意识这时不但要决定要吃几个，吃多快，还要去比对“阿赖耶识”中的原始资料，最后才能断定：“嗯！真好吃！跟以前的味道一模一样，正是我最喜欢的那种味道！”


    但是万一这家店前一天才换了做面包的师傅，这时透过舌头、牙齿、鼻子等传回去的资讯有异，“意识”将“阿赖耶识”中的原始资料一比对，可能就会立即反应：“味道不对了！面包硬了点，豆馅太甜了！”


    再举一例：


    一位失业很久，三餐不继的男子，深夜在银行外面提款机那儿看见一位少妇刚把几万大钞装进皮包中去，再一“看”正是月黑风高，四下无人之际，这时“意识”立即会把资讯传给“末那识”又藏进“阿赖耶识”，并且从“阿赖耶识”搬出种种的资料，再经过意识的重组及思考：


    - 一、肚子很饿，没钱吃饭，找不到工作，赚不到钱，下一餐不知怎么办？以后又该怎么办？

    - 二、非常需要钱。

    - 三、那少妇的皮包中有一堆钱。为什么她有我没有？

    - 四、用偷的方式没技术，那少妇只有单身一个人，用暴力去抢，应该很容易得手。

    - 五、这是不道德的，也是犯法的，万一被警察抓到怎么办？会不会被判死刑？

    - 六、现在夜深人静，附近没有其他人，再不下手没有机会了。

    - 七、抢完之后该往哪边跑才不容易被捉到？


    于是其结果可能有两种：


    - 一、基于道德感，害怕被抓去判刑与“强夺而获得”之间的挣扎冲突，最后终于放弃了。

    - 二、被“饥寒起盗心”的强大欲念所蒙蔽，终于下决心；悄悄接近那少妇，抢了皮包就拔腿飞奔，逃之夭夭。


    当然，这时是前五识不停地在输入资讯（前五识不会判别是非善恶，只是忠实地把资讯全数传给第六识的“意识”），由“意识”去决定那些资讯是有意义，那些是没有意义的，最后由“意识”、“末那识”及“阿赖耶识”共同的运作下，决定“下手抢劫”，当然在动作上，前五识也不是没有作用的，在接到“下手抢劫”的命令之后，眼睛的视觉一面要“看准”皮包的位置，还要注意四周的“风吹草动”，是否会突然出现警察或路人？


    耳朵也要“听”附近有没有警车的声音或走近的脚步声。


    脚的触觉会告诉抢劫者：脚步会不会太用力，造成声音而使被害的少妇有所警觉？


    手的“触觉”在动手的一刹那，也会传来“抓到皮包了！”“抓紧了！”、“拉扯”等等的讯息。


    当然这些由五识传来的资讯是整体的“协同动作”，不是各自独立不相关的。


    于是，由这个例子，我们可以看到“业因”是如何进入，又如何被下令传出来而造成“业果”的。


    当然，这名歹徒可能在得手之后而逍遥法外，也可能很快就被警察抓到了，但这不是此处要探讨的重点，在此我们要探讨的只是“八识”的作用。


    也由此可以看出，这“八识”其实都只是暂时性的假相，连“阿赖耶识”也不是生命或心的本体（实相），如果我们将之代换成对等的名词“灵魂”时，那么在佛教的观点上，这个灵魂也是不究竟的，更不可能永久不灭了，因为佛教否定第八识，也等于否定了“灵魂”，认为只有否定了“由烦恼无明接连而假现的第八识”之后，才是彻底的解脱。


    但是，到此可能有很多人会以为如果根本否定了“灵魂不灭”，甚至否定了“灵魂”那岂不是正好跟唯物论者所主张的：“人死之后一切化为乌有，灵魂是不存在的”一样了？


    其实并非如此，而且完全不同；在佛教的观点中，“八识”之外并非完全没有了，还有一个“阿摩罗识”（“无垢识”或第九识），这个阿摩罗识”才是“真如”、“真心”是心与生命的根本实相。


    “真如”的意思就是“真实如此”、恒常如此、不变不异、不生不灭、不增不减、不垢不净，就是“无为法”，是所有众生的自性清净心，也就是“佛性”。


    但是，“真如”如果不守自性（动念），一念无明，就会造成万种“妄法虚相”，所以又有“不变真如”和“随缘真如”之分。


    “不变真如”指的是动念后被一切“妄法虚相”包裹的生命实相。所以从佛教主张“众生皆有佛性”来看佛的意思是觉者，能觉悟而抛开外在一切“妄法虚相”，追求到最终生命实相“不变真如”的就是“佛”。而执迷于缘起缘灭所生成的一切“妄法虚相”而认假为真的就是“众生”。


    在此已进入了“入宝”的阶段。


    因而，如果我们从“名词”上着眼，以一般的认知；提到“灵魂”这一名词，表示所指的是“不变真如”（生命实相）的本身或者是包裹了一切妄法虚相的“承缘真如”（其中仍有“不变真如”），那么，“灵魂不灭”的主张或说法是正确。


    举例来说：


    “蛋”指的是蛋壳和其中蛋黄蛋白的内容物。如果有人说“我想吃蛋”或“我早上吃了一个蛋”，那么任何人都一定知道他指的是“吃蛋壳里的内容物 (蛋黄及蛋白)”，而绝不可能是连蛋壳一起吃下去，因为蛋壳是要被抛弃不吃的部份。


    那么有壳的，也有蛋黄蛋白的我们称之为“蛋”。


    去掉壳打在碗里生的蛋黄蛋白或已经去掉壳煮熟煎熟的，我们仍然称之为蛋。


    因此，“灵魂”也一样，被“妄法虚相”(相当于壳)包裹的“不变真如”(相当于蛋黄蛋白)我们可统称为“灵魂”。


    我们也可把“不变真如”(相当于去壳之后的蛋黄蛋白)也称之为“灵魂”。


    这是一般的人看法，大家习惯于那种“统称”，其实我们应该很明确地知道一般社会大众在提到“灵魂”这个名词时的真正含意，事实上已包含了“不变真如”(生命实相)在内，所以一般人所说的“灵魂不灭”，严格来说也并没有错。


    但是，有许多佛教界人士，特别是不少大师级的人物，他们由于深知佛法精深的个中三昧，所以把“灵魂”这个名词专指那个“妄法虚相”或“八识”(蛋壳)，认为那是不究竟的，是最终总要抛弃的。他们只承认“不变真如”才是不生不灭的，才是根本究竟的生命实相。


    所以他们才会否定“灵魂不灭”，但是他们当然也没有错。


    当然，在与一般的见解相较之下，其实完全只是“名词”及“定义”上的问题，所以如果从佛教的观点来看一般人“灵魂不灭”的见解，比较周延而包容的，应该只是认为名词定义上的易于混淆，而不是执着于名词上的差异而坚决地予以否定，否则只怕是弊多于利。


    # 第十五章 生命的层级


    # 灵界导游


    在探究到高等灵学的西方“神智学派”与东方佛的观点也大同小异，认为“灵魂”只是一个暂时性的壳，最终根本的只是“生命的实相”，他们认为无论物质界阳世的肉体，灵界层面的“灵体”（仍含着少量灵界的物质）都是暂时性的，在晋入“觉悟层面”时都会被抛弃的。


    有些佛教界的大师否定“灵魂不灭”或嘲笑世欲“三魂七魄”的说法，其实这并没什么可笑的。


    在“三魂七魄”的说法中，其实和佛教的说法除了名词上的不同，本义上却是对等的“三魂”中的“无神”（或“主魂”）指的正是“不变真如”“识魂”（或“觉魂”）指的正是“八识”。


    有些佛教人士认为众生死后只留下“真如”及第八识的“阿赖耶识”，这点在笔者的研究及认知上是不能同意的；因为人的前五识在活着的时候固然依附于五种肉体器官（眼、耳、鼻、舌、身）来作用“意识”则依附于大脑来作用。但于死后并没有消失，否则中阴身界的“灵”为何同样有“视、听、嗅、尝、触”的感觉及“思考”能力呢。所以笔者认为一般众生在死后的“中阴身”依然有着和生前一样被“八识”包裹的“真如”（就是一般俗称的二魂），和活人相比，他们只少了肉体和“以太体”而已。（注：这只是从功能并没有消失的论点上来谈，并不意味着笔者主张灵体有五官及大脑的实体。）


    也因此，“灵魂不灭”的说法并没有错。


    认为“灵魂会灭”的说法也没有错全要看在何种定义下来谈，也要看跟什么样的人来谈，编者认为为了避免困扰，混淆无谓的争论，“灵魂会灭”最好是针对“入室”者关起门来谈。而大多数时候面对绝大多数社会大众时，最好还是主张“灵魂不灭”较好。


    但是，千万要注意“灵魂会灭”绝不等唯物论的“没有灵魂”！


    # 第十六章


    # 游历地狱和天堂


    关于“三界”与“六道”，这只是划分方法的不同，实际上所指的范围是完全相同的：


    “三界”：


    欲界：人道、阿修罗道、畜牲道、饿鬼道、地狱道、天道（六天）


    色界：十八天


    无色界：四天


    “六道”：


    人道、阿修罗道、畜牲道、饿鬼道、地狱道、天道（含欲界六天、色界十八天、无色界四天）


    佛教对于有关“三界”的种种界说：


    “三界”：


    欲界：是有食欲、性欲众生所住的世界，上从六欲天，阿修罗道，中自人畜所居的四大洲，下至饿鬼道、地狱皆属之。


    色界：是没有食欲、性欲但还有色相的众生所住的世界，四禅十八天皆属之。


    无色界：是色相俱无，只有心识住于深妙禅定的众生所住的世界，四空天属之。而这三界都是凡夫生死往来的境界，所以佛教行者是以跳出三界为目的。


    “三界八苦”：生活在三界之中的众生都共同有着八种痛苦：生苦、老苦、病苦、死苦、爱别离苦、怨憎会苦、求不得苦、五阴炽盛苦。


    “三界火宅”：三界之中充满了悲苦，生生死死。轮回不已，众生住在其中就好像住在一幢着火的房子里一样。


    “三界唯一心”：三界中一切境界和事物其实都是由我们自己的心所造的迷离幻境而已。


    现在，我们先从六道中的“天道”逐项往下说：


    一、欲界六天：


    1. 四天王天：由持国天王、广目天王、增长天王、多闻天王等分别职掌的东南西北四天。

    2. 忉利天：又细分成三十三天，中间为喜见天，其他东南西北各有八天。

    3. 焰摩天。

    4. 兜率天：又分内院、外院，外院是所有天人所居之处，有着各种酒、色、财、气的享乐，很多天人都因为着迷于此，不能精进，等福报享尽，甚至直接坠入畜牲、饿鬼、地狱等三恶道。内院是每位菩萨要成佛前暂住之处，现为弥勒菩萨所住，所以又称弥勤内院。

    5. 化乐天：这里的天人因为有着高超的变化能力，能变化出各种非常快乐的境界来供自己变享乐。

    6. 他化自在天：这里的天人可以变化许多的境界使别人，甚至来到世间迷惑世人沉迷于享乐，他们自己也以此为乐，所以被认为是有害追求正法精进的天魔。


