    乘机予以自然分离。然后，一步步先安置好郝嘟嘟的，接着安置阿强的。可是没多久，阿强的又忽然出窍，还来不及阻挡，却又钻进郝嘟嘟心窝，和她的灵魂难舍难分依附一起；何等可爱的两个灵魂啊！如此反复多次，已累得我满脸满头是汗。


    这期间，郝嘟嘟的反应倒还平和，只有轻微的摇晃，冷阿强却一次比一次强烈，到最后忽然从座椅上弹起来，必须他双亲合力按压，才稳得住身子。担心他支撑不住，虽然在功未成，仍然替他们收了功，让他们回复原来的清醒。


    经过近三个小时折腾，情况有少许改善。他们的目光已能互相吸引，而且，精神状态了前好多了。


    我叮咛两家大人人严密守护，尽量让他们睡觉休息。明天同一时段继续调理。


    每天的进展是因他们的配合度愈来愈高，导引灵魂出窍遨游所费的念力愈来愈小。而且安置好的灵魂，安分守己的时间愈来愈长。由于年轻，活力稚弱，我不敢妄施猛力，一旦封死，会影响终生的智力与健康。


    熬到第六天，我已筋疲力竭。冷太太做了许多补品给我吃，殊不知我所扣耗的并非一般体力，我只有用长时间的静坐调息，来补充虚弱的元气。


    没料到灵魂归窍如此费功夫！


    第七天调理前，我不得不发出求助的讯号，光凭我一个人的能耐，不知耗到哪天？


    果然，有了感应。于是，我要求双方家长到隔壁房回避，我告诉他们这是关键的一刻。


    很快就使面对面坐在一块的两个人进入半睡半醒的恍惚的状态，正待导引两个纠缠一起的灵魂出窍，耳畔飘起个令人振奋不已的熟悉声音。


    “像这样是很难成功的，要分开至少三尺，我会助你一臂之力。”


    顿首谢过，立即将阿强摇晃的身子连同椅子往后退了五步。随即我发功导引出灵魂，不费吹灰之力，就分别安置在各人体内。而我自己，也觉出股暖流，透彻全身，片刻间恢复了元气。


    收功之后，我恭恭敬敬朝向远去的声音拜了三拜。


    我把双方家长请了进来。“现在已经没事了，等他们睡醒，便一切恢复正常。不过，这段时间，不能再刺激他们。他们还很脆弱——我是指精神上的脆弱。”


    “谢谢啊!”冷太太喜极而泣，一矮身子想叩头，被我用力挽住。


    郝太太也十分激动，一直打躬作揖。


    “用不着这样，用不着这样。”我说，“看到你们两家这段时间的合作情形，令我非常高兴!今后，做个好朋友吧!”


    “有缘分结为亲家吗?”郝先生说。显然受到这几个晚上亲眼目睹的感到，居然毫不避讳地抢先提出来。


    我无奈地笑着摇头。“我查过啦，没有夫妇缘分，让他们也成好朋友吧。”


    “那……他们以前……”冷先生十分不解地吞吞吐吐。


    叹口气，我扫了大家一眼。“事实是你们反应过度，原本也只是好一阵子而已。年轻人的恋爱，哪能当真?”


    “要如何谢你?真的!”郝先生握着我的手。


    冷先生也表达了相同的意思。


    “好好照顾你们的女儿、儿子，别太……”


    “知道，我们知道。”郝先生感慨地说：“经过这次教训，我不会再愚蠢啦。”


    连夜赶回德阳，在车上享受了一个又香又甜的睡眠。


    两天后接到冷太太打来的电话。


    “感谢你啊，老师，阿强、嘟嘟都好啦。我先生假期也完了，明天回林里工作。这一次要带我们上山玩几天，嘟嘟也去。本来也邀请郝先生夫妇一道去的，后来因为有事，走不开，只让嘟嘟跟我们去。这一切都得感谢你啊，郝先生也说了，等下山再到德阳去谢你。”


    放下电话，高兴老半天才平复过来。我深深为这两家祝福。


    ## 第二十三章 灵学的回顾与展望


    广义而言，自从远古人类第一次意识到“我是谁？”这个问题开始，灵魂学的研究即已产生，因为伴随着这个问题而来的，必然是：


    我从何处而来？


    死后又将往何方？


    当然，当时能够或有权力解释的必然也只有萨满（部落族群中的巫师），虽然他们的解释可能是如此的幼稚、如此的原始而不够周延，甚至只是出于其个人的想像。不过这都无关紧要，因为即使时至今日，对于死后生命的是否存在？死后生命的生活型态如何？也依旧在各说各话、争论不休，甚至可说一如史前时代的浑沌，特别是在所谓实证对这方面的研究成果上我们所知道的实在不比远古人类多出多少。


    但是，只要有这样的问题提出来，不论解释为何，也不管上万年来的争论人死后与草木同朽，一切归于虚无的唯物科学家，必定也是经过认真的思考之后才会做出结论。


    也正因为从远古时代开始, 这种问题的惯由部落族群中最有学问的萨满阶层来解惑释疑, 因此灵魂学方面的问题或研究也就一直和宗教结下了不可分的关系, 甚至互为表里,
    更甚至“灵魂不灭” 的观念成了原始宗教雏型一一祖先灵崇拜的根源。


    社”创立之后，许多当时炙手可热，名重士林的名家均纷纷加入，一时冠盖云集，热闹非凡，最著名的除了希久伟本人，其夫人爱琳尔（剑桥能安大学的第二任校长）、还有物理学家威廉·克罗克爵士、约翰·J·汤生爵士、奥立佛·罗迪爵士、威廉巴瑞屈三世及四世男爵及思想家黑黎贝生、费害南希雷、LP杰克、汉斯德里希、CD蒲罗。心理学家有弗洛伊德、美国的威廉詹姆斯、威廉杜葛、瓦特富兰克林、C约翰·卡德尔慕夫。


    其他名人还有英国两任首相葛拉德斯顿及巴尔福爵士、爱尔兰总督葛拉德、诺贝尔医学奖得主理查·查尔斯、国尔斯、国际盟约起节人慕拉吉贝特、居里夫人、英国天文学会会长F.JM史查顿、天文学家卡密尔富兰马连、发现海王星的天文学家库奇亚当斯、大文豪西尼生、“爱丽丝漫游仙境”的作者杜治生、化学家克鲁斯爵士，还有比达尔文更早提出进化论的自然科学家华勒斯、牛津大学校长E.D杜德斯、剑桥能安大学校长亨利史垂克等等。


    当时的学者对这样一个几乎是“学术名流俱乐部”的灵学研究社无不十分尊崇，并且一致认定灵学的研究绝不是低俗落伍的迷信。


    事实上，直到今天，世界上也罕见这样一个能将各类别研究上属于国际知名的学者专家全部济济一堂的学会组织，也着实证明了灵学研究从十九世纪末就扮演了一个与唯物科学相抗衡的重要角色，虽然今天唯物科学及实证科学仍是科学界的主流派，但另辟蹊径的玄学、哲学、灵学的研究者中仍不乏当代知名的尖端科学家。这种情形在发展中国家及东亚各国越是常见，一些留学欧美学唯物科学的年轻学子，由于缺乏人文科学的素养，除了迷信唯物科学是世上唯一的万灵丹，往往以为自己那一丁点薄弱的皮毛科学知识就足以解释宇宙间所有的现象。相信他们如果有幸读到十九世纪这张“灵学研究社”的部份会员名单，大概也会为自己“米粒之珠也敢放光”的心态大感汗颜吧!


    由于英国“灵学研究社”的成立在当时的国际上是一件相当轰动的大事,世界各地的有识之士无不跃跃欲试,紧接着,此研究社先于美国纽约成立分社,一直延纽到一八八五年,纽约分社独立,改为美国灵学研究社,同样采开放式准许各国人士参加,因此会员与日俱增,社内的藏书及参考资料也日渐丰富,不让英国方面专美于前。


    在英美两国的前导之下,欧洲各国的灵学研究机构也在专家学者的积极参与之下纷纷设立;法国成立了“国际灵学研究所”,德国、瑞士、意大利、荷兰、挪威、丹麦、瑞典各国也相继成立了以科学、客观、超然的态度来研究灵魂学的机构——


    “超心理学研究社”。


    在著作方面:


    一八八六年,英国“灵学研究社”的创始人之一古尼教授出版了“生命之灵”上下两册、记载各种幽灵出现的报告,是历史上第一部灵魂学研究的巨著,迄今仍为灵学研究的常用工具书。


    一八九四年,英国“灵学研究社”根据社内长期对灵魂学的分析研究,出版了“幻觉调查”一书成为第二部灵魂学的著作。


    一九〇三年,麦尔斯总结了“灵学研究社”前二十年的研究,出版了“人格与肉体死亡后的生命”上下两册,是为灵魂学研究的第三部著作。


    除了团体研究,欧美各国也陆续成立了不少私人的灵魂学研究室,如英国的普里斯,美国的卡灵通等等。


    灵魂学研究起先一直是民间团体的性质,一直到一九二七年,著名的英国心理学家麦克道卡在美国克拉克大学以“将灵学纳入大学研究”为题做专题演讲时,受到美国杜克大学创办人费尔博士的赏识并聘请他到杜克大学主持心理学系并筹设超心理实验室,同时听到这场演讲的生物学者约瑟夫·莱因夫妇也深受感动,
    于是随即来到杜克大学向麦克道卡系主任要求支持他们进入杜克大学做“灵学”研究。于是在麦克道卡的推荐下, 莱因夫妇放弃了生物学的教学工作, 进入哈佛大学研究哲学及心理学,
    一年之后再回到杜克大学, 正式从事灵学及超心理学的研究, 莱因由于贡献良多, 被后人尊称为 “近代超心理学之父”。


    之后, 美国哥伦比亚大学正式成立了 “灵学系”, 史丹福大学成立了 “超心理学研究所”, 后者更因与美国国防部等国家机构的密切配合, 做有关 “心灵战争”
    的深入研究, 某些部份已被五角大楼列入极机密的档案, 因此使得史丹福大学在这方面研究的名气一时如日中天, 迄今仍保持领导地位。


    欧洲方面, 维也纳大学设立了正式的灵学课程, 而英国牛津、剑桥、伦敦三所大学准许以灵学题材做博士研究, 并颁给正式学位。迄今世界各地的著名大学纷纷设立了 “超心理学”
    的系所及课程, 正式纳入学习研究的系统中。


    在十九世纪末, 英国 “灵学研究社” 成立之初, 当时的成立宗旨是希望真正跳出宗教的桎梏, 纯粹藉由科学的方法——试验与观察去试图探索与了解那个 “看不见的世界”,
    并且做出客观的研究报告。


    在创始人之一麦尔斯的规划下, 将那个 “看不见的世界” 依现象的不同分为五大类:


    - ①心电感应

    - ②催眠术

    - ③灵媒

    - ④灵体附身

    - ⑤扶乩


    其中第一项的 “心电感应” 又可分为:


    A、“心电感应” 又称 “读心术”, 类似佛教的’他心通, 即可以直接读出对方的思想。


    B、“天眼通”：可用意念看见被密封在盒中的文字或物件。


    C、“念力”：以意念移动或改变物质（简称 PK）这三种能力，被莱因博士定名为“超感官知道”（简称 ESP）。


    其中第①、②项属于超心理学研究部份。


    第③、④、⑤项属于灵魂学研究部份。


    - ①人的肉体死亡后，是否有灵魂的存在？

    - ②灵魂是物质性的？或非物质性的？

    - ③灵魂的存在（生活）方式？

    - ④天堂、地狱或另一种死后的灵魂世界是否存在？

    - ⑤灵魂与人的生命及生、死的关系（即是否真的有轮回转世？）

    - ⑥鬼魂骚扰现象。

    - ⑦恶灵附体的研究及驱除。

    - ⑧灵魂的能力？


    一百年来，灵学（包括超心理学及灵魂学两大部门）的研究一直是西方人的天下，反而普遍相信“灵魂不灭、轮回转世”之说的东方人却一直让其归属于宗教之中，而仍未提出来单纯地作科学研究，甚至任何人试图去作研究，就会被冠以“怪力乱神、倡导迷信”的大帽子。


    然而在西方的灵学研究中，百年来，参与研究的学者专家极多，对“超心理学”部份已经有了长足的进步及丰硕的研究成果，但却也一致认定在“死后生命”（灵魂学）的研究上极难掌握，虽然大多数学者专家都认为“死后生命的是否存在”对我们每一个人都非常重要，但是遗憾的是，迄今为止我们仍不得不同意麦尔斯在一百年前所说：“有史以来从没有人经由科学方法解答出人类灵魂的是否存在，其能力及轮回等问题。”


    的确，一百年来，灵学的研究已完全偏重在“超心理学部份”，越来越人愿意去碰触“灵魂学”的研究，甚至“超心理学”也早已独立成一门学科，和早先的灵学已分道扬镳，划清界限。


    同样的，我们仍然必须承认“死后生命的是否存在”对每一个现存的活人都异常重要，只要能找到确切的解答证明灵魂的实存，证明轮回转世的实存，那么绝大多数的灵学问题甚至人生问题或一些神秘的鬼魂附身之谜必定可以迎刃而解。


    我们不得不感谢一百年前创立“灵学研究社”的先贤以及历来专家学者们的努力，但我们也不得不承认直到现今在科学对灵魂的研究上，我们和远古人类相比，也未必知道得更多。


    因此，灵学的未来是什么？


    是因为科技文明的持续进步，总有一天我们透过科学的方式，先进的精密仪器而侦察到灵魂与灵界的存在？一如巴斯德发明了显微镜而发现了细菌的存在？


    或者我们必须及早的发现那可能只是一条永远走不通的死胡同，我们必须赶紧另辟新径，从另外的方向来研究？


    编者不想也不能去预测什么，但是却也不愿去等待科技文明的进步；在下个世纪或数世纪之后的发明，万一其结果仍像今日一般地令人失望，那该怎么办呢？何况现世的生命如此短暂，对生命真义追求的欲望却是无穷的。是否我们应该放弃对仪器探索的期望与枯等，只是采用科学客观、系统的分析方法、以理智逻辑的认知，重新清理出那条荒烟蔓草中的古老途径，去探索灵魂与灵界的存在是否较好呢？


    > 曾有科学家悲观地认为：“以人的大脑去认知大脑全部的奥秘那是不可能的！”


    同样地，以人有限的物质性生命想要去了解无限的非物质性生命，那也是不可能的。正如同我们不可能用解剖刀及显微镜在人的肉体上找到“爱”存在与否的证据是一样的。


    或许未来我们可以找到可行的其他途径、但是在今天，编者却愿意以一切之努力，留下相关的纪录。'
  mdcn: '“那好，我们走。”


    过了两条街，弯进一个巷子，阿直远远地指着一扇紧闭着的绿色铁门。


    “就是那家。他们住在一楼，我不过去了。”


    掉头走了两步，阿直回转我叫住我：“你真会法术吗？”


    我笑笑，朝他挥挥手。谁会那骗人的玩艺儿?!


    按了两次门铃，才传出个年轻的声音。


    “谁?”


    “郝先生在家吗?”


    “你是谁?”


    稍一停顿：“我是郝嘟嘟的老师，找郝先生有点事。”


    门仍未开，却传出个高亢的声音：“爸，姊的老师。找你的。”


    一会儿，门开了。一位愁眉苦脸的中年男子挡在门前。


    “你是郝先生吧?”


    “嘟嘟休学很久了，你是她老师?”


    “她不舒服，可以到屋里谈吗?”


    打量我半天，才把我请到客厅。坐定之后，郝先生满怀狐疑地说：


    “你怎么知道嘟嘟不舒服的?”


    于是，我简单介绍了自己。没料到话甫说完，一直未露面的郝太太，忽然冲了出来，颤着声音说：“你能够救她吗？好端端的，忽然莫名其妙地发疯了啊!”


    我望着郝先生，肯定地点着头。


    “你就是专为这件事来的？”郝先生说。语气中充满不友善的敌意。


    “不错。专为你们嘟嘟而来的。”


    “捐款，添香油，做功德，这回要多少呢？”郝先生愤慨地毫


    ## 第二十二章 别信神棍们


    不容情。“这一套我受够了。”


    郝太太瞪着我，也开始有了防备。


    我淡然一笑，故作轻松地说：“为了嘟嘟，你们被骗走很多钱吗？”


    “很气人耶！”郝太太恨恨地说，“治好还无所谓，却一点效果都没有。居然不停地打电话来要胁，说什么犯了天怒，再不拿钱消灾，会闹出人命来；简直就是抢嘛！”


    “我们的确有几个钱，”郝先生动了肝火。“可是我们宁可送到孤儿院去，也不愿孝敬神棍。”


    “神棍是怎样知道你们嘟嘟病情的？”我低声说。


    夫妇俩互望一眼，哑口无言。


    “你们自己找上门去的，对吗？”


    “人家介绍的。”郝太太说：“我们也是……”


    “病急乱投医？”我摇头叹息。


    “你说你能治好嘟嘟的病，可以？”郝先生说：“多少钱无所谓，要等完全治好之后才能付给你。”


    “也得先谈个数目。”郝太太加了句。


    “我不收一毛钱。”我说，“我不是神棍，只求治好嘟嘟的病。”


    夫妇俩交换个眼神，郝先生说，“你开玩笑吧？哪有这种事？哦，你刚才说你不是嘟嘟学校的老师，你怎么认识我们嘟嘟？你怎么知道这里？”


    “郝先生，郝太太，我的确来得有些冒失，但请相信我，我是诚心要来治好你们嘟嘟的。算是缘分吧，你们一定得先相信我；否则，这一趟我是白跑啦。”


    “你讲的都是真话？”郝太太首先动了心。“真能治好，我们愿意把他当活神仙侍奉。”


    我瞄了郝先生一眼。“只要你们信，便一定可以治好。”


    考虑一下, 夫妇俩又互望一眼, 郝先生下了决心, “好吧,我们相信。你要如何着手?”


    这时候, 郝太太才忙着去泡茶。等她坐定了, 我整了整脸色, 说:


    “每个人都有个主宰精神的‘灵魂’在这儿,” 我比着心窝处, “它直接影响人体‘生物钟’——调控身体各部分分泌以及生理机能, 也会跑到额头处来。你们嘟嘟的病,
    就出在这座生物钟。”


    我喝口茶, 润润喉咙。夫妇俩屏着气, 听得很入神。


    “她灵魂被搅乱了, 一切脱了秩序, 所以疯疯癫癫、神志不清。不是一般药物治得好的。”


    “怎会被搅乱呢? 被脏东西冲到吗?” 郝先生说。


    “比冲到更严重,” 我望着两夫妇, 顿了很久, 认真地说, “她多了个灵魂。”


    “多了个灵魂?! ”郝太太大惊失色。


    “不错。她现在有两个纠缠不清灵魂, 弄得她身体秩序大乱。”


    “哦! 那另外一个灵魂是怎样来的呢?” 郝先生说。似乎听出些道理来了, 态度表情与先前判若两人。


    “这得从头说起——从我现在为什么会坐在你们这儿说起。”于是, 我把冷阿强的事原原本本说了出来。


    “怎会这样?” 郝先生说, “真没料到。”


    “我们也是为了嘟嘟好,” 郝太太说, “都还年轻嘛, 而且,那个叫阿强的, 人并不好, 爱惹是生非, 我们才不许他们来往的。”


    “一切都是天数, 注定了要有这场灾难。”我叹着气说。


    “幸好遇上你,” 郝太太说, “否则两个人都凄惨罗!”


    “是啊, 现在才完全弄明白。真不知该怎样谢你。”郝先生说。


    “明白就好办。”我说,“我来安排一下,明天就开始调理吧。”


    第二天晚上,在附近一家饭店套房,双方当事人及家长先后到齐后,我引导阿强、嘟嘟面对面促膝坐在一起,双方父母则各自坐于背后,以随时接应突发的异常状况。两个神志不清的年轻人走进套房的时候,都有些僵硬与迟疑。可是一见面,情绪松弛下来。不过,仍认不出对方就是自己魂牵梦萦的爱侣。


    我试着运功让两人双手相握,试了几遍才成功。这当儿,四目相对的呆滞眼神,开始互相探索、辨识、游移,比我估计的进展快。


    我到床头放出轻音乐,又调暗室内灯光。极力营造一种富于情调的舒适氛围。


    一切都准备好了,我开始先在阿强耳边发功。


    “放松,全身放松,跟着我的声音,慢慢放松,不要用力。对,现在你的体重,在不断减轻中,你已经可以在空中飘起来了。尽量让自己舒服,对,就是这样,现在在心里跟着我念下面这句话:“我是冷阿强,我是冷阿强,继续,很好,完全放松,一面放松一面念,就是这样,念……念……念……可以轻轻合上眼,对现在更舒服啦,对,念……念……念……”


    冷阿强顺利进入半睡半醒的恍惚的状态。非常顺利,比我预期的顺利多了。这是得力于他父母在场,大大加强了生物能接收频率,助了一臂之力。


    紧接着以同样方式导引郝嘟嘟进入半睡半醒的恍惚的状态。受到阿强以及我声波影响,几乎毫不费力就达成预期目标。


    个把小时后,时机成熟,详细交代过双方守护的家长,在距大家数公尺处我坐下入静,走进冥思世界。


    我把两个纠缠一起的灵魂导引出来,在空中盘旋遨游一阵,


    乘机予以自然分离。然后，一步步先安置好郝嘟嘟的，接着安置阿强的。可是没多久，阿强的又忽然出窍，还来不及阻挡，却又钻进郝嘟嘟心窝，和她的灵魂难舍难分依附一起；何等可爱的两个灵魂啊！如此反复多次，已累得我满脸满头是汗。


    这期间，郝嘟嘟的反应倒还平和，只有轻微的摇晃，冷阿强却一次比一次强烈，到最后忽然从座椅上弹起来，必须他双亲合力按压，才稳得住身子。担心他支撑不住，虽然在功未成，仍然替他们收了功，让他们回复原来的清醒。


    经过近三个小时折腾，情况有少许改善。他们的目光已能互相吸引，而且，精神状态了前好多了。


    我叮咛两家大人人严密守护，尽量让他们睡觉休息。明天同一时段继续调理。


    每天的进展是因他们的配合度愈来愈高，导引灵魂出窍遨游所费的念力愈来愈小。而且安置好的灵魂，安分守己的时间愈来愈长。由于年轻，活力稚弱，我不敢妄施猛力，一旦封死，会影响终生的智力与健康。


    熬到第六天，我已筋疲力竭。冷太太做了许多补品给我吃，殊不知我所扣耗的并非一般体力，我只有用长时间的静坐调息，来补充虚弱的元气。


    没料到灵魂归窍如此费功夫！


    第七天调理前，我不得不发出求助的讯号，光凭我一个人的能耐，不知耗到哪天？


    果然，有了感应。于是，我要求双方家长到隔壁房回避，我告诉他们这是关键的一刻。


    很快就使面对面坐在一块的两个人进入半睡半醒的恍惚的状态，正待导引两个纠缠一起的灵魂出窍，耳畔飘起个令人振奋不已的熟悉声音。


    “像这样是很难成功的，要分开至少三尺，我会助你一臂之力。”


    顿首谢过，立即将阿强摇晃的身子连同椅子往后退了五步。随即我发功导引出灵魂，不费吹灰之力，就分别安置在各人体内。而我自己，也觉出股暖流，透彻全身，片刻间恢复了元气。


    收功之后，我恭恭敬敬朝向远去的声音拜了三拜。


    我把双方家长请了进来。“现在已经没事了，等他们睡醒，便一切恢复正常。不过，这段时间，不能再刺激他们。他们还很脆弱——我是指精神上的脆弱。”


    “谢谢啊!”冷太太喜极而泣，一矮身子想叩头，被我用力挽住。


    郝太太也十分激动，一直打躬作揖。


    “用不着这样，用不着这样。”我说，“看到你们两家这段时间的合作情形，令我非常高兴!今后，做个好朋友吧!”


    “有缘分结为亲家吗?”郝先生说。显然受到这几个晚上亲眼目睹的感到，居然毫不避讳地抢先提出来。


    我无奈地笑着摇头。“我查过啦，没有夫妇缘分，让他们也成好朋友吧。”


    “那……他们以前……”冷先生十分不解地吞吞吐吐。


    叹口气，我扫了大家一眼。“事实是你们反应过度，原本也只是好一阵子而已。年轻人的恋爱，哪能当真?”


    “要如何谢你?真的!”郝先生握着我的手。


    冷先生也表达了相同的意思。


    “好好照顾你们的女儿、儿子，别太……”


    “知道，我们知道。”郝先生感慨地说：“经过这次教训，我不会再愚蠢啦。”


    连夜赶回德阳，在车上享受了一个又香又甜的睡眠。


    两天后接到冷太太打来的电话。


    “感谢你啊，老师，阿强、嘟嘟都好啦。我先生假期也完了，明天回林里工作。这一次要带我们上山玩几天，嘟嘟也去。本来也邀请郝先生夫妇一道去的，后来因为有事，走不开，只让嘟嘟跟我们去。这一切都得感谢你啊，郝先生也说了，等下山再到德阳去谢你。”


    放下电话，高兴老半天才平复过来。我深深为这两家祝福。


    ## 第二十三章 灵学的回顾与展望


    广义而言，自从远古人类第一次意识到“我是谁？”这个问题开始，灵魂学的研究即已产生，因为伴随着这个问题而来的，必然是：


    我从何处而来？


    死后又将往何方？


    当然，当时能够或有权力解释的必然也只有萨满（部落族群中的巫师），虽然他们的解释可能是如此的幼稚、如此的原始而不够周延，甚至只是出于其个人的想像。不过这都无关紧要，因为即使时至今日，对于死后生命的是否存在？死后生命的生活型态如何？也依旧在各说各话、争论不休，甚至可说一如史前时代的浑沌，特别是在所谓实证对这方面的研究成果上我们所知道的实在不比远古人类多出多少。


    但是，只要有这样的问题提出来，不论解释为何，也不管上万年来的争论人死后与草木同朽，一切归于虚无的唯物科学家，必定也是经过认真的思考之后才会做出结论。


    也正因为从远古时代开始, 这种问题的惯由部落族群中最有学问的萨满阶层来解惑释疑, 因此灵魂学方面的问题或研究也就一直和宗教结下了不可分的关系, 甚至互为表里,
    更甚至“灵魂不灭” 的观念成了原始宗教雏型一一祖先灵崇拜的根源。


    社”创立之后，许多当时炙手可热，名重士林的名家均纷纷加入，一时冠盖云集，热闹非凡，最著名的除了希久伟本人，其夫人爱琳尔（剑桥能安大学的第二任校长）、还有物理学家威廉·克罗克爵士、约翰·J·汤生爵士、奥立佛·罗迪爵士、威廉巴瑞屈三世及四世男爵及思想家黑黎贝生、费害南希雷、LP杰克、汉斯德里希、CD蒲罗。心理学家有弗洛伊德、美国的威廉詹姆斯、威廉杜葛、瓦特富兰克林、C约翰·卡德尔慕夫。


    其他名人还有英国两任首相葛拉德斯顿及巴尔福爵士、爱尔兰总督葛拉德、诺贝尔医学奖得主理查·查尔斯、国尔斯、国际盟约起节人慕拉吉贝特、居里夫人、英国天文学会会长F.JM史查顿、天文学家卡密尔富兰马连、发现海王星的天文学家库奇亚当斯、大文豪西尼生、“爱丽丝漫游仙境”的作者杜治生、化学家克鲁斯爵士，还有比达尔文更早提出进化论的自然科学家华勒斯、牛津大学校长E.D杜德斯、剑桥能安大学校长亨利史垂克等等。


    当时的学者对这样一个几乎是“学术名流俱乐部”的灵学研究社无不十分尊崇，并且一致认定灵学的研究绝不是低俗落伍的迷信。


    事实上，直到今天，世界上也罕见这样一个能将各类别研究上属于国际知名的学者专家全部济济一堂的学会组织，也着实证明了灵学研究从十九世纪末就扮演了一个与唯物科学相抗衡的重要角色，虽然今天唯物科学及实证科学仍是科学界的主流派，但另辟蹊径的玄学、哲学、灵学的研究者中仍不乏当代知名的尖端科学家。这种情形在发展中国家及东亚各国越是常见，一些留学欧美学唯物科学的年轻学子，由于缺乏人文科学的素养，除了迷信唯物科学是世上唯一的万灵丹，往往以为自己那一丁点薄弱的皮毛科学知识就足以解释宇宙间所有的现象。相信他们如果有幸读到十九世纪这张“灵学研究社”的部份会员名单，大概也会为自己“米粒之珠也敢放光”的心态大感汗颜吧!


    由于英国“灵学研究社”的成立在当时的国际上是一件相当轰动的大事,世界各地的有识之士无不跃跃欲试,紧接着,此研究社先于美国纽约成立分社,一直延纽到一八八五年,纽约分社独立,改为美国灵学研究社,同样采开放式准许各国人士参加,因此会员与日俱增,社内的藏书及参考资料也日渐丰富,不让英国方面专美于前。


    在英美两国的前导之下,欧洲各国的灵学研究机构也在专家学者的积极参与之下纷纷设立;法国成立了“国际灵学研究所”,德国、瑞士、意大利、荷兰、挪威、丹麦、瑞典各国也相继成立了以科学、客观、超然的态度来研究灵魂学的机构——


    “超心理学研究社”。


    在著作方面:


    一八八六年,英国“灵学研究社”的创始人之一古尼教授出版了“生命之灵”上下两册、记载各种幽灵出现的报告,是历史上第一部灵魂学研究的巨著,迄今仍为灵学研究的常用工具书。


    一八九四年,英国“灵学研究社”根据社内长期对灵魂学的分析研究,出版了“幻觉调查”一书成为第二部灵魂学的著作。


    一九〇三年,麦尔斯总结了“灵学研究社”前二十年的研究,出版了“人格与肉体死亡后的生命”上下两册,是为灵魂学研究的第三部著作。


    除了团体研究,欧美各国也陆续成立了不少私人的灵魂学研究室,如英国的普里斯,美国的卡灵通等等。


    灵魂学研究起先一直是民间团体的性质,一直到一九二七年,著名的英国心理学家麦克道卡在美国克拉克大学以“将灵学纳入大学研究”为题做专题演讲时,受到美国杜克大学创办人费尔博士的赏识并聘请他到杜克大学主持心理学系并筹设超心理实验室,同时听到这场演讲的生物学者约瑟夫·莱因夫妇也深受感动,
    于是随即来到杜克大学向麦克道卡系主任要求支持他们进入杜克大学做“灵学”研究。于是在麦克道卡的推荐下, 莱因夫妇放弃了生物学的教学工作, 进入哈佛大学研究哲学及心理学,
    一年之后再回到杜克大学, 正式从事灵学及超心理学的研究, 莱因由于贡献良多, 被后人尊称为 “近代超心理学之父”。


    之后, 美国哥伦比亚大学正式成立了 “灵学系”, 史丹福大学成立了 “超心理学研究所”, 后者更因与美国国防部等国家机构的密切配合, 做有关 “心灵战争”
    的深入研究, 某些部份已被五角大楼列入极机密的档案, 因此使得史丹福大学在这方面研究的名气一时如日中天, 迄今仍保持领导地位。


    欧洲方面, 维也纳大学设立了正式的灵学课程, 而英国牛津、剑桥、伦敦三所大学准许以灵学题材做博士研究, 并颁给正式学位。迄今世界各地的著名大学纷纷设立了 “超心理学”
    的系所及课程, 正式纳入学习研究的系统中。


    在十九世纪末, 英国 “灵学研究社” 成立之初, 当时的成立宗旨是希望真正跳出宗教的桎梏, 纯粹藉由科学的方法——试验与观察去试图探索与了解那个 “看不见的世界”,
    并且做出客观的研究报告。


    在创始人之一麦尔斯的规划下, 将那个 “看不见的世界” 依现象的不同分为五大类:


    - ①心电感应

    - ②催眠术

    - ③灵媒

    - ④灵体附身

    - ⑤扶乩


    其中第一项的 “心电感应” 又可分为:


    A、“心电感应” 又称 “读心术”, 类似佛教的’他心通, 即可以直接读出对方的思想。


    B、“天眼通”：可用意念看见被密封在盒中的文字或物件。


    C、“念力”：以意念移动或改变物质（简称 PK）这三种能力，被莱因博士定名为“超感官知道”（简称 ESP）。


    其中第①、②项属于超心理学研究部份。


    第③、④、⑤项属于灵魂学研究部份。


    - ①人的肉体死亡后，是否有灵魂的存在？

    - ②灵魂是物质性的？或非物质性的？

    - ③灵魂的存在（生活）方式？

    - ④天堂、地狱或另一种死后的灵魂世界是否存在？

    - ⑤灵魂与人的生命及生、死的关系（即是否真的有轮回转世？）

    - ⑥鬼魂骚扰现象。

    - ⑦恶灵附体的研究及驱除。

    - ⑧灵魂的能力？


    一百年来，灵学（包括超心理学及灵魂学两大部门）的研究一直是西方人的天下，反而普遍相信“灵魂不灭、轮回转世”之说的东方人却一直让其归属于宗教之中，而仍未提出来单纯地作科学研究，甚至任何人试图去作研究，就会被冠以“怪力乱神、倡导迷信”的大帽子。


    然而在西方的灵学研究中，百年来，参与研究的学者专家极多，对“超心理学”部份已经有了长足的进步及丰硕的研究成果，但却也一致认定在“死后生命”（灵魂学）的研究上极难掌握，虽然大多数学者专家都认为“死后生命的是否存在”对我们每一个人都非常重要，但是遗憾的是，迄今为止我们仍不得不同意麦尔斯在一百年前所说：“有史以来从没有人经由科学方法解答出人类灵魂的是否存在，其能力及轮回等问题。”


    的确，一百年来，灵学的研究已完全偏重在“超心理学部份”，越来越人愿意去碰触“灵魂学”的研究，甚至“超心理学”也早已独立成一门学科，和早先的灵学已分道扬镳，划清界限。


    同样的，我们仍然必须承认“死后生命的是否存在”对每一个现存的活人都异常重要，只要能找到确切的解答证明灵魂的实存，证明轮回转世的实存，那么绝大多数的灵学问题甚至人生问题或一些神秘的鬼魂附身之谜必定可以迎刃而解。


    我们不得不感谢一百年前创立“灵学研究社”的先贤以及历来专家学者们的努力，但我们也不得不承认直到现今在科学对灵魂的研究上，我们和远古人类相比，也未必知道得更多。


    因此，灵学的未来是什么？


    是因为科技文明的持续进步，总有一天我们透过科学的方式，先进的精密仪器而侦察到灵魂与灵界的存在？一如巴斯德发明了显微镜而发现了细菌的存在？


    或者我们必须及早的发现那可能只是一条永远走不通的死胡同，我们必须赶紧另辟新径，从另外的方向来研究？


    编者不想也不能去预测什么，但是却也不愿去等待科技文明的进步；在下个世纪或数世纪之后的发明，万一其结果仍像今日一般地令人失望，那该怎么办呢？何况现世的生命如此短暂，对生命真义追求的欲望却是无穷的。是否我们应该放弃对仪器探索的期望与枯等，只是采用科学客观、系统的分析方法、以理智逻辑的认知，重新清理出那条荒烟蔓草中的古老途径，去探索灵魂与灵界的存在是否较好呢？


    > 曾有科学家悲观地认为：“以人的大脑去认知大脑全部的奥秘那是不可能的！”


    同样地，以人有限的物质性生命想要去了解无限的非物质性生命，那也是不可能的。正如同我们不可能用解剖刀及显微镜在人的肉体上找到“爱”存在与否的证据是一样的。


    或许未来我们可以找到可行的其他途径、但是在今天，编者却愿意以一切之努力，留下相关的纪录。'
