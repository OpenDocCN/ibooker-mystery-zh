    位先修班的新生。


    授课的型态不是像阳间学校新生训练的刻板, 有时会让这些新生暂时居住在一个社区型的地方, 并且还要教导他如何正确地发挥其变化能力来“创造”自己需要的物件, 从屋宇、衣食到其他享受品,
    一直等他完全适应了天界的生活, 他就可以自由地转生天界, 享受他应得的福报。


