  md: '# 第二十二章 到信神捉们


    傍晚时分，冷太太忽然来了电话，声音十分急迫。

    “不好啦，不好啦，阿强被人砍伤了，现在住在医院，能不能麻烦你过来看看?”

    问明地址，我立即赶到医院。

    急诊室灯火通明。两张床位都躺着人，床前则围满焦灼的家属。一位胖胖的、着白制服的医生，正在为病者做人工呼吸急救；看样子病情相当危急。独不见冷太太人影，问一位护士，才知道已转往普通病房。

    病房并不比超市冷清，人生痛苦百态，每张失去欢颜的脸孔扮演着不同角色，挨间搜寻，终于找到默默发呆的冷太太。

    阿强头、手裹着绷带，伤势不轻，靠坐床头的姿势，一动也不动。两眼平视，眼神空茫，无法判断焦点落在何处?身体倒还结实，否则应不是块砍人的料子。

    冷太太投来感激的一瞥，比了个让坐的手势。

    静静站一会，体察着屋内生物场情形。隔壁一张空床有些异样，我暂不理会，慢慢蹁到阿强床头，和他面对面地四目交会。他微微颤抖一下，脸上掠过一抹惊异，但随即无动于衷，眼神已越过我，投身到我脑后什么不知名的地方去了。我不由自己地呈出一声叹息：可叹!
    叹啊!

    我不清楚自己在这一瞬有没有摇首，竟被冷太太察觉出来，她一直盯着我，直到我坐到那张发出凉意的空床上。

    “这张床的病人刚走吗?”

    冷太太吓得立即用手捂住嘴，半晌才回过神来。

    “你都查得出来?是一位好心的清洁妇悄悄告诉我的。她要换个房间，说那张床上的病人是个车祸伤者，刚送走。”冷太太换用气息的声调又补充了一句：“太平间。”

    我一面听，一面注视阿强的反应，他完全像个聋子。

    我点点头。凝注全力在阿强头部。渐渐地我闭上眼，心底涌'
