    约翰：“很像日本人戴的那种面具，面具的眼睛就贴在我前面，很近很近！”


    曾老师：“可不可以把颜色形容一下？”


    约翰：“那眼睛是黄色还有黑色的，面具的四周有黄色的光……”


    曾老师：“好的！你向着这面具祈求一下，请它带你往前走！”


    约翰依言默默的祈求了一番，然后说：“那面具移开了！”


    曾老师：“走了吗？”


