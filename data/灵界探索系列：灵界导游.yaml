    # 四、中阴界 (轮迥过境室) 中层


    这是整个中阴界 (轮迥过境室) 中最大的一层, 景观及生活方式最接近阳世人间, 也是与阳世沟通交往最频繁的一个层级。


    由于在阳世, 自古以来, 真正大善大恶的人所占的比例很小, 绝大多数人都属于“功过两平”的, 也就是没有什么太多的善心善行, 也没有过多的恶心恶行。一生只是吃喝拉撒睡地顺着“人”的本能在过日子、安安份份,
    普平凡凡, 既没有长期虔诚的信仰, 对生命的真义, 宇宙的真相也抱着无关紧要, 昏昏噩的态度, 一点也不想深入去解, 甚至即使常常礼拜或上教堂, 其动机也只不过是出自“自我保护”的本能,
    更或者将拜神当成了谈条件的交易行为, 所期望的也全是物质上的贪求, 如升官发财之类的, 绝少是为了提升精神或心灵上的进阶与净化。


    因此绝大多数的平凡人, 死后通常都是来到中阴界的中层报到, 因为这里的一切都最类似阳世的人间, 也最适合他们暂时居住;'
  - '[PAGE 179]


    当然，不只是地球人类才如此，其他外星球的人类（智性生物），不论其科技文明是高过地球或低过地球，只要在精神及心灵层级和地球人类差不多的，死后也是会来此报到。这点我们不妨看看地球上的情形，今日人类的科技文明当然比三、四千年前不知超出了多少，甚至是古人做梦都无法想像的，但是在精神及心灵的层级上我们并没有长足的提升，相反地人类社会高度都市化的结果，使人逐渐远离了大自然，忽略了人类与大自然共荣共存的互相关系，为了追求物质文明所带来的方便与享受，早已严重地污染和破坏了大自然，再加上人欲横流日超严重，因此在精神及心灵层面甚至有日渐退化的现象。


    所以科技（物质文明）的进步与否，与精神心灵没有任何必然的关系，因此即使科技文明比地球超出几十世纪的某些外星球，在精神心灵方面的层级也未必比地球高，如果是挟其高科技而以统治奴役其他科技文明较差地区（星球）为目的外星人类，基灵性层级甚至是比人类更低下的。不过外星世界极大，不是我们渺小的人类可以想像的，其中也有不少在灵性层级超过我们很多的，死后就不会在此一中层的层级，甚至直接进入色界或无色界，如大有多彻大悟的，甚至直接进入“涅槃”之境。因此不可一概而论，外星人类的灵性并不一定比地球人类高级。


    但是依据“物以类聚”的共业法则，相同来源，相同种族，相同观念，相同生活方式的灵体，在灵界也是互相聚集在一起的，不过只有灵性高低才决定其所居留的层级，并不一定要阳世的血源亲族的关系，因此即使同一家人的父母子女、兄弟姐妹、夫妻，就算因某种原因同时进入灵界，能相处一起的时间也很短暂，不久之后就会依据灵性的高低不同及各人生前的业因而分别进入不同的灵界层级去。


    依据这样的法则，在中阴界中层的广大区域中，其他外星人'
