  - '[PAGE 162]


    1. 以上的说法是因时因地因人的一种教化方式, 只能做参考, 有志灵学研究的人千万不能一骨脑地照单全收, 否则尽信书不如无书。


    2. 为什么有地狱? 为什么有人会下地狱? 绝不是基于这样的逻辑。


    之前就谈过: “轮回”的目的是为了净化, 轮回是一个慈悲的法则, 其目的并不是为了奖励好人, 折磨坏人, 那么又为何会有这么残忍恐怖的“地狱”呢?


    其实全是人类中那些深深痴迷于“贪痴”而至死不悟的人, 自己不停投射出去的“心灵垃圾”所制造出来的境界。


    而且任何的恶念恶行都可能在未来将自己投入中阴界下层、最下层或“畜牲道”、“饿鬼道”去的。


    但由这些恶念恶行如果您生出严重的伤害或甚至杀戮行为时, 就会落入“地狱道”。


    因为不只是“人身难得”, 事实上所有生命都应受到尊重, 所有的生命都有生存的权利, 也都为净化而转生的, 如果为了人类的贪、嗔、痴所引发的恶念恶行而残害其他生灵
    (包括“人”)。那么第一是这种恶念恶行必然形成一种强大的“恶”的能量并逐渐具体化的化为铁、石、毒火, 尖锐锋利的器具而落入另一个界中堆积着。第二是被残豁或杀戮者临死前那种极度“怨恨”及“报复”的强大“恶念”也会形成一种强大的“恶”的能量,
    同样会具体化地化为铁、石、毒火、尖锐锋利的器具落入另一个空间中堆积着, 千百万年来, 堆积出一个广大的恐怖区域, 那就是“地狱”。


    杀戮的恶念恶行又分两种, 一种是实际的残害与杀戮, 另一种是杀人不见血的方式, 但其意义却是完全相同的, 譬如一个汪洋大盗可能亲手杀了十几个人, 另一个经济犯虽没有实际杀人,
    但因为数以千计万计的人被他设计坑害, 一生积蓄全部化为乌'
