  md: '死等八苦的煎熬，或竟而投入其他恶道，而减少了修行的机会。


    编者一再强调：“轮回过境室”的灵界三书是给一般人看的，不是给佛菩萨、大修行者看的，所有的观点都是以一般常人的观点出发。


    所以，不必去觉得“身是菩提树、心如明镜台”的说法如何幼稚可笑，相较于“菩提本无树，明镜亦非台”有如脑筋急转弯、耍嘴皮子的论点，对一般人而言，前者必然更实在。因为一般人是不可能有六祖的天生慧要悟性，站在一个不平等的立足点上去苛求凡人当下开悟，立地成佛，那是驱牛入瓮、渺不可得的。


    也所以“时时勤拂拭，忽使惹尘埃”是适当可行的。


    人之所以为人，是必经尘世历练的，没有人可以因为远离红尘道场，离群索居，由于深山清修，不惹尘埃而得道成佛的。


    因为人之所以投胎转世为人，必然是有着未尽的修行、未了的因果，否则为何要来？如果是超高层级的佛、菩萨倒转慈航为慈悲渡世而来，那原本就不同于一般人，根本不在我们探讨之列。


    所谓“山中修十年，不如人间修一天”，出家不是发现生命真义和宇宙实相的唯一途径。佛说出家是大丈夫的行为，但绝不是任何人遁人空门就能成佛。否则全世界的人一出生就一一剃度出家，个个成佛、鸡犬升天，那又何必有人间道场呢？而且果真如此，一百年后，地球上就不会有人类了。


    不要误以为编者反对出家，我真心敬重那些发心潜修，特别是确定知道自己为什么出家的出家人。但是绝不是某些人误以为避开红尘道场，舍弃人生责任，不落因果就能成佛。


    达摩祖师面壁九年才得道，那该不该面壁呢？面壁对不对呢？


    如果已经有了这样的修为，认为该去面壁那就去面壁。如果'
