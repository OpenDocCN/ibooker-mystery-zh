    ## 落地的覺知法


    ### 1. 放下頭腦的誤解


    我們的自我很喜歡編故事，所以，往往我們可以編寫出許多精美的劇本來，但卻不是真相。落地的覺知必須要以事件為主要對象，不需要分析太多、批判太多，也不需要歸咎是誰的責任，放下頭腦的第一步，就是停止自己的誤解。我們往往會把誤解的事情、頭腦的扭曲想法當作真相，然後去信以為真。所以，放下頭腦的誤解，不要去想為什麼我有這樣的遭遇，不要去想我為什麼要做這些事，停止批判，因為這些鑽牛角尖只會讓自己更痛苦，何苦呢？


    ### 2. 不要變成另一個人


    看過李安導演的電影《綠巨人浩克》嗎？如果沒看過，去看看復仇者聯盟、正義聯盟，一堆美國的神奇超人與神人電影，裡面有很多有意思的「非我」情節。像是浩克，只要恐懼或失控，就變成綠巨人，這樣的情節其實也每天發生在我們的生活中，我們一旦生氣失控時，就非常像沒有頭腦的浩克，活著似乎只為了破壞而破壞。這個時候，我們如何回來成為真我班納呢？呼吸，平靜，呼吸，平靜，回想美好，不要痛苦，馬上班納就回來了。


    ### 3. 正念靜觀練習


    我經常會給自己靜觀的閉關時間，有時候一天，有時候兩天，就在家中誰也不理會，也不出門，只是靜靜的生活。也許是很認真的打掃住家，或是整理一牆面的書籍，或是寫作，或是念經，最舒服的就只是打掃、吃飯、睡覺，休閒時看看不勾起情緒的電影，這些都是可以在居家生活中做到的靜觀練習。


    ### 4. 情緒書寫練習


    現在的交友網絡興盛，臉書（facebook）、推特（twitter）等等，各種的網路工具都可以讓我們抒發情緒。情緒書寫是一個不錯的練習，有時候寫給自己的內容中，也可以讓我們透過文字整理，見到自己的靈感與覺知。我們在臺灣與大陸的治療師，在講師訓練之前，都會有個一百天打卡，或是意識流書寫的打卡練習。同學們每天堅持五分鐘、十五分鐘書寫，來和自己獨處與溝通。


    ### 5. 全面親近自我才能減壓


    所有的練習，其實都在強調靠近自我。這也是覺知當下、認清自己心理狀態的重要關鍵。我們一旦認知自己當下的內在狀態，就會馬上紓解壓力。這些自己給自己的誤解、批判、要求、期待，都會因為我們可以靠近自己的心，而得到正確的對待。所以，這才能讓我們理解，我想要成為一個怎樣的自己？我可以如何微調自己的生活方式，讓自己的「心」好過？這樣的訓練，可以減少心臟疾病的問題，因為心收集了太多痛苦，承受不住就會成為負念的收發站。


    所有的落地覺知，都可以讓我們開始正向生活，並且活出有良知、有意義的人生。


