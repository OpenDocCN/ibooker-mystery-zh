    # 自我療癒 Color U 進化的道路


    禪宗裡有一則故事，是老和尚和小和尚的故事。

    老和尚在倒茶的時候，一直不停的倒著，小和尚說：「師父，水滿了。水灑出來了。」

    老和尚說的空杯之心，意思是，如果不把原來杯中的水倒出，如何可以盛入新的水呢？

    我的玄氣門氣功老師楊師父曾經告訴我，要有全新的力量，就要先捨棄全部。能量工作也

    是，不管是過去的負面經驗，或是過去的榮耀歷史，都已不復存在。因此，我們需要學會聆聽，聆聽內在和外在的聲音，聆聽高層的聲音，也要聆聽細小的恐懼之聲，然後放掉一切。

    我在加拿大的靈氣導師做得更徹底，她甚至離婚，由東邊搬到西邊，換了一群新朋友，換了新工作，全部重新開始。你如果去訪問所有的能量高人，那些勇於放下一切重新來過的人，總是可以很快的更高人一等。


    人的身心狀態如同一個U型容器，我常形容這個容器，如果切開，正好形成上下兩個半圓的U型，上半U是靈性面，下半U是物質面，合起來正好就是一個圓形。東方有空杯的理論，西方在卡巴拉的訓練中也有容器理論。在麻省理工學院的奧托·夏莫（C.
    Otto Scharmer）博士，在求師於南懷瑾老師之後，也在管理學中加上了東方的人文思想和U型理論觀想法，並推動到世界各地。不論東西方的研究，人類的進化就是一個U型的演化過程，然後進化成圓形。全頻道的過程中，我們一方面要聆聽上半圓心靈的訊息，一方面也要同步完成下半圓的生命實踐過程，這樣兩個同步進化的圓形，才可以創造無所畏懼卻充滿感知力的圓型創意人生。

    今天就讓自己這個初級的U容器，變成可以裝下更多能量的大圓吧！


