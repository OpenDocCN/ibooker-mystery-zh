    原來我不是一直在情傷中，而是一直在多情中。情很多，不怕傷，傷了之後還會復原。難怪我雖然沒有很好、很多的愛情經驗，但我總能感受到自己內心有很多、很滿的愛，像是很多愛給了幼小的弟弟，很多愛給了我的父母，許多愛又可以給無形的生命，甚至從小學開始，就發動全校捐愛心捐書送到泰北，也有很多愛從國中就一直做「愛盲讀書」義工。我總有著很多鬼點子可以幫助不同的人，甚至第一次開女性工作坊，訓練可以在家工作的女性成為雙手治療師，都是因為看到受家暴的女性又得在家帶小孩，而那施暴的男人往往又無法提供良好的經濟照顧家庭，我一氣之下，就開了這樣的培訓班，配合我進口的能量精油，藉以支持更多女性獨立自主。


    在能量畫的過程中，我已經完整蛻變。我理解到自己不是悲傷的人，而是勇敢有愛的人。於是，把畫送給幼稚園的同學後，我對這一場相遇做了祝福與結束。之後好像再也沒機緣可以再見到這位同學了，但對我來說，這五歲的記憶，已成功療癒了我對前世愛情誤解。


    我的日本同事曾經告訴我，她是到五十二歲才遇到美國男人的真愛。當時的我沒有很在意，但我明白她想告訴我的是，「不要將就，要做你自己。」終有一天，你會發現，真愛就在莫名其妙不經意間出現。「一晃眼，她說這話已經十年了，而我也在莫名的機緣下遇到了愛情。


    關於愛情，我理解到這是一個有趣的功課，卻不是我的主要功課。也許每個女人的生命功課大不相同，有的女人忙於繁衍後代，但我卻不是屬於這類型的女子。因為我無法被框在一個兩人的愛戀中，而失去靈魂更大提升的機會。


    但關於愛，卻是我一輩子的功課，把愛延伸到更廣大的層面，或許是我最好的課題。如何不緊緊抓住屬於自己的愛戀與依賴，而把愛的層級繼續擴展到更多人的身上，這些愛的體悟，隨著年齡的增長，開始讓我理解，可以用不同的方式來呈現愛的品質。


    這是清楚能量的人需要明白的。愛是一種無私的表現，愛也是人終其一生追尋與擁有的寶物，值得我們一直在愛中體會生命的美好。


    對於愛，我也才發現，原來我是擁有很多的愛，所以才能成為一個帶光的天使，可以給予更多能量的支持。沒有了愛的本性，就無法提供更多更強大的療癒力了；也因為有了愛的靈感，所以才能連結更多超維度的神靈，感受到世間更多美好的愛和力量。


