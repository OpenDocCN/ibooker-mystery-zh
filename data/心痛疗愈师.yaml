    在此之前，不是沒有別的高人說我身旁跟著誰誰誰，但就這一次，是我思念已久的弟弟，我的悲傷與痛苦立刻排山倒海而來。


    那些除了我在夢中可見，完全沒有告訴其他人的事情，老師彷彿完全明白。慈悲的老先生以一種輕鬆的態度告訴我：「不要難過，因緣和合，總有定數。」然後老師給了我四個字：成住壞空。叫我終生要記住這四個字。


    來拜訪老先生的社會名人其實很多，有的甚至因為跟隨老先生一段時間後，就嫁入豪門。許多有著通靈感應力或命理界的人士，也都喜歡到老先生家裡聚會，但更多的還是去求助的人，特別是苦於無法和另一個世界溝通而受苦於其中的人們，甚至是不明所以、被前世所苦的人，他們都會輾轉被介紹給老先生。


    老先生的解讀很有趣，他可以用氣功傳遞，打開對方第三眼的能量與訊息來解讀。比較重要的「溝通」，老先生就會如同美國最著名的通靈專家艾格·凱西（Edgar Cayce）一樣在睡夢中進行。睡著之後的老先生，會講著天語來溝通，但醒來後又彷彿忘記這些事似的。


