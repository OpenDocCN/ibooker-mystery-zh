    這種情況屢試不鮮，頻率多到我自己都覺得很好笑，也不得不讚嘆這個世界、宇宙何其廣大，我們何其渺小。我們的認知更是太少太少，許多的未知永遠在等著我們去探索。在我的工作中，也因為這樣的樂趣，往往可以彌補我感覺失落的情緒。


    記得以前剛開始開課時，有一次我覺得全身痛到很難自己處理，當晚就夢到有一雙大手在我背上摸了摸。在夢中，我全身的疼痛立即消失，我立刻從夢中醒來，醒來時都還記得那雙手的溫暖，還有療癒背後所要告訴我的主題是「療癒潛意識」。就這樣，疼痛自己好了，很難解釋出一個道理來。


