    各國的代理之爭，以及學生與老師的分裂與市場爭奪，這個能量圈充滿了不信任與背叛。我一直思索，甚至有一次鼓起勇氣對公司老闆進諫建言，我真的希望老闆可以出來整合一下，因為又有另一國家的成員向我抱怨與訴苦了。


    我覺得，愈是在上位者，愈應該要把團隊帶領做好，讓大家合作，這比只有自己當國王更為重要。我看到了許多失望的治療師，心裡實在不忍心。但是，本來就是人治環境，我卻以為可以聆聽上天訊息的人，又是藏傳佛教徒的擁護者，應該會不一樣吧？


    在經歷許多的心靈與物質的考驗後，我發現，當人們匱乏的心沒有被滿足時，這面鏡子就會一直重複地照亮人們的心靈。我開始明白，心靈和物質的雙豐收是我的野心。


    終於，一次的紛爭掃到了我及我的學生。在學生聚集學習的地方，我被爭取成為代理的中國同業告上了公安。前一天，我忽然得到訊息，感應到將有事要發生，而當天上午，我聽到耳邊一個男聲發出了嘆息：「為什麼他們就是不知道要珍惜你？」我一聽到這聲嘆息，便明白當天有事要發生了。


    結果，早上公安衝了進來，因為只是小型聚會，十幾位同學們即使驚慌卻穩定。當下剎那間我看到了另一個時空，明瞭在當天一起受到驚嚇的同學，在前世都有著受虐的過程，像是宗教迫害的前世記憶，但我沒有說什麼話。公安很有意思，他們的頭兒告訴我：「之所以驚動高層來了很多人，是因為告密的人也是你們行業的人，而且對方動用了勢力。不好意思，我們得來出現一下，有壓力。」然後公安很客氣地請我去了他們單位，全部的過程都很客氣，我也很感謝他們的盡職。


    提前的訊息並沒有讓我想要逃跑，因為在臺灣，我的助理也正在遭受著威脅。


    那一天是我最心痛的一天！我們和任何人沒有深仇大恨，我的學生和助理不應該被恐嚇與驚嚇，因為信任了我，而遭受這一切。我打了電話給我的高層朋友，朋友們了解了一下，也覺得不可思議，因為實在找不出什麼問題所在。


    就這樣，我們在兩岸同時經歷了一次「迫害」，而這種經驗，前世也曾出現過。對我來說，很多不可思議的事其實都只是一種經驗。我感覺冥冥之中一直有個力量想要喚醒我，但我仍像鴕鳥般的想躲在大保護傘中，嚴格說來，當時我沒有商人的事業野心，我只想好好地把接近大自然的美好力量，帶給更多人，擁有更多的，是一種傳教的情懷和使命感吧！


