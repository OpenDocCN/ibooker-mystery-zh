  md: '# Chapter 9. 走進色彩異世界


    1. stop-thinking（停止思考）

    所有感知的一切，都無法透過思考發生。因此，彩色禪修的第一步，就是放下繁重的頭腦。不思考對多數人來說非常不容易，而且愈成功的人愈難達到。一秒鐘不想事情，一天不去規劃未來，真的很不像活著。


    但所有的高感知力，都要從停止思考開始。因此，先練習發呆，休假時不做事，把原本創造負面的思考力降低、減弱，你才能走進下一步。


    2. 專注一件事

    不思考之後，你可能會很恐慌。因此，我們需要先專注一件事情。


    你只能有兩種專注：一是做色彩相關的事，另一個是做色彩能量與身體相關的事。前者是藝術的事情，如畫畫、攝影，讓自己放鬆的事；後者可以是運動、旅行，讓自己快樂的事。


    沒有放鬆，便無法快樂，你也不會有色彩感知力。


    3. 開始呼吸

    如果你可以感受到專注，接下來，就可以專心在呼吸上。走路時呼吸，睡覺時呼吸，講話時呼吸，打坐時呼吸。呼吸是非常美好的經驗，只有活著我們才能感知到。如果可以隨時知道自己在呼吸狀態，我們就可以覺察到自己的情緒與感受，就會平靜下來。


    4. 進入色彩

    在專注呼吸的同時，我們開始加入眼睛的力量。用眼睛辨識一切的色彩，一切進入眼中的色彩，然後把顏色連結到心中。心是感受一切的發源地，不平靜、不快樂的心無法感知色彩能量場，因此，必須透過以上幾個步驟，才能打開色彩能量的場域感知力。


