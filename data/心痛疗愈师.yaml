    # Part ② 人生夢想設計藍圖


    幼年的我常常在夢裡醒著，不知道自己是在夢中，還是醒著。有時候我也常常覺得，醒著時也很像在做夢。


    人生如夢，夢如人生。在很小的時候，我常夢到一些新鮮的故事情節，有古裝，有科幻，在月球上的，在外太空的，又或是常夢到自己在飛，飛去巡視某些地方，甚至有時候會不小心飛到奇怪的地方，出現一些好像不是我的世界的一些怪怪人類。一旦覺察到自己跑到感覺不安全的地方時，大吃一驚下，就可以安全地離開夢境。但有時候是夢中夢，要一連醒來好幾次，才是真正的醒來。後來有學生告訴我，說他們在夢中夢到我，或在夢中和我討論，其實是很多時候我去了學生的夢中「說教」，或解答一些問題，或告知疾病的解決方法、來源罷了。


    這是很平常的事情，我沒有向任何人提起過，因為這是我的祕密花園。


    六歲起，家中多了一位新成員——我的弟弟，一個可愛的、胖胖白白的小朋友。由於母親忙於照顧弟弟，並和自己身體的健康糾結著，以致無暇顧我，但我也不太會讓大人們擔心，因為我是個「特別」懂事聰明的孩子。只是小小一兩歲的時候，我卻有個頑固的個性，就是絕不輕言道歉，年輕剛有孩子的母親也不知道為什麼我會這樣，母親說我的眼神總有著一股穿透力，似乎有著可以看穿人心的能力，這種不用說話就有的強大力量一發出來，好像我才是她的主人。


    往往母親想迫使我低頭認錯，卻在見到我堅毅的眼神和寧願被打死也不願道歉的決心時，她就抓狂了，更瘋狂的打我，想逼我認錯，而我依然直直站著，只會搖頭拒絕，絕不道歉。爸爸看到媽媽打我打到失心似的，才出面阻止說：「一個小小孩能犯多大的錯誤呢？不需要這樣打吧？」


    所以，在六歲之前我受到母親很多的「行為教導」與「言語限制」，這多半與我不服輸和可怕的倔強眼神有關吧？當然，我也學會了隱藏感受和心靈之眼所見到的情境。就在弟弟來之後，母親多了一個孩子，很忙，而本來就習慣安靜的我，也因此有了大量閱讀神話故事的機會，與大量獨處、大量自我思考的時間。


    對孩童的發展來說，七歲以前的情緒認知和情感培養是發展重點，七歲以後的孩子開始覺察身體，但在此之前，孩子多半仍帶有自己原來的靈性特質，也具有獨特的性格。如果父母在這個時候可以保留孩子的本質，然後引導孩子補充自己的不足，以愛培養，這樣，孩子在精神領域中所擁有的安全感，以及以愛為主的精神感受，這些無意識的生命涵養，或許可以受用一輩子。


    父母對我最大的迷惘，就是從我會說話開始。因為我似乎可以「鐵口」直斷，往往一語可以直指他人的內心。但我的母親比較受不了，因為這樣的孩子很難教育，不是很聽話，我常會反問她為什麼這樣？為什麼那樣？對於大人的語言，我會感受後反饋，往往逼得大人無法回答。我覺得自己沒有錯，只是很不明白為什麼大人不回應？也不依照「心」來說正確的事情？


    本來就是一種平凡的反應，當年那小小小孩也照著自己內心渴望的方式活著，卻在弟弟去世後，才開始真的正視一些問題：為什麼我有這些夢境和靈性體會？這些到底會對我帶來什麼影響？對其他人有什麼影響嗎？


    於是，我開始踏入榮格的無意識心理學，經歷個體化過程，然後開始懵懵懂懂的探索「無意識的自我實現」。


    ※


    在尋找自我的過程中，夢境分析是我最大的樂趣。


    人類對於未知的探索，特別是對於自己潛在的力量，總是充滿了好奇和渴望。所以從高中時期開始，我開啟了很多研究夢境的渴望，主要是從每天的夢境中，我的神遊、鬼壓床，以及夢中所見、所聽、所聞、所學展開，有時候是夢中會有聲音告訴我一些訊息。


    國中時期，我便嘗試過找學校的輔導老師想獲得解答，但老師們總認為是我「想太多」，看到我的智商測驗一百三，只告訴我聰明的小孩要好好考試。到了高中還是一樣，這些輔導室的回應無法滿足我內在世界的探索，我感覺自己必須找些答案，因為內心的聲音愈來愈大聲，再也擋不住了。


    當弟弟過世時，痛苦的我，腦海中只出現兩個字——快樂。我發現，人只要一口氣沒了，想追求的什麼也沒有了。那麼，人活著為的又是什麼呢？不管我們追求些什麼，都只是為了「快樂」吧？


    佛洛伊德的「超越快樂原則」中，潛意識成了一名稽查者，我們通常在放鬆時比清醒時容易放開大門，容許潛在的訊息進入意識之中，所以透過分析夢境的結構，我發現了自己擅長的圖像式象徵譬喻，再加上與心理學的結構比對，很容易就能找到答案，而這正是佛洛伊德所說的：「夢是通往潛意識的王道。」


    因為自己的靈性夢愈來愈多，夢中教育的內容往往是自己沒有學過的，但醒來去查資料也十分準確，這對渴望求知的我來說，勾起了極大的興趣，我并不想知道類似「算命」的結果，而是更想知道「源頭」何在！


    儘管有很多科學和精神的驗證，但我常常感覺到，只有佛洛伊德才能撫慰，在幽暗的靈界中夢到親人的釋夢。因為很難解釋逝去的親人為什麼會到你的夢中來，除了過度思念之外，當然還有其他的訊息與意義，後面我們再聊。


    當然，隨著進入到二十多歲的時期，我還是放棄了佛老師，因為他凡事離不開性的解讀，令我感受到狹隘侷限，特別是我對性沒有很大的探索興趣。我只想知道，為什麼宇宙中有這些現象？為什麼我總是像天線一樣地接收？而我可以如何找出答案？這些訊息的出現，到底是在傳達些什麼呢？


    最奇妙的一次，是二十多歲的一次五天神遊，我感到自己似乎脫離了身體，但我依然是清醒的，我不知道自己要走向何方，好像也沒有方向感了。


    有一次我夢到上天給的一封信，是從yahoo寄出的，一開始還是亂碼，後來出現「from Heaven」字樣，在夢中太過真實地收到電子郵件，實在令我啼笑皆非。


    下一場夢，卻是一群天使圍繞著我在哭泣，我是他們的一分子，但我快要死了，天使們為我哭泣，渴望喚醒我，因為大家的哭聲驚動了我，那聲音太強烈，所以又把我震醒。


    這些種種，在二十多歲時從死亡中延伸的迷茫，掙扎中也帶給我許多靈性啟發經驗，成為日後生命中的寶藏。


    每一場的靈性啟發，都成了我生命的核心力量，我感覺自己像是碎片一樣，透過每次的經驗，一片片的將拼圖重組起來，每組回一片，我就得回一次力量，像是得回一個我本有的功力，只是需要通過關卡的考驗，然後贏回真我。


    這個過程，一直延續到今天，未曾停止，只是年輕時候的拼圖，和中年後的拼圖，性質上已經不太相同了。年輕時的拼圖，雖然是認識自我的旅程，但更像是療癒的過程；而中年後個性上的穩定，則像是靈魂漩渦向上提升的過程，也充滿了樂趣。


    ## 核心體悟


    弟弟是引領我進入夢境的推手。


    六歲的時候，因為家裡出現了這個新成員，從此我就像是個可愛的小媽媽和小老師。我非常喜歡可愛的弟弟，他也一直陪伴了我十七個年頭，直到血癌過世前，我們一直分享著彼此靈性和感受的內在世界。弟弟的善良讓我感知到愛與包容，弟弟的聰慧也讓我從他身上學習到雙魚座的犧牲奉獻。短短的十七年，我和弟弟的愛非常深刻。


    過世之後的弟弟，也是我穿梭現實和精神世界的關鍵人士，他一直陪伴著我，直到我找到自己的道路為止。


    擁有手足之情，和失去手足之情，可能是很多獨生子女無法理解的，而我也在成為獨生子女之後，更感覺到愛的力量。靈性和細胞的連結是很多生生世世的功課，我們不僅要完成自己的功課，還需要協助家人一起完成生命旅程。


