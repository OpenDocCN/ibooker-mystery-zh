    世界上再一次的文藝復興黃金紀元才正要展開，而展開的必然由中華文化開始。我明白了自己身為華人身分的重要性，也明白生生世世被培養的生命歷練，在東西方與古今的穿梭，都是為了今後的下一步。我不再迷戀外國人與國外的一切，我更在意的是，如何培養與共創華人世界能量教育的繁榮。


