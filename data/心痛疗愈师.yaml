    ## 天使神論


    人的內在有時候有太多恐懼，所以「小我」會一直掌握全局，而一再錯過生命中的機會。而透過快樂的方式開發「高感知力」，我們的人生自然會渴望選擇快樂，而不是痛苦。


    第一次接觸天使，和我預期的完全不同。電影中的天使，中性，小孩樣，有點像希臘羅馬神話中的邱比特和天神，如果你去希臘，你會覺得那些男神女神都是披著白色的白紗，很純淨。電影中又或許充滿幽默，出現穿著黑色西裝的男性模樣，如《天使情人》、《命運規劃局》電影中的天使，完全不太像傳統中的樣子，倒像是男神帥哥，師奶殺手。這些模樣，或許比較符合人們意識中的想像。


    二十多歲，第一次覺得靈魂飄出身外，但又知道自己還活著，這感覺非常奇妙。那時，我得到一本像是東方天書的東西，然後又得到一本西方天使的翻譯草稿，能量強大到讓我身體有點受不了，一連睡了五天。其次，自從弟弟過世後，我總覺得自己有點「虛弱」，情感也似乎沒有著落，喜歡的人總不能如我所願，不知道為什麼，身體開始沒有了力量，內在有股能量一直想跑出去，我猜想自己的求生意志其實不是很強。於是，就賴床了。


    比較接近人類的天使，位階比較低，比較容易被人們所感知到。我在夢中所遇到的場景是，有一大群天使圍繞著我哭泣，夢醒來，他們的哭聲我好像都還可以聽到。他們全是白色的，我躺在床上，一看就像是彌留狀態，所有的天使哭泣著，覺得我不應該就這樣離開，而他們說我是他們的一分子，所以大家都很感傷。我不太知道為什麼自己的夢境會出現這種場景？因為我沒有天使這樣的概念存在腦海中，也沒讀過什麼天使的書籍，更沒有西方宗教的任何思維與認知。但就是一大堆的天使圍著我哭，把我哭醒了。


    之後，在我收到一本關於天使的翻譯手稿，是朋友送來分享給我的。一天上午，我在床上打開書，還躺在床上的我就眼睜睜的「看到」一股金黃色的力量，太耀眼了！但畫面完全就是我們在漫畫中看到的天使形象，嚴峻的、帥氣的金黃色翅膀，感覺像個男性。我當時想，天使不是都是沒有性別的嗎？但眼前這個太像漫畫中的男主角了，酷得令我驚艷。就這樣幾秒鐘，我發現自己是清醒的，是睜著眼睛而不是睡覺的狀態。有人常說：「我見鬼了！」當時，震驚之後的我想到，我是不是應該大喊：「我看見天使了！」


    除了遇見天使，我還收到「天書」，一封來自上天的書信，回答了我很多關於天上的問題。當時的我，弟弟過世沒幾年，我想或許是自己太過思念弟弟死後的世界，所以日有所思、夜有所夢，不過心裡倒是有點沾沾自喜，覺得自己有著不一樣的經驗。


    但多年後，我在帶領藝術治療，帶學生畫畫時，忽然發現天使好像比較會接觸的是瀕死人士，並不是很神聖或光明的什麼靈能經驗，西方人士的天氣書，大多是在最慘的情況下，或是失落的狀態中初遇天使，而天使拯救的人，也都是最接近死亡臨界點的人，有很多年，我從個案身上也會發現，那些失去人生意志，失去鬥志，或是沒有生命力，甚至生病的人，他們似乎更容易「遇見天使」。後來我理解，這些是最低階、最接近人們頻率的小夥伴能量，而不是最高階的光明能量。


    曾經非常喜歡加拿大，溫哥華的郊區總令我感覺和天使們很靠近。那些天使不是屬於瀕死的一群，而是一群喜樂的感覺。天使和大地的精靈不同，但都令人感覺舒服。我習慣不接近黑暗，一方面覺得自己無法處理與面對黑暗勢力，一方面也是覺得自己沒有能力，所以我喜歡留在光明裡享受那種美好。


    在加拿大這天使的國度，走在森林裡，或是海岸旁，感覺不到人類世界的影響力，反而天使們的能力無所不在。那種接觸的感覺，像是一直和心地善良的人相處，完全不需要防備，只需要快樂的在一起。


    在加拿大某天晨起，我感覺要寫下些什麼，於是便有了第一版的天使書。


    每次靈感來時做記錄，是從小已經養成的習慣，但都沒想出出版過，所以我只是很自然的把靈感寫下來。這樣的記錄三不五時的就出現，所以我常準備了空白的小本子，以便隨手可以馬上記錄；夢中的情景也可以記下，以免睡醒後忘記。


    一次回到臺灣，我和出版社總編輯聊天吃飯，談起這個靈感。沒想到，美麗的總編輯立即邀請我，她說她正好想做一本華人版的天使神諭，因為我們一直都是看外文書，沒有本國人的真實經驗。我也是幸運，正當總編輯想做一本這樣的書籍時，我也正好已經開始在用靈感撰寫了。於是，一本超級棒的《天使神諭》就這樣準備要出版了。


    我的腦子很容易記住美好的事物，人生或生命中的黑暗面我卻很容易遺忘，不知道這樣是好還是不好？我的綠色心輪可能是有著時空障礙，這種時空障礙正好對於我的療癒力量很有幫助，因為可助我穿越三度空間的限制。也因為我沒有一般人生活中對三度空間裡線性時空的固執己見，所以對我來說，「穿梭」是件輕而易舉的事。


    有時候想想，也許某人的缺點，到了另一個人身上就成了優點。我容易遺忘和人曾發生的不快樂事件，甚至昨天，或是幾年前，我都會誤以為這是很久以前的事，而我的心思總是很容易徘徊在某個空間中，自己也說不上來是為什麼。這種徘徊，對我唸聖經和佛經，以及卡巴拉的光輝書，都有很大的幫助。我可以很容易進入書中的能量和情境中，好像看電影一樣，光影重現。


    過度美化的習慣，也往往令我容易失望，或令他人失望，因為大家預期的我，總會有不一樣的表現，往往無意間得罪了人也不自知。當然，這種狀態我覺得很「愚痴」，也是我人際關係一直有障礙的主因，我的想法總是和「正常人」脫節，但我沒有辦法改變，因為改變了，我的感應就會不準確。我只能一直努力適應，幸好我一直遇到的工作夥伴和學生，都可以逐漸包容我的愚痴和無知。


    我一直以為，只要專注於工作，把治療做好，會不會做人其實並不重要。年輕時，我更在意的是「能量感」，你說，這種性格是不是很愚痴呢？我覺得是的，很愚痴。在此向我曾經無意得罪的所有人，如果你們心中還記著對我的不滿與憤怒，請原諒我，因為我已經忘記了，但我會記得曾經令人的不舒服，作為今後自己的警惕。


    後來我在加拿大曾經努力修練「自他交換」。自他交換就是把他人的不舒服吸收到自己身上，感受到那種對人不滿的能量是一種黑色團。然而，即使我很努力的在天使國度修練這種練習，但依然不能理解，為什麼就是有人會看我不順眼？所以有很長一段時間我都很自閉，不太敢和不熟的人太靠近，只能靠著助理和外界保持聯繫。


    當時我的世界除了貼身助理或經紀人，沒有太多的社交，因為我不想無意間又得罪人。但在我的工作中，我又很勇敢，因為我的信心大過於自己的感受，我相信上天的安排，也信任我所有師長的指導，因而無所畏懼。只是在做人的這個功課上，交了很多年的白卷，也創造了身心靈事業的危機。


    不過，彷彿你該做的事，自然地就會出現。


    總編輯在我不可思議的情緒中與我簽下了新書合同，我沒想到臺灣的大出版社竟然這麼先進，也願意出版印製在臺灣業界前所未有的精美書。臺灣出版文化界的高級智慧，其實真的在兩岸三地華人世界中，是唯一可以勇於拋開成見，沒有包袱，願意為著理念而奮鬥的一群了不起的靈魂。於是，我回到英國，開始聆聽天使的工作，完成以「神諭」的口傳。


    在教學或是寫書時，感覺那不是我，我沒有那麼高的智慧，那肯定不是我的智慧，所以我只記錄下所有訊息。有時候我會寫得很快，特別是認了某種商業目標而做，因為我發現，靈感就有生命力，我沒有辦法為了文筆而寫，也沒辦法為了某種商業目標而做，因為我發現，力量只能誠實書寫，那些我用人性設計書寫的東西，都不會被採用，很有趣。


    印象最深的是二〇〇五年一本天使相關的訊息書籍《天使幸運色》，雖然不是在臺灣一砲而紅，卻在大陸一直長紅。如果你在西方人談天使的書中，看到天使可以幫助我們變年輕貌美，健康回春，還能心想事成，你可能會覺得這是小朋友玩牌卡，或是小女巫的小戲法，但我都不屬於這類人士，也沒有這類背景的宗教信仰，何來訊息？


    二〇〇五年要拍書籍封面照片的前一天，我還在臺北的工作室裡做著例行的療癒聚會。當天晚上拍的照片，我略顯疲憊，而且似乎臉有點因疲累而顯得垮垮的。我自認不是長相好看的人，肢體也略嫌僵硬，更沒有拍照的自信感，所以告訴出版社我需要好的配合。於是，一大早，化妝師、造型髮型師，還有攝影師全都嚴陣以待。


    拍照的前一天晚上，我忙完聚會，聆聽完學生們的分享，心中非常感動，但也開始擔心第二天自己的狀態，可能拍不出好照片。二〇〇五年的技術，可沒有今天神奇的修圖技巧，甚至可以拍出完全不像自己的美麗。臨睡前，我想到自己寫出來的幸運天使，以及每個幸運天使對應到的正念肯定語，我忽然心中充滿感恩。


    一切的發生都來得太快，也來得太神奇，我不想相信，卻已經發生，但愚痴又執著的我，總是一直以不信邪的態度、自以為科學又知識的清高者自居。但是，神奇的經驗不斷發生。我想到自己自從弟弟過世後一直不開心，心裡想要的雖然得不到，但工作事業上卻一直很順利；想到自己的工作，這麼微小的力量卻可以影響到身邊人。當晚活動中的一個學生，從之前身體半身不遂的萎縮狀態，到現在已經可以活動身體健康起來，小女生差點因為身體健康而輟學，後來卻成了心理系的高材生。點點滴滴的感恩，當晚忽然全湧入我的腦中。感恩的力量，在睡前似乎融化了我的心酸與內心的痛苦。


    第二天醒來，我起床梳洗照鏡子時，差點嚇壞我了。


    發生什麼事？當年也沒有微整型什麼的（前後一晚應該也無法產生什麼效果吧？），但前一晚還為著相貌擔心拍照問題，第二天我的臉、頭髮，甚至水腫的身形狀態全都不一樣了。到了拍照現場，所有的大師都無用武之地，還被出版社同仁虧說，老師狀態好好，完全用不到任何打扮。當天上午，就這樣，我連彩妝都是自己化的，因為狀態太好了。對我來說，一時變漂亮真是嚇到我了。


    一夜之間的轉變，我知道又是天使幹的好事。我也知道，當心存感恩時，神聖光明便替代了人心中苦澀，苦澀轉為希望的果實，於是，女神出現。


    之後常常在我上臺前，就會有這樣的事情發生。二〇一七年更有一次類似經驗，上千人的舞臺上，我又變漂亮了，拍起照片完全是另一個我似的，但誰能看出我其實已經三天每晚睡不到兩小時的痛苦。每次提高能量之前，我都經歷著無人能理解的內在痛苦，如果換成是你，你願意交換嗎？我從未願意過，不過命運的規劃就是這樣，只能接受。潮來潮去，完全無法推開命運河流的自然潮汐。


    天使訊息一直帶給我ㄧ團光明的感覺，也教會我「團隊合作」的重要，因為真正的天使光明，或光明的天使，不會欲望勾結或是利欲薰心，完全是ㄧ種純淨的孩子們在一起同樂的感覺。只有天使的領導人（大天使與天使長）才給我ㄧ種像二十多歲見到的黃金光明體，那種嚴峻和俊俏感。這種感受，也在後來我自創的天使能量噴霧裡，被創作了出來。


    這樣的創作，在我的理解中，比較像是翻譯人員，將多維度的訊息轉變成三維度空間的版本，有人說這像是線性化專業人員（linearization specialist）。我在同步創作天使能量噴霧時，便運用一直以來喜歡的天使唱誦，把自己從三度空間帶到其它次元中，不僅可以讓我以歌聲來療癒及教學，更可以引導每個人唱出自己靈魂的光芒力量，來延緩老化及豐富靈魂。而這種豐富靈魂的計畫，後來更成就了我去從事長照老人公益事業及培訓專業天唱人員的開端。


    就在今日，我活在感恩中。


    ## 核心體悟


    Core Enlightenment


    天使的力量我會形容為「孩童意識」。往往我們內在需要的是快樂年輕的小孩，這個「正常健康」的孩童意識，不是一直抱怨、批判或挑釁攻擊的那個小孩。如果能保有正常健康的孩童意識，那麼，這種天使力量就非常容易連結上。


    早年我發現很多連結到天使的人，都有著「瀕死」的內在離棄感，似乎是不滿這個世界，又或是不能適應這個世界。在西方，像是黛安娜·庫柏（Diana Cooper）就很喜歡療癒的天使，總是感受當人們受到痛苦時，天使就會過來支援。我總覺得，天使連結了死亡的橋樑，並不如眾人所說的那樣美好。但不可諱言的，這類的訊息往往不是帶給眾人死亡的訊息，而是由有著瀕死訊息的使者，來傳遞出天使的美好。


    連結天使的訊息，也需要「放下」及「不貪」的特質。


    有時候你必須提高自己的頻率，然後「放下人性」，甚至沒有人性層面，或可以快速轉換磁場，才可以立即感受到他們，通常在快樂的時候、沒有煩惱的時候，就可以連上這些高的頻率。這種感覺很微妙，就像現在我在寫這幾個字時，他們的力量就來了。我的第三眼會緊一下，好像有股訊號降臨。


    在之前我去上海居住的前五年，就在夢中見到好多天使聚集在上海等我過去。當然，我通常會放著觀察，不會馬上興奮的告訴大家，或是信以為真，因為所有的訊息都還需要經過時間及人性層面的準備。準備好了，一切才會自然地發生。有時候並不是我們以為的那種「神聖或成功」的方式，有可能是受到創傷、痛苦，甚至是一個措手不及的意外而導致改變。


    我領悟到的是，人的內在有時候有太多恐懼，所以「小我（lower self）」會一直掌握全局，而因為很害怕失望。所以，當天使訊息來告訴我們需要改變時，我們反而不會照一個看不見、聽不到又無法立即顯化在眼前的訊號去做事。很多學生收到了訊息時都是先質疑，因為這和他們理解的不同，所以會將其推開，因為實在不符合所認知的層次。


    有時候我在解讀給他們聽時，會覺得很好笑。如果天使的訊息能量沒有高過我們，那還叫天使訊息嗎？人類思維之狹窄，實在無法理解。有一個上海的個案就是如此，明明所有的好訊息已經臨到這位企業家的身上，他卻始終要算出一個最有利於自己的「結果」來，所以一再錯過生命中的好機會及訊息，一路走入下滑的人生。這種解讀我也很煩，面對不相信的人，有時候連翻譯我都會覺得是在浪費時間，因為這些人只會一再的浪費生命，天使群只會覺得「可惜」。然而，這類「可惜」的案例比比皆是。


    ## 自我療癒


    ### 連結高層的光明力量


    不想成為浪費生命的可惜案例，那就要學習提高層次。有時候不是你想提高就提高的，因為能量不夠高，根本是有心無力。所以，對於那些「可惜」的案例，只能「捲回」輪迴的漩渦中，繼續痛苦，成為痛苦輪迴的人。


    天使能量可以幫助我們「解脫」，但必須放下世故，放下算計，沒有恐懼，只有快樂。可是人們有自由意志，所以就算「想」，也不會「做」。既然懂得很多道理，那為什麼還做不到呢？就是因為沒有「感知力」。


    古老佛教經典中的咒音，也是宇宙帶來的訊息與力量。透過聲音，可以啟動並打開封閉的心，快樂的感受是源自於心，所以我們要用聲音才能開啟。這也是在我們的生活中，音樂為何能帶來如此大影響力的原因，不管我們是去K歌，還是聽音樂。這個世界的音頻中，聲音絕對是宇宙三大力量中一項重要的神聖力量（第一是色彩光能，第二是聲音，第三是符號）。


    透過快樂的方式開發「高感知力」，我們的人生自然會渴望選擇快樂而不是痛苦，會願意放下人情世故，而不會一直說自己「我不得已」、「我沒辦法」這些藉口。人生，只是一秒鐘的選擇，不是一世人的痛苦。


    成為快樂天使的簡單步驟：


    1. 唱誦天使聖音


    有兩本書可以參考，一本是我的《天使神諭》，裡面記載了所有我下載記錄的天使名字；一本是我的好友特拉·考克斯（Tara Cox）在二〇〇四年出版的《出生天使》這本書，其中詳細記載了神聖希伯來發音的七十二個天使的名字。


    在《天使神諭》裡，你可以依照祈求，然後用左手翻起任何一頁，再依照如下祈禱文念誦：


    > 我召喚宇宙愛之光，我是潔淨完美的管道，光是我的指引。


    然後隨意用你喜歡的音樂和聲音，唱出任何一個天使的名字。


    2. 唱誦藏傳佛教的任何咒音


    和快樂最相關的咒音，就是《財神咒》和《六字大明咒》。


    前者助你快樂發財，後者助你健康順利。


    《財神咒》：嗡。藏巴拉。札楞札也。梭哈


    《六字大明咒》：唵嘛呢叭咪吽


    3. 唱誦漢傳佛教的任何咒音


    《大悲咒》是我最推薦的咒音，可以徹底清潔你的所有障礙，然後感受到快樂的力量。


    4. 唱誦自己內在的神聖咒音


    聲音的療癒力，如果是以靈性的感知力來唱誦，就會產生如同治療般的震動效果。


    ## 以愛療癒


    唱吧！就此唱出你心中的力量和愛。在愛裡，聲音成了我們愛的完美呈現。充滿愛的聲音，你我都需要培養。


    最簡單的，就是以靈感唱出我們的名字，中文、英文，任何語文都可以。這樣和自己的靈魂深處相遇，運用聲音和名字，自己可以啟動自己的靈性密碼。


    # Chapter 15


    ## 愛上自己的道路


    > 漠視或逃避問題時，

    > 真正掩埋的是我們持續學習、成長、改變與療癒的力量；

    > 而唯一能安然度過問題的方式，只能是勇於面對。


    許多的徵兆告訴我：這是你的宿命。而我雖然說是抗拒，卻好像也甘之如飴的走向治療師的靈性之路。


    四十歲我才開始認同自己，不知道這樣會不會太晚？


    雖然在無形的靈性世界中，往往給我有形的照顧和物質界的支持，可是我沒有很快樂。因為弟弟的過世，以及家中的變故，所以就算哲學修得高分，得到了獎學金的提供，也決定不去法國攻讀碩士與博士學位。


    我必須向生活低頭，家中已經少了一名成員，如何能再少一名呢？特別是父親在美國，母親想回到臺灣，如果還去了法國，那這個家怎麼辦？我成了家中唯一的孩子，所以我決定放下自己的夢想，向現實低頭。大學畢業也不繼續讀學位，因為我需要照顧家人。


    不快樂的因素還有感情世界，我愈來愈無法更靠近人群，過度的敏感讓我無法和男人靠近，我可以立即感受到對方身體的問題，或是見到對方因為情緒而產生的能量變化，所以讓我很難以正常的心態與人交往。


    而無形的靈性世界十分吸引我，往往在這個世界中我可以快速得到平靜，有時候還可以得到很深的對話，這種溝通勝過所有語言上和其他人的溝通。我好像是新時代的高頻率小孩，雖然我的年紀不應該這樣反應，但我的確身上存在著所有新時代小孩的種種跡象，擺脫不掉。為了這個情況，我還飛去夏威夷一趟，找尋天使與精靈界的訊息。


    一個世界不快樂，卻可以在另一個世界做創作，是不是很奇怪的一種現象呢？但我也在佛學的世界中找到另一種快樂，特別是念佛經的快樂。我一直不是用功努力的學生，只是有著小聰明。但是，我卻可以在寧靜的夜晚，瞬間放下內心地抓取上達天聽、且連結甚深的佛經能量，儘管我不必讀太多經文，卻可以領悟能量。


    然而，對於可以感受能量的人來說，光有感覺是不夠的，一定需要道理和理論的學習與思維。因為光有能量只會傲慢，進入思維才能揚升。所以，在我悟到佛經高能量的第二天，卻是畢生以來覺得最無聊的一日，因為內心沒有了八卦與是非，連打電話找閨蜜閒扯的行為都沒有動力，剎那間才明白，為什麼大多數的人不肯離開舒適區，或是很難改變習性。因為一下子清理太空了，而空白卻沒有新的事物可以填入，於是人們必然會回到原來的狀態裡。


