    # Part Ⅲ 進入臣服天職的階段


    什麼叫做覺知的生活？現在各種身心靈的書籍中，早已經把「覺知」這句話講爛了。所有的修練都在強調覺知，然而，真正的覺知不是想出來的，而是活出來的。一行禪師在法國的梅村，一直提倡正念的覺知生活，我把他的理念也用在我們的高階治療師訓練中，每個整點就來做點不一樣的正念覺知。正念，就和正能量有關。


    我們在治療師培育營隊中，強調的正念覺知是「四無量心」。如果沒有慈悲喜捨的正念覺知，那麼治療師將是個生冷的機器，就算有一些讓人平靜的療癒力，也不會有更高靈性上的覺知。


    第一階段的治療師，目標都是「放鬆壓力」，而其實，這樣的覺知已經很了不起了。如果要往上成為情緒上、思維上或是靈性上的覺知，甚至到生活中時刻覺知，那真的非常不容易，也許要閉關一段時間才能有这样的覺知力。


