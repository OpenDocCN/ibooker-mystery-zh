    ## 自我療癒


    ### 打開夢境大門


    我天生好奇，對人生充滿期待，有時可能是過高的期待，所以生活中失望的也多。然而，夢境卻永不令我失望，因為那是個不可預期、卻可以預見的真實境界。


    記得有一次，很用心的想「救」一位愛我的人士，但最後，夢中忽然預告我「他掉隊了」。


    夢中的景象是，他跟不上某一群一直在前進的人們，夢中的聲音說，他上不去了。這裡的上不去我很清楚，就是靈性卡住，提升不上去了。而這個當事人，堅持活在自己的爭奪和痛苦中，不願意離開。我苦苦地拉著對方，卻也莫可奈何。


    「連結」是我非常尊敬的一種愛，就是因為這種愛，把大家串連在一起，即使是生命中沒有血緣關係的人；又或是說，愛把許多沒有血緣關係的人變成了有關係。靈性精神上的連結，可以使一對愛人深刻的彼此相吸引，有時候，甚至勝過了有形血緣的連結。


    我從擁有到失去，愈來愈體悟到愛的真諦。什麼是得到？什麼又是失去呢？其實根本不重要，因為在靈魂進化的過程中，擁有是由感恩堆積出來的。如果沒有感恩，就算曾經擁有，也不會深藏在記憶深處。等到某一天靈魂回顧這一生的時候，那也如同「沒有擁有」。


    因為愛，因為感恩，所以我們彼此豐富，我們不斷進化。這種進化的感受，除非親身體悟，否則你是無法了解自己的靈魂深處，還有多少豐富的寶貝禮物，正等著我們去領取。


    人的意志力，如同佛洛伊德說的，潛意識中有著層層的守門員，有時候，外人根本無法取得守門員的同意進入。


    因為夢境，引導了我一生的生命事業與志業。每當無助時，我睡覺就會得到力量或指引。也因為這種與自己夢境（心靈）溝通的方式，我的心永遠有著一塊祕密花園，那是一個神聖地方，也是我今生靈魂遊歷過去、現在，或遊歷各地的一把「鑰匙」，我稱之為「打開幸福的鑰匙」。


    如何取得這把「打開幸福的鑰匙」？


    想要和自己的靈魂溝通，你必須要真的「相信」。假如你半信半疑，那麼這些效果就會有時靈，有時不靈。但如果你太過渴望得到，因此抓得太緊，也會無法取得這把鑰匙。


    所以，鬆緊適中，是非常重要的第一步。


    在做精神分析時，你會發現，其實並不是不好打開那一層層的大門，而是我們往往有著自己的內在機制，像恐懼、擔憂、沮喪、懷疑⋯⋯這些內在的感受，會形成一個個打不開的厚重大門。有時候想強行打開，但儘管擁有萬能鑰匙，還是可能會失敗。所以，我自己會非常「享受」睡覺這件事。身體和靈魂的溝通是睡眠，在這個微妙的半現實時空中，我們的靈魂可以說話給身體和自我的心智聆聽。因此，喜歡、享受這種感覺很重要，我就很喜歡和自己身體在一起睡覺的感覺，也覺得是一種享受。


    以下是快速打開夢境的簡單步驟：


    1. 上床睡覺前告訴自己：「一切都是可以接受的，不管什麼，我都接受。」


    唯有自己先接受這一切，然後你的守門員才能收到訊號，不為難你自己。這種畫面像是科幻片中敵我雙方的較勁，甚至有時候敵人也會冒充自己，變成另一張臉，讓自己也看不清楚。


    2. 告訴自己，醒來要記住該記得的。意識是需要被提醒的，如果你不在意，他也不會去記得。所以我們需要提醒，但只是情緒釋放，無用的垃圾，就不必再花腦筋去記住了。


