- md: '## Chapter 20. 心靈與物質雙豐收


    我覺得特別開心，也信心滿滿的願意回臺灣攜手共創，畢竟我已取得老師資格，可以一起貢獻力量給更多人。帶著可以一起共好的美麗藍圖，我回到臺灣。


    但沒想到，這是災難的開始。


    從心靈到物質，人們往往充滿了恐懼的考驗。我一開始就注定成了「瓜分市場」的破壞者。流言、攻擊、打擊、分化、謠言，沒有人恭賀我完成論文及努力，回到臺灣所擁有的，竟然是和好朋友決裂，因為我搶了人家的市場？！


    這種令我挫敗的現象，讓我簡直想就這樣放棄這個工作，幸好又是老先生提醒了我，自己的使命更為重要。我沒有想到靈修原來也是充滿恐懼和狹窄的，對方願意合作卻出爾反爾，市場殺價的問題一直無法得到共識與解決。


    許多讓我背黑鍋的事情，都是出自於我自以為是的「使命感」。現在想想，原來做人比會做事還重要，我年紀輕輕的入行，卻忽略了老人家不平衡的心情，於是我像是公司新聘的空降高階主管，開始舉步維艱的在公司裡工作著。


    從一開始，我就是形單影隻，因為我不曾屬於任何教派，也沒在商場上打滾的經驗，我只有文化人的背景，只會寫書，後來教書。光是這樣，我已經不夠格成為一個經營者了，但身為會說中文的第一位華語講師，對於英語世界的市場來說，這是踏入中國人世界非常重要的第一步，也是東西文化能量交流的第一步。


    我因為信任凱洛老師，因此誤打誤撞的走進商業世界，開始承受殺價、沒有信用、抹黑，並且被提醒這就是臺灣的「菜市場文化」。我必須能練習與人一起八卦是非他人的不是，然後一起傳遞人云亦云的謠言，並且要能夠像在菜市場買賣的精神般行事。


    ## Part 進入臣服天職的階段


    一開始我就崩潰了。對於不去傳統市場買賣的人來說，我只會去超商或是百貨公司，我沒辦法想像去菜市場買進口貨的概念，所以一開始就出現與臺灣文化不合的痛苦。


    我百思不得其解，也許是當年的智慧真的不夠，心胸也不夠寬大，總自以為是正義使者，想要維持市場秩序，卻不敵已經形成的市場機制與人文背景。去程的愚人牌，總是令我踏在未知的懸崖中，樂觀地走下去。但這種現象，也讓我一直在維琪·渥爾及靈學師長們的支持下，繼續做我自己。我不知道這些培養，原來是要我能做更大的事情，可以為日後華人的世界做出更多能量界的貢獻。


    我對能量非常有天分，但就是對人性沒有慧根。


    或許被蒙蔽了一種心智，也是一種執著，仗著自己的天分，也很驕傲又孤僻的活著。這種磨練，造就了我除了在臺灣把能量盛會打開，也前往加拿大成了代理，然後前往馬來西亞、香港，最後前進內地。身為一個到處傳播色彩理念的華人，我一直以為自己像個宗教狂熱分子般前進著，但實際上，其實也是一個商業產品代表而已，不過我全然被熱情蒙蔽的心，卻一點也聽不到真相。


    我的心不僅被蒙蔽，更因為自以為是的靈性，而以為一切都掌握在手中，便一次又一次的，走上毀滅自己純真信任的道路。


    在代理的十五年中，學生背叛老師的情形一直不斷地重複發生。美國的凱洛老師被向她學習的另一位澳洲老師抄襲，多年來她始終無法釋懷這個背叛的過程，因而遠離英國公司。我雖然替老師感到憤怒，也一直希望能杜絕這樣的事再發生，但我畢竟不是公司老闆或負責人。我對身心靈感受崇高，卻一直眼見世界各國的紛爭，這種重複的紛爭令我不能理解，為什麼美好的產品，因為商業機制的設計問題，而不能兼容並蓄中國傳統尊師重道的精神與禮節？


    各國的代理之爭，以及學生與老師的分裂與市場爭奪，這個能量圈充滿了不信任與背叛。我一直思索，甚至有一次鼓起勇氣對公司老闆進諫建言，我真的希望老闆可以出來整合一下，因為又有另一國家的成員向我抱怨與訴苦了。


    我覺得，愈是在上位者，愈應該要把團隊帶領做好，讓大家合作，這比只有自己當國王更為重要。我看到了許多失望的治療師，心裡實在不忍心。但是，本來就是人治環境，我卻以為可以聆聽上天訊息的人，又是藏傳佛教徒的擁護者，應該會不一樣吧？


    在經歷許多的心靈與物質的考驗後，我發現，當人們匱乏的心沒有被滿足時，這面鏡子就會一直重複地照亮人們的心靈。我開始明白，心靈和物質的雙豐收是我的野心。


    終於，一次的紛爭掃到了我及我的學生。在學生聚集學習的地方，我被爭取成為代理的中國同業告上了公安。前一天，我忽然得到訊息，感應到將有事要發生，而當天上午，我聽到耳邊一個男聲發出了嘆息：「為什麼他們就是不知道要珍惜你？」我一聽到這聲嘆息，便明白當天有事要發生了。


    結果，早上公安衝了進來，因為只是小型聚會，十幾位同學們即使驚慌卻穩定。當下剎那間我看到了另一個時空，明瞭在當天一起受到驚嚇的同學，在前世都有著受虐的過程，像是宗教迫害的前世記憶，但我沒有說什麼話。公安很有意思，他們的頭兒告訴我：「之所以驚動高層來了很多人，是因為告密的人也是你們行業的人，而且對方動用了勢力。不好意思，我們得來出現一下，有壓力。」然後公安很客氣地請我去了他們單位，全部的過程都很客氣，我也很感謝他們的盡職。


    提前的訊息並沒有讓我想要逃跑，因為在臺灣，我的助理也正在遭受著威脅。


    那一天是我最心痛的一天！我們和任何人沒有深仇大恨，我的學生和助理不應該被恐嚇與驚嚇，因為信任了我，而遭受這一切。我打了電話給我的高層朋友，朋友們了解了一下，也覺得不可思議，因為實在找不出什麼問題所在。


    就這樣，我們在兩岸同時經歷了一次「迫害」，而這種經驗，前世也曾出現過。對我來說，很多不可思議的事其實都只是一種經驗。我感覺冥冥之中一直有個力量想要喚醒我，但我仍像鴕鳥般的想躲在大保護傘中，嚴格說來，當時我沒有商人的事業野心，我只想好好地把接近大自然的美好力量，帶給更多人，擁有更多的，是一種傳教的情懷和使命感吧！


    受虐者可能也是施虐者。晚上打坐時，我跳出二元對立的時空，冷眼看著這爭執的雙方，為什麼不能化解呢？為什麼這個環境充滿了你爭我奪，或是非要置對方於死地才能開心呢？我親信的助理，曾經聽到另一個學生說，希望上官老師不要回到臺灣教學，因為老師如果回臺灣，她就沒飯吃了。當時的助理對身心靈的人感到很失望，常笑我說：「你們身心靈的人⋯⋯」


    我對於一直挺我的好助理、好學生，一路以來那些曾經支持我的人，在二元的時空中，我明白「大家都在最好的時間，盡力做了最好的選擇」。於是，那次事件後，我開始遠離令人迷惑的能量圈，開始「做自己」。


    有人說七分靠努力，但三分仍然是天注定。


    但我總會把分數重新配比一下，想要讓心靈與物質雙豐收，三分靠努力，三分天注定，四分靠能量（運氣）。因為能量可以轉換思維，也能改變磁場，磁場好就能產生吸引力。


    > 「做自己」，就是希望鼓勵大家不迷信、不盲從，找到真實的自己，一切由心所造。


    我們的新開始不迷失時，就可以理解真實的靈魂本質，更重要的是，可以掌握自己的人生，創造真實的雙豐收幸福。


    ## Chapter 20. 心靈與物質雙豐收


    其實心靈與物質雙豐收，是一件不可能的事情。


    心靈的方向與物質的方向，基本上是兩個相反方向。當物質生活中愈來愈忙碌，愈來愈多事情時，你的心便很難完全的安定與專注下來。而心靈是需要安定與專注的，太過忙碌的生活與品質，是無法有著高檔次的心靈觀點。


    在快二十年的生活中，我其實一直不曾想過這兩者的差異，相反的，我每天都在追求這兩者的合一。我的心思沒有想過其他的可能性。直到二〇一七年，我感覺自己的生活，如果繼續這樣忙碌，我將無法達到自己心靈想要追求的境界。因為每次忙一圈回來，我總需要花一點時間來修復。


    本來內心狂妄的不認為自己需要休息，也不覺得自己會有任何的空間與時間來休息，我總是自傲地認為，自己就是適合到處飛，到處體驗的能人。


    但在一次新疆的行程後，我忽然被學生的重感冒傳染上，得了可能會致死的嚴重流感。記得當時臺灣在短短數月內就死了三百人，而我還毫無覺知地染上了這會致死的疾病。一回到臺灣就開始發高燒，去看了醫生，醫生說如果三天後他的藥沒有用，就必須去找他，然後轉到大醫院。我熟悉的醫生輕描淡寫地這樣說，沒有加重我的恐懼，直到事後我才知道自己得了什麼疾病。


    但奇妙的是，我卻開始深沉的發燒，然後一直睡覺。在睡夢中，我彷彿走到另一個世界，我好像曾經死在一個冰冷的世界，然後看見自己是個中國人，古代的中國人，很漂亮，卻不快樂，然後年紀輕輕就死了。


    高燒把我因為父親死亡而冷藏的心好像化開了，高熱也把我因為照顧父親而疼痛不已的肩周炎竟也治癒了。後來我聽氣功老師說，我夢中經歷的事，是在宮廷中被打入冷宮的死亡記憶。有趣的是，我的主治醫生很震驚，因為我一週就恢復了健康，他不知道我經歷了什麼奇遇。更奇妙的是，高燒也把我的手治好了，我的氣功師父也努力的協助我，把西藥的毒性盡快退出身體，就這樣，我又創造了一次奇蹟。


    但我明白，這樣的忙碌奔波，還是與我的心背道而馳。於是，二〇一七年一整年，我實現了一個計畫，就是一個月只做兩場課程，也就是兩個週末，其他的時間我決定用來思考、學佛，或是生活。


    後來發現，當我這樣休息的時候，我的收入反而更好，並且因為靈性的提高，似乎開始到了下一個階段：輕而易舉的獲得。我開始進入體驗真正所謂心靈與物質雙豐收的能量感悟，那就是「不必用力」。


    不要用力，不要揪心，不要費勁，不必算計。


    只要實踐了這四種方式，在生活中，你就會逐漸發現，原來自己可以這樣輕鬆的活著，根本不必擔心金錢，也不必用力地找機會去工作。


    以下是我的作法：


    - 1. 不忙是第一步，太忙將無法騰出空間去進入高維度的生活品質中。

    - 2. 開始玩耍，要一直玩到自己不再思考任何工作上的事情為止。

    - 3. 盡可能什麼也不做，工作完全放下，也許去畫畫，去讀書，去旅行。

    - 4. 開始運動健身，練習馬拉松長跑是非常好的一個身心鍛鍊。

    - 5. 勇敢放下心中大石，像是渣男戀情，或是不合適的事業夥伴或賺錢機會。


    人本來生而富足，不過我們的生活教育方式，總是讓我們有著莫名的擔心，於是我們學會了要不斷努力，不努力就會有罪惡感。我長年受制於這樣的罪惡感，花了快三年才逐漸解脫，終成目前的輕鬆富足，建議你也不妨一試，後面的快樂就是心靈與物質可以雙豐收。


    > 放得下嗎？就看你敢不敢一試了！


    ## 以愛療癒


    As above, So Below. 在愛的場域裡，我們需要了解「誠於中，形於外」的宇宙法則。這樣，我們就可以領悟到內在與外在豐盛的生活方式，愈愛愈有力量。


    ## Chapter 21. 提高覺醒的全頻道能力


    當能量提高到身心靈和諧時，

    心靈與物質雙豐收的狀態就會逐漸出現。

    你可以不必太過費力，只要順著流動走，

    就會發現有那種順流而上的機會出現。


    從「做自己」開始，境隨心轉，好運也開始展開。


    我七歲時的好友出現了，他看到臉書上忽然出現我的名字，而這個名字又不是很普遍，所以同學陳總他想，這是我的小學同學嗎？


    當年我和陳同學帶著弟弟出去玩要，我們聽說從士林走回北投不是很遠，於是回程時三個人便決定一起走回北投。弟弟差我們六歲，當然，我們自己也不大，才國小。但從士林走回北投，真的好遠，最後是陳同學背著弟弟回來。這段難得的小學記憶，我一直沒忘，特別是和弟弟共有的回憶。


    我當然記得這個好心的小學同學，卻記不得為什麼我們會去士林，還決定這樣走回北投。但真的很好笑！陳同學聯繫上我，他已經是事業有成的公司負責人，家庭也幸福美滿，有著很賢慧的老婆和一雙好兒女。我們先在網路聯繫上，有鑑於之前五歲同學的有趣前例，我雖然很開心，但助理們總會希望我小心點，畢竟我有出書，有上媒體，有點社會形象，又是靈能工作者，需要更加小心保護自己。也因爲因緣還沒到，我和陳總初期都是透過回臺灣的時候線上閒聊。只是沒想到，原來陳總也是我的貴人，他是電商公司老闆，所以他開始回答我相關問題，甚至來協助我們團隊創作最新的電商系統，與現在美美的專業服務網站。


    做自己的品牌，首先是命名。大家想了很多，卻始終感覺還沒到位。有一天，陳總急著找我，他說：「上官，你有個好名字，你知道嗎？」


    我說：「嗯，家族姓氏不能改，名字又是爺爺取的，希望以後的女子能夠有學識，不可以無才便是德。這樣的名字，也是很大器的呀。」


    陳總說：「對，所以，我說是好名字。因為『大家都要上官網』。」


    我沒有聽懂。陳總接著說：「每個網站都會有一句話在搜尋引擎：上官網……（請上官方網站）」


    於是，愛上官（ishangKuan），我的品牌名，就這樣出現了。中英文都有著意義和諧音，上網查詢時也很容易會不小心就進入我們的網站，因為大家都「愛上官」網。


    這個由來真的很有趣，但一開始，因為多年被壓抑的慣性，我真的很怕又被人評為「自大狂」一族。我本來的傲慢就被人欺負得五體投地，每天都恨不得趴在地上走路，好求人不要再攻擊我了。現在還來個「愛上官」，大家一定會聯想到「愛上官昭儀」、「愛上上官昭儀」，我的天！我已經有著與人無法親近的高傲女神感，加上這樣一個驕傲的名字，這還得了！


    但陳總說服了我，主要是因為「方便上網」。而我的內心世界，總有個對於網路世界的喜愛，因為網路和能量一樣，都是新世代的產物，而亞特蘭提斯時代的心電感應，也和現在的網路世界一樣。新世代的網際網路，活脫脫就是過去世代的現代版，這對我來說，真的是生命中不可以缺少的一部分。


    ## Part III 進入臣服天職的階段


    網際網路和能量傳遞是一樣的，只是舊酒裝新瓶，我們在新的時代，一秒鐘就可以和遠在地球另一端的家人、朋友聯繫上，和古代的能量世界，真的是一模一樣呀！就這樣，迷信的我接受了陳總的建議：愛上官
    ishangkuan，首先在香港成立了品牌規劃公司。


    我開始明白，原來不躲在一個以為安全的世界，走出來才是安全的。在那個不安的世界裡，我只想安居樂業，捧個像公務員的飯碗一樣，可以不必擔心明天沒飯吃，但弱小的我會希望可以得到家長的喜歡。這種無價值感，一直在獨立之前是不會得到療癒的。


    奇妙的是，一位住在北京的靈媒姊姊，一直默默地支持著我。她一直鼓勵我離開原來的組織，做自己。我沒有和姊姊有任何的關聯，但她一直在默默地支持著我的蛻變與覺醒。


    有一天，我又很挫折，我問她：「姊姊，你為什麼要這樣無條件地支持我呢？」她說：「因為你值得。」被同樣是靈性的人士認可，是一件開心的事，特別是在別無所求的人身上，你會感覺到更多的關懷和鼓勵。


    我開始明白，自己得道多助，但我一直覺得自己不夠好，沒想到就是有人可以這樣無條件的支持。相較於第一次接觸身心靈時遇到的老巫婆，這種療癒的質感差距實在太大。中國人的世界，我們應該要更有中國文化傳統的能量，這種道德的能量，似乎更是現代人們身上所需要喚醒的。


    我決定要跳出原來的巢臼，學習做自己。這個決定，整整走了三年。


    我開始走出所謂的身心靈做法，既然我們能感知能量，為什麼不能創造呢？正巧，有更多的人開始對於全腦開發與能量場域好奇了起來。我接受了上海一家教育集團的邀請，擔任教育顧問，後來甚至帶人員下市場做培訓，許多以前沒有實驗過的事，現在全新體驗。


    ## Chapter 21. 提高覺醒的全頻道能力


    要把自己的過去放下，全部更新，實在不是很容易。每天，我都和小助理加班忙到晚上十二點，然後第二天一早再回到辦公室繼續認真研究和規劃。略通命理的我知知道，中年後我必須歷練更世俗面的事情，就是進入商界。本來想出家的我，現在竟然坐在上海的繁華區，坐在自己的辦公室裡，研究著教育市場，然後面對一群我永遠也不會認同的左腦型人員，這真的是很棒的挑戰！


    當時我天真的想，讓右腦型的人可以聽懂不稀奇，如果讓那些不信的左腦人聽明白，那就真的很酷了。我接受了挑戰，也面臨了前所未有的信念考驗，硬把自己推離舒適區，推離熟悉的環境不做教主，然後走出來面對人情世故，我覺得這是我開始成長的一大步。巧妙的是，在這之前，我因故得到了機會，和一些上海的彩妝與公關公司連結上，開始接受時尚公司的邀請，不僅在線上開課，也再次做現場的活動。許多活動不是很難，同樣是講色彩，同樣是用能量來療癒，同樣是愛上自己喜歡的道路，換個公司，也不是很難。唯一難的是，講出平易近人的能量語言，一樣用色彩當工具。


    於是，我開始小有名氣，被我做過的公司都會賺錢，被我參與過的能量場也會業績快速提高。就這樣，我從純教學進入做身心靈的老師，然後搖身一變成了舞臺講師，後來又簽了演藝人員合約，不僅接了國際品牌，後面又接了中國本土非常知名的保養護膚品牌，甚至還有各種品牌合作的機會。這所有的經驗，對我這個不知變通又不懂結人脈的能量教書匠來說，實在是很感恩的機緣。


    一路走來的每一個機會，每一位遇見的朋友，我都用心體會，認真學習。我相信，能量不是給少數人用的，能量是給天地的生命一起用的。如果我們有能量的訊息可以傳遞，那也不是個人工具，不屬於某個人，而是這樣的訊息更應該要分享給大眾，分享給那些聽得懂的大眾。


    我懷抱著理想，朝著迎面而來的機會去實現夢想。


    不過事情總不是很能如願，面對那些永遠也聽不懂的人群，有了經驗之後就得放下。在不同物質理念的團體中，我感覺不是很舒服，也無法發揮。因為他們永遠只活在物質和人性的思維中，沒有辦法對頻。相對的，當我覺得能量的浪費比得到的還多，和我的意念相反時，就表示該離開了。


    雖然離開總裁顧問及教育部長的工作，但我覺得十分感恩，感恩能夠有機會受到賞識，把理想付诸實現。公司每個人員，從上到下，我都感覺到在中國大集團中集體創作的美好與激動。也因為這樣的磨練，我沒有活在一成不變的環境中。美好的禮物就是，我發現自己的功能竟然愈來愈全頻道，可能因為我沒有太多設限，並且很努力的開發，於是所有的功能都出現在我需要的時候，而每一次的演出與表現，我都無愧於天地，讓每個能量場得到它應有的療癒。我想，這或許就是我的功能。


    我的功能逐漸被環境所激發，雖然還處於摸索階段，但我深深明白，自己不是屬於口才好的人，我永遠也無法學會並跟上那些上臺口若懸河、反應快的能人異士，我不屬於那樣的磁場和功能。試了幾次需要花很大心思、不停用口才、用盡力氣討好的場域後，只感覺到更大的消耗，於是在集團磨練的場域中，往往三次內我就可以理解沒去過的地方會是什麼能量，一旦理解，感覺對自己靈魂沒有提升的事，我就再也沒有興趣去做了。


    靈性洞見一看到虛假的自我狀態時，靈魂就會覺得很疲憊，不想停留。這種自動的屏蔽功能，我一直很想突破，而隨著功能愈多，能量不斷提高，雖然心裡排斥，但我仍會有所節制的參與。


    讓自己投入這樣的場域，是因為我想練習自己不懂人情世故的個性，很想有所突破，所以常逼著自己去接受磨練。


    慢慢地，我愈來愈體會到人生不是用來浪費的，我開始可以更安靜地不忙著安排自己的行程，努力工作賺錢，或是聆聽一場國際講座，試著和世界上聰明的科學家或心理專家接上線，然後覺得自己也被提升了。這樣不放逸的感覺，讓我愈來愈喜歡自己的「坦白」和「堅持」。這樣的我，也讓自己愈來愈喜歡和滿意，不再只是看到自己的不美好。


    我想，高感知功能的提升，是因為要做更大格局的事，而不是用來浪費和沾沾自喜。也因為心靈一直感到痛苦，想要的得不到，得到的不想要，有時候也不知道自己想要什麼。靈魂在徘徊時，就會想要知道答案，這種動力，督促著我去找尋自己。


    終於，我找到了答案，那就是，快樂。


    無所求的快樂，就可以提高磁場。


    當能量提高到身心靈和諧時，心靈與物質雙豐收的狀態就會逐漸出現，你可以不必太過費力，只要順著流動走，就會發現有那種順流而上的機會出現。高頻的能量人士會抓住機會，這種高頻並不是只有靈性人士才有，馬雲、郭臺銘、美國總統川普，他們都有一定的頻率，去感受到某種覺知，把覺知放在這種順流而上的機會中，自然就可以成就某些心中想要發生的事情。


    所有這些成功的人們，都有著極高的快樂度，這種快樂，可以說是一種成就感。這就像是你完成了一個作品，很開心，很有成就感；如果失去了這種成就感，就會從原來的寶座跌落下來。培養這種高頻的成就感，也可以鼓舞一個人全心全意地去發揮。


    那些只會計較、擔憂、恐懼、算計，或是一直不敢大膽放下過去，勇敢走向未來的人們，頻


    > 核心體悟

    > Core Enlightenment'
  mdcn: '## Chapter 20. 心靈與物質雙豐收


