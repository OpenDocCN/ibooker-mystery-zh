    ## Chapter 24. 轉換頻率到下個階段


    一個人的快樂或痛苦，都在於自己內在的平衡。

    如果可以平衡，便表示可以合作。

    感覺平衡，也不會有著失衡的翻滾。


    合作（cooperation），是很重要的一種社會能力。

    在能量的世界中，合作的能力也代表了建立關係的能力。關係，是一種「連結」的力量，「建立關係」卻是一個巨大的工程。然而，今日已經進入了網絡時代、區塊鏈時代、電商時代，所有的一切連結，正如同新世代的能量世界，人們可以靠著心電感應尋求靈感，也可以運用自己的心，形成一個發送和接收的收發器。

    關係，就像是這樣的一個狀態，所以我看待關係如同能量網絡。


    由於自我太大，不是很懂得合作，因此早些年我總是受到關係之苦，屢戰屢敗，又屢敗屢戰，卻一直無法領略其中的奧妙。奇妙的是，我卻又是專門處理解決關係問題的能量治療師。

    從能量的角度來看，可以中立客觀的找到別人的解藥，卻不容易解決自我內心的思想問題。可以說，我努力希望平衡，卻一直在失衡中擺盪。


    合作很難難真的平衡，主要的緣起和禍因都是「自我」（ego）。我們在人生中所有的一切都與「合作」有關，而所有的關係（relationship）也都和能量的運用技巧有關，兩性關係、同事關係、家人關係、事業關係，甚至你去問個路，都需要合作。


