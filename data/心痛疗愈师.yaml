    一直以來，在靈性的道路上，「療癒死亡」一直是我沒有變過的工作。甚至在從事色彩能量工作、甚至踏進靈性世界之前，「療癒死亡」就已經是我的工作了。


    有時候一覺醒來，覺得自己死過一次；有時候一個觀念改變，也覺得仿若重生。這種不斷蛻變的經驗，一直不停的發生。


    只可惜，在幫助很多人重生或挽回生命的過程中，信念的問題真的是最大的考驗。每個人都有著自己一套相信生命健康的辦法，很難接受其他人的建議。有的人寧可到處去宮廟拜拜或找他的上帝，不會認真的去研究自己的身體健康要如何挽回，如何治療？也有的人完全被恐懼所蒙蔽，任何的方法都好像是要騙財似的。在我認識的民俗醫療，甚至可以協助的靈療治癒法，往往因為不夠信任，就算能由靈性場域挽回性命一陣子，最後也都敗在信心上。更有的，只相信醫生的手術，寧可信眼前的，也不肯相信自己的信心療癒，還有細胞療癒、能量療癒，相信自己可以幫助自己。


    不論是信神，或是信醫，這中間的信念才是關鍵。因為如果沒有強大的信念，願意自己幫助自己健康起來，誰都沒有辦法伸出援手來幫你解決問題。


    我曾經見過基督教和佛教中非常虔誠的人士，或是很核心的主辦人罹患癌症，大家都說：「怎麼你的神明或上師沒幫助你呢？」當事人本身也會覺得很質疑，「我非常虔誠，為什麼我的神明還會讓我生病？」


    當然，各種教派都有一套說法，但在我看起來，實際上是自己真的沒有療癒自己的心，也沒有真正有效地面對治療這件事。經驗實在太多了，也給我上了很多很棒的人生課程，有時候，不一定要真的病過才知道要健康，不需要真的離婚或墮胎才知道婚姻或愛情的問題，也不需要真的親自體驗，就能提前預防。而預防的態度，更不是因為恐懼，所以事事要用害怕的心來小心提防，這種拿捏，真的只有我們這樣的工作者才能學到精髓。


    沒有處理過生死，永遠不知道有很多方式可以預防和面對呀！


    每個人都會死亡，我們每天都在面對死亡，走向死亡。所以，如果趁著健康的時候可以準備好，這樣等到死亡來臨時，我們就不會措手不及，也不會呼天喊地，反而可以安靜地面對，快樂的離開。


    最近臺灣有個安樂死的案例申請，電視知名的運動新聞主播傅達仁罹患癌症，可能活不過幾個月了，他到瑞士去申請加入安樂死的會員籍，並且安排全家進行了一場旅行，上百萬元的花費，只為了陪伴他「回家」。雖然，當事人事後又因為眷戀人生而沒有執行計畫，但試想，有多少人會決定自己的死亡時間呢？耶喜喇嘛的故事就是一個很好的案例。其實，醫生在一檢查出心臟病時，就告知他已經得到嚴重的心臟病，但他始終沒有考慮進行手術，反而繼續忙碌地進行佛行事業，結果這樣也依然活了下去，並沒有如醫生預言的「快死了」。他在圓寂前考慮是否進行心臟手術時，卻表示自己已經心滿意足，沒有憂慮，因為他已經為僕服務他人，覺得自己做得足夠了。


    這種豁達，覺得人生已經滿足，又有多少人可以做到呢？恐怕真的只有大成就者吧！而現今，我們如果不期許自己成為大成就者，至少也應該要期許自己死得漂亮吧？


    1. 躺在床上，想像自己已經進入死亡的準備階段。

    2. 回想自己的一生，那些快樂、痛苦的人與事。

    3. 重新感受自己痛苦的過往，心裡對這經歷心存感激。

    4. 重新回想自己快樂的過往，然後謝謝這一切的經歷。

    5. 提升自己的靈魂感受，在高感知中與自己的靈魂對話。

    6. 融入到金黃色溫暖的光明中，和宇宙的力量合一。


    我們因愛而生，因愛而死。因為有生，所以必然有死。在愛裡，沒有生，也沒有死，只有愛，可以伴著我們走向寂滅。


    # Chapter 18

    ## 治療師的愛與欲


    在愛中，我們必須先找到自己的靈魂，才能遇上對的靈魂伴侶。


    身為一個能量工作者，考驗是很多的。因為情緒敏感，所以也很容易添麻煩。很多時候，受到原生家庭的影響，多情又渴望愛，好像成了一種注定的模式。人天生對於情這個板塊，特別難處理。換句話說，可能對親人、朋友特別有情，而處於一種很容易自陷困境的狀態裡。正是這樣的困擾，於是更容易鑽研在療癒的世界中，所以大多數的治療師，都有著辛苦的過程，或是心酸的歷史，天生擅長這個領域工作卻沒受過苦的人，實在是少之又少。


    這就像是雞生蛋、蛋生雞的問題一樣，很難知道誰先開始這場輪迴。


    愛有很多種層面，有個網路故事是這樣的：一個女人很容易煩躁，一是因為身體疲憊，一是因為缺乏愛和性的滋養。而愛，是一種舒服的極致。所以，如果知道如何舒服的相愛，那麼愛就會滋養心靈，也會滋養身體。


    許多女性治療師比較像老師，容易指出錯誤或挑出細節上的問題。這用在工作上非常專業，而且必然可以幫助更多的人；但如果進入兩性關係中，面對像小孩的男人，就會失去效用。試試去跟小孩子講道理，或是去跟正在鬧脾氣的孩子說話看看？


    往往跟小孩講道理時，小孩就不快樂了，但如果能夠快樂又有愛，不斷地給予支持或愛的教育，小孩就會勇往直前。因此，讓心回到童年的快樂，就可以快樂的享受當下，而我們和父母的關係，就如同伴侶的關係，要嘛依賴，要嘛分離。能量工作的人，應該在協助他人發展獨立又能相愛的關係前，需能夠建立起自己的界限和完整獨立的人格特性，而這需要學習與培養。


    有時候到底是活在自己的幸福裡？還是活在他人眼中的幸福？身為能量治療師，必須不斷的搜索這個答案，並且找到靈魂在身體裡的幸福感受，才不會被愛的欲望所蒙蔽。但這條路，何其不容易啊！


    > ※


    我的感情路是單純而失敗的。我常常感受不到自己是一個只有一種關係的人。記得在大學時，一天走在回宿舍的路上，我看到美麗的月光，路燈和月光映照在路上，顯得非常美麗典雅，我覺得自己在那瞬間，簡直可以愛上那個月亮，也可以愛上那盞路燈。這種多情的感覺，實在讓我感覺超級好笑。


    有人會這樣愛上路邊的一朵花嗎？我會。我甚至會愛到不忍採下來，只能每天經過時對著花朵傻笑，我覺得我真的「很愛」。很多的愛，對他人、對個案的愛，是沒有限制和痛苦的，並且充滿希望和呵護。當治療師付出愛的時候，很像愛一盞路燈，愛一彎新月，這種愛，在治療師身上真的很常見。不過，當進入到兩人的關係時，就很容易變得自私和掌控。


    很多時候愛和恨是同一種能量，甚至，有愛也會有恨，愛和恨的能量其實是一樣強度的，只是一個令人上揚，另一個讓人下降。但是，都可以給人帶來強大的生命力。所以，對治療師來說，愛也是一種考驗。


    對我來說，因為敏感的關係，讓我很難從信任中走出來。雖然一方面充滿愛和慈悲，但被負面能量煽動時，過度的敏感就變成了猜忌，很容易讓敏感的心變得更為神經質，在兩性關係中正是如此。我天性容易信任他人，這是母親一直非常擔憂的，我不容易懷疑，而且容易執迷不悟。所以，在愛的道路上，母親非常渴望可以保護我，但我總是在想，即使成為父母眼中的好孩子，還是可以在勇闖情關的路上徘徊。


    然而，在國外求學生活時，連外國人的搭訕我都不敢回應。因為雖然對於愛有強烈的渴望，但另一方面，又因為靈魂深處似乎有另一種桎梏在箝制著，以致令我無法自由自在地與人談戀愛與交往。


    記得有一次，一位男性想要與我交往，但每次要來見我之前就會摔倒或發生倒楣的事。更誇張的是，連在餐廳吃飯，都可以有蟑螂掉到他的頭上，我覺得這男生也太倒楣了呀！另一方面，我也覺得是不是自己身上有不好的能量影響到對方？畢竟對方不是修行人，沒有任何信念和能量概念。


    本來還在苛責自己是不是帶給他人不好的能量時，卻忽然發現，對方雖然是朋友介紹的，卻同時跨著兩條船，也就是說，對方想同時和兩個女性交往。這奇妙的經驗給了我很大的感觸，難怪他每次來見我的時候總是障礙重重，離奇的倒楣事一再重複，最後一次就是蟑螂掉在他的頭上，而我實在忍不住笑了起來。當然，這場朋友介紹的相親就破局了，幸好不是什麼好男人，失去了也不覺得可惜。但是，我感覺自己備受保護，內心充滿了感恩，也開始放下一點不安全感。


    我的治療師老師們，很多在私下相處時都是如此的侷促不安，甚至有的很害羞，我也是這樣。我可以很努力地挖掘個案的問題，但自己的內在卻很難釋放，對於想要和我交往的對象，我也往往不知所措，這種情形延續了很長一段時間，直到我遇上了可以包容我的靈魂伴侶，我才逐漸釋放出這種尷尬的處境。


    在愛中，我們必須先找到自己的靈魂，才能遇上對的靈魂伴侶。如果我們一直處於徬徨與恐懼，對自己的人生仍充滿了追尋與迷惑，那麼，在這條路上所遇到的臨時男主角，都不會是可以持續相伴走下去的
    Mr. Right。


    我有時候從一對正在交往中的男女眼睛中，就會看到他們是不是一對合適的伴侶。因為靈魂目標相同的人們，會在靈魂之窗看到同樣的火光。如果一對非常契合的夫妻，也會看到他們有著相仿的氣場。這種感覺很奇妙，在亞特蘭提斯時代的傳說中，在當時人們要結婚時是需要先檢測氣場，才能測出男女雙方是否契合。而孩子在很小的時候要找到學習的方向時，也需要先檢測氣場才能知道。


    這在我們的世界中很難想像，但在我看到氣場時，感覺這種傳說特別有道理。我們常說物以類聚，或說近朱者赤、近墨者黑。這種氣場理論在我看來，是真實得不能再真了。可以說，這不是一種理論，而是真理。所以，如果一對夫妻已經沒有任何連結的理由了，像是金錢欲望、社會名譽，或是同心合力想把家照顧好，那麼他們也會逐漸脫離彼此。一對貌合神離的夫妻，從氣場上絕對可以看得出來，騙不了人的。


    > ※


    愛是一種提升，但也是一種辛苦的歷程，如果沒有經歷愛的考驗，就沒有提升。直到遇到全然包容與呵護我的男人之前，我一直都沒辦法遇到真正願意無條件付出的男人，有的是被我的「特異功能」嚇跑，有的是被我的保護能量（蟑螂兄）嚇跑，有的是本身個性古怪而無疾而終。


    總之，身為治療師，很容易遇到的不是愛人，而是病人。如果治療師無法去分辨，而且有著對愛的強烈渴望，那就很容易進入愛情，但卻很可能是一場辛苦的愛戀，甚至是虐戀。


    我在一次自以為心痛的爱情后，就觉得自己从前世到今生，就是个不适合爱情的人，虽然渴望，却无法实现。那段自以为是的伤痛爱情，最后以认为对方背叛而分手收场，但多年后我才惭愧地觉得，原来那也不是爱，因为大家的心里其实都不懂爱，又怎能算是爱呢？


    > 我們為什麼會受苦？是因為我們根本不知道自己要的是什麼。我們往往會說「想要愛」，但仔細推敲一下，到底什麼才是你想要的愛？有時候很模糊的我們，根本就說不清楚。而不知道自己要什麼愛，也就無法清楚地得到靈魂之愛。


    有一次我的幼稚園同學找到了我。五歲時候的朋友，找到我之後，才知道對方在愛中充滿了心酸與無奈，本應是享福的年紀，卻因為娶不到賢妻而過著辛苦的育兒人生。


    當我聽完對方辛苦的愛情故事後，我忍不住畫了一幅畫作送給對方。我透過對方知道，原來我們以前「曾經」兩小無猜，當然，五歲小朋友的故事我早已不記得。回家找媽媽詢問的時候，媽媽竟然告訴我，我雖然不是長得美若天仙，但自小就很吸引人，老是被男同學喜歡。這令我感覺實在誇張，與我對自己的認知是完全相反的，我以爲自己不是很有異性緣，但媽媽卻作證，我一直「很受歡迎」。


    我當晚開始回溯，知道自己可能前世到今生都沒有很順利的情感生活，甚至不少經驗中都是修行的背景，不論是西方還是東方的記憶都是如此。於是，當那位同學在四十年後來找我時，我便很想把這種感受畫下來。


    還記得那天畫下來的療癒畫很有趣，一開始我覺得困難重重，甚至畫出像是監獄的框框，一直畫著一顆心，一顆好大的、紅色的、熱情的心，然後，逐漸像剝落似的，透過許多生生世世的過程，心痛的愛逐漸昇華為柔軟溫暖的心。在這圖完成後，我也徹底轉化了自己的誤解。


    原來我不是一直在情傷中，而是一直在多情中。情很多，不怕傷，傷了之後還會復原。難怪我雖然沒有很好、很多的愛情經驗，但我總能感受到自己內心有很多、很滿的愛，像是很多愛給了幼小的弟弟，很多愛給了我的父母，許多愛又可以給無形的生命，甚至從小學開始，就發動全校捐愛心捐書送到泰北，也有很多愛從國中就一直做「愛盲讀書」義工。我總有著很多鬼點子可以幫助不同的人，甚至第一次開女性工作坊，訓練可以在家工作的女性成為雙手治療師，都是因為看到受家暴的女性又得在家帶小孩，而那施暴的男人往往又無法提供良好的經濟照顧家庭，我一氣之下，就開了這樣的培訓班，配合我進口的能量精油，藉以支持更多女性獨立自主。


    在能量畫的過程中，我已經完整蛻變。我理解到自己不是悲傷的人，而是勇敢有愛的人。於是，把畫送給幼稚園的同學後，我對這一場相遇做了祝福與結束。之後好像再也沒機緣可以再見到這位同學了，但對我來說，這五歲的記憶，已成功療癒了我對前世愛情誤解。


    我的日本同事曾經告訴我，她是到五十二歲才遇到美國男人的真愛。當時的我沒有很在意，但我明白她想告訴我的是，「不要將就，要做你自己。」終有一天，你會發現，真愛就在莫名其妙不經意間出現。「一晃眼，她說這話已經十年了，而我也在莫名的機緣下遇到了愛情。


    關於愛情，我理解到這是一個有趣的功課，卻不是我的主要功課。也許每個女人的生命功課大不相同，有的女人忙於繁衍後代，但我卻不是屬於這類型的女子。因為我無法被框在一個兩人的愛戀中，而失去靈魂更大提升的機會。


    但關於愛，卻是我一輩子的功課，把愛延伸到更廣大的層面，或許是我最好的課題。如何不緊緊抓住屬於自己的愛戀與依賴，而把愛的層級繼續擴展到更多人的身上，這些愛的體悟，隨著年齡的增長，開始讓我理解，可以用不同的方式來呈現愛的品質。


    這是清楚能量的人需要明白的。愛是一種無私的表現，愛也是人終其一生追尋與擁有的寶物，值得我們一直在愛中體會生命的美好。


    對於愛，我也才發現，原來我是擁有很多的愛，所以才能成為一個帶光的天使，可以給予更多能量的支持。沒有了愛的本性，就無法提供更多更強大的療癒力了；也因為有了愛的靈感，所以才能連結更多超維度的神靈，感受到世間更多美好的愛和力量。


    父親的離世對我來說還是很傷感的，特別父親的靈魂一直還是掛念著我的婚姻，擔憂沒有人可以照顧我。天下父母心，我這個天下女兒心也是一樣，我也很渴望能夠滿足父母的要求，讓我的父母無憂與滿足。


    就在父親過世前，一位非常疼愛我的男士出現了。我們沒有什麼交往的關係，但他卻非常關心我的雙親和我。在沒有交往關係的時候都如此疼愛，甚至願意照顧我的家人，這種關懷令我很驚'
  mdcn: '# Chapter 17. 再次面對生死關


