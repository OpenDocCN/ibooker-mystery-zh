    家中的經濟情況一直不是很理想，有時候我賺的錢，前腳進後腳出，沒有在手上熱一下，就馬上得轉出去。我用了很多種方法，卻不能明白為什麼家中始終缺錢。這也造成了我的拚命三娘不服輸的個性。從小我就有個強大的信念，就是可以為我愛的人去拚命。所以，因為很努力的個性，讓我的工作沒有停滯期。不過，生存的考驗，在一個不太能以金錢計算的世界裡，還是很辛苦。特別是人性在遇上金錢的恐懼時，往往脆弱到不堪一擊。


    剛拿到色彩諮詢師的資格時，我就開始被流言攻擊，二十年來從未間斷。一開始的流言是指「我不具資格」。我不太明白靈學老師和佛學老先生對我的鼓勵，是因為見到了未來的什麼景象，但我對於老師們的鼓勵從不懷疑，所以我認真的在色彩療癒的團體中努力認真工作。我一直以為把自己弄好，不隨便對人哭泣抱怨，遇到他人有狀況時認真解決，一個人只要有專業和風骨，總是會有飯吃的。事實證明也是如此，我從未失業過，但對人性的不理解，就算會看能量，也是常受到驚嚇，不明白人心的黑暗。因此，對我的工作來說，要一直眼見黑暗，就是一種辛苦。


    同業的攻擊我覺得很奇怪，但一古腦地為了家人的生活而努力，總沒有多餘的時間想太多，而我深信兩位老先生叫我利益眾生的工作是不會害我的。所以，除了認真工作，就是努力修持自己，追求一個女人想要的幸福美好。我以為人間應該還是光明美好的，而我，就是光明的使者，我是帶光來給他人照亮的人，我是這樣相信的。


    不過，世間法好像不像我們讀書和打坐那麼簡單。


    臺灣的殺價文化、人情文化、八卦文化、抹黑文化，連小小的身心靈界都分派分系。老師和學生的交惡背叛，同業的互相競爭，到了國際場合依然自己人攻擊自己人。我很幸運沒有什麼同輩和同業，因為在一開始我就是一個人。但是，臺灣的市場是，當大家都覺得這是一個好賺錢的門路時，就會出現很多一起搶飯碗的人。我一直以為盜亦有道，賺錢在身心靈界應該是最守道德的環境；不過後來我發現，好像我也有所誤解。因為對於有錢的人來說，賺的是另一種金錢價值，但對於生活匱乏的人來說，搶的只是金錢，完全沒有步數和格調。


    我錯估了這個世界。雖然還是很努力地做著我相信的心靈志業，而且朦朧中知道自己被上天保佑著，得道多助，但我的眼睛和心總是會被黑暗的事物所吸引。愈光明，黑暗的包圍就愈多。漸漸的，我不得不把心思，只用來關注在自己的內心平衡和養家餬口上，不太去想更高層次的事物。因為如果我期待很高，那麼失望就會愈大。


    對我來說，我總是很難在心靈與物質間找到平衡點。我的辛苦在於，得為了養家不能出家或離群獨居，也有因為有著「天命」，而必須認真誠實的面對自己的內在世界。一個做著標榜平衡與愛的工作者，卻與平衡愈來愈遠。我不知道從什麼時候開始，我對工作沒啥大樂趣，錢賺得容易，卻一直被黑暗人心包圍。我滿滿對人的熱忱和愛，逐漸被黑暗的人事物和負能量吞噬。


    漸漸地，我愈來愈聽不到自己內心光明的聲音，我感覺自己不能融入黑暗的那個族群，但我又脫離不開這個賴以為生的群體。愈趨近核心，所見的黑暗就愈多。慢慢的，我對於我的西方師父們開始產生了懷疑。我想，他們如果夠高，為什麼還對金錢放不下？為什麼慾望愈來愈大？為什麼臉愈長愈歪斜？為什麼不是創造各國和諧，而是在各國創造各國人民的自相殘殺？我也不能明白，為什麼靈性導師自身的情感關係也如此複雜？我的誤解和質疑愈來愈大。


    我發現，坦白和熱忱不能真正贏得靈性導師對我的喜愛，原來還是需要會巴結與搞崇拜。我很努力地為了我所信仰的靈性事業努力著，卻逐漸發現這些為錢爭執的問題愈來愈多。我也發現自己如果太聰明，功高震主也一樣會被不友善的對待。更重要的是，我以為人與人是有情有義的，特別是在一個重人性的心靈環境，但服務了二十年的機構，依然會有「信任」課題。而不信任的源頭，卻是從一踏入行業就遇到的「流言」與「八卦」。


    我不是明星，不會承受像那些大明星所面對的流言蜚語，但我在業界或許是個混得久的小明星，當我只想穩穩的依照正能量法則來教化人心，或是用另類的自然醫學療法，為一些信任我們的朋友解決身心靈的迷惘與痛苦時，我發現自己也無法倖免於難。永遠也無法擺脫大家的目光，也無法擺脫所有人的偏見，就算再努力完美，不心存惡念，為自己曾經的過錯或魯莽懺悔懺罪，要繼續責怪你的人還是會繼續責怪，想要把你搞垮的人還是會繼續他們的志業。因為唯有這樣，他們才有活下去的力量。


    負面的生命力，永遠大過愛和光的影響力，但也比較容易賴以維生。就像在選舉中的抹黑或社會中任何的負面傳言，你只能在傳言中成為傳奇，而傳言就是提升你變成傳奇的強大動力。曾經我一個彩油'
