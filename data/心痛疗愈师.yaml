    ## 能量工作的職業道德


    一行禪師認為，關照生活的問題，才是真正的法。

    因此，落實到生活中的正念覺知，就是非常重要的一項修練。


    職業道德一直是能量工作者最重要的世間法，因為職業道德是延續工作生命力的關鍵。

    如果不明白職業道德的重要，就沒有辦法把這個工作的精華呈現出來，甚至在只賺到一筆錢後，就會消失在業界，甚至生病。

    我是在做這個工作很久之後，才明白這個道理的。

    剛開始時，其實我沒有人帶領，就算是我以為可以依靠的學校，也沒有良好的制度可以來指導我們。學習中擁有的，只有個人崇拜和使用產品的訓練。

    該怎麼開始呢？我找到了描述如何因為理解《金剛經》，而入世間法修練的《當和尚遇到鑽石》。在當年開始做能量工作時，這是一部好的參考書，因為作者以銘印（imprint）的概念，施行六時書的修練法，讓我感覺和自己的修練十分接近。


    > ⑨銘印：在《當和尚遇到鑽石》的書中描述業，是以「心的銘印」來解釋。心就像是一臺錄影機，永遠保持錄影狀態，眼耳及身體其他部分是錄影機的視窗，好壞的感受銘印會有身（行動）、語（說話）、意（思考）的三種方式植入種子，最重要的是思想。心理學上稱儲存在潛意識中的信念，透過環境存入個體意識中。


    ## Part 進入臣服天職的階段


    既然人家可以從出家人還俗成為大商人,我也被師父叫我回到世間好好做我的天職,那麼,這樣的人應該是我可以學習的成功典範。就這樣,這本書成了我的開店指南。


    我需要活在心靈的世界中感受到愛與支持,但我的支持對象卻不是家人和老公或親戚,我從無開始,唯一能靠的,只有這些數千年的傳承力量,還有我的勇氣。


    人家說「關關難過,關關過」,就算撞得頭破血流,想想古聖先賢的歷練,以及大乘佛法的「利他」一心,我這點小傷就不算什麼了。就是這樣一股傻勁,我每次感到迷惘時,就去查書,書裡面有許多問與答,你遇到的商業經營問題,都可以在書中找到。也因為這樣,所以我喜歡在各地設立諮詢服務中心,可以支持找不到工作、有情緒疾病,或是需要住所的人。這些不同支持他人的方法對我來說,主要是因為「愛」,所以我很認真的去實踐。


    其實一開始,生意好到真的很誇張,沒有宣傳,沒有什麼門面,每天小地方擠滿了人。從一個人開始,到後來不得不請個助理,如同靈學老先生的指點,我開始了靈性工作,用我自己猛闖的精神,勇敢的開創著自己的道路。


    ※說不清開始的精神如何確立並存在,但開始就是開始了。現在想起來,所有事情的開始都需要一股傻精神。


    就是因為別人沒做過的,我們才有機會;就是因為從來沒實現過的,所以我們才需要來試試看。


    ## Chapter 19. 能量工作的職業道德


    我把國外的新時代商店搬到了台北,很小一間,店中每天都來了很多人,許多後來的名人,在追尋自我或是想入行前,都來過這個超心靈新時代商店,因為在當時只有這一間。除了喜歡塔羅牌、占星學、花精、療癒、色彩的國內、外朋友,諮詢的個案也很多。對我來說,一個小小的地方卻能崛起,除了上天的眷顧,我想不出還有什麼道理可以解釋。


    這是一個新興的行業,因為我不是開精油美容業的人士,也不是傳遞新興宗教的道場起家,更不是屬於命理師出身,對於我這個奇異冒出頭來的人,引起了所有人的眼紅。而其實,我常常有靈感寫出一些內容,像是占卜類職業道德與規範,事後在國外的相關書籍中看到類似的內容,連自己都嚇了一跳。


    我做的事,在他人看來像是首創,可是對我來說,好像不是第一次了。我做著熟悉又陌生的工作,以色彩諮詢或占卜起家,但是我憑藉的卻不是命理,而是一般能量感受。常常在小小的商店裡,許多奇妙的個案客戶都會帶給我能量的奇異體驗。


    有一次,我忽然「看到」許多女生的下腹部,都像是穿了中古世紀的黑紗蓬蓬裙,當然不是真的穿了裙子,而是像蒙了一層紗質的網狀在身體外側,我揉了揉眼睛,有的女人有,有的女性沒有。我不知道這樣的情況讓我看到,是為了什麼?我的個案諮詢內容中,也沒有人提到她們的腹部發生了什麼問題。於是,我打算想辦法去弄清楚,開始旁敲側擊找答案。


    在一一的專訪中,最後我發現,只要女性有生理感染的現象,像念珠菌感染,生殖器官會搔癢,就有這層黑色網狀薄紗。有這現象的大多數女性都有著共同現象:脾氣暴躁,時不時就會發怒。


    我從我的助理身上就看到了這一點,但我以為是因為她有著憂鬱症,後來才發現,原來女性的生理不適,對女性的情緒與思維有著極大的影響關係。我開始詢問國外的合作專家關於病理型特色,然後在工作室附近去掛號找了婦科醫生,想體驗下生病的感覺。


    ## Part 進入臣服天職的階段


    當護士問我要看什麼問題時,我就把我的個案告訴我的情況告訴護士,於是,觸診,塞劑,回家坐浴。當我把醫生給的藥拿來做自我治療時,我感受到很多女性的頭部能量問題(頂輪),和生殖器官(海底輪)是直接相通的,換句話說,如果一位女性她在性器官上出了問題,或是性生活不能協調,就會出現腦子偏激思維的問題,這個大發現太棒了。


    因為大多數女生就我的靈視看到的,幾乎都有著網格在生殖器官外圍,也就是說,多數女性多多少少都有這方面的病理困擾,然後影響到情緒。而我擅長用植物油、水晶和色彩來產生正向振頻,於是我把震動海底輪的玫瑰與粉紅色,搭配平衡頂輪的薰衣草紫色,一起用在這樣的女性身上,然後,她們很快就得到了改善。


    但我不能說我看到了什麼,這是我的職業道德。因為我相信老先生說的,道破人的情況就得處理,除非個案本身自己明白,否則我們不能主動說出來,只能引導這些人們去自己找答案。


    這個論點和我學習色彩諮詢時是一致的,所以,我很堅信不能用論命或傳統通靈的方式來告知客戶,雖然這種做法無法一下子吸引很多信徒,但至少我不必擔心替對方背上業果的後遺症。自從弟弟過世後,我變得很小心翼翼地愛惜自己,我還有父母要供養,暫時不能隨便生病,更不能因為從事了這個奇怪的行業,而導致父母出現疾病或受到負能量的牽連。


    在初期的工作上,我鑽研很多,也非常努力。主要是因為這樣的靈性洞見天天都會發生,也一直會出現許多需要投入心力,為來訪者找到解答的努力。


    記得剛開始時我經常不舒服,卻不知道如何解決。有一次,一天來了三位女性,當她們離開後,我開始無預警的下部出血。我很清楚知道,這不是例行的生理週期,但我不明白為什麼會出血?到了晚上整理個案紀錄時,我才明白,原來這些女性都有墮胎經驗。相信我,你不會想要有這種體會的,下部實在很不舒服。我不能明白，為什麼女性為了愛與欲，可以用另外一種方式來傷害自己而不自知。更糟的是，她們走後我還得「處理」一下。幸好我的內在充滿光明，這些能量不會黏著我太久了。


    我體會到，一個人如果能量是正向的，就不太會與負面狀態連結，更重要的是，你的光不僅可以照亮所有的生命，也不會讓自己受傷，只是必須學習「不對抗」。如果個性中對於不熟悉或不適應的人事物會強烈的一「對抗」，這種抗拒的能量，反而會讓自己身體的不舒服持續更久。


    所以，找對靈性的師長很重要，但我的師長只是要我好好練氣功，我卻總是憑藉小聰明過關，錯失了老師在世間可以指點我的機會。幸好十年後我又遇到一位師長，才彌補了前十年的遺憾。


    這些難得的入行經驗，扎扎實實的成了我的臨床紀錄，也在我日後受到靈性啟發，創造雙手療癒系統時，自己這些深厚的經驗也可以分享給同學們。


    但是，在能量世界中，你永遠不會有滿意的一天，因為每天都有新的變化。人們的情形千百種，我們只能秉持著一種「敬意」來工作，面對未知，仍然心存感激。


    憑良知（良心）來工作，才能心安理得地睡好吃好，把每一個歷練都當作是靈魂提升的練習，這種心態可以保持高度不墜的熱情，工作也才能繼續長紅。


    > 黑暗生於光明，光明源於黑暗。過著覺醒的生活，能量工作才能一直長紅下去。這類工作最大的壞處，就是必須一直過著覺知的生活。


    ## Part Ⅲ 進入臣服天職的階段


    什麼叫做覺知的生活？現在各種身心靈的書籍中，早已經把「覺知」這句話講爛了。所有的修練都在強調覺知，然而，真正的覺知不是想出來的，而是活出來的。一行禪師在法國的梅村，一直提倡正念的覺知生活，我把他的理念也用在我們的高階治療師訓練中，每個整點就來做點不一樣的正念覺知。正念，就和正能量有關。


    我們在治療師培育營隊中，強調的正念覺知是「四無量心」。如果沒有慈悲喜捨的正念覺知，那麼治療師將是個生冷的機器，就算有一些讓人平靜的療癒力，也不會有更高靈性上的覺知。


    第一階段的治療師，目標都是「放鬆壓力」，而其實，這樣的覺知已經很了不起了。如果要往上成為情緒上、思維上或是靈性上的覺知，甚至到生活中時刻覺知，那真的非常不容易，也許要閉關一段時間才能有这样的覺知力。


    一行禪師認為，觀照生活的問題，才是真正的法。


    在青城山彩色禪修閉關中心成立後，我開始認真思考這個覺知的問題。我們一直強調把色彩能量帶入生活中，而不是只會看氣場、測幸運色，或是用個神奇的油，就可以完全覺知，這是不可能的。因此，落實到生活中的正念覺知，就是非常重要的一項修練。個人、企業、兩性關係，各種的正念覺知，所有處理的都是生活中的事情。我們的治療師工作也不是只有在一對一的時候才覺知，而是把這種能量修練放在日常生活中，時刻覺知。


    我自己一直很努力朝向這樣的目標邁進，但我發現，自己太過努力會變得苛刻，有時又太過放懶變得隨興，遇到工作上或與人相處，特別是在親密關係中，卻又無法把持得很好。這個時候，我真的體悟到「落實在生活中」，以及社會服務中的社區服務推動，更是非常重要的未來工作。


    ## Chapter 19. 能量工作的職業道德


    ## 自我療癒


    ## 落地的覺知法


    ### 1. 放下頭腦的誤解


    我們的自我很喜歡編故事，所以，往往我們可以編寫出許多精美的劇本來，但卻不是真相。落地的覺知必須要以事件為主要對象，不需要分析太多、批判太多，也不需要歸咎是誰的責任，放下頭腦的第一步，就是停止自己的誤解。我們往往會把誤解的事情、頭腦的扭曲想法當作真相，然後去信以為真。所以，放下頭腦的誤解，不要去想為什麼我有這樣的遭遇，不要去想我為什麼要做這些事，停止批判，因為這些鑽牛角尖只會讓自己更痛苦，何苦呢？


    ### 2. 不要變成另一個人


    看過李安導演的電影《綠巨人浩克》嗎？如果沒看過，去看看復仇者聯盟、正義聯盟，一堆美國的神奇超人與神人電影，裡面有很多有意思的「非我」情節。像是浩克，只要恐懼或失控，就變成綠巨人，這樣的情節其實也每天發生在我們的生活中，我們一旦生氣失控時，就非常像沒有頭腦的浩克，活著似乎只為了破壞而破壞。這個時候，我們如何回來成為真我班納呢？呼吸，平靜，呼吸，平靜，回想美好，不要痛苦，馬上班納就回來了。


    ### 3. 正念靜觀練習


    我經常會給自己靜觀的閉關時間，有時候一天，有時候兩天，就在家中誰也不理會，也不出門，只是靜靜的生活。也許是很認真的打掃住家，或是整理一牆面的書籍，或是寫作，或是念經，最舒服的就只是打掃、吃飯、睡覺，休閒時看看不勾起情緒的電影，這些都是可以在居家生活中做到的靜觀練習。


    ### 4. 情緒書寫練習


    現在的交友網絡興盛，臉書（facebook）、推特（twitter）等等，各種的網路工具都可以讓我們抒發情緒。情緒書寫是一個不錯的練習，有時候寫給自己的內容中，也可以讓我們透過文字整理，見到自己的靈感與覺知。我們在臺灣與大陸的治療師，在講師訓練之前，都會有個一百天打卡，或是意識流書寫的打卡練習。同學們每天堅持五分鐘、十五分鐘書寫，來和自己獨處與溝通。


    ### 5. 全面親近自我才能減壓


    所有的練習，其實都在強調靠近自我。這也是覺知當下、認清自己心理狀態的重要關鍵。我們一旦認知自己當下的內在狀態，就會馬上紓解壓力。這些自己給自己的誤解、批判、要求、期待，都會因為我們可以靠近自己的心，而得到正確的對待。所以，這才能讓我們理解，我想要成為一個怎樣的自己？我可以如何微調自己的生活方式，讓自己的「心」好過？這樣的訓練，可以減少心臟疾病的問題，因為心收集了太多痛苦，承受不住就會成為負念的收發站。


    所有的落地覺知，都可以讓我們開始正向生活，並且活出有良知、有意義的人生。


    ## 以愛療癒


    愛可以成為一種有用的法器，也可以成為傷人的利器。我們潛意識中儲存的愛的意識，會引動我們的生命動機，動機牽扯出我們對事物的判斷、行為和感覺。正向的愛具有慈悲和智慧的兩種功能，這種愛的意識，才能引領我們做對判斷，正確行動。


    ## Chapter 20


