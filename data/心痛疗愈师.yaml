    沒有善良的心，技術再高明的治療師都可能因故走偏。我有個學生，來找我的時候，簡直可以用「地痞流氓」等級來形容他的出身。我本以為自己非常相信孔老夫子說的因材施教，而我也的確用盡心思來教育這個學生。我相信教育之後純正的心，會比高明的學歷或精良的技術更重要，因為當時我相信，治療師並不需要成為最完美的人，只需要令他人更完美。


    結果我的確將這個學生提高到成為團隊老師的資歷。正當我以為自己已經成功而沾沾自喜時，學生開始勒索，希望我給他更多錢；學生也開始以為自己是我，如果一起出國，怎麼可以睡次一等的房間？他完全迷失了自己的心，很可惜。


    我失敗了，但也開始透過這個經驗明瞭，原來一個治療師的靈魂出身才是最重要的。不是對方生長在有錢或貧窮的家庭，也不是對方如何努力在社會上出人頭地，而是遇到欲望的挑戰時，是否可以挺住，做得有為有守。我自己如果沒有很堅定，我的學生也會一樣。


    靈魂上的貴氣才是貴族的起源，而靈魂上的貴氣與霸氣，也是一線之隔。所以，真正的善良，是這一行對人本質的慈悲，而不是運用這行善良的本質，去做欲望的事情。


    # 治療師需要的，是愛


    愛是所有人都需要的，特別是治療師。有時候你會發現，治療師反而會比一般人更需要愛。除了經常過度沉溺在犧牲奉獻的愛裡，往往也會糾纏於情愛中無法自拔。就如同能量一樣，如果有時愛他人，有時卻批判他人，或是只愛自己想愛的人，只愛自己的家人，對他人卻沒有真正的關懷，那麼這個治療師必然需要心理輔導。


    畢竟治療師自己也有缺憾，也有需求，一不注意就容易被有缺憾的心勾住，反而會在治療個案的過


