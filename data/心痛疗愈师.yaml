  md: '# 充滿法喜的菩薩行


    洛桑龍達／大英博物館首位熱貢唐卡藝術家


    善弟子昭儀與我在六年前因唐卡藝術，於上海結下善緣，在上海及台灣，只要她抽得出時間，往往會來支持我的唐卡展覽，並向我請益色彩藝術的人生哲學。她對色彩和佛法的領悟及虔心令我印象深刻，特別她早年在佛法中的培養，使我第一次見到她時，就能感受到一種尊敬上師和謙卑的美好品德，這種日漸式微的德行，我很喜悅可以見到有善弟子依然保有。


    曾經，她就自己在內地的修行和事業發展如何平衡，來與我分享及討論，我建議她要更廣大的成就自己的教育事業，並且成為獨有的色彩心靈專家。如今，喜見她的努力果然走出一片利益眾生的天空，願她永不退轉並充滿法喜的走在菩提道中，用文字和藝術來示現與示範世間修行的菩薩行！


    # 關於本篇序文作者：


    一九七六年，誕生於「佛法聖地文化藝術之鄉熱貢唐卡發源地」吾屯村。一九八○年代，承接法王十世班禪大師傳承的大威德金剛密法和菩提心願法。一九八三年，被當地一代法主洛桑尼瑪大師選為「善根」，在隆務大寺受僧戒。之後進入吾屯寺，師從紮西拉旦等數位上師，學習佛法及唐卡泥塑等文化藝術。龍達上師的唐卡藝術成就享譽全球，不僅榮獲各大獎項，二○一四年更獲讚為「中國十大唐卡大師」。'
