    # Part 進入臣服天職的階段


    一開始我就崩潰了。對於不去傳統市場買賣的人來說，我只會去超商或是百貨公司，我沒辦法想像去菜市場買進口貨的概念，所以一開始就出現與臺灣文化不合的痛苦。


