    所以，一直以來，任何活動的主辦方都會送花到我的房間，這不知道是何時開始養成的習慣。雖然我很少在各地工作後遊玩，但我的房間裡一定要有鮮花，有了它們，我就不會太累。說也奇怪，這樣的習慣十多年來沒有改變過，我原以為自己一直怪怪的，直到這些現象一直重複發生，我才開始信任這些是真實的。


