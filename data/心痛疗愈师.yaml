    ## 以愛療癒


    As above, So Below. 在愛的場域裡，我們需要了解「誠於中，形於外」的宇宙法則。這樣，我們就可以領悟到內在與外在豐盛的生活方式，愈愛愈有力量。


    ## Chapter 21. 提高覺醒的全頻道能力


    當能量提高到身心靈和諧時，

    心靈與物質雙豐收的狀態就會逐漸出現。

    你可以不必太過費力，只要順著流動走，

    就會發現有那種順流而上的機會出現。


    從「做自己」開始，境隨心轉，好運也開始展開。


    我七歲時的好友出現了，他看到臉書上忽然出現我的名字，而這個名字又不是很普遍，所以同學陳總他想，這是我的小學同學嗎？


    當年我和陳同學帶著弟弟出去玩要，我們聽說從士林走回北投不是很遠，於是回程時三個人便決定一起走回北投。弟弟差我們六歲，當然，我們自己也不大，才國小。但從士林走回北投，真的好遠，最後是陳同學背著弟弟回來。這段難得的小學記憶，我一直沒忘，特別是和弟弟共有的回憶。


    我當然記得這個好心的小學同學，卻記不得為什麼我們會去士林，還決定這樣走回北投。但真的很好笑！陳同學聯繫上我，他已經是事業有成的公司負責人，家庭也幸福美滿，有著很賢慧的老婆和一雙好兒女。我們先在網路聯繫上，有鑑於之前五歲同學的有趣前例，我雖然很開心，但助理們總會希望我小心點，畢竟我有出書，有上媒體，有點社會形象，又是靈能工作者，需要更加小心保護自己。也因爲因緣還沒到，我和陳總初期都是透過回臺灣的時候線上閒聊。只是沒想到，原來陳總也是我的貴人，他是電商公司老闆，所以他開始回答我相關問題，甚至來協助我們團隊創作最新的電商系統，與現在美美的專業服務網站。


    做自己的品牌，首先是命名。大家想了很多，卻始終感覺還沒到位。有一天，陳總急著找我，他說：「上官，你有個好名字，你知道嗎？」


    我說：「嗯，家族姓氏不能改，名字又是爺爺取的，希望以後的女子能夠有學識，不可以無才便是德。這樣的名字，也是很大器的呀。」


    陳總說：「對，所以，我說是好名字。因為『大家都要上官網』。」


    我沒有聽懂。陳總接著說：「每個網站都會有一句話在搜尋引擎：上官網……（請上官方網站）」


    於是，愛上官（ishangKuan），我的品牌名，就這樣出現了。中英文都有著意義和諧音，上網查詢時也很容易會不小心就進入我們的網站，因為大家都「愛上官」網。


    這個由來真的很有趣，但一開始，因為多年被壓抑的慣性，我真的很怕又被人評為「自大狂」一族。我本來的傲慢就被人欺負得五體投地，每天都恨不得趴在地上走路，好求人不要再攻擊我了。現在還來個「愛上官」，大家一定會聯想到「愛上官昭儀」、「愛上上官昭儀」，我的天！我已經有著與人無法親近的高傲女神感，加上這樣一個驕傲的名字，這還得了！


    但陳總說服了我，主要是因為「方便上網」。而我的內心世界，總有個對於網路世界的喜愛，因為網路和能量一樣，都是新世代的產物，而亞特蘭提斯時代的心電感應，也和現在的網路世界一樣。新世代的網際網路，活脫脫就是過去世代的現代版，這對我來說，真的是生命中不可以缺少的一部分。


    ## Part III 進入臣服天職的階段


    網際網路和能量傳遞是一樣的，只是舊酒裝新瓶，我們在新的時代，一秒鐘就可以和遠在地球另一端的家人、朋友聯繫上，和古代的能量世界，真的是一模一樣呀！就這樣，迷信的我接受了陳總的建議：愛上官
    ishangkuan，首先在香港成立了品牌規劃公司。


    我開始明白，原來不躲在一個以為安全的世界，走出來才是安全的。在那個不安的世界裡，我只想安居樂業，捧個像公務員的飯碗一樣，可以不必擔心明天沒飯吃，但弱小的我會希望可以得到家長的喜歡。這種無價值感，一直在獨立之前是不會得到療癒的。


    奇妙的是，一位住在北京的靈媒姊姊，一直默默地支持著我。她一直鼓勵我離開原來的組織，做自己。我沒有和姊姊有任何的關聯，但她一直在默默地支持著我的蛻變與覺醒。


    有一天，我又很挫折，我問她：「姊姊，你為什麼要這樣無條件地支持我呢？」她說：「因為你值得。」被同樣是靈性的人士認可，是一件開心的事，特別是在別無所求的人身上，你會感覺到更多的關懷和鼓勵。


    我開始明白，自己得道多助，但我一直覺得自己不夠好，沒想到就是有人可以這樣無條件的支持。相較於第一次接觸身心靈時遇到的老巫婆，這種療癒的質感差距實在太大。中國人的世界，我們應該要更有中國文化傳統的能量，這種道德的能量，似乎更是現代人們身上所需要喚醒的。


    我決定要跳出原來的巢臼，學習做自己。這個決定，整整走了三年。


    我開始走出所謂的身心靈做法，既然我們能感知能量，為什麼不能創造呢？正巧，有更多的人開始對於全腦開發與能量場域好奇了起來。我接受了上海一家教育集團的邀請，擔任教育顧問，後來甚至帶人員下市場做培訓，許多以前沒有實驗過的事，現在全新體驗。


    ## Chapter 21. 提高覺醒的全頻道能力


    要把自己的過去放下，全部更新，實在不是很容易。每天，我都和小助理加班忙到晚上十二點，然後第二天一早再回到辦公室繼續認真研究和規劃。略通命理的我知知道，中年後我必須歷練更世俗面的事情，就是進入商界。本來想出家的我，現在竟然坐在上海的繁華區，坐在自己的辦公室裡，研究著教育市場，然後面對一群我永遠也不會認同的左腦型人員，這真的是很棒的挑戰！


    當時我天真的想，讓右腦型的人可以聽懂不稀奇，如果讓那些不信的左腦人聽明白，那就真的很酷了。我接受了挑戰，也面臨了前所未有的信念考驗，硬把自己推離舒適區，推離熟悉的環境不做教主，然後走出來面對人情世故，我覺得這是我開始成長的一大步。巧妙的是，在這之前，我因故得到了機會，和一些上海的彩妝與公關公司連結上，開始接受時尚公司的邀請，不僅在線上開課，也再次做現場的活動。許多活動不是很難，同樣是講色彩，同樣是用能量來療癒，同樣是愛上自己喜歡的道路，換個公司，也不是很難。唯一難的是，講出平易近人的能量語言，一樣用色彩當工具。


    於是，我開始小有名氣，被我做過的公司都會賺錢，被我參與過的能量場也會業績快速提高。就這樣，我從純教學進入做身心靈的老師，然後搖身一變成了舞臺講師，後來又簽了演藝人員合約，不僅接了國際品牌，後面又接了中國本土非常知名的保養護膚品牌，甚至還有各種品牌合作的機會。這所有的經驗，對我這個不知變通又不懂結人脈的能量教書匠來說，實在是很感恩的機緣。


    一路走來的每一個機會，每一位遇見的朋友，我都用心體會，認真學習。我相信，能量不是給少數人用的，能量是給天地的生命一起用的。如果我們有能量的訊息可以傳遞，那也不是個人工具，不屬於某個人，而是這樣的訊息更應該要分享給大眾，分享給那些聽得懂的大眾。


    我懷抱著理想，朝著迎面而來的機會去實現夢想。


    不過事情總不是很能如願，面對那些永遠也聽不懂的人群，有了經驗之後就得放下。在不同物質理念的團體中，我感覺不是很舒服，也無法發揮。因為他們永遠只活在物質和人性的思維中，沒有辦法對頻。相對的，當我覺得能量的浪費比得到的還多，和我的意念相反時，就表示該離開了。


    雖然離開總裁顧問及教育部長的工作，但我覺得十分感恩，感恩能夠有機會受到賞識，把理想付诸實現。公司每個人員，從上到下，我都感覺到在中國大集團中集體創作的美好與激動。也因為這樣的磨練，我沒有活在一成不變的環境中。美好的禮物就是，我發現自己的功能竟然愈來愈全頻道，可能因為我沒有太多設限，並且很努力的開發，於是所有的功能都出現在我需要的時候，而每一次的演出與表現，我都無愧於天地，讓每個能量場得到它應有的療癒。我想，這或許就是我的功能。


    我的功能逐漸被環境所激發，雖然還處於摸索階段，但我深深明白，自己不是屬於口才好的人，我永遠也無法學會並跟上那些上臺口若懸河、反應快的能人異士，我不屬於那樣的磁場和功能。試了幾次需要花很大心思、不停用口才、用盡力氣討好的場域後，只感覺到更大的消耗，於是在集團磨練的場域中，往往三次內我就可以理解沒去過的地方會是什麼能量，一旦理解，感覺對自己靈魂沒有提升的事，我就再也沒有興趣去做了。


    靈性洞見一看到虛假的自我狀態時，靈魂就會覺得很疲憊，不想停留。這種自動的屏蔽功能，我一直很想突破，而隨著功能愈多，能量不斷提高，雖然心裡排斥，但我仍會有所節制的參與。


    讓自己投入這樣的場域，是因為我想練習自己不懂人情世故的個性，很想有所突破，所以常逼著自己去接受磨練。


    慢慢地，我愈來愈體會到人生不是用來浪費的，我開始可以更安靜地不忙著安排自己的行程，努力工作賺錢，或是聆聽一場國際講座，試著和世界上聰明的科學家或心理專家接上線，然後覺得自己也被提升了。這樣不放逸的感覺，讓我愈來愈喜歡自己的「坦白」和「堅持」。這樣的我，也讓自己愈來愈喜歡和滿意，不再只是看到自己的不美好。


    我想，高感知功能的提升，是因為要做更大格局的事，而不是用來浪費和沾沾自喜。也因為心靈一直感到痛苦，想要的得不到，得到的不想要，有時候也不知道自己想要什麼。靈魂在徘徊時，就會想要知道答案，這種動力，督促著我去找尋自己。


    終於，我找到了答案，那就是，快樂。


    無所求的快樂，就可以提高磁場。


    當能量提高到身心靈和諧時，心靈與物質雙豐收的狀態就會逐漸出現，你可以不必太過費力，只要順著流動走，就會發現有那種順流而上的機會出現。高頻的能量人士會抓住機會，這種高頻並不是只有靈性人士才有，馬雲、郭臺銘、美國總統川普，他們都有一定的頻率，去感受到某種覺知，把覺知放在這種順流而上的機會中，自然就可以成就某些心中想要發生的事情。


    所有這些成功的人們，都有著極高的快樂度，這種快樂，可以說是一種成就感。這就像是你完成了一個作品，很開心，很有成就感；如果失去了這種成就感，就會從原來的寶座跌落下來。培養這種高頻的成就感，也可以鼓舞一個人全心全意地去發揮。


    那些只會計較、擔憂、恐懼、算計，或是一直不敢大膽放下過去，勇敢走向未來的人們，頻


    > 核心體悟

    > Core Enlightenment'
