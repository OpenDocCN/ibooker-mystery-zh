    對我來說,夢中的學習比醒來後的學習輕鬆多了。不管是夢裡出現的情節、畫面、色彩或聲音,不同的人物,甚至是治療,醒來時我總能印象深刻地寫下來。


    一開始我並不清楚這是怎麼一回事,也沒有問過任何人。由於好奇心使然,開始在床上放一本素描本,在不開燈的情況下,有時只是記下來幾個字,或是畫個圖示。不管什麼情況,我的夢數十年來始終活躍。


    睡覺成了我很喜歡的補充能量方式之一。也可能是睡得很開心,睡眠中的夢境,遂成了我和其他的世界、以及和另一個自己溝通的橋樑。不擅言詞,不善表達情感的我,也往往可以透過夢境自我修復,甚至靈魂出體的跑出去做出更多美好助人的事。


    70'
- md: '## Chapter 5. 夢中的學習之旅


    第一次真的認真的夢，並且從夢中學習到如何修練，其實不是一個愉快的經驗。以前一想起來就想哭；二十年後，我才能不帶情緒地對人談起這段經歷，我才能感恩地說出這段往事。


    那第一次的不愉快夢境體驗，差點毀了我的身心靈之路。我常常無法理解，為什麼會有這些奇怪的事情發生？


    那是最長的一場夢境，大約歷時了三年。這三年，也是我正式進入身心靈領域的決定關鍵。


    我體會到，如果一個人可以在夢中修練，並且能成功地由潛意識轉化意識狀態，透過沒有形體的掌控來轉換形體，這樣的效果會更為神速和成功。畢竟我們的想法和身體緊緊捆綁在一起，如果不鬆開身體的認知，當我們從夢中醒來時，思想所創造的能量便將由身體掌控，所以大多數人明明知道自己應該改變，卻難以改變。其實，愈固執的人，愈適合由夢中來快速轉化。


    一個來自巴西的年長外國女性，號稱通靈很厲害。因為屬於印度某個新興宗教，所以我帶著興奮和朝聖的心，和一位臺灣很美的通靈姊姊，希望能一起去朝聖。當時心中想像諸多美好，總以為身心靈是喜悅的，是和諧的，老師也應該是充滿愛和光，想像中老太太也應該是慈悲和具有強大的療癒能力。


    然而，四天的課程完全不是這麼回事。


    ### Part ② 人生夢想設計藍圖


    首先，老師不斷吹噓她通靈多麼強大，但對於我這種不崇拜的人來說，根本沒什麼強大的崇拜感，從小見的高人不少，身邊的臺灣修行人更強大。在臺灣，我的靈學老師及師長們都是非常優秀的，所以對於一個外國人不斷在課堂中說自己有多麼靈通，完全吸引不了我，我只想感受到療癒力。


    接著，老師開始施放奇怪的不同能量。對於像我這種充滿懷疑、不是他們教派的人來說，接受到的感受就是奇怪又不舒服。我的通靈姊姊當時已經四十多歲，見得也多，她感覺不太對勁，因為老師好像開始針對我「迫害」了起來。


    我猜，當時的我可能太過驕傲，雖然表面上很恭敬，但內心卻完全沒有宗教崇拜的「敬意」，這或許是好奇加上質疑的慘痛後果。當然，光是這樣，還不只是一點點的慘。更震撼我的是，整個上課的群體都在傳播一種理念：人不應該結婚，因為結了婚也會離婚。因此，整場的姊妹們不斷地告訴我，我們只需要享受性就可以了！


    這樣的理念和道德觀對我來說，實在是不可思議。我的家庭教育雖然開明，卻仍傳統。父母雖然有一定的文化背景，但也屬於無神論的家庭，只會慎終追遠的敬拜祖先。對於當時年輕的我來說，來到這裡想要學習的，不是一種人生的痛苦要用性來解救，我的家族中都婚姻幸福美滿，哪怕不是天天快樂，至少也能婚姻一路走下去，直到生命的盡頭。


    因此，我無法想像的是，自己竟然走進了一個崇拜性解放的圈子，這樣的圈子是靈性嗎？當時年輕的我，雖然知道禮貌上應該尊敬各種不同信仰的人，但一直被大家「灌輸」這種想法，實在很難接受。更難堪的是，當時我也鼓勵了交往中的男性友人一起去學習。結果，年紀已經可以成為奶奶的巴西女老師，竟然投射了一種奇怪的能量，讓這位男性友人每天對我大發脾氣，甚至想要吵大架，最後課程結束後，還被老師留下來不走了。我和姊姊哭著離開那個上課的地方，莫名其妙地回到臺北。


    這樣的經驗太可怕了，我和姊姊討論了半天，也不能理解那種情況。只能說被老師修理了一頓，心中依然不明白。或許我的能量不好，內在的不恭敬和懷疑衝撞到老師，所以被狠狠修理了，連男朋友都被搶走。


    這課程之後的三年內，巴西女人成了我的夢魘。


    每次她要來臺灣開課，我就很害怕。害怕不是因為我會去上課，因為在那次之後，我的姊姊已經再不進入這種鬼地方，而我，應該也沒有瓜葛才對。不過，夢中卻沒有如此幸運。三年內，不管這個巴西女人是否來臺灣，她總是三不五時的會進入到我夢中追殺我。最清晰且一直重複的是，她總在夢中敲著我的額頭，問我：「為什麼你要開第三眼？為什麼你的第三眼是開著的？」不停敲著我的額頭的她，實在太猙獰了，所以，我總是在夢中狂奔，一奔就是三年。


    曾經，莊老師告訴我，因為我們前世在印度有了恩怨，我過去是印度的大商人，得罪過她，所以這一世才會有這樣的經歷。奇妙的是，這個老師似乎並不知道她在夢中做的事，她差遣她在臺灣負責開課的經理人一直找我，希望我可以協助她做宣傳，合作開課。


    這怎麼可能呢？我一方面回應對方說我對身心靈課程沒有興趣，一方面在心中一直嘟噥著：「這怎麼可能呢？你這老巫婆，我躲都來不及，還幫你一起招生，一起工作？」當時我很怕這些通靈人會來害我；而我，就算未來我的第三眼也很爭氣，但當時我是一個身心靈的新鮮人，我是沒有能力還手，也沒有能力在無形世界中打仗的。


    就這樣混過了三年。直到有一天，老巫婆又來到我的夢境中。


    夢裡，我在家中一見到她由前門進入，馬上就向後門跑，幸好我的家不小，可以馬上奔跑。不過我跑到一半，忽然對自己說：「嘿，這是我的家耶！為什麼你可以來我家撒野？」我轉回身。當時老巫婆已經變化成一隻很大的黑蜘蛛，眼看就要把我吞食了，當下我使盡全身力氣，向黑蜘蛛回了一拳。剎那間，她化成無數的小黑蜘蛛向四方跑掉，我也從夢中醒來，滿身大汗，嚇得全身發抖。


    那次擊毀大黑蜘蛛後，我的夢中就再也沒有她的出現，我的恐懼也徹底痊癒了。


    不到一個月，就聽說她本來要再來臺灣開課，卻忽然心臟病發作，從此六年來不了臺灣。當時的我一聽到這個消息，還嚇了一大跳，心裡很驚恐是不是自己害了她？後來輾轉聽別人無意間提起，說她害了不少人，得罪很多人，所以產生了許多「心毒」，引發了疾病。我這才小小的喘了一口氣，我只是想保護自己，沒有要害人的心啊！


    這個經驗，不僅引導我在夢境中的修練及學習，也提醒了我，如果未來有一天我有能力成為別人的老師或長者，絕對不可以成為這樣的通靈老巫婆。當時的我從來不知道，原來我的第三眼是開的，也不是很接受自己有一天也會站在舞臺上，成為一個身心靈的工作者。而多年後的我，就算從事身心靈工作，也絕對不隨便對人說：「你的能量很差，你的氣場很有問題，你應該最近會出問題吧？」這類的語言，「謹言慎行」的告誡我一直謹記在心。看來，痛苦的經驗，其實也未必是壞事吧？


    在老巫婆過世之前，我曾在英國一個靈性場合遇見了她。那時候的她雖然從心臟病中撿回一命，但早已不如當年，她見到我時，很是驚訝地說：「噢？是你？你現在很成功噢？恭喜你。」我對她說：「謝謝。」但是比她年輕的我，還是很難原諒她的奇怪言行，幾乎讓我當時就退出身心靈的學習場域，更不用說未來的工作了。


    但所有的事情，冥冥之中似乎自有安排，有時候真的不是憑一己之力就可以改變的。或許她也是對的，只是我明亮的光芒照著她睜不開眼，而我明亮的第三隻眼睛因為不會自我保護，所以也無形間傷害了其他人。這樣無意間傷人的際遇，在之後的身心靈路上我還犯了好幾次。無意間傷到他人非我所願，現在想起來，也覺得人生充滿了許多有趣的機緣。不論是喜悅或痛苦，其實真的都很精采，值得我們細細思量，充滿感恩。也因為這些起伏，把我推進了修行的道路上，渴望能找到解脫的道路。


    二十多年前的這個經驗，像極了西遊記的蜘蛛精吧？但也帶給我一個觀念，就算對方可以看到前世今生，或具有某種神通，那又如何？如果一個沒有正念價值觀的人，用邪念來影響其他盲從的人，讓沒有受過專業心理訓練或輔導分析的人，隨著自己的幻象來迷惑人心，那真的很可怕。


    對於夢境和神通，我因此有了自己的判斷和實際體悟，並開始來一點一滴地建構我未來的療癒之路。感恩這些歷練，多年後我在英國又遇到這位老師，她因為收集了很多的「民怨」，並且過度努力賺大錢。為了錢和情，也和許多人發生很多問題。在英國我們再重逢時，她已經老到超乎她年紀的衰老。她對我說「恭喜你如此成功」，但我從她的眼神中，只是明白了她輪迴的限制，依然在執著中往下一世行去。


    就算我們的生命中有大神通，能賺很多錢，又可贏得很多男人；但死亡之後，又代表什麼呢？靈魂的領悟和解脫，可能才是最大的收穫吧？謝謝這位啟蒙的老師給我的示範。她的示範，增加了我的夢境修練，也帶給我全新的正念思維。


    從這個老師的示範，我深刻體會到靈通、靈性和修行，其實完全是兩回事。


    很多人賣靈性商品、賣心靈課程，甚至賣弄靈通力量，但這些都不代表他是個「修行人」。


    > **核心體悟 Core Enlightenment**


    ### 自我療癒——夢中修練——


    老師和學生爭鬥也是常見的事，做老師的，也可能在不自覺的言行中誤傷了學生，所以我常會對來訪的個案說：「老師也是人，而且更是可憐的平凡人。不要把老師想得太高，因為很多老師也只是訓練有術的專家，他們的人生，也是必須靠自己逐漸體悟和修練來的。」


    我們有時候會用更嚴格的标准，要求身心靈的人不能犯錯，這也是不公平的。有時候，身心靈老師們的情愛故事，還有離婚、復婚等分分合合的情感問題，更比一般人還要多。大量的情感又能何去何從？而來訪的個案也都是缺愛的個體，如果一個身心靈工作者正好也是缺愛一族，那豈不正中下懷？


    巴西老巫婆的故事，讓我一直感覺到很難受。想想，一個女人到很老又很醜時，卻一直走不出小女生的情懷，也走不出情愛的綑綁。生命到了很大年歲時，應該是知命之年，卻還在爭奪爭鬥，這是多令人惋惜的事。


    這種阿修羅的性格，也常常讓我在巫婆的輪迴性格中見到。是宿命，也是考驗。


    缺了愛的鼓舞，終其一生都將在追尋愛的過程中起伏；如果得不到愛，就轉而尋求金錢，在究竟的人生路上，也將無法得到最後的解脫。


    用第六感一窺未來，做夢就是一個好工具。


    在夢中，心靈感應由意識中被解放出來，透過符號、色彩、隱喻、影像等方式來表達。如果可以信任自己的覺知，等心靈覺醒的時候，就會心領神會地明瞭這些意涵。像我寫這篇文章之前，我的身心靈又面臨摧毀後的修復，結果我一直睡到開始能在夢境中講笑話，還有押韻的猜謎出現，我便知道自己的「力量」回來了。從那天起，我的元氣補足，身體也逐漸恢復了健康。


    真正的夢境基礎都源自內在的原型，也就是藝術和美好。


    所有的夢境釋放，都和我們的內在壓力與恐懼有關。因此，當你要從夢中得到啟發之前，可能有很長一段時間是需要「釋放」，而不是「獲得」。就像放電一樣，把不乾淨的全放完了，才有新的、乾淨的可以灌進來。在這裡，我綜合各種教派與方法，但不論哪種派系，都和能量相關。


    1. 放電：你必須先放下所有的渴望，然後只是吃和睡。我們的腦電波太雜亂，特別是被混亂的欲望帶著我們亂想亂飛，所以無法擁有乾淨的意識狀態。因此，放下，全放光，是造夢修練的第一步。

    2. 在藏傳佛教中，首先的前行或淨障，其實真的是非常好的作法。我們因為個人力量太渺小，所以如果運用外力的淨化，那效果當然是加強的。到正信的宮廟或教堂中禮拜或坐一坐，待上個半天；又或是給身心靈專業工作者不言談式的「淨化能量（氣場）」。把思緒放空，把能量放空，就像洗澡一樣，這都是必要的準備工作。

    3. 向你的信仰祈禱。有相信有保佑，人們的意識會創造自己相信的國度與能量場域。自己創造一個自己相信的神聖場域非常重要；如果沒有特別相信或專屬的信仰，就信仰色彩能量，透過大自然，是很好的靈性淨化開始。色彩可以透過眼睛去看，或閉上眼睛想色彩，也可以手握水晶礦石來感受色彩。所有的顏色都可以發生功效，但淨化最重要的是「白色」。

    4. 開始訓練超連結力。睡覺時必須不受打擾，在舒適的空間中，沒有雜音和臭味，中止外在感官覺受，才能順利到夢中和自己的力量結合。

    5. 為什麼要和自己超連結？我們所有的夢境連結只有一個目的：連結豐富美好。夢中的任何訊息，都只是來提醒我們醒來的思維或深度的感知。夢中的一切是可以改變的，也是可以創造的，夢中的一切不會是永恆不變。因此，個人的功利心和自我的得失心必須先淨化（放下）。

    6. 帶著沒有污染的心去感知未知的世界，才能做出精采的夢境，甚至在夢中得以探討很多事物，得到啟發。

    7. 這個得到啟發的力量可以稱之為 ESP（超感官知覺）④、心電感應、神眼通、他心通、預知能力、念力，都可以在這個階段得到啟蒙和訓練。

    8. 要注意的是，必須有健康的身體再來訓練。所有吃不好、睡不好、神經衰弱症狀，也會有類似的感應機制，但這樣的感受多半會傷身體與心靈。對我們來說，要成為健康的、有感應力的靈性人，就不應該錯誤地使用念力，或是誤以為這樣可以有與眾不同的功能。記住，唯有健康的身體才能有健康長久的功能運用。


    ### 以愛療癒


    意識的轉換，能夠提高愛的層次，也能增進愛的品質。


    ④ ESP（超感官知覺）出自一九三〇年，哈佛大學的約瑟夫·雷恩（Joseph Rhine）之手，他是超自然心理學家的早期先驅。


    ## Chapter 6. 神奇的修行人


    人往往在無助時，的確多會投入宗教的行列。但如果宗教勸人執迷，那可能真的要小心再三，哪怕是有多少功力傳遞給你，也可能是一個障礙。


    許多人來說，好強美麗的聰明母親與英俊善良的孩子」的印記。而我也覺得自己從來都是個乖孩子、優秀的孩子，要活出父母希望的孩子，也是能令父母感到光榮的孩子。


    秀父親產出我這類的小孩，渾身上下都是一種「對」


    對


    小時候考試，不能考低於第二名；如果不是第一名，回家就會痛哭不已。對我的父母來說，有個想爭第一的孩子真的很辛苦，別家小孩都是父母死拖活拉的去學習才藝，我家昭儀是自己主動要求要學習什麼，特別有自己的主見，也很有上進心；別家的小孩都是讓父母頭痛，學業有問題，我家昭儀總是要父母一直苦勸與開導，考第二名也不是不好。


    所以，我小時候一直是模範生，也是資優生，更班長，對我的人生來說，優秀、美好、一帆風順，似乎應該就是我的人生寫照，甚至，大學畢業後到國外攻讀到博士，然後回臺灣當大學教授，結婚生子（生三個吧！），這樣的人生，才是父母和我都認可的劇本，所以我一直朝向這樣的規劃邁進。


    我的家庭幸福美滿，一直都是父母同年齡朋友以及家族中的典範。父母親也很開明，輾轉由香港來到臺灣的父親，以及隨著外婆來到臺灣的母親，在兩大家族的相親中成為一對令人羨慕的伴侶。我家四口人，爸爸、媽媽、弟弟和我，一切的幸福和幸運一直都伴隨著我們。


    這樣幸福的人生與家庭，是不會讓人想到要修行的。我們的生活中，也沒有這種背景或宗教崇拜與需求。爸爸常說：「人要靠自己，不是靠外面的一切，宗教只是慰藉，但不是解藥。」更何況，我們很努力，沒有什麼不美滿的。我們家，應該也如同所有其他臺灣的戰後家庭一樣吧！


    由大陸來到臺灣的父親，早已在幼年失去了父母。母親難產，父親則被日軍暗殺，跟著叔叔、伯父到了香港讀書學習拳法，從來沒想過來臺灣。母親則是跟隨一大家族人來到臺灣，幾乎是土生土長的外省臺灣人，她的閩南話說得比我還好，唯一的遺憾，就是出生時外公已經過世，所以沒有了父親。這樣的一對男女，當他們有了自己幸福的家庭時，更是珍惜。爸爸常說，就因為自己已經沒有父母了，所以有了自己的家庭後，更是非常惜福。


    努力助人的爸爸知道靠自己的辛苦，所以一手提拔了自己的堂弟們與好友們，並聯繫上大陸親友，更不遺餘力地照顧晚輩。哪怕自己的經濟條件再辛苦，父親都不願苦到我們，也願意省吃儉用的去贊助更多年輕人來學習。這樣的小康之家，隨著父親的創業，看來是一帆風順。


    臺灣退出聯合國的那一年，父親因為國際局勢的石油危機，自家生意週轉不靈。這中間還遇上了一直信任的兄弟偷走公司的資源，聯合當時的行政助理，搶走了父親的生意，父親一方面面對人生中最信任的背叛，一方面還要應付龐大的資金缺口，於是向家族中的伯父借了錢，想把生意上的債務還清。本以為這樣的方式可以度過難關，沒想到從此陷入高利貸的深淵而無法自拔。我幸福的家庭，從此為了父親要償還家族長輩索取無盡的高額利息，再也翻不了身。幸福的光環，便從此遠離了我們。


    然而，我和弟弟並未因此感到任何辛苦。父親再辛苦，也不會影響對我們和母親的寵愛，而我和弟弟特別的乖巧，因著靈性特質和從小敦厚的幸福教育，我們從來沒有對金錢物質有高度需求，也不懂金錢的重要性，加上自小就有母親的陪伴，所以學習藝術，讀書寫字，看書和學習新知成了我們的嗜好。


    小學開始，藝術的陪伴一直讓我的週末假日是彩色的人生，去各地畫畫與看藝術展覽，更是我和弟弟最開心的生活。我們在家時，大量安靜的閱讀各種傳記與書籍，是最享受的生活方式。對我來說，大量閱讀古老的考古文明，還有埃及等神祕古文明的介紹，讓我可以像是穿越時空般的去各國遊歷，這就是我的童年玩樂。舞蹈、學習珠心算各種才藝的學習，更是我的最愛，學任何才藝都被老師誇為天才兒童，都希望我能成為國家代表隊。之後，也的確在眾多選項中，成為學校珠心算的代表校隊。


    學習之餘，我很喜歡做慈善，像是送愛心到泰北的活動，我一個心念就形成了全校的活動項目。這些慈善活動一直到大學都未曾間斷，也因為這些豐富內在的培養，所以一直感受不到匱乏，除了知道父親要還債給二爺爺很辛苦。但是，該玩的，該享受的，該擁有的，我們依然擁有，父親覺得只要一家人在一起，什麼都有希望，我們還是過著高於小康的高文化幸福生活。


    但幸福的家庭中依然產生了痛苦，金錢危機、死亡陰影、母親的情緒障礙，許多意想不到的意外發生，打破了平靜快樂的家庭生活。討債的電話我記憶猶新，親友勢利的表現，讓從小本就靈通的我，更是看得清清楚楚，更驚訝於人性的黑暗和人前人後嘴臉的善變。


    弟弟後來在醫院的一段時間，也讓我本來不在意的靈性體悟，發生愈來愈強烈的干擾。以前只是做夢，預知一下未來；但到後來，連醒著時都會忽然陷入到某個時空中，夢中也會忽然踏錯空間，見到一堆似乎不屬於這個世界的一「人」或生命。


    痛苦的我，想找到幸福的答案。眼見家中的情況逐漸遠離幸福，我卻無力改善，唯一可以幫助父母的，就是我的好運氣。長大後聽母親說起，那時候父母經濟困難時，用我的名字去抽獎，往往就可以得到大獎。到後來讀中學時，更是常聽到母親說：「寫昭儀的名字。」我以爲只是自己運氣好，也或許真的是運氣好，但冥冥之中總是有隻幸運的大手守護著我們，也直到我開始夢到這大手，才開啟了更多的幸運力量。


    因為家中變故帶來的痛苦，自尊心、好勝心強大的我，對人生充滿了疑問。我的父母不害人，還努力幫助更多人，為什麼沒有好運？為什麼屢屢發生家中的災難？為什麼這些事會輪到我的身上？我愈充滿疑惑，我的敏感度就愈辛苦，負面的情緒也愈強大，對於身邊人的負能量就愈感受得到。


    我不明白這種同頻共振的能量場，但我卻可以因爲自己身上的不舒服，而知道旁邊的人身上也正在不舒服著。這樣的情況令我很難受，我既沒有利益眾生、幫助他人的概念，也因為我痛恨那些欺騙我父母，或令我父母陷入困境的親戚朋友，所以我討厭那些人都來不及了，哪有什麼同情心去理解他們，甚至心中常常暗念，希望那些「可惡的壞人全死光光」。


    當時我不明白做能量志業的人，負面能量愈大，生命的挑戰就愈多，但也因此，為了轉化這個現象，促使我走上修行之路，因爲這才是解脫負能量唯一的方法。


    人往往在無助時，的確多會投入宗教的行列。


    我雖然秉承家庭傳統，是個堅決的無神論主義者，並且對於那些宗教迷信之人嗤之以鼻，特別是弟弟過世前後，太多這類人出沒在家中，但因果論、玄奇的各種論點都沒能救回我弟弟，所以從此我對這些人都敬謝不敏，也對他們所說的任何事情都心存疑惑。但是，身體的敏感需要解決，而就在我更為冥頑不靈，不願意走進靈能世界的時候，出了一場大車禍。'
  mdcn: '## Chapter 5. 夢中的學習之旅


    第一次真的認真的夢，並且從夢中學習到如何修練，其實不是一個愉快的經驗。以前一想起來就想哭；二十年後，我才能不帶情緒地對人談起這段經歷，我才能感恩地說出這段往事。


    那第一次的不愉快夢境體驗，差點毀了我的身心靈之路。我常常無法理解，為什麼會有這些奇怪的事情發生？


    那是最長的一場夢境，大約歷時了三年。這三年，也是我正式進入身心靈領域的決定關鍵。


    我體會到，如果一個人可以在夢中修練，並且能成功地由潛意識轉化意識狀態，透過沒有形體的掌控來轉換形體，這樣的效果會更為神速和成功。畢竟我們的想法和身體緊緊捆綁在一起，如果不鬆開身體的認知，當我們從夢中醒來時，思想所創造的能量便將由身體掌控，所以大多數人明明知道自己應該改變，卻難以改變。其實，愈固執的人，愈適合由夢中來快速轉化。


    一個來自巴西的年長外國女性，號稱通靈很厲害。因為屬於印度某個新興宗教，所以我帶著興奮和朝聖的心，和一位臺灣很美的通靈姊姊，希望能一起去朝聖。當時心中想像諸多美好，總以為身心靈是喜悅的，是和諧的，老師也應該是充滿愛和光，想像中老太太也應該是慈悲和具有強大的療癒能力。


    然而，四天的課程完全不是這麼回事。


    ### Part ② 人生夢想設計藍圖


    首先，老師不斷吹噓她通靈多麼強大，但對於我這種不崇拜的人來說，根本沒什麼強大的崇拜感，從小見的高人不少，身邊的臺灣修行人更強大。在臺灣，我的靈學老師及師長們都是非常優秀的，所以對於一個外國人不斷在課堂中說自己有多麼靈通，完全吸引不了我，我只想感受到療癒力。


    接著，老師開始施放奇怪的不同能量。對於像我這種充滿懷疑、不是他們教派的人來說，接受到的感受就是奇怪又不舒服。我的通靈姊姊當時已經四十多歲，見得也多，她感覺不太對勁，因為老師好像開始針對我「迫害」了起來。


    我猜，當時的我可能太過驕傲，雖然表面上很恭敬，但內心卻完全沒有宗教崇拜的「敬意」，這或許是好奇加上質疑的慘痛後果。當然，光是這樣，還不只是一點點的慘。更震撼我的是，整個上課的群體都在傳播一種理念：人不應該結婚，因為結了婚也會離婚。因此，整場的姊妹們不斷地告訴我，我們只需要享受性就可以了！


    這樣的理念和道德觀對我來說，實在是不可思議。我的家庭教育雖然開明，卻仍傳統。父母雖然有一定的文化背景，但也屬於無神論的家庭，只會慎終追遠的敬拜祖先。對於當時年輕的我來說，來到這裡想要學習的，不是一種人生的痛苦要用性來解救，我的家族中都婚姻幸福美滿，哪怕不是天天快樂，至少也能婚姻一路走下去，直到生命的盡頭。


    因此，我無法想像的是，自己竟然走進了一個崇拜性解放的圈子，這樣的圈子是靈性嗎？當時年輕的我，雖然知道禮貌上應該尊敬各種不同信仰的人，但一直被大家「灌輸」這種想法，實在很難接受。更難堪的是，當時我也鼓勵了交往中的男性友人一起去學習。結果，年紀已經可以成為奶奶的巴西女老師，竟然投射了一種奇怪的能量，讓這位男性友人每天對我大發脾氣，甚至想要吵大架，最後課程結束後，還被老師留下來不走了。我和姊姊哭著離開那個上課的地方，莫名其妙地回到臺北。


    這樣的經驗太可怕了，我和姊姊討論了半天，也不能理解那種情況。只能說被老師修理了一頓，心中依然不明白。或許我的能量不好，內在的不恭敬和懷疑衝撞到老師，所以被狠狠修理了，連男朋友都被搶走。


    這課程之後的三年內，巴西女人成了我的夢魘。


    每次她要來臺灣開課，我就很害怕。害怕不是因為我會去上課，因為在那次之後，我的姊姊已經再不進入這種鬼地方，而我，應該也沒有瓜葛才對。不過，夢中卻沒有如此幸運。三年內，不管這個巴西女人是否來臺灣，她總是三不五時的會進入到我夢中追殺我。最清晰且一直重複的是，她總在夢中敲著我的額頭，問我：「為什麼你要開第三眼？為什麼你的第三眼是開著的？」不停敲著我的額頭的她，實在太猙獰了，所以，我總是在夢中狂奔，一奔就是三年。


    曾經，莊老師告訴我，因為我們前世在印度有了恩怨，我過去是印度的大商人，得罪過她，所以這一世才會有這樣的經歷。奇妙的是，這個老師似乎並不知道她在夢中做的事，她差遣她在臺灣負責開課的經理人一直找我，希望我可以協助她做宣傳，合作開課。


    這怎麼可能呢？我一方面回應對方說我對身心靈課程沒有興趣，一方面在心中一直嘟噥著：「這怎麼可能呢？你這老巫婆，我躲都來不及，還幫你一起招生，一起工作？」當時我很怕這些通靈人會來害我；而我，就算未來我的第三眼也很爭氣，但當時我是一個身心靈的新鮮人，我是沒有能力還手，也沒有能力在無形世界中打仗的。


    就這樣混過了三年。直到有一天，老巫婆又來到我的夢境中。


    夢裡，我在家中一見到她由前門進入，馬上就向後門跑，幸好我的家不小，可以馬上奔跑。不過我跑到一半，忽然對自己說：「嘿，這是我的家耶！為什麼你可以來我家撒野？」我轉回身。當時老巫婆已經變化成一隻很大的黑蜘蛛，眼看就要把我吞食了，當下我使盡全身力氣，向黑蜘蛛回了一拳。剎那間，她化成無數的小黑蜘蛛向四方跑掉，我也從夢中醒來，滿身大汗，嚇得全身發抖。


    那次擊毀大黑蜘蛛後，我的夢中就再也沒有她的出現，我的恐懼也徹底痊癒了。


    不到一個月，就聽說她本來要再來臺灣開課，卻忽然心臟病發作，從此六年來不了臺灣。當時的我一聽到這個消息，還嚇了一大跳，心裡很驚恐是不是自己害了她？後來輾轉聽別人無意間提起，說她害了不少人，得罪很多人，所以產生了許多「心毒」，引發了疾病。我這才小小的喘了一口氣，我只是想保護自己，沒有要害人的心啊！


    這個經驗，不僅引導我在夢境中的修練及學習，也提醒了我，如果未來有一天我有能力成為別人的老師或長者，絕對不可以成為這樣的通靈老巫婆。當時的我從來不知道，原來我的第三眼是開的，也不是很接受自己有一天也會站在舞臺上，成為一個身心靈的工作者。而多年後的我，就算從事身心靈工作，也絕對不隨便對人說：「你的能量很差，你的氣場很有問題，你應該最近會出問題吧？」這類的語言，「謹言慎行」的告誡我一直謹記在心。看來，痛苦的經驗，其實也未必是壞事吧？


    在老巫婆過世之前，我曾在英國一個靈性場合遇見了她。那時候的她雖然從心臟病中撿回一命，但早已不如當年，她見到我時，很是驚訝地說：「噢？是你？你現在很成功噢？恭喜你。」我對她說：「謝謝。」但是比她年輕的我，還是很難原諒她的奇怪言行，幾乎讓我當時就退出身心靈的學習場域，更不用說未來的工作了。


    但所有的事情，冥冥之中似乎自有安排，有時候真的不是憑一己之力就可以改變的。或許她也是對的，只是我明亮的光芒照著她睜不開眼，而我明亮的第三隻眼睛因為不會自我保護，所以也無形間傷害了其他人。這樣無意間傷人的際遇，在之後的身心靈路上我還犯了好幾次。無意間傷到他人非我所願，現在想起來，也覺得人生充滿了許多有趣的機緣。不論是喜悅或痛苦，其實真的都很精采，值得我們細細思量，充滿感恩。也因為這些起伏，把我推進了修行的道路上，渴望能找到解脫的道路。


    二十多年前的這個經驗，像極了西遊記的蜘蛛精吧？但也帶給我一個觀念，就算對方可以看到前世今生，或具有某種神通，那又如何？如果一個沒有正念價值觀的人，用邪念來影響其他盲從的人，讓沒有受過專業心理訓練或輔導分析的人，隨著自己的幻象來迷惑人心，那真的很可怕。


    對於夢境和神通，我因此有了自己的判斷和實際體悟，並開始來一點一滴地建構我未來的療癒之路。感恩這些歷練，多年後我在英國又遇到這位老師，她因為收集了很多的「民怨」，並且過度努力賺大錢。為了錢和情，也和許多人發生很多問題。在英國我們再重逢時，她已經老到超乎她年紀的衰老。她對我說「恭喜你如此成功」，但我從她的眼神中，只是明白了她輪迴的限制，依然在執著中往下一世行去。


    就算我們的生命中有大神通，能賺很多錢，又可贏得很多男人；但死亡之後，又代表什麼呢？靈魂的領悟和解脫，可能才是最大的收穫吧？謝謝這位啟蒙的老師給我的示範。她的示範，增加了我的夢境修練，也帶給我全新的正念思維。


    從這個老師的示範，我深刻體會到靈通、靈性和修行，其實完全是兩回事。


    很多人賣靈性商品、賣心靈課程，甚至賣弄靈通力量，但這些都不代表他是個「修行人」。


    > **核心體悟 Core Enlightenment**


    ### 自我療癒——夢中修練——


    老師和學生爭鬥也是常見的事，做老師的，也可能在不自覺的言行中誤傷了學生，所以我常會對來訪的個案說：「老師也是人，而且更是可憐的平凡人。不要把老師想得太高，因為很多老師也只是訓練有術的專家，他們的人生，也是必須靠自己逐漸體悟和修練來的。」


    我們有時候會用更嚴格的标准，要求身心靈的人不能犯錯，這也是不公平的。有時候，身心靈老師們的情愛故事，還有離婚、復婚等分分合合的情感問題，更比一般人還要多。大量的情感又能何去何從？而來訪的個案也都是缺愛的個體，如果一個身心靈工作者正好也是缺愛一族，那豈不正中下懷？


    巴西老巫婆的故事，讓我一直感覺到很難受。想想，一個女人到很老又很醜時，卻一直走不出小女生的情懷，也走不出情愛的綑綁。生命到了很大年歲時，應該是知命之年，卻還在爭奪爭鬥，這是多令人惋惜的事。


    這種阿修羅的性格，也常常讓我在巫婆的輪迴性格中見到。是宿命，也是考驗。


    缺了愛的鼓舞，終其一生都將在追尋愛的過程中起伏；如果得不到愛，就轉而尋求金錢，在究竟的人生路上，也將無法得到最後的解脫。


    用第六感一窺未來，做夢就是一個好工具。


    在夢中，心靈感應由意識中被解放出來，透過符號、色彩、隱喻、影像等方式來表達。如果可以信任自己的覺知，等心靈覺醒的時候，就會心領神會地明瞭這些意涵。像我寫這篇文章之前，我的身心靈又面臨摧毀後的修復，結果我一直睡到開始能在夢境中講笑話，還有押韻的猜謎出現，我便知道自己的「力量」回來了。從那天起，我的元氣補足，身體也逐漸恢復了健康。


    真正的夢境基礎都源自內在的原型，也就是藝術和美好。


    所有的夢境釋放，都和我們的內在壓力與恐懼有關。因此，當你要從夢中得到啟發之前，可能有很長一段時間是需要「釋放」，而不是「獲得」。就像放電一樣，把不乾淨的全放完了，才有新的、乾淨的可以灌進來。在這裡，我綜合各種教派與方法，但不論哪種派系，都和能量相關。


    1. 放電：你必須先放下所有的渴望，然後只是吃和睡。我們的腦電波太雜亂，特別是被混亂的欲望帶著我們亂想亂飛，所以無法擁有乾淨的意識狀態。因此，放下，全放光，是造夢修練的第一步。

    2. 在藏傳佛教中，首先的前行或淨障，其實真的是非常好的作法。我們因為個人力量太渺小，所以如果運用外力的淨化，那效果當然是加強的。到正信的宮廟或教堂中禮拜或坐一坐，待上個半天；又或是給身心靈專業工作者不言談式的「淨化能量（氣場）」。把思緒放空，把能量放空，就像洗澡一樣，這都是必要的準備工作。

    3. 向你的信仰祈禱。有相信有保佑，人們的意識會創造自己相信的國度與能量場域。自己創造一個自己相信的神聖場域非常重要；如果沒有特別相信或專屬的信仰，就信仰色彩能量，透過大自然，是很好的靈性淨化開始。色彩可以透過眼睛去看，或閉上眼睛想色彩，也可以手握水晶礦石來感受色彩。所有的顏色都可以發生功效，但淨化最重要的是「白色」。

    4. 開始訓練超連結力。睡覺時必須不受打擾，在舒適的空間中，沒有雜音和臭味，中止外在感官覺受，才能順利到夢中和自己的力量結合。

    5. 為什麼要和自己超連結？我們所有的夢境連結只有一個目的：連結豐富美好。夢中的任何訊息，都只是來提醒我們醒來的思維或深度的感知。夢中的一切是可以改變的，也是可以創造的，夢中的一切不會是永恆不變。因此，個人的功利心和自我的得失心必須先淨化（放下）。

    6. 帶著沒有污染的心去感知未知的世界，才能做出精采的夢境，甚至在夢中得以探討很多事物，得到啟發。

    7. 這個得到啟發的力量可以稱之為 ESP（超感官知覺）④、心電感應、神眼通、他心通、預知能力、念力，都可以在這個階段得到啟蒙和訓練。

    8. 要注意的是，必須有健康的身體再來訓練。所有吃不好、睡不好、神經衰弱症狀，也會有類似的感應機制，但這樣的感受多半會傷身體與心靈。對我們來說，要成為健康的、有感應力的靈性人，就不應該錯誤地使用念力，或是誤以為這樣可以有與眾不同的功能。記住，唯有健康的身體才能有健康長久的功能運用。


    ### 以愛療癒


    意識的轉換，能夠提高愛的層次，也能增進愛的品質。


    ④ ESP（超感官知覺）出自一九三〇年，哈佛大學的約瑟夫·雷恩（Joseph Rhine）之手，他是超自然心理學家的早期先驅。


    ## Chapter 6. 神奇的修行人


    人往往在無助時，的確多會投入宗教的行列。但如果宗教勸人執迷，那可能真的要小心再三，哪怕是有多少功力傳遞給你，也可能是一個障礙。


    許多人來說，好強美麗的聰明母親與英俊善良的孩子」的印記。而我也覺得自己從來都是個乖孩子、優秀的孩子，要活出父母希望的孩子，也是能令父母感到光榮的孩子。


    秀父親產出我這類的小孩，渾身上下都是一種「對」


    對


    小時候考試，不能考低於第二名；如果不是第一名，回家就會痛哭不已。對我的父母來說，有個想爭第一的孩子真的很辛苦，別家小孩都是父母死拖活拉的去學習才藝，我家昭儀是自己主動要求要學習什麼，特別有自己的主見，也很有上進心；別家的小孩都是讓父母頭痛，學業有問題，我家昭儀總是要父母一直苦勸與開導，考第二名也不是不好。


    所以，我小時候一直是模範生，也是資優生，更班長，對我的人生來說，優秀、美好、一帆風順，似乎應該就是我的人生寫照，甚至，大學畢業後到國外攻讀到博士，然後回臺灣當大學教授，結婚生子（生三個吧！），這樣的人生，才是父母和我都認可的劇本，所以我一直朝向這樣的規劃邁進。


    我的家庭幸福美滿，一直都是父母同年齡朋友以及家族中的典範。父母親也很開明，輾轉由香港來到臺灣的父親，以及隨著外婆來到臺灣的母親，在兩大家族的相親中成為一對令人羨慕的伴侶。我家四口人，爸爸、媽媽、弟弟和我，一切的幸福和幸運一直都伴隨著我們。


    這樣幸福的人生與家庭，是不會讓人想到要修行的。我們的生活中，也沒有這種背景或宗教崇拜與需求。爸爸常說：「人要靠自己，不是靠外面的一切，宗教只是慰藉，但不是解藥。」更何況，我們很努力，沒有什麼不美滿的。我們家，應該也如同所有其他臺灣的戰後家庭一樣吧！


    由大陸來到臺灣的父親，早已在幼年失去了父母。母親難產，父親則被日軍暗殺，跟著叔叔、伯父到了香港讀書學習拳法，從來沒想過來臺灣。母親則是跟隨一大家族人來到臺灣，幾乎是土生土長的外省臺灣人，她的閩南話說得比我還好，唯一的遺憾，就是出生時外公已經過世，所以沒有了父親。這樣的一對男女，當他們有了自己幸福的家庭時，更是珍惜。爸爸常說，就因為自己已經沒有父母了，所以有了自己的家庭後，更是非常惜福。


    努力助人的爸爸知道靠自己的辛苦，所以一手提拔了自己的堂弟們與好友們，並聯繫上大陸親友，更不遺餘力地照顧晚輩。哪怕自己的經濟條件再辛苦，父親都不願苦到我們，也願意省吃儉用的去贊助更多年輕人來學習。這樣的小康之家，隨著父親的創業，看來是一帆風順。


    臺灣退出聯合國的那一年，父親因為國際局勢的石油危機，自家生意週轉不靈。這中間還遇上了一直信任的兄弟偷走公司的資源，聯合當時的行政助理，搶走了父親的生意，父親一方面面對人生中最信任的背叛，一方面還要應付龐大的資金缺口，於是向家族中的伯父借了錢，想把生意上的債務還清。本以為這樣的方式可以度過難關，沒想到從此陷入高利貸的深淵而無法自拔。我幸福的家庭，從此為了父親要償還家族長輩索取無盡的高額利息，再也翻不了身。幸福的光環，便從此遠離了我們。


    然而，我和弟弟並未因此感到任何辛苦。父親再辛苦，也不會影響對我們和母親的寵愛，而我和弟弟特別的乖巧，因著靈性特質和從小敦厚的幸福教育，我們從來沒有對金錢物質有高度需求，也不懂金錢的重要性，加上自小就有母親的陪伴，所以學習藝術，讀書寫字，看書和學習新知成了我們的嗜好。


    小學開始，藝術的陪伴一直讓我的週末假日是彩色的人生，去各地畫畫與看藝術展覽，更是我和弟弟最開心的生活。我們在家時，大量安靜的閱讀各種傳記與書籍，是最享受的生活方式。對我來說，大量閱讀古老的考古文明，還有埃及等神祕古文明的介紹，讓我可以像是穿越時空般的去各國遊歷，這就是我的童年玩樂。舞蹈、學習珠心算各種才藝的學習，更是我的最愛，學任何才藝都被老師誇為天才兒童，都希望我能成為國家代表隊。之後，也的確在眾多選項中，成為學校珠心算的代表校隊。


    學習之餘，我很喜歡做慈善，像是送愛心到泰北的活動，我一個心念就形成了全校的活動項目。這些慈善活動一直到大學都未曾間斷，也因為這些豐富內在的培養，所以一直感受不到匱乏，除了知道父親要還債給二爺爺很辛苦。但是，該玩的，該享受的，該擁有的，我們依然擁有，父親覺得只要一家人在一起，什麼都有希望，我們還是過著高於小康的高文化幸福生活。


    但幸福的家庭中依然產生了痛苦，金錢危機、死亡陰影、母親的情緒障礙，許多意想不到的意外發生，打破了平靜快樂的家庭生活。討債的電話我記憶猶新，親友勢利的表現，讓從小本就靈通的我，更是看得清清楚楚，更驚訝於人性的黑暗和人前人後嘴臉的善變。


    弟弟後來在醫院的一段時間，也讓我本來不在意的靈性體悟，發生愈來愈強烈的干擾。以前只是做夢，預知一下未來；但到後來，連醒著時都會忽然陷入到某個時空中，夢中也會忽然踏錯空間，見到一堆似乎不屬於這個世界的一「人」或生命。


    痛苦的我，想找到幸福的答案。眼見家中的情況逐漸遠離幸福，我卻無力改善，唯一可以幫助父母的，就是我的好運氣。長大後聽母親說起，那時候父母經濟困難時，用我的名字去抽獎，往往就可以得到大獎。到後來讀中學時，更是常聽到母親說：「寫昭儀的名字。」我以爲只是自己運氣好，也或許真的是運氣好，但冥冥之中總是有隻幸運的大手守護著我們，也直到我開始夢到這大手，才開啟了更多的幸運力量。


    因為家中變故帶來的痛苦，自尊心、好勝心強大的我，對人生充滿了疑問。我的父母不害人，還努力幫助更多人，為什麼沒有好運？為什麼屢屢發生家中的災難？為什麼這些事會輪到我的身上？我愈充滿疑惑，我的敏感度就愈辛苦，負面的情緒也愈強大，對於身邊人的負能量就愈感受得到。


    我不明白這種同頻共振的能量場，但我卻可以因爲自己身上的不舒服，而知道旁邊的人身上也正在不舒服著。這樣的情況令我很難受，我既沒有利益眾生、幫助他人的概念，也因為我痛恨那些欺騙我父母，或令我父母陷入困境的親戚朋友，所以我討厭那些人都來不及了，哪有什麼同情心去理解他們，甚至心中常常暗念，希望那些「可惡的壞人全死光光」。


    當時我不明白做能量志業的人，負面能量愈大，生命的挑戰就愈多，但也因此，為了轉化這個現象，促使我走上修行之路，因爲這才是解脫負能量唯一的方法。


    人往往在無助時，的確多會投入宗教的行列。


    我雖然秉承家庭傳統，是個堅決的無神論主義者，並且對於那些宗教迷信之人嗤之以鼻，特別是弟弟過世前後，太多這類人出沒在家中，但因果論、玄奇的各種論點都沒能救回我弟弟，所以從此我對這些人都敬謝不敏，也對他們所說的任何事情都心存疑惑。但是，身體的敏感需要解決，而就在我更為冥頑不靈，不願意走進靈能世界的時候，出了一場大車禍。'
