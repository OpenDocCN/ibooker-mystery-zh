    我的感情路是單純而失敗的。我常常感受不到自己是一個只有一種關係的人。記得在大學時，一天走在回宿舍的路上，我看到美麗的月光，路燈和月光映照在路上，顯得非常美麗典雅，我覺得自己在那瞬間，簡直可以愛上那個月亮，也可以愛上那盞路燈。這種多情的感覺，實在讓我感覺超級好笑。


    有人會這樣愛上路邊的一朵花嗎？我會。我甚至會愛到不忍採下來，只能每天經過時對著花朵傻笑，我覺得我真的「很愛」。很多的愛，對他人、對個案的愛，是沒有限制和痛苦的，並且充滿希望和呵護。當治療師付出愛的時候，很像愛一盞路燈，愛一彎新月，這種愛，在治療師身上真的很常見。不過，當進入到兩人的關係時，就很容易變得自私和掌控。


