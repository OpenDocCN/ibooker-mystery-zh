    ## Part 2 人生夢想設計藍圖


    ### Chapter 4. 另一個世界的啟發


    我一直無法認同靈性的工作，就像是三百六十五行中，我在就業辭典中查不到靈性工作這一行。


    肯跳進這個行業圈中，直到我被封鎖了所有的道路，手上所有的工作全都不明所以的被停止，如果想賺錢，似乎只有靈性的工作有路走，偏偏我是個頑固又不信邪的人，所以我努力嘗試突破，卻無功而返。


    似乎冥冥之中有個奇怪的手，讓我沒得選擇。


    我從大學開始打工自食其力，不是天生家境富裕的人，所以不工作沒收入是無法生活下去的，而至少要把自己養好，所以生存也是我的課題。


    然而，我努力的所有工作，卻在一個時期內全部被取消，於是我求助老先生，他才告訴我：「上官，是該想一想以此維生了喔！」


    我的人生中其實充滿了抗拒與對抗，老先生這樣說，我是不以為然的。因為我的個人經歷及個性，都不可能會去做關於靈性的行業，但正因為弟弟過世的打擊，讓我的人生觀重新改寫，也感到迷惘。


    我忽然明白，雖然當時申請到法國的獎學金可以去讀博士學位，可是，當一個人下一秒鐘的呼吸上不來，失去了氣息時，還能擁有什麼呢？名利？地位？名譽？財富？愛情？幸福？哪一樣可以擁有呢？


    我忽然感覺到，「快樂」才是人生最重要且必須追尋的事，但自從弟弟過世之後，我連快樂的感覺都一起死去了，我找不到這種熱情和快感。


    有能力幫助人是很快樂的，但是用這種幫助人的方式來賺錢謀生，我不以為然。


    我父親、母親的家族，全都是以物質世界為拚搏方向的一般眾生，甚至在其中打轉痛苦著，有混不好的，也有混得很好的。而我的父親在生意失敗後，我們馬上就被歸類為混不好的親戚。家族親屬的好壞是以財富、社會名譽來衡量。身為子女的我，在弟弟過世之後，也只剩我一人，必須為父母親爭口氣，哪有時問想到幫助他人？我幫自己都來不及了，家裡都還在缺錢，我怎麼可能為其他那些勢利又壞心來討債的人著想呢？


    因此，在前幾百名個案中，我都是不收費用的。即便是星象能量的解讀，我也不肯收任何費用，只願意解讀，不願意碰錢。老先生似乎看出我的心結，也不多說，只是在聚會中添加了一個項目：上官看星盤。


    星盤？我也沒正式拜師學過，只是曾受到希臘老師的點化。那位老師是身為希臘貴族的星象專家，自小學學習星盤與觀星，小時候必須被丟入深山野林中，依照觀星找到回到古堡的家。老師可以由人的瞳孔算命，然後打出一份星盤，順便解讀，而他預測未來我將帶領著一大群人，並且是在中國。當時二十出頭年輕輕的我，心裡一直不以為然，因為這樣的工作，帶領一大群人心靈成長，還是在中國，怎麼可能呢？我家族中有能力的人多已在美國、加拿大，而我自己從父親生意失敗、弟弟過世後，總是申請獎學金讀書，為了家庭狀況，也無心再前往法國讀書，這一連串的不可能，又怎麼可能前進中國呢？


    當時我只是笑笑，不以為意。反正算命就是這樣，只能說說還沒發生的未來，但我堅信，未來是由自己創造的。總之，我是不會進入什麼身心靈、什麼算命的領域，我也不喜歡通靈這種字眼，因為弟弟過世時也見多了，雖然我也能看見一些有的沒有的，但我不喜歡低靈，也不喜歡看到醜陋，我有太多的不喜歡，根本不想向命運臣服。


    老先生開始叫我練習看星盤，我只好照做。那個學習過程，之後也在我生命中經常發生，就是我本來覺得自己不會的事情，這輩子也沒學習過，可是拿到手上就像是學過一樣，一下子就熟悉了。我閉關休練藏傳佛教的儀式，很快就通；我練瑜伽，很輕鬆就可以運動；後來開設靈性彩油課程，校長也是一再問我：「你不覺得教這些很熟悉嗎？」


    解讀星盤也是一樣。不過，因為我很抗拒人們的迷信和誤導，因此心中總是有著不願踏入的阻抗。


    第一次在老先生家被迫給大家看星盤時，老先生提供了他的生日資料給我，我嚇到了。因為我眼睜睜看到命盤在轉動，明明打好的上升星座，卻在我認真研究的時候轉動了起來，換成了另一個上升星座。再仔細一看，這個原來的盤，好像本人應該已經「命該絕了」呀？我驚慌地看了下老先生，然後揉了揉眼睛，再仔細看下星盤，沒有錯，真的變了。


    我真的以為自己不適合解讀星盤，因為連盤都看錯、看不清楚。記得當時的我，在眾目睽睽下需要說幾句話，但我一句都說不出來，我只能看著老先生說：「老師，這個盤……好像，有點問題。」


    老先生笑著說：「喔！你看到了呀？」


    我點了點頭，說：「怎麼盤在動？而且，照個這盤看來，你應該已經……」


    後面的話我不敢說，說出來，應該會被現場那些尊敬老師的師兄弟姊妹們打扁吧？


    老先生笑著說：「對，你看得沒有錯。上官，記得，修行勝五行。永遠記住。」


    後來我才聽其他資深的師兄弟們說，老師本來命該絕，因為和陰間談了條件，所以又活了起來，條件是直到他的兒子長大成人為止。


    所以，老先生也在努力修行幫助他人，這是他活下去的交換條件。而在他最後的幾年，我也搭上了這部神奇的靈性列車，遇到神奇的靈性高人。


    「該入行了，」老先生提醒我。「上官，你該想一想，收費了喔！」


    我實在很難接受要進入這個行業。在當時，感覺自己好像變 low（低）了。我的腦中只出現那些做宮廟的乩童，或是會算命的半仙，再不就是頻頻上電視的名嘴，但在我的腦海中，我就是不知道該把自己放在哪個位子上，我覺得，哪個位子都不像是我可以待著工作賺錢的地方啊！


    於是，夢境又來了，然後，老先生鼓勵我去英國學習。


    回來之後，好多人忽然出現找我解讀色彩密碼。就這樣，透過物質的交換（精油產品），我感覺可能比較像個樣子；就這樣，用著英國買來的工具，把我包裝在這個領域中，我可以躲在漂亮的產品背後，盡情的做我的靈性療癒，高大上的感覺，多少可以讓我免去成為宮廟廟公的恐懼。


    老先生給了我入行的一句話：「上官，記得，謹言慎行。」


    從此，我踏入了無心插柳的不歸路，成為非自願的治療師。


    ### 核心體悟 Core Enlightenment


    「修行勝五行」是我一直記著的一句話，也一直默默奉行著。


    我相信，命運掌握在自己的手中，而這些自由意志的觀點，也一直深得我心。我很不喜歡那些命定的說法，但卻又無法掙脫這些命定的軌跡。所以，一直想要找到的，就是「掙脫」這些命定軌跡的治療方式。


    如果一個人可以透過修練就轉換命運，這樣的好方法，為什麼不去執行？我相信人之所以再次生為人，必然有著這其中的玄妙在。透過再次的修行，快樂的修練，智慧的修練，人們必然可以有著不一樣的人生。這一路上，艱苦考驗，過關斬將，一直沒有停過。但也很幸運的，就是會遇到同道中人的支持。實際上，都是這些長輩在無條件地支持著我。各類的靈性人士，就是會在我需要的時候出現，無所求，只是支持著我的蛻變人生。


    有一次，我問一位自己接訊息來找我的靈媒姊姊，「為什麼你要這樣默默地支持我呢？」她說：「因為你值得。你早就被設定好是靈性的領導，所以你會走在眾人之前。你的思維超出常人，非常先進，不過你太單純，無法適應這複雜的人間，所以我要助你，助你覺醒。」一路走來的覺醒路，真的很難走。重重的考驗和關卡，就像人生的階梯一樣。


    走在靈性的道路上，最難的，應該是面對「愛」你的「恨」吧！


    ### 自我療癒


    #### 愛你的恨


    假如你要面臨最後一天最後一口氣了，你可以怎麼做？


    也許現在提出這樣的想法還太早，因為你不覺得自己會面臨死亡。但如果現在不練習，你將依然會活在傲慢的世界中，凡事以自我為中心，以自己的痛苦為痛苦，以自己的私心為活著的唯一目標。


    因此，如果能夠趁著身強體壯時，可以有小小的修練，到了衰弱無力時，你的身體就不會反彈出那些魔性，那內在的魔性可以用各種情緒的字眼來稱呼，像是：恨、怒。


    這些瞋恨的力量，往往會燒壞我們的腦神經，燒毀我們的生命原動力，甚至毀了我們的美好靈魂記憶。例如，同樣是紅色的動能，是喚醒的力量，卻也是摧毀的力量。因為一樣有力量，只是結果不同。


    紅色的魔性，瞋恨的力量，往往是摧毀一個人生命原動力的基礎。而恨與愛，是一體兩面。在紅色的力量中，這兩種力量是同一個源頭，你會發現，愛是源頭，恨也是源頭。這兩種力量，都是可以滋養生命的力量，卻會養出不一樣的兩種人性。只是，這兩種力量都在養活著我們，最後形成了今天的我們。


    在我們的人性中，有一種力量，紅色的瞋恨力量，也是所有混亂的源頭。這股力量，像是佛教宇宙觀的阿修羅。阿修羅，又稱為「非天」，是欲界中的大力神，天生易怒好鬥，喜歡攻擊和戰爭。在佛教的六道③裡，遍佈在五種境界中。這樣的性格，我們可以在很多層面中見到，特別是個性中的一「鬥」性。妒嫉、羨慕、貪婪、掠奪，這樣的能量往往會造成許多問題，而這也是我們療癒的緣起。


    所有的負面，只能以愛療癒。但是，愛卻會延伸出恨；當恨出現時，我們便失去了愛，充滿毒性。我常常在療癒中見到這種力量，很多的仇恨爭奪，往往都是由於這股力量作祟所致。


    阿修羅羨慕天人所擁有的一切，就如同我們羨慕他人的幸福快樂一樣。想想，為什麼我們要羨慕呢？因為我們想擁有，想要和他人一樣的擁有，所以會羨慕，會想要得到，甚至想要掠奪他人的所有。


    在恨中，我們想不擇手段地爭奪得到；在愛中，我們只能不爭的得到。其實恨也是愛，只是這是「得不到」的愛，而愛是可以得到的愛。所以，恨與愛，還是同一件事。然而，爭到了就一定幸福嗎？那也未必，只是阿修羅看不到遠方，只有眼前。


    因此，如何由「得不到」成為「得到」呢？如果從另一個角度來理解，「得不到」是不是就是「得到」呢？所以，讓我們先來愛我們所恨的吧！


    步驟如下：


    1. 由鬥到不鬥，是一個關卡。爭就是不爭，不爭就是爭。可惜阿修羅不能明白，只貪顧眼前，沒有內心平靜的渴望，只有爭鬥度日。我們每個人都有這一面，如果你也有，沒有關係，請你找到你的「阿修羅」，只是「靜靜的看著他（她）」，接受他的存在。

    2. 我們無法驅除內在的阿修羅，只能以愛療癒。看看他想鬧什麼事？你會讀到他的不平、不滿、委屈、仇恨、不滿足、不幸福、抱怨……當你接收到這些訊息時，全都吸收進你的身體來。

    3. 直接進入最深的恐懼，了解你的阿修羅在恐懼什麼？害怕什麼？他之所以要爭取，是因為害怕；之所以要爭鬥，是因為恐懼。去進入內在最深的恐懼，停留在這些恐懼的狀態中，不要反應，只是感受。

    4. 把注意力導向身體，從內在去感受身體。將這些所有負面的感覺融入到自己的身體。你可能會感覺到身體某部分卡住了，沒關係，知道就可以了。然後繼續停留在這些恐懼的感覺中。

    5. 只是去感受，不要用想的。這樣你就由心智收回意識，確認身體的放鬆，然後感覺自己一直在呼吸。

    6. 最後，去感受全身活生生的器官、細胞，讓光流經全身。

    7. 覺察整個身體的能量場，想像身體整個在發光發亮，晶瑩剔透，閃閃發光。

    8. 我們身體最後所具有的，只是存在一種「無所不包的愛」的感覺，而身體內的感受將突破任何限制，不再受限。阿修羅只能以愛喚醒，無法與之爭鬥，愈鬥愈限制，愈無法找到出口，只能用更高層次的包容力降伏。


    > ③ 佛教宇宙觀的一部分。《法華經》提到：「六道眾生生死所趣。」十界中由上而下的六道，分別是天道、阿修羅道、人間道、畜生道、餓鬼道、地獄道。


    ### 以愛療癒


    生生世世，菩提之心就是以愛為願，以愛為行，以愛為光。


    你我都有阿修羅，如果運用得好，也是戰將一位。人生也是需要打仗的，我們的功力，可以用在正向的事情中，而不是展現自苦來砍死自己，那就可惜了一身的好功夫呢！


    ### Chapter 5 夢中的學習之旅


    很多人常常因為想法和身體被緊緊捆綁在一起，所以思想所創造的能量便會由身體所掌控，以致於難以改變一些偏執的想法。而其實，愈固執的人，愈適合由夢中來快速轉化。


    我的靈性世界是由夢境開啟的，或許可以說，我有个活躍的靈性視覺（靈視）。在能量的世界中，說我個造夢人，或是夢想的實踐者，具有打造令人滿願的專業，我想我應該當之無愧。


    從很小的時候，我就很能做夢。國中的時候，我可以一連三天夢到月球上的連續劇，男主角是楚留香和蘇蓉蓉（這樣你就知道我的年齡層了），他們的腰上都有著一個金黃色的腰帶，並且可以發出光芒來，有危險或有需要時，腰上的腰帶就會發射出金光。


    當時夢醒後，我告訴母親，媽媽說我以後可能可以成為小說家，因為太厲害了，這種不切實際的科幻內容也能夠一連幾天夢出來。我曾經以為自己可能真的可以成為一個劇作家或小說家，不過後來才發現，原來這些靈能夢境，卻是日後學習到的理論基礎。


    多年後的科學能量療癒工作中，我才明白十多歲時夢到的內容，那「腰帶」竟然是彰顯一個人最重要的「價值」能量場。


    一個有自信、有自我存在價值感，或是有著高度智慧與幽默感的人，他的腰上就會出現一股這樣的「金黃色腰帶」能量，而且是金黃色的頻率。那些可以用第三眼見到色彩能量的人們，特別可以觀察到這股能量帶。我在學習和工作的過程中，往往在療癒的場域裡可以「見到」這股力量。一些在原生家庭受創傷的成年人，當他們想拿回自己失去的力量時，我也會見到這些力量由外回到他們的身體裡。


    多年後想起的童年記憶，我也會覺得特別有意思。雖然寫這本書的時候我是信心滿滿的，但那是在我的內心深處，有著許許多多自己和上天（或無形界）的誓約與祕密。要公開這些內在的祕密，我還是有點緊張，不知道大家會如何來「認可」我的身分和形象。


    這樣的擔心或顧忌，也是金黃色價值區的呈現。在這個區域，存在著我們過去生帶來此生的細胞記憶；而我們本來帶在身上的記憶，也因為成長過程中的種種體會，被心酸或生命磨練、父母教養、文化背景而制約，以至於我們像是喝了孟婆湯的新生人般，這一生一世得要重新尋回這失落的記憶。


    另一方面，夢境也是一個有趣的管道，主宰著我們無意識中一切存放的記憶。這些記憶，有來自父母的基因遺傳，以及我們自身的靈性記憶。


    對我來說，夢中的學習比醒來後的學習輕鬆多了。不管是夢裡出現的情節、畫面、色彩或聲音，不同的人物，甚至是治療，醒來時我總能印象深刻地寫下來。


    一開始我並不清楚這是怎麼一回事，也沒有問過任何人。由於好奇心使然，開始在床上放一本素描本，在不開燈的情況下，有時只是記下來幾個字，或是畫個圖示。不管什麼情況，我的夢數十年來始終活躍。


    睡覺成了我很喜歡的補充能量方式之一。也可能是睡得很開心，睡眠中的夢境，遂成了我和其他的世界、以及和另一個自己溝通的橋樑。不擅言詞，不善表達情感的我，也往往可以透過夢境自我修復，甚至靈魂出體的跑出去做出更多美好助人的事。'
