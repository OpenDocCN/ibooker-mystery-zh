    # Part 心與物質的生存考驗


    耶喜喇嘛曾經表示過：「證得了大樂和空性之後，就不會有風襲的疾病。如果一個人心中有大樂，就沒有容納緊張的空間。」梭巴仁波切說：「偉大的禪修者因為有密續（Tongpa）的證量，即使是在處理問題時，也不會產生憂鬱的感受。」這真的是我嚮往的境界，也是我逐漸開始體會到的能量境界。如何成為不憂鬱、快樂的瑜伽士：


    # 1. 調整身體四大元素（地水火風）的健康（神經系統）


    用樂觀的想法讓自己心情平靜，不產生高或低的情緒。很多人現在無法入睡，或是精神亢奮出現，都是因為思路過多，雜念太多，令所有沒有意義的思想進入干擾了神經系統，然後影響健康和心情，如果保持正面不多想的生活方式，就可以讓神經系統趨向穩定，愈來愈健康。


    # 2. 調整呼吸進入氣脈的平穩，讓情緒可以逐漸受到控制


