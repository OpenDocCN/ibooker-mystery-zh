    我對弟弟，對家人或家族的愛，一直都非常濃烈，很多的愛，像是永不匱乏的一口井，而今，弟弟過世了，我的愛——這口不缺水的井，又如何給出呢？


    那天站在路邊，冷風吹過之後，我明白真的是沒有弟弟了，但我心中滿滿的愛怎麼辦？於是，我決定去個很多人可以叫我姊姊的地方，報名加入了教育部的朝陽計畫，學習心理學，並且從事青少年的生活學習管理輔導。就這樣，又有很多人叫我姊姊，我一腳踏入了認識自已的心理學專業輔導與團體帶領的領域中。


    ※


    我有很多的愛，我想傳遞給更多的「弟弟」。

    面對死亡，往往讓人變得狹隘，而我們總是會抓著那個所謂的「家人」不放。我很清楚弟弟的優秀在哪裡，但我有很多對於弟弟和家人的愛，我想把這個愛傳出去。今天，我唯一血緣的弟弟失去了，可是我卻多了很多沒有血緣的弟弟、妹妹。但感覺還不夠，因為我有很大很大的愛的容器，我就是很想傳遞出去。


