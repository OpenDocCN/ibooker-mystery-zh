    > ## 核心體悟

    Core Emits Immanence


    二元的世界是個對立的境界，而我們就一直活在二元的對立世界中。


    在一開始的彩油世界也是一樣。有愛，沒有愛；有錢，沒有錢。記得我們有位南非的工作夥伴，她得了癌症，於是到處找尋另類療法，希望可以在傳統的醫療之外，找到其他的療癒方式。就在她治療後沒多久，她遇到了色彩。這個令她震撼的另類療法，開啟了她的新人生。


    於是很快的，她去學習，然後成為色彩的治療師。接著，她決定在自己有限的人生中做點快樂的事。她成立了小小的工作室，每天早上認真的到工作室上班，然後打坐靜心，淨化能量，讓自己一天的開始，保持在正向的彩色覺知中。'
- md: '## Part 2 人生夢想設計藍圖


    家人都反對她這樣做。大家的想法是，有時間還不去多休息，保養身體，怎麼反而去忙了起來，而且還這樣辛苦，每天開店，每天給人做解讀，這樣病體豈不是會更糟？


    她說：「是呀，我的確身體有病。不過，我每天在忙碌之餘，卻感到非常快樂。更重要的是，當來訪的個案離開，我轉過身，回到我內心的寧靜時，我感受到藍色的平靜。剎那間，我就忽然完全不累了。」


    身心靈工作很重要的一個絕活，就是「打坐」，又稱為「靜心」。


    我們的同事沒說錯，與其坐著等死，不如起來做場靈性的服務。我們有句話：「把恐懼交給上天，恐懼就去做靈性的服務。」南非的治療師開始回頭找到內心的平靜。這平靜，就像是上天給予的「充電」。她說：「每次這樣回到藍色的平靜，我的心就靜了，然後人就不累了。身體充滿了電，又可以去幹活了。」


    這個真實的故事很令當時同期的我感動，我也有同樣的感受，每次好像做得很累了，但只要一平靜下來，就忽然不累了。比較有趣的是，長年的工作，沒有停的奔波，我有時候也真的覺得非常疲憊，但自然界的能量就是如此神奇，神奇的色彩能量往往會帶給我出奇不意的充電。


    記得有一次在高雄，下了課，我也累了，就在學生帶我去餐廳的路上，途中經過美術館旁的高大綠樹時，我的疲憊竟在剎那間立刻被綠色吸收了，完全消化完我的疲憊，等到了餐廳，我已經煥然一新，完全沒有疲倦之態。這種深深融入自然界的色彩力量，每個人都有機會可以體會，但卻不是每個人都可以感受到。為什麼呢？因為沒有靜心的品質。沒有靜，就沒有境，也就無法進入到當下的「境」去吸取色彩能量。


    對我來說，生命的歷練和能量場域的能量視覺一直困擾著我，我試圖想在其中找到和諧的道途，就像是父母不接受宗教和靈性的力量，只信任自我一樣。但我卻一直在靈性的力量中，感受到它們經常幫著我，甚至支持我超越眼前自我的困境。這又怎麼解釋呢？我的身體與生活被制約到努力活著，並且是為了生存而活，但另一個我卻勇敢的朝向大家不明白的境界邁進。久而久之，我覺得自己活在兩個拉扯的世界中，常常在夢中或修行場中，便感受到「出離」的快樂。也許是逃避，但我卻深刻感受到「寧靜」的永恆。


