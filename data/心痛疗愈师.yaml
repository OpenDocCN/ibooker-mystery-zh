    # 關於本篇序文作者：


    一九七六年，誕生於「佛法聖地文化藝術之鄉熱貢唐卡發源地」吾屯村。一九八○年代，承接法王十世班禪大師傳承的大威德金剛密法和菩提心願法。一九八三年，被當地一代法主洛桑尼瑪大師選為「善根」，在隆務大寺受僧戒。之後進入吾屯寺，師從紮西拉旦等數位上師，學習佛法及唐卡泥塑等文化藝術。龍達上師的唐卡藝術成就享譽全球，不僅榮獲各大獎項，二○一四年更獲讚為「中國十大唐卡大師」。'
