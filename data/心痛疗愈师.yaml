- md: '# Part 111 心與物質的生存考驗


    到西藏的旅行，我開始發現自己逐漸拾回了某些遺忘的過去，我去給孩子們講課，募款到孤兒院，特別是幫助一些女童。師父告訴我，我有著獨立的生存能力，能夠走遍世界，勇敢又有智慧，但很多藏區女童是沒有這樣的幸運。她們一出生為女性，便注定了一生的悲劇，沒有學識，有的未婚懷孕，甚至被拋棄，只能幫助家計，過著沒有明天的低層生活。所以，我們開始去幫助一些幼童，特別是女孩子，給他們教育，也希望能助養她們的生活。


    在西藏，我學會了另一種生活方式，就是沒有擔憂，這個特性在傳統的老一輩人身上特別鮮明，這些天性樂天知命、有信仰的藏族老人，吃完飯第一件事就是繼續誦持六字大明咒，他們不擔心下一餐能不能吃飽，錢從哪裡轉來，他們在乎的是一念經。


    你如果由外在環境來看，可能只會看到貧窮和髒亂，然後我們的思維會想，這麼窮怎麼辦呀？要趕快想想賺錢的事，多弄一點錢，生活才會變好啊！或許，等生活條件變好了，有時間才能念經吧？這是我們的思維。


    在藏區，你看不到這種信念，他們只有謝天、謝菩薩，然後把這種感謝迴向給世界，給眾生。這種純樸的感覺，雖然在年輕人的身上愈來愈少，但靈魂層次上的特性，並不會因此而喪失。當我在英國遇到藏族人時，雖然還是有著同樣的生存課題，但他們卻比較容易苦中作樂，或是根本就還是活在一個「樂」的境界裡。


    完全不誇張，如果你有機會去接近他們，會發現，在純樸的地方也許髒亂，但卻有著純潔的心靈，你看到大家的生活主要不是為了生存、名聲和金錢，也不是為了有幾棟房子和車子，而是當天心靈的平靜和感恩。這樣的信念，也難怪藏傳佛教的修練能擴散到全球，甚至風靡許多西方名人。這種天性上的特質，我個人特別崇拜。


    # Chapter 16. 走進西藏、不丹和印度


    也或許，我的內在也有著同樣的特質，所以會互相吸引。因為對我來說，吃不好沒關係，錢不多可以再努力，但是，如果心靈失去自由，或是失去平靜，就算給我山珍海味，我也會吃不出任何味道。


    在一次機緣下，學生透過不丹文化部的人士，幫我們安排了一次不丹之旅。為了藝術和朝聖幸福的國度，我們一行人又啟程前往。


    很奇妙的是，再一次的，進入到一個沒什麼科技又不富裕的環境，但精神上卻是豐富與滿足的，那種安定的感覺，讓世界上的人稱這塊土地是「充滿幸福」的地方。


    如果我們放下生存的擔憂和恐懼，跳脫現有的空間思維，不從外表看，你在不丹，就會逐漸感受到自己的心開始融化，說不上是一種什麼變化，這種變化很細微，需要細細體會。我總覺得，當人們不再關注外在的一切時，似乎才能找回內心的平靜。而當我們在辛苦的生存環境中，像我，在西藏時，成天是滿身灰塵到處跑的漢族女子，對外在的美醜不再關注，結果每天的生活就是從單純的起床開始，享受著被牛叫醒的快樂，然後就會發現，當不再專心於今天會吃什麼好料，或是要去哪間spa店享受按摩，完全沒得比較時，這時候的自己，才真的是內心豐盛。


    我們常常外在豐富了，卻形成了貪心和比較心，所以現在的人才會覺得，為什麼生活變好了，但心靈卻感覺更痛苦了？大家百思不得其解，卻仍繼續在痛苦中追求著。


    我遇過一些大陸的企業領導人，渾渾噩噩的一直追求金錢財富，身體壞了也不想停止，總是不滿足於小筆收入，而想來筆大的，投機的心態令自己家庭失和，婚姻失敗，也讓內心更加痛苦。而臺灣的一些企業主，雖然不會這樣追尋，卻又迷失在宗教和信仰當中，想運用神明的力量或是地方信仰，來渴望事業的順利。


    我常常在想，是不是我們真的脆弱到了這種程度，需要超越人類層次的力量，來支持我們找到自己？或許父親的堅持也有幾分道理，父親總說：「難道我不信神就會不幸運嗎？」而且說人是有自由意志的，可以靠自己而不是靠外界。我的天生能量感雖然幫不到父親的信仰，但是，當我看到不管有錢沒錢，大家都在追尋著人生的迷思，卻往往無法找到方向時，我便明白，不將能量放在外界，也就是不能全副心力專注於外在的生活，金錢的追求，富裕的面子，穿衣打扮，整容化妝，開什麼好車，住什麼豪宅。不論內心相信什麼，如果可以動動腦子思考一下，或許在自己所相信的世界中，就會有著非凡的成就，而不是沉迷於某種信念，失去靈魂的質感。


    在能量的世界，能量的掠奪與尊重是非常需要理解的。不然，你會很容易陷入迷惑，但要明白不陷入，自我的探索、反覆的自我理解與療癒是必須的過程。走進藏傳佛教的西藏與不丹之後，我們一行人更堅定了心性主導一切與不抱怨的重要，也有更多的經歷可以見到大自然的美好，並且更能與自然界互動連結。


    從不丹回來後，有很久的一段時間，我連睡在自己的床上都有著幸福感覺。難怪大家說不丹是幸福的國度。不是收入，不是奢華，也不是極為美麗的天空，而是一種內在滿意的能量感。這種感覺，似乎才是靈魂可以一直帶著走的。


    想想，我們一生中去過多少地方？現在的人生活都已經有一定的水準，大家三五五時就可以去旅遊。當你旅行結束回來，除了美美的照片和滿滿的紀念品，還保有了什麼呢？除了一種感受，其實我們什麼都留不住呀！


    每豐富一次，我就會感覺自己的靈魂又厚實了一點，像是拼湊的靈魂地圖又完整了一塊。這也像是路西佛的故事，當心拼湊得更完整，翠綠的寶石逐漸收藏齊全時，心也將更為豐盛，我們就會找到回天國的道路了。


    很多年來，我都有這種心靈回家的感覺。如果我們的心愈來愈和諧了，撒旦魔鬼不再心魔叢生，我們也就比較不會給自己添麻煩。更重要的是，不會一直習於給自己破碎的心找痛苦，因為心的習慣在逐漸完整後就會改變，不會再渴望回到缺憾不完整的狀態裡。這就是我們豐富的習性，一直停在高處的豐富狀態。


    讓自己的靈魂豐富，或許才是我們旅行的主要目的吧？人生，又何嘗不是一場旅行呢？


    不丹之旅，因為同團的夥伴中有人是剛做完化療還光著頭，有人是婚姻出了問題，也有人是想找回自己生命的美好，許多不同心態的一群人，創造了這場旅行，也讓我在不丹的教學深受觸動。在良好土地，做對的事情，這種天時、地利、人和的感覺，特別可以創造更強大的療癒力。


    記得當年光頭的團友，一開始都用假髮和帽子作遮掩，只因為之前身為模特兒的美麗，令她病後非常自卑。沒想到，不丹這個佛教國家（以藏傳佛教白教為國教），對光頭是崇敬的，讓這位病友到了當地非但不自卑，還大方地亮起光頭。當地人以為她是女尼姑，也紛紛給我們最大的方便，連法會都可以坐到最前排，這個團友完全打開了快樂因子，也光榮地展現自己病後美麗的光頭。大家開心的一起蛻變，到現在想起來都還懷念不已。


    Core Enlightenment


    幾年後，另一次不丹行程中，一位三個孩子的媽，就是因為一直持續觀察我們團隊，被觸動了，所以決定加入。除了愛上自己，還愛上了自己生命的道路，更重要的是，她逐漸走出痛苦，渴望擁有創造生命奇蹟的能力。


    就這樣，三年後的另一場旅行，這位媽媽又一起來到了印度，來到我們的印度醫學回春養生中心。大家因為都熱愛身體的舞動，每天練瑜伽又增進了彼此的感情，就這樣，我們的深圳教育中心也因此實現，並且專攻瑜珈和能量舞動的培訓。


    支持著這個媽媽想要經營教育事業的原因，主要是來自身旁朋友們的驚訝，大家紛紛問她，是做了什麼讓自己變得如此有光彩與美麗？她自豪的說：「我跟隨了老師！」


    這樣的榮耀與光環，使她吸引到美容院所及瑜伽館的女性負責人，大家紛紛想要了解，什麼是能量療癒？什麼是色彩能量？什麼是色彩能量的管理法？


    而當年堅持去一趟不丹的重慶好姊妹，回來會後宛若新生，重新恢復了健康與美麗，也重新開創了美麗的事業。不過回來之後的她，開始學會珍惜身旁的愛，也學習不再隨便發脾氣，對於疼愛她、一直捧著她在手心上，卻一直被挑剔的老公，也開始學會更珍惜與感恩。


    每次的因緣都讓我深深體會到，雖然創新或是首次創作都充滿了艱辛，但每次的結果都是成功和美好的，沒有一次例外。這樣的過程，我開始享受美好的果實，因為只要假以時日，總是會見到好的種子所結出的好成果。除了感恩，我們沒有別的事可以做了。


    就在今日，我活在感恩中。


    # Chapter 16. 走進西藏、不丹和印度


    隨著自己的心靈層次提高，我們會見到不同的世界，也能見到他人的美好。有一種人內心充滿喜悅，哪怕沒見過本人，光是看到照片，都會感受到其美好的溫暖，甚至想要親近這個人，感覺內心的喜悅。我就是因為一張照片而被吸引了。


    來自西藏的耶喜喇嘛就是這樣一個代表人物。不可否認的，我的道路很多是做自於他的親身實證，因為他不僅忙碌於各地中心或弟子的指導，卻不曾耽誤他自己的西行，反而愈忙愈隨之增長。而他快樂的磁場，連走在路上不認識的人都可以感知到，這是何等了不起的一種能量呀！


    耶喜喇嘛如同寂天大師一樣，都是一個偉大的祕密瑜伽士，不太以外相來吸引人，也不隨便顯示自己的高級證量⑥，這樣的人我十分崇拜。更巧妙的是，當我讀到他的傳記，才發現我們都一樣「嗜睡」，睡眠中的休息和體悟對我們來說，非常重要，我常常也需要花個一段時間好好睡覺，才能得到靈性的提升。因為睡覺是靈性提升的橋樑，以及能量修復的重要時刻。有時候我覺得不像是在睡覺，反而像是手機或汽車充電一樣，充滿了電就完成過程了。這在我學習那洛六法⑦時，教導的空性大師卻殷仁波切，給我帶來了睡覺中的修行技巧，可惜我仗著天生的靈敏，不用學就會通的傲慢，始終也沒有好好的練習。現在想起來，真的很慚愧自己的年少無知呀！


    > ⑥ 證量：在佛法中指實證之後，體驗之後，可以觀察到、印證到，和佛經印證無差，就是證量。

    > ⑦ 那洛六法：又稱那洛六法瑜伽，藏傳佛教中集合拙火瑜伽、幻身瑜伽、光明瑜伽、夢瑜伽、中陰瑜伽、遷識瑜伽成為六法，傳承自那洛巴，故名。


    自我療癒——拙火之樂——


    耶喜喇嘛曾經表示過：「證得了大樂和空性之後，就不會有風襲的疾病。如果一個人心中有大樂，就沒有容納緊張的空間。」梭巴仁波切說：「偉大的禪修者因為有密續（Tongpa）的證量，即使是在處理問題時，也不會產生憂鬱的感受。」這真的是我嚮往的境界，也是我逐漸開始體會到的能量境界。如何成為不憂鬱、快樂的瑜伽士：


    ## 1. 調整身體四大元素（地水火風）的健康（神經系統）


    用樂觀的想法讓自己心情平靜，不產生高或低的情緒。很多人現在無法入睡，或是精神亢奮出現，都是因為思路過多，雜念太多，令所有沒有意義的思想進入干擾了神經系統，然後影響健康和心情，如果保持正面不多想的生活方式，就可以讓神經系統趨向穩定，愈來愈健康。


    ## 2. 調整呼吸進入氣脈的平穩，讓情緒可以逐漸受到控制


    心肺功能，呼吸狀態，都會鎖在我們的橫隔膜部位。如果內在壓力很高，經常心裡藏著苦澀無人可訴，呼吸就會變得薄弱，血壓也會比常人低，這樣的狀況容易無力。因此，多練習呼吸或是慢跑，可以逐漸提高心肺功能，情緒也會得到改善和控制。


    ## 3. 身體的鍛鍊可以多練習哈達瑜伽，讓身體的柔軟度不斷提高


    這是個非常古老傳統，也最為普遍的瑜伽練習，重點是為了提升肉體和精神的雙重健康。哈達瑜伽的文字中，Hatha 中的 Ha，代表了瑜伽中三脈裡面的右脈，象徵太陽的力量，tha
    則代表左脈，象徵月亮的力量。如果兩個相對應的陰陽合而為一，就可以促進中脈的暢通，淨化乾淨與暢通的中脈可以讓人靈性力量提升，身體也會非常健康。


    ## 4. 清理神經系統（氣與脈），讓自己沒有容納痛苦的空間


    如果依照前面的方法進行鍛鍊，呼吸的氣（如慢跑鍛鍊心肺）和身體的脈（如瑜伽練習）都可以穩定，內心就會比較和諧，沒有過多的憤怒或憂傷，而身體因為氣息飽滿，也比較容易儲存帶來正面感覺的氧氣，不會因為二氧化碳過多而容易鬱悶。


    ## 5. 去觀想身體和能量體都如水晶般乾淨


    這個層次需要練習，因為一直想像自己很透明或潔白，需要經常性重複練習。想像自己的吸氣、吐氣都很乾淨，也可以想像練習瑜伽的三脈七輪都是透明潔白，非常明亮的狀態。色彩的觀想法，需要一點時間進入情況。


    ## 6. 最後身體和心靈會一起進步，然後進入快樂的禪修能量中


    我所帶領的彩色禪修，主要是以快樂和輕鬆為主要的方式，我們有時唱，有時跳，有時靜，有時動。在動靜之中享受身體和心情的愉悅，身心合一卻不停留在情緒的釋放，平靜地進入一種美學的體悟，這就是彩色禪。


    彩色的身體地圖，需要以愛滋養。身體的地圖會因為愛的養分，體驗到快樂的最高境界！


    > ⑧密續：佛教秘密傳承的修行祕法。


    # Part Ⅲ 進入臣服天職的階段


    孔子說:三十而立,四十而不惑,五十而知天命,六十而耳順。

    從很小我就非常喜歡讀中國文化基本教材,並且一直規範自己成為君子般的賢聖之人。不能聖,好歹也要賢呀!


    但論懂論命的我,人生卻仿若電影《班傑明的奇幻人生》一樣,是倒著生長的,愈老愈開花,愈入世,愈需要勇敢地跳入凡間,而不會永不食人間煙火。

    四十有一點點不惑是真的,因為四十之後,我才敢小小的公開承認自己的天賦本能。長期以來只想為了家人的生存打拚的我,走入這一行也是非自願的結果,雖然可以有各種機會做選擇,但奇妙的是,做能量及夢想工作的我,就是如此信手捻來,並且在自我制約極多的情況下,總能機會不斷。

    這樣自動湧進的工作機會,以及家中層出不窮的事件,忙得我根本忘了做選擇。以前身心靈界一些同業競爭的人總說我很愛賺錢,明明家裡有錢還死要錢。殊不知,我的家庭狀況正好相反,我忙著解決學生問題、無形界問題、家庭問題、個人問題,忙得已經無法多加思考,自然也養成我不在乎他人的耳語、八卦與是非,因為我只能專心愛我所在意的人事物,無法分出心思來在乎莫須有的負能量。


    但我的心仍是在乎和害怕的。不能明白自己努力生存下去,為什麼總招致一堆的閒言閒語和惡意打擊與誤解。因此,我能低調絕不高調,我只希望平平安靜的把工作完成,賺到我該賺的錢,讓父母衣食無憂,我的學生和員工可以相對沒有煩惱,這樣我就滿足了。


    但四十之後,我終於開竅了,因為明白我的痛苦也是大家的痛苦,我的迷茫更是眾人的迷茫,我的奮鬥也會是大家的解藥。

    而四十歲以後,我也開始明白,如果我有一點點的成績,或者順利發展,甚至這麼忙碌還能健康變年輕,都不是我個人的,而是更大的自然色彩能量場給予的支持,以及對更高層次的無限崇敬和一心不二的正念臣服,才讓我可以如此幸運。

    當然,還有我的孝順眾人皆知,這些累積的好能量,保護著我可以做更多令人美好的事情。

    一旦明白原來這些不是出自我個人,而是身後有太多的正能量,我只能把一切的美好歸於更高的層次,不居功,自然也就沒有個人榮辱的壓力。

    這種打通,我終於學會愛自己,承認並且接受自己的一切。因為,在我的自由意願之下所設計的人生藍圖,真的值得拍拍手,我一路的努力,也值得自己認可和得到榮耀!


    # Chapter 17 再次面對生死關


    不論是信神，或是信醫，這中間的信念才是關鍵。

    因為如果沒有強大的信念，願意自己幫助自己健康起來，

    誰都沒有辦法伸出援手來幫你解決問題。


    ## 再次面對生死的課題，是我最鍾愛的父親要向這個世界告別了。


    幫助無數人，療癒多少人心。我的脆弱點，就是見不得所愛的人痛苦。我一直以為父親可以長壽到九十歲，並且陪伴我長長久久，畢竟我是做天地的工作，也因為非常孝順，所以常常機會很多，幸運不斷。

    但是，就在我一場近千人演講演唱會的前一天，父親進了醫院。這次進去，便再也沒有機會離開醫院了。


    我的治療師開端是從生死理解的。

    而時光飛逝，沒想到很快又輪到了我的家人。家人是我的死穴，我可以忍受一切的不完美，一切的失落，就是無法忍受家人的失落或痛苦，甚至死亡。

    自從凱洛老師告訴我：「照顧關懷他人就是治療師的本質。」我聽話照做，不是因為有特殊的才華，而是因為強迫症一般的性格，只求完美。這在創作上、工作上、治療上，甚至在日後的團隊帶領上，這種性格讓我們始終戰勝一切。

    但是，我承認我有「強迫症」，如對色彩的敏銳，對療癒的要求，對所有工作細節完美與嚴苛的要求。我沒有想過對「不完美」的包容，雖然人生本就沒有完美，但我卻不肯低頭。


    二〇一五年，根據麥可·卡爾辛柯（Michael Kalesniko）的故事拍攝的電影《天菜大廚》，男主角由於對錯誤及不完美的無法容忍，結果把自己逼上絕境。我開始覺得自己愈來愈走上這樣的感覺裡，直到父親進了醫院，我才爆發出來。


    像我這樣驕傲的人，總以為只要有靈界的力量，沒有什麼做不到的。但我忽略了，人性中信念、信心、信仰的三觀，往往左右著連神都無法掌握的變數。


    我的父親本來可以不必進醫院洗腎，當時還健在的我的通靈和尚好友、我的靈性師長們、我的玄氧門師父，全都保證父親可過此關卡不會有事，也不需要洗腎。我向父親保證再三，然後才安心的飛離臺灣。沒有想到，就在我離開之後，當年弟弟過世時，專程跑來告訴我只要弟弟耳邊說一句話，七天後弟弟就可以甦醒，那個國小同學，那個二十歲開始洗腎，我替他和他洗腎的女友策劃婚禮的那個同學。忽然在多年後，就在那天經過父母的住處，他想到好久沒有聯繫我母親，於是福至心靈的打了問候電話，並且立即到我家拜訪。


    父母對於我和弟弟自小到大的好朋友都視如自己的孩子，當然熱情的接待了我的國小同學。結果談起了醫生建議洗腎這件事，我的朋友立即以過來人身分大力推崇洗腎的好處，並且告訴父親，如果不洗腎反而會立即死亡。


    就這樣，我一手安排好的計畫，被一個數十年來未碰面的程咬金給破壞了。我的父親第二天立即洗腎，洗腎的道路一旦走上去，就再也脫不了身。


    洗腎會破壞身體本有的機能，反而會讓健康衰敗，這是我的認知，所有以機器功能來轉動身體自然運作的事情，都會讓身體失去本有的功能。因此，我的父親終究沒有度過他恐懼的一關，就在最後那一秒鐘，他做了生命中最令我傷心的功課。


    當我一聽到父親「已經」洗腎，我的腦中轟地一聲，把我帶回到當年帶領學生走絲綢之路的聖地旅行時，第一站在西安大雁塔的場景。


    大雁塔存有當年玄奘帶回的《心經》抄本。當時我走近塔時並不知道，但我卻在靠近時，《心經》的聲音不斷地出現在腦海中，之後我才明白，原來那裡收藏著手抄本。


    聽到父親已經洗腎的消息，我手持著手機無法回應母親，腦中全是《心經》的唱誦。剎那間，我知道要領悟空性，色即是空，空即是色，父母沒有真的信任我的靈性洞見，他們為自己的人生做了恐懼的選擇。我哭不出來，只能一再的失望，因為接下來，父親不僅要面對自己洗腎的辛苦，也要開始面對逐漸衰敗的身體機能，更重要的是，我將無法再帶父親出國到遠方，因為他將受限於身體的限制。


    所有的一切，要得到結果前，必須先了解所種下的原因種子。這個種子一旦種下，便沒有退路。


    本來我在打的戰役，是避免父親因為腸道問題而逐漸產生的老年痴呆現象，這些在我們用能量檢測時就已經看出，但父母不肯繼續配合，認為沒有發生的都是無稽之談，並覺得人們都是要騙我們花錢。所以，當父親決定洗腎時，我已經是第二次的傷心，卻沒想到，這種傷心來得如此之快。父親不信'
  mdcn: '# Part 111 心與物質的生存考驗


    到西藏的旅行，我開始發現自己逐漸拾回了某些遺忘的過去，我去給孩子們講課，募款到孤兒院，特別是幫助一些女童。師父告訴我，我有著獨立的生存能力，能夠走遍世界，勇敢又有智慧，但很多藏區女童是沒有這樣的幸運。她們一出生為女性，便注定了一生的悲劇，沒有學識，有的未婚懷孕，甚至被拋棄，只能幫助家計，過著沒有明天的低層生活。所以，我們開始去幫助一些幼童，特別是女孩子，給他們教育，也希望能助養她們的生活。


    在西藏，我學會了另一種生活方式，就是沒有擔憂，這個特性在傳統的老一輩人身上特別鮮明，這些天性樂天知命、有信仰的藏族老人，吃完飯第一件事就是繼續誦持六字大明咒，他們不擔心下一餐能不能吃飽，錢從哪裡轉來，他們在乎的是一念經。


    你如果由外在環境來看，可能只會看到貧窮和髒亂，然後我們的思維會想，這麼窮怎麼辦呀？要趕快想想賺錢的事，多弄一點錢，生活才會變好啊！或許，等生活條件變好了，有時間才能念經吧？這是我們的思維。


    在藏區，你看不到這種信念，他們只有謝天、謝菩薩，然後把這種感謝迴向給世界，給眾生。這種純樸的感覺，雖然在年輕人的身上愈來愈少，但靈魂層次上的特性，並不會因此而喪失。當我在英國遇到藏族人時，雖然還是有著同樣的生存課題，但他們卻比較容易苦中作樂，或是根本就還是活在一個「樂」的境界裡。


    完全不誇張，如果你有機會去接近他們，會發現，在純樸的地方也許髒亂，但卻有著純潔的心靈，你看到大家的生活主要不是為了生存、名聲和金錢，也不是為了有幾棟房子和車子，而是當天心靈的平靜和感恩。這樣的信念，也難怪藏傳佛教的修練能擴散到全球，甚至風靡許多西方名人。這種天性上的特質，我個人特別崇拜。


    # Chapter 16. 走進西藏、不丹和印度


    也或許，我的內在也有著同樣的特質，所以會互相吸引。因為對我來說，吃不好沒關係，錢不多可以再努力，但是，如果心靈失去自由，或是失去平靜，就算給我山珍海味，我也會吃不出任何味道。


    在一次機緣下，學生透過不丹文化部的人士，幫我們安排了一次不丹之旅。為了藝術和朝聖幸福的國度，我們一行人又啟程前往。


    很奇妙的是，再一次的，進入到一個沒什麼科技又不富裕的環境，但精神上卻是豐富與滿足的，那種安定的感覺，讓世界上的人稱這塊土地是「充滿幸福」的地方。


    如果我們放下生存的擔憂和恐懼，跳脫現有的空間思維，不從外表看，你在不丹，就會逐漸感受到自己的心開始融化，說不上是一種什麼變化，這種變化很細微，需要細細體會。我總覺得，當人們不再關注外在的一切時，似乎才能找回內心的平靜。而當我們在辛苦的生存環境中，像我，在西藏時，成天是滿身灰塵到處跑的漢族女子，對外在的美醜不再關注，結果每天的生活就是從單純的起床開始，享受著被牛叫醒的快樂，然後就會發現，當不再專心於今天會吃什麼好料，或是要去哪間spa店享受按摩，完全沒得比較時，這時候的自己，才真的是內心豐盛。


    我們常常外在豐富了，卻形成了貪心和比較心，所以現在的人才會覺得，為什麼生活變好了，但心靈卻感覺更痛苦了？大家百思不得其解，卻仍繼續在痛苦中追求著。


    我遇過一些大陸的企業領導人，渾渾噩噩的一直追求金錢財富，身體壞了也不想停止，總是不滿足於小筆收入，而想來筆大的，投機的心態令自己家庭失和，婚姻失敗，也讓內心更加痛苦。而臺灣的一些企業主，雖然不會這樣追尋，卻又迷失在宗教和信仰當中，想運用神明的力量或是地方信仰，來渴望事業的順利。


    我常常在想，是不是我們真的脆弱到了這種程度，需要超越人類層次的力量，來支持我們找到自己？或許父親的堅持也有幾分道理，父親總說：「難道我不信神就會不幸運嗎？」而且說人是有自由意志的，可以靠自己而不是靠外界。我的天生能量感雖然幫不到父親的信仰，但是，當我看到不管有錢沒錢，大家都在追尋著人生的迷思，卻往往無法找到方向時，我便明白，不將能量放在外界，也就是不能全副心力專注於外在的生活，金錢的追求，富裕的面子，穿衣打扮，整容化妝，開什麼好車，住什麼豪宅。不論內心相信什麼，如果可以動動腦子思考一下，或許在自己所相信的世界中，就會有著非凡的成就，而不是沉迷於某種信念，失去靈魂的質感。


    在能量的世界，能量的掠奪與尊重是非常需要理解的。不然，你會很容易陷入迷惑，但要明白不陷入，自我的探索、反覆的自我理解與療癒是必須的過程。走進藏傳佛教的西藏與不丹之後，我們一行人更堅定了心性主導一切與不抱怨的重要，也有更多的經歷可以見到大自然的美好，並且更能與自然界互動連結。


    從不丹回來後，有很久的一段時間，我連睡在自己的床上都有著幸福感覺。難怪大家說不丹是幸福的國度。不是收入，不是奢華，也不是極為美麗的天空，而是一種內在滿意的能量感。這種感覺，似乎才是靈魂可以一直帶著走的。


    想想，我們一生中去過多少地方？現在的人生活都已經有一定的水準，大家三五五時就可以去旅遊。當你旅行結束回來，除了美美的照片和滿滿的紀念品，還保有了什麼呢？除了一種感受，其實我們什麼都留不住呀！


    每豐富一次，我就會感覺自己的靈魂又厚實了一點，像是拼湊的靈魂地圖又完整了一塊。這也像是路西佛的故事，當心拼湊得更完整，翠綠的寶石逐漸收藏齊全時，心也將更為豐盛，我們就會找到回天國的道路了。


    很多年來，我都有這種心靈回家的感覺。如果我們的心愈來愈和諧了，撒旦魔鬼不再心魔叢生，我們也就比較不會給自己添麻煩。更重要的是，不會一直習於給自己破碎的心找痛苦，因為心的習慣在逐漸完整後就會改變，不會再渴望回到缺憾不完整的狀態裡。這就是我們豐富的習性，一直停在高處的豐富狀態。


    讓自己的靈魂豐富，或許才是我們旅行的主要目的吧？人生，又何嘗不是一場旅行呢？


    不丹之旅，因為同團的夥伴中有人是剛做完化療還光著頭，有人是婚姻出了問題，也有人是想找回自己生命的美好，許多不同心態的一群人，創造了這場旅行，也讓我在不丹的教學深受觸動。在良好土地，做對的事情，這種天時、地利、人和的感覺，特別可以創造更強大的療癒力。


    記得當年光頭的團友，一開始都用假髮和帽子作遮掩，只因為之前身為模特兒的美麗，令她病後非常自卑。沒想到，不丹這個佛教國家（以藏傳佛教白教為國教），對光頭是崇敬的，讓這位病友到了當地非但不自卑，還大方地亮起光頭。當地人以為她是女尼姑，也紛紛給我們最大的方便，連法會都可以坐到最前排，這個團友完全打開了快樂因子，也光榮地展現自己病後美麗的光頭。大家開心的一起蛻變，到現在想起來都還懷念不已。


    Core Enlightenment


    幾年後，另一次不丹行程中，一位三個孩子的媽，就是因為一直持續觀察我們團隊，被觸動了，所以決定加入。除了愛上自己，還愛上了自己生命的道路，更重要的是，她逐漸走出痛苦，渴望擁有創造生命奇蹟的能力。


    就這樣，三年後的另一場旅行，這位媽媽又一起來到了印度，來到我們的印度醫學回春養生中心。大家因為都熱愛身體的舞動，每天練瑜伽又增進了彼此的感情，就這樣，我們的深圳教育中心也因此實現，並且專攻瑜珈和能量舞動的培訓。


    支持著這個媽媽想要經營教育事業的原因，主要是來自身旁朋友們的驚訝，大家紛紛問她，是做了什麼讓自己變得如此有光彩與美麗？她自豪的說：「我跟隨了老師！」


    這樣的榮耀與光環，使她吸引到美容院所及瑜伽館的女性負責人，大家紛紛想要了解，什麼是能量療癒？什麼是色彩能量？什麼是色彩能量的管理法？


    而當年堅持去一趟不丹的重慶好姊妹，回來會後宛若新生，重新恢復了健康與美麗，也重新開創了美麗的事業。不過回來之後的她，開始學會珍惜身旁的愛，也學習不再隨便發脾氣，對於疼愛她、一直捧著她在手心上，卻一直被挑剔的老公，也開始學會更珍惜與感恩。


    每次的因緣都讓我深深體會到，雖然創新或是首次創作都充滿了艱辛，但每次的結果都是成功和美好的，沒有一次例外。這樣的過程，我開始享受美好的果實，因為只要假以時日，總是會見到好的種子所結出的好成果。除了感恩，我們沒有別的事可以做了。


    就在今日，我活在感恩中。


    # Chapter 16. 走進西藏、不丹和印度


    隨著自己的心靈層次提高，我們會見到不同的世界，也能見到他人的美好。有一種人內心充滿喜悅，哪怕沒見過本人，光是看到照片，都會感受到其美好的溫暖，甚至想要親近這個人，感覺內心的喜悅。我就是因為一張照片而被吸引了。


    來自西藏的耶喜喇嘛就是這樣一個代表人物。不可否認的，我的道路很多是做自於他的親身實證，因為他不僅忙碌於各地中心或弟子的指導，卻不曾耽誤他自己的西行，反而愈忙愈隨之增長。而他快樂的磁場，連走在路上不認識的人都可以感知到，這是何等了不起的一種能量呀！


    耶喜喇嘛如同寂天大師一樣，都是一個偉大的祕密瑜伽士，不太以外相來吸引人，也不隨便顯示自己的高級證量⑥，這樣的人我十分崇拜。更巧妙的是，當我讀到他的傳記，才發現我們都一樣「嗜睡」，睡眠中的休息和體悟對我們來說，非常重要，我常常也需要花個一段時間好好睡覺，才能得到靈性的提升。因為睡覺是靈性提升的橋樑，以及能量修復的重要時刻。有時候我覺得不像是在睡覺，反而像是手機或汽車充電一樣，充滿了電就完成過程了。這在我學習那洛六法⑦時，教導的空性大師卻殷仁波切，給我帶來了睡覺中的修行技巧，可惜我仗著天生的靈敏，不用學就會通的傲慢，始終也沒有好好的練習。現在想起來，真的很慚愧自己的年少無知呀！


    > ⑥ 證量：在佛法中指實證之後，體驗之後，可以觀察到、印證到，和佛經印證無差，就是證量。

    > ⑦ 那洛六法：又稱那洛六法瑜伽，藏傳佛教中集合拙火瑜伽、幻身瑜伽、光明瑜伽、夢瑜伽、中陰瑜伽、遷識瑜伽成為六法，傳承自那洛巴，故名。


    自我療癒——拙火之樂——


    耶喜喇嘛曾經表示過：「證得了大樂和空性之後，就不會有風襲的疾病。如果一個人心中有大樂，就沒有容納緊張的空間。」梭巴仁波切說：「偉大的禪修者因為有密續（Tongpa）的證量，即使是在處理問題時，也不會產生憂鬱的感受。」這真的是我嚮往的境界，也是我逐漸開始體會到的能量境界。如何成為不憂鬱、快樂的瑜伽士：


    ## 1. 調整身體四大元素（地水火風）的健康（神經系統）


    用樂觀的想法讓自己心情平靜，不產生高或低的情緒。很多人現在無法入睡，或是精神亢奮出現，都是因為思路過多，雜念太多，令所有沒有意義的思想進入干擾了神經系統，然後影響健康和心情，如果保持正面不多想的生活方式，就可以讓神經系統趨向穩定，愈來愈健康。


    ## 2. 調整呼吸進入氣脈的平穩，讓情緒可以逐漸受到控制


    心肺功能，呼吸狀態，都會鎖在我們的橫隔膜部位。如果內在壓力很高，經常心裡藏著苦澀無人可訴，呼吸就會變得薄弱，血壓也會比常人低，這樣的狀況容易無力。因此，多練習呼吸或是慢跑，可以逐漸提高心肺功能，情緒也會得到改善和控制。


    ## 3. 身體的鍛鍊可以多練習哈達瑜伽，讓身體的柔軟度不斷提高


    這是個非常古老傳統，也最為普遍的瑜伽練習，重點是為了提升肉體和精神的雙重健康。哈達瑜伽的文字中，Hatha 中的 Ha，代表了瑜伽中三脈裡面的右脈，象徵太陽的力量，tha
    則代表左脈，象徵月亮的力量。如果兩個相對應的陰陽合而為一，就可以促進中脈的暢通，淨化乾淨與暢通的中脈可以讓人靈性力量提升，身體也會非常健康。


    ## 4. 清理神經系統（氣與脈），讓自己沒有容納痛苦的空間


    如果依照前面的方法進行鍛鍊，呼吸的氣（如慢跑鍛鍊心肺）和身體的脈（如瑜伽練習）都可以穩定，內心就會比較和諧，沒有過多的憤怒或憂傷，而身體因為氣息飽滿，也比較容易儲存帶來正面感覺的氧氣，不會因為二氧化碳過多而容易鬱悶。


    ## 5. 去觀想身體和能量體都如水晶般乾淨


    這個層次需要練習，因為一直想像自己很透明或潔白，需要經常性重複練習。想像自己的吸氣、吐氣都很乾淨，也可以想像練習瑜伽的三脈七輪都是透明潔白，非常明亮的狀態。色彩的觀想法，需要一點時間進入情況。


    ## 6. 最後身體和心靈會一起進步，然後進入快樂的禪修能量中


    我所帶領的彩色禪修，主要是以快樂和輕鬆為主要的方式，我們有時唱，有時跳，有時靜，有時動。在動靜之中享受身體和心情的愉悅，身心合一卻不停留在情緒的釋放，平靜地進入一種美學的體悟，這就是彩色禪。


    彩色的身體地圖，需要以愛滋養。身體的地圖會因為愛的養分，體驗到快樂的最高境界！


    > ⑧密續：佛教秘密傳承的修行祕法。


    # Part Ⅲ 進入臣服天職的階段


    孔子說:三十而立,四十而不惑,五十而知天命,六十而耳順。

    從很小我就非常喜歡讀中國文化基本教材,並且一直規範自己成為君子般的賢聖之人。不能聖,好歹也要賢呀!


    但論懂論命的我,人生卻仿若電影《班傑明的奇幻人生》一樣,是倒著生長的,愈老愈開花,愈入世,愈需要勇敢地跳入凡間,而不會永不食人間煙火。

    四十有一點點不惑是真的,因為四十之後,我才敢小小的公開承認自己的天賦本能。長期以來只想為了家人的生存打拚的我,走入這一行也是非自願的結果,雖然可以有各種機會做選擇,但奇妙的是,做能量及夢想工作的我,就是如此信手捻來,並且在自我制約極多的情況下,總能機會不斷。

    這樣自動湧進的工作機會,以及家中層出不窮的事件,忙得我根本忘了做選擇。以前身心靈界一些同業競爭的人總說我很愛賺錢,明明家裡有錢還死要錢。殊不知,我的家庭狀況正好相反,我忙著解決學生問題、無形界問題、家庭問題、個人問題,忙得已經無法多加思考,自然也養成我不在乎他人的耳語、八卦與是非,因為我只能專心愛我所在意的人事物,無法分出心思來在乎莫須有的負能量。


    但我的心仍是在乎和害怕的。不能明白自己努力生存下去,為什麼總招致一堆的閒言閒語和惡意打擊與誤解。因此,我能低調絕不高調,我只希望平平安靜的把工作完成,賺到我該賺的錢,讓父母衣食無憂,我的學生和員工可以相對沒有煩惱,這樣我就滿足了。


    但四十之後,我終於開竅了,因為明白我的痛苦也是大家的痛苦,我的迷茫更是眾人的迷茫,我的奮鬥也會是大家的解藥。

    而四十歲以後,我也開始明白,如果我有一點點的成績,或者順利發展,甚至這麼忙碌還能健康變年輕,都不是我個人的,而是更大的自然色彩能量場給予的支持,以及對更高層次的無限崇敬和一心不二的正念臣服,才讓我可以如此幸運。

    當然,還有我的孝順眾人皆知,這些累積的好能量,保護著我可以做更多令人美好的事情。

    一旦明白原來這些不是出自我個人,而是身後有太多的正能量,我只能把一切的美好歸於更高的層次,不居功,自然也就沒有個人榮辱的壓力。

    這種打通,我終於學會愛自己,承認並且接受自己的一切。因為,在我的自由意願之下所設計的人生藍圖,真的值得拍拍手,我一路的努力,也值得自己認可和得到榮耀!


    # Chapter 17 再次面對生死關


    不論是信神，或是信醫，這中間的信念才是關鍵。

    因為如果沒有強大的信念，願意自己幫助自己健康起來，

    誰都沒有辦法伸出援手來幫你解決問題。


    ## 再次面對生死的課題，是我最鍾愛的父親要向這個世界告別了。


    幫助無數人，療癒多少人心。我的脆弱點，就是見不得所愛的人痛苦。我一直以為父親可以長壽到九十歲，並且陪伴我長長久久，畢竟我是做天地的工作，也因為非常孝順，所以常常機會很多，幸運不斷。

    但是，就在我一場近千人演講演唱會的前一天，父親進了醫院。這次進去，便再也沒有機會離開醫院了。


    我的治療師開端是從生死理解的。

    而時光飛逝，沒想到很快又輪到了我的家人。家人是我的死穴，我可以忍受一切的不完美，一切的失落，就是無法忍受家人的失落或痛苦，甚至死亡。

    自從凱洛老師告訴我：「照顧關懷他人就是治療師的本質。」我聽話照做，不是因為有特殊的才華，而是因為強迫症一般的性格，只求完美。這在創作上、工作上、治療上，甚至在日後的團隊帶領上，這種性格讓我們始終戰勝一切。

    但是，我承認我有「強迫症」，如對色彩的敏銳，對療癒的要求，對所有工作細節完美與嚴苛的要求。我沒有想過對「不完美」的包容，雖然人生本就沒有完美，但我卻不肯低頭。


    二〇一五年，根據麥可·卡爾辛柯（Michael Kalesniko）的故事拍攝的電影《天菜大廚》，男主角由於對錯誤及不完美的無法容忍，結果把自己逼上絕境。我開始覺得自己愈來愈走上這樣的感覺裡，直到父親進了醫院，我才爆發出來。


    像我這樣驕傲的人，總以為只要有靈界的力量，沒有什麼做不到的。但我忽略了，人性中信念、信心、信仰的三觀，往往左右著連神都無法掌握的變數。


    我的父親本來可以不必進醫院洗腎，當時還健在的我的通靈和尚好友、我的靈性師長們、我的玄氧門師父，全都保證父親可過此關卡不會有事，也不需要洗腎。我向父親保證再三，然後才安心的飛離臺灣。沒有想到，就在我離開之後，當年弟弟過世時，專程跑來告訴我只要弟弟耳邊說一句話，七天後弟弟就可以甦醒，那個國小同學，那個二十歲開始洗腎，我替他和他洗腎的女友策劃婚禮的那個同學。忽然在多年後，就在那天經過父母的住處，他想到好久沒有聯繫我母親，於是福至心靈的打了問候電話，並且立即到我家拜訪。


    父母對於我和弟弟自小到大的好朋友都視如自己的孩子，當然熱情的接待了我的國小同學。結果談起了醫生建議洗腎這件事，我的朋友立即以過來人身分大力推崇洗腎的好處，並且告訴父親，如果不洗腎反而會立即死亡。


    就這樣，我一手安排好的計畫，被一個數十年來未碰面的程咬金給破壞了。我的父親第二天立即洗腎，洗腎的道路一旦走上去，就再也脫不了身。


    洗腎會破壞身體本有的機能，反而會讓健康衰敗，這是我的認知，所有以機器功能來轉動身體自然運作的事情，都會讓身體失去本有的功能。因此，我的父親終究沒有度過他恐懼的一關，就在最後那一秒鐘，他做了生命中最令我傷心的功課。


    當我一聽到父親「已經」洗腎，我的腦中轟地一聲，把我帶回到當年帶領學生走絲綢之路的聖地旅行時，第一站在西安大雁塔的場景。


    大雁塔存有當年玄奘帶回的《心經》抄本。當時我走近塔時並不知道，但我卻在靠近時，《心經》的聲音不斷地出現在腦海中，之後我才明白，原來那裡收藏著手抄本。


    聽到父親已經洗腎的消息，我手持著手機無法回應母親，腦中全是《心經》的唱誦。剎那間，我知道要領悟空性，色即是空，空即是色，父母沒有真的信任我的靈性洞見，他們為自己的人生做了恐懼的選擇。我哭不出來，只能一再的失望，因為接下來，父親不僅要面對自己洗腎的辛苦，也要開始面對逐漸衰敗的身體機能，更重要的是，我將無法再帶父親出國到遠方，因為他將受限於身體的限制。


    所有的一切，要得到結果前，必須先了解所種下的原因種子。這個種子一旦種下，便沒有退路。


    本來我在打的戰役，是避免父親因為腸道問題而逐漸產生的老年痴呆現象，這些在我們用能量檢測時就已經看出，但父母不肯繼續配合，認為沒有發生的都是無稽之談，並覺得人們都是要騙我們花錢。所以，當父親決定洗腎時，我已經是第二次的傷心，卻沒想到，這種傷心來得如此之快。父親不信'
