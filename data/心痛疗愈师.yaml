- md: '## Chapter 11. 生存的考驗


    的學生告訴執行長，最好上官老師留在大陸不要回來，這樣他們才有飯吃。執行長感到很傷心，因為她知道，我是如何一路上挺這個同學走出自己的人生道路。對於人類迫於生存所產生的恐懼和狹隘，在心靈的產業中更是血淋淋的呈現，因為大家都很匱乏。


    逐漸我明白到，身為華人世界中提升人類意識的先驅，有時候衝在前面是很難討好所有人的。就像凱洛老師所說，我是亞洲版的○○○，新女性的代表。想要當一個與眾不同的女人時，如何能夠要求自己符合眾人的期待，做個人人喜歡的舞臺明星，或是鄰家女孩，或是生兒育女的婦人呢？


    從一開始陰錯陽差地踏入身心靈療癒行業，從一開始，我就已經注定要和負能量為伍，而美麗的外表下所包覆的醜陋面也會同時存在。光明與黑暗就是雙生兄弟，如果沒有了黑暗，如何凸顯光明？如果沒有這些困境與心靈的折磨，又如何能成為更高明、更慈悲、有同理心的治療師呢？


    每個人都在找尋自己的「核心願望」，當我們還沒碰觸到那個「核心願望」前，總是尋尋覓一直在嘗試。我們首先嘗試的就是金錢、性愛和權力（事業成就）。其次，我們會努力的就是信仰和靈性追求。這正好對應到金錢（紅色）、性愛（橘色）、權力（黃色），以及信仰（橘色）與靈性（黃色）。


    其實，信仰是對應到藍色（橘色的互補色），而靈性對應到紫色（黃色的互補色）。但在這裡，我所見到的是橘色和黃色氣場，有兩種追求。


    ## Part Ⅱ 心與物質的生存考驗


    身體外的氣場比較不容易有變化太大，因為從初步的靈視和機器檢測中看，比較像是情緒所帶來的慣性模式。但身體內的能量中心區，比較像是和身體的直接對話，會立即呈現放大或縮小。因此在健康層面上，比較容易立即調整，我稱之為「平衡」。


    有一天，在進行雙手療癒高階課程時，我用了佩戴在身上的氣場檢測儀，來驗證我的靈視所見的色彩變化，給大家看什麼叫做色彩意識的提升，與立即的療癒轉化。


    在諮詢的過程中，當學生被觸動而產生療癒效果，面對自己的內在黑暗面時，往往會先由身體產生對抗或好轉的反應。


    有一次在十多位學生中，就有四位身體出現了反應，也就是我們所說的「不舒服」。當學生以為自己生病了，身體沒有力氣，無法上課時，我進行了色彩能量解讀。


    我把那位在治療室下不了床的同學請到課程中，然後進行解讀。當學生逐一被柔軟的解開，並與自己身體的對話時，眼前機器中和我靈性視覺所見的氣場反應，開始了瞬間的改變。想反胃的同學，覺得身體沒力的同學，就這樣立刻轉好了。而大家看到的是，當一個人意識轉變，氣場的色彩也就立即變化了。色彩意識的呈現，讓同學的身體快速的好轉，並且恢復了元氣。


    其次，因為撰寫的自然醫療論文以及企業管理論文，是關於色彩能量課程的效益評估。我也開始正式展開觀測學生氣場，來明瞭他們背後的業力問題，或是遺傳性的情緒問題。


    曾經一個富家千金罹患癌症，從沒有不好的生活習慣，心性也很穩定，甚至經常做善事，但是找不到自己狀況愈來愈差的原因。因為這樣挫敗和迷惘的心情，所以來上課，希望調整情緒。結果我見到她每一次領悟到什麼，一快樂，心的背後就忽然像是被洩了氣一樣，好像很多力量自她的背後流失。她的身體完全無法儲存任何力量，所以身體愈來愈弱，無法治癒。


    ## Chapter 11. 生存的考驗


    ### 自我療癒


    ### 色彩能量氣場解讀


    想要檢視自己，必須先要有治療自己的能力。以下列出簡要的步驟，可以依著這樣的步驟，一一剪開自己的業力鎖鏈，然後才有能力協助他人了解個人的色彩能量場域帶來的困擾，進而自我解套。


    氣場中給我看到的，是她的業力現前，身體免疫系統出了問題，卻查不出原因。她的身體如果形容成一個容器，我會形容那是一個有破洞的器皿，所以裝什麼漏什麼。後來我試圖調整她的心附近的氣場，並且協助修復這個能量中心。另一方面，運用了色彩能量氣場解讀，讓她意識上明白更多，而不怨懟。


    經過這樣的過程，後來聽說她愈來愈好，還跑去克什米亞旅行，實現夢想。


    透過這些領悟，我開始發展了色彩能量場域的教育與諮詢，並且開始訓練有興趣或有慧根的學生，進行氣場解讀。我的意圖是，希望愈來愈多人可以解讀到自己的情緒，甚至思維，進而轉化自己一手創造的惡性循環（或是業力）。


    對很多本就有靈感直覺的人來說，氣場解讀是最簡單的一件事，但感受到的，要如何解讀清楚呢？這中間依然會牽涉到人性和心理健康指數的干擾。所以培育出健康的治療師，遠比培育出敏感的治療師更為重要。


    ### 1. 療癒情緒


    情緒問題會卡在身體內與身體外的場域中，並且經常會因為核心力量不夠穩定，而一再重複我們所謂的業力或輪迴。在雙手療癒中，我很強調氣場中的情緒治療，因為從過往的經驗中得知，這些是我們一直重複的關鍵。


    像是一對夫妻總是以吵架度日，明知道自己少說一些，可能就沒事情了，可是在那當下，就是「忍不住」。為什麼忍不住呢？因為氣場情緒沒有清理乾淨，所以控制不住自己的心和身體，直接就會有反彈的語言衝口而出。這種情緒問題可能源自很深的小時候，甚至基因中的遺傳記憶，比較複雜，但卻是我們的主要問題。


    ### 2. 停止衝動


    衝動的身體反應是我們要控制的第二步。


    如果你覺知到自己不高興了，也許你可以忍，但你總會在適當的成熟時機中爆發出來，這種情緒猛獸往往會壞了一件美好的事情，令雙方無法溝通。因此，在止觀禪修中便強調停止，停止這樣的想法，停止這樣的做法。一個可以「停止」的人，就可以成功的喜歡上自己，而無法「停止衝動」的人，事後都會回到混亂的情緒中，繼續氣自己，或是恨他人。


    ### 3. 開始觀察


    開始觀察自己的感受，觀察自己在這整個事件中的角色，也觀察自己的心念，到底自己想要什麼？你想要一直為了鬥氣而爭？還是你想要爭了之後爽一下？還是你希望一直這樣爭個對錯？又或是，你根本想要摧毀一件事或一個人呢？開始觀察後，你往往會發現，自己根本沒什麼後面的意圖，只是為了不知所云的憤怒和衝動，所以也就無法讓事情變得更美好。


    ## Chapter 11. 生存的考驗


    ### 4. 感知場域


    去感受自己創造的業力場域，這個源頭何在？這個事件你為什麼會這樣感受？多半衝動之後都不會很開心，感覺也不好。問問自己，這樣「爽」過之後得到了什麼？為什麼自己老是喜歡活在這樣的能量（情緒）場域中？你想在這樣的衝動中，得到什麼好處？


    ### 5. 創造未來


    如果你開始明白自己想要什麼結果，你就會發現自己開始可以由這樣的結果，來調整自己的做法。如果你不想要惡果，那麼你必須先種下善因。於是，在每次夫妻吵架時，和自己過不去時，你可能就會朝「愛自己」的路上邁進，而不是朝向「毀滅」自己的道路前行。


    ### 以愛療癒


    生存的種種考驗，都是為了讓我們實現愛的本質。只要學會感知和觀照，愛可以在每天的生活中扮演最好的治療角色。


    ## Chapter 12. 非自願治療師


    持有正念，療癒力才能不斷強大。

    人生的路上，不管你信什麼，

    個人的正面信念，以及自己的勇敢，

    才是一輩子最需要具備的特質。


    有時候，要成就一番事業，需要一點傻勁。

    看過印度片《來自星星的傻瓜》嗎？我感覺自己很像片中的男主角，有點傻，又有點直覺，又有點執著，又有點創意。不斷追尋，又永無止境。


    非自願治療師，是一個聽起來不太順耳的名詞，也許正好可以形容我的不太自願，又得學習甘願的工作歷程。

    因為一切都來得很自然，很順利，在還沒有真的認清方向或調查清楚之際，你已經掉入染缸中，開始被染色了。


    剛開始時我常向靈學老先生抱怨，我為什麼要這麼辛苦？他總是回答：「你的願力呀！」


    我心想，我從來沒有想過做這種吃力不討好的工作，感覺像在玩命。


    面對負能量，治療師的承受方法因人而異。我的特別功能是，講課時能邊講邊感應不同時空，感應後還會順便療癒清理磁場；或是不僅說給眼前的人們聽，還能說給靈界聽；有時候聽到不同的聲音，還想要唱出來；有時站在臺上或人前講話，已經很緊張了，還要控制住自己的身體不隨意震動，也要能制止自己的身體不隨便出現負面反應，以免課程中斷。


    ## Chapter 12. 非自願治療師


    對我來說，吃下去所有來到面前的能量是唯一的選擇。所以，初期教學時，雖然有神聖的藍光護體，也有大師、天使、地面精靈、神佛或動物靈體、渴望被療癒的家族靈體在現場守護，但是，人的肉體一下子承受太多不同空間的頻率，根本很難適應。特別是像我這樣很有自己想法的人，身體磁場是最不受控制的。因此，除了事後去吐出所有的負能量，沒有其他的選擇。有時候要像減肥的人一樣，由口裡挖出來，甚至只要一嘔出氣體，我就可以立刻恢復能量，瞬間又是一尾活龍。


    如果你去看過電影《綠色奇蹟》，你可能就知道我說的是什麼情況了。我花了很多年想要控制這種力量，卻始終因為自己的「乾淨」，而無法選擇的把黑暗負面的能量吸收進來。


    所以，現在你能明白，何謂「非自願治療師」了對吧？


    我也不能明白，為什麼大家總是渴望特殊的功能？


    HSP我們稱之為「高感知功能」（High Sense Perception）。每個人都有聽覺、視覺、嗅覺、心電感應及觸感，但如果你能聽得到更高頻率或背後的聲音，看的不只眼前，還包括後面的氣場，又或是你可以解讀他人心思，甚至身體可以立即感受他人或某個地方的能量場域，那你就是有HSP的感受力了。


    但是，有這樣的感受力並不是一開始就是快樂的，這中間切換頻率空間時的痛苦，走不出的痛苦，或是無法控制的恐懼，甚至不想來就不請自來的畫面與訊息，我從來沒有覺得快樂很多，也不解為何大家都喜歡？


    你以為HSP的人就很清楚一切了嗎？那你又錯了。除了學習有技巧的療癒，終其一生都要不斷的自我覺察，並且學習心理學與精神分析來正確解讀。更不能因為感應到任何狀態，就信以為真，要花很長的一段時間，才能真實無誤的把這些感應到的，正確且界限分明的詮釋出來。這樣的過程，很孤獨寂寞，也很無奈。


    ## Part Ⅱ 心與物質的生存考驗


    有學生常問我，「為什麼老師你可以觀氣場，卻還是會被人背叛、被人欺騙，老師你難道沒有分辨的能力嗎？」這時候我「非自願治療師」的痛苦光環就會出現，因為「我也是人」，我不是神。我只是有個天生專業功能，或是領了證照，適合做這行的專業人士。但我是正常人，我一樣會犯和個案一樣的錯誤，我也會誤判，我更會因為自己的心理問題或情緒問題而卡住，我既不萬能也不完美。

