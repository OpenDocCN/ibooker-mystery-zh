    往往母親想迫使我低頭認錯，卻在見到我堅毅的眼神和寧願被打死也不願道歉的決心時，她就抓狂了，更瘋狂的打我，想逼我認錯，而我依然直直站著，只會搖頭拒絕，絕不道歉。爸爸看到媽媽打我打到失心似的，才出面阻止說：「一個小小孩能犯多大的錯誤呢？不需要這樣打吧？」


    所以，在六歲之前我受到母親很多的「行為教導」與「言語限制」，這多半與我不服輸和可怕的倔強眼神有關吧？當然，我也學會了隱藏感受和心靈之眼所見到的情境。就在弟弟來之後，母親多了一個孩子，很忙，而本來就習慣安靜的我，也因此有了大量閱讀神話故事的機會，與大量獨處、大量自我思考的時間。


    對孩童的發展來說，七歲以前的情緒認知和情感培養是發展重點，七歲以後的孩子開始覺察身體，但在此之前，孩子多半仍帶有自己原來的靈性特質，也具有獨特的性格。如果父母在這個時候可以保留孩子的本質，然後引導孩子補充自己的不足，以愛培養，這樣，孩子在精神領域中所擁有的安全感，以及以愛為主的精神感受，這些無意識的生命涵養，或許可以受用一輩子。


