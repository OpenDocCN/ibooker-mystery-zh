  mdcn: '## 自我療癒


    ## 尋找靈魂伴侶


    如果要遇到相愛的人，首先必須自己先準備好。相愛容易相處難，所以，如果已經準備好要去「難」一下的話，要求不高的隨時可以進入，但要求高的話，遇到對手又很艱難，可能就沒那麼訝，原來男女之間，除了愛情，還有一種很深的關心。那些以往說要追求我的男士，一旦我家中發生事情，就避不見面，漠不關心，這種奇怪的表現便讓我反思，到底什麼是愛？如果連一個朋友的關心都沒有，那種男女關係似乎就變得很現實了。


    男女關係的療癒，其實是更深刻的修練。


    親密關係之中的磨合，往往比我們打坐念經還要吃力。我沒有很多時間和機會去歷練這種「日常的磨合」，但我開始領悟到，人生的歷練就是這樣有趣，我們都需要去經歷，才會明白那是一種什麼樣的痛苦。


    就在這樣的感動下，對這位也面臨愛情考驗、一輩子都在愛情的痛苦中度過的男人，我也充滿了愛的感受與關懷。一個前半生在婚姻與兩性關係中備受折磨的男人，終於如願的離婚了，雖然仍必須飽嚐前任婚姻帶來的痛苦結果，但我卻見到對方在愛情上的努力和猶豫。畢竟受傷的靈魂想要再重新站起來，即使在愛情和婚姻中一直痛苦，卻仍渴望能找到心靈相吸的靈魂伴侶，這是人生中多麼重要的功課啊！


    ## Chapter 18. 治療師的愛與欲


    好混。我的個案中和追求我的人當中，不乏受感情或前段婚姻困擾的男士。究其原因，其實相處中，自我真的是個很大的考驗，往往男女之間的能量，就是一種「權力」之爭。


    ### 1. 練習容忍


    如果沒有練習對於不順自己心意的人與事的包容，那彼此的關係可能就會變得很困難。容忍自己看不下去的事、看不下去的行為、看不下去的語言，這些都是必須練習到可以看在眼裡，卻不動聲色。不過，容忍的能力雖然可以減少口角之爭，但不能保證感情順利。


    ### 2. 練習溝通


    沒有人不認同溝通的重要，但卡住情緒能量的溝通，是永遠不會有用的。有效的溝通不是說服，因此，必須先由包容開始，先吞下了對方的負能量或怨氣，然後才能讓對方接受自己的觀點。


    ### 3. 有效表達


    說重點比說故事重要。如果一直回溯，老是舊事重提，這樣的感情也會破局。有效地表達就是「說重點」，說出自已內心的感受，說出自己心中的渴望，這個步驟必須在前兩個步驟完成後才能見效。


    ### 4. 感受溫暖


    親密關係中，如果感受不到溫暖，兩個人的感情就會降入冰點。如果沒有溫暖，兩個人為什麼要繼續在一起呢？一起受苦嗎？這恐怕是最笨的人才會這樣做吧？感受溫暖，由自己的心感覺到溫暖，這樣的感覺，才能擴及到他人的關懷。


    ### 5. 共享美好


    不斷地在自己的心中投射出美好的感覺，兩人共處的美好，對方對自己關心的美好，去加強觀想過去對方對自己的關懷。加強對方的正面，逐漸忘記對方的缺失，這樣的創造力，也等於有美好的加持力投射給對方，如此，才能共創美好。


    ### 6. 找到對的人


    如果你還沒找對人，沒有關係，照上面的方式繼續練習，直到你的包容力增強，感激的心增多，經常感覺到被愛、被關懷，甚至可以關心他人。以這樣的感覺，當你遇到一個同樣可以溫暖你的心的人時，你們不會一直被痛苦所綑綁，而會一起創造更強大的愛，愛上自己，也愛上對方。


    ## 以愛療癒


    親密關係是非常棒的人生功課，也是最佳的修練。在親密的愛中，我們會深刻體悟到愛的精髓。親密關係更是一場能量的角逐，直到我們理解、原諒了對方的需求，也就明白自己的需求，能夠成為完整的自己了。


