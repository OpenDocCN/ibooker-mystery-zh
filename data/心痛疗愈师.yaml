    ### 核心體悟


    **Core Thinking**


    金錢，對應著紅色能量中心。性，對應著橘色能量中心。權力，對應著黃色能量中心。這三個色彩能量中心，對應於我們身體的下半身，從腳往上，經過生殖器官區，然後到胃部。它們分別代表了人生最基礎的三個階段，也可能代表了大多數人一輩子只關注的三個重點。治療師本身必須更為腳踏實地（落地），不是成天只是會打坐，生活卻無法穩定。因此，如果一個靈性治療師無法把人生基礎的三階段實現，並且滿意，那麼這個治療師將會不斷的被拉回原地做功課，直到通過考驗為止。


    如果一個治療師沒能腳踏實地，並且實現人生最基礎的生存歷練，也無法真的往更高的靈性層次邁進。只是一味的往靈性裡面鑽，而不處理與面對基礎的三個階段，那叫做逃避，而不是靈性。維琪·渥爾這樣清楚的指示：「一個不落地的治療師，連靜心都是一種逃避。」我喜歡這種務實的見解，也喜歡這種不轉彎的直接。只是，大多數飄在高空的治療師，可以在高空中享受另一種被認可、被尊重，以及被膜拜的價值感，所以儘管老師們不斷強調落地的重要性，但大家又豈能聽得進去？


