    當弟弟過世時，痛苦的我，腦海中只出現兩個字——快樂。我發現，人只要一口氣沒了，想追求的什麼也沒有了。那麼，人活著為的又是什麼呢？不管我們追求些什麼，都只是為了「快樂」吧？


    佛洛伊德的「超越快樂原則」中，潛意識成了一名稽查者，我們通常在放鬆時比清醒時容易放開大門，容許潛在的訊息進入意識之中，所以透過分析夢境的結構，我發現了自己擅長的圖像式象徵譬喻，再加上與心理學的結構比對，很容易就能找到答案，而這正是佛洛伊德所說的：「夢是通往潛意識的王道。」


