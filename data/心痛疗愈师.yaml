    這種令我挫敗的現象，讓我簡直想就這樣放棄這個工作，幸好又是老先生提醒了我，自己的使命更為重要。我沒有想到靈修原來也是充滿恐懼和狹窄的，對方願意合作卻出爾反爾，市場殺價的問題一直無法得到共識與解決。


