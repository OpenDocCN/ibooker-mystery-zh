    # Chapter 19. 能量工作的職業道德


    我把國外的新時代商店搬到了台北,很小一間,店中每天都來了很多人,許多後來的名人,在追尋自我或是想入行前,都來過這個超心靈新時代商店,因為在當時只有這一間。除了喜歡塔羅牌、占星學、花精、療癒、色彩的國內、外朋友,諮詢的個案也很多。對我來說,一個小小的地方卻能崛起,除了上天的眷顧,我想不出還有什麼道理可以解釋。


    這是一個新興的行業,因為我不是開精油美容業的人士,也不是傳遞新興宗教的道場起家,更不是屬於命理師出身,對於我這個奇異冒出頭來的人,引起了所有人的眼紅。而其實,我常常有靈感寫出一些內容,像是占卜類職業道德與規範,事後在國外的相關書籍中看到類似的內容,連自己都嚇了一跳。


