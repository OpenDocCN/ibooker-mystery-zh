    \n跟在老師身邊，你會發現她總是精力滿滿，衝勁十足！總是能帶動旁邊的氣場，讓大家也幹勁十足、信心滿滿的做事！\n\n待人處事，老師總是充滿著正能量，她有一種特別的感染力，就像太陽一樣，所有的黑暗在她面前都無所遁形，被她溫暖的照亮著。願更多的人能認識老師，有機會能受到她光明的指引，開展更亮麗的人生。\n\
    \n認識上官老師，我總認為是一段很幸福的緣分，我是藉由居住於加拿大的朋友，輾轉介紹，與同樣生活在臺灣的老師認識。第一次上課時，只覺得她是個好有時尚感的老師，有別於一般校園見到的「老師」啊！\n\
    \n與老師相識的十年來，對老師的敬仰與愛從未變動過，她就像溫暖的太陽一樣，在每個人生階段陪伴著我走過大大小小的經歷，快樂時老師會一起大笑，傷痛時老師會很溫柔的運用她的十八般武藝支持著，而無論發生了什麼事，這顆太陽從不曾遠離過，這樣的溫暖，一直支持陪伴在我的人生道路上。因為工作關係，所以能與老師有更多的親近與了解。老師是很孝順且貼心的孩子，我總想著，作為一個教育傳承者，有著孝順善良的本心，並且有專注的工作態度，那麼，我能夠跟隨在她身邊學習著、共創著，是多麼的光榮與幸福！\n\
    \n我的老師——上官昭儀，是很專業且善心的好老師，更是溫暖的小太陽。\n\n—台北逸筑\n—高雄幸儀\n\n# 寫在前面／\n愈過愈快活的人生\n\n每個故事中都會有個結局，\n\
    但在真實世界中，\n每個結局都是新的開始……\n\n年過四十之後，我才敢在公開的課堂上承認，說自己也有一點「敏感」。\n孔子說：「三十而立，四十而不惑。」很遺憾的，雖然自小學習了中國文化基本教材，一心以孔子為心目中的偶像英雄，可是，我卻無法做到孔先生所說的，所以到了四十歲，即使好像比較有自信了，但我依然覺得懵懂，依然迷惑。\n\
    \n我一直猶豫於兩界之間——生與死，靈與肉，守身與婚姻，正常與不正常，世俗與非世俗，胖與瘦，美與醜，是與非，有神與無神，有情與無情，有錢與沒錢……是滿足父母？還是滿足自己？是取悅外界？還是取悅自己？\n\
    \n於是，前半生的我就在這樣迷迷糊糊間，為了我深愛的家人、工作夥伴和學生及個案的幸福，而奮鬥，而放棄，而努力。也在懵懂懵懂間，遇到貴人和高人。\n\n愚鈍的我，總是在最低潮的時候好運連連，也在最驕傲的時刻跌落谷底。\n\
    \n我有时希望走入宗教及靈性，但有時又需要錢的支持。\n\n我很希望父母家人能懂我，放我自由，卻又不忍他們生活匱乏，總是一肩擔起所有家計。\n\n彷彿龍困淺灘，辛苦的施展著，就這樣，關關難過卻又關關過。\n\
    \n五十歲，我對於自己的狀態算是沒有不滿意了，身體健康、心理健全、工作順利、心情愉快，白手起家成就中港臺的小小企業，雖然遊遍世界知名的學校，但依然朝著博士學位邁進。\n\
    \n更重要的是，到了這個年紀，反而可以自豪地說，自己變美，變得有魅力了，煩惱變少，很容易開心，桃花也朵朵盛開。\n\n你說我全部滿意嗎？也還沒有，因為我依然個性倔傲，不易妥協，常咄咄逼人，嚇退眾桃花，卻依然得理不饒人，有著靈性的驕傲，也自以為是。\n\
    \n在家族親友的眼中，我是讓眾人跌破眼鏡的孩子，一直看好我是勝利成功組的組員，沒想到到了後半生，才發現原來是個放牛班的小孩。\n\n然而，有天在演講中我才驚覺到，原來不知不覺地，我已然成為他人眼中羨慕的對象，我已經是個實現夢想的女人。\n\
    \n尤其是對一些飽受婚姻感情折磨而痛苦的人來說，我這樣乾乾淨淨，不欠任何人，也不必還任何人的債，過著自己想要的生活，做著自己熱愛且引以為傲的工作，身旁有著一大批已然是家人關係的可愛知心小夥伴，夫復何求？\n\
    \n原來，在不同的人眼裡，我是如此的成功與自在！而我，依然朝著心中理想的目標邁進。\n\n對我來說，五十歲的心境，竟是二十歲的熱情；五十歲的年紀，竟沒有為我帶來任何巨大的匱乏，反而像是經歷過《班傑明的異想世界》的情節，愈活愈年輕，愈活愈有生命力，愈活愈有朝氣，也愈活愈有愛，愈愛我自己。一掃二十歲時，那個覺得人生痛苦不堪，每天為家人和生存奮鬥著，不喜歡人群卻必須聽話的留守於人群中，也因為弟弟意外過世而找不到快樂的女憤青；也一掃那個肉身是女性，但靈魂卻活脫脫像個男人的女漢子。現在的我，愈來愈像個女人，如此深愛著這個世界，真心愛著身旁每個緣深緣淺的生命，也感恩的度過每一天，不願浪費這值得珍惜的人身與人生。\n\
    \n沒想到能夠有機會寫出我前半生的生命奇蹟故事（當然，我是以靈魂永生，存在於生生世世的因果觀點來看待），也沒有想到高人無所不在，在出版界存在著負有使命感的靈性覺知者，成了願意識我的伯樂。\n\
    \n# 僅以此書\n\n感恩眾靈性指引者，有形的，無形的，聲音的，訊息的，畫面的，感知的，夢境的，彩色的，黑白的，光明的，黑暗的，東方的，西方的，古代的，現代的，前生的，今世的，自我的，無我的，內在的，外在的，美麗的，醜陋的，天界的，地界的，植物界，動物界，各次元的⋯⋯\n\
    \n「感恩所有生命中的相遇」，我知道，這是很老的舊話，不過，對於一個經歷過痛苦挫折及低谷的人來說，那些生命中所有的高高低低，事後總能證明這句話的真實性。\n\
    \n原本我不怎麼相信，不過在每每的失望、期待落空、不明所以後，現在已然臣服。Thy will my will（上天的意旨，就是我的意志）。\n\n感謝所有成就我、指引我的師長，及一路上始終鼓勵、義務指導我的眾高人前輩們。\n\
    \n如果這本書中的故事能對讀者及同道中人有一點點啟發和鼓舞，那麼，對我來說，已經是最大的榮耀了。\n\n# 昭儀\n寫於地球\n\n值天秤座滿月，水星／土星／金星逆行，太陽與天王星合相，對分月亮和木星，四分冥王星，五顆星在開創星座形成強大的T三角格局，適合兩極能量統合的時機。\n\
    \n當然，如果書中的個人觀點未盡成熟，而令你感到不舒服或質疑，也請你一笑置之，當作一部沒寫好的科幻小說，就此略過吧！\n\n# CONTENTS\n目錄\n\
