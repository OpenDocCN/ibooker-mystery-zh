    在愛中，我們必須先找到自己的靈魂，才能遇上對的靈魂伴侶。如果我們一直處於徬徨與恐懼，對自己的人生仍充滿了追尋與迷惑，那麼，在這條路上所遇到的臨時男主角，都不會是可以持續相伴走下去的
    Mr. Right。


    我有時候從一對正在交往中的男女眼睛中，就會看到他們是不是一對合適的伴侶。因為靈魂目標相同的人們，會在靈魂之窗看到同樣的火光。如果一對非常契合的夫妻，也會看到他們有著相仿的氣場。這種感覺很奇妙，在亞特蘭提斯時代的傳說中，在當時人們要結婚時是需要先檢測氣場，才能測出男女雙方是否契合。而孩子在很小的時候要找到學習的方向時，也需要先檢測氣場才能知道。


    這在我們的世界中很難想像，但在我看到氣場時，感覺這種傳說特別有道理。我們常說物以類聚，或說近朱者赤、近墨者黑。這種氣場理論在我看來，是真實得不能再真了。可以說，這不是一種理論，而是真理。所以，如果一對夫妻已經沒有任何連結的理由了，像是金錢欲望、社會名譽，或是同心合力想把家照顧好，那麼他們也會逐漸脫離彼此。一對貌合神離的夫妻，從氣場上絕對可以看得出來，騙不了人的。


    > ※


    愛是一種提升，但也是一種辛苦的歷程，如果沒有經歷愛的考驗，就沒有提升。直到遇到全然包容與呵護我的男人之前，我一直都沒辦法遇到真正願意無條件付出的男人，有的是被我的「特異功能」嚇跑，有的是被我的保護能量（蟑螂兄）嚇跑，有的是本身個性古怪而無疾而終。


    總之，身為治療師，很容易遇到的不是愛人，而是病人。如果治療師無法去分辨，而且有著對愛的強烈渴望，那就很容易進入愛情，但卻很可能是一場辛苦的愛戀，甚至是虐戀。


    我在一次自以為心痛的爱情后，就觉得自己从前世到今生，就是个不适合爱情的人，虽然渴望，却无法实现。那段自以为是的伤痛爱情，最后以认为对方背叛而分手收场，但多年后我才惭愧地觉得，原来那也不是爱，因为大家的心里其实都不懂爱，又怎能算是爱呢？


    > 我們為什麼會受苦？是因為我們根本不知道自己要的是什麼。我們往往會說「想要愛」，但仔細推敲一下，到底什麼才是你想要的愛？有時候很模糊的我們，根本就說不清楚。而不知道自己要什麼愛，也就無法清楚地得到靈魂之愛。


    有一次我的幼稚園同學找到了我。五歲時候的朋友，找到我之後，才知道對方在愛中充滿了心酸與無奈，本應是享福的年紀，卻因為娶不到賢妻而過著辛苦的育兒人生。


    當我聽完對方辛苦的愛情故事後，我忍不住畫了一幅畫作送給對方。我透過對方知道，原來我們以前「曾經」兩小無猜，當然，五歲小朋友的故事我早已不記得。回家找媽媽詢問的時候，媽媽竟然告訴我，我雖然不是長得美若天仙，但自小就很吸引人，老是被男同學喜歡。這令我感覺實在誇張，與我對自己的認知是完全相反的，我以爲自己不是很有異性緣，但媽媽卻作證，我一直「很受歡迎」。


    我當晚開始回溯，知道自己可能前世到今生都沒有很順利的情感生活，甚至不少經驗中都是修行的背景，不論是西方還是東方的記憶都是如此。於是，當那位同學在四十年後來找我時，我便很想把這種感受畫下來。


