    5. 噴點安神的香氣。香氣可以令大腦放鬆，容易心生喜悅。如果懂得精油，可以用點適當且具功能性的精油，用喜歡的香水噴灑在床上也很好。總之，要用「喜歡自己身體的心」去享受睡眠，安心入睡。


    6. 不論記得什麼，都仔細地寫下來。如果以為早上醒來再寫就可以，保證你醒來後啥也不會有印象了。不要太高估自己，一個字，一個圖，任何的靈光，乍洩的時候都要想辦法記住。也不要

    在夢裡說我會記得，這同樣是太高估自己了，用寫的才是王道。


    ### 以愛療癒


    愛是一切的根源。有了愛，所以我們打破限制，勇往直前。


    # Chapter 2. 面對生死關：弟弟死了


    面對逝去的生命，不緊緊抓著思念是對的。

    也唯有懂得擺脫「分離之苦」，我們的心才能得到安寧。


    直到弟弟過世的事實成立，眼看著醫護人員在找他身上的管子，我即使站在現場，都不肯相信這是真的，所以當下我沒有表現得很傷心，也沒有很多情緒，我只是很努力的照顧母親，心覺得有點累，冷冷的，像個旁觀者看著這已經「完成」的一切。


    眼睜睜，冷靜地看著死亡後的場景，不悲傷嗎？只是還來不及悲傷，我的國小死黨同學們趕到現場，其中一位同學是宗教迷，因為年紀輕輕就洗腎了，他找的伴侶也是在洗腎時相遇的，我心疼他們，所以當他們要結婚時，我義不容辭的願意協助策劃一場西藏式素食婚禮，並且擔任主持人。他趕到現場時偷偷的告訴我：「我現在相信一種宗教，說人死時，只要在對方耳朵旁說一句話，你現在馬上到弟弟耳邊告訴他一句話，七天後他就會醒來。」


    如果你是家屬，聽到這話，你會怎麼反應？自從弟弟確定生病後，我一直不放棄任何希望，所以我好像沒有選擇似的，也希望他說的是真的。我真的馬上跑去弟弟耳邊，懷抱著希望對他說了一句話。其實，說的時候我心中是懷疑的，「不是已經死了嗎？真的可以嗎？」


    七天，我一直等待著。當然，冷冰冰的冰庫打開時，並沒有如電影般，男主角自己推開冰庫爬了出來。迎接我的只是更冷、更硬的身體，而靈魂，早已離開身軀，準備朝向下一個目標邁進。


    ※


    為了照顧弟弟，我在兒童癌症病房待了一段時間。小朋友很可愛，許多小光頭每天進進出出的，有時昨天才見到的小光頭，今天我問護士昨天的小朋友去哪了？得到的答案竟是：「他已經『走了』。」


    然後，弟弟也走了。突然遇見生死，我開始理解人生不如意的事，原來是我們所無法控制的。而我們無法控制的事，竟然那麼的多！只是在傷感中，我完全不能明白自己原來是有功能的，這也或許造成了自己日後的使命感，甚至可能是一種愧疚。也許，如果，我早點承認自己有功能，那麼我天生療癒的特質，或許還可以救我的弟弟。


    我雖然明白，就算有這些能力，也無法挽回一個人注定的人生與性命，但為什麼我們還需要有這些功能？這又無法挽回什麼？也救不了我弟弟呀？我知道唯一可以做的，只有在活著的時候，好好教育靈魂（意識），才能順利轉變死亡的道路與死亡的方法。但我弟弟已經過世了，我還需要了解什麼？我還能為家人做什麼？為弟弟做什麼呢？


    在弟弟住院的期間，我開始經歷了鬼打牆的「醒來」。在醫院裡，急救時我會找不到領取血袋的地方，眼前所見到的諾大空間竟空無一人，只有我不斷樓上樓下的找著血庫，卻始終是個黑色的空間，直到醫生派護士來找我，拍了我的肩膀一下，我才回到有顏色的空間中。離開黑色的空間，這才赫然發現血庫的大門根本就在面前。這之後的好多年，我不斷遇到類似的經驗，走錯時空是一種常態，甚至在加拿大的淘金博物館中，也曾經在清醒的狀態下走到不同的時空裡。


    ※


    弟弟過世後不久，因為弟弟的關係，我們不僅在夢中相遇聊天，甚至在夢中，他來告訴當時尚未正式踏入心靈領域的我說：「姊姊，我們以後，你在那邊，我在這邊，我好好學習，你也一樣，我們不要管那些沒有感應的人，你要開神祕學校喔！」


    弟弟過世後，我一直有種深深的孤單感。我們感情非常好，經常聊天聊地，聊所有的心事，我已經習慣被某個人叫「姊姊」。但如今，這個一直聊心事的人卻消失了。有過家人手足的感受，但當你失去親人時，那種失落，真的很難形容，特別是當我們都覺得還沒準備好要說再見，卻被迫道離別，就是一種「不甘心」、「沒有完成」的感覺。而人生，對貪心的我們來說，應該永遠也不會準備好吧？


    有一天，我走在路上，忽然聽到一個小男生叫「姊」，我習慣性地回頭說：「什麼事？」結果，風冷冷的吹來，是別人的弟弟在叫著姊姊……：那天，我站在路邊，被風吹著，眼睛看過去都是黑色的空間，看不到任何色彩。我知道，我的弟弟沒有了，回不來了，再也沒有人會叫我姊姊，我沒有弟弟了。


    從小，弟弟因為小我六歲，我幾乎就是一個小媽媽，特別是我是弟弟的偶像，他是我的頭號粉絲。每次我站在臺上演講或表演，他就會在臺下開心地鼓掌，他覺得姊姊特別棒，然後驕傲的告訴大家，那是我姊姊。有一次，我在做珠算比賽的練習，媽媽帶著弟弟跑來看我們選手們的練習，小小的弟弟竟然跑來親了一下我的臉頰，還甜甜的叫：「姊姊。」真的是好可愛的貼心小暖男。後來，父親生意失敗，母親也必須工作常不在家，每次回家，我就搬個小凳子給弟弟上課打發時間，這樣小小的他就不會因為想念媽媽而哭泣吵鬧。


    我對弟弟，對家人或家族的愛，一直都非常濃烈，很多的愛，像是永不匱乏的一口井，而今，弟弟過世了，我的愛——這口不缺水的井，又如何給出呢？


    那天站在路邊，冷風吹過之後，我明白真的是沒有弟弟了，但我心中滿滿的愛怎麼辦？於是，我決定去個很多人可以叫我姊姊的地方，報名加入了教育部的朝陽計畫，學習心理學，並且從事青少年的生活學習管理輔導。就這樣，又有很多人叫我姊姊，我一腳踏入了認識自已的心理學專業輔導與團體帶領的領域中。


    ※


    我有很多的愛，我想傳遞給更多的「弟弟」。

    面對死亡，往往讓人變得狹隘，而我們總是會抓著那個所謂的「家人」不放。我很清楚弟弟的優秀在哪裡，但我有很多對於弟弟和家人的愛，我想把這個愛傳出去。今天，我唯一血緣的弟弟失去了，可是我卻多了很多沒有血緣的弟弟、妹妹。但感覺還不夠，因為我有很大很大的愛的容器，我就是很想傳遞出去。


    看到很多年輕人不好好學習，或是因為家庭或經濟因素，無法有著美好的前程，我心裡都會非常難過，感嘆人生的際遇怎會如此不完美！弟弟非常優秀，心地善良，就讀第一高中，多才多藝，長得特別帥，你無法想像這樣一個優秀的人，說走就走了。


    一直記得那天，我給弟弟餵食，他說：「謝謝你，姊姊。」在弟弟走之前，我們聊了很多很多，包括那個媽媽不同意他交往的女生，他什麼都和我聊。然後，一句話：「謝謝你，姊姊。」之後昏迷就再也沒機會聊了。我們兩人從小無話不談，常睡一個房間大聊特聊，感情之好，是無法形容的。


    優秀的人努力地上天堂當小天使，卻留下許多痛苦的生命還在地面爬行。我感覺自己的愛必須要有出口才行，做輔導青少年的小小老師，可以讓我找到愛的出口，彌補無法再陪伴弟弟的遺憾。


    不過思念的確太苦了，面對摯愛的弟弟逝去，我始終走不出心理的陰霾，多情的我也造成了一生的傷口：為愛傷心。'
  mdcn: '# Chapter 1. 夢境奇遇


    人生所有的一切，都脫離不了痛苦的本性。我生命初期遇到的痛苦，不是生離，就是死別。我沒有談過戀愛，家庭幸福美滿，第一次撕裂的經歷是死別。有一次在一個飯局上，一位女性企業家問我：「你知道前世今生嗎？我讀過一本書談到前世今生，你懂這部分嗎？你讀過那本談前世今生的書嗎？」主辦人了解我的背景，在座的學生也都知道我的一功能」，不過我沒有直接回答，因為這個女企業家並沒有誠意在請教我，也不是真的想和我研究，她的能量只是在炫耀」她的履歷，一份美好的人生履歷表。然而，我的履歷表很多元、很豐富，而且不只有今生的，還有前世的。但我很懶得一一報告，很多的體驗說了她也聽不懂，因為層次不夠，多說了又造成過多的幻想和崇拜，也可能創造錯誤的理解，能說什麼呢？


