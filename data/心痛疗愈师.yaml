    \ lucky。\n\n# Chapter 9. 走進色彩異世界\n\n※\n\n很早以前，在拿起畫筆時，我就知道，顏色可以治療情緒問題。我發現大多數來找我的人，都有著情緒上的困擾，早期很多是病理性，甚至是精神性的。雖然沒有到達精神疾病的階段，但官能症或神經症也是有的。\n\
    \n二〇一七年九月，美國知名的男演員金凱瑞發表了他的一部紀錄短片《I needed Color》，描述他如何透過繪畫走出生命的低潮，重新體會享受活著的滋味。\n\
    \n金凱瑞常說「我的幽默來自於絕望」，他從小就活在一個居無定所的生活中，十多年前他罹患憂鬱症，透過當時的女友陪伴才走出來；後來分手，他又開始不順利，事業和感情都很挫敗，然後更誇張的是，二〇一五年他當時剛分手的女友竟然因藥物過量而死亡。這種種的低潮，令金凱瑞消失了一陣子。\n\
    \n直到二〇一七年九月，他出現了。在一段充滿了亮麗色彩、由大衛·布希爾（David Bushell）拍攝的紀錄片中，金凱瑞說：「你可以從我的畫、我喜歡的顏色中，看到我對光明的渴望。」\n\
    \n色彩帶來的光明力量，是令人無法想像的盛大。在我個人經驗中，早期有不少很年輕就投入的治療師，甚至是天生的治療師，他們的身上都有著這種氣質。曾經我的一位老友告訴我，他很驚訝我的內心竟然會有如此悲觀的一面，當時我回說：「是呀！但不同的是，我們會在最短的時間轉換磁場，而不會順著這個情緒一直走下去。我們可以自覺，並且醒來。」\n\
    \n金凱瑞說：「無論是表演、繪畫或雕塑，重點都是愛。我們想表現自己，並且希望自己被接納。我喜歡活著的感覺，藝術就是活著的證明。」\n\n對我來說，進入色彩能量的空間，進入用藝術能量來做治療的世界裡，如同進入佛教的光音天，也如同進入上帝充滿光與愛的天堂。色彩的能量，把人由疾病直接帶至無病痛的世界，你不必花功夫用力面對內在的疾病，因為你根本就沒有病，你只需要在進入黑暗時，把你的黑暗帶進光明，讓自己成為這一道光明。\n\
    \n這些把天堂帶到人間的工作，是我無心插柳的前半生，是在我最難過的時候，成了陪伴自己與陪伴他人的正能量生活方式。我相信，金凱瑞也是來自亞特蘭提斯的靈魂。\n\
    \n你不能對抗生命中帶來的不適應與不舒服，但你可以享受生命中帶來的、面對低潮時勇氣所帶來的高能量。當你把心思灌注在彩色的事物時，你將發現自己根本可以和疾病共存。\n\
    之後你還會發現，疾病已經消失，因為你本來就可以沒有任何疾病。\n\n去英國之前，我已經向美國的凱洛老師拜師學藝了。\n老師非常慈悲，第一眼見到她，在她大熊般的溫暖擁抱下，我忍不住哭了。然後在她的指導下，我開始運用關懷人的力量，展開了能量工作。靈學老先生依然鼓勵我好好學習，我也覺得自己懂得太少，光靠一點點的靈通感應能力，完全不能滿足我的求知欲。\n\
    在正式上課學習的前兩年，我經歷了兩年的夢境教學，於是我開始上網查夢中的知識，才赫然發現原來這些都是所謂的新時代運動（New Age Movement）。我完全不懂這些背景，但在夢中儼然已經開始進入學習了。\n\
    \n# Chapter 9. 走進色彩異世界\n\n於是，我需要從其中一項學習先入手。很多的巧合，無心插柳，卻愈走愈清晰。\n\n由美國回臺灣後，正巧有位媒體工作的姊姊開始轉戰出版界，想有番作為，於是邀請我一起去個飯局。她要我帶上色彩卡片，而我想，我這樣去白吃飯也不好意思，於是帶了專門療癒創傷的精油給請客的大哥。\n\
    \n那是一場有趣的會面，我自己也覺得顏色很好玩。在學習的階段，初學者多半比較沒有顧忌，也容易賣弄，我當時就處於這樣的狀態，一知半解卻是最狂熱的時候。所以，就這樣去了我的第一場「記者會」（之後有著無數場。直到現在，我的團隊仍繼續沿用著這些，在沙龍分享及親親節能量活動中）。\n\
    \n先送了禮物給請吃飯的大哥，飯後姊姊介紹我剛從國外學了新奇的東西，要我給大家介紹下。我略微說明了一下色彩心理學的原理後，請吃飯的大哥身先士卒，決定試一下體會是否有我說的神奇經驗。\n\
    \n於是，大哥自己洗了牌，抽了第一張。當他看到時，臉色抽了一下，因為他從一百多張色彩卡片中，竟然就抽中了我送他的那個橘色油卡片。\n\n「這個有點古怪了。」他說。然後他檢查了卡片，我忽然覺得自己很像魔術師，他在懷疑是否我在卡片上做了什麼記號。當然沒有。當下我講解了下他的情況，當然，我也感應了一下他，以便雙重確認。然後，當晚就結束了。\n\
    \n三天後，那個大哥晚上十一點請女助理打電話給我，說在我家附近，希望請我喝個咖啡。我想，半夜喝咖啡這個習慣很詭異，但因為信任的姊姊會一起陪同，我便帶著好奇心去赴約了。結果是，他們希望我能寫出我的色彩奇蹟故事。\n\
    \n這種故事有人看嗎？我覺得沒有什麼人會好奇吧？\n\n大哥說：「你只要寫出真實的故事即可。」因為他自己回去後發生了一些被我說中的事，而且有些\n\n事只有他自己知道，有些問題也只有他自己明瞭，卻在三天內有了變化。基於更多的好奇，所以他們想要知道更多的原理。\n\
    \n他們認為，人們往往對於無形的世界感到好奇又質疑，現在有個人可以溝通，也很有意思。更何況，我有時尚工具，不會顯得很怪。色彩又是時尚圈與商業界熟悉的工具，這樣的新興領域大家都不太明白，為什麼色彩可以提升人類的意識，用一個顏色就會有靈感？為什麼？他們覺得找到現身說法的我，更具真實性，而且我在接觸之前的靈能故事也已經很多。於是，我被邀請開始撰寫。當我同意的那一天開始，我的其他工作就忽然全被取消了。接下來三個月的埋頭苦幹，就是寫作。\n\
    \n※\n\n寫作的過程是快樂的。現在想起來，這十八年來平均每年至少都有一本作品推出，出版第一本書之前，我一直在報紙和時尚雜誌寫專欄，也曾經在《聯合報》寫星座。我一直知道自己是有著寫作的狂熱，雖然不善言語，但我喜歡文字和藝術，這些亞特蘭提斯人的特徵在我身上特別明顯。年少時期的我，一直深信自己來自那個陸沉的地方；現在的我，只是派到其他國家去做外交工作。而我現在開始做的，是天生就會的工作。\n\
    \n就寫作來說，我的打字簡直不是我打的。每次要寫到什麼色彩，大自然就顯示給我那個顏色。記得有一次，寫到寶藍色與檸檬黃時，家中陽臺忽然來了一隻這樣顏色組合的鳥兒，就一直停在陽臺上，直到我把色彩的靈感寫完才飛走。這樣的經驗，之後在英國寫《天使神諭》時也是一樣。我的手成為一種訊息的載體，這種「訊息書寫法」，便是把自己放空後，完全容許訊息靈感的流動，然後用手配合著訊息完成。後來也有學生希望我教他們，也許以後會開設這類課程吧，順便還可以學習外文呢！\n\
    \n每天快樂又有希望的寫作，活在充滿神奇訊息的奇蹟之中，真的很充實。雖然暫時沒有收入，可是\n\n# ### 走進色彩異世界\n\n卻正能量滿滿，毫無畏懼。然而，正當全彩書稿做好，準備要送印刷廠印製時，忽然我接到了電話，說出版社忽然有財務的問題，可能出書要延遲了！\n\
    \n除了震驚，我也充滿了懷疑。心裡想著：對呀，本來就應該出版不了，畢竟這不是我正式的工作，而且，我又不是專業作家，怎麼可能有這種機緣呢？當時的我倒也沒有什麼難過，因為自己也沒抱持著太高的希望，所以反而覺得沒有也是應該的。只是有點失落感，畢竟書稿真的好美，自己也是有所期待的。而且在弟弟過世後，我就開始認為自己的期待落空是正常的，也學習著不去期待太多事物。也許，出書本就不是屬於我可以做的事吧？\n\
    \n當天晚上，夢境再度來到。創辦人來到夢中告訴我彩油原理，帶我去英國，並且要我不要轉業，要做下去。早上八點多醒來，我對夢境印象非常深刻，然後剎那間，我的眼睛像是被很亮的光照射，我看到了一對極大的金黃色翅膀閃過。\n\
    \n沒多久，人還在床上，就接到電話，說出版社財務問題解決了，等一下馬上要送廠印製了。我的第一本新書，就在這樣的信念考驗下，神奇的誕生了。\n\n我天生是文字媒體的工作者，也就是說，我是屬於靈性人士中可以靈性書寫的這類人。進行過程中，不能有太多自己的想法，也不能佈局規劃或賣弄太多寫作技巧，只能在感覺到時，雙手不停地誠實打字。有時候一坐下來，便是四五個小時不停。如果我用了大量的技巧、規矩和頭腦，文章就無法持續，成不了一篇。但如果靈感不受阻礙，就可以一個月寫完一本十幾萬字的作品。\n\
    \n幸運的我，因為新工具的引進，成了這個產品的代言人，也成了媒體新寵兒。可惜的是，我一直沒有興趣在媒體發展，沒有自信，所以我一直給自己的定位不是靈性人士，只是推動靈性教育的工作者。\n\
    \n我也不喜歡為人算命或承擔業力。弟弟過世後我遇到的種種高人都不能滿足我，我問的所有的問題，也沒有人可以完整回答，令我滿意或臣服。所以，高傲的我堅持人要相信自己，但我自己卻又一直有靈啟經驗的發生，家中的經濟困境也沒有停止，逼得我在求學的歷程中，除了要養活自己，也得認真工作為家中還債。\n\
    \n這樣的困窘，讓我必須工作賺錢，而我的才華，正好是賺錢的方式之一。填補了家庭的負擔後，我才能繼續學習了解自己。幸運的是，我可以透過工作賺錢，而工作也是滋養我心靈最好的良藥。工作多年並成為指導業界工作者的專業顧問後，我才明白，經濟壓力是非常好的上進動力，正因為我們需要生存，所以必須「被迫」認真工作，這反而促進了我們的靈性提升。\n\
    \n困境可以是我們的心靈導師，這是我累積多年經驗之後的心得。只是在當時，我們都是充滿矛盾和不安的，特別是生存的恐懼。\n\n我非常能夠體會金凱瑞的心，因為色彩是我們在生命的過程中，唯一可以自救的武器。二十年不算短的時光中，甚至在從小的基因裡，我一直在色彩的敏感中度過。眼睛所見到的世界，往往可以把我們的世界轉變為三維度空間以上的場域（energy\
    \ field），像是現在4D的虛擬世界，可以立即真實地呈現在我們的眼前。\n\n往往我們所聽所想，腦海中所見的一切，都只能構建出一維和二維的世界，那怕我們從小拿了畫筆，也都還是只有二維度的空間見解，那是因為我們的思維限制了自己。直到我們能用「眼睛」去看，透過眼睛傳遞給大腦的圖示，人類才會進入到三維度的空間，感知到場域。\n\
    \n# 核心體悟\n\n# Core Enlightenment\n\n我自小對場域敏感，不僅人的場域，還有空間的場域。\n\n人們在情緒升起時，往往會散發出光和熱，進而伸展出色彩光能的輻射，進而影響了空間的感受。每個人都在創造自己的場域，就像金凱瑞的畫作一樣，大多數的人雖然沒有終日繪畫，但透過如同相機的眼睛看出去，就可以有了立體的感受。\n\
    \n眼睛的迷人之處，就在於可以拍攝下靈魂的紀錄片。這些記憶儲存在靈魂深處，到了人生最後的際遇時，就可以拿出來深深地回味。喔，我去過瑞士的高山；喔，我見過西藏的藍天；啊，我親歷過埃及的金字塔；對了，我還去過大昭寺……種種的美好感受，在靈魂深處都會像播放錄影帶一般，播放出美好色彩的影片，讓心情感覺美好，讓靈魂感受豐富。我們也會透過這有形有相的色彩世界，建構出無形無相的內在色彩世界。當心情美好時，我們便會收到這樣美好的夢境，或是促成生活中美好的事情圍繞著我們，只因為我們的感覺會變得很「彩色」。\n\
    \n# 自我療癒\n\n# 彩色禪修\n\n在禪修的過程中，人們透過靜心，透過靜，感知到一種安定的力量，然後產生智慧。\n\n在二〇一七年的冬天，一位十多年前在我課程中受益的女同學，因為我而成為佛教徒，也因\n\
    \n# Part 心與物質的生存考驗\n\n為我而成為一個智慧加身的好妻子與母親。她透過靈性的敏感，也陪伴了丈夫度過生命的危機，是我色彩能量教育的實踐者。\n\
    \n由於指引我的靈學老先生，以及諸位靈性指引導師，都希望我能把佛法的生命哲理融入教學中，因此，我加入了一個國際的色彩組織（這也是靈學老先生的建議），把我的靈能動見融入在教學當中。一開始，我們是透過某個商業的環境做買賣，但逐漸的，我發現我的能量教學中融入的自己的風格，特別的「禪」（Zen）味十足。\n\
    \n很像我的畫畫一樣，我很喜歡意境式的作品，或是可以從藝術作品中感受能量場域（意境）。這樣一點一滴過了二十多年的色彩工作，我的學生們也奉行著這些做法，比較有悟性的同學，就會依著我的教育方式融入到生活。畢竟學習心靈平衡，不就是為了人生幸福美滿、和諧豐盛嗎？\n\
    \n另一方面，我也不贊成學了就要離婚、獨身，甚至出家。因為每個人的生命軌跡不同，如果已經有婚姻了，為什麼不好好認真地走下去，偏要離群獨居呢？\n\n彩色禪修就是依著這樣的藝術品味，走成人生一幅美圖的宗旨，而逐漸成形的修練方法。這當中，我們透過情緒的淬煉，逐漸感知到快樂、無憂、無私、大愛。\n\
    \n十多年前這個成都的學生，不僅自己幸福美滿，靈性強大，更因此支持了先生的事業，以及兒子的健康成功。\n\n這對夫妻從網路上找到了我，然後一年半後我們終於在成都相見。他們成了成功的房地產商，並且在青城山都江堰旁邊擁有大片土地和飯店、別墅。盛情地在我成都課程結束後，親自來接我到他們的飯店給我慶生，於是，「青城山彩色禪閉關中心」就這樣被贊助成立了。\n\
    \n那麼，我們現在就開始一起進入彩色禪修吧！"
