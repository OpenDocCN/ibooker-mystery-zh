    所有的落地覺知，都可以讓我們開始正向生活，並且活出有良知、有意義的人生。


    # 以愛療癒


    愛可以成為一種有用的法器，也可以成為傷人的利器。我們潛意識中儲存的愛的意識，會引動我們的生命動機，動機牽扯出我們對事物的判斷、行為和感覺。正向的愛具有慈悲和智慧的兩種功能，這種愛的意識，才能引領我們做對判斷，正確行動。'
