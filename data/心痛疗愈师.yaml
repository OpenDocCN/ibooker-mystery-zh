  md: '# Chapter 11. 生存的考驗


    的學生告訴執行長，最好上官老師留在大陸不要回來，這樣他們才有飯吃。執行長感到很傷心，因為她知道，我是如何一路上挺這個同學走出自己的人生道路。對於人類迫於生存所產生的恐懼和狹隘，在心靈的產業中更是血淋淋的呈現，因為大家都很匱乏。


    逐漸我明白到，身為華人世界中提升人類意識的先驅，有時候衝在前面是很難討好所有人的。就像凱洛老師所說，我是亞洲版的○○○，新女性的代表。想要當一個與眾不同的女人時，如何能夠要求自己符合眾人的期待，做個人人喜歡的舞臺明星，或是鄰家女孩，或是生兒育女的婦人呢？


    從一開始陰錯陽差地踏入身心靈療癒行業，從一開始，我就已經注定要和負能量為伍，而美麗的外表下所包覆的醜陋面也會同時存在。光明與黑暗就是雙生兄弟，如果沒有了黑暗，如何凸顯光明？如果沒有這些困境與心靈的折磨，又如何能成為更高明、更慈悲、有同理心的治療師呢？


    ![](img/2165f73db991986bac0992a95b4cd001_145_0.png)


    每個人都在找尋自己的「核心願望」，當我們還沒碰觸到那個「核心願望」前，總是尋尋覓一直在嘗試。我們首先嘗試的就是金錢、性愛和權力（事業成就）。其次，我們會努力的就是信仰和靈性追求。這正好對應到金錢（紅色）、性愛（橘色）、權力（黃色），以及信仰（橘色）與靈性（黃色）。


    其實，信仰是對應到藍色（橘色的互補色），而靈性對應到紫色（黃色的互補色）。但在這裡，我所見到的是橘色和黃色氣場，有兩種追求。'
