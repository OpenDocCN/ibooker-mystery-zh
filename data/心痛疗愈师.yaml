    # Chapter 20. 心靈與物質雙豐收


    我覺得特別開心，也信心滿滿的願意回臺灣攜手共創，畢竟我已取得老師資格，可以一起貢獻力量給更多人。帶著可以一起共好的美麗藍圖，我回到臺灣。


