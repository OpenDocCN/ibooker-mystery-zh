    ## 結語


    在能量的世界，你可以創造。想要走向光明，就可以創造出光明，想要走進黑暗，也必然走入黑暗。唯一的前提是，你站在第幾維度呢？這個立足點是你可以走進什麼境界的關鍵。在能量的世界中，你只能一直走向光明，成為光明；在療癒的世界中，你也只能走進愛，成為愛。


    現在，我當年的學生也都是這個領域的老師或校長，他們的優秀令我感到榮耀。每次同學們回來問我還有什麼課？或是一直私信希望我再到某地開課時，我的腦中就會出現當年和這位同學的快樂記憶。我發現，原來在這個行業中，我內心的記憶全是如此的快樂和豐富。我感謝這一切的发生，以及所有相遇的人與事。


    所有的往事，我的腦中竟然只出現快樂的記憶，很難想起任何負面的記憶。看來，我一直以來對自己的嚴苛磨練，似乎有點小小成就了。我發現自己開始愈來愈開心，一直訓練的潛意識也愈來愈充滿美好，更重要的是，我的心充滿光明與快樂感受，內在的空間可以有更大容量繼續靈性學習與攻讀我的下階段學識。吸引來的各地工作夥伴也很棒，全是我喜歡所愛的，而他們，也能延續我的影響力，成為幸福的人，享受喜歡他人和愛上自己的道路。


    看著學生們寫來的內容，刊登在公開的臉書或朋友圈中。身邊陪伴我的是從年輕開始就跟隨的執行長，十年後她也依然年輕。去年的教師節，同學們開始好玩的拚資歷，每個人都亮出自己的年份，好像在拚誰在公司裡待得最久，非常好笑。我開始如同倒吃甘蔗，有點甜頭了。一切的辛酸化為希望，我發現自己放下愈多，得到的就愈多。


    忍受孤單寂寞的時間足夠了，愛也會悄悄地靠近我。在我不經意的时候忽然發現，原來身邊一直默默守護的人，也是未來將要繼續為我所愛的人。


    我想像可以自由自在地行走世界各地，勇敢而堅強的成為不受威脅與束縛的仁者。


