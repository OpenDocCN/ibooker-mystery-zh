    6. 不論記得什麼，都仔細地寫下來。如果以為早上醒來再寫就可以，保證你醒來後啥也不會有印象了。不要太高估自己，一個字，一個圖，任何的靈光，乍洩的時候都要想辦法記住。也不要

    在夢裡說我會記得，這同樣是太高估自己了，用寫的才是王道。


