    \ 人生夢想設計藍圖\n\n東西方都有著一種信念，認為我們的人生藍圖是自己設定的，只是出生後自己就忘了。不管是哪一種說法，元辰殿、生命藍圖、阿卡西紀錄、生死之書⋯⋯很多的傳說中，不論東方或西方的研究，都脫離不了「光」。在《西藏生死書》中，有一個很重要的論點，就是人在投生為人之前，以及死亡之後，在七七四十九天的中間過渡期（Bardo，中陰，中間階段），我們沒有物質的身體，就只是一團光，這團光體帶有自己的意識銘印，帶有一種專屬的色彩頻率，這團光帶著自己的顏色特性往著被吸引的方向前去⋯⋯\n\
    \n準備再次經歷生命輪迴的光體，會被相同頻率的組合所吸引，這個組合由一男一女的相合力量構成，或可以說是一種共同類似的光芒，於是三種光芒融為一體，就像是宇宙中的大爆炸。我們，這個了不起又勇敢的生命，就此種下了生命的開端，在所選擇的母體中開始新生命之旅。\n\
    \n類似互相吸引的頻率湊在一起，是因為有共同的功課和學習，也有著共同的問題想一起解決，這種顏色光，就是生命的緣起，也是家庭與家族一直繁衍下去的原動力。\n\n\
    夢想渴望被實現，所以我們帶著色彩的意識，開始走入彩虹的色彩人生地圖，希望走一場彩虹的生命。而這些夢想，都被儲存在記憶深處——內在潛意識的原型地圖中，等著我們出生後開始解碼，不僅重新找回自己，也希望創造出新的自己。\n\
    \n我從來沒有想過，自己的人生會從顏色開始，而且還是從生死的體悟開啟彩色的大門。而這些色彩的寶藏，屢屢透過死亡或瀕死，向我印證其不可思議的存在，自小的藝術學習和儲存在潛藏記憶中的許多才華，也因為這些色彩的記憶，而逐漸被打開，具有與眾不同的彩色觀點和意念，特別是醒與半醒間的彩色力量，不斷牽引著我走進彩色的大宇宙，也打開了我的創造能量和高度運用想像力的療癒能力。\n\
    \n這些能力，後來大家稱之為潛能開發、全腦開發、創造力開發、右腦教育、藝術治療、靈性開啟⋯⋯不論是哪一種說法，都帶有神祕又神奇的過程或結果，也引發了許多教育專家及科學家的研究和探索。而我的這種能力，就是實現人生藍圖（我稱之為夢想設計藍圖）的超能力。我可以具備，每個人也都可以。只是你相不相信這個世界的顏色，竟然有如此強大的能力？\n\
    \n我的能力，不是來自我個人，而是來自對自然界的臣服和喜歡，所以可以輕而易舉的擁有，這種連結自然界的美好力量，因為色彩的美麗，只能用於創造和所有帶來美好感受的人事物上，沒有辦法呈現醜陋，因為顏色只能帶給世界美麗和力量。\n\
    \n它也稱作光，是宇宙生命源起的力量。\n\n# Chapter 1\n# 夢境奇遇\n\n因為夢境，引導了我一生的生命事業與志業。\n每當無助時，我睡覺就會得到力量或指引。\n\
    這是一把「打開幸福的鑰匙」……\n\n傳說，瑪吉阿米（又名白拉姆）和大昭寺護法神——赤尊贊互相愛慕，私定終身，卻被身為藏傳佛教最高護法神——班丹拉姆的母親反對，把瑪吉阿米隔放到拉薩河南岸的奔波日山，只在每年藏曆十月十五日，這對愛人才能隔著拉薩河互望一下。\n\
    \n每個人的人生，是不是都有著某個想要，卻沒有得到的小小失落？\n這種想要愛上什麼，卻沒有辦法愛下去的痛苦，你曾經歷過嗎？\n或是一種渴望愛，卻無法盡如人意的感覺，你曾經擁有過嗎？\n\
    \n在我的工作和人生中，不可諱言的，以世俗角度來看，我一無所有，但以非世俗的角度來看，我卻幸福得不得了，擁有人人羨慕的一切。\n\n而我的人生，就是在我的天職中，世間與出世間，人性與神性間，擁有一切與一無所有間，找到了平衡的能量法則。\n\
    這是我的修行之路。\n我修練生命的道路，是以愛來修練，以愛療癒。"
