    \n我自小對場域敏感，不僅人的場域，還有空間的場域。\n\n人們在情緒升起時，往往會散發出光和熱，進而伸展出色彩光能的輻射，進而影響了空間的感受。每個人都在創造自己的場域，就像金凱瑞的畫作一樣，大多數的人雖然沒有終日繪畫，但透過如同相機的眼睛看出去，就可以有了立體的感受。\n\
    \n眼睛的迷人之處，就在於可以拍攝下靈魂的紀錄片。這些記憶儲存在靈魂深處，到了人生最後的際遇時，就可以拿出來深深地回味。喔，我去過瑞士的高山；喔，我見過西藏的藍天；啊，我親歷過埃及的金字塔；對了，我還去過大昭寺……種種的美好感受，在靈魂深處都會像播放錄影帶一般，播放出美好色彩的影片，讓心情感覺美好，讓靈魂感受豐富。我們也會透過這有形有相的色彩世界，建構出無形無相的內在色彩世界。當心情美好時，我們便會收到這樣美好的夢境，或是促成生活中美好的事情圍繞著我們，只因為我們的感覺會變得很「彩色」。\
