    # Part 心與物質的生存考驗


    為我而成為一個智慧加身的好妻子與母親。她透過靈性的敏感，也陪伴了丈夫度過生命的危機，是我色彩能量教育的實踐者。


    由於指引我的靈學老先生，以及諸位靈性指引導師，都希望我能把佛法的生命哲理融入教學中，因此，我加入了一個國際的色彩組織（這也是靈學老先生的建議），把我的靈能動見融入在教學當中。一開始，我們是透過某個商業的環境做買賣，但逐漸的，我發現我的能量教學中融入的自己的風格，特別的「禪」（Zen）味十足。


    很像我的畫畫一樣，我很喜歡意境式的作品，或是可以從藝術作品中感受能量場域（意境）。這樣一點一滴過了二十多年的色彩工作，我的學生們也奉行著這些做法，比較有悟性的同學，就會依著我的教育方式融入到生活。畢竟學習心靈平衡，不就是為了人生幸福美滿、和諧豐盛嗎？


    另一方面，我也不贊成學了就要離婚、獨身，甚至出家。因為每個人的生命軌跡不同，如果已經有婚姻了，為什麼不好好認真地走下去，偏要離群獨居呢？


    彩色禪修就是依著這樣的藝術品味，走成人生一幅美圖的宗旨，而逐漸成形的修練方法。這當中，我們透過情緒的淬煉，逐漸感知到快樂、無憂、無私、大愛。


    十多年前這個成都的學生，不僅自己幸福美滿，靈性強大，更因此支持了先生的事業，以及兒子的健康成功。


    這對夫妻從網路上找到了我，然後一年半後我們終於在成都相見。他們成了成功的房地產商，並且在青城山都江堰旁邊擁有大片土地和飯店、別墅。盛情地在我成都課程結束後，親自來接我到他們的飯店給我慶生，於是，「青城山彩色禪閉關中心」就這樣被贊助成立了。


    那麼，我們現在就開始一起進入彩色禪修吧！'
- md: "## Chapter 9. 走進色彩異世界\n\n1.  **stop-thinking（停止思考）**\n    所有感知的一切，都無法透過思考發生。因此，彩色禪修的第一步，就是放下繁重的頭腦。不思考對多數人來說非常不容易，而且愈成功的人愈難達到。一秒鐘不想事情，一天不去規劃未來，真的很不像活著。\n\
    \n    但所有的高感知力，都要從停止思考開始。因此，先練習發呆，休假時不做事，把原本創造負面的思考力降低、減弱，你才能走進下一步。\n\n2.  **專注一件事**\n\
    \    不思考之後，你可能會很恐慌。因此，我們需要先專注一件事情。\n\n    你只能有兩種專注：一是做色彩相關的事，另一個是做色彩能量與身體相關的事。前者是藝術的事情，如畫畫、攝影，讓自己放鬆的事；後者可以是運動、旅行，讓自己快樂的事。\n\
    \n    沒有放鬆，便無法快樂，你也不會有色彩感知力。\n\n3.  **開始呼吸**\n    如果你可以感受到專注，接下來，就可以專心在呼吸上。走路時呼吸，睡覺時呼吸，講話時呼吸，打坐時呼吸。呼吸是非常美好的經驗，只有活著我們才能感知到。如果可以隨時知道自己在呼吸狀態，我們就可以覺察到自己的情緒與感受，就會平靜下來。\n\
    \n4.  **進入色彩**\n    在專注呼吸的同時，我們開始加入眼睛的力量。用眼睛辨識一切的色彩，一切進入眼中的色彩，然後把顏色連結到心中。心是感受一切的發源地，不平靜、不快樂的心無法感知色彩能量場，因此，必須透過以上幾個步驟，才能打開色彩能量的場域感知力。\n\
    \n## 5. 彩色禪修\n\n透過呼吸，吸入一切的能量感知。\n透過眼睛，攝入一切的色彩訊息。\n透過覺察，感知一切的能量覺受。\n\nstop-thinking,\
    \ just awareness。停止思考，只是感知。\n\n## 以愛療癒\n\n愛可以幫助我們對抗疾病和不舒適；愛更是一種禪的藝術。\n\n## Chapter\
    \ 10. 這不是我想像的身心靈行業\n\n人在面臨生存恐懼時，各種的負面能量將紛呈出現，像憤怒、不滿、恐懼、擔憂等等；而有效利用雜念管理，即可以簡單有效地讓心沉澱下來。\n\
    \n懷著朝聖的感動和對一份全新事業的信心，我從英國回來了。\n\n美國的凱洛老師告訴我，她要去泰國做新課程的發佈會。身為她唯一的東方學生的我，當然義不容辭地得去捧個場。\n\
    \n在這次的三天課程中，我第一次體會到人天合一的感受。當我們把手放在身上，我可以立即由自己摸著的身體，像導電一樣，立即從另一個維度（次元空間）中感受到宇宙的智慧，以及從沒學過的神祕學意涵。對於這樣的體悟，我實在嚇壞了，因為這第一次的接觸並不舒服。\n\
    \n我一向敏感過了頭。敏感沒有辦法給我很好的安全感，因為我常常無意間會誤闖他人的空間，透過他人的磁場，明瞭到他人的內在問題或是身體的問題。這立即性的明白，帶給我的不是快感，而是驚嚇。\n\
    \n這種驚嚇我持續了很多年，弟弟過世之後愈來愈明顯，也因此我私下找過一些方法，希望能夠得到改善。在我沒有遇上藏傳佛教有修行的師父前，我的自我保護力不夠，所以常常沒有安全感。\n\
    \n我不太想知道別人怎麼了，但就是可以知道。所以，\n\n## Part Ⅲ 心與物質的生存考驗\n\n我刻意不太與人碰觸，特別是身體上的碰觸。記得高中時，我連女同學間的拉手都會避免，女生之間常會手臂勾手臂，這對我來說也常是一種痛苦，因為對方的磁場會跑到我的身上來，我會感受到對方像是生理期來到，或是對方身上正在不舒服的部位，而我也會立即同樣的不舒服。但因爲來自無神論的家庭，我不會朝著神學或靈能的方向去解釋，唯一能做的，只是避免碰觸而已。這個問題多年未獲解決，也同樣阻礙了我的男女交往關係。\n\
    \n在泰國的三天裡，第一天第一場的碰觸練習，一個滿頭紅髮的壯碩德國姊姊，興沖沖的跑來想和我配成一組，一起練習凱洛老師教的手法。我瞄了她一眼，心裡想：慘了！她的氣場和她的頭髮一樣，很紅。對我來說，很可怕！但我不會拒絕，在那個場合裡，必須要有有人可以練習的呀！我瞄了凱洛老師一眼，心想：反正老師在呀！她會幫助我的，我不應該害怕。於是，我的眼睛看著「紅紅的\
    \ Tiger」（一隻紅色大老虎），接受了邀請，一起互相做能量碰觸的練習。\n\n果不其然，再次發生慘劇。紅老虎姊姊的身體一下子釋放了所有憤怒和負面情緒，身體輕按後準備交換練習時，我已悽慘的全身發抖，坐在地上根本站不起來。本來心裡就已經犯嘀咕，有了抗拒，對紅老虎姊姊的能量已經產生了排斥，所以當一股不熟悉的能量排山倒海衝來時，我就失去了抵抗力。\n\
    \n凱洛老師發現我無法站起來，便等其他同學離開後，默默的坐在我的身邊，用「勁能量」來陪伴我。這是我第一次發現，心懷仁善的療癒，一種慈愛的陪伴，能夠化解所有的衝擊，把身體卡住的關卡一一融化。\n\
    \n沒多久，凱洛老師把放在我身上的手離開，我的身體恢復了正常。我很難向老師解釋我的感受，我直覺知道凱洛老師不是靈能體悟者，她是智者，清高的知識傳遞人，但她的功能不在於我們這種感應力，說了也是白說。但老師教會我一件事，就是「不要抗拒」。\n\
    \n> 任何的能量靠近，如果我們不心懷對抗，這個能量就不會隨之以更強大的姿態起舞。對抗性的能量，也是因為我們對抗後產生的抗性所致，像是憤怒、不滿、恐懼、擔憂等等。這其中最強大的，就是憤怒。\n\
    \n紅老虎姊姊全身都是紅色的憤怒氣場，嚇到我了，只因我不擅長和很會吵架或強悍的力量為伍。直到粉紅色的凱洛老師靠近，才舒緩了我的壓力和不舒服。\n\n當我一明白這個道理，並且不再抗拒後，第二天的課程我開始體會到，原來宇宙當中所有的一切密法，都收藏在我們的身體裡。對於沒有很多神祕學知識與學習的我來說，不能理解的是，老師在上課中所講的身體所有對應區，如某個位置對應某個星相，某個位置對應某個塔羅或卡巴拉的概念，不過我發現，當我閉上眼睛，把手放在那個對應的位置上時，瞬間就有很多\
    \ flow（流動）進來，就像是從另一扇門的另一個房間流進來，完全不費力氣就能理解了。\n\n我不知道是自己身體很神奇？還是老師教的手法很神奇？當晚我夢到，一個新生的嬰兒躺在我的胸前，我就像個母親一樣，全裸著抱著這個全裸的小嬰孩。夢境實在太栩栩如生了，我問他，你是我的小孩嗎？是代表我要生小孩了？還是，你是誰呢？\n\
    \n第三天，我夢到我給凱洛老師一只大皮箱。於是我明白，我將帶著我的老師去旅行了。\n\n對於一個以靈性和療癒為主的事業，我真的是滿懷著崇高的目標與熱情。\n\
    \n## Part Ⅲ 心與物質的生存考驗\n\n特別是在受過藏傳佛教的師父與弟子的訓練，我對於「師父」這樣身分的人，都是全然的奉獻和尊敬。因此，儘管這些課程都是要付費的，但對我來說，這就如同我參加佛教活動一樣，付錢是應該的。我沒有金錢的障礙，我有的是全然的熱情。\n\
    \n崇高的使命感與靈性的熱情，是二十多年來支持我的唯一源頭。\n\n在身心靈的行業中，我是誤打誤撞下闖進來的。其實從一開始，彷彿就闖錯了道場，而我憑藉的是，自己強大的信念和積極的行動力。但也不知道為什麼，只要每次我想去實現，似乎所有的一切「存在」就支持著我。\n\
    \n成為臺灣區以及後來加拿大地區的代言與商品代理，都源自於凱洛老師的一番鼓勵。老師鼓勵我寫論文，並且認真做療癒個案報告，但我直覺認為，自己不是很有能力做這些課程的授課老師。對我來說，我只想請我的老師來就可以了。\n\
    \n我知道自己很敏感，所以擅長照顧人。我彷彿也認同自己好像很輕鬆就可以讀懂他人的心（後來前輩說這叫他心通），所以我想，我應該是個可以善解人意、心地善良的課程主辦人，對於更大的壓力和考試，我敬謝不敏。\n\
    \n不過凱洛老師不這樣想，她告訴我，「我知道你們東方學生聰明，對於考試有著完美成為第一名的迷思。但我們西方人的想法不是這樣，特別是在你學習的過程中，我們希望你能體驗這個過程。當你很努力去完成，這個過程才是最精華與最美好的。所以，我們不是要考倒你，而是希望你盡力去完成。」\n\
    \n凱洛老師也是當時僅有的幾位主考官，我的老師開口了，我便全然信任的去做。三個月，我又以資優的態勢取得了論文通過，並且正式可以代表英國學校開始教學了。\n\n\
    取得證書之後，我依然沒有想要教書。想想自己要準備，還要背臺詞，英文教材也要一讀再讀，何必那麼辛苦？我只需要請我的老師來就好了呀！天不從人願，體弱多病的凱洛老師在來臺灣之前忽然生病無法飛行，助理建議我自己開課，因為錢已經收了。就這樣，我的人生，又面臨了轉淚點。\n\
    \n我想推動身旁的工作夥伴，可是好像情勢只能我自己下場了，但我沒有經驗，於是面對已經交錢的十多位同學，我們只好據實以告。沒想到，只有兩位同學願意等待凱洛老師復原繼續上課，沒有人退費，其他的十多位同學都想上華語教學的老師的課。我以为大家會選擇凱洛老師，這樣我就有理由可以退縮，沒想到，又一場天不從人願的戲碼。為了承諾，我得上陣開課。\n\
    \n戰戰兢兢的，連帶領靜坐都偷看講義，用念的完成，我感覺自己超級不專業的。接下來如何帶領六天呀？沒想到，維琪．渥爾又出奇招了。這次非常奇妙的，她教了我靜心之術。\n\
    \n當我結結巴巴的帶領靜坐時，忽然間，我進入到藍色的寧靜之中。\n\n我很清楚知道，有個不一樣的能量團出現，霎時我又進入了一個完全沒有聲音的安靜空間裡。這個感覺年幼時出現過，弟弟過世後出現過，只要當我感覺到很不能平靜，甚至情緒激動時，覺得要崩潰時，我就立刻會進入到一個無聲的世界，然後，不同顏色的光就會降臨。這次，是藍色的。\n\
    \n我一下子平靜了下來，好像變了一個人似的，非常平穩，像個專業的老師。這藍色的平靜感不預期的出現，卻引領我明白了藍色代表平靜的能量意涵。我進入到這個能量場域裡，感覺到前所未有的舒服和平靜，沒有任何煩惱，只是平靜，還有一股難以言喻的「信任」。當下覺得自己就是一個「權威」或「專家」。\n\
    \n食髓知味，為了想念這個藍色的平靜，我願意再次開課，而且一教就教了二十多年。\n\n所有的靈性商品或行業都像是另一種宗教，新興宗教。當然，不管是賣心靈、賣課程、賣產品，領導人的風格自然是一個企業系統的靈魂關鍵，彩油也不例外。而在心靈的世界，投入的人大多是心靈脆弱者，想找到依靠。因此，在缺愛、缺錢或缺性的世界中，也容易形成另一種宗教團體的崇拜。但在這樣的世界中，也不乏充斥著金錢和性愛的醜聞與曖昧。\n\
    \n帶著神聖崇高的崇拜心，依著靈學老先生的指引，再加上佛教徒修練的培養，令我對於老師十分尊敬。由於無形的世界優先來到，然後才是人性的世界，所以我不疑有他，認真而專心的為了「使命」而前進，無所畏懼。\n\
    \n當一個人沒有私心，只是為了像是世界和平、土地寧靜，或是人心和諧有愛等，為這些目標奮鬥，而無所懷疑時，是最幸福的時刻。我的二十年幾乎是在這樣毫無懷疑的情況下努力的，所以成功很快，賺錢不少，一切都來得非常容易。我彷彿是以這樣的事業作為一輩子的終身目標，並樂此不疲。\n\
    \n本以爲就這樣一直持續下去，但人生的劇本就不是以永恆來安排的，而是以無常安排的。\n\n長久以來，凱洛老師和英國的彩油學校一直沒有良好的互動。這源自於她的一個學生剽竊了她的教學內容，創造了另一個課程；也和英國為了版權問題，還有商業制度上的不健全而有摩擦，有些成員是為了錢，而不是為了理想的狀態，她非常不以為然，卻是投訴無門。\n\
    \n彩油世界中老一輩的老師中，生活清苦貧窮的不在少數，因為他們必須依附著組織而生。如果國王不喜歡這個人，或是停止了產品或授權的供給，甚至禁止這個老師繼續教授組織的課程，這個老師就形同被切斷了生路。有大量的老師們依靠著這個組織，卻無力成為自己，只能依從權威的規範，像極了中古世紀的宗教權威。我曾經問過老師，為什麼不去爭取或抗議？有的，但抗議無效，於是凱洛老師和組織愈走愈遠。\n\
    \n她的生活清苦，我是明白的。我一方面心疼老師，又不能理解為什麼一個賺錢的大組織，為什麼不能好好照顧那些曾經為你奉獻青春的開國元老？這樣的故事一直重演，許多老一輩的老師，都因為無力再交錢給組織而被迫退出。去年，我的一位英國老師，也面臨了這樣的困境。老師們被組織「退出」後，都面臨了生存的問題。我在兩年前曾提醒過這位老師，去年當他寫信來希望我為他辦課程時，我還提醒他，要成為自己，不是賣瓶瓶罐罐的，不自由的人。可惜我們都是經歷了二十年時光才明白。換個角度想，我們可能都沉溺在某種宗教情懷中，而忘了這是個商業世界。\n\
    \n遺憾的是，在我所有輔導的賺大錢企業中，最大的問題往往出自領導者。像是某些金融或直銷行業，老闆見到錢多了，立刻改變了當初的發心。人的貪心和傲慢往往是改變的關鍵，身心靈的商業國度中，崇拜多了，卻不再自我覺察，甚至依然堅持內心缺愛的舊有創傷，忘了療癒的初衷，這樣仍然會掉回到老路上。舊有的模式不斷重演，人們的貪心與爭奪不斷發生，而身心靈的考驗更為殘酷，因為賣的就是人性和夢想。\n\
    \n能量的世界更是如此。二〇一〇年，在中國工作的經驗中，在我的盲從和執念背後，我開始意識到一個現象。就算做的是希望幫助眾人身心靈和諧的工作，但一掉入了一個大市場，面對一堆金錢，如果不是修行人，可能也會掉入這殘酷的大染缸中。果不其然，所有的外國人到了中國似乎都瘋了，因為中國市場很大，中國的商人也很能畫大餅，如果沒有把持住自己的心念，貪欲的力量往往容易令人迷失。\n\
    \n我的偶像世界開始崩塌，就像塔羅牌中的高塔。一直以為在安全生存的高塔中，便是安全的，殊不知，當高塔形成了我們和世界的鴻溝，也將令我們不再感知到這個世界的公平正義與光明的愛。這種隔絕，像是塔羅牌中的死亡牌，會讓人靈魂黑暗，見不到光明。\n\
    \n於是，我的生命中又出現了一堆阻力，開始阻止我走在這條自以為已經鋪好的道路上。就像當年被摧毀一切道路一樣，我又得開始調整腳步，重新出發。\n\n依戀父母的孩子，往往是依賴習慣了。彩油早期的工作者，像凱洛老師他們，都是經濟上不富裕的一群人，我常常仗義要為老師們開課，然後供養金錢給他們。因為我感覺自己好像是個很好的橋樑，只要這些有靈魂能力、卻無助的靈性工作者找上我，我都願意付出心力，為他們創造一條物質的道路。就這樣，不少外國老師找上我，我也為他們創造了金錢的機會。\n\
    \n但是，畢竟這些人不是修行人。記得在我自己覺得走上困境時，一位彩油老師竟然毫不留情。不僅繼續要收錢，完全無視於我的困境，還和我的學生聯合起來，想找其他的跳板繼續在臺灣工作。\n\
    \n第一次，我忽然明白，原來我活得很不落地，一直為了理想奮鬥，卻不理解人心與人性。但我沒有多說，因為我知道金錢物質的困境是人生的底線，除了修行人的清高可以看清，大多數人無法走出這樣的糾結與掙扎。\n\
    \n人在面臨生存恐懼的表現，是出於自衛，不是意圖。我自己不也是這樣？長年在身心靈機構，卻一直被同組織的同業鬥爭的環境，讓人無法自拔的只能奉承（非奉獻）組織。最後一次到英國學校時，我見到很多黑色的力量圍繞著。我知道，那應該是我最後一次來這裡了。就這樣，我意識到該走自己的道路，而不能再盲從了。因為我很受不了每個國家都因為這一個產品，而使自己人反目，甚至爭奪，又互相陷害。這樣為了錢而工作，失去了靈性的意義，爭到了代理權又如何呢？\n\
    \n我的失望在於，如果不能促進世界的美好，只是用美好吸引人心的欲望和虛假，卻使我們的心逐漸失落，那就不是我真心想要的境界。\n\n很多的智慧不是上一兩天的課程就可以獲得的，更多的體悟是在成為治療師之後才會有收穫。我多虧了入行早，年紀輕輕就一頭栽進了這個奇幻的國度。很多小時候的靈性功能，全是在工作中逐漸恢復，甚至更為擴大。另一方面，也或許我已經走過那一段道路，所以，畢業了，可以放手了。\n\
    \nLove My Own Way（愛上自己的道路），我的心開始出現這幾個字句，也開始準備有勇氣跳出依賴的窠臼，走上自己追尋的真理之路。\n\n![核心體悟\
    \ Core Enlightenment](img/2165f73db991986bac0992a95b4cd001_135_0.png)\n\n如果你看過哈利波特《鳳凰會的密令》這部小說或電影，你可能印象深刻的是哈利波特和黑暗勢力的競爭。最後一次去英國學校，我是生病回來的。當時的掙扎，就是這樣的心境。我開始感受到自己的內在，也在被同化為一種黑暗的力量（像是欲望）。但是，似乎我內心排斥的同時，自己竟然好像也有這一面。\n\
    \n一直記得那個場景，完全是一個背叛的場景。我的老師聯合了我的學生，然後出現在我的面前，令我尷尬的必須接受眼前的難堪。我天生痛恨背叛與欺瞞，卻在面對時完全無招架之力，不知道如何面對信任的老師和學生聯合上演的一齣戲碼。\n\
    \n我反觀自己，外在的背叛，或許只是呈現我的內心也早已背叛了。記不清楚那時的情節，但依稀記得情緒上的強烈波動。\n\n當哈利波特在掙扎對抗自己內在的黑暗勢力時，像是憤怒、仇恨、想殺死對方，校長鄧不利多告訴他：「重點不在你們的相似處（負面），而是你們的不同處（愛）。」這對當時掙扎快陷入昏迷的哈利波特來說，實在辛苦。但我想鄧不利多點出了一個重點，就是對抗我們的「軟弱」。\n\
    \n我覺得沒有老師、學生的支持，心裡很孤單困苦。但我面對這種變化時也在反思，我有什麼？我想要什麼？看不慣療癒機構不去療癒眾人，卻不斷在製造紛爭；已經努力建議過，卻無力改變時，我要繼續這樣活著，還是有所選擇？\n\
    \n我不想關注我們共同擁有的執念和欲望，但我真心想關注在擁有的共好與和諧。曾經，我也在信守遊戲規則下，創造了他人的不快樂與爭奪。現在我想想，就算我爭到了，又如何呢？\n\
    \n花了幾年時間，我建立起自己的品牌，也釋出友善，不希望與之為敵。也逐漸發展出另一種整頓貪欲與思維混亂的能量思維斷捨離——「雜念管理」。有趣的是，就在這個時候，英國發出了極不友善的郵件給我的執行長，因為我，我的學生們都是彩油的信徒。但這一次，這個宗教組織要剷除異己了。\n\
    \n五年前，我的心中早已做好準備，但我的學生們放不下。沒有親近核心，總是心存幻想。這次，連親自在其中交涉的執行長，都感受到一股「殺氣」。執行長沒有辦法想像，這個美好的面具背後的真相，仍然想停留在虛假的美好中。而這一次，我依然說著五年來沒有停止的勸告：「覺醒吧！做自己才是最棒的禮物。」\n\
    \n於是我們對外公告，並且立刻清理掉所有的剩餘產品。向過去說再見，最難的是情緒和一種深深的依戀。我理解我的團隊及學生們的難過，大家依依不捨地和相處了二十年的產品說再見。但是，分離，只是一種因緣的結束，卻不代表我們過去沒有美好，這是靈魂深處的記憶，也是一種歷練。時間到了，就繼續向前流動。生命是需要向前流動，才能體現美好的精神。我們早已領教過那些非靈性的行為，但那也教會我們，當我們自己的團隊組織做大時，我們可免於犯下同樣的過錯。我們，帶著過去的禮物，向前開拓了新的局面。「成住壞空」，當年靈學老先生提醒的，如今呈現眼前。\n\
    \n我開發最簡單、卻立即有效的雜念管理法，也許可以為紛亂的你，找到意識清晰的最簡單方法。雜念管理的三步驟：\n\n- 第一步：接受，了解心理動機（所有的行為都有背後的動機）。\n\
    - 第二步：放下，透過放下信念（了解之後才能放下）。\n- 第三步：原諒，原諒行為模式（放下之後就能原諒）。\n\n我們以高階治療師茹絲的真實案例，來套用雜念管理的三步驟：\n\
    \n**第一步，接受。**\n\n在課程中，身體不舒服的茹絲先接受自己身體失去力氣的現況，並開始探索自己身體背後的心理動機為何？茹絲意識到，她好不容易抽出時間來進修，眼見同學們都認真的學習，並且馬上有所體悟，但她的身體竟然開始不聽使喚。她一方面氣自己的不爭氣（我怎麼可以有這樣的反應），也很著急自己「跟不上」。愈急，身體就愈無力，怎麼辦？\n\
    \n既然抗拒讓我們無法進入改變的情況中，那麼就接受吧。\n\n**第二步，放下。**\n\n茹絲理解到，她內在極大的自我，產生了對自己的批判，同時也令自己不願意走進課堂中，以免自己失敗，被同學比了下去，證明自己的不夠聰明（以往她是不必太用心，也不用花時間，就可以輕而易舉的學會任何技巧，讀懂任何知識）。今天，茹絲需要放下自己過去的傲慢，而因為理解了，所以也就放下了。她自己也笑自己：「一直認為自己的基因很好。」\n\
    \n## 自我療癒\n\n## 雜念管理"
  mdcn: "## Chapter 9. 走進色彩異世界\n\n1.  **stop-thinking（停止思考）**\n    所有感知的一切，都無法透過思考發生。因此，彩色禪修的第一步，就是放下繁重的頭腦。不思考對多數人來說非常不容易，而且愈成功的人愈難達到。一秒鐘不想事情，一天不去規劃未來，真的很不像活著。\n\
    \n    但所有的高感知力，都要從停止思考開始。因此，先練習發呆，休假時不做事，把原本創造負面的思考力降低、減弱，你才能走進下一步。\n\n2.  **專注一件事**\n\
    \    不思考之後，你可能會很恐慌。因此，我們需要先專注一件事情。\n\n    你只能有兩種專注：一是做色彩相關的事，另一個是做色彩能量與身體相關的事。前者是藝術的事情，如畫畫、攝影，讓自己放鬆的事；後者可以是運動、旅行，讓自己快樂的事。\n\
    \n    沒有放鬆，便無法快樂，你也不會有色彩感知力。\n\n3.  **開始呼吸**\n    如果你可以感受到專注，接下來，就可以專心在呼吸上。走路時呼吸，睡覺時呼吸，講話時呼吸，打坐時呼吸。呼吸是非常美好的經驗，只有活著我們才能感知到。如果可以隨時知道自己在呼吸狀態，我們就可以覺察到自己的情緒與感受，就會平靜下來。\n\
    \n4.  **進入色彩**\n    在專注呼吸的同時，我們開始加入眼睛的力量。用眼睛辨識一切的色彩，一切進入眼中的色彩，然後把顏色連結到心中。心是感受一切的發源地，不平靜、不快樂的心無法感知色彩能量場，因此，必須透過以上幾個步驟，才能打開色彩能量的場域感知力。\n\
    \n## 5. 彩色禪修\n\n透過呼吸，吸入一切的能量感知。\n透過眼睛，攝入一切的色彩訊息。\n透過覺察，感知一切的能量覺受。\n\nstop-thinking,\
    \ just awareness。停止思考，只是感知。\n\n## 以愛療癒\n\n愛可以幫助我們對抗疾病和不舒適；愛更是一種禪的藝術。\n\n## Chapter\
    \ 10. 這不是我想像的身心靈行業\n\n人在面臨生存恐懼時，各種的負面能量將紛呈出現，像憤怒、不滿、恐懼、擔憂等等；而有效利用雜念管理，即可以簡單有效地讓心沉澱下來。\n\
    \n懷著朝聖的感動和對一份全新事業的信心，我從英國回來了。\n\n美國的凱洛老師告訴我，她要去泰國做新課程的發佈會。身為她唯一的東方學生的我，當然義不容辭地得去捧個場。\n\
    \n在這次的三天課程中，我第一次體會到人天合一的感受。當我們把手放在身上，我可以立即由自己摸著的身體，像導電一樣，立即從另一個維度（次元空間）中感受到宇宙的智慧，以及從沒學過的神祕學意涵。對於這樣的體悟，我實在嚇壞了，因為這第一次的接觸並不舒服。\n\
    \n我一向敏感過了頭。敏感沒有辦法給我很好的安全感，因為我常常無意間會誤闖他人的空間，透過他人的磁場，明瞭到他人的內在問題或是身體的問題。這立即性的明白，帶給我的不是快感，而是驚嚇。\n\
    \n這種驚嚇我持續了很多年，弟弟過世之後愈來愈明顯，也因此我私下找過一些方法，希望能夠得到改善。在我沒有遇上藏傳佛教有修行的師父前，我的自我保護力不夠，所以常常沒有安全感。\n\
    \n我不太想知道別人怎麼了，但就是可以知道。所以，\n\n## Part Ⅲ 心與物質的生存考驗\n\n我刻意不太與人碰觸，特別是身體上的碰觸。記得高中時，我連女同學間的拉手都會避免，女生之間常會手臂勾手臂，這對我來說也常是一種痛苦，因為對方的磁場會跑到我的身上來，我會感受到對方像是生理期來到，或是對方身上正在不舒服的部位，而我也會立即同樣的不舒服。但因爲來自無神論的家庭，我不會朝著神學或靈能的方向去解釋，唯一能做的，只是避免碰觸而已。這個問題多年未獲解決，也同樣阻礙了我的男女交往關係。\n\
    \n在泰國的三天裡，第一天第一場的碰觸練習，一個滿頭紅髮的壯碩德國姊姊，興沖沖的跑來想和我配成一組，一起練習凱洛老師教的手法。我瞄了她一眼，心裡想：慘了！她的氣場和她的頭髮一樣，很紅。對我來說，很可怕！但我不會拒絕，在那個場合裡，必須要有有人可以練習的呀！我瞄了凱洛老師一眼，心想：反正老師在呀！她會幫助我的，我不應該害怕。於是，我的眼睛看著「紅紅的\
    \ Tiger」（一隻紅色大老虎），接受了邀請，一起互相做能量碰觸的練習。\n\n果不其然，再次發生慘劇。紅老虎姊姊的身體一下子釋放了所有憤怒和負面情緒，身體輕按後準備交換練習時，我已悽慘的全身發抖，坐在地上根本站不起來。本來心裡就已經犯嘀咕，有了抗拒，對紅老虎姊姊的能量已經產生了排斥，所以當一股不熟悉的能量排山倒海衝來時，我就失去了抵抗力。\n\
    \n凱洛老師發現我無法站起來，便等其他同學離開後，默默的坐在我的身邊，用「勁能量」來陪伴我。這是我第一次發現，心懷仁善的療癒，一種慈愛的陪伴，能夠化解所有的衝擊，把身體卡住的關卡一一融化。\n\
    \n沒多久，凱洛老師把放在我身上的手離開，我的身體恢復了正常。我很難向老師解釋我的感受，我直覺知道凱洛老師不是靈能體悟者，她是智者，清高的知識傳遞人，但她的功能不在於我們這種感應力，說了也是白說。但老師教會我一件事，就是「不要抗拒」。\n\
    \n> 任何的能量靠近，如果我們不心懷對抗，這個能量就不會隨之以更強大的姿態起舞。對抗性的能量，也是因為我們對抗後產生的抗性所致，像是憤怒、不滿、恐懼、擔憂等等。這其中最強大的，就是憤怒。\n\
    \n紅老虎姊姊全身都是紅色的憤怒氣場，嚇到我了，只因我不擅長和很會吵架或強悍的力量為伍。直到粉紅色的凱洛老師靠近，才舒緩了我的壓力和不舒服。\n\n當我一明白這個道理，並且不再抗拒後，第二天的課程我開始體會到，原來宇宙當中所有的一切密法，都收藏在我們的身體裡。對於沒有很多神祕學知識與學習的我來說，不能理解的是，老師在上課中所講的身體所有對應區，如某個位置對應某個星相，某個位置對應某個塔羅或卡巴拉的概念，不過我發現，當我閉上眼睛，把手放在那個對應的位置上時，瞬間就有很多\
    \ flow（流動）進來，就像是從另一扇門的另一個房間流進來，完全不費力氣就能理解了。\n\n我不知道是自己身體很神奇？還是老師教的手法很神奇？當晚我夢到，一個新生的嬰兒躺在我的胸前，我就像個母親一樣，全裸著抱著這個全裸的小嬰孩。夢境實在太栩栩如生了，我問他，你是我的小孩嗎？是代表我要生小孩了？還是，你是誰呢？\n\
    \n第三天，我夢到我給凱洛老師一只大皮箱。於是我明白，我將帶著我的老師去旅行了。\n\n對於一個以靈性和療癒為主的事業，我真的是滿懷著崇高的目標與熱情。\n\
    \n## Part Ⅲ 心與物質的生存考驗\n\n特別是在受過藏傳佛教的師父與弟子的訓練，我對於「師父」這樣身分的人，都是全然的奉獻和尊敬。因此，儘管這些課程都是要付費的，但對我來說，這就如同我參加佛教活動一樣，付錢是應該的。我沒有金錢的障礙，我有的是全然的熱情。\n\
    \n崇高的使命感與靈性的熱情，是二十多年來支持我的唯一源頭。\n\n在身心靈的行業中，我是誤打誤撞下闖進來的。其實從一開始，彷彿就闖錯了道場，而我憑藉的是，自己強大的信念和積極的行動力。但也不知道為什麼，只要每次我想去實現，似乎所有的一切「存在」就支持著我。\n\
    \n成為臺灣區以及後來加拿大地區的代言與商品代理，都源自於凱洛老師的一番鼓勵。老師鼓勵我寫論文，並且認真做療癒個案報告，但我直覺認為，自己不是很有能力做這些課程的授課老師。對我來說，我只想請我的老師來就可以了。\n\
    \n我知道自己很敏感，所以擅長照顧人。我彷彿也認同自己好像很輕鬆就可以讀懂他人的心（後來前輩說這叫他心通），所以我想，我應該是個可以善解人意、心地善良的課程主辦人，對於更大的壓力和考試，我敬謝不敏。\n\
    \n不過凱洛老師不這樣想，她告訴我，「我知道你們東方學生聰明，對於考試有著完美成為第一名的迷思。但我們西方人的想法不是這樣，特別是在你學習的過程中，我們希望你能體驗這個過程。當你很努力去完成，這個過程才是最精華與最美好的。所以，我們不是要考倒你，而是希望你盡力去完成。」\n\
    \n凱洛老師也是當時僅有的幾位主考官，我的老師開口了，我便全然信任的去做。三個月，我又以資優的態勢取得了論文通過，並且正式可以代表英國學校開始教學了。\n\n\
    取得證書之後，我依然沒有想要教書。想想自己要準備，還要背臺詞，英文教材也要一讀再讀，何必那麼辛苦？我只需要請我的老師來就好了呀！天不從人願，體弱多病的凱洛老師在來臺灣之前忽然生病無法飛行，助理建議我自己開課，因為錢已經收了。就這樣，我的人生，又面臨了轉淚點。\n\
    \n我想推動身旁的工作夥伴，可是好像情勢只能我自己下場了，但我沒有經驗，於是面對已經交錢的十多位同學，我們只好據實以告。沒想到，只有兩位同學願意等待凱洛老師復原繼續上課，沒有人退費，其他的十多位同學都想上華語教學的老師的課。我以为大家會選擇凱洛老師，這樣我就有理由可以退縮，沒想到，又一場天不從人願的戲碼。為了承諾，我得上陣開課。\n\
    \n戰戰兢兢的，連帶領靜坐都偷看講義，用念的完成，我感覺自己超級不專業的。接下來如何帶領六天呀？沒想到，維琪．渥爾又出奇招了。這次非常奇妙的，她教了我靜心之術。\n\
    \n當我結結巴巴的帶領靜坐時，忽然間，我進入到藍色的寧靜之中。\n\n我很清楚知道，有個不一樣的能量團出現，霎時我又進入了一個完全沒有聲音的安靜空間裡。這個感覺年幼時出現過，弟弟過世後出現過，只要當我感覺到很不能平靜，甚至情緒激動時，覺得要崩潰時，我就立刻會進入到一個無聲的世界，然後，不同顏色的光就會降臨。這次，是藍色的。\n\
    \n我一下子平靜了下來，好像變了一個人似的，非常平穩，像個專業的老師。這藍色的平靜感不預期的出現，卻引領我明白了藍色代表平靜的能量意涵。我進入到這個能量場域裡，感覺到前所未有的舒服和平靜，沒有任何煩惱，只是平靜，還有一股難以言喻的「信任」。當下覺得自己就是一個「權威」或「專家」。\n\
    \n食髓知味，為了想念這個藍色的平靜，我願意再次開課，而且一教就教了二十多年。\n\n所有的靈性商品或行業都像是另一種宗教，新興宗教。當然，不管是賣心靈、賣課程、賣產品，領導人的風格自然是一個企業系統的靈魂關鍵，彩油也不例外。而在心靈的世界，投入的人大多是心靈脆弱者，想找到依靠。因此，在缺愛、缺錢或缺性的世界中，也容易形成另一種宗教團體的崇拜。但在這樣的世界中，也不乏充斥著金錢和性愛的醜聞與曖昧。\n\
    \n帶著神聖崇高的崇拜心，依著靈學老先生的指引，再加上佛教徒修練的培養，令我對於老師十分尊敬。由於無形的世界優先來到，然後才是人性的世界，所以我不疑有他，認真而專心的為了「使命」而前進，無所畏懼。\n\
    \n當一個人沒有私心，只是為了像是世界和平、土地寧靜，或是人心和諧有愛等，為這些目標奮鬥，而無所懷疑時，是最幸福的時刻。我的二十年幾乎是在這樣毫無懷疑的情況下努力的，所以成功很快，賺錢不少，一切都來得非常容易。我彷彿是以這樣的事業作為一輩子的終身目標，並樂此不疲。\n\
    \n本以爲就這樣一直持續下去，但人生的劇本就不是以永恆來安排的，而是以無常安排的。\n\n長久以來，凱洛老師和英國的彩油學校一直沒有良好的互動。這源自於她的一個學生剽竊了她的教學內容，創造了另一個課程；也和英國為了版權問題，還有商業制度上的不健全而有摩擦，有些成員是為了錢，而不是為了理想的狀態，她非常不以為然，卻是投訴無門。\n\
    \n彩油世界中老一輩的老師中，生活清苦貧窮的不在少數，因為他們必須依附著組織而生。如果國王不喜歡這個人，或是停止了產品或授權的供給，甚至禁止這個老師繼續教授組織的課程，這個老師就形同被切斷了生路。有大量的老師們依靠著這個組織，卻無力成為自己，只能依從權威的規範，像極了中古世紀的宗教權威。我曾經問過老師，為什麼不去爭取或抗議？有的，但抗議無效，於是凱洛老師和組織愈走愈遠。\n\
    \n她的生活清苦，我是明白的。我一方面心疼老師，又不能理解為什麼一個賺錢的大組織，為什麼不能好好照顧那些曾經為你奉獻青春的開國元老？這樣的故事一直重演，許多老一輩的老師，都因為無力再交錢給組織而被迫退出。去年，我的一位英國老師，也面臨了這樣的困境。老師們被組織「退出」後，都面臨了生存的問題。我在兩年前曾提醒過這位老師，去年當他寫信來希望我為他辦課程時，我還提醒他，要成為自己，不是賣瓶瓶罐罐的，不自由的人。可惜我們都是經歷了二十年時光才明白。換個角度想，我們可能都沉溺在某種宗教情懷中，而忘了這是個商業世界。\n\
    \n遺憾的是，在我所有輔導的賺大錢企業中，最大的問題往往出自領導者。像是某些金融或直銷行業，老闆見到錢多了，立刻改變了當初的發心。人的貪心和傲慢往往是改變的關鍵，身心靈的商業國度中，崇拜多了，卻不再自我覺察，甚至依然堅持內心缺愛的舊有創傷，忘了療癒的初衷，這樣仍然會掉回到老路上。舊有的模式不斷重演，人們的貪心與爭奪不斷發生，而身心靈的考驗更為殘酷，因為賣的就是人性和夢想。\n\
    \n能量的世界更是如此。二〇一〇年，在中國工作的經驗中，在我的盲從和執念背後，我開始意識到一個現象。就算做的是希望幫助眾人身心靈和諧的工作，但一掉入了一個大市場，面對一堆金錢，如果不是修行人，可能也會掉入這殘酷的大染缸中。果不其然，所有的外國人到了中國似乎都瘋了，因為中國市場很大，中國的商人也很能畫大餅，如果沒有把持住自己的心念，貪欲的力量往往容易令人迷失。\n\
    \n我的偶像世界開始崩塌，就像塔羅牌中的高塔。一直以為在安全生存的高塔中，便是安全的，殊不知，當高塔形成了我們和世界的鴻溝，也將令我們不再感知到這個世界的公平正義與光明的愛。這種隔絕，像是塔羅牌中的死亡牌，會讓人靈魂黑暗，見不到光明。\n\
    \n於是，我的生命中又出現了一堆阻力，開始阻止我走在這條自以為已經鋪好的道路上。就像當年被摧毀一切道路一樣，我又得開始調整腳步，重新出發。\n\n依戀父母的孩子，往往是依賴習慣了。彩油早期的工作者，像凱洛老師他們，都是經濟上不富裕的一群人，我常常仗義要為老師們開課，然後供養金錢給他們。因為我感覺自己好像是個很好的橋樑，只要這些有靈魂能力、卻無助的靈性工作者找上我，我都願意付出心力，為他們創造一條物質的道路。就這樣，不少外國老師找上我，我也為他們創造了金錢的機會。\n\
    \n但是，畢竟這些人不是修行人。記得在我自己覺得走上困境時，一位彩油老師竟然毫不留情。不僅繼續要收錢，完全無視於我的困境，還和我的學生聯合起來，想找其他的跳板繼續在臺灣工作。\n\
    \n第一次，我忽然明白，原來我活得很不落地，一直為了理想奮鬥，卻不理解人心與人性。但我沒有多說，因為我知道金錢物質的困境是人生的底線，除了修行人的清高可以看清，大多數人無法走出這樣的糾結與掙扎。\n\
    \n人在面臨生存恐懼的表現，是出於自衛，不是意圖。我自己不也是這樣？長年在身心靈機構，卻一直被同組織的同業鬥爭的環境，讓人無法自拔的只能奉承（非奉獻）組織。最後一次到英國學校時，我見到很多黑色的力量圍繞著。我知道，那應該是我最後一次來這裡了。就這樣，我意識到該走自己的道路，而不能再盲從了。因為我很受不了每個國家都因為這一個產品，而使自己人反目，甚至爭奪，又互相陷害。這樣為了錢而工作，失去了靈性的意義，爭到了代理權又如何呢？\n\
    \n我的失望在於，如果不能促進世界的美好，只是用美好吸引人心的欲望和虛假，卻使我們的心逐漸失落，那就不是我真心想要的境界。\n\n很多的智慧不是上一兩天的課程就可以獲得的，更多的體悟是在成為治療師之後才會有收穫。我多虧了入行早，年紀輕輕就一頭栽進了這個奇幻的國度。很多小時候的靈性功能，全是在工作中逐漸恢復，甚至更為擴大。另一方面，也或許我已經走過那一段道路，所以，畢業了，可以放手了。\n\
    \nLove My Own Way（愛上自己的道路），我的心開始出現這幾個字句，也開始準備有勇氣跳出依賴的窠臼，走上自己追尋的真理之路。\n\n![核心體悟\
    \ Core Enlightenment](img/2165f73db991986bac0992a95b4cd001_135_0.png)\n\n如果你看過哈利波特《鳳凰會的密令》這部小說或電影，你可能印象深刻的是哈利波特和黑暗勢力的競爭。最後一次去英國學校，我是生病回來的。當時的掙扎，就是這樣的心境。我開始感受到自己的內在，也在被同化為一種黑暗的力量（像是欲望）。但是，似乎我內心排斥的同時，自己竟然好像也有這一面。\n\
    \n一直記得那個場景，完全是一個背叛的場景。我的老師聯合了我的學生，然後出現在我的面前，令我尷尬的必須接受眼前的難堪。我天生痛恨背叛與欺瞞，卻在面對時完全無招架之力，不知道如何面對信任的老師和學生聯合上演的一齣戲碼。\n\
    \n我反觀自己，外在的背叛，或許只是呈現我的內心也早已背叛了。記不清楚那時的情節，但依稀記得情緒上的強烈波動。\n\n當哈利波特在掙扎對抗自己內在的黑暗勢力時，像是憤怒、仇恨、想殺死對方，校長鄧不利多告訴他：「重點不在你們的相似處（負面），而是你們的不同處（愛）。」這對當時掙扎快陷入昏迷的哈利波特來說，實在辛苦。但我想鄧不利多點出了一個重點，就是對抗我們的「軟弱」。\n\
    \n我覺得沒有老師、學生的支持，心裡很孤單困苦。但我面對這種變化時也在反思，我有什麼？我想要什麼？看不慣療癒機構不去療癒眾人，卻不斷在製造紛爭；已經努力建議過，卻無力改變時，我要繼續這樣活著，還是有所選擇？\n\
    \n我不想關注我們共同擁有的執念和欲望，但我真心想關注在擁有的共好與和諧。曾經，我也在信守遊戲規則下，創造了他人的不快樂與爭奪。現在我想想，就算我爭到了，又如何呢？\n\
    \n花了幾年時間，我建立起自己的品牌，也釋出友善，不希望與之為敵。也逐漸發展出另一種整頓貪欲與思維混亂的能量思維斷捨離——「雜念管理」。有趣的是，就在這個時候，英國發出了極不友善的郵件給我的執行長，因為我，我的學生們都是彩油的信徒。但這一次，這個宗教組織要剷除異己了。\n\
    \n五年前，我的心中早已做好準備，但我的學生們放不下。沒有親近核心，總是心存幻想。這次，連親自在其中交涉的執行長，都感受到一股「殺氣」。執行長沒有辦法想像，這個美好的面具背後的真相，仍然想停留在虛假的美好中。而這一次，我依然說著五年來沒有停止的勸告：「覺醒吧！做自己才是最棒的禮物。」\n\
    \n於是我們對外公告，並且立刻清理掉所有的剩餘產品。向過去說再見，最難的是情緒和一種深深的依戀。我理解我的團隊及學生們的難過，大家依依不捨地和相處了二十年的產品說再見。但是，分離，只是一種因緣的結束，卻不代表我們過去沒有美好，這是靈魂深處的記憶，也是一種歷練。時間到了，就繼續向前流動。生命是需要向前流動，才能體現美好的精神。我們早已領教過那些非靈性的行為，但那也教會我們，當我們自己的團隊組織做大時，我們可免於犯下同樣的過錯。我們，帶著過去的禮物，向前開拓了新的局面。「成住壞空」，當年靈學老先生提醒的，如今呈現眼前。\n\
    \n我開發最簡單、卻立即有效的雜念管理法，也許可以為紛亂的你，找到意識清晰的最簡單方法。雜念管理的三步驟：\n\n- 第一步：接受，了解心理動機（所有的行為都有背後的動機）。\n\
    - 第二步：放下，透過放下信念（了解之後才能放下）。\n- 第三步：原諒，原諒行為模式（放下之後就能原諒）。\n\n我們以高階治療師茹絲的真實案例，來套用雜念管理的三步驟：\n\
    \n**第一步，接受。**\n\n在課程中，身體不舒服的茹絲先接受自己身體失去力氣的現況，並開始探索自己身體背後的心理動機為何？茹絲意識到，她好不容易抽出時間來進修，眼見同學們都認真的學習，並且馬上有所體悟，但她的身體竟然開始不聽使喚。她一方面氣自己的不爭氣（我怎麼可以有這樣的反應），也很著急自己「跟不上」。愈急，身體就愈無力，怎麼辦？\n\
    \n既然抗拒讓我們無法進入改變的情況中，那麼就接受吧。\n\n**第二步，放下。**\n\n茹絲理解到，她內在極大的自我，產生了對自己的批判，同時也令自己不願意走進課堂中，以免自己失敗，被同學比了下去，證明自己的不夠聰明（以往她是不必太用心，也不用花時間，就可以輕而易舉的學會任何技巧，讀懂任何知識）。今天，茹絲需要放下自己過去的傲慢，而因為理解了，所以也就放下了。她自己也笑自己：「一直認為自己的基因很好。」\n\
    \n## 自我療癒\n\n## 雜念管理"
