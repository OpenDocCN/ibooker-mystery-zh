    # Chapter 5. 夢中的學習之旅


    第一次真的認真的夢,並且從夢中學習到如何修練,其實不是一個愉快的經驗。以前一想起來就想哭;二十年後,我才能不帶情緒地對人談起這段經歷,我才能感恩地說出這段往事。


    那第一次的不愉快夢境體驗,差點毀了我的身心靈之路。我常常無法理解,為什麼會有這些奇怪的事情發生?


    那是最長的一場夢境,大約歷時了三年。這三年,也是我正式進入身心靈領域的決定關鍵。


