    ## Part 10 心與物質的生存考驗


    愛上高人，愛上別人，愛上師父，都比較容易，因為可以把自己推給他人，不必為自己負責。而要愛上自己，真的很不容易，特別是為自己的人生找到道路，為自己的道路找到信仰。


    有時候就是一直鬼打牆，感覺就像在弟弟的醫院中，一直鬼打牆找不到光明的出口，我渴望那個可以在我背後拍一下，把我換回的「醫生」可以出現。但現實生活中，往往所寄託的人常常令我失望。


    再一次的，我的西方師父，我視之如父（一日為師，終生為父）的師父，因為市場競爭和他人的閒言閒語，對我除了懷疑與批判，還是懷疑與批判。為什麼人喜歡聽負面的八卦，喜歡聽信攻擊他人的言論，不用心靈的眼睛看真相呢？我一直不能明白這個情境，我以爲我崇拜的師父很高的，甚至不用言語，他應該就能明白我的真心呀？後來我挫敗的發現，原來這些高人也還是平凡的人，如果沒有修行後的慈悲心，沒有心相續的正念培養，是無法理解他人的本質。我對於老師的期待，正如同我對於父母過高的期待與失望一樣。我總有著高標準的期許，希望他們與眾不同，高人一等。在精神分析的學習中，這讓我看到了自己的執著——堅持希望他們與眾不同的期待。


    逐漸的，命運也推動著我，愈是不開心，就愈經歷淬煉，似乎靈魂就會飛得就愈高。這個經驗仿若「靈魂的暗夜」，我卻很難接受。


    當我們需要改變時，改變的關鍵就是「創造空間」，像是化繭成蝶的過程，一定有疼痛、有掙扎，並且需要時間的淬煉，在三度的地球空間中，直到我們跳脫線性思維，離開原有的空間，這像是有時候我們需要換個工作，搬個家，換個愛人，才能有所轉化。否則，就需透過時間慢慢淬煉和代換這一切，而等我們明白之後，我們也已經老了。不過，靈魂的暗夜會很快地發酵，促使我們必須變化。


    從二十多歲開始，我就一直在研究「如何可以快速化解業力」、「如何可以療癒並且不再輪迴」，而我深信，我們是有方法可以支持這種轉化的。但這種轉化，竟然不是靈性師父，也不是靈性產品，更不是愛人或家人。而是信念的破除。


    > ※


    對我來說，逐漸從治療師成為指引他人方向的生命教練，成為一堂課程上百人的靈性導師，如果我無法思索出邏輯，有深刻的體悟，並且可以落地實現，那麼，我就無法誠實地站在舞臺上，告訴大家這是宇宙的真理。我無法只由書本中學習，靈學老先生告訴我要謹言慎行，我一直謹記在心，但太過於在意，卻又過於嚴肅地活著，無法跳回我本性中可愛快樂的一面。所以，每個階段我都在尋找平衡。


    我在加拿大的一間大型美容連鎖會所中，為他們的客戶施行能量平衡術時，忽然明白到：佛陀就活在基督的身體之中！不論基督或佛陀，都是我們的一部分呀！


    接受療癒的華人，許多人沒有著宗教信仰，甚至，也許唯一的信仰就是金錢。但是，客戶卻在療癒後分享告訴我，天使在按摩他們的雙腿，也感受到基督，感受到佛陀，甚至一位女士同時覺得基督力量在腳部，佛陀能量在頭部。這些我一直沒有說出的內心祕密，竟然被不知情、只是純調整身體健康的客戶解答了出來。


    一連串的回饋讓我終於明白，「沒有分別」是何等的重要。


    眾人尋求的內心力量，多是想透過外在世界反射回內心，我們對自己愈無力，就愈想在外面的世界中找到力量。於是投射我們的心念給神明，或是其他更高明的人，然後短暫的以為自己重新找回力量。如果一直有這樣的依靠，那這個人真的很有福氣，肯定是幸運的。


    何其幸運，也何其不幸，我連依靠的機會都逐漸喪失。我不明白老天的安排是什麼？每當我想依靠時，就會失去，親人、光環、金錢、名聲、情感、朋友，我想依靠什麼，什麼就會莫名的失去，這彷彿成了我的詛咒。對於一個給人快樂光明、具有天命的人來說，不是很弔詭嗎？


    我唯一能做的，就是在和自己長年相處中，陪伴自己面對痛苦和失望。沒有人可以傾訴，也沒有人可以真的代你受過，陪伴在身邊。然而，不管有沒有人在身邊，那都是外在的力量。


    真正陪伴自己的，只有自己。真正陪伴自己身體的，只有靈魂；而真正陪伴自己靈魂的，只有身體。和自己結婚，和自己談戀愛，逐漸成了我可以快樂的事情。我不孤獨，我做了精神導師該做好的事，不再只受攻擊，也幫助了一些人，並且這些人圍繞著我充滿感謝。只是我依然寂寞，因為所有的一切還是無法依賴，我還是只能自己幫助自己，想辦法陪伴自己。


    愛上自己，愛上自己的道路（Love my own way），遂成了我們這群人的寫照，也成了我們的口號與實踐。不論外界如何不看好我們，攻擊我們，甚至聚眾想打擊我們，我們依然只能默默地如苦行僧，用盡可能平衡我們的心，來看待同時存在的心靈與物質世界。


    因為我們同時活在靈魂（心靈，無形）與身體（物質，有形）的世界中，不可能分開，也必須一直綁在一起，直到生命的盡頭現前。


    愛上自己的一切，包括美好的，更包括醜陋的；愛上自己所選擇的道路，包括成功的，也包括失敗的。在每一次的生命十字路口，我看到大家都已經在當時盡力了，不管是我自己，或是那些與我對立的人們。我心中開始有一種聲音：「大家都已經盡力了。」所以，我無法再去苛責那些令人不快樂的人，因為他在當時也為自己做了最好選擇。或許他會道歉，或許他會生氣很久，但他已盡力了。


    憤怒是大多數人最喜歡帶在身上的力量，有了憤怒，彷彿就有了全新的生命。沒有了憤怒，只存在愛和光裡，有可能顯得軟弱，而我們並不想讓自己有軟弱的一面，所以會持續投射憤怒給這個世界，或是聚集更多憤怒的力量，來摧毀他人，以為這樣的摧毀，自己才能永生。


    這種二元論，我一直以為不會存在於身心靈界，因為我認為，只有萬惡的金錢世界中那些生意人，才會有這種思維。我或許高估了這個世界的人群，因為大家本來就生活在一個金錢的世界裡，沒有一天例外。我怎麼會如同一個不肯長大的小孩，只想看到自己想看的呢？


    於是我發現，原來自己帶了有色眼鏡不肯摘除。虧自己還教色彩學，結果自己是染色最多、最執著的一個。


    具有HSP高功能，就代表更應該可以穿越這一切，但《心經》中所說的「色不異空，空不異色」，卻反而無法參透理解，所以，所見的根本不是真實的色彩，所聽的也不是真正的聲音，直到能夠愛上真實的自己，那個赤裸裸的自己，才能真切的感受到這個有熱有冷、有高有低的世界。


    漫畫家蔡志忠這幾年住在杭州，在他的創作世界中，曾經提到一個和能量界極為相近的概念來形容他的工作：停留在高處。


    「小鳥對長頸鹿說，雖然你長得很高，但我會飛。」


    一歲開始讀《聖經》的蔡志忠，其富於禪味的漫畫，就是走出了他自己的道路。有時候能量療癒工作就是一種創作概念，你很難只拘泥在一種狀態裡，因為人的問題千變萬化，人的能量也是靈活的變動著，如果只想停留在一種狀態裡，那是不可能的。就像四季的變化，你不可能只停留在一秒鐘裡，除非死亡了，沒有能量，否則每分每秒都在變動，很難保持完全的一致。


    因此，爬到巔峰就馬上會下來。反映到我自己，我每次打勝仗，或是成功完成一個活動，做完一場療癒，寫完一本書，把一個學生點醒，但之後呢？


    所以，蔡志忠說：「想辦法上去高原，一生永遠不下來。」這種能量境界，我想是所有成功的高人都一樣的想法吧！對我來說，如果每天在心靈上沒有進步，我就會很焦慮，彷彿已經落下來。


    曾經在北京時，我的一個學生問我，為什麼我總能保持心情的愉悅？因為每次學生跟著我去演講，擔任助手時，回來時常感覺疲憊，但見到我卻總是可以保有光彩或是快速復原。她很疑惑，累的應該是我，為什麼反而她感覺比較累？因為她十五歲的女兒也可以見到色彩能量光，所以她的女兒說：「因為上官老師內心是光明的，當外面髒的能量靠近時，她只需要洗乾淨外在就可以恢復乾淨。可是媽媽你正好相反，你的內在是黑暗的，所以一沾到外界的黑暗，就會吸收進去，更形黑暗。」


    學生的女兒解答了她的疑惑，也給了解答。我總以為是自己會善用能量工具，所以可以常保能量清新。後來才明白，原來如果只會在外在塗抹，是抹不出內心的光明，充其量只是添加了更多的色彩，甚至最後變成黑色，可能形成更為強大的執著；但如果內心如水晶般澄澈，那外在不論遇到什麼樣的色彩，都可以回到內在恢復澄澈光明。


    我很驚訝一個九〇後小孩的表達竟能如此清晰。後來在指導這孩子時，她天生對於生物科技有興趣，便鼓勵孩子到美國深造，專攻生物細胞科技。


    我對水晶小孩與靛藍小孩等特殊的孩子，特別有吸引力，因為他們很乾淨，也知道什麼是光明本質。我很榮幸，一直以來帶領過不少這類孩子，因為他們總能看出自己父母的黑暗特性，所以經常對人生感到茫然，但對我卻能夠完整連結與接受，所以我也很榮幸的能與他們相處愉快，並且可以在他們的人生中給予指導，圓滿其今生的使命，也圓滿與父母家族的關係修復。


    所以，我也愈來愈喜歡自己了。本來一直為著無法達到父母的期待而耿耿於懷，也因為無法給予父母優渥的經濟生活，或是嫁入豪門，或是擁有金飯碗而感到愧對父母的恩情。但是，年歲愈增長，所進行的能量工作愈多，我就愈能明白：如果無法愛上自己，無法欣賞自己，總是取悅他人，做出他人眼中的自己，那麼，把取悅父母移情到取悅師長、取悅老闆、取悅高層的權威人士，能量狀態還是一樣的。我還是沒有真正的愛上自己，而是愛上別人眼中、心中的自己。


    很遺憾的，我一直無法滿足我想取悅的這些人群，所以，我只好被迫的「成為我自己」，為自己找到一條路。而我走向的道路，卻成為一些同類人的示範，我的努力和認真，贏得了那些也渴望走出自己道路的人們的心。雖然我身為女性渴望的一切未曾圓滿，但我卻成功的示範另一種人生，也是很美滿的。這樣的我，怎能不受疼愛？怎能不感恩呢？


    漠視或逃避問題時，真正掩埋的是我們持續學習、成長、改變與療癒的力量；而唯一能安然度過問題的方式，只能是勇於面對。


    生活一直都是苦樂交融的，即使是在痛苦艱難的處境下，依然有著療癒的機會和力量。對我來說，能面對痛苦，就像是可以更深刻地體悟深層美好的一面。如果沒有經歷痛苦和折磨，便無法深入地明白快樂，還有生命的本質。我一直被迫地去面對生命的課題，但我也小心地不想跳入任何痛苦當中，因為見多了吧？


    但是，生命的劇本並不是這樣寫的，學習如何和自己的痛苦和平相處，這樣才能有機會提升。曾聽過有同學告訴我的團隊執行長說：「為什麼上官老師每次遇到困難，不但沒有被打倒，反而愈發強大？」我一直以為這是天蠍座的強大特質，但我也認同，這是天蠍座本身具有的自我療癒力，只是我並不滿足於只是奮發圖強，力爭上游。因為我們真的要做的，不是逃離痛苦，或是活得比敵人更好，我們需要的是，認同生命的本質就是痛苦。如果可以包容這樣的特質，或許我們的高能量才能啟動；如果只活在公主般的世界裡，或舞臺上眾人擁戴的光環下，都免不了要承受下了舞臺或離開各種掌聲與甜蜜恭維後的失落感。


    每經過一次挫折，我體會到的是：如果任由自己在暴風中隨波逐流，失去生命的希望，不如讓這些暴風雨來教我更多面對暴風雨的療癒方式。久而久之，我就忘了挫敗的痛苦，反而忍不住一直研究如何更上層樓。我的心中逐漸充滿正念，減少了停留在挫敗和痛苦的思維及情緒中；我的想法愈來愈趨近於「正能量」，並且每次都藉由失敗經驗，來研究下一次的成功模式。


    就這樣，我不斷修正自己內心的問題與行為模式，也成功地將自己的事業與接手的商業顧問模式一一改善。這些透過能量感知力來提高的生活方式，我樂此不疲，也喜歡上自己的功能和事業。不再逃離人群，相反的，更喜歡靠近人群，並且喜歡賺錢的滋味。


    逐漸的，我不覺得自己的生命有太多遺憾，因為遺憾已經發生，但也不表示未來還要繼續創造遺憾。我嘗試把自己心中的遺憾轉化成為有用的素材，像是幫助更多年輕人創業和選擇人生方向（因為失去了我一直輔導的弟弟），然後我也開始更關懷老人的照料和靈性提升（因為爸爸也提前上天堂了），其次，我參與了家庭教育的公益講座，並開發了幸福家庭的研究與課程（因為我沒有自己的家庭）；我更幫助了許多愛情關係的成功（因為我沒有自己的愛情關係），我也培養了許多有意願走入這個行業的人（因為我一直還在努力成長中）。透過所有的遺憾，我的正念把遺憾變成了不遺憾，變成了快樂的成就感。


    身陷暴風圈中，其實被吹得亂七八糟的心，想找個避風港都來不及了，哪還有心力去提升？這是大多數人所面臨的困境。


    要想遠離暴風圈，不需要很費力的脫離這個圈子，而是跳進去！跳進去嗎？不要懷疑，就是一「毫無疑惑的跳下去」。


    愈進入暴風圈，愈能走出一條正念之路，這在療癒科學的方式，叫做「stay」（停留）。當你痛苦時，不要急著跳出來，進入，然後，停留。就把心停留在那個暴風雨的流淚混亂中。當你認真的、不費力地只是停留在那個暴風圈中，忽然間你會發現，這就是所謂的「颱風眼」。站在颱風眼中，龍捲風的核心中，你反而會很平靜，根本不會有任何的痛苦和混亂。


    當你靜靜地置身在暴風圈中，感受到心裡的平靜時，那你就等於找到了正念提升的鑰匙，可以以勇敢的打開大門，有力量地走出這個混亂區域了。


    步驟很簡單：


    1. 體會痛苦不要離開。

    2. 進入痛苦一直停留。

    3. 繼續停留不要離開。

    4. 發現耐心可以安住。

    5. 培養耐心體會痛苦。

    6. 發現痛苦不再疼痛。

    7. 感覺開始有心觀察。

    8. 發現痛苦不再存在。

    9. 心感覺平靜無波浪。

    10. 正念的苗開始滋長。


    之後，你知道的，正念的幼苗開始滋長，你的想法與行為將開始改變，你的情緒會莫名其妙地被帶離暴風圈現場，毫不費力的，你就成功轉換自己的能量了。這是我的心得，提供給聰明的你參考與實踐。


