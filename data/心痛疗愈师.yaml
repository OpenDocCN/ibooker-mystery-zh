    ## Chapter 16. 走進西藏、不丹和印度


    每個人也都在尋找生存的價值與存在的意義，因此，身體需要更高的意識，才能更為無私的成為公器，為天地所用。


    從很小時我就知道，自己不太適應東方的世界。小時候，我的飲食習慣就與家人不同。母親覺得小小年紀的我怎麼習慣和西方人一樣？喜歡的飲食永遠不像北方人的爸爸喜歡麵食，也不像南方長大的媽媽喜歡米飯。母親隱約覺得這個小孩很奇怪，但也莫可奈何，因為這孩子很有主見。


    小學三年級，我要求母親帶我去學游泳，我的理由是：因為我怕再被淹死。


    母親因為我這個理由驚恐了很久，她無法回應這種學習的動機，只能默默的帶我去學游泳，而我心裡的目标，竟然也是為了「預防有一天再溺水」。但是，哪怕我的游泳教練是國家選手，也是國家級教練，每次跳入水中，我依然有種「溺水」的恐懼。


    年長後，一次聽母親提起，我才暗自驚訝於這種童年的回應，我從未向母親提及我的恐懼，為何我努力學游泳。高中時，我曾經在游泳課救起一位溺水的同學，但對我來說，我還是會充滿驚恐但純熟的在水中游泳。母親對我的童年反應實在不願多想，只是覺得這孩子很奇怪。


    其實我的母親不知道，她自己本身就是特殊體質，只是有太多的人性思維限制，所以她已經遺忘了自己，卻遺傳給我這種特殊體質，並且需要修行，以療癒這場關係。


    正因為今生是東方人，所以必然有著需要喚醒的理由。因此，當我遇見西藏的師父們時，我開始逐漸恢復了記憶。


    第一次登上西藏的高山時，我坐在車裡，卻彷彿見到了另一個我騎著馬的畫面。這種類似的畫面也曾出現在泰國、印度。只是物換星移，從一個宗教信仰到了另一個，不變的卻是在方寸之間，依然在找尋著宇宙真理與和諧之道。


    我總覺得，因為心性的執著，所以我沒有提高太多能量階級，所以仍然在追尋著，這好像是撒旦的故事一樣。撒旦本是天使路西佛，被上帝推回人間來帶領人類，但路西佛瞧不起那些兩隻腳的低等生物，卻因為由天堂摔到人間時，把帶有十三顆翠綠之心寶石的皇冠給遺落了。所以，在路西佛找回寶石皇冠前，祂仍需要在人間追尋。而這十三顆翠綠之心整合的那天，就是人類找到回天國之路的日子。


    東西方的神話故事常常閱讀起來很驚悚，因為我內心早有類似體悟，所以一看到這同樣的內容時，總是驚訝於生命的奇妙。未知的我們似乎已經是已知，但為什麼已知的我們卻依然未知呢？


    當我不斷有這些疑問時，我接觸到了藏傳佛教的一些高人，並開始了我的追星之旅，而且這一追就是十年。我沒有迷過明星，卻會因為一位全球知名、英語流利的聰明上師——宗薩欽哲仁波切，而成為追星族。連我的根本上師都知道，每次宗薩仁波切到臺灣，我都會剪報紙來收藏，而且不僅每場活動必到，有一次還衝上前去，硬是請仁波切簽名在我的《金剛經》法本上。


    根本上師常常譏笑我：「發心動機要正確呀！又去追你的偶像了嗎？」我常常覺得自己很可笑，因為我喜歡聰明人，聰明又幽默是智者，不喜歡愚笨或僵化的人。所以相對的，我眼見一個比我還聰明的人，就會非常著迷。


    我發現這些有修行力的導師，都會有優點讓我著迷。像是根本上師，未曾學過電器與電腦，但總是在專心很短的時間後，就全部精通。我經歷過幾次這樣的近身觀察後，終於有一天向上師提出請求：「你可不可以教我，像你一樣聰明？」


    上師說：「可以呀，你努力唸文殊咒就可以了。」


    我很挫折，因為我已經好幾十歲了，哪能比得上那些從小就開始念經的人腦呢？但我還是很努力，希望可以勤能補拙，渴望終有一天能像師父一樣聰明。我發現自己的腦海中，根本沒有結婚生子的想法，而是一直不斷追求著這種境界，就這樣匆匆一晃，十年就過去了。然而，雖然我非常喜歡這些高能量，但只要能量一蛻變，我就立即得轉換場景，去到下一個學習場域中，絲毫不浪費生命。


    去西藏的幾次，除了前兩次是跟著上師前進，之後就是我也成了師父，帶領學生到西藏，上心性療癒課程。從第一次前往，我就覺得似曾相識，完全沒有不適感，就像是回老家一樣。記得在西藏開課時，到最後連藏族導遊都叫我師父，甚至最後也去佛學院進修了，我的影響功不可沒。


    > 如同基督的靈魂進入佛陀的身體中，人的肉身需要光明意識。當光明進入到身體，人就會覺醒；一旦覺醒，便可以有更大的奉獻力量。另外，每個人也都在尋找生存的價值與存在的意義，因此，身體需要更高的意識，才能更為無私的成為公器，為天地所用。'
