  md: '# Chapter 15. 愛上自己的道路


    身陷暴風圈中，其實被吹得亂七八糟的心，想找個避風港都來不及了，哪還有心力去提升？這是大多數人所面臨的困境。


    要想遠離暴風圈，不需要很費力的脫離這個圈子，而是跳進去！跳進去嗎？不要懷疑，就是一「毫無疑惑的跳下去」。


    愈進入暴風圈，愈能走出一條正念之路，這在療癒科學的方式，叫做「stay」（停留）。當你痛苦時，不要急著跳出來，進入，然後，停留。就把心停留在那個暴風雨的流淚混亂中。當你認真的、不費力地只是停留在那個暴風圈中，忽然間你會發現，這就是所謂的「颱風眼」。站在颱風眼中，龍捲風的核心中，你反而會很平靜，根本不會有任何的痛苦和混亂。


    當你靜靜地置身在暴風圈中，感受到心裡的平靜時，那你就等於找到了正念提升的鑰匙，可以以勇敢的打開大門，有力量地走出這個混亂區域了。


