    ## Chapter 22


    ## 愛和恐懼不會同時存在


    人們往往被生存恐懼抓住時，是跳不出原來的池塘的。直到具備智慧，不再被生存這底層的關卡所綑綁時，才能縱身一躍，飄浮到更高的次元。


    「愛和恐懼不會同時存在」，這是一句老生常談的話，特別在身心靈世界中，已經被說爛了。但是，總是會在守護潛意識的大門沒關好時，恐懼就會偷偷跑出來。一般當我們覺得一切順利時，是不會感到恐懼的。但是，一旦感到脆弱、面臨考驗時，或是最低的生存安全受到挑戰，感受到危險時，恐懼便會油然而生。在這時候，你如果依然有愛，就能夠知道自己不會有恐懼。


    當我們決定要向二十年來依賴的色彩產品說再見時，最先受到驚嚇的是執行長，然後是核心團隊的震撼。但其实這個念頭，早在七年前就已經成立，歷經了五年，甚至更久的時間，才真的實現。我告訴執行長：「愛和恐懼不會同時存在。」


    「又是一句高深的身心靈唬弄口號！」我心裡這樣想，執行長會不會也在心中這樣吶喊著？一句很高卻不落地、不切實際的回覆，也聽不懂葫蘆賣什麼藥。執行長雖然已經跟隨我十年，近幾年開始接手兩岸三地的經營事業，但卻是我想轉型之後的執行長。


    過去莫名其妙地和前面的助理斷了不止一次，通常是在能量等級不同時，就會出現這樣的情況。我常常在課堂中比喻，這就像是一對夫妻或戀人，當相愛的心已經失去，其中一人一直在進步，另一個停滯不前時，就會產生能量上的裂變。這時候，如果雙方經過深度的溝通後，決定希望能攜手走下去，那麼，就可以協商如何共同努力，一起提升，因為這時候還有愛的存在，還有渴望合作，而不是競爭的內在動機。


    但是，如果已經貌合神離，甚至已經互相無法再相處在一起，彼此的人生觀早已無法同行，這時相處在一起就會產生摩擦和痛苦。這種磨合和痛苦是無法容忍的，這時候的靈魂功課也已經改變，大家得為自己選擇下一個新的人生方向，分離分手就是需要的成長。


    小夥伴們仍依依不捨，放不下已經長期使用且有感情的產品。然而，如果沒有更深的進步，或是無法進入到更深的喜悅中，無法有成長的感覺，那便只是一種習慣罷了。


    深談之後才發現，敏銳的執行長早已經嗅到這股改變的力量，並且也嗅到如果夫妻相處，一方不能成長，或雙方無法達到共識，就像商業夥伴或商業合作案，是無法順利發展下去的。身為兩岸企業家的下一代，並且也掌管著家族產業的她，心裡是雪亮明白的。但是，就因為有愛，有情，我明白多情的團隊們總是希望抓住幸福的尾巴，哪怕是短暫的，也想抓住美麗的虛幻。


    ※


    終於，到了要說再見的時候了。一方面天象如此，一方面是如果內心不放下舊的能量，就不會有新的力量出現。我們內在的同一個空間裡，是無法容下兩種不同的頻率，不可能一方面死命地抓著恐懼和舊有的負能量，一方面又想要幸福快樂的往前擁有新事物。就像一對男女的分手，除了表面分手，心裡也要分手，要真實的分手，並且不帶有情緒的分開，這才是高明人的做法。因此，分手或分離，或是死亡，都是一種快樂。


    知道時間到該放下了，就不需要遲疑。很多人臨死前，滿心的掙扎，充滿了不甘願，不想放手，這種到了終結時候的不灑脫，我常常覺得才是人生的一大歹戲拖棚，也是在最後光榮戰績上的一個敗筆。五年前，我和我的團隊都還沒準備好，也試圖修復關係。不過，如果夫妻雙方只有一方想復合，另一方已經有小三，並且渴望離婚，沒有同心同德、貫徹始終的心念，要復合恐怕就有點辛苦了。


    我開始走入愛上自己的道路，不是愛上產品，也不是愛上師父，更不是愛上金錢的豐厚，我只想重新找回自己。於是，我開始獨自上路去發展，團隊則依然做著喜歡的色彩療癒，而這一拖，就是五年。跟了我多年的團隊小夥伴，在堅持著他們對身心靈與身心靈產業的夢想，而我早已經走出來看著他們。因此，我成立了美麗藝術會所的平臺，給我的學生們去做練習。


    其實，我不太像老師，倒像是個功德主。我投資的地方沒有賺錢，反而一直貼錢，不過我的信念是，如果從事教育，就是要這樣培養弟子。但是，如今我走上愛自己的道路，反而錢變多了，人變輕鬆了，也不會在任何的人言誹短中恐懼和痛苦著。快樂又變美麗的我，走上愛上自己的道路，而且愈來愈勇敢，是因為心中沒有恐懼，只有愛。


    在我的人生中，我花了很多時間在說再見，向親人，向愛人，向我尊敬的師父，向那些不喜歡我的人。但是，當我很用力的努力想要逃離（當年逃到加拿大），或努力的想要分手時，都分不開，因為所有的用力，都還是一種緊密的連結，愈用力，就像拍打皮球一樣，反彈力就愈大。


    現在愈走愈美麗的我，心中充滿了美好的感覺與力量，這種陰與陽的力量在我內心逐漸交會，主動、被動和中和的三股能量逐漸匯聚在我的身體七輪中，三脈七輪的整合也在我穿梭於不同頻道與空間，和不同能量場域的族群相遇時，得到了提升。有時候進入某個場域，我被染色了，身體非常不舒服，也可能不被身旁的人所諒解，以為我利欲薰心。但如果本身有光明覺知的話，就會自動有種清理淨化的功能，然後透過覺知，可以逐漸清理乾淨。就這樣，我開始無所畏懼。


    我不必選擇待在一個自以為安全卻失去自由的地方，但我可以歷經淬煉依然澄澈。我通過許多染缸的考驗，最後發現，我仍然是那個純潔無瑕的我，多的歷練，只是讓我的光芒愈來愈穩定，力量也愈來愈無所畏懼。我發現，我可以不再依賴父親，不再依賴上師，不再依賴我的西方導師，我就是我。


    當滿心只有愛時，何來情緒？何來仇恨？何來痛苦？何來負面記憶？


    所有研究全腦與視覺開發的人都知道，人的長期記憶會蒙騙自己。我們的記憶中，仇恨和痛苦的故事會愈編寫愈精采，但我們往往會很容易忘記美好的過去。我試圖在愛回我自己的過程中，依然記得過去那些所有的美好，並且深深感激。


    臺灣電視上有一個閩南語發音的電玩廣告，是這樣說的：「不是你算沒有偏財，是你玩不對所在（請用閩南語發音會更順）。」於是，我開始想在對的地方，玩對的遊戲。我不想只停留在第三度空間，我的心識早已經跳離這平面的限制。


    人們往往被生存恐懼抓住時，是跳不出原來的池塘的。直到具備智慧，不再被生存這底層的關卡所綑綁時，才能縱身一躍，飄浮到更高的次元。


    電影《我的老爸喵星人》，描述一個很有錢的男人變成了一隻貓的有趣故事。我有時候覺得，這五年我就像這隻貓，說著不同的語言，卻得活在人話的空間中。但當我放下了恐懼和憤怒不平時，我就會重回肉身，得到重新的開始，充滿愛的生命。


    > ※


    要說再見不是一件容易的事，就像一對要離婚的男女，要處理龐大的財產分割，然後分別找到下一個住所，或是找到下一個春天？然而，在還沒有把上一段婚姻處理完前，恐怕下一段也很難開始吧？


    我知道分手不容易，但依據我輔導的心得，以及能量教育多年的經驗，我知道怨懟，或是拖泥帶水，回顧過往，甚至恐懼未來，都不是正確的處理方式。


    於是，很快的，我和執行長在兩天內決定了昭告廠商及學生的日期，定在一個月後，然後立即處理變賣所有商品，既然要分手，就不要拖泥帶水。


    不過，心懷感激是需要的。因為不相愛了，兩個好人，還是各自需要好好生活，沒有必要帶著過去的怨懟，繼續上演相互迫害與毀謗的芭樂劇。這是我和執行長的共同感受，在這幾年，我成功地培養了能量工作夥伴「共同感知」的橄欖綠能量，也就是「女性領導能力」的工作方式。我們會共同感覺，一起做決定，不再充滿上與下的權威關係。但在工作的流程上，執行長對我這個指導老師是絕對的敬意和尊重，令我深深的感受到，總算有充滿愛的夥伴出現了。


    這十年來，我見到當年那個恐懼又只會哭的小女生，現在竟然已經長大，又成熟得可以翻過身來療癒我。這種充滿愛的天使愈來愈多，而且圍繞在我的身邊，我不再孤單一人闖蕩江湖，也不再恐懼的想要保護自己，我有貼心的天使心在身邊，可以互相支持。很多快樂的事情我們開始一起分擔，很多痛苦的事情我們也一起分享，但沒有了沉重的情緒壓力，只有一起療癒，一起成長。


    亞太能量療癒線上移動講堂，也遇上了好的平臺老闆支持。初期以服務分享各地學員的延伸成長教育為宗旨，英國、美國、日本的能量老師們也都成了我的好夥伴，繼續一起扶持著進行我們一輩子都不會離開的人生志業——能量療癒。我心中美好的療癒國度，終於開始出現了雛形。


    ![](img/2165f73db991986bac0992a95b4cd001_263_0.png)


    Core Enlightenment


    我其實感覺很難過，在關於恐懼這件事情上。就在我決定結束經營多年的彩油事業後，我發現之前同期、甚至比我更早期的資深老師們，還有人依然陷入在生存困難的課題上；有的老師因為交不出繼續進修的學費，被迫放棄教學資格；有的老師因為沒有別的謀生技能，他們只會賣彩油，所以生活辛苦。他們想要靠近核心，卻像個不受寵的孩子，不管怎麼表現，就是被家長厭惡，得不到父母的歡心。


    其中一位老師寫信來告訴我困境，卻仍必須依賴著顏色瓶來教學，但其實自己已經失去教學的資格，卻無法獨立站起來。這位老師來問我的想法，並且希望一起繼續合作，我很明確地告訴對方，我的建議是「做自己」。因為我已經不再提供這個產品，所以要和我合作繼續賣油是不可能的了，除非提升，否則我不想走回頭路。


    對這些老師來說，與其苟活在這個處處被打壓、不受重視的系統中，到各地教學總是被禁止，去哪裡想做個活動也被通知違規（哪國的規定呢？大英國協嗎？），這樣的環境，不是能量人應該要有的生活態度。


    ## 自我療癒


    ## 成為勇敢的彩虹戰士


    在《聖經》中有著彩虹契約的故事，當年，我深深為著這樣的神聖契約而著迷。在十二至十四世紀時的歐洲，有一群到處旅行的表演者，被人稱為抒情詩人或吟遊詩人（troubador），他們透過到處演出，朗誦詩歌，演出戲劇或舞蹈，甚至神祕得像魔術般的表演，來傳遞他們所信仰的基督教神祕學，但這是被當時教會所反對的，於是他們透過這些藝術的方式，透過對眾人的服務來傳遞真相。而教會當權人士為了要防止這些人（也包括如聖殿騎士等）在法國南部的擴張，於是進行了宗教迫害。


    心的轉變是靈性的曙光。透過藝術的呈現，我們可以在感受和表達中找到自己生存的空間。


    > 我明白「恐懼」的底線就是生存，讓旗下的老師過得好，為什麼不能同步呢？如果要求上進，只要有好的管理，共好不是更好嗎？


    為什麼不以愛打破呢？我無法告訴那些老師們生存問題要如何解決，我只能告訴他們，有勇氣的去打破現狀，就是未來狀況好轉的開始。能量人士如果被限制在很窄的生存空間中，往往無法在自己生活的地方賺到足夠的錢，而必須四處去流浪，真的要這樣的生命軌跡嗎？我不以為然。恐懼太強大了，所以往往綁著我們無法行動，只能得過且過，這樣的過程，如果不能療癒自身，將無法掙脫這些綑綁，繼續打回原點，回到根源的階段，重新面對生存的考試。'
  mdcn: '## Chapter 21. 提高覺醒的全頻道能力


    ### 自我療癒 Color U 進化的道路


    禪宗裡有一則故事，是老和尚和小和尚的故事。老和尚在倒茶的時候，一直不停的倒著，小和尚說：「師父，水滿了。水灑出來了。」老和尚說的空杯之心，意思是，如果不把原來杯中的水倒出，如何可以盛入新的水呢？


    我的玄氣門氣功老師楊師父曾經告訴我，要有全新的力量，就要先捨棄全部。能量工作也是，不管是過去的負面經驗，或是過去的榮耀歷史，都已不復存在。因此，我們需要學會聆聽，聆聽內在和外在的聲音，聆聽高層的聲音，也要聆聽細小的恐懼之聲，然後放掉一切。


    我在加拿大的靈氣導師做得更徹底，她甚至離婚，由東邊搬到西邊，換了一群新朋友，換了新工作，全部重新開始。你如果去訪問所有的能量高人，那些勇於放下一切重新來過的人，總是可以很快的更高人一等。


    人的身心狀態如同一個U型容器，我常形容這個容器，如果切開，正好形成上下兩個半圓的U型，上半U是靈性面，下半U是物質面，合起來正好就是一個圓形。東方有空杯的理論，西方在卡巴拉的訓練中也有容器理論。在麻省理工學院的奧托·夏莫（C.
    Otto Scharmer）博士，在求師於南懷瑾老師之後，也在管理學中加上了東方的人文思想和U型理論觀想法，並推動到世界各地。不論東西方的研究，人類的進化就是一個U型的演化過程，然後進化成圓形。全頻道的過程中，我們一方面要聆聽上半圓心靈的訊息，一方面也要同步完成下半圓的生命實踐過程，這樣兩個同步進化的圓形，才可以創造無所畏懼卻充滿感知力的圓型創意人生。今天就讓自己這個初級的U容器，變成可以裝下更多能量的大圓吧！


    ### Color 令你彩色起來的能量願望方法


    **概念：** 根源階段，沒有接受也沒有給予

    **作法：** 在一開始，我們練習什麼都沒有。全頻道在一開始時，不要去設限自己是哪種靈感的天賦本能，不論是可以看色彩觀氣場，聽音樂做療癒，可以雙手觸療，可以聆聽訊息，或可以睡夢中將負面潛意識釋放轉為有用的訊號。總之，階段
    0，什麼都不期待，來什麼都好。


    **2. 階段 1:**


    **概念：** 容器向下階段，接受的願望

    **作法：** 全頻道的初期，開始要逐漸形成你的選修科目，就像大學選科系一樣，你最好選擇自己擅長的來練習。因此，我們開始充滿希望，希望能夠愈學愈好，以實現美好。這個時候會有兩種力量產生，一種是接受，一種是給予，能量的流動就是接受和給予，在這個練習中，我們用呼吸來體會何謂能量。能量如同愛，能量如同呼吸，沒有進就沒有出，有出必然有進。這個階段
    1，我們練習 flow（流動）。


    **3. 階段 2:**


    **概念：** 容器向上階段，給予的願望

    **作法：** 形成流動的過程中，我們開始會愈來愈感受到各種的波動和訊號，身體這個容器會逐漸知道自己是哪種特色的載體，例如，你可以研究自己是哪種屬性特質的人？是聽覺型？體覺型？還是視覺型？聽覺型人是藍色能量的傾向，比較喜歡講道理，聽道理。體覺型傾向紅色能量，比較需要身體觸感，對身體的感受比較強烈。視覺型傾向黃色能量，對於情感上的情緒觸動很強大，也善於藝術呈現方式來表現情感。


    每個人一開始擅長的入門科目不同，逐漸練習之後，到了階段2，開始有了專攻的項目出現。我開始的時候是色彩，然後是夢境，後來是接觸，最後停在訊息。每個功能的鍛鍊都會重複這幾個階段，就像是一個專業的養成，都需要基本訓練和時間培養。於是我們會想要更超越，甚至是希望更上層樓的研究和學習。這時候我們希望的不僅只是學習（接受），更可以利他（給予）。我們也會發現，原來給予他人的過程中，我們自己受惠更多，也會學習更多，這就是為什麼我創辦網路線上及各地的教育中心，會建立社會服務項目，並且輔導身心靈同業一起提供社區能量服務。能量的認知可以增進心靈工作的落地實踐。


    **4. 階段3：**


    **概念：** 容器中雙向的階段，為了給予的、接受的願望

    **作法：** 療癒的過程中我們可能會有遺憾，發現自己乘願而來，卻又不敵內在的各種挑戰，或是現實生活上的問題，我們發現自己可能會敗下陣來，或是需要更高階的繼續療癒。因此，這個階段形成了雙向的流動，我們可以同時給予社會服務，但也可以同時向內學習。我們走在光的道路上，卻又充滿畏懼或懷疑，這時候，靈性導師或引導的講師、諮詢師、治療師、管理師、分析師們，全在這時互相療癒，一起相愛。在這裡，我們可以有翻轉的可能性，就是回到階段0，重新學習另一個新的過程。然後會逐漸發現，原來不是找到自己生存的工具來學習，而是先熱愛自己喜歡的工作，才得以生存。


    ## Part Ⅲ 進入臣服天職的階段


    生存從來都不是問題，問題是覺得生存很辛苦，讓信念造成了問題。如果可以學會「享受」去做熱愛的事情，並且享受這個過程，再辛苦，都不會變成問題。在這個階段的重點，我們鼓勵大家樂在工作，樂在生活，樂在成為一個有愛的人。


    **5. 階段 4：**


    **概念：** 容器再度向下的階段，成為創造者

    **作法：** 階段 4 一開始更好玩了，只要你穿越了前四個階段繼續向前，你就真的出師了。在這個階段，有能力開始接受所有的願望實現。這個階段像是高頻率的能量者可以體會到的，可以全然的類似造物主，創造自己想要的，但同時自己這個容器也不再分辨要接受什麼，不再限制給予，全然地接受。


    我們臺北和上海的兩個中心就是這樣出現的，臺北的中心是源自訊息，而上海的中心更是全體夥伴一起觀想，我在靈性洞見中見到了房屋的租金金額，所以才花不到一天的工夫就實現了，找到了符合眾夥伴期待的地方，也承擔得起的好房子。這個階段的創造力非常強大，特別是一群人共同創造的力量。所以，為什麼在我們的練習中，一群人的共修、共同感知、共同創作、共同繪畫，都能夠成為進入到這個階段的作品。不過，並不是每個人都能夠這樣心想事成。


    **6. 循環階段**


    一旦「挫敗的限制」發生，容器就會繼續回流，回到階段 0，然後重複下去這個循環模式，直到創造物的本身可以自己感受到創造為止。這已經接近造物主的能量狀態，但似乎所有的人一面臨限制，或是空虛感的時候，能量就會下降，無法達到造物主的狀態。所以我們的習性一旦發生，就會重新回到懷疑、不安，然後再度繼續經歷。


    幸好，這些循環因人而異。有的人愈來愈快，有的人特別辛苦，在我們的卡巴拉生命之樹的心理諮詢中，常常為眾人排列的四重天生命軌跡，就會這樣不斷地重複。正向信心堅強的人，往往是全勝將軍，但大多數人的信心不夠堅定，都會退回原地，重複著生存的那些基本生命模式。


    我用這套理念來建立財富能量的思想結構與解構，我也用這樣的U理念，在企業管理學派中找到了類似的理論。這中間不乏經濟學和卡巴拉神學的概念，我在其中用能量的感受方式做企業引導或心靈引導時，發現了他們非常一致的目標：創造，讓自己成為造物主，甚至感受到整體的能量場域。


    這種進化的過程，我認為是神祕學落地的能量感知再度進化的過程，很興奮。我們可以用新的能量感知力，來享受愈靈性、愈富裕的人生。


    ### 以愛療癒


    愛的實踐力強大而驚人。如果是一群人共同有愛，並且一起來愛我們的生活環境，這種連結的光芒，可以創造出意想不到的勝利和榮景。


    ## Chapter 22


    ## 愛和恐懼不會同時存在


    人們往往被生存恐懼抓住時，是跳不出原來的池塘的。直到具備智慧，不再被生存這底層的關卡所綑綁時，才能縱身一躍，飄浮到更高的次元。


    「愛和恐懼不會同時存在」，這是一句老生常談的話，特別在身心靈世界中，已經被說爛了。但是，總是會在守護潛意識的大門沒關好時，恐懼就會偷偷跑出來。一般當我們覺得一切順利時，是不會感到恐懼的。但是，一旦感到脆弱、面臨考驗時，或是最低的生存安全受到挑戰，感受到危險時，恐懼便會油然而生。在這時候，你如果依然有愛，就能夠知道自己不會有恐懼。


    當我們決定要向二十年來依賴的色彩產品說再見時，最先受到驚嚇的是執行長，然後是核心團隊的震撼。但其实這個念頭，早在七年前就已經成立，歷經了五年，甚至更久的時間，才真的實現。我告訴執行長：「愛和恐懼不會同時存在。」


    「又是一句高深的身心靈唬弄口號！」我心裡這樣想，執行長會不會也在心中這樣吶喊著？一句很高卻不落地、不切實際的回覆，也聽不懂葫蘆賣什麼藥。執行長雖然已經跟隨我十年，近幾年開始接手兩岸三地的經營事業，但卻是我想轉型之後的執行長。


    過去莫名其妙地和前面的助理斷了不止一次，通常是在能量等級不同時，就會出現這樣的情況。我常常在課堂中比喻，這就像是一對夫妻或戀人，當相愛的心已經失去，其中一人一直在進步，另一個停滯不前時，就會產生能量上的裂變。這時候，如果雙方經過深度的溝通後，決定希望能攜手走下去，那麼，就可以協商如何共同努力，一起提升，因為這時候還有愛的存在，還有渴望合作，而不是競爭的內在動機。


    但是，如果已經貌合神離，甚至已經互相無法再相處在一起，彼此的人生觀早已無法同行，這時相處在一起就會產生摩擦和痛苦。這種磨合和痛苦是無法容忍的，這時候的靈魂功課也已經改變，大家得為自己選擇下一個新的人生方向，分離分手就是需要的成長。


    小夥伴們仍依依不捨，放不下已經長期使用且有感情的產品。然而，如果沒有更深的進步，或是無法進入到更深的喜悅中，無法有成長的感覺，那便只是一種習慣罷了。


    深談之後才發現，敏銳的執行長早已經嗅到這股改變的力量，並且也嗅到如果夫妻相處，一方不能成長，或雙方無法達到共識，就像商業夥伴或商業合作案，是無法順利發展下去的。身為兩岸企業家的下一代，並且也掌管著家族產業的她，心裡是雪亮明白的。但是，就因為有愛，有情，我明白多情的團隊們總是希望抓住幸福的尾巴，哪怕是短暫的，也想抓住美麗的虛幻。


    ※


    終於，到了要說再見的時候了。一方面天象如此，一方面是如果內心不放下舊的能量，就不會有新的力量出現。我們內在的同一個空間裡，是無法容下兩種不同的頻率，不可能一方面死命地抓著恐懼和舊有的負能量，一方面又想要幸福快樂的往前擁有新事物。就像一對男女的分手，除了表面分手，心裡也要分手，要真實的分手，並且不帶有情緒的分開，這才是高明人的做法。因此，分手或分離，或是死亡，都是一種快樂。


    知道時間到該放下了，就不需要遲疑。很多人臨死前，滿心的掙扎，充滿了不甘願，不想放手，這種到了終結時候的不灑脫，我常常覺得才是人生的一大歹戲拖棚，也是在最後光榮戰績上的一個敗筆。五年前，我和我的團隊都還沒準備好，也試圖修復關係。不過，如果夫妻雙方只有一方想復合，另一方已經有小三，並且渴望離婚，沒有同心同德、貫徹始終的心念，要復合恐怕就有點辛苦了。


    我開始走入愛上自己的道路，不是愛上產品，也不是愛上師父，更不是愛上金錢的豐厚，我只想重新找回自己。於是，我開始獨自上路去發展，團隊則依然做著喜歡的色彩療癒，而這一拖，就是五年。跟了我多年的團隊小夥伴，在堅持著他們對身心靈與身心靈產業的夢想，而我早已經走出來看著他們。因此，我成立了美麗藝術會所的平臺，給我的學生們去做練習。


    其實，我不太像老師，倒像是個功德主。我投資的地方沒有賺錢，反而一直貼錢，不過我的信念是，如果從事教育，就是要這樣培養弟子。但是，如今我走上愛自己的道路，反而錢變多了，人變輕鬆了，也不會在任何的人言誹短中恐懼和痛苦著。快樂又變美麗的我，走上愛上自己的道路，而且愈來愈勇敢，是因為心中沒有恐懼，只有愛。


    在我的人生中，我花了很多時間在說再見，向親人，向愛人，向我尊敬的師父，向那些不喜歡我的人。但是，當我很用力的努力想要逃離（當年逃到加拿大），或努力的想要分手時，都分不開，因為所有的用力，都還是一種緊密的連結，愈用力，就像拍打皮球一樣，反彈力就愈大。


    現在愈走愈美麗的我，心中充滿了美好的感覺與力量，這種陰與陽的力量在我內心逐漸交會，主動、被動和中和的三股能量逐漸匯聚在我的身體七輪中，三脈七輪的整合也在我穿梭於不同頻道與空間，和不同能量場域的族群相遇時，得到了提升。有時候進入某個場域，我被染色了，身體非常不舒服，也可能不被身旁的人所諒解，以為我利欲薰心。但如果本身有光明覺知的話，就會自動有種清理淨化的功能，然後透過覺知，可以逐漸清理乾淨。就這樣，我開始無所畏懼。


    我不必選擇待在一個自以為安全卻失去自由的地方，但我可以歷經淬煉依然澄澈。我通過許多染缸的考驗，最後發現，我仍然是那個純潔無瑕的我，多的歷練，只是讓我的光芒愈來愈穩定，力量也愈來愈無所畏懼。我發現，我可以不再依賴父親，不再依賴上師，不再依賴我的西方導師，我就是我。


    當滿心只有愛時，何來情緒？何來仇恨？何來痛苦？何來負面記憶？


    所有研究全腦與視覺開發的人都知道，人的長期記憶會蒙騙自己。我們的記憶中，仇恨和痛苦的故事會愈編寫愈精采，但我們往往會很容易忘記美好的過去。我試圖在愛回我自己的過程中，依然記得過去那些所有的美好，並且深深感激。


    臺灣電視上有一個閩南語發音的電玩廣告，是這樣說的：「不是你算沒有偏財，是你玩不對所在（請用閩南語發音會更順）。」於是，我開始想在對的地方，玩對的遊戲。我不想只停留在第三度空間，我的心識早已經跳離這平面的限制。


    人們往往被生存恐懼抓住時，是跳不出原來的池塘的。直到具備智慧，不再被生存這底層的關卡所綑綁時，才能縱身一躍，飄浮到更高的次元。


    電影《我的老爸喵星人》，描述一個很有錢的男人變成了一隻貓的有趣故事。我有時候覺得，這五年我就像這隻貓，說著不同的語言，卻得活在人話的空間中。但當我放下了恐懼和憤怒不平時，我就會重回肉身，得到重新的開始，充滿愛的生命。


    > ※


    要說再見不是一件容易的事，就像一對要離婚的男女，要處理龐大的財產分割，然後分別找到下一個住所，或是找到下一個春天？然而，在還沒有把上一段婚姻處理完前，恐怕下一段也很難開始吧？


    我知道分手不容易，但依據我輔導的心得，以及能量教育多年的經驗，我知道怨懟，或是拖泥帶水，回顧過往，甚至恐懼未來，都不是正確的處理方式。


    於是，很快的，我和執行長在兩天內決定了昭告廠商及學生的日期，定在一個月後，然後立即處理變賣所有商品，既然要分手，就不要拖泥帶水。


    不過，心懷感激是需要的。因為不相愛了，兩個好人，還是各自需要好好生活，沒有必要帶著過去的怨懟，繼續上演相互迫害與毀謗的芭樂劇。這是我和執行長的共同感受，在這幾年，我成功地培養了能量工作夥伴「共同感知」的橄欖綠能量，也就是「女性領導能力」的工作方式。我們會共同感覺，一起做決定，不再充滿上與下的權威關係。但在工作的流程上，執行長對我這個指導老師是絕對的敬意和尊重，令我深深的感受到，總算有充滿愛的夥伴出現了。


    這十年來，我見到當年那個恐懼又只會哭的小女生，現在竟然已經長大，又成熟得可以翻過身來療癒我。這種充滿愛的天使愈來愈多，而且圍繞在我的身邊，我不再孤單一人闖蕩江湖，也不再恐懼的想要保護自己，我有貼心的天使心在身邊，可以互相支持。很多快樂的事情我們開始一起分擔，很多痛苦的事情我們也一起分享，但沒有了沉重的情緒壓力，只有一起療癒，一起成長。


    亞太能量療癒線上移動講堂，也遇上了好的平臺老闆支持。初期以服務分享各地學員的延伸成長教育為宗旨，英國、美國、日本的能量老師們也都成了我的好夥伴，繼續一起扶持著進行我們一輩子都不會離開的人生志業——能量療癒。我心中美好的療癒國度，終於開始出現了雛形。


    ![](img/2165f73db991986bac0992a95b4cd001_263_0.png)


    Core Enlightenment


    我其實感覺很難過，在關於恐懼這件事情上。就在我決定結束經營多年的彩油事業後，我發現之前同期、甚至比我更早期的資深老師們，還有人依然陷入在生存困難的課題上；有的老師因為交不出繼續進修的學費，被迫放棄教學資格；有的老師因為沒有別的謀生技能，他們只會賣彩油，所以生活辛苦。他們想要靠近核心，卻像個不受寵的孩子，不管怎麼表現，就是被家長厭惡，得不到父母的歡心。


    其中一位老師寫信來告訴我困境，卻仍必須依賴著顏色瓶來教學，但其實自己已經失去教學的資格，卻無法獨立站起來。這位老師來問我的想法，並且希望一起繼續合作，我很明確地告訴對方，我的建議是「做自己」。因為我已經不再提供這個產品，所以要和我合作繼續賣油是不可能的了，除非提升，否則我不想走回頭路。


    對這些老師來說，與其苟活在這個處處被打壓、不受重視的系統中，到各地教學總是被禁止，去哪裡想做個活動也被通知違規（哪國的規定呢？大英國協嗎？），這樣的環境，不是能量人應該要有的生活態度。


    ## 自我療癒


    ## 成為勇敢的彩虹戰士


    在《聖經》中有著彩虹契約的故事，當年，我深深為著這樣的神聖契約而著迷。在十二至十四世紀時的歐洲，有一群到處旅行的表演者，被人稱為抒情詩人或吟遊詩人（troubador），他們透過到處演出，朗誦詩歌，演出戲劇或舞蹈，甚至神祕得像魔術般的表演，來傳遞他們所信仰的基督教神祕學，但這是被當時教會所反對的，於是他們透過這些藝術的方式，透過對眾人的服務來傳遞真相。而教會當權人士為了要防止這些人（也包括如聖殿騎士等）在法國南部的擴張，於是進行了宗教迫害。


    心的轉變是靈性的曙光。透過藝術的呈現，我們可以在感受和表達中找到自己生存的空間。


    > 我明白「恐懼」的底線就是生存，讓旗下的老師過得好，為什麼不能同步呢？如果要求上進，只要有好的管理，共好不是更好嗎？


    為什麼不以愛打破呢？我無法告訴那些老師們生存問題要如何解決，我只能告訴他們，有勇氣的去打破現狀，就是未來狀況好轉的開始。能量人士如果被限制在很窄的生存空間中，往往無法在自己生活的地方賺到足夠的錢，而必須四處去流浪，真的要這樣的生命軌跡嗎？我不以為然。恐懼太強大了，所以往往綁著我們無法行動，只能得過且過，這樣的過程，如果不能療癒自身，將無法掙脫這些綑綁，繼續打回原點，回到根源的階段，重新面對生存的考試。'
