    \n1.自我實現 2.生活指導\n\n177.2 107005497\n\n## 推薦語／以愛成長，以愛療癒\n\n### 愛是慈悲的唯一途徑\n\n佐欽巴楚仁波切\n\
    \nThis is not a typical biographical book. There is no magic or miracles, only\
    \ love coming from realization of life.\n這不是一本典型的傳記書，沒有魔法或奇蹟，只有來自生命覺悟的愛。\n\nWhen\
    \ I first met Isabelle (Chao-Yi) many years ago, I felt an incredible flow through\
    \ her gentle and beautiful smiling into my eyes. I asked her, \"Where are you\
    \ from?\" She is honest and has a passion for helping people. Then she became\
    \ my heart disciple and translator. We have a very deep connection through the\
    \ Buddha's teaching.\n多年前，當我第一次見到Isabelle時，我感受到了她那溫柔而美麗的微笑在我眼中的流動。我問她：「你從哪裡來？」她很誠實，並且熱衷於幫助人們。然後，她成了我的心靈弟子和翻譯。我們透過佛陀的教導，而有了非常深的連結。\n\
    \nAs her root teacher, I am glad that she follows the Great Perfection and studies\
    \ hard for realization. As her family, I care about her happiness in the middle\
    \ way. This book is her true story. I know that she has pure perception and beautiful\
    \ inner heart. I wish that all the readers could get a lot benefit from her writing,\
    \ and realize the meaning of Love. Love is healing, love is the only way to compassion.\n\
    \n作為她的根本上師，我很高興她能遵循著大圓滿法教，並努力學習與覺知。作為她的家人，我以中庸之道關心著她的幸福。這本書是她的真實故事。我知道她擁有純粹的覺知和美麗的內心，真心希望所有的讀者都能從她的寫作中獲得諸多多好處，並且認識到愛的意義。愛是療癒，愛是慈悲的唯一途徑。\n\
    \nMay all the sentient beings be released from sufferings and become as free and\
    \ happy as Isabelle.\n願所有的眾生得以擺脫苦難，像Isabelle一樣自由幸福。\n\nMay Isabelle keep sharing\
    \ her love and positive energy as her mission to work.\n願Isabelle能一直分享她的愛與積極的能量，一如她的工作使命。\n\
    \nMay all the readers be free from sufferings and love the treasure of life.\n\
    願所有的讀者免受痛苦，領受愛的生命寶藏。\n\n以愛成長，以愛療癒\n\n### 關於本篇序文作者：\n\n佐欽巴楚仁波切，即第四世佐欽喇納巴楚仁波切（Dzogchen\
    \ RanyagpaluLinpoche），出生於一九六三年，幼年時便具有無限的純淨素質。十四歲進入佐欽寺，依此偉大寺院的純淨舊譯傳規，聽聞修習秘密壇城諸續部的四證悟行的法軌。二十歲時進入佐欽師利星哈五明佛學院就讀。\n\
    \n巴楚仁波切的著作《普賢上師言教》、《證悟者的心要寶藏》，內容清新切要，深入淺出，在西藏是不分教派人人必讀之作。蔣揚欽哲旺波曾稱讚他：「外是寂天論師、內是大成就者夏瓦里、密是聖觀世音！」\n\
    \n## 充滿法喜的菩薩行\n\n洛桑龍達／大英博物館首位熱貢唐卡藝術家\n\n善弟子昭儀與我在六年前因唐卡藝術，於上海結下善緣，在上海及台灣，只要她抽得出時間，往往會來支持我的唐卡展覽，並向我請益色彩藝術的人生哲學。她對色彩和佛法的領悟及虔心令我印象深刻，特別她早年在佛法中的培養，使我第一次見到她時，就能感受到一種尊敬上師和謙卑的美好品德，這種日漸式微的德行，我很喜悅可以見到有善弟子依然保有。\n\
    \n曾經，她就自己在內地的修行和事業發展如何平衡，來與我分享及討論，我建議她要更廣大的成就自己的教育事業，並且成為獨有的色彩心靈專家。如今，喜見她的努力果然走出一片利益眾生的天空，願她永不退轉並充滿法喜的走在菩提道中，用文字和藝術來示現與示範世間修行的菩薩行！\n\
    \n### 關於本篇序文作者：\n\n一九七六年，誕生於「佛法聖地文化藝術之鄉熱貢唐卡發源地」吾屯村。一九八○年代，承接法王十世班禪大師傳承的大威德金剛密法和菩提心願法。一九八三年，被當地一代法主洛桑尼瑪大師選為「善根」，在隆務大寺受僧戒。之後進入吾屯寺，師從紮西拉旦等數位上師，學習佛法及唐卡泥塑等文化藝術。龍達上師的唐卡藝術成就享譽全球，不僅榮獲各大獎項，二○一四年更獲讚為「中國十大唐卡大師」。\n\
    \n## 這本書可以讓你認識自己，然後愛上自己\n\n劉長灝／綠光劇團表演學堂主持人\n\n昭儀五年前曾經來找我上課，我是個表演老師，她希望我能指導她的聲音表情與肢體語言，讓她在演說的時候能夠真實的感動人心。她是個領悟力很高的人，很多聲音表情與表演技巧她一學就懂。後來她跟我說，她是心靈引導的老師，我從她那裡聽到她的課程內容，覺得她真是個能量很強的人。\n\
    \n這次她邀請我為她出版的書籍寫推薦文，我細看她寄來的文章，有一些領悟：\n\n1. 我在上表演課的時候常說，演員要先認識自己，愈透徹的了解自己，就愈能夠從自己的生命經驗中，用同理心去理解各種劇本中、各類角色的心理活動與變化。然而，每個角色在追求目標行動的過程中，總是會期待自己成為更好的人，這與昭儀在許多文章中所說的有異曲同工之妙。我的很多學生在課後閒談中，偶爾也會用生命靈數與九型人格分析來討論認識自己的方法，我想昭儀出了這本書之後，我會推薦他們閱讀這本書來認識自己。\n\
    2. 當然，想要把演員這個職業當作終身職志的人是辛苦的，因為除了勤練基本功夫外，還要有一種信仰，才能在這個夢幻變動、不可捉摸的環境中生存下去。昭儀這本書或許可以讓演員提升自己的生命能量，找到「愛上自己」的生存理由，照亮自己的道路，勇敢地向前邁進。\n\
    3. 昭儀的這本書中有許多真實故事案例，這些故事活生生的存在這個世界中，這些真實故事比小說還要精采。如果有一天能夠把這些故事搬上舞臺，我相信更能夠激勵人們去勇敢的面對自己，這比哈利波特作者\
    \ J.K. 羅琳更有魔幻的力量。\n\n## 以愛為名，從覺醒到重構之路\n\n楊慰芬／鍊德文教基金會董事長\n\n在尋找自我的過程中，昭儀老師不斷想傳達給我們每個人與生俱來的禮物，想告訴我們人生真正重要的東西，這讓我想起\
    \ Christopher Nolan 在《星際效應》（Interstellar）提到的：「愛是能夠穿越時間與空間的物質。」（Love is the one\
    \ thing that transcends time and space）\n\n當我們面對生命所遭遇的種種磨練與關卡時，如何能正向的轉念、轉化，若有幸透過色彩能量的引導治癒，感受大自然的能量頻率，便能幫助我們面對困境，進而實現美好。\n\
    \n認識上官老師是一個偶然的機緣，她的正能量很難讓人不注意到她，我大半生的生活裡只有數據與事實，但遇到這樣靈性的夥伴後，我開始學習細心的體會每一件事、物的本質，以及它到來的因緣。真的是很不一樣的感動，這讓我專注於生活的每一個當下，享受陽光、聆聽鳥鳴、感受風吹草動，從生活中去發掘體會感知這許許多多的萬物，回歸於自我的寧靜，尋找自我內在靜心的品質，創造自身美好感知力，並透過專注的力量，感受生活的萬事萬物。\n\
    \n昭儀總是在世界各國演講，每一次她回臺灣時總是說：「老師，我們要找時間聊一聊。」而我們總是挪不出彼此可配合的時間聚會。也許我該問問她：「我們要怎麼轉換頻率，才能定靜下來，找到我們共聚的時間？」\n\
    \n愛是一種和諧的連結，能彼此相互聯繫又保有獨立自主愛著另一個體，因為愛、因為感恩，所以我們彼此豐富。以此心得與您分享。\n\n## 最好的療癒——來自於內心的平和與寧靜\n\
    \n胡宗明／臺北榮總玉里分院副院長．世界自然醫學會聯合總會理事\n\n與上官老師的結緣非常奇妙，未來若跟讀者有緣，再一一訴說⋯⋯\n拜讀老師的書，彷彿像看一場又一場精采又叫好的電影，令人像著迷一樣，不由自主的一頁頁往下翻去。老師透過色彩、符號、隱喻、影像等方式，來表達她在夢中的修練，這對她而言是「自我療癒」，但在看了她的書後，卻也深深的被她所療癒，頗有「見即解脫」的舒暢，在此，先代替讀者真心感謝老師。\n\
    \n## 來一碗人生快樂湯吧！\n\n上官老師是一位求知欲非常強的學者，書中提到，別人家小孩是要家長拉著去學習才藝，而老師卻是自己主動要求去學習，所以從小一直都是資優生。也許是這樣性格，遂造就了現在的她，因為內心不夠平和與寧靜的人，是無法主動且專注去學習的。更難能可貴的是，老師用她所學習到的方法來幫助需要幫助的人，這也是需要這份平和與寧靜，再加上愛的流動，這樣的幫助才得以完整且圓滿。\n\
    \n老師在書中提到，我們為什麼要和自己連結？是因為所有的夢境連結只有一個目的：連結豐富美好。老師也在書中教導大家釋放內在壓力與恐懼的方法，讓自己的身心靈更健康，更有感知力。\n\
    \n看了老師的書，對修行這二字又有了更深一層的體悟與認知，這真的是一本值得推薦、非看不可的好書！\n\n身體受傷，大家都懂得要去包紮、塗藥止血；心理受傷，當然也要去包紮止血。但是，一般大眾都沒有這種觀念，看得到的很重視，殊不知內心世界的健康順暢，更是影響我們外在行為的重要支柱。\n\
    \n陳俊生／71快速記憶學校校長\n\n## 成為自己生命的療癒師\n\n上官老師走遍地球，覓得良藥，此藥是一種想法，一種感悟，一種頻率，一種磁場，一種彩色的氛圍，一種氣場，這些妙趣的混合體，我們看了，看完思考，思考後用自己的經驗去消化每一個細節，讓養分能從融合的過程中成長出來，滋潤我們每一分鐘。\n\
    \n極樂的世界，是性靈與物質同時存在的極樂，當我們缺了一邊，都只能是庸庸碌碌的用那匱乏的情緒過日子，教人賺錢的書很多，教人賺快樂的書不多，上官老師用多種角度來引導每一個缺乏快樂的朋友，值得我們每個人，細細品味她慢火熬燉出來的人生快樂湯。\n\
    \n同為教育工作者，我和老師也一起在內地工作過，感受到她的精神力量就像一個能量小巨人，我們重疊的生命軌跡，讓我對人生有了不同的看法，希望這本書也能給大家相同的力量，灌注到每一個缺乏快樂的心靈。\n\
    \n潛能開發學、色彩能量療癒，對身為醫生的我而言，是較不熟悉的領域，因為在我學醫及執業的經歷裡，都是以科學基礎為患者診斷與治療，但隨著現代人對身體、心理健康的重視，這種用輔助傳統醫學的疾病治療方式，不僅跨越了傳統「預防醫學」，從心理層面出發用心照顧，更是促進健康重要基礎之一。\n\
    \n而作者所要傳達的療癒能量，也是我目前要啟動的「一站式醫美健管」的精神主軸，由內而外健康，並與美麗心靈完全契合，因其中包含了以愉悅心情及能量來迎接自己。\n\
    \n昭儀是位能量極強的老師與朋友，以前有很多成功的著作，但這次她是將自己的人生經歷，透過文字傳遞，帶我們走進色彩世界，讓你我能成為自己生命的療癒師，進而啟動愛的能量，療癒自己與他人，每個人都該一讀。\n\
    \n薛博仁醫師／聖緹雅集團執行長·一站式醫美健管召集人\n\n以愛成長，以愛療癒\n\n## 學員心聲\n\n### 彩光湧現，真愛無限\n\n十年前，我在加拿大唸大學時，同時也開始了與上官老師的緣分。那時候我是帶著情緒的創傷，而為了療癒自己和家庭，便去上了老師的色彩身心靈課。上完課後，我得到的不是一個療癒，而是內在轉化的智慧。\n\
    \n後來，我在亞洲再次跟上官老師相會，感恩她的鼓勵，讓我學會了信任。\n\n我相信這世上沒有人能在心靈上療癒別人，除了自己，當你能與情緒同在，覺察背後的動力，有意識地為自己負責時，宇宙會開一扇門給你。感恩能再上老師的課，讓我找回生命的信任。\n\
    \n信任的第一步，源自我們為自己生命的定義。\n\n感恩上官老師！\n\n認識上官老師有兩年多了。印象中的老師，是一位特別優雅的女士，愛穿白色的衣裙，總是和藹可親的樣子。每當我遇到挫折，或是生活不如意時，上官老師總是鼓勵我，並不經意的用最柔和、最不傷害的方式，點出我當時問題的要害。每次被老師提點，都能讓我心服口服，因為老師每次都能說出我心裡的癥結，並溫柔的指出我當時都不願意面對的自己。而被老師指點後，那個面具後面的我，便有了勇氣走出自己的偽裝。\n\
    \n——香港 田Z\n\n### 學員心聲\n\n感恩遇到上官老師，感恩老師一步一步帶領著我，讓我遇見更好的自己。\n\n我是一個普通的女性，兩個女兒的媽媽，曾經自認為很幸福，做著生意，我的初戀成了我兩個女兒的爸爸，而媽媽和弟弟都生活在同一個城市。\n\
    \n在二○一二年，我平靜幸福的生活發生了變化，弟弟出車禍走了，媽媽為此差點沒挺過來，我們全家都沉浸在悲痛之中⋯⋯\n\n屋漏偏逢連夜雨，我的老公和我的閨蜜好上了，我差點崩潰掉，都不想活了，期間的心酸實在無法用言語來表達，我每天都祈禱上帝給我指點方向，我該怎麼辦？\n\
    \n上帝派了天使來指引我，她就是上官老師，第一次見到她，我就覺得好熟悉，好溫暖，好有愛，在家居生活色彩課裡，老師在講，我在聽，每一句都講到我的內心最深處，然後不自覺地眼淚就像斷了線的珍珠，止不住的流。老師的一言一語都影響著我。\n\
    \n重慶、成都、上海、臺灣一路的跟隨，一路的學習，上官老師真的很神奇，什麼都懂，包羅萬象，我現在認真的在學習老師的天使光能靈氣，不但可以療癒自己，還可以療癒別人。\n\
    \n就在今日，我活在感恩裡。老師說，愛能解決所有問題，我深深的相信。\n\n在此，用老師說過的話總結此刻的心情：\n「願我走過的痛楚，你不必經歷；願我已有的幸福，你觸手可及。」\n\
    \n—上海 鳥兒\n—重慶 懷建"
  mdcn: "# AWAKENING YOUR LOVE FROM YOUR CORE!\n\n# 心痛療癒師\n\n# 從高敏感身心到不委屈自己的幸福之路\n\
    \n一本地球新時代的能量啟蒙教本，將幫助你掃除負能量，重啟正向光明。\n\n獻給每個生命遭遇困頓、生活窒礙難行的人，讓他們得以建構起個人獨特的內在喜悅工程。\n\
    \n體質天賦敏感之人、想投入能量領域工作者，都可以從中獲得一個明確的引領與借鏡。\n\n療癒科學教育家 上官昭儀——著\n\n## 關於作者\n\n###\
    \ 上官 昭儀\n\n以西方教育背景融合東方傳統底蘊，超過二十年心理諮詢與團體輔導經歷，致力內在成長教育推廣十五載，專研生命之美。\n\n藉由大量個案與授課，透過色彩、文字、聲音、形體等多元化方式引導人們感知身心和諧、認識自己，訓練心念的美感，抒解生活壓力與困境，協助人們有勇氣面對生命的挑戰，找到促進生命全面幸福成功的道路，創造生命的成功和富裕。更重要的，是希望籍由各類成長能量管理法，支援孩童以及支援成人內在的孩童，得到充滿成長智慧的快樂！\n\
    \n教學與講座足跡遍至臺灣，中國，香港，馬來西亞，加拿大與英國。主要議題涉及個人，家庭與企業成長。並專書專欄探討親子，家庭，兩性關係，愛與生命本質的追尋等療癒科學的應用與推廣。\n\
    \n忙碌之餘，仍熱愛大自然，修行，愛情與旅遊，渴望成為天地間充滿光明與愛的訊息傳遞者！\n\n相關課程及活動訊息，請見美力集團官網 http://www.ishangkuan.com/\n\
