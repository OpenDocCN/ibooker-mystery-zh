    然後始終以克服任何困難的高度覺知，每天認真地

    執行著我的使命。

    現在想想，幸好當初具有愚人般的傻勁，不然我應該

    會很後悔進入這個領域吧？

    這個領域是無法一開始就要求回報的，沒有很光鮮

    亮麗，相反的，常常會身體不太舒服。我因為靈性功能是

    屬於治療教化系統，所以，藥師佛肯定是我的祖師爺。其

    次，因為兼具教化功能，我也必須學會教育這門事。剛入

    行時，我聽從了兩位老先生的指導，用色彩當作磨練與對

