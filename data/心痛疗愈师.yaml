    我對於一直挺我的好助理、好學生，一路以來那些曾經支持我的人，在二元的時空中，我明白「大家都在最好的時間，盡力做了最好的選擇」。於是，那次事件後，我開始遠離令人迷惑的能量圈，開始「做自己」。


    有人說七分靠努力，但三分仍然是天注定。


    但我總會把分數重新配比一下，想要讓心靈與物質雙豐收，三分靠努力，三分天注定，四分靠能量（運氣）。因為能量可以轉換思維，也能改變磁場，磁場好就能產生吸引力。


    > 「做自己」，就是希望鼓勵大家不迷信、不盲從，找到真實的自己，一切由心所造。


    我們的新開始不迷失時，就可以理解真實的靈魂本質，更重要的是，可以掌握自己的人生，創造真實的雙豐收幸福。


    ## Chapter 20. 心靈與物質雙豐收


    其實心靈與物質雙豐收，是一件不可能的事情。


    心靈的方向與物質的方向，基本上是兩個相反方向。當物質生活中愈來愈忙碌，愈來愈多事情時，你的心便很難完全的安定與專注下來。而心靈是需要安定與專注的，太過忙碌的生活與品質，是無法有著高檔次的心靈觀點。


    在快二十年的生活中，我其實一直不曾想過這兩者的差異，相反的，我每天都在追求這兩者的合一。我的心思沒有想過其他的可能性。直到二〇一七年，我感覺自己的生活，如果繼續這樣忙碌，我將無法達到自己心靈想要追求的境界。因為每次忙一圈回來，我總需要花一點時間來修復。


    本來內心狂妄的不認為自己需要休息，也不覺得自己會有任何的空間與時間來休息，我總是自傲地認為，自己就是適合到處飛，到處體驗的能人。


    但在一次新疆的行程後，我忽然被學生的重感冒傳染上，得了可能會致死的嚴重流感。記得當時臺灣在短短數月內就死了三百人，而我還毫無覺知地染上了這會致死的疾病。一回到臺灣就開始發高燒，去看了醫生，醫生說如果三天後他的藥沒有用，就必須去找他，然後轉到大醫院。我熟悉的醫生輕描淡寫地這樣說，沒有加重我的恐懼，直到事後我才知道自己得了什麼疾病。


    但奇妙的是，我卻開始深沉的發燒，然後一直睡覺。在睡夢中，我彷彿走到另一個世界，我好像曾經死在一個冰冷的世界，然後看見自己是個中國人，古代的中國人，很漂亮，卻不快樂，然後年紀輕輕就死了。


    高燒把我因為父親死亡而冷藏的心好像化開了，高熱也把我因為照顧父親而疼痛不已的肩周炎竟也治癒了。後來我聽氣功老師說，我夢中經歷的事，是在宮廷中被打入冷宮的死亡記憶。有趣的是，我的主治醫生很震驚，因為我一週就恢復了健康，他不知道我經歷了什麼奇遇。更奇妙的是，高燒也把我的手治好了，我的氣功師父也努力的協助我，把西藥的毒性盡快退出身體，就這樣，我又創造了一次奇蹟。


    但我明白，這樣的忙碌奔波，還是與我的心背道而馳。於是，二〇一七年一整年，我實現了一個計畫，就是一個月只做兩場課程，也就是兩個週末，其他的時間我決定用來思考、學佛，或是生活。


    後來發現，當我這樣休息的時候，我的收入反而更好，並且因為靈性的提高，似乎開始到了下一個階段：輕而易舉的獲得。我開始進入體驗真正所謂心靈與物質雙豐收的能量感悟，那就是「不必用力」。


    不要用力，不要揪心，不要費勁，不必算計。


    只要實踐了這四種方式，在生活中，你就會逐漸發現，原來自己可以這樣輕鬆的活著，根本不必擔心金錢，也不必用力地找機會去工作。


    以下是我的作法：


    - 1. 不忙是第一步，太忙將無法騰出空間去進入高維度的生活品質中。

    - 2. 開始玩耍，要一直玩到自己不再思考任何工作上的事情為止。

    - 3. 盡可能什麼也不做，工作完全放下，也許去畫畫，去讀書，去旅行。

    - 4. 開始運動健身，練習馬拉松長跑是非常好的一個身心鍛鍊。

    - 5. 勇敢放下心中大石，像是渣男戀情，或是不合適的事業夥伴或賺錢機會。


    人本來生而富足，不過我們的生活教育方式，總是讓我們有著莫名的擔心，於是我們學會了要不斷努力，不努力就會有罪惡感。我長年受制於這樣的罪惡感，花了快三年才逐漸解脫，終成目前的輕鬆富足，建議你也不妨一試，後面的快樂就是心靈與物質可以雙豐收。


