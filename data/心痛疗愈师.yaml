    很遠的一個地方，我依然憑藉著自己的傻與信，單身

    匹馬的繼續我的靈魂聖地之旅。見到美食、美景，實在太開心了！沒想到，到了當地面對所有美食，特別是我熱愛的甜點，我的身體卻完全無法接受，每天在渡假村過著如苦行僧的日子，我就是得飲食清淡，最愛的食物一點都不能入口。鬱悶死我了！這樣的情況，更造成我長達八年的吃純素生活，因為身體告訴我她的決定，所以就算我怎麼想吃，只要吃得不對，就會上吐下瀉，有時候真的覺得不自由極了，還沒辦法抗爭一下。


    有時候，我甚至覺得自己的身體不屬於自己，像是帶學生去西藏時，我的土地療癒就會不由自主的為山川大地做光能傳送，這種種的身不由己，讓我終於明白，什麼叫做「附身」。只是我的佛學老師告訴我：「新時代的人喜歡附身，但讓外靈進入的人，都是屬於比較沒有自我主見的人。上官，你要做有主見的人，沒有自我才會依附外在力量。」


