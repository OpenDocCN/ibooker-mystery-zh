    在青城山彩色禪修閉關中心成立後，我開始認真思考這個覺知的問題。我們一直強調把色彩能量帶入生活中，而不是只會看氣場、測幸運色，或是用個神奇的油，就可以完全覺知，這是不可能的。因此，落實到生活中的正念覺知，就是非常重要的一項修練。個人、企業、兩性關係，各種的正念覺知，所有處理的都是生活中的事情。我們的治療師工作也不是只有在一對一的時候才覺知，而是把這種能量修練放在日常生活中，時刻覺知。


