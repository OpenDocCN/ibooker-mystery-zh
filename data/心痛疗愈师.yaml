- md: '## Chapter 6. 神奇的修行人


    這個車禍來得離奇，也沒有造成我任何外在的損傷，只是騎機車與人對撞後，有了小擦傷。但卻在三個月後，發現自己愈來愈僵硬，原來我傷到了尾椎，而且已經僵硬了。更重要的是，這場車禍讓我的經脈全移了位，難怪我愈來愈難受，不得不求助於中醫治療，最後更有人介紹我去學習氣功。


    氣功和瑜伽對從小練舞，又自小和父親學習一點點武術的我來說，彷彿是前世就會的功夫，從來都不需要太努力練習，就能練出比他人好的成績。氣功老師一心渴望出家，在因緣的驅使下，我得以一起去見到了她的上師。


    藏傳佛教？我沒有任何想法，我只是不喜歡那些恐怖的圖卡，看了心生恐懼，覺得不像是一種勸人向善的宗教，我心裡認為，宗教應該都是長相好的女神男神，如果長得太醜，怎麼會變成被人膜拜的神呢？但因為和老師感情好，當老師要去做大手印閉關時，便把我也帶了去。


    所有眾師兄姊中，我的年紀最小，也沒有任何宗教信仰，但是當那位出家師父看到我時，指示我的氣功老師說：「那個女孩子可以一起閉關。」這下驚動了所有的高層，因為沒有皈依，沒有唸過經文，沒有被教育過的一個不懂教義和禮俗的小女生，怎麼可以破格加入做最高深法的閉關修練？因為這樣，師父為我進行了皈依儀式，我也就懵懂的和一群人跪跪拜拜，啥也不懂的就加入了，只因為要閉關。


    學了什麼？我不明白，就只是喜歡那種禪坐的感受。不管怎麼學習和唱誦，我都像是學過無數次似的，一下子就很上道，駕輕就熟。但是我的想法依然沒有變，依法不依人的觀念，在當時我的判斷，就是能量場。


    堪布竹清加措仁波切，我花了好一段時間才記住這冗長的名字，但一見到老人家，我卻覺得很舒服。他說的我全聽得懂，只要一上座，只是聽著他的能量（他說藏語），我就彷彿可以跟隨著練習，沒有任何難度。閉關中唯一的難度，就是人事紛擾，雖然我沒有直接和任何人有矛盾的困擾，但眼中見到許多人事紛爭的情況，還是覺得有點麻煩。但只要一打坐，我就恢復平靜，甚至可以馳騁到不同的時空中，感覺特別好。


    這種好的感覺，是唯一吸引我的誘因，我的痛苦在那個打坐的時間裡，是暫時放假不上班的，光這一點，就已經讓我快樂非常了。這個環境和多年後那個巴西女人的環境相比，還是比較可以待得下來的能量場。


    多年後我才赫然發現，當年大手印閉關所唸的經文，竟然是我的根本上師前世所撰寫的，這種種的巧合，實在不能不叫人承認，冥冥之中的安排其實早已存在。


    我的佛法緣分十分幸福，也一直遇到臺灣各地的道教、命理，甚至宗教高人，可以說非常幸運。前半生，特別是年輕時遇到那些真正有修為的前輩，都讓我終生受用無盡，甚至大多數這些高人都成了我生命中的師父。我從來不知道自己為什麼那麼好運，後來才明白，原來自己是有著使命在身的，而各帝·參夏仁波切，是真的把我勾住和嚇到的大修行人。


    ### 核心體悟 Core Enlightenment


    仁波切是「人中之寶」的意思。我有幸參與了多位了不起的仁波切在臺灣及其他地區的事業，也有機會一直在這樣的環境中成就了我的年少生活。以前公司的員工要培訓，就是送去做八關齋戒。最瘋狂的時候，我可以開車快三個小時，只為了去聽一場佛學的課程。


    如果說一件事你一直做不膩，很開心，彷彿天生就會，那便可能是你前世就會的事情。對我來說，唸佛經、做儀式，一直是我不必太用心學習就會的快樂事。一開始進入就從閉關開始，一開始閉關就從最難的開始。一開始最難，所以之後都不會再覺得任何閉關有什麼困難的。我很喜歡這種純淨的修練環境，出家的師父們各個能量純淨，固守清規，每個師父都為了弟子們盡心盡力，那種慈悲和恩惠，不是金錢可以換來的。


    記得一次在夢中，我又成了落跑的逃學小孩，玩著玩著就掉隊了。夢中我記得我是空性大師卻殿仁波切的第十二個孩子，但玩耍中我迷路了，於是夢中見到住持師父抓著我說：「你又跑丟了，馬上要上課了，還不回來？」就這樣，第三天我已經坐在法會的教室中，並且還坐在貴賓席等著供養上師。


    就是有這樣的好運和緣分，總是有著貴人的牽引。這些師父們，除了我的好兄弟忽然心臟病過世，其他的年長師父們，到現在都一直不斷的發送各種國際上的佛教活動給我。我常常想，如果沒有他們的熱情，我還能這樣遇上這麼多好的課程和灌頂嗎？我還能這樣的繼續學習嗎？有時候覺得，這些無盡的愛，可能是我這輩子都還不完的恩惠。幸好，我的工作可以做點小小的利他佈施，也算是不枉師恩了。


    如果你也遇到了不可思議的神奇修行人，千萬不要錯過學習的機會。學習前，建議要思考再三，也許現今的環境與過去不同，我過去只信出家人，也只與那些守清規的修行人學習，對於在家者，尤其是異性的在家者，我比較小心。畢竟身為女性，又在這種模糊不清的能量或靈性界限中，很難有著清醒的頭腦。有時候，甚至出家人都得小心金錢和性的誘惑，更何況是在家者。


    因此，有著清楚的分別還是很重要的觀察力。在大陸，我接手過一些性方面的個案問題，有的是男老師和女學生，而所謂上師和弟子間的問題，更是層出不窮。因此，我們往往需要明辨什麼人家說上師選弟子要觀察三年，弟子選擇上師也要三年，這樣匆匆已經六年過去了。年輕的時候覺得很好笑，不過匆匆數年過去，我自己也成了別人的老師，這樣一來一去的觀察，還真的是太長。現在，我的執行長也跟隨了我十年，這樣的年歲，我們真的是靠著不信任和信任等種種考驗得來的戰地情感。


    除了上師，師父也不好尋找。但當我們成為師父之後，又是如何呢？


    我一直是個不稱職的師父，因為我不夠堅強，也不是很有信心；但我卻是個好弟子，並且非常稱職。因此，當我成為老師之後，我會為了學生掏心挖肺，甚至努力實現學生的夢想。只是，有時候即使已經做了最大的努力，卻依然因緣產生分裂，這也是莫可奈何的事。有時候回想起來，其實沒有對錯，只是過程。


    我覺得，目前檯面上所能看到的課程裡，其實沒有修行中的師父，頂多只有職業培訓的老師。現在的中華文化中，尊師重道的精神已經式微，這也很可惜。所以，一個真正懂得對待師父的弟子，應該也不會太差。


    人說「當弟子準備好的時候，師父就會出現了」。我曾經經事偉大的巴楚仁波切，曾經師父百般考驗我，覺得我這個小女生竟然很有禮節，並且知道師父的心意。我其實沒有刻意，純粹是中華文化基本教材中的教育得當。我們從小受到的禮儀培養，讓我們見到師長時都會秉持著應該有的禮節。所以，我們就來看看如何先成為稱職弟子的步驟吧：


    - 1. 師父交代的事，再辛苦也要完成。

    - 2. 師父交代的功課，不睡覺也要完成。

    - 3. 師父交代的修練，一定盡力完成。

    - 4. 師父想要的任何東西，一定努力實現。

    - 5. 師父想要達成的目標，一定認真實現。


    我不是開玩笑，一個真實的弟子是應該努力完成師父的一切。


    當做學生的，很認真的實現老師的教導時，並且不懷疑、不擔心，只是認真的相信師父的安排，這樣的用心，就像是孝順父母一樣。然後你就會發現，所有的考驗都可以過關，因為你朝著目標邁進。


    當不帶任何懷疑的向前衝的時候，事情是最容易達成，也是最沒有雜念的時候。


    我因為是乖小孩、好學生。所以，一直沒有太多的懷疑，在前半段的學習路上，也比較能夠堅持到底。每次我完成師父交代的工作時，都會發現自己更進了一大步。也許在現代已經很少有這樣的機緣，可以有專心培養你的師父出現，但在藏傳的傳統系統中，或是能量教育的系統裡，依然維持著這樣的古老傳統。所以，愈核心，愈靠近師父的能量，就愈能得到精髓。我的口傳唱誦，也是這樣得自師父一對一的傳授。在心法的傳授中，都不是刻意擺好教室，放好紙筆，然後坐著正式上課。有時候，傳遞心法的師父會興之所至，然後就傳遞了心法。我很榮幸，有著很好的法傳。這些其他人渴望卻得不到的經驗，我卻輕鬆的，只是因為傻傻的聽話照做，就得到很深的灌頂和口傳。這和現在以商業手法來開的課程，學生資質不一，老師也不是真的很滿意所教的學生，這樣的師徒品質，實在差別很大。


    因為有了很神奇的師父在前，於是，當我成為老師時，教學也就變得有趣了。特別是工作的團隊全都是懂能量的小夥伴們，特別在於與學生一起共創時，我總能因為靈感而給予學生們更適當的指點。這樣的工作模式，也延伸到各地的聖地旅行，在不同的地方得到當地土地的啟發，得以提出不同的靈感訊息，貢獻給當時一起工作的夥伴或當地主辦方。


    這種走向未來的能量共創，在能量場域中已經是可以看到的事實，也是一種可以見到的競爭力。往往在各地結合的工作成果，都可以為當地帶來美好的火花，甚至是在事業財富上的火花。


    ### 以愛療癒


    跟隨愛，可以找到尊敬的師父，也可以成為有愛的導師。


    ## Chapter 7. 我的東西方啟蒙老師


    你在意的品質是什麼，就能創造什麼品質的人格特色。

    而當一個人充滿熱情的走在自己的路上時，那是全然專注的。


    第一次見到各帝·參夏仁波切這位老者，是在他的大法會中，那是一個觀音慈悲的修法會。慕名而來，不過不是因為我特別崇拜他，也不是因為藏傳佛教，而是我因為能量的干擾，知道觀音的慈悲能量或許對我有點幫助，於是透過朋友的引薦前往「觀摩」。


    有句話說得很好，愈是高智慧者，就愈謙卑，而愈是低階的無知之人，反而會傲慢。不好意思，我正是那個無知的傲慢之人，所以對於任何的高人，我都會以「懷疑」的眼光來「檢查」。我不會特別崇拜，也不會特別敵視，但我心裡明白，自己有一種「敏感的驕傲」，對於那些感應不到的人們，我的內心中還是有一種驕傲與傲慢。


    於是，帶著這種傲慢之心，以及自以為是的不一樣的眼睛，如同楊戩的第三眼，我有著無以言喻的傲慢，自以為很「與眾不同」。


    在前往會場的路上，我便感受到一種不一樣的氣場。雖然是大白天，天氣也很好，但我卻看到濛濛的氣場，好像迷姊迷妹們等待偶像一樣，大排長龍的排在門外。當然，其他人是看不到他們的。忽然間，我有點嚴肅了起來，心裡納悶，為什麼那些無形都排隊在門外呢？


    朦朦朧朧的，我帶著一點點的不安進入到演講大廳。一進入大廳，兩尊大大的「什麼」就站立在高臺的兩邊，我猜那是一種保護的能量場（後來知道那叫做護法），我依然有著一種在外旁觀與不太信任的批判之心，於是，我選擇了最後一排。現場應該有上百人吧！


    小老頭上臺後，我開始驚恐了，然後逐漸由驚恐，到好奇，到安靜，到認真地參與整個活動。在現場，一個老老的、矮矮的小老人站在臺上，他的光芒穿透了整個會場，穿透了最後一排的我。


    「我也想像他這樣！」我的心發出了一股聲音。


    我想，當年佛陀的感召力大概就是這樣吧？而阿難對美女的吸引力，那些大修行人所形成的一種「美好」氣場或長相，真的太迷人了。於是，這些形成美好能量場的人，吸引了許多渴望一樣美好的人，我就成了小老頭的其中一個迷妹。


    我沒有很迷的心，只是遠遠觀望著，欣賞著，我也不會衝向前去拉著師父的衣角，成為其中一個會員。但上師的光芒已經深深地穿透了我的心，我的淚水在現場就像看了一場精采的電影，剎那間，一股向上的光芒出現。這些法會的光芒，在日後的生命中經常出現讓我看到，我想，這一再出現的光場，可能都是在示現給我這個愚蠢又自以為是的凡人看到，一再證明地讓我看到，讓我信任這個能量的世界，是真實存在的。


    但儘管一再出現，我卻因為生命中一再遇到的困境，常常還是在懷疑之中。


    我在現場，第一次看到了所謂的保护能量（護法）異常的強大，又高又大。然後，我也看到師父自身的光芒，穿透了在場的每一個人。這個光場，在多年後的貴陽，我的市場部經理，也在一個吃飯的聚會中看到了我的光籠罩全場，剎那間她感受到我的善與愛，當場淚如雨下。


    但是，在這法會現場，我看到的不僅這兩種層面，還有那些默默藏在一旁，等待被光明照亮的黑暗能量團。也許你會形容那是眾生的靈體，或是什麼無形的遊魂，但我只想以「能量體」來形容，不想以我的個人文化意識來擬人化的形容。


    面對無形世界，擬人化讓我們總是回到人性之中。而這個世界，其實有著超越人性的其他場域，如果我們只深深地抓住了人性思維，便無法理解奧妙的能量境界。所以，為了避免誤導我們自己的心，或其他人的思維，我用顏色和能量體來形容，或許能更為客觀一點來詮釋我所體悟到的世界。


    那些默默守候的眾生，隨著進來的有形形體（人）一起被光芒照亮著。許許多多本來濛濛混混黑黑的能量，開始變得明亮，其中很多忽然就消失了。等到整個法會結束，那些等在外面的能量團已消去了大半，場外的氣氛不再沉重，現場的人也好像忽然覺得天氣更好，自己的心情也變好了。


    而我見到的是，整場的光芒像是開了燈光一樣，人心的燈，現場的燈，我已經分不出差異。我的腦子覺得昏昏的，無法解釋，但我的思想仍在對抗著。銜接著質疑思想和昏昏感受的橋樑，則是我說不出的震撼感。


    這樣被光所吸引的我，從此陷入到光明與黑暗的歷練中，不僅是心靈的光明與黑暗，身體的光明與黑暗，還有靈性的光明與黑暗，這種種的考驗似乎才是開端。


    ### 我的西方啟蒙老師


    我的西方啟蒙老師，是在美國的凱洛老師。她是我在黑蜘蛛的經歷後，不想放棄下所遇到的西方啟蒙導師。


    之前遇到那個巴西人之後，我的心實在有點不甘心，也想找出自己倒楣的理由。然後，我找到同一門課程的另一位老師，我想再試一次。如果第二次的體會，老師還是一樣的爛，那我就永遠不再參與這個學習，或許就表示西方來的這種靈性課程不是我的菜，我也不合那些老師們的口味吧！


    於是，我上網查到另一位老師也有課程，我打了電話過去，遇到了一個迷人的聲音。我深深的感覺被一種強大的療癒和理解包圍，沒有見過對方，但我的心便想要前往了。三天不到，我訂了機票飛去美國，尋找我未完成的答案。於是，遇上了凱洛老師，也改變了我的觀點。


    在電話中遇到的那個迷人聲音，原來不是凱洛老師，而是她當時的主辦人兼助理。課程像是幾個女性的聚會，在助理的豪宅家裡開課。一些美國有錢的人，也喜歡這些美美、高靈性的能量課程，我加入之後，大家非常好奇，凱洛老師更沒有遇過東方來的學生。現場的所有姊妹們都年長許多，我成了年紀最小的學生，每天聽著媽媽姊姊們的叮嚀，在充滿異國與新心靈的聖地牙哥，一待就是十天。


    凱洛老師是引導我進入色彩能量世界的啟蒙老師，她最大的特色，不是因為知識廣博，也不是特別會做行銷賣弄自己，更不是一直吹噓自己有多麼神通、多厲害。她是色彩世界工作者的啟蒙老師。美國在全球的能量工作推動上算是非常重要的地區，許多新思潮都是由美國開始流行起來的，也由於美國這個大熔爐國度，許多國家的移民力量都會進入到美國，因此，當年由美國開始源起時，也是一股很強大的推動力引領著我前往取經。


    但凱洛老師完全顛覆了我們中國學子對老師的認知。我們認為老師應該懂得多，錯得少，但凱洛老師卻總是告訴我們，她不是很明白這部分，她會再去確認。她有時候也會在課程中，告訴我們她自己的疑惑，很少有老師可以如此坦誠地去承認自己內在的世界，並且如此敞開。一開始，我覺得不太適應，因為這並不符合我們對老師的期待。


    但一次次的，我發現凱洛老師並不是真的不懂，只是她往往會很誠懇地往內去探索、去覺察，她其實懂得非常多，甚至是數字學大師、古神祕學大師，但她卻從來不會這樣告訴他人；相反的，她常常表現出來的，是對社會的關懷，對女性和小孩的關心，對大環境國際局勢的關注。


    她不是一般的女性，早在十九歲時，就開始參與了美國的社會運動，並且積極參加改革與藝術教育。凱洛老師對愛的追尋，最令我震驚。特別是年輕時候的我，只因我心中只有父母和家族朋友圈的示範，家人們都婚姻幸福和諧，也都中規中矩地過著小日子。但凱洛老師卻成功示範了一個新女性在傳統社會中的努力，她勇敢創業，勇敢面對婚姻的失敗、事業的挫折，她也勇敢地養育了自己的子女；五十多歲遇到真愛，也認真的去愛。現在七十多歲的凱洛老師，和老伴走了二十多年，師丈是知名的植物學家，兩個人相遇在身心靈的課程中，對靈性世界有共同的愛好。


    遇到凱洛老師，遇到凱洛老師和師丈的靈魂之愛，也改變了我們以為老女人遇不到真愛的錯誤價值觀。更有趣的是，老師一直就是這樣認真的活著。在老師的課堂中，她智慧女性的睿智之光，常常令我感動到莫名的想哭，第一次上她的六天課程時，我哭了六天。一方面是因為遇到巴西黑蜘蛛老師的委屈，終於有人可以傾吐，雖然凱洛老師也無法給我任何這種遭遇的答案（她不會通靈看前世），但凱洛老師會默默的陪伴著我，並且給我一點智慧點評。這種點評，二十年來沒有間斷過。


    往往我們會透過網路視訊，只是聊聊彼此的生活日常，然後害羞的師丈 Henry 就會在旁邊默默的出現打個招呼；有時候師丈也會給我們來個男性點評，而老夫妻兩人特別關心我一直沒有著落的感情世界。凱洛老師以「亞洲
    Coco」（香奈兒女士的名字）來稱呼我。從很早的時候，凱洛老師就對我預言，「Isabelle，你是亞洲女性勇敢又智慧的代表，你是亞洲版的 Coco。你也代表了亞洲新女性的強大力量喔！」


    雖然老師的物質生活一直不是很優渥，但她和先生對於能身處在能量世界與大自然中感到滿足（他們有大花園，有小狗，有滿院的花朵植物，也有著他們夫妻創造的自然植物精華水）。凱洛老師熱愛藝術和烹飪，對於社區教育也有著強烈的熱情，往往她也會聚集一堆婦女摔盤子，大家利用色彩工具來做各種生活創作，甚至做成家庭裝飾品。


    凱洛老師常示範給我一種溫柔女強人的清明智慧和居家示範，她也經常鼓勵我，不要放棄去愛，要勇敢追尋。我想，西方女性和東方女性最大的相同，就是女人在男人世界的覺醒。但不同的卻是，西方女子對自己的鼓勵，往往勝過東方女子；西方女子對自己的愛的追求，不會因為年紀而停歇。這個優點，在年輕的我的生命中，給了我無限的可能性。


    無形的導師也是我生命中神奇的經歷。


    對於一直以頑固而死板的頭腦生活的我，另一個世界的能量引導，完全打開了我的僵化。Aura-Soma 的維琪·渥爾（Vicky Wall）女士是引導我進入身心靈產業的無形導師，她於一九九一年逝世於英國，但一九九一年卻是我在弟弟過世後接收訊息最頻繁的一年，同一年份中，我們在不同的地方和時空裡結下了一個彩虹誓約，然後在多年後，二○○○年的千禧年相遇。


    維琪·渥爾女士是英國的手足科醫生，天生自然的療癒力量以及眼通能力，並沒有給她的人生帶來財富和幸福。相反的，她的情感世界，以及自小情緒與身體的受虐經驗，讓她的生命充滿了坎坷。但她卻在晚年創辦了一個以大自然精華為主的產品系統。


    生命最後的七年，她還沒有完成整個體系就因病過世。我無意間在加拿大的雜誌中見到了這個系統產品的介紹，沒想到回到臺灣就見到了產品直接擺在面前。在夢中相遇的創辦人維琪·渥爾女士，在每一次我不能理解身心靈世界的攻擊和背信的商業險惡中，往往會出現來指引我，叫我做我自己。


    也或許有著這樣的創辦人在背後支持，我硬著頭皮聆聽內心的指引，一路堅持走下來。第一次想放棄時，夢中的維琪女士就出現來教導我成分，並且帶我去看產品的保存。夢中一個黑一個白、且非常高大的大天使，看守著產品的材料。女士回應了我二十個對系統的疑惑及使用上的問題，但醒來後，卻只記得最後一個問題：「我要不要做別的事業？」維琪女士在夢中直接以英文回應我：「No！」


    第二天，所有的一切彷彿如有神助，我開始了非自願治療師的工作，進入了身心靈的領域。


