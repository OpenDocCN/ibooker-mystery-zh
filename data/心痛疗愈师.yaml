    從一開始，我就是形單影隻，因為我不曾屬於任何教派，也沒在商場上打滾的經驗，我只有文化人的背景，只會寫書，後來教書。光是這樣，我已經不夠格成為一個經營者了，但身為會說中文的第一位華語講師，對於英語世界的市場來說，這是踏入中國人世界非常重要的第一步，也是東西文化能量交流的第一步。


