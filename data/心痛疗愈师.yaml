    ## Chapter 11

    ### 生存的考驗


    我相信人的未來可以自己創造，更相信如果日日修持心念，能量提升到另一個更高的維度，就可以破解業力密碼。


    無意間的藍色平靜，帶領我進入了一個新的世界。


    我的年代對於身心靈的事業，和佛教的公益、社會上的慈善，甚至和宮廟、算命的工作，感覺上是很難分清楚的。對於金錢，多半認為應該是以捐獻來當作收入來源；如果要收費，那麼像我的家庭，就是不迷信的家庭，是不會花錢去做什麼事，也不覺得需要花錢捐給廟宇、上師，或是尋找算命，來解決問題。在社會上有一派人認為，進入宗教或找算命的，多半是屬於脆弱或心裡有疾病的一群，比較需要依附他人而生。


    臺灣是一個奇妙的島嶼，它和夏威夷一脈相傳。同樣的山脈，列木里亞的古老文明，一樣位於地震帶上的不穩定和隱藏的爆發力，讓這塊土地吸引來的靈魂，都彷彿特別失根與無助。不過特別的磁場所帶動的人群，又特別崇尚心靈世界。換句話說，也因為沒有太多沉重的民族包袱，又喜歡外來文明，所以對於外來的任何新事物都很易接受。


    我曾經聽過一位心靈老師說，任何在世界各地不紅，沒有知名度的心靈導師或宗教，或傳銷事業，只要來到臺灣過一過水，都可以紅起來。我有時候覺得，臺灣人的純樸和友善也是一個優點，雖然有時候我們似乎有點愚痴，但又充滿世界奇蹟的智慧。這個小島，我們真的可以稱之「奇蹟之島」。


    我的父親不是跟著國民黨來到臺灣的部隊老兵。他原在香港，因為不想當二等公民（當時還是英國屬地），於是撕掉了香港身分證，到了臺灣。我的母親雖然祖籍大陸，但實際上一天也沒待過大陸，她在母親肚中就來到臺灣，生長都在臺灣。


    正因為沒有家庭的支持，我的父母是真正屬於失根的一代。戰後嬰兒潮的一代，他們沒有真正的家和土地，所以來到臺灣，努力的想要生根茁壯，特別是自小失去父母的爸爸，和只依靠著外婆的媽媽，儘管兩大家族來頭都不小，但對於我的父母來說，都是虛幻的，沒有任何金錢的支持，他們只能依靠自己的努力，和來自大陸家族祖先慎終追遠的傳統信念而生存著。


    我的父母是很了不起的一對夫妻，他們雖然一直承受著不是很順利的人生，卻很融入臺灣的土地。母親的閩南話流利，甚至還加入客家團體，熱心參與社會公益和志工服務，也努力接受政府支持的各種社會服務訓練，有時候我都不得不佩服母親能如此自然地融入當地生活。父親雖然靦腆，經商失意後也因為資深的商業背景和專業管理素養，而服務於企業界擔任顧問，儘管一直遇不到心胸開闊的好老闆，卻也清高得如一縷青煙，勇敢而光明的活著。


    父親過世前開始進出醫院洗腎，他曾告訴我，如果讓他現在就離開世界，他回顧自己的一生也是心存感恩的。雖然有很多的不順利，但父親認為自己能活著長壽，並且曾經擁有過一切的豐盛，對於一無所有來到人間的他來說，已經很值得感謝了。


    我非常驚訝，父親在晚年竟然不會記恨放他高利貸的親叔叔，也不會記仇害他破產背叛他的朋友，更不會因為獨子的英年早逝而怨嘆；對於他自己一直無法遇到好老闆，總是遇上奸人，他也從不記掛。


    父親的心中總是保有一片光明的園地：對當下所擁有，及過去曾擁有過的心存感恩。


    這種不貪、不求、不攀緣、不依附、不強求的個性，雖然辛苦了他的妻子，眼看不是個成功的人生，也不是個成功賺大錢的富裕男人，讓他的妻子也跟著匱乏。但是，父親的風骨卻贏得了家族和同事晚輩們的敬重。


    我想，我投生為父親的女兒，雖然一直因為爸爸事業上的困頓，必須養家而一直活在生存的恐懼中，但從靈魂的角度來看，如何在需要生存之際卻不貪心、不擔憂，這樣在生存中的磨練，可能才是人生中最後看破與解脫的關鍵之處，我只不過是提前在早年開始練習罷了。


    父親年少在香港開始學習少林拳，也學習打坐與太極拳，更熱心資助朋友和晚輩。這些俠義精神也一直影響著我，令我充滿了急公好義或愛恨分明的強烈性格。父親在財富上的匱乏，雖然多少磨損了他的意志，但高傲的風骨卻也深深讓我學在心中。只可惜，我體驗到人到老年，如果沒有心靈的世界為依託，那麼老年人的世界是十分孤單寂寞的。如果沒有濃厚的愛或親密關係可以分享或表現出來，那麼生命就更容易早早凋落。


    我雖然在父親生命最後的三年，因為父母的渴望，而返回臺灣更多的時間，卻也因為一直以來對生存的考驗放不下，各地奔波工作，而失去了與父母更多相處的機會，十分可惜。


    我的父母是很標準的業力人士，他們人很好，很努力，也熱心對他人，卻總是時運不濟。我總無法理解，為什麼人很好卻還會受苦？父親運氣不好的事，等我長大理解後，很多次我都覺得非常不可思議。但我不承認這是業力，我也不喜歡那些算命的或宗教人士的說法：業力，前輩子怎麼了，所以後輩子怎麼了。我覺得那些人只會道聽塗說，沒有根據，而且往往是馬後砲，沒有實踐精神。特別是我也會有某些感應，我總感覺不到那些說話的人有多少自己的正能量。因此，從很小起我就不信這些套路。


    但對於自己的父母，我百思不得其解，直到我在英國夢到了父母的本質，我才稍微緩解了這些前世今生的說法。我內心的靈性洞見，讓我看到了其他維度，以及其他層次的解釋。


    我相信前世今生，我更相信活在當下。我相信人的未來可以自己創造，更相信如果日日修持心念，能量提升到另一個更高的維度，就可以破解業力密碼。


    我一直很想改變父母，就像是一直不容許我自己犯錯，無法接受我自己的不精進。但很奇怪的，就是有一個看不見的大手，似乎在後面主導著一些事情。你的命運有時候有著規劃和限制，但那又似乎不可打破，只是需要更加努力。靈學老先生莊老師說：「修行勝五行。」往往我們明白，但在身體力行的時候，卻是考驗重重。


    家中的經濟情況一直不是很理想，有時候我賺的錢，前腳進後腳出，沒有在手上熱一下，就馬上得轉出去。我用了很多種方法，卻不能明白為什麼家中始終缺錢。這也造成了我的拚命三娘不服輸的個性。從小我就有個強大的信念，就是可以為我愛的人去拚命。所以，因為很努力的個性，讓我的工作沒有停滯期。不過，生存的考驗，在一個不太能以金錢計算的世界裡，還是很辛苦。特別是人性在遇上金錢的恐懼時，往往脆弱到不堪一擊。


    剛拿到色彩諮詢師的資格時，我就開始被流言攻擊，二十年來從未間斷。一開始的流言是指「我不具資格」。我不太明白靈學老師和佛學老先生對我的鼓勵，是因為見到了未來的什麼景象，但我對於老師們的鼓勵從不懷疑，所以我認真的在色彩療癒的團體中努力認真工作。我一直以為把自己弄好，不隨便對人哭泣抱怨，遇到他人有狀況時認真解決，一個人只要有專業和風骨，總是會有飯吃的。事實證明也是如此，我從未失業過，但對人性的不理解，就算會看能量，也是常受到驚嚇，不明白人心的黑暗。因此，對我的工作來說，要一直眼見黑暗，就是一種辛苦。


    同業的攻擊我覺得很奇怪，但一古腦地為了家人的生活而努力，總沒有多餘的時間想太多，而我深信兩位老先生叫我利益眾生的工作是不會害我的。所以，除了認真工作，就是努力修持自己，追求一個女人想要的幸福美好。我以為人間應該還是光明美好的，而我，就是光明的使者，我是帶光來給他人照亮的人，我是這樣相信的。


    不過，世間法好像不像我們讀書和打坐那麼簡單。


    臺灣的殺價文化、人情文化、八卦文化、抹黑文化，連小小的身心靈界都分派分系。老師和學生的交惡背叛，同業的互相競爭，到了國際場合依然自己人攻擊自己人。我很幸運沒有什麼同輩和同業，因為在一開始我就是一個人。但是，臺灣的市場是，當大家都覺得這是一個好賺錢的門路時，就會出現很多一起搶飯碗的人。我一直以為盜亦有道，賺錢在身心靈界應該是最守道德的環境；不過後來我發現，好像我也有所誤解。因為對於有錢的人來說，賺的是另一種金錢價值，但對於生活匱乏的人來說，搶的只是金錢，完全沒有步數和格調。


    我錯估了這個世界。雖然還是很努力地做著我相信的心靈志業，而且朦朧中知道自己被上天保佑著，得道多助，但我的眼睛和心總是會被黑暗的事物所吸引。愈光明，黑暗的包圍就愈多。漸漸的，我不得不把心思，只用來關注在自己的內心平衡和養家餬口上，不太去想更高層次的事物。因為如果我期待很高，那麼失望就會愈大。


    對我來說，我總是很難在心靈與物質間找到平衡點。我的辛苦在於，得為了養家不能出家或離群獨居，也有因為有著「天命」，而必須認真誠實的面對自己的內在世界。一個做著標榜平衡與愛的工作者，卻與平衡愈來愈遠。我不知道從什麼時候開始，我對工作沒啥大樂趣，錢賺得容易，卻一直被黑暗人心包圍。我滿滿對人的熱忱和愛，逐漸被黑暗的人事物和負能量吞噬。


    漸漸地，我愈來愈聽不到自己內心光明的聲音，我感覺自己不能融入黑暗的那個族群，但我又脫離不開這個賴以為生的群體。愈趨近核心，所見的黑暗就愈多。慢慢的，我對於我的西方師父們開始產生了懷疑。我想，他們如果夠高，為什麼還對金錢放不下？為什麼慾望愈來愈大？為什麼臉愈長愈歪斜？為什麼不是創造各國和諧，而是在各國創造各國人民的自相殘殺？我也不能明白，為什麼靈性導師自身的情感關係也如此複雜？我的誤解和質疑愈來愈大。


    我發現，坦白和熱忱不能真正贏得靈性導師對我的喜愛，原來還是需要會巴結與搞崇拜。我很努力地為了我所信仰的靈性事業努力著，卻逐漸發現這些為錢爭執的問題愈來愈多。我也發現自己如果太聰明，功高震主也一樣會被不友善的對待。更重要的是，我以為人與人是有情有義的，特別是在一個重人性的心靈環境，但服務了二十年的機構，依然會有「信任」課題。而不信任的源頭，卻是從一踏入行業就遇到的「流言」與「八卦」。


    我不是明星，不會承受像那些大明星所面對的流言蜚語，但我在業界或許是個混得久的小明星，當我只想穩穩的依照正能量法則來教化人心，或是用另類的自然醫學療法，為一些信任我們的朋友解決身心靈的迷惘與痛苦時，我發現自己也無法倖免於難。永遠也無法擺脫大家的目光，也無法擺脫所有人的偏見，就算再努力完美，不心存惡念，為自己曾經的過錯或魯莽懺悔懺罪，要繼續責怪你的人還是會繼續責怪，想要把你搞垮的人還是會繼續他們的志業。因為唯有這樣，他們才有活下去的力量。


    負面的生命力，永遠大過愛和光的影響力，但也比較容易賴以維生。就像在選舉中的抹黑或社會中任何的負面傳言，你只能在傳言中成為傳奇，而傳言就是提升你變成傳奇的強大動力。曾經我一個彩油'
  mdcn: '## Part 心與物質的生存考驗


    是傲慢和自大讓她卡住了。


    第三步，原諒。


    當我們嘲笑自己的同時，是不會感受到愛的，而原諒就是愛的表現。茹絲開始明白自己的心，因為過去一直用批判替代了愛，所以不能容許自己有時間生病，不允許自己慢一點。很急，很快，是她想要的，但「成長是需要時間的」，我們無法拔苗助長。


    三個步驟，可以充分放下障礙我們的「思緒」。我們只需要把如同雜草般的念頭梳理，除去雜草，頭腦就清明了。


    再一次，我們透過色彩能量的直接呈現，達到了意識的提升。這個過程，就是管理好我們的雜念了。


    這是在量子力學中，心想事成法則中的前半段。如果可以用能量的概念清除雜念，後面的心想事成，就會事事如意，建議不妨一試，保證有效。


    ## 以愛療癒


    愛和恐懼不會同時出現，我們只願選擇愛的道路。


    ## Chapter 11

    ### 生存的考驗


    我相信人的未來可以自己創造，更相信如果日日修持心念，能量提升到另一個更高的維度，就可以破解業力密碼。


    無意間的藍色平靜，帶領我進入了一個新的世界。


    我的年代對於身心靈的事業，和佛教的公益、社會上的慈善，甚至和宮廟、算命的工作，感覺上是很難分清楚的。對於金錢，多半認為應該是以捐獻來當作收入來源；如果要收費，那麼像我的家庭，就是不迷信的家庭，是不會花錢去做什麼事，也不覺得需要花錢捐給廟宇、上師，或是尋找算命，來解決問題。在社會上有一派人認為，進入宗教或找算命的，多半是屬於脆弱或心裡有疾病的一群，比較需要依附他人而生。


    臺灣是一個奇妙的島嶼，它和夏威夷一脈相傳。同樣的山脈，列木里亞的古老文明，一樣位於地震帶上的不穩定和隱藏的爆發力，讓這塊土地吸引來的靈魂，都彷彿特別失根與無助。不過特別的磁場所帶動的人群，又特別崇尚心靈世界。換句話說，也因為沒有太多沉重的民族包袱，又喜歡外來文明，所以對於外來的任何新事物都很易接受。


    我曾經聽過一位心靈老師說，任何在世界各地不紅，沒有知名度的心靈導師或宗教，或傳銷事業，只要來到臺灣過一過水，都可以紅起來。我有時候覺得，臺灣人的純樸和友善也是一個優點，雖然有時候我們似乎有點愚痴，但又充滿世界奇蹟的智慧。這個小島，我們真的可以稱之「奇蹟之島」。


    我的父親不是跟著國民黨來到臺灣的部隊老兵。他原在香港，因為不想當二等公民（當時還是英國屬地），於是撕掉了香港身分證，到了臺灣。我的母親雖然祖籍大陸，但實際上一天也沒待過大陸，她在母親肚中就來到臺灣，生長都在臺灣。


    正因為沒有家庭的支持，我的父母是真正屬於失根的一代。戰後嬰兒潮的一代，他們沒有真正的家和土地，所以來到臺灣，努力的想要生根茁壯，特別是自小失去父母的爸爸，和只依靠著外婆的媽媽，儘管兩大家族來頭都不小，但對於我的父母來說，都是虛幻的，沒有任何金錢的支持，他們只能依靠自己的努力，和來自大陸家族祖先慎終追遠的傳統信念而生存著。


    我的父母是很了不起的一對夫妻，他們雖然一直承受著不是很順利的人生，卻很融入臺灣的土地。母親的閩南話流利，甚至還加入客家團體，熱心參與社會公益和志工服務，也努力接受政府支持的各種社會服務訓練，有時候我都不得不佩服母親能如此自然地融入當地生活。父親雖然靦腆，經商失意後也因為資深的商業背景和專業管理素養，而服務於企業界擔任顧問，儘管一直遇不到心胸開闊的好老闆，卻也清高得如一縷青煙，勇敢而光明的活著。


