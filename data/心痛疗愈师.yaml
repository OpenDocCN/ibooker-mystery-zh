    # Chapter 10. 這不是我想像的身心靈行業


    我開發最簡單、卻立即有效的雜念管理法，也許可以為紛亂的你，找到意識清晰的最簡單方法。雜念管理的三步驟：


    +   第一步：接受，了解心理動機（所有的行為都有背後的動機）。

    第二步：放下，透過放下信念（了解之後才能放下）。

    第三步：原諒，原諒行為模式（放下之後就能原諒）。


    我們以高階治療師茹絲的真實案例，來套用雜念管理的三步驟：

    第一步，接受。


    在課程中，身體不舒服的茹絲先接受自己身體失去力氣的現況，並開始探索自己身體背後的心理動機為何？茹絲意識到，她好不容易抽出時間來進修，眼見同學們都認真的學習，並且馬上有所體悟，但她的身體竟然開始不聽使喚。她一方面氣自己的不爭氣（我怎麼可以有這樣的反應），也很著急自己「跟不上」。愈急，身體就愈無力，怎麼辦？

    既然抗拒讓我們無法進入改變的情況中，那麼就接受吧。


    +   第二步，放下。


    茹絲理解到，她內在極大的自我，產生了對自己的批判，同時也令自己不願意走進課堂中，以免自己失敗，被同學比了下去，證明自己的不夠聰明（以往她是不必太用心，也不用花時間，就可以輕而易舉的學會任何技巧，讀懂任何知識）。今天，茹絲需要放下自己過去的傲慢，而因為理解了，所以也就放下了。她自己也笑自己：「一直認為自己的基因很好。」


