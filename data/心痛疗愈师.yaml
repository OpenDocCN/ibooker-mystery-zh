    人生如夢，夢如人生。在很小的時候，我常夢到一些新鮮的故事情節，有古裝，有科幻，在月球上的，在外太空的，又或是常夢到自己在飛，飛去巡視某些地方，甚至有時候會不小心飛到奇怪的地方，出現一些好像不是我的世界的一些怪怪人類。一旦覺察到自己跑到感覺不安全的地方時，大吃一驚下，就可以安全地離開夢境。但有時候是夢中夢，要一連醒來好幾次，才是真正的醒來。後來有學生告訴我，說他們在夢中夢到我，或在夢中和我討論，其實是很多時候我去了學生的夢中「說教」，或解答一些問題，或告知疾病的解決方法、來源罷了。

    這是很平常的事情，我沒有向任何人提起過，因為這是我的祕密花園。


