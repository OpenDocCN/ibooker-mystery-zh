    我常常看到一方非常堅持，死都不肯妥協的夫妻，只能覺得，他們在貪瞋痴的三種色彩失衡漩渦中，似乎還沒夠，也不想走出來，甚至以此為生命的動力。有的夫妻彼此整鬥很久很久，我常常覺得，這種「蠢人蠢事」實在不該發生，但當人們不理解能量時，其實就是這樣活著。轉眼間，人老珠黃，齒牙動搖，為什麼不趁著大好健康年輕時去提升，而非要把對方拉下地獄才罷休呢？


    這種依賴毀滅的親密關係，實在很可怕，幸好我的學生都在勇敢之後，願意成為家庭光明的種子，成為改善關係的大使。然後雙方有一方想通，至少這段關係就會再延續一陣子。


    ## Chapter 24. 轉換頻率到下個階段


    轉換自己的頻率，是我們自己唯一能做的事。如果想走進愛裡，就必須要先成為愛。因為我們只能「吸引」，別無他法。


    在很早的時候，我就覺得自己和課程主辦方，或是助理，或是經紀人，總是會有著合作上的能量感，很微妙，這種合作感就很像是伴侶關係。


    遇見對的伴侶和合作方是一樣的概念，也是能量的考驗。我們往往在尋找愛的路上遇不到正確的人，或是老是遇到痞子無賴，但不管是哪一種相遇，都是一種愛，也是一種靈魂的體會。愛上自己，才能愛上另一個自己。


    在愛中，流動頻率如同空性，而我們在宇宙的迷航記中，只能順著愛的流動走著，絲毫勉強不來，也沒有辦法違逆更高的安排。


    在伴侶關係中，如果想要走得更順暢，唯一的方法還是提升自己。因為在流動的能量場中，你唯一能夠掌握的只有自己的心。能轉換自己的頻率到下一個高度，才能體會空性。其實沒有什麼好抓住的，如果事事抓住，就無法成為好情人。


    倘若眾生是我們的情人，那麼，我們如何能對身邊的有情人施虐，令其不開心呢？又或是，我們要如何感謝充滿愛的眾生，成為生命的友伴？就因為這樣，我和愛的人，相遇，相知，相惜，卻也互相磨合。因為有愛，所以充滿包容；因為有愛，我們知道不完美也很美。我們以愛療癒，也互相修練，共同邁向更好的未來。


    ## 核心體悟


    在還沒有達到自己滿意的時候，我們總是會刻意地想要轉換頻率。直到某一天你不刻意轉換頻率了，不努力奔向蛻變的道路時，才會發現自己可能已經正在轉化中，已經蛻變了。


    這種能量上的體悟是很微妙的，每次遇到不能解決的問題，有想不透的因果法則時，我就會停下來思考，必須「想通」。這想通不是找到解決的方法，而是「感覺通了」，一旦感覺「通了」，就會自動有解決的方案進入腦海。長年我都用這樣的方式，來解決商業上或人際關係上的問題，這幾年開始為自己的打造品牌時，這樣的靈感更是愈來愈駕馭得順手，我也不再用頭腦來想破頭，只需要交給能量，交給自己的心，然後就可以逐漸出現做事的方法。


    我很習慣這樣的工作狀態，因此幾年下來，我已經開始不做年度計畫，因為該出現的道路總會自動出現。


    後來感覺比較吃力的部分是人的問題。有時候我執意的希望跟某個人合作，就像是男女交往初期，以為這個人十分契合，甚至覺得應該就是結婚的對象了，沒想到才相處幾個月，就發現三觀差太多，甚至是道德上的歧異，根本無法再繼續相處下去。


    我一直很努力這個部分，直到有一天我發現，又不需要太努力了。


    那也是另一個靈啟的經驗。一次回到臺灣休息，我開始發現一個訊息出現，告訴我以後不用太努力工作，工作不用太多，而財富還是會繼續出現，甚至我很明確地感知到，不必再恐懼生存的課題。於是我清楚地知道，又到了工作減量的時間了，而且愈來愈明白，輕鬆不費力賺錢的概念是什麼。那就是在你準備好之後，進展到下一個維度的境界時，將沒有痛苦，沒有恐懼。當然，一切都是被準備好的豐盛，這是能量層次上必然的境界。


    我明白自己即將度過「恐懼」的關卡，這個困擾我多年的內心掙扎，終於在我不斷努力的突破和進步中，得以邁入進化的殿堂。


    ## 自我療癒


    ## 轉換到對的頻率


    其實，所有的道理和教條都很有道理，也都是對的。「當你準備好自己，改變了自己，對方就改變了」、「當弟子準備好時，師父就會出現了」，這些老掉牙的老生常談，現在聽起來，竟然一點也不老掉牙。


    古人的智慧，到了靈性的殿堂裡，反而成了經驗的法則，只是你雖然相信了，但有沒有實現才是最後的考驗。沒有親身驗證，總是會在千鈞一髮之際敗下陣來，因為沒有親自走一遭，就會在最緊要關頭時出現「恐懼」和「信任」的考驗。所以，這種實戰經驗就如同修行的實證經驗一樣，不僅帶來強大的信心，也可以創造奇蹟的果實。


    以下是我的實戰經驗：


    1. 啥也不做

    如果只是沉思，啥也不做，你敢嗎？


    2. 開始只是吃和睡

    這也是個很難的功課，因為很有可能就回不來，就一直懶惰下去。


    如果有人指導，或是自律精神足夠，可以嘗試這樣的方式。只是「吃」和「睡」。養身體，讓自己滿足，身體的養分足夠，便可以產生正向的感受；如果沒有養好，情緒就會出現問題，更無法提高頻率。


    3. 開始放下一切的得失

    把自己逼急了，也不過就是在得到和失去中間打轉。但如果沒有得到，也沒有失去呢？生活還可以繼續過下去嗎？


    所以，既然現在沒有得到，也沒有失去，什麼都不重要，又何必放在心上在意呢？


    4. 生活在簡單之中

    做一些讓自己快樂的事。首先，丟東西，丟掉所有不用的、無用的、用不到的東西，包括，清理掉手機和朋友圈中的不用名單。然後，簡單的活著，看著自己手上擁有的一切。


    5. 充滿儀式優雅的寧靜感

    生活或工作的空間也如同神聖的殿堂，每一天的生活都可以活在神聖的能量空間中。如果可以，在家中清理出一個神聖的區域，依照信仰放置些聖物，或只是一盆花、一個水晶、一個坐墊、一個可以擁有安靜的空間。


    6. 讓身體動起來

    身體所有一切，是可以自行轉動起來的，而最好的開始就是運動。打掃家裡也是運動，但有計畫的運動更能提高頻率。


    7. 只是放鬆，還是放鬆

    讓身體和心理都輕鬆起來，都放鬆下來，感覺身體沒有負擔，心裡也沒有負擔，然後去覺察這種輕鬆。哪裡很緊，就繼續地鬆開。


    8. 接下來，只是等待

    等待對的時機，對的狀態，遇見對的人，對的一切，對的環境。

    重點是不背叛的人、不欺瞞的人，因為你用了真心，也會有人真心以對。

    那些痛苦和糾纏的關係，都不需要留戀，就留給那些喜歡在痛苦中去的人去享用吧！


    ## 以愛療癒


    想走進愛裡，必先成為愛。我們只能以愛吸引，吸引愛的同頻。


    ## 結語／接下來呢？


    曾經，我的工作團隊夥伴問我：「老師，大家都渴望有你這樣的能力，為什麼你反而不渴望？是因為你天生如此，太容易得到，所以覺得沒什麼嗎？像我們都好想擁有你的功能，我們很想要得到。」


    我立即不給對方思考的時間，馬上提出問題給這發問的兩個夥伴，「如果在『有錢』和『通靈』中，你只能選一樣，那你會選擇什麼？」她們馬上毫不猶豫異口同聲地回答：「有錢。」這樣不假思索的答案一出現，兩人都嚇了一跳，也同時笑了出來。


    答案不攻自破，因為一切都是你的選擇。而在你只能選擇一樣的時候，你會在意什麼呢？


    能量和心靈的平衡世界，在於你和真實的自我相處愉快，而不是在生活中賺進了財寶，卻失去了自己這個愛人。量子物理學法則中的平行實相原理，可以理解我們的原子關注力產生出影響力，例如，你關心的是衰退和負面，你的存在便是衰變和衰退的負面發展；相反的，如果你每天關心美好，你專注渴望的事物也會不斷擴大，快速增強實現的機率。


    色彩能量的世界中，如果你學會管理好自己的身、心、靈，並且釐清信念，時時覺察自己的顏色狀態（情緒、思維、直覺反應、外部連結），那麼，高維度的正面力量就會經由你的自我，來得到淨化與治療。


    能量跟隨思想，思想創造能量，小小的自我需要明白與接納這樣的觀點，了解在看似真實的物質世界中，一切皆有可能，一切也都如同虛假。這樣，以《金剛經》「如夢幻泡影」的鑽石眼光，藉由自己已經創造出的物質實體，明瞭《心經》中的「色即是空，空即是色」，物質也是能量所構成的，堅固的物質其實正是能量。這樣的理解，就可以突破二元對立，你不需要站在哪一邊，你只需要包容這兩邊，甚至形成一個整體（合一），沒有分別與對立，這時候，我們才會明白，原來自己才是人生設計藍圖中的設計師，我們才是創造者。無論你是信佛，信神，信宇宙，都不重要，因為你會和你所相信的信念「合一」，共同合作創造，這種合作共創，才是你的完美人生藍圖。


    這樣，也不枉你走這趟人生路，來來回回的發現明白一個真理，那就是你的人生很完美，而這完美的設計圖，裡面的劇情都是為了你的體悟而來，你會開始帶著愉快的愚人精神，不必成為社會邊緣的隱士，而能成為天上地下的國王，心靈和物質終將合一，你才會沒有遺憾，讓靈魂滿載豐富的記憶酷到下一站。


