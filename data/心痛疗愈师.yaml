    ## 自我療癒


    ### 雙手療癒


    我一直有著天生的療癒能力，經由許多師父們的認可，以及我自己的經驗，不管是身體（氣場）或是身體的能量，我都知道自己就是可以帶來療癒力。你問我為什麼，我不知道。但也因為是天生的功能，我一直認為這不應該當作是賺錢的工具，你又如何告訴他人「我摸過你就會痊癒」？或是「你和我聊過天就會舒服些，甚至身體的疼痛就會改善」？


    也許很多人渴望，甚至可以這樣說出來，但在我的出生背景裡，這是不被允許，也是不被認可的怪異。所以，我說不出口。


    巴楚仁波切是一位非常偉大，卻異常低調的師父，他的前世著有《普賢上師言教》。我在因緣的帶領下，透過藥師佛的法會結識了仁波切。仁波切住在歐洲，一天到晚見一些「西方治療師」，但仁波切不以為然。他常告訴我「千萬不要學那些不究竟的作法」，但迫於生存的課題，我一直是三心兩意的做著治療師。


    我的師父不認可我，我卻有這樣的能力，而我需要金錢，卻用著師父不同意的方式維生。這不是很奇怪嗎？就在我讀大圓滿佛學院的時候，仁波切親自考驗了我。


    那時候，我已經是他的弟子兼佛學會的負責人，但經常我更像是他的侍者，因為我很嚮往出家僧團的生活圈，很寧靜。


    有一天，可能時候到了。上課中場休息的時候，師父叫我到他的座前，他告訴我：「我的背很痛，你給我療癒下。」我悄悄地詢問師父，「您不是不同意我做這件事嗎？」


    結果上師說：「有愛就有療癒力。重點不在技巧，在心。」


    我把發抖又發冷的手放在師父疼痛的背上，閉上眼睛，只想著愛的力量流經我，透過雙手，到師父的背上。第二天早課後，吃早餐時，師父忽然帶著其他的侍者與翻譯走到我的面前說：「俄國的一個同學生病了，請你去看看他。」


    從那天起，我在佛學會的同學群中忽然忙了起來，各國不舒服的同學及翻譯，都會來找我做「雙手療癒」。我想，師父是認可了我的療癒力，因為我以愛療癒。


