    \n# Part Ⅱ\n\n# 心與物質的生存考驗\n\n長期以來，我一直在兩個方向被拉扯。一方面我是個守規矩、孝順乖巧又認真讀書的好孩子，希望能夠滿足父母對我的期待，能讓家族和家庭可以光耀門楣；在取得法國博士班的獎學金後，對於朝向嫁個好男人，生一堆小孩，並且在大學擔任教授工作的夢想更靠近了一些。另一方面，我又不由自主的走到哪裡都會遇到靈能人士，這些高人出現在我的生活中、工作中、修行中、朋友圈中，我見到他們總覺得更像家人，可以更親近，也更能溝通。\n\
    \n我也經常被兩種力量糾纏。外在的我長得年輕可愛，比實際年齡年輕，而且童心特別重，只要看到色彩就能精神一振；內在的我又為了家庭的經濟問題，好強又堅定地工作著，常綻放出壓死人的陽性活力，工作起來不輸給真男人。\n\
    \n當我開始進入身心靈的領域後，又掙扎於我應該向商業及現實低頭，可以多賺點錢，還是應該堅持我想做的事情，不被五斗米嚇死。於是經常的，我也面臨到是否該休息幾天不工作，還是持續全年無休，東西方國家飛透透的生活模式。也曾面臨到我應該是西方人，還是東方人的尷尬，因為我感受不到東方的熟悉，卻對於西方的一切感覺莫名的熟悉。\n\
    \n更嚴重的時候，甚至想放棄靈性療癒的工作，因為開始接受佛教教義的我，是不應該論神通和解夢的。我喜歡唱詩和研究宗教，特別熱愛沉浸在各國的宗教氣氛中，但各國的宗教和神明又都有各自的門檻，也都不認同「外道」這回事，可是我的人生，根本就是由這些玄奇的人事物所組成，如果要加入某些宗教團體，我都必須放棄某部分的我。但是，如果放棄了那個部分的我，我也就不完整了。這種不完整的失落感，令我感到迷惘與困惑，根本無法專心於只聽從一個信念系統。\n\
    \n所以，我也曾經認真的去找英文補習班的工作，希望成為不常飛行的「正常人」，這樣或許我才能過著正常女人的生活，也可以成為社會可以接受的女性角色，渴望被家人或社會，甚至被男性所認同。\n\
    \n心和物質像是綠色和紅色的對比關係，又像是大我（藍色）和小我（黃色）的糾結關係。而我的二元對立狀態，也會出現在我的工作上，如右腦型和左腦型的人，喜歡理性思維論證和渴望情感紓解療癒的兩類人。我如果選擇培訓講課或配合左腦型的工作模式，就得被迫放棄感受的層面，因為他們不接受太多情緒和感覺，也認為感受是沒有用處的，只會干擾工作進度。但我如果只針對身心靈要命的動不動就感覺來、感覺去，感應這、感應那，始終喜歡停留在一堆的問題和療癒當中，樂此不疲的玩著轉圈的遊戲，我這聰明的左腦又會感到愚蠢和難以提升；面對這類型的人們，太過理論的教學或文字，他們也會受不了，甚至拒絕接受，因為腦子轉不過來，因為無法理解而產生情緒問題。左腦和右腦的戰爭，如同男人和女人的玫瑰戰爭，似乎永遠無法達到共識！\n\
    \n這些年來困擾我的信念問題，雖然根源來自我的無神論家庭，且遲遲得不到解脫。但是，我卻在加拿大工作時，從我的療癒客戶身上找到了解答，從此解禁。\n\n# Chapter\
    \ 9\n\n# 走進色彩異世界\n\n你不能對抗生命中帶來的不適應與不舒服，\n但當你把心思灌注在彩色的事物時，\n你將發現自己根本可以和疾病共存。\n\
    之後你還會發現，疾病已經消失……\n\n一個無心插柳的人生，源自於一場夢境。\n維琪·渥爾女士在夢中告訴我，她做產品的庫存地方有兩個大天使守著原料；之後，靈學老先生告訴我，我應該去英國一趟了。\n\
    就這樣，我回到夢中的歐洲，開展了二十年的彩油代理與各地開拓的狼式工作。\n所有的一切，我們往往說是無心插柳，但真相果真如此嗎？這場由顏色展開的靈性人生，其實從五歲就開始了。自小我就畫畫，這熟悉的色彩，也開啟了帶領人類意識發展的童年訓練。\n\
    但十三歲開始，因為父親的生意失敗，我忽然畫不出彩色的畫作，也拿不起我的畫筆。本來充滿創意的我，怎麼觀想都是黑白色的世界。除了夢境依然精采，青少年生涯完全是黑白的，再加上弟弟的過世，我已經不知道該如何規劃自己的人生，也不知道要如何掌握自己的生命了。\n\
