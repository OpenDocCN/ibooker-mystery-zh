    ### 啟動核心之光


    非自願治療師最大的課題就是「自己」。

    雖然明白道理，但自己卻往往就是自己最大的障礙。太多非自願治療師容易過於自滿或自傲，又或是成了控制欲強大的魔頭，往往也障礙了兩性關係或人際交往。

    非自願治療師也可以稱為光的使者、光能工作者。有時候，當光照亮時，黑暗現前，照亮的結果更為痛苦，但光能工作者卻不得不看到。一股清流也往往無法面對黑暗的習慣和控制，這樣會形成更強大的痛苦。因此，面對無法掌控的黑暗力量，不管來自內在或外在，永遠都是光能治療師的致命傷。但同時也是優勢，因為只有光能治療師可以啟動自己身上的光明力量，以愛啟動，照亮黑暗，而不會被黑暗吞噬。


    不管你是不是光能治療師，你都有內心光明的一面，因此，你都可以啟動自己的核心光能，成為一個太陽，而不是反射太陽的月亮。


    ### 啟動核心之光的步驟：


    光能治療師本身具有光明，所以不必學習或是接受，只需要「成為」。

    啟動核心之光也是光能治療師最痛的道路，但卻是一個救贖的過程。如果過不了這個考驗，就無法真的享受不斷電的光能之樂。


    #### 1. 連結丹田，回歸自己的中心


    晚上睡覺前，早上起床後，都在床上待一陣子，和自己連結。

    你只需要把雙手放在肚臍以下兩手指寬處，輕輕按壓，然後開始深呼吸，去感受腹部的起伏。然後把全身力量灌注在這個點上,縮小自己,非常集中在這個點上。每天持續練習,練習無意識地消失,然後歸於中心,和自己最深處做深度連結。


    #### 2. 連結本心,找回心的平靜


    用舒適放鬆的姿勢,閉上眼睛,感覺全身每一處都放鬆下來,最後連意識都不存在,也不存在於身體任何部位。特別要注意臉部的肌肉,因為全身的緊張往往百分之九十都在臉上,所以晚上睡覺會磨牙,只因我們把所有壓力都灌注在臉上。正因為腦中的緊張會存在臉部,所以臉部是一個儲存站。去感覺兩個雙肩之間的部位,胸部的部位,讓全然的愛充滿在這個區塊中,使強大的和平開始產生。


    #### 3. 愛來自於心,但我們無法透過愛來找到平靜


    想到愛,就會想到心。愛來自於心,和平也來自於心。如果你不在愛之中,你就容易被干擾,被影響。但如果你愛誰,誰就會變得重要。這時候,你就會變得容易被干擾,因為你「愛的空間」(心)被他人佔據了,你自己對自己的愛就會遺忘,然後就會失去平靜,變得情緒化或失去控制。所以,我們需要保留個內心的空間給自己,每天持續練習回到愛自己的空間(心)中。


