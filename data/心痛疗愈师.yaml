    ## Chapter 13 治療師的才華


    有很多成人心裡存在著一個拒絕長大的孩子，以致養成一種不信任的執念。而其實，只要增進孩童意識，這個孩子就會成為我們內在的小天使，而不是小惡魔了！


    非自願治療師一開始是玩票的，公益的。既然靈學老先生說我得開始認真思考這個行業，並且真的要賴以維生，可是我要如何平衡呢？讀書出身的我，身負家中的期望，沒有辦法想像自己變成一個算命師，或是靈媒，或是做零售買賣的商人。


    剛開始我很有點鴕鳥心態。我想，我就假裝是個賣精油產品的，這樣人們要買就得付錢，因為我也是花錢買來的。然後，我把自己的療癒能力隱藏在瓶瓶罐罐後面，這樣我就沒有收錢的糾結了。


    就這樣，為了讓自己的心感覺平衡一點，我以色彩諮詢和推廣精油瓶，隱藏我的靈性感悟及身分，並且以色彩精油瓶推廣講師的身分，做自己可以做的靈性業務。我也需要一個說服自己接受的過程。用色彩和精油對我來說，是很好的開始。在研究教學的過程中，我深深的連結上大自然，自然界的訊息何其強大，我往往被一股純粹和單純的精靈感覺支持著。有時講課講得很有道理時，花朵就會立即傳香氣過來。享受著這種和自然界一起共創美好的感覺，有了植物們的支持，我開始充滿了勇氣。


    記得有一次看一個通神論的書籍，迪瓦庫（Djval Khul）的一本書，書中談到地球的磁場，論及人類、動物、花朵植物、礦石水晶種種。看著看著，不覺地進入到書中的磁場，突然的我哭了起來。一起看書的朋友嚇了一跳，他看了看我手中的原文書，不解地問我，這本書有什麼好哭的？


    當時我也覺得很有意思，因為我看著看著，體會到這個世界的美好，而且分成了兩個層次，一個是人類之上的天界國度，以及人類之下的地上國度。但他們快要斷絕聯繫了，而唯一可以聯繫這天上與地下美好的力量——人類，已經愈來愈混亂。


    人類的猜忌、恐懼、攻擊、負面……讓整個世界愈來愈亂，我一下子急了起來，忽然想到這該怎麼辦？人類不可以再這樣混亂和負面了呀！然後感受到自己還有著恐懼和負面，這怎麼得了！連我都沒有辦法正面起來了！於是，忍不住大哭了起來。


    朋友覺得我非常不可理喻，無法理解這本書有什麼好哭的？但我卻哭得很傷心。


    那次的經驗之後，走在任何地方我都會更留意大自然，而自然界也從未讓我失望，有時候我工作得很累了，只是坐在車子裡，我就能連結到車窗外路邊的樹木，而他們都可以在剎那間清理掉我的疲憊。


    所以，一直以來，任何活動的主辦方都會送花到我的房間，這不知道是何時開始養成的習慣。雖然我很少在各地工作後遊玩，但我的房間裡一定要有鮮花，有了它們，我就不會太累。說也奇怪，這樣的習慣十多年來沒有改變過，我原以為自己一直怪怪的，直到這些現象一直重複發生，我才開始信任這些是真實的。


    我的治療師道路一開始就非常順利，但我的內心卻是不順遂的，主要在於自覺認知有限，所接受的教育訓練只是讓我成了很會行銷的靈性業務員，但對於自己的喜歡和認知卻是缺乏訓練的，這讓我僅僅擁有一半的自信。


    ## Chapter 15 治療師的才華


    也許正因為我是一開始的先驅，是一個領頭羊與開創者，所以來找我療癒的、踢館的、嚐鮮的、詢問是否可以以此為業的，各式各樣找尋自己人生方向的名人都曾經找上門來，其中也有那些通靈的、做身心靈職業的人士。沒有任何廣告就人滿為患，但我卻很不能適應。由於缺乏自信，我實在不知道自己對那些「很厲害」、可以看前世今生，或是靈修幾十年的人，我能做什麼呢？


    玩票的心忽然不太好玩了，於是我打了電話給凱洛老師，因為我覺得自己可能沒有很厲害，也許不太適合色彩諮詢師的行業。


    我問凱洛老師，「到底做一個治療師要有什麼特質？」接著我說了我的處境，「很多高人來找我，名人來找我，我不知道自己有什麼能耐可以為他們做療癒？」


    她想了想，然後說：「我不知道是否需要那些通靈什麼功能的，但我只想問你，你是否有關懷他人的能力？」


    我一聽就開心了，我告訴凱洛老師：「關心人？這個我最行。」


    老師說：「那就是了，只要你有關懷他人的能力，我想就足夠了。」


    從那次開始，不管什麼樣的人來找我，不管對方是什麼背景，我只記得「關心對方」，這是我最擅長的事，至於來了什麼感應，什麼感覺，都沒有關係，最重要的就是「關懷」。


    我感覺如釋重負，並且用了外部工具，我也不是在用自己的業力為人承擔責任。迴避了所有的恐懼後，我開始安心的「關懷他人」，繼續滿滿的工作，以及認真的學習。


    一個理想的治療師，到底該具備什麼樣的特質呢？


    在國外，有人說我們是光的使者，或是光能者，或是療癒師、靈療師、訊息的使者等等。但不管如何，在我看來，有一點很重要，就是一個能量治療師該有的態度，也就是管理人生的態度。那麼，能量治療師常見的狀況有哪些呢？


    - 1. 沒有靈感無法行動

    - 2. 情緒來時沒法做事

    - 3. 莫名的干擾常發生

    - 4. 意志力不是很堅強

    - 5. 容易吸引負面的人

    - 6. 容易創造事物改變

    - 7. 容易受到驚嚇創傷

    - 8. 常被莫名夢境所苦

    - 9. 身體有時突發異狀

    - 10. 經常陷入低潮情緒

    - 11. 金錢狀態不太穩定

    - 12. 容易進入生命低谷

    - 13. 困難於肯定自我


    我還可以繼續列舉出來，像是魂不守舍、不守信用、容易健忘、沒有原則、經常恐懼、各層面都匱乏等等等等。


    很多問題？對吧？這就是治療師背後所可能帶來的問題包袱。我有一個學生甚至曾經罹患精神疾病，為此休學，也無法正常生活，但後來卻搖身一變成為教天使學的老師。你永遠也無法得知，很大的困難背後，有什麼樣的禮物在等著你。


    當然，這個過程並不容易，因為需要走一段療癒之路，我有時候喜歡說這是「成道之路」。雖然無法像佛陀成道那樣的精采和不可思議，但對於這樣的個體來說，等於讓自己的生命可以走出陰霾。不論罹患哪種身體、心理或心靈疾病，始終沒有選擇結束生命，而是努力找尋生命的出口。光是這一點，我覺得已經值得尊敬和讚嘆了呀！


    我喜歡做色彩美學與氣場分析的諮詢，是因為我不想從「疾病」的角度來看人。我相信人天生有自癒能力，我自己就有，當我光明時，我便能幫助自己，但當我情緒低落陷入黑暗時，我也很需要他人的援手。只是有的人光明指數高一些，可以長時間維持在高頻的光中，有的人稍微弱一點，比較容易掉入黑暗裡。


    但人生而平等，也天生具有向光性，這正是人類最了不起的特質。天生自帶功能的療癒師也不例外，只是光明比一般人多一點，黑暗也比一般人多一點。因此，如果我以色彩來找到人的本質，並且提升人們的意識，在講到美好時，就已經在揚升其高層意志（higher
    will），而不是一直強化對方的低層自我（lower self），我就會看到對方的氣場由暗沉轉為明亮，連皮膚或長相都會瞬間改變。


    所以我相信這樣的療癒力，更能協助那些一腳踏在黑暗中，一腳站在光明裡，正在徘徊不知該往哪兒去的人們。而這些看似健康，卻又可能不太健康的人群，其實是佔大多數的。至於已經形成的疾病，那是歸屬於醫生的治療，而不是我們的主要專長了。


    其次，應用氣場分析的角度，我另外加入了精神分析的作法。精神分析強調自由聯想，我在英國學習後，發現更為接近我們所謂的創作過程。我的目標是把作品（來訪的個案）打造成經典，讓當事人開始喜歡自己，而不是排斥自己。所以，如果一開始我就給對方貼上「有病」的標籤，後面我們將會困在這個圈子裡打轉。


    基本上，會來求助的，誰不知道自己有病呢？只是多和少、承認不承認而已，你不用多在對方的傷口上灑鹽巴，對方都已經快把自己淹死了。我們的目的是要救出對方離開黑暗，而不是動動小指，把對方再推入火坑。


    所以，運用焦點諮商的心理學模式，把集中的力量放在「如何更好」，我感覺這樣的做法才能「揚升」。我用揚升而非提高，是因為這兩個意境不同，揚升強調跳離現有的維度，而提高是在原來的空間裡爬高一個臺階。我覺得在光能的意識世界中，地球的甦醒已經加快到不可思議的地步，聰明的人早已上去。如果有更好的做法，為什麼還要辛苦的爬梯子呢？


    因此，當我終於找到一種可以運用我天生功能的方式了。這類的工具我逐步透過二十年的體會，將之融合成一種新的生活管理模式：色彩能量管理學。


    在我後來因為陪伴父母，回去就讀企業管理時，我的企業管理碩士論文，就是以這樣的一個培訓效益評估，並且搭配科學氣場驗證來做研究。充分把我的靈視功能中所見到的、所感知到的，以科學數據來做進一步研究。


    這個研究不僅讓我的個人體悟有了更深的驚喜，也對於我所開發的光能學派有了更多的信心和快樂。當指導教授指點我，何不用我的工作來做研究時，我第一個念頭就是：這不是自尋死路嗎？我告訴教授：「沒有一個能量老師會這樣測量的，因為人性和人心是不可測的。」那是我之前的舊認知。沒想到，一個企業管理攻讀下來，徹底的改變了我的認知。


    ## Chapter 15 治療師的才華


    那麼，理想的治療師到底該具備什麼樣的特質呢？


    ### 治療師需要的，是尊重


    身為一個治療師，我們像一面鏡子，也像是窗戶，可以穿透，也可以反射。


    身為治療師，職業道德是首要重點。金錢、性關係、情緒、權力欲望，很多很多的考驗，都會令治療師迷惘。但是，所有的欲望考驗，卻又是人生中必經的過程。因此，除了不斷在挫折的道路上一再反省與改善，不斷去思索外，對老師、上師、師父，以及對任何人的尊重，都是必須要有的道德感。這種道德感，對於真正有大能量的治療師來說，就是一種「謙卑」。


    以前我的上師巴楚仁波切曾經在比利時開導我，他希望我不要像那些歐洲的通靈治療師，自大而無禮，自以為是。我當時其實沒聽懂，也沒有能力理解，因為我的內心已經裝滿了自己的想法，就像一杯裝滿水的杯子，怎麼可能再裝入新的水呢？


    更何況，我也很自大呀！自以為可以掌控一切。雖然對於老師，我很尊敬，但自我還是非常大，只是自己不自知罷了。


    多年後，我逐漸放下自己的偏見與執見，才能見到烏雲後面透出的一線光明。


    ### 治療師需要的，是謙卑


    一直以來，我的情況是連在夢中都會努力的去追尋真理。這真理包括為個案找到解決問題的答案，找到解決痛苦的靈藥，找到解脫生命困境的方法，找到跳脫生命桎梏的跳板。甚至連我的學生或個案，都有人夢到我去為他們解謎。


    所以，我知道晚上的自己比白天的自己更熱忱；夢中的自己比清醒的自己更熱心；靈魂的自己比肉身的自己更善良。大我的上官昭儀，比小我的伊莎貝爾更大愛。


    ### 治療師需要的，是善良


    沒有善良的心，技術再高明的治療師都可能因故走偏。我有個學生，來找我的時候，簡直可以用「地痞流氓」等級來形容他的出身。我本以為自己非常相信孔老夫子說的因材施教，而我也的確用盡心思來教育這個學生。我相信教育之後純正的心，會比高明的學歷或精良的技術更重要，因為當時我相信，治療師並不需要成為最完美的人，只需要令他人更完美。


    結果我的確將這個學生提高到成為團隊老師的資歷。正當我以為自己已經成功而沾沾自喜時，學生開始勒索，希望我給他更多錢；學生也開始以為自己是我，如果一起出國，怎麼可以睡次一等的房間？他完全迷失了自己的心，很可惜。


    我失敗了，但也開始透過這個經驗明瞭，原來一個治療師的靈魂出身才是最重要的。不是對方生長在有錢或貧窮的家庭，也不是對方如何努力在社會上出人頭地，而是遇到欲望的挑戰時，是否可以挺住，做得有為有守。我自己如果沒有很堅定，我的學生也會一樣。


    靈魂上的貴氣才是貴族的起源，而靈魂上的貴氣與霸氣，也是一線之隔。所以，真正的善良，是這一行對人本質的慈悲，而不是運用這行善良的本質，去做欲望的事情。


    ### 治療師需要的，是愛


    愛是所有人都需要的，特別是治療師。有時候你會發現，治療師反而會比一般人更需要愛。除了經常過度沉溺在犧牲奉獻的愛裡，往往也會糾纏於情愛中無法自拔。就如同能量一樣，如果有時愛他人，有時卻批判他人，或是只愛自己想愛的人，只愛自己的家人，對他人卻沒有真正的關懷，那麼這個治療師必然需要心理輔導。


    畢竟治療師自己也有缺憾，也有需求，一不注意就容易被有缺憾的心勾住，反而會在治療個案的過程中索取愛。如果治療師可以區分出人與我，以及大我與小我的界限，就比較可以有大愛，否則治療師的愛仍是有目的的，也容易在純淨的道路上走偏。


    ### 治療師需要的，是靈魂


    治療師很需要學會珍惜自己的生命，珍愛自己的靈魂。


    陸續有治療師私下來尋求我協助療癒，其中有的產生了身體疾病，有的發生了心理危機，有的家庭失和，有的依然找不清方向。最嚴重的，我覺得是靈魂問題發生在身體健康上。


    有一位治療師，賺了幾場大錢後，很快就生病了，而且是極為嚴重可致命的疾病。記得以前我的靈學老師所說的「沒有天命」，大概就是這種情形了。這幾年，身心靈培訓或是療癒的行業愈來愈受到歡迎，但其中有時界線不太明確，是生意？還是天意？很難分明。有時候，健康就是個「訊息」，並不是每個人都可以到世界各地去行走，以靈性賺錢，或是販賣靈性。


    因此，懂得珍惜自己的治療師，會很珍惜自己的靈魂是為誰服務，而不會隨意地和魔鬼打交道，也不會賤賣自己的靈魂。這種珍愛靈魂的做法，才能為上天服務，或是把這個志業做得長久，做得賺錢。


    宗薩仁波切說：「信任往往比我們所感受到的還重要。」


    治療師的過程中，其實最大的關鍵在於「信任」。這些年來訓練了無數的學生，特別是這幾年，我的團隊裡人才愈來愈多了，其中有些本來看似沒有天分的人，卻在極度虔誠和信任我之後，逐漸轉化了內心世界，竟然也能見到光，感受到世界的場域能量。很多人一開始信心滿滿，卻在遇到一點障礙，或是遇到現實金錢考量後，就會中間半途而廢，但天生的治療師不會這樣退縮，後天的比較容易這樣。


    有不少臺灣式的宮廟主持人也會鼓勵人們看待天命這件事，但往往大家卡住的都是「金錢關卡」，所以也半信半疑。常常這種人來求助的主要目的，只是為了生活的這些目標，都只是表面生活的暫時安逸，像是夫妻關係修復，或是金錢危機度過，又或是得到愛情，一旦這些目標達成，本來渴望成為治療師的初衷，就很容易被遺忘。


    有一些學生一開始時，看起來也是很有希望，但很快的就心念轉變了。畢竟這條路不是很好走，如果沒有上天把路給斷了（像我），或是一直有退路沒有生活、生存壓力的人，是很難堅守下去的。畢竟大家比較想要輕鬆快樂，不想要一直有壓力和痛苦，所以，天生的治療師們往往對於痛苦的承受度會比一般人強大許多。


    治療師之所以一直在這個領域，除了一直渴望精進和自由，甚至可以了悟更多、解脫更多，或是找到無痛的生命內涵，高階一點的就是想要享受豐盛的感受一直存在。但是，很多人在初級階段時，便礙於內在的「孩童意識」問題，就打了退堂鼓。


    這個部分我不用「內在小孩」，是因為我的恩師芭芭拉·布萊能（Barbara Brennan）曾經說過，內在小孩往往是我們成長的藉口，好像你的內在總是有個長不大的小孩，然後就可以為所欲為。所以療癒科學與德國心理學的說法是「成人意識」及「孩童意識」。而且在逐漸長大後，我們內在的成人意識就要有責任來教育自己的孩童意識。


    她的觀點令我大為激賞，因為長久以來我一直見到的，正是她所描述的。許多人動不動就說自己的內在小孩有渴望，這當然沒錯，但難道這個已經很老的大人，還要動不動就說因為我父母怎麼對我，所以我的內在小孩情緒永遠如何如何。


    在芭芭拉老師這樣說明後，我雖然被打斷了一直以來所學到的認知，但我非常開心，好歹也有個清醒的治療師仗義執言了，而且不擔心被同業攻擊。


    這種正直的療癒態度，一直深植我心，也讓我種下了一個「亞太能量治療學校」的種子在心中，希望自己有一天能力夠了，便要結合亞洲的華人，一起共創這種科學的療癒概念。當年學校的學年教務長也成了我的支持者，我們一直相知相扶持，朝著療癒科學的理性教育走著，而且這條路愈走愈多人，也愈走愈快樂幸福。


    ## 自我療癒


    ### 內在「孩童意識」的信任問題


    在我們小的時候，如果能全然信任父母，那麼生命會是真的很快樂，沒有懷疑。一旦我們發現了質疑，那麼這個幸福的生活立刻會變得不平衡，內心也將開始不信任。這本來是孩童成長、自我成熟過程中必然的現象，沒有懷疑就沒有追求，所以，人類本來就會因此不斷的學習成長，甚至愈來愈走出自我的信心。


    但也有一些人是沒走出來的。其實，大多數人內在都多少有這個孩童的狀態，因為這也是我們的一部分，只是這個「孩童意識」佔生活中的比例多少。我有個學生五十多歲了，依然拒絕長大，總是任性，但是只要口不擇言，就會稱自己的個性「孩子氣」，不然就說自己是因為星座的關係，這些理由，都成了我們愈學愈可憐的理由，只因為「我是⋯⋯」。


    這種拒絕成長，往往在我們的內在就像有父母也有孩子。所以，我們的另一半，或是家人（父母或子女）就會因此受害，特別是下一代，往往就會搖身一變成了長輩，來照顧這個不願長大的長輩。


    治療過程中，這往往就是療癒的重點。當一個成年人一直堅持要活在孩子的世界中，卻不想長大，這中間的不信任，不信任生命，不信任自己長大以後就會過得好，或是長大後還有愛，這些因素往往障礙了我們內在孩童的成長，而其實，只要增進孩童意識，這個孩子就會成為我們內在的小天使，而不是小惡魔了！


    ### 孩童意識的自我療癒重點


    #### 1. 不信任


    不信任是因為曾經有某些事情發生，以至於我們無法再次相信。要療癒孩童的不信任意識，這類的想法往往源自童年經驗，並且和責任有關。長大後，這樣的小孩必須由生命中的實際事務中得到認可，像是做成功一件事，贏得一個獎項，或是沒有虎頭蛇尾的成功跑完一次馬拉松。總之，需要證明給自己看，自己是個值得自己信任的人。


    #### 2. 強烈批判


    孩童如果特別要求完美，或是過去父母特別要求完美，或是自我性格中特別有著極強烈不信任的特質，如父母某一方可能沒有負起照顧家庭的責任，這樣的小孩長大後，就特別容易淪為「批判的指導者」。


    許多看不過去，然後事必躬親的大人，往往很難被滿足，難以被滿足的背後，就是因為太過批判，最後只好自己獨立完成。不論是在婚姻或療癒過程中，都會成為掌控的一方，非常辛苦。解決的方式，只能練習先從嘴巴做起，做個不說出「批判」語言的大人，然後訓練心中不批判，最後訓練可以信賴他人的行為，像是相信自己的員工可以完成計畫。


    #### 3. 相信沒有人會無條件愛我


    這也是個很可怕的常見現象。


    許多人的孩童意識，是覺得總要付出才能得到愛，像是金錢、性、工作等等，這些價值低落的孩童意識，往往令人無法去愛，也無法享受愛。在愛中也會算計對方，該給自己多少金錢或房產。這在很多互鬥的夫妻中經常可見，爭房產，爭家產，爭自己付出多少，也爭自己應得多少，完全忘了自己是個不用努力付出，就值得被愛的人。這樣的孩童意識，往往會導致離婚，在關係上是非常辛苦的狀態。解決之道，可以由停止輸送「毒藥」給自己的腦子，不要再一直給自己「錄音帶」模式，一直重複說自己有多糟，別人有多壞，世界有多嫌貧愛富。


    我有一個企業家學生，就是中了這個毒，所以常常自憐自艾，不相信人間有愛，只相信金錢萬能，可以買愛情，買親情，買友情，買一切。


    ### 以愛療癒


    愛可以帶給孩子們安全感和信任，愛也是引導孩童意識提高的主要教練。'
