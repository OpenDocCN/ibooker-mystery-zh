    以西方教育背景融合東方傳統底蘊，超過二十年心理諮詢與團體輔導經歷，致力內在成長教育推廣十五載，專研生命之美。


    藉由大量個案與授課，透過色彩、文字、聲音、形體等多元化方式引導人們感知身心和諧、認識自己，訓練心念的美感，抒解生活壓力與困境，協助人們有勇氣面對生命的挑戰，找到促進生命全面幸福成功的道路，創造生命的成功和富裕。更重要的，是希望籍由各類成長能量管理法，支援孩童以及支援成人內在的孩童，得到充滿成長智慧的快樂！


    教學與講座足跡遍至臺灣，中國，香港，馬來西亞，加拿大與英國。主要議題涉及個人，家庭與企業成長。並專書專欄探討親子，家庭，兩性關係，愛與生命本質的追尋等療癒科學的應用與推廣。


