- md: "就在今天，我心存感恩！\n\n之前，色彩對我而言是陌生又擔心的，總覺得我只能黑與白，總覺得自己什麼都不行，用力的過著每一天，深怕沒把自己與事務做好，所以大家總覺得我很苦，心一直處於匱乏狀態。\n\
    \n認識上官老師後，她讓我覺得她就是帶著色彩光的女神，她的溫暖和陪伴是真心的，帶著我用心去體驗生活，感受色彩帶給我的不同感受，也開始接受原本的自己，開始欣賞別人。\n\
    \n帶著感恩的心去看世界，真誠的感恩時，漸漸的，所有的東西都變得好好了。不再有抱怨，每個到生命中來的事物都是有原因的，感謝他們讓我學習成長。一系列學習後，不一樣了，家庭、工作、生活都變得更好了。\n\
    \n所以我決定，要跟隨老師的腳步，把這善的能量像漣漪般傳遞出去，將利人利己的心發揚出去。\n\n第一眼的接觸時，感覺這位老師好漂亮，是一種由內在散發出光芒的美麗，是一種給人超親和感與自信的魅力。當老師一開口說話，有如天籟般的聲音，一種無法形容的吸引力深深的打動了我，心就這樣完全的被引領著向前走，進入到一個令人驚奇與期待的色彩能量世界。\n\
    \n一種從來沒有的觀念開拓了我的視野，原來我可以透過色彩剖析內在，原來可以透過色彩了解性格，原來可以透過色彩找到生命的課題，原來可以透過色彩運用帶來正向光明及改變命運。從老師的身上，可以感受到對生命的熱情與活力，一種愛與慈悲的能量源源不絕地湧出，在每一次的課程中，都能感受到身心靈被老師療癒了。\n\
    \n很謝謝這難得的緣分讓我遇見上官老師，能跟隨著老師的步伐前進，繼續朝著自己的天賦與使命邁。\n\n— 臺北 chuan\n\n# 學員心聲／\n\n向人生旅程，沒有擔憂、沒有恐懼，只有歡喜、只有愛與美的心靈，謝謝！\n\
    \n五年前遇見上官老師時，我只想要解決生活難題：人生中遇見那個真心想嫁的人，卻第一次被分手；被銀行追債，可我卻已身無分文。我坐在上官老師的對面，對老師說：「老師，我不知道我的人生該怎麼繼續下去了，我不知道該怎麼活了。」\n\
    \n那時候老師只問了我一個問題：「你相信我麼？」那時，對我來說，上官老師完全是陌生人，可是不知道為什麼，當時混亂無措的我，卻感受到前所未有的平靜和安全。我點頭，對老師說：「我相信您。」然後老師說：「只要你相信我，我願意幫助你！」\n\
    \n那個時候，老師給我的這句話像是一種承諾，只是沒想到，這一幫，便到了現在，還一直支持著我成長！\n\n從那時起，一步一步地走進色彩能量的世界，開始了人生神奇的療癒歷程。\n\
    \n才了解，原來我的痛苦是因為心一直在漂泊，我不知道家裡有愛是什麼感覺。就好像你已經習慣人生就是應該沒有愛，就是沒有任何顏色，已經習慣了黑白灰，已經痛到麻木，放棄對生活的渴望，覺得人生就是這樣啊，大家都一樣。\n\
    \n然而，突然的出現一個人告訴你，愛是這樣子的，你可以不用痛苦，你可以輕鬆創造自己想要的人生，你可以有愛，你有能力愛自己，也有能力愛別人，你可以活出和別人不一樣的生命歷程！\n\
    \n感謝老師讓我重新感受到世界的愛及溫度。\n\n—台北蘋兒\n—貴陽昕昕\n\n# 學員心聲／\n\n彩光湧現,真愛無限\n\n在上官老師的課程中,很自然地就會在一種很愉悦的氛圍裡被療癒,很容易自嗨的老師,會讓上課氣氛充滿歡笑愉悦,並充滿粉紅色的愛之光。老師的嗨很快就感染了在座的學生,瞬間融化第一次上課的緊張感。\n\
    \n但你以為上課只有歡笑嗎?就錯囉!老師的催淚功力也非常了得!當她使出幻化於無形的「武功神力」時,那個「一陽指」就正中你的罩門!沒錯,包含著各種複雜情緒的淚水,就自然地溢出了雙眼,就在歡笑與淚水的洗滌下,身心慢慢被療癒了。\n\
    \n是的,如同描寫孔明「羽扇綸巾,談笑間、檣櫓灰飛煙滅」的情緒般,問題……種種就隨風而逝。\n\n—台北怡萱\n\n我從未遇過這樣一位如此為人著想的人。\n\
    \n她會因為你的快樂和成功,而感到快樂(甚至比本人更高興)。\n\n也會因為你的痛苦而難過流淚,比你更渴望你可以離苦得樂,解決煩惱。\n\n她,就是我的恩師——上官昭儀老師。\n\
    \n我在人生的低潮時遇到了上官老師,在我最難過的時候,老師跟我說:「你相信老師,你已經夠好了。」這句話,引發我的淚崩。\n\n有多少人聽過這樣真摯的讚美?我們眼中看到不好的多,感受美好的卻少之又少。在老師的眼中,彷彿世界萬千色彩,她都可以看到色彩的正面力量,對於負面的,老師則運用色彩的療癒力,扭轉乾坤,像把灰灰的、霧霧的洗刷乾淨一樣。\n\
    \n色彩徹底改變了我的人生。曾以為幸福離我很遠,但因著老師,發現原來幸福是觸手可及的。\n\n# 學員心聲／\n\n感恩，這美好的緣分。\n\n當我因為好奇，而開始接觸色彩能量，老師卻看見我心裡更深的渴望；當我覺得自己就是如此了，老師卻看見與激發我沒有想像過的潛能；當我困在自己的牢籠中鑽牛角尖、憤世嫉俗、畫地自限，老師不斷敲著我的門，告訴我鑰匙就在自己手裡；當我面對母親罹癌，家庭頓失依靠，束手無策的時候，老師用她溫柔慈愛的光，陪伴我和我的家人走出憂傷。\n\
    \n她總是能看到更遠、更深的未來，也總是嚴謹、認真、踏實地在努力；她能看見人心最黑暗的地方，也能挖掘出人性最光明的力量。\n\n她能上達天聽，下至地府，儘管如此，卻比誰都更純真、更熱情、更謙卑地擁抱活著的每一天，以及遇見的每一個生命。\n\
    \n她是上官昭儀，一個美麗而不凡的女子。\n\n—香港小圈\n\n認識上官老師，真的是冥冥中上天的指引，機緣巧合，把當時正陷入人生困境中的我，帶到了老師面前，有幸與老師吃了一頓飯。席間我捧起老師的書，將左手放在上面，卻不知怎的，淚水就止不住的流下來。\n\
    \n從那時起，就開始了與老師的緣分，當時在黑暗中的我，太需要老師的光明照耀了呀！\n\n六年的時間，在老師一步步耐心的引導下，我走出了困境，並堅定的走在這條能量療癒的道路上，將色彩能量的美好傳遞給更多和我曾經一樣迷惘的人們。願更多有情眾生可以走近老師，感受老師的光明指引！\n\
    \n認識上官老師已經超過五年了，時光真是善待她，似乎並沒有在她身上留下歲月的痕跡，五年前她就美麗如此，五年後（我想甚至十年後）她美麗依舊。但接觸久了，我才發現外表的美麗是她美力修行的結果。她無時無刻不在實踐色彩能量，從大自然的一花一木中得出感悟，豐富自己，也傳授給我們，盡她所能的渡身邊的每個人。我有幸跟隨老師學習，讓我在這短短幾年裡，由一個繃得特別緊、凡事都要爭第一的小姑娘，變成一個知道放鬆自己、享受生活、愛自己也愛別人的大女孩。我的人生也像開了掛一樣，感情和工作都開始順遂起來。我這個時候才理解老師帶給我的點撥，其實對我造成了多麼深遠的影響。我開始愛上色彩能量，持續學習，從最基本的色彩搭配開始，到高層次的天使光能靈氣，未來我期待我能學有所成，將老師的理念與心血傳遞給更多的人。\n\
    \n認識老師是一場意外，原本的我體弱多病，又深受敏感體質困擾，在家一天到晚被鬼壓床不說，身體累到連正常上班都很困難。沒想到機緣巧合下認識了老師和美力系統，也沒想到會成為工作夥伴。在真正認識上官老師後，才發現她不僅溫柔、細心，能力還很強大，我們總想著出門要保護老師，卻往往是反過來被老師保護。認識老師後，體弱多病沒了，鬼壓床也沒了，換來的是家中和諧的氣氛，而自身的情緒問題也慢慢的在調整、療癒。\n\
    \n跟在老師身邊，你會發現她總是精力滿滿，衝勁十足！總是能帶動旁邊的氣場，讓大家也幹勁十足、信心滿滿的做事！\n\n待人處事，老師總是充滿著正能量，她有一種特別的感染力，就像太陽一樣，所有的黑暗在她面前都無所遁形，被她溫暖的照亮著。願更多的人能認識老師，有機會能受到她光明的指引，開展更亮麗的人生。\n\
    \n認識上官老師，我總認為是一段很幸福的緣分，我是藉由居住於加拿大的朋友，輾轉介紹，與同樣生活在臺灣的老師認識。第一次上課時，只覺得她是個好有時尚感的老師，有別於一般校園見到的「老師」啊！\n\
    \n與老師相識的十年來，對老師的敬仰與愛從未變動過，她就像溫暖的太陽一樣，在每個人生階段陪伴著我走過大大小小的經歷，快樂時老師會一起大笑，傷痛時老師會很溫柔的運用她的十八般武藝支持著，而無論發生了什麼事，這顆太陽從不曾遠離過，這樣的溫暖，一直支持陪伴在我的人生道路上。因為工作關係，所以能與老師有更多的親近與了解。老師是很孝順且貼心的孩子，我總想著，作為一個教育傳承者，有著孝順善良的本心，並且有專注的工作態度，那麼，我能夠跟隨在她身邊學習著、共創著，是多麼的光榮與幸福！\n\
    \n我的老師——上官昭儀，是很專業且善心的好老師，更是溫暖的小太陽。\n\n—台北逸筑\n—高雄幸儀\n\n# 寫在前面／\n愈過愈快活的人生\n\n每個故事中都會有個結局，\n\
    但在真實世界中，\n每個結局都是新的開始……\n\n年過四十之後，我才敢在公開的課堂上承認，說自己也有一點「敏感」。\n孔子說：「三十而立，四十而不惑。」很遺憾的，雖然自小學習了中國文化基本教材，一心以孔子為心目中的偶像英雄，可是，我卻無法做到孔先生所說的，所以到了四十歲，即使好像比較有自信了，但我依然覺得懵懂，依然迷惑。\n\
    \n我一直猶豫於兩界之間——生與死，靈與肉，守身與婚姻，正常與不正常，世俗與非世俗，胖與瘦，美與醜，是與非，有神與無神，有情與無情，有錢與沒錢……是滿足父母？還是滿足自己？是取悅外界？還是取悅自己？\n\
    \n於是，前半生的我就在這樣迷迷糊糊間，為了我深愛的家人、工作夥伴和學生及個案的幸福，而奮鬥，而放棄，而努力。也在懵懂懵懂間，遇到貴人和高人。\n\n愚鈍的我，總是在最低潮的時候好運連連，也在最驕傲的時刻跌落谷底。\n\
    \n我有时希望走入宗教及靈性，但有時又需要錢的支持。\n\n我很希望父母家人能懂我，放我自由，卻又不忍他們生活匱乏，總是一肩擔起所有家計。\n\n彷彿龍困淺灘，辛苦的施展著，就這樣，關關難過卻又關關過。\n\
    \n五十歲，我對於自己的狀態算是沒有不滿意了，身體健康、心理健全、工作順利、心情愉快，白手起家成就中港臺的小小企業，雖然遊遍世界知名的學校，但依然朝著博士學位邁進。\n\
    \n更重要的是，到了這個年紀，反而可以自豪地說，自己變美，變得有魅力了，煩惱變少，很容易開心，桃花也朵朵盛開。\n\n你說我全部滿意嗎？也還沒有，因為我依然個性倔傲，不易妥協，常咄咄逼人，嚇退眾桃花，卻依然得理不饒人，有著靈性的驕傲，也自以為是。\n\
    \n在家族親友的眼中，我是讓眾人跌破眼鏡的孩子，一直看好我是勝利成功組的組員，沒想到到了後半生，才發現原來是個放牛班的小孩。\n\n然而，有天在演講中我才驚覺到，原來不知不覺地，我已然成為他人眼中羨慕的對象，我已經是個實現夢想的女人。\n\
    \n尤其是對一些飽受婚姻感情折磨而痛苦的人來說，我這樣乾乾淨淨，不欠任何人，也不必還任何人的債，過著自己想要的生活，做著自己熱愛且引以為傲的工作，身旁有著一大批已然是家人關係的可愛知心小夥伴，夫復何求？\n\
    \n原來，在不同的人眼裡，我是如此的成功與自在！而我，依然朝著心中理想的目標邁進。\n\n對我來說，五十歲的心境，竟是二十歲的熱情；五十歲的年紀，竟沒有為我帶來任何巨大的匱乏，反而像是經歷過《班傑明的異想世界》的情節，愈活愈年輕，愈活愈有生命力，愈活愈有朝氣，也愈活愈有愛，愈愛我自己。一掃二十歲時，那個覺得人生痛苦不堪，每天為家人和生存奮鬥著，不喜歡人群卻必須聽話的留守於人群中，也因為弟弟意外過世而找不到快樂的女憤青；也一掃那個肉身是女性，但靈魂卻活脫脫像個男人的女漢子。現在的我，愈來愈像個女人，如此深愛著這個世界，真心愛著身旁每個緣深緣淺的生命，也感恩的度過每一天，不願浪費這值得珍惜的人身與人生。\n\
    \n沒想到能夠有機會寫出我前半生的生命奇蹟故事（當然，我是以靈魂永生，存在於生生世世的因果觀點來看待），也沒有想到高人無所不在，在出版界存在著負有使命感的靈性覺知者，成了願意識我的伯樂。\n\
    \n# 僅以此書\n\n感恩眾靈性指引者，有形的，無形的，聲音的，訊息的，畫面的，感知的，夢境的，彩色的，黑白的，光明的，黑暗的，東方的，西方的，古代的，現代的，前生的，今世的，自我的，無我的，內在的，外在的，美麗的，醜陋的，天界的，地界的，植物界，動物界，各次元的⋯⋯\n\
    \n「感恩所有生命中的相遇」，我知道，這是很老的舊話，不過，對於一個經歷過痛苦挫折及低谷的人來說，那些生命中所有的高高低低，事後總能證明這句話的真實性。\n\
    \n原本我不怎麼相信，不過在每每的失望、期待落空、不明所以後，現在已然臣服。Thy will my will（上天的意旨，就是我的意志）。\n\n感謝所有成就我、指引我的師長，及一路上始終鼓勵、義務指導我的眾高人前輩們。\n\
    \n如果這本書中的故事能對讀者及同道中人有一點點啟發和鼓舞，那麼，對我來說，已經是最大的榮耀了。\n\n# 昭儀\n寫於地球\n\n值天秤座滿月，水星／土星／金星逆行，太陽與天王星合相，對分月亮和木星，四分冥王星，五顆星在開創星座形成強大的T三角格局，適合兩極能量統合的時機。\n\
    \n當然，如果書中的個人觀點未盡成熟，而令你感到不舒服或質疑，也請你一笑置之，當作一部沒寫好的科幻小說，就此略過吧！\n\n# CONTENTS\n目錄\n\
    \n- 推薦語／以愛成長，以愛療癒\n    - 愛是慈悲的唯一途徑／佐欽巴楚仁波切 3\n    - 充滿法喜的菩薩行／洛桑龍達 5\n    - 這本書可以讓你認識自己，然後愛上自己／劉長瀕\
