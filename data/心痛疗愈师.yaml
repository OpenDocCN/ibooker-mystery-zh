    只可惜，在幫助很多人重生或挽回生命的過程中，信念的問題真的是最大的考驗。每個人都有著自己一套相信生命健康的辦法，很難接受其他人的建議。有的人寧可到處去宮廟拜拜或找他的上帝，不會認真的去研究自己的身體健康要如何挽回，如何治療？也有的人完全被恐懼所蒙蔽，任何的方法都好像是要騙財似的。在我認識的民俗醫療，甚至可以協助的靈療治癒法，往往因為不夠信任，就算能由靈性場域挽回性命一陣子，最後也都敗在信心上。更有的，只相信醫生的手術，寧可信眼前的，也不肯相信自己的信心療癒，還有細胞療癒、能量療癒，相信自己可以幫助自己。


