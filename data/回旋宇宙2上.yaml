  md: '無預期飄浮，因此這世她下意識以過重來避免飄浮和引起過多的注意，雖然這個原因並不合常理。


    另一個有關過重的不尋常解釋是來自個案瑞克。瑞克也是想解決過重的问题，許多方法對他都沒效果，尤其是那種只能吃某些東西的飲食法。催眠時，他立刻進入了某個古文明時代。他所形容的建築物和構造，聽起來都不像我曾接觸過的事物或讀過的歷史。有些描述讓我想起阿茲特克文化，尤其是已被考古學家發現的部分。


    瑞克看到一個方形庭院，四周圍繞著類似露天看台的奇怪建築物。每個社區會各派一位運動員來這裡參加比賽。瑞克是被訓練來參加這個比賽的選手。比賽很重要，因為結果可以決定這個聯社社區下一期的統治者。統治者是每季更替，而且是以獲勝的那方來決定。


    瑞克穿著奇怪的制服，臉上畫有條紋。這個比賽聽起來很像籃球。他們在庭院裡帶球奔跑，而且必須把這個球投進一個石環裡，這個石環是架在庭院邊。這是為什麼我會想到阿茲特克，因為考古學家曾說過他們在墨西哥發現了一個球場，阿茲特克人在這裡玩類似的遊戲，但是考古學家說阿茲特克人是把人頭，而不是球，投進石環裡。如果瑞克所說的地方和考古學家發現的是同一個地點，那麼，是這個比'
