    不論什麼原因把你帶到了這裡，你會看到這些文字都不是偶然。


    也許，它早已開出新葉，或正含苞待放。


    你的心裡一定有一塊非塵世的淨土，有個種子正在萌芽。


    那麼，你內心一定知道，我們都具有創造的力量。


    每個人每一刻的言行思想，不單影響自身的頻率，也微妙地影響了集體意識。


    因此，透過多一點的善念，多一點的愛和正面思考，

    我們可以幫助周遭的環境，幫助這個世界變得更好，進而提升人類意識和地球頻率。


    地球很小，但宇宙很大；軀體有限，但心靈無限。


    要記得，有那麼一個地方，它超越了物質世界和時空的限制，

    在那裡，我們都是開心和自由的。


    讓我們的心依舊保持輕盈、喜悅和正面。


    希望在宇宙花園找到一處身心安適的角落，

    讓你無限的心與靈魂，綻放燦爛的光芒。


    ---


    ### 園丁的話（續）


    真心的希望讀者們，尤其是跟身心靈圈有關的讀者，能夠深切地、確確實實地把書裡的文字和訊息讀進心裡。


    朵洛莉絲的書，除了有趣的宇宙、外星資料和奧秘知識，最重要的無非是心靈的道理，也就是做人的道理。雖說是作為人類的道理，卻也是宇宙間任何生命的道理，因為所有生命的核心都是相同的，都是源於光，源於愛。


    也因此，在催眠狀態下，潛意識對個案所說的話，其實也是對集體意識，對每個人所說的話。每個人都可以從字裡行間看到或找到自己所需要的，不論是啟發或提醒。


    有必要再強調一次，現在是許多靈魂回到地球學校接受重考的時候，而各種亂象的充斥和負面力量的越來越得勢，都顯示人類的未來不是如某些人以為的那麼理所當然的光明，尤其當多數人誤認黑暗的作為是光，只因為高舉光的旗帜……這的確確是考驗辨識力的時代。


    雖說一切推到終極都是光，但那是終極；人類現在是在過程中，過程中就是要做出選擇。選擇善，選擇大我。


    記得，沈沒前的亞特蘭提斯也曾輝煌過，但終究毀在人類的自私自大、貪婪和控制慾上（不論是對物質、權勢或心靈能力的追求）。


    這本中譯本，給所有曾經「跌倒」的靈魂。這一次，請勇敢戰勝私欲，不要再重蹈覆轍了。


    為地球，也為你自已。


