    職超過二十年並剛從越南回國。在他被派駐德州後，我們努力重回正常生活；我們因戰爭分離了四年。我們和一位有焦慮性飲食困擾的年輕女子合作（我先生是主要的催眠師）。這個個案有過重和腎臟方面的問題，她的醫生建議催眠也許會有幫助。當時我們的經驗只在專注於改變習性的傳統催眠，我們的個案大都是想戒煙、減重等等，我們從沒想過除此之外，催眠還能達到什麼效果。在催眠這位女士時，我們引導她回溯生命裡的重大事件，她這時突然跳到另一世，成了一九二〇年代芝加哥的一位年輕女子。若說我們當時非常驚訝，就太過輕描淡寫了。我們看著個案突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼前，她突然轉變成另一個人格。若說我們當時非常驚訝，就太過輕描淡寫了。在我們眼