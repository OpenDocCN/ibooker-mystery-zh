  md: '他的回溯很奇特，因此我想我们可能触及了第二次世界大战期间一段未被发现的历史。起初他进入一段很平常的生活，那是在美国西部的某个小镇，他是个铁匠，和他的家人过著快乐的生活。这一世并没有什麽不寻常，因此我要求他前往一个重要的日子。当他到了那一天，他突然变得惊恐，并且说他看见天空出现原子弹爆炸后的蕈状云。接著他被一道强光所震慑。我很自然地认为这一定是广岛或长崎的原子弹爆炸，因为这是我仅知的相関事件，然而这并不是他看到的场景。


