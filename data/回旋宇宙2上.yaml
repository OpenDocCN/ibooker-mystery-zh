    Jose）為艾德加·凱西基金會（Edgar Cayce Foundation）的探索與領悟協會進行演講時所排的個案。蘇珊是一位過胖的年輕女子，我立刻認為這是她想探究的問題之一，但她的主要議題是她和先生想要孩子，卻一直無法懷孕。進行催眠時，我總是要求個案的潛意識帶引個案進入最適合的前世，以便找出他們這一世的問題解答。催眠蘇珊也是同樣的程序。


    當蘇珊進入深度的催眠狀態後，她不是看到她的地球前世，反而是看到自己飄浮在太空，站在一個有很大的X記號的巨大金屬門外。這個X是由四個三角形構成'
