    的人一起轉世。當她瞭解源由後，她的頭痛立刻消失，再也沒有復發。


    過重有很多原因，有些很容易預料，例如前世死於飢餓或是造成別人挨餓。有時過重是一種保護：個案這世在自己身上加了「保護墊」來防禦某種事物（不論是真實還是認知上的），也或者他們是為了避免被傷害，因此讓自己變得不吸引人。


    我的工作是找出他們所防衛的東西。個案通常並不知道起因，然而催眠中得到的解釋卻很有道理。找到原因後，個案就能解決過重的問題了。


    我也遇過一些出乎預料的過重原因。有位女性個案回到前世，那一世她是蘇格蘭某家族的領導人。這個工作很辛苦，催眠狀態下的她感受到重大的責任。領導人去世後，靈魂依然如此感覺，於是在死後說了一句關鍵性的話：「我永遠都無法卸下這個重擔。」潛意識認真看待這句話並帶到了這一世。


    有個不尋常的案例收錄在《星辰傳承》（Legacy From the Stars）。一位女子在催眠中看到自己是外星人，因為意外，飛行器墜毀在地球，他被當地的人發現並照顧。這個外星人有許多引人注意的特異能力，其中之一是因地球引力的不同，使得他會'
