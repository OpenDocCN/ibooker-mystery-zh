    ## 第八章 | 被帶往安全之地


    ### 在決定怎麼做？


    「在她提出聯盟的想法之前，先讓她和群众合作一段時間。當村落間形成聯盟，我們就能一起討論策略。有些人去了其他村落，這就像是組成一個議會。我們有共同的威脅，而這個威脅並不是來自別的人。」


    我以为也许是敌人入侵，因为历史上发生过无数次这类事件。「很难界定，因为我也不了解。我不确定是不是地球的变动，还是来自外在的威胁。没有人可以确定是什么。但如果我们能够组织起来团结一致，我们就能克服这个混乱。」


    **我决定带他往前去看看到底发生什么事，希望能釐清状况。他看到所有的人都聚集在一个很大的空地上，她大叹了一口气，然後说：「太疯狂了！」停顿一会儿后，她不情愿地告诉我她看到的事。「我看到太空船。外星人的太空船。他们的船降下来了，大家都很害怕，但是他们没有敌意。」**


    **他描述太空船「有点圆，但不是球的形状，是比较椭圆的。这些外星人也不是长得小小的，他们比人类高大，一抓就可以抓起很多人。」**


    太空船并没有降落，而是在地面上盘旋。


    朵：那你怎麼反應？

    瑪：（歇斯底里地笑）努力假裝我不害怕。

    朵：大家知道會發生這樣的事嗎？

    瑪：我們這輩子從來沒見過這樣的事。也許在心靈層面上我們是知道的。在動物直覺的層次上，我們知道有事要發生，但不知道是什麼。這是為什麼我們要組織起來，因為有威脅，但沒人了解這個威脅是什麼。

    朵：所以這是你們無法事先作準備的事情。

    瑪：沒有辦法，但是我們必須準備，如果不這樣，大家就更是驚惶失措。所以你必須要有條理。現在很多村落的人都來了。

    朵：發生什麼事了？

    瑪：我們必須離開。每個人都必須上太空船。

    朵：是有人告訴你的嗎？

    瑪：沒有。我知道。我就是知道。

    朵：為什麼必須離開？這裡是你們的家啊！

    瑪：因為這裡有事要發生了。如果我們不走，我們都會死。所以我和那個村落的女


    子才會在這裡和來自各個地方的人在一起。我們知道我們必須讓大家一起離開。


    朵：你知道是什麼會殺了你們嗎？如果你們不走，會發生什麼事？


    瑪：地球上將會有事發生。


    朵：大家願意離開嗎？


    瑪：大家都嚇壞了。很難要他們離開。我不能讓他們知道我也害怕。我和這位女士，還有來自其他村落的人會在這些太空船上幫忙帶領大家。我們在試著集合他們。有些人自願跟我們走，他們願意跟隨。至於其他人，我們必須鼓勵他們；他們認為這太瘋狂了。


    我要求他描述大家上了太空船後，船裡的情況。


    瑪：船上有足夠的空間容納我們。不擠。


    朵：你說有好幾艘太空船？


    瑪：對，在不同的地方。遠遠看過去就可以看到。我們可以帶東西或動物，或任何想帶的東西上船。


    朵：你可以看見太空船一起來的這些外星人嗎？他們長什麼樣子？

    瑪：（咯咯笑）他們在努力看起來不那麼有威脅性。他們微笑並伸出他們的手，努力表現友善。他們很小心地接近人。

    朵：他們看起來像人類嗎？（是的。）那樣就不會嚇人了。大家上船之後呢？

    瑪：（停頓很久）太空船飛出天際，進入太空。

    朵：你有什麼感覺？

    瑪：有很多事要做。要對大家說話，告訴他們一切都會沒事的，這樣做是對的。不會有事了。我開始放鬆下來。我好忙。

    他能夠看見太空船外的景象和下方的地球。我想知道看起來是什麼樣子。在描述時，他深深嘆了口氣：「地球看起來像是我想像中的太陽烈焰。地球像是著火了，有東西在燃燒。我不知道是不是火山，我不知道那是什麼。」

    朵：你可以問問太空船上的人發生了什麼事嗎？


    瑪：可以。他們都在忙，但我想我可以問問。

    朵：就問看看地球發生什麼事了。

    瑪：只是星球的變化，你不會瞭解的。（咯咯笑）可以試看看。（笑

    朵：是啊，請他說看看。

    瑪：這相當於火山、彗星和原子彈爆發的合併，這是我能理解的最貼近的描述了。他們知道這種情況將要發生，所以想要盡可能地帶很多人離開這裡。我們會再回來的。

    朵：你們會馬上回去嗎？

    瑪：他開始解釋我們會被安置一段時間，時間會過去，會流逝，但我們不會改變。

    朵：然後我們就會回去了。

    朵：這是個有趣的說法；時間會流逝，但你們不會改變。他可以再解釋清楚一點嗎？

    瑪：這並不是生命停止的狀態，而是時間過去，但你不會……（輕聲地說）我要怎麼解釋呢？地球上的時間會繼續，但太空船裡的時間不會流逝。

    朵：聽起來像是兩種不一樣的……我不認為「時間」是正確的用語。


    瑪：那裡有時間，但這裡沒有。這跟外星人曾跟我說過的概念很類似；時間是幻相。從人類的角度來看，時間會流逝：小時、天、星期、月，因為我們被困在這樣的概念裡。他們沒有時間的概念，所以對他們來說時間是不存在的。這是為什麼他們可以不受限制地穿越時空。他們說人類可能是宇宙中唯一找到方法來衡量不存在事物的物種了。

    朵：他們要讓你們一直待在船上，直到可以回去為止嗎？

    瑪：對。這不會太久。

    朵：但在地球會是很長的一段時間。（是的。）所以你們不會去別的地方。你們會一直待在太空船上。

    瑪：就這樣盤旋。

    這回答了我之前的疑問。我原以為他們會被帶到其他地方等候災難過去，直到地球可以再度維持生命，而這可能會花上好幾千年。假使他們沒有被困在時間的概念裡，那麼在觀看這個過程的時候，就會像是在看快轉的錄影帶一樣。


    瑪：還好這不會花很長的時間，這樣大家就不會太難過。這裡有足夠的空間，所以有些人帶他們的動物上船。（笑）這好像諾亞方舟喔。


    瑪：（笑）我也是這麼想。聽起來很像。


    瑪：我們在船上並不覺得過了很久。


    我下指令讓他去看太空船下方的地球所發生的事。


    瑪：很像七月四日慶祝國慶一樣。你知道的，煙火。地球現在看起來就像各個地區都在放煙火。到處是火和塵埃雲團。你可以看見顏色在變化。


    朵：你說顏色變化是什麼意思？


    瑪：一開始是一些綠色、藍色，還有白色雲團的東西。接著這些雲團開始燃燒。有時候是灰灰的雲，之後轉成髒髒的褐色，然後又變成灰色、看起來骯髒的雲團，這些慢慢消失後，那些藍色、綠色和白色又再出現。


    在短暫的時間裡，他看著一場可能是經過了好幾千年的事件過程。我後來帶他來到他們回到地球的時候。


    朵：外星人有把你們帶回原來的地方嗎？

    瑪：這很難說。這裡又有樹和其他東西了，它們長回來了，但是沒有村落，也沒有人造的東西存在。除了我們當初帶著的動物外，這裡也沒有別的動物。


    朵：外星人帶你們回來後，他們有陪你們一起嗎？

    瑪：他們告訴我們，我們必須重新開始。


    朵：所以幫助你們重建不是他們的責任？

    瑪：他們試著讓人們理解必須使用自己所知道的任何技能來重建。


    朵：要重新開始很辛苦。（是的。）至少外星人救了大家。

    瑪：沒錯。而且他們鼓舞大家的士氣，給我們信心。告訴我們為什麼能夠做到。

    朵：地球的一切都被摧毀了嗎？（是的。）整個世界？（沒錯。）之後外星人有離開嗎？


    瑪：是的。他們要離開繼續做他們該做的事了。


    朵：而你們要重新建立家園了。這必須要很有毅力才行。


    接下來我引導瑪莉安去看那一世的重要日子，雖然我不認為還有比剛才所經歷的更重要的事了。他宣稱：「我活不久了，我發生意外。在重建過程中，有棵樹倒下來壓到我。」於是我移動他來到靈界，從這個層面來檢視他這一世。我問他從這一生學到什麼。「有時你必須接受未知，順其自然過生活。」


    接著我整合瑪麗安的人格回到身體，取代另一個存在體，並帶出潛意識。


    朵：為什麼你選擇讓瑪莉安看到這奇怪的一世？


    瑪：因為又要發生了。


    朵：（我很驚訝）你這麼認為？


    瑪：又要發生了。地球將會有變化，太空船又要來了。


    朵：這和瑪莉安現在這一世有什麼關聯？


    瑪：因為她知道又要發生了。她已經經歷過一次，而當地球要再次經歷時，她也會在這裡。


    朵：那世的他从太空船上可以看见地球的状况。地球发生什么事了？

    玛：有很多变动。很多的破坏。这是一个循环。

    朵：上一次是因为人类而引起的吗？

    玛：不，这是循环。一个自然的循环。

    朵：是地球要经历的循环？（是的。）但这不表示所有的生命都要消失，对吧？

    玛：对，他们不想所有的东西都被摧毁。

    朵：这很重要，因为重头来过要花很多心血。他们说，「时间在地球上会流逝，但在太空船上不会。」这句话是什么意思？

    玛：因为这就是时间运作的方式。

    朵：地球回复到适合居住的状态一定过了很长一段时间，然而太空船上的人并没有变化。

    玛：时间是你们专注的焦点。在地球你们是一步一步接著一步，但不在地球就不须如此。你们只要专注，就会到达专注的地方。如果你聚焦在某处，你就会在那儿。並沒有时间的量尺。你是在量尺之外，因为並不需要量尺。

    朵：这对我们人类的心智来说一直很难理解。


    **不想走？**


    瑪：那些懦弱的人會留下。

    朵：我猜想懦弱的人就是那些害怕離開的人。

    瑪：瑪莉安必須告訴人們他們從沒想過，也沒看過的事。那些他們向來覺得怪異和可笑的事。

    朵：你是指形上學的概念？

    瑪：沒錯。不見得一定要是幽浮。

    朵：這會是進化的方法嗎？（指瞭解形上學）

    瑪：這會是救命的方法。


    令人訝異的是，我持續從來世界各地的許多個案身上，得到這些一小片一小時的拼圖。我的工作就是把這些拼圖拼湊起來。隨著這些資料的組合，這個拼圖開始有些雛型了，雖然我們的意識還是無法完全理解這龐大的謎團。

    看來，還有許多我們尚未取得的資料。


    **第八章 | 被帶往安全之地**


    ### 第三篇

    #### 進化的存在體和業力


    ### 孩子與業力

    #### 第九章


    有些靈魂是第一次投生到地球，由於過去不曾在這裡生活，因此他們會有困難適應這個忙亂的星球。二○○一年我在加州催眠的一位個案就是例子。每當我去各地演講，我通常會試著就近安排等候名單上的個案做催眠療程。蘇珊就是當我去加州聖荷西市（San
    Jose）為艾德加·凱西基金會（Edgar Cayce Foundation）的探索與領悟協會進行演講時所排的個案。蘇珊是一位過胖的年輕女子，我立刻認為這是她想探究的問題之一，但她的主要議題是她和先生想要孩子，卻一直無法懷孕。進行催眠時，我總是要求個案的潛意識帶引個案進入最適合的前世，以便找出他們這一世的問題解答。催眠蘇珊也是同樣的程序。


    當蘇珊進入深度的催眠狀態後，她不是看到她的地球前世，反而是看到自己飄浮在太空，站在一個有很大的 X 記號的巨大金屬門外。這個 X 是由四個三角形構成，隨著我們的談話，這四個三角形向外打開，因此她可以進到門內。走進這道門，她更加確定她絕不是在地球上。她在懸崖邊遠眺山谷，而所有的東西，包括岩石、灰塵和天空都帶點紅色。她看到的山谷沒有樹木和植物，卻有一個很大的圓頂，她立刻知道那裡的空氣無法呼吸，人在外面是不安全的。她也知道地面下的避難所裡有人，那就是她必須去的地方。她找到在懸崖邊的入口，由此往下進到地表底下一處非常漆黑的空間，人們就躲在這裡。蘇珊這一世是個高瘦的金髮男子。「不胖！」她笑著說。


    她在的地方是有兩個太陽的星系，她的工作是運送補給品到各個星球上的居住基地。這裡就是她運送路線的其中一站，她來檢查這邊的人需要些什麼。這裡的人有食物，但水不夠了。他們不能到星球表面，必須住在擁擠的地底下。這些人看起來是人類，但衣衫襤褸。這個圓頂建物裡面有引擎，也有發電的東西，顯然這個地底避難所的空氣有被過濾。


    蘇珊解釋，很久以前這裡有過戰爭，大氣層被破壞後，環境也對存活下來的人有害。大氣層是被類似核彈的東西所破壞，由於空氣受到污染，星球表面無法再有生命。這裡的人也已適應這樣的生活，並在地底下建了避難所，然而有個新危機隱約出現。有另一群體發現這裡蘊藏礦物，他們想要接管這個星球，因此發生爭戰，這使得待在星球表面更加危險。


    當爭戰漸漸緩和，她回到停在星球表面的小偵察艇，離開了這個星球。接著我請她到那一世的重要一天。總是要個案回到重要的一天，因為大多數的人世（甚至目前這一世）的生活都很類似，可以說平凡無奇。每個人對於「重要的一天」的認知都不同，對甲來說是重要的一天，對乙來說可能就不是那麼回事。大多數的重要一天都是很平凡的，這是因為生活本來就是如此。蘇珊也不例外，雖然催眠回到這世是在別的星球，但看起來也是很一般，就是運送補給品到各個居住基地，甚至連補充貨品的地方（一個貧脊荒蕪的星球）都很單調，沒什麼好說的。


    當我請她前往重要的一天時，她突然說，「我墜毀了！」她說的時候很平靜，而且完全不帶情緒地描述墜落時的感受。「我們撞到東西了，要不就是某個東西撞到我們。太空船的前半部不見了。我不知道發生了什麼事。」在飛船墜落到星球之前，她的靈魂已經脫離了身體。


    我不瞭解這個奇怪的外星球生活跟蘇珊無法懷孕有什麼關聯。然而潛意識的邏輯總是超越我的理解，而且它給的答案都不是我所預期的。


    原來潛意識讓她看見這一世是要她記得她是來自這個有兩個太陽的星球。蘇珊從小就夢到一個不是地球的地方，那裡的天空有兩個太陽，她甚至把這個奇怪的地方畫了下來，但她不明白她怎麼會有這個記憶。潛意識說她沒有小孩的原因是她仍然與那個墜機的人格認同。


    蘇珊的其他世大都是在別的星球，當她決定嘗試到地球生活，她遇到適應上的困難。她不喜歡這裡，她想要離開。想回家。她說：「太多責任。太多事情。太困難，也太挑戰了。」


    她的其他人格的經歷大都是在沒有性器官的身體裡，無法認定是男或女性的生命體。這樣的存在叫做「雌雄同體」；我調查的許多外星人都是以這樣的方式生活在他們的世界。蘇珊不喜歡當女人也不喜歡有性器官，她說：「沒有性別就沒有性。」這一類的生命體並不繁殖，他們是被製造出來的。繁殖通常是透過複製的程序，因此也就不需要用性來繁殖。


    我試著向蘇珊解釋她對那一世人格的認同，但為了在這一世有孩子，性是人類所知唯一會有小孩的方式。她回答她不想當人類，她一點都不喜歡這個世界。她覺得她已經學夠了，她想要離開。這樣的反應通常是個警訊，我知道我必須小心處理。


    雖然蘇珊的意識人格似乎適應良好而且想要有孩子，但她另一部分的人格卻完全相反，這部份的人格並不喜歡這裡，而且想要離開。我永遠是以保護個案為優先考量，不讓他們有任何危險，即使這危險是來自他們自己的其他人格或部份。蘇珊不斷堅持的說，「我受夠了。我受夠了。我要離開。」


    她同時也堅持她並不需要有小孩，小孩會讓她跟地球有連結，她想切斷所有的關係，不想因小孩而有業，這會使她再度回到這裡。如果她跟地球沒有連結，就會比較容易回到她的家鄉星球。她來地球的實驗並不如她所想，而她過胖的原因是因為這樣可以保護她不要有性，她也就不會有小孩了。


    我之前也聽過同樣的說法，人們下意識讓自己過胖是為了讓自己對異性沒有吸引力，多餘的體重有保護的功用並築起一道防線或障礙。因此即使蘇珊的意識心說她想要小孩，潛意識卻不是這麼認為。


    我試圖說服她。她說她喜歡小孩而且喜歡跟他們相處，因此我提議，她這麼有愛心，一定會是個好母親，如果她有自己的孩子，她可以教導她的孩子各種美好的事物，而這會是個新的經驗。教導孩子如何在這個世界生存會是項挑戰，但這也會是她能带给这个星球的礼物。她当时仍然害怕创造了这样的连结会使自己因此被地球束缚，「这会让我一再回到地球。我不喜欢这裡，我不要有任何关连。」


    她很坚持她这一生会很短暂。她说是该离开的时候了，因为她想要回家。我主张如果她缩短这一世，只会让她必须回到这裡，重来一次，直到她完成她的责任。她那么想离开地球，一定不希望发生这样的事，因此我想我这样的说服会是有用的。


    苏珊这一世经常梦到她的家乡星球，所以她不会忘记她来自的地方而陷在这裡。通常灵魂一旦进入身体，就很容易忘记来处，人们会被这个世界与它特有的问题给困住。


    当我谈到减重，苏珊说这个世界太沉重了，而有一个减轻体重的方法，那就是离开她的身体。她对此相当坚定，我只能期望我正面的谈话能打破她的顽固。我一直坚持她在还没完成责任前不可以离开，因为她没有必要陷入重回地球的轮回，那会是更难打破的循环。


    苏珊是棘手的个案，因为我没预期会遇到来自她潜意识的强大抗拒。后来我遇到其他志愿在这时来帮助地球的灵魂，他们也是因为小孩可能会把他们束缚在地球（使他们与地球有连结）而不想有小孩，这样当他们完成了这生的'
