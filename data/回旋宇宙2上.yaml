    當她回溯到故事的開頭，她看到自己和其他人住在一個很大的莊園房子裡，他們是諾斯底教徒，他們自已過著安靜的生活，研讀並撰寫書籍，沒有打擾到任何人，但是地方官員卻認為他們是與魔鬼工作的危險人物。官員受到宗教團體的慫恿，因為宗教團體也把它們看作威脅。有天晚上，他們被狗吠聲和一群闖入房子的人吵醒。他和其他人逃進樹林，這些闖入者和狗群在後面追趕，最後他們仍被逮捕。


    他們被帶到城裡的某處，受到可怕的折磨，被逼著要供出藏書地點。他的臉在被拷問時受了很多傷，尤其是下顎和眼睛（個案這世的眼睛也因此有些問題）。當'
