  md: '上述案例只是我進行催眠療癒的數千名個案中的極少數例子，我試著選出可以解釋個案身體疾病或其他困擾的案例，以及如何從前世去找到問題的根源。此外，這些案例也說明了透過個案潛意識所提供的珍貴協助，以及問題如何被處理和療癒。


    懷疑論者或許會說這些是個案自己幻想出來解釋身體問題的故事。但若是如此，為什麼他們要選擇這麼不尋常或怪異（而且經常是恐怖）的故事來解釋呢？如果他們想要編造奇幻的存在，有簡單得多的方法。如果客觀地觀察這些個案，他們都不具有好幻想的特質。就算這是他們的想像，重要的是他們找到了問題的答案，而這些答案帶給他們解脫與自由。這就是我多年來從事催眠的最大報酬：能夠幫上別人。


    當然，提問是整個催眠過程中最重要的部分。「它們」（潛意識）多次告訴我，提問的方式極為重要。提問已經成了一門藝術。如果問題問得不正確，我也只能得到部分資料或是完全無關緊要的資訊。提問必須措詞精確，這也是我在三十年來發展催眠技巧過程中所學到的事。對於任何治療技術的進步來說，練習是非常重要的。


