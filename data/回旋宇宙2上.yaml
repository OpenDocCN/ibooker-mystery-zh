    2「上」**前世今生與志願者靈魂# **第六章 | 逃離亞特蘭提斯**朵：你會認為人們知道能量不是要那樣使用的。瑪：但很多人不是那麼進化，他們不瞭解事情該是如何。朵：因為你送出的—切終將回到你身上，不是嗎？瑪：沒有錯。朵：你們沒有任何方法可以對付這個負面力量嗎？瑪：我們做了很多事去阻止它，但後來它的力量變得實在是太強大了。更多的負面振動與能量被傳送，更多人受到負面能量的吸引。我們變得害怕，最後，在那個時候和那個地方，我們已無法再多做什麼來阻止了，因此我們必須去做我們認為是挽救和保存我們知識和生活方式的最好做法。這就是為什麼很多人決定離開的原因，他們盡所能把可以帶走的東西都帶著，然後搭船離開。朵：你們不是看到了什麼即將要發生的事，才選擇這樣離開？瑪：我們居住的土地抵押，那時已有許多地震，我們居住的土地即將沈入大海。我們知道我們無法阻止。朵：是的，一直都有地震。我們知道我們會有個全新的世界，只是時間早晚的問題。**迴旋宇宙
    2「上」**前世今生與志願者靈魂天使神秘学院官方淘宝：http://strc.taobao.com# **第六章 | 逃離亞特蘭提斯**我們也知道我們之中有些人將會離開他們的身體（指死亡），另一部份的人則會試圖保留舊世界的事物並帶到新世界。你們會以為使用負面力量的人看到發生的事就會停止了。他們沈溺在使用力量改變事物的能力當中。他們根本不在乎。他們之中也有些人計畫搭船離開。朵：你知道他們使用負面能量的目的嗎？他們把負面能量用在哪些地方？瑪：他們想把人們帶離光，帶離正面。讓人們只知道害怕並看到負面事物。他們要利用恐懼（沒錯）。但他們有些人看見發生的事也想離開。朵：對。事情已經太過頭了，我們居住的土地和地區無法承受更多的崩裂，無法再繼續存在了。我們的土地即將要沈入水底。瑪：你提到大一點的船都被佔走了。（對。）所以有很多人知道將要發生的事。你和你的助手搭小船，你們帶了一些水晶在身上？朵：我們帶了水晶和一些卷軸；一些我們想要保存的教誨和資料。很多人都有這些東西的複本。很多人帶了更多東西，為的是希望我們之中有人能成功逃離。**不是大家都航向同一个方向**，我们都试图往不同的方向，这是希望我们所学、所教导和所拥有的资料能够传承下去。朵：所以你们没有人知道要到哪裡。（没有回答）你们以前从来没去过那些地方？玛：有些人旅行过，大部分是搭船，但他们也可以在睡梦中来到这些地方。他们能够用「飘浮」的方式去那裡。（她是指静坐冥想
    [Meditation] 吗？听起来像是「飘浮」[levitation]）他们能够用这样的方式移动，不一定真的需要搭船去。但在这个时候，有太多能量崩解还有自然的力量——就像可怕的暴风雨——因此我们无法用这种方式旅行，我们必须搭船。朵：而且你们如果以灵魂的形式离开就无法带走水晶这些东西了。玛：没错。朵：你们必须带走实体的东西。**瑪**：**资料会永远保留在以太层和更高层的界域，但在身体的形式就很难触及这些资料，因此我们必须带走那些实体的东西。**他们没有看到陆地后来发生的事，因为他们已经在海上了。他们只想赶快离开，隨著洋流到任何地方。朵：你們有帶食物嗎？瑪：有，我們有帶一些。我們用配給的方式分配食物，我們也學過如何用非常少量的食物來維持生命。我們希望盡可能維持得久，因為我們不曉得要多久才會到達陸地。朵：你們有哪些食物？瑪：是一種高濃縮形式的能量。某種穀粒。我們也吃一點點的蛋糕。水對我們來說非常珍貴，我們只能喝一點點。因為我們能帶走的不多，所以我們盡量不划槳，我們要保留我們的體力，也因此我們盡可能地睡覺，盡可能地少吃。朵：聽起來很合理，因為當你們睡覺時，就不會使用太多的體力。瑪：沒錯。**瑪**：**是的，這些食物可以保存很久。**朵：你們在海上已經有一段時間了嗎？瑪：（停頓）我不太確定是幾天還是幾個星期，但似乎有一段時間了。我們會在船上做記號劃天數。朵：那就像是日復一日。瑪：沒錯，尤其是你睡很多的時候。然後醒了又睡。我引導他往前去看看發生了甚麼事，因為他會在海上漂流好些日子。**朵**：**你們找到落腳的地方了嗎？**瑪：有，找到了。我們靠岸的時候，好多人站在那裡看著我們，好奇我們是從哪裡來的，而且搭這麼小的船。我們認為這裡是……我們靠岸的地方看起來像是埃及。站在那裡觀看的人膚色較深。朵：你們可以互相溝通嗎？瑪：我們能用心靈感應的方式溝通，但語言就有障礙了。**朵**：**他們可以心靈感應你們嗎？**瑪：有的人可以，但比較起來，我們比較能懂他們。**朵**：**他們居住的土地有發生任何事嗎？**瑪：一直有很多暴風雨，還有季節的改變。他們知道有不尋常的事在發生，他們很害怕。對他們來說，海上一直都不平靜，氣候也變得很不一樣，然後又出現一群人搭著小船抵達，而且這些人看起來顯然跟他們不同，這讓他們覺得更可疑。**瑪**：**你可以告訴他們發生了什麼事嗎？**朵：我們並沒有告訴大家發生了什麼事，我們只說我們失去了家園，我們搭小船在海上航行了很久才來到這裡。那裡似乎有個人可以幫我們翻譯。但我們並沒有告訴每一個我們接觸到的人，我們是經歷了多少困難才來到這裡，而且他們也不會瞭解我們來自的文明。**朵**：**他們的文明沒有你們那麼先進？**瑪：沒有。他們的文化和我們不同。**朵**：**他們讓你們留下來嗎？**瑪：對。他們對我們奇怪的樣子感到好奇。他們讓我們留下來。**朵**：**你們現在有什麼計畫？**瑪：當下的計畫是先恢復體力，吃點食物、喝點水，找到可以休息的地方。有個男天使神秘学院官方淘宝：http://strc.taobao.com前世今生與志願者靈魂164获取更多好书，请加微信：13641926204或QQ:715104687**165
