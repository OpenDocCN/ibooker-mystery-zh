- md: '## 迴旋宇宙2「上」

    ### 前世今生與志願者靈魂


    很好戰，他們想隱藏他們的行為。這兩個地方很近，但不是在同一區。他們被發現了。高層議會在討論這件事。他們不喜歡這群人的作為。我看到一個大桌子。很多的討論。


    朵：他們有做出決議嗎？


    瑪：有，他們決定必須保護這個地方，阻止這群人的行為。（停頓很久）他們要這群人停止並且離開。這群人的領導者，這個發言的人，身上穿戴很多金屬，頭飾看起來很像鳥。他們沒有把這個議會看在眼裡，他們說他們也擁有這個星球的權利，因此拒絕離開。他們帶了武器過來。我看到一個太空站。地面上有武器。他們要佔據這個地方。他們已經做好攻擊的準備，他們是好戰的，所以也做了許多防衛。


    朵：他們不認為他們必須遵守議會的決議。（對。）（停頓）你可以縮短過程的時間，告訴我他們的行動結果。後來議會決定怎麼做？


    瑪：他們決定把大家遷移到一個安全的地方。威脅已經很明顯，會造成很大的破壞。他們採取很多行動遷移民眾並重新安置，但是一切都發生得太快了。


    朵：可是負面的那方難道不知道如果他們開戰，就會毀了這個地方？他們來這裡不……


    **139 第五章 | 隱藏的城市**


    瑪：他們真的，真的沒有這麼想。已經有大規模的破壞發生。很多星際間的戰爭。

    朵：所以他們不認為這樣會破壞了他們當初來這裡的目的？

    朵：不。造物主給了生命自由意志，他們（指負面一方）允許黑暗面流動。這是被容許的（因為自由意志）。因此在光的那方決定採取堅定立場後，地球進入一段非常黑暗的時期。戰爭的結果是地表上很少人生還。非常少。有些地方被保護了，但大部分的地方被摧毀。鄰近的其他星球也被波及，事實上是完全被毀滅。這不只是地球的戰爭，這是這個星系的戰爭。

    朵：有哪些星球受到影響？

    瑪：在這個銀河，這個太陽系裡，火星受到了嚴重影響。它原本不是像現在我們看到的那樣荒蕪。

    朵：我們被告知火星會這樣是因為火星上的戰爭。

    瑪：這些戰爭是有關聯的。有些破壞是因为星際戰爭的缘故。

    朵：所以不是因为地球發生的事的影響。你的意思是戰爭是發生在同一個時期？

    瑪：我的理解是這樣。有很多群體涉入。我感覺我是十二人議會中的一員。我不


    道我為什麼說是十二人議會，因為在這會議桌上不只十二位。

    朵：也許這十二位是最重要的成員。請注意，在《地球守護者》一書，最初透過菲爾提供資料的團體說他們是十二人的議會。

    瑪：我是在這之間負責聯繫的。我被指派去看顧這座城市已經有很長很長的時


    間了。

    朵：地面上的破壞並沒有影響到這座地底下的城市？

    瑪：沒有，這座地下城市很安全。它現在仍然存在。

    朵：讓我告訴你我從工作中得知的事；亞特蘭提斯之所以會沈入海底是因為他們的科學家做了不該做的事。

    瑪：許多亞特蘭提斯的人後來變得邪惡，轉向了黑暗面。他們不是一直這樣的。他們濫用能量引發了星際戰爭，這些全都有關聯。

    朵：所以那些負面的生命體跟亞特蘭提斯的人結盟了？


    前世今生與志願者靈魂


    迴旋宇宙2「上」


    天使神秘学院官方淘宝：http://strc.taobao.com


    获取更多好书，请加微信：13641926204 或 QQ:715104687


    瑪：對，很多人陷入黑暗那一方。這都是發生在同一時期，或許早一些。在光裡的許多人有先見之明，他們具有我們今天不知道的偉大能力。（停頓很久）這一切原本是可以被阻止的，但這樣就會違反了自由意志。允許自由意志發展，讓原本是如何就是如何是必要的……。現在億萬年已經過去，將會有許多許多的知識出現，會有许多許多的改變發生，會有许多事將被知道。

    朵：我向來認為亞特蘭提斯人是各由自取。

    瑪：當時發生了很多事。他們受到那些負面、黑暗的影響才開始那些實驗。就好像他們忘了自己是誰，忘記了他們的教化。他們變得沉陷於物質的世界，也因此開始失衡，導致所有的破壞發生。

    朵：你的意思是他們和負面的一方合作？

    瑪：是的，他們受到黑暗界的誘惑。

    朵：所以那些負面力量幫助他們，給他們知識？

    瑪：沒錯，他們受到誘惑。


    朵：但議會雖然知道這個情形和後果，還是讓這場戰爭發生。

    瑪：因為這跟他們的自由意志有關，也必須讓他們去學習。意識深入到黑暗之境去学习，去探索。……我一直看見一個很大的東西在轉動，像是一個輪子，但不是輪子。像是看到一個太陽系轉了一整圈。是輪子。像是看到一個太陽系轉了一整圈。

    朵：像是循環嗎？（是的。）所以在這次的毀滅後，經過了很長的時間，地表才又出現生命和文明？

    瑪：是的。有些原屬地球的生物被送回地球，然後他們開始了新的文明。就像是一切重新來過。這部分會在本章後面提到。我曾有位個案在催眠時看到他的前世和許多人在一場大災難發生前被帶離地球，之後又回到地球重新開始他們的生活。

    朵：你說這個災難也造成一些冰河形成。

    瑪：是的，這個災難改變了地球。

    朵：不是也有一些帶著這些知識的人生活在地球表面嗎？

    瑪：是的，沒錯。但知識被隱密地傳下來，因為害怕……那些想要權力和控制的人總是……黑暗勢力回來了。在地球復原之後，小部分的黑暗勢力也回來了。他


    朵：為什麼瑪麗會看到這些？我們在尋找跟瑪麗的問題有關的重要事情，當然這些事意義重大，可是潛意識為什麼選擇在這時候讓瑪麗看到這些？

