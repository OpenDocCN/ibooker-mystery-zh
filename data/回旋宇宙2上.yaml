    我必须说服潜意识，不可能再发生被烧死在木椿上的事了，因为她目前活在一个完全不同的时代。湿疹的根源既被指认出来，湿疹也已没有存在的必要。


    我记得她说过，如果湿疹被移除，必须要有其他东西来替代。她在催眠中曾看见在荷兰的另一世，她看到那一世她有强壮和健康的身體。她很喜歡這個身體，因此潛意識說她可以用这个荷蘭女孩健康身体的觀點來取代濕疹。她對此非常開心並且同意這樣的作法。


    有位女性個案因為椎尖盤問題而下背部疼痛，醫生建議她動手術治療。她在催眠中看到自己是韓戰中的一名黑人士兵。許多炸彈在他身邊爆炸，他被擊中背部，而且被彈到淹滿了水的壕溝裡。他因為癱瘓動不了，無法逃離而淹死。她太快轉世，因此還帶著背部的記憶。這也說明了為何她害怕密閉空間和吸不到空氣（她偶爾也會支氣管炎發作）。


    我在工作中發現，排隊等待殘障身體的靈魂多過等候健康身體的靈魂。從靈性的角度來看，這很容易理解。輪迴地球的計畫是要盡可能在一世裡償還最多的業，以免一次又一次地回來。透過殘障的身體可以償還較多業力，靈魂可以學到重要課題，照顧者也是（父母等等）。其實在進入這一世之前，所有相關者就已同意要照顧這個個體（指殘障者）並盡可能地協助。人生的一切都是課題，雖然有些課題比較困難。而每個看到殘障者的人又學到什麼呢？旁觀者又是如何反應？殘障者教導的是每一位他們接觸到的人。因此殘障者不是要被憐憫或迴避。他們是該被接納與欽佩，因為他們這一世選擇了一條困難的道路。


    **获取更多好书，请加微信：13641926204 或 QQ:715104687**


    被收養的人在靈魂層面都知道他們將會被收養，這都是事先計畫好了的。在靈界的時候，生父母和養父母就已經做好了安排。生父母同意提供設計身體的基因，而他們透過給出小孩也會學到課題。養父母同意撫養小孩，他們提供的正是這個靈魂決定它要的生長環境，為的是學習這世想學的課題。然而計畫並不是設定後就不能更改。永遠都有自由意志，（不只是被收養的人，所有相關者的自由意志也都會）'
