    过去这几年我的回溯工作常出现的其中一个主题似乎是：我们是资讯和知识的累积或记录者，而我们的主要工作就是以各种形式来保存这些资料和知识，甚至以密码的形式储存在我们的DNA或潜意识裡，如此一来这些资料的知识便不会被遗忘。在事物的设计中，知识似乎非常重要。也许是因为源头或神需要我们尽可能地累积所有的知识。外星人也在累积知识与资料，这就是植入物（尤其鼻腔裡的植人物）的主要目的之一，为的是传送和记录资料。而我探索得越多，就越发现所有的一切都被记录。这点在其他章节会有更多的说明。'
