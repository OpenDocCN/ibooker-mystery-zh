    何動物。只有一些在地上爬的小東西，只有那種生物可以在這種艱辛惡劣的環境下生存。就這樣。我們甚至吃這些在地上爬的東西。我有個體悟是，我們曾經擁有許多美好的事物，獲得許多幫助，這些都讓我們可以體驗豐饒的生活，但是我們沒有好好珍惜和尊重。宇宙複雜精細的智能使這個地方如完整實體般的運作，而我們並沒有尊重它。我們之中有很多人不尊重這個力量，因為他們沈迷於能量的增強。他們認為越多能量越好，他們取走水晶和矽酮和一切基本元素的根源，運用它們增強能量，他們認為能量越多越好。因為我沒有參與能量場和能量產物增強的事，所以我不清楚為什麼他們會這麼想。從我的角度來看，我也一直不知道他們是怎麼看待自己這樣的行為。我們已經擁有一切了，我們不需要再擁有更多。我甚至無法理解為什麼他們會覺得我們需要更多的力量。他們一定是想要達成或做到什麼，我不知道。


    「你認為這其中有什麼課題嗎？」


    「更多並不代表更好。有些人濫用能量、濫用力量、試圖對抗那些把我們創造得如此美好的靈界、天使界和自然秩序，並認為它們不具任何意義。對一些人而言，原始的力量和他們的實驗似乎比去尊敬和感恩那些已存在並且一直保護著我們的東'
