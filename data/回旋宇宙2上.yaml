    前世今生與志願者靈魂


    很好戰，他們想隱藏他們的行為。這兩個地方很近，但不是在同一區。他們被發現了。高層議會在討論這件事。他們不喜歡這群人的作為。我看到一個大桌子。很多的討論。


    朵：他們有做出決議嗎？


    瑪：有，他們決定必須保護這個地方，阻止這群人的行為。（停頓很久）他們要這群人停止並且離開。這群人的領導者，這個發言的人，身上穿戴很多金屬，頭飾看起來很像鳥。他們沒有把這個議會看在眼裡，他們說他們也擁有這個星球的權利，因此拒絕離開。他們帶了武器過來。我看到一個太空站。地面上有武器。他們要佔據這個地方。他們已經做好攻擊的準備，他們是好戰的，所以也做了許多防衛。


    朵：他們不認為他們必須遵守議會的決議。（對。）（停頓）你可以縮短過程的時間，告訴我他們的行動結果。後來議會決定怎麼做？


    瑪：他們決定把大家遷移到一個安全的地方。威脅已經很明顯，會造成很大的破壞。他們採取很多行動遷移民眾並重新安置，但是一切都發生得太快了。


    朵：可是負面的那方難道不知道如果他們開戰，就會毀了這個地方？他們來這裡不'
