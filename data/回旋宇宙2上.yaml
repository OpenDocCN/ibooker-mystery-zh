    另一個奇特的案例是二〇〇四年的催眠個案，他是一位在醫學領域工作的男性。他主要的問題是他的太陽神經叢部位有種他稱為「恐懼和焦慮」的感覺，似乎有個很大的結在那裡，讓他感到很不舒服。他一直都沒有安全感，總害怕有什麼事要發生，但他的生活井然有序，很難解釋那會是什麼事。他想知道這種感覺來自何處，代表什麼意義，並且如何擺脫。


    催眠時，他進入我探索過最奇特的前世之一。他在另一個星球，是一個殺人機器。當他咆嘯著說要殺掉所有東西時，我想清醒時的他應該會被自己聲調裡的原始憎恨給嚇到。殺掉所有他接觸到的東西就是他唯一目標，而且他用的是一種特別的方式。他的家鄉星球和另一個星球已經交戰了許多世代，他是基因工程下的產物，他的身體被設計為可以儲存非常多的能量。他被太空船載往敵方星球，當他降落後'
