    朵：我不知道。我想是第一次從這個家鄉星球來到地球。我想是第一次。我不清楚。


    朵：這個家鄉星球是實體的地方嗎？一個實體的星球？


    亞：我們有形體，只是它是在不同頻率振動。就像在地球，但是跟環境的能量互動是不一樣的。你和環境比較像是一體，你覺得與所有東西是一體的，而且你對事物的感受是更直接，直接許多。


    朵：你們的形體看起來是什麼樣子？


    亞：我們非常高，有點瘦。你們可能會用「長」來形容我們的肢體和手臂。從地球人的角度來看，我們看起來很瘦，而且我猜你們可能會說我們有點……有點像蚱蜢。


    朵：細長？


    亞：對，我們看起來細長。我們的星球帶點紅色，所以我們看起來也是紅紅的。


    朵：你們要去哪個星球是自己決定就可以了？還是要被指派？


    亞：我們可以去找訪，就像是出任務到某個特定地方，但無論如何，這都會牽涉到能量的調降（頻率轉換到低速）。有一個特定的協定是我們必須遵守的，這個協定是由治理者——不是治理者是……是由看顧不同地區的存在體所制定的。所以並不是你想去哪裡就可以立刻你去想去的地方。


    朵：有一些特定的規定和規則。（是的。）必須由他們告訴你去哪裡嗎？


    亞：嗯……如果我們對某個特定地方有興趣，或是要執行任務，我們可以制定計畫或提出要求，或是規劃探訪，如果符合其他規定的話就可以成行。現在我們在地球有個計畫。這是一個長期性的計畫，我們被要求要參與這個計畫。


    朵：你稍早提到讓這些能力變得更普遍，這是計畫的一部分嗎？還是有其他事和這個有關？


    亞：那是這個計畫的一部分；要讓在人類形態的存在體開始使用某些能力幫助人類轉化到一個更高功能運作的狀態，以便順利度過這段危機時期。在這個時候仍有趨勢想阻止這一切發生。想要阻止這些人，或是多少限制這些人的活動，或是把他們視為威脅。


    朵：沒有你們的幫助，地球人自己就無法發展或轉化嗎？


    亞：我們比較像是顧問或指導者。


    朵：我想的是老師的角色，要向他们示範。


    亞：沒錯，比較像是美式足球員明星或類似的角色。人們注意他們、崇拜他們，而且了解他們的能力，比較像是個榜樣。


    朵：如果你們在不同時期來到地球，聽起來這像是一個持續性的長期計畫。


