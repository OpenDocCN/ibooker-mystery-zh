    繼《迴旋宇宙1》之後，朵洛莉絲透過個案取得更多有關亞特蘭提斯的毀滅，以及不為人知的地球古文明故事。隨著科技進展，文明的再一次興盛帶來了亞特蘭提斯時期的部份靈魂重回地球接受考驗和彌補過錯的機會。而地球次元晉升的計劃也喚來許多志願者在這時候勇敢來到這裡，協助人心的轉化和頻率的提升。

