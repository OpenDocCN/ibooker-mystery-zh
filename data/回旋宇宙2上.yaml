    # 迴旋宇宙 2「上」

    ### 前生今生與志願者靈魂


    另一個個案的前世回溯也跟外星人互動有關。我們傾向於認為幽浮事件是發生於現代，但我曾有过一些個案在其他人世也目擊過幽浮並與它們互動。有位男子回到某世，起初的場景都很世俗和無趣，就像百分之九十的前世回溯一樣。他在那世是一個單純的牧羊人，住在山谷裡的一間小屋，他唯一的同伴就是他照顧的羊群。他沒有家人也看不到任何人，除非走到鄰近的城鎮才有人煙。他很
    不快樂，很渴望有人陪伴。在他孤單的生活裡也有著恐懼，因為他偶爾會看到山上發出巨大的光，並籠罩著他的小屋和羊群所在的牧草地。每當這個情形發生，他會躲在屋子裡直到光消失。這是他意識的記憶。事實上，這光其實是太空船降落在他的屋子附近。他會清楚著走出去跟太空船裡的人交談。他是志願參與這項實驗，所以人必須待在這裡直到實驗完成。他被告訴他時機未到。他是志願參與這項實驗，所以人必須待在這裡直到實驗完成。他被告知有很多志願者來到這裡，以人類的形態在各種不同的環境下生活，為的是要看到他們如何適應地球的人生。其中有些人過著不同的生活型態，而他的設定是過著孤獨隱居和寂寞的日子，看他是如何處理。當太空船飛離後，他會站在牧草地上哭泣，早乞求他們回來帶他走，因為他無法忍受這樣的生活。之後他會回到小屋裡睡覺，


    - 上醒來後完全不記得昨晚發生的事。

    - 這個案例非常類似我調查過的現代幽浮事件。個案所記得的內容和實際發生的情形往往非常不同。意識所記憶的帶有恐懼的記憶，通常是無害且良性的經驗。

    - 人類對於無法瞭解的事總是感到恐懼。當知道事實後就比較容易應對，因為事實並沒有他們想像得那麼糟。

    - 這個牧羊人一直到快要老死才擺脫他在山谷的寂寞一生。有一晚太空船回來了，他走出屋外，開心地與太空船裡的人打招呼，然後走進太空船，踏上回家的旅程。

    - 就如同亞倫所說，在地球上生活很難逃脫業力。當靈魂造了業，就會被困住並回來地球償還。亞倫表示在他的情形，有個保護性的套子被放置在他身上，讓他能免除業力的影響。沒有這種保護裝置，是無法在人類中生活還能不被業力沾染和牽

    - 絆地回「家」。


    樣，這個牧羊人的一生並不刺激也不戲劇性。也許對外星靈魂來說，單調乏味和簡單的生活比暴力或戲劇化的人生更能有所學習。很明顯的，這樣的生活不會產生業力，因為他並沒有與其他人互動。


    芭比的錄音帶也提到一種保護裝置。她形容這種裝置像一片薄膜，讓她不會困在業裡。這個部分會在第二十八章有更多說明。芭比的催眠是緊接在亞倫之後進行，地點同樣是在尤里卡溫泉市。就彷彿「它們」想要讓我知道有兩個關閉了業力機制並避免困陷於地球的案例似的。


