    ## 261

    ### 第九章 | 孩子與業力


    我在催眠工作的早期並不認為會有靈魂把我們這個文明和忙亂的文化當作第一次肉體轉世的地方。我曾被告知第一次投生想當然爾會選擇生活較容易的原始社會，這樣可以先適應和學習如何在地球生活，以及與其他人類相處，然後再進入現代的生活方式。如今我發現事情並不總是如此。


