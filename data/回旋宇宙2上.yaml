  md: '催眠時她回到了前世，她是南軍的士兵，和其他幾位夥伴一起被捕。他們被送到一間很暗的房間，只有很小的窗戶，大家一起擠在狹小的空間裡。她害怕手腳被綁的恐懼是來自她當時被鍊條銬在牆上的經驗。夜裡難以成眠則是因為在那樣的情況下，當時的他根本無法好好睡，而且心裡也害怕接下來會發生的事。幾天之後，他們全都被吊死。


    這個案例顯示似曾相識的感覺可能是下意識憶起了前世經歷。同樣地，對某個年代、文化或國家的嚮往也是。這些吸引並非總是負面，而這些無法塵滅的強烈情緒也總是持續被帶入許多轉世。


