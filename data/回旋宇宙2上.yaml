    **迴旋宇宙 2「上」**前世今生與志願者靈魂朵：我們通常無法看見或知道它們的存在。瑪：有些人可以，但大部分的人無法用眼睛看到。**朵**：**只是有感覺。直覺。**瑪：是的，沒錯，就是這樣。**朵**：**這很重要，這表示符號對宇宙心智來說很重要。**瑪：沒錯。那是宇宙的語言。這個說法和我之前收到並寫在別本書裡的訊息是一致的。那就是外星人以符號溝通，而這些符號包含了許多組可以透過心智轉譯的訊息和概念。此外，很多人告訴我，他們收到大量符號進入腦袋，我想這也可以部分解釋這些人的經驗。**有些人說**他們躺在客廳的沙發上，然後看見一束光穿透窗戶，這道光束裡有許多幾何圖形和其他符號。光束聚焦在他們的前額部位。其他人則報告他們有畫上好幾個小時的符號或不尋常圖案的衝動。（許多人寄來他們圖畫的影本，讓我驚訝的是它們看起來很類似。）外星人曾告訴我麥田圈的圖案也包含許多組資料。**觀察者並不一定要**在麥田圈裡才能接收，只要在一本雜誌或報紙等等看到符號，就能下載這些資料。許多人也提到下載訊息時的不同情形。外星人說那是他們的語言。接收的人不一定要懂這些符號。它是植入在那個人的潛意識裡，是在細胞層面，植入的目的是這些人最終將會需要這些資料，他們會得到這些資料卻不明白是從何而來。**這帶出了一個問題**：如果我們在轉世前，符號的模式就已經銘印在我們的靈魂或氣場，不論這是怎麼做到的，那麼來自外星人的下載符號是加到這個模式裡，還是會啟動這個模式？個案確實提到這個符號的模式會隨著那個人的生活經歷而改變。**朵**：**我知道在埃及有許多金字塔，你們是把它們放在大金字塔裡嗎？**瑪：（停頓）我想是在獅身人面像的爪子那裡，不是金字塔本身。我相信是這樣。那裡面有許多地下通道和房間，我想它是放在——如果我是正對獅身人面像的話──它會是……我相信是在左邊的爪子。**朵**：**這些通道也可以通往金字塔下面嗎？**瑪：是的，在金字塔底下有好多通道。**天使神秘学院官方淘宝：http://strc.taobao.com**#
    ## **迴旋宇宙 2「上」**前世今生與志願者靈魂朵：但是大部分的人都不知道要怎麼進入，是吧？瑪：對，只有特定的祭司，特定貴族知道。一般民眾並不知道。因為要建造通道，所以有傳言流出……總是會有洩密的人。**可是一般大眾不知道細節**，他們只是聽過傳言有這些通道存在。**朵**：**可是如果你們來到這裡的時候，獅身人面像和金字塔就已經建好了，你聽說過是誰建造的嗎？**瑪：（停頓）有。我相信這個文明——雖然不比我們先進——曾接受過外星人的幫助，因為那個社會的整體智慧水平並不是那麼高度發展，外星人提供他們資料，但，再次地，只是給少部分的人，不是全部的人。**他們很多人是跟隨者**，不是獨立思考的人。**朵**：**你有聽說過他們是用這麼巨大的石頭建造金字塔的嗎？**瑪：能量操作。透過一種重力的裝置讓石頭飄浮起來。這不可能用人力就能建造的。**朵**：**你來自的地方也有能力做類似的事嗎？**瑪：可以。雖然我的專長不是建築或建造東西，但是我知道能量操控的基本概念。還有飄浮。**大部分的學生**，那些在神廟工作的人，他們都知道這些事，飄浮和能量運用是我們學習的一部份。**朵**：**所以這是傳授給每一個人的知識？**瑪：是的。而且有些人在這方面很進化，在建築和創造物質方面很先進。不只是物質實體，也不只是三度空間，而是物質和更高振動的相互交錯，這比較接近精神心靈的顯化。不只是實體而已。**朵**：**但你說住在埃及的這些人不夠先進到可以自己造金字塔。**瑪：是的。但他們之中有些人比較進化，也比較願意傾聽，心態較開放……這通常是那些比較有接受教育的人。資料給他們是希望他們能夠對這個文明的進步有幫助。所以那些看顧地球的外星人接觸他們。外星人也到這裡來幫助這些事的進行。而因為我們來自的地方和具有的知識，我們也能幫助他們學習和進步。**朵**：**為什麼要建金字塔？有什麼目的嗎？**瑪：（停頓很久）金字塔是非常密實的能量源，它們和水晶不同，在金字塔裡的能量和散發的振動，可以擴展並協助事物的創造。由於它們具有的能量，它們像是學習中心，也像是進入另一個次元。它們可以增強並且傳遞振動和能量到其他地方。**它就像一個巨大的能量場或原力（force）**，或許不見得是原力。總之它是具有強大力量與能量的一個中心。**瑪**：**所以外星人想要建造金字塔？**瑪：這是他們建造金字塔的部分原因，也就是金字塔的功能。外星人只是想要人類創造一個更和諧、更和平的世界。一個更快樂，而非貧窮、痛苦和絕望的居住地。他們希望我們可以運用這個資訊和這些禮物來擴展那個可能性。**朵**：**這必須要有知道如何使用的人才行。**瑪：沒錯。這就是為什麼只有特定的人才能知道金字塔知識的力量，也只有他們才有可能幫助這個地區的發展。但同樣地，這個力量（指如何運用的知識）同時也伴隨著一個可能性——就和亞特蘭提斯一樣——它會變得負面。**朵**：**錯誤的使用能量。**瑪：沒錯。（大嘆一口氣）**自由意志可以是兩面的**。朵：所以才會有正或負面。因此你沒有使用你的卷軸和水晶，反而決定把它們藏在安全的地方。瑪：是的，人們還沒有準備好要接受這些資料，他們也沒有正確使用，沒有使用在該使用的方面。**在某些地方已經有人濫用這個力量了**，這很容易就讓那些地方'
  mdcn: '界對不同的生命形式都變得更好。我療癒和幫助別人。我地位並不高，我仍是學生，但我很很有進展。我一邊學習，同時也在教導。我可以幫助別人。朵：和你一起在船上的人也是學生嗎？瑪：他們也是在神殿裡跟我一起工作。他們像是助手。朵：你被教導如何使用能量，而且也在使用了？瑪：對。學習水晶和能量的使用，還有如何創造事物和改變情況。學習如何療癒，如何幫助失去平衡的人。我有能力做到這些，但還不算專精。我當時仍然在學習心智與當下能量的組合，學習改變它，並協助使它成為物質形式，然後它就可以用在全體的利益，用來幫助整個社區或甚至個體，或是讓後來的學習者使用。朵：你運用能量在正面的地方是很好的事。瑪：是的，我越來越熟練了。如果有需要，我能夠影響天氣的模式。但是，我之前說過，我的興趣是在幫助人們，治療他們的身體或心理上的病痛。朵：他們會來神殿找你？（對。）你如何治療他們？瑪：有時候我們使用水晶，有時候我們只是透過觸摸來操控能量。有時候我們甚至不必碰觸他們，只是用雙手就可以把能量帶給他們。**瑪**：**所以這些水晶是非常有力量的。有時候水晶可以協助將能量轉為正面。**朵：你說你可以控制天氣模式。你為什麼會想這麼做？瑪：如果有一段時期因乾旱而缺水，或者遇到足以威脅我們居住地的暴風雨，我們會試著去改變能量，讓它不那麼具毀滅性。這個地區有許多不安，很多人都帶有負面能量，所以我們會想去平衡這些能量。朵：你是指在你居住的地方嗎？瑪：是的。那裡有人在使用黑暗界的能量和力量做實驗，他們引發了混亂，干擾了許多住在那裡的人。朵：所以能量也是有可能被使用在負面的方式。瑪：是這樣沒錯，但能量從來不是要用在這方面。因為有太多負面的存在體或能量，這些負面存在的思想模式改變了情況，人們學會了負面運用能量。負面力量製造出各種問題。**迴旋宇宙
    2「上」**前世今生與志願者靈魂# **第六章 | 逃離亞特蘭提斯**朵：你會認為人們知道能量不是要那樣使用的。瑪：但很多人不是那麼進化，他們不瞭解事情該是如何。朵：因為你送出的—切終將回到你身上，不是嗎？瑪：沒有錯。朵：你們沒有任何方法可以對付這個負面力量嗎？瑪：我們做了很多事去阻止它，但後來它的力量變得實在是太強大了。更多的負面振動與能量被傳送，更多人受到負面能量的吸引。我們變得害怕，最後，在那個時候和那個地方，我們已無法再多做什麼來阻止了，因此我們必須去做我們認為是挽救和保存我們知識和生活方式的最好做法。這就是為什麼很多人決定離開的原因，他們盡所能把可以帶走的東西都帶著，然後搭船離開。朵：你們不是看到了什麼即將要發生的事，才選擇這樣離開？瑪：我們居住的土地抵押，那時已有許多地震，我們居住的土地即將沈入大海。我們知道我們無法阻止。朵：是的，一直都有地震。我們知道我們會有個全新的世界，只是時間早晚的問題。**迴旋宇宙
    2「上」**前世今生與志願者靈魂天使神秘学院官方淘宝：http://strc.taobao.com# **第六章 | 逃離亞特蘭提斯**我們也知道我們之中有些人將會離開他們的身體（指死亡），另一部份的人則會試圖保留舊世界的事物並帶到新世界。你們會以為使用負面力量的人看到發生的事就會停止了。他們沈溺在使用力量改變事物的能力當中。他們根本不在乎。他們之中也有些人計畫搭船離開。朵：你知道他們使用負面能量的目的嗎？他們把負面能量用在哪些地方？瑪：他們想把人們帶離光，帶離正面。讓人們只知道害怕並看到負面事物。他們要利用恐懼（沒錯）。但他們有些人看見發生的事也想離開。朵：對。事情已經太過頭了，我們居住的土地和地區無法承受更多的崩裂，無法再繼續存在了。我們的土地即將要沈入水底。瑪：你提到大一點的船都被佔走了。（對。）所以有很多人知道將要發生的事。你和你的助手搭小船，你們帶了一些水晶在身上？朵：我們帶了水晶和一些卷軸；一些我們想要保存的教誨和資料。很多人都有這些東西的複本。很多人帶了更多東西，為的是希望我們之中有人能成功逃離。**不是大家都航向同一个方向**，我们都试图往不同的方向，这是希望我们所学、所教导和所拥有的资料能够传承下去。朵：所以你们没有人知道要到哪裡。（没有回答）你们以前从来没去过那些地方？玛：有些人旅行过，大部分是搭船，但他们也可以在睡梦中来到这些地方。他们能够用「飘浮」的方式去那裡。（她是指静坐冥想
    [Meditation] 吗？听起来像是「飘浮」[levitation]）他们能够用这样的方式移动，不一定真的需要搭船去。但在这个时候，有太多能量崩解还有自然的力量——就像可怕的暴风雨——因此我们无法用这种方式旅行，我们必须搭船。朵：而且你们如果以灵魂的形式离开就无法带走水晶这些东西了。玛：没错。朵：你们必须带走实体的东西。**瑪**：**资料会永远保留在以太层和更高层的界域，但在身体的形式就很难触及这些资料，因此我们必须带走那些实体的东西。**他们没有看到陆地后来发生的事，因为他们已经在海上了。他们只想赶快离开，隨著洋流到任何地方。朵：你們有帶食物嗎？瑪：有，我們有帶一些。我們用配給的方式分配食物，我們也學過如何用非常少量的食物來維持生命。我們希望盡可能維持得久，因為我們不曉得要多久才會到達陸地。朵：你們有哪些食物？瑪：是一種高濃縮形式的能量。某種穀粒。我們也吃一點點的蛋糕。水對我們來說非常珍貴，我們只能喝一點點。因為我們能帶走的不多，所以我們盡量不划槳，我們要保留我們的體力，也因此我們盡可能地睡覺，盡可能地少吃。朵：聽起來很合理，因為當你們睡覺時，就不會使用太多的體力。瑪：沒錯。**瑪**：**是的，這些食物可以保存很久。**朵：你們在海上已經有一段時間了嗎？瑪：（停頓）我不太確定是幾天還是幾個星期，但似乎有一段時間了。我們會在船上做記號劃天數。朵：那就像是日復一日。瑪：沒錯，尤其是你睡很多的時候。然後醒了又睡。我引導他往前去看看發生了甚麼事，因為他會在海上漂流好些日子。**朵**：**你們找到落腳的地方了嗎？**瑪：有，找到了。我們靠岸的時候，好多人站在那裡看著我們，好奇我們是從哪裡來的，而且搭這麼小的船。我們認為這裡是……我們靠岸的地方看起來像是埃及。站在那裡觀看的人膚色較深。朵：你們可以互相溝通嗎？瑪：我們能用心靈感應的方式溝通，但語言就有障礙了。**朵**：**他們可以心靈感應你們嗎？**瑪：有的人可以，但比較起來，我們比較能懂他們。**朵**：**他們居住的土地有發生任何事嗎？**瑪：一直有很多暴風雨，還有季節的改變。他們知道有不尋常的事在發生，他們很害怕。對他們來說，海上一直都不平靜，氣候也變得很不一樣，然後又出現一群人搭著小船抵達，而且這些人看起來顯然跟他們不同，這讓他們覺得更可疑。**瑪**：**你可以告訴他們發生了什麼事嗎？**朵：我們並沒有告訴大家發生了什麼事，我們只說我們失去了家園，我們搭小船在海上航行了很久才來到這裡。那裡似乎有個人可以幫我們翻譯。但我們並沒有告訴每一個我們接觸到的人，我們是經歷了多少困難才來到這裡，而且他們也不會瞭解我們來自的文明。**朵**：**他們的文明沒有你們那麼先進？**瑪：沒有。他們的文化和我們不同。**朵**：**他們讓你們留下來嗎？**瑪：對。他們對我們奇怪的樣子感到好奇。他們讓我們留下來。**朵**：**你們現在有什麼計畫？**瑪：當下的計畫是先恢復體力，吃點食物、喝點水，找到可以休息的地方。有個男天使神秘学院官方淘宝：http://strc.taobao.com前世今生與志願者靈魂164获取更多好书，请加微信：13641926204或QQ:715104687**165
