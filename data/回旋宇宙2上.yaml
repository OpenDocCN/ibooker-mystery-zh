  md: '# # 第十章 非人類形態的生命


    接下來的催眠是在佛羅里達州的克里爾沃特市（Clearwater）進行。那是二〇〇

    年的十月，當時我前往克里爾沃特市參加一個博覽會。

    身為人類，我們習慣認為我們的過去世（一旦我們接受了輪迴的概念）只有身

    為人類的經驗。我從研究中發現這個信念非常侷限。各種形式的生命都有可以教導

    我們的課題，而地球人生的目的就是來地球這個學校學習。除非你成功完成了現階

    段該完成的功課，你才能晉級。當然，當人類比當石頭或一根玉米可以學到更複雜

    的課題，但它們同樣都是活生生的生命，只是振動頻率不同。

    在我著的《星辰遺產》一書，我提到我為一名年輕男士進行回溯催眠，我引導

    他前往第一次的地球人生，我當時想可能會是洞穴人之類的一生，但他回到了地球

    還在冷卻，以便未來支持生命發展的階段。當時的地球仍有火山持續噴出岩漿和有'
