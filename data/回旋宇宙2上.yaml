  md: '轉世，以及她被上帝創造的時候。


    所有的催眠療程都是錄在一台攜帶型的舊式轉盤錄音帶上。雖然稱為攜帶型，但它仍然是一台很笨重的轉盤式錄音機，用的是大型的八吋錄音帶。在當時並沒有什麼說明或指導的書籍可以指引催眠師遇到這類事情該如何處理。那時候這類書只有一本莫瑞·伯斯坦（Morey
    Bernstein）的《尋找布萊迪·墨菲》（Search for Bridie Murphy）。那本書在當時被認為是經典，但它在現在讀來非常一般，甚至不可能會被出版。總之，那本書的出現正是時候。


    話說當我們和這位女士一起回到過去時，我們沒有任何書籍可供參考或指導，我們就這麼看著這位女士隨著不同時期變成別的人格。然而我們邊做也邊發展出自己的一套準則，並且獲得了很棒的結果。此外，在實驗過程中，由於沒有人告訴我們不能這麼做，因此我們進一步引導她去看大家的未來。


    她看到我們住在鄉下，而且也有了孫子。我們沒有告訴任何人這位女士的身份，但有幾位海軍朋友聽說催眠的事後，來到家裡要聽最新的發展。催眠這位女士的經驗永遠改變了我們的生活和信念體系。


    一九六八年是我生命裡非常重要的一年，因為一切就此改變，我的生活再也無'
