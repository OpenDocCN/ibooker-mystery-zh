    我們重新經歷了與她的問題有關的重要前世。她看見自己抱著一個一歲大的嬰兒在街上奔跑。所有人都慌亂地逃竄、尖叫，因為有一群騎著馬的士兵在追逐他們。這裡顯然正被侵略。為了逃命，她努力尋找可以躲藏的地方。她的寶寶在哭，她擔心會因此引起注意而被發現，於是把寶寶放在牆邊，然後跑到一個建築物裡面躲起來。她認為絕不會有人會去傷害一個小嬰兒。但當她看到這些士兵橫掃整個街道並殺掉她的寶寶時，她被悲傷淹沒不能自已。當軍隊發現了她，強暴後再殺害時，她也不在乎了。她為寶寶的死責怪自己，她覺得應該把寶寶帶在身邊。雖然不論是怎樣，他們其實都難逃一死，但她不這麼想。她責怪自己不該遺棄寶寶。即使到了靈界她也同樣心痛。


    她把哀傷和痛苦帶到了這一世，並且重複自我懲罰的模式。我問她是否願意原諒自己並停止懲罰她自己，開始真正生活了。這是很困難的過程，達成後我鬆了一口氣。她清醒後，我們討論這件事，我跟她說她已經懲罰自已太多世，是放手的時候了。此外，如果她曾回到更早的前世，我願意打賭我們會發現她是為了償還她某世身為士兵所做的同樣的事情。怎麼欠就怎麼還。經過這次催眠後，她的痛苦減輕了许多。她的無價值感消失了，取代的是希望與期待。我感覺她已在人生做出了轉折。確實是時候停止懲罰自己了。


    **049 第二章 | 一般的前世療法**


    當她進入深度的出神狀態後，她立刻看到很亮的光，她意識到自己正看著火燄。火燄在她的腳部，接著迅速竄升到她的身體。她變得很不安，於是我引導她到一個可以客觀看待整件事的位置。她看到在靠近樹林的某個空地上，她（是個男子）和其他人被綁在木樁，熊熊烈火正燒著他們。


    當她回溯到故事的開頭，她看到自己和其他人住在一個很大的莊園房子裡，他們是諾斯底教徒，他們自已過著安靜的生活，研讀並撰寫書籍，沒有打擾到任何人，但是地方官員卻認為他們是與魔鬼工作的危險人物。官員受到宗教團體的慫恿，因為宗教團體也把它們看作威脅。有天晚上，他們被狗吠聲和一群闖入房子的人吵醒。他和其他人逃進樹林，這些闖入者和狗群在後面追趕，最後他們仍被逮捕。


    他們被帶到城裡的某處，受到可怕的折磨，被逼著要供出藏書地點。他的臉在被拷問時受了很多傷，尤其是下顎和眼睛（個案這世的眼睛也因此有些問題）。當這些人無法從他們身上間出更多資料時，這些諾斯底教徒被帶到一個大房間進行審判。他那時已經非常痛苦而且失去知覺，因此無法受審或回應任何控訴。他只能恍惚地坐在那兒，聽著發生的一切，感覺像是作夢。但這些都已不重要了，因為這個審判是個騙局，只是個形式。他們接著被帶到樹林附近的空地，綁在木樁上活活燒死。他和其他人都沒有做錯任何事，他們只是擁有並企圖保存這些奧秘的知識。類似的在歷史上發生過無數次。總是有諾斯底教徒的團體試圖保存知識，而另一群人則想要得到這些知識作為己用。這就是宗宗教法庭或裁判裡所謂「審判巫女」的真正原因。教會想要剝除那些擁有他們一直想獲得卻沒能得到的秘密知識的那群人。現在我們知道沒有任何知識是遺失的。這些知識一直都藏在最安全的


