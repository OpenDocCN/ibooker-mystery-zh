    ## 第八章 | 被帶往安全之地


    ### 在決定怎麼做？


    「在她提出聯盟的想法之前，先讓她和群众合作一段時間。當村落間形成聯盟，我們就能一起討論策略。有些人去了其他村落，這就像是組成一個議會。我們有共同的威脅，而這個威脅並不是來自別的人。」


    我以为也许是敌人入侵，因为历史上发生过无数次这类事件。「很难界定，因为我也不了解。我不确定是不是地球的变动，还是来自外在的威胁。没有人可以确定是什么。但如果我们能够组织起来团结一致，我们就能克服这个混乱。」


    **我决定带他往前去看看到底发生什么事，希望能釐清状况。他看到所有的人都聚集在一个很大的空地上，她大叹了一口气，然後说：「太疯狂了！」停顿一会儿后，她不情愿地告诉我她看到的事。「我看到太空船。外星人的太空船。他们的船降下来了，大家都很害怕，但是他们没有敌意。」**


    **他描述太空船「有点圆，但不是球的形状，是比较椭圆的。这些外星人也不是长得小小的，他们比人类高大，一抓就可以抓起很多人。」**


