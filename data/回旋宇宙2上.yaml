    \ \n\n所以你會發現，書裡傳遞的訊息大都與宇宙法則有關。\n也因此, 宇宙花園的每一本書都懷著這麼一個希望:\n在你迷惘困惑時，帶來啓發；在你受挫疼痛時，帶來溫暖;\n\
