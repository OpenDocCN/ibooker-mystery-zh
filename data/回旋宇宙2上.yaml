    ### 第一章

    催眠生涯的開始


    我把我催眠領域的歷險集結成了這本書和另外的十二本。我常覺得自己就像電影《星際爭霸戰》裡的人物，去到從沒人去過的地方探險。我穿越了時間與空間，探索過去的歷史和可能的未來。我到過不知名的星球和次元，跟許多所謂的「外星」物種交談。我見識過失落文明曾有的奇觀，也得到它們如何滅亡的資料。這所有的旅程都不是透過科幻小說裡常見的時光機器發生，這個探險旅程唯一需要的是運用人類的心智。因為所有的已知和未知，都隱藏在潛意識深處，等著被發現。這就是我的工作，也是我熱愛的事。雖然我主要的工作是透過前世回溯進行催眠治療，但我視自己為記者、調查者，以及失落知識的研究者。我認為我的工作是探索未知的事物，因為我發現了一種催眠方法，也可以說是技巧，而透過這個方法，神秘和未被揭露的領域得以被探索與檢視。'
  - '[PAGE 17]


    # # 第一章 | 催眠生涯的開始


    在開始從事催眠工作後不久，我便發現我的工作內容已從平凡無奇的前世生活進入了「失落的知識」的領域。之所以稱「失落的知識」，是因為我發現我所發掘的是已被遺忘、埋藏，或甚至不曾得知的資料。我們現在正進入一個新的世界，一個新的次元，這些資料將會被珍視與運用。這些失落的資料之所以被埋藏或隱藏而不公開是基於明確的理由：許多消失的文明誤用了他們的力量，沒有珍惜他們的成就，這些知識因此被取走。也許現在時機已到，是讓這些天賦、力量與知識重現，並讓我們這個時代去珍惜和應用它們的時候了。


    當然，我的催眠工作的主要目標是治療、幫助人們康復或解決他們的問題。但我最令人興奮和有成就感的部份，就是發現歷史，將失落的資料和理論帶回我們的時代。這部份對我來說就像是美味的肉汁或蛋糕上的可口糖霜，這也是發現了埋藏的寶藏一樣。潛意識說過，沒有什麼知識是新的，我們只是重新發現其他世曾擁有，但因年代久遠而被遺忘的知識。而我也從工作中發現，這些知識和資料事實上從不曾被遺忘，因為它們一直被儲存在潛意識心智的電腦資料庫裡，只是在等待適當的時候再次出現。而這就是我透過我的催眠工作在做的主題，我也總是會以一小段個人背景作為開場，我持續到世界各地演說書中的主題。'
