    ## 第四章 | 女神愛西斯


    這個催眠是在二〇〇二年四月，我去內華達州拉斯維加斯（Las Vegas）的會議演說期間進行。英格麗是位個子嬌小的五十多歲女子，她在南非長大，講英語有地方口音，但在催眠過程中我漸漸習慣了她的腔調。

    我對於口音總會感覺有些吃力，因此必須很仔細地去聽。如果英語不是個案的母語，有時他們會無法進入深度的催眠狀態，但英格麗並沒有這個情形。她很快就出神，當她從雲端下來時，我甚至還來不及問她在哪裡，她的情緒就開始激動起來。

    **英**：我是為和平而來！其他人不瞭解我們的方式。他們太常打仗了，他們摧毀破壞了太多東西。我們一直在努力平衡這個情況，但他們不瞭解。


    **英**：我原本不想来这裡，是我的长老要我来的，因为这个星球需要改变，所以我就来了。（哭泣）

    朵：你在地球很长的时间了吗？

    英：我在三万六千年前的孟菲斯（Memphis）时期来过这里。（她边哽咽边说，因此很难听懂她的话。）我那时是来自天狼星，我来修复这个被毁坏的星球。我不能诱导，必须要让个案说自己的故事。她指的是亚特兰提斯的毁灭吗？

    朵：你是生活在毁灭的那个时期吗？

    英：我是毁坏之后才来的。我来帮助人。帮助在地球上的种族。

    她的情绪缓和下来了，说的话也比较容易听懂了。


    **英**：幫助倖存者，教他們新的（生活）方式。教他們愛。教他們和諧。教他們合一。

    朵：還有其他人跟你一起來嗎？

    英：我們幾個人是搭太空船來到這裡，我們降落在你們所知為埃及的地方。有些倖存者在那裡，因為那是亞特蘭提斯的一部份。大部份的亞特蘭提斯現在在海 底。海底也有許多地方浮出成為新的陸地。埃及那時是亞特蘭提斯的一部份。

    她的咬字非常慎重，好像這些地名對她來說陌生而且不容易發音。

    英：有些倖存者在埃及。有的在一些小島，他們之後移居到其他高地。

    朵：你之前是一直住在你稱的「天狼星」嗎？

    英：是的，我們是非常高度進化的種族，或者說是高頻率或高能量層級。我們的食 物是光，我們不像你們一樣吃物質的東西。

    朵：你是說有人要你到這裡？

    英：我們的星球有個長老議會監督宇宙的許多星系。他們負責生命和創造。他們創 造了很多物種和星球。這是他們的工作。


