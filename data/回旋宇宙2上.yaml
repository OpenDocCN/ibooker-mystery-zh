- md: '## 第二章 | 一般的前世療法


    造成影響。所有的相關人都能改變結果。


    歷史的有趣部分。


    在英國的這名男性個案是一家印刷公司的主管，他善於交際和溝通談判。他覺得自己被工作和責任給絆住了，尤其是被他的婚姻。他有瞇眼和眨眼的習慣，這個習慣讓他很困擾，他覺得在工作上與人交談時，這會讓他顯得怪異。他試著假裝這是眼睛過敏的緣故。此外，他對光線也很敏感。


    他來找我主要是想知道他是否應該轉換人生跑道，換個不同的工作，也許離開妻子和四個孩子，去和他的女友共同生活。


