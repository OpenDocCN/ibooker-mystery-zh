    **瑞**：嗯，我在往上看，一片紫色的天空。（困惑）我往上看，它就在我的眼前。在我視覺邊緣是……很難形容。非常模糊。我沒有感覺腳底下有任何東西。


    我告訴他感覺會越來越清楚。


    **朵**：往你的右邊看，看看那邊有什麼。（停頓很久）它會開始變得清楚，而不是模糊。


    **瑞**：好，現在有更多顏色出現。比較亮了，像日出。也許像水。


    **朵**：像水面上的太陽？


    **瑞**：對，或者是……你有從水底下看過太陽嗎？


    **朵**：沒有，但我想那是可能的。


    **瑞**：這很像……對，我覺得我像是在水裡。


    這個說法讓我很意外，我不確定他是在游泳，還是因為溺水而到了生命的最後階段。這會有好幾個可能性，但我怎麼也沒料到這會是他經驗到的生命形態。這是


    [PAGE 288]


    我第一次遇到這個情形。


    **瑞**：是帶紫色的藍。我是從水裡往上看到的。在我右手邊是水面上的落日，如果是從水裡看出來的話……嗯……就只有一些顏色移動和波浪起伏，像是水波扭曲了光線。有金黃色，像是早晨……早晨的光線照射到水裡。這是為什麼我沒有形體，因為我在水裡。


    **朵**：這是為什麼你沒有感覺到任何壓力。（是的。）你有看到在你另一邊是什麼嗎？


    **瑞**：好像沒有。就是更暗而已。跟另一邊相反，因為太陽是從那邊升起的。


    **朵**：陽光穿透水面聽起來很美。（是啊。）你身體接觸到水的感覺像什麼？


    **瑞**：嗯，很自然。沒有恐懼，只覺得很舒服。


    **朵**：感覺你的身體。你的身體感覺像什麼？


    **瑞**：很平滑（他覺得很好笑）。我不知道，感覺像海豚。（語氣輕柔）這怎麼可能？但，沒錯，這就是我看到的，我看到一隻海豚。我從外面看到牠……還是我是在看著另一個生物？但我是仰著肚子看，我像是在睡覺，徜徉在水裡，隨著水波上上下下。我一隻眼睛可以看到太陽，另一隻眼睛看到黑暗，我也可以看到上面，


    [PAGE 289]


    **不必翻過來或移動就可以看到。是從東往西的全景式影像。**


    **海豚和海洋生物是如何看東西，牠們的視覺範圍有多大，我們真的知道嗎？牠們的眼睛各在頭部的兩側，也許這樣可以看得更廣。聽起來似乎是如此。**


    **朵**：真有趣。你認為有別的海豚在那裡嗎？


    **瑞**：我想有。也或者我看到了……我現在在移動，在四處看。因為我剛才在身體裡面，然後我離開身體想去看看這個身體長什麼樣子，所以我想這是我的身體。**體。很光滑、柔軟。（很確定的口吻）我是一隻海豚。感覺非常平靜。我覺得**


    **朵**：在水裡的感覺好嗎？


    **瑞**：很好。感覺自由。無拘無束。感覺已經擁有所需要的一切。


    **朵**：在水裡感覺到完全的自由。（對）你怎麼打發時間的呢？喔，你剛剛說你在睡覺。


    **瑞**：睡覺。我現在醒過來了，該做些事了。我們只是存在……我們只是活著。沒有


    [PAGE 290]


    # 迴旋宇宙 2「上」

    ## 前世今生與志願者靈魂


    計畫，我們吃只是因為需要吃。但現在好像……我們就只是漂流著……很難形容。沒有工作，沒有必須要做的事。只是去感覺……感覺……我不知道……


    嗯……很好，真的很好。但我現在感覺有點奇怪。


    **朵**：為什麼奇怪？


    **瑞**：因為我無法形容，無法把這個感覺歸類。


    **朵**：盡力就好了。你都吃些什麼？


    **瑞**：喔，吃其他的魚。


    **朵**：你可以在水裡呼吸嗎？


    **瑞**：可以。可是空氣……真不可思議！（停頓）我現在看到東西了，我看到建築物……在岸上。


    **朵**：你現在在水面上嗎？


    **瑞**：類似。我現在是側著身子。我的頭在水面上可以看到這些建築物。看起來像小屋子，叢林之類的東西……有草叢的屋頂。我在想他們是誰？那是什麼？


    **朵**：你看過人類嗎？（沒有。）你之前有看過這樣的陸地嗎？（不，沒有。）你通常都在海裡？（是的。）


    [PAGE 291]


