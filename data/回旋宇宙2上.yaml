    **283** 第十章 | **非人類形態的生命**


    毒氣體到大氣中，還不是一個適合生命發展的健康環境。


    這個年輕人在回溯時發現他是大氣的一部份，他和許多靈魂的工作是協助清理空氣中的阿摩尼亞和其他有毒氣體，好讓地球冷卻後有個適合生命發展的初步階段。雖然他沒有我們所認為的身體，但他是「活」的，並且知道自己的任務。他確實有他的個體性，並且從他自身獨特的角度來看待一切。他甚至會在工作時小憩，偶爾為了好玩而進出流動的岩漿去體驗那是什麼感覺。


    我發現，在我們終於進入人類階段之前，我們必須經歷所有的生命形式。這個發現我記錄在《生死之間》。我們的意識並不知道這個目的，這是為了要讓我們知道所有的生命都是一體的，在更深的靈魂層面，我們全都連結在一起。起初我們是靈魂，隨著我們在知識的階梯往上前行時，我們會經歷許多不同的冒險旅程，最後會回來再次與創造者合而為一。因此，當有個案說他是非人類的存在體時，我不再感到訝異。個案透過催眠尋找答案，而潛意識則會挑選它認為在這個時候最適合他們看到的前世。


    關於非人類形式的生命，我所蒐集到的部份資料如下：一株玉米經驗到的樂趣是沐浴在陽光下，以及在溫和的微風中搖擺。一顆石頭經驗到時間過得不可思議的'
