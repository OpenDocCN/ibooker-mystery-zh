- md: '轉世，以及她被上帝創造的時候。


    所有的催眠療程都是錄在一台攜帶型的舊式轉盤錄音帶上。雖然稱為攜帶型，但它仍然是一台很笨重的轉盤式錄音機，用的是大型的八吋錄音帶。在當時並沒有什麼說明或指導的書籍可以指引催眠師遇到這類事情該如何處理。那時候這類書只有一本莫瑞·伯斯坦（Morey
    Bernstein）的《尋找布萊迪·墨菲》（Search for Bridie Murphy）。那本書在當時被認為是經典，但它在現在讀來非常一般，甚至不可能會被出版。總之，那本書的出現正是時候。


    話說當我們和這位女士一起回到過去時，我們沒有任何書籍可供參考或指導，我們就這麼看著這位女士隨著不同時期變成別的人格。然而我們邊做也邊發展出自己的一套準則，並且獲得了很棒的結果。此外，在實驗過程中，由於沒有人告訴我們不能這麼做，因此我們進一步引導她去看大家的未來。


    她看到我們住在鄉下，而且也有了孫子。我們沒有告訴任何人這位女士的身份，但有幾位海軍朋友聽說催眠的事後，來到家裡要聽最新的發展。催眠這位女士的經驗永遠改變了我們的生活和信念體系。


    一九六八年是我生命裡非常重要的一年，因為一切就此改變，我的生活再也無法回歸正常。


    那年的某個晚上，我的先生強尼在回海軍基地的路上發生了可怕的車禍。他幾乎在那場車禍喪命。他被一位酒醉的駕駛迎面撞上，我們的福斯廂形車被撞爛，強尼卡在被撞爛的車子裡。醫生說他會活下來是個奇蹟，因為他傷得很重，應該活不過那晚。


    強尼之所以能活下來，是因為一位剛從越戰回來的醫護兵正好坐在他後面的車上。那位醫護兵慣於處理戰場上的緊急創傷，因此當時能在公路現場為強尼急救，使得他沒有因流血過多而死。當急救小組從基地到達現場時，這個醫護兵已經替強尼止了血，但強尼人仍卡在撞毀的車裡，靠消防隊的一番努力才救了出來。接著強尼被直昇機載往柯泊史克利斯地港市（Corpus
    Christi）的海軍醫院。


    當我到達護病房時，五位不同的醫生陸續進來，每一位都告訴我強尼可能無法撐過当晚的原因。他們對我沒有感到沮喪覺得困惑。我告訴他們，他們是錯的，強尼不會死。但我當然不能告訴他們為什麼知道——如果催眠中那位女士看到強尼的未來跟孫子在一起，那強尼現在怎麼會死呢？我知道催眠的那個畫面是真的。我相信我們所做的事，以及我們在催眠時的發現。如果要相信，我就必須相信全部。這樣的信念幫助了我在那個可怕的時刻保持清醒。


    我在當時沒有意識到基地裡許多人的信仰系統也因為此事而被挑戰。有人說這個意外是上帝的懲罰，因為我們探討的輪迴轉世，被他們認為是在與魔鬼合作；我們在角落凝視黑暗，打開了最好一直關上的門。我無法相信這樣的說法，因為在我們與那位女士合作的過程中，我們知道的上帝是充滿愛與仁慈，而非心存報復。當我的世界天翻地覆時，我無法理解這件事背後的原因，但我很肯定，我們的好奇心和對未知知識的探索並不會招致上帝的懲罰。


    強尼從戰場中生還下來，卻因一個酒醉駕駛的疏失而喪命，這不是太諷刺了嗎？事情當然沒有這麼發生。醫生稱強尼為「奇蹟之人」，因為他違反了所有機率和邏輯活了下來。然而，這只是接下來多年挑戰的開始。


    經過數月的加護病房和一年的住院（其中有八個月身體都戴著支架），強尼因肢體殘障從海軍退役。我們就是在那時決定搬到阿肯色州的山丘，我們認為在那裡可以靠退休金支撐生活並撫養四個孩子。這在當時是不得不的作法，但後來我很高興有這個僻靜的山丘處所可以隱居。局部截肢的強尼在往後的二十五年都需要坐在輪椅。他使用丁型柺杖可以步行到戶外，也可以開手動控制的車。而我在那段時間則是全心專注在先生和小孩身上。


    在我適應新生活的期間，我對前世今生的探究必須先擱置一旁。我是直到孩子們因為結婚或上大學而離家之後，才又重燃對催眠的興趣。接著的「空巢期症候群」，讓我開始思考往後的人生要如何渡過。我決定做些不尋常的事情，不是一般「正常」婦女會做的事。我決定重拾催眠，縱使我連在阿肯色州的山丘要怎麼找個案都不知道，但我知道這是我想做的事。


    我不喜歡一九六○年代流行的那種冗長的老派催眠導引方法，我知道一定有更簡單和快速的技巧，於是我研究較新的方法，發現利用意象和觀想可以引導個案進入出神狀態。我不再想專注在只是協助個案戒煙或減肥等戒除壞習慣的一般催眠。我的興趣被輪迴的主題點燃，這是我想專注的方向。然而在七○年代晚期和八○年代初，市面上可供催眠師參考的前世回溯療癒的書籍仍是寥寥無幾。我因此必須發展出自己的技巧。


    我很快就發現傳統催眠所教導的方法大多是不必要的，於是我開始拿掉一些步驟，以較快速的方式取代。只要個案不受到傷害，我認為催眠師可以嘗試實驗，找出哪些方法有用，哪些沒用。畢竟總要有人找出能最有效引導個案到達出神狀態的方法。我知道我是在開疆闢土，進入新的領域。如今，經過了將近三十年的磨練與完善技巧，我發展出自己的方法。我喜歡讓個案進入類似夢遊的出神狀態（這是最深度的催眠狀態），因為我相信所有的答案都可以在這裡得到。


    許多催眠師並不在這個層面工作，因為他們說，「奇怪的事在這裡發生。」所有讀過我的書的人都知道，奇怪的事確實是在那裡發生。大多數催眠師所受的訓練是讓個案保持在比較輕度的出神狀態。在那個層面，意識心非常活躍，經常會干擾和插話。有些資料是可以在那個層面獲得，但在類似夢遊的出神狀態下，催眠師可以获得潛意識完全的合作，因為在那個層面，意識心的干擾是被移除的。


    個案通常不記得任何發生的事，他們以為自己只是睡著了。通常的機率是二十或三十個人裡，只有一個會自動和自發性地進入深度的夢遊狀態，但我發展出的方法剛好相反：二十或三十個人裡，只有一個不會進入深度催眠狀態。因此這是非常有效的方式，可以移除意識的干擾並讓潛意識去找出答案。這就是我現在在教導的催眠療法，而我的學生也跟我回報他們有同樣驚人的結果。


    我在七○年代末期正式從事催眠治療工作，沒多久我就發現了一個模式。這是在我发现接觸潛意識方法之前的事。發現後，模式變得更加清楚。我發現大部分人的問題，不論是身體、心理、過敏、恐懼或人際上的困擾等等，都能追溯到某個發生在前世，而非今生的事件。


    我有許多個案都曾花上多年時間來回於醫生和心理醫師之間，卻仍無法找出困擾他們許久的問題原因。這是因為醫生只注意明顯可見的生理症狀以及這一世所發生的事情。有些時候，問題可以追溯到童年，而我所接觸的大多數個案，答案都是埋藏在過去世。


    我相信前世存在於另一個振動或是頻率。當我們回溯到那些前世，我們改變了頻率，於是能看見和經歷它們，就像變換電台和電視頻道一樣。有時這些不同的頻率過於接近或重疊，因此導致靜電干擾或說疾病的產生。


    透過我的技巧接觸（我稱為的）潛意識，催眠會有最好的效果。在催眠療程中，當個案找到與目前困擾有關的前世後，在某個重要時刻，我會要求與個案的潛意識對話。潛意識總是會回答並提供我們想要的資訊。


    在傳統催眠中，催眠師被教導以個案的手勢作為潛意識回答的方式。他們會要求個案舉起某個手指表示「是」，另一個手指代表「不是」。對我來說，這樣的方式太慢而且功能有限。當你可以直接與潛意識對談，而且它會以口語回應你的時候，為什麼還要用手指頭這種方式呢？透過我的方法，你能夠與潛意識進行雙向對話，而且可以得到任何你想問的問題答案。


    我對潛意識的定義是：照顧身體的那個心智部分。它管控身體的所有系統。你不必告訴你的心它需要跳動，也不用告訴自己需要呼吸。我認為這個工作是由潛意識掌管，因為潛意識時時刻刻都在監控，而且它知道個案身體裡正在進行的每一件事，因此我們能夠使用這個方式得到健康方面的答案。我發現各種身體上的症狀、疾病或不適，都是來自潛意識的訊息。潛意識急於想獲得我們的注意，它想告訴我們某些事，而且會持續直到我們終於瞭解為止。


    如果我們沒有注意潛意識的訊息，疾病或問題便會繼續惡化，直到我們再也沒有別的選擇，或是情況已不能好轉。這是真的，因為很多不同個案的相同症狀，都是起於同樣的問題。我只希望潛意識能用較不會引起痛苦的方式來傳遞它的訊息。


    我常說，「遞個紙條給他們不是容易多了嗎？」潛意識認為它傳達訊息的方式很直接，甚至魯莽，人們應該瞭解才是，但往往不是這麼回事。我們太過專注在日常生活了，以致不會去想為何總是背痛或頭痛等等原因。


    當我們透過催眠療程找出身體不適的原因時（原因通常都很不尋常，因此我認為沒有人可以在有意識下做出這樣的連結），由於潛意識的訊息已被傳達，身體的不適就會停止。訊息已被傳遞和瞭解，這些不適沒有理由再繼續。如果當事者在生活中能夠做出必要的改變，他就能恢復健康。責任最後總是會回到當事者的身上。


    潛意識只能做這麼多，因為最終還是要尊重個案的自由意志。


    我瞭解這些說法聽起來極端且不符合傳統的治疗方式，但我只能報告我從幫助過的數千人身上所觀察到的結果。我也相信潛意識是紀錄保存者，就如同同一台巨大的電腦，它記錄了曾在這個人生命裡發生的每一件事。這就是為什麼我們可以透過催眠取得資料的原因。假如那個人被要求回到十二歲的生日派對，他會記起當天所有發生的事情，包括蛋糕、參加的人、禮物等等。潛意識記錄每一個微小細節。有許多我會認為是多餘的，我納悶潛意識要這些瑣碎細節做什麼。譬如說，我們每分每秒所接收到的成千上萬的訊息：看到的、聽到的、聞到的、感知到的，還有許許多多。


    如果我們是有意識地覺察到所有的資訊，我們會因負荷過量而無法運作。我們必須只聚焦在那些對生活來說必要的資訊上頭。然而，潛意識總是覺察並持續記錄和儲存這些資料。為什麼？我們會在書裡進一步探討。這也可以解釋突如其來的心靈啟示和直覺的由來。那是我們在另一個層面（潛意識）所接收到的資料，雖然我們不一定需要，但由於資料就存在那裡，偶爾會滲漏到我們的意識層面。當這個情形發生，它被視為奇蹟般的現象。其實這些儲存的龐大資料一直都在那兒，只要有適當的訓練，便能觸及這些資料。


    潛意識不但記錄這生所發生的一切大小事，它也記錄當事人所有的前世與在靈魂狀態－層面時的一切。這些資料有很多是現世生活用不到的，但這些資料可以因好奇而接通，而且對探究的人來說會是有趣的。只是，這些資料對於這一世的問題解答有什麼幫助？


    這就是許多催眠師會犯的錯誤之一。他們認為帶引當事人去看前世是沒有價值的，除非只是因為好奇、對前世有所幻想，或是好玩（雖然許多前世可是一點都不好玩。）這就是為什麼我會發展自己的技巧；我會帶當事人回到跟這生問題最有關聯的一世。我從不誘導。在催眠時，我是讓潛意識帶個案回到它認為最值得去看的那一世，不論那些世的生活是無趣還是平凡（百分之九十都是如此），是住在現代還是古代，或是與外星人有關，或是生活在另一個星球或次元，我總會感到訝異。潛意識會做出連結，而那個連結是我和當事人絕不可能想到的。但當我們從那個觀點來看時，卻又相當合理。


    每當我接觸個案的潛意識，它總是令我驚嘆，因為很顯然的，我並不是在跟個案的人格，而是跟一個不同的存在體或個案的某部分說話。我也總是可以知道何時已經接觸到潛意識，以及是否是潛意識在回答問題。


    潛意識總是會用第三人稱（他或她）來指稱個案。潛意識不帶感情，而且似乎是與問題抽離，就像是一個客觀的觀察者。它因為個案一直沒有聆聽而責罵。有時潛意識的第一句話會是,「好，終於有我說話的機會了。多年來我一直試著跟
    (珍或鮑伯) 說話，但他們就是不聽。」潛意識非常客觀，因此有時候聽起來顯得無情。它會毫不留情地把它所見的情形據實以告。在它為了清楚表達觀點而不留情面地對待個案之後,
    潛意識也總是會告訴個案, 他們是被珍愛的, 以及它对个案的進步感到多驕傲。潛意識也認得我，它常會感謝我讓個案進入出神狀態，使得這個過程發生。


    潛意識經常用複數（我們）,就好像它不是單一的存在體，而是好幾個。這點我們會後面探討。如果這樣的接觸只是透過一個個案發生，懷疑論者是不會瞭解或相信的，而且他們也有很正當的理由不去相信。然而，如果是發生在每個我催眠的個案身上，而且不論他們是來自世界的哪個角落，那麼人們又要如何爭辯這是幻想、欺騙、愚弄或刻意的操弄呢？


    我使用這個催眠技巧把個案帶入適當前世的成功率有將近九成，在這之中又有大約九成的人成功接觸到他們的潛意識。潛意識說話的方式都是相同的，而且以同樣方式回答問題。如果這只是隨機發生，那就不會都是這個情況了。


    我遇到最難催眠的個案通常是高階的商業人士，那些慣於評斷和分析的人。他們在催眠過程中想要掌控，而不是放鬆和跟隨我的指令。也有的人會說他們已經準備好要去找出答案了，然而私下卻害怕即將出現的事，因此他們的意識會破壞催眠。但就如我之前說的，這個情形在我的個案裡只佔百分之十或更少。其餘的百分之九十總是可以看到前世。


    我曾經納悶，如果個案心智或心靈的這個部分跟其他人是一樣的，那我所接觸到的究竟是什麼？如果它只是屬於我催眠的那個人，而且只能取得他的個人資料的？潛意識本身在書裡提供了這個問題的答案，因為隨著我的工作的擴展，我覺察到更多事，而我也準備好（或者說我是這麼認為）接受更複雜的解釋了。


    我现在瞭解自己一直在限定它，而且也简化了它。事实上这就像是在跟一台连接上巨大资料库的电脑沟通一样。这个资料库超越了时间、空间和个体意识的所有限制,这正是我的工作令人惊嘆的部分。我似乎总是在跟相同的部分
    (或存有, 或不论什麽的) 说话,而现在我发现「那个部分」是无所不知的。它不但有答案要寻找的答案，它也有我想要问的任何问题的解答。那是一个可以触及所有资讯的全知部分。


    有些人可能会选择将这个部分称为「全我」、「高我」、「超灵」、容格的「集体潜意识」,或是「上帝」。这些用语虽然不同,但可能都跟同样的事物有关。而我只知道,在我的工作中，它对「潜意识」这个名称有回应。因此我称它「潜意识」。


    科学界和宗教界也有许多其他名词是用来解释我所成功接通的部分。不论我接通的部分是什么,和工作是件愉快的事,主要是因为我对这些资料充满了好奇与渴望。我非常喜欢在图书馆研究,而这个工作就像是到了史上最大的图书馆。在我探索更多繁複的形上学概念时，请跟我一起踏上这个旅程。我知道我没有所有的答案,但我已成功地更深入表层。也许你的心智会因我的发现而受到激励或启发。继续寻找和发问吧!唯有如此才能找到答案。


    記住這句諺語，「心智如同降落傘，打開才有作用。」


    人們並沒有意識到他們的心智具有療癒的力量，而我的催眠法能夠接通他們心智的那個部份，找到問題的起因。潛意識在使用身體症狀傳遞訊息時，可說是非常直接了當。如果更多人知道這點，他們就會更仔細聆聽身體在試圖告訴他們的訊息。


    在我做過的數千次催眠當中，我通常能夠辨認出某個症狀所顯示的模式或結果是否源自這一世。譬如說，如果有人說他有長期性的背痛或肩膀痛，我會問他是不是在生活裡背負著重大責任，而當事人也總是會回答確實這麼覺得；他們由於家庭生活或工作環境等等，覺得自己承受了許多壓力。這類情況會以背部或肩膀部位的不適來表現。


    手腕和手部的疼痛顯示個案在生活中緊抓著該放手的事物不放。臀部大腿或腳部的疼痛表示他們正處於改變人生方向的階段。這通常涉及必須做出重要決定，而這些決定將會徹底改變他們的生活。顯化在身體這個部位的不適是因為潛意識在告訴當事人，他們害怕跨出去，害怕踏出下一步，因此身體的疼痛顯示的是他們的退縮。胃部問題有時是因為當事人無法「忍受」(stomach，胃部的同義字)
    生活中正發生的事。癌症，尤其是腸道部位，意味當事人非常壓抑，壓抑到壓力產生後無法釋放，因而開始侵蝕器官。癲癇則是當事人沒有能力去處理身體的高能量。


    我曾有過一些個案在吃特定食物或藥物時會噁到。潛意識說這是因為他們無須使用這些藥物，這些藥物會對他們的身體造成更多麻煩。身體的反射作用以噁住和不適作為拒絕的形式，為的是不讓當事人消化有害的食物或藥物。潛意識有時是很戲劇性和操控的。


    雖然有些問題的答案可以在這世的生活裡找到，我大多數催眠的重點都是在他世。我會在書裡舉一些「正常」的前世回溯案例，呈現催眠是如何解決個案所經驗到的現世問題。接著我會專注在不尋常或不同類型的回溯，以及這些個案如何透過探索前世得到協助。


    請記得，這些案例所提出的解釋並不能作為適用於所有個案的疾病或不適的唯一原因。沒有任何解釋是可以適用於所有的案例。譬如說，過重永遠是因這個理由導致，或偏頭痛一定是因為那樣所造成。解釋會因人而異，潛意識是非常機靈和巧妙的。催眠師必須要有彈性，並且運用直覺提出適當的問題。適用於某人的答案和解釋不一定可以套用在別人身上。


    前世事件影響這世身體的一個例子：許多關節炎個案的原因源自中古世紀被架在拷問台折磨，或是在牢獄中被類似的刑具拷打。人類向來就有殘暴對待彼此的歷史，而有時身體仍會帶著這些記憶。


    有個關於子宮肌瘤的有趣解釋。這個個案曾經多次墮胎，她的理由是因為她已經有好幾個孩子，一邊工作一邊照顧他們對她來說非常辛苦。在這樣的情形下，她認為有更多孩子會加重負擔。她說墮胎並不會對她造成困擾，而且她也已經接受了，然而她的潛意識和身體卻不這麼認為。她開始有子宮肌瘤的問題。在催眠中，她的潛意識說她的罪惡感其實比她以為得嚴重，因為子宮肌瘤代表未出生的胎兒。當個案明瞭並接受了這個情況，她的肌瘤開始萎縮，而且不用開刀就消失了。


    皰疹、子宮切除、囊腫等卵巢或攝護腺等等問題可被追溯至其他世在性方面的'
  mdcn: '轉世，以及她被上帝創造的時候。


    所有的催眠療程都是錄在一台攜帶型的舊式轉盤錄音帶上。雖然稱為攜帶型，但它仍然是一台很笨重的轉盤式錄音機，用的是大型的八吋錄音帶。在當時並沒有什麼說明或指導的書籍可以指引催眠師遇到這類事情該如何處理。那時候這類書只有一本莫瑞·伯斯坦（Morey
    Bernstein）的《尋找布萊迪·墨菲》（Search for Bridie Murphy）。那本書在當時被認為是經典，但它在現在讀來非常一般，甚至不可能會被出版。總之，那本書的出現正是時候。


    話說當我們和這位女士一起回到過去時，我們沒有任何書籍可供參考或指導，我們就這麼看著這位女士隨著不同時期變成別的人格。然而我們邊做也邊發展出自己的一套準則，並且獲得了很棒的結果。此外，在實驗過程中，由於沒有人告訴我們不能這麼做，因此我們進一步引導她去看大家的未來。


    她看到我們住在鄉下，而且也有了孫子。我們沒有告訴任何人這位女士的身份，但有幾位海軍朋友聽說催眠的事後，來到家裡要聽最新的發展。催眠這位女士的經驗永遠改變了我們的生活和信念體系。


    一九六八年是我生命裡非常重要的一年，因為一切就此改變，我的生活再也無法回歸正常。


    那年的某個晚上，我的先生強尼在回海軍基地的路上發生了可怕的車禍。他幾乎在那場車禍喪命。他被一位酒醉的駕駛迎面撞上，我們的福斯廂形車被撞爛，強尼卡在被撞爛的車子裡。醫生說他會活下來是個奇蹟，因為他傷得很重，應該活不過那晚。


    強尼之所以能活下來，是因為一位剛從越戰回來的醫護兵正好坐在他後面的車上。那位醫護兵慣於處理戰場上的緊急創傷，因此當時能在公路現場為強尼急救，使得他沒有因流血過多而死。當急救小組從基地到達現場時，這個醫護兵已經替強尼止了血，但強尼人仍卡在撞毀的車裡，靠消防隊的一番努力才救了出來。接著強尼被直昇機載往柯泊史克利斯地港市（Corpus
    Christi）的海軍醫院。


    當我到達護病房時，五位不同的醫生陸續進來，每一位都告訴我強尼可能無法撐過当晚的原因。他們對我沒有感到沮喪覺得困惑。我告訴他們，他們是錯的，強尼不會死。但我當然不能告訴他們為什麼知道——如果催眠中那位女士看到強尼的未來跟孫子在一起，那強尼現在怎麼會死呢？我知道催眠的那個畫面是真的。我相信我們所做的事，以及我們在催眠時的發現。如果要相信，我就必須相信全部。這樣的信念幫助了我在那個可怕的時刻保持清醒。


    我在當時沒有意識到基地裡許多人的信仰系統也因為此事而被挑戰。有人說這個意外是上帝的懲罰，因為我們探討的輪迴轉世，被他們認為是在與魔鬼合作；我們在角落凝視黑暗，打開了最好一直關上的門。我無法相信這樣的說法，因為在我們與那位女士合作的過程中，我們知道的上帝是充滿愛與仁慈，而非心存報復。當我的世界天翻地覆時，我無法理解這件事背後的原因，但我很肯定，我們的好奇心和對未知知識的探索並不會招致上帝的懲罰。


    強尼從戰場中生還下來，卻因一個酒醉駕駛的疏失而喪命，這不是太諷刺了嗎？事情當然沒有這麼發生。醫生稱強尼為「奇蹟之人」，因為他違反了所有機率和邏輯活了下來。然而，這只是接下來多年挑戰的開始。


    經過數月的加護病房和一年的住院（其中有八個月身體都戴著支架），強尼因肢體殘障從海軍退役。我們就是在那時決定搬到阿肯色州的山丘，我們認為在那裡可以靠退休金支撐生活並撫養四個孩子。這在當時是不得不的作法，但後來我很高興有這個僻靜的山丘處所可以隱居。局部截肢的強尼在往後的二十五年都需要坐在輪椅。他使用丁型柺杖可以步行到戶外，也可以開手動控制的車。而我在那段時間則是全心專注在先生和小孩身上。


    在我適應新生活的期間，我對前世今生的探究必須先擱置一旁。我是直到孩子們因為結婚或上大學而離家之後，才又重燃對催眠的興趣。接著的「空巢期症候群」，讓我開始思考往後的人生要如何渡過。我決定做些不尋常的事情，不是一般「正常」婦女會做的事。我決定重拾催眠，縱使我連在阿肯色州的山丘要怎麼找個案都不知道，但我知道這是我想做的事。


    我不喜歡一九六○年代流行的那種冗長的老派催眠導引方法，我知道一定有更簡單和快速的技巧，於是我研究較新的方法，發現利用意象和觀想可以引導個案進入出神狀態。我不再想專注在只是協助個案戒煙或減肥等戒除壞習慣的一般催眠。我的興趣被輪迴的主題點燃，這是我想專注的方向。然而在七○年代晚期和八○年代初，市面上可供催眠師參考的前世回溯療癒的書籍仍是寥寥無幾。我因此必須發展出自己的技巧。


    我很快就發現傳統催眠所教導的方法大多是不必要的，於是我開始拿掉一些步驟，以較快速的方式取代。只要個案不受到傷害，我認為催眠師可以嘗試實驗，找出哪些方法有用，哪些沒用。畢竟總要有人找出能最有效引導個案到達出神狀態的方法。我知道我是在開疆闢土，進入新的領域。如今，經過了將近三十年的磨練與完善技巧，我發展出自己的方法。我喜歡讓個案進入類似夢遊的出神狀態（這是最深度的催眠狀態），因為我相信所有的答案都可以在這裡得到。


    許多催眠師並不在這個層面工作，因為他們說，「奇怪的事在這裡發生。」所有讀過我的書的人都知道，奇怪的事確實是在那裡發生。大多數催眠師所受的訓練是讓個案保持在比較輕度的出神狀態。在那個層面，意識心非常活躍，經常會干擾和插話。有些資料是可以在那個層面獲得，但在類似夢遊的出神狀態下，催眠師可以获得潛意識完全的合作，因為在那個層面，意識心的干擾是被移除的。


    個案通常不記得任何發生的事，他們以為自己只是睡著了。通常的機率是二十或三十個人裡，只有一個會自動和自發性地進入深度的夢遊狀態，但我發展出的方法剛好相反：二十或三十個人裡，只有一個不會進入深度催眠狀態。因此這是非常有效的方式，可以移除意識的干擾並讓潛意識去找出答案。這就是我現在在教導的催眠療法，而我的學生也跟我回報他們有同樣驚人的結果。


    我在七○年代末期正式從事催眠治療工作，沒多久我就發現了一個模式。這是在我发现接觸潛意識方法之前的事。發現後，模式變得更加清楚。我發現大部分人的問題，不論是身體、心理、過敏、恐懼或人際上的困擾等等，都能追溯到某個發生在前世，而非今生的事件。


    我有許多個案都曾花上多年時間來回於醫生和心理醫師之間，卻仍無法找出困擾他們許久的問題原因。這是因為醫生只注意明顯可見的生理症狀以及這一世所發生的事情。有些時候，問題可以追溯到童年，而我所接觸的大多數個案，答案都是埋藏在過去世。


    我相信前世存在於另一個振動或是頻率。當我們回溯到那些前世，我們改變了頻率，於是能看見和經歷它們，就像變換電台和電視頻道一樣。有時這些不同的頻率過於接近或重疊，因此導致靜電干擾或說疾病的產生。


    透過我的技巧接觸（我稱為的）潛意識，催眠會有最好的效果。在催眠療程中，當個案找到與目前困擾有關的前世後，在某個重要時刻，我會要求與個案的潛意識對話。潛意識總是會回答並提供我們想要的資訊。


    在傳統催眠中，催眠師被教導以個案的手勢作為潛意識回答的方式。他們會要求個案舉起某個手指表示「是」，另一個手指代表「不是」。對我來說，這樣的方式太慢而且功能有限。當你可以直接與潛意識對談，而且它會以口語回應你的時候，為什麼還要用手指頭這種方式呢？透過我的方法，你能夠與潛意識進行雙向對話，而且可以得到任何你想問的問題答案。


    我對潛意識的定義是：照顧身體的那個心智部分。它管控身體的所有系統。你不必告訴你的心它需要跳動，也不用告訴自己需要呼吸。我認為這個工作是由潛意識掌管，因為潛意識時時刻刻都在監控，而且它知道個案身體裡正在進行的每一件事，因此我們能夠使用這個方式得到健康方面的答案。我發現各種身體上的症狀、疾病或不適，都是來自潛意識的訊息。潛意識急於想獲得我們的注意，它想告訴我們某些事，而且會持續直到我們終於瞭解為止。


    如果我們沒有注意潛意識的訊息，疾病或問題便會繼續惡化，直到我們再也沒有別的選擇，或是情況已不能好轉。這是真的，因為很多不同個案的相同症狀，都是起於同樣的問題。我只希望潛意識能用較不會引起痛苦的方式來傳遞它的訊息。


    我常說，「遞個紙條給他們不是容易多了嗎？」潛意識認為它傳達訊息的方式很直接，甚至魯莽，人們應該瞭解才是，但往往不是這麼回事。我們太過專注在日常生活了，以致不會去想為何總是背痛或頭痛等等原因。


    當我們透過催眠療程找出身體不適的原因時（原因通常都很不尋常，因此我認為沒有人可以在有意識下做出這樣的連結），由於潛意識的訊息已被傳達，身體的不適就會停止。訊息已被傳遞和瞭解，這些不適沒有理由再繼續。如果當事者在生活中能夠做出必要的改變，他就能恢復健康。責任最後總是會回到當事者的身上。


    潛意識只能做這麼多，因為最終還是要尊重個案的自由意志。


    我瞭解這些說法聽起來極端且不符合傳統的治疗方式，但我只能報告我從幫助過的數千人身上所觀察到的結果。我也相信潛意識是紀錄保存者，就如同同一台巨大的電腦，它記錄了曾在這個人生命裡發生的每一件事。這就是為什麼我們可以透過催眠取得資料的原因。假如那個人被要求回到十二歲的生日派對，他會記起當天所有發生的事情，包括蛋糕、參加的人、禮物等等。潛意識記錄每一個微小細節。有許多我會認為是多餘的，我納悶潛意識要這些瑣碎細節做什麼。譬如說，我們每分每秒所接收到的成千上萬的訊息：看到的、聽到的、聞到的、感知到的，還有許許多多。


    如果我們是有意識地覺察到所有的資訊，我們會因負荷過量而無法運作。我們必須只聚焦在那些對生活來說必要的資訊上頭。然而，潛意識總是覺察並持續記錄和儲存這些資料。為什麼？我們會在書裡進一步探討。這也可以解釋突如其來的心靈啟示和直覺的由來。那是我們在另一個層面（潛意識）所接收到的資料，雖然我們不一定需要，但由於資料就存在那裡，偶爾會滲漏到我們的意識層面。當這個情形發生，它被視為奇蹟般的現象。其實這些儲存的龐大資料一直都在那兒，只要有適當的訓練，便能觸及這些資料。


    潛意識不但記錄這生所發生的一切大小事，它也記錄當事人所有的前世與在靈魂狀態－層面時的一切。這些資料有很多是現世生活用不到的，但這些資料可以因好奇而接通，而且對探究的人來說會是有趣的。只是，這些資料對於這一世的問題解答有什麼幫助？


    這就是許多催眠師會犯的錯誤之一。他們認為帶引當事人去看前世是沒有價值的，除非只是因為好奇、對前世有所幻想，或是好玩（雖然許多前世可是一點都不好玩。）這就是為什麼我會發展自己的技巧；我會帶當事人回到跟這生問題最有關聯的一世。我從不誘導。在催眠時，我是讓潛意識帶個案回到它認為最值得去看的那一世，不論那些世的生活是無趣還是平凡（百分之九十都是如此），是住在現代還是古代，或是與外星人有關，或是生活在另一個星球或次元，我總會感到訝異。潛意識會做出連結，而那個連結是我和當事人絕不可能想到的。但當我們從那個觀點來看時，卻又相當合理。


    每當我接觸個案的潛意識，它總是令我驚嘆，因為很顯然的，我並不是在跟個案的人格，而是跟一個不同的存在體或個案的某部分說話。我也總是可以知道何時已經接觸到潛意識，以及是否是潛意識在回答問題。


    潛意識總是會用第三人稱（他或她）來指稱個案。潛意識不帶感情，而且似乎是與問題抽離，就像是一個客觀的觀察者。它因為個案一直沒有聆聽而責罵。有時潛意識的第一句話會是,「好，終於有我說話的機會了。多年來我一直試著跟
    (珍或鮑伯) 說話，但他們就是不聽。」潛意識非常客觀，因此有時候聽起來顯得無情。它會毫不留情地把它所見的情形據實以告。在它為了清楚表達觀點而不留情面地對待個案之後,
    潛意識也總是會告訴個案, 他們是被珍愛的, 以及它对个案的進步感到多驕傲。潛意識也認得我，它常會感謝我讓個案進入出神狀態，使得這個過程發生。


    潛意識經常用複數（我們）,就好像它不是單一的存在體，而是好幾個。這點我們會後面探討。如果這樣的接觸只是透過一個個案發生，懷疑論者是不會瞭解或相信的，而且他們也有很正當的理由不去相信。然而，如果是發生在每個我催眠的個案身上，而且不論他們是來自世界的哪個角落，那麼人們又要如何爭辯這是幻想、欺騙、愚弄或刻意的操弄呢？


    我使用這個催眠技巧把個案帶入適當前世的成功率有將近九成，在這之中又有大約九成的人成功接觸到他們的潛意識。潛意識說話的方式都是相同的，而且以同樣方式回答問題。如果這只是隨機發生，那就不會都是這個情況了。


    我遇到最難催眠的個案通常是高階的商業人士，那些慣於評斷和分析的人。他們在催眠過程中想要掌控，而不是放鬆和跟隨我的指令。也有的人會說他們已經準備好要去找出答案了，然而私下卻害怕即將出現的事，因此他們的意識會破壞催眠。但就如我之前說的，這個情形在我的個案裡只佔百分之十或更少。其餘的百分之九十總是可以看到前世。


    我曾經納悶，如果個案心智或心靈的這個部分跟其他人是一樣的，那我所接觸到的究竟是什麼？如果它只是屬於我催眠的那個人，而且只能取得他的個人資料的？潛意識本身在書裡提供了這個問題的答案，因為隨著我的工作的擴展，我覺察到更多事，而我也準備好（或者說我是這麼認為）接受更複雜的解釋了。


    我现在瞭解自己一直在限定它，而且也简化了它。事实上这就像是在跟一台连接上巨大资料库的电脑沟通一样。这个资料库超越了时间、空间和个体意识的所有限制,这正是我的工作令人惊嘆的部分。我似乎总是在跟相同的部分
    (或存有, 或不论什麽的) 说话,而现在我发现「那个部分」是无所不知的。它不但有答案要寻找的答案，它也有我想要问的任何问题的解答。那是一个可以触及所有资讯的全知部分。


    有些人可能会选择将这个部分称为「全我」、「高我」、「超灵」、容格的「集体潜意识」,或是「上帝」。这些用语虽然不同,但可能都跟同样的事物有关。而我只知道,在我的工作中，它对「潜意识」这个名称有回应。因此我称它「潜意识」。


    科学界和宗教界也有许多其他名词是用来解释我所成功接通的部分。不论我接通的部分是什么,和工作是件愉快的事,主要是因为我对这些资料充满了好奇与渴望。我非常喜欢在图书馆研究,而这个工作就像是到了史上最大的图书馆。在我探索更多繁複的形上学概念时，请跟我一起踏上这个旅程。我知道我没有所有的答案,但我已成功地更深入表层。也许你的心智会因我的发现而受到激励或启发。继续寻找和发问吧!唯有如此才能找到答案。


    記住這句諺語，「心智如同降落傘，打開才有作用。」


    人們並沒有意識到他們的心智具有療癒的力量，而我的催眠法能夠接通他們心智的那個部份，找到問題的起因。潛意識在使用身體症狀傳遞訊息時，可說是非常直接了當。如果更多人知道這點，他們就會更仔細聆聽身體在試圖告訴他們的訊息。


    在我做過的數千次催眠當中，我通常能夠辨認出某個症狀所顯示的模式或結果是否源自這一世。譬如說，如果有人說他有長期性的背痛或肩膀痛，我會問他是不是在生活裡背負著重大責任，而當事人也總是會回答確實這麼覺得；他們由於家庭生活或工作環境等等，覺得自己承受了許多壓力。這類情況會以背部或肩膀部位的不適來表現。


    手腕和手部的疼痛顯示個案在生活中緊抓著該放手的事物不放。臀部大腿或腳部的疼痛表示他們正處於改變人生方向的階段。這通常涉及必須做出重要決定，而這些決定將會徹底改變他們的生活。顯化在身體這個部位的不適是因為潛意識在告訴當事人，他們害怕跨出去，害怕踏出下一步，因此身體的疼痛顯示的是他們的退縮。胃部問題有時是因為當事人無法「忍受」(stomach，胃部的同義字)
    生活中正發生的事。癌症，尤其是腸道部位，意味當事人非常壓抑，壓抑到壓力產生後無法釋放，因而開始侵蝕器官。癲癇則是當事人沒有能力去處理身體的高能量。


    我曾有過一些個案在吃特定食物或藥物時會噁到。潛意識說這是因為他們無須使用這些藥物，這些藥物會對他們的身體造成更多麻煩。身體的反射作用以噁住和不適作為拒絕的形式，為的是不讓當事人消化有害的食物或藥物。潛意識有時是很戲劇性和操控的。


    雖然有些問題的答案可以在這世的生活裡找到，我大多數催眠的重點都是在他世。我會在書裡舉一些「正常」的前世回溯案例，呈現催眠是如何解決個案所經驗到的現世問題。接著我會專注在不尋常或不同類型的回溯，以及這些個案如何透過探索前世得到協助。


    請記得，這些案例所提出的解釋並不能作為適用於所有個案的疾病或不適的唯一原因。沒有任何解釋是可以適用於所有的案例。譬如說，過重永遠是因這個理由導致，或偏頭痛一定是因為那樣所造成。解釋會因人而異，潛意識是非常機靈和巧妙的。催眠師必須要有彈性，並且運用直覺提出適當的問題。適用於某人的答案和解釋不一定可以套用在別人身上。


    前世事件影響這世身體的一個例子：許多關節炎個案的原因源自中古世紀被架在拷問台折磨，或是在牢獄中被類似的刑具拷打。人類向來就有殘暴對待彼此的歷史，而有時身體仍會帶著這些記憶。


