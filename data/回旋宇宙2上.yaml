  md: '當我和潛意識溝通時，潛意識說那世的記憶被帶到今生，而每在有壓力的時候，呼吸的問題就會以氣喘形式呈現。而現在他瞭解了問題的根源，症狀就會停止了。當醫生從催眠狀態醒來，他說：「難怪我常納悶為什麼胸腔有時會覺得痛。」他指的部位正是他刺入木樁的地方。這位醫生後來成為我的好友，大約過了四、五年後，有一次我問到他的氣喘，他笑著說，「喔，對喔，我曾經有過氣喘。」


    許多害怕和恐懼症可以追溯到前世死亡的方式。當我們從這個角度來看，懼高、怕黑、幽閉恐懼症、廣場恐懼症（agoraphobia）就變得容易理解了。在數百位類似的催眠案例中，有個例子是一位有幽閉恐懼症的女性個案，她也很害怕手或腳被束縛，夜裡睡覺每隔一小時就會醒來。她在阿肯色州史密斯堡（Fort
    Smith）參觀歷史景點時（那裡有個歷史博物館和法庭），突然有種似曾相識的感覺。一八七五年至一八九七年間，以「絞刑法官」惡名昭彰的派克法官就是在這個法庭審判。後人保留了監獄並重建絞刑台。個案直覺知道自己曾經在那裡，而且是非常恐怖的經歷。這次的參觀對她來說是毛骨悚然的經驗。


