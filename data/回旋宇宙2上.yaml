    \  \n\n莎：她的女兒也是以和她類似的方式來到地球，不同的是更加完美，她的身體適應得更好。因為前面已經有人把能量帶進來了，對新來的靈魂就比較不會那麼困難。一開始的嘗試並沒有成功，以人類的形式來說，能量對身體造成很大的壓力。\
    \  \n朵：我曾聽說人類的身體無法承載一個靈魂的所有能量，那樣會毀掉身體。  \n莎：沒錯。她先生東尼來到地球的原因也很類似，他是來開闢新的道路。  \n\
    朵：所以他也不會累積業力。（是的。）他們兩個在一起是碰巧的嗎？  \n莎：不是碰巧。在投生地球之前，他們兩個已計畫好要一起來。他們是類似的能量，不完全相同，但很類似。莎莉是一個實驗，在她身體裡的能量通常是由兩個不同的身體所承載。問題是出在能量的量和振動層級，先前的那次試驗失敗了。\
    \  \n時機沒掌握好，肉身也沒有精確校準，靈魂沒有在正確時機帶著符合且確切的能量，這些都要到位才行，這是非常技術性的。  \n朵：能量一定是通常兩個身體才能承載的量嗎？\
    \  \n莎：是的。這就是實驗，這個實驗很重要而且也完成了許多任務。非常有幫助。莎莉不是唯一進行這項實驗的人，她先生東尼也是其中之一，只不過些微不同,  \n\
    \n適應而啓動。  \n\n朵：那麼當她結束這一世之後，她就會回去，不必再一直回來了嗎？  \n朵：她知道是什麼時候發生的嗎？  \n莎：意識上並不知道，但她知道即將來臨，她也有心理準備，這對她接受新的部份有很大幫助。她知道她感覺不同了，但意識上還未認知到有個更大的她，而那個她加入了。她會開始接收到非常多的知識。這不會馬上發生，而是隨著她的\
    \  \n\n朵：這兩者並沒有交換？  \n莎：沒有，沒有交換。是結合，是增加。我們跟她說過兩次了，她這個新的部份即將到來，現在這個部份就在這裡並與她結合了。"
