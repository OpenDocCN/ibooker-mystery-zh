  md: '瑪：對，很多人陷入黑暗那一方。這都是發生在同一時期，或許早一些。在光裡的許多人有先見之明，他們具有我們今天不知道的偉大能力。（停頓很久）這一切原本是可以被阻止的，但這樣就會違反了自由意志。允許自由意志發展，讓原本是如何就是如何是必要的……。現在億萬年已經過去，將會有許多許多的知識出現，會有许多許多的改變發生，會有许多事將被知道。

    朵：我向來認為亞特蘭提斯人是各由自取。

    瑪：當時發生了很多事。他們受到那些負面、黑暗的影響才開始那些實驗。就好像他們忘了自己是誰，忘記了他們的教化。他們變得沉陷於物質的世界，也因此開始失衡，導致所有的破壞發生。

    朵：你的意思是他們和負面的一方合作？

    瑪：是的，他們受到黑暗界的誘惑。

    朵：所以那些負面力量幫助他們，給他們知識？

    瑪：沒錯，他們受到誘惑。


    朵：但議會雖然知道這個情形和後果，還是讓這場戰爭發生。瑪：因為這跟他們的自由意志有關，也必須讓他們去學習。意識深入到黑暗之境去'
