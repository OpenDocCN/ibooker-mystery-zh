    ## 259 第九章 | 孩子與業力


    我發現第二波的志願者比第一波晚來大約十年或更久。這一波現在是二十多和三十多歲。第二波的人有些適應得非常好。在催眠狀態下，他們說來這裡就是作為導管或管道，把地球這時候需要的能量帶進來。他們過著很平凡的生活，通常未婚，沒有負擔（尤其是沒有小孩）。他們的工作允許他們有很多自由的時間去探索真正感興趣的事物，而這些興趣都與助人有關。他們似乎沒有什麼問題，適應這個世界要比第一波來得容易許多。


    第三波毫無疑問就是那些特殊的孩子（所謂的靛藍小孩），他們已經在這裡，並且繼續來到地球。這群人中有些現在是青春期早期。他們是很特殊的一群，被稱為人類的希望。這些孩子需要被理解，因為他們跟其他同齡小孩是在不同層面和頻率上運作。有很多書在討論這些孩子，我也曾在研討會中談論這個主題。他們確實很特別，甚至連他們的
    DNA 也被證實是不一樣的。我曾在工作中被告知要強調這群特殊兒童不能被用藥，特別是利他寧（Ritalin），因為這種藥物會改變心智狀態。學校令他們感到無聊，有時候他們會顯得具破壞性或失控、分心，因為比起其他世代的兒童，他們學習和吸收資訊的速度快上許多。我聽說這樣的小孩需要挑戰性的事物，這會激發他們的好奇心，並使他們的能力更加敏銳。很多這個年紀的小孩由於卓越的天賦而引起媒體關注。一直以來總有關於具有超齡才華的天才兒童的故事。天才兒童非常少見，科學無法解釋他們為何有這樣的能力，我則認為他們的能力是來自前世的學習與熟練。然而，這群新世代的特殊兒童並不一樣。天才兒童在過去很罕見，但這波的新小孩有許多都展現出天才的能力。在電視上受訪的天才兒童已經在讀大學而且還展開了事業。他們每一個人都強調組織機構來幫助世上較不幸的兒童。


    從我的工作經驗當中，我認為這些天賦異稟的能力並非來自他們的前世，而是來自不同的靈魂模式。我所觀察到的這三波是在地球需要幫助時來幫助地球的靈魂。他們大都沒有投生在地球的經驗，所以對生活在這裡感到困難。他們來此有特定的目標，他們想完成目標後回「家」。雖然在意識上他們並不知道，但他們下意識完全曉得他們的地球任務。這些人跟其他人不同，他們在這裡不是因為前世和因果業力。最新的一波也不像其他波那麼隱密。那個派遣靈魂來地球的力量，正在讓這新的一波更容易受到注意，因為能夠促成改變的時間不多了，這個改變攸關著我們世界的生存或毀滅。


