    雖然愛西斯的影響力已經被遺忘大半，但她在現代宗教的發展上扮演很重要的角色。她在希臘─羅馬時代廣被崇拜，她是女性特質的化身。隨著基督教的興起，許多愛西斯的小敬拜堂被改成較大的教會。西元四世紀的時候，基督教在羅馬帝國建立了穩固的基礎，愛西斯的敬仰者創立了聖母教派（Madonna），以便讓愛西斯的影響力持續下去。有些早期的基督徒甚至稱他們自己為
    Pastophori，意即「愛西斯的牧羊人或僕役」，這可能是牧師（pastor）這個字的起源。愛西斯哺育兒子荷魯斯（Horus）的古老圖像，數世紀以來激發了許多聖母與聖嬰的畫像靈感，包括宗教藝術裡的「聖母與聖嬰」。也因此愛西斯與嬰孩荷魯斯的形象就產生了後來的聖母瑪麗亞懷抱著襁褓中的耶穌。


