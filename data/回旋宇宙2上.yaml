  md: '**天使神秘学院官方淘宝**：http://strc.taobao.com


    016 迴旋宇宙2「上」

    前世今生與志願者靈魂


    **以便讓聽眾瞭解我是如何獲得這些資料。我曾被指控書中的個案是捏造出來的，這讓我成了一個很棒的小說家。對我來說，要編出那些個案和催眠內容，而非只是如實報告個案來自深度催眠狀態下的敘述，恐怕才是更高超的表現。我確實發展出一種可以打開「潘朵拉盒子」的回溯技巧，資料會不斷從個案的潛意識湧現，我所必須做的就是去組織這些資料並放到書裡，而這可不是件容易的工作。**


    **我是從一九六○年代開始催眠，所以我在催眠這個領域已有將近四十年的時間了。在我工作的早期，催眠導引的過程是耗時且沉悶的。它包括了我稱為「注視著發亮物體」的過程：催眠師在引導個案進入催眠狀態時，在個案面前擺動或晃動某個物品（譬如墜子）。這個冗長的導引還包括讓個案放鬆身體各部份的程序。接著，在催眠師繼續進行前，還要先做測試來評估個案出神的深度。有些程序現在仍然繼續使用和教導，並被戲劇性地呈現在電影或電視上。**


    **大多數的催眠師現在已經進展到使用快速得多的催眠法。我個人則透過刪除過去導引程序中耗時且不必要的部分，發展出一套自己的技巧，一種較快的誘導方式。而現今的催眠技巧涉及了聲調、影像和觀想的運用。**


    **我最初接觸輪迴和前世回溯是在一九六八年。那時我先生強尼已在美国海軍任**


