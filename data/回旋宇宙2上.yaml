    另一個偏頭痛案例的原因則完全不同。這位女性個案在旅行社工作，經常去世界各地旅遊。她的頭痛是從她離開旅遊的印尼，返家時開始出現。她的印尼假期非常棒，而且很放鬆，她在那裡有回到家的感覺，因此完全無法把頭痛跟那次旅行做任何聯想。她在旅遊時也沒有發生任何傷心或不愉快的事。在催眠回溯中，她回到她在印尼的前世；她過著田園般的生活，有幸福的家庭和一位深愛她的男子。


    她的潛意識解釋，當她回到印尼，那世美好生活的記憶被觸發，她對於必須再次離開感到難過，因此開始頭痛。她渴望回到那個曾經非常快樂的地方。我的工作說服另外那个人格，即使她回到印尼並在那裡生活，日子也不會跟前世一模一樣，因為所愛的人已經不在，而且環境也不同了。她並無法重拾那一世的生活，因此她必須在現在這一世找到快樂，或許也會是和同樣的人，因為我們傾向與所愛


