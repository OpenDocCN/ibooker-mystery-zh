    我有許多個案的偏頭痛原因往往被追溯到前世頭部創傷。他們過去被人類、武器或動物攻擊頭部的記憶被帶到現世，這通常是為了提醒當事人不要重犯在另一世造成他們喪命的錯誤。有位女性個案重新經歷了美國內戰時期頭部中槍的年輕人的一生。另一個案例是住在英國的婦女，她長期以來有嚴重的頭痛，她的痛是從鼻樑往上延伸到前額和整個頭頂，所有藥物對她都沒有效果。透過催眠，我們發現了頭痛的原因：她前世在戰火連天的歐洲被利劍不偏不倚地刺中現在頭痛的部位。當個案瞭解了起因，頭痛就消失了。


    另一個偏頭痛案例的原因則完全不同。這位女性個案在旅行社工作，經常去世界各地旅遊。她的頭痛是從她離開旅遊的印尼，返家時開始出現。她的印尼假期非常棒，而且很放鬆，她在那裡有回到家的感覺，因此完全無法把頭痛跟那次旅行做任何聯想。她在旅遊時也沒有發生任何傷心或不愉快的事。在催眠回溯中，她回到她在印尼的前世；她過著田園般的生活，有幸福的家庭和一位深愛她的男子。


    她的潛意識解釋，當她回到印尼，那世美好生活的記憶被觸發，她對於必須再次離開感到難過，因此開始頭痛。她渴望回到那個曾經非常快樂的地方。我的工作說服另外那个人格，即使她回到印尼並在那裡生活，日子也不會跟前世一模一樣，因為所愛的人已經不在，而且環境也不同了。她並無法重拾那一世的生活，因此她必須在現在這一世找到快樂，或許也會是和同樣的人，因為我們傾向與所愛的人一起轉世。當她瞭解源由後，她的頭痛立刻消失，再也沒有復發。


    過重有很多原因，有些很容易預料，例如前世死於飢餓或是造成別人挨餓。有時過重是一種保護：個案這世在自己身上加了「保護墊」來防禦某種事物（不論是真實還是認知上的），也或者他們是為了避免被傷害，因此讓自己變得不吸引人。


    我的工作是找出他們所防衛的東西。個案通常並不知道起因，然而催眠中得到的解釋卻很有道理。找到原因後，個案就能解決過重的問題了。


    我也遇過一些出乎預料的過重原因。有位女性個案回到前世，那一世她是蘇格蘭某家族的領導人。這個工作很辛苦，催眠狀態下的她感受到重大的責任。領導人去世後，靈魂依然如此感覺，於是在死後說了一句關鍵性的話：「我永遠都無法卸下這個重擔。」潛意識認真看待這句話並帶到了這一世。


    有個不尋常的案例收錄在《星辰傳承》（Legacy From the Stars）。一位女子在催眠中看到自己是外星人，因為意外，飛行器墜毀在地球，他被當地的人發現並照顧。這個外星人有許多引人注意的特異能力，其中之一是因地球引力的不同，使得他會無預期飄浮，因此這世她下意識以過重來避免飄浮和引起過多的注意，雖然這個原因並不合常理。


    另一個有關過重的不尋常解釋是來自個案瑞克。瑞克也是想解決過重的问题，許多方法對他都沒效果，尤其是那種只能吃某些東西的飲食法。催眠時，他立刻進入了某個古文明時代。他所形容的建築物和構造，聽起來都不像我曾接觸過的事物或讀過的歷史。有些描述讓我想起阿茲特克文化，尤其是已被考古學家發現的部分。


    瑞克看到一個方形庭院，四周圍繞著類似露天看台的奇怪建築物。每個社區會各派一位運動員來這裡參加比賽。瑞克是被訓練來參加這個比賽的選手。比賽很重要，因為結果可以決定這個聯社社區下一期的統治者。統治者是每季更替，而且是以獲勝的那方來決定。


    瑞克穿著奇怪的制服，臉上畫有條紋。這個比賽聽起來很像籃球。他們在庭院裡帶球奔跑，而且必須把這個球投進一個石環裡，這個石環是架在庭院邊。這是為什麼我會想到阿茲特克，因為考古學家曾說過他們在墨西哥發現了一個球場，阿茲特克人在這裡玩類似的遊戲，但是考古學家說阿茲特克人是把人頭，而不是球，投進石環裡。如果瑞克所說的地方和考古學家發現的是同一個地點，那麼，是這個比賽變質敗壞到使用人頭來代替球，還是考古學家說的不正確？


    瑞克是很優秀的運動員，他連續贏了多次比賽。這表示好幾屆的領導者都是由他所屬的團體選出來的。他並不想那麼辛苦工作，他經常希望那些領導者可以自己來比賽。他不被允許結婚，也被嚴格限制只能吃某些食物，為的是保持精瘦和維持最佳體能。他經常羨慕其他人，因為他們可以有社交生活，而且可以吃任何他們想吃的食物。他被規定吃的東西包括龜肉、某種白色的根莖物、很多的水，還有從某些果肉榨取出來的苦味白色液體。他每天早晚都必須喝這種液體。這個東西常會讓他想睡覺，但因為可以維持強壯的体格，所以是必要的飲料。他討厭那個味道，而且從來沒能習慣。


    他最後厭倦了比賽，想要找離開的辦法。大家雖然都很喜歡他，但一段時間過後，比賽總是他贏也讓他們開始感到無趣。而其他社區的人並不喜歡他總是贏，因為這讓他們沒有管理的機會。瑞克決定要輸，但不能輸得太明顯。當他開始輸掉比賽，他那邊的社群決定換掉他，於是他終於被允許過正常的生活，包括吃任何想吃的食物。他決定住到對手的社區，因為那邊的人很高興終於有機會管理了。他發現那邊的選手並沒有嚴格的飲食規定，而是吃一般的食物。他在那裡過得很快樂，但並沒
    有活 很 久。當 他 快 死 的 時 候，他 感 覺 內 像 是 在 燃 燒，巫 醫 說 是 因 為 他 長 年 被 迫 飲 用 的 白 色 液 體，那 個
    東 西 損 害 了 他 的 身 體。當 我 和 潛 意 識 對 話 時，他 的 體 重 問 題 顯 然 和 那 一 世 有 關。潛 意 識 說 那 個 液
    體 有 麻 醉 作 用，會 使 他 心 跳 加 快，身 體 的 消 化 或 新 陳 代 謝 也 會 加 速，因 而 產 生 結 實 的 肌 肉 與 更 快
    的 活 動 速 度。但 這 最 終 使 他 的 腸 道 潰 瘍，導 致 他 的 死 亡。當 我 向 潛 意 識 請 求 協 助 他 的 體 重 問 題 時，潛
    意 識 說 沒 有 那 麼 簡 單，因 為 牽 涉 到 許 多 相 互 糾 結 的 因 素。由 於 當 時 的 權 威 者 強 迫 他 做 的 事 並 沒
    有 考 量 到 他 的 利 益，因 此 他 學 到 去 質 疑 而 不 是 去 信 任 權 威（政 府、教 會、醫 生 等 等）。而 且 進 食 也 已 跟
    樂 趣 及 社 交 生 活 有 所 連 結。要 把 這 些 因 素 分 開 並 不 容 易，而 且 他 其 實 是 健 康 的，潛 意 識 認 為 沒 必
    要 減 重。這 清 楚 說 明 了 為 何 瑞 克 只 靠 吃 某 種 食 物 的 節 食 法 對 控 制 體 重 的 效 果 並 不 好，因 為 這 勾
    起 他 另 一 世 的 記 憶。他 現 在 很 喜 歡 烹 調 並 且 吃 各 類 食 物。瑞 克 醒 來 時，他 並 不 記 得 任 何 事，但 他 想
    喝 水，因 為 嘴 裡 有 種 很 不 舒 服 的 苦 味。他 說 這 讓 他 想 起 小 時 候 有 一 次 和 朋 友 在 森 林 裡 探 險，他 們
    發 現 一 種 多 汁 植 物 並 拿 起 來 咀 嚼（森 林 裡 很 多 植 物 都 是 有 毒 的，奇 怪 的 是 他 竟 然 沒 事。）那 味 道 是
    苦 的。


    我告訴他有關他在前世長期飲用白色液體的事。他把前世那個味道也帶回來了。在喝了一些瓶裝水之後，他覺得好多了。


    我在許多氣喘案例中發現，個案在前世通常是死於窒息或是跟肺或呼吸有關的原因，譬如他們生活的環境（灰塵、沙子等等）。有個重要案例發生在催眠工作的早期。一位有多年氣喘病史的醫生來找我，他平常有使用吸入器，但他知道是習慣使然，希望能戒掉這個習慣。他對超自然和形上學（玄學）有足夠的瞭解，因此認為問題根源可能是在前世。


    催眠時他回到住在非洲叢林的一世。那時法國在開採地下石棉，他們會捉當地的原住民，帶到礦坑當奴隸採礦。當時他也被抓去地底下的礦坑。長期暴露在石棉纖維造成這些人的身體出現呼吸問題，肺部的出血從嘴流出，最後導致死亡。法國採礦者就只是把屍體丟棄在叢林，再去捉別的當地住民替補。當這個個案開始出現相同症狀時，他知道他將會死於肺部的傷害。在他的文化裡，因為情勢難以忍受而自殺是被允許的，於是他把木樁刺入自己的右肩部位。


    當我和潛意識溝通時，潛意識說那世的記憶被帶到今生，而每在有壓力的時候，呼吸的問題就會以氣喘形式呈現。而現在他瞭解了問題的根源，症狀就會停止了。當醫生從催眠狀態醒來，他說：「難怪我常納悶為什麼胸腔有時會覺得痛。」他指的部位正是他刺入木樁的地方。這位醫生後來成為我的好友，大約過了四、五年後，有一次我問到他的氣喘，他笑著說，「喔，對喔，我曾經有過氣喘。」


    許多害怕和恐懼症可以追溯到前世死亡的方式。當我們從這個角度來看，懼高、怕黑、幽閉恐懼症、廣場恐懼症（agoraphobia）就變得容易理解了。在數百位類似的催眠案例中，有個例子是一位有幽閉恐懼症的女性個案，她也很害怕手或腳被束縛，夜裡睡覺每隔一小時就會醒來。她在阿肯色州史密斯堡（Fort
    Smith）參觀歷史景點時（那裡有個歷史博物館和法庭），突然有種似曾相識的感覺。一八七五年至一八九七年間，以「絞刑法官」惡名昭彰的派克法官就是在這個法庭審判。後人保留了監獄並重建絞刑台。個案直覺知道自己曾經在那裡，而且是非常恐怖的經歷。這次的參觀對她來說是毛骨悚然的經驗。


    催眠時她回到了前世，她是南軍的士兵，和其他幾位夥伴一起被捕。他們被送到一間很暗的房間，只有很小的窗戶，大家一起擠在狹小的空間裡。她害怕手腳被綁的恐懼是來自她當時被鍊條銬在牆上的經驗。夜裡難以成眠則是因為在那樣的情況下，當時的他根本無法好好睡，而且心裡也害怕接下來會發生的事。幾天之後，他們全都被吊死。


    這個案例顯示似曾相識的感覺可能是下意識憶起了前世經歷。同樣地，對某個年代、文化或國家的嚮往也是。這些吸引並非總是負面，而這些無法塵滅的強烈情緒也總是持續被帶入許多轉世。


    另一位個案是擁有心理學碩士的專業護士。她去見治療師有好一段時間了。她想找出她的問題原因，但一直沒什麼結果。治療只得出一個結論：在她小時候發生了某件事，但她已不復記憶。這並沒有回答她的疑問。


    她跟她的大兒子之間有些問題，她懷他的時候尚未結婚，當時她很想墮胎，後來孩子的父親終於要娶她，並且說服她把孩子生下來。但自從生了這個小孩後，她總是有被他威脅的感覺。她原想可能是孩子意識到她曾經想拿掉他。如今孩子雖然長大了，但兩人之間仍然明顯有問題存在。


    進入催眠狀態後，她立刻看到自己是個男人，而且極度憤怒。他正掐著某人的脖子，那個人已經快要窒息。當她看清楚對方時，她說那是她現在的兒子。前世的他發現這名男子跟他太太在一起，他想殺了他。個案突然知道，那個妻子就是她這一世的母親，而她和她母親一直處得不好。畫面裡，他殺了這世是她兒子的男子，他後來被關進牢裡，牢裡沒有窗，而且爬滿了老鼠和蟑螂，空間非常骯髒和陰暗。最後他死在牢裡。當時的那個男子在這世回來做她的兒子，這樣他們才能解決這個負面業力，然而他（兒子的靈魂）帶著很多的怨恨回來，難怪她總是感覺受到威脅。


    個案也一直不明白為什麼那麼討厭酗酒的人。酒精的味道、他們說話的樣子和行為在在都令她反感。當我問到這個問題，她立刻把酒精和掐住那人脖子的那幕連結在一起。也許當時他們倆都喝了酒，而酒精激化了憤怒。無論當時是什麼情形，都導致了可怕的結果，她因此必須在這世回來和當時的相關人解決這個負面業力。


    當個案明白了問題的起因，也看到這是屬於前世的事，她原諒了自己和所有參與的人。我們也可以從別人的前世經驗，學習把過去的恩怨留在過去，一勞永逸地解決問題。


    我從工作中發現，償還業力的方式不勝枚舉。但最不理想或最不值得的，就是這世回來被你前世的受害者殺害。這不但沒有解決任何事，只是讓業力之輪繼續運轉，而且還產生更多業力。我被告知殺人者償還罪行的最理想方法就是「軟性的方式」：透過愛。


    舉例來說，曾經的殺人者這世以照顧被害者的方式來償還。他們可能需要奉獻一生來照顧他們的受害者：譬如一個需要被照顧的父親／母親，一個殘障的孩子等等。他們會因此無法擁有自己的生活，但這要比「以牙還牙」的方式有智慧多了。


    這位個案的心理醫師曾經告訴她，他不反對她做前世催眠，但他並不信這一套。然而，透過傳統的正統心理治療，她將永遠找不到問題的起因。我很想看看當她告訴他，她不再需要繼續治療，她已經從催眠療法找到了答案時，他是怎麼說的。


    另一個案例是紐奧良一位過重的年輕女性，她很渴望有孩子，也一直在服用幫助受孕的藥物，卻都沒有效果。她經期來時很辛苦，曾經一個月都在流血。唯一的解決辦法是服用避孕藥調節，但這樣卻會讓她無法受孕。她也在努力減重。


    催眠時我問到為何她不能受孕，潛意識說她上一世是收養孤兒的家庭。她收養了十一個小孩。每當有小孩離開她的寄養家庭，馬上就會有另一個進來遞補。她把小孩照顧得很好，她也很喜歡照顧他們，但在現在這一世，潛意識希望她能夠休息。它們說不用擔心，她會有孩子的。她的身體正在調節，開始要回復正常。體重過重的問題則是她必須經歷的試煉，尤其是在她要進入成年期的這段時間，為的是看她能否承受得住甚至是成年人對她的嘲笑和惡毒評論。她現在已經通過這項考驗，所以體重可以減下來了。當她到了能夠有小孩的時候，她的身體也會是在健康的狀態，當然，小孩也將在適當的時機來到。


    個案這一生也一直過於敏感，她會有周期性的沮喪，感到孤單和被遺棄。她後來終於崩潰，無法停止哭泣。她這麼敘述：「我心裡感到非常空虛。我總覺得我的生活平淡乏味。有時候我覺得自己是在休息，有時候我又害怕好像有什麼災難要發生似的。悲傷一直都在。我到底怎麼了？我要怎麼去改變這個情況？從我小時候起，大概八或九歲左右吧，悲傷的感覺就已經是我的一部份了。」


    潛意識對此做了一個很有意思的說明。它說她原本應該是雙胞胎，另一個靈魂跟她約好要一起投胎，但在最後一刻變卦，決定不在這時候來地球。因此另一個人體並沒有成形，她孤單地一個人投生人世。下意識裡，她都覺得那個沒有和她一起出生的存在體遺棄了她。那是一種少了什麼的悲傷感，並且伴隨著沮喪。這就是原因了：她想念那個原本該在此生陪伴她的靈魂。我從沒對她說，但我一直很好奇，未來她所懷的孩子是否有可能是那個終於決定要來人世的另一個靈魂。


    當我們告訴她母親這件事的時候，她母親非常驚訝，因為從來沒有這方面的跡象。醫生從未告訴她有可能是雙胞胎。我的個案是在一九七二年出生。我不知道她們是否是所謂的「幻影雙胞胎」或稱「消失的雙胞胎」（disappearing
    twin），這在現在是大家都知道的現象。（譯注：是指受孕時有兩個胚胎，但經過一段時間，其中一個胚胎停止發展，因此超音波掃瞄時只看見一個胎兒。）催眠完後我們一起用餐，她母親說個案出生時是一位不熟的代理醫生在場。如果是她的主治醫生，或許就會跟她說是否有另一個胎兒的跡象。我想我們永遠也無法得知了。


    我也發現有些不孕的案例是因為個案前世死於分娩，潛意識為了不讓這樣的事在今生再次發生，因此個案一直不孕。有時潛意識的邏輯真的很奇妙。


    以下的回溯案例時間和地點是二○○○年五月的加州聖荷西市（San Jose）。'
  mdcn: '## 第二章 | 一般的前世療法


    不當行為或虐待異性。這些問題也可以是不跟異性接觸的方法，或加諸於自我的懲罰。有位女士有子宮內膜異位，這個問題已經影響到她的背部。她結婚十九年，但一直沒有小孩。她的醫生想切除她的卵巢和輸卵管來解決問題。她的前世回溯揭露了女性器官方面的問題有時是來自好幾個個前世都是必須獨身的神職人員（神父和修女／尼姑），這樣的生活模式抑制了她對性的感受與活動。在其他世所立的誓言具有相當大的力量，尤其是貧窮的誓言通常會被帶到這一世並造成金錢問題。這些在前世被認為是必要的誓言，現在可以因為不適合而宣布中止了。


    有時候個案因為在許多世都是同樣性別，後來發現自己在另一個性別的身體裡，因此發展出疾病來排斥這個身體，尤其是跟賀爾蒙有關的身體部位。我發現這也是同性戀的原因之一；個案好幾世都是同樣的性別，因此身為另一個性別的時候，便會難以適應。


    我有許多個案的偏頭痛原因往往被追溯到前世頭部創傷。他們過去被人類、武器或動物攻擊頭部的記憶被帶到現世，這通常是為了提醒當事人不要重犯在另一世造成他們喪命的錯誤。有位女性個案重新經歷了美國內戰時期頭部中槍的年輕人的一生。另一個案例是住在英國的婦女，她長期以來有嚴重的頭痛，她的痛是從鼻樑往上延伸到前額和整個頭頂，所有藥物對她都沒有效果。透過催眠，我們發現了頭痛的原因：她前世在戰火連天的歐洲被利劍不偏不倚地刺中現在頭痛的部位。當個案瞭解了起因，頭痛就消失了。


    另一個偏頭痛案例的原因則完全不同。這位女性個案在旅行社工作，經常去世界各地旅遊。她的頭痛是從她離開旅遊的印尼，返家時開始出現。她的印尼假期非常棒，而且很放鬆，她在那裡有回到家的感覺，因此完全無法把頭痛跟那次旅行做任何聯想。她在旅遊時也沒有發生任何傷心或不愉快的事。在催眠回溯中，她回到她在印尼的前世；她過著田園般的生活，有幸福的家庭和一位深愛她的男子。


    她的潛意識解釋，當她回到印尼，那世美好生活的記憶被觸發，她對於必須再次離開感到難過，因此開始頭痛。她渴望回到那個曾經非常快樂的地方。我的工作說服另外那个人格，即使她回到印尼並在那裡生活，日子也不會跟前世一模一樣，因為所愛的人已經不在，而且環境也不同了。她並無法重拾那一世的生活，因此她必須在現在這一世找到快樂，或許也會是和同樣的人，因為我們傾向與所愛的人一起轉世。當她瞭解源由後，她的頭痛立刻消失，再也沒有復發。


    過重有很多原因，有些很容易預料，例如前世死於飢餓或是造成別人挨餓。有時過重是一種保護：個案這世在自己身上加了「保護墊」來防禦某種事物（不論是真實還是認知上的），也或者他們是為了避免被傷害，因此讓自己變得不吸引人。


    我的工作是找出他們所防衛的東西。個案通常並不知道起因，然而催眠中得到的解釋卻很有道理。找到原因後，個案就能解決過重的問題了。


    我也遇過一些出乎預料的過重原因。有位女性個案回到前世，那一世她是蘇格蘭某家族的領導人。這個工作很辛苦，催眠狀態下的她感受到重大的責任。領導人去世後，靈魂依然如此感覺，於是在死後說了一句關鍵性的話：「我永遠都無法卸下這個重擔。」潛意識認真看待這句話並帶到了這一世。


    有個不尋常的案例收錄在《星辰傳承》（Legacy From the Stars）。一位女子在催眠中看到自己是外星人，因為意外，飛行器墜毀在地球，他被當地的人發現並照顧。這個外星人有許多引人注意的特異能力，其中之一是因地球引力的不同，使得他會無預期飄浮，因此這世她下意識以過重來避免飄浮和引起過多的注意，雖然這個原因並不合常理。


    另一個有關過重的不尋常解釋是來自個案瑞克。瑞克也是想解決過重的问题，許多方法對他都沒效果，尤其是那種只能吃某些東西的飲食法。催眠時，他立刻進入了某個古文明時代。他所形容的建築物和構造，聽起來都不像我曾接觸過的事物或讀過的歷史。有些描述讓我想起阿茲特克文化，尤其是已被考古學家發現的部分。


    瑞克看到一個方形庭院，四周圍繞著類似露天看台的奇怪建築物。每個社區會各派一位運動員來這裡參加比賽。瑞克是被訓練來參加這個比賽的選手。比賽很重要，因為結果可以決定這個聯社社區下一期的統治者。統治者是每季更替，而且是以獲勝的那方來決定。


    瑞克穿著奇怪的制服，臉上畫有條紋。這個比賽聽起來很像籃球。他們在庭院裡帶球奔跑，而且必須把這個球投進一個石環裡，這個石環是架在庭院邊。這是為什麼我會想到阿茲特克，因為考古學家曾說過他們在墨西哥發現了一個球場，阿茲特克人在這裡玩類似的遊戲，但是考古學家說阿茲特克人是把人頭，而不是球，投進石環裡。如果瑞克所說的地方和考古學家發現的是同一個地點，那麼，是這個比賽變質敗壞到使用人頭來代替球，還是考古學家說的不正確？


    瑞克是很優秀的運動員，他連續贏了多次比賽。這表示好幾屆的領導者都是由他所屬的團體選出來的。他並不想那麼辛苦工作，他經常希望那些領導者可以自己來比賽。他不被允許結婚，也被嚴格限制只能吃某些食物，為的是保持精瘦和維持最佳體能。他經常羨慕其他人，因為他們可以有社交生活，而且可以吃任何他們想吃的食物。他被規定吃的東西包括龜肉、某種白色的根莖物、很多的水，還有從某些果肉榨取出來的苦味白色液體。他每天早晚都必須喝這種液體。這個東西常會讓他想睡覺，但因為可以維持強壯的体格，所以是必要的飲料。他討厭那個味道，而且從來沒能習慣。


    他最後厭倦了比賽，想要找離開的辦法。大家雖然都很喜歡他，但一段時間過後，比賽總是他贏也讓他們開始感到無趣。而其他社區的人並不喜歡他總是贏，因為這讓他們沒有管理的機會。瑞克決定要輸，但不能輸得太明顯。當他開始輸掉比賽，他那邊的社群決定換掉他，於是他終於被允許過正常的生活，包括吃任何想吃的食物。他決定住到對手的社區，因為那邊的人很高興終於有機會管理了。他發現那邊的選手並沒有嚴格的飲食規定，而是吃一般的食物。他在那裡過得很快樂，但並沒
    有活 很 久。當 他 快 死 的 時 候，他 感 覺 內 像 是 在 燃 燒，巫 醫 說 是 因 為 他 長 年 被 迫 飲 用 的 白 色 液 體，那 個
    東 西 損 害 了 他 的 身 體。當 我 和 潛 意 識 對 話 時，他 的 體 重 問 題 顯 然 和 那 一 世 有 關。潛 意 識 說 那 個 液
    體 有 麻 醉 作 用，會 使 他 心 跳 加 快，身 體 的 消 化 或 新 陳 代 謝 也 會 加 速，因 而 產 生 結 實 的 肌 肉 與 更 快
    的 活 動 速 度。但 這 最 終 使 他 的 腸 道 潰 瘍，導 致 他 的 死 亡。當 我 向 潛 意 識 請 求 協 助 他 的 體 重 問 題 時，潛
    意 識 說 沒 有 那 麼 簡 單，因 為 牽 涉 到 許 多 相 互 糾 結 的 因 素。由 於 當 時 的 權 威 者 強 迫 他 做 的 事 並 沒
    有 考 量 到 他 的 利 益，因 此 他 學 到 去 質 疑 而 不 是 去 信 任 權 威（政 府、教 會、醫 生 等 等）。而 且 進 食 也 已 跟
    樂 趣 及 社 交 生 活 有 所 連 結。要 把 這 些 因 素 分 開 並 不 容 易，而 且 他 其 實 是 健 康 的，潛 意 識 認 為 沒 必
    要 減 重。這 清 楚 說 明 了 為 何 瑞 克 只 靠 吃 某 種 食 物 的 節 食 法 對 控 制 體 重 的 效 果 並 不 好，因 為 這 勾
    起 他 另 一 世 的 記 憶。他 現 在 很 喜 歡 烹 調 並 且 吃 各 類 食 物。瑞 克 醒 來 時，他 並 不 記 得 任 何 事，但 他 想
    喝 水，因 為 嘴 裡 有 種 很 不 舒 服 的 苦 味。他 說 這 讓 他 想 起 小 時 候 有 一 次 和 朋 友 在 森 林 裡 探 險，他 們
    發 現 一 種 多 汁 植 物 並 拿 起 來 咀 嚼（森 林 裡 很 多 植 物 都 是 有 毒 的，奇 怪 的 是 他 竟 然 沒 事。）那 味 道 是
    苦 的。


    我告訴他有關他在前世長期飲用白色液體的事。他把前世那個味道也帶回來了。在喝了一些瓶裝水之後，他覺得好多了。


    我在許多氣喘案例中發現，個案在前世通常是死於窒息或是跟肺或呼吸有關的原因，譬如他們生活的環境（灰塵、沙子等等）。有個重要案例發生在催眠工作的早期。一位有多年氣喘病史的醫生來找我，他平常有使用吸入器，但他知道是習慣使然，希望能戒掉這個習慣。他對超自然和形上學（玄學）有足夠的瞭解，因此認為問題根源可能是在前世。


    催眠時他回到住在非洲叢林的一世。那時法國在開採地下石棉，他們會捉當地的原住民，帶到礦坑當奴隸採礦。當時他也被抓去地底下的礦坑。長期暴露在石棉纖維造成這些人的身體出現呼吸問題，肺部的出血從嘴流出，最後導致死亡。法國採礦者就只是把屍體丟棄在叢林，再去捉別的當地住民替補。當這個個案開始出現相同症狀時，他知道他將會死於肺部的傷害。在他的文化裡，因為情勢難以忍受而自殺是被允許的，於是他把木樁刺入自己的右肩部位。


    當我和潛意識溝通時，潛意識說那世的記憶被帶到今生，而每在有壓力的時候，呼吸的問題就會以氣喘形式呈現。而現在他瞭解了問題的根源，症狀就會停止了。當醫生從催眠狀態醒來，他說：「難怪我常納悶為什麼胸腔有時會覺得痛。」他指的部位正是他刺入木樁的地方。這位醫生後來成為我的好友，大約過了四、五年後，有一次我問到他的氣喘，他笑著說，「喔，對喔，我曾經有過氣喘。」


    許多害怕和恐懼症可以追溯到前世死亡的方式。當我們從這個角度來看，懼高、怕黑、幽閉恐懼症、廣場恐懼症（agoraphobia）就變得容易理解了。在數百位類似的催眠案例中，有個例子是一位有幽閉恐懼症的女性個案，她也很害怕手或腳被束縛，夜裡睡覺每隔一小時就會醒來。她在阿肯色州史密斯堡（Fort
    Smith）參觀歷史景點時（那裡有個歷史博物館和法庭），突然有種似曾相識的感覺。一八七五年至一八九七年間，以「絞刑法官」惡名昭彰的派克法官就是在這個法庭審判。後人保留了監獄並重建絞刑台。個案直覺知道自己曾經在那裡，而且是非常恐怖的經歷。這次的參觀對她來說是毛骨悚然的經驗。


    催眠時她回到了前世，她是南軍的士兵，和其他幾位夥伴一起被捕。他們被送到一間很暗的房間，只有很小的窗戶，大家一起擠在狹小的空間裡。她害怕手腳被綁的恐懼是來自她當時被鍊條銬在牆上的經驗。夜裡難以成眠則是因為在那樣的情況下，當時的他根本無法好好睡，而且心裡也害怕接下來會發生的事。幾天之後，他們全都被吊死。


    這個案例顯示似曾相識的感覺可能是下意識憶起了前世經歷。同樣地，對某個年代、文化或國家的嚮往也是。這些吸引並非總是負面，而這些無法塵滅的強烈情緒也總是持續被帶入許多轉世。


    另一位個案是擁有心理學碩士的專業護士。她去見治療師有好一段時間了。她想找出她的問題原因，但一直沒什麼結果。治療只得出一個結論：在她小時候發生了某件事，但她已不復記憶。這並沒有回答她的疑問。


    她跟她的大兒子之間有些問題，她懷他的時候尚未結婚，當時她很想墮胎，後來孩子的父親終於要娶她，並且說服她把孩子生下來。但自從生了這個小孩後，她總是有被他威脅的感覺。她原想可能是孩子意識到她曾經想拿掉他。如今孩子雖然長大了，但兩人之間仍然明顯有問題存在。


    進入催眠狀態後，她立刻看到自己是個男人，而且極度憤怒。他正掐著某人的脖子，那個人已經快要窒息。當她看清楚對方時，她說那是她現在的兒子。前世的他發現這名男子跟他太太在一起，他想殺了他。個案突然知道，那個妻子就是她這一世的母親，而她和她母親一直處得不好。畫面裡，他殺了這世是她兒子的男子，他後來被關進牢裡，牢裡沒有窗，而且爬滿了老鼠和蟑螂，空間非常骯髒和陰暗。最後他死在牢裡。當時的那個男子在這世回來做她的兒子，這樣他們才能解決這個負面業力，然而他（兒子的靈魂）帶著很多的怨恨回來，難怪她總是感覺受到威脅。


    個案也一直不明白為什麼那麼討厭酗酒的人。酒精的味道、他們說話的樣子和行為在在都令她反感。當我問到這個問題，她立刻把酒精和掐住那人脖子的那幕連結在一起。也許當時他們倆都喝了酒，而酒精激化了憤怒。無論當時是什麼情形，都導致了可怕的結果，她因此必須在這世回來和當時的相關人解決這個負面業力。


    當個案明白了問題的起因，也看到這是屬於前世的事，她原諒了自己和所有參與的人。我們也可以從別人的前世經驗，學習把過去的恩怨留在過去，一勞永逸地解決問題。


    我從工作中發現，償還業力的方式不勝枚舉。但最不理想或最不值得的，就是這世回來被你前世的受害者殺害。這不但沒有解決任何事，只是讓業力之輪繼續運轉，而且還產生更多業力。我被告知殺人者償還罪行的最理想方法就是「軟性的方式」：透過愛。


    舉例來說，曾經的殺人者這世以照顧被害者的方式來償還。他們可能需要奉獻一生來照顧他們的受害者：譬如一個需要被照顧的父親／母親，一個殘障的孩子等等。他們會因此無法擁有自己的生活，但這要比「以牙還牙」的方式有智慧多了。


    這位個案的心理醫師曾經告訴她，他不反對她做前世催眠，但他並不信這一套。然而，透過傳統的正統心理治療，她將永遠找不到問題的起因。我很想看看當她告訴他，她不再需要繼續治療，她已經從催眠療法找到了答案時，他是怎麼說的。


    另一個案例是紐奧良一位過重的年輕女性，她很渴望有孩子，也一直在服用幫助受孕的藥物，卻都沒有效果。她經期來時很辛苦，曾經一個月都在流血。唯一的解決辦法是服用避孕藥調節，但這樣卻會讓她無法受孕。她也在努力減重。


    催眠時我問到為何她不能受孕，潛意識說她上一世是收養孤兒的家庭。她收養了十一個小孩。每當有小孩離開她的寄養家庭，馬上就會有另一個進來遞補。她把小孩照顧得很好，她也很喜歡照顧他們，但在現在這一世，潛意識希望她能夠休息。它們說不用擔心，她會有孩子的。她的身體正在調節，開始要回復正常。體重過重的問題則是她必須經歷的試煉，尤其是在她要進入成年期的這段時間，為的是看她能否承受得住甚至是成年人對她的嘲笑和惡毒評論。她現在已經通過這項考驗，所以體重可以減下來了。當她到了能夠有小孩的時候，她的身體也會是在健康的狀態，當然，小孩也將在適當的時機來到。


    個案這一生也一直過於敏感，她會有周期性的沮喪，感到孤單和被遺棄。她後來終於崩潰，無法停止哭泣。她這麼敘述：「我心裡感到非常空虛。我總覺得我的生活平淡乏味。有時候我覺得自己是在休息，有時候我又害怕好像有什麼災難要發生似的。悲傷一直都在。我到底怎麼了？我要怎麼去改變這個情況？從我小時候起，大概八或九歲左右吧，悲傷的感覺就已經是我的一部份了。」


    潛意識對此做了一個很有意思的說明。它說她原本應該是雙胞胎，另一個靈魂跟她約好要一起投胎，但在最後一刻變卦，決定不在這時候來地球。因此另一個人體並沒有成形，她孤單地一個人投生人世。下意識裡，她都覺得那個沒有和她一起出生的存在體遺棄了她。那是一種少了什麼的悲傷感，並且伴隨著沮喪。這就是原因了：她想念那個原本該在此生陪伴她的靈魂。我從沒對她說，但我一直很好奇，未來她所懷的孩子是否有可能是那個終於決定要來人世的另一個靈魂。


    當我們告訴她母親這件事的時候，她母親非常驚訝，因為從來沒有這方面的跡象。醫生從未告訴她有可能是雙胞胎。我的個案是在一九七二年出生。我不知道她們是否是所謂的「幻影雙胞胎」或稱「消失的雙胞胎」（disappearing
    twin），這在現在是大家都知道的現象。（譯注：是指受孕時有兩個胚胎，但經過一段時間，其中一個胚胎停止發展，因此超音波掃瞄時只看見一個胎兒。）催眠完後我們一起用餐，她母親說個案出生時是一位不熟的代理醫生在場。如果是她的主治醫生，或許就會跟她說是否有另一個胎兒的跡象。我想我們永遠也無法得知了。


    我也發現有些不孕的案例是因為個案前世死於分娩，潛意識為了不讓這樣的事在今生再次發生，因此個案一直不孕。有時潛意識的邏輯真的很奇妙。


    以下的回溯案例時間和地點是二○○○年五月的加州聖荷西市（San Jose）。'
