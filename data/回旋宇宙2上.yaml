    **迴旋宇宙 2「上」**前世今生與志願者靈魂朵：我們通常無法看見或知道它們的存在。瑪：有些人可以，但大部分的人無法用眼睛看到。**朵**：**只是有感覺。直覺。**瑪：是的，沒錯，就是這樣。**朵**：**這很重要，這表示符號對宇宙心智來說很重要。**瑪：沒錯。那是宇宙的語言。這個說法和我之前收到並寫在別本書裡的訊息是一致的。那就是外星人以符號溝通，而這些符號包含了許多組可以透過心智轉譯的訊息和概念。此外，很多人告訴我，他們收到大量符號進入腦袋，我想這也可以部分解釋這些人的經驗。**有些人說**他們躺在客廳的沙發上，然後看見一束光穿透窗戶，這道光束裡有許多幾何圖形和其他符號。光束聚焦在他們的前額部位。其他人則報告他們有畫上好幾個小時的符號或不尋常圖案的衝動。（許多人寄來他們圖畫的影本，讓我驚訝的是它們看起來很類似。）外星人曾告訴我麥田圈的圖案也包含許多組資料。**觀察者並不一定要**在麥田圈裡才能接收，只要在一本雜誌或報紙等等看到符號，就能下載這些資料。許多人也提到下載訊息時的不同情形。外星人說那是他們的語言。接收的人不一定要懂這些符號。它是植入在那個人的潛意識裡，是在細胞層面，植入的目的是這些人最終將會需要這些資料，他們會得到這些資料卻不明白是從何而來。**這帶出了一個問題**：如果我們在轉世前，符號的模式就已經銘印在我們的靈魂或氣場，不論這是怎麼做到的，那麼來自外星人的下載符號是加到這個模式裡，還是會啟動這個模式？個案確實提到這個符號的模式會隨著那個人的生活經歷而改變。**朵**：**我知道在埃及有許多金字塔，你們是把它們放在大金字塔裡嗎？**瑪：（停頓）我想是在獅身人面像的爪子那裡，不是金字塔本身。我相信是這樣。那裡面有許多地下通道和房間，我想它是放在——如果我是正對獅身人面像的話──它會是……我相信是在左邊的爪子。**朵**：**這些通道也可以通往金字塔下面嗎？**瑪：是的，在金字塔底下有好多通道。**天使神秘学院官方淘宝：http://strc.taobao.com**#
    ## **迴旋宇宙 2「上」**前世今生與志願者靈魂朵：但是大部分的人都不知道要怎麼進入，是吧？瑪：對，只有特定的祭司，特定貴族知道。一般民眾並不知道。因為要建造通道，所以有傳言流出……總是會有洩密的人。**可是一般大眾不知道細節**，他們只是聽過傳言有這些通道存在。**朵**：**可是如果你們來到這裡的時候，獅身人面像和金字塔就已經建好了，你聽說過是誰建造的嗎？**瑪：（停頓）有。我相信這個文明——雖然不比我們先進——曾接受過外星人的幫助，因為那個社會的整體智慧水平並不是那麼高度發展，外星人提供他們資料，但，再次地，只是給少部分的人，不是全部的人。**他們很多人是跟隨者**，不是獨立思考的人。**朵**：**你有聽說過他們是用這麼巨大的石頭建造金字塔的嗎？**瑪：能量操作。透過一種重力的裝置讓石頭飄浮起來。這不可能用人力就能建造的。**朵**：**你來自的地方也有能力做類似的事嗎？**瑪：可以。雖然我的專長不是建築或建造東西，但是我知道能量操控的基本概念。還有飄浮。**大部分的學生**，那些在神廟工作的人，他們都知道這些事，飄浮和能量運用是我們學習的一部份。**朵**：**所以這是傳授給每一個人的知識？**瑪：是的。而且有些人在這方面很進化，在建築和創造物質方面很先進。不只是物質實體，也不只是三度空間，而是物質和更高振動的相互交錯，這比較接近精神心靈的顯化。不只是實體而已。**朵**：**但你說住在埃及的這些人不夠先進到可以自己造金字塔。**瑪：是的。但他們之中有些人比較進化，也比較願意傾聽，心態較開放……這通常是那些比較有接受教育的人。資料給他們是希望他們能夠對這個文明的進步有幫助。所以那些看顧地球的外星人接觸他們。外星人也到這裡來幫助這些事的進行。而因為我們來自的地方和具有的知識，我們也能幫助他們學習和進步。**朵**：**為什麼要建金字塔？有什麼目的嗎？**瑪：（停頓很久）金字塔是非常密實的能量源，它們和水晶不同，在金字塔裡的能量和散發的振動，可以擴展並協助事物的創造。由於它們具有的能量，它們像是學習中心，也像是進入另一個次元。它們可以增強並且傳遞振動和能量到其他地方。**它就像一個巨大的能量場或原力（force）**，或許不見得是原力。總之它是具有強大力量與能量的一個中心。**瑪**：**所以外星人想要建造金字塔？**瑪：這是他們建造金字塔的部分原因，也就是金字塔的功能。外星人只是想要人類創造一個更和諧、更和平的世界。一個更快樂，而非貧窮、痛苦和絕望的居住地。他們希望我們可以運用這個資訊和這些禮物來擴展那個可能性。**朵**：**這必須要有知道如何使用的人才行。**瑪：沒錯。這就是為什麼只有特定的人才能知道金字塔知識的力量，也只有他們才有可能幫助這個地區的發展。但同樣地，這個力量（指如何運用的知識）同時也伴隨著一個可能性——就和亞特蘭提斯一樣——它會變得負面。**朵**：**錯誤的使用能量。**瑪：沒錯。（大嘆一口氣）**自由意志可以是兩面的**。朵：所以才會有正或負面。因此你沒有使用你的卷軸和水晶，反而決定把它們藏在安全的地方。瑪：是的，人們還沒有準備好要接受這些資料，他們也沒有正確使用，沒有使用在該使用的方面。**在某些地方已經有人濫用這個力量了**，這很容易就讓那些地方'
