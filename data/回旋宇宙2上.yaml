  md: '瑞：我很疑惑。因為我可以看見身體，那隻……海豚。然後……我想離開那個身體，或是想去其他地方。我感覺我快速移動了一會兒，然後就停了下來，因為我嚇到了。我想回去那裡（指海豚身體）。我喜歡在海豚的身體裡，可是我不……它太……（有困難描述）太困惑了……太不一樣？我沒辦法描述。

