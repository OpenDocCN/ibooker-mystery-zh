    不快樂，很渴望有人陪伴。在他孤單的生活裡也有著恐懼，因為他偶爾會看到山上發出巨大的光，並籠罩著他的小屋和羊群所在的牧草地。每當這個情形發生，他會躲在屋子裡直到光消失。這是他意識的記憶。事實上，這光其實是太空船降落在他的屋子附近。他會清楚著走出去跟太空船裡的人交談。他是志願參與這項實驗，所以人必須待在這裡直到實驗完成。他被告訴他時機未到。他是志願參與這項實驗，所以人必須待在這裡直到實驗完成。他被告知有很多志願者來到這裡，以人類的形態在各種不同的環境下生活，為的是要看到他們如何適應地球的人生。其中有些人過著不同的生活型態，而他的設定是過著孤獨隱居和寂寞的日子，看他是如何處理。當太空船飛離後，他會站在牧草地上哭泣，早乞求他們回來帶他走，因為他無法忍受這樣的生活。之後他會回到小屋裡睡覺，早


