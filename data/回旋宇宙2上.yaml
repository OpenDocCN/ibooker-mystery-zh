    我召喚潛意識，問它為何選擇讓麗塔看到這一世，這和她現在這世有何關聯？


    潛意識說：「這是她的心受傷的地方，也是整個靈魂受傷的地方。很多靈魂都受到傷害。我們就是在這裡跌倒，這對（靈魂的）所有層面來說都很震驚，每個層面。這就是對靈魂的攻擊。在星光層，這個存在的每個層面都受到驚嚇，因此不讓她記得。如果讓她知道所發生的事，她一定會因為即將到來的日子（指回到地球）感到非常沮喪和痛苦，靈魂記起這些也沒有意義，因為離她要回來（地球）的時間


    還有很長。麗塔的心輪已經被保護得太久，如今這樣的保護已不再適合，她可以帶回這些記憶了。現在這個時期對我們所有人來說都是非常有趣的。能夠看到我們再度學到如何種植以及豐富事物是件很有趣的事。然而，我們增殖了動物、植物及各種東西，現在卻要再次摧毀它們。這真是無法容忍。」


    在當時科學已經失控，科學家操弄氣候和大氣層。「很顯然他們做了一些事，使得我們在電磁層面變得很脆弱。我們變得很容易受到太陽以及太陽異象的傷害。他們要為這件事負責。太陽其實有一層很薄的保護屏障，如果地球無法適當隔熱，太陽會做它能做的事。」


    她所屬的那個團體知道這樣負面使用自然力只會招致災難。他們試圖運用他們的正面能量去中和影響，但沒有成功。錯誤使用能量造成臭氧層破了一個大洞，導致太陽光直接射入並燒焦地球上的某些區域。數百萬人失去了他們的家，氣候也改變了。陽光直射的地方形成廣大的沙漠，從此那裡再也見不到生命和沃土。這個情況聽起來跟我們現在實在是可怕地熟悉。到底要重複多少遍歷史，人類才會記取教訓？地球是個有生命的有機體，如果造成太多傷害，她是會反抗的。如果人們認為他們有支配的力量而想為所欲為的話，地球絕對有能力抵抗。


    以下是另一個古代文明被毀滅的案例。


    卡洛是一位很有天賦的靈媒，她和警察合作，也幫助來自世界各地想從歷史遺址發現失落資料的人。我和卡洛是多年的朋友了，這場催眠是我去拜訪她時，在她位在阿肯色州小岩城（Little
    Rock）的家中進行。我們想要尋找對她在埃及的調查工作有幫助的資訊。像往常一樣，我一開始就讓個案的潛意識帶她回到跟今生所發生的事最有關聯的適當前世。身為靈媒的她很習慣這種出神狀態，加上她認識且信任我，因此卡洛很快就進入了催眠狀態。


    她從雲端下來，發現自己在一個很陌生的環境裡，她有困難描述所見的景象。


    「有好多房子，是住家，但它們是一個一個地堆在彼此上面。」這些房子是用各種顏色的泥土建造而成。「我找不到可以比喻的東西。這些房子相互交錯。這裡有很多獨立的住處，每個都有入口，一個交錯在另一個上方，很像是座由房子堆積而成的山或山丘。」它們並不是堆成山，而是直立得看起來像是山或峭壁。


    「有些比較突出，有些比較內縮。有些內縮的是為了要讓出路來。它們看起來'
