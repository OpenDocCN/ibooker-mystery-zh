  md: '事。它也是一台虛擬實境的機器，可以讓你旅行。你可以使用它作為運輸的工具。如果你不想進行虛擬旅遊的話，你可以爬上小階梯，進到他們所說的「入口」，基本上地表上的人稱為「星際之門」。進入之後，你就可以傳輸自己到任何你想去的地方。你帶著你的身體一起去，然後回來。這裡也有相互交錯的高速隧道，就像蜘蛛網一樣密集，在地球內部穿梭的列車時速超過三千英里。這個速度在這裡非常普遍，只花個一小時就可以到達目的地。這只是我們所知的宇宙裡的一個星球而已，但這就是大致的情形，因為星球都是空心的，大多的星球裡面都有文明存在。我們有大規模的星際艦隊定期在各個世界來回。有時候你可以看到他們，但通常我們有所謂的掩蔽裝置，這個裝置就像你在電視上看到的科幻影片裡的「克林貢隱形裝置」（Klingon
