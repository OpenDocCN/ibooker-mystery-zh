    西更重要。因為他們不曉得有個比他們所想的還要偉大的力量會把我們都燒掉。現在我們看起來也像在重蹈覆轍。歷史正在重演：……但是那對當時所有的人和生命來說是非常大的傷害和悲傷。極大的驚嚇、悲傷、黑暗和破壞降臨在這個人身上。


    當時我們都在場，而且是我們同意要經歷那個時期。有些是紀錄的守護者，有些則是單純保管這些紀錄等待我們甦醒過來。其他人是來加速以及讓這個事件發生，這並不是聰明和有智慧的作法，但是就是這麼做了，每個人都扮演了他們同意在這裡扮演的角色。我不瞭解為什麼必須要用這樣的方式。我想可能是有些經驗我們必須去經歷。我也不瞭解為何事情會這樣發展，但就是這樣了，所以接下來該發生的事就都接著發生了。」


    我召喚潛意識，問它為何選擇讓麗塔看到這一世，這和她現在這世有何關聯？


    潛意識說：「這是她的心受傷的地方，也是整個靈魂受傷的地方。很多靈魂都受到傷害。我們就是在這裡跌倒，這對（靈魂的）所有層面來說都很震驚，每個層面。這就是對靈魂的攻擊。在星光層，這個存在的每個層面都受到驚嚇，因此不讓她記得。如果讓她知道所發生的事，她一定會因為即將到來的日子（指回到地球）感到非常沮喪和痛苦，靈魂記起這些也沒有意義，因為離她要回來（地球）的時間'
