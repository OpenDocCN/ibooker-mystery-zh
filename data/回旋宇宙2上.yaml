    *fagus* ?（類似的音）分享。當我们知道他們可以信賴的時候，我們就會慢慢和他們分享這些知識。**朵**：**這會需要時間。但你們有時間，不是嗎？**瑪：是的，我們有時間。**朵**：**至少你們已經找到可以停留的地方了。你們並不曉得其他人是否生還。**瑪：已經有回報說有些人在其他地方登陸了，所以我们知道有人成功到了不同的地區。有些人我們沒有消息，但我們知道有别的人生還。**朵**：**這表示知識不會消失了。**瑪：知道有其他人也成功生還很讓人開心，這表示我們不是唯一的倖存者。我們的責任就是繼續將這些知識和禮物傳遞下去。為了讓故事有進展，我引導他去看這一生的一個重要日子。**瑪**：**我們找到了存放水晶和卷軸的地方。我們覺得現在可以休息了，可以不用一直擔心這些水晶和卷軸。我們和一些分享了部分資料，但這些人尚未準備好要接受這些知識，所以我們必須先把這些東西藏起來。**當問他們把東西藏在哪裡時，他開始變得不安。我必須讓他相信我並不是威脅，他可以放心告訴我。**瑪**：**我們把它們存放在……在一座金字塔裡面，那就跟內部次元空間的儲存區差不多。除非你知道怎麼進入，要不然不會發現。你們不容易看到或是知道有東西朵：所以並不是在金字塔裡面的一個實體空間裡。瑪：是一個實體的地方，但它就像隱形的。東西是在那裡沒錯，但只要它是被密封的，就算有人經過也看不到。必須要有某個特定的心智能量、知識，甚至某個符號，某個圖案才能打開它。**朵**：**聽起來像是放在一面牆壁邊。**瑪：是的，很類似。就像放進其中一個大石頭裡面。它就在那裡，但你看不到進入的地方。也沒有任何跡象顯示它在那裡。**朵**：**沒有辦法可以實際打開。**在那裡。我們用了某種特定的能量鎖住它，讓它們無法顯現。這些東西是實體的，但被保存在一個………就像它們在那裡但你卻看不到，它是一個內部次元的空間。我們把它們放進一個盒子裡然後闔上，只有特定能量才能開啓，要開啓後才會被看到。**朵**：**你知道要如何創造出這個內部次元空間？**瑪：我有得到其他生還者的幫助，我們後來終於碰面了。透過合作，我們才能創造出這個空間。**获取更多好书，请加微信：13641926204或QQ:715104687**
