  md: '女兒茱莉亞位於拉瑪（Lamar）的家停留。當我們在尋找離開堪薩斯市的高速公路入口時，我們迷路了，開到了一條不熟悉的街道。


    我們經過一間很大的共濟會聖堂。當我看到聖堂前兩座非常巨大的雕像時，我整個楞住了。這是坐臥式的獅身人面巨像，有著一張女人的臉，而且有很不尋常的頭飾，頭飾長及半身，蓋過肩膀，直到爪子的腕部。兩座雕像看起來一模一樣。我大吃一驚，開始告訴南西跟這個剛結束的催眠有關的巧合。當我要求南西開回那座雕像的時候，我們已經往前開了好幾條街了。我想下車去近距離看看這些雕像，我也想拍些照。我們開回去並停好車。我下了車，在聖堂前四處走，從不同角度對著雕像拍照。我想要有圖片的證明以及某種實質證據可以讓我在書中引用，而且這對我的研究也有幫助。我一直在想為什麼堪薩斯市會有這個獅身人面的象徵，這絕對是背離了埃及的傳統版本。我知道我必須研究這個象徵的背景資料。此外，我現在也知道這次的回溯是有事實的基礎，我應該把它寫在書裡。天曉得我可能會發現什麼？我也知道了我們開「錯」路並不是個錯誤。


