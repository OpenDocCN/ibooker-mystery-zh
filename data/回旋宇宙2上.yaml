    # 第三章 | 貓人（不一樣的獅身人面像）


    自那次催眠過後，我就試圖想要找到女性臉孔的獅身人面像曾經存在的證據，但都沒有收穫。我找到資料提及尼羅河對岸據說存在過第二個巨像，但除此之外沒能再多發現什麼。我聽說埃及有許許多多的獅身人面像，有些是女性的臉孔，但通常都有翅膀。有個網站說：「埃及的獅身人面很少是女性。如果是女性，那就是象徵女神愛西斯和／或掌權的皇后。」這個網站也提到在古代，太陽神殿曾一度簇立在獅身人面巨像的前面，接受人們對升起的太陽的供奉。（也再一次提到黃金象徵太陽。）

    在埃及也有許多各種大小的金字塔，在開羅附近的獅身人面巨像和金字塔則是最我們最熟悉的。


    如果我找不到任何有關古代獅身人面的資料，我也決定要找出為何堪薩斯的共濟會要把有著女性人頭的獅身人面像放在他們的聖堂入口處。結果令我驚訝。原來這個座落在密蘇里州堪薩斯市林伍德大道一三三○號的巨大建築物是蘇格蘭聖堂（Scottish
    Rite Temple），它建於一九二八年，建築師是喬更·椎爾 (Jorgen C. Dreyg)，他也是這座獅身人面雕像的雕刻者。我後來終於和聖堂的管理人接洽上，他對我的問題感到疑惑。我問他：「為什麼入口處的獅身人面雕像是女性的臉孔？」

    他回答沒有人問過這個問題。他說大家每天上班都會經過雕像，卻從未質疑為何是女性的臉，但也對，為什麼一個以男性為主的共濟會組織會有女人的雕像在他們的門口。他說這棟建築物和雕像應該都是根據位在華盛頓特區的總部複製過來的。總部那棟是建於十九世紀晚期的拿破崙時代，那時美國的建築受到埃及建築風格的強烈影響。

    我轉而到網路搜尋，想發現更多有關華盛頓那棟建築物的資料，但我卻更困惑了。建築物和雕像應該都是從總部複製過來的才對，但卻只有建築物是一樣的，雕像並不同。華盛頓特區總部的雕像是男性，而且兩座雕像不一樣，一座的眼睛是開的，另一座的眼睛是閉起來的。據說一個代表智慧，一個代表力量。

    我試著找出有關雕刻者喬更·椎爾的資料，想要瞭解為何他把雕像雕成女性。我搜尋到他和那棟建築物的資料，但沒有關於他雕刻的動機。堪薩斯市立圖書館網站的資料這麼寫：「蘇格蘭聖堂前的獅身人面雕像於一九二八年建造完成，每座雕像的重量是兩萬磅。在獅子身體上面的女性頭部和獅鷲怪獸所戴的圖形裝飾則象徵共濟會的次序。」我試圖搜尋一九二八年建築物落成時的報紙檔案，我想可能會提到為何把雕像設計成女性的報導，但也一樣沒有結果。堪薩斯市星報（The
    Kansas City Star）City Star）則已經不讓任何人查詢他們的報紙檔案了。如果我們不能查閱舊報紙，他們又要如何期待人們做研究呢？

