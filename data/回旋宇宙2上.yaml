- md: "## 迴旋宇宙 2「上」：前世今生與志願者靈魂\n\n天使神秘學院官方淘寶：http://strc.taobao.com  \n獲取更多好書，請加微信：13641926204\
    \ 或 QQ:715104687  \n\n莎：沒錯。她會待在這裡直到她的工完成。她不必再投生，她會待到地球轉變完成。  \n朵：她來自的地方是我所稱的靈界嗎？\
    \  \n莎：任何沒有形體的靈魂都是靈體╱精神體，精神體所在的地方有好多好多。這不是說你死後才會去的，這是你轉世前就在的地方，這只不過是不同的界域。  \n\
    朵：有些人認為這些靈體是從未轉世的天使。  \n莎：不是天使，而是和其他人一樣的靈魂，只是沒有轉世為肉體形式。這個靈魂沒有覺得轉世的必要，直到現在。她之前是以精神體的形式存在。有許多層級的……我們不稱為轉世，因為那不是像在任何星球的身體一樣是較低的頻率。那是能量，能量也有身體，有個體性，但只是能量。能量也有存在的空間，它不是我們稱為一╱上帝的能量，或湖泊的能量，它是獨立個體的能源，只是在一個身體裡或是在人類形態的物質形式裡，或任何星球生命的身體。\
    \  \n朵：聽起來很合理，我能理解。現在有越來越多來找我的個案是來地球擔任療癒者和能量工作者的角色。  \n莎：這跟時代的改變有很大的關係，舊時代即將結束，像莎莉和東尼這類的存在體份。\
    \  \n\n朵：是新的能量。（是的。）他們是來這裡幫助地球轉化。我會告訴你和你說話的人是誰。是莎莉剛連接上的部另一個奇特的案例是二〇〇四年的催眠個案，他是一位在醫學領域工作的男性。他主要的問題是他的太陽神經叢部位有種他稱為「恐懼和焦慮」的感覺，似乎有個很大的結在那裡，讓他感到很不舒服。他一直都沒有安全感，總害怕有什麼事要發生，但他的生活井然有序，很難解釋那會是什麼事。他想知道這種感覺來自何處，代表什麼意義，並且如何擺脫。\
    \  \n\n催眠時，他進入我探索過最奇特的前世之一。他在另一個星球，是一個殺人機器。當他咆嘯著說要殺掉所有東西時，我想清醒時的他應該會被自己聲調裡的原始憎恨給嚇到。殺掉所有他接觸到的東西就是他唯一目標，而且他用的是一種特別的方式。他的家鄉星球和另一個星球已經交戰了許多世代，他是基因工程下的產物，他的身體被設計為可以儲存非常多的能量。他被太空船載往敵方星球，當他降落後就開始搜尋敵人，而敵人也已經學會要躲開這些殺人機器。他沒有使用任何武器，他本身就是武器，一個自殺機器。他可以啟動身體裡的能量，這些能量爆炸後相當於十顆氫彈，幾英里內的东西全部都會毀滅。他的星球已先進到瞭解形上學。當他爆炸死亡後，他的靈魂會立刻轉世回到同樣的社會，然後再一次開始相同的過程。當他到達一定的發展階段和年紀後，他又再度被送出去。這是個惡性循環，他就好像被陷在這樣的循環裡。在那個星球的社會結構裡從來沒有家庭或社交生活，他就只是一個被製造出來的殺人機器。他的心態已被設定成怨恨、殺戮和毀滅。在經過多個世代後，這兩個星球終於理解到停止戰爭的唯一方法就是提升他們的意識，因此開始朝意識提升發展。\
    \  \n\n在那個時候，他終於能夠脫離那個星球，轉世到地球。儘管如此，由於之前的驅力仍然很強大，他經歷了許多殺人和謀殺的轉世。殺人的設定依舊產生影響。他說從某方面來看，地球很像他的家鄉星球，因為這裡也有許多的殘殺，只是不是那麼大規模。他在目前這一世終於要打破這個循環。他出生的家庭抑制了他的性情，中止了他好殺的精神，使他變得溫順柔和。（所以即使是這類型的家庭也是有功能的。）他說他小時候就渴望長大後成為一名傭兵，但若是這樣就會持續同樣的循環。\
    \  \n\n# 第十章：非人類形態的生命  \n**283 | 第十章 | 非人類形態的生命**\n\n接下來的催眠是在佛羅里達州的克里爾沃特市（Clearwater）進行。那是二〇〇年的十月，當時我前往克里爾沃特市參加一個博覽會。\
    \  \n\n身為人類，我們習慣認為我們的過去世（一旦我們接受了輪迴的概念）只有身為人類的經驗。我從研究中發現這個信念非常侷限。各種形式的生命都有可以教導我們的課題，而地球人生的目的就是來地球這個學校學習。除非你成功完成了現階段該完成的功課，你才能晉級。當然，當人類比當石頭或一根玉米可以學到更複雜的課題，但它們同樣都是活生生的生命，只是振動頻率不同。\
    \  \n\n在我著的《星辰遺產》一書，我提到我為一名年輕男士進行回溯催眠，我引導他前往第一次的地球人生，我當時想可能會是洞穴人之類的一生，但他回到了地球還在冷卻，以便未來支持生命發展的階段。當時的地球仍有火山持續噴出岩漿和有毒氣體到大氣中，還不是一個適合生命發展的健康環境。\
    \  \n\n這個年輕人在回溯時發現他是大氣的一部份，他和許多靈魂的工作是協助清理空氣中的阿摩尼亞和其他有毒氣體，好讓地球冷卻後有個適合生命發展的初步階段。雖然他沒有我們所認為的身體，但他是「活」的，並且知道自己的任務。他確實有他的個體性，並且從他自身獨特的角度來看待一切。他甚至會在工作時小憩，偶爾為了好玩而進出流動的岩漿去體驗那是什麼感覺。\
    \  \n\n我發現，在我們終於進入人類階段之前，我們必須經歷所有的生命形式。這個發現我記錄在《生死之間》。我們的意識並不知道這個目的，這是為了要讓我們知道所有的生命都是一體的，在更深的靈魂層面，我們全都連結在一起。起初我們是靈魂，隨著我們在知識的階梯往上前行時，我們會經歷許多不同的冒險旅程，最後會回來再次與創造者合而為一。因此，當有個案說他是非人類的存在體時，我不再感到訝異。個案透過催眠尋找答案，而潛意識則會挑選它認為在這個時候最適合他們看到的前世。\
