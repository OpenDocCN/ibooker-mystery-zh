    ### 第九章 | 孩子與業力


    当天下午我为东尼的太太莎莉进行催眠，我惊讶地发现她跟东尼是同类型的灵魂，这也是她第一次投生在地球。这两个人能够找到彼此真是太奇妙了。当然，没有任何事是意外，但这是我第一次在同一天裡碰到两个同类型的个案。在催眠历程的一开始，莎莉同样也看不到东西，除了颜色在变换。经过几次尝试回到前世后，我终于接触到潜意识。潜意识提供了我曾经被拒绝取得的资料。有时候如果个案还没准备好，资料就不会进来，因为潜意识的保护特性，它对资料释出给谁是非常谨慎的。


    莎：发生在莎莉身上的事是一个实验。这样的事从未做过。我们在尝试提升能量的层次。轮回转世在地球和其他地方都有能量上的规定，但是因为在这个时间点我们是转世地球之后，仍然可以提升层次。有的能量层次是人类身体无法承受的，这对莎莉來說很重要，因為我們曾經失敗過。這也是莎莉志願來此的原因。她志願來這裡，透過她的人類載具帶進能量，經歷這一切。這一次我們成功了。之前失敗時就像電路爆掉一樣。


    朵：這會傷害到她要進入的身體嗎？


    莎：對。是造成了傷害。身體死掉了，身體無法承載那麼多的能量和資料，頻率太高了。


    朵：身體無法負荷。


    莎：沒錯。但這個身體一直運作得很好，我們也隨著身體的年齡進行微調，好讓身體可以承載更多。我們也已經加了更多資料。


    朵：她之前曾經有過肉體的轉世嗎？


    莎：她是用印記的方式。許多身體問題都是因為承載那個能量而造成的身體壓力和緊繃。


    朵：你是說莎莉從不曾在任何地方以肉體存在過？（沒有。）但我總認為像地球這種文明，對第一次投生為肉體形式的靈魂來說是很困難的。


    莎：她一直在協助地球，不是以肉體的形式，而是在地球周圍協助轉生至地球的靈。


    朵：為什麼她選擇這個時候來地球？


    莎：因為地球正面臨一個重要的時刻，而她有能力把地球這時所需要的能量帶進來。以剛好符合這時候需求的方式、強度和比例。這是很科學的，我無法解釋得很清楚。這很像是能量的數學公式。她的能量是最能適應這裡的，因為她一直和地球密切合作，而且知道事情是如何運作，也了解規則和限制。所以她能夠調節她的能量還有身體。我們現在也在幫忙。


    朵：如果這是她的第一次轉世，那她不就很有可能被業力給困住？


    莎：不會。她不會有被業力困住的風險，因為她不會累積業力。她是在另一個層次，或者說是與地球有不同合約的靈魂，因此她不會被困在這裡。她的合約是來這裡並帶進能量。將她的能量帶到地球。這不是業力的合約。


    朵：這很微妙。


    莎：跟她一起來的人確實是因為合約，而且是陷入業力的靈魂。這些人受到莎莉的吸引，因為在潛意識的層次上，她在幫助他們解脫業力。


    朵：所以他們跟她是沒有任何業力關係的。


    莎：沒有。她是來幫助他們釋放與他人的業力，而不被業力所困。這就很像是練習棒球的練習打擊機器，球會自動投過來讓你揮打，而她就是球打出去之後會碰到的背景布幕。可是這沒有真正的棒球隊在接球和跑壘。她的那個位置讓他們可以釋放業力。


    朵：所以這些人需要有人來幫他們處理業力。


    莎：是的，因為他們是在下坡路，他們已經掉入負面的漩渦。她有幫助地球的合約，但是是在另一個不同的層面，並不是以轉世的方式。但是在另一個不同的層面，並不是以轉世的方式轉世，為的是在這個時候帶進更多的能量。這是因應時機的對策，因為這關係到自由意志和...平衡。這是個平衡的時刻，在這個時候地球可能有截然不同的變化，這是很重要的轉變。地球來到了轉變的地方，一個十字路口。


    朵：我不想稱你們為新靈魂，因為你們有很多的知識和力量，但這為什麼在這個時候有這麼多新靈魂進來的原因嗎？（是的。）我遇到越來越多這樣的人，有些人說他們只是觀察者。他們不想被困在這裡。


    莎：他們不是觀察者，如果你能想像我說的：就像一個打擊者擊中了球，球飛出去'
