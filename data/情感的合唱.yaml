  pgno: 127
- img_proc: true
  md: '大眾接受，水木、水土的自我表達都跟教育文化背景有關，他們容易寫出大家都在討論的議題。如果一個人想要受大眾歡迎，只需要憑藉木星跟土星的能量就夠。


