- md: '# 月冥一百二——將情感落實的行動力


    一個人如果有月冥一百二的和諧相，代表當事人的感情很深沈，對於情感的承受力很強，很願意為情感受苦。他們在感情上也比較願意為別人付出，而且會用很實際的方式來付出感情。


    相較之下，月海一百二的人很有同情心，但是很可能也僅限於同情，並不會因此實際去做些什麼事，月海一百二的人最多只是在文章小說裡抒發情感，他們沒有能力把情感變成行動。如果你有個月海一百二的情人，他常常會對你說好聽話，可是他不見得能夠付出行動照顧你，當你生病的時候他的心會很痛，可是他不像月冥一百二的人那麼有行動力。冥王星是一個具有實際行動力的行星，月冥一百二的人付出的情感絕對跟行動有關，他們不會只有情緒而沒有行動。


    月冥一百二也意謂著當事人在金錢方面比較有能力、有意志力去賺錢。月天一百二或月海一百二的人本質上都不像月冥相位這麼重視金錢，他們的財富也不是仰賴努力經營才能獲得。但冥王星不同，冥王星跟大權、大錢有關，冥王星代表的是物質世界的執著，所以月冥一百二的財富需要經營。月冥一百二的人很會說服別人，他們很適合做保險或進入大財團工作。


    月冥一百二的人在情感上還是會有占有欲，不過由於一百二十度是和諧相位，因此當事人的占有欲不會那麼扭曲，不會過度算計。他們能夠運用情感的力量去從事公益用途，也能夠用來保護自己所愛的人。月冥一百二的人可以藉由冥王星的執著，將情感變成很強的行動力，他們願意為自己所愛的人事物做一些重要的犧牲，他們也有能力付出行動完成一些困難的工作。


    影星伊麗莎白泰勒（Elizabeth Taylor）就有月冥一百二相位。她的本命星圖中太陽、水星、火星合相在雙魚，同時跟海王星一百八，等於是日海一百八、水海一百八、火海一百八，造成了她生命中各式各樣的問題，包括她梅開八度的婚姻，其中還兩次下嫁有嚴重酒癮的李察波頓，她自己也有酗酒問題。其實日海一百八、水海一百八、火海一百八可以讓她惹出更大的麻煩，甚至因此一蹶不振。但是她生命中有個核心，就是月冥一百二，這個核心是很強的能量，可以讓她減肥，可以讓她戒酒，可以讓她致力於慈善工作，甚至成立基金會持續推動愛滋病防治。月冥一百二的強大能量，讓她勇於面對人生中的困境，並且將愛心轉化成幫助弱勢族群的實際行動。


    # Chapter/10


    # 水星與金星：聲音與美感的互動


    水星跟金星這兩顆行星位於地球跟太陽之間，它們是最靠近太陽的兩顆行星。在黃道座標上，水星跟太陽的距離最遠不會超過二十八點三度，金星跟太陽的距離最遠不會超過四十八度，也就是說，水星跟金星只可能出現合相，不可能出現九十度、一百八十度跟一百二十度相位。


    水星跟思考有關，跟溝通有關，跟語言有關，它是各式各樣形式的聲音的表達。有的聲音是音樂，有的聲音是詩，有的聲音是文字，有的聲音是小說，有的聲音是語言，它可以是外在的聲音表達，也可以是內在的心智思考。如果一個人的水星跟金星合相，代表當事人在水星的溝通、表達上會與金星的美感結合，當事人就會具有討人喜歡的表達能力。


    # 水金合相——具有美感的表達能力


    之前在《成功做自己》書中太陽相位的章節中談到，如果一個人的太陽水星合相，而且落在跟音樂有關的星座時，當事人有可能會是很會唱歌的人。這是因為當水星落在適合表達聲音的星座，例如金牛、人馬，當事人的音質就會比較優美，如果水星又跟太陽合相，水星的能量就容易附著在太陽的個性中，隨著太陽一起展現出來。例如芭芭拉史翠珊（Barbra
    Streisand）就是日水合相在金牛，法蘭克辛納屈（Frank Sinatra），就是日水合相在人馬。但是會唱歌跟懂音樂是兩回事，日水合相的會唱歌，在某種程度來說，他們是表達能力好，加上音色好，通常這種人唱歌的時候，大家就容易覺得他們唱得好。


    但如果是水星跟金星合相，等於是水星的聲音跟金星的美感產生了連結，當事人就會是大家常說的有音感的人。水星主宰我們的神經網路系統，當一個人的水星跟金星合相，當事人天生就對音樂有好記性，他們的神經系統很可能生來就對音樂很敏銳，因此具有成為音樂家的潛力。


    水星不只是內在的記性與思考，它也是對外的聲音、語言溝通。水金合相的人都會有一副好聽的嗓子，他們的聲音中具有有一種美感，聽他們講話就像是聽音樂一樣，會讓人感覺到愉悅。此外，水金合相也意謂著當事人特別注重溝通的美感，除非當事人的水星同時又跟火星或冥王星形成剋相，否則他們一定特別不喜歡跟別人吵架，他們喜歡用比較柔和、比較討人喜歡的方式跟人溝通。


    不過水金合相的人雖然有音感，但這只是具有音樂天分的一個基本條件，如果只是想要學彈鋼琴、拉小提琴，水金合相的人一定會比沒有水金合相的人學得好，但是水金合相的能量有限，除非還有很強的天王星、海王星、冥王星的配合，否則當事人可能就只能停留在琴彈得很好的才藝層次，而不具備更高的藝術家才華。


    # Chapter/11


    # 水星與火星：心智與行動力的互動


    在太陽系行星中，金星與火星分別位於地球的兩側，它們就像是地球的兩扇門，位於地球內側的金星就像是一扇拉門，它代表了討人喜歡的吸引力，它是一種內收的陰性能量；位於地球外側的火星就像是一扇推門，它具有向外展現自我的特質，它是一種外放的陽性能量。當一個人的水星跟金星形成相位，代表當事人會想要用和諧的方式與人溝通。而如果一個人的水星跟火星形成相位，當事人在跟別人溝通時，重視的就會是我意見的表達，而不是和諧了。


    # 水火合相 — 勇於表達自我溝通能力


    水星跟火星合相的人，有著反應很迅速的腦筋，如果水星沒有同時跟其他行星形成剋相的話，即使當事人的水星落在不愛表達的巨蟹、天蠍、雙魚等水象星座，只要水星跟火星合相，他們都會是敢表達自我的人。水星巨蟹、水星雙魚雖然不愛表達，不代表他們不思考，他們其實想得很多，只是不喜歡或不習慣把他們的想法講出來，假如他們的水星跟火星合相，他們就會比較勇於表達自己的想法。如果當事人的水火合相落在本來就在很愛表達的星座，例如水火合相在牡羊、獅子、人馬等火象星座，他們就會比一般的水星牡羊、水星獅子、水星人馬更喜歡表達，思想也更強烈。


    水火合相的人，腦子是不太容易放鬆的，他們的腦子很少休息，也喜歡與人爭辯。不過水火合相的人如果水星沒有其他剋相的話，他們就只是單純的喜歡爭論，他們爭論完了事後不會不快，或產生情緒反應，原因在於水星跟火星合相的力量，其實是比較理性的。我們在生活中也常會發現，很多喜歡跟別人爭辯的人，往往不見得容易對人生悶氣，或者對人懷有成見，因為他已經把心裡所有的意見表達出來了。相反的如果一個人永遠對你很客氣，從來不跟你爭辯，你也不要以為他心裡對你沒有嘀咕。


    水星是個中性的能量，光是水星的爭吵，如果沒有牽涉到月亮的情緒衝突，其實並不會影響到雙方的感情。在人際關係的雙人合盤中，如果兩個人只是水星不合，頂多常常意見不合吵來吵去，未必會傷感情，但是兩個人如果月亮不合，雙方的關係根本很難維持下去。水星的特質比較客觀也比較不在乎，可是月亮是非常主觀的，我們在與人相處時，主觀影響其實比較大。兩個意見不合的人還可以做朋友，可是兩個情緒不合的人不行。我們都會有想法與自己南轅北轍的朋友，可是絕對沒辦法維持一個讓雙方情緒愉快的關係。這也就是夫婦關係中，月亮非常重要的原因。一對夫婦水星不合沒關係，但夫妻如果月亮不合，就會遇到很大的困難。


    # 水火九十——過於主觀的心智溝通


    水火九十的人跟水火合相的人一樣，都有喜歡爭論的傾向，但是受到九十負面相位的影響，他們跟人爭論的時候會比較主觀，也比較容易動氣。


    九十度剋相是一種內耗，水火九十的人在跟別人爭論的同時，其實也在跟自己爭論，由於他們的水星經常受到火星的過度刺激，所以很容易會有頭痛的問題。如果遇到水火九十的人，不妨問問看，他們很可能會經常頭痛痛到得吃止痛藥的問題。水火合相的人雖然也容易失眠，腦筋不容易放鬆，但情況沒有水火九十來得嚴重。


    水火九十會隨水星落在不同的星座而有差別。如果水星落在牡羊、人馬這類喜歡表達意見的星座，他們會將所有不高興的事情講出來，一頓架把一切不快都吵光，但如果是水星巨蟹、雙魚的水火九十，他們雖然也會當面跟你吵，可是他們往往心中還是有所保留，所以你不會覺得吵得很痛快。


    水火九十的人不像水火合相那麼客觀，不管是對政治、宗教，或其他很多事情，他們往往會是主張很強烈、鬥爭性很強的意見狂熱份子，對於他們的信仰，水火九十的人完全不能忍受別人跟他們有一丁點的不同。像我認識一個水火九十的新黨支持者，別說是綠營，他就算是跟同屬藍營的國民黨朋友也會吵架，只要跟他意見稍有不同，他就會爭辯不休。


    # 水火一百八——與外界對立的心智刺激


    水火一百八的對立往往帶來外界環境很強的心智刺激，因而水火一百八的人常常會是心智表現很卓越的人。由於一百八十的對立很容易向外投射，水火九十的人只不過是愛跟別人爭論，但水火一百八的人很容易吸引到跟他們意見不合或反對他們的人，導致他們跟別人在心智上的嚴重衝突。


    很多水火一百八的人都很聰明，但是這並不是一個很安全的相位，因為水星跟火星的一百八十度對立，有可能會使當事人的整個神經系統突然崩潰。如果身邊有水火一百八的人，大家不妨觀察一下，你會發現，前一秒鐘他可能都還是個天才，可是下一秒鐘他在你面前就完全癱瘓了，整個腦筋一團混亂。例如《蒙馬特遺書》的作者邱妙津就有水火一百八相位，由於她的本命星圖還有月土一百八的問題，當她遇到行運土星跟本命月土形成剋相時，又不能從水星這邊得到心智上的協助，於是她在旅居巴黎時自殺身亡。


    # 水火一百二——語言與行動的和諧互助


    前面提到，水金合相的人容易因為具有音感而成為音樂家，但未必能夠成為演奏家。原因在於演奏跟火星的行動力有關，如果一個人想要成為演奏家的話，最好能夠擁有水火一百二的和諧相。


    當一個人的水星跟火星一百二，他們除了會有敏銳迅速的心智反應之外，他們在表達的意見也會特別具有能量，因而很適合從事演說、教育、法律、評論或政治等相關工作。因為他們具有說服別人的高超能力，所以很容易成為超級業務員或律師。水火一百二的語言通常是具有行動力的，簡單的說，當水星跟火星形成一百二十度和諧相，語言就不只是一種心智上的溝通，對他們來說，語言更是一種強而有力的工具。例如一個業務員在推銷時，他的語言就是一種推銷的手腕；一個律師出庭時，重點是在「打官司」，語言就是一種出庭時的必要工具。'
  mdcn: '# 月冥一百二——將情感落實的行動力


    一個人如果有月冥一百二的和諧相，代表當事人的感情很深沈，對於情感的承受力很強，很願意為情感受苦。他們在感情上也比較願意為別人付出，而且會用很實際的方式來付出感情。


    相較之下，月海一百二的人很有同情心，但是很可能也僅限於同情，並不會因此實際去做些什麼事，月海一百二的人最多只是在文章小說裡抒發情感，他們沒有能力把情感變成行動。如果你有個月海一百二的情人，他常常會對你說好聽話，可是他不見得能夠付出行動照顧你，當你生病的時候他的心會很痛，可是他不像月冥一百二的人那麼有行動力。冥王星是一個具有實際行動力的行星，月冥一百二的人付出的情感絕對跟行動有關，他們不會只有情緒而沒有行動。


    月冥一百二也意謂著當事人在金錢方面比較有能力、有意志力去賺錢。月天一百二或月海一百二的人本質上都不像月冥相位這麼重視金錢，他們的財富也不是仰賴努力經營才能獲得。但冥王星不同，冥王星跟大權、大錢有關，冥王星代表的是物質世界的執著，所以月冥一百二的財富需要經營。月冥一百二的人很會說服別人，他們很適合做保險或進入大財團工作。


    月冥一百二的人在情感上還是會有占有欲，不過由於一百二十度是和諧相位，因此當事人的占有欲不會那麼扭曲，不會過度算計。他們能夠運用情感的力量去從事公益用途，也能夠用來保護自己所愛的人。月冥一百二的人可以藉由冥王星的執著，將情感變成很強的行動力，他們願意為自己所愛的人事物做一些重要的犧牲，他們也有能力付出行動完成一些困難的工作。


    影星伊麗莎白泰勒（Elizabeth Taylor）就有月冥一百二相位。她的本命星圖中太陽、水星、火星合相在雙魚，同時跟海王星一百八，等於是日海一百八、水海一百八、火海一百八，造成了她生命中各式各樣的問題，包括她梅開八度的婚姻，其中還兩次下嫁有嚴重酒癮的李察波頓，她自己也有酗酒問題。其實日海一百八、水海一百八、火海一百八可以讓她惹出更大的麻煩，甚至因此一蹶不振。但是她生命中有個核心，就是月冥一百二，這個核心是很強的能量，可以讓她減肥，可以讓她戒酒，可以讓她致力於慈善工作，甚至成立基金會持續推動愛滋病防治。月冥一百二的強大能量，讓她勇於面對人生中的困境，並且將愛心轉化成幫助弱勢族群的實際行動。


    # Chapter/10


    # 水星與金星：聲音與美感的互動


    水星跟金星這兩顆行星位於地球跟太陽之間，它們是最靠近太陽的兩顆行星。在黃道座標上，水星跟太陽的距離最遠不會超過二十八點三度，金星跟太陽的距離最遠不會超過四十八度，也就是說，水星跟金星只可能出現合相，不可能出現九十度、一百八十度跟一百二十度相位。


    水星跟思考有關，跟溝通有關，跟語言有關，它是各式各樣形式的聲音的表達。有的聲音是音樂，有的聲音是詩，有的聲音是文字，有的聲音是小說，有的聲音是語言，它可以是外在的聲音表達，也可以是內在的心智思考。如果一個人的水星跟金星合相，代表當事人在水星的溝通、表達上會與金星的美感結合，當事人就會具有討人喜歡的表達能力。


    # 水金合相——具有美感的表達能力


    之前在《成功做自己》書中太陽相位的章節中談到，如果一個人的太陽水星合相，而且落在跟音樂有關的星座時，當事人有可能會是很會唱歌的人。這是因為當水星落在適合表達聲音的星座，例如金牛、人馬，當事人的音質就會比較優美，如果水星又跟太陽合相，水星的能量就容易附著在太陽的個性中，隨著太陽一起展現出來。例如芭芭拉史翠珊（Barbra
    Streisand）就是日水合相在金牛，法蘭克辛納屈（Frank Sinatra），就是日水合相在人馬。但是會唱歌跟懂音樂是兩回事，日水合相的會唱歌，在某種程度來說，他們是表達能力好，加上音色好，通常這種人唱歌的時候，大家就容易覺得他們唱得好。


    但如果是水星跟金星合相，等於是水星的聲音跟金星的美感產生了連結，當事人就會是大家常說的有音感的人。水星主宰我們的神經網路系統，當一個人的水星跟金星合相，當事人天生就對音樂有好記性，他們的神經系統很可能生來就對音樂很敏銳，因此具有成為音樂家的潛力。


    水星不只是內在的記性與思考，它也是對外的聲音、語言溝通。水金合相的人都會有一副好聽的嗓子，他們的聲音中具有有一種美感，聽他們講話就像是聽音樂一樣，會讓人感覺到愉悅。此外，水金合相也意謂著當事人特別注重溝通的美感，除非當事人的水星同時又跟火星或冥王星形成剋相，否則他們一定特別不喜歡跟別人吵架，他們喜歡用比較柔和、比較討人喜歡的方式跟人溝通。


    不過水金合相的人雖然有音感，但這只是具有音樂天分的一個基本條件，如果只是想要學彈鋼琴、拉小提琴，水金合相的人一定會比沒有水金合相的人學得好，但是水金合相的能量有限，除非還有很強的天王星、海王星、冥王星的配合，否則當事人可能就只能停留在琴彈得很好的才藝層次，而不具備更高的藝術家才華。


    # Chapter/11


    # 水星與火星：心智與行動力的互動


    在太陽系行星中，金星與火星分別位於地球的兩側，它們就像是地球的兩扇門，位於地球內側的金星就像是一扇拉門，它代表了討人喜歡的吸引力，它是一種內收的陰性能量；位於地球外側的火星就像是一扇推門，它具有向外展現自我的特質，它是一種外放的陽性能量。當一個人的水星跟金星形成相位，代表當事人會想要用和諧的方式與人溝通。而如果一個人的水星跟火星形成相位，當事人在跟別人溝通時，重視的就會是我意見的表達，而不是和諧了。


    # 水火合相 — 勇於表達自我溝通能力


    水星跟火星合相的人，有著反應很迅速的腦筋，如果水星沒有同時跟其他行星形成剋相的話，即使當事人的水星落在不愛表達的巨蟹、天蠍、雙魚等水象星座，只要水星跟火星合相，他們都會是敢表達自我的人。水星巨蟹、水星雙魚雖然不愛表達，不代表他們不思考，他們其實想得很多，只是不喜歡或不習慣把他們的想法講出來，假如他們的水星跟火星合相，他們就會比較勇於表達自己的想法。如果當事人的水火合相落在本來就在很愛表達的星座，例如水火合相在牡羊、獅子、人馬等火象星座，他們就會比一般的水星牡羊、水星獅子、水星人馬更喜歡表達，思想也更強烈。


    水火合相的人，腦子是不太容易放鬆的，他們的腦子很少休息，也喜歡與人爭辯。不過水火合相的人如果水星沒有其他剋相的話，他們就只是單純的喜歡爭論，他們爭論完了事後不會不快，或產生情緒反應，原因在於水星跟火星合相的力量，其實是比較理性的。我們在生活中也常會發現，很多喜歡跟別人爭辯的人，往往不見得容易對人生悶氣，或者對人懷有成見，因為他已經把心裡所有的意見表達出來了。相反的如果一個人永遠對你很客氣，從來不跟你爭辯，你也不要以為他心裡對你沒有嘀咕。


    水星是個中性的能量，光是水星的爭吵，如果沒有牽涉到月亮的情緒衝突，其實並不會影響到雙方的感情。在人際關係的雙人合盤中，如果兩個人只是水星不合，頂多常常意見不合吵來吵去，未必會傷感情，但是兩個人如果月亮不合，雙方的關係根本很難維持下去。水星的特質比較客觀也比較不在乎，可是月亮是非常主觀的，我們在與人相處時，主觀影響其實比較大。兩個意見不合的人還可以做朋友，可是兩個情緒不合的人不行。我們都會有想法與自己南轅北轍的朋友，可是絕對沒辦法維持一個讓雙方情緒愉快的關係。這也就是夫婦關係中，月亮非常重要的原因。一對夫婦水星不合沒關係，但夫妻如果月亮不合，就會遇到很大的困難。


    # 水火九十——過於主觀的心智溝通


    水火九十的人跟水火合相的人一樣，都有喜歡爭論的傾向，但是受到九十負面相位的影響，他們跟人爭論的時候會比較主觀，也比較容易動氣。


    九十度剋相是一種內耗，水火九十的人在跟別人爭論的同時，其實也在跟自己爭論，由於他們的水星經常受到火星的過度刺激，所以很容易會有頭痛的問題。如果遇到水火九十的人，不妨問問看，他們很可能會經常頭痛痛到得吃止痛藥的問題。水火合相的人雖然也容易失眠，腦筋不容易放鬆，但情況沒有水火九十來得嚴重。


    水火九十會隨水星落在不同的星座而有差別。如果水星落在牡羊、人馬這類喜歡表達意見的星座，他們會將所有不高興的事情講出來，一頓架把一切不快都吵光，但如果是水星巨蟹、雙魚的水火九十，他們雖然也會當面跟你吵，可是他們往往心中還是有所保留，所以你不會覺得吵得很痛快。


    水火九十的人不像水火合相那麼客觀，不管是對政治、宗教，或其他很多事情，他們往往會是主張很強烈、鬥爭性很強的意見狂熱份子，對於他們的信仰，水火九十的人完全不能忍受別人跟他們有一丁點的不同。像我認識一個水火九十的新黨支持者，別說是綠營，他就算是跟同屬藍營的國民黨朋友也會吵架，只要跟他意見稍有不同，他就會爭辯不休。


    # 水火一百八——與外界對立的心智刺激


    水火一百八的對立往往帶來外界環境很強的心智刺激，因而水火一百八的人常常會是心智表現很卓越的人。由於一百八十的對立很容易向外投射，水火九十的人只不過是愛跟別人爭論，但水火一百八的人很容易吸引到跟他們意見不合或反對他們的人，導致他們跟別人在心智上的嚴重衝突。


    很多水火一百八的人都很聰明，但是這並不是一個很安全的相位，因為水星跟火星的一百八十度對立，有可能會使當事人的整個神經系統突然崩潰。如果身邊有水火一百八的人，大家不妨觀察一下，你會發現，前一秒鐘他可能都還是個天才，可是下一秒鐘他在你面前就完全癱瘓了，整個腦筋一團混亂。例如《蒙馬特遺書》的作者邱妙津就有水火一百八相位，由於她的本命星圖還有月土一百八的問題，當她遇到行運土星跟本命月土形成剋相時，又不能從水星這邊得到心智上的協助，於是她在旅居巴黎時自殺身亡。


    # 水火一百二——語言與行動的和諧互助


    前面提到，水金合相的人容易因為具有音感而成為音樂家，但未必能夠成為演奏家。原因在於演奏跟火星的行動力有關，如果一個人想要成為演奏家的話，最好能夠擁有水火一百二的和諧相。


    當一個人的水星跟火星一百二，他們除了會有敏銳迅速的心智反應之外，他們在表達的意見也會特別具有能量，因而很適合從事演說、教育、法律、評論或政治等相關工作。因為他們具有說服別人的高超能力，所以很容易成為超級業務員或律師。水火一百二的語言通常是具有行動力的，簡單的說，當水星跟火星形成一百二十度和諧相，語言就不只是一種心智上的溝通，對他們來說，語言更是一種強而有力的工具。例如一個業務員在推銷時，他的語言就是一種推銷的手腕；一個律師出庭時，重點是在「打官司」，語言就是一種出庭時的必要工具。'
