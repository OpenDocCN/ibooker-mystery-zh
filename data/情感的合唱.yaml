  md: '# 月天合相

    開放前衛的內在情緒


    如果一個人的本命星圖中月亮跟天王星合相，不管月亮落在什麼星座，當事人都會有一個與眾不同的母親，當事人的媽媽一定思想比較開放、比較古怪，性格也會比較獨立，絕不可能是守舊人士。


    月亮代表一個人的潛意識跟想像力，本命星圖中月天合相常常會使當事人成為具有奇特想像力的人。當我們跟月天合相的人相處時，會覺得這個人有著澎湃的情緒，他們可能在情緒上比較古怪，可是很勇於表達一些大膽的情緒。如果當事人是女性，她們容易有突如其來的情緒，如果是男性，他們則跟特立獨行的女性比較有緣。此外，由於天王星代表變化無常，而且開放不羈，月天合相的男性都有個特色，他們很容易有很多短促的戀情，這些人在情感上都很開放、不按常理。因此月天合相的男人很有可能成為花公子。例如知名作家亨利米勒（Henry
    Miller）、詩人拜倫（Lord Byron）都是月天合相的名人。這兩個人的情緒都比較古怪，他們跟女性的關係都很複雜，他們都很欣賞'
  merge: -1
