  md: '# Chapter/8


    # 月亮與海王星：情緒與靈性的互動


    研究名人星圖時，我們常會發現，天王星、海王星很強的人，他們或許不像木星、土星很強的人那麼受當時社會的歡迎，但是他們的影響力往往流傳後世，不被世人遺忘。


    原因在於木星跟土星是社會星，木星跟土星帶來的好運都跟當下的社會情況有關，木星跟土星帶來的成就，一旦離開了當時的社會條件，就會被時代淘汰。而天王星、海王星喚起的是宇宙意識，因此可以突破時空限制，不會被時代淘汰。


    不過由於海王星具有模糊疆界、脫離現實的特質，月海的負面相位會使當事人在情緒上想要逃避現實的傾向，當事人也容易會有酒癮、毒癮或藥物濫用的問題，例如浪漫主義時期的重要詩人拜倫，就有酒癮跟毒癮問題。由於海王星跟海洋有關，本命星圖中'
  merge: -1
  pgno: 97
- img_proc: true
  md: '如果有月亮海王星剋相，或者水星海王星剋相的人，都一定要小心水厄。原因在於月海或水海剋相的人常常會比較迷糊，也比較浪漫，又喜歡喝酒逃避現實，如果再跑去河邊或海邊玩，就可能會演出李白酒後撈月的危險情節，遇到水厄意外了。


