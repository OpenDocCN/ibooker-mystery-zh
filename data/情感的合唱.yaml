  md: '# 金土一百二——情感與現實兩者兼顧


    金土一百二的人在感情的選擇上會比較謹慎。他們不會未經盤算就陷入戀情或結婚, 他們在談戀愛的時候, 都會先想好這段戀情會為他們帶來什麼現實利益。雖然情況不像金土一百八那麼嚴重,
    但是當事人都會希望能夠將情感與現實兩者兼顧。他們會尋找能夠帶來現實利益的對象, 但不會像金土一百八那樣為了現實而犧牲情感。


