- img_proc: true
  md: '特立獨行的女性，而且他們都勇於表達自己的大膽情緒，藉由小說、詩作展現出澎湃、與眾不同的內在世界，因此成為舉世聞名的文學家。


    月天合相的人非常適合走大眾路線，他們特別有大眾緣，不少吃大眾飯的演員、藝術家與明星都是月天合相，其中也包括靠選票而在政壇立足的政治明星。選票就是一種大眾緣，一個具有大眾緣的人才有可能高票當選，如果是文官系統的公務員，例如經由上級點選出來的部長、次長、局長、課長，他們就未必需要借助月天合相的影響力。


    通常需要有大眾支持的人，本命星圖上一定會有月亮或金星的重要相位，因為月亮跟金星與大眾有關，月亮會喚起大眾的情緒，金星會讓大眾產生好感，其中尤其以月亮跟大眾的關聯性最強。所以一個人的本命星圖中，如果月亮、金星跟木星、天王星、海王星形成了相位，他們才有吃大眾飯的資格。'
