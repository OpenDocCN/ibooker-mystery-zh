    # 月冥合相——佔有欲強烈的內在情緒


    月冥合相的人通常都會有個極具控制力的母親。前面提到,月土合相的人都會有一個很嚴格的媽媽,她們的媽媽很權威,對當事人有很多要求,月土合相的母親會對當事人有很多期望,希望當事人長大以後可以成為社會上的重要人物,她們對小孩很嚴格,但是不會很激情,她們只會控制小孩的心智,控制小孩的身體,但是她們不會像月冥合相的媽媽一樣,連小孩的灵魂都要控制。


    如果當事人是男性,他們小時候會遇到控制欲很強的母親,他們跟母親之間會有一種強烈的激情,他們長大以後不管是為了逃離母親的控制,或者是在別人身上找尋同樣的激情,他們都很容易娶到控制欲很強的太太。但是由於冥王星的控制欲具有獨占性,所以月冥合相的男性婚後自己的母親跟太太容易因為都有很強的控制欲而互相排擠,當事人常常會夾在婆媳之間,受到很大的壓力。相較之下,月土合相的人不見得會遇到這樣的問題,月土合相的男性可能媽媽很嚴格,太太也很嚴格,她們可能婆媳兩人一起聯


    樣的問題,月土合相的男性可能媽媽很嚴格,太太也很嚴格,她們可能婆媳兩人一起聯'
