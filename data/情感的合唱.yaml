    # 火土一百八：活力與權位的無所適從


    一百八十度跟九十度剋相的不同，在於一百八十度具有選邊站的特質，當事人永遠階段性的有時候完全發展這一端，有時候完全發展另一端。如果一個人有火土一百八的對立相位，當事人就會像坐翹翹板一樣，有的時候完全發展火星的自我活力，有的時候又完全專注於追求社會地位。他們可能有的時候對性非常有興趣，有的時候又會對性完全冷感。


    火土九十的人特別喜歡承擔重任，他們常常因為小時候受到權威的壓制，所以長大以後想要成為權威。他們童年的自我被奪取，所以長大之後要將權威奪回來。火土九十的人可能終生汲汲營營，像是蜜蜂、螞蟻一樣追求社會成就，即使毫無樂趣可言。他們認為權威可以讓他們快樂，卻因此忽略了生命中還有其他的可能性。


    但火土一百八不同，火土一百八的問題出在當事人內心的自我價值感不足，他們都會很想藉由火星的生命力或土星的權威來展現自我的價值，但也會在這兩端舉棋不定、無所適從。


    由於一百八的負面影響可能會向外投射，因此火土一百八的人要小心因為外界的事物而受害，他們雖然權力欲不強，但是常常會被捲入權力的漩渦，他們也常常會在出乎意料之外的狀況下遭到權力的打擊。例如被緋聞重挫的親民黨立委黃義交，他就有火土一百八相位。


    # 火土一百二：精於算計帶來社會成就


