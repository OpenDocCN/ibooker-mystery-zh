  md: '# Chapter/1


    # 星圖的基本架構：星座、宮位、相位


    本命星圖是每個人這輩子人生一場的劇本，星圖中的十顆行星，就像是十個演員，各自扮演不同的角色。


    +   - 太陽：意志、人生目標，以及生命中的重要男性。

    - 月亮：情緒、安全感，以及生命中的重要女性。

    - 水星：思想、溝通能力、表達能力。

    - 金星：情感、價值觀、吸引力。

    - 火星：欲望、性衝動、肉體的行動力。

    - 木星：智慧、機會、社會價值帶來的助益。'
  merge: -1
