    天王星代表了不合常理與變動，因此月天九十的人小時候容易遇到一個不太能善盡母職的媽媽，媽媽可能會把他們交給別人照顧，或者把他們丟到安親班。對於男性當事人來說，他們小時候會遇到這樣的母親，長大以後也容易娶到這樣的妻子。


