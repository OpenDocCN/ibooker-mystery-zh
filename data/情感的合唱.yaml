  md: '很能給予資源，如果當事人是男性，他們也容易娶到教育水準比較高，比較大方，對當事人很支持的妻子。


    美國前總統小喬治布希（George W. Bush）就是月木合相。他的家世背景非常好，他的母親跟妻子也對他很支持。小布希的星圖中，不只是月木合相，而且月木還同時跟天王星一百二，等於是月木合相，再加上月天一百二、木天一百二，所以他的財產恐怕不是一般人可以想像。美國總統薪水其實不多，像美國另一個前總統柯林頓到現在都還在還選舉債。可是布希在還沒有當上美國總統以前就很有錢，因為他整個家族是德州的油商。尤其幾年前行運天王星、海王星都在寶瓶，跟他的本命月木合相形成了一百二，又跟本命天王星也形成一百二，那幾年石油一直漲了三年多，整個布希家族的財富更是增值到不得了的程度。油價跟戰爭有很直接的關連，也難怪有不少人認為，布希的主戰態度，讓他的財產翻了好幾倍。'
