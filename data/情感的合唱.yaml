  mdcn: "星圖得以平衡。一個人有火冥的負面相位時，就算有其他天王星、海王星的好相位來幫助平衡，火冥的負面能量也不可能消失，天王星、海王星的好相位可以讓當事人更有智慧的去面對火冥功課，但是這些功課不可能不出現。\n\
    \n火冥的負面相位有可能會跟暴力犯罪有關，但是不能說每個火冥受剋的人都會犯罪，當事人如果能夠藉由天海相位來幫助轉化，雖然火冥受剋的負面能量還是會出現，但不致於完全不可收拾。可是如果當事人完全沒有從天海中得到幫助，又碰到火冥的負面相位，火冥的負面能量可能就會宛如洪水猛獸，閘口一開就一發不可收拾。\n\
    \n## 火冥一百二——性能量的轉化與昇華\n\n本命星圖中的火冥一百二是一個滿好的相位，它跟火土一百二有點類似，當事人都可以能量集中、按部就班的得到成功。兩者的差別在於，火土一百二的人追求的成功一定跟現實社會價值有關，當事人可能會努力開一間公司、擔任某個組織的領導者，或者從政，努力爬上高位。但火冥一百二的人追求的絕不僅止於現世目標，當事人一定會想要將能量昇華。\n\
    \n火冥相位的能量可以展現在簡單的生殖、性交上，也可以表現在宇宙創造的本質上，一般人多半會將冥王星的能量侷限在肉體的性欲與現實的欲望上，很少人能夠將冥王星的性能量昇華，轉化為宇宙創造的生命力。儘管能夠昇華到多高會隨本命星圖的整體配置而異，但是火冥一百二的和諧相位，都為當事人提供了一個讓冥王星能量昇華的難得機會，很值得好好把握。\n\
    \n## 天王星與海王星：革新與靈性的互動\n\n天海冥這三顆星都是力量很大的宇宙行星。\n\n天海冥如果形成相位，相位的影響力大致可以分成兩種：其一會是對當時的社會集體意識形成影響力，第二是在那段時間出生的人，他們的潛意識中會帶有宇宙意識的影響，如果當事人本命星圖中內行星又跟天海冥有相位的話，天海冥的宇宙意識就會成為當事人顯意識的一部分，當事人會特別容易察覺到宇宙意識的能量。\n\
    \n所以研究天海冥相位時，要先研究這個相位的宇宙意識特質，以及它會用什麼方式在當時社會展現影響力，再研究它們會在本命星圖有這樣的相位身上發生什麼影響。\n\n\
    ## 天海合相 — 靈性與文明的新局\n\n天王星與海王星大約一百七十一點四年才會合相一次，天王星帶來的巨大改變與海王星帶來的巨大夢想，代表這個時代一定會有跟發明創造、靈性藝術有關的重要改變，因此天海合相在歷史占星學中扮演著重要角色。天海合相時一定會出現重要的思想家與重要文明，並且對於當時的歷史產生重大影響力。\n\
    \n西元前五七五年，天海合相於金牛，金牛座所代表的不僅是資源，也代表價值，尤其是個人資源與生命價值，天海合相於金牛座時期會讓當時的人傾向於探討什麼是理想的生命價值與人生價值。這也讓那個時期成為思想的黃金年代，全世界當時不管是釋迦牟尼、老子孔子與希臘雅典文明，幾乎都是同時間發生的，對於當時社會而言，這些思想家與文明當時提出的幾乎都是新興信仰，探討的都是與金牛相關的價值追尋。\n\
    \n西元六二四年，天海交會於處女，此時穆罕默德成立了伊斯蘭教，對於當時世界而言，伊斯蘭文明也是新興宗教，是重要的時代意識與潮流，西元一四七九年，天海會合於天蠍座，那時是中世紀的文藝復興運動與中世紀宗教改革，力圖恢復古代希臘羅馬信仰的重要時期。\n\
    \n天海合相時宇宙意識會有很大的變革，這些宇宙意識的改變對於當時文化會造成很大的變遷與影響，上一回的天海合相是西元一八二一到一八二四年，天海合相於摩羯，當時是工業革命的重要時期，工業革命意識也算是一種新興信仰。最近的天海合相是西元一九九二到一九九四，天海合相於寶瓶，代表天王星相關的科技受到影響，現在當我們回顧歷史，當時最重要的思想變遷是資訊革命，我們現在所有與科技有關的新興產品，包括個人電腦與網路當時正是起步時期，天海的寶瓶能量帶來了對於科技這種新興文明的需求。\n\
    \n就個人星圖而言，本命星圖中有天海合相的人很容易受到超自然意識的影響，通常都有豐富的想像力與直觀力，因此不少天海合相的人會帶動一種大規模的意識變遷。例如馬克思與俄國小說家杜斯妥也夫斯基（Fyodor\
    \ Dostoyevsky）都有天海合相。天海合相都會帶來一種新興的社會變遷能量，而且會跟宗教、藝術、理想主義有關。\n\n馬克思的資本論可說是一種新興的信仰，杜斯妥也夫斯基的小說也有相同的作用，他的作品具有強烈的宗教性。馬克思的思想藉由俄國革命展現了天海能量，杜斯妥也夫斯基則間接成為俄國革命的精神出口。\n\
    \n## 天海九十——信仰與理想的革命\n\n天海九十代表某些社會的信仰與理想，需要藉由某些激烈的革命手段來達成變革，或是藉由某種催眠的方式來完成社會新興信仰的推動。天海九十與信仰革命有關，天海九十的信仰一定得透過革命來完成，天海九十的革命背後則一定帶有信仰。\n\
    \n對於天海九十的人而言，革命具有很大的吸引力。天海合相的馬克斯寫了資本論，天海九十的列寧則去進行革命。英國浪漫主義的重要詩人拜倫也有天海九十，他不只是浪漫主義的旗手，他也親身參與了希臘革命，最後死於希臘的軍營中。近代的天海九十出現在一九五四、一九五六年，當時有古巴危機與中東危機，這兩種危機都是理想與社會變動之間的衝突。\n\
    \n如果天海九十落在跟本命星圖中跟健康有關的六宮、十二宮，或者跟外表有關的一宮，代表當事人的體內經常處於革命狀態，當事人就有可能會出現脊椎、神經與血液問題。不少一九五○年代中期出生的人都容易有高血壓、痛風或是脊椎神經的問題，這段時間也是小兒麻痺大流行的時期。\n\
    \n## 天海一百八——理想帶來的衝突\n\n天海一百八代表社會理想與革命之間的衝突，這種衝突會造成社會的分裂意識。但如果從藝術角度看來，藝術其實是不怕天海衝突的。比方像西元一九○八年時，正是第一次世界大戰，顯現出天海一百八的社會能量對立，但當時也正是現代音樂與現代美術運動的萌發時期。\n\
    \n當時流行的藝術、建築雖然對後世影響力很大，但由於天海一百八是一種幻想與創造力的對立，所以當時很多創作其實並不會讓人感到舒適，不過，不舒適的藝術還是藝術，因為它表達的是當時的時代精神，但就政治而言，不舒適的政治卻會為人類社會帶來危機。\n\
    \n## 天海一百二——宇宙直觀的天分\n\n天海一百二十是一個幸運相位。很多本命星圖中天海一百二的人在科學、哲學或靈性上具有開創性的思想，他們都會有一種神祕的直觀力，尤其是對醫療、藝術、音樂具有神祕天分，尤其如果當事人星圖中的天海一百二又同時跟本命星圖有相位的話，當事人就會對世界有很大而且很長遠的影響力。\n\
    \n例如貝多芬（Ludwig van Beethoven）天海一百二，海王星跟月亮九十，可可香奈兒（Coco Chanel）天海一百二，海王星又跟太陽、金星九十，或者鮑布狄倫（Bob\
    \ Dylan），他的月木土天合相，這四顆星又同時跟海王星一百二，等於是月海一百二、木海一百二、土海一百二，再加天海一百二。一般人的成名不過是三年、五年、十年的事，天海一百二的能量喚起了宇宙意識，因此這些人的成功可以超越時間的限制。他們的影響力可以跨越時代，流傳久遠。\n\
    \n## 天王星與冥王星：變動與重生的互動\n\n天王星代表變動，冥王星代表毀滅與新生。天王星跟外行星的負面相位往往帶來社會劇烈變動的革命。但是天海的革命跟天冥的革命不太一樣。天海九十的革命跟信仰理想有關，例如列寧或拜倫，他們都是想藉由革命去完成某種理想，可是天冥帶來的變動一定與權力意識有關，與理想無關。好比一七五九年時的天冥九十帶來了歐洲的七年戰爭，一七九三年的天冥九十是法國革命時期，一八七六年是巴爾幹半島反土耳其革命，一九三三年納粹在德國展開極權統治。\n\
    \n## 天冥合相——權力的毀滅與新生\n\n天冥合相代表著死亡、權力鬥爭、毀滅與重生。由於冥王星在每一個星座停留的時間並不平均，所以天冥合相大概每一百一十一到一百四十三年發生一次。天冥合相往往都會跟重大的革命事件相關，對於人類來說，天冥合相的革命，有時候可能是新意識的開端，但有時候可能代表了大規模的死亡。例如一七八九年的法國大革命、一八五〇年太平天國革命與一九六六年文化大革命，這幾件事情對於人類社會都有很大的影響力。\n\
    \n## 天冥九十——宇宙能量的巨變\n\n天冥九十除了意謂著當時社會上的劇烈變動，本命星圖中如果有天冥九十，當事人也容易在一生中碰到突發的生命變遷，宛如宇宙能量對於他的存在發動了革命或是戰爭。\n\
    \n例如被稱為「現代舞之母」的舞蹈家伊莎朵拉鄧肯（Isadora Duncan），天冥九十的她一生充滿戲劇性，連過世都很傳奇，她有一次在法國跟朋友聚餐後，身上的長圍巾意外脫落絞入車輪，導致頸骨斷裂身亡。\n\
    \n法王路易十六跟他的太太瑪麗安東尼（Marie Antoinette）皇后，這對夫妻也都有天冥九十相位。瑪麗安東尼生活奢華不知民間疾苦，傳言她聽到百姓窮到沒有麵包可吃，曾說「何不食蛋糕」？結果法國大革命之後，夫妻都被送上斷頭台。\n\
    \n## 天冥一百八——權力鬥爭的強烈衝突\n\n天冥負面相位往往會造成造成人類社會的衝突。例如一九〇五年天冥一百八時俄國發生了俄國革命。如果個人星圖中有天冥一百八，如果同時還有其他嚴重剋相，也可能會成為業力的受害者。\n\
    \n例如俄國的末代王儲，沙皇尼古拉二世的獨子阿列克謝羅曼諾夫（Alexei Nikolaevich），就有天冥一百八加上日土一百八的剋相。他在俄國革命後被處決，成為天冥一百八權力鬥爭的受害者。\n\
    \n## 天冥一百二——宇宙激情的直覺\n\n當天王星跟冥王星形成了一百二十度和諧相時，代表當事人會用一種與眾不同的獨特方式，傳達出隱藏的激情。例如鋼琴家李斯特（Franz\
    \ Liszt）、詩人與恐怖小說家愛倫坡（Edgar Allan Poe）、音樂家蕭邦（Frédéric Chopin）都有天冥一百二相位。儘管不是每個本命星圖中天冥一百二的人都像這些人一樣，成為優秀的音樂家或是藝術家，但天冥一百二的強烈能量一定會讓當事人展現出一種獨特的生命力與人格特質。\n\
    \n# Chapter/30\n\n## 海王星與冥王星：靈性與轉化的互動\n\n很多自古流傳的俗語中，其實都隱含占星學的邏輯。例如俗語常說「事不過三」，如果從占星學的角度來看，每個人本命星圖中的行星能量，都必須在行運的行星跟本命星圖的行星形成相位時才會被啟動，除了太陽、月亮以外，每顆行星都有可能會逆行現象，行運行星掃過本命星圖即使遇到逆行，來回頂多就是三次，等到行運行星遠去之後，事情就會結束。\n\
    \n又如孟子說「五百年必有王者興」，這個五百年週期其實就是海冥合相的週期。海王星跟冥王星距離太陽最遠，它們大約每四百九十三年才會交會一次。海王星代表靈性、藝術等集體意識，冥王星則代表宇宙的轉化力量，與權威宗教有關。當這兩顆星交會時，就會發生很有爆發力的文明力量，文明發展在這時會有顯著的靈性或文明提升。\n\
    \n不管是佛經、古埃及經典，或者是美索不達米亞古代傳說中都提到，在我們這個世代之之前，還有更發達的黃金文明，我們現在的文明，已經是第五世代的鐵文明。這個世代的文明，最早可以追溯至西元前三〇四五年的海冥合相，埃及古文明、印度恆河文明與蘇美文明，大約都在前後差不了多少的時期開始起步。\n\
    \n西元前二五五二年左右，埃及建立了舊王朝文明，此時歐洲最早的文明，也從克里特島開始起步。後來克里特島被希臘征服，原屬克里特文明的金羊毛、米諾斯迷宮等神話，也一併被希臘人接收。這個時候中國也開始進入了三皇五帝的傳說時代。\n\
    \n西元前一五六五年，埃及進入新王朝時期，中國進入了強盛的商朝文明。在印度方面，此時雅利安人從北歐伊朗北方高原那一帶侵入了印度河谷，他們將梵文與印歐語系帶入印度。\n\
    \n西元前一〇七一年時，進入了中國的周朝文明時期，當時也是猶太人舊約聖經時代。\n\n西元前五七七年是巴比倫文明全盛時期，當時留下了很多占星學紀錄，巴比倫王國中的迦勒底當時被認為是占星學者之鄉，因為迦勒底人有研究占星學的傳統。西元前五七七年也是塞爾特文明發展的時期，範圍涵蓋今天英國的蘇格蘭、威爾斯與愛爾蘭等地，這些地方的文明歷史比英格蘭文明悠久許多。我們很容易在這些地方看見與古老知識系統相關的連結，包括塞爾特文明中有一個很重要的德魯伊神祕教派，它跟太陽神崇拜有很深的關聯。\n\
    \n接下來羅馬帝國成為歐洲強權，四世紀以後基督教成為羅馬帝國的國教，其他異教信仰因而受到打壓。之後西羅馬帝國滅亡，歐洲黑暗時代開始，西元五百多年東羅馬拜占庭文明與回教文明高度發展，歐洲文明進入衰退期。\n\
    \n西元一三九九年歐洲進入了文藝復興時期，黑暗時代結束。接下來西元一八九二年开始，人類正式進入了現代文明的領域，下一次海冥合相會出現在西元二三八五年，我們這輩子是碰不到了，那個時候會是寶瓶世紀的重要里程碑。\n\
    \n## 海冥合相 | 集體潛意識的操控\n\n本命星圖中的海冥合相會帶來很特殊的強大力量。由於海王星與冥王星都是強大的潛意識力量，這兩顆行星如果合相，代表當事人都會具有操縱集體潛意識的能力。\n\
    \n例如毛澤東就有海冥合相，而同時又跟水星一百八，等於是海冥合相，再加上水海一百八、水冥一百八。毛澤東當然具有很強的催眠與控制能力，在文革期間，曾經有長達十幾年時間，整個中國將《毛語錄》奉為人民的行為準則。\n\
    \n美國石油大亨保羅蓋提（I. Paul Getty）也有海冥的合相。當年美國其實也有很多石油大亨，而保羅蓋提最特別的地方在於，他把從石油業賺來的錢大量投入藝術品的蒐藏，因而成為有名的藝術品收藏家。保羅蓋提海冥的合相同時又跟土星成一百二十度的和諧相位，等於是海冥的合相再加上海一百二、土冥一百二。土冥一百二的和諧相，會使當事人對於物質世界具有很強的控制能力，而土海一百二則可以將藝術的情感與現實結合。海王星跟石油與藝術有關，而冥王星跟礦產、大錢及大企業有關，讓保羅蓋提發財的石油企業帝國，以及讓他名留後世的藝術收藏，都符合海冥合相的特質。\n\
    \n## 海冥九十——激情與夢想的耽溺\n\n本命星圖中有冥海九十衝突相位的人，往往特別容易表現出海王星耽溺與冥王星激情的負面能量，他們往往具有強大的催眠般的魔力。\n\
    \n德國音樂家華格納（Richard Wagner）就有海冥九十相位，他的一生充滿爭議，因為政治因素不斷的逃亡，愛情方面也不斷的經歷動盪與失落，從他的音樂中，不難聽出這個相位帶來的夢想與激情。\n\
    \n## 海冥一百八——信仰的毀滅與新生\n\n海王星與流行病、戲劇、醫藥、傳染、各種細菌有關，冥王則跟治療、毀滅與新生有關。海冥一百八十度對衝時期，會出現一些負面能量，像是一六五一年，就是歐洲瘟疫當道時期。本命星圖中海冥一百八的人往往對於上述領域具有強大的能量，但也可能成為相關領域的受害者。\n\
    \n## 最後的煉金術士\n\n艾薩克牛頓 Isaac Newton\n\n1643/1/4-1727/3/31\n\n萬有引力的發現者，牛頓發表的三大運動定律，可說奠定了近代物理學與工程學的基礎。\n\
    \n前面提到科學家的分類，一類是注重原創的天王星型理論科學家，一類是注重數據的土星型實證科學家，牛頓的本命星圖木星跟土星合相，而且木土合相跟天王星一百二，等於不但天王星跟土星有一百二十度的和諧相，天王星還同時跟木星也形成一百二十度和諧相。木土合相意謂著當事人可以透過土星的能量獲取木星的社會利益，他們樂觀大膽，同時又很懂得算計，由於木星跟土星都是社會星，木土合相的人都不會對社會成就沒興趣，他們有野心，也能夠非常敏銳的掌握社會脈動。木星天王星一百二的人可以衡量社會狀況之後，再用創意配合，土天一百二的人則有能力整合前衛與保守勢力。再加上牛頓的天王星落在跟自我形象有關的一宮，難怪常被視為科學史上最具影響力的科學家。\n\
    \n海冥一百八的人如果還有其他剋相，當事人有可能會因為外在人事物而中毒、感染，導致身體健康的嚴重損害。後人將牛頓的毛髮化驗，發現其中水銀含量比一般人超出五十幾倍，原因可能是從事煉金術而導致的汞中毒。收藏許多牛頓煉金術著作的經濟學大師凱恩斯（John\
    \ Maynard Keynes）曾說：「牛頓不是理性時代的第一人，他是最後的煉金術士。」\n\n一百八十度的相位往往因為對立而帶來很強的力量，但也常常會像翹翹板一般，在兩個極端中選邊站，由一個極端擺向另一個極端。\n\
    \n儘管比起自然科學，事實上牛頓寫了更多宗教學的著作，但牛頓在數學及物理學上的貢獻，也開啟了理性主義與啟蒙運動，從此神祕學被視為迷信而排除於主流之外，但從另一個角度來看，科學卻成為了人們信仰的另一種迷信了。\n\
    \n## 海冥一百二——夢想與現實的互助\n\n海冥一百二的和諧相，代表海王星的理想跟冥王星的現實可以互相協助，讓理想得以落實，並提升到新的階段。出生於一七四九年的德國文學家歌德（Johann\
    \ von Goethe）的本命星圖中的冥海一百二，同時又跟木星一百二，所以他同時具有海冥一百二、木冥一百二，以及海木一百二，他是威瑪古典主義的重要代表。\n\
    \n相較於許多歐洲國家，德國文化的發展其實很晚熟，直到十八世紀才真正強勢發展。歌德出生的年代，正是德國經由普魯士主導而逐漸統一的時期。\n\n## 附錄\n\
