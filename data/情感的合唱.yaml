  md: '跟宗教性的海王星。當事人如果能夠藉由藝術或宗教的出世力量，就比較可以從中得到幫助，不管是藉由藝術讓自己放鬆、跟隨宗教上師，甚至如果可以短期出家，都有可能可以解套。


    此外，海王星也跟藥物有關。憂鬱症的人可以從精神科醫師那邊得到醫學上的幫助，精神科醫師並不見得可以開導你，但他們可以開藥，以藥物讓當事人的血清素提高。


    月土九十在醫療占星來說，因為土星的剋相會影響血液環境，所以這是一個跟血清素不足有關的相位，一個人如果體內的血清素不夠，就容易感到沮喪。


    月土九十會使當事人在情感上得不到滋養，導致一個人缺乏活在這世上的價值感。當事人小時候常常會覺得母親並不真的愛他們，所以當他們長大以後遇到了生命中的大問題，例如感情、婚姻問題，或者經濟出狀況的時候，他們就會產生強烈的孤絕感，覺得世上沒有人愛他們，覺得自己是不值得活的，通常這會是造成憂鬱最主要的因素。'
