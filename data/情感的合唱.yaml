    此外，木星也具有正面、樂觀的特質，水木一百二的人都很容易正面思考，水木一百二的作家常常會寫勵志書，透過文字鼓勵樂觀向上、鼓舞人心，再加上他們的看法容易與當時的社會環境與潮流結合，所以容易成為暢銷書。


