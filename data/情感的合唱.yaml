    社會學家卡爾馬克思（Karl Marx）也是月木一百二。馬克思因為政治理念而流亡海外，移居英國倫敦以後，花了三十幾年都在大英博物館圖書室中研究、寫作，可以說幾乎沒有固定收入，還好太太對他非常支持，而且娘家家境不錯，能夠提供必要的幫助，讓馬克思沒有後顧之憂。此外，馬克思的日月合相在金牛，木星在摩羯，這也意謂著他不但月亮木星一百二，太陽跟木星也是一百二，也就是說，他不但有女性的貴人，也有男性的貴人。馬克思的摯友恩格斯（Friedrich
    Engels）為他提供了大量經濟上的支持，甚至在馬克思過世之後，還幫他繼續整理未出版的手稿，花了十二年的時間，讓資本論第二、三卷得以出版。


    月木一百二的人通常也會得到家庭的遺產，而且當事人的家庭遺產通常會來自母'
  - '[PAGE 65]


    親。我認識一個本命星圖中天王星跟木星合相，又跟月亮一百二的朋友，他得到的遺產就是億級以上。天王星木星合相再跟月亮一百二，當事人拿到的遺產絕對不是三、五百萬而已，如果同時又跟金星有好相位，金額就會更高。'
  - '[PAGE 66]


