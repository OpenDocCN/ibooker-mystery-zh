  md: '# 水天九十——脫離常軌的心智干擾


    在占星學中，天王星是跟土星對立的能量。土星代表的是物質世界的現實與常態，天王星則代表破除土星現實的變態。我們不要將「變態」這兩個字視為負面，其實所有非常態的事物都是變態。水天九十意謂著當事人會在思想方面具有反對常態的特質，有的人會反映在對於政治、經濟現狀的對抗，有的人可能反映在與社會大眾不同的性意識。


    水天九十的不和諧相位會使當事人的水星處於不穩定狀態，由於受到天王星宇宙意識的干擾，當事人在心智上容易有神經質的傾向。他們的思考方式常常會像是不規則的閃電般突兀，容易讓人覺得他們的想法很古怪、不合邏輯。水天合相或水天一百二的


    人雖然想法像是飄在空中的風箏，但是都還有一條風箏線跟地面連結。相較之下，水天九十的人常常會像斷了線的風箏一般，容易陷入無法控制自己思想的狀態。


    水天九十的人很容易改變主意，不容易接受他人想法，在思考上比較自我且容易脫'
  merge: -1
