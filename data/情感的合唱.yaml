    # 月火合相——勇於表達內在情緒


    月亮跟火星合相如果沒有同時跟其他行星形成剋相，通常當事人都會有一個很有勇氣的母親，母親會有一點大女人，屬於女中豪傑。當事人的母親很能夠承擔責任，性格也比較強。如果一個人本命星圖中是單純的月火合相，當事人只是個性比較強，但並不會特別容易發脾氣。但如果月亮火星的合相又同時跟其他行星形成剋相時，就等於是月火受剋，當事人會特別沒有耐心，做事時比較焦躁，很容易發火。


