- img_proc: true
  md: '因此金海一百八的人永遠不斷的尋尋覓覓。

    金海一百八的人並不是花心，因為他們並不是想要出軌找別人吃吃野食，他們在每一段感情中追求的都是一種神聖的愛。我有個朋友就是這樣，他在上海經商的時候認識了一個舞女，他真的相信對方是他追求的靈魂伴侶，於是很認真的打算回台灣跟太太離婚，但後來對方還是離開了他。

