    月火九十是一個對女性健康很不利的相位，它常常會跟子宮、卵巢等問題有關。對於女性來講，子宮跟卵巢的問題，可能都跟情緒的不穩定有關，經常發脾氣或經常情緒很不穩定的人，荷爾蒙是不會穩定的，長期的情緒波動會造成荷爾蒙的波動。所以星圖上如果有月火九十，尤其如果月亮或火星又有其他剋相時，很多人會有子宮腫瘤，如果當事人又有火冥九十或月冥九十時，就很容易出現惡性腫瘤。


    月亮代表一個人生命中的重要女性，對於男性來說，它可以代表母親、姊妹、女兒或妻子，對於女性當事人來說，它代表母親、姊妹、女兒，它也代表當事人自己。我認識幾個星圖上月火九十的男性，他們的母親都死於子宮或卵巢相關疾病，當然時間或早或晚，不見得很年輕就會走。他們的太太跟當事人的母親雖然沒有血緣關係，來自不同的家庭基因，卻也常常會因為星圖的同時性，經常會有類似的問題。對於一個女性來說，月亮負面相位的问题往往會直接表現在她們自己身上，而男性的月亮問題則經常會透過間接的方式顯現。如果一個男人本命星圖中月火九十，月火九十的問題可能會向外投射，反映在媽媽跟太太的健康問題上，月火九十帶來的情緒不穩，也常因為他們不像女性會把月亮表現出來而被隱藏，結果月火九十的男性很多都有很嚴重的消化系統問題，例如有的人有嚴重的胃潰瘍，可能嚴重到得把胃割掉。


