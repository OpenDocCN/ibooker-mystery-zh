  md: '來就結了婚。兩個人在婚禮上手牽著手，即使以新婚夫妻的標準來看，他們的親密程度也很少見。這還不稀奇，兩人婚後每次出現在眾人面前，永遠都是手牽手，像一對小鳥一樣，完全不在意別人的眼光，大家都覺得這兩人關係簡直是親密到不正常。

    但人生真的很古怪，三年多之後，那個男的突然精神出了問題。原來他的本命星圖中雖然月亮相位不錯，但是太陽水星同時跟天王星有嚴重剋相，又落在十二宮，所以他有精神病的家族性遺傳。一開始只是輕微的被害妄想症，但後來情況越來越嚴重，岳父岳母偶爾會抱怨，希望女兒不要跟他在一起，可是女兒跟他感情很好，不願意跟他分開，最後有一天他就拿起刀把岳父岳母都砍了，還上了報，他的太太才不得不把先生送去療養院。即使如此，他的太太還是經常去探望他，並且定期寄錢給當事人的爸爸。如果一個男人的本命星圖中有月金一百二的和諧相，他們都會跟太太感情很好，即使像這個特殊案例，當事人的人生因為其他嚴重剋相而變了樣，但是他的太太還是因為顧念夫妻情分，持續的為當事人提供了很大的協助。'
