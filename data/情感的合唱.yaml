    # 水金合相——具有美感的表達能力


    之前在《成功做自己》書中太陽相位的章節中談到，如果一個人的太陽水星合相，而且落在跟音樂有關的星座時，當事人有可能會是很會唱歌的人。這是因為當水星落在適合表達聲音的星座，例如金牛、人馬，當事人的音質就會比較優美，如果水星又跟太陽合相，水星的能量就容易附著在太陽的個性中，隨著太陽一起展現出來。例如芭芭拉史翠珊（Barbra
    Streisand）就是日水合相在金牛，法蘭克辛納屈（Frank Sinatra），就是日水合相在人馬。但是會唱歌跟懂音樂是兩回事，日水合相的會唱歌，在某種程度來說，他們是表達能力好，加上音色好，通常這種人唱歌的時候，大家就容易覺得他們唱得好。


    但如果是水星跟金星合相，等於是水星的聲音跟金星的美感產生了連結，當事人就會是大家常說的有音感的人。水星主宰我們的神經網路系統，當一個人的水星跟金星合相，當事人天生就對音樂有好記性，他們的神經系統很可能生來就對音樂很敏銳，因此'
  - '[PAGE 117]


    具有成為音樂家的潛力。

    水星不只是內在的記性與思考，它也是對外的聲音、語言溝通。水金合相的人都會有一副好聽的嗓子，他們的聲音中具有有一種美感，聽他們講話就像是聽音樂一樣，會讓人感覺到愉悅。此外，水金合相也意謂著當事人特別注重溝通的美感，除非當事人的水星同時又跟火星或冥王星形成剋相，否則他們一定特別不喜歡跟別人吵架，他們喜歡用比較柔和、比較討人喜歡的方式跟人溝通。


