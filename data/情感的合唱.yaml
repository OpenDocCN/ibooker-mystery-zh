- md: '## Chapter 19


    ### 金星與土星：情感與現實的互動


    金星指的是一個人生命中本能的情愛。它很羅曼蒂克，但也很自我、很自私。你喜歡什麼樣的人，對方有沒有讓你心動，這是騙不了人的。


    從金星的相位中，可以看出一個人能不能完成生命中本能的情愛。如果金星的相位很好，代表他們能夠得到很多人給他們的愛，因此一個能夠得到很多人喜愛的大明星，他們或許人生中會有各式各樣的問題，但他們一定不會有缺乏愛的問題。


    從哲學的觀點來看，金星要探討的就是價值觀，它包含了自我的價值與金錢的價值，所以它既代表了一個人愛的價值觀，同時也代表了一個人的金錢觀。


    金木跟金土的不同，舉個例子來說，假設一個金木的人跟一個金土的人，他們有相同的銀行存款，金土的人一定天天覺得自己很窮，而金木的人則會覺得自己還有很多錢。即使兩個人擁有的存款完全相同，金土的人永遠覺得錢不夠多。他們在感情上沒有安全感，在金錢上也同樣沒有安全感。


    ### 金土合相——情感與金錢的謹慎態度


    金土合相的人往往從小就會在感情上受到限制，他們在感情方面一直很有壓力、很保守，在金錢方面也很小氣。


    金土合相的人往往會比較晚婚，而金木合相或金土一百二的人則經常早婚。我認識很多人早婚的機率非常高。木星的擴張特質會帶來大膽與衝動，因此金木相位的人想結婚就會去結婚，他們不會考慮再三而不行動。


    金土的狀況相反。金星跟土星有相位的人，如果要結婚，他們都會考慮很久，這種問題對男性來說還無所謂，我認識一個金土合相的男生，他到四十四歲才結婚，而且娶的是一個非常漂亮、非常年輕的女生。但金土合相的女生就比較累，因為晚婚對女生比較不利，如果超過適婚年齡太多，就很容易錯過了婚姻的緣分。


    金土合相的人在年輕的時候，通常都會喜歡年紀比他們大的人，他們比較喜歡成熟、穩健的對象。他們如果在大一大二談戀愛的話，對象往往會是大三、大四，或是社會人士。金土合相的人不喜歡把時間浪費在情感遊戲上，他們在談戀愛的時候都會希望能夠有具體的結果。如果金土合相的人結婚得早，代表他們將土星的能量反映在年紀較大的婚姻對象上，他們一定會嫁或娶年紀比他們大的人，否則他們不太可能早婚。


    金土合相意謂著當事人在金錢上很小心，在表達情感上也很小心。你不會從金土合相的人口中聽到「好久不見，很想你」這類熱情的話。他們不會是沒事拍拍你的肩膀要請你吃飯的人，也不會經常找你去哪裡玩。


    金星跟藝術有關，在各式各樣金星藝術領域中，建築恐怕是最講求精確的藝術之一，因此金土合相的人特別適合從事工藝美學的相關工作，像我有兩個當建築師的朋友，就有金土合相的相位。金土合相或金土一百二的人，都會是那種可以很細心、很精確的去完成工作的人。相對來說，金木合相就比較不具備這種能力，金木合相的人或許很有想像力，他們很適合從事表演工作，但在我認識的金木合相的朋友中，沒有人從事建築或類似的工作，因為他們不像金土合相的人這麼細心、專注。


    ### 金土九十——情感關係的冷淡與傷害


    金土九十的人在情感上不幸運的程度，比金火九十更為嚴重。他們或許在其他方面什麼都不缺，但就是得不到愛。金土九十是一個比較不幸運的相位。從小當事人情感撲滿裡面的存款就很少，他們小時候一定會有長期的情感缺乏問題，他們從小就會感覺到父母對自己付出的情感很少，常常感覺到自己的情感需求遭到拒絕，因此長大以後容易在情感關係上感到恐懼，擔心自己在戀愛中會同樣遇到小時候遭到拒絕的狀況。他們有可能會變成主動拒絕愛的人，或是被動的成為被愛拒絕的人。我看過一些金土九十的人，他們可能戀愛才談了沒多久，就會告訴對方彼此不合適，還是不要在一起比較好。其實這種打退堂鼓的行為是一種自我保護，因為他們擔心再繼續下去，對方就會不要他們了。


    土星是一顆宿命星，金土九十有一些人會碰到一些剛好嵌住他們金土九十相位的人，因而感受到情感的冷淡、傷害或無法完成。即使他們長期處於婚姻狀態，結婚了三十年都沒有離婚，他們都會知道，自己的婚姻中缺乏了情感的慰藉。或許他們可以從婚姻中擁有小孩、親人與安全感，但就是沒有辦法獲得情感。這是因為小孩跟婚姻關係中的安全感，主要看的是月亮，而金星則反映的是愛情或感情的相關面向。金土九十的人如果月亮相位不錯，他們跟婚姻的另一半之間也可能會擁有親人般的親情，但是他們在愛情方面一定會有所缺憾。


    金土九十還有一個例子是希特勒，金土九十代表當事人很難得到情感的撫慰，從希特勒的身上來看，他到臨死才跟伊娃布朗（Eva Braun）簡單成婚，這也顯示出其實這兩個人的感情是有問題的。


    由於金土九十的人會有人緣不足的問題，因此不太適合從事演藝圈這類非常倚賴大眾緣的工作。他們比較適合從事法律、銀行、保險、財務之類跟管理有關的專業性質工作。


    ### 金土一百八——以世俗利益補償情感空虛


    金土一百八的人一生中重要的情感關係對象，往往跟他們有很深的前世的關係，因此很難掙脫。這個情感關係並不能帶來快樂，但是他們會被困住。他們在情感上無法自由揮灑，但又無可奈何，因此他們會本能的接受情感上的重責。


    金土一百八有時候會使當事人過度看重世俗成就，他們常常是事業心很重的人，他們容易會用世俗成就來取代情感上的空虛。例如賈桂琳甘迺迪歐納西斯（Jacqueline
    Kennedy Onassis）就有金土一百八相位。金土一百八的人有時候會給人一種他們結的是政治婚姻的感覺，因為他們在情感或婚姻關係中會有強的土星世俗利益，但是卻不能為他們帶來情感的慰藉。


    ### 金土一百二——情感與現實兩者兼顧


    金土一百二的人在感情的選擇上會比較謹慎。他們不會未經盤算就陷入戀情或結婚，他們在談戀愛的時候，都會先想好這段戀情會為他們帶來什麼現實利益。雖然情況不像金土一百八那麼嚴重，但是當事人都會希望能夠將情感與現實兩者兼顧。他們會尋找能夠帶來現實利益的對象，但不會像金土一百八那樣為了現實而犧牲情感。


    金土一百二也是一個很適合從事理財、建築、工藝美學，這類很實際的跟金錢、藝術有關的工作。不管是在感情或金錢上，金土一百二的人都不會太冒險。由於他們比較小心謹慎，如果從事投資理財工作，他們會考量現實因素與投資報酬的安全回報，因此他們給的理財建議，會比金木一百二的人經得起時間的考驗。


    ## Chapter 20


    ### 金星與天王星：情感與創意的互動


    本命星圖金星有相位的人往往會受人歡迎、受人喜愛。所以金星跟一般常說的「桃花」意義很接近。不管是大眾娛樂業的演藝人員、政治舞台上的政壇明星，想要從事這些需要獲得大眾支持的工作，如果缺乏金星的好相位，他們就很難廣受歡迎，根本當不了真正的大牌明星。


    金星的成功一定跟受大家歡迎有關，它是一種跟美麗有關的能量，因此金星也跟藝術有關。一個人如果金星相位不錯，多半也代表當事人會具備某一種程度的藝術天分。不管是表演、繪畫，這些都包含在金星的藝術天分範圍內。這裡談到金星的藝術天分，跟前面談到的水星是不同的。如果以大家習慣的中國命理用語來形容的話，水星比較偏向大家常說的「文昌」格局，它跟科舉、功名這類跟腦筋好不好、聰不聰明的能力有關。相較之下，金星就比較偏向「文曲」，它跟繪畫、表演、娛樂這類的藝術有關。


    金星也跟利益有關，但它跟木星的利益不同。木星為我們帶來的好處，是一種社會集體資源產生的利益。金星的好處，都跟個人資源有關，跟社會資源無關。金星的利益是基於這個人本身的才藝得到的好處——長得漂亮也算在內。一個人因為長得好看而得到的才藝而賺來的金錢，或者是因為別人喜歡這個人而給的，或者是因為他們很受歡迎而得到的。這些都跟做股票、得獎、中樂透無關，因為做股票、得獎或中樂透，這些都是社會資源，屬於木星而非金星領域。


    要在演藝圈站上頂尖的地位，必須要有金星跟天王星、海王星好相位，否則光靠金星木星相位並不足以讓人成為一代巨星。


    能夠當上頂尖地位的巨星，本命星圖中往往會有很強的金星跟天王星、海王星的相位，例如伊麗莎白泰勒就有金天合相，而且她的金星在牡羊十七度，天王星也在牡羊十七度，是一個誤差值為零，力量非常大的零度合相。同時她的金星又跟冥王星九十度，如果她只有金天合相，恐怕演不來埃及艷后。埃及艷后這樣的角色，必須得透過冥王星對權力掌控的能力，才能夠獲得充分詮釋。


    伊麗莎白泰勒是金天合相，林青霞是金天一百二，從這裡可以看出。如果想當經紀人的話，其實可以參考旗下藝人的星圖，如果缺乏天王星、海王星相位的話，代表這個藝人的格局不足以成為一代巨星，未必非簽不可。金星跟天王星的好相位，都會使當事人受到很大的歡迎，而且天王星是一種突如其來、爆發力很強的能量，從剛才舉的這兩個例子可以看到，她們都是一下子就成功，從一出道就紅，並不是慢慢苦心經營了很多年，才終於被別人注意到的巨星。


    如果一個人太陽跟金星合相，大家會覺得他們滿可愛、滿討人喜歡，但未必會覺得他們性感。日金合相如果同時有相關的好相位，也可能成為明星，但是他們跟金天一百二會是不同類型的明星。舉例來說，蔡康永就是太陽金星合相，他雖然很受觀眾喜歡，但是大家恐怕不會覺得他很性感。又如主持界長青樹張小燕的太陽、水星、冥王星合相，又跟木星同時一百二，但是她的金星跟火星九十，所以雖然她很有觀眾緣，但是也不會讓人覺得她很性感。


    所有金星跟天王星有相位的人，他們都會是開放式情感的信徒。本命星圖中如果金星跟天王星有相位，無論相位好壞，當事人在觀念上都會認為，婚姻及情感關係不應該受到倫理或傳統價值的規範。差別只在於金天一百二的人比較可以透過和諧的方式來處理這件事情，而金天一百八的處理方式衝突性比較強，踰矩得比較嚴重，但他們在面對情感及婚姻上的態度一樣開放。


    天王星是前衛開放的能量，土星是保守固定的能量，金土一百二的人在婚後通常不會外遇，因為他們在情感上的觀念很保守。但金天一百二的人雖然不容易因為外遇而心動、不容易離婚，但他們並不會認為一個人結了婚以後，金星的情感就必須受到限制。賴聲川有個舞台劇，劇名《開放配偶(非常開放!)》剛好說明了金天一百二的情感態度。李安的《斷背山》其實也反映出金天一百二不保守的愛情觀——這些都是金土一百二的導演是不會碰的題材。


    ### 金天合相：前衛突出的強大桃花


    金星跟天海冥如果合相，力量都會比金星跟太陽、月亮等內行星或金木、金土更強。但因為海王星是一種消融擴散的力量，所以金星跟天王星合相時，力量會比海王星更大。金天合相可說是金火合相的加倍，他們會比金火合相的人更容易被人注意、更有桃花，因此很適合從事演藝工作。


    金天合相代表當事人在情感上不受拘束，喜歡不合倫理、具有顛覆性的關係。他們在情感上不喜歡太規律、太重複、太老舊的關係，他們在情感上不會太保守，他們會是可以接受分偶婚姻或者或不固定伴侶的人。受到天王星的影響，金天合相的人喜歡時尚與新奇的事物，如果從事藝術工作，他們也喜歡從事比較前衛、新潮的藝術，他們也會打扮得比較新潮。


    影星張國榮就有金星天王星的合相，而且他的金天合相落在獅子，所以更利於從事演藝工作。一般來說，獅子座是一種很有大眾緣、很通俗的能量，但獅子座的能量本身並不前衛，張國榮不管在表演或情感上展現出來的前衛，其實是金星天王星合相帶來的力量。


    ### 金天九十——金錢與情感的快速起落


    金天九十的人跟金天合相一樣不喜歡傳統、固定的感情關係。金天九十的特質在於，當事人的情感關係往往會突然展開、突然結束，特別容易波動。如果搭配流年行運來看，金天九十往往意謂著情感關係的意外結束。一個人本命星圖中如果有金天九十相位，他們一生中一定會有好幾段重要的情感關係起落，他們不會是那種只談一次戀愛就順利步入婚姻，之後一路到老的人。他們一輩子一定會遇到好幾次巨大的情感變遷。


    跟金木九十一樣，金天九十的人也會有「雜愛」問題，他們總是沒辦法固定只喜歡一個對象，而且情況比金木九十更嚴重——雖然本命星圖中如果火星本身不活躍的話，金天九十的人未必會真的付諸行動，但是他們在情感上其實都會有不專一、不長久的狀況。如果金星落在雙子、人馬這類容易變動的星座時，情形就會更嚴重。


    金天九十在金錢上也跟金木九十一樣，有過度大膽、浪費的問題，他們在金錢上的進出更大、更不小心。他們一定要小心在遇到行運剋相時出現巨大的金錢損失。


    ### 金天一百八——不合常理的情感生活


    金天一百八的問題會比金天九十要來得大，由於天王星具有不合常規的特質，一百八十度會造成能量的過度發展，所以金天一百八有可能會發展出一種變態的情感關係。他們在發展情感關係時，可能會沒有辦法像一般人那樣展現金星應有的溫柔、體貼，他們可能會因為一百八十度過強的能量，而過度發展天王星的一意孤行、不受拘束，甚至因為過度追求刺激而顯得變態的情感。


    一百八十度的強烈能量，有時候也會反映在當事人情感生活的巨大變動，他們會比金天九十的人在情感上更不穩定。一般人離婚一次其實都在正常範圍內，我認識一個金天一百八的人，他就有離婚四次的紀錄。白曉燕命案的兇手陳進興，他也有金天一百八相位。他在情感上也有非常不穩定的狀況。


    俄國大文豪托爾斯泰（Leo Tolstoy）也有金天一百八相位。金天一百八意謂著感情上不合常規的奇怪狀況，有時候會造成情感上的變態，在托爾斯泰身上則反映在情感上不合常理的博愛。金星是一個人的價值觀，天王星是超越時代的前衛理念，托爾斯泰雖然身為貴族，但他一直對廢除農奴，甚至廢除貴族制度非常狂熱。他跟小他十七歲的妻子索菲亞生了十幾個小孩，但晚年因為強烈主張要放棄土地財產的激進想法，夫妻之間鬧得水深火熱，最後他也因此離家出走，死在一個小火車站中。


    從這個故事中可以看到，托爾斯泰的金星反映的並不只是男女情愛，它顯現出金天一百八博愛的人道價值觀。其實星圖相位的好壞有時候會隨立場而不同。托爾斯泰金天一百八展現出來的博愛理想，從外人的角度當然是一種崇高的理想，他是領先時代的先驅。但是一个先生居然要把所有財產捐出去，這件事情會讓太太氣得要死。


    星圖裡面正面或負面相位，其實都是一種能量的表達方式。


    如果大家找出黃花崗七十二烈士這些人的星圖來看，大概都會覺得他們這輩子拿到的本命星圖真是一張爛圖。他們的目的很崇高，但用的是一種九十度、一百八十度的急切的、衝突的、容易引起暴力的方式，所以很可能會危及到生命。


    火冥九十的剋相，有的人或許演出殺人放火的負面劇情，但也有的人將這個相位演成了上戰場打仗的革命英雄。星圖只能告訴你這個人用什麼能量、用什麼方式來表達相位的劇情，但要怎麼去評價當事人實際做出來的事情，其實會隨著不同的觀點而有所不同。如果經常研究命理的話，到最後會發現，所謂的「好命」的星圖，往往都是最自私的人。自私、保守、小心翼翼，永遠不去冒犯土星價值，都是一百二、六十度的和諧兼顧，永遠不去冒險，永遠守住應該擁有的東西，他們很可能永遠不會把時間精力花在沒什麼利益的藝術創作，也不會想去多做什麼貢獻社會的事情。


    星圖會客觀的告訴你生命的能量會怎麼樣被發揮，可是這些能量的意義，以及要怎麼使用這種能量，這些都會因人而異。


    ### 金天一百二——廣受喜愛的明星特質


    金天一百二的和諧相位，會使當事人特別適合演藝圈與科技業，他們容易得到突然的成功。他們往往會因為藝術、才藝表現或因為他們提出的某些特殊價值，因而獲得大眾喜歡，並且帶來很大的金錢利益。


