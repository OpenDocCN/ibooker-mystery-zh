  md: '# 金海一百八——不切實際的情感追尋


    金海一百八往往會是在感情上無法負責的人。金海九十的人常常會在感情上被別人虧待,他們會覺得自己無法從喜歡的人身上得到他們想要得到的愛;金海一百八的人則往往在人海中,連他們真正想要的人都找不到。他們常常會強烈的感覺到自己想要的愛,在人間是不存在的。


    金海九十的人常常會因為對方不夠愛他們而感到失望,而金海一百八可能對方明明對他們很好,但他們會覺得這些對方給的這些都不是理想的愛。


    金海一百八的人往往會有一種幻象,他們總是認為世界上有理想的愛這回事,結果導致他們的情感關係受到影響。例如我有一個金海一百八的朋友,每隔一陣子我就聽到她說想跟男友分手,因為她老是覺得她跟男友之間的情感不是她心中理想的愛。但事實上她跟男友一點問題都沒有,男友對她很好,也從來沒有出軌,兩人在一起也都有說有笑,可是她在情感上有一種只有她自己才知道的,極端的、不存在於塵世的靈魂之愛,'
  merge: -1
