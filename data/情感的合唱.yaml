    金冥九十的人有時候痛苦的原因在於，他們有很強的激情，但又想要控制原來的生活，以致於不得不把激情壓制得很深。當金冥九十遇到激情或金錢、控制的兩難時，他們往往必須要壓抑其中一個，才能獲得另一個。所以金冥九十的一生都不會過得太容易，如果深深挖掘，一定會發現，他們容易壓抑情感而得到控制，或者為了情感而犧牲了其他事情，他們的金星情感非常容易受到扭曲。金冥一百八的狀況則不同。金冥一百八是可以操縱情感的人。他們有可能會因為情感或金錢而去賣身，或是從事非法行為、做黑道，他們有可能會去做一些不那麼正派的事。


