    月火一百八有時候會反映在家中有人犯罪，或者是家裡遇到火災之類的家庭問題。如果月亮跟火星形成的是誤差值接近零度的精準一百八十度剋相，當事人的母親有可能是意外事件的受害者。尤其如果當事人還有土星天王星或土星冥王星的負面相位時，當事人的母親有可能會因為戰爭或社會上的犯罪事件而受害。如果當事人是女性的話，她們要小心自己可能會遇到類似的狀況。


    ## 月火一百二——充滿能量的內在情緒


    如果一個人本命星圖中月亮跟火星形成一百二十度和諧相，意謂著當事人會有一個很有自信的母亲。當事人的母親有勇氣但不會過分膽大，行動力會比較強，通常也比較獨立，不會那麼需要他人，是個比較強悍的母亲。月火一百二的人，他們的母親很有能量，他們自己也會很有能量。


    大家在學習相位的時候，一定要有一個基本概念：儘管合相的力量很強，但一百二十度的和諧相永遠比合相好。本命星圖如果出現合相，意謂著一個人過度想要擁有某個事物的渴望，合相強大能量的背後，其實是一種補償心理。從占星邏輯來看，如果一個人想過度擁有某些東西，時候到了永遠就必須為此付出代價。


    合相如果又跟其他行星形成九十度剋相，就等於是兩個九十度的雙倍剋相，即使合相在本命星圖中沒有跟其他行星形成剋相，也一定會遇到行運的九十度或一百八十度剋相，當合相每一次遇到行運的剋相，都會是兩個九十或兩個一百八的雙倍剋相。相較之下，一百二十度和諧相，不管是其中一端跟本命星圖中其他行星形成九十度剋相，或者遇到行運帶來的九十度或一百八十度剋相，都會同時跟另一端形成三十度或六十度的次和諧相位，藉由次和諧相位提供的救援，當事人會比較容易度過剋相的難關。


    ## 月亮與木星:情緒與資源的互動


    在本命星圖中,月亮、金星、木星,這三顆星跟財富最有關連。如果將太陽跟月亮兩相比較,太陽的相位會顯現出一個人的性格特質,也看得出當事人在追求人生目標時會比較辛苦,或者是很輕鬆就能成功,但是一個人成不成功跟有不有錢是兩回事。太陽的好相位會讓當事人比較容易獲得事業成就,但是有成就、有地位的人不見得有錢。而月亮代表的是一個人的安全感,其中包含了物質生活的穩定與舒適,所以月亮跟財富有直接的關連。


    本命星圖中月木合相或月木一百二的人,如果月木沒有其他剋相,代表當事人一定可以繼承到家庭的財富。由於月亮代表當事人生命中的重女性,月木好相位的人一定是從母親手中得到遺產,這也意謂著當事人的父親會是雙親中比較早走的人——不過這'
