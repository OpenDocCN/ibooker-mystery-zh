    # Chapter/7


    月亮與天王星：情緒與創新的互動


    天王星前衛創新、變動無常，如果一個人的月亮跟天王星形成相位，當事人的內在都會具有強烈的與眾不同的特質，因此容易受到大眾矚目。


    月亮跟天王星之間如果是合相或一百二十度的和諧相，當事人就會具有豐沛而且奇特的想像力，如果月亮跟天王星形成的是九十度或一百八十度剋相，當事人的情緒就會非常不穩定，而且很難控制忽然爆發的情緒。但不管是好相位或壞相位，只要月亮跟天王星形成了相位，都意謂著當事人會有豐沛的情緒能量，他們的內在都有很強的爆發力。'
