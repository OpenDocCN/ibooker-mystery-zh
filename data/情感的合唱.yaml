  md: '黛安娜的太陽在巨蟹，落入七宮婚姻宮。如果一個女性太陽落在七宮，她們常常會以夫為貴，而且很重視先生的成就，因此婚後常會像是行星繞著太陽轉一樣，她們會將婚姻視為生命的重心，繞著婚姻不停轉動。黛安娜在十九歲的時候嫁入英國王室，宛如飛上枝頭成鳳凰一般，生命有了截然不同的改變。


