    黛安娜的太陽在巨蟹，落入七宮婚姻宮。如果一個女性太陽落在七宮，她們常常會以夫為貴，而且很重視先生的成就，因此婚後常會像是行星繞著太陽轉一樣，她們會將婚姻視為生命的重心，繞著婚姻不停轉動。黛安娜在十九歲的時候嫁入英國王室，宛如飛上枝頭成鳳凰一般，生命有了截然不同的改變。


    結婚之前她是一個沒沒無聞的幼稚園老師，結婚之後成為了全球知名的指標性人物。


    關於婚姻我常告訴大家：同居可以，結婚前要多考慮；結婚可以，生小孩前要多考慮。從占星學的角度來說，婚姻生活中，兩人的月亮合不合得來非常重要，可是月亮本身是一個隱性的能量，除非很懂占星學，否則如果不同住一個屋簷下一起過生活，很難得知雙方的月亮是否能夠協調。


    黛安娜就是一個最明顯的例子。太陽巨蟹的女性都會展現出注重家庭的特質，但是不見得所有的太陽巨蟹女性都能夠勝任婚姻生活。太陽巨蟹的女性必須分為兩類，第一類是她們童年被養育的經驗中，如果她們的母親為她們提供了很好的照顧，她們童年的家庭生活過得很不錯的話，她們就會仿照自己的母'
  - '[PAGE 93]


    親，很有能力經營好婚姻關係。但如果她們小時候家庭並不美滿，當她們結婚以後，遇到婚姻生活中的各種壓力時，她們的情緒就會回到不愉快的童年經驗，以致於完全沒辦法面對婚姻生活中的現實問題。黛安娜的月亮落在寶瓶，而且又跟天王星形成一百八十度剋相，她的母親在她才六七歲時，就因為外遇而離家出走，因此她的童年就在沒有母親陪伴，而且因為父母離異而氣氛低迷的環境中長大。


    月天一百八跟月天九十的不同之處，在於月天九十意謂著當事人的媽媽可能脾氣古怪或情緒不穩，當事人的母親一天到晚在旁邊找他們麻煩，當事人長大以後情緒也會經常不穩定，身邊的人也都會有這樣的問題。月天一百八則代表當事人可能有個不符社會禮教的母親，也意謂常意謂著他們跟母親之間緣薄，母親不會經常在旁邊找麻煩，因此他們平常完全不會顯現出情緒不穩的一面——如果黛安娜是平常就情緒不穩的月天九十的話，一開始她就不可能會有機會嫁進王室當王妃。這些問題都必須要一起生活之後，才會顯現出來，一般人在談戀愛交往的時候，其實很難看到這些跟月亮有關的問題。'
  - '[PAGE 94]


    我在旅居英國時曾經跟友人一起探訪黛安娜長眠之處，黛安娜娘家史賓賽位於英國北安普頓的世傳古宅。這裡曾經是黛安娜祖父母家，小時候黛安娜經常來這裡玩，因此留下了她從五六歲到十幾歲時的照片。看著這些照片最令人感嘆的地方在於，她六歲以前的照片完全跟一般小孩沒兩樣，笑得很燦爛，眼睛很明亮。可是從六、七歲開始，照片完全變了樣，她的媽媽離開了以後，照片裡的神情跟以前完全不同了，她不再笑得無憂無慮。黛安娜王妃最著名的就是她永遠眼簾微微垂下，不時會流露出一種哀傷的神情。這個表情就是從她七歲以後開始出現的。'
  - '[PAGE 95]


    # 月天一百二——創意十足的事業桃花


    一百二十度的和諧相永遠比合相更好，月天相位尤其如此。因為月有陰晴圓缺，月天合相的人很有創意，可是合相力量太強，當事人的月亮經常在受刺激，想像力有時會失控，因此合相的穩定性反而不如月天一百二。因為月天一百二的人月亮的想像力可以被天王所帶動，可是月亮本身受到的刺激卻不會過強。月天一百二的人都很有想像力，天王星會為月亮帶來天馬行空的創意，因此當事人的想像力通常也會比較超現實，不那麼有邏輯，但一定很新奇。


    此外，由於月亮跟一個人的日常生活有關，所以月天合相的人往往會是很有桃花的人，而月天一百二的受歡迎則通常會反映在事業上，他們雖然不像月天合相的人在日常生活中這麼有桃花，但是他們很有事業桃花，例如作家幾米、蔡康永都是月天一百二的人。


    本命星圖中如果月亮跟天王星形成一百二十度的和諧相，代表當事人可以將天王星'
  - '[PAGE 96]


    的創意用來吸引大眾的情緒，基本上他們就是天生的明星。

    前面在月木一百二的章節提到，月木一百二的人通常可以得到豐厚的遺產，由於天王星的力量比木星更強，所以月天一百二代表當事人有機會得到比月木一百二更大的財富，而且是一種透過女性得到的女性財。所以月天一百二的人特別適合從事以女性市場為主的事業。從前面舉的兩個實例來看，幾米的讀者群顯然以女性居多，喜歡蔡康永的觀眾也顯然女多於男。'
  - '[PAGE 97]


    # Chapter/8


    # 月亮與海王星：情緒與靈性的互動


    研究名人星圖時，我們常會發現，天王星、海王星很強的人，他們或許不像木星、土星很強的人那麼受當時社會的歡迎，但是他們的影響力往往流傳後世，不被世人遺忘。


    原因在於木星跟土星是社會星，木星跟土星帶來的好運都跟當下的社會情況有關，木星跟土星帶來的成就，一旦離開了當時的社會條件，就會被時代淘汰。而天王星、海王星喚起的是宇宙意識，因此可以突破時空限制，不會被時代淘汰。


    不過由於海王星具有模糊疆界、脫離現實的特質，月海的負面相位會使當事人在情緒上想要逃避現實的傾向，當事人也容易會有酒癮、毒癮或藥物濫用的問題，例如浪漫主義時期的重要詩人拜倫，就有酒癮跟毒癮問題。由於海王星跟海洋有關，本命星圖中'
  - '[PAGE 98]


    如果有月亮海王星剋相，或者水星海王星剋相的人，都一定要小心水厄。原因在於月海或水海剋相的人常常會比較迷糊，也比較浪漫，又喜歡喝酒逃避現實，如果再跑去河邊或海邊玩，就可能會演出李白酒後撈月的危險情節，遇到水厄意外了。


    # 月海合相——浪漫夢幻的內在情緒


    月海合相的人，他們一定會有一個比較浪漫的母親。她們一定比較溫柔、有點愛做夢、有點弱不禁風，她們不像月天合相的母親那麼獨立有勁、開放大膽，月海合相的母親會是比較敏感、比較愛作白日夢的人，她們通常也會具有宗教、靈性與藝術傾向。對於月海合相的男性來說，他們會有比較浪漫的母親，他們的妻子也會比較浪漫。


    在所有的行星中，最像夢境、最跟做夢有關的就是海王星。如果一個男性的本命星圖中月海合相，他們會跟他們喜歡的女性之間具有一種很強的精神連結，容易感覺到對方是他們的夢中情人。前面提到，月天合相的人桃花雖然很強，但是天王星具有強烈的


    96'
  - '[PAGE 99]


    變動特質，月天合相的人碰到喜歡對象的時候，好像電光石火被雷打到般的強烈，可是那種喜歡是很短暫的，一下子就會過去，因此很多月天合相的人都是花花公子。月海合相不同，月海合相遇到喜歡對象的時候，都會有一種恍如隔世的情感，對方會像是他們的前世情人，因此月海合相往往會對他們心儀的對象產生長期的迷戀。


    例如蘇格蘭小說家羅伯特史蒂文生（Robert Stevenson）就是月海合相的人。由於他的月海合相落在雙魚，力量格外強大，他寫的《金銀島》就是幻想性十足的作品。他在親密關係上也同樣顯現出這樣的特質。他在法國旅行的時候，認識了一個來自美國的女孩芬妮（Fanny
    Osbourne），當下他就感覺到芬妮是他前世的情人，因而展開追求。


    但是芬妮當時已經結婚，不久之後就返回美國，回到丈夫身邊。但史蒂文生並沒有放棄，一路尾隨苦追不捨，還好他的金星跟冥王星之間有一百二十度的好相位，他在舊金山苦等了三年多之後，芬妮終於離婚，總算抱得美人歸。如果不是月海合相的迷戀，加上金冥一百二的執著，一般人不可能為愛付出這麼大的代價。'
  - '[PAGE 100]


    # 月海九十——逃避現實的內在情緒


    不管是靈性或藝術，海王星的本質就在於超越現實。如果形成的是負面相位，海王星就會展現出逃避現實的負面能量，所以海王星剋常常會跟酒癮、毒癮，或者不當用藥有關。很多藝術家會有酒癮、毒癮的問題，可是很少聽到科學家有這類問題。原因在於藝術歸海王星管，而科學則跟土星、天王星有關。科學家可以大致分成兩類，土星型的科星家實事求是，他們通常會是實驗室科學家，天王星型的科學家勇於創新，他們往往會是理論型科學家。但不管是重視實際的土星型科學家，或者是有些古怪、不近人情的天王星型科學家，這些都跟海王星的超越現實或逃避現實無關，也因此，酗酒的藝術家很多，而酗酒的科學家則很少見。


    月海九十的人，他們的母親通常都很浪漫，但是也會有點迷糊，她們也可能會有酒精、藥物成癮的問題。月海九十的人通常會有一個愛做夢又不能接受現實的母親，但情況跟月天九十不同，月天九十的母親會不太負責，不太管當事人，她們跟當事人之間有'
  - '[PAGE 101]


    一點疏遠,而月海九十的母親除了不負責任之外還會有點軟弱無能、有點混亂,但是月海九十的人不會覺得母親不愛他,只會覺得母親沒有能力好好愛他,他們可能會覺得母親愛他們的方式有問題,但是他們不會像月天九十的人因為疏遠而對母親產生心結。


    月亮代表的是一個人的安全感,它包含了精神的安全感與物質的安全感,因此月亮跟情感有關,也跟財產有關。從一個人月亮的星座、相位,可以同時看到這個人面對情感的態度與面對金錢的態度。一個情感上很大方的人,用錢也不會太小氣。


    月海九十的人通常有個感情容易受騙,金錢方面也比較大意的母親,他們自己也會有這樣的問題,不管對自己或是別人,他們在感情與金錢上都很氾濫——這也很符合邏輯,如果一個人經常藉由酗酒來逃避現實,他們不可能同時會對金錢非常小心。


    不過我們在實際面對星圖的時候,一定要考量到當事人身處的時空環境。同樣是月海九十,一個台灣的家庭主婦,多半基於社會壓力而不太敢酗酒,更不太可能有毒癮,但是她們可能會有過量使用處方藥物,常常使用鎮定劑的問題。


    此外,月海九十的人或許並沒有酒癮、毒癮的問題,但他們有可能會因為藥物而受害。例如他們可能被某些藥物或食物影響到身體健康,因而成為洗腎患者。我認識一個'
  - '[PAGE 102]


    本命星圖中月海九十又有嚴重土星剋相的人，她有一次感冒去醫院看病，結果因為醫院開錯藥而過世。


    # 月海一百八——製造夢幻的內在能量


    對於月海一百八的人來說，藝術永遠比宗教更好。原因在於海王星是一種出世的能量，它不適合太實際的世界，但宗教組織裡可能會有許多實際的問題，例如財務的問題、權力的問題，這些問題都跟土星的現實有關。


    一百八十度由於彼此對立，所以能量會比九十度更強。月海九十的人有可能為了藉由宗教來逃避現實，結果成為某些神通力或者宗教的受害者，月海一百八的人也容易有強烈的宗教狂熱，他們可能會因此成為受害者，也可能會成為騙人的人，因為他們有能力創造幻覺。


    藝術本身就是一種幻覺的產物，製造幻覺的藝術家往往可以很可愛，但在現實中做'
  - '[PAGE 103]


    # 月海一百二——充滿想像力的內在情緒


    騙子卻是很難看的一件事。何況從來都沒有人規定只有展現正面能量的作品才是藝術，即使展現的負面能量，只要夠誠實，它還是可以成為很好的藝術。


    月海一百八的人會比月海九十的人更有藝術天分，但也因為一百八比九十的能量更強，所以帶來的問題也會更嚴重。影星瑪麗蓮夢露就有月海一百八的剋相，有人是說她是被人謀殺，也有人說她是自殺，但不管如何，她的死因都是過度服用藥物造成的結果。


    一般來說，月海九十並不會造成這麼嚴重的問題，可是月海一百八的人在這方面就要特別小心。


    月海一百二的和諧相比月海合相好。月海一百二的相位會使當事人內在的靈性自我，比較容易能夠跟海王宇宙能量結合，所以他們常常具有預言能力。月海一百二本身也很有藝術美學的想像力，同時還兼具靈性，而且他們的想像力比較不會像月海合相'
  - '[PAGE 104]


    那麼容易陷在狂熱的漩渦中，因此比較可以發揮出藝術的靈性，而不會被藝術控制。


    月海一百二的人想像力雖然不如月海合相強，但他們也不像月海合相的人這麼容易失控。像我就有月海一百二的和諧相，我跟小說家史蒂文生都是太陽天蠍、月亮雙魚，不同之處在於，史蒂文生是月海合相，相較之下，不管是情感或藝術的想像力方面，我就不會像史蒂文生那麼狂熱，我的海王星會比較可以被控制。'
  - '[PAGE 105]


