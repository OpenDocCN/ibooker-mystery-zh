    ## 序


    從逆境中昇華


    占星的功能之一是算命，但是如果只把占星當算命，那就實在太可惜了。


    占星跟通靈不同的地方，在於它具有縝密的邏輯，而且能在現實生活中得到印證。例如月亮相位會顯示出一個人小時候母親的對待方式，經由這樣的童年經驗形塑出一個人的內在安全感與情緒反應，進而影響到當事人長大以後的婚姻關係與家庭生活。對於女性來說，情緒對內分泌有很大的影響，因此月亮相位也跟卵巢、子宮等等跟女性內分泌相關的疾病有關。


    占星學是一個非常全面的解釋系統，可是它畢竟只是一個解釋系統。占星學可以幫助我們解釋這個世界，可是解釋不等於活在這個世界中。舉例來說，金星跟個人價值與享受有關，木星與社會資源有關，金星跟木星一百二十度和諧相的人容易遇到貴人、獲得資源，但是他們也可能會因此變得很自私、很偷懶；金星跟木星九十度剋相的人容易有過度浪費的問題，但是他們也可能是捐錢不手軟，很願意慷慨助人的人。


    本命星圖中的負面相位都一定會帶來現實生活中的阻礙與挫折，甚至造成很大的痛苦，正面相位必然會為生活帶來一些順境。如果只是停留在算命的層次，強調這些事情一定會發生，而不去理解背後意義的話，即使算得再準，對人生也沒有幫助。


    每個人的星圖中必然會有負面相位，也會有正面相位。正面相位雖然帶來順境，但是也常使人不去尋求突破，因為沒有必要；負面相位的挑戰會讓人努力奮鬥，但也可能因為剋相的壓力而完全發揮負面能量，導致向下沈淪。學習相位的意義就在於學會藉由正面相位的協助，讓我們更有能力面對負面相位的壓力。


    命不會越算越薄，但狹隘的觀點會讓命運也變得狹隘。行星高掛天空，它們的能量具有無限的可能性。行星的相位會帶來生命情節的邏輯，它或許像是命運的地圖，標示出這輩子要去哪裡，但是沒有規定要用什麼走法走過去。一個人透過不同的方式來發展星圖能量，命運的曲線就會有所不同。同樣的相位，有的人可以把命運曲線走得很高，也有人會把曲線走得很低。


    透過占星學，可以讓我們更深入的了解自己的生命，學習與命運對話。但如何發揮創造力來面對生命中的各種功課，這才是學習占星最重要的意義。


    註

    本文內容依據二〇〇五年「相位」相關課程錄音彙整編寫而成。


    ## Chapter 1

    星圖的基本架構：星座、宮位、相位


    本命星圖是每個人這輩子人生一場的劇本，星圖中的十顆行星，就像是十個演員，各自扮演不同的角色。


    - 太陽：意志、人生目標，以及生命中的重要男性。

    - 月亮：情緒、安全感，以及生命中的重要女性。

    - 水星：思想、溝通能力、表達能力。

    - 金星：情感、價值觀、吸引力。

    - 火星：欲望、性衝動、肉體的行動力。

    - 木星：智慧、機會、社會價值帶來的助益。

    - ♄ 土星：責任、權威、現實世界的限制。

    - ♅ 天王星：無常、變動，宇宙性的巨大改革力量。

    - ♆ 海王星：藝術、慈悲，宇宙間沒有邊際的靈性力量。

    - ♇ 冥王星：控制欲、執著，宇宙間毀滅與新生的巨大能量。


    十顆主要行星中，太陽、月亮、水星、金星、火星屬於內行星，它們都是一個人的內在個性特質。


    月亮是一個人生命中最重要的陰性能量，它會顯示出童年經驗中的母親原型，這個原型塑造了當事人的情緒模式，也會在生命中的重要女性身上反覆出現，對於男性來說，他們會選擇符合月亮形象的女人為妻，對於女性來說，她會在重要的親密關係中展現出自己的月亮特質。如果月亮受剋嚴重，可能會使人經常陷入憂鬱情緒。本書在月亮土星相位的單元中，以占星邏輯提供了一些相關建議。


    水星代表了心智與溝通，它的重要性經常被低估。水星的理智，往往能夠幫助我們安度生命的難關。


    金星是一種討人喜歡的吸引力，它就像我們常說的「桃花」，它可以吸引愛情、招來人氣，也可以帶來金錢。


    火星是一個人的性能量，它是一種單純而充沛的生物本能，它不僅只是性欲，也是一個人展現活力的方式。


    這幾顆行星是每個人情感的合唱。本書透過相位的邏輯，帶領大家深入理解在我們的成長過程中，它們是透過什麼方式塑造出我們的性格，進而藉由它們的力量，唱出美妙的情感樂章。


    木星、土星、天王星、海王星、冥王星屬於外行星，木星跟土星跟社會環境有關，天王星、海王星、冥王星屬於宇宙能量，它們的影響力更大。本書最後三章也將帶大家研究天王星、海王星、冥王星這三顆行星互相形成相位時，會帶來哪些改朝換代的巨大能量。（註）


    > 註

    > 太陽代表人生目標，木星代表社會潮流與資源，土星代表社會權威與地位。這三顆行星對於人生之路是否平順的影響很大。太陽相位、木星相位、土星相位相關的內容，請見《成功做自己：太陽、木星、土星相位中的生命之旅》。


    從一張星圖中，可以解讀出各式各樣命運的密碼。以我為例，月亮代表生命中的重要女性，所以它會跟我的母親有關，跟我的姊妹有關，也跟我自己有關。我的本命星圖中，月亮在雙魚座，落在三宮，月亮跟海王星有一百二十度和諧相位，又跟冥王星有一百八十度負面相位。


    月亮跟海王星的和諧相會帶來藝術天分與想像力，從我母親來看，她的太陽就在雙魚，她很有藝術天分，不但會彈琴、很喜歡閱讀，個性也很浪漫。月海一百二也反映在我的三妹良憶身上，她也很有藝術天分，不但是個作家，而且對音樂很有研究。從我自己來看，由於月亮落在跟寫作有關的三宮，月海和諧相帶來的想像力，讓我在早年寫過非常多劇本，後來也一直從事寫作工作。


    此外，我的月亮跟冥王星有一百八十度的負面相位。冥王星具有隱藏與執著的特質，月冥一百八代表我跟母親之間會有心靈感應的聯繫，也意謂著我的母親會因為控制欲而造成母女之間的緊張關係。月冥一百八的剋相也反映在我的二妹良雯身上，由於她一出生就有先天智能不足問題，終身都需要別人照料，月亮三宮的剋相代表我會有一個出問題的妹妹，也顯示出我必須要照顧這個妹妹，掌控她的生活。


    從這裡大家可以看到，單憑月亮的相位與星座、宮位，就同時顯現出我兩個妹妹、我的母親跟我自己的狀況。


    星座、宮位、相位是占星學最重要的三大基本功。行星落在什麼星座、行星落在什麼宮位，以及行星跟行星之間形成什麼相位，透過這三個面向，占星學得以解讀出每個人不同的生命風景。


    十二個星座代表了十二種不同的特質，當行星落入不同的星座，就會透過不同星座展現出不同特質。舉例來說，水星代表了一個人的思考與溝通，水星牡羊的人思考都會具有原創性，而且勇於表達自己的意見；水星金牛的人思想與溝通都很務實，他們對沒有意義的閒聊不感興趣。


    十二個宮位代表十二個生命情境不同的領域，例如一個人的水星落在二宮金錢宮，當事人就會將水星的心智，發揮在跟理財有關的領域，如果一個人的水星落在十宮事業宮，當事人就在事業舞台上展現水星的機智與口才。


    十二個宮位，分別代表以下十二個生命舞台：


    | 宮位 | 代表領域 |

    | :--- | :--- |

    | 一宮 | 童年環境，以及一個人看起來的感覺。 |

    | 二宮 | 靠自己賺取的有形與無形的資產。 |

    | 三宮 | 基礎教育、大眾媒體、寫作、兄弟姊妹。 |

    | 四宮 | 家庭生活、內心之家。 |

    | 五宮 | 戀愛、創作、子女、娛樂與賭博。 |

    | 六宮 | 工作、健康，維持生命正常運作的事情。 |

    | 七宮 | 伴侶、配偶、一對一的合夥關係。 |

    | 八宮 | 權力、潛意識，與他人相關的金錢與性。 |

    | 九宮 | 高等教育、哲學、宗教，旅行及外國事務。 |

    | 十宮 | 事業、地位、社會形象。 |

    | 十一宮 | 志同道合的友誼及社團關係。 |

    | 十二宮 | 前世、業報與無意識。 |


    相位代表了行星與行星之間因為特定角度而產生的關聯。正面相位會讓能量增強，負面相位的衝突，往往會引動出雙方的負面能量。一般來說，形成相位的誤差度數在六度以內，都會具有一定的影響力。誤差度數越大，影響力越小，誤差度數越小，影響力就越大。


    占星學中的主要相位，可分為合相、九十度衝突相、一百八十度對立相、一百二十度和諧相。四個主要相位的意義如下：


    合相：當兩顆行星之間的距離在六度以內，雙方的能量就會因為不斷互相刺激而被強化。合相就像是兩顆行星齊聲合唱般能量很強，但是如果遇到本命星圖或行運剋相，就會帶來雙倍的負面能量。也就是說，合相的力量雖強，但是可能是大好，也可能是大壞。


    九十度衝突相：當兩顆行星之間形成九十度相位，雙方就會各唱各的調互相干擾，因此引發出彼此的負面能量。


    一百八十度對立相：當兩顆行星形成一百八十度相位，代表雙方完全南轅北轍，往往會因為對立而互相挑戰，因此會比九十度的衝突內耗能量更強。


    一百二十度和諧相：一百二十度是一個比零度合相更好的相位。原因在於兩顆行星彼此可以互相幫助，但是不會出現合相的過度刺激的負面作用。


    以下頁影星瑪麗蓮夢露(Marilyn Monroe)的星圖為例。最外圈的三百六十度刻度被等分為十二個星座，標示出行星的星座與度數。從圖中可以看到，瑪麗蓮夢露的太陽在雙子座十度、月亮在寶瓶座十九度。


    第二圈被阿拉伯數字劃分的十二個區塊，就是十二個宮位。瑪麗蓮夢露的海王星落在一宮、土星在四宮、月亮跟木星在七宮。


    最內圈的連線代表了行星之間的相位，為了方便閱讀，一百二十度相位以「△」標示，九十度相位以「□」標示。瑪麗蓮夢露的太陽在雙子十度，水星在雙子六度，太陽水星形成了誤差四度的合相；金星在牡羊二十八度，海王星在獅子二十二度，形成誤差六度的一百二十度和諧相；土星在天蠍二十一度，海王星在獅子二十二度，形成誤差一度的九十度剋相。'
