    影星伊麗莎白泰勒（Elizabeth Taylor）就有月冥一百二相位。她的本命星圖中太陽、水星、火星合相在雙魚，同時跟海王星一百八，等於是日海一百八、水海一百八、火海一百八，造成了她生命中各式各樣的問題，包括她梅開八度的婚姻，其中還兩次下嫁有嚴重酒癮的李察波頓，她自己也有酗酒問題。其實日海一百八、水海一百八、火海一百八可以讓她惹出更大的麻煩，甚至因此一蹶不振。但是她生命中有個核心，就是月冥一百二，這個核心是很強的能量，可以讓她減肥，可以讓她戒酒，可以讓她致力於慈'
  merge: -1
  pgno: 112
- img_proc: true
  md: 善工作，甚至成立基金會持續推動愛滋病防治。月冥一百二的強大能量，讓她勇於面對人生中的困境，並且將愛心轉化成幫助弱勢族群的實際行動。
