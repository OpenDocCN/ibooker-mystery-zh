  md: '# Chapter/21


    # 金星與海王星：情感與靈性的互動


    大家在金星的章節中或許會發現，跟金星有關的名人中，演藝圈或政壇明星佔了很大的比例，作家的比例就低很多。這是因為金星的能量跟當明星很有關，而水星的能量跟寫作比較有關。


    金星跟受歡迎有關，這個世界上最受歡迎的永遠是明星。金星也代表愛的能量，得到廣義的愛的能量最多的也是明星，很多人都會把愛的能量投射在自己喜歡的明星身上。金星就是一種桃花，一個人的金星桃花力量一定要夠強，他才有可能得到眾人喜愛而成為明星。簡單來說，一個藝人其實不需要太陽或水星有很好的相位，只要金星相位夠好，就可以很受大眾歡迎。


    金海相位跟金天相位有一些不同。本命星圖中有金海相位的人也很有魅力，但是魅'
