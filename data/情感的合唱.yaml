  md: '水木九十的人思想都很樂觀，而且樂觀到有點過度，他們永遠有很多的點子與理想，常常會相信很多事情，即使這些事情根本八字沒一撇。水星本來是顆客觀的行星，但是木星的膽大會帶動水星的發展，所以水木九十的人講出來的話不必盡信，因為他們只要有點影子就會拿出來說，他們就是膽子大。不過木星基本上是吉星，本命星圖中木星相位就算再怎麼不好，惹出來的麻煩都不算太嚴重。木星的剋相頂多就是太大膽，它有可能會讓人摔一大跤或者損失金錢，但是它不會讓人感到痛苦、悲觀。


