    # 月亮與木星:情緒與資源的互動


    在本命星圖中,月亮、金星、木星,這三顆星跟財富最有關連。如果將太陽跟月亮兩相比較,太陽的相位會顯現出一個人的性格特質,也看得出當事人在追求人生目標時會比較辛苦,或者是很輕鬆就能成功,但是一個人成不成功跟有不有錢是兩回事。太陽的好相位會讓當事人比較容易獲得事業成就,但是有成就、有地位的人不見得有錢。而月亮代表的是一個人的安全感,其中包含了物質生活的穩定與舒適,所以月亮跟財富有直接的關連。


    本命星圖中月木合相或月木一百二的人,如果月木沒有其他剋相,代表當事人一定可以繼承到家庭的財富。由於月亮代表當事人生命中的重女性,月木好相位的人一定是從母親手中得到遺產,這也意謂著當事人的父親會是雙親中比較早走的人——不過這'
- md: '跟父親長不長壽無關，當事人的父親可能活到八九十歲，但一定會比母親早走，否則財富來源不會來自母親。如果月木的好相位又同時跟天王星形成了好相位，這個人擁有的財富可能是一般有錢人的好幾倍，甚至好幾十倍，有錢程度很可能會超乎想像。


    ## 月木合相——家庭環境帶來的資源


    月木合相的人絕對不會來自於貧窮或者很困苦的家庭，他們的家庭在社會標準中，一定是屬於相對富裕、家境較好的家庭。


    月亮跟木星合相的人，不論男女，即使月木合相同時還跟其他行星形成剋相，他們都會有一個能夠為子女提供很多資源的母親。月木合相意謂著當事人可以從母親身上得到很多的鼓勵與支持。他們的母親很大方、很有活力，她們對子女不會太嚴格，而且很願意為子女付出。木星代表的是社會資源，他們的母親通常教育水準較高，具有相當的智慧，而且對於教育、文化宗教有一定的興趣。如果當事人是女性，她們也會很大方，很能給予資源，如果當事人是男性，他們也容易娶到教育水準比較高，比較大方，對當事人很支持的妻子。


    美國前總統小喬治布希（George W. Bush）就是月木合相。他的家世背景非常好，他的母親跟妻子也對他很支持。小布希的星圖中，不只是月木合相，而且月木還同時跟天王星一百二十度，等於是月木合相，再加上月天一百二十度、木天一百二十度，所以他的財產恐怕不是一般人可以想像。美國總統薪水其實不多，像美國另一個前總統柯林頓到現在都還在還選舉債。可是布希在還沒有當上美國總統以前就很有錢，因為他整個家族是德州的油商。尤其幾年前行運天王星、海王星都在寶瓶，跟他的本命月木合相形成了一百二十度，又跟本命天王星也形成一百二十度，那幾年石油一直漲了三年多，整個布希家族的財富更是增值到不得了的程度。油價跟戰爭有很直接的關連，也難怪有不少人認為，布希的主戰態度，讓他的財產翻了好幾倍。


    ## 月木九十度——溺愛造成的自我放縱


    月木九十度的人會有一個情緒很誇張、很過度的母親。她們願意為小孩買很多玩具、給小孩吃很多好吃的東西，願意帶小孩到處玩、願意在小孩身上花很多錢，她們願意給小孩很多資源，但是過度浪費。簡單來說，就是他們會有一個過度溺愛小孩的媽媽。


    如果說月木合相的人情緒樂觀、開朗，那麼月木九十度的人就是過度樂觀了。月木九十度的人都會勇於表達自己的情緒，但他們的情緒會比情緒火爆的月火九十度的人更不穩定。由於月木九十度的人從小被一個喜歡溺愛小孩的母親養大，這樣的人長大以後就會比較自我放縱，所以常常會因為過度浪費而出現財務問題。也因為他們不懂得控制自己的口腹之欲，即使他們小時候可能瘦瘦的，但年紀越大，他們的體型也會越來越膨脹。


    對於男性的當事人來說，媽媽的情況會在妻子身上重演，他們的媽媽很浪費，很寵愛他們，他們的太太也會很浪費，很寵愛他們。如果當事人是女性，她們就容易跟自己的媽媽一樣，具有過度浪費、過度誇張的傾向。月木九十度相位的人，他們的媽媽或太太，或當事人自己，他們都有太愛花錢的問題。例如他們都會很愛買衣服，但是可能衣服只穿了一次就拿去送人。他們對別人很大方，對自己也不小氣。結果常常會搞到財務調度出問題，他們會是經常把信用卡刷爆的那種人。


    月亮木星九十度的人跟金星木星九十度的人都很喜歡花錢，我們不妨比較一下兩者的差異：月亮跟家庭有關，金星跟當事人的喜好有關，所以月木九十度的人花錢很浪費，但這些錢通常是用於討好家人，而金木九十度的人則通常會把錢花在自己身上。


    例如我認識一個月木九十度的人，她住在美國，她跟她媽媽都很喜歡裝潢屋子，她靠借錢來把房屋弄得很漂亮，結果全家因此欠了一大筆債。我的大舅舅也是月木九十度，所以他的媽媽——也就是我的外婆，也有過度浪費、過度溺愛小孩的問題。外婆也是把錢花在家庭上，她不愛打扮，不愛買衣服、首飾。月亮跟家人有關，也跟食物的分享有關，她花錢的對象就是她兒子、她的家或是跟家人一起分享的食物上。


    看過我寫的《良露家之味》就會知道，我從小看外婆就是那種活在山珍海味當中的人，她的幾個小孩都很有出息，都是博士碩士，只有被她過度溺愛的月木九十大兒子是煙毒犯，後來還因此被關入監獄。外婆曾經為了這個兒子去借高利貸，惹出一大堆麻煩。


    雖然月木九十度常常會因為過度浪費、放縱而惹出大問題，但是月木九十度的浪費，畢竟是為了表達對家人的寵愛。從小我就看外婆經常大包小包的買各種好吃的東西，到我們家讓我們大家享受美食，所以後來儘管她因為借高利貸，讓大家都受到拖累，大家也拿她沒辦法。


    ## 月木一百八十度——過度自信帶來的對立衝突


    月木一百八十度的人很熱情、自信。但當事人要小心自己會有過度自信、自以為是的問題。許多月木一百八十度的人會跟別人因為哲學、神學或個人原則起衝突。月木一百八十度的人也要小心跟法律產生衝突，如果木星又跟冥王星九十度的時候，最容易出現法律問題。


    一百八十度具有對外投射的特質，木星又跟社會有關，所以月木一百八十度的對立，常常會跟社會或者某一個組織團體有關，最常見的是家人之間的宗教衝突。


    月木一百八十度常常會顯現在家庭生活跟宗教生活的衝突與對立，導致家中的不和諧狀況。它跟月木九十度金錢上的過度浪費不太一樣。很多月木一百八十度的人，當事人母親可能是宗教狂，不管是信基督教、信佛教、信一貫道、信各種的教，她們不但自己信得很熱衷，她們也希望全家都跟她們一樣，家中因此出現很多衝突。有一個我認識的朋友，他媽媽就是信一貫道，信教信得非常熱衷，一天到晚要她兒子去信教，兒子只好盡量躲著她。


    ## 月木一百二十度——女性貴人的幫助


    月木一百二十度跟月木合相的人都會遇到對他們很有幫助、能夠提供很多資源的母親。兩者的差別在於，月木一百二十度的人，他們的母親會鼓勵他們、提供充分的資源，對小孩卻不會過度寵溺，所以月木一百二十度的人長大以後，他們樂觀大方，但是不會自以為是。


    對於女性當事人來說，她們會遇到這樣的母親，長大之後她們也會具備同樣的特質，成為能夠為先生、小孩提供資源，很能鼓勵他們的人。對於男性當事人來說，他們容易遇到這樣的母親，也容易娶到這樣的妻子，他們容易從妻子身上得到物質跟精神上的雙重利益。


    例如知名小說家亨利米勒（Henry Miller）就是月木一百二十度，他的情婦安涅絲寧（Anais Nin）不但跟亨利米勒上床、給他生活費，連亨利米勒的第一本書，都是安涅絲寧幫忙集資出版。


    社會學家卡爾馬克思（Karl Marx）也是月木一百二十度。馬克思因為政治理念而流亡海外，移居英國倫敦以後，花了三十幾年都在大英博物館圖書室中研究、寫作，可以說幾乎沒有固定收入，還好太太對他非常支持，而且娘家家境不錯，能夠提供必要的幫助，讓馬克思沒有後顧之憂。此外，馬克思的日月合相在金牛，木星在摩羯，這也意謂著他不但月亮木星一百二十度，太陽跟木星也是一百二十度，也就是說，他不但有女性的貴人，也有男性的貴人。馬克思的摯友恩格斯（Friedrich
    Engels）為他提供了大量經濟上的支持，甚至在馬克思過世之後，還幫他繼續整理未出版的手稿，花了十二年的時間，讓資本論第二、三卷得以出版。


    月木一百二十度的人通常也會得到家庭的遺產，而且當事人的家庭遺產通常會來自母親。我認識一個本命星圖中天王星跟木星合相，又跟月亮一百二十度的朋友，他得到的遺產就是億級以上。天王星木星合相再跟月亮一百二十度，當事人拿到的遺產絕對不是三、五百萬而已，如果同時又跟金星有好相位，金額就會更高。


    # Chapter 6


    # 月亮與土星：情緒與責任的互動


    月亮是本命星圖中最重要的陰性能量，它對一個人內在情緒的影響很大。當本命星圖中月亮跟土星形成相位，土星的嚴肅與現實，都會為月亮帶來壓力。


    月土的負面相位常常跟情緒壓力與憂鬱症有關，即使是月土的好相位，當事人從小就會遇到比較務實、比較保守的母親，他們從小會受到母親在物質上的穩定照顧，也養成了他們負責、務實的個性，他們都會很尊敬自己的母親，但是他們跟母親的關係都不會很輕鬆。


    ## 月土合相——實事求是造成情緒壓抑


    一般來講，月土合相的人會有個比較理性的母親，她們比較嚴格，也比較實事求是。她們不太寵小孩，不會給小孩很多糖吃。她們會用很多規則來要求小孩，當事人如果達不到這些要求，就會受到責備。月土合相的人不分男女，他們都會遇到望子成龍、望女成鳳的母親，她們會要求子女功課好好寫、考試好好考、必須早睡早起、不能遲到等等，這些都是社會價值觀的具體化規範。她們希望藉由這些規範，讓小孩長大以後能夠出人头地，成為一個能夠負責任的人，她們希望讓小孩從小就接受社會的現實面。月土合相的人在成長過程中，他們不會被母親當成心肝寶貝捧在手心，所以他們都會比較早熟，比較容易接受學校或社會某些實際的要求，也比較願意跟社會面接觸。


    土星代表社會的權威，月土合相的人，他們的母親絕對不會是慈母，而是嚴格的權威，當事人從小在這種成長環境中長大，因此他們都不太會任性或調皮，也比較容易吃苦耐勞，比較自律，比較善於管理。長大之後也比較適合從事我們一般人認為比較嚴肅的職業，像是科學、法律、醫學、工程等等。


    他們從小就很習慣母親的權威，長大以後也很容易適應社會的權威。儘管母親很嚴，但是月土合相的人其實都滿認同母親的價值標準，認為母親對他的要求是對的，因此他們一輩子都會很尊敬自己的母親。不過，他們也不太能夠掙脫母親的嚴肅帶來的影響，終其一生他們都會滿怕自己的母親。


    月土合相的人情緒從小就受到約束，習慣自我壓抑，因此容易出現一些身體的問題。尤其如果本命星圖中月土合相又跟水星合相，或者遇到行運的外行星跟當事人本命星圖中的月土合相形成剋相的話，就容易產生身體或情緒上的反應，容易在脊椎、背、血液循環等方面出現問題。


    月亮代表情感，月土合相會對月亮能力的發揮產生限制，所以當事人不太容易快樂，都會有一點悶悶的，情緒比較不容易展現。如果當事人是男性，他們會是很一板一眼的人，由於他們不太習慣跟人在情緒上水乳交融，所以婚後跟太太之間也不容易感情很好。如果當事人是女性，不管外表如何，她們內心永遠會有比較實際的部分，比較深沉，比較放不開。


    很多明星的螢幕形象，跟他們私底下的生活有很大的差距。例如台灣以前的電視明星張俐敏。由於她的太陽、金星、水星合相，從她主演的一家有嬌妻等等電視劇中，一般人看到的是嘻嘻哈哈、甜美聰明的螢幕形象，但是由於她的月土合相，所以她也很怕她媽媽，小時候她母親對她管教很嚴，也養成了她節儉的個性。大家絕對會不相信，像張俐敏這種在臺灣這麼出名的明星，在洛杉磯生產時，住的最是普通醫院的六人房。因為在美國如果生產時住六人房，就不用付錢，美國政府會幫你買單。如果要住三人或兩人房的話，在美國就醫是非常昂貴的，也就是說，家居生活裡頭的張俐敏，跟她的螢幕形象是完全不同的。


    ## 月土九十度——壓力過大的情緒深淵


    月亮土星九十度的人，他們早期的家庭生活以及母子關係都是痛苦而艱難的。月土合相的人，小時候絕對不會碰上大方的父母，至於月土九十度的人，童年生活會比月土合相的人更艱辛。


    月土九十度的剋相，可能會顯現在當事人小時候家中經濟出狀況，當事人的母親生活過得很辛苦、壓力很大，因此容易因為生活問題或是自身狀況而帶給小孩子壓力。月土九十度承受的壓力跟月土合相情況不同。月土合相的人，他們的母親雖然嚴格，但是通常她們在管教小孩時都會有一套完整而務實的價值觀。月土九十度的母親就不像月土合相的母親那樣講究事理，她們對小孩的嚴格並不是基於一套完整的價值觀，而往往是因為自己在生活上遭遇困難，而將壓力轉嫁給小孩，或者對小孩過分嚴格，她們會讓小孩覺得必須靠著競爭，才能出人頭地。也就是說，月土合相的人通常都會覺得母親是對的，雖然這個「對」讓他們承受壓力。可是月土九十度的人常常只是在忍受，他們並不覺得母親一定是對的。


    月土九十度的人不管男女，他們童年經驗中的母親都會面臨很多生活上的困難，不管是家境貧困，或者夫妻之間的相處有問題，她們都會壓力很大，也可能會很孤單，可能有輕微的憂鬱症。因此導致月土九十度的人通常會有很強的母親情結，他們生命當中的童年經驗是受創的、不愉快的、孤立的或是悲傷的，他們的內在其實是憂慮沮喪的小孩，這些不愉快的經驗，往往使他們長大之後容易掩飾自己的情緒。


    我有個朋友的太太就有這個問題。我認識他們夫妻很久了，太太是個太陽人馬的女生，她也一直很開朗、很健談，跟大家相處得很好。直到這個先生後來有了外遇之後，他的太太才出現憂鬱症的症狀，甚至一直想自殺。這個太太就有月土九十度的剋相，細問之下才發現，原來她在童年時期，她的母親因為先生外遇而得了憂鬱症，後來還因此跳樓自殺，結果她自己結婚之後也因為先生外遇而產生憂鬱症，重演了當年母親的情境。


    月土九十度的人早年遇到的生活壓力與家庭重擔，長大以後都會成為他們情感的牢籠。當他們在行運時遇到生命的低潮期，就很容易掉入情緒的深淵，產生很大的心理的問題，所以月土九十度的人，往往是憂鬱症最主要的族群。月土九十度的人，不論發生了什麼事情，他們都會覺得自己是有罪的，因為他們小時候習慣被譴責，習慣被怪罪，所以容易先入為主覺得一切都是自己的錯。


    不過，月土九十度的人並不是每一天都活在憂鬱當中，本命星圖中的月土九十度就像是一個定時炸彈，當它遇到行運的剋相時才會被啟動，尤其是當行運土星跟本命月土九十度形成剋相的大約兩年的時間，一定要特別小心。'
  mdcn: '跟父親長不長壽無關，當事人的父親可能活到八九十歲，但一定會比母親早走，否則財富來源不會來自母親。如果月木的好相位又同時跟天王星形成了好相位，這個人擁有的財富可能是一般有錢人的好幾倍，甚至好幾十倍，有錢程度很可能會超乎想像。


    ## 月木合相——家庭環境帶來的資源


    月木合相的人絕對不會來自於貧窮或者很困苦的家庭，他們的家庭在社會標準中，一定是屬於相對富裕、家境較好的家庭。


    月亮跟木星合相的人，不論男女，即使月木合相同時還跟其他行星形成剋相，他們都會有一個能夠為子女提供很多資源的母親。月木合相意謂著當事人可以從母親身上得到很多的鼓勵與支持。他們的母親很大方、很有活力，她們對子女不會太嚴格，而且很願意為子女付出。木星代表的是社會資源，他們的母親通常教育水準較高，具有相當的智慧，而且對於教育、文化宗教有一定的興趣。如果當事人是女性，她們也會很大方，很能給予資源，如果當事人是男性，他們也容易娶到教育水準比較高，比較大方，對當事人很支持的妻子。


    美國前總統小喬治布希（George W. Bush）就是月木合相。他的家世背景非常好，他的母親跟妻子也對他很支持。小布希的星圖中，不只是月木合相，而且月木還同時跟天王星一百二十度，等於是月木合相，再加上月天一百二十度、木天一百二十度，所以他的財產恐怕不是一般人可以想像。美國總統薪水其實不多，像美國另一個前總統柯林頓到現在都還在還選舉債。可是布希在還沒有當上美國總統以前就很有錢，因為他整個家族是德州的油商。尤其幾年前行運天王星、海王星都在寶瓶，跟他的本命月木合相形成了一百二十度，又跟本命天王星也形成一百二十度，那幾年石油一直漲了三年多，整個布希家族的財富更是增值到不得了的程度。油價跟戰爭有很直接的關連，也難怪有不少人認為，布希的主戰態度，讓他的財產翻了好幾倍。


    ## 月木九十度——溺愛造成的自我放縱


    月木九十度的人會有一個情緒很誇張、很過度的母親。她們願意為小孩買很多玩具、給小孩吃很多好吃的東西，願意帶小孩到處玩、願意在小孩身上花很多錢，她們願意給小孩很多資源，但是過度浪費。簡單來說，就是他們會有一個過度溺愛小孩的媽媽。


    如果說月木合相的人情緒樂觀、開朗，那麼月木九十度的人就是過度樂觀了。月木九十度的人都會勇於表達自己的情緒，但他們的情緒會比情緒火爆的月火九十度的人更不穩定。由於月木九十度的人從小被一個喜歡溺愛小孩的母親養大，這樣的人長大以後就會比較自我放縱，所以常常會因為過度浪費而出現財務問題。也因為他們不懂得控制自己的口腹之欲，即使他們小時候可能瘦瘦的，但年紀越大，他們的體型也會越來越膨脹。


    對於男性的當事人來說，媽媽的情況會在妻子身上重演，他們的媽媽很浪費，很寵愛他們，他們的太太也會很浪費，很寵愛他們。如果當事人是女性，她們就容易跟自己的媽媽一樣，具有過度浪費、過度誇張的傾向。月木九十度相位的人，他們的媽媽或太太，或當事人自己，他們都有太愛花錢的問題。例如他們都會很愛買衣服，但是可能衣服只穿了一次就拿去送人。他們對別人很大方，對自己也不小氣。結果常常會搞到財務調度出問題，他們會是經常把信用卡刷爆的那種人。


    月亮木星九十度的人跟金星木星九十度的人都很喜歡花錢，我們不妨比較一下兩者的差異：月亮跟家庭有關，金星跟當事人的喜好有關，所以月木九十度的人花錢很浪費，但這些錢通常是用於討好家人，而金木九十度的人則通常會把錢花在自己身上。


    例如我認識一個月木九十度的人，她住在美國，她跟她媽媽都很喜歡裝潢屋子，她靠借錢來把房屋弄得很漂亮，結果全家因此欠了一大筆債。我的大舅舅也是月木九十度，所以他的媽媽——也就是我的外婆，也有過度浪費、過度溺愛小孩的問題。外婆也是把錢花在家庭上，她不愛打扮，不愛買衣服、首飾。月亮跟家人有關，也跟食物的分享有關，她花錢的對象就是她兒子、她的家或是跟家人一起分享的食物上。


    看過我寫的《良露家之味》就會知道，我從小看外婆就是那種活在山珍海味當中的人，她的幾個小孩都很有出息，都是博士碩士，只有被她過度溺愛的月木九十大兒子是煙毒犯，後來還因此被關入監獄。外婆曾經為了這個兒子去借高利貸，惹出一大堆麻煩。


    雖然月木九十度常常會因為過度浪費、放縱而惹出大問題，但是月木九十度的浪費，畢竟是為了表達對家人的寵愛。從小我就看外婆經常大包小包的買各種好吃的東西，到我們家讓我們大家享受美食，所以後來儘管她因為借高利貸，讓大家都受到拖累，大家也拿她沒辦法。


    ## 月木一百八十度——過度自信帶來的對立衝突


    月木一百八十度的人很熱情、自信。但當事人要小心自己會有過度自信、自以為是的問題。許多月木一百八十度的人會跟別人因為哲學、神學或個人原則起衝突。月木一百八十度的人也要小心跟法律產生衝突，如果木星又跟冥王星九十度的時候，最容易出現法律問題。


    一百八十度具有對外投射的特質，木星又跟社會有關，所以月木一百八十度的對立，常常會跟社會或者某一個組織團體有關，最常見的是家人之間的宗教衝突。


    月木一百八十度常常會顯現在家庭生活跟宗教生活的衝突與對立，導致家中的不和諧狀況。它跟月木九十度金錢上的過度浪費不太一樣。很多月木一百八十度的人，當事人母親可能是宗教狂，不管是信基督教、信佛教、信一貫道、信各種的教，她們不但自己信得很熱衷，她們也希望全家都跟她們一樣，家中因此出現很多衝突。有一個我認識的朋友，他媽媽就是信一貫道，信教信得非常熱衷，一天到晚要她兒子去信教，兒子只好盡量躲著她。


    ## 月木一百二十度——女性貴人的幫助


    月木一百二十度跟月木合相的人都會遇到對他們很有幫助、能夠提供很多資源的母親。兩者的差別在於，月木一百二十度的人，他們的母親會鼓勵他們、提供充分的資源，對小孩卻不會過度寵溺，所以月木一百二十度的人長大以後，他們樂觀大方，但是不會自以為是。


