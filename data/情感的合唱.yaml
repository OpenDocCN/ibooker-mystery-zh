  md: '# Chapter/23


    # 火星與木星：活力與社會資源的互動


    整張星圖中，火星是最強的陽性能量，而且較具攻擊性，所以在傳統占星學上，它一般被認為是偏負面的力量，這並不是說火星就是凶星，火星的好相位也可以產生很正面的意義，但火星的能量被扭曲時，它的負面能量相對來說會比較大。


    如果跟金星做個比較，金星也會有負面能量，但是金星是陰性能量，而且金星的特質在於向內吸收，金星的問題不一定會表現出來，即使表現出來，引起的衝突也不像火星這麼大。可是火星如果遇到問題，一定會表現出來，不可能自己吸收就算了。如果將占星視為一種治療的工具，在五顆內行星的個人能量中，火星負面相位的問題，通常比較不容易克服。


    從本命星圖火星位於什麼星座、宮位、相位，可以看出當事人運用什麼樣的能量、'
  merge: -1
  pgno: 225
- img_proc: true
  md: '# 火木合相——將活力展現於社會領域


    在什麼領域展現活力，以及當事人展現自我的活力時會遇到的各種狀況。火星的本能與活力，其實就是一種性能量，從火星的相位中，也可以看出當事人展現性能量的特質。

    當火星跟木星形成相位，代表當事人的個人活力與社會資源產生了關聯，從火木的相位中最能看到一個人想要從社會中得到什麼，以及當事人在社會領域中怎麼展現自我的活力。


    木星代表社會、教育、學習、智慧追求、探險旅行與運動，當一個人本命星圖中火木合相，代表當事人一定會對於社會領域的活動有很大興趣。火木合相如果沒有同時又跟其他行星形成剋相的話，其實是個滿有利的相位，因為這個相位會讓當事人比較容易從事社會參與，在社會舞台上比較有活力。

    火木合相的人有幾個特質，第一點就是個人對於社會能量的追求欲望會被放大，因'
  merge: -1
  pgno: 226
- img_proc: true
  md: '為木星會將所有能量放大，所以這些人一定會對於探險、旅行與知識追求、文化等活動都有興趣，但個人能量是有限的，所以不同當事人會隨本命星圖的不同，而尋找當時最適合表達木星能量的東西，有的人花很多時間從事探險旅行，但同時也對文化有興趣，也有的人將時間花在文化的追求，但沒有花時間旅行。不過，不管他們把時間、精力花在旅行或文化上，只要本命星圖中火木合相，他們都一定對於新鮮事物、異國事物與探索新的情境有興趣。


    火木合相而沒有其他相位時，因為火星力量被木星加強，當事人一定會顯得活力充沛，可是這種活力通常是表現在跟社會有關的領域上，而不是表現在情感或健康等個人領域。相較於金火合相的人很性感，水火合相的人腦筋反應很快，這些都屬於個人領域，但火木合相不同，火木合相會顯現在當事人對社會參與上很活力充沛、熱心，也很有勇氣，如果層次比較高時，火木合相的人，對於文化與教育一定會有強烈的追求熱情。


    火木合相的人通常都會有肉體的能量，但不見得會用在性上面，他們可能對於知識的追求表現出熱情與耐力，可以研究一個東西一坐就坐十幾個小時。法國作家莫泊桑（Guy
    de Maupassant）就是火木合相，他寫過很多人道主義的著作。火木合相的人也'
  merge: -1
  pgno: 227
