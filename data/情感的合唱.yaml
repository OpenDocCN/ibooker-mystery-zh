    # 金天一百二——廣受喜愛的明星特質


    金天一百二的和諧相位，會使當事人特別適合演藝圈與科技業，他們容易得到突然的成功。他們往往會因為藝術、才藝表現或因為他們提出的某些特殊價值，因而獲得大眾喜歡，並且帶來很大的金錢利益。


    由於天王星的宇宙能量比木星的社會能量更強，金天一百二在金錢方面會比金木一百二幸運很多。如果金天一百二的金星沒有其他剋相干擾，金天一百二的人會很適合從事股票投資，尤其適合投資高科技產業。但前提在於本命星圖中金星沒有剋相，而沒有遇到行運的不利相位。影星林青霞就有金天一百二相位，又加上木星跟天王星合相，等於金星跟木星也一百二。一九五四年十月、十一月出生的人，都有很強的本命星圖格局，例如林青霞、導演李安、賴聲川，以及趨勢科技的老闆張明正。從這些名人中可以看到，他們有的人是在演藝圈廣受喜愛，有的人是在高科技業獲得巨大成功。


