  md: '們了。

    土星是一顆宿命星，金土九十有一些人會碰到一些剛好嵌住他們金土九十相位的人，因而感受到情感的冷淡、傷害或無法完成。即使他們長期處於婚姻狀態，結婚了三十年都沒有離婚，他們都會知道，自己的婚姻中缺乏了情感的慰藉。或許他們可以從婚姻中擁有小孩、親人與安全感，但就是沒有辦法獲得情感。這是因為小孩跟婚姻關係中的安全感，主要看的是月亮，而金星則反映的是愛情或感情的相關面向。金土九十的人如果月亮相位不錯，他們跟婚姻的另一半之間也可能會擁有親人般的親情，但是他們在愛情方面一定會有所缺憾。金土九十還有一個例子是希特勒，金土九十代表當事人很難得到情感的撫慰，從希特勒的身上來看，他到臨死才跟伊娃布朗（Eva
