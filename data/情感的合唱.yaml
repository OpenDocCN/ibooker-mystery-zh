  md: '# 月金合相——安全感與美感合而為一


    月亮金星合相的人，通常會有個具有魅力的母親，他們的母親不見得一定是美人胚子，但一定會被一般人認為具有某種吸引力。月金合相的男生，長大以後娶的太太，也通常面貌姣好，他們生命中的重要女性往往都很漂亮。


