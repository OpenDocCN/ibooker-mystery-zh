    # Chapter/24


    # 火星與土星:活力與現實的互動


    只要本命星圖中有火土相位,不論相位好壞,當事人都會給人一種握緊拳頭過生活的感覺。土星的壓力會讓火星沒有那麼容易展現活力,火土有相位的人在展現火星的能量時,都會有一種沈重的感覺。


