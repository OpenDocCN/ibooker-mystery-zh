    # 水火九十


    水火九十的人跟水火合相的人一樣，都有喜歡爭論的傾向，但是受到九十負面相位的影響，他們跟人爭論的時候會比較主觀，也比較容易動氣。


    九十度剋相是一種內耗，水火九十的人在跟別人爭論的同時，其實也在跟自己爭論，由於他們的水星經常受到火星的過度刺激，所以很容易會有頭痛的問題。如果遇到水火九十的人，不妨問問看，他們很可能會經常頭痛痛到得吃止痛藥的問題。水火合相的人雖然也容易失眠，腦筋不容易放鬆，但情況沒有水火九十來得嚴重。


    水火九十會隨水星落在不同的星座而有差別。如果水星落在牡羊、人馬這類喜歡表達意見的星座，他們會將所有不高興的事情講出來，一頓架把一切不快都吵光，但如果是水星巨蟹、雙魚的水火九十，他們雖然也會當面跟你吵，可是他們往往心中還是有所保留，所以你不會覺得吵得很痛快。


