    # Chapter/11


    # 水星與火星：心智與行動力的互動


    在太陽系行星中，金星與火星分別位於地球的兩側，它們就像是地球的兩扇門，位於地球內側的金星就像是一扇拉門，它代表了討人喜歡的吸引力，它是一種內收的陰性能量；位於地球外側的火星就像是一扇推門，它具有向外展現自我的特質，它是一種外放的陽性能量。當一個人的水星跟金星形成相位，代表當事人會想要用和諧的方式與人溝通。而如果一個人的水星跟火星形成相位，當事人在跟別人溝通時，重視的就會是我意見的表達，而不是和諧了。'
  - '[PAGE 120]


    # 水火合相 — 勇於表達自我溝通能力


    水星跟火星合相的人，有著反應很迅速的腦筋，如果水星沒有同時跟其他行星形成剋相的話，即使當事人的水星落在不愛表達的巨蟹、天蠍、雙魚等水象星座，只要水星跟火星合相，他們都會是敢表達自我的人。水星巨蟹、水星雙魚雖然不愛表達，不代表他們不思考，他們其實想得很多，只是不喜歡或不習慣把他們的想法講出來，假如他們的水星跟火星合相，他們就會比較勇於表達自己的想法。如果當事人的水火合相落在本來就在很愛表達的星座，例如水火合相在牡羊、獅子、人馬等火象星座，他們就會比一般的水星牡羊、水星獅子、水星人馬更喜歡表達，思想也更強烈。


    水火合相的人，腦子是不太容易放鬆的，他們的腦子很少休息，也喜歡與人爭辯。不過水火合相的人如果水星沒有其他剋相的話，他們就只是單純的喜歡爭論，他們爭論完了事後不會不快，或產生情緒反應，原因在於水星跟火星合相的力量，其實是比較理性的。我們在生活中也常會發現，很多喜歡跟別人爭辯的人，往往不見得容易對人生悶'
