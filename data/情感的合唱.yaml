  md: '# Chapter/14


    # 水星與天王星：心智與創意的互動


    只要一個人的水星跟天王星形成相位，即使水星是落在金牛這麼緩慢的星座，當事人的思考活動也一定會加快很多。天王星的能量有如閃電，它跟保守穩定的土星剛好相反，所以有水天相位的人思考方式不像土星那麼速度恆定、步步為營，而且跟架構邏輯無關。不管相位好壞，當事人的思考都會天馬行空。像我是水天一百二，認識我的人都知道，我思考不是階梯型的，我不僅會跳格子，還可能跳出格子外，尤其喜歡跳出社會與文化的框架。這是天王星最大的影響力。


    一般人最常用語言來展現水星能量，如果一個人的水星落在比較強勢的星座，例如牡羊、雙子、獅子、人馬，又跟天王星形成相位，當事人的水星就會顯得非常外放，非常勇於表達自己的想法。但展現水星能量的方式不只有語言，還包括文字，如果當事人'
  merge: -1
