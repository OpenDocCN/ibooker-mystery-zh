    # 月火一百八 — 家庭生活的暴力衝突


    月火九十的人常常會有個脾氣不好的母親，在家經常會有情緒障礙，當事人也經常有情緒不穩的問題，但月火九十度的衝突只是動口，月火一百八十則往往會演變成動手打人的肢體暴力。如果月火一百八同時還有冥王星涉入，暴力的程度會非常嚴重，即使只是單純的月火一百八，當事人小時候還是免不了會被媽媽打耳光或丟東西，當事人碰到的家庭糾紛會牽扯到動粗，絕對不是大吼大叫而已。


    月火一百八常常跟家庭暴力有關。月火一百八的女性，小時候她們的母親很可能是家庭暴力的受害者，她們長大結婚以後，自己容易也同樣成為家庭暴力的受害者。月火一百八的男性，小時候他們的母親是家庭暴力的受害者，長大結婚以後，月火一百八常會反映在妻子身上，他們的妻子常常成為家庭暴力的受害者，他們自己反而成為家庭暴力的施暴者。從跟家庭暴力有關的研究中常會發現，很多童年曾經遭受家庭暴力的男性，他們小時候都會是挺身反抗父親、保護母親的兒子，他們小時候最痛恨的就是打老'
  - '[PAGE 54]


    婆的男人，沒想到長大以後卻重蹈父親的覆轍，成為他們小時候最痛恨的那種人。從這裡可以看到家庭暴力學跟占星學的相同邏輯。


    月火一百八有時候會反映在家中有人犯罪，或者是家裡遇到火災之類的家庭問題。如果月亮跟火星形成的是誤差值接近零度的精準一百八十度剋相，當事人的母親有可能是意外事件的受害者。尤其如果當事人還有土星天王星或土星冥王星的負面相位時，當事人的母親有可能會因為戰爭或社會上的犯罪事件而受害。如果當事人是女性的話，她們要小心自己可能會遇到類似的狀況。


    # 月火一百二——充滿能量的內在情緒


    如果一個人本命星圖中月亮跟火星形成一百二十度和諧相，意謂著當事人會有一個很有自信的母亲。當事人的母親有勇氣但不會過分膽大，行動力會比較強，通常也比較獨立，不會那麼需要他人，是個比較強悍的母亲。月火一百二的人，他們的母親很有能'
