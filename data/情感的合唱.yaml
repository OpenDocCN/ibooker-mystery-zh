  md: '# Chapter/4


    # 月亮與火星：情緒與行動力的互動


    月亮是一個人最重要的陰性能量，而火星是很強烈的陽性能量，當月亮跟火星形成相位，就容易反映在一個人的情緒、家庭的氣氛，以及女性的健康上。


    由於月亮跟家庭有關，月火的不和諧相位常常會跟家庭暴力有關。此外，對於女性來說，月火的剋相會帶來很大的情緒波動，進而造成內分泌的不穩定，會對健康有很大的影響。'
