    手來管當事人，她們未必不能共處一個屋簷下。


    月冥合相的人有一個情感強烈的母親，她們對小孩有著強烈的占有欲，很容易嫉妒，而且要求小孩必須對她全心全意。月冥合相激情的背後，其實隱含了強烈的性能量。它代表當事人的母親可能有一些這方面的問題，因而將壓抑的性能量投射在小孩身上，


    這並不意謂著亂倫，而是性壓抑轉移的心理問題。


    不少男女同志星圖中都有月冥合相，就是一種基於母親情結帶來的結果。從占星學的角度，同性戀大致可以區分為三類：一類是跟太陽、月亮有關的性別角色認同有關，一類是跟金星、火星、天王星、海王星的性愛越界有關，第三類則跟土星、冥王星的父親情結、母親情結有關。其中以第三類最為複雜，當事人也最容易感到痛苦。月冥合相的人，他們的母親都讓他們承受了過大的情緒壓力，當事人可能因此產生戀母情結，或是對母親又愛又恨。'
  - '[PAGE 108]


    # 月冥九十——情緒失落的扭曲執著


    如果一個人的本命星圖中有月冥九十的負面相位，當事人的童年往往會經驗到十分困難的母子關係。例如當事人小時候母親遇到了情感上的問題，可能她們因為父親的出軌背叛，而將對父親的憤怒發洩在小孩身上。


    在實際星圖解析時，我們常常會發現，很多月冥九十的人，明明知道母親是受害者，但是小孩卻很同情父親。這並不是說當事人覺得父親外遇是對的，而是因為身為外遇受害者的母親不斷的將自己的壓力轉嫁到小孩身上，因為情緒無從宣洩，因而一天到晚對小孩擺臭臉，一天到晚罵小孩，到最後導致小孩對母親產生怨恨。而問題的元兇，也就是外遇的爸爸，因為一直沒有待在小孩身邊，因此沒有造成小孩的壓力，以致於很多月冥九十的人反而會覺得父親沒有母親那麼可惡。


    月冥九十的人也常常會跟母親之間產生金錢的糾紛。這也是冥王星跟土星的不同之處。土星帶來的是現實的責任，太陽、月亮跟土星形成剋相的人，當事人的父母雖然'
  - '[PAGE 109]


    # 月冥一百八——向外投射的影響操控


    月冥九十的女性跟月火九十的女性，都一定要特別注意跟子宮、卵巢等等跟生殖系統有關的問題。這是因為月冥九十跟月火九十特別會造成女性的荷爾蒙的分泌與腎上腺長期受到刺激，很容易因為內分泌的過度起伏而造成女性生理的相關問題。


    月冥九十的人會明顯受到母親控制，可是月冥一百八不會，當事人的母親會比較隱形，她們不見得會用強有力手段來控制小孩。


    月冥一百八跟月冥九十的不同在於，月冥九十的人會感覺到母親及生命中重要女性


    帶給當事人很多現實上的磨難，但是他們不會貪婪，他們並不會有從小孩身上要愛的渴求。但冥王星會。冥王星要的是權力，月亮要的是感情，當月亮跟冥王星形成剋相，冥王星得不到它應得的感情時，就會轉移、扭曲成對於金錢的強烈執著，他們會想要藉由金錢渴求來彌補對於愛的失望。'
