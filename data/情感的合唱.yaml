  md: '# 金海九十——一廂情願的情感付出


    金海九十的人一生經常會陷入暗戀。不過金海九十的暗戀未必會出什麼紕漏，他們可能會暗戀一個人十幾二十年，但未必會讓對方知道，所以雖然不會有結果，但也不會惹出什麼麻煩。


    金海九十的人最要小心的是財務問題。會被騙財又失身的人，很多就是金海九十的人——會被人欺騙感情的人未必同時會被騙錢，被人騙錢的人未必同時失身。因為金海九十的人在感情上的付出是很不明智的、很一廂情願的，所以金海九十特別要留意這方面的問題。


    星根著在現實世界，否則金海合相的人都不適合從事非常現實的工作，他們比較適合的是具有理想主義特質的事情。'
