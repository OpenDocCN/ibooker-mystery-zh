  md: '# 金冥九十——激情與執著的強大壓力


    本命星圖中的金冥九十相位，代表當事人容易跟伴侶之間產生很強烈的情感與金錢方面的衝突。他們操控性很強，又很執著，還同時要激情，所以這是一個有點危險的相位。因為婚姻跟激情是背道而馳的。婚姻的本質不可能帶來這麼大的原欲，他們要激情、又要控制，而且在婚姻的激情慢慢退去時，他們容易陷入新的激情中，但對於舊的感情又不能放手。這比金天九十更麻煩。因為金天九十雖然在外頭看到新對象就心動，但他們對舊愛沒有那麼大的執著。金天九十的人可能對婚姻冷卻以後，就不管太太在家怎麼樣，自己在外頭偷偷交女朋友。但金冥九十的人，又想在外頭尋找新戀情的刺激，又要太太在家很忠實。


    金冥九十的人陷入外遇激情時，有可能會好幾天都不回家，金天九十的人不會。如果看八卦雜誌會發現，劈腿大致上可分兩種：一種劈到後來會無疾而終，這種通常屬於金天型的劈腿；一種會越演越烈、大打出手，這就比較屬於金冥型的劈腿。因為冥王星'
