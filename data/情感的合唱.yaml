    # 火土合相——嚴謹周到的自我管理


    火土相位的人即使相位很好，當事人也必須要累積到足夠的經驗之後，才能夠獲得成功。由於土星要的東西比較多，它需要被人尊重，而且需要有權威，它不像木星只要受歡迎就好，所以需要比較長的累積，但也因為過程比較完整、扎實，因此他們的成功會比較穩固、持久。


