    # 最後的煉金術士


    艾薩克牛頓 Isaac Newton


    1643/1/4-1727/3/31


    ![](img/908a1274bf248b8af5f69be062adcd50_279_0.png)


    萬有引力的發現者，牛頓發表的三大運動定律，可說奠定了近代物理學與工程學的基礎。'
  - '[PAGE 280]


    前面提到科學家的分類


    一類是注重原創的天王星型理論科學家，一類是注重數據的土星型實證科學家，牛頓的本命星圖木星跟土星合相，而且木土合相跟天王星一百二，等於不但天王星跟土星有一百二十度的和諧相，天王星還同時跟木星也形成一百二十度和諧相。木土合相意謂著當事人可以透過土星的能量獲取木星的社會利益，他們樂觀大膽，同時又很懂得算計，由於木星跟土星都是社會星，木土合相的人都不會對社會成就沒興趣，他們有野心，也能夠非常敏銳的掌握社會脈動。木星天王星一百二的人可以衡量社會狀況之後，再用創意配合，土天一百二的人則有能力整合前衛與保守勢力。再加上牛頓的天王星落在跟自我形象有關的一宮，難怪常被視為科學史上最具影響力的科學家。


    海冥一百八的人如果還有其他剋相，當事人有可能會因為外在人事物而中毒、感染，導致身體健康的嚴重損害。後人將牛頓的毛髮化驗，發現其中水銀含量比一般人超出五十幾倍，原因可能是從事煉金術而導致的汞中毒。收藏許多牛頓煉金術著作的經濟學大師凱恩斯（John
    Maynard Keynes）曾說：「牛頓'
  - '[PAGE 281]


    不是理性時代的第一人，他是最後的煉金術士。


    一百八十度的相位往往因為對立而帶來很強的力量，但也常常會像翹翹板一般，在兩個極端中選邊站，由一個極端擺向另一個極端。


    儘管比起自然科學，事實上牛頓寫了更多宗教學的著作，但牛頓在數學及物理學上的貢獻，也開啟了理性主義與啟蒙運動，從此神祕學被視為迷信而排除於主流之外，但從另一個角度來看，科學卻成為了人們信仰的另一種迷信了。'
  - '[PAGE 282]


    # ## 海冥一百二——夢想與現實的互助


    海冥一百二的和諧相，代表海王星的理想跟冥王星的現實可以互相協助，讓理想得以落實，並提升到新的階段。出生於一七四九年的德國文學家歌德（Johann von Goethe）的本命星圖中的冥海一百二，同時又跟木星一百二，所以他同時具有海冥一百二、木冥一百二，以及海木一百二，他是威瑪古典主義的重要代表。


    相較於許多歐洲國家，德國文化的發展其實很晚熟，直到十八世紀才真正強勢發展。歌德出生的年代，正是德國經由普魯士主導而逐漸統一的時期。'
