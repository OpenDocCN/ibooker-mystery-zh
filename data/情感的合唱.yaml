    例如我認識一個月木九十的人，她住在美國，她跟她媽媽都很喜歡裝潢屋子，她靠

    借錢來把房屋弄得很漂亮，結果全家因此欠了一大筆債。我的大舅舅也是月木九十，所

    以他的媽媽——也就是我的外婆，也有過度浪費、過度溺愛小孩的問題。外婆也是把錢

    花在家庭上，她不愛打扮，不愛買衣服、首飾。月亮跟家人有關，也跟食物的分享有關，

    她花錢的對象就是她兒子、她的家或是跟家人一起分享的食物上。


    看過我寫的《良露家之味》就會知道，我從小看外婆就是那種活在山珍海味當中的

    人，她的幾個小孩都很有出息，都是博士碩士，只有被她過度溺愛的月木九十大兒子是

    煙毒犯，後來還因此被關入監獄。外婆曾經為了這個兒子去借高利貸，惹出一大堆麻煩。'
  merge: -1
  pgno: 61
- img_proc: true
  md: '雖然月木九十常常會因為過度浪費、放縱而惹出大問題，但是月木九十的浪費，畢竟是

    為了表達對家人的寵愛。從小我就看外婆經常大包小包的買各種好吃的東西，到我們家

    讓我們大家享受美食，所以後來儘管她因為借高利貸，讓大家都受到拖累，大家也拿她

    沒辦法。


    # 月木一百八——過度自信帶來的對立衝突


    月木一百八的人很熱情、自信。但當事人要小心自己會有過度自信、自以為是的問題。許多月木一百八的人會跟別人因為哲學、神學或個人原則起衝突。月木一百八的人也要小心跟法律產生衝突，如果木星又跟冥王星九十的時候，最容易出現法律問題。

    一百八十度具有對外投射的特質，木星又跟社會有關，所以月木一百八的對立，常

    常會跟社會或者某一個組織團體有關，最常見的是家人之間的宗教衝突。

    月木一百八常常會顯現在家庭生活跟宗教生活的衝突與對立，導致家中的不和諧狀'
  merge: -1
  pgno: 62
- img_proc: true
  md: '況。它跟月木九十金錢上的過度浪費不太一樣。很多月木一百八的人，當事人母親可能是宗教狂，不管是信基督教、信佛教、信一貫道、信各種的教，她們不但自己信得很狂熱，她們也希望全家都跟她們一樣，家中因此出現很多衝突。有一個我認識的朋友，他媽媽就是信一貫道，信教信得非常熱衷，一天到晚要她兒子去信教，兒子只好盡量躲著她。


    # 月木一百二——女性貴人的幫助


    月木一百二跟月木合相的人都會遇到對他們很有幫助、能夠提供很多資源的母親。兩者的差別在於，月木一百二的人，他們的母親會鼓勵他們、提供充分的資源，對小孩卻不會過度寵溺，所以月木一百二的人長大以後，他們樂觀大方，但是不會自以為是。

    對於女性當事人來說，她們會遇到這樣的母親，長大之後她們也會具備同樣的特質，成為能夠為先生、小孩提供資源，很能鼓勵他們的人。對於男性當事人來說，他們'
  merge: -1
  pgno: 63
- img_proc: true
  md: '容易遇到這樣的母親，也容易娶到這樣的妻子，他們容易從妻子身上得到物質跟精神上的雙重利益。


    例如知名小說家亨利米勒（Henry Miller）就是月木一百二，他的情婦安涅絲寧（Anais Nin）不但跟亨利米勒上床、給他生活費，連亨利米勒的第一本書，都是安涅絲寧幫忙集資出版。


    社會學家卡爾馬克思（Karl Marx）也是月木一百二。馬克思因為政治理念而流亡海外，移居英國倫敦以後，花了三十幾年都在大英博物館圖書室中研究、寫作，可以說幾乎沒有固定收入，還好太太對他非常支持，而且娘家家境不錯，能夠提供必要的幫助，讓馬克思沒有後顧之憂。此外，馬克思的日月合相在金牛，木星在摩羯，這也意謂著他不但月亮木星一百二，太陽跟木星也是一百二，也就是說，他不但有女性的貴人，也有男性的貴人。馬克思的摯友恩格斯（Friedrich
    Engels）為他提供了大量經濟上的支持，甚至在馬克思過世之後，還幫他繼續整理未出版的手稿，花了十二年的時間，讓資本論第二、三卷得以出版。


