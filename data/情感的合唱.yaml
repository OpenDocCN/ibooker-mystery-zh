    Callas）就有水海一百二的和諧相，而且她的水星在人馬十九度，海王星在獅子二十度，水海形成了誤差度數不到一度的緊密和諧相，加上她的水星在高昂嘹亮的人馬，海王星在具有明星魅力的獅子，因此她唱歌的時候會讓人感覺歌聲宛如天籟。


