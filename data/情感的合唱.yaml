  md: '月亮代表當事人生命中的⚼要女性,對於月水九十的女性來說,除了母親之外,也代表她自己。月水九十的衝突會反映在容易焦慮的母親身上,母女關係的不和諧也會造成她自己容易有情緒的困擾。月水九十的衝突大大小⼩,嚴重性各⾃不同。例如影星林青霞就有月水九十剋相。她有⼀張非常好的本命星圖,可是這張圖上最⼤的問題,就是⽉亮相位不好。由於她的月水九十是誤差度數很⼩的準確九十度相位,她的媽媽常常跟⼦⼥有衝突,⾮常神經質,很容易焦慮,精神狀況⼀直不太穩定,最後選擇以跳樓⾃殺結束了⾃⼰的生命。可想而知,這個問題也容易變成林青霞⾃⼰的困擾。


