  md: '五七七年也是塞爾特文明發展的時期，範圍涵蓋今天英國的蘇格蘭、威爾斯與愛爾蘭等地，這些地方的文明歷史比英格蘭文明悠久許多。我們很容易在這些地方看見與古老知識系統相關的連結，包括塞爾特文明中有一個很重要的德魯伊神祕教派，它跟太陽神崇拜有很深的關聯。


