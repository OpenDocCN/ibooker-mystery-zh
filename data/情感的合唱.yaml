- md: "星圖得以平衡。一個人有火冥的負面相位時，就算有其他天王星、海王星的好相位來幫助平衡，火冥的負面能量也不可能消失，天王星、海王星的好相位可以讓當事人更有智慧的去面對火冥功課，但是這些功課不可能不出現。\n\
