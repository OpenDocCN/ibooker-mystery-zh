  md: '# 水土一百二 | 理解現實帶來的實際利益


    水土一百二是比水土合相更好的相位，原因在於水土合相時，由於土星的力量太大而壓制到水星的發展，但水星跟土星如果形成的是一百二十度相位，當事人的水星不會受到土星的壓抑，又能夠透過一百二十度和諧相的幫助，得到跟社會有關的現實利益，因此水土一百二是一個容易出名人的相位。


    水土一百二的人都很聰明，他們的腦筋都很清楚，記憶力也很好。相較之下，水木一百二雖然利於求學，但是水木一百二帶來的通常只有短期的記憶力，他們雖然記得快，但是往往一考完就忘記，因為記憶要靠結構，記東西的時候有條理、有組織，這樣才能夠記得久。


    水土一百二的人記東西一定是有方法的，他們不是死記，他們的思想有組織性。你跟水土一百二的人講話時會發現他們說話很有邏輯，他們絕對不會想到哪裡講到哪裡，他們話的背後都有層次、有章法。'
  merge: -1
  pgno: 141
- img_proc: true
  md: '水木一百二的人對於社會與現實的理解力很強，他們通常在語言、建築、教育、管理、政治上都會有不錯的表現。水木一百二的人不見得會懂政治，但水木一百二的人一定懂政治、懂社會，而且一定懂商業，他們一定會懂現實當中的邏輯，不會只是某種理想。水木一百二的人理想且樂觀，他們懂的可能是理想的邏輯，卻不見得能懂現實的邏輯。但水木一百二的人所有的事情都是計算過的。水木一百二的人思考側重權威性，他們表達出來的東西也容易成為權威，而不會只是流行。


    例如導演王家衛就是水木一百二的人。如果將王家衛跟蔡明亮做個比較，就可以看出，王家衛可以在香港那樣子的環境當中用特有的觀點詮釋電影，而且可以控制大牌明星，可以讓人家出資供他拍戲，某一程度來說，他腦筋裡面有某一部分是企業家，他可以說是用企業家的方式在拍個人的藝術電影。水木一百二的人知道真正的市場在哪裡，他們唯一的缺點就是不會幻想，除非當事人像王家衛一樣有很好的金星相位，或者有很好的海王星相位，否則這會讓他們難以從事創作。僅有水木一百二相位的人無法從事太空想的事業，因為這是個很執著於現實的相位，他們也容易得到現實的好處，但他們的問題也是不容易跳開現實。他們是格子裡的寫手，無法成為格子外的作家。這些人'
