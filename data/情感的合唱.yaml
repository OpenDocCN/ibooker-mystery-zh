    從這裡大家可以看到，單憑月亮的相位與星座、宮位，就同時顯現出我兩個妹妹、我的母親跟我自己的狀況。


    星座、宮位、相位是占星學最重要的三大基本功。行星落在什麼星座、行星落在什麼宮位，以及行星跟行星之間形成什麼相位，透過這三個面向，占星學得以解讀出每個人不同的生命風景。


    十二個星座代表了十二種不同的特質，當行星落入不同的星座，就會透過不同星座展現出不同特質。舉例來說，水星代表了一個人的思考與溝通，水星牡羊的人思考都會具有原創性，而且勇於表達自己的意見；水星金牛的人思想與溝通都很務實，他們對沒有意義的閒聊不感興趣。


    十二個宮位代表十二個生命情境不同的領域，例如一個人的水星落在二宮金錢宮，當事人就會將水星的心智，發揮在跟理財有關的領域，如果一個人的水星落在十宮事業宮，當事人就在事業舞台上展現水星的機智與口才。'
  - '[PAGE 26]


    十二個宮位，分別代表以下十二個生命舞台：


    一宮：童年環境，以及一個人看起來的感覺。


    二宮：靠自己賺取的有形與無形的資產。


    三宮：基礎教育、大眾媒體、寫作、兄弟姊妹。


    四宮：家庭生活、內心之家。


    五宮：戀愛、創作、子女、娛樂與賭博。


    六宮：工作、健康，維持生命正常運作的事情。


    七宮：伴侶、配偶、一對一的合夥關係。


    八宮：權力、潛意識，與他人相關的金錢與性。


    九宮：高等教育、哲學、宗教，旅行及外國事務。


    十宮：事業、地位、社會形象。


    十一宮：志同道合的友誼及社團關係。


    十二宮：前世、業報與無意識。'
  - '[PAGE 27]


    相位代表了行星與行星之間因為特定角度而產生的關聯。正面相位會讓能量增強，負面相位的衝突，往往會引動出雙方的負面能量。一般來說，形成相位的誤差度數在六度以內，都會具有一定的影響力。誤差度數越大，影響力越小，誤差度數越小，影響力就越大。


    占星學中的主要相位，可分為合相、九十度衝突相、一百八十度對立相、一百二十度和諧相。四個主要相位的意義如下：


    合相：當兩顆行星之間的距離在六度以內，雙方的能量就會因為不斷互相刺激而被強化。合相就像是兩顆行星齊聲合唱般能量很強，但是如果遇到本命星圖或行運剋相，就會帶來雙倍的負面能量。也就是說，合相的力量雖強，但是可能是大好，也可能是大壞。


    九十度衝突相：當兩顆行星之間形成九十度相位，雙方就會各唱各的調互相干擾，因此引發出彼此的負面能量。


    一百八十度對立相：當兩顆行星形成一百八十度相位，代表雙方完全南轅北轍，往'
  - '[PAGE 28]


    往會因為對立而互相挑戰,因此會比九十度的衝突內耗能量更強。

    一百二十度和諧相:一百二十度是一個比零度合相更好的相位。原因在於兩顆行星彼此可以互相幫助,但是不會出現合相的過度刺激的負面作用。


    以下頁影星瑪麗蓮夢露(Marilyn Monroe)的星圖為例。最外圈的三百六十度刻度被等分為十二個星座,標示出行星的星座與度數。從圖中可以看到,瑪麗蓮夢露的太陽在雙子座十度、月亮在寶瓶座十九度。


    第二圈被阿拉伯數字劃分的十二個區塊,就是十二個宮位。瑪麗蓮夢露的海王星落在一宮、土星在四宮、月亮跟木星在七宮。


    最內圈的連線代表了行星之間的相位,為了方便閱讀,一百二十度相位以「△」標示,九十度相位以「□」標示。瑪麗蓮夢露的太陽在雙子十度,水星在雙子六度,太陽水星形成了誤差四度的合相;金星在牡羊二十八度,海王星在獅子二十二度,形成誤差六度的一百二十度和諧相;土星在天蠍二十一度,海王星在獅子二十二度,形成誤差一度的九十度剋相。'
- md: '## 月亮與水星：情緒與心智的互動


    月亮相位通常會展現在當事人小時候跟母親的相處關係。從月亮跟水星形成的相位中，可以看出當事人小時候跟母親之間的溝通狀況，月水相位好的人小時候跟母親很談得來，長大以後也會跟家人也會很談得來，這也意謂著當事人的情緒跟心智之間的能量和諧。


    如果月水形成的是九十度或一百八十度剋相，當事人小時候一定跟母親會有溝通上的問題，長大結婚以後也會在自己的家庭中遇到同樣的問題。


    不過如果沒有其他剋相的話，單純的月水剋相雖然會讓家人或夫妻之間溝通不順暢，但是不見得會出問題。因為人際關係之間的意見不合其實沒關係，很多時候家人之間吵來吵去只是大家在拌嘴，很多夫妻一天到晚在吵架，但是兩人的感情還是很不錯。


    ### 月水合相 — 以語言表達情緒


    不管男女，一個人如果本命星圖中月水合相，除非同時月亮還跟其他行星形成剋相，否則當事人都會有個很能跟子女溝通的母親。即使他們的母親一輩子只是個家庭主婦，當事人都會覺得媽媽很聰明、很有才智、很會動腦筋，他們跟母親很有得聊。


    並不是所有的男人都喜歡美女，對於月水合相的男性來說，由於從小跟母親很有得聊，長大以後如果娶到一個無法聊天的太太，他會覺得怪怪的。對他們來說，可以跟他們溝通比漂亮更重要，當他們遇到談得來的女生的時候，就很容易喚起他們的感情，讓他們覺得熟悉。所以月水合相的男性喜歡挑選聰明的、談得來的女生來做自己的伴侶。


    由於月亮是陰性的能量，所以月水合相的人聲音都會比較柔軟，而且可以用語言表達情緒。除非月水合相時又有別的剋相，否則月水合相的人講話都會比較委婉，基本上他們講話都不會太衝，也不會說出很苛刻的言語。即使水星落在非常直率的人馬，他們講話時也會比一般的水星人馬委婉許多。對於月水合相的女性來說，這些特質本來就符合女性的既定形象，別人未必察覺得到，但如果當事人是男性，這些特質就會讓人感到很特別。例如前內政部長吳伯雄，就是月水合相的人。


    此外，月水合相還有個特色，就是月水合相的人會處理很多家庭事務，他們的聰明才智與心思，有很大部分會放在家中。像我有個月水合相的朋友，他是一個醫生，可是家裡大大小小的事情都要他去處理，吳伯雄也有類似的狀況。有的男生可能一輩子都沒有碰過家裡的事，簡直跟房客一樣，但月水合相不論男女都不會這樣。


    ### 月水九十——衝突不斷的溝通障礙


    當一個人的月亮與水星呈九十度的衝突相，代表當事人跟母親之間從小就很容易有意見上的分歧。當事人的母親比較容易焦慮，也容易因為情緒焦慮而批評子女，跟子女容易產生溝通障礙，而且程度會跟相位的緊密程度成正比。如果是誤差度數為零的精準九十度剋相，當事人母親情緒焦慮的情況會很嚴重，很可能精神與心智也會很不穩定。


    如果水月九十的交角比較寬，還差三、四度以上的話，當事人的母親也會顯現這種特質，但情況不會這麼嚴重。


    不論男女，月亮跟水星九十度時，當事人會感到很難與母親溝通，他們常常會因為想法上的差異，而讓雙方感到受傷。月水九十的人對於別人的批評非常敏感，他們特別不能被人家批評，不管是母親、太太或兄弟姊妹都一樣，任何一點的批評，都可能讓對方覺得很嚴重，造成情緒的衝突，情緒的傷害。在任何人际關係中，如果其中一方對於批評過度敏感，完全不能被批評的話，關係自然不會很和諧。


    對於家庭生活的看法不一致，也是人與人之間產生衝突最主要的一個原因，尤其是家人，因為家人住在一起往往沒有分界，而在生活中我們容易觸及的就是家事，所以也比較容易在這些方面引起衝突。月水九十的人家庭生活不會很穩定，家中常常會為了家事起衝突，爭執內容甚至會涵蓋家裡的清潔、衛生、家事怎麼做等日常生活瑣事。


    月水九十的人雖然容易跟姊妹、母親、妻子之間產生衝突，可是基本上這個相位並不容易造成關係的分裂。很多關係親密的夫妻，其實也一天到晚都在吵架。吵架從來都不是人與人之間會分開的原因，除非星圖上面的月亮有其他的剋相。


    月亮代表當事人生命中的主要女性，對於月水九十的女性來說，除了母親之外，也代表她自己。月水九十的衝突會反映在容易焦慮的母親身上，母女關係的不和諧也會造成她自己容易有情緒的困擾。月水九十的衝突大大小⼩，嚴重性各⾃不同。例如影星林青霞就有月水九十剋相。她有⼀張非常好的本命星圖，可是這張圖上最⼤的問題，就是⽉亮相位不好。由於她的月水九十是誤差度數很⼩的準確九十度相位，她的媽媽常常跟⼦⼥有衝突，⾮常神經質，很容易焦慮，精神狀況⼀直不太穩定，最後選擇以跳樓⾃殺結束了⾃⼰的生命。可想而知，這個問題也容易變成林青霞⾃⼰的困擾。


    九十度的剋相跟⼀百⼋⼗度的差別在於九十度是⼀種內耗，它會是⼀直存在的衝突。我有個朋友也有月水九十的問題。由於她的星圖上還有⽇⼟九十的剋相，從⼩她⽗親就不太回家，照理說，母親應該是這位當事⼈很重要的依靠，可是她跟媽媽之間從⼩也不斷爭吵，吵得⾮常嚴重，這讓當事⼈後來產⽣焦慮問題，⼀直在看⼼理醫生。


    對於月水九十的⼈來說，在他們的親密關係經驗中，所有跟講話相關的記憶通通是不愉快的，因此當他們年紀越來越大，會變得越來越不愛跟⼈講話。不少年過三十的月水九十，他們在社交場合中話⾮常少，除非是商場應酬或帶有功利⽬的的必要情況，他們才會開口，否則平常不會為了要跟別人建立情感關係而說話。


    我有七、八個朋友就是這樣。這幾個月水九十的朋友不分男女話都不多，但他們可能會在某一些特殊狀況下突然多話了起來，譬如像喝了酒之後。他們平常都會寫點東西，這種情況跟不會寫東西而話少是不同的，這代表他們其實不是沒有能力表達自我，而是他們跟別人在日常生活中有言語上的溝通障礙。


    剛剛說過月亮水星九十度的人，常常會為了家事吵架，我這邊有個有意思的故事。我有个很熟的朋友就是月水九十，從小到大我一直看他跟自己母親為家中大大小小的事起衝突。在占星學中，月亮除了家庭之外，也跟房屋有關，這個朋友偏偏長大以後做了室內設計師。當居家設計成為他的職業之後，他的月水九十讓他以前常常跟母親吵架，長大以後變成常常跟自己的客戶吵架。由於月亮跟女性有關，我發現他只要遇到的是男性業主或公家機關的案子就相安無事，但只要是女性業主都會跟他吵架。其中跟他有過衝突的兩位女性業主，還是我認識的朋友，這兩位女生當初在找他的時候，看過他所有的作品，都覺得很好，可是做完之後雙方都翻臉。這兩位女性朋友都批評這位設計師的作品雖然有特色，但根本難以住人。也就是說，月水九十的設計師表面上看來好像做了很多聰明的設計，可是這些功能完全是展示性質，住起來很不舒服。所以後來我提醒他，月水九十代表他跟女性業主以及家庭相關事務上特別沒有緣分，接這類的案子一定會倒楣，還不如多接些公家案。


    ### 月水一百八——貌合神離的互不溝通


    如果大家觀察一下身邊的小孩，就會發現，很多小孩會跟母親吵嘴。但是月水一百八的小孩不會。月水一百八的人可能會碰到一個很會批評他們的母親或妻子或女兒，可是當事人並不會回應。月水一百八的人你不管怎麼囉嗦他，他就隨便敷衍兩聲，或者就當做沒聽到，他們不會跟你吵，根本不對抗，可是基本上他跟你之間比月亮水星九十度的人還更不和，只是他們不把衝突表現出來而已，他們根本不想溝通，所以連吵都懶得吵。


    月水一百八的人家庭生活一定有問題，可是這些問題從來沒有浮出過表面。當事人與親密女性關係之間從不溝通，長期下來會形成一種冷戰的狀態。他們從小跟媽媽合神離，長大以後就可能跟太太貌合神離，跟姊妹貌合神離，也跟女兒貌合神離。相較於月水九十的衝突，月水九十意謂著他們知道彼此之間是為了什麼感到不愉快，譬如說為了家事怎麼做，為了牙膏怎麼擠之類的問題，雙方都會很清楚，而且這種衝突會訴諸言語表現。但月水一百八的情況就不一樣了。一百八的對立不像九十度的衝突內耗，當事人從小就容易跟母親形成一種幾乎是盡量不要說話的冷戰狀態，而不是吵架或爭執。表面上兩人關係會比月水九十度的人看起來還要好，因為他們不會經常吵架，也不會在別人面前起爭執。月水九十之所以會吵個不停，代表他們一直希望可以說服對方，希望對方能跟自己的想法達成共識。相較之下，月水一百八不把話說出來其實等於放棄溝通。月水一百八意謂著雙方對於事情的觀點南轅北轍，他們根本不覺得雙方可以達成決議，所以選擇各行其是。


    月水一百八的人從小跟母親上的溝通問題，會使當事人在語言表達上比較退縮，他們通常會比月水九十的人更沈默，也更不願意跟人討論雙方的歧見。由於他們常會將無法溝通的情緒問題轉移到別的地方，所以容易引發身心症。有些月水一百八的人，會有飲食不正常的狀況，也有一些人會在家庭生活中顯現出過度的潔癖，或是過度的邋遢，非常極端。


    ### 月水一百二——溝通順暢的內在情緒


    月亮跟水星一百二，當事人不管男女，都會碰到跟他們溝通無礙的媽媽。他們跟母親很談得來，雙方不太會吵嘴，彼此意見很協調。月水一百二的人常常覺得母親很聰明，他們跟母親就像是朋友，母親也經常扮演意見庫的角色。他們的家庭生活會比較和諧，也比較不容易為了家裡的事情去爭執。


    從小跟母親意見協調的水月一百二，長大以後也容易跟身邊的女性談得來。水月一百二的當事人如果是女性的話，主要的談話對象會是姊妹淘，她會比較喜歡跟姊妹淘相處，也會有許多感情很好的姊妹淘可以陪她談心。當事人如果是男生的話，他們會比較喜歡跟女生談話，也比較願意透過聊天將心裡的感覺與想法說出來。很多人跟別人聊天時是不告訴別人心事的。可是月水一百二的人有個特色，他們的心事會是他們與人溝通時的重要主題。


    水月一百二的男性也常常會娶跟他們很談得來，很能給他們意見的太太。我有個水月一百二的朋友就是這樣，雖然因為其他星圖上的問題，所以他跟他的太太已經分居很久，太太住在台灣，先生住在國外，但是有時是為了家裡的事，有時是為了公司的事，兩人還是經常通電話，他們之間的互動，其實比很多住在同一屋簷下的夫妻還多。先生有時候回到台灣的時候，他們還是住在一起，還是會跟朋友一起聚會。而且我認識他們那麼多年，從來沒有看過這對夫妻吵架，由此可見人與人之間的緣分真的有數不清的可能性。


    ## 月亮與金星：安全感與感情的互動


    金星代表的是一個人的喜好，金星代表的是一個人喜歡什麼，它跟月亮的情緒安全感是不同的。


    一個人不可能不知道自己喜歡什麼東西，它是一種本能，但是很可能這樣的東西並不適合自己。月亮與金星如果形成負面相位，當事人就會遇到安全感跟自己喜歡的事物無法兼得的問題。這就像是一個人喜歡吃的是麻辣鍋，但是他也知道就算再喜歡也不能餐餐吃，因此不得不做出別的選擇。他也許只能偶爾偷偷吃，或者從此戒掉麻辣鍋，但這個人內心深處都會知道自己放棄了真正喜歡，卻不能夠擁有的東西。


    ### 月金合相——安全感與美感合而為一


    月亮金星合相的人，通常會有個具有魅力的母親，他們的母親不見得一定是美人胚子，但一定會被一般人認為具有某種吸引力。月金合相的男生，長大以後娶的太太，也通常面貌姣好，他們生命中的重要女性往往都很漂亮。


    當事人的母親或妻子通常會比較愛打扮，尤其喜歡美麗的衣服、美麗的居家環境，比較喜歡社交、享受，個性也比較敏感、比較溫柔、有點虛榮，有點像王家衛電影中經常出現的那種母親角色。


    金星跟生活中的美感有關，當一個人月亮跟金星合相，他們的母親通常會有些才藝，但不見得是藝術的才華，她們通常都會烹飪、做衣服，或佈置家庭、插花之類的才藝。


    小說家D.H.勞倫斯就有月金合相，這也意謂他會有戀母情結，因為月亮代表的母親與他的喜好——金星形成合相，這代表他的母親與他喜歡的女性原型結合在一起，以後他的太太也會反映出這種情結，當然這並不見得會形成亂倫，但精神上一定有一點戀母情結。


    像 D. H. 勞倫斯作品《兒子與情人》，其實就在描述戀母情結。勞倫斯跟母親之間的關係也非常親密，勞倫斯出外時，一直會與他母親通信，信件內容簡直與情書沒什麼兩樣，好比「我今天一整天都在想你」、「記得寫信給我」等等，如果看過《查泰萊夫人的情人》的讀者就會知道，查泰萊夫人與男主角之間簡直就像母子關係。勞倫斯當然沒有跟他媽媽在一起，可是他後來找的太太，跟他相處時也如同母子。


    我有個親戚，就有月金合相，他有個好看的媽媽，可是因為他同時還有月天一百八，所以他媽媽在他小時候就跟他爸爸離婚了，後來這個小孩子長大之後在大陸也娶了一個很漂亮的天津女孩，不過不到兩年就離了婚。他的月金合相，顯現出他的母親與太太都很漂亮，可是月天一百八讓他與他媽媽、太太之間都沒有緣分。他媽媽現在已經五十幾歲，還是滿好看的，她會花很多時間整理家務，平常也很會打扮。月亮金星合相的人往往媽媽很會打扮，出現時永遠都是妝點得很好的樣子，如果當事人是男性，他的太太也很會打扮，如果當事人是女性，她們自己也很會打扮。


    ### 月金九十——安全感與情感的兩難


    當本命星圖中月亮跟金星形成九十度衝突相，代表當事人會在生命中遇到月亮安全感與金星感情的兩難。月金九十的人可能會因為注重安全感、物質的舒適與社會關係，導致感情被犧牲，他們也可能必須犧牲安全感或資源來得到感情。


    月亮金星九十度的人不管男女，他們的媽媽當初可能是為了金錢結婚，當事人自己在生命中，也會在財務安全感與感情之間游移擺盪。他們的現實安全感與情愛無法同時並存，也容易喜歡上讓他們覺得沒有安全感的對象。當事人害怕親密的關係，因為他們在月亮的親密感與金星的喜歡之間常常會出現衝突，他們的生活中，也容易出现跟財務相關的衝突。


