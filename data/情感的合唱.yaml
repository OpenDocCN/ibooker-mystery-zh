    CNN 創辦人泰德透納（Ted Turner）就有金木九十的愛花錢問題。他在西元兩千'
  - '[PAGE 179]


    年年初的時候，因為 CNN 跟 AOL 合併賺了很多錢，於是捐了一億美金給聯合國去做和平計畫。這是因為泰德透納的木星在寶瓶，所以他在金木九十金錢上的大膽，就反映在寶瓶的理想主義上。


    我在看星圖時常常感到有趣的地方在於，例如金木九十的人都會有愛花錢的傾向，但把錢花在哪裡，就有很大的不同。一個金木九十的人，只要錢不是跟銀行借貸來的，或是跟別人騙來的，如果他花的錢都是自己賺來的錢，就算老了以後身邊剩下的錢不多，但是他一輩子對於社會繁榮的貢獻，會勝過金土相位的人。因為木星畢竟是一種跟社會利益有關的能量，一個花錢花得很浪費的人，他們在促進社會利益上的功勞，其實會比土星大。尤其像是泰德透納的浪費，是為了理想主義的目的——一個在花錢上很理智的人不可能一口氣捐這麼多錢。如果就個人角度來說，像他這樣捐錢的確過度慷慨，但是如果他負擔得起，比起花錢精打細算，把子孫三代的現實考量全部算好之後才肯花錢的金土一百二，其實金木九十的人反而花錢花得很痛快。所以這種相位吉凶，有時候好壞倒也很難論斷。'
  - '[PAGE 180]


