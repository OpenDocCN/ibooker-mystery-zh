  md: '# 月金九十——安全感與情感的兩難


    當本命星圖中月亮跟金星形成九十度衝突相，代表當事人會在生命中遇到月亮安全感與金星感情的兩難。月金九十的人可能會因為注重安全感、物質的舒適與社會關係，導致感情被犧牲，他們也可能必須犧牲安全感或資源來得到感情。


    月亮金星九十度的人不管男女，他們的媽媽當初可能是為了金錢結婚，當事人自己在生命中，也會在財務安全感與感情之間游移擺盪。他們的現實安全感與情愛無法同時並存，也容易喜歡上讓他們覺得沒有安全感的對象。當事人害怕親密的關係，因為他們在月亮的親密感與金星的喜歡之間常常會出現衝突，他們的生活中，也容易出现跟財務相關的衝突。


    男性當事人容易遇到為了安全感而跟他結婚的妻子，妻子不見得真的喜歡他。女性的話容易以自己的母親為榜樣，也常為了追求安全感而跟一個她不見得真正喜歡的對象在一起，她們常常會為了物質生活而結婚。'
