  merge: -1
  pgno: 45
- img_proc: true
  md: '因而容易過度發展金星的那一面。月金一百八的人，尤其是男性當事人，長大以後常常會有兩種狀況：第一種狀況是他們可能會很需要愛情，即使在婚後，當事人還是會去追求他喜歡的對象，他們會有一種不斷戀愛的強烈需求，想要用談戀愛來彌補童年欠缺的母愛。另一種狀況是當事人會有強烈的物欲，他們會用物質上的享受來取代安全感，或者是用金錢來彌補匱乏感。如果當事人是女性，她們從小遇到的就是過度重視金星的母親，她們自己長大以後也會成為這樣的人。所以很多月亮金星一百八的女生，會對珠寶或服飾特別執著。


    如果一個人拜金、拜物到了很嚴重的程度，往往童年都有缺乏母愛的問題。例如我認識一個月金一百八的人，由於當事人星圖中還有其他嚴重的剋相，所以母親很早就過世了。月金一百八本身並不會造成母親早逝，但是母親早逝卻會讓當事人從小缺乏母愛，因而導致當事人長大以後過度重視物欲，因為這些物質對他而言，等於是母親的象徵。


    同樣的道理，一個人如果從小欠缺母愛，長大以後就常常會很本能的想要藉由不斷的談戀愛來取代母愛。如果沒有月金剋相的問題，一般人不會一輩子不斷的在談戀愛，'
