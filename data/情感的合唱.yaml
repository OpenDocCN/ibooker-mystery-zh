  md: '行運形成準確相位，剋相最嚴重的時間前後不過兩個半月，其實只要能過熬過這兩個半月，難關也就過去了，但很多人就是熬不過這兩個月。如果將占星學跟現實生活結合，想要安度這兩個多月，有幾個具體可行的方法。


    如果經濟狀況允許的話，可以考慮在行運剋相的那段時間離開台灣。因為當事人遇到的問題往往跟宮位情境有關，宮位會隨著經緯度而改變，出國一段時間，尤其是行運形成精準剋相的那兩個半月期間，地運的改變能使當事人遠離壓力源，有助於安度這段危險期。


    行運形成精準剋相的兩個月時間，往往也是當事人遇到的問題壓力最大的時候，有的人可能會覺得這個時候離開台灣，等於是不負責任。但月土九十最大的問題就在於土星帶來的責任。不看重責任的人其實根本不會想要自殺，月土九十的人最重要的就是一定要學習別被責任給逼上絕路。在行運剋相時，即使無法出國，在壓力最大的半年期間，不管是工作的責任、感情的責任、家人的責任，全部都先丟開，等到行運剋相結束，再回來慢慢面對。留得青山在，不怕沒柴燒。


    土星的剋相帶來的是現實世界的壓力，最能夠拯救土星月亮九十的，就是具有藝術'
