    如果將火木合相跟火土合相做個比較，火木合相的人做事時比較熱情，因為他們是憑著興趣來做事，他們只要樂觀的展現木星能量就可以了，但是火木合相的人往往不會'
- md: '# 火土九十：權威壓抑的活力扭曲


    火土九十的人成長過程中往往會受到嚴重的父權壓制，使得當事人的肉體與自我能量難以施展。很多火土九十的人小時候被管得很嚴，而且很多人小時候會受到體罰，經常會挨打。我有個親戚的小孩就有火土九十相位，他從小就被父親虐待，儘管後來父母離婚，監護權歸母親，但是父親依然有探視權，每次這個小孩只要知道父親要來看他，就會嚇得發抖。


    當一個人本命星圖中火星與土星出現九十度剋相，代表當事人的活力會受到抑制，他們會將受到壓抑的火星能量轉為追求土星的成就，因此他們會對世俗成就有很強烈的欲望。如果當事人星圖中有好的相位，這些人也可能會成功，但因為當事人習慣將自我能量拿去發展事業，所以都會有活力低落的問題。由於他們火星的能量扭曲，這些人要不然就是心臟不好，要不然就是血液流動不順暢，他們也容易出現骨骼慢性疼痛的問題。


    火土九十並不是個順利的相位，當事人早期的活力會受到父權限制，長大後會努力追求社會肯定，他們有時會有階段性成功，但也容易嚐到失敗的教訓。他們想要以社會成就取代父親的肯定，以社會的父權來取代父親，但火土九十的負面相位，遲早還是會讓當事人挨上社會的巴掌。


    舉實例來說，導演楊德昌與歌劇名伶卡拉絲都是火土合相。楊德昌在正式執導筒之前經歷了非常漫長的學習、準備過程，卡拉絲在出名之前也經過非常漫長而曲折的訓練，他們的成功都絕對不是一蹴可幾。


    例如希特勒的童年就遇到父親的虐待，長大以後明顯的想要藉由社會成就來彌補童年受到的創傷，火土九十的剋相反映在他過度發展土星的負面能量，過度功利、運用很多權術的手段，雖然爬得很高，但是最後還是重重挨了社會一巴掌，因為戰敗而自殺。


    此外，電影大師卓別林也有火土九十的剋相，他的童年生活非常辛苦，後來到好萊塢發展，電影事業非常成功，但是美國當時麥卡錫保守主義盛行，卓別林也因為輕微左傾的政治態度而被列入黑名單，不得不離開美國而中斷了電影事業。


