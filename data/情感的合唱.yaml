    ## Chapter/21


    ### 金星與海王星：情感與靈性的互動


    大家在金星的章節中或許會發現，跟金星有關的名人中，演藝圈或政壇明星佔了很大的比例，作家的比例就低很多。這是因為金星的能量跟當明星很有關，而水星的能量跟寫作比較有關。


    金星跟受歡迎有關，這個世界上最受歡迎的永遠是明星。金星也代表愛的能量，得到廣義的愛的能量最多的也是明星，很多人都會把愛的能量投射在自己喜歡的明星身上。金星就是一種桃花，一個人的金星桃花力量一定要夠強，他才有可能得到眾人喜愛而成為明星。簡單來說，一個藝人其實不需要太陽或水星有很好的相位，只要金星相位夠好，就可以很受大眾歡迎。


    金海相位跟金天相位有一些不同。本命星圖中有金海相位的人也很有魅力，但是魅力不像金天相位那麼直接、強烈。如果以藝人而論，金天相位會比金海相位成功得更快。金海相位會為當事人帶來一種神祕感特質，但是這種特質未必能立刻讓他們竄紅。而且海王星是一顆藝術星，金海相位如果從事演藝工作，他們的表演方式也會比天王星更傾向藝術化，比起演藝圈，他們更適合往藝術圈發展。


    金天一百二的舒曼，作品很好聽，很吸引人，但是不會讓人感覺到金海相位會帶來的一種神祕感、神聖性。如果就表演來說，金天一百二的作品會立刻吸引到大家的注意。如果將木星視為大眾藝術，天王星就可說是高階的大眾藝術。但如果提昇到脫離塵世的作品，就得要靠金海相位才做得到。


    儘管天王星跟海王星是完全不同類型的能量，但當它們跟金星形成相位，都會使當事人呈現出某一種迷人的魅力，例如影星蘇菲亞羅蘭（Sophia Loren）就是金海合相。所有本命星圖中有金天、金海相位的人長得都不會難看。這是因為金星本身跟美貌有關，金星就是桃花，即使可能是不同種類的桃花，它都一定是桃花，不會是喇叭花。金海一百二的明星多不勝數。包括瑪麗蓮夢露、詹姆斯狄恩（James
    Dean）、這些都是死後依然被人懷念的明星，海王星對身後名的影響力，往往比天王星更大。


    海王星跟土星一樣，都具有宿命的特質。金土相位遇到的情感關係，往往會讓當事人覺得自己遇到的是宿命的孽緣，但所有金海相位的人追求的都會是一種宿命的情感關係，他們會對這種宿命關係有很強的嚮往，而不像金土相位面對宿命關係時的無可奈何。


    所有本命星圖中有金海相位的人，無論相位好壞，他們都必須要在現實生活中找到一個適當的能量出口，否則如果只拿愛情做為金海能量的出口就會很慘，因為他們要的並不是人間的愛情，他們只有從藝術中才能得到海王星想要的理想之愛。


    即使金海相位中最好的金海一百二，人間的愛情總是會讓他們失望；而即使是金海相位中最差的金海九十，他們去從事藝術也都一定會獲得比人世之愛更大的滿足。因為他們在世俗的戀愛上一定談得一塌糊塗，不是只能暗戀就是被人辜負，唯有將這種能量拿去從事藝術工作，他們金星的能量才比較能夠獲得正面發展。


    ### 金海合相——過度夢幻的情感理想


    本命星圖中如果金海合相，代表當事人常常會耽溺於幻想。他們很易感，容易戴著粉紅色鏡片一樣來看這個世界。由於海王星是一顆脫離世俗的行星，金海合相的人都會對感情很敏感，但也比較不容易得到他們想要的感情。他們在現實中的情感生活往往不會很幸運，海王星要的是非現實的理想，金海合相往往會使當事人不容易在現實中得到他們想要的理想感情。不過金海合相的人一生當中都會遇到一個對象，這個人會讓他們感覺到這是他們永恆的戀人——永恆的理想戀人通常越得不到越珍貴，得到了以後可能就慘了。


    由於海王星的非現實特質，所有金海有相位的人都缺乏金錢意識。即使他們可能有時候會遇到賺錢的好機會，但海王星都會抑制金星的現實性、物質性與世俗性。除非極少數金海合相的人，金海合相同時又跟土星一百二，或者本命星圖中除了金海合相，還有很強的水星或火星之類的內行星跟土星有一百二十度相位，讓他們的夢想可以藉著土星根著在現實世界，否則金海合相的人都不適合從事非常現實的工作，他們比較適合的是具有理想主義特質的事情。


    ### 金海九十——一廂情願的情感付出


    金海九十的人一生經常會陷入暗戀。不過金海九十的暗戀未必會出什麼紕漏，他們可能會暗戀一個人十幾二十年，但未必會讓對方知道，所以雖然不會有結果，但也不會惹出什麼麻煩。


    金海九十的人最要小心的是財務問題。會被騙財又失身的人，很多就是金海九十的人——會被人欺騙感情的人未必同時會被騙錢，被人騙錢的人未必同時失身。因為金海九十的人在感情上的付出是很不明智的、很一廂情願的，所以金海九十特別要留意這方面的問題。


    ### 金海一百八——不切實際的情感追尋


    金海一百八往往會是在感情上無法負責的人。金海九十的人常常會在感情上被別人虧待，他們會覺得自己無法從喜歡的人身上得到他們想要得到的愛；金海一百八的人則往往在人海中，連他們真正想要的人都找不到。他們常常會強烈的感覺到自己想要的愛，在人間是不存在的。


    金海九十的人常常會因為對方不夠愛他們而感到失望，而金海一百八可能對方明明對他們很好，但他們會覺得這些對方給的這些都不是理想的愛。


    金海一百八的人往往會有一種幻象，他們總是認為世界上有理想的愛這回事，結果導致他們的情感關係受到影響。例如我有一個金海一百八的朋友，每隔一陣子我就聽到她說想跟男友分手，因為她老是覺得她跟男友之間的情感不是她心中理想的愛。但事實上她跟男友一點問題都沒有，男友對她很好，也從來沒有出軌，兩人在一起也都有說有笑，可是她在情感上有一種只有她自己才知道的，極端的、不存在於塵世的靈魂之愛，因此金海一百八的人永遠不斷的尋尋覓覓。


    金海一百八的人並不是花心，因為他們並不是想要出軌找別人吃吃野食，他們在每一段感情中追求的都是一種神聖的愛。我有個朋友就是這樣，他在上海經商的時候認識了一個舞女，他真的相信對方是他追求的靈魂伴侶，於是很認真的打算回台灣跟太太離婚，但後來對方還是離開了他。


    金海一百八的人往往有個問題，越是得不到的感情，他們越相信這是他們想要追求的神聖之愛。金海一百八的人要特別注意的是，他們往往會因為無法得到他們想要的愛情，而求諸藥物、酒精或其他可以寄託情感的事物上。他們要小心當海王星的幻象讓他們對愛情感到失望時，他們會用酗酒之類的方式來滿足自己的情感。


    ### 金海一百二——浪漫靈性的藝術天分


    金海一百二的人通常都會很有想像力與創造力，他們很有藝術天分。他們對於感情很有理想，而且具有大愛的情懷。他們也很有慈悲心，很樂於幫助別人。英國浪漫主義重要詩人拜倫就有金海一百二相位。雖然他因為火星與天王星的相位被世人視為花花公子，但在他的內心，對於感情還是具有一種神聖的崇高理想，也因此，他後來會跑去希臘，參加希臘獨立戰爭。


    金海一百二的人在情感上不會很執著，所以拜倫曾經在威尼斯的時候，曾經跟很多女人交往。海王星跟金星的一百二相位會使金星的情感沒有邊界，也會使當事人很受歡迎，也因此拜倫會成為英國浪漫主義時期的代表性人物。


    ## Chapter/22


    ### 金星與冥王星：情感與控制欲的互動


    金天相位要新奇，不要控制，這兩件事情彼此並不相違背。金海相位要幻想，而且越得不到的越美，這兩件事更不衝突。以上金星的種種相位中，金冥的相位最累。因為金冥相位要的兩樣東西：激情與控制，它們是不可能永遠並存的。


    金天的好相位，財富往往隨著名氣從天而降，金海相位通常與錢無關——除非是相位不好，容易被人騙錢，否則金海的相位一定意謂著當事人重視情感勝過於金錢。而金冥的各種相位都一定會跟金錢有關，金冥所有相位都代表當事人的情感跟金錢是合一的。


    金冥相位跟金土相位在金錢態度上也不太一樣。金土相位的本質是一種小氣，但金冥相位喜歡的是控制金錢，尤其是大錢。金土相位的人不見得會有興趣做大生意，但冥王星一定有興趣。


    金冥相位不見得沒有外遇，但他們就算外遇，也會維持很久。例如金冥合相的法國作家雨果，他有一個情婦，雙方維持了二三十年的婚外情關係。


    金冥相位最麻煩的地方在於，他們要的是激情。但人在婚姻中是不可能永遠保持激情的。在這個地方金冥一百二的人算是比較幸運，他們比金冥合相的人好，比起金冥九十或一百八更不用說。金冥一百二的人如果能夠在婚姻中可以找到維持激情的方法，或者可以將他們的激情轉移到別的地方，他們就不會因為激情而產生大問題。


    所以如果一個有金冥相位的人，他們假如對藝術，或者對宗教等等都毫無熱情就很危險。因為他們都一定會有強烈的激情，如果這個激情不是投諸於「事」身上，就得要投諸於「人」身上。


    金冥的問題也在於他們很不喜歡離婚。我們之所以說金冥容易有三角戀情的問題，就在於他們不喜歡離婚——一旦離婚，三角問題也就不存在了。


    金星冥王星相位的麻煩之處在於不肯放手，我看過有人搞到後來不只是三角關係，甚至變成了四角關係，讓所有人都痛苦不已。


    任何相位都需要行運來啟動，金冥相位固然可能會引發痛苦而且麻煩的情感關係，但是也是在遇到行運行星跟本命星圖的金冥形成相位的那段期間壓力特別大，並不是一輩子都這麼痛苦。不過話說回來，最令人痛苦的行運土星帶來的剋相，會讓當事人在形成剋相的兩年多時間都維持在極度痛苦的高焦慮狀態，如果是金天相位的人可能連半年都無法忍受，早就跟對方分手，如果是金海相位的人遇到這樣的問題，他們一定會躲起來假裝沒這回事，完全不吵不鬧，即使對方遞上離婚證書，他們也不理不睬，有時候被他們拖個兩年多，等到行運剋相過去，還真的有時候就這樣一切恢復正常。


    只有金冥相位的人才有辦法忍這麼久，他們遇到行運剋相時吵也吵了，鬧也鬧了，但是搞到最後婚也沒離，外遇的問題也沒解決。對金冥相位的人來說，他們絕對不可能會有什麼平靜的外遇這回事。


    ### 金冥合相——金錢與情感的占有欲


    金冥合相的人要的是很強烈的感情，而且他們要的一定會是具有控制性的感情。他們絕對不像金天相位的人可以接受開放式關係，或像金海只要暗戀、得不到也沒關係。


    所以在金星跟天王星、海王星、冥王星這三顆宇宙行星形成的相位中，金冥合相是唯一有辦法真正的掌控感情與金錢資源的人。金冥合相的人對於掌控金錢很有興趣，也有這方面的能力。金天跟金海有好相位的人雖然可以成為賺很多錢的大明星，但不表示他們具有掌控金錢的能力。


