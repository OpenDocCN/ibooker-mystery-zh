    只有金冥相位的人才有辦法忍這麼久，他們遇到行運剋相時吵也吵了，鬧也鬧了，但是搞到最後婚也沒離，外遇的問題也沒解決。對金冥相位的人來說，他們絕對不可能會有什麼平靜的外遇這回事。


    ### 金冥合相——金錢與情感的占有欲


    金冥合相的人要的是很強烈的感情，而且他們要的一定會是具有控制性的感情。他們絕對不像金天相位的人可以接受開放式關係，或像金海只要暗戀、得不到也沒關係。


    所以在金星跟天王星、海王星、冥王星這三顆宇宙行星形成的相位中，金冥合相是唯一有辦法真正的掌控感情與金錢資源的人。金冥合相的人對於掌控金錢很有興趣，也有這方面的能力。金天跟金海有好相位的人雖然可以成為賺很多錢的大明星，但不表示他們具有掌控金錢的能力。


    在情感關係上，金冥合相的人很在乎情感上的忠誠，因此跟他們談戀愛時比較有壓力。相較之下，金土合相的人雖然也很在乎忠誠，但是他們不像金冥合相的人那麼精明。只要別晚上不回家，只要表面忠實金土合相的人就不會多想，但你不可能騙得過金冥合相的人，他們要的不只是肉體的順服，他們要求的是靈魂的順服。所以如果想要跟金冥的人在一起的話，得要先考慮清楚自己有沒有辦法真的很忠實，否則就容易產生很大的問題。


    金冥合相要求的感情很強烈，他們給愛也給得很深。冥王星的能量跟火星有點類似，金冥合相跟金火合相的相同之處在於，他們都不懂得什麼是柏拉圖式之愛，對他們來說，沒有性的激情，就到不了愛的激情——金海相位的人就不會有這樣的要求。這也是冥王星跟海王星最大的不同：冥王星有很強烈的占有欲，如果沒有性的交流，也就不容易產生很強的占有了。


    金火合相跟金冥合相的差別，在於冥王星有很強的控制欲，而火星沒有。金火合相的人追求靈肉合一，但金冥合相的人要的不只是靈肉合一，他們要的是更強烈的激情。


    簡單來說，如果金冥合相像是辣度一千度的咖哩，金火合相的辣度大概就只有三百度。


    也由於這個原因，其實很多人會受不了金冥的感情。


    ### 金冥九十——激情與執著的強大壓力


    本命星圖中的金冥九十相位，代表當事人容易跟伴侶之間產生很強烈的情感與金錢方面的衝突。他們操控性很強，又很執著，還同時要激情，所以這是一個有點危險的相位。因為婚姻跟激情是背道而馳的。婚姻的本質不可能帶來這麼大的原欲，他們要激情、又要控制，而且在婚姻的激情慢慢退去時，他們容易陷入新的激情中，但對於舊的感情又不能放手。這比金天九十更麻煩。因為金天九十雖然在外頭看到新對象就心動，但他們對舊愛沒有那麼大的執著。金天九十的人可能對婚姻冷卻以後，就不管太太在家怎麼樣，自己在外頭偷偷交女朋友。但金冥九十的人，又想在外頭尋找新戀情的刺激，又要太太在家很忠實。


    金冥九十的人陷入外遇激情時，有可能會好幾天都不回家，金天九十的人不會。如果看八卦雜誌會發現，劈腿大致上可分兩種：一種劈到後來會無疾而終，這種通常屬於金天型的劈腿；一種會越演越烈、大打出手，這就比較屬於金冥型的劈腿。因為冥王星具有佔有、暴力、報復的特質，金冥相位比較累的原因就在此。


    九十度的相位帶來能量的內耗，在情感關係中，其中一個人對於情感關係強烈執著的內耗，對另一方也會造成很大的壓力。冥王星的重點在於控制，金冥九十遇到情感問題的時候，他們會憤怒與歇斯底里，他們如果感到難過，一定不會偷偷摸摸躲著自己難過，他們一定會到對方面前難過給對方看，讓對方感受到他們的痛苦。


    ### 金冥一百八——為了金錢與情感不擇手段


    金冥合相的人感情往往會跟金錢有關。金冥九十的往往會因為陷入三角戀情而無法自拔。金冥一百八的人主要會呈現出冥王星控制的一面，但未必會顯現在控制感情、婚姻上。


    金冥一百八如果產生情感或金錢糾紛，往往會是跟一個集體、集團、制度，或是大企業產生的糾紛。所以金冥一百八相位有時候會跟黑社會有關。他們很有可能會為了達到金星的好處，而去從事許多非法的行為。玩很大的金錢遊戲，或者控制龐大金流的人，很多都是金冥一百八的人。


    金冥九十的人有時候痛苦的原因在於，他們有很強的激情，但又想要控制原來的生活，以致於不得不把激情壓制得很深。當金冥九十遇到激情或金錢、控制的兩難時，他們往往必須要壓抑其中一個，才能獲得另一個。所以金冥九十的一生都不會過得太容易，如果深深挖掘，一定會發現，他們容易壓抑情感而得到控制，或者為了情感而犧牲了其他事情，他們的金星情感非常容易受到扭曲。金冥一百八的狀況則不同。金冥一百八是可以操縱情感的人。他們有可能會因為情感或金錢而去賣身，或是從事非法行為、做黑道，他們有可能會去做一些不那麼正派的事。


