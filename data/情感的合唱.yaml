    # 水土九十——過度悲觀的心智壓抑


    水土九十的人在求學過程中常會受到權威的壓制，有些人會覺得父母或老師常常不讓他們自由發言，他們很容易碰到別人阻止他們自由表達想法。一個人在七、八歲到十五歲之間，是水星發展最重要的階段，成長階段中如果水星如果承受到很大的壓力，就很容易會造成一輩子的影響。


    水土合相或是水土一百二十的人在求學過程當中，一定碰過好老師，他們在學習知識的過程當中，可能會受到來自年長者或威權者的正面影響。但水土九十的人不同，他們在整個學習過程中一定會碰到讓他痛苦的老師，因為土星的權威可能會藉由老師來展現，儘管這些老師並不一定是壞老師，但是他們都會令當事人畏懼，也帶來很大的限制。


    很多水土九十的人，容易在觀念上面養成閉塞的習慣，也特別討厭被別人念。他們'
  merge: -1
  pgno: 138
- img_proc: true
  md: '常常會過度欠缺想像力，想法也不容易受到他人肯定。以寫文章為例，水土九十的人寫出來的東西常會比較呆板，他們常常喜歡運用成語，遣詞用字也比較八股。不只是寫文章，他們的觀念也比較守舊，他們很容易用一種自認為符合社會標準，但也許已經過時的方式來看待所有的人事物。


    水土九十的人可以說是傳統思想的受害者。他們常會害怕表達自己的想法，但是他們通常是比較有見識、有想法的人。他們會捍衛傳統，不太喜歡改變，他們很相信權威，卻又很容易受到權威的壓制。


    水土九十的人常常會過度悲觀，而水木九十的人則常常過度樂觀。如果一個人本命星圖中既有水土九十，又有水木九十，木土的能量不會彼此抵銷，它們會同時出現。當事人會一下子很樂觀，一下子很悲觀，他們可能一下子跟你說這個計畫一定成，過一陣子又說不行，一定會失敗，常常會出現矛盾。'
