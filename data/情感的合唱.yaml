  md: '# Chapter/2


    # 月亮與水星：情緒與心智的互動


    月亮相位通常會展現在當事人小時候跟母親的相處關係。從月亮跟水星形成的相位中，可以看出當事人小時候跟母親之間的溝通狀況，月水相位好的人小時候跟母親很談得來，長大以後也會跟家人也會很談得來，這也意謂著當事人的情緒跟心智之間的能量和諧。


