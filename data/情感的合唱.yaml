    ## 受難的王妃


    **黛安娜 Diana, Princess of Wales**

    1961/7/1-1997/8/31


    英國王儲查爾斯王子的第一任妻子，威廉王子、哈利王子的母親。她在離婚後為了躲避狗仔隊追逐，不幸車禍身亡。


