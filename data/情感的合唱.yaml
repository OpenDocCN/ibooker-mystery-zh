    # 水天一百八——宇宙意識造成的過度刺激


    水天九十是一種內耗衝突，當事人可能有很多革命思想，但除非有其他行星相位輔助，否則他們在表達溝通時容易斷斷續續，無法穩定的將自己的思想完整表達，他們有可能成為革命行動者，但是很難變成革命理論家。相較之下，水天一百八雖然意謂著水星跟天王星兩極的過度發展，但这也代表他們有能力將天王星在無政府主義、反主流意識、驚世駭俗方面的種種想法，透過水星傳達給世人。


    當一個人水星跟天王星形成了一百八十度相位，意謂著當事人的水星會受到天王星對立帶來的強烈衝擊。水星是個人與心智的連結，天王星是個人與宇宙意識的連結，當天王星強到一個程度之後，這個人的心智就會受到天王星的控制而脫離現實，產生一種'
- md: '神智漫遊太空的狀況。不管是任何相位，誤差度數越小，力量就會越大。水天一百八的誤差度數大一點反而好，它會讓人會保有水天一百八現象，但作用力不會這麼強。


    像德國哲學家尼采（Friedrich Nietzsche）就是水天一百八的人。儘管尼采對後世影響很大，但是他的哲學思想並不是當時社會的主流意識，甚至很多學說都違反了當時的社會邏輯。尼采的水星在天秤四度，天王星在牡羊三度，水天一百八相位的誤差度數其實不到一度，是非常緊密的對立相位。緊密的水天一百八雖然為他帶來很多神諭般的思想，但是這些思想也超過一個人的心智可以承受的範圍，這讓他的心智到後來被天王星整個控制，因而發瘋過世。我們一方面可以說尼采是得到天啟的哲學家，但從另一方面來說，他也可以算是哲學界的乩童。


    希特勒（Adolf Hitler）也有水天一百八相位，希特勒提出的種族進化、日耳曼至上，其實也是非常脫離現實的想法。由於他的水星落在牡羊，水天一百八的對立，使他的思想中充滿了我行我素的特質。再加上他的月亮落在摩羯，摩羯是一個非常現實的星座能量，如果當事人是藝術家反而好，他們會很有紀律，也能兼顧現實面。但太陽摩羯或月亮摩羯的人如果從商、從政，假設當事人靈性發展程度不夠，他們就可能會為了現實目的而冷酷無情。水天一百八本來就具有無政府主義的特質，將這種特質展現在哲學上的思辨還不會出問題，但是如果將它落實成實際的政治主張，有時候可能會比專制政權害死更多人。


