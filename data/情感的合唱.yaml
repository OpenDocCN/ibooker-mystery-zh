    # 月土一百八 | 女性關係的困難


    月土九十意謂著母親或生命中重要女性會給他們很大的壓力，因此容易情緒低落，感到憂鬱。月土一百八的人不像月土九十受到母親帶來的龐大壓力，但往往會跟母親無緣，因而當事人會特別希望由外界尋求母親的象徵。當一個人小時候跟母親無緣造成的欠缺，長大以後就會不自覺的想要用其他方式來補足這個缺憾。


    如果一個男性本命星圖中有月土一百八相位，他們容易對身處困境的女性產生特別的感情。但是他們可能小時候跟母親無緣，長大結婚以後也跟妻子無緣。有一些月土一百八的人會因為早期跟母親無緣，因而造成日後跟妻子相處時產生困難。


    月土九十代表當事人會跟妻子在相處上出現問題，可是不見得會與妻子生離死別，但月土一百八常常會反映出當事人跟妻子無緣。所以對於月土一百八的人來說，與其死別，不如生離，最好的狀況有時反而是離婚或相隔兩地。


    不過月土一百八的當事人並不會因此而憂鬱，他們會有壓力，也會有痛苦，可是他們會把苦難當作一種補償，他們不像九十度會自我掙扎。月土九十的人往往在想要又想不要之間產生內耗，因此感到憂鬱。可是，一百八的相位會使當事人全力以赴，雖然這個全力以赴背後也會有很大的痛苦，但是不會內耗。


    月土一百八的時候，問題會向外投射，反映在外界。如果當事人是男性，常常問題會反映在他的母親與妻子身上，如果當事人是女性，問題就容易反映在她的母親身上，也容易反映在她跟其他女性的關係上。如果一個女性的本命星圖中月土一百八，月土一百八的問題就容易反映在自己身上，她們比較容易遇到外界處境帶來的沈重壓力。


    她們特別要小心行運土星跟本命月亮的剋相，當行運土星跟本命月亮形成了九十度剋相時，會同時跟本命土星九十，她們這個時候會特別巨大的壓力，因而產生嚴重的憂鬱。


    由於月土一百八的女性會遇到女性關係上的困難處境，所以這也是一個跟女同性戀有關的相位，月土九十會產生憂鬱症，但是跟女同性戀無關。同樣的道理，日土一百八的相位跟男同性戀有關，而日土九十跟男同性戀無關。《蒙馬特遺書》的作者邱妙津，她本身就是月土一百八，她就是女同志，當她遇到行運土星跟本命月亮形成九十度剋相時，因為女性關係上的困難，她選擇以自殺結束自己的生命。


    # 月土一百二——務實穩定的內在情緒


    如果一個人本命星圖中有月土一百二的和諧相，代表當事人的生命當中，都會有一個受到他們尊敬的女性形象。由於土星代表權威，所以常常會跟年紀較大的人有關，月土一百二的男性特別喜歡年長成熟的女性，他們常常是會談姊弟戀的男生。同樣的道理，對一個女性來說，太陽代表的是生命中的重要的男性，如果一個女生的本命星圖中的太陽跟土星一百二，這個女生就比較容易受到年長男性的吸引，對同齡男生興趣缺缺。


    月土一百二的人家中通常會有比較威嚴、比較讓他們尊敬的母親。他們不像月土合相會感受到來自母親的壓力，所以這是個比月土合相更好的相位。月土一百二的人不管男女都比較實際，只要他們的月亮沒有同時又跟木星、海王星形成負面相位，當事人的情緒基本上都會比較穩定與實際，比較不會亂花錢，也比較保守。


    # 不快樂的王子


    查爾斯王子 Charles, Prince of Wales


    1948/11/14


    英國女王伊麗莎白二世與王夫菲利普親王的長子，從一九五二年起列名英國王位繼承的首位。


