    金天九十的人跟金天合相一樣不喜歡傳統、固定的感情關係。金天九十的特質在於，當事人的情感關係往往會突然展開、突然結束，特別容易波動。如果搭配流年行運來看，金天九十往往意謂著情感關係的意外結束。一個人本命星圖中如果有金天九十相位，他們一生中一定會有好幾段重要的情感關係起落，他們不會是那種只談一次戀愛就順利步入婚姻，之後一路到老的人。他們一輩子一定會遇到好幾次巨大的情感變遷。


    跟金木九十一樣，金天九十的人也會有「雜愛」問題，他們總是沒辦法固定只喜歡一個對象，而且情況比金木九十更嚴重——雖然本命星圖中如果火星本身不活躍的話，金天九十的人未必會真的付諸行動，但是他們在情感上其實都會有不專一、不長久的狀'
