    Hugo），他一生中不斷創作了許多小說、劇本、詩歌，他寫的《鐘樓怪人》、《悲慘世界》到現在依然很受歡迎，他也致力於人權與各項社會運動。又如愛爾蘭文學家蕭伯納（George
