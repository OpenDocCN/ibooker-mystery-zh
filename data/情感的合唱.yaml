    金木合相的人從小一定會從父母那邊得到充分的情感與物質上的支持，除非同時有土星的相位來剋，否則金木合相的人無論他們實際上擁有多少財富，他們在心理上都不會有貧窮感。一個人是否有貧窮感跟實際擁有的財富並不能畫上等號，有的人明明非常有錢，但他們很可能一輩子都覺得自己很窮。金木合相的特色就在於，他們不容易真的很窮，而且他們不會有貧窮感。


    金木合相的人不管在情感上與金錢上，他們既不會苛刻別人，也不會苛待自己——一個在花錢上不小氣的人，在感情上多半也會很大方。如果一個人本命星圖中金木合相，對於付出感情或金錢，他們都不會是太過小心謹慎、太計較的人。他們從小就像是不斷的有人把錢存進他們的情感撲滿，因此長大以後，他們的情感撲滿中也會有充裕的餘額可供付出。一個人如果從小得到充足感情的人，長大以後就會比較容易付出感情；一個人如果從小得到的感情很少，長大以後付出的感情也不容易多。


    # 金木九十——情感與金錢的過度浪費


    金木九十的人對於金錢與感情上，他們會比金木合相的人更為揮霍浪費，往往會有過度透支的問題。金木九十的人在情感上的過度，並不是因為他們好色，而是因為他們太喜歡追求情感上的新經驗。譬如說他們可能已經有男女朋友，但如果他們看到了別的滿有吸引力的男孩或女孩，雖然不見得每次心動都一定會出手，但他們會比一般人更容易採取行動。對於金木九十的人來說，新鮮的人就是特別容易喚起他們的注意。他們或許並不會真的會怎麼樣，但要他們心裡完全不心動是不可能的。


    金木九十的特質在於當事人對喜歡的東西特別容易心動，不管是在情感上或消費上都是一樣。所以如果你認識一個男朋友或女朋友，他們一天到晚喜歡買新東西送你的話，可別高興得太早，因為不愛送禮的人在感情上往往也不會喜歡招蜂引蝶，一個人如果在消費上很大方，他們在情感上對其他人也不會小氣。有的女生會嫁給那種很愛送禮物、很大方的男人，跟這種人結婚之後就要小心了。


    如果用買鞋子做比方，有的人可能有一雙鞋子就夠了，但對於金木九十的人來說，即使已經有了三雙鞋子，他們看到第四雙、第五雙、第六雙鞋子的時候，他們都還是會一直很有興趣。金木九十的人在花錢方面過度樂觀，在感情上也有同樣的問題。另一段感情就像另一雙新鞋子一樣，對他們而言有很大的吸引力。他們不覺得一定不能有別的情感關係。


    金木九十的人就是會忍不住會去買比較多的鞋子、比較多的新東西，而且他們總是過分樂觀，永遠不會想到再買下去荷包會吃不消，更別提要留點錢當下半輩子的養老金。除非他們真的非常有錢，否則他們一定會是那種刷卡刷到透支的人。如果星圖中沒有其他更有利的木星相位，金木九十的人就會因為花錢花得太多而出現問題。


    CNN 創辦人泰德透納（Ted Turner）就有金木九十的愛花錢問題。他在西元兩千年年初的時候，因為 CNN 跟 AOL 合併賺了很多錢，於是捐了一億美金給聯合國去做和平計畫。這是因為泰德透納的木星在寶瓶，所以他在金木九十金錢上的大膽，就反映在寶瓶的理想主義上。


    我在看星圖時常常感到有趣的地方在於，例如金木九十的人都會有愛花錢的傾向，但把錢花在哪裡，就有很大的不同。一個金木九十的人，只要錢不是跟銀行借貸來的，或是跟別人騙來的，如果他花的錢都是自己賺來的錢，就算老了以後身邊剩下的錢不多，但是他一輩子對於社會繁榮的貢獻，會勝過金土相位的人。因為木星畢竟是一種跟社會利益有關的能量，一個花錢花得很浪費的人，他們在促進社會利益上的功勞，其實會比土星大。尤其像是泰德透納的浪費，是為了理想主義的目的——一個在花錢上很理智的人不可能一口氣捐這麼多錢。如果就個人角度來說，像他這樣捐錢的確過度慷慨，但是如果他負擔得起，比起花錢精打細算，把子孫三代的現實考量全部算好之後才肯花錢的金土一百二，其實金木九十的人反而花錢花得很痛快。所以這種相位吉凶，有時候好壞倒也很難論斷。


    # 金木一百八 —— 情感與金錢不可兼得的兩難


    一百八十度相位會造成彼此的對立，由於一百八能量的強烈對立，所以金木一百八往往會很懂得怎麼樣去吸引別人，但他們也常常必須在金星的情感跟木星的利益中選邊站。就像金火一百八的人可以靈肉分離一樣，金木一百八也會有情感跟利益分離的問題，他們往往如果選擇了其中一方，就得要犧牲另一方。例如有些金木一百八的人會因為婚姻對象可以帶來實際利益而結婚，也有一些人會因為情感而犧牲木星的利益。他們生命中常常會遇到必須在情感跟利益中做出抉擇的難題。木星的擴張能量也跟自由有關，金木一百八的人也常常必須要為了自由犧牲情感，或者為了情感犧牲自由。他們有時候為了不想要在感情上固定下來，而有不能負起情感責任的問題，他們在這方面的情況會比金木九十的人還嚴重。


    《少年維特的煩惱》的作者，德國文學家歌德就有金木一百八相位。金木一百八會造成能量的過度發展，他們可能會有情感跟利益對立的衝突。歌德曾經在八十幾歲的時候跟一個十幾歲的少女談戀愛，彼此的年齡差了六七十歲。這是在感情上很大膽的人才做得出來的事。


    # 金木一百二——情感與社會資源的和諧


    對於從事演藝、寫作、娛樂業、表演業的人來說，金木一百二是一個很好的相位。例如名導演李安、賴聲川等人，都有金木一百二相位。


    他們很適合從事金星領域的相關工作，金木一百二的和諧相會使他們容易受到社會歡迎。如果從事跟木星相關的文化工作或社會地位較高的工作，他們也容易獲得金星在人際及金錢方面的回報，可以過著資源充足、充滿藝術跟美的生活。


    在日常生活中，金木一百二的人都會以很友善的態度跟別人相處，他們會是很長於社交的人。金木一百二是一個滿幸運的相位，由於金星跟木星都算是吉星，因此當事人不管在私人情感或公眾領域，他們都容易遇到貴人。'
  mdcn: '# 金火一百八——靈肉分離的擺盪


    金火一百八意謂著當事人小時候父母會有性愛分離的問題。他們的父母可能有很熱烈的性而沒有愛，也有可能父母之間有愛而無性。一個人如果本命星圖中金火一百八，當事人一生在性與愛的兩極不斷擺盪。他們可以靈肉分離，性歸性、愛歸愛。他們有可能像翹翹板般選擇有性無愛或有愛無性，也有可能會同時跟不同人發生關係，有的關係是柏拉圖式的純粹精神戀愛，有的關係則完全只有肉欲，或者在人生中有的時候選擇金星，有的時候只要火星。


    一百八的對立會帶來很強的能量，金火一百八的人如果從事藝術創作，對立相位帶來的挑戰，會使能量變得很極端、很衝動，因而能夠激發出強大的創造力。相較之下，由於九十度會使能量內耗，所以很難產生足夠的創作能量，金火九十的人需要藉由藝術來調整能量，但通常不容易像金火一百八的人本身就具有藝術的創作能力。


    金火九十跟金火一百八最大的不同，在於九十度的內耗會使當事人展現金火能量時無所適從，常常因為性與愛的兩難而感受到自己在這方面的不幸運。相較之下，金火一百八的問題則在於過度發展，一百八十度會使金星跟火星互相挑戰，因此金火一百八往往過於性感外露，而且情況比金火合相更為嚴重。


    金火一百八跟金火九十都有陽性能量跟陰性能量不平衡的問題，所以他們也會有從陽性能量與陰性能量中擇一的問題，不過由於一百八十度的對立，會使兩邊的能量都受到激化，所以他們常會同時展現陽性能量與陰性能量，以致於有時候會給人一種雌雄同體的感覺。


    # 金火一百二——性愛和諧的適度桃花


    金火一百二的人在人際關係中會很受人歡迎，一百二十度的和諧會比零度合相更為有利。因為在日常的人際往來中，他們展現出來的是一種適度的性感，而不會像金火合相的人那樣簡直性感到要流了出來——如果一個人跟你不是男女朋友關係，可是跟你相處時一直流洩出強烈的性感能量，這其實挺讓人困擾。在同性別的相處上更是如此，我們常會發現，女生們不喜歡找一個太性感的女生來當她們的好朋友，男生也不會喜歡找一個很性感的男生當好朋友。


    金火一百二的優點就在於他們不會讓人有這種不安，他們在日常生活的情感跟性感魅力的展現上比較平衡，而且不會有性愛衝突的問題，他們跟配偶的關係也會比較愉快——當然他們也可能在配偶關係中會有月亮不合的問題，但他們在性愛關係上不會不愉快。


