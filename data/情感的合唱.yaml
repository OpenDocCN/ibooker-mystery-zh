  md: '# 金土一百八——以世俗利益補償情感空虛


    金土一百八的人一生中重要的情感關係對象，往往跟他們有很深的前世的關係，因此很難掙脫。這個情感關係並不能帶來快樂，但是他們會被困住。他們在情感上無法自由揮灑，但又無可奈何，因此他們會本能的接受情感上的重責。


    金土一百八有時候會使當事人過度看重世俗成就，他們常常是事業心很重的人，他們容易會用世俗成就來取代情感上的空虛。例如賈桂琳甘迺迪歐納西斯（Jacqueline
    Kennedy Onassis）就有金土一百八相位。金土一百八的人有時候會給人一種他們結的是政治婚姻的感覺，因為他們在情感或婚姻關係中會有強的土星世俗利益，但是卻不能為他們帶來情感的慰藉。'
