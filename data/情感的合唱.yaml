  pgno: 79
- img_proc: true
  md: '親伊麗莎白二世出生於一九二六年四月二十一日,太陽落在金牛零度。也就是說查理的月亮跟伊麗莎白二世的太陽位於完全相同的位置,由此可以看出母親在查理生命中的重要地位。


    當一個男性本命星圖中月土一百二,當事人都會喜歡比較年長、成熟的女性。其實不只卡蜜拉,查理婚前有過的幾段戀情,幾乎對方都是年紀較長,甚至已婚的女性,不少人認為這是一種戀母情結的投射,其實不無道理。


    月土一百二的人從小得到的是非常穩定的照顧,他們長大以後也會希望擁有這樣的家庭生活,問題是他娶的對象黛安娜的月亮卻落在最不穩定的寶瓶座,而且還有月天一百八的強烈剋相(請見第八十九頁),也就是說,查理娶到的是跟他的月亮傾向完全相反的女性,如果占星家看到這兩個人的星圖,應該在一開始就會斷定這場婚姻不會偕老,因為查理娶到的太太,不符合他的星圖上該有的妻子形象。


    更麻煩的是查理的月亮又跟水星一百八,月水一百八十度的人從小跟母親之間就有無法溝通的問題。如果一個人星圖中有月水九十度剋相,他們可能天'
