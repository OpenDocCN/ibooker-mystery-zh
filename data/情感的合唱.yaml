  md: '# Chapter/19


    # 金星與土星：情感與現實的互動


    金星指的是一個人生命中本能的情愛。它很羅曼蒂克，但也很自我、很自私。你喜歡什麼樣的人，對方有沒有讓你心動，這是騙不了人的。


    從金星的相位中，可以看出一個人能不能完成生命中本能的情愛。如果金星的相位很好，代表他們能夠得到很多人給他們的愛，因此一個能夠得到很多人喜愛的大明星，他們或許人生中會有各式各樣的問題，但他們一定不會有缺乏愛的問題。


    從哲學的觀點來看，金星要探討的就是價值觀，它包含了自我的價值與金錢的價值，所以它既代表了一個人愛的價值觀，同時也代表了一個人的金錢觀。


    金木跟金土的不同，舉個例子來說，假設一個金木的人跟一個金土的人，他們有相同的銀行存款，金土的人一定天天覺得自己很窮，而金木的人則會覺得自己還有很多錢'
  merge: -1
  pgno: 183
- img_proc: true
  md: '# 金土合相——情感與金錢的謹慎態度


    金土合相的人往往從小就會在感情上受到限制，他們在感情方面一直很有壓力、很保守，在金錢方面也很小氣。


    金土合相的人往往會比較晚婚，而金木合相或一百二的人則經常早婚。我認識很多人早婚的機率非常高。木星的擴張特質會帶來大膽與衝動，因此金木相位的人想結婚就會去結婚，他們不會考慮再三而不行動。


    金土的狀況相反。金星跟土星有相位的人，如果要結婚，他們都會考慮很久，這種問題對男性來說還無所謂，我認識一個金土合相的男生，他到四十四歲才結婚，而且娶


    可以花。即使兩個人擁有的存款完全相同，金土的人永遠覺得錢不夠多。他們在感情上沒有安全感，在金錢上也同樣沒有安全感。'
  merge: -1
  pgno: 184
