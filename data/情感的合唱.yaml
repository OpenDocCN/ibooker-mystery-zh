  md: '跟父親長不長壽無關，當事人的父親可能活到八九十歲，但一定會比母親早走，否則財富來源不會來自母親。如果月木的好相位又同時跟天王星形成了好相位，這個人擁有的財富可能是一般有錢人的好幾倍，甚至好幾十倍，有錢程度很可能會超乎想像。


    # 月木合相——家庭環境帶來的資源


    月木合相的人絕對不會來自於貧窮或者很困苦的家庭，他們的家庭在社會標準中，一定是屬於相對富裕、家境較好的家庭。


    月亮跟木星合相的人，不論男女，即使月木合相同時還跟其他行星形成剋相，他們都會有一個能夠為子女提供很多資源的母親。月木合相意謂著當事人可以從母親身上得到很多的鼓勵與支持。他們的母親很大方、很有活力，她們對子女不會太嚴格，而且很願意為子女付出。木星代表的是社會資源，他們的母親通常教育水準較高，具有相當的智慧，而且對於教育、文化宗教有一定的興趣。如果當事人是女性，她們也會很大方，'
