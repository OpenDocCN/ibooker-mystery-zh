  md: '# 水天合相 | 跳脱现实的独特创意


    水星除了语言文字之外，也代表思考，许多水天合相的人，通常很容易有心电感应，尤其合相度数越接近时，力量越强。即使他们不见得会随时显得很聪明，但是他们往往会突然冒出一些独特的见解或领悟，让人大吃一惊。


    天王星是一种突破传统的宇宙能量，水天合相的人都会具有进步、独特的思维角度，即使当事人的水星落在相对保守的星座如摩羯，或者当事人的太阳落在保守的星座，他们也一定会比一般人开明，他们绝对不会听到批评政府或同志婚姻就害怕的人。


    如果当事人的水星本身就落在牡羊或宝瓶这类非常不保守的星座，水天合相的力道当然就会更强。


