    # 序


    從逆境中昇華


    占星的功能之一是算命，但是如果只把占星當算命，那就實在太可惜了。


    占星跟通靈不同的地方，在於它具有縝密的邏輯，而且能在現實生活中得到印證。例如月亮相位會顯示出一個人小時候母親的對待方式，經由這樣的童年經驗形塑出一個人的內在安全感與情緒反應，進而影響到當事人長大以後的婚姻關係與家庭生活。對於女性來說，情緒對內分泌有很大的影響，因此月亮相位也跟卵巢、子宮等等跟女性內分泌相關的疾病有關。


    占星學是一個非常全面的解釋系統，可是它畢竟只是一個解釋系統。占星學可以幫助我們解釋這個世界，可是解釋不等於活在這個世界中。舉例來說，金星跟個人價值與享受有關，木星與社會資源有關，金星跟木星一百二十度和諧相的人容易遇到貴人、獲'
  - '[PAGE 18]


    得資源，但是他們也可能會因此變得很自私、很偷懶；金星跟木星九十度剋相的人容易

    有過度浪費的問題，但是他們也可能是捐錢不手軟，很願意慷慨助人的人。


    本命星圖中的負面相位都一定會帶來現實生活中的阻礙與挫折，甚至造成很大的痛

    苦，正面相位必然會為生活帶來一些順境。如果只是停留在算命的層次，強調這些事情

    一定會發生，而不去理解背後意義的話，即使算得再準，對人生也沒有幫助。


    每個人的星圖中必然會有負面相位，也會有正面相位。正面相位雖然帶來順境，但

    是也常使人不去尋求突破，因為沒有必要；負面相位的挑戰會讓人努力奮鬥，但也可能

    因為剋相的壓力而完全發揮負面能量，導致向下沈淪。學習相位的意義就在於學會藉由

    正面相位的協助，讓我們更有能力面對負面相位的壓力。


    命不會越算越薄，但狹隘的觀點會讓命運也變得狹隘。行星高掛天空，它們的能量

    具有無限的可能性。行星的相位會帶來生命情節的邏輯，它或許像是命運的地圖，標示

    出這輩子要去哪裡，但是沒有規定要用什麼走法走過去。一個人透過不同的方式來發展

    星圖能量，命運的曲線就會有所不同。同樣的相位，有的人可以把命運曲線走得很高，

    也有人會把曲線走得很低。'
  - '[PAGE 19]


    透過占星學，可以讓我們更深入的了解自己的生命，學習與命運對話。但如何發揮創造力來面對生命中的各種功課，這才是學習占星最重要的意義。


