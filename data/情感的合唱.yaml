  md: '# Chapter / 20


    # 金星與天王星：情感與創意的互動


    本命星圖金星有相位的人往往會受人歡迎、受人喜愛。所以金星跟一般常說的「桃花」意義很接近。不管是大眾娛樂業的演藝人員、政治舞台上的政壇明星，想要從事這些需要獲得大眾支持的工作，如果缺乏金星的好相位，他們就很難廣受歡迎，根本當不了真正的大牌明星。


    金星的成功一定跟受大家歡迎有關，它是一種跟美麗有關的能量，因此金星也跟藝術有關。一個人如果金星相位不錯，多半也代表當事人會具備某一種程度的藝術天分。不管是表演、繪畫，這些都包含在金星的藝術天分範圍內。這裡談到金星的藝術天分，跟前面談到的水星是不同的。如果以大家習慣的中國命理用語來形容的話，水星比較偏向大家常說的「文昌」格局，它跟科舉、功名這類跟腦筋好不好、聰不聰明的能力有關。'
  merge: -1
  pgno: 191
- img_proc: true
  md: '相較之下，金星就比較偏向「文曲」，它跟繪畫、表演、娛樂這類的藝術有關。


    金星也跟利益有關，但它跟木星的利益不同。木星為我們帶來的好處，是一種社會集體資源產生的利益。金星的好處，都跟個人資源有關，跟社會資源無關。金星的利益是基於這個人本身的才藝得到的好處——長得漂亮也算在內。一個人因為長得好看而得到的才藝而賺來的金錢，或者是因為別人喜歡這個人而給的，或者是因為他們很受歡迎而得到的。這些都跟做股票、得獎、中樂透無關，因為做股票、得獎或中樂透，這些都是社會資源，屬於木星而非金星領域。


    要在演藝圈站上頂尖的地位，必須要有金星跟天王星、海王星好相位，否則光靠金星木星相位並不足以讓人成為一代巨星。


    能夠當上頂尖地位的巨星，本命星圖中往往會有很強的金星跟天王星、海王星的相位，例如伊麗莎白泰勒就有金天合相，而且她的金星在牡羊十七度，天王星也在牡羊十七度，是一個誤差值為零，力量非常大的零度合相。同時她的金星又跟冥王星九十度，如果她只有金天合相，恐怕演不來埃及艷后。埃及艷后這樣的角色，必須得透過冥王星'
  merge: -1
