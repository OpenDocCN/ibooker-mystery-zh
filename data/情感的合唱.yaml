- img_proc: true
  md: '一九八一年七月二十九日,英國的查理王子跟黛安娜在倫敦聖保羅大教堂結婚,全球大約有七點五億以上的觀眾在電視機前見證,堪稱世紀婚禮。


    不過這個婚姻童話只維持了十幾年就宣告破局,這也再次應證占星關於婚姻的理論:婚姻關係中最重要的是月亮的相位。一對夫妻如果金星、火星不和諧,其實不見得會想離婚,但是如果雙方的月亮不和諧,就特別會造成家庭生活的衝突,如果每天都要面對令人情緒不愉快的家庭生活,婚姻就很難維持下去。


    身為英國歷史上在位最久的王儲,查理的星圖有非常多值得觀察之處。包括代表出生名門的上昇獅子,以及包括太陽在內的四顆行星落在四宮家庭宮,顯示出他這輩子雖然啣著金湯匙出生,但是他也一輩子無法真正做自己,永遠都要為家庭而奉獻。


    查理的本命星圖中有月土一百二的和諧相。月土一百二十度的人都會有一個很權威、很令當事人尊敬的母親。查理的媽媽是英國女王,當然很令人尊敬。


    月亮代表當事人生命中的⚼要女性,查理的月亮落在金牛座零度,而查理的母'
