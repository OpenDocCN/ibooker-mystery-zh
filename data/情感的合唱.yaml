    # Chapter / 15


    # 水星與海王星：心智與靈性的互動


    天王星的能量讓人得以脫離土星社會現實的邊界，從物質世界中解脫，所以天王星的學問是解脫的學問，是不執著的學問，最大的價值是脫離常軌的自由。天王星是人類意識脫離現實世界三度空間的第一個能量，如果繼續推向更遠的地方，就會進入沒有疆界、有如迷霧般的海王星領域。


    天王星管的領域是占星學、玄學，以及科學裡面的非實驗科學，而海王星掌管的則是通靈與神祕學。所以我常說占星學並不是神祕學，占星師必須依據星圖才能論命，占星學來自於宇宙意識的啟發，但是它具有嚴謹的邏輯系統，而且可以被實證。但通靈不同，通靈屬於海王星領域，我們很難證明通靈者對你說的前世今生對或不對，通靈者傳達的訊息往往沒有邏輯、沒有疆界，它們是來自無形界的力量。


    ## 水海合相——宛如夢境的創造力


    天王星的力量具有框架，所以與天王星相關的學問，不管是哲學、神學或是占星學，它們都還是在框架之內探討思想的疆界。天王星是高等意識的頓悟，它本身是一個用來理解宇宙萬物的詮釋系統，但海王星是一個沒有邊界的呈現系統。天王星的能量讓我們明白意義之所在，讓我們得以闡釋宇宙之意義，但海王星能量讓我們參與宇宙的造化。


    天王星很強的人都會對於各種意義產生質疑，不管是反對或贊成，其實都是意義的追求。海王星則是一種融入宇宙創造本質的能量，因此海王星跟藝術創作有關。很多海王星很強的藝術家並不追求意義，他們無法回答自己為什麼要創造出這樣的作品，他們的作品只是呈現他們想要呈現的世界，想要參與宇宙的創造，即使那些創造是地獄。


    水海合相的人喜歡幻想，他們容易具有通靈能力，或是具有詩、小說、戲劇等創造能力。他們通常比較具有藝術天分，因為他們比較容易接觸到較高意識，會有無形界的靈感。他們雖然對神祕學有意識，卻不見得會去學習占星，他們通常只想知道的是神祕的資訊，但對來龍去脈卻興趣不高。他們的想像力豐富，潛意識很強，如果水海合相落在適合的宮位時，他們很適合從事寫作、表演、藝術等活動，即使不是從事相關領域的工作，他們也會對藝術有強烈興趣，很有能力欣賞純藝術作品。他們尤其喜歡攝影與電影，因為它們特別是一種介於現實與夢境之間的媒材。


    當本命星圖中水海九十，意謂著海王星會過度發展，容易衍生為浪漫主義或濫情傾向。當事人不會欠缺創作能力，但會欠缺現實意識，他們常常會覺得自己的腦筋不清楚，數學很差，也很容易在現實財務與人際關係上出問題或是被騙。


    例如英國詩人拜倫就是水海九十、月海九十的人，而且海王星落在跟創作、戀愛有關的五宮。他一生的活動都跟海王星息息相關，他被認為是那個時代最為風流的詩人，情史非常豐富，作品也都在歌頌愛情，有些作家雖然也像拜倫一樣，男女關係很亂，但不見得會歌頌愛情。這主要是因為拜倫的水海九十，海王星落在五宮，這讓他歌頌所有浪漫的情感，沒有疆界的愛，這讓他的感情創作世界無法受到婚姻、倫理、現實與疆界的約束。


    許多藉由喝酒來創作的藝術家，都有水海相位。並非所有藝術家都會喜歡喝酒或吸毒，但是酗酒的藝術家一定比酗酒的科學家要多，原因在於酒精跟藥物歸海王星管，藝術跟超越現實的海王星有關，科學則與天王星、土星有關。


    ### 水海九十——過度浪漫的心智溝通


    水海九十的人一定會有容易耽溺的問題，他們不太有處理現實問題的能力，思考邏輯也不強。有些水海九十的人會有酒癮、藥癮，也有的人會沈迷於愛情或做白日夢。這些事物都是讓人脫離現實進入夢境的方法。本命星圖中水海九十的人容易被海王星拖出現實疆域，帶入宇宙的無意識夢境之中。


    水海九十跟酒癮有關，也跟水厄有關。簡單來說，這個情況就像李白喝了酒後要在水中撈月，結果溺死了。我之前有個朋友在端午節喝完酒去外海看日出，結果也死在海裡，他還是個游泳健將，所以水海九十的人要特別小心這種意外。


    水海的負面相位有一個很特殊的現象：如果水星跟土星或冥王星形成負面相位時，一定會帶來負面的影響，但是水海的負面相位則未必。因為海王星是一顆超越現實的行星，所以水海剋相只有在與現實產生關聯時產生負面作用，如果將水海剋相運用在與現實無關的領域，例如創作，這些作品很可能是很好的作品。


    在藝術創作的領域中，沒有所謂對的作品或錯的作品，只有真不真誠、感不感人的差別。一個水海九十的作家寫出來的東西可能宛如夢囈，讓人看不懂，卻不見得不能感動人心。世界上令人看不懂但是非常動人的佳作不勝枚舉，原因在於它們觸碰到了靈魂的深處。這些作品也許難以用心智看懂，但是靈魂看得懂。


    知名歌手鮑伯狄倫（Bob Dylan）就有水海九十的相位，他的水星落在雙子，對他而言，聲音表達與思想表達很有關係，所以他很多的歌會很像念歌，因為他有太多的想法想要表達，他也可以表達出宇宙訊息，但比較沒那麼清晰，一般人不會覺得他的聲音是優美的天籟或和諧的宇宙，因為他的內在宇宙並不和諧。


    ### 水海一百八——心智與夢想的兩極對立


    水海一百八的人也有藝術能力，但有可能過度。水海一百八的人會比水海九十更有創造力，因為他們的水星與海王星兩極的能量可以完全發展。但這種人也可能發揮海王星不實的、夢幻的本質，成為商業騙子或宗教騙子。水海九十的人會自欺但不一定會欺人，水海一百八的人比較會玩弄海王星伎倆，他們比較容易自欺也會欺人。


