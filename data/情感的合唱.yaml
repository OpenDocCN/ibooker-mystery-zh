  md: '# Chapter/12


    # 水星與木星：心智與社會價值的互動


    在水星跟太陽、月亮、金星、火星這四顆內行星形成的相位中：水星跟太陽合相的人腦袋動得特別快，水星跟月亮有相位的人具有察覺與表達內在情緒的能力，水星跟金星合相的人特別有音感，水星跟火星有相位的人表達意見時特別有能量。這些都是一個人在心智與溝通方面的個人特質，它們的影響力都比水星跟木土天海冥的相位小得多。


    當一個人的水星跟木土天海冥形成相位，代表水星的心智跟木土的社會意識或天海冥的宇宙意識產生連結，當事人就會透過水星發揮出更大的影響力。整個人類的學術系統可說都是建立在水星與木土天海冥這五顆外行星的架構上，它們各有其不同的表達領域。木星跟土星是社會星，水木跟水土相位連結的是社會意識，它們都屬於社會大眾可以理解的範圍，如果一個人具有水木、水土的好相位，代表當事人的想法很容易被'
