  md: '與親密女性關係之間從不溝通，長期下來會形成一種冷戰的狀態。他們從小跟媽媽合神離，長大以後就可能跟太太貌合神離，跟姊妹貌合神離，也跟女兒貌合神離。相較於月水九十的衝突，月水九十意謂著他們知道彼此之間是為了什麼感到不愉快，譬如說為了家事怎麼做，為了牙膏怎麼擠之類的問題，雙方都會很清楚，而且這種衝突會訴諸言語表現。但月水一百八的情況就不一樣了。一百八的對立不像九十度的衝突內耗，當事人從小就容易跟母親形成一種幾乎是盡量不要說話的冷戰狀態，而不是吵架或爭執。表面上兩人關係會比月水九十度的人看起來還要好，因為他們不會經常吵架，也不會在別人面前起爭執。月水九十之所以會吵個不停，代表他們一直希望可以說服對方，希望對方能跟自己的想法達成共識。相較之下，月水一百八不把話說出來其實等於放棄溝通。月水一百八意謂著雙方對於事情的觀點南轅北轍，他們根本不覺得雙方可以達成決議，所以選擇各行其是。


