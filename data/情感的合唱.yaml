  pgno: 44
- img_proc: true
  md: '通常月金九十的人會因為選擇了月亮而犧牲金星，因此他們不會喜歡他們的對象。


    一個人的星圖中，如果沒有這種相位時，一開始或許不見得會跟喜歡的對象在一起，可是久而久之也可能會日久生情，但月亮金星九十度的人不會。因為月金九十度不是要讓情感與安全感比誰贏誰輸，九十度帶來的是衝突內耗，它會時時提醒當事人安全感跟愛情不可兼得的兩難，讓他們一直活在強烈的矛盾中。


    # 月金一百八——以物欲取代母愛


    月亮跟金星一百八的情況跟月金九十的情況不同，月亮跟金星一百八的人從小跟母親之間常常會有情感障礙，月亮金星的一百八十度對立，通常意謂著當事人的母親容易過度發展自己的金星，容易為了金錢或自己的喜好而沒有善盡母職，因此當事人從小跟家庭母親之間是隔絕的。


