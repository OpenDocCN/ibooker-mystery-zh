    黛安娜就是一個最明顯的例子。太陽巨蟹的女性都會展現出注重家庭的特質，但是不見得所有的太陽巨蟹女性都能夠勝任婚姻生活。太陽巨蟹的女性必須分為兩類，第一類是她們童年被養育的經驗中，如果她們的母親為她們提供了很好的照顧，她們童年的家庭生活過得很不錯的話，她們就會仿照自己的母親，很有能力經營好婚姻關係。但如果她們小時候家庭並不美滿，當她們結婚以後，遇到婚姻生活中的各種壓力時，她們的情緒就會回到不愉快的童年經驗，以致於完全沒辦法面對婚姻生活中的現實問題。黛安娜的月亮落在寶瓶，而且又跟天王星形成一百八十度剋相，她的母親在她才六七歲時，就因為外遇而離家出走，因此她的童年就在沒有母親陪伴，而且因為父母離異而氣氛低迷的環境中長大。


    月天一百八跟月天九十的不同之處，在於月天九十意謂著當事人的媽媽可能脾氣古怪或情緒不穩，當事人的母親一天到晚在旁邊找他們麻煩，當事人長大以後情緒也會經常不穩定，身邊的人也都會有這樣的問題。月天一百八則代表當事人可能有個不符社會禮教的母親，也意謂常意謂著他們跟母親之間緣薄，母親不會經常在旁邊找麻煩，因此他們平常完全不會顯現出情緒不穩的一面——如果黛安娜是平常就情緒不穩的月天九十的話，一開始她就不可能會有機會嫁進王室當王妃。這些問題都必須要一起生活之後，才會顯現出來，一般人在談戀愛交往的時候，其實很難看到這些跟月亮有關的問題。


    我在旅居英國時曾經跟友人一起探訪黛安娜長眠之處，黛安娜娘家史賓賽位於英國北安普頓的世傳古宅。這裡曾經是黛安娜祖父母家，小時候黛安娜經常來這裡玩，因此留下了她從五六歲到十幾歲時的照片。看著這些照片最令人感嘆的地方在於，她六歲以前的照片完全跟一般小孩沒兩樣，笑得很燦爛，眼睛很明亮。可是從六、七歲開始，照片完全變了樣，她的媽媽離開了以後，照片裡的神情跟以前完全不同了，她不再笑得無憂無慮。黛安娜王妃最著名的就是她永遠眼簾微微垂下，不時會流露出一種哀傷的神情。這個表情就是從她七歲以後開始出現的。


