    # 水火一百八——與外界對立的心智刺激


    水火一百八的對立往往帶來外界環境很強的心智刺激，因而水火一百八的人常常會是心智表現很卓越的人。由於一百八十的對立很容易向外投射，水火九十的人只不過是愛跟別人爭論，但水火一百八的人很容易吸引到跟他們意見不合或反對他們的人，導致他們跟別人在心智上的嚴重衝突。


    很多水火一百八的人都很聰明，但是這並不是一個很安全的相位，因為水星跟火星的一百八十度對立，有可能會使當事人的整個神經系統突然崩潰。如果身邊有水火


    們往往會是主張很強烈、鬥爭性很強的意見狂熱份子，對於他們的信仰，水火九十的人完全不能忍受別人跟他們有一丁點的不同。像我認識一個水火九十的新黨支持者，別說是綠營，他就算是跟同屬藍營的國民黨朋友也會吵架，只要跟他意見稍有不同，他就會爭辯不休。'
  - '[PAGE 124]


    一百八的人,大家不妨觀察一下,你會發現,前一秒鐘他可能都還是個天才,可是下一秒鐘他在你面前就完全癱瘓了,整個腦筋一團混亂。例如《蒙馬特遺書》的作者邱妙津就有水火一百八相位,由於她的本命星圖還有月土一百八的問題,當她遇到行運土星跟本命月土形成剋相時,又不能從水星這邊得到心智上的協助,於是她在旅居巴黎時自殺身亡。


    # 水火一百二——語言與行動的和諧互助


    前面提到,水金合相的人容易因為具有音感而成為音樂家,但未必能夠成為演奏家。原因在於演奏跟火星的行動力有關,如果一個人想要成為演奏家的話,最好能夠擁有水火一百二的和諧相。


    當一個人的水星跟火星一百二,他們除了會有敏銳迅速的心智反應之外,他們在表達的意見也會特別具有能量,因而很適合從事演說、教育、法律、評論或政治等相關


    122'
  - '[PAGE 125]


    工作。因為他們具有說服別人的高超能力，所以很容易成為超級業務員或律師。水火一百二的語言通常是具有行動力的，簡單的說，當水星跟火星形成一百二十度和諧相，語言就不只是一種心智上的溝通，對他們來說，語言更是一種強而有力的工具。例如一個業務員在推銷時，他的語言就是一種推銷的手腕；一個律師出庭時，重點是在「打官司」，語言就是一種出庭時的必要工具。'
- md: '## Chapter/12


    ### 水星與木星：心智與社會價值的互動


    在水星跟太陽、月亮、金星、火星這四顆內行星形成的相位中：水星跟太陽合相的人腦袋動得特別快，水星跟月亮有相位的人具有察覺與表達內在情緒的能力，水星跟金星合相的人特別有音感，水星跟火星有相位的人表達意見時特別有能量。這些都是一個人在心智與溝通方面的個人特質，它們的影響力都比水星跟木土天海冥的相位小得多。


    當一個人的水星跟木土天海冥形成相位，代表水星的心智跟木土的社會意識或天海冥的宇宙意識產生連結，當事人就會透過水星發揮出更大的影響力。整個人類的學術系統可說都是建立在水星與木土天海冥這五顆外行星的架構上，它們各有其不同的表達領域。木星跟土星是社會星，水木跟水土相位連結的是社會意識，它們都屬於社會大眾可以理解的範圍，如果一個人具有水木、水土的好相位，代表當事人的想法很容易被大眾接受，水木、水土的自我表達都跟教育文化背景有關，他們容易寫出大家都在討論的議題。如果一個人想要受大眾歡迎，只需要憑藉木星跟土星的能量就夠。


    但是木星跟土星的能量都跟當下的社會環境有關，一旦時空改變，影響力也就隨之消失。如果一個人提出的想法超越一般大眾的思維，不管是引人深省、石破天驚，或是讓人迷惑，這些都必須仰賴天王星、海王星、冥王星的宇宙意識才能做得到。不過水天、水海、水冥傳達的宇宙頻率不像水木、水土這麼容易被大眾理解，它們往往曲高和寡，雖然可能對後世有很大的影響，但是當下不見得能為當事人帶來現實的利益。


    ### 水木合相——流暢的表達能力


    水木合相的人通常都會對於知識與智慧感興趣。由於木星具有膨脹的特質，所以水木合相的人喜歡的學問類型會比較廣泛，他們往往會對哲學、教育、歷史、異國文化、宗教心靈等領域都感到好奇，同時具有人道主義的傾向。他們喜歡溝通、講話，也可能喜歡寫作——端看當事人的水星往哪方面發展，但缺點是興趣太廣泛與貪多不精。水木合相的人特別適合去從事教育文化、出版文教等相關工作項目，有不少小說家的本命星圖中都有水木合相的相位。


    水木合相的人通常都具有流暢的表達力，這種特質完全與水土合相的人相反。木星的順利與流暢也容易讓水星的音樂性獲得發揮，所以這也是個適合音樂才藝的相位。


    ### 水木九十——過度樂觀的心智表達


    水星跟木星九十度的人，通常會面臨信仰（木星）與客觀理性（水星）之間的矛盾。由於木星的力量比較大，所以這些人很容易讓旁人覺得只要扯上信仰，他們就會缺乏理性，譬如前總統李登輝就是水木九十的人，因此容易在信仰理念上跟旁人意見不合。


    水木九十的人往往話匣子一開就停不下來，他們很喜歡表達意見，而且他們打開話匣子的時候往往不是閒談，而是在談論他們覺得很重要、很有價值的議題。


    水木九十的人思想都很樂觀，而且樂觀到有點過度，他們永遠有很多的點子與理想，常常會相信很多事情，即使這些事情根本八字沒一撇。水星本來是顆客觀的行星，但是木星的膽大會帶動水星的發展，所以水木九十的人講出來的話不必盡信，因為他們只要有點影子就會拿出來說，他們就是膽子大。不過木星基本上是吉星，本命星圖中木星相位就算再怎麼不好，惹出來的麻煩都不算太嚴重。木星的剋相頂多就是太大膽，它有可能會讓人摔一大跤或者損失金錢，但是它不會讓人感到痛苦、悲觀。


    水木九十的人雖然容易說話不算話、看待事情不確實，或者常常答應很多做不到的事情，流於空想卻不承擔責任，負面的木星相位雖然會成為當事人或大或小的人格瑕疵，可是永遠不會影響到當事人，因為他們不會把事情掛在腦中，也容易遺忘，即使被人指責也不在乎，所以大家往往拿他們沒辦法。


    ### 水木一百八——過度大膽引起的溝通糾紛


    水木一百八的人通常都有著豐富的想像力，他們喜歡不勞而獲，對於知識的胃口很大，對很多事都有興趣，不過他們不像水木九十的人講話這麼膨風。一百八相位跟九十五度最大的不同在於，一百八十度容易向外投射，反映在外界的人事物問題上。由於木星跟法律有關，水木一百八的人最容易遇到的是合約糾紛，或者是幫人做保而受到牽連。


    水木一百八的人一定要特別小心跟外界有關的法律、帳目糾紛。水木一百八常使當事人因為木星的樂觀而粗心大意，以致於忽略水星的細節。他們常常簽約時沒有看清楚合約，或者過度膽大幫人做保。相較之下，水木九十的人雖然喜歡亂講話，但是頂多讓人覺得他們言而無信，他們並不會隨便幫人做保，也不容易亂簽合約。


    ### 水木一百二——行雲流水的思考能力


    水木一百二的人，理解力都很高、靈感很強、善於寫作，這些能力也讓他們容易享有順暢的求學過程，他們對宗教、哲學領域也都會有興趣。水木一百二的人，有著快速的寫作速度與流暢的文字能力，他們絕對不是像杜甫那種為了寫作會糾結到撚斷好幾根鬍鬚的作家。


    木星跟土星是社會星，如果一個人的木星、土星有好相位，他們就容易得到社會給他們的回饋。台灣不少暢銷流行作家都有水木一百二的相位，水木一百二會比水土一百二容易流行，原因在於木星代表的是社會的主流價值觀，也就是流行的事物，但他們通常不會被當成意見領袖或專業上的權威，如果是水土一百二的人就比較容易成為意見領袖，或者是思想或專業領域的權威。


    由於木星具有膨脹、擴張、快速的特質，所以水木一百二的作家寫作時往往沒有固定的結構與理論，而水土一百二的作家寫作時則一定有其結構。不過，水土一百二的作家作品有結構就等於有門檻，水木一百二的作品沒有結構，也就等於不設限。


    此外，木星也具有正面、樂觀的特質，水木一百二的人都很容易正面思考，水木一百二的作家常常會寫勵志書，透過文字鼓勵樂觀向上、鼓舞人心，再加上他們的看法容易與當時的社會環境與潮流結合，所以容易成為暢銷書。


    木星代表的是一「當下」的社會潮流，所以它會受到社會環境空間與時間的限制。德國當下流行的東西，不見得在美國也會受歡迎，台灣暢銷的東西，拿到澳洲不見得也會暢銷。舉例來說，伊拉克前總統海珊（Saddam
    Hussein）就有水木一百二相位，海珊在伊拉克其實很受歡迎，他是當地的暢銷思想家，但是美國人卻很討厭他。此外，木星的流行也很受時間影響。一個水木一百二的作家，除非還同時有天王星、海王星相位，否則即使當時再暢銷，等到流行過去，就不會有人想看了。土星的影響力雖然會比木星持久，但如果說到真正能夠流傳後世，不管是文字或藝術作品，一定要跟天王星、海王星有關。因為天王星、海王星傳達的是宇宙影響力，而非社會影響力。


    天王星、海王星的影響力一開始或許不如木星這麼顯著，尤其是海王星，一個海王星很強的畫家，可能生前都一直沒有得到肯定，但是死後作品一路狂漲，越賣越貴，但如果一個畫家只有木星跟金星的好相位，他的作品可能當下價格很高，但是事過境遷以後，就再也不會受到矚目了。


    ## Chapter/13


    ### 水星與土星：心智與社會現實的互動


    太陽、月亮、水星、金星、火星這五顆內行星都是跟個人有關的能量，五顆內行星受剋造成的負面問題，當事人也一定會感覺得到。五顆內行星的剋相當中，又以月亮跟水星剋相的問題較大。太陽受剋的人人生之路走起來比較辛苦，金星受剋的人可能會情感或金錢價值觀扭曲的問題，火星受剋的人往往為了逞一時之快而惹出大麻煩，但月亮受剋有可能會讓人極度憂鬱而自殺，水星受剋會使人心智瓦解而崩潰。對於人類而言，存在感跟存在感意識往往是生存的要素。


    水星代表一個人的理智系統，它對於個人的精神與心智的穩定非常重要。如果一個人本命星圖中的水星相位不錯，往往可以克服很多火星、金星或月亮負面相位帶來的問題。一個人星圖當中如果有很多問題存在時，好的水土相位能往往能為當事人提供很多幫助，原因在於水星跟土星如果形成相位，土星的現實特質會讓水星維持穩定，當事人就可以藉由理智來化解許多難題。


    本命星圖中有水土相位的人，都會長於語言表達中的邏輯思考。他們也適合從事工程、建築、手工藝、幾何設計等相關行業，總而言之，他們都很適合從事各種跟結構有關、邏輯性強的行業。


    ### 水土合相——結構嚴謹的思考能力


    水土或水冥合相的人都有個特色，讀書的時候，這些人通常都比水木有相位的人辛苦。水木相位與記憶有關，所以水木具有良好相位的人通常在文史類都表現得不錯，他們很會背東西，文筆也不錯，表達能力很好。可是面對數理科目則容易感到為難，因為木星跟文史有關，跟數理無關。數理需要比較強的邏輯性與結構感，因此跟土星有關。如果一個人水土相位不錯，又沒有同時遇到海王星剋相的話，他們的數理表現應該都會很不錯。例如愛因斯坦（Albert
    Einstein）就有很誤差度數很小的水土緊密合相。


    水土合相的人在思考時有其步驟，他們不像水木相位那麼感性。水土合相的人在表達意見時會比較小心，即使水星落在愛表達的火象星座，除非水星同時又有木星等其他行星的相位，否則他們通常都不太愛講話。土星代表的是現實世界的邏輯，一般來講，水土合相的人在思考時比較重視實際面，也比較深沈，他們不太澎風，也不會太樂觀，他們會衡量事情的真實狀況，這些人在面對世界時會有比較嚴肅的習慣。你會發覺水土合相的作家通常都會先想好怎麼寫才寫，而且注重邏輯與事實，他們不會隨性亂寫。


    水土合相的人因為邏輯感強，所以通常會對數學、工程、建築會比較有概念。水木合相的人如果要念建築就比較困難，因為他們的思考沒有結構性，水土合相的人則一定有其結構。如果水土合相的人念的不是理工科而是文科的話，他們就容易對社會結構與經濟學這類跟結構有關的學科有興趣。


    水土合相的人通常可以承擔比較持久與辛苦的工作，如果要找好編輯，通常要找的是水土相位，而非水木相位的人。水土有好相位的人才會願意花時間去改稿、校對，水木好相位的人不會那麼有耐心，而且可能連標點符號都用得不夠好——標點符號屬於文章的結構，所以跟土星有關，跟木星無關。


    ### 水土九十——過度悲觀的心智壓抑


    水土九十的人在求學過程中常會受到權威的壓制，有些人會覺得父母或老師常常不讓他們自由發言，他們很容易碰到別人阻止他們自由表達想法。一個人在七、八歲到十五歲之間，是水星發展最重要的階段，成長階段中如果水星如果承受到很大的壓力，就很容易會造成一輩子的影響。


    水土合相或是水土一百二十的人在求學過程當中，一定碰過好老師，他們在學習知識的過程當中，可能會受到來自年長者或威權者的正面影響。但水土九十的人不同，他們在整個學習過程中一定會碰到讓他痛苦的老師，因為土星的權威可能會藉由老師來展現，儘管這些老師並不一定是壞老師，但是他們都會令當事人畏懼，也帶來很大的限制。


    很多水土九十的人，容易在觀念上面養成閉塞的習慣，也特別討厭被別人念。他們常常會過度欠缺想像力，想法也不容易受到他人肯定。以寫文章為例，水土九十的人寫出來的東西常會比較呆板，他們常常喜歡運用成語，遣詞用字也比較八股。不只是寫文章，他們的觀念也比較守舊，他們很容易用一種自認為符合社會標準，但也許已經過時的方式來看待所有的人事物。


    水土九十的人可以說是傳統思想的受害者。他們常會害怕表達自己的想法，但是他們通常是比較有見識、有想法的人。他們會捍衛傳統，不太喜歡改變，他們很相信權威，卻又很容易受到權威的壓制。


    水土九十的人常常會過度悲觀，而水木九十的人則常常過度樂觀。如果一個人本命星圖中既有水土九十，又有水木九十，木土的能量不會彼此抵銷，它們會同時出現。當事人會一下子很樂觀，一下子很悲觀，他們可能一下子跟你說這個計畫一定成，過一陣子又說不行，一定會失敗，常常會出現矛盾。


    ### 水土一百八——過度防衛的權威心態


    水土九十跟水土一百八的不同在於，水土九十的人容易受到權威壓制，但水土一百八的人卻容易成為權威。水土一百八的人很小心、自我要求很高，防衛心也很強。


    他們常常會是那種重視學術權威且難以溝通的教授或學者，或者是政府機構裡高高在上的官員，或者是讓人感到害怕的律師、會計師之類的專業人士。


    他們就像那種永遠臭著一張臉讓下屬感到恐懼的老闆，別人永遠都不能提出反對意見。越守舊的社會形式，比方像伊朗或伊拉克，對水土一百八的人發展越有利，因為這種社會形式本身就像過度發展的土星。水土一百八的人最大的缺點就是當事人的水星已經被土星的一百八對衝完全封閉，失去溝通能力了，所以他們會用權威取代溝通。他們不能被批評，也難以跟人對話。


    由於水星也跟呼吸有關，如果本命星圖中的水土一百八是落在跟健康有關的六宮、十二宮，當事人就要小心呼吸困難或氣喘這類的問題。


    ### 水土一百二——理解現實帶來的實際利益


    水土一百二是比水土合相更好的相位，原因在於水土合相時，由於土星的力量太大而壓制到水星的發展，但水星跟土星如果形成的是一百二十度相位，當事人的水星不會受到土星的壓抑，又能夠透過一百二十度和諧相的幫助，得到跟社會有關的現實利益，因此水土一百二是一個容易出名人的相位。


    水土一百二的人都很聰明，他們的腦筋都很清楚，記憶力也很好。相較之下，水木一百二雖然利於求學，但是水木一百二帶來的通常只有短期的記憶力，他們雖然記得快，但是往往一考完就忘記，因為記憶要靠結構，記東西的時候有條理、有組織，這樣才能夠記得久。


    水土一百二的人記東西一定是有方法的，他們不是死記，他們的思想有組織性。你跟水土一百二的人講話時會發現他們說話很有邏輯，他們絕對不會想到哪裡講到哪裡，他們話的背後都有層次、有章法。


    水木一百二的人對於社會與現實的理解力很強，他們通常在語言、建築、教育、管理、政治上都會有不錯的表現。水木一百二的人不見得會懂政治，但水木一百二的人一定懂政治、懂社會，而且一定懂商業，他們一定會懂現實當中的邏輯，不會只是某種理想。水木一百二的人理想且樂觀，他們懂的可能是理想的邏輯，卻不見得能懂現實的邏輯。但水木一百二的人所有的事情都是計算過的。水木一百二的人思考側重權威性，他們表達出來的東西也容易成為權威，而不會只是流行。


    例如導演王家衛就是水木一百二的人。如果將王家衛跟蔡明亮做個比較，就可以看出，王家衛可以在香港那樣子的環境當中用特有的觀點詮釋電影，而且可以控制大牌明星，可以讓人家出資供他拍戲，某一程度來說，他腦筋裡面有某一部分是企業家，他可以說是用企業家的方式在拍個人的藝術電影。水木一百二的人知道真正的市場在哪裡，他們唯一的缺點就是不會幻想，除非當事人像王家衛一樣有很好的金星相位，或者有很好的海王星相位，否則這會讓他們難以從事創作。僅有水木一百二相位的人無法從事太空想的事業，因為這是個很執著於現實的相位，他們也容易得到現實的好處，但他們的問題也是不容易跳開現實。他們是格子裡的寫手，無法成為格子外的作家。這些人會是好的社會思想家，卻絕對不會是哲學家，因為土星是違反哲學的，哲學或神學理論都是超越現實的，一定要靠天王星才能帶動這些力量。


