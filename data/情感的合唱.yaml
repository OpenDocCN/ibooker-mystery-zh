    研究名人星圖時，我們常會發現，天王星、海王星很強的人，他們或許不像木星、土星很強的人那麼受當時社會的歡迎，但是他們的影響力往往流傳後世，不被世人遺忘。


    原因在於木星跟土星是社會星，木星跟土星帶來的好運都跟當下的社會情況有關，木星跟土星帶來的成就，一旦離開了當時的社會條件，就會被時代淘汰。而天王星、海王星喚起的是宇宙意識，因此可以突破時空限制，不會被時代淘汰。


