  md: '任何相位都需要行運來啟動，金冥相位固然可能會引發痛苦而且麻煩的情感關係，但是也是在遇到行運行星跟本命星圖的金冥形成相位的那段期間壓力特別大，並不是一輩子都這麼痛苦。不過話說回來，最令人痛苦的行運土星帶來的剋相，會讓當事人在形成剋相的兩年多時間都維持在極度痛苦的高焦慮狀態，如果是金天相位的人可能連半年都無法忍受，早就跟對方分手，如果是金海相位的人遇到這樣的問題，他們一定會躲起來假裝沒這回事，完全不吵不鬧，即使對方遞上離婚證書，他們也不理不睬，有時候被他們拖個兩年多，等到行運剋相過去，還真的有時候就這樣一切恢復正常。


    只有金冥相位的人才有辦法忍這麼久，他們遇到行運剋相時吵也吵了，鬧也鬧了，但是搞到最後婚也沒離，外遇的問題也沒解決。對金冥相位的人來說，他們絕對不可能會有什麼平靜的外遇這回事。'
