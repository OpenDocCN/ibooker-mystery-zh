    如果一個人的本命星圖中月亮跟火星有九十度的衝突相位，代表當事人的情緒常常會受到脾氣干擾而顯現出一種不穩定的狀況。月亮跟火星九十度的人，都會有個很容易發火的媽媽。容易發火跟容易吵架是兩回事，一個人可以跟媽媽常常在言語上起爭執，可是不帶脾氣，像月水九十的人就是這種類型。月火九十的人媽媽個性很強、脾氣不好，當事人跟媽媽之間不見得經常意見不合，但是他們常常會因為情緒不合而起衝突。通常月火九十的人，媽媽都很強硬，當事人跟母親常常會有情緒上的衝突，可能是為小事而衝突，而不是為意見不合衝突。


    月火九十是一個對女性健康很不利的相位，它常常會跟子宮、卵巢等問題有關。對於女性來講，子宮跟卵巢的問題，可能都跟情緒的不穩定有關，經常發脾氣或經常情緒很不穩定的人，荷爾蒙是不會穩定的，長期的情緒波動會造成荷爾蒙的波動。所以星圖上如果有月火九十，尤其如果月亮或火星又有其他剋相時，很多人會有子宮腫瘤，如果'
