    水天一百二是水天相位中比較好的狀況，因為一百二十度的和諧相位會讓當事人的心智容易與宇宙產生連結，卻不會受到宇宙意識控制而過度狂熱。例如美國女星珍芳達（Jane
    Fonda），她的水星落在摩羯，所以她是關心政治的人，她在越戰期間曾到河內演說，引起不少爭議，但是返美之後還是有跟政府協調，所以其實並不是真正的反政府主義者與革命家。她後來從事健身運動推廣，率先以健美操錄影帶成為減肥天后，這也顯示出水天一百二可以將現實與創新整合的一面。


