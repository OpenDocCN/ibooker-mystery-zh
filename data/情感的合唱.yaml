  md: '# 月土一百八 | 女性關係的困難


    月土九十意謂著母親或生命中重要女性會給他們很大的壓力，因此容易情緒低落，感到憂鬱。月土一百八的人不像月土九十受到母親帶來的龐大壓力，但往往會跟母親無緣，因而當事人會特別希望由外界尋求母親的象徵。當一個人小時候跟母親無緣造成的欠缺，長大以後就會不自覺的想要用其他方式來補足這個缺憾。


    如果一個男性本命星圖中有月土一百八相位，他們容易對身處困境的女性產生特別的感情。但是他們可能小時候跟母親無緣，長大結婚以後也跟妻子無緣。有一些月土一百八的人會因為早期跟母親無緣，因而造成日後跟妻子相處時產生困難。


    月土九十代表當事人會跟妻子在相處上出現問題，可是不見得會與妻子生離死別，但月土一百八常常會反映出當事人跟妻子無緣。所以對於月土一百八的人來說，與其死別，不如生離，最好的狀況有時反而是離婚或相隔兩地。


