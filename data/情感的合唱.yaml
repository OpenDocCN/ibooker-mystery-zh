  pgno: 46
- img_proc: true
  md: '即使是性荷爾蒙特別高的人，他們對於性愛的衝動，也會隨著年紀增長而逐漸消退，不會像月金一百八的人終生都在追求新戀情。


    # 月金一百二——安全感與情感的和諧


    月金一百二的人通常有個具有藝術天分的媽媽，例如我認識一個月金一百二的人，他的媽媽是很有名的花道老師，教了三十年的花道。月亮跟金星的一百二十度和諧相位，意謂著當事人和母親之間有種溫柔的關係，他們生命中的重要女性也會顯示出這種特質。如果一個男人本命星圖中有月亮金星一百二十度和諧相，代表他們容易娶到對他們很好的太太，夫妻之間會有親密的情感交流。


    不過一個人本命星圖中有月金一百二的好相位，不代表生活中不會有其他的問題。我看過一個非常特殊的案例，當事人是我的遠房親戚，他的本命星圖中有月金一百二的好相位，他透過電腦徵婚安排的相親，找到了理想的對象，兩人一拍即合墜入情網，後'
