    此外，帝國取得新知之後，至少理論上應該也有益於當地被征服的民族，讓他們享受到「進步」的好處。例如獲得醫療和教育、修築鐵路和運河，以及確保司法公正、經濟繁榮。帝國主義人士聲稱，他們的管理不是毫無節制的剝削行為，而是利他的舉動，是要照顧這些非歐洲民族。以英國作家吉卜林（Rudyard
