  md: '對蘇美人來說，蘇美文字不能拿來寫詩，似乎並不是什麼大問題。畢竟他們發明文字的目的不在於複製口語，而是想要完成一些口語沒做到的事。這就好比在哥倫布抵達美洲之前，安地斯山脈就有一些文化，從來只有部分表意的文字，他們並不會覺得這樣不夠用，也不覺得有必要發展成完整表意的文字。安地斯文化的文字和蘇美文字大有不同，不同的程度大到有很多人甚至不認為安地斯文化的文字是一種文字。


    安地斯文化的文字不是寫在泥板或紙張上，而是在各種顏色的繩子上打結來表示，稱為結繩語（quipu）。每個結繩語的文本，都有許多不同顏色的繩子（材質可能是羊毛，也可能是棉花），在每條繩子的各種位置上，綁著幾個結。光是一個結繩語文本，就可能有數百條繩子、幾千個結。透過這些不同顏色、不同繩子、不同打


    ![](img/b523907992e2c573126c18fe166aa89d_149_0.png)


    14. 十二世紀的安地斯文化結繩語。'
  merge: -1
