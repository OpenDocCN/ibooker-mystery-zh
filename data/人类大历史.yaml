  md: '這些信仰也認為：有某種超人類的秩序控制著這個世界，但它們所崇拜的這個秩序是自然律（natural law），而不是什麼神明的意志。這些自然律的宗教信仰，雖然某些也相信有神祇存在，但認為神祇就和人類、動物和植物一樣，會受到自然律的節制。雖然神祇可以說在這個生態系中有其優勢（就算是大象或豪豬，也各有優勢），但祂們也像大象一樣，並無法改變自然律。最典型的例子是佛教，這可以說是最重要的古代自然律宗教，而且到今天仍然興盛。


