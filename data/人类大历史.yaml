  md: '些斬釘截鐵的解釋，把人類歷史簡化成各種生物、生態或經濟力量的運作。他們認為羅馬帝國時代的地中海地區在地理或經濟方面有某些特殊之處，那裡的人民在基因方面也有某些特殊之處，因此必然促成了一神教興起。然而，對大多數歷史學家來說，對於這種斬釘截鐵的理論還是抱持著懷疑。這正是歷史成為一個學門的特點之一：對某個時代的瞭解愈透澈，反而就愈難解釋為什麼發生了這個事件、而不是發生那個事件。但如果對某個時期只是一知半解，就很容易受到結果影響，只看到那些最後成真的可能性。於是，他們就用後見之明，來解釋為什麼現在的結果是無法避免的。


    事實上，必須要真正更深入瞭解這些時期，才能真正看到那些最後並未發生的可能結果。


    其實，真正最知道當時情況的人（也就是活在當時的人），正是最看不出歷史走向的人。譬如，對君士坦丁統治下的羅馬人民來說，未來就像是霧裡看花。歷史的鐵則就是：事後看來無可避免的事，在當時看來總是毫不明顯。直到今天，情況仍是如此。我們已經走出全球經濟危機了嗎？還是前面有更大的打擊？中國會不會繼續成長、成為全球第一的超級大國？美國會不會喪失霸主地位？一神論基本教義派會成為全球的主流，或者不過是地方的小騷動、在未來不值一哂？我們走向的是生態的災難、還是科技的天堂？


    以上所有的走向，評論家都各自有一套很完整的論述，但我們就是無法確定何者將成真。但如果過了幾十年後再回顧，我們就會覺得答案真是太明顯了。


    特別要強調的是，那些在當代看來最不可能發生的事，常常就是最後成真的事。君士坦丁大帝在西元306年即位的時候，基督教不過就是神祕的東方教派。如果當時有人說基督教會成為羅馬的國'
