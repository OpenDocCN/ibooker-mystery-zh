  md: '# 另一個奇異點


    目前，所有這些新契機只有一小部分已經成真。然而，在2014年這個世界上，文化已經掙脫了生物學的束縛。我們現在不只能改造周遭的世界，更能改造自己體內和內心的世界，而且發展的速度奇快無比。有愈來愈多領域的行事方式都已經被迫大幅改變，不再能照舊便宜行事。律師需要重新思考關於隱私和身分認同的問題；各國政府需要重新思考醫療保健和平等的問題；體育協會和教育機構需要對公平競爭和成就重新定義；退休基金和勞力市場也得調整因應，未來的六十歲可能只像是現在的三十歲。此外，每一個政府、組織和個人，全部都得面對生物工程、半機械人及無機生命帶來的難題。


    想當初，第一次進行人類基因組定序的時候，花費了十五年、30億美金。但現在只要花上幾週、幾百美金，就能完成一個人的基因定序。134 根據DNA為人量身訂做的「個人化醫學」時代，已然展開。你的家庭醫師很快就能告訴你，你得到肝癌的風險比較高，但倒是不用太煩惱心臟病的機率。醫師還能告訴你，某種對92%的人有效的藥物，就是對你沒用，而另外一種通常會致命的藥物，反而正是你的救命仙丹。一個幾近完美的醫療世界，已經近在眼前。


    然而，醫療的進步也會帶來新的倫理難題。光是現在，倫理學家和法律專家就已經因為DNA所涉及的隱私問題，感到焦頭爛額了。例如：保險公司是否有權要求我們提供DNA定序資料？如果要保人的基因顯示遺傳性的魯莽衝動傾向，保險公司是否有權要求提高保費？以後公司要聘僱新員工時，會不會要求的不是履歷表，'
