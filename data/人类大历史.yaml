- img_proc: true
  md: '如果澳洲的物種滅絕只是單一事件，對於人類的無辜或許我們還能姑且信之。但翻開歷史紀錄，班班可考，智人看來就是生態的連環殺手。


    # 滅絕之因


    最初移居澳洲的智人，手頭上只有石器時代的技術，他們究竟是怎麼搞出這場生態浩劫的？以下有三種解釋，合情合理。


    第一種解釋，在於大型動物（也就是澳洲物種滅絕的主要受害者）繁殖十分緩慢。不僅懷孕期很長、每次懷胎數少，而且懷孕期之間相隔也久。因此，就算人類每幾個月才獵殺一隻雙門齒獸，也可能讓雙門齒獸的死亡數高過出生數。於是不到幾千年，就會看到最後一隻雙門齒獸孤單死去，而整個物種也就此滅絕。20


    而且，雖然雙門齒獸身形巨大，但要獵殺並非難事，原因就在於牠們對於人類的襲擊根本來不及防衛。各種「人屬」物種在亞非大陸上潛伏演化了兩百萬年，不斷磨練狩獵技能，而且從大約四十萬年前，便開始獵捕大型動物。不過，亞非大陸上的巨獸都已得到教訓，懂得保持距離，以策安全。所以等到最新一代的掠食者「智人」出現在亞非大陸的時候，大型動物都已經懂得要避開長相類似的人屬生物。相較之下，澳洲的巨型動物可說完全沒有時間學會該趕快逃跑。畢竟人類看起來似乎不太危險，既沒有又長又鋒利的牙齒，也沒有特別結實或敏捷的身體。而雙門齒獸可是史上體型最大的有袋動物，所以牠第一次看到這隻長相弱不禁風的猿類，大概只會瞟上一眼，就繼續回去嚼樹葉了。對這些動物來說，需要靠演化才能學會懼怕人類，但時間根本不夠，牠們轉眼便已滅絕。'
  merge: -1
