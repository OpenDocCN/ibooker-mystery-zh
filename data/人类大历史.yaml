  md: '離，好保護白人。同樣的，白人出於害怕疾病，會避開有黑人的旅館或餐廳；害怕孩子受欺負或被帶壞，所以也不希望孩子去上有黑人的學校；害怕黑人既無知又沒道德觀，所以不想讓黑人在選舉中投票。而這些憂慮甚至還有科學研究的「證明」，在後面撐腰，提出黑人平均學歷確實較低、得到各種疾病的比率確實較高，而且犯罪率更是遠高於白人。（但這些所謂的「科學」研究，卻忽略了這些「事實」是出於對黑人的歧視。）


    到了二十世紀中葉，美國南方各州種族隔離的情形，甚至比十九世紀末更為惡化。1958年，黑人克雷農·金恩（Clennon King）申請進入密西西比大學就讀，竟被強迫關進精神病院就醫。當時法


