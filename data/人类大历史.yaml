  md: '因為極度惡劣的工作環境、或是搭上征服者便船而來的歐洲疾病，當地原住民快速大量死亡。不到二十年，整個加勒比地區的原住民幾近滅絕。西班牙殖民者開始得從非洲進口奴隸，來填補空缺。


    這場種族滅絕的浩劫，可說就發生在阿茲特克帝國的家門口，但等到科爾特斯終於踏上帝國東海岸的時候，阿茲特克人對這一切仍然一無所知。對他們來說，西班牙人的到來，幾乎就像是有外星人來訪。阿茲特克人深信自己早就認識了全世界，而且相信絕大多數都在阿茲特克帝國的控制之下。對他們來說，帝國以外竟然還有像西班牙人這種玩意，簡直無法想像。所以，等到科爾特斯和部下來到今天的韋拉克魯斯（Vera
    Cruz）一帶，登上陽光明媚的海灘，這是阿茲特克人第一次碰到了完全陌生的人類。


