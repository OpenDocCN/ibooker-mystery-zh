  md: '輸你一截，你也不會因此就感覺開心。因為你在心裡比較的對象是那些明星、運動員和超級名模，你整天都會在電視、臉書和巨型廣告看板上看到他們。


    有沒有可能，第三世界國家之所以會對生活不滿，不只是因為貧窮、疾病、政治腐敗和壓迫，也是因為他們看到了第一世界國家的生活標準？平均來說，埃及人在前總統穆巴拉克的統治下，死於飢餓、瘟疫或暴力的可能性，遠低於在古代法老拉美西斯二世或埃及豔后克麗奧佩特拉統治的時期。對大多數埃及人而言，這根本是有史以來物質條件最好的時刻。在2011年，理論上他們應該要在大街上跳舞慶祝，感謝阿拉賜給他們這一切的財富才對。然而，他們反而是滿懷憤怒，起身推翻了穆巴拉克。原因就在於，他們比較的對象不是古代的法老王，而是同時代的美國總統歐巴馬。


    這麼一來，就算是長生不老，也可能會導致不滿。假設科學找出了能夠醫治所有疾疾的萬靈丹，加上有效抗老療程和再生治療，能讓人永保青春。那麼，最可能發生的事，就是整個世界感到空前的憤怒和焦慮。


    那些無力負擔這些醫學奇蹟的人（也就是絕大多數人），一定會憤怒到無以復加。縱觀歷史，窮人和受壓迫者之所以還能自我安慰，就是因為死亡是唯一完全公平的事。不論再富有、權勢再大，也難逃一死。光是想到自己得死、但有錢人居然能長生不老，就會讓窮人怒火中燒，不可遏抑。


    而且，就算是那極少數負擔得起的有錢人，也不是從此無憂無慮。他們有太多需要擔心的事了。雖然新療法可以延長壽命、常保青春，但還是沒辦法讓屍體起死回生。也就是說，他們絕對更需要避免發生意外——出門不能被酒醉駕駛撞到、不能被恐怖份子炸成'
