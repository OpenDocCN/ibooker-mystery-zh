  md: '# 蓋起監獄高牆


    建築上。一座城堡幾乎不可能有兒童房（就算是成人，也很少有個人的房間）。例如，如果是中世紀男爵的兒子，城堡裡的二樓不會有他自己的房間，他如果崇拜獅心王理查一世或亞瑟王，也沒辦法把他們的畫像貼在自己的牆壁上；可以上鎖的門就更別談了。他睡覺的地方跟其他許多年輕人一樣，就是在寬敞的大廳裡。可以說，他總是活在眾人的目光下，總是得注意別人的觀感和意見。如果在這種環境下長大，自然就會覺得：個人的真正價值是由他的社會階級，以及他人對他的看法而決定的。40


    # 2. 想像建構的秩序塑造了我們的欲望。


    對多數人來說，都很難接受自己的生活秩序只是虛構的想像，但事實是，我們從出生就已經置身於這種想像之中，而且連我們的欲望也深受其影響。於是，個人欲望也就成為虛構秩序最強大的守護者。


    例如現代西方人最重視的那些欲望，都是建構在已經為時數百年的虛構故事上，包括浪漫主義、民族主義、資本主義，以及人文主義。我們常常告訴朋友要「隨心所欲」，但這裡的「心」就像是雙面諜，聽從的常常是外面那些主流的虛構故事。於是「隨心所欲」不過也只是結合了十九世紀浪漫主義與二十世紀的消費主義，再植入我們的腦海罷了。以可口可樂公司為例，旗下雪碧的廣告詞就是「相信你的直覺，順從你的渴望。」


    甚至那些人們以為深深藏於自己內心的渴望，通常也是受到由想像建構的秩序所影響。例如，許多人都很想到國外度假。然而，這件事並沒有什麼自然或是明顯的道理。例如黑猩猩的首領可不會想要運用權力，讓自己到隔壁黑猩猩的領土上度個假。而像古埃及'
