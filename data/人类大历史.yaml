  md: '# 第20章 智人末日


    僭越神的角色，試圖操縱生命，就會受到嚴厲的懲罰。然而，這個故事其實還有更深的含義。


    科學怪人的故事直接向智人提出挑戰，告訴我們智人終結的一天已經不遠。根據這個故事，除非發生全球核災或生態浩劫，否則根據現在科技發展的步伐，很快智人就會被取代。新一代的主宰不僅體型體態不同，連認知和情感世界也有極大差異。


