  md: '者都學會了「留白」這一套，誠實面對自己有太多無知之處，並試著加以填補。他們開始承認自己的理論還不完美，一定還有什麼尚未得知的重要資訊。


    ![](img/b523907992e2c573126c18fe166aa89d_325_0.png)


    24. 1525 年的薩維亞提世界地圖（Salviati World Map）。


    1459 年版的世界地圖上畫滿了各個大陸和島嶼，還有詳細的解釋，但薩維亞提地圖則有大片留白。我們可以看到美洲的海岸線一路向下之後，接著就是一片空白。任何人只要有一點點好奇心，看到這份地圖之後必定會問「在那後面有什麼呢？」地圖上沒有答案。這就像是一份邀請，請讀者親身起航，一探究竟。


    # 征服異域之心從何而來？


    地圖上的空白就像一塊磁鐵，讓歐洲人前仆後繼，希望填補這些空白。在十五、十六世紀，歐洲探險隊繞行了非洲、深入了美洲、越過太平洋和印度洋，在世界各地建起基地和殖民地的網路。'
  merge: -1
  pgno: 325
- img_proc: true
  md: '這是全球性帝國的真正首次登場，也是首次出現全球性的貿易網。歐洲帝國遠征改變了世界的歷史：原本是一些獨立的民族和文化各自發展，現在則整合成單一的人類社會。


    正因為我們已經太熟悉歐洲這些「探索與征服」的過程，常常忘了這件事其實非常特殊。在這之前，世上從來沒發生過這種事。要這樣千里迢迢去征服別人，絕不是什麼自然的舉動。縱觀歷史，大多數人類社會光是處理地方衝突、鄰里爭吵，就已經無暇他顧，從來沒想過要前往遠方探索、征服遙遠的國度。絕大多數的大帝國向外侵略，只著眼於鄰近地區，之所以最後幅員廣大，僅是因為帝國不斷向鄰近地區擴張而已。


    像是羅馬人在西元前350年至300年征服伊特魯里亞（Etruria，約為現代義大利中西部），目的只是為了保衛羅馬的安全。接著在西元前200年左右征服波河流域（Po
    Valley，義大利北部），目的只是為了保衛伊特魯里亞。接著，他們又征服了普羅旺斯，以保衛波河流域（約西元前120年），征服高盧，以保衛普羅旺斯（約西元前50年），最後再征服了不列顛，以保衛高盧（約西元50年）。羅馬帝國從羅馬延伸到倫敦，總共花了四百年。在西元前350年，沒有羅馬人會打算直接乘船揚帆征服不列顛。


    雖然偶爾會有某個雄心勃勃的統治者或冒險家，展開長途的征討或探險，但通常都是順著早已成形的帝國道路或商業路線行進。以亞歷山大大帝為例，他並未建立新的帝國，而是推翻並接手了原本就已存在的波斯帝國。最接近現代歐洲帝國的例子，在古代是雅典和迦太基這兩大海上帝國，至於中世紀則是位於現今印尼泗水一帶、曾在十四世紀掌控大半印尼地區的滿者伯夷（Majapahit）海上帝國。但就算是這些帝國，也很少會貿然前往未知的海域，如果和'
