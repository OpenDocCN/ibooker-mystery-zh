    6. 這是不是史上第一隻寵物？


    在以色列北部發掘出一座一萬兩千年前的墓穴（現為史前人類博物館 Kibbutz Ma''ayan Baruch Museum），裡面有一具年約五十歲女性的骨骸，旁邊還有一副小狗的骨骸（右上角）。小狗埋葬的位置與女人的頭部接近，而且女人的左手還搭在狗的身上，看起來似乎有著某種情感聯繫。當然這也能有其他的解釋，譬如說，這隻狗是一份禮物，要送給看守天堂入口的看門人。


    狗是第一種由智人馴化的動物，而且早在農業革命之前便已發生。雖然專家對於確切的年代還有不同意見，但已有如山鐵證顯示，大約一萬五千年前就已經有了家犬，而牠們實際加入人類生活的時間，還可能再往前推數千年。


    狗除了能狩獵、能戰鬥，還能擔當警報系統，警告有野獸或人類入侵。時間一代一代過去，人和狗之間也一起演化，而能和對方'
