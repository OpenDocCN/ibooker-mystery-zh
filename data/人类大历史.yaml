  md: '# 第4章


    # 毀天滅地的人類洪水


    在認知革命前，所有人類物種都只住在亞非大陸上。確實，他們也曾靠游泳、或是紮些簡單的木筏，抵達少數的鄰近島嶼。像是弗洛瑞斯島（見第13頁），早在八十五萬年前便已有人居住。但當時他們還沒辦法冒險前往遠洋，沒人到過美洲或澳洲，也沒人到過像是日本、臺灣、馬達加斯加、紐西蘭和夏威夷之類較遠的島嶼。


    海洋所阻絕的不只是人類，還有許多亞非大陸上的動植物，都到不了這個「外面的世界」。因此，在像是澳洲和馬達加斯加這些遠方的大陸和島嶼上，該地的生物獨自演化了數百萬年，於是無論外形和天性，都和牠們的亞非遠親相當不同。相當長的一段時間，地球可分為幾個不同的生態系，各由獨特的動植物組成。但這種情形即將因為智人而畫下句點。


    在認知革命之後，智人得到新的技術、組織能力、甚至是眼界，能夠走出亞非大陸，前往外面的世界。他們的第一項重大成就，就是在大約四萬五千年前殖民澳洲。為了解釋這件事，可是讓專家學者煞費苦心。因為若要到達澳洲，人類得跨過許多海峽，有'
  merge: -1
  pgno: 82
- img_proc: true
  md: '些寬度超過一百公里，而且抵達之後，他們還得幾乎立刻適應當地的生態環境。


    最合理的理論認為，大約四萬五千年前住在印尼群島的智人，發展出了第一個能夠航海的人類社會（印尼群島由亞洲大陸向外延伸，每個島嶼間只有狹窄的海峽相隔）。他們學會了如何建造及操縱能在海上航行的船隻，開始前往遠洋捕魚、貿易、探險。這對於人類的能力及生活型態來說，都帶來了前所未有的變革。其他能夠進到海裡的哺乳動物，都是經過長期演化、發展出專門的器官和符合流體力學的身形，才能進到海裡，例如海豹、海牛、海豚等等。然而，印尼的智人祖先就是在非洲草原上的猿人，既沒有長出鰭、也不用像鯨一樣等著鼻孔一代一代慢慢移到頭頂去，而是做出船來，並學習如何操縱。正是這些技能讓他們能夠移居澳洲。


    確實，考古學家到現在還沒找到四萬五千年前的筏、槳、或是漁村；而且遠古的印尼海岸線現在深深沉在一百公尺的海面下，要尋找也十分困難。但還是有些可靠的間接證據，可支持這種理論，其中之一就是在智人移居澳洲後的數千年間，智人還殖民了澳洲北方許多獨立的小島，譬如布卡島（Buka）和馬努斯島（Manus），距離最近的陸地也有兩百公里遠。如果沒有先進的船隻、高明的航海技術，很難相信有人能夠前往馬努斯島殖民。正如第2章提到的，我們也有證據證明：當時像是在新愛爾蘭島和新不列顛島之間，有定期的海洋貿易。¹⁷


    新的航海技能並不只限於西南太平洋，大約在三萬五千年前，就有人類抵達日本，而在大約三萬年前，就有人抵達臺灣。對這兩個地方而言，殖民者都得越過廣大的海洋，而這在先前的幾十萬年間，都還是不可能的任務。'
