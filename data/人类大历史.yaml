    # 如何檢索文本？


    終於，美索不達米亞人開始希望：除了無聊的數字資料外，還

    能寫些別的東西。在西元前3000到2500年間，蘇美文字系統逐漸

    加入愈來愈多的符號，成為能夠完整表意的文字，我們今天稱之為

    楔形文字（cuneiform）。到了西元前2500年，國王已經能用楔形文

    字頒布法令，祭司用它來記錄神諭，至於一般平民大眾則是用來寫

    信。'
