  md: '體開始研究佛教哲學和冥想。佛教認為，快樂既不是主觀感受到愉悅，也不是主觀覺得生命有意義，反而是在於放下貪求主觀感受這件事。


    根據佛教的觀點，大多數人太看重自己的感受，以為快感就是快樂，不愉悅的感受就是受苦。於是，人類就渴望能有快感，並希望避免不愉悅的感受。然而，這是大大的誤解。事實是，人類的主觀感受沒有任何實質或意義。主觀感受就只是一種電光石火的波動，每個瞬間都在改變，就像海浪一樣。不論你感受到的是快感或不快、覺得生命是否具有意義，這都只是剎那生滅的波動而已。


    如果我們太看重這些內部的波動，就會變得太過執迷，心靈也就焦躁不安，感到不滿。每次碰上不快，就感覺受苦；就算已經得到快感，因為我們還希望快感能夠增強，或是害怕快感將會減弱，所以心裡還是不能感到滿足。貪求這些主觀感受，十分耗費心神，而且終是徒勞，只是讓我們受制於貪求本身。因此，苦的根源既不在於感到悲傷或疼痛，也不在於感覺一切沒有意義。苦真正的根源就在貪求主觀感受這件事，不管貪求的是什麼，都會讓人陷入持續的緊張、困惑和不滿之中。


    人想要離苦得樂，就須瞭解自己所有的主觀感受都只是剎那生滅的波動，而且別再貪求某種感受。如此一來，雖然感受疼痛，但不再感到悲慘，雖然愉悅，但不再干擾心靈的平靜。於是，心靈變得一片澄明、自在。這樣產生的心靈平靜力量強大，是那些窮極一生瘋狂追求愉悅心情的人，完全難以想像的。這就像是有人已經在海灘上站了數十年，總是想抓住「好的海浪」，讓這些海浪永遠留下來，同時又想躲開某些「壞的海浪」，希望這些海浪永遠別靠近。就這樣一天又一天，這個人站在海灘上徒勞無功，把自己累得'
