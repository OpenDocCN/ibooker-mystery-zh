    列舉他的判決後，漢摩拉比再次宣告：


    > 以上是幹練有能的國王漢摩拉比，所做出的公正裁決，指示著這片土地朝向真理的道路、人生的正途……我是漢摩拉比，高貴的國王。恩利爾神將人類子民交付給我照護，馬杜克神將人類子民交付給我帶領，而我悉心關懷、不曾輕忽。39


    《漢摩拉比法典》認為，巴比倫的社會秩序根源於由神所指示的普世永恆的正義原則。這裡的階級結構原則至關重要，將所有人類分成男女兩種性別，以及上等人、平民和奴隸三種階級；性別和階級不同，身價也就天差地別。像是一個平民女性值30舍客勒的銀子，一個女奴隸只值20舍客勒，但光是平民男性的一隻眼睛，就值60舍客勒的銀子。


    《漢摩拉比法典》也規定了嚴格的家庭階級制度。根據法典，小孩並不是獨立的人，而是父母的財產。因此，如果一個上等人殺了另一個上等人的女兒，懲罰就是把兇手的女兒給殺了。這對我們看來可能荒謬至極，兇手本人逍遙自在，但他無辜的女兒卻得賠上一命。然而在漢摩拉比和當時的巴比倫人看來，這實在再公平正義不過。《漢摩拉比法典》背後的一項重要假設，就是只要國王的臣民全部接受各自的階級角色、各司其職，整個帝國上百萬的人民就能有效合作。這麼一來，這個社會不但能為所有成員生產足夠的糧'
