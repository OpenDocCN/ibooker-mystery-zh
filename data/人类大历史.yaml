  md: '強化的防禦工事包圍了努曼提亞，阻擋他們與外界接觸；小西庇阿試圖讓飢餓成為最強大的武器。一年多後，努曼提亞人糧食耗盡，他們發現大勢已去，便放火焚城。根據羅馬歷史記載，努曼提亞人多半寧可自殺殉難，也不願意成為羅馬的奴隸。


    後來，努曼提亞成了西班牙獨立和勇氣的象徵。《唐吉訶德》的作者塞萬提斯（Miguel de Cervantes）就曾寫過一篇名為〈努曼提亞圍城〉的悲劇劇本，雖然是以努曼提亞的毀滅作結，但也預示著西班牙未來的偉大願景。詩人用詩歌讚頌他們的情操，畫家也在畫布上重現他們的英勇。1882年，努曼提亞遺址列為「國立紀念遺址」，成為西班牙愛國者必定造訪的朝聖地。在1950到1960年代，西班牙最流行的漫畫既不是超人、也不是蜘蛛人，而是一個來自伊比利亞半島的虛構英雄賈巴托（El
