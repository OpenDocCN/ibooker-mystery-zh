  md: '# 知足就能常樂


    目前有一項耐人尋味的結論：金錢確實會帶來快樂，但是有一定限度，超過限度之後的效果就不那麼明顯了。所以，對於經濟階層底層的人來說，確實是錢愈多就愈快樂。


    如果你是一個月收入兩萬多台幣的清潔工，忽然中了一張兩百萬的統一發票，主觀幸福感可能就會維持好一段時間的高檔狀態。因為這下子，你可以讓孩子吃飽穿暖，不用擔心欠債愈滾愈多。然而，如果你本來就是年薪六百萬台幣的外商高階主管，就算中的是兩、三千萬元的樂透，主觀幸福感也可能只會提高幾個星期而已。根據實證研究指出，這幾乎肯定不會對你的長期幸福感有太大的影響。你或許會買一部炫一點的轎車，搬到大一些的豪宅，喝些更頂級的紅酒，但很快就會覺得這一切都普普通通，沒什麼新鮮感。


    另一項有趣的發現是：疾病會短期降低人的幸福感，但除非病情不斷惡化，或是有持續不止的疼痛，否則疾病並不會造成長期的不快。譬如，有人被診斷患有像糖尿病之類的慢性疾病，確實是會鬱悶一陣子，但只要病情沒有惡化，他們就能調適過來，覺得自己和一般人的快樂程度也沒什麼差別。


    讓我們假設一下，有一對中產階級的雙胞胎露西和路克，一'
