  md: '然而，這種想法絕非印度教徒所獨有。縱觀歷史，幾乎所有社會都會以「汙染」和「潔淨」的概念，來做出許多社會及政治上的區隔，而且各個統治階層利用這些概念來維繫其特權，更是不遺餘力。只不過，人之所以害怕汙染，並非完全只是因為祭司和統治者所捏造出來的神話。或許在人天生的生存本能裡，看到可能帶著疾病的物體（例如病人或屍體）就會自然產生反感。所以，如果想排擠某一類的人，像是女性、猶太人、吉普賽人、同性戀、黑人，最好的辦法就是大聲宣布：這些人有病、會造成汙染。


    印度種姓制度和相關的「潔淨」概念，深植於印度文化。雖然現代印度人早已遺忘了印度雅利安人入侵的事件，但仍然堅信種姓制度，也仍然排斥種姓混合造成的「汙染」。當然，種姓並不是完全牢不可破。隨著時間過去，現在的種姓也發展出許多副種姓（sub-caste）。原本的四個種姓，現在已經變成三千種不同的迦娑（jati，意為「出生」），但整個種姓系統的基本原則仍然相同，每個人出生就屬於特定的階級，而破壞階級就是汙染了個人、也汙染了整個社會。一個人的迦娑決定了他的職業、他的飲食、他的住處，還有他的結婚對象。一般來說，結婚對象只能來自同一個種姓階級，而他們的子女也繼承同樣的階級。


    只要出現了新的職業、或是出現了一群新的人，就得先判斷他們是屬於哪一個種姓階級，才能在印度社會得到認可。而如果有一群人連被認定為種姓階級都不配，在這個階級分明的印度社會裡，他們就連在底層也稱不上。這種人叫「穢多」，他們居住的地方必須和所有其他人分開，活得充滿屈辱，只能靠著像是撿拾垃圾的方式維生。就算是種姓階級最下級的成員，也會盡可能避開穢多，不和穢多一起吃飯、避免碰觸到穢多，當然絕不可能與穢多通婚。'
