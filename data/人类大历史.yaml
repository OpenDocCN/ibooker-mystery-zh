  md: '# 如同來自外太空的侵略者


    大約在1517年，原本待在加勒比海群島的西班牙殖民者，開始聽到傳言，似乎在墨西哥內陸有個強大的帝國。不過短短四年後，阿茲特克帝國的首都就只剩下悶燒的廢墟，整個帝國成了過去式。墨西哥成了西班牙帝國的殖民地，掌理一切的就是科爾特斯（見第197頁）。


    而且，西班牙人並沒有停下腳步來慶賀，甚至可說連喘口氣的時間也不浪費，立刻向四方展開了同樣的「探索與征服」行動。不論是阿茲特克人、托爾特克人（Toltecs）或是馬雅人，在超過兩千年的期間，這些中美洲過去的統治者幾乎不知道有南美洲的存在。然而，西班牙人征服墨西哥之後短短不到十年，皮薩羅（Francisco
    Pizarro）不但發現了南美的印加帝國，還在1532年就把它滅了。


    如果阿茲特克人和印加人當時對於周遭的世界多一點好奇，知道西班牙人把自己的鄰居給怎麼了，就有可能更積極而成功的抵禦西班牙的入侵。從哥倫布第一次抵達美洲（1492年）到科爾特斯登陸墨西哥（1519年），西班牙人已經征服了大多數的加勒比海群島，建立起新的殖民島鏈。對於受奴役的當地人來說，這些殖民地就像是人間地獄。殖民者既貪婪又無情，以鐵腕政策逼迫他們在礦場或農場工作，只要他們敢有一絲反抗，立刻會遭到殺害。不論是'
