  md: '人類大歷史


    來包三明治、外帶剩菜，用完就丟，想必會大驚失色。


    兩千年前，地中海盆地的人如果屬於乾性膚質，就會在手上抹橄欖油。而今天他們抹的是護手霜。我在附近一家店裡隨便買了一條簡單的現代護手霜，裡面的成分如下：


    去離子水、硬脂酸、甘油、辛酸／癸酸甘油酯、丙二醇、肉豆蔻酸異丙酯、人蔘根提取物、香料、鯨蠟醇、三乙醇胺、矽靈、熊果葉萃取物、抗壞血酸磷酸鎂、咪唑烷基脲、對羥基苯甲酸甲酯、樟腦、對羥基苯甲酸丙酯、羥基異己基
    3-環己基甲醛、羥基香茅醛、芳樟醇、丁苯基甲基丙醛、香茅醛、苧烯、香葉醇。


    以上幾乎所有的成分，都是在過去兩世紀間才發明或發現的。


