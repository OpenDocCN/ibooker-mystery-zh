    # 讓尼安德塔人再現？


    遺傳學家想改造的還不只是現有的生物，甚至也想讓已絕種的動物再現身影，而且對象還不只是像電影「侏羅紀公園」的恐龍。從西伯利亞冰層挖掘出長毛象遺體之後，由俄羅斯和韓國（研究人員包括因學術造假事件而聲名狼籍的黃禹錫）組成的科學家團隊，正在為長毛象的基因定序。他們準備拿一枚現代大象的受精卵，將大象的DNA換成長毛象的DNA，再植回大象的子宮。他們宣稱，只要經過大約22個月的孕期，長毛象就可能在絕跡近五千年後，再次重現於地球。123


    接下來，有什麼理由要劃地自限，只做長毛象呢？哈佛大學的邱契（George Church）教授最近指出，完成「尼安德塔人基因組計畫」之後，我們就能將在智人的卵子裡重建尼安德塔人的DNA，在三萬年後再次誕生一個尼安德塔人的小孩。邱契宣稱：只要撥給他不頂多的三千萬美元預算，這就可能成真，而且已經有幾位女性自願擔任代理孕母了。124


    我們為什麼要讓尼安德塔人再現？有些人認為，如果我們能研究活生生的尼安德塔人，就能解決某些關於智人起源和獨特性最難解的問題。只要能比較尼安德塔人和智人的大腦，找出兩者不同之處，或許就能知道是什麼生物上的變化，讓我們產生了有異於禽獸的意識。而且，有人認為這也有倫理道德上的理由：如果是智人造成了尼安德塔人滅絕，豈不該負責把他們救回來？此外，有尼安德'
