  md: '就算我們認為這些人行事的原因是出於信仰，而非經濟所需，實在也很難證明。


    幸運的是，我們在極少數案例中找到了強而有力的線索。1995年，考古學家開始挖掘位於土耳其東南部的哥貝克力石陣（Göbekli Tepe）遺址。在此地最古老的地層裡，他們找到的不是聚落、房舍或日常活動的跡象，而是雄偉的石柱結構，雕飾華美、令人驚嘆。這裡每根石柱重達七噸、高五公尺。在附近的一座採石場，甚至還發現了一支尚未完工的石柱，重達五十噸。全部加起來，總共有十多個石柱結構遺跡，規模最大的，寬度近三十公尺。


    全球各地都有這樣令人驚嘆的石柱結構遺跡，最著名的是英國的巨石陣（Stonehenge），但哥貝克力石陣有一點特別驚人。巨石陣的年代大約是西元前2500年，是由一個已經相當發達的農業社會所建造。但哥貝克力石陣的年代大約是西元前9500年，所有證據都顯示，它是由狩獵採集者建造而成。一開始，考古學界覺得這簡直是天方夜譚，但經過一次又一次檢視之後，無論是這個結構的興建年代，或是建造者尚未進入農耕社會，都是無庸置疑的。看起來，過去我們對於遠古採集者的能力和他們文化的複雜程度，都嚴重低估了。


    為什麼採集社會想興建這樣的結構？這種結構看來並沒有什麼實質用途，既不是大型屠宰場，也沒辦法避雨或躲獅子。所以，我們只能推論這是為了某種神祕的文化目的，而考古學家到現在也還在傷腦筋。不論這用途為何，都能肯定採集者願意為它花上大把的時間和精力。想要蓋起哥貝克力石陣，必然需要集合數千位來自不同部落的採集者，長時間通力合作才能完成。如果背後沒有成熟的宗教或意識型態體系，就萬萬不可能做到。'
