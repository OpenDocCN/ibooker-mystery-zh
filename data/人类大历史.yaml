  md: '人類大歷史


    多數家長都說孩子是他們快樂的主要來源。難道這些人都是腦子有問題嗎？


    當然，這是一種可能。但還有另一種可能：調查結果讓我們知道，快樂不只是「愉快的時刻多於痛苦的時刻」這麼簡單而已。相反的，快樂要看的是某人生命的整體；生命整體有意義、有價值，就能得到快樂。快樂還有重要的認知和道德成分。價值觀不同，想法也就可能完全不同，例如有人覺得養小孩的人就像是悲慘的奴隸，得伺候一個獨裁的小霸王，但也有人覺得自己真是滿懷著愛，正在培育一個新的生命。113


    正如尼采所言，只要有了活下去的理由，幾乎什麼都能忍受。生活有意義，就算在困境中也能甘之如飴；生活無意義，就算在順境中也度日如年。


    不管任何文化、任何時代的人，身體感受快感和痛苦的機制都一樣，然而他們對生活經驗所賦予的意義，卻可能大不相同。如果真是如此，快樂的歷史很可能遠比生物學家想像的，要來得動盪不安。這個結論並不一定是站在現代這邊。如果我們將生活切成以一分鐘為單位，來評估當時是否幸福快樂，中世紀的人肯定看來相當悲慘。然而，如果他們相信死後可以得到永恆的祝福，很有可能就會認為生活真是充滿了價值和意義；相對的，現代世俗子民如果不信這一套，就會覺得人到最後就只有死亡，遲早會被遺忘、沒了任何意義。如果用主觀幸福感問卷問道：「你對生活整體是否滿意？」中世紀的人很可能得分會相當高。


