  md: '結果就是，我們現在只發揮了基因工程一小部分的能力。現在改造的大多數生物，都是那些最沒有政治利害關係的物種，像是植物、真菌、細菌、昆蟲等等。舉例來說，大腸桿菌是一種共生在人體腸道裡的細菌，只有在它跑出了腸道、造成致命感染的時候，大家才會在報紙上看到它們造成的壞消息。而現在大腸桿菌就經過基因工程改造，用來生產生質燃料。116
    大腸桿菌和其他幾種真菌，也經過改造來生產胰島素，期望能降低糖尿病患的治療費用。117


    現在我們也取出某種北極魚類的基因，植入馬鈴薯的基因，好讓馬鈴薯更耐寒。118


    少數哺乳動物也正在接受基因工程改造。酪農業一直得面對乳腺炎這項大敵，每年乳牛因此無法產乳的損失，高達數十億美元。科學家目前正在嘗試將乳牛基因改造，讓牛奶裡含有溶菌素，能夠攻擊造成乳腺炎的細菌。119


    另外，最近健康意識抬頭，消費者不希望從火腿和培根吃到太多不健康脂肪，養豬業最近正在期待一種植入了蠕蟲基因的豬隻，這種基因能夠讓豬的脂肪酸從不健康的omega-6脂肪酸，轉為健康的omega-3脂肪酸。120


    真正走到下一代基因工程之後，這種讓豬有健康脂肪的改造，就只能算是一碟小菜罷了。現在，遺傳學家已經成功將蠕蟲的平均壽命延長六倍，也已經創造出某種天才老鼠，在記憶和學習能力上大有長進。121
    例如，田鼠是一種小型、粗壯的嚙齒動物，而且大多數品種的習性都是雜交。然而，卻有一種品種具有忠貞的一夫一妻關係。遺傳學家聲稱，已經找出了這種形成田鼠一夫一妻制的基因，只要植入這個精挑細選的基因，就能讓田鼠從愛偷腥變成愛顧家。這麼一來，我們的基因改造能力就不僅能改變嚙齒動物的個體'
