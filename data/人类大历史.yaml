    學者一直到幾年前，才開始研究快樂這件事的歷史，而且現在還停留在初始階段，正在做出初步的假設、尋找適當的研究方法。這場討論才剛剛起步，要得出確切的結論，為時過早。最重要的，是要瞭解各種不同的研究方法，並且提出正確的問題。


    大多數的歷史書籍強調的都是偉大的思想家、英勇的戰士、慈愛的聖人，以及創造力豐沛的藝術家。這些書籍對於社會結構的建立和瓦解、帝國的興衰、科技的發明和傳播，可說是知無不言，言無不盡。但對於這一切究竟怎麼為個人帶來快樂或造成痛苦，卻是隻字未提。這是我們在史識方面的最大空白之處。而且，現在該是開始填補空白的時候了。'
