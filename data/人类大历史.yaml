  md: '人類大歷史


    一般而言，一神教徒比多神教徒更為狂熱、更熱中傳教。畢竟如果某個宗教願意承認其他信仰，情況只有兩種：第一種本來就認為世上沒有唯一的神，而是有許多神同時共存；第二種認為雖然有一位最高的神，但下面分成許多小神祇，信仰每位神祇，可以說是看到了部分的真相。


    但由於一神教徒通常認為自己信奉的就是唯一的神，也認為只有自己看到了完整的真相，自然就會批評其他所有宗教都不可信。在過去兩千年間，一神教徒多次發動以暴力消滅其他競爭對手，目的就是要強化自己的掌控力。


    這招必殺技很有效。在西元一世紀初，世界上幾乎沒有任何一神教徒。到了西元500年左右，基督宗教已經收服了全球最大的羅馬帝國，傳教士忙著將基督宗教傳播到歐洲的其他地區、以及亞洲和非洲。等到第一個千禧年結束，歐洲、西亞和北非已經多半都信奉一神教了，從大西洋到喜馬拉雅山脈都主張上帝或真主是唯一的神。到了十六世紀初，除了東亞和非洲南部，一神教已經掌控了亞非絕大部分人的信仰，而且開始向南非、美洲和大洋洲發展。到了今天，除了東亞以外的大多數人，不論信仰為何，多半都屬於一神教，而且全球政治秩序也正是以一神論為基礎而建立。


