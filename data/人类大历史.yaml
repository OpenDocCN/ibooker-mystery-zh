  md: '丈夫或兄弟。而在許多法律體系中，強姦罪是屬於侵犯財產，換句話說，受害人不是被強姦的女性，而是擁有她的男性。因此，這些法律對於強姦罪的救濟措施，就是所有權移轉：強姦犯付出一筆聘金給女方的父親或兄弟，而她就成了強姦犯的財產。《聖經》還寫著：「若有男子遇見沒有許配人的處女，抓住她，與她行淫，被人看見，這男子就要拿五十舍客勒銀子給女子的父親；因他玷污了這女子，就要娶她為妻。」（申命記，22:28-29）對古希伯來人來說，這是再合理也不過的安排了。


    在某些地方，如果是強姦某個不屬於任何男人的女人，甚至算不上是犯罪。這就像是在人來人往的街道上撿了一枚銅板，不算是竊盜一樣。另外，如果是丈夫強姦自己的妻子，也不構成犯罪；甚至有些地方會認為，因為丈夫本來就該對妻子的性行為，有完全的控制權，所以「丈夫強姦妻子」這句話根本無法成立。說丈夫「強姦」妻子，就像說某個人偷了自己的錢包一樣不合邏輯。


    這些說法聽來荒謬，但其實並不只有遠古中東地區才有這種想法。就算到了2006年，仍然有五十三個國家無法控告丈夫強姦他的妻子。即使在德國，也是到了1997年才修訂法案，認定婚姻中可能出現強姦行為。⁴⁹


    # 男男女女


    那麼，將人類分成男女，是不是也像印度的種姓制度、或是美國的種族階級，都是想像下的產物？這一點究竟是不是有深刻的生物學基礎，認定本來就是不同？而如果這確實是一種自然的不同，生物學上又是否能夠解釋，為何男性的待遇優於女性？'
  merge: -1
  pgno: 171
- img_proc: true
  md: '在男女之間,某些文化、法律和政治上的差異,正反映著兩性明顯的生物學差異。例如男性沒有子宮,所以懷孕生子這件事一直只能是女性的工作。然而,就在這個核心差異上,每個社會又會不斷加上一層又一層的文化概念和規範,而這些就和生物學鮮有關連了。換句話說,各種社會上對於「男性化」和「女性化」特質的想法,多半沒有確實的生物學基礎。


    舉例來說,西元前五世紀的雅典實行民主,但有子宮的人就沒有獨立的法定地位,無法參加人民議會,也無法擔任審判。除了少數例外,這種人也無法得到良好教育,不能經商、也不能參加哲學討論。所有雅典的政治領袖、哲學家、演說家、藝術家、商人,沒有一個人有子宮。那麼,難道「有子宮」這件事,真有什麼生物學的根據,證明這些人不適合從事這些行業嗎?


    雖然古雅典人確實這麼認為,但現代雅典人可不會同意。在現今的雅典,婦女不僅能夠投票,能夠參選公職,能夠發表演講,能夠從事珠寶設計、建築設計到軟體設計等等一切的腦力工作,當然也能夠進入大學就讀。她們的子宮可沒讓她們做起這些事來,會輸給男人。確實,女性在政界和商界仍處於弱勢(希臘議會只有12%是女性),但她們要參與政治,已經沒有法律阻礙,而且多數現代希臘人也認為,女性擔任公職合情合理。


    另一方面,在許多現代希臘人看來,也認為男人的一個重要特點就是只對女人有「性趣」、而且也只應該和異性發生性關係。但他們沒發現,「異性性行為自然、同性性行為不自然」這件事也是一種文化偏見,而不是生物學上的事實。男男相吸這件事,大地之母其實從來也沒什麼意見。然而,在某些文化裡,如果兒子和隔壁的男孩天雷勾動了地火,他的母親可就會大發雷霆。這位母親會'
  merge: -1
  pgno: 172
- img_proc: true
  md: '生氣，原因可不是出於生物的必然。其實對許多人類文化來說，同性戀不僅合法，甚至還對社會有所助益，像古希臘就是最明顯的例子。在史詩《伊里亞德》裡，英雄阿基里斯與戰士普特洛克勒斯關係親密，但阿基里斯的母親西蒂斯，可沒什麼不高興。另外，馬其頓王國的女王奧林匹亞絲，可說是古代最喜怒無常、也最大權在握的女性，連她的丈夫腓力二世都死在她手上。但她看到兒子（亞歷山大大帝）帶了愛人赫費斯提翁回家吃飯，她也是沒發半點火。


    # 天賦自由


    我們究竟要如何才能判斷，什麼是真正在生物學上有所不同？而什麼又只是人類說得煞有其事，其實只是自找藉口？有一條很棒的經驗法則是「天賦自由，文化禁錮」。在生物學上，（先天的）可能性幾乎無限寬廣；然而，（後天的）文化卻壓縮在某些可能性，或禁絕了其他可能性。例如女性天生能生小孩，但在某些文化裡，女性卻是非生不可。生物學上，男人就是能從彼此身上得到性愉悅，但某些文化卻極力阻止他們實現這種可能。


    人總是藉口「文化」來禁止不自然的事。但從生物學的角度來看，這世界根本沒有什麼是不自然的。只要有可能發生的事，就是自然。真正完全不自然的事，是指違背了自然律，但這種事情根本就不會存在，所以也沒有禁止的必要。舉例來說，沒有任何一種文化會禁止男性行光合作用、禁止女性跑得比光速快，或禁止帶負電荷的電子互相吸引，就是因為這講了只是白講，完全沒必要禁止。


    事實上，許多人認知的「自然」和「不自然」並不是生物學的概念，而是基督教神學的概念。神學上所謂的「自然」，指的是'
  merge: -1
  pgno: 173
- img_proc: true
  md: '「符合創造大自然的神的旨意」。基督教神學家認為，上帝創造了人的身體，讓每個肢體和器官都有特定目的。如果我們使用肢體和器官的方式符合上帝的設想，那就是「自然」的活動；如果不符合上帝設想的方式，就成了「不自然」。然而，演化本來就沒有唯一的目的。器官的演化也沒有唯一的目的，器官的使用方式不斷在變化。現在人體的所有器官，早在幾億年前就已經出現了原型，而現在所有器官都不只做著原型所做的事。器官之所以演化，是為了某種特定功能，但等到器官存在之後，要用做其他功能也並無不可。


    以嘴巴為例，嘴巴之所以會出現，是因為最早的多細胞生物需要有辦法將養分送進身體裡。雖然現在嘴巴仍然具有這種功能，但我們還能用嘴來說話、親吻，藍波還能用來拔手榴彈的插銷。難道只因為我們最早那些像蠕蟲一樣的祖先，在六億年前沒有用嘴做這些事，嘴巴的這些功能就變得不自然了？


    同樣的，翅膀也不是一開始就成了空氣動力學的奇蹟，而是從原本有其他用途的器官演化而來。有學者認為，一開始昆蟲都不會飛，翅膀是幾百萬年前，從蟲子身上突起的部分演化而來的。蟲子原本身上會有突起，是因為這樣能增加表面積、接收更多陽光，也就更能保暖。在緩慢的演化過程中，這些太陽能接收器愈長愈大。想要吸收最多陽光，就要讓突起的表面積最大、重量最輕；這種身體結構剛好對昆蟲來說也方便，蹦蹦跳跳的時候還能幫上一點忙，突起愈大的，就能幫忙跳得愈遠。有些昆蟲開始用這玩意來滑翔一下，接著只是再跨出一小步，昆蟲就真的在空中飛了起來。所以，如果下一次又有蚊子在你耳邊嗡嗡不停，記得要罵罵她真是太「不自然」了。如果她的祖先乖乖聽話、滿足於當初上帝賦予的功能，現在她的翅膀仍只能做個太陽能板。'
  merge: -1
  pgno: 174
- img_proc: true
  md: '這種多用途、多功能的道理，也同樣適用於我們的性器官和性行為。一開始，性行為就是為了繁殖，而求偶儀式則是為了要評估對方的健康程度。但對許多動物來說，兩者其實都有眾多的社交功能，可不只是為了趕快創造出自己的DNA小複本。舉例來說，黑猩猩就會用性行為，來鞏固政治聯盟、建立親密關係，化解緊張局勢。難道這也是不自然？


    # 性與性別


    所以，堅持女性生小孩才自然，或者說同性戀不自然，並沒什麼意義。各種規定男人就該如何、女人就該怎樣的法律、規範、權利和義務，反映的多半只是人類的想像，而不是生物天生的現實。


    生物學上，人類分為男性和女性。所謂男性，就是擁有一個X染色體和一個Y染色體；所謂女性，則是擁有兩個X染色體。但是要說某個人算不算男人或女人，講的就是社會學、而不是生物學的概念了。在大多數人類社會裡，絕大多數情況下所謂的男人的就是男性，而女人就是女性，但那些社會學的名稱負載了太多意義，真正與生物學相關的部分少之又少，甚至完全無關。


    我們說某個智人「夠男人」，講的並不是具有某種生物特質（例如有XY染色體、有睾丸、有睪固酮之類），而是能在所處的社會中，找到一個符合想像的秩序的位置。每個文化背後虛構的故事，都有一些男人應該要符合的角色（像是搞政治）、擁有的權利（像是投票權），以及負起的義務（像是服兵役）。同樣的，要說某個智人是不是「夠女人」，也不是看她有沒有兩個X染色體、子宮，或是大量的雌激素，而是她在想像建構出的人類秩序中，是'
  merge: -1
  pgno: 175
- img_proc: true
  md: '女性的成員。每個社會文化也會用虛構的故事，定出一些女人該符合的角色（像是要生兒育女）、擁有的權利（受保護不被暴力侵擾），以及負起的義務（像是服從她的丈夫）。正由於定義男女角色、權利和責任的並不是生物學，而只是虛構的故事，所以每個社會認為「夠男人」和「夠女人」的意義也就大不相同。


    學者為了釐清概念，通常把生物學上的區分稱為性（sex），而文化上的區分稱為性別（gender）。「性」區分的是男性和女性，屬於客觀標準，在整個歷史上未曾改變。至於「性別」區分的是男人和女人（某些文化也有其他類別），所謂「夠男人」和「夠女人」的標準，具有互為主體性的概念，而且會不斷改變。舉例來說，同樣在雅典，古代和現代對女人要求的行為、欲望、服飾、甚至是身體姿勢都有極大的不同。50


