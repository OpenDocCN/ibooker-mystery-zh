  md: '從此之後，任何人想要瞭解炮彈或行星是如何運動、又會落向何方，只要測量一下物體的質量、運動方向、加速度、作用力，把這些數據填入牛頓的方程式，答案簡直就像魔術一樣躍於眼前。一直要到十九世紀末，科學家才觀測到有某些狀況並不符合牛頓運動定律，於是帶來下一波物理理論的革命：相對論和量子力學。


    牛頓告訴我們，大自然這本書所用的書寫語言是數學。某些章節可以總結成某一條明確的方程式。也有些學者想仿照牛頓，將生物學、經濟學和心理學整理成簡單的公式，卻發現這些領域實在太複雜，不可能依樣畫葫蘆。然而，這並不代表他們就放棄了數學。在過去兩百年間，為了處理現實中更複雜的層面，數學發展出一個新的分支：統計學。


    1744年，有兩位蘇格蘭長老會的教士——韋布斯特（Alexander Webster）和華萊司（Robert Wallace）打算成立一支壽險基金，為神職人員的遺孀和孤兒提供補助。他們建議教會的每一位牧師都將收入提撥一部分進入基金，基金用這筆錢從事投資。如果牧師過世，遺孀就能從基金的獲利中取得分紅，她的餘生也有了保障。然而，兩位教士必須先知道基金規模多大，才足夠完成這種目標。韋布斯特和華萊司必須預測每年大約會有多少牧師過世、留下幾位孤兒寡母，以及這些寡婦在丈夫過世後還會活幾年。


    我們先來提一下這兩位教士「沒有做」什麼。他們沒有向上帝祈求告訴他們答案，沒有在《聖經》或古代神學家的作品中遍尋解答，也沒有提出抽象的哲學爭論。畢竟，蘇格蘭人本來就是很務實的民族。那他們「有做了」什麼？他們聯絡了愛丁堡大學數學教授馬克勞林（Colin
    Maclaurin）；他們蒐集了民眾過世年齡的資料，用以計算在某一年裡可能有幾位牧師過世。'
