  md: '# ## 罪魁禍首


    智人來到美洲，絕非什麼善男信女，而是造成血流成河，受害者多不勝數。在一萬四千年前，美洲的動物物種遠比今天豐富。智人首次從阿拉斯加南下，來到加拿大的平原和美國西部時，除了會遇上長毛象和乳齒象，還會有像熊一樣大小的囓齒動物、一群又一群的馬和駱駝、巨型的獅子，還有其他數十種巨型動物，但現在都已全部絕跡，其中包括可怕的劍齒虎，還有重達八噸、站立起來高達六公尺的巨型地懶（ground
    sloth）。至於南美還令人更加目不暇給，各種大型哺乳動物、爬蟲類和鳥類，讓人彷彿置身奇特非常的動物園。整個美洲曾經就像是演化的巨大實驗室，各種在亞非大陸上未曾得見的動植物，都在此繁衍茁壯。


    可惜好景不再。智人抵達後不過兩千年的時間，大多數這些獨特的物種就全部慘遭毒手。根據目前的估計，就在這短短兩千年的時間裡，北美原本有足足47屬的各類大型哺乳動物，其中34屬已經消失；南美更是在60屬之中失去了50屬。像是劍齒虎，原本活躍了超過三千萬年，卻幾乎在瞬間滅絕，其他像是巨型地懶、巨型獅子、美洲的本土馬和本土駱駝、巨型囓齒動物和長毛象，也都未能倖免。另外，還有成千上萬的小型哺乳動物、爬蟲類、鳥類，甚至昆蟲和寄生蟲，也同樣慘遭滅絕（譬如長毛象絕種之後，各種長毛象蜱自然只能共赴黃泉）。


    幾十年來，古生物學家和動物考古學家（研究動物遺骨的學者）在整個美洲平原和山區四處探訪，尋找遠古駱駝的骨骼化石和巨型地懶的糞便化石。每當一有發現，這些珍貴的寶物就會經過'
