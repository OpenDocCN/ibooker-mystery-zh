  md: '這種想法可能很難理解。這裡的問題在於，我們的心理深深埋藏著一個推理的謬誤。在我們試著猜測或想像其他人（可能是現在的人或過去的人）有多快樂的時候，我們總是想要設身處地，想想自己在那個情況下會如何感受。但這麼一來，我們是把自己的期望放到了別人的物質條件上，結果當然就會失準。


