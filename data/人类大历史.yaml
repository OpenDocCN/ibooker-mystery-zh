- img_proc: true
  md: '在十五、十六世紀，歐洲人的世界地圖開始出現大片空白。從這點可以看出科學心態的發展，以及歐洲帝國主義的動機。地圖上的空白，可說是在心理及思想上的一大突破，清楚表明歐洲人願意承認自己對於一大部分的世界還一無所知。


    1492年，哥倫布從西班牙出發向西航行，希望能找到一條前往東亞的新航線。哥倫布當時相信的仍然是舊的世界地圖，以為全世界在地圖上一覽無遺。哥倫布從舊地圖推算，日本應該位於西班牙以西大約七千公里遠。但事實上，從西班牙到東亞的距離要超過兩萬公里，而且中間還隔著他並不知道的美洲大陸。1492年10月12日大約凌晨2點，哥倫布一行人與這片未知大陸有了第一次接觸。皮塔號（Pinta）的瞭望手伯梅霍（Juan
    R. Bermejo）從桅杆上看到了現在的巴哈馬群島，高聲呼喊：「有陸地！有陸地！」


    哥倫布當時相信這個小島就位於東亞海外，屬於「Indies」（印度地方，包含今日印度、中南半島及東印度群島等地），所以他把當地人稱為「Indians」（這正是為何美國原住民稱為印第安人）。一直到過世，哥倫布都不認為自己犯了一個大錯。不論是对他、或是許多當代的人來說，說他發現了一個完全未知的大陸，這根本難以想像。畢竟千百年來，不管是那些偉大的思想家和學者、甚至是不可能犯錯的《聖經》，都只知道有歐洲、非洲和亞洲。怎麼有可能他們全錯了呢？難道《聖經》居然漏了大半個世界，隻字未提？這種情況，就好像是說：在1969年阿波羅十一號要前往月球的途中，居然撞到了另一個從來沒人看到的月亮。


    而正因為哥倫布不願意接受自己的無知，我們可以說他仍然是中世紀的人，深信自己已知道全世界，所以就算已經有了如此重大的發現，也無法說服他。'
  merge: -1
  pgno: 323
- img_proc: true
  md: '至於第一個成為「現代人」的，其實是義大利商人兼航海家亞美利哥·韋斯普奇（Amerigo Vespucci），他曾在1499年到1504年，多次航行前往美洲。而在1502年到1504年間，歐洲有兩篇描述這些航程的文章發表，一般相信就出於韋斯普奇之手。這兩篇文章指出，哥倫布發現的小島旁邊的陸地，應該不是東亞，而是一整個大陸，而且不管是《聖經》、過去的地理學者或是當時的歐洲人，先前都不知道這塊大陸的存在。


    1507年，地圖繪製大師瓦爾德澤米勒（Martin Waldseemüller）相信了這種說法，出版了新版的世界地圖。於是，這片西班牙船隊向西航行所碰上的土地，終於首次以一塊獨立大陸的姿態，出現在地圖上。既然要畫，瓦爾德澤米勒就得給它取個名字，但他誤以為發現美洲的人是亞美利哥·韋斯普奇；為了向他致敬，這片大陸就命名為「America」（美洲）。瓦爾德澤米勒的地圖洛陽紙貴，許多地圖繪製師也跟著有樣學樣，因此「美洲」這個名詞就這樣廣為流傳開來。


    說來也算是老天有眼，到頭來，全球有四分之一的陸地、七大洲之中的兩洲，名字就是來自一個不太有名氣的義大利人，而他唯一做的事，就只是有勇氣說出「我們不知道」。


    發現美洲，對於科學革命是一大奠基事件。這不但讓歐洲人知道實際的觀測比過去的傳統更重要，而且想征服美洲的欲望，也讓歐洲人開始求知若渴。他們如果真想控制這片廣大的新疆域，就一定得蒐集所有相關地理、氣候、植物、動物、語言、文化、歷史的龐大資料。在這些時候，不管是《聖經》、過時的地理書籍、或是古老的口傳知識，都無用武之地。


    從此之後，不只是歐洲地理學家，歐洲幾乎所有知識領域的學'
  merge: -1
