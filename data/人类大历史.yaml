  md: '然而，關於快樂最重要的一項發現是：快樂並不在於任何像是財富、健康、甚至社群之類的客觀條件，而在於客觀條件和主觀期望之間是否相符。如果你想要一臺牛車，而你也得到一臺牛車，你就會感到滿足。如果你想要一輛全新的法拉利，而得到的只是一輛二手的飛雅特，你就會感覺很不開心。正因如此，不管是中樂透或是出車禍，對人們的幸福感並不會有長期影響。一切順遂的時候，我們的期望跟著膨脹，於是就算客觀條件其實改善了，我們還是可能不滿意。而在諸事不順的時候，我們的期望也變得保守，於是就算又碰上其他的麻煩，很可能心情也不會更低落。


