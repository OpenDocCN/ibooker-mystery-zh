  md: '# 第5章 史上最大騙局


    隨著人類開始住進永久村落、糧食供給增加,人口也開始增長。放棄過去流浪的生活之後,女性也可以每年都生孩子了。而這時嬰兒也較早斷奶,改以粥來代替。畢竟田裡需要人手,媽媽得趕快回復農活。然而,人口一多,就耗去了原本的糧食剩餘,於是耕種面積又得加大。這時,由於人群聚居之處易有疾病肆虐,孩子吃母乳的比率愈來愈少、穀類則愈來愈多,再加上得要共享這些粥的兄弟姊妹也愈來愈多,讓兒童死亡率一路飆升。在大多數的遠古農業社會裡,至少三分之一的兒童無法長到二十歲成人。27然而人口出生率仍然大於死亡率,人類養育子女的數字也居高不下。


    # 奢侈生活的陷阱


    隨著時間過去,種麥子這個原本看來划算的選擇,變成愈來愈沉重的負擔。兒童大批死亡,而成人也必須忙得昏頭轉向,才能換得麵包。西元前8500年耶律哥人過的生活,平均來說要比西元前9500年或13000年更為辛苦。但沒有人發現究竟發生了什麼事。每一代人都只是繼續著上一代生活的方式,在這裡修一點、那裡改一些。但矛盾的是,一連串為了讓生活更輕鬆的「進步」,最後卻像是在這些農民的身上,加了一道又一道沉重的枷鎖。


    為什麼人類會犯下如此致命的誤判?其實人類在歷史上一直不斷重蹈覆轍,道理都相同:因為我們無法真正瞭解各種決定最後的結果。每次人類決定多做一點事(像是用鋤頭來耕地,而不是直接把種子撒在地上),我們總是想:「沒錯,這樣是得多做點事,不過收成會好得多,就再也不用擔心荒年的問題了,孩子也永遠不用挨餓。」確實這也有道理。工作努力辛苦一些,生活也就能過得好'
