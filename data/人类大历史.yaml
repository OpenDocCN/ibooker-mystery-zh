  md: '「貧窮線」、「主觀幸福感程度」、「信用等級」。而像是物理和工程方面，幾乎整個知識領域都快要和人類的口語脫節，而由數學符號獨挑大梁：


    ```

    $$\ddot{\mathbf{r}}_{i}=\sum_{j \neq i} \frac{\mu_{j}\left(\mathbf{r}_{j}-\mathbf{r}_{i}\right)}{r_{i
    j}^{3}}\left\{1-\frac{2(\beta+\gamma)}{c^{2}} \sum_{l \neq i} \frac{\mu_{l}}{r_{i
    l}}-\frac{2 \beta-1}{c^{2}} \sum_{k \neq j} \frac{\mu_{k}}{r_{j k}}+\gamma\left(\frac{\dot{s}_{i}}{c}\right)^{2}+(1+\gamma)\left(\frac{\dot{s}_{j}}{c}\right)^{2}-\frac{2(1+\gamma)}{c^{2}}
    \dot{\mathbf{r}}_{i} \cdot \dot{\mathbf{r}}_{j}-\frac{3}{2 c^{2}}\left[\frac{\left(\mathbf{r}_{i}-\mathbf{r}_{j}\right)
    \cdot \mathbf{r}_{j}}{r_{i j}}\right]^{2}+\frac{1}{2 c^{2}}\left(\mathbf{r}_{j}-\mathbf{r}_{i}\right)
    \cdot \ddot{\mathbf{r}}_{j}\right\}+\frac{1}{c^{2}} \sum_{j \neq i} \frac{\mu_{i}}{r_{i
    j}^{3}}\left\{\left[\mathbf{r}_{i}-\mathbf{r}_{j}\right] \cdot\left[(2+2 \gamma)
    \dot{\mathbf{r}}_{i}-(1+2 \gamma) \dot{\mathbf{r}}_{j}\right]\right\}\left(\dot{\mathbf{r}}_{i}-\dot{\mathbf{r}}_{j}\right)+\frac{3+4
    \gamma}{2 c^{2}} \sum_{j \neq i} \frac{\mu_{j} \ddot{\mathbf{r}}_{j}}{r_{i j}}$$

    ```


    這是根據相對論推導出來的公式，能夠計算在重力影響下，某一質量的加速度。大多數人只要見到這個公式，都只能瞠目結舌，像是鹿在路上被車燈照到一樣。這種反應其實很自然，並不代表這個人天生愚魯或是缺乏好奇心。除了極少數例外，人類大腦就是沒有思考像是相對論或量子力學這些概念的能力。物理學家之所以能這樣思考，是因為他們拋下了傳統的人類思維方式，從頭學習如何在外部資料處理系統的協助下思考。他們的思考過程有很重要的一部分並不是在他們的腦子裡，而是在電腦裡、或是在教室黑板上。'
