  md: '# 人類大歷史


    便宜但運行精準的攜帶式時鐘。當時如果是在中東或南美，頂多可能只有幾個日晷。而在歐洲中世紀的城鎮裡，通常是全城共用一個時鐘：在城鎮的中央廣場建起一座高塔，上面就有個巨大的時鐘。這些塔鐘幾乎從來沒有準過，但既然城裡也沒有其他的鐘，似乎也就沒什麼關係。而到了現在，任何一個有錢人家的家裡，計時裝置的數量，很可能就遠遠超過某個中世紀國家全國上下。現在想知道時間，可以看一下腕上的手錶、瞄一眼你的手機、瞧一下床邊的鬧鐘、盯一下廚房的掛鐘、瞟一眼微波爐上的時間、瞥一下你的電視機或DVD機，甚至電腦上的工作列都會告訴你現在幾點。想要不知道現在幾點，還真是得刻意花上一點功夫才行。


    一般人每天會看上幾十次時間，原因就在於現代似乎一切都得按時完成。鬧鐘早上7點把我們叫醒，我們用不多不少的50秒加熱冷凍貝果，刷牙刷個3分鐘、直到電動牙刷發出嗶聲，我們要趕7點40分的火車上班；下班後，在健身房的跑步機跑到嗶聲告訴我們30分鐘計時已到；晚上7點坐在電視前看最喜歡的節目，中間每隔10分鐘，還被每秒好幾萬元的廣告打斷。就算精神崩潰去找心理醫師，他聽你發牢騷的診療時間，也是一節標準50分鐘。


    # 傳統家族和地方社群的力量


    工業革命讓人類社會起了數十種重大的變化，採用工業化的時間概念只是其中之一。其他值得注意的項目還包括都市化、傳統農民的老化凋零、工業無產階級興起、對平民百姓的賦權、民主化、青少年文化，以及父權社會的解體。


    然而這一切都比不上有史以來人類最大的社會革命：家族和地'
