- img_proc: true
  md: '等到現代文化承認自己對許多重要的事還一無所知，又發現科學研究可以帶給我們新力量，人類開始思索，覺得確實還有可能真正進步。隨著科學開始解決一個又一個過去認為無法解決的問題，許多人也開始相信，只要取得並應用新知，人類就能解決所有的問題。貧困、疾病、戰爭、饑荒、年老和死亡，看來都已不再是人類必然的命運，而只是無知造成的限制。


    一個著名的例子就是閃電。在許多文化裡，都認為閃電是憤怒的雷神之錘，用來懲罰罪人。但在十八世紀中葉有了一場科學史上最著名的實驗，富蘭克林在一陣雷雨中放風箏，希望驗證閃電是否只是一道電流。透過富蘭克林的實證觀測，再加上他對電力特性的知識，讓他終於發明了避雷針，於是雷神繳械認輸。


    貧窮又是另一個例子。在許多文化裡，都認為貧窮是這個不完美世界裡不可避免的一部分。根據新約《聖經》，在耶穌被釘在十字架之前不久，有一個女人拿著一瓶珍貴的香膏來澆在耶穌的頭上，香膏足足價值300德納累斯銀幣。耶穌的門徒認為這麼大一筆錢可以用來賑濟窮人，不該如此浪費，因此有些生氣。但耶穌則為她辯護，說道：「常有窮人和你們同在，要向他們行善隨時都可以；只是你們不常有我。」（馬可福音14:7）。然而到了今天，就算是基督徒，也愈來愈少人會同意耶穌的說法。就現在看來，貧窮愈來愈像是可以處理的技術問題。一般認為，只要以農學、經濟學、醫學、社會學的最新發現為基礎，制定相關政策，就能消滅貧窮。


    而且確實，世界上許多地方已經不再有最惡劣的貧窮形式。縱觀歷史，社會上有兩種貧窮：第一、社會性的貧窮，指的是某些人掌握了機會，卻不願意釋出給他人；第二、生物性的貧窮，指的是因為缺乏食物和住所，而使人的生存受到威脅。或許社會性的貧窮'
