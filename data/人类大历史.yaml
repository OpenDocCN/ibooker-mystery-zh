  md: '人類 大歷史


    達成協議，就算大家穀倉滿滿，還是會衝突不斷。史上的場場戰爭和革命，多半起因都不是糧食短缺。法國大革命領頭的是有錢的律師，不是飢餓的農民。羅馬共和國在西元前一世紀達到權力高峰，艦隊從整個地中海運來種種珍寶，就算在他們祖先最瘋狂的夢裡，也意想不到。然而，正是在他們的富庶達到最大值的時候，羅馬的政治秩序崩潰，引來一系列致命的內戰。南斯拉夫在1991年的資源完全足以養活所有國民，但依舊解體，並引發可怕的浴血戰爭。


    這種災難的根源在於：人類在幾百萬年的演化過程中，一直都只是幾十人的小部落；可是從農業革命之後，不過短短幾千年，就出現了城市、王國和帝國，但時間並不足以讓人類發展出能夠長久大規模合作的本能。


    雖然人類在狩獵採集時代也沒有這種合作的生物本能，但因為有共同的神話故事，幾百個陌生人就能夠互相合作。然而，這種合作畢竟比較鬆散而有限，各個智人部落還是各自生活，也能滿足大多數的自身需要。如果兩萬年前有個社會學家，完全不知道農業革命後的事情，就很有可能認為種種虛構神話故事的用途相當有限。講到祖靈、講到部落圖騰，或許已經足以讓五百人願意用貝殼交易、舉辦某種慶典、或是聯手消滅某個尼安德塔人的部落，但也就如此而已了。這位遠古社會學家不可能想到，靠著虛構的故事，還能讓幾百萬互不相識的人每天合作。


    但事實就是如此出乎意料。現在看來，虛構故事的力量，強過任何人所能想像。農業革命讓人能夠開創出擁擠的城市、強大的帝國，接著人類就開始幻想出關於偉大的神靈、祖國、有限公司的故事，好建立起必要的社會連結。雖然人類的基因演化仍然一如以往慢如蝸牛，但人類的想像力卻是極速奔馳，建立起了地球上前所未


