    浪漫主義告訴我們，為了要盡量發揮潛力，就必須盡量累積不同的經驗。必須體會不同的情感、嘗試不同的關係、品嘗不同的美食，還必須學會欣賞不同風格的音樂。而其中最好的一種辦法，就是擺脫日常生活及工作、遠離熟悉的環境，前往遙遠的國度，好親身「體驗」不同的文化、氣味、美食和規範。


