  md: '# 制作说明:


    本书由《天使神秘学院》出重金从台湾购入的原版书籍扫描制作完成。为达到最好阅读效果, 特地把书全部切开后, 再经由专业扫描设备高精度扫描完成, 并经过一张张的PS后期处理最终成书,
    其间花费大量的人力、物力以及时间, 只为能给大家提供经济并优质的神秘学学习资料而努力。


    本学院强力谴责某些机构和个人, 把本学院花心血制作完成的电子书籍, 包装后直接放在自家淘宝网上低价倾销的行为, 以谋取不劳而获的经济利益。如果长此以往最终将无人愿意再为大家花心思制作电子书,
    那以后可能大家再无新书可读。


    为让大家以后能够读到更多的好书, 也为了本学院的良性发展。本学院恳请大家尽量做到如下几点:


