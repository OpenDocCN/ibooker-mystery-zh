  md: '阿拉的子民互相殘殺，死亡數以千計，田野和果園滿目瘡痍，繁華的城市成了餘燼中的廢墟。而據說，這一切都是為了榮耀基督、或是榮耀阿拉。


    隨著基督徒逐漸占上風，他們宣告勝利的方式不只是摧毀清真寺而蓋起教堂，還發行了新的金幣銀幣，上面印有十字架符號，也標注著感謝主幫助他們打倒異教徒。然而除了新貨幣之外，這些勝利的基督徒還鑄造了另一種方型硬幣，稱為米拉雷斯（millares），上面的訊息稍有不同，用阿拉伯文寫著：「阿拉是唯一的真神，穆罕默德是阿拉的使者。」（但這可是基督徒征服者所鑄！）甚至在法國南部，天主教位於莫吉奧（Melgueil）和阿格德（Agde）的主教也發行了當地流行的穆斯林硬幣。雖然這些天主教徒敬畏天主，但用起這些穆斯林硬幣來，可沒有半點的心理障礙。52


    而對另一邊的人而言，自然也是同樣寬容大方。在北非的穆斯林商人也使用基督宗教的硬幣，例如義大利佛羅倫斯發行的弗羅林（florin）、威尼斯發行的達克特（ducat），以及那不勒斯發行的吉里亞托（gigliato）。就算是那些高喊要發動聖戰、打倒異教基督徒的穆斯林統治者，收稅的時候也還是十分樂意收到印著耶穌和聖母瑪利亞的硬幣。53


    # 這帳要怎麼算？


    狩獵採集者完全沒有金錢貨幣的概念。每個部落自給自足，不管是從肉類到藥物、從鞋子到巫術，有需要就自己去獵、自己去採、自己去做。雖然不同的部落成員可能有不同的專長，但他們用人情和義務組成經濟體系，分享著種種產品和服務。像是拿一塊肉'
