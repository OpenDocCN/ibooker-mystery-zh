  md: '人類大歷史


    為他應該付錢，而是在我有需要的時候，再還我這份人情就好。同時，當地的領主可能會叫我們全村的人去幫他蓋堡壘，但他也是一毛不付，而是在出現盜賊或野蠻人的時候，提供保護。雖然在這些村莊裡有許許多多的交易，但多半都不是金錢往來。雖然市場機制已經存在，但十分有限。雖然可以購買罕見的香料、布匹和工具，或是聘請律師和醫師提供服務，但一般而言，常用產品和服務會出現在市場上的不到一成，多數還是由家族和地方社群提供。


    另外，王國和帝國會負責某些重要功能，像是發動戰爭、修建道路、建築城堡。而為了這些目的，國王會徵稅，偶爾也會招募士兵和工人。但除了少數例外，王國或帝國通常不會干涉家族和地方社群內的事務。而且，就算真想干涉，成效也十分有限。因為傳統的農業經濟很少有多餘的食物，能夠養活大量政府官員、警察、社會工作者、教師和醫師等等。因此，大多數政權並不會發展出大規模的福利、醫療和教育體系。這些事情都還是留給家族和地方社群處理。就算在極少數情況下，統治者試圖干預農民的日常生活（像是秦帝國的連坐法），靠的也是以家族中的長輩或地方社群的耆老，做為政權代理人。


    甚至有些時候，因為地處偏遠的社群交通不便、通信困難，許多王國乾脆直接將稅收和暴力懲戒這些王室基本特權，都下放給當地。舉例來說，鄂圖曼土耳其帝國就並未維持大批帝國警力，而是允許地方家族彼此私刑伺候。如果我的堂兄殺了人，受害人的哥哥可能就會殺了我，做為報復。而只要暴力行徑不要過度擴大，不論是伊斯坦堡的蘇丹，甚至各省的帕夏（pasha，相當於省長），都會睜一眼閉一眼。


