  md: '當然，我們還是會看到有政府運用國家力量殘害自己的公民，而且常常就是這些恐怖的印象深植人心，揮之不去。譬如在二十世紀，就有數千萬、甚至上億人，遭到自己國家的特務機關殺害。但從宏觀的角度來看，國家控制的法院和警力，仍然是提升了全民的安全水準。就算是在暴虐的獨裁統治之下，現代人死於他人之手的可能性，仍然低於前現代社會的水準。


    1964年，巴西出現了軍事獨裁政權，而且一直統治巴西到1985年。在這二十年間，共有數千名巴西民眾遭到軍事獨裁政權殺害，另有數千人遭到囚禁和折磨。然而，就算在情況最糟糕的年度，里約熱內盧居民死於他人之手的可能性，仍然遠低於瓦拉尼人、雅韋提人或雅諾馬莫人。瓦拉尼人、雅韋提人和雅諾馬莫人都是住在亞馬遜森林深處的原住民，他們沒有軍隊、沒有警察，也沒有監獄。人類學研究指出，這些族人的男性約有25%到50%，會因為財產、女人或名聲的糾紛，而死於暴力衝突。111


    # 帝國平和撤退


    國家內的暴力行為在1945年以後，究竟是減少或增加，或許還有商榷的餘地。但誰都無法否認，現在的國際暴力事件正是史上最少的時期。其中對比最明顯的，或許就是歐洲帝國崩潰時的情形。歷史上，我們看到歐洲各個帝國總是鐵腕鎮壓叛亂，而且就算再也壓制不住，最後也會孤注一擲，常常就是一場浴血混戰。等到帝國滅亡，接著就有一段無政府狀態，戰亂頻傳。但自從1945年以來，多數帝國的君王都選擇了和平的退位方式，帝國解體崩潰的過程變得相對迅速、平和，而且頗有秩序。'
  merge: -1
  pgno: 416
- img_proc: true
  md: '例如在1945年，英國還統治著四分之一的地球。但不過三十年後，英國統治的土地就只剩下幾個島嶼。在這段期間，英國從一個又一個殖民地撤退，幾乎沒開過幾槍，為國捐軀的士兵不超過幾千人，殺害的人數也並不多。大家提到甘地的非暴力抵抗，常常讚譽有加，但大英帝國其實也該得到部分掌聲。帝國退位後，由各個獨立的國家接管，大部分就享受著既成的穩定邊界，也與四周的鄰國和平共處。


    確實，大英帝國在遭到威脅時，殺害了數萬民眾，而且幾個敏感地區在英國撤出後，便爆發了大規模種族衝突，造成數十萬人喪生（特別是在印度）。然而，如果從長期的歷史平均來看，英國撤退已經稱得上是和平與秩序的典範。相較之下，法國殖民帝國就比較頑固了，崩潰撤退時仍然在越南和阿爾及利亞掀起血戰，造成數十萬人死亡。但就算是法國，從其他殖民地撤退時，也算是平和迅速，而且離開後留下的是秩序井然的國家政府，不是一團混亂。


    1989年蘇聯解體，過程可說是更為平和，只是在巴爾幹半島、高加索和中亞地區仍然爆發了種族衝突。一個如此強大的帝國，竟然消失得這麼安靜且迅速，可說是史上首見！在1989年，蘇聯帝國並未遭受軍事挫敗（除了在阿富汗）、並未受到外國入侵、並未人民叛亂反抗，甚至也沒有像是金恩博士的大規模公民不服從運動發生。蘇聯當時仍然握有數百萬雄兵，有上萬輛坦克、上萬架飛機，核武力量可以把全球炸到翻個幾番。無論是紅軍或其他華沙公約組織的軍隊，也依然忠心耿耿；要是蘇聯最後一位統治者戈巴契夫下令，紅軍還是敢對人民開火。


    然而，無論是蘇聯或是東歐共產政權的大多數統治者（羅馬尼亞和塞爾維亞除外），都選擇了完全不去動用這龐大的武力。這'
  merge: -1
  pgno: 417
- img_proc: true
  md: '些人發現共產主義垮臺時，就是放下武力、承認失敗，收拾行李、告老還鄉。戈巴契夫等人所放下的，不只是蘇聯在第二次世界大戰所攻下的領地，還包括了更早之前由沙皇所征服的波羅的海、烏克蘭、高加索和中亞地區。如果戈巴契夫做的選擇，是像塞爾維亞的領導人、或是像法國在阿爾及利亞的決定，後果只能說令人不寒而慄。


    # 難得的和平盛世


    在帝國撤退之後獨立的國家，顯然對戰事都興趣缺缺。除了極少數例外，自1945年以來，已經不再有併吞其他國家的情事發生。這種征服在過去一向是政治史上不可或缺的基本要素，許多偉大的帝國因此建立，大多數過去的統治者和民眾也認為：這是歷史的必然。然而今天世上任何地方，都已經不可能再發生像羅馬人、蒙古人和土耳其人那些逐鹿天下的事。自1945年以來，沒有任何一個經聯合國承認的獨立國家遭到併吞而滅國。雖然小型國際戰爭時而發生、仍有達百萬之譜的民眾在戰事中喪命，但是戰爭已經不再是常態。


    許多人以為和平是西歐的特色，這裡富裕而民主，戰事完全絕跡。但事實上，和平氣息是先在其他地區發展，最後才傳播到了歐洲。像是在南美，最後幾場嚴重的國際戰爭是1941年的祕魯與厄瓜多戰爭，以及1932年至1935年的玻利維亞與巴拉圭戰爭。而且在這之前，南美在1879年至1884年（當時一方是智利、另一方是玻利維亞和祕魯）之後，就不再有其他嚴重戰事。


    我們可能並不認為，阿拉伯世界是特別和平的地方。但自從阿'
  merge: -1
  pgno: 418
- img_proc: true
  md: '拉伯國家贏得獨立之後，只有一次曾經爆發兩國全面交戰事件（伊拉克於1990年入侵科威特）。確實，邊界衝突層出不窮（像是1970年敘利亞與約旦），多次有國家入侵他國干涉內政（像是敘利亞入侵黎巴嫩），有許許多多的內戰（像是阿爾及利亞、葉門、利比亞），而且政變和叛亂時有所聞。但事實就是，除了波灣戰爭外，阿拉伯國家之間就再也沒有其他全面的國際戰爭。就算把範圍擴大到整個穆斯林世界，也只是再增加了兩伊戰爭這個例子。無論是土耳其與伊朗、巴基斯坦與阿富汗，或是印尼與馬來西亞，都從來沒有發生國際戰爭。


    在非洲，事情遠遠不那麼樂觀。但就算在非洲，大多數衝突也只是內戰和政變。自從非洲國家在1960和1970年代贏得獨立之後，就極少有國家試圖征服彼此、取而代之。


    在過去，如果有些相對平靜的年代（像是1871年到1914年的歐洲），總是接著就發生了翻天覆地的戰事。但是現在不同了，原因就在於：真正的和平不該只是「現在沒有戰爭」，而是「不可能發生戰爭」。在過去，從來未曾有過真正的世界和平。譬如在1871年到1914年間，歐洲各地的戰爭仍然是一觸即發，不管是軍隊、政治家或一般公民，也都有這種心理準備。過去所有所謂的和平時期，都是如此的暗潮洶湧。


    國際政治過去的鐵則就說，「任何兩個相鄰的政體，都會有某種可能，讓他們在一年之內向對方宣戰」。像這樣的叢林法則，無論是在十九世紀晚期的歐洲、中世紀的歐洲、古代的中國、或古希臘，都同樣大行其道，屢屢成真。如果雅典和斯巴達在西元前450年達成和平，很可能在西元前449年就又打了起來。


    然而，我們今天已經打破了這個叢林法則。現在呈現的是真正'
  merge: -1
  pgno: 419
- img_proc: true
  md: '的和平，而不只是沒有戰爭。對於大多數的政體來說，都沒有什麼合理可信的情況，會在一年之內導致全面開戰。有什麼可能，會讓德國和法國忽然開戰？中國和日本開戰？巴西和阿根廷開戰？


    雖然可能會有某些小規模邊境衝突，但現在除非發生了某個世界末日等級的事件，否則幾乎不可能再次爆發傳統的全面戰爭。如果說明年這個時候，阿根廷裝甲師要一路橫掃到巴西里約的大門口，而巴西又要地毯式轟炸阿根廷的布宜諾斯艾利斯，機會只能說微乎其微。當然，有幾對國家之間仍然可能出現戰爭，像是以色列和敘利亞、衣索比亞和厄立垂亞、或是美國和伊朗，但這些只是少數例外。


    當然，未來情況也可能有所改變，到時候回頭來看，就會覺得現在這個想法天真得難以想像。但從大歷史的角度來看，現在的天真仍然是件好事。在過去，從來沒有這種四方和平、難以想像戰爭爆發的年代。


    # 和平紅利飆升


    目前已經有許多學者發表不少著作和文章，解釋為何現在會有這種令人愉悅的發展，其中大致提出幾項重要因素。


    首先，戰爭的成本大幅上升。如果諾貝爾和平獎一百年才頒發一次，那應該頒給歐本海默以及與他一起研發出原子彈的同事。有了核武器之後，超級大國之間如果再開戰，無異於集體自殺。想要以武力征服全球，已經成了不可能的任務。


    其次，正因為戰爭的成本飆升，也就代表利潤下降。在史上大多數時候，只要掠奪或兼併敵人的領土，總是能為自己的國力注入'
  merge: -1
  pgno: 420
- img_proc: true
  md: '一劑強心針。過去的財富多半就是田地、牛隻、奴隸和黃金，無論要搶劫或占領都十分方便。但是到了今天，財富的形式變成了人力資本、科技知識，以及銀行這種複雜的社經結構，想要搶奪或是占領都相當困難。


    讓我們以加州為例。加州最初是以金礦起家，但現在的經濟重心已經轉移到了矽谷和好萊塢。如果今天中國忽然打算武力進犯加州，派出百萬大軍登陸舊金山海灘，揮軍直入，一切會如何？他們幾乎將一無所得。畢竟，矽谷雖然叫矽谷，卻沒有矽礦。這裡的財富都藏在點子和想法裡，也就是藏在那些矽谷工程師，還有好萊塢的編劇、導演和特效人員的腦袋裡。中國的坦克車還沒開到日落大道，他們早就已經搭機逃到海角天邊去了。


    雖然世界上仍然偶爾會發生大規模國際戰爭（例如1990年伊拉克入侵科威特、2003年美國攻占伊拉克），但原因在於這些地方的財富多半屬於傳統的實質財富。雖然被侵略國的許多政要也能逃往國外，但油田卻是萬萬跑不了。


    接下來的第三項重點是：顯然戰爭已經不再那麼有利可圖，而和平卻成了一筆愈來愈划算的生意。在過去的農業經濟中，長途貿易和外國投資並非重點，因此和平頂多只是省下戰爭費用，其他並無太大好處。例如假定在1500年，日本和朝鮮兩國處於和平狀態，朝鮮大眾就不用負擔沉重的戰爭稅，也不用擔心日本毀滅性的侵略攻擊；但除此之外，朝鮮人並不會因為和平的些許紅利，荷包就變滿滿。但是到了現代的資本主義經濟，外貿和投資變得至關重要，和平可以帶來特別豐厚的紅利。只要日本和韓國相安無事，韓國人可以把產品賣給日本、可以在日本交易股票，也可以接受日本來的投資，而這些都能振興韓國的經濟。'
