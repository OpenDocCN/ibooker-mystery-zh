  md: '一。北極的土地到處都是大型而肥美的動物，例如馴鹿和長毛象。每隻長毛象都能提供大量的鮮肉（而且因為當地溫度低，甚至可以冰凍，留待日後食用）、美味的脂肪、溫暖的毛皮，還有寶貴的象牙。索米爾（見第72頁）的調查結果發現，長毛象獵人可不是在極地苟延殘喘，而是過得意氣風發、舒適愜意。


    隨著時間過去，這些部落開枝散葉、不斷擴張，繼續追逐著長毛象、乳齒象、犀牛和馴鹿。大約在西元前一萬四千年，有些部落就這樣從西伯利亞東北，來到了阿拉斯加。當然，他們並不知道自己發現了一片新世界。不論對於長毛象或對人類來說，阿拉斯加不過就是西伯利亞的自然延伸罷了。


    一開始，阿拉斯加和美洲其他地區之間被冰河隔開，可能頂多只有一、兩個獨立的探險者，曾經到過更南邊的土地。但是到了西元前大約一萬兩千年，全球暖化融冰，出現了一條比較容易通過的通道。藉由這條新通道，人類大舉南遷，走向整片美洲大陸。雖然他們一開始習慣的是在極地狩獵大型獵物，但他們也迅速適應了遠為不同的多種氣候和生態系。這些來自西伯利亞的後裔，定居到現在的美國東部、密西西比河三角洲的沼澤、墨西哥沙漠，還有中美洲的熱帶叢林。有些人還到了亞馬遜河流域落地生根，也有的定居在安地斯山谷，或是阿根廷開闊的彭巴大草原。而且，這一切不過是短短一、兩千年間的事！


    等到西元前一萬年，人類已經來到了美洲大陸最南端的火地群島，他們能在美洲這樣如同閃電戰一般橫行無阻，正證明了智人已有無與倫比的聰明才智和適應能力。在這之前，沒有任何其他動物能夠在基因幾乎毫無改變的情況下，這樣快速遷移到如此大不相同的環境當中。22'
