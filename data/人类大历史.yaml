    只要在對的情境之下，這些故事就能迅速發生變化。例如在1789年，法國人幾乎是在一夕之間，相信的故事就從「君權神授」轉成「主權在民」。因此，自從認知革命之後，智人就能依據不斷變化的需求，迅速調整行為。這等於是開啟了一條採用「文化演化」的快速道路，而不再停留在「基因演化」這條總是堵車的道路上。走上這條快速道路之後，智人合作的能力一日千里，很快就遠遠甩掉了其他所有人類和動物物種。


