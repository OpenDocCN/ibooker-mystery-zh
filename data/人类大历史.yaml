  md: '雖然上天可以賜雨、社會機制可以提供公平正義和衛生保健、有好的運氣就可以變成百萬富翁，但不論如何，我們的基本心態都不會改變。因此，就算是最偉大的國王也無法避免焦慮，得不斷逃避著悲傷和痛苦，也總是想要追尋更多的快樂。


    釋迦牟尼找到一種方法可以跳出這種惡性循環。在事物帶來快樂或痛苦的時候，重點是要看清事物的本質，而不是著重在它帶來的感受，於是就能不再為此所困。雖然感受悲傷、但不要希望悲傷結束，於是雖然仍有悲傷，也能不再為此而困——即使仍然悲傷，也是一種豐碩的經驗。雖然感受快樂、但不要希望快樂繼續，於是雖然仍有快樂，也能不失去心中的平靜。


    但要怎樣才能讓心裡接受事物的本質，放下種種欲求，知道苦即為苦、樂即為樂？釋迦牟尼制定一套冥想的技巧，能夠訓練心靈感受事物的本質，排除種種欲求。透過訓練，心靈專注在「我現在是什麼感受？」而不是問「為什麼是我？」


    這種境界很難達到，但並非不可能。


    # 苦由「欲」起


    釋迦牟尼將冥想落實在各種道德規範上，好讓信眾更能專注在實際的感受，不落入各種欲求和幻想之中。他要求信眾不殺生、不邪淫、不偷盜，因為這些作為一定會讓欲望如野火燎原，一心追求權力、感官享受或財富。等到這些火焰徹底撲滅，原本的欲求就換成了圓滿和寂靜，稱為涅槃（nirvana，梵文原義是「熄滅」）。達到涅槃，也就是解脫了所有苦痛，能夠無比清晰的感受身邊的現實，沒有什麼幻想幻象。雖然很有可能還是會遇到苦痛，但苦痛已'
