  md: '接下來，英法德各國學者開始把有關「勤勉的雅利安人」的語言學理論，與達爾文的天擇理論結合，認為所謂的雅利安人不只是語言族群，而是某種生物族群，也就是一個種族。而且，這可不是什麼隨隨便便的種族，而是一個上等種族，身材高大、金髮碧眼、工作勤奮而且極度理性，他們就這樣從北方的迷霧中走出來，奠定了全世界文化的基礎。但遺憾的是，入侵印度和波斯的雅利安人開始與當地原住民通婚，於是不再有白晰的膚色與金髮，也失去了理性和勤奮。於是，印度和波斯的文明每況愈下。但在歐洲可就不同了，雅利安人還是維持著純潔無汙染的種族特性。正因如此，歐洲人必須要征服世界，而且他們最適合擔任世界的統治者；不過可得小心，別遭到其他劣等種族混血汙染。


    在幾十年間，這一款種族主義理論甚囂塵上，但現在已經成了科學家家和政治家不敢再提的禁忌話題。雖然我們還是英勇抵抗著種族主義，但卻沒發現戰線已經轉移，過去種族主義在帝國思想中所佔的位置，現在都由文化主義（culturism）借殼上市了。目前這個名詞尚未明確定義，但差不多是可以提出這個概念的時候了。對今日許多菁英份子而言，要比較判斷不同人群的優劣對比，幾乎講的總是歷史上的文化差異，而不再是種族上的生物差異。我們不再說「這就存在他們的血液裡」，而是說「這就存在他們的文化裡」。


    因此，就算是反對穆斯林移民的歐洲右翼政黨，也會小心避開種族歧視的用語。以法國極右派政黨「民族陣線」為例，黨魁勒龐（Marine le Pen）絕對不可能在電視上大聲表示：「我們不希望這些下等的閃族人，汙染我們的雅利安人血統，破壞我們的雅利安人文明。」然而，不管是法國的民族陣線、荷蘭的自由民主黨、或是奧地利的奧地利未來聯盟，都認為：西方文化根植發展於歐洲，具有'
  merge: -1
  pgno: 341
- img_proc: true
  md: '民主、寬容、性別平等的特質，而穆斯林文化根植發展於中東，具有階級政治、宗教狂熱、歧視女性的特質。正因為這兩種文化如此不同，而且許多穆斯林移民不願（或許也不能）採納西方的價值觀，因此不應允許他們移居進入西方社會，以免造成內部衝突，破壞了歐洲的民主和自由主義。


    像這些文化主義者的論點，也有一套人文社會科學在背後支持，強調的是所謂的文化衝突、以及不同文化之間根本上的差異。但並不是所有歷史學家和人類學家都接受這些理論，或是支持它們在政治上的應用。


    雖然，現在的生物學家已經可以指出「現有人類族群之間的生物差異，小到可以忽略不計」，從而輕鬆推翻種族主義的論調；然而對於歷史學家和人類學家來說，要推翻文化主義卻沒那麼簡單。畢竟，如果人類文化之間的差異真是那麼微不足道，我們又為什麼要付錢給歷史學家和人類學家，請他們研究分析？


    # 沒有錢，萬萬不能


    科學家為帝國提供了各種實用知識、思想基礎和科技工具，要是沒有他們，歐洲人能否征服世界仍是未定之數。至於征服者報答科學家的方式，則是提供各種資訊和保護，資助各種奇特迷人的研究，而且將科學的思考方式傳到地球上的每一個偏遠角落。如果沒有帝國的支持，科學能否發展得如此蓬勃，也在未定之天。


    絕大多數的科學學門一開始的目的，都只是為了讓帝國繼續發展，而且許多發現、收藏、硬體設施和獎助金，也都多虧了陸海軍及帝國統治者的慷慨協助。'
