  md: '化機制天生憂鬱的人，就算真的找到好對象，也不一定就會比較快樂。


    話說回來，大多數生物學家也不是完全只看生化學這一套。雖然他們主張快樂「主要」是取決於生化機制，但也同意心理學和社會學因素同樣有影響力。畢竟，我們這套快樂空調系統雖然有上下限，但在這個範圍裡還是可以活動活動的。雖然要超出邊界的可能性微乎其微，但結婚和離婚卻能影響心情在這個範圍內的偏移。那些平均只有5分的人，永遠不會忽然在大街上開心的跳起舞來；但如果找到樂觀的好對象，就能讓她三不五時感受到7分的愉悅，而更能避開3分的沮喪。


    如果我們接受了生物學對於快樂的理論，歷史這個學門的重要性就大減了；畢竟，大多數的歷史事件並不會對我們的生化機制有什麼影響。雖然歷史可以改變那些影響血清素分泌的外界刺激，然而無法改變最後的濃度，所以也就是無法讓人變得更快樂。


    讓我們用古代中國農夫和現代香港企業家為例。假設我們這位古代農夫住在沒有暖氣的小土屋裡，旁邊就是豬圈；企業家住在擁有各種最新科技的豪宅，窗口就能俯瞰南海的浩瀚海景。直覺上，我們會覺得企業家想必比農夫更快樂。然而，快樂是在腦子裡決定的，而大腦根本不管小土屋或大豪宅、豬圈或南海，只管血清素的濃度。所以，農夫蓋完了他的土屋之後，大腦神經元分泌血清素，讓濃度到達x。而在現代，企業家還完最後一筆豪宅房貸之後，大腦神經元也分泌出大量血清素，並且讓濃度差不多也到達x。對於大腦來說，它完全不知道豪宅要比土屋舒適太多，它只知道現在的血清素濃度是x。所以，這位企業家快樂的程度，並不會比那位足以當他高高高高高祖父的農夫來得高。'
