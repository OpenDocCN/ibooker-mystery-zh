  md: '# 佛法無我


    基督教神學家應該也會同意這種說法。不管是聖保羅或是聖奧古斯丁，都心知肚明：如果讓人自己選擇的話，大多數人寧願把時間用來做愛，而不是向上帝祈禱。這種選擇絕對是順從你的渴望，但這意思是想要快樂就該去做愛嗎？聖保羅和聖奧古斯丁可絕對不會這麼說。對他們而言，這只證明了人類本來就有罪，容易受到撒旦的誘惑。從基督教的角度來看，大多數人類都多多少少沉溺在類似海洛因成癮的情境。假設有個心理學家，想調查吸毒者的快樂指數。經過調查之後，他發現這些吸毒者全部有志一同，所有人都說吸毒的時候最快樂了。請問這位心理學家是不是該發表一篇論文，告訴大家想快樂就該去吸毒？


    除了基督教以外，還有一些生物學者也認為，主觀感受不該是最大重點。至少在講到主觀感受的價值時，甚至達爾文和英國演化生物學家道金斯（Richard Dawkins）都有部分觀點，與聖保羅和聖奧古斯丁相同。根據道金斯在名著《自私的基因》提出的論點，正如同其他動物，人類在天擇的影響下，就算對個人不利，他們也會選擇要讓基因繼續流傳下去。大多數男性一生勞苦、終日煩憂，因為競爭激烈而不斷爭鬥，硬是沒辦法享受一下平靜的幸福；但這是由於DNA操縱著他們，要他們為基因自私的目的做牛做馬。DNA就像撒旦，用一些稍縱即逝的快樂做為引誘，令人為之臣服。


    大多數宗教和哲學看待快樂的方式，都與自由主義非常不同。最看重快樂這個問題的，就是佛教。兩千五百多年來，佛教有系統的研究了快樂的本質和成因；正因如此，最近有愈來愈多科學團'
