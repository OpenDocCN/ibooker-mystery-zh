  md: '# 第5章


    # 史上最大騙局


    人類曾經有長達兩百五十萬年的時間，靠採集及狩獵維生，並不會特別干預動植物的生長情形。直立人、匠人或是尼安德塔人都會採集野無花果、獵捕野綿羊，但不會去管究竟無花果樹該長在哪裡、羊該在哪片草地吃草，又或是哪隻公羊該跟母羊交配。雖然智人從東非來到中東、歐洲、亞洲，最後到了澳洲和美洲，但不管他們到達什麼地方，仍然就是靠野生的動植物維生。畢竟，如果現在的生活方式就吃得飽，社會結構、宗教信仰、政治情況也都穩定多元，何必自找麻煩改來改去？


    然而，這一切在大約一萬年前已全然改觀，人類開始投入幾乎全部的心力，操縱著幾種動植物的生命。從日升到日落，人類忙著播種、澆水、除草、牧羊，一心以為這樣就能得到更多的水果、穀物和肉類。這是一場關於人類生活方式的革命：農業革命。


    從採集走向農業的轉變，始於大約西元前9500年至8500年，發源於土耳其東南部、伊朗西部和地中海東部的丘陵地。這場改變一開始速度緩慢、地區也很有限。小麥與山羊馴化成為農作物和家'
  merge: -1
  pgno: 96
- img_proc: true
  md: '畜的時間大約是在西元前9000年；豌豆和小扁豆約在西元前8000年；橄欖樹在西元前5000年；馬在西元前4000年；葡萄則是在西元前3500年。至於駱駝和腰果等其他動植物，馴化的時間還要更晚，但不論如何，到了西元前3500年，主要一波馴化的熱潮已經結束了。


    即使到了今天，雖然人類擁有種種先進科技，但食物熱量超過90%的來源，仍然是來自人類祖先在西元前9500年到3500年間馴化的植物，包括：小麥、稻米、玉米、馬鈴薯、小米、大麥。在過去兩千年間，人類並沒有馴化什麼特別值得一提的動植物。可以說，人到現代還懷有遠古狩獵採集者的心，以及遠古農民的胃。


    學者曾經以為農業就是起源於中東、再傳布到全球各地，但現在則認為：農業是同時間在各地獨自發展而開花結果，而不是由中東的農民傳到世界各地。中美洲人馴化了玉米和豆類，但不知道中東人種了小麥和豌豆。南美人學會如何栽培馬鈴薯和馴養駱馬，但也不知道墨西哥或地中海東部發生了什麼事。中國最早馴化的是稻米、小米和豬。北美最早的農夫，也是因為懶得在樹叢裡四處尋找南瓜，決定乾脆自己種。新幾內亞馴化了甘蔗和香蕉，西非農民也馴化了穇子、非洲稻、高粱和小麥。就從這些最早的出發點，農業開始四方遠播。到了西元一世紀，全球大多數地區的絕大多數人口都從事農業。


    為什麼農業革命是發生在中東、中國和中美洲，而不是澳洲、阿拉斯加或南非？原因很簡單：大部分的動植物其實無法馴化。雖然智人能挖出美味的松露、獵殺毛茸茸的長毛象，但真菌太難捉摸，巨獸又太過兇猛，想要自己種或自己養，真是難上加難。在我'
