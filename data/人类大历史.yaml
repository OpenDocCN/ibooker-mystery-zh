  md: '# 歷史學的特質之一：馬後炮的謬誤


    歷史的每一個時間點，都像是叉路口。雖然我們回首來時路，從過去到現在已經只剩下單行道；但是未來卻還有無數的叉路等待我們。其中某些路比較寬、比較平坦、路標比較明確，所以也是比較可能的選擇。然而，歷史有時候就是選擇了一些完全出人意表的道路。


    像是在西元四世紀初，羅馬帝國可以用各種方式解決宗教問題，也可以堅持傳統，維持多元的多神論環境。但羅馬當時的皇帝君士坦丁回顧過去一世紀間無止境的宗教紛擾，似乎是覺得如果能有單一宗教、明確的教義，就能協助他統一各種族。而且，當時可能成為國教的選項眾多，像是摩尼教、崇拜眾神之母希柏利或埃及女神伊西斯的教派、崇拜太陽神的密特拉教（Mithraism），還有猶太教、祆教，甚至佛教，都有可能。為什麼他最後選了耶穌？是他在哪方面被基督教神學打動？或是基督教有哪方面的教義讓他覺得便於利用？是他真的受到什麼宗教感召，還是有哪個大臣認為基督教正在迅速擴張，不如趕快搭上順風車？


    歷史學家雖然可以推測，但無法提供任何明確的答案。他們可以描述基督教如何（how）拿下了羅馬帝國，但他們無法解釋為何（why）能達成這項創舉。而如何與為何之間有何不同？描述如何的時候，是要重建一連串從一點演變到另一點的事件順序。至於要解釋為何的時候，則是要找出因果關係，看看究竟為什麼發生的是這一連串的事件，而不是另一連串的事件。


    確實，有些學者會針對像是「基督教興起」這種事件，提出一'
