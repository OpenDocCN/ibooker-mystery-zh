  md: '# ## 第7章


    # 大腦記憶過載


    演化並沒有讓人擁有踢足球賽的能力。確實，演化讓人有腳能踢球、有肘能犯規、還有嘴能罵人，但這些加起來，頂多就是讓人能自己玩玩球而已。想在某個下午，和球場上的陌生人一起來踢場足球賽，不只得和十個可能從未見過面的人合作當隊友，還得知道對方十一個人也會遵守一樣的規則。


    有些時候，其他動物也會和陌生同類合作，進行仿若儀式的攻擊舉動，但通常都是出於本能。例如幾隻小狗有時候會圍攻一、兩隻小狗，咬來咬去、亂成一團，但那是深植於牠們基因裡的設計。而我們人類的孩子體內，可沒什麼玩足球的基因。我們之所以能和完全陌生的人踢場球賽，是因為大家都學過同樣一套足球規則。這些規則全部都是想像出來的，不過只要大家都同意，還是能玩得十分開心。


    這種情況同樣適用於像是王國、教會或貿易網等較大的規模，只有一項重要區別：複雜的程度不同。相對來說，足球的規則簡單明瞭，很像是過去狩獵採集時代，各個小部落或小村莊之間要合'
  merge: -1
  pgno: 142
- img_proc: true
  md: '作時的共識。所有球員都可以輕輕鬆鬆把規則全部記在腦子裡，同時大腦還有餘裕記得一些歌曲、影像，甚至是待會要買什麼。只不過，如果不是像這樣只有22個人要合作，而是有幾千人、甚至幾百萬人要合作，需要儲存及處理的資訊量就會極度龐大，絕不是任何單一人腦所能記憶處理的。


    # 大腦不是良好的資訊儲存設備


    某些其他物種（像是螞蟻和蜜蜂）也能形成大型社會，而且穩定又靈活。但這是因為牠們的基因組裡就已經儲存了合作所需的大部分資訊。蜜蜂的未受精卵會發育成雄蜂，受精卵則發育成雌蜂，雌蜂幼蟲依據被餵食的食物不同，長大後可能成為蜂后，也可能成為一般的工蜂。在牠們的DNA裡，已經為兩種不同角色都設定好必要的行為模式，前者讓牠能母儀天下，後者則讓牠盡心盡力、認真工作。蜂巢的社會結構非常複雜，有許多不同種類的工蜂，有的負責覓食、有的負責照護、有的負責清潔等等。但到目前為止，我們可沒人見過有蜜蜂當律師負責打蜜蜂官司。之所以蜜蜂不需要律師，是因為不會有蜜蜂打算違反什麼蜂巢憲法，認為清潔蜂不該有生命權、自由權和追求幸福的權利。


    但人類可就不同了，這種事總是不斷發生。因為智人的社會秩序是透過想像而建構，維持秩序所需的關鍵資訊無法單純靠DNA複製就傳給後代，需要透過各種努力，才能維持種種法律、習俗、禮儀，否則社會秩序很快就會崩潰。舉例來說，漢摩拉比國王將人分成上等人、平民和奴隸，但這件事並不存在的基因組裡，並不是一個自然的區分方式。如果巴比倫人無法讓大家的心裡都有這'
  merge: -1
  pgno: 143
- img_proc: true
  md: '項「真理」，整個社會就會停止運作。同樣的，就算是漢摩拉比本人，他後代的DNA裡也沒記載上等人如果殺了個平民女性就該付30舍客勒的銀子。漢摩拉比必須特地教導他的兒子，告訴他帝國的法律是如何如何，以後再由兒子來教孫子，以此代代相傳。


    一個帝國要運作，會產生大量的資訊。除了法律之外，帝國還必須記錄各種交易和稅收、軍用物資和商品的庫存量，還有各種節慶及打勝仗的日期。在先前的幾百萬年間，人類只有一個地方可以記錄資訊：他們的大腦。但很遺憾，對於整個帝國這麼大的資料量來說，人類的大腦並不是很好的儲存設備，主要原因有三：


    第一，大腦的容量有限。確實有些人記憶力驚人，而且古代也有人專研記憶術，整個省的地形地勢瞭然於胸、整部國家法典倒背如流。儘管如此，還是有連記憶大師也無法超越的限制。像是律師就算能把整個麻州的法條都背起來，也不可能把從十七世紀塞勒姆（Salem）女巫審判以降、所有的訴訟細節全記得一清二楚。


    其次，人類總難免一死，而大腦也隨之死亡。所以任何儲存在大腦裡的資訊，大多在一個世紀內就會消失。當然，我們可以把記憶從一個大腦傳遞到另一個大腦裡，但傳遞幾次之後，資訊總是會失真、或是遭到遺忘。


    第三點、也是最重要的一點，在於人類的大腦經過演化，只習慣儲存和處理特定類型的資訊。為了生存，遠古的狩獵採集者必須能夠記住數千種動植物的形狀、特性和行為模式。像是他們必須記住，一朵皺巴巴的黃色菇類，如果是秋天長在榆樹下，就很有可能有毒，但如果是冬天長在橡樹下，就是一種很好的胃藥。此外，狩獵採集者也得記住部落裡幾十個人彼此的意見和關係。例如，假設露西需要部落裡有人幫她擋住約翰，叫他別來騷擾她，就很需要記'
  merge: -1
  pgno: 144
- img_proc: true
  md: '得像是約翰上星期與瑪麗吵了一架，所以現在找瑪麗來幫她擋住約翰，瑪麗肯定樂意。因此，演化壓力讓人類的大腦善於儲存大量關於動植物、地形和社會活動的資訊。


    然而在農業革命之後，社會開始變得格外複雜，另一種全新的資訊類型也變得至關重要：數字。


    採集者以前從來不需要處理大量的數字，例如採集者不用記得森林裡每棵樹上有幾枚果子；也因此，人類的大腦不習慣儲存數字和處理數字。然而如果要管理一個大國家，數字可說是一大關鍵。國家光是立法、講些關於守護神的故事還不夠，像是收稅這種事就萬萬不可少。而為了向數十萬國民收稅，就必須先蒐集關於國民收入及財產的數據、關於繳款的數據、關於欠款和罰款的數據、關於扣除額及免稅額的數據。這些數字總共會有數以百萬位元計的資料需要儲存和處理。國家要是無法應付，就永遠不知道手中有什麼資源、未來又能利用什麼資源。但對大多數人來說，講到要記憶、回憶、處理這類的數字，不是覺得腦力過載，就是覺得昏昏欲睡。


    這種人腦的限制大大局限了人類合作的規模和程度。如果某個社會的人數和物品的數量超過某個臨界值，就必定需要儲存和處理大量的數字資料；但人腦又力有未逮，於是過於龐大的社會系統就會崩潰。正因如此，就算在農業革命後的數千年間，人類的社會網絡比起現代，還是相對規模較小、也相對簡單。


    最早克服這項問題的是古代美索不達米亞南部的蘇美人。當地豔陽高照、平原肥沃，發展出發達的農業、繁榮的城鎮。隨著居民人數增長，要協調各項事務所需的資訊也不斷膨脹。在西元前3500年至3000年之間，一些不知名的蘇美天才發明了一套系統，可以在人腦之外儲存和處理資訊，而且是專為處理大量數字資料量身打造'
  merge: -1
  pgno: 145
- img_proc: true
  md: '的。從此，蘇美人的社會秩序不再受限於人腦的處理能力，開始能走向城市、走向王國和帝國。蘇美人所發明的這套數字處理系統，正是書寫文字。


    ![](img/b523907992e2c573126c18fe166aa89d_146_0.png)


    13. 來自古城烏魯克（Uruk）大約西元前3400至3000年的泥板，記載著當時的行政文書。這塊泥板清楚記載：在三十七個月內收到了29,086單位的大麥（大約3,800蒲式耳），並由某位「庫辛」簽核。這裡的「庫辛」可能是當時的某個職稱、又或是某個人的名字。如果庫辛真的是名字，他可能就是史上第一個我們知道名字的人。所有先前我們使用的名稱，像是尼安德塔人、納圖芬人、雪維洞穴、哥貝克力石陣，都只是現代人為它們取的名字。像是哥貝克力石陣，我們其實並不知道當時建造它的人怎麼稱呼這個地方。而在文字出現之後，我們終於能夠「透過當時人的耳朵，聽到」一些歷史。很有可能，當時庫辛的鄰居就會朝著他大叫「庫辛！」。這一切在在說明，史上第一個記下的名稱或名字，是屬於一位會計師，而不是什麼先知、詩人，或是偉大的征服者。41'
  merge: -1
