    其次，就算是過去半個世紀這短暫的黃金年代，也可能已經播下未來災難的種子。在過去幾十年間，人類用了無數新方法干擾了地球的生態平衡，而且看來可能後患無窮。有大量證據顯示，我們縱情消費而不知節制，正在摧毀人類賴以繁榮的根基。


    最後一點，雖然智人確實取得了空前的成就，或許值得沾沾自喜，但代價就是賠上幾乎所有其他動物的命運。人類現在取得許多物質和資源，讓我們得以免受疾病和饑荒之苦，但我們是犧牲了實驗室裡的猴子、農場裡的乳牛、輸送帶上的雞隻，才換來這些讓我們洋洋得意的成就。在過去兩世紀間，有數百億隻動物遭到現代工業制度的剝削，冷酷程度是整個地球史上前所無有的。就算動物保護團體指出的現象只有十分之一是事實，現代農牧產業也已是史上最大規模、最殘暴的罪行。要評估全球幸福程度的時候，只看上層階級、只看歐洲人、只看男性，都是巨大的錯誤。或許，只看人類也同樣有失公允。


    # 快樂該如何計算？


    到目前為止，我們討論快樂的時候，似乎都認為這是由各種實質因素（例如健康、飲食和財富）建構出來的產品。如果某個人更有錢、更健康，就一定也更快樂。但這一切真的這麼理所當然嗎？'
