  md: '如果兩隻假猴子放得夠近，幼猴甚至是緊抱著布猴，只是把頭伸去金屬猴那邊吸奶。哈洛猜想，可能是因為鐵絲太冷，幼猴不喜歡，所以他還為金屬猴加裝了一顆電燈泡，讓金屬猴有了體溫。然而，除了真的非常小的幼猴之外，大多數猴子選擇的仍然是布猴。


