- img_proc: true
  md: '怎樣和其他母牛和公牛建立緊密的關係，否則就不可能生存和繁衍後代。而為了學習必要的技能，演化就會在小牛（以及所有社交性哺乳動物的幼獸）的心理，植入強烈想要玩耍的欲望，這正是哺乳動物學習社交行為的管道。此外，小牛還有另一股更強大的欲望，就是不能和母親分開，畢竟當初在野外，母牛的奶水和照顧是生存的關鍵。


    但像現在，酪農在小母牛一生下來不久，就把牠隔離到另一個隔間裡，與母牛分開；然後提供給小母牛食物、水和抵抗各種疾病的藥物，等到牠發育成熟，再用公牛的精子讓牠懷孕產乳。這麼一來會如何？從客觀的角度來看，小母牛確實不再需要為了生存或繁衍而和母親相處，也不用和同伴玩樂。但從主觀的角度來看，小母牛仍然會有一股強大的衝動，想要和母親在一起、想和其他小牛嬉戲。這些衝動無法滿足，就會讓牠十分痛苦。這是演化心理學的基本道理：過去在野外形成的種種需求，就算現在已經不是生存和繁殖所必需，仍然會持續造成主觀的感受。工業化農業的悲劇在於，它一味強調動物的客觀需求，卻忽略了牠們的主觀需要。


    這項理論的真實性，至少在1950年代就已證實，當時美國心理學家哈洛（Harry Harlow）就曾用猴子做過實驗。他在幼猴出生後幾小時，就把牠們和母猴分開，各自關在獨立的籠子裡，由兩隻假母猴來負責哺育。每個籠子有兩隻假母猴，一隻使用鐵絲材質，上面有可供幼猴吸吮的奶瓶；另一隻使用木材、再鋪上布，模仿真實母猴的樣貌，但除此之外無法提供幼猴任何實質幫助。這樣一來，理論上幼猴似乎應該會依附著提供食物營養的金屬猴，而不是什麼都不做的布猴。


    但沒想到，幼猴顯然比較愛的是布猴，多半時間都緊抱不放。'
