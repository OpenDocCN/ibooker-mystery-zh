  md: '# 第9章


    # 歷史的方向


    農業革命之後，人類社會的規模變得更大、更複雜，而維繫社會秩序的虛構故事也更為細緻完整。人類幾乎從出生到死亡，都被種種虛構的故事和概念圍繞，讓他們以特定的方式思考，以特定的標準行事，追求特定的事物，也遵守特定的規範。就是這樣，讓數百萬計的陌生人，能遵照這種人造而非天生的直覺，合作無間。這種人造的直覺，就是「文化」。


    在二十世紀前半，學者認為每種文化都自成一格、和諧共存，而且都有獨特的不變本質。每一群人都會有自己的世界觀和社會、法律及政治體系，各自運作順暢，就像是行星繞著太陽一樣。就這種觀點，文化只要獨立不受影響，就不會有所改變，而會依照原本的步調，朝向原本的方向持續下去；直到出現了外界力量干預，才會造成改變。所以人類學家、歷史學家和政治學家講到薩摩亞文化（Samoan
    Culture）或塔斯馬尼亞文化（Tasmanian Culture）的時候，語氣都彷彿這些形塑薩摩亞和塔斯馬尼亞的信仰、規範和價值，從頭到尾不曾改變過。'
  merge: -1
  pgno: 188
- img_proc: true
  md: '# ## 各式各樣的矛盾


    但現在，多數的文化學者都認定事情正好相反。雖然每種文化都有代表性的信仰、規範和價值，但會不斷的流變。只要環境或臨近的文化改變了，該社會就會有所因應，導致文化有所改變。除此之外，社會的內部也會形成一股造成文化改變的動力。就算是環境完全與外界隔絕、生態也十分穩定，還是無法避免改變。如果是物理定律，絕不會因地因時而異，但既然文化、風俗、信仰都是人類自己想像創造出來的秩序，社會內部就會有各式各樣的矛盾。整個社會一直試圖調和這些矛盾，因此就會促成文化改變。


    舉例來說，中世紀歐洲貴族既信奉天主，又要遵守騎士精神。典型的貴族清晨就上教堂，聆聽神父滔滔不絕講述聖人一生行誼。神父會說：「虛榮、虛榮，一切都是虛榮。財富、色慾和榮譽都是極危險的引誘，你絕不可同流合汙，你要跟隨耶穌的腳步。要像祂一樣謙和，要避免暴力和奢侈，而且如果有人打你的右臉，連左臉也轉過來由他打。」於是，這位貴族回家的時候滿懷謙和與自省；但接著他就換上了最好的絲質衣服，前往領主的城堡參加宴會。城堡裡觥籌交錯，飲酒如流水，吟遊詩人歌詠著中世紀的愛情故事，賓客聊著下流的笑話和血淋淋的戰場情節。爵爺大聲宣告說：「一旦受辱，寧死不屈！如果有人竟敢質疑你的榮譽，就只有血能洗淨這種侮辱。人生至樂，豈不就是要讓敵人聞風竄逃、讓他們美麗的女兒在你腳下顫抖？」


    這種價值觀的矛盾，從來沒辦法完全解決，但是歐洲的貴族、教士、平民試圖處理這些問題的時候，他們的文化也就隨之改變。'
  merge: -1
  pgno: 189
- img_proc: true
  md: '其中一次嘗試處理，結果引發了十字軍東征。對於這些騎士來說，東征既能一展軍事長才，也能展現自己對宗教的虔敬，可說是一石二鳥。同樣的矛盾也帶來了種種騎士修會的成立，像是聖殿騎士團和僧侶騎士團，想讓基督宗教和騎士理想嵌合得更為緊密。中世紀藝術和文學也常談到這種矛盾，像是亞瑟王與聖杯的傳奇便是一例。亞瑟王的宮廷難道不是總想告訴我們，優秀的騎士也該是虔誠的基督徒，而虔誠的基督徒也能成為最優秀的騎士？


    另一個例子是現代的政治秩序。自從法國大革命之後，全球人民逐漸同意「自由」和「平等」都是基本的價值觀。然而這兩者根本就互相牴觸！想要確保「平等」，就得節制那些較為突出的人、削弱那些人的自主權和自由；而要保障人人都能獲得如他所願的「自由」，也就必然會影響到所有人的平等。自從1789年法國大革命以來，全球政治史可說就是講述著要如何解決這種矛盾。


    只要讀過狄更斯的小說，就知道十九世紀的歐洲自由政體將個人自由奉為圭臬，即使這讓付不出錢的貧困家庭只能犯罪被關、孤兒被迫加入扒手集團，也在所不惜。只要讀過索忍尼辛的小說，也就知道共產主義所推崇的平等理想，最後培養出的是殘虐的暴君，意圖掌握人民生活的所有層面，限縮人身自由。


    就算到了現代美國，政治還是不脫這種矛盾。民主黨人希望社會更加平等，就算為了協助老弱病殘必須增稅因應，也在所不惜。但這樣一來，豈不是違反了民眾自由支配收入的權利？如果我想把錢拿來供小孩讀大學，為什麼政府逼我非買健康保險不可？另一方面，共和黨人希望讓人人都享有最大的自由，就算會加大貧富差距、許多美國人將無力負擔健保，也在所不惜。但這樣一來，平等也就成為空談。'
  merge: -1
  pgno: 190
- img_proc: true
  md: '正如中世紀無法解決騎士精神和基督宗教的矛盾，現代社會也無法解決自由和平等的衝突。但這也不是什麼缺點。像這樣的矛盾，本來就是每個人類文化都無法避免的，甚至還可說是文化的引擎，為人類帶來創意、提供動力。就像兩個不諧和音，雖然礙耳，卻能引起我們注意，讓我們重新譜曲、使得樂曲更動聽；人類不同的想法、概念和價值觀，也能逼迫我們思考、批評、重新評價。一切要求一致，反而讓心靈呆滯。


    如果說每個文化都需要有些緊張、有點衝突、有無法解決的兩難，才能讓文化更加精采，那麼不管是身處在哪一種文化薰陶下的個人，腦中必然並存了互相衝突的信念，以及互相格格不入的價值觀。正因為這種情況實在太普遍，甚至還有個特定的名詞來形容：認知失調（cognitive
    dissonance）。一般認為，認知失調是人類心理上的一種問題，但這其實是一項重要的特性，如果人真的無法同時擁有互相牴觸的信念和價值觀，很可能所有的文化都將無從建立，也無以為繼。


    因此，若想深入探究某一種文化，例如，若想深入瞭解那些在清真寺裡祈禱的虔誠穆斯林的文化，該做的不是去研究所有穆斯林都同意的教條，反而應該看看在穆斯林文化裡有什麼難解的矛盾，看看有哪些規定根本是自打嘴巴。必須觀察到穆斯林自己都會感到左右為難的情境，你才能真正瞭解穆斯林的文化。


    # 用一種間諜衛星的高度


    人類文化一直流動不休。但這種流動究竟是完全隨機，或者其實有一個整體模式？換句話說，歷史有個大方向嗎？'
  merge: -1
  pgno: 191
- img_proc: true
  md: '答案是肯定的。幾千年來，我們看到規模小而簡單的各種文化逐漸融入較大、較複雜的文明中，於是世界上的大型文化數量逐漸減少，但規模及複雜程度遠勝昨日。當然這是從宏觀層面來看粗略說法，如果從微觀層面來看，每次有幾個文化融合成大型文化的時候，後來也可以看到大型文化的破碎解離。就像蒙古帝國，雖然曾經雄霸亞洲、甚至還征服了部分歐洲，但最後還是分崩離析。又像基督宗教，雖然信眾數以億計，但也分裂成無數教派。拉丁文也是如此，雖然一度流通中西歐，最後還是轉化成各種當地的方言，演化出各國的國語。然而，合久必分只是一時，分久必合才是不變的大趨勢。


    想觀察歷史的方向，重點在於要用哪種高度。如果是普通的鳥瞰高度，看著幾十年或幾世紀的發展走向，可能還很難判斷歷史趨勢究竟是分是合。要看更長期的整體趨勢，鳥瞰的高度便有不足，必須拉高到類似太空間諜衛星的高度，看的不是幾世紀，而是幾千年的時間跨度。這種高度能夠讓我們一目瞭然，知道歷史趨勢就是走向分久必合。至於前面基督宗教分裂或蒙古帝國崩潰的例子，就像是歷史大道上的小小顛簸罷了。


    # 天下大势，分久必合


    想要清楚看到歷史的大方向，最佳的辦法就是數數看不同時期地球上究竟有多少種同時共存的文化。我們現在常認為，整個地球就是一個單位，但在歷史上的大多數時間，地球其實像是星系，各個人類文明各自構成不同的星球。


    讓我們以澳洲南方的塔斯馬尼亞島為例，這是一個中等大小'
  merge: -1
  pgno: 192
- img_proc: true
  md: '的島嶼，原本和澳洲大陸相連，但大約在一萬年前，冰河期結束、海平面上升，於是它也成了島嶼。當時，數千名狩獵採集者就這樣留在島上，與其他人類都斷了連結。一直到十九世紀歐洲人抵達之前，有一萬兩千年的時間，沒有其他人類知道塔斯馬尼亞人存在，塔斯馬尼亞人也不知道外面有其他人類。島上的人自己有自己的戰爭，有自己的政治衝突，也有自己的文化發展。然而，如果你是當時中國的皇帝或美索不達米亞的統治者，對你來說，塔斯馬尼亞的概念其實就像是木星；總之，就是另外一個世界。


    美洲和亞洲也是如此，長久以來兩個世界對彼此毫無所悉。譬如在西元前四到三世紀左右，中國處於戰國時代，群雄爭霸；而同時期在中美洲，也有各個不同的馬雅文明互相競逐。然而這兩邊的爭鬥卻是完完全全毫不相干。對這些人來說，亞洲和美洲的分別，就像火星和金星一樣。


    地球上，到底曾經有多少不同的人類文明共存？大約在西元前10000年，地球上有數千個人類文明。但到了西元前2000年，這個數字已經只剩下數百，最多也只有上千個。至於到了西元1450年，這個數字更是急遽下降。當時即將進入歐洲探險時代，地球上仍然有許多像是塔斯馬尼亞這樣獨立的「小世界」，但將近九成的人類都已經緊密相連了，活在由亞洲和非洲組成的亞非世界（Afro-Asian
    World）裡。當時，絕大部分的歐亞非（包括撒哈拉沙漠以南的一大片地區）已經有了緊密的文化、政治和經濟連結。


    至於全球剩下的其他大約一成人口，大致上還能夠分成四個具有相當規模和複雜程度的世界：


    +   1. 中美洲世界：涵蓋大部分中美和部分北美。

    2. 安地斯世界：涵蓋大部分南美西部。'
  merge: -1
  pgno: 193
- img_proc: true
  md: '+   3. 澳洲世界：涵蓋澳洲大陸。

    4. 大洋洲世界：涵蓋大部分太平洋西南的島嶼，從夏威夷到紐西蘭。


    ![](img/b523907992e2c573126c18fe166aa89d_194_0.png)


    地圖3：西元1450年的地球。


    亞非世界裡提到的地點，都是穆斯林旅行家白圖泰（Ibn Battuta）曾經到訪的地方。他出生於摩洛哥的丹吉爾（Tangier），曾前往西非的廷巴克圖（Timbuktu）、東非的桑吉巴（Zanzibar）、南俄羅斯、中亞、印度、中國和印尼。他所行經的各地，正是即將跨入現代、由亞洲和非洲所組成的世界。


    接下來三百年間，巨大的亞非世界吞噬了所有其他世界。首先在1521年，西班牙征服了阿茲特克帝國，兼併了中美洲世界。同一時期，麥哲倫的環球航行開始染指大洋洲世界，不久便徹底征服。1532年西班牙征服者打倒印加帝國，於是安地斯世界也不復存在。1606年歐洲人首次登上澳洲大陸，而等到1788年英國殖民開始，這'
  merge: -1
  pgno: 194
- img_proc: true
  md: '個質樸的世界也宣告終結。十五年後，英國人在塔斯馬尼亞島上設了第一個殖民地，於是最後一個原本獨立的人類「小世界」，也就此併入了亞非的影響圈。


    確實，亞非世界這個巨人，花了幾百年才慢慢消化它吞下的所有世界，但這個過程已經永遠無法回頭。今天，幾乎所有人類都接受同一套地緣政治體系（整個地球劃分為國際公認的近兩百個國家），使用同樣的經濟制度（就算是地球上最偏遠的角落，也受到資本主義市場的形塑），採用一樣的法律制度（至少在理論上，人權和國際法放諸四海皆準），也接受同樣的科學體系（不管在伊朗、以色列、澳洲或阿根廷，專家對於原子結構或肺結核療法的意見都會相同）。


    然而，全球文化雖然單一，卻非同質。就像是單一的生物有許多不同的器官和細胞，單一的全球文化也包含許多不同類型的人和生活方式，既有紐約的股票經紀人、也有阿富汗的牧羊人。但不論如何，他們彼此都是密切相關，而且會以許多不同方式相互影響。雖然會有各種爭鬥，但他們爭辯用的是同一套概念，戰鬥用的是同一套武器。嚴格來說，真正的「文明衝突」其實是「聾子式的對話」（dialogue
    of the deaf），也就是雙方都不知道對方在講什麼。而像今天，伊朗和美國雖然針鋒相對、劍拔弩張，但他們講的都是民族國家、資本主義經濟、國際權利、以及核物理學這套語言。


    我們也常說有某些文化比較「純正」，但如果所謂「純正」指的是從頭到尾的發展都從未有外界干擾、只有當地最古老的傳統，那麼全球早已沒有純正的文化。在過去幾世紀中，全球化浪潮翻騰洶湧，幾乎讓所有文化全部改頭換面，再也難窺原貌。


    全球化最有趣的一個例子，是可代表各國的風味餐。在義大利'
  merge: -1
  pgno: 195
- img_proc: true
  md: '餐廳，似乎就該看到番茄義大利麵；在波蘭和愛爾蘭餐廳裡，就該有很多馬鈴薯；在阿根廷餐廳，就該有幾十種牛排可以選；在印度餐廳，就該什麼都要加辣椒；在瑞士咖啡館裡，就該有熱巧克力、上面蓋著像阿爾卑斯山一樣高的打發奶油。


    只不過，上述食物沒有一項的原產地在這些國家。番茄、辣椒和可可的原產地都在墨西哥，是西班牙人征服墨西哥之後才傳到亞非。至於羅馬帝國的凱撒大帝和義大利詩人但丁，也從來沒用叉子捲起番茄義大利麵（當時甚至連叉子也還沒發明！）。瑞士農民英雄威廉泰爾，從來沒吃過巧克力。印度的佛陀也未曾在食物裡加過辣椒。馬鈴薯一直要到四百年前，才傳到波蘭和愛爾蘭。在1492年，阿根廷完全沒有牛排，只有駱馬排。


    好萊塢電影裡，平原印地安人總是英勇騎著馬，衝向歐洲人的蓬車，大無畏的守護祖靈的傳統。然而，騎著馬的美國原住民可不是什麼純正古老的傳統形象，是在十七、十八世紀，歐洲馬傳到了北美之後，才讓整個北美平原的軍事和政治起了翻天覆地的變化。1492年，美洲還沒有馬。雖然蘇族和阿帕契人在十九世紀有許多看來威風八面的特色，但這其實是現代文明、全球化的產物，說不上什麼「純正」。


    # 全球視野


    從實際觀點，全球融合最關鍵的階段就是過去這幾個世紀。各大帝國成長、全球貿易強化，亞洲、非洲、歐洲、美洲、澳洲和大洋洲的人類形成緊密連結，於是印度菜裡出現了墨西哥的辣椒，阿根廷的草原上漫步著來自西班牙的牛。但從意識型態觀點，西元前'
  merge: -1
  pgno: 196
- img_proc: true
  md: '的一千年間慢慢發展出「世界一家」的觀念，這點的重要性也絕對不遑多讓。在這之前的數千年間，歷史確實是朝向全球融合統一的方向慢慢邁進，但對大部分人來說，還是難以想像世界一家、全球為一的概念。


    智人從認知革命之後，懂得區分「我們」和「他們」。自己身邊的這群人就是「我們」，而所有其他人就是「他們」。事實上，世界上沒有什麼社會性動物會在意所屬物種的整體權益。沒有哪隻黑猩猩在意整體黑猩猩物種的權益，沒有哪隻蝸牛會為了全球蝸牛社群舉起一隻觸角，沒有哪隻獅群首领会說要成為全球的獅子王，也沒有哪個蜂窩會貼標語寫道：「全球的工蜂站起來！」


    但是在認知革命開始後，智人在這方面就和其他動物大不相同了。與完全陌生的人合作，成了家常便飯，而且還可能覺得這些人就像是「兄弟」或是「朋友」。只不過，這種兄弟情也有限度。可能只要過了隔壁山谷、或是出了這座山，外面的人就還是「他們」。大約在西元前3000年，美尼斯（Menes）統一埃及，成了第一位法老王。對埃及人而言，「埃及」有明確的邊界，外面都是些奇怪、危險、不值得注意的「野蠻人」，大不了就是擁有一些土地或自然資源（前提是埃及人想要，否則也不算資源）。然而，所有這些想像出的邊界，其實都是把全人類的一大部分排除在外。


    # 三種全球秩序


    西元前的一千年間，出現了三種有可能達到全球一家概念的秩序。一旦相信了這些秩序，就有可能相信全球的人類都屬於同一個大團體、都由同一套規則管轄，讓所有人類都成了「我們」（至少'
  merge: -1
  pgno: 197
- img_proc: true
  md: '有這個可能），「他們」也就不復存在。這三種全球秩序，首先第一種是經濟上的貨幣秩序，第二種是政治上的帝國秩序，而第三種則是宗教上的全球性教派，像是佛教、基督宗教和伊斯蘭教。


    商人、征服者和各教先知是最早跳出「我們」和「他們」這種二元區分的人。對商人來說，全球就是一個大市場，所有人都是潛在的客戶。他們想建立起的經濟秩序應該要全體適用，無處不在。對征服者來說，全球就是一個大帝國，所有人都可能成為自己的子民。對各教先知來說，全球就該只有一個真理，所有人都是潛在的信徒，所以他們也是試圖要建立起某種秩序，希望每個地方、每個人都能依循。


    在過去的三千年間，人類有愈來愈多雄心勃勃的計畫，想要實現這種世界一家的概念。接下來的三章之中，我們就要一一討論貨幣、帝國和全球宗教是如何傳播，又如何建立起全球一家的基礎。第一個要談的，就是史上最偉大的征服者；這位征服者極端包容異己，手段又靈活無比，讓人人都成了虔誠狂熱的信徒。這位征服者就是金錢！


    在這世界上，大家講到不同的神，就易有爭執，說到不同的王，也可能大打出手，但用起不同的錢，卻是有志一同（只要講定兌換比率即可）。例如賓拉登，他恨美國文化、恨美國宗教、恨美國政治，但用起美元倒是十分順手。


