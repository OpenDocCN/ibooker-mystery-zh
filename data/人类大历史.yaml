    在近代初期，中國、印度、穆斯林、美國原住民、玻里尼西亞人都還是對科學革命貢獻良多。像是穆斯林經濟學者的觀點，影響了亞當·斯密和馬克思；美國原住民有些獨步全球的醫療方式，後來也進入了英國的醫療研究；波里尼西亞人提供的資料，更是徹底改變了西方人類學。但在二十世紀中葉以前，唯一蒐集整理這些無數科學發現、從這過程中打造出各個科學學門的人，就是歐洲各帝'
