  md: '一項演化上、甚至是宇宙間的壯舉。在過去四十億年地球生命演化期間，沒有任何生物能夠離開大氣層，更不用談要在月球上留下手印或足跡了。


    在地球上，微生物占了全部生物大約99.99%，但人類要到非常晚近，才對微生物有所認識。這並不是因為微生物與我們無關，相反的，我們每個人身上都有數十億個單細胞生物，而且還不只是搭搭便車的關係。微生物可說是我們最好的朋友、也常是最致命的敵人。有些微生物可以幫助消化、清理腸道，而有些則會造成感染、導致疾病。一直要到1674年，才有人第一次真正看見了微生物。當時，荷蘭商人雷文霍克（Anton
    van Leeuwenhoek）自製了一臺顯微鏡，用來觀察一滴水，看到裡面有許多小生物動個不停，讓他大吃一驚。在隨後的三百年間，人類才開始認識了許許多多微生物的物種。時至今日，我們已經能夠治療大多數由微生物造成的致命傳染病，也能夠將微生物用於醫療和產業用途，譬如我們可以用細菌來製藥、生產生物燃料，或是殺死寄生蟲。


