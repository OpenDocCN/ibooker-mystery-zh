  md: '# 走向精確科學


    少了1英鎊！這可是比所有宗教先知的預言都準確太多了。時至今日，他們的基金簡稱為「蘇格蘭遺孀基金」（Scottish Widows），是全球最大的退休金和保險公司之一，總資產高達1,000億英鎊。現在任何人都能夠購買該公司的保單，而不是只保障蘇格蘭的遺孀。74


    這兩位蘇格蘭神職人員所用的機率計算，後來不僅成了精算學的基礎（這是退休金和保險業務的核心），也成了人口統計學的重要概念（人口統計學則是由聖公會的牧師、提出《人口論》的馬爾薩斯所建立）。接著，人口統計學又成了達爾文（他也差點成了英國聖公會的牧師）建立演化論的基礎。雖然沒有公式能夠預測某種條件下什麼樣的生物可能演化，但遺傳學家還是能夠利用機率計算，瞭解某個特定族群產生特定突變的可能性。


    這樣的機率模型已經成了經濟學、社會學、心理學、政治學和其他社會科學及自然科學的基礎。就算是物理學，以牛頓為代表的古典力學在解釋電子的運動狀態時，也是力有未逮，必須以量子力學的「機率雲」概念來說明。


    只要看看教育的歷史，就能知道數學和統計學的進展對人類有多大的影響。一直以來，數學就是一門深奧的學問，就算是知識份子也很少真的全心投入。在中世紀的歐洲，教育的核心是邏輯、語法、修辭，而數學教育通常就只是簡單的算術和幾何學。沒有人研究統計學這件事。而神學無疑是所有學科中的王道。


    但到了今天，修辭學乏人問津，邏輯只剩哲學系繼續捧場，神學只剩神學院大力支持。但有愈來愈多的學生有興趣、或是被迫得'
