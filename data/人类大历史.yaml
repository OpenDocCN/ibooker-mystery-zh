    即便如此，要將熱能轉化為動能的想法，仍然太過天馬行空，所以要再等三個世紀，人類才發明了下一種使用熱能來移動物品的機器。這項新科技是在英國煤礦坑裡誕生。隨著英國人口膨脹，森林遭到砍伐，一方面是取得木柴做為燃料推動經濟成長，一方面也是為了要有居住地和農業用地。於是，英國逐漸面臨木柴短缺的問題，開始燒煤做為替代品。許多煤礦層都位於會淹水的地區，而且只要淹水，礦工就到不了較低的礦層。


    這個問題必須解決。大約在1700年左右，英國的礦井裡開始迴盪著一種奇特的噪音，可說是吹起了工業革命進擊的號角，一開始只是微微在遠方響起，但十年十年過去，聲音也愈趨雄壯，直到最後，整個世界都籠罩在震耳欲聾的聲響之中。這就是蒸汽機。


    蒸汽機種類繁多，但都有一個共同的原理：燃燒某種燃料，例如煤，再用產生的熱將水煮沸，產生蒸汽；接著蒸汽推動活塞，讓活塞來回移動，而連接到活塞的任何機械裝置也就跟著移動。這麼一來，熱能便轉換為動能了！在十八世紀的英國煤礦坑裡，是將活塞連接到幫浦，好把礦井底部的水給抽出來。最早的引擎效率低到難以想像。光是想抽出一點點的水，就得燒掉極大量的煤。然而，當時礦煤充足、又近在咫尺，倒是沒人在意。


    隨後的幾十年間，英國人改善了蒸汽機的效率，還把它請出了礦坑，用在紡織機和軋棉機上。紡織生產彷彿脫胎換骨，開始廉價生產愈來愈大量的紡織品。轉眼之間，英國就取得了世界工廠的地位。但更重要的是，把蒸汽機請出礦坑，可說是打破了一項重要的心理關卡。如果燒煤能夠讓紡織機動起來，為什麼不能讓其他的設備，像是車輛，也這麼動起來？'
