  md: '有一絲猶豫。就像是科幻小說裡外星人走出太空船一樣，他向那些驚呆的當地人宣告說：「我們是為了和平而來。帶我們去見你們的首領。」科爾特斯說自己是西班牙偉大國王的和平使者，希望能和阿茲特克的統治者蒙提祖馬二世（Montezuma
    II）進行外交對談。（這是一個無恥的謊言。科爾特斯所率領的，是由一群貪婪的冒險家組成的獨立探險隊。西班牙國王根本沒聽說過科爾特斯，也沒聽說過阿茲特克人。）


    從當地與阿茲特克人敵對的部落，科爾特斯得到了嚮導、食物和一些軍事援助，接著他就大搖大擺，走向阿茲特克的首都：繁華熱鬧的特諾奇蒂特蘭（Tenochtitlan）。


    阿茲特克人就這樣，讓這群外來者一路來到首都，還恭恭敬敬的引導他們去見皇帝蒙提祖馬二世。謁見到中途，科爾特斯一聲令下，配備鐵製武器的西班牙人殺光了蒙提祖馬二世的守衛（他們畢竟只配有木棍和石刀）。原本的嘉賓，就這樣讓主人成了階下囚。


    這時，科爾特斯的處境十分微妙。雖然皇帝在他手上，但他位於一處幾乎一無所知的大陸，還被幾萬個憤怒的戰士、幾百萬個與他敵對的平民團團包圍。他能夠依賴的只有幾百名西班牙手下，另外最接近的西班牙援軍在古巴，足足有1,500公里之遙。


    科爾特斯將蒙提祖馬二世囚在宮中，安排得似乎皇帝仍然可自由活動，掌管一切，而他這位「西班牙大使」就是客人。因為阿茲特克帝國屬於權力極度集中的政體，這種前所未有的局面讓整個帝國陷入癱瘓。表面上看來，蒙提祖馬二世仍然統治著帝國，阿茲特克人貴族菁英也繼續聽他號令，但其實就是科爾特斯挾天子以令諸侯。這種情況為期數個月之久，而在這段時間，科爾特斯一面審問蒙提祖馬二世和他的侍從，一面訓練各種當地語言的翻譯員，還向'
