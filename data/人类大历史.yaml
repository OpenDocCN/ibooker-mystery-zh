    # 5. 寶獅的獅子商標


    事實上，寶獅公司只是我們的一個集體想像，這種想像在法律上稱為法律擬制（legal fiction）。像是公司，它不是一個實體物件，我們沒辦法明確指著它。公司是以一種合法個體（legal
    entity）的方式存在。這種合法個體就像你我，會受到所在國家法律的管轄，可以開立銀行帳戶、擁有自己的財產，要納稅，也可能獨立於所有股東或員工之外而遭到起訴。


    寶獅屬於法律擬制的「有限（責任）公司」。而在這些公司背後的概念，可說是人類一項巧妙無比的發明。在這之前，智人雖然已存在許久，卻一直沒想到這件事。歷史上大多數時候，必須是一個有血有肉、有兩條腿、還有個大腦的人類，才能擁有財產。


    假設在十三世紀有個法國人尚恩，開了一間馬車製造工作室，那麼他本人就是工作室。如果他賣的馬車才跑了一個星期就壞了，買家心情不好，告的就是尚恩本人。而如果尚恩當初是借了1,000金幣成立工作室，如今挨告、店倒了，他還得要賣掉自己的財產（包括他的房子、他的牛、還有他的土地等等），以償還貸款；甚至孩子都可能會被賣去當奴隸。如果這樣還不足以償還債務，就有'
