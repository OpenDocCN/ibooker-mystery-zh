  md: '碎片！人在家中坐，也要擔心飛機從天上掉下來！像這些理論上可以達到長生的人，很有可能一丁點風險也不願意承擔，時時刻刻活得戒慎恐懼；而且一旦真的失去愛人、子女或密友，他們感受到的痛苦更會高到難以想像。


    # 快樂有天生的「空調系統」


    研究快樂的時候，社會科學家做的是發問卷調查主觀幸福感，再將結果與財富和政治自由等社經因素結合。至於生物學家的做法雖然也用一樣的問卷，但結合的是生化和遺傳因素。他們得出的研究結果令人大感震驚。


    生物學家認為，我們的心理和情感世界，其實是由經過數百萬年演化的生化機制所形塑。所有的心理狀態（包括主觀幸福感）並不是由外在因素（例如工資、社會關係或政治權利）來決定，而是由神經、神經元、突觸和各種生化物質（例如血清素、多巴胺和催產素）構成的複雜系統而定。


    所以，不管是中了樂透、買了房子、升官發財，或是找到了真正的愛情，都不是真正讓我們快樂的原因。我們能夠快樂的唯一原因，就是身體內發出快感的感官感受。所以，那些剛中了樂透、剛找到真愛的人，之所以會快樂得跳了起來，並不是因為真的對金錢或情人有所反應，而是因為血液中開始流過各種激素，腦中也開始閃現著小小的電流。


    但很遺憾，雖然我們總是想在人間創造出快樂的天堂，可是人體的內部生化系統似乎就是對快樂多所限制，只會維持在恆定的水準。快樂這件事並不是天擇的揀選標的，因為，如果你是快樂的獨'
