  md: '死於戰爭，而有56.9萬人死於暴力犯罪，也就是總共74.1萬人死於人類暴力。相較之下，該年自殺的人數就有87.3萬。108


    所以我們看到，在911恐怖攻擊後的一年，雖然恐怖主義和戰爭喊得震天價響，但說到某個人被恐怖份子、士兵或毒販刺殺的可能，其實還比不上他自殺。


    在全球大多數地方，我們晚上入眠時，都不用擔心附近的部落會不會包圍自己的村莊，來一場全村大屠殺。現在的英國有錢人就算每天走過羅賓漢的舍伍德森林，也不用擔心會有人埋伏搶錢，再把搶來的錢分給窮人（或者更可能直接收進口袋）。學生不再需要擔心師長棍棒齊飛，孩子不再需要煩惱可能被販為奴，女性也知道丈夫不得家暴、或強迫她們待在家裡。在全球愈來愈多地方，這些期待都已經成為事實。


    暴力發生率下降，主要是因為國家制度的崛起。縱觀歷史，大多數的暴力事件是出於家族之間或社群之間的仇恨。（就算在今天，上述數據也能看出地方犯罪遠比國際戰爭更為致命。）我們前面已經提到，在早期農業社會裡，農民唯一知道的政治組織就是自己的社群，但他們受到的暴力對待層出不窮。109
    要等到王國和帝國的力量的增強之後，才開始對社群有了約束力，而使暴力程度下降。在中世紀歐洲各自獨立的王國裡，每10萬人遭到凶殺的人數，大約已降低到每年20人至40人之間。而近幾十年來，國家和市場大權在握，地方社群可說消失殆盡，暴力事件發生率也是進一步下降。全球現在，每年每10萬人遭到凶殺的人數只有大約9人，而且多半是發生在國家權力不彰的地方，像是索馬里亞和哥倫比亞。至於歐洲這些權力集中的國家，平均每年每10萬人只會有1人死於凶殺命案。110'
