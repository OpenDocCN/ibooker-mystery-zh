  md: '# 歷史上第一個文本


    文字是透過實體符號來儲存資訊的方式。蘇美文字系統的做法是結合了兩種類型的符號，刻印在黏土泥板上。第一種符號代表的是數字，分別有符號可以表達1、10、60、600、3,600以及36,000。（蘇美人的數字系統分別以6和10做為基數。即使到現在，我們的生活中還是處處可見以6為基數的數字系統，例如一個圓有360度、一天有24小時）。另一類型的符號則代表人、動物、商品、領土、日期等等。結合這兩種符號，蘇美人能夠記下的資料量，就能夠遠勝於任何大腦的容量、或任何DNA所含的遺傳密碼。


    在早期，文字只用來記錄事實和數字。就算蘇美人當時真的有過小說，也從來不曾刻印到泥板上。畢竟，當時要寫下文字不僅耗時，而且能閱讀的群眾也太少，所以除了必要的記錄之外，實在沒有書寫的必要。如果我們想知道人類的祖先在五千年前，是不是寫下了什麼智慧的話語，很可能會非常失望。舉例來說，目前找到人類祖先最早留給我們的訊息是「29,086單位大麥37個月庫辛」。這句話最有可能的解讀是：「在37個月間，總共收到29,086個單位的大麥。由庫辛簽核。」


    很遺憾，人類史上的第一個文本，不但不是哲學巧思、不是詩歌、不是傳奇、不是法律，甚至也不是對王室歌功頌德，而是無聊至極的流水帳，記錄了各種稅務、債務，以及財產的所有權。


    除此之外，遠古時代只有另一個其他類型的文本倖存，而且甚至比那塊泥板更無趣：就只是一堆單詞，由當時的文士一再重複抄寫，做為練習。其實，就算當時的學生已經抄帳單抄到深感無'
  merge: -1
