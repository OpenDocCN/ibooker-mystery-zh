  md: '幾近發瘋。最後終於氣力用盡，癱坐在海灘上，讓海浪就這樣自由來去。忽然發現，這樣多麼平靜啊！


    這種想法對於現代自由主義的文化來說，完全格格不入，所以等到西方的新世紀運動碰上佛教教義，就想用自由主義的方式加以解釋，結果意思卻是完全相反。新世紀教派常常主張：「快樂不在於外在條件，而只在於我們內心的感受。我們應該別再追求像是財富、地位之類的外在成就，而是要多接觸自己內心的情感。」或者說得簡單一點，就是「快樂來自內心」。這與生物學家的說法不謀而合，但與佛教的說法幾乎是背道而馳。


    佛教與現代生物學和新世紀運動的相同點，在於都認定快樂與外在條件無關。但佛教更重要、也更深刻的見解在於：真正的快樂也與我們的主觀感受無關。我們如果愈強調主觀感受，反而就愈感到苦。佛教給我們的建議是，除了別再追求外在成就之外，同時也別再追求那些自我感覺良好的心裡感受了。


    # 人類是否瞭解自己？


    總結來說，我們現在會使用主觀幸福感問卷，希望找出來我們主觀認定什麼時候有幸福感，而且認為找到特定的情緒狀態就是找到了快樂。但相反的，許多傳統哲學和宗教（如佛教）則認為，快樂的關鍵在於追求真我、真正瞭解自己。大多數人都以為自己的感覺、想法、好惡就組成了自己，但這是一大錯誤。他們感覺憤怒的時候，心裡想「我很生氣，這是我的憤怒。」於是這一輩子做的，都是想要避開某些感受，貪求另外某些感受。但是他們從來沒有發現，苦真正的來源不在於感受本身，而是對感受的不斷貪求。'
