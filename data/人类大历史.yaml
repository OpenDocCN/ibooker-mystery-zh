- img_proc: true
  md: '官認為，這黑人一定是瘋了，才覺得自己能進得了密西西比大學。


    對於當時的美國南方人（和許多北方人）來說，想到黑人男性居然可能和白人女性有性行為、甚至結婚，實在是萬萬難以接受的事。跨種族的性行為是所有禁忌之首，一旦做出這種行為、甚至只是涉嫌想要有這種行為，不用經過什麼審判，就會立刻遭到私刑處置。當時出現了白人至上主義的祕密社團「三K黨」，就曾犯下多起殘殺黑人的事件。講到維護潔淨這件事，他們可真是讓印度教的婆羅門相形見絀。


    隨著時間過去，種族主義還蔓延到愈來愈多的文化領域。例如美國的審美觀就是以白人的美麗做為標準，白人的特質就是美麗的標竿，例如淺色皮膚、金黃的直髮、小而翹的鼻子等等。至於典型的黑人特質，例如黝黑的皮膚、蓬鬆的黑髮、扁平的鼻子，則被視為醜陋。這些成見使得原本就由想像建構出來的階級意識，更是進到意識深層，揮之不去。


    這樣的惡性循環可能持續幾百年、甚至幾千年，讓原本只是歷史偶發事件形成的階級制度，變得根深柢固。不公不義的歧視常常是愈來愈加劇，而不是改善。於是，富者愈富，而貧者愈貧。教育帶來進一步的教育，而無知只會造成進一步的無知。歷史上過往的受害者，很可能會再次受害。歷史上過往的特權份子，他們的特權也很可能依然存在。


    大多數社會、政治階級制度，其實都沒有邏輯或生物學的理由基礎；僅僅是由歷史的偶然事件引起，再套用虛構的故事延續壯大罷了。這正是歷史值得研究的一個很好理由。如果黑人／白人、或婆羅門／首陀羅的區別，真有生物學事實根據（例如婆羅門的大腦確實比首陀羅的大腦效率高），光靠生物學就應該足以研究人類社'
  merge: -1
  pgno: 169
- img_proc: true
  md: '會的種種行為。然而事實證明，不同智人群體之間的生物差異，其實小到能夠忽略不計，所以單憑生物學就是無法解釋，印度社會和美國各種族的互動為何如此複雜。想瞭解這些現象，我們只能依賴研究事件本身、環境、權力關係，看看他們是怎樣將虛構的想像變成了殘酷（而且再真實不過）的社會結構。


    # 他和她


    不同的社會，想像出的階級制度也相當不同。像是現代美國人非常注意種族，但對中世紀的穆斯林來說，就無關緊要。在中世紀的印度，種姓是生死攸關的大事，但現代的歐洲根本毫不在意。只不過，有某一種階級制度卻是在所有已知的人類社會裡，都具有極高的重要性：性別的階級！世界各地的人，多會區分男女，而且至少在農業革命以降，幾乎世界各地都是男人占盡好處。


    甲骨文的歷史可以追溯到西元前1200年，可能是中國最早的文字，用來占卜。其中曾有一塊的卜辭寫著：「婦好娩，嘉？」（商王武丁的妻子，名叫婦好，即將臨盆，是否吉利？）而答覆是：「其惟丁娩，嘉；其惟庚娩，引吉。」（若在丁日分娩，那是吉日；若在庚日分娩，更是大吉之日。）然而卜辭最後的驗辭，語氣十分遺憾：「三旬又一日，甲寅娩，不嘉，惟女。」（三十一天之後，婦好在甲寅日分娩，不是吉日，只生出女孩。）48
    過了三千多年，共產中國制定了一胎化政策，而對於許多中國家庭來說，仍然覺得生下女兒是一種不幸。有些時候，父母還會刻意遺棄甚至殺害女嬰，希望能有機會再懷胎一次，看看能不能生出個兒子來。


    在許多社會中，婦女只是男人的財產，通常屬於她的父親、'
  merge: -1
