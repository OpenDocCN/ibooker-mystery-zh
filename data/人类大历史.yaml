  md: '人類大歷史


    (imagined community，另譯為「想像的共同體」)，納入的人數可能達到數百萬之譜，而且是專為國家或商業需求，量身打造的。所謂想像的社群，指的是雖然成員並不真正認識彼此，卻想像大家都是同一夥的。這樣的社群概念歷史悠久，並不是到了現代才乍然出現。數千年來，王國、帝國和教會，早就擔任了這種想像社群的角色。例如在古代中國，數千萬人都認為全國臣民就是一家人，而皇帝就是君父。在中世紀，數百萬虔誠的穆斯林也想像著：整個伊斯蘭社會就是一個家庭，彼此都是兄弟姊妹。


    然而縱觀歷史，這種想像的社群力量有限，比不上每個人身邊幾十個熟人所結合成的密切社群。密切社群能夠滿足成員的情感需求，而且對每個人的生存和福祉都至關重要。只不過，密切社群在過去兩世紀間迅速衰微，開始由想像社群填補這個情感上的空缺。


    現代所興起的兩大想像社群，就是民族和消費大眾。所謂民族是國家層級的想像社群；而所謂消費大眾，則是市場層級的想像社群。我們說這些社群屬於「想像」，是因為過去的村落社群都是成員彼此熟識，但現代不論民族或消費者，成員都不可能像過去一樣彼此熟悉。任何一個德國人，都不可能真正認識所謂德意志民族的八千萬人；歐洲共同市場的五億人口，也不可能都互相認識（歐洲共同市場後來發展成歐洲共同體，最後形成今日的歐盟）。


    消費主義和民族主義可說是夙夜匪懈，努力說服我們自己和其他數百萬人是一夥的，認為我們有共同的過去、共同的利益，以及共同的未來。這並不是謊言，而是一場想像。不論是民族或是消費大眾，其實和金錢、有限公司和人權相同，都是一種「互為主體性」（見第135頁）的現實，雖然只存在於我們的集體想像之中，但力量卻無比巨大。只要這幾百萬德國人相信有德意志民族存在、同


    406'
