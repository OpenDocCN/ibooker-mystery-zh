  md: '人類 大歷史


    這個主題也出現在現存最古老的神話裡：蘇美人的吉爾伽美什（Gilgamesh）神話。這則神話的主角是烏魯克（Uruk）的國王吉爾伽美什，他英勇善戰，無人能敵。有一天，他最好的朋友恩基杜過世，他坐在遺體旁陪著他許多天，直到看到朋友的鼻孔裡掉出了一隻蛆來。那一刻，吉爾伽美什感到極度驚恐，下定決心要設法戰勝死亡。他接著踏上旅程前往世界的盡頭，途中擊敗獅子、與蝎人作戰，還找到方法進到陰間。到了陰間，他打碎了幾個岩石巨人，遇見陰間的擺渡人烏夏納比，最後找到經歷巴比倫大洪水仍倖存的烏特納比西丁。然而，最後吉爾伽美什的努力仍告失敗，空手而歸。雖然一樣無法避免死亡，但是他增添了幾分智慧。吉爾伽美什體會到，從神創造人類的時候開始，死亡就是人類必然的命運，必須學會接受。


    如果是進步主義的信徒，就不會接受這種失敗主義的態度。對信奉科學的人而言，死亡絕非必然的命運，不過是科技問題罷了。人之所以會死，可不是什麼神的旨意，而是因為各種技術性問題，像是心臟病、癌症、感染。而每個技術性的問題，都可以找到技術性的解決方案。心律失常的時候，可以用起搏器加以刺激；末期心臟衰竭的病患，可以移植新的心臟。癌症肆虐的時候，可以用藥物或放射治療。細菌感染的時候，可以服用抗生素來解決。


    確實，現在我們還無法解決所有技術問題。然而，我們正在努力。現在所有最優秀的人才，可不是浪費時間為死亡賦予意義，而是忙著研究各種與疾病及老化相關的生理、荷爾蒙和基因。他們也在開發新的藥物、革命性的新療法以及各種人造器官，這都能讓人的壽命延長，甚至有一天終能擊敗死神。


    不久之前，不論是科學家或任何人，都還不敢把話說得如此大


    298'
