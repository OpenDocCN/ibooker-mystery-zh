  md: '# 第19章


    # 從此過著幸福快樂的日子


    在過去的五百年間，我們見證了一連串令人驚嘆的革命。地球在生態和歷史上，都已經整合成單一的領域。經濟呈現指數增長，今日人類所享有的財富，在過去只有可能出現在童話裡。而科學和工業革命也帶給我們超人類的力量，以及幾乎可說無限的能源。不僅社會秩序完全改變，政治、日常生活和人類心理也徹底改觀。


    只不過，我們真的更快樂了嗎？


    人類在過去五世紀間積蓄的財富，是不是真的讓我們找到了新的滿足感？有了取之不盡的能源之後，我們是不是也得到了用之不竭的快樂？如果我們往更久之前回顧，認知革命以來這動盪不安的七萬年間，世界是不是真的變得更好？到現在，阿姆斯壯的腳印還留在無風的月球上，而三萬年前也有個不知名的人，把手印留在雪維洞穴裡；這兩個不同時代的人，究竟誰比較快樂？如果後來的人並沒有比較快樂，我們又為什麼要發展農業、城市、文字、錢幣、帝國、科學和工業呢？


    歷史學家很少問這樣的問題。他們不去討論秦朝人是不是比先'
  merge: -1
  pgno: 424
- img_proc: true
  md: '前採集為生的人更快樂；伊斯蘭教興起後，埃及人是不是對生活更加滿意；也不討論歐洲帝國在非洲崩潰之後，數百萬非洲人的幸福受到什麼影響。


    # 人民真正幸福快樂嗎？


    然而，這些可說是最重要的歷史問題。目前大多數的意識型態和政治綱領，雖然都說要追求人類的幸福，但對於幸福快樂的真正來源為何，卻還是不明就裡。民族主義者會說政治自決能夠帶來快樂。共產主義者會說無產階級專政能夠帶來快樂。資本主義者說自由市場能夠創造經濟成長，能夠教導人自立自強、積極進取，所以能夠為最多人帶來最大的快樂。


    如果經過仔細研究，結果卻全盤推翻了這些人的假設，情況會如何？如果經濟成長和自立自強並不會讓人更快樂，又何必將資本主義奉為圭臬？如果研究顯示，大型帝國的屬民通常比獨立國家的公民更幸福，例如假設阿爾及利亞人被法國統治時比較快樂，那我們該怎麼辦？這樣一來，要怎樣評價去殖民化？民族自決的價值又該怎麼說？


    這些都還只是假設，但原因就是歷史學家至今還在迴避提出這些問題，更不用說什麼時候才會找出答案了。學者研究歷史，研究了每一個層面，包括政治、社會、經濟、性別、疾病、性、食物、服裝，卻很少有人提到這些現象究竟如何影響人類的幸福。這是我們在史識方面的最大空白之處。


    雖然很少有人提出對於快樂的長期歷史研究，但幾乎所有學者和大眾心中都多少有些模糊的定見。常有人認為，時間不斷進展，'
  merge: -1
  pgno: 425
- img_proc: true
  md: '人類的能力也不斷增加。一般來說，我們會運用能力來減輕痛苦、滿足願望，所以我們想必過得比中世紀的祖宗來得快樂，而他們又一定比石器時代的狩獵採集者來得開心。


    然而，這種進步論卻可能是有些問題的。正如我們所見，新的傾向、行為和技能不一定會讓生活過得更好。譬如人類在農業革命學會了農耕畜牧，提升了人類整體形塑環境的力量，但是對於許多個人而言，生活反而變得更為艱苦。農民的工作比起狩獵採集者更為繁重，不僅取得的食物種類變少、營養較不均衡，而且染上疾病與受到剝削的可能性都大增。同樣的，歐洲帝國開枝散葉，同時將各種概念、科技和農作物向四方傳播，還打開了商業的新道路，大大提升了人類整體的力量；但是對於數百萬的非洲人、美洲原住民和澳洲原住民來說，這幾乎完全算不上是好事。


    歷史一再證實，人類有了權力或能力就可能濫用，所以要說能力愈高就愈幸福，看來實在有些天真。


    有些反對進步論的人，就會站在完全相反的立場。他們認為人的能力和幸福之間正好是負相關。他們認為權力使人腐化，人類有了愈來愈多的能力之後，創造出來的是冷漠的機器世界，並不符合人類實際的需求。人類的演化，是讓我們的思想和身體符合狩獵採集生活。因此，無論是轉型成農業、或是後來再轉型到工業，都是讓我們墮入不自然的生活方式，讓我們無法完全實現基因中固有的傾向和本能，也就不可能滿足我們最深切的渴望。就算是都市中產階級，過著舒適的生活，生活中卻再也沒有什麼比得上狩獵採集者獵倒長毛象的那種興奮和純粹的快樂。每次出現新發明，只是讓我們與伊甸園又離得更遠。


    然而，如果認為每項發明都必然帶來陰影，似乎也流於武斷，'
