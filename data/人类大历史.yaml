  md: '![](img/b523907992e2c573126c18fe166aa89d_3_0.png)


    # 作者簡介


    # 哈拉瑞


    # Yuval Noah Harari


    任教於耶路撒冷希伯來大學歷史系，全球矚目的新銳歷史學家。


    1976 年出生於以色列海法，2002 年在牛津大學獲得博士學位。


    最初專研中世紀史和軍事史，發表了許多學術書籍和論文；


    現在專研世界史和宏觀的歷史進程，


    《人類大歷史》這本巨著就是最新的研究成果，


    2012 年以希伯來文出版，在以色列成為暢銷書，


    陸續翻譯成 23 種語文，代表全球主要文明國家都看重他的作品。


    最獨特的是，哈拉瑞給各國的版本都是量身訂做的，


    書中舉例盡可能選用當地熟悉的史實，


    顯示他用功之深，知識之淵博。而且，身為人文歷史學者，


    他也懂人類學、生態學、基因學等等硬科學，蹲馬步的功夫非常扎實。


    哈拉瑞的世界史講座系列影片，已放上 YouTube。


    目前他也在《應許之地》雜誌，定期撰寫專欄文章。


    # 譯者簡介


    # 林俊宏


    師範大學翻譯研究所碩士。


    喜好電影、音樂、閱讀、閒晃，覺得把話講清楚比什麼都重要。


    譯有《大數據》、《英語的秘密家譜》、《建築為何重要》、


    《如果房子會說話》、《大科學》、《群的智慧》等書。


    現就讀於師大譯研所博士班。


    責任編輯／林榮崧 封面暨版型設計／江儀玲


    圖片來源／© Andre Jabali | Anan Kaewkhammul | shutterstock.com'
