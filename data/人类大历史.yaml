  md: '人類 大歷史


    這種態度不也像是「深信進步論是真理」一樣嗎？或許，雖然我們與內心那個狩獵採集者愈來愈遙遠，但並不全然是壞事。舉例來說，在過去的兩個世紀裡，現代醫學讓兒童死亡率從33%降到5%以下。對於那些本來無法存活的孩童，或是他們的家人親友來說，難道這不是讓他們的幸福感大增了嗎？


    還有一種更微妙的立場，就是把歷史分成前後兩段來討論：在科學革命之前，能力還不一定能帶來幸福，中世紀的農民確實可能過得比狩獵採集者更為悲慘；然而在過去幾世紀間，人類已經學會更聰明的使用權力和能力。現代醫學的勝利只是其中一個例子，其他同樣震古鑠今的成就，還包括讓暴力事件大幅降低、大型國際戰爭幾乎已經煙消雲散，而且大規模饑荒也幾乎不再發生。


    然而，這種說法其實也流於過度簡化。首先，這裡只根據了非常小的時間抽樣，就做出了樂觀的評估。事實上，大多數人類是到1850年才開始享受到現代醫學的果實，而且兒童死亡率急遽下降，也是二十世紀才出現的現象。至於大規模饑荒，直到二十世紀中葉都還是大問題。像是共產中國在1958年至1961年的大躍進，造成大約一千萬人到五千萬人餓死。大型國際戰爭也要到1945年以後，才變得罕見，而且一大原因還是核戰末日這項新威脅。因此，雖然說過過去幾十年似乎是人類前所未有的黃金年代，但想知道這究竟代表歷史潮流已經有了根本轉變，或只是曇花一現的美好，目前還言之過早。


    我們在評價歷史進程的時候，經常是以二十一世紀西方中產階級的觀點。但我們不該忘記，對於十九世紀在威爾斯的煤礦礦工、中國鴉片菸的癮君子、或是塔斯馬尼亞島的原住民，觀點必然是相當不同的。楚格尼尼（最後一位去世的塔斯馬尼亞島原住民）的重'
