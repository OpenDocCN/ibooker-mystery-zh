  md: '身隱士,你無法把快樂基因傳遞給後代;相對的,兩位整天焦慮的爸媽,卻能把不快樂的基因傳遞下去。快樂或痛苦在演化過程裡的角色,就只是配角、不是主角,只在於鼓勵或妨礙生存與繁衍。所以不難想像,人類演化的結果,就是不會太快樂、也不會太痛苦。我們會短暫感受到快感,但不會永遠持續。遲早快感會消退,讓我們再次能夠感受到痛苦。


    舉例來說,演化就把快感當成獎賞,鼓勵男性和女性發生性行為,將自己的基因傳下去。如果性交沒有高潮,大概很多男性就不會那麼熱中。但同時,演化也確保高潮要來得快、去得也快。如果性高潮永續不退,可以想像男性會非常開心,但那會連覓食的動力都沒了,最後死於飢餓,而且也不會有興趣再去找下一位能夠繁衍後代的女性。


    有學者認為,人類的生化機制就像是恆溫空調系統,不管是嚴寒或酷暑,都要想辦法保持恆定。雖然遇到某些事件會讓溫度暫時有波動,但最後總是會調控回到原來設定的溫度。


    有些空調系統會設定在攝氏25度,有的會設定在攝氏20度。至於人類的快樂空調系統,也是人人的設定皆有不同。如果說快樂的程度是由1分到10分,有些人的生化機制天生開朗,就會允許自己的情緒在6分到10分之間來回,大約穩定在8分附近。像這樣的人,就算住在一座冷漠的大城市,碰上金融市場崩潰而喪失了所有積蓄,還被診斷患有糖尿病,還是能相當樂觀的活下去。


    也有些人就是倒楣有著天生陰鬱的生化機制,情緒在3分到7分之間來回,大約穩定在5分附近。像這樣的人,就算得到了密切社群的支持,中了幾千萬的樂透,健康得可以當奧運選手,還是會相當憂鬱悲觀。事實上,如果是這位天生憂鬱的朋友,就算她早上'
