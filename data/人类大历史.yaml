  md: '要衡量某一物種演化得成功與否，評斷標準就在於世界上其DNA雙螺旋的複本數量多寡。就像今天如果要說某間公司經營得成功與否，我們看的往往是該公司的市值有多少錢，而不是它的員工開不開心；而物種的演化成功與否，看的就是這個物種的DNA複本存在世界上的數量多寡。如果世界上不再有某物種的DNA複本，就代表該物種已經絕種，也等於公司沒有錢而宣告倒閉。如果某個物種還有很多個體，帶著它的DNA複本存活在這世上，就代表這個物種演化成功、欣欣向榮。從這種角度看來，1,000份DNA複本永遠都強過於100份。這正是農業革命真正的本質：讓更多的人、卻以更糟的狀況活下去。


    但是，身為個人，為什麼要理會這種演化問題？如果有人說，為了「增加智人基因組在世界上的複本數量」，希望你降低自己的生活水準，你會同意嗎？沒有人會同意這筆交易。簡單說來，農業革命就是一個陷阱。


    # 兒童死亡率一路飆升


    農業的興起並非一夜之間，而是歷時數千數百年的緩慢過程。過去，智人部落的生活就是採集蘑菇和堅果、獵捕野鹿和野兔，他們不可能一下就決定定居、不再搬遷，而開始耕田、種小麥、從河裡挑水。這種改變是分階段進行的，每次只是改變日常生活中的一小部分。


    在大約七萬年前，智人到達了中東。接下來的五萬年間，智人在那裡不需要什麼農業，也能順利繁衍。光是當地的天然資源，就足以養活這些人口。資源多的時候，孩子就多生幾個；資源少了，'
  merge: -1
  pgno: 103
- img_proc: true
  md: '就少生幾個。人類就像許多哺乳動物一樣，自然有荷爾蒙和遺傳機制來控制生育數。營養充足的時候，女性比較早進入青春期，成功懷孕的機率也比較高。而在土地貧瘠、營養不足的時候，女性進入青春期要來得晚，生育能力也下降。


    人口管制除了以上這些自然機制之外，還有文化機制。對於四處遷徙的採集者來說，嬰兒和幼童行動遲緩、需要額外照顧，會造成負擔。所以，當時每個子女至少會相隔三到四歲。而女性能控制這點的方式，靠的就是一天二十四小時都待在孩子旁邊照顧著，直到孩子大一點為止（畢竟沒多久就得哺乳一次，男人想來幹些什麼事也不太方便，於是可以大幅減少懷孕的機會）。至於其他方法，還包括完全禁慾或部分禁慾（有些部落還用文化禁忌來支持這種做法）、人工流產，偶爾還有殺嬰。26


    在這漫長的數千年間，人類偶爾會吃吃小麥，但絕非主食。而在大約一萬八千年前，最近的一個冰河期結束，全球氣候變暖。隨著氣溫上升，降雨也增多。在中東，這種新氣候非常適合小麥和其他穀物生長，於是這些作物也繁衍蓬勃。人類的小麥食用量開始增加，並且在不經意間助長了小麥的生長。當時採集到野生穀類，必須先篩一篩、磨一磨，煮過之後才能食用；正因如此，人類採集這些穀物之後，必須帶回他們居住的臨時地點來處理。小麥種籽粒小而多，在送回部落的途中，必然會有一些掉到地上。慢慢的，人類最常走的路徑附近、或是居住營地的周圍，也就長起了愈來愈多的小麥。


    甚至，人類放火燒毀森林和灌木叢的時候，等於也幫了小麥一把。大火清掉了喬木和灌木，於是小麥和其他草類就能獨占陽光、水和養份。在小麥生長特別茂盛的地方，獵物和其他食物來源也豐'
  merge: -1
  pgno: 104
- img_proc: true
  md: '人類大歷史


    富，於是人類部落逐漸能夠放棄四處流浪的生活方式，在某地住上一個季節，甚至就形成永久聚落。


    一開始，他們可能待上大約四個星期，來收成小麥。等到過了一個世代，小麥數量和面積大增，於是他們得待上五個星期，接著就是六個星期、七個星期……時間逐漸拉長，最後終於形成永久的村落。在整個中東地區，都能夠發現這種定居下來的證據，特別是在黎凡特（Levant，今日的敘利亞、黎巴嫩、以色列、約旦）一帶更是常見。從西元前12500年到9500年，黎凡特曾有過十分興盛的納圖芬（Natufian）文化，納圖芬人屬於狩獵採集者，以數十種野生物種維生，但永久定居在村落裡，大部分的時間都在辛勤採集、研磨各種野生穀物。他們會蓋起石造的房舍和穀倉，儲存糧食以備不時之需，還會發明新的工具，像是發明石鐮刀收割野生小麥，再發明石杵和石臼來加以研磨。


    而在西元前9500年之後，納圖芬人的後代除了繼續採集和研磨穀物，還開始以愈來愈精細的手法來培養種植。採集野生穀物的時候，他們會小心留下一部分，做為下一季播種之用。他們也發現，播種的時候如果把種子埋到地下，而不是隨便撒在地面，效果會好很多。於是，他們開始犁地整地，也一步步開始除草、防蟲、澆水、施肥。隨著愈來愈多的心力時間都用來種穀物，採集和狩獵的時間也就被擠壓。結果是，採集者逐漸變成了農民。


    然而，從採集野生小麥變成種植馴化的小麥之間，並沒有一個特定的分界點，所以很難斷定人類究竟是什麼時候進入農業時代。不過可以確定的是，到了西元前8500年，中東已經四處散布著像是耶律哥這種永久村落了，村民大部分的時間就是栽種培育少數幾種馴化後的植物。'
