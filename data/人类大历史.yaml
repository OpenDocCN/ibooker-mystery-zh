  md: '我們無從得知。最普遍相信的理論認為，因為某一些偶然的基因突變，改變了智人的大腦內部連結方式，讓他們以前所未有的方式來思考、用完全新式的語言來溝通。這次突變，幾乎就像是吃了《聖經》裡那棵知善惡樹的果實一樣。


    為什麼這只發生在智人的DNA、而沒有發生在尼安德塔人的DNA？我們現在只能說，這就是純粹的偶然。這裡比較重要的，並不是突變的原因，而是突變帶來的結果。智人的新語言究竟特別在哪，竟讓我們能夠征服世界？[1]


    智人的語言並不是世界上的第一種語言。每種動物都有著某種語言。就算是蜜蜂或螞蟻這些昆蟲，也有極精密複雜的溝通方式，能夠告知彼此食物所在。甚至，智人的語言也不能說是第一種有聲的語言。因為許多動物，包括所有的猿類和猴類，都會使用有聲語言。例如，綠猴（green
    monkey）就有各種不同的喊叫方式，傳達不同的訊息。像是動物學家已經確定，綠猴的某種叫聲代表著「小心！有老鷹！」而只要稍微調整，就會變成「小心！有獅子！」


    研究人員把第一種叫聲放給一群綠猴聽的時候，綠猴會立刻停下當時的動作，很恐懼的望向天空。而同一群綠猴聽到第二種叫聲（警告有獅子）的時候，牠們則是立刻衝到樹上。雖然說智人能發出的聲音種類比綠猴多，但鯨和大象也不遑多讓。


    愛因斯坦能說的聲音，鸚鵡都能說，而且鸚鵡還能模仿手機鈴聲、摔門聲、還有警笛的尖嘯聲。當然，愛因斯坦有很多地方比鸚鵡強得多，但不論如何，語言這點可是遠遠不及。那麼，究竟人類


    > [1] 在此及以下章節中，我們講到智人的語言，指的是智人基本的語言能力，而不是特指某種語言或方言。可以說，不論是英語、印度語或華語，都是智人語言的一種變種。顯然，就算是在認知革命剛發生的時候，不同的智人族群，講的就是不同的方言。'
