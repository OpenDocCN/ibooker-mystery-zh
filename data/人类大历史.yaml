- img_proc: true
  md: '所有宗教都能做到這點。某個宗教如果想要將幅員廣闊、族群各異的人類都收歸旗下，還必須具備另外兩種特質。首先，它信奉的超人類秩序必須普世皆同，不論時空而永恆為真。第二，它還必須堅定的鼓吹這種信念，試圖傳播給每一個人。換句話說，宗教必須同時具備「普世特質」和「鼓吹特質」。


    像是伊斯蘭教和佛教這些最為人知的宗教，就同時具備普世特質和鼓吹特質，但也常讓我們誤以為所有宗教都是如此。但其實，多數古代宗教反而是具備了「地方特質」與「封閉特質」，信眾只信奉當地的神靈，而且也沒有意願將信仰推己及人。據我們所知，要等到西元前一千年間，才開始出現具備普世特質和鼓吹特質的宗教。這可以說是史上最重要的革命之一，對於人類的融合有重大貢獻，絕不亞於帝國或金錢。


    # 讓羔羊變得沉默


    在過去以泛靈信仰（見第69頁）為主要信仰體系的時候，人類的規範和價值觀不能只想到自己，還必須考慮到其他動物、植物、精靈和鬼魂的想法和利益。像是在恆河流域的某個採集部落，可能會禁止砍倒某棵特別高大的無花果樹，以免無花果樹的樹神生氣報復。但是在印度河流域的另一個採集部落，可能會禁止獵捕白尾的狐狸，因為過去曾經有一隻白尾狐狸帶著部落的先知，發現了珍貴的黑曜石。


    像這樣的宗教往往單純以地方為考量，只著重當地的位置、氣候和現象。畢竟，多數採集部落畢生的活動範圍不會超過一千平方公里。為求生存，住在某個特定山谷裡的居民，需要瞭解的就是關'
  merge: -1
  pgno: 240
- img_proc: true
  md: '於這個山谷的超人類秩序，並因應調整自己的行為，當然也就沒有必要試著說服某些遙遠山谷裡的居民，來遵循相同的規則。譬如印度河部落的人，就絕不會派傳教士到恆河部落，去鼓吹別獵捕白尾狐狸。


    農業革命開始，宗教革命便隨之而來。狩獵採集者採集植物、獵捕動物，但認為動植物和人類擁有平等的地位。雖然人類獵殺綿羊，但並不代表綿羊就不如人類；就像是老虎獵殺人類，並不代表人類就不如老虎。所以，萬物眾生都是直接與彼此「溝通、協商」關於這個共同棲息地的種種規則。相較之下，農民是擁有、控制著農場上的動植物，可不會紆尊降貴，去和自己的財產「溝通、協商」。因此，農業革命最初的宗教意義，就是讓動植物從與人類平等的生物，變成了人類的所有物。


    然而，這又造成了一大難題。農民希望能對自己的羊有絕對的控制權，但他們也很清楚，自己的控制十分有限。雖然他們可以把羊圈起來、可以把公羊閹了、可以強迫羊的配種，但還是無法保證母羊能懷孕，無法保證母羊一定會生下健康的羔羊，也不能夠阻止致命流行病的爆發。


    那到底要怎麼樣，才能確保羊群繁衍壯大呢？講到「神」這種概念的起源，一種主要理論就認為，神之所以重要，正在於祂們可以解決這個重大問題。在人類不再認為可以和動植物直接溝通之後，就開始出現掌管生育、掌管氣候、掌管醫藥的各種神靈概念，好替人類和這些沉默的動植物溝通協商。很多古代神話其實就是一種法律契約，人類承諾要永遠崇敬某些神靈，換取人類對其他動植物的控制權，例如《聖經》創世記第1章，就是一個典型的例子。在農業革命幾千年後，宗教禮儀主要就是由人類將羔羊、酒、糕點'
  merge: -1
  pgno: 241
- img_proc: true
  md: '犧牲獻祭給神靈，換取神靈保佑五穀豐登、六畜興旺。


    一開始，農業革命對於泛靈信仰系統的其他成員（像是石神、水神、鬼魂和惡魔）幾乎沒什麼影響。然而，隨著人類喜新厭舊，這些神也逐漸失去地位。過去人類一輩子的生活範圍大概就是幾百平方公里，多數需求只要靠著當地的神靈就能解決。但隨著王國和貿易網開始擴展，單靠地方的神靈已經力有未逮，人類需要的神力必須涵蓋整個王國或整個貿易網。


    因應這種新需求，多神教（polytheism，源自希臘文：poly是多、theos是神）信仰便應運而生。這些宗教認為，世界是由一群神威浩蕩的神靈控制的，有的掌管生育、有的掌管雨水、有的掌管戰爭。人類向這些神靈祈禱，而神靈得到奉獻和犧牲酒醴之後，就可能賜予人類子嗣、雨水和勝利。


    多神教出現之後，泛靈信仰並未完全消失。幾乎所有的多神教都還是會有惡魔、精靈、鬼魂、聖石、聖泉、聖樹之類的神靈，雖然這些神靈的重要性遠不及那些重要的大神，但對於許多一般人民的世俗需求來說，祂們也還算實用。某個國王可能在首都獻上幾十隻肥美的羔羊，祈求打敗野蠻人，贏得勝利；但同時，某個農夫是在自己的小屋裡，點一根蠟燭，向某位無花果樹仙禱告，希望祂能治好兒子的病。


    然而，出現了大神之後，影響最大的不在於羔羊或惡魔，而在於智人的地位。對泛靈信仰者來說，人類只是地球上眾多生物的一種。但對多神教徒來說，整個世界就像是反映了神和人類的關係。人類的禱告、獻祭、罪孽和善行，就會決定整個生態系的命運。所以，光是因為幾個愚蠢的智人做了些讓神生氣的事，就可能引發大洪水，消滅了數十億的螞蟻、蝗蟲、烏龜、羚羊、長頸鹿和大象。'
  merge: -1
  pgno: 242
- img_proc: true
  md: '所以，多神教提高的除了神的地位，還有人的地位。至於遠古那些泛靈信仰的神靈，有些比較不幸的就失去了祂們的地位，在這場人神關係的大戲裡，成了臨時演員，甚至只是沉默的裝飾品。


    # 多神教很少迫害異教徒


    經過一神教（monotheism）為時兩千多年的洗腦，讓大多數西方人都認為，多神教就是些無知幼稚的偶像崇拜。但這是一個不公平的刻板印象。想瞭解多神教的內在邏輯，必須先瞭解這種同時信仰多位神靈的中心思想。


    多神教並不一定認為宇宙沒有單一的權柄或法則。大多數的多神教、甚至泛靈信仰，都還是認為有一個最高的權柄，高於所有其他神靈、惡魔，或是神聖的石頭公。在古希臘多神教的神話中，不管是天帝宙斯、天后希拉、太陽神阿波羅、或是祂們的同事，都還是得臣服於神威無窮、無所不在的命運女神（Moira
    或 Ananke）。北歐諸神也逃脫不了命運的掌握，最後在「諸神的黃昏」（Ragnarök）這場災難中滅亡。在西非約魯巴人（Yoruba）的多神信仰中，所有神靈都是至上神（Olodumare）所生，而且臣服於祂。印度教屬於多神教，但也是以「梵」這個宇宙的終極，主宰著無數神靈、人類，以及生物世界和物質世界。梵指的是整個宇宙、每個人或每個現象的永恆本質或靈魂。


    真正讓多神教與一神教不同的觀點，在於多神論認為：主宰世界的最高權力不帶有任何私心或偏見，因此對於人類各種世俗的欲望、擔心和憂慮毫不在意。所以啦，要向這個最高權力祈求戰爭勝利、健康或下雨，可說是完全沒有意義，因為從祂全知全觀的角度'
  merge: -1
  pgno: 243
- img_proc: true
  md: '來說，某個王國戰爭輸贏、某個城市興衰盛敗、又或是某個人的生老病死，根本不構成任何差別。希臘人不會浪費祭品去祭拜命運女神，而印度教徒也並未興建寺廟來祭拜梵。


    要接近這個宇宙至高的權力，就代表要放下所有的欲望，接受福禍共存的事實，坦然面對失敗、貧窮、疾病和死亡。因此，印度教徒有一種苦行僧，奉獻自己的生命，希望能與梵合而為一，達到「梵我一如」的境界。苦行僧以梵的觀點來看這個世界，認識到從永恆的角度來看，所有世俗的欲望和恐懼都如夢幻泡影。


    只不過，大多數的印度教徒都不是苦行僧，依然深深陷在世俗的考量之中，但這下梵就幫不上什麼忙了。講到這種問題，印度教徒還是得找那些專精某些領域的神才行。這些神只專精某些領域，而不是無所不包，所以有象頭神、財神和智慧神等等，但祂們都還是各有私心和偏見。這樣一來，人類就可以和這些神談談交易，靠祂們的幫助來贏得戰爭、打倒疾病。像這樣的低位神靈數量繁多，因為只要把全知全能、位階最高的權柄切分開來，可以想見，必會分出不只一位神靈。於是多神教於焉誕生。


    從多神教的概念向外推導，結果就是影響深遠的宗教寬容。一方面，多神教徒相信有一個至高無上、完全無私的神靈；但另一方面，多神教徒也相信有許多各有領域、心有偏見的神靈。所以對於某個神的信徒來說，很容易就相信有其他神靈存在，而且也相信其他神靈同樣神通廣大。多神教本質上就是心胸開放、包容異己，很少迫害異教徒。


    就算多神教征服了其他大帝國，也未曾要求屬民改變信仰。像是埃及人、羅馬人和阿茲特克人，都不曾派遣傳教士到異地鼓吹崇拜冥王歐西里斯、天帝朱彼特、或是太陽神維齊洛波奇特利（祂'
  merge: -1
  pgno: 244
- img_proc: true
  md: '是阿茲特克文明的主神），當然也就更不可能派軍隊前去鎮壓異教徒。帝國當然有自己的眾多守護神和宗教儀式，保護著帝國、維繫其正當性，所以帝國的屬民也應該要尊重這些神靈和儀式，只是無須放棄自己當地的神靈和儀式。


    以阿茲特克帝國為例，雖然屬民必須建造敬拜維齊洛波奇特利的神廟，但這些神廟是與崇拜地方神靈的神廟同時共存，而不是取而代之。很多時候，帝國菁英本身也會接受地方屬民的神靈和儀式。例如羅馬人，就讓來自亞洲的眾神之母希栢利（Cybele）和來自埃及的女神伊西斯（Isis），都進了他們的萬神殿。


    # 聖巴塞洛繆節慘案


    羅馬人唯一長期不願接受的，只有屬於一神信仰並堅持要傳福音的基督教。羅馬帝國並未要求基督徒放棄他們的信仰和儀式，只希望他們同時尊重帝國的守護神，並承認皇帝也有神性——這點可說是在政治上忠誠的聲明。然而，基督徒強烈拒絕，並且完全沒有任何妥協空間，這對於羅馬人來說，就是在政治上搞顛覆的舉動，必須加以鎮壓。


    但即使如此，這些鎮壓多半也只是表面形式。從基督被釘死在十字架上、到羅馬皇帝君士坦丁改信基督教，這三百多年間，羅馬皇帝所發起對基督徒的大型迫害，不過四次。至於地方長官和總督也曾經另外發起一些反基督教的暴力行為。


    事實證明，就算把這些迫害的所有受害者全部加總起來，在這三個世紀間，多神教羅馬處決基督徒的人數不超過幾千人。⁶⁴ 可是相對的，在接下來的一千五百年間，雖然基督教號稱主張愛與憐'
  merge: -1
  pgno: 245
- img_proc: true
  md: '憫，卻僅僅因為對信仰的詮釋有些差異，就引發基督徒自相殘殺，死亡人數達到數百萬。


    其中最惡名昭彰的，就是在十六、十七世紀間，席捲歐洲的天主教與新教徒之戰。所有這些人都相信基督的神性，也相信祂關於愛和憐憫的福音，只是對於愛的本質意見不合。新教徒認為，神如此愛著世人，所以讓自己化為肉體，容許自己受到折磨、釘死在十字架上，從而贖了原罪，並對那些信祂的人打開了天堂的大門。而天主教徒認為，雖然信仰是必要的，但光這樣還不夠，要進入天國，信徒還必須參加教堂禮拜，而且要多行善事。這點讓新教徒無法接受，認為這樣形同交易，對於神的愛和偉大是一種貶抑。如果進不進天堂必須取決於自己的善行，豈不是放大了自己的重要性，而且暗示基督在十字架上為人類受的苦、以及神對人類的愛都還不足夠？


    這些神學爭論愈演愈烈，天主教徒和新教徒彼此殺紅了眼，造成幾十萬人喪命。1572年8月23日，強調個人善行的法國天主教徒，襲擊了強調上帝之愛的法國新教徒。這場攻擊稱為聖巴塞洛繆節慘案（St.
    Bartholomew’s Day Massacre），短短二十四小時裡，就有五千到一萬個新教徒遭到屠殺。消息從法國傳到羅馬的天主教教宗國瑞十三世耳裡，叫他滿心歡喜，立刻安排舉行慶典，還委託畫家瓦薩里，在梵蒂岡的一個房間裡，將這場大屠殺繪成壁畫，以資紀念（目前這個房間禁止遊客參觀）。65


    不過才二十四小時，基督徒自相殘殺的人數，就已經超過了整個羅馬帝國曾經殺害的基督徒人數。'
