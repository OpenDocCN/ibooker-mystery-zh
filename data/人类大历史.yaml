  md: '以來，世界人口成長正處於前所未有的高峰。在1700年，全球有將近7億人。在1800年，只增加到9.5億人。但是到了1900年，人口翻漲將近一倍，來到16億。而到了2000年，更是又翻了兩番，來到60億。接著到了2012年10月底，已經堂堂邁過70億。


    # 格林威治標準時間


    雖然智人愈來愈不受大自然的擺布，但卻愈來愈受到現代產業和政府的支配。工業革命帶來許多社會改造的實驗性做法，而各種改變人類日常生活和心理的事件，更是多不勝數。其中一個例子，就是將過去傳統農業社會的時間節奏，替換成工業社會一致且精確的時間概念。


    傳統農業看的是大自然的時間週期、作物的生長情況。當時多數社會都無法準確測量時間，而且也對這件事沒有多大興趣。畢竟當時沒有手錶、沒有時刻表，重要的是太陽的運行、植物的生長週期。當時沒有人人統一的工作日，而且在不同季節的生活習慣也有極大不同。農業社會的人知道太陽該在天上哪個位置，會焦急的等待雨季和收穫季的徵兆，但是「小時」的概念就不在他們心裡，而「年份」的概念更是於他們如浮雲。如果有人穿越時空來到中世紀的村莊，問當地人「今年是哪一年？」，當地人除了會覺得這個人衣著古怪，可能還覺得，會問這個應該是腦筋有點問題。


    與中世紀農民和鞋匠相比，現代工業對太陽或季節可說是完全不在乎，更重視的是要追求精確和一致。舉例來說，在中世紀的鞋店裡，每個鞋匠都是從鞋底到鞋扣一手包辦。如果某個鞋匠上班遲到，完全不會影響到別人的工作。但如果是在現代的製鞋生產線，'
  merge: -1
  pgno: 398
- img_proc: true
  md: '每個工人面對的機器都只負責鞋子的一小部分，完成後再交給下一臺機器。假設其中某臺機器的工人睡過頭，整條生產線就得停擺。為了避免這種災難發生，每個人都得嚴格遵守確切共同的時刻表。每個工人在完全相同的時間開始上班。不管餓了沒，都要在同樣的時間午休吃飯。等到換班哨音一響，所有人都得下班回家，不管手上的事情做完了沒。


    工業革命不僅為人類帶來了時刻表和生產線的概念，更將這些概念推廣到幾乎所有的人類活動當中。就在工廠用時刻表規範勞工行為之後不久，學校也開始採用了這一套，接著醫院、政府機關，甚至雜貨店也行禮如儀。就算那些沒有生產線和機器的地方，時刻表也成了王道。畢竟，假設工廠是下午5點下班放人，當地的酒吧難道不是應該抓個5點02分開門營業最為恰當？


    這套時刻表系統的推廣，公共運輸是關鍵。如果工人得在8點整準時上工，火車或公車就一定得在7點55分抵達工廠大門。晚了幾分鐘，就可能使產量減少，甚至讓那些不幸遲到的人遭到裁員。在1784年，英國首次出現公布時刻表的馬車載運服務，只列出了幾點幾分出發，而沒有列出幾點幾分抵達。當時，英國每個大城小鎮都有不同的時間，與倫敦時間可能有半小時的落差。倫敦正午12點整的時候，可能在利物浦是12點20分，而在坎特伯里還只是11點50分。由於當時沒有電話、沒有收音機、沒有電視、也沒有特快列車，所以沒人知道這些時間不同。而且，又何必在意呢？105


    英國的第一條商業鐵路於1830年正式啟用，連結利物浦和曼徹斯特。十年後，終於首次公布火車時刻表。因為火車的速度比傳統馬車快上太多，所以各地時間的微小差異，就造成了巨大的困擾。1847年，英國各家火車業者齊聚一堂，研擬統一協定所有火車時刻'
