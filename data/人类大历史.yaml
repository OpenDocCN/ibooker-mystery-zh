    male）。首領出現時，其他黑猩猩無論公母都會低下頭、發出呼嚕聲，以展現服從；而這與人向皇帝叩首、高呼萬歲，倒也類似。首領會努力維持手下族群的社會和諧。兩隻黑猩猩吵架的時候，牠會介入，制止暴力。而沒那麼仁慈的一面在於：特別好的食物全部為牠所有，而且牠還會看管著，不讓階級太低的公猩猩與母猩猩交配。


