  md: '# 生命的意義


    1932年，正值經濟大蕭條的時代，赫胥黎出版了反烏托邦小說《美麗新世界》，書中將「快樂」當成最重要的價值，而且政治的基礎不是警方、不是選舉，而是精神病的藥物。每天，所有人都要服用一種合成藥物「蘇麻」（soma），這能讓他們感到快樂，而且不影響生產力和工作。在美麗的新世界裡，「世界國」統治全球，所有子民不論生活環境條件如何，都對這感到無比滿足。也因此，政府完全不用擔心會爆發戰爭、革命、罷工或示威遊行等等威脅。這下子，赫胥黎想像中的未來，可能還比歐威爾的《1984》更為棘手。赫胥黎的世界似乎對大多數讀者來說都非常可怕，但又很難解釋原因。所有的人永遠都是很快樂的；這到底能有什麼問題？


    赫胥黎筆下這個令人毛骨悚然的新世界，背後有一項假設：「快樂等於快感」。在他看來，快樂就是身體感覺到快感。因為我們的生化機制限制了這些快感的程度和時間長短，唯一能夠讓人長時間、高強度感受到快樂的方法，就是操縱這個生化機制。


    然而，這種對於快樂的定義，還是受到一些學者質疑。在一項著名的研究中，諾貝爾經濟學獎得主康納曼（Daniel Kahneman）請受試者描述自己一般上班日的全天行程，再分段一一評估他們究竟有多喜歡或討厭這些時刻。他發現，大多數人對生活的看法其實會有所矛盾。讓我們以養小孩為例。康納曼發現，如果真要計算哪些時刻令人開心、哪些時候叫人無聊，就單純的數字來說，養小孩可說是非常不愉快的事。很多時候，養小孩就是要換尿布、洗奶瓶、處理他們的哭鬧和脾氣，這些都算是沒人想做的苦差事。然而，大'
