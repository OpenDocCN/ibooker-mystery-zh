    # 想像的社群


    正如同核心家庭，只要地方社群的情感功能還沒有完全遭到國家和市場取代，就不會從現代世界消失。過去，地方社群的物質功能，現在已經大部分由市場和國家接手，但是在部落情誼、同舟共濟這些情感上，市場和國家畢竟還難以全盤掌控。


    市場和國家若要增強這些情感面，倚賴的就是塑造想像的社群'
