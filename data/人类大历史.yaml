  md: '# 人類大歷史


    就算從來沒聽說過另一個人、沒看過他的自傳、也不是靠著想像，卻能夠直接記得他的記憶，就像是自己的記憶一樣。而且，這裡的他人可能是男、也可能是女。像這樣的集體記憶概念，對於自我和性別認同，又會有什麼影響？在這種時候，我們要怎麼「認識你自己」？又要怎麼知道，哪些才是真正屬於你自己的夢想，而不是集體記憶中的願望？


    這樣的半機械人就不再屬於人類，而是完全不同的全新物種。這一切是從根本上的改變，其中的哲學、心理或政治影響，可能都還不在我們的掌握之中。


    # 數位生命


    第三種改變生命法則的方式，則是創造出完全無機的生命。最明顯的例子，就是能夠自行獨立演化的電腦程式和電腦病毒。


    現在，資訊工程世界正當紅的一個領域，就是基因程式設計（genetic programming）。這種程式設計模仿基因遺傳演化。許多程式設計師都有一個夢想，希望能創造出一組能夠獨立於創造者、完全自行學習演化的程式。在這種情況下，程式設計師只是一個原動力，程式一經發動之後，它就會開始自由演化，無論創造者或其他任何人，都不再能掌握它的發展方向。


    我們現在已經有這種程式的原型了，也就是所謂的電腦病毒。電腦病毒在網路上流傳的時候，會不斷自我複製數百萬到數億次，一面要躲避追殺的防毒軟體，一面又要與其他病毒爭奪網路裡的空間。而總有某一次，在病毒自我複製的時候出現了錯誤，這就成了一種電腦化的突變。這種突變有可能是因為病毒設計師，原本就讓'
