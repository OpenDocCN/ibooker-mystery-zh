  md: '# 科技扮演現代救世主


    情況一直要到十五、十六世紀才有所改變，但又要再過兩百年後，才有證據顯示統治者確實已經願意將資金投入新武器的研發。在當時，後勤對戰爭的影響仍然遠大於科技。拿破崙在1805年的奧斯特利茨（Austerlitz）戰爭大破俄奧聯軍，但他所用的武器其實和不久前被送上斷頭臺的路易十六，並無太大不同。拿破崙本人雖然是炮兵出身，卻對新武器的興趣不大。科學家和發明家曾希望說服他撥款研發飛行器、潛艇和火箭，他仍然意興闌珊。


    一直要到資本主義體制和工業革命登場，科學、產業和軍事科技才開始了水乳交融的關係，從此世界急速全然改觀。


    在科學革命之前，多數人類文化都不相信人類還會再進步。他們覺得黃金時代屬於過去，整個世界只會停滯不前，最擔憂的是世風日下、人心不古。如果恪遵祖宗智慧，或許能夠再次喚回過去的美好時光；如果發揮今人智慧，或許也能勉強改善日常生活某些面向。然而，一般都不相信人類知識能夠克服世界上最重大的問題。如果連穆罕默德、耶穌、釋迦牟尼、孔孟聖賢這些全知者都沒辦法解決饑荒、疾病、貧窮和戰爭，我們這些平凡人又怎麼做得到呢？


    許多信仰相信，總有一天會出現某位救世主，解決一切戰爭、饑荒、甚至死亡。但是如果說到人類可以靠著發現新知識、發明新工具就解決一切問題，就會被認為不只是可笑，更是狂妄自大。無論是《聖經》創世記中的巴別塔、希臘神話的伊卡魯斯、或是猶太傳說的活假人（Golem），這些神話故事都一再告誡人類，不要企圖超越人類的極限，否則只會災難加身。'
