  md: '人類大歷史


    不僅時時刻刻都得想著未來，還幾乎可說是為了未來在服務。農業經濟是以生產的季節週期為基礎，經過很多個月耕作，來到相對較短的收成高峰期。豐收的時候，農民可能會在收成結束後的夜晚歡慶一場，慰勞這段時間的辛勞，但頂多一星期後，就又回到日出而作、日落而息的生活。雖然可能已經有了足夠的糧食，來應付今天、下星期、甚至下個月，他們還是得擔心明年和後年的問題。


    之所以要擔心未來，除了有生產季節週期的因素，還得面對農業根本上的不確定性。由於大多數村落擁有的農作或家禽家畜物種十分有限，一旦遇上旱災、洪水和瘟疫，就容易災情慘重。於是，農民不得不生產出多於所需的食物，好儲備存糧。糧倉裡堆了米、地窖裡存了橄欖油、食品室裡有乳酪、屋樑上還掛著香腸，否則遇到歉收年就很有可能會餓死。而且，總有歉收的一年，只是時間早晚而已，如果農民不早做準備，絕對也活不久。


    於是，早從農業一開始，「未來」就一直是人類心中小劇場的主要角色。在農民得靠雨水灌溉的地方，雨季一開始，擔心也就開始了。每天早上，農民都會凝視遠方的天邊、聞聞風的味道，盯到眼睛發痠。那片是雲嗎？能不能來場及時雨？雨會下得夠嗎？雨會不會又下得太大，把田裡的種子或秧苗都打壞、沖走了？


    不管是在幼發拉底河流域、印度河流域、還是黃河流域，所有農民都一樣憂心忡忡，不時探頭看看河水的高度。他們需要雨季讓河面上升，一方面把上游肥沃的土壤沖刷下來，另一方面可引水進入他們龐大的灌溉系統。然而，如果這場洪水讓河面漲得太高，又或來的時機不對，田地就會遭到嚴重破壞，下場與旱災一樣淒慘。


    農民擔心未來，除了因為有更多東西要保護，也是因為現在有別的方法可以減少風險。他們可以再整一塊地、再挖一條灌溉的渠


    118'
