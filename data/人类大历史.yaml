  md: '用公有共享，而在臺中的部落則以核心家庭為基礎。臺北部落可能會花很長的時間把自己的守護靈刻成木像，而臺中部落則是用舞蹈來敬拜守護靈。前者也許相信輪迴，而後者則認為那是無稽之談。在某個社會可能同性的性關係沒什麼大不了，但在另一個社會就成了禁忌。


    換句話說，雖然用人類學方式觀察現代的採集社會，可以幫助我們瞭解一些遠古採集社會的種種可能性，[2] 但這絕非全貌，而且可說絕大多數仍有如以管窺天。有人激烈爭辯智人的「自然生活方式」該是如何，其實並未打到重點。從認知革命之後，智人的「自然生活方式」從來就不只一種。真正存在的只有「文化選擇」，而種種選擇就像是調色盤，色彩繽紛炫目，令人眼花撩亂。


    # 唯一的家畜


    但是，講到農業革命之前的世界，究竟有什麼是我們能確定的普遍現象？或許我們可以很確定的說，當時大部分人都是生活在小部落裡，每個部落小則數十人，最大不過數百人，而且所有成員都是人類。最後一點似乎像是廢話，但事實絕非顯而易見。在農業社會和工業社會裡，其實家禽家畜的數量已不下於人類、甚至還超過人類，雖然地位低於主人，但仍然是社會中的一份子。譬如今天的紐西蘭，雖然智人的人數有450萬，但綿羊可是高達5,000萬隻。


    只不過，這個通則還是有一個例外：狗。


    > [2] 說到遠古採集社會的「種種可能性」，講的是對於任何一個社會來說，根據其生態、技術和文化的限制，都有種種信仰、習俗和經驗，像是光譜一樣在他們眼前展開。無論是社會或個人，面對著世界上的種種可能，通常都只能探索到其中的一小部分而已。'
