- img_proc: true
  md: '就算我們不要只看菁英文化和高級藝術，而將重點轉向一般人的世界，還是會發現帝國遺緒在現代文化幾乎無所不在。今天大多數人說話、思考和做夢的時候，用的都是過去曾拿刀對著我們祖先的征服者的語言。


    像是多數東亞人講話和做夢的時候，用的是漢帝國的語言。而在南美和北美，不管各地的人民祖先來自何方，從阿拉斯加最北的巴羅半島、到南美最南的麥哲倫海峽，幾乎所有人都講著以下四種語言之一：西班牙語、葡萄牙語、法語或英語。


