  md: '實。1940年代進入核彈時代的時候，很多人預測西元2000年會成為核能世界。第一顆人造衛星和阿波羅十一號發射，也讓全球想像力大作，大家都開始認為到了二十世紀結束的時候，人類就可以移民到火星和冥王星。但這些預測全都沒有成真。而另一方面，當時誰都沒想過，網際網路能發展成現在這個樣子。


