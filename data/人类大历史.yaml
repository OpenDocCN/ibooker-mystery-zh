  md: '中了五千萬美元的樂透，中午又同時找到了治癒愛滋病和癌症的妙方，下午幫忙讓以色列和巴勒斯坦達成永久和平協議，晚上又終於與失散多年的孩子團聚，她感受到的快樂程度仍然頂多就是7分而已。不論如何，她的大腦就是沒辦法讓她樂不可支。


    想想你的家人朋友。是不是有些人，不論發生多糟的事，還是能保持愉快？是不是也有些人，不管得到了多大的恩賜，還是一直鬱鬱寡歡？我們常認為，只要換個工作、找到老公、買了新車、寫完小說，或是付完房貸，做完諸如此類的事，就能讓自己快樂得不得了。然而，等我們真正達到這些期望的時候，卻沒有感覺真的比較快樂。畢竟，買車和寫小說並不會改變我們的生化機制。雖然可以有短暫的刺激，但很快就會回到原點。


    # 歷史何價？


    不過，先前的心理學及社會學研究也得出了一些結論，例如平均而言，已婚的人比單身更快樂。生物學對此要怎麼解釋？


    首先，心理學和社會學的研究只證明了相關性（correlation），但是真正的因果方向，有可能和研究人員的推論正好相反。確實，已婚的人比單身和離婚的人更快樂，但這不一定代表是婚姻帶來了快樂，也有可能是快樂帶來了婚姻。或者更準確來說，是血清素、多巴胺和催產素帶來並維繫了婚姻。那些生化機制天生開朗的人，一般來說都會是快樂和滿足的人。而這樣的人會是比較理想的另一半，所以他們結婚的機率也比較高。而且，和快樂滿足的另一半相處，絕對比和鬱悶不滿的另一半相處，來得容易，所以他們也比較不容易離婚。確實，已婚的人平均來說比單身更快樂，但如果是生'
