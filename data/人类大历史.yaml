  md: '經不再能影響我們。畢竟，無欲則無苦。


    根據佛教經典，釋迦牟尼本人就達到了涅槃，從痛苦中完全解脫。而在這之後他就稱為「佛陀」，意為「覺悟者」。接著，佛陀一生前往各地普傳佛法，希望讓所有人離苦得樂。佛陀的教誨一言以蔽之：痛苦來自於欲望；要從痛苦中解脫，就要放下欲望；而要放下欲望，就必須訓練心智、體驗事物的本質。


    對佛教徒來說，這條「佛法」就是舉世皆同的自然律，「痛苦來自於欲望」這件事舉世皆同，就像在近代物理學中，E總是等於mc²。所以，所謂的佛教徒，就是相信「苦由欲起」這條定律、將這條定律落實在一切日常活動中的人。另一方面而言，是不是信仰某個神靈，對佛教徒來說就不是那麼重要。


    一神教的最高原則是「唯一真神確實存在，那麼祂想從我這裡要到什麼呢？」佛教的最高原則，則是「痛苦確實存在，我該如何逃離呢？」


    佛教並不否認有神祇存在，佛教認為祂們有強大的神通，能夠帶來降雨和勝利，然而神祇對於「苦由欲起」這條定律並無能為力。如果能夠無欲無求，任何神祇都無法讓人感到痛苦。相對的，如果人有了欲望，任何神祇也無法拯救他脫離痛苦。


    但也如同一神教，佛教這種前現代的自然律宗教還是無法擺脫神祇崇拜。佛教告訴信眾，他們應該不斷追求涅槃境界，不要為了名利停下腳步。然而，99%的佛教徒都無法達到這個境界，而且就算他們一心希望最後能達成這個目標，日常生活裡多半都還是追求著世俗的成就。於是，佛教徒還是崇拜著各種神祇，像是在印度的佛教徒膜拜著印度的神，西藏的佛教徒膜拜著本教（Bon）的神，日本的佛教徒也膜拜著神道教的神。'
  merge: -1
  pgno: 258
- img_proc: true
  md: '此外，佛教的幾個教派也隨著時間發展出滿天的諸佛菩薩。諸佛菩薩是人也非人，祂們已經能夠達到涅槃、解脫痛苦，但為了救度還在輪迴中的芸芸眾生，因而倒駕慈航、迴入娑婆。所以，佛教徒崇拜的並不是神祇，而是這些已經開悟、但尚未成佛的人，除了希望祂們協助達到涅槃境界，也希望祂們幫忙處理一些世俗問題。於是，我們就看到整個東亞有許多佛陀或菩薩得負責降雨、醫病，甚至保佑殺敵求勝，而信眾也虔心祈禱，為祂們焚香、獻上各色鮮花、米食和甜品。


    # 當崇拜的對象變成了人


    常有人說，過去三百年來世界愈來愈世俗化，宗教影響力日漸下滑。這一點對於有神論（見第 70 頁）的宗教來說，大致上確實如此。但如果把自然律的宗教也納入討論，就會看到現代其實充滿了強烈的宗教熱情，宣教力度無與倫比，更發生了一樁又一樁史上最血腥的宗教戰爭。這些新型的自然律宗教信仰，包括了自由主義、共產主義、資本主義、民族主義和納粹主義。它們不喜歡被稱為宗教，而說自己是「意識型態」。但這就只是修辭罷了。我們前面曾說宗教就是「一種人類的規範及價值觀的系統，建立在超人類的秩序之上」，這麼一來，蘇聯的共產主義便與伊斯蘭教同樣符合宗教的定義。


    當然，伊斯蘭教和共產主義幾乎全然不同，伊斯蘭教認為控制一切的超人類秩序是某個全能的真主，相對的，蘇聯共產主義並不相信神的概念。然而，佛教信的也不是神，我們卻常常認定佛教屬'
  merge: -1
  pgno: 259
- img_proc: true
  md: '於宗教。共產黨人也像佛教徒一樣,相信有一套自然、不可改變的超人類秩序,引導著人類的行為。佛教相信這一套自然律是由釋迦牟尼所發現,而共產黨人則認為是馬克思、恩格斯和列寧找出了他們那一套自然律。


    ![](img/b523907992e2c573126c18fe166aa89d_260_0.png)


    宗教是一種人類的規範和價值觀的系統,並且是以相信某種超人類秩序為基礎。以相對論為例,由於至少目前為止,還沒有人依此建立起對人類的規範和價值觀,所以就稱不上是宗教。足球也不算宗教,因為沒有人認為足球規則反映了某種超人類的教條。至於伊斯蘭教、佛教和共產主義,之所以落入宗教範疇,是因為它們都奠基在某種超人類秩序上,發展出一套人類的規範和價值觀。


    (請注意:「超人類」並不等於「超自然」。佛教的自然律和馬克思主義的歷史法則之所以稱為「超人類」,指的是它們並非由人類制定。但這並不是某種超自然現象。)'
  merge: -1
  pgno: 260
- img_proc: true
  md: '相似處還不只如此。共產主義就像其他宗教一樣，有自己的聖經和預言書，例如馬克思的《資本論》就預言歷史很快會走向無產階級的必然勝利。共產主義還有自己的節慶，像是五一勞動節，以及十月革命的紀念日。共產主義的「神學家」嫺熟馬克思主義的辯證法，蘇聯軍隊的每個單位也都有它的「牧師」，稱為政委，來檢查士兵和軍官夠不夠虔誠。共產主義同樣有殉道者、有聖戰，也有像是托洛茨基主義（Trotskyism）這種異端學說。由此可見，蘇聯共產主義確實就是一種狂熱並熱中宣教的宗教。虔誠的共產主義信徒，就不可能是基督徒或佛教徒，而且還可能為了傳播馬克思和列寧的福音，願意犧牲自己的生命。


    這一串論述下來，有些讀者可能會感覺很不舒服。如果有人仍然認為共產主義只能叫「意識型態」，而不是宗教，其實這也無傷大雅。另一種做法就是把各種教義分成兩種，一種是宗教，以神祇為中心；一種是意識型態，以自然律為中心。但如果採用這種分類法，像是佛教、道教和斯多葛教派，就應該歸為意識型態，而不是某種宗教。


    此外我們也該注意，許多現代意識型態都隱含「相信神明」的概念，如果捨棄這項元素，就會變得毫無意義，其中又以自由主義為最。


    # 三種人文主義宗教


    至於現代各種新型自然律宗教的教義，由於它們之間並沒有明顯的界線，我們在此也就不可能逐一檢視它們的歷史。這些新型自然律宗教「綜攝」的情形，並不少於一神教和盛行的佛教。就像佛'
  merge: -1
  pgno: 261
- img_proc: true
  md: '教徒也能膜拜印度教的神祇、一神教徒也相信撒旦的存在，現在典型的美國人也能既是民族主義者（相信有美國國族存在，而且相信它在歷史上有重大作用）、又是自由市場資本主義者（相信社會繁榮的最佳方法就是公開競爭、追求自我利益），也是自由人文主義者（相信造物主賜給人類若干不可剝奪的權利）。民族主義將在第18章討論。最成功的現代宗教：資本主義，會在第16章以專章探討，闡述其主要信念和儀式。至於本章的其餘篇幅，我們就繼續討論人文主義宗教。


    有神論的宗教，重點在神的崇拜；至於人文主義宗教，重點就是對人的崇拜，或者講得更明確，是對智人的崇拜。人文主義的基本信念，就是認為智人是獨特的、神聖的，從本質上便與其他所有現代動物有所不同。對人文主義者來說，智人的獨特性是世界上最重要的事情，決定了宇宙間一切事物的意義。所謂的「至善」，講的是對智人好。全球所有其他物種和生命，都只為了智人這一物種的利益而存在。


    雖然所有人文主義者都崇拜人性（humanity），但對於人性的定義卻不見得都相同。就像基督宗教的各個教派對於「神」會有不同定義，人文主義對「人性」的定義，大致上分成三種對立的教派。今天最重要的人文主義學派就是自由人文主義，它認為人性就在於每一個人的自我特質，因此個人自由也就變得神聖不可侵犯。根據這些自由主義者的說法，每個智人都有著人性的神聖本質。正是每個人的內心讓全世界有了意義，而且這也是各種道德及政治正當性的來源。如果碰上道德或政治的困境，就該內省，聽聽自己內心的聲音，也就是人性的聲音。因此，自由人文主義最重要的誡命就是要保障這種「內心聲音」的自由，不受外界的侵擾或傷害。而'
  merge: -1
  pgno: 262
- img_proc: true
  md: '這些誡命統稱為「人權」。


    舉例來說，這正是自由主義者反對酷刑和死刑的原因。在近代早期的歐洲，犯下殺人罪的人，會被視為違反破壞了宇宙秩序。為了讓宇宙回歸平衡，就須對罪犯施以酷刑、並公開處決，好讓所有人民都看到宇宙已經重返秩序。在莎士比亞和莫里哀的時代，倫敦人和巴黎人最愛的消遣，就是現場直擊殘忍的處決畫面。但在今天的歐洲，死刑被看作侵害了人性的神聖。雖然一樣是為了維護秩序，但現今的歐洲不會對罪犯施以酷刑處決，反而是要以盡可能「人性化」的方式來加以懲罰，才能維護、甚至重建人類的尊嚴。藉著表彰兇手的人性，人人都想起了人性的神聖，於是秩序才得以恢復。像這樣保護兇手，我們才能改正兇手他做錯的事。


    雖然自由人文主義將人性神聖化，但並不否認有神的存在，而且根本就是源自於一神論的信念。像是相信每個人的本質自由而神聖，就是直接源於傳統基督教相信靈魂自由而永恆的概念。要是沒有永恆的靈魂和造物主的概念，自由主義者想要解釋究竟個別的智人有何特別，就很難講得清楚。


    人文主義的另一個重要教派就是社會人文主義。社會主義者認為所謂「人性」是集體而非個人的概念，因此他們認為神聖的不是每個個人心中的聲音，而是由所有智人構成的整體。自由人文主義追求的，是盡可能為個人爭取更多自由；而社會人文主義追求的，則是讓所有人都能平等。對社會主義者來說，「不平等」就代表著偏重人類的某些邊緣特質、認為這比人類的普遍本質更重要，這樣一來可說是對人類神聖性最嚴重的褻瀆。舉例來說，如果富人比窮人有特權，就代表重視「金錢」超過了人類的普遍本質（不論貧富，人類的本質應該全部相同）。'
  merge: -1
  pgno: 263
- img_proc: true
  md: '和自由人文主義一樣，社會人文主義也是以一神論的信念為基礎。像是人人平等這個概念，就是來自於一神論認為：在神的面前所有靈魂一律平等。唯一不是來自傳統一神論的人文主義教派，就是進化人文主義，以納粹為最著名的代表。真正讓納粹與其他人文主義教派不同的地方，在於他們深受演化論影響，對「人性」有不同的定義。相對於其他人文主義者，納粹相信人類並非處處相同、也不是永恆不變，而是一個會進化或退化的物種。人可以進化成超人，也可以退化成非人。


    # 人文主義宗教：崇拜「人性」的宗教


    | | | |

    | --- | --- | --- |

    | 智人擁有獨特且神聖的本質，與其他生物有根本上的不同。<br>所謂的「至善」，講的是對整體人性有好處。 | | |

    | **自由人文主義** | **社會人文主義** | **進化人文主義** |

    | 「人性」是個人主義的概念，存在於每個智人心中 | 「人性」是整體的概念，存在於所有智人整體之中 | 「人性」可變，可能退化成非人，也可能進化成超人類 |

    | 最重要的使命，是保護每個智人內心的自由 | 最重要的使命，是保護智人這個物種每個人都能平等 | 最重要的使命，是保護人類、避免退化成非人，並且鼓勵進化成超人類
    |'
  merge: -1
  pgno: 264
- img_proc: true
  md: '納粹的目標主要是希望保護人類，避免退化，並鼓勵漸進的演化。正因如此，納粹黨徒才會主張應該要好好保護、養育雅利安人（Aryan，他們認為這是最進步的智人類型），至於猶太人、吉普賽人、同性戀者和精神病患，這些被認為是退化的智人類型，則必須隔離、甚至滅絕。納粹的辯白是，智人一開始能夠勝出，本來就是因為演化留下了這種「較優異」的遠古人種，而淘汰了某些「較低劣」的人種，例如尼安德塔人就從此消失。一開始，不同的人種不過也就是不同的種族，但後來就走上不同的演化道路。很有可能，這還會再次發生。納粹認為，智人已經分化出幾個不同的種族，各有獨特的特質，而雅利安人擁有各種最優秀的特質：理性、美麗、誠信、勤奮。因此，雅利安人擁有讓人類進化為超人的潛力。至於像猶太人和黑人這些種族，特質不佳，可說是現代的尼安德塔人。如果讓他們任意繁衍、甚至還和雅利安人通婚，豈不是汙染了整體的人類物種，即將造成智人滅絕嗎？


    生物學家已經戳破了納粹的種族理論。特別是1945年以後的基因研究，已經證明不同人類譜系之間的差異遠遠小於納粹的假設。但這些結論只是最近的事，考量到1933年的科學知識，納粹當時會這麼相信也不難想像。許多西方菁英都相信有不同人種的存在，相信白人較為優越，也相信應該要保護、培養這個高貴的種族。例如在許多最具盛名的西方大學裡，一直以來，總是有學者用最新的正統科學方法，發表研究報告，宣稱證明了白人比起非洲人或印第安人更聰明、更有道德，更具備高超的技能。而在華盛頓、倫敦和坎培拉的政客，也一心相信自己必須負責避免白色人種受到玷汙而墮落，所以得要設下重重限制，避免像是中國甚至義大利的人民，移居到美國、澳洲這種「雅利安人」的國家。'
  merge: -1
  pgno: 265
- img_proc: true
  md: '像這些立場，就算在新的科學研究發表之後，也並未改變。想要造成改變，純科學的力量還是遠不及社會運動和政治力。以這個意義來說，希特勒不只把自己送上絕路，也讓種族主義跟著一同送葬。在他發動第二次世界大戰的時候，他的敵人被迫涇渭分明的區分出「我們」和「他們」的不同。而在這之後，因為納粹思想就是大張旗鼓的種族主義，讓種族主義在西方再也抬不起頭來。


    然而，改變還是需要時間。至少到1960年代，白人至上仍然是美國政治的主流意識型態。限制只有白人才可移居澳洲的白澳政策，一直到1973年才廢除。澳洲原住民要到1960年代，才享有平等的政治權利，而且大多數還是被認為不足以發揮公民的功能，所以無法在選舉中投票。


    ![](img/b523907992e2c573126c18fe166aa89d_266_0.png)


    20. 一幅納粹的宣傳海報，右邊是「純種雅利安人」，左邊是「混種」。


    納粹顯然十分崇拜人體，害怕「低等種族」汙染人性、讓人性墮落。'
  merge: -1
  pgno: 266
- img_proc: true
  md: '![](img/b523907992e2c573126c18fe166aa89d_267_0.png)


    21. 納粹 1933 年的漫畫。


    漫畫將希特勒描繪成要創造完美人類的雕塑家。至於旁邊戴眼鏡的自由主義知識份子，則因為過程中需要用到暴力，而怯怯懦懦，驚慌失措。（也請注意，畫中的希特勒，對人體有著情色的崇拜。）'
  merge: -1
  pgno: 267
- img_proc: true
  md: '納粹並不是反人性。他們之所以和自由人文主義、人權和共產主義站在對立面，反而正是因為他們推崇人性、相信人類有巨大的潛力。他們順著達爾文演化論的邏輯，認為必須要透過天擇，淘汰不適合的個人，只留下適者，才能讓人類繼續生存繁衍。而自由主義和共產主義卻是要保護弱者，不僅讓不適者生存了下來，還給了他們繁殖的機會，這樣就破壞了天擇的秩序。如此一來，就算是最適者的人類，也不免被一群墮落的人類淹沒，變得愈來愈趨近不適者，代代繁衍下去就可能導致滅絕。


    一本1942年版的德國生物課本，就有一章〈自然律與人類〉，認為自然界的最高法則，就是讓所有生物都必須在無情的鬥爭中求生存。書裡講到植物如何為了土地而奮鬥、甲蟲如何為了交配而奮鬥，最後課本的結論是：「這場生存之戰，艱辛而無情，但這是讓生命延續的唯一道路。這場鬥爭能夠消除一切不適合生存者，並挑選出適合生存的……這些自然律不容置疑；目前還存活的生物就是明證。這些生物冷酷無情，抵抗者就會遭到消滅。生物學不只告訴我們關於動植物的事，還告訴我們生活中必須遵守的法則。我們要堅定志向，依照這些法則生存下去、抵抗下去。生命的意義，就是鬥爭。違抗這些自然律，則終必致禍。」


    課本裡接著又從希特勒的《我的奮鬥》引了一段：「想要違抗自然鐵律的人，也就是違抗了那些他應該感謝、讓他得以為人的原則。與自然對抗，只會帶來人類自己的毀滅。」66'
