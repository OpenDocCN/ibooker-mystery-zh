- img_proc: true
  md: '修習數學。走向精確科學(exact science)的趨勢勢不可擋,而所謂「精確」,正是因為使用了數學工具。就算是語言學或心理學這種傳統上屬於人文領域的學科,現在也愈來愈依賴數學,並試圖讓自己看起來有精確科學的樣子。統計學現在已經不只是物理學和生物學的必修課,連心理學、社會學、經濟學和政治學也同樣需要。


    譬如在我任教的希伯來大學,心理系列出的第一項必修課就是「心理學研究之統計學與方法論概論」。到了第二年,心理系學生還必修「心理學研究之統計方法」。如果你告訴孔子、釋迦牟尼、耶穌和穆罕默德,要先學會統計,才能瞭解人的心靈、治癒人的疾病,他們一定會覺得一頭霧水。


    # 知識就是力量


    對大多數人來說,要消化瞭解現代科學並不容易,因為對人腦來說,這種數學語言很難掌握,而且其結果常常與一般常識互相牴觸。在全球七十億人口中,有多少人真的瞭解量子力學、細胞生物學或總體經濟學?儘管如此,因為科學為人類帶來太多新的能力,也就享有崇高的地位。雖然總統和將軍可能自己不懂核物理,但他們對於核彈能做什麼事,可是瞭若指掌。


    1620年,培根發表了名為《新儀器》的科學宣言,提出「知識就是力量」。對於「知識」的考驗,不在於究竟是否真實,而在於是否能讓人類得到力量或權力。科學家一般公認,沒有任何一種理論百分之百正確。因此用「真實」與否來為知識評分,並不妥當。真正的考驗就是實用性。能讓我們做出新東西來的,就是知識。


    幾個世紀以來,科學為人類提供了許多新的工具。有些是思考'
  merge: -1
  pgno: 293
- img_proc: true
  md: '的工具，像是能夠用於預測死亡率和經濟成長率；但更重要的是技術工具。科學（science）和技術（technology）的關連實在太過密切了，往往讓許多人將這兩者混為一談。我們常常會認為，沒有科學研究，就無法發展出新技術，而如果不會產生新技術，科學研究也就沒有意義。


    但事實上，科學和技術是在最近才開始緊密相連的。西元1500年以前，科學和技術還是兩個完全不相干的領域。培根在十七世紀將這兩者接軌的時候，其實是革命性的想法。兩者的關係在十七世紀和十八世紀更趨緊密，但要到了十九世紀才真正孟不離焦。即使到了1800年，當時多數的統治者都希望能有一支強大的軍隊，多數的商業大亨也都希望能擁有蓬勃的企業，但他們都還完全不會想到要為物理學、生物學、經濟學等研究提供資金。


    當然，史上並不是沒有例外。只要是優秀的歷史學家，絕對都能找出例外情況；但如果是更優秀的歷史學家，就會知道這些例外只是出於某些人一時的好奇，不應該因此影響對大局的判斷。一般來說，前現代的統治者和商人想取得新技術的時候，多半並不是將資金投入研究宇宙的本質，而多數的思想家也不會想把他們的發現發展成技術上的小工具。統治者資助教育機構，目的只是為了傳播傳統知識、強化現行秩序。


    雖然在過去也常有人發展出新技術，但通常是一些未受過教育的工匠、不斷嘗試錯誤而產生，而不是學者經由系統化的科學研究得到的成果。運貨馬車的製造商，每年會用一樣的材料，製作出一樣的車，並不會把每年賺錢的一定比例，投入研發新型馬車。雖然馬車的設計偶爾也會有改善，但通常是因為當地某個木匠天縱英才，而且他常常一步也沒進過大學，很可能大字也不識一個。'
  merge: -1
  pgno: 294
- img_proc: true
  md: '# 人類大歷史


    不僅民間如此，公部門也一樣。在現代國家裡，從能源、醫療到廢棄物處理，國家幾乎都會要求由科學家提出解決辦法，然而這在古代的王國裡很少出現。古今比較，最明顯的差別就在於武器裝備。1961年，即將卸任的美國總統艾森豪，對於軍事與產業結合、勢力不斷膨脹的情形提出警告，但他的說法並不完整。除了軍事和產業，科學也是其中一份子，因為今日的武器正是科學的產物。許多科學研究和技術發展，正是由軍事所發起、資助及引導。


    在第一次世界大戰陷入無止境的壕溝戰時，雙方都是寄望科學家能夠打破僵局，拯救自己的國家。這些穿著實驗衣的人，響應了這項號召，從實驗室裡大量推出各種令人咋舌的新式武器：戰機、毒氣、坦克、潛艇，比以往效能更高的機槍、大炮、步槍和炸彈。


    到了第二次世界大戰，科學的重要性更是一日千里。1944年底，德國節節敗退，戰敗已經近在眼前。一年前，德國人的盟友義大利，也已經推翻了墨索里尼，向同盟國投降。然而，即使英美俄三國聯軍步步進逼，德國還是不斷頑強抵抗。之所以德國軍民還是能夠維持一線希望，就是因為他們相信德國科學家，即將推出如同奇蹟般的新武器，像是V2火箭和噴射機，力挽狂瀾。


    不過，德國人在研發火箭和噴射機方面雖然頗有成果，美國曼哈頓計畫卻已經將原子彈研發成功。1945年8月初，原子彈製造完成，雖然德國已經投降，但日本還在負隅頑抗。美國軍隊作勢攻入日本本土。日本誓死抵抗，準備決一死戰，而且這絕非裝腔作勢。美國將領告訴杜魯門總統，如果真要攻入日本本土，必然有超過百萬美國士兵喪命，戰爭也必然會拖進1946年。於是，杜魯門決定使用這款新型炸彈。8月6日及9日，兩枚原子彈分別投下廣島與長崎，之後日本宣布無條件投降，戰爭就此結束。'
