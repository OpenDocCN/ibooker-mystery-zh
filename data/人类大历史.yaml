  md: '人類大歷史


    富。錢的類型很多，我們最熟悉的是硬幣，也就是上面印了文字或圖像的圓形標準化金屬片。但早在硬幣發明之前，錢的概念早已存在，許多文化都曾經以其他物品當作錢來使用，包括貝殼、牛隻、獸皮、鹽、穀物、珠子、布料，以及欠條。大約四千年前，整個非洲、南亞、東亞和大洋洲都是用貝殼來交易的。就算到了二十世紀初，英屬烏干達還是能用貝殼來繳稅！


    至於在現代監獄和戰俘營裡，常常是用香菸來當作錢。在那些封閉的地方，就算你不抽菸，也會願意接受別人用香菸來付帳，或是用香菸計算各種商品和服務的價值。一位納粹奧許維茲集中營的倖存者，就描述過集中營裡如何用香菸當作貨幣：「營裡有自己的貨幣——香菸，而且沒人覺得不合理。所有東西都用香菸來計價……『正常』的時候（也就是大家進毒氣室的頻率穩定的時候），一條麵包是12支香菸，一包300公克的乳瑪琳是30支，一隻錶值80到200支；一公升的酒可得花上400支！」56


    事實上，就算是現在，大部分的錢也不是以硬幣或鈔票的方式存在。目前，全球金錢總和為60兆美元，但所有硬幣和鈔票的金額加起來還不到6兆美元。57 換句話說，所有的錢有超過九成（超過54兆美元！）都只是顯示在電腦上的數字而已。正因如此，大多數的商業交易，其實只是把某臺電腦裡的電子資料搬到另一臺去，完全沒有任何實體金錢的交換。大概只有逃犯要買房子的時候，才會提著一大皮箱的錢出現。而只要大家都願意接受電子數據交易，就會比閃亮的硬幣或簇新的鈔票更方便，不僅更輕、更易攜帶，還更容易記錄留存。


    出現了複雜的商業系統之後，金錢的概念更是不可或缺。有了金錢的概念，鞋匠只要記得哪種鞋開價多少，不用一一記住鞋子換'
  merge: -1
  pgno: 205
- img_proc: true
  md: '成蘋果或山羊之間的兌換率。而且，因為金錢人人都想要，所以蘋果達人也不用再去逐一詢問附近哪個鞋匠想吃蘋果。或許「人人都想要」正是金錢最基本的特性。人人都想要錢，是因為其他人也都想要錢，所以有錢幾乎可以換到所有東西。鞋匠之所以永遠都樂意收錢，是因為不管他當時想要什麼（蘋果、山羊、或是離婚），只要有錢，幾乎都換得到。


    於是，金錢就成了共通的交易媒介，幾乎任何東西之間都能完成交換。志願役軍人退伍的時候，拿著退職金去上大學，可以說就是用體力來換腦力。男爵出售土地城堡來養活家臣手下，就是用物業來換忠誠。醫師拿病人看病的錢來聘任律師（或是賄賂法官），就是用他人的健康來換取所謂的正義。甚至像是十五世紀的妓女，她們先和男人上床取得報酬，再用錢來買天主教教會的贖罪券，就是用性來換取救贖。


    理想的金錢類型不只能用來交換物品，還能用來累積財富。各種貴重的事物當中，有的根本無法儲存（像是時間或美貌），有的只能儲存一段很短的時間（像是草莓）。也有的雖然能久放，但卻得占用大量空間，或是需要昂貴的設備和照顧。舉例來說，穀類雖然可以保存多年，但需要有大型的穀倉，還得小心防鼠、防黴、防水、防火、防賊。而有了錢之後，不管用的是鈔票、電腦資料或是貝殼，都能解決這些問題。像是貝殼，既不會腐爛、老鼠啃不太動、不怕火燒，而且也小到可以輕鬆鎖在保險箱裡。


    然而，有了財富之後不只要儲存累積，更要能用得愉快，所以往往需要從一地帶到另一地。某些形式的財富（如房地產）完全無法帶到另一個地方，而像是小麥和稻米之類的產品，要運送也有一定的難度。想像一下，如果有個富有的農民，住在一個沒有金錢概'
