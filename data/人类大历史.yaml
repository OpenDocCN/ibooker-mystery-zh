  md: '需猶豫。原因就在於：他一聽到伊莉莎講話，就知道她是下層階級的人，幾乎可說是任他宰割，例如將她當作棋子，打賭可以把這個賣花女假扮成名媛淑女而不被看穿。至於如果是現代版的伊莉莎，花店小姐也得知道每天面對著來店的幾十個客人，該如何才能賣出一把又一把的玫瑰和劍蘭。她不可能有時間精力做個完整的身家調查，知道每個人的喜好如何、口袋又有多深。所以她得抓住某些「社交線索」，像是客人的衣著打扮、年齡、膚色（雖然這實在不太政治正確），來猜猜看這個客人究竟會是會計師、可能大手筆為母親生日買上一大把長莖玫瑰，又或是送貨小弟，只買得起一小把雛菊，想送給某個笑容甜美的櫃臺小姐。


    當然，天生能力的差異也是造成社會階級的重要因素，但是種種不同的能力和性格，常常還是會受到想像的階級所影響。這一點主要有兩大方面。最重要的一點，就是大多數的能力也需要培養和發展。就算某個人天生具有某種才能，如果不經過積極培養、磨練和運用，常常也就沒什麼表現的機會。但這些機會絕非人人平等，常常都得看他們在「由想像建構出來的社會階級」身處何處而定。哈利波特其實就是很好的例子。他從小被迫與能力出色的巫師父母分離，而由對巫術一無所知的麻瓜帶大，所以等他到了霍格華茲學院的時候，對巫術可說是一竅不通。於是，哈利波特的故事整整花了七本書，才讓他真正掌握了這項獨特才能的力量和知識。


    第二，就算身處不同階級的人發展出了完全一樣的能力，因為他們面對的遊戲規則不同，最終結果也可能天差地別。舉例來說，假設是在英國統治下的印度，有四個人都有完全相同的商業頭腦，但四個人分別是穢多、婆羅門、天主教愛爾蘭人和新教英國人，他們致富的機率就仍然會大不相同。這場經濟遊戲，其實早就被種種'
