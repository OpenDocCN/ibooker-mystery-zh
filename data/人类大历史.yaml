  md: '這點不僅對個人生活如此，就算是眾人之事也不例外。我們以秦朝統一天下為例。秦朝統一天下之後，徹底改變了中國的政治、文化、社會和經濟體制。但這一切都並未改變中國人的生化機制。因此，雖然天下大一統讓政治、社會、意識型態和經濟，都起了翻天覆地的動盪，但對於中國人的快樂並沒有多大影響。那些生化機制天生開朗的人，不管是活在戰國時代，或是秦漢時代，都會一樣快樂。但那些生化機制天生憂鬱的人，過去總是在抱怨戰國諸侯，現在也只是轉而抱怨秦朝天子，並不會有什麼改變。


