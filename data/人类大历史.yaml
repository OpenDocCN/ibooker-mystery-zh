  md: '方社群崩潰，改由國家和市場取而代之。據我們目前所知，人類在一百多萬年前即生活在小型、互動密切的社群之中，社群成員大多數都是親戚。認知革命和農業革命並沒有改變這一點，只是讓不同的家族和地方社群結合，形成部落、城市、王國和帝國，但家族和地方社群仍然是所有人類社會最基本的結構單位。但後來，工業革命不過花了短短兩世紀左右，就把這些單位粉碎成了原子。許多過去的家族功能和地方社群功能，現在都被國家和市場取代了。


    在工業革命之前，多數人的日常生活都不脫三大傳統框架：核心家庭、大家庭，以及當地的密切社群。[5] 大多數人在家族企業工作（例如家族的農場，或是家族經營的工作坊），或者也可能在鄰居的家族企業工作。這時的家族除了家庭功能，還要兼顧福利制度、衛生體系、教育體系、建築產業、勞工工會、退休基金、保險公司、新聞媒體、銀行、甚至警察等等的功能。


    有人病了，由家庭來照顧。有人老了，由家庭來撫養，而子女就是最好的退休基金。有人過世，孤兒就由家族其他成員照顧。有人想蓋小屋，家族提供人力。有人想開公司，家族提供資金。有人想結婚，家族也會審核，看看對象是不是門當戶對。如果和鄰居發生衝突，要吵架也有家族裡的人助陣。然而，如果病情太嚴重，家庭或家族無法處理，或是新公司需要的資金太龐大，或是鄰里爭吵已經到了要變成械鬥的地步，地方上的社群就會介入。


    地方社群介入時，依據的是當地的傳統、以及有來有往的互助原則，常常會和自由市場的供需法則有相當大的差異。像是在傳統的中世紀社會，如果鄰居需要我幫忙蓋屋子或是放羊，我並不會認


