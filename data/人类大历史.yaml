    澳洲。庫克這趟遠征,奠定了英國占領西南太平洋的基礎:征服了澳洲、塔斯馬尼亞(見第190頁)和紐西蘭,讓數百萬的歐洲人殖民到新的土地;但也造成當地許多文化滅絕,原住民幾近滅種。82


    在庫克遠征後的一世紀間,澳洲和紐西蘭最肥沃的土地都被歐洲移民掠奪強占。原住民不僅人數銳減90%,倖存者也嚴重受到種族歧視迫害。對於澳洲原住民和紐西蘭毛利人來說,庫克遠征隊帶來的是幾近毀天滅地的災難,至今尚未完全復原。


    而在塔斯馬尼亞島上的原住民,遭遇甚至更加悲慘。他們原本遺世獨立,生存繁衍長達上萬年,但在庫克抵達後短短一世紀間,就幾乎慘遭滅族。歐洲殖民者起初只看上島上最肥沃富裕的地點,接著就連荒野之地也不肯放過,有組織有計畫的殺害所有原住民。有一批倖存者被趕到一座新教的集中營,傳教士一片好意(但心胸並不特別開闊),循循善誘,希望灌輸他們現代世界的生活方式。他們要塔斯馬尼亞原住民信仰基督教,學習閱讀、寫作,以及各種「有用的技能」,像是縫補衣物和耕作。但是這批塔斯馬尼亞原住民拒絕學習,甚至變得愈來愈憂鬱,不再願意生育後代,對生命完全放棄希望,最後終於踏上一條唯一能逃離這個「科學與進步」之現代社會的退路:死亡。


