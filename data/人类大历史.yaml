  md: '# 生命科學帶來衝擊


    我們剛剛踏入第三個千禧年，進化人文主義的未來仍未明朗。在對抗希特勒的戰爭結束後七十年間，想將人文主義和演化論結合起來、用生物學方式讓智人「升級」的想法，依然是禁忌。但是直到今天，這種想法並未煙消雲散。雖然已經沒有人說要淘汰劣等種族或民族，但許多人正思考著：如何利用更先進的人類生物學知識來創造完美的人類。


    但與此同時，自由人文主義和最新的生命科學研究成果之間，已經出現一條鴻溝，我們很快就無法忽視，必須直接面對。我們的自由政治和司法體系之所以存在，是因為相信每個人都有一種神聖無法分割、無法改變的內在本質，這點讓世界有了意義，也是一切道德和政治正當性的來源。但這個概念的前身，正是傳統的基督教信念：相信每個人的身軀裡，都有一個自由而不朽的靈魂。


    然而，過去兩百年間，生命科學已經徹底顛覆了這個信念。科學家研究人類這個生物的內部運作，並未找到靈魂的存在。愈來愈多科學家認為，決定人類行為的不是什麼自由意志，而是荷爾蒙、基因和神經突觸；也就是說，我們和黑猩猩、狼和螞蟻並無不同。


    我們的司法和政治制度碰上這些發現，多半視而不見、不願面對。但坦白說，現在堵在生物學以及法律和政治學之間的這道牆，究竟還能維持多久？'
