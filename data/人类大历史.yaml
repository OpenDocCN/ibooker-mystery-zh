  md: '豬、超過十億隻牛，更有超過二百五十億隻雞，而且是遍布全球各地。家雞是有史以來最普遍的禽類。至於大型哺乳類，除了以智人居首，後面的二、三、四名就是馴化的牛、豬和羊。從狹隘的演化觀點來看，演化成功與否的標準就在於DNA的複本數量，於是農業革命對於雞、牛、豬、羊來說，可是一大福音。


    不幸的是，演化觀點並不是唯一判斷物種成功與否的標準。它一切只考量到生存和繁殖，而不顧個體的痛苦或幸福。雖然就演化而言，馴化的雞和牛很可能是最成功的代表，但牠們過的其實是生物有史以來最悲慘的生活。動物的馴化是建立在一系列的野蠻作為上，而且隨著時間，殘忍程度只增不減。


    野生雞隻的自然壽命大約是七年到十二年，牛則是二十年到二十五年，雖然在野生環境牠們多半都活不到這個歲數，但至少還有相當機會可以活個好一陣子。相較之下，出於經濟考量，馴化後的肉雞和肉牛不過出生幾週和幾個月，就到了最佳屠宰年齡，於是一命歸天。（如果養一隻雞只要三個月就已經達到體重最重的狀態，又何必再多餵好幾年？）


    蛋雞、奶牛和提供勞力的役用動物，有時候能多活上幾年，但代價就是過著完全不符合牠們天性和渴望的生活。舉例來說，不難想像牛會寧願優哉游哉在開闊的草原上整天漫步，有其他牛作伴，而不是被一個猿人在背後揮著鞭子，要牠拉車拖犁。


    為了把牛、馬、驢、駱駝訓練成聽話的役用動物，就必須抑制牠們的鬥性和天性，打破牠們的社會連結，並且限制牠們的行動自由。農民還發明各種控制技術，像是把動物關在獸欄和獸籠裡、套上枷鎖鏈條，用皮鞭和刺棒來訓練，甚至刻意造成動物傷殘。馴化動物的過程幾乎總是會將雄性閹割，好抑制雄性的鬥性，也讓人類'
