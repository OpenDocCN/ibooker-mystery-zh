  md: '不過，若是像漢摩拉比同時代的馬里（Mati）城邦的國王齊默里寧（Zimrilim），已經累積了數千片泥板，該怎麼辦？


    想像一下在西元前1776年，兩個馬里人在爭論一片麥田的所有權。雅各言之鑿鑿，說他早在三十年前，就向以掃買了這片田。但以掃不同意，說他只是把這片田地租給雅各，租期三十年，現在租期到了，他要收回土地。雙方火氣上升，開始互相叫囂推打，但他們忽然想到，可以到王室的檔案庫去查查，那裡有全王國房地產產的產權紀錄。


    但是等他們抵達了檔案庫，兩人就被各部門的人，像皮球踢來踢去，叫他們先坐下來喝杯青草茶、歇一會兒，或是明天請早。好不容易終於有個承辦人員一邊碎碎唸、一邊帶著他們去找相關的泥板。承辦人員打開一扇門，來到一個巨大的房間，從地板到天花板堆積著成千上萬片泥板。也難怪承辦人員心情糟，他該怎樣才能找到記著三十年前麥田合約的那塊泥板？就算找到了，又怎麼能知道這塊三十年前的泥板就是關於這片麥田的最新合約？另外，如果找不到這塊泥板，難道就能說以掃從未出售或出租這片麥田嗎？會不會只是泥板搞丟了，或是某次下雨滲水把它給溶了？


    # 官僚制度的奇蹟


    顯然，光是把紀錄壓印在泥板上，並沒有辦法讓資料處理有效率、準確和方便。我們還需要有組織工具（像是編目）、快速的複製工具（像是影印機）、快速準確的檢索工具（像是電腦搜尋），而且還得有夠聰明（最好心情還能好一些）的負責人員，能夠瞭解這些工具的使用方法。'
  merge: -1
  pgno: 152
- img_proc: true
  md: '事實證明，要發明這些工具比發明書寫文字難上太多了。在許多時間和地點都相差甚遠的文化裡，都曾各自發展出自己的文字系統。每隔幾年，總有考古學家又發現了其他某種被遺忘的文字，甚至有些還可能比蘇美泥板更久遠。但這些文字多半就只是些新鮮卻不實用的發明，原因就在於這些文化沒能找出方法，來有效編目和檢索資料。而蘇美、古埃及、古中國和印加帝國的特殊之處，就在於這些文化都發展出了良好的技術，能夠將文字紀錄予以歸檔、編目和檢索，另外還投入資本，培養人才來負責抄寫、做資料管理和會計事務。


    考古學者在美索不達米亞發現了一份當時的書寫作業，讓我們得以一窺大約四千年前的學生生活：


    > 我走進去坐下，老師來檢查我的泥板。

    他說：「你漏了一些東西！」

    然後他就用棍子打我。

    另一個管事的人說：「未經我允許，你竟敢講話？」

    然後他就用棍子打我。

    管秩序的人說：「未經我允許，你竟敢站起來？」

    然後他就用棍子打我。

    看門的說：「未經我允許，你竟敢出去？」

    然後他就用棍子打我。

    管啤酒壺的說：「未經我允許，你竟敢倒啤酒？」

    然後他就用棍子打我。

    蘇美語的老師說：「你竟敢說阿卡德語？」[4]

    然後他就用棍子打我。'
