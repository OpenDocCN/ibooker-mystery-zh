  md: '膽。他們會說：「打敗死亡？！這話太誇張了。我們只是想醫好癌症、肺結核和阿茲海默症而已。」人們避談死亡，是因為這個目標似乎太虛無縹渺，為什麼要有不合理的盼望呢？然而，現在我們已經可以坦然承認：科學革命的一大計畫目標，就是要給予人類永恆的生命。


    # 平均壽命大幅增長


    如果覺得永生不死似乎還是太遙遠的目標，可以回想一下，我們現在的醫藥成就，早就是幾世紀以前絕對不敢想像的。1199年，獅心王理查一世不過是被箭射中了左肩。對今天的醫療來說，這不過是輕傷。但是在1199年，沒有抗生素、也沒有有效的殺菌方法，於是輕微的皮肉傷造成感染，形成壞疽。十二世紀的歐洲阻止壞疽的唯一方式就是截肢，但感染在肩膀上，連截肢也不可行。於是，壞疽就這樣在獅心王的身體裡蔓延，眾人無能為力。不過兩星期之後，他就在極度的痛苦中駕崩。


    就算到了十九世紀，當時最高明的醫師仍然不知道如何預防感染、避免組織壞死。在戰場上，就算士兵只是肢體受了輕傷，軍醫常常還是立刻截肢，以免壞疽造成嚴重的後果。而且，當時不論是截肢或是其他任何醫療程序（如拔牙），都還沒有麻醉劑可用。最早的麻醉藥（乙醚、氯仿和嗎啡）都是到十九世紀中葉之後，才正式用於西方的醫療之中。在氯仿問世之前，每次要進行截肢，就得用上四名士兵，把受傷的患者牢牢壓住才成。1815年滑鐵盧之役隔日清早，野戰醫院旁邊就因為截肢而有了手腳成堆的景象。在那些時候，徵召入伍的木匠和屠夫常常給調派到軍醫院，畢竟手術需要'
  merge: -1
  pgno: 302
- img_proc: true
  md: '的不過就是刀鋸，再無其他。


    然而在滑鐵盧之役兩百年後，一切已經截然不同。我們具備各式各樣的藥丸、針劑和複雜的手術，任君挑選，許多在過去必然會造成死亡的疾病和傷口，現在只是小事一件。此外，對於前現代的民眾來說，有許多疾病和疼痛無法可治，只能當作生活中的一部分來接受，但是現在也得以藥到病除。全球人類的平均壽命已經從二十五歲到四十歲，躍升為六十七歲左右，已開發國家的平均壽命更是高達八十歲。75


