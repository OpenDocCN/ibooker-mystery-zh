  md: '法的結，安地斯文化就能記錄大量的數字資料，像是稅收或是財產

    資料。42


    而在數百年、甚至數千年來，對於安地斯山脈當地城市、王國

    和帝國的商業來說，結繩語都是不可或缺的。43結繩語在印加帝國

