  md: '全知者可能是某些偉大的神祇、某個全能的神、或是某些過去的智者，透過經典或口傳，將這些智慧傳給後人。對於尋常百姓而言，重點就是要鑽研這些古籍和傳統，正確加以理解，就能獲得知識。在當時，如果說《聖經》、《古蘭經》或《吠陀經》居然漏了某些宇宙的重大祕密，而這個祕密又居然能被一般血肉之軀的人給發現，這簡直是不可思議的事。


    對古老的知識體系來說，只會承認兩種無知。第一種，「個人」可能不知道某些重要的事。要取得必要的知識，他該做的就是去問問那些更聰明的人，而不是去尋找什麼還沒有人知道的事。例如，如果有一位十三世紀的英格蘭農夫，想知道人類究竟是怎麼來的，他會認為基督教知識體系一定能有明確的答案。所以，他該做的就是去請問當地的牧師。


    第二種無知，是「整個知識體系」可能不知道一些「不重要」的事。就當時的定義來說，偉大的神祇或智者都懶得告訴我們的，一定是不重要的事。例如，假設我們這位英格蘭農民又想知道蜘蛛是怎麼結網的，他去問牧師也沒用，因為任何的基督教經典都不會提到這個問題的答案。然而，這絕對不代表基督教有什麼缺陷，反而是代表蜘蛛怎麼結網這件事根本不重要，人類無須知道。畢竟，上帝一定知道蜘蛛怎麼結網，而如果這件事這麼重要、會影響到人類的繁榮和救贖，上帝怎麼可能不在《聖經》裡面有完整的解釋？


    基督教並不會禁止民眾研究蜘蛛。但研究蜘蛛的學者（如果中世紀歐洲真的有人研究蜘蛛的話）就必須有心理準備，知道自己在社會裡就是處於邊緣角色，而且不管研究結果為何，基督教永遠都是對的。所以，不管學者研究的是蜘蛛、蝴蝶，還是加拉巴哥雀，都只會被視為無關痛癢的事，並不會影響到社會、政治和經濟的基'
