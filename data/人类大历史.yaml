  md: '# 輸送帶上的生命


    工業革命為人類帶來了前所未有的種種能源和原料，不僅種類豐富，而且價格低廉，結果就是讓人類的生產力有了爆炸性的發展。首先引爆、影響也最深的就是農業。一般情況下，我們想到工業革命，腦中浮現的畫面就是一片都市景象、冒著煙的煙囪，或者是一群煤礦工人汗流浹背，深入地底辛苦工作。然而，工業革命最重要的一點，其實在於它就是第二次農業革命。


    過去兩百年間，工業化生產成了農業的支柱。從前得要靠肌肉力量、或是根本做不到的事情，現在都由像是曳引機之類的機器接手。由於有了化學肥料（包括氨）、工業殺蟲劑和各種激素及藥物，無論是農地或是家禽家畜的產量，都大幅躍進。而有了冰箱、船舶和飛機之後，各種農產品能夠保存長達數個月，而且也能快速、廉價的運送到世界的另一頭。歐洲人開始能夠大啖新鮮美味的阿根廷牛肉和日本壽司。


    機械化不只是機器的事，連植物和動物也同樣遭到機械化。差不多就是在以人為本的宗教，將智人提升到神的地位的時候，各種農場上的動物已不再被視為活生生、能夠感受到痛苦的生物，而是被視為機器一般對待。時至今日，這些動物常常是在像工廠一樣的地方，被大規模製造，牠們的身體是依照產業的需求來形塑。這些動物的一生就像是巨大生產線上的齒輪，決定牠們生命長短及生活品質的，就只是各種商業組織的成本和利潤。雖然產業界讓牠們存活、吃得飽、維持基本健康，但卻對牠們的社會和心理需求毫不關心（除非直接影響到生產）。


    舉例來說，蛋雞其實也有各種行為和心理需求，牠們天生會有'
