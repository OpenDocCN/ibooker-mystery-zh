  md: '# 人類大歷史


    念的國家，正打算搬到另一個遠方省份。他的財富主要就是房子和農地，不過這要怎麼帶得走？就算把地全換成了好幾噸的稻米，想要帶走不但十分笨重，很可能還得為此付出一大筆代價。有了金錢概念，就能解決這些問題。農民可以把一大片土地換成一袋貝殼，這下子不管到哪裡，都能方便攜帶。


    正因為有了金錢概念，財富的轉換、儲存和運送都變得更容易、也更便宜，後來才能發展出複雜的商業網路以及蓬勃的市場經濟。要是沒有錢，市場和商業網路的規模、活力和複雜程度，都必然相當有限。


    # 金錢是互信系統


    不管是貝殼或是美元，它們的價值都只存在於我們共同的想像之中。光是它們的化學結構、顏色或是形狀，並無法帶來那些價值。換句話說，金錢並不是物質上的現實，而只是心理上的想像。所以，金錢的運作就是要把「物質上的現實」轉變為「心理上的想像」。不過，究竟為什麼這能成功？原本擁有的是一大片肥沃的稻田，為什麼會有人願意換成一小把根本不實用的貝殼？為什麼有人會願意辛苦煎漢堡排、拉保險、或是幫忙照顧三個精力過剩的小屁孩，只為了換來幾張彩色的紙？


    人們之所以願意如此，正是因為他們接受了這個集體的想像。「信任」正是所有金錢最基本的原料。如果有個富裕的農民賣掉房舍田產、換來一袋貝殼，還帶著這袋貝殼前往遠地的省份，那是因為他相信抵達之後，其他人會願意用稻米、房屋、田地，和他交換這些貝殼。所以，可以說金錢就是一種相互信任的系統，而且還不


    204'
  merge: -1
  pgno: 207
- img_proc: true
  md: '是隨隨便便的某種系統：金錢正是有史以來最普遍、也最有效的互信系統。


    在這種信任的背後，有著非常複雜而長期的政治、社會和經濟網路。為什麼我會相信貝殼、金幣或美元鈔票？原因就在於：我的鄰居都信。正因為我的鄰居都信，所以我也信。而我們都信的原因在於我們的國王也信，國王要求用這些東西來納稅；還有我們的牧師也信，牧師要求用這些東西來繳什一稅。拿一張1美元的鈔票來仔細瞧瞧，會發現這只是一張色彩豐富的紙，一面有美國財政部長的簽名，另一面則寫著「In
    God We Trust」（我們信神）。我們之所以願意接受以美元付款，正是因為我們相信神、也相信美國財政部長。正因為「信任」這件事如此關鍵，就可以知道為什麼金融體系會與政治、社會和意識體系如此緊密相連，為什麼金融危機往往是由政治發展引發，以及為什麼光是股票交易商某個早上的感覺，就能影響股市的漲跌。


    一開始最早發明錢的時候，人們還沒有這種信任，所以要當作錢的事物，本身就得有實際的價值。史上最早的金錢制度是蘇美人的「麥元」制度，就是一個很好的例子。麥元制度的出現時間大約是西元前3000年，與文字出現的時間地點正好相同。前面提過，文字的出現是為了因應行政活動日益頻繁，而麥元的出現則是為了因應經濟活動日漸活絡。


    所謂的麥元，其實也就是大麥，將固定量的大麥穀粒做為通用單位，用來衡量和交換其他各種貨物和服務。當時最普遍的單位是席拉（sila），約等於1公升。當時大量生產了1席拉標準容量的碗，每當人民要買賣東西的時候，就能很方便地量出所需要的大麥數量。另外，薪水也是以席拉為單位，用大麥來支付。每名男工'
