    幾種。這幾種物種只生長在特定的地方，而這些地方也正是農業革

    命的起源地。


    # 植物馴化了智人


    有些學者曾宣稱農業革命是人類的大躍進，是由人類腦力所推

    動的進步故事。他們說演化讓人愈來愈聰明，於是解開了大自然的

    祕密，於是能夠馴化綿羊、種植小麥。等到這件事發生，人類就開

    開心心的放棄了狩獵採集的艱苦、危險、簡陋，安定下來，享受農

    民愉快而飽足的生活。


    但這故事只是幻想，並沒有任何證據顯示人類愈來愈聰明。早

    在農業革命之前，採集者就已經對大自然的祕密瞭然於心，畢竟為

    了活命，他們不得不非常瞭解自己所獵殺的動物、所採集的食物。

    農業革命所帶來的，非但不是輕鬆生活的新時代，反而讓農民過著

    比採集者更辛苦、更不滿足的生活。狩獵採集者的生活其實更為豐

    富多變，也比較少碰上飢餓和疾病的威脅。確實，農業革命讓人類

    的食物總量增加，但量的增加並不代表吃得更好、過得更悠閒，反

    而只是造成人口爆炸，而且產生一群養尊處優、嬌生慣養的菁英份

    子。普遍來說，農民的工作要比採集者更辛苦，而且到頭來的飲食

    還要更糟。農業革命可說是史上最大的一樁騙局。


    誰該負責？這背後的主謀，既不是國王、不是牧師，也不是商

    人。真正的主嫌，就是那極少數的植物物種，其中包括小麥、稻米

    和馬鈴薯。人類以為自己馴化了植物，但其實是植物馴化了智人。'
