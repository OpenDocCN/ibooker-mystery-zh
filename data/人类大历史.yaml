  md: '且就算到了現在，許多天主教的教堂每次週日禮拜，也是用這一套法門，來創造出基督的身體。說穿了，就是講故事，再說服聽眾相信這些故事。以神父主持禮拜為例，這裡關鍵的故事就是天主教會所傳頌的基督降生及死亡。根據這個故事，如果天主教神父穿著聖袍，神態莊重的在對的時間說出對的話語，再平凡不過的麵包和葡萄酒，就會變成神的身體和血。神父大聲宣告「Hoc
