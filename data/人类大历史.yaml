  md: '# # 第12章


    ## 宗教的法則


    歷史古城撒馬爾罕（Samarkand）位於中亞的一片綠洲。中世紀時，這裡的市場上有敘利亞商人，手指撫著滑順的中國絲綢；也有來自東非草原的粗魯部落男子，帶來最新一批頭髮亂如稻草、來自遠西的奴隸；至於店主的口袋裡則滿滿是閃亮的金幣，印有異國的文字和不知哪來的國王肖像。這裡在中世紀可說是南來北往、東西交流的主要十字路口，各方人類的融合在這裡稀鬆平常。


    而在1281年，忽必烈揮軍欲跨海攻擊日本，也看得到相同的情形。蒙古騎兵穿著毛皮，身邊就是中國步兵戴著斗笠，還有高麗來的援軍，與來自南海而有紋身的水手一言不合、打了起來；另外還有歐洲冒險家講著故事，讓來自中亞的工兵聽得張大了嘴。所有這些兵士，都是聽命於同一位帝王。


    於此同時，在麥加聖寺內的卡巴聖堂，人類也以另一種方式融合。如果你在西元1300年前往麥加朝聖，繞行這個伊斯蘭教最神聖的聖地，你可能會發現身邊有美索不達米亞人，他們的長袍在風中飛舞，眼神熾烈而狂喜，嘴裡唸著真神的九十九個大名。就在前'
  merge: -1
