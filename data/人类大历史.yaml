  md: '地也是幾個美國原住民部落的居住地，而有這麼一個故事（或說傳說），講的是太空人有一次碰到一個當地人的情形：


    有一天，太空人受訓的時候，剛好碰到一位頗有年紀的美國原住民。老人問他們在那裡做什麼。太空人說他們屬於一支研究探險隊，不久之後就要上月球了。聽到他們這麼說，老人沉吟了一會，問他們能不能幫個忙。


    「要幫什麼忙呢？」他們問。


    「是這樣的，我們族人都相信我們的聖靈住在月亮上。不知道你們能不能為我們族人帶個重要的口信？」老人問。


    「要帶什麼話呢？」太空人問。


    這位老人用族語說了一串，並要求太空人重複再三，直到確定他們背得滾瓜爛熟為止。


    「這是什麼意思？」太空人問。


    「啊，這個是族人和月亮上的聖靈之間的祕密。」


    等到太空人回到發射基地，好不容易才找到一位會講當地族語的人，希望能翻譯這段話的意思。他們把這段話嘰哩咕嚕背出來，讓這位翻譯簡直笑翻了。等到翻譯好不容易平靜下來，太空人問他這段話究竟是什麼意思。翻譯說，這些太空人費盡心力背下來的這句話是：「不管這些人跟您說什麼，千萬別相信他們。他們只是要來偷走您的土地。」


    # 地圖上的空白


    現代這種「探索與征服」的心態，從世界地圖的演變可以看得一目瞭然。早在歷史進到現代之前，許多文化就已經有了自己的'
  merge: -1
  pgno: 321
- img_proc: true
  md: '世界地圖。當然，當時並沒有人真正知道全世界是什麼樣子，在亞非大陸上的人對美洲一無所知，美洲文化也不知道亞非大陸上的情形。但碰到不熟悉的地區，地圖上不是一筆未提、就是畫上了想像出來的怪物和奇景。這些地圖上並沒有空白的空間，讓人覺得全世界就在自己的掌握之中。


    ![](img/b523907992e2c573126c18fe166aa89d_322_0.png)


    23. 1459年歐洲人的世界地圖。可以看到地圖上似乎巨細靡遺，就算是當時歐洲人根本一無所知的南非地區，都有密密麻麻的資訊。'
  merge: -1
