  md: '都成了壓迫和剝削。在這種新興的合作網路裡，農民交出他們辛苦工作得來的多餘糧食，但帝國的收稅官只要大筆一揮，就可能讓他們一整年的辛勞都化為烏有。像是羅馬著名的圓形劇場，常常是由奴隸所建造，讓有錢有閒的羅馬人，觀賞由奴隸上演的神鬼戰士秀。此外，監獄和集中營也可算是合作網路，要不是有數千名互不相識的人，用了某些方式來管理協調彼此的行動，這些網路根本不可能運作。


    # 《漢摩拉比法典》vs.〈美國獨立宣言〉


    所有這些合作網路，不管是古代美索不達米亞的城市，或是秦朝和羅馬的帝國，都只是「由想像所建構的秩序」。支持它們的社會規範既不是人類的天性本能，也不是人際的交流關係，而是他們都相信共同的虛構神話故事。


    虛構的故事是怎麼支持了整個帝國？我們已經討論過一個這種例子：寶獅公司。現在我們可以來看看另外兩個史上最有名的虛構故事：第一個是大約西元前1776年的《漢摩拉比法典》，可以說是幾十萬古巴比倫人的合作手冊；第二個是西元1776年的〈美國獨立宣言〉，可以說是現代數億美國人的合作手冊。


    在西元前1776年，巴比倫是當時最大的城市，而巴比倫帝國也很可能是當時最大的帝國，子民超過百萬，統治著大半的美索不達米亞平原，包括現代的伊拉克大半地區和部分的敘利亞與伊朗。現今最有名的巴比倫國王就是漢摩拉比，而他有名的原因，主要就在於以他命名的《漢摩拉比法典》。這部法典彙集各種律法和判例，希望將漢摩拉比塑造為一位正義國王的榜樣，做為更一致的法律體'
