  md: '想要解決這方面的爭議、瞭解我們的性慾、社會和政治，就需要更瞭解我們祖先的生活條件，看看從七萬年前的認知革命到一萬兩千年前的農業革命之間，智人究竟是怎麼過生活的。


    # 考古會有偏差


    但遺憾的是，我們對於那些採集者祖先的生活，幾乎沒什麼可確定的事實。無論是「遠古公社」或「不變的一夫一妻制」，都提不出確切的證明。在這些採集者的年代，顯然不會有文字紀錄，而我們的考古證據主要也只有骨骼化石和石器。如果器具用的是木頭、竹子或皮革等等比較容易腐爛的材料，就只有在很特殊的情況下，才可能保存下來。


    很多人以為在農業革命前的人類都只使用石器，其實這是因為考古偏差（archeological bias）造成的誤解。所謂的石器時代，其實說是「木器時代」還比較精確，當時的狩獵採集工具多半還是木製的。


    如果光從目前留下來的文物，推斷遠古的狩獵採集生活，就會差之千里。遠古的採集生活與後來的農業生活和工業生活相比，最明顯的區別在於極少使用人造物品，而且這些人造物品對他們生活發生的作用，相對來說並不大。在現代的富裕社會中，任何人一生都會用到數百萬件人造物品，從車子、房子到拋棄式尿布和牛奶盒不一而足。不管任何活動、信念、甚至情感，幾乎都會有人造物品介入。像在飲食方面，相關的人造品就多到難以勝數，從簡單的湯匙和玻璃杯，到複雜的基因工程實驗室和巨大的遠洋漁船，都軋上一腳。至於玩樂也有大量的娛樂用物品，從怪獸卡到十萬人的體'
