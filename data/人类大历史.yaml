  md: '# 廚房裡的祕密


    量,則是來自太陽。植物靠光合作用,將太陽能轉為有機化合物。由此看來,歷史上人類成就的幾乎所有事情,第一步靠的都是將植物取得的太陽能,轉換為肌肉的力量。


    正因如此,人類歷史在過去一直是由兩大週期來主導:植物的生長週期,以及太陽能的變化週期(白天和黑夜,夏季和冬季)。陽光不足、穀物尚未成熟的時候,人類幾乎沒有能量可用。這時穀倉空空,收稅員無事可做,士兵無力行軍或打仗,各個國王也覺得以和為貴。但等到陽光充足、穀類成熟,農民的收穫堆滿了穀倉,收稅員四處忙著收稅,士兵頻頻操練、磨刀利劍,國王也召集大臣,計畫下一場戰事。這一切的源頭都是太陽能——這時候已經取得並封裝在小麥、稻米和馬鈴薯裡了。


    在這之前的幾千年間,人類每天都面對著能源生產史上最重要的發明,卻總是視而不見。每次有哪個家庭主婦或僕人想要燒水泡茶,或是把裝滿了馬鈴薯的鍋子放在爐子上烹煮,這項發明就這樣大剌剌的呈現在他們眼前。在水煮沸的那一刻,水壺或鍋子的蓋子會開始跳上跳下。這時熱能轉換為動能,但是我們過去都只覺得這樣亂跳有點煩人,至於一時忘記而讓水煮乾,就更麻煩了。沒人注意到這件事的真正潛力。


