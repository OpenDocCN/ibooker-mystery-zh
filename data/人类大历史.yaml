  md: '人類 大歷史


    一點。不過，這只是理想中的狀況。


    計畫的第一部分進行得很順利。人們確實工作得更努力、也更辛苦。但大家沒想到孩子的數量也多了，於是多出的小麥也就有更多小孩要分食。這些遠古的農民也沒想到，母乳餵得少了、粥餵得多了，會讓孩子的免疫力下降，而且永久聚落也成了疾病傳染的溫床。他們也沒有預見到，由於增加了對單一食物來源的依賴，實際上他們使自己更容易受到旱災的威脅。這些農民更沒想到，豐收年他們糧倉滿滿，卻會引來盜賊和敵人，迫使他們得築起高牆，嚴加警戒。


    這樣一來，發現苗頭不對，為什麼不趕快放棄農耕，回到採集生活？部分原因在於，所有改變都必須點點滴滴累積，經過許多世代的時間，才能夠改變社會；等到那個時候，已沒有人記得過去曾有不同的生活方式可選擇了。另一部分，是因為人口增長就像是破釜沉舟。一旦採用農耕之後，村落的人口從100人成長到110人，難道會有10個人自願挨餓，好讓其他人可以回到過去的美好時光？這已經再無回頭路。人類發現時，已經深陷陷阱，無法自拔了。


    於是，種種想讓生活變得輕鬆的努力，反而給人帶來無窮的麻煩；而且這可不是史上的最後一次。就算今天，依然如此。有多少年輕的大學畢業生投身大企業，從事各種勞心勞力的工作，發誓要努力賺錢，好在四十歲就退休，去從事他們真正有興趣的事業？但等他們到了四十歲，卻發現自己背負巨額貸款，要付子女的學費，要住高級住宅區的豪宅，每家得有兩部車，而且覺得生活裡不能沒有高檔紅酒和國外的假期。他們該怎麼做？他們會放下一切，回去野外採果子挖樹根嗎？當然不可能，而是加倍努力，繼續把自己累得半死。


