  md: '睛挖掉，杜絕逃跑的可能。^{29}


    乳品業自有一套方法來強迫動物聽話。乳牛、山羊和綿羊只有生了小牛小羊之後才會產乳，而且也僅限哺乳期這一段時間。想要動物不斷供乳，農民必須讓牠們生下小牛小羊，但又不能讓小牛小羊把奶吸光。所以，整個歷史上常用的方法就是：等到小牛小羊出生後不久，乾脆就全宰了，如此一來人類就能霸占所有牛奶羊奶；等到母牛母羊停乳之後，再讓牠們重新懷胎即可。


    聽來殘忍，但甚至到現在，這種做法仍然十分普遍。在許多現代的酪農場裡，奶牛通常只能活到五歲，就會遭宰殺。這五年中，牠幾乎一直在懷孕。為了維持最大的產乳量，在分娩後大約60天到120天，就要再次受精。至於牠的小牛們，則是一出生沒多久就被帶走，母的被養大成為新一代的奶牛，而公的就進了肉類產業的手裡。^{30}


    另一種方式，是雖然容許小牛小羊接近媽媽，卻用上各種方式不讓牠們喝得太多。最簡單的辦法，是讓小牛小羊開始吸奶，但在奶要流出來之前，就把牠們抱走。可以想見，這種方式會同時受到母親和孩子兩方的抗拒。有些畜牧部落過去的做法，是將小牛小羊宰殺食用，但拿東西塞回空的毛皮做成標本，再送回媽媽身邊，刺激牠們產乳。而在蘇丹的努爾族（Nuer）還更進一步，在標本上塗著牛媽媽的尿液，所以這隻假小牛連聞起來也很像個樣子。努爾族的另一項技術則是在小牛的嘴邊綁上一圈刺，小牛想吃奶就會刺傷牛媽媽，好讓牛媽媽排斥讓小牛吃奶。^{31}


    撒哈拉的圖阿雷格族（Tuareg）養駱駝，過去會將小駱駝的鼻子和上唇的部分穿孔或切除，如此一來，小駱駝只要一吸奶就會疼痛，也就不會喝得太多。^{32}'
