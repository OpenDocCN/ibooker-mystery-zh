  md: '# 人類大歷史


    能夠控制牲畜的生育、挑選牲畜的品種。


    在許多新幾內亞的部落社會裡，想判斷一個人富不富有，就要看他或她有幾頭豬。為了確保豬跑不掉，新幾內亞北部的農民會把豬的鼻子切掉一大塊。這樣一來，每次豬想聞東西，都會造成強烈的疼痛，不但無法覓食，甚至連找路都做不到，於是不得不完全依賴人類主人。在新幾內亞的另一個地區，甚至還習慣直接把豬的眼


