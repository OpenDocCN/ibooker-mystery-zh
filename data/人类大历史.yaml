    在西元1500年，有幾個城市人口已經超過十萬，多數建材使用泥土、木材和稻草；只要有三層樓的建築，就已經算是摩天大樓。街道是有車轍的泥土路，夏天塵土飛揚、冬天泥濘不堪，街上滿滿的是行人、馬匹、羊隻、雞隻，以及少數的運貨馬車。城市裡最常聽到的噪音是人聲和動物聲，偶爾還會聽到錘子和鋸子的聲響。日落時分，城市景觀是一片黑，只有偶爾能見到幾點燭光，或是火把閃爍。如果這種城市的居民看到了現在的臺北、紐約或孟買，他會怎麼想？


