  md: '# ## 科研的恩客


    產主義者來說，死後會如何？資本主義者呢？女權主義者呢？如果想從馬克思、亞當·斯密或西蒙波娃的著作中，找到以上問題的解答，無疑是緣木求魚。唯一讓死亡仍然占據核心的現代意識型態，就是民族主義。在那些絕望到極點、但又充滿詩意的時刻，民族主義就會向人承諾，就算你犧牲了生命，但你會永遠活在國家整體的永恆記憶裡。只不過，這項承諾實在太虛無縹渺，恐怕大多數民族主義者也不知道這究竟說的是什麼意思。


    我們活在一個科技時代。許多人相信：有了科技，就能找出所有問題的解答。只要讓科學家和技術研發人員繼續努力，總有一天我們能在地球上創造天堂。然而，科學活動並不是處於某個更高的道德和精神層面，而是也像其他的文化活動，都受到經濟、政治和宗教利益的影響。


    科學活動所費不貲。如果生物學家想研究人類免疫系統，就需要實驗室、試管、化學藥品和電子顯微鏡，更別提還需要實驗室助理、水電技師和清潔工人。如果經濟學家想模擬金融市場，就得購買電腦、建立龐大的資料庫，還需要開發複雜的數據處理程式。如果考古學家想瞭解古老的狩獵採集行為，就必須長途跋涉、挖掘遺址，還得為所有的骨骼化石和文物標記日期。這一切都需要經費。


