  md: '共同想像之中，任何一個獨立的個體都無力撼動這些概念。就算我自己下定決心不再相信美元、人權和美國，也無法造成任何改變。正因為這些由想像建構的秩序具有互為主體性，若想要改變這些秩序，就得要同時改變數十億人的想法，這絕非易事。想要達到這種大規模的改變，必然需要有複雜的組織在背後協助，可能是政黨、可能是思潮運動、也可能是某個宗教教派。然而，為了建立這種複雜的組織，就得說服許多陌生人共同合作，而這又得靠著他們都相信另一些共同的虛構故事才行得通。由此可見，為了改變現有由想像建構出的秩序，就得先用想像建構出另一套秩序才行。


    舉例來說，想解決掉寶獅汽車，我們就需要想像出更強大的東西，像是法國的法律制度。而想解決掉法國的法律制度，我們又需要想像出更強大的東西，像是法國的國家力量。而如果想解決的是法國，就還得再想像出更強大的東西才行。


    身為智人，我們不可能脫離想像所建構出的秩序。每一次我們以為自己打破了監獄的高牆、邁向自由的前方，其實只是到了另一間更大的監獄，把活動範圍稍稍加以擴大而已。'
