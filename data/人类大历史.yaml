  md: '麼特殊之處，讓他們天生更聰明、更有道德感、也更勤奮。另外，如果你問一個資本主義的忠實擁護者，為什麼贊成財富階級制度？他也很可能告訴你，這正是客觀能力差異帶來的必然結果。這些人認為，有錢人之所以有錢，是因為他們能力更強、工作更認真。這樣一來，有錢人該有更好的醫療保健、更好的教育、更好的營養，也是天經地義的事。這每分每毫，都是他們應得的。


    至於贊成種姓制度的印度人則相信，是宇宙的力量劃分了種姓階級。根據著名的婆羅門教神話，諸神是以原人普羅沙（Purusa）的身體創造了這個世界：他的眼睛化成太陽、他的大腦化成月亮，他的口化成婆羅門（祭司），他的手化成剎帝利（貴族、武士），他的大腿化成了吠舍（農民和商人等平民），而他的小腿則化成了首陀羅（僕人）。如果相信這種說法，那麼婆羅門和首陀羅的社經地位差異就再自然不過，就像太陽和月亮本來就該有所不同。^{45}
    而中國古代的《風俗通義》也記載，女媧開天闢地的時候要造人，一開始用黃土仔細捏，但後來沒有時間餘力，便用繩子泡在泥裡、再拉起來，飛起的泥點也化成一個一個的人，於是「富貴者，黃土人；貧賤者，引繩人也」。^{46}


    然而就我們目前所知，這些階級區別全都是人類想像的產物罷了。不管是婆羅門或是首陀羅，都不是諸神從某個原人的不同身體器官創造出來的。這兩個種姓階級的區別，不過就是大約三千年前在印度北部、由人類發明的一套法律和規範。而亞里斯多德的講法也有問題，奴隸和自由人之間並沒有已知的生物學差異，一切都是因為人類的法律和規範，才讓某些人變成奴隸、某些人變成主人。至於黑人和白人之間，雖然有例如皮膚顏色和毛髮類型之類的客觀生物學差異，但也沒有證據顯示這些差異會影響到智力或道德觀。'
