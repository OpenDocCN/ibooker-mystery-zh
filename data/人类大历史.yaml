  md: '神教不同之處在於：他們相信「惡」也是獨立存在，既不是由代表「善」的神所創造，也不歸神所掌管。二元論宗教認為，整個宇宙就是這兩股力量的戰場，世間種種就是兩方鬥爭的體現。


