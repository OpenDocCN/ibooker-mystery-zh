  md: '太空船其實只是小事，真正會驚天動地的，可能是能夠永遠年輕的半機械人，既不繁衍後代、也沒有性慾，能夠直接和其他生物共用記憶，而且專注力和記性是現代人類的一千倍以上，既不會憤怒、也不會悲傷（因此不會有同情心？），而他們蘊藏的情感和欲望完全是我們智人無法想像的。


