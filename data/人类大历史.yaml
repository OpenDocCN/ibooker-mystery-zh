    # 變成神的這種動物


    在七萬年前，智人還不過是一種微不足道的動物，在非洲的角落自顧自的生活。但就在接下來的幾千年間，智人就成了整個地球的主人、生態系的夢魘。時至今日，智人似乎只要再跨一步，就能進入神的境界，不僅有望獲得永恆的青春，更擁有創造和毀滅一切的神力。


    但遺憾的是，智人在地球上的所作所為，實在沒有太多可令人自豪的事。雖然我們主宰了環境、增加了糧食產量、蓋起城市、建立帝國，還創造了無遠弗屆的貿易網，但是全球生靈的苦難減少了嗎？一次又一次，雖然整體人類的能力大幅提升，但卻不一定能改善個別人類的福祉，而且常常還讓其他動物深受其害。


    在過去的幾十年間，至少就人類的生存條件而言，已有了確確實實的進步，饑荒、瘟疫和戰爭都已減少。然而其他動物的生存條件，卻正在大幅度急遽惡化，範圍前所未見。而且，就算是人類社會相關的改進，也還需要再長時間觀察，才能判斷是否利大於弊、是否能夠延續。'
