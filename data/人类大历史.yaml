  md: '# 第14章


    # 發現自己的無知


    假設有個西班牙農民，在西元1000年沉沉睡去，等到他醒來的時候，已經過了五百年。雖然這時哥倫布的水手已經登上新大陸，但他看看四周的世界，還是會感到十分熟悉。這時的科技、禮儀和國界都有許多不同，但這位做了個李伯大夢的中世紀農民，仍然能有家的感覺。然而，如果是某位哥倫布的水手做了這場大夢，醒來的時候聽到的是二十一世紀的iPhone鈴聲，他會發現自己處在一個完全陌生、無法理解的世界。他很可能會問自己：「這是天堂嗎？還是地獄？！」


    在過去五百年間，人類的力量有了前所未有的驚人成長。西元1500年時，全球智人的人口大約有5億，今天已經到了70億。68人類在1500年生產的商品和服務，總共約合現值2,500億美元，69但今天每年生產的總值約為60兆美元。70在1500年，全人類每天總共約消耗13兆卡路里，但今天每天要消耗1,500兆卡路里。71（看看上述這些數字：人口增加了14倍，生產增加240倍，消耗的能量增加了115倍。）'
