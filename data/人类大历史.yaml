  md: '# 「無知」的革命


    為什麼現代人愈來愈相信，自己能夠靠著研究取得新的能力？又是什麼促成了科學、政治和經濟的結合？本章先著重在現代科學的獨特性，以提供部分解答。接下來的兩章會再探討科學、歐洲帝國、資本主義經濟三者之間如何形成聯盟。


    至少在認知革命之後，人類就很希望能瞭解這個世界。我們的祖先投入大量時間精力，希望能找出支配自然界的法則。然而，現代科學與先前的知識體系有三大不同之處：


    第一、願意承認自己的無知。現代科學的基礎就是拉丁文字首 ignoramus-，意為「我們不知道」。從這種立場，我們承認了自己並非無所不知。更重要的是，我們也願意在知識進展之後，承認過去相信的可能是錯的。於是，再也沒有什麼概念、想法或理論，是神聖不可挑戰的。


    第二、以觀測和數學為中心。承認無知之後，現代科學還希望能獲得新知。方式則是透過蒐集各種觀測數據，再用數學工具整理分析，形成理論。


    第三、取得新能力。光是創造理論，對現代科學來說還不夠。它希望能夠運用這些理論來取得新的能力，特別是發展出新技術。


    科學革命並不是「知識的革命」，而是「無知的革命」。真正讓科學革命起步的偉大發現，就是發現「人類對於最重要的問題其實毫無所知」。


    對於像是伊斯蘭教、基督教、佛教、儒教這些前現代知識體系來說，它們假設世上所有重要的事情都已經為人或為神所知。這些'
