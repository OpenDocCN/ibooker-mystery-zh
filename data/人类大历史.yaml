    最常見的理论，是認為人類語言最為靈活。雖然我們只能發出有限的聲音，但組合起來卻能產生無限多的句子，各有不同的涵義。於是，我們就能吸收、儲存和溝通驚人的訊息量，並瞭解我們周遭的世界。綠猴能夠向同伴大叫「小心！有獅子！」但現代人能夠告訴朋友，今天上午、在附近的河彎，她看到有一群獅子正在跟蹤一群野牛。而且，她還能確切描述出位置，或是有哪幾條路能夠抵達。有了這些資訊，她的部落成員就能一起討論，該怎麼逼近河邊，把獅子趕走，讓野牛成為自己的囊中物。


