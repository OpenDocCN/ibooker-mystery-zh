  md: '人類大歷史


    滿，卻因為人際疏離和生活缺乏意義而深感痛苦？有沒有可能，雖然我們的老祖宗生活條件較差，但因為與家人朋友、宗教和大自然關係緊密，所以反而活得比較滿足？


    近幾十年來，心理學家和生物學家開始用科學方法，來研究快樂的根源。究竟讓人感到幸福快樂的是金錢、家庭、基因，還是美德？首先，得先定義要測量的是什麼。一般對於快樂普遍接受的定義是「主觀感到幸福」。依照這個觀點，快樂是一種個人內在的感受，可能是因為當下直接的快感，或是對於長期生活方式的滿足。而如果這是內在的感受，又要怎樣才能由外部測量呢？一種做法是直接詢問受試者，問問他們的感受如何。所以心理學家和生物學家就請受試者填寫關於幸福感的問卷，再計算相關統計結果。


    一般來說，關於主觀幸福感的問卷會列出各種敘述，再請受試者以0到10加以評分，這些敘述例如「我對自己現在的樣子感到滿意」、「我覺得活到現在非常值得」、「我對未來感到樂觀」、「生活是美好的」。接著研究人員就會計算所有分數，算出受試者整體的主觀幸福感程度。


    這樣的問卷能夠用來瞭解快樂有哪些客觀因素。舉例來說，我們可以研究比較1,000位年收入10萬美元的人，以及1,000位年收入5萬美元的人。假設前者的平均主觀幸福感有8.7分，而後者平均只有7.3分，研究就能合理推論：財富與主觀幸福感呈正相關。說得白話一點，也就是金錢會帶來快樂。用同樣的方法，我們也可以研究民主國家的人是不是真的比獨裁統治下的人民更幸福，或是結婚的人是否比單身、離婚或喪偶的人來得快樂。


    有了這些資料，就能為歷史學家提供比較基礎，讓歷史學家再運用過去關於財富、政治自由度和離婚率的資料來推論。例如，假


    426'
