  md: '2006年,美國海軍水下作戰中心(NUWC)也曾提出計畫,要研發半機械鯊魚。NUWC宣稱:「本中心正研發一種魚用標籤,希望透過神經植入物,控制宿主動物的行為。」鯊魚天生就能夠偵測到磁場,效果比目前所有人類發明的偵測器都靈敏。因此研發人員試圖利用鯊魚的這種能力,偵測到潛艇和水雷形成的電磁場。127


    智人也正在變成半機械人。最新一代的助聽器,有時會稱為仿生耳(bionic ear),外側有一個小麥克風,可以接收外界聲音,經過過濾、識別出人聲,轉化成電波訊號,直接傳遞到聽覺神經,再傳送到大腦。128


    德國的「Retina Implant」(視網膜植入)公司取得政府資金,正在開發一種人工視網膜,可能讓盲人重獲部分視力。做法是將微晶片植入患者眼中,微晶片上的光電池接收到進入眼中的光線後,將光能轉變為電能,刺激視網膜上未受損的神經細胞;神經細胞發出神經衝動,刺激大腦,就會轉譯為視覺影像。目前,這項科技已經讓患者能夠辨識字母、判斷景深,甚至也能夠辨識人臉。129


