    蓋的高樓就再也無力支撐，於是頹然傾塌，而鋼筋混凝土蓋的高樓卻還是屹立不搖，甚至繼續向上伸展到人類目光的極限。


    究竟歐洲在近代初期是培養了什麼潛力，讓它能 在近代晚期稱霸全球？這個問題有兩個答案，相輔相成：現代科學和資本主義。一開始，科學和資本主義的思考方式還沒有什麼明顯優點，但歐洲人就已經習慣順著這兩個理路來思考。所以，等到科技發展成熟，就像是取之不盡的大礦藏，而歐洲人開採這處礦藏的能力，也遠勝於其他地方的人。不難想像，在二十一世紀這個「後歐洲世界」，科學和資本主義就成了歐洲帝國主義最重要的遺產。雖然歐洲和歐洲人不再是世界的統治者，但科學和資本主義還是繼續茁壯。


    關於資本主義的勝利，我們留到下一章再討論。這一章還是先繼續談談歐洲帝國主義和現代科學之間的浪漫愛情故事。


