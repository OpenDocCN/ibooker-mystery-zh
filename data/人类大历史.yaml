  md: '# 密西西比泡沫事件


    隨著十七世紀走向尾聲，由於荷蘭人過於自滿，戰爭成本又過於高昂，讓他們不僅失去了紐約，也無法再維持歐洲金融和帝國引擎的地位。法國和英國成了這個地位的強力競爭對手。一開始，似乎看來法國的贏面較大，畢竟它面積大於英國，更富有，人口也更多，而且軍隊的規模和經驗也勝出許多。然而，最後是由英國贏得了金融體系的信任，而法國只證明自己還不配得到這個地位。


    關鍵的轉捩點是在十八世紀初，歐洲爆發了密西西比泡沫事件（Mississippi Bubble），這是當時歐洲最大的金融危機，法國王室也在這次事件中，臭名遠播。這個故事同樣也是由一間打算建立帝國的股份公司開始。


    1717年，成立於法國的密西西比公司，在美洲的密西西比河下游谷地開拓殖民地，紐奧良（New Orleans）也是在此時開始成形。為了取得這項龐大計畫的資金，這家與路易十五宮廷關係良好的公司，便在巴黎證券交易所上市、出售股份。公司所有人約翰·羅（John
    Law）當時身兼法國中央銀行的總裁，還得到國王任命為總審計長，大約等於現代的財政部長。


    在1717年，密西西比河下游河谷其實大約只有沼澤和鱷魚，但密西西比公司卻撒了漫天大謊，把這個地方描述得金銀遍地、無限商機。許多法國貴族、商人和城市裡那些冷漠的中產階級，都信了這套謊言，於是密西西比公司股價一飛沖天。公司上市的股價是500里弗（livre）。1719年8月1日，股價來到2,750里弗。8月30日，股價已經飆到4,100里弗；9月4日升上5,000里弗。等到12月2'
