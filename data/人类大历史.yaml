  md: '神做這種區分？又為什麼要說身體和物質是惡的呢？畢竟對一神教來說，善神創造了一切，而一切都是美好的。然而，正因為這種二元論的論點可以幫助他們解決「惡的難題」，所以一神教還是忍不住接受了這個概念。於是這種對立的概念，最後也成了基督宗教和穆斯林思想的基石。此外，如果相信有天堂（善神的國度）和地獄（惡神的國度），這也是一種二元論的概念。（《聖經》舊約裡從來沒提過這種概念，也從來沒提到人的靈魂會在身體死去後繼續存在。）


