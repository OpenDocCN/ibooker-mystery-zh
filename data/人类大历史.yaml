    12. 現代化畜牧場裡的小牛。一出生後立即與母親分開，關在不比身體大多少的籠子裡。小牛得在這裡度過一輩子，但牠的一輩子平均也只有大約四個月。牠這一輩子再也不會離開籠子，不會有機會和其他小牛玩，甚至連走路的機會也遭剝奪；這一切都是為了避免牠的肌肉運動，導致肉質變硬。肌肉愈柔軟，牛排就愈鮮嫩、愈多汁。於是，這隻小牛第一次有機會走路、伸展筋骨、遇見其他小牛的時候，也就是在前往屠宰場的路上。就演化而言，牛可能是有史以來最成功的動物之一，牠們的基因組會一直傳衍下去。但同時，牠們也是地球上生活最悲慘的動物之一。


