    在這個歷史的活動場域中，我們石器時代的祖先究竟做過什麼事，就十分重要了。據我們所知，三萬兩千年前刻出施泰德獅人雕像的人類，無論是身體、情感和智力，都與我們類似。但他們一早起床是先做什麼？他們的早餐和午餐吃些什麼？他們的社會是怎樣？他們也是一夫一妻、核心家庭嗎？他們有沒有什麼慶典、道德準則、體育競賽和宗教儀式？他們有戰爭嗎？


    就像是要從時間的簾幕後方，探頭偷瞧一眼，看看從認知革命後、到農業革命之前，這幾萬年的生活情況。'
