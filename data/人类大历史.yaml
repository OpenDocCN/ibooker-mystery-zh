  md: '# 第6章 蓋起監獄高牆


    這種做法讓我們看到的並不是某種個人的欲望，而是他深深堅信浪漫的消費主義。如果是古埃及有錢人和太太吵架，帶著她去巴比倫度個假，絕對不會是選項，反而可能是為她建一座她夢寐以求的華麗陵墓，才會讓她心花朵朵開。


