  md: '# 釋放物質蘊含的力量


    1825年，一名英國工程師將蒸汽機裝到了一輛滿載煤炭的貨車上，讓引擎將這輛貨車沿著鐵軌，將煤炭從礦場送到約二十公里外的港口。這是史上第一臺蒸汽動力火車。想當然耳，既然蒸汽可用於運送煤炭，為什麼不能運送其他商品呢？甚至，為什麼不能載運人呢？1830年9月15日，第一條商業化鐵路開通，連接了利物浦與曼徹斯特，用的同樣是與抽水或紡織相同的蒸汽動力。不過短短二十年後，英國的鐵軌長度已達數萬公里。95


    從此之後，人類就深深著迷於如何使用機器和引擎，轉換各種能量。只要發明出適當的機器，世界上任何地方、任何類型的能量都能為我們所用。舉例來說，物理學家發現原子內儲存著巨大的能量，就開始思考要如何釋放這種能量，用來發電、推動潛艇，或是摧毀城市。從中國煉丹術士發現火藥，到土耳其人用大炮粉碎君士坦丁堡的城牆，之間足足過了六百年。但是從愛因斯坦發現質量可以轉化為能量（也就是E=mc²）之後，僅僅過了四十年，原子彈就已經落在廣島和長崎上空，核電廠也如雨後春筍般遍布全球。


    另一項重要發明是內燃機，僅僅花了不到一個世代的時間，就徹底改革了人類的運輸，也讓石油變成一種液態的政治權力。在這之前數千年，我們早就知道了石油的存在，但只用來為屋頂防水、替軸輪潤滑。就算到了大約一個多世紀前，大家還是認為石油就只有這些用處。說要為石油流血打仗，簡直是笑話。當時為了土地、黃金、胡椒或奴隸打仗，或許天經地義，但為了石油，可是萬萬說不過去。


    至於電力的發展更為驚人。在兩個世紀前，電力對經濟還毫無'
