    # 為什麼是歐洲崛起？


    然而在1850年以前，情況並非如此。當時，產軍學的結合還剛起步，科學革命的科技成果也尚未成熟，歐亞非國家之間的科技差距微乎其微。譬如在1770年，雖然庫克船長的科技肯定遠超過澳洲原住民，但對上中國和鄂圖曼土耳其，卻也占不了上風。那究竟是為什麼，最後征服澳洲的是庫克船長，而不是康熙的福建水師提督萬正色、或是土耳其的名將帕夏（Hussein
    Pasha）？更重要的是，如果歐洲人在1770年對上印度人和中國人並不占科技優勢，為什麼他們能在接下來的短短一世紀間，讓自己和世界其他地區拉開這麼大的差距？


