  md: '# 人類大洪水


    仔細包裝、送至實驗室，接下來，每一根骨骼化石、每一塊糞化石（coprolite，沒想到這也有專有名詞吧）都會受到仔細的研究。一次又一次，這些分析都指向相同的結果：與目前年代最接近的糞球或駱駝骨骼，大概就屬於人類如洪水般襲捲美洲的那段期間，也就是大約西元前一萬兩千年到九千年。只有在唯一一個地方，科學家還能找到更晚近的糞球：在加勒比海群島的幾個島上，特別是古巴和伊斯帕尼奧拉島，年代大約是西元前五千年。這也正是人類第一次成功越過加勒比海，抵達這兩座大島的時間。


    同樣的，有些學者還是試著為智人找藉口，認為這一切都是氣候變遷所造成（但他們就得好好解釋，是什麼神祕的原因，才讓整個西半球氣候暖化的時候，加勒比海群島的氣候卻能硬生生再穩定
    了七千年）。然而就美洲而言，這可說是鐵證如山。我們人類就是罪魁禍首，這點絕對無法迴避。就算氣候變遷也助紂為虐，但人類無疑是整起案件的主謀。23


    如果我們把在澳洲和美洲發生的生物大滅絕，合起來計算，再加上智人在亞非大陸擴張時造成的小規模物種滅絕（包括其他人屬物種的絕跡），還有遠古採集者來到偏遠島嶼（如古巴）帶來的物種滅絕，可能的結論只有一個：智人的第一波殖民，正是整個動物界最大、也最快速的一場生態浩劫。其中受創最深的是那些大型、毛茸茸的動物。


