  md: '是感官的快感或是生命有意義），而想要判斷快不快樂，靠的就是直接問他們的感受。很多人可能覺得這很合邏輯，但這正是現代自由主義當道的結果。自由主義將「個人主觀感受」奉若圭臬，認為這些感受正是權威最根本的源頭。無論是好壞、美醜、應不應為，都是由每個人的感受來確定。


    自由主義政治的基本想法，是認為選民個人最知道好壞，我們沒有必要由政府老大哥來告訴人民何者為善、何者為惡。自由主義經濟學的基本想法，是客戶永遠都是對的。自由主義藝術的基本想法，是各花入各眼，看的人覺得美就是美。崇尚自由主義的學校和大學，叫學生要為自己多想想。廣告叫我們「做就對了！」就連動作片、舞臺劇、八點檔連續劇、小說和流行歌曲，都不斷在向大眾洗腦：「忠於自我」、「傾聽你自己」、「順從你的渴望」。對於這種觀點，盧梭的說法稱得上是經典：「我覺得好的，就是好的。我覺得壞的，就是壞的。」


    如果我們從小到大就不斷被灌輸這些口號，很可能就會相信快樂是一種主觀的感受，而是否快樂，當然是每個人自己最清楚。然而，這不過就是自由主義獨有的一個觀點而已。歷史上大多數的宗教和意識型態認為，關於善、關於美、關於何事應為，都有客觀的標準。在這些宗教和意識型態看來，一般人自己的感覺和偏好並不可信。從老子到蘇格拉底，哲學家不斷告誡人們：「認識你自己！」但言下之意也就是：一般人並不知道自己真實的自我，也因此很可能忽略了真正的快樂。佛洛伊德很可能也是這麼想的。[6]


    > [6] 心理學要研究主觀幸福感，靠的是受試者要能夠正確判斷自己的快樂程度；但矛盾的是，之所以會出現心理學，正是因為人類並不真正瞭解自己，有時候需要藉由專業人士的幫助，以避免做出自我毀滅的行為。'
