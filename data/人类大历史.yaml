  md: '(和女人)有性行為、形成親密關係，而部落裡的所有成年男女則是共同養育部落的小孩。正由於男人都沒辦法確定小孩是不是自己的，對所有孩子的教養也就不會有大小眼的問題。


    這樣的社會結構並不是什麼新世紀的靈性烏托邦，很多動物都有這種社會結構，特別是黑猩猩和巴諾布猿這些我們的近親，更是如此。即使在今日，還是有些人類社會採用這種共同教養制，像是位於委內瑞拉的巴里印第安人（Bari
    Indians）社會，他們相信孩子不是生自某個特定男人的精子，而是媽媽子宮裡所有累積的精子的結合。所以，如果想當個好媽媽，妳就該和好幾個不同的男人做愛，特別是在想要懷孕的時候，就該找上那些最會打獵的、最會說故事的、最強壯的戰士、最體貼的愛人，好讓孩子擁有那些最好的特質（以及最佳的教養）。如果你覺得這聽起來實在太蠢，請記得其實是要到現代胚胎學研究發展之後，我們才有了確實的證據，證明孩子只可能有一個父親。


    這種遠古公社（ancient commune）理論的支持者認為，我們看到現代婚姻常有不孕的困擾、離婚率居高不下、不論大人小孩都常有各種心理問題，其實都是因為現代社會逼迫所有人類採用一夫一妻的核心家庭，而這其實與我們的生物本能背道而馳。7


    許多學者強烈反對這種理論，堅信一夫一妻制和核心家庭就是人類的核心行為。這些學者主張，雖然古老的狩獵採集社會比起現代社會更為平等而共有共享，但還是由獨立的單位組成，每個單位就是一對會嫉妒的情侶、加上他們的孩子。也因為如此，今天多數文化仍然採用一夫一妻的核心家庭，男男女女都對彼此和孩子有強烈的占有慾，而且像是北韓和前敘利亞這些現代的國家，政治權力還是父死子繼。'
