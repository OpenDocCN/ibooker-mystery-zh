  md: '# 第20章


    # 智人末日


    本書一開始，提到我們是從物理學走向化學、走向生物學，然後走向歷史學。而無論是在物理作用、化學反應，或是生物的天擇，都對智人和其他一切生物一視同仁，殊無二致。雖然說在天擇這一塊，智人的發揮空間似乎遠大於其他生物，但畢竟仍然有限。換句話說，不論智人做了多少努力、有多少成就，還是沒辦法打破生物因素的限制。


    然而，就在二十一世紀曙光乍現之時，情況已經有所改變：智人開始超越了這些界限。天擇的法則開始出現破口，而由智慧設計（intelligent design）的法則趁隙而入。


    在將近四十億年的時間裡，地球上每一種生物的演化，都是依循天擇。沒有任何一種生物是由某個具有智慧的創造者所設計的。以長頸鹿為例，牠的長頸是因為遠古時代長頸鹿祖先之間的競爭，而不是因為有某個具有超級智慧的生物，把牠設計成脖子長長的。在長頸鹿的祖先之間，脖子較長的就能夠得到更多食物，相較於脖子短的，也就產下較多後代。沒有人（肯定也沒有長頸鹿）曾經說'
