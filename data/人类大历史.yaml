  md: '影響力，多半只是用來做些神祕的科學實驗，或廉價的魔術把戲。但有了一系列的發明之後，電力就成了我們有求必應的神燈精靈。手指一彈，就能印刷出書本、織出衣服、保持蔬菜新鮮、冰棒不融化，還能煮晚餐、處決死刑犯、記錄我們的想法和笑容、讓夜間亮起燈光，還讓我們有無數的電視節目可看。我們很少有人瞭解電力運作的機制，但更少人能夠想像生活中沒有電力該怎麼辦。


    # 能源的大海汪洋


    工業革命的核心，其實就是能源轉換的革命。我們已經一再看到，我們能使用的能源似乎無窮無盡。講得更精確些，唯一的限制只在於我們的無知。每隔幾十年，我們就能找到新的能源來源，所以人類能運用的能源總量是不斷增加的。


    為什麼這麼多人擔心我們會耗盡所有能源？為什麼他們擔心我們用完所有化石燃料之後，會有一場大災難？顯然，這世界缺的不是能源，而是「能夠駕馭並轉換成符合我們所需」的知識。如果與太陽任一天放射出的能量相比，全球所有化石燃料所儲存的能源，簡直是微不足道。太陽的能量只有一小部分會到達地球，但即使是這一小部分，就已經高達每年3,766,800艾焦（exajoule，exa代表10的18次方，焦耳joule是能量單位，在地心引力下將一顆質量1公斤的蘋果抬升1公尺，所需的能量是9.8焦耳；艾焦是10的18次方焦耳，這可是要抬舉很多很多顆蘋果呦。）⁹⁶
    全球所有植物行光合作用，也只能保留大約3,000艾焦的能量。⁹⁷


    現在，人類所有活動和產業每年約消耗500艾焦的能量，而地球只要大約短短90分鐘，就能從太陽接收到這麼多能量。⁹⁸ 而且，'
