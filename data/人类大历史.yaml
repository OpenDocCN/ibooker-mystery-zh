  md: '本真理。


    事實上，事情永遠沒有那麼簡單。就算是最虔誠、最保守的時代，還是會有人認為，一定有什麼「重要的事」，是「整個知識體系」不知道的。但這種人常常就會被邊緣化或遭到迫害；但也有可能，他們就會開創一個新的知識體系，開始宣稱只有他們才知道所有該知道的事。舉例來說，穆罕默德宗教生涯的第一步，就是譴責他的阿拉伯同胞，說他們對於真正神聖的真理一無所知。但很快的，穆罕默德就宣稱只有自己知道全部的真相，而信眾也開始稱呼他為「先知的封印」（意為最後一位先知）。於是，所有的啟示當然也就是到了穆罕默德為止，再也沒什麼重要的了。


    # 不知為不知，是知也


    現代科學是一套獨特的知識體系，獨特之處就在於公開承認這「整套體系」都對一些「最重要的問題」一無所知。達爾文從來沒有說過自己是「生物學家的封印」、說自己已經完全解開了生命的謎團。經過幾個世紀的大規模科學研究，生物學家承認，他們還是無法完整解釋為什麼大腦能夠產生意識。物理學家也承認，他們不知道什麼引起了宇宙大霹靂，也不知道如何讓量子力學與廣義相對論能夠統合起來。


    也有些時候，因為不斷有新證據出現，各種科學理論也就互相交鋒、戰火熱烈。一個典型的例子，就是究竟哪一種計量經濟模型最好。雖然每個計量經濟學家都可能會說自己的模型最恰當，但每次出現金融危機和股市泡沫，我們就會看到主流改變；目前一般公認，我們還是不知道最佳的計量經濟模型究竟為何。'
  merge: -1
  pgno: 286
- img_proc: true
  md: '還有些時候，因為現有的證據強力支持某些理論形成主流，於是其他理論就遭到冷落。雖然我們一般認定主流理論為真，但每個人也都同意，如果新證據出現而與主流理論相違背，主流理論也就需要修正、甚至是淘汰。


    現代科學願意承認自己的無知，使得它比所有先前的知識體系更具活力、更有彈性，也更有求知欲。這一點大幅提升了人類理解世界如何運作的能力，以及創造新科技的能力。然而，這也給人類帶來一個祖先多半無須面對的嚴重問題。就現在這個體系而言，我們假設自己並非無所不知、現有的知識也並未拍板定案；但這也同樣適用於那些讓數百萬人得以有效合作的虛構故事。如果證據顯示許多這些故事都大有問題，社會豈不是要崩潰了？要怎樣才能讓社會、國家和國際體系繼續維持運作？


    正因如此，現代世界想要繼續維持社會和政治秩序的稳定，只能倚賴兩種不科學的方法，別無其他選擇：


    第一、雖然採用科學理論，但必須違反一般科學的做法，對外宣稱這就是絕對的真理。納粹和共產黨就是採用這種方式，前者聲稱他們的種族政策是來自生物學事實的推論，後者則聲稱馬克思和列寧已經得到了絕對的經濟真理，絕不可能被推翻。


    第二、不採取科學方法，直接訴諸「非科學的絕對真理」。這一直是自由人文主義（見第259頁）的策略。自由人文主義的基礎在堅持主張天賦人權，但很尷尬的是，對智人的科學研究並不認同這種看法。


    但我們也不該太過驚訝。畢竟，科學還是得倚靠種種宗教和意識型態的信仰，才能取得經費，並將研究正當化。


    不論如何，現代文化已經比過去任何文化都更願意承認自己的'
  merge: -1
  pgno: 287
- img_proc: true
  md: '無知。而現代社會之所以還能夠維繫，原因之一就在於對科技和科學研究方法的信任，這幾乎成了類似宗教的信仰，甚至在一定程度上也取代了對「絕對真理」的信念。


    # 科學教條


    現代科學沒有需要嚴格遵守的教條，但研究方法有一個共同的核心：蒐集各種實驗觀測資料（或至少是用我們的感官觀察到的現象），並以數學工具整理。


    人類從歷史一開始，就不斷進行觀察和觀測，但成果常常十分有限。畢竟，如果我們覺得已經有了所有問題的答案，為什麼還要浪費資源進行新的觀測？然而，隨著現代人們開始承認自己在某些非常重要的問題上幾近無知，就會覺得需要尋找取得全新的知識。因此，主流的現代研究方法就會預設舊知識有所不足，而且這時候的重點不在於研究舊的知識體系，而是要強調新的觀測、進行新的實驗。如果現在觀測到的現象與過去的傳統知識體系相衝突，我們會認為現在的觀測結果才是正確的。


    當然，如果是研究遙遠星系的天文學家、研究青銅時期城市的考古學家、或是研究資本主義誕生過程的政治學家，就不會忽略傳統知識體系。他們會研究過去的智者究竟寫了什麼、說了什麼。但不論是想當天文學家、考古學家、還是政治學家，在讀大學的第一年，就會有教授殷切的告訴他們，要把目標放在超越愛因斯坦、施利曼（Heinrich
    Schliemann, 1822-1890）和韋伯（Maximilian Weber, 1864-1920）所告訴我們的知識上。'
  merge: -1
  pgno: 288
- img_proc: true
  md: '# 使用數學語言


    然而，光是觀測並不足以成為知識。為了要瞭解宇宙，我們必須整理各種觀測數據，整理分析成為完整的理論。早期的知識體系常常是用「故事」構成理論，而現代科學用的則是「數學」。


    例如在《聖經》、《古蘭經》、《吠陀經》或是儒家經典裡，我們很少看到有圖表或計算公式。傳統的神話、各家經典裡，講到所謂放之四海皆準的通則，都是用文字敘述，而不是用數學公式。舉例來說，摩尼教提出的基本原則認為：世界是善與惡的戰場，惡的力量創造了物質，善的力量創造了精神，而人類就處於這兩股力量之間，應該從善棄惡。然而，摩尼教的先知摩尼（Mani）並沒有用什麼公式來告訴我們，善惡兩方各自擁有多少力量、人類應該據以做什麼選擇。摩尼從來沒有計算過什麼「作用在人身上的力量，等於精神的加速度乘以身體的質量」。


    但這正是科學家的目標。在1687年，牛頓發表了《自然哲學的數學原理》，這本書可說是劃時代的最重要著作。牛頓在書中提出三大運動定律，只要用三個非常簡單的數學公式，就能夠解釋和預測宇宙中所有物體的運動，包括從樹上掉落的蘋果、或是墜落人間的流星：


    ```

    (1) ∑F = 0

    (2) ∑F = ma

    (3) F₁,₂ = -F₂,₁

    ```'
  merge: -1
