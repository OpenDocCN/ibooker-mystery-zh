  md: '法跟上其他人的腳步,就被拋棄在路旁的樹下。當時樹上還有禿鷹等著想飽餐一頓。但那位男子鼓起精神、霍然痊癒,用輕快的腳步重新回到部落行列。他的身上還沾覆著鳥屎呢,結果綽號從此變成「禿鷹屎」。


