  md: '# 神聖的介入


    常農業部落光靠人數就已經大勝採集部落。這時，採集部落只剩兩種選擇，第一是逃跑，放任自己的獵場成為農場和牧場；第二就是拿起鋤頭，加入農業的行列。無論哪種選擇，都代表舊的生活方式注定將要凋零。


    這個關於奢侈生活陷阱的故事，告訴我們一個重要的教訓。人類一心追求更輕鬆的生活，於是釋放出一股巨大的力量、改變了世界的面貌，但衍生的結果並沒有任何人料想得到，甚至也不是任何人所樂見的。並沒有人在背後操縱農業革命發生，或是意圖讓人依賴穀類維生。一開始只是各種小事，主要就是希望吃飽一點、生活安全一點，但最後累積引起的效應，就是讓遠古的採集者開始花上整天的時間，在烈日之下挑水務農。


    以上這種講法，認為農業革命就是判斷錯誤的結果。確實不無道理，畢竟歷史上還滿是錯得更離譜的例子。不過也還有另一種可能性：或許我們遠古祖先的出發點，並不是為了要讓生活輕鬆點？或許智人是有其他目標，所以自願過得辛苦點，好實現這些目標？


    講到歷史發展，科學家常常會歸咎於某些冰冷的經濟因素和人口因素，畢竟這和他們理性、數學的思考方法比較合拍。但講到現代歷史的時候，因為有大量的書面證據，所以學者不得不考慮非物質的因素，例如意識型態和文化。譬如，我們有足夠的文件書信、回憶錄，證明第二次世界大戰的起因並非糧食短缺或人口壓力。然而，像是納圖芬文化並未留下任何文獻檔案，所以講到遠古時代，唯物主義學派說話總是比較大聲。對於這些文字出現之前的時代，'
