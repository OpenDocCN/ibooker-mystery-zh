  md: '起參與了一項主觀幸福感的研究。早上做完研究之後，露西開車回家，卻被一輛大巴士撞上，讓她多處骨折，一隻腿永遠行動不便。但就在救援人員把她拉出車子的時候，路克打電話來，興奮大叫他中了千萬美元的樂透大獎。於是，在兩年後，露西會是瘸子，而路克會比現在有錢很多。但是如果心理學家兩年後再去做追蹤研究，就會發現他們兩個人的幸福感，並沒有多大的落差。


    目前看來，對快樂與否的影響，家族和地方社群要比金錢和健康來得重要。那些家庭關係緊密、社群互動良好的人，明顯比較快樂。而家庭機能失調、一直無法融入某個社群的人，則明顯比較不快樂。其中，婚姻又是特別重要的一項因素。多項重複研究發現，婚姻美好與感覺快樂，以及婚姻不協調與感覺痛苦，分別都呈現高度相關。而且，不論經濟狀況或是身體健康如何，情況都是如此。


    所以就算是貧窮而有病在身的人，如果身邊有愛他的另一半、愛他的家人、願意支持他的社群，他就可能比一個孤單無伴的億萬富翁，感覺更幸福快樂。（當然，前提是這個人不能真的窮到無法生活，而他的疾病也不會不斷惡化、或讓他持續感受疼痛。）


    這樣一來，我們就得考慮一種可能性。雖然過去兩世紀間，人類在物質條件上有了大幅改善，但因為家庭崩潰、社會失調，所以兩者的作用很可能互相抵消。如果真是如此，現在的人並不見得比1800年更快樂。甚至是我們現在如此看重的「自由」，也可能是讓我們不那麼快樂的原因：雖然我們可以自己選擇另一半、選擇朋友、選擇鄰居，但他們也可以選擇離開我們。現代社會每個人都擁有了前所未有的自由，能夠決定自己要走哪條路，但也讓我們愈來愈難真正信守承諾，不離不棄。於是，社群和家庭的凝聚力下降、逐漸解體，這個世界便讓我們感到愈來愈孤獨了。'
