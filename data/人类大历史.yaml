  md: '# 第10章


    # 金錢的氣味


    1519年，墨西哥原本還是遺世獨立的人類社會，但來自西班牙的殖民者科爾特斯（Hernán Cortés）一行人大舉入侵。這裡的原住民自稱阿茲特克人，很快就發現：這些外來的西班牙人看到某種黃色金屬，眼睛就為之一亮，思思念念，三句不離。阿茲特克人也不是不懂黃金。黃金色澤美麗、又容易加工，所以他們常用來製作首飾和雕像。阿茲特克人偶爾也用金粉來交易，但一般想買東西的時候，通常還是用可可豆或布料來付帳。所以，看到西班牙人對黃金如此痴迷，令他們一頭霧水。畢竟，黃金不能吃、不能喝、不能織，想當作工具或武器，質地又太軟，究竟為什麼西班牙人如此為之瘋狂？面對當地人的疑惑，科爾特斯表示：「我們這群人有一種心病，只有金子能醫。」51


    對於這些西班牙人出身的亞非世界來說，對黃金的痴迷還確實是一種流行病。就算是最針鋒相對的死敵，都同樣貪戀這種黃色金屬。在入侵墨西哥的三個世紀前，科爾特斯一行人的祖先，曾對伊比利亞半島和北非的穆斯林王國發動一場血腥的宗教戰爭。基督和'
