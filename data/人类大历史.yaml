    假設有一艘現代戰艦回到了哥倫布的時代，只要幾秒鐘就能摧毀整支哥倫布的船隊，更能輕鬆擊沉當時所有世界強權的海軍，自己連個刮痕都不會有。只要有五條現代的貨櫃船，就能承載當時全世界所有船隊所運的貨物。72
