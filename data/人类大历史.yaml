  md: '人類大歷史


    但就算是 mastermind，總也不能什麼事都自己來，所以到了譯本就換譯者這個 accomplice 上場作戲，如同說書，照著話本再說個一回。讀者看到的大致是作者的想法概念，但外表文字總是譯者所為。任何的語言轉換總有那些細微的差異，要求原文譯文殊無二致，自然絕無可能。譯者只能視實際情況和現有能力，盡力完成作者一開始的策劃，傳達書中的想法，將譯稿呈現在讀者面前。


    正因為這種主謀和同夥的關係，如果作者能和譯者多多溝通、緊密合作，自然是大有助益。而 Yuval 和其他作者最不同之處，在於一開始他就寫了一封信，除了提醒各種翻譯難處，更直言「如果譯者／編輯覺得書中有某個段落，對於目標讀者來說可能難以理解，可以直接做必要修改，或是請聯絡我，讓我們一起想辦法解決」。另外也提到，如果翻譯過程有任何疑問，都可直接和他聯絡求證。


    作者如此上道，譯者當然也就撿落去，除了看過作者線上課程所有內容，雙方還來回三十多封信，討論書中語義和語用的問題，像是台灣讀者對聖經故事、愛麗絲和羅賓漢熟不熟、非洲小米到底是什麼米、某些人名該怎麼拼、菩薩算不算是人、保甲制的流變、華倫斯坦的例子可以換成誰、一句該是幾天等等，在彷彿朋友聊天的氣氛中，解決許多翻譯的難題。或許，這也算是另一種好的狼狽為奸、長短互補？


    現在成品終於出爐，希望讀者閱讀的過程也能如我一般感到興奮及讚嘆。如果覺得有什麼不足，自然不是 mastermind 的問題，很有可能只是 accomplice
    不夠力的緣故。


