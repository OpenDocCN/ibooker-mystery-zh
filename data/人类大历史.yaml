  md: '而是DNA資料？雇主有權歧視DNA看來較差的求職者嗎？而像這樣的「基因歧視」，我們可以提告嗎？腦機介面公司能不能創造出一種新的生物、或是新的器官，再申請其DNA序列的專利？我們都認同某個人可以擁有某隻雞，但我們可以完全擁有某個物種嗎？


    事實上，以上種種都還只是小巫，真正的大巫是吉爾伽美什計畫（見第297頁）以及未來創造出超人類的可能，將會為人類的倫理、社會和政治秩序帶來巨幅改變。不論是〈世界人權宣言〉、全球各地的政府醫療方案、全民健保方案、甚至是憲法，都認為人道社會應該讓所有成員擁有公平的醫療待遇，並且維持相對良好的身心健康狀態。如果醫療只是要預防疾病、治療疾病，這一切看來再好不過。但如果醫藥的目的變成要提高人的能力，情況會有何不同？是讓所有人類都能提升能力嗎？還是只有少數菁英能夠享有超人的能力？


    我們這個現代世界，是有史以來第一次認為所有人類應享有基本上的平等，然而我們可能正準備要打造出一個最不平等的社會。縱觀歷史，上層階級總是說自己比下層階級更聰明、更強壯、更優秀。他們過去通常只是在自欺欺人，貧苦農家的孩子智力很可能和王子也相去不遠。然而，在新一代醫藥推波助瀾下，上層階級的自命不凡，可能即將成為一種客觀的事實。


    這不是科幻小說的情節。在大多數的科幻小說裡，講的是像我們一樣的智人，擁有光速太空船和雷射槍之類的先進科技。這些小說裡的倫理和政治難題，多半和我們的世界如出一轍，只不過是把我們的情感和社會問題搬到未來的場景重新上演。然而，未來科技的真正潛力並不在於改變什麼車輛或武器，而在於改變智人本身，包括我們的情感、我們的欲望。'
