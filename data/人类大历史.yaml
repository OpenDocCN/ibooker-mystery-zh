  md: '# 瞎拚的年代


    更多鋼鐵、製作出更多服裝、興建出更多建築物,還製造出令人瞠目結舌、超出想像的各種產品,像是燈泡、手機、數位相機和洗碗機。人類有史以來第一次,生產超出了需求。也正因為如此,產生了一個全新的問題:誰要來買這些產品?


    現代資本主義經濟如果想要存活,就得不斷提高產量,很像是鯊魚,如果不一直游動、讓水通過鰓裂,就會窒息。然而,光是生產還不夠。生產出來之後,還得有人買,否則工廠都得關門大吉。為了避免這種災難,確保不管什麼新產品都有人買帳,就出現了一種新的倫理觀:消費主義。


    有史以來,人類的生活多半頗為困窘,因此「節儉」就成了過去所高喊的口號,像是清教徒或斯巴達,都以簡樸律己而聞名。所以如果是正直的人,就該避免奢侈、從來不浪費食物,褲子破了該縫縫補補,而不是去買件新的。只有王公貴族,才能公然把這種價值觀拋在一旁,大剌剌炫耀他們的財富。


    然而,消費主義的美德就是消費更多的產品和服務,鼓勵所有人應該要善待自己、更寵愛自己,就算因為過度消費而慢慢走上絕路,也在所不惜。在這裡,節儉就像是一種應該趕快治療的病。我們很容易就能找到各種鼓勵消費倫理的例子,你我身邊屢見不鮮。像我本人最愛的早餐穀片,製造商是以色列的泰爾瑪(Telma),它的盒子背面就寫道:


