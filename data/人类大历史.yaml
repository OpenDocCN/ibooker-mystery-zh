  md: '欣賞好音樂和好藝術，但他們就是沒能感受到爪哇、蘇門答臘、麻六甲這些地方人民的痛苦。隨著現代經濟的成長，全球各地還有無數的大小罪惡和災難，因為人類的貪婪和冷漠，正在持續上演。


    # 經濟大餅能無限制變大嗎？


    時間到了十九世紀，但資本主義的道德觀並未改善。工業革命風潮席捲歐洲，讓銀行家和資本家荷包滿滿，卻讓數百萬計的勞工落入赤貧。至於在歐洲殖民地，情況更是慘不忍睹。


    1876年，比利時國王利奧波德二世，成立了一個非政府人道組織，宣稱目的是要探索中非，並打擊剛果河沿岸的奴隸貿易。同時該組織也表示會修築道路、興建學校和醫院，為當地居民改善生活條件。在1885年，歐洲列強同意將剛果盆地大約230萬平方公里的土地，撥給該組織管理使用。這片土地足足有比利時國土75倍大，從此稱為剛果自由邦（Congo
    Free State）。只不過，從來沒有人問過這片土地內，足足有兩、三千萬人民的意見。


    在很短的時間內，這個所謂的人道組織就成了商業機構，真正的目的只是成長和獲利。他們壓根就忘了學校和醫院這回事，整個剛果盆地遍布著礦場和農場，多數由比利時官員掌控，而且無情的剝削著當地人民。


    最惡名昭彰的就是橡膠產業，當時橡膠迅速成為產業大宗商品，橡膠出口也成了剛果最重要的收入來源。負責蒐集橡膠的非洲村民，被規定上繳的產量愈來愈高，而且一旦少繳，就會被斥為「懶惰」，遭到嚴厲懲罰。有時候是把他們的手臂砍掉，有時候甚至全村的人都遭到屠殺。就算是最保守的估計，從1885年到1908'
