    正因為人類的期望如此關鍵，想要瞭解快樂這件事的歷史，就不能不檢視各種期望的影響。如果快樂只受客觀條件影響（例如財富、健康和社會關係），要談快樂的歷史也就相對容易。但我們知道快樂有賴於主觀的期望之後，歷史學家的任務也就更為艱巨了。


    對現代人來說，雖然有各種鎮靜劑和止痛藥任我們使用，但我們愈來愈期望能得到舒適和快感，也愈來愈不能忍受不便和不適。結果就是我們感受到的痛苦程度，可能還高於先人。'
