  md: '在腹部的育兒袋中哺乳照顧。有袋哺乳動物在非洲和亞洲幾乎無人知曉，但牠們在澳洲可是最高的統治階層。


    但不過幾千年後，所有這些巨大的動物都已消失殆盡。在澳洲當時24種體重在50公斤以上的動物中，有23種都慘遭滅絕，18 許多比較小的物種也從此消失。整個澳洲的生態系食物鏈重新洗牌，這也是澳洲生態系數百萬年來最重大的一次轉型。智人是不是罪魁禍首？


    # 罪名成立


    有些學者試著為人類脫罪，把這些物種滅絕的責任推給氣候變遷（常常都是靠它來頂罪）。但要說智人完全無辜，實在難以令人置信。澳洲巨型動物滅絕，有三大證據顯示氣候很難成為藉口，而指向人類難辭其咎。


    第一點，雖然澳洲氣候確實在四萬五千年前有一場改變，但規模幅度並不大。光是這樣小小的氣候變遷，實在很難相信能造成如此大規模的滅絕。我們現在常常把很多事情都推給氣候，但事實是地球的氣候變遷從未停歇，每分每刻都在變化，歷史上不管哪個事件，多少都會碰上一些氣候變遷的情況。


    特別是地球早就有過許多次的冷卻和暖化循環。在過去百萬年間，平均每十萬年就有一次冰河期，上一次冰河期大約是七萬五千年前到一萬五千年前，而且並不特別嚴重，兩次高峰分別在大約七萬年前和兩萬年前。然而，澳洲巨大的雙門齒獸早在一百五十多萬年前便已出現，活過了至少十次的冰河期，甚至連七萬年前的那次冰河期高峰也安然無恙。那麼，為什麼到了四萬五千年前就突然滅'
