  md: '# 神是唯一


    隨著時間過去，某些多神教徒開始對自己的某位神靈愈來愈虔誠，也慢慢遠離了基本的多神信仰，開始相信只有那位神靈是唯一的神，相信祂是宇宙的最高權柄。不過，他們還是認為神有私心和偏見，讓人類可以和神談談條件。於是，在這種背景形成的一神教裡，信徒就能夠直接祈求宇宙至高無上的權力，來幫忙治病、中樂透、或是打贏戰爭。


    目前所知的第一個一神教，出現於西元前1350年，埃及法老阿肯那頓（Akhenaten）宣布，當時在埃及眾神裡，位階並不高的小神阿頓（Aten）其實是宇宙至尊。阿肯那頓將他對阿頓的崇拜，制度化為國教，還打算打壓民眾對其他神的崇拜。然而，阿肯那頓的宗教革命並未成功。阿肯那頓去世後，獨尊阿頓的信仰就遭到廢黜，又回到過去的情形，眾神同列仙班。


    不論在何處，多神教都不斷衍生出各種一神教，但由於這些宗教無法放下唯我獨尊的中心思想，所以一直只能處於邊陲地位。以猶太教為例，仍然認為全宇宙至高的神還是有私心和偏見，而且關愛的眼神全在一小撮猶太民族和以色列這蕞爾之地。於是對其他國家來說，信奉猶太教幾乎是有弊而無利，而且猶太教一直也沒有到其他地方宣教的打算。這種階段可以稱為「本地一神教」。


    到了基督宗教，終於有了重大突破。基督宗教一開始只是猶太教的一支神祕教派，想說服猶太人，拿撒勒人耶穌就是他們期待已久的彌賽亞。這個教派最早的領導者之一，是來自大數（Tarsus）的保羅，他認為宇宙的至高神有私心偏見，但對人類並非漠不關'
  merge: -1
  pgno: 247
- img_proc: true
  md: '心，祂甚至化為肉身，為了人類的救贖被釘死在十字架上，這種事不該只有猶太人知道，應該要讓全人類都瞭解。於是，就有必要將關於耶穌的好事（也就是福音），傳到世界各地。


    保羅的這個想法開枝散葉，基督徒開始組織起了對所有人類的傳教活動。而在一場史上最意想不到的轉折下，這個猶太神祕教派接掌了強大的羅馬帝國。


    基督宗教的成功，在七世紀的阿拉伯半島成了另一個一神教的典範：伊斯蘭教於焉而生。就像基督教，伊斯蘭教一開始也只是地球上某個偏遠角落的小宗教，但它以更意想不到、更快速的腳步，打破了阿拉伯沙漠的隔絕，收服了幅員從大西洋一直延伸到印度的龐大帝國。自此之後，一神信仰就在世界歷史上扮演了重要角色。


    ![](img/b523907992e2c573126c18fe166aa89d_248_0.png)


    地圖4：基督教和伊斯蘭教的傳播'
