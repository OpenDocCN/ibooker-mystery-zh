  md: '# 綜攝的宗教


    就是有善惡兩股力量在拉扯，它們拉扯的基礎是什麼律令？舉例來說，如果說兩國交戰，基礎就在於它們存在於同一個時空，而且受同樣的物理定律規範。譬如巴基斯坦發射地對地飛彈，也能打到位於印度的目標，那是因為物理定律對交戰雙方都同樣適用。但如果我們說的是善與惡的互鬥，現在又有什麼律令來規範？這些律令又是誰訂出來的呢？


    相對而言，雖然一神論難以處理「惡的難題」，但要處理「律令的難題」卻是輕而易舉：這個律令就是唯一的神訂定的！


    其實，有一種解釋能夠同時處理這兩大難題，而且完全合乎邏輯：世上確實有某個全能的神創造了全宇宙，而且祂就是惡神！


