  md: '追蹤研究發現，這些猴子孤兒雖然得到了所有必需的營養，長大之後卻有嚴重的情緒失調。牠們無法融入猴群的社會，與其他猴子溝通有問題，而且一直高度焦慮、好鬥成性。結論顯而易見：除了物質需求之外，猴子必然還有種種心理需求和欲望，如果未能滿足這些需求，就會產生嚴重的負面影響。


    在接下來的幾十年間，許多心理學研究都證實這項結論不僅適用於猴子，對其他哺乳動物和鳥類也同樣適用。但在目前，數百萬的家禽家畜與哈洛的猴子處於同樣的水深火熱之中，飼養者常常將幼畜幼禽與母親分開，單獨飼養。102


    如果將所有數字加總，全球隨時都有數十億隻家禽家畜，就活在工廠生產線上，而每年宰殺總數更達到百億。採用工業化的禽畜飼養方式後，各種蛋奶肉類的生產量和人類糧食儲備量大幅增長。像這種工業化的畜牧業，再加上農作物栽植的機械化，就構成了整個現代社會經濟秩序的基礎。


    在農業工業化之前，農地和農場生產的食物，大部分得「浪費」在供給農民和農場上的動物食用，只剩下一小部分能供給其他工匠、教師、神職人員和官僚。因此在當時，農民在幾乎所有的社會裡，都占了總人口九成以上。隨著農業工業化，只需要愈來愈少的農民數量，就足以養活愈來愈多的辦公人口和工廠人口。例如現在的美國，只有2%的人口以農業為生，103
    但僅僅就是這2%，不僅養活了整個美國的人口，還有剩餘糧食出口到世界各地。如果沒有農業工業化，就不會有足夠的人力來辦公思考和從事工廠勞動，也就不可能有都市裡的工業革命。


    正是因為農業釋放出數十億的人力，由工廠和辦公室吸納，才開始像雪崩一樣有各種新產品傾瀉而出。比起以前，人類生產出'
