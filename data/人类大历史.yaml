  md: '# 生物學革命


    係，就和一般常見而自然的共生關係十分相似。智人等於是對雞隻施加了特定的選擇壓力，讓又肥又慢的雞特別能夠繁衍下來；就像蜜蜂採蜜授粉的時候，也是對植物施予了選擇壓力，讓花朵色彩鮮豔的品種更能生生不息。


    然而時至今日，這個四十億歲的天擇系統卻面臨了一項完全不同的挑戰。在全球各地的實驗室裡，科學家正在改造各種生物。他們打破天擇的法則而絲毫未受懲罰，就連生物最基本的原始特徵也完全不看在眼裡。巴西生物藝術家卡茨（Eduardo
