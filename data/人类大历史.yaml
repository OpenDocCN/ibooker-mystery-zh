  md: '聊，想要自己寫首詩，客觀條件也不允許。最早的蘇美文字只能部分表意，而無法完整表意。所謂完整表意（full script），指的是這套符號能夠大致完整表達出口頭語言；這樣一來，就能表達一切人類口傳的內容，包括詩歌。但另一方面，所謂部分表意（partial
    script），就是指這套系統只能呈現特定種類的資訊、局限於特定領域的活動。舉例來說，拉丁文、古埃及象形文字和盲人點字都能夠完整表意，不論是稅籍、商事法、菜單、情詩、史書，全部難不倒它。相較之下，最早的蘇美文字就像是現代的數學符號和音樂符號，只能部分表意。例如數學符號雖然能用來計算，但要寫情詩就做不到了。


    ![](img/b523907992e2c573126c18fe166aa89d_148_0.png)


    雖然部分表意的文字系統無法完整傳達人類的口語，但也能表達一些不在口語範圍內的意義。像是蘇美文字、數學符號，雖然不能拿來寫詩，但講到記帳收稅，可是效率一流。'
