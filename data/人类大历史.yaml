    所謂生物工程，指的是人類刻意進行在生物層次的干預行為，例如植入基因，目的在改變生物的外形、能力、需求或欲望，以實現某些預設的文化概念，例如卡茨心目中的那種藝術。


    到目前為止，生物工程本身並不算是什麼新的概念。人們數千年來就一直使用生物工程，來重新塑造自己和其他生物。一個簡單的例子是閹割。在英文裡，未閹割的公牛稱為bull，閹割後的稱為ox，這種將牛閹割的做法已經有大約一萬年之久，閹割後的牛比較不具鬥性，也就比較容易訓練來拉車。此外，也有一些年輕男性遭閹割，好培養可唱出女高音優美聲調的假聲男高音，或是能夠協助'
