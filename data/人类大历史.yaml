  md: '# 譯後記


    林俊宏


    先說結論：這本書太有意思，很可能大大改變你對人類、信仰、歷史、世界的想法，開始反思自己的生活，也再次反省人類與其他生物的生命意義。


    譯這本書的時候，一直想到 mastermind 和 accomplice 這兩個詞。前者是 master + mind，大師心靈，但常常指的是那種高等級的犯罪者，能夠將人玩弄在股掌之間。後者則是個共犯幫兇，在旁邊幫忙把事情搞定。但當然這裡要講的不是黑道，而是作者與譯者的關係。


    先說 mastermind。當譯者的都知道，如果作者有趣、內容精采，譯書可說是一場享受。而如果作者無趣、內容乾硬，那只能說是生不如死。書籍不合胃口，一般讀者冷笑兩聲就能揚長而去，但譯者可得和它日夜相伴，一邊打字一邊幹譙。特別有時候，作者自以為是的（不）幽默，更可能讓譯者得盡力抑制翻白眼的衝動。然而，Yuval（這似乎有裝熟的嫌疑？請待稍後分曉）這位大師絕對不是這種作者，全書布局精妙，不疾不徐的將各個人類事件重新呈現詮釋，讓人彷彿在歷史的「樹」和「林」之間往來穿梭，見小而不失大，直有暢快之感。每譯到一章結束，總是滿足的鬆了一口氣，覺得自己又長了見識、開了眼界。


