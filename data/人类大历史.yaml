  md: '看到人不分男女老幼，不僅三不五時受到戰爭和瘟疫等災難襲擊，還無法免於種種焦慮、沮喪和不滿的情緒，似乎這一切都是人生難以避免的事。人類追求財富和權力，取得知識和財富，生兒育女，建起宮殿和房屋。但不論取得多少成就，卻仍然無法滿足。窮人夢想著要變富，有一百萬的想要兩百萬，有兩百萬的想要一千萬。而且就算真的有錢了、有名了，他們還是不滿意，還是有無盡的煩惱和憂慮，無法從生老病死中解脫。至死，一切如夢幻泡影消失，生命就像是毫無意義的追尋。然而，這個輪迴該怎樣才能跳出？


    在二十九歲時，釋迦牟尼半夜離宮，拋下了財富家人，流浪走遍印度北部，希望為這一切痛苦尋找出路。他前往各個修院修行，聆聽各個大師講道，但還是無法完全感到解脫。可他並未絕望，決心反求諸己，直到找到徹底解決的法門為止。他入禪六年，思索人類各種苦痛的本質、原因和解決方式。最後他體會到，一切苦難並非來自厄運、社會不公或是神祇的任性，而是出於每個人自己心中的思想模式。


    釋迦牟尼認為，人遇到事情通常就會產生欲念，而欲念總是會造成不滿。遇到不喜歡的事，就想趕開；遇到喜歡的事，就想維持並增加這份愉快。但正因如此，人心就永遠不滿、永遠不安。這點在碰上不悅的時候格外明顯，像是感覺疼痛的時候，只要疼痛持續，我們就一直感到不滿，用盡辦法想要解決。然而，就算是遇上歡樂的事，我們也從來不會真正滿足，而是一直擔心這種歡樂終將結束、或是無法再持續或增強。有些人多年來一直在尋找愛情，但等到真的找著了愛情，卻還是不滿足。有的人開始整天擔心對方可能會離開；有的又覺得自己太過屈就，應該再找更好的人（而且，我們知道別人也會這樣心猿意馬，也會這樣盤算）。'
