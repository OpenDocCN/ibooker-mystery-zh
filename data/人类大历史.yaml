  md: '人類大歷史


    但很顯然，這還不是故事的全貌。除了帝國之外，還有其他因素支持著科學的發展。而且，歐洲各個帝國能夠蓬勃興盛，原因也不僅僅是科學而已。不論是科學或帝國，它們能夠迅速崛起，背後都還潛藏著一股特別重要的力量：資本主義。


    要不是因為商人想賺錢，哥倫布就不會抵達美洲，庫克船長就不會抵達澳洲，阿姆斯壯也就沒辦法在月球上跨出他那重要的一小步。'
