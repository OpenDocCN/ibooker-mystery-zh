  md: '直到1618年，歐洲人開始發現楔形文字。當時西班牙在波斯的大使前往古代城市波斯波利斯（Persepolis）的遺跡參觀，看到了這些文字，而且居然沒有人能向他解釋。歐洲學者口耳相傳，知道發現了一種未知的文字，讓他們好奇心大作。1657年，歐洲學者發表了第一份來自波斯波利斯的楔形文字抄本。後續的抄錄愈來愈多，接下來的兩個世紀間，許多西方學者都為了試圖破譯而大傷腦筋，但都沒有人成功。


    直到1830年代，一名英國軍官羅林森（Henry Rawlinson）被派往波斯，協助波斯以歐洲的方式來訓練軍隊。羅林森於閒暇時間，在波斯四處遊覽。某天，當地嚮導帶他來到札格羅斯山脈的一處懸崖，讓他看看巨大的貝希斯敦銘文（Behistun
    inscription）。這則銘文大約高十五公尺、寬二十五公尺，是在大約西元前500年由波斯國王大流士一世下令刻在這處懸崖上，而且分別使用了三種楔形文字：古波斯文、埃蘭文（Elamite）和巴比倫文。雖然當地民眾人人都知道有這處銘文，但沒人讀得懂。羅林森相信，只要能破譯這些文字，他和其他學者就能夠瞭解，當時在中東各地大量出土的文字究竟是什麼意思，將可說是打開了一扇大門，能夠前往遠古被遺忘的世界。


    想要破譯這些文字，第一步就是要能精確的加以抄錄，好傳回歐洲。於是，羅林森冒著生命危險，爬上這處懸崖，把這些奇怪的字母全部抄了下來。他也雇用幾位當地民眾，其中特別是一個庫德族的男孩，得爬到那些最難抵達的地方，好抄下銘文的上半部。1847年，這項完整並準確的抄錄終於完成，送往歐洲。


    羅林森並未就此滿足。雖然他身為軍官，有軍事和政治上的任務要完成，但一到空暇時刻，他就不斷研究這份神祕的文字，想方'
