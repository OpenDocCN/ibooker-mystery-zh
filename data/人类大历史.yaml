  md: '# 智人現身


    了大約不過是五百年前，科學革命（Scientific Revolution）可以說是讓過往的歷史告一段落，而另創新局。這本書的內容，就是在描述這三大革命如何改變了人類和周遭的生物。


    事實上，人類早在史前就已存在：早在兩百五十萬年前，就已經出現了非常類似現代人類的動物。然而，即使經過世世代代的繁衍，他們與共享棲地的其他生物相比，也沒什麼特別突出之處。


    如果到兩百萬年前的東非逛一逛，你很可能會看到一群很像人類的生物：有些媽媽一邊哄著小嬰兒、一邊還得將玩瘋的小孩抓回來，忙得團團轉；有些年輕人對社會上種種規範氣憤不滿，也有些垂垂老矣的老人家只想圖個清靜；有肌肉猛男撻著自己的胸膛、只希望旁邊的美女能夠垂青；也有年長充滿智慧的大家長，對這一切早就習以為常。這些遠古時期的人類已懂得愛和玩樂，能夠產生親密的友誼，也會爭地位、奪權力。


    不過，這些天性和黑猩猩、狒狒、大象也沒什麼不同。這些遠古人類，和一般動物比起來就是沒什麼特別。他們萬萬沒有想到，他們的後代有某一天竟能在月亮上漫步、分裂原子、瞭解遺傳密碼，還能寫寫歷史書。說到史前人類最重要的一件事，就是他們在當時根本無足掛齒，對環境的影響也不見得比大猩猩、螢火蟲或是水母來得多。


    生物學家把所有生物劃分成不同的物種（species，簡稱種）。而所謂屬於同一物種，就是牠們會彼此交配、能夠產出有生殖力的下一代。例如馬和驢，雖然有共同的祖先、也有許多類似的身體'
  merge: -1
  pgno: 13
- img_proc: true
  md: '特徵，也能夠互相交配，但牠們彼此卻是性趣缺缺，就算刻意讓牠們交配，產出的下一代會是騾，而不具有生育能力。因此，驢的DNA突變就不可能會傳給馬這個物種，馬的也不會傳給驢。於是我們認定馬和驢屬於兩個不同的物種，各有各的演化路徑。相較之下，雖然鬥牛犬和西班牙獵犬看來天差地遠，卻屬於同一物種、有一樣的基因池。牠們很願意互相交配，而且牠們的小犬長大後，也能再和其他狗交配、子孫滿堂。


    從同一祖先演化而來的不同物種，會屬於同一個屬（genus）。例如獅子、老虎、豹和美洲豹，雖然是不同物種，但都是「豹屬」（Panthera）。生物學家用拉丁文為生物命名，每個名字由兩個字組成，第一個字是屬名、第二個字則是種名。例如獅子就稱為Panthera
    leo，指的是豹屬（Panthera）的獅種（leo）。而只要沒有意外，每一位在讀這本書的讀者，應該都是一個Homo sapiens：人屬（Homo，指「人」）的人種（sapiens，指「明智」）。


    許多屬還能再歸類為同一科（family），例如貓科動物（獅子、獵豹、家貓）、犬科（狼、狐狸、豺）、象科（大象、長毛象、乳齒象）。同一科的所有成員，都能追溯到某個最早的雄性或雌性祖先。例如所有的貓科動物，不管是家裡喵喵叫的小貓或是草原上吼聲震天的獅子，都是來自大約兩千五百萬年前的某一頭祖先。


    至於智人，也是屬於某個科。雖然這件事看起來再平凡不過，卻曾經是整個歷史上最大的祕密。智人一直希望自己和其他動物有所不同，彷彿整個科就只有自己存在，沒有兄弟姊妹、沒有遠近親戚，而且最重要的是：沒有父母。但可惜這絕非事實。不論你是否接受，我們所屬的人科不僅成員眾多、而且還特別吵鬧——就是一堆大猿。與我們最相近的親戚，就是黑猩猩、大猩猩和紅毛猩猩。'
