  md: '人類之大歷史年表


    5000年

    出現最早的王國、文字和金錢、多神教信仰。


    4250年

    出現最早的帝國：薩爾貢大帝的阿卡德帝國。


    2500年

    出現最早的硬幣——通用的貨幣。

    波斯帝國：試圖建立普世的政治秩序——

    「為全人類的福祉而努力」。

    印度佛教興起：試圖建立普世的真理——

    「讓所有人類解脫痛苦」。


    2000年

    中國漢帝國。地中海羅馬帝國。基督教興起。


    1400年

    伊斯蘭教興起。


    500年

    科學革命：人類承認自己的無知，

    開始取得前所未有的能力。

    歐洲人開始征服美洲和各大洋。

    整個地球形成單一歷史場域。資本主義興起。


    200年

    工業革命。家族和地方社群被國家和市場取代。

    動植物大規模絕種。


    現代

    人類跨出地球的疆域。

    核武器威脅人類的生存。

    生物逐漸由「智慧設計」形塑，而非天擇。


    未來

    「智慧設計」成為生命的基本原則？

    智人被超人類取代？


