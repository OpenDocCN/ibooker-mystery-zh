    祆教認為整個世界就是善神阿胡拉·馬茲達（Ahura Mazda）和惡神安格拉·曼紐（Angra Mainyu）之間的戰爭，在這場戰爭中人類必須站在善神這方給予協助。祆教在阿契美尼德王朝（波斯第一帝國，西元前550-350）已經舉足輕重，到了薩珊王朝（波斯第二帝國，224-651）期間更成為國教，幾乎影響了所有後來在中東及中亞的宗教，並催生了許多二元論宗教，例如諾斯替教和摩尼教。'
