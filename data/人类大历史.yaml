  md: '系的基礎，並且教育後世子孫何為正義、正義的國王又該如何行事。


    後世子孫確實看到了！古代美索不達米亞平原的知識份子與官僚菁英將這部法典奉為經典，就算等到漢摩拉比骨已成灰、巴比倫帝國也煙消雲散，但這部法典還是由文士不斷抄寫流傳。因此，想認識古代美索不達米亞人對於社會秩序的理想，《漢摩拉比法典》是很好的參考來源。35


    法典開頭指出，美索不達米亞的幾位大神安努（Anu）、恩利爾（Enlil）和馬杜克（Marduk）任命漢摩拉比「在這片土地上，伸張正義，驅除不義罪惡，阻絕恃強凌弱。」36
    接著，法典列出大約三百條判例，固定寫法是：「如果情形如何如何，判決便應如何如何。」以下舉出判例196至199和判例209至214：


    +   196. 若某個上等人使另一個上等人眼瞎，便應弄瞎他的眼。

    197. 若他使另一個上等人骨折，便應打斷他的骨。

    198. 若他使某個平民眼瞎或骨折，他應賠償60舍客勒（shekel，約8.33公克）的銀子。

    199. 若他使某個上等人的奴隸眼瞎或骨折，他應賠償該奴隸身價的一半（以銀子支付）。37

    209. 若某個上等人毆打一個上等女子、造成她流產，他應賠償她10舍客勒的銀子。

    210. 若該女子喪命，他們應殺了他的女兒。

    211. 若他毆打某個平民女子、造成她流產，他應賠償她5舍客勒的銀子。

    212. 若該女子喪命，他應賠償30舍客勒的銀子。'
