  md: '大多數人都會認為，只有自己社會的階級是自然的，其他社會的階級分法都太虛假又荒謬。像是現代的西方教育對種族階級制度嗤之以鼻，如果現在有法律禁止黑人住在白人社區、進入白人學校就讀、或到白人醫院就醫，一定會引發軒然大波。但如果說的是貧富階級，有錢人住在獨立、豪華的住宅區，就讀專為有錢人提供的私立名校，能進到專為有錢人提供的高檔醫療機構，這些對於許多美國人和歐洲人來說，卻似乎是再天經地義也不過。但事實已經證明，大多數有錢人之所以有錢，只是因為他出生在有錢家庭，大多數窮人一輩子沒錢，也只是因為他出生在貧窮家庭而已。


    # ### 階級命定論


    但不幸的是，複雜的人類社會似乎就是需要這些由想像建構出來的階級制度和歧視。當然，各種階級制度的不公不義程度不一，某些社會的歧視也比其他社會更為嚴重或極端，但至少就目前學者的研究，還沒有任何一個大型人類社會能真正免除歧視的情形。一次又一次，人類要讓社會有秩序的方法，就是將成員分成各種想像出來的階級，像是上等人、平民和奴隸，白人和黑人，貴族和平民，婆羅門和首陀羅，又或是富人和窮人。所有這些階級，就是要讓某些人在法律上、政治上或社會上高人一等，從而規範了數百萬人的關係。


    階級有其重要功能。有了階級之後，陌生人不用浪費時間精力真正瞭解彼此，也能知道該如何對待對方。在蕭伯納的作品《賣花女》（Pygmalion，曾改編為電影「窈窕淑女」）中，希金斯教授雖然不認識賣花女伊莉莎，但對兩人之間的關係拿捏，卻是絲毫不'
