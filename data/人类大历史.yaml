  md: '各自尋求支持者，形成團體。團體成員的連結，就在於每天的親密接觸，像是擁抱、撫摸、接吻、理毛、相互幫助。就像人類的候選人在選舉的時候，得到處握握手、親親小嬰兒，如果哪隻黑猩猩想要爭奪首領寶座，也得花上許多時間擁抱、親吻黑猩猩寶寶，還要拍拍牠們的背。


