  md: '還不僅是石頭，不管是山邊的小溪、山腳下的橡樹、附近的小樹叢、林間的噴泉、通往噴泉的小徑、啜飲著泉水的田鼠、狼和烏鴉，也都有靈的存在。對泛靈信仰者來說，還不只實體的物品或生物有靈，甚至連非物質也有靈，像是死者的鬼魂、以及各種友善和邪惡的靈（也就是我們所說的天使、精靈和惡魔）。


    泛靈信仰者認為，人類和其他的靈之間並沒有障礙，可直接透過言語、歌曲、舞蹈和儀式來溝通。所以獵人可以向一群鹿喊話，要求其中一頭犧牲自己。狩獵成功的時候，獵人可能會請不幸喪生的動物原諒他。有人生病時，薩滿巫師可以呼告造成疾病的靈，試著勸祂或恐嚇祂離開。有需要的時候，薩滿巫師還能請求其他靈的幫助。泛靈信仰的一個特點，在於所有的靈都位於當場當地，不是什麼萬能的神，而是某隻特定的鹿、某棵特定的樹、某條特定的小溪、某個特定的鬼魂。


    此外，泛靈信仰者還認為，人類和其他靈之間沒有地位高下之別。非人類的靈之所以存在，並不是為了滿足人類的需要，祂們也不是什麼把全世界操之在手的萬能的神。這個世界可不是為了人、為了任何生命、或為了特定的靈而運轉的。


    泛靈信仰並不是某個特定的宗教，而是數千種不同宗教、邪教或信仰的通稱。之所以都稱為泛靈信仰，是因為他們對於世界的看法、對於人類的定位所見略同。而我們說遠古的採集者應該屬於泛靈信仰者，就好像說在前現代的農民是「有神論者」一樣。有神論（theism，源自希臘文的
    theos，意為神）認為，宇宙的秩序繫於一小群超凡的實體（神）和人類之間的地位高下關係。


    雖然說「前現代的農民往往是有神論者」這件事千真萬確，但光是這樣講，還不夠清楚。一般典型的有神論，包山包海。有神論'
