  md: '國家則是60小時以上、甚至到80小時；但如果是狩獵採集者，就算住在最貧瘠的地區（像是喀拉哈里沙漠），平均每週也只需要工作35到45小時。他們大概只需要每三天打獵一次、每天採集3到6小時。一般時期，這樣就足以養活整個部落了。而很有可能大多數的遠古採集者居住的，都是比喀拉哈里沙漠更肥沃的地方，所以取得食物和原物料所需的時間還要更少。最重要的是，這些採集者可沒什麼家事負擔。他們不用洗碗、不用吸地毯、不用擦地板、不用換尿布，也沒帳單得付。


    這樣的採集經濟，能讓大多數人過著比農業社會或工業社會更有趣的生活。像是現在，如果在中國的血汗工廠工作，每天早上大約七點就得出門，走過飽受污染的街道，進到工廠後，整天都用同一種方式不停操作同一臺機器，時間長達十小時，叫人心靈整個麻木。等到晚上七點回家，還得再洗碗、洗衣服。


    而在三萬年前，如果是在中國的採集者，可能是大約早上八點離開部落，在附近的森林和草地上晃晃，採採蘑菇、挖挖根莖、抓抓青蛙，偶爾還得躲一下老虎。但等到中午過後，他們就可以回到部落煮午餐。接下來還有大把的時間，可以聊聊八卦、講講故事，跟孩子玩，或者就是放鬆放鬆。當然，有時候是會碰上老虎或蛇沒錯，但另一方面來說，當時倒也不用擔心車禍或工業污染。


    在大多數地方、大多數時候，靠著採集就已經能夠得到充分的營養。這其實很合理，畢竟這正是人類在先前數十萬年間的正常飲食，人體早就完全適應、而且如魚得水。骨骼化石的證據顯示，遠古時期的採集者比較少有飢餓或營養不良的問題，而且比起後來的農業時代，他們身高較高，也比較健康。雖然平均壽命顯然只有三十歲至四十歲，但這主要是因為當時兒童早夭的情形十分普遍，把'
