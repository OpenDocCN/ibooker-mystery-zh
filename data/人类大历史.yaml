    25. 商業化養雞場輸送帶上的小雞。如果是公雞、或是有缺陷的母雞，就會被丟到輸送帶上，送進毒氣室讓牠們窒息而死，再用自動攪碎機攪碎；又或者直接丟進垃圾堆，讓牠們互相擠壓致死。每年有上億隻雛雞，就這樣在養雞場裡喪命。


    就算有些人真的想過，也常認為這些動物真的和機器沒什麼兩樣，既沒有感覺、也沒有情緒，並不會感受到痛苦。但諷刺的是，正是那些製造了擠奶器和集蛋器的科學（和技術），最近也赤裸裸指出：其他哺乳動物和鳥類同樣有複雜的感覺和情緒。牠們不僅能感受到生理上的痛苦，也同樣能感受到心理情緒上的痛苦。


    演化心理學認為，家禽家畜的情感和社交需求，源自於野外，是因應當時需要生存和繁衍而形成的。例如，野生的母牛必須知道'
