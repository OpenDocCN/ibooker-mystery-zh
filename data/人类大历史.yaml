  md: '# 第15章 科學與帝國的聯姻


    人的承擔，都不是完全的事實。畢竟，歐洲各帝國以這麼大的規模做了這麼多事，不管是想站在哪一邊，都可以找到許許多多的事件得以佐證。你覺得這些帝國就是邪惡的怪物，在全球各地四處散播死亡、壓迫和歧視嗎？隨便把他們的罪行列出來，就足以編成一部百科全書了。你覺得這些帝國其實為屬民提供了新的醫藥、更佳的經濟環境、更多的安全嗎？隨便把他們的成就列出來，也足以編成另一部百科全書。


    正因為帝國與科學密切合作，就讓歐洲的帝國有了如此強大的力量，讓整個世界大為改觀；也是因為如此，我們很難簡單斷言這些帝國究竟是善是惡。正是帝國創造了我們所認識的世界，而且，其中還包含我們用以判斷世界的意識型態。


    # 從種族主義，到文化主義


    然而，科學也被帝國主義者用於某些邪惡的用途。不論生物學家、人類學家、甚至語言學家，都提出了某些科學證據，證明歐洲人優於其他所有民族，因而有權力（或許也是責任？）統治他人。


    自從瓊斯提出所有印歐語言同源同宗、來自某一個特定的遠古語言，學者們便前仆後繼，渴望找出究竟是誰曾經說著這種語言。他們注意到，最早的梵語族群是在大約三千年前，從中亞入侵印度的，他們自稱為「雅利亞」（Arya）。而最早的波斯語族群，則自稱為「艾利亞」（Ariia）。於是歐洲學者推測，這些講著梵語和波斯語（以及希臘語、拉丁語、哥德語、凱爾特語）原始語言的人，一定是某種雅利安人（Aryan）。會不會真這麼巧，偉大的印度文明、波斯文明、希臘文明和羅馬文明，都是「勤勉的雅利安人」所創？


    337'
