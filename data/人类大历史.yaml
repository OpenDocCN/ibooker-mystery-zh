    說到這裡，我們終於發現，歷史上似乎僅有一項發展真正有重大意義。那就是：現在我們終於意識到，快樂的關鍵就在於生化系統，因此我們就不用再浪費時間處理政治和社會改革、叛亂和意識型態，而是開始全力研究唯一能真正讓我們快樂的方法：操縱人類的生化機制。如果我們投入幾十億美元來瞭解我們的腦部化學，並推出適當的療法，我們就能在無須發動任何革命的情況下，讓人民過得遠比從前的人更快樂。舉例來說，百憂解（Prozac）之所以讓人不再沮喪，靠的不是對任何體制的改革，而只是提高血清素的濃度而已。


