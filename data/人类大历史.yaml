  md: '# 侵入美洲


    澳洲巨型動物群的滅絕，可能正是智人足跡踏離亞非大陸之外的第一件明顯標誌。而之後在美洲又有一場更大的生態災難。在所有人類物種裡，只有智人踏上了西半球的土地，時間大概是在一萬六千年前，也就是大約西元前一萬四千年。


    智人最早是步行抵達美洲的，因為當時海平面較低，在西伯利亞東北端，還有陸地與阿拉斯加的西北端相連。但這段路也沒聽起來這麼簡單，一路上艱難重重，並不比跨海抵達澳洲來得容易。在這一路上，首先得學會如何抵禦西伯利亞北部的酷寒，這裡的冬季是永夜，溫度會降到零下
    50 度。


    在這之前，從來沒有人屬的物種能夠通過西伯利亞北部這種地方。即使是較能抗寒的尼安德塔人，也還是待在南邊比較溫暖的地區。然而對智人來說，雖然他們的身體習慣的是非洲的大草原，而不是冰雪紛飛的極地，但他們卻能想出巧妙的解決辦法。智人的採集部落四處遷徙，來到較冷的地區就學會了做雪鞋，也學會用針把獸皮和獸毛層層縫緊，成為保暖衣物。他們發明了新型武器和高明的狩獵技巧，讓他們能夠追蹤、獵殺在遙遠北方的長毛象和其他大型動物。由於有了保暖衣物、狩獵技巧也有改進，智人就愈來愈勇於冒險、深入冰凍的區域。隨著他們逐漸北遷，衣物、狩獵策略和其他生存技能也不斷提升。


    但他們究竟為什麼要這麼麻煩，自願把自己放逐到西伯利亞？對某些部落來說，或許是因為戰爭、人口壓力或自然災害，迫使他们北移。但向北走也不是全無好處，像是能取得動物蛋白，便是其'
