  md: '# 澳洲大屠殺


    在歷史上,人類首次抵達澳洲絕對算是大事一件,重要性不亞於哥倫布抵達美洲、或是阿波羅十一號登上月球。這是人類第一次成功離開亞非大陸生態系,也是第一次有大型陸生哺乳動物能夠從亞非大陸抵達澳洲。更重要的是,這些人類先驅究竟在這片新世界幹了什麼好事——打從狩獵採集者首次登上澳洲海灘的那一刻,就等於宣告智人攀上了食物鏈的頂端,也從此成為地球史上最致命的物種!


    在這之前,雖然人類有些創新的調整和作為,但他們對環境還沒什麼太大的影響。雖然他們能夠遷移到各種不同地點、而且成功適應當地環境,但並不會大幅改變新的棲地環境。而這些前往澳洲的移居者(其實是征服者),所做的不只是適應當地環境,而是讓整個澳洲生態系起了天翻地覆的變化。


    人類首次登上澳洲沙灘,足跡隨即被海浪沖走。但等到這些入侵者進到內陸,他們留下了另一種足跡,而且再也洗刷不去。他們推進的時候,彷彿進到奇特的新世界,滿是從未見過的生物。像是有兩百公斤重、二公尺高的袋鼠,還有當時澳洲最大型的掠食者袋獅(marsupial
    lion),體型就像現代的老虎一樣大。樹上有當時大到不太可愛的無尾熊,平原上則有不會飛的鳥在奔馳,體型足足是鴕鳥的兩倍。至於在灌木叢裡,則有像惡龍般的蜥蜴和蛇,邊滑行、邊發出嘶嘶聲。森林裡則有巨大的雙門齒獸(Diprotodon)四處遊蕩,外型就像袋熊,不過體重足足有兩噸半。


    除了鳥類和爬蟲類之外,澳洲當時所有的動物都是像袋鼠一樣的有袋動物,會先生下幼小、無助、就像胚胎一樣的年輕後代,再'
