  md: '人類大歷史


    羅馬軍隊是特別好的例子。這是當時最強的軍隊，但就科技上來說，羅馬並不比迦太基、馬其頓或塞琉西王國占有優勢。羅馬軍隊的優點在於有效率的組織、鐵一般的紀律，以及龐大的後備人力。羅馬軍隊從來沒有研發部門，在幾世紀間，所用的武器大致上並無不同。前面提過，小西庇阿（見第
    213 頁）曾在西元前二世紀率大軍攻下努曼提亞，將迦太基夷為平地，而如果他的軍隊穿越時空來到五百年後的君丁坦丁在位期間，小西庇阿戰勝的機率仍然很高。然而想像一下，就算已到了十六世紀至十八世紀的近代初期，如果把康熙皇帝的軍隊帶到現代，要和中國解放軍一較高下，情況會是如何？雖然康熙文治武功均高，手下也有一批猛將，但在現代武器裝備面前，都將不堪一擊。


    無論是在古羅馬或是古中國，多數的將領和哲學家都不認為研發新武器是自己的責任。然而，中國史上最偉大的發明就包括了火藥。而就目前所知，火藥的發明其實是一場意外，原本的目的是道士想煉出長生不老藥來。而從火藥後來的發展，就更能看出這種趨勢。有人可能會認為，有了這些道教煉丹術士，中國就要稱霸全球了。但是火藥這種全新化合物，在中國的主要用途只是鞭炮而已。就算是蒙古大軍已經兵臨城下，也沒有哪個宋朝皇帝急著建立起中世紀的曼哈頓計畫，發明某種末日武器來拯救宋朝。一直要到大約十五世紀（火藥發明約六百年後），大炮才成了亞非大陸上，戰爭勝敗的決定性因素。


    打從一開始，火藥就有了能夠攻城略地的潛力，但為什麼要花了這麼久，才付諸軍事用途？原因就在於，火藥剛發明的時候，不論是皇帝、文人或是商人，都沒有想到新的軍事科技能夠救國、或是致富。


    294'
