  md: '# 人類之大歷史年表


    （距今年代）


    135億年 物質和能量出現。物理學之始。

    原子和分子出現。化學之始。


    45億年 地球形成。


    38億年 生物形成。生物學之始。


    600萬年 人類和黑猩猩最後的共祖。


    250萬年 非洲的人屬開始演化。出現最早的石器。


    200萬年 人類由非洲傳播到歐亞大陸，

    演化為不同人種。


    50萬年 尼安德塔人在歐洲和中東演化。


    30萬年 開始日常用火。


    20萬年 智人在東非演化。


    7.0萬年 認知革命：出現能夠描述非現實的語言。

    歷史學之始。智人傳播至非洲之外。


    4.5萬年 智人抵達澳洲。澳洲巨型動物絕種。


    3.0萬年 尼安德塔人絕種。


    1.6萬年 智人抵達美洲。美洲巨型動物絕種。


    1.3萬年 弗洛瑞斯人絕種。智人成為唯一存活的人類物種。


    1.2萬年 農業革命：馴化動植物，出現永久聚落。'
