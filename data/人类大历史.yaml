  md: '# 認識你自己


    來看，人類的生命本來就完全沒有意義。人類只是在沒有特定目標的演化過程下，盲目產生的結果。人類的行動沒有什麼神聖的宇宙宏圖為根據，而且如果整個地球明天早上就爆炸消失，整個宇宙很可能還是一樣，不受影響的繼續運行下去。


