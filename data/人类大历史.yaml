  md: '# 第17章


    # 工業的巨輪


    現代經濟之所以能夠成長，是因為我們願意信任未來，資本家也願意將利潤再投入生產。然而光是這樣還不夠。經濟成長還需要有能源、有原料，但能源和原料有限，如果用光了，是不是整個體系就要崩潰？


    不過，就過去的證據看來，所謂「有限」也只是一種理論；雖然這可能不太符合我們的直覺。事實上，人類在過去幾個世紀的能源和原料用量是激增的，但是可供使用的能源和原料量卻是不減反增！每次即將因為能源或原料短缺，而使經濟成長趨緩的時候，就會有資金投入科技研究，解決這項問題。這種做法屢屢奏效，有時候讓人更有效利用現有資源，有時候找出了全新的能源和材料。


    讓我們以運輸產業為例。過去三百年間，人類製造的運輸工具數量達到數十億臺，從簡單的馬車和手推車，到後來的火車、汽車、超音速飛機和太空梭。過去可能會有人認為，像這樣大規模使用資源，很快就會耗盡所有能源和原料，很快就只能靠著回收垃圾撐下去了。然而，實際狀況卻正好相反。在1700年，全球運輸工具'
