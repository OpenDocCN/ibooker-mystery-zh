  md: '人類 大歷史


    其中，黑猩猩與我們最為接近。不過就在六百萬年前，有一頭母猿產下兩個女兒，一個成了所有黑猩猩的祖先，另一個則成了所有人類的祖奶奶。


    # 家族祕史


    智人還有另一個更見不得光的祕密。我們有許多堂表兄弟姊妹，而且沒什麼文明。但這還事小，我們其實還曾經有很多更相近的兄弟姊妹。


    人類（human）已經習慣以為自己是唯一的「人」，是因為在過去一萬年間，「人種」確實只剩下智人一種。然而，human 一詞真正的意思是「屬於人屬的動物」，而在過去，這可不只有智人而已。此外，我們在最後一章也會提到，不久之後，很可能我們又得再和一些不屬於智人的人類開始競爭。為避免混淆，以下講到智人，講的就是
    Homo sapiens 這個物種的成員，而講到人類，講的則是 Homo（人屬）的所有現存成員。


    最早的人類是從大約兩百五十萬年前的東非開始演化的——祖先是一種更早的猿屬：南猿（Australopithecus）。大約兩百萬年前，東非的這些遠古人類有一部分離開了家園而踏上旅程，足跡遍及北非、歐洲和亞洲的廣大地帶。北歐的森林白雪皚皚、印尼的熱帶叢林溼氣蒸騰，想活命顯然需要不同的特徵，因此人類也開始朝著不同方向演化。於是人類發展出幾個不同的物種，而科學家也為每一種都取了華麗的拉丁名稱。


    在歐洲和西亞的人類，成了 Homo neanderthalensis，意為「來自尼安德谷（Neander Valley）的人」，一般簡稱為尼安德塔人。比


