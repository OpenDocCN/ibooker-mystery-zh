    歷史上少數真正顛撲不破的道理，就是原本的奢侈品往往最後會成為必需品，而且帶來新的義務。等到習慣某種奢侈品，就開始認為這是天經地義。接著就是一種依賴。最後，生活中就再也不能沒有這種奢侈品了。


    讓我們用現代大家都熟悉的例子來解釋。在過去的幾十年裡，我們有許多本該會讓生活輕鬆省時又如意的發明，像是洗衣機、吸塵器、洗碗機、電話、手機、電腦、電子郵件等等。在以前，寄信是件麻煩事，得親手動筆、寫信封、貼郵票，還得再走到郵筒那裡去寄信。想要得到回信，可能得等上幾天、幾星期，甚至幾個月。至於現在，我可以隨手就寄一封電子郵件，傳送到地球的另一邊，而且如果收件人在線上，可能只要一分鐘就能收到回信了。我確實省下了所有麻煩和時間，但生活真的更輕鬆了嗎？


    可惜事與願違。在傳統信件的年代，我們通常只有最重要、不得不聯絡的事才會寫信。寫起信來也不是寫所欲寫，而是字斟句酌、考慮再三。而且，通常對方的回信也會是同樣慎重。對大多數人來說，每個月來來去去的信，頂多就是幾封，也不會有人急於立刻回覆。但在今天，我每天都會收到幾十封電子郵件，並且所有的發信人都希望你立刻回應。我們以為自己省下了時間，其實是把生活步調加速成過去的十倍快，於是我們整天忙忙碌碌、焦躁不安。


    三不五時，總有些反對機械化和自動化的盧德份子（Luddite）堅持不用電子郵件，就像幾千年前，也有某些人類部落拒絕農業，所以躲過了奢侈生活的陷阱。然而，農業革命要成功，並不需要某個地區的所有部落都無異議通過。一切都只從「一個部落」開始。不論是在中東或中美洲，只要有一個部落定居下來，開始耕作，走向農業的趨勢就已經無法抗拒。由於農業可促成人口迅速增長，通'
