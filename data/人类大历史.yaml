  md: '# 第6章


    # 蓋起監獄高牆


    農業革命可能是史上最具爭議的事件。有些人認為這讓人類邁向繁榮和進步，也有人認為這條路終將導致滅亡。對後者來說，農業革命是一個轉捩點，讓智人拋下了與自然緊緊相連的共生關係，大步走向貪婪、自外於這個世界。但不管這條路的盡頭為何，現在都已經無法回頭。進入農業之後，人口得以急遽增加，任何一個複雜的農業社會想走回狩獵和採集，就只有崩潰一途。


    大約在西元前10000年、進入農業時代的前夕，地球上採集者的人口約有五百萬到八百萬。而到了西元一世紀，這個人數只剩下一、兩百萬（主要在澳洲、美洲和非洲），相較於農業人口已達2.5億，無疑是遠遠瞠乎其後。33


    絕大多數的農民都是住在永久聚落裡，只有少數是游牧民族。「定居」這件事，讓大多數人的活動範圍大幅縮小。遠古狩獵採集者的活動範圍可能有幾十平方公里，甚至上百平方公里。當時這片範圍都是他們的「家」，有山丘、溪流、樹林，還有開闊的天空。但對農民而言，幾乎整天就是在一小片田地或果園裡工作，就算'
