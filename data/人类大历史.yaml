- img_proc: true
  md: '第二種解釋，認為智人抵達澳洲的時候已經掌握了火耕技術。於是，面對這樣一個陌生而危險的環境，他們會刻意燒毀難以跨越的茂密灌木叢和森林，將地貌變為開闊的草原，以吸引更容易獵捕的獵物，適合飲食男女的需求。於是，智人在短短幾千年內，就徹底改變了澳洲大部分地區的生態環境。


    這種說法有植物化石紀錄做為佐證。在四萬五千年前，桉屬植物在澳洲只是少數。但等到智人來到，就開創了桉屬植物的黃金時代。因為桉屬植物特別耐火，所以在其他樹種燒得灰飛煙滅之後，就剩下它獨霸天下。這些植被變化之後，就會影響到草食性動物，進而影響肉食性動物。例如以桉屬尤加利葉為生的無尾熊，就隨著桉屬植物領域的擴張，開心的邊嚼邊進到新領地。但是大多數其他動物可就大受打擊了。澳洲有許多食物鏈就此崩潰，其中比較脆弱的環節也因而滅絕。21


    第三種解釋，雖然也同意狩獵和火耕有顯著影響，但強調還是不能忽視氣候因素。大約在四萬五千年前，襲擊澳洲的氣候變遷讓整個生態系失衡，變得特別脆弱。但畢竟這早有先例，所以在正常情況下，生態系應該還能慢慢適應恢復。但人類就是出現在這節骨眼上，於是將這個已經脆弱的生態系推進了無底深淵。而對於大型動物來說，氣候變遷加上人類狩獵，可說如同四面楚歌，令牠們難以抵擋。一下面對如此多重的威脅，實在很難找出真正良好的生存之道。


    如果沒有進一步的證據，我們很難說究竟這三種解釋哪個更有道理。但就是有充分的理由讓我們相信，如果智人沒去到澳洲，現在我們就還能看到袋獅、雙門齒獸，還有巨型袋鼠，在這片大陸上逍遙自在。'
