  md: '人類大歷史


    此外，雖然現在人類已經擁有許多令人讚嘆的能力，但我們仍然對目標感到茫然，而且似乎也仍然總是感到不滿。我們的交通工具已經從獨木舟變成帆船、變成汽船、變成飛機、再變成太空梭，但我們還是不知道自己該前往的目的地。我們擁有的力量比以往任何時候都更強大，但幾乎不知道該怎麼妥善使用這些力量。更糟糕的是，人類似乎也比以往任何時候更不負責。


    我們讓自己變成了神，不用對任何人負責，唯一能節制我們的只剩下物理定律。正因如此，我們對周遭的動物和生態系掀起一場大災難，只為了貪求自己的舒適和娛樂，卻又從來無法得到真正的滿足。


    擁有神的能力，但是不負責任、貪得無饜，而且連想要什麼都不知道。天下至險，恐怕莫此為甚。'
