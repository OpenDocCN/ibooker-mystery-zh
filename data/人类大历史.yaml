  md: '# ## 共同信念


    等到認知革命之後,智人有了八卦的能力,於是部落規模變得更大,也更穩定。然而,八卦也有限制。社會學研究指出,藉由八卦來維持的最大「自然」團體大約是150人。只要超過這個數字,大多數人就無法真正深入瞭解所有成員的生活情形。


    即使到了今天,人類的團體還是繼續受到這個神奇的數字影響。只要在150人以下,不論是社群、公司、社會網絡、或是軍事單位,靠著大家都認識、彼此互通消息,就能夠運作順暢,並不需要定出正式的階層、職稱、規範。4
    不管是30人的一個排,甚至是100人的一個連,其實只需要一丁點的軍紀來規範,就能靠著人際關係而運作正常。正因如此,在軍隊的某些小單位裡,老兵的權力往往要比士官更大,士官長的權勢往往又比尉級軍官更大。而如果是一個小型的家族企業,就算沒有董事會、執行長或會計部門,也能經營得有聲有色。


    然而,一旦突破了150人的門檻,事情就大不相同了。如果是一個師的軍隊,兵數達到萬人,就不能再用帶一個排或一個連的方式來領導。而有許多成功的家族企業,也是因為規模愈來愈大、開始雇用更多人員的時候,就碰上危機,非得徹底重整,才能繼續成長下去。


    到這個團體過大,社交秩序就會崩壞,使團體分裂。就算有某個山谷特別豐饒,可以養活500個遠古的智人,但他們絕對沒辦法和這麼多不夠熟悉的人和平共處。他們要怎樣才能決定要由誰當首領、能在哪裡打獵、誰又能和誰交配呢?'
