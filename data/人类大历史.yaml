- img_proc: true
  md: '面，你可能也會看到一個飽經風霜、來自貧草原的土耳其族長，手拿柺杖、步履蹣跚，還若有所思的摸著鬍子。在另一邊，有黃金首飾在黝黑的皮膚上閃耀著，可能是一群來自非洲馬利王國（Mali）的穆斯林。至於一聞到丁香、薑黃、荳蔻和海鹽的香氣，就知道這群兄弟大概來自印度，又或是更東邊神祕的香料群島。


    我們今天常認為宗教造成的是歧視、爭端、分裂。但在金錢和帝國之外，宗教正是第三種讓人類一統的力量。正因為所有的社會秩序和階級都只是想像的產物，所以它們也十分脆弱，而且社會規模愈大，反而愈脆弱。在歷史上，宗教的重要性就是讓這些脆弱的架構，有了超人類（superhuman）的正當性。有了宗教之後，就能說律法並不只是人類自己的設計和想像，而是來自一種絕對神聖的最高權柄。這樣一來，至少某些基本的律法便不容動搖，從而確保社會穩定。


    因此，我們可以說宗教是一種人類的規範及價值觀的體系，建立在超人類的秩序之上。這裡有兩大基本要素：


    第一、宗教認為世界有一種超人類的秩序，而且並非出於人類的想像或是協議。例如職業足球不是宗教，因為雖然足球也有許多規則、儀式、和很古怪的常規，但大家都知道是人類發明了足球，而且國際足總（FIFA）隨時可能開會決定把球門變大、或是取消越位規則。


    第二、以這種超人類的秩序為基礎，宗教會訂出它認為具有約束力的規範和價值觀。例如，雖然現在許多西方人都相信鬼魂、精靈、重生，但從這些信念並未構成什麼道德和行為的標準，所以也不算是宗教。


    雖然宗教有可能讓各種社會秩序和政治秩序正當化，但並不是'
