    # 當男人究竟有什麼好的？


    至少農業革命以來，大多數人類社會都屬於重男輕女的父權社會。不論這些社會對男女的定義為何，當男人總是比較優越。父權社會教育著男人就該是陽剛的男人樣、女人就該有溫柔的女人味，要是有人斗膽跨越界線，懲罰也就隨之而來。


