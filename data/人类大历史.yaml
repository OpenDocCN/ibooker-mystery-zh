  md: '強烈的衝動，想要偵察四周的環境，到處瞧瞧啄啄，確認彼此的社會階層，還會築巢、理理毛。然而，雞蛋業者往往是將這些蛋雞關在極小的雞舍裡，一個籠子就塞了四隻蛋雞，每隻的活動空間大概就是22公分乘25公分左右。雖然這些雞有足夠的食物，卻沒辦法宣告自己的領域、無法築巢或完成牠們天生想做的活動。事實上，這些籠子實在太矮小，裡面的雞甚至無法拍翅膀，也無法完全站立抬頭。


    豬的智商和好奇心在哺乳動物裡數一數二，可能只低於大猿。然而在工業化的養豬場，母豬被關在小隔間裡，甚至連轉身都做不到，更別提要散步或四處覓食了。這些母豬就這樣沒日沒夜的關上四星期，生下小豬，但小豬立刻被帶走、養肥待宰，而母豬又得帶去懷孕，準備再生下一批小豬。


    許多乳牛短暫的一生裡，也是活在一個小隔間裡；不管或站、或坐、或臥，都與自己的尿液和糞便為伍。牠們面前有一套機器會供給食物、激素和藥物，後方另一套機器則是每隔幾小時，會來為牠們擠乳。至於位於這兩套機器中間的牛呢？在業者眼中，大概就只是一張會吃原料的嘴，再加上會生產商品的乳房而已。這些活生生的生物其實內心情感世界都十分複雜，如果把牠們當機器一樣對待，不只會造成身體不適，也會讓牠們有很大的社會壓力和心理挫折。101


    大西洋奴隸貿易並非出於對非洲人的仇恨，而現代畜牧業也同樣不是出於對動物的仇恨。這兩者背後共同的推手，就是冷漠。大多數人，不管是生產或是消費各種奶蛋肉類的時候，都很少想到提供這些食物的雞、牛或豬。'
