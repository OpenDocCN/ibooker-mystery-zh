    # 地球史上最成功的植物


    我們應該換個角度，用小麥的觀點來看看農業革命這件事。

    在一萬年前，小麥也不過就是許多野草當中的一種，只出現在中東很小的一個地區。但就在短短一千年內，小麥突然就傳遍了世界各地。生存和繁衍，正是演化成功與否的基本標準。根據這個標準，小麥可說是地球史上最成功的植物。以北美大平原為例，一萬年前完全沒有小麥的身影，但現在卻有大片麥田波浪起伏，幾百公里內完全沒有其他植物。小麥在全球總共占據大約225萬平方公里的地表面積，幾乎有英國的十倍大小。究竟，這種野草是怎麼從無足輕重，變成無所不在？

    小麥的祕訣就在於操縱智人、為其所用。智人原本憑藉狩獵和'
