  md: '# 八卦當道


    第二種理論，也同意人類語言是溝通、描述這世界的方式；然而語言要傳遞的最重要訊息，不是關於獅子和野牛，而是關於人類自己。我們的語言發展成了一種傳播八卦的工具。根據這一理論，智人主要是一種社會性的動物，社會合作是我們得以生存和繁衍的關鍵。對於每個人來說，光是知道獅子和野牛的下落還不夠，更重要的，是要知道自己的部落裡誰討厭誰、誰跟誰在交往、誰很誠實、誰又是騙子。


    就算只是幾十個人，想隨時知道他們之間不斷變動的關係現況，所需要取得並儲存的訊息量就已經十分驚人。（如果是個50人的部落，光是一對一的組合就可能有1,225種，而更複雜的其他社會組合更是難以計數。）雖然所有猿類都對這種社會訊息有濃厚興趣，但牠們並沒有頗有效的八卦方式。尼安德塔人與最早的智人很可能也有一段時間，沒辦法在背後說彼此的壞話。然而，如果一大群人想合作共處，「說壞話」這件事可是十分重要。大約在七萬年前，現代智人發展出新的語言技能，讓他們能夠八卦達數小時之久。這下，他們能夠明確得知自己部落裡誰比較可信可靠了，於是部落的規模就能夠擴大，而智人也能够發展出更緊密、更複雜的合作形式。²


    這種「八卦理論」聽起來有點扯，但其實有大量的研究結果，支持這種說法。即使到了今天，絕大多數的人際溝通（不論是電子郵件、電話、還是報紙專欄）講的都還是八卦。這對我們來說，真是再自然不過，就好像我們的語言天生就是為了這個目的而生的。


