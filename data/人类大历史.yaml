  md: '人類 大歷史


    這些計算要歸功於當時不久前，發生在統計與機率等領域的幾項突破。其中之一是雅各·白努利（Jacob Bernoulli）的大數法則（Law of Large
    Numbers）。白努利認為，雖然某些單一事件（例如某個人死亡）難以準確預測，但只要有了許多類似事件，用平均結果來預測就能相去不遠。換句話說，雖然馬克勞林無法用數學預測韋布斯特和華萊司是不是明年就會過世，但只要有足夠的資料，他就能告訴韋布斯特和華萊司，明年很可能有多少位蘇格蘭長老教會牧師過世。幸運的是，他們手上已經有現成的數據。哈雷（Edmond
    Halley）在五十年前就已經發表了相關的精算表，正好派上用場。（哈雷分析了德國布雷斯勞市的1,238件出生、1,174件死亡紀錄，讓我們看到某個二十歲的人死在某一年的機率是1:100，而五十歲的人則是1:39。）


    整理這些數字之後，韋布斯特和華萊司取得結論：平均而言，蘇格蘭通常有930位長老教會牧師，每年過世27位，而其中有18位會留下遺孀。在沒有留下遺孀的幾位中，有5位會留下孤兒，至於有遺孀的，也有2位可能有不到十六歲的孩子。他們還計算出遺孀有可能在多久之後過世或再婚（這種時候便停止補助）。有了這些數據之後，韋布斯特和華萊司就能判斷，加入基金的牧師每人每年該提撥多少錢，為自己的親人打算。當時，如果牧師年繳2英鎊12先令又2便士，他的遺孀便能一年得到10英鎊，這在當時可是一大筆錢。而如果投保的牧師認為這還不夠，可以選擇年繳6英鎊11先令3便士，遺孀一年就能得到25英鎊，生活將更為優渥。


    根據他們的計算，到了1765年，這個「蘇格蘭教會牧師遺孀及孩童撫卹基金」總資本會有58,348英鎊。事後證明，他們的計算準確到不可思議。到了這一年，基金總資本為58,347英鎊，只比預測


    288'
