    Haber），在 1908 年發展了一套技術，幾乎只需要用空氣就能製備出氨。德國人很快將哈柏研發的技術投入工業生產，只要靠著空氣當原料，就能製作爆炸物。


    有學者認為，要不是有哈柏的發現，德國絕無可能撐到 1918 年的 11 月。100 而且，這項發現還讓哈柏贏得了 1918 年的諾貝爾獎，但可以想見他得的是化學獎，可不是和平獎。（哈柏在第一次世界大戰期間，也是引導使用毒氣的先驅。）


