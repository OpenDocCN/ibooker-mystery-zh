    Stinging nettle


    特性：蓼麻訊息為純粹的能量，不含藥草的實質成分，完全免除生物成分的毒性問題，卻同時保存了藥草完整的能量。是清火解熱，保養肝臟和皮膚最好的能量。

    適用對象：

