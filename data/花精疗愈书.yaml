  md: '張的人變得自在開放，懂得隨遇而安。花精治療師可以從兩方面來運用桂花花精：以花精來調整個案以上的負面情緒特質，或者善用正面特質來提升個案的原則性與堅定性。


    少見的盤花，生長在飛瀑潮濕的水岸邊，紅色帶水的花盤，乍看似乎有些血紅黏稠，但卻開出朵朵清新的小白花。花盤像似人腦的結構，當各種扭曲、複雜的念頭，形成負面的能量場時，整個人像陷入既晦澀又黏密的頻率中。這樣的花朵特質，會讓我們聯想到一些周遭親友的個性。


    現代社會競爭激烈，在各種利益競逐的場合，為了贏得注目，不免產生機巧、設防之心。過度的心機，讓思想膠著、紛亂、扭曲，它們強迫性的運轉，使人不知不覺間，對周遭的人事物羅織出各種複雜的感受，卻又加以合理化。有時候事情並不如我們想像的複雜或負面，但是內心矛盾的情感，早已讓理智團團轉，攪亂了一池清明。


    這樣的人若陷入三角戀情中，就會不斷猜想此時不在身邊的情人，正和另一個人親密約會，而找出各種蛛絲馬跡證明事實就是如此，混亂隱晦的想法，牽引出激烈、偏頗而負面的情感互動。若面對人際關係，則會預設立場，不自覺地對他人的言語或行為，加諸多餘的想像，進而合理化自以為是的事實。盤花能量如同精雕細琢的紅寶石，散發光芒，既純淨又安定，花精能夠進入腦海徹底洗滌思想，調整心靈結構，讓人不再陷落迷思中，找回純潔如白花的赤子之心，清明的看世界。


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_187_0.png)


    「桂花」清新隨和，散發甜美的香味


    首席花療師的經驗分享 185'
