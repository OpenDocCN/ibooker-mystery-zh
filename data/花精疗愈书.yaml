  md: '黑珍珠訊息修復與整理身體電磁場，使之更為協調，身心靈和諧一致，意識也變得無比清明與覺知，而不易受外在環境或疾病干擾。它喚醒身體與大地之母的牽繫，使人和地球連結得更好，宛如重新回到母親的懷抱，感覺和地球相容一體。有助於身心靈連結，以及心靈修持與提升。


    # 花精能量與美容保養


    花精具有活化細胞的特性，可以和各種物質結合，製成醒膚水、身體乳液、泡澡系列，花精訊息能促進細胞再生能力，使囤積於臉部毛孔的阻塞物排出，讓肌膚還原再生，永保青春活力。


    淨化、能量化的食品（如能量醋、能量酵素）、空間淨化系列、薰香系列、星月訊息能量、訊息能量卡片等等。這些訊息能量都已有了具體的研究成果。


    我衷心的願望是，為人類智慧的覺醒與發展，提供一條更整全、完善的途徑。任何能量的擷取與運用，都必須遵守一項原則——尊重萬物、尊重自然，不傷害花草植物的平等心，如此才能將自然界最純正寬廣的能量，完整保存下來，製作出鮮活的療癒訊息——這其中包含了天地宇宙大能的奧妙。


    透過這些療癒的訊息能量，我們重新與天地自然、宇宙連結，獲得心靈覺醒、提升與進化的能量。一場內在小宇宙的尋根之旅，就此展開。我深信，唯有透過這讓人心覺醒的根本方式，我們才能回歸本我，回歸宇宙的大秩序，共同創造出和諧共生的美好世界。'
