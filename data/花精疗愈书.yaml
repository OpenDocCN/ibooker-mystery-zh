    ## 複方花精優於單方花精嗎？


    針對不同的花精能量對心靈的影響，究竟該如何運用單方與複方花精，才能達到最佳的平衡提升效果呢？我的看法是，務必要深入瞭解花精在人體的運行作用特質，避免訊息抵消的疑慮，才可能靈活彈性運用單方與複方花精，達到最佳的共振療癒成效。


    我在擷取製作花精的過程中，不僅保存花朵本身的療癒訊息，同時也把花朵和大自然間的互應磁場，以及花朵精神所銜接的宇宙能量場的訊息，同時收錄了下來。因此，無論在訊息頻率的精準度上，花精訊息銜接的管道上，每一種花精都十分清晰明確。愈是深入瞭解這一點，愈要謹慎應用複方，才能避免訊息抵消或承接管道混亂的情形發生。


    單方花精與複方花精各有優點。舉例來說，把曇花花精及蒔茶花花精的複方給某個人使用。曇花花精是抒洩內在壓抑的負面情結，再加以平衡調整，使之恢復平和；蒔茶花花精則是穩定情緒。使用者究竟呈現的是哪一種花精的作用，將無法判讀也難以覺察。在這樣的情形下，單方花精的確比較能夠清楚呈現花精所整理的特定情緒。例如，白天服用野薑花花精，以面對生活、工作事件的壓力，晚上則使用曇花花精來整理內在深層的情緒。像這樣選擇特定的時間，來調整特定的情緒，不失為兼顧情緒深度與平衡調理的好方法。


    花精療法主要是讓人能夠面對及整理自己的情緒，我所規劃的花精療程約為 10 至 14 天。根據個案的使用經驗來看，花精從牽引出特定情緒面，到完全平撫調理，所需要的時間大約是一個多星期。情緒的療癒好比剝洋蔥，因此找出情緒問題點，一次選用一瓶單方花精，專注地處理一種情緒，循序漸進，效果較為顯著，個案也可以依據花語清楚檢視情緒的轉化。若只是將花精當作日常的保養品，當然無妨，只是依心情而隨時抽選不同花精來使用，很難定心瞭解花精的個別特質，以及深入覺察花精對治的情緒因子，更何況是提升與改變自己，以徹底平衡特定的情緒問題。


    此外同一種花精作用的深淺層次，會依使用者的心識狀況而調整，每個人的反應程度極有可能不同。或許我們可以歸納出某一種花精是針對某一種特質、情緒或某種個性的人，而建立一套經驗法則，讓操作更簡便。例如「野薔花花精」紓解壓力，所以有壓力的人都使用這個花精。但花精是靈活的、有智慧的、可以巧妙運用的，縱然相隔半年後，再度用到同一種花精，所影響、共振的層面也不會相同。因此我認為應該盡量彈性運用花精。


    很多人都有過隔一段時間，再度使用到同一種花精的經驗。例如第一次用高山薔薇花精時，感覺工作壓力再怎麼沉重，心情還是可以保持放鬆、溫暖、有動力，這時我們是因為工作壓力而與高山薔薇相應。也許三個月後我們的心靈智慧提升，觸動得更深層了，卻再度測得高山薔薇，這一回，我們所呼應的不是工作壓力，而是潛意識的憂鬱與緊繃，我們可能感受到莫名的悲傷、抑鬱、緊張怕受傷的情緒被調動呈現出來轉化。持續使用花精半年，我們的心靈變輕盈，意識清明了，可能還是會與高山薔薇相會，這次她徹底發揮正面特質，明耀的白光無比溫暖，讓我們更有動力與熱情面對生命，散發大愛！就這樣，花精由淺層到深層，靈活精巧的進行清理，又像是一盞盞的明燈，逐一照亮我們心靈的各個角落。


    「高山薔薇」明耀的白光無比溫暖，散發大愛


    ## 單方花精：掌握情緒問題點


    進行專業的花精諮詢時，我們可以依個案的狀況，以花精的正面特質、對應的負面情緒，或個性對應等方式，活用花精，搭配出最適合個案獨特心靈狀態的花精療程。例如恐慌症者，不見得只能使用幾種專門針對恐慌的花精，花精治療師可以依個案的情況，先解決迫切的情緒問題，使之快樂、安定，當個案對花精的成效清楚之後，再輔導個案一起面對主症狀的治療。


    如何在八十多種花精當中，找出五種左右最適合個案測試的花精呢？花精治療師能對不同花精有深度的體認與瞭解，最是重要。花精就是能隨著每個人的情況不同而變化，因此治療師更要具有彈性，而非只是套用公式來使用花精。


    即使面對情緒症狀較為嚴重的患者，我們基本上仍舊以單方花精來治療，個案透過諮詢，很清楚每一次所面對的情緒是什麼，逐一整理。當然也有例外，例如我治療過一些有重度憂鬱症或躁鬱症的病人，由於他們的情緒問題已經嚴重到無法靠自力扭轉，我在臨床上會採用花精加上宇宙能量光的複方花精，先緩和病徵，修復失衡的身心磁場，讓憂鬱症狀減輕，再慢慢喚回他們的意識自覺程度。最後還是恢復单方花精，使他們能清楚掌握且克服情緒的癥結。


    （右頁圖）如水滴大的「刺蓼」，可避免負面能量干擾


    ## 複方花精：無限發展的可能


    除了對應的情緒特質之外，不同花精能量作用的路徑也不同。例如蓮花花精從海底輪運行到頂輪，而「台灣黃龍膽」與「刺蓼」則是由上向下運行。若將這兩種運行方式不同的花精調製成複方，則能量會相互抵消，花精原本承接的管道也會錯亂，無法充分發揮花精原有的療癒深度。


    因此製作複方時，要依「君臣佐使」的原則，也就是有主要作用花精配上輔助的花精群，兩者必須沒有頻率抵消的情形，而能夠相輔相成。因此複方的使用上，我們傾向針對個案特別調配，或者針對一般大眾常有的情緒問題，選擇幾種能量場不相悖的花精來調製。


    若不是很瞭解花精的特質、波頻，以及進入人體後的運行方式，只是任意混合使用，治療上會顯得不夠深入。以台灣花精為例，每一種能量在人體運行的方式、對應的情緒都需清楚，例如「野薑花」治療淺層的壓力，加入「鳳仙花」與「咸豐草」給人快樂，甚至再加上其他提升自信心的花精，在確定每一種花精的承接管道不會彼此混亂之後，重新將她們共容的結構調至最完美，這樣的複方不但免除頻率相互抵消的疑慮，而且同時發揮減輕壓力、提升快樂與自信的效能，不論對治療者或被治療者而言，也都很清楚花精的作用與治療標的，這同時也發揮了花精的精神——幫助人自我覺醒與面對，治療效果會更為精準且深入。


    人的情緒將愈來愈複雜，精神的問題愈來愈嚴重，自覺力弱、渙散、迷失自我是現代人常見的現象。掌握花精的精準特質與精神，審慎控制製作過程，排除能量被削弱的疑慮，確保花朵訊息的精準特性，才能夠使花精發揮高度的平衡效果。目前我已研製出特定的複方花精，把光波和花精訊息結合，或者數種花精訊息的結合，能針對複雜或深層的心理病症，如癲癇或其他憂鬱症、躁鬱症等器質性的精神疾病，達到良好的療癒效果。


    我研發出結合特定光波與花精的訊息能量，能夠淨化眉心脈輪，使左右腦平衡清晰，提升專注力，是兼具「淨化脈輪」與「活齡養顏」的訊息能量美容水。此外，我也把花精、藥草訊息與光波結合，成為最好的「淨化空間」、「淨化身體磁場」配方。花與藥草、光波的頻率結構不同，花精作用在心靈情緒，而藥草則針對生理健康，宇宙光波可以針對脈輪閉鎖，導致人體無法自行合成必需元素而致病的問題，提供最根本的解決之道。以上訊息能量多面的結合，可以同時作用在身心靈層次，以強化療癒的效果。


    （上）「咸豐草花」黏人的種子總是喜歡跟著人一起回家

    （下）「紫鳳仙花」讓人在定靜中散發魅力


    ## 花語的靈性智慧


    我們知道，大自然的一草一木都具有高度的智慧，它們善於適應環境，且仔細記錄周遭的訊息，因應水土、氣候、磁場等的變化，調整植株的生長方式，甚至改寫DNA 的訊息，讓植物本身，甚至整個族群得以順利地繁衍不絕。


    我從小在山林中長大，觀察到形形色色的植物樣貌，總是為它們天生的智慧而嘆為觀止。例如在風大的地方生長的植物，根扎得深；在天寒的地區，植物的葉片通常會比較厚。我們可以觀察農家種植的果樹，例如梅子、柳丁等，發現從這些果樹結果的數量多寡，可以預測今年的雨量高低。它們彷彿能夠預知該年氣候、雨水的變化。雨水可能比較少時，就預先節制果實的數量；反之，該年雨水若較為充沛，天候也溫潤適合果實生長，它們就會盡情地開花結果。


    植物隨順自然地生長，精湛、靈巧，完全沒有無謂的能量消耗，它們的天賦能力，讓我們自嘆弗如。而像這類大自然中常可觀察到的奧妙，老一輩的鄉下人家或是農夫都清楚。在《植物的祕密生命》中，許多研究植物的科學家，也有同樣的發現。


    ### 宇宙時空瞬息萬變，影響植物能量結構


    根據天體物理學家的說法，地球以每秒 20 哩的速度繞太陽運轉，太陽以每秒 140 哩的速度往銀河系運行，而整個銀河系則以每秒 55 哩往仙女座而去，仙女座再以每秒
    375 哩速度往處女座靠攏！換句話說，宇宙星體是瞬息萬變的，植物所呼應的宇宙磁場持續產生電磁變化，這勢必改變植物與大自然的互應關係，以及植物本身的訊息結構，即便只是一兩年時空的變化，都可能形成能量結構的差異。


    植物因為種類不同，粗分為草本與木本，木本通常可存活好些年，而草本植物則有些可能只有一年生或兩年生。我們可以想像，五年前和五年後的環境會改變，相隔一段時間之後，回到同樣的地點，我們當初所擷取的花株也許早已化為春泥，繼而繁衍出新的生命，眼前看來花朵依舊繽紛繁茂，卻全然不是過去我們看到的那些生命體。


    當然，花朵植物的訊息會透過DNA的方式，記錄在種子中，不斷繁衍傳遞下去，然而每一株植物的適應度不同，接收的宇宙光波與頻率會有些微的差距，所記錄的正、負面特質或個性也就不可能一模一樣。


    > 種子裡記錄了植物DNA的訊息，不斷繁衍傳遞下去


    ### 地理環境的差異與變化


    即便我們找到數年前擷取花精的同一棵植物，但當地的氣候也許由乾旱轉為驟雨不斷，或者經歷地震、颱風等天然災變而地形完全改觀，甚至人口逐漸聚集增加，依照植物對訊息的細緻敏銳程度，對環境的高度適應能力，這株植物的訊息早已產生變化，甚至是否仍舊完整、健康還有待詳察。諸如此類細緻的訊息改變，製作花精時都要能夠精確的掌握，以便適度修正花語，或是在配比與稀釋、震盪過程中，調整出更完整的訊息結構，以維持花精原有的效果與品質，確保其精準共振平衡特定情緒的特質。


    ### 花朵訊息是敏銳多變的


    基於植物敏銳記錄訊息，高度適應環境的特性，我認為花精的訊息特質，需要視花朵母株的生長環境、人文、地理、時間等變化，而做彈性的修正調整。一成不變的套用花語，極有可能會扼殺花精的活潑作用特質。


    我可以從台灣花精中，找出很多例子，來說明花精因為顏色、生長環境等差異，而特質迥然不同的情形。


    例如台灣藍龍膽和台灣黃龍膽屬於同科、同種，她們的外型相同，喜歡生長的環境也相近，然而只因為顏色不同，花精的特質居然差異甚大。「台灣藍龍膽」平衡過度緊張、生活壓力大，而交感神經失調的情形；「台灣黃龍膽」則銜接不同的管道，主要作用於平衡陰陽能量，撫平莫名干擾的負面情緒。又例如同一株絲瓜花結的種子，撒在平地與高山深谷分別生長，開花結果之後，我們分別擷取花語訊息，就會發現其中具有相當的差異性。


    高山的花精與平地的花精訊息特質不同，就好比居住在鄉下地區的人，和居住在城市中的人，在思想、情感、表達、氣質複雜度上，一定是不一樣的，更何況是國內外、不同地區生長的花。此外，在不同地區生長的同一種花朵，也會因為人文、地理環境、氣候、水土，諸多因素的交互作用，而衍生出差異的特質。


    還記得我在第125頁提到的狗尾草嗎？想想這些敏銳的植物，不但記下周遭的訊息，就連路旁暫時停放的車子往來喪葬場所的移動訊息，都詳實記錄了下來，這造成了花朵訊息的改變！從這一點我們知道，每一回所擷取到的花朵訊息，極可能會和先前所擷取的花精有所差異，所以我主張：避免一成不變的重複套用花語，每一回所擷取到的花朵訊息，都應慎重的重新解析與調整，以保持花語的精準度。


    ## 瞭解花精的靈活變化性，微調花語


    由於野生蘭花難尋得，我想以人工愛心栽植的健康蘭花來製作花精。在解析花語時，居然感受到花朵被黑壓壓的網子籠罩，有一種沉重的壓力、束縛，和急於想要掙脫、呼吸新鮮空氣的渴求。原來，為了營造出蘭花喜好的濕冷環境，溫室栽培的蘭花多半會以黑網完全覆蓋，遮掩豔陽直照，以確保花朵植物順利成長。然而敏銳的植物從小在侷限壓迫的空間中生長，反而因此生出了想要掙脫束縛、重獲自由的強韌生命力。這是後天栽植環境造成的影響，在野生蘭花身上感受不到這樣的环境特質。


    ### 拖鞋蘭


    我把擷取下來的蘭花訊息做了調整，先修復她負面環境的訊息，回復平穩的波頻，再提升其正面訊息，使之成為充滿動力、衝勁與爆發力，能洗滌身心的難得花精能量，對於在工作上感覺束縛、侷限、有志難伸，卻礙於現實無法改變的人，深受病痛折磨的人，都是最好的撫慰與動力來源。


    只要能夠細緻地解析出每一種花朵訊息的特質，我們就能加以調整，修復不平穩的負面波動訊息，使正面能量提升，達到精準共振情緒磁場的程度。


    總而言之，花朵訊息是靈活且細緻的訊息，受到時間、環境、顏色、水土、人文複雜的因素影響而變化。十年前與十年後，花朵植物生長的人、事、時、地，早已有了劇烈的變化，而人的情緒狀況經歷了多年生活方式的巨變，也一定會有所改變，花語應該適時加以調整，才能避免誤差產生。除此之外，不同地區所生長的同一種花，製成花精之後，最好也重新解析花語，才不會遺漏花朵訊息因地而異的特質，以及花精所傳遞的更為細緻的精神。


    為了確保花精能夠精準對應情緒問題，達到最好的平衡效果，在花語和花精特質的相應性上，必須達到高度的準確。這涉及花精製作過程中，對訊息自始至終都能有細緻的掌握與瞭解，每一道繁複的細節，都是為了確保花精品質而不可或缺的。我們應避免落入一成不變的窠臼，先深入瞭解花精的靈活變化性質，再真正去體會且善用花語。


    蘭花多為人工栽植


    ## 自選花精與花精諮詢


    過長時間的觀念建立，與花精精神的傳遞，我們已經對花精有了一定的認識。為了架構更完整的花精體系，提供多元化的選擇，我把花精做了更細緻的分類與應用。你可以依自己的需要，自行選擇心愛的花精。


    ### 選擇一瓶最適合自己的花精


    花精依屬性分類，可以有多樣不同的變化。例如依適用對象來分，有「人」用的花精，以及「寵物」花精。任何擁有靈魂的動植物，都能夠感受到花精啟迪心靈的能量，愈是單純的生物，愈能透過花精，銜接上自然的脈動與生命本源，我可以依不同適用對象的能量結構與心理狀態，分別調製出最適用於他（牠、它）們的花精。


    除此之外，花精還可以依人的年齡層，分為嬰幼兒期、青少年期、成年期及老年期等花精群組；依身心啟發層次，分為一般「心靈覺醒系列」花精及「高階心靈系列」花精；若單純依照情緒療癒的深淺層度，則可以分為兩大類：一是平衡淺層情緒的「心靈健康系列」花精，一是調伏深層情結、情緒，以療癒創傷的「深層療癒系列」花精。目前台灣花精依療癒特質粗分為十二大類。


    心靈健康系列的花精群組，所對應的負面情緒，多半是日常生活中，因為工作、家庭、課業、人際關係所衍生的情緒與壓力，多屬於淺層的，或許隨著事過境遷，情緒或壓力便逐漸解除了。花精可以協助我們在事件或情緒發生時，以最冷靜、沉著、自信、智慧的態度，來面對與妥善處理內外在的困局。'
