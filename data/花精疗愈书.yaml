    ### 一、粉紅淡紫仙克蘭


    **開心幸福仙克蘭**

    **滿足被愛心歡喜**


    第一眼見到仙克蘭，遠遠挺出葉子的花梗，把花撐得高高的吸引人，飛綻的花瓣朝上，將花心無保留的掀開，像似在空中飛翔中的雲朵。使人感覺心情也跟著飛揚了起來，象徵人的心靈，喜歡自由不受約束，常有天馬行空般的想法。淡粉紅帶一點淡紫的花瓣顏色，給人甜蜜幸運的能量。花訊息能量作用於外在的表現，會給人心花飛舞的力量，輕微調動淺層的情緒反應，很容易令人有幸福的自由感，不會調動深層的心靈創傷。


    誇大飛揚的花瓣全掀開見底，讓整個往下的花心，可以全部坦露出來，像是我們很開懷時不設防的心。仙克蘭花朵飄散著淡淡清香，誘人接近她，就像一個人開心，快樂的氣氛容易感染人，自然散發人性善良、可愛、單純的能量。因此生意店舖喜歡擺設仙克蘭，用她誇張飛揚的花型與開心的訊息，招引顧客注意，使生意上門。仙克蘭展現她自在且親切的一流魅力。


    第一次見到仙克蘭的人會有兩種反應。正面特質反應的人：心情馬上開懷，有一種開心快樂的幸福感。這種特質的人沒有過多情緒煩惱，個性直接、單純，做事不喜歡拐彎抹角，很容易因滿足而開心，沒有什麼心眼。而沉醉於戀愛中的人，對於仙克蘭也會有好感，共振到花幸福而被愛的滿足能量。


    另一種負面特質反應的人，會覺得這花怪怪的。乍看以為花心在上方，但仔細一看，怎麼這花心朝下，花瓣往上掀翹，似乎開得有點過頭囉！會有這種負面感覺的人，害怕心靈的脆弱面被看見，容易壓抑情緒，個性小心拘謹，與人交往會保持距離，以保有自己的隱私，怕被人看穿心事。或是認為自己人緣不好的人，也不容易欣賞仙克蘭。用仙克蘭的花朵來療癒具有負面特質的人，可以使人打開拘謹自限的心，容易快樂而滿足，能開懷展現自在的笑容、散發魅力，當然人緣會更好。


    > 「仙克蘭」讓人有一種開心快樂的幸福感


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_77_0.png)


    ### 心得分享


    **莉娟**——是一個很能面對自己情緒問題的人，她可以因感動而放聲大哭，個性直接、單純、溫柔，很容易打開心親近人，你可以很快成為她的朋友。


    我選擇仙克蘭，我也很喜歡粉紅矮牽牛，但不知怎麼還是選了仙克蘭。一開始對畫畫沒有信心，所以有一點排斥，可是越畫越有成就感，覺得自己可以做到。


    老師進行花訊傳導、轉化過程中，一開始我有一種消極的想法：覺得自己怎麼不多愛自己一點，也感覺我不夠瞭解自己。不久之後，開始有了新的想法，覺得每個星期花一天時間，從南部上來參與心靈成長課程，沒有家累，不用做家事，什麼事都不用擔心，這種感覺真是滿好的，這時心情終於舒坦了。


    我們透過畫下選擇的花來認識自己，當花朵訊息共振到心靈層面時，花朵就好像一面鏡子，讓人看到自己的內在世界。花的正面訊息不斷帶給人能量，漸漸的，人會轉化情緒，感受到一種喜悅、安心與寬懷。


    **慈昱**——個性直接不造作，沒有過多的煩惱，天生熱情助人，認為花精是個好東西，樂意逢人分享。


    我很直覺就選仙克蘭，因為她給我一種簡單脫俗的感覺，雖然她長得一點也不像蓮花，卻會讓人聯想到她。仙克蘭的花跟蓮花相似的地方是，花和葉子是分開的，雖然是同一株植物，花卻離葉子遠遠的。我喜歡這種簡單、清新、沒有負擔的感覺。


    老師花訊傳導時，我突然聞到陣陣的清香，奇怪！在畫花時，怎麼完全沒有聞到？！這香味讓我感到想要安住在裡面，怎麼也不想動。可是後來我感覺有一股氣直往上提，就像一朵朵花不斷在心頭盛開，可是開的不是仙克蘭的粉紅色，而是白色。最後我做了一個禮敬的動作，感覺自己很感謝她，所以做了這個動作。


    給花朵祝福的話，我畫了一個盆栽，上頭開滿了「愛心」。代表我心中的感動。


    **蓮恩**——熱戀中的女人，酷酷的表情，不過內心溫暖，開起玩笑很有趣。


    我通常都會選紫色的花，但這次不知道為什麼，就覺得仙克蘭很特別，所以選擇了她，我自己莫名奇妙，我這個人不太可能去選粉紅色的花啊。我不太會畫仙克蘭，因為她的花朵形狀黏在一起，不像藍瑪格莉特那麼清楚，我畫了幾朵花，好像沒有畫葉子，不過我有注意到，葉子形狀很特別，脈絡很清楚。


    老師花訊傳導時，我沒有情緒的起伏，身體有氣流在跑動，感覺很舒服！老師講解之後，我才發現，喔，花跟葉子真的分得很開呢！


    初戀愛的人開懷、開朗，樂於分享，任何事物看起來都格外浪漫。蓮恩一反常態，選擇粉紅色的仙克蘭，其實是共振到花朵幸福飽滿的能量。


