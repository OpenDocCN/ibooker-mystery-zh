    制作说明：


    本书由《天使神秘学院》出重金从台湾购入的原版书籍扫描制作完成。为达到最好阅读效果，特地把书全部切开后，再经由专业扫描设备高精度扫描完成，并经过一张张的PS后期处理最终成书，其间花费大量的人力、物力以及时间，只为能给大家提供经济并优质的神秘学学习资料而努力。


    本学院强力谴责某些机构和个人，把本学院花心血制作完成的电子书籍，包装后直接放在自家网上低价倾销的行为，以谋取不劳而获的经济利益。如果长此以往最终将无人愿意再为大家花心思制作电子书，那以后可能大家再无新书可读。


    为让大家以后能够读到更多的好书，也为了本学院的良性发展。本学院恳请大家尽量做到如下几点：


    一、尽量在天使神秘学院的官方网站购买电子书籍。官网访问地址：http://www.ac2011.cn 短网址：ac2011.cn 网址含义：(Archangel
    College 成立时间：2011年)


    二、在收到电子书后小范围传阅即可，千万不要公开传播，更别挂到网上低价销售。


    同时为答谢广大支持者，学院电子书将做如下调整：


    一、学院会把一些早已收回制作成本的电子书折价销售。


    二、最新制作的电子书籍会开放打印功能，大家购买后有条件的可自行打印成书。


    天使神秘学院 2022年1月


    # 作者簡介


    陳祈明老師，1966年生，是台灣新光宇宙訊息能研究學會的創辦人，多年靜坐、練氣、研讀易經、中醫學、針灸與藥草學，能敏銳感知且運用細緻的訊息能量來治病，自行研創出台灣花精、藥草訊息及訊息排毒、全頻率的宇宙光波訊息、訊息活化飲用水、微量元素訊息、訊息美容系列、空間淨化訊息等先進訊息療癒能量，是目前世界上少數懂得完整擷取且應用自然訊息能量的專業人士之一。


    新明老師對東西方修練體系、中醫經絡心理、針灸、藥草與養生保健、疾病與身心靈的關係、情緒抒壓，有深入的實務經驗，常受邀至各大專學院、機關團體演講，首創先例提倡「訊息健康觀」，以訊息療癒身心、養生保健，引領更先進的健康概念。新明老師希望能以天地的自然能量，帶給人最徹底、自然且毫無負擔的健康生活。


    新明老師著作有《發現台灣花精》（心靈工坊出版）及本書。


    陳新明與張秋敏


