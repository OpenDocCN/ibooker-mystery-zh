  md: '上其他提升自信心的花精，在確定每一種花精的承接管道不會彼此混亂之後，重新將她們共容的結構調至最完美，這樣的複方不但免除頻率相互抵消的疑慮，而且同時發揮減輕壓力、提升快樂與自信的效能，不論對治療者或被治療者而言，也都很清楚花精的作用與治療標的，這同時也發揮了花精的精神——幫助人自我覺醒與面對，治療效果會更為精準且深入。


