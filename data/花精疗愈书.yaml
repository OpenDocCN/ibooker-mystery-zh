    根據我們對藥草訊息的解析，金線蓮訊息可以共振心輪的能量，紓解長期積鬱的情緒，使全身的氣脈暢通，能有效平衡高血壓、癌症、糖尿病等產生的失衡訊息，它維持免疫系統功能，對於平衡感冒訊息也有奇效。最近有一位罹患大腸癌的個案，因為腸胃蠕動異常，導致糞便積聚在體內，必須住院治療。在治療的過程中，他無法進食，也不能喝大量的水。剛好金線蓮訊息非常適合癌症患者的能量調理，而且訊息是直接由口腔進入內分泌腺體，共振身體能量場，不像一般飲食，必須經過腸胃道消化吸收，於是「金線蓮」反而成為他可以安心持續使用的滋養劑。不到一個月的時間，他出院了，飆高的血壓回穩，氣色由蒼白虛弱，需要旁人攙扶，到紅潤有元氣，高高興興回家。


