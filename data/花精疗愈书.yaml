    秋天的原野山間總是可以見到白茫茫一片的芒花。芒花獨特之處在於開花並不是為了吸引鳥獸昆蟲前來傳播花粉，只要秋風吹起，隨風搖曳，即可輕易完成授粉，象徵一種高度自我的展現。所以她不需要鮮豔的花色，也不需要堅挺的花萼或寬厚花瓣，讓昆蟲停留授粉。因為地下根莖發達，芒草的侵略性與擴展性極強，有時整片山坡舉目望去一片白芒花飄揚，人經過芒草叢邊，不小心還會被她銳利的葉片割傷。


