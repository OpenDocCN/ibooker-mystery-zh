    ## 台灣花精的獨特製作祕訣


    高山原野中取得的花朵訊息水，只是母酊劑，能量尚未完全激發活化，因此還不適合當作花精直接使用。首先花朵訊息必須經過淨化，剔除不必要的、負面的訊息，保留有益於人的正面能量，而且確保訊息結構的完整性。純正的花朵訊息轉載複製到水裡之前，擔任「訊息記憶體」的水必須先行淨化，將水中原本所記錄的訊息一一消磁，才能確保花朵訊息進入之後不受干擾；保存作用的「酒」的訊息淨化與醇化，可以避免酒的刺激性或釀製過程記錄的訊息，傷害或影響花朵訊息。藉由稀釋與震盪的步驟，才能夠激發花朵能量，使之活化，完全開展。


    製作花精的每一個環節都不能輕忽草率，才能確保花精的訊息精準，直達心靈，共振平衡情緒磁場，開展花精核心的精神。


    ### 獨特的水訊息淨化方式


    花精完全沒有任何化學或物質成分，唯一的介質是水。花精是以淨化過的水當作記憶體，將花朵的精神力量貯存在其中。


    水從宇宙間來到地球，原始結構本來潔淨無染。然而水亙古以來便穿梭於山河大地之間，在地球上的年歲比起任何生命更為久遠，而它擅長記錄訊息，就算汲取深山泉源最乾淨的水來分析，其中也飽含特有的訊息。


    水是最好的記憶體，科學家早已透過水的結晶體，證明它會記錄無數無量的訊息，包括怒罵或讚美也會讓水產生截然不同的變化（註：參考江本勝《生命的答案，水知道》、《幸福的真義，水知道》等書)。花朵訊息是敏銳細緻的能量波頻，若放入沒有訊息淨化過的水中，結構可能受到干擾或扭曲，影響很大。


    為瞭解這個問題，我思索著如何徹底淨化水中雜訊，同時也讓水質穩定，不再輕易記錄周遭訊息的方式。


    與「一花一世界」的花能量場原理相通，我循著水的訊息能量溯源，發現了宇宙中水源頭的能量場，以其能量轉化淨除水中的訊息，不但簡易徹底，而且還能讓水還原到本然的性質，這時的水是最純淨不受污染的狀態。


    打個比方，我們都知道金字塔可以聚集能量，之所以如此，是因為它能與宇宙的能量場相應。就像道家修練五行「金、木、水、火、土」一樣，宇宙中也同樣有五行能量場與之相應，因此五行在地球上才有運行的能量。舉例來說，木是青色，治療肝臟，在地球上屬東方，而往東方的角度若沒有青色的結構，地球上是相應不到這個磁場的，青色也就無法產生治療肝的共振能量了。宇宙法則都是以共振相應的方式運作的。簡單來說，我是運用宇宙裡水的源頭的結構，讓它和水中的分子共振，以淨化其中的訊息。


    運用宇宙水能量場來淨化水，不但使之訊息純淨、水質穩定，而且水分子變得十分細緻、活躍，結構穩定扎實，不再輕易受到外在訊息的干擾。更重要的是，它讓花朵訊息安穩入住，長保能量結構的穩定性，精巧、活化的水分子能夠承載花朵訊息，進入身體細胞當中，讓花精能量充分發揮作用，無形中使花精共振與平衡效果更為強化了。


    ### 水的本質與心靈相通


    水擅長記錄訊息，當我們以宇宙水能量場淨化過，讓水還原到原始結構時，它是最純淨不受污染的狀態。這就好比我們人類，雖然容易受各式各樣的慾望而左右、牽擾，但當我們回歸核心的心靈本質，卻永遠純潔無瑕。也因此，訊息純淨、結構完整的水，不但能和宇宙水能量場遙遙呼應，也能與我們存有
    70%水分的身體能量場相應共振，發揮淨化心靈的功能。


    水的純淨與否，對人體健康甚至心靈的影響是如此重大。其實只要將水中的雜訊一一消磁，把其結構還原，使水分子活化、細緻化，這樣的水就是身心最好的淨化、滋養補充劑。隨著訊息時代的來臨，人們生活品質的要求也會益趨提升，訊息純淨的水將徹底改寫我們對飲用水的既定概念，我們也將瞭解，回歸自然純淨的生活方式，以及追求身心靈的成長，是無分軒輊的！


    ### 淨化過的「酒」質淨香醇


    至於具有保存作用的「酒」，因為在釀製過程中夾雜了一些製作及保存歲月的訊息，還是需要經過訊息的淨化與醇化才能使用。若把沒有淨化、醇化過的酒，直接加入存有花朵訊息能量的水中，酒的刺激性質會讓花朵訊息彷彿被燙傷似的，瞬間干擾花朵訊息，扭曲花精的能量結構，就如同電視畫面受干擾時一樣，花朵形象會變得扭曲而隱約不明。所以淨化酒也是不可忽略的步驟之一。


    經過訊息轉化的酒質純定淨，它的特質被強化了，不再有刺鼻的酒精味道，而有醇潤香甜的口感，同時散發出清香。因此使用過台灣花精的人都會發現，它沒有強烈的刺激酒味，反而有一股淡雅的清韻，老少咸宜，甚至有人可以聞見花的香味。


    如何讓酒與花精相容而不影響其原來的品質，也是需要注意的。


    首先要將水與酒的配比調整好，確定一切安定之後，再讓花精入住其中，接著是稀釋與震盪步驟，過程中時時確保花精的訊息與花能量場有完整的連結。每一瓶製作好的花精，都要跟宇宙花能量場持續連結，除非受到電磁波的徹底破壞,否則花朵訊息可長保完整無瑕。


    無論是純淨、細緻、活化的水,或者淨化與醇化過的酒,都讓花朵訊息有了溫暖舒適的存在空間,不但訊息結構自始至終都能夠維持一定的完整與精準度,而且水、酒與花精訊息之間,更發揮了彼此活化的加乘效果。研發製作每一瓶花精時,必須如此堅持,才能讓花訊息發揮最適合的效能、最精準的效果。


    ### 獨家的稀釋與震盪步驟


    從自然界裡擷取到的花朵精華,所製成的母酊劑,訊息尚未激發活化,不適合直接使用,必須經過一定倍數的稀釋與震盪的步驟,才能讓訊息完全開展、能量倍數放大。這兩個步驟必須做到非常精準,才能使花朵訊息完整呈現,恰恰能夠共振人體的能量場。


    一朵花與一片花瓣所帶有的訊息,或者一個人與他身上的一個細胞所帶有的訊息,毫無疑問是一樣的。所以人身上的一個細胞就可以複製出一個人——這是訊息特有的「全息」性質。但是,一片花瓣訊息能量呈現的完整性,與一朵花的訊息能量呈現的完整性,可就截然不同了。


    基於訊息特有的全息性、複製性,我們將母劑加以稀釋,但需要注意的是,並不是無限制的稀釋,因為過度稀釋的結果,仍會影響花朵訊息的完整結構。台灣花精的稀釋倍數,經歷無數的研究結果,嚴格遵循最佳的比例。


    緊接著是十分重要的「震盪」步驟。稀釋後的花精原液，必須經過一定次數、同等頻率及固定強度的震盪過程，花朵訊息才會完全開展，呈現最完美的結構狀態，及訊息活潑度。


    經過無數次的實驗結果，我發現在花精的震盪步驟，花朵訊息放大達一定的倍數時，會得到最完整的結構，這個倍數必須精準掌握，過與不及都會使訊息變得模糊。過度稀釋或震盪的花朵訊息，就像瀑布沖激下的花朵，結構勢必因為過度沖刷而扭曲或支離破碎。此時殘存的花朵訊息隱約留在水中，卻已不具有完整的結構，及精準的頻率。


    就像收聽廣播頻道一樣，頻率精準，接收到的訊息就很清晰，頻率差一點點，雜訊就會導致收聽的訊息模糊不清。我們的情緒磁場承載著一定的能量,唯有純淨清晰、能量結構完整的花朵訊息,才能精準共振到核心磁場,進而發揮有力的平衡撫慰效果。


    花精母劑經過稀釋與震盪步驟,花朵訊息才能完整開展,真正直達心靈核心,進行身心情緒的徹底療癒與平衡。因此我們堅持使用時絕不可再自行稀釋分裝,以確保訊息共振心靈的精準度,自始至終保持如一。


    ### 影響花精訊息的因素


    | 上列：淨化與活化水及酒 | 中列：未淨化的水存有許多訊息 | 下列：稀釋與震盪 |

    | :--- | :--- | :--- |

    | 經過淨化、活化的水 | 泉水中記錄了許多訊息 | 恰當的稀釋與震盪，花朵訊息完整展現 |

    | 花朵頻率安穩入住 | 花朵頻率受到干擾 | 過度稀釋，花朵訊息變得模糊，輪廓不清 |

    | 淨化、醇化的酒不具刺激性，加入水中，不影響花朵訊息 | 未淨化的酒充滿刺激性與雜訊，加入水中，使花朵訊息扭曲 | 過度震盪，花朵訊息像瀑布沖刷下的花朵，破碎扭曲
    |


    一片花瓣的訊息雖然和整朵花的訊息是一樣的，但共振的能量結構深淺不同。


    ## 自行稀釋分裝花精?


    任何瓶裝量產的花精,都不可能是濃縮的母劑,而是經過各廠的調製步驟,製成最適合人使用的成品。所謂的稀釋與震盪,也不是自行分裝於未經訊息淨化的水中,不分比例、無限制的做稀釋與訊息拷貝,或者單單以手隨意搖晃瓶身,就可以讓訊息的活潑度還原開展。


    各人的手勁力道強弱不一,震盪頻率快慢不一致,次數可能過度或不及,都會影響訊息結構的完整性。此外,花精的頻譜與作用路徑不一,應該先深入瞭解,若逕自把不同花精稀釋混合,極有可能造成花精頻率彼此抵消。再加上把未經訊息淨化與醇化的酒,直接加在花精訊息稀釋的水中,也會破壞花朵訊息的完美結構。


    花精是細緻的能量波頻,人的情緒是一個個頻譜振幅、強度不一的訊息場,除了某些較為淺層的情緒問題,只需要充分瞭解自己的情況,找到符合自己服用的花精之外,有些花精會牽引出心靈深層的情結進行調整,對人的影響比較深遠,建議應該由專業的花精治療師,在深入瞭解每個人的獨特情況之後,慎選恰當的花精來使用。否則，在不瞭解花精頻譜與作用路徑之下，隨意抽選使用，極有可能造成原本應共振抵消的負面情緒，反而疊加強化。


    正因為深入研究，瞭解到每一個過程都對花精訊息精準度的影響甚鉅，所以我才堅持嚴格的品管過程，務求花精品質完美如一，因為唯有如此，才能貫徹花精的精神本質，徹底平衡情緒磁場，活躍靈巧地進入各各相異的人體能量場，進行心靈核心的重建工程。而這也就是台灣花精訊息結構完整、精準，絕不需要再自行稀釋的最重要祕訣！


    ## 震盪的次數影響花精分子的細緻度


    經過訊息淨化的水，震盪的次數要格外注意。隨著震盪次數增加，水分子會愈來愈細緻，而且益發活躍，此時水中的花朵訊息也會隨之活潑起來。若過度震盪，花朵訊息會變得不安定，水分子也可能太過細小，而介入心靈的層次太深，對人的影響無法預料；然而若震盪次數過少，則花朵訊息無法被激發活化，能量結構也就難以精準，達到徹底平衡情緒的效果了。因此，震盪次數過與不及，都會影響花精能量的結構穩定性。


    若在這個環節的技術操作得當，可以針對不同的心靈情緒需求，而開發出屬性各異的花精系列。例如我除了研發出一般心靈覺醒系列的花精之外，也針對心靈層次已開發程度較深者，研製出能量更細緻、更綿密的「高階心靈系列」花精。配合花朵靈性的屬性、生長環境的選擇，以及製作配比、震盪次數的掌握，高階心靈系列花精作用的意識更加深層，甚至能夠直接進入細胞DNA中，重整、提升、轉化潛意識的訊息，幫助人的身心修持達到更高的靈性層次，進入廣闊光明的宇宙空間。


    有一位擁有多年自修經驗的個案使用了高階心靈系列的白蓮花花精。他這才驚覺世俗生活中的仇恨紛爭，已打碎他一身的清明，他心中對仇家忿忿不平的同時，自己也深陷情緒困擾，不可自拔。白蓮花宛若晶瑩剔透的水晶，照見他的城府之心，化解他的怨恨，也將他從污泥中拔擢而出，讓他重新回歸本質，聖潔的心靈花朵再度綻放。


    另一個對心靈探索有著濃厚興趣的個案，使用的是紅花含羞草花精。花精透過夢境傳達了重要的啟示。


    ### 個案分享


    今晚精神特別的好，想想已經凌晨也該入睡，隨手拿起枕邊即將見底的花精，用力將吸管伸到瓶底，僅剩數滴花精便輕輕的滑入舌下，我靜靜安定心神等待睡意，一下子，我居然意識清醒的進入夢境⋯⋯。


    我站在廣闊無邊的空間，四周沒有任何光點，伸手不見五指，我踩著沉重的腳步，心裡頓時被四周黑暗的氣氛給震住，我失去前進的方向指引，沒有任何依靠，這世界只剩下我。


    此時頭往下一低，驚見放於肚子前方的雙手，燃起微弱的小火光，為了使前進的腳步充滿安定與無懼，我用意念努力將手中的火光，點得更光亮，捧著越來越大的光球，我心中不再遲疑害怕，慢慢一步一步的往前進，在無盡的廣大世界中⋯⋯。


    這夢境只有數分鐘。夢醒時我明白，一生中我都在找尋依靠——父母、朋友、伴侶、子女、信仰⋯⋯卻發現當生命結束時，所有現實的人、事、物都會消逝，而我呢？原來生命延續的動力在自己，我必須充盈靈魂的資糧，在這充滿挑戰與創造的人生。


    感謝含羞草美麗的祝福。


    「紅花含羞草」點燃生命動能


    震盪與稀釋的過程中，同樣必須連結花朵的能量場，這樣才能調製出花精的完整結構。花精有了完整的場結構，無論經過多久的時間，瓶身有多少人碰觸過，都會自動修復花朵訊息的完整性。


    製造花精的過程很繁複，每一個步驟都必須嚴格把關，無論水的配比、酒的濃度，震盪與稀釋步驟，都以不影響花精的完整結構性為前提。此外，有了宇宙花能量場的訊息導入，更可以確保花朵訊息的高度精準特性。台灣花精基於細緻的製作過程，在能量精準度與訊息的完整性上，有獨步國際的技術優勢。


    ## 順勢療法與花精療法的差異


    我們常會以順勢療法的原理來解釋花精的作用，舉例來說，一個人有恐懼的情緒，就找到一種有恐懼頻率的花來治療他。這是順勢療法「以毒攻毒」的原理。簡單來說，順勢療法採用的是自然的療法，激發人體自主防禦能力，讓人自然而然恢復健康。把有毒物質如砒霜等，運用稀釋或震盪方式，將物質的質量稀釋到幾乎不存在，此時能量會達到最高。醫師運用此藥物將病人的症狀激發出來，進而排出體外，使人體自行產生抗體，提升免疫系統能力。


    花精和順勢療法相似的部分，是兩者都有稀釋與震盪的步驟。我發現，花朵訊息在稀釋達一定狀態，震盪至一定倍數時，確實會激發其能量，使之全然開展，此時所得到的，是訊息結構最完整狀態的花精能量。然而，若將花精訊息不斷稀釋再稀釋，卻會導致訊息愈來愈模糊扭曲，最後能量結構瓦解，只剩下些微的撫慰效果。花精訊息的這個特性，與順勢療法顯然十分不同。


    此外，根據我臨床應用的經驗，花精的作用不只是「以毒攻毒」平抑情緒而已，最主要是心靈層次的引領，當花朵愛的本質與結構進入我們的意識中，內在原本匱乏的部分會滋長，創傷的坑洞會修復，心靈才能得到真正的轉化與提升。花精提升人的靈性層次，進入更開闊的生命意義當中。


    花精是細緻的振動波頻，大部分的人雖然對能量的感受比較不敏銳，而無法覺察到這微細的振動，可是當花精進入身體後，卻可以明顯感受到自己身體及心境變化。我衷心期待透過訊息完整、能量精準的花精，這份美好的花國度珍寶，能夠以正確的理念傳遞開來，讓更多人感受到花精真正的愛的精神，體會到身心靈各層次的開展與昇華。


    料理用的生薑，薑苞從不開花，在擷取花精時卻意外盛放，連薑農都驚嘆！


    # 5 如何選用花精


    我精讀的是花種自然型療癒法，以有些載體平攝取胞體的層離愈竟透過廢頻與振原應用，種度供養影響心處外屬於花療醫學的後方的流行新所在滿了訊應仍舊，主張是五種直應者為原因。傷愈是為花調應能富型躍的讀整及應康感美不來的能應一這理自然道應的心的得。藥草治癒台灣在療體系重建訊息花關想聯理層面出托素可總頁的區，能多取入身體體量最微小地。「進階能量的真化花是最徹底花種康且曲然還帶荷精與藥草種適用於精與宇宙動波檔檔的使向的體命體他訊息能應共用。


    當用液染精的體及而患高度精準的政點不僅是但象本質獲的息能還不更重要是連要所至應連要區分海爾花能量場是的部應健康此才能象是世要靈瑞層完整，能夠精準共振情緒磁場者重到徹底多應效果政會持續因塔炎花精*情定定要從宇宙都思概念該重力等生活中常見的淺層情緒問題，逐項以不同的花精來調理，這一類的花精可以不需要經過心靈諮詢，只要你掌握自己的情緒狀況，瞭解花語特質，就能直接指定服用。後者則屬於作用最為深層的花精，使用前，建議經過花精治療師專業的諮詢，精確掌握你的心識狀況之後，再協助你擇取最恰當的花精，並且提供使用過程的心理專業輔導。


    ## 單方與複方花精


    所擷取的花精有來自海拔幾千公尺高山的花朵，也有的是低海拔的平地花朵。高山花精與平地花精有什麼不同呢？打個比方，住在高山上的人思想單純、情緒直接，與住在平地或都市的人完全不同，同理，高山花朵與平地花朵也是如此。


    ### 高山花精還是平地花精比較好呢？


    有些人以為高山的花精比較純淨，事實上從台灣花精的擷取過程就可以知道，無論高山或平地的花精，絕不可能有污染的疑慮，因為她只需要以特選的菁英花朵為天線，擷取其精神訊息，免去了大量採擷、萃取物質成分的程序。無論高山或平地花精，每一種都有不同的特質，對於現代人的情緒互應，只有適合與不適合的問題，並沒有品質好壞之分。


    我們發現平地接近人群的花朵，對應的情緒頻率跟大眾比較接近，所相應的情緒更為多元，實際應用時，平地的花比高山花使用更為廣泛，平地的花精似乎更瞭解人在複雜生活下的心靈困境。若是為了提升靈性層面的狀況，則選擇高山花精的可能性比較高。高山花自在、純淨、自信；平地花則表現自愛、自信與滿足感，她們具有高度適應周遭環境的能量。


    例如我把生長在海拔九百公尺高的山谷裡的「高山絲瓜花」製成花精，也因為需求不同，另外製作了「平地絲瓜花」花精。兩者的品種相近，花朵形狀與顏色也很相似，都跟人非常親近，但是因為地理環境與周遭訊息的差異，讓花精的作用有了差距。


