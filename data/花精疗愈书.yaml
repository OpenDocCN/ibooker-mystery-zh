    ## 花型和大小會影響花朵的能量嗎？


    我們常會把自己的判斷、好惡與情感，不知不覺加諸於所看到的花朵身上。於是我們說：這朵花長得「整齊端正」，正面能量比較多；那朵花很「大」，能量比較強；花型「歪扭」，能量可能扭曲；太「小」的花，就沒有什麼能量……。


    其實，在花的世界裡，並沒有大小、美醜的分別，她們都散發獨特的頻譜，可以呼應人不同的情緒與個性，協助我們進行平衡與調理。就好比我們每一個人長得都不同，並不是只有漂亮或高大的人，才是正善之人，我們許多人也許沒有美麗的外表，卻都有一顆善良的心，持續為周遭的人、社會、環境、世界貢獻一己之力。


    矮小的台灣角桐草花，沒有高大的梅花那樣端正清麗的外型，不但花型不對稱，花心還布滿了大小不一的斑紋，擁有獨具一格的外表。但她卻能夠快速平撫焦慮，使人進入清靜的空間，筒狀的花萼，引領人重見生命的美好光明。九層塔花細細小小的，花瓣也不對稱，但潔白的光擴散開來，能調和陰陽，她具有純陽的大能量，能斷邪見、破邪氣。還有前面提到的白芒花、薰衣草，花朵都不大、花型結構也很獨特，但她們都具有難得且特殊的療癒特質。


    如何因應豐富的人心變化，架構出完整的花能量療癒體系，針對人們不同的情緒心靈狀況，提供最適切的花朵能量，最是重要。我們應該放下「以人為中心」的思考與評價，包容接納萬物本質上呈現的多重面貌，開心領受花朵千變萬化的特質，以體透花朵蘊藏的奧妙智慧。


