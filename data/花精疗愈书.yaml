  md: '出東西，用他單純的「心」，總是能透過別人看不見的角度，體悟出獨特的思維模式，自然本能的創造他想做的每件事。


    這是他從小與自然環境獨處，生出的天生氣質，生命存乎的實力是寬廣與自由，習得生命的良善、安逸與沉穩的個性，讓他逃脫繁雜的世俗、教育與干擾，往「想」發展的自由空間發揮，今天我和大家才能享用到花精的「祝福力量」。


