    # 體驗

    花朵鮮活

    的能量


    自走進大自然中,體驗花朵與大自然間的相知與共融,是很令人感動的一件事。花朵植物如此自在地融入生長的環境當中,無論刮風、下雨、烈日當空或者天寒地凍,她們依然長保安然入定之姿,不受絲毫的干擾,全然沒有挫折、煩惱等負面情緒的波濤。


    雖然隨著台灣花精問世,花精製劑使花朵能量便於保存,且方便取用,療效持續性又高,因而取代了鮮花療法。但我仍然不定期在各式場合中,讓參與者體會鮮花的能量,透過活生生的花朵,讓大夥兒親身感受到花與大自然間深連的關係。


    我喜歡帶領學生走訪山林之中,進行鮮花療法的體驗。也許是師生之間相互為伴,大家的興致高昂,我們從不在乎天候是晴是雨,即使在寒流雨中出遊,也從未聽過有人抱怨雨天的濕冷或不便,反而我們更真切的從大自然裡學習到寶貴的經驗。


    雨天的花朵,乍看之下因為被雨水淋透,而顯得殘破不堪,仔細觀察,你會發現有無數的花苞持續生長著,每一刻都有新的花朵在風中雨中怡然盛開。想想她們在連綿的雨季,依舊頂天立地,昂首接收天地的滋潤,不需要像人一樣費心撐傘,心情也完全不受天時氣候的影響,總是保持著一貫的安定、平


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_62_0.png)


    戶外鮮花療法體驗金蓮花的訊息'
