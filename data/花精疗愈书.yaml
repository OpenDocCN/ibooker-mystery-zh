  md: '飢餓的問題，他甚至可能由貧窮轉為富裕。完整的療癒不只是對症下藥，頭痛醫頭、腳痛醫腳，或者讓情緒、創傷直接消失不見，而是激發我們建立起自我療癒的機制。當我們擁有了轉化煩惱的智慧，不管遭遇到任何的挫折、痛苦，都懂得如何化悲憤為力量，從中累積生命的正向能量，進而擴大生命的視野與可能性。


