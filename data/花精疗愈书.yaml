    這類精神符號的訊息就像是修練的象徵，我則剛好具有能轉化宇宙健康正量訊息的特質。如同我們都可以輕易地運用心靈意識，「看見」蘋果的樣子，而請你從腦中拿出蘋果來，卻是不可能的，但腦中對蘋果的訊息確實存在。我善用這份天賦，成功尋得花朵訊息擷取保存的管道，將精確而肉眼看不見的訊息，透過水記錄下來，而成功製作出花精製劑。


    有關於花能量場這個世界的奧祕，一直到我成功製作出第一瓶蓮花花精母酊劑時，才真正獲得應證，成為鼓舞我繼續研發花精的重要指引。


