  md: '我們的生理、情緒、心理及靈性層面。


    陳老師在書中詳細說明了他接引宇宙訊息與花精連結的方式。在這麼多我見識過的治療師當中，我深深感覺他是最尊貴難得的人，他給予他人的能量與愛，以及深深渴望幫助他人，使他成為今日這麼一位偉大的療癒者。獲取利益並非他的目的，他拒絕在未經適當的訓練前，就任意販售或行銷台灣花精，尤其是治療級的花精；他鼓勵人們一次只用一瓶花精。如果以營利為動機，他就會倡導使用複方花精了，這樣他才可以賺得多些！


    有一次，一個心地仁慈又慷慨的男人前來，他是個積極鼓吹東方醫學的贊助商，擁有一間大型的健康診所（公司），他向陳老師要一整套的花精，想測試後交給他公司的醫生去運用。然而，陳老師卻說，他鼓勵大家經過適當的訓練後再運用花精，特別是專業諮商花療師。我真想知道會有多少人像他一樣，因為這樣的理由而拒絕人家行銷或販售自己的商品。


    陳老師體諒我們遠從美國而來，還擱下工作，訓練我成為花療師並沒有收費，我們只要付使用花精的費用即可。我們可以隨時找他諮詢，而他也總是很有耐心的解決我們的問題與困擾，我從未見過他向他人推銷自己的理想，他只是一貫平靜的坐著，人們就會向他靠攏，他就像一塊磁鐵，既安靜又自信，從頭到尾全然沒有自私小我的痕跡。


    我希望閱讀這本書時，你也能感受到自己透過一種全新且奇妙的方式找到平安，得以超越你的問題與困境，不是試著除掉它們，而是擁抱它們，花精將它們帶到你眼前，會讓你更有效的整理好這一切。我從中學習且實際體驗到的，是去面對任何我所害怕的事情，因為花精，我的恐懼直直透'
