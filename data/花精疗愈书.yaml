    花訊傳導之後，我再看海棠，覺得她很豐盈飽滿，有花團錦簇的感覺。


    淑葵和如玫兩人共同的特質是，內在都擁有飽滿的愛，她們都樂於讚美花，這共振出加倍豐富的能量，於是她們都感受到了花朵充沛的愛的能量。


    婕妤——內斂柔美，看不出實際年齡的年輕媽媽，擁有豐富的情感，寬厚的愛心。


    我選黃海棠，覺得她很飽滿厚實，很美。可是在畫時，細看花朵，會發現她的花瓣大大小小不一，這使得她看起來不像玫瑰或牡丹那樣高雅貴氣，可以登入殿堂之門。因為整叢花是層層疊疊組成，我費了好大的功夫，試圖勾勒她的邊，但真的很難，我想這應該是和我過於隨和的個性相符吧！在畫時，我也看到花的憔悴，黃色的花瓣由邊緣開始轉成咖啡色，看起來格外分明。


