    - 傷口腫痛發炎者。

    - 疝氣患者。


    # 訊息排毒的魅力


    統的排毒、解毒，是採用物理方式，吃進解毒物質，把腹內、血液裡的某些有毒成分排出體外，或者用以毒攻毒的方式，來解除體內毒素。但是這樣的效果有限，頂多只能把部分物質成分排掉。身體裡真正會影響健康，也最難以排解的，是一些已化為能量的有毒訊息。這些有毒訊息沒有質量，就像飄浮在空中的氣球一樣，難以抓取，唯一的方式，是透過訊息波共振來轉化它。


    體察大自然微妙的平衡機制，有毒的動植物雖然乍看對人類或任何生物都很危險，但若非它們吸收有毒訊息的獨特機能，其他生物，包含我們人類在內，早就因為宇宙間的致命毒素而無法存活了。這些有毒動植物，吸收了致命的毒素，為何不會死去呢？因為他們也同時銜接了宇宙的解毒訊息場，有毒與解毒的波頻如同陰陽能量，剛好形成平衡。


    訊息排毒是我獨創的排毒方式，為了讓各位深入瞭解箇中原理，就讓我先從基本面開始談起。


    宇宙裡充滿了各式各樣的訊息，這些「訊息」就如同發射器一樣，不斷地傳送波頻與大自然界相互作用。地球上的植物與動物擁有殊異的生理結構，就如同各式接收器一樣，不同的生理結構接收的是不同的訊息場，例如植物中的夾竹桃、箭毒木、天南星、大麻、紅仔珠、毒菇等等都是含有毒性的植物，它們利用特有的生理結構吸收了宇宙場裡各種有「毒」訊息，再內化成自我的防衛系統以利自己生存；反之，甘草、玄參、益母草、蒼耳子、木香、荊芥、柴胡、金銀花、白頭翁、金線蓮等，這些植物所吸收的訊息則恰好與有毒植物相反，它們具有清涼解毒的功效，能化解毒素。


    動物亦同，毒蛇、蜈蚣、毒蜂、蜘蛛、蠍子等等，這些動物吸收了大宇宙場裡各種不同的有毒訊息，再內化成為自我的防衛系統，以抵禦敵人的攻擊；然而大部分的動、植物則是接收非毒性的訊息。這種吸收正、負陰陽平衡的訊息能量並加以利用的能力，是大自然界給予我們最珍貴的智慧禮物。


    # 為什麼要以訊息排毒（體內毒素）


    人類所吃進的食物（質量）經消化後轉化成能量和訊息，「能量」消耗完了，「訊息」卻記錄在細胞中難以排除。以質量（化學性）的傳統方式排毒，其效果有限，因為殘留在細胞內的毒素大多是訊息。如家禽、家畜在養成過程中被餵以生長激素，施打抗生素，再加上被宰殺時的痛苦所滋生的毒素；負面情緒如憂鬱、焦慮、憤怒等所產生的毒素；或中西藥品的化學毒素等。這些毒素都會以「訊息」的方式殘存於人體組織中。至於空氣、水質污染，蔬菜水果殘留的農藥等這些紊亂的訊息，則會使頭腦渾沌、皮膚過敏、免疫系統降低，使人容易生病、感冒，產生內分泌系統失調等身體病症。神經系統受到毒素訊息的干擾，則會出現睡眠障礙、神經緊張、情緒緊繃。毒素訊息作用嚴重時，可能導致慢性疾病或癌症。這些「有毒訊息」是我們最容易忽略的，因為毒素殘留的訊息不易被感覺到，但它卻是導致雜病叢生的根本原因。


    「訊息排毒」不含任何化學物質，這種擷取方式的原理就像陰陽能量轉化一樣，陽至化陰、至陰化陽，由陰陽轉化間取得所需的訊息能量。它並非應用歐洲自然醫學「同類療法」的原理，以動植物體內所含的實質毒性來達到「以毒攻毒」的療效，也不是利用化學藥性，以清涼解毒的作用或化學性變化的原理作用來排毒；而是運用訊息能量波頻，進入人體的能量系統，透過共振、轉化，使累積於人體內的毒素經淨化後排出體外，同時提升自身的免疫系統作戰能力，使細胞活化，喚醒自我的療癒能力。


    舉兩個實例來說明：


    # 虎頭蜂訊息：細胞深層淨化


    自古我們常用虎頭蜂泡酒喝，以驅寒毒，促進身體的排毒功能。然而虎頭蜂的訊息卻不需要採用傳統這種以毒攻毒的方式，只要透過訊息共振原理，就能進入細胞中轉化毒素訊息再排出體外，達到徹底的淨化效果。


    虎頭蜂的訊息行走於中脈兩側的腺體與全身的淋巴、神經系統、經絡，進入肝經與腎經，以及生殖腺體，並且全身的細胞都在清除的振動之中，不斷地將人體的濁氣轉化後向外排除，有個案形容濁氣轉化透過皮膚排出的感覺，就好像「蒸包子」一樣！對於時常受到風寒或感冒的人，寒毒入骨造成筋骨痠痛的人，預備進行深層排毒的人，甚至不適合熱補的坐月子媽媽，虎頭蜂的訊息可以達到最迅速徹底的效果。


    > 虎頭蜂訊息有助於排除深層的寒氣與毒素訊息


    我在臨床上使用虎頭蜂的訊息時，發現大部分的個案都會產生明顯的好轉反應，為了避免氣喘或心臟病等重症患者因為不瞭解而產生恐慌，或者幼小孩子不善於表達感覺，造成父母的擔憂，建議這些對象先避免使用。一般人則最好經醫生同意後再使用。


    # 蜈蚣訊息：轉化化學毒素訊息


    蜈蚣是傳統中藥之一，根據《中國醫藥大辭典》記載，蜈蚣的藥性能快速行竄全身，內至臟腑，外通經絡，凡是氣血凝聚之處，都能開散活絡。


    傳統中醫以蜈蚣藥方來抑制癌細胞與腫瘤，治療中風、痛風、結核病、破傷風、百日咳、淋巴腺炎、燒燙傷等。它能入肝經，降肝火，解化學毒素、治療瘡瘍腫痛，緩和痙攣、癲癇、眩暈症狀，藥效迅速而廣泛。


    蜈蚣有百足，爬行於土地上，天生具有吸收有毒訊息及解毒訊息的能力，透過蜈蚣，擷取其銜接的有毒與解毒訊息場能量，將訊息轉化之後，轉存於徹底淨化過的純水中，就可以把蜈蚣的訊息保存下來。協助人體轉化毒素訊息，排除骨縫、關節處累積的酸性毒。


    蜈蚣的訊息善於轉化人體內所累積的酸性毒與化學毒素訊息。當人攝取過多酸性的食物，如肉類，罐頭、醃製品，速食麵、糖果、糕餅、飲料等加工食品，以及各種含有農藥、防腐劑、人工色素等化學物質的食品及用品，毒素不知不覺中會囤積在肌肉與骨縫之間，造成肌肉酸質代謝不良，筋骨關節痠痛，肌肉淋巴瘤，痛風、風濕、類風濕等。毒素影響肝膽腎等臟腑及內分泌系統的正常運作機能，導致青春痘、肥胖、過敏、香港腳、皮膚病各種疑難雜症也接踵而至。


    現代生活飲食習慣免不了大魚大肉，我們在日常生活中也常使用各種速食、加工食品，體內不知已積存了多少酸性毒與化學毒素訊息，深深影響著我們的健康。蜈蚣的訊息不但能深入人體，轉化毒素訊息之後再加以排除，對人體完全沒有負擔或任何副作用。除此之外，我發現蜈蚣的訊息還能活絡全身的氣血，協助腦波正常放電，重整腦部訊息，能有效對治各種文明慢性病。


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_237_0.png)

    蜈蚣訊息適合海島型氣候因為氣滯血瘀所導致的各種痠痛


    # 心得分享


    我的小兒子就讀於幼稚園，師資、設備一流，唯一讓我擔心的是，教室採密閉式空調。就讀這所幼稚園，兒子班上共有二十幾位同學，幾乎每一個小朋友都在輪流吃藥。


    我一向崇尚自然的方式，平時的小病痛，盡量不吃藥打針。對於兒子的上學環境，我只好用最自然的方式來因應：平日多給他使用艾草訊息，因為艾草是純陽的能量，可以彌補教室缺乏的陽光、空氣又不對流的情形，它讓我的兒子比較能保持體力。兒子面對學習新事物、結交新朋友的壓力，則用花精來平衡情緒。此外，我定時給他使用虎頭蜂排毒，以增強他對病毒的抵抗能力。


    還記得腸病毒流行時，兒子最要好的兩位朋友都感染了，只有他完全沒事。整整一年當中，記得他只感冒發燒過一次，經過一天一夜就好了。我還是沒讓他吃西藥、打針，除了虎頭蜂、艾草之外，有時我手邊的金線蓮，也會拿來幫助他加強抵抗力。他的體力一直是很好的，不用我過度操心喔。


    現在我們全家人都把虎頭蜂當作是預防各種病毒的祕密武器，不只是喝，還自己發明了噴、塗、抹等各種方式。


    因為青春痘冒個不停，我用虎頭蜂來排毒三個月。一開始沒有太大的感覺，只是因為長期睡眠不足，這時會很想睡，但一個月之後，我開始有好轉反應：咳嗽，尤其在半夜最嚴重，白天好像比較好一點。我想起以前感冒，咳嗽問題超嚴重，虎頭蜂可能整理到這些病毒訊息了。我還注意到尿比較黃、排出黑稠的糞便，還有月經開始兩天顏色很黑，腳踝幾年前車禍扭傷的地方又開始痛了起來。這些反應看起來很嚴重，可是都沒有影響我的精神，我還是正常工作、玩樂、休息。問過之後我才知道，這都是排毒的現象，所以我就繼續放心用。


    以前月經過後下巴總是會長大大的痘子，要到下次月經來前才會消掉，排毒以後就完全沒有了。還有鼻子、眼睛過敏、蕁麻疹，常感冒，都不見了。我還發現，經過三個月的排毒以後，有種身輕如燕的感覺。我現在比較敏感，有些東西我不能吃、吃了也不健康，我自動就不去吃，不用再天人交戰了。


    # 宇宙訊息能量的發展


    瀚的宇宙擁有取之不竭、用之不盡能量，如何將這些訊息波加以轉化，成為療癒身心的能量，是我積極研究的。宇宙訊息具有多樣不同的面貌，轉化之後，各有其療癒的特色與層次。它們共通的特點是：同時針對生理、心理、靈性層面，進行深入淺出的能量調整，著重生命內在核心的覺醒，由內而外進行整個生命體的重建工程，而不再只是傳統「對症下藥」的片面措施。以下所列舉的這些療癒訊息能量，都是我已經研發成功的，在此僅簡單說明之。


    # 光波訊息：讓身體機能重新啟動


    人體需要接收各種有利身心的光譜，才能合成必需的元素。但許多人因為身心失衡，經脈閉鎖，或者因為各種慾望、習性，而無法接收某些顏色光波，遇到這樣的情況，僅憑照射光波或眼睛長期注視特定顏色，效果比較間接。我擷取宇宙光源，把各色系宇宙能量光波保存在水中，製作成滴劑直接使用，當訊息進入能量中樞與腺體，透過能量波共振傳導，可以使經脈舒展活躍，各部位機能重新啟動。如此一來，身體就會自主平衡運作，吸收必需的微量元素。


    我把不同宇宙能量光波和花精結合，成為複方花精，臨床上多應用在重度憂鬱、躁鬱、癲癇患者身上，效果非常顯著。由於這些個案的病症已經嚴重影響生理，我先以這類複方花精緩解心身症狀，活絡全身氣脈，讓身體回復正常機制，能夠自動合成必需的元素。經過一段療程之後，再改以單方花精來提升他們的意識清明度，激發自覺與自癒的能量，讓他們懂得面對自己，真正為自己的生命負起責任。


    我擷取宇宙能量光波，運用不同頻譜的光波特性，共振特定脈輪，由內而外徹底平衡人體能量系統，再加上花精活躍淨化身心的特性，結合而為兼具淨化脈輪、心靈覺醒，與活化細胞、美容養顏的訊息能量。例如我把特定光波訊息和花精調和，讓它成為能淨化眉心脈輪能量，安定神魂，並且注意力集中，直覺與智慧提升，有助靜心修持的美妝水。我的想法是，把保養肌膚的美妝水和訊息能量結合，研製出能夠共振身心整體平衡系統的訊息不僅美容養顏，也同時淨化心靈。


    # 訊息活化水：身體潔淨、心靈甦醒


    人體有 70%是由水組成的。純淨的水能活化細胞，提升心靈的能量。


    水從宇宙間來到地球，原始結構本來潔淨無染。然而亙古以來水便穿梭於山河大地之間，在地球上的年歲比起任何生命都更為久遠，而它擅長記錄訊息，就算汲取深山泉源最乾淨的水來分析，其中也飽含各式的訊息。這就好比人最核心的內在是純淨無瑕的，但我們卻容易受到各種慾望的牽擾，而使心靈蒙塵。歸根究柢，水的原始結構和人心靈的本質是相應互通的，真正純淨的水，能激發我們內在的生命機制，協助淨化細胞的雜訊！


    我運用宇宙水能量場的訊息來淨化水中的雜訊，還原水的原始結構，使水分子更細緻、活躍、純淨，而且不再輕易受外在訊息的干擾。不需要添加任何微量元素或有機物質成分，口感就會變得甘美醇厚，對身體沒有負擔。更重要的是，沒有訊息干擾、結構還原至本然純淨狀態的水，能與我們的心靈相應共振，長保純淨清晰，並且提升心靈的能量。


    # 海洋系列：細胞瞬間充電


    海洋中的貝類、珍珠、珊瑚等物質，也適合研發製作成療癒的訊息。我擷取黑珍珠的訊息，發現其中的微量元素訊息，對人體有奇妙的效果。


    微量元素是維持人體組織運作的必需物質，它們是消化功能、新陳代謝、免疫力、細胞神經傳導等重要的媒介，然而攝取應適量，不足會影響身體機能，過量則可能導致微量元素中毒。我們攝取的食物中已富含人體所需元素，而黑珍珠的微量元素訊息能夠共振、活化體內這些「細胞工程師」，讓組織系統彷彿瞬間充電般，產生高效率的連結與運行能力。而且訊息完全不含化學分子，沒有過量攝取導致中毒的疑慮，我們可以安心使用。


    黑珍珠是海洋底火山元素涵養的結晶，水與火交融淬鍊而成的珍貴微量元素。黑珍珠訊息擁有宇宙的水元素，如地火般強穩的熱力，貼近地心，散發大地之母的沉穩振動。強大的能量使人穩定，扎實推進的振動波，在細胞間形成一股低頻的動能，使細胞活化，彼此的頻率平衡相容，神經系統、生理組織架構更為協調完美，身心穩定。


