  md: '息醫學很重要的一環。


    花朵蘊含細緻精微的能量，能與人類潛意識的情緒能量相互共振，進而促使大腦及其他腺體發生電化學層次的改變，激發自癒能力，協助人們達到身心靈的平衡。花精這擷取自花朵、無色無味、不含任何物質或化學成分，並且活生生的訊息能量水，是懷藏著「愛」的穩定能量，它帶來溫暖充沛的訊息，能撫平人內心的失衡情緒，讓人重新憶起生命本質的光輝，活出自在與自己。由於花精能為人心帶來深刻的改變與影響，因此很多人稱它為「神奇的心藥」。


    雖然目前已知的所有最先進科技檢測儀器，尚且無法追蹤到訊息在人體內、自然界、宇宙間的運行方式與作用層次，因為訊息甚至比光波的速度更迅速、更加無遠弗屆！但是人內在的智慧可比機械靈敏精巧。很多對訊息比較敏銳的使用者，僅僅握到台灣花精的瓶身，還未經服用，就能夠感覺花精的作用，以及花訊息能量在人體運行的途徑與方向，有些花精是行走中脈能量系統，有些是著重於某些臟腑，有些則均勻散布於每一個細胞


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_33_0.png)'
