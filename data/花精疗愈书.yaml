    # 心得分享


    # 我在光、愛與勇氣中重生


    來自母體，但對母體的排斥與怨懟，是很多人畢生的遺憾。和母親的關係是我年幼及青少年時期最大的痛，她的愛也是我一直以來無法圓滿的鄉愁，但她絕對不是個壞媽媽，她守先生、守著孩子，在舊社會的大家族裡，忍受妯娌的欺凌，周旋在無數的親友中。只是她對我的冷漠、嚴苛，及拿我和同儕間的比較，讓我深感匱乏及受傷。小時候常覺得自己不是個好孩子，不是好孩子當然就要更努力，這樣媽媽才會喜歡我，舉凡家事、農事，我什麼都會，功課也要拿第一，慢慢的好強、不服輸的個性形成。


    當所有的努力卻得不到肯定時，叛逆的人格也愈來愈強化。我只聽爸爸的話，爸爸告訴我，天下沒有不是的母親，母親沒有不疼我，做子女的要孝順，對媽媽順從就是孝順。但這樣的教誨更讓我身陷矛盾、衝突當中，我不可以頂嘴，不可以找藉口，更重要的是，我不知道自己哪裡不好，叔公伯父們都誇我允文允武相當能幹啊。其實這份愛的期待，在青少年時期早已變成恨和憤怒，但這更讓我有罪惡感，和急於逃離與母親的連結，記得有一次弟弟隨口說了一句：「你跟媽好像。」我怒不可遏，當下更是驚訝，像自己的母親對我來說，竟是如此不堪，但她沒有什麼不好啊！


    在我結了婚、女兒出生後，我知道這三十年的情結，將是我畢生的功課。因為不願女兒像自己年幼時，得不到愛的滿足，我傾全副心力照顧她。做月子時我不吃不睡，不斷替她量體溫、看尿布，算計著吃奶的時間，後來我病了，醫生告訴我：「你有產後憂鬱症，要放鬆。」


    我一直尋求幫助，對於孩子的照顧，一直希望有個樣子讓我學習，怎麼帶女兒、怎麼做母親，千萬不要落入我和母親的輪迴中，也不可應了小時候媽媽對我的詛咒——那就是生一個像我一樣的壞女孩。但我總覺得自己做不好母親的角色，就像當初做不好「女兒」一樣。


    在一次機緣下，我找到一位旅美回國的心理醫師，為我做治療。他的理論是「傷痛會因理解而得到釋放」。原本以為這次「花之舞—回溯母體胎息」就像這樣，讓我理解一些、釋放一些，但開始後，才知道，整個過程是真的！而且深層到令我幾乎無法承受。一切似乎又從頭開始了！我被包在子宮中，重新孕育，即將誕生，很痛苦！但我不放棄這個重生的機會。


    隨著祈明老師的缽聲及誘導，我是個光體，在不願意、也來不及反抗的狀態下，我已經在一條擁擠的道上前進，連轉身的餘地也沒有。「只有前進，輪迴才得以逆轉。」我告訴自己。同時我已回到子宮，一切如此真實，另一個自己更是非常清楚。


    回到子宮時，我靜靜縮著身子，同時一種讓我粉碎的傷心與孤獨，深深包圍著我，我淚流滿面，無處可逃！但一個聲音告訴我：「這是你的機會，要把握。」同時秋敏老師走到我身旁，輕聲的要我「加油」！


    我緊握著鴨跖草花精，努力讓另一個我孕育著，當我又生起百般不願，幾乎承受不住、無法呼吸時，我看到子宮中充滿著光，這些光是很多藍色的光聚成，點點閃亮著。是「鴨跖草」！這些小點點的光不斷過來撫觸我，讓我溫暖、安定和充滿力量。秋敏老師的提醒「讓愛長出來」，不斷在耳際迴盪。慢慢的，我感受到母親的心、母親的存在，母親身心俱疲，力量微弱，她不是不要我，她太累了，也病了，自己的肉體那麼沉重，哪還知道肚裡的胎兒！


    我淚如雨下，我懂了！母親在懷我之前，已經有兩個哥哥流產、夭折，懷孕對她來說是一種極大的壓力，而且此時她的身心正遭受非一般人能夠忍受的痛楚，所以我的存在，對她的意識來說是一種負擔。這樣的負面情緒在我成長過程不斷釋放，造成母女的隔閡。她不自知，且深感挫折。


    我告訴母親：「我重新孕育著，我將充滿著光、愛與勇氣誕生，這樣的力量將足以讓我們母女心靈圓滿、富足。」在一段音樂後，我誕生了！雖然過程中怕自己長得不夠好而有點急，但我深信芽已經發了，樹將成蔭。於是我任光擁抱我，淚水洗滌我。我聽見祈明老師叮嚀：「在日後，愛與光將繼續成長。」我抱著媽媽，輕輕搖晃自己的身子，淚水把我洗得無垢光透，我是個很棒、很乖、很快樂的孩子，在音樂結束前，我的心力已足夠讓我抱起媽媽。


    記得有一次花精諮詢時，祈明老師語重心長的告訴我，以前不足的愛不可能再找人要，但當你去愛人時，它也會得到圓滿。有幸在不惑之年，上這堂深層、震撼的花舞，對於母女的愛，我已不再疑惑，相信我還會更好。只因人力量不足，所以愛才無法展現，如此罷了！


    這天是母親七十歲的生日，她和女兒坐在我身邊，我對於媽媽的無形距離已經少了。覺得人生真是奇妙！女兒是個熱情愛說話的孩子，看到阿嬤總是又摟又抱，阿嬤也疼她疼得不得了，好像在我年幼時因百般無奈沒給我的，都到這孫女身上。這孩子來到人間，不是讓小時候是個「壞孩子」的我，有個「壞孩子」，而是來圓滿我和母親臍帶間的遺憾。媽媽對我的愛，藉著這個孩子得到展現，我對母親的情結，也因為她而有機會解套。'
  mdcn: '# 花療師培訓與跨領域合作


    精世界的核心，是純善的「愛」。花草植物因為愛，自願分享生命精華的奧妙，提供心靈之水——花精的製作祕訣，為人間挹注一股療癒覺醒的清流。唯有愛才能夠帶給生命清新的改變，也因為愛，我們尋得了回歸自然本源的捷徑，讓生生不息的可能性擴大。


    # 把花精的愛傳播出去


    花精的誕生，是天時、地利與人和的因緣巧化。在新世紀的開始，我們大多數人正因為各種已知、未知的健康危機、心理與靈性茫然迷失，而身心俱疲，於是我們由追求物質轉而深入心靈探源，醫學開始呼籲把身心靈當作一體來治療，在回歸自然、反璞歸真的潮流之下，花精本質的訊息在此時出現，有其深刻的意義。


    花精蘊含生命的奧妙、愛的真諦，是大自然給予我們的祝福，更是質淨天然且直抵身心靈的完美療癒訊息。透過花精療法，我們獲得身心的治療、生命的智慧及靈性的提升，我們藉此尋得自我療癒的可能，以及嶄新的生活方式。我衷心盼望能把自己所瞭解的花精知識，透過不同管道與方式廣傳出去，讓花精這份愛的訊息完整的體現，精準的撼動人心，讓生命覺醒昇華。


    我認為，花精療法最主要的應現意義，就是以愛來療癒人心。從技術層面來說，它結合了自然醫學、量子醫學、訊息科學、心理療法、東西方醫學與精神系統。這是一門深廣博綜的專業療法。


    透過演講、著作、刊物，我盡量忠實傳達花精愛與分享的訊息，讓大眾能夠從不同途徑，瞭解訊息的特質與優點，打開接觸與嘗試訊息療法的可能性。此外服務系統的建制、品質的把關、專業人員教育訓練、研究與應用的拓展，都在確實傳遞花精精神的前提之下，逐步交織建構出完整且嚴謹的體系。


    # 不斷深入學習與研究的領域


    因為深入花精領域瞭解訊息特性，從研究、擷取、製作到應用，我們都是在熟悉花朵能量的來源與管道、花語特性、訊息特質之下，單純實行。我們深感唯有完善的培訓制度，才能讓花精治療師真正學習到花精療法的精髓，不僅能善用助人，也有益於自身的修為與提升。


    過去，我們已經陸陸續續針對一群醫護人員，完成了花精治療師的種子培訓工作。隨著花精療法的逐漸普及，我們也呼籲更多對自然療法、身心靈工作有興趣，且熱於助人的朋友，一起加入花精療法的行列。我將和各位分享自己多年深入研探花精訊息科學的成果，以及實務應用的臨床經驗，透過智性與直覺體驗的結合，讓種子花療師由心領略花精國度的智慧與奧祕，學習完整扎實的資訊與專業技巧。


    我們想提供給花精治療師的，不是單調的花語知識和應用技巧，而是直接領會花精訊息的智慧，從中體悟靈活應用的方式。此外對情緒療法的認知、訊息檢測方法、心理諮詢等專業技巧，還有心靈意識成長、健康人我關係、深度的生命方向探索等個人修為訓練，由內而外打造完善的培訓制度，為準花療師未來的生涯作最好的準備。


    花精治療師專業進修是沒有止境的，舉凡量子科學、訊息醫學、自然療法、東、西方精神體系與醫學專業知識、心理助人專業技巧等，都和花精療法息息相關，需要持續不斷的深入學習與研究。我們也為花精治療師提供在職輔導：針對花療師面臨的實務困境，給予臨床技巧的專業建議；或是個案後送服務。


    只要你擁有一顆熱情助人的心，願意把花精的愛傳遞給周遭需要的人，就是我們尋找的培訓種子。你可以接受基礎訓練，學會正確選用花精，做自己或家人的健康花療師；或者接受進階課程，成為顧問花療師，以專業經營態度，服務更多朋友；甚至接受高階養成培訓，成為專業諮詢花療師。


    # 共享資源交流與應用


    研究花精、訊息醫學的腳步，從不曾停歇，我們與各機關學校合作，將持續發表實證研究，例如透過人與環境的關係瞭解情緒緣由，及宇宙訊息能的療癒效果。我們非常樂意持續公開研究發現，和大家分享。期許有更多公益團體和專業研究機構，能夠加入花精的行列，共同在訊息能科學、自然療法、身心靈療法的領域中研究耕耘，讓訊息醫學更加落實且廣傳，真正利益大眾，淨化生命，為地球、宇宙播下一份善美的能量。


    (右頁圖)「台灣藍龍膽」是本土特有的花種


    首席花療師的經驗分享 193


    # 7

    花精與心靈的立體展現


    心靈意識擁有豐富的內涵，我們可以進入意識之海，汲取源源不絕的智慧與能量（自性寶藏）。花精最可貴之處在於，她是活生生的訊息，能夠進入我們身心靈各個層面，以充沛的愛與自信波頻，引領我們進入光明之中，進而徹底療癒身心。她們是富含彈性與智慧的光之精靈。


    擷取製作每一瓶花精時，我和秋敏深探花朵能量的世界，汲取她們各有千秋的飽滿智慧，每每對不同花精豐碩圓滿的訊息而讚嘆不已。我盡了最大的努力，把每一種花的光華與智慧完整收錄下來，欣喜的發現，花的訊息能量不但能夠發揮強大的療癒效果，為人們找回內在心靈的桃花源，而且因為對心靈具有獨特而靈活的作用特質，能搭配各種自然療法、身心靈淨化課程，做最完美的結合與應用。


    # 花之禪

    與花之舞


    我們謙和用心與花訊息相連結，心靈意識進入花能量的導護中，我們的心彷彿一朵盛放之花，身體頓時間可以自由、呼吸，穿梭心靈海，新的心靈能量引流注入，如同植物學會留存原地，善應環境的多變，與自然宇宙間和諧的律動。


    呼吸間的能量，花精生命的智慧


    混亂思維與心靈創傷，會使人呼吸變得有壓迫力，無法與臟腑和諧的律動，常為了釐清混雜的心理感受，而忘記呼吸的存在，輕忽呼吸對身心連結的重要性，這也是身體百病發跡的根源。呼吸長短淺薄，吸呼間不規律轉化，會影響心脈的跳動頻率，無法精確共振身體能量，帶以足夠的氧量，讓細胞替換滯留的廢能量，日積月累殘餘的負能量，附著於細胞逐日壯大，形成身體磁場的一股亂流，身體疾病也因而顯現。


    如果我們未能覺察，轉化心靈的暗潮洶湧，就必須學會照顧自己的呼吸，像植物憑藉三大生命基礎的要素：空氣、陽光和水，開啟生命的大智慧。我們先照護身體的呼吸，讓供氧量不縮減，自然心會安靜下來，在花精健康活躍的能量中，返給修護心靈的耗損，保住身心的能量不流失，再從中找尋生命的亮光。


    我們心靈常駐「我」心中，在心靈意識迴盪反芻間，很多關於「我」存在的生命訊息，透過身體在一呼一吸之間的轉換，我們才得以感知生命的延展。生命能量透過呼吸，建構出身體的存在外貌。當我們對身體外貌不滿意，不是選擇忽略、減肥整形，更不是從此自卑或自棄。我們對外貌過度的追求或自卑，是因為內心的匱乏所造成，應該審視造成心靈失衡的主因，是嫉妒、是不夠自信，還是迷失自我的價值。


    心靈建構出個人獨特的生命氣質，身體就是透過外在世界，在呼吸間交替建構的能量，如果我們對自己外在條件不滿意，應當找出心靈匱乏的原因。在花能量共振訊息、轉化後，外在的形貌自然會轉變，雖然我們無法像帥哥美女引人注目，但充滿自信歡愉的心，散發出知足的氣質，會吸引大家親近喜愛，這才是最踏實相隨一生，永不磨滅的生命能量。


    呼吸在花舞與花禪間，扮演虛實、陰陽能量傳喚的巧化之力，呼吸是我們穿梭於現實與心靈間的連結訊息，在花能量的化育中，真實感受生命存在的奧妙。你可以在此時靜下心，滴入花精，手握瓶身，感覺一吸一呼間調息身心的律動，很多複雜的思潮會平息，一種深遠厚實的呼吸能量，由心靈的深處帶出，活躍身體細胞的優質訊息，供給腦部清晰的能量，自然身心的體察變分明。


    # 花禪：花中之禪，動中之禪


    - 整體平衡 太極之風

    - 流轉乾坤 生生不息

    - 動中有靜 靜中有動

    - 妄念不生 心體寂靜


    禪意指心境清明，任何意識的雜念隱沒當下，心體寂靜中體悟深遠的生命存在哲理，每個人靜於當中，悟化出存在的力量，或於「禪」中深刻連接心靈動力的要素，作身心深層的陰陽轉化，讓我們的意識雜念隨之消化。


    花禪是動中之禪，肢體表現陰陽調化的能量，動中有靜、靜中有動。花精像智慧的老者，讓心停止慌亂、盲目與無從，如心靈的導師安定於心，使心體融合於現前。她運轉身心的能量，讓心明亮活躍，產生身體的和諧律動，肢體在靜動間轉換陰陽之氣，閉鎖的身體氣脈打開，活絡全身的氣穴，血液自然流暢充盈細胞，進入身心全人的和諧共振。她使心靈意識的覺知更深遠而遼闊，與自然同融一體，體悟生命存在的本質。


    植物存於自然間比動物久遠，源源不絕的生命展衍，一輩子深根於地而不轉移，在定中勇於接受自然的挑戰，不是對宿命低頭，而是於定中展現生命的契機。花朵就是植物於環境中粹鍊、昇華出的生命語錄。花禪就是讓我們學習植物，如何安處於不變的環境事實，知道在風中雨中適時的轉換姿態，讓自己安全留存，呼應宇宙植物的智慧語錄，收錄植物適應環境的生命哲理，花朵是生命正面能量的至美化身。利用花能量導引深層意識，體悟花禪深定的力量，洗滌身心靈的創傷，讓我們走出生命的低潮，看見生命的曙光，禪般的生命意境，透過身體、語言、意識心靈的展現，一種清明覺知、喜樂無為之訊息，自然流走於身心，展現生命的智慧。


    > 回溯母體胎息：回到媽媽子宮裡，重新把自己生出來


    # 花舞：讓心靈回歸自然的原始語彙


    美妙飄逸花仙子

    風中雨中舞嬋娟

    啟動心靈生命力

    綻放自在花之舞


    花舞不是運動，也不是單純「感應」花能量而任意舞動，它是一種深入心識細膩的心靈活動。花舞是一種自然心靈舞蹈，自由呼吸的身體律動，藉由花精的觸媒作用，在呼吸間傳透身心意念結合。當我們放鬆、安靜閉上雙眼，傾聽自己呼吸的韻律，心靈的空間感打開，我們會湧現內在的聲音，現前的情緒狀態，安定、不安、焦躁、鬱悶、迷惑、失去動力或人生方向，甚至對自己存在的思潮……，在一呼一吸間，傳遞出心靈深處的訊息。


    花精的訊息讓我們卸下防禦心，我們輕易透過表意識，察覺身心的狀況，讓身體自由動起來，每個細胞都是「複製的我」，肢體不透過大腦的刻意，毫不掩飾或抑制地表達真實感受，訴說內在聲音。


    花舞讓心靈回歸自然的原始語彙，你無須用語言層層疊疊的包裝，透過肢體語言閱讀內在的聲音，花精直接點喚心靈力量，傳遞花朵燦爛開放的心情。花能量像是心靈的明燈，光明、希望、自在的指引心靈意識蛻變，在每個人可承受的範圍內，安全的探究生命課題。


    # 會呼吸,就會跳舞


    秋敏老師獨創的花舞,是希望每個人接受自己真的會跳舞,簡單的舉手投足,都是身體的語彙,不必經過大腦,反應真實的內在。說到跳舞,很多人會說:「喔!我不行耶!我的肢體僵硬,節奏感又差。」馬上生起退卻的心。事實上,花舞對自我意識的提升快速,我很鼓勵大家接觸花舞,由不同的角度探索生命的課題,只要我們會呼吸,自然展現身體的律動,這就是跳舞,並不需要任何技巧,讓身體自自然然的說話。


    大家自願、自然與自由的表現肢體,不是強迫、激烈、侵入性表相的肢體。我們經由花能量的幫助,緩慢沉穩地呼吸,直抵心靈深處,瞭解自己,認識自己。花精的能量讓心形成一個保護場,使人變得勇敢、睿智而清明,此時隨著心識的轉動,身體能量會自然重整,肢體顯化其內心的轉變,裡外能量會同時蛻變。一點點步伐邁開,一些些手勢變化,都是心靈內化出來的身體動能。沒有美醜表徵的評斷,沒有僵化的固定肢體模式,沒有擾人的節拍,只是利用自己天生的本能,自然呼吸,將心靈訊息外展,傳呼到身體細胞。讓肢體活起來,逃脫大腦的設限,源源不斷的透過肢體展現生命的訊息。


    我們由小小簡單的肢體,找到心靈失衡的問題,修護深層的創傷,呼吸因此變深遠自由而無束縛,所以只要我們存在而呼吸,就會跳舞,就會花舞。


    會呼吸,就會跳舞


    # 花精、身體、心靈:三面立體能量的展現


    秋敏老師一直把花舞視為一種生命藝術創作,每個主題都是由心靈的觀點出發,以人性共通的脆弱面,透視、進入生命的關愛,讓心靈因花舞能量,在身心靈三面立體的角度透視自己,看見且真實的體驗生命,進行靈性的開展與提升,改變生命的素質。


    花舞由花精清明的訊息,帶領心靈進入高度的覺知,「我」即代表當下覺知的心,像似雷達般靈敏的掃讀身體所傳遞的語意,當身體傳喚心靈深處的訊息時,身心靈三面立體交匯成豐沛的能量,這些訊息構築成身體獨特能量的流化,轉化舞動出肢體,這是最真誠被直接看見的「心靈語言」,是無法被大腦掩飾掉的語言。


    花舞在花能量清明之中,引導初「我」存在的心識活動,「我」是一個會思維、感知、聆聽、看見、審視、關照、覺察、穿梭、傳喚與連結未知的心靈能量,讓潛意識的能量走出身體,當潛藏的生命訊息,透過「我」存在的心識活動,身體的機制便產生變化,閱讀到生命的訊息。


    當「我」面對心靈創傷,因為心的共振與接受度,我們在肢體能量的變換中,覺察到了情緒狀態。花舞讓身心靈三面立體呈現,心靈透露出事實傳遞到身體,形成「我」特有的肢體能量模式,我們可以走出「想像空間」修築的自己,落實看見一個三面立體、交匯生命能量的自己,從而瞭解大腦想像與實際行動中的自己,這其中的差異。我們藉此如實的覺知、傳達心靈深處的感受,傾聽身體所傳遞的訊息,改變情緒的困惑,提升生命素質。重新在花舞的新視覺角度，發現身心靈三個面向，看待一個更完整自己，一個三面立體展現豐沛生命能量的自己。


    花舞找回自信，舞出自在融洽的人我關係


    花精與心靈的立體展現 203


    # 生命藝術的創作題材


    花舞可融合應用各種心靈療法，每個生命皆具獨特性，用身體表達心靈真實的世界，用身體傳遞各種藝術訊息，都是我們認識自己，表達自己的最佳工具。


    花精是花舞的精髓，花舞表現的精神要素，取決於花語表達。例如：「回溯母體胎息」主題，應用 BABY 般可愛的鴨跖草花精，滿足嬰兒時未受呵護的愛，我們利用花語的溫馨滿足特性，加入不同音樂的情境，進入潛意識流，接受「光、愛」的祝福，利用臍輪保有的母體訊息，回游至母胎重新連結母愛，享受媽媽給予新生命的照護，再經過產道重新誕生。BABY
    沉浸於天然音樂共振中，因為鴨跖草訊息補足了匱乏的母愛。鴨跖草給予心靈深處滿滿的慈愛，一種生命被祝福、期望的能量，經由心靈肢體細胞間轉化、呈現，療癒未受自己珍愛、祝福的生命。


    這套花舞的創作組合，用來療癒不受媽媽關愛的小孩，與媽媽關係疏離，互動不良或衝突者。我們


