    # 我在光、愛與勇氣中重生


    來自母體，但對母體的排斥與怨懟，是很多人畢生的遺憾。和母親的關係是我年幼及青少年時期最大的痛，她的愛也是我一直以來無法圓滿的鄉愁，但她絕對不是個壞媽媽，她守先生、守著孩子，在舊社會的大家族裡，忍受妯娌的欺凌，周旋在無數的親友中。只是她對我的冷漠、嚴苛，及拿我和同儕間的比較，讓我深感匱乏及受傷。小時候常覺得自己不是個好孩子，不是好孩子當然就要更努力，這樣媽媽才會喜歡我，舉凡家事、農事，我什麼都會，功課也要拿第一，慢慢的好強、不服輸的個性形成。


    當所有的努力卻得不到肯定時，叛逆的人格也愈來愈強化。我只聽爸爸的話，爸爸告訴我，天下沒有不是的母親，母親沒有不疼我，做子女的要孝順，對媽媽順從就是孝順。但這樣的教誨更讓我身陷矛盾、衝突當中，我不可以頂嘴，不可以找藉口，更重要的是，我不知道自己哪裡不好，叔公伯父們都誇我允文允武相當能幹啊。其實這份愛的期待，在青少年時期早已變成恨和憤怒，但這更讓我有罪惡感，和急於逃離與母親的連結，記得有一次弟弟隨口說了一句：「你跟媽好像。」我怒不可遏，當下更是驚訝，像自己的母親對我來說，竟是如此不堪，但她沒有什麼不好啊！


    在我結了婚、女兒出生後，我知道這三十年的情結，將是我畢生的功課。因為不願女兒像自己年幼時，得不到愛的滿足，我傾全副心力照顧她。做月子時我不吃不睡，不斷替她量體溫、看尿布，算計著吃奶的時間，後來我病了，醫生告訴我：「你有產後憂鬱症，要放鬆。」


    我一直尋求幫助，對於孩子的照顧，一直希望有個樣子讓我學習，怎麼帶女兒、怎麼做母親，千萬不要落入我和母親的輪迴中，也不可應了小時候媽媽對我的詛咒——那就是生一個像我一樣的壞女孩。但我總覺得自己做不好母親的角色，就像當初做不好「女兒」一樣。


    在一次機緣下，我找到一位旅美回國的心理醫師，為我做治療。他的理論是「傷痛會因理解而得到釋放」。原本以為這次「花之舞—回溯母體胎息」就像這樣，讓我理解一些、釋放一些，但開始後，才知道，整個過程是真的！而且深層到令我幾乎無法承受。一切似乎又從頭開始了！我被包在子宮中，重新孕育，即將誕生，很痛苦！但我不放棄這個重生的機會。


    隨著祈明老師的缽聲及誘導，我是個光體，在不願意、也來不及反抗的狀態下，我已經在一條擁擠的道上前進，連轉身的餘地也沒有。「只有前進，輪迴才得以逆轉。」我告訴自'
  - '[PAGE 209]


    己。同時我已回到子宮，一切如此真實，另一個自己更是非常清楚。


    回到子宮時，我靜靜縮著身子，同時一種讓我粉碎的傷心與孤獨，深深包圍著我，我淚流滿面，無處可逃！但一個聲音告訴我：「這是你的機會，要把握。」同時秋敏老師走到我身旁，輕聲的要我「加油」！


    我緊握著鴨跖草花精，努力讓另一個我孕育著，當我又生起百般不願，幾乎承受不住、無法呼吸時，我看到子宮中充滿著光，這些光是很多藍色的光聚成，點點閃亮著。是「鴨跖草」！這些小點點的光不斷過來撫觸我，讓我溫暖、安定和充滿力量。秋敏老師的提醒「讓愛長出來」，不斷在耳際迴盪。慢慢的，我感受到母親的心、母親的存在，母親身心俱疲，力量微弱，她不是不要我，她太累了，也病了，自己的肉體那麼沉重，哪還知道肚裡的胎兒！


    我淚如雨下，我懂了！母親在懷我之前，已經有兩個哥哥流產、夭折，懷孕對她來說是一種極大的壓力，而且此時她的身心正遭受非一般人能夠忍受的痛楚，所以我的存在，對她的意識來說是一種負擔。這樣的負面情緒在我成長過程不斷釋放，造成母女的隔閡。她不自知，且深感挫折。


    我告訴母親：「我重新孕育著，我將充滿著光、愛與勇氣誕生，這樣的力量將足以讓我們母女心靈圓滿、富足。」在一段音樂後，我誕生了！雖然過程中怕自己長得不夠好而有點急，但我深信芽已經發了，樹將成蔭。於是我任光擁抱我，淚水洗滌我。我聽見祈明老師叮嚀：「在日後，愛與光將繼續成長。」我抱著媽媽，輕輕搖晃自己的身子，淚水把我洗得無垢光透，我是個很棒、很乖、很快樂的孩子，在音樂結束前，我的心力已足夠讓我抱起媽媽。


    記得有一次花精諮詢時，祈明老師語重心長的告訴我，以前不足的愛不可能再找人要，但當你去愛人時，它也會得到圓滿。有幸在不惑之年，上這堂深層、震撼的花舞，對於母女的愛，我已不再疑惑，相信我還會更好。只因人力量不足，所以愛才無法展現，如此罷了！


    這天是母親七十歲的生日，她和女兒坐在我身邊，我對於媽媽的無形距離已經少了。覺得人生真是奇妙！女兒是個熱情愛說話的孩子，看到阿嬤總是又摟又抱，阿嬤也疼她疼得不得了，好像在我年幼時因百般無奈沒給我的，都到這孫女身上。這孩子來到人間，不是讓小時候是個「壞孩子」的我，有個「壞孩子」，而是來圓滿我和母親臍帶間的遺憾。媽媽對我的愛，藉著這個孩子得到展現，我對母親的情結，也因為她而有機會解套。'
- md: '## 引導者解析肢體、療癒心靈的能力


