  md: '避。牠常會因為身邊突然的聲響，而驚嚇得彈跳有一公尺高，腸胃不好，總是嘔吐不止。她給家中的母貓喝過幾次「艾草訊息」（藥草）之後，居然意外治好了貓咪易受驚嚇的狀況，漸漸的貓咪回復了應有的豐腴。她說：「我也餵牠喝紅蓮花，可以感覺到貓咪立刻看起來有精神多了，她開始會主動找另一隻貓咪玩耍追逐，跟以往無精打采的樣子完全兩樣，花精和艾草顯然讓她的心情也變好了呢！」


    花精也意外救回了一隻小鳥的性命。有一位媽媽養了一隻嫩綠可愛的綠繡眼，平時任牠在家中自由活動，但有一天綠繡眼不小心被小孩壓到，不知道是因為驚嚇過度，或者受傷了，躺在地上奄奄一息。全家人都很難過，對牠的存活抱著悲觀的希望。但這位媽媽突然靈機一動，找來孩子正在使用的蓮花花精，滴了一滴在鳥兒嘴裡。奇蹟發生了，第二天綠繡眼居然意外活了過來！全家人對這件花精救小鳥的故事，一直到現在都津津樂道呢。


    寵物因為身軀小、個性單純，無論使用花精或藥草訊息，效果都比人來的迅速且直接。訊息能量可以迅速行竄身體能量場，安定身心靈的狀態，速度可比一般物質或藥物直接而迅速。


    我針對寵物的心靈需求，研發出十至二十種寵物專用花精，無論在訊息波頻、能量結構上，都是針對寵物而量身打造的。可愛的動物們感受到花世界所傳遞的美好能量與訊息，和主人之間將構築更完滿的緣分關係，彼此之間多了一份共享的美好事物。'
