    調整這類型的人，讓人瞭解自己的光明正面特質，勇於像花一樣表達自己的意見、個性，重塑自我身分的價值與定位。反之，有時候我們會過度開放，而失去了原有的表現分寸，這也可能呼應到海棠的負面特質，花朵能量會讓我們知道如何調整自我，擁有合宜融洽的言行表現。


    在參與的二十五人中只有三個人選擇這花，是因為大部分的人都瞭解，愛是有條件分寸的，而且清楚自己的承擔能力。選擇海棠的三個學員，是在所有人全選好坐定位後，才在猶豫之下最後落座的。有一位同學站在黃花海棠旁遲疑、拿不定主意，最後受到別人的催促，才匆匆決定，這正符合海棠花沒主見而隨和的個性，而她是所有人中表現最大方、開朗，會開懷大笑的人；另一位是有著燦爛笑容、給人很多溫馨慈愛、最具有媽媽特質的人。所有人都定位後，最後一個學員才選定海棠，她長期以來總是過度的付出，一直在找尋自我身分的認同感，懼怕對別人表現自己的個性。


