  md: '大的訊息能量場，在空間中凝聚成一股念力，影響大環境的變化，很多天災人禍發生，就是受這股力量的牽動而引發的。古人有一句諺語說：「善有善報，惡有惡報。」指的就是心念的善惡，會共振吸引同性質的事件發生。這也是訊息轉為實質事物所產生的效應。


    科學家曾經對植物作實驗，兩株植物分別接收來自於人的讚美及惡罵，結果大大影響了植物的生長。日本的江本勝（Masaru Emoto）教授，透過水的結晶來觀察人的意念對水的影響，同樣有驚人的發現！（註：請參考江本勝的著作《生命的答案，水知道》、《幸福的真義，水知道》）我們應該瞭解，人的任何起心動念都是活的訊息，會記錄在自己的細胞記憶體裡，每發出一個善念就能對許多生命體有助益；反之，嫉妒、憤怒、憎恨、不滿等，負向糾結的情緒訊息反饋，共振身體產生不平衡的波動，傷害最大的還是自己。


    因此對人、社會、國家、自然界動植物、環境、地球、太陽，甚至宇宙星體也一樣，我們都應該給予祝福，給予關愛。對任何的生命體而言，愛就是生命展現最大的力量！


    宇宙訊息能量是一門人類窮盡累劫心力，也探究不盡的珍貴資源。若念頭雜亂，再加上心地不正，我們就無法共振互應到好的訊息資源。人可以意識到過去、現在、未來的存在，能感知世界的寬廣無限，宇宙的神祕無盡。所有的訊息都是來自宇宙本源，它與地球上的質量接通而產生共振波頻。人經過不斷的醒覺修煉，也會提升、蛻變心靈的能量，而具有自然訊息的傳播及轉譯'
