    # 心靈層次的開闊與提升


    有些人尋求花精的幫助,並不是要解決情緒方面的困擾,而是在人生的某個階段遇到了瓶頸。例如畢業後進入就業市場的徬徨與茫然,青春期少年面對身心蛻變的尷尬與衝突,更年期男女受賀爾蒙變化所苦,屆退休年齡者經歷的身分轉變以及對未來的不確定感。還有些人在家庭、事業、婚姻、人際關係各方面都已十分順遂圓滿，但他們想要尋求生命內在的著力點，靈性上的歸屬感，以及精神上的支持，為自己的人生、心靈方位定錨，過得更自在、開闊、無私與完滿。花精在這方面可以給予心靈需求強而有力的支持。


    花精的訊息是靈活聰明的，她會視每一個人的心靈狀況而作用在深淺不同的層次，很多人持續使用花精，相隔一段時間之後，又測得過去曾經使用過的同一種花精，但因為這段期間經歷過不同花精的調理，心靈變得更加清明了，對同一瓶花精的感受會截然不同，而且益發深刻。


    每一種花精都同時作用在身、心、靈各個層面，我們在不同時刻所呼應的，可能是花精不同層面的作用特質，也許初期是為了解決情緒問題或生理狀況而使用花精，一段時間之後，我們變得自在、開懷、健康了，靈性自然會想要更上一層樓，這時花精會幫助我們進入心靈更深的層面，打開視野，讓我們看到生命存在的深刻意義！


