    也許你會疑惑，為什麼花精不直接安撫我們的情緒，讓心情立刻平靜無波呢？這就是「症狀治療」和「完整療癒」最大的差異所在。


    負面情緒磁場隱藏在我們心中時時隱隱作用，讓我們不勝其擾，若只求暫時安撫，就好比一個房子裡堆放了不用的物品、不喜歡的東西，雖然我們努力釘箱子放雜物，以維持表面的整齊，但每個角落都堆積著各式各樣的物品，久而久之灰塵、蛛網愈積愈厚，勢必會讓住在'
