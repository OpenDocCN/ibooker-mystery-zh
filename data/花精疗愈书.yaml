    # 寵物花精


    物和人類雖然無法透過語言直接溝通，卻可以建立很獨特的感情。有些動物放棄原來的生長環境，選擇和人朝夕相處，不論是出於主動或被動，牠們已成為和人類相處最為成功的動物，例如貓、狗等。人在生活中與貓咪、狗兒日夜相伴，自然比較容易熟悉動物的行為語言，也比較能夠對其他陌生的動物產生真誠的關懷，更何況，牠們直接而單純的情感，不知道撫慰了多少人孤單寂寞的心。動物天生豐沛的情感回饋，甚至比人和人之間的情感，更能夠喚回我們的熱情！國外盛行的「寵物療法」，就是透過人與寵物間建立起單純的愛，來轉化人因憂鬱、絕望、孤寂等情緒，所導致的心身疾病！


    # 你真懂牠的心情嗎？


    動物成為寵物，雖然免除了生存於殘酷的原始環境的生死奮戰，但同時牠們也付出了相當的代價。學習以人為天，對主人察言觀色，學會人類表情達意的模式，被迫接受人類的食衣住行等生活方式，對單純的牠們而言，實在是很大的壓力與挑戰。牠們的身上，還流著祖先們生存於自然中必備的原始本能，但血液裡的衝動與現實環境相較之下，落差實在太大了。此外，與人類的訊息磁場相通，牠們在不知不覺間，也承襲了人類的負面陰影，例如各式疾病，恐懼、緊張等不穩定的情緒。


    在台灣花精還沒有正式推出寵物花精之前，就已經有幾位關懷寵物的朋友，給他們的寵物喝花精或藥草訊息了。'
