    # 花精療癒書


    INTRODUCTION TO FLOWER ESSENCES OF TAIWAN


    陳祈明 著


    # 出版緣起 心靈新視野


    這套《新心靈》叢書所揭示的編輯理念是，不斷以一種新的視野，探瞰人類的心神與靈魂。


    在內容上，它超越物質、時空與科學典範的規限，不排除人類經驗的任何部分，包括神祕經驗、精神感知，與直觀的智慧。在方法上，它仍然重視推理，但不以實證法為必然，而更致力於撼動人們生而有之的想像力與領悟力。在品質上，它的格局必須博大得足供讀者親自參與思考及體悟，甚至有暫時存疑的自由；不強迫灌食任何一種信仰，造成迷信，或訴諸法術的教習，形成另一重心靈桎梏。


    做為讀者的您，可以是科學的愛好者，也可以謝絕宗教教義，但這並不對立於您對心靈的關心，以及對智慧的嚮往。出版這套叢書，是基於我們對於人類身為萬物之靈的一種慶幸，也是一種提醒。讓我們尊重、了解並善加開發自己的高層精神力量，讓萬物因人類的智慧而美好。現在，就請接受我們的邀約，共同晤訪這幻化多姿的心靈大千世界。


    # 推薦人的話 體驗花精的神奇


    胡因夢


    與花精結緣是多年以前的事了。當時我正在經歷一場前所未有的身心試煉，人性底層的種種幽暗情緒，包括抑鬱、焦慮、無感、孤立感、厭離、方向不明等等，皆因產後憂鬱症而浮上心頭，幾乎是分分秒秒都處在試煉中，既揮之不去，也無法壓制。為了自救，我竭盡所能地藉由覺察觀照來穩定自己，並開始對各種另類療法興起了一探究竟的意願。


    在嚐試過放血、針灸、草藥、中藥、生機飲食、大腸水療、斷食、營養補充、靈療、花精療法之後，我發現最後這兩項另類療法最沒有副作用，也最適合知覺已演進到精微次元的人。


    根據西方能量醫學代表人物，狄帕·秋普拉的觀點，人體的精微次元是一種傳導訊息的智慧網絡，可以對我們最微細的心念及情緒做出立即反應。他稱之為「量子機制身」（quantum
    mechanical body）。如果一個人長期進行內觀覺察，就能從意識的粗鈍次元轉入精微次元，進而體認到其中細微的能量振動，亦即發現了量子機制身，也就是東方醫學所謂的「氣脈體」。


    我在另類療法的實驗過程裡發現，如果醫療能活化身體的量子振動、改善傳導作用，就能達到療癒效果，而高功能者的靈療以及花精療法，均能單純而直接地形成這種療效，其他侵入性或物質層次的治療則會造成人體的負擔。


    幾年前在圓山診所接受崔玖大夫的花精治療，透過北美蓮花，我對自己長久以來的「宇宙鄉愁」有了進一步的了解，而向日葵則使我身上數萬條經絡裡的能量同時共振（瑜伽體系主張人體總共有七萬二千條經絡），甚至轉進了異次元，經驗到無法用理性解釋的另類意識狀態。詳細內容收在我的傳記裡，讀者可以參閱。


    自從《發現台灣花精》問市以來，就不斷有人向我提及陳祈明老師，但見面的緣份一直不具足，直到最近某位老友的情緒失衡，需要立即予以協助，方才興起嘗試台灣花精的念頭，並因而結識了陳老師。


    陳老師的診斷方式完全不借助儀器，只是單純地藉由把脈來直觀求診者體內能量訊息，即使有靈界干擾，也無須任何形式化的超度或溝通，便能在短時間內消除求診者精微體內的擾動能量。老友在短短幾十分鐘的治療之後，情緒明顯地平靜了下來。接著陳老師要我們把花精握在手裡，藉由身體的前傾或後傾來判斷哪一瓶最適合自己。我選出的花精是香蕉花，其作用是針對產後憂鬱、更年期癥狀、體質虛弱、活力不足等等的問題，而功效則是在迅速活化細胞，調整經絡、提升生殖輪及海底輪的能量。


    回家之後我開始服用香蕉花精及陳老師最近研發出來的珍珠微量元素訊息，我發現海底輪與臍輪的能量振動明顯提升，思維速度則變得比往常要快，顯然神經傳導確實因微量元素的訊息而改善。奇妙的是，無須物質元素的補充，單憑能量訊息，竟然也能達到增強神經傳導的功能，可見能量醫學的確有不可限量的願景。


    三個星期之後，再度陪同馬來西亞的友人去見陳老師，這回我選出的花精是紅牽牛花，及排毒系列「虎頭蜂」訊息，前者能化解過往的情感創傷、扭曲的自我認知、焦躁及抑鬱等負面情緒，後者的作用則是共振毒素訊息，並達到轉化與解毒的效果。長期以來帶領讀書會及工作坊，我高度敏感的體質及接收性，時常會因吸收過多負面訊息而產生焦躁的情緒，連帶會出現倦勤的反應。服用紅牽牛花五、六天之後，無論大環境的氣候出現什麼變化，對應的人有什麼情緒或念頭，甚至在沒有任何運動的情況下，心情都能維持愉悅及平靜。更奇妙的是，虎頭蜂訊息竟然能改善我黏液過多的體質，讓氣脈暢通，不再因大環境裡的負面訊息而產生焦慮反應，多年的腸胃脹氣問題也解決了。誠如陳老師所言，「花」的訊息中確實蘊藏著愛的力量，讓使用者有一種被深深滋潤的感覺。


    親身體驗過台灣花精之後，衷心希望讀者、情緒上需要幫助的朋友、已經轉入精微次元的修行人，都能藉由本土發展出來的高能量花精而達到平衡身心靈的效果。


    推薦人簡介：

    胡因夢，名演員、作家與譯者，體質敏銳，直觀力強，現從事身心靈的整合研究與治療。近二十年來，引介了多位心靈導師至華人世界，如：克里希那穆提、肯恩·威爾伯、佩瑪·丘卓及阿瑪斯等。著作有：《死亡與童女之舞》、《古老的未來》、《茵夢湖》等。譯作等身。


    # 推薦人的話 無價的寶藏

    一個美國心理學家的台灣花精之旅


    Ghazi Kaddouh 博士 / 醫師


    我原本在柏克萊大學擔任心理諮商中心的博士後研究員，經過辛苦的一年後，我的丈人邀我和妻子參加二〇〇五年七月在夏威夷舉辦的「生物訊息醫學研討會」。在這之前，除了幾次針灸之旅，讀過「皮膚穴道電機能篩檢儀」（electro
    dermal screening devices，簡稱「穴檢儀」）的一些資料外，我對東方醫學完全沒有涉略。丈人認為，我身為心理醫師，應該對生物能訊息醫學的其中一派——花精療法特別感興趣，因為它能夠治療到人的心理層面。


    研討會中我們遇到很多有趣的人，有醫生、科學家、藥師、研究者、教授、中醫師，以及包含我在內的兩個心理醫師。有幸能夠遇到陳祈明老師，對妻子和我而言是生命中很重要的際遇。祈明老師原本排定在研討會中演講，但是因為某些因素取消了，結果他只能在會場展示台灣花精。他和兩個學生、他的妻子及八歲的女兒是遠從台灣前來參加研討會。


    我是一個懷疑論者，我的質疑來自於接受西式的教育。從身為柏克萊大學的學生開始，我便和許多學生、教授一樣，把科學方式當作金科玉律，用來評估每天這個發現、那個技術所產生的無數論點。科學方式著重於實證研究及先進的數據分析結果，普遍運用在應證不同的假設是否成立，它讓我完成學生的第一項研究計畫和接下來的論文，我既興奮又目眩神迷，於是質疑任何沒有經過科學方式驗證的事物。


    當我身在夏威夷，聽到陳老師以及在台灣備受尊崇的醫師、這次研討會的主辦人崔玫教授論及花精療法的優點前，我已經長時間不斷告訴自己，要打開心、保持彈性，接納整合醫學與療法。記得我在奧勒崗大學心理諮商中心做準博士實習的時候，他們著重在多元文化觀點，主要目標是協助心理治療師覺察到自己的偏見與自我中心觀點，能夠熟悉於相反的意見，而且平心以對。我告訴自己，如果有一個個案對東方醫學有興趣，相信花精，我就要支持且承認他的想法和感受，絕不以任何方式看輕他的信念而危害到他。我自問，為什麼不能對東方醫學，特別是花精療法的治療師打開心胸，如果我沒有先自己認識、研究且體驗過它，怎麼能武斷判定它只是一時的流行或騙人的呢！於是我真的這麼做了！沒有任何相關的支持文獻，或西方比較有份量的論文可依賴，只除了我自己和妻子實際使用花精的體驗。


    夏威夷的研討會，妻子和我在進出演講會場時，不斷經過陳老師的展示攤位，我們很快就認識了，因為陳老師不會說英文，語言成了我們之間的隔閡，幸好我太太是個香港人，而且陳老師的學生會說英文，我們終於能夠溝通。陳老師邀我去台灣，他說很高興能夠和我一起探討並且教導我更多有關花精的知識，所以我和妻子便收拾行李，離開了我們的公寓，到亞洲開始了為期三個月的行程。我們兩人一起擱下工作，進行這場新穎且令人興奮的探險。從陳老師身上學習到的，對我們而言是無價的寶藏！


    陳老師教我的許多治療技巧，大多和我學生時代，及擔任博士後研究員成為實習心理師的訓練相符，然而他身上有某些特質，讓我覺得他和我認識的其他心理治療師或醫者完全不同。他不認為心理問題或生命的困境是病態的，相反的，他把這些看作是必要的，如此人們才能在自己的課題中努力耕耘，而這樣的信念，正是他研發花精的最初發想。他以獨特的天賦與能力，接引宇宙的訊息，連結到花朵身上，他所擷取的花精，完全不需要傷害花朵，所製作出來的花精既獨特又充滿能量，能夠充分支持且平衡我們的生理、情緒、心理及靈性層面。


    陳老師在書中詳細說明了他接引宇宙訊息與花精連結的方式。在這麼多我見識過的治療師當中，我深深感覺他是最尊貴難得的人，他給予他人的能量與愛，以及深深渴望幫助他人，使他成為今日這麼一位偉大的療癒者。獲取利益並非他的目的，他拒絕在未經適當的訓練前，就任意販售或行銷台灣花精，尤其是治療級的花精；他鼓勵人們一次只用一瓶花精。如果以營利為動機，他就會倡導使用複方花精了，這樣他才可以賺得多些！


    有一次，一個心地仁慈又慷慨的男人前來，他是個積極鼓吹東方醫學的贊助商，擁有一間大型的健康診所（公司），他向陳老師要一整套的花精，想測試後交給他公司的醫生去運用。然而，陳老師卻說，他鼓勵大家經過適當的訓練後再運用花精，特別是專業諮商花療師。我真想知道會有多少人像他一樣，因為這樣的理由而拒絕人家行銷或販售自己的商品。


    陳老師體諒我們遠從美國而來，還擱下工作，訓練我成為花療師並沒有收費，我們只要付使用花精的費用即可。我們可以隨時找他諮詢，而他也總是很有耐心的解決我們的問題與困擾，我從未見過他向他人推銷自己的理想，他只是一貫平靜的坐著，人們就會向他靠攏，他就像一塊磁鐵，既安靜又自信，從頭到尾全然沒有自私小我的痕跡。


    我希望閱讀這本書時，你也能感受到自己透過一種全新且奇妙的方式找到平安，得以超越你的問題與困境，不是試著除掉它們，而是擁抱它們，花精將它們帶到你眼前，會讓你更有效的整理好這一切。我從中學習且實際體驗到的，是去面對任何我所害怕的事情，因為花精，我的恐懼直直透視我的雙眼，說：「喂，醫生，我在這裡！你要怎麼處理我啊？」生平第一次，我得以回望我的恐懼，沒有絲毫的顫抖或畏縮，我說過我要克服它，而且我真的辦到了。讓人愉悅的驚喜是，我發現自己的恐懼只是空氣和薄紙做成的弱小怪獸而已，它們完全沒有實質性。我明白此刻已經沒有什麼事可以阻止我循著生命的「呼召」前去，長久以來站在我面前阻擋我前進的恐怖妖怪，終於被世界上最溫柔的能量「花精」給移開了。


    推薦人簡介：

    Dr. Ghazi Kaddouh, Psy. D 是美國奧勒崗大學及柏克萊大學的臨床心理學博士，擁有心理醫師的執照。偶然的機會與陳祈明老師相識，祈明老師運用台灣花精治癒他多年的頭痛宿疾，也順利幫助他們夫妻倆懷孕成功之後，他深受感動，順應著內心的「呼召」，專程前來台灣，向祈明老師學習花精療法，成為台灣花精專業諮詢治療師的一員生力軍。他把台灣花精帶到美國，以心理專業結合花精療法，幫助更多的人。


    # 推薦人的話 愛在自然間美麗躍動


    張秋敏


    八年前我在鄉下電台工作，當時還不認識祈明老師。有一天祈明老師的朋友，從台北南下到電台來，遇見我便熱心的向我提到，我和他的一位朋友（祈明老師）長得很有夫妻臉。他曾聽祈明老師直覺提起過未來老婆的條件，而這段因緣就在中南部。這位台北來的朋友見到我，認為我的外在條件很吻合祈明老師所描述的對象，應該是我沒錯！我心裡想，常常有人幫我介紹對象，早已見怪不怪，也就沒把這事放在心上。


    我的「阿婆身體」（台語：意指身體很差）任誰知道了都會退避落跑，所以我只能將注意力集中在工作，上節目時麥克風打開的數分鐘內，是我最充滿熱情能量的時候，關上麥克風一放音樂，其實身體是很虛弱無力的掛在那兒，尤其是播報一長串新聞的時間最辛苦。我的工作環境四周機器環繞，再加上二十四小時機房運轉，樓上頂樓又架著發射台，電磁波對我的敏感體質更是造成莫大的干擾，讓我連呼吸都需要努力，想結婚會嚇死人的。


    沒多久公司舉辦義診活動，從台北請來祈明老師參加。回想那天晚上，我正在播音室裡，接近七點下節目時，我竟全身敏感到氣脈竄動，心臟頻率也跟著亂跳一通，沒多久看見播音室窗外的一角，坐著一個留標準西裝頭，穿著整齊白襯衫，打領帶，一臉傻傻砲砲的先生，我心想原來是他啊！傳說中和我有夫妻臉的人現身了——祈明老師。


    當晚祈明老師利用生物能儀器幫我檢測身體，發現我的身體磁場很不穩定，似乎受到很大的負面能量干擾，以至於我來不及呼吸，就把身體的氣耗散掉。他不假思索起身幫我調理身體的氣場，那時我的心中湧進了一股很熟悉的感覺，好像認識眼前這個人很久很久了，我心裡直覺馬上反應：「他是我先生」。當時我並沒有任何好壞的想法，就是單純的知道，「他是我先生」。那時生命對我來說，只存於呼吸間，我沒有過多的心力或任何的雜念想「為什麼是他」，當然更別提會有「喜歡」和「愛」的過多感受。當時也不知該怎麼說出這心中湧進的直覺，只好轉個彎拼命的問：「祈明老師你是誰？！你到底是誰？！」他沒回答我，只是淺淺的微笑著，給人一種過人的安定力量，以及不急不徐的簡樸態度。


    雖然我已知道他是我未來的先生，那時我心中並沒有愛情般的羞澀感，反而是一種很老的朋友相見的感覺，而且我都快掛了，他才出現。往後幾天，我們很少說話，當然沒談情也沒說愛，話題全都在我的身體問題上。言談中不管我說出什麼奇異或驚人的內在世界、想法，他都不曾質疑，反而比我更有興趣知道，更認真的看待造成我身心靈失衡的問題。也因此，他是第一個沒被我的奇怪想法嚇跑的人，就這麼在第十天決定娶我。


    當然閃電結婚的原因，絕不是我用奇怪的想法去「威脅」他，告訴他第一天見面時，我就直覺知道他是我先生了。這件事在婚前他一直是不知道的。（婚後我才知道，祈明老師在第三天也認定我是他太太。）當時結婚的原因，除了我們彼此有種似曾相識的熟悉感，和超乎常人的勇氣外，實在也是因為我的身體太糟糕了，祈明老師不忍心看我難過，只好娶過門來照顧。兩個禮拜後，我們在觀音廟前套上戒指，他便匆匆結束掉台北的物理治療中心，帶著一卡車的家當搬到鄉下城鎮住，準備結婚事宜。接著我們忙著拍婚紗，還記得拍照時他還得一邊拍，一邊照顧我，為我調氣提神，免得我身體累垮掉，老婆就沒了。兩個月內，我們終於如願結婚，幸好我還活著，他很勇敢照約定真的娶了我。'
