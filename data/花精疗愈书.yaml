    # 震盪的次數影響花精分子的細緻度


    經過訊息淨化的水，震盪的次數要格外注意。隨著震盪次數增加，水分子會愈來愈細緻，而且益發活躍，此時水中的花朵訊息也會隨之活潑起來。若過度震盪，花朵訊息會變得不安定，水分子也可能太過細小，而介入心靈的層次太深，對人的影響無法預料；然而若震盪次數過少，則花朵訊息無法被激發活化，能量結構也就難以精準，達到徹底平衡情緒的效果了。因此，震盪次數過與不及，都會影響花精能量的結構穩定性。


