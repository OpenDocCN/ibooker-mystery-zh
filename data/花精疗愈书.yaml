    ### 二、藍花瑪格莉特


    **掙脫壓力 釋放情緒**

    **回歸真我 表訴真情**


    瑪格莉特是大家熟悉的花，輕盈簡單的花樣，使人心有灑脫自在外放的舒坦感。瑪格莉特花有好多種顏色，而花朵顏色不同，療癒的情緒面相就不同，藍色花療癒的情緒與現實生活面有關。花朵在晚間會將花瓣由外端往內捲，讓人誤以為花要凋萎了，其實她跟人的作息一樣，等待明日太陽出來，花瓣就會再度三百六十度展開，迎接新的一天。這花接收太陽光波，而非其他的電磁波，與我們的生活同受太陽的影響。


    解析出花語，花朵的能量作用於頭部，可以清除紊亂的腦波，化解現實壓力的情緒。藍花瑪格莉特對應的，是我們清楚、每天都必須面對，而無法馬上解除的現實問題，例如工作、生活、金錢、課業壓力等。這些壓力會使身心靈能量日益耗損，情緒容易煩躁、不安、耗弱、沮喪等，這是忙碌的現代人的文明病。藍瑪格莉特對於壓力的紓解，有很好的平衡能量。


    二十五位參與者有五種花可供選擇，卻有高達九個人選擇藍瑪格莉特。這顯示大部分的人傾向於先面對當前現實面的壓力，平衡之後，才會注意到心靈創傷的療癒，也才會進一步深入心靈意識的覺醒與提升。所以大多數的人會選擇這盆花，是我預料中的情況。


    花朵由眾多繁雜的枝葉中挺開出，有掙脫煩憂，汲取新鮮空氣的特質。而植物枝葉生長的細密度，像極了生活的壓力帶給我們的煩亂感，所以許多學員在畫葉子時容易感到心情煩躁，原本以為藍瑪格莉特是最容易畫的花，結果仔細觀察到葉子時，反而起了煩惱心。


    這時潛伏的情緒會被共振而浮現出來，迫使我們清楚面對情緒波動，當我們再次見到花型、花朵色澤，這種單枝生長、飄飛於葉部之上，最簡單、乾淨的花朵，就會想要掙脫現實，進入自我想像、幻化的世界中。這花的能量，可以讓人回歸現實，重現生命力，學習用最簡單的心應對生活，可以在壓力之中透氣、深呼吸，展現自我的存在，達到情緒平衡。


