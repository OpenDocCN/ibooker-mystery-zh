    # 花療師培訓與跨領域合作


    精世界的核心，是純善的「愛」。花草植物因為愛，自願分享生命精華的奧妙，提供心靈之水——花精的製作祕訣，為人間挹注一股療癒覺醒的清流。唯有愛才能夠帶給生命清新的改變，也因為愛，我們尋得了回歸自然本源的捷徑，讓生生不息的可能性擴大。


    # 把花精的愛傳播出去


    花精的誕生，是天時、地利與人和的因緣巧化。在新世紀的開始，我們大多數人正因為各種已知、未知的健康危機、心理與靈性茫然迷失，而身心俱疲，於是我們由追求物質轉而深入心靈探源，醫學開始呼籲把身心靈當作一體來治療，在回歸自然、反璞歸真的潮流之下，花精本質的訊息在此時出現，有其深刻的意義。


    花精蘊含生命的奧妙、愛的真諦，是大自然給予我們的祝福，更是質淨天然且直抵身心靈的完美療癒訊息。透過花精療法，我們獲得身心的治療、生命的智慧及靈性的提升，我們藉此尋得自我療癒的可能，以及嶄新的生活方式。我衷心盼望能把自己所瞭解的花精知識，透過不同管道與方式廣傳出去，讓花精這份愛的訊息完整的體現，精準的撼動人心，讓生命覺醒昇華。


    我認為，花精療法最主要的應現意義，就是以愛來療癒人心。從技術層面來說，它結合了自然醫學、量子醫學、訊息科學、心理療法、東西方醫學與精神系統。這是一門深廣博綜的專業療法。


    透過演講、著作、刊物，我盡量忠實傳達花精愛與分享的訊息，讓大眾能夠從不同途徑，瞭解訊息的特質與'
  - '[PAGE 193]


    優點，打開接觸與嘗試訊息療法的可能性。此外服務系統的建制、品質的把關、專業人員教育訓練、研究與應用的拓展，都在確實傳遞花精精神的前提之下，逐步交織建構出完整且嚴謹的體系。


    # 不斷深入學習與研究的領域


    因為深入花精領域瞭解訊息特性，從研究、擷取、製作到應用，我們都是在熟悉花朵能量的來源與管道、花語特性、訊息特質之下，單純實行。我們深感唯有完善的培訓制度，才能讓花精治療師真正學習到花精療法的精髓，不僅能善用助人，也有益於自身的修為與提升。


    過去，我們已經陸陸續續針對一群醫護人員，完成了花精治療師的種子培訓工作。隨著花精療法的逐漸普及，我們也呼籲更多對自然療法、身心靈工作有興趣，且熱於助人的朋友，一起加入花精療法的行列。我將和各位分享自己多年深入研探花精訊息科學的成果，以及實務應用的臨床經驗，透過智性與直覺體驗的結合，讓種子花療師由心領略花精國度的智慧與奧祕，學習完整扎實的資訊與專業技巧。


    我們想提供給花精治療師的，不是單調的花語知識和應用技巧，而是直接領會花精訊息的智慧，從中體悟靈活應用的方式。此外對情緒療法的認知、訊息檢測方法、心理諮詢等專業技巧，還有心靈意識成長、健康人我關係、深度的生命方向探索等個人修為訓練，由內而外打造完善的培訓制度，為準花療師未來的生涯作最好的準備。'
  - '[PAGE 194]


    花精治療師專業進修是沒有止境的，舉凡量子科學、訊息醫學、自然療法、東、西方精神體系與醫學專業知識、心理助人專業技巧等，都和花精療法息息相關，需要持續不斷的深入學習與研究。我們也為花精治療師提供在職輔導：針對花療師面臨的實務困境，給予臨床技巧的專業建議；或是個案後送服務。


