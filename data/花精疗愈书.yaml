  md: '# 個案分享


    使用台灣花精一年多了，面對生活，我有一種全新的體認，不再像以前一樣，受困於情緒之中不可自拔，反而時常感覺心中有一種喜悅源源不絕的湧出。也許是心清明了，夢境變得十分清晰，除了「日有所思，夜有所夢」的混亂夢境之外，一些具有「啟示性的夢」出現的頻率居然增加了。這類的夢總是格外清晰，令人難以忘懷，而且強烈牽動我的情感，激發動力，讓我更加真誠的面對生命中的人事物。


    還記得服用「蒔茶花」時，陸陸續續做了幾個有關於死亡的夢，其中一個最具有代表性：我和先生一起坐上熱氣球，輕盈的飄上天空，回到了原來的「家」，但先生卻在自家的後院水池上方，為了幫我擋掉突然而來的子彈，被人射殺了！也許潛意識裡，我一直恐懼著親近的人(或者自己)會突然消失不見，這讓我不知不覺間緊抓著一切而無法放鬆。


    夢中「回家」的情境被倒帶，我又重新經歷了一次！而這次回家的路對我而言，似乎一點也不恐怖，反而有如三月的春遊，順著水流，在春風拂曉、綠意環繞中返家，感覺很安心、舒適。這類的夢境裡，總是有水環繞，我也不知道是為什麼。


    做完這個夢之後，我有一種如釋重負的感覺，蒔茶花散發很多很多的安心，有那麼一瞬間，我似乎被賦予一種看盡世事的了知與坦然，有「天塌下來也不會怎樣」的感動。接下來至少有一個星期的時間，我潛意識裡的擔憂、害怕、膽小消失了，夢境裡充滿了安逸的幸福感；生活中對某些人的害怕與隔閡也完全不見了。


