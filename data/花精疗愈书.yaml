  md: '粉紅玫瑰花精柔和的愛的能量，撫慰深度的悲傷所導致的哀愁與孤單感。掃除這位個案心頭莫名、沉重的壓力，也讓他懂得如何表達自己，傳達自己真正的情感，不再壓抑。經過三個月密集的花精療程之後，他的氣色、心情、想法改變的程度，讓周遭的朋友都驚訝不已。他找回了自己的自信與幽默的潛質，也因此對自然療法產生濃厚的興趣，最近他重返學校，進入研究所準備鑽研這個領域的學問，他以全新的態度看待自己的人生，重新出發。


    大多數的人就像以上的例子一樣，使用第一瓶花精就有很明顯的效果。例如，一個自我要求很高的高三學生，為了即將來臨的學力測驗而焦慮煩憂到失眠、注意力渙散，我以「台灣角桐草」花精，很快撫平了他的焦慮，他說晚上可以安穩入眠了，而且懂得冷靜理性地規劃讀書計畫，面對即將而來的學測挑戰。


    一個長期為事業打拼的男士，使用了「藍色牽牛花」花精之後，長久以來胸口緊迫、呼吸不順暢的壓力症狀減緩了，失眠多夢的情形改善，不但睡得沉穩而且一覺到天明。他開始懂得為自己安排時間，以恰當的休閒時間，來排解工作業務沉重的壓力，神奇的是，多年的煙癮突然停下來了，以往易怒、煩躁的心情也跟著一掃而空。


    有一位長期憂鬱的女士，有嚴重的無力感與絕望感，「百合花」花精給了她強大的支持力量，陪伴她度過抑鬱、絕望的情緒黑暗期，讓她虛弱疲乏的身軀有了再度動起來的力量。「非洲鳳仙」花精給她自在、自信與快


