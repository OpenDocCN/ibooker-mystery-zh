    (下)「菖花」打開矛盾心結，提升行動力


    即使是自行選擇的花精，也可能因為個人的意願或敏感度高，而調動深層的情緒問題加以整理。當情緒的探索與整理愈來愈深入時，花精諮詢會是更安全、更全面性的方式。花精諮詢首先呈現的是人際關係，你和花精治療師之間的互動，其實就是日常生活中，你與他人往來關係的縮影，可以藉此觀察自己在人際關係上的反應機制。此外，透過與專業治療師的對話，花精治療師客觀的觀察，彼此激盪的思潮等，你可以更全面性的瞭解自己。


    大多數的人會逃避憶起過往的創傷，然而勇於面對與調整失衡的情緒磁場，卻是療癒唯一的途徑，這時專業人員給予我們的協助與支持，就顯得格外重要了。花精治療師適切的提攜與輔導，再加上花精在精神上的激勵與引領，讓我們以無比清明的意識、勇氣與力量，超越自我生命的侷限。


    無論是自選花精或接受花精諮詢，我們都應該做好心理準備，花精並非只是對症下藥，把我們不喜歡的負面情緒去除掉而已，她擁有更全面性的平衡能量，讓人整體得到提升與真正的覺醒。


    測試選擇花精的方式有很多種，我在第一本著作《發現台灣花精》已經詳細介紹過了。以下簡單介紹幾種方式，供各位參考：


    - 你可以參考本書的花語介紹，理性判斷你認為自己需要的花精。

    - 自我情緒檢測法：透過「情緒檢測表」或「花語檢測表」等問卷，檢視自己目前的情緒壓力。

    - 型環測試法：挑選出可能適合的花精後，將左手大拇指和食指圈成一個環，緊緊扣住，若是適合的花精，手指環堅強有力，反之共振弱的花精，則可以輕易扳開手指。

    - 隨機抽取法：讓自己安靜下來，以嚴謹的態度，閉上雙眼直接抽選花精。這種方式簡便易行，在西方非常盛行，然而東方人深受風水讖諱文化影響，容易落入以花精來「算命」的心態，若能克服這方面的影響，定心選取，一次使用一瓶單方花精，誠懇面對與調整，則不失為一個簡便的好方法。

    - 花卡圖片測試法：憑直覺來選取吸引自己的花圖卡。


