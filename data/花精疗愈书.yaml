  md: '服用香蕉花精及陳老師最近研發出來的珍珠微量元素訊息,我發現海底輪與臍輪的能量振動明顯提升,思維速度變得比往常快,顯然神經傳導確實因微量元素的訊息而改善。奇妙的是,無須物質元素的補充,單憑能量訊息,竟然也能達到增強神經傳導的功能,可見能量醫學的確有不可限量的願景。


    胡因夢

    身心靈療癒課程講師


    因為台灣花精,我的恐懼直直透視我的雙眼,生平第一次,我得以回望我的恐懼,沒有絲毫的顫抖或畏縮,我發現自己的恐懼只是空氣和薄紙做成的弱小怪獸而已,它們完全沒有實質性。我明白此刻已經沒有什麼事可以阻止我循著生命的呼召前去,長久以來站在我面前阻擋我前進的恐怖妖怪,終於被世界上最溫柔的能量「花精」給移開了。


    Dr. Ghazi Kaddouh, Psy. D

    美國柏克萊大學臨床心理學博士兼心理醫師


    花精療法在世界上已盛行六十多年,可貴的是,台灣也研發有屬於自己的本土花精。作者陳祈明先生深入鑽研花精領域多年,自行研創出本土花精,為輔助醫學挹注一股新的發展。本書詳列花精製作秘訣、詳盡的花語、花精對身心靈的影響等,是陳祈明先生珍貴的實際運用經驗與心得。本書詳列多達七十種的台灣花精,內容充滿原創性,深入淺出,提供認識花精世界的可貴入門指引。


    鍾聿琳

    台北國立藝院校長


    秉持尊重生命及本土化的最高原則,台灣花精的製作過程不摧折花草,不傷害植物,含蓄最健康的療癒訊息;所有花精的來源均取自於與我們一起成長,生活在同一天氣、土壤、磁場等地理環境的本土花朵,完全瞭解我們的心情、心境與心靈,能與我們密切的共通、共振與共融。台灣花精是非常適合我們的花精。


    林承箕

    內科、心臟內科主治醫師、完全優整合醫學診所院長


    如果您對一般的精神藥物及心理治療都有所保留的話,花精療法是您可以嘗試的另類選擇。身為精神科與心身醫學的專業人員,為陳祈明老師在台灣花精的努力與成就,給予衷心的祝賀!讚嘆「一種美麗浪漫的心靈療法」於焉誕生!


    黃韋欽

    衛生署桃園療養院精神科主治醫師


    8年多來,在使用花精的療癒經驗中發現,身心靈能夠安然自在真的是人生最大的幸福,但總覺得和我們同一塊土地成長而茁壯的植物,一定更能給我們最多的療癒能量,所以一直很期待台灣可以有自已的本土花精。祈明老師多年跋山涉水的努力,感應和解析本土的植物與花的訊息,終於讓我們擁有屬於福爾摩沙最純淨美麗的能量。期待大家可以因為花精發現自己心靈的奧妙,身心靈自在。


    黃苡菱

    營養師、作家


