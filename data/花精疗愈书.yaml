    ## 震盪的次數影響花精分子的細緻度


    經過訊息淨化的水，震盪的次數要格外注意。隨著震盪次數增加，水分子會愈來愈細緻，而且益發活躍，此時水中的花朵訊息也會隨之活潑起來。若過度震盪，花朵訊息會變得不安定，水分子也可能太過細小，而介入心靈的層次太深，對人的影響無法預料；然而若震盪次數過少，則花朵訊息無法被激發活化，能量結構也就難以精準，達到徹底平衡情緒的效果了。因此，震盪次數過與不及，都會影響花精能量的結構穩定性。


    若在這個環節的技術操作得當，可以針對不同的心靈情緒需求，而開發出屬性各異的花精系列。例如我除了研發出一般心靈覺醒系列的花精之外，也針對心靈層次已開發程度較深者，研製出能量更細緻、更綿密的「高階心靈系列」花精。配合花朵靈性的屬性、生長環境的選擇，以及製作配比、震盪次數的掌握，高階心靈系列花精作用的意識更加深層，甚至能夠直接進入細胞DNA中，重整、提升、轉化潛意識的訊息，幫助人的身心修持達到更高的靈性層次，進入廣闊光明的宇宙空間。


