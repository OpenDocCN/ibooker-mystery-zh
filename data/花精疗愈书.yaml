    # 心得分享


    以往,只要帶女兒出門,回家後,她就會哭個不停,到陌生的地方也很難安靜,晚上也常原因不明地哭鬧,一個晚上翻來覆去,直到天明方休。加上她又常生病,出生第四個月就住了一個星期病院,時常感冒,且容易併發其他病症,同時,肚子鼓得像西瓜,往往一個星期就要急診兩、三次。有時我下班回家,就得馬上帶她到醫院掛急診或收驚,弄到十二點,她也不見得睡得好。後來,只要她一看到兒童急診室的門就開始大哭。


    為了她,我真是找遍了方法,想辦法幫她平穩下來。什麼都試過了,醫生開的藥也都差不多,家裡的藥也已成堆,不過,她通常還沒吃完就又去急診。她開始使用艾草訊息後,很神奇耶,只在出門前給她喝二滴,晚上她居然就不再哭鬧了,狀況真是穩定很多。


