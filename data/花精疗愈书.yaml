    +   ○ 生理


    1. 腦部：平息腦波混雜的干擾思緒，提升睡眠品質，活化腦細胞，使腦部能量清晰。


    2. 夢境：夢境變得清晰，瞭解潛意識的自我表達，更能從夢境中學習生命的智慧，獲得人生的啟示。夢是重要的身心靈連結管道。


    3. 身體：調整氣脈，使臟腑互應頻率協調，活化身體機能，讓細胞充分吸收營養。


    +   ○ 心理


