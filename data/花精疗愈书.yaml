  md: '視我的雙眼，說：「喂，醫生，我在這裡！你要怎麼處理我啊？」生平第一次，我得以回望我的恐懼，沒有絲毫的顫抖或畏縮，我說過我要克服它，而且我真的辦到了。讓人愉悅的驚喜是，我發現自己的恐懼只是空氣和薄紙做成的弱小怪獸而已，它們完全沒有實質性。我明白此刻已經沒有什麼事可以阻止我循著生命的「呼召」前去，長久以來站在我面前阻擋我前進的恐怖妖怪，終於被世界上最溫柔的能量「花精」給移開了。


    推薦人簡介：

    Dr. Ghazi Kaddouh, Psy. D 是美國奧勒崗大學及柏克萊大學的臨床心理學博士，擁有心理醫師的執照。偶然的機會與陳祈明老師相識，祈明老師運用台灣花精治癒他多年的頭痛宿疾，也順利幫助他們夫妻倆懷孕成功之後，他深受感動，順應著內心的「呼召」，專程前來台灣，向祈明老師學習花精療法，成為台灣花精專業諮詢治療師的一員生力軍。他把台灣花精帶到美國，以心理專業結合花精療法，幫助更多的人。'
