    任何瓶裝量產的花精,都不可能是濃縮的母劑,而是經過各廠的調製步驟,製成最適合人使用的成品。所謂的稀釋與震盪,也不是自行分裝於未經訊息淨化的水中,不分比例、無限制的做稀釋與訊息拷貝,或者單單以手隨意搖晃瓶身,就可以讓訊息的活潑度還原開展。


    各人的手勁力道強弱不一,震盪頻率快慢不一致,次數可能過度或不及,都會影響訊息結構的完整性。此外,花精的頻譜與作用路徑不一,應該先深入瞭解,若逕自把不同花精稀釋混合,極有可能造成花精頻率彼此抵消。再加上把未經訊息淨化與醇化的酒,直接加在花精訊息稀釋的水中,也會破壞花朵訊息的完美結構。


    花精是細緻的能量波頻,人的情緒是一個個頻譜振幅、強度不一的訊息場,除了某些較為淺層的情緒問題,只需要充分瞭解自己的情況,找到符合自己服用的花精之外,有些花精會牽引出心靈深層的情結進行調整,對人的影響比較深遠,建議應該由專業的花精治療師,在深入瞭解每個人的獨特情況之後,慎選恰當的花'
