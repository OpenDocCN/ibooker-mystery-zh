  md: '敏感的體質及接收性，時常會因吸收過多負面訊息而產生焦躁的情緒，連帶會出現倦勤的反應。服用紅牽牛花五、六天之後，無論大環境的氣候出現什麼變化，對應的人有什麼情緒或念頭，甚至在沒有任何運動的情況下，心情都能維持愉悅及平靜。更奇妙的是，虎頭蜂訊息竟然能改善我黏液過多的體質，讓氣脈暢通，不再因大環境裡的負面訊息而產生焦慮反應，多年的腸胃脹氣問題也解決了。誠如陳老師所言，「花」的訊息中確實蘊藏著愛的力量，讓使用者有一種被深深滋潤的感覺。


