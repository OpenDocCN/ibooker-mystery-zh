    有一位個案在服用咸豐草花精時，發生了一件有趣的事。他心裡不斷聽到有人罵「三字經」，這令他無法忍受，從小到大，他最痛恨的就是聽到別人口吐穢言。他心想：「嗯，祈明老師的這個花精在哪裡擷取的，是不是剛好有人罵髒話，被這株植物記錄下來。難道她也學會罵『三字經』了？我一定要去問一問。」我聽了之後，忍不住笑了出來，反問這位個案：「你是不是對『三字經』有特別的情結啊？」


