    # 心得分享


    芝禎——一雙濃眉大眼,充滿認真好奇的力量,像個大姐姐般散發快樂的訊息。


    我選擇的是彩鐘花,剛看到老師放映的彩鐘花照片,就有一種鼻酸的感覺,開始選擇花來畫時,其他花我只是隨意看看,還是決定選她。畫的時候鼻酸感動的感覺又上來了。我對畫畫不是很擅長,剛開始畫的是某一個角度,但總覺畫得不太好,就不斷修飾又修飾,這一部分花了最長的時間。就這樣一部分一部分的畫,把樹葉和根也都畫好。越是畫越有一種扎實、平穩、喜悅的感覺。從原本一筆一筆小心翼翼的畫,到後來隨興的塗鴉,心境是從感動鼻酸到開闊舒適,感覺滿好的。


    老師花訊傳導的過程中、之後,我一直不斷打嗝排氣,我知道排的越大、越順暢,我越是舒服,但不知道我為什麼會有這種反應。之後還做出身體挺直,頭往後仰,發出「啊」的聲音。這個動作不斷持續,感覺很舒服。最後身體開始做出花舞的類似舞蹈動作,自己擺動了起來,感覺整個人往上拉。


    明媚——個性小心韌性強,淺淺微笑散發柔美。


    五種花當中,我最喜歡彩鐘花和粉紅矮牽牛,彩鐘花感覺很有力量,矮牽牛則很活潑熱鬧,讓人忍不住想要親近。最後我還是順著一開始的感覺,捨牽牛而選彩鐘花。我沒有依照真實的花來畫,而是憑著印象,畫出直直的莖,圓潤堅挺的花,再細細加上黃色的花蕊和藍色的花心,從上到下,花朵開得滿滿的,感覺真的很有力量。她的葉子柔軟的點綴其中,更襯托出花朵的力量。從頭到尾,我都有些不好意思看她,可是她的樣子卻很清晰的映在心裡面。


    老師進行花訊傳導之後,我感覺身體的中央,從上到下,熱了起來,之後全身都很熱。喜悅的感覺持續了一整天。突然很想到森林裡去散散步。


