    # 如何擷取花朵訊息


    為了讓花精具有共振心靈情緒的精準特性，從擷取到製作的每一個環節，都必須確保花朵訊息完美無瑕、不受干擾。首先，是花朵訊息的擷取。如何在這個階段就取得活生生與天地自然互動、結構完整的花朵訊息，是一大挑戰。以下是我擷取花精訊息的原則與方式。


    # 花精的製作方式


    準備好訊息淨化的純水，盛裝在水缽中，選擇地理磁場良好、生命力旺盛健康的花朵，在花朵盛開的顛峰期，讓花與淨水接觸，由具有花訊息能量轉化能力者，將花的能量場導入純淨鮮活的水中，在陽光的助力下轉化三至四個小時，花朵的精神能量藉由陽光的照射，將會釋放到水中，並轉化成訊息能量光波。水是訊息的記憶體，用以擷取和承載花朵的能量場。之後，再經過一定倍數的稀釋與震盪，將花朵的生命能量充分釋出後，以酒保存，置於深色的瓶中，以防止光線的干擾。這就是台灣花精製作過程的簡易說明。


    為了便於瞭解，我們以物理原理簡要地介紹花精的擷取方式。


    以愛因斯坦（Albert Einstein,1879～1955）最著名的「質能互換」理論公式 E = MC²來說明，「質量」乘上「光」的平方就會產生「能量」。植物行光合作用的原理便是如此。換句話說，擷取花精時，花與淨水接觸（質量），透過陽光的照射會產生振動波，這個「振動波」就是花的精神能量，它會釋放到水中，被淨水記錄下來。


    不過我製作花精是不受這個原理限制的，例如曇花是


