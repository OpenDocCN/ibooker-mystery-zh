    ## 3 花精是神奇的心靈解藥


    鮮花療法給了我寶貴的經驗，為台灣花精的研發而催生。以花訊息的療癒能量而言，兩者有異曲同工之妙。


    鮮花療法的優點是透過活生生的花朵來做訊息傳導，比較能夠讓人直接體會到花和大自然間的和諧共生關係，喚起我們意識當中源於自然界的共融感，進而能回歸於自我，清醒覺察，活出真正的自己。


    而花精則因為將花朵能量貯存在水中，經過一定倍數的稀釋與震盪，成為細緻的液體滴劑，不但訊息結構更為整全，適合人體吸收，而且方便使用者隨身攜帶，定時定量服用，可以發揮持續深入的平衡療癒效果，使用者更能察覺到花能量在身心靈各個層面的明顯作用。我發現，使用過花精的朋友，對花朵、植物變得更有感情，更懂得欣賞、愛護花草樹木。這是花精愛的能量潛移默化的結果。


    ## 大自然帶來平衡情緒的力量


    花精是神奇的心靈解藥，她是取自花朵、愛與自信的訊息能量，不含任何物質或化學成分。由於對花朵訊息完整性的堅持，每一種花精，我都要求能夠做到精準共振特定情緒，達到最佳的平衡效果。為了讓使用者能夠在自覺之下改善情緒狀況，我大多運用的是單方花精。這樣的好處是，使用者很清楚每一瓶花精對他的情緒的影響與改變。


    ## 個案分享


    接受花精治療是因為一段走了十年的感情突然生變了，原本以為情緒控制得很好的我，在情變成真之後，終至無力招架地掉進了情傷的漩渦之中，雖然當時心痛的感覺早已不陌生，但是心臟與胸部的嚴重灼傷感讓我難以忍受，我才決定求助於花精的幫忙。


    祈明老師聽了我的敘述之後，幫我把脈，說我的心脈能量受損了，並且內心有很深的愛傷，於是與我相應的第一瓶花精就是對治心受傷的粉紅玫瑰。當時我的身心狀況是很混亂的，頭腦也是一片混沌，最清楚的感覺便是心臟與胸部各種感受不同的痛。為了紓解這些前所未有的疼痛，我可以說是與粉紅玫瑰相依為命，晚上睡覺也緊緊地握著她，一直到起床都未曾放手，天天如此。


    心碎的痛苦非常耗能量，身體非常虛弱，嗜睡，由於過去我一直強作鎮靜，想哭又哭不出來，內心鬱積了許多悲傷情緒，粉紅玫瑰除了緩解我心的灼傷，也軟化了我的心，在一次整個胸部感覺都要裂開的時候，我大哭了許久，那種傷慟的感覺讓我對自己生起了無比的慈悲心，真是不可思議啊！哭泣挖掘出許多我對家人、伴侶與自己的懺悔與感恩的心情，頭腦也感覺甦醒了。老師說哭沒關係，哭可以排毒、療傷，這也表示我的心柔軟了，變得容易感動……。


    「粉紅玫瑰」散發柔和的愛


    粉紅玫瑰花精柔和的愛的能量，撫慰深度的悲傷所導致的哀愁與孤單感。掃除這位個案心頭莫名、沉重的壓力，也讓他懂得如何表達自己，傳達自己真正的情感，不再壓抑。經過三個月密集的花精療程之後，他的氣色、心情、想法改變的程度，讓周遭的朋友都驚訝不已。他找回了自己的自信與幽默的潛質，也因此對自然療法產生濃厚的興趣，最近他重返學校，進入研究所準備鑽研這個領域的學問，他以全新的態度看待自己的人生，重新出發。


    大多數的人就像以上的例子一樣，使用第一瓶花精就有很明顯的效果。例如，一個自我要求很高的高三學生，為了即將來臨的學力測驗而焦慮煩憂到失眠、注意力渙散，我以「台灣角桐草」花精，很快撫平了他的焦慮，他說晚上可以安穩入眠了，而且懂得冷靜理性地規劃讀書計畫，面對即將而來的學測挑戰。


    一個長期為事業打拼的男士，使用了「藍色牽牛花」花精之後，長久以來胸口緊迫、呼吸不順暢的壓力症狀減緩了，失眠多夢的情形改善，不但睡得沉穩而且一覺到天明。他開始懂得為自己安排時間，以恰當的休閒時間，來排解工作業務沉重的壓力，神奇的是，多年的煙癮突然停下來了，以往易怒、煩躁的心情也跟著一掃而空。


    有一位長期憂鬱的女士，有嚴重的無力感與絕望感，「百合花」花精給了她強大的支持力量，陪伴她度過抑鬱、絕望的情緒黑暗期，讓她虛弱疲乏的身軀有了再度動起來的力量。「非洲鳳仙」花精給她自在、自信與快樂。


