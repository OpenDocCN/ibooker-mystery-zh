    在此讀者可依書中花照片，在不知道花語前，用心感受選出一種與心相應的花，也可以逐一記錄其他花帶給你的感覺，來趟花能量的心靈探索，你會更清楚知道花能量的作用，瞭解目前情緒與心靈的狀態，幫助自己釐清情緒問題。花語會在下一節逐一公布。


