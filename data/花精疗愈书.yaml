    # 藥草訊息一覽表


    由於篇幅有限，在此我僅列出我所研究的各種藥草訊息的特性與適用對象，供各位參考。傳統藥典對各種藥草早已有詳盡的介紹，有興趣的讀者可以進一步找來研究。


    ## 金線蓮訊息

    Taiwan anoectochilus


    特性：有「藥王」之稱。先鬆坦心輪能量，同時調整生理機能，達到身心能量最徹底的平衡協調。

    適用對象：

    - 高血壓患者或高危險群。

    - 糖尿病患者或高危險群。

    - 癌症高危險群。

    - 調理肝功能障礙。

    - 心肺功能障礙者。

    - 身體保健強身。

    - 感冒。


    ## 銀杏訊息

    Ginkgo


    特性：可以促進氧氣流入腦內，舒展全身肌肉。滋養腦部細胞。老年人腦部機能保養。

    適用對象：

    - 需要補充腦力者。

    - 肌肉緊繃者。

    - 血液循環不良者。

    - 記憶力衰弱，或無法集中注意力者。

    - 中老年人保健。


    ## 車前草訊息

    Dooryard weed


    特性：入腎經，兼入肝、小腸二經，行水洩熱。

    適用對象：

    - 風熱頭痛者。

    - 咳嗽、咳痰者。

    - 下焦虛寒，容易脹氣、頻尿者。

    - 腎臟、膀胱發炎、結石，攝護腺肥大症者。

    - 熱痢腹瀉者。


    ## 鈍葉樟（肉桂）訊息

    Cinnamon


    特性：肉桂具有純陽氣厚的能量，使命門火旺，調理食慾不振、疲勞無力、虛脫，強化免疫系統，性功能保健。

    適用對象：

    - 容易有腹痛、腹瀉問題者。

    - 體質虛冷者。

    - 風濕痠痛者。

    - 保養性功能者。

    - 提升免疫系統功能。


    ## 艾草訊息

    Wormwood


    特性：通達十二經絡；瞬間強化人體的氣場，不受濁氣或病氣的干擾；去病氣，將內臟所殘留的毒素訊息轉化排出；驅邪保健，健胃整腸、行氣活血、溫經通絡。

    適用對象：

    - 容易受驚、不易入睡，或睡不安穩的嬰幼兒或大人。

    - 對氣場敏感，容易受外在訊息干擾的人。

    - 醫療人士、美容、按摩業者，以及其他因工作或探病、奔喪需要而出入特殊場合者。

    - 胃口不好，腸胃弱，容易胃痛、拉肚子或便祕的大人或小孩。

    - 出差、遠行、出國旅遊，容易水土不服的人。

    - 有經痛、經期異常或更年期障礙的人。

    - 子宮虛寒，分泌物多者。

    - 生病後清除病氣訊息的人。

    - 血液循環不良、手腳冰冷的人。（孕婦應暫時避免使用）


