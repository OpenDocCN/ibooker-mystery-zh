  md: '面對生活的壓力，寵物也會有情緒、也會面臨生老病死，牠們的心靈同我們一樣，渴求回歸自然，接受天地的滋潤。花精能夠補足寵物心靈空乏的區域，讓牠們與生命的本源重新連結，回歸天賦的本能，更樂天知命。生理的病症則可以用藥草訊息來調理，不同藥草訊息都能活絡全身氣脈，對動物生理各部位的機能，有獨特的療癒效果。


    # 寵物也有心靈需求


    有人餵家中的老狗喝「蒔茶葉訊息」（藥草），溫潤的能量，會先舒緩狗兒的情緒壓力，再針對老狗各部位的生理機能，進行活化與調理。


    有一位養貓的朋友，家中的母貓因為開刀結紮，深受創傷恐慌，幾年下來身體一直相當嬴弱，個性也畏縮逃


