    無論是純淨、細緻、活化的水,或者淨化與醇化過的酒,都讓花朵訊息有了溫暖舒適的存在空間,不但訊息結構自始至終都能夠維持一定的完整與精準度,而且水、酒與花精訊息之間,更發揮了彼此活化的加乘效果。研發製作每一瓶花精時,必須如此堅持,才能讓花訊息發揮最適合的效能、最精準的效果。


    # 獨家的稀釋與震盪步驟


    從自然界裡擷取到的花朵精華,所製成的母酊劑,訊息尚未激發活化,不適合直接使用,必須經過一定倍數的稀釋與震盪的步驟,才能讓訊息完全開展、能量倍數放大。這兩個步驟必須做到非常精準,才能使花朵訊息完整呈現,恰恰能夠共振人體的能量場。


    一朵花與一片花瓣所帶有的訊息,或者一個人與他身上的一個細胞所帶有的訊息,毫無疑問是一樣的。所以人身上的一個細胞就可以複製出一個人——這是訊息特有的「全息」性質。但是,一片花瓣訊息能量呈現的完整性,與一朵花的訊息能量呈現的完整性,可就截然不同了。


    基於訊息特有的全息性、複製性,我們將母劑加以稀釋,但需要注意的是,並不是無限制的稀釋,因為過度稀釋的結果,仍會影響花朵訊息的完整結構。台灣花精的稀釋倍數,經歷無數的研究結果,嚴格遵循最佳的比例。


    緊接著是十分重要的「震盪」步驟。稀釋後的花精原


