    # 4 花精的製作祕訣


    ......台灣花精的能量特性，像是清柔的雲霧，我彷彿瞬間處於大自然中，可以呼吸到清新的空氣，感受和煦的陽光，溫暖的包覆著我，全身氣脈立即如同行雲流水般轉動、調整。花精幫助我開啟一層層的心靈，進入潛意識流，清明的進行深層情緒的療癒；又從中脈直接往上銜接，使意識不斷擴張，從置身大自然的自在，進入更寬廣的集體意識，甚至達到宇宙一體的微細意識層面。這是我在其他能量的體驗上，從未感受過的訊息深度和廣度！好像一棵大樹，一方面從心靈土壤不斷地深入鑽探扎根，一方面又往上開枝散葉，盡情沐浴在宇宙天地的浩蕩能量當中。


    這是一位修行根基深厚、對訊息能量十分敏銳的個案，使用台灣花精時，所形容的感受，她很訝異花精訊息的靈活性與寬廣度。如此精闢的形容，不僅點出了花精帶給生命意識的昇華與提升的意義，其實也間接點出了我們擷取製作花精的特色。


    # 因為精準，所以深入情緒核心


    一個國外花精的專業治療師，在用了台灣花精之後建議我：「台灣花精的能量實在太強了！是不是可以稀釋，讓她溫和些？」仔細一問才知道，原來是花精共振到他內在的情緒，使之栩栩如生地重現，讓他無法不正視自己的問題，過去幾天他時常在一人獨處時忍不住哭泣。


    雖然使用過花精多年，但他從未有過如此深刻的情緒反芻經驗。我一邊安慰他，哭泣是一種情緒抒發的過程，不要壓抑；一邊建議他應該停止逃避，趁這個機會好好認識自己，面對自我，藉此重新整理好過去的創傷，讓情緒因子徹底轉化。花精的正面訊息會持續提升他的能量，幫助他安然度過情緒調整階段。


    並不是每一位使用台灣花精的個案，都會經歷這樣的震盪過程，但是這的確是許多人都共同擁有的經驗。花精不只是撫平情緒，而是讓我們在自明自覺之下，逐步平衡內在混亂的情緒磁場，進而達到情緒問題的根治。因此訊息波頻能否精準地調動情緒磁場，最為重要。


    # 花朵訊息精準度好比射箭


    回到這位朋友的問題。其實，關鍵並非在於花精的能量強度，而是「精準度」。好比射箭時，目標是準確的射中箭靶的核心，若技術不夠純熟，即便你使出力拔千斤之蠻力，射穿箭靶，卻無法精準控制力道射中紅心，也是徒勞無功。同理，人的情緒是一個個波頻振幅各異的磁場，這些磁場都有一定的頻譜及強度，花精的訊息必須要能準確共振到這些磁場核心，調動轉化其能量，情緒磁場有一定的振幅與強度，花精必須精準共振，才能轉化其能量


    ![花精的訊息精準度](img/832bd80b1c9ef2dd0374ae143cb3e3e9_120_0.png)


    才能激發當事人的自我覺察能力，及自我療癒的機制，進而達到徹底的平衡效果。


    若花精的訊息不夠精準，或者任意稀釋導致能量不全，訊息就可能過於微弱而無法清晰，真正共振到情緒根源，平衡問題點。也許殘存的能量可以撫平表層的情緒波紋，讓人使用後心情暫時舒緩，但底層的情緒因子尚未解決，未來問題還是可能隨時湧現，這只是治標而不治本。


    多年來對花朵能量的研究與發現，我體認到花精的作用絕對不僅止於撫平情緒。花精的寶貴在於，她是精神層面的啟迪，不但是平衡情緒的靈藥，更能夠靈活的和身心靈各個層面互應共振。只要應用得當，花精對於身體細胞的淨化、心靈創傷的根治、靈性層次的提升，都能發揮畫龍點睛的引領作用。


    目前我所研製出的八十多種花精，都具有精確對應特定情緒，深入而獨特的療效，足以因應我們一般人現有的心靈情緒問題。由於對訊息精準度的堅持，我在製作花精的每一個環節，都要小心花朵訊息的完整性不受干擾，如此才能確保花精的深入療效。


    # 台灣花精獨步群倫的特性


    為了讓花精訊息的結構達到最完整穩定、能量達到最精準，以共振人的心靈，真正平衡情緒問題點，提升心靈能量，我製作花精時，有以下幾點原則。


    - 以不傷害花草植物為原則，先回饋花能量場，再敬邀花朵活生生的訊息與大自然互應的能量進入水中，而製成花精。有了花朵自主的付出意願與承諾，才能擷取到完整的訊息能量，以及活躍的花朵互動訊息場。

    - 連結「宇宙花能量場」的訊息，取得花朵精神源頭的能量，並且在花精完製過程中，持續與「宇宙花能量場」共振，確保訊息結構保持一貫的精準與完美。

    - 以獨家宇宙訊息能轉化技術，徹底淨化、還原與活化花精訊息的記憶體「水」與保存作用的「酒」。

    - 為保持訊息結構完美無瑕，堅持不任意稀釋花精，一方面確保花精製成時的優良品質，一方面避免能量精準度被破壞，而降低療癒心靈的共振效果。

    - 為了徹底治癒情緒，建議使用單方花精，引領使用者完整經歷情緒調理的黃金期，使之深入覺察且面對自己的每一個問題點與療癒過程。


    台灣花精的能量結構完美精準，一般使用者甚至還未服用花精，而只是以手握住花精瓶身，就能夠清楚感受到她對心靈、身體的共振能量，甚至她所行走的身體脈絡路徑。這就是能量精準度的最大特色。


    ![花精的訊息精準度](img/832bd80b1c9ef2dd0374ae143cb3e3e9_121_0.png)


    # 如何擷取花朵訊息


    為了讓花精具有共振心靈情緒的精準特性，從擷取到製作的每一個環節，都必須確保花朵訊息完美無瑕、不受干擾。首先，是花朵訊息的擷取。如何在這個階段就取得活生生與天地自然互動、結構完整的花朵訊息，是一大挑戰。以下是我擷取花精訊息的原則與方式。


    # 花精的製作方式


    準備好訊息淨化的純水，盛裝在水缽中，選擇地理磁場良好、生命力旺盛健康的花朵，在花朵盛開的顛峰期，讓花與淨水接觸，由具有花訊息能量轉化能力者，將花的能量場導入純淨鮮活的水中，在陽光的助力下轉化三至四個小時，花朵的精神能量藉由陽光的照射，將會釋放到水中，並轉化成訊息能量光波。水是訊息的記憶體，用以擷取和承載花朵的能量場。之後，再經過一定倍數的稀釋與震盪，將花朵的生命能量充分釋出後，以酒保存，置於深色的瓶中，以防止光線的干擾。這就是台灣花精製作過程的簡易說明。


    為了便於瞭解，我們以物理原理簡要地介紹花精的擷取方式。


    以愛因斯坦（Albert Einstein,1879～1955）最著名的「質能互換」理論公式 E = MC²來說明，「質量」乘上「光」的平方就會產生「能量」。植物行光合作用的原理便是如此。換句話說，擷取花精時，花與淨水接觸（質量），透過陽光的照射會產生振動波，這個「振動波」就是花的精神能量，它會釋放到水中，被淨水記錄下來。


    不過我製作花精是不受這個原理限制的，例如曇花是


    ![擷取花朵訊息時，要將宇宙花能量場的訊息導引至淨水中](img/832bd80b1c9ef2dd0374ae143cb3e3e9_123_0.png)


    在深夜開放，並沒有陽光可供轉化，但使用過曇花花精的朋友都表示，「曇花」將他們內在深藏的抑鬱、煩躁情結，調動出來調整，顯見「曇花」能量的爆發力十足。祕訣是要能夠調準頻率，連結花朵所相應的宇宙花能量場的訊息，所製成的花精能量才完整，而且花朵波頻也才能夠精準共振特定心靈情緒狀況。


    # 花精母酊劑的擷取原則


    首先，我們從花精母酊劑的擷取開始談起。「花精」是訊息能量，不含任何化學與物質成分。準備好淨化過的水，到山中尋找地理磁場良好，植株本身健康完整的花，將花朵的訊息能量導入，這才完成花精母劑的擷取步驟。這道手續看似簡單，卻需要經歷許多細緻的環節，才能真正取得完美無瑕的花朵訊息。


    我在擷取花精前，需要先周詳地準備許多前置作業。在地球這個場域，有許多層次、空間是重疊在一起的，之中的安排是依照著宇宙的法則、大自然的定律。大自然中，存在著許多人類肉眼不可見的精神能量體，這些我們俗稱的精靈、樹神、山神等等精神能量體，皆與我們共存在地球上的不同層次與空間，雖然我們的肉眼看不見，但祂們確實是存在的，更何況我們可見的山川樹木、花鳥魚蟲這些更親近我們的生命體。


    擷取花精前，我必須先到當地去調查地形，誠心供養當地的諸神、精靈等精神能量體、生靈、植物本身等等，告知祂們我將會在此擷取花朵的訊息，請祂們瞭解，並將空間空出來，讓我能順利執行這項任務。同時，我還要調整整個山林或原野的能量，之後才能擷取花精，完成之後，還要再做回饋花場的供養，來感謝花朵植物、大自然、諸神靈。這就像到人家家中借東西，必須先向這家人說明，得到許可之後才能借用，用的過程要小心珍惜，用完後必須盡速歸還，跟人家道謝。


    沒有做好事前的供養等前置工作，就冒然擷取花訊息，一來不夠尊重天地自然，二來所擷取出來的訊息不夠單純。而且花朵植物也會自我保護，若不尊重她，或者以機械方式擷取，她不會自願釋放出完整的結構和訊息，只會在非自主意願下被動釋出能量，而且可能摻入其他的雜訊，敏銳的人立刻就會感受到這其中散發著慌亂的訊息。由此可知，擷取花精等訊息能量的執行，是極度神聖的工作。


    # 花精的製作祕訣——一花一世界


    真正的花精製作有嚴謹的物理原理、科學方式。依據我的經驗，在擷取花朵訊息時，除了接收花本身的訊息之外，還有來自於宇宙的訊息能量。從花到水，在由物質轉為能量的過程中，所藉助的不僅只是太陽光，更重要的是來自於宇宙的能量，也就是連結宇宙中花的能量場。有人說：「一花一世界。」這個宇宙空間是確實存在的，而每一朵花無論大小，都和她的精神源頭緊緊相繫，擷取花朵訊息時必須把這個空間的訊息導入，能量才完整。


    ![本土生長的花與我們最親近，這是我們最熟悉的「紫色牽牛花」](img/832bd80b1c9ef2dd0374ae143cb3e3e9_125_0.png)


    有關於宇宙花能量場的發現過程，各位可以參考我在第42頁「發現花朵生命力的本源」的說明。


    # 尋覓純淨山林原野的花朵


    本土花精的經驗，在臨床的運用上是十分成功的，我在花精這獨特的心靈療方之外，另拓展出各種藥草訊息能量、排毒訊息能量。心靈的需求可以靠花精來滿足，而生理的健康則以藥草、排毒訊息能量來調理，活用訊息能量的特質，架構出完全無負擔、無副作用的身心訊息平衡機制。最重要的是，以本土親切的花草，製作出最適合我們的體質與心靈的訊息，不但能量活躍、完整，訊息管道通暢，而且完全能夠貼合我們的需求。花精的精神與成功經驗，不僅可以延伸到其他的訊息產品，更可以在不同國家之間傳遞開來。未來，我也計畫到其他國家，為當地的人們研製出最適合他們的本土花精、藥草訊息能量等，讓宇宙訊息的法則真正落實與應用，為地球各個角落的人們，帶來更貼密的生命律動。


    # 選擇訊息健康的花株


    在擷取花朵訊息之前，要先觀察花朵植物所生長的環境，例如地理磁場是否良好，有沒有人為環境污染等。在台灣地區，要尋得好水好地，並不是難事。在環境清幽的地方生長的花朵，汲取大自然地水火風的精華，本質上就顯得雅潔清靜，最適合當作擷取花精訊息的母株。


    此外，花朵外型是否完整健康，植物生長過程中有沒有受傷的經驗，以及是否受外在訊息的干擾，而記錄了不必要的雜訊，都是擷取花精前，選擇花株必須考量的要件。


    在研究與實驗花朵植物記憶周遭訊息的能力時，我曾經有一次難忘的經驗。


    我在住家附近，找到一株外觀看起來十分健康的狗尾草花，為了研究花朵訊息，我將之擷取下來，帶回家加以分析。當我把花朵訊息交給妻子秋敏解析時，並沒有告訴她這株狗尾草花的來由。秋敏握到花朵訊息立刻感到奇怪，從訊息之中，她感受到一股死亡的氣息，她看到「一輛車中坐滿了身穿白衣的幽魂」的意象，嚇得馬上把手中的花精拋開，直問這是在哪裡擷取的訊息！


    我這才告訴她，花朵母株生長的地方有一戶人家，正是從事與殯葬有關的加工產業，只是門口沒有懸掛招牌，生人不容易知道。這戶人家門口常停放著一輛貨車，專供運送殯葬加工產品使用。生長在這戶人家旁的狗尾草，不但記下住戶的訊息，就連貨車往來喪葬場合這類移動的訊息，也細緻地記錄了下來！


    花朵在成長的過程中，為了適應生存環境，不但會記錄周遭地理磁場的訊息，植物本身也可能帶有針刺、分泌毒液等自我保護機制。植物會記憶友伴或自己愉快的、受傷的經驗，隨順自在地回應大自然的律動。人工培育的植物則對人的情緒感受力非常敏銳，受關愛的植物總是生氣蓬勃，反之受人傷害、辱罵或忽略時，便會垂頭喪氣甚至以死相待。這許許多多訊息，都會記錄在花朵植物的生命訊息之中，而表現在她的生長外觀上。


    ![「狗尾草」只生長在有人居住的地方](img/832bd80b1c9ef2dd0374ae143cb3e3e9_127_0.png)'
