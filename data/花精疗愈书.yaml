    說我雖然很老實的活在現實生活中，但內在卻有一部分不甘願，想脫離，這朵花的葉子好像翅膀，帶著我飛走。內心深處，我渴望找到心靈真正的歸依。


    老師在做訊息轉化時，我感到肚腹丹田暖了起來，他對着圓就好似在對我做轉化，轉化完後，用手靠近去感覺畫，似乎有股清涼的感受，由手心傳到大腦，人似乎安靜了許多，畫中喧鬧不平之氣氛，也沉靜安寧了下來。


    ## 8 台灣花精與訊息醫學


    花精療法是一種自然訊息療法，以水為載體，擷取貯存花朵訊息，透過波頻共振原理，療癒失衡的身心靈，屬於訊息醫學的一門。宇宙中充滿了訊息波，彼此是互通互應的，訊息醫學就是研究如何轉化這些訊息波，成為療癒身心的能量。這些自然能量包括花精、藥草訊息、宇宙光波、星海訊息、訊息排毒、微量元素訊息，能夠深入身體細胞最微小的分子，進行能量的轉化，是最徹底、健康且自然的平衡方式，不僅適用於人類，對動、植物或任何的生命體，都可以互應共用。


    花精是神奇的心靈解藥，心靈的問題可以靠花精來解決，而生理部分則須靠藥草來調理。我陸續研發出各式藥草訊息能量——擷取藥草的純正訊息，並還原、活化藥草的生命特質，屏除傳統煎熬藥草來食用，藥效作用緩慢而間接的缺點，藥草訊息強化了傳統藥草的功效，而且具有迅速通達全身經絡與細胞的優勢。此外基於宇宙訊息能共振互通的原理，我也進入有毒動植物的訊息場，轉化擷取排毒訊息，率先研製出「訊息排毒」的淨化方式，這大概是全世界的首例。它能徹底而精準地轉化人體內的毒素訊息，並且加以排除，重建自體細胞的免疫能力。


    除了花精、藥草訊息、訊息排毒淨化之外，我且陸續研發出訊息光波、訊息美顏保養、活化細胞訊息水、訊息能量卡，並將日月星光等有益於人的宇宙自然能量訊息放入各種載體，例如水、卡片之中，以天地的自然能量來療癒人的身、心、靈，啟發人自明自覺且健康的人生觀，是我所期待的訊息醫學願景。


    ## 劃時代的革命技術——藥草訊息


    製發展藥草訊息的緣起，是一次夢境的提點，極短數秒瞬化的訊息。


    那是一個奇妙的地方，位於宇宙的某一空間，感覺無際無涯、寬廣遼闊，秋敏由夢境中進入這個空間，看到一塊奇異的土地上，生長著一株藥草，每一片葉子都由裡到外透亮，閃耀著如金箔的光華，感覺無比珍稀難得。藥草的葉子細長、葉脈清晰、線條優美，自然地垂下來，被置於一個透明的水晶缽中，秋敏感覺到，這株藥草珍貴而活生生的能量，正源源不絕地透過振動，傳導入缽中的液體。


    夢境中的植物顯然不是花，而是藥草，我們深探這個訊息又是另一項工作，我突然意識到，花精既是著重在心靈的解藥，那麼生理部分，是不是可以透過藥草來調理呢！如此雙管齊下，更可以協助我們架構健康而無負擔的訊息化人生。有了花精的成功經驗，將活生生的藥草訊息能量擷取保存下來，成為方便攜帶的口服製劑，對我而言並不是難事。意外得到了這樣的靈感之後，我開始積極研製「藥草訊息」，並且計畫未來幾年內，陸續擷取數十種至上百種藥草精華，和花精雙趨並列。


    傳統中藥草的製作與使用方式，早已行之有年，若要讓一般人改以使用訊息能量，勢必要先建立對訊息能量良好正確的觀念。因此首先，讓我們從藥草訊息這項研製技術的啟發性開始談起。


    ## 最自然、無副作用的療癒方式


    中醫與藥草學象徵中國歷史上，一條永無止境蓬勃發展的文明長河，數千年來無數偉大的醫藥學者，投入畢生精力研究的結果，這項國粹早已因奧妙神準的效果而綿延享譽國際。至今中外學者仍舊前仆後繼地，投入於中國傳統醫藥與藥草的發展，期望能夠讓古人的智慧結晶發揚光大，以利益人群。


    中藥草的研製技術，可以說是正式邁入跨世紀的革命旅程——進入訊息醫學能量製劑的時代了！


    如我在本書一開始所強調的，訊息能量的優勢在於：它不含任何化學分子或實質成分，而人體本身就是能量的組合，因此訊息可說是最自然、直接的療癒媒介；訊息不需要經由腸胃道消化吸收，它能夠迅速進入人體內分泌系統，以共振原理，在極短的時間內，發揮效果。


    運用這套訊息取製技術，不但可以克服傳統藥草煎煮熬製、耗時費力，卻又無法避免製作過程能量耗損的缺點，而且能夠直接取得活生生的藥草訊息。我在擷取藥草訊息時，同樣必須透過植株，連結「宇宙藥草能量場」源源不絕的能量，持續和宇宙能量場緊密連結，確保藥草訊息保有精準完整的品質。


    「不傷害花草植物」仍舊是我堅持的原則。在製作藥草訊息能量時，我只透過藥草為媒介，取得療癒的精神能量，擷取完成後，植物的生命力仍舊能夠延續下去。這項技術免除了大量摘植藥草，所衍生的農藥、化學肥料等汙染和生態失衡問題，以及藥草萃取過程不可避免的空氣、水源污染，可以維護地球的生態環境。


    善用訊息能量特有的全息、複製性質，我再以專業的稀釋與震盪技術，將藥草能量活化、倍數提升，「藥草訊息」甚至比藥草本身更為活躍、靈巧、細緻且精準，更能精準的共振失衡的身心，先調理心理與情緒的壓力，使全身氣血活絡，進而轉化生理的疾病訊息，調理人體能量，刺激自體免疫系統的運作功能。


    例如，已有肝功能障礙的人，容易躁怒，因此「薊草訊息」會緩和人的情緒壓力，先讓全身氣脈放鬆舒緩，接著進入肝臟系統，轉化淨除肝臟疾病的訊息。素以調理高血壓聞名的台灣金線蓮，其訊息會先鬆坦心輪能量，同時調整生理機能，達到身心能量最徹底的平衡協調。


    總合以上的說明，「藥草訊息」具有以下的鮮明特色：


    - 尊重自然，尊重生命，與宇宙萬物和諧共存，以「不傷害花草植物」為原則，研發各種自然的療癒能量，提升人類整體生命素質。

    - 獨特的宇宙訊息能量擷取、轉化技術，完整保存藥草的生命能量，以特殊的稀釋與震盪技術，將訊息能量活化、倍數提升，能精準地共振與調理生理機能，發揮徹底的平衡療癒效果！

    - 完整擷取植物的生命智慧與能量，因此訊息具有靈活作用的特質，會在各各相異的人體內，細緻靈巧的調整失衡的心理能量，使全身氣脈活絡，同步轉化生理病症，達到身心能量最徹底的平衡協調。有腸胃吸收問題、年幼的小孩、生病無法進食者，也可以安心使用。

    - 訊息能量具有全息、複製、轉化、調動性質，無須耗損大量藥材，降低對自然生態的危害。


