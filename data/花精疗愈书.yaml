    # 個案分享


    ……相信有寵物的朋友，都希望自己親愛的寶貝們健康快樂，這也是飼主的最大心願。我的狗兒小虎使用過一種藥草，兩種花精：艾草、百合、咸豐草。這段歷程以來，我覺得，牠能使用花精是件幸福的事。因為祈明老師非常忙碌，所以當時餵牠的是人用的花精，不過，我覺得並不會影響花精對小虎的愛。


    我覺得台灣花精用在狗兒身上有最實質、直接的幫助，而且沒有副作用。年事已高的小虎身體病弱，持續醫療中，使用花精比較能平穩安定地入睡，也比較不會受影響，這樣，對牠和我而言，已是很好的狀況了。


    但該來的還是要來，今年，我就在擔心小虎是不是能和我們一起過中秋，結果，牠還是趕上了農曆七月底的收魂列車回天家去了。小虎雖然是隻苦命的小狗，但也是隻幸運的狗兒，因為愛讓我們相遇，讓牠能脫離童年暴力的陰影，縱使我們之前生活過得不平順開心，但始終都有愛的圍繞和支持在我們之間。


    我自己使用台灣花精後，覺得花精的背後有更廣大的光的訊息和連結，心想，若是狗狗使用的話，在世的時候，會開心的多，往生後，靈魂也不會孤單無依吧。花精除了讓牠們平穩安定外，對食慾偏低的小虎，花精後來變成延續牠生命的支持力量。


    十一號晚間，小虎就與世長辭了。在把牠安置在紙箱裡前，我餵牠吃最後一次的咸豐草花精，並告訴牠：不管你去哪裡，都要像咸豐草一樣有生命力且開心喔。牠這輩子就是心事太多。


    牠的離去，讓我們都很悲傷。諾寶是我們家另一隻老狗，在小虎斷氣那刻，到我把骨灰抱回家這段時間，牠都很鎮定，還不時察看我和媽媽的狀況。聽說，蒔茶花花精是從一棵老茶樹所擷取的花精，她看過許多生命的輪轉和變化，所以很了解老人家的心情。自從我家的諾寶使用蒔茶花花精後，漸漸不再固執，更好溝通了，感覺成熟許多，心打開了許多，心量也大了許多。花精真是幫了我很大的忙。


