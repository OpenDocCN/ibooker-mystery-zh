  md: '如果你已經自行選擇且體驗過台灣花精，想進一步透過專業的心靈諮詢，探索更深廣的心靈層面，這時通常會想知道的是，花精諮詢會面對什麼樣的過程，進入什麼樣的場合，怎麼選得最適合自己的花精，又該做好什麼心理準備。有些朋友體驗到花精對自己的生命、生活的深刻影響，受到花精精神的感動，有意願成為一位花精治療師，第一個疑問便是：我該如何成為花精治療師？


    為了確保花精的精神正確的傳遞出去，花精治療師能夠學習到此療法的精髓，發揮其靈活作用的特質，對使用者達到最好的心靈調癒作用，我很重視花精治療師的培訓。由於台灣花精從擷取、研發、製作到應用與服務，已擁有完整的體系與資訊，所以花精治療師能夠學習到的不只有花語應用等表淺的層面，還有更深廣、屬於花精本質的資訊，及訊息應用的各種可能性。我將親自教學，分享我的研究發現與應用心得，充分傳達我所體悟到的花精世界奧義。


    接下來，我就從自身的經驗開始講起，盡量讓讀者能夠「想像」花療室中的情境，也許瞭解了這個部分之後，我們可以更進一步檢視自己接受花精諮詢，或成為花精治療師的意願與可能性。'
