  md: '![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_60_0.png)


    野薑花像似一隻隻白色蝴蝶飛舞


    薑花花精的時候，她告訴我，這花精擁有一股清涼的能量，她看見花苞中飛舞出一閃一閃耀眼的光亮，像一隻隻金色透光的蝴蝶滿布眼前。我心想對了！她已經「看見」野薑花了。過了些許時候她又說，她感覺頭上長出好多個花苞，然後速度很快開出一朵朵的花，像是蝴蝶從腦中飛出，馬上使人有醒腦的作用，一時間腦中的壓力減輕，有種莫名的壓力瞬間被釋放掉，看待眼前的事物變得很輕鬆⋯⋯。


    依據秋敏的解析，加上花朵與植物在成長過程中，展現了高度智慧所蘊含的特質，我可以從花朵的外型、顏色、構造、植物的生長習性、環境，以及與周遭的互動方式分析、歸納、研究出花語。我判斷野薑花的能量走在頭部，因為她圓圓的花柱外形酷似人的頭腦，而野薑花生長在沼澤地，植物親水性高，粗粗的莖可以吸取大量的水分，讓高聳的花柱得以滋養開花，散發出陣陣誘人的清香。


    在中醫的醫理，腎臟屬水，腎水不足，會使人的腦部能量混濁，頭腦不清晰，注意力渙散，由此更可以推論植物的親水特質，使花朵水分足夠開花，水訊息能量具有滋腦效果。而散發出的濃郁氣味，有醒腦、活化腦細胞能量的作用，可以平衡腦部「當機、塞車」的現象。


    秋敏解析花語的過程中提到，她發現野薑花的能量行竄速度很快，並沒有出現過多的情緒反應，證明花精清理濁氣作用的速度很快，她所對治的情緒是淺層的現實面，而非複雜的情緒或受創的心靈。像是學生的功課壓力、上班族的工作壓力等等，這類暫時性的現實問題，'
