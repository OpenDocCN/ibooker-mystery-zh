    從薰衣草相應的情緒特質來看，她治療自命清高、無法落實於生活、茫然無依、沮喪消沉等狀況。


    薰衣草，花莖單枝筆直往上生長，遠遠孤立於葉叢之上，尖端為穗狀花序，開出朵朵紫色的小花。筆直往上生長的花莖，彷彿想要超脫與凌越重重界線，進入高層次的靈性意識，再加上紫色的花，能量通常具有深層的作用，可以療癒潛意識的訊息。薰衣草花的能量作用非常深層，能剝開細胞中一重又一重的記憶，直達潛藏的意識層。


    此外她也很適合過於注重靈性而忽略現實人生的人，可以幫助這樣的人回歸身而為人的本分，忠實扮演好自己的角色，不再好高騖遠、眼高手低。薰衣草花「高高在上」的樣子，是不是很像這類型的人呢！


    當我們如此仔細地觀察花朵的個性表徵時，她們就像一個個活生生的個體躍入眼簾，我們甚至會聯想到周遭朋友當中，似乎有人剛好具備這類正面或負面的特質或個性。而當他們來尋求花能量治療時，我們就可以透過花與人的個性對應方式，為他們尋得互應的花朵，讓花能量療癒他們失衡的心靈。


