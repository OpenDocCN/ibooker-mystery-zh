    老師進行花訊傳導之後，我感覺頭頂好像有光，只要一抬頭，就有白色的光從頭上方照下來。有聞到一陣花的味道，這時心境安定平和，不再有花，是一片平坦，只感覺很舒服，溫暖。再度打開眼睛看到花，心裡有一種感謝，花開得太好了，謝謝。


