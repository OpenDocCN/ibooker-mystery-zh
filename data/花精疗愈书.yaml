    ## 回饋花能量場，不傷害花草植物


    取之於自然，當無私地回饋自然，這是一種對生命的尊重，也是與大自然良性平等的互動。古代或原住民族擔任醫療工作的巫師或醫者，在採擷藥草時，都會慎重地舉行儀式來祈福、祝禱、回饋天地、植物。同樣的，擷取花精時的心念也很重要。到了山林之中，想要恣意取用訊息為一己私利所用，這樣的心念所吸引共振到的，是療癒效果受限的訊息。


    花朵只是連接花能量場的「天線」，擷取花精時不需要傷害其生命。擷取訊息應避免傷害花朵，因為花朵植物會將這些傷害的訊息一一記錄下來！除非製造者對訊息夠敏銳，有能力細緻地轉化這些負向訊息加以修護，否則訊息就會留存在成品中，潛在影響使用的人。此外，在把花朵摘採下來的那一刻，花朵和大自然間的活潑互動磁場、與生命本源的連結，都被截斷了，所擷取的花精訊息，便只限縮在花本身，其訊息的精準度、鮮活度、影響生命的深度與廣度，也因此大大削弱。


    懷著喜悅感恩之情和花朵真心互動，體驗花朵所散發的愛的訊息，以真誠、銘謝的廣大心量來供養花能量場，並且利益大眾——這是擷取任何宇宙訊息能量都應具備的心量。


    擷取花精之前，要悉心地為花朵調整好訊息結構，使之健康歡喜。花朵是連接宇宙花能量場的天線，我們只透過她的結構場來連結花朵的完整訊息，並不需要把她摘下來。擷取步驟完成後，花朵植物依舊能活生生的存在於天地之間，生命力沒有損傷。


