  md: '的儀式，父母會撿一顆石頭放入澡盆裡，給嬰兒洗澡壯壯膽，讓他不易受環境聲音的驚嚇。這是利用石頭的重量特質，將其重力訊息釋放入水中，嬰兒接收石頭散發的共振波，便會激發心靈穩定的能量（「心頭定」，台語），不受外界影響。這樣一來，嬰兒就好照顧，而且能健康快樂的長大，有顆像石頭般的膽識。

