  md: '心靈意識擁有豐富的內涵，我們可以進入意識之海，汲取源源不絕的智慧與能量（自性寶藏）。花精最可貴之處在於，她是活生生的訊息，能夠進入我們身心靈各個層面，以充沛的愛與自信波頻，引領我們進入光明之中，進而徹底療癒身心。她們是富含彈性與智慧的光之精靈。


    擷取製作每一瓶花精時，我和秋敏深探花朵能量的世界，汲取她們各有千秋的飽滿智慧，每每對不同花精豐碩圓滿的訊息而讚嘆不已。我盡了最大的努力，把每一種花的光華與智慧完整收錄下來，欣喜的發現，花的訊息能量不但能夠發揮強大的療癒效果，為人們找回內在心靈的桃花源，而且因為對心靈具有獨特而靈活的作用特質，能搭配各種自然療法、身心靈淨化課程，做最完美的結合與應用。'
