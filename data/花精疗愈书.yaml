    ## 打開心，學習花能量鮮活的智慧


    花朵為了適應環境而演化出各式顏色、花型特徵與習性，她們高度適應環境，隨順自在展現自我，內外協調一致的精神令人讚嘆。透過花朵外型、顏色、生長習性與樣貌等綜合剖析，比較能夠瞭解花朵的訊息特質，以及她對人的獨特作用與影響力。不過這樣的分類與歸納僅只是粗淺的區別，實際應用鮮花療法時，每一朵花還有更細微獨特的訊息，有些需要整理、有些必須淨化剔除，將花朵訊息調整到最佳狀態，再傳導至人體能量場，才能發揮她最大的功效。這些都需要具備細緻的訊息分辨與轉化能力，才可能做到。


    從鮮花療法時期，我就開始匯整花朵的特質，為了在運用花朵能量時，保持一貫的靈活度，我只做了彈性的歸納。然而基於方便學生或大眾瞭解，在演講或課堂上解析花語時，我總是先讓大家看到花的圖片，引導他們一步步從花的外型特徵、生長環境等，歸納出花朵能量的梗概特質，甚至搭配花精能量的實際體驗。這樣的方式的好處是，讓人印象深刻，難以忘懷。


    每回演講或課堂上，總是會有人很直率地問我：「你的花語是怎麼解出來的？」也許大家想得到的，是一條最迅速簡便的捷徑吧！其實宇宙自然運行是有一定的道理的，天地之外，還有無盡的虛空，人非常渺小。自然界的一草一木、蟲魚鳥獸、巨石山川甚至日月星辰都是可貴的生命體，我們應該以尊重、平等的心對待。花朵當然也不例外。


    花是活生生的生命，她們的智慧並不亞於人類，人會因為慾望或各種習性而沉淪、痛苦、迷失，花並不會，她們隨順環境變化，安然而樂天的定性，純粹愛與自信的能量，都是我們可以謙卑學習的。當我們打開心量，以真誠與花能量共處，自然能與之相應共振，直接學習到花訊息所傳遞出來的鮮活資訊。


    ## 花語的誕生


    當有人問我，是如何將花語解析出來的，我只能簡單回答，是從「花祕密」管道所讀到的訊息。就像從花能量空間擷取訊息一樣，我從這個管道將花訊息接引給具有解讀花語能力的人，讓他沉靜下心，透過先天靈敏的特質來解析花語，再加上我對植物花朵特有的直覺感受力，一朵花的「天語」特質就被解碼開來。


    自從我的妻子秋敏無意間「看見」宇宙花能量場後，她對花朵植物的好奇被開啟了，也開始對我的花精研究有著濃厚的興趣，我們有了共通研究的新話題——「宇宙花場」。自然她就成為花的最佳代言人，我請她透過先天敏銳的體質來體驗訊息、解析花語。


    從小秋敏對「宇宙存在奧祕」就很有興趣，喜歡打開心靈，自由雲遊「意識海」，那兒有著她可以感知的寬廣宇宙世界。秋敏的直覺力強，聯想力豐富，創造力獨特且纖細，又因為體質敏感，容易受磁場波動影響，過去常需要我幫忙清理、轉化受干擾的訊息，也因此激發我去探尋、研究一些未知的可能訊息。花能量成為我們研究宇宙的新話題後，出門走在路上，看見特別吸引人的花，我們會駐足欣賞研討一番，花成為陪伴我們出門、訪友的最佳插曲，那是一種意在言外的幸福。


    ## 我們的花語解析方式


    我通常在花朵要被選取為製作花精的母株時，已直覺感知花朵的情緒特性，初步解析出花語，但為了慎重起見，還是在花訊息能量完整展現之後，再度深入解析花語，一方面，確保擷取訊息收錄的完整性，另一方面，則可以在純淨、無干擾的環境場裡，準確地解析花語，再次獲得客觀的驗證，花精的精神特質和情緒的作用才能正確無誤的傳遞。


    進行花語解析時，我們必須在一個很安靜的空間，而且我會事先淨化這個空間的訊息，讓空間處在一個潔淨的花能量場中。首先我請秋敏閉目靜坐下來，將心開放，抽離主觀的感官意識，再共同默禱、誠心祈請宇宙花能量場的祝福，以一顆虔誠單純的心進行花語解析。


    秋敏解析花語時，都是在不知道花名的狀況下進行。她先閉上雙眼，再伸手拿花精，雙手握住花精瓶身放在丹田處，此時我再將宇宙花場的訊息接引下來。解析方式分為幾種意象，她可以「看見」、「感知」花朵生長的環境、花朵的光譜變化、花朵訊息連結的管道與層次、花朵正面的精神特質、對治的負面情緒、身體能量傳導的脈絡走向、生理的症狀反應、特殊療癒方式等，由以上幾種方式去綜合分析出花語。


    ## 合作解開野薑花的花語


    秋敏「看見」、「感知」的花朵訊息，與真實眼睛所見到的花朵，具有相同的特質。舉例：在解析野薑花花精的時候，她告訴我，這花精擁有一股清涼的能量，她看見花苞中飛舞出一閃一閃耀眼的光亮，像一隻隻金色透光的蝴蝶滿布眼前。我心想對了！她已經「看見」野薑花了。過了些許時候她又說，她感覺頭上長出好多個花苞，然後速度很快開出一朵朵的花，像是蝴蝶從腦中飛出，馬上使人有醒腦的作用，一時間腦中的壓力減輕，有種莫名的壓力瞬間被釋放掉，看待眼前的事物變得很輕鬆⋯⋯。


    ![野薑花](img/832bd80b1c9ef2dd0374ae143cb3e3e9_60_0.png)


    野薑花像似一隻隻白色蝴蝶飛舞


    依據秋敏的解析，加上花朵與植物在成長過程中，展現了高度智慧所蘊含的特質，我可以從花朵的外型、顏色、構造、植物的生長習性、環境，以及與周遭的互動方式分析、歸納、研究出花語。我判斷野薑花的能量走在頭部，因為她圓圓的花柱外形酷似人的頭腦，而野薑花生長在沼澤地，植物親水性高，粗粗的莖可以吸取大量的水分，讓高聳的花柱得以滋養開花，散發出陣陣誘人的清香。


    在中醫的醫理，腎臟屬水，腎水不足，會使人的腦部能量混濁，頭腦不清晰，注意力渙散，由此更可以推論植物的親水特質，使花朵水分足夠開花，水訊息能量具有滋腦效果。而散發出的濃郁氣味，有醒腦、活化腦細胞能量的作用，可以平衡腦部「當機、塞車」的現象。


    秋敏解析花語的過程中提到，她發現野薑花的能量行竄速度很快，並沒有出現過多的情緒反應，證明花精清理濁氣作用的速度很快，她所對治的情緒是淺層的現實面，而非複雜的情緒或受創的心靈。像是學生的功課壓力、上班族的工作壓力等等，這類暫時性的現實問題，都能夠解決，使身心靈快速達到平衡。


    ![幸運草花](img/832bd80b1c9ef2dd0374ae143cb3e3e9_59_0.png)


    > 幸運草花彷彿小精靈，山林小徑上一路陪伴著我們。


    ## 呈現花朵完整鮮活的訊息


    綜合以上這些象徵性的意象，可以完整解析出花朵的精神特質與情緒作用。當然，也可以透過清晰的直覺力，直接將花朵的精神特質、平衡對治的負面情緒用口述方式直譯出來，或者直接解讀花朵的訊息，但是這缺乏一種發現的樂趣，也缺乏更多問題的延伸探討性。


    所以，通常我喜歡秋敏用她獨到的功力，讓腦中自然呈現「象徵」式的意象，這會比狹隘文字的敘述，來得豐富且寬廣。當花朵的象徵精神奧祕解開之後，再運用我對植物直覺的觀察、認知力，總和分析解出花語。我曾經把已經解出的花精，拿給體質敏感但情緒多重的人測試，發現解出的情緒作用條理不清，顯然解析花語的人除了具備對訊息敏銳的感知能力之外，更重要的是心靈意識的清明、單純，以及超越個人侷限的寬廣度。不過藉此我也可以瞭解到，花精對不同特質的人會產生靈活的作用。


    當花能量訊息被完整擷取製作為母精後，進入花語解析。母精經過一連串完整的訊息解析確定後，方可再進行下一個步驟，在一定水、酒倍數稀釋與震盪下，與花精達到最完整的結構組合，再將花精裝瓶成滴劑，測試訊息能量和原來母精的訊息是否完全符合，在完整沒有雜訊能量的干擾下，一瓶最精準共振人體電磁場的花精才製作完成。有關於花精的製作細節，我會在本書中另行介紹。


    ## 體驗花朵鮮活的能量


    自走進大自然中，體驗花朵與大自然間的相知與共融，是很令人感動的一件事。花朵植物如此自在地融入生長的環境當中，無論刮風、下雨、烈日當空或者天寒地凍，她們依然長保安然入定之姿，不受絲毫的干擾，全然沒有挫折、煩惱等負面情緒的波濤。


    雖然隨著台灣花精問世，花精製劑使花朵能量便於保存，且方便取用，療效持續性又高，因而取代了鮮花療法。但我仍然不定期在各式場合中，讓參與者體會鮮花的能量，透過活生生的花朵，讓大夥兒親身感受到花與大自然間深連的關係。


    我喜歡帶領學生走訪山林之中，進行鮮花療法的體驗。也許是師生之間相互為伴，大家的興致高昂，我們從不在乎天候是晴是雨，即使在寒流雨中出遊，也從未聽過有人抱怨雨天的濕冷或不便，反而我們更真切的從大自然裡學習到寶貴的經驗。


    雨天的花朵，乍看之下因為被雨水淋透，而顯得殘破不堪，仔細觀察，你會發現有無數的花苞持續生長著，每一刻都有新的花朵在風中雨中怡然盛開。想想她們在連綿的雨季，依舊頂天立地，昂首接收天地的滋潤，不需要像人一樣費心撐傘，心情也完全不受天時氣候的影響，總是保持著一貫的安定、平和，如老僧入定，明知花瓣免不了因為雨水淋透而提早凋萎，卻依然活潑地陸續開展花苞，承接天地之氣，誠摯地頌讚大自然的洗禮，那渾然天成的圓融姿態，讓人自嘆弗如。


    ![戶外鮮花療法體驗金蓮花的訊息](img/832bd80b1c9ef2dd0374ae143cb3e3e9_62_0.png)


    這就是我們需要與自然共處、向花朵植物學習之處！透過鮮花療法，我們可以和花朵有親密的互動，深刻體會花朵和大自然、和宇宙間的互應關係，藉以回歸到人最天然的健康本質，也打開更寬廣的視野，以更正向積極的態度來面對生命！


    ![放眼心界，感受宇宙造物的神奇](img/832bd80b1c9ef2dd0374ae143cb3e3e9_63_0.png)'
