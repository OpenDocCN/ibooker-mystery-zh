  md: '# 花精讓我們看到個性的盲點與缺失


    根據我運用花精的經驗，花精對人的影響與療癒，有個典型的歷程。花精激發人的自省與自覺，讓人真正徹底改變自己，以下是其中一例：


    陳小姐是一位貿易公司的中階主管，看起來嚴肅、眉宇深鎖。她常常必須面對工作方面的決策與管理壓力，然而最令個性直率的她困擾的是人際關係的問題。在工作中，她不但要面對同事之間的競爭壓力，而且時常感覺到上司的刁難，還有部屬的故意違逆，這讓她總是處於備戰狀況，而顯得防衛帶刺。


    第一次來諮詢，我先給她比較能夠紓解工作壓力的花精。經過半個月之後再見面時，她冷淡直率的告訴我：「沒有什麼感覺啊。」我馬上明白她還未十分滿意現況的轉變，她一直是個過度緊張、要求過高的人，我想她的意思是：「大家還是對我很惡劣啊。」然而和第一次諮詢時比較起來，她整個人顯得比較柔軟，防禦心減低，心情明顯放鬆了許多。從她所填寫的情緒檢測表，也可以看得出來，許多部分勾選的情緒強度已經降低，我詢問之下，她也承認：「整個人感覺比較平靜。」這時她才告訴我，她真的很期待花精可以幫她改善和同事相處的問題。


