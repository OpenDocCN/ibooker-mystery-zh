    在深夜開放，並沒有陽光可供轉化，但使用過曇花花精的朋友都表示，「曇花」將他們內在深藏的抑鬱、煩躁情結，調動出來調整，顯見「曇花」能量的爆發力十足。祕訣是要能夠調準頻率，連結花朵所相應的宇宙花能量場的訊息，所製成的花精能量才完整，而且花朵波頻也才能夠精準共振特定心靈情緒狀況。


    # 花精母酊劑的擷取原則


    首先，我們從花精母酊劑的擷取開始談起。「花精」是訊息能量，不含任何化學與物質成分。準備好淨化過的水，到山中尋找地理磁場良好，植株本身健康完整的花，將花朵的訊息能量導入，這才完成花精母劑的擷取步驟。這道手續看似簡單，卻需要經歷許多細緻的環節，才能真正取得完美無瑕的花朵訊息。


    我在擷取花精前，需要先周詳地準備許多前置作業。在地球這個場域，有許多層次、空間是重疊在一起的，之中的安排是依照著宇宙的法則、大自然的定律。大自然中，存在著許多人類肉眼不可見的精神能量體，這些我們俗稱的精靈、樹神、山神等等精神能量體，皆與我們共存在地球上的不同層次與空間，雖然我們的肉眼看不見，但祂們確實是存在的，更何況我們可見的山川樹木、花鳥魚蟲這些更親近我們的生命體。


    擷取花精前，我必須先到當地去調查地形，誠心供養當地的諸神、精靈等精神能量體、生靈、植物本身等等，告知祂們我將會在此擷取花朵的訊息，請祂們瞭解，並將空間空出來，讓我能順利執行這項任務。同時，我還要調整整個山林或原野的能量，之後才能擷取花精，完成之後，還要再做回饋花場的供養，來感謝花朵植物、大自然、諸神靈。這就像到人家家中借東西，必須先向這家人說明，得到許可之後才能借用，用的過程要小心珍惜，用完後必須盡速歸還，跟人家道謝。


    沒有做好事前的供養等前置工作，就冒然擷取花訊息，一來不夠尊重天地自然，二來所擷取出來的訊息不夠單純。而且花朵植物也會自我保護，若不尊重她，或者以機械方式擷取，她不會自願釋放出完整的結構和訊息，只會在非自主意願下被動釋出能量，而且可能摻入其他的雜訊，敏銳的人立刻就會感受到這其中散發著慌亂的訊息。由此可知，擷取花精等訊息能量的執行，是極度神聖的工作。


    # 花精的製作祕訣——一花一世界


    真正的花精製作有嚴謹的物理原理、科學方式。依據我的經驗，在擷取花朵訊息時，除了接收花本身的訊息之外，還有來自於宇宙的訊息能量。從花到水，在由物質轉為能量的過程中，所藉助的不僅只是太陽光，更重要的是來自於宇宙的能量，也就是連結宇宙中花的能量場。有人說：「一花一世界。」這個宇宙空間是確實存在的，而每一朵花無論大小，都和她的精神源頭緊緊相繫，擷取花朵訊息時必須把這個空間的訊息導入，能量才完整。


