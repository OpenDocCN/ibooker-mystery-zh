    ## 五種花語所對應的情緒


    解鮮花療法的步驟及原理之後，接下來是鮮花療法運用的實務說明。讀者可以從心靈的角度出發，看看選擇的花如何呼應身心的微妙關係，以花來印證人心靈意識的現境。


    我在進行鮮花療法之前，已先解析出各種花的花語特質，也可說是花的個性，參與者都是在不知道花語的狀況中，選擇喜歡的花，所以當他們選定心花時，我馬上可以知曉他們會共振到此花的心境，是呼應花的正面特質還是負面特質。更進一步，可以由花畫中解讀出個人的訊息，或者由花能量傳導後，個人的心境變化，判讀更微細的心靈或情緒狀態。


    由花畫的訊息可以先判斷出心靈共振的正負面，畫作整體構圖條理分明、花朵線條清晰、顏色豐富細緻、筆觸流暢大致是共振花朵的正面特質，反之整體構圖感受不鮮明，花朵、顏色、筆觸等混亂不協調，即是共振內心的負面情緒特質。


    因此做完花訊傳導後，參與者說出的感受更可以確立共振的面相。接受正面特質共振傳導後，心靈能量會馬上開暢，有一種身心平衡的喜悅感。接受共振負面傳導特質的人，因情緒的觸動，使身心產生修護前的不適反應，但這些反應只是觸媒作用，共振調伏內在不平的情緒波動之後，很快的不適感會消失，讓人心生愉悅，而作用時間的長短，依個人創傷的深淺，與是否正視情緒問題的心態有關。


    ## 花語解析實例


    參與此次鮮花療法共二十五人，有五盆花供他們選擇：粉紅帶淡紫花－仙克蘭六人、淡藍花－瑪格莉特九人、黃花－海棠三人、紫花－彩鐘花三人、粉紅花－矮牽牛四人。


    我透過宇宙花能量場訊息，解析出花朵的正負特質與情緒的對應，再綜合研判花朵氣質、花朵顏色、花瓣展演、花蕊布局、花型結構、花朵與枝葉、植物與環境、植物與人等，深入解析花語。


    以下我用簡單概略性的方法，由植物、花朵外型來解析，使大家比較淺顯易懂瞭解花語。但在此我必須先強調，並非所有花朵都可以一成不變運用以下的方法解析，真正精準共振情緒的花語，以先天花場訊息為主體，其他花朵外在條件為輔。就和人一樣，同是一家人，遺傳基因、長相、生活方式接近，但個性可能完全相異。


    植物和人一樣，必須深入瞭解，才能發現每一種花獨特的生命氣質，解析越精準的花（語）共振情緒的契合度越高，能夠快速解除情緒的癥結。這也是我堅持每次擷取花精之後，一定要重新解析花語的原因，可以避免落入一成不變的模式中套用，而扼殺了每棵植物生命的活潑度。這個部分，我在第
    152 頁「花語的靈性智慧」做了說明。


