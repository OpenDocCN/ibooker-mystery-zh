    本土花精的經驗，在臨床的運用上是十分成功的，我在花精這獨特的心靈療方之外，另拓展出各種藥草訊息能量、排毒訊息能量。心靈的需求可以靠花精來滿足，而生理的健康則以藥草、排毒訊息能量來調理，活用訊息能量的特質，架構出完全無負擔、無副作用的身心訊息平衡機制。最重要的是，以本土親切的花草，製作出最適合我們的體質與心靈的訊息，不但能量活躍、完整，訊息管道通暢，而且完全能夠貼合我們的需求。花精的精神與成功經驗，不僅可以延伸到其他的訊息產品，更可以在不同國家之間傳遞開來。未來，我也計畫到其他國家，為當地的人們研製出最適合他們的本土花精、藥草訊息能量等，讓宇宙訊息的法則真正落實與應用，為地球各個角落的人們，帶來更貼密的生命律動。


    # 選擇訊息健康的花株


    在擷取花朵訊息之前，要先觀察花朵植物所生長的環境，例如地理磁場是否良好，有沒有人為環境污染等。在台灣地區，要尋得好水好地，並不是難事。在環境清幽的地方生長的花朵，汲取大自然地水火風的精華，本質上就顯得雅潔清靜，最適合當作擷取花精訊息的母株。


