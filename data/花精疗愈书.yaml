    # 順勢療法與花精療法的差異


    我們常會以順勢療法的原理來解釋花精的作用，舉例來說，一個人有恐懼的情緒，就找到一種有恐懼頻率的花來治療他。這是順勢療法「以毒攻毒」的原理。簡單來說，順勢療法採用的是自然的療法，激發人體自主防禦能力，讓人自然而然恢復健康。把有毒物質如砒霜等，運用稀釋或震盪方式，將物質的質量稀釋到幾乎不存在，此時能量會達到最高。醫師運用此藥物將病人的症狀激發出來，進而排出體外，使人體自行產生抗體，提升免疫系統能力。


