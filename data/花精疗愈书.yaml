    ## 放鬆大腦的箝制，身心靈整體平衡的療方


    負面情緒磁場從潛意識中發出陣陣失衡的波頻，不斷干擾人們的生活、工作與人際關係，大多數人無法轉化情緒的根本因子，往往以大腦來管理情感，試圖用理性控制不斷湧現的負面情緒與念頭。


    例如隨著年齡增長，我們可能告訴自己要「有修養」、「穩重」，「不能亂發脾氣」，維持好好先生、好好小姐的樣子，為了維護形象，每次有情緒我們就慣性的隱忍下來。然而負面情緒持續被壓縮、抑制，潛抑於內在，形成了一個個阻塞的能量場。滯礙的能量在身體氣脈中具體化現，輾轉成為停滯的區域、異常的生理組織甚至腫塊，各種心身病症和莫名的痠、疼就接踵而至了。這就是以大腦理性管理情緒，或非理性地壓抑情緒可能產生的後果。


    身心靈相連一致，需要整體的平衡，花精則恰好能夠扮演三者之間的橋樑。她提升心靈的能量，放鬆大腦的箝制，讓人擁有高度自我覺察力與智慧，以調整失衡的生理與情緒。她讓人清醒的面對自己，從潛藏未解決的負面情緒中走出來，進而看到生命寬廣的存在意義。


