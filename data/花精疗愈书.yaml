    原因為例，現代人十之八九都有失眠的問題，原因很多，可能是親子關係的障礙，擔憂工作、事業、愛情的問題，身體健康問題，煩惱經濟、生活、人際關係，學生則憂慮課業狀況，跟老師、同學之間的相處關係。有些人是因為情感創傷，而沉湎於過去，無法釋懷與寬恕，導致心脈窒礙，形成了憂鬱與焦慮，嚴重者甚至會有激憤、嫉妒、埋怨、抱怨、罪惡感的情緒。長此以往這些情緒問題就造成了睡眠的障礙。


    人一生中有三分之一的時間在睡覺，睡著時是我們最放鬆的時刻，細胞會在此時休養生息，合成人體所不可或缺的微量元素。由醫學上對睡眠之論述可以瞭解，睡眠具有以下幾種功能：第一，修復白天身體系統的耗損；第二、降低代謝率與體溫而保存能量；第三、幫助自身的發展，快速動眼期（REM）可能有利大腦皮質、視覺、動作、神經細胞等發展。第四、一些平常沒有辦法演練的本能行為，是在睡眠中完成演練。此外，睡眠有助於適度的遺忘、記憶的強化、高等智能的運作，例如人類的認知運作、情緒調控、性格發展、社交能力的建立等。


    睡眠也可以改善免疫系統的功能，人體的修復機制在這時啟動，協助身體維持一定的健康平衡狀態。例如肝臟處理人體的毒素，就像是一座化學工廠，但是這座工廠的機件也需要充分的休息，唯有深層放鬆的睡眠，才能讓肝臟解毒功能正常運作。由此可見睡眠真的很重要，但睡個好覺卻是很多人難以奢望的。


