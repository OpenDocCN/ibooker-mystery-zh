    ## 治療師的臨床經驗


    艾草是一般人都耳熟能詳的傳統藥草，應用範圍很廣，舉凡驅邪保健、健胃整腸、行氣活血、溫經通絡，對於婦女經痛也有不錯的效果。許多婦女都有下焦虛寒的問題，導致分泌物異常、經痛、經期不順。艾草訊息往往可以達到迅速的平衡調理效果。


    由於藥草訊息不僅擷取植物本身的能量，包括植物與自然的互動、與宇宙天地呼應的磁場，都被保存在訊息當中，我發現艾草訊息純陽的能量，不但可以瞬間強化人體能量場，免於受外在不正之氣的干擾，而且可以平撫慌亂焦躁的心情。


    國內一家知名的自然醫學診所，以能量檢測儀器測試艾草訊息。院方找來一位癌症患者，針對診所內各種健康食品檢測，效果都不彰，取用一瓶艾草訊息來檢測，患者的整個能量場當場就平衡了！他們再找一個自閉症患者來檢測，發現艾草訊息可以平衡患者的神經系統！院方再取用單次使用的量（滴管四滴）來做檢測，同樣能達到平衡。衷心期待能有更多相關的公益團體、專業機構，共同參與我們的研究計畫，讓藥草訊息能夠建立更多元寬廣的資訊與發展。


    「蒔茶葉訊息」是從一棵老樹的葉部取得的能量，最顯著的是消除疲勞的特性，有助於排除肝膽毒素訊息。


    「蒔茶葉」沒有咖啡因的成分，純粹是健康調理的訊息能量，先緩和心理情緒失衡的波頻，活化全身的氣血，同時進入各器官機能，調整生理失衡的頻率，由內而外提升人的能量。


    ## 心得分享


    以往,只要帶女兒出門,回家後,她就會哭個不停,到陌生的地方也很難安靜,晚上也常原因不明地哭鬧,一個晚上翻來覆去,直到天明方休。加上她又常生病,出生第四個月就住了一個星期病院,時常感冒,且容易併發其他病症,同時,肚子鼓得像西瓜,往往一個星期就要急診兩、三次。有時我下班回家,就得馬上帶她到醫院掛急診或收驚,弄到十二點,她也不見得睡得好。後來,只要她一看到兒童急診室的門就開始大哭。


    為了她,我真是找遍了方法,想辦法幫她平穩下來。什麼都試過了,醫生開的藥也都差不多,家裡的藥也已成堆,不過,她通常還沒吃完就又去急診。她開始使用艾草訊息後,很神奇耶,只在出門前給她喝二滴,晚上她居然就不再哭鬧了,狀況真是穩定很多。


    我本身是醫護人員,也知道常服用藥物對身體不見得是好事,所以一直努力在找方法幫助我的女兒。艾草訊息很天然,使用後,女兒真的好很多。


    從事業務工作,我的客戶群多數在新竹,時常要往返台北和業務區域。以前我的精神不好,開車到新竹的路途中,必須找個地方小睡一下,才有精神開完全程,有時候硬撐不休息,就會在車上打瞌睡,現在想起來真是滿危險的。而且可能是精神不好,回到家脾氣就容易發作,對妻子小孩變得很沒有耐性。我接受建議,使用蒔茶葉訊息。


    我覺得很有效耶!最明顯的是,每逢出差往返,我都可以保持精神開完全程,很清醒的完成業務工作,而且回到家,也不再累得癱在沙發上,不再像以前一樣,動不動就對太太、女兒生氣了。


