    ## 台灣花精的獨特製作祕訣


    高山原野中取得的花朵訊息水，只是母酊劑，能量尚未完全激發活化，因此還不適合當作花精直接使用。首先花朵訊息必須經過淨化，剔除不必要的、負面的訊息，保留有益於人的正面能量，而且確保訊息結構的完整性。純正的花朵訊息轉載複製到水裡之前，擔任「訊息記憶體」的水必須先行淨化，將水中原本所記錄的訊息一一消磁，才能確保花朵訊息進入之後不受干擾；保存作用的「酒」的訊息淨化與醇化，可以避免酒的刺激性或釀製過程記錄的訊息，傷害或影響花朵訊息。藉由稀釋與震盪的步驟，才能夠激發花朵能量，使之活化，完全開展。


    製作花精的每一個環節都不能輕忽草率，才能確保花精的訊息精準，直達心靈，共振平衡情緒磁場，開展花精核心的精神。


    ### 獨特的水訊息淨化方式


    花精完全沒有任何化學或物質成分，唯一的介質是水。花精是以淨化過的水當作記憶體，將花朵的精神力量貯存在其中。


    水從宇宙間來到地球，原始結構本來潔淨無染。然而水亙古以來便穿梭於山河大地之間，在地球上的年歲比起任何生命更為久遠，而它擅長記錄訊息，就算汲取深山泉源最乾淨的水來分析，其中也飽含特有的訊息。


    水是最好的記憶體，科學家早已透過水的結晶體，證明它會記錄無數無量的訊息，包括怒罵或讚美也會讓水產生截然不同的變化（註：參考江本勝《生命的答案，水知道》、《幸福的真義，水知道》等書)。花朵訊息是敏銳細緻的能量波頻，若放入沒有訊息淨化過的水中，結構可能受到干擾或扭曲，影響很大。


    為瞭解這個問題，我思索著如何徹底淨化水中雜訊，同時也讓水質穩定，不再輕易記錄周遭訊息的方式。


    與「一花一世界」的花能量場原理相通，我循著水的訊息能量溯源，發現了宇宙中水源頭的能量場，以其能量轉化淨除水中的訊息，不但簡易徹底，而且還能讓水還原到本然的性質，這時的水是最純淨不受污染的狀態。


    打個比方，我們都知道金字塔可以聚集能量，之所以如此，是因為它能與宇宙的能量場相應。就像道家修練五行「金、木、水、火、土」一樣，宇宙中也同樣有五行能量場與之相應，因此五行在地球上才有運行的能量。舉例來說，木是青色，治療肝臟，在地球上屬東方，而往東方的角度若沒有青色的結構，地球上是相應不到這個磁場的，青色也就無法產生治療肝的共振能量了。宇宙法則都是以共振相應的方式運作的。簡單來說，我是運用宇宙裡水的源頭的結構，讓它和水中的分子共振，以淨化其中的訊息。


    運用宇宙水能量場來淨化水，不但使之訊息純淨、水質穩定，而且水分子變得十分細緻、活躍，結構穩定扎實，不再輕易受到外在訊息的干擾。更重要的是，它讓花朵訊息安穩入住，長保能量結構的穩定性，精巧、活化的水分子能夠承載花朵訊息，進入身體細胞當中，讓花精能量充分發揮作用，無形中使花精共振與平衡效果更為強化了。


    ### 水的本質與心靈相通


    水擅長記錄訊息，當我們以宇宙水能量場淨化過，讓水還原到原始結構時，它是最純淨不受污染的狀態。這就好比我們人類，雖然容易受各式各樣的慾望而左右、牽擾，但當我們回歸核心的心靈本質，卻永遠純潔無瑕。也因此，訊息純淨、結構完整的水，不但能和宇宙水能量場遙遙呼應，也能與我們存有
    70%水分的身體能量場相應共振，發揮淨化心靈的功能。


    水的純淨與否，對人體健康甚至心靈的影響是如此重大。其實只要將水中的雜訊一一消磁，把其結構還原，使水分子活化、細緻化，這樣的水就是身心最好的淨化、滋養補充劑。隨著訊息時代的來臨，人們生活品質的要求也會益趨提升，訊息純淨的水將徹底改寫我們對飲用水的既定概念，我們也將瞭解，回歸自然純淨的生活方式，以及追求身心靈的成長，是無分軒輊的！


    ### 淨化過的「酒」質淨香醇


    至於具有保存作用的「酒」，因為在釀製過程中夾雜了一些製作及保存歲月的訊息，還是需要經過訊息的淨化與醇化才能使用。若把沒有淨化、醇化過的酒，直接加入存有花朵訊息能量的水中，酒的刺激性質會讓花朵訊息彷彿被燙傷似的，瞬間干擾花朵訊息，扭曲花精的能量結構，就如同電視畫面受干擾時一樣，花朵形象會變得扭曲而隱約不明。所以淨化酒也是不可忽略的步驟之一。


    經過訊息轉化的酒質純定淨，它的特質被強化了，不再有刺鼻的酒精味道，而有醇潤香甜的口感，同時散發出清香。因此使用過台灣花精的人都會發現，它沒有強烈的刺激酒味，反而有一股淡雅的清韻，老少咸宜，甚至有人可以聞見花的香味。


    如何讓酒與花精相容而不影響其原來的品質，也是需要注意的。


    首先要將水與酒的配比調整好，確定一切安定之後，再讓花精入住其中，接著是稀釋與震盪步驟，過程中時時確保花精的訊息與花能量場有完整的連結。每一瓶製作好的花精，都要跟宇宙花能量場持續連結，除非受到電磁波的徹底破壞,否則花朵訊息可長保完整無瑕。


    無論是純淨、細緻、活化的水,或者淨化與醇化過的酒,都讓花朵訊息有了溫暖舒適的存在空間,不但訊息結構自始至終都能夠維持一定的完整與精準度,而且水、酒與花精訊息之間,更發揮了彼此活化的加乘效果。研發製作每一瓶花精時,必須如此堅持,才能讓花訊息發揮最適合的效能、最精準的效果。


    ### 獨家的稀釋與震盪步驟


    從自然界裡擷取到的花朵精華,所製成的母酊劑,訊息尚未激發活化,不適合直接使用,必須經過一定倍數的稀釋與震盪的步驟,才能讓訊息完全開展、能量倍數放大。這兩個步驟必須做到非常精準,才能使花朵訊息完整呈現,恰恰能夠共振人體的能量場。


    一朵花與一片花瓣所帶有的訊息,或者一個人與他身上的一個細胞所帶有的訊息,毫無疑問是一樣的。所以人身上的一個細胞就可以複製出一個人——這是訊息特有的「全息」性質。但是,一片花瓣訊息能量呈現的完整性,與一朵花的訊息能量呈現的完整性,可就截然不同了。


    基於訊息特有的全息性、複製性,我們將母劑加以稀釋,但需要注意的是,並不是無限制的稀釋,因為過度稀釋的結果,仍會影響花朵訊息的完整結構。台灣花精的稀釋倍數,經歷無數的研究結果,嚴格遵循最佳的比例。


    緊接著是十分重要的「震盪」步驟。稀釋後的花精原液，必須經過一定次數、同等頻率及固定強度的震盪過程，花朵訊息才會完全開展，呈現最完美的結構狀態，及訊息活潑度。


    經過無數次的實驗結果，我發現在花精的震盪步驟，花朵訊息放大達一定的倍數時，會得到最完整的結構，這個倍數必須精準掌握，過與不及都會使訊息變得模糊。過度稀釋或震盪的花朵訊息，就像瀑布沖激下的花朵，結構勢必因為過度沖刷而扭曲或支離破碎。此時殘存的花朵訊息隱約留在水中，卻已不具有完整的結構，及精準的頻率。


    就像收聽廣播頻道一樣，頻率精準，接收到的訊息就很清晰，頻率差一點點，雜訊就會導致收聽的訊息模糊不清。我們的情緒磁場承載著一定的能量,唯有純淨清晰、能量結構完整的花朵訊息,才能精準共振到核心磁場,進而發揮有力的平衡撫慰效果。


    花精母劑經過稀釋與震盪步驟,花朵訊息才能完整開展,真正直達心靈核心,進行身心情緒的徹底療癒與平衡。因此我們堅持使用時絕不可再自行稀釋分裝,以確保訊息共振心靈的精準度,自始至終保持如一。


