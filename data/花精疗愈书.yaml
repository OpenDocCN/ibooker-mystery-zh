- img_proc: true
  md: '注。花精治療師必須虛懷若谷，懂得設身處地、認真傾聽，及時提供個案身心最需要的幫助，輔導其度過療癒期間的情緒起伏，並且尊重個案的意願、個案與花精之間共振的深廣度，循序漸進提升其意識的自覺程度。善用花精的特質，讓花精激發其生命智慧，把「釣竿」交到個案手中，讓他擁有面對自我、勇於改變、獨立自主的能力。


    # 活用花精測試法，瞭解個案


    以台灣花精的諮詢為例，個案真實的需求包含以下各項資訊的綜合彙整：


    +   - ○情緒檢測表（勾選情形、其他描述，填寫時是否詳實或完全坦承，自我認知）

    - ○花精治療師與個案會談過程中所得到的資訊（話語、肢體、身心狀態診斷、彼此互動關係）

    - ○花精測試時，個案身心各方面的反應


    花精治療師從前兩項彙整出初步的判斷，可以透過身體磁場測試法或訊息能量檢測法（穴檢儀），做進一步的確認。花精測試的階段，治療師就能夠從儀器檢測結果，或個案的身體反應、感受的描述，獲取進一步的診斷資訊。而許多人經過測試階段之後，對自己潛藏的情緒也有較為清晰的認知，能夠和花精治療師更深入懇談，釐清自己的問題癥結。


    假設一位個案初次接受花精諮詢，花精治療師透過情緒檢測表或諮商過程，甚至是個案過去的就醫病史，確定他患有憂鬱症，是不是立刻取出對治憂鬱症的幾種花'
