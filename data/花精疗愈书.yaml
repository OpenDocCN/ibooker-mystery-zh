    # 心得分享


    過去很長一段時間，我不斷地追求自我的成長，看了很多書，也參加過各式各樣的成長課程，我一直很努力地想把自己找回來，改善母女的溝通關係。那種感覺，好似要把散落一地的拼圖，很仔細、很用心的拼成一幅完整的圖像。使用花精之前，我覺得自己已經整理得差不多了，沒有想到，第一瓶花精就又讓我回到過往，胸悶、喉嚨痛，想大哭，很哀傷，整個人陷入幽微的深谷裡。花精正針對我以為早已痊癒的傷口進行療癒。


    回憶從前，拼湊的感覺真的很辛苦，你得找尋每一塊拼圖，然後把它們擺放在正確的位置，可是總覺得就是少了那麼幾塊。相反的，花精就像變魔術一樣，瞬間形成一整幅圖像，完全不費力。我才明白，內在世界許多意識的作用，並不是我們自以為瞭解的，花精讓我能夠跟自己的潛意識對話，看清楚傷疤坑洞；花精讓我不只用頭腦，或過往經驗的累積，去面對生活，而是更多來自心靈的力量，她的細緻與敏銳，讓我感覺像是長出了一對翅膀一般自在。'
