  md: '則可以在純淨、無干擾的環境場裡，準確地解析花語，再次獲得客觀的驗證，花精的精神特質和情緒的作用才能正確無誤的傳遞。


    進行花語解析時，我們必須在一個很安靜的空間，而且我會事先淨化這個空間的訊息，讓空間處在一個潔淨的花能量場中。首先我請秋敏閉目靜坐下來，將心開放，抽離主觀的感官意識，再共同默禱、誠心祈請宇宙花能量場的祝福，以一顆虔誠單純的心進行花語解析。


    秋敏解析花語時，都是在不知道花名的狀況下進行。她先閉上雙眼，再伸手拿花精，雙手握住花精瓶身放在丹田處，此時我再將宇宙花場的訊息接引下來。解析方式分為幾種意象，她可以「看見」、「感知」花朵生長的環境、花朵的光譜變化、花朵訊息連結的管道與層次、花朵正面的精神特質、對治的負面情緒、身體能量傳導的脈絡走向、生理的症狀反應、特殊療癒方式等，由以上幾種方式去綜合分析出花語。


    # 合作解開野薑花的花語


    秋敏「看見」、「感知」的花朵訊息，與真實眼睛所見到的花朵，具有相同的特質。舉例：在解析野


    > 幸運草花彷彿小精靈，山林小徑上一路陪伴著我們。


