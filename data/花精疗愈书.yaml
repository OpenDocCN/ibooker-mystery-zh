    ## 花精諮詢的流程


    一個完善的花精諮詢室，必須是靜謐安全、不受干擾的，坐下來，喝杯水，讓我們的心情隨著空間的氛圍，逐漸沉澱下來。整個諮詢過程中，不受其他人事物的打擾。我們可以安心的聽取說明，在寧靜的空間下，輕鬆順暢地完成整個花精諮詢流程。


    ### 勾選情緒檢測表


    每一次前來接受台灣花精的諮詢，都要填寫一份「情緒檢測表」。這份表格大略分為四個部分：情緒狀況、感覺與想法、生理症狀，以及我們過去的生命經驗。採量表方式，以勾選符合的項目為主。填寫前，閉目一會兒，先做幾次深呼吸，確定自己處於安定狀態。填寫這份量表時，可以回想自己遇到特定事件時，比較容易產生的情緒，或者一個人獨處時常有的心情，以直覺快速勾選，輕輕鬆鬆，沒有負擔。


    透過勾選這份檢測表，我們也藉機整理了這一至二個星期以來，自己的心情與感受，更清楚自己的狀況，也知道自己的心事該「從何說起」，讓花精諮詢的過程更深入也更為順暢。


    ### 信任你的花精治療師


    花精諮詢室是屬於我們的私密空間，我們可以在這裡盡情地抒發心中的感受。一位好的花精治療師真心的陪伴，誠懇的傾聽，溫暖的回應，會讓我們的心理得到最大的慰藉。而他適時適切地協助我們挑選出最適合使用的花精，才能讓我們的身心與情緒各個層面得到最契合、最精確的調撫。他會鼓舞我們的內在士氣，並建立自信心，讓我們勇於承擔面對心靈療癒的過程中，可能遇到的任何心境的轉化，幫助我們以最快的速度蛻變與成熟，充滿自信與愛地邁出人生的步伐。


    ## 身體磁場測試法的特色


    透過情緒檢測表的勾選，以及會談的溝通與釐清，我們的內心會更清明，更瞭解自己，雖然可能還是會感覺到深受身體病痛或情緒困擾，但至少可以暫時安心，先把大腦的一切思慮放下，信任自己的身體，信任我們的心，以直覺來選擇自己目前最適用的花精。


    花精的測試方式有很多種，包括身體磁場測試法、訊息能量檢測法（穴檢儀）、心理諮商、O型環測試法、雙手能量測試法、花卡圖片測試法、隨機抽取法等。以上各種方式的使用和優缺點，我在第一本書《發現台灣花精》已說明過了。


    試過各種測試法之後，我傾向於回歸人的本心，讓個案在身心均放鬆的狀態下，直接與花精訊息接觸互應，再細查其身體的動作反應，以及當時的心像情緒變化，讓測試者自行擇定他目前最需要的花精——這也就是身體磁場測試法。有些個案是因為生理的問題來尋求花精療法，他們也許不瞭解身心靈是息息相關的，有些人比較感覺不到心靈、情緒的變化，或者受理性訓練，習於相信科學的驗證方式。對於這樣的測試者，我會同時運用身體能量測試法及訊息能量檢測法，使他們能安心的選擇。事實上，經過多次試驗，兩種方式所測得的結果是相符的，就看個人所需而決定測試的方式。


    身體磁場測試法的原理，在於人體是由能量所組成的，每一個細胞、思想、情感、記憶、信念等都是以訊息方式存在，而花精是細緻的訊息波，能夠直接與人體能量場共振，對身體、心理及精神造成波動。若此時我們的身心都真正放鬆，就可以信任內在智慧，找出自己最需要的花精。當然，前提是花精本身的訊息，要能夠精準的共振特定心理情緒狀態，甚至只是握住瓶身，就能感受其訊息能量，這樣，使用身體磁場測試時，才能找出真正恰當的花精。目前這是台灣花精的特色之一。


    肢體是表達內心感受最直接的媒介。當我們喜歡一個人，把他當作自己的好朋友時，我們的身體會自然而然傾前、靠近他；相反的，會不自覺的往後退，想保持安全距離。在測試時，還可能身體打轉、左右搖晃，或先往後退再前傾等複雜的變化。由身體和不同花精的共振反應中，可以測得我們內在可能有哪些負面情緒需要面對，以及我們目前對於整理特定情緒的接受程度，此外這時也可能興起各種心情或感受、腦中出現畫面、想法等，都可以表達出來，讓花精治療師綜合整理之後，從旁協助我們做判斷。


    唯一要注意的是，肢體所傳達的內心情感複雜多變，它恰恰反應每個人獨特的心靈狀態，花精治療師需要經過專業的訓練，才能做出精準的判斷。當我們使用身體測試法來選擇花精時，最好有專人在一旁協助判讀。


    ## 用了花精之後，會有什麼反應？


    許多人拿到花精之後，常問：「我用了這瓶花精之後，會有什麼反應？」或者立刻找書查閱花語，急於想知道自己會有什麼變化。花精治療師總會把問題的答案，保留給使用花精的朋友。心靈世界豐富奇幻多變，沒有人是和別人一模一樣的，就算測得同一種花精，我們的反應極有可能和別人完全相反，再詳盡的花語說明，也很難表達我們心靈豐富生動的感受於萬分之一。正因為如此，鼓勵使用者每天給自己一段時間，靜思獨處，把使用花精的心得記錄下來，包括心情變化、身體感受、睡眠習慣、夢境等。書寫是內在訊息的呈現與整理，哪怕是隻字片語，在把感受寫下來的同時，我們不但更瞭解花精對自己的影響與改變，無形中藉此也得到了自我療癒。


    除此之外，定時定量使用花精，最是重要。讓花精持續不斷提升我們整體的能量，我們的意識會更加清明、覺察能力會提高，如此一來內在的調整才可能發生。花精就像是一盞盞的明燈，在心靈的深谷、頂峰，每一個角落、轉折處，逐一亮起點點光輝，也許初期因為慾望與習慣牽擾，我們心靈的能見度真的有限，但經過一段時間的調理之後，我們會開始有一種內外透亮的輕盈感受，那是煩惱盡掃的清透感，心胸擴展的豁達感，我們將獲得源源不絕的生命智慧，由內而外體透人生的真正意涵！


    ## 做一個專業的花療師


    一個花精的治療過程，是結合花精在身心靈各方面精準且靈活的作用特性，花精治療師嫺熟專業的花精運用技巧，個案對自身情況的自覺與療癒意願，以及個案對花精治療師、花精本身的真誠信任，而形成的動態合作關係。


    ### 生命是需要被祝福與同理的


    人是何等精緻的生命體，我們擁有純美良善的靈魂、縝密的心理情緒運作模式，及巧妙細緻的生理結構，每一個部分都是環環相扣的精巧組合，甚至包含「疾病」本身，也是身心靈交互作用下的「傑作」，任何療法都不應該忽略這簡單而美麗的事實。因此當一位憂鬱症患者進入花精診療室，呈現在花精治療師眼前的，是一個活生生有自主創造力的生命，而不只是一個被診斷出患有「憂鬱症」的病人。


    治療師太過倚賴診斷結果，會變得疏於思考，缺乏情感與同理心，只想到「對症下藥」，診斷出個案患有憂鬱症，就直接給予治療憂鬱症的花精，卻疏於察明病因，無形中勢必影響花精發揮的效果。每一個生命都是需要被祝福的，花精治療師面對的每一個個案，都是獨特有創意的生命個體。體認到這一點，他必定會發自內心的關懷、同理，審慎而大膽的透過個案的整體身心靈情況、會談過程表達出來的話語，或肢體、表情等隱約透露的訊息，與花精治療師的互動與信任程度等資訊，先擇取花精撫平其淺層顯而易見的負向情緒，使之穩定有安全感，同時讓花精來啟迪個案對失衡情緒的自覺程度，在個案自明自覺且信任的自主意願配合下，治療師與個案攜手合作，逐步透過花精，一層一層深入主症狀的治療療程。


    要做到這一點最重要的關鍵是，花精的訊息必須具備高度的精準性，每一種花精都能夠準確調動特定情緒波頻，達到確確實實的療癒與平衡效果。花精治療師不僅瞭解每一種花精調動的情緒不同，進入的心靈層面深淺度有差異，而且人體的能量場也各各相異，花精與之訊息共振，可能會反應出不同的效果。利用「身體磁場測試法」，訊息精準的花精能夠與個案現前的情緒共振，協助找出個案現階段最適合，也是個案目前心理可接受，需要整理與治療的範圍。由此便於花精治療師掌握個案潛藏的情緒，在每一個療程中準確調動該階段欲治療的主、副症狀，並且達到一定程度的療癒效果。


    ### 靈活敏銳的直覺力


    看似簡單的花精諮詢步驟，卻是對花精治療師的經驗與靈活度的考驗。


    首先花精治療師必須具備豐厚扎實的心靈能量、助人的心念、寬廣的心量、敏銳的人際反應，以及高度的直覺力。願意接納個案所呈現的多重面貌，包括個案基於某些因素而沉默不語，甚至對花精療法或花精治療師本人有不信任、敵意或其他複雜情結。遇到這樣的情況，有經驗的花精治療師如何為個案擇取適當的花精，先緩和個案的過度敵意或防衛心，提升其自信，或者接納個案當前的心情，藉花精的能量直接共振其情緒層面，輾轉安撫個案的不安，使之對花精療法與花精治療師產生真正的信任感。諸如此類技巧的拿捏，取決於專業經驗與判斷力，以及對花精的靈活運用巧智。


    ### 瞭解花精正、負面特質與個性對應


    花精治療師還必須體透花精正、負面特質，以及從花朵的外型、特徵、生長特性等，深入瞭解花精的「個性」。運用敏銳的直覺聯結力，在眾多花精之中，找出幾種可能與個案的個性或正、負面特性對應者。例如，桂花所呼應的負面情緒特質有，軟弱、逃避，沒有目標，提不起勁，缺乏原則、主見，不堅強等；正面特質則能讓人堅定、勇敢、有原則、心口合一，也讓過度緊張的人變得自在開放，懂得隨遇而安。花精治療師可以從兩方面來運用桂花花精：以花精來調整個案以上的負面情緒特質，或者善用正面特質來提升個案的原則性與堅定性。


    少見的盤花，生長在飛瀑潮濕的水岸邊，紅色帶水的花盤，乍看似乎有些血紅黏稠，但卻開出朵朵清新的小白花。花盤像似人腦的結構，當各種扭曲、複雜的念頭，形成負面的能量場時，整個人像陷入既晦澀又黏密的頻率中。這樣的花朵特質，會讓我們聯想到一些周遭親友的個性。


    現代社會競爭激烈，在各種利益競逐的場合，為了贏得注目，不免產生機巧、設防之心。過度的心機，讓思想膠著、紛亂、扭曲，它們強迫性的運轉，使人不知不覺間，對周遭的人事物羅織出各種複雜的感受，卻又加以合理化。有時候事情並不如我們想像的複雜或負面，但是內心矛盾的情感，早已讓理智團團轉，攪亂了一池清明。


    這樣的人若陷入三角戀情中，就會不斷猜想此時不在身邊的情人，正和另一個人親密約會，而找出各種蛛絲馬跡證明事實就是如此，混亂隱晦的想法，牽引出激烈、偏頗而負面的情感互動。若面對人際關係，則會預設立場，不自覺地對他人的言語或行為，加諸多餘的想像，進而合理化自以為是的事實。盤花能量如同精雕細琢的紅寶石，散發光芒，既純淨又安定，花精能夠進入腦海徹底洗滌思想，調整心靈結構，讓人不再陷落迷思中，找回純潔如白花的赤子之心，清明的看世界。


    除此之外，還需要注意的是，台灣花精具有多面的作用層次，因人而異的豐富多變特質，花精治療師必須經由不同個案使用花精的反應與作用中，不斷地累積對花精精湛深刻的認識，與其靈活精準特質的暸解。如此才能在面對個案時，針對各個殊異的心靈情緒面貌，以最恰當的花精真正幫助到個案。


    ### 激發個案的自我覺察與信任感


    個案對自身情況的自覺性，也是花精治療中不可或缺的一環，因為在個案全然信任與意願配合的狀態下，花精頻率與人連結得最緊密，其訊息就能夠進入深層的身心意識次元充分作用，激發個人自覺與自癒的能量，達到徹底平衡的效果。在啟迪人的自我覺察力這方面，花精恰恰能夠發揮最大的助力。


    花精治療師並不是「社交高手」，不需要滔滔不絕提供建議，或刻意突顯自己的專業、花精的優點，吸引個案的關注。花精治療師必須虛懷若谷，懂得設身處地、認真傾聽，及時提供個案身心最需要的幫助，輔導其度過療癒期間的情緒起伏，並且尊重個案的意願、個案與花精之間共振的深廣度，循序漸進提升其意識的自覺程度。善用花精的特質，讓花精激發其生命智慧，把「釣竿」交到個案手中，讓他擁有面對自我、勇於改變、獨立自主的能力。


    ### 活用花精測試法，瞭解個案


    以台灣花精的諮詢為例，個案真實的需求包含以下各項資訊的綜合彙整：


    - 情緒檢測表（勾選情形、其他描述，填寫時是否詳實或完全坦承，自我認知）

    - 花精治療師與個案會談過程中所得到的資訊（話語、肢體、身心狀態診斷、彼此互動關係）

    - 花精測試時，個案身心各方面的反應


    花精治療師從前兩項彙整出初步的判斷，可以透過身體磁場測試法或訊息能量檢測法（穴檢儀），做進一步的確認。花精測試的階段，治療師就能夠從儀器檢測結果，或個案的身體反應、感受的描述，獲取進一步的診斷資訊。而許多人經過測試階段之後，對自己潛藏的情緒也有較為清晰的認知，能夠和花精治療師更深入懇談，釐清自己的問題癥結。


    假設一位個案初次接受花精諮詢，花精治療師透過情緒檢測表或諮商過程，甚至是個案過去的就醫病史，確定他患有憂鬱症，是不是立刻取出對治憂鬱症的幾種花精讓個案測試選用呢？當然測試的結果，個案必定與這一類的花精相應。然而在個案對花精、花精治療師之間的信任關係尚未穩固，身心各方面也尚未做好準備的情況下，就調動其深層的負面情緒，個案可能會因為對花精的好轉反應認識不清，而過度擔憂。


    花精治療師應該能夠體察個案的症狀細節，透過花精找出他現下最需要調整的表層症狀，先使之情緒穩定，同時也建立個案對花精與花精治療師的信心。例如針對有強烈焦慮感的憂鬱症患者，應先用角桐草花精緩解安定之；針對驚慌失措、坐立不安的憂鬱症患者，先以玉山水苦蕒或黃大里花撫平恐慌、受驚嚇，或負面能量的干擾；另外咸豐草花精先使個案自在有自信，能夠不畏縮，勇於表達自己的感受；野薑花花精能夠紓解個案內外在的壓力；狗尾草花精讓個案過度的自我意識放鬆下來；絲瓜花花精解開個案封閉害怕人群的壓力；高山薔薇針對過度自我防衛、不信任等情形⋯⋯。


    ## 身心靈整體的平衡，而非只是對症下藥


    當個案的情緒隨著花精療程進展而逐漸穩定，對自己有一定程度的自覺之後，他對花精的精準療效會產生信心，與花精治療師之間也建立了鞏固的信任感，這時花精治療師可以與個案討論，進入憂鬱症主症狀的療程。過程中花精治療師的輔導也是不可或缺的支持力量。


    針對憂鬱症主症狀的不同心識狀況的治療，以下簡單列舉幾種台灣花精，供各位參考：


