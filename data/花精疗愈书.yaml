    # 花精引領我們進入深廣無涯的心靈之海


    自從台灣花精正式對外應用以來，有憂鬱症患者在短短三個月的療程之後，累積數年的憂鬱症狀大幅減緩，而前後判若兩人；有恐慌的精神官能症者，從情緒的深淵提升到靈性開闊的層面，不但心身恐慌症狀消失無蹤，面對生活中的重大災難時，理性沉穩的態度連病人自己都嘖嘖稱奇；更有許多人因為花精整理好其內在的情緒壓力等病源，連帶困擾已久的心身症狀，如五十肩、失眠、疲勞、肥胖也獲得改善。


    為了讓花精能深刻而徹底的調整人的身心，我不斷研究、探索如何在擷取花朵能量時，完整取得花朵精神的訊息——這其中包括花朵本身的療癒能量、花朵與大自然彼此互應共存的關係，以及每一株花朵和其精神的本源「宇宙花能量場」的連結。


    如何確保在花精的製成過程中，自始至終保持訊息能量整全而不受損害呢？這涉及擷取花朵訊息時，對花朵、大自然、宇宙的尊重與瞭解，載體「水」及保存作用的「酒」的徹底淨化技術，以及訊息調製技術等。詳細的製作祕訣，我將在本書中逐一公開。


    取得訊息結構完整的花朵能量，確保其能量波頻精準共振人心，是我在研製花精時堅持的原則，也是台灣花精不僅能有效調理情緒，直抵心靈核心，而且能使意識超越昇華，擴及大自然，甚至宇宙同體的祕訣所在。如同我一向堅持的：花精不只是平衡情緒的心藥，更是引領我們往內進入深廣無涯的心靈之海，往外連結無邊宇宙意識，瞭解生命真諦的珍貴至寶！'
