  md: '# 單方與複方花精


    所擷取的花精有來自海拔幾千公尺高山的花朵，也有的是低海拔的平地花朵。高山花精與平地花精有什麼不同呢？打個比方，住在高山上的人思想單純、情緒直接，與住在平地或都市的人完全不同，同理，高山花朵與平地花朵也是如此。


    # 高山花精還是平地花精比較好呢？


    有些人以為高山的花精比較純淨，事實上從台灣花精的擷取過程就可以知道，無論高山或平地的花精，絕不可能有污染的疑慮，因為她只需要以特選的菁英花朵為天線，擷取其精神訊息，免去了大量採擷、萃取物質成分的程序。無論高山或平地花精，每一種都有不同的特質，對於現代人的情緒互應，只有適合與不適合的問題，並沒有品質好壞之分。


    我們發現平地接近人群的花朵，對應的情緒頻率跟大眾比較接近，所相應的情緒更為多元，實際應用時，平地的花比高山花使用更為廣泛，平地的花精似乎更瞭解人在複雜生活下的心靈困境。若是為了提升靈性層面的狀況，則選擇高山花精的可能性比較高。高山花自在、純淨、自信；平地花則表現自愛、自信與滿足感，她們具有高度適應周遭環境的能量。


    例如我把生長在海拔九百公尺高的山谷裡的「高山絲瓜花」製成花精，也因為需求不同，另外製作了「平地絲瓜花」花精。兩者的品種相近，花朵形狀與顏色也很相似，都跟人非常親近，但是因為地理環境與周遭訊息的差異，讓花精的作用有了差距。


