    +   ○ 心靈意識


    花精會提升自我的靈性品質，讓我們有勇氣認清「真實的自己」。瞭解生命存在的內涵。而能超越物質層面的需求，積極活出自己的生命價值。當心靈意識昇華，也促使靈性覺醒。


