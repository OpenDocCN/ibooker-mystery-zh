    ## 呈現花朵完整鮮活的訊息


    綜合以上這些象徵性的意象，可以完整解析出花朵的精神特質與情緒作用。當然，也可以透過清晰的直覺力，直接將花朵的精神特質、平衡對治的負面情緒用口述方式直譯出來，或者直接解讀花朵的訊息，但是這缺乏一種發現的樂趣，也缺乏更多問題的延伸探討性。


    所以，通常我喜歡秋敏用她獨到的功力，讓腦中自然呈現「象徵」式的意象，這會比狹隘文字的敘述，來得豐富且寬廣。當花朵的象徵精神奧祕解開之後，再運用我對植物直覺的觀察、認知力，總和分析解出花語。我曾經把已經解出的花精，拿給體質敏感但情緒多重的人測試，發現解出的情緒作用條理不清，顯然解析花語的人除了具備對訊息敏銳的感知能力之外，更重要的是心靈意識的清明、單純，以及超越個人侷限的寬廣度。不過藉此我也可以瞭解到，花精對不同特質的人會產生靈活的作用。


    當花能量訊息被完整擷取製作為母精後，進入花語解析。母精經過一連串完整的訊息解析確定後，方可再進行下一個步驟，在一定水、酒倍數稀釋與震盪下，與花精達到最完整的結構組合，再將花精裝瓶成滴劑，測試訊息能量和原來母精的訊息是否完全符合，在完整沒有雜訊能量的干擾下，一瓶最精準共振人體電磁場的花精才製作完成。有關於花精的製作細節，我會在本書中另行介紹。


    ## 體驗花朵鮮活的能量


    自走進大自然中，體驗花朵與大自然間的相知與共融，是很令人感動的一件事。花朵植物如此自在地融入生長的環境當中，無論刮風、下雨、烈日當空或者天寒地凍，她們依然長保安然入定之姿，不受絲毫的干擾，全然沒有挫折、煩惱等負面情緒的波濤。


    雖然隨著台灣花精問世，花精製劑使花朵能量便於保存，且方便取用，療效持續性又高，因而取代了鮮花療法。但我仍然不定期在各式場合中，讓參與者體會鮮花的能量，透過活生生的花朵，讓大夥兒親身感受到花與大自然間深連的關係。


    我喜歡帶領學生走訪山林之中，進行鮮花療法的體驗。也許是師生之間相互為伴，大家的興致高昂，我們從不在乎天候是晴是雨，即使在寒流雨中出遊，也從未聽過有人抱怨雨天的濕冷或不便，反而我們更真切的從大自然裡學習到寶貴的經驗。


    雨天的花朵，乍看之下因為被雨水淋透，而顯得殘破不堪，仔細觀察，你會發現有無數的花苞持續生長著，每一刻都有新的花朵在風中雨中怡然盛開。想想她們在連綿的雨季，依舊頂天立地，昂首接收天地的滋潤，不需要像人一樣費心撐傘，心情也完全不受天時氣候的影響，總是保持著一貫的安定、平和，如老僧入定，明知花瓣免不了因為雨水淋透而提早凋萎，卻依然活潑地陸續開展花苞，承接天地之氣，誠摯地頌讚大自然的洗禮，那渾然天成的圓融姿態，讓人自嘆弗如。


    ![戶外鮮花療法體驗金蓮花的訊息](img/832bd80b1c9ef2dd0374ae143cb3e3e9_62_0.png)


    這就是我們需要與自然共處、向花朵植物學習之處！透過鮮花療法，我們可以和花朵有親密的互動，深刻體會花朵和大自然、和宇宙間的互應關係，藉以回歸到人最天然的健康本質，也打開更寬廣的視野，以更正向積極的態度來面對生命！


