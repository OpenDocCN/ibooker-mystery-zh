  md: '# 會呼吸,就會跳舞


    秋敏老師獨創的花舞,是希望每個人接受自己真的會跳舞,簡單的舉手投足,都是身體的語彙,不必經過大腦,反應真實的內在。說到跳舞,很多人會說:「喔!我不行耶!我的肢體僵硬,節奏感又差。」馬上生起退卻的心。事實上,花舞對自我意識的提升快速,我很鼓勵大家接觸花舞,由不同的角度探索生命的課題,只要我們會呼吸,自然展現身體的律動,這就是跳舞,並不需要任何技巧,讓身體自自然然的說話。


    大家自願、自然與自由的表現肢體,不是強迫、激烈、侵入性表相的肢體。我們經由花能量的幫助,緩慢沉穩地呼吸,直抵心靈深處,瞭解自己,認識自己。花精的能量讓心形成一個保護場,使人變得勇敢、睿智而清明,此時隨著心識的轉動,身體能量會自然重整,肢體顯化其內心的轉變,裡外能量會同時蛻變。一點點步伐邁開,一些些手勢變化,都是心靈內化出來的身體動能。沒有美醜表徵的評斷,沒有僵化的固定肢體模式,沒有擾人的節拍,只是利用自己天生的本能,自然呼吸,將心靈訊息外展,傳呼到身體細胞。讓肢體活起來,逃脫大腦的設限,源源不斷的透過肢體展現生命的訊息。


    我們由小小簡單的肢體,找到心靈失衡的問題,修護深層的創傷,呼吸因此變深遠自由而無束縛,所以只要我們存在而呼吸,就會跳舞,就會花舞。


