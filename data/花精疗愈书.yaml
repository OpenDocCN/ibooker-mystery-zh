- md: '# 解開花朵訊息的奧祕


    花療法或花精是汲取自花朵植物的生命智慧訊息，做為療癒人類失衡心靈的藥引。植物跟人一樣，是具有高等靈性的智慧精華，她們甚至更懂得生存於天地的自然法則，經過幾年擷取花精的研究工作，我跟植物花朵互動學習取經，雖然並不像植物學家研析植物那樣透徹，將物種清楚的歸納，但我用一種感性的心，由心相印而相知，共振出愛。愛讓很多的不可能化為可能，超越生命的界限，也就是愛讓不同能量構造的生物，彼此看見生命的美麗。每一朵花都是愛的化身，我們由花看見愛的多樣面貌。


    ## 花朵顏色散發不同的心靈特質


    花吸收日月精華及宇宙光能，具有無私的愛，是天地間最穩定的力量。每一朵花都有它特定的頻率，這些光波頻率正是療癒負面情緒，以及提升心靈意識與心智的高層次能量。不僅如此，我們還可以從花朵的顏色、外型、花朵植物生長的環境、習性等綜合分析出花的特質，與花朵能量所治療的情緒。


    花朵多采多姿，不同顏色的花朵吸收各自相異的光譜，因此訊息能量對人的心靈深淺作用也不同。


    我發現白色的花訊息清淨，是光明靈性的導引者，如白蓮花；紫色花能作用在深層的意識情緒，如薰衣草；黃色的花通常給予人充足的自信光芒，讓人開朗表達自我，如蛇莓；紅色的花驚豔動人，讓人散發魅力與熱情，如大扶桑花；藍色花朵是跟現實人際有關，如：台灣藍龍膽⋯⋯。


    ![蛇莓、台灣藍龍膽、薰衣草、大扶桑花](img/832bd80b1c9ef2dd0374ae143cb3e3e9_51_0.png)


    每一朵花都是愛的化身，我們由花看見愛的多樣面貌

    (右上) 蛇莓

    (右下) 台灣藍龍膽

    (左上) 薰衣草

    (左下) 大扶桑花


    我大致歸納出花朵的顏色與作用，供各位參考。但任何的歸納都有例外，即使同為紅色的花朵，散發的光譜未必一樣是紅光，還是要全觀花訊息光譜與植物承接的管道，作總分析才可以正確判讀。


    以玫瑰為例。玫瑰花是很「規矩」的花，觀察花的構造，會發現她的花瓣外型非常整齊，一瓣一瓣層層往外展開，花能量所展現的特質就有循規蹈矩的傾向。玫瑰的莖帶刺，這是植物的自我保護機制，就好比人為了保護自己，化解內心的挫折與壓力，而在潛意識形成的「自我防衛機轉」，當它發揮正當作用時，可以保護自我免於過度的刺激與壓力，然而當人內在的情緒創傷，未獲得適當的紓解與整理時，很容易會演變成過度自我防衛，而在人際關係上顯得渾身帶「刺」，其實是想隱藏住內心的脆弱，保護自己，而刻意顯露高貴的氣質。


    ![紅玫瑰與粉紅玫瑰](img/832bd80b1c9ef2dd0374ae143cb3e3e9_52_0.png)


    紅玫瑰花的能量，可以化解這類高度防衛的心理狀態。傳統中紅玫瑰代表的是愛情的象徵，也許是受到集體意識的影響，我們解析花語的訊息時，的確發現她能夠療癒愛情的創傷，提升人的熱情與愛，化解人的冷漠與心結。


    然而玫瑰的顏色甚多，比較紅玫瑰和粉紅玫瑰的訊息能量，雖然同為玫瑰花，兩者都具有溫暖與熱情的特質，但是因為顏色不同，花朵所吸收的光譜與波頻便有差異，因而花朵能量的作用便大相逕庭。


    粉紅玫瑰具有原始的古老力量，可以穿越不同的時空；尊貴、剛正、開闊、堅定，聚集能量；能掃除黑暗，帶來希望；能穿越次元，追溯到潛意識的情緒。比起紅玫瑰，粉紅玫瑰的能量可以進入心靈更深的層面，撫平人潛意識的憂傷。紅玫瑰像太陽般熱情綻放，粉紅玫瑰像月光柔和而慈愛，由於她和紅玫瑰花的能量特質是如此不同，在臨床應用上就產生很不一樣的結果！


    屬於同一種花，卻因為顏色相異，而形成截然不同的療癒作用，還有許許多多的例子。藍色牽牛花、紅色牽牛花以及紫色牽牛花就是最好的明證。藍色牽牛花善於紓解日常累積的壓力，特別適合長期犧牲個人享受，為事業打拚的抑鬱男性使用；紅色牽牛花則適合因情感創傷而虛乏無力，卻習於以浮誇美豔的外表來佯裝堅強的女性，她能撫平悲傷，使人安逸自在；而我們常見的紫色牽牛花，作用卻較為深層，能夠調和潛意識的負面訊息，使人平穩安詳。


