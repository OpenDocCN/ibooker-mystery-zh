    的儀式，父母會撿一顆石頭放入澡盆裡，給嬰兒洗澡壯壯膽，讓他不易受環境聲音的驚嚇。這是利用石頭的重量特質，將其重力訊息釋放入水中，嬰兒接收石頭散發的共振波，便會激發心靈穩定的能量（「心頭定」，台語），不受外界影響。這樣一來，嬰兒就好照顧，而且能健康快樂的長大，有顆像石頭般的膽識。

    由這些熟悉的生活經驗，我們可以知道，利用自然能量的訊息共振療法，其實早就存在我們的生活中，只是隨著社會的進步，這些生活的小方法、大智慧，漸漸被現代人遺忘了。花精自然療法就是運用花朵愛的訊息，來共振失衡的身心靈，使人覺醒，調整自我，達到真正的健康與平衡。


    # 駱駝駱駝不要哭


    「駱駝駱駝不要哭」（The story of the weeping camel）是一部運用愛、音波共振的訊息療法，讓生命湧現奇蹟的感人記錄片。

    在蒙古南方的沙漠戈壁中，蒙古包裡住著三代同堂的遊牧民族。某年春天，有隻母駱駝正待產準備生下小駱駝，可是主人發現母駱駝有難產的現象，經過兩天漫長的等待，母駱駝艱辛地捱過生產的陣痛，終於在主人的合力幫忙下，生下一隻很可愛的白色小駱駝。

    小駱駝一生下不久就能站立，當主人牽著小駱駝靠近駱駝媽媽，想要給他吸奶時，母駱駝卻躲著小駱駝，在原地打轉，怎麼也不願意讓小駱駝靠近她吸奶，主人發現母駱駝因為難產而出現情緒反應，拒絕餵養小駱駝'
  - '[PAGE 29]


    時，只好先讓母駱駝獨自離開。此後幾天，小駱駝不停地發出「嗚～嗚～」的低嚎哭泣聲，遠遠望著媽媽，緊跟著在後，但就是無法靠近媽媽。


    主人心疼小駱駝挨餓，用盡方法試圖讓小駱駝靠近媽媽吸奶，就是沒辦法成功。在沙漠風暴來襲時，母駱駝還是不願讓小駱駝靠近，牠孤苦伶仃跪在沙塵的另一端，發出叫媽媽的「嗚～嗚～」低嚎聲，遙望著媽媽，等待風暴停止。


    最後主人商議用一種傳統方法，幫助駱駝媽媽治療生產時的恐懼，及產後的憂鬱症。他們決定到城裡，找尋一位教授馬頭琴的音樂家，利用他成熟動人的精準琴藝，再結合女主人唱出「母愛」天性的訊息，來撫慰受創傷的母駱駝，平息牠內心的恐懼與憂鬱，使她願意哺餵自己的小孩。


    # 讓愛展現生命的奇蹟


    這是一種讓愛展現生命奇蹟的訊息療法。女主人有個一歲多的小女兒，每當小女兒要睡覺時，女主人媽媽都會擁抱著她輕吟著搖籃曲，曲調訊息透著濃濃的母愛，小女兒就在這股慈愛的訊息中甜蜜的睡著。女主人代表天性母愛的能量，是宇宙天地萬物生生不息的自然本源，一種清靜大愛的展現、無私與奉獻。


    療法一開始，琴師拿著馬頭琴（一種類似胡琴的弦樂器），在琴頭緊上傳統祭天祈福的藍巾，再將馬頭琴掛在母駱駝的駝峰上，當母駱駝發出「嗚～嗚～」的哭泣聲時，琴弦會發出陣陣共振的音波，收錄傳導入音箱中，在沙'
