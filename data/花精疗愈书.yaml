    ## 個案分享


    身體不適加上工作量的增加又無人可以幫忙的情況下，不滿、抱怨、無奈又生氣的情緒緩緩上升，身邊的同事依然談笑風生，準時吃飯，準時下班，自己一個人孤軍奮戰，無人可以瞭解支持，覺得有一種即將爆發的情緒正醞釀著。此刻與我相應的梅花出現了，祈明老師說梅花可以讓我更堅強，的確，現在我需要的並不是有人來分擔我的工作，而是一份支撐的力量，一份瞭解與支持的鼓勵。


    服用花精的第一個夜晚，身體及心理經歷巨大的痛苦，心輪緊緊的被勾住，一種壓迫窒息的錐心之痛，喉輪緊縮卡住，突然出現這樣的情緒反應，讓我一時難以承受。服用花精這麼長的時間（一年多），第一次經歷這麼痛苦而且強烈的感受，就把原本握在手心的花精放開，不敢再握著花精睡覺。只能靜靜地躺著，安住在這熟悉的心痛感，直到入睡。


    隔天只要一用花精，熟悉的心痛及緊縮的情緒又再度出現，而且持續很久，甚至出現心悸、呼吸困難的症狀，虛弱到無法做家事，只能躺在床上休息。已經很久沒有經歷這樣的痛苦，如此熟悉的情緒夾雜著憤怒、無奈、絕望、無力，想要掙脫卻無能為力。彷彿又回到那幾年痛苦的婚姻之中，寒徹心底、幾盡絕望又心死的無奈，說不出口，也無人可以訴說及分擔。


    老師提到，梅花對應曾經遭遇重大的創傷而導致的「心寒」，就是這種死了很多次心，心灰意冷到極點的感受。最近我一直認為身心狀況不錯，沒有想到工作上的沉重壓力，又落入無人幫忙、缺乏支持、滿腹抱怨不滿，卻又無法說出口的無奈，這勾出了舊有的傷痛，表示這些情緒並沒有完全過去，只是被壓抑潛藏在心中某個深處的角落。


