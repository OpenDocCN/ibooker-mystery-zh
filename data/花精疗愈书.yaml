  md: '五行「金、木、水、火、土」一樣，宇宙中也同樣有五行能量場與之相應，因此五行在地球上才有運行的能量。舉例來說，木是青色，治療肝臟，在地球上屬東方，而往東方的角度若沒有青色的結構，地球上是相應不到這個磁場的，青色也就無法產生治療肝的共振能量了。宇宙法則都是以共振相應的方式運作的。簡單來說，我是運用宇宙裡水的源頭的結構，讓它和水中的分子共振，以淨化其中的訊息。


