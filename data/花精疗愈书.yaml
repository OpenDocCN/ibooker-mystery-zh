    ## 同一瓶花精，可能形成兩極的反應


    大多數人對花都有既定的喜好，有時測得自己不那麼喜歡的花時，心裡忍不住會有排斥感。譬如我曾經遇到一個個案測得了「霍香薊」花精，當他發現那就是路旁常見的「不起眼」小紫花時，忍不住撇撇嘴說：「我不喜歡這花耶，可不可以換呢？」也有人抱持著刻板印象，認為玫瑰花嬌貴、菊花俗鄙、蓮花脫俗、芙桑妖豔。事實上無論花朵看起來「大」或「小」、「起不起眼」，在自然界裡都展現獨一無二、難得珍貴的能量特質。霍香薊雖然常見，但她貼近人心的天性，使得花精充滿了柔軟、溫暖的特質，不知讓多少人克服了害怕不被認同、不知如何表達情感的困擾，讓他們變得柔軟有彈性，豁達熱情，靈敏自信！


