    ## 三、黃花海棠


    塑造性格 引人注意

    建立定位 表達身分


    在這五盆鮮花中，黃花海棠很耀眼，花朵會集結展現吸引人的目光，我們很容易被團團盛放的花朵吸引而靠近。但想要仔細欣賞鮮明亮麗的海棠花，卻會發現很難看清花朵的真貌，令人眼花。原來她並非只是一朵朵花集結綻放，而是一串串的花瓣相連，大小不一，花瓣組合的數量也不同，遠看像是一朵大花，層層疊疊的小花，有著不同的展現空間，卻目標一致對外齊放。這花朵多元豐富的外型，再加上亮眼的鮮黃色，會讓選這種花的人眼花撩亂，畫花時無法明確表現花朵形狀，越是努力畫，越是畫不清，最後塗成一團黃澄澄的花。


    黃花海棠的能量訊息，可以療癒自我認識不清、過度犧牲奉獻的人，讓我們在清楚的身分定位中，像一朵亮眼的黃色花，給人光輝無私的愛。與這花相應的人，在個性上隨和，喜歡付出，給周圍的人豐沛的愛。好比大大小小豐滿盛開的花，比枝葉還要茂盛，即使花瓣從末梢凋萎，仍然會努力留在花朵上直到完全乾枯，展現生命最後的力量。


    單看黃花海棠的花朵，不易辨識每朵花的獨立輪廓，好似人無法表達內心真正的想法，容易迷失自己，而失去角色的定位。就像人過度犧牲自己，耗盡所有的精力仍願意付出，而忘記自己也需要被愛。具有黃花海棠特質的人，心地是善良而慈愛的。海棠隨和的花樣，也象徵一個人的個性沒主見，常拿不定主意。花朵訊息可以調整這類型的人，讓人瞭解自己的光明正面特質，勇於像花一樣表達自己的意見、個性，重塑自我身分的價值與定位。反之，有時候我們會過度開放，而失去了原有的表現分寸，這也可能呼應到海棠的負面特質，花朵能量會讓我們知道如何調整自我，擁有合宜融洽的言行表現。


    在參與的二十五人中只有三個人選擇這花，是因為大部分的人都瞭解，愛是有條件分寸的，而且清楚自己的承擔能力。選擇海棠的三個學員，是在所有人全選好坐定位後，才在猶豫之下最後落座的。有一位同學站在黃花海棠旁遲疑、拿不定主意，最後受到別人的催促，才匆匆決定，這正符合海棠花沒主見而隨和的個性，而她是所有人中表現最大方、開朗，會開懷大笑的人；另一位是有著燦爛笑容、給人很多溫馨慈愛、最具有媽媽特質的人。所有人都定位後，最後一個學員才選定海棠，她長期以來總是過度的付出，一直在找尋自我身分的認同感，懼怕對別人表現自己的個性。


