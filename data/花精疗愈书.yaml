    # 1 花精傳遞愛的訊息


    沒有人不喜歡花，看到一束盛放的花，我們會心生喜悅；走進大自然中，靜下心來欣賞花朵，整個人會感覺神清氣爽，陰霾一掃而空，這就是花朵所具有的神奇療癒訊息。花朵是植物愛的結晶，永遠以最美麗亮眼的姿態展現，我們發現，花朵中蘊藏著穩定充沛的「愛能量」，而不同樣貌、顏色的花所帶有的訊息也就不同，能夠治療各種的情緒或生理問題，於是我們把花朵這份愛的療癒訊息，透過獨特的技術，保存在純淨的水中，製作成花精口服滴劑，幫助人們面對內心情緒，得到身心靈整合的力量。


    花精療法是取於自然花草的一種訊息療法。在介紹什麼是花精及花精療法之前，首先要從「訊息」這基本的觀念開始談起。


    # 來自宇宙的百花訊息


    國麻省理工學院物理系教授，弗蘭克·威爾澤克（Frank Wilczek）說：「我們都是光的孩子。」任何的物質，包含人體在內，分析到一定的微細程度，進入原子核的組成成分，是看不見、無質量、以訊息能量形式存在的粒子。簡單來說，萬事萬物，都是由光（訊息能量）所組成，人體就是—個小宇宙的訊息場，與外在大宇宙呼應相連。


    # 我們都是光的孩子


    由於對宇宙的基本構成成分「夸克」（Quark）能量粒子的豐富研究發現，威爾澤克獲得了2004年諾貝爾物理獎的殊榮。他說，愛因斯坦當初發表其文章時，質能互換的公式是以M=E/C²出現的（M：質量；E：能量；C：光波速度）。它代表了用純粹的能量來解釋質量生成的可能性，也就是說地球萬物的存在是源於能量。而宇宙不僅是由各式各樣的物質構成（而物質的組成分子是能量），還有95%是人類相應不到的「暗物質」（dark
    mass）、「暗能量」（dark energy），所以整個宇宙根本就是由訊息能量所組構而成。


    宇宙空間中充滿了豐富奇炫的訊息能量，訊息會震動、傳導、散發，彼此相互應。不但人體電磁場內充滿了訊息能量，同樣的大自然界裡所有萬物也充滿訊息能量，各式各樣的訊息彼此互相共鳴。只要我們打開細緻的感官，就可以感受到自然萬物交響的訊息，是共融、和諧存在於天地宇宙間的。


    舉例來說，太陽就是—種能量，給我們光和熱；任何一塊未經污染，只有花草樹木自然生長的地方，都會讓人心生愉快，感覺寧靜祥和。這是大自然純淨磁場的力量，是一種自然訊息能量，我們每一個人都能感覺到它的無窮魅力。此外，陽光、大地、星空、動植物、礦物磁場、建築物、衛星基地台發射的電磁波等，也都散發各自的訊息波頻。


    # 訊息的作用：大腦怎麼吃檸檬？


    讓我們進一步觀察大腦訊息的傳遞方式。當我們想到「檸檬」時，腦中就能夠勾勒出檸檬的樣子，甚至它的淡淡香味和酸澀口感等，但是你不可能從腦袋裡拿出一個真實的檸檬，因為我們腦中這栩栩如生、會令人發酸、分泌口水等生理現象的「檸檬」，是以訊息的方式儲存在細胞的記憶中。


    當我們的心像感官被調動，大腦意識訊息會自然反應作用。如：請想像你正在吃一大片檸檬……，這時我不用形容它酸溜溜的味道，你的大腦就會自然反應，從雙頰分泌出口水。我們可以不經過吃，就產生生理反應，這就是調動「檸檬」（訊息）共振「腺體」（質量）分泌口水的作用。而口水能生津止渴，中和腸胃的酸鹼值，製造對身體正面的能量。


    人的情緒會直接影響內分泌系統，當你喜悅快樂時，分泌的口水是甜的，反之當你生氣時，口水就會變得黏稠乾澀。同樣的，望梅能夠止渴，看到某個情景會觸景傷情；看到花時，我們則會心生喜悅。這些現象顯示，記憶、思考、情感、念頭都是以訊息能量的形式存在大腦中，隨時在有意識、無意識間，與外在事物產生共振、共鳴，而引動複雜的情緒反應，這就是為何我們的念頭會不斷湧現，讓心境難以保持平靜的原因。


    當我們的心像感官被訊息調動(想到檸檬),大腦意識會自然反應,使細胞(質量)產生變化,唾液腺分泌,發生能量變化(生津、止渴),進而促發不同作用的能量(酸鹼中和,腸胃消化平衡)


    # 心念也可以形成巨大的能量


    如果有兩個人在房間吵架,我們進入這個房間,會感覺「氣氛」不對,這也是訊息,兩人的負面心念影響了整個空間的磁場。一個人發出的念頭雖然渺小,卻也很重要,人們心生的念頭,會集結形成集體意識,形成巨大的訊息能量場，在空間中凝聚成一股念力，影響大環境的變化，很多天災人禍發生，就是受這股力量的牽動而引發的。古人有一句諺語說：「善有善報，惡有惡報。」指的就是心念的善惡，會共振吸引同性質的事件發生。這也是訊息轉為實質事物所產生的效應。


    科學家曾經對植物作實驗，兩株植物分別接收來自於人的讚美及惡罵，結果大大影響了植物的生長。日本的江本勝（Masaru Emoto）教授，透過水的結晶來觀察人的意念對水的影響，同樣有驚人的發現！（註：請參考江本勝的著作《生命的答案，水知道》、《幸福的真義，水知道》）我們應該瞭解，人的任何起心動念都是活的訊息，會記錄在自己的細胞記憶體裡，每發出一個善念就能對許多生命體有助益；反之，嫉妒、憤怒、憎恨、不滿等，負向糾結的情緒訊息反饋，共振身體產生不平衡的波動，傷害最大的還是自己。


    因此對人、社會、國家、自然界動植物、環境、地球、太陽，甚至宇宙星體也一樣，我們都應該給予祝福，給予關愛。對任何的生命體而言，愛就是生命展現最大的力量！


    宇宙訊息能量是一門人類窮盡累劫心力，也探究不盡的珍貴資源。若念頭雜亂，再加上心地不正，我們就無法共振互應到好的訊息資源。人可以意識到過去、現在、未來的存在，能感知世界的寬廣無限，宇宙的神祕無盡。所有的訊息都是來自宇宙本源，它與地球上的質量接通而產生共振波頻。人經過不斷的醒覺修煉，也會提升、蛻變心靈的能量，而具有自然訊息的傳播及轉譯的能力。


    宇宙中存有無盡的訊息空間與不同次元的能量，能否擷取正量、正善訊息來療癒地球、大自然或人類，關鍵在於擷取者是否具有開闊平等、利他的心量，連結宇宙本源的天賦，其基礎原理是物理學所說的「共振與共鳴」，以佛家行者來說則是「相應」或「瑜伽」。我們的善念心量決定共振訊息層面的深遠，人與人、人與花、人與大自然間與各式各樣的訊息都是同理。


    # 奧妙的自然訊息療法


    訊息能量和我們的生活息息相關，接下來我想進入生活層面，以一些有趣的小故事，來說明花精訊息療法的作用原理。


    有一句俗諺說：「靠山吃山，靠海吃海。」我就是靠山長大的小孩。


    小時候我家住在大山上，只有小徑沒有道路，生活十分簡單，和大自然的訊息互動是相當密切的。我父母善於利用植物的特性為家人治病，也會用簡單的植物訊息去除不正之氣，山上小孩喜歡自由，到處亂跑，常是一山玩過一山，難免會招惹或沖煞到不正之氣，回家父母只要見到小孩出現反常行為，精神呆滯、上吐下瀉、食慾不振、發燒等等不尋常的行為現象，猜想小孩可能「沖煞」到不乾淨的訊息，就會到屋外採幾片艾草、芙蓉葉，再用香茅草將它們一起纏住放入澡盆裡，利用葉子浸泡過的淨化訊息水洗澡。這些植物皆屬陽性的能量特質，行竄身體經絡可驅邪除煞，果然都有效的解除我們的問題。


    在台灣坊間還流傳一些很有意思的訊息療法，可能你、我小時候都有過這類難忘的經驗。小孩子遊戲總是愛互相捉弄，有時趁著天色灰黑，躲在陰暗處嚇同伴，同伴常被嚇得魂飛魄散、臉色發白。媽媽見狀，沒一會兒便端著一碗水，氣呼呼地追著頑皮的小孩，要他把衣角拉出來放進碗中浸泡，然後順便告誡他下次可別再嚇人，害她的寶貝兒子驚魂失魄。


    而那碗泡過衣角的「衣角水」，媽媽會端回家給受到驚嚇的小孩先啜飲三口，再將手伸入碗中沾水，往孩子身體前、後各拍三下，表示媽媽已將小孩失落的魂魄，藉由這碗水的訊息收回，「沒驚」、「沒驚」。有些習俗甚至用對方的口水來取代「衣角水」，讓受驚的孩子喝下！


    如果是被野狗嚇到，那就得想辦法追到那隻野狗，拔幾撮毛，或抓住狗的尾巴，在碗裡拌一拌讓訊息進入水中，喝下後就可以找回失去的「魂魄」。但小心，野狗可是會咬人的！妻子秋敏就曾告訴我她喝過「狗毛水」，而且她還記憶猶新，那是隻白色的狗，狗毛飄浮在碗中的景像，令人作嘔，當場令她馬上回神。


    其實那碗安魂水的作用，並不是向人或狗要回受驚的魂魄，而是依據共振波動相抵消的作用原理，療癒、平息受到驚嚇而不安的情緒。「衣角水」、「口水」、「狗毛水」是利用水為載體，擷取使人受到驚嚇的訊息，喝下那碗使人驚嚇波動的訊息水，可以讓情緒場出現的驚嚇波動平息下來，當然就會回神囉！


    另外有些傳統習俗在嬰兒剛滿月時，會舉辦「壓驚」的儀式，父母會撿一顆石頭放入澡盆裡，給嬰兒洗澡壯壯膽，讓他不易受環境聲音的驚嚇。這是利用石頭的重量特質，將其重力訊息釋放入水中，嬰兒接收石頭散發的共振波，便會激發心靈穩定的能量（「心頭定」，台語），不受外界影響。這樣一來，嬰兒就好照顧，而且能健康快樂的長大，有顆像石頭般的膽識。


    由這些熟悉的生活經驗，我們可以知道，利用自然能量的訊息共振療法，其實早就存在我們的生活中，只是隨著社會的進步，這些生活的小方法、大智慧，漸漸被現代人遺忘了。花精自然療法就是運用花朵愛的訊息，來共振失衡的身心靈，使人覺醒，調整自我，達到真正的健康與平衡。


    # 駱駝駱駝不要哭


    「駱駝駱駝不要哭」（The story of the weeping camel）是一部運用愛、音波共振的訊息療法，讓生命湧現奇蹟的感人記錄片。


    在蒙古南方的沙漠戈壁中，蒙古包裡住著三代同堂的遊牧民族。某年春天，有隻母駱駝正待產準備生下小駱駝，可是主人發現母駱駝有難產的現象，經過兩天漫長的等待，母駱駝艱辛地捱過生產的陣痛，終於在主人的合力幫忙下，生下一隻很可愛的白色小駱駝。


    小駱駝一生下不久就能站立，當主人牽著小駱駝靠近駱駝媽媽，想要給他吸奶時，母駱駝卻躲著小駱駝，在原地打轉，怎麼也不願意讓小駱駝靠近她吸奶，主人發現母駱駝因為難產而出現情緒反應，拒絕餵養小駱駝時，只好先讓母駱駝獨自離開。此後幾天，小駱駝不停地發出「嗚～嗚～」的低嚎哭泣聲，遠遠望著媽媽，緊跟著在後，但就是無法靠近媽媽。


    主人心疼小駱駝挨餓，用盡方法試圖讓小駱駝靠近媽媽吸奶，就是沒辦法成功。在沙漠風暴來襲時，母駱駝還是不願讓小駱駝靠近，牠孤苦伶仃跪在沙塵的另一端，發出叫媽媽的「嗚～嗚～」低嚎聲，遙望著媽媽，等待風暴停止。


    最後主人商議用一種傳統方法，幫助駱駝媽媽治療生產時的恐懼，及產後的憂鬱症。他們決定到城裡，找尋一位教授馬頭琴的音樂家，利用他成熟動人的精準琴藝，再結合女主人唱出「母愛」天性的訊息，來撫慰受創傷的母駱駝，平息牠內心的恐懼與憂鬱，使她願意哺餵自己的小孩。


    # 讓愛展現生命的奇蹟


    這是一種讓愛展現生命奇蹟的訊息療法。女主人有個一歲多的小女兒，每當小女兒要睡覺時，女主人媽媽都會擁抱著她輕吟著搖籃曲，曲調訊息透著濃濃的母愛，小女兒就在這股慈愛的訊息中甜蜜的睡著。女主人代表天性母愛的能量，是宇宙天地萬物生生不息的自然本源，一種清靜大愛的展現、無私與奉獻。


    療法一開始，琴師拿著馬頭琴（一種類似胡琴的弦樂器），在琴頭緊上傳統祭天祈福的藍巾，再將馬頭琴掛在母駱駝的駝峰上，當母駱駝發出「嗚～嗚～」的哭泣聲時，琴弦會發出陣陣共振的音波，收錄傳導入音箱中，在沙漠風助力下，可以清楚聽見音箱共振出「嗡嗡」的迴音。此時女主人再輕撫著母駱駝，吟唱出搖籃曲，等到唱完，訊息收錄完成，琴師向前拿下掛在駝峰的琴，開始拉奏剛剛所擷錄的音波訊息。


    琴聲揚起的音調正是擷錄的音波訊息，振動傳導出的音波是一種充滿療癒的母愛的訊息，再加入女主人的吟唱與撫慰，現場的空氣充盈著愛的力量。母駱駝在陣陣的音波撫慰下熱淚盈眶，和一旁的小駱駝一起發出低吟的哭泣聲「嗚～嗚～」。沙漠的風吹落了駱駝媽媽飄出的眼淚，主人將小駱駝牽到媽媽的身邊，牠邊吸吮母奶邊流著淚。最後琴聲一停，駱駝媽媽終於願意接受小駱駝了，低下頭磨蹭著小駱駝的臉頰，一場撼動人心的自然訊息療法，結合音波共振，傳遞愛的能量，讓生命展現無比的奇蹟。


    # 琴師是關鍵的訊息導引之手


    這場訊息療法除了女主人純淨的愛能量外，琴師是最關鍵的訊息導引之手。之前女主人曾試圖吟唱撫慰過母駱駝，但並沒有成功，單靠女主人吟唱的功力，無法共振到母駱駝的心，所以得千里迢迢找到深具演奏功力的好琴師，因為他能夠精準地擷取、轉化、傳遞訊息——而這才是此次訊息療法精湛的成功之處。


    植物花朵中蘊藏著宇宙至高的大愛，女主人散發天性的母愛，是人類生生不息的本源，真摯的母愛像花一樣尊貴、一樣美。我們的心靈創傷也許無法像母駱駝幸運被量身醫治，但是慈悲的上天將豐富的愛給了花朵，透過訊息共振，讓花精醫治失去平衡的心靈，我們的身心靈因愛活躍而健康。「愛」就是花精療法所蘊藏的深度智慧與療癒奇蹟。


    棉花。真摯的母愛就像花一樣柔軟、豐富、尊貴


    # 花精是「愛」的穩定能量


