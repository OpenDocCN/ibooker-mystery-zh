  md: '要。多年的臨床經驗，我發現以下的情況，最容易阻礙使用者感受到花精的效果。


    +   一、重心完全放在生活，對心靈層面感到陌生，不瞭解自己的情緒變化，不習慣檢視自己的心情，或者無法勇敢且誠實的面對自己。

    二、無法接受精神世界的存在，忽視心靈的力量，或是主觀意識太強，太過理性。

    三、厭倦自己的情緒，對生活過於無奈、悲觀，而沒有意願改變。

    四、不瞭解花精，或者被動接受親友的要求而尋求花精的協助。

    五、不重視花精服用注意事項，沒有養成按時服用花精、注意或記錄心識微妙變化的習慣。

    六、癌症、末期病症的人或植物人等重症病患，由於全神貫注於治療嚴重的生理病症，也不容易感受到花精精微的療效。


    使用花精時，即便我們因為某些原因，而無法明顯感受到花精的效果，但花精平衡情緒的能量卻從未停止。她持續提高心靈的能見度，我們很快就能看見自己的全貌，看見人生的路。她撫慰重症病人身受病苦的恐懼、慌亂與絕望心情，提供靈性上的指引，讓他們更有勇氣面對生命或死亡。對於深受病痛折磨的病人，我建議還是可以把花精當成他們心靈的維他命，以提升其心靈的能量。'
