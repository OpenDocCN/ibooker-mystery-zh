    Thistle


    特性：緩和人的躁怒情緒壓力，先讓全身氣脈放鬆舒緩，接著進入肝臟系統，轉化淨除肝臟負面訊息。有助消化，提升肝、膽、脾之機能，促進肝細胞組織活化再生，維持正常排毒功能，恢復膽汁分泌功能。

