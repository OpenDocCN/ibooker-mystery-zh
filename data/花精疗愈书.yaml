    ## 傳遞花精的核心精神


    聽完秋敏的話，我也深受震撼和感動。一直以來我內在覺知的奧妙宇宙花能量場，彷彿懸浮在心靈某個層次、難以言喻的祕密，如今透過妻子口中詳實的敘述出來，像是獲得了應證與落實。對我倆從事花精研究而言，這是個很大的激勵與鼓舞，我們已意識到這是一條該走的路，秋敏「看見」過花能量場後，對花精訊息得到了啟蒙，也開始認真正視我的花精研究，而我們也更加堅定信心，要在花精領域繼續深入地鑽研，精益求精地研發花精。


