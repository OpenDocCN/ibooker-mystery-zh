  md: '沒有人不喜歡花，看到一束盛放的花，我們會心生喜悅；走進大自然中，靜下心來欣賞花朵，整個人會感覺神清氣爽，陰霾一掃而空，這就是花朵所具有的神奇療癒訊息。花朵是植物愛的結晶，永遠以最美麗亮眼的姿態展現，我們發現，花朵中蘊藏著穩定充沛的「愛能量」，而不同樣貌、顏色的花所帶有的訊息也就不同，能夠治療各種的情緒或生理問題，於是我們把花朵這份愛的療癒訊息，透過獨特的技術，保存在純淨的水中，製作成花精口服滴劑，幫助人們面對內心情緒，得到身心靈整合的力量。


    花精療法是取於自然花草的一種訊息療法。在介紹什麼是花精及花精療法之前，首先要從「訊息」這基本的觀念開始談起。'
