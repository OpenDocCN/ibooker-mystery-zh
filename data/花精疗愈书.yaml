  md: '婚後祈明老師開始研究我——一出門就像氣球洩了氣的身體，與不聽話的身心和靈魂。他將所有的心力花在照顧我，把他本能會的所有身心靈自然療癒招術全部用上，也帶著我走上靈修的道路，慢慢的，我的身心靈得到轉化，身體氣脈開始和諧的律動，我的心靈深處有了安定感，可以感受到呼吸的可愛，生命存在的快樂，當然祈明老師的愛，是不可或缺的重要療癒元素，我的生活開始有了當人的樂趣。


    對於祈明老師，我只能說他是個「天生」的天才，還好教育沒框住他的天賦，鎖死他對現實的臣服。在我們的傳統觀念中，水電師傅大概一輩子以修水電為生，醫生當然從醫救人到老，這其中的界線很難跨越。我們依賴教育所給的人生指標，而忘記生命存在其實可以無限的拓展。祈明老師一直都像個沒到過都市的山上小孩，很單純可愛，常常大家都懂的常識，他卻不知道。結婚這麼多年，今年台灣花精要去夏威夷展覽，才知道原來他不懂「比基尼」是什麼意思！但是你認為他應該不知道的問題，祈明老師卻以他獨特的觀點深入剖析，而且是一種很本能的超然智慧展現，令人驚訝。


    因為花精與自然訊息的研究，我再次見識到祈明老師的生命魅力，他盡善盡美延展出生命的寬闊度，從原本靜默的個性，蛻變成溫暖人心的花精心靈治療師，用他天生自成美學的生命觀點，很有系統的剖析各個生命、身心的面向，提點出失衡的心靈問題，帶給更多人生命的撫慰與光華。有時我常想，也許是上天的眷顧，讓樸實的山上小孩在貧困的生活環境中長大，想要的東西全需要靠雙手創造，房子是他們自己蓋、玩具自己做。也因為這樣的簡單環境，祈明老師有雙靈巧的「手」，會修理、設計與創造'
