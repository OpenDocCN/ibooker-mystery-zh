  md: '點，愈要謹慎應用複方，才能避免訊息抵消或承接管道混亂的情形發生。


    單方花精與複方花精各有優點。舉例來說，把曇花花精及蒔茶花花精的複方給某個人使用。曇花花精是抒洩內在壓抑的負面情結，再加以平衡調整，使之恢復平和；蒔茶花花精則是穩定情緒。使用者究竟呈現的是哪一種花精的作用，將無法判讀也難以覺察。在這樣的情形下，單方花精的確比較能夠清楚呈現花精所整理的特定情緒。例如，白天服用野薑花花精，以面對生活、工作事件的壓力，晚上則使用曇花花精來整理內在深層的情緒。像這樣選擇特定的時間，來調整特定的情緒，不失為兼顧情緒深度與平衡調理的好方法。


    花精療法主要是讓人能夠面對及整理自己的情緒，我所規劃的花精療程約為 10 至 14 天。根據個案的使用經驗來看，花精從牽引出特定情緒面，到完全平撫調理，所需要的時間大約是一個多星期。情緒的療癒好比剝洋蔥，因此找出情緒問題點，一次選用一瓶單方花精，專注地處理一種情緒，循序漸進，效果較為顯著，個案也可以依據花語清楚檢視情緒的轉化。若只是將花精當作日常的保養品，當然無妨，只是依心情而隨時抽選不同花精來使用，很難定心瞭解花精的個別特質，以及深入覺察花精對治的情緒因子，更何況是提升與改變自己，以徹底平衡特定的情緒問題。


    此外同一種花精作用的深淺層次，會依使用者的心識狀況而調整，每個人的反應程度極有可能不同。或許我們可以歸納出某一種花精是針對某一種特質、情緒或某'
