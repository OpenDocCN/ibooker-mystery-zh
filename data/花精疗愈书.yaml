    ## 「看見」花精靈的國度


    還記得那一年的仲夏正值蓮花盛放，我懷著無比雀躍的心情帶著妻子和女兒一同出遊，展開第一次花精的神聖擷取「實驗」。經過一年多鮮花療法的豐富臨床經驗，不斷從宇宙與大自然中研究訊息互通的道理，在靜默調息中汲取生命本源的智慧，我相信自己已經尋得從宇宙獨特管道，將花朵能量接引貯存在水中的花精母劑擷取方式，現在只差真正的付諸實行而已。


    尋得一方清淨的蓮花池，晨曦的陽光透著微微的朝露，正值良辰吉時，我小心按照心中已確定無誤的步驟一一執行。我的妻子秋敏對於宇宙訊息能量一向有著獨特的解析與感知能力，然而這次的「實驗」以及我一直以來計劃進行的花精擷取研究，她並無太多的興致想瞭解，對於我常常突發奇想的訊息「實驗」，她早就見怪不怪了，所以並沒有多想，反正是出遊賞花嘛！當然心情感覺無比愜意。


    秋敏回憶那時正夏的太陽，見我在大太陽下看著「實驗」中的蓮花，怎麼一點也不喊熱呢！像個大孩子滿臉笑容，沉浸在一種歡喜的滿足中，靜靜地等待花朵能量轉載記錄至水中。她時常笑我總是帶著一股傻勁，連田間閒逛的老農，也打趣的用台語說：「少年耶，練仙水喔！」


    約莫三個小時之後，擷取步驟完成，我感受到水中飽含著蓮花的活躍訊息能量。那種喜悅真是難以形容，因為我果真能連結宇宙花能量場，利用蓮花途徑邀請鮮活能量進入水中，而成功尋得花精母劑擷取的方式了！


    當天夜晚，我躺在房間床上望著窗外，看見滿天星斗與皎潔月亮掛在天際，我已有些許的睡意正想入眠，秋敏看著滿天的繁星了無睡意，決定去靜坐打個禪。半夜凌晨透過整片的落地玻璃，望著相思林有種朦朧美，再抬頭仰望無光害的星空，彷彿進入了宇宙隧道中。突然間一道從宇宙天際射下的強光，秋敏感覺到某部分的意識穿越當下時空，進入一個絢爛奇妙的世界，彷彿一幅精妙多層次的絕美畫作，在她眼前攤開，一個繽紛的宇宙「花空間」呈現，豐富的能量將她完全包覆於其中！


    滿天晶瑩透明的花朵呈螺旋狀飛奔映入眼簾，每一朵花彷彿都擁有自已的鮮活生命意識，祂們像是一個個透亮的發光體，在精巧的宇宙智慧與秩序傳遞下，散放著源源不絕的愛之光亮。她直覺那正是宇宙花場的訊息，屬於花精靈的國度，不斷地向她傳遞花朵世界的奧妙訊息。沐浴在花精靈能量中，秋敏感覺無比熟悉又親切，帶著開心與驚喜，她興奮的跑來喊醒我，栩栩如生地描述著她所見到的花世界，直說：「天啊！真的可以『看見』花的國度，這宇宙能量正啟動，執行花場神聖的使命，將愛帶至人間！真是太神奇了！」


    ## 傳遞花精的核心精神


    聽完秋敏的話，我也深受震撼和感動。一直以來我內在覺知的奧妙宇宙花能量場，彷彿懸浮在心靈某個層次、難以言喻的祕密，如今透過妻子口中詳實的敘述出來，像是獲得了應證與落實。對我倆從事花精研究而言，這是個很大的激勵與鼓舞，我們已意識到這是一條該走的路，秋敏「看見」過花能量場後，對花精訊息得到了啟蒙，也開始認真正視我的花精研究，而我們也更加堅定信心，要在花精領域繼續深入地鑽研，精益求精地研發花精。


    接受來自宇宙花能量場的珍貴訊息，心中難免有所遲疑，浩瀚人群不乏「高人」，而我只不過是個平凡的在家居士，單純的山上小孩，沒有顯赫的背景，更別提穩定的財源、寬廣的人脈，又如何能擔負起這項宇宙奧祕大任呢！雖然現實條件有再多的遲疑考量，我內心明白，很多事人算不如天意的安排與巧定，計劃永遠趕不過變化，就踏實的隨順因緣吧！只要我內心清楚瞭解宇宙傳遞的真意，其他現實的考量就交由上天安排，我只需要安心盡力完成自己的一份責任，將花精真正的核心精神傳遞開來。


    花國度無私地奉獻自己的精神與智慧，為人類心靈提供指引，以無窮的愛共振我們內在心靈的本我，是期待我們每一個人都能夠有內省的機會，提升心靈品質，得到真正的覺醒，停止彼此傷害與自戕，共同為摯愛的大地、自然界、宇宙獻出良善的正面能量，讓宇宙生命體和諧相生，愛的能量源源不絕地傳遞下去！


