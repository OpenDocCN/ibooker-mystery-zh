  md: '我們心靈常駐「我」心中，在心靈意識迴盪反芻間，很多關於「我」存在的生命訊息，透過身體在一呼一吸之間的轉換，我們才得以感知生命的延展。生命能量透過呼吸，建構出身體的存在外貌。當我們對身體外貌不滿意，不是選擇忽略、減肥整形，更不是從此自卑或自棄。我們對外貌過度的追求或自卑，是因為內心的匱乏所造成，應該審視造成心靈失衡的主因，是嫉妒、是不夠自信，還是迷失自我的價值。


    心靈建構出個人獨特的生命氣質，身體就是透過外在世界，在呼吸間交替建構的能量，如果我們對自己外在條件不滿意，應當找出心靈匱乏的原因。在花能量共振訊息、轉化後，外在的形貌自然會轉變，雖然我們無法像帥哥美女引人注目，但充滿自信歡愉的心，散發出知足的氣質，會吸引大家親近喜愛，這才是最踏實相隨一生，永不磨滅的生命能量。


