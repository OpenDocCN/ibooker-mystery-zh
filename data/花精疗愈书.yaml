  md: '用身體能量測試法及訊息能量檢測法，使他們能安心的選擇。事實上，經過多次試驗，兩種方式所測得的結果是相符的，就看個人所需而決定測試的方式。


    身體磁場測試法的原理，在於人體是由能量所組成的，每一個細胞、思想、情感、記憶、信念等都是以訊息方式存在，而花精是細緻的訊息波，能夠直接與人體能量場共振，對身體、心理及精神造成波動。若此時我們的身心都真正放鬆，就可以信任內在智慧，找出自己最需要的花精。當然，前提是花精本身的訊息，要能夠精準的共振特定心理情緒狀態，甚至只是握住瓶身，就能感受其訊息能量，這樣，使用身體磁場測試時，才能找出真正恰當的花精。目前這是台灣花精的特色之一。


    肢體是表達內心感受最直接的媒介。當我們喜歡一個人，把他當作自己的好朋友時，我們的身體會自然而然傾前、靠近他；相反的，會不自覺的往後退，想保持安全距離。在測試時，還可能身體打轉、左右搖晃，或先往後退再前傾等複雜的變化。由身體和不同花精的共振反應中，可以測得我們內在可能有哪些負面情緒需要面對，以及我們目前對於整理特定情緒的接受程度，此外這時也可能興起各種心情或感受、腦中出現畫面、想法等，都可以表達出來，讓花精治療師綜合整理之後，從旁協助我們做判斷。


    唯一要注意的是，肢體所傳達的內心情感複雜多變，它恰恰反應每個人獨特的心靈狀態，花精治療師需要經過專業的訓練，才能做出精準的判斷。當我們使用身體測試法來選擇花精時，最好有專人在一旁協助判讀。


