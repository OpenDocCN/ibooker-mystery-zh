  md: '「高山絲瓜花」因為生長在清幽的山谷中，訊息較為清靜，她能使心輪開闊，讓人甦醒，適合思想單純，情緒直接的人使用，讓他們更踏實的面對生活；「平地絲瓜花」因為接近人群，能夠相應的頻率與情緒比較廣泛，她的能量廣闊沒有邊際，作用比較平穩，對於現代人較為複雜的情緒狀況，有很好的平衡撫慰效果。我讓工作環境人事多變，或是長期居住在都市裡的人使用，總是十分相應。


