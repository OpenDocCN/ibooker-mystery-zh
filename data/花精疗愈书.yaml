  md: '# 花之禪

    與花之舞


    我們謙和用心與花訊息相連結，心靈意識進入花能量的導護中，我們的心彷彿一朵盛放之花，身體頓時間可以自由、呼吸，穿梭心靈海，新的心靈能量引流注入，如同植物學會留存原地，善應環境的多變，與自然宇宙間和諧的律動。


    呼吸間的能量，花精生命的智慧


    混亂思維與心靈創傷，會使人呼吸變得有壓迫力，無法與臟腑和諧的律動，常為了釐清混雜的心理感受，而忘記呼吸的存在，輕忽呼吸對身心連結的重要性，這也是身體百病發跡的根源。呼吸長短淺薄，吸呼間不規律轉化，會影響心脈的跳動頻率，無法精確共振身體能量，帶以足夠的氧量，讓細胞替換滯留的廢能量，日積月累殘餘的負能量，附著於細胞逐日壯大，形成身體磁場的一股亂流，身體疾病也因而顯現。


    如果我們未能覺察，轉化心靈的暗潮洶湧，就必須學會照顧自己的呼吸，像植物憑藉三大生命基礎的要素：空氣、陽光和水，開啟生命的大智慧。我們先照護身體的呼吸，讓供氧量不縮減，自然心會安靜下來，在花精健康活躍的能量中，返給修護心靈的耗損，保住身心的能量不流失，再從中找尋生命的亮光。


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_198_0.png)'
  merge: -1
