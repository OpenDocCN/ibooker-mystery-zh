    ## 從花朵多變的外型來看花語


    深入觀察花朵，我們還可以從她的外型、樣貌以及生長型態，看出她所具有的特質。花的顏色有其作用的相通性，但影響最大的還是花朵的外型構造。


    從芒花相應的情緒特質來看，她能治療嫉妒、孤傲、報復、不安全感、忽略精神層面等情緒。


    秋天的原野山間總是可以見到白茫茫一片的芒花。芒花獨特之處在於開花並不是為了吸引鳥獸昆蟲前來傳播花粉，只要秋風吹起，隨風搖曳，即可輕易完成授粉，象徵一種高度自我的展現。所以她不需要鮮豔的花色，也不需要堅挺的花萼或寬厚花瓣，讓昆蟲停留授粉。因為地下根莖發達，芒草的侵略性與擴展性極強，有時整片山坡舉目望去一片白芒花飄揚，人經過芒草叢邊，不小心還會被她銳利的葉片割傷。


    芒花的草莽特性，使她的花朵能量具有獨特的作用，動力、生命力、韌性，自由自在、表達自我、環境適應能力極強，適合拘謹不自在，缺乏生命力與韌性的人。也正因為芒草傷害性與侵略性特質，所以花朵能量可以平衡強烈的報復與嫉妒心態。芒花唯我獨尊的展現方式，其實也暗示著自我、孤傲、不需要去付出愛、忽略精神層面的個性。這些都可以透過花朵的正面能量平衡之。


