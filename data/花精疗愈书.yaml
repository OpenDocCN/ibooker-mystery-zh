    以玫瑰為例。玫瑰花是很「規矩」的花，觀察花的構造，會發現她的花瓣外型非常整齊，一瓣一瓣層層往外展開，花能量所展現的特質就有循規蹈矩的傾向。玫瑰的莖帶刺，這是植物的自我保護機制，就好比人為了保護自己，化解內心的挫折與壓力，而在潛意識形成的「自我防衛機轉」，當它發揮正當作用時，可以保護自我免於過度的刺激與壓力，然而當人內在的情緒創傷，未獲得適當的紓解與整理時，很容易會演變成過度自我防'
