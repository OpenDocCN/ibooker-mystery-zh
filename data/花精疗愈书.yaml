    本土花精的經驗，在臨床的運用上是十分成功的，我在花精這獨特的心靈療方之外，另拓展出各種藥草訊息能量、排毒訊息能量。心靈的需求可以靠花精來滿足，而生理的健康則以藥草、排毒訊息能量來調理，活用訊息能量的特質，架構出完全無負擔、無副作用的身心訊息平衡機制。最重要的是，以本土親切的花草，製作出最適合我們的體質與心靈的訊息，不但能量活躍、完整，訊息管道通暢，而且完全能夠貼合我們的需求。花精的精神與成功經驗，不僅可以延伸到其他的訊息產品，更可以在不同國家之間傳遞開來。未來，我也計畫到其他國家，為當地的人們研製出最適合他們的本土花精、藥草訊息能量等，讓宇宙訊息的法則真正落實與應用，為地球各個角落的人們，帶來更貼密的生命律動。


    # 選擇訊息健康的花株


    在擷取花朵訊息之前，要先觀察花朵植物所生長的環境，例如地理磁場是否良好，有沒有人為環境污染等。在台灣地區，要尋得好水好地，並不是難事。在環境清幽的地方生長的花朵，汲取大自然地水火風的精華，本質上就顯得雅潔清靜，最適合當作擷取花精訊息的母株。


    此外，花朵外型是否完整健康，植物生長過程中有沒有受傷的經驗，以及是否受外在訊息的干擾，而記錄了不必要的雜訊，都是擷取花精前，選擇花株必須考量的要件。


    在研究與實驗花朵植物記憶周遭訊息的能力時，我曾經有一次難忘的經驗。


    我在住家附近，找到一株外觀看起來十分健康的狗尾草花，為了研究花朵訊息，我將之擷取下來，帶回家加以分析。當我把花朵訊息交給妻子秋敏解析時，並沒有告訴她這株狗尾草花的來由。秋敏握到花朵訊息立刻感到奇怪，從訊息之中，她感受到一股死亡的氣息，她看到「一輛車中坐滿了身穿白衣的幽魂」的意象，嚇得馬上把手中的花精拋開，直問這是在哪裡擷取的訊息！


    我這才告訴她，花朵母株生長的地方有一戶人家，正是從事與殯葬有關的加工產業，只是門口沒有懸掛招牌，生人不容易知道。這戶人家門口常停放著一輛貨車，專供運送殯葬加工產品使用。生長在這戶人家旁的狗尾草，不但記下住戶的訊息，就連貨車往來喪葬場合這類移動的訊息，也細緻地記錄了下來！


    花朵在成長的過程中，為了適應生存環境，不但會記錄周遭地理磁場的訊息，植物本身也可能帶有針刺、分泌毒液等自我保護機制。植物會記憶友伴或自己愉快的、受傷的經驗，隨順自在地回應大自然的律動。人工培育的植物則對人的情緒感受力非常敏銳，受關愛的植物總是生氣蓬勃，反之受人傷害、辱罵或忽略時，便會垂頭喪氣甚至以死相待。這許許多多訊息，都會記錄在花朵植物的生命訊息之中，而表現在她的生長外觀上。


