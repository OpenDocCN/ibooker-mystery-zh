    每一種花都擁有獨特的正面特質，也都會和特定的負面情緒共振，因此，當我們內在的確藏有某些負面情緒時，花精便會調動呈現，讓我們在初期暫時陷入情緒之中。面對這樣的狀況，並不如想像中困難，因為在情緒呈現的整個歷程中，我們都是清明的看著它、體會它，花精的能量就像一張防護網，安全的托住我們，我們可以從中轉化出生命的智慧。只要瞭解情緒的來龍去脈，坦承面對自己，勇於轉化缺失與盲點，在適度的範圍內宣洩情感，有助於心靈平衡與健康。


    同一瓶花精，也許有人是呼應到花精的正面特質，沒有強烈的負面感受，卻體驗到一種平和、開闊、自在、喜悅的幸福感蔓延開來。大多數人多半會同時感受到情緒的整理，以及花精正面特質持續的呵護作用。


    ## 把握情緒調理的黃金時期


    情緒好比洋蔥，層層瓣瓣，包裹著歲月的痕跡，往往要把表面的那一層剝開，才會看到內裡還有埋藏得更深的情緒等待整理。根據我臨床的經驗，最好一次使用一瓶單方花精，進行特定情緒的深入整理。因為從情緒呈現，到負面磁場瓦解恢復平衡，黃金時期約為
    10 至 15 天，這段時間必須讓花精的能量持續在體內作用，才能夠激發我們內在本有的療癒機制開啟，並且真正深入負面情緒的核心，徹底療癒。若每次只是隨機挑選不同花精來使用，或者每日服用次數不定，甚至使用期間間斷，反而會錯失珍貴的情緒整理黃金期。


    選得所需要的花精時，使用前，務必要仔細閱讀說明。做好心理準備，盡量配合說明細則，定時、定量使用，若遇到特別不穩定的狀況，則斟酌增加使用的次數；為了保持花精完整的療癒能量，千萬不要自己稀釋花精。此外包括保存方式、注意事項等，雖然都是微小的細節，卻可能產生效果上的差異。以輕鬆的心情來使用花精，在她的能量助化下，以認真的態度，檢視自己生命所欠缺的，認識我們原已保有的善美。別忘了，詳實記錄自己的心情變化、飲食作息、睡眠夢境等，做一個勇於面對自己的人。


    ## 寵物花精


    物和人類雖然無法透過語言直接溝通，卻可以建立很獨特的感情。有些動物放棄原來的生長環境，選擇和人朝夕相處，不論是出於主動或被動，牠們已成為和人類相處最為成功的動物，例如貓、狗等。人在生活中與貓咪、狗兒日夜相伴，自然比較容易熟悉動物的行為語言，也比較能夠對其他陌生的動物產生真誠的關懷，更何況，牠們直接而單純的情感，不知道撫慰了多少人孤單寂寞的心。動物天生豐沛的情感回饋，甚至比人和人之間的情感，更能夠喚回我們的熱情！國外盛行的「寵物療法」，就是透過人與寵物間建立起單純的愛，來轉化人因憂鬱、絕望、孤寂等情緒，所導致的心身疾病！


    ### 你真懂牠的心情嗎？


    動物成為寵物，雖然免除了生存於殘酷的原始環境的生死奮戰，但同時牠們也付出了相當的代價。學習以人為天，對主人察言觀色，學會人類表情達意的模式，被迫接受人類的食衣住行等生活方式，對單純的牠們而言，實在是很大的壓力與挑戰。牠們的身上，還流著祖先們生存於自然中必備的原始本能，但血液裡的衝動與現實環境相較之下，落差實在太大了。此外，與人類的訊息磁場相通，牠們在不知不覺間，也承襲了人類的負面陰影，例如各式疾病，恐懼、緊張等不穩定的情緒。


    在台灣花精還沒有正式推出寵物花精之前，就已經有幾位關懷寵物的朋友，給他們的寵物喝花精或藥草訊息了。


    ### 個案分享


    ……相信有寵物的朋友，都希望自己親愛的寶貝們健康快樂，這也是飼主的最大心願。我的狗兒小虎使用過一種藥草，兩種花精：艾草、百合、咸豐草。這段歷程以來，我覺得，牠能使用花精是件幸福的事。因為祈明老師非常忙碌，所以當時餵牠的是人用的花精，不過，我覺得並不會影響花精對小虎的愛。


    我覺得台灣花精用在狗兒身上有最實質、直接的幫助，而且沒有副作用。年事已高的小虎身體病弱，持續醫療中，使用花精比較能平穩安定地入睡，也比較不會受影響，這樣，對牠和我而言，已是很好的狀況了。


    但該來的還是要來，今年，我就在擔心小虎是不是能和我們一起過中秋，結果，牠還是趕上了農曆七月底的收魂列車回天家去了。小虎雖然是隻苦命的小狗，但也是隻幸運的狗兒，因為愛讓我們相遇，讓牠能脫離童年暴力的陰影，縱使我們之前生活過得不平順開心，但始終都有愛的圍繞和支持在我們之間。


    我自己使用台灣花精後，覺得花精的背後有更廣大的光的訊息和連結，心想，若是狗狗使用的話，在世的時候，會開心的多，往生後，靈魂也不會孤單無依吧。花精除了讓牠們平穩安定外，對食慾偏低的小虎，花精後來變成延續牠生命的支持力量。


    十一號晚間，小虎就與世長辭了。在把牠安置在紙箱裡前，我餵牠吃最後一次的咸豐草花精，並告訴牠：不管你去哪裡，都要像咸豐草一樣有生命力且開心喔。牠這輩子就是心事太多。


    牠的離去，讓我們都很悲傷。諾寶是我們家另一隻老狗，在小虎斷氣那刻，到我把骨灰抱回家這段時間，牠都很鎮定，還不時察看我和媽媽的狀況。聽說，蒔茶花花精是從一棵老茶樹所擷取的花精，她看過許多生命的輪轉和變化，所以很了解老人家的心情。自從我家的諾寶使用蒔茶花花精後，漸漸不再固執，更好溝通了，感覺成熟許多，心打開了許多，心量也大了許多。花精真是幫了我很大的忙。


    (上)「艾草」驅邪保健，保護身體能量場

    (中)「百合花」充足的能量，燃起生命的希望

    (下)「咸豐草」自在、快樂、自信


    面對生活的壓力，寵物也會有情緒、也會面臨生老病死，牠們的心靈同我們一樣，渴求回歸自然，接受天地的滋潤。花精能夠補足寵物心靈空乏的區域，讓牠們與生命的本源重新連結，回歸天賦的本能，更樂天知命。生理的病症則可以用藥草訊息來調理，不同藥草訊息都能活絡全身氣脈，對動物生理各部位的機能，有獨特的療癒效果。


    ### 寵物也有心靈需求


    有人餵家中的老狗喝「蒔茶葉訊息」（藥草），溫潤的能量，會先舒緩狗兒的情緒壓力，再針對老狗各部位的生理機能，進行活化與調理。


    有一位養貓的朋友，家中的母貓因為開刀結紮，深受創傷恐慌，幾年下來身體一直相當嬴弱，個性也畏縮逃避。牠常會因為身邊突然的聲響，而驚嚇得彈跳有一公尺高，腸胃不好，總是嘔吐不止。她給家中的母貓喝過幾次「艾草訊息」（藥草）之後，居然意外治好了貓咪易受驚嚇的狀況，漸漸的貓咪回復了應有的豐腴。她說：「我也餵牠喝紅蓮花，可以感覺到貓咪立刻看起來有精神多了，她開始會主動找另一隻貓咪玩耍追逐，跟以往無精打采的樣子完全兩樣，花精和艾草顯然讓她的心情也變好了呢！」


    花精也意外救回了一隻小鳥的性命。有一位媽媽養了一隻嫩綠可愛的綠繡眼，平時任牠在家中自由活動，但有一天綠繡眼不小心被小孩壓到，不知道是因為驚嚇過度，或者受傷了，躺在地上奄奄一息。全家人都很難過，對牠的存活抱著悲觀的希望。但這位媽媽突然靈機一動，找來孩子正在使用的蓮花花精，滴了一滴在鳥兒嘴裡。奇蹟發生了，第二天綠繡眼居然意外活了過來！全家人對這件花精救小鳥的故事，一直到現在都津津樂道呢。


    寵物因為身軀小、個性單純，無論使用花精或藥草訊息，效果都比人來的迅速且直接。訊息能量可以迅速行竄身體能量場，安定身心靈的狀態，速度可比一般物質或藥物直接而迅速。


    我針對寵物的心靈需求，研發出十至二十種寵物專用花精，無論在訊息波頻、能量結構上，都是針對寵物而量身打造的。可愛的動物們感受到花世界所傳遞的美好能量與訊息，和主人之間將構築更完滿的緣分關係，彼此之間多了一份共享的美好事物。


    ## 首席花療師的經驗分享


    如果你已經自行選擇且體驗過台灣花精，想進一步透過專業的心靈諮詢，探索更深廣的心靈層面，這時通常會想知道的是，花精諮詢會面對什麼樣的過程，進入什麼樣的場合，怎麼選得最適合自己的花精，又該做好什麼心理準備。有些朋友體驗到花精對自己的生命、生活的深刻影響，受到花精精神的感動，有意願成為一位花精治療師，第一個疑問便是：我該如何成為花精治療師？


    為了確保花精的精神正確的傳遞出去，花精治療師能夠學習到此療法的精髓，發揮其靈活作用的特質，對使用者達到最好的心靈調癒作用，我很重視花精治療師的培訓。由於台灣花精從擷取、研發、製作到應用與服務，已擁有完整的體系與資訊，所以花精治療師能夠學習到的不只有花語應用等表淺的層面，還有更深廣、屬於花精本質的資訊，及訊息應用的各種可能性。我將親自教學，分享我的研究發現與應用心得，充分傳達我所體悟到的花精世界奧義。


    接下來，我就從自身的經驗開始講起，盡量讓讀者能夠「想像」花療室中的情境，也許瞭解了這個部分之後，我們可以更進一步檢視自己接受花精諮詢，或成為花精治療師的意願與可能性。


    ## 花療室面面觀


    日、每日，有來自各方的朋友接受花精心靈諮詢，我的花療室像人生舞台的縮影，我看見人性的脆弱與人生的百態。有人理性、有人感性；有人大方開朗、有人謹慎小心；有人心無芥蒂一進門便對我開口滔滔不絕；有人則自始至終緊閉雙脣，絲毫不肯吐露隻字片語；有人過於心痛而忍不住流淚。有時候父母孩子、伴侶，甚至一起在花療室裡接受我的心靈諮詢，急切地想要整理親密關係的問題⋯⋯。


    因為花精治療師的身分，我間接也體悟到千百種人心的苦，我聆聽過無數個生命的感動故事，人生是如此辛苦又過於無常。


    來到花療室的朋友或許已意識到自己的情緒問題，或者還不自覺，身為花精治療師，我最大挑戰是，如何引領每一位前來接受諮詢的朋友，信任花精存在的愛，且願意接納自我，勇於改變，走出心靈固有的封閉或僵化模式，提升對自己情緒的覺察度，以打破其有意無意間砌築的心牆。協助他選擇最恰當的花精，並且在花精的陪伴下，信任、安心地度過情緒的整理過程。


    舉一些我在花療室遇見的例子，我用不同花朵的特質來代表，並不代表他們一定會跟該種花精情緒相應，純粹是有趣，別無它心。


    ### 含羞草花型


    花型像顆敏銳的雷達


    代表典型：舉止優雅、覺察力強


    這類型的朋友多半接受過良好的教育，自我情緒管理能力佳，過去並未經歷重大創傷，現實生活也安穩無虞，擁有美滿的家庭、安定的工作。生活中也許難免有些小煩惱，整體身心而言十分順遂。


    花精不只有平衡情緒問題的作用，她也是心靈的「營養補充劑」，能夠充實精神層面，讓我們對人生更有方向、更加樂觀積極。遇到這樣的朋友，花精可以給予他們提升靈性的力量。


    例如有一位在大學任教的女士，使用第一瓶花精之後，就表示頭腦變得清晰了，表達能力也無形中變好了。課堂上，她注意到學生聽課的表情與眼神，變得十分專注。她提到，有一回先生因為臨時無法接送孩子，緊急來電請她代替。換作是以往的她，即便已排定計畫，也會匆忙結束眼前的事務，硬著頭皮趕去接孩子，弄得自己委屈不已卻有口難言。但這一次，她勇於表達自己的難題，態度堅定但柔和的告訴先生，她無法及時離開，最後兩人商議其他辦法，而平順解決了難題。花精讓她的心靈意識提升，頭腦清晰，懂得調適應變之道，對四周環境的覺察力變得敏銳，建立夫妻之間良好的溝通管道。她整個人散發出自信的女性氣質。


    ### 角桐草型


    花瓣不對稱，花朵色紋不規則


    代表典型：性情急躁、不安的人


    焦慮似乎是現代人的通病，它讓人慌張、焦急、緊張，做事無法集中注意力，總是下意識地想逃離眼前的事物。於是生活節奏愈來愈快，精神愈是緊張，感覺自己像個不斷自轉的陀螺，無暇思索，也停不下來。


    這類型的朋友走進花療室，有時會以滔滔不絕的話語，掩飾內心的不安，應答迅速，不假思索。我會以花精的能量，先安定其神經系統，撫平他的慌張與不安，接著再深入瞭解他的情緒癥結。


    ### 狗尾草型


    花柱挺直像隻狗的尾巴


    代表典型：主觀意識強的人


    這類型的人多半過度理性或主觀意識強，臉部肌肉顯得僵硬無笑容。有些是應朋友、伴侶的要求，帶著對花精半知、半解、半強迫的心情，前來接受花精心靈諮詢。走進花療室，他們會理性一再地強調自己沒有任何情緒問題。自我情緒檢測表的勾選，也多半是程度輕微或偏無。


    有趣的是，這類的朋友在經歷一至二瓶花精療程之後，會放下當初主觀的意識，想要深入認識花精的作用，在情緒檢測表的勾選上會看見情緒的變化。有的人開始覺察自己情緒方面的改善，例如「比較」不會發脾氣、對孩子「比較」有耐性、對上司、朋友「比較順眼」等等，顯然他們在使用花精之前，已有這方面的問題，而無意改變，也不認為那是個情緒問題，而花精幫助他們提升對自我的覺察能力，看到了自己的盲點，進而以正面能量幫助他們逐漸調整自我，獲得和諧的人際。


    ### 刺葉王蘭型


    花株高聳立於刺葉之上


    代表典型：尊貴、防衛心強的人


    有些朋友通常只是來體驗台灣花精到底有多「強」，有的過去已有豐富的治療經驗，或者本身是身心靈或自然療法工作者，他們時常是抱持著既有的專業主觀態度，前來接受諮詢。也許自認為已經很瞭解自己，分析生活的事件時，有他自己的見解，或者對我治療的態度比較疏離，抱持不信任的忽略態度。有些朋友還會直接表明，他沒有情緒問題，不想填寫情緒檢測表。


    我也遇過對我、對宇宙訊息好奇者，會為我算命，打趣的告訴我，我前世是誰，從哪兒來，有什麼使命等等。甚至有人來一趟諮詢，只想見識我的修持功力，有沒有辦法「看見」他背後的「尊貴靈魂」。我的態度是尊重每個生命的表現形式，委婉的告訴他，不管我們的前世是誰轉世，不管我們的指導靈多麼尊貴，身而為人，就必須從人的角度踏實修起，真誠的面對自我，人身是很難得的，何況我們一定是有緣才相聚。


    面對這些朋友，我最好的方式還是請他直接體驗花精能量，讓花精「說話」，打破他的認知。花精的能量能平衡理性與心靈，讓人們輕易卸下心防，用客觀的態度，來重新看待周遭的人事物，這樣來趟花精諮詢才不會錯失認識花精的機會。


    ### 玫瑰花型


    傳情說愛之花朵


    代表典型：感情困惑者


    這類玫瑰型的朋友在感情上受創。當一個失去愛的朋友，出現在花療室時，都會像個沒心的稻草人，暫時聽不見自己心跳，彷彿世界的一切都因愛情的挫敗而停止。首先我會靜心聆聽他們道出失落的愛情故事，傷心、流淚宣洩積壓的情緒是難免的。我明白當愛出現問題，一切的生活都會失去動力，失去人生方向、失去自信心。甚至是沒有勇氣拒絕不對的愛情。


    花精能夠為我們即時填補失去的愛，讓人有勇氣看清愛情的盲點，承認感情出問題，走出感情創傷的陰霾，重新建立自信與魅力，選擇更有價值的人生觀，活出自己。


    ### 野薑花型


    花柱圓圓似人腦，花朵香氣醒人腦


    代表典型：現實壓力大'
  mdcn: '至於深層療癒系列的花精群組，顧名思義，當然是治療層級的花精。這類花精所調動的情緒很深層，可能將埋藏在潛意識的創傷訊息呈現出來整理，或讓我們赤裸裸的看到個性的缺點現形。心理調適的過程中，也許會產生哭泣、憤懣、悔恨、恐懼、沮喪、心痛、胸悶、頭痛等情緒或生理好轉反應，因此建議經由花精諮詢，由花精治療師專業判斷與輔導。


    若你一向能夠掌握自己情緒的來龍去脈，也很清楚此刻你的情緒源自何方，根據你的判斷，目前的情緒只是暫時的困擾，並非長期蟄伏於心中的創痛情結，而且隨著生活方式改變，或事件過去，就可以平復。那麼，你也許可以從「心靈健康系列」花精中（目前約有四十五種），自行選擇一瓶適合的花精來使用。


    每個人都擁有自我覺察的能力，但是深淺層度卻不同。例如，當你發覺自己在討厭某一個人時，能不能找出箇中原因？對方什麼地方讓你不喜歡？你心中真正的感受是什麼？這其中有沒有嫉妒的成分？也許他的工作能力或魅力令你感覺遠遠不及？你能不能覺察到在這份嫉妒的情緒背後，是你內在深層的匱乏感作祟？自行選擇花精使用，必定會面對類似的盲點而無法深入，因此比較適合初期或淺層的情緒調整使用。


    讓人有生命動力的花

    (上)「香蕉花」點燃生命動力，讓人積極有活力

    (下)「菖花」打開矛盾心結，提升行動力


    即使是自行選擇的花精，也可能因為個人的意願或敏感度高，而調動深層的情緒問題加以整理。當情緒的探索與整理愈來愈深入時，花精諮詢會是更安全、更全面性的方式。花精諮詢首先呈現的是人際關係，你和花精治療師之間的互動，其實就是日常生活中，你與他人往來關係的縮影，可以藉此觀察自己在人際關係上的反應機制。此外，透過與專業治療師的對話，花精治療師客觀的觀察，彼此激盪的思潮等，你可以更全面性的瞭解自己。


    大多數的人會逃避憶起過往的創傷，然而勇於面對與調整失衡的情緒磁場，卻是療癒唯一的途徑，這時專業人員給予我們的協助與支持，就顯得格外重要了。花精治療師適切的提攜與輔導，再加上花精在精神上的激勵與引領，讓我們以無比清明的意識、勇氣與力量，超越自我生命的侷限。


    無論是自選花精或接受花精諮詢，我們都應該做好心理準備，花精並非只是對症下藥，把我們不喜歡的負面情緒去除掉而已，她擁有更全面性的平衡能量，讓人整體得到提升與真正的覺醒。


    測試選擇花精的方式有很多種，我在第一本著作《發現台灣花精》已經詳細介紹過了。以下簡單介紹幾種方式，供各位參考：


    - 你可以參考本書的花語介紹，理性判斷你認為自己需要的花精。

    - 自我情緒檢測法：透過「情緒檢測表」或「花語檢測表」等問卷，檢視自己目前的情緒壓力。

    - 型環測試法：挑選出可能適合的花精後，將左手大拇指和食指圈成一個環，緊緊扣住，若是適合的花精，手指環堅強有力，反之共振弱的花精，則可以輕易扳開手指。

    - 隨機抽取法：讓自己安靜下來，以嚴謹的態度，閉上雙眼直接抽選花精。這種方式簡便易行，在西方非常盛行，然而東方人深受風水讖諱文化影響，容易落入以花精來「算命」的心態，若能克服這方面的影響，定心選取，一次使用一瓶單方花精，誠懇面對與調整，則不失為一個簡便的好方法。

    - 花卡圖片測試法：憑直覺來選取吸引自己的花圖卡。


    「霍香薊」使人卸下心防，身心輕盈如棉花


    ## 同一瓶花精，可能形成兩極的反應


    大多數人對花都有既定的喜好，有時測得自己不那麼喜歡的花時，心裡忍不住會有排斥感。譬如我曾經遇到一個個案測得了「霍香薊」花精，當他發現那就是路旁常見的「不起眼」小紫花時，忍不住撇撇嘴說：「我不喜歡這花耶，可不可以換呢？」也有人抱持著刻板印象，認為玫瑰花嬌貴、菊花俗鄙、蓮花脫俗、芙桑妖豔。事實上無論花朵看起來「大」或「小」、「起不起眼」，在自然界裡都展現獨一無二、難得珍貴的能量特質。霍香薊雖然常見，但她貼近人心的天性，使得花精充滿了柔軟、溫暖的特質，不知讓多少人克服了害怕不被認同、不知如何表達情感的困擾，讓他們變得柔軟有彈性，豁達熱情，靈敏自信！


    （上）「白頭翁」溫暖的光，像一張防護網安全的托住我們

    （下）「紅玫瑰」層層瓣瓣，象徵深層的情感心事


    無論我們對花朵抱持著任何好惡，都只是反映個人的心理情緒狀態，在我們最無法接受的花朵裡，也許就藏有釋放自己心靈能量的祕密！因此在選擇花精時，務必要放下心中既定的成見，敞開心，真心期待花精所帶給我們的驚喜。


    每一種花都擁有獨特的正面特質，也都會和特定的負面情緒共振，因此，當我們內在的確藏有某些負面情緒時，花精便會調動呈現，讓我們在初期暫時陷入情緒之中。面對這樣的狀況，並不如想像中困難，因為在情緒呈現的整個歷程中，我們都是清明的看著它、體會它，花精的能量就像一張防護網，安全的托住我們，我們可以從中轉化出生命的智慧。只要瞭解情緒的來龍去脈，坦承面對自己，勇於轉化缺失與盲點，在適度的範圍內宣洩情感，有助於心靈平衡與健康。


    同一瓶花精，也許有人是呼應到花精的正面特質，沒有強烈的負面感受，卻體驗到一種平和、開闊、自在、喜悅的幸福感蔓延開來。大多數人多半會同時感受到情緒的整理，以及花精正面特質持續的呵護作用。


    ## 把握情緒調理的黃金時期


    情緒好比洋蔥，層層瓣瓣，包裹著歲月的痕跡，往往要把表面的那一層剝開，才會看到內裡還有埋藏得更深的情緒等待整理。根據我臨床的經驗，最好一次使用一瓶單方花精，進行特定情緒的深入整理。因為從情緒呈現，到負面磁場瓦解恢復平衡，黃金時期約為
    10 至 15 天，這段時間必須讓花精的能量持續在體內作用，才能夠激發我們內在本有的療癒機制開啟，並且真正深入負面情緒的核心，徹底療癒。若每次只是隨機挑選不同花精來使用，或者每日服用次數不定，甚至使用期間間斷，反而會錯失珍貴的情緒整理黃金期。


    選得所需要的花精時，使用前，務必要仔細閱讀說明。做好心理準備，盡量配合說明細則，定時、定量使用，若遇到特別不穩定的狀況，則斟酌增加使用的次數；為了保持花精完整的療癒能量，千萬不要自己稀釋花精。此外包括保存方式、注意事項等，雖然都是微小的細節，卻可能產生效果上的差異。以輕鬆的心情來使用花精，在她的能量助化下，以認真的態度，檢視自己生命所欠缺的，認識我們原已保有的善美。別忘了，詳實記錄自己的心情變化、飲食作息、睡眠夢境等，做一個勇於面對自己的人。


    ## 寵物花精


    物和人類雖然無法透過語言直接溝通，卻可以建立很獨特的感情。有些動物放棄原來的生長環境，選擇和人朝夕相處，不論是出於主動或被動，牠們已成為和人類相處最為成功的動物，例如貓、狗等。人在生活中與貓咪、狗兒日夜相伴，自然比較容易熟悉動物的行為語言，也比較能夠對其他陌生的動物產生真誠的關懷，更何況，牠們直接而單純的情感，不知道撫慰了多少人孤單寂寞的心。動物天生豐沛的情感回饋，甚至比人和人之間的情感，更能夠喚回我們的熱情！國外盛行的「寵物療法」，就是透過人與寵物間建立起單純的愛，來轉化人因憂鬱、絕望、孤寂等情緒，所導致的心身疾病！


    ### 你真懂牠的心情嗎？


    動物成為寵物，雖然免除了生存於殘酷的原始環境的生死奮戰，但同時牠們也付出了相當的代價。學習以人為天，對主人察言觀色，學會人類表情達意的模式，被迫接受人類的食衣住行等生活方式，對單純的牠們而言，實在是很大的壓力與挑戰。牠們的身上，還流著祖先們生存於自然中必備的原始本能，但血液裡的衝動與現實環境相較之下，落差實在太大了。此外，與人類的訊息磁場相通，牠們在不知不覺間，也承襲了人類的負面陰影，例如各式疾病，恐懼、緊張等不穩定的情緒。


    在台灣花精還沒有正式推出寵物花精之前，就已經有幾位關懷寵物的朋友，給他們的寵物喝花精或藥草訊息了。


    ### 個案分享


    ……相信有寵物的朋友，都希望自己親愛的寶貝們健康快樂，這也是飼主的最大心願。我的狗兒小虎使用過一種藥草，兩種花精：艾草、百合、咸豐草。這段歷程以來，我覺得，牠能使用花精是件幸福的事。因為祈明老師非常忙碌，所以當時餵牠的是人用的花精，不過，我覺得並不會影響花精對小虎的愛。


    我覺得台灣花精用在狗兒身上有最實質、直接的幫助，而且沒有副作用。年事已高的小虎身體病弱，持續醫療中，使用花精比較能平穩安定地入睡，也比較不會受影響，這樣，對牠和我而言，已是很好的狀況了。


    但該來的還是要來，今年，我就在擔心小虎是不是能和我們一起過中秋，結果，牠還是趕上了農曆七月底的收魂列車回天家去了。小虎雖然是隻苦命的小狗，但也是隻幸運的狗兒，因為愛讓我們相遇，讓牠能脫離童年暴力的陰影，縱使我們之前生活過得不平順開心，但始終都有愛的圍繞和支持在我們之間。


    我自己使用台灣花精後，覺得花精的背後有更廣大的光的訊息和連結，心想，若是狗狗使用的話，在世的時候，會開心的多，往生後，靈魂也不會孤單無依吧。花精除了讓牠們平穩安定外，對食慾偏低的小虎，花精後來變成延續牠生命的支持力量。


    十一號晚間，小虎就與世長辭了。在把牠安置在紙箱裡前，我餵牠吃最後一次的咸豐草花精，並告訴牠：不管你去哪裡，都要像咸豐草一樣有生命力且開心喔。牠這輩子就是心事太多。


    牠的離去，讓我們都很悲傷。諾寶是我們家另一隻老狗，在小虎斷氣那刻，到我把骨灰抱回家這段時間，牠都很鎮定，還不時察看我和媽媽的狀況。聽說，蒔茶花花精是從一棵老茶樹所擷取的花精，她看過許多生命的輪轉和變化，所以很了解老人家的心情。自從我家的諾寶使用蒔茶花花精後，漸漸不再固執，更好溝通了，感覺成熟許多，心打開了許多，心量也大了許多。花精真是幫了我很大的忙。


    (上)「艾草」驅邪保健，保護身體能量場

    (中)「百合花」充足的能量，燃起生命的希望

    (下)「咸豐草」自在、快樂、自信


    面對生活的壓力，寵物也會有情緒、也會面臨生老病死，牠們的心靈同我們一樣，渴求回歸自然，接受天地的滋潤。花精能夠補足寵物心靈空乏的區域，讓牠們與生命的本源重新連結，回歸天賦的本能，更樂天知命。生理的病症則可以用藥草訊息來調理，不同藥草訊息都能活絡全身氣脈，對動物生理各部位的機能，有獨特的療癒效果。


    ### 寵物也有心靈需求


    有人餵家中的老狗喝「蒔茶葉訊息」（藥草），溫潤的能量，會先舒緩狗兒的情緒壓力，再針對老狗各部位的生理機能，進行活化與調理。


    有一位養貓的朋友，家中的母貓因為開刀結紮，深受創傷恐慌，幾年下來身體一直相當嬴弱，個性也畏縮逃避。牠常會因為身邊突然的聲響，而驚嚇得彈跳有一公尺高，腸胃不好，總是嘔吐不止。她給家中的母貓喝過幾次「艾草訊息」（藥草）之後，居然意外治好了貓咪易受驚嚇的狀況，漸漸的貓咪回復了應有的豐腴。她說：「我也餵牠喝紅蓮花，可以感覺到貓咪立刻看起來有精神多了，她開始會主動找另一隻貓咪玩耍追逐，跟以往無精打采的樣子完全兩樣，花精和艾草顯然讓她的心情也變好了呢！」


    花精也意外救回了一隻小鳥的性命。有一位媽媽養了一隻嫩綠可愛的綠繡眼，平時任牠在家中自由活動，但有一天綠繡眼不小心被小孩壓到，不知道是因為驚嚇過度，或者受傷了，躺在地上奄奄一息。全家人都很難過，對牠的存活抱著悲觀的希望。但這位媽媽突然靈機一動，找來孩子正在使用的蓮花花精，滴了一滴在鳥兒嘴裡。奇蹟發生了，第二天綠繡眼居然意外活了過來！全家人對這件花精救小鳥的故事，一直到現在都津津樂道呢。


    寵物因為身軀小、個性單純，無論使用花精或藥草訊息，效果都比人來的迅速且直接。訊息能量可以迅速行竄身體能量場，安定身心靈的狀態，速度可比一般物質或藥物直接而迅速。


    我針對寵物的心靈需求，研發出十至二十種寵物專用花精，無論在訊息波頻、能量結構上，都是針對寵物而量身打造的。可愛的動物們感受到花世界所傳遞的美好能量與訊息，和主人之間將構築更完滿的緣分關係，彼此之間多了一份共享的美好事物。


    ## 首席花療師的經驗分享


    如果你已經自行選擇且體驗過台灣花精，想進一步透過專業的心靈諮詢，探索更深廣的心靈層面，這時通常會想知道的是，花精諮詢會面對什麼樣的過程，進入什麼樣的場合，怎麼選得最適合自己的花精，又該做好什麼心理準備。有些朋友體驗到花精對自己的生命、生活的深刻影響，受到花精精神的感動，有意願成為一位花精治療師，第一個疑問便是：我該如何成為花精治療師？


    為了確保花精的精神正確的傳遞出去，花精治療師能夠學習到此療法的精髓，發揮其靈活作用的特質，對使用者達到最好的心靈調癒作用，我很重視花精治療師的培訓。由於台灣花精從擷取、研發、製作到應用與服務，已擁有完整的體系與資訊，所以花精治療師能夠學習到的不只有花語應用等表淺的層面，還有更深廣、屬於花精本質的資訊，及訊息應用的各種可能性。我將親自教學，分享我的研究發現與應用心得，充分傳達我所體悟到的花精世界奧義。


    接下來，我就從自身的經驗開始講起，盡量讓讀者能夠「想像」花療室中的情境，也許瞭解了這個部分之後，我們可以更進一步檢視自己接受花精諮詢，或成為花精治療師的意願與可能性。


    ## 花療室面面觀


    日、每日，有來自各方的朋友接受花精心靈諮詢，我的花療室像人生舞台的縮影，我看見人性的脆弱與人生的百態。有人理性、有人感性；有人大方開朗、有人謹慎小心；有人心無芥蒂一進門便對我開口滔滔不絕；有人則自始至終緊閉雙脣，絲毫不肯吐露隻字片語；有人過於心痛而忍不住流淚。有時候父母孩子、伴侶，甚至一起在花療室裡接受我的心靈諮詢，急切地想要整理親密關係的問題⋯⋯。


    因為花精治療師的身分，我間接也體悟到千百種人心的苦，我聆聽過無數個生命的感動故事，人生是如此辛苦又過於無常。


    來到花療室的朋友或許已意識到自己的情緒問題，或者還不自覺，身為花精治療師，我最大挑戰是，如何引領每一位前來接受諮詢的朋友，信任花精存在的愛，且願意接納自我，勇於改變，走出心靈固有的封閉或僵化模式，提升對自己情緒的覺察度，以打破其有意無意間砌築的心牆。協助他選擇最恰當的花精，並且在花精的陪伴下，信任、安心地度過情緒的整理過程。


    舉一些我在花療室遇見的例子，我用不同花朵的特質來代表，並不代表他們一定會跟該種花精情緒相應，純粹是有趣，別無它心。


    ### 含羞草花型


    花型像顆敏銳的雷達


    代表典型：舉止優雅、覺察力強


    這類型的朋友多半接受過良好的教育，自我情緒管理能力佳，過去並未經歷重大創傷，現實生活也安穩無虞，擁有美滿的家庭、安定的工作。生活中也許難免有些小煩惱，整體身心而言十分順遂。


    花精不只有平衡情緒問題的作用，她也是心靈的「營養補充劑」，能夠充實精神層面，讓我們對人生更有方向、更加樂觀積極。遇到這樣的朋友，花精可以給予他們提升靈性的力量。


    例如有一位在大學任教的女士，使用第一瓶花精之後，就表示頭腦變得清晰了，表達能力也無形中變好了。課堂上，她注意到學生聽課的表情與眼神，變得十分專注。她提到，有一回先生因為臨時無法接送孩子，緊急來電請她代替。換作是以往的她，即便已排定計畫，也會匆忙結束眼前的事務，硬著頭皮趕去接孩子，弄得自己委屈不已卻有口難言。但這一次，她勇於表達自己的難題，態度堅定但柔和的告訴先生，她無法及時離開，最後兩人商議其他辦法，而平順解決了難題。花精讓她的心靈意識提升，頭腦清晰，懂得調適應變之道，對四周環境的覺察力變得敏銳，建立夫妻之間良好的溝通管道。她整個人散發出自信的女性氣質。


    ### 角桐草型


    花瓣不對稱，花朵色紋不規則


    代表典型：性情急躁、不安的人


    焦慮似乎是現代人的通病，它讓人慌張、焦急、緊張，做事無法集中注意力，總是下意識地想逃離眼前的事物。於是生活節奏愈來愈快，精神愈是緊張，感覺自己像個不斷自轉的陀螺，無暇思索，也停不下來。


    這類型的朋友走進花療室，有時會以滔滔不絕的話語，掩飾內心的不安，應答迅速，不假思索。我會以花精的能量，先安定其神經系統，撫平他的慌張與不安，接著再深入瞭解他的情緒癥結。


    ### 狗尾草型


    花柱挺直像隻狗的尾巴


    代表典型：主觀意識強的人


    這類型的人多半過度理性或主觀意識強，臉部肌肉顯得僵硬無笑容。有些是應朋友、伴侶的要求，帶著對花精半知、半解、半強迫的心情，前來接受花精心靈諮詢。走進花療室，他們會理性一再地強調自己沒有任何情緒問題。自我情緒檢測表的勾選，也多半是程度輕微或偏無。


    有趣的是，這類的朋友在經歷一至二瓶花精療程之後，會放下當初主觀的意識，想要深入認識花精的作用，在情緒檢測表的勾選上會看見情緒的變化。有的人開始覺察自己情緒方面的改善，例如「比較」不會發脾氣、對孩子「比較」有耐性、對上司、朋友「比較順眼」等等，顯然他們在使用花精之前，已有這方面的問題，而無意改變，也不認為那是個情緒問題，而花精幫助他們提升對自我的覺察能力，看到了自己的盲點，進而以正面能量幫助他們逐漸調整自我，獲得和諧的人際。


    ### 刺葉王蘭型


    花株高聳立於刺葉之上


    代表典型：尊貴、防衛心強的人


    有些朋友通常只是來體驗台灣花精到底有多「強」，有的過去已有豐富的治療經驗，或者本身是身心靈或自然療法工作者，他們時常是抱持著既有的專業主觀態度，前來接受諮詢。也許自認為已經很瞭解自己，分析生活的事件時，有他自己的見解，或者對我治療的態度比較疏離，抱持不信任的忽略態度。有些朋友還會直接表明，他沒有情緒問題，不想填寫情緒檢測表。


    我也遇過對我、對宇宙訊息好奇者，會為我算命，打趣的告訴我，我前世是誰，從哪兒來，有什麼使命等等。甚至有人來一趟諮詢，只想見識我的修持功力，有沒有辦法「看見」他背後的「尊貴靈魂」。我的態度是尊重每個生命的表現形式，委婉的告訴他，不管我們的前世是誰轉世，不管我們的指導靈多麼尊貴，身而為人，就必須從人的角度踏實修起，真誠的面對自我，人身是很難得的，何況我們一定是有緣才相聚。


    面對這些朋友，我最好的方式還是請他直接體驗花精能量，讓花精「說話」，打破他的認知。花精的能量能平衡理性與心靈，讓人們輕易卸下心防，用客觀的態度，來重新看待周遭的人事物，這樣來趟花精諮詢才不會錯失認識花精的機會。


    ### 玫瑰花型


    傳情說愛之花朵


    代表典型：感情困惑者


    這類玫瑰型的朋友在感情上受創。當一個失去愛的朋友，出現在花療室時，都會像個沒心的稻草人，暫時聽不見自己心跳，彷彿世界的一切都因愛情的挫敗而停止。首先我會靜心聆聽他們道出失落的愛情故事，傷心、流淚宣洩積壓的情緒是難免的。我明白當愛出現問題，一切的生活都會失去動力，失去人生方向、失去自信心。甚至是沒有勇氣拒絕不對的愛情。


    花精能夠為我們即時填補失去的愛，讓人有勇氣看清愛情的盲點，承認感情出問題，走出感情創傷的陰霾，重新建立自信與魅力，選擇更有價值的人生觀，活出自己。


