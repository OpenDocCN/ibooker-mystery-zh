    由於藥草訊息不僅擷取植物本身的能量，包括植物與自然的互動、與宇宙天地呼應的磁場，都被保存在訊息當中，我發現艾草訊息純陽的能量，不但可以瞬間強化人體能量場，免於受外在不正之氣的干擾，而且可以平撫慌亂焦躁的心情。


    國內一家知名的自然醫學診所，以能量檢測儀器測試艾草訊息。院方找來一位癌症患者，針對診所內各種健康食品檢測，效果都不彰，取用一瓶艾草訊息來檢測，患者的整個能量場當場就平衡了！他們再找一個自閉症患者來檢測，發現艾草訊息可以平衡患者的神經系統！院方再取用單次使用的量（滴管四滴）來做檢測，同樣能達到平衡。衷心期待能有更多相關的公益團體、專業機構，共同參與我們的研究計畫，讓藥草訊息能夠建立更多元寬廣的資訊與發展。


