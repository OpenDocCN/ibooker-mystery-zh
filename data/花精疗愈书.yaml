    ## 我最熟悉的台灣花朵


    人不親土親。根據宇宙自然法則，本土的花朵和我們分享著共同的水土與環境氣候，是我們最親近、最熟悉的。幾經測試之下我也的確發現，本土花朵的訊息能量對我們最有親和力，因此我選擇熟悉的土地，擷取純淨山林原野所生長的花朵訊息，來製作花精，協助讓我們的心靈深耕發芽。


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_37_0.png)


    台灣地區有三分之二是高山，純淨的山林內一年四季隨處可以找到上萬種的花朵，我花了多年的時間，穿梭尋覓各種可對應情緒的花朵能量，成功製作出八十多種花精，足以因應現代人的各種情緒困擾，如焦慮、驚恐、憂傷、憤怒、嫉妒、缺乏自信、緊張壓力、憂鬱、躁鬱、恐慌、煩惱失眠，以及各種情緒所衍生的心身症狀。未來我將持續努力，探索更多的宇宙自然奧妙，研發豐富多樣的花精。


    「台灣草紫陽花」是台灣高山地區生長的純淨花朵


    ## 花精引領我們進入深廣無涯的心靈之海


    自從台灣花精正式對外應用以來，有憂鬱症患者在短短三個月的療程之後，累積數年的憂鬱症狀大幅減緩，而前後判若兩人；有恐慌的精神官能症者，從情緒的深淵提升到靈性開闊的層面，不但心身恐慌症狀消失無蹤，面對生活中的重大災難時，理性沉穩的態度連病人自己都嘖嘖稱奇；更有許多人因為花精整理好其內在的情緒壓力等病源，連帶困擾已久的心身症狀，如五十肩、失眠、疲勞、肥胖也獲得改善。


    為了讓花精能深刻而徹底的調整人的身心，我不斷研究、探索如何在擷取花朵能量時，完整取得花朵精神的訊息——這其中包括花朵本身的療癒能量、花朵與大自然彼此互應共存的關係，以及每一株花朵和其精神的本源「宇宙花能量場」的連結。


    如何確保在花精的製成過程中，自始至終保持訊息能量整全而不受損害呢？這涉及擷取花朵訊息時，對花朵、大自然、宇宙的尊重與瞭解，載體「水」及保存作用的「酒」的徹底淨化技術，以及訊息調製技術等。詳細的製作祕訣，我將在本書中逐一公開。


    取得訊息結構完整的花朵能量，確保其能量波頻精準共振人心，是我在研製花精時堅持的原則，也是台灣花精不僅能有效調理情緒，直抵心靈核心，而且能使意識超越昇華，擴及大自然，甚至宇宙同體的祕訣所在。如同我一向堅持的：花精不只是平衡情緒的心藥，更是引領我們往內進入深廣無涯的心靈之海，往外連結無邊宇宙意識，瞭解生命真諦的珍貴至寶！


    ## 花精讓我們看到個性的盲點與缺失


    根據我運用花精的經驗，花精對人的影響與療癒，有個典型的歷程。花精激發人的自省與自覺，讓人真正徹底改變自己，以下是其中一例：


    陳小姐是一位貿易公司的中階主管，看起來嚴肅、眉宇深鎖。她常常必須面對工作方面的決策與管理壓力，然而最令個性直率的她困擾的是人際關係的問題。在工作中，她不但要面對同事之間的競爭壓力，而且時常感覺到上司的刁難，還有部屬的故意違逆，這讓她總是處於備戰狀況，而顯得防衛帶刺。


    第一次來諮詢，我先給她比較能夠紓解工作壓力的花精。經過半個月之後再見面時，她冷淡直率的告訴我：「沒有什麼感覺啊。」我馬上明白她還未十分滿意現況的轉變，她一直是個過度緊張、要求過高的人，我想她的意思是：「大家還是對我很惡劣啊。」然而和第一次諮詢時比較起來，她整個人顯得比較柔軟，防禦心減低，心情明顯放鬆了許多。從她所填寫的情緒檢測表，也可以看得出來，許多部分勾選的情緒強度已經降低，我詢問之下，她也承認：「整個人感覺比較平靜。」這時她才告訴我，她真的很期待花精可以幫她改善和同事相處的問題。


    第二瓶花精我開始針對她的人際關係問題對症下藥。使用期間，她有了奇妙的體驗。她開始「看」到自己在面對同事之間的競爭壓力時，內心的憤恨和防衛。她一面因為忌恨而做出傷害同事的行為，一面卻又清醒地看到自己的所作所為，以及當下心底湧現的種種不滿、怨恨、嫉妒、憤怒、敵意、罪惡。她形容說：「台灣花精實在太猛了！」因為花精讓她「血淋淋」地看到自己的起心動念以及所作所為。


