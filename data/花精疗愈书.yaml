    ## 順勢療法與花精療法的差異


    我們常會以順勢療法的原理來解釋花精的作用，舉例來說，一個人有恐懼的情緒，就找到一種有恐懼頻率的花來治療他。這是順勢療法「以毒攻毒」的原理。簡單來說，順勢療法採用的是自然的療法，激發人體自主防禦能力，讓人自然而然恢復健康。把有毒物質如砒霜等，運用稀釋或震盪方式，將物質的質量稀釋到幾乎不存在，此時能量會達到最高。醫師運用此藥物將病人的症狀激發出來，進而排出體外，使人體自行產生抗體，提升免疫系統能力。


    花精和順勢療法相似的部分，是兩者都有稀釋與震盪的步驟。我發現，花朵訊息在稀釋達一定狀態，震盪至一定倍數時，確實會激發其能量，使之全然開展，此時所得到的，是訊息結構最完整狀態的花精能量。然而，若將花精訊息不斷稀釋再稀釋，卻會導致訊息愈來愈模糊扭曲，最後能量結構瓦解，只剩下些微的撫慰效果。花精訊息的這個特性，與順勢療法顯然十分不同。


    此外，根據我臨床應用的經驗，花精的作用不只是「以毒攻毒」平抑情緒而已，最主要是心靈層次的引領，當花朵愛的本質與結構進入我們的意識中，內在原本匱乏的部分會滋長，創傷的坑洞會修復，心靈才能得到真正的轉化與提升。花精提升人的靈性層次，進入更開闊的生命意義當中。


    花精是細緻的振動波頻，大部分的人雖然對能量的感受比較不敏銳，而無法覺察到這微細的振動，可是當花精進入身體後，卻可以明顯感受到自己身體及心境變化。我衷心期待透過訊息完整、能量精準的花精，這份美好的花國度珍寶，能夠以正確的理念傳遞開來，讓更多人感受到花精真正的愛的精神，體會到身心靈各層次的開展與昇華。


