    ## 鮮花療法


    說出我的心


    一天有個學生問我：「人活著是為什麼？」我直覺回答他：「愛人與被愛啊！」他聽了沒說話，笑笑嘆了口氣，好像無須再申論，話題就結束了。我們都默認這是個不爭的美麗事實。我們一生中都在愛人與被愛中成長，愛出問題，人的心性會偏失，正面心靈的力量會萎縮，看待外在的人事物會產生偏頗與扭曲。唯有付出行動去愛人與珍惜被愛，生命所展現的能量才是最極致美妙的。


    宇宙生命的本源是「愛之光」，充滿愛與創造的原始能量，所有萬物都由此孕育而生，植物與動物都是能量光的聚合體。在靈性上，花為我們人類展現了愛的存在，每株植物開出的花，就象徵一個人的內在心靈顯化。當我們特別喜愛某種花時，那朵花的顏色和姿樣，剛好共振呼應我們目前的心境，所以我們會被這朵花的樣貌所吸引而產生「愛」。換句話說，那朵花的「美」像是我們靈魂美麗的化身，我們可以由此花朵的花語訊息，閱讀自己的心靈密碼，從其中學習到愛，如何像花一樣自在展現自我。


    由花朵中擷取訊息製作而成的花精能量，已將花朵訊息解碼、轉譯為花語，讓人更容易感受花釋放出的振動頻率——愛與智慧，我們可以藉此輕鬆感覺花所給予的心靈成長訊息。你也可以用心找到你的心花，藉以看到你的內心世界，很多生命的奧秘就典藏於其中。


    小時候常常上山，大自然點燃我對生命的探索，野花、植物的能量也是其中推手，我們同生於一處，似乎是一種再自然不過的緣份，當人出現任何身心靈問題，我也會自然而然的認為找她們就對了。單純的「想」運用大自然的生命能量來助人，力量竟然就渾然天成，這也是我發現、研究植物花朵能量的起源。


    在花精製劑未發展前，有一段時間，我運用鮮花的能量直接來治療「心病」，有些人我會指定他們購買花朵種類，後來發現鮮花種類不是每次都可以依照指定找到，於是請他們自選所喜歡的花，我由他們所挑選的花種轉化能量時，憑著「看花」的外形，居然也能瞭解到他們的心靈問題，因此我更是明白「一花一世界」的存在奧秘，而每種花正可以呼應每一個心靈的真實現況。


    ## 發現花朵生命力的本源


    直以來，我在運用鮮花療法時，所擷取的不只有花朵本身的訊息能量，花朵扮演的比較像是「天線」的角色，我循著她的訊息溯源，發覺每一朵花都和宇宙的花能量場相應。這也就是為什麼花朵能展現圓融的智慧光華，隨順宇宙韻律而生長，知道何時盛開，何時凋謝，有些花甚至能預知氣候節氣變化，在下雨前闔上花苞，陽光照拂前先讓花瓣完全舒展開來；有些白天開花傍晚安眠，有些則夜晚盛放直到天明。


    宇宙花能量場是地球上所有花朵生命力的本源，蘊含無窮奧妙的訊息，我透過花朵這個管道，連結花能量場的訊息，將之轉化至人體能量場，讓人體與花能量訊息相通共振，以達到平衡情緒與身體病症的效果，每每總是發揮奇蹟般的結果。


    這個發現也為我往後成功研發出台灣花精的過程奠下了扎實的基礎，更是花精訊息的品質不易受到影響與干擾主要的原因之一。


    ## 宇宙花能量場：花朵生生不息的奧祕


    宇宙花能量場是一個溫暖和煦、充滿能量，而擁有高層次智慧的寬廣世界，蘊含宇宙生生不息的訊息。有些接受鮮花療法的病人感知到這個世界，形容自己閉上雙眼時，眼前會看到一片花海，一朵朵晶瑩透亮的花，由天而降，而自己置身於其中，感覺到溫暖、舒適、被愛所包覆，而且全身鬆弛，心也跟著柔軟了下來。


    我知道宇宙花能量場的存在，不但靈活從其中擷取花朵能量，轉化後為人治病，同時也不斷從中汲取有關花朵能量的靈感智慧來應用，而獲得許多寶貴的經驗。然而在實行鮮花療法的過程中，這無比珍貴而充滿智慧的世界一直沒有機會公開，因為它太過抽象而難以描繪。


