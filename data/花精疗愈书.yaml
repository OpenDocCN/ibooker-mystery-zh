    # 作者簡介


    陳祈明老師，1966年生，是台灣新光宇宙訊息能研究學會的創辦人，多年靜坐、練氣、研讀易經、中醫學、針灸與藥草學，能敏銳感知且運用細緻的訊息能量來治病，自行研創出台灣花精、藥草訊息及訊息排毒、全頻率的宇宙光波訊息、訊息活化飲用水、微量元素訊息、訊息美容系列、空間淨化訊息等先進訊息療癒能量，是目前世界上少數懂得完整擷取且應用自然訊息能量的專業人士之一。


    新明老師對東西方修練體系、中醫經絡心理、針灸、藥草與養生保健、疾病與身心靈的關係、情緒抒壓，有深入的實務經驗，常受邀至各大專學院、機關團體演講，首創先例提倡「訊息健康觀」，以訊息療癒身心、養生保健，引領更先進的健康概念。新明老師希望能以天地的自然能量，帶給人最徹底、自然且毫無負擔的健康生活。


    新明老師著作有《發現台灣花精》（心靈工坊出版）及本書。


    陳新明與張秋敏


