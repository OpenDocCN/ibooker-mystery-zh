  mdcn: '# 我們因為花而看見自己


    為了讓大家更直接體會花能量的美妙，確信花跟人的心智是互通存在的，鮮花療法在台灣花精正式問世之後，並沒有被淘汰不再運用，反而成為有力佐證花能量存在的事實。


    我利用鮮花療法，讓參與者沉靜明心選出他所喜愛的花，先仔細觀察植物花朵的構造，再將花彩繪出來。在畫花的過程中與花訊息深入共振，激發心靈意識微妙的變化，發現自身念頭的起落，在觀照心思的變化後，將情緒忠實記錄下來。等到做完花能量訊息傳導後，靜下心細緻體會，我們會真實的感覺花能量對身心的調撫，記下身心靈的轉變，等到花語解析公布時，總令人不得不承認花朵與人的心靈有多麼微妙的關係，植物和人皆是具有高靈智慧的展現，讓人放眼心界，感受到宇宙造物的神奇！


    鮮花療法除了能讓參與者清楚感知花能量，激發心靈意識微妙的變化，從而發現心靈的問題；由參與者所選的花，也可以幫助我很快瞭解到他目前的情緒狀態。通常我會先讓參與者清楚花朵、花精對身心靈的作用，再安排室內「鮮花療法」，與戶外「鮮花療法」的體驗，而花精與花舞體驗穿插於其中，讓他們多方面體會花能量的療癒特質。


    當我們不清楚花與自己及心靈的關係時，先由室內幾種鮮花的賞析開始，在沒有外在環境干擾中專注地進行，體驗花真實的力量，帶著對花能量的尊重與信心，會讓心靈的成長蛻變得更快。等到戶外鮮花療法進行時，我們已經在花能量的呵護中提升成長，當我們走出戶外在大自然中找尋心花時，心能更清明開闊，敏銳呼應花朵所散發的能量。這時健康的心會深呼吸，更能體認花與大自然的微妙魅力，啟發心靈的意識能量會更強大。所以鮮花療法乃是認識花精的重要入門，鮮花療法讓心靈的本質呈現出來，我們的心以花為象徵，因為花而看見自己。


    (左頁圖) 敞開心，與大自然一起呼吸


    ## 呈現豐富多面的花朵


    室內鮮花療法的體驗，首先我必須挑選植栽在盆中的鮮花，不但方便移動，而且傳導完花訊息之後，花朵仍舊可以鮮活地綻放，植物的生命力延續著，不會因人的私心掠奪而犧牲。


    選擇人工盆栽的鮮花須特別注意訊息的整理。大量栽培的植物，主人所給予的愛有限，她們被附加金錢交易的目的性而成長，所以買回時，我會先整理、轉化掉植物不平衡的波動，包括：農藥、化學肥料、催花藥劑等人為訊息，讓花的能量恢復自然健康的展現，讓植物受到像貴客般的尊重、關愛與祝福，在細心照顧下、讚美聲中，安心成長，釋放花朵的「至愛」力量，然後再提供做為鮮花療法的素材。


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_66_0.png)


    「高山薔薇」啟發心靈的意識能量


    選擇的盆栽條件：鮮花花朵完全綻放，植物特性、花朵外型、顏色差異性大，這樣可以使參與者在選擇花時有鮮明的條件區分，能突顯不同個性的心靈樣貌，提供做鮮花療法的相互比較，充分發現花朵多面的豐富性。


    ## 花是心靈的明鏡


    從我們平常對花的感受，即可覺察到我們的心靈狀態。如果不太感受到花的存在，可能平常是輕忽自己內心的感受，對於愛人與被愛是冷漠的，也不注重心靈層面的耕耘；如果看得見花又無心駐足欣賞，可能是內心的不安早已被現實生活壓力淹沒；看見花卻怕花凋謝，也許是我們內在有深層的悲傷，對人生保持著悲觀的態度；而只喜歡特定的花或偏好幾種花，意指自己對內心的失衡狀態有自覺，希望利用某些方法來調適情緒；對花總是心喜也懂得欣賞、讚美花朵的人，心靈的能量清靜，有一顆願為愛而付出的心，人生的態度是樂觀的。


    ## 感受到花的「開心」或「哀傷」？


    有人問：「我也可以感覺到花是開心或哀傷嗎？」其實花之所以能成為療癒人心的心藥，正因為她是植物智慧昇華後的意識能量。花朵表現的純粹是植物的正面精神，當植物健康、正面力量強時，花的展現力就更美，健康的植物讓花朵訊息更能發揮愛與自在的能量。每個人都有一顆「初心」，而花就好比我們的心靈（初心、良心）一樣聖潔，沒有人的心靈是絕對邪惡的，即使我們的心念再壞，仍舊存著善、美的本心，如果做了壞事，任何人都逃不過自己良心的譴責。


    我們覺得花朵看起來很憂鬱，事實上是花朵訊息調動出我們憂鬱的情緒，讓我們看到了自己內心的憂鬱。我們以為接收到了花哀愁的訊息，但說不定，所感受到的是身旁的那棵樹，或附近的岩石，甚至是旁邊調皮小精靈的訊息。天地萬物皆由能量組成，都會散發訊息和波頻，只是看當時，我們的情緒狀態和哪一個頻率共振相通。提醒大家，應該把注意力先放在自己的感知上，透過花而清楚看到自己的心（見花明心），你會發現你的心靈世界許多耐人尋味的地方。


    我們為何會共振到花的負面特質，而產生負面的情緒呢？其實嚴格來說，這個部分是植物未昇華為花之前的精神特質。植物為了生存，本能就有一套自衛自保的求生機制，這機制就像人為了使生命有所延續，而衍生出慾望、私心及小我一樣，心靈意識也因此必須承受諸多物質慾望的考驗。


    由於心靈受苦，人開始懂得追求、提升心靈的轉化力量，因為體悟人境的苦海而離苦——就像植物不為現實環境所動，仍然用純潔美麗的花朵，時時散發、傳播宇宙至愛的心。所以每個人見到花，都會反應心靈的真實面，或反照出心靈的創傷，而植物用智慧、花用愛，教人走出創傷，展現生命的契機。


    ## 鮮花療法的步驟與原理


    這一回的室內鮮花療法，我準備了五盆花，分別是海棠（黃花）、彩鐘花（紫花）、瑪格莉特（淡藍花）、仙克蘭（粉紅帶淡紫花）、矮牽牛（粉紅花）。請翻開第 70 頁，選出你喜歡的花。


    我將這五盆花擺在教室各角落，請參與者先用直覺作花朵賞析，賞析這五盆花帶給自己的感覺，然後坐下「沉靜明心」，瞭解自己現前情緒的癥結，以虔敬的心「祈敬花場」，感謝宇宙花場給予愛的能量，開心領受這美好的潤澤。


    做完這幾個步驟後，參與者就可以再次認真賞花。「尋花互應」是找尋與自己內在心境共振的花，也就是感覺自己最喜歡哪一盆花，這時就可以坐在花邊，用心端詳植物的全貌，花朵樣態、枝梗走向、葉子脈絡，從花苞到全花盛開，花朵是如何依續呈現姿樣，特別是花朵的顏色、花紋的分佈、花瓣的開合組成、花蕊的伸展等等。當我們賞析花的同時，花的能量也正因我們的開心領受，而與我們的心靈交會，共振訊息。此時我們一邊彩繪花株，一邊傾聽內在的聲音，當內心未平衡的波動因花的訊息而調動時，我們會覺察到自身情緒變化的過程。


    進行「彩繪花株」時，很多人第一次如此靠近看到花，舉起畫筆會猶豫不敢下筆，怕太久沒畫畫，畫不出來。但是當我們一筆一筆描繪出花朵時，心靈會與花的能量共振，彷彿有股創生的力量由心底冒出來。在繪畫花朵的過程，花的純淨訊息給予心靈重整的安定空間，我們的念頭會變得清明。當我們完成畫作時，除了見識到自己繪畫的潛能外，很多深藏入潛意識的不平波動，也會藉手的繪畫訊息傳寫入畫中。描繪花朵的姿態角度、彩繪的用色、整體構圖、筆觸運作等，都可以顯現每個人獨特的心靈意識，也同時藉花看清自己內在紊亂的心靈漩渦。


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_70_0.png)


    彩繪花株的過程中，花的純淨訊息給予心靈安定的空間


    安定是每個人渴求的心靈祕境，發現、正視情緒的問題，才能使花朵訊息快速進入修護心靈創傷，平衡情緒問題。繪畫完成後，請大家端坐靜下心來，進行「花訊傳導」能量淨化，靜待我傳導花朵訊息，讓每個人真正與花進行深層的心靈交流。


    花朵本身已具足植物原有的能量，我只利用鮮花為天線，傳導連結宇宙花場，讓花朵訊息結構更活躍且細緻。花朵訊息進入人體的電磁場，充分精準地展現愛的力量，激發且轉動心靈的能量，在靜心調癒時，彩繪花朵過程中被牽引出的情緒波動，會因為花的愛而受到撫慰，產生修補心靈創傷的動力，我們會感受到一種失落已久的寧靜安詳，開始安住於心。


    花朵無私地為人展現愛，人因花的訊息而感知美的存在，原來心靈受花的淨化後，就會如同花瓣般層層綻放，進而生起對大自然的敬愛，以感恩心「回饋花場」，重新以平等尊重的態度看待一草一木與大自然界。


    「花之讚」是人經過花能量的洗滌之後，心靈感知到花朵存在的神祕力量，而發自肺腑的禮敬花的無私奉獻。我們可以經由歌唱、舞蹈、詩詞、話語的歌頌，讚佩花為人間傳播愛，人間因花的點綴而充滿力量。感謝宇宙造物的神力，讓花四處開放，治癒複雜的人心。當我們在繁忙生活中，看見花也同時遇見心靈的美麗，我們欣賞花朵時，剎那間便回歸初心的善美本質，有一種純淨、自在與喜悅的振動頻率悄然而起，這就是心靈展現愛的真正原型。


