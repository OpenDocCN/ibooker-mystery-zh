    至於深層療癒系列的花精群組，顧名思義，當然是治療層級的花精。這類花精所調動的情緒很深層，可能將埋藏在潛意識的創傷訊息呈現出來整理，或讓我們赤裸裸的看到個性的缺點現形。心理調適的過程中，也許會產生哭泣、憤懣、悔恨、恐懼、沮喪、心痛、胸悶、頭痛等情緒或生理好轉反應，因此建議經由花精諮詢，由花精治療師專業判斷與輔導。


