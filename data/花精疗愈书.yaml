    在這五盆鮮花中，黃花海棠很耀眼，花朵會集結展現吸引人的目光，我們很容易被團團盛放的花朵吸引而靠近。但想要仔細欣賞鮮明亮麗的海棠花，卻會發現很難看清花朵的真貌，令人眼花。原來她並非只是一朵朵花集結綻放，而是一串串的花瓣相連，大小不一，花瓣組合的數量也不同，遠看像是一朵大花，層層疊疊的小花，有著不同的展現空間，卻目標一致對外齊放。這花朵多元豐富的外型，再加上亮眼的鮮黃色，會讓選這種花的人眼花撩亂，畫花時無法明確表現花朵形狀，越是努力畫，越是畫不清，最後塗成一團黃澄澄的花。


    黃花海棠的能量訊息，可以療癒自我認識不清、過度犧牲奉獻的人，讓我們在清楚的身分定位中，像一朵亮眼的黃色花，給人光輝無私的愛。與這花相應的人，在個性上隨和，喜歡付出，給周圍的人豐沛的愛。好比大大小小豐滿盛開的花，比枝葉還要茂盛，即使花瓣從末梢凋萎，仍然會努力留在花朵上直到完全乾枯，展現生命最後的力量。


    單看黃花海棠的花朵，不易辨識每朵花的獨立輪廓，好似人無法表達內心真正的想法，容易迷失自己，而失去角色的定位。就像人過度犧牲自己，耗盡所有的精力仍願意付出，而忘記自己也需要被愛。具有黃花海棠特質的人，心地是善良而慈愛的。海棠隨和的花樣，也象徵一個人的個性沒主見，常拿不定主意。花朵訊息可以調整這類型的人，讓人瞭解自己的光明正面特質，勇於像花一樣表達自己的意見、個性，重塑自我身分的價值與定位。反之，有時候我們會過度開放，而失去了原有的表現分寸，這也可能呼應到海棠的負面特質，花朵能量會讓我們知道如何調整自我，擁有合宜融洽的言行表現。


    在參與的二十五人中只有三個人選擇這花，是因為大部分的人都瞭解，愛是有條件分寸的，而且清楚自己的承擔能力。選擇海棠的三個學員，是在所有人全選好坐定位後，才在猶豫之下最後落座的。有一位同學站在黃花海棠旁遲疑、拿不定主意，最後受到別人的催促，才匆匆決定，這正符合海棠花沒主見而隨和的個性，而她是所有人中表現最大方、開朗，會開懷大笑的人；另一位是有著燦爛笑容、給人很多溫馨慈愛、最具有媽媽特質的人。所有人都定位後，最後一個學員才選定海棠，她長期以來總是過度的付出，一直在找尋自我身分的認同感，懼怕對別人表現自己的個性。


    ## 心得分享


    淑葵——個性隨和樂觀、笑聲爽朗，易使人感染歡樂氣氛。


    第一眼我比較喜歡海棠，可是覺得其他花也都很漂亮，我這人可能有點好大喜功，就想選海棠或矮牽牛，因為她們看起來似乎比較亮眼。最後因為被人家制止，我才停止亂跑，心想：好吧，索性就選比較少人選擇的海棠吧！畫的時候我才發現，很難去表達這個花的型態，我每次好像都只看到外表，沒有看到真正的她是如此複雜。


    老師進行花訊傳導之後，我感覺頭頂好像有光，只要一抬頭，就有白色的光從頭上方照下來。有聞到一陣花的味道，這時心境安定平和，不再有花，是一片平坦，只感覺很舒服，溫暖。再度打開眼睛看到花，心裡有一種感謝，花開得太好了，謝謝。


    如玫——大大的雙眸，炯炯有神，敏感多智，樂於奉獻熱情。


    一開始不知道是誰把海棠放在我旁邊，我一看到她，心裡就震了一下，可是後來看到瑪格莉特，我又很想畫她，因為她比較好畫。但又想說既然海棠讓我有感覺，還是選擇她好了。我覺得海棠好難畫，心裡想，下次是不是要先去學一學畫，再來上課會比較好一點。我真的是不會畫，因為看海棠每一朵好像是蝴蝶一樣跳動，我畫不出那種立體的感覺。我心想，海棠你的名字真美，可是我沒有辦法把你的美麗姿態畫出來！


    花訊傳導之後，我再看海棠，覺得她很豐盈飽滿，有花團錦簇的感覺。


    淑葵和如玫兩人共同的特質是，內在都擁有飽滿的愛，她們都樂於讚美花，這共振出加倍豐富的能量，於是她們都感受到了花朵充沛的愛的能量。


    婕妤——內斂柔美，看不出實際年齡的年輕媽媽，擁有豐富的情感，寬厚的愛心。


    我選黃海棠，覺得她很飽滿厚實，很美。可是在畫時，細看花朵，會發現她的花瓣大大小小不一，這使得她看起來不像玫瑰或牡丹那樣高雅貴氣，可以登入殿堂之門。因為整叢花是層層疊疊組成，我費了好大的功夫，試圖勾勒她的邊，但真的很難，我想這應該是和我過於隨和的個性相符吧！在畫時，我也看到花的憔悴，黃色的花瓣由邊緣開始轉成咖啡色，看起來格外分明。


    老師進行花訊傳導之後，我內心一直以來，有關於人際關係界線的課題，又突顯出來了，眼淚流個不停。我很清楚，該是好好面對的時刻了。


    （由上至下）淑葵的畫、如玫的畫、婕妤的畫


    ## 四、紫色彩鐘花


    探索意識 甦醒靈性

    淨化內在 引導光明


    紫色彩鐘花是五盆花裡，開啟深層意識的力量最大的，因為紫色花朵具有靈性的力量，可以使人的靈性大大提升，思考生命存在的價值。紫色彩鐘花的花形就和她的花名一樣，一瓣成形，不是多瓣的組合，形成一個很明確的鐘型，具有深遠的神祕能量。


    花瓣堅挺，不易因觸碰而折損，每朵都可以盛開很久，生命力強，不容易枯萎，而且花可以同時在全株上下、每段枝節，朝四面綻放。每朵花的顏色、大小一致，充分展現植物自信強穩的生命力，這象徵人對自己生命價值很有認知力，時時可由任何的角度觀照自己的心念變化。花朵鐘形的穩定能量，能拔除心靈的黑暗力量，昇華靈性的覺知力，讓心不易煩躁，不會陷溺於情緒中，保持在一種沉穩自信的光明力量中。


    會選擇紫色彩鐘花的人對自己要求高，喜歡探索心靈世界，甚至對靈修有興趣。


    反之對此花有負面排拒的人，共振反應出內心有不安的深層情緒，經過此花的療癒後，可以開啟內在光明，讓心靈覺察、淨化紊亂的情緒，使心安定平衡。這花的訊息能量很強穩，傳動於脊椎，行走脈輪，所以參與者可以感受到能量氣感的存在，而使人身體往上，脊椎拉直，能量場有阻塞的人會不由自主打嗝排氣，清除身體的混濁廢氣，使氣脈順暢的走動，很適合用來調整全身的能量，更適用於練瑜珈、練氣、打坐、禪修的人。


    （由上至下）「紫色彩鐘花」具有沈穩、自信的光明力量、芝禎的畫、明媚的畫、瓊瓊的畫


    ## 心得分享


    芝禎——一雙濃眉大眼，充滿認真好奇的力量，像個大姐姐般散發快樂的訊息。


    我選擇的是彩鐘花，剛看到老師放映的彩鐘花照片，就有一種鼻酸的感覺，開始選擇花來畫時，其他花我只是隨意看看，還是決定選她。畫的時候鼻酸感動的感覺又上來了。我對畫畫不是很擅長，剛開始畫的是某一個角度，但總覺畫得不太好，就不斷修飾又修飾，這一部分花了最長的時間。就這樣一部分一部分的畫，把樹葉和根也都畫好。越是畫越有一種扎實、平穩、喜悅的感覺。從原本一筆一筆小心翼翼的畫，到後來隨興的塗鴉，心境是從感動鼻酸到開闊舒適，感覺滿好的。


    老師花訊傳導的過程中、之後，我一直不斷打嗝排氣，我知道排的越大、越順暢，我越是舒服，但不知道我為什麼會有這種反應。之後還做出身體挺直，頭往後仰，發出「啊」的聲音。這個動作不斷持續，感覺很舒服。最後身體開始做出花舞的類似舞蹈動作，自己擺動了起來，感覺整個人往上拉。


    明媚——個性小心韌性強，淺淺微笑散發柔美。


    五種花當中，我最喜歡彩鐘花和粉紅矮牽牛，彩鐘花感覺很有力量，矮牽牛則很活潑熱鬧，讓人忍不住想要親近。最後我還是順著一開始的感覺，捨牽牛而選彩鐘花。我沒有依照真實的花來畫，而是憑著印象，畫出直直的莖，圓潤堅挺的花，再細細加上黃色的花蕊和藍色的花心，從上到下，花朵開得滿滿的，感覺真的很有力量。她的葉子柔軟的點綴其中，更襯托出花朵的力量。從頭到尾，我都有些不好意思看她，可是她的樣子卻很清晰的映在心裡面。


    老師進行花訊傳導之後，我感覺身體的中央，從上到下，熱了起來，之後全身都很熱。喜悅的感覺持續了一整天。突然很想到森林裡去散散步。


    瓊瓊——敏纖多情，六歲小女孩，有豐富的愛心。


    我畫的是彩鐘花。我覺得她很漂亮，從土裡長起來，長得又直又高，花結得很快，開了很多花，而且還有好多花苞還沒有打開呢！紫色的花，看起來圓鼓鼓的，很漂亮！


    老師進行花訊傳導之後，我畫了一個大大的愛心來代表她。


    ## 五、粉紅矮牽牛


    清新單純天使心

    溫馨甜美表慈愛


    大家對矮牽牛鮮豔多色的花朵並不陌生，我們很容易在馬路邊、安全島上見到她。粉紅色的矮牽牛傳遞著溫馨柔和的能量，人們偏愛粉紅色，因為粉紅夢幻、甜美、溫馨、柔美，讓人回歸年少的青春，就像小天使般散發甜美慈愛。


    細觀粉紅矮牽牛的全株植物，枝、梗、葉全長滿細小的毛，植物為保護自己不被傷害，會長毛、刺，分泌特殊的汁液等，這像似人害怕心靈受到傷害，也會設立自我保護機制來防衛自保。分析植物長毛的訊息，像似人對周遭事物反應靈敏，行事小心；長刺訊息像似防衛的心理，使人不易親近；植物分泌有毒汁液，讓不小心傷害或食用它的動物中毒，就好比有人惹怒我們時，我們可能會起負面的心念去傷害他人一樣。這些防衛他人以自保的心，人跟植物都是一樣的。


    粉紅色是夢幻、柔和而不夠穩定的能量，容易使人心神渙散，所以粉紅矮牽牛的正面特質，雖然具有清心天使般溫馨甜美的心靈，負面的部分卻顯現薄弱的能量特質。單純具慈愛的心，像似矮牽牛花朵柔弱又單薄；花瓣很脆弱，易折損而留下傷痕，代表人善良的心脆弱、容易受傷，傾向心力不足而體弱；漏斗狀的花形，其能量可以將心靈深層的力量帶出，讓人展現粉紅矮牽牛花般亮麗溫馨的自信心。


    選擇這花的人，外表具有美美柔柔的氣質，內在是很有愛的人，但也很脆弱容易受傷，需要更有勇氣去面對深層的情緒創傷，才會使心靈內在力量真正展現，而且也要注意身體的健康狀態。


    ## 心得分享


    這兩位分享心得的朋友擁有共同的特質，他們有獨特的審美觀，一個是善長工筆的畫家，一個是芭蕾舞老師，兩個人的專長都跟心靈藝術有關。她們外表給人的印象是，言行柔和優雅，有顆善感纖細的心。也因此當我做花訊息傳導時，她們的敏感度很夠，容易接受訊息，察覺身體能量的流動，會有輕微的身體晃動，產生氣脈調整的現象。


    ### 秋錦——舉止優雅，細緻的心，善長工筆畫。


    第一眼就喜歡海棠，感覺她最漂亮，但最特別的是彩鐘花。最後我還是選擇矮牽牛，因為她給我一種溫柔、溫暖的感覺。畫到後頭，又覺得她似乎很容易受傷。

    老師做花訊傳導後，我感覺到一股能量振動，往上衝，接著身體前後搖晃，一種清明、光明、愉快的感覺。


    ### 晶容——善感的心傳達輕柔的肢體，眼神會自然流露出真誠的心。


    這裡每一盆花我都很喜歡，因為選擇矮牽牛的人不多，而且粉紅是我最喜歡的顏色，所以我就被吸引過來了。我一時不確定該畫眼前的花，還是我心底浮現的心花以及湧現的噴泉。我畫的時候，沒辦法整朵畫出來，只能畫出花瓣的邊緣，有大有小，顏色一直是粉紅色，最後才加上綠色的葉子。

