    # 心得分享


    我的小兒子就讀於幼稚園，師資、設備一流，唯一讓我擔心的是，教室採密閉式空調。就讀這所幼稚園，兒子班上共有二十幾位同學，幾乎每一個小朋友都在輪流吃藥。


    我一向崇尚自然的方式，平時的小病痛，盡量不吃藥打針。對於兒子的上學環境，我只好用最自然的方式來因應：平日多給他使用艾草訊息，因為艾草是純陽的能量，可以彌補教室缺乏的陽光、空氣又不對流的情形，它讓我的兒子比較能保持體力。兒子面對學習新事物、結交新朋友的壓力，則用花精來平衡情緒。此外，我定時給他使用虎頭蜂排毒，以增強他對病毒的抵抗能力。


    還記得腸病毒流行時，兒子最要好的兩位朋友都感染了，只有他完全沒事。整整一年當中，記得他只感冒發燒過一次，經過一天一夜就好了。我還是沒讓他吃西藥、打針，除了虎頭蜂、艾草之外，有時我手邊的金線蓮，也會拿來幫助他加強抵抗力。他的體力一直是很好的，不用我過度操心喔。


    現在我們全家人都把虎頭蜂當作是預防各種病毒的祕密武器，不只是喝，還自己發明了噴、塗、抹等各種方式。


    因為青春痘冒個不停，我用虎頭蜂來排毒三個月。一開始沒有太大的感覺，只是因為長期睡眠不足，這時會很想睡，但一個月之後，我開始有好轉反應：咳嗽，尤其在半夜最嚴重，白天好像比較好一點。我想起以前感冒，咳嗽問題超嚴重，虎頭蜂可能整理到這些病毒訊息了。我還注意到尿比較黃、排出黑稠的糞便，還有月經開始兩天顏色很黑，腳踝幾年前車禍扭傷的地方又開始痛了起來。這些反應看起來很嚴重，可是都沒有影響我的精神，我還是正常工作、玩樂、休息。問過之後我才知道，這都是排毒的現象，所以我就繼續放心用。


    以前月經過後下巴總是會長大大的痘子，要到下次月經來前才會消掉，排毒以後就完全沒有了。還有鼻子、眼睛過敏、蕁麻疹，常感冒，都不見了。我還發現，經過三個月的排毒以後，有種身輕如燕的感覺。我現在比較敏感，有些東西我不能吃、吃了也不健康，我自動就不去吃，不用再天人交戰了。


    # 宇宙訊息能量的發展


    瀚的宇宙擁有取之不竭、用之不盡能量，如何將這些訊息波加以轉化，成為療癒身心的能量，是我積極研究的。宇宙訊息具有多樣不同的面貌，轉化之後，各有其療癒的特色與層次。它們共通的特點是：同時針對生理、心理、靈性層面，進行深入淺出的能量調整，著重生命內在核心的覺醒，由內而外進行整個生命體的重建工程，而不再只是傳統「對症下藥」的片面措施。以下所列舉的這些療癒訊息能量，都是我已經研發成功的，在此僅簡單說明之。


    # 光波訊息：讓身體機能重新啟動


    人體需要接收各種有利身心的光譜，才能合成必需的元素。但許多人因為身心失衡，經脈閉鎖，或者因為各種慾望、習性，而無法接收某些顏色光波，遇到這樣的情況，僅憑照射光波或眼睛長期注視特定顏色，效果比較間接。我擷取宇宙光源，把各色系宇宙能量光波保存在水中，製作成滴劑直接使用，當訊息進入能量中樞與腺體，透過能量波共振傳導，可以使經脈舒展活躍，各部位機能重新啟動。如此一來，身體就會自主平衡運作，吸收必需的微量元素。


    我把不同宇宙能量光波和花精結合，成為複方花精，臨床上多應用在重度憂鬱、躁鬱、癲癇患者身上，效果非常顯著。由於這些個案的病症已經嚴重影響生理，我先以這類複方花精緩解心身症狀，活絡全身氣脈，讓身體回復正常機制，能夠自動合成必需的元素。經過一段療程之後，再改以單方花精來提升他們的意識清明度，激發自覺與自癒的能量，讓他們懂得面對自己，真正為自己的生命負起責任。


    我擷取宇宙能量光波，運用不同頻譜的光波特性，共振特定脈輪，由內而外徹底平衡人體能量系統，再加上花精活躍淨化身心的特性，結合而為兼具淨化脈輪、心靈覺醒，與活化細胞、美容養顏的訊息能量。例如我把特定光波訊息和花精調和，讓它成為能淨化眉心脈輪能量，安定神魂，並且注意力集中，直覺與智慧提升，有助靜心修持的美妝水。我的想法是，把保養肌膚的美妝水和訊息能量結合，研製出能夠共振身心整體平衡系統的訊息不僅美容養顏，也同時淨化心靈。


    # 訊息活化水：身體潔淨、心靈甦醒


    人體有 70%是由水組成的。純淨的水能活化細胞，提升心靈的能量。


    水從宇宙間來到地球，原始結構本來潔淨無染。然而亙古以來水便穿梭於山河大地之間，在地球上的年歲比起任何生命都更為久遠，而它擅長記錄訊息，就算汲取深山泉源最乾淨的水來分析，其中也飽含各式的訊息。這就好比人最核心的內在是純淨無瑕的，但我們卻容易受到各種慾望的牽擾，而使心靈蒙塵。歸根究柢，水的原始結構和人心靈的本質是相應互通的，真正純淨的水，能激發我們內在的生命機制，協助淨化細胞的雜訊！


    我運用宇宙水能量場的訊息來淨化水中的雜訊，還原水的原始結構，使水分子更細緻、活躍、純淨，而且不再輕易受外在訊息的干擾。不需要添加任何微量元素或有機物質成分，口感就會變得甘美醇厚，對身體沒有負擔。更重要的是，沒有訊息干擾、結構還原至本然純淨狀態的水，能與我們的心靈相應共振，長保純淨清晰，並且提升心靈的能量。


    # 海洋系列：細胞瞬間充電


    海洋中的貝類、珍珠、珊瑚等物質，也適合研發製作成療癒的訊息。我擷取黑珍珠的訊息，發現其中的微量元素訊息，對人體有奇妙的效果。


    微量元素是維持人體組織運作的必需物質，它們是消化功能、新陳代謝、免疫力、細胞神經傳導等重要的媒介，然而攝取應適量，不足會影響身體機能，過量則可能導致微量元素中毒。我們攝取的食物中已富含人體所需元素，而黑珍珠的微量元素訊息能夠共振、活化體內這些「細胞工程師」，讓組織系統彷彿瞬間充電般，產生高效率的連結與運行能力。而且訊息完全不含化學分子，沒有過量攝取導致中毒的疑慮，我們可以安心使用。


    黑珍珠是海洋底火山元素涵養的結晶，水與火交融淬鍊而成的珍貴微量元素。黑珍珠訊息擁有宇宙的水元素，如地火般強穩的熱力，貼近地心，散發大地之母的沉穩振動。強大的能量使人穩定，扎實推進的振動波，在細胞間形成一股低頻的動能，使細胞活化，彼此的頻率平衡相容，神經系統、生理組織架構更為協調完美，身心穩定。


