  md: '# 推薦人的話 愛在自然間美麗躍動


    張秋敏


    八年前我在鄉下電台工作，當時還不認識祈明老師。有一天祈明老師的朋友，從台北南下到電台來，遇見我便熱心的向我提到，我和他的一位朋友（祈明老師）長得很有夫妻臉。他曾聽祈明老師直覺提起過未來老婆的條件，而這段因緣就在中南部。這位台北來的朋友見到我，認為我的外在條件很吻合祈明老師所描述的對象，應該是我沒錯！我心裡想，常常有人幫我介紹對象，早已見怪不怪，也就沒把這事放在心上。


    我的「阿婆身體」（台語：意指身體很差）任誰知道了都會退避落跑，所以我只能將注意力集中在工作，上節目時麥克風打開的數分鐘內，是我最充滿熱情能量的時候，關上麥克風一放音樂，其實身體是很虛弱無力的掛在那兒，尤其是播報一長串新聞的時間最辛苦。我的工作環境四周機器環繞，再加上二十四小時機房運轉，樓上頂樓又架著發射台，電磁波對我的敏感體質更是造成莫大的干擾，讓我連呼吸都需要努力，想結婚會嚇死人的。


    沒多久公司舉辦義診活動，從台北請來祈明老師參加。回想那天晚上，我正在播音室裡，接近七點下節目時，我竟全身敏感到氣脈竄動，心臟頻率也跟著亂跳一通，沒多久看見播音室窗外的一角，坐著一個留標準西裝頭，穿著整齊白襯衫，打領帶，一臉傻傻砲砲的先生，我心想原來是他啊！傳說中和我有夫妻臉的人現身了——祈明老師。


    當晚祈明老師利用生物能儀器幫我檢測身體，發現我的身體磁場很不穩定，似乎受到很大的負面能量干擾，以至於我來不及呼吸，就把身體的氣耗散掉。他不假思索起身幫我調理身體的氣場，那時我的心中湧進了一股很熟悉的感覺，好像認識眼前這個人很久很久了，我心裡直覺馬上反應：'
  merge: -1
  pgno: 14
- img_proc: true
  md: '「他是我先生」。當時我並沒有任何好壞的想法，就是單純的知道，「他是我先生」。那時生命對我來說，只存於呼吸間，我沒有過多的心力或任何的雜念想「為什麼是他」，當然更別提會有「喜歡」和「愛」的過多感受。當時也不知該怎麼說出這心中湧進的直覺，只好轉個彎拼命的問：「祈明老師你是誰？！你到底是誰？！」他沒回答我，只是淺淺的微笑著，給人一種過人的安定力量，以及不急不徐的簡樸態度。


    雖然我已知道他是我未來的先生，那時我心中並沒有愛情般的羞澀感，反而是一種很老的朋友相見的感覺，而且我都快掛了，他才出現。往後幾天，我們很少說話，當然沒談情也沒說愛，話題全都在我的身體問題上。言談中不管我說出什麼奇異或驚人的內在世界、想法，他都不曾質疑，反而比我更有興趣知道，更認真的看待造成我身心靈失衡的問題。也因此，他是第一個沒被我的奇怪想法嚇跑的人，就這麼在第十天決定娶我。


    當然閃電結婚的原因，絕不是我用奇怪的想法去「威脅」他，告訴他第一天見面時，我就直覺知道他是我先生了。這件事在婚前他一直是不知道的。（婚後我才知道，祈明老師在第三天也認定我是他太太。）當時結婚的原因，除了我們彼此有種似曾相識的熟悉感，和超乎常人的勇氣外，實在也是因為我的身體太糟糕了，祈明老師不忍心看我難過，只好娶過門來照顧。兩個禮拜後，我們在觀音廟前套上戒指，他便匆匆結束掉台北的物理治療中心，帶著一卡車的家當搬到鄉下城鎮住，準備結婚事宜。接著我們忙著拍婚紗，還記得拍照時他還得一邊拍，一邊照顧我，為我調氣提神，免得我身體累垮掉，老婆就沒了。兩個月內，我們終於如願結婚，幸好我還活著，他很勇敢照約定真的娶了我。'
