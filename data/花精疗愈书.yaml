    然而玫瑰的顏色甚多，比較紅玫瑰和粉紅玫瑰的訊息能量，雖然同為玫瑰花，兩者都具有溫暖與熱情的特質，但是因為顏色不同，花朵所吸收的光譜與波頻便有差異，因而花朵能量的作用便大相逕庭。


