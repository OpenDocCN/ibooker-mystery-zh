    # 地理環境的差異與變化


    即便我們找到數年前擷取花精的同一棵植物,但當地的氣候也許由乾旱轉為驟雨不斷,或者經歷地震、颱風等天然災變而地形完全改觀,甚至人口逐漸聚集增加,依照植物對訊息


    > 種子裡記錄了植物DNA的訊息,不斷繁衍傳遞下去'
