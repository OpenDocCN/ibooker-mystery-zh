    小時候我家住在大山上，只有小徑沒有道路，生活十分簡單，和大自然的訊息互動是相當密切的。我父母善於利用植物的特性為家人治病，也會用簡單的植物訊息去除不正之氣，山上小孩喜歡自由，到處亂跑，常是一山玩過一山，難免會招惹或沖煞到不正之氣，回家父母只要見到小孩出現反常行為，精神呆滯、上吐下瀉、食慾不振、發燒等等不尋常的行為現象，猜想小孩可能「沖煞」到不乾淨的訊息，就會到屋外採幾片艾草、芙蓉葉，再用香茅草將它們一起纏住放入澡盆裡，利用葉子浸泡過的淨化訊息水洗澡。這些植物皆屬陽性的能量特質，行竄身體經絡可驅邪除煞，果然都有效的解除我'
