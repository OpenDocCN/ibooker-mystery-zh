  md: '# # 花療室

    面面觀


    日、每日，有來自各方的朋友接受花精心靈諮詢，我的花療室像人生舞台的縮影，我看見人性的脆弱與人生的百態。有人理性、有人感性；有人大方開朗、有人謹慎小心；有人心無芥蒂一進門便對我開口滔滔不絕；有人則自始至終緊閉雙脣，絲毫不肯吐露隻字片語；有人過於心痛而忍不住流淚。有時候父母孩子、伴侶，甚至一起在花療室裡接受我的心靈諮詢，急切地想要整理親密關係的問題⋯⋯。


    因為花精治療師的身分，我間接也體悟到千百種人心的苦，我聆聽過無數個生命的感動故事，人生是如此辛苦又過於無常。


    來到花療室的朋友或許已意識到自己的情緒問題，或者還不自覺，身為花精治療師，我最大挑戰是，如何引領每一位前來接受諮詢的朋友，信任花精存在的愛，且願意接納自我，勇於改變，走出心靈固有的封閉或僵化模式，提升對自己情緒的覺察度，以打破其有意無意間砌築的心牆。協助他選擇最恰當的花精，並且在花精的陪伴下，信任、安心地度過情緒的整理過程。


    舉一些我在花療室遇見的例子，我用不同花朵的特質來代表，並不代表他們一定會跟該種花精情緒相應，純粹是有趣，別無它心。'
