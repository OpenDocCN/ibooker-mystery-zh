  md: '一塊未經污染，只有花草樹木自然生長的地方，都會讓人心生愉快，感覺寧靜祥和。這是大自然純淨磁場的力量，是一種自然訊息能量，我們每一個人都能感覺到它的無窮魅力。此外，陽光、大地、星空、動植物、礦物磁場、建築物、衛星基地台發射的電磁波等，也都散發各自的訊息波頻。


    # 訊息的作用：大腦怎麼吃檸檬？


    讓我們進一步觀察大腦訊息的傳遞方式。當我們想到「檸檬」時，腦中就能夠勾勒出檸檬的樣子，甚至它的淡淡香味和酸澀口感等，但是你不可能從腦袋裡拿出一個真實的檸檬，因為我們腦中這栩栩如生、會令人發酸、分泌口水等生理現象的「檸檬」，是以訊息的方式儲存在細胞的記憶中。


    當我們的心像感官被調動，大腦意識訊息會自然反應作用。如：請想像你正在吃一大片檸檬……，這時我不用形容它酸溜溜的味道，你的大腦就會自然反應，從雙頰分泌出口水。我們可以不經過吃，就產生生理反應，這就是調動「檸檬」（訊息）共振「腺體」（質量）分泌口水的作用。而口水能生津止渴，中和腸胃的酸鹼值，製造對身體正面的能量。


    人的情緒會直接影響內分泌系統，當你喜悅快樂時，分泌的口水是甜的，反之當你生氣時，口水就會變得黏稠乾澀。同樣的，望梅能夠止渴，看到某個情景會觸景傷情；看到花時，我們則會心生喜悅。這些現象顯示，記憶、思考、情感、念頭都是以訊息能量的形式存在大'
