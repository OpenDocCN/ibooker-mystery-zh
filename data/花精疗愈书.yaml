  md: '制，進而達到症狀的平抑。而花精和一般藥物最大的不同在於，她是愛的精神能量，靈魂的滋養劑，當內在核心因為愛的能量共振而覺醒、而提升，我們會看到自身失衡的部分，無論是情緒或生理問題，我們自然會去面對與修正，透過花精正面能量的幫助，使之恢復平衡健康。


    每一個情緒創傷就好比心靈的坑洞，它藏在潛意識裡，隱隱作痛。大多數人感受到內在的這些坑洞，總是會往外尋尋覓覓替代者來填補，然而人們一定會發現，所尋得的替代品不是轉瞬即逝，使內心更害怕失去，就是根本與自己期待的完全不符！如果你發現每一段戀情都陷入同樣的困境，換了不同的工作卻還是碰到相似的問題，或者人際關係上總是遭遇到相同的挫折，也許你該回頭檢視自己，潛意識裡有著什麼樣的坑洞。


    情感、金錢、成就、榮譽、地位這些替代品都不是我們內在本有的，所以我們擁有之後也很難感覺到真正的滿足。坑洞是一種心靈匱乏，需要心靈層面的療癒力量，花精的作用並不在於直接填補這些坑洞與匱乏，這只是初階的影響，她真正的作用是使心靈自行滋長，讓殘缺的重新長出來。也就是說每一個人的內在是本自具足的，只是透過花精的能量來重新啟動而已。我們的心靈有許多種子尚未萌芽，花精就好比「水」，澆灌這些發芽不完整的愛，讓它們一一成長茁壯。


