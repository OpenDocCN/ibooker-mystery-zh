    陽光充足，空氣流通，是空間自然淨化的第一要件。光線明亮、空氣清新的空間，就不易有濁氣等負能量的集結，再加上經常淨化負磁場的訊息，基本上這就是一個適合進行花舞的空間。我對空間的氛圍很注重，為了使花舞發揮更好的療癒成效，我把空間利用訊息連接上宇宙花場，讓參與者能深刻的接受花場訊息，進入心靈的深處，花給予他們心靈上最大的祝福力量。


    至於如何知道空間能量場，是否合適心靈的能量補給呢？你可以憑直覺力，先沉靜心識，感覺周遭氣氛，它讓你舒服嗎？如果陽光足、空氣好，環境又舒適，那就是個不錯的空間能量場。


    ## 初階、進階花舞的發展


    初階花舞的設計，著重在自我的探索，感知心靈意識的存在，進入內心深處探尋。這個階段個案肢體的表現不豐富，常靜處原地，或只是簡單的肢體變化。秋敏老師並不會要求豐富的肢體表現，一切身體語彙與心的變化相連，生命是一體多面的展現，只要是真實心靈內化的肢體動作，都是心識的一部分。不是因為花舞而跳舞，是因心識的訊息共振肢體波動，讓肢體自然變化身體動作，下意識的想跳舞。所以初階花舞著重探索生命的可能，我們也許會因為肢體的變化，而呼應到心靈的問題。當我們愈清楚情緒的問題，在花精的護育下，自然心靈的舞蹈會慢慢的展現開來，這種自信的身體動作，是由心靈深處長出，而不是被外在因素所逼造的身體舞動，你會體會到你跟自己貼近，跟心靈深處的自已交會，跟身體呼吸緊密的相連。


    進階花舞可以結合更多的素材，發揮花精更寬廣的作用，使人開展不同質地的肢體表現，感受人與人肢體的互動交流，使肢體流動進入空間多角度的呈現。你會在花舞進行中解析，看到你與自己、你與人及環境微妙的互動關係，同時發現現實生活中的自己。在花舞不同的情境中，往身心內外，更深層探究生命的真意，遇見現實「我」的存在面貌，轉變僵化的生活思維模式，拓展生命的廣度，讓肢體展現更多的可能性，轉動沉積固舊思潮能量，讓身心靈性飽滿，全身細胞散布熱能，充滿由心所蛻變的愛。


    世界萬物的訊息都存有正、負向能量，在陰陽訊息間運轉出生命能量，花朵和人同具有正、負面特質，每個人都有優、缺點。初階花舞後，對自我暸解達到一定的認識，更能自然連結深層心靈活動，自信讓身體能量變開放，肢體訊息更細緻且豐富，我們更能輕易進入身體的能量中，打開心智的覺知力。


    進階花舞中，花精不只是扮演撫平心靈的創傷，我們可以利用花精的正、負面特質，開發生命的潛能，拓展心靈的視野。在花精能量運轉中，進入不同的人格特性，暸解生命的豐富質地，引帶出潛藏住的能量，讓生命的延展性更遼闊。


    例如：刺葉王蘭的花朵，成串長出的高聳花柱，是一種超自我的表現，帶刺的葉子警告別人勿侵犯。


    花舞可利用她的花語特性，運用於人際關係的學習，在刺葉王蘭的花精引導中，讓參與者體會到刺葉王蘭「大我」的肢體展現。她可讓一個性格畏縮，又缺乏自信的人，相應到花的正面特質，花精的訊息讓我們能生起大無畏的心，勇敢面對人群，自信的表現自己，提升環境的適應力與競爭力。反之一個過於強勢的人，展現花朵負面特質，當肢體能量過度擴展時，衝突的肢體語彙侵觸別人，會使之內心醒覺，釋放過度保護的心，讓心柔軟，學習肢體能量的表現，轉而內斂柔和，化解容易衝突的人際關係，使之變得詳和。


    我們利用花的特質，由心展現我們外露個性，同時往內進入心靈的核心，深探潛意識的訊息，瞭解生命的本源。此外，每一種花所承接的生命管道不同，利用不同花朵特性，探索連結心靈的未知，探知宇宙生命的無限，當心靈的視野愈寬廣，我們的小我與自私的心轉化，無知所矇蔽的心靈能量在花舞肢體帶動中開啟，自然體悟生命存在的本質，領略身心靈同步展現，天地人和諧的共振波動，舞動出生命高階的能量。


    > 「刺葉王蘭」尊貴而謙和，融化帶刺防衛的心，讓軟弱的人生起大無畏精神，轉化人際關係


    ## 內觀繪畫


    觀繪畫訊息療法是我偶發獨創的靈感。顧名思義，是讓畫者透過畫筆，直接畫出心中所浮現的心花。當內心原本抽象的訊息，透過手、腦與筆具體呈現為花畫時，我和畫者之間便擁有了共同的媒介。首先，畫者可以在花畫上盡情抒發心中的感情，接著，我會直接擷取花畫留存的訊息，進行轉化與調整，這時畫者內心相繫的訊息就會被觸動調整。


    內心原本抽象的訊息，透過手、筆具體呈現為花畫


    ## 從心畫中看見自己的存在


    人的想法、念頭是一種心靈活動，無時無刻呼應著外在環境而變化，心靈意識像是一條河流，由外在人事物的刺激，漸而形成自我的觀念。小孩是在學會說「不要」拒絕別人時，同時肯定自己是一個存在的個體。我們從判別對外在事物喜惡的感受，看待內心感覺與心識變化，匯集成對「自己」的印象，瞭解個性與生活的態度，在慣性的生活模式中，安全的探索生存的方式。


    當我們閉上雙眼感覺自己存在的能量，我們只能用心感覺到意識的活動，對於自己的存在樣貌，只是一種外在身體的記憶印象，而鮮活的心靈意識活動，是很難實質被註解的。


    內觀繪畫就是一種看見自己存在的方法。我們進入深層意識，運用身心靈的連結力，讓心靈的訊息由潛意識中被帶出，透過手的繪畫過程，感知心靈的活動狀態。我們可以在繪畫過程，深刻的感覺心靈活動的力量，這些活躍的生命訊息，藉由身體的共振波動，透過手繪畫成心的圖像，我們可以在圖畫中解析心靈狀態，瞭解表意識未知的心靈訊息，看見傳遞出的心靈訊號。由圖畫的構圖中，解析運筆的線條，筆觸的重輕，色彩的運用，空間的利用，以整體性透析心靈意識的訊息，瞭解內在情緒的根源。


    ## 當心靈透過手及筆……


    透過內觀過程，讓心放鬆沉靜下來，進入潛意識中。觀照內心情緒、念頭的幻變，想像心中如一湖明水，從水面浮現一朵花。


    仔細觀察她呈現的姿態與色澤，有花名嗎？

    是盛開、含苞或凋謝，她有幾片花瓣？

    這朵花生長的地方呢？還有她會說話嗎？

    用你最喜歡的素材，把這朵心花畫下來。


    我們每一個人的內心世界都是非實質的，不是眼睛可見，不是用手可觸及的，當心靈透過手及筆作媒介，我們一樣可以把內在世界的抽象訊息具體反映出來，而畫紙則好似一面鏡子，是心靈境界的投射。


    愛因斯坦說，質量與光的交互作用會產生能量。內觀繪畫的基本原理就在於此。當心靈的訊息呈現在畫作上，我們就擁有了質量，只要將這個質量賦予祝福的正量，也就是「光」，使之轉化成正面的心靈提升能量，再回饋到畫者身上，他當下就能感受到自己所呈現在畫作上的某些失衡情緒，被轉化或撫平了，他從中更瞭解自己、接納自己，變得更自在清明。這就是內觀繪畫療法的基本作用。


    台大校長兼電機工程學系教授李嗣涔多年來透過許多能夠運用「手指識字」的個案，證明文字或圖象是帶有訊息的。這些個案並不需要用五官來識字，而是直接感覺文字或圖的訊息，這也證明人類除了五官與六識之外，還有一部分能夠直接感知訊息的能力尚待開發。


    我們所完成的每一幅畫或文章都代表自己心識的某一部分，你可以透過它們來認識自己的心靈密碼，它們可能是你長久以來習慣性忽略或者不被自己熟悉的部分，而療癒的奇蹟能量就隱藏在其中。


    ## 心得分享


    ……祈明老師為我進行內觀繪畫訊息轉化時，他說，我所畫的這一朵心花呈現出「自憐」訊息。的確，我感覺自己的心好像失去生命力，只能往下沉淪，似乎找不到生命的出口，而內在深沉的愛傷，如同漣漪一般，不斷地擴大，感覺自己將被吞噬，永無止境。


    老師為我做繪畫訊息轉化後3天，我發現自己的思想產生了變化，我產生了勇氣，可以抬頭挺胸，堅強的面對自己內在最脆弱的部分，不再那麼容易哭泣與自憐。


    從轉化後到現在，已經過了50天，我發現自己越來越能夠面對自己，也越來越少自憐與哭泣，甚至「自憐」這個部分，好像已消失無蹤，我甚至感到懷疑，難道之前的自憐，根本從未存在過，一切都只是自己的頭腦想像在作祟？！這個部分，我已經找了好多方式，但一直都未解決，直到現在才感覺如釋重負。這真是很棒的禮物。


    ## 心得分享


    我畫了一朵紫色有很多花瓣的花，下方有一湖水、兩條線往上代表噴泉。只是簡單的一幅畫，祈明老師卻看到了很多資訊，好像很多祕密都被發現了，讓我非常緊張。在第一次做繪畫訊息治療前一天晚上，我還特地對這幅畫持菩提心咒，用意念灌輸給畫作「平靜」的訊息，希望這幅畫所傳達的是比較正面的訊息。沒想到，祈明老師看到畫之後，卻一語道破我的內心狀態。他說，你的內在還有許多部分不斷湧現需要整理，隨著噴泉湧出來。


    畫的上方有紫色的複瓣花，是因為我畫完之後，發現還有多餘的時間，就不斷地往外增添花瓣的數目。老師說這就像是我的個性，雖然有些事我還有待整理，但某些事我早就整理好很清楚了，可是我卻繼續不斷地用大腦想，讓事情變得很複雜。我覺得老師說的很正確，沒想到簡單的一幅畫卻讓他看到這麼多訊息⋯⋯


    ## 心得分享


    畫內觀繪畫時，對畫畫十分畏懼，因為我一向都不太會畫，內心出來的花是開口向上，黃底而繁複的顏色，我只能盡力去表現我內心的感受。黃底畫上去之後，紅的、橙的、藍的一點點，我設法表現出那個色彩和味道，畫完後又添了一些心裡想畫的。


    看了看自己的畫，只有一個感受，就是：想要回家！回到那個不用再離開的「家」，那是一種說不出來的感覺。


    老師解析我的畫，

    說我雖然很老實的活在現實生活中，但內在卻有一部分不甘願，想脫離，這朵花的葉子好像翅膀，帶著我飛走。內心深處，我渴望找到心靈真正的歸依。


    老師在做訊息轉化時，我感到肚腹丹田暖了起來，他對着圓就好似在對我做轉化，轉化完後，用手靠近去感覺畫，似乎有股清涼的感受，由手心傳到大腦，人似乎安靜了許多，畫中喧鬧不平之氣氛，也沉靜安寧了下來。


    ## 8 台灣花精與訊息醫學


    花精療法是一種自然訊息療法，以水為載體，擷取貯存花朵訊息，透過波頻共振原理，療癒失衡的身心靈，屬於訊息醫學的一門。宇宙中充滿了訊息波，彼此是互通互應的，訊息醫學就是研究如何轉化這些訊息波，成為療癒身心的能量。這些自然能量包括花精、藥草訊息、宇宙光波、星海訊息、訊息排毒、微量元素訊息，能夠深入身體細胞最微小的分子，進行能量的轉化，是最徹底、健康且自然的平衡方式，不僅適用於人類，對動、植物或任何的生命體，都可以互應共用。


    花精是神奇的心靈解藥，心靈的問題可以靠花精來解決，而生理部分則須靠藥草來調理。我陸續研發出各式藥草訊息能量——擷取藥草的純正訊息，並還原、活化藥草的生命特質，屏除傳統煎熬藥草來食用，藥效作用緩慢而間接的缺點，藥草訊息強化了傳統藥草的功效，而且具有迅速通達全身經絡與細胞的優勢。此外基於宇宙訊息能共振互通的原理，我也進入有毒動植物的訊息場，轉化擷取排毒訊息，率先研製出「訊息排毒」的淨化方式，這大概是全世界的首例。它能徹底而精準地轉化人體內的毒素訊息，並且加以排除，重建自體細胞的免疫能力。


    除了花精、藥草訊息、訊息排毒淨化之外，我且陸續研發出訊息光波、訊息美顏保養、活化細胞訊息水、訊息能量卡，並將日月星光等有益於人的宇宙自然能量訊息放入各種載體，例如水、卡片之中，以天地的自然能量來療癒人的身、心、靈，啟發人自明自覺且健康的人生觀，是我所期待的訊息醫學願景。


    ## 劃時代的革命技術——藥草訊息


    製發展藥草訊息的緣起，是一次夢境的提點，極短數秒瞬化的訊息。


    那是一個奇妙的地方，位於宇宙的某一空間，感覺無際無涯、寬廣遼闊，秋敏由夢境中進入這個空間，看到一塊奇異的土地上，生長著一株藥草，每一片葉子都由裡到外透亮，閃耀著如金箔的光華，感覺無比珍稀難得。藥草的葉子細長、葉脈清晰、線條優美，自然地垂下來，被置於一個透明的水晶缽中，秋敏感覺到，這株藥草珍貴而活生生的能量，正源源不絕地透過振動，傳導入缽中的液體。


    夢境中的植物顯然不是花，而是藥草，我們深探這個訊息又是另一項工作，我突然意識到，花精既是著重在心靈的解藥，那麼生理部分，是不是可以透過藥草來調理呢！如此雙管齊下，更可以協助我們架構健康而無負擔的訊息化人生。有了花精的成功經驗，將活生生的藥草訊息能量擷取保存下來，成為方便攜帶的口服製劑，對我而言並不是難事。意外得到了這樣的靈感之後，我開始積極研製「藥草訊息」，並且計畫未來幾年內，陸續擷取數十種至上百種藥草精華，和花精雙趨並列。


    傳統中藥草的製作與使用方式，早已行之有年，若要讓一般人改以使用訊息能量，勢必要先建立對訊息能量良好正確的觀念。因此首先，讓我們從藥草訊息這項研製技術的啟發性開始談起。


    ## 最自然、無副作用的療癒方式


    中醫與藥草學象徵中國歷史上，一條永無止境蓬勃發展的文明長河，數千年來無數偉大的醫藥學者，投入畢生精力研究的結果，這項國粹早已因奧妙神準的效果而綿延享譽國際。至今中外學者仍舊前仆後繼地，投入於中國傳統醫藥與藥草的發展，期望能夠讓古人的智慧結晶發揚光大，以利益人群。


    中藥草的研製技術，可以說是正式邁入跨世紀的革命旅程——進入訊息醫學能量製劑的時代了！


