    # 心得分享


    愛蘭——學員中年紀最長，歲月刻劃的面紋中，有一種媽媽的笑容。


    剛開始就很喜歡瑪格莉特，但又發現其他花也很漂亮，變得有點不知道要選擇哪一種。本來我只畫了一朵花，在寫心得時，卻發現她好孤單，所以又畫了一朵在旁邊陪伴著她。


    老師花訊傳導時，我盡量讓自己放鬆，可是不知怎麼，居然從心裡嘆了兩口氣，心情湧上來，就哭了出來。抒洩過後，頭開始逆時鐘轉，這時情緒斷斷續續湧現，感覺悲從中來，我沒辦法控制自己的哭出聲。最後雖然感覺情緒比較舒緩了，但內在的悲傷感覺還在，我自己也不知道怎麼會如此，我以為自己應該沒有那麼悲傷才對啊。


    在畫花的過程中，愛蘭就感受到內心的孤單了。當花朵訊息共振到她的心時，她自然而然會想要紓解長期壓抑的悲傷。過去，她把某些事件所衍生的情緒壓抑了下來，以為已經事過境遷，但花朵訊息將之調動出來整理，所以她以哭泣來紓解多年來的生活壓力。


    麗萍——待人客氣，眉頭總是深鎖，有一種淡淡的憂愁，孝順的兒子為她安排了鮮花療法的體驗，希望媽媽在花朵的幫助下，能更快樂的生活。


    看到瑪格莉特，她的花是敞開的，覺得她的心胸很開闊，能夠包容萬物，所以我就選了她。最主要的原因是我不太會畫畫，她看起來似乎可以簡單的畫出來。可是畫到一半我就覺得畫不下去了，怎麼底部葉子看起來這麼繁雜！那時，我的心情很混亂。


    老師花訊傳導時，我一直想要讓自己放鬆去感受，漸漸的我感覺頭部開始脹脹的，胸口也悶悶的，我在想自己是不是太過壓抑了？


    麗萍的面容有一股悲傷的哀愁，整個人顯得拘謹而脆弱，這次鮮花療法，她已經覺知到自己過度壓抑情緒的現象。對能量的感受，不像吃飽飯那樣明顯，大多數時候，我們比較可以感受到身體上的變化，對於心情的轉變卻不那麼敏銳。當我們急於想要去感受時，反而會強烈刺激大腦的理性運作，而忽略身心許多細緻的變化。花朵訊息是一種開放、正向的愛能量，無論我們否真切感受到她，只要我們放鬆、安心、接納她，花朵的訊息都會敏銳的回應，在彼此之間形成一股綿密細緻的能量互動，療癒身心失衡的訊息。'
