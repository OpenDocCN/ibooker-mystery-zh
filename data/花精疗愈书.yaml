    # 哪些人不容易感受到花精的成效？


    唯有真誠的面對自己，檢視自己貧窮挨餓的原因，並且真心想要脫離悲苦的生活，窮人才可能啟動改變的生機。所以，接受自己的缺失，澈悟改變的意願很重要，一顆自明自覺、願意改變自己的心，佐以花精的激盪與勵志，我們將以前所未有的速度覺醒、提升。從種種情緒煩惱中轉化而出的智慧，是別人怎麼也帶不走的寶藏，而花精就是透過這樣的方式，讓我們徹底醒覺，協助我們看見自己。


