- img_proc: true
  md: '的細緻敏銳程度,對環境的高度適應能力,這株植物的訊息早已產生變化,甚至是否仍舊完整、健康還有待詳察。諸如此類細緻的訊息改變,製作花精時都要能夠精確的掌握,以便適度修正花語,或是在配比與稀釋、震盪過程中,調整出更完整的訊息結構,以維持花精原有的效果與品質,確保其精準共振平衡特定情緒的特質。


    # 花朵訊息是敏銳多變的


    基於植物敏銳記錄訊息,高度適應環境的特性,我認為花精的訊息特質,需要視花朵母株的生長環境、人文、地理、時間等變化,而做彈性的修正調整。一成不變的套用花語,極有可能會扼殺花精的活潑作用特質。


    我可以從台灣花精中,找出很多例子,來說明花精因為顏色、生長環境等差異,而特質迥然不同的情形。


    例如台灣藍龍膽和台灣黃龍膽屬於同科、同種,她們的外型相同,喜歡生長的環境也相近,然而只因為顏色不同,花精的特質居然差異甚大。「台灣藍龍膽」平衡過度緊張、生活壓力大,而交感神經失調的情形;「台灣黃龍膽」則銜接不同的管道,主要作用於平衡陰陽能量,撫平莫名干擾的負面情緒。又例如同一株絲瓜花結的種子,撒在平地與高山深谷分別生長,開花結


    ![](img/832bd80b1c9ef2dd0374ae143cb3e3e9_156_0.png)


    台灣藍龍膽'
