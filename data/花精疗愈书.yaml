  md: '# 心得分享


    愛蘭——學員中年紀最長，歲月刻劃的面紋中，有一種媽媽的笑容。


    剛開始就很喜歡瑪格莉特，但又發現其他花也很漂亮，變得有點不知道要選擇哪一種。本來我只畫了一朵花，在寫心得時，卻發現她好孤單，所以又畫了一朵在旁邊陪伴著她。


    老師花訊傳導時，我盡量讓自己放鬆，可是不知怎麼，居然從心裡嘆了兩口氣，心情湧上來，就哭了出來。抒洩過後，頭開始逆時鐘轉，這時情緒斷斷續續湧現，感覺悲從中來，我沒辦法控制自己的哭出聲。最後雖然感覺情緒比較舒緩了，但內在的悲傷感覺還在，我自己也不知道怎麼會如此，我以為自己應該沒有那麼悲傷才對啊。


