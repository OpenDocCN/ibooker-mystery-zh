    莉安接著描述器具放置的地方：「有一個由某種白色物質構成的櫃台區。房間裡的一切都是內建的。櫃台的部份、抽屜、所有的東西，都是從牆壁的表面拉進拉出。如果你需要把東西放在別的東西上面，你要把它從牆壁裡拉出來。我猜他們這樣是為了旅行或什麼的時候，不一定要在這個房間裡放東西。所有的東西都被推進去牆壁。」


