  md: '當她進入深度的出神狀態，我引導她回到事發當晚她的公寓裡。（她很確定日期，因為她有寫日記的習慣，她把這事寫了下來。）由於房間很冷，她醒了過來，然後憂心地說：「這裡有個東西。它在看我。它就在我的床旁邊。」


    她描述一個寬約九吋（約23公分）的物體，發著橘色和黃色的光，物體的中間有個大水晶或鑽石。她驚惶地從棉被裡往外窺看，注意到還有其他的生物也進到房裡。其中一個很高，有著類似人類的蒼白膚色，旁邊伴隨著三個像是白色發光球體的小生物。他們不怕他們，只覺得好玩。當他們用冰冷的手指碰觸她的手臂和臉時，她覺得他們很可愛。高大的那位拿著那個奇怪的發光裝置，對著她前額中央發出一道光。他對她解釋，這不會傷害她，只是會更容易把她從家裡傳輸出去。她也被指示，當有道光束投射下來包覆她時，她必須躺著不動。接著她便從床上浮了起來，他們不知怎地就在外面了，而且在往上飄浮。這時伊迪絲開始顯示呼吸困難，我必須移除她的生理感受。下一刻她就到了一艘巨大的太空船裡，她並不記得是怎麼進去的。她被帶到一個很亮的房間，光似乎是從牆壁和天花板散發出來。那個房間裡面有更多生物，不過她說跟陪伴她的那些白色的柔軟小生物不一樣。他們比較醜，但不是真的醜，只是不一樣。他們比較矮胖，紫褐色的，而且頭更大。小小亮亮的生物看起來比較軟，這些生物的皮膚看起來則比較粗糙。她因為躺在桌上不能動，所以無法碰觸他們，也不知道實際上摸起來粗不粗。


    他們接著把一個機器帶到桌邊。當她看到機器發出來的光進入自己左半邊的肋骨間時，她很擔憂地喊：「會痛……不過……不痛。」


