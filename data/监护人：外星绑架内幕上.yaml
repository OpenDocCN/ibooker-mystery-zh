    等她完全清醒過來，我請她照我事先的指令，畫出嬰兒的模樣。凱莉是很有才華的專業畫家，在最初做過那些夢之後，她自己就已經畫下來了。她現在潦草地速描出嬰兒的樣子，我後來跟她寄給我的圖做了比較。她一邊畫，一邊解釋兩者間的小差異。在畫成人的手時，她畫了三根手指頭，並說手和前臂幾乎一樣長。在她最初的畫裡，他們有四根手指，這次她說她覺得三根才對，而且不想更改。畫到孵化器時，她說：「這次我有股衝動，想要在旁邊加個東西，像是有東西把它們連在一起。我最早的畫沒有畫這個。」當她在畫盆子和連結的管子時，她突然往後縮了一下，大聲說道：


