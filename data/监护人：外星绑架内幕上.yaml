  md: '# # 園丁的話


    這本書的原文出版時間是在一九九九年，整整十五年前。


    十五年後的今天，這樣的內容對大多數讀者的心智而言，可能還是很具挑戰性。


    這本書裡的概念，顛覆了聖經裡有關人類起源的說法。或許這樣的概念，才能解釋許多人對聖經記載的那個憤怒、愛懲罰的神的疑惑，因而還原了祂的原本面貌。


    我相信上帝是愛，宇宙也充滿愛與善意。不論是《地球守護者》、《迴旋宇宙》系列，還是《三波志願者與新地球》，透過催眠個案所傳遞的訊息，都一再提到萬物是一體，全宇宙的生命是一體的。


    保持在愛的意識狀態，就會有心靈的進化和頻率的提升。


    這年頭很多人喜歡說愛、說光、高舉正義的旗幟，但實際的行為卻是與愛和正義背道而馳。而我一直很不明白的是，為什麼有那麼多人看不清其中的矛盾？


    我知道的愛是沒有分化、沒有批鬥、沒有仇視、沒有霸凌和恐嚇。愛，也不會以任何形式去傷害和嘲弄、羞辱與自己意見不同的人，甚至以此為樂事。但我觀察到近年來的台灣，有越來越多人有意識或無意識地認同或縱容對立、仇恨和恐懼的情緒。看似美好光明的口號或信念被用來偷渡負


    園丁的話▲007'
  merge: -1
  pgno: 3
- img_proc: true
  md: '面的情緒和作法。


    如果在這樣一個小小的島上，人們都無法相互包容，只為了意識形態就能毫不猶豫的踐踏異己，不願走出受害者情結，或是明顯的以兩套標準看待事情，那還談什麼改變台灣？更奢望什麼新地球？


    靈性一個很重要的概念，就是不會為達目的而不擇手段。目的不該被當作合理化不正當手段的藉口。這也是辨識小我的一個簡單標準。


    我想，喜歡探討宇宙奧秘，對外星人主題有興趣，願意相信在這浩瀚的宇宙裡，地球不是唯一具有智能生命的星球的人，心胸應該是比較開闊的，至少，會比較願意放下舊思維，接受我們是一個整體的觀念；會願意耕耘自己的靈性，不去附和那些操弄和製造對立的負面手段。


    那，就從自己做起吧！放下心識形態，放下雙重標準，放下選擇性的正義，放下以立場決定是非。也開始訓練自己的辨識力吧，因為許多事就如書裡說的，「事情並不都如它表面所呈現的」。事物的表象並不可信！


    真正的愛與光並沒有兩套標準。


    監護人 THE CUSTODIANS ▲ 008


