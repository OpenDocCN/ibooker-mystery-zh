    我看到一個外星人。全白的身體。矮小。長長、瘦瘦的手臂。大頭。大大的深色眼睛。我現在看到他的全身了。他的腿。不過我沒看到他身上穿著衣服。他像是在看我。他在看我。


    她能看到的飛行器那邊有道彎牆。有些外星人坐在螢幕、旋鈕和控制鍵前的椅子上，但除了那一位，其他人都沒有在注意她。她不知道那個外星人在船上的位階。他用心電感應與她溝通。她後來解釋，那些外星生命是光頭，可是他們的眼睛和《交流》的封面並不一樣，不是那麼歪斜。他們的身體類似電影《第三類接觸》（Closer
    Encounters of the Third kind）裡的模樣，不過不像孩童。他們的四肢比較結實、粗壯，較不靈活。


