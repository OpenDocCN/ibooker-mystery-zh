    # # 奇

    怪的是，隔天，同樣的封鎖狀況也出現在另一位幽浮個案身上。她體驗到一股似乎會凍結或靜止事物的能量漩渦，一樣也是在過了某個時候想不起任何事。在如此接近的時間裡，我的調查到了比較後期（一九九○年代），時不時會有這種狀況出現。有時我看得出來，那是因為個案尚未準備好要探究這類的事，所以潛意識把資訊封鎖住。其他時候我納悶是不是外星人下了催眠後暗示，防止個案恢復更多的記憶。


    在後續對貝芙莉的催眠療程，我們得以消除阻礙並且發現了隱藏在屏障後的事物。


    我和貝芙莉隔了幾週後見面，進行了另一次催眠。我們仍試著找出能夠解釋她這一世健康和金錢方面的事。這一次，之前的障礙不見了。她的潛意識一開始就讓她看到兩段不同的前世。其中一世在沙漠，另一世顯然是在美國南北戰爭時期。我讓她自己選擇要探索哪一個，她毫不費力地就進入這世紀初劃下句點的那世。內容很平淡，在我看來不是很有趣，但這很正常，也確實提供了貝芙莉一些重要資訊。


    了進來。


    我認為這次催眠探索到的事已經足夠了。


