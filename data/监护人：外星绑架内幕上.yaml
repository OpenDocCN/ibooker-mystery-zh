    許多案例顯示，被帶上小太空船的人類在身體上並沒有受到什麼持續的影響。也許這就是原因。


    那些飛行器進入我們的振動速度並在這裡運作，所以人類沒有適應的問題。小灰人通常就是在這些較小的飛行器上出現；這些被複製或製造出來的生物，顯然比其他型態的外星生物更容易在這此頻率中運作。小灰人是高大灰人依自己的形象所造，以便帶到地球進行瑣碎的僕役工作。他們採集人類、動物、植物等樣本，送到大型太空船上的實驗室做分析。


    人類被帶上較大太空船或「母船」的案例並不多。這些船隻通常是在大氣層的高處，因為過於龐大降落不易。不過，我現在認為，它們也是以不同的頻率振動，所以才會是隱形的（對我們來說）。也許太空船上的外星生命無法輕易調整到較慢的振動，因此偏好待在他們自在舒服的環境裡。人類如果要進入那些太空船，身體的分子必須經過調整，振動也必須加速。人體可以在有限的时间里這麼運作，但無法無限期地下去，否則身體就會瓦解。


    當從太空船上回來，個案會經歷複雜和困難的過程——重新調整身體，降低振動速度。當身體從這個痛苦經歷回到原本的系統，當事人會感到困惑、迷惘，或出現暫時性的麻痺和其他生理症狀（例如瘀血）。這可以解釋為什麼很少有人類被帶上大型太空船的案例，而登上小型飛行器和看到小灰人的經驗則常見得多，因為一般人可能無法適應登上大太空船所需經歷的生理變化。


