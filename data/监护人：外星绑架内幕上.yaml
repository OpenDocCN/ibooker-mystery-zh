    幾天後，在莉安回佛羅里達州之前，我們又見了一次。我在對話還清晰地留在腦海時，把大多數的內容寫了下來。


    她說催眠的事連著困惑了她好幾天，腦子像是有兩個部份在互相爭執。她第一件事就是向我道歉。我很驚訝，不認為她有什麼需要道歉的地方。她說她很抱歉跟我說了這些謊，虛構出那麼詭異的故事。（我知道事情不是這樣的，但我由著她說。）她又說，另一部份的她也知道為什麼自己會編造這樣有違常情的故事。她本來期待是個美好的經驗，即使和宗教無關，至少也是知性的。她推論自己會說這種謊，捏造如此令人厭惡的事，意味著她這個人既反常又病態。這場內心的爭戰持續了兩天。但現在她感覺好些了，她下了結論：不，她不反常，也不病態。她知道自已很正常。只是問題依舊：「故事從何而來？代表什麼？是真的嗎？」


    我告訴她，我認為她如果是在幻想，也應該是場愉快的經歷才對。真相對她來說根本是個震撼。如果我幻想的內容無可否認是有違常情且病態，那麼她應該會覺得很享受，或為了那種扭曲而興奮。但相反的，她只覺得噁心反感。對我而言，這更證實故事的真實性並排除了幻想的說法。她後來想到，她的兒子可能也曾有過什麼經驗。這個想法讓她的胃很不舒服。就像是：「如果不能保護自己的兒子，我還算是什麼媽媽？」「是什麼生物會想傷害一個小孩？」她也懷疑兒子的心靈和潛意識有可能受了傷。為了這件事，我們談了很久。基於我調查過的其他案例，我確實懷疑她的兒子可能也涉入其中，但我不想讓她不安，因此沒有對她提這個可能性。她是自己想到這點的。重要的是，她兒子似乎在意識上沒有任何這類事情的記憶。其實這樣就好，不必窮追不捨。'
