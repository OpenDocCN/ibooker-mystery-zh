    蘇：我在上次的催眠對你描述過。流質的生命體。液態飄浮的流質。像變色龍的。可以有很多形式。


    高度進化的存在體。他們能融入許多行星的文明，把自己變得就像是那裡的生物一樣。他們可以是人形，可以是星際兄弟的形態，他們能以許多种形式出現。我想知道是你們在這個星球上遇過最接近人類的類型。


    朵：其他星球呢？你們在其他星球也發現過其他人類形態的生物嗎？


    蘇：還有一個星球有類似人類的生命形式，但因為環境的關係，他們不是很進化。他們的進化需要更久的時間。他們有相似的人類特徵，但天性跟這裡的生命不一樣。


    朵：我相信我們只剩下幾個問題。有任何存在體或太空船是來自或可以穿越地球內部的嗎？


    蘇：沒錯。在你們墨西哥灣的海岸下面，有個區域現在住著亞特蘭提斯人的後裔。在你們的南極圈


    **監護人**


    THE CUSTODIANS△


    336'
  - '[PAGE 333]


    下面也住著跨次元性質的存在體。

    蘇：地球內部跟我們科學家所認知的一樣嗎？

    朵：地球是中空的嗎？

    蘇：這麼說不正確。

    朵：地球裡面是不是有很大的地區是中空的，適合一個大文明的生存？

    蘇：是的。雖然就地球的總體積來說不大。但以空間感和你們的距離相較，空間是足以維持一個文明。

    朵：是在你提到的那些地區？

    蘇：是的。還有其他的。然而這些是現在在你們的變動中扮演顯著角色的。

    朵：你剛剛說這個戴具越來越累了，是嗎？

    蘇：是的。當我被召喚的時候，我就能協助。我來是為提供資料，幫助人類的進化。解決人類可能有的未解決的問題。這不會強加於任何人。如果你想要得到更多資訊，你可以要求我。我會協助並傳遞資料給你。如果有需要的話，我也會用心靈感應協助你們的進展。

    朵：好的。我很感謝你的協助。我會把資料傳遞給其他人，而且是只為好的、正面的用途。


    蘇珊脫離出神狀態後，覺得胃很不舒服。她說她沒有想吐，但好像有很多能量在她體內打轉。


