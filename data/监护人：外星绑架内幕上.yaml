    # # 監護人 THE CUSTODIANS ▲ 164


    幾天後，在莉安回佛羅里達州之前，我們又見了一次。我在對話還清晰地留在腦海時，把大多數的內容寫了下來。


    她說催眠的事連著困惑了她好幾天，腦子像是有兩個部份在互相爭執。她第一件事就是向我道歉。我很驚訝，不認為她有什麼需要道歉的地方。她說她很抱歉跟我說了這些謊，虛構出那麼詭異的故事。（我知道事情不是這樣的，但我由著她說。）她又說，另一部份的她也知道為什麼自己會編造這樣有違常情的故事。她本來期待是個美好的經驗，即使和宗教無關，至少也是知性的。她推論自己會說這種謊，捏造如此令人厭惡的事，意味著她這個人既反常又病態。這場內心的爭戰持續了兩天。但現在她感覺好些了，她下了結論：不，她不反常，也不病態。她知道自已很正常。只是問題依舊：「故事從何而來？代表什麼？是真的嗎？」


