  md: '# # 一


    一九八八和八九年的夏天，我遇到三個會聯想到跟時間扭曲，甚至移動到另一個次元有關的案例。


    一九八七年的夏天，盧在地方超市的免費報紙上刊登了一則小廣告，徵尋遇過不尋常幽浮事件的人打電話給他。那是他第一次，也是唯一一次刊登這種廣告。


    一位名叫珍奈的女子打電話過去，說她前一晚在他那個地區遇到奇怪的事。那個女子很不安，不願公開自己的身分。她告訴盧，事發當時她從小岩城經過康威區回家，卻只花了十五分鐘。那段路程大約是五十英里，通常要花上四十五分鐘。此外，四線道的州際公路上完全不見其他車輛也挺怪的。回到家後，她養的幾隻狗又不尋常地狂吠。盧說，看來我們有了一宗時間濃縮而非時間消失的案例。過程當中唯一可能和幽浮有關的，就是她看到巨大明亮的光在一些樹頂上頭。不過她是個不想透露身分的商界人士，談論這件事似乎令她覺得尷尬。


    盧於是到她家跟她詳談。他發現珍奈是個非常實事求是的人，從沒閱讀過幽浮方面的資料，也沒有任何興趣。她認為如果真的發生了什麼，一定會有符合常識的合理解釋，但她實在很難解釋時間的加速和天上的光。盧問她是否願意接受催眠，她非常抗拒。我叫盧不要勉強，讓她自己做決定。


    但如果有，我會想跟她見上一面。


    接下來的一年，盧時不時會與珍奈聯繫。她緊抓著各種對那道光的奇怪解釋，甚至接受那是有人在樹上用鏡子往上反射的亮光。由於太想找到一個解釋，結果解釋反而比實際的事件還要詭異。


