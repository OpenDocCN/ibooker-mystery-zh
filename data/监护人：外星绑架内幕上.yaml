  md: '**第三章 事物的表象並不可信**


    對我提起。她看到我现在对幽浮现象比较投入，认为我应该会感兴趣。她并不知道那跟幽浮或外星人有没有关联，不过绝对跟消失的时间和猫头鹰有关。


    那天她下了班，正从费耶特维尔开车回家。这段行程通常会花上半小时左右。事情发生时，她位于乡间的家就近在眼前了。当时太阳已经西落，只是天色尚未全暗。她转过一个弯，忽然看到一隻猫头鹰在她那条线道的正中央。那不是我们这个区域常见的棕色猫头鹰，而是明亮的白色猫头鹰，胸口有著耀眼的银色，一双深黑色的眼睛，非常漂亮。布兰达不想撞到牠，於是放缓车速，心想那大概是在北部几州或加拿大等气候寒冷地区常见的「雪鸮」。後來有位动物学家友人告诉我，寒冬的阿肯色州的確有可能见到雪鸮，不过不可能迟至春天还看得到。如果那真的是的话，确是非常罕见的情形。


    布兰达见到猫头鹰的第一眼，牠的脸是面向另一个方向，但接著就转头看向她，拍拍翅膀朝卡车直飞而来。牠的翼幅与挡风玻璃一样宽，因此吓了布兰达一跳。当牠低空掠过卡车顶时，布兰达转过头去看後车窗，却什麽也没看到。猫头鹰就这样消失，也没有任何鸟踪。布兰达转头来面向挡风玻璃，惊愕地发现天已经黑了。她闪过一个念头：天色未免暗得太快了。她非常困惑，不得不打开车灯，驾驶最後四分之一哩的路回家。当她进到家裡，习惯性地看向时钟。时间照理该是五点半左右，但实际上却已近七点。中间那一个半小时怎麽了？布兰达非常确定自己下班的时间，因为她只在夏天才会加班。


    她觉得这件事很怪，也听说过这类怪事发生时，有些事情会被意识记忆封锁。


    **第三章**


    事物的表象並不可信▲


    069'
