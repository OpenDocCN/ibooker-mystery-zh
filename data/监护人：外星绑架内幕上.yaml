    蘇：他們就像是你們會稱的「變色龍」，可以改變形體，融入環境。他們基本上是能量。如果你看到他們沒有身體的樣子，那會像是飄浮著的液態能量。


    朵：飄浮？會是實體的嗎？


    蘇：當它有身體的時候就有些實體。但你如果看到他們的自然形態，那會比較像液態能量的存在體。就像你們身體裡的靈魂，只是沒有身體。看起來很像。但這些存在體即使是在他們所謂的「原始或正常狀態下都進化得多。就某程度來說，我們所謂的『靈體』，對他們就像是肉體。


    朵：但他們有能力製造出一個肉體。


    蘇：對，因為他們非常進化，輕而易舉就能顯化事物。


    朵：看起來有好多事是我們不知道的。


    蘇：生命的形式有很多種。單是在你們的星球就有很多生物形態，像是昆蟲、動物物種、植物生命。你知道，要說出所有不同物種的名稱是很困難的。所以如果你們能這麼看待，你們會明白外頭的宇宙也有許多、許多的生命形式。其他行星上的生命種類和形態也是各式各樣，它們的昆蟲生命、植物生命和你們的星球非常不同。


    朵：你說他們帶人類上太空船的時候，會讓人類處在出神狀態。這是為了讓人類適應環境，而且也是保護他們的心靈。這麼說對嗎？


    蘇：意識。


    朵：他們的意識？


    蘇：還有他們的心靈。


    朵：我向來認為不記得這些經驗有時反而是仁慈的，這樣就不會干擾到他們的正常生活。


    **監護人 THE CUSTODIANS** ▲ 306


    蘇：這是在保護他們，讓他們離開時不完全處於這個她會稱之的「震撼」狀態。傷害個體不是我們的目的，所以我們不想給他們帶來這種體驗。


    朵：對，兩者都有。


    蘇：所以這也是為了讓他們能夠適應大氣。


    朵：可是他們只能維持在那樣的出神狀態一段時間，然後就必須脫離。


    蘇：是的。這是為什麼他們大多數人很快就回去的原因。如你所知的，時間幾乎停止了。這些事可以在眨眼間發生。時間可以被改變，而且會發生人類在現發展階段難以理解的事。這是為什麼這麼不同的人會有這樣的經歷。甚至是這個管道（指蘇）也有過這個經驗。許多事幾乎是在眨眼間發生，這是因為時間在人類的心智裡被改變了，但在我們（指外星人）的心智，時間並沒有真的改變。那其實自然得很（咯咯笑）。


    朵：對你們來說怎樣都很自然。我常常在想個體是受到了某種催眠。


    蘇：那是傳送到個體意識的一種心靈感應，是他們能接收的東西。此外，腦部也有不同的點可以被刺激。她會說鴉片劑……產生鴉片劑的效果。能量如果被推往腦部的特定部位，就會產生出神狀態。這類意識就類似現在正發生的情形。'
  mdcn: '## 第七章 外星人說話了


    **監護人 THE CUSTODIANS** ▲ 300


    大氣環境，不論是哪類型的傷害，我們有來自母星的一種特殊流質，只要吸收流質到身體，就能幫助修復。但它只用在這類緊急狀況。


    朵：那麼你們不是一直都需要它來維持生命？


    蘇：不用。太空船裡的大氣狀況設定在特定的氣溫和速率——我想不到正確的字。我們創造出特定的空氣，而它會維持我們的體能。我們之所以不能離開太空船很久的原因之一，就是外頭的空氣會使我們的健康惡化。


    朵：空氣，你的意思是地球的大氣？（是的。）那麼你們不需要食物之類的東西，除了那個流質。那是用喝的嗎？


    蘇：我想是用喝的，但也可以用注射的。不必一定是用喝的。我們真的不需要你們所知的食物。


    朵：那麼流質不是從嘴裡喝進去的？


    蘇：那可以是一種方式，不過比起用喝的，更常是注射到嘴裡。就像是你們給某個人——她現在在想的——像是靜脈注射之類的。放進一條管子，然後再透過管子把東西灌進去。你瞧，這是為什麼緊急時才用。我們的系統可以吸收母星上的一些植物生命，但不是必要。我們的系統或如你們所稱的「身體」，具有我們生存所需的一切，只要大氣對了就可以。你瞧，當一個人攝取食物是會有成長的效果，而這會在日後對人類外形產生老化的效應。這是為什麼我們能夠維持身體在同個大小的原因之一。因為我們沒有攝取會改變身體尺寸的食物。食物在以後會產生老化效應。


    朵：這是個有趣的概念。那個流質是由什麼組成的，大致上？


    蘇：並不是這個星球上找得到的東西，但或許有什麼我可以用來比較。她現在看到一個紅色液體的畫面，不過那不是血。比較像是維他命之類的物質。也許她現在想到紅色的維他命液。我想你可能會想到維他命
    B12 或 B6，但是是以液體注射到身體。濃度可能類似，像那類的東西，像維他命液，只是不一樣。


    朵：我想知道如果你們發生了緊急狀況卻沒有這個流質，地球上有沒有你們可以用來取代的東西？


    蘇：我們會試著回母星取得，不然也會盡量去另一艘可能有多餘流質的太空船拿。在必須回母星之前，我們通常會先找到另一艘太空船。


    朵：那麼，就生存而言，看來最重要的是船裡的空氣。


    蘇：是的，這對我們這種身體來說很重要。


    朵：空氣必須維持穩定不變？


    蘇：如我先前所說，我們可以短暫離開太空船。如果我們留下身體，只用能量的形式離開會比較容易。你瞭解嗎？我們可以比較易地移動自己的能量投射而不被大氣條件所影響。這也是另一種保護自己的方式。這或許可以解釋本書提到的那種纖細微弱、非實質存在體的例子。


    **監護人 THE CUSTODIANS** ▲ 301


    朵：這樣一來你們就不會傷害到身體。


    蘇：對，如果是用身體形式離開太空船，我們必須維持在一種心理狀態。我們要設定自己維持在恆常的空氣狀況，不被影響。但我們無法永遠維持在那個思維模式。我們必須再次改變。這是為什麼我們比較喜歡也寧願只短時間這麼做。這個解釋有幫助嗎？


    蘇：有。我想我瞭解。如果有人類在太空船上，他們能在同樣的空氣中呼吸或生存嗎？


    蘇：我們不喜歡帶著人類的完整肉身到我們的太空船上。除非他們周圍有些保護，而我們也保護自己不受到那個人的傷害，因為人類不會習慣我們船上的空氣。在把他們帶上船以前，我們會讓他們進入類似出神的狀態。我們保護他們的意識，好讓意識能承受不同的空氣而不造成身體上的傷害。但，再強調一次，如果地球人在我們的船上太久——通常他們會立刻回去——他們會很難在那樣的空氣下存活。事實上，我想這可能會造成健康問題，而不只是要適應我們而已。


    這整個經驗可能讓他們受到輕微的驚嚇。兩者相加則可能對那個人的健康有害。這是為什麼這些事都在很短的時間內完成。別的外星人有時不會把地球人送回去。那個人大概過了一段短時間後便會死亡。我們不喜歡這麼做，因為我們是來這裡提供協助的。有些外星人以比較動物性的觀點來看待人類生命，對待人類就像你們對待牛一樣。你知道的，他們可能會為了科學的理論解剖人類，只要把人類想成是沒有智能的動物。通常他們絕對不會有吃人或那類性質的事，而且可能是等人死了之後才進行這類實驗。但是我們尊重這裡的生命。我們在議會已承諾要幫助在這裡的人，即使我們進化許多。我們在這些生命身上看到希望，他們也想接觸我們。


    **監護人 THE CUSTODIANS** ▲ 302


    尊重我們，我們也尊重他們。但有些來自其他體系的生命，並不屬於議會成員，也不像我們把人類生命看得那麼珍貴。


    朵：我很高興你們尊重人類生命。因為這樣的話，我們的思考是類似的。我想我們可以溝通得更好，因為我們對生命有同樣的感覺。


    蘇：曾經有一兩個人類被送到我們的星球和其他星球。別的外星人也做過類似的事，但這是很罕見的情形。人類可以活著抵達外星的唯一方式，就是立刻上太空船並立刻送去母星。他們能否從這樣的經歷存活下來，時間是關鍵。這不總是愉快的體驗，然而有些人類渴望發生，而那個渴望便會創造出機會使得事情發生。但一旦他們到了那裡，有時他們並不如自己所預期得那麼高興。他們因為沒有同類而感到寂寞。對他們來說，剛開始時很有趣，而且會因為自己被選上而感到榮耀。但就如大多數人一樣，他們渴望有伴。


