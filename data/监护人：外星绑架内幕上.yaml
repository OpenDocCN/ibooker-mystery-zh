    這個光，因為為了擋光，那裡的窗簾都拉上了。

    我在廁所時是面向走廊，透過廁所門口可以看到走廊牆壁，我發現前廳投射進來的光線就照在部份的牆壁上。我什麼都還沒想，突然間那光就離開了，一切都暗了下來。光不是啪地一下子不見，而是較漸進式的，但速度還是很快。黑暗似乎從右邊往左移動，快速把光吞沒。光只有再短暫地閃現一下，然後整個房子就都變得非常暗。我立刻想到一定是有雲飄過月亮，遮住了月光，雖然那一定是一朵移動很快速的雲。如果有強風的話，確實會如此。不過當我從廁所回到房間，拉開窗簾往外看時，卻不見月亮和雲層，也不覺得有風。那是個平靜、清澈、星光點點的夜晚。

    我納悶自己如果先去了前廳而不是廁所，是不是會看到大觀景窗外頭有什麼東西。我經常會到窗前觀望月亮或星星，但內急卻讓我沒法做別的事。光消失的方式暗示了移動，就像是從窗戶的左邊移動到右邊。這可以解釋走廊是從另一個方向一路暗下來的情況。

    我的房子跟別的房子不一樣，建造的方式並不一般。它有兩層樓，客廳、臥室和廚房都在二樓，但後來放棄了這個推測。道路在幾百呎外，房子又被一排濃密的樹木遮蔽。我考慮過有車子經過家門前道路的可能，我曾經看過車子來回經過這條路上許多次，每次車燈投射到牆上的光都是分散和閃爍的，這是因為樹林的關係。每當有車子經過時，樹的輪廓也一定會映照在牆上。即使是車子開上我家車道，然後停在門前，那個光線也不一樣。我觀察過這個情況許多次了。那道光並不是從路上或車道投射進來的車燈。它一定是從一個較高的角度照進來，而且是非常耀眼的光，不然不能照亮整個房間和走廊。'
