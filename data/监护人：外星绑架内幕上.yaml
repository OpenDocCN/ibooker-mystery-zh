    # # 第五章 埋藏的记忆


    就如梦有时会藏有潜意识深处的真正体验，记忆，也同样会被时间所扭曲。小时候，我们会以一种比较简单和天真的方式去认知事物。长大后，我们对童年时期情感受创的事件却有了不同的看法。假使记得一件事令人痛苦，那么那个记忆往往会被掩埋。我们要直到透过催眠找回记忆，并再次经历那个事件时，才发现事情往往不是那么具威胁性。而从大人的眼光去看，一切都明瞭了。


    我曾有些个案想找回遗忘的事件，他们认为自己之所以不记得或记忆被压抑，一定是因为那是可怕的事。然而，透过催眠，我们往往发现事情的解释很简单。举例来说，那可能只是一个惹火父母的错误行为或淘气举动。压抑对事件的意思也不意味这其中涉及了任何肢体惩罚。原因通常只是父母生气了。此外，不知怎地，现在有个很普遍的解释：如果有某事一直被压抑，那就一定跟幽浮和外星人脱不了关系。然而，我发现十个案例有九个和外星人毫无关联。这是为什么我告诉调查员，永远要从简单，而非复杂的解释开始探讨。换句话说，在考虑诡异的因素之前，先找最简单、合逻辑的解释。


    透过最深层的催眠，真相总会浮现。事实无法被隐藏，除非说谎或捏造是个案生活裡正常的一部份了。


    在这种情况下，个案就可能说谎或幻想，因为那是他们的天性。但这类案例很少见，他们的故事'
  - '[PAGE 168]


    也非牢不可破。如果他們是在幻想，故事不會一直維持不變，反而會在複述時出現變動。他們會加新油添些醋，給故事更多的渲染。此外，故事也會跟我已經發現的模式不合。


    當然，我有可能尚未完全掌握到構成一個模式的所有要素，這是永遠無法排除的可能性。未來可能會有某人帶著故事出現，呈現出我尚未探索過的全然不同面向。我必須對這個可能性保持開放，不要自動關上了所有的門。然而話又說回來，即使有新的思考方式，依然會有符合模式的元素。


    調查員的工作顯然並不容易，尤其又是和治療結合的時候。


    以下幾個案例之所以浮現，就是因為我對所有的可能性保持開放的態度。


    法蘭是個四十幾歲的離婚婦女，一頭鮮豔的紅髮是她最明顯的特徵。她對自己在一間很有名望的事務所擔任執行長感到滿意。她在一九八八年的時候來找我，想透過催眠探索一些特別鮮明的記憶。她在密西西比州的農場長大，但從未聽聞那類鄉村地區的幽浮事件。事情就在她沒有接觸過任何類型的神秘或超自然書籍和主題的情況下發生，留下了模糊且難以理解的記憶。


    法蘭還記得小時候曾有幾次看到自家上方出現奇怪的光，長大後也曾有光跟過她的車子。由於這些事情沒有合理的解釋，她推測它們可能和幽浮有關。奇怪的是，事發當時她毫不恐懼，但和她在一起的人都嚇壞了。她沒有其他同樣性質的意識記憶，於是我們決定針對這些目擊經歷去探索。


    監護人 THE CUSTODIANS ▲ 172'
- md: '## 第五章 埋藏的記憶


    我做過許多催眠，個案都只是對目擊的經驗記起更多細節，因此我們並沒有期待會挖掘出什麼非比尋常的事。此外，法蘭有個想在催眠時順道瞭解的私人問題，那是我會稱為「業力關係」的問題。她從小就跟祖母有過摩擦，她想不通是為了什麼，因為她很愛祖母，但她有個感覺，自己好像曾經做過冒犯祖母的事。如果摩擦的起因不是在這一世，那麼回溯前世的催眠確實能對此做最好的處理，所以我並沒有很專注在這個問題，我只是記錄下來，想著如果有時間就會追查。


    法蘭是個理想的個案。她令人訝異地自動回到了童年時的一起不尋常事件。由於潛意識不會沒由來地浮現某件事，我決定先問一些問題再說。


    她回到了七歲的時候，重溫自己那個年紀的經歷，而她的言談舉止和臉部表情都驚人地符合年齡。七歲的她盤腿坐在床中央，正在玩一套小瓷盤。這事之所以不太尋常，因為那些盤子是祖母的，她是不准拿來玩的。但她認為只要在一大床上玩，要弄破也很難。她拿著小水罐、杯子和小盤子，高興地發出咯咯笑聲。她說：「它們不是我的，不過被我拿來玩了。我爸爸在這裡，他教我怎麼玩。」


    她口中的父親並不是她的生父，但他要求法蘭這麼稱呼他。顯然他不是陌生人，而是某個固定會來看她的人。我請法蘭描述對方，她說那是一個站在床邊，非常高瘦的人。「他身上披著一塊布，看起來跟我穿的衣服一點也不像。」描述到他的身體特徵時，她很遲疑。「我很難看著他。他的臉像是你用模型玩黏土，然後把黏土揉得很光滑的樣子。他沒有頭髮和眉毛，眼睛又大又黑……不過這真的不重要。」


    他教她如何飄浮。他把手放在她的頭頂，她的身體和小盤子便一起升到半空中。有一點刺痛感，但她覺得很好玩，哈哈笑著邊跟他說話。就在這個時候，祖母非常突然地闖進來。她聽到說話聲，想知道房間裡是怎麼回事，她以為孫女在做什麼壞事。


    法蘭的專注力被突然闖進的祖母打斷，小盤子全掉下來破了。祖母不懂她怎麼會打破盤子，便對她發了脾氣，法蘭堅持自己什麼也沒做。奇怪的是，祖母似乎沒看到那個人。他是在祖母從門口進來的时候就消失了呢？還是怎麼回事？


    法蘭自動回溯到祖母和她之間的不愉快事件。小女孩覺得很生氣，因為她被不公正地指責她不是故意做的事。當然，就算她解釋了關於「父親」的事，祖母也不會理解。法蘭會被指控是在幻想或說謊。長大後，她的意識雖然知道童年時好像發生過什麼，但在催眠之前卻一直想不起來。


    我想對那個外星人有多些瞭解。小法蘭回答，從她有記憶以來，他就在她的身邊。他常在森林裡和她見面，和她一起走路、說話。「他教我如何聆聽，去聽見。聽大人聽不到的聲音。他教我怎麼去看那些大人看不到的顏色和東西。好美。」


    朵：他來看你的時候，是怎麼來的？


    法：（困惑）我不知道。他就站在那裡了。有時候我發現他在，我就走向他。有時候我知道他會出現。


    我不知道我怎麼會知道的。我心裡知道他會出現。


    朵：除了在房子裡和森林，你還在別的地方見過他嗎？（她不太願意回答，大概從沒有對人談過這件事。）我只是好奇。你可以告訴我大人不會相信的事。有人相信你不是很好嗎？


    法：是啊。他相信我。


    朵：我就是這麼想的。但你在房子和森林以外的地方見過他嗎？


    法：我想有吧。森林裡有光。很大的光。有樓梯可以走到光裡。他在我旁邊，我們從樓梯上去。


    朵：樓梯通到哪裡？


    法：到那個很大的光的下面。


    她描述走上光做的樓梯。樓梯的頂端有一扇金屬門。灰色的，看起來像金屬，摸起來卻感覺很柔軟。那個外星人想讓她看看這個地方，但說她不能在這裡待很久。那裡有個走廊，還有可以通往很多房間的門口。可是那些門看來很怪，一層一層的。「有一個地方我不該去，我不能去大房間。這間就沒問題。」


    在她被准許進入的房間裡，有一個看起來像是金屬的圓筒，座落在一個很合大小的平台上。「它很亮，不像門上的金屬。」我想知道圓筒多大。「還沒大到我能鑽進去的地步。如果我躺下來，大概會到我這裡（她的鼻子）。可是我進不去，它不夠大。照說裡面應該是要有某種動物。」


    那個外星人手上拿著他從森林裡的鳥窩取的幾顆鳥蛋。他告訴法蘭，他必須把鳥蛋放在房裡。「這是為什麼我會進去的原因。」


    朵：他怎麼處理那些蛋？


    法：（孩子氣的聲音）噢，他把它們放到一個……一個東西裡……（指向左邊）。我不確定那裡有什麼。看起來很怪。有一點亮光，但看起來像某種布。可是……不像平常的布。他把蛋放在那裡。


    朵：你的意思是為什麼這麼做？


    我很好奇他為什麼這麼做？


    法：是呀，有一點。可是這個不一樣。它有光。他說那是幫助蛋孵化。噢！會保溫。我喜歡觀察這種事。


    朵：那麼他把蛋帶進去，觀察它們孵化，這是給你看那個房間的原因。


    她試著用她童稚的方式解釋其他房間有更多這些槽，雛鳥會被放進其中一個槽裡，保護牠們的安全。


    法：他們在槽裡放不同的東西，不同的動物。我不認為那些東西是從這裡來的。那個動物。他不是這裡的。


    朵：你認為他從哪裡來？


    法：星星。父親就是從那裡來的。


    朵：那是很遠的地方，不是嗎？他有沒有說是哪裡？


    法：他說我不會明白。他只說星星。


    朵：哦，這可以解釋為什麼動物在槽裡比較安全。


    法：我想是的。


    朵：他有沒有給你看別的東西？


    法：沒有。我們得走了。我們必須回去了。離開的時間到了。


    朵：很好玩吧？


    法：當然。我還想再去。（咯咯笑）他喜歡我的紅頭髮。


    朵：是嗎？或許是因為他自己沒頭髮。（她哈哈笑）


    朵：你們回到外面了嗎？


    法：對。樓梯就像白色的光。很特別，你可以踏在上面。我回到森林後，父親用他的手指輕輕敲了我的前額，然後我一直聽到：「忘掉。」


    我試著瞭解法蘭後來是否再見過他，或是和他有過更多的冒險歷程。但令人難過的是，他告訴法蘭，因為盤子事件使得她惹祖母生氣，他以後不能來了。他說法蘭必須把他忘了。我可以感覺到他對這個小孩有非常真切的情感、心裡其實不想離開，卻不得不如此。他似乎很開心能與法蘭互動，還有教導她那些事。他們之間就算還有其他互動，我也沒能在她的記憶庫裡找到。把他忘掉的暗示若不是很有用，就是他真的沒再出現過。


    催眠療程的其他部份都跟法蘭的目擊經歷有關，但只出現很一般的資訊。


    ## 四


    十多歲的貝芙莉是位畫家，然而，以此為業不一定能換得溫飽。為了賺取生活費，她不得不接招牌看板的繪畫。令她訝異的是，這方面她做得還挺成功的。空閒時，貝芙莉仍追求自己的藝術表現。她住在一棟完全嵌在歐札克山區裡一處山坡的奇特房子，房子蓋得很像是在山洞裡生活的，只有前面牆壁門窗所照射進來的光線才讓人感覺到戶外的存在。一九八八年，我們就是在那裡做的催眠。


    貝芙莉想探索前世，希望能為健康和金錢問題找到解釋；這是我們最初的計劃，但潛意識常有其他的想法。由於它不會無緣無故提起某事，遇到這種情況我總是順其自然。浮現的資訊通常會是個案需要知道的，和催眠原有的打算反而沒什麼關係。


    在催眠前的面談討論中，貝芙莉告訴我她有些一直忘不了的奇怪童年經歷。她並沒有因此煩惱，她把那些當成罕見而有趣的事。「一年級時，據說我和我朋友派翠西亞在放學後離家出走。學校對街有一大片森林地，我們去了那兒。我在那裡的時候發生了什麼事、待了多久之類的都沒有印象。可是我們的父母都出來找我們了。我那時還沒有時間概念，因此不曉得過了多久。我家離學校有六個十字路口，當我媽找過來時，我們已經在回家的半路上。我一點都不記得那段時間發生了什麼事，只記得爸媽對我們離開那麼久非常大驚小怪。他們說學校三點就放學了。可是我們到家時天都快黑了。當時他們已經準備要報警。令我訝異的是，如果那是我第一次逃家，我應該會有印象，至少記得一份情況，可是我完全沒有印象。我只記得我們過街進入森林。除了後來被找到和因此惹上麻煩，其他事都忘得一乾二淨，也不記得當時玩得開不開心。」


    她一邊回想童年，一邊又提起其他奇怪的記憶。「我的房間在屋子的最裡面。我喜歡自己獨處。我經常回到房間，關上門好避開爸媽，坐在自已床上作白日夢。至少我認為自己是正在作白日夢。我會坐在床上，接下來身子就會有點搖晃。等恢復意識時，人已經在地板上了。我媽說我大概是睡著後從床上掉了下來。可是我知道我沒有睡著。」


    催眠前的面談討論涵蓋了許多她人生中的事件。我都是在這個時候瞭解個案，試著明瞭他們想在催眠下探索什麼。有時他們說的話會跟催眠內容有關，有時則否。在貝芙莉的情形，我記下來的不尋常記憶有好幾個。由於談到童年，她又想起另一個回憶：跟惡夢有關的負面記憶。


    「這是我所能記得的最早記憶了，那一定是在三歲的時候。我夢到很大的蟲。我知道年齡是因為我記得我那時有隻狗。那些大蟲會上我的床，但沒有傷害我。牠們讓我聯想到『竹節蟲』，有著像昆蟲那種長長的身體和細小、脆弱的觸角，還有超大的眼睛。」


    由於別的案例也提過「竹節蟲」似的外星人，這引起了我的注意。她是在形容外星人，還是只是記起了孩童時期的生動想像？我沒有讓她知道我聽說過昆蟲類的外星人。我想要她提供自己的描述。


    「他們不像蜘蛛那樣圓潤的，牠們是長型的蟲。有些蟲長得就像那樣，其中一種是竹節蟲，另一種是螳螂。牠們身體的正面上方有附肢，背後也有。牠們和我一樣大。當然，我那時還只是個小女孩。牠們沒有傷害我，可是跑到我的上面來時真的嚇到我了。我的床是單人床。因為我躺在床上，它們由上而下俯看著我，看起來比我還大。牠們的身體沒有碰到我。牠們用觸腳類的東西撐著身子停在我的上方，所以牠們的的身體和我的身體之間還有空間。房間裡通常會出現兩、三隻，最少一隻，但都只是一個勁地看著我。我從幼年有記憶開始就做這些惡夢了。那時我還沒看過電影，更別說是恐怖節目了。」


    「有些巨蟲的顏色暗沉，有著類似螞蟻的大眼睛，但她很清楚牠們絕對不是螞蟻。『有好多次我都是尖叫著醒來。有時我會起床，走到後院去找我的狗，把牠帶到床上和我一起睡。我妈不准狗進家裡。我怕黑，但我卻會在黑夜中走出去，把狗帶進來，讓牠進被窩裡和我在一起，這樣我才能睡得安穩。我住的地方氣候很熱又潮濕，房子裡大多會有螻蟻。可是我沒有夢過螻蟻。暑假時我會到鄉下和祖母住，在那裡也從沒做過惡夢。」


    隨著貝芙莉繼續回想，她又提起另一件讓她留下強烈印象、從未忘記的奇怪經歷。那是一九七〇年代初期，她成年後的事了。當時她已婚，有個兒子，一家人住在休士頓的郊區。他們家是那條街上唯一後院光禿禿沒有樹的房子。這不重要，反正他們打算在那裡蓋個游泳池。有天，貝芙莉和先生在房子最後面的臥室睡覺，但一個怪聲音卻吵醒了她。


    她邊笑邊說：『我知道那是一艘飛碟。我心想：『噢，又是牠們。』不要問我這個想法是從哪裡來的。我根本不曉得飛碟會有什麼聲音。我醒來後一聽到那個聲音，直覺上便知道那是什麼。羅伯還在睡，從頭到尾沒有醒來。我覺得他沒有被那個聲音吵醒很奇怪，但我沒有叫他。就我所知，我並沒有下床，也不知道自己到底醒來多久。我只是繼續睡，沒有起來。不過正常來說我會下床。』


    多數人聽到後院有聲音都會起來察看，可是我知道我並沒有下床。


    我問她那個聲音像什麼，她的回答很熟悉。「聽起來嗡嗡的，像是高速飛機。」我們聯想了好幾個聲音，然後她找到一個接近正確的描述。「聽起來不像是飛機的螺旋推進器。你知道小孩玩的陀螺放在桌上旋轉時的那個聲音嗎？像嗚嗚或嗖嗖聲。一種高音調的旋轉聲音，像風轉得很快，只是聲音更大一些。那個聲音不是很少吵。我的意思是，不是整個街坊鄰居都會被吵醒的那種音量。」


    我提出那個聲音可能是直昇機，只不過這樣的話，聲音應該會更大聲才對，音調也不同。另一個聯想是：「也很像洗衣機在轉的時候，但我知道它轉得更快。我很確定自己沒有睡著。我躺在那裡聽，心裡想著：『哦，不過就是後院有艘太空船。』我並不害怕。就我所知，我只是回頭繼續睡。」


    這確實是個奇怪的反應。晚上聽到奇怪的聲音，通常第一個念頭會是有人在後院，而他們可能會闖進屋子裡來。你的第一反應會是恐懼，然後大概會起床，看向窗外。我同意這些記憶都是奇怪的事件。我把它們記了下來，但我們最關心的是為她目前的問題找到解答，而不是探索幽浮。她說她對幽浮反正也不感興趣。


    貝芙莉改變了話題，開始討論她的許多身體狀況。她從小到大都有醫生難以確診的奇怪症狀，情況很不尋常。「這已經到了變成笑話的程度。他們始終沒能確定。我去大醫院檢查時也一樣。他們跟我保證會找出問題，但找不出來時態度就變得保守。我開了十三個小時的車，花了兩千美元的醫療檢驗費，卻還是不曉得到底是哪裡出了問題。這實在很令人沮喪。」有些問題至今仍在，因此也是她想探索的方面之一。她想知道為什麼她有這麼多身體狀況，又是怎麼產生的。她推測這類的業或許是源自前世。持續的金錢問題也令她擔憂。因此，當我們開始療程時，健康和金錢是我們的主要焦點，童年回憶只不過是有趣的旁線。


    貝芙莉進入深度催眠狀態後，我用了照說能讓她自動進入前世的技巧，但她只看到各種旋轉的顏色。這種情況經常發生，而我可以讓她往別處行進。在我讓她進入更深度的催眠狀態後，貝芙莉開始描述現在這世的一幕。她再度變成第一天上學的六歲小孩，發出高亢的咯咯笑聲，邊說著她被留在廁所，並在偌大的學校迴廊上迷路的事。她並不害怕，反而覺得是探險。她以小孩的舉止和說話模式，詳細地描述她一年級的老師和朋友，也仔細介紹了學校的格局布置。


    潛意識從來不會毫無理由地提起一件事，所以我想這或許是個完美的機會，可以探索她跑到學校對街森林裡的記憶。


    朵：好，學校附近有森林嗎？


    貝：嗯。就在對街，不是車很多的那條街，是小馬路。那裡有點陰森。我通常不進到森林裡面。不過我可以的！


    朵：怎麼個陰森法？


    貝：有那些樹木的地方很暗。不過裡面什麼也沒有，就只是很多樹。還有，很早就暗了。


    朵：好，貝芙莉，我要你往前到你放學後和女同學一起走進森林裡的那一晚。女同學叫什麼名字？


    貝：派翠西亞。


    朵：好。現在是那天下午，學校放學了。所有的小孩都回家了嗎？


    貝：沒有。他們在操場。我們只是到處閒晃。


    朵：你以前有沒有進去過森林？（沒有。）為什麼你們決定要在這個下午進去森林？


    貝：（嚴肅的語氣）我們要離家出走。


    朵：是嗎？為什麼要這麼做？


    貝：因為我們不喜歡家裡。


    朵：這個做法很極端。


    貝：嗯，他們活該。


    朵：為什麼你們要離家出走？發生了什麼事嗎？


    貝：沒有。沒事。我們只是決定要這麼做，因為我們不喜歡在家裡。而且，我們現在有時候也應該能去一些地方了。


    朵：為什麼是現在？


    貝：因為我們大了，已經上學了。


    朵：不怕迷路嗎？


    貝：喔，我們大概還是會回家吧。我不知道我們會不會永遠待在外面。我想有些小孩以前也曾經越過那條柏油路。那不算是一條街。你知道，就只是條馬路。我想其他的小孩也去過。


    朵：好，跟我說說發生了什麼事。


    貝：我們在裡面閒晃。樹木真的好大喔。沒有草。我的意思是，你可以走在樹跟樹的中間，地上有松針之類的東西，不是家裡院子的那種草。


    朵：你們在森林裡做了什麼？（停頓）（她的表情和眼睛的動作顯示有事情發生）怎麼了？


    貝：（困惑）我不知道。（停頓許久）我想我不應該說。我想我什麼都不該做。我不知道她在哪裡，可是我想我們什麼都不該做。


    朵：誰在哪裡？


    貝：派翠西亞。


    朵：她不是跟你在一起嗎？


    貝：（停頓）我看不到她。我想我凝結了。


    朵：你的頭腦沒有凝結，它可以跟我說話，而且你完全不會覺得困擾。它知道事情的經過，還能跟我說話。


    貝：像是……被抹得一乾二淨。像擋風玻璃的雨刷的作用一樣。


    朵：什麼意思？


    貝：我不知道。（手勢）弧形的。（手勢）它就在我前面。我什麼都不該做。


    朵：你能看穿它嗎？


    貝：我想我不應該看。


    朵：我不會要你做任何會讓你惹上麻煩的事。我只是好奇。它是從哪裡來的？


    貝：（停頓）我不知道。我只是在森林裡走著，然後……我想它是粉紅色的。（她開始害怕）像是個防護罩。（她的聲音顫抖著，眼睛泛起淚水。）就在我前面。（現在她像個小孩般毫不掩飾地大哭和啜泣）它讓我覺得我不能動（明顯沮喪）。


    我說了些安撫的話，幫助她放鬆，不再情緒化。過了幾分鐘，大聲的啜泣停止了。我向她保證，她可以跟我說，告訴我發生了什麼事。她恢復了鎮靜。


    朵：你說它是粉紅色的？


    貝：是啊，是個粉紅色的東西，它好像會麻痺所有的東西，還有我的腦袋。它從我的一邊到我的前面再到我另一邊。


    朵：就在你的面前嗎？


    貝：我不知道。我知道的就這些。


    朵：換句話說，你現在只能看到這些。（是啊。）當你們在森林中走動的時候發生了什麼事？


    貝：我們可以看到裡面某個地方有陽光。我覺得很亮，也覺得很漂亮。陽光透過樹林灑下來。我想它沒有全部都照到。我想它是照在右邊。


    朵：你知道陽光有時是這樣的。然後你們做了什麼？


    貝：我想我們只是看著它。


    朵：它是陽光嗎？


    貝：（困惑）我不知道。我不能……這個粉紅色的東西……我什麼都不能做了。就好像它停止了一切。（手勢）只除了它從這裡到了這裡（就在她的視野範圍）。它沒有碰我。它很光滑，可是我無法透視它。它讓一切停止了。它讓我腦袋停下來了。不痛。我沒有任何感覺。我什麼都看不到，只看到這個粉紅色的東西。它整個在我面前，像防護罩一樣。


    朵：你的腳下有什麼感覺？


    貝：我感覺不到我的腳。我只覺得麻木。


    朵：你有沒有聽到什麼？


    貝：沒有。一切都被停止了。像是靜止的照片。我看不到更遠的地方……（嘆氣）淺黃色、粉紅色……它似乎凝結了一切。


    朵：好吧。可是，記得這只是暫時的，它一點都不會令你困擾。


    貝芙莉說不出任何感受，就好像她身體的感官真的被全部凍結一樣。我很快意識到追查這件事只是白費力氣。她的潛意識沒準備好要釋放這個資訊。我於是帶引她到下一個可以感受的場景，不論是聽覺、嗅覺或感覺。令人驚訝的是，她突然開始咯咯笑了起來。


    貝：我们从森林中跑出来，边跑边笑。我们出来了。（笑声）


    朵：什么意思？


    贝：哦，我们刚刚出来了。（大叹，然后笑声）我们出来了！（停顿）我的头发卷卷的。


    朵：什么意思？


    贝：喔，我们有卷卷的头发。我们咯咯笑著跑出森林的时候，头发都在弹跳。（大叹）我们做到了！我们进去森林又出来了。


    朵：你们在森林的时候有没有发生什么事？


    贝：我不知道。（困惑）大概有吧。


    朵：什么意思？


    贝：嗯，你知道，就是当你去到某个没有去过的地方，你会怀疑自己能不能出来。我们出来了。


    朵：你们在森林裡做了什麽？


    贝：我想只是玩吧。我不记得了。我想我们只是进去到处乱走。（叹气）我必须过马路口了。森林裡很暗，可是我们进去的时候，学校裡还有阳光。现在真的越来越暗，所以我们最好回家了。


    朵：我想你们最好在惹上麻烦前回家。


    贝：我想我们已经惹上麻烦了。


    朵：你们决定不离家出走了吗？


    贝：是啊，我想是吧。我想我们必须回家。我不知道我们是不是……噢！我想她们追来了。我们的'
  mdcn: '## 第五章 埋藏的記憶


    我做過許多催眠，個案都只是對目擊的經驗記起更多細節，因此我們並沒有期待會挖掘出什麼非比尋常的事。此外，法蘭有個想在催眠時順道瞭解的私人問題，那是我會稱為「業力關係」的問題。她從小就跟祖母有過摩擦，她想不通是為了什麼，因為她很愛祖母，但她有個感覺，自己好像曾經做過冒犯祖母的事。如果摩擦的起因不是在這一世，那麼回溯前世的催眠確實能對此做最好的處理，所以我並沒有很專注在這個問題，我只是記錄下來，想著如果有時間就會追查。


    法蘭是個理想的個案。她令人訝異地自動回到了童年時的一起不尋常事件。由於潛意識不會沒由來地浮現某件事，我決定先問一些問題再說。


    她回到了七歲的時候，重溫自己那個年紀的經歷，而她的言談舉止和臉部表情都驚人地符合年齡。七歲的她盤腿坐在床中央，正在玩一套小瓷盤。這事之所以不太尋常，因為那些盤子是祖母的，她是不准拿來玩的。但她認為只要在一大床上玩，要弄破也很難。她拿著小水罐、杯子和小盤子，高興地發出咯咯笑聲。她說：「它們不是我的，不過被我拿來玩了。我爸爸在這裡，他教我怎麼玩。」


    她口中的父親並不是她的生父，但他要求法蘭這麼稱呼他。顯然他不是陌生人，而是某個固定會來看她的人。我請法蘭描述對方，她說那是一個站在床邊，非常高瘦的人。「他身上披著一塊布，看起來跟我穿的衣服一點也不像。」描述到他的身體特徵時，她很遲疑。「我很難看著他。他的臉像是你用模型玩黏土，然後把黏土揉得很光滑的樣子。他沒有頭髮和眉毛，眼睛又大又黑……不過這真的不重要。」


    他教她如何飄浮。他把手放在她的頭頂，她的身體和小盤子便一起升到半空中。有一點刺痛感，但她覺得很好玩，哈哈笑著邊跟他說話。就在這個時候，祖母非常突然地闖進來。她聽到說話聲，想知道房間裡是怎麼回事，她以為孫女在做什麼壞事。


    法蘭的專注力被突然闖進的祖母打斷，小盤子全掉下來破了。祖母不懂她怎麼會打破盤子，便對她發了脾氣，法蘭堅持自己什麼也沒做。奇怪的是，祖母似乎沒看到那個人。他是在祖母從門口進來的时候就消失了呢？還是怎麼回事？


    法蘭自動回溯到祖母和她之間的不愉快事件。小女孩覺得很生氣，因為她被不公正地指責她不是故意做的事。當然，就算她解釋了關於「父親」的事，祖母也不會理解。法蘭會被指控是在幻想或說謊。長大後，她的意識雖然知道童年時好像發生過什麼，但在催眠之前卻一直想不起來。


    我想對那個外星人有多些瞭解。小法蘭回答，從她有記憶以來，他就在她的身邊。他常在森林裡和她見面，和她一起走路、說話。「他教我如何聆聽，去聽見。聽大人聽不到的聲音。他教我怎麼去看那些大人看不到的顏色和東西。好美。」


    朵：他來看你的時候，是怎麼來的？


    法：（困惑）我不知道。他就站在那裡了。有時候我發現他在，我就走向他。有時候我知道他會出現。


    我不知道我怎麼會知道的。我心裡知道他會出現。


    朵：除了在房子裡和森林，你還在別的地方見過他嗎？（她不太願意回答，大概從沒有對人談過這件事。）我只是好奇。你可以告訴我大人不會相信的事。有人相信你不是很好嗎？


    法：是啊。他相信我。


    朵：我就是這麼想的。但你在房子和森林以外的地方見過他嗎？


    法：我想有吧。森林裡有光。很大的光。有樓梯可以走到光裡。他在我旁邊，我們從樓梯上去。


    朵：樓梯通到哪裡？


    法：到那個很大的光的下面。


    她描述走上光做的樓梯。樓梯的頂端有一扇金屬門。灰色的，看起來像金屬，摸起來卻感覺很柔軟。那個外星人想讓她看看這個地方，但說她不能在這裡待很久。那裡有個走廊，還有可以通往很多房間的門口。可是那些門看來很怪，一層一層的。「有一個地方我不該去，我不能去大房間。這間就沒問題。」


    在她被准許進入的房間裡，有一個看起來像是金屬的圓筒，座落在一個很合大小的平台上。「它很亮，不像門上的金屬。」我想知道圓筒多大。「還沒大到我能鑽進去的地步。如果我躺下來，大概會到我這裡（她的鼻子）。可是我進不去，它不夠大。照說裡面應該是要有某種動物。」


    那個外星人手上拿著他從森林裡的鳥窩取的幾顆鳥蛋。他告訴法蘭，他必須把鳥蛋放在房裡。「這是為什麼我會進去的原因。」


    朵：他怎麼處理那些蛋？


    法：（孩子氣的聲音）噢，他把它們放到一個……一個東西裡……（指向左邊）。我不確定那裡有什麼。看起來很怪。有一點亮光，但看起來像某種布。可是……不像平常的布。他把蛋放在那裡。


    朵：你的意思是為什麼這麼做？


    我很好奇他為什麼這麼做？


    法：是呀，有一點。可是這個不一樣。它有光。他說那是幫助蛋孵化。噢！會保溫。我喜歡觀察這種事。


    朵：那麼他把蛋帶進去，觀察它們孵化，這是給你看那個房間的原因。


    她試著用她童稚的方式解釋其他房間有更多這些槽，雛鳥會被放進其中一個槽裡，保護牠們的安全。


    法：他們在槽裡放不同的東西，不同的動物。我不認為那些東西是從這裡來的。那個動物。他不是這裡的。


    朵：你認為他從哪裡來？


    法：星星。父親就是從那裡來的。


    朵：那是很遠的地方，不是嗎？他有沒有說是哪裡？


    法：他說我不會明白。他只說星星。


    朵：哦，這可以解釋為什麼動物在槽裡比較安全。


    法：我想是的。


    朵：他有沒有給你看別的東西？


    法：沒有。我們得走了。我們必須回去了。離開的時間到了。


    朵：很好玩吧？


    法：當然。我還想再去。（咯咯笑）他喜歡我的紅頭髮。


    朵：是嗎？或許是因為他自己沒頭髮。（她哈哈笑）


    朵：你們回到外面了嗎？


    法：對。樓梯就像白色的光。很特別，你可以踏在上面。我回到森林後，父親用他的手指輕輕敲了我的前額，然後我一直聽到：「忘掉。」


    我試著瞭解法蘭後來是否再見過他，或是和他有過更多的冒險歷程。但令人難過的是，他告訴法蘭，因為盤子事件使得她惹祖母生氣，他以後不能來了。他說法蘭必須把他忘了。我可以感覺到他對這個小孩有非常真切的情感、心裡其實不想離開，卻不得不如此。他似乎很開心能與法蘭互動，還有教導她那些事。他們之間就算還有其他互動，我也沒能在她的記憶庫裡找到。把他忘掉的暗示若不是很有用，就是他真的沒再出現過。


    催眠療程的其他部份都跟法蘭的目擊經歷有關，但只出現很一般的資訊。


    ## 四


    十多歲的貝芙莉是位畫家，然而，以此為業不一定能換得溫飽。為了賺取生活費，她不得不接招牌看板的繪畫。令她訝異的是，這方面她做得還挺成功的。空閒時，貝芙莉仍追求自己的藝術表現。她住在一棟完全嵌在歐札克山區裡一處山坡的奇特房子，房子蓋得很像是在山洞裡生活的，只有前面牆壁門窗所照射進來的光線才讓人感覺到戶外的存在。一九八八年，我們就是在那裡做的催眠。


    貝芙莉想探索前世，希望能為健康和金錢問題找到解釋；這是我們最初的計劃，但潛意識常有其他的想法。由於它不會無緣無故提起某事，遇到這種情況我總是順其自然。浮現的資訊通常會是個案需要知道的，和催眠原有的打算反而沒什麼關係。


    在催眠前的面談討論中，貝芙莉告訴我她有些一直忘不了的奇怪童年經歷。她並沒有因此煩惱，她把那些當成罕見而有趣的事。「一年級時，據說我和我朋友派翠西亞在放學後離家出走。學校對街有一大片森林地，我們去了那兒。我在那裡的時候發生了什麼事、待了多久之類的都沒有印象。可是我們的父母都出來找我們了。我那時還沒有時間概念，因此不曉得過了多久。我家離學校有六個十字路口，當我媽找過來時，我們已經在回家的半路上。我一點都不記得那段時間發生了什麼事，只記得爸媽對我們離開那麼久非常大驚小怪。他們說學校三點就放學了。可是我們到家時天都快黑了。當時他們已經準備要報警。令我訝異的是，如果那是我第一次逃家，我應該會有印象，至少記得一份情況，可是我完全沒有印象。我只記得我們過街進入森林。除了後來被找到和因此惹上麻煩，其他事都忘得一乾二淨，也不記得當時玩得開不開心。」


    她一邊回想童年，一邊又提起其他奇怪的記憶。「我的房間在屋子的最裡面。我喜歡自己獨處。我經常回到房間，關上門好避開爸媽，坐在自已床上作白日夢。至少我認為自己是正在作白日夢。我會坐在床上，接下來身子就會有點搖晃。等恢復意識時，人已經在地板上了。我媽說我大概是睡著後從床上掉了下來。可是我知道我沒有睡著。」


    催眠前的面談討論涵蓋了許多她人生中的事件。我都是在這個時候瞭解個案，試著明瞭他們想在催眠下探索什麼。有時他們說的話會跟催眠內容有關，有時則否。在貝芙莉的情形，我記下來的不尋常記憶有好幾個。由於談到童年，她又想起另一個回憶：跟惡夢有關的負面記憶。


    「這是我所能記得的最早記憶了，那一定是在三歲的時候。我夢到很大的蟲。我知道年齡是因為我記得我那時有隻狗。那些大蟲會上我的床，但沒有傷害我。牠們讓我聯想到『竹節蟲』，有著像昆蟲那種長長的身體和細小、脆弱的觸角，還有超大的眼睛。」


    由於別的案例也提過「竹節蟲」似的外星人，這引起了我的注意。她是在形容外星人，還是只是記起了孩童時期的生動想像？我沒有讓她知道我聽說過昆蟲類的外星人。我想要她提供自己的描述。


    「他們不像蜘蛛那樣圓潤的，牠們是長型的蟲。有些蟲長得就像那樣，其中一種是竹節蟲，另一種是螳螂。牠們身體的正面上方有附肢，背後也有。牠們和我一樣大。當然，我那時還只是個小女孩。牠們沒有傷害我，可是跑到我的上面來時真的嚇到我了。我的床是單人床。因為我躺在床上，它們由上而下俯看著我，看起來比我還大。牠們的身體沒有碰到我。牠們用觸腳類的東西撐著身子停在我的上方，所以牠們的的身體和我的身體之間還有空間。房間裡通常會出現兩、三隻，最少一隻，但都只是一個勁地看著我。我從幼年有記憶開始就做這些惡夢了。那時我還沒看過電影，更別說是恐怖節目了。」


    「有些巨蟲的顏色暗沉，有著類似螞蟻的大眼睛，但她很清楚牠們絕對不是螞蟻。『有好多次我都是尖叫著醒來。有時我會起床，走到後院去找我的狗，把牠帶到床上和我一起睡。我妈不准狗進家裡。我怕黑，但我卻會在黑夜中走出去，把狗帶進來，讓牠進被窩裡和我在一起，這樣我才能睡得安穩。我住的地方氣候很熱又潮濕，房子裡大多會有螻蟻。可是我沒有夢過螻蟻。暑假時我會到鄉下和祖母住，在那裡也從沒做過惡夢。」


    隨著貝芙莉繼續回想，她又提起另一件讓她留下強烈印象、從未忘記的奇怪經歷。那是一九七〇年代初期，她成年後的事了。當時她已婚，有個兒子，一家人住在休士頓的郊區。他們家是那條街上唯一後院光禿禿沒有樹的房子。這不重要，反正他們打算在那裡蓋個游泳池。有天，貝芙莉和先生在房子最後面的臥室睡覺，但一個怪聲音卻吵醒了她。


    她邊笑邊說：『我知道那是一艘飛碟。我心想：『噢，又是牠們。』不要問我這個想法是從哪裡來的。我根本不曉得飛碟會有什麼聲音。我醒來後一聽到那個聲音，直覺上便知道那是什麼。羅伯還在睡，從頭到尾沒有醒來。我覺得他沒有被那個聲音吵醒很奇怪，但我沒有叫他。就我所知，我並沒有下床，也不知道自己到底醒來多久。我只是繼續睡，沒有起來。不過正常來說我會下床。』


    多數人聽到後院有聲音都會起來察看，可是我知道我並沒有下床。


    我問她那個聲音像什麼，她的回答很熟悉。「聽起來嗡嗡的，像是高速飛機。」我們聯想了好幾個聲音，然後她找到一個接近正確的描述。「聽起來不像是飛機的螺旋推進器。你知道小孩玩的陀螺放在桌上旋轉時的那個聲音嗎？像嗚嗚或嗖嗖聲。一種高音調的旋轉聲音，像風轉得很快，只是聲音更大一些。那個聲音不是很少吵。我的意思是，不是整個街坊鄰居都會被吵醒的那種音量。」


    我提出那個聲音可能是直昇機，只不過這樣的話，聲音應該會更大聲才對，音調也不同。另一個聯想是：「也很像洗衣機在轉的時候，但我知道它轉得更快。我很確定自己沒有睡著。我躺在那裡聽，心裡想著：『哦，不過就是後院有艘太空船。』我並不害怕。就我所知，我只是回頭繼續睡。」


    這確實是個奇怪的反應。晚上聽到奇怪的聲音，通常第一個念頭會是有人在後院，而他們可能會闖進屋子裡來。你的第一反應會是恐懼，然後大概會起床，看向窗外。我同意這些記憶都是奇怪的事件。我把它們記了下來，但我們最關心的是為她目前的問題找到解答，而不是探索幽浮。她說她對幽浮反正也不感興趣。


    貝芙莉改變了話題，開始討論她的許多身體狀況。她從小到大都有醫生難以確診的奇怪症狀，情況很不尋常。「這已經到了變成笑話的程度。他們始終沒能確定。我去大醫院檢查時也一樣。他們跟我保證會找出問題，但找不出來時態度就變得保守。我開了十三個小時的車，花了兩千美元的醫療檢驗費，卻還是不曉得到底是哪裡出了問題。這實在很令人沮喪。」有些問題至今仍在，因此也是她想探索的方面之一。她想知道為什麼她有這麼多身體狀況，又是怎麼產生的。她推測這類的業或許是源自前世。持續的金錢問題也令她擔憂。因此，當我們開始療程時，健康和金錢是我們的主要焦點，童年回憶只不過是有趣的旁線。


    貝芙莉進入深度催眠狀態後，我用了照說能讓她自動進入前世的技巧，但她只看到各種旋轉的顏色。這種情況經常發生，而我可以讓她往別處行進。在我讓她進入更深度的催眠狀態後，貝芙莉開始描述現在這世的一幕。她再度變成第一天上學的六歲小孩，發出高亢的咯咯笑聲，邊說著她被留在廁所，並在偌大的學校迴廊上迷路的事。她並不害怕，反而覺得是探險。她以小孩的舉止和說話模式，詳細地描述她一年級的老師和朋友，也仔細介紹了學校的格局布置。


    潛意識從來不會毫無理由地提起一件事，所以我想這或許是個完美的機會，可以探索她跑到學校對街森林裡的記憶。


    朵：好，學校附近有森林嗎？


