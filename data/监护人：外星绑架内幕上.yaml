    她摺完衣服後覺得累，想要上床休息，而且立刻就睡著了。當我問她是否整夜都在睡覺時，她輕聲地答：「不是。」她沒有告訴我原因，反而流露出痛苦的表情。她的臉和身體動作顯示有事情正在發生，只是她不肯用言語表達。終於，她深深嘆了口氣說：「我不想回想。」我給了她感覺安好的指令，強調她會非常安全，她可以從一個客觀報告者的角度去看事情的經過，一切都不會有問題。


    為了讓她有信心，我花了幾分鐘的時間安撫。她的呼吸很深且不規律，我知道有事情發生。雖然她沒說話，她一直把手伸出來，溫和地碰觸我的手臂，像是想確定我在那裡，而她不是獨自一人。她每隔一段時間就會這麼做。這似乎能幫助她確認我是真的在場，沒有離開她。她似乎很受發生的事情影響，也因此影響到我問問題，然而這也讓她的注意力再度回到我身上。她一定是在觀看和體驗到一些事，只是沒有說話的衝動。終於，她脫口而出：「這真是瘋了！」我向她保證，我聽過很多怪事，她說的任何事都不會令我訝異。我試著說服她，如果她開始跟我聊，情況就會變得容易些。


    莉：你在嗎？


    朵：我就在這裡。我會陪你經歷這整件事。你不會是一個人。不管情況聽起來有多麼奇怪都沒有關係。你現在看到什麼？

    莉：（她終於開始敘述）我在裡面。我不在家。他們在說話，不過我不曉得他們在說什麼。我不喜歡那裡。

    朵：那裡是什麼樣子？

    莉：我們在室內。在一間房間裡。我不喜歡它的味道。


    她的表情明顯是聞到了不愉快的討厭氣味，做出皺鼻之類的動作。當我要求她描述那個味道時，她很難說明，卻堅持要描述得正確。由於她無法把那個氣味連結到任何熟悉的東西，所以變得更難解釋。「不乾淨、腐爛。不像死掉的東西。聞起來不像堆肥，也不像腐爛的魚。只是很刺鼻，不知道這麼說對不對。比較高頻的腐爛……雖然這樣說很沒道理。像是黏答答的腐爛物。和我曾經聞過的都不一樣。也不像膽汁。比膽汁還難聞。」她一臉厭惡，似乎很介意那個味道。於是我下指令，她在描述事件時不會受到氣味的干擾。我們用這個方法把氣味阻隔，氣味就不會實際困擾到她。


    莉：那是個房間，不過和我想像中的不同。這裡有人。啊！（微笑）不是阿斯塔。


    我要她描述她看到的東西，但她沉默下來，變成一個旁觀者。她看到的事物顯然令她痛苦，我從她的臉部表情和眼睛的動作看得出來，它們比肢體動作更清楚傳達了這點。她的呼吸很大聲而且不自在。她身體的主要動作就是伸出手碰觸我的手臂，確定我還在。她很專心在體驗當下發生的事。


    突然間，她脫口而出：「他們為什麼不停下來？不要再戳了。我不只是看到，我還感覺到。」我耐心地試著說服她告訴我發生了什麼事，而我的提問似乎讓她的注意力又回到我身上。「他們的眼睛好大」她深深嘆口氣說，這和我希望的不一樣。我希望的是比較靈性的接觸。一個智性的接觸。


    她停頓了一下又說：「停下來了。我想我現在在桌子上。」然後她開始描述房間裡的人。「他們的頭是淺褐色，但不是米色。……黃褐色才對。我想他們有穿衣服，只有頭始終露在外面。他們的手臂比我們的長。他們不高，沒有毛髮，看起來類似《交流》書裡的人，除了他們的皺紋比較多之外。眼睛是否仁狀的，在臉部的比例上算大，比我們的眼晴大。沒有眼白。他們的瞳孔很大，虹膜很黑，幾乎是黑棕色。他們其實是沒有鼻子的，只有鼻孔，沒有延伸的東西，沒有其他可以被叫做鼻子的部份。他們也沒有耳朵，只有洞。他們的嘴跟我們的不一樣，他們沒有嘴唇和牙齒。」


