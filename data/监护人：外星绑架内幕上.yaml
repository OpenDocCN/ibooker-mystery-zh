    許多人在報告自己的經歷時都有同樣的感受。在這個事件之前，艾迪從未讀過任何和幽浮有關的書。身為一個農場男孩，他對打獵和設陷阱比較有興趣。直到多年以後，他才開始從書裡尋找和他所見事物類似的事件。『我感覺到某種共通性。我找到了一些片段，但沒有哪一個是和我的體驗特別相似的。』


