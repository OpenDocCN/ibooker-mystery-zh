  md: '# # 四

    十多歲的貝芙莉是位畫家，然而，以此為業不一定能換得溫飽。為了賺取生活費，她不得不接招牌看板的繪畫。令她訝異的是，這方面她做得還挺成功的。空閒時，貝芙莉仍追求自己的藝術表現。她住在一棟完全嵌在歐札克山區裡一處山坡的奇特房子，房子蓋得很像是在山洞裡生活的，只有前面牆壁門窗所照射進來的光線才讓人感覺到戶外的存在。一九八八年，我們就是在那裡做的催眠。


    貝芙莉想探索前世，希望能為健康和金錢問題找到解釋；這是我們最初的計劃，但潛意識常有其他的想法。由於它不會無緣無故提起某事，遇到這種情況我總是順其自然。浮現的資訊通常會是個案需要知道的，和催眠原有的打算反而沒什麼關係。


    在催眠前的面談討論中，貝芙莉告訴我她有些一直忘不了的奇怪童年經歷。她並沒有因此煩惱，她把那些當成罕見而有趣的事。「一年級時，據說我和我朋友派翠西亞在放學後離家出走。學校對街有一大片森林地，我們去了那兒。我在那裡的時候發生了什麼事、待了多久之類的都沒有印象。可是我們的父母都出來找我們了。我那時還沒有時間概念，因此不曉得過了多久。我家離學校有六個十字路口，當我媽找過來時，我們已經在回家的半路上。我一點都不記得那段時間發生了什麼事，只記得爸媽對我們離開那麼久非常大驚小怪。他們說學校三點就放學了。可是我們到家時天都快黑了。當時他們已經準備要報警。令我訝異的是，如果那是我第一次逃家，我應該會有印象，


