  md: '# # 監護人 THE CUSTODIANS ▲ 024


    很重要，重點是，那是我一直在找的資訊。我並沒有時間去分析，因為它有太多面向，但我知道我可以先記在心裡，隔天再把內容存到電腦。我繼續入睡，隔天早上醒來時，腦裡有種奇怪的感覺。

    我的人尚未完全清醒，那團資訊便以前一晚同樣的強度泉湧而來。這不是正常的狀況，因為通常醒來後，夢裡的內容會退去得很快，事後要回想，就算只是畫面，都不是容易的事。


    我得到的資訊並不是畫面，而是哲學性的思想。它再度強調我必須記住並寫下來。我知道我必須在它消失前趕緊存到電腦。當然，日常生活總是會有些阻礙。那天的第一要務是要跟女兒一起把我們小果園裡的桃子裝罐。成熟的桃子不能等，即使有資訊在腦裡跑來跑去，心有旁鶯的情形下也是一樣。當最後一罐桃子封好放在桌上等候冷卻時，我才終於有時間可以一個人在電腦前工作。


    當然，接下來就是要思考如何將資訊轉成文字。這通常是最困難的部分，因為概念是整體的，但要轉換成文字，勢必得經過拆解，而這並不容易。我很清楚我一定會遺漏某些部分，不過我還是會努力。


    我收到的這個概念很有趣，我能夠以它的解釋為骨幹，建構出一本書，朝著預先形成的結論前進。雖然那樣的一本書當時只是我心裡深處的一個模糊影子，還談不上形式和內容。


    這些萌芽期在我的檔案裡冬眠，直到十年後才得以具體化。到了一九九八年，我已經累積了可以寫成一本書的大量資料，而這本書毫無疑問地就是依循著我在一九八八年所得到的概念。'
