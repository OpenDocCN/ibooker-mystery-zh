  md: '「接觸」也常會透過動物的眼睛發生，因為牠們志願以這種方式被使用；透過驚奇的元素。艾迪在動物的眼睛裡看到一體的心靈/精神。在某些情況下，那不是真的動物，而是幻覺。之所以如此，是為了找到個案身上脆弱的地方。「那個人必須安靜。他必須停止他的世界。」外星人可以透過出其不意的元素讓人看到並不存在的事物。他們使人沒有提防。但我原先以為人類並不是隨時都在保持警戒，然而潛意識的答覆是：「你會很訝異，人們是隨時都在保持警戒。我們必須找到方法讓他們詫異。當那個人專注在某件事上，也許是個飛行器或動物什麼的，當我們吸引到他們注意力的時候，我們就能停止他們的世界。接著灌注才能發生。我們利用不尋常/驚訝這個元素。如果那個人照著平常的生活作息，我們無法吸引他們的注意力，那就起不了作用。必須要以某種方法轉移他們的注意力或焦點才行。」


    我說這意味為了找到這些小縫隙，他們必須持續監控才行。他說確實如此。這也解釋了為什麼旁人看不到他們。因為那些人世界並沒有被暫停。


    他說：「不只動物可以被用來執行這件事，夢也可以。在這樣的情況下，那會是受到控制的夢境，有著不尋常的特質。也就是清明夢，那種比平常的夢更真實的夢。很多時候這些夢從頭到尾會伴隨著身體的感受，直到當事人醒來。這些夢常是彩色的，或是帶有恐懼，但都是有特色的夢。夢的內容並不重要。這樣的夢境會比平常的夢來得更生動鮮明。即使醒了，夢裡的一切還是很逼真與清晰。這樣的夢可能帶有恐懼的情緒，因為有時必須在作夢的人沒注意時擄獲他們的注意力，就像讓清醒的人出其不意一樣。恐懼是最強大的情緒，有時可被用來促成個體世界的暫停，不論是在夢


