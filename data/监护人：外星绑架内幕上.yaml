    布：他們想接觸的人有幾個特徵。這些人必須非常聰明，（布蘭達有著天才的智商，因此符合這點。）還有開放的心胸和接受新事物的意願。（她肯定是在靈性上進化，並跟較高層面有連結，努力改善自己並會接受新事物的人。會以正面方式克服生命中所遭遇的困難，而不對周遭的人帶來負面影響。有些人克服困難的人。

    朵：他們會跟這些人保持聯繫嗎？還是觀察他們一輩子嗎？

    布：是的。這些人一輩子都在他們的密切注意之下。他們不時會與這些人接觸。有時候他們會讓對方記得，但大多時候會蒙蔽他的記憶，以免他的平常生活變得複雜。

    朵：他們以前也接觸過布蘭達嗎？

    布：有，有過。尤其是她還很小的時候，但她不記得了。他們跟她接觸，幫助她開始準備這輩子可能遇到的事件。

    朵：那是同一類的外星人嗎？

    布：有時候和這一個類似，有時候是不同外貌的外星人，因為是來自不同的種族。不過通常是和長老議會有密切聯繫的存在體。他們一起工作。

    朵：他們怎麼追蹤某個人？人類這麼常到處移動。他們怎麼找到這些人的位置？

    布：他們能認知你的心靈放射，也能清楚看到你的氣場。而且這些個體中，有的是高度發展，他們能比人類感知到較高層面。一旦知道你的氣場、你的心靈放射是什麼樣子，他們很容易就能追蹤到你。每個人都是獨一無二的，沒有兩個人一模一樣。他們也有機器可以幫忙。

    他們把資訊放進機器裡，讓機器掃描這個星球。看看這個有著這樣類型的氣場和那種類型的心靈放射的人在哪裡？然後機器便會指向目標的位置。

    朵：那麼他們不用對她的身體做什麼就可以找到她。

    布：他們不需要每次都對她的身體做什麼。她九歲的時候，他們第一次跟她接觸，那時候他們確實有為她接種。很像是打疫苗。這很難解釋。

    朵：我想到打针或類似的事。

    布：對，很像。接種會留下一個疤痕或在皮膚上留下某種記號。他們把一種物質注射到人體內，加強感知。那會幫助他對「aura」能力更敏感，因為那些能力在銀河社群非常重要。

    朵：這個字我不懂。「aura」能力？

    布：那是很常見的字。只是另一個表示所有超感官能力的方式。

