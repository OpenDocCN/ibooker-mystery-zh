  md: '這個機器和身體的結合聽起來很像是《星辰傳承》(legacy from the stars) 裡的案例。在某些案例，身體被接上了電源，只要動動肌肉就能操控太空船。那本書敘述很多外星人事實上成了太空船的一部份。我認為這很像那些新的虛擬實境遊戲，只是把機器和身體的共同運作做了怪異的延伸。


    看來，現在這不只是一個，而是兩個「覆蓋物」的案例。布蘭達的意識記得的是單純的貓頭鷹版本，這跟在催眠下提供的兩個版本完全不同。這些外星人顯然能用許多方式影響我們的認知，而唯有催眠能夠揭露表象下的真實。然而，我們會知道什麼是真實，什麼是幻象嗎？


