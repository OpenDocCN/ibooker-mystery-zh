    朵：你說你看到他的手。看起來像人類的手嗎？\n布：他的手很大，手指很長。如果他的手放在鋼琴上，很容易就用我跨九到十鍵的方式跨上十二到十三鍵（她用她的鋼琴家背景來做比較）。相對於手掌的比例，他的手指顯得很長。不過我記得最清楚的，是他和我們一樣有五根手指。因為他穿著輕飄飄的衣服，我看不出來他是不是有什麼和我們不同的身體特徵。我注意到的主要是他比一般人高大。但我後來想，他來的地方大概有較高的健康標準，所以他們可能比人類的平均身形更高大。\n\
    朵：你的意思是他比較高還是比較巨大？\n布：比較巨大。身高更高，肩膀也比較寬，還有一雙大手。他的牙齒很漂亮。我想他這輩子應該沒去找過牙醫。他似乎很溫和又很有智慧。他說有些種族害怕我們，其中一個原因在於我們多少\n\
