    艾迪是三十多歲的勞工，對於要談自己的經歷很猶豫，她在女友的鼓勵下才肯開口。他看上去尷尬而且明顯不安，對錄音機也顯得不自在。我把錄音機放在桌上，我告訴他，只要再過幾分鐘，他根本就不會記得錄音機的事了。由於在訪談時，我們很容易忘記其中細節，使用錄音機可以確保故事的正確性，同時也確認意識記憶的內容，以便跟透過催眠所揭露的記憶有所區隔。這樣說著說著，艾迪終於放鬆下來，很快就忘了錄音機的存在。


    他敘述的是一件將近二十年前的往事。當時他還是個十七歲的高三生，住在密蘇里鄉下的農場社區。有一天他去城裡找朋友，晚上在回家的路上。他駕著自己的老卡車行駛在鄉村的塵土小路，一路上房舍稀少，要隔很遠才看得到下一間房子。


    當他第一眼看到那個光時，他還以為是戶外的水銀燈。有些農夫用水銀燈取代白熾燈，那是那個地區剛開始有的新東西。然而，那個地方通常是没有燈的。當他朝那個光靠近時，他越來越清楚那不是農場的戶外電燈。因為光越來越亮，而且還越來越高。它朝艾迪靠近，停在他的上方，跟著他的卡車行進。艾迪把頭伸出窗外看。


    就在大約離他家還有半英里左右的時候，那個物體突然移動到的前方，在一群樹叢上方盤旋。那個時候，他可以看到它的形狀像個大鏡片，由裡而外透著橘色的光，中央有一個旋轉的帶狀物使得光一閃一閃，底部則是金屬的銀色。艾迪好奇地把車停在山丘下，下了車，坐在卡車的引擎蓋上，直盯著那個奇怪的物體瞧。他一點都不害怕，自己也覺得奇怪，但猜想這大概是因為他在鄉下長大，長時間待在戶外的關係。當他坐在那裡觀看的時候，一道藍光從那個東西的底部射出，照亮了下面的樹叢。它全然靜止地懸浮著，儘管紐帶在旋轉，卻沒有發出半點聲響。至於大小，艾迪估計它的寬度和我們現在所在的房間差不多，也就是二十五英尺左右（譯注：約
    7.6 公尺）。


    艾迪坐在那看它看了大約十五到二十分鐘。在這段期間，另一件怪事發生了。住在離他家約三英里的鄰居一家人，駕著他們破爛的卡車開來，車上有兩個大人和一群坐在後面的小孩。艾迪揮舞著兩隻手，指著上方，急切地要吸引他們的注意。由於他的卡車有部分車身停在路上，他知道他們一定看到他了。可是他們完全沒有減速就開了過去，就好像他是個隱形人似的。之後他雖然很想問他們為什麼沒有停車，卻怎麼也無法開口向任何人提起這件事。


    回到家後，艾迪尖叫著跑上樓。他的父母原本已經睡了，突然被他驚醒。他要他們到窗戶往外看，但是那個光已變小到跟水銀燈一般，一瞬間就閃滅消失。不論他父母看到了什麼，都跟他目睹的大型飛行器相差甚遠。


    那一整年，當地傳出了很多目擊事件，有些甚至是警察看到的，唯獨沒聽說有哪一起像艾迪那麼近距的目擊。艾迪怕被人嘲笑，因此沒有說出自己的經歷。「我是那種不需要那類注意的青少年。」我很能認同他的感受，因為我也一樣住在偏僻的鄉村社區，你會非常自覺鄰居是怎麼想你。


    他說：「這麼多年來，我都把這件事放在心裡，想著自己大概是瘋了，或是有什麼心理上的原因才會虛構出這個故事，雖然事實並非如此。我的確看到了那個東西。我的心裡一直在掙扎。我不想接受自己看到的，也不想承認那是什麼。不過那個東西距離近到我認為一把好用的
    BB 槍就可以打中它。每次我想跟某個人說這件事，我都會覺得對方心裡八成會認為我瘋了。我就是不想讓自己面對那樣的反應。」


    許多人在報告自己的經歷時都有同樣的感受。在這個事件之前，艾迪從未讀過任何和幽浮有關的書。身為一個農場男孩，他對打獵和設陷阱比較有興趣。直到多年以後，他才開始從書裡尋找和他所見事物類似的事件。「我感覺到某種共通性。我找到了一些片段，但沒有哪一個是和我的體驗特別相似的。」


    我有個感覺，艾迪對於向我透露這麼多感到不自在。我想他仍然覺得自己會被取笑，他不想讓自己陷於那樣的處境。我覺得他鼓起了很大的勇氣，才能對我，這麼一個陌生人說出埋藏多年的往事。


    現在他放鬆多了，也同意接受催眠。我和他約好下週進行，看是否能獲得更多細節。


