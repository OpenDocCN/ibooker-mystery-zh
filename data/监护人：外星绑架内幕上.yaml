    得這一切，這對她繼續準備時機的到來會有幫助。她已經準備好要接受這個資訊。這是她會想起那隻貓頭鷹的原因，這樣她才用現有的技術來獲得資料，然後她就能記起所有的事。

    朵：布蘭達說，事件過後幾天，她的聽力有些狀況，而且有什麼影響到了電器類的用品。是什麼造成這些情況？

    布：因為她跟那個存在體互動，她的氣場吸收了一些額外的能量。這個能量大部份被她的身體使用，但還是有的多的。她的氣場把多出來的能量拋了出來，你可以說那就像無形的閃電。結果便是她的耳朵會耳鳴，也會聽到非常高的音調。她的身體因為額外的能量也干擾了電子物品的運作。

    朵：這都是因為接近那個存在體的關係？

    布：這是因為她可以接收較高的事物，她和她的氣場對較高能量是開放的。所以當她靠近那個存在體，除了吸收了來自於他的靈性和心智的知識，她也吸收了一些氣場的能源。有些過多的能量無法立刻使用，導致了這些副作用。那就像電線傳送太多的電力會冒出火花一樣。

    朵：她的健康有沒有因此受到影響？

    布：沒有，沒有負面影響。體內多出來的能量對一些療癒過程有益，因為體內隨時都在進行療癒。這完全不會干擾到身體要做的事，只是讓她多聽到了一些聲音，還有影響到她周圍的電子器具。她也不是太驚訝，因為她這輩子對身邊的時鐘一直會造成影響。她念高中時，有一陣子還會影響到販賣機。她的聽力向來也很敏銳。她沒有因為這些效應而緊張，它們不過就和她以前


