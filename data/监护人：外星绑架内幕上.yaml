    # # 凱莉和我碰面的經過由於太過牽強，無法被視為巧合。我的朋友康妮曾對我提過，她有位多年老友凱莉是住在休士頓的藝術家。凱莉有過一些奇怪的夢和幻象，會讓人聯想到跟外星人的接觸。康妮認為我會想跟她配合，可是凱莉住得太遠，這個可能性微乎其微，她先生又管她管得很緊，不讓她離家遠行。自從康妮搬來阿肯色州之後，凱莉沒來找過她，雖然她們兩人是很好的老友。但接著，奇怪的巧合介入，把我們拉在一塊兒。康妮去休士頓找凱莉時突然病重，唯一能回到阿肯色州的方法便是凱莉開車載她回來。在這個情況下，凱莉的先生不得不點頭答應，於是她的阿肯色之旅終於成行。


    康妮回到家後，在週二的晚上打電話給我，要我去她家見凱莉，聽聽她的經歷，或許也做次回溯。康妮知道凱莉不會再到我們這裡，所以這會是凱莉唯一一次見到我的機會。


    我週四早上要去小岩城參加會議，週三是最後一個能見她的日子。於是，週三晚上我們共進晚餐，然後我請凱莉對錄音機說出她的經歷。她記得自己作過和外星人有關的夢，但她最想瞭解的是有一次的靈魂出竅和她看到的幻象。雖然其他人不覺得那有什麼，她的人生卻受到很大的衝擊。我告訴她我會探索任何她想要探索的事。我相信幫助她要比發現另一宗與幽浮有關的資料更重要。


    靈魂出竅的經歷發生在一九七八年的某個晚上，她當時正準備睡覺。她很確定自己那時還沒睡著。她只是換上睡袍，坐在床邊，突然間聽到房間角落傳來一個低沉的聲音說道：「凱莉，跟我來！」


    「他沒有說出聲來，聲音是直接傳到這裡。」她指著她的前額。「我覺得自己像條濕毛巾。你知道，就是當你把毛巾放到水裡再拿出來，它會全部吸在一起又很重？接著我感覺自己在往上飄，脫離了


