  md: '有些人說，最好不要去探究人類心靈無法理解的事物。但是，如果那裡是知識和領悟的蘊藏之地，我知道我一定會去搜尋並提出無止盡的問題。任何研究的新管道對我都是挑戰，而且是我無法忽略的挑戰。只是，在進入這個研究領域之後，我不僅偏離了尋常的路線，我也需要改變技巧去適應新的狀況。


    我所所謂「飛碟」的不明飛行物向來很感興趣。我閱讀過大部分跟這個現象有關的文獻資料，其中最令我印象深刻的是最初在一九六○年代發生的案例，也就是貝蒂與巴尼·希爾（Betty
    and Barney Hill）的《被打斷的旅程》[The Interrupted Journey] 。那是所謂「外星綁架」案例的始祖，其中許多描述讓我相信希爾夫婦的經歷是確有其事。我也會讀那些對天空上奇怪且不肯默默消失的事件的評論。在權衡過正反兩方的意見後，我相信真的有些什麼事正在發生，而它並無法以懷疑論者的理性和邏輯思維去解釋。也許這個主題從來就沒有要合乎邏輯、原本就非三言兩語能夠解釋得清楚。也許外星人的策略就是要達成他們現在正做的：激起人類的好奇心，去思考那些不可能的事。


    一九四○年代晚期和五○年代初期，「飛碟」報導首次對大眾披露，卻普遍遭到嘲笑。當時還十多歲的我不斷想，那些事很可能真有點什麼玄機。這些年來，我對閱讀和追蹤最新的發展始終是被動的，我從沒想過自己會主動做起研究，甚至直接與來自另一個存在領域的外星人溝通。或許在詭異的領域工作多年，已經為我终于要發生的接觸做好了準備，因為當發生時，我既不感到震驚或不敢置信，也一點都不害怕。我只是好奇。好奇已成為我的註冊商標，並且幫助我取得了許多資料。


