    朵：味道是从别的地方来的？

    莉：不管是哪裡，那个房间不乾淨。这是个非常乾淨的房间。没有臭味了。除了……不该对人做那种事。不该戳。我的意思是，那就像是不尊重你的身体。呵！好大的震撼啊，莉安！事情不该是这样的。

    朵：那裡有多少人？

