    苏：对。那个圆柱，像个水晶球体。它产生这艘飞行器的动力。它是在一个环状、透明的圆管／圆轴裡。球体的上部份是个半圆形，像半颗球。


    朵：我了解水晶的一些作用。我知道它们有很多用途。那是一颗大水晶吗？


    苏：那是从另一个星球的结晶物质取出，再被雕塑成球体，就像你们可能用石英雕出一个水晶球一样。它虽然不是透明的，无法看透，但裡面有东西，球形体裡有东西。它是能量的转变器（transmuter）。


    刚开始腊写这捲录音带的时候，我以为她想说的是「发射器」（transmitter），但当我查固定义时，我明白了这两个字的差异。发射器发射东西，转变器则是将某个东西从一个形式改变或转化为另一个形式。


    苏：水晶裡看起来有不同颜色的光在闪烁。它不是完全透明的。换句话说，裡面有形状和形体。有光。


    朵：它是这艘飞行器上操作一切的主要动力来源吗？


    苏：它是主要的动力来源。


    ---


    # 監護人 THE CUSTODIANS ▲


    朵：不是唯一的一个？


    蘇：不是，電腦控制其他的動力來源，以防哪個動力受到任何損害的話，還有同樣數額的備用動力能源可以替代。所以我們通常都能回到我們出發的地方。飛行器墜毀是非常罕見的。墜毀通常是因為大氣的狀況。問題和飛行器沒多少關係，和大氣狀況加上錯誤比較有關。太空船上的某個外星存在體做了錯誤的設定。所以這兩者是有可能合併發生的。


    朵：那麼你們的人是有可能出錯？


    蘇：這也很少發生。我們不把它看作是你們會說的「錯誤」，然而總是有學習更多事物的空間。事情會發生，你們就在那時候針對情況做調整。


    朵：換句話說，你們並不是不會出錯的。


    蘇：對。這只是身為一個活生生的生命的正常過程，我們不會把它看作是個需要被懲罰的錯誤。你們人類似乎覺得錯誤出現時必須有罪惡感。有時還會加上懲罰來強化罪惡感，以避免錯誤再犯。我們不覺得有這個必要。每當發生你們所謂的「錯誤」時，我們就會自動補救修正。當事人知道事情已經發生。他們知道，而且更好的是能從中學習。這就夠了。我會說罪惡感和懲罰是地球人無法進步更快的主因之一。他們煩惱、擔心在這類事上，使得自己無法進步。這是個阻礙。當這些阻礙能夠移除，人們就更能追求他的夢。他能夠實現事情，讓事情更容易發生，因為他沒有防礙自己的進展。大多數的疾病就是這樣來的。這個星球被同型態的強化包裹住了。孩子從年紀很小的時候就學到這些制約，這和限制有關。人類如果想要進步得更快，就必須學習克服限制，超越自己的極限。這樣的訓練從小時候開始會很有幫助，因為這些行為模式一旦建立就不容易去除。


    朵：你的這艘飛行器能自己在太空旅行嗎？


    蘇：你說「自己」是什麼意思？


    朵：喔，我一直在想，因為它不是那麼大，它是來自另一個飛行器，還是它可以自行來回你們的母星？


    蘇：現在我和她（這個載具）是在非常初步的狀態。我正在整合這個能量。我想更……誇張地，你們可能會說是更大膽地表達事情。但是，回到你的問題：我們必須要能回到我們要去去的飛行器，以防飛行器發生問題，如果我們回不去，我們就會被困在這個大氣裡。我們的身體細胞並不適應這個星球和這裡的大氣。我們能夠短時間離開我們的太空船，但就算是短暫離開也要用上某類保護才行，這是因為這裡的細菌。它對我們來說是不相容的。在飛行器裡，我們把轉盤設到某個地點的振動，然後我們就會被送到那裡。就像我們這種生物而言，只要母星沒有因任何大氣狀況或其他什麼的毀於一旦，我們總是可以回得去母星。我們認為我們的想法很有智慧。


    朵：是的，但我的印象是你們不一定都是這麼做。你剛提到去另一艘飛行器的事？


    蘇：是有別的飛行器，你們可能會把它們想成是「母船」。我們是有更大的飛行器。不同的飛行器或太空船有不同的用途。較小的船通常是用來監控事物，較大的船比較是用來觀察或進行以心靈／精神感應的通訊。所以用哪種船要看目的而定。


    朵：你可以告訴我你們的母星在哪裡嗎？這可能不太容易。


    蘇：比你們稱的北極星還遠，但是是往那個方向。直直過去的的第五顆星。（停頓）我想說"Centra"。星球的名字聽來像是這個發音。……她接收的不是完全正確。"Centra"？類似的音。噢，我想以後會表達得比較準確。


    朵：它在我們這個銀河系嗎？


    蘇：不是。呃…它超越這個銀河系好些光年。有些性質不同的銀河體系離你們還比較近。


    朵：那麼你是來自另一個銀河，這麼說對嗎？


    蘇：我好像有不是和是兩個答案。是也不是。因為我們會去很多銀河。我們有母星，但我們不常在那裡。我們總是在旅行和探索，大部份的時間都在太空船上。我們把探索到的資訊傳回去，不會總是直接回母星。我們不用回去也能把資訊傳回去。


    朵：是用心靈感應的方式傳送還是……？


    蘇：部份是。我們的船上也設置了傳送裝置。有一個接收和傳送的儀器。在家鄉基地有一根細細的金屬桿，很像你們會想成是天線的東西。它是純粹為了我們的太空船架設的。資訊會到達這個東西，這根桿子，然後往下傳送，那裡的存在體會進行解碼，然後記錄到我們的……你們會稱為歷史書的東西裡。我們從宇宙不同生物身上所得到的科學資料也在那裡面。


    朵：那根天線類的樣子是在母星上？（是的。）你們能夠傳送有形／具象的物質就像傳送訊息一樣到那麼遠的地方嗎？


    蘇：不能。有些東西我們會在船上分析，然後送出資訊。我們在船做研究所發現的資訊，大都是用文字或通訊的形式傳送。


    朵：那麼你們實際上不必傳送實體的物質？


    蘇：不必，幾乎沒有過。我們會傳送自己和太空船，但這情形也很少。我們能把我們的船維持在你們所謂的「地球空間」裡很長的時間。時間對我們而言跟你們所知的不同。我們輕而易舉就能穿越許多光年。我們已經在這個銀河系找到足夠的資源，維護和保養我們的太空船，維持太空船運作的能量，所以能量不會耗盡，不像這個星球上的許多東西都會消耗殆盡。我們的太空船所使用的材質可以維持很久。你們可能會用更耐久的說法或措辭。


    朵：我有好多好多的問題。我想問問跟你們的身體有關的事。你們需要任何營養嗎？就是我們說的食物？


    蘇：流質。我們攝取一種流質。環境會給我們維生的東西。我們船裡的空氣維持在特定的溫度、濃度（consistency），所以我們的肉體載具不致毀壞。我們沒有你們所稱的「變老」。我們停留在一個外形。當一個生命體如你們所知的「誕生」，它確實是從較小的形體開始，成熟之後就維持在那個形態。並沒有老年。我們可以透過心靈能力維持自己，像是用視覺化來保持年輕。類似這樣。我們幾乎天生就會這麼做。如果我們有人受傷了，或是進入了會造成任何形態惡化的環境，我們也能透過心靈能力修復。'
