    奇怪的是，隔天，同樣的封鎖狀況也出現在另一位幽浮個案身上。她體驗到一股似乎會凍結或靜止事物的能量漩渦，一樣也是在過了某個時候想不起任何事。在如此接近的時間裡，我的調查到了比較後期（一九九○年代），時不時會有這種狀況出現。有時我看得出來，那是因為個案尚未準備好要探究這類的事，所以潛意識把資訊封鎖住。其他時候我納悶是不是外星人下了催眠後暗示，防止個案恢復更多的記憶。


    在後續對貝芙莉的催眠療程，我們得以消除阻礙並且發現了隱藏在屏障後的事物。


    我和貝芙莉隔了幾週後見面，進行了另一次催眠。我們仍試著找出能夠解釋她這一世健康和金錢方面的事。這一次，之前的障礙不見了。她的潛意識一開始就讓她看到兩段不同的前世。其中一世在沙漠，另一世顯然是在美國南北戰爭時期。我讓她自己選擇要探索哪一個，她毫不費力地就進入這世紀初劃下句點的那世。內容很平淡，在我看來不是很有趣，但這很正常，也確實提供了貝芙莉一些重要資訊。


    接著，她進入先前有過驚鴻一瞥的另一世，那個在沙漠的人生。她當時是個中年男子，屬於沙漠遊牧民族的一員，正趕著一群山羊旅行。山羊對他們的生存非常重要，不僅是他們的食物來源，到了城鎮還可以出售或交換日常必需品。我引導貝芙莉走過那一世的重要事件，跟著她在市集銷售並交易要帶走的貨物。她喜歡到處遊蕩，不受法律的規範也不被城市生活的限制所束縛。當問到部落名時，她給了這個名字——Teg，但她不確定那是部落名或城鎮名，還是她自己的名字。她認為他們是在埃及。這一世出現了很多資料，不過仍是平淡無奇的一生。


    當我要她前往那一世的另一個重要日子時，令人驚訝的事發生了。一般來說，我通常都是帶個案經歷完整的一生，觸及重要的日子，最後以死亡為終點。偶爾，個案會跳到另一段不相關的前世，這也很常見，它顯示了剛接受催眠時，潛意識對維持在一段前世的不穩定性。個案如果呈現這樣的情況，我通常是順其自然，因為潛意識提出的事情可能更重要。一般在經過幾次催眠之後，個案往往就能維持在同一段前世，探索許多細節。


    貝芙莉的潛意識顯然認為沒有必要繼續挖掘沙漠人生，它決定跳到它認為更有意義的事。我原可以讓她回到沙漠那一世去尋找更多資料，但我決定這次照潛意識的意思。由於它上一次給過我們阻礙，我想這次它可能準備好要開門了。


    我請貝芙莉離開市集的那幕，往前到她生命中另一個重要日子。「你在做什麼？你看到了什麼？」


