    「隔天早上我打電話給四、五位牧師。我說有東西來找我，告訴我未來的事。嗯……；我很快就發現我不該打電話給他們。他們的第一暗示都是我的心理有問題。所以我學到了有些事情不能和他們討論。我知道那不是一場夢。我連著兩、三年都在害怕，因為我知道那些事情一定會發生。我不相信那些事情會成真，而是知道那些事情一定會發生。當最初的幾件事開始出現，對整個情況更是沒有幫助。」


    她指出這個經驗是她最想在催眠時探索的事。她很確定其他（會讓人聯想到外星人）的經歷雖然生動令人不安，但它們「只是夢」。我鼓勵她也告訴我那些夢，就算是做個紀錄。


    她描述了一場夢，或者該說是「惡夢」，由於非常生動，她一直忘不了。那是在一九六三年的九月初，她十九歲，還在德州念大學的時候。在那個「夢」裡，她發現自己身在一個弧度的房間裡，裡面有一排排的孵化箱。她說是孵化箱，因為箱子裡有嬰兒，但那些嬰兒和她看過的都不一樣。她曾經把他們的樣子畫了下來，她說會把那些畫寄來給我。那些嬰兒有很大的頭和眼睛，跟他們完全浸在液體中的迷你、皺縮的身體形成強烈對比。他們完全浸在液體裡，她知道他們在這些液體下成'
