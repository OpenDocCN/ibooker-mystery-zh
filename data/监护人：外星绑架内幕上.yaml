    ## 第四章 隱藏於夢境的資訊


    我


    不僅在一九八○年代剛投入調查時遇過這些奇怪案例，以下我會舉一個近期的個案，顯示外星人具有創造出比個別的動物還要更大規模的幻覺。


    克萊拉在一九九七年多次寫信和打電話給我，希望我能替她催眠。那時已經有好多人想要催眠，所以我不再在家裡進行，也不接新的個案，除非我要去他們居住的城市演說，而且有多餘的時間。此外，我也不再於演講當天替人催眠。我發現現在演說旅程中做太多不一樣的事會分散我的能量，因此我只在沒有安排太多事情的時候進行催眠。克萊拉說她是在一九九六年的十二月，新墨西哥州聖塔菲市的香緹克里斯托（Shanti
    Cristo）大會上第一次見到我。在那場會議，我只為之前就已排定的人催眠，沒有時間排入別的個案。我通常跟他們說，我會把他們登記在名單上，等下次我要到他們的城市，再來安排。因此，我並不記得克萊拉，也不記得有跟她說過話。但她發現我在一九九七年的五月要去好萊塢參加研討會，便打電話來要求安排催眠。她雖然住在舊金山附近，卻願意開車到好萊塢。在這種情況下，我無法拒絕她。


    那次會議是個慘劇。主要原因在於缺乏宣傳和規劃。演說者全到了，卻沒有人來參加。因為沒有聽眾，有好幾場演說被取消。那是我參加過最糟的一次研討會，但我倒因此空出不少時間。我的朋友菲爾把這趟行程變成觀光之旅，帶我去看我從少女時期在幽暗的電影院裡便夢想一遊的好萊塢。我之前一直沒有時間好好參觀這個城市，若不是待在飯店就是會議中心，演說結束後也總是直接前往機場。我們決定好好利用這個糟糕的情況。我很開心能看到這個城市光鮮輝煌的一面。因此，當克萊拉來到我在飯店的房間要進行催眠的時候，我很放鬆，也有充分的時間和她相處。


    克萊拉是位迷人的金髮女子，大約四十多歲，看起來活潑、聰明、健康情況良好。我試圖從催眠前的談話找出進行回溯的原因或問題。她說主要困擾她的幾年前發生的時間消失事件。


    克萊拉偶爾會因公前往夏威夷參加會議。那次事件發生時，她正在茂伊島上開車。當時已近黃昏，不過天色仍微亮，她正在找一家以前去過的飯店。飯店座落在海灘，她想在那裡邊吃晚餐邊欣賞海景。當她開著車尋找那家飯店時，發現自己錯過了入口，於是決定再往前多開一段，找個地方調頭。


    茂伊島的這一區種了許多茂盛的熱帶植物，雙線道兩旁都是棕櫚樹。沿途房子不多，由於離馬路有段距離，並不容易被看見。克萊拉終於看到了一條可以迴轉的車道，雖然她心裡意識到，以前開在同樣的路上不曾注意到這條車道。


    她開了進去，發現那裡是一處小住宅區，裡面都是模組式房屋。這些房子位於棕櫚樹群間，環境非常優美。奇怪的是，克萊拉不記得曾在這路上看過這個社區。她將車子開進了車道，正要迴轉——這就是她最後記得的事。下一刻，她發現自己在島嶼的另一端，行駛在一條繁忙的四線公路上。這時天色漆黑，她完全不知道自己是怎麼到那裡的。


    一年後，她又回到茂伊島參加會議。出於好奇，她開上同一條路，想找到當時迴轉的車道。她始終記得那次奇怪的經歷。她開車繞遍了該區，儘管她又找到那家飯店，卻始終找不到那處組合屋住宅區。從此這件事就一直困擾她，也因此促使她進行這次催眠。她想查出當晚到底發生了什麼事，還有她怎麼會那麼詭異地到了茂伊島的另一端，卻絲毫沒有開車到那裡的記憶。


    克萊拉是很棒的催眠對象。我毫無困難地讓她立刻進入了深度的催眠狀態。她記得事件發生的日期，因此我引導她回到一九九四年三月，她來到夏威夷茂伊島的當天。她敘述自己站在當時住的「茂伊太陽」旅館前，正要走進玻璃門。她才剛到，為的是參加年度的研習會。她喜歡來這裡出差，因為工作之餘也能好好放鬆休息。她很喜歡這家旅館四周開滿的繽紛花朵。


    朵：好，現在你已經在飯店登記入住。我要你往前到你要去餐廳用餐的那一晚。那是在同一家飯店還是不同的飯店？

    克：不同的飯店。

    朵：很遠嗎？

    克：嗯，可能有好幾英里。兩、三英里遠。我從沒在那裡用過餐。我只是曾經經過。它座落在海邊，而我住的旅館是在小山丘上。我很想體驗坐在飯店裡，享受窗戶全部打開，聆聽著浪濤沖刷海灘的那種感受。我想去那裡想很久了，但就是從沒去過。

    朵：哦，你現在在開車往那裡去嗎？（對。）是幾點的時候？

    克：才剛黃昏。我不知道確實的時間，不過有點微暗。

    朵：你認為天很快就會暗了？

    克：嗯，大概吧。我沒有多想。

    朵：好，你快到飯店了。告訴我你在做什麼。

    克：我開在南基蘭（South Korea）路上。天色越來越暗。因為那裡沒有街燈，視線並不清楚。我正經過亞斯特蘭（Astrand）。那是個很大的地方，我錯過了那條車道。附近有很多樹。車道看起來……嗯，不是很隱密，但我就是錯過了。（懊惱）我就是沒看到。於是我又往前開了一段，想找个地方調頭回去，因為我真的很想在那家飯店用晚餐。（在這一段催眠裡，她有時像是邊開車邊自言自語，但也會回答我的問題。）我在開車。我發現這個地方……好。我看到了這個地方。這是一條死路。很好，看來是調頭的好地方。嗯……我以前從沒看過這個地方。（困惑）咦……這裡有漂亮的棕櫚樹和花叢，還有一道籬笆，不過我可以看到籬笆的另一邊。那裡有各式各樣的……（不知道該如何描述）像是模組式房屋（組合屋），或是……很時髦的移動式拖車屋。好……嗯，這個地方很漂亮。

    朵：你找到了調頭的地方？

    克：是的。是條死路，我現在正在迴轉。（輕聲地）然後我看到這些亮光。（停頓，覺得困惑。）就像……讓人眩目的強光。

    朵：光在哪裡？

    朵：尖端朝上？

    朵：對。幾乎就想像她從天上來的。它就像是光的漏斗。一個漏斗，寬的那一端向下朝著我。這個光有非常強大的能量。（深呼吸好幾次）克：（她的呼吸變快）就像……來自太陽，就好像你透過樹叢看著這個很明亮、很明亮的光芒。…………我覺得

    朵：是很密實的光嗎？

    朵：從底部散發？

    朵：（從她的聲音和呼吸，可以明顯看出她正經驗到不尋常的事，而且有一些不安。）底部，對。

    朵：你還在開車嗎？

    克：沒有！我就是存在。我存在。

    朵：什麼意思？

    朵：（無法置信的語氣）感覺上我就是這個光的一部分。

    朵：你还在你的车上吗？


    在療程的最後，我跟克萊拉的潛意識對話。

    朵：你能不能解釋當她開在夏威夷路上，來到那處迴轉地點的時候發生了什麼事？

    克：她是那個時間和地點被「送到」那兒。因為那個地方是為了她才顯現（物質化），之後並不適合讓她回到那個特定地點。因此她被帶到一個……公路上她知道的地方，所以車子才會出現在那兒，這樣她也才知道要怎麼開到她當時想去的飯店。

    朵：所以那次回去必須是在夏威夷的某個特定地點和時間？

    克：不見得。那只是個她在身體裡會覺得舒服的地方。為她創造出的那個空間有她喜歡的美麗景色。那會是一個她可以徹底和全然放鬆的地方，轉移（指資訊）也才能完成。

    朵：那麼那輛車，連同她在車子裡的身體，實際上是被帶到島的另一邊的另一條公路上？

    克：沒錯。那只是去物質化，然後在另一個地方回復為物質形態。

    朵：連人帶車從一個地方移往另一個地方是常見的情形嗎？

    克：噢，是的。噢，是的。

    朵：這種事經常發生？

    克：經常發生，經常發生。

    朵：當這種情況發生時，身體也是去物質化後再成形嗎？

    克：是的。


    朵：這對身體沒有傷害？

    克：沒有傷害。身體變成純能量。

    朵：那麼她和車子只是從一處被移到另一處。

    克：沒錯。

    朵：所以當她恢復意識的時候，她已經在島上的另一個地方。而且那時候也在開車。（是的。）而直到這一刻，她對之前發生的事完全沒有記憶。

    克：是的。

    朵：所以當她來到，我想我應該說當她恢復意識，她才會在島上的另一個地方。

    克：對。

    朵：這個情形在她身為克莱拉的這生是唯一的一次嗎？

    克：發生過許多次了。不過這一次是發生在她願意探討，願意知道發生了什麼事，以及怎麼發生的時候。其他幾次的時機並不成熟，那時她還沒準備好去瞭解，或者說，那時她在地球的物質生命還沒有成長到可以理解這種事的時候。

    朵：所以這次是因為發生了不尋常的事，她才會記得。

    克：沒錯。

    朵：她現在可以知道這些資料了嗎？

    克：是的。她應該知道這些資料。她一直渴望知道。她現在也可以瞭解了。


    **朵**：而且這對她會是幫助。我們不想造成任何傷害。

    **克**：對。這對她是件開心的好事。


    接著我請潛意識退場，然後讓克萊拉的人格完全回到她的身體裡。這種能量的釋放或改變總是非常明顯，因為催眠個案的呼吸在這時候會變得沉重。


    我帶引她回到現在，並回到意識完全清醒的狀態。


    所以，真相並不總是像表面所呈現的。我們真能確定自己看到和體驗到的事情是真的嗎？還好它們是以一種微妙溫和的方式完成，所以唯一的影響是令我們好奇，然後，通常也就把它當成是件怪事而作罷。恐懼這麼溫和的事並沒有好處，尤其是我們無法預期這樣的事件何時會發生，自然也就無法控制。


    謎團繼續著，而且越來越深奧。


    夢什麼時候不是夢呢？當事件的真實記憶被潛意識遮蔽，它就會以夢的形式出現嗎？夢究竟是什麼？我們如何才能知道其中的差異？還有，知道這個差異對我們有好處嗎？這類事情也許還是不要碰觸得好。


    我在工作時聽到的報告，有很多都不是個案與外星人的實際接觸，也不是目擊太空船。相反的，個案往往是被奇怪和生動到異乎尋常的夢境所困擾。這些夢通常有著不尋常的性質，是他們忘不了的夢。


    我們每個人，偶爾都會有非常特別強烈和清楚的夢境，感覺格外真實，而我們通常都會慶幸那只是場夢。也有一些夢是我們久久難忘的。這是我們稱為「睡眠」的陰影世界裡的正常部份，它大多是潛意識對清醒時的生活事件所做的解讀，也是潛意識試圖透過象徵，傳遞訊息給我們的方式。那麼，是什麼讓跟幽浮、外星人或太空飛行有關的夢與眾不同呢？我們又為什麼要去注意它們？我總是說：「沒壞的東西就別修理！」如果當事人活得好好的，沒有因為哪個記憶而造成問題，那麼最好就別去探索，把它當成一件有趣的怪事就好。沒有必要只是為了好奇而讓生活變得更複雜。記得，一旦打開盒子，就沒辦法再關上了。你無法忘記自己想起來的事。而這可能會對你之後的人生造成永久的影響。


    不論個案透過催眠療法揭露什麼資訊，我都希望能為他們帶來正面的影響。因此，凡是探索夢境所得的資訊，都必須用正面的態度整合到個案的人生，好讓他們能夠處理並回歸正常的生活。同樣的規則也適用於與外星人互動並保有意識記憶的人。這一生才是最重要的，個案必須盡可能正常地過下去。因此，催眠師的職責是幫助個案處理所揭露的任何訊息，並且全面和正確地看待它們。


    在我的另一本書《生死之間》裡，我們發現靈魂事實上從不睡覺。只有身體會感到疲勞，而靈魂在等待身體醒來的時候則是覺得百般無聊。所以當身體睡著時，我們的靈魂或靈，也就是真正的我們，會展開很多冒險旅程。它可能去了靈界，與大師和指導靈會面，聽取建議或學習更多的課題。它也可能到世上其他的地方旅行，或甚至往外探索其他的世界和次元。這些行程有時會留下片段的印象，特別是常見的飛行夢。


    我們最本質的部份與身體之間有一條「銀線」作為連結，因此靈魂總能在身體醒來前回到身體裡。這條臍帶要一直到身體死亡並釋放靈魂自由的時候才會斷掉。

    在我還沒調查幽浮以前，我從未想過肉身會在睡眠的狀態下到別的地方。畢竟，身體如果被移動，應該就會醒來，不是嗎？我從調查這些奇怪的可能性中學到了很多。在這些案例裡，我小心地質疑，確定那是身體真正的經歷，而不是靈魂出竅。這兩者會很類似，但描述並不一樣。


    在靈魂出竅的情形，當事人可能會記得脫離身體時的感覺。他們常往下看，看到自己睡著的身體躺在床上，他們也會講述自己在外出後重回到那個空殼的情形。此外，他們常描述看到連結靈魂與身體的「銀線」。偶爾，他們還會形容當在外面太久，被銀線拉回去的感覺。我在工作中發現，身體有可能在靈魂不是時刻都在身體裡的情形下生存，身體會被存在於身體裡的生命力支撐，然而如果沒有靈魂，身體便無法無限期的存在。


    另一種體驗，也就是身體真的跑出去的情況，則有不同的描述。我的第一個這類型個案是位名叫約翰·強森（John Johnson）的非裔美國人，他是個很棒的人，一位心理學家，常跟我一起訪問疑似被幽浮綁架的案例。當時我才剛開始調查，一切還很新奇。我覺得我們像是在開墾新的田地。


    我當時還沒發現現在所觀察到的模式，那畢竟是要調查過許多案例之後才會有的發現。由於我不是心理學家，每當第一次訪問那些認為有過外星經歷的個案時，我很依賴約翰的專業。他會問個案我永遠也想不到的問題，他的問題很能幫助我們瞭解個案和個案家人的心理健康狀態。


    有時當我們要開車回家時，在車裡他會告訴我個案的心理失常，他懷疑個案幼時可能曾被虐待。有的案例令他懷疑當事人是在幻想或尋求注意力。我跟著他學到了要留意的跡象，這是無比珍貴的一課。大多時候他會說對方的家庭正常，個案顯然經歷了他相信是真實的經過。如果約翰認為值得或有必要追蹤下去，我們便會再安排與個案見面，如果不是他，就是我進行催眠。


    我非常珍惜並看重我們一起調查案例的那三年當中，他所給予我的協助與建議。雖然他因為心臟虛弱而受苦，仍為了調查這些不尋常的主題，與我一起旅行了許多路。他像是把心臟藥當成糖果在吃，然而他說和我共事是支撐他的動力。我們的工作關係一直持續到一九九〇年，五十三歲的約翰心臟病發過世才終止。


    一九八七年我們剛認識不久，約翰就告訴我他個人的奇特經歷；他說他希望透過催眠探索這段經驗。事情發生在一九八一年，他去埃及旅行的時候。旅行社安排他在開羅的飯店和一位陌生人同住。他對那晚的事情沒有什麼印象，除了醒來時發現自己站在另一個男人的床旁，那自然會讓對方驚醒。他不記得自己有起床，也不記得自己怎麼會走到那裡。他只記得有東西發著藍光。我提出他或許是在夢遊；在一個陌生的環境中入睡，夢遊是很常發生的狀況，尤其如果又因為旅行而疲累。他考慮過這個解釋，但他不曾夢遊，所以打消了這個可能性。他很確定自己去了某處，他要我幫他查出他到底去了哪裡。


    開始催眠前，他透露他擔心心臟可能在進入出神狀態的時候會有問題。他列出需要觀察的症狀，只要那些症狀一出現，我就要把他帶出催眠狀態。我告訴他，我確信不會發生這樣的事。我說的沒錯，他的催眠進行得非常順利。我知道他是催眠師，所以很確定要讓他進入出神狀態並不會太困難。因為他知道程序，也完全配合。


    他一進入出神狀態，我便引導他回到抵達埃及的那天。他剛下飛機，正準備過海關。


    當探討的事件跟個案的現世生活有關，回到事發當下有可能令他們不安。許多催眠師都說，回到事件發生之時會令個案焦慮。由於我是帶個案回到事件發生之前，而不是事發當下，因此不曾遇過個案抗拒。用這個方式，我們可以從後門偷溜進去，從後面逼近。


    約翰先是重新經歷了與旅行團一起在機場過海關的情況，然後我讓他來到下榻的飯店。他對飯店和回房前吃的餐點做了詳細的描述。長途旅行令他疲累不堪，他回房倒下來就睡著了。'
  mdcn: '## 第三章 事物的表象並不可信


    發生過的事情類似，但仍有些不同，也強烈了些。這對她聽力的影響來來去去，有時只持續幾分鐘、幾個小時，或者就像這次，一連持續了好幾天，這才是令她困擾的事，因為她已經習慣聽力效應很快就會消退。她的情形是，她對時鐘、錶等計時裝置的影響力是她獨有，而且會一直持續的效應。


    朵：是因為她的能量場的關係？

    布：有部份是因為她的能量場和她的心靈能力，有部份是因為她對時間的認知。

    朵：什麼意思？

    布：在她的文化裡，大多數人從小被教導要很在意時間。你要意識到分鐘、小時，還有「唉呀，我必須在五分鐘內到那裡。」她因為興趣和成長的方式不同，對時間發展出較為全面的觀點，她是以身節、年份和世紀去思考，而不是分鐘和小時。因為她對時間有不同的觀點，對周圍的時鐘和錶就造成了影響。可以說她是以不同的速度在過時間。


    催眠結束後，我接著錄下她有意識的記憶。

    朵：你的潛意識說，你醒來後會告訴我前臂的事。

    布：我手臂上的腫塊？（她解開釦子，拉起襯衫袖子。）這個從我九歲開始就有，幾乎二十年了。


    那個腫塊在她的肘關節下面一寸半的前臂內側，大小和疣差不多，但很平滑，而且是粉紅色的。

    疣通常都很粗糙。我摸了摸，發現它的底下不像是腫塊或囊腫那樣硬的。

    布：我想可能有個卷鬚之類的東西連到一條神經，因為有時候如果我用特定方式揉它，手腕會覺得刺痛。

    朵：你記得它是什麼時候出現的嗎？

    布：記得很清楚。一九六九年的感恩節週末。我們去我奶奶家過節。那時我們住在休士頓，我奶奶住路易斯安那。我們週日要回休士頓，我就是在那天早上醒來注意到手臂上有個地方變得泡泡的。

    朵：像是昆蟲咬傷嗎？

    布：不是，完全不像。它是白色的，像是皮膚下有個氣泡，圓鼓鼓的，泡泡的。

    朵：我想到了血泡，不過那通常是血紅色的。

    布：它比較像是水泡，只是裡面沒有液體。它不透明，可是很白，摸起來粗粗的。我醒來發現它的時候，它的寬度只有四分之一英寸（譯注：約 0.63 公分），但白天它一直擴散，到了中午已經是一毛硬幣的大小。它比水泡更凸，大概是現在的三倍高。我給我媽和奶奶看，她們也不知道是什麼。不會痛，但有一點刺刺的。我知道那不是蜘蛛咬傷的。不紅也不痛。她們認為還是不要亂弄得好，或許它會自然消失。那天我們開車回家時，我注意到它變得更大了。隔天早上我醒來要去上學，它的大小和二毛五的硬幣差不多。終於，第三天早上醒來時，泡泡的部份消掉，手臂上出現一個五毛大小的開放性化膿傷口，中間的地方就是現在這個腫塊。它看起來像是膝蓋破皮又不小心磨掉了結痂，會冒血、有黏黏的東西和液體。它一直結痂、破裂和化膿，潰爛處的邊緣會鼓起來。這個情形持續了三個禮拜。它是開放性的化膿傷口，圓圈的裡面一碰就痛，很脆弱。好不容易，它開始一點一點縮小，接著便往內縮，但鼓起來的地方過了一陣子才消。我都貼著
    OK 繃，免得碰傷它。


    朵：既然大到像五毛錢硬幣，應該會留下疤痕才对。

    布：是啊，你會這麼想。但它一直縮，一直縮到很小。有天早上我醒來時，看到上面長出了一層皮。痊癒後，基本上就跟今天這樣差不多，就是這個小腫塊。以前有個往一邊延伸的小分支，不過兩三年前掉了。這個小腫塊始終都是這樣。偶爾會癢，有時上層的皮膚會剝落，特別是曬過太陽之後。


    朵：你有沒有看過醫生？

    布：有，我看过，醫生也不明白那是什麼。他唯一想到的是因為貓抓而引起的某種真菌感染，可是我身邊不曾有過貓啊。十九年來它都是這樣，除了偶爾會癢或刺刺的，沒有造成任何問題。


    布兰达手臂上的小腫塊是個謎。我們可能永遠也沒法發現十九年前是否真的有裝置植入她的體內，也不曉得那個東西現在是否還在。只要沒有造成任何身體上的問題，或許最好不去理會，就讓它繼續保持神祕。有些人一旦發現植入物便想取出來，但我的看法是，外星人如果想把東西放在那裡，一定還會再放新的進去。


    ## 第四章 隱藏於夢境的資訊


    我


    不僅在一九八○年代剛投入調查時遇過這些奇怪案例，以下我會舉一個近期的個案，顯示外星人具有創造出比個別的動物還要更大規模的幻覺。


    克萊拉在一九九七年多次寫信和打電話給我，希望我能替她催眠。那時已經有好多人想要催眠，所以我不再在家裡進行，也不接新的個案，除非我要去他們居住的城市演說，而且有多餘的時間。此外，我也不再於演講當天替人催眠。我發現現在演說旅程中做太多不一樣的事會分散我的能量，因此我只在沒有安排太多事情的時候進行催眠。克萊拉說她是在一九九六年的十二月，新墨西哥州聖塔菲市的香緹克里斯托（Shanti
    Cristo）大會上第一次見到我。在那場會議，我只為之前就已排定的人催眠，沒有時間排入別的個案。我通常跟他們說，我會把他們登記在名單上，等下次我要到他們的城市，再來安排。因此，我並不記得克萊拉，也不記得有跟她說過話。但她發現我在一九九七年的五月要去好萊塢參加研討會，便打電話來要求安排催眠。她雖然住在舊金山附近，卻願意開車到好萊塢。在這種情況下，我無法拒絕她。


    那次會議是個慘劇。主要原因在於缺乏宣傳和規劃。演說者全到了，卻沒有人來參加。因為沒有聽眾，有好幾場演說被取消。那是我參加過最糟的一次研討會，但我倒因此空出不少時間。我的朋友菲爾把這趟行程變成觀光之旅，帶我去看我從少女時期在幽暗的電影院裡便夢想一遊的好萊塢。我之前一直沒有時間好好參觀這個城市，若不是待在飯店就是會議中心，演說結束後也總是直接前往機場。我們決定好好利用這個糟糕的情況。我很開心能看到這個城市光鮮輝煌的一面。因此，當克萊拉來到我在飯店的房間要進行催眠的時候，我很放鬆，也有充分的時間和她相處。


    克萊拉是位迷人的金髮女子，大約四十多歲，看起來活潑、聰明、健康情況良好。我試圖從催眠前的談話找出進行回溯的原因或問題。她說主要困擾她的幾年前發生的時間消失事件。


    克萊拉偶爾會因公前往夏威夷參加會議。那次事件發生時，她正在茂伊島上開車。當時已近黃昏，不過天色仍微亮，她正在找一家以前去過的飯店。飯店座落在海灘，她想在那裡邊吃晚餐邊欣賞海景。當她開著車尋找那家飯店時，發現自己錯過了入口，於是決定再往前多開一段，找個地方調頭。


    茂伊島的這一區種了許多茂盛的熱帶植物，雙線道兩旁都是棕櫚樹。沿途房子不多，由於離馬路有段距離，並不容易被看見。克萊拉終於看到了一條可以迴轉的車道，雖然她心裡意識到，以前開在同樣的路上不曾注意到這條車道。


    她開了進去，發現那裡是一處小住宅區，裡面都是模組式房屋。這些房子位於棕櫚樹群間，環境非常優美。奇怪的是，克萊拉不記得曾在這路上看過這個社區。她將車子開進了車道，正要迴轉——這就是她最後記得的事。下一刻，她發現自己在島嶼的另一端，行駛在一條繁忙的四線公路上。這時天色漆黑，她完全不知道自己是怎麼到那裡的。


    一年後，她又回到茂伊島參加會議。出於好奇，她開上同一條路，想找到當時迴轉的車道。她始終記得那次奇怪的經歷。她開車繞遍了該區，儘管她又找到那家飯店，卻始終找不到那處組合屋住宅區。從此這件事就一直困擾她，也因此促使她進行這次催眠。她想查出當晚到底發生了什麼事，還有她怎麼會那麼詭異地到了茂伊島的另一端，卻絲毫沒有開車到那裡的記憶。


    克萊拉是很棒的催眠對象。我毫無困難地讓她立刻進入了深度的催眠狀態。她記得事件發生的日期，因此我引導她回到一九九四年三月，她來到夏威夷茂伊島的當天。她敘述自己站在當時住的「茂伊太陽」旅館前，正要走進玻璃門。她才剛到，為的是參加年度的研習會。她喜歡來這裡出差，因為工作之餘也能好好放鬆休息。她很喜歡這家旅館四周開滿的繽紛花朵。


    朵：好，現在你已經在飯店登記入住。我要你往前到你要去餐廳用餐的那一晚。那是在同一家飯店還是不同的飯店？

    克：不同的飯店。

    朵：很遠嗎？

    克：嗯，可能有好幾英里。兩、三英里遠。我從沒在那裡用過餐。我只是曾經經過。它座落在海邊，而我住的旅館是在小山丘上。我很想體驗坐在飯店裡，享受窗戶全部打開，聆聽著浪濤沖刷海灘的那種感受。我想去那裡想很久了，但就是從沒去過。

    朵：哦，你現在在開車往那裡去嗎？（對。）是幾點的時候？

    克：才剛黃昏。我不知道確實的時間，不過有點微暗。

    朵：你認為天很快就會暗了？

    克：嗯，大概吧。我沒有多想。

    朵：好，你快到飯店了。告訴我你在做什麼。

    克：我開在南基蘭（South Korea）路上。天色越來越暗。因為那裡沒有街燈，視線並不清楚。我正經過亞斯特蘭（Astrand）。那是個很大的地方，我錯過了那條車道。附近有很多樹。車道看起來……嗯，不是很隱密，但我就是錯過了。（懊惱）我就是沒看到。於是我又往前開了一段，想找个地方調頭回去，因為我真的很想在那家飯店用晚餐。（在這一段催眠裡，她有時像是邊開車邊自言自語，但也會回答我的問題。）我在開車。我發現這個地方……好。我看到了這個地方。這是一條死路。很好，看來是調頭的好地方。嗯……我以前從沒看過這個地方。（困惑）咦……這裡有漂亮的棕櫚樹和花叢，還有一道籬笆，不過我可以看到籬笆的另一邊。那裡有各式各樣的……（不知道該如何描述）像是模組式房屋（組合屋），或是……很時髦的移動式拖車屋。好……嗯，這個地方很漂亮。

    朵：你找到了調頭的地方？

    克：是的。是條死路，我現在正在迴轉。（輕聲地）然後我看到這些亮光。（停頓，覺得困惑。）就像……讓人眩目的強光。

    朵：光在哪裡？

    朵：尖端朝上？

    朵：對。幾乎就想像她從天上來的。它就像是光的漏斗。一個漏斗，寬的那一端向下朝著我。這個光有非常強大的能量。（深呼吸好幾次）克：（她的呼吸變快）就像……來自太陽，就好像你透過樹叢看著這個很明亮、很明亮的光芒。…………我覺得

    朵：是很密實的光嗎？

    朵：從底部散發？

    朵：（從她的聲音和呼吸，可以明顯看出她正經驗到不尋常的事，而且有一些不安。）底部，對。

    朵：你還在開車嗎？

    克：沒有！我就是存在。我存在。

    朵：什麼意思？

    朵：（無法置信的語氣）感覺上我就是這個光的一部分。

    朵：你还在你的车上吗？


    在療程的最後，我跟克萊拉的潛意識對話。

    朵：你能不能解釋當她開在夏威夷路上，來到那處迴轉地點的時候發生了什麼事？

    克：她是那個時間和地點被「送到」那兒。因為那個地方是為了她才顯現（物質化），之後並不適合讓她回到那個特定地點。因此她被帶到一個……公路上她知道的地方，所以車子才會出現在那兒，這樣她也才知道要怎麼開到她當時想去的飯店。

    朵：所以那次回去必須是在夏威夷的某個特定地點和時間？

    克：不見得。那只是個她在身體裡會覺得舒服的地方。為她創造出的那個空間有她喜歡的美麗景色。那會是一個她可以徹底和全然放鬆的地方，轉移（指資訊）也才能完成。

    朵：那麼那輛車，連同她在車子裡的身體，實際上是被帶到島的另一邊的另一條公路上？

    克：沒錯。那只是去物質化，然後在另一個地方回復為物質形態。

    朵：連人帶車從一個地方移往另一個地方是常見的情形嗎？

    克：噢，是的。噢，是的。

    朵：這種事經常發生？

    克：經常發生，經常發生。

    朵：當這種情況發生時，身體也是去物質化後再成形嗎？

    克：是的。


    朵：這對身體沒有傷害？

    克：沒有傷害。身體變成純能量。

    朵：那麼她和車子只是從一處被移到另一處。

    克：沒錯。

    朵：所以當她恢復意識的時候，她已經在島上的另一個地方。而且那時候也在開車。（是的。）而直到這一刻，她對之前發生的事完全沒有記憶。

    克：是的。

    朵：所以當她來到，我想我應該說當她恢復意識，她才會在島上的另一個地方。

    克：對。

    朵：這個情形在她身為克莱拉的這生是唯一的一次嗎？

    克：發生過許多次了。不過這一次是發生在她願意探討，願意知道發生了什麼事，以及怎麼發生的時候。其他幾次的時機並不成熟，那時她還沒準備好去瞭解，或者說，那時她在地球的物質生命還沒有成長到可以理解這種事的時候。

    朵：所以這次是因為發生了不尋常的事，她才會記得。

    克：沒錯。

    朵：她現在可以知道這些資料了嗎？

    克：是的。她應該知道這些資料。她一直渴望知道。她現在也可以瞭解了。


    **朵**：而且這對她會是幫助。我們不想造成任何傷害。

    **克**：對。這對她是件開心的好事。


    接著我請潛意識退場，然後讓克萊拉的人格完全回到她的身體裡。這種能量的釋放或改變總是非常明顯，因為催眠個案的呼吸在這時候會變得沉重。


    我帶引她回到現在，並回到意識完全清醒的狀態。


    所以，真相並不總是像表面所呈現的。我們真能確定自己看到和體驗到的事情是真的嗎？還好它們是以一種微妙溫和的方式完成，所以唯一的影響是令我們好奇，然後，通常也就把它當成是件怪事而作罷。恐懼這麼溫和的事並沒有好處，尤其是我們無法預期這樣的事件何時會發生，自然也就無法控制。


    謎團繼續著，而且越來越深奧。


    夢什麼時候不是夢呢？當事件的真實記憶被潛意識遮蔽，它就會以夢的形式出現嗎？夢究竟是什麼？我們如何才能知道其中的差異？還有，知道這個差異對我們有好處嗎？這類事情也許還是不要碰觸得好。


    我在工作時聽到的報告，有很多都不是個案與外星人的實際接觸，也不是目擊太空船。相反的，個案往往是被奇怪和生動到異乎尋常的夢境所困擾。這些夢通常有著不尋常的性質，是他們忘不了的夢。


    我們每個人，偶爾都會有非常特別強烈和清楚的夢境，感覺格外真實，而我們通常都會慶幸那只是場夢。也有一些夢是我們久久難忘的。這是我們稱為「睡眠」的陰影世界裡的正常部份，它大多是潛意識對清醒時的生活事件所做的解讀，也是潛意識試圖透過象徵，傳遞訊息給我們的方式。那麼，是什麼讓跟幽浮、外星人或太空飛行有關的夢與眾不同呢？我們又為什麼要去注意它們？我總是說：「沒壞的東西就別修理！」如果當事人活得好好的，沒有因為哪個記憶而造成問題，那麼最好就別去探索，把它當成一件有趣的怪事就好。沒有必要只是為了好奇而讓生活變得更複雜。記得，一旦打開盒子，就沒辦法再關上了。你無法忘記自己想起來的事。而這可能會對你之後的人生造成永久的影響。


    不論個案透過催眠療法揭露什麼資訊，我都希望能為他們帶來正面的影響。因此，凡是探索夢境所得的資訊，都必須用正面的態度整合到個案的人生，好讓他們能夠處理並回歸正常的生活。同樣的規則也適用於與外星人互動並保有意識記憶的人。這一生才是最重要的，個案必須盡可能正常地過下去。因此，催眠師的職責是幫助個案處理所揭露的任何訊息，並且全面和正確地看待它們。


    在我的另一本書《生死之間》裡，我們發現靈魂事實上從不睡覺。只有身體會感到疲勞，而靈魂在等待身體醒來的時候則是覺得百般無聊。所以當身體睡著時，我們的靈魂或靈，也就是真正的我們，會展開很多冒險旅程。它可能去了靈界，與大師和指導靈會面，聽取建議或學習更多的課題。它也可能到世上其他的地方旅行，或甚至往外探索其他的世界和次元。這些行程有時會留下片段的印象，特別是常見的飛行夢。


    我們最本質的部份與身體之間有一條「銀線」作為連結，因此靈魂總能在身體醒來前回到身體裡。這條臍帶要一直到身體死亡並釋放靈魂自由的時候才會斷掉。

    在我還沒調查幽浮以前，我從未想過肉身會在睡眠的狀態下到別的地方。畢竟，身體如果被移動，應該就會醒來，不是嗎？我從調查這些奇怪的可能性中學到了很多。在這些案例裡，我小心地質疑，確定那是身體真正的經歷，而不是靈魂出竅。這兩者會很類似，但描述並不一樣。


    在靈魂出竅的情形，當事人可能會記得脫離身體時的感覺。他們常往下看，看到自己睡著的身體躺在床上，他們也會講述自己在外出後重回到那個空殼的情形。此外，他們常描述看到連結靈魂與身體的「銀線」。偶爾，他們還會形容當在外面太久，被銀線拉回去的感覺。我在工作中發現，身體有可能在靈魂不是時刻都在身體裡的情形下生存，身體會被存在於身體裡的生命力支撐，然而如果沒有靈魂，身體便無法無限期的存在。


    另一種體驗，也就是身體真的跑出去的情況，則有不同的描述。我的第一個這類型個案是位名叫約翰·強森（John Johnson）的非裔美國人，他是個很棒的人，一位心理學家，常跟我一起訪問疑似被幽浮綁架的案例。當時我才剛開始調查，一切還很新奇。我覺得我們像是在開墾新的田地。


    我當時還沒發現現在所觀察到的模式，那畢竟是要調查過許多案例之後才會有的發現。由於我不是心理學家，每當第一次訪問那些認為有過外星經歷的個案時，我很依賴約翰的專業。他會問個案我永遠也想不到的問題，他的問題很能幫助我們瞭解個案和個案家人的心理健康狀態。


    有時當我們要開車回家時，在車裡他會告訴我個案的心理失常，他懷疑個案幼時可能曾被虐待。有的案例令他懷疑當事人是在幻想或尋求注意力。我跟著他學到了要留意的跡象，這是無比珍貴的一課。大多時候他會說對方的家庭正常，個案顯然經歷了他相信是真實的經過。如果約翰認為值得或有必要追蹤下去，我們便會再安排與個案見面，如果不是他，就是我進行催眠。


    我非常珍惜並看重我們一起調查案例的那三年當中，他所給予我的協助與建議。雖然他因為心臟虛弱而受苦，仍為了調查這些不尋常的主題，與我一起旅行了許多路。他像是把心臟藥當成糖果在吃，然而他說和我共事是支撐他的動力。我們的工作關係一直持續到一九九〇年，五十三歲的約翰心臟病發過世才終止。


    一九八七年我們剛認識不久，約翰就告訴我他個人的奇特經歷；他說他希望透過催眠探索這段經驗。事情發生在一九八一年，他去埃及旅行的時候。旅行社安排他在開羅的飯店和一位陌生人同住。他對那晚的事情沒有什麼印象，除了醒來時發現自己站在另一個男人的床旁，那自然會讓對方驚醒。他不記得自己有起床，也不記得自己怎麼會走到那裡。他只記得有東西發著藍光。我提出他或許是在夢遊；在一個陌生的環境中入睡，夢遊是很常發生的狀況，尤其如果又因為旅行而疲累。他考慮過這個解釋，但他不曾夢遊，所以打消了這個可能性。他很確定自己去了某處，他要我幫他查出他到底去了哪裡。


    開始催眠前，他透露他擔心心臟可能在進入出神狀態的時候會有問題。他列出需要觀察的症狀，只要那些症狀一出現，我就要把他帶出催眠狀態。我告訴他，我確信不會發生這樣的事。我說的沒錯，他的催眠進行得非常順利。我知道他是催眠師，所以很確定要讓他進入出神狀態並不會太困難。因為他知道程序，也完全配合。


    他一進入出神狀態，我便引導他回到抵達埃及的那天。他剛下飛機，正準備過海關。


    當探討的事件跟個案的現世生活有關，回到事發當下有可能令他們不安。許多催眠師都說，回到事件發生之時會令個案焦慮。由於我是帶個案回到事件發生之前，而不是事發當下，因此不曾遇過個案抗拒。用這個方式，我們可以從後門偷溜進去，從後面逼近。


    約翰先是重新經歷了與旅行團一起在機場過海關的情況，然後我讓他來到下榻的飯店。他對飯店和回房前吃的餐點做了詳細的描述。長途旅行令他疲累不堪，他回房倒下來就睡著了。'
