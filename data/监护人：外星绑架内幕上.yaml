    事情和建造事物的方式。當你看到某些種族的外觀，你就會瞭解那些地精（小矮人）和小精靈的傳說是怎麼來的。因為在古代的時候，有時外星訪客不是那麼小心，被一些人目擊又沒有蒙蔽他們的記憶，於是有關特殊外表的人的傳言就這麼開始。當你聽到那些非常高大和奇形怪狀，或是非常小而且看來纖弱的人的傳說，那很有可能就是跟過去來訪地球的種族有關。

    朵：是議會叫他們來這裡做這些事的嗎？

