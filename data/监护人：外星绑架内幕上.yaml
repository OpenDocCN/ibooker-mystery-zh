- md: "## 監護人 THE CUSTODIAN ▲ 020\n\n百次相同檢查、人滿為患的醫院的那種冷淡和漠然態度相提並論。經過了一段時間之後，檢驗變得固定和單調，他們覺得沒有需要解釋，也沒有足夠的時間和興趣去試著跟每一個人溝通。在這時候，如果有某個臨時員工花時間安撫和安慰，他的善意在其他工作人員的機械化和明顯的忽略態度中，就會顯得特別突出，並被銘記在心。我相信外星人的態度不見得是忽視我們的個別人格，但有可能跟醫院一樣，是因為過多的工作量和窮於應付的例行公事的緣故。\n\
    \n許多研究者很努力想要找出檢測背後原因。現在已有幾個不同的概念和解釋被提出來，未來還會有更多出現。每個涉入這個不尋常領域的人都會依據各自的研究、生活體驗、心態和期望，架構出自己對此的理論。其中有许多人認為，外星人正在進行基因操作或基因工程，目的為何則各有不同的看法。有些人認為人類是高等、幾近完美的種族，而外星人可能是來自不完美或瀕臨死亡的種族。或許他們不知怎地失去了繁衍能力，因此需要人類的精子和卵子，幫助他們的種族免於滅絕。他們希望透過不同種族間的交配來達成這個目的，就算不是經由肉體，也會透過臨床的科學實驗製造出人類與外星人的混種。由於這個概念在人類眼中非常恐怖，我們也會認為具有這種意圖的外星人很可怕。\n\
    \n我則有不同的理論。我相信外星人這麼做的目的是為了地球人，而不是他們自己。當然，我們已經看到好幾種不同的外星人和基因操作有關，其中可能有些比較負面的外星人是為了己之私。但我相信，這些幽浮群體裡的叛離者或持不同意見者是少數。\n\
    \n就像我在《地球守護者》說明的，早在萬古以前，第一個人類出現在地球之前，就有一個在較\n\n## 高力量引導下，為我們這個世界制定好的計畫。這個宏偉計畫的設計與執行的方法，都遠遠超過人類所能理解。不同的存在體被指派去執行這個計畫裡的不同步驟，每個存在體只負責自己那一小部分，因此他們對整個計畫的完成並沒有什麼可說的。計畫的整體範圍大概也超過了他們的理解能力。由於他們用無限長的時間在地球製造、培育和修正生命，這對他們來說只是一份工作，一項任務。他們在許多處於不同成長階段的星球上頭，可能也有過類似的任務。當個別的存在體死亡，其他\
    \ 的存在體會接續他們的工作。這是個時間極長，並以一絲不苟的精細所協調執行的計畫。時間不重要，重要的只有最後的目標——創造出在生理和心智都很卓越的物種。這樣的計畫並非一蹴可幾，而就算是這麼小心翼翼的規畫也會有出錯的可能。畢竟，要預測到每一個可能發生的狀況是不可能的。\n\
    \n於是，就在一顆隕石墜落地球，帶來不適合這個星球的有機體時，美中不足的事發生了。那些有機體在它們原本的環境中是無害的，但在進入地球清新的大氣後，卻增生和變種成了易變無常的威脅；它破壞了播種人類的計畫，人體從此有了疾病。\n\
    \n原先的理想計畫是要創造出一種完美運作的身體，沒有疾病，可以享有很長的壽命。因此，當這個預料外的发展出現時，大家都很哀傷，議會的最高層級於是召開會議，決定接下來該怎麼做。他們既傷心又自責，因為偉大的實驗走了樣。但他們決定，既然已經為實驗付出了那麼多努力，最好就繼續下去，不要放棄整個實驗。他們決定將已經造成的傷害降到最低，接受不完美的部分，繼續努力，往前邁進。\n\
    \n### 第一章 改變探索的方向 ▲ 021\n\n## **監護人** THE CUSTODIANS ▲ 022\n人類在發展的早期持續受到這樣的照顧、修正和操縱。基因操作和工程從一開始就已是人類的一部份。這並不是什麼新鮮事。這是為什麼我們之所以是在這樣，而不是住在山洞裡，在荒野中艱難求生的原因。外星人很小心地培育和影響人類大腦的發展，把對他們而言非常平常，但對我們來說驚奇不已的心靈能力和直覺感受，一點一點地引入。隨著人類的發展遠離動物階段，並且變得有能力應付生活和種種事務，外星人就不被准許擁有那麼多的影響力了。地球一直被強調是個自由意志的星球，而宇宙法則嚴格規定，自由意志必須受到尊重。\n\
    \n外星人從地球園丁的任务轉變成了監護人。他們給了人類很多裝置與知識，好讓人類的生活變得容易些，然後我們這個新物種就必須自立自强。如果人類犯了錯，把知識用在錯誤的地方，那也是我們的權利，前提是不要侵犯到地球以外的生物的權益。\n\
    \n外星人受到嚴格的不干預法則的約束。當然，他們對人類的研究仍持續進行，不時需要檢視實驗，看看人類的發展以及對環境的適應情況，並在適當的時機透過基因操作進行修正。如果這些事情從時間之初即已開始，那現在又為什麼不會持續呢？如果他们是在更高力量的許可之下進行，而我們對那股力量卻連最基本的理解能力都沒有，我们又怎能說他們沒有權利？我們並不會對一個母親說她沒有權利或職權去照顧她的小孩。這是我看這件事的邏輯。\n\
    \n隨著人類的發展，我們對環境的影響已到了一個會反過來大幅影響人體的程度。我想，在人類環境經歷這些威脅性變化的時候，外星人進行更多測試和檢查並非巧合。他們當然想知道人類對自己身體做了什麼；他們一直都很有興趣。他們持續關心並修正和调整人類，好讓我們能適應自己\n\
    \n## 對大氣所注入的那些「東西」。還有什麼比這更順理成章的事呢？如果這包括了透過操作基因製造出更有適應力的人類，那就由他們去吧。我相信他們仍在努力回歸最初的夢想和設計，讓我們成為沒有疾病，擁有長到不可思議的壽命，讓這些人在宇宙的某處，另一個預備給他們的星球上生活的可能。當地球可能被核戰或其他事物污染到無法復原時，這會是人類在乾淨的環境中重新開始的機會。我相信這是一個可能性，但也許不是唯一的一個。\n\
    \n一 九八八年的秋天，我遇到一件怪事。某個夜晚，我忽然有種明確而不熟悉的感覺，好像有一整團的資訊不知怎地灌入了腦子裡。那個體驗完全不像是作夢。事發當下，我清醒到足以理解那些資訊。我知道那是個概念，不是具體的句子或想法。它是以完整和簡潔的形式放到我的腦裡。我常聽個案說他們接收到資訊必須分解成語言才能被理解。現在我瞭解他們轉譯的困難了。\n\
    \n這是我第一次有這種體驗，也是唯一的一次（我認為）。我知道那個概念跟幽浮上外星人的行為和思考等等解釋有關。我知道它應該被放進我以後要寫的最後編輯工作，完全沒有察覺自己竟也在思索外星人使用基因工程的原因。我只是持續累積資料，期待有天把這些資料寫進我談幽浮案例的書裡。我當時正在進行《與諾斯\n\
    \n我收到的概念、想法和說明，跟當時從其他幽浮作者那裡聽到的都不一樣。記下這些內容似乎\n\n## **監護人** THE CUSTODIANS ▲ 024\n\
    \n很重要，重點是，那是我一直在找的資訊。我並沒有時間去分析，因為它有太多面向，但我知道我可以先記在心裡，隔天再把內容存到電腦。我繼續入睡，隔天早上醒來時，腦裡有種奇怪的感覺。我的人尚未完全清醒，那團資訊便以前一晚同樣的強度泉湧而來。這不是正常的狀況，因為通常醒來後，夢裡的內容會退去得很快，事後要回想，就算只是畫面，都不是容易的事。\n\
    \n我得到的資訊並不是畫面，而是哲學性的思想。它再度強調我必須記住並寫下來。我知道我必須在它消失前趕緊存到電腦。當然，日常生活總是會有些阻礙。那天的第一要務是要跟女兒一起把我們小果園裡的桃子裝罐。成熟的桃子不能等，即使有資訊在腦裡跑來跑去，心有旁鶯的情形下也是一樣。當最後一罐桃子封好放在桌上等候冷卻時，我才終於有時間可以一個人在電腦前工作。\n\
    \n當然，接下來就是要思考如何將資訊轉成文字。這通常是最困難的部分，因為概念是整體的，但要轉換成文字，勢必得經過拆解，而這並不容易。我很清楚我一定會遺漏某些部分，不過我還是會努力。\n\
    \n我收到的這個概念很有趣，我能夠以它的解釋為骨幹，建構出一本書，朝著預先形成的結論前進。雖然那樣的一本書當時只是我心裡深處的一個模糊影子，還談不上形式和內容。\n\
    \n這些萌芽期在我的檔案裡冬眠，直到十年後才得以具體化。到了一九九八年，我已經累積了可以寫成一本書的大量資料，而這本書毫無疑問地就是依循著我在一九八八年所得到的概念。\n\
    \n## **概念**\n我發現，基因操作是為了保護人類，保存我們這個種族，保障我們的存續。以這種方式去看，《天使神秘學院官方淘寶：http://strc.taobao.com》三部曲裡強調，我們的生活方式很有可能毀於一旦。地軸傾斜的可能性已被預見。在這樣的大災難期間，將有許多因素造成生命的殞落，像是洪水、地震、火山爆發、海嘯等等各種已知和未知的不幸。接踵而至的疾病和饑荒又會帶來更多死亡。任何倖存下來的人都必須非常堅強。我對人類很有信心，我相信我們有能力存活。就如諾斯特拉達穆斯相信的，我也相信這不會是世界的末日，而是我们所知的世界的末日。我們的生活方式將會徹底的改變，但人類所具有的不屈不撓的美好特質，一定可以重建我們認為重要的生活形態。\n\
    \n我不太喜歡這件事，也不想認為這有可能發生，然而，許多專家已經同意這個可能性確實存在。或許外星人只是看得比較遠，並且試著預測到每一個可能。他們不想再有措手不及的事發生。透過基因操作和基因工程，他們也許能夠創造出可以在污染環境中存活的人類——不只抵抗癌症和其它因環境改變而產生的疾病，還能適應充滿巨大壓力的新生活形態。本書有位個案就看到自己在滿是病患和將死之人的場景裡，盡所能地提供任何一點協助。她沒有生病，也不會生病。幫助別人是她的作品。也許她就是為了這個目的而設計出的新人類，能夠禁得起地球變遷時的災難與隨之而來的重大危機。\n\
    \n### 第一章 改變探索的方向▲\n025\n\n我得到的資料讓我發展出一個理論：外星人十分關心我們這個物種的福祉，因為打從遠古以來，他們便一直看著人類；他們並沒有放棄我們的打算。有些人類正在接受準備，要在另一個預備中的星球生存，這個星球將會居住那些沒有疾病的個體。它被設計成跟地球類似，這樣一來，那些將要在原始狀態的新環境展開新生活或延續過去舊日子的人類，才不會受到驚嚇或太大的衝擊。\n\
    \n有些人也可能正在接受準備，以便在地球發生浩劫性的變化後，繼續在這個星球上生存。\n\n我相信，未來當我們看到這個現象的所有不同面向時，我們將意識到外星人沒什麼好讓人懼怕的，相反地，我們應該把他們看作是祖先、兄弟或監護人來歡迎。他們在這項宏偉計畫的目的最終將如水晶般明晰，並得到人類的理解。\n\
    \n## **觀察**\n\n從接觸到這個較為極端的觀點後，我發現自己觀察周遭事物的方式有了改變。它影響了我看待人類同胞和他們生活的方式，還有這些生命是如何在全球性的情境中息息相關。隨著我對這些事情的注意，監護人理論背後的邏輯也在我的心裡越來越清晰，越來越有道理。\n\
    \n在遙遠的未來，人類很有可能也會擔任某個星球的監護人。這個想法不只可能，還極有可能成真。人類是非常好奇的動物，我確定當初展開照顧地球計畫的外星人也是。我很難想像一旦人類太\n\
    \n## 空旅行的技術臻至完美，克服了我們的世界與外頭死寂世界的距離之後，我們會想要外面的世界跟發現時一樣死氣沉沉地沒有生命。在遙遠的未來，人類將具備引入生命實驗的知識，也必定會從簡單的初步階段開始，先導入單純的細胞，看看在眼前的條件下，有哪些可以成長並適應原始的環境。\n\
    \n在經過了許多實驗之後，更複雜的生命形式將被導入，或是改變基因來適應環境。我相信天生好奇的人類一定會這麼做的。而且我們會推論這樣的實驗不可能造成傷害。因為進行實驗的星球本來沒有生命，或是只有最基本的細胞結構，因此人類就有了一個沒有生命的荒蕪星球做為實驗地。這裡已一切就緒，等著成為未來科學家試驗不同生命形式適應力的遊戲場。所以這會傷害到誰呢？\n\
    \n外面的世界不會有地球上的種種限制，科學家因此能夠自由嘗試。\n\n當然，他們會受到政府或至少某個較高位者的指導和指示，遵循著一個主要計畫的順序，一步步進行。那個計畫一定是複雜到不是一般科學家可以獨立完成。接著，將會是照料、去蕪存菁和移植等工作，也就是協助發展中的生命形式適應環境。這些瑣碎的任务會是交由教育程度較低的人（或甚至是機器人）來執行，因為這些工作只需要遵從指示。\n\
    \n母星的大眾可能知道，也可能不知道這些非公開的計畫，而計畫則可能無限期地發展，由那些認為「新」世界太過珍貴而不能終止實驗的科學家世代地進行下去。這些科學家將學到多到不可思議的新資訊，並用來造福地球人民——計畫如果也對母星的生活形態帶來幫助，自然就不會被放棄。\n\
    \n經過數不清多久的時間之後，生命的存在確立了，並且開始發展它自己的特質。或許來自地球的生物也被引介到實驗裡進行跨種繁殖，以便發展出能夠適應環境的基因，其結果可能就是一種有\n\
    \n## **第一章**\n改變探索的方向▲\n\n## 智能的動物。在這個過程中，人類很自然地會為了協助發展而操控基因，放進我們自己種族的特質。\n當新的生命出現，興奮之情將感染所有的科學界。這個產生的生物可能具有部分我們的特性，但由於必須適應本身的環境，所以大概不會和我們非常相像。他的眼睛、呼吸器官和循環系統可能跟我們不同，因此無法在地球存活，然而，他仍會被視為是類人動物（humanoid）。\n\
    假使，這個新生物開始顯示出與大計畫不相容的缺陷，科學家會因此放棄計畫，毀掉他嗎？我想不會。我想人類仍有足夠的神性，他會把所有的生命看作是神聖的，就算是自己一手所創。我想人類會盡力幫助新的物種適應缺陷，或就是讓他們在演化的困境中，自生自滅。\n\
    隨著具有優勢或主要物種持續發展並開始展現文明的跡象，監督就會跟著減少。實驗者不需要隨時都在觀察。此外，看看新生物會如何自行發展可能也是個有趣的實驗。他們會有哪種道德觀？會有創造力嗎？好不好戰？為了瞭解自己的種族，我們會覺得有必要容許這些生物自行發展，同時研究哪些特點是自然發生，哪些是靠後天學習。但我們不會完全丟下他們不管。\n\
