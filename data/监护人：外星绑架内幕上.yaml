  md: '空旅行的技術臻至完美，克服了我們的世界與外頭死寂世界的距離之後，我們會想要外面的世界跟發現時一樣死氣沉沉地沒有生命。在遙遠的未來，人類將具備引入生命實驗的知識，也必定會從簡單的初步階段開始，先導入單純的細胞，看看在眼前的條件下，有哪些可以成長並適應原始的環境。


    在經過了許多實驗之後，更複雜的生命形式將被導入，或是改變基因來適應環境。我相信天生好奇的人類一定會這麼做的。而且我們會推論這樣的實驗不可能造成傷害。因為進行實驗的星球本來沒有生命，或是只有最基本的細胞結構，因此人類就有了一個沒有生命的荒蕪星球做為實驗地。這裡已一切就緒，等著成為未來科學家試驗不同生命形式適應力的遊戲場。所以這會傷害到誰呢？


    外面的世界不會有地球上的種種限制，科學家因此能夠自由嘗試。


    當然，他們會受到政府或至少某個較高位者的指導和指示，遵循著一個主要計畫的順序，一步步進行。那個計畫一定是複雜到不是一般科學家可以獨立完成。接著，將會是照料、去蕪存菁和移植等工作，也就是協助發展中的生命形式適應環境。這些瑣碎的任务會是交由教育程度較低的人（或甚至是機器人）來執行，因為這些工作只需要遵從指示。


    母星的大眾可能知道，也可能不知道這些非公開的計畫，而計畫則可能無限期地發展，由那些認為「新」世界太過珍貴而不能終止實驗的科學家世代地進行下去。這些科學家將學到多到不可思議的新資訊，並用來造福地球人民——計畫如果也對母星的生活形態帶來幫助，自然就不會被放棄。


    經過數不清多久的時間之後，生命的存在確立了，並且開始發展它自己的特質。或許來自地球的生物也被引介到實驗裡進行跨種繁殖，以便發展出能夠適應環境的基因，其結果可能就是一種有


