    \n---\n\n## 作者簡介\n\n![Dolores Cannon](img/8b0695bb90c4c08337f00ca20027d996_338_0.png)\
    \  \n\n**Dolores Cannon**  \n朵洛莉絲·侃南  \n\n一九三一年生於美國密蘇里州·聖路易市。  \n\n一九五一年婚後，隨著先生的海軍職務旅居世界各地。一九六八年初次透過催眠接觸到輪迴概念。她的先生是位業餘的催眠師，在使用催眠幫助一位婦人減重的過程中，無意間回到個案的前世。在當時，前世仍屬「非正統」的主題，鮮有人對此領域進行探索。這次事件引發了她對輪迴的興趣。一九七〇年，先生因傷退役，全家搬到阿肯色州的山丘。她由此開始了寫作生涯，投稿於各雜誌和報社。\
    \  \n\n子女成人後，她投入回溯和輪迴的領域，鑽研各類催眠方式並發展出自己獨特的技巧，能最有效地幫助釋放隱埋在個案潛意識的前世資料。她也因此發現了從未有過地球經驗的外星靈魂。透過她與外星人和異次元高度進化的生命體所建立的合作關係，我們得以一窺宇宙和生命的奧秘。\
    \  \n\n自一九七九年起，她先後已催眠了上千位個案，並將內容匯整為多本著作。她稱自己為記錄「失落的知識」的回溯催眠師和心靈研究者。她的作品包括《地球守護者》、《迴旋宇宙》系列、《三波志願者與新地球》、Conversations\
    \ with Nostradamus, Jesus and the Essences 等等。  \n\n她的孫孫是她平凡的家庭生活和另一個看不見的奇幻世界之間的最好平衡。除了寫作，她也教導她獨特的量子療癒催眠療法。這個技術可以使操作者直接與個案的「潛意識」（高我）溝通，得到對個案最具療癒效果的資訊。\
    \  \n\n**譯者／林雨蓓·張志華**  \n林雨蓓 澳洲墨爾本大學研究所畢。譯作繁多，包括《追尋失落的玫瑰》、《三波志願者與新地球》(台譯)、《聖塔菲星空下的回憶》等。\
    \  \n\n封面設計／高鍾琪\n\n---\n\n這本書是《迴旋宇宙》系列的前導。  \n\n朵洛莉絲透過不同的個案取得了相似度極高的外星和地球資料。12年期間的案例，涵蓋的主題包括了：\
    \  \n\n- 神秘消失的時間  \n- 來自不同次元和存在層面的太空船  \n- 外星人和地球政府的秘密合作與資訊交換  \n- 人體內的植入物、簾幕記憶\
    \  \n- 不同的外星種族來訪地球的目的一  \n- 外星人綁架地球人的原因和基因工程的計劃。  \n\n請打開你的心，繼續體驗這場沒有侷限的心智旅程。"
