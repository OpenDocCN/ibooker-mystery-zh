    貝：我想我從自己的房間窗戶出去了。（困惑）剛從窗戶出去到了空中。


    ## 第五章 埋藏的記憶


    朵：從窗戶爬出去？

    貝：不是。就是……就是被吸了出去。


    朵：你幾歲？

    貝：八或九歲。也許十歲。


    朵：窗戶是開著的嗎？

    貝：是啊。是開著的。現在是夏天。我坐在床上，然後就被吸出窗外了。


    朵：這很不尋常嗎？

    貝：（笑聲）在我聽來是有點不尋常。（嘆氣）我想這發生過不僅一次。現在是傍晚。我家旁邊有一塊空地。晚上有時我會坐在地板上，靠著窗台，看著晚上經過的人車。


    朵：接著發生了什麼事？

    貝：我不知道。我只是從窗戶出去，然後又回來了。


    朵：出去的時候感覺如何？

    貝：感覺像是……很快速的移動……就是嗖地從窗戶出去了。（困惑）我不知道我是怎麼做到的。


    朵：穿過紗窗？那會是什麼感覺？

    貝：（困惑）我想我沒感覺到什麼。


    朵：好，我要你跟著那個感覺。現在你穿越了紗窗。讓我們跟著你從窗戶出去。告訴我發生了什麼事。


    貝：我想我在和某個人說話。身高跟我差不多的人。可是我不是很真的看到他們。


    朵：你怎麼知道他們在那裡？


    貝：我不知道……真的。我想只有一個，在我的右邊。我們邊走在空中，他邊跟我說話。我看不到特別注意什麼或看著什麼。


    朵：你說你感覺像在空中行走？


    貝：是啊。直接穿過隔壁的空地。我想我是在飄浮。下半身沒有什麼感覺。


    朵：你們在談什麼？


    貝：我想只是彼此問候。很友善的問候。就像我們又碰面了。像是我認識的人。


    朵：感覺很熟悉？


    貝：是啊。感覺像是同一個人，不是第一次見。


    朵：你往哪裡飄浮？


    貝：（嘆氣）我不知道。我只能看到這麼多。就好像我知道我們要去某個地方，但其他什麼都不曉得。


    朵：你看得到建築物嗎？


    貝：這裡沒有建築物。這是塊空地。下個路口有兩到三棟房子。我可以看到遠方的燈光。不過大多只是……空地。


    ## 監護人 THE CUSTODIANS ▲ 190


    **第五章 埋藏的記憶**


    朵：你覺得你離地很遠嗎？

    貝：是啊，我從窗戶出來，然後往上飄得更高一些些了。大概四到五呎高。比窗口還高。

    朵：而且你是和另一個人一起飄浮。

    貝：是啊。我是說，那不是真的人。那不是人。它圓圓的。像人，但它的顏色不像。它是灰棕色的，皮膚皺皺的，像大象的皮膚那麼粗。事實上，它讓我想到大象鼻子的皺摺。他的樣子很怪，但我感受到很多的愛。我對他有熟悉感，他不是陌生人。

    這段描述和《地球守護者》裡的一段很像。菲爾在太空船上也看到了類似「護士」的生物。對方也是皺巴巴的，而且讓菲爾有被關心的感覺。

    我下指令，貝芙莉能夠想起這件事怪事的經過。記憶就在那裡，而現在大概是出現的時候了。接著她突然指著右邊的太陽穴，說她頭痛。「像是頭痛。好像被擠壓到還是什麼的。」我給予催眠指令，消除她的任何不適，然後跟她說記憶會浮現，我們可以把它當成奇特的事來觀看和檢視，有必要的話，也可以用旁觀的方式。

    貝：我想大概有個什麼在那裡，但我不相信真的有。可能是我虛構出來的。

    朵：你看到什麼讓你覺得是自己虛構出來的？

    貝：喔，大概是編出來的遊戲吧。就是和這個小生物一起在空中，然後進到太空船裡。


    朵：好，告訴我你看到什麼。我們不要擔心這是不是遊戲。如果是遊戲，我們就來玩這個遊戲。我們可以玩得很開心。你看到什麼？


    貝：嗯，我們知道我們是要去那裡的（指太空船）。他是被派來找我的。


    朵：是他告訴你的嗎？


    貝：哦，我就是知道。我不知道我是怎麼知道的。我只知道我穿過窗戶，他就在那裡了。然後我們要回去……像是再去一次。右邊有艘類似太空船的東西。它在發光，在空地的最後面。那是塊很大的空地。但我就只看到這樣。


    朵：那個東西看起來是什麼樣子？


    貝：它是圓的，平的，亮亮的。


    朵：像球那樣圓？


    貝：不是，它像圓盤。它很薄。上面是圓的，底部有點平，不過不是很厚。還有，它是發亮的，像在發光。很像日光燈。全部是銀白色的。


    朵：我納悶如果有人朝這裡看的話，會不會看到。


    貝：我不知道。附近沒有人。


    朵：你出去的時候，如果你媽進你房間會怎樣？她會在房裡看到你嗎？


    我想確定貝芙莉的身體是真的穿越窗戶，還是只有她的靈體。


