    \  \n\n朵：可是你不覺得困擾，是嗎？  \n貝：對，這整件事事只是讓我不自在。不是痛苦，可是他們在做通常不會做的事，所以我會覺得不安。  \n\n朵：有點討厭？\
    \  \n貝：不只這樣。這事會讓我很害怕。我像是被他們擺佈。就像你在醫院生小孩的時候，他們會告訴你要做些什麼。你在生小孩的過程中，你只能生，不能有異議。我媽總是跟我說，生小孩的時候，你是任人宰割。\
    \  \n\n朵：嗯。你什麼也做不了。  \n貝：什麼也做不了。就是不曉得他們要什麼。我不知道為什麼他們要一直這麼做。我甚至不知道他們從這裡面可以得到什麼。我的腦袋沒有收到什麼東西啊。\
    \  \n\n朵：噢，是啊，我小時候就發生過。但他們大多時候是在檢查我的身體，都是身體方面的事。或許他們已經學得夠多，或者這只是一次不一樣的檢查。誰知道呢？他們像是能夠進到我的腦袋，把資料拿出來，或就是到處看看，瞧瞧裡面有什麼。而我卻一點辦法都沒有。\
    \  \n\n朵：可是你在生理或心理上並不覺得困擾，真的嗎？  \n貝：生理上，我不覺得困擾。心理上，嗯，那就像是沒有隱私。身體像是被扒光光，但心理上更糟。你完全被攤在檯面上。然後他們看的還不僅是現在。他們進到你的腦袋後什麼都看。過去都在你的腦裡。沒有半點秘密。\
    \  \n\n朵：你是指你全部的記憶？  \n貝：嗯。還有我知道的事，我的知識。  \n\n朵：我納悶他們為什麼對你的記憶有興趣？  \n貝：我不知道。我只知道一輩子的故事都在我的腦袋裡。我是知道故事的的人。他們要看的不是你的智力。他們檢視的是我存在的本質。所以不只是今天的事。當檢視心靈時，他們檢視的是十年前、十五年前或上上週。隨他們選。他們找他們想看的，不然就到處走走，看看別的。他們看你的資料和知識，這些都儲存在你的心靈裡。還有感受。\
    \  \n\n朵：你的情緒嗎？  \n貝：我的情緒，是啊，這大概比別的都更重要。為什麼他們會在意我十歲生日時做了什麼？他們事實上已經看過一切。有可能主要是想知道大腦是怎麼運作的，心靈是怎麼運作的，還有情緒、情感是怎麼運作的。\
    \  \n\n**第五章 埋藏的记忆 ▲233**  \n朵：他们得到资讯后要做什麽？  \n贝：我猜是放进他们自己的脑袋裡。我不知道。  \n\n朵：没有什麽机器、工具或其他东西吗？\
    \  \n贝:没有。这都是透过心灵感应进行。但我几乎可以看到光波在我和他们的脑袋之间来来回回。  \n\n朵：有点像电流?(是的。)你有没有试著和他们沟通看看?问他们为什麽这麽做?\
    \  \n贝:这次没有。我不记得我是不是……如果我不曾问过,那就很蠢。但如果问了，我想我并没得到过回答,所以我放弃了。  \n\n朵：我想你应该会很好奇。\
    \  \n贝:哦,我是很好奇。可是他们没有理由沟通,因为他们已经知道了啊。  \n\n朵：可是你不知道。  \n贝:他们知道我好奇。他们知道我怀疑。他们知道我不想他们做这个,但他们还是做了。所以问也没有用。他们如果想要我知道就会让我知道。就像是没必要做任何言语上的表达。一切都在我的脑袋裡。他们知道我脑裡有什麽。他们要我知道的事就会让我知道，不然就不会。我问也没有用。\
    \  \n\n朵：除了满足你自己的好奇心以外。  \n贝:可是他们不会回答，所以也满足不了。他们想知道我们的脑袋裡都在进行些什麽。原因的话,我就不知道了……我猜是因为我们是不同的种族。如果我们到了另一个星球,不论那裡是什麽生命，我們可能也會對他們做同樣的事。\
    \  \n\n朵：有可能。  \n貝：我們在這裡就做了啊。我們拿動物做實驗。  \n\n朵：好。這個過程很久嗎？  \n貝：大概十分鐘吧。  \n\n朵：他們只做了這件事嗎？就只有這個交流……不是真的有交流，只是一種連結的方式。（是啊。）接下來呢？\
    \  \n貝：他們離開房間。然而那三個帶我下船的人過來找我，我們回到小船上。然後就飛回去了。  \n\n朵：你沒有看到那艘較大的船的其它部份？  \n貝：沒有。我只知道一定比我來的那艘要大許多，因為整個小船都進去了，看起來也只是佔一小部份空間而已。你知道我們人類曾談論在外太空建造一個可以殖民的基地？我覺得那是類似的東西，就算沒那麼大，也很接近了。我不知道為什麼我這麼想，因為我並沒有看到其它部份。就只是個感覺。\
    \  \n\n朵：那麼他們帶你回來之後呢？  \n貝：我進到小太空船。它對我們來說像是個短程的交通工具還是直升機什麼的。我們乘著它離開，但我不記得回到地面或我的床上的部份了。\
    \  \n\n朵：你不知道它是不是又在後院降落？  \n貝：大概是，不過我沒看到。我不記得了。事實上，我想我完全不記得了。接下來就是早上了。我認為他們有能力可以關閉我的大腦功能。或是打開，讓它曝光，就像把你的肚子剖開一樣，除了不是真的切開來。\
    \  \n\n朵：但你沒有受到任何傷害。  \n貝：沒有。身體上沒有。沒有地方會痛。我的意思是，你的腦袋沒有真被打開。  \n\n朵：隔天你有沒有什麼後遺症？\
    \  \n貝：隔天我還記得房裡有個人影。我記得自己在想外面有艘飛碟在等我，但其他的都不記得了。我納問自己是不是不在作夢。我不記得有任何身體上的後遺症，不過我想他們在進行的時候，我的頭在痛。\
    \  \n\n朵：檢視這個體驗和談一談是好的。這樣我們就能讓它過去。  \n貝：也許吧。但這已經是過去的事了。所以也沒什麼要特別著墨或處理的。  \n\n\
    朵：沒錯。重要的是，這件事沒有令你困擾。對嗎？  \n貝：我想有。我想它到現在仍然困擾我。還有它對我的腦袋做的事。就好像我必須生活在謊言裡。我的意思是，人總不能一天二十四小時都在說謊。所以我認為我乾脆就把它忘了、把它封鎖住。而這點，我認為造成了心理上的傷害。\
    \  \n\n朵：你說活在謊言是什麼意思？  \n貝：哦，你必須一天二十四小時表現得好像這件事不存在，沒有發生過。我的意思是，沒有人認為它存在，沒有別的人談它。如果你知道這件事是真的，那麼你就得活在謊言裡，不然不能融入這個世界。\
    \  \n\n朵：因為大家不會相信你？  \n貝：當然不會相信我啦。  \n\n朵：但你自己也有很多地方不記得了，不是嗎？  \n貝：對。不過那就是我的意思，要一天二十四小時都活在謊言太難了，尤其在你年輕的時候。所以我想心靈索性就把它給遺忘了。如果這（指遺忘）不是我自己的心智這樣做的。我不知道。我想他們做了很多事。但我想就心理上來説，我們自己的心智也會為了能跟它共存而把它掩蓋。就像是全面的忽視。全面的忽略。\
    \  \n\n朵：我很好奇他們怎麼知道要去哪裡找你？  \n貝：他們向來都曉得。我不知道是不是他們對我做了什麼，還是他們用心靈就可以。如果是用心靈力量，他們只要掃描，我的位置就會出現。我的意思是，有可能是這樣。我真的不知道他們是怎麼知道的。我只知道他們似乎無所不知，嗯⋯⋯雖然我這麼説，可是顯然他們並不知道所有的事。如果他們什麼都知道，就不會來調查了。但他們懂得的事情比我多好多，感覺他們像是什麼都知道。\
    \  \n\n我準備讓她前往另一個場景，但她突然打斷我。「或許我跟什麼事情有關，他們做這些事的其他对象也是。他们也对别人这么做。」  \n朵：你这么认为？\
    \  \n贝：噢，是啊。我看过他们和其他人在太空船上，就跟他们抓我去一样。我不知道这一切是怎么回事，但我知道上面有别的人类。  \n\n朵：这是什么时候发生的事？\
    \  \n贝:发生不只一次。我知道他们也对其他人这么做。我刚刚说到他们是怎麽找到我们的。你看过那些大家贴在墙上的世界地图？他们会在特定地方用红色、紫色或别的颜色的点来标示？我想我们身上有个什麽东西可能会发出喔喔声还是闪光，他们知道哪些是他们一直在检查的人。我不知道是不是有某个东西，还是说他们一旦检查过我们，我们就会变成那样，变成会发出某种光或是声音讯号到某个地方，然后电脑一扫描，我们就会被找到，就跟作战的导弹会找到目标一样。我的意思是有某个雷达，有种你可以找到东西的东西。我们（指人类）也做得到。所以有某种类东西可以帮助他们追踪检验过的人。我们大概被某种方式留下了标记，我猜就像我们替鸽子做记号一样。\
    \  \n\n朵：好。我们可以找出答案。我想要跟你的潜意识说话。贝芙莉的身体有没有被某种方式做了标记？他们是否对她的身体做了什么，以便能再找到她？  \n\
    贝：是的。我想那是在她的鼻子里。我想是在这裡的中間。（她指著鼻樑）在脸上，在鼻子里。  \n\n朵：鼻樑？（對。）那裡有什麼？  \n貝：我不知道那是像蜜蜂一樣圓圓的，還是一個小正方形，像紙一樣的東西。不過那不是紙，比紙更有份量。它不知怎地就被放在裡面。\
    \  \n\n朵：它有什麼功能？  \n貝：它發出某種訊號。  \n\n朵：這有困擾到她嗎？  \n貝：有，它造成了某種頭部問題，頭痛、鼻竇問題。我想任何時候只要有外來的東西在頭部或身體其他部位就會造成些微問題。不管它是什麼，對我們來說就是個外來物。它不是要造成任何問題，但我想還是造成了。就像你戴隱形眼鏡或是有東西跑進眼睛的時候一樣。\
    \  \n\n朵：你的意思是它的本意不是要引起問題，但因為它不屬於人體，所以可能會造成像副作用一樣的些微問題。  \n貝：對。至於會有多困擾，就要看你個人的健康狀況。\
    \  \n\n朵：它是什麼時候被放在那裡的？  \n貝：我想是很多年前，年紀很小的時候。非常小，或許還在搖籃裡的時候。  \n\n朵：所以它一直都在。可是潛意識可以幫忙減輕任何外來物體造成的問題？（是的。）因為我們對它可是沒辦法。如果它在裡面，就不能去動它。\
    \  \n貝：我想可以做一些調節，協助中和它引發的效應。  \n\n朵：這是她身體裡唯一的外來物嗎？  \n貝：我不確定。腦部可能有東西。一個監控裝置。我想是在右邊。（她把手放在頭頂的右邊）可能是靠後面。\
    \  \n\n朵：那是什麼裝置？  \n貝：我想是監控腦波的活動。  \n\n朵：它是什麼樣子？  \n貝：我不知道晶片是什麼樣子，但我有個感覺，它一定就像電腦裡用的晶片。某個微小的東西。也許不像紙那麼薄，可能有一些些厚度，不過非常非常小。\
    \  \n\n朵：這個東西有沒有造成問題？  \n貝：不是會引起注意的問題。我認為意識到這些东西的存在所產生的问题,比物體本身還多。  \n\n朵：那麼你認為她最好不要知道嗎？\
    \  \n貝:不是，當我說「意識」的時候，我不一定是表示有意識的覺察。她其實覺察到這個東西的存在，而且是一直覺察到。因為這樣而引發的情緒焦慮就足以對她造成問題。\
    \  \n\n朵：我明白了。我們不想讓她有任何不適。主要是她能快樂和健康。  \n貝:嗯，我不認為可以忽略它（指體內的東西）。  \n\n朵：沒錯。但或許我們可以幫忙減輕它造成的問題或副作用。如果你可以用任何方式協助她，我會很感謝。"
  mdcn: "## 第五章  \n### 埋藏的記憶  \n\n**監護人 THE CUSTODIANS ▲ 224**  \n\n有三或四呎高（譯注：約90-120公分）。\
    \  \n\n朵：光是從哪裡來的？  \n貝：從那個凸出的圓邊邊。它像是和什麼東西一起的，然後那個東西會發光。  \n\n朵：接下來呢？發生了什麼事？  \n\
    貝：我們升到半空中，然後飛走了。  \n\n朵：裡面是什麼樣子？  \n貝：小小的，有點擠。我進去後就坐下，然後我們起飛。椅子很像躺椅。我說的不是庭院椅，我的意思是像牙醫的躺椅或是那種你可以往後靠的椅子。\
    \  \n\n朵：好，那個外星人跟你在一起嗎？  \n貝：（驚訝）我想他太高了，沒辦法在裡面，除非他………我想在房間裡的是那個生命的本體（essence）。\
    \  \n\n**朵**：你認為這會是他纖細微弱的原因嗎？  \n貝：嗯。我想他是把自己的一部份投射到我房裡，但他比較沉重的身軀是留在太空船。這裡有兩到三個外星人跟我在一起。他們很小。\
    \  \n\n朵：他們也坐著嗎？  \n貝：不是。他們走來走去。這裡沒有多少空間。太空船比籬笆矮，籬笆有六呎高。我想他們有足夠的空間可以走動。他們不像那個投影那麼高。他們比較矮。我必須坐下來。嗯，我想我可以站起來，可是只能站在中間。（貝芙莉是個嬌小的女人，只有五呎出頭）他們好似不必坐著。他們在做事。你知道，走來走去，按按鈕和看著螢幕。\
    \  \n\n朵：那些東西在哪裡？  \n貝：在牆裡面。就像一個小駕駛座艙。  \n\n朵：螢幕上有什麼東西嗎？  \n貝：地圖和圖表。我不是看得很清楚，不過我知道上面就是這些東西。我的意思是，我瞥了一眼。\
    \  \n\n朵：你是說像某種陸地的地圖……  \n貝：天空的圖。我猜它就像是飛機上會有的圖，你知道，飛行圖。飛機一定有一再使用的路線圖，所以在螢幕上的是去別處的路線。很像圖表。可能是某種雷達。它像座標紙，有直線和水平線。\
    \  \n\n有些螢幕上沒有這個，只有線條……相互交錯，然後往不同方向延伸。我看不懂。螢幕是白色的。  \n的。線條全都是同樣的深色。也許那是個電腦系統。螢幕看起來就是這樣，有點像電腦螢幕。\
    \  \n\n所有的東西都內建在牆壁裡。牆壁是圓形的。  \n\n朵：好。那些小小人是什麼模樣？  \n貝：他們是灰色的，很矮，只有三到四呎高，皮膚坑坑巴巴。\
    \  \n\n朵：坑坑巴巴？什麼意思？  \n貝：凹凸不平。他們的外表不光滑也不柔軟。嗯，他們可能是柔軟的，但皮膚很粗。像電影裡的 ET，不過沒那麼極端。看起來粗糙，有可能不粗。事實上，當你實際去碰的時候，我認為可不粗；但看起來有又厚又粗的感覺。\
    \  \n\n朵：你看到他們的臉嗎？  \n貝：可以。他們的臉小小的，沒有頭髮。我想他們沒有任何毛髮，或者就算有，也在比較隱密的地方。他們沒有像我們一樣往外凸出的耳朵，但有類似我們的眼睛。不是大的黑眼睛。他們有眼白，也有鼻子和嘴巴。\
    \  \n\n朵：像你的一樣？  \n貝：不，他們的臉很粗，像是很老很老的人，有著好皺好皺的臉，臉上有數不清的皺紋。他們的頭很小，頭頂又比下巴要大，下巴幾乎是縮成了尖尖的。他們的臉看來有點內縮。像北京狗那種扁扁的臉。\
    \  \n\n朵：我懂你的意思。他們在按按鈕時，你看得到他們的手嗎？（嗯。）他們有幾根手指？  \n貝：他們有五根手指。  \n\n朵：五根？四根手指和一根大拇指？\
    \  \n朵：從你的位置你看得到他們的腳嗎？（嗯。）那是什麼樣子？  \n貝：很像有蹼。他們有五根腳趾。跟身體比起來，他們的腳很大。腳趾的部份很寬，腳趾跟腳趾中間有蹼。不過不像鴨子的蹼。沒那麼多。他們的腳就像是……比方說吧，人腳和有蹼的鴨腳的混種。\
    \  \n\n《星辰傳承》也報告過這種腳。還有一種類似的腳有著連指手套般的外形，但皮膚底下的骨頭像山脈一樣隆隆起。  \n\n朵：你有沒有看到任何可以區分性別的方式？\
    \  \n貝：沒有。我想他們是信差或工人。我不認為他們是機器人。如果是的話，那一定是非常精密的機器人。我想他們是活的。  \n\n朵：他們有用任何方式和你溝通嗎？（沒有。）你坐在椅子上，之後又發生了什麼事？\
    \  \n貝：喔，我們起飛了。飛出院子，往左邊飛出去。  \n\n朵：你可以感覺到移動嗎？  \n貝：不怎麼感覺到。我感覺升起來，離開了地面。但之後就不怎麼……沒有任何移動的感覺。可以感覺到轉彎，但只要是往上或一直往同一個方向，直直往前或後退或什麼的，就感覺不到動作。\
    \  \n\n朵：你有沒有聽到什麼聲音？  \n貝：沒有。我們沒有飛很久。我們朝天空另一艘太空船飛去。  \n\n朵：有沒有窗戶可以看到外面？  \n貝：有，可是我是進去到了裡面以後才知道。那裡有些像小舷窗的窗戶。全都在圓頂周圍凸出的地方。我猜光也是從那裡來的。在那個小平台似的東西上面，我想下面也有。\
    \  \n\n朵：可是飛行時你無法透過窗戶看到東西？  \n貝：那時我是面對室內的中間。不，我看不到東西。我像是半睡半醒著。  \n\n朵：然後你說他們去了一艘較大的太空船？\
    \  \n貝：進去了較大的船，從旁邊進去的。旁邊好像有個開口，然後它就進去裡面了。接著圓頂打開。（努力做出正確描述）頂部打開了，或是開一部份。可能是全開。我不確定。如果不是圓頂全開就是一半往後打開，打開的部份就暴露在外面。然後我就出去（小太空船），沿走廊走。\
    \  \n\n朵：他們和你一起走嗎？  \n貝：嗯。走廊很光滑。很流線型。淺色的牆。我不認為是白色，大概是米白色。帶點淺色金屬或布料質感。我不知道地板是怎樣。它有點像是機場的跑道。像隧道，但很大。他們把我放在房間。那是個小房間，他們讓我待在那裡。那裡沒有桌子。這是為了方便他們進來看我。\
    \  \n\n朵：誰？那些小小人？  \n貝：不是，不是同樣的人。他們去找他們的……我猜是上司。然後那些人進來。我想這像是心理檢查。沒有人說話。他們只是圍著我，檢查我的腦袋。他們像昆蟲。我猜跟我小時候看到的是同一種，但他們不是真的昆蟲。他們的四肢非常有彈性，很能彎，很瘦。他們大概比坑坑巴巴的小人高個一呎左右。可能跟我差不多，差不多高。他們是灰白色的，所以比粗粗的小小人的顏色要淺。他們是……你剛剛是怎麼稱他們的？他們不是那麼實體。很飄渺纖細。坑坑巴巴的小人並不飄渺。他們凹凸不平。\
    \  \n\n朵：你說在你房間裡的那個很飄渺。  \n貝：對，跟這些一樣。也許他們是透過這些坑坑巴巴小小人把自己投射出去。  \n\n朵：你說他們有很瘦的附肢。他們有手指或手嗎？\
    \  \n貝：有啊。有一根大拇指，三根手指。  \n\n朵：有沒有穿衣服？  \n貝：沒有。在我看來，衣服會比他們還重。衣服會比他們的身體更重，更紮實。如果他們真的有穿衣服，那也像是他們身體的一部份了。\
    \  \n\n朵：你的意思是，那不是他們能脫下來的東西？  \n貝：嗯，也許他們可以脫下來，但是穿上後，看起來就是身體的一部份。我不知道他們是不是天生就是這個樣子，他們沒有穿任何衣服。或者我看到的外觀的一部份就是衣服，而實際上是可以移除的，不過看起來和他們的樣子並沒有不一樣。並沒有衣服和皮膚或肉還是什麼的分界。其他案例也報告過這種情況。有些外星生物的皮膚很細緻，容易受傷，所以從一出生便被一直被包覆在一種薄膜似的物質裡，以保護皮膚。\
    \  \n\n朵：你之前說，因為房間很暗，你一直看不清楚他們到底有多少附肢。現在你看到了嗎？  \n貝：就只有兩隻像手臂和兩隻像腿的附肢。（手勢）腿用很筆直的角度往上彎，腳底的部份向下，可是看起來很像底下還有其他的腿。手臂也一樣。它們很瘦，非常瘦，幾乎可以對折。（動作）\
    \  \n\n朵：那裡有幾個？  \n貝：一定有五個左右。（停頓）四個。  \n\n朵：四個？然後你感覺和這四個之間都有股拉力。  \n貝：嗯。我不是一直感覺到。我是先從一邊感覺到，然後再另一邊。我想道是一直都在進行。我們全都是站著的。他們像是因為我在轉動，所以會特別察覺到某個方向。我想道一直都在進行。我們全都是站著的。他們像是因為我在轉動，所以會特別察覺到某個方向。\
    \  \n\n朵：嗯。我不是一直感覺到。我是先從一邊感覺到，然後再另一邊。我想道是一直都在進行。  \n貝：對，這整件事事只是讓我不自在。不是痛苦，可是他們在做通常不會做的事，所以我會覺得不安。\
    \  \n\n朵：可是你不覺得困擾，是嗎？  \n貝：對，這整件事事只是讓我不自在。不是痛苦，可是他們在做通常不會做的事，所以我會覺得不安。  \n\n朵：有點討厭？\
    \  \n貝：不只這樣。這事會讓我很害怕。我像是被他們擺佈。就像你在醫院生小孩的時候，他們會告訴你要做些什麼。你在生小孩的過程中，你只能生，不能有異議。我媽總是跟我說，生小孩的時候，你是任人宰割。\
    \  \n\n朵：嗯。你什麼也做不了。  \n貝：什麼也做不了。就是不曉得他們要什麼。我不知道為什麼他們要一直這麼做。我甚至不知道他們從這裡面可以得到什麼。我的腦袋沒有收到什麼東西啊。\
    \  \n\n朵：噢，是啊，我小時候就發生過。但他們大多時候是在檢查我的身體，都是身體方面的事。或許他們已經學得夠多，或者這只是一次不一樣的檢查。誰知道呢？他們像是能夠進到我的腦袋，把資料拿出來，或就是到處看看，瞧瞧裡面有什麼。而我卻一點辦法都沒有。\
    \  \n\n朵：可是你在生理或心理上並不覺得困擾，真的嗎？  \n貝：生理上，我不覺得困擾。心理上，嗯，那就像是沒有隱私。身體像是被扒光光，但心理上更糟。你完全被攤在檯面上。然後他們看的還不僅是現在。他們進到你的腦袋後什麼都看。過去都在你的腦裡。沒有半點秘密。\
    \  \n\n朵：你是指你全部的記憶？  \n貝：嗯。還有我知道的事，我的知識。  \n\n朵：我納悶他們為什麼對你的記憶有興趣？  \n貝：我不知道。我只知道一輩子的故事都在我的腦袋裡。我是知道故事的的人。他們要看的不是你的智力。他們檢視的是我存在的本質。所以不只是今天的事。當檢視心靈時，他們檢視的是十年前、十五年前或上上週。隨他們選。他們找他們想看的，不然就到處走走，看看別的。他們看你的資料和知識，這些都儲存在你的心靈裡。還有感受。\
    \  \n\n朵：你的情緒嗎？  \n貝：我的情緒，是啊，這大概比別的都更重要。為什麼他們會在意我十歲生日時做了什麼？他們事實上已經看過一切。有可能主要是想知道大腦是怎麼運作的，心靈是怎麼運作的，還有情緒、情感是怎麼運作的。\
    \  \n\n**第五章 埋藏的记忆 ▲233**  \n朵：他们得到资讯后要做什麽？  \n贝：我猜是放进他们自己的脑袋裡。我不知道。  \n\n朵：没有什麽机器、工具或其他东西吗？\
    \  \n贝:没有。这都是透过心灵感应进行。但我几乎可以看到光波在我和他们的脑袋之间来来回回。  \n\n朵：有点像电流?(是的。)你有没有试著和他们沟通看看?问他们为什麽这麽做?\
    \  \n贝:这次没有。我不记得我是不是……如果我不曾问过,那就很蠢。但如果问了，我想我并没得到过回答,所以我放弃了。  \n\n朵：我想你应该会很好奇。\
    \  \n贝:哦,我是很好奇。可是他们没有理由沟通,因为他们已经知道了啊。  \n\n朵：可是你不知道。  \n贝:他们知道我好奇。他们知道我怀疑。他们知道我不想他们做这个,但他们还是做了。所以问也没有用。他们如果想要我知道就会让我知道。就像是没必要做任何言语上的表达。一切都在我的脑袋裡。他们知道我脑裡有什麽。他们要我知道的事就会让我知道，不然就不会。我问也没有用。\
    \  \n\n朵：除了满足你自己的好奇心以外。  \n贝:可是他们不会回答，所以也满足不了。他们想知道我们的脑袋裡都在进行些什麽。原因的话,我就不知道了……我猜是因为我们是不同的种族。如果我们到了另一个星球,不论那裡是什麽生命，我們可能也會對他們做同樣的事。\
    \  \n\n朵：有可能。  \n貝：我們在這裡就做了啊。我們拿動物做實驗。  \n\n朵：好。這個過程很久嗎？  \n貝：大概十分鐘吧。  \n\n朵：他們只做了這件事嗎？就只有這個交流……不是真的有交流，只是一種連結的方式。（是啊。）接下來呢？\
    \  \n貝：他們離開房間。然而那三個帶我下船的人過來找我，我們回到小船上。然後就飛回去了。  \n\n朵：你沒有看到那艘較大的船的其它部份？  \n貝：沒有。我只知道一定比我來的那艘要大許多，因為整個小船都進去了，看起來也只是佔一小部份空間而已。你知道我們人類曾談論在外太空建造一個可以殖民的基地？我覺得那是類似的東西，就算沒那麼大，也很接近了。我不知道為什麼我這麼想，因為我並沒有看到其它部份。就只是個感覺。\
    \  \n\n朵：那麼他們帶你回來之後呢？  \n貝：我進到小太空船。它對我們來說像是個短程的交通工具還是直升機什麼的。我們乘著它離開，但我不記得回到地面或我的床上的部份了。\
    \  \n\n朵：你不知道它是不是又在後院降落？  \n貝：大概是，不過我沒看到。我不記得了。事實上，我想我完全不記得了。接下來就是早上了。我認為他們有能力可以關閉我的大腦功能。或是打開，讓它曝光，就像把你的肚子剖開一樣，除了不是真的切開來。\
    \  \n\n朵：但你沒有受到任何傷害。  \n貝：沒有。身體上沒有。沒有地方會痛。我的意思是，你的腦袋沒有真被打開。  \n\n朵：隔天你有沒有什麼後遺症？\
    \  \n貝：隔天我還記得房裡有個人影。我記得自己在想外面有艘飛碟在等我，但其他的都不記得了。我納問自己是不是不在作夢。我不記得有任何身體上的後遺症，不過我想他們在進行的時候，我的頭在痛。\
    \  \n\n朵：檢視這個體驗和談一談是好的。這樣我們就能讓它過去。  \n貝：也許吧。但這已經是過去的事了。所以也沒什麼要特別著墨或處理的。  \n\n\
    朵：沒錯。重要的是，這件事沒有令你困擾。對嗎？  \n貝：我想有。我想它到現在仍然困擾我。還有它對我的腦袋做的事。就好像我必須生活在謊言裡。我的意思是，人總不能一天二十四小時都在說謊。所以我認為我乾脆就把它忘了、把它封鎖住。而這點，我認為造成了心理上的傷害。\
    \  \n\n朵：你說活在謊言是什麼意思？  \n貝：哦，你必須一天二十四小時表現得好像這件事不存在，沒有發生過。我的意思是，沒有人認為它存在，沒有別的人談它。如果你知道這件事是真的，那麼你就得活在謊言裡，不然不能融入這個世界。\
    \  \n\n朵：因為大家不會相信你？  \n貝：當然不會相信我啦。  \n\n朵：但你自己也有很多地方不記得了，不是嗎？  \n貝：對。不過那就是我的意思，要一天二十四小時都活在謊言太難了，尤其在你年輕的時候。所以我想心靈索性就把它給遺忘了。如果這（指遺忘）不是我自己的心智這樣做的。我不知道。我想他們做了很多事。但我想就心理上來説，我們自己的心智也會為了能跟它共存而把它掩蓋。就像是全面的忽視。全面的忽略。\
    \  \n\n朵：我很好奇他們怎麼知道要去哪裡找你？  \n貝：他們向來都曉得。我不知道是不是他們對我做了什麼，還是他們用心靈就可以。如果是用心靈力量，他們只要掃描，我的位置就會出現。我的意思是，有可能是這樣。我真的不知道他們是怎麼知道的。我只知道他們似乎無所不知，嗯⋯⋯雖然我這麼説，可是顯然他們並不知道所有的事。如果他們什麼都知道，就不會來調查了。但他們懂得的事情比我多好多，感覺他們像是什麼都知道。\
    \  \n\n我準備讓她前往另一個場景，但她突然打斷我。「或許我跟什麼事情有關，他們做這些事的其他对象也是。他们也对别人这么做。」  \n朵：你这么认为？\
    \  \n贝：噢，是啊。我看过他们和其他人在太空船上，就跟他们抓我去一样。我不知道这一切是怎么回事，但我知道上面有别的人类。  \n\n朵：这是什么时候发生的事？\
    \  \n贝:发生不只一次。我知道他们也对其他人这么做。我刚刚说到他们是怎麽找到我们的。你看过那些大家贴在墙上的世界地图？他们会在特定地方用红色、紫色或别的颜色的点来标示？我想我们身上有个什麽东西可能会发出喔喔声还是闪光，他们知道哪些是他们一直在检查的人。我不知道是不是有某个东西，还是说他们一旦检查过我们，我们就会变成那样，变成会发出某种光或是声音讯号到某个地方，然后电脑一扫描，我们就会被找到，就跟作战的导弹会找到目标一样。我的意思是有某个雷达，有种你可以找到东西的东西。我们（指人类）也做得到。所以有某种类东西可以帮助他们追踪检验过的人。我们大概被某种方式留下了标记，我猜就像我们替鸽子做记号一样。\
    \  \n\n朵：好。我们可以找出答案。我想要跟你的潜意识说话。贝芙莉的身体有没有被某种方式做了标记？他们是否对她的身体做了什么，以便能再找到她？  \n\
    贝：是的。我想那是在她的鼻子里。我想是在这裡的中間。（她指著鼻樑）在脸上，在鼻子里。  \n\n朵：鼻樑？（對。）那裡有什麼？  \n貝：我不知道那是像蜜蜂一樣圓圓的，還是一個小正方形，像紙一樣的東西。不過那不是紙，比紙更有份量。它不知怎地就被放在裡面。\
    \  \n\n朵：它有什麼功能？  \n貝：它發出某種訊號。  \n\n朵：這有困擾到她嗎？  \n貝：有，它造成了某種頭部問題，頭痛、鼻竇問題。我想任何時候只要有外來的東西在頭部或身體其他部位就會造成些微問題。不管它是什麼，對我們來說就是個外來物。它不是要造成任何問題，但我想還是造成了。就像你戴隱形眼鏡或是有東西跑進眼睛的時候一樣。\
    \  \n\n朵：你的意思是它的本意不是要引起問題，但因為它不屬於人體，所以可能會造成像副作用一樣的些微問題。  \n貝：對。至於會有多困擾，就要看你個人的健康狀況。\
    \  \n\n朵：它是什麼時候被放在那裡的？  \n貝：我想是很多年前，年紀很小的時候。非常小，或許還在搖籃裡的時候。  \n\n朵：所以它一直都在。可是潛意識可以幫忙減輕任何外來物體造成的問題？（是的。）因為我們對它可是沒辦法。如果它在裡面，就不能去動它。\
    \  \n貝：我想可以做一些調節，協助中和它引發的效應。  \n\n朵：這是她身體裡唯一的外來物嗎？  \n貝：我不確定。腦部可能有東西。一個監控裝置。我想是在右邊。（她把手放在頭頂的右邊）可能是靠後面。\
    \  \n\n朵：那是什麼裝置？  \n貝：我想是監控腦波的活動。  \n\n朵：它是什麼樣子？  \n貝：我不知道晶片是什麼樣子，但我有個感覺，它一定就像電腦裡用的晶片。某個微小的東西。也許不像紙那麼薄，可能有一些些厚度，不過非常非常小。\
    \  \n\n朵：這個東西有沒有造成問題？  \n貝：不是會引起注意的問題。我認為意識到這些东西的存在所產生的问题,比物體本身還多。  \n\n朵：那麼你認為她最好不要知道嗎？\
    \  \n貝:不是，當我說「意識」的時候，我不一定是表示有意識的覺察。她其實覺察到這個東西的存在，而且是一直覺察到。因為這樣而引發的情緒焦慮就足以對她造成問題。\
