  md: '脅要毀了他們整個星球，我們勢必會做點什麼來預防，因為它造成的衝擊會影響太陽系，甚至鄰近的星球和銀河系。這會造成太大的破壞，我們不能坐視不管。在那樣的時刻，我想我們終究會打破不干預的鐵律，讓物種知道我們的存在。我們會告訴他們，我們是互古以來他們的創造者、監護人和保護者。他們會接受我們嗎？會相信我們嗎？這會帶來任何改變嗎？


    這整個情境聽起來像是科幻小說，但我們如何確知這不會真的發生？我們如何確知這種情境不僅已經成真，而且不只是在地球，還在宇宙間無數可能的星球上演？只要還有好奇心，人類就會去尋找真相。只要人類持續搜尋，就沒有什麼能限制他的成就。


    一直以來，宇宙始終是人類的家。好奇心是我們從創造者和監護者承繼到的重要特性，它也一定會是我們日後將傳給尚未出生的後代的重要特質——不論他們是在這個星球或是別處。


    知識若無法分享便毫無價值。


