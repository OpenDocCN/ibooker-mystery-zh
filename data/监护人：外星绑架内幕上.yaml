    現在他放鬆多了，也同意接受催眠。我和他約好下週進行，看是否能獲得更多細節。


    催眠下出現的新資料並不多。艾迪對那件事的記憶很正確。我決定問他的潛意識，取得他的意識沒有資料。如果個案的出神狀態夠深，我們就能做到，而且通常會有出乎意料的答案。我想知道是不是有什麼艾迪的意識沒有察覺到的事。他的回答是他被灌注了某些東西。他們給他片片斷斷的資訊，也給了他指引。他不斷提到灌注，而當我問那是什麼意思時，他說了一個我不懂的字，我只能用拼音的方式把它寫下來：converging。這個字對我沒有任何意義，艾迪也說他不知道它的'
