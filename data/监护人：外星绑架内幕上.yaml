    朵：這是怎麼做到的？

    布：和她看到那個存在體的不同外表一樣，他改變了她對所看到事物的認知。他們對任何人類都能這麼做。他們只是改變人類對所見事物的認知。如果有人過來，他們不會看到一輛卡車停在路中間，然後有人在對駕駛說話。他們只會看到一條開放且空蕩蕩的馬路。他們只會繼續開他們的車。

    朵：原來如此。他們這樣安排是不讓任何人在這個過程中受到傷害。

