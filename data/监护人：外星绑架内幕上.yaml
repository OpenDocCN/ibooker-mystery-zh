    \n朵：你能告訴我他真正的模樣嗎？\n\n布：他的頭髮是白色的，在飄動，頭髮長度比布蘭達記得的還長，髮線比較往後。他有非常尖的美\n\n朵：不過布蘭達對他的認知是像像年輕男子那種直髮線。他確實有雙大手，只是很瘦，然後手指有多出來的關節。在我指尖的地方，他又多了個中間的關節，所以他他的手指和我們彎曲的\n\
    \n朵：他有幾根手指？\n\n布：四根，但他有雙拇指。\n\n朵：（這點令人驚訝）雙拇指？你的意思是？\n\n布：兩根大姆指。他的手比我們的要長，因為有比較多的骨頭。他在正常的位置上有根姆指，在它\n\
    \n获取更多好书，请加微信：1364192604 或 QQ:715104687\n\n朵：所以他有兩根大拇指和四根手指，一共有六根。\n布：對，一手各六根。指甲比我們窄長。角質層（指甲根部）是很明顯的\
    \ U 型，不像我們的是方方的。\n朵：他的臉也長得不一樣嗎？\n布：比布蘭達記得的還要粗獷。他意識到布蘭達可能會因為他的長相而害怕。他的眼睛很大，又因為散發的力量而耀眼，上面還有濃密的眉毛。他的眼睛事實上是全白的，看不到虹膜和瞳孔。\n\
    朵：我看過視障者的眼睛像那個樣子。你說的是像那樣嗎？\n布：對。除了他的白色部份會發光，因為那是他所散發的力量。\n朵：其他的五官呢？\n布：其他的五官看起來很正常。顴骨很高，臉頰凹陷，下巴的輪廓很明顯，不過耳朵很難說，因為被頭髮蓋住了。\n\
    朵：他的皮膚真的是白色的嗎？\n布：我想不是。因為太亮了，所以很難分辨出真正的膚色。從他的頭髮和皮膚，還有眼睛和皮膚之間的對比來看，膚色似乎較深，可是因為在發光，看起來比實際上白。\n\
