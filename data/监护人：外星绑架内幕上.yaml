    伊迪絲是一九七七年十一月我在英格蘭南部處理的個案之一。從一開始的催眠前談話，我知道了她近來曾受貪食症之苦。雖然她堅持那已經不是問題，但她的醫生很擔心她的血球數量不正常。我懷疑伊迪絲有心理問題，聽著她解釋自我誘發的貪食症起因時，我的懷疑又多了幾分。她四十歲

    （不過看起來不到這個年紀），孩子都已成年。她前不久剛和一個二十幾歲的年輕人結婚。她的親戚似乎是她許多問題的根本原因，包括貪食症在內。他們痛斥和批判她：「他到底是看上你這種老女人哪一點？」她原本的自尊問題已反映在她無法長久做一個工作，現在親戚的評語對情況更是毫無助益，於是她變得貪食，希望能讓自己更有魅力。我個人看不出這麼做有什麼意義，畢竟那個年輕人愛的是原本的她。為什麼她會覺得需要改變？我懷疑她需要超過我所能提供的心理諮商，尤其是我能給她的時間有限。我把焦點放在她相信自己曾經有過的幽浮和外星人經驗上。不過在進行這類工作時，你必須把個案的整個個人格都納入考量。


    她說她作過很怪的夢，在她看來，若不是跟外星人就是和靈魂有關。她的家人對此完全幫不上忙，他們對超自然現象一點也不瞭解，又不斷批評伊迪絲對這方面的興趣。


    她報告的主要體驗發生在去年（一九九七）。當時她一覺醒來，發現房裡有個人影正朝她的床鋪靠近。然後她就什麼都不記得了，只記得後來的夢。她夢到自己躺在桌上，周圍環繞著很多人。在那夢境般的恍惚，她聽到他們在討論她，說出了個錯和流了很多血之類的話。她因此確定他們對她做了什麼，還抽了她的血，才導致她現在的身體狀況。她要我在催眠中探索他們抽血的原因，還有他們要她的血做什麼。她相信如果這是真實的經歷，那必然是負面的事。


    療程剛開始時，我並不知道是否會有什麼結果，因為我真的相信這個女子的問題是由較深層的心理因素所造成，跟外星人的關聯只是一個可怪罪於他人的藉口。若真是如此，那麼她的潛意識將會告訴我。


    ### 第四章 隱藏於夢境的資訊 ▲


    167


    當她進入深度的出神狀態，我引導她回到事發當晚她的公寓裡。（她很確定日期，因為她有寫日記的習慣，她把這事寫了下來。）由於房間很冷，她醒了過來，然後憂心地說：「這裡有個東西。它在看我。它就在我的床旁邊。」


    她描述一個寬約九吋（約 23 公分）的物體，發著橘色和黃色的光，物體的中間有個大水晶或鑽石。她驚惶地從棉被裡往外窺看，注意到還有其他的生物也進到房裡。其中一個很高，有著類似人類的蒼白膚色，旁邊伴隨著三個像是白色發光球體的小生物。他們不怕他們，只覺得好玩。當他們用冰冷的手指碰觸她的手臂和臉時，她覺得他們很可愛。高大的那位拿著那個奇怪的發光裝置，對著她前額中央發出一道光。他對她解釋，這不會傷害她，只是會更容易把她從家裡傳輸出去。她也被指示，當有道光束投射下來包覆她時，她必須躺著不動。接著她便從床上浮了起來，他們不知怎地就在外面了，而且在往上飄浮。這時伊迪絲開始顯示呼吸困難，我必須移除她的生理感受。下一刻她就到了一艘巨大的太空船裡，她並不記得是怎麼進去的。她被帶到一個很亮的房間，光似乎是從牆壁和天花板散發出來。那個房間裡面有更多生物，不過她說跟陪伴她的那些白色的柔軟小生物不一樣。他們比較醜，但不是真的醜，只是不一樣。他們比較矮胖，紫褐色的，而且頭更大。小小亮亮的生物看起來比較軟，這些生物的皮膚看起來則比較粗糙。她因為躺在桌上不能動，所以無法碰觸他們，也不知道實際上摸起來粗不粗。


    他們接著把一個機器帶到桌邊。當她看到機器發出來的光進入自己左半邊的肋骨間時，她很擔憂地喊：「會痛……不過……不痛。」


    ▲ 168


    她納悶他們為什麼要從她的肋骨而不是嘴進去。他解釋，從旁邊進入比較容易。當她在心裡聽到那些外星生物說出了錯時，氣氛突然變得焦慮。他們很擔心，因為她的胃出了很多血。需要修復的地方比原先估計的多。她已經失了很多血，身體越來越虛弱。她聽到：「你千萬不要傷害你的身體。它很特別。」然後他們用光替她止血。


    我很好奇她為什麼沒有注意到自己的內出血。他們說她終究會發現，只是到時可能會更難修復。他們用某個「像針，但不是針」的東西，對她的手臂注射一種白色液體，還解釋「他們放進比較好的血細胞來抵消損害。某個能改善血細胞運作的東西。讓血液含有較多的氧。」


    在他們準備離開太空船前，高大的那位對他說他會再來看她並為她做檢查。她在他的身邊不僅感到安心，還有種彼此原本就認識的感覺。他說她在轉生到這一世之前，他們曾經在一起。還有，他已經很老、很老了。


    下一瞬間她便發現自己躺在家裡的床上。滿心的疑問則在墜入夢鄉後很快消散。到了早上，除了那個暗示他們抽血，傷害她的夢之外，她什麼都不記得。現在事情很明顯，由於貪食症導致的不斷嘔吐，她的身體受到了損害，而他們只是想要幫助她。


    她因為血球數很低，醫生很擔心她，也不理解她的身體怎麼還能運作。醫生說她應該會失去意識才對。她的潛意識告訴我，不需要去擔心低得不正常的血球數。這對現在的她來說是正常的，她的身體可以這麼運作下去，不會有問題。「血球數量沒有意義。只是低總數而已。低數量通常是氧


    ▲ 170


    的指標。但她的氧供應量卻多了許多，雖然她的血球數量小。」胃部的傷害已經被修復，醫生的檢驗將不會找出什麼毛病。

    這件事大概會被當成一個謎，但只要伊迪絲的身體沒有問題，最好也就別去管它。

    這個案例顯示出意識會如何解讀令人不安的夢並做出錯誤結論，以及深度出神催眠下對情況的正確理解。伊迪絲醒來後，我們做了討論，她能瞭解她對夢的記憶和認知是錯誤的。太空船上的外星生物並沒有傷害她，反而修復了她因虛榮和自我懷疑所造成的傷害。


    # 第五章 埋藏的记忆


    就如梦有时会藏有潜意识深处的真正体验，记忆，也同样会被时间所扭曲。小时候，我们会以一种比较简单和天真的方式去认知事物。长大后，我们对童年时期情感受创的事件却有了不同的看法。假使记得一件事令人痛苦，那么那个记忆往往会被掩埋。我们要直到透过催眠找回记忆，并再次经历那个事件时，才发现事情往往不是那么具威胁性。而从大人的眼光去看，一切都明瞭了。


    我曾有些个案想找回遗忘的事件，他们认为自己之所以不记得或记忆被压抑，一定是因为那是可怕的事。然而，透过催眠，我们往往发现事情的解释很简单。举例来说，那可能只是一个惹火父母的错误行为或淘气举动。压抑对事件的意思也不意味这其中涉及了任何肢体惩罚。原因通常只是父母生气了。此外，不知怎地，现在有个很普遍的解释：如果有某事一直被压抑，那就一定跟幽浮和外星人脱不了关系。然而，我发现十个案例有九个和外星人毫无关联。这是为什么我告诉调查员，永远要从简单，而非复杂的解释开始探讨。换句话说，在考虑诡异的因素之前，先找最简单、合逻辑的解释。


    透过最深层的催眠，真相总会浮现。事实无法被隐藏，除非说谎或捏造是个案生活裡正常的一部份了。


    在这种情况下，个案就可能说谎或幻想，因为那是他们的天性。但这类案例很少见，他们的故事

    也非牢不可破。如果他們是在幻想，故事不會一直維持不變，反而會在複述時出現變動。他們會加新油添些醋，給故事更多的渲染。此外，故事也會跟我已經發現的模式不合。


    當然，我有可能尚未完全掌握到構成一個模式的所有要素，這是永遠無法排除的可能性。未來可能會有某人帶著故事出現，呈現出我尚未探索過的全然不同面向。我必須對這個可能性保持開放，不要自動關上了所有的門。然而話又說回來，即使有新的思考方式，依然會有符合模式的元素。


    調查員的工作顯然並不容易，尤其又是和治療結合的時候。


    以下幾個案例之所以浮現，就是因為我對所有的可能性保持開放的態度。


    法蘭是個四十幾歲的離婚婦女，一頭鮮豔的紅髮是她最明顯的特徵。她對自己在一間很有名望的事務所擔任執行長感到滿意。她在一九八八年的時候來找我，想透過催眠探索一些特別鮮明的記憶。她在密西西比州的農場長大，但從未聽聞那類鄉村地區的幽浮事件。事情就在她沒有接觸過任何類型的神秘或超自然書籍和主題的情況下發生，留下了模糊且難以理解的記憶。


    法蘭還記得小時候曾有幾次看到自家上方出現奇怪的光，長大後也曾有光跟過她的車子。由於這些事情沒有合理的解釋，她推測它們可能和幽浮有關。奇怪的是，事發當時她毫不恐懼，但和她在一起的人都嚇壞了。她沒有其他同樣性質的意識記憶，於是我們決定針對這些目擊經歷去探索。'
