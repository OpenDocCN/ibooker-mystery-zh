    百次相同檢查、人滿為患的醫院的那種冷淡和漠然態度相提並論。經過了一段時間之後，檢驗變得固定和單調，他們覺得沒有需要解釋，也沒有足夠的時間和興趣去試著跟每一個人溝通。在這時候，如果有某個臨時員工花時間安撫和安慰，他的善意在其他工作人員的機械化和明顯的忽略態度中，就會顯得特別突出，並被銘記在心。我相信外星人的態度不見得是忽視我們的個別人格，但有可能跟醫院一樣，是因為過多的工作量和窮於應付的例行公事的緣故。


    許多研究者很努力想要找出檢測背後原因。現在已有幾個不同的概念和解釋被提出來，未來還會有更多出現。每個涉入這個不尋常領域的人都會依據各自的研究、生活體驗、心態和期望，架構出自己對此的理論。其中有许多人認為，外星人正在進行基因操作或基因工程，目的為何則各有不同的看法。有些人認為人類是高等、幾近完美的種族，而外星人可能是來自不完美或瀕臨死亡的種族。或許他們不知怎地失去了繁衍能力，因此需要人類的精子和卵子，幫助他們的種族免於滅絕。他們希望透過不同種族間的交配來達成這個目的，就算不是經由肉體，也會透過臨床的科學實驗製造出人類與外星人的混種。由於這個概念在人類眼中非常恐怖，我們也會認為具有這種意圖的外星人很可怕。


    我則有不同的理論。我相信外星人這麼做的目的是為了地球人，而不是他們自己。當然，我們已經看到好幾種不同的外星人和基因操作有關，其中可能有些比較負面的外星人是為了己之私。但我相信，這些幽浮群體裡的叛離者或持不同意見者是少數。


    就像我在《地球守護者》說明的，早在萬古以前，第一個人類出現在地球之前，就有一個在較'
