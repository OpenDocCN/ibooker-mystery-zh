    貝：（停頓）我不知道。我只是在森林裡走著，然後……我想它是粉紅色的。（她開始害怕）像是個防護罩。（她的聲音顫抖著，眼睛泛起淚水。）就在我前面。（現在她像個小孩般毫不掩飾地大哭和啜泣）它讓我覺得我不能動（明顯沮喪）。


