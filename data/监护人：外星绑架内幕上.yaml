    蘇：請等一下。


    朵：好。但記得我們要保護她。

    蘇：是的。沒有傷害。沒有傷害。（更多深沉的吐氣，然後是一個機械化的聲音。）她必須暫時移除自己，好讓這個傳送能夠更完整。她在阻擋。我正在移除她的意識阻礙。她不習慣這類的經驗。


    朵：這是很自然的。所以她一開始必須慢慢來。

    蘇：我正在幫她。這會花點時間，但是個開始。我可以透過她整合一部份，但必須要更完整才能有最正確的資料，不能有她的思想來合併和改變資料。你瞭解嗎？

    朵：瞭解。所以我們才要小心，而且要慢慢來，這樣會更有效益。我在扮演母雞的角色，試圖在蘇珊經歷奇怪的體驗時保護她。


    蘇：她必須習慣跟較高類型的振動整合。她的意願對這類型的指令和溝通是開放的。她不是在意願上阻擋，阻礙是比較實質面的。能量只習慣在一處。但它需要習慣在一個轉換的意識狀態，習慣意識在交替的狀態，當傳輸進行時，在那裡等待。你瞭解嗎？

    朵：是的，我瞭解。


    蘇：現在我可以給你部份資訊，不過我仍然在處理她的口語傳遞。還有心理圖像……她需要習慣這類型的傳輸。我現在仍然跟她的意識有較多的結合，但隨著時間，她將能夠為了暫時性的交流更完整地移除自己（的意識）。

