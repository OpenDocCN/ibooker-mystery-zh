    特里·史崔伯是第一位在幽浮与外星人的连结上，使用「帘幕记忆」这个名词的作者。这是指对事件或事物的不正确记忆。有个什麽被加了上去，重叠在真正发生的事情上面，心灵因此用不同的方式去解读。它通常是以一种比较安全和温和的方式去诠释，因此当事人不会受到惊吓或创伤。刚听到这个名词时，我猜想这是潜意识心灵的防御系统，将它认为对心灵有害的记忆或事物的真实面向，隔绝在外的一种保护方法。


    帘幕记忆通常与动物有关。我遇过几起这类案例，发现实际所发生的情形被加上了一层「覆盖」，也就是我所谓的「装饰的表层」。不知为何，猫头鹰在这个现象裡显得特别重要。《地球守护者》裡的菲尔就曾在深夜的马路，被一隻猫头鹰吓到；牠朝公路俯衝，飞掠菲尔的车子。透过催眠，我们发现那根本不是猫头鹰，而是在公路上外星人太空船和小人迫使他停车，他的潜意识则用较温和的方式伪装那个场景，不让他记得真正发生的事。


