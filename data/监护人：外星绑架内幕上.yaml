    事「不合自然规律」。因此对他们的存在抱持极大怀疑。人们说，报告所说的那些外星人表现的本事，根本是不可能的。而我认为，我们终将发现那些现象是自然的，而非不自然。外星人遵循的可能新奇，但对他们来说却再自然不过。根据我收到的资料，幽浮之所以能从视屏或雷达屏幕消失不见，是因为它们能突然改变振动频率。你只要观察过风扇或螺旋桨片在旋转加速时是如何看不到叶片，你就对那是怎么回事有了粗浅的概念。我们这些住在地球实体环境的人是在一个较低的频率上振动。这个概念会在我的另一本书《迴旋宇宙》有进一步的解释。这些外星人有许多并不是生活在其他星球，而是在其他次元。在那些次元里，有许多其他的世界（有的是实体世界，有的不是）偶尔会与我们的世界并行存在，但它们振动的速度较快。通常，我们完全不会意识到彼此的世界。比较先进的其他世界察觉到我们，于是不时会前来地球观察。然而，他们必须要放慢自身的振动速度（也就是降低振频），才可以来到地球。降低和维持较慢的频率不论多久，都被描述为痛苦的事。如果人类要进入那些次元就刚好相反，我们的振动必须加速。再回来时则必须放慢下来。这些外星生命有许多已经演化到纯能量的阶段，他们不再需要肉体。然而，需要身体跟人类互动时，他们也能以肉身显现。我并不明白为什么纯纯能量的存在在旅行时还需要太空船。也许他也包括了他们的振动速度。获取更多好书，请加微信：13641926204
