  md: '一九八五年五月，在友人米尔德莉德·希金斯（Mildred Higgins）的引介下，我跨入了幽浮研究和调查的领域。米尔德莉德是幽浮共同研究团体 MUFO
    N（Mutual UFO Network）在美国阿肯色州的助理主任。她知道我对奇怪和不寻常的事物很感兴趣，猜想我可能会想认识一些调查员和对这方面有兴趣的人士。她邀请我参加办在她费耶特维尔（Fayetteville）家裡的
    MUFO N全州大会。虽然这个会议不属于催眠的回溯前世领域，但我认为，如果能够就我所看过的幽浮案例问一些问题，应该会很有意思。


    在会议裡，我得知 MUFO N是最大也最受敬重的幽浮调查组织，会员遍及全球。由于与会人士大多是科学导向，我认为最好不要提到自己的工作。催眠在当时仍被许多人归类为荒谬的方法，但我对自己的研究是那样严肃以待，我不想忍受别人的讪笑。当时我的工作都是私下进行，很少有人知道我在探索什麽。


    MUFO N的国际主任华特·安德鲁斯（Walt Andrews）是在场人士之一，他非常健谈且真情流露，每一宗幽浮案例的细节似乎都在他的记忆裡收纳归档，随时可以调出来。他对案例的瞭解令我印象深刻，其中有许多都经过他本人的调查。


    另一位是卢修斯·法里胥（Lucius Farish），我第一次跟他见面时，对他没有太深的印象，但他后来对我跟幽浮的连结却有深刻的影响。卢修斯是个很安静的人，一般人不太会注意到他。他聆听时非常专注，像海绵般地吸收资讯。我现在知道他用这种方式学到的东西比站在舞台中央还多。他出版《幽浮新闻剪报服务》（UFO
    Newsclipping Service）月刊，世界上最新的幽浮资讯他都瞭如指掌。


