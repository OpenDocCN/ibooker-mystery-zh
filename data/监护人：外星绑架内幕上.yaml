  md: '高力量引導下，為我們這個世界制定好的計畫。這個宏偉計畫的設計與執行的方法，都遠遠超過人類所能理解。不同的存在體被指派去執行這個計畫裡的不同步驟，每個存在體只負責自己那一小部分，因此他們對整個計畫的完成並沒有什麼可說的。計畫的整體範圍大概也超過了他們的理解能力。由於他們用無限長的時間在地球製造、培育和修正生命，這對他們來說只是一份工作，一項任務。他們在許多處於不同成長階段的星球上頭，可能也有過類似的任務。當個別的存在體死亡，其他
    的存在體會接續他們的工作。這是個時間極長，並以一絲不苟的精細所協調執行的計畫。時間不重要，重要的只有最後的目標——創造出在生理和心智都很卓越的物種。這樣的計畫並非一蹴可幾，而就算是這麼小心翼翼的規畫也會有出錯的可能。畢竟，要預測到每一個可能發生的狀況是不可能的。


    於是，就在一顆隕石墜落地球，帶來不適合這個星球的有機體時，美中不足的事發生了。那些有機體在它們原本的環境中是無害的，但在進入地球清新的大氣後，卻增生和變種成了易變無常的威脅；它破壞了播種人類的計畫，人體從此有了疾病。


    原先的理想計畫是要創造出一種完美運作的身體，沒有疾病，可以享有很長的壽命。因此，當這個預料外的发展出現時，大家都很哀傷，議會的最高層級於是召開會議，決定接下來該怎麼做。他們既傷心又自責，因為偉大的實驗走了樣。但他們決定，既然已經為實驗付出了那麼多努力，最好就繼續下去，不要放棄整個實驗。他們決定將已經造成的傷害降到最低，接受不完美的部分，繼續努力，往前邁進。


