    ## 第四章 隱藏於夢境的資訊


    上。我的床在那裡。但我現在站在另一張床這邊。「我回到我的房間了。我不在我的床上。」


    前一秒他還在石頭前研究，下一秒他就回到了飯店房間。「那麼你是在回到身體裡就站起來了嗎？」


    約：我沒有回到身體裡。我的身體跟我在一起。


    我很驚訝，完全出乎意料，因為這是我第一次聽到這種情況。「你的意思是你的身體穿過了天花板？那不是有點不尋常嗎？」


    朵：（很平淡的口氣）不會。我有時候會穿牆。


    朵：我的意思是，如果那晚有人看著你的床，他會看到你的身體躺在那裡嗎？（不會。）你知道這是怎麼做到的嗎？


    約：瞬間傳輸／移動 (teleportation)，指瞬間移動物體到另一個時空。


    朵：你是自己做到的嗎？


    約：不是，我無法用自己的意志做到。當我被叫出去的時候才行。


    這讓我有點嚇到，一時間想不出合理的問題。


    ## 朵：你發現自己去的那個圓形房間，那是物質的實體房間嗎？


    我以為他可能是在靈魂層面，或許是像《生死之間》描述過的學校或是學習的廳堂。


    **約**：對，它是實體的。


    **朵**：你的身體也是嗎？還有地板、牆壁和那個房間裡的東西是實體的嗎？


    **約**：對，全都是實體的。


    **朵**：你知道那個房間在哪裡嗎？


    **約**：不知道。但我可以告訴你我在裡面看到什麼。（他再次看到）當我面對石板時，右邊有好幾個控制板，還有欄杆。控制板比地板高大約二十四吋（譯注：約61公分），那裡有一條走道。我看到控制板和測量的儀器，我不懂它們是什麼。那不是要給我看的。我只是在掃視這個房屋的時候看到的。


    **朵**：你可以把它們跟別的東西做比較嗎？


    **約**：我不知道。我是隔著一段距離看到刻度盤和測量的儀器。


    **朵**：欄杆是沿著房間的邊緣嗎？


    **約**：對，它環繞房間。我在的這裡像是個凹陷的房間。它比室內其他地方要低。我感覺有別的東西在場，但我沒辦法往那個方向看。房間很暗。光線好像主要就是來自這個水晶面板。我看到那


    邊（指方向）有些紫色，不過我不知道那是什麼。


    朵：你以前來過這裡嗎？


    約：我去過很多地方。我不知道我以前有沒有來過這個房間。這房間對我來說很新鮮。我不認得路。


    我不熟悉這個房間。我去過許多房間。也許去那個房間一次就夠了。很多房間我都只去过一次。


    朵：房間是在什麼地方呢？你以前去過那裡嗎？


    約：我不知道。我只看到這個房間。我沒有去別的地方。我一進來就是這個房間。離開時也是從這個房間離開。我沒有去別的地方。


    朵：你去這些不同的地方有多久了？


    約：一輩子了。


    朵：你說它們不一樣。是怎麼個不一樣？


    約：有時我是在禮堂，有時候在比較小的房間，有時在圖書館。有時我只有移動的感覺，它可以是飄浮的感覺，或是高飛時的加速。以前我這麼做是因為那陣子我剛好沒有別的事情好做，沒有東西要學。因為沒有要做什麼工作，所以就自己一個人。自由的感觉很令人振奮。有時候在這些小小的旅程當中，我會看到一些生命體。他們看起來像人類。以前是人類，但現在死了。不過說他們死了只是因為他們已經不在這個世界上了。


    這些聽起來像是靈魂晚上去靈界研究和學習的地方。


