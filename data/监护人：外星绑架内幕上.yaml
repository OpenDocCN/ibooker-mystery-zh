    對大氣所注入的那些「東西」。還有什麼比這更順理成章的事呢？如果這包括了透過操作基因製造出更有適應力的人類，那就由他們去吧。我相信他們仍在努力回歸最初的夢想和設計，讓我們成為沒有疾病，擁有長到不可思議的壽命，讓這些人在宇宙的某處，另一個預備給他們的星球上生活的可能。當地球可能被核戰或其他事物污染到無法復原時，這會是人類在乾淨的環境中重新開始的機會。我相信這是一個可能性，但也許不是唯一的一個。


    一 九八八年的秋天，我遇到一件怪事。某個夜晚，我忽然有種明確而不熟悉的感覺，好像有一整團的資訊不知怎地灌入了腦子裡。那個體驗完全不像是作夢。事發當下，我清醒到足以理解那些資訊。我知道那是個概念，不是具體的句子或想法。它是以完整和簡潔的形式放到我的腦裡。我常聽個案說他們接收到資訊必須分解成語言才能被理解。現在我瞭解他們轉譯的困難了。


    這是我第一次有這種體驗，也是唯一的一次（我認為）。我知道那個概念跟幽浮上外星人的行為和思考等等解釋有關。我知道它應該被放進我以後要寫的最後編輯工作，完全沒有察覺自己竟也在思索外星人使用基因工程的原因。我只是持續累積資料，期待有天把這些資料寫進我談幽浮案例的書裡。我當時正在進行《與諾斯


    我收到的概念、想法和說明，跟當時從其他幽浮作者那裡聽到的都不一樣。記下這些內容似乎'
