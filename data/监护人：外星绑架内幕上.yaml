    \ 078\n\n有攻擊的傾向，有時可能有些好戰。他說如果人類可以學著控制道點，我們的未來會非常光明。\n\n朵：她對那個奇怪遭遇所能提供的資訊似乎就是這些了。我知道直接對她的潛意識說話總是可以到更多資料，於是我要求和她的潛意識對話。潛意識從沒有拒絕過我。\n\
