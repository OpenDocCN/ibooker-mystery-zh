    # 第四章 隱藏於夢境的資訊


    夢什麼時候不是夢呢？當事件的真實記憶被潛意識遮蔽，它就會以夢的形式出現嗎？夢究竟是

    什麼？我們如何才能知道其中的差異？還有，知道這個差異對我們有好處嗎？這類事情也許還是

    不要碰觸得好。


    我在工作時聽到的報告，有很多都不是個案與外星人的實際接觸，也不是目擊太空船。相反的，

    個案往往是被奇怪和生動到異乎尋常的夢境所困擾。這些夢通常有著不尋常的性質，是他們忘不了

    的夢。


    我們每個人，偶爾都會有非常特別強烈和清楚的夢境，感覺格外真實，而我們通常都會慶幸那

    只是場夢。也有一些夢是我們久久難忘的。這是我們稱為「睡眠」的陰影世界裡的正常部份，它大

    多是潛意識對清醒時的生活事件所做的解讀，也是潛意識試圖透過象徵，傳遞訊息給我們的方式。

    那麼，是什麼讓跟幽浮、外星人或太空飛行有關的夢與眾不同呢？我們又為什麼要去注意它們？

    我總是說：「沒壞的東西就別修理！」如果當事人活得好好的，沒有因為哪個記憶而造成問題，

    那麼最好就別去探索，把它當成一件有趣的怪事就好。沒有必要只是為了好奇而讓生活變得更複雜。

    記得，一旦打開盒子，就沒辦法再關上了。你無法忘記自己想起來的事。而這可能會對你之後

    的人生造成永久的影響。


