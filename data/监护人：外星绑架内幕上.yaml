    朵：手臂裡的東西有沒有造成任何身體上的問題？


    布：沒有，也不應該會有。


    朵：X光呢？X光可以拍到嗎？


    布：有可能，雖然可能性不高。它是被放在兩個骨頭之間，其中一根骨頭可能會擋住X光的視線。放在這個位置就是因為不容易發現和取出。這個東西裝設的方式，我想你可以說，它可以對附近的神經傳輸訊息，跟大腦連結。


    朵：我聽過有些人的頭裡面有東西。未來如果時機許可，可能會有東西放進她的頭裡。但目前長老議會偏好他們所觀察的人是完全自由的（以自己意志行動）。'
