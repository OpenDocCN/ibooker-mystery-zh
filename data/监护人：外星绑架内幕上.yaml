    力發展能夠達成這項任務的能源。要他們領會靠心靈力量旅行並且進出不同次元的概念，就會困難得多。然而，幽浮謎團的解答再也不是那麼單純。越去挖掘這個謎團，概念就變得越複雜，對心智越是挑戰。或許這是為什麼我們直到現在才被給予這些另類資訊。


    在過去，我們人類心智必須習慣外星人用我們可以理解的方式搭乘幽浮旅行，譬如使用某類型的傳統能源來超越光速，以符合地球科學家所理解的物理法則。這些年間，資訊就像是用湯匙一點點地餵給人類，一次只給我們當下應付得來的量。當我們適應了概念的各個部分，當觀念不再令我們害怕之後，他們又會提供拼圖裡更複雜的一片。我真的懷疑人類到底有沒有瞭解完整概念的一天，就像我們並不會預期一個還在學走路的幼兒能夠瞭解幾何學或微積分一樣。因此，我們人類大概永遠不會有那個機會吧。


    我被多次告知，不要期待我所有的問題都會得到解答。有些知識好比良藥，有些則如毒藥一般，它的傷害會多過幫助。因此我接受凡是提供給我的資訊，我也發現，當我分析它們，試著瞭解那些概念時，我又會得到更多資訊讓我消化，而它們也從未超過我的因應能力。這也是我一直以來寫書的方法，我試著用大眾能夠領會和理解的方式來呈現這些概念，而現在，這本書將會涵蓋之前所不曾呈現的內容。探索者的面前仍有許多未被標明的未知領域，而我希望能朝那些地方前行。我們正如嬰兒學步般地，一步步踏入未知的世界。


    我們認為，這些外星人和飛行器的行動並不符合我們所知道的物理法則。我們認為他們在做的


