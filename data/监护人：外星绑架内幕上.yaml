    ## 凱莉和我碰面的經過


    由於太過牽強，無法被視為巧合。我的朋友康妮曾對我提過，她有位多年老友凱莉是住在休士頓的藝術家。凱莉有過一些奇怪的夢和幻象，會讓人聯想到跟外星人的接觸。康妮認為我會想跟她配合，可是凱莉住得太遠，這個可能性微乎其微，她先生又管她管得很緊，不讓她離家遠行。自從康妮搬來阿肯色州之後，凱莉沒來找過她，雖然她們兩人是很好的老友。但接著，奇怪的巧合介入，把我們拉在一塊兒。康妮去休士頓找凱莉時突然病重，唯一能回到阿肯色州的方法便是凱莉開車載她回來。在這個情況下，凱莉的先生不得不點頭答應，於是她的阿肯色之旅終於成行。


    康妮回到家後，在週二的晚上打電話給我，要我去她家見凱莉，聽聽她的經歷，或許也做次回溯。康妮知道凱莉不會再到我們這裡，所以這會是凱莉唯一一次見到我的機會。


    我週四早上要去小岩城參加會議，週三是最後一個能見她的日子。於是，週三晚上我們共進晚餐，然後我請凱莉對錄音機說出她的經歷。她記得自己作過和外星人有關的夢，但她最想瞭解的是有一次的靈魂出竅和她看到的幻象。雖然其他人不覺得那有什麼，她的人生卻受到很大的衝擊。我告訴她我會探索任何她想要探索的事。我相信幫助她要比發現另一宗與幽浮有關的資料更重要。


    靈魂出竅的經歷發生在一九七八年的某個晚上，她當時正準備睡覺。她很確定自己那時還沒睡著。她只是換上睡袍，坐在床邊，突然間聽到房間角落傳來一個低沉的聲音說道：「凱莉，跟我來！」


    「他沒有說出聲來，聲音是直接傳到這裡。」她指著她的前額。「我覺得自己像條濕毛巾。你知道，就是當你把毛巾放到水裡再拿出來，它會全部吸在一起又很重？接著我感覺自己在往上飄，脫離了我的身體。突然間，一個灰色、模糊、沒有形體，什麼都沒有的東西和我一起飄浮。我是在離開身體的時候看到的。那個沒有形體、朦朧朦朧的東西，有雙黑色眼睛，深邃，充滿著愛。然後突然間，我們不在房裡了。我們飄浮在所有東西之上。」


    凱莉從這個視角連續看到了五個場景。它們似乎都和她未來的人生事件有關，而且是依時間的先後順序出現。對我來說，那些場景充滿了象徵意義，與潛意識在夢中使用的型態相似。這件事發生在多年以前，其中有的經歷已經在凱莉的人生成真，只除了那件印象最強烈，引起她最多恐懼和困惑的事件還沒有發生。她一直沒能忘記那事。


    她看到很多的水。不能判定是湖還是海，只知道山丘和樹木一直往下延伸到水邊。她在上方飄浮著往下看。水是綠色的，波濤洶湧，看來有暴風雨的樣子。天空全是綠的，浪很大。她看到好幾千條死魚翻著肚子浮在水上。兩隻白鳥忽地從天際往下飛掠水面。


    接下來，她看到一個部份遭到毀壞的城市。成千上百的人病了，病情或輕或重。她看到自己身在其中，正在餵他們吃東西，照顧他們。她的腦裡出現一句話：「有些人還能吃，對有些人，食物到了嘴中卻成了醋。」我覺得這聽起來很像是聖經經文。在這個畫面裡，她知道自已沒有病，她也知道自己不會生病。


    當她抗議：「為什麼是我？」答案出現了：「讓你看這個並不是要你恐懼。不要害怕。這是你被派到地球的原因。你必須為了這些即將發生的事情做好準備。」然後又重複了三到四次的「不要害


    怕」。


    凱莉繼續說道：「然後突然之間，我發現我回到自己的房間，坐在床上。我望向我先生，看他有沒有醒來。他躺在床上打呼。我往房間四處看，我的身體是顫抖的。房間沒有什麼變化。我站起來，到小隔間裡抽菸，只抽了幾口就熄了它。我在冒汗，心裡怕得要死。我不是害怕我看到的事，我害怕是因為我知道我自己沒有睡著。我不知道那究竟是什麼回事，但最後我還是爬上床去睡覺。」


    「隔天早上我打電話給四、五位牧師。我說有東西來找我，告訴我未來的事。嗯……；我很快就發現我不該打電話給他們。他們的第一暗示都是我的心理有問題。所以我學到了有些事情不能和他們討論。我知道那不是一場夢。我連著兩、三年都在害怕，因為我知道那些事情一定會發生。我不相信那些事情會成真，而是知道那些事情一定會發生。當最初的幾件事開始出現，對整個情況更是沒有幫助。」


    她指出這個經驗是她最想在催眠時探索的事。她很確定其他（會讓人聯想到外星人）的經歷雖然生動令人不安，但它們「只是夢」。我鼓勵她也告訴我那些夢，就算是做個紀錄。


    她描述了一場夢，或者該說是「惡夢」，由於非常生動，她一直忘不了。那是在一九六三年的九月初，她十九歲，還在德州念大學的時候。在那個「夢」裡，她發現自己身在一個弧度的房間裡，裡面有一排排的孵化箱。她說是孵化箱，因為箱子裡有嬰兒，但那些嬰兒和她看過的都不一樣。她曾經把他們的樣子畫了下來，她說會把那些畫寄來給我。那些嬰兒有很大的頭和眼睛，跟他們完全浸在液體中的迷你、皺縮的身體形成強烈對比。他們完全浸在液體裡，她知道他們在這些液體下成長。嬰兒之間不但會用心靈互相溝通，他們還懂得很多複雜的辭彙。每個孵育箱中的嬰兒似乎都是在同樣的發展階段。他們的皮膚發亮，散發著珍珠光澤，白到近乎透明。


    接著，有個女子進來房間，她掉了顆膠囊在地上。它看起來像是緩釋膠囊，只不過是透明的。


    這是用來放進液體裡，長嬰兒用的。我以為她的意思是那個膠囊裡的東西被加到液體裡，用來幫助嬰兒的成長。但她強調膠囊就是嬰兒。


    「它就像是會長出嬰兒的種籽。他們把膠囊放進液體，嬰兒就從膠囊中長出來，然後繼續長大。


    可是她掉了這個在地板上，所以我彎下身子，撿起膠囊，放進我的口袋裡。我想要跟別人說，拿給他們看，因為我知道這就是他們（指外星人）的方法。可是房間裡有人說我不該有這個膠囊。他們在生氣，所以我很害怕。就在那個時候，我醒了。」


    凱莉繼續說：「總之，這就是我的夢。到現在我還忘不了。整個大學時期，我不斷夢到同一個夢的片段。我有個感覺，覺得自己晚上在那個育嬰室工作，而不是在睡覺。難怪我醒來時總會那麼累。我不知道這跟幽浮有沒有關係。我是個藝術家，是個創作的人。有可能是因為這樣，或者那只是個夢。即使做了催眠，我記得的事可能也不會比我现在告訴你的多。」


    催眠時，康妮在一旁觀看。凱莉告訴我她想搜尋的大致日期，我們同意盡可能探索所有的事件。


    過去的經驗告訴我，如果事件只是夢，潛意識會據實以告，如果她不回溯到那一天，我們就不會知道真相。


    凱莉證實是個優秀的個案，很快便進入很深的出神狀態。我帶她回到靈魂出竅看到幻象的那一晚，也就是一九七八年七月的最後一個禮拜。她的意識雖然不記得日期，但在催眠的狀態下，她立刻提供正確的日期：七月二十六日。


    當她說到那晚準備上床睡覺的時候，忽然變得沮喪。她像是被什麼嚇到似地哭了出來，接著又開始啜泣。我下指令要她平靜，鎮定下來，這樣她才能告訴我發生了什麼事。她都停止啜泣，邊吸著鼻子邊說自己突然覺得很沉重，而那個感覺讓她很害怕。一切都暗暗的，什麼都看不到。然後有個東西叫她不要害怕，接著她被一股很強烈的愛的感受包圍。黑暗開始變灰，一些場景逐漸出現，她顯然飄浮在場景的上方，那個感受非常奇特。她知道有個存有跟她一起，但它看來只是灰濛濛的，沒有形式和實體。唯一可以辨識的是一對大眼睛，可是就連它們也飄浮著，忽而清楚，忽而模糊。


    她看到和自己有關的未來場景，跟記得的情況相同。沒有新的細節可以補充。


    最令她不安的最後那個許多人瀕臨死亡的大城市。她哭了，描述畫面的聲音顫抖著。「好難過。好多人快死了。不論我做什麼，有些人就是不會好起來。我在給他們東西。我抱著他們，碰觸他們。可是有些人還是死了。看到這樣我好痛苦。我沒辦法幫助他們全部。那個朦朧的東西要給我他們東西，我給了。那是一種食物。我不知道他們怎麼會生病，可是他們掛在陽台上，膚色奇怪，有點灰、黃或藍。他們看上去就是生病了，而且好醜，所有的人都禿頭，骨瘦如柴。」她哭著說：「我不會生病。他告訴我，我不會生病。我必須照顧這些人。有些人得到了幫助，有些人沒有。


    人數實在太多了。我不認為是戰爭引起的。是某種核之類的東西。我不知道是不是跟水有關，還是他們發生了什麼事。它像一朵雲，不過沒有戰爭。像一場暴風。我看到的那些魚大概就是那樣子死


