    有些人說，最好不要去探究人類心靈無法理解的事物。但是，如果那裡是知識和領悟的蘊藏之地，我知道我一定會去搜尋並提出無止盡的問題。任何研究的新管道對我都是挑戰，而且是我無法忽略的挑戰。只是，在進入這個研究領域之後，我不僅偏離了尋常的路線，我也需要改變技巧去適應新的狀況。


    我所所謂「飛碟」的不明飛行物向來很感興趣。我閱讀過大部分跟這個現象有關的文獻資料，其中最令我印象深刻的是最初在一九六○年代發生的案例，也就是貝蒂與巴尼·希爾（Betty
    and Barney Hill）的《被打斷的旅程》[The Interrupted Journey] 。那是所謂「外星綁架」案例的始祖，其中許多描述讓我相信希爾夫婦的經歷是確有其事。我也會讀那些對天空上奇怪且不肯默默消失的事件的評論。在權衡過正反兩方的意見後，我相信真的有些什麼事正在發生，而它並無法以懷疑論者的理性和邏輯思維去解釋。也許這個主題從來就沒有要合乎邏輯、原本就非三言兩語能夠解釋得清楚。也許外星人的策略就是要達成他們現在正做的：激起人類的好奇心，去思考那些不可能的事。


    一九四○年代晚期和五○年代初期，「飛碟」報導首次對大眾披露，卻普遍遭到嘲笑。當時還十多歲的我不斷想，那些事很可能真有點什麼玄機。這些年來，我對閱讀和追蹤最新的發展始終是被動的，我從沒想過自己會主動做起研究，甚至直接與來自另一個存在領域的外星人溝通。或許在詭異的領域工作多年，已經為我终于要發生的接觸做好了準備，因為當發生時，我既不感到震驚或不敢置信，也一點都不害怕。我只是好奇。好奇已成為我的註冊商標，並且幫助我取得了許多資料。


    監護人 THE CUSTODIANS ▲ 012'
  - '[PAGE 9]


    一九八五年五月，在友人米尔德莉德·希金斯（Mildred Higgins）的引介下，我跨入了幽浮研究和调查的领域。米尔德莉德是幽浮共同研究团体 MUFO N（Mutual
    UFO Network）在美国阿肯色州的助理主任。她知道我对奇怪和不寻常的事物很感兴趣，猜想我可能会想认识一些调查员和对这方面有兴趣的人士。她邀请我参加办在她费耶特维尔（Fayetteville）家裡的
    MUFO N全州大会。虽然这个会议不属于催眠的回溯前世领域，但我认为，如果能够就我所看过的幽浮案例问一些问题，应该会很有意思。


    在会议裡，我得知 MUFO N是最大也最受敬重的幽浮调查组织，会员遍及全球。由于与会人士大多是科学导向，我认为最好不要提到自己的工作。催眠在当时仍被许多人归类为荒谬的方法，但我对自己的研究是那样严肃以待，我不想忍受别人的讪笑。当时我的工作都是私下进行，很少有人知道我在探索什麽。


    MUFO N的国际主任华特·安德鲁斯（Walt Andrews）是在场人士之一，他非常健谈且真情流露，每一宗幽浮案例的细节似乎都在他的记忆裡收纳归档，随时可以调出来。他对案例的瞭解令我印象深刻，其中有许多都经过他本人的调查。


    另一位是卢修斯·法里胥（Lucius Farish），我第一次跟他见面时，对他没有太深的印象，但他后来对我跟幽浮的连结却有深刻的影响。卢修斯是个很安静的人，一般人不太会注意到他。他聆听时非常专注，像海绵般地吸收资讯。我现在知道他用这种方式学到的东西比站在舞台中央还多。他出版《幽浮新闻剪报服务》（UFO
    Newsclipping Service）月刊，世界上最新的幽浮资讯他都瞭如指掌。


