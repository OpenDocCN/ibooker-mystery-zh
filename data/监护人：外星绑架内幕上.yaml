  md: '朵：把東西放到頭裡的目的是什麼？

    布：我不確定。宇宙銀河社群中有不同的種族和團體，而不同的團體有不同的目標和目的。他們使用不同的工具，所以可能會用不同的方式跟人類接觸。雖然接觸應該是透過長老議會來協調安排，不過有些團體會用自己的工具而不是長老議會許可的。

    朵：如果他們這樣做議會不會介意嗎？這不是違反他們的規定了嗎？

    布：有些違反了規定，有些沒有。這要看是怎麼做的，以及有沒有傷害到當事人。還有，這對當事人造什麼影響。

    朵：你能看到她九歲時，在她的手臂裡放東西的外星人是什麼樣子的嗎？

