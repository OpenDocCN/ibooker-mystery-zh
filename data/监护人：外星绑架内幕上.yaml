  md: '她納悶他們為什麼要從她的肋骨而不是嘴進去。他解釋，從旁邊進入比較容易。當她在心裡聽到那些外星生物說出了錯時，氣氛突然變得焦慮。他們很擔心，因為她的胃出了很多血。需要修復的地方比原先估計的多。她已經失了很多血，身體越來越虛弱。她聽到：「你千萬不要傷害你的身體。它很特別。」然後他們用光替她止血。


    我很好奇她為什麼沒有注意到自己的內出血。他們說她終究會發現，只是到時可能會更難修復。他們用某個「像針，但不是針」的東西，對她的手臂注射一種白色液體，還解釋「他們放進比較好的血細胞來抵消損害。某個能改善血細胞運作的東西。讓血液含有較多的氧。」


    在他們準備離開太空船前，高大的那位對她說他會再來看她並為她做檢查。她在他的身邊不僅感到安心，還有種彼此原本就認識的感覺。他說她在轉生到這一世之前，他們曾經在一起。還有，他已經很老、很老了。


    下一瞬間她便發現自己躺在家裡的床上。滿心的疑問則在墜入夢鄉後很快消散。到了早上，除了那個暗示他們抽血，傷害她的夢之外，她什麼都不記得。現在事情很明顯，由於貪食症導致的不斷嘔吐，她的身體受到了損害，而他們只是想要幫助她。


