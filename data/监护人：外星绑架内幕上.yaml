    ▲ 158


    太平洋核試時遭到法國炸沉，之後該組織再找一艘船替代，即提出這句話作為口號。好玩。（咯咯笑）


    那麼你是穿著上床時的睡衣。好。我們回到另一個經驗。至少後來有個外星生命對你很好。


    有對你做什麼或和你溝通嗎？


    **朵**


    有啊，他摸摸我的手臂，碰碰我的臉，還有眼神接觸。我猜那是為了安撫我。

    以感覺到聲音。不，他沒有說話。他在安撫我的時候，甚至沒有傳送之前那種怪異的言語。


    **莉**


    還有沒有發生別的事？（她深嘆一口氣）我想已經夠你受的了吧。（笑）


    **朵**


    我想是的。我不想再想起更多的事了。

    沒有問題。那接著你就被送回來了？（停頓）現在我們在溝通了。我站在他們的白色房間，又穿著我睡覺的長襯衫。


    **朵**


    溝通什麼？


    **莉**


    我不知道。我可以看到我自己，我很高興。

    現在我覺得沒事了。我不記得了。


    **朵**


    我不知道。

    如果重要的話，你的潛意識總會記起來的。


    **莉**


    那基本上是……我會跟你說，但我不知道是不是真的或正不正確。那是離別的問候，還有，對,「我們還會再見面」那樣的約定。


    朵：好。但接著你是怎麼被送回到你的房間？

    莉：我和那個和善的男子走在走廊上，經過那股惡臭。現在我們在臭房間的外面。（停頓）我不記得了。我連看都看不到。不過這一定跟同一種光束的來源有關，不管那是什麼。

    朵：你認為那是你回到房間的方式？

    莉：我不知道還有什麼別的方式。（咯咯笑）我確定沒有交通工具在我家降落。

    朵：（笑聲）你記不記得看到太空船的外觀？

    莉：我現在可以看到。它——不是圓形的——比較橢圓。（手勢）這樣子橢圓，底部比較圓。

    朵：然後你就回到了你的房間，一切都好好的沒事，不是嗎？（她發出肯定的感嘆）那時已經不那麼糟了。一切都結束了。你感覺如何？

    莉：現在？當我觀看那個經歷時我並不喜歡，也不喜歡去想它。我的語氣現在聽起來很生氣，對吧？

    朵：有一點。

    莉：但當我鎮定下來再看，事情結束後我並不憤怒。我的感覺如何？你真的想知道嗎？我想這些都是我虛構出來的。

    朵：可是這件事有可能發生會讓你感到困擾嗎？

    莉：會困擾我嗎？（沉思）不會。

    朵：我想那可能是他們不讓你記得的原因，因為他們不想在當時和之後令你困擾。


    # 第四章 隱藏於夢境的資訊


    159


    莉：沒錯。


    我引導莉安往時間前移，並在喚醒她之前下了許多安好的催眠指令，好讓這次的體驗不會為她帶來困擾。


    催眠結束後，我們喝飲料，放鬆一下，然後我給她一本圖畫紙簿和簽字筆，請她把記得的事情畫下來。她對自己不是很會畫畫感到抱歉。


