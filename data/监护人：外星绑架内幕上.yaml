    布：有些違反了規定，有些沒有。這要看是怎麼做的，以及有沒有傷害到當事人。還有，這對當事人造什麼影響。

    朵：你能看到她九歲時，在她的手臂裡放東西的外星人是什麼樣子的嗎？

    布：他們是很溫和的類型。接種發生的時候是在晚上，所以很難看清楚他們的長相。他們跟她在公路上看到的那個人不一樣。他們沒有頭髮，頭很平滑。他們像是銀色的。手也不一樣，有三根手指和一根大拇指。他們不像她在公路上看到的人那麼高大。這些人的骨頭比較長，他們很瘦長，身體構造非常纖細。他們有深色的眼睛，我能說的就只有這樣，因為他們的臉是在陰影下。

    朵：你說他們是很溫和的種族？

    布：對。他們對知識有極大的好奇心。他們是在長老議會的指示下做這件事。還記得嗎，長老議會包括了許多不同種族的生命。生命體的類型有無限多，當你把整個宇宙算進來時，生命是包羅萬象的。單是在這個銀河系，就有許多不同種類的生物，有著不同的外貌、文化、能力、看待事情和建造事物的方式。當你看到某些種族的外觀，你就會瞭解那些地精（小矮人）和小精靈的傳說是怎麼來的。因為在古代的時候，有時外星訪客不是那麼小心，被一些人目擊又沒有蒙蔽他們的記憶，於是有關特殊外表的人的傳言就這麼開始。當你聽到那些非常高大和奇形怪狀，或是非常小而且看來纖弱的人的傳說，那很有可能就是跟過去來訪地球的種族有關。

    朵：是議會叫他們來這裡做這些事的嗎？

    布：應該是要這樣的。

    朵：可是不見得總是如此？

    布：對，不見得。不過他們盡可能透過長老議會來協調，盡量減少傷害。

    朵：我發現跟這些不同生物有過接觸的人，比我們最初以為的要多很多。

    布：對，因為公開與地球接觸的時機比以前更近了，而且很有可能發生在他們一直在觀察的現在這一代人身上。許多外星人都很急切地希望人類能加入銀河社群，他們真的很希望如此。

    朵：我們一直聽到有人說自己被綁架。你知道這方面的事嗎？

    布：他們確實偶爾會對人類的身體做較密切的检查。這是為了追蹤醫藥科學和人類演化的進展。他們想在這件事發生的時候，為人類消除疾病。為了做到這點，他們必須先檢查人類，才能研發對各種疾病的療法。然後他們就能在跟我們公開接觸時提供我們療法。

    朵：聽起來很合理。那些身體檢驗是怎麼執行的？


    布：通常是用光和某種特定能量，類似我們用 X 光來檢驗骨頭。他們有不同的能量頻率可以檢查身體的特定部位，確定它的狀態或是在什麼發展階段。

    朵：這是在個案家裡的床上進行的嗎？

    布：不是，他們必須把人類帶到設置有這些儀器的太空船上。這些儀器會發出特定的能量，檢查身體裡的特定事物。因為工具太多了，不容易運送。他們可以在你家做部份檢查，但不會像是在太空中上面做的檢查那樣徹底。

    朵：我想人們把這個叫作綁架。

    布：意圖並不是要綁架。如果真想綁架人類，他們會把人類帶上太空船，飛得遠遠的，永遠不放他們回地球。這只是檢查，目的是繼續收集他們需要的資訊。人類相對的則可以提供銀河社群個別的專長和成就：我們的好奇心、智能、對藝術和音樂的喜愛，還有我們建造事物和理解事物的方式。這些是我們能對銀河社群的貢獻。

    朵：我也聽說有些外星人似乎很冷漠，好像沒有情感一樣。

    布：有些看上去確實如此，那只是因為他們專注於追求知識，沒有表現情緒或情感的理由。有些則只是天生含蓄，比較用心靈感應來表達情緒，而不是身體的動作。

    朵：我曾經和見到這些外星生命之後，非常恐懼的個案談過話。

    布：對。那很不幸，他們真的沒有要傷害我們的意思。會那麼害怕的人通常沒有打開心胸，或是對這個體驗沒有準備。他們沒有把這看做是美好而且要去珍惜的新體驗，反而聯想到深夜的怪獸


