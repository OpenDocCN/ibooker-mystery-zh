  md: '來到地球，偽裝自己混進人群。他們藉著心靈能力能夠感知人類社會和心理發展的普遍趨勢。偶爾他們會對人類做生理檢驗，追蹤人類生命科學發展的程度，因為他們在自己的星球很重視這一方面。他們有個理論，認為一個種族的生命科學的進步程度，還有他們一般來說在飲食、醫療照護、健康和營養方面是如何照顧自己，都會跟科技發展的程度類似。


