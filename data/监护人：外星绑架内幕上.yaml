    湯姆記得那夜那位女士正在開車的時候，在一些樹的上方，有道亮光劃破天際。那位女士似乎因此變得緊張，但接下來的事湯姆就不記得了，他只記得第二天早上在她的公寓裡醒來。他沒有服用任何藥物或喝酒，始終無法解釋消失的時間。沒多久，那位女士搬走了，湯姆並不曉得她去了哪裡。


    透過催眠，湯姆重返當日的場景，回憶起事件的確切日期，並描述了那頓可口的晚餐。他提供了許多他的意識心智已經遺忘的細節，其中有許多都跟我們要找的真相無關，但顯然所有的資訊都存在著，而且隨時可以接通取得。那位女子的名字叫史黛拉，湯姆說她的車是全新的一九七二年龐帝克火鳥。當他們循著鄉村小路駕車前往她的公寓，時間已近午夜。湯姆敘述了他們之間的閒聊。


    然後，他的眼角餘光瞥見他以為是一團火球或「流星」之類的東西。天空上的光越來越亮，眼看著就要朝他們逼近。


    引擎突然熄火了，車就停在路的中央。史黛拉非常害怕，但說來奇怪，湯姆的反應卻很不同。


    他突然覺得疲憊不堪，接著就睡著了。這絕不是正常的反應。我知道他的潛意識一直是清醒的，我可以向它請教。


    他的潛意識告訴我，他和史黛拉都睡著了。有道耀眼的光包圍住車子，光從所有的窗戶照進來。


    接著，車門被打開，他們睡著的身體被移出車子。我問是誰帶他們出來。


