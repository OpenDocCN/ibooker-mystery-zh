    調查過另一一起發生在小岩城的事件，當事人是位女性，她在交通尖峰時段經過一條繁忙的公路去上班。她看到一艘膠囊形狀的巨大飛行器驟然出現在前方空中。她以為大多數的車子會因此發出刺耳的煞車聲，然而卻一切如常。人行道上有人在慢跑，她瘋狂地從车上對他們揮舞喊叫，不斷往上指，想要吸引他們的注意。但他們繼續慢跑，宛如她是隱形的。她把車子停在人行道邊，看著那艘飛行器做了幾個猛烈的旋轉後飛走。它是那麼的巨大，但其他人卻完全沒注意到。


    她沒有被綁架，也沒有別的事情發生。


    這起事件跟我調查過的另一個案例雷同，而那個案例是一九九七年在半個世界之外的英格蘭所發生的事。這些外星人有能力創造出不讓別人目擊的個別體驗嗎？本書後面會更詳細的探索另一個類似案例。


    顯然地，有相當多的事一直發生在我們身上——在另一個層面。只有當某件事的發生，讓意識注意到了之前經歷的事，我們才會感到不自在。我認為，既然我們大多沒有察覺在另一個層面發生的事，而且也不能做些什麼，那我們就不該擔心，以免容易變得疑神疑鬼。


    希望有朝一日我們將會發現，這一切其實都在計畫之中，所謂看似瘋狂的舉動背後都有它的目的。


    這些事件和珍奈的經歷似乎是不同的類型。艾迪的世界裡仍有動作，珍奈的沒有。她周遭的世界快速地筆直飛來，在車子上方盤旋。凡勒莉被嚇到了，她倒退車子，掉頭朝城市的方向開去。


    當她開到公路上時，白色的發光體移動到乘客座的旁邊，跟她們同步移動。它沒有固定的形狀，似乎會變形，不過從頭到尾都非常白、明亮、而且發光。凡勒莉加速駛去，決心要盡快開到市區。接著她注意到一個奇怪的現象：雙線道上完全沒有車輛，也沒有燈光（聽起來跟珍奈的經歷出奇地雷同）。這個不尋常的狀況一直持續到她駛離公路，轉向市區為止。她看到街燈在她靠近的時候，一盞接著一盞地熄滅，所幸她還看得到路面。沒有東西在動，草和樹木全都靜止，呈現一片怪異的死寂。她們沒看到任何貓、狗、其他車輛、人，或是房子裡的任何燈光。就好像她們是這個世界上僅有的兩個人，感覺有如「陰陽魔界」般詭異。


    凡勒莉形容那個情況很像是在真空裡，沒有聲音，沒有動作，什麼都沒有。她們經過的區域，街燈都是滅的，然而有個柔和的光芒從她們的上方某處散發出來。


    她們決心要到有人的地方。她們經過一座大型購物商場，那裡有家通宵的餐廳。這時候那個物體在商場的上方盤旋。當車子經過那家二十四小時營業的餐廳時，她們發現裡面一片漆黑，四下無人；完全沒有任何生命跡象。她們繼續開著，一路上沒有遇到任何車或任何人。雖然已經很晚了，但通常城市的街道這時候還是會有人。


    情急之下，她們決定去一位友人位於鬧區的辦公室。那個朋友經常工作到很晚，她們知道她一定還在。當她們進到辦公室時，她們的世界又恢復了正常。她們沒有告訴友人路過的真正原因，在那裡也只停留了一會兒。然後凡勒莉就送她的朋友回到公寓。


