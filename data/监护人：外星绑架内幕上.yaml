  md: '這將是一直持續進行的實驗，而且永遠不會被母星放棄。經過許多世代以後，這個實驗會繼續出現在歷史的記錄裡。永遠都會有「看守者」負責觀察和更新記錄。為了瞭解基因的發展和環境對基因的影響，新生物中自然會有一些受到較嚴密的監控。如果發現問題，「看守者」便能透過修正提供幫助。我相信我們不會認為這是干預，因為在理想的狀態下，生物不會覺察有異，所以可以不受影響地繼續他原本的生活。


    為了不被生物察覺，實驗進展到這個先進的階段，科學家最好是待在實驗室的玻璃後面。這跟在籠裡孵育飼養罕見鳥類的情形非常相似。在小鳥破殼而出後，照顧者會戴著怪誕的鳥面具或帽兜，為的是避免成長中的雛鳥與人類認同。科學家的理論是，如果鳥以為自己是人類，以後到了野外將無法生存。牠必須跟自己的同類認同才行。


    然而，如果當物種的發展轉了向，開始用他新發現的知識掀起戰爭呢？萬一戰爭的行為日趨嚴重，他們創造出具有可怕力量的武器該怎麼辦？萬一他們以輕率魯莽的方式使用新發明，威脅著要摧毀自己，還有他們的整個世界，又該如何？他們會被容許這麼做嗎？我不這麼認為。如果實驗在數不清的世紀中一直受到保護和培育，在那一刻，我們會放棄實驗還是冒險干預？這會是非常重大的問題，而決定的責任很可能是在地球政府的最高層級。


    我們有可能會決定讓他們做他們想做的事，當作是實驗的終極高峰。但是，我們會眼睜睜看著一切全毀嗎？我們很可能會採集細胞，進行複製，以便地球留下這些物種的一些樣本，也或者是到另一個荒蕪的星球重新來過。我們大概不會讓所有的努力就這麼化為烏有。我也相信，如果物種威


