  md: '智能的動物。在這個過程中，人類很自然地會為了協助發展而操控基因，放進我們自己種族的特質。

    當新的生命出現，興奮之情將感染所有的科學界。這個產生的生物可能具有部分我們的特性，但由於必須適應本身的環境，所以大概不會和我們非常相像。他的眼睛、呼吸器官和循環系統可能跟我們不同，因此無法在地球存活，然而，他仍會被視為是類人動物（humanoid）。

    假使，這個新生物開始顯示出與大計畫不相容的缺陷，科學家會因此放棄計畫，毀掉他嗎？我想不會。我想人類仍有足夠的神性，他會把所有的生命看作是神聖的，就算是自己一手所創。我想人類會盡力幫助新的物種適應缺陷，或就是讓他們在演化的困境中，自生自滅。

    隨著具有優勢或主要物種持續發展並開始展現文明的跡象，監督就會跟著減少。實驗者不需要隨時都在觀察。此外，看看新生物會如何自行發展可能也是個有趣的實驗。他們會有哪種道德觀？會有創造力嗎？好不好戰？為了瞭解自己的種族，我們會覺得有必要容許這些生物自行發展，同時研究哪些特點是自然發生，哪些是靠後天學習。但我們不會完全丟下他們不管。

    指導者會前去和新生物一起生活，教導他們改善生活的方式。新生物則會視指導者如神，即使在他已返回母星很久之後，對他的崇拜依然不會改變。指導者一定是神，因為他具有如此不可思議的神奇力量和知識。他會教新生物採集食物和生存的方式。接著，為了研究生物的心智發展，指導者不會介入或干預後續的情況。知識一旦傳授出去，要怎麼使用就全由新生物自己決定了。介入太多很可能會徹底破壞實驗。

    我們顯然還可以列出許多不同的因素，但以上會是大致上的情節。


