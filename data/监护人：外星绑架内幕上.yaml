- md: "## 監護人 THE CUSTODIANS ▲ 338\n\n現場有位治療師協助處理她的狀況。以前蘇珊每次做完催眠後感覺都很好，有時甚至還是笑著醒來。由於這個情況是頭一次出現，我認為可能和催眠前她的緊張感有關。房間裡人很多，她因為處於敏感的狀態，可能感應到了別人的能量。此外，我們在一週內兩次使用了這位存在體的能量，可能做得太快、太多了。或許她需要更多時間習慣傳導這類能量。我真的認為這是許多因素所合併造成的現象。\n\
    \n蘇珊因為進入非常深度的出神狀態，她並不曉得催眠時房間裡發生的其他事。有些調查員拒絕認真看待這類調查，因此以刻薄諷刺的評論取笑我們（我沒有放在書裡），我下定決心再也不容許這類的質疑。我認為催眠是一種取得資訊、研究和探討的方法，但我很快就意識到，一九七八年的調查員還沒準備好接受。他們之中有些人還沒從形上學的角度來看待這個主題。\n\
    \n我逐漸明白，除非調查員瞭解形上學，否則他們無法明白幽浮和外星人的複雜本質。這些全都互有關聯，無法區隔開來。然而，那種要求「具體細節」類的調查員始終存在。我猜想這個領域容得下各類調查員。我們都握有謎團的零星片段，我們不能自以為自己手中那一點東西就是全部的拼圖。有太多細微變化與差異，因此我們必須學著一起研究。\n\
    \n大多數的人離開了，有幾個人留了下來，我們一直談到過了凌晨一點。蘇珊大約就是在那個時候去淋浴，然後叫我看進去看她的腳；她從浴室出來後，發現自己腳上佈滿了大紅斑。斑只在腳上，沒有延伸到腳踝，而且也已開始褪色，漸漸恢復成原有的膚色。沒有人真的知道該怎麼解釋，除了這和外星能量有關外。這也可能跟她在催眠療程開始前的緊張有關。\n\
    \n## 我\n我認為本書第一部（譯注：上集）的所有案例（以及沒有被我收錄進來的案例）都依循著一個可辨識的模式，這點相當值得我們注意。同樣的特性在世界各地一再重複，這種重複的內容是無法幻想出來的，尤其許多案例的個案幾乎沒有接觸過幽浮文獻。在一九八○年代，也就是大多數這類案例被調查的時候，市面上還有多少這類主題的書籍。即使是已出版的書，也不是把重點\n\
    \n當時我還不曉得在接下來的幾年，我會有其他個案的身體也受到類似能量影響的案例。而我很快察覺，當在最深度的出神狀態下，人體能做許多我們以為不能的事。在進行這類工作時，要記得的最重要原則就是：「不要造成傷害！」然而你也必須持續對可能出現的意外做好心理準備。\n\
    \n這是我最後一次催眠蘇珊。她覺得這些事很有趣，但只當作是不可思議的怪事，她並不想傳導外星訊息。她當時在念商學院，比較想找到一份工作。我向來都是尊重個案的意願，因此沒有要求她繼續。我並不需要擔心，因為我已經與來自另一個世界的存有建立了直接的接觸，事情自然會有後續。\n\
    \n他們（外星人）找到了一位有意願的聆聽者，交流將會透過其他的方式繼續。\n\n我已經開啟了另一扇冒險的大門。\n\n## 第七章\n### 外星人說話了▲\
    \ 339\n\n放在我發現的層面，像是：最常被目擊的外星人類型、類似形態的太空船、外星人執行工作時的類似程序、類似動機，以及一再提及的對地球播種的故事。\
    \  \n由於個案間不可能串連合作，這些相似處讓故事更有真實性。此外，當其他調查員和出版品還把外星議題當成是負面和邪惡的事物報導時，我的個案一致地都會敘述一個仁慈有愛心的善意生物。就連科學也認可當一個實驗重複進行而結果都一樣時，這就是確立真實性的可靠證據。\
    \  \n最重要的是，書裡的個案並不希望曝光或出名，他們反而希望匿名，而為了尊重他們的意願，我改變了他們的名字和職業，好讓他們能夠繼續過清靜的生活。\n\n\
