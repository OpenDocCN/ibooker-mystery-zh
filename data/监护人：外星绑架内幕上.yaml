- md: '## 監護人 THE CUSTODIANS


    何人進入。它只是要讓資訊有條理地在這個區域裡。我猜你可以稱它是一種磁性索引系統，它會吸引資訊過去，然後快速移動，使資訊歸到正確位置。當你使用這間圖書館的時候，你的意識或什麼的會是在正中央飄浮，然後每一點資訊都在不同形狀的光裡，在周遭飄浮著，有時淚滴狀、時圓形，或很像聖誕樹的裝飾。它們全都閃爍著不同的顏色。不知道為什麼，光的形狀、顏色，還有它發亮的方式，會告訴你的意識它是哪一種資訊。


    朵：我很好奇它們的差別在哪裡？

    S：我猜就像是動物主題的書和政府部門的程序書等等諸如此類的東西。就是不同的主題。我有種感覺，如果你心裡沒有特別想知道什麼，那麼其中一個形狀就會觸發些什麼。但如果你有想找的資料，那麼具有那個資訊的光就會靠過來，像是跟你融合在一起。然後當它離開時，你就已經從它那裡瞭解了資料。我感覺自己因此得到許多新知識。


    朵：我想你的潛意識會把它渴望的資料吸引過來。

    S：我是吧。因為背景是深藍色，所以那些光真的很明顯很耀眼。


    朵：你是怎麼進入那個球體的？

    S：用想的把自己想進去。


    朵：就直接從牆壁或什麼的走進去？

    S：是啊。我有個感覺，你只要想著：「我現在想要在圖書館裡。」然後當你睜開眼的時候，你就在那裡了。那裡很美。圖書館是給所有靈魂存有使用。而那些在物質實相層面能夠接觸到這個圖書館的人也可以取得知識。


    一位女性個案到了圖書館後，在那裡觀察外太空。這似乎是詢問有關外星人和幽浮的最好時機。

    S：我現在正在看這個銀河系。圖書館的這區有全像式的效果，所以我覺得自己就像是在星群裡。我在冥想，冥想時我凝視著這些星星。我也一直在看著許多不同的星球和那裡的生命。

    朵：你能告訴我當你看著銀河系時你看到什麼嗎？

    S：哦，我看到地球。地球就像顆綠寶石。還有其他恆星也有像地球一樣的行星。其中有的有生命，有的沒有。生命在不同的發展階段。


    朵：你能看到我們這個太陽系裡的其他行星嗎？

    S：可以。有十顆。九顆是你們已經知道的，水星、金星、地球、火星、木星、土星、天王星、海王星、冥王星。科學家假設的那顆星球是在冥王星後面。它就在那裡。科學家已經給了它一個名字，但這個載具覺得很難發音。我不確定我能發出那個音。這個行星很遠，然而太陽仍是它的軌道中心。太陽看起來對它就只是一顆明亮的星星，因為太遠了。它沒有從太陽接收熱，但它確實繞太陽運行，所以會被視為這個太陽系裡的行星。


    朵：我想問些跟我們稱為幽浮和飛碟有關的問題。

    S：星際旅行工具，好的。

    朵：那是比較正確的詞彙。

    S：我知道你要談的這個現象的概念。幽浮有很多種類型。它們有同樣的基本形狀，這是因為有個銀河文明透過「時間扭曲」，能夠以快過光速的速度旅行，而交通工具必須是這個基本形狀，才能撐得過這個旅程，不過還是會有些細節上的不同，這是因為他們來自這個銀河文明裡的不同國家。不同的幽浮來到地球有不同的原因。其中一批，最古老的一批，他們一直在注意地球的發展。你們可以說地球一直是他們最得意的計畫。而這個特定的國家——我要這麼稱——他們是思想家和實驗者的國家。他們想知道，如果他們在這個星球歷史中一段可塑性很高的時期做了某特定行為，結果是否會一如他們的預測。


    朵：什麼行為？

    S：就是從地球還沒有生命的時候就開始溫和干預的一種穩定模式。地球就像是個能生育的子官，生命在這裡發展，他們則藉由在地球上播種原始生命（proto-life）來加速這個過程。這樣一來，他們可以控制生命的發展，看它會往哪個方向走，而非讓地球自行發展它的自然生命。你可以稱這些人是古代人。他們始終注意著地球，追蹤事物的发展。他們偶爾會給些助力，讓生命持續往他們要的方向發展。這個銀河裡的其他文明也為了不同的原因派太空船來到地球。其中一個定期派五艘飛船，看看這裡是否已發展出類似的科技，地球人是否已準備好要加入銀河文明，或至少跟這個偉大文明的一些成員有開放的貿易。有一個文明顯然心態比較多疑，派出的太空船只探索軍事設施，好確定我們的武器發展、軍隊和科技探索不會傷害到宇宙的其它地區。還有另一種類型的太空船來到地球，我說「類型」，不過這些工具基本上都很像。我要說的是幾個不一樣的，他們主要來自不同的地方。有一種太空船來地球只是出於好奇。他們一直想瞭解每個人的一切。他們從地球跟太陽的距離就知道地球可以支持生命的发展。他們觀察地球，發現這裡確實有生命，但他們看到在政治和宗教架構下所發生的事，他們知道直接跟這個星球上的生命接觸並不是好主意。主要是在於情況棘手，還有總是接近爆發邊緣的暴力。他們一直在注意人類，因為他們想與人類接觸。他們覺得兩個文明可以聯手建造出很偉大的事物，發展成一股銀河力量。他們看到我們很努力地在发展，只是還沒有準備好。適當的時機尚未來臨，所以他們還在等待。他們會試驗性地進行接觸，看看人類發展得如何。他們在不同的時期來到地球，偽裝自己混進人群。他們藉著心靈能力能夠感知人類社會和心理發展的普遍趨勢。偶爾他們會對人類做生理檢驗，追蹤人類生命科學發展的程度，因為他們在自己的星球很重視這一方面。他們有個理論，認為一個種族的生命科學的進步程度，還有他們一般來說在飲食、醫療照護、健康和營養方面是如何照顧自己，都會跟科技發展的程度類似。


    朵：他們不是唯一來到地球的外星人，是嗎？

    S：不是，不是。很多別的外星生命也一直在觀察地球，但他們是最密切的。他們是最容易跟我們最先接觸成功的外星生命之一。不過他們大多是被動觀察，他們才比較常介入。他們覺得離順利接觸人類並分享他們科技的時機已經越來越接近。這些是會旅行到你們星球的幽浮團體。他們是有肉身的類型，因為我覺得你問的資料是那些次元跟你們緊密重疊的太空船。他們的次元跟你們的次元非常靠近，所以你們要感知到他們並沒有困難。有好些個、好些個幽浮是你們永遠感知不到的，純粹是因為他們的次元跟你們的次元重疊得不夠。而這些幽浮的長、寬、高次元跟你們的感知密切對應，但他們時間的次元跟你們的不同。於是，從你們的觀點來看，(和它們有關的)
    時間似乎被扭曲了。由於時間的扭曲，這些幽浮看起來以非常快速和敏捷的方式行進。同時，當人類跟他們有近距離的接觸時，都會因為時間被扭曲，而感覺時間像是被無限地延伸。


    朵：這類太空船是來自哪裡？

    S：很難說，因為銀河系有很努力的星際社群，它們可以來自好幾個不同的地區，要看他們是為了什麼求你們的星球。他們全都知道彼此的存在。他們之間也經常有密切的接觸，看是什麼團體／族群。有一個是來自銀河系的另一個旋臂，要經過相當長程的旅行才到得了地球。他們對地球有很大的興趣，因為早在千萬年前他們就在地球留下早期的殖民地。因此，就某個意義而言，人類是他們的後裔。對地球有興趣的族群有好幾個。不過，要知道，地球不是他們唯一感興趣的星球。好幾個不同的族群因為不同的原因對不同行星的發展有興趣，這要看那些星球正在經歷什麼發展階段而定。所以很自然地，對地球發展有興趣的族群就會是最常跟你們接觸的外星人。其中有些族群聯合起來在這個區域的空間放置了暫時的隔離區，給地球一段自行發展的的時間。原因是人類正處於一個關鍵階段。以宇宙時間來看，不過是一眨眼之前，人類已進入核子時代，而這對任何文化都是關鍵時期。此刻，他們知道自己不敢干預，否則一切可能瓦解以至於毀滅。他們必須不採取行動地等待，看看一個新認識核動力的種族會如何應付和處理這個議題。如果處理得當，隔離便會消除，他們將開始派遣技術顧問來指導這個星球和人類，幫助你們做好加入銀河社群的準備。顧問將被派來激發新的想法、回答疑問，並對科學家說明他們以為不可能研究的一些領域，因為目前制定的科學法則就是什麼事情都有可能。人類要融入銀河社群的主要方式，是成為接近和接觸新宇宙，還有這些新宇宙裡的銀河社群的主要角色。因為人類有學習和理解新宇宙所必要的探究心靈，也有不受到新宇宙過度或不適當影響的力量。


    S：比較古老的力量。力量越古老，他們在銀河種族的階級越高。

    朵：所以，可以說有一個較高的力量在看顧著這一切。


    朵：我們對外星人綁架人類並帶上太空船的報告很有興趣。圖書館裡有任何關於這類外星人的資料嗎？

    S：有。在無數個世紀以前，他們乘著太空船來到地球。我稱他們為古代人，或ORION。他們對地球「播種」，好讓智能生物在這裡發展。他們也因此回來收集樣本，看看他們的「計畫」變得如何。他們在觀察情況的發展，因為他們想透過「間或的協助發展」的方式，在這個宇宙創造更多有智能的生命。他們覺得能做到這點的最好方法，是從地球上比較聰明的物種之一得到資料，而那就是人類。


    S：你可以告訴我一些古代人的事嗎？你說他們在地球有生命以前就在了？

    S：對。當地球還處於她很初始的階段，他們的科技就已經發展到銀河等級了。因為地球當時有極端氣候的問題，他們必須對地球工作。他們幫助地球平衡氣候，好讓生命能夠發展。偶爾，地球又會失去平衡，他們必須再幫她恢復平衡。過去的冰河世紀就是這樣子來的。

    朵：你的意思是他們積極的介入氣候？（是的。）他們也積極涉人物種的事嗎？

    S：是的，他們有進行基因操作。當物種開始發展之後，你必須試著加快發展的過程。我在《地球守護者》已發現這點，但只要有機會，我總是喜歡透過其他的個案確認這些理論。


    S：那是現代人之所以發展得這麼快速的一個原因。他們發現這種類人猿動物（猿猴），看到了基的潛力和更大的腦容量。他們看到手指的靈巧，知道牠們會很容易發展出工具和技術。這種手指對於技術在早期的發展很重要。於是他們開始操作，而第一件事便是改變骨骼結構，讓手能自由地製作工具。在手能自由且習於製作工具之後，他們開始致力於提高腦容量，讓人類能夠發展出他們現在有能力操作的技術。接著，他們開始密集地操作基因，在不危及這個種族的情況下，盡可能加速這個過程。他們在一個實驗室型態的地方做這件事，但他們也讓人類在自己的自然環境中發展。他們取了人類的精子和卵子，在實驗室裡操作基因，再回來以人工受精的方式讓女性受孕。他們從以前到現在一直在做這件事，古代的歷史將他們記錄成天使之類的訪客。

    S：噢，有的，從頭到尾，各個階段，他們都在協助生命往可行、可生存的方向前進。我當作什麼都不知道似地問問題，然而我是再一次地檢驗我已經得到的資料。如果好幾位個案都提供同類型的資訊，而且沒有矛盾，那麼資訊就更加正確可靠。

    朵：你能告訴我他們開始進行時的資料嗎？

    S：當單細胞動物出現時，他們促使它們增生成好幾種不同的類型，以便營造出平衡的生態。每當某種單細胞動物顯示出試圖凝集一起，成為多細胞組織的時候，他們會促使它發生，於是單細胞動物逐漸發展成多細胞生物之類的生命。他們一直在促進這件事，不是很激進，而是溫和地確定生命持續往正面、有效的方向發展。因為他們觀察過許多星球上的生命都是從單細胞階段發展，雖然單細胞會開始粘結成一團，卻總是不成功，於是又分開成只是單細胞動物，然後過了一陣子，單細胞動物開始相繼死亡，星球再次是沒有生命的狀態。


    朵：他們那時候也有操作基因嗎？

    S：那時比較像是選擇性育種。鼓勵最好的細胞，繁殖最有潛力的生命。很像你們選最好的動物育種，比如說，繁殖馬並培育他們發展出特定的特性。

    朵：那麼他們會讓其他沒有發展正確的動物絕種。

    S：對。他們對那些在演化路上走到盡頭的動物不會採取什麼行動。他們讓他們自己死亡。地球令他們興奮的事情之一，就在於這裡的分子和化學物質的豐富種類可以結合出無限的變化。當他們處理氣候時，他們讓氣候的狀況有利於這些不同的複合物結合成複雜的生命形式。在這個時候他們便開始積極地——干預不是正確的字——積極地參與。他們也協助這些複雜的形式結合更複雜的生命。他們當時必須做很多精細的化學工程。然後生命逐漸發展成……首先是病毒之類的微生物，繼而發展為單細胞動物。


    朵：你是說像阿米巴原蟲之類的嗎？

    S：它們先發展成病毒。就如你們所知，病毒在液態的媒介下，在水裡的時候，它可以像生物一樣運作。當你把它從水裡取出，它會乾掉成為晶體，然後就不動了。這有點是中間體的型態。後它便發展成更大的單細胞動物。


    S：對，他們運用自然的演化過程，但不斷推動他們進入確定的路線，這樣才能持續發展成較複雜的有機體而不致解體。因此這就像是在照料一個水耕園地一樣。

    朵：然後這些單細胞動物透過自然的演化過程開始改變。

    S：他們就是從那個時候，開始在月球上的，所以也算是在這裡。由於他們仍然在處理地球的氣候，得如何，並以此來調整化學作用。他們在進行這些的時候，一直都在附近密切觀察。

    朵：那一定用了非常多的時間。

    S：是的，這是個長程計畫。


    朵：所以他們多少是以這裡為基地，持續地來來回回。旅行到其他星球尋找適合的生命是古代種族平時在做的事嗎？

    做這個是因為他們自己最初開始時，有個種族一直在幫助他們。然而，到它們成為銀河的一股力量時，那個種族已經絕跡了。就文明而言，這個古代種族非常先進和古老。他們之所以一直努力幫助別的種族，原因之一是要協助這個銀河系成為一個平衡的社群，並且有能力與其他的銀河系互動，最後並與其他宇宙互動。


    **第六章 宇宙圖書館**


    朵：當他們在操作基因和發展物種的時候，有沒有出過什麼錯，發生過問題？

    S：有。他們偶爾會看到某個特定分支發展的方式不如預期，並且衍生出問題。或是它沒有照應有的方式發展。這時候他們會試著操作基因，或如果錯得太嚴重，他們會不再管那個物種，讓它走完它正常的演化過程。他們不會干預，但也不會主動滅除它們。

    朵：古代種族現在仍然積極透過基因操作來改變人類嗎？

    S：是的。他們現在做的事主要是要延長我們的壽命，幫助人體普遍變得更健康和強壯。他們也在協助醫療專業人員，讓他們較容易有新的發現。他們是透過心靈提供想法。

    朵：我被告知現在是人類知道自己種族的起源和一切是如何開始的時候了。

    S：是的。你們的科學家建立了演化的理論。他們是在正確的軌道上。他們只是不知道所有的事實，也不知道所有參與其中的影響力。

    朵：沒有外星人的干預，生命難道不會自行演化？

    S：這個觀點充滿變數。生命有可能會自發性地演化，但會花上更久的時間，而且一開始可能會有很多錯誤。有些生命會演化，然後滅絕。然後一切又要從頭來過。直到正確的組合開始發展。

    朵：如果沒有干預，你認為我們最後是否會演化到人類的階段？

    S：也許最後還是會，但所花的時間會多出上萬倍。

    朵：那麼在其他的星球有一些原生生物，而且沒有被干預嗎？

    S：當然。一個星球上的生命對那個星球來說，都是原生物種，只是環境被當成像溫室一樣。當你寫到這，我想到一九八○年代早期的一次催眠。個案看到自己身在一處不毛之地，似乎是在別的星球上。他和其他人還有一些機器在洞穴裡，他們在談論我們，也就是地球人，說他們在觀察我們。當時這聽起來很怪，但現在我懷疑個案在催眠中看到的也許是其中一個基地。


    朵：那我們的月亮呢？

    S：他們一直以我們的月亮為基地，直到二十世紀。那是個理想的地點。他們就在我們上面，所以，打個比方，他們不用下床就能觀察我們。他們把自動機器留在那裡。他們設置了自動信標和自動觀察設備，當他們想觀察得仔細一點時，他們可以調頻到他們的機器。他們偶爾會來保養和維修，但不會留下任何人員，因為人類正在積極探索月球，他們還不想與人類直接接觸。

    朵：我們的人有機會找到這個設備嗎？

    S：不見得。月亮挺大的，而且已經探索到的部份還很少。他們有能量保護罩可以偏移人類儀器的能量，所以當他們觀察人類的時候，不會被我們發現。

    朵：那麼透過望遠鏡也不能看到什麼？

    S：一般來說不能。有一個探測器差點發現那個設備，但設備的主人及時發現，對探測器做了點什


    監護人 THE CUSTODIANS'
  mdcn: '## 監護人 THE CUSTODIANS


    何人進入。它只是要讓資訊有條理地在這個區域裡。我猜你可以稱它是一種磁性索引系統，它會吸引資訊過去，然後快速移動，使資訊歸到正確位置。當你使用這間圖書館的時候，你的意識或什麼的會是在正中央飄浮，然後每一點資訊都在不同形狀的光裡，在周遭飄浮著，有時淚滴狀、時圓形，或很像聖誕樹的裝飾。它們全都閃爍著不同的顏色。不知道為什麼，光的形狀、顏色，還有它發亮的方式，會告訴你的意識它是哪一種資訊。


    朵：我很好奇它們的差別在哪裡？

    S：我猜就像是動物主題的書和政府部門的程序書等等諸如此類的東西。就是不同的主題。我有種感覺，如果你心裡沒有特別想知道什麼，那麼其中一個形狀就會觸發些什麼。但如果你有想找的資料，那麼具有那個資訊的光就會靠過來，像是跟你融合在一起。然後當它離開時，你就已經從它那裡瞭解了資料。我感覺自己因此得到許多新知識。


    朵：我想你的潛意識會把它渴望的資料吸引過來。

    S：我是吧。因為背景是深藍色，所以那些光真的很明顯很耀眼。


    朵：你是怎麼進入那個球體的？

    S：用想的把自己想進去。


    朵：就直接從牆壁或什麼的走進去？

    S：是啊。我有個感覺，你只要想著：「我現在想要在圖書館裡。」然後當你睜開眼的時候，你就在那裡了。那裡很美。圖書館是給所有靈魂存有使用。而那些在物質實相層面能夠接觸到這個圖書館的人也可以取得知識。


    一位女性個案到了圖書館後，在那裡觀察外太空。這似乎是詢問有關外星人和幽浮的最好時機。

    S：我現在正在看這個銀河系。圖書館的這區有全像式的效果，所以我覺得自己就像是在星群裡。我在冥想，冥想時我凝視著這些星星。我也一直在看著許多不同的星球和那裡的生命。

    朵：你能告訴我當你看著銀河系時你看到什麼嗎？

    S：哦，我看到地球。地球就像顆綠寶石。還有其他恆星也有像地球一樣的行星。其中有的有生命，有的沒有。生命在不同的發展階段。


    朵：你能看到我們這個太陽系裡的其他行星嗎？

    S：可以。有十顆。九顆是你們已經知道的，水星、金星、地球、火星、木星、土星、天王星、海王星、冥王星。科學家假設的那顆星球是在冥王星後面。它就在那裡。科學家已經給了它一個名字，但這個載具覺得很難發音。我不確定我能發出那個音。這個行星很遠，然而太陽仍是它的軌道中心。太陽看起來對它就只是一顆明亮的星星，因為太遠了。它沒有從太陽接收熱，但它確實繞太陽運行，所以會被視為這個太陽系裡的行星。


    朵：我想問些跟我們稱為幽浮和飛碟有關的問題。

    S：星際旅行工具，好的。

    朵：那是比較正確的詞彙。

    S：我知道你要談的這個現象的概念。幽浮有很多種類型。它們有同樣的基本形狀，這是因為有個銀河文明透過「時間扭曲」，能夠以快過光速的速度旅行，而交通工具必須是這個基本形狀，才能撐得過這個旅程，不過還是會有些細節上的不同，這是因為他們來自這個銀河文明裡的不同國家。不同的幽浮來到地球有不同的原因。其中一批，最古老的一批，他們一直在注意地球的發展。你們可以說地球一直是他們最得意的計畫。而這個特定的國家——我要這麼稱——他們是思想家和實驗者的國家。他們想知道，如果他們在這個星球歷史中一段可塑性很高的時期做了某特定行為，結果是否會一如他們的預測。


    朵：什麼行為？

    S：就是從地球還沒有生命的時候就開始溫和干預的一種穩定模式。地球就像是個能生育的子官，生命在這裡發展，他們則藉由在地球上播種原始生命（proto-life）來加速這個過程。這樣一來，他們可以控制生命的發展，看它會往哪個方向走，而非讓地球自行發展它的自然生命。你可以稱這些人是古代人。他們始終注意著地球，追蹤事物的发展。他們偶爾會給些助力，讓生命持續往他們要的方向發展。這個銀河裡的其他文明也為了不同的原因派太空船來到地球。其中一個定期派五艘飛船，看看這裡是否已發展出類似的科技，地球人是否已準備好要加入銀河文明，或至少跟這個偉大文明的一些成員有開放的貿易。有一個文明顯然心態比較多疑，派出的太空船只探索軍事設施，好確定我們的武器發展、軍隊和科技探索不會傷害到宇宙的其它地區。還有另一種類型的太空船來到地球，我說「類型」，不過這些工具基本上都很像。我要說的是幾個不一樣的，他們主要來自不同的地方。有一種太空船來地球只是出於好奇。他們一直想瞭解每個人的一切。他們從地球跟太陽的距離就知道地球可以支持生命的发展。他們觀察地球，發現這裡確實有生命，但他們看到在政治和宗教架構下所發生的事，他們知道直接跟這個星球上的生命接觸並不是好主意。主要是在於情況棘手，還有總是接近爆發邊緣的暴力。他們一直在注意人類，因為他們想與人類接觸。他們覺得兩個文明可以聯手建造出很偉大的事物，發展成一股銀河力量。他們看到我們很努力地在发展，只是還沒有準備好。適當的時機尚未來臨，所以他們還在等待。他們會試驗性地進行接觸，看看人類發展得如何。他們在不同的時期來到地球，偽裝自己混進人群。他們藉著心靈能力能夠感知人類社會和心理發展的普遍趨勢。偶爾他們會對人類做生理檢驗，追蹤人類生命科學發展的程度，因為他們在自己的星球很重視這一方面。他們有個理論，認為一個種族的生命科學的進步程度，還有他們一般來說在飲食、醫療照護、健康和營養方面是如何照顧自己，都會跟科技發展的程度類似。


    朵：他們不是唯一來到地球的外星人，是嗎？

    S：不是，不是。很多別的外星生命也一直在觀察地球，但他們是最密切的。他們是最容易跟我們最先接觸成功的外星生命之一。不過他們大多是被動觀察，他們才比較常介入。他們覺得離順利接觸人類並分享他們科技的時機已經越來越接近。這些是會旅行到你們星球的幽浮團體。他們是有肉身的類型，因為我覺得你問的資料是那些次元跟你們緊密重疊的太空船。他們的次元跟你們的次元非常靠近，所以你們要感知到他們並沒有困難。有好些個、好些個幽浮是你們永遠感知不到的，純粹是因為他們的次元跟你們的次元重疊得不夠。而這些幽浮的長、寬、高次元跟你們的感知密切對應，但他們時間的次元跟你們的不同。於是，從你們的觀點來看，(和它們有關的)
    時間似乎被扭曲了。由於時間的扭曲，這些幽浮看起來以非常快速和敏捷的方式行進。同時，當人類跟他們有近距離的接觸時，都會因為時間被扭曲，而感覺時間像是被無限地延伸。


    朵：這類太空船是來自哪裡？

    S：很難說，因為銀河系有很努力的星際社群，它們可以來自好幾個不同的地區，要看他們是為了什麼求你們的星球。他們全都知道彼此的存在。他們之間也經常有密切的接觸，看是什麼團體／族群。有一個是來自銀河系的另一個旋臂，要經過相當長程的旅行才到得了地球。他們對地球有很大的興趣，因為早在千萬年前他們就在地球留下早期的殖民地。因此，就某個意義而言，人類是他們的後裔。對地球有興趣的族群有好幾個。不過，要知道，地球不是他們唯一感興趣的星球。好幾個不同的族群因為不同的原因對不同行星的發展有興趣，這要看那些星球正在經歷什麼發展階段而定。所以很自然地，對地球發展有興趣的族群就會是最常跟你們接觸的外星人。其中有些族群聯合起來在這個區域的空間放置了暫時的隔離區，給地球一段自行發展的的時間。原因是人類正處於一個關鍵階段。以宇宙時間來看，不過是一眨眼之前，人類已進入核子時代，而這對任何文化都是關鍵時期。此刻，他們知道自己不敢干預，否則一切可能瓦解以至於毀滅。他們必須不採取行動地等待，看看一個新認識核動力的種族會如何應付和處理這個議題。如果處理得當，隔離便會消除，他們將開始派遣技術顧問來指導這個星球和人類，幫助你們做好加入銀河社群的準備。顧問將被派來激發新的想法、回答疑問，並對科學家說明他們以為不可能研究的一些領域，因為目前制定的科學法則就是什麼事情都有可能。人類要融入銀河社群的主要方式，是成為接近和接觸新宇宙，還有這些新宇宙裡的銀河社群的主要角色。因為人類有學習和理解新宇宙所必要的探究心靈，也有不受到新宇宙過度或不適當影響的力量。


    S：比較古老的力量。力量越古老，他們在銀河種族的階級越高。

    朵：所以，可以說有一個較高的力量在看顧著這一切。


    朵：我們對外星人綁架人類並帶上太空船的報告很有興趣。圖書館裡有任何關於這類外星人的資料嗎？

    S：有。在無數個世紀以前，他們乘著太空船來到地球。我稱他們為古代人，或ORION。他們對地球「播種」，好讓智能生物在這裡發展。他們也因此回來收集樣本，看看他們的「計畫」變得如何。他們在觀察情況的發展，因為他們想透過「間或的協助發展」的方式，在這個宇宙創造更多有智能的生命。他們覺得能做到這點的最好方法，是從地球上比較聰明的物種之一得到資料，而那就是人類。


    S：你可以告訴我一些古代人的事嗎？你說他們在地球有生命以前就在了？

    S：對。當地球還處於她很初始的階段，他們的科技就已經發展到銀河等級了。因為地球當時有極端氣候的問題，他們必須對地球工作。他們幫助地球平衡氣候，好讓生命能夠發展。偶爾，地球又會失去平衡，他們必須再幫她恢復平衡。過去的冰河世紀就是這樣子來的。

    朵：你的意思是他們積極的介入氣候？（是的。）他們也積極涉人物種的事嗎？

    S：是的，他們有進行基因操作。當物種開始發展之後，你必須試著加快發展的過程。我在《地球守護者》已發現這點，但只要有機會，我總是喜歡透過其他的個案確認這些理論。


    S：那是現代人之所以發展得這麼快速的一個原因。他們發現這種類人猿動物（猿猴），看到了基的潛力和更大的腦容量。他們看到手指的靈巧，知道牠們會很容易發展出工具和技術。這種手指對於技術在早期的發展很重要。於是他們開始操作，而第一件事便是改變骨骼結構，讓手能自由地製作工具。在手能自由且習於製作工具之後，他們開始致力於提高腦容量，讓人類能夠發展出他們現在有能力操作的技術。接著，他們開始密集地操作基因，在不危及這個種族的情況下，盡可能加速這個過程。他們在一個實驗室型態的地方做這件事，但他們也讓人類在自己的自然環境中發展。他們取了人類的精子和卵子，在實驗室裡操作基因，再回來以人工受精的方式讓女性受孕。他們從以前到現在一直在做這件事，古代的歷史將他們記錄成天使之類的訪客。

    S：噢，有的，從頭到尾，各個階段，他們都在協助生命往可行、可生存的方向前進。我當作什麼都不知道似地問問題，然而我是再一次地檢驗我已經得到的資料。如果好幾位個案都提供同類型的資訊，而且沒有矛盾，那麼資訊就更加正確可靠。

    朵：你能告訴我他們開始進行時的資料嗎？

    S：當單細胞動物出現時，他們促使它們增生成好幾種不同的類型，以便營造出平衡的生態。每當某種單細胞動物顯示出試圖凝集一起，成為多細胞組織的時候，他們會促使它發生，於是單細胞動物逐漸發展成多細胞生物之類的生命。他們一直在促進這件事，不是很激進，而是溫和地確定生命持續往正面、有效的方向發展。因為他們觀察過許多星球上的生命都是從單細胞階段發展，雖然單細胞會開始粘結成一團，卻總是不成功，於是又分開成只是單細胞動物，然後過了一陣子，單細胞動物開始相繼死亡，星球再次是沒有生命的狀態。


    朵：他們那時候也有操作基因嗎？

    S：那時比較像是選擇性育種。鼓勵最好的細胞，繁殖最有潛力的生命。很像你們選最好的動物育種，比如說，繁殖馬並培育他們發展出特定的特性。

    朵：那麼他們會讓其他沒有發展正確的動物絕種。

    S：對。他們對那些在演化路上走到盡頭的動物不會採取什麼行動。他們讓他們自己死亡。地球令他們興奮的事情之一，就在於這裡的分子和化學物質的豐富種類可以結合出無限的變化。當他們處理氣候時，他們讓氣候的狀況有利於這些不同的複合物結合成複雜的生命形式。在這個時候他們便開始積極地——干預不是正確的字——積極地參與。他們也協助這些複雜的形式結合更複雜的生命。他們當時必須做很多精細的化學工程。然後生命逐漸發展成……首先是病毒之類的微生物，繼而發展為單細胞動物。


    朵：你是說像阿米巴原蟲之類的嗎？

    S：它們先發展成病毒。就如你們所知，病毒在液態的媒介下，在水裡的時候，它可以像生物一樣運作。當你把它從水裡取出，它會乾掉成為晶體，然後就不動了。這有點是中間體的型態。後它便發展成更大的單細胞動物。


    S：對，他們運用自然的演化過程，但不斷推動他們進入確定的路線，這樣才能持續發展成較複雜的有機體而不致解體。因此這就像是在照料一個水耕園地一樣。

    朵：然後這些單細胞動物透過自然的演化過程開始改變。

    S：他們就是從那個時候，開始在月球上的，所以也算是在這裡。由於他們仍然在處理地球的氣候，得如何，並以此來調整化學作用。他們在進行這些的時候，一直都在附近密切觀察。

    朵：那一定用了非常多的時間。

    S：是的，這是個長程計畫。


    朵：所以他們多少是以這裡為基地，持續地來來回回。旅行到其他星球尋找適合的生命是古代種族平時在做的事嗎？

    做這個是因為他們自己最初開始時，有個種族一直在幫助他們。然而，到它們成為銀河的一股力量時，那個種族已經絕跡了。就文明而言，這個古代種族非常先進和古老。他們之所以一直努力幫助別的種族，原因之一是要協助這個銀河系成為一個平衡的社群，並且有能力與其他的銀河系互動，最後並與其他宇宙互動。


    **第六章 宇宙圖書館**


    朵：當他們在操作基因和發展物種的時候，有沒有出過什麼錯，發生過問題？

    S：有。他們偶爾會看到某個特定分支發展的方式不如預期，並且衍生出問題。或是它沒有照應有的方式發展。這時候他們會試著操作基因，或如果錯得太嚴重，他們會不再管那個物種，讓它走完它正常的演化過程。他們不會干預，但也不會主動滅除它們。

    朵：古代種族現在仍然積極透過基因操作來改變人類嗎？

    S：是的。他們現在做的事主要是要延長我們的壽命，幫助人體普遍變得更健康和強壯。他們也在協助醫療專業人員，讓他們較容易有新的發現。他們是透過心靈提供想法。

    朵：我被告知現在是人類知道自己種族的起源和一切是如何開始的時候了。

    S：是的。你們的科學家建立了演化的理論。他們是在正確的軌道上。他們只是不知道所有的事實，也不知道所有參與其中的影響力。

    朵：沒有外星人的干預，生命難道不會自行演化？

    S：這個觀點充滿變數。生命有可能會自發性地演化，但會花上更久的時間，而且一開始可能會有很多錯誤。有些生命會演化，然後滅絕。然後一切又要從頭來過。直到正確的組合開始發展。

    朵：如果沒有干預，你認為我們最後是否會演化到人類的階段？

    S：也許最後還是會，但所花的時間會多出上萬倍。

    朵：那麼在其他的星球有一些原生生物，而且沒有被干預嗎？

