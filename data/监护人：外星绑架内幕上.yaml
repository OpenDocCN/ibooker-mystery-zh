    # 第一章 改变探索的方向


    一九七九年，我开始从事回溯催眠和前世疗法的工作。当时我从来没想道这条路将会带我通往如此奇特的地方和情境。


    在随后的岁月，我被带引走上陌生的偏僻小径，有过不可思议的冒险，遇到来自过去幻境的有趣个案，并且取得了原本以为已经永远失去的珍贵资料。这些都是透过惊人的回溯催眠技巧才得以揭露。我的时间全用在探索过去，并把发现写成书。我被自己那永不能满足的好奇心、对研究的极度渴望，以及对知识的热爱席捲，它们一路支持著我持续探索。


    我对于将催眠应用在个案目前的生活并不是那么关切，除非它可以用来解决个案人生裡的问题；像是因前世产生的恐惧症或健康问题，或是从前世带来的业力连结影响到这一世的家庭关系。


    我在进行前世回溯时，只使用催眠的标准作法，也就是帮助个案瞭解和控制习性（抽菸和暴食等等）。


    我发展出的催眠技巧自动就能把个案带入前世的情境，因此我并不用把焦点放在他们这一世。然而，这一切都在我无意间地被导向幽浮绑架现象之后有了改变。我的探险转入了迥然不同和意想不到的方向。许多门开启了，而我得以瞥见其他人认为不应揭露，且被未知的阴鬱和黑暗所掩盖的世界。


    有些人說，最好不要去探究人類心靈無法理解的事物。但是，如果那裡是知識和領悟的蘊藏之地，我知道我一定會去搜尋並提出無止盡的問題。任何研究的新管道對我都是挑戰，而且是我無法忽略的挑戰。只是，在進入這個研究領域之後，我不僅偏離了尋常的路線，我也需要改變技巧去適應新的狀況。


    我所所謂「飛碟」的不明飛行物向來很感興趣。我閱讀過大部分跟這個現象有關的文獻資料，其中最令我印象深刻的是最初在一九六○年代發生的案例，也就是貝蒂與巴尼·希爾（Betty
    and Barney Hill）的《被打斷的旅程》[The Interrupted Journey] 。那是所謂「外星綁架」案例的始祖，其中許多描述讓我相信希爾夫婦的經歷是確有其事。我也會讀那些對天空上奇怪且不肯默默消失的事件的評論。在權衡過正反兩方的意見後，我相信真的有些什麼事正在發生，而它並無法以懷疑論者的理性和邏輯思維去解釋。也許這個主題從來就沒有要合乎邏輯、原本就非三言兩語能夠解釋得清楚。也許外星人的策略就是要達成他們現在正做的：激起人類的好奇心，去思考那些不可能的事。


    一九四○年代晚期和五○年代初期，「飛碟」報導首次對大眾披露，卻普遍遭到嘲笑。當時還十多歲的我不斷想，那些事很可能真有點什麼玄機。這些年來，我對閱讀和追蹤最新的發展始終是被動的，我從沒想過自己會主動做起研究，甚至直接與來自另一個存在領域的外星人溝通。或許在詭異的領域工作多年，已經為我终于要發生的接觸做好了準備，因為當發生時，我既不感到震驚或不敢置信，也一點都不害怕。我只是好奇。好奇已成為我的註冊商標，並且幫助我取得了許多資料。


    會議還沒結束，我對在場人士的感覺已經自在許多，於是透露了我是研究前世的催眠師。我預期他們會不怎麼理我，因為催眠絕對不是一種會被視為「科學」的方法。然而，出乎我的意料，華特說催眠有可能是很有用的工具，而任何能協助揭露資訊的工具都受到他們的歡迎。


    會議過後，我和開始和盧修斯通訊。他支持我的工作，並沒有像我曾擔心的那樣取笑我。過了一年，我才第一次接觸對幽浮的催眠研究。也就是在大概這個時候，恐怖小說家惠特里·史崔伯（Whitney
    Strieber）的著作《交流》（Communion）在螢幕上大放異彩。包德·霍普金（Bard Hopkin）巧的是，一九八六年五月，我的文學經紀人拿了史崔伯的書給我，告訴我裡面有透過回溯催眠所得到的對幽浮的描述，建議我讀一讀。同時，盧修斯（朋友都叫他盧）也打電話來，他說希金斯又要在費耶特維爾的家裡舉辦年度會議。盧提到，有個認為自己曾被外星人綁架的女子跟他聯絡，希望能做回潮催眠。盧想知道我不願意催眠她。雖然我在這個領域毫無經驗，盧認爲我應付得來。


    畢竟，要找到一個對這類事情有經驗的人（尤其是在阿肯色州）也很困難。盧說，大多數的精神病學家和心理學家不想處理這類不屬於他們專業領域的案例。


    單是知道如何進行催眠並不足以勝任這個工作，你必須要能很自在地板不尋常的事物交手、不被出現的任何狀況干擾，並且要能進行客觀的調查才行。我至少符合這點。我在詭異和超自然的領域已工作許久，我不認爲會有什麼事情能令我驚訝。如果我可以處理死於原子彈爆炸的男子《魂憶廣島》裡的個案），或是親眼目睹基督被釘死在十字架上的個案經驗（《耶穌與艾賽尼教派》的案


    例），我應該會比大多數調查員更能處理人類被來自外太空的外星人綁架的事件吧。

    由於會議預計有三十個人出席，我擔心那樣的氛圍是否適合進行這類回溯。那不會是有助進行一場成功催眠的放鬆環境。我平常都是到個案的家裡，在絕對的隱私下進行療程。偶爾可能有人在場，但那向來是經過個案的同意（那些人往往是應個案的要求才來），人數通常也很少。為了要讓個案能夠放鬆，氣氛十分重要。我告訴盧，那個女孩會像是被放在玻璃的金魚缸裡向大家展示，我不知道她對現場有這麼多人會有什麼反應。我認為，觀眾一定會影響到結果。

    因為這類個案超越了我平常的催眠範圍，我也不免暗自擔心。我對於該如何進行並不是很確定。我的催眠法會讓個案自動回到前世，但現在我必須修正和改變工作習慣，好讓個案能夠專注在今生的事件，不要回到過去。我因為使用過許多不同的技巧，所以知道自己一定能夠找到一個有效的方法；我只是必須改變程序，而我並不知道時會有怎樣的效應或結果。

    我的其他方式都是可預期的，即使偶爾會有極少數人拒絕照模式走，但當遇到這種情形，催眠師只要懂得改變技巧，去順應當時的情況即可。然而，在這個情形，我並沒有時間演練或找出新的方法。我只能現場反覆試驗，見機行事了。滿室旁觀者對實驗的進行真的不是很有幫助。

    總之，我在忐忑不安的情況下開始對這位年輕女子催眠，我心裡擔憂的不是主題，而是必須改變固定的工作模式。我又一次邁入未知的領域，這其中因為牽涉許多因素，讓我無法確知結果會是如何。


    令人驚奇的是，我的技巧轉換非常有效，我們獲得了很多資料。催眠進行得非常順利，在場人士並不曉得那是我第一次接這類個案。對我來說，那是開啟幽浮調查之門的指標案例。在此之前，我從未聽說有小灰人會在夜間把人從家中帶到太空船上做試驗。我也是第一次聽說有星際地圖，還有可回溯至童年的（外星）接觸等等。這也是我第一次接觸到個案的恐懼和創傷；這些感受是如此強烈，以至於情緒封鎖住了資訊。


    那位年輕女子在過程中只能敘述她看到和聽到的事，無法回答我問的許多問題，而這一切只引起了我的興趣和好奇。我知道我可以發展出一種避開情緒的技巧，讓潛意識來提供答案。這樣的方法在別的個案很有效，因為潛意識擁有所有的資訊。我認為我只要能設計出方法，潛意識在這類案例也一定能發揮作用。


    當時，我已經在奇怪和詭異的領域中工作，因為就是在同一年（一九八六年）我開始接觸了諾斯特拉達姆斯（Nostradamus）。接下來的三年，我都在寫《與諾斯特拉達姆斯對話》三部曲。因此，不尋常的怪異事件和未知的領域並沒有嚇到我，反而喚醒了我作為報告者的好奇心，以及對擁有更多知識的渴望。


    那天離開會議要回家時，已過了午夜。在這樣的經歷之後，我實在不喜歡那麼晚在沒有車的鄉間公路上行駛。所有奇怪的新資訊一股腦地湧上心頭，我不免疑神疑鬼，在獨自一人駕車的途中，不斷小心地看著天空。這次的回溯催眠是否表示外頭真有外星人在跟人類接觸？萬一他們知道我剛做了這次催眠會怎樣？也許就在這個當下，他們正在看著我。


    這個念頭讓我一路上心神不安。當我把車停進家裡的車道，大鬆一口氣時，已經凌晨一點了。


    我知道自己想要更進一步探索這個領域，但也明白，在面對外太空生物跟人類接觸的事件時，我有必要先處理自己這個非常人類的感受。我會感到恐懼是自然的。這些年來，看多了奇怪嚇人的外星人試圖佔領世界的恐怖電影，我們早就被洗腦了。這些生物呈現出的形象向來是威脅而不是協助者。我要如何才能防止個案受到我個人感受的影響？我很清楚個案在催眠的出神狀態下，會對包括催眠師心態在內的所有一切，變得更為敏銳。


    這個案子開啟了我跟類似案例合作的大門。它是典型的綁架情境，後來類似案例一而再，再而三出現，現在已是司空見慣了。我從工作中看到了浮現的模式，而當這同一個模式重複出現，我很快就會知道自己面對的究竟是真實的案例或只是幻想。


    個案總是看到眼睛很大的小灰人對他們進行各種醫療檢驗，偶爾會在檢驗時看到比較近似人類的明亮光線，類似昆蟲的奇怪外星人也時有所聞。而每一次都會有弧形的房間、桌子、對著桌子照射的星際圖或一本書，並說時機來臨時，個案就會想起並理解那本書的內容。許多個案早在童年時期便與外星人有過接觸；十歲似乎是一個關鍵期。個案的母親和外婆雖然不怎麼情願，卻也敘述了類似的外星人探訪和事件。


    這讓我覺得這是一個針對好幾個世代研究並長期監控的實驗室實驗。


    同一時期，我開始與菲爾合作，得到的資料後來寫成了《地球守護者》。片段段的資訊逐漸拼湊了起來。那本書討論來自外太空的外星人對地球播種的古代太空人理論。我知道了外星人從地球生命開始便觀察人類直到現在。所以，還有什麼會比外星人至今仍監控我們，觀察人類發展更自然的事呢？對我來說，這就是檢查的原因，但為了讓當事人的生活不受影響，事情必須隱密地進行。在《地球守護者》裡，我被告知最理想的狀況是當事人對發生過的事沒有任何印象，繼續過著他們正常的生活。但我發現還是有些個案會想起令他們創痛的事件，而且往往是透過夢境，而非有意識地回想起來。


    我也被告知，地球大氣中的化學物質和汙染，還有人體內的藥物和酒精都會影響人腦的化學作用。這些會導致人們想起被綁架的點滴和片段，但是那些記憶會被情緒所扭曲。他們記起的並不是實際的事件。個案的意識心把事件轉變成了一個情緒高張的記憶。我的工作就是要越過意識的情緒，直接與潛意識對話，就跟我在其他案例所做的一樣。經驗告訴我，答案就藏在潛意識裡。移除了情緒化的意識心智影響之後，真相自然會浮現。


    為什麼？許多調查員只研究目擊幽浮和外星人降落之類的具體跡證，然後就止步不前了。有的研究員只研究綁架事件，然後就不再深入。我也是從這些事情開始，但卻一直走了下去。我瞥見了一個現在正開始浮現的廣大全貌，而那是我們人類心靈幾乎無法理解的奧秘，它將是有史以來呈現給人類的最重要的全局。一個有關我們是誰、我們從哪裡來，以及我們要去做什麼的故事。人類是否已經準備好要學習關於自己故事的奧秘了？


    幾位作家和研究幽浮現象的調查員一致認為，不論有沒有經過我們的同意，外星人似乎是在進行跟基因操作有關的某類工作。跡象也顯示，這不完全是出於自私的科学動機，卻像是在執行上級的命令，就像醫院人員執行各種測試和檢驗時，通常會表現出的那種冷淡漠然的態度。有多少次我們想知道醫院檢驗的理由，一樣也被冷淡對待？當我們的孩子顯露出同樣的恐懼和好奇，為了讓他們安靜，我們會對他們說醫生需要知道某些事，這些事他們不會懂，就照醫生說的去做，一點也不會痛的。即使我们知道檢查的原因，可能也不會花時間去跟孩子解釋，因為我們認為這樣只會讓孩子害怕，更何況，他們無論如何都不會瞭解。於是我們試圖讓孩子保持安靜，直到該做的事完成。


    然後我們常聽到孩子說：「媽，你跟我說不會痛，可是明明就會！」這會造成不信賴感，就好像他們被欺騙了一樣。在某些情況下，甚至會導致孩子對醫生、護士或醫院產生恐懼。也許我們誤判了孩子，以為他們沒有理解能力；但事實卻不然。


    外星人也表現出同樣的態度，他們就像是面對孩童或智力不足的人，即使他們解釋原因，對方也無法瞭解。被綁架者也跟我們的孩子有類同的反應，他們說外星人沒有權力用這種方式對待他們。他們說外星人不尊重他們，也不費心解釋究竟是怎麼回事。


    如果這些檢查和試驗涉及許多人、佔了地球人口不小的比例，我認為這可以跟每天都要進行數行跟基因操作有關的某類工作。跡象也顯示，這不完全是出於自私的科学動機，卻像是在執行上級的命令，就像醫院人員執行各種測試和檢驗時，通常會表現出的那種冷淡漠然的態度。有多少次我們想知道醫院檢驗的理由，一樣也被冷淡對待？當我們的孩子顯露出同樣的恐懼和好奇，為了讓他們安靜，我們會對他們說醫生需要知道某些事，這些事他們不會懂，就照醫生說的去做，一點也不會痛的。即使我们知道檢查的原因，可能也不會花時間去跟孩子解釋，因為我們認為這樣只會讓孩子害怕，更何況，他們無論如何都不會瞭解。於是我們試圖讓孩子保持安靜，直到該做的事完成。


    然後我們常聽到孩子說：「媽，你跟我說不會痛，可是明明就會！」這會造成不信賴感，就好像他們被欺騙了一樣。在某些情況下，甚至會導致孩子對醫生、護士或醫院產生恐懼。也許我們誤判了孩子，以為他們沒有理解能力；但事實卻不然。


    外星人也表現出同樣的態度，他們就像是面對孩童或智力不足的人，即使他們解釋原因，對方也無法瞭解。被綁架者也跟我們的孩子有類同的反應，他們說外星人沒有權力用這種方式對待他們。他們說外星人不尊重他們，也不費心解釋究竟是怎麼回事。


