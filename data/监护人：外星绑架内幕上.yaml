    長。嬰兒之間不但會用心靈互相溝通，他們還懂得很多複雜的辭彙。每個孵育箱中的嬰兒似乎都是在同樣的發展階段。他們的皮膚發亮，散發著珍珠光澤，白到近乎透明。

    接著，有個女子進來房間，她掉了顆膠囊在地上。它看起來像是緩釋膠囊，只不過是透明的。

    這是用來放進液體裡，長嬰兒用的。我以為她的意思是那個膠囊裡的東西被加到液體裡，用來幫助嬰兒的成長。但她強調膠囊就是嬰兒。

    「它就像是會長出嬰兒的種籽。他們把膠囊放進液體，嬰兒就從膠囊中長出來，然後繼續長大。

    可是她掉了這個在地板上，所以我彎下身子，撿起膠囊，放進我的口袋裡。我想要跟別人說，拿給他們看，因為我知道這就是他們（指外星人）的方法。可是房間裡有人說我不該有這個膠囊。他們在生氣，所以我很害怕。就在那個時候，我醒了。」

    凱莉繼續說：「總之，這就是我的夢。到現在我還忘不了。整個大學時期，我不斷夢到同一個夢的片段。我有個感覺，覺得自己晚上在那個育嬰室工作，而不是在睡覺。難怪我醒來時總會那麼累。我不知道這跟幽浮有沒有關係。我是個藝術家，是個創作的人。有可能是因為這樣，或者那只是個夢。即使做了催眠，我記得的事可能也不會比我现在告訴你的多。」

    催眠時，康妮在一旁觀看。凱莉告訴我她想搜尋的大致日期，我們同意盡可能探索所有的事件。

    過去的經驗告訴我，如果事件只是夢，潛意識會據實以告，如果她不回溯到那一天，我們就不會知道真相。

    凱莉證實是個優秀的個案，很快便進入很深的出神狀態。我帶她回到靈魂出竅看到幻象的那一


