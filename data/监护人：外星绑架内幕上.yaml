- md: '## 貝芙莉的催眠與幽浮事件


    貝：我想接納大概是唯一的答案。我不知道還能建議什麼……雖然我知道的或許比我以為的更多……但我知道的事情比他們少太多了。我要處理的是超越了我所知道的。


    朵：沒錯。在這種情況下，最好是去忽略它。但在身體上，我們想要減輕這些物體可能造成的問題。


    我於是引導貝芙莉回到現在，將她帶回完全清醒的狀態。我照她在催眠開始前的要求，給予戒菸的暗示。她醒後只記得戒菸指令的一部份，還有潛意識對她戒除這些習性有多麼困難的評論。她對腦裡有東西的部份沒有印象。我想也最好不要現在就告訴她。她聽了錄音帶以後就會知道。或許到時她會比較能夠接受。我不想讓她沮喪或受到驚嚇。


    我後來沒有再催眠貝芙莉。她決定不再探索幽浮事件。顯然她的潛意識認為她發現的事情已經夠多了，不想讓她的生活複雜化。大概也是基於同一個理由，她把錄音帶束之高閣，一次也沒聽。


    令人驚訝的是，我的個案中有很多人始終無法鼓起勇氣去聽催眠療程的錄音。催眠結束後，他們就把錄音帶收了起來。或許這樣也好。


    我們始終沒有找出貝芙莉為什麼會有奇怪的健康問題。或許這是外星人監控她的原因之一；他們可能也想瞭解吧。


    貝芙莉繼續過著畫招牌看板和兼職畫家的生活，所以這些奇怪的催眠療程顯然沒有不好的影響。


    ## 第五章 埋藏的记忆


    ### 我的笔记：


    一九八八年十二月十八日，我在大約凌晨三點醒來去上廁所。當我走出臥室，經過短短的走廊到廁所時，我注意到有道明亮的光，從前廳的大觀景窗投射進來，不僅照亮了房間裡大半的東西，也照射到走廊的牆壁。我對自已說，一定是滿月，滿月的光就是這麼亮。我在臥房的時候沒注意到這些事件，特別是在涉入幽浮調查之後，我都會把自己生活裡發生的怪事做記錄。我從不曉得這些事究竟是不是超自然現象，但如果它們不尋常到足以引起我的注意，我就會寫下來。我也不知道以後是否會派上用場。我和個案合作時也是一樣。由於做了大量的筆記，當我想把事件寫到書裡時，往事又會歷歷在目。本書的細節就是這麼來的。


    在編纂本書的焦點案例時，我翻閱我的筆記，發現自己曾發生過一件讓我聯想到貝芙莉的事。我一直認為貝芙莉醒來後發現後院有奇怪的光線，卻不起床察看的反應很奇怪。但在我自己的事件中，我也表現出同樣的無動於衷，並在不尋常事件發生的當下，把它當成正常的事去接受。


    以上這些案例大多是在一九八○年代晚期，尤其是貝芙莉的相关事件。我的筆記記載我的經歷發生在一九八八年十二月，正是調查這些事件的高峰期。不過我在當時並沒想到兩者之間的關聯。


    ## 監護人 THE CUSTODIANS


    這個光，因為為了擋光，那裡的窗簾都拉上了。


    我在廁所時是面向走廊，透過廁所門口可以看到走廊牆壁，我發現前廳投射進來的光線就照在部份的牆壁上。我什麼都還沒想，突然間那光就離開了，一切都暗了下來。光不是啪地一下子不見，而是較漸進式的，但速度還是很快。黑暗似乎從右邊往左移動，快速把光吞沒。光只有再短暫地閃現一下，然後整個房子就都變得非常暗。我立刻想到一定是有雲飄過月亮，遮住了月光，雖然那一定是一朵移動很快速的雲。如果有強風的話，確實會如此。不過當我從廁所回到房間，拉開窗簾往外看時，卻不見月亮和雲層，也不覺得有風。那是個平靜、清澈、星光點點的夜晚。


    我納悶自己如果先去了前廳而不是廁所，是不是會看到大觀景窗外頭有什麼東西。我經常會到窗前觀望月亮或星星，但內急卻讓我沒法做別的事。光消失的方式暗示了移動，就像是從窗戶的左邊移動到右邊。這可以解釋走廊是從另一個方向一路暗下來的情況。


    我的房子跟別的房子不一樣，建造的方式並不一般。它有兩層樓，客廳、臥室和廚房都在二樓，但後來放棄了這個推測。道路在幾百呎外，房子又被一排濃密的樹木遮蔽。我考慮過有車子經過家門前道路的可能，我曾經看過車子來回經過這條路上許多次，每次車燈投射到牆上的光都是分散和閃爍的，這是因為樹林的關係。每當有車子經過時，樹的輪廓也一定會映照在牆上。即使是車子開上我家車道，然後停在門前，那個光線也不一樣。我觀察過這個情況許多次了。那道光並不是從路上或車道投射進來的車燈。它一定是從一個較高的角度照進來，而且是非常耀眼的光，不然不能照亮整個房間和走廊。


    約莫一週之後才真的是滿月。我觀察滿月是否會在晚上造成同樣效果，結果發現一年之中的這個時候（冬天），月亮會直接越過屋頂，而不是像夏天那般掛在窗前。因此，從窗外投射進來的月光角度不一樣，並沒有造成我先前看到的光影效果。直到現在我還是在納悶，如果早點去窗前的話，不知道會不會看到什麼。


    我並不是說我看到的光是一架幽浮，但這件事顯示當我們在夜間因奇怪的光或聲音而醒來時，我們的反應和行為卻不見得會依常理走。


    ## 第六章 宇宙圖書館


    當個案進入出神的夢遊狀態後，有很多方式可以獲得資訊。但由於他們侷限在某特定一世的身體裡，所以會受到限制和阻礙。個案只能描述他們個人所知並在那一世接觸到的事物。我發現最好的資料是來自當我引導個案進入人世之間（一世與下一世間）的過渡期，也就是所謂的「死亡」狀態的時候。這時物質身體的限制移除了，遮蔽的眼罩也被取下，他們有管道取得想要探索的任何資料。


    我在靈界發現了一個神奇的地方，那裡有無限的知識。我最喜歡在靈界的圖書館調查和研究。我的個案曾用很多不同的方式描述，但我相信他們談的都是同一個地方，只是以各自的認知替它定位。許多人形容它是一棟真實的建物，那裡有許多不同形式的知識，尋找者依他本身的進化程度而取得。不僅書架上有書可以閱讀，當事人也可以進入房間，資訊會以3D全像的方式呈現在牆面上。


    許多時候，當我們進入圖書館時，會有一位看守者或圖書館員來迎接，理論上是要審核我們是否有使用的許可。接著，他會引導我們到圖書館的適當區域，我們可以在那裡找到要找的資料。雖然在少數案例裡，個案對圖書館的描述不太一致，但我相信他們說的都是靈界的同一個地方。


    有位個案這麼描述：那是所有世界裡我最喜歡的圖書館。


    朵：我去過圖書館。你可以跟我說你的圖書館是什麼樣子嗎，這樣我就知道是不是同一間？


    **S**：它是白色的。沒有天花板，沒有屋頂。它有柱子。書是放在玻璃書櫃的層板上。每個區域都有人類所知的各種主題和形式的書。有記錄所有存在過的世界歷史的書，也有指出將要存在的世界的書。這裡收藏過去，收藏未來。它也收藏現在，因為這些都是一體。


    **朵**：有人負責管理嗎？


    **S**：（熱切的口吻）有！


    **朵**：我叫他「管理員」。是同一個人嗎？


    **S**：是的。我雖然叫他書籍『看管人』，但他的目的跟管理員相同。不過圖書館有好幾間，每間都有自己的管理員。每間也都有各自的資訊。就像這個世界有不同的團體，那個世界裡也是。那每個世界的每個團體都有自己的系統。就像不同種族有不同的習俗，那裡的團體也有對應的體系。舉例來說，有一座圖書館是醫學圖書館，專門針對有興趣學醫的人。也有一整個圖書館就只涵蓋一個主題的。我們在那些地方真的能學到很多東西。我們也可以學習我們注定要知道的事，畢竟我們也只能知道這麼多。有很多資料並不是要給我們看的。


    **朵**：對，我以前就聽說過，有些知識是毒藥而非良藥。我們不但不能瞭解，它還會阻礙我們。


    九八七年，有位個案進入圖書館尋找資料，因此有更多的資訊出現。個案回答了相當多的問題，他的回答都已跟其他也接觸到同樣資料的個案的答覆整合在一起。由於資料非常類似，我把它們編輯成像是一個人在說話，但實際上是來自好幾位不同的個案。這些資料都是在我還沒開始積極調查前就已經傳遞過來。（譯注：以下S代表個案，非人名）


    **S**：我剛進入圖書館的圓形大廳。


    朵：圖書館管理員在嗎？


    S:他正朝我過來。他是個光體，穿著一件白袍，有個帽兜，他的臉非常安詳幸福。好美。他閃耀著光芒，跟他周圍的色彩一起脈動。


    朵：如果他能幫我們找到這個時代所知的幽浮、飛碟或外星飛船現象的資訊，我們會非常感謝。我現在帶我去觀看室。我在房間的中間，一切就都在我的周圍發生，像全像式的立體影像。你可以從所有角度看到，我就是這樣子在看。他指向螢幕上不同的東西。他說我們所稱的太空船有很多有趣的事，但它們都是計畫的一部份。他說宇宙裡有很多、很多、很多的星球已經演化出較高的生命形式，超越了我們在地球這所能理解的範圍。他在給我看……（讚歎敬畏的語氣）我看到：噢，無數的、數不清的星星。好寧靜好美。他在給我展示其他世界的美麗照片。有一個好漂亮的紫色行星。他說那是許多幽浮的家鄉。他說那些外星人必須複製一個運輸工具，他們可以以靈魂形態離開母星外出旅行，但當他們靠近地球大氣，他們就必須在一個運輸工具裡面顯現，而那基本上就是我們所稱的「太空船」。


    朵：你的意思是，他們是在進入我們的大氣之後才創造出太空船？


    **S**：沒錯，因為地球的密度和振動性質跟他們的星球很不一樣。


    朵：你知道那個星球在哪裡嗎？或是有多遠？


    **S**：他說到跟參宿四（譯注：Betegeuse，位於獵戶座）有關的事。我想那是個星座或恆星。


    朵：為什麼他們要來這裡？


    **S**：圖書館管理員現在正在跟我說明。他說，他們之所以來地球，是因為地球即將成為靈性宇宙的一部份。來自宇宙各地的許多生命都已聚集在此，要共同見證這個重大的事件。


    朵：你的意思是，他們在這裡只是觀看？


    **S**：分析和觀看。


    朵：好，如果他們以靈體形式旅行到這裡，並形成太空船，那他們自己也跟著變成實體了嗎？


    **S**：因為地球的振動和他們的星球不同，他們必須形成太空船才能進入地球大氣。這是他們能夠降落和觀察地球的一種方式。就跟我們登陸月球類似，我們必須攜帶氧氣之類的東西。


    朵：這很令人困惑，因為我以為他們既然是靈體形式……但你的意思是，他們多少把自己的身體也傳輸過來。然後再創造出這個太空船？


    **S**：是的，這對他們來說很困難。地球的振動本質正在改變，他們將在場觀看，但他們不能在這個振動裡運作，所以必須使用像是太空船的交通工具來保護自己。


    朵：他們有肉體，實質的身體嗎？


    朵：沒有，在他們的母星上沒有。


    朵：在這個星球呢？


    朵：在這個星球，他們用一種像是身體殼的東西罩住自己，好讓他們可以在這個振動性質中運作。


    朵：這個身體殼看起來是什麼樣子？


    朵：他們試著看起來像是人類。我看到他們有漂亮的臉和眼睛，還有金髮，他們的皮膚幾乎是金色的。


    朵：那麼他們在母星上是什麼樣子？


    朵：他們有更能量化的身體，可以隨意改變形體。


    朵：所以他們在這裡就只是觀看？


    朵：觀察是比較好的字。他們在不同的時期確實也試著跟其他人接觸。


    朵：這麼做的目的是什麼？


    朵：讓人類知道他們（指人類）被觀察。他們在這裡是為了地球將變得更文明，繼而成為靈性宇宙的一部份的這件重大盛事。


    朵：那麼他們想要地球上的某些人知道有別的生命在觀察？


    朵：我真的無法回答這個問題。


    朵：你不知道還是不被允許回答？


    **S**：圖書館管理員說：「每件事都有它的目的。不要質疑。」他說一切終將揭曉。還有其他的外星生命也在這裡。他們的出現最終都會有個目的，但現在這個資料還不能說明。他們是為了一個明確的目的才在這裡，只是現在還不能透露那個目的是什麼。


    朵：嗯，我們可以問他特定的問題嗎？他會給你看到答案嗎？


    **S**：要看是什麼問題。他說，重要的是要瞭解以你們心智能力的等級，你可能無法明白這個傳輸管道正在使用的一切。他說以你們此刻的演化速度，有些問題不能回答。


    朵：如果不能回答，他就這麼跟我們說。好，那我們可以檢視這個太陽系嗎？


    **S**：他現在正指向圍繞著太陽排列的其他星球。


    朵：有多少顆？


    **S**：他說在地球結束前，我們會發現這個太陽系有十六顆行星。他說大約在二〇四〇年將發現一顆巨大的行星，西元三千年左右又會發現一顆行星。之後再發現一顆，而那會是最後一個。這將會發生在基督之後約六千年左右。


    朵：這些行星現在有沒有生命？


    **S**：他說所有的行星都有生命，但可能不是我們在地球世界所熟悉的。


    朵：有沒有人類或類人的居民？


    **S**：在太陽系的這個區域沒有。地球是唯一的一個。


    朵：過去曾經有過嗎？


    **S**：有。他說火星上一度有過類人類的生命。他現在就指著它，它是顆紅色的行星。他說金星上曾有過類靈體的人類。他說所有行星上都有靈魂存有，他們就像是管理人和看守者。


    朵：這些靈魂形式的存在體曾在那個行星或其他地方有過肉體嗎？


    **S**：在這些行星的靈魂大多有著比你們地球人更高的振動頻率。對他們來說，到地球必須降低振動，所以是很痛苦的事。這也是為什麼他們不常在地球層面以人的形體出現—具體化。不過他們現在和過去都曾經來過，未來也會。只是這對他們來說很辛苦，因為降低振頻會很辛苦。就像是試著把龍捲風壓縮到一個玻璃杯裡一樣。


    朵：很好的比喻。你說火星上曾經有過人類的形態？


    **S**：是的，但是很久前的過去了，以我們地球的計算，差不多是七萬五千年前。當時火星上存在著與地球類似的生命體，但因為對能量的誤用……他們跟太陽系這個部份的靈性進展並不一致。結果，他們被放逐到宇宙的另一部份。


    朵：他們的文明有留下遺跡嗎？


    **S**：當人類探索到那個地區的時候，便會發現他們文明的證據，但是這個資訊不會被准許透露給一般大眾。


    朵：為什麼不會被准許？


    **S**：他說，因為人類仍然是透過自己的貪婪、力量與支配—控制感在運作。因此這類資訊只有大權在握且居支配地位的人才會知道。


    朵：離我們最近、具有智能生命，並且有能力在宇宙間旅行的星系是哪個？


    **S**：畢宿五（譯注：Aldebaran，屬金牛座）。


    朵：現在來地球的那些太空船和外星生命呢？


    **S**：那些外星人在觀察地球，但不會怎麼干預。他們確實是懷著對人類的善意與和平而來，因為他們在努力幫助地球兄弟改善進化的速度。他們有許多是來自畢宿五、參宿四和又稱犬星的天狼星。來自那個區域的存在是這個銀河系的一分子，跟地球人本是同源。目前他們正靜觀和期待地球的進化速度成長到較高程度，好在銀河聯邦裡有一席之位。那是以光和愛為中心的先進存在體的靈性聯盟，我們則是屬於那個計畫。他說，並非所有來到地球的外星生命都是正面的。


    有一個群體會被你們視為負面，不過他們是少數。他們屬於另一個邦聯。


    朵：你能告訴我們他們長什麼樣子嗎？


    **S**：他們普遍有爬蟲類的特徵，眼睛很像爬蟲類。他正在給我看其中一個的圖片。他說他們最初是透過爬蟲類家系演化，地球人會說「像爬蟲類」。他們的皮膚不像我們的這麼平滑，很粗糙，但不真的是介殼。他們有很大的眼睛，長條狀的瞳孔。他們不是真的有鼻子，但有鼻孔。他們的嘴巴事實上很小，也不像我們在地球上那樣吃東西。看起來他們是吸進能幫助他們生存的要素（essence）。他現在在給我看這個種族大小不同的成員，他們的身體從四呎到八呎都有。


    朵：他們有像我們這樣的四肢嗎？


    **S**：有，他們有四肢。他們有類似蜥蝙手指的東西，很像鳥爪，但不是爪。它是越來越細。


    朵：他們有幾根手指？


    **S**：要看是來自哪個系統的物種。有些有四根，有的三根，也有的有六根。


    朵：他們有像我們這種可以跟其他手指相對的大拇指嗎？


    **S**：四根手指的有。其他的沒有。


    朵：身體上的毛髮呢？


    **S**：他們沒有我們這種毛髮，也沒有毛皮。他們在身體不同的部位有保護性的外層，那是比毛髮還堅硬的皮膚。舉例來說，生殖系統附近的皮膚就很硬，因為他們在繁衍時會激發變硬的感官，會對彼此粗魯，於是那個部位就演化得較堅韌。


    朵：他們有不同的性別嗎？


    **S**：有，他們有不同的性別，但三根手指的有一些是雌雄同體。三根手指的男性和女性都能孵育後代。他們看起來像爬蟲類，所以生殖系統是排卵。他現在給我看一個影像。他說道是他們生育的方式。他們會生蛋，蛋是放在身體裡的特別腔室。


    朵：他們有耳朵嗎？


    **S**：他說他們的聽覺非常敏銳。他們的頭蓋骨上面有著像是殼類的東西，不像耳朵，但他們能聽到的音高範圍比我們廣。


    朵：他們的太空船呢？他們最常被看到在哪種飛行器裡？


    **S**：他們的太空船比較是圓筒形。有些是雪茄狀。其他的看起來像蛋或球體。他們使用他們那個地方的有機材料來建造太空船。它混合了橡膠、塑膠、玻璃纖維和金屬，是一種非常堅硬的物質，但是有機的。它可以禁得起許多熱度變化和極端的寒冷，而且很耐久，畢竟他們的母星是在宇宙的另一邊。那個材質很有彈性。它經過很多變化，因此可以擴張和收縮。他們已經懂得利用太陽能，所以太空船的动力來自於太陽能聚集器。我們會稱它是太陽能量（solar
    energy），但對他們來說那是恆星的能源。他們集中來自不同恒星的光束，驅動太空船飛行。他們叫它星能聚集器，因為他們在旅程中使用不同的恒星作為指引系統，去他們想去的地方。他們來的地方離地球很遠，他們才剛在這個銀河系的這部份漫遊。


    朵：他們在這裡多久了？


    朵：我們在過去一千年才開始在這個區域漫遊。


    朵：我們要如何分辨正面導向和負面導向的外星人？


    **S**：這是個很有趣的問題。你們會對那些對地球人有親切感的較高階生命體感覺契合。你們會感受到愛和幸福，還有友情。來自另一個邦聯的外星生物基本上非常冷淡、不帶情感，你們會感到害怕。最明顯的感覺就是恐懼。


    朵：有人目擊過高大金髮的外星人。你知道他們的事嗎？


    **S**：這些比較像人類的外星人是屬於這個銀河系統。


    朵：他們在這裡有基地嗎？


    **S**：他們使用過天王星的两个衛星。他現在給我看天王星，那是他們在銀河系這部份探索時的基地。


    朵：他們在地球上有基地嗎？


    **S**：人類的外星人有。他正在讓我看其中一個在海裡。他說他們的太空船可以進入水中。那是在加勒比海附近。另一個在某處的高山。對，他給我看的地方像南美，靠近亞馬遜河。然後他給我看另一個在澳洲或新幾內亞靠近海洋的基地。他說，這些人充滿了愛和光，在努力幫助人類。他們來這個星球已經千百萬年了。我們會稱他們為「看守者」（The
    Watchers）。


    朵：這些人曾經與人類接觸過嗎？


    **S**：有，為了特定的理由。如果不是協助人類靈性的成長，就是要傳遞新發明等這類事物的資訊。他們在地球變動的時候將會為地球服務。


    朵：類外星人的太空船是什麼樣子？


    **S**：通常是傳統的碟形，基本上是由某類金屬製成。非常閃亮，是會發亮的金屬。我不知道是哪一種。他說，未來你們將會知道這些太空船和這個金屬的資料，但它不是在地球上開採的，地球也沒有可以比較的金屬。…他們是用思想的能量發動太空船。「思想的能量」，這是他給我的詞。透過群體思想的能量提供快速推進力。這個能量會被收集起來，儲存為電池的能量。太空船的動力就是這麼來的。


    朵：電池是由什麼材料或物質組成的？又是怎麼運作？


    **S**：（微笑）他剛剛把一張巨大的藍圖放到我面前。我看不懂。他在說，思想是能量，地球人不瞭'
  mdcn: '## 貝芙莉的催眠與幽浮事件


    貝：我想接納大概是唯一的答案。我不知道還能建議什麼……雖然我知道的或許比我以為的更多……但我知道的事情比他們少太多了。我要處理的是超越了我所知道的。


    朵：沒錯。在這種情況下，最好是去忽略它。但在身體上，我們想要減輕這些物體可能造成的問題。


    我於是引導貝芙莉回到現在，將她帶回完全清醒的狀態。我照她在催眠開始前的要求，給予戒菸的暗示。她醒後只記得戒菸指令的一部份，還有潛意識對她戒除這些習性有多麼困難的評論。她對腦裡有東西的部份沒有印象。我想也最好不要現在就告訴她。她聽了錄音帶以後就會知道。或許到時她會比較能夠接受。我不想讓她沮喪或受到驚嚇。


    我後來沒有再催眠貝芙莉。她決定不再探索幽浮事件。顯然她的潛意識認為她發現的事情已經夠多了，不想讓她的生活複雜化。大概也是基於同一個理由，她把錄音帶束之高閣，一次也沒聽。


    令人驚訝的是，我的個案中有很多人始終無法鼓起勇氣去聽催眠療程的錄音。催眠結束後，他們就把錄音帶收了起來。或許這樣也好。


    我們始終沒有找出貝芙莉為什麼會有奇怪的健康問題。或許這是外星人監控她的原因之一；他們可能也想瞭解吧。


    貝芙莉繼續過著畫招牌看板和兼職畫家的生活，所以這些奇怪的催眠療程顯然沒有不好的影響。


    ## 第五章 埋藏的记忆


    ### 我的笔记：


    一九八八年十二月十八日，我在大約凌晨三點醒來去上廁所。當我走出臥室，經過短短的走廊到廁所時，我注意到有道明亮的光，從前廳的大觀景窗投射進來，不僅照亮了房間裡大半的東西，也照射到走廊的牆壁。我對自已說，一定是滿月，滿月的光就是這麼亮。我在臥房的時候沒注意到這些事件，特別是在涉入幽浮調查之後，我都會把自己生活裡發生的怪事做記錄。我從不曉得這些事究竟是不是超自然現象，但如果它們不尋常到足以引起我的注意，我就會寫下來。我也不知道以後是否會派上用場。我和個案合作時也是一樣。由於做了大量的筆記，當我想把事件寫到書裡時，往事又會歷歷在目。本書的細節就是這麼來的。


    在編纂本書的焦點案例時，我翻閱我的筆記，發現自己曾發生過一件讓我聯想到貝芙莉的事。我一直認為貝芙莉醒來後發現後院有奇怪的光線，卻不起床察看的反應很奇怪。但在我自己的事件中，我也表現出同樣的無動於衷，並在不尋常事件發生的當下，把它當成正常的事去接受。


    以上這些案例大多是在一九八○年代晚期，尤其是貝芙莉的相关事件。我的筆記記載我的經歷發生在一九八八年十二月，正是調查這些事件的高峰期。不過我在當時並沒想到兩者之間的關聯。


    ## 監護人 THE CUSTODIANS


    這個光，因為為了擋光，那裡的窗簾都拉上了。


    我在廁所時是面向走廊，透過廁所門口可以看到走廊牆壁，我發現前廳投射進來的光線就照在部份的牆壁上。我什麼都還沒想，突然間那光就離開了，一切都暗了下來。光不是啪地一下子不見，而是較漸進式的，但速度還是很快。黑暗似乎從右邊往左移動，快速把光吞沒。光只有再短暫地閃現一下，然後整個房子就都變得非常暗。我立刻想到一定是有雲飄過月亮，遮住了月光，雖然那一定是一朵移動很快速的雲。如果有強風的話，確實會如此。不過當我從廁所回到房間，拉開窗簾往外看時，卻不見月亮和雲層，也不覺得有風。那是個平靜、清澈、星光點點的夜晚。


    我納悶自己如果先去了前廳而不是廁所，是不是會看到大觀景窗外頭有什麼東西。我經常會到窗前觀望月亮或星星，但內急卻讓我沒法做別的事。光消失的方式暗示了移動，就像是從窗戶的左邊移動到右邊。這可以解釋走廊是從另一個方向一路暗下來的情況。


    我的房子跟別的房子不一樣，建造的方式並不一般。它有兩層樓，客廳、臥室和廚房都在二樓，但後來放棄了這個推測。道路在幾百呎外，房子又被一排濃密的樹木遮蔽。我考慮過有車子經過家門前道路的可能，我曾經看過車子來回經過這條路上許多次，每次車燈投射到牆上的光都是分散和閃爍的，這是因為樹林的關係。每當有車子經過時，樹的輪廓也一定會映照在牆上。即使是車子開上我家車道，然後停在門前，那個光線也不一樣。我觀察過這個情況許多次了。那道光並不是從路上或車道投射進來的車燈。它一定是從一個較高的角度照進來，而且是非常耀眼的光，不然不能照亮整個房間和走廊。


    約莫一週之後才真的是滿月。我觀察滿月是否會在晚上造成同樣效果，結果發現一年之中的這個時候（冬天），月亮會直接越過屋頂，而不是像夏天那般掛在窗前。因此，從窗外投射進來的月光角度不一樣，並沒有造成我先前看到的光影效果。直到現在我還是在納悶，如果早點去窗前的話，不知道會不會看到什麼。


    我並不是說我看到的光是一架幽浮，但這件事顯示當我們在夜間因奇怪的光或聲音而醒來時，我們的反應和行為卻不見得會依常理走。


    ## 第六章 宇宙圖書館


    當個案進入出神的夢遊狀態後，有很多方式可以獲得資訊。但由於他們侷限在某特定一世的身體裡，所以會受到限制和阻礙。個案只能描述他們個人所知並在那一世接觸到的事物。我發現最好的資料是來自當我引導個案進入人世之間（一世與下一世間）的過渡期，也就是所謂的「死亡」狀態的時候。這時物質身體的限制移除了，遮蔽的眼罩也被取下，他們有管道取得想要探索的任何資料。


    我在靈界發現了一個神奇的地方，那裡有無限的知識。我最喜歡在靈界的圖書館調查和研究。我的個案曾用很多不同的方式描述，但我相信他們談的都是同一個地方，只是以各自的認知替它定位。許多人形容它是一棟真實的建物，那裡有許多不同形式的知識，尋找者依他本身的進化程度而取得。不僅書架上有書可以閱讀，當事人也可以進入房間，資訊會以3D全像的方式呈現在牆面上。


    許多時候，當我們進入圖書館時，會有一位看守者或圖書館員來迎接，理論上是要審核我們是否有使用的許可。接著，他會引導我們到圖書館的適當區域，我們可以在那裡找到要找的資料。雖然在少數案例裡，個案對圖書館的描述不太一致，但我相信他們說的都是靈界的同一個地方。


    有位個案這麼描述：那是所有世界裡我最喜歡的圖書館。


    朵：我去過圖書館。你可以跟我說你的圖書館是什麼樣子嗎，這樣我就知道是不是同一間？


    **S**：它是白色的。沒有天花板，沒有屋頂。它有柱子。書是放在玻璃書櫃的層板上。每個區域都有人類所知的各種主題和形式的書。有記錄所有存在過的世界歷史的書，也有指出將要存在的世界的書。這裡收藏過去，收藏未來。它也收藏現在，因為這些都是一體。


    **朵**：有人負責管理嗎？


    **S**：（熱切的口吻）有！


    **朵**：我叫他「管理員」。是同一個人嗎？


    **S**：是的。我雖然叫他書籍『看管人』，但他的目的跟管理員相同。不過圖書館有好幾間，每間都有自己的管理員。每間也都有各自的資訊。就像這個世界有不同的團體，那個世界裡也是。那每個世界的每個團體都有自己的系統。就像不同種族有不同的習俗，那裡的團體也有對應的體系。舉例來說，有一座圖書館是醫學圖書館，專門針對有興趣學醫的人。也有一整個圖書館就只涵蓋一個主題的。我們在那些地方真的能學到很多東西。我們也可以學習我們注定要知道的事，畢竟我們也只能知道這麼多。有很多資料並不是要給我們看的。


    **朵**：對，我以前就聽說過，有些知識是毒藥而非良藥。我們不但不能瞭解，它還會阻礙我們。


    九八七年，有位個案進入圖書館尋找資料，因此有更多的資訊出現。個案回答了相當多的問題，他的回答都已跟其他也接觸到同樣資料的個案的答覆整合在一起。由於資料非常類似，我把它們編輯成像是一個人在說話，但實際上是來自好幾位不同的個案。這些資料都是在我還沒開始積極調查前就已經傳遞過來。（譯注：以下S代表個案，非人名）


    **S**：我剛進入圖書館的圓形大廳。


    朵：圖書館管理員在嗎？


    S:他正朝我過來。他是個光體，穿著一件白袍，有個帽兜，他的臉非常安詳幸福。好美。他閃耀著光芒，跟他周圍的色彩一起脈動。


    朵：如果他能幫我們找到這個時代所知的幽浮、飛碟或外星飛船現象的資訊，我們會非常感謝。我現在帶我去觀看室。我在房間的中間，一切就都在我的周圍發生，像全像式的立體影像。你可以從所有角度看到，我就是這樣子在看。他指向螢幕上不同的東西。他說我們所稱的太空船有很多有趣的事，但它們都是計畫的一部份。他說宇宙裡有很多、很多、很多的星球已經演化出較高的生命形式，超越了我們在地球這所能理解的範圍。他在給我看……（讚歎敬畏的語氣）我看到：噢，無數的、數不清的星星。好寧靜好美。他在給我展示其他世界的美麗照片。有一個好漂亮的紫色行星。他說那是許多幽浮的家鄉。他說那些外星人必須複製一個運輸工具，他們可以以靈魂形態離開母星外出旅行，但當他們靠近地球大氣，他們就必須在一個運輸工具裡面顯現，而那基本上就是我們所稱的「太空船」。


    朵：你的意思是，他們是在進入我們的大氣之後才創造出太空船？


    **S**：沒錯，因為地球的密度和振動性質跟他們的星球很不一樣。


    朵：你知道那個星球在哪裡嗎？或是有多遠？


    **S**：他說到跟參宿四（譯注：Betegeuse，位於獵戶座）有關的事。我想那是個星座或恆星。


    朵：為什麼他們要來這裡？


    **S**：圖書館管理員現在正在跟我說明。他說，他們之所以來地球，是因為地球即將成為靈性宇宙的一部份。來自宇宙各地的許多生命都已聚集在此，要共同見證這個重大的事件。


    朵：你的意思是，他們在這裡只是觀看？


    **S**：分析和觀看。


    朵：好，如果他們以靈體形式旅行到這裡，並形成太空船，那他們自己也跟著變成實體了嗎？


    **S**：因為地球的振動和他們的星球不同，他們必須形成太空船才能進入地球大氣。這是他們能夠降落和觀察地球的一種方式。就跟我們登陸月球類似，我們必須攜帶氧氣之類的東西。


    朵：這很令人困惑，因為我以為他們既然是靈體形式……但你的意思是，他們多少把自己的身體也傳輸過來。然後再創造出這個太空船？


    **S**：是的，這對他們來說很困難。地球的振動本質正在改變，他們將在場觀看，但他們不能在這個振動裡運作，所以必須使用像是太空船的交通工具來保護自己。


    朵：他們有肉體，實質的身體嗎？


    朵：沒有，在他們的母星上沒有。


    朵：在這個星球呢？


    朵：在這個星球，他們用一種像是身體殼的東西罩住自己，好讓他們可以在這個振動性質中運作。


    朵：這個身體殼看起來是什麼樣子？


    朵：他們試著看起來像是人類。我看到他們有漂亮的臉和眼睛，還有金髮，他們的皮膚幾乎是金色的。


    朵：那麼他們在母星上是什麼樣子？


    朵：他們有更能量化的身體，可以隨意改變形體。


    朵：所以他們在這裡就只是觀看？


    朵：觀察是比較好的字。他們在不同的時期確實也試著跟其他人接觸。


    朵：這麼做的目的是什麼？


    朵：讓人類知道他們（指人類）被觀察。他們在這裡是為了地球將變得更文明，繼而成為靈性宇宙的一部份的這件重大盛事。


    朵：那麼他們想要地球上的某些人知道有別的生命在觀察？


    朵：我真的無法回答這個問題。


    朵：你不知道還是不被允許回答？


    **S**：圖書館管理員說：「每件事都有它的目的。不要質疑。」他說一切終將揭曉。還有其他的外星生命也在這裡。他們的出現最終都會有個目的，但現在這個資料還不能說明。他們是為了一個明確的目的才在這裡，只是現在還不能透露那個目的是什麼。


    朵：嗯，我們可以問他特定的問題嗎？他會給你看到答案嗎？


    **S**：要看是什麼問題。他說，重要的是要瞭解以你們心智能力的等級，你可能無法明白這個傳輸管道正在使用的一切。他說以你們此刻的演化速度，有些問題不能回答。


    朵：如果不能回答，他就這麼跟我們說。好，那我們可以檢視這個太陽系嗎？


    **S**：他現在正指向圍繞著太陽排列的其他星球。


    朵：有多少顆？


    **S**：他說在地球結束前，我們會發現這個太陽系有十六顆行星。他說大約在二〇四〇年將發現一顆巨大的行星，西元三千年左右又會發現一顆行星。之後再發現一顆，而那會是最後一個。這將會發生在基督之後約六千年左右。


    朵：這些行星現在有沒有生命？


    **S**：他說所有的行星都有生命，但可能不是我們在地球世界所熟悉的。


    朵：有沒有人類或類人的居民？


    **S**：在太陽系的這個區域沒有。地球是唯一的一個。


    朵：過去曾經有過嗎？


    **S**：有。他說火星上一度有過類人類的生命。他現在就指著它，它是顆紅色的行星。他說金星上曾有過類靈體的人類。他說所有行星上都有靈魂存有，他們就像是管理人和看守者。


    朵：這些靈魂形式的存在體曾在那個行星或其他地方有過肉體嗎？


    **S**：在這些行星的靈魂大多有著比你們地球人更高的振動頻率。對他們來說，到地球必須降低振動，所以是很痛苦的事。這也是為什麼他們不常在地球層面以人的形體出現—具體化。不過他們現在和過去都曾經來過，未來也會。只是這對他們來說很辛苦，因為降低振頻會很辛苦。就像是試著把龍捲風壓縮到一個玻璃杯裡一樣。


    朵：很好的比喻。你說火星上曾經有過人類的形態？


    **S**：是的，但是很久前的過去了，以我們地球的計算，差不多是七萬五千年前。當時火星上存在著與地球類似的生命體，但因為對能量的誤用……他們跟太陽系這個部份的靈性進展並不一致。結果，他們被放逐到宇宙的另一部份。


    朵：他們的文明有留下遺跡嗎？


    **S**：當人類探索到那個地區的時候，便會發現他們文明的證據，但是這個資訊不會被准許透露給一般大眾。


    朵：為什麼不會被准許？


    **S**：他說，因為人類仍然是透過自己的貪婪、力量與支配—控制感在運作。因此這類資訊只有大權在握且居支配地位的人才會知道。


    朵：離我們最近、具有智能生命，並且有能力在宇宙間旅行的星系是哪個？


    **S**：畢宿五（譯注：Aldebaran，屬金牛座）。


    朵：現在來地球的那些太空船和外星生命呢？


    **S**：那些外星人在觀察地球，但不會怎麼干預。他們確實是懷著對人類的善意與和平而來，因為他們在努力幫助地球兄弟改善進化的速度。他們有許多是來自畢宿五、參宿四和又稱犬星的天狼星。來自那個區域的存在是這個銀河系的一分子，跟地球人本是同源。目前他們正靜觀和期待地球的進化速度成長到較高程度，好在銀河聯邦裡有一席之位。那是以光和愛為中心的先進存在體的靈性聯盟，我們則是屬於那個計畫。他說，並非所有來到地球的外星生命都是正面的。


    有一個群體會被你們視為負面，不過他們是少數。他們屬於另一個邦聯。


    朵：你能告訴我們他們長什麼樣子嗎？


    **S**：他們普遍有爬蟲類的特徵，眼睛很像爬蟲類。他正在給我看其中一個的圖片。他說他們最初是透過爬蟲類家系演化，地球人會說「像爬蟲類」。他們的皮膚不像我們的這麼平滑，很粗糙，但不真的是介殼。他們有很大的眼睛，長條狀的瞳孔。他們不是真的有鼻子，但有鼻孔。他們的嘴巴事實上很小，也不像我們在地球上那樣吃東西。看起來他們是吸進能幫助他們生存的要素（essence）。他現在在給我看這個種族大小不同的成員，他們的身體從四呎到八呎都有。


    朵：他們有像我們這樣的四肢嗎？


    **S**：有，他們有四肢。他們有類似蜥蝙手指的東西，很像鳥爪，但不是爪。它是越來越細。


    朵：他們有幾根手指？


    **S**：要看是來自哪個系統的物種。有些有四根，有的三根，也有的有六根。


    朵：他們有像我們這種可以跟其他手指相對的大拇指嗎？


    **S**：四根手指的有。其他的沒有。


    朵：身體上的毛髮呢？


    **S**：他們沒有我們這種毛髮，也沒有毛皮。他們在身體不同的部位有保護性的外層，那是比毛髮還堅硬的皮膚。舉例來說，生殖系統附近的皮膚就很硬，因為他們在繁衍時會激發變硬的感官，會對彼此粗魯，於是那個部位就演化得較堅韌。


    朵：他們有不同的性別嗎？


    **S**：有，他們有不同的性別，但三根手指的有一些是雌雄同體。三根手指的男性和女性都能孵育後代。他們看起來像爬蟲類，所以生殖系統是排卵。他現在給我看一個影像。他說道是他們生育的方式。他們會生蛋，蛋是放在身體裡的特別腔室。


    朵：他們有耳朵嗎？


    **S**：他說他們的聽覺非常敏銳。他們的頭蓋骨上面有著像是殼類的東西，不像耳朵，但他們能聽到的音高範圍比我們廣。


    朵：他們的太空船呢？他們最常被看到在哪種飛行器裡？


    **S**：他們的太空船比較是圓筒形。有些是雪茄狀。其他的看起來像蛋或球體。他們使用他們那個地方的有機材料來建造太空船。它混合了橡膠、塑膠、玻璃纖維和金屬，是一種非常堅硬的物質，但是有機的。它可以禁得起許多熱度變化和極端的寒冷，而且很耐久，畢竟他們的母星是在宇宙的另一邊。那個材質很有彈性。它經過很多變化，因此可以擴張和收縮。他們已經懂得利用太陽能，所以太空船的动力來自於太陽能聚集器。我們會稱它是太陽能量（solar
    energy），但對他們來說那是恆星的能源。他們集中來自不同恒星的光束，驅動太空船飛行。他們叫它星能聚集器，因為他們在旅程中使用不同的恒星作為指引系統，去他們想去的地方。他們來的地方離地球很遠，他們才剛在這個銀河系的這部份漫遊。


    朵：他們在這裡多久了？


    朵：我們在過去一千年才開始在這個區域漫遊。


    朵：我們要如何分辨正面導向和負面導向的外星人？


    **S**：這是個很有趣的問題。你們會對那些對地球人有親切感的較高階生命體感覺契合。你們會感受到愛和幸福，還有友情。來自另一個邦聯的外星生物基本上非常冷淡、不帶情感，你們會感到害怕。最明顯的感覺就是恐懼。


    朵：有人目擊過高大金髮的外星人。你知道他們的事嗎？


    **S**：這些比較像人類的外星人是屬於這個銀河系統。


    朵：他們在這裡有基地嗎？


    **S**：他們使用過天王星的两个衛星。他現在給我看天王星，那是他們在銀河系這部份探索時的基地。


    朵：他們在地球上有基地嗎？


    **S**：人類的外星人有。他正在讓我看其中一個在海裡。他說他們的太空船可以進入水中。那是在加勒比海附近。另一個在某處的高山。對，他給我看的地方像南美，靠近亞馬遜河。然後他給我看另一個在澳洲或新幾內亞靠近海洋的基地。他說，這些人充滿了愛和光，在努力幫助人類。他們來這個星球已經千百萬年了。我們會稱他們為「看守者」（The
    Watchers）。


    朵：這些人曾經與人類接觸過嗎？


    **S**：有，為了特定的理由。如果不是協助人類靈性的成長，就是要傳遞新發明等這類事物的資訊。他們在地球變動的時候將會為地球服務。


    朵：類外星人的太空船是什麼樣子？


    **S**：通常是傳統的碟形，基本上是由某類金屬製成。非常閃亮，是會發亮的金屬。我不知道是哪一種。他說，未來你們將會知道這些太空船和這個金屬的資料，但它不是在地球上開採的，地球也沒有可以比較的金屬。…他們是用思想的能量發動太空船。「思想的能量」，這是他給我的詞。透過群體思想的能量提供快速推進力。這個能量會被收集起來，儲存為電池的能量。太空船的動力就是這麼來的。


    朵：電池是由什麼材料或物質組成的？又是怎麼運作？


