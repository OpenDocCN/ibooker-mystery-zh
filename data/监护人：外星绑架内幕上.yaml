    布蘭達抬起她的手臂，我看到一個非常小的腫塊。

    朵：是怎麼做的？

    布：晚上她睡覺的時候。等她醒來後你問她，她會告訴你那什麼時候的事。因為這個腫塊出現時看起來很怪。

    朵：有用到器具嗎？

    布：有。看起來像個銀管子，抵住手臂的那端很平，也或許微微有些往往內彎。當你把它壓在手臂上，管子裡的東西會刺穿皮膚，注射到血液裡，不過不會痛。

    朵：但會留下一個小腫塊？

    布：傷口好了之後，接種的地方會留下腫塊。等她醒來她可以描述最初的情況，還有後來傷口是怎麼好的。除了注射進去的东西，還有一個小銀球。那是非常小的工具，可以調整成人類的心靈放射一致，幫助他們的機器追蹤這個人。如果在這個人的生命裡真的要發生接觸，他們便可以啓動留在體內的「東西」。那時候它的作用會像個翻譯機。她可以把自已的思緒投射出去和他們溝通，也能聽到他們的想法。即使是用聲音溝通，就算他們說著她聽不懂的語言，她也能夠理解。當聲音進入腦裡，就會被轉換成她能夠理解的符號。她身體裡的那個東西有這個功能。


    我稱它是銀之類的東西是因為它的樣子。不過它不是真的用銀做的。它的直徑可能有八分之一英吋（譯注：約 0.32 公分），位置是在她的前臂，就在他們替她接種的腫塊下面，在橈骨和尺骨這兩塊骨頭之間，肌肉的下面。那是接種時一起注射進去的。他們只來一次就完成接種，之後就不用再進到她住的地方。他們可以透過儀器追蹤她的思想。


