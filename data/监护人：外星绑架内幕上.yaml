    # # 朵：不是唯一的一个？


    蘇：不是，電腦控制其他的動力來源，以防哪個動力受到任何損害的話，還有同樣數額的備用動力能源可以替代。所以我們通常都能回到我們出發的地方。飛行器墜毀是非常罕見的。墜毀通常是因為大氣的狀況。問題和飛行器沒多少關係，和大氣狀況加上錯誤比較有關。太空船上的某個外星存在體做了錯誤的設定。所以這兩者是有可能合併發生的。


    朵：那麼你們的人是有可能出錯？


    蘇：這也很少發生。我們不把它看作是你們會說的「錯誤」，然而總是有學習更多事物的空間。事情會發生，你們就在那時候針對情況做調整。


    朵：換句話說，你們並不是不會出錯的。


    蘇：對。這只是身為一個活生生的生命的正常過程，我們不會把它看作是個需要被懲罰的錯誤。你們人類似乎覺得錯誤出現時必須有罪惡感。有時還會加上懲罰來強化罪惡感，以避免錯誤再犯。我們不覺得有這個必要。每當發生你們所謂的「錯誤」時，我們就會自動補救修正。當事人知道事情已經發生。他們知道，而且更好的是能從中學習。這就夠了。我會說罪惡感和懲罰是地球人無法進步更快的主因之一。他們煩惱、擔心在這類事上，使得自己無法進步。這是個阻礙。當這些阻礙能夠移除，人們就更能追求他的夢。他能夠實現事情，讓事情更容易發生，因為他沒有防礙自己的進展。大多數的疾病就是這樣來的。這個星球被同型態的強化包裹住了。孩子從年紀很小的時候就學到這些制約，這和限制有關。人類如果想要進步得更快，就必須...


