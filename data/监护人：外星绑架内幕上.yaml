    **第二章 濃縮和扭曲的時間**


    調查過另一一起發生在小岩城的事件，當事人是位女性，她在交通尖峰時段經過一條繁忙的公路去上班。她看到一艘膠囊形狀的巨大飛行器驟然出現在前方空中。她以為大多數的車子會因此發出刺耳的煞車聲，然而卻一切如常。人行道上有人在慢跑，她瘋狂地從车上對他們揮舞喊叫，不斷往上指，想要吸引他們的注意。但他們繼續慢跑，宛如她是隱形的。她把車子停在人行道邊，看著那艘飛行器做了幾個猛烈的旋轉後飛走。它是那麼的巨大，但其他人卻完全沒注意到。


