    朵：材料顯然非常重要。

    蘇：是的。就像你們的社會會把特定金屬用在電子方面，做成電腦。譬如說，如果是用木頭，它就不會像用金屬類物質製成的電腦那麼好用。所以在你們稱為電腦和發電機的組成和運作方式的裡，材質確實扮演重要的角色。有些東西可以在其他星球上取得，只要你們到得了那裡，不論是坐太空梭還是——在我看來那會是大規模先進運輸的第一步——當你們能在其他星球上收集到那些物質，我想你們會發現它們有很多用途，而這會讓人類社會的技術和科學更加進步。


