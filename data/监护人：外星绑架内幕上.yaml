    # 我的笔记：


    一九八八年十二月十八日，我在大约凌晨三点醒来去上厕所。当我走出卧室，经过短短的走廊到厕所时，我注意到有道明亮的光，从前厅的大观景窗投射进来，不仅照亮了房间裡大半的东西，也照射到走廊的墙壁。我对自已说，一定是满月，满月的光就是這麼亮。我在卧房的时候没注意到


    这些事件，特别是在涉入幽浮调查之后，我都会把自己生活裡发生的怪事做记录。我从不晓得这些事究竟是不是超自然现象，但如果它们不尋常到足以引起我的注意，我就会写下来。我也不知道以后是否会派上用场。我和个案合作时也是一样。由于做了大量的笔记，当我想把事件写到书裡时，往事又会歷歷在目。本书的细节就是這麼来的。


    在编纂本书的焦点案例时，我翻阅我的笔记，发现自己曾发生过一件让我联想到贝芙莉的事。我一直认为贝芙莉醒来后发现后院有奇怪的光线，却不起床察看的反应很奇怪。但在我自己的事件中，我也表现出同样的无动於衷，并在不尋常事件发生的当下，把它当成正常的事去接受。


    以上这些案例大多是在一九八○年代晚期，尤其是贝芙莉的相关事件。我的笔记记载我的经历发生在一九八八年十二月，正是调查这些事件的高峰期。不过我在当时并没想到两者之间的关联。'
