    # # 消失時間的事件並不總是跟表面所呈現的一樣。一般以為，經歷消失時間的當事人是跟外星人或幽浮有直接的接觸，特別是有光（或飛行物）出現的時候。但我發現情況不一定如此。很多案例都只是當事人的心靈封鎖了不愉快或受創的經驗，和外星人並無關聯。只要催眠的狀態深到能夠直接聯繫潛意識心智，我們就能取得正確的資料。


    潛意識具有所有的記憶，它會報告真正發生的事件，不會有無意識心干預所產生的情緒渲染或扭曲。我總是告訴調查員，當個案報告消失的時間或其他看似符合模式的經驗時，不要驟下結論。永遠從最簡單的解釋找起，再進入較複雜的可能性。在很多案例裡，簡單的解釋就是答案。


    由於某些不明的原因，有些人偏好用複雜的答案來解釋他們生命裡的事件。「我有過消失的時間，所以一定被帶上幽浮過。」因為某個神祕的心理過程，這個抽象的推論比平凡但不愉快的解釋更容易被接受。我有個個案確實有過消失的時間，也確實與外星人有過接觸，但那卻是一個在錯誤的時間到了錯誤地方的案例。


    湯姆一直為了一九七二年在麻薩諸塞州發生的消失時間事件感到困擾，因此想一探究竟。他當時是為了生意的事去客戶家開會，與在場的其他人共進了一頓美好的晚餐，隨著時間慢慢過去，夜色越來越深，有個女子邀請湯姆到她的公寓留宿，好讓他不用趕回隔壁城鎮的家。


