    莉：有啊，他们会发出声音，不过我没办法形容那个声音。他们的语言有一种音调上的结构，类似音乐的音调，可是说话的模式听起来比较空。就像你如果透过……（有困难描述）机器来说话，它会取代你的声带，但声音很空。也像是用吹奏风琴的方式发出的声音，只是那不是风琴。一种空空的声音。不是电脑。有点像机器的声音。空洞。

    我懂这个定义。我认识一个因罹癌而割除声带的男子，他也是用机器说话。只要听熟了、听习惯了，就能瞭解他在說什麼。那種聲音有種單調、振動的效果。

    這個描述與《星辰傳承》裡的潘妮所描述的很像。她也說她聽到外星人發出奇怪的音樂聲調而不是說話。


