  md: '方的有机材料来建造太空船。它混合了橡胶、塑胶、玻璃纤维和金属，是一种非常坚硬的物质，但是有机的。它可以禁得起许多热度变化和极端的寒冷，而且很耐久，毕竟他们的母星是在宇宙的另一边。那个材质很有弹性。它经过很多变化，因此可以扩张和收缩。他们已经懂得利用太阳能，所以太空船的动力来自于太阳能聚集器。我们会称它是太阳能量（solar
