  md: '朵：這是個有趣的概念。那個流質是由什麼組成的，大致上？

    蘇：並不是這個星球上找得到的東西，但或許有什麼我可以用來比較。她現在看到一個紅色液體的畫面，不過那不是血。比較像是維他命之類的物質。也許她現在想到紅色的維他命液。我想你可能會想到維他命B12或B6，但是是以液體注射到身體。濃度可能類似，像那類的東西，像維他命液，只是不一樣。

    朵：我想知道如果你們發生了緊急狀況卻沒有這個流質，地球上有沒有你們可以用來取代的東西？

    蘇：我們會試著回母星取得，不然也會盡量去另一艘可能有多餘流質的太空船拿。在必須回母星之前，我們通常會先找到另一艘太空船。

    朵：那麼，就生存而言，看來最重要的是船裡的空氣。

    蘇：是的，這對我們這種身體來說很重要。

    朵：空氣必須維持穩定不變？

    蘇：如我先前所說，我們可以短暫離開太空船。如果我們留下身體，只用能量的形式離開會比較容易。你瞭解嗎？我們可以比較易地移動自己的能量投射而不被大氣條件所影響。這也是另一種保護自己的方式。

