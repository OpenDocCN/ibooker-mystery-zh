  mdcn: '## 第七章 外星人说话了


    我第一次与苏珊合作是在一九八六年的十月。她因为被好几种过敏困扰，我们试图从前世寻找她的问题根源。她是个出色的个案，立刻便进入深度的出神状态。疗程非常成功，我们探索了好几个前世，所得的资料也证明很有帮助。她的气喘问题可以回溯到某段她因肺炎过世的前世；那世她死的时候还是个孩子。在现在这一世，凡是会干扰到她呼吸的东西，都会引发潜意识对死亡的恐惧并诱发气喘发作。


    当接下来的疗程出现外太空的外星人时，我们都很惊讶，因为那绝对不是我们在找的资料。苏珊从来没有目击幽浮的经验，她没做过这类的梦，对幽浮也没有任何兴趣。她完全没预料会找出这些资讯，然而她却成了我跟外星人直接接触的管道，外星人开始直接对我说话。事情自然而然就这样发生了，而且建立了一个持续且带来惊人结果的模式。


    当时，我们就快完成一段发生在一九三○年代的英格兰前世回溯。她在那一世死亡之后，我引导她到「另一边」（灵界）寻找死後世界的资料。只要遇到能进入深度催眠的理想个案，我都会这么做。我试著收集不同主题的资讯，日後再合併比较，确认真实度。因此，当我要求她描述在死後看到什麽的时候，我心中对她会说些什麽已有些想法。一开始，她的声音显得懒洋洋，话说得很慢。


    朵：你在那裡有沒有看到什麼？或是有沒有什麼可以看的？

    蘇：（停頓）嗯，我看到……一個電腦部門。我很驚訝，這跟我基於其他個案所見到的畫面而期待的回答完全不同。那些個案的許多報告都合併在《生死之間》這本書裡說明。


    朵：電腦部門？

    蘇：這裡有些生物。他們好像在監看著什麼。他們有控制鍵和開關，坐在椅子上盯著東西瞧。我看不清楚他們在監控什麼。這裡有很多東西，地圖和……現在我在所有東西的上方。地球。我看到大洲。他們在監測海裡和各大洲發生的事。他們在觀察。他們知道得比較多。我在學習。他們讓我看。他們這麼做是因為有另一個力量在指導，他們是那個力量的使者。他們做這些是為了幫助人類。


    我以為她看到的可能是靈界的電腦室；我之前不被允許進入的房間。因為每個人的人生的所有組成要素都收集在那裡，每個人轉世來生的細節也都是在那裡研究，所以有所限制。既然我已經引導蘇珊到了靈界（或所謂的「死亡」），我試著把她的回答跟我已知的事情做個比較。


    蘇：他們的理解力比較強。在這些層次，知識和科技比較先進。許多高階的理解正在發生。

    朵：你能看到他們的樣子嗎？

    蘇：他們穿白色的衣服。看起來全身都是白的。頭圓圓的，看起來比較矮小，像是宇宙人。他們的眼睛比较大。他們坐在椅子上，動轉盤和開關。他們有一扇往外看的大窗子。窗子環繞成一圈。中間有個球型物體的構造。半球體的底部邊緣是平的。看起來是用幾支腳撐在地板上。透明的，裡面有發光的水晶像是在移動。閃亮的極小水晶不停在動。長長的管狀物從天花板垂下，包圍住球體的上半部。管狀物是透明的固體。光線透過管狀物往下照射。這和太空船的推進力有關，同時也控制隱形裝置。當蘇珊說出這些話時，她自己也很驚訝。她不曉得這些話是打哪裡來的。這個裝置位於太空船的中心。


    朵：那麼這是一艘實體的飛行器？

    **蘇**：它可以被看到，也可以隱形。要看他們的主要任務是什麼，要監控什麼。結晶的球體提供這艘飛行器推進的能量，也控制著這艘飛行器的反重力裝置。


    朵：你說他們允許你看這些？允許你看他們在做什麼是很不尋常的事嗎？

    **蘇**：（呆板的語氣）我們以前接觸過。他們以前就監控過我，探測過我。他們並不介意，因為我是他們的兄弟，又是為和平而來。他們想要得到像我這樣的生命體的協助。


    朵：他們會在意我知道這些事嗎？

    **蘇**：不會。現在不會。他們想要資訊被解譯。


    朵：他們願意和我分享資訊嗎？

    **蘇**：願意。已經開始了。他們會使用我來通訊。


    朵：我想得到資訊。我要他們瞭解，我只会把資訊用在好的方面。他們知道嗎？

    **蘇**：知道。資訊只提供給能加以利用的個體，能以有效益的方式應用的人，否則的話資訊就沒有用處。


