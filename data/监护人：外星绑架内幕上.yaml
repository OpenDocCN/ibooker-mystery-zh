    但如果，人類是住在另一個用不同方式環繞著太陽旋轉的星球，那我們要怎麼衡量時間呢？假設白晝恆常，或是永夜無光呢？假設那個行星有兩個太陽？那裡的人會用不同的方式衡量時間嗎？還是決定沒必要這麼麻煩？而那些在太空船上長時間旅行，在宇宙間不斷前行，沒有參照點可以區分日夜，也沒有理由由區分季節和年分的存在體又是如何呢？這也難怪他們不瞭解時間對我們的意義，也經常覺得沒有道理。在類似並且甚至更極端的情況下，我們也很可能會認為創造出時間並教條式地堅持時間的概念並沒有意義。

    僵化的時間架構使人類看不到其他的次元和存在層面，但外星人沒有這個限制，因此能自由探索。在發現了其他的次元和存在層面後，外星人接著又找到使物質消失和重現的運送方式，他們可以迅速地穿越通往其他次元的裂隙，在那些缺口中移動，輕鬆自如地就像是走過一扇門。當然，早在我們的祖先住在洞穴以前，外星人可能就已經在這麼做了。人類要想追上他們，還有好長的路要走。但除非人類拿掉遮蔽的眼罩，看到事情的可能性，要不永遠也找不到那些裂隙。

    話說回來，如果有別的類人類物種找到了方法，那麼我們也有可能找到。假使自人類存在以來，外星人就透過心靈將我們所需要的資訊提供給我們，那麼他們也有可能現在正試著傳送消除時間障礙的秘密，幫助我們看到那珍貴的時空門戶的所在。

