    催眠下出現的新資料並不多。艾迪對那件事的記憶很正確。我決定問他的潛意識，取得他的意識沒有資料。如果個案的出神狀態夠深，我們就能做到，而且通常會有出乎意料的答案。我想知道是不是有什麼艾迪的意識沒有察覺到的事。他的回答是他被灌注了某些東西。他們給他片片斷斷的資訊，也給了他指引。他不斷提到灌注，而當我問那是什麼意思時，他說了一個我不懂的字，我只能用拼音的方式把它寫下來：converging。這個字對我沒有任何意義，艾迪也說他不知道它的意思。


    ## 第二章

    ### 濃縮和扭曲的時間▲ 049


    太空船傳給他片段的資訊，幫助他發展和成長。那是很具體的東西，那些資訊被身體的細胞吸收，不過他並不知道那些資訊是什麼。


    許多人以為自己既然有過目擊經驗，很可能也曾經被綁架，只是後來並不記得。我發現情況不一定如此。在某些案例，光是目擊就已足夠，因為下意識的資訊並不需要實際接觸便能傳送。一切都發生在潛意識的層面。因此，許多人以為自己的經驗僅止於目擊，但他們事實上經歷到的要多得多，而且以超乎他們所能想像的方式影響他們。


    我問潛意識為什麼這事會發生在艾迪身上，回答是他很脆弱／容易受傷（vulnerable），他很天真，很容易受影響，因此會讓接觸比較容易。要跟物質心態較重或世俗的人溝通就比較困難。我被告知，「脆弱」或「天真單純」是描述容易的接觸對象的適切形容詞。令人訝異的是，個體不相信這些事並不重要，因為他們的目標是要吸引這個個體的注意。他們在尋找機會，一個能進入個體、進入那個人核心的方式，這樣才能種下種籽。


    我對他所說的種籽很好奇，他給了我一個奇怪的答覆：「那是他們的存 在，他們一體性的種籽。我不是分離的。是一體，不是兩個，而是一個。種籽，或概念，經由光的注入被種在心靈裡。對整體的記憶都在細胞裡。只要有機會就能播種。我們跟他們都是一體。我們不是被創造成兩個，而是一個。他們要我們知道這點……而那一晚，他（指艾迪）有機會看到我們。他是個植入資訊的理想人選。」艾迪的一生顯然還有別的時候也受到教導，只不過他沒有起疑。由於這些教導和概念直接進入他的潛意識，他對它們並沒有意識上的記憶，他只記得曾遇到動物行為異常的怪事。


    「接觸」也常會透過動物的眼睛發生，因為牠們志願以這種方式被使用；透過驚奇的元素。艾迪在動物的眼睛裡看到一體的心靈/精神。在某些情況下，那不是真的動物，而是幻覺。之所以如此，是為了找到個案身上脆弱的地方。「那個人必須安靜。他必須停止他的世界。」外星人可以透過出其不意的元素讓人看到並不存在的事物。他們使人沒有提防。但我原先以為人類並不是隨時都在保持警戒，然而潛意識的答覆是：「你會很訝異，人們是隨時都在保持警戒。我們必須找到方法讓他們詫異。當那個人專注在某件事上，也許是個飛行器或動物什麼的，當我們吸引到他們注意力的時候，我們就能停止他們的世界。接著灌注才能發生。我們利用不尋常/驚訝這個元素。如果那個人照著平常的生活作息，我們無法吸引他們的注意力，那就起不了作用。必須要以某種方法轉移他們的注意力或焦點才行。」


    我說這意味為了找到這些小縫隙，他們必須持續監控才行。他說確實如此。這也解釋了為什麼旁人看不到他們。因為那些人世界並沒有被暫停。


    他說：「不只動物可以被用來執行這件事，夢也可以。在這樣的情況下，那會是受到控制的夢境，有著不尋常的特質。也就是清明夢，那種比平常的夢更真實的夢。很多時候這些夢從頭到尾會伴隨著身體的感受，直到當事人醒來。這些夢常是彩色的，或是帶有恐懼，但都是有特色的夢。夢的內容並不重要。這樣的夢境會比平常的夢來得更生動鮮明。即使醒了，夢裡的一切還是很逼真與清晰。這樣的夢可能帶有恐懼的情緒，因為有時必須在作夢的人沒注意時擄獲他們的注意力，就像讓清醒的人出其不意一樣。恐懼是最強大的情緒，有時可被用來促成個體世界的暫停，不論是在夢裡還是清醒的時候。」


    朵：聽起來，這些存在體以一種我們不瞭解的方式使用情緒。

    艾：我們（指人類）也以我們不瞭解的方式使用情緒。

    朵：所以真的沒有什麼好害怕的？

    艾：對。那只是輕敲破殼，並沒有要造成傷害。


    這次經歷還有個奇怪的情形，就是那輛滿載著人卻無視於艾迪的卡車。類似情況也出現在其他的案例。這個經驗顯然只是為了艾迪一個人，因為其他人都沒有察覺到天空上的巨大太空船和艾迪。這是最不尋常的部分。


    我住在鄉下，只要看到有車停在鄉間小路的一旁，一定會停下來看看他們是不是需要協助。這是很一般的禮貌，因為鄉下的房子間隔遙遠，要找到人幫忙很可能會有困難。你永遠不會無視於一個進退維谷的鄰居，就這樣從他身邊經過。艾迪在那些人的眼裡顯然是隱形的。他陷在自己小小的時間扭曲裡，其他人則完全不受影響。這確實是很私人的體驗。


    ## 第二章

    ### 濃縮和扭曲的時間▲ 051


    **監護人** THE CUSTODIAN ▲ 052


    艾迪醒來後，想起一些和動物有關的怪事。其中一次發生在他在牧場幫忙父親的時候。當時他正駕駛一輛牽引車，突然有隻鴿子飛了下來，停在他的右前臂。他嚇了一大跳，也覺得當下好像有什麼事發生。另一回是他坐在玉米田時，一隻土狼走向他，開始圍著他繞圈圈。土狼對人類大多避之唯恐不及，因此這個現象很不尋常。還有一次，他在森林裡打獵，一頭鹿讓他走上前碰觸，一點都不怕他。在這幾次他感覺有些什麼事發生，讓他慢了下來。這使得他看待事情的角度不同了。


    在幽浮案例裡，有很多人報告動物出現異常的舉止。作家惠特里·史崔伯稱部分案例是「簾幕記憶」（screen memories），即當事人看到的是動物的幻相，它其實遮蔽了真正正在場的事物。我想這些事告訴我們，接觸不一定是要具體或很戲劇性的，它也不一定要和外星生物有實際的接觸。


    它可以在你最沒有預期的時候，以非常微妙的方式發生。它在意識留下了鮮明的印象，但就在心智的注意力被分散而沒有監控到資料的輸入時，更深奧的事就在潛意識層面發生了。


    我自己就跟一隻貓頭鷹有過不尋常的經驗，我一直記得這件事，主要就是因為情況實在太怪異了。我不記得日期，但確定是冬天。我想那應該是發生在我完全投入幽浮資料以前的事，因為是直到簾幕記憶個案的出現，我才發現那件事的重要性。


    事情大約發生在一九八年前後。那天我去別的城市參加形上學團體的會議，開車回家時，已經過了午夜。我住在歐札克山脈一片林木覆蓋的山頂，那是個很偏遠的地方。住得偏遠對我來說並不是困擾，因為我經常旅行演講，很多時候都在這世界的繁忙城市裡。經過許多忙亂的活動之後,我很享受回到家的孤独。上山的路程有四英里，沿途只有大约五栋房子，我家离最近的邻居有一英里，因此这一路上都很暗，我也已习惯了在晚上看到野生动物出没。


    当车子开到山顶，我刚经过最后一位邻居的栅栏。就在我快到家的时候，车头大灯照到了一只站在路中间的大猫头鹰。我朝牠开近，牠一动也不动。牠就站在那裡，显然是被车灯迷惑住了。牠的头跟我车子的挡泥板同高，所以我可以清楚看到牠和牠那一眨也不眨的大眼睛。我按按喇叭，又靠近了一些。我不想伤害牠，只是想要牠离开道路。牠转过身，张开大大的翅膀，非常贴近地面地飞了起来，降落在车灯刚好照射不到的地方。我再一次向前，牠仍保持不动，等我逼近了面前，才又飞了一段很短的距离再降落，然后转身面对车子。这个情况一直持续到我开到了栅栏前面为止。


    牠会停在我车子前方的几个不同地方，定睛凝视著我，每次都要好几秒之后才肯移动。


    这个场面实在很奇特，所以我笑了。我不怕牠。我只是不断和牠说话，请牠离开，因为我不想辗到牠。但牠非得要我靠近并按喇叭，才肯动那麼一下，所以我连续这样做了几次。由於牠不断停了下来，又低飞掠过地面一小段距离后降落，我行进的速度因此慢了许多。终于，在最后一次牠飞到了车道入口的另一边，然后站在那裡，看著我转进去。


    我告诉女婿关于猫头鹰的奇怪行径，他认为很不寻常，因为猫头鹰不会那样。我的女婿懂得设陷阱、打猎，他对这片森林裡的动物行为非常熟悉。他也说到那隻猫头鹰听起来体型非常巨大。


    后来，当有窗帘记忆经验的个案，特别是那些和猫头鹰有关的个案出现以后，我认为很有趣。此外，我很确定自己並沒有消失的時間，因為進了屋子後我還看了時鐘，過了一段時間才上床睡覺。

    直到多年以後，在一九九六年的十月，這個事件才帶著一絲不安重新浮現。那時我剛完成在蘇格蘭和北英格蘭的巡迴演說，有時間可以在倫敦待上幾天，先好好享受難得的無事一身輕，再去英格蘭南部的多塞特（Dorset）演講。


    ## 第二章

    ### 濃縮和扭曲的時間▲ 053


    我對放鬆的想法大概和一般人不一樣。我利用那段時間去了倫敦的自然歷史博物館。博物館和圖書館是我最喜歡的地方。我從佇立著重建的巨大恐龍的大廳，走到將每個動物種類都保存在展示箱裡的旁廳。我在博物館裡連晃了好幾個小時。當我走到鳥類的展示廳時，我著實嚇了一跳。所有種類的貓頭鷹都被放在同一個展示箱裡展示，然而，其中居然沒有一隻和我多年前在杳無人跡的路上看到的貓頭鷹一樣巨大！沒有任何一隻是可以高過擋泥板的。我震驚到一股寒意往下竄過背脊。


    我驚訝地看著牠們，滿腦子都是困惑和疑問。

    那晚我在路上究竟看到了什麼？那晚還發生了別的事嗎？

    我從來沒有這麼懷疑，一直只當那是件怪事。但現在我知道了，如果還有別的事發生，那也是為了我即將要做的工作所進行的簡單和溫和的準備，我完全沒有必要害怕。我的意思並不是說這是跟外星人接觸的例子。我只是說，它跟我之後我調查過的案例有著不尋常且令人驚訝的共通性。至少，它已在我心裡浮現問號。


    本書其他章節提到，一旦他們吸引了你的注意，外星人可以讓事情在瞬間發生。而究竟有多少事可能在我們意識不知道的狀態下發生，實在是不可思議。


    ## 第二章

    ### 濃縮和扭曲的時間▲ 054


    調查過另一一起發生在小岩城的事件，當事人是位女性，她在交通尖峰時段經過一條繁忙的公路去上班。她看到一艘膠囊形狀的巨大飛行器驟然出現在前方空中。她以為大多數的車子會因此發出刺耳的煞車聲，然而卻一切如常。人行道上有人在慢跑，她瘋狂地從车上對他們揮舞喊叫，不斷往上指，想要吸引他們的注意。但他們繼續慢跑，宛如她是隱形的。她把車子停在人行道邊，看著那艘飛行器做了幾個猛烈的旋轉後飛走。它是那麼的巨大，但其他人卻完全沒注意到。


    她沒有被綁架，也沒有別的事情發生。


    這起事件跟我調查過的另一個案例雷同，而那個案例是一九九七年在半個世界之外的英格蘭所發生的事。這些外星人有能力創造出不讓別人目擊的個別體驗嗎？本書後面會更詳細的探索另一個類似案例。


    顯然地，有相當多的事一直發生在我們身上——在另一個層面。只有當某件事的發生，讓意識注意到了之前經歷的事，我們才會感到不自在。我認為，既然我們大多沒有察覺在另一個層面發生的事，而且也不能做些什麼，那我們就不該擔心，以免容易變得疑神疑鬼。


    希望有朝一日我們將會發現，這一切其實都在計畫之中，所謂看似瘋狂的舉動背後都有它的目的。


    這些事件和珍奈的經歷似乎是不同的類型。艾迪的世界裡仍有動作，珍奈的沒有。她周遭的世界快速地筆直飛來，在車子上方盤旋。凡勒莉被嚇到了，她倒退車子，掉頭朝城市的方向開去。


    當她開到公路上時，白色的發光體移動到乘客座的旁邊，跟她們同步移動。它沒有固定的形狀，似乎會變形，不過從頭到尾都非常白、明亮、而且發光。凡勒莉加速駛去，決心要盡快開到市區。接著她注意到一個奇怪的現象：雙線道上完全沒有車輛，也沒有燈光（聽起來跟珍奈的經歷出奇地雷同）。這個不尋常的狀況一直持續到她駛離公路，轉向市區為止。她看到街燈在她靠近的時候，一盞接著一盞地熄滅，所幸她還看得到路面。沒有東西在動，草和樹木全都靜止，呈現一片怪異的死寂。她們沒看到任何貓、狗、其他車輛、人，或是房子裡的任何燈光。就好像她們是這個世界上僅有的兩個人，感覺有如「陰陽魔界」般詭異。


    凡勒莉形容那個情況很像是在真空裡，沒有聲音，沒有動作，什麼都沒有。她們經過的區域，街燈都是滅的，然而有個柔和的光芒從她們的上方某處散發出來。


    她們決心要到有人的地方。她們經過一座大型購物商場，那裡有家通宵的餐廳。這時候那個物體在商場的上方盤旋。當車子經過那家二十四小時營業的餐廳時，她們發現裡面一片漆黑，四下無人；完全沒有任何生命跡象。她們繼續開著，一路上沒有遇到任何車或任何人。雖然已經很晚了，但通常城市的街道這時候還是會有人。


    情急之下，她們決定去一位友人位於鬧區的辦公室。那個朋友經常工作到很晚，她們知道她一定還在。當她們進到辦公室時，她們的世界又恢復了正常。她們沒有告訴友人路過的真正原因，在那裡也只停留了一會兒。然後凡勒莉就送她的朋友回到公寓。


