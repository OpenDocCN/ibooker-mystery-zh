  md: '**監護人** THE CUSTODIANS ▲ 022

    人類在發展的早期持續受到這樣的照顧、修正和操縱。基因操作和工程從一開始就已是人類的一部份。這並不是什麼新鮮事。這是為什麼我們之所以是在這樣，而不是住在山洞裡，在荒野中艱難求生的原因。外星人很小心地培育和影響人類大腦的發展，把對他們而言非常平常，但對我們來說驚奇不已的心靈能力和直覺感受，一點一點地引入。隨著人類的發展遠離動物階段，並且變得有能力應付生活和種種事務，外星人就不被准許擁有那麼多的影響力了。地球一直被強調是個自由意志的星球，而宇宙法則嚴格規定，自由意志必須受到尊重。


    外星人從地球園丁的任务轉變成了監護人。他們給了人類很多裝置與知識，好讓人類的生活變得容易些，然後我們這個新物種就必須自立自强。如果人類犯了錯，把知識用在錯誤的地方，那也是我們的權利，前提是不要侵犯到地球以外的生物的權益。


    外星人受到嚴格的不干預法則的約束。當然，他們對人類的研究仍持續進行，不時需要檢視實驗，看看人類的發展以及對環境的適應情況，並在適當的時機透過基因操作進行修正。如果這些事情從時間之初即已開始，那現在又為什麼不會持續呢？如果他们是在更高力量的許可之下進行，而我們對那股力量卻連最基本的理解能力都沒有，我们又怎能說他們沒有權利？我們並不會對一個母親說她沒有權利或職權去照顧她的小孩。這是我看這件事的邏輯。


    隨著人類的發展，我們對環境的影響已到了一個會反過來大幅影響人體的程度。我想，在人類環境經歷這些威脅性變化的時候，外星人進行更多測試和檢查並非巧合。他們當然想知道人類對自己身體做了什麼；他們一直都很有興趣。他們持續關心並修正和调整人類，好讓我們能適應自己


