  md: '**監護人 THE CUSTODIANS** ▲ 300

    大氣環境，不論是哪類型的傷害，我們有來自母星的一種特殊流質，只要吸收流質到身體，就能幫助修復。但它只用在這類緊急狀況。

    朵：那麼你們不是一直都需要它來維持生命？

    蘇：不用。太空船裡的大氣狀況設定在特定的氣溫和速率——我想不到正確的字。我們創造出特定

    的空氣，而它會維持我們的體能。我們之所以不能離開太空船很久的原因之一，就是外頭的空

    氣會使我們的健康惡化。

    朵：空氣，你的意思是地球的大氣？（是的。）那麼你們不需要食物之類的東西，除了那個流質。那

    是用喝的嗎？

    蘇：我想是用喝的，但也可以用注射的。不必一定是用喝的。我們真的不需要你們所知的食物。

    朵：那麼流質不是從嘴裡喝進去的？

    蘇：那可以是一種方式，不過比起用喝的，更常是注射到嘴裡。就像是你們給某個人——她現在在

    想的——像是靜脈注射之類的。放進一條管子，然後再透過管子把東西灌進去。你瞧，這是為

    什麼緊急時才用。我們的系統可以吸收母星上的一些植物生命，但不是必要。我們的系統或如

    你們所稱的「身體」，具有我們生存所需的一切，只要大氣對了就可以。你瞧，當一個人攝取

    食物是會有成長的效果，而這會在日後對人類外形產生老化的效應。這是為什麼我們能夠維持

    身體在同個大小的原因之一。因為我們沒有攝取會改變身體尺寸的食物。食物在以後會產生老

    化效應。'
