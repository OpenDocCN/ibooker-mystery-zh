    **監護人 THE CUSTODIANS** ▲ 124

    朵：協助護士的志工？

    凱：是啊。你知道，就是那些在醫院工作的女孩。

    朵：是什麼讓你認為自己是其中的一個？

    凱：因為我在育嬰室，這裡有嬰兒，我穿著有口袋的圍裙。這是為什麼我看起來像是醫院的助護。——不過我很怕這些嬰兒。

    朵：為什麼你會怕小嬰兒？

    凱：因為他們長得很奇怪。他們的眼睛好大。而且他們好聰明。

    朵：你怎麼知道他們很聰明？

    凱：因為他們會彼此談話。

    朵：用嘴說嗎？

    凱：不是。他們在水裡。水蓋過他們的頭，他們整個浸在水裡。他們像是對著彼此思考，但我可以

    知道他們在想什麼。其中一個知道我冇膠囊。他會說出來。

    朵：你說什麼膠囊？

    凱：掉在地上的那個。那只是個普通的膠囊。像藥一樣。你可以看到裡面。

    朵：裡面沒有東西嗎？

    凱：喔，裡面有東西，不過你還是可以看穿過去。我看不懂它是什麼。

    朵：你說他們之中有一個說要說出來？'
