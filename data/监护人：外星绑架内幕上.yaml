    凱：就像他們還是嬰兒的時候——醜。他們有大大的眼睛，臉形削瘦到幾乎沒有下巴。他們的眼晴……他們的眼睛像油，會變色。是黑色的，水水的。


    朵：會變什麼顏色？


    凱：紫色、藍色，像汽油。聽來像是有許多顏色的浮油。


    朵：他們長大以後的皮膚是什麼顏色？


    凱：我覺得嬰兒長大後看起來很好笑，紫紫的，灰灰的，看起來生病的樣子。嬰兒的皮膚幾乎是透明的，透明到你可以看到他們的血管。大人也有點像是那樣。


    朵：他們長大以後有穿任何衣服嗎？


    凯：我無法分辨。但他很瘦，手臂很長，長到腿。我是遠遠地看到他，看到他站在樓梯的最上面往下看。


    朵：這些嬰兒是從哪裡來的？他們有媽媽和爸爸嗎？（這是凱莉在催眠開始前寫下的問題）


    朵：他們是從膠囊來的。


    凱：膠囊是從哪裡來的？


    朵：有人在製作膠囊。


    朵：在另一個房間嗎？還是哪裡？


    凱：一定的。不是在這裡。


    朵：你怎麼知道他們在膠囊裡？


    凱：因為他們從膠囊長出來，長出小小的頭和小身體。


    朵：你知道他們為什麼要讓這些寶寶生出來？


    凱：我不知道。我只負責照顧嬰兒。他們不會傷害到誰。他們只是長大成人。長成看起來好笑的人。


    朵：當他們從水裡被帶出來，你有看過他們嗎？


    凱：沒有。那時候我也不能抱他們。


    朵：所以你不知道你是怎麼到這個地方的？你醒來就在這裡了？然後你回去睡覺，醒來後就是早上，在自己的床上？（對。）你從來不知道你什麼時候還要再去？


    凱：對，我不知道。


    情況越來越明顯，我們無法挖掘出更多資料，因為她沒離開過那個房間。我結束了這次的催眠，帶她回到完全清醒的意識狀態。從她的身體和臉部的跡象可以清楚看出，她處於很深的出神狀態。她完全沒動，只有臉部有表情。即使是在哭泣的時候，身體都沒動。當我開始倒數，引導她脫離出神狀態，在她再次意識到自己的身體時，她明顯地抽動了一下。醒來後，她對催眠的過程完全沒有印象。


    等她完全清醒過來，我請她照我事先的指令，畫出嬰兒的模樣。凱莉是很有才華的專業畫家，在最初做過那些夢之後，她自己就已經畫下來了。她現在潦草地速描出嬰兒的樣子，我後來跟她寄給我的圖做了比較。她一邊畫，一邊解釋兩者間的小差異。在畫成人的手時，她畫了三根手指頭，並說手和前臂幾乎一樣長。在她最初的畫裡，他們有四根手指，這次她說她覺得三根才對，而且不想更改。畫到孵化器時，她說：「這次我有股衝動，想要在旁邊加個東西，像是有東西把它們連在一起。我最早的畫沒有畫這個。」當她在畫盆子和連結的管子時，她突然往後縮了一下，大聲說道：「噢！我想起來了。我有把手放進水裡面。」


    我們笑了。這顯然是她最初不記得的「夢」中細節，而且令她討厭。她最後畫的是另一個女子開門時她瞥見的那個外星人。他站在樓梯的上面，背著光，所以她看不清楚他的五官。但她知道那是嬰兒長大後的模樣。她念大學時曾畫過這個成人站在螺旋式的樓梯，往下看著一群人。她不知道那個靈感是從哪裡來的。她把畫取名為「但丁的地獄」，還因此得了個獎。她保留那幅畫好些年，現在卻遍尋不著。當替我速描那幅畫面時，她有印象那不是樓梯，而是某種光束（跟她畫的太空船內部圖也許一樣是螺旋形）。


    我離開康妮家時已是午夜，凱莉當時仍在問催眠的事，我說要康妮跟她說。我因為隔天早上還要開車去小岩城參加會議，必須趕緊回家了。我知道我凌晨一點才會到家，但能跟凱莉說話就很值得。


    在後來的幾年間，我發現其他調查員也有嬰兒圖的影本。有些調查員說那是人類和外星人混種的實驗品，不過這個理論和凱莉在催眠下所說的完全不同。她堅持那些嬰兒不是人類，而是外星人。


    她寄給我的太空船內部圖顯示，她在這個持續的經驗裡一定曾經有走出那個房間的時候。


    過去幾年，我會在演講時展示這些圖。我總是描述那是艘巨大的母船，從內部圖看得出有很多樓層。然而現在我一邊寫，一邊納悶這是否有別的解释。凱莉會不會是在一個地底的實驗設施呢？我會這麼想是因為她提到軍隊之類的環境，還有另一個看似人類的工作人員。她從來沒有說那是在哪裡，只提到她醒來就在那兒了，她也從來沒能解釋她是怎麼被送到那裡的。在我的經驗裡，唯一大到能容納得下這種設施的東西就是母船，所以當時才會這麼假設。現在我卻懷疑是否如此。


    其他個案也報告了凱莉所說的災難場景，雖然細節不盡相同，但都是地球發生了類似的劇烈變化。我連在外國做幽浮回溯催眠時都遇到類似案例，而當事人對美國在這方面的「趨勢」並不知情。


    我收到的郵件也證實，有許多人透過生動驚人的夢境、靈魂出竅和靈光乍現，看到了類似的幻象。它們真的是對未來的驚鴻一瞥嗎？或者如同諾斯特拉達姆姆斯在《與我》中提到的……


    我的朋友莉安，是另一個資訊被藏在夢境狀態的案例。她四十出頭，在佛羅里達州擔任身心障礙孩童的老師。她的父母跟我老朋友，每年她都會來阿肯色州探望他們。莉安對靈現象一直很有興趣，最近的焦點則是在形上學。因為她的父母並不瞭解這些主題，每次她來阿肯色州，我們都會花很多時間討論這些事。一八八年的夏天，我們依向來的方式見面；到地方上的一家餐廳，找張角落的桌子，然後一聊就是好幾個小時，直到店家打烊。她的父母永遠也不瞭解我們聊這麼久是能有什麼收穫。


    在這次 的討論，莉安敘述她在大約六個月前遇到的奇怪經歷。她認為那可能是靈魂出竅，但隨著她越說越多，我認出那是典型的幽浮綁架案例。在此事件發生前，她從未閱讀過跟幽浮有關的書。事件過後，她才讀了一本阿斯塔指揮部的書，（譯注：Aster
    Command，有些人據說能接收到名為阿斯塔的外星人或外星群體的訊息，他們稱他是「星際聯邦宇宙大艦隊指揮官」，並描述他的外型貌似白種地球人。）並認為自己的經歷如果真是和外星人有關，她遇到的類型就是這種金髮藍眼並且抱持善意的美麗存在體。


    我的感覺是，如果這真是典型的案例，她很可能會發現某件令她幻滅的事，所以我要她確認她是否真的想要探索。她躍躍欲試，顯然相信這會是美好的經驗。我們約好了催眠時間，騰出一整個下午。


    莉安的阿姨和舅舅也是我的朋友，他們一樣無法理解姪女對詭異事物的興趣，不過他們出城去了，我們知道在他們家催眠不會受到干擾。我們坐在客廳的椅子，我請莉安對錄音機說出她記得的部份。我向來喜歡先替訪談錄音，這樣我們就能知道意識記憶的內容。要不個案事後有可能會說，催眠並沒有什麼新發現，因為他們記得所有的經過。但事實上，催眠總是會補上事發當時所不知道的細節。


    莉安不曉得該怎麼描述那個體驗，所以就稱為夢，然而它的性質顯然不是夢。她還記得那晚的日期和事件前的情形。莉安和她的先生麥克，還有他們的兒子亞當，計畫要去探視他們的母親，她因此到了很晚還在洗衣服。麥克和亞當都睡了，她一個人在客房摺衣。她注意到的第一件事是眼角外有小小的影子。她已經注意過這些影子好幾次了，它們跟房裡會投下陰影的東西都不一樣。它們會在地板或牆上，總是在一個低的平面。但當她定睛看過去，它們卻又消失不見。只有眼角餘光能瞥到它們。其他人也曾報告過這些影子，通常是發生在跟外星人接觸的開始。當然，它們可能和鬼魂或靈魂有關，但似乎跟外星人有越來越強的關聯。


    我對這個現象有個理論，雖然目前無法證實。有越來越多人猜測外星人和他們的飛行器是來自另一個次元。假使這是事實，那些影子可能是他們正要進入我們這個次元的初始階段，只是還沒有物質化－具象化。我的假設得到莉安說法的支持：「又看到那些小影子的時候，我心想：『今晚別煩我。我不想被打擾。』」那似乎是不尋常也沒頭沒腦的一句話，除非她的心智把那些影子聯想到了某種存在的實體。


    摺好衣服後，她去淋浴，打算等一下來看書。當她躺下來閱讀時，大約已是凌晨一點。她立刻就睡著了，還很突然地就從上方俯瞰著自己的身體。她以為自己在作夢，但那似乎是靈魂出竅。


    「最有趣和最興奮的，就是當我看著自己身體的時候，它在我眼中是一具空殼。我第一次清楚知道那種感覺。我好興奮。我不是同時在兩個地方。我看到自己的身体在床上，但很確定自己不在那裡面。」


    接著，情形有了變化。一陣急迫感讓她必須回到身體裡，因為她覺得她需要起來上個廁所。她回到了身體，但在還沒來得及下床前，就有一個很吵、很高音調的聲音立刻出現在她的耳邊。她描述那像是電鋸發出的聲音，高而尖銳刺耳。她有一半仍清醒的心思試著合理化：「現在是晚上了。哪個白目鄰居會在晚上這個時候用電鋸？」


    之後的幾年，我發現也有其他個案在事件開始前聽到引擎聲（通常是高音調）。這是另一個符合可預測模式的面向。但她接下來說的話就不尋常了，留下的印象也很不愉快。


    她感覺自己不再是躺在床上，而是頭下腳上地懸在空中。接著又有一種私處被戳刺的感覺。和性的感覺無關，比較像是被某種工具觸碰。然後，想要小解的感覺又來了。有部份的她在想：『我要尿床了。我感覺自己像是被倒掛著，但又在睡覺和在這張床上。這實在是太奇怪了。我想回去。我知道我再不回去就會尿床，床會被我搞得一蹋糊塗。』


    然後，她覺得有個器具放進了她的喉嚨，她有噎住的感覺。她心想：『他們要殺了我。我會噎死。』晚餐整個被吐了出來。她聞到一股噁心的膽汁味。她想：『我就知道床會被我弄得亂七八糟。我不只尿床，現在還吐了。這一定不是夢。感覺太真實了！』她敏銳地感受到那股氣味，這一定是正在發生的事。


    然而感覺來得急也去得快，她發現自己又躺了下來。她想醒來，於是看向臥室有玻璃拉門的地方。『房間裡很亮，我的意識想著：『咦，為什麼房間這麼亮？外面很黑啊。為什麼光會從拉門進來？我知道我有把門關上的。』於是我往外看，還是我出去了。我不記得了。外頭應該有一個露台，還有一個有棚子的泳池，但它們都不在那兒。原本是游泳池的地方是一張桌子，而且有道非常明亮的白光。我真的認為自己是在房間的床上，所以看到這個情景時很驚訝。露台和泳池不見了，反而出……』'
  mdcn: '## 第四章 隱藏於夢境的資訊


    的。和水有關係，像是雨水。


    她強調：「可是他們在哭，他們在哭。太多人生病了。我不知道他們是誰。我一個都不認識，可是我好像他們難過，我愛他們。她抗議：「我不知道為什麼是我。為什麼是我要做這件事？那個朦朧的東西說我不應該害怕。我是因此被派到地球。我不知道為什麼是我。——噢，他有一雙漂亮的眼睛。我從他好像碰了我的額頭，可是他並沒有手指。我突然間就回到了身體。我站起來走出房間。


    她凝望窗外黯黑的夜空，不安地抽菸，試著釐清這個經歷。「我知道我不是在作夢。我以前從來沒有坐著作夢過。我記得所有的事。他說我必須記住。這真的會發生，可是我不知道是在哪裡發生。」


    由於她太難過了，我認為我們最好離開那個場景，移動到下一個經歷。顯然我們也無法找到更多的資訊。在鎮定她的情緒並給予放鬆的指令之後，我讓她往前到一九六三年的九月，她還是大學生的時候。我引導她前往到嬰兒怪夢的那晚。她馬上開始描述她所看到的畫面。


    凱：「我在一個房間裡。我像是……醫院裡協助護士的志工。


    朵：協助護士的志工？


    凱：是啊。你知道，就是那些在醫院工作的女孩。


    朵：是什麼讓你認為自己是其中的一個？


    凱：因為我在育嬰室，這裡有嬰兒，我穿著有口袋的圍裙。這是為什麼我看起來像是醫院的助護。——不過我很怕這些嬰兒。


    朵：為什麼你會怕小嬰兒？


    凱：因為他們長得很奇怪。他們的眼睛好大。而且他們好聰明。


    朵：你怎麼知道他們很聰明？


    凱：因為他們會彼此談話。


    朵：用嘴說嗎？


    凱：不是。他們在水裡。水蓋過他們的頭，他們整個浸在水裡。他們像是對著彼此思考，但我可以知道他們在想什麼。其中一個知道我冇膠囊。他會說出來。


    朵：你說什麼膠囊？


    凱：掉在地上的那個。那只是個普通的膠囊。像藥一樣。你可以看到裡面。


    朵：裡面沒有東西嗎？


    凱：喔，裡面有東西，不過你還是可以看穿過去。我看不懂它是什麼。


    朵：你說他們之中有一個說要說出來？


    凱：（孩子氣的口吻）是啊。他很氣我。我在腦袋裡聽到的。


    凱莉描述裝著嬰兒的容器是邊緣呈圓弧狀的大盆子，看起來像是用類似透明塑膠的材質做成。她知道那跟塑膠不一樣，但也不像玻璃那麼硬。房間裡有很多這種容器。她數了數，然後說至少有十五個，最多十七個。它們被放在某個東西上面，因此她不用彎腰就能看到裡面。「它們都用一條透明管連在一起，水就是這樣注進去的。管子通往每個容器，容器與容器之間都有管子，穿透一個又一個，像是條水管。它連到牆壁上，那裡有可以旋轉和按壓的鈕。我不知道它們的用途。那不是我負責的事。有個女子進來，轉了轉鈕，確定嬰兒們沒事。她喜歡他們，會跟他們說話。我的工作是觀察這些嬰兒，照顧他們。我必須檢查水。我必須檢查在一邊的溫度還是什么的。寶寶都是大頭小身體。我不喜歡他們。他們好醜。」


    朵：他們一直都在水裡嗎？


    凱：嗯。我沒看過他們從水裡出來過。


    朵：你以前看過這個嗎？


    凱：當然。很多次。所以我才能在這裡工作。


    她描述那個女子雖然看起來苛刻，一臉嚴厲，但就像一般人類的樣子。「她是我的主管，可是我不喜歡她。她很兇。她不是大老闆。」


    朵：大老闆是誰？


    凱：在另一個房間的男子。


    朵：你知道他的長相嗎？


    凱：我不確定。我不進去那個房間。


    朵：這個房間裡還有其他的家具或東西嗎？


    凱：我沒看到家具。只有容器和裡面的嬰兒。我必須在嬰兒之間走來走去，檢查溫度和水，確定水位夠高。有些嬰兒閉上眼睛，有些睜著。他們看起來全都很像。好醜。有些容器是空的。藥丸就是要放進那裡。


    朵：你能告訴我過程嗎？


    凱：她把藥丸放到大約一寸的水裡，透過管子在底下加水，然後又放了其他東西到水裡。我不知道是什麼。她用小瓶子裝著，隨身攜帶。她會放一撮進去。就像你煮飯的時候會放一撮這個，一撮那個。然後她把膠囊放進去。膠囊溶解，開始長出嬰兒。


    朵：這會花很久時間嗎？


    凱：不會。我不確定多久，因為我不是一直都在那裡。但我知道不會很久。


    朵：你認為這些是人類嬰兒嗎？


    凱：不是，他們太丑了。如果是人類，他們一定是生病了。


    朵：你认为他们是什么？


    凯：我不知道。


    朵：好，你有出去过这个房间外面吗？


    凯：有。但不知道我们在哪裡，这裡很大。


    朵：像一间医院吗？


    凯：（停顿，然後小心的口吻）我不知道。我想有点像。像军事单位。


    朵：为什么你觉得像军事单位？


    凯：因为必须听从命令，你不能想去哪裡就去哪裡。


    朵：你怎麽到那裡的？


    凯：醒来就在那裡了。


    朵：你在那裡会待多久？


    凯：噢，至少一整晚。


    朵：离开以后，你又会做什麽？


    凯：睡觉。醒来。然後那就是个梦。


    朵：你说你常做这工作？


    凯：噢，是啊！我想是从我十四或十五岁开始的吧。不是每个人都被准许去照顾婴儿。我不知道我


    朵：你沒有選擇？


    凱：對。不能離開那個房間。


    朵：你知道他們會對嬰兒做什麼嗎？


    凱：他們會長大成人。長相很奇怪。


    朵：你看過成人的樣子嗎？


    凱：他們很高大，非常瘦。他們有很長的手臂。我沒有靠近看過他們。


    朵：長大後的臉是什麼樣子？


    凱：就像他們還是嬰兒的時候——醜。他們有大大的眼睛，臉形削瘦到幾乎沒有下巴。他們的眼晴……他們的眼睛像油，會變色。是黑色的，水水的。


    朵：會變什麼顏色？


    凱：紫色、藍色，像汽油。聽來像是有許多顏色的浮油。


    朵：他們長大以後的皮膚是什麼顏色？


    凱：我覺得嬰兒長大後看起來很好笑，紫紫的，灰灰的，看起來生病的樣子。嬰兒的皮膚幾乎是透明的，透明到你可以看到他們的血管。大人也有點像是那樣。


    朵：他們長大以後有穿任何衣服嗎？


    凯：我無法分辨。但他很瘦，手臂很長，長到腿。我是遠遠地看到他，看到他站在樓梯的最上面往下看。


    朵：這些嬰兒是從哪裡來的？他們有媽媽和爸爸嗎？（這是凱莉在催眠開始前寫下的問題）


    朵：他們是從膠囊來的。


    凱：膠囊是從哪裡來的？


    朵：有人在製作膠囊。


    朵：在另一個房間嗎？還是哪裡？


    凱：一定的。不是在這裡。


    朵：你怎麼知道他們在膠囊裡？


    凱：因為他們從膠囊長出來，長出小小的頭和小身體。


    朵：你知道他們為什麼要讓這些寶寶生出來？


    凱：我不知道。我只負責照顧嬰兒。他們不會傷害到誰。他們只是長大成人。長成看起來好笑的人。


    朵：當他們從水裡被帶出來，你有看過他們嗎？


    凱：沒有。那時候我也不能抱他們。


    朵：所以你不知道你是怎麼到這個地方的？你醒來就在這裡了？然後你回去睡覺，醒來後就是早上，在自己的床上？（對。）你從來不知道你什麼時候還要再去？


    凱：對，我不知道。


    情況越來越明顯，我們無法挖掘出更多資料，因為她沒離開過那個房間。我結束了這次的催眠，帶她回到完全清醒的意識狀態。從她的身體和臉部的跡象可以清楚看出，她處於很深的出神狀態。她完全沒動，只有臉部有表情。即使是在哭泣的時候，身體都沒動。當我開始倒數，引導她脫離出神狀態，在她再次意識到自己的身體時，她明顯地抽動了一下。醒來後，她對催眠的過程完全沒有印象。


    等她完全清醒過來，我請她照我事先的指令，畫出嬰兒的模樣。凱莉是很有才華的專業畫家，在最初做過那些夢之後，她自己就已經畫下來了。她現在潦草地速描出嬰兒的樣子，我後來跟她寄給我的圖做了比較。她一邊畫，一邊解釋兩者間的小差異。在畫成人的手時，她畫了三根手指頭，並說手和前臂幾乎一樣長。在她最初的畫裡，他們有四根手指，這次她說她覺得三根才對，而且不想更改。畫到孵化器時，她說：「這次我有股衝動，想要在旁邊加個東西，像是有東西把它們連在一起。我最早的畫沒有畫這個。」當她在畫盆子和連結的管子時，她突然往後縮了一下，大聲說道：「噢！我想起來了。我有把手放進水裡面。」


    我們笑了。這顯然是她最初不記得的「夢」中細節，而且令她討厭。她最後畫的是另一個女子開門時她瞥見的那個外星人。他站在樓梯的上面，背著光，所以她看不清楚他的五官。但她知道那是嬰兒長大後的模樣。她念大學時曾畫過這個成人站在螺旋式的樓梯，往下看著一群人。她不知道那個靈感是從哪裡來的。她把畫取名為「但丁的地獄」，還因此得了個獎。她保留那幅畫好些年，現在卻遍尋不著。當替我速描那幅畫面時，她有印象那不是樓梯，而是某種光束（跟她畫的太空船內部圖也許一樣是螺旋形）。


    我離開康妮家時已是午夜，凱莉當時仍在問催眠的事，我說要康妮跟她說。我因為隔天早上還要開車去小岩城參加會議，必須趕緊回家了。我知道我凌晨一點才會到家，但能跟凱莉說話就很值得。


    在後來的幾年間，我發現其他調查員也有嬰兒圖的影本。有些調查員說那是人類和外星人混種的實驗品，不過這個理論和凱莉在催眠下所說的完全不同。她堅持那些嬰兒不是人類，而是外星人。


    她寄給我的太空船內部圖顯示，她在這個持續的經驗裡一定曾經有走出那個房間的時候。


    過去幾年，我會在演講時展示這些圖。我總是描述那是艘巨大的母船，從內部圖看得出有很多樓層。然而現在我一邊寫，一邊納悶這是否有別的解释。凱莉會不會是在一個地底的實驗設施呢？我會這麼想是因為她提到軍隊之類的環境，還有另一個看似人類的工作人員。她從來沒有說那是在哪裡，只提到她醒來就在那兒了，她也從來沒能解釋她是怎麼被送到那裡的。在我的經驗裡，唯一大到能容納得下這種設施的東西就是母船，所以當時才會這麼假設。現在我卻懷疑是否如此。


    其他個案也報告了凱莉所說的災難場景，雖然細節不盡相同，但都是地球發生了類似的劇烈變化。我連在外國做幽浮回溯催眠時都遇到類似案例，而當事人對美國在這方面的「趨勢」並不知情。


    我收到的郵件也證實，有許多人透過生動驚人的夢境、靈魂出竅和靈光乍現，看到了類似的幻象。它們真的是對未來的驚鴻一瞥嗎？或者如同諾斯特拉達姆姆斯在《與我》中提到的……


    我的朋友莉安，是另一個資訊被藏在夢境狀態的案例。她四十出頭，在佛羅里達州擔任身心障礙孩童的老師。她的父母跟我老朋友，每年她都會來阿肯色州探望他們。莉安對靈現象一直很有興趣，最近的焦點則是在形上學。因為她的父母並不瞭解這些主題，每次她來阿肯色州，我們都會花很多時間討論這些事。一八八年的夏天，我們依向來的方式見面；到地方上的一家餐廳，找張角落的桌子，然後一聊就是好幾個小時，直到店家打烊。她的父母永遠也不瞭解我們聊這麼久是能有什麼收穫。


    在這次 的討論，莉安敘述她在大約六個月前遇到的奇怪經歷。她認為那可能是靈魂出竅，但隨著她越說越多，我認出那是典型的幽浮綁架案例。在此事件發生前，她從未閱讀過跟幽浮有關的書。事件過後，她才讀了一本阿斯塔指揮部的書，（譯注：Aster
    Command，有些人據說能接收到名為阿斯塔的外星人或外星群體的訊息，他們稱他是「星際聯邦宇宙大艦隊指揮官」，並描述他的外型貌似白種地球人。）並認為自己的經歷如果真是和外星人有關，她遇到的類型就是這種金髮藍眼並且抱持善意的美麗存在體。


    我的感覺是，如果這真是典型的案例，她很可能會發現某件令她幻滅的事，所以我要她確認她是否真的想要探索。她躍躍欲試，顯然相信這會是美好的經驗。我們約好了催眠時間，騰出一整個下午。


    莉安的阿姨和舅舅也是我的朋友，他們一樣無法理解姪女對詭異事物的興趣，不過他們出城去了，我們知道在他們家催眠不會受到干擾。我們坐在客廳的椅子，我請莉安對錄音機說出她記得的部份。我向來喜歡先替訪談錄音，這樣我們就能知道意識記憶的內容。要不個案事後有可能會說，催眠並沒有什麼新發現，因為他們記得所有的經過。但事實上，催眠總是會補上事發當時所不知道的細節。


    莉安不曉得該怎麼描述那個體驗，所以就稱為夢，然而它的性質顯然不是夢。她還記得那晚的日期和事件前的情形。莉安和她的先生麥克，還有他們的兒子亞當，計畫要去探視他們的母親，她因此到了很晚還在洗衣服。麥克和亞當都睡了，她一個人在客房摺衣。她注意到的第一件事是眼角外有小小的影子。她已經注意過這些影子好幾次了，它們跟房裡會投下陰影的東西都不一樣。它們會在地板或牆上，總是在一個低的平面。但當她定睛看過去，它們卻又消失不見。只有眼角餘光能瞥到它們。其他人也曾報告過這些影子，通常是發生在跟外星人接觸的開始。當然，它們可能和鬼魂或靈魂有關，但似乎跟外星人有越來越強的關聯。


    我對這個現象有個理論，雖然目前無法證實。有越來越多人猜測外星人和他們的飛行器是來自另一個次元。假使這是事實，那些影子可能是他們正要進入我們這個次元的初始階段，只是還沒有物質化－具象化。我的假設得到莉安說法的支持：「又看到那些小影子的時候，我心想：『今晚別煩我。我不想被打擾。』」那似乎是不尋常也沒頭沒腦的一句話，除非她的心智把那些影子聯想到了某種存在的實體。


    摺好衣服後，她去淋浴，打算等一下來看書。當她躺下來閱讀時，大約已是凌晨一點。她立刻就睡著了，還很突然地就從上方俯瞰著自己的身體。她以為自己在作夢，但那似乎是靈魂出竅。


    「最有趣和最興奮的，就是當我看著自己身體的時候，它在我眼中是一具空殼。我第一次清楚知道那種感覺。我好興奮。我不是同時在兩個地方。我看到自己的身体在床上，但很確定自己不在那裡面。」


    接著，情形有了變化。一陣急迫感讓她必須回到身體裡，因為她覺得她需要起來上個廁所。她回到了身體，但在還沒來得及下床前，就有一個很吵、很高音調的聲音立刻出現在她的耳邊。她描述那像是電鋸發出的聲音，高而尖銳刺耳。她有一半仍清醒的心思試著合理化：「現在是晚上了。哪個白目鄰居會在晚上這個時候用電鋸？」


    之後的幾年，我發現也有其他個案在事件開始前聽到引擎聲（通常是高音調）。這是另一個符合可預測模式的面向。但她接下來說的話就不尋常了，留下的印象也很不愉快。


    她感覺自己不再是躺在床上，而是頭下腳上地懸在空中。接著又有一種私處被戳刺的感覺。和性的感覺無關，比較像是被某種工具觸碰。然後，想要小解的感覺又來了。有部份的她在想：『我要尿床了。我感覺自己像是被倒掛著，但又在睡覺和在這張床上。這實在是太奇怪了。我想回去。我知道我再不回去就會尿床，床會被我搞得一蹋糊塗。』


    然後，她覺得有個器具放進了她的喉嚨，她有噎住的感覺。她心想：『他們要殺了我。我會噎死。』晚餐整個被吐了出來。她聞到一股噁心的膽汁味。她想：『我就知道床會被我弄得亂七八糟。我不只尿床，現在還吐了。這一定不是夢。感覺太真實了！』她敏銳地感受到那股氣味，這一定是正在發生的事。


    然而感覺來得急也去得快，她發現自己又躺了下來。她想醒來，於是看向臥室有玻璃拉門的地方。『房間裡很亮，我的意識想著：『咦，為什麼房間這麼亮？外面很黑啊。為什麼光會從拉門進來？我知道我有把門關上的。』於是我往外看，還是我出去了。我不記得了。外頭應該有一個露台，還有一個有棚子的泳池，但它們都不在那兒。原本是游泳池的地方是一張桌子，而且有道非常明亮的白光。我真的認為自己是在房間的床上，所以看到這個情景時很驚訝。露台和泳池不見了，反而出……』'
