  md: '外有小小的影子。她已經注意過這些影子好幾次了，它們跟房裡會投下陰影的東西都不一樣。它們會在地板或牆上，總是在一個低的平面。但當她定睛看過去，它們卻又消失不見。只有眼角餘光能瞥到它們。其他人也曾報告過這些影子，通常是發生在跟外星人接觸的開始。當然，它們可能和鬼魂或靈魂有關，但似乎跟外星人有越來越強的關聯。


