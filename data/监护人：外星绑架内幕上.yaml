  md: '# # 監護人 THE CUSTODIANS ▲ 274


    朵：我們對外星人綁架人類並帶上太空船的報告很有興趣。圖書館裡有任何關於這類外星人的資料嗎？


    S：有。在無數個世紀以前，他們乘著太空船來到地球。我稱他們為古代人，或ORION。他們對地球「播種」，好讓智能生物在這裡發展。他們也因此回來收集樣本，看看他們的「計畫」變得如何。他們在觀察情況的發展，因為他們想透過「間或的協助發展」的方式，在這個宇宙創造更多有智能的生命。他們覺得能做到這點的最好方法，是從地球上比較聰明的物種之一得到資料，而那就是人類。


    S：你可以告訴我一些古代人的事嗎？你說他們在地球有生命以前就在了？


    S：對。當地球還處於她很初始的階段，他們的科技就已經發展到銀河等級了。因為地球當時有極端氣候的問題，他們必須對地球工作。他們幫助地球平衡氣候，好讓生命能夠發展。偶爾，地球又會失去平衡，他們必須再幫她恢復平衡。過去的冰河世紀就是這樣子來的。


