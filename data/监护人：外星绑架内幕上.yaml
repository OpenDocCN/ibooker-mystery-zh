- md: '## 第二章 濃縮和扭曲的時間


    力發展能夠達成這項任務的能源。要他們領會靠心靈力量旅行並且進出不同次元的概念，就會困難得多。然而，幽浮謎團的解答再也不是那麼單純。越去挖掘這個謎團，概念就變得越複雜，對心智越是挑戰。或許這是為什麼我們直到現在才被給予這些另類資訊。


    在過去，我們人類心智必須習慣外星人用我們可以理解的方式搭乘幽浮旅行，譬如使用某類型的傳統能源來超越光速，以符合地球科學家所理解的物理法則。這些年間，資訊就像是用湯匙一點點地餵給人類，一次只給我們當下應付得來的量。當我們適應了概念的各個部分，當觀念不再令我們害怕之後，他們又會提供拼圖裡更複雜的一片。我真的懷疑人類到底有沒有瞭解完整概念的一天，就像我們並不會預期一個還在學走路的幼兒能夠瞭解幾何學或微積分一樣。因此，我們人類大概永遠不會有那個機會吧。


    我被多次告知，不要期待我所有的問題都會得到解答。有些知識好比良藥，有些則如毒藥一般，它的傷害會多過幫助。因此我接受凡是提供給我的資訊，我也發現，當我分析它們，試著瞭解那些概念時，我又會得到更多資訊讓我消化，而它們也從未超過我的因應能力。這也是我一直以來寫書的方法，我試著用大眾能夠領會和理解的方式來呈現這些概念，而現在，這本書將會涵蓋之前所不曾呈現的內容。探索者的面前仍有許多未被標明的未知領域，而我希望能朝那些地方前行。我們正如嬰兒學步般地，一步步踏入未知的世界。


    我們認為，這些外星人和飛行器的行動並不符合我們所知道的物理法則。我們認為他們在做的「不合自然規律」。因此對他們的存抱持極大懷疑。人們說，報告所说的那些外星人表現的本事，根本是不可能的。而我認為，我們終將發現那些現象是自然的，而非不自然。外星人遵循的可能新奇，但對他們來說卻再自然不過。根據我收到的資料，幽浮之所以能從視屏或雷達屏幕消失不見，是因為它們能突然改變振動頻率。你只要觀察過風扇或螺旋槳片在旋轉加速時是如何看不到葉片，你就對那是怎麼回事有了粗淺的概念。我們這些住在地球實體環境的人是在一個較低的頻率上振動。這個概念會在我的另一本書《迴旋宇宙》有進一步的解釋。這些外星人有許多並不是生活在其他星球，而是在其他次元。在那些次元裡，有許多其他的世界（有的是實體世界，有的不是）偶爾會與我們的世界並行存在，但它們振動的速度較快。通常，我們完全不會意識到彼此的世界。比較先進的其他世界察覺到我們，於是不時會前來地球觀察。然而，他們必須要放慢自身的振動速度（也就是降低振頻），才可以來到地球。降低和維持較慢的頻率不論多久，都被描述為痛苦的事。如果人類要進入那些次元就剛好相反，我們的振動必須加速。再回來時則必須放慢下來。這些外星生命有許多已經演化到純能量的階段，他們不再需要肉體。然而，需要身體跟人類互動時，他們也能以肉身顯現。我並不明白為什麼純能量的存在在旅行時還需要太空船。也許他也包括了他們的振動速度。


    許多案例顯示，被帶上小太空船的人類在身體上並沒有受到什麼持續的影響。也許這就是原因。


    那些飛行器進入我們的振動速度並在這裡運作，所以人類沒有適應的問題。小灰人通常就是在這些較小的飛行器上出現；這些被複製或製造出來的生物，顯然比其他型態的外星生物更容易在這此頻率中運作。小灰人是高大灰人依自己的形象所造，以便帶到地球進行瑣碎的僕役工作。他們採集人類、動物、植物等樣本，送到大型太空船上的實驗室做分析。


    人類被帶上較大太空船或「母船」的案例並不多。這些船隻通常是在大氣層的高處，因為過於龐大降落不易。不過，我現在認為，它們也是以不同的頻率振動，所以才會是隱形的（對我們來說）。也許太空船上的外星生命無法輕易調整到較慢的振動，因此偏好待在他們自在舒服的環境裡。人類如果要進入那些太空船，身體的分子必須經過調整，振動也必須加速。人體可以在有限的时间里這麼運作，但無法無限期地下去，否則身體就會瓦解。


    當從太空船上回來，個案會經歷複雜和困難的過程——重新調整身體，降低振動速度。當身體從這個痛苦經歷回到原本的系統，當事人會感到困惑、迷惘，或出現暫時性的麻痺和其他生理症狀（例如瘀血）。這可以解釋為什麼很少有人類被帶上大型太空船的案例，而登上小型飛行器和看到小灰人的經驗則常見得多，因為一般人可能無法適應登上大太空船所需經歷的生理變化。


    一九九八年，與蘇聯一同登上和平號 (MIR) 軌道太空站的最後一位美國人返回地球。據他表示，在處於無重力的狀況下那麼久後，最難適應的便是要習慣自己身體壓迫性的重量。


    ## 消失時間的事件並不總是跟表面所呈現的一樣。一般以為，經歷消失時間的當事人是跟外星人或幽浮有直接的接觸，特別是有光（或飛行物）出現的時候。但我發現情況不一定如此。很多案例都只是當事人的心靈封鎖了不愉快或受創的經驗，和外星人並無關聯。只要催眠的狀態深到能夠直接聯繫潛意識心智，我們就能取得正確的資料。


    潛意識具有所有的記憶，它會報告真正發生的事件，不會有無意識心干預所產生的情緒渲染或扭曲。我總是告訴調查員，當個案報告消失的時間或其他看似符合模式的經驗時，不要驟下結論。永遠從最簡單的解釋找起，再進入較複雜的可能性。在很多案例裡，簡單的解釋就是答案。


    由於某些不明的原因，有些人偏好用複雜的答案來解釋他們生命裡的事件。「我有過消失的時間，所以一定被帶上幽浮過。」因為某個神祕的心理過程，這個抽象的推論比平凡但不愉快的解釋更容易被接受。我有個個案確實有過消失的時間，也確實與外星人有過接觸，但那卻是一個在錯誤的時間到了錯誤地方的案例。


    湯姆一直為了一九七二年在麻薩諸塞州發生的消失時間事件感到困擾，因此想一探究竟。他當時是為了生意的事去客戶家開會，與在場的其他人共進了一頓美好的晚餐，隨著時間慢慢過去，夜色越來越深，有個女子邀請湯姆到她的公寓留宿，好讓他不用趕回隔壁城鎮的家。


    ### 監護人 THE CUSTODIANS


    湯姆記得那夜那位女士正在開車的時候，在一些樹的上方，有道亮光劃破天際。那位女士似乎因此變得緊張，但接下來的事湯姆就不記得了，他只記得第二天早上在她的公寓裡醒來。他沒有服用任何藥物或喝酒，始終無法解釋消失的時間。沒多久，那位女士搬走了，湯姆並不曉得她去了哪裡。


    透過催眠，湯姆重返當日的場景，回憶起事件的確切日期，並描述了那頓可口的晚餐。他提供了許多他的意識心智已經遺忘的細節，其中有許多都跟我們要找的真相無關，但顯然所有的資訊都存在著，而且隨時可以接通取得。那位女子的名字叫史黛拉，湯姆說她的車是全新的一九七二年龐帝克火鳥。當他們循著鄉村小路駕車前往她的公寓，時間已近午夜。湯姆敘述了他們之間的閒聊。


    然後，他的眼角餘光瞥見他以為是一團火球或「流星」之類的東西。天空上的光越來越亮，眼看著就要朝他們逼近。


    引擎突然熄火了，車就停在路的中央。史黛拉非常害怕，但說來奇怪，湯姆的反應卻很不同。


    他突然覺得疲憊不堪，接著就睡著了。這絕不是正常的反應。我知道他的潛意識一直是清醒的，我可以向它請教。


    他的潛意識告訴我，他和史黛拉都睡著了。有道耀眼的光包圍住車子，光從所有的窗戶照進來。


    接著，車門被打開，他們睡著的身體被移出車子。我問是誰帶他們出來。


    「他們看起來像人類。一個褐色頭髮的男子，另一個是金髮。他們把我們帶出車外，檢查了車子裡面，然後看著我們上上下下，最後才把我們放回車裡。」


    湯姆說他們讓他無意識的身體保持直立，用一個儀器在他全身上下檢查。儀器在操作時發出喀答喀答的聲音。我認為他們要用這種方式把他抬起來應該會很重。他回說大概吧，不過他們做起來卻不怎麼費力。


    我請他描述那個儀器。「它看來細細長長的，類似電視的天線，大約有十三或十四英寸長（譯注：約 33－35 公分），周圍有電線包著。它會閃爍顏色，是介於螢光綠和深紫色的閃光。當儀器經過身體時會發出光，還有喀答的聲音。但我不知道它的用途。」


    接下來他們就被放回車裡。引擎動了，他們又行駛在路上。兩名男子和光通通消失不見。史黛拉說：「噢，我剛剛有剎那一定是睡著了。」我一定是太累了。「噢！兩點半了！湯姆也覺得自己打了瞌睡。然後史黛拉看了一下錶，她被自己看到的時間嚇了一跳。「噢，天啊！兩點半了！我們不是十二點走的嗎？噢，我不知道怎麼回事。我們最好趕快。」在開車去她的公寓途中，他們都沒有再提起這事。湯姆覺得非常累，好像能量耗盡了一樣，剩餘的路程猛打瞌睡。到了公寓，史黛拉帶他去客房，他一頭便栽倒在床上。除了隔天早上被電話吵醒外，他不記得其他的事。


    我問他的潛意識不知道為什麼那個看起來奇怪的儀器檢查。它回答：「是的，我知道為什麼。是因為史黛拉。她在波士頓南部一家公司工作，那家公司正在準備越戰的軍事機密。史黛拉可以接觸到所有不同類型的資訊。我想他們是想從她身上得到資訊，和我沒有太大關係。我只是剛好在她們跟她接觸的時候在場而已。他們監控她，大概已經和她接觸過很多次了。我知道有什麼不對勁，因為她總是很緊張不安的樣子。她很多疑，不容易交朋友，而且常常搬家。在她搬來麻州之前，她住過日本、夏威夷和加州。她到過世界各地。」


    朵：他們也用那個儀器檢查她嗎？

    湯：我看不見他們對她做了什麼，因為他們用那個東西在我身上檢查。但我知道他們做的不只這些。他們跟她有某種聯繫。

    朵：那個儀器的用途是什麼？

    湯：它和我們現在有的電腦斷層掃描很像。它在檢查我的生命機能，還有測量我的腦波。他們透過腦波影響人類。不過這些人不是壞人。他們不是冷酷或沒有感情，他們只是在監控史黛拉，擔心她可能涉及某些事，有點像是間諜的活動。那是他們想監控她的原因之一，因為她知道很多資料。史黛拉有無線電和細菌學的學位，又是電機工程博士，她是個很聰明的女人。

    朵：他們是想用這種方式從她身上得到資訊嗎？

    湯：不是。他們已經知道所有她知道的事，因為他們可以讀她的思緒。但因爲某個原因還是什麼的，她對他們來說很重要。我不清楚。

    朵：為什麼他們會擔心她涉及間諜活動？這對他們來說有什麼影響嗎？

    湯：她有那方面的問題。蘇聯集團的人曾跟她接觸，要給她十萬美元，不過她從來沒接受他們的錢。

    朵：這些外星人擔心她捲入間諜活動或那類的事？你的意思是這樣嗎？


    湯：不是，他們不擔心她捲入間諜活動或類似的事。她是他們在監控的人之一，就只是這樣。她也會接觸到各類型的科學論文、專題著作和這類性質的事。這是她被監控的原因。

    朵：你現在跟我說的有關她的資料，是你本來就知道，還是現在才知道？

    湯：噢，我知道她有學位。我也知道她在波士頓外郊一家和電機工程有關的公司工作，但我原先不曉得她跟間諜活動有關。

    朵：那麼你剛剛才發現的她被監控這件事，你當時並不曉得？

    湯：對。她對被監控這件事感到很困擾，因此才在世界各地旅行。她想遠離他們。這件事過後她很快就離開了。我猜想她應該是搬離了麻州，因為我連絡不上她。

    朵：你沒有再見過她？

    湯：沒有，她必須去……（停頓，然後很驚訝）去休士頓。史黛拉離開是因為她被調到休士頓。

    朵：好。那天之後你還有過類似的經驗嗎？看到那個光或什麼的？

    湯：沒有，再也沒有過。那是唯一的一次。


    我覺得這個案例很有意思，因為這個時間消失的個案並不是外星人注意的目標。如果個案是在想像，他會有很大的想像空間，但他甚至不是事件的主角。此外，他說他後來再也沒有過類似的事件，這一點也很有趣。如果這是他想像出來的，他很容易就能把故事延伸下去。然而，卻沒有任何後續。


    ## 一


    一九八八和八九年的夏天，我遇到三個會聯想到跟時間扭曲，甚至移動到另一個次元有關的案例。


    一九八七年的夏天，盧在地方超市的免費報紙上刊登了一則小廣告，徵尋遇過不尋常幽浮事件的人打電話給他。那是他第一次，也是唯一一次刊登這種廣告。


    一位名叫珍奈的女子打電話過去，說她前一晚在他那個地區遇到奇怪的事。那個女子很不安，不願公開自己的身分。她告訴盧，事發當時她從小岩城經過康威區回家，卻只花了十五分鐘。那段路程大約是五十英里，通常要花上四十五分鐘。此外，四線道的州際公路上完全不見其他車輛也挺怪的。回到家後，她養的幾隻狗又不尋常地狂吠。盧說，看來我們有了一宗時間濃縮而非時間消失的案例。過程當中唯一可能和幽浮有關的，就是她看到巨大明亮的光在一些樹頂上頭。不過她是個不想透露身分的商界人士，談論這件事似乎令她覺得尷尬。


    盧於是到她家跟她詳談。他發現珍奈是個非常實事求是的人，從沒閱讀過幽浮方面的資料，也沒有任何興趣。她認為如果真的發生了什麼，一定會有符合常識的合理解釋，但她實在很難解釋時間的加速和天上的光。盧問她是否願意接受催眠，她非常抗拒。我叫盧不要勉強，讓她自己做決定。


    但如果有，我會想跟她見上一面。


    接下來的一年，盧時不時會與珍奈聯繫。她緊抓著各種對那道光的奇怪解釋，甚至接受那是有人在樹上用鏡子往上反射的亮光。由於太想找到一個解釋，結果解釋反而比實際的事件還要詭異。


    終於，在一九八九年的四月，我在尤里卡溫泉市（Eureka Springs）的歐札克幽浮大會上見到了珍奈。她勉強答應出席。盧介紹了我們認識。珍奈說那個週末至少有其他三千件事是她寧願去做的，參加這場大會並不是其中之一。她對這方面純粹就是不感興趣。大會上，她一直很專心地聆聽講者說話，也看了會議所放映的照片和投影片，不過並沒有什麼和她的經驗類似，所以她認為這只是在浪費時間。當大多數的人都還在會議廳的時候，我們兩人先到了大廳，坐下來聊天。


    珍奈是很有魅力的金髮女子，成熟，但不會太過於世故。她把自己打扮得很好，給人一種她習慣跟富裕、教育程度高的人士往來的印象。然而她很友善，不會給人事利眼的感覺。她和我在一起顯然很放鬆，很快就告訴我她的故事。能把事情說出來，好似讓她鬆了口氣。她像是知道我不會笑她，而是要幫助她。由於她最近腦裡一直閃過其他細節，她感到困擾，這才決定要探索這件事。她非常仔細和確實地向我描述了細節。


    依然對事情會有合理解釋保持正面的態度，她相信只要能找到解釋，這件事就不會困擾她了。


    我確信她自己已經核對過這起奇怪的濃縮時間事件，因為她似乎是那種想替每個可能的細節找到證據，滿足自己好奇心的人。她的確這麼做了，她已經跟好幾個人核對過事發當晚她離開小岩城餐廳的時間，確定自己開上四十號州際公路是在午夜前後。


    她沿著公路一直開，然後轉向通往她家的那條路。由於那個區域只有一條馬路可以進出，不論白天還是晚上，總是有車子經過。珍奈幾乎天天走這個路線，對每個轉彎，還有路上的每棟房子瞭如指掌。但那晚一切似乎都變得陌生和不同。天空沒有半點星光，路上也十分安靜，連蟋蟀的聲音都沒有。她清楚地注意到沒有任何一間房子有光，一向亮著的戶外盞燈也熄了。珍奈很熟悉這一帶，向來老遠就能看到的沿路屋子裡的燈光，那時卻萬籟俱寂，沒有半點生命跡象。路上空無一車，她覺得很不尋常。


    接著她就看到了那個東西。一個龐然大物懸浮在右前方的樹頂上。那是個巨大的橢圓體，散發出非常獨特的亮橘色的光。光是包覆在橢圓形裡，並沒有往外投射。橢圓體上沒有標誌、窗戶、輪廓或其他顏色的光，就是純粹的橘色橢圓。乍看下，她以為那是夕陽，而光和顏色則來自雲的反射的錯覺。這是她想到的第一個解釋，只不過太陽早在幾個鐘頭前就下山了。接著她又想到流星和極光的可能。雖然一輩子從沒看過這樣的東西，她仍試著把這個物體與某個合理的事物連結。她減緩車速，慢慢靠近觀察。這麼做通常會很危險，因為路上會有其他車子開過，然而，路上卻一反常態地不見任何車輛。


    車子緩緩地開向那個物體的方向，珍奈被那巨大的光迷惑住了。她後來看到一個她以為是死掉的動物在前面的馬路上。她開到那個東西的旁邊，停下車端詳，卻驚訝地發現那是隻被凝結成一個不尋常姿勢的普通家貓。牠蹲坐著，毛髮豎起，兩隻前掌舉在空中，往上凝視著那個吸引了珍奈注意的物體。那隻貓沒有死，只是怪誕地凍結在凝視那個物體的奇怪姿勢裡，幾乎是在呆滯（或說生命暫停）的狀態。那是珍奈遇到的唯一生命跡象，如果要這麼説的話。


    她繼續慢慢地開，並一邊凝望著那個物體。當開到它的旁邊，它卻以一種奇怪的方式不見了。


    它的頂端和底部緩緩合而為一，上下匯聚後，就不見蹤影，樹頂再度是一片黑暗。珍奈用兩手比給我看（做手勢），我得到的印象是一隻巨大的眼睛垂下了眼皮。我問珍奈是否確定它不是往下降到樹的後面而離開了她的視線範圍。她說如果是這樣的話，她應該會透過樹叢看到它下降時的光。她很肯定頂端和底部合在一起，然後光就消失了。那個物體有可能仍在原處，只是處於無光的狀態。


    由於天空沒有星星，所以它有可能是融入了黑暗裡。不論是怎麼回事，珍奈接著便加速回家，比之前還感到困惑。她說她不曾覺得害怕，只是讚嘆、驚奇和納悶。她精明的心思一直試著想瞭解那到底是什麼東西。


    當她把車開進自家車道時，她養在牢固圍欄裡的純種狗突然怒吼了起來。牠們吠吼嗥叫，咬著欄杆想要出來。珍奈說牠們是很溫馴的品種，以前從來不會這樣。通常地或別人進入車道，牠們叫都不叫一聲。但那晚她回到家時，牠們卻像瘋了一樣。我問她是否注意到車子或自己身上有什麼不尋常，她說沒有。


    當珍奈進了屋裡看到時間，她吃了一驚。她將屋裡所有的時鐘都對過一次，每個時間都是一樣的。她估計自己只花了十五分鐘就回到了家。這太快了，沒有可能，尤其她又是用那麼慢的速度開車。她叫醒她先生，要他告訴她時顯示的時間，並要他隔天記得她回家的這個時刻。


    她珍說她後來會突然記起和那晚有關的事。她記得當自己第一眼看到那個物體時，前方公路有某樣東西從她車前快速飛過。同時，公路中央突然有道閃光。她描述那麼鏡子反射光很像，忽然她快速翻轉，並因此出現閃光。她不是能清楚描述，但那麼她想起嘉年華會奇幻屋裡的鏡廳。我們始終沒有進行催眠，雖然我相信這個故事還有更多內容。珍奈不願再深入探索，因為她的生活有條不紊。她很投入她的事業，不想被任何事物分心或製造生活裡的混亂。她把這個事件看成一件怪事，雖然她可能永遠也無法瞭解，她還是要繼續過她的日子。我的工作最重要的一點，就是當事人能夠繼續過他們正常的生活。不論他們有過什麼樣的經歷，我的目的是協助他們理解，並試著將那個經歷整合到他們的人生。如果揭露更多只會令他們困擾，那麼就最好不要再繼續探索。我也告訴那些出於好奇而想做催眠的人，有時他們可能會發現一些他們希望自己不曾去碰觸的事情，而資訊一旦被揭露，就無法再放回去。在這種情況下，珍奈很可能是明智的，因為她不想瓦解她仔細規劃好的人生。事情本該如此，我尊重每位個案的意願。'
  mdcn: '## 第二章 濃縮和扭曲的時間


    力發展能夠達成這項任務的能源。要他們領會靠心靈力量旅行並且進出不同次元的概念，就會困難得多。然而，幽浮謎團的解答再也不是那麼單純。越去挖掘這個謎團，概念就變得越複雜，對心智越是挑戰。或許這是為什麼我們直到現在才被給予這些另類資訊。


    在過去，我們人類心智必須習慣外星人用我們可以理解的方式搭乘幽浮旅行，譬如使用某類型的傳統能源來超越光速，以符合地球科學家所理解的物理法則。這些年間，資訊就像是用湯匙一點點地餵給人類，一次只給我們當下應付得來的量。當我們適應了概念的各個部分，當觀念不再令我們害怕之後，他們又會提供拼圖裡更複雜的一片。我真的懷疑人類到底有沒有瞭解完整概念的一天，就像我們並不會預期一個還在學走路的幼兒能夠瞭解幾何學或微積分一樣。因此，我們人類大概永遠不會有那個機會吧。


    我被多次告知，不要期待我所有的問題都會得到解答。有些知識好比良藥，有些則如毒藥一般，它的傷害會多過幫助。因此我接受凡是提供給我的資訊，我也發現，當我分析它們，試著瞭解那些概念時，我又會得到更多資訊讓我消化，而它們也從未超過我的因應能力。這也是我一直以來寫書的方法，我試著用大眾能夠領會和理解的方式來呈現這些概念，而現在，這本書將會涵蓋之前所不曾呈現的內容。探索者的面前仍有許多未被標明的未知領域，而我希望能朝那些地方前行。我們正如嬰兒學步般地，一步步踏入未知的世界。


    我們認為，這些外星人和飛行器的行動並不符合我們所知道的物理法則。我們認為他們在做的「不合自然規律」。因此對他們的存抱持極大懷疑。人們說，報告所说的那些外星人表現的本事，根本是不可能的。而我認為，我們終將發現那些現象是自然的，而非不自然。外星人遵循的可能新奇，但對他們來說卻再自然不過。根據我收到的資料，幽浮之所以能從視屏或雷達屏幕消失不見，是因為它們能突然改變振動頻率。你只要觀察過風扇或螺旋槳片在旋轉加速時是如何看不到葉片，你就對那是怎麼回事有了粗淺的概念。我們這些住在地球實體環境的人是在一個較低的頻率上振動。這個概念會在我的另一本書《迴旋宇宙》有進一步的解釋。這些外星人有許多並不是生活在其他星球，而是在其他次元。在那些次元裡，有許多其他的世界（有的是實體世界，有的不是）偶爾會與我們的世界並行存在，但它們振動的速度較快。通常，我們完全不會意識到彼此的世界。比較先進的其他世界察覺到我們，於是不時會前來地球觀察。然而，他們必須要放慢自身的振動速度（也就是降低振頻），才可以來到地球。降低和維持較慢的頻率不論多久，都被描述為痛苦的事。如果人類要進入那些次元就剛好相反，我們的振動必須加速。再回來時則必須放慢下來。這些外星生命有許多已經演化到純能量的階段，他們不再需要肉體。然而，需要身體跟人類互動時，他們也能以肉身顯現。我並不明白為什麼純能量的存在在旅行時還需要太空船。也許他也包括了他們的振動速度。


    許多案例顯示，被帶上小太空船的人類在身體上並沒有受到什麼持續的影響。也許這就是原因。


    那些飛行器進入我們的振動速度並在這裡運作，所以人類沒有適應的問題。小灰人通常就是在這些較小的飛行器上出現；這些被複製或製造出來的生物，顯然比其他型態的外星生物更容易在這此頻率中運作。小灰人是高大灰人依自己的形象所造，以便帶到地球進行瑣碎的僕役工作。他們採集人類、動物、植物等樣本，送到大型太空船上的實驗室做分析。


    人類被帶上較大太空船或「母船」的案例並不多。這些船隻通常是在大氣層的高處，因為過於龐大降落不易。不過，我現在認為，它們也是以不同的頻率振動，所以才會是隱形的（對我們來說）。也許太空船上的外星生命無法輕易調整到較慢的振動，因此偏好待在他們自在舒服的環境裡。人類如果要進入那些太空船，身體的分子必須經過調整，振動也必須加速。人體可以在有限的时间里這麼運作，但無法無限期地下去，否則身體就會瓦解。


    當從太空船上回來，個案會經歷複雜和困難的過程——重新調整身體，降低振動速度。當身體從這個痛苦經歷回到原本的系統，當事人會感到困惑、迷惘，或出現暫時性的麻痺和其他生理症狀（例如瘀血）。這可以解釋為什麼很少有人類被帶上大型太空船的案例，而登上小型飛行器和看到小灰人的經驗則常見得多，因為一般人可能無法適應登上大太空船所需經歷的生理變化。


    一九九八年，與蘇聯一同登上和平號 (MIR) 軌道太空站的最後一位美國人返回地球。據他表示，在處於無重力的狀況下那麼久後，最難適應的便是要習慣自己身體壓迫性的重量。


    ## 消失時間的事件並不總是跟表面所呈現的一樣。一般以為，經歷消失時間的當事人是跟外星人或幽浮有直接的接觸，特別是有光（或飛行物）出現的時候。但我發現情況不一定如此。很多案例都只是當事人的心靈封鎖了不愉快或受創的經驗，和外星人並無關聯。只要催眠的狀態深到能夠直接聯繫潛意識心智，我們就能取得正確的資料。


    潛意識具有所有的記憶，它會報告真正發生的事件，不會有無意識心干預所產生的情緒渲染或扭曲。我總是告訴調查員，當個案報告消失的時間或其他看似符合模式的經驗時，不要驟下結論。永遠從最簡單的解釋找起，再進入較複雜的可能性。在很多案例裡，簡單的解釋就是答案。


    由於某些不明的原因，有些人偏好用複雜的答案來解釋他們生命裡的事件。「我有過消失的時間，所以一定被帶上幽浮過。」因為某個神祕的心理過程，這個抽象的推論比平凡但不愉快的解釋更容易被接受。我有個個案確實有過消失的時間，也確實與外星人有過接觸，但那卻是一個在錯誤的時間到了錯誤地方的案例。


    湯姆一直為了一九七二年在麻薩諸塞州發生的消失時間事件感到困擾，因此想一探究竟。他當時是為了生意的事去客戶家開會，與在場的其他人共進了一頓美好的晚餐，隨著時間慢慢過去，夜色越來越深，有個女子邀請湯姆到她的公寓留宿，好讓他不用趕回隔壁城鎮的家。


    ### 監護人 THE CUSTODIANS


    湯姆記得那夜那位女士正在開車的時候，在一些樹的上方，有道亮光劃破天際。那位女士似乎因此變得緊張，但接下來的事湯姆就不記得了，他只記得第二天早上在她的公寓裡醒來。他沒有服用任何藥物或喝酒，始終無法解釋消失的時間。沒多久，那位女士搬走了，湯姆並不曉得她去了哪裡。


    透過催眠，湯姆重返當日的場景，回憶起事件的確切日期，並描述了那頓可口的晚餐。他提供了許多他的意識心智已經遺忘的細節，其中有許多都跟我們要找的真相無關，但顯然所有的資訊都存在著，而且隨時可以接通取得。那位女子的名字叫史黛拉，湯姆說她的車是全新的一九七二年龐帝克火鳥。當他們循著鄉村小路駕車前往她的公寓，時間已近午夜。湯姆敘述了他們之間的閒聊。


    然後，他的眼角餘光瞥見他以為是一團火球或「流星」之類的東西。天空上的光越來越亮，眼看著就要朝他們逼近。


    引擎突然熄火了，車就停在路的中央。史黛拉非常害怕，但說來奇怪，湯姆的反應卻很不同。


    他突然覺得疲憊不堪，接著就睡著了。這絕不是正常的反應。我知道他的潛意識一直是清醒的，我可以向它請教。


    他的潛意識告訴我，他和史黛拉都睡著了。有道耀眼的光包圍住車子，光從所有的窗戶照進來。


    接著，車門被打開，他們睡著的身體被移出車子。我問是誰帶他們出來。


    「他們看起來像人類。一個褐色頭髮的男子，另一個是金髮。他們把我們帶出車外，檢查了車子裡面，然後看著我們上上下下，最後才把我們放回車裡。」


    湯姆說他們讓他無意識的身體保持直立，用一個儀器在他全身上下檢查。儀器在操作時發出喀答喀答的聲音。我認為他們要用這種方式把他抬起來應該會很重。他回說大概吧，不過他們做起來卻不怎麼費力。


    我請他描述那個儀器。「它看來細細長長的，類似電視的天線，大約有十三或十四英寸長（譯注：約 33－35 公分），周圍有電線包著。它會閃爍顏色，是介於螢光綠和深紫色的閃光。當儀器經過身體時會發出光，還有喀答的聲音。但我不知道它的用途。」


    接下來他們就被放回車裡。引擎動了，他們又行駛在路上。兩名男子和光通通消失不見。史黛拉說：「噢，我剛剛有剎那一定是睡著了。」我一定是太累了。「噢！兩點半了！湯姆也覺得自己打了瞌睡。然後史黛拉看了一下錶，她被自己看到的時間嚇了一跳。「噢，天啊！兩點半了！我們不是十二點走的嗎？噢，我不知道怎麼回事。我們最好趕快。」在開車去她的公寓途中，他們都沒有再提起這事。湯姆覺得非常累，好像能量耗盡了一樣，剩餘的路程猛打瞌睡。到了公寓，史黛拉帶他去客房，他一頭便栽倒在床上。除了隔天早上被電話吵醒外，他不記得其他的事。


    我問他的潛意識不知道為什麼那個看起來奇怪的儀器檢查。它回答：「是的，我知道為什麼。是因為史黛拉。她在波士頓南部一家公司工作，那家公司正在準備越戰的軍事機密。史黛拉可以接觸到所有不同類型的資訊。我想他們是想從她身上得到資訊，和我沒有太大關係。我只是剛好在她們跟她接觸的時候在場而已。他們監控她，大概已經和她接觸過很多次了。我知道有什麼不對勁，因為她總是很緊張不安的樣子。她很多疑，不容易交朋友，而且常常搬家。在她搬來麻州之前，她住過日本、夏威夷和加州。她到過世界各地。」


    朵：他們也用那個儀器檢查她嗎？

    湯：我看不見他們對她做了什麼，因為他們用那個東西在我身上檢查。但我知道他們做的不只這些。他們跟她有某種聯繫。

    朵：那個儀器的用途是什麼？

    湯：它和我們現在有的電腦斷層掃描很像。它在檢查我的生命機能，還有測量我的腦波。他們透過腦波影響人類。不過這些人不是壞人。他們不是冷酷或沒有感情，他們只是在監控史黛拉，擔心她可能涉及某些事，有點像是間諜的活動。那是他們想監控她的原因之一，因為她知道很多資料。史黛拉有無線電和細菌學的學位，又是電機工程博士，她是個很聰明的女人。

    朵：他們是想用這種方式從她身上得到資訊嗎？

    湯：不是。他們已經知道所有她知道的事，因為他們可以讀她的思緒。但因爲某個原因還是什麼的，她對他們來說很重要。我不清楚。

    朵：為什麼他們會擔心她涉及間諜活動？這對他們來說有什麼影響嗎？

    湯：她有那方面的問題。蘇聯集團的人曾跟她接觸，要給她十萬美元，不過她從來沒接受他們的錢。

    朵：這些外星人擔心她捲入間諜活動或那類的事？你的意思是這樣嗎？


    湯：不是，他們不擔心她捲入間諜活動或類似的事。她是他們在監控的人之一，就只是這樣。她也會接觸到各類型的科學論文、專題著作和這類性質的事。這是她被監控的原因。

    朵：你現在跟我說的有關她的資料，是你本來就知道，還是現在才知道？

    湯：噢，我知道她有學位。我也知道她在波士頓外郊一家和電機工程有關的公司工作，但我原先不曉得她跟間諜活動有關。

    朵：那麼你剛剛才發現的她被監控這件事，你當時並不曉得？

    湯：對。她對被監控這件事感到很困擾，因此才在世界各地旅行。她想遠離他們。這件事過後她很快就離開了。我猜想她應該是搬離了麻州，因為我連絡不上她。

    朵：你沒有再見過她？

    湯：沒有，她必須去……（停頓，然後很驚訝）去休士頓。史黛拉離開是因為她被調到休士頓。

    朵：好。那天之後你還有過類似的經驗嗎？看到那個光或什麼的？

    湯：沒有，再也沒有過。那是唯一的一次。


    我覺得這個案例很有意思，因為這個時間消失的個案並不是外星人注意的目標。如果個案是在想像，他會有很大的想像空間，但他甚至不是事件的主角。此外，他說他後來再也沒有過類似的事件，這一點也很有趣。如果這是他想像出來的，他很容易就能把故事延伸下去。然而，卻沒有任何後續。


    ## 一


    一九八八和八九年的夏天，我遇到三個會聯想到跟時間扭曲，甚至移動到另一個次元有關的案例。


    一九八七年的夏天，盧在地方超市的免費報紙上刊登了一則小廣告，徵尋遇過不尋常幽浮事件的人打電話給他。那是他第一次，也是唯一一次刊登這種廣告。


    一位名叫珍奈的女子打電話過去，說她前一晚在他那個地區遇到奇怪的事。那個女子很不安，不願公開自己的身分。她告訴盧，事發當時她從小岩城經過康威區回家，卻只花了十五分鐘。那段路程大約是五十英里，通常要花上四十五分鐘。此外，四線道的州際公路上完全不見其他車輛也挺怪的。回到家後，她養的幾隻狗又不尋常地狂吠。盧說，看來我們有了一宗時間濃縮而非時間消失的案例。過程當中唯一可能和幽浮有關的，就是她看到巨大明亮的光在一些樹頂上頭。不過她是個不想透露身分的商界人士，談論這件事似乎令她覺得尷尬。


    盧於是到她家跟她詳談。他發現珍奈是個非常實事求是的人，從沒閱讀過幽浮方面的資料，也沒有任何興趣。她認為如果真的發生了什麼，一定會有符合常識的合理解釋，但她實在很難解釋時間的加速和天上的光。盧問她是否願意接受催眠，她非常抗拒。我叫盧不要勉強，讓她自己做決定。


    但如果有，我會想跟她見上一面。


    接下來的一年，盧時不時會與珍奈聯繫。她緊抓著各種對那道光的奇怪解釋，甚至接受那是有人在樹上用鏡子往上反射的亮光。由於太想找到一個解釋，結果解釋反而比實際的事件還要詭異。


    終於，在一九八九年的四月，我在尤里卡溫泉市（Eureka Springs）的歐札克幽浮大會上見到了珍奈。她勉強答應出席。盧介紹了我們認識。珍奈說那個週末至少有其他三千件事是她寧願去做的，參加這場大會並不是其中之一。她對這方面純粹就是不感興趣。大會上，她一直很專心地聆聽講者說話，也看了會議所放映的照片和投影片，不過並沒有什麼和她的經驗類似，所以她認為這只是在浪費時間。當大多數的人都還在會議廳的時候，我們兩人先到了大廳，坐下來聊天。


    珍奈是很有魅力的金髮女子，成熟，但不會太過於世故。她把自己打扮得很好，給人一種她習慣跟富裕、教育程度高的人士往來的印象。然而她很友善，不會給人事利眼的感覺。她和我在一起顯然很放鬆，很快就告訴我她的故事。能把事情說出來，好似讓她鬆了口氣。她像是知道我不會笑她，而是要幫助她。由於她最近腦裡一直閃過其他細節，她感到困擾，這才決定要探索這件事。她非常仔細和確實地向我描述了細節。


    依然對事情會有合理解釋保持正面的態度，她相信只要能找到解釋，這件事就不會困擾她了。


    我確信她自己已經核對過這起奇怪的濃縮時間事件，因為她似乎是那種想替每個可能的細節找到證據，滿足自己好奇心的人。她的確這麼做了，她已經跟好幾個人核對過事發當晚她離開小岩城餐廳的時間，確定自己開上四十號州際公路是在午夜前後。


    她沿著公路一直開，然後轉向通往她家的那條路。由於那個區域只有一條馬路可以進出，不論白天還是晚上，總是有車子經過。珍奈幾乎天天走這個路線，對每個轉彎，還有路上的每棟房子瞭如指掌。但那晚一切似乎都變得陌生和不同。天空沒有半點星光，路上也十分安靜，連蟋蟀的聲音都沒有。她清楚地注意到沒有任何一間房子有光，一向亮著的戶外盞燈也熄了。珍奈很熟悉這一帶，向來老遠就能看到的沿路屋子裡的燈光，那時卻萬籟俱寂，沒有半點生命跡象。路上空無一車，她覺得很不尋常。


    接著她就看到了那個東西。一個龐然大物懸浮在右前方的樹頂上。那是個巨大的橢圓體，散發出非常獨特的亮橘色的光。光是包覆在橢圓形裡，並沒有往外投射。橢圓體上沒有標誌、窗戶、輪廓或其他顏色的光，就是純粹的橘色橢圓。乍看下，她以為那是夕陽，而光和顏色則來自雲的反射的錯覺。這是她想到的第一個解釋，只不過太陽早在幾個鐘頭前就下山了。接著她又想到流星和極光的可能。雖然一輩子從沒看過這樣的東西，她仍試著把這個物體與某個合理的事物連結。她減緩車速，慢慢靠近觀察。這麼做通常會很危險，因為路上會有其他車子開過，然而，路上卻一反常態地不見任何車輛。


    車子緩緩地開向那個物體的方向，珍奈被那巨大的光迷惑住了。她後來看到一個她以為是死掉的動物在前面的馬路上。她開到那個東西的旁邊，停下車端詳，卻驚訝地發現那是隻被凝結成一個不尋常姿勢的普通家貓。牠蹲坐著，毛髮豎起，兩隻前掌舉在空中，往上凝視著那個吸引了珍奈注意的物體。那隻貓沒有死，只是怪誕地凍結在凝視那個物體的奇怪姿勢裡，幾乎是在呆滯（或說生命暫停）的狀態。那是珍奈遇到的唯一生命跡象，如果要這麼説的話。


    她繼續慢慢地開，並一邊凝望著那個物體。當開到它的旁邊，它卻以一種奇怪的方式不見了。


    它的頂端和底部緩緩合而為一，上下匯聚後，就不見蹤影，樹頂再度是一片黑暗。珍奈用兩手比給我看（做手勢），我得到的印象是一隻巨大的眼睛垂下了眼皮。我問珍奈是否確定它不是往下降到樹的後面而離開了她的視線範圍。她說如果是這樣的話，她應該會透過樹叢看到它下降時的光。她很肯定頂端和底部合在一起，然後光就消失了。那個物體有可能仍在原處，只是處於無光的狀態。


    由於天空沒有星星，所以它有可能是融入了黑暗裡。不論是怎麼回事，珍奈接著便加速回家，比之前還感到困惑。她說她不曾覺得害怕，只是讚嘆、驚奇和納悶。她精明的心思一直試著想瞭解那到底是什麼東西。


    當她把車開進自家車道時，她養在牢固圍欄裡的純種狗突然怒吼了起來。牠們吠吼嗥叫，咬著欄杆想要出來。珍奈說牠們是很溫馴的品種，以前從來不會這樣。通常地或別人進入車道，牠們叫都不叫一聲。但那晚她回到家時，牠們卻像瘋了一樣。我問她是否注意到車子或自己身上有什麼不尋常，她說沒有。


    當珍奈進了屋裡看到時間，她吃了一驚。她將屋裡所有的時鐘都對過一次，每個時間都是一樣的。她估計自己只花了十五分鐘就回到了家。這太快了，沒有可能，尤其她又是用那麼慢的速度開車。她叫醒她先生，要他告訴她時顯示的時間，並要他隔天記得她回家的這個時刻。


    她珍說她後來會突然記起和那晚有關的事。她記得當自己第一眼看到那個物體時，前方公路有某樣東西從她車前快速飛過。同時，公路中央突然有道閃光。她描述那麼鏡子反射光很像，忽然她快速翻轉，並因此出現閃光。她不是能清楚描述，但那麼她想起嘉年華會奇幻屋裡的鏡廳。我們始終沒有進行催眠，雖然我相信這個故事還有更多內容。珍奈不願再深入探索，因為她的生活有條不紊。她很投入她的事業，不想被任何事物分心或製造生活裡的混亂。她把這個事件看成一件怪事，雖然她可能永遠也無法瞭解，她還是要繼續過她的日子。我的工作最重要的一點，就是當事人能夠繼續過他們正常的生活。不論他們有過什麼樣的經歷，我的目的是協助他們理解，並試著將那個經歷整合到他們的人生。如果揭露更多只會令他們困擾，那麼就最好不要再繼續探索。我也告訴那些出於好奇而想做催眠的人，有時他們可能會發現一些他們希望自己不曾去碰觸的事情，而資訊一旦被揭露，就無法再放回去。在這種情況下，珍奈很可能是明智的，因為她不想瓦解她仔細規劃好的人生。事情本該如此，我尊重每位個案的意願。'
