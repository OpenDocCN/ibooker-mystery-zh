    凱莉從這個視角連續看到了五個場景。它們似乎都和她未來的人生事件有關，而且是依時間的先後順序出現。對我來說，那些場景充滿了象徵意義，與潛意識在夢中使用的型態相似。這件事發生在多年以前，其中有的經歷已經在凱莉的人生成真，只除了那件印象最強烈，引起她最多恐懼和困惑的事件還沒有發生。她一直沒能忘記那事。

    她看到很多的水。不能判定是湖還是海，只知道山丘和樹木一直往下延伸到水邊。她在上方飄浮著往下看。水是綠色的，波濤洶湧，看來有暴風雨的樣子。天空全是綠的，浪很大。她看到好幾千條死魚翻著肚子浮在水上。兩隻白鳥忽地從天際往下飛掠水面。

    接下來，她看到一個部份遭到毀壞的城市。成千上百的人病了，病情或輕或重。她看到自己身在其中，正在餵他們吃東西，照顧他們。她的腦裡出現一句話：「有些人還能吃，對有些人，食物到了嘴中卻成了醋。」我覺得這聽起來很像是聖經經文。在這個畫面裡，她知道自已沒有病，她也知道自己不會生病。

    當她抗議：「為什麼是我？」答案出現了：「讓你看這個並不是要你恐懼。不要害怕。這是你被派到地球的原因。你必須為了這些即將發生的事情做好準備。」然後又重複了三到四次的「不要害


