    法：是啊。他相信我。

    朵：我就是這麼想的。但你在房子和森林以外的地方見過他嗎？

    法：我想有吧。森林裡有光。很大的光。有樓梯可以走到光裡。他在我旁邊，我們從樓梯上去。

    朵：樓梯通到哪裡？

    法：到那個很大的光的下面。


