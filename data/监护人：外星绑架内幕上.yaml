- md: "天使神秘学院官方淘宝：http://strc.taobao.com\n\n开始催眠后，我引导她回到一九八八年三月下旬，她立刻进入驾著卡车回家的场景。一路上，她都在谈白天的工作，还有她有多担心不久前刚出车祸的母亲。这些都是她在开车时的思绪。她很疲惫，急著想回家洗个热水澡，好好放松一下。\n\
    \n转过一个弯，就快到家时，她看到某个东西站在她那条线道的中央。她停下车以免辗过去。她的意识记得她是减缓车速，但现在她说她完全停下车来。另一件令人讶异的事，是她在路上看到的不是猫头鹰。\n\
    \n朵：马路上是什麽东西？\n布：很难说。我想如果我们活在古时候，我会说那是个天使。\n朵：（惊讶）天使？\n布：或许是来自较高层面的存在体？我看到一个男人站在我那个车道的中央。他散发著白光……全身上下。他的衣服看起来也是白色的。\n\
    朵：你的意思是那个光像是环绕著他的气场？\n布：差不多。（她有困难说明）有点像是稍微过度曝光的黑白照片。你知道，就是全身的颜色都很浅，然後散发出白光。\n\
    朵：那个光和灯光不一样吗？\n布：嗯：很难形容，因为它有点像灯光，也有点像气场。又有点像是曝光过度的照片，或许这些全\n\n第三章 事物的表象並不可信▲071\n\
    \n> 朵：他的衣服也是白的？\n> 布：我看起來是。但有可能我看的顏色不是很正確，因為他周圍好亮。就連他的頭髮也散發著白光。\n> 朵：你看到過他的五官嗎？\n\
    > 布：很難，太亮了。我頂多只能說看起來像是經典的希臘雕像上的古典希臘五官。非常均勻，平坦\n>   的額頭和漂亮直挺的鼻子，還有很均勻的五官。\n>  \
    \ \n>   朵：他大概多高？\n>   \n>   布：六呎，六呎二吋。\n>   \n>   朵：那麼他很高大。\n>   \n>   布：是很高頭大馬。他站在那裡往四處看。我看到有光從他的眼睛散發出來。當他向我看過來時,\n\
    >     \n>     我看不到那些光。可是當他往旁邊看時，我就看到他眼睛射出的光線。我不知道那些光有什麼作用。他看到我。我已經停下車了，這樣才不會撞到他。我不想傷到他。他向卡車靠近，朝\n\
    >       \n>       駕駛座走來，一邊走一邊對卡車做了個手勢。他揮動他的手，就揮了一次。（她緩緩地揮動左手）\n>         \n> \
    \        朝著跟卡車引擎蓋平行的方向，然後再往上跟擋風玻璃平行的方向。他揮手的時候，手是在卡\n>           \n>          \
    \ 車上方約六到八英寸高的地方。\n>             \n>             看樣子，她的意識心是把這部份記成貓頭鷹低飛掠過卡車。那隻貓頭鷹顯然是來自她的意識所\n\
    \n製造的覆蓋物，因為她在出神狀態時，毫不遲疑地指出對方是人，一次也沒提到白色貓頭鷹。\n\n布：我搖下車窗，看他是不是需要搭便車或什麼的。\n\n看到這麼不平常的人，會有這樣的反應似乎很奇怪。對方若看上去是個平凡人，這麼反應會很正常。但情況並非如此。搖下車窗對一個發光的存在體說話絕對不尋常，踩油門離開現場才是預期中的反應。但布蘭達顯然不覺得害怕，也不認為會有危險。我問她是否感到困擾。\n\
    \n布：這是很怪，但我對他是誰還有他在做什麼很好奇。我想如果他想傷害我，大概早就殺了我吧。\n\n他發出這麼多光，眼睛又會射出光線，我想如果他要从他站著的地方直接除掉我並不成問題。\n\
    \n朵：所以你不怕他？\n\n布：嗯……我很忐忑，也許有點緊張，不過沒有驚慌失措什麼的。我問他是不是需要幫忙，還是需要搭車去別的地方。他說：「噢，祝福你，孩子。我感謝你伸出援手。我的交通工具就在那裡。」\n\
    \n他指向馬路旁的山丘。\n\n朵：你有看到什麼嗎？\n\n布：沒有。我只看到山丘，上面有幾棵雪松。他的手勢給我一種那裡有東西的感覺，在山丘比較遠的那一邊，也許要越過山頂。那裡無論如何都超出了我的視線。\n\
    \n# 第三章 事物的表象並不可信\n\n我常去布蘭達家，所以開車經過那條路很多次。在這次的經歷之後，我特別注意那座山丘。它在一個農場的中央，離馬路不遠，頂端有幾棵樹，附近沒有房舍。因為不高，所以如果飛行器要藏在從馬路上望過去而不被人發現的地方，體積一定不大。除非他做了什麼，讓人類看不到。\n\
    \n布：我問他：「你是誰？我沒辦法不注意到你的外表和我不一樣。你是外星訪客還是從較高層面來的？」他說他來自長老議會。我問：「那是怎樣的議會？議會通常是提出建議或是管理一個團體什麼的。」他說有不同的訪客造訪過地球各個地區，帶回了有關地球發展進度互相矛盾的報告。有個團體贊成與人類公開接觸，另一個團體支持讓人類保持現在這種無知的狀態。由於他是長老議會的成員，他們決定由他過來親自看看地球上的情況。這是個相當秘密的任務，你也可以說是個發現真相的任務，目的是取得更多的資訊，以決定是否讓地球保持無知，還是要與人類接觸，把人類帶入光、健康和知識裡。\n\
    \n朵：那就是你所謂的「無知」嗎？（指不知外星人的存在）\n\n布：嗯：：雖然人類懷疑，而有些人希望或夢想著有外星生命，但通常就政府官員的顧慮而言，並沒有外星生命這種東西。這是他們（指外星人）所謂的無知，是指不接受事實。他們在考慮用人類可以應付的方式與人類接觸，讓人類不再懷疑有外星智能生命的存在。在人類（的文明）能追上他們，能夠加入他們以前，外星人一直過著自己的生活。\n\
    \n朵：他和你溝通的時候是開口說話嗎？\n\n監護人 THE CUSTODIANS ▲ 074\n\n天使神秘学院官方淘宝：http://strc.taobao.com\n\
    \n获取更多好书，请加微信：1364926204 或 QQ:715104687\n\n**第三章 事物的表象並不可信**\n\n布：不完全是。我想你可以說那是「以聲音表現的心靈感應」。我可以非常清楚地聽到他說的話，好像他真的在說話似的，可是他的嘴巴沒有在動。我想他是把他的念頭投射到我的心裡，在我的認知裡變成非常悅耳的聲音。\n\
    \n朵：接下來呢？\n\n布：他說他必須繼續做他的事，我則需要回家。我幫不了他的忙。然後他又一次在我的眼前揮手。當他揮手的時候，我想是因為他的心靈力量，後來我就看不到他了。我也不再記得這個經歷了。\n\
    \n朵：我很想知道他為什麼會在馬路中間？\n\n布：我始終沒能確定。我的印象是他去了很多地方，觀察人類和所有正在發生的事。我感覺他知道在路上遇到一般人會發生什麼情況，想看看我會不會驚慌地跑掉，還是受到驚嚇而做出類似攻擊的舉動。\n\
    \n朵：嗯……大概有些人會這麼做。\n\n布：沒錯。但我想你會說他是在做平均取樣。他四處出現在不同的人面前，再讓他們忘了這個經歷。\n\n朵：他在卡車旁邊的時候，你有沒有看到更多細節？\n\
    \n布：哦，他的全身都很白很亮。他的衣著風格基本上很寬鬆舒適。像是一件有帶子的長袖衣服，還有個披風之類的。他的腰上繫了條腰帶，衣服好像有幾個小袋子和口袋，讓他可以隨身攜帶東西。他的腳上穿著布靴，雖然大約有一寸厚，看起來卻很柔軟和有彈性。他穿著輕飄飄的袍子，\n\
    \n朵：他有頭髮嗎？\n布：噢，有。看起來是白色的直髮，前面有修剪過，後面大概長到肩膀。他太耀眼了，所以我看清楚他身上有沒有別的顏色。他的皮膚和頭髮看起來都很白，眼睛看起來是銀色的。鬍子刮得很乾淨。\n\
    朵：他的眼睛還有發出光嗎？\n布：沒有，和我說話的時候沒有。但他在看四周景色時，眼睛會射出光線。\n朵：但不會讓人害怕，只是很奇特。\n朵：真的很奇特，但我很開心，因為他不介意我問問題。\n\
    朵：你還問了他什麼問題？\n布：我問他外頭是否有生命，還只是我個人的一廂情願。他說：「沒錯，外頭真的有生命，而且有許多不同的種類。」有各式各樣的生命，不同的外表和能力。有幾個種族的外星人期望人類能發展出可靠的太空船，好加入他們，成為銀河社群的一份子。他說不同的種族有不同的特徵。有些種族比較好戰，有些種族生性愉悅和幽默。然後他說了些我認為奇怪卻讓我覺得有希望的話。他說：「你不久後就會知道這些了。」所以我想那是指在我這輩子的時候，人類或許能夠到其他的星球。\n\
    監護人 THE CUSTODIANS ▲ 076\n\n朵：我很好奇議會在哪裡？你有沒有問他？\n布：他說沒有特定的位置。他們就是在所有成員決定的地點碰面。我得到的印象是他們有一艘太空船，很大的船，他們最常在那艘船上碰面，進行他們的事務。議會成員來自不同的星球，代表著好幾個不同的種族。\n\
