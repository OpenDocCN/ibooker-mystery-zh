  md: '我得到的資料讓我發展出一個理論：外星人十分關心我們這個物種的福祉，因為打從遠古以來，他們便一直看著人類；他們並沒有放棄我們的打算。有些人類正在接受準備，要在另一個預備中的星球生存，這個星球將會居住那些沒有疾病的個體。它被設計成跟地球類似，這樣一來，那些將要在原始狀態的新環境展開新生活或延續過去舊日子的人類，才不會受到驚嚇或太大的衝擊。


