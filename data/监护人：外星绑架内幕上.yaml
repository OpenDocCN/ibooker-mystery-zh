    拼湊了起來。那本書討論來自外太空的外星人對地球播種的古代太空人理論。我知道了外星人從地球生命開始便觀察人類直到現在。所以，還有什麼會比外星人至今仍監控我們，觀察人類發展更自然的事呢？對我來說，這就是檢查的原因，但為了讓當事人的生活不受影響，事情必須隱密地進行。在《地球守護者》裡，我被告知最理想的狀況是當事人對發生過的事沒有任何印象，繼續過著他們正常的生活。但我發現還是有些個案會想起令他們創痛的事件，而且往往是透過夢境，而非有意識地回想起來。


    我也被告知，地球大氣中的化學物質和汙染，還有人體內的藥物和酒精都會影響人腦的化學作用。這些會導致人們想起被綁架的點滴和片段，但是那些記憶會被情緒所扭曲。他們記起的並不是實際的事件。個案的意識心把事件轉變成了一個情緒高張的記憶。我的工作就是要越過意識的情緒，直接與潛意識對話，就跟我在其他案例所做的一樣。經驗告訴我，答案就藏在潛意識裡。移除了情緒化的意識心智影響之後，真相自然會浮現。


    為什麼？


    許


    多調查員只研究目擊幽浮和外星人降落之類的具體跡證，然後就止步不前了。有的研究員只研究綁架事件，然後就不再深入。我也是從這些事情開始，但卻一直走了下去。我瞥見


