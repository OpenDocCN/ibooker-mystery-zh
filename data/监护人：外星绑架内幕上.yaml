    Dolores Cannon

    朵洛莉絲·侃南


    一九三一年生於美國密蘇里州·聖路易市。


    一九五一年婚後，隨著先生的海軍職務旅居世界各地。一九六八年初次透過催眠接觸到輪迴概念。她的先生是位業餘的催眠師，在使用催眠幫助一位婦人減重的過程中，無意間回到個案的前世。在當時，前世仍屬「非正統」的主題，鮮有人對此領域進行探索。這次事件引發了她對輪迴的興趣。一九七〇年，先生因傷退役，全家搬到阿肯色州的山丘。她由此開始了寫作生涯，投稿於各雜誌和報社。


    子女成人後，她投入回溯和輪迴的領域，鑽研各類催眠方式並發展出自己獨特的技巧，能最有效地幫助釋放隱埋在個案潛意識的前世資料。她也因此發現了從未有過地球經驗的外星靈魂。透過她與外星人和異次元高度進化的生命體所建立的合作關係，我們得以一窺宇宙和生命的奧秘。


    自一九七九年起，她先後已催眠了上千位個案，並將內容匯整為多本著作。她稱自己為記錄「失落的知識」的回溯催眠師和心靈研究者。她的作品包括《地球守護者》、《迴旋宇宙》系列、《三波志願者與新地球》、Conversations
