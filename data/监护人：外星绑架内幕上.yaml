    了一個現在正開始浮現的廣大全貌，而那是我們人類心靈幾乎無法理解的奧秘，它將是有史以來呈現給人類的最重要的全局。一個有關我們是誰、我們從哪裡來，以及我們要去做什麼的故事。人類是否已經準備好要學習關於自己故事的奧秘了？


    幾位作家和研究幽浮現象的調查員一致認為，不論有沒有經過我們的同意，外星人似乎是在進行跟基因操作有關的某類工作。跡象也顯示，這不完全是出於自私的科学動機，卻像是在執行上級的命令，就像醫院人員執行各種測試和檢驗時，通常會表現出的那種冷淡漠然的態度。有多少次我們想知道醫院檢驗的理由，一樣也被冷淡對待？當我們的孩子顯露出同樣的恐懼和好奇，為了讓他們安靜，我們會對他們說醫生需要知道某些事，這些事他們不會懂，就照醫生說的去做，一點也不會痛的。即使我们知道檢查的原因，可能也不會花時間去跟孩子解釋，因為我們認為這樣只會讓孩子害怕，更何況，他們無論如何都不會瞭解。於是我們試圖讓孩子保持安靜，直到該做的事完成。


    然後我們常聽到孩子說：「媽，你跟我說不會痛，可是明明就會！」這會造成不信賴感，就好像他們被欺騙了一樣。在某些情況下，甚至會導致孩子對醫生、護士或醫院產生恐懼。也許我們誤判了孩子，以為他們沒有理解能力；但事實卻不然。


