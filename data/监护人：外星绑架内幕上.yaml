    「這麼說不曉得能不能安慰到你，不過其他人也聞過奇怪的東西，而且也不曉得該怎麼形容。


    我調查的第一宗案例就提到令人反感的氣味。個案是位名叫克莉絲汀的女子，她進入太空船就難受到要病倒了。一股難以忍受的氣味撲鼻而來，她很難描述那是什麼味道。她最接近的聯想是電子物品的燃燒味，類似燒焦的引擎。她認為那不是外星人本身的氣味，而是從一個供應動力的房間散發出的味道。當她問起能源，他們說除非她具有電磁和結晶結構的知識，否則沒辦法理解。她看不到任何能打開那個房間的方法，只看到他們的手經過某些控制鍵，門就開了，東西也跟著移動。


    當然，我們沒辦法知道這兩個女子看到的太空船是不是同一類型，但她們不約而同提到一種燃燒的氣味倒是很奇特。


    莉安解釋，催眠一開始，當她的身體被檢查時，她有困難描述而且不想敘述是怎麼回事。「我不想投入。我只看一眼就知道發生了什麼事。那就像是另一面的我在說：『你不想做這個。你不想記起更多的事了。』情況有一度是：『噢，帶我離開這裡。』她咯咯笑道。


    我解釋：「如果潛意識認為你還沒準備好要看，它的安全機制就會這麼做。」


    重要的是了解在催眠開始前，莉安期待的是一個完全不一樣的經歷，而這使得事情更有真實性。如果她是在幻想，那她就會是和金髮藍眼的阿斯塔一起在太空船上，而不是想像這麼令人不愉快的事。


