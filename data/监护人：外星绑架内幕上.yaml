- md: '## 監護人 THE CUSTODIANS


    蘇：原因是在於每個人的大腦都不太一樣，因此和其他人的大腦會有些微不同的反應。基本結構是相似的，但每個人腦內壓力點的位置都不太一樣。只是一點點的不同。但也因此會有些微變化。

    每個人的狀況——他所消化的藥物，攝取的食物——都會對不同的分子結構和進入腦部的化學成分造成改變。如果有人撞到頭，發生腦震盪之類的情形，腦中的液體（指腦漿）也須調節適應。醫療情況也會影響腦部。進入身體的麻醉品會影響液體的流動。這些都是那個人會對這類經驗如何反應的要素。所以有的人會回想起較多的事。因為當能量推進腦部時，每個人調適反應的方式不同。有的人會記得，會想起更多，有的人不會。此外，這也要看他們的意識發展到哪個層次，還有他們願意接受和處理哪些事情。有的人害怕再次接觸類似的經驗。他們傾向把整個經驗都埋藏起來，不讓自己知道，因為他們害怕面對。


    朵：所以這是很個人的。


    蘇：對，很個人。


    朵：有趣的是，我們能夠透過催眠接觸這些記憶。


    蘇：那是透過刺激腦部特定的部位和細胞。


    朵：記憶庫還是什麼嗎？我一直很好奇是怎麼作用的。


    蘇：是電的傳輸。就像是電神經（electrical nerves）被傳送到腦部的不同部位。人腦裡有些地方負責儲存數據和資訊，有的部位用來創造和顯化想法。催眠就像是電流猛衝到線的另一頭。我知道


    ### 第七章 外星人說話了


