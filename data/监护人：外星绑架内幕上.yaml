    # # 我

    認為本書第一部（譯注：上集）的所有案例（以及沒有被我收錄進來的案例）都依循著一個可辨識的模式，這點相當值得我們注意。同樣的特性在世界各地一再重複，這種重複的內容是無法幻想出來的，尤其許多案例的個案幾乎沒有接觸過幽浮文獻。在一九八○年代，也就是大多數這類案例被調查的時候，市面上還有多少這類主題的書籍。即使是已出版的書，也不是把重點


    當時我還不曉得在接下來的幾年，我會有其他個案的身體也受到類似能量影響的案例。而我很快察覺，當在最深度的出神狀態下，人體能做許多我們以為不能的事。在進行這類工作時，要記得的最重要原則就是：「不要造成傷害！」然而你也必須持續對可能出現的意外做好心理準備。


    這是我最後一次催眠蘇珊。她覺得這些事很有趣，但只當作是不可思議的怪事，她並不想傳導外星訊息。她當時在念商學院，比較想找到一份工作。我向來都是尊重個案的意願，因此沒有要求她繼續。我並不需要擔心，因為我已經與來自另一個世界的存有建立了直接的接觸，事情自然會有後續。


    他們（外星人）找到了一位有意願的聆聽者，交流將會透過其他的方式繼續。


    我已經開啟了另一扇冒險的大門。


    第七章

    外星人說話了▲

