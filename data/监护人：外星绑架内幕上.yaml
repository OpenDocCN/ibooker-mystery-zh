    朵：把東西放到頭裡的目的是什麼？

    布：我不確定。宇宙銀河社群中有不同的種族和團體，而不同的團體有不同的目標和目的。他們使用不同的工具，所以可能會用不同的方式跟人類接觸。雖然接觸應該是透過長老議會來協調安排，不過有些團體會用自己的工具而不是長老議會許可的。

    朵：如果他們這樣做議會不會介意嗎？這不是違反他們的規定了嗎？

    布：有些違反了規定，有些沒有。這要看是怎麼做的，以及有沒有傷害到當事人。還有，這對當事人造什麼影響。

    朵：你能看到她九歲時，在她的手臂裡放東西的外星人是什麼樣子的嗎？

    布：他們是很溫和的類型。接種發生的時候是在晚上，所以很難看清楚他們的長相。他們跟她在公路上看到的那個人不一樣。他們沒有頭髮，頭很平滑。他們像是銀色的。手也不一樣，有三根手指和一根大拇指。他們不像她在公路上看到的人那麼高大。這些人的骨頭比較長，他們很瘦長，身體構造非常纖細。他們有深色的眼睛，我能說的就只有這樣，因為他們的臉是在陰影下。

    朵：你說他們是很溫和的種族？

    布：對。他們對知識有極大的好奇心。他們是在長老議會的指示下做這件事。還記得嗎，長老議會包括了許多不同種族的生命。生命體的類型有無限多，當你把整個宇宙算進來時，生命是包羅萬象的。單是在這個銀河系，就有許多不同種類的生物，有著不同的外貌、文化、能力、看待


