    或許他還會相信。他真的把這當成玩笑來看，但我猜想他對催眠的認識夠深，足以讓他意識到這些事情的真實性，否則自己不會說出那些話來。他只是想對自己有個合理的說法，跟其他有過類似經歷的人一樣，他們會試著去找別的解釋，好讓自己的意識能夠接受。所以，就算你是調查員並且熟悉催眠技巧，顯然反應都會是一樣的。


    約翰在醫院協助將死的病患對即將進入的世界有所準備。他在自己踏上這趟旅程前做了很多好事。然後，就如他的潛意識所說的，他的心臟停止了跳動。


    我跟約翰學到了許多調查的程序，我也會永遠懷念他的忠告。雖然我們合作時間很短，我很慶幸有認識他的榮幸。


    約翰的經驗顯示了區分接觸外星人和靈魂出竅的難度。我一邊和菲爾合作，進行《地球守護者》，一邊也開始注意個案不尋常的夢境。菲爾對於跟外星人的接觸並沒有意識上的記憶，只有情感受創的夢。當探索他的夢時，我們發現他跟外星人的實際接觸可以回溯到童年時期。透過這些發現的細節，我看到一個又一個後來反覆出現的模式。


