    布：不會，他們只會繞過去繼續開，但永遠不會知道是怎麼回事。

    朵：這是怎麼做到的？

    布：和她看到那個存在體的不同外表一樣，他改變了她對所看到事物的認知。他們對任何人類都能這麼做。他們只是改變人類對所見事物的認知。如果有人過來，他們不會看到一輛卡車停在路中間，然後有人在對駕駛說話。他們只會看到一條開放且空蕩蕩的馬路。他們只會繼續開他們的車。

    朵：原來如此。他們這樣安排是不讓任何人在這個過程中受到傷害。

    布：沒錯。他們並不想傷害到任何人。

    朵：總之，在這個發生在三月的事件裡，確實有那麼一個有身體的存在體，他不僅改變了布蘭達對他的認知，他也封鎖了布蘭達的記憶並放進貓頭鷹的影像。這麼說對嗎？

    布：對，這是為了保護布蘭達和他自己。他想跟布蘭達接觸，但不想讓布蘭達的生活變得複雜。所以他讓布蘭達以為自己在路上看到的是一隻非常美麗的貓頭鷹。這樣她的生活就不會受到影響。此外，因為他改變了布蘭達眼中的他，這件事對布蘭達而言是個比較溫和的經歷，她對這個體驗也會更加開放。因為如果她看到他真正的模樣，可能會有較強烈的恐懼成分。他盡能讓布蘭達的感受是愉快的。

    朵：這樣很有道理。可是她現在用催眠的方式記起來不會造成對她的困擾吧？

    布：不會，完全不會。她非常想起這件事。我認為這很好。我允許這件事。等她醒來後，她會記得這一切，這對她繼續準備時機的到來會有幫助。她已經準備好要接受這個資訊。這是她會想起那隻貓頭鷹的原因，這樣她才用現有的技術來獲得資料，然後她就能記起所有的事。

    朵：布蘭達說，事件過後幾天，她的聽力有些狀況，而且有什麼影響到了電器類的用品。是什麼造成這些情況？

    布：因為她跟那個存在體互動，她的氣場吸收了一些額外的能量。這個能量大部份被她的身體使用，但還是有的多的。她的氣場把多出來的能量拋了出來，你可以說那就像無形的閃電。結果便是她的耳朵會耳鳴，也會聽到非常高的音調。她的身體因為額外的能量也干擾了電子物品的運作。

    朵：這都是因為接近那個存在體的關係？

    布：這是因為她可以接收較高的事物，她和她的氣場對較高能量是開放的。所以當她靠近那個存在體，除了吸收了來自於他的靈性和心智的知識，她也吸收了一些氣場的能源。有些過多的能量無法立刻使用，導致了這些副作用。那就像電線傳送太多的電力會冒出火花一樣。

    朵：她的健康有沒有因此受到影響？

    布：沒有，沒有負面影響。體內多出來的能量對一些療癒過程有益，因為體內隨時都在進行療癒。這完全不會干擾到身體要做的事，只是讓她多聽到了一些聲音，還有影響到她周圍的電子器具。她也不是太驚訝，因為她這輩子對身邊的時鐘一直會造成影響。她念高中時，有一陣子還會影響到販賣機。她的聽力向來也很敏銳。她沒有因為這些效應而緊張，它們不過就和她以前


    第三章 事物的表象並不可信'
