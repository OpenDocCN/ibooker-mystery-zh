    # # 監護人 THE CUSTODIANS ▲ 338


    現場有位治療師協助處理她的狀況。以前蘇珊每次做完催眠後感覺都很好，有時甚至還是笑著醒來。由於這個情況是頭一次出現，我認為可能和催眠前她的緊張感有關。房間裡人很多，她因為處於敏感的狀態，可能感應到了別人的能量。此外，我們在一週內兩次使用了這位存在體的能量，可能做得太快、太多了。或許她需要更多時間習慣傳導這類能量。我真的認為這是許多因素所合併造成的現象。


    蘇珊因為進入非常深度的出神狀態，她並不曉得催眠時房間裡發生的其他事。有些調查員拒絕認真看待這類調查，因此以刻薄諷刺的評論取笑我們（我沒有放在書裡），我下定決心再也不容許這類的質疑。我認為催眠是一種取得資訊、研究和探討的方法，但我很快就意識到，一九七八年的調查員還沒準備好接受。他們之中有些人還沒從形上學的角度來看待這個主題。


    我逐漸明白，除非調查員瞭解形上學，否則他們無法明白幽浮和外星人的複雜本質。這些全都互有關聯，無法區隔開來。然而，那種要求「具體細節」類的調查員始終存在。我猜想這個領域容得下各類調查員。我們都握有謎團的零星片段，我們不能自以為自己手中那一點東西就是全部的拼圖。有太多細微變化與差異，因此我們必須學著一起研究。


    大多數的人離開了，有幾個人留了下來，我們一直談到過了凌晨一點。蘇珊大約就是在那個時候去淋浴，然後叫我看進去看她的腳；她從浴室出來後，發現自己腳上佈滿了大紅斑。斑只在腳上，沒有延伸到腳踝，而且也已開始褪色，漸漸恢復成原有的膚色。沒有人真的知道該怎麼解釋，除了這和外星能量有關外。這也可能跟她在催眠療程開始前的緊張有關。'
