    莉：他們看起來基本上都一樣，可是眼睛不同。


    朵：怎麼說？

    莉：他們的眼睛有差別，要不就是臉；他們敏感／感受的程度不一樣。就像所有的白人看起來都一樣，他們就是白人。而所有的黑人看起來都很黑。他們都有相似的地方，不是嗎？可是你會透過他們的眼睛或別的什麼來區別。他們現在就有很柔和的眼睛。你瞧，我現在覺得沒事了。我已經沒有被吊掛著。我現在看到的這個的眼神很柔和。同樣的眼睛形狀，但比較……有愛心。


    他剛剛也在，不過只是旁觀。他不是用東西戳我的那個。

    朵：你能看到他們還做了什麼其他的事嗎？

    莉：可以啊，我想我看到了。可是我不想談。

    朵：好吧。我只是想現在找出發生的一切，這樣你就不用再做一次（譯註：指催眠）。

    莉：我們不會再做一次了，好吧？

    朵：沒錯。


    莉：對，我們不會。我會說的，但不要再一次。好嗎？

    朵：沒問題。只是談談發生了什麼事。

    莉：好吧。我知道這個感覺——不，我不懂這個感覺——我明白了。他們採集排泄物。他們看起來好像在發射某種雷射光束或什麼的進去。他們在角落那邊。因為這個房間是圓的，所以其實也不能說是角落。機器發出聲音。有點像我聽到的聲音，不過跟我記得的不太一樣。那是高頻率，我猜是光束發出的。（這可能就是她以為自己在床上時聽到的電鋸聲）他們收集排泄物。我不懂他們拿那些東西要做什麼。我選擇不去看。但我想……有個什麼在想：「幹嘛管他們在做什麼呢？又有什麼用？」……這一個，這個男的……這個善解人意、有著仁慈眼神的存在體很和善。在我被那樣子吊起來又被放下之後，至少還得到這一點尊重。我不喜歡被吊起來。他是來安撫我的，並不是說我感到焦慮，我只是感覺：「他們為什麼做這麼噁心的事？」那也不是變態那種噁心。我想，相對於被……（她有困難解釋）侵犯，那比較像是調查……科學方面的……。


    但至少他們還有這個敏感度，知道在檢驗之後要安撫我。


    別的個案也描述過類似這樣一個有愛心的外星生物，我在其他書裡也有提到。個案通常會把安撫他們的個體描述為「護士」類型，有時差別僅僅在於眼神。有些人說，即使他們區分不出外星人的性別，這個外星生命散發出一種女性的感覺。


    朵：你說他們穿著衣服？

    莉：是啊，討厭的那幾個有穿。他們穿藍色的套裝。其他在檢驗室的人穿著同類型的白色連身衣。那裡比較是個無菌環境。他們的脖子很長，所以衣服的領子很高，但脖子還是有部份沒被遮住。套裝領子上露出皺皮。（在我的想像中，那是一種中式立領。）

    朵：你在他們的衣服上有沒有看到表示階級或身份的標誌或類似的東西？

    莉：讓我看看。（停頓）你不要完全相信我的話。這可是突然冒出來的，好吧？是個圓形，在中心點上面有三條波浪線條。我猜那是一個使人平靜，一個安撫的符號。

    朵：這個符號在哪裡？

    莉：噢，他們配戴在胸前。（她的手勢顯示是在左肩上）我想是在白色的制服上。

    我下指令，她會記得那個符號並在醒來後畫給我看。接下來，我想知道她對那個房間還記得哪些事。那裡的光。我不知道光是從哪裡來的，除了主要的光是照射在桌上。又大又圓，但不是日光燈。它沒有你去看牙醫時的那種光的热。你知道那種會發熱的光？它沒有那種热度，也不像我想象中醫生手術房裡的燈會有热的。這個光就像那麼亮，但你感覺不到半點热度。這個房間很亮，不過我不知道光源在哪裡。似乎是從牆壁出來的，可是我看不見任何我認得出的燈光裝置，所以不知道光的中心点或光源在哪里。


    这样的描述在其它幽浮案例也曾经重复出现，他们说光源似乎来自天花板和墙壁，整个表面都被照亮。


    莉：这个房间有个栓在墙上的长杆子，类似让残障人士抓握的那种不锈钢。不是一直条，是环绕墙壁的圆棒。它的质地跟不锈钢一样细緻，但不冰冷。墙壁有弧度，就像一间圆形的大房间。说「大」，也不是真的很大。它不是很宽闢。如果你躺下来往上看，你会看到一个像是观察室的地方，在那裡的人或生命体可以往下看，观察检验室裡的情形。我想说那是玻璃，因为是透明的，不过大概不是玻璃。可能是某种会防止细菌扩散，或不论在进行什麽都不会让它暴露在外东西。很像医院有的那种观摩室或观察台。只是我想医院观察室的位置是在更後面一点。这个不一样。它像是玻璃窗，你可以看到後面有人站著观察。但不像你在电视上看到的那种医学院学生围成一圈观察的情形。不一样。


    朵：站在玻璃後面的外星人跟房间裡的是同一种吗？（是的。）你能看到房裡还有什麽其他的東西吗？


    莉：我想说……不像我们想的那种有键盘和萤幕的电脑。完全不像。我猜有监控器，不过跟我们的不一样。这些用途多少是内建在墙壁裡。它们看起来是用相同金属做的，像是不锈钢，旁边有操作面板和按鈕。沿著室內牆面是不同的工作站。其中一個有看起來很複雜的顯微鏡，他們正在進行的工作會出現在上面的螢幕。另一個工作站有兩個平衡得很巧妙的卡鉗和懸臂，這是用來拿取和處理小到無法用手指拿的極小物體。那種微型工具類的東西。面板上有彩色的光，還會發出聲音。


    朵：機器聲？


    莉：不，不像我們的機器。那個聲音的頻率比較高。聽到的聲音和出現不同光的模式之間一定有某種關聯，不過我不知道是什麼。


    朵：還有其他的聲音嗎？


    莉：聲音？有啊。你知道是什麼嗎？一定就是那個聲音。我剛剛說這個檢驗室裡的聲音像是比較高的頻率，像牙醫的鑽頭。另一個聲音——雖然聽起來沒什麼道理，但我還是要說，那個就像是圓鋸機的嗡嗡聲——是真的。那一定和引擎或什麼東西有關。它讓這整件事有在地球的感覺。


    朵：可是另外那種電腦類的機器發出的聲音並不一樣？


    莉：噢，對呀！那個聲音優美多了。沒有變化，但比較優美。不像是圓鋸機的聲音。


    朵：好。現在我要問你，你是怎麼去到那裡的？你可以旁觀，不必再體驗一次。你是怎麼到這個房間的？


    莉：我跟你說我想說的，不過你不要完全相信。這好像是唯一有道理的事。有個念頭冒出來，就是我必須透過某種方式被心靈傳輸或被抬起來。不是太空船進來我房間做什麼。不是的，我还是要回到光束效應。不過我現在就像是有一個心靈在同時運作，所以我也確定到底是怎樣。

    朵：只要說你想到的事情就好。不要擔心分析的事。

    莉：（大嘆一口氣）我像是被某個方式傳送到船上，但身體卻沒有像《星際爭霸戰》（Star Trek）裡演的那樣分解。我猜一定是某種光束效應。因為我想到了物質實相，就像你的房子的結構，我也想到回來的事。他們一定都是用這個物理光束包住你的身體。也許分解分子結構，好讓它被光包覆，讓它不是實體。然後光束就對身體的實體性質發揮它的效用，再帶著整個分子結構走。

    朵：不要擔心有沒有道理。你想到的就是這些，那這就是我們要處理的部份。

    莉：我想到的就是這些，沒錯。

    朵：你在那裡從頭到尾只看到長得很像的外星人？

    莉：我想說那裡有兩群人或是生物。第二群是實驗者。第一群穿著藍色制服。他們比較像蟲，和其他人的身體大小不一樣。他們沒有胸，比較瘦長，更扁平。他們的附肢比較長。

    朵：你說他們比較像蟲是什麼意思？

    莉：他們不一樣。他們的眼睛凸出，而且是在頭的兩側。頭的部份主要就是眼睛，像昆蟲一樣。我不記得有看到鼻子和嘴巴，不過我猜他們一定有嘴巴。還有，他們沒有胸部。你知道，其他人有胸部，就像我們一樣，有骨骼。他們比較像是一種很大的……我想說「螳螂」或「竹節蟲」，這是就結構來說。但他們大得像人，像我們一樣，而且脆弱──不過我想他們不可能像螳螂那樣脆弱。他們是那種單調的像昆蟲長相的生物，有很長很瘦的手臂。一點都不像人類的手臂。


    **不管**是形狀或樣子都不像。

    朵：（我試著讓她多描述一些）他們的頭也沒有毛髮嗎？

    莉：沒有，他們不一樣。他們比較像蒼蠅。黑黑的，咖啡咖啡的，直和易碎的毛髮，不過不是很多。就像蒼蠅一樣，有腿毛。僵直乾枯的毛髮，不是軟軟的。你知道，他們有那種像是電影裡那種凸凸的奇怪眼睛和下垂的附肢。

    這個描述和《地球守護者》裡菲爾在太空船上看到的生物符合。其他被綁架的人也看過這類外星生物。第五章的貝芙莉就報告了類似的種類。

    莉：這些人——他們不是人——甚至不像……有演化。我表達不出我的意思。他們比較像蟲。雄蜂是不錯的形容。一隻雄蜂。

    朵：你是什麼時候看到他們的？

    莉：我猜他們從一開始就在 了。我想就是他們有那個味道。一定是他們。他們一定是比較低等的生物，或是為了特定目的使用的某種東西。我剛剛還不記得，但這些生物從這個體驗的一開始就在了。就好像你告訴某人一個故事，說著說著才想起一開始時發生了什麼事。嗯，他們從一開始就在。我想說他們就像是招募來的人員。（咯咯笑）

    朵：哦，這是很有意思的形容。


    **監護人** THE CUSTODIANS'
  mdcn: '## 監護人 (THE CUSTODIANS)


    現了這麼一個明亮的房間。我還記得看到了人，褐色膚色、沒有穿任何上衣。我想著：『我的露台怎麼了？如果這是我的露台，為什麼桌邊這些人沒有穿上衣？』我像是從心智的兩個部份同時在觀察事物，可是沒有一個說得通。』


    這些是她最後記得的事。『我感覺比較鎮定了，覺得自己恢復了。我知道自己醒著，不過沒有立刻睜開眼睛，因為我不想看到任何東西。我不知道自己躺在那裡多久了，但當我睜開眼睛，我看到房間就像晚上該有的情況——黑漆漆的。我想：『啊，我回到我的房間了！』我從來不趴著睡，可是那時候我是趴著的，而且很放鬆。我想不起來自己有哪次是在這麼放鬆的姿勢下醒過來的。床沒有一團糟。沒有嘔吐物，也沒有尿濕，被單整齊得像是我幾乎沒有翻過身。時鐘上的時間是三點，所以已經過了兩個小時。我不覺得想去洗手間。我做的第一件事是檢查拉門，而它就跟我記憶中一樣，關得好好的。然後我去看我的兒子，再去看我老公，他在沙發上打鼾。一切都沒有異狀。我接著打開所有的燈，進到廚房抽菸。當我坐在廚房抽菸時，我看著天花板想：『那看起來不是很好嗎？那個物質實相。』然後我摸摸桌子：『噢！這感覺不是很好嗎？這是物質的，是實心的。在這裡不是很好嗎？我認為這是一次奇怪的靈魂出竅經驗，而我覺得回到身體裡很美好，身為這個世界的一部份很美好。有個血肉之驅並且能欣賞我現在所擁有的肉身是件美好的事。當麥克醒來，想要知道我醒著沒睡到底是在做什麼時，我就是這個感覺。我說：『噢，親愛的，我剛剛做了一個好奇怪的夢。』


    如果這是因為消化不良或胃不舒服所造成的惡夢，為什麼莉安醒來時感覺會是正常的？她並不覺得噁心，也沒有吐。


    那個奇怪的夜晚更令人困惑的是，如果她的身體真的被戳刺，隔天那個部位應該會有些刺痛。


    然而，她並不覺得有什麼問題。所以她的結論是，那一定只是一場夢。


    討論過後，我們進到她阿姨的房間進行催眠。當她進入了良好的出神狀態，我指示她回到一九八八年一月，事件發生那晚的家裡。她重新經歷了摺衣的部份。看到這些情景重現，她覺得很有意思。


    莉：我可以到房間。我看到我穿的衣服，甚至真的看到牆壁上的照片，而不是靠記憶回想。這就像是回憶，但你能把回憶視覺化嗎？本來不就该是這樣的嗎？用看的和回想是有差別的。


    我必須讓她的心思不要去分析情況，只要單純報告自己看到的事物就好。如果個案持續分析，他們會轉換到腦子愛判斷的那一邊（譯注：指左腦），然後改變催眠過程。我對她解釋，用這個方法回想比較容易。


    莉：可是這樣我就沒有投入。


    朵：如果你不想投入就不必投入。你有這個選擇。你想要的話，可以用旁觀者的角度去看。這完全由你來決定。控制權在你手上。


    ## 第四章 隱藏於夢境的資訊


    她開始描述房間。接下來就是注意到那些影子。


    莉：它們總是那麼靠近地面。我永遠也沒法真的看到它們。它們不像牆壁上的影子。那些是物體投射的固定陰影。這些就好像是突然出現在那兒，可是馬上就消失不見。


    她摺完衣服後覺得累，想要上床休息，而且立刻就睡著了。當我問她是否整夜都在睡覺時，她輕聲地答：「不是。」她沒有告訴我原因，反而流露出痛苦的表情。她的臉和身體動作顯示有事情正在發生，只是她不肯用言語表達。終於，她深深嘆了口氣說：「我不想回想。」我給了她感覺安好的指令，強調她會非常安全，她可以從一個客觀報告者的角度去看事情的經過，一切都不會有問題。


    為了讓她有信心，我花了幾分鐘的時間安撫。她的呼吸很深且不規律，我知道有事情發生。雖然她沒說話，她一直把手伸出來，溫和地碰觸我的手臂，像是想確定我在那裡，而她不是獨自一人。她每隔一段時間就會這麼做。這似乎能幫助她確認我是真的在場，沒有離開她。她似乎很受發生的事情影響，也因此影響到我問問題，然而這也讓她的注意力再度回到我身上。她一定是在觀看和體驗到一些事，只是沒有說話的衝動。終於，她脫口而出：「這真是瘋了！」我向她保證，我聽過很多怪事，她說的任何事都不會令我訝異。我試著說服她，如果她開始跟我聊，情況就會變得容易些。


    莉：你在嗎？


    朵：我就在這裡。我會陪你經歷這整件事。你不會是一個人。不管情況聽起來有多麼奇怪都沒有關係。你現在看到什麼？

    莉：（她終於開始敘述）我在裡面。我不在家。他們在說話，不過我不曉得他們在說什麼。我不喜歡那裡。

    朵：那裡是什麼樣子？

    莉：我們在室內。在一間房間裡。我不喜歡它的味道。


    她的表情明顯是聞到了不愉快的討厭氣味，做出皺鼻之類的動作。當我要求她描述那個味道時，她很難說明，卻堅持要描述得正確。由於她無法把那個氣味連結到任何熟悉的東西，所以變得更難解釋。「不乾淨、腐爛。不像死掉的東西。聞起來不像堆肥，也不像腐爛的魚。只是很刺鼻，不知道這麼說對不對。比較高頻的腐爛……雖然這樣說很沒道理。像是黏答答的腐爛物。和我曾經聞過的都不一樣。也不像膽汁。比膽汁還難聞。」她一臉厭惡，似乎很介意那個味道。於是我下指令，她在描述事件時不會受到氣味的干擾。我們用這個方法把氣味阻隔，氣味就不會實際困擾到她。


    莉：那是個房間，不過和我想像中的不同。這裡有人。啊！（微笑）不是阿斯塔。


    我要她描述她看到的東西，但她沉默下來，變成一個旁觀者。她看到的事物顯然令她痛苦，我從她的臉部表情和眼睛的動作看得出來，它們比肢體動作更清楚傳達了這點。她的呼吸很大聲而且不自在。她身體的主要動作就是伸出手碰觸我的手臂，確定我還在。她很專心在體驗當下發生的事。


    突然間，她脫口而出：「他們為什麼不停下來？不要再戳了。我不只是看到，我還感覺到。」我耐心地試著說服她告訴我發生了什麼事，而我的提問似乎讓她的注意力又回到我身上。「他們的眼睛好大」她深深嘆口氣說，這和我希望的不一樣。我希望的是比較靈性的接觸。一個智性的接觸。


    她停頓了一下又說：「停下來了。我想我現在在桌子上。」然後她開始描述房間裡的人。「他們的頭是淺褐色，但不是米色。……黃褐色才對。我想他們有穿衣服，只有頭始終露在外面。他們的手臂比我們的長。他們不高，沒有毛髮，看起來類似《交流》書裡的人，除了他們的皺紋比較多之外。眼睛是否仁狀的，在臉部的比例上算大，比我們的眼晴大。沒有眼白。他們的瞳孔很大，虹膜很黑，幾乎是黑棕色。他們其實是沒有鼻子的，只有鼻孔，沒有延伸的東西，沒有其他可以被叫做鼻子的部份。他們也沒有耳朵，只有洞。他們的嘴跟我們的不一樣，他們沒有嘴唇和牙齒。」


    朵：他們哪裡的皺紋比較多？

    莉：他們的手臂比較多皺紋，脖子也皺皺的，像皮革一樣。你知道的，就像那些皺皮的狗？

    朵：沙皮狗？

    莉：這是很好的形容。肩膀的地方沒有皺紋，但是可以動的關節部份都是皺皺的。手肘和前臂內側


    朵：臉有皺紋嗎？

    莉：沒有，他們的臉比較平滑緊緻，像是很好的手提皮包那樣的光滑。不是柔嫩皮膚的那種柔軟，比較像是皮革表面，他們脖子的皺紋較多，而且很瘦。


    她描述他們的手有三根手指，一根是往外翻的反方向大拇指和兩根手指。她試著去看他們的腳。「我們有跟我們一樣的關節。有肩膀、手肘和膝蓋。不過他們的脚跟我們不一樣。他們的比較扁平，不像我們的脚背那麼高，他們的脚跟也寬些。我沒看到脚趾。」


    其他人對外星人的脚也做過類似的描述，最明顯的是《星辰傳承》中的案例。在那本書裡，個案描述外星人的腳像鴨腳或手套，扁扁的，沒有蹼。


    朵：他們的手指有指甲嗎？

    莉：我不記得了。如果要我猜的話，我會說沒有。

    這也跟所有的報告一致。那些存在體通常沒有毛髮，所以也沒有指甲，因為指甲和頭髮的細胞結構是相同的。這類存在體似乎沒有製造毛髮的基因。


    莉：他們在戳我。我一點也不喜歡。一點也不喜歡。現在沒事了。之前被刺被戳，又動彈不得，很討厭。這比生小孩時還糟。


    我要她告訴我他們戳刺的位置，但她對於討論這點似乎很不自在。所以我問他們是否有用任何東西。她描述她看到的器具：「冷冷的，很光滑。我猜是類似金屬的東西。不是不鏽鋼。你知道當你去婦科醫師時，有時候那些器具是冰冷的？不過那不是婦科醫師的器具。其中一個像吸管，尾端有某種構造，像是用來刮還是什麼的。那是他們檢查下半身用的。」


    莉安接著描述器具放置的地方：「有一個由某種白色物質構成的櫃台區。房間裡的一切都是內建的。櫃台的部份、抽屜、所有的東西，都是從牆壁的表面拉進拉出。如果你需要把東西放在別的東西上面，你要把它從牆壁裡拉出來。我猜他們這樣是為了旅行或什麼的時候，不一定要在這個房間裡放東西。所有的東西都被推進去牆壁。」


    我請她描述其他的器具，但她的注意力已轉移到周圍的環境。「我不喜歡這裡。這個房間是圓的。房間裡有光。我剛剛有說嗎？我已經不是躺著的了，不過躺在桌上時，上方有燈。然後他們就把我倒掛起來。」這顯然是令她不安的部份。事情發生的時候她說不出來，現在能跟我說是因為那部份已經結束了。「我覺得自己像是被套在馬蹬裡，你感覺自己在那裡像是頭牲畜，頭下腳上地被吊起來。」


    朵：不是很舒服的姿势。

    莉：对。（停顿）我现在光著身子。他们在戳刺的时候，我没有穿衣服。不过现在没关系了。那个味道也不见了。那个味道很臭，很不一样。那是在别的地方，另一个房间。这个房间很乾淨。

    朵：味道是从别的地方来的？

    莉：不管是哪裡，那个房间不乾淨。这是个非常乾淨的房间。没有臭味了。除了……不该对人做那种事。不该戳。我的意思是，那就像是不尊重你的身体。呵！好大的震撼啊，莉安！事情不该是这样的。

    朵：那裡有多少人？

    莉：除了戳我的人，另外还有两个人……人？呵！……就只是站著看和说话。但我不知道他们在说什麼。

    朵：他们有发出声音吗？

    莉：有啊，他们会发出声音，不过我没办法形容那个声音。他们的语言有一种音调上的结构，类似音乐的音调，可是说话的模式听起来比较空。就像你如果透过……（有困难描述）机器来说话，它会取代你的声带，但声音很空。也像是用吹奏风琴的方式发出的声音，只是那不是风琴。一种空空的声音。不是电脑。有点像机器的声音。空洞。

    我懂这个定义。我认识一个因罹癌而割除声带的男子，他也是用机器说话。只要听熟了、听习惯了，就能瞭解他在說什麼。那種聲音有種單調、振動的效果。

    這個描述與《星辰傳承》裡的潘妮所描述的很像。她也說她聽到外星人發出奇怪的音樂聲調而不是說話。


    朵：這些人全都看起來很像嗎？

    莉：他們看起來基本上都一樣，可是眼睛不同。


    朵：怎麼說？

    莉：他們的眼睛有差別，要不就是臉；他們敏感／感受的程度不一樣。就像所有的白人看起來都一樣，他們就是白人。而所有的黑人看起來都很黑。他們都有相似的地方，不是嗎？可是你會透過他們的眼睛或別的什麼來區別。他們現在就有很柔和的眼睛。你瞧，我現在覺得沒事了。我已經沒有被吊掛著。我現在看到的這個的眼神很柔和。同樣的眼睛形狀，但比較……有愛心。


    他剛剛也在，不過只是旁觀。他不是用東西戳我的那個。

    朵：你能看到他們還做了什麼其他的事嗎？

    莉：可以啊，我想我看到了。可是我不想談。

    朵：好吧。我只是想現在找出發生的一切，這樣你就不用再做一次（譯註：指催眠）。

    莉：我們不會再做一次了，好吧？

    朵：沒錯。


    莉：對，我們不會。我會說的，但不要再一次。好嗎？

    朵：沒問題。只是談談發生了什麼事。

    莉：好吧。我知道這個感覺——不，我不懂這個感覺——我明白了。他們採集排泄物。他們看起來好像在發射某種雷射光束或什麼的進去。他們在角落那邊。因為這個房間是圓的，所以其實也不能說是角落。機器發出聲音。有點像我聽到的聲音，不過跟我記得的不太一樣。那是高頻率，我猜是光束發出的。（這可能就是她以為自己在床上時聽到的電鋸聲）他們收集排泄物。我不懂他們拿那些東西要做什麼。我選擇不去看。但我想……有個什麼在想：「幹嘛管他們在做什麼呢？又有什麼用？」……這一個，這個男的……這個善解人意、有著仁慈眼神的存在體很和善。在我被那樣子吊起來又被放下之後，至少還得到這一點尊重。我不喜歡被吊起來。他是來安撫我的，並不是說我感到焦慮，我只是感覺：「他們為什麼做這麼噁心的事？」那也不是變態那種噁心。我想，相對於被……（她有困難解釋）侵犯，那比較像是調查……科學方面的……。


    但至少他們還有這個敏感度，知道在檢驗之後要安撫我。


    別的個案也描述過類似這樣一個有愛心的外星生物，我在其他書裡也有提到。個案通常會把安撫他們的個體描述為「護士」類型，有時差別僅僅在於眼神。有些人說，即使他們區分不出外星人的性別，這個外星生命散發出一種女性的感覺。


    朵：你說他們穿著衣服？

    莉：是啊，討厭的那幾個有穿。他們穿藍色的套裝。其他在檢驗室的人穿著同類型的白色連身衣。那裡比較是個無菌環境。他們的脖子很長，所以衣服的領子很高，但脖子還是有部份沒被遮住。套裝領子上露出皺皮。（在我的想像中，那是一種中式立領。）

    朵：你在他們的衣服上有沒有看到表示階級或身份的標誌或類似的東西？

    莉：讓我看看。（停頓）你不要完全相信我的話。這可是突然冒出來的，好吧？是個圓形，在中心點上面有三條波浪線條。我猜那是一個使人平靜，一個安撫的符號。

    朵：這個符號在哪裡？

    莉：噢，他們配戴在胸前。（她的手勢顯示是在左肩上）我想是在白色的制服上。

    我下指令，她會記得那個符號並在醒來後畫給我看。接下來，我想知道她對那個房間還記得哪些事。那裡的光。我不知道光是從哪裡來的，除了主要的光是照射在桌上。又大又圓，但不是日光燈。它沒有你去看牙醫時的那種光的热。你知道那種會發熱的光？它沒有那種热度，也不像我想象中醫生手術房裡的燈會有热的。這個光就像那麼亮，但你感覺不到半點热度。這個房間很亮，不過我不知道光源在哪裡。似乎是從牆壁出來的，可是我看不見任何我認得出的燈光裝置，所以不知道光的中心点或光源在哪里。


    这样的描述在其它幽浮案例也曾经重复出现，他们说光源似乎来自天花板和墙壁，整个表面都被照亮。


    莉：这个房间有个栓在墙上的长杆子，类似让残障人士抓握的那种不锈钢。不是一直条，是环绕墙壁的圆棒。它的质地跟不锈钢一样细緻，但不冰冷。墙壁有弧度，就像一间圆形的大房间。说「大」，也不是真的很大。它不是很宽闢。如果你躺下来往上看，你会看到一个像是观察室的地方，在那裡的人或生命体可以往下看，观察检验室裡的情形。我想说那是玻璃，因为是透明的，不过大概不是玻璃。可能是某种会防止细菌扩散，或不论在进行什麽都不会让它暴露在外东西。很像医院有的那种观摩室或观察台。只是我想医院观察室的位置是在更後面一点。这个不一样。它像是玻璃窗，你可以看到後面有人站著观察。但不像你在电视上看到的那种医学院学生围成一圈观察的情形。不一样。


    朵：站在玻璃後面的外星人跟房间裡的是同一种吗？（是的。）你能看到房裡还有什麽其他的東西吗？


    莉：我想说……不像我们想的那种有键盘和萤幕的电脑。完全不像。我猜有监控器，不过跟我们的不一样。这些用途多少是内建在墙壁裡。它们看起来是用相同金属做的，像是不锈钢，旁边有操作面板和按鈕。沿著室內牆面是不同的工作站。其中一個有看起來很複雜的顯微鏡，他們正在進行的工作會出現在上面的螢幕。另一個工作站有兩個平衡得很巧妙的卡鉗和懸臂，這是用來拿取和處理小到無法用手指拿的極小物體。那種微型工具類的東西。面板上有彩色的光，還會發出聲音。


    朵：機器聲？


    莉：不，不像我們的機器。那個聲音的頻率比較高。聽到的聲音和出現不同光的模式之間一定有某種關聯，不過我不知道是什麼。


    朵：還有其他的聲音嗎？


    莉：聲音？有啊。你知道是什麼嗎？一定就是那個聲音。我剛剛說這個檢驗室裡的聲音像是比較高的頻率，像牙醫的鑽頭。另一個聲音——雖然聽起來沒什麼道理，但我還是要說，那個就像是圓鋸機的嗡嗡聲——是真的。那一定和引擎或什麼東西有關。它讓這整件事有在地球的感覺。


    朵：可是另外那種電腦類的機器發出的聲音並不一樣？


    莉：噢，對呀！那個聲音優美多了。沒有變化，但比較優美。不像是圓鋸機的聲音。


    朵：好。現在我要問你，你是怎麼去到那裡的？你可以旁觀，不必再體驗一次。你是怎麼到這個房間的？


    莉：我跟你說我想說的，不過你不要完全相信。這好像是唯一有道理的事。有個念頭冒出來，就是我必須透過某種方式被心靈傳輸或被抬起來。不是太空船進來我房間做什麼。不是的，我还是要回到光束效應。不過我現在就像是有一個心靈在同時運作，所以我也確定到底是怎樣。

    朵：只要說你想到的事情就好。不要擔心分析的事。

    莉：（大嘆一口氣）我像是被某個方式傳送到船上，但身體卻沒有像《星際爭霸戰》（Star Trek）裡演的那樣分解。我猜一定是某種光束效應。因為我想到了物質實相，就像你的房子的結構，我也想到回來的事。他們一定都是用這個物理光束包住你的身體。也許分解分子結構，好讓它被光包覆，讓它不是實體。然後光束就對身體的實體性質發揮它的效用，再帶著整個分子結構走。

    朵：不要擔心有沒有道理。你想到的就是這些，那這就是我們要處理的部份。

    莉：我想到的就是這些，沒錯。

    朵：你在那裡從頭到尾只看到長得很像的外星人？

    莉：我想說那裡有兩群人或是生物。第二群是實驗者。第一群穿著藍色制服。他們比較像蟲，和其他人的身體大小不一樣。他們沒有胸，比較瘦長，更扁平。他們的附肢比較長。

    朵：你說他們比較像蟲是什麼意思？

    莉：他們不一樣。他們的眼睛凸出，而且是在頭的兩側。頭的部份主要就是眼睛，像昆蟲一樣。我不記得有看到鼻子和嘴巴，不過我猜他們一定有嘴巴。還有，他們沒有胸部。你知道，其他人有胸部，就像我們一樣，有骨骼。他們比較像是一種很大的……我想說「螳螂」或「竹節蟲」，這是就結構來說。但他們大得像人，像我們一樣，而且脆弱──不過我想他們不可能像螳螂那樣脆弱。他們是那種單調的像昆蟲長相的生物，有很長很瘦的手臂。一點都不像人類的手臂。


    **不管**是形狀或樣子都不像。

    朵：（我試著讓她多描述一些）他們的頭也沒有毛髮嗎？

    莉：沒有，他們不一樣。他們比較像蒼蠅。黑黑的，咖啡咖啡的，直和易碎的毛髮，不過不是很多。就像蒼蠅一樣，有腿毛。僵直乾枯的毛髮，不是軟軟的。你知道，他們有那種像是電影裡那種凸凸的奇怪眼睛和下垂的附肢。

    這個描述和《地球守護者》裡菲爾在太空船上看到的生物符合。其他被綁架的人也看過這類外星生物。第五章的貝芙莉就報告了類似的種類。

    莉：這些人——他們不是人——甚至不像……有演化。我表達不出我的意思。他們比較像蟲。雄蜂是不錯的形容。一隻雄蜂。

    朵：你是什麼時候看到他們的？

    莉：我猜他們從一開始就在 了。我想就是他們有那個味道。一定是他們。他們一定是比較低等的生物，或是為了特定目的使用的某種東西。我剛剛還不記得，但這些生物從這個體驗的一開始就在了。就好像你告訴某人一個故事，說著說著才想起一開始時發生了什麼事。嗯，他們從一開始就在。我想說他們就像是招募來的人員。（咯咯笑）

    朵：哦，這是很有意思的形容。


    **監護人** THE CUSTODIANS'
