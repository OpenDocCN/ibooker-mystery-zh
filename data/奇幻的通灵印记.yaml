  md: '# 第一章：牛下童年


    驚慌，又懊悔因午睡礙事！就在我放聲大哭之際，竟發覺身後房間竟然出現兩名女孩，她們一同倚靠在睡房門邊窺看著我的哭鬧傻勁！這兩名年紀跟我和姊姊相若的女孩，看來亦好像是姊妹關係，擁有相同的衣飾和髮型，穿著同款的背心短裙和大花拖鞋。正當我打算轉身細看清楚時，小姊妹已即時躲回房間。我當然立即走進房間察看，可是卻驚見一位像是她們母親或姐姐般的「監護者」，正盤坐在床上對我虎視！而這兩名女孩早已躲靠在其身後。而我正打算上前再看清楚時，小姊妹又瞬間飄閃至廳外去！那刻我既高興不再孤單一人在家，又雀躍家中無故出現兩名同齡玩伴，於是主動拿出玩具要求一同玩耍。正當我們玩得忘形之際，只見小姊姊竟然剎那間幻化為另一個不倒翁娃娃，而我和小妹妹則樂得推玩著各自的不倒翁娃娃來比拼！至於那位「監護者」，則高坐在家中櫃頂上，看著我們玩耍的情景。後來小姊妹更輪流變現為家中的不同物件……如積木玩具、水壺茶杯，以至其他小物件等……而我更被這神變遊戲逗樂得嘻笑聲不絕！


