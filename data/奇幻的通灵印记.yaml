  md: '由於當時還未入學讀書，母親每朝總會帶我一起到菜市場去，而我總被安置在棚屋街市前等候（即牛下八座聖馬太學校前），好讓母親買菜後到來接我回家！這時候我已懂得向親切的攤販叔叔問好，很多時還會得到某些食物作獎勵！那些年街坊鄰里人情味濃，就算一個平常早晨；我也跟不少長輩禮貌問好，被讚賞乖巧的感覺著實令我感到無比開懷！


    其實每次從菜市場返家，我們總會經由十三座的樓梯回來；只因十三與十四座是呈「T字形」的雙連設計，形成一個四通八達出入方便的居住環境。但很多時，我總是發現十三座那些設於公共位置的蜂窩石牆前面（街坊稱為大廳），經常聚集著一班年老坊眾。而每次經過，他們總會向著我緩緩招手，很多時我亦會禮貌地揮手回應！母親當初對我的舉動還是不以為意，直至她發現我每次經過時總會向此方揮手。某次她終於按捺不住，詢問我跟誰在打招呼？我如實告知：「媽，我跟前方坐著的婆婆揮手，有很多公公婆婆在一起！」可是母親竟露出驚駭的神情並怒掌我的嘴，然後便急步拉扯著我歸家！剛巧那朝早是一個陰晦雨天，因而母親對此有所意會，所以自此以後便命令我和大姊切不可步近此區域玩耍。可是每天當我步出家門，


    30'
