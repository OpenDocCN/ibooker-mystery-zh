    只見領隊露出歉意走近高臺，向入境官員細語回答：「這是破例的一次安排，只因此『人』在觀世音菩薩坐前央求多天……！」可是入境官員卻對此抗議著說：「如果是安排其他人到訪，我們對此並無異議；可是這次到訪的『人』卻跟其他人有明顯分別……很多人到了明天會將靈界所見所聞一併忘掉！可是這『人』將是一個麻煩的傢伙，意識中還會留有深刻的記憶呢！」這時我雖然身處高臺下，卻隱約聽見他們對我一致的抱怨；那刻我只感到汗顏和不安，害怕會被他們突然轟走！這時我亦察覺到領隊面有難色著我快些遞上外婆的證件給官員蓋印，而官員在蓋過印後亦隨即將大樓燈光關上，並表示辦工的時間到此為止……！更表示由於天色已晚，其他的入境安排留待明天繼續吧！領隊只好著我們轉到酒店休息，於是我們一行人被帶至另一場景……


