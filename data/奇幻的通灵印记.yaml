    # 出體事件簿（四）

    神秘地道


    這是發生在某個不知名時空的出體見聞……無意間一團充滿哀號的情感能量襲來，我只意識到這是來自一位母親與女兒的無助情緒！矇矓間來到一組深山叢林，奇怪地當中竟發現鋪設了某些小型的火車路軌，並且一直延伸至那些深山洞穴中。


    畫面一轉，看見洞中建構一組組的秘道，全由某些巨大重型的鋼閘所區分。這些隱藏在深山內的秘密通道一直蜿蜒至地底某些岩層，出入其中全賴以簡陋的小火車連接。畫面中看見很多人被分派到來修築這些地下秘道，這全是用血和生命來換取的成果。


    那刻我的意識全被那突然襲來的無助情感所充斥著，只感到這是爭分奪秒的危難拯救時刻，我定要聚精會神努力探索定將這對母女安全救出！於是我坐上其中某車卡沿著洞中路軌一直向下進發，耳邊傳來的是那些金屬撞擊再加上深山迴傳的深邃弦震聲響！當闖至某層洞穴時我終於看見這位中年母親絕望地向我匍匐招手，只見她用盡生命最後一口氣來要求我務必將其女兒安全救出！'
