    # # 出體事件簿（一）

    ## 巴士上的神秘來電


    在眾多的出體見聞中，這是一件在多年後亦令我感到充滿玄奇的事件之一。


    某晚我在進入其他次元的出體學習回程中，在重返現世時空架構時，無意間被「時空流」某段訊號所吸引，因此跳進這段不知發生在地球何時何刻的事件見聞中！


    這是從高空飛行鳥瞰中的畫面，一通莫名的手機來電訊號把我吸引過來！只感到這是一則充滿求救意識的來電，我在這不知名的時空下不斷追尋，終於發現原來是來自某輛雙層巴士中某乘客的手機響聲！可是這卻是一輛滿目瘡痍的巴士殘骸畫面，我驚心動魄地飛至這殘骸中搜索，看見一幕屍橫遍野的災後場景！由於那手機來電的聲音感覺充滿絕望情感，因此我從東歪西倒的座椅中不斷尋找！意識亦慢慢地感知到這是一位被困在巴士上，某位不知名者的求救來電！可是就在我感到即將尋至之際，我卻被背後一般強勁的引力拉走，如是者我又再投回現世時空中營營役役！'
  - '[PAGE 297]


    可是這次的驚心見聞，卻像不解迷團般於往後的出體回程中尋常再現，而每次只能從中了知到些微的事件內容。某回終於感應到這位來電求救者，是一位於鄉郊地區工作的教師身分，可是我還是未能真正步近將其解救！因為每次總是被某些外力所左右而令我被迫回體！


    某次又在一個不知名的出體時空中，又傳來這名等待救援的老師來電；可是這回我從巴士殘骸中所接收到的感應，卻是這名老師因未能準時回校上班的愧疚內容！及後再經過幾回感知探索下，我才意識到這是一輛從高架橋上被意外拋至谷底的巴士慘劇！


    由於那時妹妹剛巧大學畢業，而她的志願是當一名中學教師；但那時聘請初級教師最多教席的地區，就只有元朗或上水一帶的偏遠中學。所以當時常令我不期然將這則「巴士意外」的出體見聞聯想在一起！後來更要求妹妹不要出席某間位於元朗中學的應徵約見，這當然換來妹妹的莫名疑問！於是我只好婉轉表示這是「夢中」感應情節，對於妹妹來說只感到我是一名過於憂天的「杞人」而已！


    如果這只是剎那間心靈的無意識浮現幻象，為何又會尋常湧現在多次的出體回程時空中？因此後來我只能以誦經持咒的方式來期望減輕這巴士慘劇的發生！'
  - '[PAGE 298]


    ********


    後記：這是發生在九零年中的一連串出體見聞之一。

    可是直至 2003 年「汀九橋巴士意外」發生那一刻，我才意

    會到若干年前的這則出體奇遇，竟於大約十年後在「時空

    演練」下真的發生了！'
