    # 朝聖之旅


    在 2000 年初，我和妹妹參加了一個由某藏傳佛教團體所舉辦的「朝聖之旅」。整個行程約時半個月，主要圍繞參觀「佛陀」一生足跡聖地，因此會跨越尼泊爾和印度兩國。


    關於這次活動是由該佛教團體的兩位主事喇嘛親自帶領，因此會以修持禮拜為主、消閒為副，並會參與該佛教團體於印度所舉行的祈福法會。


    沿路上我們先後參觀過位於尼泊爾的「佛陀」出生地（藍毗尼 Lumbini）、印度北的「菩提金剛座」（菩提迦耶 Bodhgaya）並瞻仰斯理蘭卡國寶「佛陀舍利」、初輪法輪之地「鹿野苑」（瓦拉納西
    Varanasi）、佛陀講授《法華經》聖地（靈鷲山 Gridhakuta）、佛學聖地「那爛陀寺」遺址（那爛陀大學 Nalanda）以及「佛陀」涅槃地（拘尸那羅
    Kushinagar）等。


    兩位喇嘛除了安排我們食住及交通，沿路上更為我們講解佛陀一生事跡及教授正確的修持理念，因此眾團友均感到這是一次極其意義的行程！可惜由於我們對當地的天氣及飲食不太習慣，因此在行程中段已有不少團友患上小毛病及顯現疲憊，這當然包括我在內！'
  - '[PAGE 328]


    # 第三章：靈魂出竅


    及後轉至藏傳佛教聖地之一「帕平」（Pharping）的「蓮師洞」參觀。這是密教祖師「蓮華花生大士」當年閉關修行的地方，在洞內岩石間更留有「蓮師」手印在其中，因此各團友均熱切爭相進內朝聖及頂禮！可是主事喇嘛卻發現我只是步入洞中片刻，便逕自納悶的安坐一旁休息，於是便親切地上前慰問！


    我只好向他坦言交代，曾於夢中到訪過這聖地，更表示這種現象時常出現在我的生命中！當中還經常出現一個與藏傳佛教有關的神秘夢示，因此令我多年來對這深感疑問！然而我亦明白這是一種自然的「通靈」現象，屬於「靈魂出竅」的能耐！


    由於旅程中我曾向另一位喇嘛好奇發問，詢問他是否十五歲前曾經歷人生大劫？因為我發現他理應不在人世，現在竟可出家修行圓滿無礙？因此兩位喇嘛早已對我的靈感好奇，現在聽罷我對其表示……曾到此「夢中一遊」的內容後，因此喇嘛刻意向我查詢關於這聖地的其他資料！於是我向其表示：「夢中經常跟隨『靈界導師』出外遊歷及學習，而這『蓮師洞』亦是過去曾到訪的其中一站！可惜夢中打算步向前方參觀另一所印度教的廟宇時，卻被鬧鐘無情地轟鬧弄醒，故此前方景致反而是我好奇的地方！'
  - '[PAGE 329]


    只感到這廟中供奉的神祇，亦是藏傳佛教中某位以女性形象顯現的主尊！」


    喇嘛聽罷隨即提議我們一起前往印證，看看是否如我夢中所見般吻合！於是喇嘛領著我和妹妹向這廟宇的印度工作人員查詢，對方表示這廟所供奉的是古印度瑜伽修行者的某位主尊，更表示歡迎我們進內參觀及頂禮！於是我們便在喇嘛帶令下進入這陌生廟宇，並由喇嘛發現壇上所供奉的亦是藏傳佛教八大本尊之一「金剛亥母」。及後才知道原來這廟名為「金剛亥母瑜伽廟」（Vajrayogini
