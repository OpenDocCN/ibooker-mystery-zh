    # 第一章：牛下童年


    我如吃過後感到回味可以再來添取！正當我滿心喜悅地捧著熱飯打算打道回府之際，轉身卻看見剛才那位擋路大叔已從座位上移開，並寬步叉腰的站在不遠位置對我更為怒瞪！面對這樣的窘局我的內心更為懼怕，只懂低頭急竄迅步的奔跑回家！回家後我才覺釋懷，正當打算享用手上熱飯之際，母親著急的查問我有否向三姑說出我們每天午飯都只是吃白粥的真相！只因母親早前致電時所持的理由是……剛巧吃光飯鍋內的白飯，但又趕不及來為一碗半碗米飯重新下鍋……！因母親害怕被人家看穿我們家中開銷緊絀的實況！後來母親眼看我拿了人家這麼大碗的熱飯，心想到了三姑兒子放學回家後，豈不要勞煩人家再煮？於是我將剛才所見向母親說：「三姑今天家裡拜神，桌上放滿各種美食，有燒鵝、燒肉……而且她家中更有客人到訪，所以我看見她家中的飯鍋，還有半鍋熱飯呢！」


    當母親聽到三姑家裡今天來了訪客和正在拜神時，即時查問我面對長輩有沒有主動打招呼和問好？我面有難色的坦言只因這位客人樣子實在太惡，所以令我膽怯不敢跟其問好的事實！母親聽罷即時怪責我怎能如斯失禮，但同時亦奇怪何以彼此同鄉理應所有習俗和拜神日子一盡相同！會否是她一時大意忘卻而疏漏了某些祭祀呢？（註：'
