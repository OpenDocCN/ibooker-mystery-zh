    # 奇幻的通靈印記


    ![](img/ce41a82d030a67335cec9f19d65d152d_215_0.png)


    體內部擠壓，只感到整體的「心靈意識」像被一併收攝擠壓進身體中央的「心輪」間的位置內，並迅速匯壓濃縮為一點「意識能量」！這種「內在感觀」漸次解體的暴烈情況，有如巨浪般一浪接一浪的強烈湧至……當下只感到這點「意識能量」有如一顆漲滿的汽球，被外力強行壓進水底一樣，然後汽球因被壓至最低點後出現猛烈回彈出水面的強大衝力的感覺……剎那間只感到這點「意識能量」有如子彈般從頭頂上方猛烈地飛彈出來，頃刻間落入一個寧靜廣闊的陌生空間中！


    接著換來一切靜止，時間也彷彿停頓……只感到十多秒後這漆黑虛無的空間中現出一點閃光，閃光瞬間呈「米」字般擴散為一片廣闊無垠的明亮空間。那刻只想確定身處何方，於是第一時間打算檢視自身及雙手時，竟發現是空無一物……只餘「我」這點意識運作而已！奇怪地此刻的「我」對當前一切並未感到害怕，相反竟有一種豁然開朗的清新感受，有種不再受困於肉身枷鎖的自由氣息……！


    「我」對當前景況只感到冥然寂靜，突然發覺從上而下竟飄來某些狀如初雪般的眾多小圓光球！這些籠罩著虹光的光球大小不一，初時「我」還不以為意地看著它徐徐掠過；但後來才發覺原來每顆小光球中，都映現著此生過去


