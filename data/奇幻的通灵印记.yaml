    # 第一章：牛下童年


    斷哀求她們原諒和釋放，無奈只換來更嚴厲的苛責！我歇斯底里地不停敲打著房門哀求，可惜那護士長還是認為這是給我最恰當的懲罰和教導！就在我無助地不斷抽泣搥門的一霎，忽從暗黑的身後傳來一把細語嘀咕的悽戚聲，我隨即轉身後望，竟赫然發現房中某角亮著一團晦綠螢光！我循那螢光方向步往尋看時，竟看見一個和我穿戴相同（白色服裝和手帶）的老伯正抱頭蹲坐在房中暗角淒泣痛哭！當老伯發現房中不止他一人時即時向我招手及叫嚷：「你看見我嗎？你是見到我的……！求你告訴他們我還未死，叫醫生快來解救我吧！求求你告知醫生……我還未死的……！求他們不要帶走我……！不要帶走我！」說罷這蒼白老伯隨即起來並想撲附過來！我對老伯所嘀咕哭訴的內容似懂非懂的疑慮著，再加上他身上籠罩著一股令人深感驚駭不安的氛圍！令我感到極之懼怕，隨即急跑回門邊奮力搥門與哀求……！這時門外隱約傳來眾多人聲，原來是院長帶同幾位外國人巡院參觀，所以那位護士長才急召其他人來把我釋放和安頓在房外某一位置。


    我在這醫院住了個多星期可是健康情況反趨嚴重。而某些日子母親又為著照顧患流感的妹妹沒有前來，還有每晚我總是提心吊膽的害怕又再遇到令我驚遽的「鴉烏婆」'
  - '[PAGE 77]


    重臨；再加上剛入院時母親送我的唯一玩具又被不知名的病房小孩強搶去……面對種種不足為外人道的內外壓力下，年幼的我亦感到日子和健康過得不太樂觀！


    直至某天下午的探病時間，我如常安坐在病房大廳等候母親到來，雙眼總是緊盯著長廊的入口，期盼第一時間能看見母親前來接我歸家！就在我熱切期盼等候的一霎，竟看見身穿校服的姊姊從長廊那方進來並與我招手！看見多日不見的親人，我當然非常興奮地往前相迎，還立即從衣袋中取出剛分發得來的糖果與她分享！還好奇詢問姊姊為何只有她獨自前來卻不見母親同行？但奇怪的是姊姊由始至終都不發一言，只是面帶微笑的揮手示意我跟隨其後，眼看姊姊瞬間又跑回長廊遠處，我當然亦步亦趨的緊貼跟隨……就在我快將追至姊姊的一霎，忽從身後傳來母親急喚我乳名的聲音，我隨即轉身尋找母親身影，可是並無所見，再回過頭來再尋找姊姊時，卻發現原來我已危站在長廊盡頭往下方向的樓梯邊緣！由於瞬間所有親人突然消失於眼前，而自己又要孤單地被留置在這冷漠陌生的醫院，此刻我又再按捺不住放聲痛哭！後來由於我又被投訴離群亂跑及經常哭鬧，於是那嚴厲的護士長竟命人把我捆綁在床上並禁止所有活動！在往後的記憶中由於精神和健康已'
