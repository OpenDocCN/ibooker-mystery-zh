  md: '# 神秘玩伴


    小時候家家戶戶經濟環境一般，所以很多鄰里都會拿些外判手作回來製作，以求幫補生計。當年父親只是一個旅遊車司機，收入僅能勉強糊口，但因性格十分大男人和顧面子關係，就算眼見收入不多也不願正視實況，不讓母親參與這些手作。因此母親只能趁父親不在家時，暗中向鄰居拿些膠花回來串製，以求幫補家用。而我自小對手工藝和色彩鮮豔的東西非常喜愛，因此我和姊姊總是雀躍地跟隨母親一起幹著這些手作玩意；很多時我們都可趕在做晚飯前，把完工的物件送回鄰居代為交收，而又令父親不察覺！


    有一回因臨近年尾工廠快將收爐，各鄰居都有不少成品要趕送至收發站交收，所以這次母親要親自將整大袋成品拿至該處。當日母親要求要我，午睡過後才會帶同前往，於是我便乖乖地入房午睡。當我睡至矇矓間，忽被客廳傳來的叮咚聲喚醒，我馬上知道這聲音是來自家中的一件國產玩具——不倒翁娃娃所發出的聲響！於是我立刻起床步至廳中查看，這時才驚覺家中原來早已空無一人，兼且大門鐵閘同被鎖上！我當然隨即失望得不斷的哭鬧著……埋怨母親為何不守承諾丟下我獨自一人在家？那刻我既感到'
