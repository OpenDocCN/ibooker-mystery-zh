- md: '## 瀕死經歷


    這是一個突如其來的經歷，但亦令我深切體會到原來死亡可發生在一呼一吸的「無常」咫尺間！


    這是發生在早年一個尋常的炎夏中午，當天與幾位朋友結伴到新界參加一個屬於私人籌建道場的宗教活動。由於事前交通趕急再加上天氣酷熱關係，因此到步後我早已感到空氣非常悶熱和侷促；可是由於場地空間所限，再加上參與人數眾多，因此我們隨即被安排擠坐在人群中等候。那時我已感到胸口翳悶，及至活動開始時又要隨信眾一起頂禮，在三叩三拜的頂禮儀式後只感到情況更為嚴重，慢慢地更感到兩手間的指尖麻痺感漸趨加劇，那時我還強作鎮定；心諳這只時短暫的不適，過些時間應可調節過來！


    可是實際情況並非如此樂觀，慢慢地只感到四肢沉重，聽覺散失兼且視覺模糊。由於會場上各人都聚焦在主講內容上，因此我的不適反應連坐在身旁的友人亦未察覺，另一原因是我不想打擾大家帶來不便！


    突然間只感到身上所有水分像被瞬間抽掉，眼前景象竟如電視屏幕般剎那間被關掉似的驟失；接著一股來自四面八方的巨大壓力，從四肢腳底及掌心位置同一時間往身體內部擠壓，只感到整體的「心靈意識」像被一併收攝擠壓進身體中央的「心輪」間的位置內，並迅速匯壓濃縮為一點「意識能量」！這種「內在感觀」漸次解體的暴烈情況，有如巨浪般一浪接一浪的強烈湧至……當下只感到這點「意識能量」有如一顆漲滿的汽球，被外力強行壓進水底一樣，然後汽球因被壓至最低點後出現猛烈回彈出水面的強大衝力的感覺……剎那間只感到這點「意識能量」有如子彈般從頭頂上方猛烈地飛彈出來，頃刻間落入一個寧靜廣闊的陌生空間中！


    接著換來一切靜止，時間也彷彿停頓……只感到十多秒後這漆黑虛無的空間中現出一點閃光，閃光瞬間呈「米」字般擴散為一片廣闊無垠的明亮空間。那刻只想確定身處何方，於是第一時間打算檢視自身及雙手時，竟發現是空無一物……只餘「我」這點意識運作而已！奇怪地此刻的「我」對當前一切並未感到害怕，相反竟有一種豁然開朗的清新感受，有種不再受困於肉身枷鎖的自由氣息……！


    「我」對當前景況只感到冥然寂靜，突然發覺從上而下竟飄來某些狀如初雪般的眾多小圓光球！這些籠罩著虹光的光球大小不一，初時「我」還不以為意地看著它徐徐掠過；但後來才發覺原來每顆小光球中，都映現著此生過去不同時期的影象片段在其中！初時「我」還像路旁群眾般用淡然角度來觀看，但及至看到其中一顆光球中竟出現一個令「我」感到熟悉的身影時……當前在會場中昏坐一角的肉身！此刻「我」才恍然生出與之聯繫的感覺來，剎那間意識只感到一片驚愕迷亂，並對此不斷疑問著……「莫非我已經歷死亡現象嗎？」並喃喃自忖……「死亡……我已經死亡了嗎……？」無奈面對「死亡」驟然降臨身上的震駭！「我」只懂喃喃抱怨著……「死亡……怎可能在頃刻間無聲的發生在我的身上？我怎能這樣年輕就離開塵世步向死亡呢？」


    那刻「我」只感到彷徨困頓，突然意識間傳來一個明確清亮的意念指引……


    > 「從過去到現在，這眼前光景對你來說不應感到陌生！這當前一切現象，你其實亦曾經歷過無數遍！因此這刻你應收攝心神，並將萬緣放下，準備投向這個光明匯聚的空間內……！」


    當下我卻感到千般不願，對自己在世間白走一圈深感愧疚，並立時想起兒時那回夢中計算「黑白罈子」的啟示！又念想到剛出生時在心靈間向母親所許下……對其照料一生的諾言未能實踐感到悲傷！當顧念到還有很多人世責任未圓滿時，著實有必要重回世間好好學習！於是「我」在意念間生出極大祈請及哀求，請求宇宙間的「巨大意識」給予幫忙，請求「偉大神靈」給予指引！奇怪地突然感到一股巨大能量意識靠近，並傳來一把明澈清亮的男聲……傳來一段帶著震絃聲韻的宇宙元音！


    此刻只感到這點「意識能量」被這深邃的音頻籠罩著，隨即被一股巨大的力量把「我」瞬間吸扯進軀殼內……這是一股恍似帶著強勁磁力的電流吸力！只感到剛投回肉身時這「意識能量」還如氫氣球般飄蕩無力，並有隨時又會再飄出肉身外的失重無力感！但當隨著音頻傳來最後一顆元音後，只覺肩膊間生出兩股如抓勒般的力量將其套鎖著，並把這顆還處於輕浮的「意識能量」融匯進心輪內再散向四肢還原。突然間頭頂更傳來奇怪的「卜」一聲……恍似開香檳酒般木塞彈出的聲音！並在頭頂間灑下如雨般湧下的水滴，頃刻間只感到早前體內所有乾涸抽掉的水分，剎那間又再頃刻補充回來！


    重回肉身的一霎，我當然萬分雀躍和感恩！只懂不斷地跟同行友人訴說著剛才所驚遇到的神奇異象！這刻友人才察覺到我何以一面濕透的說著異世內容，並為不曾察覺到我的不適感到抱歉！那刻我只感到一種身心輕盈的欣喜情緒一直籠罩著，並為自己能夠重返塵世；再繼續人世學習，倍感珍惜和欣慰！


    後記：由於這次所經歷的奇幻見聞，著實令我感到匪夷所思！因此令我不斷探索中外各類有關「瀕死經歷」的資料！直至某次跟一位朋友提及這次瀕死現象時……有關體內各能量元素漸次解體的現象！對方竟提議我應拜讀……古時印度一位智者「蓮花生大士」所著的《西藏度亡經》。及至細閱書中內容所提及有關死亡初現時，體內各種能量元素……地水火風空及光明現象出現，不禁令我有種欣喜頓悟的覺受！然而《度亡經》中後半部描述中陰末被各種恐怖幻景追逐的內容時，卻又令我憶起小時候某晚，無意間看見三妹入胎前所經歷的被追趕幻象（此故事收錄在第一章〈穿紅棉襖的小女孩〉）。


    但無可否認，經中某些內容是因應著古時的人文生活現象來解讀，因些在某些情節上採用大量的宗教神祲為觀想對象內容；個人認為這只是作為意識投放的專注手段，全是以念止念的一套權宜方法。


    ## 第二章：通靈現象


    另：自這次大難不死經歷後，不知不覺間像是開啟了一道通往異界探索的大門，常有預知或飛行夢的現象發生……夢中穿梭於不同時空，但醒後卻又能跟現實世界相互印證及呼應！可是當年我對此確實認知有限！直至後來才了知到……這是靈界導師所賦予的歷煉課題（詳細內容收錄在第三章〈靈魂出竅〉內）。


    ## 靜坐班的發現


    這是早年參與靜坐班時的某段見聞（大約九十年代中），這時期我跟隨同行的朋輩轉至另一道場參學。那是每月兩次的靈修項目，由於有來自初基及經驗的同修，因此每次靜坐總會形成各自盤踞在不同位置的有趣場面。


    對於我這個新學員來說，很快便察覺到當中存在著某種氛圍，蘊藏著不少山頭主義在其中。差不多同一時間班上亦來了一對年輕夫婦，但論熱衷參與程度反而是妻子佔先；這位同修太太後來更刻意調職轉為下午工作，務求能參與每天的早課及靜坐。


    恰巧那時我亦趁轉職新工前的短期休假，也曾參與過這些早課及靜坐項目，因此慢慢地跟某些同修及堂主夫婦漸趨熟稔。及至某天早上如常參與靜坐後，無意間看見這位同修太太身上閃現出多團奇怪的暗紅光波……如眾多不規律的血球細胞亂竄景象！坦白說很多時驚見這些出奇不已的景象時……即這種意識心靈上的奇幻畫面！大多感到茫然困惑並自愧病理常識不足！但亦深深察覺到這定是某些跟健康有關的病變訊息。但由於我跟這位同修太太不太熟稔，因此那刻我只是在心中暗自臆測！直至往後多日，發現這女士因連日微微發燒及關節疼痛病倒缺席，但她只打算配些草藥方劑來作根治方法時。我終按捺不住鼓起勇氣，冒昧向堂主說出當日所見之異象內容。只因不想重蹈當年某次目睹二舅父身上閃現出病難提示，卻未能及早治療而導至意外病殁於香港的憾事！


    由於當日所見之異象感覺跟血液、細胞有關，因此我提議應到醫院抽血檢驗來了解！於是堂主將我所提議的內容轉向這位同修太太提出，當時她還誤以為這是堂主的「天眼」神通發現，因而隨即聽從指示前往醫院求診！其診治結果證實患上「紅斑狼瘡症」……這是很多年青女士都可能患上的疾病。


    及後我亦因工作關係只能間中參與早課項目，因此後來只跟這位同修太太偶然遇上一兩次；可是我不但發覺她的健康沒改善之餘，更有轉趨嚴重之趨勢！往後從其他同修傳來消息……她已轉至醫院的深切治療病房進入生命倒數的時刻！此時女士的丈夫更向堂主表示……處於意識昏亂的太太常會出現迷糊夢囈……甚麼前世冤今世還……因此請求堂主前往探望了解！可是堂主卻以事忙為由只委託其他同修代為前往！


    由於自覺跟這位同修太太有數面之緣，因此我亦主動要求前往探望，並藉此慰問其家人。及至分批進入 ICU 病房時，看見躺在病床上的同修太太早已被病魔弄至面容靡萎；身上更接駁著不同維生儀器，那半合垂死的空洞眼神、彷彿早被掏空的迷亂意識，斷續地訴說著一個匪夷所思的前世怨今生還的靈異故事！


    以下內容是這位女士的丈夫在其床榻旁，每天點滴收錄下來的資料……故事由一個陌生的名字從意識昏亂的妻子口中說出，丈夫及其家人最初對此不太為意。及至訴說內容漸趨明確時，家人才不得不對此多加留意和正視！


    話說這「陌生名字」是同修太太前生的姓名，當年是某府第大宅的其中一位丫環；及後因私自偷取主人某傳家寶物被告發後，隨即被鎖在柴房中留待明早報官送辦！可是當晚這名犯人竟潛逃在外，並暗中於大宅水井中落毒，致令當中枉死毒害者眾，因而聚結不少怨魂等待時機齊來索命！至於這落毒元凶往後亦因惡運纏身，終日潛心禮佛求望解劫災厄！但由於罪孽深重死傷者眾，陰司路上一眾怨靈以為待其壽元享盡應可聚首緝拿時，卻又被她成功脫在外，跳進輪迴人間的塵世內。而這批枉死怨靈等待至此，亦有不少選擇轉世安排……話說在陰間給菩薩點化，願意放下宿怨從新上路！可是還有一眾怨靈繼續纏結在這元凶身旁……即現世中這位同修太太，等待時機伺機報仇！


    而這名寄纏在「同修太太」身上的怨靈，原來亦是當年府中某被毒害枉死的丫環之一，死前正值有孕在身，因而怨念甚大。怨靈更表示為報宿怨，不惜蟄伏其窗外多時；抵受無數淒風怒雨，並躲藏於綠葉底下，最後才可如願報仇……附身其中！


    由於一眾怨靈誓言索命，因此「同修太太」的病情已處於藥石無靈的邊緣！後來她的父親只有尋求鄉間靈媒幫忙，請來「同修太太」的亡母在陰間代向一眾怨靈求情！及後怨靈開出若干條件……要求於一定日子內為他們廣立功德才有望轉出生機！於是一眾親友於這段日子內以「無名氏」名義廣結善緣、布施孤寡、齋僧放生、廣修一切水陸佛懺……及後情況才轉趨穩定！


    當中最感到不可思議的是……由於眾怨靈及後要求若干數目的附薦包……附薦數目及內容均由處於意識紛亂的「同修太太」口中斷續透露。但其中辦理某項要求時……金銀橋及冥錢數目卻有所失誤，只因家屬辦理時忙中有錯，竟從「同修太太」口中說出當中某些失誤的投訴，奇怪是……當時病人還一直躺在
    ICU 病房中！


    後記：在一眾怨靈所要求的事項辦妥後，同修太太的病情竟然出現奇妙轉機；當日早被醫生宣告藥石無靈的病難，竟可在兩三日之間轉趨穩定，及後並能康復出院！


    而事後回憶當中情節，同修太太表示對此了無印象。她的丈夫嘗試將那些錄音內容給予了解時，她只表現出不願相信的態度！


    而當中最令我們不解的是……那名寄纏在身上的怨靈曾提及甚麼「不惜蟄伏窗外多時，抵受無數淒風怒雨並躲藏於綠葉底下」的內容時……她才憶起某天如常打理家中窗邊的小盆栽，並為心愛的植物除蟲施肥時，其指尖的一個小傷口可能滲入農藥化學液，因而引發此症！（註：化學物感染亦是患上「紅斑狼瘡症」的其中因素。）


    事後我們再三推論……如這感染途徑屬實，怨靈隱遁在花間葉底一段時日，藉著小傷口寄附身上……豈不是那些存在於微量世界中的病毒惡菌，亦即是靈鬼怨靈所寄伏的異度空間？


    ## 好友父親的異象


    這經歷是發生在一位認識多年的好友父親身上（同樣發生在九十年代中）。自這位好友的母親於某年前癌症過身後，朋友便增聘女傭照顧家中年長的父親；可是大半年過去後，發覺父親慢慢變得憂鬱寡歡經常嗟嘆；因而提議我們假日到其家中舉行飯聚，期望可藉此為父親添些歡樂！


    某個周末下午，我們一行人到達其位於牛池灣彩雲村的家中時，發覺世伯還在床上午睡；及至我們弄好所有食物並要求一同品嚐時，世伯卻以其他理由推搪，及後在我們再三盛情要求下，老人家只淺嚐幾口後又逕自返回房間。這時我們友儕間亦感到相當掃興和擔心！


    好友亦向我們暗自議論著父親當中的轉變……此刻我亦不知不覺間記憶對上那次看見世伯時的景況，正是之前一年伯母大殮時在靈堂致祭及誦經的時候……還記當晚我們友儕間向喪家告辭時，世伯領著家人向我們送行致謝時的情景！那刻我的心靈間竟然感應到一股不祥預感，明確感知到這刻的未亡人，將是下一年的後繼者！當下只感到百般震懾，並在內心不斷暗罵著這不祥念頭，更試圖將此不安思緒瞬間抹掉！可是此回再遇見這位老人家時，當時的忐忑又再徘徊浮現！


    另外，當日在好友家中亦察覺到另一奇怪現象，就是於午後時段其家中的牆垣間，竟然出現某些晃動急竄的黑影！由於那些黑影總是在各人忙著時才閃現，因此初時我對此並不為意；直至夜幕徐至，這些影象竟然加深聚會出各種動物形態後，在我的心靈間卻增多了一重意會！對於當前所感應到的內容，我著實沒有勇氣向好友說出，因為不想增添其心理壓力！


    及至後來我們亦各自散席歸家，可是內心卻有把聲音鼓動著我應該坦然說出當中感知！由於只是某些零碎感應，我著實不懂得消化當中內容，最後我猶豫了一會後亦告辭離開！可是在回家的車程上，內心那把聲音又再不斷地驅策著我應馬上返回好友家中……趁機再審視「好友父親的異象」！於是我在內心多番掙扎下，轉乘車輛再折返好友家中。友人當然對此感到疑問，並詢問我是否忘了甚麼物品未取？我只有順應著支吾以對，並表示有些說話想私下與之細說！


    就在此時，其家中女傭面有難色向主人表示老人家又不肯吃藥（註：屬一般的血壓和糖尿藥）！後來好友提議嘗試由我拿藥給其父親，認為老人家應該不好意思推卻。奇怪地……當我輕握著世伯的手腕為其遞上藥物的時候，竟然剎那間感現到一幅內容複雜的景象……首先傳來一陣強列的腐臭氣味，令我即時憶起這是外婆臨終前出現在她身上的氣味！接著我竟如
    X 光學儀般，透視到世伯體內，閃現出眾多細小而亂竄的毛茸黑點，由於這些奇異畫面來得迅速並帶著如電流般的光影，再加上我發現這些毛茸狀的小黑點已滲進體內肝肺與腦間！因此剎那間我對當前的發現只感到惶恐和困惑，令我一時間不知怎樣解釋當中意會！


    此刻好友亦察覺到我的異樣，並詢問我再次折返所提及的要事為啥？於是我領著好友退回客廳，輕聲表示應盡快帶世伯到醫院檢查！好友對我所提出的內容感到相當意外，並急問我究竟是何種意會？於是我只好再鼓起勇氣將剛才所見一一說出，怎料竟換來對方的狠狠責罵，隨即下逐客令命我馬上離開！那刻我只感到無比難堪和內疚，內心不斷暗斥著我這種自招煩惱的愚笨行為，並為多年友誼就此失去感到後悔不已！當晚我徹夜難眠只能以哭泣來為自己解鬱！


    至第二天內心還為昨晚的失言感到難過，內心不停嘀咕著應怎向好友致歉慰問！可是當回憶那厲言的逐客內容時，我又缺乏勇氣致電求諒！如是者整天被這陰霾忐忑的心情左右著，不斷暗罵那些誤人的不祥感應！直至快將下班的時段，好友竟然主動致電賠罪，我當然感到無比汗顏並為昨天的失言道歉！


    好友表示昨晚亦徹夜難眠，腦海中不停閃出我所提及的病變內容；及至天亮後馬上致電親姐，並要求代送父親到醫院作身體檢查，因親姐一家認識某醫院專科教授。親姐當然奇怪這是何種內容竟要如此趕急？於是好友將父親近來的性格轉變與之提及，並應我的告誡定要安排父親檢驗肝臟和腦部，如是者好友亦帶著忐忑的心情等候檢驗結果。直至午後四五時終於收到親姐的來電匯報……專科教授首先安排老人家驗血和照肺片已發現到患癌跡象，及至再檢查其他臟腑器官，已初步診斷出這是步向癌症末期的階段，癌細胞已由肺轉移至肝腦，並要求患者盡快辦理入院手續，再作進一步的臨床治療！


    聽罷所有內容後，我亦為好友感到無比難過！好友更表示實在接受不到兩年間雙親離世的打擊！當下我亦不懂得怎樣開解其心間愁緒，只懂不停寬慰著會為世伯誦經祈禱。及後因世伯病情急轉惡化，頭顱間更長出多顆腫瘤；臨終前已失去視力和言語，因此後期家屬只想給老人家安寧靜養，謝絕一切探訪。


    後記：由於我曾向好友提及其家中牆垣間，寄存著某些晃動的動物形態黑影，再加上害怕面對雙親離世後睹物思人的傷痛；因此不久後便搬離這居住了廿多年的房子，好讓身心靈可重新奮發！


    往後某次聚舊，好友主動提及其舊居的晃動黑影。這是從舊居鄰里嬸嬸那兒打聽到的內容……原來早年好友雙親經常到舊居後山一帶晨運，但每當看見山邊荒野棄置很多舊神像時，總會奉上清香及拜拜。而這方一帶亦常吸引到某些神功弟子前到來練法請僮，而當中最常請來的竟是《西遊記》中的一眾主角，如……齊天大聖、豬八戒、玉兔或狐仙等。漸漸地每朝總結集著前來試刀演練、請符及好奇的信眾！因此好友懷疑我所提及舊居的動物黑影，猜測應該跟此內容有關！


    由於當年我對這方一帶的地域歷史所知有限，直至近年互聯網上資訊齊備，因此令我刻意尋找當中答案……（摘自維基百科）：


    | 項目 | 內容 |

    | :--- | :--- |

    | **名稱** | 七號墳場，原稱新九龍七號墳場 |

    | **現狀** | 香港一個已消失的墳場 |

    | **位置** | 位於「九龍牛奶房」（即九龍維記牛奶有限公司，今日之彩雲村所在地）對上一千呎之山地。東面接近晏打臣道（今日之安達臣道），南面近大同罐頭公司工場（即今日之茶寮坳），西邊近九龍直通西貢市之陸軍公路，北面靠近往西貢之公路（即今日清水灣道）。整體位置大概是今日順利村之所在地。
    |

    | **歷史** | 在 1930 年代的九龍地圖上已有記載此地方。在 1960 年代，該處變成了一個徙置區，搭建了不少木屋，直至 1970 年代政府興建順利村，七號墳場隨之成為歷史名詞。
    |


    ## 穿禮服的黑衣人


    由於我們姊妹間先後遷出自住，因此後來跟母親一起生活的就只餘大姊和晚歸的父親，所以差不多每星期的飯聚只有我、母親和妹妹幾人。某星期如常回家晚飯後準備離開，正想推開大門鐵閘步出時，卻看見前方對戶站著一位面向著我家方向的陌生男士。最特別是這人頭戴西式黑禮帽及一身筆直的黑色燕尾禮服，其間更主動除下禮帽向我點頭微笑！當下一刻我萬沒想到一個尋常住家，門前竟會出現一位翩翩紳士；腦海中的第一個反應竟意會為……「可能這是前來拜候對戶鄰居的訪客，只因無人應門因而打算轉向我家打聽消息？」那刻心中不禁猶豫了一會……是否繼續如常步出？但最後我還是繼續動作把大門鐵閘從右至左向前推開。就在視線因鐵閘推開時被遮擋的剎那間，眼前這陌生男士竟瞬間消失無痕！那刻心中不禁疑惑著……莫非這只是一個亮麗迫真的幻覺？但何以這幻覺卻能鮮明地展現得這麼實在連貫？這刻不禁令我從心底反覆自問……究竟這幻覺有何啟示？突然從心靈間傳來意念感應……對方自我介紹是我家某人之守護靈，但礙於此人一直過於專注現世層面，所以從來'
  mdcn: '## 瀕死經歷


    這是一個突如其來的經歷，但亦令我深切體會到原來死亡可發生在一呼一吸的「無常」咫尺間！


    這是發生在早年一個尋常的炎夏中午，當天與幾位朋友結伴到新界參加一個屬於私人籌建道場的宗教活動。由於事前交通趕急再加上天氣酷熱關係，因此到步後我早已感到空氣非常悶熱和侷促；可是由於場地空間所限，再加上參與人數眾多，因此我們隨即被安排擠坐在人群中等候。那時我已感到胸口翳悶，及至活動開始時又要隨信眾一起頂禮，在三叩三拜的頂禮儀式後只感到情況更為嚴重，慢慢地更感到兩手間的指尖麻痺感漸趨加劇，那時我還強作鎮定；心諳這只時短暫的不適，過些時間應可調節過來！


    可是實際情況並非如此樂觀，慢慢地只感到四肢沉重，聽覺散失兼且視覺模糊。由於會場上各人都聚焦在主講內容上，因此我的不適反應連坐在身旁的友人亦未察覺，另一原因是我不想打擾大家帶來不便！


    突然間只感到身上所有水分像被瞬間抽掉，眼前景象竟如電視屏幕般剎那間被關掉似的驟失；接著一股來自四面八方的巨大壓力，從四肢腳底及掌心位置同一時間往身體內部擠壓，只感到整體的「心靈意識」像被一併收攝擠壓進身體中央的「心輪」間的位置內，並迅速匯壓濃縮為一點「意識能量」！這種「內在感觀」漸次解體的暴烈情況，有如巨浪般一浪接一浪的強烈湧至……當下只感到這點「意識能量」有如一顆漲滿的汽球，被外力強行壓進水底一樣，然後汽球因被壓至最低點後出現猛烈回彈出水面的強大衝力的感覺……剎那間只感到這點「意識能量」有如子彈般從頭頂上方猛烈地飛彈出來，頃刻間落入一個寧靜廣闊的陌生空間中！


    接著換來一切靜止，時間也彷彿停頓……只感到十多秒後這漆黑虛無的空間中現出一點閃光，閃光瞬間呈「米」字般擴散為一片廣闊無垠的明亮空間。那刻只想確定身處何方，於是第一時間打算檢視自身及雙手時，竟發現是空無一物……只餘「我」這點意識運作而已！奇怪地此刻的「我」對當前一切並未感到害怕，相反竟有一種豁然開朗的清新感受，有種不再受困於肉身枷鎖的自由氣息……！


    「我」對當前景況只感到冥然寂靜，突然發覺從上而下竟飄來某些狀如初雪般的眾多小圓光球！這些籠罩著虹光的光球大小不一，初時「我」還不以為意地看著它徐徐掠過；但後來才發覺原來每顆小光球中，都映現著此生過去不同時期的影象片段在其中！初時「我」還像路旁群眾般用淡然角度來觀看，但及至看到其中一顆光球中竟出現一個令「我」感到熟悉的身影時……當前在會場中昏坐一角的肉身！此刻「我」才恍然生出與之聯繫的感覺來，剎那間意識只感到一片驚愕迷亂，並對此不斷疑問著……「莫非我已經歷死亡現象嗎？」並喃喃自忖……「死亡……我已經死亡了嗎……？」無奈面對「死亡」驟然降臨身上的震駭！「我」只懂喃喃抱怨著……「死亡……怎可能在頃刻間無聲的發生在我的身上？我怎能這樣年輕就離開塵世步向死亡呢？」


    那刻「我」只感到彷徨困頓，突然意識間傳來一個明確清亮的意念指引……


    > 「從過去到現在，這眼前光景對你來說不應感到陌生！這當前一切現象，你其實亦曾經歷過無數遍！因此這刻你應收攝心神，並將萬緣放下，準備投向這個光明匯聚的空間內……！」


    當下我卻感到千般不願，對自己在世間白走一圈深感愧疚，並立時想起兒時那回夢中計算「黑白罈子」的啟示！又念想到剛出生時在心靈間向母親所許下……對其照料一生的諾言未能實踐感到悲傷！當顧念到還有很多人世責任未圓滿時，著實有必要重回世間好好學習！於是「我」在意念間生出極大祈請及哀求，請求宇宙間的「巨大意識」給予幫忙，請求「偉大神靈」給予指引！奇怪地突然感到一股巨大能量意識靠近，並傳來一把明澈清亮的男聲……傳來一段帶著震絃聲韻的宇宙元音！


    此刻只感到這點「意識能量」被這深邃的音頻籠罩著，隨即被一股巨大的力量把「我」瞬間吸扯進軀殼內……這是一股恍似帶著強勁磁力的電流吸力！只感到剛投回肉身時這「意識能量」還如氫氣球般飄蕩無力，並有隨時又會再飄出肉身外的失重無力感！但當隨著音頻傳來最後一顆元音後，只覺肩膊間生出兩股如抓勒般的力量將其套鎖著，並把這顆還處於輕浮的「意識能量」融匯進心輪內再散向四肢還原。突然間頭頂更傳來奇怪的「卜」一聲……恍似開香檳酒般木塞彈出的聲音！並在頭頂間灑下如雨般湧下的水滴，頃刻間只感到早前體內所有乾涸抽掉的水分，剎那間又再頃刻補充回來！


    重回肉身的一霎，我當然萬分雀躍和感恩！只懂不斷地跟同行友人訴說著剛才所驚遇到的神奇異象！這刻友人才察覺到我何以一面濕透的說著異世內容，並為不曾察覺到我的不適感到抱歉！那刻我只感到一種身心輕盈的欣喜情緒一直籠罩著，並為自己能夠重返塵世；再繼續人世學習，倍感珍惜和欣慰！


    後記：由於這次所經歷的奇幻見聞，著實令我感到匪夷所思！因此令我不斷探索中外各類有關「瀕死經歷」的資料！直至某次跟一位朋友提及這次瀕死現象時……有關體內各能量元素漸次解體的現象！對方竟提議我應拜讀……古時印度一位智者「蓮花生大士」所著的《西藏度亡經》。及至細閱書中內容所提及有關死亡初現時，體內各種能量元素……地水火風空及光明現象出現，不禁令我有種欣喜頓悟的覺受！然而《度亡經》中後半部描述中陰末被各種恐怖幻景追逐的內容時，卻又令我憶起小時候某晚，無意間看見三妹入胎前所經歷的被追趕幻象（此故事收錄在第一章〈穿紅棉襖的小女孩〉）。


    但無可否認，經中某些內容是因應著古時的人文生活現象來解讀，因些在某些情節上採用大量的宗教神祲為觀想對象內容；個人認為這只是作為意識投放的專注手段，全是以念止念的一套權宜方法。


    ## 第二章：通靈現象


    另：自這次大難不死經歷後，不知不覺間像是開啟了一道通往異界探索的大門，常有預知或飛行夢的現象發生……夢中穿梭於不同時空，但醒後卻又能跟現實世界相互印證及呼應！可是當年我對此確實認知有限！直至後來才了知到……這是靈界導師所賦予的歷煉課題（詳細內容收錄在第三章〈靈魂出竅〉內）。


    ## 靜坐班的發現


    這是早年參與靜坐班時的某段見聞（大約九十年代中），這時期我跟隨同行的朋輩轉至另一道場參學。那是每月兩次的靈修項目，由於有來自初基及經驗的同修，因此每次靜坐總會形成各自盤踞在不同位置的有趣場面。


    對於我這個新學員來說，很快便察覺到當中存在著某種氛圍，蘊藏著不少山頭主義在其中。差不多同一時間班上亦來了一對年輕夫婦，但論熱衷參與程度反而是妻子佔先；這位同修太太後來更刻意調職轉為下午工作，務求能參與每天的早課及靜坐。


    恰巧那時我亦趁轉職新工前的短期休假，也曾參與過這些早課及靜坐項目，因此慢慢地跟某些同修及堂主夫婦漸趨熟稔。及至某天早上如常參與靜坐後，無意間看見這位同修太太身上閃現出多團奇怪的暗紅光波……如眾多不規律的血球細胞亂竄景象！坦白說很多時驚見這些出奇不已的景象時……即這種意識心靈上的奇幻畫面！大多感到茫然困惑並自愧病理常識不足！但亦深深察覺到這定是某些跟健康有關的病變訊息。但由於我跟這位同修太太不太熟稔，因此那刻我只是在心中暗自臆測！直至往後多日，發現這女士因連日微微發燒及關節疼痛病倒缺席，但她只打算配些草藥方劑來作根治方法時。我終按捺不住鼓起勇氣，冒昧向堂主說出當日所見之異象內容。只因不想重蹈當年某次目睹二舅父身上閃現出病難提示，卻未能及早治療而導至意外病殁於香港的憾事！


    由於當日所見之異象感覺跟血液、細胞有關，因此我提議應到醫院抽血檢驗來了解！於是堂主將我所提議的內容轉向這位同修太太提出，當時她還誤以為這是堂主的「天眼」神通發現，因而隨即聽從指示前往醫院求診！其診治結果證實患上「紅斑狼瘡症」……這是很多年青女士都可能患上的疾病。


    及後我亦因工作關係只能間中參與早課項目，因此後來只跟這位同修太太偶然遇上一兩次；可是我不但發覺她的健康沒改善之餘，更有轉趨嚴重之趨勢！往後從其他同修傳來消息……她已轉至醫院的深切治療病房進入生命倒數的時刻！此時女士的丈夫更向堂主表示……處於意識昏亂的太太常會出現迷糊夢囈……甚麼前世冤今世還……因此請求堂主前往探望了解！可是堂主卻以事忙為由只委託其他同修代為前往！


    由於自覺跟這位同修太太有數面之緣，因此我亦主動要求前往探望，並藉此慰問其家人。及至分批進入 ICU 病房時，看見躺在病床上的同修太太早已被病魔弄至面容靡萎；身上更接駁著不同維生儀器，那半合垂死的空洞眼神、彷彿早被掏空的迷亂意識，斷續地訴說著一個匪夷所思的前世怨今生還的靈異故事！


    以下內容是這位女士的丈夫在其床榻旁，每天點滴收錄下來的資料……故事由一個陌生的名字從意識昏亂的妻子口中說出，丈夫及其家人最初對此不太為意。及至訴說內容漸趨明確時，家人才不得不對此多加留意和正視！


    話說這「陌生名字」是同修太太前生的姓名，當年是某府第大宅的其中一位丫環；及後因私自偷取主人某傳家寶物被告發後，隨即被鎖在柴房中留待明早報官送辦！可是當晚這名犯人竟潛逃在外，並暗中於大宅水井中落毒，致令當中枉死毒害者眾，因而聚結不少怨魂等待時機齊來索命！至於這落毒元凶往後亦因惡運纏身，終日潛心禮佛求望解劫災厄！但由於罪孽深重死傷者眾，陰司路上一眾怨靈以為待其壽元享盡應可聚首緝拿時，卻又被她成功脫在外，跳進輪迴人間的塵世內。而這批枉死怨靈等待至此，亦有不少選擇轉世安排……話說在陰間給菩薩點化，願意放下宿怨從新上路！可是還有一眾怨靈繼續纏結在這元凶身旁……即現世中這位同修太太，等待時機伺機報仇！


    而這名寄纏在「同修太太」身上的怨靈，原來亦是當年府中某被毒害枉死的丫環之一，死前正值有孕在身，因而怨念甚大。怨靈更表示為報宿怨，不惜蟄伏其窗外多時；抵受無數淒風怒雨，並躲藏於綠葉底下，最後才可如願報仇……附身其中！


    由於一眾怨靈誓言索命，因此「同修太太」的病情已處於藥石無靈的邊緣！後來她的父親只有尋求鄉間靈媒幫忙，請來「同修太太」的亡母在陰間代向一眾怨靈求情！及後怨靈開出若干條件……要求於一定日子內為他們廣立功德才有望轉出生機！於是一眾親友於這段日子內以「無名氏」名義廣結善緣、布施孤寡、齋僧放生、廣修一切水陸佛懺……及後情況才轉趨穩定！


    當中最感到不可思議的是……由於眾怨靈及後要求若干數目的附薦包……附薦數目及內容均由處於意識紛亂的「同修太太」口中斷續透露。但其中辦理某項要求時……金銀橋及冥錢數目卻有所失誤，只因家屬辦理時忙中有錯，竟從「同修太太」口中說出當中某些失誤的投訴，奇怪是……當時病人還一直躺在
    ICU 病房中！


    後記：在一眾怨靈所要求的事項辦妥後，同修太太的病情竟然出現奇妙轉機；當日早被醫生宣告藥石無靈的病難，竟可在兩三日之間轉趨穩定，及後並能康復出院！


    而事後回憶當中情節，同修太太表示對此了無印象。她的丈夫嘗試將那些錄音內容給予了解時，她只表現出不願相信的態度！


    而當中最令我們不解的是……那名寄纏在身上的怨靈曾提及甚麼「不惜蟄伏窗外多時，抵受無數淒風怒雨並躲藏於綠葉底下」的內容時……她才憶起某天如常打理家中窗邊的小盆栽，並為心愛的植物除蟲施肥時，其指尖的一個小傷口可能滲入農藥化學液，因而引發此症！（註：化學物感染亦是患上「紅斑狼瘡症」的其中因素。）


    事後我們再三推論……如這感染途徑屬實，怨靈隱遁在花間葉底一段時日，藉著小傷口寄附身上……豈不是那些存在於微量世界中的病毒惡菌，亦即是靈鬼怨靈所寄伏的異度空間？


    ## 好友父親的異象


    這經歷是發生在一位認識多年的好友父親身上（同樣發生在九十年代中）。自這位好友的母親於某年前癌症過身後，朋友便增聘女傭照顧家中年長的父親；可是大半年過去後，發覺父親慢慢變得憂鬱寡歡經常嗟嘆；因而提議我們假日到其家中舉行飯聚，期望可藉此為父親添些歡樂！


    某個周末下午，我們一行人到達其位於牛池灣彩雲村的家中時，發覺世伯還在床上午睡；及至我們弄好所有食物並要求一同品嚐時，世伯卻以其他理由推搪，及後在我們再三盛情要求下，老人家只淺嚐幾口後又逕自返回房間。這時我們友儕間亦感到相當掃興和擔心！


    好友亦向我們暗自議論著父親當中的轉變……此刻我亦不知不覺間記憶對上那次看見世伯時的景況，正是之前一年伯母大殮時在靈堂致祭及誦經的時候……還記當晚我們友儕間向喪家告辭時，世伯領著家人向我們送行致謝時的情景！那刻我的心靈間竟然感應到一股不祥預感，明確感知到這刻的未亡人，將是下一年的後繼者！當下只感到百般震懾，並在內心不斷暗罵著這不祥念頭，更試圖將此不安思緒瞬間抹掉！可是此回再遇見這位老人家時，當時的忐忑又再徘徊浮現！


    另外，當日在好友家中亦察覺到另一奇怪現象，就是於午後時段其家中的牆垣間，竟然出現某些晃動急竄的黑影！由於那些黑影總是在各人忙著時才閃現，因此初時我對此並不為意；直至夜幕徐至，這些影象竟然加深聚會出各種動物形態後，在我的心靈間卻增多了一重意會！對於當前所感應到的內容，我著實沒有勇氣向好友說出，因為不想增添其心理壓力！


    及至後來我們亦各自散席歸家，可是內心卻有把聲音鼓動著我應該坦然說出當中感知！由於只是某些零碎感應，我著實不懂得消化當中內容，最後我猶豫了一會後亦告辭離開！可是在回家的車程上，內心那把聲音又再不斷地驅策著我應馬上返回好友家中……趁機再審視「好友父親的異象」！於是我在內心多番掙扎下，轉乘車輛再折返好友家中。友人當然對此感到疑問，並詢問我是否忘了甚麼物品未取？我只有順應著支吾以對，並表示有些說話想私下與之細說！


    就在此時，其家中女傭面有難色向主人表示老人家又不肯吃藥（註：屬一般的血壓和糖尿藥）！後來好友提議嘗試由我拿藥給其父親，認為老人家應該不好意思推卻。奇怪地……當我輕握著世伯的手腕為其遞上藥物的時候，竟然剎那間感現到一幅內容複雜的景象……首先傳來一陣強列的腐臭氣味，令我即時憶起這是外婆臨終前出現在她身上的氣味！接著我竟如
    X 光學儀般，透視到世伯體內，閃現出眾多細小而亂竄的毛茸黑點，由於這些奇異畫面來得迅速並帶著如電流般的光影，再加上我發現這些毛茸狀的小黑點已滲進體內肝肺與腦間！因此剎那間我對當前的發現只感到惶恐和困惑，令我一時間不知怎樣解釋當中意會！


    此刻好友亦察覺到我的異樣，並詢問我再次折返所提及的要事為啥？於是我領著好友退回客廳，輕聲表示應盡快帶世伯到醫院檢查！好友對我所提出的內容感到相當意外，並急問我究竟是何種意會？於是我只好再鼓起勇氣將剛才所見一一說出，怎料竟換來對方的狠狠責罵，隨即下逐客令命我馬上離開！那刻我只感到無比難堪和內疚，內心不斷暗斥著我這種自招煩惱的愚笨行為，並為多年友誼就此失去感到後悔不已！當晚我徹夜難眠只能以哭泣來為自己解鬱！


    至第二天內心還為昨晚的失言感到難過，內心不停嘀咕著應怎向好友致歉慰問！可是當回憶那厲言的逐客內容時，我又缺乏勇氣致電求諒！如是者整天被這陰霾忐忑的心情左右著，不斷暗罵那些誤人的不祥感應！直至快將下班的時段，好友竟然主動致電賠罪，我當然感到無比汗顏並為昨天的失言道歉！


    好友表示昨晚亦徹夜難眠，腦海中不停閃出我所提及的病變內容；及至天亮後馬上致電親姐，並要求代送父親到醫院作身體檢查，因親姐一家認識某醫院專科教授。親姐當然奇怪這是何種內容竟要如此趕急？於是好友將父親近來的性格轉變與之提及，並應我的告誡定要安排父親檢驗肝臟和腦部，如是者好友亦帶著忐忑的心情等候檢驗結果。直至午後四五時終於收到親姐的來電匯報……專科教授首先安排老人家驗血和照肺片已發現到患癌跡象，及至再檢查其他臟腑器官，已初步診斷出這是步向癌症末期的階段，癌細胞已由肺轉移至肝腦，並要求患者盡快辦理入院手續，再作進一步的臨床治療！


    聽罷所有內容後，我亦為好友感到無比難過！好友更表示實在接受不到兩年間雙親離世的打擊！當下我亦不懂得怎樣開解其心間愁緒，只懂不停寬慰著會為世伯誦經祈禱。及後因世伯病情急轉惡化，頭顱間更長出多顆腫瘤；臨終前已失去視力和言語，因此後期家屬只想給老人家安寧靜養，謝絕一切探訪。


    後記：由於我曾向好友提及其家中牆垣間，寄存著某些晃動的動物形態黑影，再加上害怕面對雙親離世後睹物思人的傷痛；因此不久後便搬離這居住了廿多年的房子，好讓身心靈可重新奮發！


    往後某次聚舊，好友主動提及其舊居的晃動黑影。這是從舊居鄰里嬸嬸那兒打聽到的內容……原來早年好友雙親經常到舊居後山一帶晨運，但每當看見山邊荒野棄置很多舊神像時，總會奉上清香及拜拜。而這方一帶亦常吸引到某些神功弟子前到來練法請僮，而當中最常請來的竟是《西遊記》中的一眾主角，如……齊天大聖、豬八戒、玉兔或狐仙等。漸漸地每朝總結集著前來試刀演練、請符及好奇的信眾！因此好友懷疑我所提及舊居的動物黑影，猜測應該跟此內容有關！


    由於當年我對這方一帶的地域歷史所知有限，直至近年互聯網上資訊齊備，因此令我刻意尋找當中答案……（摘自維基百科）：


    | 項目 | 內容 |

    | :--- | :--- |

    | **名稱** | 七號墳場，原稱新九龍七號墳場 |

    | **現狀** | 香港一個已消失的墳場 |

    | **位置** | 位於「九龍牛奶房」（即九龍維記牛奶有限公司，今日之彩雲村所在地）對上一千呎之山地。東面接近晏打臣道（今日之安達臣道），南面近大同罐頭公司工場（即今日之茶寮坳），西邊近九龍直通西貢市之陸軍公路，北面靠近往西貢之公路（即今日清水灣道）。整體位置大概是今日順利村之所在地。
    |

    | **歷史** | 在 1930 年代的九龍地圖上已有記載此地方。在 1960 年代，該處變成了一個徙置區，搭建了不少木屋，直至 1970 年代政府興建順利村，七號墳場隨之成為歷史名詞。
