    時間打聽鄉間的真實情況，是否如夢中所見跟某些內容接近？直至當晚六時多，母親從鄉間打來長途來電，表示明早將與大姊啟程回港。我當然急不及待詢問鄉間的舉殯情況？原來這天早上剛巧是外婆出殯落葬的日子，我滿心歡喜告知母親今早夢見外婆的內容，可是我隨即被母親喝止並表示不要胡謅！只表示待她們回港後才跟我了解，可是當晚我還是因此夢境被父親責罵……對父親來說這全是荒誕不經的痴人夢話內容，並視此為不祥的現象！


