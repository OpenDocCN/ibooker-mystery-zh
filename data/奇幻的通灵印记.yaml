    # 德福花園地盤升降機墜下事故（摘自維基百科）


    1979年7月22日，德福花園C座發生嚴重工業意外，六名工人於C座地盤乘吊機前往高層工作，當上升至八樓時突然下墜，工人全部死亡，事後調查報告指出當吊機上升時，吊機的吊板與搭碼互碰，釀成悲劇。


    # 德福花園五屍命案（摘自維基百科）


    德福花園五屍命案是一宗轟動香港的謀殺案，發生於1998年7月21日，此案中五名女性因喝下兇手混合礦泉水及山埃的符水而死於C座五樓一單位內。兇手被中國內地的法院判處死刑。


    # 案件背景：


    兇手李育輝來自汕頭，自稱「風水大師」。他的妹妹在位於九龍西九龍城侯王道的住所設壇。該壇吸引大批已婚婦人祈福，為家人驅除魔鬼、趕走二奶、添福添壽，家宅平安。婦人林春麗與兩名朋友蔡秀珍、徐順琴前往找李育輝相命，並到徐順琴位於九龍東九龍灣德福花園的住所看風水。兇手得知三人家財豐厚，設下謀財害命的企圖。'
  - '[PAGE 154]


    1998 年 7 月 22 日下午二時，一名 41 歲姚姓婦女，在德福花園 T 座跳樓死亡，警方接獲通知，於是到現場調查，在調查初期，警方對此案件並不感到特別奇怪。但當發現女死者留下了三封遺書而內容又關連到幾天前一宗婦人失蹤案的資料時，警方便感到案件內情並不簡單，於是開始四出追查。


    7 月 23 日，CID 在德福花園 C 座五樓一個單位破門入屋調查時，揭發了近年香港罕見的一宗五名女子集體死亡事件。


    案件大略：


    1998 年 7 月 21 日，李育輝在徐順琴家設壇作法，事前調製好從鍍電廠友人處以清理魚池為由取得的劇毒氰化鈉的「符水」，並囑咐三人和徐順琴的兩個女兒在事發單位的不同房間中飲用。


    上述五人在喝下符水後不久相繼死去。兇手把他們求神用的願望寫在紙上置於廳中，布置成自殺假象；其後掠去 130 萬港元（作法前要求三人每人按自己年齡，每年一萬港元的款項作「貢品」）後與妻子連夜潛逃到汕頭。'
