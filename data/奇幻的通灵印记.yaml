    廁，對幼稚園班級的學生並不適合！再加上這不是當時牛下家中的那類蹲廁，因此我在折騰了一會後才勉強成事；就在打算沖水離開時，我才發覺抽水箱內並沒有沖廁水供應，故此只好硬著頭皮向老師表示抱歉！這當然招來更多不滿批評，最後老師著後排一位男學生到男廁取來一個膠盆給我盛水，就在我打開水龍頭盛水時，卻驚見這組高掛式的廁所水箱頂上方；那組通往後巷的氣窗上，突然出現一個身穿薄背心的嶙峋老頭對我不斷怒吼！只見老頭一手扼著氣窗鐵枝、一手伸前亂抓並氣急敗亂地叫嚷著：「水……水呀……拿水來……！」由於我對老頭所說的家鄉話並不明白，後來我更赫見這老頭竟激動咆哮至全身燃著一團橙紅烈焰！我冷不防被這伏在窗外的老頭嚇煞著，所以一下子驚惶得把盆中的水打翻，而弄致地上濕漉一片！這當然把早已火冒厭煩的老師氣得七竅生煙，此刻我自覺孤立無援的請求老師原諒，但內心狐疑何解在這課室內，吵嚷的兩位元凶卻不被老師責怪？至後來我更被這位老師投訴至班主任那方！自經此一役後我對重臨此課室廁所視為畏途，故此往後另一次我寧願硬著頭皮在課室椅子上解決……當然事後換來見家長和記過的命運！


