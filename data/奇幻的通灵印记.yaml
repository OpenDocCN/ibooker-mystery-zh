    # 序言


    活到這個年頭，此刻只想說故事，訴說一個平生的傳奇故事……在成長的歲月中實在有太多不足為外人道的奇遇和發現，這些獨特經歷著實為我的人生帶來豐饒的啟迪！


    自問並不是耀目聰慧的傢伙，亦無優裕令人稱羨的成長背景；但能有幸生存於世、能夠參與這趟人世學習的歷練，實在心存感恩！概括半生所經歷的種種喜樂悲憂，對此次人世學習的際遇和責任，有更深切的體會和感悟！只緣在投生前……在靈界（非物質的意識界）出現某突如其來的枝節，致令我並未按一貫程序刪掉這段……靈界層面中參與「轉世安排」的前期記憶！故在投生後在我的意識上；還殘存轉世前的靈界記憶，和某些超覺感應。並能看見某些，來自不同空間層面的，各類非物質界生靈。綜觀這些經歷，和各種奇遇與發現；令我更深切體會，這趟人世學習之旅的機遇，是何等珍貴和難得！


    在成長的歲月中，常面對現界與靈界的各種紛紜纏繞！回憶當初要獨自面對這麼深刻和層出不窮的異象時，那種無從表達和孤立無援的困窘感覺，果真令我吃盡不少苦頭和責備！只緣小時候……不曾了解到，原來不是每人都擁'
  - '[PAGE 8]


    有這種超覺感應，因而不解何以總會招來長輩的責備和不悅？常獨自面對那些突如其來的靈異現象，使我常感到百般迷惘與失落！慨嘆世間詞彙，並不足以表達……各類靈界空間的所見所聞！及後因父母長輩終於察覺到某些端倪後，無奈只會以別的話題來打發，或是乾脆選擇以打罵來了結！而我後來為免又再招來長輩生氣和壓力，亦只好以「幻覺」來作自我催眠和逃避的藉口！


    直至初中那年首次舉家回鄉，竟赫然驚見滿堂盡是舉杯歡慶的亡靈；當這一直以為只是童年「夢魘幻象」的畫面重臨時，頓時對成長中的心靈帶來深刻醒悟和反思！再一次敲醒靈魂深處的覺性，令我從新審視多年來發生在自身的種種不解的通靈現象，令我決意尋找潛藏在生命旅途中的各種迷思和答案！


    我是成長於七八十年代的香港土產，那時候坊間資訊還是處於新舊交接的框架內；對一些超自然現象的解讀，人們還普遍圍繞在……舊日迷信祭祀的思想架構中！由於本身對投胎前的靈界空間，還潛藏著鮮明印記！再加上歷年成長中的各種感應與奇遇，致令我對超覺現象的態度從刻意否定的「無視」，轉變為不得不對其「注視」！後來繼而決心尋找和探索，它為我帶來何種人生啟迪！幸運地'
  - '[PAGE 9]


    在生命多段的生關死劫磨煉中，總能得到靈界導師給予一次又一次的幫忙和導引。在其循循善誘的教導和鼓勵下，藉著靈魂出竅的方式帶領下；穿越不同時空次元，從而了知生命架構的真實義！從多年的超覺感應體驗下，更令我確切認知到除卻塵世之外，果真還存在著萬千的意識層次空間。故此我對人世間的得失際遇看得淡然，卻對寰宇浩翰的世外感到無比嚮往！


    而我自知這些異世經歷並不為各人所接受和了解，故此多年來我選擇三緘其口，並無打算對外公開！然而當看見每天的報章、電視總會報導著林林總總的自殺、他殺、意外，或因宗教仇恨而引致的報復殺戮及人禍戰爭的新聞後，內心只感到莫名的悲慟和嘆息！對那些輕易放棄自身生命的人感到惋惜！對那些輕易殘害別人性命的人感到難過和痛恨！


    另外……近年網絡科技帶來普及與豐富的資訊，令我更能認識到原來擁有相同經歷的通靈人士在西方非常普遍，從中發現他們所描述的靈界架構竟跟我從小所認知到的內容吻合，這亦令我對過去的各種靈界異象和出體見聞增多一重有力印證！


    數年前更得到靈界導師的鼓勵並指示……現在是適當'
  - '[PAGE 10]


    的發表時空。導師告知：「在地球教室的眾多轉世生命體，

    在經歷若干時空下，還抱持著各種謬誤和狹隘的觀念……

    還在撥弄著重重迷霧而不見歸期！」


    故此我真誠地……把自身的真實奇遇和靈異見聞，原

    原本本的跟各界分享。期盼此書能為大家對「投生地球教

    室」的學習意義和責任，有多一份了解和珍惜，感謝！'
  - '[PAGE 11]


    本書可分為三個部分：


    # 第一章・牛下童年


    記錄出生至童年時，居於牛頭角下村（簡稱：牛下）時


