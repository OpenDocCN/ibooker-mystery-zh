    收發站；所以我被暫託在鄰居吳伯伯家中，由於母親臨行前表示，須等待讀小學的姊姊放學後才一起煮午飯……實情是家中缺錢，要等母親把工錢收取後才能買菜。所以我只好和鄰居女兒一邊做功課一邊等著母親回來。及至個多小時後我們均感到有些餓，但當其時家中只有正在午睡的吳嬸嬸，故此我們在思索著還有甚麼東西可以果腹時，我才猛然想起那回見識過，校工嬸嬸捲吞報紙的情景！於是我依葫蘆畫瓢的模仿著……把鄰居家中的報紙撕成細條狀後，就伸出舌頭把報紙來回舔濕……然後慢慢的吞進肚裡……就在我們把報紙撕掉捲搓得興致勃勃時，吳嬸嬸在房間內忽聞廳中傳來嘈吵的撕紙聲，才知我們孩子間竟然胡鬧得在撕吃報紙！這當然又換來對我的投訴和教訓，再加上母親對我近來的種種反叛行徑感到非常丟臉，所以到最後我還是被狠狠地痛扁一場！


