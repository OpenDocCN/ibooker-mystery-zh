    落水的螞蟻在水上多番掙扎的情景時，我心中即時感到非常後悔和害怕，只懂依偎在母親身旁尋找安慰並要求離開！


    就在我們玩至中午過後，但覺晴空驟變擔心隨時會下起大雨，於是我們只好收拾行裝提早回家。而父親總會在回程時順道接載些散客出市區，這既可幫補生計亦可減省燃油開支，實屬一舉兩得的妙法！而每次我和姊姊總會沿路為父親留意，如發覺誰人在路上揮手截車；總會第一時間通知父親，我們小姊妹都視這爭先匯報行動為遊戲之一。但每次姊姊定會眼明口快的第一時間知會父親，她總能得到父母第一時間稱讚！在我心中暗忖定要加倍留心路上的截車情況，定要給父母看看我的能耐！


    還記得當車輛行經青山公路時，眼看車窗外的雨水越落越大，故此望向窗外的視線亦變得矇矓，但是沿路上我亦不敢鬆懈的掃視著路旁位置。就在一個彎位過後我看見路旁樹蔭下，站著一個背負著嬰兒的婦人向著我們揮手。她當其時只穿著單薄衣衫；而且全身早被雨水打得濕透，外表看來像是剛從鄉下到來尋親的村婦模樣。我隨即通知父親路旁有一個背負嬰兒的女人，正向著我們揮手。父母親即時循我所指的方向望去時，卻未有發現我所指的一切；我當時意會為可能是他們坐在車輛前方位置，並未如我在'
