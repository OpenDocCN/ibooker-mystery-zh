    然建了一個破落的籃球場！並且更看見這組舊建築的圍牆

    上，被人塗上一系列文革式的政治標語。夢中我對此破壞

    文物的行徑感到十分氣忿，因此不禁罵道：「怎可能會在

    此塗上文革標語？大好文物也不懂珍惜，怎能這樣肆意破

