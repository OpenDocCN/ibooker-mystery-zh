    我隨意打開前方某道房門，卻已即時傳來熱鬧熙攘的人聲！當我定神細看時，竟發現父母、外婆及家人正歡天喜地圍坐在一起閒談品茗。由於眼前光景實在使我感到錯愕萬分，因此即時打量這究竟是何種場合？這刻方發現原來是身處某酒樓的貴賓廳！


    當下我只感到悵然若失，心諳莫非我的「意識焦點」能量不足，以至誤墮「夢身意識」內的夢境而已？只見外婆身穿一襲深啡織錦綴以金線的中式棉襖，整體看來像是吃團年飯前等待家人的熱鬧光景！


