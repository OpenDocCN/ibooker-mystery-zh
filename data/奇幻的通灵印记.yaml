    | **姚姓婦人跳樓事件** | 時間:1998年7月22日(下午二時)<br>地點:德福花園T座<br>人數:一名41歲婦女 |


    ## 母親的心結


    由於不堪家中永無寧日的吵鬧，因此不久便搬回舊居；這既可減少磨擦和寧靜地應付晚間進修的功課，但亦會維持著每星期回家跟母親飯聚的時光。


    回想那些年雙親關係決裂的內容，他們著實以互相推諉和抱怨的態度來面對；就算怎樣給予開解和引導只換來徒勞失望，很多時還演化為更多的矛盾和責難！因此每次回家飯聚我只會跟母親談些小品話題，但每次總會叮囑她飲食烹調上盡量清淡健康。由於其偏執性格任我們怎樣解釋和善誘，很多時只換來母親更多不滿和抱怨，接著又會引伸出另一層煩惱怨懟！現在回想可能當時母親已患上了甚麼情緒病或鬱躁症……可惜當年我們著實對此無從認識！


    有段時期母親時常偕同親友回鄉旅遊散心，直至多年後我們才了解到；原來每次行程總會順道尋找甚麼出名的仙姑靈媒求教問事，內容當然離不開夫妻感情和自身的高血壓問題。當中所花費的不單止金錢和精神，當然還有心靈上的起落得失！


    記得某年曾與四妹跟隨母親回鄉祭祖，至某潮州鄉鎮時，母親的友人極力推介一位居於當地的靈媒問事……此人自稱某天家仙女。及至到步後我們卻發現這位仙女只是一名中年村婦，身形略胖且言談粗野；但這位仙女卻對我們一行人的衣飾相當在意打量，且不停詢問這些物品價值如何？我和妹妹當然對此感到無奈及忍俊不禁！只有母親滿心祈盼地諦聽著仙音開示，聽其吩咐誠心持香閉目叩拜個多小時；及後某些情節當然離不開要求誠心祭獻、超幽祖先……！靈媒聲稱藉著供奉金銀財帛，可代為打通陰司迷路；並能疏通「城隍」為「命主」（母親）扶正生基、改善健康，更能趕走父親身旁的野花雜草。對於這些「天機」內容，我們姊妹間亦感到相當愚弄，可是滿腹心結的母親卻感到無比嚮往！任我們怎樣勸諫卻招來長輩不滿，自此以後母親再沒帶同我們參與這類活動，並要我們守口如瓶。


    直至幾年過後，母親又隨大隊親友趕赴家鄉祭祖，此行又應另一位遠親推介拜訪一間百年古廟。當中註廟的解簽靈媒更被一帶鄉親公認相當靈驗！由於母親過去亦尋訪過不少靈能異士，但自覺每次錢財花掉後健康及婚姻卻無半點改善，因此這回反過來表示無意參與，害怕換來又一次失望無奈！故此遠親暗把自身問事內容與之分享，於是母親這回又再踏著姑且一試的心情順道拜訪！'
  mdcn: '## 第二章：通靈現象


    正當苦惱不適難眠之際，卻無意間從房間門縫中；看到廳外竟然坐著正在舉杯吃喝的賓客，這個場面當然令我感到十分詭異！原因是我剛從廳外飲水回來，前後只是一個轉身的片刻而已；試問又何來趕及設置滿室筵席和賓客呢？眼看這席間賓客全是灰黑素服的莊稼漢，整體景象更泛罩著團團的銀白光影，他們大都操著我聽得不太明白的潮州話，只見席上各人均露出歡敘暢飲的神情……此刻我的腦袋只餘一片迷惘和空白，內心不斷向自己解釋……可能這是鄉間人清晨趕田關係，要在這深宵時刻吃早飯呢！


    正當我以為大可嘗試放緩情緒試圖安心再睡之際，忽從廳外傳來一把尖細的女子聲音；接著竟看見一名長髮的白衣女子拿著一盞小油燈，身後還伴著一名白衣小孩，從廳外飄然而至。這刻我打從心底有種說不出的意會和懼怕，但卻又以理智的心神不斷地重複著……這是幻象……只是幻象……再不然應該是一個真實的人物吧！


    可是當那女子越步越近房間之際，我卻清楚看見這是一名只餘上半身虛現的鬼物！眼看白衣女子及身後小孩一再步近，像要掀開我正身處的床上蚊帳時，躲在蚊帳內的我終按捺不住，在床上不斷叫嚷著：「有鬼……有鬼呀……快些起來……大家快些起來吧……！」那刻真的把我嚇至驚駭失措，剎那間童年時的種種如夢魘般的舊記憶，忽從腦海深處洶湧襲來……！可是任憑我再三厲聲疾呼，整棟平房內的所有人卻還在繼續昏睡。可笑是那白衣女子卻反過來被我驚退在外！這刻我如瘋了似的不斷推擠床上各人，期望可將外婆或大姊弄醒。


    還記得那刻在腦際間，竟胡思亂想地將多年前那電視劇《幻海奇情》內某集聯想在一起……是講述男主角周潤發回鄉飲宴的劇情，但其實全村人口早已患鼠疫離世，但眾鄉間鬼魂卻還在陽間盤踞的故事……當晚我只感到絕望、孤獨和陌生，整晚涕泗縱橫！


    及至後來，忽從樑瓦間傳來一聲帶著深弦迴音的嘹喨雞啼後，廳外同時傳來散席退筵的起哄雜亂人聲，當中夾著一把老人大笑聲後一切頓然歸於寧靜！這刻房外才陸續傳來庭中飼養的家禽叫聲，我隨即再嘗試大叫著：「有鬼……有鬼呀……！」房中各人即時被我的呼叫聲弄醒，母親和外婆看見我這涕淚漣漣的驚遽模樣後，即時安撫著我不要胡思亂想，可是我還是不斷地抱怨著……因何昨晚你們像是昏死似的一直沉睡？這房子滿布鬼物你們又可曾察覺！這刻我更不斷要求母親應急召車輛讓我們趕回香港，可是長輩們對我所說的一切感到非常尷尬；因為這是三舅母一家人共處多年的居所，而我身為訪客卻在大清早一股勁兒地嚷著「鬧鬼」並要求離開！及後母親喚來醫生給我和腳傷的四妹一同治理，還要求我將一條畫滿墨印的手帕帶在身旁；母親還千叮萬囑這條手帕要時刻帶在身邊，這樣就能保祐安寧無恙！


    當時對於母親背後為我做了甚麼改善方法了無所知，只是順應要求照辦而已；及後雖然還在舅家多住幾天，但對我來說只感服刑般難受！其實在鄉間還有其他零碎發現……如這個位於村口的廣場和籃球場，常發現在中午過後總會看見某些晃動黑影，當中還夾附著某些令人不安害怕的情緒！所以在母親娘家鄉間的那段日子，我反而是只愛閒坐在中庭看豬！


    後記：這個令我難以磨滅的回鄉旅程，在重重的心靈顛簸下終順利回港。但當中卻察覺到長輩之間定有某些內情刻意隱瞞！直至多年後在我多番追問下母親才將當中內容悄悄告知……


    原來母親家鄉一帶在當年文革時，是一個規模頗大的批鬥和行刑場地。而當初我們所寄住的鄉間舅家亦不是原來的祖屋，這全是從被批鬥的地主手上分發得來的居所。由於當年全國都處於瘋狂的浩劫當中，因此當年舅母和表哥一家都不知這房子原本來歷！及至我當晚驚見一室鬼物後，母親在往後多次回鄉時，從年老鄉人口中打聽到這房子一些不為人知的內容……


    這房子的原來主人當年因為大地主的身分，全家同被捉至村口廣場中批鬥和毒打；及後因抵受不住日復日的酷刑，因而有的在家上吊自殺、有的服毒了結……而當晚我們所安頓的房間，原來是這家人原本安放祖先靈位及集體自殺的地方！


    還有，另一樣令我出乎意料之外的事情，竟是我當晚驚嚷著房子鬧鬼的消息；被前兩戶的鄰里傳揚出外，因而導致一些好奇的鄉人，特意前來窺看這個從香港來的「見鬼」異人！


    ## 紅磡觀音街


    由於中學時就讀的學校位於紅磡區，因此每天均要大清早趕巴士上學；但當遇著夏令時間天色還是漆黑一片時，個別同學更會自備電筒出門，以備上落巴士時免生意外之用。那時候由於每天只有少量的早餐錢，因此每朝能夠選擇的種類不多，只能到學校附近那濕漉髒亂的街市排檔內解決！


    有時候遇著友好同學提議到茶餐廳共進早餐時，我只能婉轉地推卻……只因口袋錢不足著實負擔不來，但又礙於面子問題不好意思言明！直至某天同學告知離校不遠處的某條街道上，新開了一間價錢大眾化的日式麵包店，並邀請我聯袂前往。而當中最令我欣喜的是……這回我終可跟隨大家的步伐了！


    這間麵包店的經營模式是模仿日本風格，每款產品均小巧精緻，果真切合一眾貪新愛奇的年青人口味。於是每朝早我們同學間均會買些不同款式的麵包回校，然後彼此交換品嚐。


    某天我正打算橫過馬路購買麵包時，無意間看見昏暗的路旁，出現一名步伐緩慢和神情帶些恍惚的女子在徘徊。但令我深感好奇的是……這名女子身後，像是依附著一團矇矓和飄渺的一個男人身影！由於我急於購物關係，因此沒再多加回望；就逕自步往對面的麵包店去。及至回程再步回原先位置時，竟看見剛才那名女子還在路邊遊晃著。此刻才勾起我的好奇心，對其多加留意！這時我才發現其身後的那團人影，竟欲從後強行將這女子推出馬路！就在電光火石間……我在本能反應下，迅速上前將她緊拉回來；在我還未來得及定神一刻，路旁隨即閃過一輛急速汽車！事後我亦被此危亂情景捏出一把汗來，可是那名被我強拉回來的女子；卻在神態上還是處於迷惘呆滯，之後更一聲不響在我的視線範圍內慢慢步遠！我雖然對此情景深感眩奇，卻礙於趕時間關係；因此亦無暇細想，便急步跑回學校方向。


    到了第二朝我又如常步往購買麵包，回程打算橫過馬路時看見前面有車輛駛至，於是我便站在馬路當中的安全島上等候。及後看見昏暗的馬路上冷清一片，正打算再步出時，卻看見腳上的鞋帶鬆脫；於是我馬上退回安全島上，打算縛好後才繼續前行。正當我退回一霎，前方竟無聲無息地飛馳著一輛汽車，這刻不禁暗忖非常幸運！


    至第三朝又在差不多位置，同樣在我打算橫過馬路時，忽從身後傳來一聲母親急喚的聲音（叫喚著我的乳名）！對此我當然感到十分錯愕並不禁暗忖著……母親何以跟隨我乘車至紅磡區上學呢？於是我隨即回望身後，只見冷清的街道上閒逛著零星年老坊眾，大多忙於趕晨運或前往早茶品茗而已。奇怪是……在我剛退回行人道的一刻，身旁又突然掠過一輛飛馳車輛！如是者連接多天均有類似情況發生，而我卻幸運地；每次均被某些突然聲音或提示所攔阻，從而令我避過這些車禍災厄！


    由於連續幾天均有類此驚險情況出現，著實令我感到非常費解。只感到……背後像存有某種不為所知的力量在眷顧！因此回家後急向母親提及這幾天的遭遇……我還好奇詢問是否母親對我顧念的心靈意會？母親聽罷隨即對我厲言訓斥，還嚴詞告誡我是否忘了早前回鄉的遭遇？這刻我才意會到……莫非又在不經意情況下跟某些異界空間連接上？母親還再三提醒我，不要忘掉當年在道壇驅煞的往事！這刻我的腦袋，又再被迷濛的封塵回憶，縈繞得困頓沉默！


    又相隔一段時日，某天清晨同樣乘車上學途中；當巴士行經蕪湖街某燈位時，我從車廂中驚見對面行車線一名過路男子被一輛淺色房車撞倒後，該車絕塵而去的畫面！


    由於被這出其不意的畫面所震懾，因此我驚訝得只懂不停比劃著前方，並即時告知同車的同學。沒想到我的話音剛落，巴士司機更即時把行駛中的巴士煞停，全車乘客隨即循我所示的方向掃視尋看！可是我卻發現當巴士停下來後，對面行車線並沒看到甚麼車禍傷者！那刻我早已被全車乘客譏誚得漲紅慚愧，還被同行的同學不斷抱怨呢！


    後記：自以為那次蕪湖街驚見的車禍，只是一時眼花的誤會，在我心中本已忘卻之際；卻在某天《警訊》節目內看見一則警方呼籲車禍目擊者的廣播……發生在同一地點，雷同版本是……這名過路男子被撞倒後，肇事房車亦是不顧而去，據報那名男子後來更傷重死亡！


    由於這則呼籲者實令我非常深刻，因此早就聚精會神靠在電視機旁細聽當中內容。原來這奪命車禍是發生在我所指的同日早上，我所看見的時間為上午六時多。但實際上這車禍是發生在上午十時多……這豈不是在車禍發生前四小時前被我無意「預見」？那刻我的內心不停嘀咕：如果能早些看見當中一切，能否把這宗不幸事件改變過來？


    ## 德福花園


    大約在八零年代中，我們便搬進這個位於九龍灣港鐵站的新建屋苑……「德福花園」內居住，這是座落於當年牛下前臨的填海地段。由於這私人屋苑的地面部分是港鐵車廠位置，因此整個屋苑均興建在龐大的車廠上方；每棟樓宇均設置在花園平台之上，故此形成一個環境清幽的綠化地帶。雖然日間這平台空間明亮恬靜，但晚間時段平台花園間的燈光卻顯得頗為幽暗！


    對於驟然搬至這新居所，卻感到缺少如牛下般親切的鄰里情感；但居住面積卻比舊居寬敞和簇新，因此我們亦慢慢地適應過來！可是入住後卻發覺父母間常為家事時生齟齬，而父親對我們的態度亦變得冷漠嚴肅。直至多年後我們孩子間才了解到，原來這是父親的婚外情影響！


    如是者大概入住一段時日，及至就業不久因感到競爭能力有所不足，因此晚間還會繼續進修以求自我增值。但每當夜深歸家時，總發覺每次行經這個燈光昏暗的平台花園時，總會聽到身後傳來某些細語人聲；某幾次我因出於好奇刻意回望，竟看見某些黑影急閃入花叢灌木內……


    說實話……面對這些情景我早已習以為常，只要不帶傷害性就不當一回事。直至某晚放學後十一時多回家，家中各人早已入睡；那時就只有父親還未歸家，我當然第一時間趕往淋浴，好讓及早上床就寢以備明早上班……當我從浴室出來打算上床就寢之際，看見父親已回家中並閒坐在廳中看電視，因此我跟父親簡單問好後打算趕回房間休息。可是原來當晚父親心情不佳（源於「舊式潮州大男人」老毛病又發作），竟將家中雜物亂放及其他細碎事項借意發揮！我當時只想趕快就寢，不為意地回應著我亦是剛回家，所以這些亂象並不是我所為！誰知我這不經意的回應卻沖著其怒意令他更為光火，隨即對我罵出一些難堪說話：「晚晚只懂外出玩樂……」由於父親並不知悉我夜歸原因是晚間進修關係，只因他對兒女從來都漠不關心，只可說這是源於積存著那「重男輕女」的舊觀念！


    這時母親早被客廳中的聲浪吵醒，故此亦從房間步出了解。這時父親卻將矛頭指向家用和管教問題，亦把母親一同罵上！還對我「晚間進修」的解釋視為狡辯藉口！父親言下間更說出一些晦氣話……還譏諷我讀甚麼書竟可目中無人？當中更怒指向廳前的窗說：「長輩管教理應虛心受教……女兒只是蝕本貨……不服氣何不就此跳下去……！」此刻我真的對家事感到壓力，故此念頭剎那間真的浮現出「跳下去」的衝動！


    就在生起「跳下去」這念頭的剎那，我竟看見窗下那平台花園某花叢中閃現出六隻怨靈！他們身上均籠罩著團團晦暗的綠螢光，當中有些更頭戴地盤的黃色工業帽；只見各怨靈身上均顯得傷痕纍纍，其中站在靠近前方位置的怨靈，我更清楚發現其右肩膊骨，竟折掉而露出體外的恐怖畫面！另一深刻是……當中還有一名戴粗黑眼鏡框的少年在其中，其餘看來都是四五十歲的中年男子。


    此刻，我已被窗外這突然驚現的一幕所震懾得驚悸無言！而這批來歷不明的怨靈，更同一時間淒嗚著的舉頭上望，並向我招手哀求：「你不想要這軀殼就留給我們吧……我們每人都死得很慘！求你快些跳下來做我們的替身吧……！」


    怨靈的哭聲和哀號顯得越來越大和悽厲，面對這驚遽一幕，我頓然被嚇至呆若木雞般震顫無言……這時四妹亦被客廳的聲浪吵醒，看見父親又因小事借意謾罵感到氣忿，還發現我在深宵時段被無故罵至涕淚漣漣的模樣！於是四妹隨即將我拉回房中躲避。這刻就算父親還在廳中對我惡言謾罵；我早已顧不及此，只想即時跳進被窩中躲藏逃避！


    進房後我隨即詢問四妹是否聽到窗外聲響？四妹顯得茫然回應：「甚麼？外邊有聲音嗎？窗外寧靜一片！」這時四妹正想探頭往窗外，看看有何發現時；已被我即時呼喝著：「快些把窗簾和窗門關上，切記不可往窗下望……樓下有鬼！」


    自從這晚經歷後，我才了知到原來這屋苑間是寄存著某些怨靈。當然那時我還未清楚這些怨靈的來歷，但每當屋苑間從鄰里處打聽回來的消息告知……哪座又有人跳樓時，物業管理公司每次都會低調處理，因此只有少部分街坊知道。而在每次跳樓事件發生後，我總會想起當晚窗外怨靈悽喊的畫面！但這些意會都只在心中暗自猜度，多年來從不對人提及，直至多年後……


    直至多年後……轟動一時的「德福五屍命案」發生，當時本港各大報章均鋪天蓋地式大事報導，而當中某份報章；更將過去曾在此屋苑發生過的人命意外，圖文並茂詳述！原來在興建德福初期，某日中午飯後有六名建築工人共同擠進一部工業升降機上，因機件故障而發生急促下墜意外，並導至六死慘劇發生。


    還記得當時四妹從報章知悉這些報導後，第一時間詢問我多年前某晚曾跟她提及……某晚六名地盤工人於窗外淒喊的往事！四妹更即時給我捎來這篇報導，並急於詢問著我：「這報章刊登了當年六名意外喪生的工人相片，你看看當晚所見是否如相中人一樣？」當我細看報章相片後，第一時間已認出那名肩膊骨折和戴黑框眼鏡少年的相片，竟是當晚所見的淒厲怨靈！


    而多年來令我非常好奇疑問是……何解地盤工友會有這名年紀偏小的少青在其中？這刻我才從報章內容了解到……自經歷這次地盤「工業升降機意外」慘劇後，政府才立例地盤不可聘請暑期工。原來這名戴黑框眼鏡的十五歲少年，當年是跟隨其親友到地盤做暑期工；而這名親友，亦正是當晚我所見的那名肩膊骨折的怨靈！


    以下是回顧當年的新聞報導：


    ### 德福花園地盤升降機墜下事故（摘自維基百科）


    1979年7月22日，德福花園C座發生嚴重工業意外，六名工人於C座地盤乘吊機前往高層工作，當上升至八樓時突然下墜，工人全部死亡，事後調查報告指出當吊機上升時，吊機的吊板與搭碼互碰，釀成悲劇。


    ### 德福花園五屍命案（摘自維基百科）


    德福花園五屍命案是一宗轟動香港的謀殺案，發生於1998年7月21日，此案中五名女性因喝下兇手混合礦泉水及山埃的符水而死於C座五樓一單位內。兇手被中國內地的法院判處死刑。


    ### 案件背景：


    兇手李育輝來自汕頭，自稱「風水大師」。他的妹妹在位於九龍西九龍城侯王道的住所設壇。該壇吸引大批已婚婦人祈福，為家人驅除魔鬼、趕走二奶、添福添壽，家宅平安。婦人林春麗與兩名朋友蔡秀珍、徐順琴前往找李育輝相命，並到徐順琴位於九龍東九龍灣德福花園的住所看風水。兇手得知三人家財豐厚，設下謀財害命的企圖。


    1998 年 7 月 22 日下午二時，一名 41 歲姚姓婦女，在德福花園 T 座跳樓死亡，警方接獲通知，於是到現場調查，在調查初期，警方對此案件並不感到特別奇怪。但當發現女死者留下了三封遺書而內容又關連到幾天前一宗婦人失蹤案的資料時，警方便感到案件內情並不簡單，於是開始四出追查。


    7 月 23 日，CID 在德福花園 C 座五樓一個單位破門入屋調查時，揭發了近年香港罕見的一宗五名女子集體死亡事件。


    ### 案件大略：


    1998 年 7 月 21 日，李育輝在徐順琴家設壇作法，事前調製好從鍍電廠友人處以清理魚池為由取得的劇毒氰化鈉的「符水」，並囑咐三人和徐順琴的兩個女兒在事發單位的不同房間中飲用。


    上述五人在喝下符水後不久相繼死去。兇手把他們求神用的願望寫在紙上置於廳中，布置成自殺假象；其後掠去 130 萬港元（作法前要求三人每人按自己年齡，每年一萬港元的款項作「貢品」）後與妻子連夜潛逃到汕頭。


    ### 偵查與判決：


    香港警方開始認為案件為集體自殺案，於後續的調查中發現自殺器具不在現場及李育輝答應作證後失約，斷定此案為謀殺案，李育輝有重大嫌疑。至此向內地公安機關請求協助。


    8月4日，汕頭市公安局刑警支隊副支隊長帶領民警在其妻武漢家查獲無果後，9月15日至湖北省通城縣李育輝朋友王某的家中，李育輝與妻雙雙落網。


    在香港完成偵查後，緝拿和審訊交由內地公安機關執行。內地法院經審訊後判處他死刑，1999年4月被槍決。


    案件偵破後，公安機關追回港幣60萬元和人民幣66.6萬元的贓款，移交香港警方發還被害人家。


    後記：回顧這篇深刻和靈異的經歷時，特意從網上搜尋這批新聞資料，卻意外發現原來當年這兩宗發生在同一屋苑的轟動命案，其案發日子、時間、地點、年齡和死者人數竟然出現這麼多的迷離吻合！這刻不禁令我再次感到眩惑震撼！


    | 項目 | 詳情 |

