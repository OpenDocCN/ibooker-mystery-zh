    我卻看見有位身穿袈裟、身形矮小，及有些背彎的老尼從某房間緩緩步出，然後逕自加入這晚課的拜誦行列當中。當下我只想到……「原來這庵堂中的尼師還有這年邁的一位，合共三人呢！」


