    # 第一章：牛下童年


    實，當我戰戰兢兢的進入該課室時，已深感奇怪何解室內這般昏暗和嘈吵？當中有一把近乎歇斯底里的女聲在咆哮泣叫和傳出陣陣燒焦氣味……！故此當我被這位老師投訴擾人時，自忖這課室當中的咆哮女聲還比我更擾人學習呢？就在我沿右邊牆壁慢慢步往後排廁所方向時，我竟看見多月不見的校工嬸嬸；竟披頭散髮的坐在牆邊某暗角……驚呼泣嚷！在其身邊更圍攏著一堆堆用麻繩綑著的發黃報紙，但我卻發覺這堆數目眾多的舊報紙，全都有被火燒過或被水沾濕過的痕跡。只見那本來乾瘦的校工嬸嬸，不停地把手中報紙撕成長條狀；然後伸出長長尖細的舌頭，把手上的報紙舔濕多遍後吞掉……當時我還奇怪原來「我們」（人類）的舌頭竟然可如青蛙般伸至胸膛長度？還有我發現當越是步近她的身旁時，那股燒焦的氣味就越顯濃烈，只見校工嬸嬸向著我如發狂似的驚呼泣嚷著，我聽不懂的家鄉話！此刻我對出現在眼前的校工嬸嬸，感到相當迷惑和陌生！皆因這並不像平日小息時，向我們兜售零食文具時的平實模樣（註：嬸嬸是女校長的鄉間親戚，蓄著髮髻、黑衣素服的一副鄉間中年婦人模樣。）我雖對這眼前光景感到狐疑懼怕，但還是鼓著勇氣默然前往廁所那方。


