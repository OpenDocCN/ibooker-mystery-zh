    ## 容府太夫人


    這是一個充滿迷離和深刻的經歷……是發生在剛接觸佛教的那些年（約九十年代初）。那時每星期總會跟隨同事到郊外不同的寺院名勝遊覽，一來可了解當中的文化歷史；二來更可到處試味不同的可口素菜，實屬有益身心的假日活動。


    某次我們一行人前往位於荃灣的竹林禪院參觀，順道到附近一所新經營的素菜館品嚐齋菜；由於當天我們比預訂素席的時間提早到達，於是我們只好在禪院一帶閒逛或靜靠一旁看書打發時間。


    無意間，我被供奉在偏殿壇前的一尊造型優美的觀音像所吸引，心靈間突然感念到某次參與佛課時，所念及的一段饒有意思經文！於是，我獨個兒站於像前默念經文七篇後，更誠心奉上迴向偈文……「願以此功德，莊嚴佛淨土；上報四重恩，下濟三途苦；現世父母增福壽，七世父母生淨土……！」對這當中感悟，確實令人開懷！這天就在一片歡欣暢快的氛圍中結束。至當晚回家後，我早已滿足得倦透，不消一會已投進沉沉夢鄉。及至深宵時段……


    矇矓間，看見窗前突然闖進一外形恍如撲克咭中的小丑精靈（Joker）。此精靈進來後，隨即轉至床邊，向我行了一個西式敬禮；然後手握帽子單膝下跪，並恭敬尖聲地說：「小姐你好！小僕名喚『鬼奴』，應我家夫人吩咐……相請小姐到夫人府中一聚！」我對這夜半突然闖至床邊的鬼奴感到萬分詫異，意識間正迷惘何以在夢中竟有陌生人前來邀約？於是我帶著惺忪睡眼向其提問：「奇怪！我與你家夫人並不認識，何以會在深夜時段前來邀請？」這時鬼奴又再禮貌地回應：「啊，小姐難道你忘掉今天在佛前立誓，祈願誦經功德迴施七世父母？我家夫人正是小姐前四世母，今午適逢於寺中安奉蓮位，聞得小姐至誠發願，因此特命小僕前來恭請小姐到府中還願！」


    聽罷原因後我當然隨即起床前往應約，於是便跟隨鬼奴步至街上；此刻竟發覺路邊早已停泊著一輛簇新的黑色開篷四驅房車，鬼奴彬彬有禮地將我迎上駕駛座後，便安靜地坐在側位，然後示意我親自駕車前往……最奇怪是沒有駕駛執照的我，夢中竟然懂得駕駛車輛？還記得沿路上風景著實令我感到有些眼熟，未幾才憶起這原來是中學時期經常出入的紅磡區。及至到達一棟多層大樓外，我的夢中意識還在疑惑著……這地方不似甚麼人家府宅？至甫下車時，我才意識到……這是該區一所著名的殯儀館所在地……紅磡世界殯儀館。


    但奇怪的是……眼前此大廈正門頂卻高聳著一幅有如舊日電影院那款「是日放映」及「不日放映」的巨型招牌，這些招牌四邊更圍上整串不停閃爍的彩色燈泡。只見舉頭正中的那塊「是日放映」招牌上寫有「容府出殯」四字，字旁更畫有一幅嚴如舊日電影女主角的造型畫像……相中人恍似年青時期的白燕形象。


    我由鬼奴畢恭畢敬地引領著，拾級而至步進這位於地下的中央禮堂中。只見這燈火通明的偌大禮堂中央，掛著一張跟正門外，那巨型招牌相同的中年女子黑白相片。而在相片前方，置有一張放滿各類糕點果品的祭桌，還有左右各置放著一對手工精緻的紮作紙人……男女僕人。明顯地這是一組布置顯赫堂皇的靈堂布局！而在祭桌兩旁分別設有一道圓拱門入口，只見拱門後各掛上一道白雪輕紗遮掩；隱約間更看見左邊拱門的輕紗背後，正端坐著一位神態安閒的中年婦人身影，其身後更站著一名女僕正恭敬地為女主人撥扇奉茶。這刻我的內心不禁暗忖……這位態度雍容雅逸的婦人，定是鬼奴所指的夫人了！


    這時鬼奴將我迎至靈前中央後，隨即恭敬地面向拱門內的夫人躬身稟報：「夫人，小僕已應吩咐，將小姐請來為夫人誦經！」說罷只見輕紗背後夫人淡雅地回應：「就請開始吧！」於是鬼奴隨即向我揖謝示意後，竟逕自步向靈前，隱入那祭桌旁的男紙人中消失。當下……心神間對此現象果真感到有些震駭愕然！但又念到這是佛前立誓施願至親的善緣時，我便抖擻心神奉上虔敬之心，獨個兒站在這偌大而寧靜的靈前，為這輕紗後的夫人誦經！


    如是者，我在靈前至誠誦念經文七篇，接著奉誦著白天時在寺中所唸的迴向文……願以此功德，莊嚴佛淨土；上報四重恩，下濟三途苦；現世父母增福壽，七世父母生淨土……！就在我念過一篇又一篇的同時，我卻發覺拱門後的輕紗內，竟迸現出多道瑰麗耀目的亮光，當中還夾雜著無數從天而降的晶瑩花雨！及至最後念至迴向文中……「七世父母生淨土」時，我更發現重重亮光及瑩花更把門後整片空間投映得極目一片！及念至完結時，一切光彩異象和人物亦跟隨經文聲音一併消失於渺然！


    及後……我獨自步出靈堂，並駕回剛才的四驅房車順利歸家；然後滿有意思地爬回床上，繼續我未完的睡眠。


    ## 奇幻的通靈印記


    至第二天我一覺醒來，第一時間從床上急跳起來，才發現昨晚那迷離而深刻的經歷，原來只是一場南柯夢境。回想夢中那鮮明的一切，果真令我沉思良久才能釋懷！


    第二天我悄悄地，跟當天同到寺中郊遊的同事提及這夢境內容；可是卻被友儕間視為鬼魅纏身的陰沉意會！還結論為……我的前身定是從鬼域投至，帶著不少餘孽的罪障眾生！


    後記：直至個多月後，某次母親命我將家居雜物清理時，我卻無意間發現一堆積存在某角的舊報紙中，當中某份舊報章，竟刊登了一則頗令人注目的整版「訃聞」廣告！由於其標題竟是當晚夢中所示現的矚目大字「容府出殯」，因此令我即時對此則內容注視詳閱……


    原來這則訃聞，是源自一顯赫大戶九十多歲高齡老太仙遊內容（看來夢中所見的夫人和靈堂照片，是亡者早年時的美貌形象），文中以「容府太夫人」來作為對亡者的尊稱，我更從當中的一眾中外國籍姻親名冊中了解到，這是一位兒孫縈繞、宗親顯赫，且盡享世壽福澤的貴婦人物！


    而最不可思議的是……訃聞中出現的設靈及舉殯日子，竟是個多月前這迷離夢境的相同日子，此刻又令我陷入一片震惑的思緒意識中！皆因本來被我視為南柯無稽的內容，竟然是真有其事，並能與現實時間、地點相互吻合及印證的通靈奇遇！這確實令我又再跌進深邃的迷思深淵中，剎那間閃現出很多疑問！


    自經歷此奇遇後的若干年，令我一直疑懸著的卻是夢中「鬼奴」來歷……因其形象竟如撲克咭中小丑模樣。直至某次，無意間收聽早期電台有關靈異節目時，某集請來一位從事殯儀紮作的師傅訪問。節目中訪問嘉賓娓娓道出其入行經過及某些難忘事項，並提及早年師公輩的紮作師傅很多都精通道術；而每當紮作那些帶有生命意象的紙品時，如：司機、僕人或動物等……會將某些魂頭及敕令施放其中！而最令其難忘是傳聞某師公人物，更將符咒敕入樸克咭內藉此作為驅役差遣……嘉賓亦同時嗟嘆隨著前人作古，此種「道術」現已失傳！


    這刻當然令我聯想到……莫非這可解答到夢中「鬼奴」來歷？


    ## 帶外婆回家


    外婆是童年時給予我溫馨回憶最多的親人，可是由於母親多年來對外婆都心存嫌隙，源於鄉間成長時那種重男輕女的觀念影響，再加上後來暴烈的三舅搬來跟外婆共住關係，令到往後我們跟外婆相處的機會不多！


    直至某年七十多歲的外婆因再次中風，同住的三舅有意將外婆移送鄉間，交由其他親友代為照料！可是我卻發現外婆雖然不能言語，卻表現出極不情願的神情，因此我懇求母親可否由我們安排外婆往後的照料？可是卻換來父母長輩的冷言呵斥！直至幾個月後從鄉間傳來一通令人心碎的電話，告知外婆離世的日子不遠，著母親及孫兒應盡快趕赴鄉間探望……此刻可說是我一直所害怕面對的事實，第二天我隨即向工作的機構請假並與母親趕赴潮州鄉間。


    車程了大半天終於到達外婆的養病所在地，這是外婆多年前在鄉間新建的平房。我當然第一時間走進房間探望多月不見的外婆，可是卻驚見瘦骨嶙峋的外婆竟躺在一張簡陋的木板床上迷惘呻吟，並從身上傳來陣陣敗潰的褥瘡惡臭，面對如斯景況令我即時難過得淚眼漣漣！可是我卻隨即被鄉間親友連哄帶斥將我帶離房間。眼見外婆在臨終時段，還要承受著種種不必要的煎熬，全因鄉間各種醫療及護理物資不足所致！看見鄉間親友當下所著緊的事情，竟然是部署外婆身故後的舉殯祭奠儀式、山墳風水怎樣布局來顯達後人、怎樣才能夠辦得體面風光，令鄉間人人稱頌！那刻我的內心只感到萬分悲慟，痛恨這充滿愚昧的世間現象，盡是虛偽冷漠的情感！


    面對這種顛倒的俗世現象我只有選擇沉默，獨個兒靜靠在外婆的房間中，為她送上一篇又一篇的六字真言；並從心靈間生出極大的意念……祈求慈悲的觀世音菩薩前來照護！只因觀世音菩薩是外婆和我最感親切的神靈。其實在我首次踏進外婆的房間時，早已感到房內充斥著擁擠的無明壓迫；及至在床邊閉目默念經文時，才驚覺原來房中結集著眾多鄉間亡靈（註：這是一些遊魂及祖先群靈）！這批陌生的先人，有的來回穿梭在牆垣與屋樑間；有的更躲靠在床邊的蚊帳外，偷窺著我的一舉一動！我只好再一次調整心神，全神貫注在心靈間的真誠祈禱！


    由於外婆的長子「大舅父」一家遠在上海還未趕至，眾人亦明白這是彌留間外婆一直所苦撐著的心願，因此鄉間親友只有不斷在其床邊作出安慰！而我亦悄悄在外婆的耳邊叮囑著：「婆婆，不用害怕；亦毋須理會前來騷擾的鄉間先人。因我已請求慈悲的觀世音菩薩接引，懇請菩薩讓我能夠在靈界的路上……帶外婆回家！」


    轉眼間我的七天事假終告完結，因此亦必須回港繼續工作，而我亦意會到這是我跟外婆的訣別時刻！臨別清晨我在處於昏眩的外婆額上輕吻，然後再一次在其耳邊細語叮嚀：「婆婆……不要被各種幻象迷惑，要一心等待觀世音菩薩前來帶領……！」


    在我和母親回港後的第三天，外婆終於如願；在臨終前的中午時分，見過大舅父一家後，並於同日晚上八時多便撒手塵寰！於是母親聯袂大姊隨即又再動身回鄉出席喪葬祭奠。自從回港後我與四妹每晚臨睡前總會為外婆送上一篇又一篇的六字大明及經文，並誠心祈禱外婆能夠投向光明境地！但奇怪地每當我專心持念的時候，總會在不知不覺間嗅到一股腐臭的異味，後來才憶起這是臨終前外婆身上的褥瘡氣味！初時我還認為可能是心理上的投射，但隨著日子進程下這氣味卻越趨強烈……可是四妹卻沒有此意會！到了第四至五天每當我閉目念誦六字真言時，矇矓間竟看見身穿黑衣的外婆站在漆黑的古老街角中，像是等候著我兌現承諾前來相送！那刻我的內心顯得更為堅定，並多次請求慈悲的觀世音菩薩助我如願！


    至第七天晚上，我如常為外婆誦經及懺悔，突感心靈間傳來一明確訊息……慈悲的觀世音菩薩今夜將會助我實踐諾言……親送外婆一程！於是我便逕自提早上床就寢了！


    當睡至深宵某時，窗外突然走進一位身穿藍衫白線運動服的青年，其手上更持著一面黃色的三角小旗。青年隨即轉至床邊把我推醒，由於處於半睡半醒間我顯得有些茫然！青年眼看我還在夢鄉徘徊，便埋怨著說：「你不是說好今夜要親送外婆一程嗎？何以現在你卻還在懶床？」當聽到「親送外婆一程」時，我即從床中驚醒過來，馬上跟隨青年一同飄至窗外那浮現在虛空的光團中……（註：這是一團四周透罩著銀白亮光的奇幻空間）


    畫面一轉……青年將我帶至一漆黑的古老街道上，只見各種景物及建築恍似四五年代的舊日香港；那刻同在街上的還有十多名陌生男女，當中大部分是中老年人。青年自稱是旅行社領隊，並向在場人士簡介這次行程的景點和其他入住安排。聽罷青年這番介紹後，我真的對當前境況感到茫然萬分！並且環顧在場人士卻不見外婆蹤影，於是隨即上前向這位青年領隊求問？青年隨即指向對面街角並喚我快把外婆接來，好讓大伙兒一同前往辦理入境手續……


    由於青年領隊跟我交談時的神態和語氣表現得極為親切，令我不禁好奇發問：「我們之前是否認識嗎？」青年領隊隨即向我笑說：「我們其實已一早認識，只是你一時之間忘記了！」當聽到這答案時，那刻果真令我顯得更感迷惘，嘗試再三細想卻還是了無印象！這時青年領隊著我快把外婆摻扶過來，因入境部門將要下班……


    於是我便橫過漆黑的馬路，打算將外婆慢慢摻扶過來；可是我卻發現眼前的外婆，不論樣貌和衣飾都跟往日所見不同！只因其身穿一襲黑綢衣，頸繫一條深藍布條和掛著一白布袋……全都不是外婆生前的一貫裝束！但一想到終能如願跟外婆再次相見，我亦不禁報上歡恩的熱淚！由於外婆生前一大段時間，均不能言語和只能以輪椅代步；因此一時之間顯行步履不穩，有見及此我馬上向外婆解釋當前現象：「婆婆，你現在已經跨過死亡，過去身體上的毛病現已成為幻象，因此你現可大步行走，甚至可用意念飛行！」可是外婆對我的提示還是顯得一臉惘然，在行動上更顯得有些力不從心！這時青年領隊不禁上前向我解釋：「你太心急了！你外婆才剛身故數天，在她的思維意識中還未察覺到這些變化，心念中還認為自己有病在身……」


    接著我們一團人到達一座高門大樓前，我又再好奇向青年領隊發問：「何以地府會跟舊日的香港相似？」青年領隊：「真實情況並非如此，由於這次你是倍伴外婆上路，因此你所看見的景象是外婆心念間的意識畫面……」這時在我的意識間竟立時出現一個畫面……看見年青時外婆隻身從鄉間來港打工時的舊日景況！原來在外婆的潛意識當中，還是寄望能夠回來這片生活多年的香港老家！


    這時青年領隊指著面前的團友續說：「眼前各人所看見的畫面不盡相同，全是各自心念間所化現出不同的場景和意會。」那刻我只感到思緒間湧出一股豁然的清新，對靈界引度亡靈的細意安排，感到無比的感恩和讚嘆！


    接著我們一行人進入一棟高門大樓內辦理入境手續，只見明亮的大堂中端坐著三位樣貌威嚴的入境官員。最感深刻的是，當中布局恍如舊日的香港警署，正中高臺並置有一張高身辦公櫃台。而我們亦按領隊要求排隊等候，並從領隊手上接過證件，準備給入境官員蓋印。由於我對當前這香港舊貌充滿好奇，因此早被高臺上的入境官員察覺到我的存在；這時台上的入境官員隨即召來領隊細問原由，詢問何解在靈界路上會有「此人」出現？


    只見領隊露出歉意走近高臺，向入境官員細語回答：「這是破例的一次安排，只因此『人』在觀世音菩薩坐前央求多天……！」可是入境官員卻對此抗議著說：「如果是安排其他人到訪，我們對此並無異議；可是這次到訪的『人』卻跟其他人有明顯分別……很多人到了明天會將靈界所見所聞一併忘掉！可是這『人』將是一個麻煩的傢伙，意識中還會留有深刻的記憶呢！」這時我雖然身處高臺下，卻隱約聽見他們對我一致的抱怨；那刻我只感到汗顏和不安，害怕會被他們突然轟走！這時我亦察覺到領隊面有難色著我快些遞上外婆的證件給官員蓋印，而官員在蓋過印後亦隨即將大樓燈光關上，並表示辦工的時間到此為止……！更表示由於天色已晚，其他的入境安排留待明天繼續吧！領隊只好著我們轉到酒店休息，於是我們一行人被帶至另一場景……


    畫面一轉，一個雪白明亮、沒有天際和地平線的一片光幕空間；只見全白透亮的場景中，置放著一張有如舊日醫院式樣的白鐵床，當中還有一扇閉合著的白色木百葉窗。我小心摻扶外婆至床邊安頓，這刻才看清楚外婆身上的奇怪衣飾，發覺外婆竟然穿上一雙過大尺碼的黑布鞋，我隨即明白外婆步履緩慢的另一原因，並責怪鄉間親人這操心大意的安排！並將外婆身上的唯一行李……藍布條和白布袋放置在床上，一時間我對此布袋好奇不已，隨即翻出袋中物品查看！當中全是一些線條描繪粗糙的黑白圖像……手鐲、項鍊、耳環、衣服、手袋、摺扇和鞋類小紙片。看見這些為數不少……有如小孩塗鴉般的小紙片後，令我不禁對此譏笑並滿帶疑問？青年領隊耐心地為我解釋著：「這是在世親人所給予的心意，期望這些物品可作為外婆身故後的世界中享用！」領隊續說：「在你眼中這只是平面圖像，但在外婆意識層面中這是實物一樣的東西！」這時我才了知到原來「心靈意識的力量」是可以這般宏大，並不須要借用甚麼焚燒火化途徑的假像來實踐，那些逝去的親友亦可接收到這份「意念」心意！此刻亦令我不期然想起……每年清明、重陽時節中，人們常因祭祀習俗而焚燒冥鏹時不小心造成的山林火災，是多麼不濟的破壞環境愚行！


    這時領隊表示時空上並不容許我再作停留，並表示這是我該回去的時候！可是在我的心靈間還有很多疑問，因此我又再發問：「何以外婆還要安排入往醫院？」領隊還是親切地解釋著：「由於外婆生前是病歿，所以我們這兒會有飾演醫生和護士的團隊為外婆繼續治療，直至外婆慢慢康復出院，這可讓亡者意識慢慢過渡……！」這時我的視點竟隨著領隊的話語飄向那白色的百葉窗旁，看見窗戶慢慢打開後所摒現出一個……色彩鮮豔和明媚的美麗花園，只見這片廣闊的花園上空；飛舞著色彩斑斕的蝴蝶和彩虹，遠方還隱約看見一片光波閃爍的池水……這刻我的意識卻像被重鎚突然擊醒一樣，剎那間驚悉到原來這個優美耀目的池畔，正是我出生前從靈界花園倒跌下來的地點！頃刻間我的視點被不斷地往後一抽，我竟急速地跌回床上，隨即猛然一震又回到現實的世界了！


    我隨即起床掙揉著雙眼，對這深刻和奇幻的夢境一再驚嘆，對夢中所給予的啟示百感交集！一遍又一遍感恩這慈悲的照護，並對這次靈界見聞深感玄奇！那刻只想第一時間打聽鄉間的真實情況，是否如夢中所見跟某些內容接近？直至當晚六時多，母親從鄉間打來長途來電，表示明早將與大姊啟程回港。我當然急不及待詢問鄉間的舉殯情況？原來這天早上剛巧是外婆出殯落葬的日子，我滿心歡喜告知母親今早夢見外婆的內容，可是我隨即被母親喝止並表示不要胡謅！只表示待她們回港後才跟我了解，可是當晚我還是因此夢境被父親責罵……對父親來說這全是荒誕不經的痴人夢話內容，並視此為不祥的現象！


    直至個多星期後，母親才要求我將夢中內容告知她和大姊。當我描述到外婆身上的奇特衣飾時，大姊隨即告知這正是外婆出殯大殮時的模樣……全套黑綢衣！至於夢中外婆頸上所掛著的藍布條，原來是大殮時覆蓋在外婆下半身的裙擺。及後當我提及夢中外婆頸上所掛著的白布袋，並發現內藏著很多線條粗糙的圖像小紙片時，母親即時露出驚訝的神情！這時大姊隨即向我解說這是鄉間習俗，這是外嫁女兒……即母親送給亡者的陪葬品，寓意帶赴陰間生活所享用的財物。直至我提及外婆的布鞋尺碼過大時，大姊表示因鄉間親友忘了這項入殮準備，所以這是在外婆入棺後才趕忙購置的後補物品，因此在尺碼上真的過大！


    後記：由於外婆生前至往生後並沒有留下一言半語，因此在我們的心靈中始終還帶著不少遺憾！直至我將夢中相送的內容告知各人後，總算給我們帶來絲絲感恩和釋懷！


    但人始終是好奇的生靈，因此在幾年後我於一次的靈魂出竅遊歷中，試圖再次尋訪在靈界生活與學習的外婆……（將收錄在第三章〈靈魂出竅〉內）。


    當年，我對這些出現在身上的種種靈異感應還是懵懂無知，更不曾了解到原來這些現象並不是單純的夢境意會！直至多年來相繼出現其他奇幻經歷後，我才明白原來這是人體某種自然現象……靈魂出竅。'
  mdcn: '大小和卓之亂的平定標誌著清朝全國統一戰爭的完成，是乾隆皇帝的十全武功之一。此役之後，西域天山南路重新納入中國版圖，清朝疆域臻於極盛。回部平定後，清廷設伊犁將軍統轄新疆各部，設總理回疆事務參贊大臣管理回部。此後的六十多年中新疆沒有發生大的動亂。


    ## 容府太夫人


    這是一個充滿迷離和深刻的經歷……是發生在剛接觸佛教的那些年（約九十年代初）。那時每星期總會跟隨同事到郊外不同的寺院名勝遊覽，一來可了解當中的文化歷史；二來更可到處試味不同的可口素菜，實屬有益身心的假日活動。


    某次我們一行人前往位於荃灣的竹林禪院參觀，順道到附近一所新經營的素菜館品嚐齋菜；由於當天我們比預訂素席的時間提早到達，於是我們只好在禪院一帶閒逛或靜靠一旁看書打發時間。


    無意間，我被供奉在偏殿壇前的一尊造型優美的觀音像所吸引，心靈間突然感念到某次參與佛課時，所念及的一段饒有意思經文！於是，我獨個兒站於像前默念經文七篇後，更誠心奉上迴向偈文……「願以此功德，莊嚴佛淨土；上報四重恩，下濟三途苦；現世父母增福壽，七世父母生淨土……！」對這當中感悟，確實令人開懷！這天就在一片歡欣暢快的氛圍中結束。至當晚回家後，我早已滿足得倦透，不消一會已投進沉沉夢鄉。及至深宵時段……


    矇矓間，看見窗前突然闖進一外形恍如撲克咭中的小丑精靈（Joker）。此精靈進來後，隨即轉至床邊，向我行了一個西式敬禮；然後手握帽子單膝下跪，並恭敬尖聲地說：「小姐你好！小僕名喚『鬼奴』，應我家夫人吩咐……相請小姐到夫人府中一聚！」我對這夜半突然闖至床邊的鬼奴感到萬分詫異，意識間正迷惘何以在夢中竟有陌生人前來邀約？於是我帶著惺忪睡眼向其提問：「奇怪！我與你家夫人並不認識，何以會在深夜時段前來邀請？」這時鬼奴又再禮貌地回應：「啊，小姐難道你忘掉今天在佛前立誓，祈願誦經功德迴施七世父母？我家夫人正是小姐前四世母，今午適逢於寺中安奉蓮位，聞得小姐至誠發願，因此特命小僕前來恭請小姐到府中還願！」


    聽罷原因後我當然隨即起床前往應約，於是便跟隨鬼奴步至街上；此刻竟發覺路邊早已停泊著一輛簇新的黑色開篷四驅房車，鬼奴彬彬有禮地將我迎上駕駛座後，便安靜地坐在側位，然後示意我親自駕車前往……最奇怪是沒有駕駛執照的我，夢中竟然懂得駕駛車輛？還記得沿路上風景著實令我感到有些眼熟，未幾才憶起這原來是中學時期經常出入的紅磡區。及至到達一棟多層大樓外，我的夢中意識還在疑惑著……這地方不似甚麼人家府宅？至甫下車時，我才意識到……這是該區一所著名的殯儀館所在地……紅磡世界殯儀館。


    但奇怪的是……眼前此大廈正門頂卻高聳著一幅有如舊日電影院那款「是日放映」及「不日放映」的巨型招牌，這些招牌四邊更圍上整串不停閃爍的彩色燈泡。只見舉頭正中的那塊「是日放映」招牌上寫有「容府出殯」四字，字旁更畫有一幅嚴如舊日電影女主角的造型畫像……相中人恍似年青時期的白燕形象。


    我由鬼奴畢恭畢敬地引領著，拾級而至步進這位於地下的中央禮堂中。只見這燈火通明的偌大禮堂中央，掛著一張跟正門外，那巨型招牌相同的中年女子黑白相片。而在相片前方，置有一張放滿各類糕點果品的祭桌，還有左右各置放著一對手工精緻的紮作紙人……男女僕人。明顯地這是一組布置顯赫堂皇的靈堂布局！而在祭桌兩旁分別設有一道圓拱門入口，只見拱門後各掛上一道白雪輕紗遮掩；隱約間更看見左邊拱門的輕紗背後，正端坐著一位神態安閒的中年婦人身影，其身後更站著一名女僕正恭敬地為女主人撥扇奉茶。這刻我的內心不禁暗忖……這位態度雍容雅逸的婦人，定是鬼奴所指的夫人了！


    這時鬼奴將我迎至靈前中央後，隨即恭敬地面向拱門內的夫人躬身稟報：「夫人，小僕已應吩咐，將小姐請來為夫人誦經！」說罷只見輕紗背後夫人淡雅地回應：「就請開始吧！」於是鬼奴隨即向我揖謝示意後，竟逕自步向靈前，隱入那祭桌旁的男紙人中消失。當下……心神間對此現象果真感到有些震駭愕然！但又念到這是佛前立誓施願至親的善緣時，我便抖擻心神奉上虔敬之心，獨個兒站在這偌大而寧靜的靈前，為這輕紗後的夫人誦經！


    如是者，我在靈前至誠誦念經文七篇，接著奉誦著白天時在寺中所唸的迴向文……願以此功德，莊嚴佛淨土；上報四重恩，下濟三途苦；現世父母增福壽，七世父母生淨土……！就在我念過一篇又一篇的同時，我卻發覺拱門後的輕紗內，竟迸現出多道瑰麗耀目的亮光，當中還夾雜著無數從天而降的晶瑩花雨！及至最後念至迴向文中……「七世父母生淨土」時，我更發現重重亮光及瑩花更把門後整片空間投映得極目一片！及念至完結時，一切光彩異象和人物亦跟隨經文聲音一併消失於渺然！


    及後……我獨自步出靈堂，並駕回剛才的四驅房車順利歸家；然後滿有意思地爬回床上，繼續我未完的睡眠。


    ## 奇幻的通靈印記


    至第二天我一覺醒來，第一時間從床上急跳起來，才發現昨晚那迷離而深刻的經歷，原來只是一場南柯夢境。回想夢中那鮮明的一切，果真令我沉思良久才能釋懷！


    第二天我悄悄地，跟當天同到寺中郊遊的同事提及這夢境內容；可是卻被友儕間視為鬼魅纏身的陰沉意會！還結論為……我的前身定是從鬼域投至，帶著不少餘孽的罪障眾生！


    後記：直至個多月後，某次母親命我將家居雜物清理時，我卻無意間發現一堆積存在某角的舊報紙中，當中某份舊報章，竟刊登了一則頗令人注目的整版「訃聞」廣告！由於其標題竟是當晚夢中所示現的矚目大字「容府出殯」，因此令我即時對此則內容注視詳閱……


    原來這則訃聞，是源自一顯赫大戶九十多歲高齡老太仙遊內容（看來夢中所見的夫人和靈堂照片，是亡者早年時的美貌形象），文中以「容府太夫人」來作為對亡者的尊稱，我更從當中的一眾中外國籍姻親名冊中了解到，這是一位兒孫縈繞、宗親顯赫，且盡享世壽福澤的貴婦人物！


    而最不可思議的是……訃聞中出現的設靈及舉殯日子，竟是個多月前這迷離夢境的相同日子，此刻又令我陷入一片震惑的思緒意識中！皆因本來被我視為南柯無稽的內容，竟然是真有其事，並能與現實時間、地點相互吻合及印證的通靈奇遇！這確實令我又再跌進深邃的迷思深淵中，剎那間閃現出很多疑問！


    自經歷此奇遇後的若干年，令我一直疑懸著的卻是夢中「鬼奴」來歷……因其形象竟如撲克咭中小丑模樣。直至某次，無意間收聽早期電台有關靈異節目時，某集請來一位從事殯儀紮作的師傅訪問。節目中訪問嘉賓娓娓道出其入行經過及某些難忘事項，並提及早年師公輩的紮作師傅很多都精通道術；而每當紮作那些帶有生命意象的紙品時，如：司機、僕人或動物等……會將某些魂頭及敕令施放其中！而最令其難忘是傳聞某師公人物，更將符咒敕入樸克咭內藉此作為驅役差遣……嘉賓亦同時嗟嘆隨著前人作古，此種「道術」現已失傳！


    這刻當然令我聯想到……莫非這可解答到夢中「鬼奴」來歷？


    ## 帶外婆回家


    外婆是童年時給予我溫馨回憶最多的親人，可是由於母親多年來對外婆都心存嫌隙，源於鄉間成長時那種重男輕女的觀念影響，再加上後來暴烈的三舅搬來跟外婆共住關係，令到往後我們跟外婆相處的機會不多！


    直至某年七十多歲的外婆因再次中風，同住的三舅有意將外婆移送鄉間，交由其他親友代為照料！可是我卻發現外婆雖然不能言語，卻表現出極不情願的神情，因此我懇求母親可否由我們安排外婆往後的照料？可是卻換來父母長輩的冷言呵斥！直至幾個月後從鄉間傳來一通令人心碎的電話，告知外婆離世的日子不遠，著母親及孫兒應盡快趕赴鄉間探望……此刻可說是我一直所害怕面對的事實，第二天我隨即向工作的機構請假並與母親趕赴潮州鄉間。


    車程了大半天終於到達外婆的養病所在地，這是外婆多年前在鄉間新建的平房。我當然第一時間走進房間探望多月不見的外婆，可是卻驚見瘦骨嶙峋的外婆竟躺在一張簡陋的木板床上迷惘呻吟，並從身上傳來陣陣敗潰的褥瘡惡臭，面對如斯景況令我即時難過得淚眼漣漣！可是我卻隨即被鄉間親友連哄帶斥將我帶離房間。眼見外婆在臨終時段，還要承受著種種不必要的煎熬，全因鄉間各種醫療及護理物資不足所致！看見鄉間親友當下所著緊的事情，竟然是部署外婆身故後的舉殯祭奠儀式、山墳風水怎樣布局來顯達後人、怎樣才能夠辦得體面風光，令鄉間人人稱頌！那刻我的內心只感到萬分悲慟，痛恨這充滿愚昧的世間現象，盡是虛偽冷漠的情感！


    面對這種顛倒的俗世現象我只有選擇沉默，獨個兒靜靠在外婆的房間中，為她送上一篇又一篇的六字真言；並從心靈間生出極大的意念……祈求慈悲的觀世音菩薩前來照護！只因觀世音菩薩是外婆和我最感親切的神靈。其實在我首次踏進外婆的房間時，早已感到房內充斥著擁擠的無明壓迫；及至在床邊閉目默念經文時，才驚覺原來房中結集著眾多鄉間亡靈（註：這是一些遊魂及祖先群靈）！這批陌生的先人，有的來回穿梭在牆垣與屋樑間；有的更躲靠在床邊的蚊帳外，偷窺著我的一舉一動！我只好再一次調整心神，全神貫注在心靈間的真誠祈禱！


    由於外婆的長子「大舅父」一家遠在上海還未趕至，眾人亦明白這是彌留間外婆一直所苦撐著的心願，因此鄉間親友只有不斷在其床邊作出安慰！而我亦悄悄在外婆的耳邊叮囑著：「婆婆，不用害怕；亦毋須理會前來騷擾的鄉間先人。因我已請求慈悲的觀世音菩薩接引，懇請菩薩讓我能夠在靈界的路上……帶外婆回家！」


    轉眼間我的七天事假終告完結，因此亦必須回港繼續工作，而我亦意會到這是我跟外婆的訣別時刻！臨別清晨我在處於昏眩的外婆額上輕吻，然後再一次在其耳邊細語叮嚀：「婆婆……不要被各種幻象迷惑，要一心等待觀世音菩薩前來帶領……！」


    在我和母親回港後的第三天，外婆終於如願；在臨終前的中午時分，見過大舅父一家後，並於同日晚上八時多便撒手塵寰！於是母親聯袂大姊隨即又再動身回鄉出席喪葬祭奠。自從回港後我與四妹每晚臨睡前總會為外婆送上一篇又一篇的六字大明及經文，並誠心祈禱外婆能夠投向光明境地！但奇怪地每當我專心持念的時候，總會在不知不覺間嗅到一股腐臭的異味，後來才憶起這是臨終前外婆身上的褥瘡氣味！初時我還認為可能是心理上的投射，但隨著日子進程下這氣味卻越趨強烈……可是四妹卻沒有此意會！到了第四至五天每當我閉目念誦六字真言時，矇矓間竟看見身穿黑衣的外婆站在漆黑的古老街角中，像是等候著我兌現承諾前來相送！那刻我的內心顯得更為堅定，並多次請求慈悲的觀世音菩薩助我如願！


    至第七天晚上，我如常為外婆誦經及懺悔，突感心靈間傳來一明確訊息……慈悲的觀世音菩薩今夜將會助我實踐諾言……親送外婆一程！於是我便逕自提早上床就寢了！


    當睡至深宵某時，窗外突然走進一位身穿藍衫白線運動服的青年，其手上更持著一面黃色的三角小旗。青年隨即轉至床邊把我推醒，由於處於半睡半醒間我顯得有些茫然！青年眼看我還在夢鄉徘徊，便埋怨著說：「你不是說好今夜要親送外婆一程嗎？何以現在你卻還在懶床？」當聽到「親送外婆一程」時，我即從床中驚醒過來，馬上跟隨青年一同飄至窗外那浮現在虛空的光團中……（註：這是一團四周透罩著銀白亮光的奇幻空間）


    畫面一轉……青年將我帶至一漆黑的古老街道上，只見各種景物及建築恍似四五年代的舊日香港；那刻同在街上的還有十多名陌生男女，當中大部分是中老年人。青年自稱是旅行社領隊，並向在場人士簡介這次行程的景點和其他入住安排。聽罷青年這番介紹後，我真的對當前境況感到茫然萬分！並且環顧在場人士卻不見外婆蹤影，於是隨即上前向這位青年領隊求問？青年隨即指向對面街角並喚我快把外婆接來，好讓大伙兒一同前往辦理入境手續……


    由於青年領隊跟我交談時的神態和語氣表現得極為親切，令我不禁好奇發問：「我們之前是否認識嗎？」青年領隊隨即向我笑說：「我們其實已一早認識，只是你一時之間忘記了！」當聽到這答案時，那刻果真令我顯得更感迷惘，嘗試再三細想卻還是了無印象！這時青年領隊著我快把外婆摻扶過來，因入境部門將要下班……


    於是我便橫過漆黑的馬路，打算將外婆慢慢摻扶過來；可是我卻發現眼前的外婆，不論樣貌和衣飾都跟往日所見不同！只因其身穿一襲黑綢衣，頸繫一條深藍布條和掛著一白布袋……全都不是外婆生前的一貫裝束！但一想到終能如願跟外婆再次相見，我亦不禁報上歡恩的熱淚！由於外婆生前一大段時間，均不能言語和只能以輪椅代步；因此一時之間顯行步履不穩，有見及此我馬上向外婆解釋當前現象：「婆婆，你現在已經跨過死亡，過去身體上的毛病現已成為幻象，因此你現可大步行走，甚至可用意念飛行！」可是外婆對我的提示還是顯得一臉惘然，在行動上更顯得有些力不從心！這時青年領隊不禁上前向我解釋：「你太心急了！你外婆才剛身故數天，在她的思維意識中還未察覺到這些變化，心念中還認為自己有病在身……」


    接著我們一團人到達一座高門大樓前，我又再好奇向青年領隊發問：「何以地府會跟舊日的香港相似？」青年領隊：「真實情況並非如此，由於這次你是倍伴外婆上路，因此你所看見的景象是外婆心念間的意識畫面……」這時在我的意識間竟立時出現一個畫面……看見年青時外婆隻身從鄉間來港打工時的舊日景況！原來在外婆的潛意識當中，還是寄望能夠回來這片生活多年的香港老家！


    這時青年領隊指著面前的團友續說：「眼前各人所看見的畫面不盡相同，全是各自心念間所化現出不同的場景和意會。」那刻我只感到思緒間湧出一股豁然的清新，對靈界引度亡靈的細意安排，感到無比的感恩和讚嘆！


    接著我們一行人進入一棟高門大樓內辦理入境手續，只見明亮的大堂中端坐著三位樣貌威嚴的入境官員。最感深刻的是，當中布局恍如舊日的香港警署，正中高臺並置有一張高身辦公櫃台。而我們亦按領隊要求排隊等候，並從領隊手上接過證件，準備給入境官員蓋印。由於我對當前這香港舊貌充滿好奇，因此早被高臺上的入境官員察覺到我的存在；這時台上的入境官員隨即召來領隊細問原由，詢問何解在靈界路上會有「此人」出現？


    只見領隊露出歉意走近高臺，向入境官員細語回答：「這是破例的一次安排，只因此『人』在觀世音菩薩坐前央求多天……！」可是入境官員卻對此抗議著說：「如果是安排其他人到訪，我們對此並無異議；可是這次到訪的『人』卻跟其他人有明顯分別……很多人到了明天會將靈界所見所聞一併忘掉！可是這『人』將是一個麻煩的傢伙，意識中還會留有深刻的記憶呢！」這時我雖然身處高臺下，卻隱約聽見他們對我一致的抱怨；那刻我只感到汗顏和不安，害怕會被他們突然轟走！這時我亦察覺到領隊面有難色著我快些遞上外婆的證件給官員蓋印，而官員在蓋過印後亦隨即將大樓燈光關上，並表示辦工的時間到此為止……！更表示由於天色已晚，其他的入境安排留待明天繼續吧！領隊只好著我們轉到酒店休息，於是我們一行人被帶至另一場景……


    畫面一轉，一個雪白明亮、沒有天際和地平線的一片光幕空間；只見全白透亮的場景中，置放著一張有如舊日醫院式樣的白鐵床，當中還有一扇閉合著的白色木百葉窗。我小心摻扶外婆至床邊安頓，這刻才看清楚外婆身上的奇怪衣飾，發覺外婆竟然穿上一雙過大尺碼的黑布鞋，我隨即明白外婆步履緩慢的另一原因，並責怪鄉間親人這操心大意的安排！並將外婆身上的唯一行李……藍布條和白布袋放置在床上，一時間我對此布袋好奇不已，隨即翻出袋中物品查看！當中全是一些線條描繪粗糙的黑白圖像……手鐲、項鍊、耳環、衣服、手袋、摺扇和鞋類小紙片。看見這些為數不少……有如小孩塗鴉般的小紙片後，令我不禁對此譏笑並滿帶疑問？青年領隊耐心地為我解釋著：「這是在世親人所給予的心意，期望這些物品可作為外婆身故後的世界中享用！」領隊續說：「在你眼中這只是平面圖像，但在外婆意識層面中這是實物一樣的東西！」這時我才了知到原來「心靈意識的力量」是可以這般宏大，並不須要借用甚麼焚燒火化途徑的假像來實踐，那些逝去的親友亦可接收到這份「意念」心意！此刻亦令我不期然想起……每年清明、重陽時節中，人們常因祭祀習俗而焚燒冥鏹時不小心造成的山林火災，是多麼不濟的破壞環境愚行！


    這時領隊表示時空上並不容許我再作停留，並表示這是我該回去的時候！可是在我的心靈間還有很多疑問，因此我又再發問：「何以外婆還要安排入往醫院？」領隊還是親切地解釋著：「由於外婆生前是病歿，所以我們這兒會有飾演醫生和護士的團隊為外婆繼續治療，直至外婆慢慢康復出院，這可讓亡者意識慢慢過渡……！」這時我的視點竟隨著領隊的話語飄向那白色的百葉窗旁，看見窗戶慢慢打開後所摒現出一個……色彩鮮豔和明媚的美麗花園，只見這片廣闊的花園上空；飛舞著色彩斑斕的蝴蝶和彩虹，遠方還隱約看見一片光波閃爍的池水……這刻我的意識卻像被重鎚突然擊醒一樣，剎那間驚悉到原來這個優美耀目的池畔，正是我出生前從靈界花園倒跌下來的地點！頃刻間我的視點被不斷地往後一抽，我竟急速地跌回床上，隨即猛然一震又回到現實的世界了！


    我隨即起床掙揉著雙眼，對這深刻和奇幻的夢境一再驚嘆，對夢中所給予的啟示百感交集！一遍又一遍感恩這慈悲的照護，並對這次靈界見聞深感玄奇！那刻只想第一時間打聽鄉間的真實情況，是否如夢中所見跟某些內容接近？直至當晚六時多，母親從鄉間打來長途來電，表示明早將與大姊啟程回港。我當然急不及待詢問鄉間的舉殯情況？原來這天早上剛巧是外婆出殯落葬的日子，我滿心歡喜告知母親今早夢見外婆的內容，可是我隨即被母親喝止並表示不要胡謅！只表示待她們回港後才跟我了解，可是當晚我還是因此夢境被父親責罵……對父親來說這全是荒誕不經的痴人夢話內容，並視此為不祥的現象！


    直至個多星期後，母親才要求我將夢中內容告知她和大姊。當我描述到外婆身上的奇特衣飾時，大姊隨即告知這正是外婆出殯大殮時的模樣……全套黑綢衣！至於夢中外婆頸上所掛著的藍布條，原來是大殮時覆蓋在外婆下半身的裙擺。及後當我提及夢中外婆頸上所掛著的白布袋，並發現內藏著很多線條粗糙的圖像小紙片時，母親即時露出驚訝的神情！這時大姊隨即向我解說這是鄉間習俗，這是外嫁女兒……即母親送給亡者的陪葬品，寓意帶赴陰間生活所享用的財物。直至我提及外婆的布鞋尺碼過大時，大姊表示因鄉間親友忘了這項入殮準備，所以這是在外婆入棺後才趕忙購置的後補物品，因此在尺碼上真的過大！


    後記：由於外婆生前至往生後並沒有留下一言半語，因此在我們的心靈中始終還帶著不少遺憾！直至我將夢中相送的內容告知各人後，總算給我們帶來絲絲感恩和釋懷！


    但人始終是好奇的生靈，因此在幾年後我於一次的靈魂出竅遊歷中，試圖再次尋訪在靈界生活與學習的外婆……（將收錄在第三章〈靈魂出竅〉內）。


    當年，我對這些出現在身上的種種靈異感應還是懵懂無知，更不曾了解到原來這些現象並不是單純的夢境意會！直至多年來相繼出現其他奇幻經歷後，我才明白原來這是人體某種自然現象……靈魂出竅。'
