    不同時期的影象片段在其中！初時「我」還像路旁群眾般用淡然角度來觀看，但及至看到其中一顆光球中竟出現一個令「我」感到熟悉的身影時……當前在會場中昏坐一角的肉身！此刻「我」才恍然生出與之聯繫的感覺來，剎那間意識只感到一片驚愕迷亂，並對此不斷疑問著……「莫非我已經歷死亡現象嗎？」並喃喃自忖……「死亡……我已經死亡了嗎……？」無奈面對「死亡」驟然降臨身上的震駭！「我」只懂喃喃抱怨著……「死亡……怎可能在頃刻間無聲的發生在我的身上？我怎能這樣年輕就離開塵世步向死亡呢？」


    那刻「我」只感到彷徨困頓，突然意識間傳來一個明確清亮的意念指引……


    > 「從過去到現在，這眼前光景對你來說不應感到陌生！這當前一切現象，你其實亦曾經歷過無數遍！因此這刻你應收攝心神，並將萬緣放下，準備投向這個光明匯聚的空間內……！」


    當下我卻感到千般不願，對自己在世間白走一圈深感愧疚，並立時想起兒時那回夢中計算「黑白罈子」的啟示！又念想到剛出生時在心靈間向母親所許下……對其照料一生的諾言未能實踐感到悲傷！當顧念到還有很多人世責任'
