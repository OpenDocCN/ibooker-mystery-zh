- md: '# 第一章：牛下童年


    格床上趕至門前，並且迅速打開家門將女孩營救進內。可是當我把大門關上回頭察看之際，卻發覺渾身濕透的小女孩早把家中地板弄得泥濘髒亂，這令我即時憂慮明早起床定必招致父母責備……責備我何解於深宵時分將街外小孩迎進屋內！正感徬徨如何是好之際，只見小女孩卻迅速步進房間，並一骨碌的鑽進父母床中的暖被窩內！我冷不防有此情況出現，當然拼命地從後緊捉著女孩的雙腳只想將她強拉出來！可是剎那間卻從被窩中閃現出一團強光把女孩吸扯進光裡去，而我卻被強光反過來推彈在外……


    ********


    我驚遽地爬起身時竟發現原來已是第二朝早晨！此時此刻果真令我一時間摸不著頭腦般滿是疑問……內心更不斷自忖何解我竟還在高架床上？但一想到昨晚濕透的小女孩時，我已急嚷著請求父親把我抱回地面，並隨即衝至大門旁查看昨晚被弄至泥濘狼藉的地板景況。但此刻我卻發覺並沒半點雨水和泥濘，於是我又立刻跑至父母的被窩和廚廁尋找，試圖尋找昨晚逃躲進來、濕透的女孩之蹤影，可是卻竟然一無所獲。


    由於昨晚的經歷著實匪夷所思，再加上心中亦對某些細節感到眩惑迷離……例如：我竟然能夠獨自來回高架床不用父母協助？還有竟然不用鎖匙就能打開上鎖的家門……？


    如是者日子又再飛快的溜至多月後，某天外婆忽然從觀塘搬來跟我們住上幾天；她還特意告誡著我不要老是嚷著要求母親抱抱，而是應該讓母親多些時間休息……！另外，外婆還不時向我詢問一些奇怪問題……如：「你快要做姊姊，將要做二家姐啦！」後來當我意會到快將擁有這個新名銜時，心中頓然感到無比神氣和興奮！當然立刻追問外婆何解時，外婆隨即表示：「因你媽肚中藏著一個小孩子，定是一個小男孩……是你的親弟弟呢！」當聽到原來母親腹中藏著一個小孩時，令我立刻意會到……這定是早前半夜闖進家門、濕透的女孩！於是我滿心興奮的跟母親說：「原來當晚她是躲進媽媽的肚中，怪不得我找了多天也找不到她呢！」接著我還急嚷著：「媽媽肚中的不是弟弟，而是妹妹！還是個身穿紅棉襖的小妹妹！」聽罷外婆和母親已即時著我不要亂說話，應立即向地主伯伯祈求送一個弟弟至家門！


