    # 汀九海灘


    自從父親購置一部稱為「錢七」的二手房車後，他於晚間兼做白牌生意以圖增加收入；因此我們跟父親相處和見面的日子漸少，故在某些假期他總會抽空帶我們一家到新界郊遊。


    某次父母帶同我們到新界汀九海灘游泳。由於這是我們小孩間第一次接觸沙灘大自然，對這次到海邊暢泳感到既興奮又陌生，可是我在剛開始不久即被海水嗆著連飲幾口後，我竟是第一個嚷著要回家的人！相反姊姊隨父親在海灘另一邊玩得不亦樂乎，而我卻成了這次舉家郊遊的掃興傢伙！故此母親邊哄邊拉的將我和三妹安頓在海灘一個淺水的石堆旁玩耍。當時石堆上布滿擁擠忙亂的蟻群，母親為使我們盡快克服對海水的恐懼，於是提議我們試將海水濺向石堆上的螞蟻……於是我們三人齊齊在玩著濺潑螞蟻落水的遊戲，就在我們玩得極為興起的時候，我卻驚見頭頂上空突然閃現出一個透閃著銀光的意念光球，光球中竟傳來一把女性聲音……大意像是慨嘆我……何以相隔這麼短時日……竟在玩著這種「殺生」遊戲！我當下即從心底湧出一股無名的內疚與慚愧情感來，再眼看那些被沖掉落水的螞蟻在水上多番掙扎的情景時，我心中即時感到非常後悔和害怕，只懂依偎在母親身旁尋找安慰並要求離開！


    就在我們玩至中午過後，但覺晴空驟變擔心隨時會下起大雨，於是我們只好收拾行裝提早回家。而父親總會在回程時順道接載些散客出市區，這既可幫補生計亦可減省燃油開支，實屬一舉兩得的妙法！而每次我和姊姊總會沿路為父親留意，如發覺誰人在路上揮手截車；總會第一時間通知父親，我們小姊妹都視這爭先匯報行動為遊戲之一。但每次姊姊定會眼明口快的第一時間知會父親，她總能得到父母第一時間稱讚！在我心中暗忖定要加倍留心路上的截車情況，定要給父母看看我的能耐！


    還記得當車輛行經青山公路時，眼看車窗外的雨水越落越大，故此望向窗外的視線亦變得矇矓，但是沿路上我亦不敢鬆懈的掃視著路旁位置。就在一個彎位過後我看見路旁樹蔭下，站著一個背負著嬰兒的婦人向著我們揮手。她當其時只穿著單薄衣衫；而且全身早被雨水打得濕透，外表看來像是剛從鄉下到來尋親的村婦模樣。我隨即通知父親路旁有一個背負嬰兒的女人，正向著我們揮手。父母親即時循我所指的方向望去時，卻未有發現我所指的一切；我當時意會為可能是他們坐在車輛前方位置，並未如我在後排位置所看得清楚！


    但是，在接著的沿路上，我發現兩旁揮手的人群漸多；何解父母又沒看見，而姊姊卻不知會父親停車載客？此刻我終按捺不住向父母提出，但母親在思索一會後隨即在父親耳邊悄悄說了一些話後，就命我應在車上好好安睡養神和不要再亂說話！而姊姊亦狐疑著說，下這麼大雨又怎會有人還危站在公路上截車呢……還取笑我是否眼花兼愛幻想的毛病又發作呢！


    ********


    後記：說起公路上的其他有趣發現……還記得在九零年代初每逢假日常會途經屯門公路，當時正值這條公路進行拓展改造時期，故此每次經過時；路上總會遇上林林總總因工程而導致的塞車，當年公路兩旁除有不少山石林木外，還見零星民居座落其中。


    那時常在午後黃昏時段，總會看見四名大漢定時出現在公路旁耍麻雀……這是一個光亮景象，有種恍如拍電影外景，打燈般的透亮效果。只見眾人身上都圍著一團藍白光暈。當中最令我深感奇怪的是，這批人的衣飾甚為過時浮誇⋯⋯竟是早年「溫拿樂隊」剛出道時期的髮型衣飾，再加麻雀桌上那盞垂吊著的亮紅觸目的膠燈⋯⋯這是街市常見那種紅燈罩式樣。故此每次老遠途經時心中總會暗忖⋯⋯可能是鄉郊村民衣飾潮流跟市區脫節吧！直至某次發現該段公路因改道而將路旁封了，卻見這枱耍樂人士竟移師至公路中央的行車線中繼續時，這刻我的內心才對此現象提出強烈疑問？


    第一個疑問⋯⋯公路上各車往來頻繁，這麼危險的舉動何以不會招來交警阻止或查問？而麻雀桌上那盞吊燈的電源又從何而來？還有公路中央並沒有任何可供承托此吊燈的物件，但竟可凌空懸掛在半空之中？


    由於這次途經該段路時，因路面相當擠塞的關係；各車輛只能以緩慢的車速前行，所以這回我終可近距離的觀察到這枱耍樂人士的一舉一動和當中細節！我終按捺不住向身旁的友人提出連串疑問，友人竟錯愕地向我表示對此描述並無所見，還表示車窗外只有幽暗泛黃的街燈而已！但我們的對話卻招來車上其他乘客向我投以奇怪目光，這刻我才了解到原來又是舊病發作⋯⋯又跟靈界頻道接通了！


    # 外婆家窗前的鴉烏婆


    雖然之前有過這麼多深刻的靈異經歷，但由始至終小腦袋從沒甚麼靈鬼概念，更不曾意識到這是某種超覺感應！再加上家中長輩只會用嚴苛打罵的態度來管教孩子，致令我每次都將突然出現眼前的「惡靈」解讀為又再遇上……鴉烏公或鴉烏婆吧！


    而這靈異事件是發生於外婆家中留宿的另一次見聞，那是剛升讀小學初年級。自經過那次被驚嚇致發高燒留院事件後，母親已不允我們孩子再到外婆家留宿了！但外婆以再到該區神社還願為由，定要母親批准我再參與觀塘區的盂蘭盆會；故此母親在事前，特意拿出年初時向道壇祈福問事的乩文查看，發現某些月份我是不宜在外留宿……但外婆以她家中和床頭亦同樣貼有道壇符籙，故此已保家宅康寧為由將我接來！而我其實非常喜歡跟外婆一起生活，皆因外婆居所活動空間比較大，還有每朝不用見到父母常因家用問題而吵鬧或對我們打罵的場景！故此我雖在心靈深處對外婆家存有某種畏避的懼怕外，卻從心坎中對慈祥的外婆懷有無比的親切感！


    在一連多天的祭祀活動過後，外婆家中亦宴請過幾次三舅帶來的同鄉地盤工友，我們兩婆孫亦忙得不亦樂乎！直至某晚因氣溫實在太熱，以至晚間難以入睡，因此外婆只好順應要求，與我一同遷至隔壁那擁有兩扇大窗的房間。


    就在我們睡至深宵某時，忽從睡夢中感到一股來意不善的情緒襲來，因此我隨即從夢中乍醒，卻赫然驚見床側窗外的平台上；站著一個氣色灰暗且顴骨高峭的「鴉烏婆」，正怒瞪著我（註：此窗外設有一組僭建的鳥籠式平台）！


    這個不時出現在外婆睡房窗前的陰沉女人，這夜卻厲色怒目的徘徊在窗外，卻不像過去般只是閃退於窗邊消失！只見這「鴉烏婆」瞬間飄閃至床尾窗邊時，這刻我才清楚看見其身上所穿的竟是一套中式的大紅裙褂，並且在髮髻上還插戴著一朵枯黑的乾玫瑰……（註：現回想其外貌，像是舊日那些中年蜑家婦人模樣）。當時只見這「老新娘」一手抓著窗花；一手不斷地向我身處的方向伸抓過來，而我早已被那不斷伸延亂抓的血紅十指嚇煞得……只懂瑟縮在床邊驚泣！我不停地推拉著睡在身旁的外婆快些醒來，可惜外婆卻狀如逝去似的一直昏睡，這刻我又再陷入絕望的震慄哀戚中……只感到無比孤寂和無助！


    就在這絕望的當下，突然從廳外闖進一形貌醜惡的矮老頭；老頭穿著一襲中式的黑短布衣，身高卻跟西方童話故事書中所描述的小矮人相似⋯⋯但卻是邪惡版！其頭顱比例雖跟成年人相若，下顎卻出奇地長至胸膛位置。矮老頭看來像對此刻情景感到甚為興奮雀躍，因此在床邊不停地報以幸災樂禍的譏笑！這刻我心中只感到無比驚遽和悔恨⋯⋯定是因我不聽母親說話，硬要到外婆家留宿而招致「鴉烏婆」前來捉拿不乖的小孩！我只有絕望地央求著「鴉烏婆」不要逮捉，並承諾會用功學習⋯⋯！幾經掙扎終捱至天亮時，外婆被我再三推拉才驚醒起床，並發覺我滿面涕淚並發著高熱！於是立即到藥房買來藥片給我服用，外婆還嘀咕著這定必招來母親怪責，並擔心會案件重演又再出入醫院！後來我對外婆表示昨晚窗外驚現前來捉拿小孩的「老新娘——鴉烏婆」後，外婆便立刻備上香燭祭品，在其家門前的地主神位上香跪拜，祈請保佑家宅安寧！可是這時我卻赫然發現昨晚那矮老頭竟從大門後的暗角閃出，然後大搖大擺地端坐在地主神位內。這實在是我萬沒想到的現象⋯⋯怎麼外婆家的地主公和我家所出現的親切地主伯伯不同？！此刻我才回想起某次因外婆忙於抹地，命我暫至窗外平台上安坐，留待地板吹乾後再返回客廳。就在我經過平台門邊時，眼前突然閃現這矮老頭的情景⋯⋯他躲伏在門邊把我一腳踢跌在地後，還歡喜得不停地頓足竊笑後才消失！當天雖是陽光普照的中午，可是我早已對這迷亂陰森的環境感到無比不安和懼怕，所以我已即時嚷著要趕回牛下家中。


    後來我曾就此事向家中的地主伯伯查詢……何解外婆家中的地主公卻是惡老頭？地主伯伯告知那是以吸取陽居人「命氣」來賴以為生的地精……地綁靈而已。


    ********


    後記：此靈異經歷中所發現的大紅裙褂怨靈，是穿著一套舊日的黑褂紅裙衣飾。當年我的小腦袋只意會為……「老新娘裝扮的鴉烏婆」！直至小學四年級，平生第一次參加長輩的出殯儀式時……那是慈祥的大伯娘去世的喪禮。我才發現這原來是傳統潮州女性長輩的壽衣式樣。此刻我才憶起……那經常盤踞在外婆家窗外的「鴉烏婆新娘」，原來其身上所穿的是整套「殮葬壽衣」！現在回想這可真是傻有傻福的得著，慶幸那時思想單純懵懂，面對那些驚嚇現象時，內心亦不存在沉鬱的傷害！


    至於那類形貌醜惡的矮老頭……我將其謔稱為「魔界小矮人」。在過去亦曾在很多地方發現過這類山野精靈的蹤影……記得小時候父母曾帶我們郊遊時，曾發現在慈雲山一帶山邊；某些道觀和廟宇的樹叢林木間，亦寄居著不少這類「邪惡的矮小地精」；當然還有別的小白狐與新舊靈體，這亦令我深深感受到那一帶的熱鬧喧雜！


    關於「地精」現象，現回想令我有些慨嘆……何解西方的地精傳說多帶純真善良的色彩？反觀我們亞洲一帶的地精卻多是這類帶著陰沉邪惡現象！這時「守護靈導師」傳來一個答案……西方精靈大多居於原始無染的森林中，大多吸取山林植物靈氣！反觀我們這方一帶的地精，卻以吸取活人命氣為主；在物以類聚相互吸引下，當然會形醜心惡呢！


    這刻卻又令我想起日本動畫大師的《千與千尋》中那位戴著面具的黑衣妖怪！


    # 人世關口


    自從在外婆家帶病回來後，母親為此而對外婆心生埋怨，而父親又為著我時常生病及花錢而感到非常不滿，眼看自己總成家中最不濟的傢伙時內心倍感難受！現回憶那段難堪歲月時，幸獲地主伯伯給予安慰和開解！


    直至某晚睡前，無意間聽到父母私語；訴說我的狀況時，母親暗地向父親抱怨我究竟是甚麼妖怪託世？何解時常招惹靈鬼生病！但父親卻反而認為我該是養不大的孩子，還認為我是來向父母討債的短命兒……當聽到至親這段恍如冰雹雷擊的對話後，在年幼的心靈中頓感失落和愧疚，只想剎那間悄然遠去，不再增添家人煩惱與負累……！


    就在這沉鬱的心結下我的病情又再加重，終日昏眩的發著高熱沉睡。直至某夜在恍惚夢中看見地主伯伯應我的要求，將我帶至其所處的境地去求教智者……因我曾表示對那些「靈異感應」深感負累！


    ******


    於是伯伯帶著我一同到境地去拜會十年一遇的廟會，因為廟會期間會敦請來自傳說中「界外」的「鬼王大士」昇座說法，伯伯告知到其時我定可向其請益求教！於是我們一老一小踏著漆黑的夜路，轉折間來到一個熱鬧喧雜的古典中式建築群……感覺跟我們陽間的大型廟會形式差不多，只是各人的衣著和建築環境比較古舊和樸實。


    其實我的跟隨，在沿路上已招來眾多「境地人」好奇提問，伯伯都一一禮貌應對。當他們發現我這個「陽居人」可能同樣是來自傳說中「界外」時，眾人對我的反應更顯得格外好奇！由於各種前來參與廟會的動機不同，當中大多數都只是湊熱鬧者，當然還有一心諦聽「界外」智者開示的亦為數不少。但當中亦同時流傳著一個聽來令人不安的傳說……話說那些曾諦聽過「鬼王大士」說法的「境地生靈」都會一去不返的在「境地」中消失，故此這亦令不少「境地中人」對此卻步！


    而我由於個子小，早被夾雜在重重的「境地人海」當中，因此伯伯一直把我緊緊的護在身旁。但可惜我們在整個說法時段，均被擠壓在人山人海的喧雜台階外圍；只能遙望遠方盡頭的丁點景況，更遑論能靜參開示和向「鬼王大士」親自求教！眼看法會快將完結而「鬼王大士」亦將返回「界外」時，這刻伯伯終按捺不住把我高舉在其肩上，並高聲向遠方的台上示意有一來自「陽居」的小孩要求幫忙！這時但見台上放射出一道耀眼強光，把我們跟重重的人群中分隔開來，我和伯伯瞬間被吸召進台階前方……這刻我終能一睹據說是來自「界外」智者的真容！當我非常戰戰兢兢、抖震的舉頭上望時，驀然驚見智者原來是一湛藍魁梧的巨人，身形有如山岳般巍峨，其高聳的頭顱髮髻上，還驚現出層層的不同面目！我冷不防被這震懾形貌嚇煞得腦袋只餘一片空白，只有目定口呆地凝視著「鬼王大士」那深邃的蔚藍雙瞳！此刻只感到整體意識在剎那間被攝進其寰宇浩翰的眼波中……幕幕如光速般浮現著投生前我在靈界時空的種種片段！在瞬間回溯中，我從新被提醒此生的重點和學習內容……！但當念及我的出現總是帶給現世父母不安和負累時，我請求「靈界導師」給予另一次的轉世選擇！因自覺在此段投生過程中，某些靈界記憶未被清洗，還有未被刪去的超覺感應！


    就在這「另擇轉世安排」意願提出的一霎，眼前畫面竟轉為一個漆黑中式古老庭園，眼前盡是荒涼的郊野園林景象。當下我的意識和形相，又重新回到現世的小孩身分；並獨自一人在這陌生荒僻的野外尋覓去向出路，轉折間，來到一古舊的中式園林間的牆垣照壁前。（註：這是一面中間築有大圓出口的牆垣，圓門兩旁更刻有芭蕉圖樣的對聯。）這時忽從樹下傳來一把尖細聲音，告知這道拱門是離開「境地」的出口。我隨即應聲尋向，方發覺原來樹下蹲坐著一頭戴尖頂竹笠的瘦弱老頭。（註：只因此人物外形古怪特別，故此在多年後亦對其外貌留有深刻記憶。）只見他吮著一根細長煙斗，兩邊額角均貼著小片圓黑膏貼；頭顱後方還拖著一根小蹺辮，面容尖細如鼠，活像某些書中所描述的清末窮酸書生模樣。老頭對我的來意好像早已洞悉，並告知其司職是看守這「境地」出口的結算官員；任何「境地生靈」定要經他計算過黑白業後（善惡債務）即：外無負債、內無舉貸後方可離開。聽罷，我隨即在心中暗忖……我此生只是一名幾歲孩童，當然是清白無貸的無債眾生！


    頃刻間當前畫面一轉，只見圓門前方的出口已被無數的黑和白色的罈子排排的堵塞著，這是那些外形恍如舊日鄉間的醃醬油用的陶罈。矮老頭早已坐在樹下的案桌前準備清算，細長的木案桌上擺放著毛筆墨硯、算盤和多本結帳數簿。未幾老頭要求我親自點算排在面前的黑白罈子數量！可是我卻發覺在點算期間，眼前的黑白罈子卻在不停地變動轉換，令本來白色為主的罈子，卻剎那間變成黑比白多的現象！我對眼前的變化結果感到無比錯愕，因意會到這代表著此生的黑業比白業還多！我當然對這點算結果感到不公……自忖投生至此只是短短的幾個年頭，何以竟會招來這麼多的人間債務？


    矮老頭對我這暴烈不滿的反應，還是以細慢淡然的態度來回應。他一邊打著算盤結算，一邊徐徐念誦著如經偈般的內容……甚麼未報父母生恩……養育恩……幾錢幾兩、未報天恩地恩……山川靈嶽恩……幾錢幾兩、未報師長教導恩……幾錢幾兩……！聽著聽著，令我不期然感到無比傷心，繼而只懂號啕大哭！矮老頭手執煙斗呼出長煙表示……經結算後發覺我還囤積著大量的人間債務尚未清還，故此我只能重回陽居……就這樣，我又從矇矓昏眩的夢鄉中，慢慢清醒過來！


    ********


    還記得，就在這個快將醒來的迷濛夢境時空中，意識中傳來一清亮的聲音告知……不要灰心懊惱……我們對於這次投生時所遇上的意外感到非常抱歉，但從中卻發覺這是「意料之外」的得著……如日後在生命中段時，我們發覺未能達到「原來」所定的人世學習和體驗時，我們會安排另一轉世組合……將會分別給予三次的「選擇權」（註：這些「人世關口」可藉由意外、病難或壽殁等現象來示現）。事實上我們對你現在堅決離去的心願感到有趣，因在不久的將來，你卻會反過來要求留下呢！況且這人世時空，只如彈指合眼般飛快掠過，一剎那就到此生完結之時……！


    這樣，我又再繼續著……那蹣跚的人世體驗了。


    * * * * * * * *


    自此經歷後，我的通靈現象得以緩和；不再終日跟某些異度空間相連繫。但可惜的是……此還包括在這段齟齬時光中，一直守護著我的「地主伯伯」！直至大病痊癒後的某天清晨，伯伯夫婦忽然再重臨夢中……


    只見伯伯仍是一貫的簡樸布衣，但肩上卻挑著一杆粗布包袱，看來像是要出遠門的樣子。在夢中伯伯跟我說了很多臨別叮嚀……如寄語我將來長大後要對雙親盡孝，出嫁後要對丈夫盡忠對公婆盡賢等……。可是伯伯當時的話語感到萬分莫名，只想伯伯此生一直守護不要分離！


    可是伯伯告知原來當日在「境地法會」見過鬼王大士後，令他和部分鄉人感到無比驚嘆……因窺見到這天外有天的異空境界！此刻才了知到原來「界外」果真是廣闊無垠與明亮！故此決意帶同妻子一起前往……投胎（註：後來我才明白……伯伯那時定是返回「宇宙本源」重新接受淨光啟迪，往生上界）。可是那時年幼的我，內心只感到萬般難受，淒咽著只懂緊攬著伯伯要求他不要離開！伯伯亦語帶不捨的著我應好好在人世學習並上進。臨別前伯伯還告知，特意為我向「境地府君」查探可保我日後平安成長之法……府君告知因我是先天不足月下生之人，由於天地人三氣不均，故此魂頭地氣不足常有飛昇離魂現象出現，所以我應多吃地種根生的食物以長「地氣」。最後伯伯還特意叮囑我不要對陽界說出任何關於異界的見聞，這樣才可保障日後健康成長！我當時只懂不停抽泣與嗚咽，對伯伯所告知的內容更顯得茫然！就在快將天亮之際，伯伯亦顯得有些急迫，此時只見他從衣襟中取出一包大圓粉團，扯曳著奮力地想將粉團強塞進我的嘴內。


    （註：現在回憶……這可能是確保我不會泄漏秘密的方法！）可是在本能反應的驅使下，卻被我不停地掙扎推開！就在我不斷揮舞手腳掙扎的同時，矇矓間亦傳來清晨鬧鐘連番催鬧的聲音，剎那間我又從這深刻而荒誕的夢境中醒來了！


    早上母親還是如常一貫的急性子，她不停的催促著我們起床梳洗上學。我還記得那刻從迷離的夢境中醒過來後，思緒間還帶著強烈的淒泣情緒！只因害怕急躁的母親責難，故此我稍為定神後就趕緊的走向鏡前梳洗。可是此刻我才意會到……何解早上醒來發覺呼吸間有些不順暢？我隨即轉向身旁的姊姊查問何解？姊姊瞄了我一眼後以不屑的態度告知：「定是你昨晚頑皮，把紙卷塞進了自己右鼻孔還不自知，還不快快將它取出！」聽罷我隨即轉看鏡前，竟發現右鼻孔被某些不明異物堵著！我當然第一時間將其清理，可是在心靈間還不斷的浮現著剛才與地主伯伯臨別的夢境！


    ********


    後記：自此以後地主伯伯真的不曾入夢，看來他和妻子和某些境地鄉人正如臨別夢示所提及……已跟隨那來自「界外」智者「鬼王大士」的靈光照引重新上路，投進一個靈性覺性更高的境界中！


    回首那段發生在幼年時光的種種危難困境，幸得伯伯'
  mdcn: '飾和行徑中推敲……這是早期廣東沿海一帶對戲班中人的統稱。


    另外，由於跟小男孩是同鄉關係，故此長輩們在年頭往道壇祈福問事時，乩文早已告誡我們不要接收任何陌生人給予的食物和用品，但在此事件發生後我才意會到，這告誡原來還包括在「夢中」亦不可犯禁呢！


    而另一個令我深感好奇的是夢中白衣姐姐所示的家門所在地，這是由地面至九樓的升降機位置；原因是當年這類舊式屋村並不是每層都設有升降機直達，而我家所屬的低層……此位置只是一個表面是牆壁內裡卻是一個密閉的升降機槽空間。對於這些內部中空的密封式結構，我發現很多時卻成為某些靈異生物的神秘空間出入口！


    在我現職的工作地點亦同樣出現這類現象！從多年觀察所了解……如家居環境同遇這些位置時，請盡量不要在這些牆垣那方放置睡床或座椅，免得與某些異界生物撞個正著呢！


    # 汀九海灘


    自從父親購置一部稱為「錢七」的二手房車後，他於晚間兼做白牌生意以圖增加收入；因此我們跟父親相處和見面的日子漸少，故在某些假期他總會抽空帶我們一家到新界郊遊。


    某次父母帶同我們到新界汀九海灘游泳。由於這是我們小孩間第一次接觸沙灘大自然，對這次到海邊暢泳感到既興奮又陌生，可是我在剛開始不久即被海水嗆著連飲幾口後，我竟是第一個嚷著要回家的人！相反姊姊隨父親在海灘另一邊玩得不亦樂乎，而我卻成了這次舉家郊遊的掃興傢伙！故此母親邊哄邊拉的將我和三妹安頓在海灘一個淺水的石堆旁玩耍。當時石堆上布滿擁擠忙亂的蟻群，母親為使我們盡快克服對海水的恐懼，於是提議我們試將海水濺向石堆上的螞蟻……於是我們三人齊齊在玩著濺潑螞蟻落水的遊戲，就在我們玩得極為興起的時候，我卻驚見頭頂上空突然閃現出一個透閃著銀光的意念光球，光球中竟傳來一把女性聲音……大意像是慨嘆我……何以相隔這麼短時日……竟在玩著這種「殺生」遊戲！我當下即從心底湧出一股無名的內疚與慚愧情感來，再眼看那些被沖掉落水的螞蟻在水上多番掙扎的情景時，我心中即時感到非常後悔和害怕，只懂依偎在母親身旁尋找安慰並要求離開！


    就在我們玩至中午過後，但覺晴空驟變擔心隨時會下起大雨，於是我們只好收拾行裝提早回家。而父親總會在回程時順道接載些散客出市區，這既可幫補生計亦可減省燃油開支，實屬一舉兩得的妙法！而每次我和姊姊總會沿路為父親留意，如發覺誰人在路上揮手截車；總會第一時間通知父親，我們小姊妹都視這爭先匯報行動為遊戲之一。但每次姊姊定會眼明口快的第一時間知會父親，她總能得到父母第一時間稱讚！在我心中暗忖定要加倍留心路上的截車情況，定要給父母看看我的能耐！


    還記得當車輛行經青山公路時，眼看車窗外的雨水越落越大，故此望向窗外的視線亦變得矇矓，但是沿路上我亦不敢鬆懈的掃視著路旁位置。就在一個彎位過後我看見路旁樹蔭下，站著一個背負著嬰兒的婦人向著我們揮手。她當其時只穿著單薄衣衫；而且全身早被雨水打得濕透，外表看來像是剛從鄉下到來尋親的村婦模樣。我隨即通知父親路旁有一個背負嬰兒的女人，正向著我們揮手。父母親即時循我所指的方向望去時，卻未有發現我所指的一切；我當時意會為可能是他們坐在車輛前方位置，並未如我在後排位置所看得清楚！


    但是，在接著的沿路上，我發現兩旁揮手的人群漸多；何解父母又沒看見，而姊姊卻不知會父親停車載客？此刻我終按捺不住向父母提出，但母親在思索一會後隨即在父親耳邊悄悄說了一些話後，就命我應在車上好好安睡養神和不要再亂說話！而姊姊亦狐疑著說，下這麼大雨又怎會有人還危站在公路上截車呢……還取笑我是否眼花兼愛幻想的毛病又發作呢！


    ********


    後記：說起公路上的其他有趣發現……還記得在九零年代初每逢假日常會途經屯門公路，當時正值這條公路進行拓展改造時期，故此每次經過時；路上總會遇上林林總總因工程而導致的塞車，當年公路兩旁除有不少山石林木外，還見零星民居座落其中。


    那時常在午後黃昏時段，總會看見四名大漢定時出現在公路旁耍麻雀……這是一個光亮景象，有種恍如拍電影外景，打燈般的透亮效果。只見眾人身上都圍著一團藍白光暈。當中最令我深感奇怪的是，這批人的衣飾甚為過時浮誇⋯⋯竟是早年「溫拿樂隊」剛出道時期的髮型衣飾，再加麻雀桌上那盞垂吊著的亮紅觸目的膠燈⋯⋯這是街市常見那種紅燈罩式樣。故此每次老遠途經時心中總會暗忖⋯⋯可能是鄉郊村民衣飾潮流跟市區脫節吧！直至某次發現該段公路因改道而將路旁封了，卻見這枱耍樂人士竟移師至公路中央的行車線中繼續時，這刻我的內心才對此現象提出強烈疑問？


    第一個疑問⋯⋯公路上各車往來頻繁，這麼危險的舉動何以不會招來交警阻止或查問？而麻雀桌上那盞吊燈的電源又從何而來？還有公路中央並沒有任何可供承托此吊燈的物件，但竟可凌空懸掛在半空之中？


    由於這次途經該段路時，因路面相當擠塞的關係；各車輛只能以緩慢的車速前行，所以這回我終可近距離的觀察到這枱耍樂人士的一舉一動和當中細節！我終按捺不住向身旁的友人提出連串疑問，友人竟錯愕地向我表示對此描述並無所見，還表示車窗外只有幽暗泛黃的街燈而已！但我們的對話卻招來車上其他乘客向我投以奇怪目光，這刻我才了解到原來又是舊病發作⋯⋯又跟靈界頻道接通了！


    # 外婆家窗前的鴉烏婆


    雖然之前有過這麼多深刻的靈異經歷，但由始至終小腦袋從沒甚麼靈鬼概念，更不曾意識到這是某種超覺感應！再加上家中長輩只會用嚴苛打罵的態度來管教孩子，致令我每次都將突然出現眼前的「惡靈」解讀為又再遇上……鴉烏公或鴉烏婆吧！


    而這靈異事件是發生於外婆家中留宿的另一次見聞，那是剛升讀小學初年級。自經過那次被驚嚇致發高燒留院事件後，母親已不允我們孩子再到外婆家留宿了！但外婆以再到該區神社還願為由，定要母親批准我再參與觀塘區的盂蘭盆會；故此母親在事前，特意拿出年初時向道壇祈福問事的乩文查看，發現某些月份我是不宜在外留宿……但外婆以她家中和床頭亦同樣貼有道壇符籙，故此已保家宅康寧為由將我接來！而我其實非常喜歡跟外婆一起生活，皆因外婆居所活動空間比較大，還有每朝不用見到父母常因家用問題而吵鬧或對我們打罵的場景！故此我雖在心靈深處對外婆家存有某種畏避的懼怕外，卻從心坎中對慈祥的外婆懷有無比的親切感！


    在一連多天的祭祀活動過後，外婆家中亦宴請過幾次三舅帶來的同鄉地盤工友，我們兩婆孫亦忙得不亦樂乎！直至某晚因氣溫實在太熱，以至晚間難以入睡，因此外婆只好順應要求，與我一同遷至隔壁那擁有兩扇大窗的房間。


    就在我們睡至深宵某時，忽從睡夢中感到一股來意不善的情緒襲來，因此我隨即從夢中乍醒，卻赫然驚見床側窗外的平台上；站著一個氣色灰暗且顴骨高峭的「鴉烏婆」，正怒瞪著我（註：此窗外設有一組僭建的鳥籠式平台）！


    這個不時出現在外婆睡房窗前的陰沉女人，這夜卻厲色怒目的徘徊在窗外，卻不像過去般只是閃退於窗邊消失！只見這「鴉烏婆」瞬間飄閃至床尾窗邊時，這刻我才清楚看見其身上所穿的竟是一套中式的大紅裙褂，並且在髮髻上還插戴著一朵枯黑的乾玫瑰……（註：現回想其外貌，像是舊日那些中年蜑家婦人模樣）。當時只見這「老新娘」一手抓著窗花；一手不斷地向我身處的方向伸抓過來，而我早已被那不斷伸延亂抓的血紅十指嚇煞得……只懂瑟縮在床邊驚泣！我不停地推拉著睡在身旁的外婆快些醒來，可惜外婆卻狀如逝去似的一直昏睡，這刻我又再陷入絕望的震慄哀戚中……只感到無比孤寂和無助！


    就在這絕望的當下，突然從廳外闖進一形貌醜惡的矮老頭；老頭穿著一襲中式的黑短布衣，身高卻跟西方童話故事書中所描述的小矮人相似⋯⋯但卻是邪惡版！其頭顱比例雖跟成年人相若，下顎卻出奇地長至胸膛位置。矮老頭看來像對此刻情景感到甚為興奮雀躍，因此在床邊不停地報以幸災樂禍的譏笑！這刻我心中只感到無比驚遽和悔恨⋯⋯定是因我不聽母親說話，硬要到外婆家留宿而招致「鴉烏婆」前來捉拿不乖的小孩！我只有絕望地央求著「鴉烏婆」不要逮捉，並承諾會用功學習⋯⋯！幾經掙扎終捱至天亮時，外婆被我再三推拉才驚醒起床，並發覺我滿面涕淚並發著高熱！於是立即到藥房買來藥片給我服用，外婆還嘀咕著這定必招來母親怪責，並擔心會案件重演又再出入醫院！後來我對外婆表示昨晚窗外驚現前來捉拿小孩的「老新娘——鴉烏婆」後，外婆便立刻備上香燭祭品，在其家門前的地主神位上香跪拜，祈請保佑家宅安寧！可是這時我卻赫然發現昨晚那矮老頭竟從大門後的暗角閃出，然後大搖大擺地端坐在地主神位內。這實在是我萬沒想到的現象⋯⋯怎麼外婆家的地主公和我家所出現的親切地主伯伯不同？！此刻我才回想起某次因外婆忙於抹地，命我暫至窗外平台上安坐，留待地板吹乾後再返回客廳。就在我經過平台門邊時，眼前突然閃現這矮老頭的情景⋯⋯他躲伏在門邊把我一腳踢跌在地後，還歡喜得不停地頓足竊笑後才消失！當天雖是陽光普照的中午，可是我早已對這迷亂陰森的環境感到無比不安和懼怕，所以我已即時嚷著要趕回牛下家中。


    後來我曾就此事向家中的地主伯伯查詢……何解外婆家中的地主公卻是惡老頭？地主伯伯告知那是以吸取陽居人「命氣」來賴以為生的地精……地綁靈而已。


    ********


    後記：此靈異經歷中所發現的大紅裙褂怨靈，是穿著一套舊日的黑褂紅裙衣飾。當年我的小腦袋只意會為……「老新娘裝扮的鴉烏婆」！直至小學四年級，平生第一次參加長輩的出殯儀式時……那是慈祥的大伯娘去世的喪禮。我才發現這原來是傳統潮州女性長輩的壽衣式樣。此刻我才憶起……那經常盤踞在外婆家窗外的「鴉烏婆新娘」，原來其身上所穿的是整套「殮葬壽衣」！現在回想這可真是傻有傻福的得著，慶幸那時思想單純懵懂，面對那些驚嚇現象時，內心亦不存在沉鬱的傷害！


    至於那類形貌醜惡的矮老頭……我將其謔稱為「魔界小矮人」。在過去亦曾在很多地方發現過這類山野精靈的蹤影……記得小時候父母曾帶我們郊遊時，曾發現在慈雲山一帶山邊；某些道觀和廟宇的樹叢林木間，亦寄居著不少這類「邪惡的矮小地精」；當然還有別的小白狐與新舊靈體，這亦令我深深感受到那一帶的熱鬧喧雜！


    關於「地精」現象，現回想令我有些慨嘆……何解西方的地精傳說多帶純真善良的色彩？反觀我們亞洲一帶的地精卻多是這類帶著陰沉邪惡現象！這時「守護靈導師」傳來一個答案……西方精靈大多居於原始無染的森林中，大多吸取山林植物靈氣！反觀我們這方一帶的地精，卻以吸取活人命氣為主；在物以類聚相互吸引下，當然會形醜心惡呢！


    這刻卻又令我想起日本動畫大師的《千與千尋》中那位戴著面具的黑衣妖怪！


    # 人世關口


    自從在外婆家帶病回來後，母親為此而對外婆心生埋怨，而父親又為著我時常生病及花錢而感到非常不滿，眼看自己總成家中最不濟的傢伙時內心倍感難受！現回憶那段難堪歲月時，幸獲地主伯伯給予安慰和開解！


    直至某晚睡前，無意間聽到父母私語；訴說我的狀況時，母親暗地向父親抱怨我究竟是甚麼妖怪託世？何解時常招惹靈鬼生病！但父親卻反而認為我該是養不大的孩子，還認為我是來向父母討債的短命兒……當聽到至親這段恍如冰雹雷擊的對話後，在年幼的心靈中頓感失落和愧疚，只想剎那間悄然遠去，不再增添家人煩惱與負累……！


    就在這沉鬱的心結下我的病情又再加重，終日昏眩的發著高熱沉睡。直至某夜在恍惚夢中看見地主伯伯應我的要求，將我帶至其所處的境地去求教智者……因我曾表示對那些「靈異感應」深感負累！


    ******


    於是伯伯帶著我一同到境地去拜會十年一遇的廟會，因為廟會期間會敦請來自傳說中「界外」的「鬼王大士」昇座說法，伯伯告知到其時我定可向其請益求教！於是我們一老一小踏著漆黑的夜路，轉折間來到一個熱鬧喧雜的古典中式建築群……感覺跟我們陽間的大型廟會形式差不多，只是各人的衣著和建築環境比較古舊和樸實。


    其實我的跟隨，在沿路上已招來眾多「境地人」好奇提問，伯伯都一一禮貌應對。當他們發現我這個「陽居人」可能同樣是來自傳說中「界外」時，眾人對我的反應更顯得格外好奇！由於各種前來參與廟會的動機不同，當中大多數都只是湊熱鬧者，當然還有一心諦聽「界外」智者開示的亦為數不少。但當中亦同時流傳著一個聽來令人不安的傳說……話說那些曾諦聽過「鬼王大士」說法的「境地生靈」都會一去不返的在「境地」中消失，故此這亦令不少「境地中人」對此卻步！


    而我由於個子小，早被夾雜在重重的「境地人海」當中，因此伯伯一直把我緊緊的護在身旁。但可惜我們在整個說法時段，均被擠壓在人山人海的喧雜台階外圍；只能遙望遠方盡頭的丁點景況，更遑論能靜參開示和向「鬼王大士」親自求教！眼看法會快將完結而「鬼王大士」亦將返回「界外」時，這刻伯伯終按捺不住把我高舉在其肩上，並高聲向遠方的台上示意有一來自「陽居」的小孩要求幫忙！這時但見台上放射出一道耀眼強光，把我們跟重重的人群中分隔開來，我和伯伯瞬間被吸召進台階前方……這刻我終能一睹據說是來自「界外」智者的真容！當我非常戰戰兢兢、抖震的舉頭上望時，驀然驚見智者原來是一湛藍魁梧的巨人，身形有如山岳般巍峨，其高聳的頭顱髮髻上，還驚現出層層的不同面目！我冷不防被這震懾形貌嚇煞得腦袋只餘一片空白，只有目定口呆地凝視著「鬼王大士」那深邃的蔚藍雙瞳！此刻只感到整體意識在剎那間被攝進其寰宇浩翰的眼波中……幕幕如光速般浮現著投生前我在靈界時空的種種片段！在瞬間回溯中，我從新被提醒此生的重點和學習內容……！但當念及我的出現總是帶給現世父母不安和負累時，我請求「靈界導師」給予另一次的轉世選擇！因自覺在此段投生過程中，某些靈界記憶未被清洗，還有未被刪去的超覺感應！


    就在這「另擇轉世安排」意願提出的一霎，眼前畫面竟轉為一個漆黑中式古老庭園，眼前盡是荒涼的郊野園林景象。當下我的意識和形相，又重新回到現世的小孩身分；並獨自一人在這陌生荒僻的野外尋覓去向出路，轉折間，來到一古舊的中式園林間的牆垣照壁前。（註：這是一面中間築有大圓出口的牆垣，圓門兩旁更刻有芭蕉圖樣的對聯。）這時忽從樹下傳來一把尖細聲音，告知這道拱門是離開「境地」的出口。我隨即應聲尋向，方發覺原來樹下蹲坐著一頭戴尖頂竹笠的瘦弱老頭。（註：只因此人物外形古怪特別，故此在多年後亦對其外貌留有深刻記憶。）只見他吮著一根細長煙斗，兩邊額角均貼著小片圓黑膏貼；頭顱後方還拖著一根小蹺辮，面容尖細如鼠，活像某些書中所描述的清末窮酸書生模樣。老頭對我的來意好像早已洞悉，並告知其司職是看守這「境地」出口的結算官員；任何「境地生靈」定要經他計算過黑白業後（善惡債務）即：外無負債、內無舉貸後方可離開。聽罷，我隨即在心中暗忖……我此生只是一名幾歲孩童，當然是清白無貸的無債眾生！


    頃刻間當前畫面一轉，只見圓門前方的出口已被無數的黑和白色的罈子排排的堵塞著，這是那些外形恍如舊日鄉間的醃醬油用的陶罈。矮老頭早已坐在樹下的案桌前準備清算，細長的木案桌上擺放著毛筆墨硯、算盤和多本結帳數簿。未幾老頭要求我親自點算排在面前的黑白罈子數量！可是我卻發覺在點算期間，眼前的黑白罈子卻在不停地變動轉換，令本來白色為主的罈子，卻剎那間變成黑比白多的現象！我對眼前的變化結果感到無比錯愕，因意會到這代表著此生的黑業比白業還多！我當然對這點算結果感到不公……自忖投生至此只是短短的幾個年頭，何以竟會招來這麼多的人間債務？


    矮老頭對我這暴烈不滿的反應，還是以細慢淡然的態度來回應。他一邊打著算盤結算，一邊徐徐念誦著如經偈般的內容……甚麼未報父母生恩……養育恩……幾錢幾兩、未報天恩地恩……山川靈嶽恩……幾錢幾兩、未報師長教導恩……幾錢幾兩……！聽著聽著，令我不期然感到無比傷心，繼而只懂號啕大哭！矮老頭手執煙斗呼出長煙表示……經結算後發覺我還囤積著大量的人間債務尚未清還，故此我只能重回陽居……就這樣，我又從矇矓昏眩的夢鄉中，慢慢清醒過來！


    ********


    還記得，就在這個快將醒來的迷濛夢境時空中，意識中傳來一清亮的聲音告知……不要灰心懊惱……我們對於這次投生時所遇上的意外感到非常抱歉，但從中卻發覺這是「意料之外」的得著……如日後在生命中段時，我們發覺未能達到「原來」所定的人世學習和體驗時，我們會安排另一轉世組合……將會分別給予三次的「選擇權」（註：這些「人世關口」可藉由意外、病難或壽殁等現象來示現）。事實上我們對你現在堅決離去的心願感到有趣，因在不久的將來，你卻會反過來要求留下呢！況且這人世時空，只如彈指合眼般飛快掠過，一剎那就到此生完結之時……！


    這樣，我又再繼續著……那蹣跚的人世體驗了。


    * * * * * * * *


    自此經歷後，我的通靈現象得以緩和；不再終日跟某些異度空間相連繫。但可惜的是……此還包括在這段齟齬時光中，一直守護著我的「地主伯伯」！直至大病痊癒後的某天清晨，伯伯夫婦忽然再重臨夢中……


    只見伯伯仍是一貫的簡樸布衣，但肩上卻挑著一杆粗布包袱，看來像是要出遠門的樣子。在夢中伯伯跟我說了很多臨別叮嚀……如寄語我將來長大後要對雙親盡孝，出嫁後要對丈夫盡忠對公婆盡賢等……。可是伯伯當時的話語感到萬分莫名，只想伯伯此生一直守護不要分離！


    可是伯伯告知原來當日在「境地法會」見過鬼王大士後，令他和部分鄉人感到無比驚嘆……因窺見到這天外有天的異空境界！此刻才了知到原來「界外」果真是廣闊無垠與明亮！故此決意帶同妻子一起前往……投胎（註：後來我才明白……伯伯那時定是返回「宇宙本源」重新接受淨光啟迪，往生上界）。可是那時年幼的我，內心只感到萬般難受，淒咽著只懂緊攬著伯伯要求他不要離開！伯伯亦語帶不捨的著我應好好在人世學習並上進。臨別前伯伯還告知，特意為我向「境地府君」查探可保我日後平安成長之法……府君告知因我是先天不足月下生之人，由於天地人三氣不均，故此魂頭地氣不足常有飛昇離魂現象出現，所以我應多吃地種根生的食物以長「地氣」。最後伯伯還特意叮囑我不要對陽界說出任何關於異界的見聞，這樣才可保障日後健康成長！我當時只懂不停抽泣與嗚咽，對伯伯所告知的內容更顯得茫然！就在快將天亮之際，伯伯亦顯得有些急迫，此時只見他從衣襟中取出一包大圓粉團，扯曳著奮力地想將粉團強塞進我的嘴內。


    （註：現在回憶……這可能是確保我不會泄漏秘密的方法！）可是在本能反應的驅使下，卻被我不停地掙扎推開！就在我不斷揮舞手腳掙扎的同時，矇矓間亦傳來清晨鬧鐘連番催鬧的聲音，剎那間我又從這深刻而荒誕的夢境中醒來了！


    早上母親還是如常一貫的急性子，她不停的催促著我們起床梳洗上學。我還記得那刻從迷離的夢境中醒過來後，思緒間還帶著強烈的淒泣情緒！只因害怕急躁的母親責難，故此我稍為定神後就趕緊的走向鏡前梳洗。可是此刻我才意會到……何解早上醒來發覺呼吸間有些不順暢？我隨即轉向身旁的姊姊查問何解？姊姊瞄了我一眼後以不屑的態度告知：「定是你昨晚頑皮，把紙卷塞進了自己右鼻孔還不自知，還不快快將它取出！」聽罷我隨即轉看鏡前，竟發現右鼻孔被某些不明異物堵著！我當然第一時間將其清理，可是在心靈間還不斷的浮現著剛才與地主伯伯臨別的夢境！


    ********


    後記：自此以後地主伯伯真的不曾入夢，看來他和妻子和某些境地鄉人正如臨別夢示所提及……已跟隨那來自「界外」智者「鬼王大士」的靈光照引重新上路，投進一個靈性覺性更高的境界中！


    回首那段發生在幼年時光的種種危難困境，幸得伯伯'
