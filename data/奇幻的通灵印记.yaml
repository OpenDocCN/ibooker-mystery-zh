  md: '在生命多段的生關死劫磨煉中，總能得到靈界導師給予一次又一次的幫忙和導引。在其循循善誘的教導和鼓勵下，藉著靈魂出竅的方式帶領下；穿越不同時空次元，從而了知生命架構的真實義！從多年的超覺感應體驗下，更令我確切認知到除卻塵世之外，果真還存在著萬千的意識層次空間。故此我對人世間的得失際遇看得淡然，卻對寰宇浩翰的世外感到無比嚮往！


    而我自知這些異世經歷並不為各人所接受和了解，故此多年來我選擇三緘其口，並無打算對外公開！然而當看見每天的報章、電視總會報導著林林總總的自殺、他殺、意外，或因宗教仇恨而引致的報復殺戮及人禍戰爭的新聞後，內心只感到莫名的悲慟和嘆息！對那些輕易放棄自身生命的人感到惋惜！對那些輕易殘害別人性命的人感到難過和痛恨！


