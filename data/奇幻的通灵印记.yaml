    # 平武報恩寺


    當年對中國大陸的名城歷史認識不多，大多只從電視內容中了解；特別是當年電視上首播中日合作節目《絲綢之路》後，再加上適逢大陸改革開放時期，因此在港人心中掀起一陣到國內旅遊探索的熱潮。故此在年青時經常參與友儕間的長短途旅遊，大多以背包自由行模式進行；沿途上既可結識到不同國籍的背包客，又可隨意組合成員或行程，實屬與一般旅行社所議訂的遊覽模式來得充實和經濟。


    而這篇奇幻經歷是發生在某年到國內旅遊時的見聞（大約八零年代中後期）。計劃初期本來只和好友二人結伴到北京、西安及四川旅遊，但在臨出發前三天因大姊表示有興趣參與，所以我們才結伴同遊。


    我們先從北京出發再至西安，尾站就是四川成都。沿路上我們都玩得非常盡興！及至四川第二天，我們被一群新結識的背包客游說組團到九寨溝參觀；由於當年「九寨溝」屬新開發的旅遊景點。那時候前往此方的遊客，大多只有歐美及日本的背包客為主；因此當地的旅行社亦想藉此次成團來增加本身的叫賣力和生意額，所以無論在司機及汽車安排上均令人感到滿意。因此第三天我們一行人便'
  - '[PAGE 175]


    # 奇幻的

    通靈印記


    興致勃勃地往四川的市郊進發！


    可是當車行不久，我的內心卻無故地生起某些不安的驚悸感覺；由於這些不祥感應對我來說並不陌生，因此我的內心早已對此行抖擻精神，並暗自為這趟旅程沿途默禱！


    當汽車行至都江堰往二王廟參觀後打算離開時，我應友人要求為其在一道吊橋上拍照留影，卻發覺在我按下相機快門一霎，鏡頭前竟閃出一團強烈白光。我當下意會為相機閃燈問題，並主動向友人提問……何故這手動相機，會無故自閃？而一直站於鏡頭前的友人和大姊，卻對我的提問感到相當不解；並異口同聲表示剛才並沒有出現甚麼閃光云云！由於要趕車程關係我對此亦不再細問，可是當再踏上汽車準備再次開行時，早前那不安的感覺卻又再無故襲來，並感到比早前的反應還要來得強烈，此刻我只有不停默念著……觀音心咒「六字大明」！


    及至車行個多小時候後，雖然車上各人一直在嬉戲喧鬧，但我還是閉目默念著六字真言！矇矓間我卻驚見左崖邊山路上，有輛急駛而至的運木機車正高速地迎頭相撞過來！在本能反應驅使下我早被嚇煞得即時張眼驚呼：「小心……前面有輛運木貨車急撞過來，大家快些伏下閃避！」就在我話音剛落的剎那，崖邊的山路上竟如剎那前的心象


    ![](img/ce41a82d030a67335cec9f19d65d152d_175_0.png)


    174'
  - '[PAGE 176]


    畫面一樣，一輛運木貨車突從彎角閃出並急撞過來！幸運地旅遊車司機因早被提醒，因而能夠迅速地將汽車急轉至右邊；但在餘速下我們的汽車卻向著另一方向衝前百米，被擱在山路旁邊斜坡上的一片粟米田中。雖然全車玻璃被撞至粉碎，但因車上各人對此早有防範關係，所以只有坐在客車前方的司機和兩三位乘客擦傷頭手之外，其餘坐在後半部的乘客全都安全無恙，這實屬萬幸和感恩！


    而這篇奇幻經歷所提及的「報恩寺」是位於四川綿陽市平武縣，能到此一遊可說是全因一連串事件後的偶然組合！只因交通意外後旅行社要再安排另一輛客車及司機關係，於是將本來的行程推遲了半天，因此這晚我們只好在臨時途經的平武縣留宿一晚，至此我們才得以順道參觀這個非行程安排下的名勝景點。


    晚飯後我們三人（我、大姊及友人）眼看天色還早，於是提議到離住處不遠的村鎮遊覽。只見這山城一帶沿路上滿目皆是古色古香的街道和舊建築，當中還保留著昔日明清時代的木構風格和布局，因此令我們感到非常雀躍和'
- md: '## 奇幻的通靈印記


    驚喜！就在不知不覺間，我們竟意外地溜至一個令我感到有些眼熟的地方，剎那從心坎間更傳來一陣莫名的震眩感覺！


    由於眼前這組建於明朝中葉時期的「報恩寺」，卻出奇地……在前方位置出現一個格格不入的現代版籃球場！因而令我不期然對此突兀場景欲提出批評話語時，卻突然憶起一個發生在某日清晨的沉常夢境⋯⋯還記得夢醒後我還奇怪夢中的人物組合全是互不相識的安排，因而認為這只是一個虛幻的夢境而已！


    夢中我與大姊及友人來到一個陌生的古樸村落，正當我們欲步向前方一組古老建築參觀時，卻發覺門前廣場竟然建了一個破落的籃球場！並且更看見這組舊建築的圍牆上，被人塗上一系列文革式的政治標語。夢中我對此破壞文物的行徑感到十分氣忿，因此不禁罵道：「怎可能會在此塗上文革標語？大好文物也不懂珍惜，怎能這樣肆意破壞古建築呢？」


    （現實版：此時我決意要跟夢境來個轉變，所以這番話語我刻意不提出，但奇怪地卻改由大姊說出同一番夢中內容！）


    夢中……就在邊行邊說的同時，我們一行人已來到這所古建築的正門前，正當打算從大門外步進參觀時，剎那間畫面一轉……


    眼前所有的人物景致竟全化現為古裝場景。奇怪地……這刻夢中視點亦瞬間轉為以第三身的角度運作……看見一位身穿古時文人衣飾的書生，其身後更有一名童僕為其挑著一杆行李。這名樣子機靈的童僕頭上還紮有幾根細小的紅繩小辮。他們從大門進內後只見書生與場內眾人作揖一番後，就被一位老者迎進院內。


    從夢中情節所見這是一所建築考究的園林寺廟，而這位老者看來像是一位博學儒雅的寺廟住持。從當中的氣氛發覺此日像是舉辦著甚麼值得稱慶的日子（註：夢中感覺像是開光重修的誌慶）。當老住持看見書生出現後，隨即將他迎向園中一組偏殿前，然後向寺中眾人介紹一組矗立在殿內的經塔建築。這組高廣巍峨的「經輪佛塔」全以木榫嵌接作主要結構，當中布局運作非常精緻和講究；但原來這組華美的經塔背後還暗藏著某些內裡玄機！因此老住持急召眾人前來參觀並揭示當中內容……


    ![](img/ce41a82d030a67335cec9f19d65d152d_179_0.png)


    老住持表示……修建此經塔的布局和理念是來自西陲異域……原來此巍峨的經塔內蘊藏三藏十二部正法經典，信眾只須齊心轉動經塔就等同攝受到佛陀正法的智慧功德一樣……！這是老住持體恤到文字學問並不普及，對一般目不識丁的布衣百姓來說，可藉著敬誠轉動經塔的功德……上根者可種下識田間的慧命種子，下根者亦能投生於高廣智慧的府第中，同樣能成就出世間之慧命增長……！只見眾人聽罷隨即爭相上前嘗試將經塔轉動，可是由於這經塔實在壯闊宏偉，因此要結集眾人力量才可將其勉強轉動！


    此時夢中意識對書生身分感到有些好奇，就在這意念生起的剎那間畫面一轉……下雪紛飛的寒冷冬夜，書生聯同各畫師工匠正為寺院某殿的牆垣描繪壁畫，其間所繪畫的內容全以佛經故事為題材。有忙著研磨礦石作為顏料，有忙在火爐邊燒燃樹枝作為描摹之用……從夢中意識瞬間感念到某些人物背景，了解到這些畫匠（包括書生）均是師承自當朝一位著名的御前宮廷畫匠大師。多年來能追隨其門下的學生不多，因此各名山寺院及大宅名樓壁畫的顯赫主人，以能邀得這些畫匠為其府第「增光添彩」為榮。意識間只感到……這些畫師在當時的社會地位上存在著不錯的名聲和地位，是頗受尊敬和器重的人物。


    就在意識瞬間探知過後，夢中畫面又再跳回剛才那熱鬧紛紜……比喻為「初轉法輪」的熱義場景中。這時老住持提議書生也加入這場「初轉法輪」的熱鬧人潮中試試身手？書生自知力有不逮只有微笑婉拒，而是退到一旁對著經塔閉目祈念……願此「法輪初轉」之功德，普及利樂一切有情眾；悉令智慧開顯，澤及布衣婦孺，同登彼岸證菩提……！就在默禱剛過一霎，只見虛空中突然出現祥雲無數，雲上更聳立著手持豎琴的蟒身天女，只見此天女漫舞輕舒並彈奏著美妙清音。這奇異景致還伴隨著無數多彩亮麗的花雨顯現，及後才慢慢從虛空中隱遁消失！寺中眾人皆對這眼前異象讚嘆不已，老住持更欣喜地即時提上一首感念詩！


    ********


    這刻我呆站於廟前回憶著這鮮明夢境，大姊看見我的凝望反應後隨即上前細問，我即向其表示曾在夢中到此一遊！大姊和友人對此亦感到相當好奇，為著證實是否真的如我所見，因此要求我先將寺中布局細說，再由他們入內印證！於是我將寺中布局概況一一說出……當中有一供奉著千手觀音的偏殿，殿內的壁畫是「佛祖涅槃圖」，而另一組會轉動的巨型木經塔則建於另一殿內……及後他們均表示當中布局竟如我所描述的內容一樣，我當然亦對此感到不可思議呢！


    ********


    後記：這個夢境成真的奇幻經歷，對當時的我來說可真是充滿疑竇！只感到當中的一切似是一連串的意外事件下所組合的布局呈現，當時我對此次奇遇所給予的啟示還是迷惑無知！


    ********


    以下是關於「報恩寺」的簡介（摘自「中華百科在線」）：


    報恩寺風景區位於綿陽市平武縣境內，距綿陽市區 184 公里。是目前我國保存最完整的明代古建築群之一。全稱為「敕修報恩寺」，始建於明正統五年（1440 年），完工於天順四年（1446
    年），迄今已有五百六十多年歷史。相傳龍州宣撫司土官僉事王璽圖謀為王，暗地裡仿北京宮殿修造王府，後被朝廷察覺，以「報答皇恩」而奏建改作廟宇，名報恩寺。報恩寺布局結構酷似北京紫禁城，所以又稱「深山王宮」。


    寺院坐西向東，由廣場、山門、鍾樓、天王殿、大悲殿、華嚴藏、大雄寶殿、回廊、碑亭和萬佛閣等主要建築組成，有「深山宮殿」及「小故宮」之稱，在建築史、宗教史和繪畫史上都具有很高的研究價值。寺內佛像造型優美，形象生動，大悲殿的千手觀音，正身是用一根巨大楠木雕成，身後千手千姿百態，美麗壯觀。華嚴殿內的轉輪經藏更是精美絕倫，猶如一座凌空托起的七級浮屠。


    報恩寺更是一座精美絕倫的藝術寶庫，它融建築、雕塑、繪畫等藝術為一爐，為中國罕見。報恩寺內除佛像欣賞外，還有那三百多平方米的精美壁畫最為精彩動人。畫面上有身材高大、情態肅穆的帝王君主。有手捧貢品、端莊秀麗的天神玉女，有體形驃悍、面目猙獰的天王力士。還有兩手合十、神情謙恭的寺廟僧侶。各種人物畫像高達三米，高低錯落，左右顧盼，周圍襯以流雲仙氣，並與閣內供奉的金身佛像有如眾星拱月，前後呼應，動靜相襯，生動地構成了一幅莊嚴的「護法圖」。


    ## 奇幻的通靈印記


    ![](img/ce41a82d030a67335cec9f19d65d152d_183_0.png)


    這批壁畫構圖生動，筆法精鍊，線條流暢，色澤豔麗，窮工極態，真是出神入化。它是報恩寺中的珍貴遺存，也是中國明代壁畫遺產中的精品。據考證閣內全部壁畫均為明代所繪制，採用瀝金貼金和金線描的手法和礦物質顏料，因而至今線條清晰，色澤豔麗，金碧輝煌，完好如初。萬佛閣集建築、雕刻、泥塑、壁畫四種藝術的精華於一處，真是一座「藝術之宮」。


    ## 天山天池


    這回終可一嚐夙願參與「絲綢之路」的遊歷了!因此行是大伙兒的旅程,所以在行程安排上要遷就某些參與者的假期,因此我們選擇從國內直飛新疆首府——烏魯木齊。這可將珍貴的時間和絲路景點把握得更為濃縮,所以第二天我們已到達目的地,並向名聞遐邇的天山天池進發!


    到達天山時已接近黃昏時段,因此我們一行人分別租住由山上「哈薩克族」牧民所主理的蒙古包。當晚我們已感受到當地人的熱情招待,還有來自不同國籍的背包客相互交流旅途上的見聞,這實在是不可多得的珍貴體驗!


    第二天早上,我們應當地人的推介;騎馬登上天山觀看天池美景。這些「哈薩克族」的牧民和嚮導,他們從小訓練已善於策騎不同馬匹;但對於我們城市人來說,驟然面對這種挑戰實在感到壓力,只有在臨出發前簡單地跟隨學習上落馬匹的技巧!由於早前嚮導保證每匹馬都會伴隨一名馬伕照料,因此我們此行便斗膽地跟隨馬隊出發,早把前一晚英國背包客給我們的忠告都忘掉!


    在吃過早飯後,我們興致勃勃地各自騎著馬匹,準備向山上進發。沿路上風景和氣候相當宜人;但可笑是原來我們的馬伕只是一班年紀不超過十歲的男孩。我的馬伕更只有七歲，因此每次上馬；總要我將他抱上馬鞍，他才可操控韁繩！而我後來更發現所策騎的那匹馬，原來是整群馬隊中最不受歡迎的壞分子，常被其他馬兒欺壓因而被咬去一小片耳殼，故此在整個行程當中，我總是滯後和被取笑的一員！在幾經努力下，小馬伕終讓這懶散和任性的馬兒乖乖歸隊，而我亦掏出美味的糖果作為給予小馬伕的獎勵！


    在快將到達位於雪線上的天池路段時，已聽見不遠處傳來天池瀑布的宏亮水聲，我們的心情當然感到相當興奮，期望快些到達……欣賞這名聞遐邇的天池聖景！但由於此段山路相當陡斜，再加上前晚下了一場雨雪關係，因此嚮導要求我們須要各自下馬並徒步登山。其實在馬背上騎了一段時間後，已感到手腳四肢酸軟乏力，再加上山路泥濘早把我的鞋底黏附著一層濕泥，因此漸漸地跟同來的伙伴相去漸遠。還有越接近瀑布，四周的聲音；就只有猛烈的水打岩石聲，因此這刻我並不能聽見前方嚮導和隊友們的提示話語，我只有亦步亦趨地捉緊樹枝小心跟隨。由於太過全神貫注這段險路，卻意外地令我有種處於世外的寧謐感覺！


    可是當我試圖跟著前方隊伍所留下的步伐前行時，卻因手酸腳軟體力不繼下，竟失足從崖邊滑下！由於這意外來得太過突然和迅速，再加上身處澎湃激昂的瀑布旁，因此前方的伙伴並不知道我的境況！當下我的腦袋只餘空白一片，並認定這兒是我葬身之地！就在這絕望念頭生起的一霎，突然感到四周傳來一陣像是「六字大明」梵咒的震弦音頻將我包圍，剎那間竟感到一片光明和輕安！


    正當急速滑落快將掉至崖下之際，在這千鈞一髮間；突然感到腰肋間被一股外來力量從後猛力抓勒，原來有一陌生青年奮力地從後將我抱緊！其實這人當時的處境亦相當危險，只餘一腿勾在一根斷裂的樹幹上，而整個身軀卻倒掛著並用雙手大力地將我抱緊！由於當時我倆都身處險境，同時亦受著崖邊激起的水花沖擦的壓力，如不趕緊召來救援，恐會因體力不支，一同墜於險峻的山崖下！我們奮力地連呼數聲後，崖上的人終於聽到我們的求救聲前來救援，這刻同伴和嚮導才察覺到有人意外墜崖！幾經努力下眾人終把我們拉回崖邊的安全位置，同伴更即時為我們檢查有否受傷，幸運地我們只因驚魂未定，只須攤坐在地上一會就可從新出發。而我亦對本來充滿期待的天池美景頓感興緻失卻！只渾噩觀看一會後，就隨大隊回到山下的營地午飯。


    至營地餐廳同伴為我這次大難不死舉杯祝賀，而我當然要第一時間親自感謝那陌生青年的救命大恩！眾人对青年的敏捷身手讚嘆不已，青年表示本身在電視台是從事特技演出（即俗稱「龍虎舞師」），所以身手一向相當矯健和敏捷。但在言談間，青年卻表示這次能於千鈞一髮出手相救，自己亦感到非常奇怪！原來當時青年並不知道有人意外墜崖，因為一切實在發生得太過無聲無息及瞬間！而他更是另一隊自組行程的三人隊伍，當時他正和兩名伙伴自行登山。在邊行邊談的剎那間只感到背後被人猛力一推，就整個人失重心地向前仆倒；危亂間當然雙手往前亂抓，就這樣他卻意外地把我從後抓住，更在誤打誤撞下做了救人英雄！但眾人都認為這救人經過雖然來得偶然，但總算是成就一件好事，於是由我主動宴請眾人作為報答救命大恩的心意！就這樣我被大家冠上幸運星的暱稱，更取笑我是個傻呵呵的福星！


    ********


    後記：在我的心底對這次意外獲救，感到無比神奇和感恩！亦對年青時那種對每事每物過分樂觀，甚麼事情都只憑一鼓作氣的盲從跟隨；從沒細心衡量自身能力及整體裝備是否配合，就只憑那股熱情亂闖，現在回憶實應為當時年少無知的行徑感到慚愧！


    ## 伊犁庫車


    這是延續絲路之旅的另一個深刻的靈異經歷。我們一行人由新疆首府出發，先後參觀過天山、巴音布魯克和中蘇邊境霍爾果斯，這一站終到達伊犁庫車，並下榻於市郊一間名為「庫車賓館」的四合院式平房。


    到達房間後，看見一批剛退房的港人背包客；正忙於收拾行裝，我們當然相互交流絲路線上的最新情報，並打聽庫車這兒的相關景點資料。但奇怪地這批男女港人卻對我們將入住這兒顯得有些意見，更在言談間不斷要求我們應趁未入黑前趕快尋找別間旅館！由於我們連日來趕車至此已是筋疲力盡，只期待快些來個沐浴更衣一洗多日疲累！所以雖對這賓館的簡陋有所微言，但卻慶幸這回終可找到一間可容納十多人的大房間，更附設一個大浴室，因此對我們來說這是意料之外的得著。對方看見我們還是這麼堅決入住後，只強顏地給我們祝福後，便起行趕午後火車到下一個絲路景點——敦煌進發。臨別前這伙人當中兩名成員因為按捺不住，悄悄告知我們這兒是一處惡靈滿布的荒僻地方！可是卻隨即換來我方同伴取笑這無稽之談！而我當時因趕著清洗髒衣，因此並沒在場了知這些內容！


    後來這兩人只好悻然離開並譏諷著：「不聽老人言，吃虧在眼前！」及後更反過來戲謔：「有緣再見的話，可到下一站敦煌賓館報平安。」


    由於連日來都在旅途中風塵僕僕趕車程，因此這晚是我們一星期以來首個淋浴機會，更要趕在日落前清洗所有髒衣物，所以當晚我們吃過晚飯後各人早已倦極而睡，不消一會已投進沉沉夢鄉！由於入黑後心靈間漸感到有些異樣，在臨睡前這不安感覺更趨明顯：因此我從腦海中默想一團來自宇宙間的光芒，把整個房間都包裹著，然後便安然入睡（註：這是腦際間突然閃現的「結界」靈感）！但睡至深宵時分，門外突然傳來急速的搥門聲……應該用拳打腳踢來形容比較貼切！由於我所睡的位置是靠近房門的第二張床，因此早被這猛烈的搥門聲所驚醒，但由於身軀實在太過疲累；所以我並沒有即時起來，只在心中暗忖……定是賓館服務員晚間給我們送來熱開水！於是我只是惺忪回應「不需要」後又再沉進夢鄉。可是門外的搥門聲卻沒有停止，反而更有加劇趨勢！那刻我只感到非常煩擾並期望睡在近房門的伙伴可代為應付！可是出奇地，睡在房中的十多人這刻卻只餘我一人被吵醒。由於我實在太過睏倦所以在半夢半醒間，心中不期然生起一個異想的折衷念頭……「如可用一半意識安睡、一半意識起床應門那就太完美了！」


    不知不覺間……我終於按捺不住從床上起來，然後氣沖沖地前往應門；可是當房門打開的一霎，我卻驚見門外竟站著一名全身籠罩著一團綠螢光的古代將軍對我怒目而視！只見對方貌似維吾爾族的西方面孔，頭戴一頂飾有翠綠羽毛帽子，腰間更繫有一把綴有七彩寶石的大彎刀，而最特別是其眉毛、鬍鬚和腳上的長靴末端都是呈新月的彎弓形態。同時間從對方的眼神觀照中，更即時感念到怨靈對我滿帶怒意，對我這好管閒事的行徑相當不滿！這深宵怒闖而至的將軍怨靈，更從腰間抽出大刀向我怒刺過來……！


    我冷不防這荒野門外，夜深時分竟佇立著這不速之客！當那彎刀來勢洶洶怒刺過來的一霎，在本能反應下我隨即被嚇至往後急退……但奇怪地我卻感到背後像被一根繩索繫著似的被猛力一抽，剎那間只感到隨即被急扯回床中一震，我竟從床中驚醒過來！


    但不幸地……我卻發現醒來後門外那陣暴烈的叩門聲還在持續，當中更夾雜著不少驚遽哀慟的狗吠聲。此刻我只感到心神震懾，腦袋即時憶起剛才夢境，只好偷偷從床上鑽往門縫下方瞄去，卻發覺漆黑荒野的門外竟透現著眾多晃動的人影，門縫中並滲現著跟夢境相同的綠螢光！我即時被驚嚇得轉往房間另一方向的窗邊眺望，在慘白的窗紗映照下那原是迷濛黑暗的荒野，竟同樣被整片綠螢光芒所籠罩，當中更傳來眾多沸騰人聲、兵器擊打聲和馬嘶奔騰聲……彷彿一場千軍萬馬的古代戰爭正在窗外發生一樣！那刻我的思緒只感到無比震駭和懼怕，只感到童年時那久違的孤寂和害怕的感覺又再驟然襲來！無助的我隨即從腰包取出念珠祈求神靈速至將我救離險地！就在我唸完三篇六字真言後，奇怪地竟頃刻傳來一陣強烈睡意，剎那掉進深沉的夢鄉中直至天亮！


    第二天一覺醒來當然即時探問伙伴昨晚是否睡得安寧，有否被昨晚的叩門聲弄醒？可是房間內的十多位伙伴均表示並無異樣！其中某些伙伴卻反過來向我查問原因，於是我將昨晚所見一一告知！這時伙伴才告知剛入住時那批港人的忠告，並對昨晚那叩門的古代將軍身分和這兒的歷史深感好奇！並提議往賓館餐廳吃早餐時向侍應詢問。可是由於這裡的侍應全是維吾爾族人，只懂應對簡單的漢語，因此我們只勉強打聽到賓館後方是一個古戰場的遺址，於是我們餐後便前往那兒參觀，期望可尋找到某些夢中答案。


    ## 奇幻的通靈印記


    ![](img/ce41a82d030a67335cec9f19d65d152d_191_0.png)


    由於這賓館所處位置荒僻，四周只有後排某些維族圍牆建築；於是我們循此方大門步進，竟發現牆內原來是一整片幅員甚廣的維族墳場，極目所見很多墳墓都顯得破敗不堪，其中更有不少居於附近的維族小童，頑皮地拿出部分墓穴骸骨互相玩擲耍樂！我們都被眼前所見的景象震懾得啞口無言，只見當中最矚目的一所墓室更披掛著不少漂亮的維族墓飾，猜想當中定是埋葬著一位身分特別的墓室主人。我們在外圍環顧一會後，伙伴提議向門前經過的維族人打聽當中資料；可是由於言語上的溝通問題，我們只隱約了解到這墓室主人生前是一名驍勇善戰的部族將領。及後正當打算離開時，我們才發現圍牆外某角懸掛著一塊簡介木牌，內容分別是漢回兩文寫成，此刻我亦終於明瞭昨晚那深邃靈異的夢魘迷團了！


    原來這方原一帶，是發生在清乾隆年間的一場重要戰役的所在地；歷史上稱為乾隆「十全武功」之一的「平定準噶爾及大小和卓之亂」。當年這場廝殺多月的慘烈戰役造成死傷者無數，而這場戰役的所有屍首，亦全被就地埋葬在原來的陣亡地方。


    及後每晚，伙伴們都要求我務必為房間「結界」過後才安心就寢，幸運地再沒發生靈異事件！我們亦同時訪問了其他賓館住客，分別向日本和德國旅客打聽可曾發生過類似現象？但大多表示入住多日並無異樣！往後夥伴們得出的結論是⋯⋯那些戰死的回族亡靈只會對漢人作祟騷擾，因我們與上手港人旅客同樣是——漢人，可能因此而成為被那批「滅族怨靈」所仇隙討伐的對象！


    後記：在完成這一站的遊歷後，我們再暢遊了某些景點，下一回終到達另一個絲路熱點——敦煌。由於當年的自助旅遊書所推介的住宿資料只得寥寥數間，主因改革開放初期國內旅館可供海外遊客選擇的不多；因此大部分絲路旅客都只會進駐熱點推介的某幾間旅館，這回我們亦無意間跟庫車時那批臨別港人重遇上！再度見面時對方已第一時間跑來向我們了解首晚入住後的情況，夥伴們已即時將我的夢境遭遇和古戰場內容告知，眾人聽後無不嘖嘖稱奇！他們這才明白原來賓館後方一帶是古戰場遺址及墳地！


    我們當然反問對方的遇鬼經歷是怎麼一回事⋯⋯原來他們首晚入住後亦同樣遇上不可思議的靈異現象，十多人晚上竟同樣夢見一場廝殺慘烈的古代戰爭，而女性伙伴更感到身體有被性騷擾似的欺壓現象和惡夢連連……！


    ********


    以下是關於「大小和卓之亂」的歷史資料（摘自維基百科）：


    | 項目 | 內容 |

    | :--- | :--- |

    | **事件名稱** | 大小和卓之亂（清代文獻稱之為「平定回部」） |

    | **時間** | 清乾隆二十二年（1757年）起 |

    | **發起人** | 中國新疆回部白山派首領霍集占兄弟（霍集占與波羅尼都） |

    | **背景** | 霍集占與其兄波羅尼都出自中亞伊斯蘭教白山派和卓家族。乾隆二十年（1755年）清軍平定準噶爾後，將被準噶爾囚禁的大小和卓釋放，並派波羅尼都招撫西域天山南路各城。不久阿睦爾撒納反叛，大小和卓乘機控制了新疆西南部一帶。
    |

    | **經過** | 乾隆二十二年（1757年），霍集占殺死清軍副都統阿敏道，舉兵自立。次年（1758年），乾隆皇帝發兵征討霍集占，清軍在庫車、葉爾羌（今莎車）、和闐等地與大小和卓交戰。
    |

    | **結果** | 乾隆二十四年（1759年），大小和卓兵敗西逃，經蔥嶺進入巴達克山（在今阿富汗東北部）境內，被巴達克山首領素勒坦沙擒殺，叛亂遂平。 |'
  mdcn: '## 奇幻的通靈印記


    驚喜！就在不知不覺間，我們竟意外地溜至一個令我感到有些眼熟的地方，剎那從心坎間更傳來一陣莫名的震眩感覺！


    由於眼前這組建於明朝中葉時期的「報恩寺」，卻出奇地……在前方位置出現一個格格不入的現代版籃球場！因而令我不期然對此突兀場景欲提出批評話語時，卻突然憶起一個發生在某日清晨的沉常夢境⋯⋯還記得夢醒後我還奇怪夢中的人物組合全是互不相識的安排，因而認為這只是一個虛幻的夢境而已！


    夢中我與大姊及友人來到一個陌生的古樸村落，正當我們欲步向前方一組古老建築參觀時，卻發覺門前廣場竟然建了一個破落的籃球場！並且更看見這組舊建築的圍牆上，被人塗上一系列文革式的政治標語。夢中我對此破壞文物的行徑感到十分氣忿，因此不禁罵道：「怎可能會在此塗上文革標語？大好文物也不懂珍惜，怎能這樣肆意破壞古建築呢？」


    （現實版：此時我決意要跟夢境來個轉變，所以這番話語我刻意不提出，但奇怪地卻改由大姊說出同一番夢中內容！）


    夢中……就在邊行邊說的同時，我們一行人已來到這所古建築的正門前，正當打算從大門外步進參觀時，剎那間畫面一轉……


    眼前所有的人物景致竟全化現為古裝場景。奇怪地……這刻夢中視點亦瞬間轉為以第三身的角度運作……看見一位身穿古時文人衣飾的書生，其身後更有一名童僕為其挑著一杆行李。這名樣子機靈的童僕頭上還紮有幾根細小的紅繩小辮。他們從大門進內後只見書生與場內眾人作揖一番後，就被一位老者迎進院內。


    從夢中情節所見這是一所建築考究的園林寺廟，而這位老者看來像是一位博學儒雅的寺廟住持。從當中的氣氛發覺此日像是舉辦著甚麼值得稱慶的日子（註：夢中感覺像是開光重修的誌慶）。當老住持看見書生出現後，隨即將他迎向園中一組偏殿前，然後向寺中眾人介紹一組矗立在殿內的經塔建築。這組高廣巍峨的「經輪佛塔」全以木榫嵌接作主要結構，當中布局運作非常精緻和講究；但原來這組華美的經塔背後還暗藏著某些內裡玄機！因此老住持急召眾人前來參觀並揭示當中內容……


    ![](img/ce41a82d030a67335cec9f19d65d152d_179_0.png)


    老住持表示……修建此經塔的布局和理念是來自西陲異域……原來此巍峨的經塔內蘊藏三藏十二部正法經典，信眾只須齊心轉動經塔就等同攝受到佛陀正法的智慧功德一樣……！這是老住持體恤到文字學問並不普及，對一般目不識丁的布衣百姓來說，可藉著敬誠轉動經塔的功德……上根者可種下識田間的慧命種子，下根者亦能投生於高廣智慧的府第中，同樣能成就出世間之慧命增長……！只見眾人聽罷隨即爭相上前嘗試將經塔轉動，可是由於這經塔實在壯闊宏偉，因此要結集眾人力量才可將其勉強轉動！


    此時夢中意識對書生身分感到有些好奇，就在這意念生起的剎那間畫面一轉……下雪紛飛的寒冷冬夜，書生聯同各畫師工匠正為寺院某殿的牆垣描繪壁畫，其間所繪畫的內容全以佛經故事為題材。有忙著研磨礦石作為顏料，有忙在火爐邊燒燃樹枝作為描摹之用……從夢中意識瞬間感念到某些人物背景，了解到這些畫匠（包括書生）均是師承自當朝一位著名的御前宮廷畫匠大師。多年來能追隨其門下的學生不多，因此各名山寺院及大宅名樓壁畫的顯赫主人，以能邀得這些畫匠為其府第「增光添彩」為榮。意識間只感到……這些畫師在當時的社會地位上存在著不錯的名聲和地位，是頗受尊敬和器重的人物。


    就在意識瞬間探知過後，夢中畫面又再跳回剛才那熱鬧紛紜……比喻為「初轉法輪」的熱義場景中。這時老住持提議書生也加入這場「初轉法輪」的熱鬧人潮中試試身手？書生自知力有不逮只有微笑婉拒，而是退到一旁對著經塔閉目祈念……願此「法輪初轉」之功德，普及利樂一切有情眾；悉令智慧開顯，澤及布衣婦孺，同登彼岸證菩提……！就在默禱剛過一霎，只見虛空中突然出現祥雲無數，雲上更聳立著手持豎琴的蟒身天女，只見此天女漫舞輕舒並彈奏著美妙清音。這奇異景致還伴隨著無數多彩亮麗的花雨顯現，及後才慢慢從虛空中隱遁消失！寺中眾人皆對這眼前異象讚嘆不已，老住持更欣喜地即時提上一首感念詩！


    ********


    這刻我呆站於廟前回憶著這鮮明夢境，大姊看見我的凝望反應後隨即上前細問，我即向其表示曾在夢中到此一遊！大姊和友人對此亦感到相當好奇，為著證實是否真的如我所見，因此要求我先將寺中布局細說，再由他們入內印證！於是我將寺中布局概況一一說出……當中有一供奉著千手觀音的偏殿，殿內的壁畫是「佛祖涅槃圖」，而另一組會轉動的巨型木經塔則建於另一殿內……及後他們均表示當中布局竟如我所描述的內容一樣，我當然亦對此感到不可思議呢！


    ********


    後記：這個夢境成真的奇幻經歷，對當時的我來說可真是充滿疑竇！只感到當中的一切似是一連串的意外事件下所組合的布局呈現，當時我對此次奇遇所給予的啟示還是迷惑無知！


    ********


    以下是關於「報恩寺」的簡介（摘自「中華百科在線」）：


    報恩寺風景區位於綿陽市平武縣境內，距綿陽市區 184 公里。是目前我國保存最完整的明代古建築群之一。全稱為「敕修報恩寺」，始建於明正統五年（1440 年），完工於天順四年（1446
    年），迄今已有五百六十多年歷史。相傳龍州宣撫司土官僉事王璽圖謀為王，暗地裡仿北京宮殿修造王府，後被朝廷察覺，以「報答皇恩」而奏建改作廟宇，名報恩寺。報恩寺布局結構酷似北京紫禁城，所以又稱「深山王宮」。


    寺院坐西向東，由廣場、山門、鍾樓、天王殿、大悲殿、華嚴藏、大雄寶殿、回廊、碑亭和萬佛閣等主要建築組成，有「深山宮殿」及「小故宮」之稱，在建築史、宗教史和繪畫史上都具有很高的研究價值。寺內佛像造型優美，形象生動，大悲殿的千手觀音，正身是用一根巨大楠木雕成，身後千手千姿百態，美麗壯觀。華嚴殿內的轉輪經藏更是精美絕倫，猶如一座凌空托起的七級浮屠。


    報恩寺更是一座精美絕倫的藝術寶庫，它融建築、雕塑、繪畫等藝術為一爐，為中國罕見。報恩寺內除佛像欣賞外，還有那三百多平方米的精美壁畫最為精彩動人。畫面上有身材高大、情態肅穆的帝王君主。有手捧貢品、端莊秀麗的天神玉女，有體形驃悍、面目猙獰的天王力士。還有兩手合十、神情謙恭的寺廟僧侶。各種人物畫像高達三米，高低錯落，左右顧盼，周圍襯以流雲仙氣，並與閣內供奉的金身佛像有如眾星拱月，前後呼應，動靜相襯，生動地構成了一幅莊嚴的「護法圖」。


    ## 奇幻的通靈印記


    ![](img/ce41a82d030a67335cec9f19d65d152d_183_0.png)


    這批壁畫構圖生動，筆法精鍊，線條流暢，色澤豔麗，窮工極態，真是出神入化。它是報恩寺中的珍貴遺存，也是中國明代壁畫遺產中的精品。據考證閣內全部壁畫均為明代所繪制，採用瀝金貼金和金線描的手法和礦物質顏料，因而至今線條清晰，色澤豔麗，金碧輝煌，完好如初。萬佛閣集建築、雕刻、泥塑、壁畫四種藝術的精華於一處，真是一座「藝術之宮」。


    ## 天山天池


    這回終可一嚐夙願參與「絲綢之路」的遊歷了!因此行是大伙兒的旅程,所以在行程安排上要遷就某些參與者的假期,因此我們選擇從國內直飛新疆首府——烏魯木齊。這可將珍貴的時間和絲路景點把握得更為濃縮,所以第二天我們已到達目的地,並向名聞遐邇的天山天池進發!


    到達天山時已接近黃昏時段,因此我們一行人分別租住由山上「哈薩克族」牧民所主理的蒙古包。當晚我們已感受到當地人的熱情招待,還有來自不同國籍的背包客相互交流旅途上的見聞,這實在是不可多得的珍貴體驗!


    第二天早上,我們應當地人的推介;騎馬登上天山觀看天池美景。這些「哈薩克族」的牧民和嚮導,他們從小訓練已善於策騎不同馬匹;但對於我們城市人來說,驟然面對這種挑戰實在感到壓力,只有在臨出發前簡單地跟隨學習上落馬匹的技巧!由於早前嚮導保證每匹馬都會伴隨一名馬伕照料,因此我們此行便斗膽地跟隨馬隊出發,早把前一晚英國背包客給我們的忠告都忘掉!


    在吃過早飯後,我們興致勃勃地各自騎著馬匹,準備向山上進發。沿路上風景和氣候相當宜人;但可笑是原來我們的馬伕只是一班年紀不超過十歲的男孩。我的馬伕更只有七歲，因此每次上馬；總要我將他抱上馬鞍，他才可操控韁繩！而我後來更發現所策騎的那匹馬，原來是整群馬隊中最不受歡迎的壞分子，常被其他馬兒欺壓因而被咬去一小片耳殼，故此在整個行程當中，我總是滯後和被取笑的一員！在幾經努力下，小馬伕終讓這懶散和任性的馬兒乖乖歸隊，而我亦掏出美味的糖果作為給予小馬伕的獎勵！


    在快將到達位於雪線上的天池路段時，已聽見不遠處傳來天池瀑布的宏亮水聲，我們的心情當然感到相當興奮，期望快些到達……欣賞這名聞遐邇的天池聖景！但由於此段山路相當陡斜，再加上前晚下了一場雨雪關係，因此嚮導要求我們須要各自下馬並徒步登山。其實在馬背上騎了一段時間後，已感到手腳四肢酸軟乏力，再加上山路泥濘早把我的鞋底黏附著一層濕泥，因此漸漸地跟同來的伙伴相去漸遠。還有越接近瀑布，四周的聲音；就只有猛烈的水打岩石聲，因此這刻我並不能聽見前方嚮導和隊友們的提示話語，我只有亦步亦趨地捉緊樹枝小心跟隨。由於太過全神貫注這段險路，卻意外地令我有種處於世外的寧謐感覺！


    可是當我試圖跟著前方隊伍所留下的步伐前行時，卻因手酸腳軟體力不繼下，竟失足從崖邊滑下！由於這意外來得太過突然和迅速，再加上身處澎湃激昂的瀑布旁，因此前方的伙伴並不知道我的境況！當下我的腦袋只餘空白一片，並認定這兒是我葬身之地！就在這絕望念頭生起的一霎，突然感到四周傳來一陣像是「六字大明」梵咒的震弦音頻將我包圍，剎那間竟感到一片光明和輕安！


    正當急速滑落快將掉至崖下之際，在這千鈞一髮間；突然感到腰肋間被一股外來力量從後猛力抓勒，原來有一陌生青年奮力地從後將我抱緊！其實這人當時的處境亦相當危險，只餘一腿勾在一根斷裂的樹幹上，而整個身軀卻倒掛著並用雙手大力地將我抱緊！由於當時我倆都身處險境，同時亦受著崖邊激起的水花沖擦的壓力，如不趕緊召來救援，恐會因體力不支，一同墜於險峻的山崖下！我們奮力地連呼數聲後，崖上的人終於聽到我們的求救聲前來救援，這刻同伴和嚮導才察覺到有人意外墜崖！幾經努力下眾人終把我們拉回崖邊的安全位置，同伴更即時為我們檢查有否受傷，幸運地我們只因驚魂未定，只須攤坐在地上一會就可從新出發。而我亦對本來充滿期待的天池美景頓感興緻失卻！只渾噩觀看一會後，就隨大隊回到山下的營地午飯。


    至營地餐廳同伴為我這次大難不死舉杯祝賀，而我當然要第一時間親自感謝那陌生青年的救命大恩！眾人对青年的敏捷身手讚嘆不已，青年表示本身在電視台是從事特技演出（即俗稱「龍虎舞師」），所以身手一向相當矯健和敏捷。但在言談間，青年卻表示這次能於千鈞一髮出手相救，自己亦感到非常奇怪！原來當時青年並不知道有人意外墜崖，因為一切實在發生得太過無聲無息及瞬間！而他更是另一隊自組行程的三人隊伍，當時他正和兩名伙伴自行登山。在邊行邊談的剎那間只感到背後被人猛力一推，就整個人失重心地向前仆倒；危亂間當然雙手往前亂抓，就這樣他卻意外地把我從後抓住，更在誤打誤撞下做了救人英雄！但眾人都認為這救人經過雖然來得偶然，但總算是成就一件好事，於是由我主動宴請眾人作為報答救命大恩的心意！就這樣我被大家冠上幸運星的暱稱，更取笑我是個傻呵呵的福星！


    ********


    後記：在我的心底對這次意外獲救，感到無比神奇和感恩！亦對年青時那種對每事每物過分樂觀，甚麼事情都只憑一鼓作氣的盲從跟隨；從沒細心衡量自身能力及整體裝備是否配合，就只憑那股熱情亂闖，現在回憶實應為當時年少無知的行徑感到慚愧！


    ## 伊犁庫車


    這是延續絲路之旅的另一個深刻的靈異經歷。我們一行人由新疆首府出發，先後參觀過天山、巴音布魯克和中蘇邊境霍爾果斯，這一站終到達伊犁庫車，並下榻於市郊一間名為「庫車賓館」的四合院式平房。


    到達房間後，看見一批剛退房的港人背包客；正忙於收拾行裝，我們當然相互交流絲路線上的最新情報，並打聽庫車這兒的相關景點資料。但奇怪地這批男女港人卻對我們將入住這兒顯得有些意見，更在言談間不斷要求我們應趁未入黑前趕快尋找別間旅館！由於我們連日來趕車至此已是筋疲力盡，只期待快些來個沐浴更衣一洗多日疲累！所以雖對這賓館的簡陋有所微言，但卻慶幸這回終可找到一間可容納十多人的大房間，更附設一個大浴室，因此對我們來說這是意料之外的得著。對方看見我們還是這麼堅決入住後，只強顏地給我們祝福後，便起行趕午後火車到下一個絲路景點——敦煌進發。臨別前這伙人當中兩名成員因為按捺不住，悄悄告知我們這兒是一處惡靈滿布的荒僻地方！可是卻隨即換來我方同伴取笑這無稽之談！而我當時因趕著清洗髒衣，因此並沒在場了知這些內容！


    後來這兩人只好悻然離開並譏諷著：「不聽老人言，吃虧在眼前！」及後更反過來戲謔：「有緣再見的話，可到下一站敦煌賓館報平安。」


    由於連日來都在旅途中風塵僕僕趕車程，因此這晚是我們一星期以來首個淋浴機會，更要趕在日落前清洗所有髒衣物，所以當晚我們吃過晚飯後各人早已倦極而睡，不消一會已投進沉沉夢鄉！由於入黑後心靈間漸感到有些異樣，在臨睡前這不安感覺更趨明顯：因此我從腦海中默想一團來自宇宙間的光芒，把整個房間都包裹著，然後便安然入睡（註：這是腦際間突然閃現的「結界」靈感）！但睡至深宵時分，門外突然傳來急速的搥門聲……應該用拳打腳踢來形容比較貼切！由於我所睡的位置是靠近房門的第二張床，因此早被這猛烈的搥門聲所驚醒，但由於身軀實在太過疲累；所以我並沒有即時起來，只在心中暗忖……定是賓館服務員晚間給我們送來熱開水！於是我只是惺忪回應「不需要」後又再沉進夢鄉。可是門外的搥門聲卻沒有停止，反而更有加劇趨勢！那刻我只感到非常煩擾並期望睡在近房門的伙伴可代為應付！可是出奇地，睡在房中的十多人這刻卻只餘我一人被吵醒。由於我實在太過睏倦所以在半夢半醒間，心中不期然生起一個異想的折衷念頭……「如可用一半意識安睡、一半意識起床應門那就太完美了！」


    不知不覺間……我終於按捺不住從床上起來，然後氣沖沖地前往應門；可是當房門打開的一霎，我卻驚見門外竟站著一名全身籠罩著一團綠螢光的古代將軍對我怒目而視！只見對方貌似維吾爾族的西方面孔，頭戴一頂飾有翠綠羽毛帽子，腰間更繫有一把綴有七彩寶石的大彎刀，而最特別是其眉毛、鬍鬚和腳上的長靴末端都是呈新月的彎弓形態。同時間從對方的眼神觀照中，更即時感念到怨靈對我滿帶怒意，對我這好管閒事的行徑相當不滿！這深宵怒闖而至的將軍怨靈，更從腰間抽出大刀向我怒刺過來……！


    我冷不防這荒野門外，夜深時分竟佇立著這不速之客！當那彎刀來勢洶洶怒刺過來的一霎，在本能反應下我隨即被嚇至往後急退……但奇怪地我卻感到背後像被一根繩索繫著似的被猛力一抽，剎那間只感到隨即被急扯回床中一震，我竟從床中驚醒過來！


    但不幸地……我卻發現醒來後門外那陣暴烈的叩門聲還在持續，當中更夾雜著不少驚遽哀慟的狗吠聲。此刻我只感到心神震懾，腦袋即時憶起剛才夢境，只好偷偷從床上鑽往門縫下方瞄去，卻發覺漆黑荒野的門外竟透現著眾多晃動的人影，門縫中並滲現著跟夢境相同的綠螢光！我即時被驚嚇得轉往房間另一方向的窗邊眺望，在慘白的窗紗映照下那原是迷濛黑暗的荒野，竟同樣被整片綠螢光芒所籠罩，當中更傳來眾多沸騰人聲、兵器擊打聲和馬嘶奔騰聲……彷彿一場千軍萬馬的古代戰爭正在窗外發生一樣！那刻我的思緒只感到無比震駭和懼怕，只感到童年時那久違的孤寂和害怕的感覺又再驟然襲來！無助的我隨即從腰包取出念珠祈求神靈速至將我救離險地！就在我唸完三篇六字真言後，奇怪地竟頃刻傳來一陣強烈睡意，剎那掉進深沉的夢鄉中直至天亮！


    第二天一覺醒來當然即時探問伙伴昨晚是否睡得安寧，有否被昨晚的叩門聲弄醒？可是房間內的十多位伙伴均表示並無異樣！其中某些伙伴卻反過來向我查問原因，於是我將昨晚所見一一告知！這時伙伴才告知剛入住時那批港人的忠告，並對昨晚那叩門的古代將軍身分和這兒的歷史深感好奇！並提議往賓館餐廳吃早餐時向侍應詢問。可是由於這裡的侍應全是維吾爾族人，只懂應對簡單的漢語，因此我們只勉強打聽到賓館後方是一個古戰場的遺址，於是我們餐後便前往那兒參觀，期望可尋找到某些夢中答案。


    ## 奇幻的通靈印記


    ![](img/ce41a82d030a67335cec9f19d65d152d_191_0.png)


    由於這賓館所處位置荒僻，四周只有後排某些維族圍牆建築；於是我們循此方大門步進，竟發現牆內原來是一整片幅員甚廣的維族墳場，極目所見很多墳墓都顯得破敗不堪，其中更有不少居於附近的維族小童，頑皮地拿出部分墓穴骸骨互相玩擲耍樂！我們都被眼前所見的景象震懾得啞口無言，只見當中最矚目的一所墓室更披掛著不少漂亮的維族墓飾，猜想當中定是埋葬著一位身分特別的墓室主人。我們在外圍環顧一會後，伙伴提議向門前經過的維族人打聽當中資料；可是由於言語上的溝通問題，我們只隱約了解到這墓室主人生前是一名驍勇善戰的部族將領。及後正當打算離開時，我們才發現圍牆外某角懸掛著一塊簡介木牌，內容分別是漢回兩文寫成，此刻我亦終於明瞭昨晚那深邃靈異的夢魘迷團了！


    原來這方原一帶，是發生在清乾隆年間的一場重要戰役的所在地；歷史上稱為乾隆「十全武功」之一的「平定準噶爾及大小和卓之亂」。當年這場廝殺多月的慘烈戰役造成死傷者無數，而這場戰役的所有屍首，亦全被就地埋葬在原來的陣亡地方。


    及後每晚，伙伴們都要求我務必為房間「結界」過後才安心就寢，幸運地再沒發生靈異事件！我們亦同時訪問了其他賓館住客，分別向日本和德國旅客打聽可曾發生過類似現象？但大多表示入住多日並無異樣！往後夥伴們得出的結論是⋯⋯那些戰死的回族亡靈只會對漢人作祟騷擾，因我們與上手港人旅客同樣是——漢人，可能因此而成為被那批「滅族怨靈」所仇隙討伐的對象！


    後記：在完成這一站的遊歷後，我們再暢遊了某些景點，下一回終到達另一個絲路熱點——敦煌。由於當年的自助旅遊書所推介的住宿資料只得寥寥數間，主因改革開放初期國內旅館可供海外遊客選擇的不多；因此大部分絲路旅客都只會進駐熱點推介的某幾間旅館，這回我們亦無意間跟庫車時那批臨別港人重遇上！再度見面時對方已第一時間跑來向我們了解首晚入住後的情況，夥伴們已即時將我的夢境遭遇和古戰場內容告知，眾人聽後無不嘖嘖稱奇！他們這才明白原來賓館後方一帶是古戰場遺址及墳地！


    我們當然反問對方的遇鬼經歷是怎麼一回事⋯⋯原來他們首晚入住後亦同樣遇上不可思議的靈異現象，十多人晚上竟同樣夢見一場廝殺慘烈的古代戰爭，而女性伙伴更感到身體有被性騷擾似的欺壓現象和惡夢連連……！


    ********


    以下是關於「大小和卓之亂」的歷史資料（摘自維基百科）：


    | 項目 | 內容 |

    | :--- | :--- |

    | **事件名稱** | 大小和卓之亂（清代文獻稱之為「平定回部」） |

    | **時間** | 清乾隆二十二年（1757年）起 |

    | **發起人** | 中國新疆回部白山派首領霍集占兄弟（霍集占與波羅尼都） |

    | **背景** | 霍集占與其兄波羅尼都出自中亞伊斯蘭教白山派和卓家族。乾隆二十年（1755年）清軍平定準噶爾後，將被準噶爾囚禁的大小和卓釋放，並派波羅尼都招撫西域天山南路各城。不久阿睦爾撒納反叛，大小和卓乘機控制了新疆西南部一帶。
    |

    | **經過** | 乾隆二十二年（1757年），霍集占殺死清軍副都統阿敏道，舉兵自立。次年（1758年），乾隆皇帝發兵征討霍集占，清軍在庫車、葉爾羌（今莎車）、和闐等地與大小和卓交戰。
    |

    | **結果** | 乾隆二十四年（1759年），大小和卓兵敗西逃，經蔥嶺進入巴達克山（在今阿富汗東北部）境內，被巴達克山首領素勒坦沙擒殺，叛亂遂平。 |'
