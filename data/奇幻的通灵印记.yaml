    # 鄰居三姑的白飯


    這經歷是發生在小四那年的一個炎夏，那時我們已是六口之家……跟我最投緣的四妹出生了！可是家中經濟還是捉襟見肘，所以每年夏天的午飯時段多數以白粥作為主食，再配以簡單的鹹菜豆芽。母親說這樣既可減輕家中的開銷負擔，又可滋養腸胃。可是當年的我果真年少無知，並不了解母親操持家計之苦況，常對午飯總是吃粥感到抱怨。初期我還可跟隨各人一同飲食，可是到後來我著實感到難以接受，因此寧願餓著空肚子也不願跟隨！


    我這種行為當然惹來母親棒喝打罵，但母親眼看我在打罵過後態度還是這麼堅決時，她只好硬著頭皮致電住在十三座的同鄉長輩「三姑」那兒商借一碗白飯。由於三姑嬸嬸每天都會備有新鮮熱飯，供其正攻讀預科的么兒子放學後回家享用，而且我們又是同鄉關係感情當然比其他鄰里熟絡，故此母親才放心讓我到其家中添飯。但臨行前母親還是特意的告誡我要有禮貌，到長輩家裡時要主動向人家問好！於是我滿心歡喜地拿著飯碗到三姑嬸嬸那兒叩門，到步後我發覺原來三姑早把家門虛掩，好讓我能直接進來逕自步往廚房。但當大門鐵閘打開後我卻發現其家中'
  - '[PAGE 121]


    的客廳長木椅上，坐著一位身穿棕黑色唐裝衫褲的中年大叔，那位面容和態度極為嚴肅的中年大叔骨架相當魁梧；看樣子像是舊式城鄉人物，在我看來他對我的出現好像帶些不滿，而且我還發現當我打算步近經過時，這位大叔更即時對我瞪目怒視呢！


    舊式屋村間隔多數在近大門側設置房間，還會在房門口掛上布簾遮擋。但由於大叔所處的位置是房間與客廳之間的必經通道，故此我必須禮貌地請求他讓路才可前行！但當時我的內心著實對這大叔深感懼怕，只在心靈間嘀咕著應以怎樣言詞請其讓路！這時早在廚房準備為我添飯的三姑，眼看我站在廳房通道前還不進來感到相當奇怪，因此她帶笑打趣地說：「這兒並沒有養狗，不會放狗咬你，大可放心進來不要再站在房門邊嬉戲！」眼看三姑再三催促但身旁大叔又不願讓路的困窘處境下，令我一時間忘卻了母親臨行前的吩咐……到別人家要懂得向長輩問好的教導！我只有躡足屏息的依在房門邊挨靠著木板牆前行，盡量希望不要打擾這位厲色怒目的擋架大叔！


