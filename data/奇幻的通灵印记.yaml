  md: '紅紅的亮麗的小圓光團，像實帶虛般經常圍攏在家中天花、窗邊或牆角間追逐遊戲。而當年牛下眾多的家居布局，大多在方正斗室內（即大門旁）加建一間用布簾遮擋入口的板間房，又為著通風和採光理想，大多在上方位置設鏤空木柵。而小時候我總發現，這些小圓光精靈，經常圍攏在這些鏤空的木柵間穿梭。當時由於不明白這是來自非物質界的小生物，竟天真地嘗試用小手捉來幾顆不成功後，急嚷著要求父親代捉幾顆看看！可是這又換來父母對我莫名的感嘆，並取笑我定是個天真愛幻想的孩子！


