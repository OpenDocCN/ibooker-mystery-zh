    2020年5月\n\n## Google Play 圖書書評\n\n**Man J：**\n\n非常有意思的作品……適逢本人近期有至親過身，看到外婆一篇時亦略有感受，就好像作者為我解答了一些問題一樣，感恩。\n\
    \n**晉鴻文：**\n\n《奇幻的通靈印記》書中豐富而引人入勝的奇異經歷，真是無比精彩絕倫，讓人愛不釋卷。讀完這本書，感覺像從多個維度的浩瀚宇宙中遊歷歸來，讓人大呼過癮、大飽眼福。\n\
    \n**Ka Ming Yim：**\n\n真、善、美，盡在此書矣！近十年有所感動、有所啟發的書不多，這本必極力推薦！\n\n**Fanny Sin :**\n\
    \n作者用詞活潑，態度謙恭，並沒有擁有超能力自居，她的經歷印證了佛教義理，因果業力、輪迴等等，透過作者的親身經驗，更加明白如何積極正面處理心識，佛經所說「一切唯心造」，一念善即淨土、一念惡即地獄……此書極度推薦。\n\
    \n**Amy Lau :**\n\n一本真人真事，具趣味性、啟發性的人生故事。作者從小擁有不為人知的超人能力及靈視，童年時活在種種的惶恐、不安、無助之下，憑藉堅強的信念及意志力，仍能走出精彩人生，活在當下；不斷探索生命的意義，跟廣大的讀者分享種種凡人以外之體驗與奇幻經歷，實在是一件難能可貴之事。\n\
    \n**Barbara Chun :**\n\n作者的不一樣童年經歷，令我感到自己原來一直身在福中。作者小小年紀面對生活的艱苦、不被父母諒解，接觸到那些不屬於我們空間出現的事物下成長，居然可以勇敢及堅強地創造她的人生。她精彩的文筆帶讀者認識到另類空間的資料，我有緣接觸到《奇幻的通靈印記》。個人意見，我衷心推薦給所有人，如果是小朋友必需由家長陪同觀看。希望作者繼續給讀者帶來她的正面能量，期待她的下一本書。\n\
    \n**Lee Kam Kee :**\n\nVery good ！內容豐富，值回票價。充滿啟發性，能解開對人生意義及靈魂的本質，了解死前死後世界，獲得不能外求的智慧。\n\
    \n**Max Ng :**\n\n這是我第一本完全覺得唔悶，而且非常好睇嘅書。書中嘅揭示，作者嘅經歷皆非常珍貴。而家我嘅想法係，將此書慢慢睇，邊睇邊構想書中描述嘅情境。\n\
    \n**Lily Koo :**\n\nThe amazing experiences that the author has been through brought\
    \ hope and love to regular people like me when we can finally believe that there\
    \ is another dimension, a heaven or a different world out there after we leave\
    \ our body and go to the other side. Her writing depicts and explains why and\
    \ how paranormal events happen and how spiritual entities stay on earth for unfinished\
    \ business. While we go on doing business on earth, maybe we should be mindful\
    \ of our conduct or actions to people around us as there is the other side after\
    \ we leave here.\n\n## 序言\n\n活到這個年頭，此刻只想說故事，訴說一個平生的傳奇故事……在成長的歲月中實在有太多不足為外人道的奇遇和發現，這些獨特經歷著實為我的人生帶來豐饒的啟迪！\n\
    \n自問並不是耀目聰慧的傢伙，亦無優裕令人稱羨的成長背景；但能有幸生存於世、能夠參與這趟人世學習的歷練，實在心存感恩！概括半生所經歷的種種喜樂悲憂，對此次人世學習的際遇和責任，有更深切的體會和感悟！只緣在投生前……在靈界（非物質的意識界）出現某突如其來的枝節，致令我並未按一貫程序刪掉這段……靈界層面中參與「轉世安排」的前期記憶！故在投生後在我的意識上；還殘存轉世前的靈界記憶，和某些超覺感應。並能看見某些，來自不同空間層面的，各類非物質界生靈。綜觀這些經歷，和各種奇遇與發現；令我更深切體會，這趟人世學習之旅的機遇，是何等珍貴和難得！\n\
    \n在成長的歲月中，常面對現界與靈界的各種紛紜纏繞！回憶當初要獨自面對這麼深刻和層出不窮的異象時，那種無從表達和孤立無援的困窘感覺，果真令我吃盡不少苦頭和責備！只緣小時候……不曾了解到，原來不是每人都擁有這種超覺感應，因而不解何以總會招來長輩的責備和不悅？常獨自面對那些突如其來的靈異現象，使我常感到百般迷惘與失落！慨嘆世間詞彙，並不足以表達……各類靈界空間的所見所聞！及後因父母長輩終於察覺到某些端倪後，無奈只會以別的話題來打發，或是乾脆選擇以打罵來了結！而我後來為免又再招來長輩生氣和壓力，亦只好以「幻覺」來作自我催眠和逃避的藉口！\n\
    \n直至初中那年首次舉家回鄉，竟赫然驚見滿堂盡是舉杯歡慶的亡靈；當這一直以為只是童年「夢魘幻象」的畫面重臨時，頓時對成長中的心靈帶來深刻醒悟和反思！再一次敲醒靈魂深處的覺性，令我從新審視多年來發生在自身的種種不解的通靈現象，令我決意尋找潛藏在生命旅途中的各種迷思和答案！\n\
    \n我是成長於七八十年代的香港土產，那時候坊間資訊還是處於新舊交接的框架內；對一些超自然現象的解讀，人們還普遍圍繞在……舊日迷信祭祀的思想架構中！由於本身對投胎前的靈界空間，還潛藏著鮮明印記！再加上歷年成長中的各種感應與奇遇，致令我對超覺現象的態度從刻意否定的「無視」，轉變為不得不對其「注視」！後來繼而決心尋找和探索，它為我帶來何種人生啟迪！幸運地在生命多段的生關死劫磨煉中，總能得到靈界導師給予一次又一次的幫忙和導引。在其循循善誘的教導和鼓勵下，藉著靈魂出竅的方式帶領下；穿越不同時空次元，從而了知生命架構的真實義！從多年的超覺感應體驗下，更令我確切認知到除卻塵世之外，果真還存在著萬千的意識層次空間。故此我對人世間的得失際遇看得淡然，卻對寰宇浩翰的世外感到無比嚮往！\n\
    \n而我自知這些異世經歷並不為各人所接受和了解，故此多年來我選擇三緘其口，並無打算對外公開！然而當看見每天的報章、電視總會報導著林林總總的自殺、他殺、意外，或因宗教仇恨而引致的報復殺戮及人禍戰爭的新聞後，內心只感到莫名的悲慟和嘆息！對那些輕易放棄自身生命的人感到惋惜！對那些輕易殘害別人性命的人感到難過和痛恨！\n\
    \n另外……近年網絡科技帶來普及與豐富的資訊，令我更能認識到原來擁有相同經歷的通靈人士在西方非常普遍，從中發現他們所描述的靈界架構竟跟我從小所認知到的內容吻合，這亦令我對過去的各種靈界異象和出體見聞增多一重有力印證！\n\
    \n數年前更得到靈界導師的鼓勵並指示……現在是適當的發表時空。導師告知：「在地球教室的眾多轉世生命體，在經歷若干時空下，還抱持著各種謬誤和狹隘的觀念……還在撥弄著重重迷霧而不見歸期！」\n\
    \n故此我真誠地……把自身的真實奇遇和靈異見聞，原原本本的跟各界分享。期盼此書能為大家對「投生地球教室」的學習意義和責任，有多一份了解和珍惜，感謝！\n\n\
    本書可分為三個部分：\n\n## 第一章・牛下童年\n\n記錄出生至童年時，居於牛頭角下村（簡稱：牛下）時對靈界的「無知」歲月（靈異經歷）\n\n## 第二章・通靈現象\n\
    \n記錄成長期對靈界的「認知」見聞（靈性學習）\n\n## 第三章・靈魂出竅\n\n記錄成長後靈界導師怎樣給予啟蒙和導引\n\n讓我藉著「靈魂出竅」的方式\n\
    \n「覺知」到不同次元的轉世面貌\n\n從而感受這「宇宙本源」的大愛真實義！\n\n## 靈界起點\n\n### 投生前的靈界起點\n\n古時的東方傳說……每個投生世間的生靈都要飲過「孟婆湯」後才可上路，好讓各式前塵往事清洗得一乾二淨，才展開瀟灑平生。可惜這個傳說套用在我身上，某程度可說是失效的！只因自出生後，我還存在未被涮去的靈界轉世記憶……可惜這些先天記憶和通靈感應，並沒為我帶來不錯的做人優勢，卻反而為我帶來不足為外人道的世間磨煉，令崎嶇的人生路走來更顯艱辛和孤困！\n\
    \n說起這段投生前的光景，印象中這是一個非以人類單純文字和筆墨可以描述得透澈的空間層面……是一片非物質、非形相示現的虛無境地。而是以「光波」與「聲韻」（Sound\
    \ and Light）為涵蓋溝通的境界！雖然無形相，但當中的溝通架構是以「多重的超覺感知」來呈現的。這多彩亮麗的聲光，蘊涵著極致的巨大意識——宇宙本源。它包含至善智慧與無私大愛的成分，亦是整體宇宙運作的重要能量元素！\n\
    \n在朦朧的歲月中「靈明一點」的意識被喚醒……由「本源光」中化現而成。從極致的空間中穿越重重的能量架構，剎那間閃現至由一眾「宇宙高靈」（亦可稱為：靈界導師）所共同創造的遼闊宏大空間中……（註：直至投進此空間的一霎，才示現出類似世間的形相意識）。這空間是結集來自不同「星光架構」的「意識體」，是投生「地球教室」即「物質界」前的議事和規劃空間，這亦是那些剛從地球離世歸來的「靈魂意識」被接引回家的中轉站，亦是某些在地球還擁有肉身軀體的靈魂出竅者，進出靈界探索的最終站。這是集一切意念和形相構建而成的意識舞台，這個不可思議的神奇國度，我將它稱為「靈界中轉站」……西方的通靈學者稱為：「星光平台」（Astral\
    \ Plane）。\n\n直至到達「靈界中轉站」後，這顆「靈明意識」此刻才有一個「我」的概念感念而生。一眾靈界導師和這個剛化現而成的「我」，隨即參與這個共同規劃和議定的「人世藍圖」（註：還記得在靈界規劃議定時，這些導師皆以古希臘長袍智者形相示現。但值得一提的是，導師所示現的形相是因應各自因緣感念而生，故此當然會各有不同形象。）藉著投生「地球教室」，期望能為靈界團隊帶來豐富多樣的靈性進程和體驗！因這個以物質架構為用、時間運作單向線性的「地球教室」，有來自種不同輪迴架構的轉世團隊。「我們——靈界團隊」，共同規劃和議定這幅「生命藍圖」應以何種性別、樣貌、智慧和父母眷屬為組合。可能大家會奇怪，當然人人都希望選擇樣貌娟好、智慧和身分優越的條件來作為投生人世的裝備，可是當你身處這個「靈界當下」，順向或逆向的規劃模式都可成為被選取的手段。而所有規劃，只會著重於此趟轉世經驗能為「靈界團隊」帶來怎樣的靈命進程和體會！不同組合的「靈界團隊」大多來自不同次元，由不同的「輪迴圈」頻譜的屬性組合而成。\n\
    \n「我們——靈界團隊」剎那間已進入了快速回溯的時空中，檢視多重次元的各種轉世經驗……現在只隱約憶及當時「靈界團隊」表示，過去因為逃避「地球教室」某段不忍的殺戮時空，已跳過了幾次應該起行的轉世安排……所以已與靈命進程發展得較和諧、頻譜較一致的「輪轉成員」相去漸遠。所以如這次還再遲疑，下回的轉世組合只能與較疏離、靈性光波震動較不一致的輪轉組合結緣！及後「我們——靈界團隊」共同議定，這趟以女性的角色來參與這次的人世之旅，這將會更能體現出某些靈性感知！選取樸實平庸的外貌及智慧，將可經歷到另一種的人世體驗。在這個光明亮麗的靈界層面中……「靈界團隊」所著重的是整體的靈命進程，以及採集和完備不同的經歷及情感面貌！\n\
    \n還記得這廣闊無垠的「靈界中轉站」有一座宏偉光亮、高聳無際的記錄大廳，是儲存和記錄眾多轉世資料的地方（註：西方通靈學者稱為……阿卡西紀錄 Akashic\
    \ Records）。當「我」進入這個巨碩無垠、有如圖書館般的資料庫後，極目是無盡無邊的光體書冊；而當中最矚目的當然是放在中央高臺位置的那冊……散發著純金亮光的厚厚巨冊！當飄近這巨冊的一霎，「我」已即時感知到當中所記錄的內容！這是記錄著為地球教室，帶來啟蒙的一眾圓滿者的，轉世記錄內容。此刻「我」只感悟到一股由衷的讚嘆與欣喜！\n\
    \n往後，這個還是處於粗略意識階段的「我」，被引領飄至其中一個展示台前停下。一本屬於「我」此趟轉世歷程大綱的書冊，在虛空中緩緩浮現！此刻「我」亦深諳如能圓滿這趟「人世之旅」，將會是加快修畢「地球教室」課題的關鍵，將是前往另一個更為微細的星空架構的……轉世契機。\n\
    \n由於快將投生人世，所以在剎那間「我」已閃現至另一個場景，這是那些將要進入「地球教室」轉世者的學習班。這時的「我」已不知不覺間感現出一個人形光體，同時亦隱約傳來與物質界相連繫的生命聲音……卜卜的心跳脈搏聲此刻正式開展了！\n\
    \n### 意外地來到人世\n\n前塵至此……竟發生一件，現在回想起來很是慚愧的事情！因隨著轉世部署漸趨明確，「我」對將投進人世的布局與組合充滿期盼……對此趟的學習進程，會以何種方向實踐感到好奇。故在熱切的好奇心驅使下，「我」竟私下溜進記錄大廳，偷看規劃中的「記錄冊」內容。「我」靜靠在記錄大廳前不遠處的一座……名為「靈界花園」的池畔，但當「我」正想打開細閱大綱時，這「記錄冊」竟突然迸射出奪目亮光，而「我」竟猛然被身後一股巨大的吸力扯進這光波池中！這突如其來的意外，自諳時機未至卻突然掉進世間迷陣；慌亂的意識隨即發出強大的召喚，請求靈界導師前來解救……可惜一切卻為時已晚！\n\
    \n現在還深刻記得當初掉進「地球教室」時，對此塵世空間驚鴻一瞥的情景……那是一股巨大強烈的急速跌墮感，恍如火箭升空失敗意外後，由萬里宇外跌回地球的震撼衝力！在經歷沒完沒了的天旋地轉和沖擊跌宕後，「我」驚訝的發現……何以「地球教室」竟結集著，眾多不同的黑暗意識？當中寄居著為數不少、無以名狀的「片段體」和「意識體」！若干年後靈界導師告知……這是那些忘卻回家路……沒返回「靈界中轉站」接受「宇宙本源光」淨化的殘存意識。這亦是窒礙「地球教室」整體生靈進化的巨大阻力！\n\
    \n經過這有如猛烈暴風及非比尋常的一輪跌宕後，一股強大迫力把「我」這團意識；瞬間壓榨進一個昏黑和侷促的空間之內。那是一股無比的壓迫感，「我」隨即感受到一股有如粉身碎骨般的巨創，並在強烈的暈眩感中不斷轉向！經過這麼多的折騰後，只感到意識漸次模糊，最後昏殁在不知不覺的時空中。\n\
    \n先來簡介一下我的成長背景，出生時家中有親切的外婆、父母、姊姊（若干年後再添兩妹）。聽母親細說從前，在我出世那天的早上，母親還頂著七個月的身孕為父親在廚房煮早飯。由於當時一家幾口租住在旺角那些廚廁共用的分租房中，那朝母親卻意外地；在廚房因誤踏火水，而從後翻倒，因而被急送至醫院催生（註：這點竟跟我在靈界時所遇上的意外吻合）。由於是早產嬰關係，自小便感到體質不佳！母親曾告知由於我是早產，初出生時我的雙眼還是整天緊閉昏睡。直至三個月後那次到健康院體檢時，發生了一些小枝節，才令我首度睜開眼睛。\n\
    \n至於當年這個健康院體檢的小枝節，亦可說是我平生第一個景象記憶……還記得當時，我是突然被背後一股寒徹骨髓的冰冷感覺所驚醒！原來體檢護士，在輪到為我磅體重時；竟一時忘記在嬰兒磅上墊薄毛巾，就快手快腳地把我直接置於冰冷的金屬磅盤內。由於我被這突然而來的徹骨冰感所驚醒，因此被驚嚇得睜眼嚎哭！這刻護士卻發現我的雙眼竟可睜得這樣明亮時，即時送上驚喜的歡呼，還急不及待叫喚母親快來察看！\n\
    \n這可說是我投生人世的第一個畫面……矇矓中看見多張笑臉……高掛在健康院天花上一把呼呼吹著的大型三葉吊扇……面對這突然而來的陌生喧鬧場景和刺眼的光線，早把我驚嚇得涕淚漣漣！直至感覺到一股溫暖親切和芳郁暖流襲來，眼前矇矓出現一個全身籠罩著粉亮光波的女士身影時，我的意識心靈早已辨別出這是「母親」的氣味！從她身上所透出的熟悉體香和在其輕柔的聲音安撫下，我即時感到無比的溫暖和安穩；頓時止住哭聲倦躺在其懷抱中，並傾聽著這親切熟悉的卜卜心跳聲！\n\
    \n剎那間我又再沉醉在這個來自母親與孩子間的心靈連繫，感受這濃郁的愛意甘霖！我從心底報上默默的感恩……感激這來自塵世遠方的真摯相迎！但不久我又再被頭顱內不適的睏倦感犯著，又再倦極昏睡了。\n\
    \n## 目錄:\n\nGoogle Play 圖書書評 …………………… 2\n\n序言 ………………………………………… 6\n\n投生前的靈界起點 ……………………\
