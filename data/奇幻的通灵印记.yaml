    # 出體事件簿（二）

    元朗村屋


    大約九零年中，某朋友聯同另外兩名友人一起分租某棟位於元朗區的陳年村屋，這是一棟三組並排而建、超越世紀的古舊建築。


    由於這位朋友知道我一向對古物及建築饒有興致，因此某天相約我到這村屋留宿參觀，好待友儕間的聚舊談天更能盡興！


    那天我早被這棟兩層高的村屋建築所吸引，從建築頂所標示的年分看來，已了知到這是一棟接近百年的古物！那些門楣設計有如黃飛鴻「寶芝林」時期的閩南式兩層木欏形式，再加上紅磚瓦頂闊灶布局，果真令人有置身清末民初般的錯覺！


    關於這棟百年建築，據包租所述……早年是那些退休馬姐集資興建的「姑婆屋」，後來業權落入某位老姑的契女身上（亦即包租一家），因此她們就將其中一組分租出來以增收入。當時這裡分別由三戶所分住，左邊地下為古老的闊灶廚房；樓上是那些老姑居所，可惜不久前最後一位亦宣告離世！而中間為包租一家，朋友就住在最後那棟'
  - '[PAGE 300]


    # 第三章：靈魂出竅


    地下，樓上則由另外兩名年青人租住。由於這些舊建築大都空間寬敞明堂廣闊，前方戶外更置有一片露天庭園，因此當晚大家均浸淫在這片閒逸涼快的氛圍中樂上一晚！


    朋友本來打算讓出房間給我享用，可是我還是推卻這番盛情選擇在客廳安睡！由於這天實在盡興因此當晚就寢時，不消一會我已投進沉沉夢鄉！可是就在我睡至深宵夜半的迷濛時空中，卻被附近那片嘈雜人聲所弄醒；我隨即瞇著惺忪睡眼轉身望向廳外，竟看見廳中來回著很多穿著舊日布衣的坊眾！由於那刻實在過於疲倦，因此我只作簡單的觀想「結界」護身，隨即又投回未完的夢鄉中！


    ********


    矇矓中我的意識竟如輕煙般，一縷就飄進這組房子的隔壁上層，亦即是包租一家所聲稱用來堆放雜物的樓層中，可是眼前所見卻是滿壁排列著的層層木神主牌！前方更設有幾組香爐及一些水果祭品，從那些布滿蛛絲塵垢的神主牌看來，這棟老房子原來還寄住著不少冥界原居民，怪不知剛才客廳所見會是這般熱鬧呢！而這些舊坊眾還一直喧鬧來回至臨近清晨某刻，及至一聲充滿弦頻的雞啼聲'
  - '[PAGE 301]


    後，就一切歸於平靜及消失！


    接著傳來附近村民清晨發放一聲鞭炮巨響後，各種現世聲音又再重現（註：這跟當年第一次回鄉省親時，當晚的「見鬼」情況相同，亦是出現一聲不像來自現世的雞啼聲後，那滿室鬼物才消失）！


    ********


