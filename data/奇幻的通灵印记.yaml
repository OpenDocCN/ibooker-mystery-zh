    # 不斷重複的神秘夢境


    其實在剛步進社會工作後不久，我便在機緣下跟隨某同事到佛教寺院參學。可惜幾年過去後自覺應該向另一個領域邁進和探索！


    只因當時所接觸的寺院所奉行的，是一大套拜懺唱誦行儀。在學習了一段日子後，內心常感若有所失般困惑！當中主因是緣自那個不斷重複的神秘夢境，從而令我轉向夢中提示尋找答案，期望能尋覓到啟迪生命靈性和智慧的良劑！


    夢中來到一所寬敞高廣的東方寺院，我跟隨眾人一同在某個偏殿恭候著。當中眾人均雙手捧著一條長白絲巾及若干用絲絹包裹著的禮物，像是在等待謹見甚麼大人物的安排！就在眾人佇候了一段時間後，殿外傳來一連串低沉的長號角聲，接著一隊穿著藏紅僧袍的年輕僧人一邊吹奏著手中的樂器，一邊徐徐步進主殿後並列站於殿內兩旁。由於現場人數眾多，因此我只能在長長的人龍後窺見遠方主位高臺上的隱約情景！可是由於位置與距離實在太遠，所以我只能看見主位者……頭上所戴的一頂……用絲綢織成的……五彩寶冠。但奇怪地隨著我的步伐越行越前，我卻還未能一睹臺上人物究是何方真容？直至輪至我親自獻供，並在內心暗諳著終可窺見的時候，我卻發現那位頭戴寶冠的主位者，竟化為一團不斷擴散的強烈白光，並把我從夢中驚醒！


    ********


    如是者這個神秘夢境在往後多年更是經常出現，致令夢中的我還懂得再三提醒……這回我定要一睹臺上主位者的真容才肯醒來！可是我還是一次又一次被夢內那團強烈白光弄醒，綜合多次的結果……反而是那頂「五彩寶冠」，變成最為深刻的一環！


    在經過一段時間游走於中國東西南北的遊歷後，及至絲路其中一個景點「西寧」塔爾寺參觀時，那刻我才明白這個神秘夢境，所提及的內容和夢中人物衣著景物等……原來是與藏傳佛教有關連！那刻並在意識間傳來一個明確提示……著我應趕快回港，自有這方面的學習引領與安排！於是我並沒跟隨同行旅伴繼續行程而是獨自回港，不久那位早前同在寺院參學的同事竟然來電告知，原來他們大伙兒已轉往另外的藏傳佛教（密宗）道場參學，並邀請我一同前往！我亦在好奇心熱切驅使的情況下，跟隨眾人一起參學於這些大小道場。


    當時這些道場均出現與「夢境」及「塔爾寺」所吻合的「雙鹿法輪」圖案提示，因此一時之間令我不知應往那方向駐紮！可是後來某「密宗」道場因來往參學的人數增多，導至那些主理的弟子應接不暇，及後更演化為只招待那些跟他們投緣的一群，我們這些後來者卻反被擯逐在外！因此我們輾轉下就轉至另一所小型道場參學，可是在若干時日後，那堂主的主理態度和面目卻生起變化（註：可參看第二章〈靜座班的發現〉），從而令到某些弟子相繼退修！


    ********


    後記：關於那不斷重複的神秘夢境，在我轉至新道場參學後的一段時日，還經常出現！令我不斷反思是否當中還存在著某些錯向步伐？及至「第二次生命關口」出現時，我被靈界導師告知這是當初共同議定的「人世計劃」……「假若此生學習達不到預期的靈性進程時，可選擇另行議定的轉世安排!」在此只想告誡大家……尋找宗教應要多方觀察和主動勤勉，並要時刻用智慧來分辨真偽!


    # 誤入歧途


    當年跟隨眾人來到這所新道場參學，其中吸引之處是標榜勤儉簡樸的心性修持和靜坐修真課程，更沒有那些堆砌的禪公偈語般的「口頭禪」賣弄。因此當中的同修大多是年青的一群，在講經說法上更能捉緊大眾的話題和生活體驗。


    及後隨著堂主名聲日顯追隨者眾，遠至海外亦有其他弟子廣邀開示和說法；因此後來堂主更不斷從眾弟子中挑選若干忠心的作為侍從心腹，負責協調各種大小事務。而我後來因被堂主發現有某種「通靈」能力，因此亦有幸參與堂中後勤雜務！可是亦正因這些近距離觀察，令我窺探到非一般弟子所能發現的內容！


    這時期堂主更以專心修持為由宣告提早退休，並對外公布計劃於若干年月後有意歸隱。而這時的堂主更一改以往以勤儉樸實為教誨的修持態度，反過來主張應以財帛供養的功德，來作為增福添慧和消除業障的捷徑！更經常在言談間不時吹噓擁有不少神通異能，並對一些抱持懷疑態度的弟子或信眾唬嚇……暗示其身邊有隱形護法會為他懲治執法！


    由於那時我還是一名懵懂傢伙，萬沒料到原來宗教間；竟會充斥著各種斂財行騙，以洗腦手段為用的神棍騙子！當初某段時期，我還誤以為那些「出竅奇遇」和經常救我於危難的那團「巨大意識」，是這位堂主的背後引領！可是我在某次向其透露一些「靈魂出竅」現象及見聞後，他竟表現出極其興致及新奇，但對我刻意隱密的其他通靈見聞卻談不上嘴……如某次堂主於每周的弟子茶聚時，高調地拿著一片白水晶，在眾人面前表演以水晶治療手上的受傷脈結。可是我卻看見他只是用那片水晶，反覆按壓著其手腕上的皮肉而已！當其時有弟子不明所以詢問時，他卻還意充志滿地表示，這是其運用「天眼」加「水晶」，來治療近年因寫講義及法本所積勞的受傷脈輪！當時我對堂主所表演的「水晶治療」感到極度懷疑和錯愕，內心不禁暗諳著原來堂主口中所謂的「天眼」……竟然將那團籠罩在人體外圍的一團氣場能量，誤以為是藏於體內的皮肉產物？對脈輪脈結的放射位置和光譜距離還未弄清楚就高調表演？及後我曾向某些同修表示懷疑後，未幾堂主藉著應邀到外地講經說法時；借機購置了一批外國的通靈書籍回來，當中有些是教授水晶治療的「新時代」類書籍（New
    Age）。此刻堂主卻反過來暗示，早前的那次「水晶治療」只是用來測試某些弟子對其忠誠的手段而已，並表示他是刻意在人前表演及說些錯誤訊息來令人誤會，藉此作為增長各人智慧及開悟的試煉！


    另外，堂主夫婦經常應邀出席信眾安排的各類外訪及晚宴酬酢，但席間卻常以即宰海鮮及肉類為主，更吹噓這是藉此賜福予桌上生靈，令其超升早脫輪迴之苦！而這位堂主夫人每次外訪或酬酢歸來，其身上總會出現各式名貴禮物，某次更向身邊侍從吹噓這是夫婦間累世修持之殊勝「福報」功德！那時候其實除了我之外，還有其他同修都暗自對其言行感到失望，因此已陸續低調離開！可是每當類似情況出現時，這位堂主卻如深閨怨婦般終日絮叨，並報上悻然於色的言詞來宣泄及譏諷！可能這就正如古希臘悲劇作家所云：「神要其滅亡，必先令其瘋狂！」因此後來這堂主更以玩弄人性猜疑與貪婪的弱點，來作為操控和收賣心腹的手段！


    ********


    某次堂主其中一位侍從的父親離世，堂主只安排妻子及一眾親近弟子出席當晚的致祭。而當晚我和友人卻在不知情的情况下，臨時要求陪伴師母往辦理某些事務為由，被送到某殯儀館外。隨即會合一眾弟子到達某樓層的靈堂致祭時，我還未弄清楚是何人的家屬設靈？那時只見靈堂中央掛著一位老伯的黑白照片，而一眾家屬全靠坐在靈前左邊位置叩泣致謝！這時我才知道原來當晚的喪家是堂主的某位資深侍從！


    就在我們一行人上香致祭後，正打算步向右邊一列空置的座椅時，我卻看見此排前方端坐著一位透現著亮白光暈的慈顏長者，其身後更佇立著一位光人在旁！我在意識一轉間才意會到這是靈前的相中人時，因此當然選擇坐在此行中間的座椅位置。可是隨我身後的一列弟子及師母眾人，卻奇怪我這樣的座位選擇，竟同聲指點著我應再移向前方就坐！當下我的內心不禁疑問著……「這批在堂主口中出類拔萃的弟子及妻子，當中某位弟子更是堂主所聲稱修持『天眼』略見成就的『大弟子』、而這位師母更被吹捧為『天女』轉世的不凡人物……何以此刻的『天眼』功力竟不能看見前方異象？」


    在我「堅定不移」的態度下，這位「大弟子」竟自告奮勇跨向前方就坐，那刻只見老伯和光人剎那間消失隱沒其中！這時剛好現場的誦經環節告一段落，因此喪家的人及侍者，拿出數張早前拍攝祭帳記錄的照片時；卻意外發現多張照片中竟然出現一團白光，當中更隱約顯現出一個人形影像，同是出現在相同位置的右前排座位！因此喪家對我剛才不願坐前的舉動感到好奇！當然後來又招來堂主背後大做文章，吹噓解釋其妻子及親眾「天眼」一時失效的內情！


    ********


    後記：當年這位打著「道顯密」三教（註：道教、佛教顯宗、藏傳佛教／密宗）融匯修真旗號的堂主，後來更因大部分弟子先後離開，其言行表現得更為乖狂！再加上海外信眾曾在某些法會上，見識過真正藏傳佛教的行儀及修持後，出現集體退修的情況！因此堂主害怕本地及其他海外信眾亦可能在獲悉有關消息後，將來亦會出現更多退修的情況發生，所以不惜以教授甚麼譁眾異端的不傳密法來唬人！更點選一些男女弟子戲稱為其前世眷屬及護法大將。可是當時竟還有一部分人還在迷信這些荒唐夢話！


    # 被遺忘的聖地


    由於那時我對這個追隨多年的宗教充滿疑問，並為那個經常出現的神秘夢境感到玄奇；因此某天清晨我便利用出體機會，飛到那遙遠的西藏去尋找答案。當中首選目標當然是那個悠久又神秘的布達拉宮！


    ********


    我穿越團團眩光，並如飛鳥般從高空驟降至一座宏偉古老的藏式廟宇。我在這個看來不像現世時空的陌生地域打量了一會，瞬間便來到滿布房間的窄長門廊中，並透視某個房間的小門，發現原來是一所佛堂小課室。當中有位老喇嘛正授課予幾名小喇嘛「中脈與打坐」的內容。我當然對這題目好奇不已，因此隨即隔著門板牆垣往內窺探，卻發現這幅恍如人體經絡布局的脈輪圖畫，當中某些脈輪數目與我所認知的不同，因此不禁在內心有所疑問？可是我這個念頭隨即被老喇嘛察覺，並從意念間傳來一團訓斥內容：「經律咒印未純，亦無根基傳承，竟妄圖窺探『密宗』奧義，這實在顛倒夢想……！」


    霎時間我只感到十分慚愧，並瞬間被一股力量從背後急速拉走，只感到身軀隨之一震並剎那醒來！


    ********


    往後我曾向堂主提及當中概況，並向其詢問「根基」與「傳承」等問題，可惜我只被支吾打發離開！於是我試圖轉向那團「巨大意識」請求幫忙及解答！


    某天清晨我被帶至一個神秘國度，身旁更出現一位閃耀著重重亮光的「光人」，出奇地我的意識竟突然意會到這就是一直在出體活動中時刻守護和教導的那團「巨大意識」顯現……「靈界導師」！


    如光速般穿越重重的山巒與江河後，我從高空鳥瞰地面時，竟發現眾多藏式廟宇和房屋均被戰火包圍！看見無數軍人、僧侶、藏民、煙火……所生出的一片愁煞景象後，我對此被譽為人間淨土般的國度深感錯愕與難過！對我來說這是不曾明白和無知的歲月，是一段遙遠和陌生的歷史！


    看見這瘡痍滿目的情景，我早已嚇煞得震撼無言！只想快些離開！因此淚流滿面地轉往身後向那「光人」詢問，可是「光人」卻樂觀表示：「這些只是表面的破壞，內在智慧是破壞不倒的！」「光人」更將我領至一個邊遠荒蕪的山區，只見當中布滿若干破落失修的藏式廟宇在其中。我瞬間從天際飄降至地面，並從那些瓦石廢堆中嘗試了解某些失落前的片段！只能從部分殘缺的牆垣壁畫，及地上紋飾來意會曾經光輝的歲月。並從某些荒廢的石臺痕跡和洞穴來認知，這個地方從前應是一個繁衍著眾多清修隱士的聖地！


    瞬間突然畫面一轉，我被帶到一個神秘的洞窟之中；只見這個摩崖廣闊的洞窟內，岩石間滿布點點閃爍晶瑩的晶石，因此我能清晰發現洞內中央位置間，竟聳立著一座由晶簇所形成的寶座！我一時好奇正想靠坐這寶座時，卻被「光人」立刻制止，並從意識間傳來一個意會……這是一個結集八千萬億咒印成就和智慧功德的寶座，未成就者是不能尋覓得見及靠近……！這時前方虛空同時出現兩幅不同內容的「曼陀羅」，並瞬間合併驟放出一團光感滿布的空間入口。我被「光人」領進這個以「聲光架構」運作的多重意識空間內！


    （註：這是跟地球物質世界截然不同的溝通和學習模式，是一念多重感應的超然運作！可惜當「意識」重返地'
