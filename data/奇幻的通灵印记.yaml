    # 奇幻的

    通靈印記


    我們的馬伕只是一班年紀不超過十歲的男孩。我的馬伕更只有七歲，因此每次上馬；總要我將他抱上馬鞍，他才可操控韁繩！而我後來更發現所策騎的那匹馬，原來是整群馬隊中最不受歡迎的壞分子，常被其他馬兒欺壓因而被咬去一小片耳殼，故此在整個行程當中，我總是滯後和被取笑的一員！在幾經努力下，小馬伕終讓這懶散和任性的馬兒乖乖歸隊，而我亦掏出美味的糖果作為給予小馬伕的獎勵！


    在快將到達位於雪線上的天池路段時，已聽見不遠處傳來天池瀑布的宏亮水聲，我們的心情當然感到相當興奮，期望快些到達……欣賞這名聞遐邇的天池聖景！但由於此段山路相當陡斜，再加上前晚下了一場雨雪關係，因此嚮導要求我們須要各自下馬並徒步登山。其實在馬背上騎了一段時間後，已感到手腳四肢酸軟乏力，再加上山路泥濘早把我的鞋底黏附著一層濕泥，因此漸漸地跟同來的伙伴相去漸遠。還有越接近瀑布，四周的聲音；就只有猛烈的水打岩石聲，因此這刻我並不能聽見前方嚮導和隊友們的提示話語，我只有亦步亦趨地捉緊樹枝小心跟隨。由於太過全神貫注這段險路，卻意外地令我有種處於世外的寧謐感覺！


    184'
  - '[PAGE 186]


    可是當我試圖跟著前方隊伍所留下的步伐前行時，卻因手酸腳軟體力不繼下，竟失足從崖邊滑下！由於這意外來得太過突然和迅速，再加上身處澎湃激昂的瀑布旁，因此前方的伙伴並不知道我的境況！當下我的腦袋只餘空白一片，並認定這兒是我葬身之地！就在這絕望念頭生起的一霎，突然感到四周傳來一陣像是「六字大明」梵咒的震弦音頻將我包圍，剎那間竟感到一片光明和輕安！


    正當急速滑落快將掉至崖下之際，在這千鈞一髮間；突然感到腰肋間被一股外來力量從後猛力抓勒，原來有一陌生青年奮力地從後將我抱緊！其實這人當時的處境亦相當危險，只餘一腿勾在一根斷裂的樹幹上，而整個身軀卻倒掛著並用雙手大力地將我抱緊！由於當時我倆都身處險境，同時亦受著崖邊激起的水花沖擦的壓力，如不趕緊召來救援，恐會因體力不支，一同墜於險峻的山崖下！我們奮力地連呼數聲後，崖上的人終於聽到我們的求救聲前來救援，這刻同伴和嚮導才察覺到有人意外墜崖！幾經努力下眾人終把我們拉回崖邊的安全位置，同伴更即時為我們檢查有否受傷，幸運地我們只因驚魂未定，只須攤坐在地上一會就可從新出發。而我亦對本來充滿期待的天池美景頓感興緻失卻！只渾噩觀看一會後，就隨大隊回到山下的'
  - '[PAGE 187]


    # 奇幻的

    通靈印記


    營地午飯。


