    # 道壇驅煞


    在留院多日後終於祈盼得到母親前來解救，臨出院前她還親自餵我飲了一些清水後，就把我帶至觀塘會合一位牛下街坊……若干年後我才知悉這是事先安排好的符水。這街坊是一位住在牛下十三座的同鄉年長嬸嬸，我們尊稱她三姑。原來之前多日不見母親前來醫院探望，是跟隨這位同鄉嬸嬸到一處位於觀塘的道壇求助問事。


    事緣這位年長嬸嬸早前應母親要求曾到醫院探望，嬸嬸發覺我的病情可能是犯著甚麼陰煞邪靈，故此她著母親先帶同我的衣物和出生資料到此道壇扶乩問事。及後母親更應這位同鄉老道人「壇主」要求在壇前跪拜三天來為我解厄！老道人從乩文得知我因好惹閒事而犯煞，故此叮囑母親應設法接我出院並親至壇前為我解厄，並告知事情已發展到非常危急的地步，如再耽誤恐會性命不保！故此我就在狀態頗為不佳的情況下，被帶到這個位於觀塘某單棟唐樓的道壇（註：因此道壇現還在經營，故只好隱去其名，所供奉的主位是八仙中的某大師神祇）。


    還記得當時的我自覺體虛乏力由母親手抱著，在到達該道壇的地下入口大閘時；我已發現大廈四周及天花門頂'
  - '[PAGE 81]


    間；均出現眾多拖著大白尾巴的小白貓、小人兒和眾多紙鳥，在這棟樓層間的天花與牆垣間來回穿梭與飛舞……


    （註：這些小人兒體積有如 LEGO 樂高小玩偶般大小，而那些紙鳥全是由黃色的符紙所摺成；而當時我誤以為是白貓的動物，至若干年後我才意會到，這應是道教傳說中的狐族信使。）


    這個看來忙而有序的場景當中，還夾雜著熱鬧的踏步聲與「熠熠」紙聲。但發覺……當越是接近目的地時，耳邊傳來越發響亮的高階音頻迴聲。及至該道壇時，我竟看見有位穿戴得像電影中的古裝仙人，正襟垂目盤坐在神壇之上！這是一個頭頂盤有髮髻、身穿道服和黑髮長鬚的清瘦神仙形象，但是其整體外形及比例卻跟真實人物偏細。只見那仙人頭頂上方及左右，均發出幾柱耀目強光，手執塵拂安然寂坐在壇中主位！而在他身後更化現出一個亮麗多彩的大圓旋轉光圈，那急速轉動的光圈看來像是某個異度空間的出入口！而此刻我才明白原來那些高階音頻迴聲，是由這個光速旋轉的大圓光圈所發出！（註：在非降乩時段，沒有仙人坐壇的現實環境時；神壇背面牆壁，只是繪著一巨型「陰陽八卦」的黑白圖案而已）。


    此時我對這眼前光景只感到相當眩迷，對母親何解將'
  - '[PAGE 82]


    # 第一章：牛下童年


    我帶至此地更感迷妄，只知心中懼怕又被送至一個令我驚遽的陌生地方！這時三姑領著母親和我來到壇前，在稟明來意後我們隨即上香跪拜，只見壇前設有一排供桌和築有一道木圍柵分隔著眾多前來問事的善信。當時壇前站著幾位道人各自忙著不同程序……有的在抄寫、有的在宣讀、有的手執丫形樹枝圍攏在一張八角形的雲石小几前撥弄推拉，可是那時我並不知道這些人原來正在扶乩問事！


    當前的熱鬧畫面，更有天花牆垣間；來回穿梭的眾多小人兒……全是手執朝笏、腳踏長靴和身穿古長袍的文官模樣，其排列及步伐一致並大步行走於壇前及室內所有空間，像是忙於執領甚麼法旨！再加上那眾多在壇前與供桌間來回走動的大尾白貓，還有在門窗之間虛空往返飛翔的「熠熠」紙鳥……就在我對這眼前迷亂玄奇的光景感到極度茫然之際，只見老道人壇主口中唸唸有詞稟請，並從壇中請來一個古舊的大木方印，然後猛力地在我的頭頂蓋上一個朱砂紅印……被這出其不意的猛力一擊後，我頓覺潰散昏瞶的意識，竟在瞬間從四方八面的虛空中全都收攝回來！還感覺頭顱上方那恍如張開布袋般的缺口，瞬間像被捆綁封緊！而那潰敗的精神意識，頃刻間從新薈聚、頓覺沉痾頓癒！'
- md: '回家昏睡多日以後，自覺腦袋沒像過去般機靈……並感到顱內腦袋某些區域像被濛蓋關掉，但對能與家人團聚已感到無比珍貴！而我對何解要進出醫院和到道壇的緣由及經歷亦漸感迷糊，再加上母親往後亦不願再談及此次驅煞事件……故此我從不知原來當年壇前所見的種種仙人及扶乩異象，並不是每人都可窺見的異界內容！再加上老道人曾私下對我細語叮嚀，再三吩咐我往後不要再好管閒事……對看見某些東西和現象也不要多言，只須寄存在內心深處，將來自會明白……這樣我才能健康成長！


    此後，在某段年月中，長輩經常帶同我們到此道壇參拜和祈福。由於慈祥和藹的老道人与父母是同鄉關係，故此他們的對話和扶乩內容，全都是我聽不懂的潮州話；只知每年母親都會為家人請來一張寫滿流年事項的紅帖，作為我們一家來年的注意提點。母親曾對老道人表示擔心我的危難比別人多，因母親認為這是不足月出生體質虛弱所致，更擔心往後可能再誤犯甚麼陰煞邪靈！於是，老道人應母親要求請來靈符幾道；著各人帶在身上，並吩咐於家門高掛令旗和葫蘆，這樣就可免除陰煞來犯。但自家中貼上靈符後，我卻發覺那些壇前白貓（小白狐）往返出現在家中的情況漸多。間中還會飛來那些壇前紙鳥，到後來；


    ## 第一章：牛下童年


    我亦漸意會到每當聽到「熠熠」紙聲出現時，我就知道這些壇前小侍，又要忙於為道壇報訊……每次看見這現象時，著實令我深感別緻和有趣！


    還有另一個有趣發現，就是只有老道人「壇主」親自主持當天的扶乩問事時，我才會看見那壇前仙人出現……即前段所述情況！但如果是由其門下主持這類儀式時，卻只有壇前往來相告的小量白貓、小人兒和紙鳥！在若干年後老道人駕鶴西歸後，這道壇就由其門下後人主持；而我亦發覺這些壇前小侍，卻僅餘零星往來！


    ********


    後記：往後多年家中長輩已不曾到此道壇參拜，近年在我好奇詢問下，母親表示自老道人駕鶴西歸後，門下後人在每次祈福問事的內容和結果，都只是囑咐多添香油；表示這樣才能安撫陰間祖先得到庇蔭，還有對一些提點事項每次亦只是些模稜兩可的內容，久而久之母親及其餘長輩亦不再前往了！


    ## 幼稚園高班廁所


    自那次因發高熱入院至道壇驅煞事件後，自覺康復後的我在學習和體能上退步不少，故此在經常缺課的情況下……我在不知不覺間已躓躓至幼稚園高班。


    直到現在相隔這麼多年，我亦對這所位於觀塘外婆家樓下的幼稚園，那種種教學和經營手法非常不滿！因這校每月總會開出林林總總的名目來向學生家長徵費，但校方卻為著節省影印開支；而經常在上課時段內，要學生抄錄冗長的課文或通告內容，這樣卻大大的佔據了真正學習的教學時段！還有校內不設茶點安排，反而在每節小息時段；由校工嬸嬸到每班兜售各式零食和飲品，價錢還比外購的昂貴……而每季的生日會，校方都會要求生日的學生自備蛋糕前來，美其名說保證每人均會被安排參與，實質是可藉此機會增加額外收費！更無奈的是……老師更會事先向學生要求，須帶來哪種口味的蛋糕，和甚麼磅數的蛋糕參與！


    還記得在高班這年的生日會前期，我被老師埋怨去年因病缺席而沒有參加，故此這次是我在幼稚園就讀的最後一年，所以我被要求生日會那天，須要帶來最重磅數的蛋糕來慰勞老師和同學！就算我當時年紀雖小，但也深諳家中的資金並不充裕，對這個人生第一次的生日會感到有些矛盾！回家後如實告知母親時，母親才意會到這是我的首個生日會，故此她亦想為我帶來愉快的回憶與分享，所以母親在這段時間默默的為我籌措和安排當天的禮物……一個分量十足的朱古力蛋糕！還記得當時母親對我表示這個蛋糕比普通口味的價格貴些，期望我能於生日會完結後帶回一些給妹妹品嚐！因此當天我喜孜孜的帶同這個名貴蛋糕回校，更暗地裡跟幾位要好的同學表示今天會有朱古力蛋糕吃，只因當年這種味道的蛋糕是屬於貴價口味！但可惜到後來卻發現我們學生只能分享到普通口味的蛋糕，而我帶來那個全場最大和最貴的朱古力蛋糕，卻早被搬至教員室內某角了！


    好了……說了這麼大篇幅的內容來表達對這所校店的不滿，現在就回到這篇靈異經歷的內容吧……還記得這是將升讀高班前的一個暑假中午，母親突然接到校方來電告知，因校內要進行緊急維修所以這個學期要延遲上課。


    這年我們全班同學被安排至另一個與小學部相連的課室上課，校方表示由於我們已升讀至高班關係，故此不能再佔用低班那邊的廁所，所以要求我們轉至與隔鄰課室共用一組廁所。由於兩組學生的上課時段有所分別（一組幼稚園、一組小學）而相隔的小息和下課時段也各自不同，所以我們學生並不能每次都可輪候到上廁所的機會；因此從這學期開始我亦刻意的告誡自己，應避免因多飲水而要頻至別班叩門！


    直至某星期因隔鄰小學部舉行中期測驗，班主任特意事先聲明：「上課時，你們應盡量避免到隔班借用廁所；如不得已非借用不可時，亦只可一個跟一個舉手輪候和禮貌地肅靜前往。」可是由於僧多粥少，班上很多同學都爭相在課堂中舉手，故此在學期中段時班上已有幾位同學在課室內尿濕褲子，還因此而被記上多個藍豬印章！


    如是者，同學間對向隔班借用廁所早已心生壓力和懼怕，可是某次我因一時忘卻在小息時多喝開水，故此在上課途中都要迫於無奈舉手！這刻隔班老師早已對我們多次在授課途中借廁要求深感不滿和厭煩，但礙於這是學校的行政問題而把矛頭指向學生發洩！這次可說是我首次踏足該班的廁所，當叩門後小學部老師已擺出一副不滿的眼神和語氣嚴厲訓誡不要製造聲浪，還要求應雙手放後；沿課室外圍右行至末段的廁所後，再循左方向老師躬身行禮，方可離開。


    現在還深刻記得當時這課室給我的第一個印象……其實，當我戰戰兢兢的進入該課室時，已深感奇怪何解室內這般昏暗和嘈吵？當中有一把近乎歇斯底里的女聲在咆哮泣叫和傳出陣陣燒焦氣味……！故此當我被這位老師投訴擾人時，自忖這課室當中的咆哮女聲還比我更擾人學習呢？就在我沿右邊牆壁慢慢步往後排廁所方向時，我竟看見多月不見的校工嬸嬸；竟披頭散髮的坐在牆邊某暗角……驚呼泣嚷！在其身邊更圍攏著一堆堆用麻繩綑著的發黃報紙，但我卻發覺這堆數目眾多的舊報紙，全都有被火燒過或被水沾濕過的痕跡。只見那本來乾瘦的校工嬸嬸，不停地把手中報紙撕成長條狀；然後伸出長長尖細的舌頭，把手上的報紙舔濕多遍後吞掉……當時我還奇怪原來「我們」（人類）的舌頭竟然可如青蛙般伸至胸膛長度？還有我發現當越是步近她的身旁時，那股燒焦的氣味就越顯濃烈，只見校工嬸嬸向著我如發狂似的驚呼泣嚷著，我聽不懂的家鄉話！此刻我對出現在眼前的校工嬸嬸，感到相當迷惑和陌生！皆因這並不像平日小息時，向我們兜售零食文具時的平實模樣（註：嬸嬸是女校長的鄉間親戚，蓄著髮髻、黑衣素服的一副鄉間中年婦人模樣。）我雖對這眼前光景感到狐疑懼怕，但還是鼓著勇氣默然前往廁所那方。


    到達後我才發現這是一個屬於成年人身高才適用的坐廁，對幼稚園班級的學生並不適合！再加上這不是當時牛下家中的那類蹲廁，因此我在折騰了一會後才勉強成事；就在打算沖水離開時，我才發覺抽水箱內並沒有沖廁水供應，故此只好硬著頭皮向老師表示抱歉！這當然招來更多不滿批評，最後老師著後排一位男學生到男廁取來一個膠盆給我盛水，就在我打開水龍頭盛水時，卻驚見這組高掛式的廁所水箱頂上方；那組通往後巷的氣窗上，突然出現一個身穿薄背心的嶙峋老頭對我不斷怒吼！只見老頭一手扼著氣窗鐵枝、一手伸前亂抓並氣急敗亂地叫嚷著：「水……水呀……拿水來……！」由於我對老頭所說的家鄉話並不明白，後來我更赫見這老頭竟激動咆哮至全身燃著一團橙紅烈焰！我冷不防被這伏在窗外的老頭嚇煞著，所以一下子驚惶得把盆中的水打翻，而弄致地上濕漉一片！這當然把早已火冒厭煩的老師氣得七竅生煙，此刻我自覺孤立無援的請求老師原諒，但內心狐疑何解在這課室內，吵嚷的兩位元凶卻不被老師責怪？至後來我更被這位老師投訴至班主任那方！自經此一役後我對重臨此課室廁所視為畏途，故此往後另一次我寧願硬著頭皮在課室椅子上解決……當然事後換來見家長和記過的命運！


    另某天放學回家不久，母親因急於把完工的膠花送往收發站；所以我被暫託在鄰居吳伯伯家中，由於母親臨行前表示，須等待讀小學的姊姊放學後才一起煮午飯……實情是家中缺錢，要等母親把工錢收取後才能買菜。所以我只好和鄰居女兒一邊做功課一邊等著母親回來。及至個多小時後我們均感到有些餓，但當其時家中只有正在午睡的吳嬸嬸，故此我們在思索著還有甚麼東西可以果腹時，我才猛然想起那回見識過，校工嬸嬸捲吞報紙的情景！於是我依葫蘆畫瓢的模仿著……把鄰居家中的報紙撕成細條狀後，就伸出舌頭把報紙來回舔濕……然後慢慢的吞進肚裡……就在我們把報紙撕掉捲搓得興致勃勃時，吳嬸嬸在房間內忽聞廳中傳來嘈吵的撕紙聲，才知我們孩子間竟然胡鬧得在撕吃報紙！這當然又換來對我的投訴和教訓，再加上母親對我近來的種種反叛行徑感到非常丟臉，所以到最後我還是被狠狠地痛扁一場！


    及後我如實告訴母親只是模仿校工嬸嬸的行為，誤以為這是可以作為果腹充飢的食材！母親當然轉向校方投訴，校長還堅稱校工夫婦早已回鄉養老，你家女兒又怎可能在學校再見這位嬸嬸呢！


    ********


    後記：原來在學期初延遲開學的原因是……居於後巷的校工嬸嬸老夫婦有晚打翻了火水燈，從而燒著雜物繼而引發大火，因此被雙雙燒死（註：廁所上的氣窗是後巷的唯一通風口，亦是當晚失火現場）。


    及至後來這課室又再無故丟空封鎖，好像是因某日下午班師生集體見鬼！再若干年後該校亦因收生不足而停辦。但不知何故該校原址……崇仁街一列地舖在空置多年後才由校長一家改建為酒樓，由於外婆與校長關係熟稔，故此當年我們一家亦獲邀試菜；而我對當年該廁所的恐怖經歷還記憶猶新，故此我藉這次機會借意打探一番！


    原來：校工夫婦自鄉間來港後即投靠校長一家，故此被安排在後巷內某角窩居；他們負責校內一切雜役和垃圾清理，兩夫婦膝下無兒過著省吃儉用的簡樸生活，只寄望鄉間的過繼女兒早日獲批來港定居。可惜就在其乾女兒如願到港後不久，某晚卻意外離世了！


    經過這次再舊地重遊和了知那場起火原因後，我頓然明白何解當年校工嬸嬸到死後化為怨靈時，亦要圍守坐在那堆滿滿的舊報廢紙中？現在回想那堆起火源頭……「舊報廢紙」在其心靈深處是一堆堆可變換財帛的果腹家當，是她所珍視的人間財產！


    ## 白衣姐姐


    這是一個難以磨滅和帶傷感的靈異經歷，大概發生在同年某個炎夏。當年屋村生活條件貧乏再加上電壓設施不足，炎夏晚上各戶只能以電風扇作為解暑工具，因此各鄰舍都會選擇席地而睡；而個別人口多的家庭更會選擇睡在各樓層間的通風位置，故此每晚門廊內外都顯得熱鬧處處。


    由於這年夏季著實熱得難熬，眼看各鄰舍都找到解暑安睡之法；故此母親不理父親反對，某晚帶著妹妹一同在門前鐵閘內席地而睡。由於這位置是家中最通風涼快的好位置，所以妹妹此夜不用再多番安撫就能乖乖入睡。可是當睡至半夜時，我突然被一股不安情緒弄醒；在直覺反應驅使下，帶著惺忪睡眼尋向母親睡覺的方向時；只見本來安睡著的妹妹，突然手腳無故抖動繼而驚醒啼哭！母親隨即從夢中醒來並加以安慰，可惜妹妹又如過往被驚嚇過後的情況一樣，又無故發燒！至第二天長輩們均認為可能是幼兒體質弱不宜睡在當風位置，所以母親只好帶同妹妹撤回廳內安睡。至第二晚這個清涼位置已被姊姊急不及待的早佔先機了。但不知何故，至天亮時我卻發現姊姊竟悄悄地睡回廳內的舊位置。我好奇詢問何解願意放棄這涼快位置時，姊姊只表示下一晚可以將此位置讓給我睡，我聽罷當然欣喜接受呢！於是這晚我早早擺好枕頭薄被不消一會就能清涼入睡……


    ********


    但在矇矓夢中，竟看見門外出現一穿著如「古裝大戲」般的白衣長袍的長髮姐姐經過。這夜半出現在家門前的白衣姐姐樣子秀麗，但面色卻異常蒼白而且身材纖瘦。她蹲在家門鐵閘前柔聲細語地呼喚著我起來到其家中作客，我當時雖然身處夢中，亦感到這陌生的白衣姐姐身上傳來一股莫名的驚遽感！我不為所動的正想退回廳內再睡時，白衣姐姐忽從衣袖內取出一個兩邊繫著小圓珠子的小搖鼓來向我展示搖動！（註：這是一種底下連著一根木把手的小搖鼓，前後鼓面均有手繪圖畫。）並哄騙著說其家中還有更多比這搖鼓更精緻的玩具和好吃的東西，更著我快些起來到其家中親自挑選……說罷即從門欄外捎進來給我把玩。但不知何解這搖鼓在搖動幾次後，卻慢慢地變得異常骯髒陳舊，及後我還發現鼓身更黏附著不少泥土，活像剛從地底深溝挖出一樣！


    這時我自覺應快些掉頭離開，並繼續安睡。白衣姐姐眼看我對其手上的小搖鼓不為所動時，於是隨即從衣袖內取出一枝藍原子筆來（這是早幾天中午時，我坐在家門前做功課期間無故丟失的文具）。此刻心中不禁狐疑著何解當天遍尋不獲，而這刻竟在夢中尋覓得見？就在我猶豫是否應聽其指示開門取回此失物時，耳邊卻傳來幽幽淒怨的絃樂歌聲！當這些歌聲生起時但覺泛起一股令人悲傷的情感來，這時白衣姐姐訴說著希望我能做她的兒女，還承諾會比現世父母更為照料和愛護孩子……！聽罷我自覺感到有些難堪，回想生活中時常招來父母責備和打罵，究其主因是家中經濟環境欠佳所致，故此心坎中總希望能快些長大自立，這樣就能外出工作掙錢養家！


    就在我思索應怎婉拒其好意時，白衣姐姐已逕自走向往十三座方向的一個公眾位置前停下……是街坊稱為大廳的地方並向我招手。由於想到這枝原子筆是從姊姊那兒借來暫用……最主要是明天上默書課急於使用。所以此刻我只好亦步亦趨的跟隨其後，但當步至其家門時卻發現這個本屬牆壁位置的地方（註：牆的另一面為地下至高層的升降機位置，因我家處於低層，故此這樓層只是一面牆壁）。在夢中卻是白衣姐姐家門所在之處……古舊簡樸的農村門戶模樣，當白衣姐姐打開家門時只見屋內布置陳舊和異常昏暗，這細小的室內正中放著一小方桌，桌上放著滿盆食物和點著一盞小油燈。而桌前更坐著一小男孩正在捧著碗筷大口大口地吃著桌上的食物。我站在其家門前要求討回失物時，白衣姐姐轉身急喚我快些進來，還在桌上搯出滿碗食物來給我享用（註：是用舊時農村那種公雞圖樣的大口碗盛著）。


    此刻我終於憶起屋內這個令我深感眼熟的小男孩是誰⋯⋯原來是與母親同鄉的一位鄰居嬸嬸的么兒子，他是住在同一樓層的十三座尾房鄰居。就在我好奇何解這個跟我差不多年歲的小男孩會在我的夢境中出現時？只見地主伯伯突從我家方向趕來將我從白衣姐姐身旁拉開。


    地主伯伯語氣非常嚴肅的訓誡著我何以獨自步進這陌生境地？並著我千萬不要接收任何東西和食物！此時我才驚見剛才那滿碗食物原來是蛆蟲滿布的髒東西，而我身後的十三座大廳空間；更即時化現出眾多，對我咧笑不已的舊衣飾老人和古舊村屋（註：此位置之前某篇曾提及過，我在某些陰沉日間亦曾看見這些古舊村民出現），這時白衣姐姐隨即厲目怒瞪著伯伯更想強行將我拉進屋內。伯伯立刻緊拉著我並命我快些掉頭回家安睡，但我的內心還是記掛著想取回失物，只見那支失筆正正擱在眼前這丁方室內的木桌上，於是我向伯伯承諾，讓我進內取回失物後便會立刻回來！但伯伯眼看我還是這麼決意時，竟嚷著要喚醒我的母親前來，好讓她能給我好好的教訓一番……！當聽到「母親」兩字我頓覺心頭一陣驚遽，已趕緊跟隨伯伯步伐急步回家安睡！這時自覺身後傳來一陣怒吼和狂飆暴風，霎時間一切農村舊物霧化消失！


    ********


    至天亮時我對昨晚的深刻夢境感到萬分不解和難忘，對夢中的眾多內容，自覺太過匪夷所思難向別人啟齒！直至中午放學回家做功課時，姊姊才悄悄的詢問我昨晚所睡的位置有否夢到甚麼怪東西？是否夢見門外有一身穿白衣的女子出現……這時我才放心將夢境中白衣姐姐向我送上搖鼓和失筆內容大致說出！但我並沒將地主伯伯出現那段說出，因這是伯伯要我保守的秘密！而姊姊亦告之在其夢中，那白衣女子亦是多番軟語利誘著要她跟隨外出。綜觀我們姊妹三人在這多晚所發生的怪現象，最後姊姊總括認為我們夢中所見的白衣女子定是「鬼物」無疑！這個「鬼」概念對當時的我來說，倒感到十分震撼……可是這時我們姊妹間的悄悄話剛巧被母親聽見，母親聽罷隨即厲聲的責備我們在胡謅瞎說甚麼「鬼話」，更告誡著：「我們一家向來都是家宅平安，一切順遂！如往後何人再在家中鬼話連篇，定必將其好好教訓！」


    如是者我們孩子間亦不敢重提這次經歷。然而時間日子又再嘩啦啦耗在上學和家課間游走掉，直至某日中午姊姊因參加課外活動要遲歸，母親著我趁此良機可到門外踏玩一會兒三輪車。由於這三輪車是因姊姊考獲好成績父親買來獎她的禮物，平日她極為吝嗇不願借玩！所以這刻我歡天喜地載同妹妹一起在門廊外踏玩著，這樣可讓母親安心在家趕縫外判童裝來幫補家計。可是不消一會兒妹妹又鬧著要回家找母親，由於母親忙於趕工，我被要求與妹妹多玩片刻！所以我只好順應哭鬧著的妹妹要求，踏著三輪車與她一同到十三座長廊那方去「歷險」！這區域是父母不准許我們隨便闖至的地方，因為這類舊式屋村，就算平日中午，長廊總是給人暗沉感覺！再加上常有一些不速的小流氓，總喜歡對其他孩子欺負！可是我為著好好安撫妹妹，只好以戰戰兢兢的心情前往！但當踏至十三座時，竟看見長廊盡頭透著一點小光；及至踏近時才發現原來是這家門外，置放著一個內裡燃點著一根白蠟燭的方形鐵桶。


    此刻我才憶起這戶是早前夢中那個曾到白衣姐姐家中作客的小男孩家門，由於我跟這位鄰居嬸嬸不太熟絡，故此我只在其家門外巡察一會便打道回家。


    回家後我第一時間詢問母親去年收藏的中秋燈籠和蠟燭放於何處？母親對我的提問感到不是味兒，告訴我還有兩個多月才到中秋佳節，因何要這麼早就鬧著把玩呢！於是我道出剛才所見……那門前點燃的白蠟燭燈火！而母親亦若有所思及好奇我的發現，故此隨即步至此家門外了解。由於三姑跟這位尾房嬸嬸關係比較熟絡，母親隨即致電住在同座的三姑細問原因。及後母親向我表示，剛才所見那門前點著的白蠟燭；並不是甚麼中秋玩意，而是代表這戶人家有人過身的意思！可是當年我對「過身」的真正意思其實亦不太明白！於是在我再三追問下，母親才道出「過身」的是那鄰居嬸嬸的么兒子，是發生在早前某晚，無故一睡不起而離開！


    這刻我的小腦袋又再因一時衝動，忘記早前母親禁令而道出當晚夢中所見，我還天真地向母親表示，小男孩只是到白衣姐姐家中作客未返而已！讓我下次夢中再見面時喚他盡快回家吧！母親聽罷卻馬上怒斥著我又再好管閒事，還著我千萬不要再在家中胡說這些「荒誕鬼話」！


    其實這年除了我們一家外，還有對戶的鄰居叔叔亦曾因晚間睡在門前出事，而這位鄰居叔叔更是體格強壯的修船工人。某晚他亦如妹妹當晚情況一樣，像在夢中被甚麼東西犯著而驚醒病倒！直至後來另一位年長的同鄉叔叔表示……舊時鄉間只有等候舉殯的先人或垂死之人才會被置擱在家門前，而我們卻不知就裡犯著這些忌諱，因此招來陰人前來勾魂騷擾！


    *********


    另一則奇聞是有位居於別座的青年，某年夏天亦同樣因為睡在這個公共大廳一段日子後，整個人竟變得暮氣沉沉和怪異，及至後來甚至大白天亦睡在相同位置不思飲食！後來他的家人終聯同多名親友，採取強硬態度才能將其強接回家。但不到久這青年又再故態復萌潛回在老地方，聽說後來好像還要請來甚麼術士道長前來驅邪安魂，其神智才得以回轉過來！


    *********


    98


    關於無故「夢中猝死」而過身的案例，在早期牛下的十幾年間常在鄰里間出現！而令我感到奇怪的主因是……當年生活簡樸飲食清寡，人們極少患上現代的「三高」都市病！其中比較深刻的一則是發生在小四時同班某同學的父親身上。這同學的父親年紀不大，健康一直不錯但亦在某晚無故「夢中猝死」過身，當年全校師生更曾為這同學的父親籌措殮葬費！此事發生後令我即時聯想到「白衣姐姐事件」，直至現在我亦對這類「小搖鼓」心存陰影！


    ********


    後記：這次經歷全賴地主伯伯及時出手相救！回想人生中的眾多奇遇，當初大多只意會為「做夢情節」而已，但很多時夢醒後卻發現竟能與現實世界中的人和事相呼應！直至年長後我才認知到這是「靈魂出竅」現象……地主伯伯稱「離魂」！而這位在我童年時給予多番保護的地主伯伯，可惜到後來也要跟他別離（往後另一次奇遇將會提及與地主伯伯的故事）！


    至於當年那白衣姐姐的出現，地主伯伯只略提及到她是「紅船人」。現在我終於明白是怎麼一回事……從其衣'
  mdcn: '回家昏睡多日以後，自覺腦袋沒像過去般機靈……並感到顱內腦袋某些區域像被濛蓋關掉，但對能與家人團聚已感到無比珍貴！而我對何解要進出醫院和到道壇的緣由及經歷亦漸感迷糊，再加上母親往後亦不願再談及此次驅煞事件……故此我從不知原來當年壇前所見的種種仙人及扶乩異象，並不是每人都可窺見的異界內容！再加上老道人曾私下對我細語叮嚀，再三吩咐我往後不要再好管閒事……對看見某些東西和現象也不要多言，只須寄存在內心深處，將來自會明白……這樣我才能健康成長！


    此後，在某段年月中，長輩經常帶同我們到此道壇參拜和祈福。由於慈祥和藹的老道人与父母是同鄉關係，故此他們的對話和扶乩內容，全都是我聽不懂的潮州話；只知每年母親都會為家人請來一張寫滿流年事項的紅帖，作為我們一家來年的注意提點。母親曾對老道人表示擔心我的危難比別人多，因母親認為這是不足月出生體質虛弱所致，更擔心往後可能再誤犯甚麼陰煞邪靈！於是，老道人應母親要求請來靈符幾道；著各人帶在身上，並吩咐於家門高掛令旗和葫蘆，這樣就可免除陰煞來犯。但自家中貼上靈符後，我卻發覺那些壇前白貓（小白狐）往返出現在家中的情況漸多。間中還會飛來那些壇前紙鳥，到後來；


    ## 第一章：牛下童年


    我亦漸意會到每當聽到「熠熠」紙聲出現時，我就知道這些壇前小侍，又要忙於為道壇報訊……每次看見這現象時，著實令我深感別緻和有趣！


    還有另一個有趣發現，就是只有老道人「壇主」親自主持當天的扶乩問事時，我才會看見那壇前仙人出現……即前段所述情況！但如果是由其門下主持這類儀式時，卻只有壇前往來相告的小量白貓、小人兒和紙鳥！在若干年後老道人駕鶴西歸後，這道壇就由其門下後人主持；而我亦發覺這些壇前小侍，卻僅餘零星往來！


