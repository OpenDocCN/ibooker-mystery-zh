    對於我這個新學員來說，很快便察覺到當中存在著某種氛圍，蘊藏著不少山頭主義在其中。差不多同一時間班上亦來了一對年輕夫婦，但論熱衷參與程度反而是妻子佔先；這位同修太太後來更刻意調職轉為下午工作，務求能參與每天的早課及靜坐。


