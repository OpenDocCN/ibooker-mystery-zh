    # 第三章：靈魂出竅


    在嘗試飛升的初期，首要克服的是那強烈的失重感與離心力，還有出體時意識焦點的持續與穩定性，這都是影響出體活動的關鍵！因此早期的出體遊歷只能維持在短暫的時限內，回體時亦往往因精神能量不足；或肉身附近被某些突發聲浪影響，而導致急速掉回肉身！在嘗試過多次失敗引致急速回體的日子後，我開始進行事先計劃的「出體實驗」！


    ********


    當我能夠掌握到飛升技巧後，我的飛行速度和高度亦大有進步。首先嘗試在居所外圍飛行，並鳥瞰這個從小生活的牛下一帶。由於臨近九龍灣港鐵站關係，因此那天清晨我從窗戶飛出時，早被那列剛從彩虹站山邊方向駛出的列車所吸引！再加上那段鐵路是架空形式興建，而我當時的飛行高度更在列車之上；因此能夠清楚看見這組行駛中的列車整體模樣，並發現原來行駛中的列車；在外圍及所觸及的電纜間，均會閃耀出一團強烈的藍色電流光波。此刻忽然生起與列車比拼車速的測試實驗，看看這種以意念為主導的「出體飛行」，其能耐與極限會有多大！於是我跟隨列車一直往前飛，意念間已迅速飛至藍田站位置；是回頭卻發現列車還未到達牛頭角站，因此打量還有甚麼玩意可讓我再作測試！此時，剛巧看見「藍田站」前方的匯景商場外圍；某些裝修圍板裝置，發現一所出名的日本百貨「八佰伴」快將進駐的消息；此時心念間認為這可作為測試出竅能力真偽的資料，待我明晚放工後刻意轉至上址印證，看看是否吻合！


    如是者那段時間，我卻忙於這種看似無聊的「出體」實驗遊戲，直至某天終於踫壁了……!


