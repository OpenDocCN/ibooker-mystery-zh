    # 第二章：通靈現象


    正當苦惱不適難眠之際，卻無意間從房間門縫中；看到廳外竟然坐著正在舉杯吃喝的賓客，這個場面當然令我感到十分詭異！原因是我剛從廳外飲水回來，前後只是一個轉身的片刻而已；試問又何來趕及設置滿室筵席和賓客呢？眼看這席間賓客全是灰黑素服的莊稼漢，整體景象更泛罩著團團的銀白光影，他們大都操著我聽得不太明白的潮州話，只見席上各人均露出歡敘暢飲的神情……此刻我的腦袋只餘一片迷惘和空白，內心不斷向自己解釋……可能這是鄉間人清晨趕田關係，要在這深宵時刻吃早飯呢！


    正當我以為大可嘗試放緩情緒試圖安心再睡之際，忽從廳外傳來一把尖細的女子聲音；接著竟看見一名長髮的白衣女子拿著一盞小油燈，身後還伴著一名白衣小孩，從廳外飄然而至。這刻我打從心底有種說不出的意會和懼怕，但卻又以理智的心神不斷地重複著……這是幻象……只是幻象……再不然應該是一個真實的人物吧！


    可是當那女子越步越近房間之際，我卻清楚看見這是一名只餘上半身虛現的鬼物！眼看白衣女子及身後小孩一再步近，像要掀開我正身處的床上蚊帳時，躲在蚊帳內的我終按捺不住，在床上不斷叫嚷著：「有鬼……有鬼呀……快些起來……大家快些起來吧……！」那刻真的把我嚇至


