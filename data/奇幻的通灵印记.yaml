    # # 藍地義工


    當年經常跟隨某些好友或同修自發到一些鄉郊地方做義工，多數為一些年老無依的長者送上溫馨探訪，或年尾時為一些家居或院舍清潔維修。


    某年年終，我們一行人來到屯門藍地某間位於山上的庵堂進行大掃除，這是一所古舊荒僻的戰前三層式建築；據老住持所憶述全盛時期這裡居住過百女尼、居士和香客；可惜現在只餘這位年邁尼師住持，和一名剛從國內到來參學的年輕女尼居住。由於位處偏僻因此她們日常生活上的基本配套，只能以簡單的方式運作和飲食，故此這些尼師多數不甚健康！


    當日我跟隨大家初次來到這地方時，早被那感覺似曾到訪的山路所警醒，因此沿路上我於腦中極力追尋這是何種現象時，腦袋才憶及這是某些「夢中景致」！


    及至到步後發生了一段小插曲⋯⋯我們站在鐵絲網前那白木籬笆門外等候進內時，我已急不及待向友人表示，這是我某次夢中「到此一遊」的地方！還向他們表示：「夢中顯示⋯⋯當我進入此籬笆門後，會被突然從左邊撲來的一頭黑色惡犬所咬傷，因此我害怕會惡夢成真！」此刻另'
  - '[PAGE 313]


    一位曾到訪多次的同修表示:「這裡從沒有你所提及的甚麼黑犬,你這種多疑的性格實在是庸人自擾!」於是他還主動跟我掉換位置,只為證實我的愚昧!可是當我們步進籬笆門內的剎那,左方竟然真的撲出一頭凶惡異常的黑犬;由於我對此情景早有防備,因此我並沒如夢中受到傷害!相反那位跟我調換位置的同修卻被那黑犬噬個正著,猶幸他及時用背包阻擋,因此只是被咬破背包某角因而避過一劫!而這突然闖至的黑犬則被其他同修用竹竿合力轟走!細問之下女尼表示此應為山上野犬,可能是從某角籬笆缺口潛入,因此要求我們盡早修繕以防再有同類事件發生!


    接著我們先向老住持問訊寒暄,然後由女尼帶領進入室內向主佛壇頂禮後便各自幹活。有些清潔廚房、有些拭抹門窗、有些為戶外鐵器上漆,一時間忙個不亦樂乎!


    至大約下午四時左右,老住持要求我們一同參與庵堂晚課,因此我們便放下手上工作潔淨雙手跟隨。眾人均手持清香一枝,然後魚貫跟隨住持及女尼,到各樓層間的佛壇繞佛及頂禮!由於這些儀式要配合經偈及佛號念誦,而我自覺對這些唱誦不太熟悉,因此我被安排在一行人的末端位置,只須跟隨合十頂禮便可!


