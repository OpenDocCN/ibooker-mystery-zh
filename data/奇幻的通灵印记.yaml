  - '[PAGE 65]


    歲的我向地主神位上香和卜杯稟請其到位，伯伯深感投緣便應我家請求前來照應。可惜我對此真的了無印象！伯伯更表示及後某晚上，我要求讓路時；那刻才發現我竟能看見其形象，並能與之交談，對此更是深感錯愕！因此伯伯好奇地向我詢問，是否來自傳說中的「界外境地」？可是我對甚麼界內界外真的並無概念，只告知自覺初出生時因犯著某些過失；因此在一個充滿亮光的高空急墮下來！但當再次回憶時腦間只感到像被某些東西隱蔽著，只餘某些矇矓印記。伯伯聽罷隨即向妻子表示，過去曾聽說過某些關於「界外」的傳說！


    只可惜這次拜會地主家的其他內容，於天亮睡醒時卻被我忘掉不少！只隱約記得伯伯要我保守一切跟其交往的秘密，因這只會為我招來災厄！


    後記：地主伯伯在我幼年時曾給予多次保護，後來才知悉，幾次出現在妹妹嬰兒床邊的……甚麼「床頭婆婆」，是被伯伯驅離轟走。後來伯伯還感嘆告知：「只怪我們陽居人一股傻勁將這『織娘』恭請進來！」直至很多年後我'
  - '[PAGE 66]


    # 第一章：牛下童年


    才推敲到當年伯伯所指的甚麼「織娘」意會，因從這怪物的肢體外形上臆猜，這可能是指某昆蟲的舊稱。


    至於那些神秘農戶村落的出現並不是每晚如是，有時候多晚不見地主伯伯前來；及後伯伯告知因彼此境地不同，要藉某些時段才有連接兩界的道路前往……還有過去牛下一帶地域，全屬荒蕪清幽的海角，屬於中土南方盡處；此間山巒茂密又人跡罕至，因而結集不少山魅精靈在此間盤踞修真。地主伯伯更表示，早前曾跟我有所接觸的神秘玩伴，正是來自後山一帶的精靈族群。


    據資料記載……在開埠初期英軍在這海域一帶及山上都修築了不少軍營和碉堡。而位於坪石前方，三山國王廟的山上，現還保存著當年軍營的部分建築。從百多年前開始，這寧靜荒蕪的海灣地貌，正式被人為徹底的改變過來。'
