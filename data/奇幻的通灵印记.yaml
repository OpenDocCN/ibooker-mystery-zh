  pgno: 15
- img_proc: true
  md: '們——靈界團隊」共同議定，這趟以女性的角色來參與這次的人世之旅，這將會更能體現出某些靈性感知！選取樸實平庸的外貌及智慧，將可經歷到另一種的人世體驗。在這個光明亮麗的靈界層面中……「靈界團隊」所著重的是整體的靈命進程，以及採集和完備不同的經歷及情感面貌！


    還記得這廣闊無垠的「靈界中轉站」有一座宏偉光亮、高聳無際的記錄大廳，是儲存和記錄眾多轉世資料的地方（註：西方通靈學者稱為……阿卡西紀錄 Akashic Records）。當「我」進入這個巨碩無垠、有如圖書館般的資料庫後，極目是無盡無邊的光體書冊；而當中最矚目的當然是放在中央高臺位置的那冊……散發著純金亮光的厚厚巨冊！當飄近這巨冊的一霎，「我」已即時感知到當中所記錄的內容！這是記錄著為地球教室，帶來啟蒙的一眾圓滿者的，轉世記錄內容。此刻「我」只感悟到一股由衷的讚嘆與欣喜！


    往後，這個還是處於粗略意識階段的「我」，被引領飄至其中一個展示台前停下。一本屬於「我」此趟轉世歷程大綱的書冊，在虛空中緩緩浮現！此刻「我」亦深諳如能圓滿這趟「人世之旅」，將會是加快修畢「地球教室」課題的關鍵，將是前往另一個更為微細的星空架構的……轉世契機。'
  merge: -1
  pgno: 16
- img_proc: true
  md: 由於快將投生人世，所以在剎那間「我」已閃現至另一個場景，這是那些將要進入「地球教室」轉世者的學習班。這時的「我」已不知不覺間感現出一個人形光體，同時亦隱約傳來與物質界相連繫的生命聲音……卜卜的心跳脈搏聲此刻正式開展了！
  merge: -1
  pgno: 17
- img_proc: true
  md: '# 意外地來到人世


    前塵至此……竟發生一件，現在回想起來很是慚愧的事情！因隨著轉世部署漸趨明確，「我」對將投進人世的布局與組合充滿期盼……對此趟的學習進程，會以何種方向實踐感到好奇。故在熱切的好奇心驅使下，「我」竟私下溜進記錄大廳，偷看規劃中的「記錄冊」內容。「我」靜靠在記錄大廳前不遠處的一座……名為「靈界花園」的池畔，但當「我」正想打開細閱大綱時，這「記錄冊」竟突然迸射出奪目亮光，而「我」竟猛然被身後一股巨大的吸力扯進這光波池中！這突如其來的意外，自諳時機未至卻突然掉進世間迷陣；慌亂的意識隨即發出強大的召喚，請求靈界導師前來解救……可惜一切卻為時已晚！


    現在還深刻記得當初掉進「地球教室」時，對此塵世空間驚鴻一瞥的情景……那是一股巨大強烈的急速跌墮感，恍如火箭升空失敗意外後，由萬里宇外跌回地球的震撼衝力！在經歷沒完沒了的天旋地轉和沖擊跌宕後，「我」驚訝的發現……何以「地球教室」竟結集著，眾多不同的黑暗意識？當中寄居著為數不少、無以名狀的「片段體」和「意識體」！若干年後靈界導師告知……這是那些忘卻'
  merge: -1
  pgno: 18
- img_proc: true
  md: '回家路……沒返回「靈界中轉站」接受「宇宙本源光」淨化的殘存意識。這亦是窒礙「地球教室」整體生靈進化的巨大阻力！


    經過這有如猛烈暴風及非比尋常的一輪跌宕後，一股強大迫力把「我」這團意識；瞬間壓榨進一個昏黑和侷促的空間之內。那是一股無比的壓迫感，「我」隨即感受到一股有如粉身碎骨般的巨創，並在強烈的暈眩感中不斷轉向！經過這麼多的折騰後，只感到意識漸次模糊，最後昏殁在不知不覺的時空中。


    ********


    先來簡介一下我的成長背景，出生時家中有親切的外婆、父母、姊姊（若干年後再添兩妹）。聽母親細說從前，在我出世那天的早上，母親還頂著七個月的身孕為父親在廚房煮早飯。由於當時一家幾口租住在旺角那些廚廁共用的分租房中，那朝母親卻意外地；在廚房因誤踏火水，而從後翻倒，因而被急送至醫院催生（註：這點竟跟我在靈界時所遇上的意外吻合）。由於是早產嬰關係，自小便感到體質不佳！母親曾告知由於我是早產，初出生時我的雙'
  merge: -1
  pgno: 19
- img_proc: true
  md: '眼還是整天緊閉昏睡。直至三個月後那次到健康院體檢時，

    發生了一些小枝節，才令我首度睜開眼睛。


    至於當年這個健康院體檢的小枝節，亦可說是我平生

    第一個景象記憶……還記得當時，我是突然被背後一股寒

    徹骨髓的冰冷感覺所驚醒！原來體檢護士，在輪到為我磅

    體重時；竟一時忘記在嬰兒磅上墊薄毛巾，就快手快腳地

    把我直接置於冰冷的金屬磅盤內。由於我被這突然而來的

    徹骨冰感所驚醒，因此被驚嚇得睜眼嚎哭！這刻護士卻發

    現我的雙眼竟可睜得這樣明亮時，即時送上驚喜的歡呼，

    還急不及待叫喚母親快來察看！


    這可說是我投生人世的第一個畫面……矇矓中看見多

    張笑臉……高掛在健康院天花上一把呼呼吹著的大型三葉

    吊扇……面對這突然而來的陌生喧鬧場景和刺眼的光線，

    早把我驚嚇得涕淚漣漣！直至感覺到一股溫暖親切和芳郁

    暖流襲來，眼前矇矓出現一個全身籠罩著粉亮光波的女士

    身影時，我的意識心靈早已辨別出這是「母親」的氣味！

    從她身上所透出的熟悉體香和在其輕柔的聲音安撫下，我

    即時感到無比的溫暖和安穩；頓時止住哭聲倦躺在其懷抱

    中，並傾聽著這親切熟悉的卜卜心跳聲！


    剎那間我又再沉醉在這個來自母親與孩子間的心靈'
