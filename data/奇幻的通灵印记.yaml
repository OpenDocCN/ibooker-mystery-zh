  md: '1998 年 7 月 22 日下午二時，一名 41 歲姚姓婦女，在德福花園 T 座跳樓死亡，警方接獲通知，於是到現場調查，在調查初期，警方對此案件並不感到特別奇怪。但當發現女死者留下了三封遺書而內容又關連到幾天前一宗婦人失蹤案的資料時，警方便感到案件內情並不簡單，於是開始四出追查。


