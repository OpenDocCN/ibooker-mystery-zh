    # 第一章：牛下童年


    漸趨萎靡，所以往後內容是母親在多年後應我的查問而道來的⋯⋯


    母親後來發現我的健康非但得不到改善，還在醫院受了這麼多不仁待遇後；所以堅持要接我出院，但院方以種種理由阻撓致雙方鬧得極之不快！


    ********


    後記：關於童年時此段如夢魘般的深刻回憶，直至成長後，當年所遭遇的種種靈異片段仍在我內心縈繞不散！總想探究這所醫院過去曾發生過甚麼故事而導致寄存著這麼多的冤靈坊眾？直至早幾年適逢這醫院建院一百周年紀念，有關機構舉辦了一些回顧歷史，這抑壓在內心多年的疑團終於解開了⋯⋯


    原來這醫院在二戰期間部分建築不幸被日軍戰機炸彈擊中，當警報響起時有不少居民坊眾逃至急症室躲避（註：因國際條約明示敵方不可對醫院進行轟炸），可惜當年日軍無視這制約而導致生靈塗炭！


    另：去年終於再重臨此院探望一位患病朋友，臨離去前順道到院外林區閒逛；其間發現兩棵大樹間建有一所中'
  - '[PAGE 79]


    式建築物——「東華三院文物館」。正想上前細看時，卻感到此間存著一股強烈的壓迫力和不安感；發現原來這庭前兩樹和建築物之間，還寄存著某些靈界生物，故此我並無再進一步的入內觀看便馬上離開了。'
