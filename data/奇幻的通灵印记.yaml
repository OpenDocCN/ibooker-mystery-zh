    後記：原來在學期初延遲開學的原因是……居於後巷的校工嬸嬸老夫婦有晚打翻了火水燈，從而燒著雜物繼而引發大火，因此被雙雙燒死（註：廁所上的氣窗是後巷的唯一通風口，亦是當晚失火現場）。


    及至後來這課室又再無故丟空封鎖，好像是因某日下午班師生集體見鬼！再若干年後該校亦因收生不足而停辦。但不知何故該校原址……崇仁街一列地舖在空置多年後才由校長一家改建為酒樓，由於外婆與校長關係熟稔，故此當年我們一家亦獲邀試菜；而我對當年該廁所的恐怖經歷還記憶猶新，故此我藉這次機會借意打探一番！


    原來：校工夫婦自鄉間來港後即投靠校長一家，故此被安排在後巷內某角窩居；他們負責校內一切雜役和垃圾清理，兩夫婦膝下無兒過著省吃儉用的簡樸生活，只寄望鄉間的過繼女兒早日獲批來港定居。可惜就在其乾女兒如願到港後不久，某晚卻意外離世了！


    經過這次再舊地重遊和了知那場起火原因後，我頓然明白何解當年校工嬸嬸到死後化為怨靈時，亦要圍守坐在那堆滿滿的舊報廢紙中？現在回想那堆起火源頭……「舊報廢紙」在其心靈深處是一堆堆可變換財帛的果腹家當，是她所珍視的人間財產！


    ## 白衣姐姐


    這是一個難以磨滅和帶傷感的靈異經歷，大概發生在同年某個炎夏。當年屋村生活條件貧乏再加上電壓設施不足，炎夏晚上各戶只能以電風扇作為解暑工具，因此各鄰舍都會選擇席地而睡；而個別人口多的家庭更會選擇睡在各樓層間的通風位置，故此每晚門廊內外都顯得熱鬧處處。


    由於這年夏季著實熱得難熬，眼看各鄰舍都找到解暑安睡之法；故此母親不理父親反對，某晚帶著妹妹一同在門前鐵閘內席地而睡。由於這位置是家中最通風涼快的好位置，所以妹妹此夜不用再多番安撫就能乖乖入睡。可是當睡至半夜時，我突然被一股不安情緒弄醒；在直覺反應驅使下，帶著惺忪睡眼尋向母親睡覺的方向時；只見本來安睡著的妹妹，突然手腳無故抖動繼而驚醒啼哭！母親隨即從夢中醒來並加以安慰，可惜妹妹又如過往被驚嚇過後的情況一樣，又無故發燒！至第二天長輩們均認為可能是幼兒體質弱不宜睡在當風位置，所以母親只好帶同妹妹撤回廳內安睡。至第二晚這個清涼位置已被姊姊急不及待的早佔先機了。但不知何故，至天亮時我卻發現姊姊竟悄悄地睡回廳內的舊位置。我好奇詢問何解願意放棄這涼快位置時，姊姊只表示下一晚可以將此位置讓給我睡，我聽罷當然欣喜接受呢！於是這晚我早早擺好枕頭薄被不消一會就能清涼入睡……


    ********


    但在矇矓夢中，竟看見門外出現一穿著如「古裝大戲」般的白衣長袍的長髮姐姐經過。這夜半出現在家門前的白衣姐姐樣子秀麗，但面色卻異常蒼白而且身材纖瘦。她蹲在家門鐵閘前柔聲細語地呼喚著我起來到其家中作客，我當時雖然身處夢中，亦感到這陌生的白衣姐姐身上傳來一股莫名的驚遽感！我不為所動的正想退回廳內再睡時，白衣姐姐忽從衣袖內取出一個兩邊繫著小圓珠子的小搖鼓來向我展示搖動！（註：這是一種底下連著一根木把手的小搖鼓，前後鼓面均有手繪圖畫。）並哄騙著說其家中還有更多比這搖鼓更精緻的玩具和好吃的東西，更著我快些起來到其家中親自挑選……說罷即從門欄外捎進來給我把玩。但不知何解這搖鼓在搖動幾次後，卻慢慢地變得異常骯髒陳舊，及後我還發現鼓身更黏附著不少泥土，活像剛從地底深溝挖出一樣！


    這時我自覺應快些掉頭離開，並繼續安睡。白衣姐姐眼看我對其手上的小搖鼓不為所動時，於是隨即從衣袖內取出一枝藍原子筆來（這是早幾天中午時，我坐在家門前做功課期間無故丟失的文具）。此刻心中不禁狐疑著何解當天遍尋不獲，而這刻竟在夢中尋覓得見？就在我猶豫是否應聽其指示開門取回此失物時，耳邊卻傳來幽幽淒怨的絃樂歌聲！當這些歌聲生起時但覺泛起一股令人悲傷的情感來，這時白衣姐姐訴說著希望我能做她的兒女，還承諾會比現世父母更為照料和愛護孩子……！聽罷我自覺感到有些難堪，回想生活中時常招來父母責備和打罵，究其主因是家中經濟環境欠佳所致，故此心坎中總希望能快些長大自立，這樣就能外出工作掙錢養家！


    就在我思索應怎婉拒其好意時，白衣姐姐已逕自走向往十三座方向的一個公眾位置前停下……是街坊稱為大廳的地方並向我招手。由於想到這枝原子筆是從姊姊那兒借來暫用……最主要是明天上默書課急於使用。所以此刻我只好亦步亦趨的跟隨其後，但當步至其家門時卻發現這個本屬牆壁位置的地方（註：牆的另一面為地下至高層的升降機位置，因我家處於低層，故此這樓層只是一面牆壁）。在夢中卻是白衣姐姐家門所在之處……古舊簡樸的農村門戶模樣，當白衣姐姐打開家門時只見屋內布置陳舊和異常昏暗，這細小的室內正中放著一小方桌，桌上放著滿盆食物和點著一盞小油燈。而桌前更坐著一小男孩正在捧著碗筷大口大口地吃著桌上的食物。我站在其家門前要求討回失物時，白衣姐姐轉身急喚我快些進來，還在桌上搯出滿碗食物來給我享用（註：是用舊時農村那種公雞圖樣的大口碗盛著）。


    此刻我終於憶起屋內這個令我深感眼熟的小男孩是誰⋯⋯原來是與母親同鄉的一位鄰居嬸嬸的么兒子，他是住在同一樓層的十三座尾房鄰居。就在我好奇何解這個跟我差不多年歲的小男孩會在我的夢境中出現時？只見地主伯伯突從我家方向趕來將我從白衣姐姐身旁拉開。


    地主伯伯語氣非常嚴肅的訓誡著我何以獨自步進這陌生境地？並著我千萬不要接收任何東西和食物！此時我才驚見剛才那滿碗食物原來是蛆蟲滿布的髒東西，而我身後的十三座大廳空間；更即時化現出眾多，對我咧笑不已的舊衣飾老人和古舊村屋（註：此位置之前某篇曾提及過，我在某些陰沉日間亦曾看見這些古舊村民出現），這時白衣姐姐隨即厲目怒瞪著伯伯更想強行將我拉進屋內。伯伯立刻緊拉著我並命我快些掉頭回家安睡，但我的內心還是記掛著想取回失物，只見那支失筆正正擱在眼前這丁方室內的木桌上，於是我向伯伯承諾，讓我進內取回失物後便會立刻回來！但伯伯眼看我還是這麼決意時，竟嚷著要喚醒我的母親前來，好讓她能給我好好的教訓一番……！當聽到「母親」兩字我頓覺心頭一陣驚遽，已趕緊跟隨伯伯步伐急步回家安睡！這時自覺身後傳來一陣怒吼和狂飆暴風，霎時間一切農村舊物霧化消失！


    ********


    至天亮時我對昨晚的深刻夢境感到萬分不解和難忘，對夢中的眾多內容，自覺太過匪夷所思難向別人啟齒！直至中午放學回家做功課時，姊姊才悄悄的詢問我昨晚所睡的位置有否夢到甚麼怪東西？是否夢見門外有一身穿白衣的女子出現……這時我才放心將夢境中白衣姐姐向我送上搖鼓和失筆內容大致說出！但我並沒將地主伯伯出現那段說出，因這是伯伯要我保守的秘密！而姊姊亦告之在其夢中，那白衣女子亦是多番軟語利誘著要她跟隨外出。綜觀我們姊妹三人在這多晚所發生的怪現象，最後姊姊總括認為我們夢中所見的白衣女子定是「鬼物」無疑！這個「鬼」概念對當時的我來說，倒感到十分震撼……可是這時我們姊妹間的悄悄話剛巧被母親聽見，母親聽罷隨即厲聲的責備我們在胡謅瞎說甚麼「鬼話」，更告誡著：「我們一家向來都是家宅平安，一切順遂！如往後何人再在家中鬼話連篇，定必將其好好教訓！」


    如是者我們孩子間亦不敢重提這次經歷。然而時間日子又再嘩啦啦耗在上學和家課間游走掉，直至某日中午姊姊因參加課外活動要遲歸，母親著我趁此良機可到門外踏玩一會兒三輪車。由於這三輪車是因姊姊考獲好成績父親買來獎她的禮物，平日她極為吝嗇不願借玩！所以這刻我歡天喜地載同妹妹一起在門廊外踏玩著，這樣可讓母親安心在家趕縫外判童裝來幫補家計。可是不消一會兒妹妹又鬧著要回家找母親，由於母親忙於趕工，我被要求與妹妹多玩片刻！所以我只好順應哭鬧著的妹妹要求，踏著三輪車與她一同到十三座長廊那方去「歷險」！這區域是父母不准許我們隨便闖至的地方，因為這類舊式屋村，就算平日中午，長廊總是給人暗沉感覺！再加上常有一些不速的小流氓，總喜歡對其他孩子欺負！可是我為著好好安撫妹妹，只好以戰戰兢兢的心情前往！但當踏至十三座時，竟看見長廊盡頭透著一點小光；及至踏近時才發現原來是這家門外，置放著一個內裡燃點著一根白蠟燭的方形鐵桶。


    此刻我才憶起這戶是早前夢中那個曾到白衣姐姐家中作客的小男孩家門，由於我跟這位鄰居嬸嬸不太熟絡，故此我只在其家門外巡察一會便打道回家。


    回家後我第一時間詢問母親去年收藏的中秋燈籠和蠟燭放於何處？母親對我的提問感到不是味兒，告訴我還有兩個多月才到中秋佳節，因何要這麼早就鬧著把玩呢！於是我道出剛才所見……那門前點燃的白蠟燭燈火！而母親亦若有所思及好奇我的發現，故此隨即步至此家門外了解。由於三姑跟這位尾房嬸嬸關係比較熟絡，母親隨即致電住在同座的三姑細問原因。及後母親向我表示，剛才所見那門前點著的白蠟燭；並不是甚麼中秋玩意，而是代表這戶人家有人過身的意思！可是當年我對「過身」的真正意思其實亦不太明白！於是在我再三追問下，母親才道出「過身」的是那鄰居嬸嬸的么兒子，是發生在早前某晚，無故一睡不起而離開！


    這刻我的小腦袋又再因一時衝動，忘記早前母親禁令而道出當晚夢中所見，我還天真地向母親表示，小男孩只是到白衣姐姐家中作客未返而已！讓我下次夢中再見面時喚他盡快回家吧！母親聽罷卻馬上怒斥著我又再好管閒事，還著我千萬不要再在家中胡說這些「荒誕鬼話」！


    其實這年除了我們一家外，還有對戶的鄰居叔叔亦曾因晚間睡在門前出事，而這位鄰居叔叔更是體格強壯的修船工人。某晚他亦如妹妹當晚情況一樣，像在夢中被甚麼東西犯著而驚醒病倒！直至後來另一位年長的同鄉叔叔表示……舊時鄉間只有等候舉殯的先人或垂死之人才會被置擱在家門前，而我們卻不知就裡犯著這些忌諱，因此招來陰人前來勾魂騷擾！


    *********


    另一則奇聞是有位居於別座的青年，某年夏天亦同樣因為睡在這個公共大廳一段日子後，整個人竟變得暮氣沉沉和怪異，及至後來甚至大白天亦睡在相同位置不思飲食！後來他的家人終聯同多名親友，採取強硬態度才能將其強接回家。但不到久這青年又再故態復萌潛回在老地方，聽說後來好像還要請來甚麼術士道長前來驅邪安魂，其神智才得以回轉過來！


    *********


    98


    關於無故「夢中猝死」而過身的案例，在早期牛下的十幾年間常在鄰里間出現！而令我感到奇怪的主因是……當年生活簡樸飲食清寡，人們極少患上現代的「三高」都市病！其中比較深刻的一則是發生在小四時同班某同學的父親身上。這同學的父親年紀不大，健康一直不錯但亦在某晚無故「夢中猝死」過身，當年全校師生更曾為這同學的父親籌措殮葬費！此事發生後令我即時聯想到「白衣姐姐事件」，直至現在我亦對這類「小搖鼓」心存陰影！


    ********


    後記：這次經歷全賴地主伯伯及時出手相救！回想人生中的眾多奇遇，當初大多只意會為「做夢情節」而已，但很多時夢醒後卻發現竟能與現實世界中的人和事相呼應！直至年長後我才認知到這是「靈魂出竅」現象……地主伯伯稱「離魂」！而這位在我童年時給予多番保護的地主伯伯，可惜到後來也要跟他別離（往後另一次奇遇將會提及與地主伯伯的故事）！


    至於當年那白衣姐姐的出現，地主伯伯只略提及到她是「紅船人」。現在我終於明白是怎麼一回事……從其衣'
