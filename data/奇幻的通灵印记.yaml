  md: '時我正高興母親回家可第一時間認識這些新朋友，於是我雀躍地迎向大門急著向母親介紹！可是這些新朋友卻在剎那間飄閃四散，其中最深刻的一個畫面，就是小姊姊竟然遁閃進一包掛在廚房窗邊的「白貓」洗粉袋內。可惜當我緊隨撲至時，卻發現這包洗粉袋上的圖像又變回原本的平面圖像（註：巧合地……在若干年後，竟出現跟此意會類似的廣告，因此多年來總被家人質疑這些異象的真偽）！


