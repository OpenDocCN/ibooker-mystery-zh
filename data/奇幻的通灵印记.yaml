    # 廣華醫院


    這經歷的開端對現在的我來說已有些模糊，只依稀記得自經歷那次床頭婆婆事件而病了一場後，我的體質變得比較孱弱。有一回適逢觀塘區舉辦，潮州人最為看重的；一連三天盂蘭盆會祭祀，於是我們舉家遷往外婆的家中幫忙和留宿。由於母親和外婆都非常喜愛觀看，當中現場演出的潮語神功戲；因此在最後一晚的通宵戲，她們已早早安排我們孩子上床就寢以方便她們前往。


    但當睡至深宵某時段，在半夢半醒間我卻突然被一個從房間某角閃出的黑影所驚醒，我即時護著睡在床尾的妹妹，只見那黑影隨即閃回某角消失！未幾我卻在夢中被一個異常陰深的黑衣老人扼著頸項和唬嚇怒哮……幾經掙扎方從夢中醒來並哭喪著急喚母親！幸運地剛巧母親回家並聽到房間傳來我的呼救聲，於是立刻衝進房間給我安慰。但此刻我只懂不停的哭嚷著……害怕！雙手更緊緊地抱著母親並在其懷中不斷抖震！只因當下的我……感覺圍繞在身上的那團「精神能量」像被瞬間抽掉潰散一樣，恍如一顆耗盡能源的泄氣電池！母親從我驚駭的神情中，看出我定是在夢中被某種東西所嚇煞著；於是她立即向著虛空中比劃出一個斬劈手勢，並'
  - '[PAGE 72]


