    ********


    這刻我呆站於廟前回憶著這鮮明夢境，大姊看見我的凝望反應後隨即上前細問，我即向其表示曾在夢中到此一遊！大姊和友人對此亦感到相當好奇，為著證實是否真的如我所見，因此要求我先將寺中布局細說，再由他們入內'
