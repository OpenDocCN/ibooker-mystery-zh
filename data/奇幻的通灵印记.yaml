    後記：自這次朝聖之旅後，令我對「佛陀」的生平和「藏傳佛教」的修持，加深了認識和參悟。當中充滿令人感動和珍惜的緣分！


    ## 拜見創古仁波切


    自「朝聖之旅」後令我對藏傳佛教的認識加深不少，從而跟這個傳承了千年歷史的藏傳佛教「噶舉派」正式結緣（簡稱為「白教」）。及後更因經常參與義務工作而跟那些出家僧侶有所接觸，從而令我對「金剛乘」的嚴謹修持和戒律有更進一步的了解和讚嘆。


    雖然那些早期的「金剛乘」宗教故事中，所流傳下來大都充滿奇幻的神話色彩，可是對於弟子的教誨，卻著重以智慧開悟、慈悲喜捨為用。對於那些靈幻玄虛的「神通」內容，則被視為修行上的自然產物不值宣揚。因此我亦秉持這種理念，樂於「活在當下」！可是那持續多年的「神秘夢示」，卻一直在年月中不時造訪；因此令我不期然對這個似是蘊含著某些訊息的「夢示」，總是感到悵然若失！


    後來在若干年月的相處和交往下，我終於拿出勇氣向喇嘛（Lama）及女尼（Ani）透露內心感受，幸得 Ani 幫忙下為我約見他們的上師……適逢來港弘法的「創古仁波切」（是噶舉派一位偉大的修持者及教育家）。仁波切是一位集弘法、教育與慈悲濟世為己任的金剛乘上師，每年巡迴世界各地弘法，饒益眾生無數。因此我實在不敢想像能夠拜見這位尊貴的聖者，並能得到他百忙之中親自接見！


    由於過去種種遭遇，令我一時之間只感到忐忑和汗顏！只因從小被各種世間成見所誤解，令我不曾向外界透露；這些不為世人所了解和接受的現象和感受，剎那間我只感到顫慄哆嗦！


    由於通知來得太過突然，因此當晚我放工後隨即趕至仁波切所下塌的地方求見。這是公務繁忙的仁波切私下作息的時間，只見當時還有不少僧眾在整理明早法會上的講義和翻譯。而我就在親切的
    Ani 引領下，並藉某位來自台灣的「堪布」（Khenpo 即：佛學博士）為我作藏語翻譯。我先向仁波切合十頂禮後，便坦誠訴說著過往出現在生命中的某些靈異往事……包括：夜半鬼奴來訪要求為其夫人誦經、二舅父暴亡前的「心臟病」提示；和以「靈魂出竅」的方式，親送外婆至靈界花園等見聞！


    慈悲的仁波切耐心聽罷我的異象故事後，隨即對我嚴肅凝視片刻，之後更進入禪定狀態以另一種意識層面觀照。那一刻只感到眾息屏聚、四周空氣也為之凝固，而我在這寂靜的接見室中，腦海就只有轟隆轟隆的心跳聲！我的內心只餘一片緊張情緒，只懂瑟縮一旁低頭忐忑，只因害怕被歸類為「妄想症或異類」的擔憂；令我感到無比耳熱，這時幸得身旁的
    Ani 給予安慰！只見仁波切出定後隨即用念珠再次占問結果三遍，然後向我再次展露笑容；並向「堪布」傳話授與我某本尊的心咒，並勉勵我要好好發展和運用此「通靈」能力，自度度他幫助更多眾生！


    那一刻只感到心花綻放，有種說不出的感動！仁波切更向我表示，可藉由勤念此「心咒」的力量，為我實踐更多菩提願力！


    *********


    後記：能夠與這麼尊貴的智者見面，還得到仁波切授予密咒和祝福勉勵，頓然使我將抑藏在內心的種種疑慮一掃而空，這著實是殊勝難得的機緣！


    除此之外，我當然由衷感謝「宇宙高靈」及「靈界導師」的多年指引，令我曾經迷失的心靈再次收攝回來，並期望早日揭示那「神秘夢示」的謎底。


    ## 出體度亡


    這是一個大膽的度亡嘗試⋯⋯只因半年多以來心靈間時常出現一個奇怪訊息！不斷催喚著我務必致電某位久違的舊同事，可是在我嘗試多次致電對方時，卻發覺經常訊號不通或斷線；就這樣事情被推拉了一段日子後，及後又因抵受不住內心的莫名壓力下又再嘗試，這回終於順利致電對方了！


    電話接通的一霎，對方亦即時表示在這段日子期間，也曾多次致電不果！細問之下才知悉這同事的高齡母親，約於半年前病逝；打算喚我代為聯絡藏傳佛教僧侶，為其亡母安排誦經及超度等事宜。可惜因多次聯絡不果，所以曾為此感到徬徨不已！幸運地終亦請來大嶼山某寺院住持法師為其母親以佛教形式舉殯，因此一眾家屬亦感到十分安慰。


    可是⋯⋯就在半年後的某天，奇怪的事情發生了！事緣舊同事為亡母執拾房間遺物時，發覺積存了很多簇新的衣物；因此將其轉贈某位生前經常給予亡母幫忙和照應的鄰居老太，難得這位鄰居不介意，因此這實在是完美的環保安排！


    可惜往後日子，舊同事卻時常發覺亡母的房間中，不時傳出衣櫃門被大力關上的聲音，還有推拉椅子或翻找其他傢俱雜物的怪聲。初時這舊同事亦對此不以為意，直至某天清晨，耳邊突然傳來亡母竟如生前般向其呼喊……「早起上班」的提示聲音！


    接著一陣恍似耳鳴般的雜訊聲頻出現後，隨即發覺身體動彈不得（註：這是腦波左右調頻的狀態，即是睡眠時的「潛意識」轉至睡醒狀態的「顯意識」調頻，可惜大多時卻被誤為「鬼壓床」意會，如能把握此狀態，再作進一步的練習這是造就「靈魂出竅」的契機）。


    矇矓中……舊同事早意會到母親已在半年前病亡，因此對此景象頓然感到迷離萬分！但一想到母親臨終前口鼻插滿管子不能言語，因此期望能藉此機緣接收到母親遺言，於是只好大膽地向母親提出慰問！此時卻發覺母親，竟然坐於廳中那部擱置一角多年的陳舊打字機前，流暢地「的達」打字（註：舊同事表示，其亡母生前是不懂得使用打字機）。


    不一會只見母親已將信件打好,而她正想接過這封珍貴的信件時,卻被無情的鬧鐘轟鬧弄醒!


    ********


    因此舊同事對此感到非常失望,並為亡母還未能順利往生感到擔心及難過!由於過往她曾經聽聞過……我親送外婆至靈界的往事,所以期望我能助其如願!於是我與她相約某晚以「靈魂出竅」的方式飛至其家中,並由我喚醒她一同參與,引領伯母至「靈界花園」的安排(註:這是一個屬於「靈界中轉站」的地方,西方稱為:星光平台Astral
    Plane)。


    由於要保持出體時的「意識焦點」清明和「星光身意識」能量充沛,所以先要一連七天的靜修準備;可惜正當打算於第八天清晨起程時,卻遇上整晚雷電交加使我難以成行!只因轟隆雷聲及閃電使我難以進入深沉的睡眠狀態,因此我只好將度亡計劃改期!可是往後多天又因工作加班需要,令我未能進入如期的「出體狀態」,因此事情又再押後至某天一個偶然清晨!


    夢中來到一間醫務診所,由於登記的護士小姐表示應診時間未至；因此我被安排坐在診所內翻看雜誌，但奇怪地我卻發覺這些內容，竟然全是用藏文所編寫；因此極希望能夠將這些雜誌，由夢中帶至現實世界，這樣便可以請求懂藏文的喇嘛給我翻譯！


    因此當時我的夢中意識，只拼命想著如何將夢中的虛無物件帶至現實世界！就在這忙亂迷惘的剎那間，意識間突然有種被「叮」醒般的覺醒！於是我馬上從「夢身意識」中掙脫出來，瞬間轉至「星光身意識」並將這個充滿光芒的「能量身體」投射出肉身以外！


    我第一時間飄至鬧鐘前查看時間，發覺原來是早上七時多；因此那舊同事現在應是上班途中，這樣豈不是未能如期一起參與度亡計劃！所以我只好獨自飛至這同事的家中打算將伯母喚醒，並告訴她人世旅途早在半年前結束，現在就由我來帶她進入另一個「靈界時空」吧！


    於是我在探索一會後，意念間忽然傳來「瞬移」的指引；因此令我竟能在轉眼間，來到這同事位於荔景的屋苑上空，可惜我卻一時忘掉對方的單位地址，因而令我慌忙失措處於這窘態中！我嘗試請求「靈界導師」前來幫忙，可惜這回我的召喚並不見效，只因我清楚明白這是「導師」所給予的鍛煉，要我獨自開顯這種「度亡」能力！於是我嘗試再三推敲回想，可惜只能思索這舊同事的電話號碼，那刻只期望能致電該同事詢問有關單位資料！可能這組意念過於強烈，因此我竟然發現手中突然變現出一部手提電話來！


    於是我只好嘗試在這意念世界中，冒昧致電舊同事家中的亡母；幸運地電話在連響兩聲後順利接通，並且亦同時出現接通對方的畫面……


    只見半空中浮現出一光團畫面，一名看來五六十歲的女士接聽電話（註：伯母的形相跟往生時的年紀較年青）……「喂，請問誰人致電？」我答：「伯母，你好！我是你最小那位女兒的舊同事，過去曾到訪拜會過伯母兩次！」伯母：「是麼？抱歉老人家健忘！她正在上班，請致電她的手提電話吧！」我答：「伯母，是你的女兒要求我來跟你聯絡，這次我是專誠致電伯母！」伯母：「甚麼，請問有何貴幹？」我答：「伯母，請你先鎮定情緒，有一個消息要告知閣下……只因伯母其實在人間時間大約半年前已逝世，現在我是專誠來帶領伯母到靈界花園去！」


    這時但見畫面中的伯母面色突轉蒼白，隨即現出驚震錯愕的神情，接著只餘一聲低沉聲調：「是麼？那我明白了……」說罷隨即驟然掛線，而那團畫面亦即時消失渺'
  mdcn: '是就在我對著電腦，準備按鍵之際；竟從右側角度看見這男子早已端坐在我的身旁。當下一霎腦際間更即時傳來一團哀求意念和畫面！我隨即感知到這男子原來是這棟商廈建築時期的某工程師，只因某次安裝升降機時；進行鋼纜承重測試期間發生意外，因而命喪於升降機槽底！此刻我終於明白，原來這名男子就是經常在這商廈間盤踞出現的亡魂，而此際現身只想我給予幫忙助其圓願！於是我隨即默唸六字大明並祈請宇宙高靈（而我自覺最投緣的當然是：觀世音菩薩）攝召此亡魂到光明清亮的靈界！可是對方卻表現出極不情願，並傳來一團讓其攝進門邊雨傘內的意念，請求我將其魂魄，送回他的妻子和小女兒身旁！


    可是我向其表示無意為其效勞，因為「靈界導師」從另一空間層面給我傳來一個心象畫面……「背後已列站著更多類似要求的亡魂，前來請求差不多的心願！」於是我只好用意念告知：「現在應要萬緣放下，盡釋塵緣回到靈界老家！」可是對方卻隨即消失，因此我只好收拾行裝打算回家作息。就在我準備關燈離開之際，這時卻看見那男子已轉至窗前呆望夜深的街景，並繼續那無止境的嘆息！


    至第二天，同事發現我昨晚竟然超過十二時離開，已即時簇擁著我查問昨晚有否出現異象？我故作無知反問原因，同事只好將過去樓層間的種種異聲異象一一說出！於是我向他們訴說昨晚景況，並表示我對這男子亡魂的請求心存抱歉！


