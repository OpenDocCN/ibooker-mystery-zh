    # 第三章：靈魂出竅


    在嘗試飛升的初期，首要克服的是那強烈的失重感與離心力，還有出體時意識焦點的持續與穩定性，這都是影響出體活動的關鍵！因此早期的出體遊歷只能維持在短暫的時限內，回體時亦往往因精神能量不足；或肉身附近被某些突發聲浪影響，而導致急速掉回肉身！在嘗試過多次失敗引致急速回體的日子後，我開始進行事先計劃的「出體實驗」！


    ********


    當我能夠掌握到飛升技巧後，我的飛行速度和高度亦大有進步。首先嘗試在居所外圍飛行，並鳥瞰這個從小生活的牛下一帶。由於臨近九龍灣港鐵站關係，因此那天清晨我從窗戶飛出時，早被那列剛從彩虹站山邊方向駛出的列車所吸引！再加上那段鐵路是架空形式興建，而我當時的飛行高度更在列車之上；因此能夠清楚看見這組行駛中的列車整體模樣，並發現原來行駛中的列車；在外圍及所觸及的電纜間，均會閃耀出一團強烈的藍色電流光波。此刻忽然生起與列車比拼車速的測試實驗，看看這種以意念為主導的「出體飛行」，其能耐與極限會有多大！於是我跟隨列車一直往前飛，意念間已迅速飛至藍田站位置；是回頭卻發現列車還未到達牛頭角站，因此打量還有甚麼玩意可讓我再作測試！此時，剛巧看見「藍田站」前方的匯景商場外圍；某些裝修圍板裝置，發現一所出名的日本百貨「八佰伴」快將進駐的消息；此時心念間認為這可作為測試出竅能力真偽的資料，待我明晚放工後刻意轉至上址印證，看看是否吻合！


    如是者那段時間，我卻忙於這種看似無聊的「出體」實驗遊戲，直至某天終於踫壁了……!


    ********


    後記：發現坊間很多人誤將睡眠時段所出現的「意識互換」現象，解讀為「鬼壓床」的靈鬼騷擾內容來看；因此令到一些別有用心的神棍騙子，對此借題發揮；從而達到騙財或宗教洗腦的手段！有趣是西方人多數將這類俗稱「鬼壓床」的現象，意會為被「外星人綁架事件」；而我們亞洲人，卻將其套上陰晦驚遽的鬼魅纏擾的現象來看！


    雖然從小經歷不少「見鬼」見聞，但我並不是將所有「超自然現象」全偏向鬼神方向來意會！反而是從不同的角度來思考，從而啟發更多研究與探討！


    # 靈界導師


    其實在早期的出體遊歷中，總發覺背後經常伴隨著一團充滿光感能量的「巨大意識」，並在遊歷當中隨時為我送上答案和導引。


    某天雖然下著毛毛細雨，但卻感覺今早的出體狀態大好；意識焦點清晰，並感覺生出一種特殊的光影覺受！


    我從牛下居所飄出後，瞬間轉至九龍灣港鐵站的那條行人天橋方向。那時候這段天橋還未加建頂部，因此我從高空可鳥瞰橋上，眾多撐著雨傘的行人；卻發現每把雨傘的頂部，卻如煙花般拼現出一團團亮麗的光影畫面！就在這好奇思想產生的一霎，從意識間竟傳來一團「意念」答案……「這些發放著耀目光波的源頭，是源自那些往來如鯽行人的頂輪光。」我更即時感念到……橋上某小學生與同行母親身上，所相互共融的真摯情感光譜能量。並發現公園內林木間，小如一片葉子的光影也是格外亮麗！由千百葉片光影共震所匯聚而成的一顆樹，這種奇妙組合已令我驟然感念出，一種宇宙間無私「大愛」的情感覺悟！


    這時感到身後的那團「巨大意識」一直引領著我飛至更遠更高的天際，來到一個呈現半圓畫面的浩翰海洋上空，隨即發現遠方竟出現兩條亮麗飄帶，並從大海蜿蜒至天際盡處。就在意識間生出疑問的一霎，已即時傳來一個捕魚畫面……看見幾艘西方的先進捕魚船，從湛藍深海圍捕魚獲的壯觀畫面。百千萬億的魚獲，源源不絕被拖上船艙即時保鮮……這時只見船艙已即時飄出億萬光點，遁向天際那條亮麗蜿蜒的飄帶中去！這刻我才恍然驚覺，原來這是兩度進出「地球」的空間通道；霎時間被這運行在宇宙間的生死法則，震懾得嘆喟無言！


    那時期……只感到這些獨特非凡的出體體驗，大大地為我的人生視野和思想層面，增廣不少領域和見聞！那時還是互聯網和手提電話還未普及出現的年代，況且我這個從小在牛下屋村長大的土傢伙，在意識層面和生活上不曾涉獵這些「超然」的「物外」內容。還有那時候人們對所謂的「靈魂出竅」現象產生兩極化的意會，一類是偏向悲觀陰沉的靈鬼意會，另一類卻過分神化為……只有深山叢林間的高僧隱士，才會出現的神仙境界！因此我對這玄奇深邃的一段見聞，視之為珍貴體驗，並努力探索當中的宇宙真相！


