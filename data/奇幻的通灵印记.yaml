    # 第三章：靈魂出竅


    學習回程的空間入口，卻不是往常的出現在家居窗外或床邊，而是設在萬里晴空的一片雲霞當中！可笑是……在我還未反應過來「導師」已示意我望向前方，竟然看見雲海中出現一架大型的民航客機！接著「導師」更示意我入內尋找相識的友人！


    剎那間已發現「自己」身處客機的座位通道上，我隨即沿著左右兩排的座位中尋找，果然看見這位「好友同修」坐在窗邊某位置，更發現與其同行的不少同修！我當然即時上前在其身旁揮手示意，並雀躍地向其表示我現在是用「靈魂出竅」的方式來跟他們見面和溝通！可是他們還是對此無知無覺，於是我隨即想起同行的那位聲稱擁有「天眼」神通的堂主，期望他能看見我的出現！


    在尋覓了一會後終看見他們夫婦二人同坐於經濟倉某中間位置，於是我即時飛近，並發現堂主正在閱讀一本由我所借閱有關「新時代」內容的書籍。我又嘗試在他們面前揮手問好，可是情況還是跟剛才那些同修一樣！那刻我不禁暗諳著……原來堂主所謂的「天眼」全是騙人技倆，更遑論甚麼時刻守護其身旁的「隱形護法」！經過這次親自測試令我更能證實，原來這全是唬人的幌子！


    這時身後突然傳來一些嘈雜聲，我隨即轉身查看卻發'
  - '[PAGE 305]


    現一輛由空姐推著的餐車正急駛而來，並迅速穿過我的靈魂身體……於是我就在這突如其來的驚遽意外下，剎那掉回床中乍醒！


