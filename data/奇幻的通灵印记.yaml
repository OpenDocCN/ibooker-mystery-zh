  md: '# # 投生前的靈界起點


    古時的東方傳說……每個投生世間的生靈都要飲過「孟婆湯」後才可上路，好讓各式前塵往事清洗得一乾二淨，才展開瀟灑平生。可惜這個傳說套用在我身上，某程度可說是失效的！只因自出生後，我還存在未被涮去的靈界轉世記憶……可惜這些先天記憶和通靈感應，並沒為我帶來不錯的做人優勢，卻反而為我帶來不足為外人道的世間磨煉，令崎嶇的人生路走來更顯艱辛和孤困！


    ********


    說起這段投生前的光景，印象中這是一個非以人類單純文字和筆墨可以描述得透澈的空間層面……是一片非物質、非形相示現的虛無境地。而是以「光波」與「聲韻」（Sound
    and Light）為涵蓋溝通的境界！雖然無形相，但當中的溝通架構是以「多重的超覺感知」來呈現的。這多彩亮麗的聲光，蘊涵著極致的巨大意識——宇宙本源。它包含至善智慧與無私大愛的成分，亦是整體宇宙運作的重要能量元素！'
  merge: -1
  pgno: 13
- img_proc: true
  md: '在朦朧的歲月中「靈明一點」的意識被喚醒……由「本源光」中化現而成。從極致的空間中穿越重重的能量架構，剎那間閃現至由一眾「宇宙高靈」（亦可稱為：靈界導師）所共同創造的遼闊宏大空間中……（註：直至投進此空間的一霎，才示現出類似世間的形相意識）。這空間是結集來自不同「星光架構」的「意識體」，是投生「地球教室」即「物質界」前的議事和規劃空間，這亦是那些剛從地球離世歸來的「靈魂意識」被接引回家的中轉站，亦是某些在地球還擁有肉身軀體的靈魂出竅者，進出靈界探索的最終站。這是集一切意念和形相構建而成的意識舞台，這個不可思議的神奇國度，我將它稱為「靈界中轉站」……西方的通靈學者稱為：「星光平台」（Astral
    Plane）。


    ********


    直至到達「靈界中轉站」後，這顆「靈明意識」此刻才有一個「我」的概念感念而生。一眾靈界導師和這個剛化現而成的「我」，隨即參與這個共同規劃和議定的「人世藍圖」（註：還記得在靈界規劃議定時，這些導師皆以古希臘長袍智者形相示現。但值得一提的是，導師所示現'
  merge: -1
  pgno: 14
- img_proc: true
  md: '的形相是因應各自因緣感念而生，故此當然會各有不同形象。 ) 藉著投生「地球教室」，期望能為靈界團隊帶來豐富多樣的靈性進程和體驗！因這個以物質架構為用、時間運作單向線性的「地球教室」，有來自種不同輪迴架構的轉世團隊。「我們——靈界團隊」，共同規劃和議定這幅「生命藍圖」應以何種性別、樣貌、智慧和父母眷屬為組合。可能大家會奇怪，當然人人都希望選擇樣貌娟好、智慧和身分優越的條件來作為投生人世的裝備，可是當你身處這個「靈界當下」，順向或逆向的規劃模式都可成為被選取的手段。而所有規劃，只會著重於此趟轉世經驗能為「靈界團隊」帶來怎樣的靈命進程和體會！不同組合的「靈界團隊」大多來自不同次元，由不同的「輪迴圈」頻譜的屬性組合而成。


    「我們——靈界團隊」剎那間已進入了快速回溯的時空中，檢視多重次元的各種轉世經驗……現在只隱約憶及當時「靈界團隊」表示，過去因為逃避「地球教室」某段不忍的殺戮時空，已跳過了幾次應該起行的轉世安排……所以已與靈命進程發展得較和諧、頻譜較一致的「輪轉成員」相去漸遠。所以如這次還再遲疑，下回的轉世組合只能與較疏離、靈性光波震動較不一致的輪轉組合結緣！及後「我'
