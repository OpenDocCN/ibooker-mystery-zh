  - '[PAGE 46]


    # 第一章：牛下童年


    格床上趕至門前，並且迅速打開家門將女孩營救進內。可是當我把大門關上回頭察看之際，卻發覺渾身濕透的小女孩早把家中地板弄得泥濘髒亂，這令我即時憂慮明早起床定必招致父母責備……責備我何解於深宵時分將街外小孩迎進屋內！正感徬徨如何是好之際，只見小女孩卻迅速步進房間，並一骨碌的鑽進父母床中的暖被窩內！我冷不防有此情況出現，當然拼命地從後緊捉著女孩的雙腳只想將她強拉出來！可是剎那間卻從被窩中閃現出一團強光把女孩吸扯進光裡去，而我卻被強光反過來推彈在外……


    ********


