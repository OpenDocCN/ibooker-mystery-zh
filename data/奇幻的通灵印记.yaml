    可是我竟發現這名西裝筆挺的酒樓部長進來後，卻一直對我怒目瞄視！由於我對當前景況還是處於「混亂」思緒，再加上被這陌生人無故怒目注視時，頓然令我感到尷尬奇怪！未幾這名部長再次進來，表示剛收到一通找我的來電，並要求我隨他往外接聽電話。這回我的內心疑竇果真急速加劇，並在意識間不斷思索……何解在虛無夢中竟可接聽世間來電？


