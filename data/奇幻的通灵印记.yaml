    # 第一次回鄉


    想當年對祖國對家鄉的認識真的非常貧乏，印象中這是廣東沿海的某個潮州窮鄉而已。因每次鄉親來信都只是要求財帛或物資的訴求，因此印象中這是一個欠缺吸引的地方。


    可是某年初中中的一個暑假，母親帶著我們首度回鄉省親；這在我們孩子來看可真是一個不討好的活動，但又不能違抗和推卻！還記得初時被母親哄騙誤導……表示這潮州娘家是一個風光明媚的地方，有山有水還有恍如《飄零燕》卡通中的瑞士山區面貌……。由於當年極之嚮往陶醉這動畫內容，聽罷我反而是嚷著要求早日出發的一員呢！


    其實這次回鄉是有其目的和任務，因這年正是父親鄉間祖屋落成的日子。所以祖父的每房子孫均要親至祝賀，只可惜父親正處於創業初期，業務繁重不能貿然前往，因此母親就成了這次任務的帶領者！


    由於當年國內還處於改革開放初期，因此交通配套上非常不足，車程十多小時才能到達父親的家鄉。但此刻我們才驚悉，這村落還是水電供應不足和基建貧乏落後！晚間只餘簡單的火水燈照明，每房床邊更置有馬桶作為解'
  - '[PAGE 138]


    決內急之用，縱觀這些簡陋裝置著實令我們感到非常詫異和不習慣！只可惜已不能回港，只好期望下回到母親娘家作客時，我就可好好欣賞母親所描述如《飄零燕》般的翠綠青蔥的田園景致！在此寄住多日後，好不容易終於捱到往母親家鄉作客的日子。前來接載的只是幾輛臨時租借的三輪車，可是，在半路中途年僅七歲的四妹；卻被車輪夾傷左腳被緊急送至一間簡陋的醫療站治理，由於妹妹的傷勢看來頗令人擔心關係！因此本來滿有期待的心情頓然失卻，而我們亦漸察覺沿途的風景、氣氛全不是母親口中所描述的那回事，已令我們感到失望和無奈！但無可否應母親的家鄉著實比較先進些，起碼每家每戶都有簡單的電力供應，而且在村口位置亦建有某些供村民聚集的廣場和籃球場，可是這亦不足以媲美《飄零燕》中那瑞士鄉村景致呢！


    還記得這天因四妹的腳傷關係，我們延至很晚才到達；母家的鄉親鄰里早已齊集在村口相迎，當然還有過多月前從香港出發在此會合的外婆。由於母親當年離鄉時的年紀還小，因此我們被熱情的鄉親簇擁著帶至鄉間三舅家。到達後才發現這是一間共住了四組來自不同家庭的舊平房，前半部分兩戶人家更將居室用作兼製鞭炮的小工場；而舅'
