    # 汀九海灘


    自從父親購置一部稱為「錢七」的二手房車後，他於晚間兼做白牌生意以圖增加收入；因此我們跟父親相處和見面的日子漸少，故在某些假期他總會抽空帶我們一家到新界郊遊。


    某次父母帶同我們到新界汀九海灘游泳。由於這是我們小孩間第一次接觸沙灘大自然，對這次到海邊暢泳感到既興奮又陌生，可是我在剛開始不久即被海水嗆著連飲幾口後，我竟是第一個嚷著要回家的人！相反姊姊隨父親在海灘另一邊玩得不亦樂乎，而我卻成了這次舉家郊遊的掃興傢伙！故此母親邊哄邊拉的將我和三妹安頓在海灘一個淺水的石堆旁玩耍。當時石堆上布滿擁擠忙亂的蟻群，母親為使我們盡快克服對海水的恐懼，於是提議我們試將海水濺向石堆上的螞蟻……於是我們三人齊齊在玩著濺潑螞蟻落水的遊戲，就在我們玩得極為興起的時候，我卻驚見頭頂上空突然閃現出一個透閃著銀光的意念光球，光球中竟傳來一把女性聲音……大意像是慨嘆我……何以相隔這麼短時日……竟在玩著這種「殺生」遊戲！我當下即從心底湧出一股無名的內疚與慚愧情感來，再眼看那些被沖掉'
