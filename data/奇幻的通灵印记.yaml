    # 第一章：牛下童年


    然令我們十分羨慕！就在長輩間互相閒聊的時候，我無意間發現三姑家中神櫃上，竟放著當天在其家中作客的厲目大叔的相片！我即時告知母親那天我並沒有講大話，當天的客人正是這位相中人時，剎那間本來熱鬧的氣氛頓時變得死寂！母親即時喝罵我不可胡謅甚麼鬼話！於是我將拜神當日，這位大叔所處位置和當時的動作再描述一次，母親即時拉趕著我一同回家！而三姑亦煞有介事地表示要到菜市場補買東西，瞬間竟各自急步離開。


    及後某晚夢中，那位厲目大叔對我多次到三姑家中添飯表示極為不滿；他不斷重複的恐嚇著我並表示如有再犯必定前來算帳！而當晚我早被這夢境驚嚇出病來，因此任憑三姑往後怎樣誠意邀請，我也不敢再貪吃美味的熱飯了！


