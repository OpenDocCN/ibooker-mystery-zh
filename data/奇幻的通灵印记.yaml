  md: '回家昏睡多日以後，自覺腦袋沒像過去般機靈……並感到顱內腦袋某些區域像被濛蓋關掉，但對能與家人團聚已感到無比珍貴！而我對何解要進出醫院和到道壇的緣由及經歷亦漸感迷糊，再加上母親往後亦不願再談及此次驅煞事件……故此我從不知原來當年壇前所見的種種仙人及扶乩異象，並不是每人都可窺見的異界內容！再加上老道人曾私下對我細語叮嚀，再三吩咐我往後不要再好管閒事……對看見某些東西和現象也不要多言，只須寄存在內心深處，將來自會明白……這樣我才能健康成長！


