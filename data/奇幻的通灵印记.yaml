  md: '有這種超覺感應，因而不解何以總會招來長輩的責備和不悅？常獨自面對那些突如其來的靈異現象，使我常感到百般迷惘與失落！慨嘆世間詞彙，並不足以表達……各類靈界空間的所見所聞！及後因父母長輩終於察覺到某些端倪後，無奈只會以別的話題來打發，或是乾脆選擇以打罵來了結！而我後來為免又再招來長輩生氣和壓力，亦只好以「幻覺」來作自我催眠和逃避的藉口！


    直至初中那年首次舉家回鄉，竟赫然驚見滿堂盡是舉杯歡慶的亡靈；當這一直以為只是童年「夢魘幻象」的畫面重臨時，頓時對成長中的心靈帶來深刻醒悟和反思！再一次敲醒靈魂深處的覺性，令我從新審視多年來發生在自身的種種不解的通靈現象，令我決意尋找潛藏在生命旅途中的各種迷思和答案！


    我是成長於七八十年代的香港土產，那時候坊間資訊還是處於新舊交接的框架內；對一些超自然現象的解讀，人們還普遍圍繞在……舊日迷信祭祀的思想架構中！由於本身對投胎前的靈界空間，還潛藏著鮮明印記！再加上歷年成長中的各種感應與奇遇，致令我對超覺現象的態度從刻意否定的「無視」，轉變為不得不對其「注視」！後來繼而決心尋找和探索，它為我帶來何種人生啟迪！幸運地'
