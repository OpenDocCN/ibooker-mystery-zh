    # 神秘玩伴


    小時候家家戶戶經濟環境一般，所以很多鄰里都會拿些外判手作回來製作，以求幫補生計。當年父親只是一個旅遊車司機，收入僅能勉強糊口，但因性格十分大男人和顧面子關係，就算眼見收入不多也不願正視實況，不讓母親參與這些手作。因此母親只能趁父親不在家時，暗中向鄰居拿些膠花回來串製，以求幫補家用。而我自小對手工藝和色彩鮮豔的東西非常喜愛，因此我和姊姊總是雀躍地跟隨母親一起幹著這些手作玩意；很多時我們都可趕在做晚飯前，把完工的物件送回鄰居代為交收，而又令父親不察覺！


    有一回因臨近年尾工廠快將收爐，各鄰居都有不少成品要趕送至收發站交收，所以這次母親要親自將整大袋成品拿至該處。當日母親要求要我，午睡過後才會帶同前往，於是我便乖乖地入房午睡。當我睡至矇矓間，忽被客廳傳來的叮咚聲喚醒，我馬上知道這聲音是來自家中的一件國產玩具——不倒翁娃娃所發出的聲響！於是我立刻起床步至廳中查看，這時才驚覺家中原來早已空無一人，兼且大門鐵閘同被鎖上！我當然隨即失望得不斷的哭鬧著……埋怨母親為何不守承諾丟下我獨自一人在家？那刻我既感到'
  - '[PAGE 36]


    # 第一章：牛下童年


    驚慌，又懊悔因午睡礙事！就在我放聲大哭之際，竟發覺身後房間竟然出現兩名女孩，她們一同倚靠在睡房門邊窺看著我的哭鬧傻勁！這兩名年紀跟我和姊姊相若的女孩，看來亦好像是姊妹關係，擁有相同的衣飾和髮型，穿著同款的背心短裙和大花拖鞋。正當我打算轉身細看清楚時，小姊妹已即時躲回房間。我當然立即走進房間察看，可是卻驚見一位像是她們母親或姐姐般的「監護者」，正盤坐在床上對我虎視！而這兩名女孩早已躲靠在其身後。而我正打算上前再看清楚時，小姊妹又瞬間飄閃至廳外去！那刻我既高興不再孤單一人在家，又雀躍家中無故出現兩名同齡玩伴，於是主動拿出玩具要求一同玩耍。正當我們玩得忘形之際，只見小姊姊竟然剎那間幻化為另一個不倒翁娃娃，而我和小妹妹則樂得推玩著各自的不倒翁娃娃來比拼！至於那位「監護者」，則高坐在家中櫃頂上，看著我們玩耍的情景。後來小姊妹更輪流變現為家中的不同物件……如積木玩具、水壺茶杯，以至其他小物件等……而我更被這神變遊戲逗樂得嘻笑聲不絕！


    就在我們玩至不知不覺間，門廊遠遠傳來母親和大姊回來與鄰居問好的聲音；鄰居嬸嬸告知剛才從門廊外也聽到我放聲大哭的聲音，還急嚷母親趕快開門入內察看！當'
  - '[PAGE 37]


