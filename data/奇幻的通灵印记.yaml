    這是一個難以磨滅和帶傷感的靈異經歷，大概發生在同年某個炎夏。當年屋村生活條件貧乏再加上電壓設施不足，炎夏晚上各戶只能以電風扇作為解暑工具，因此各鄰舍都會選擇席地而睡；而個別人口多的家庭更會選擇睡在各樓層間的通風位置，故此每晚門廊內外都顯得熱鬧處處。


    由於這年夏季著實熱得難熬，眼看各鄰舍都找到解暑安睡之法；故此母親不理父親反對，某晚帶著妹妹一同在門前鐵閘內席地而睡。由於這位置是家中最通風涼快的好位置，所以妹妹此夜不用再多番安撫就能乖乖入睡。可是當睡至半夜時，我突然被一股不安情緒弄醒；在直覺反應驅使下，帶著惺忪睡眼尋向母親睡覺的方向時；只見本來安睡著的妹妹，突然手腳無故抖動繼而驚醒啼哭！母親隨即從夢中醒來並加以安慰，可惜妹妹又如過往被驚嚇過後的情況一樣，又無故發燒！至第二天長輩們均認為可能是幼兒體質弱不宜睡在當風位置，所以母親只好帶同妹妹撤回廳內安睡。至第二晚這個清涼位置已被姊姊急不及待的早佔先機了。但不知何故，至天亮時我卻發現姊姊竟悄悄地睡回廳內的舊位置。我好奇詢問何解願意放棄這涼快位'
