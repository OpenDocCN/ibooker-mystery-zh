    我穿越團團眩光，並如飛鳥般從高空驟降至一座宏偉古老的藏式廟宇。我在這個看來不像現世時空的陌生地域打量了一會，瞬間便來到滿布房間的窄長門廊中，並透視某個房間的小門，發現原來是一所佛堂小課室。當中有位老喇嘛正授課予幾名小喇嘛「中脈與打坐」的內容。我當然對這題目好奇不已，因此隨即隔著門板牆垣往內窺探，卻發現這幅恍如人體經絡布局的脈輪圖畫，當中某些脈輪數目與我所認知的不同，因此不禁在內心有所疑問？可是我這個念頭隨即被老喇嘛察覺，並從意念間傳來一團訓斥內容：「經律咒印未純，亦無根基傳承，竟妄圖窺探『密宗』奧義，這實在顛倒夢想……！」'
  - '[PAGE 273]


    霎時間我只感到十分慚愧，並瞬間被一股力量從背後急速拉走，只感到身軀隨之一震並剎那醒來！


    ********


    往後我曾向堂主提及當中概況，並向其詢問「根基」與「傳承」等問題，可惜我只被支吾打發離開！於是我試圖轉向那團「巨大意識」請求幫忙及解答！


    某天清晨我被帶至一個神秘國度，身旁更出現一位閃耀著重重亮光的「光人」，出奇地我的意識竟突然意會到這就是一直在出體活動中時刻守護和教導的那團「巨大意識」顯現……「靈界導師」！


    如光速般穿越重重的山巒與江河後，我從高空鳥瞰地面時，竟發現眾多藏式廟宇和房屋均被戰火包圍！看見無數軍人、僧侶、藏民、煙火……所生出的一片愁煞景象後，我對此被譽為人間淨土般的國度深感錯愕與難過！對我來說這是不曾明白和無知的歲月，是一段遙遠和陌生的歷史！


    看見這瘡痍滿目的情景，我早已嚇煞得震撼無言！只想快些離開！因此淚流滿面地轉往身後向那「光人」詢問，'
  - '[PAGE 274]


    可是「光人」卻樂觀表示：「這些只是表面的破壞，內在智慧是破壞不倒的！」「光人」更將我領至一個邊遠荒蕪的山區，只見當中布滿若干破落失修的藏式廟宇在其中。我瞬間從天際飄降至地面，並從那些瓦石廢堆中嘗試了解某些失落前的片段！只能從部分殘缺的牆垣壁畫，及地上紋飾來意會曾經光輝的歲月。並從某些荒廢的石臺痕跡和洞穴來認知，這個地方從前應是一個繁衍著眾多清修隱士的聖地！


    瞬間突然畫面一轉，我被帶到一個神秘的洞窟之中；只見這個摩崖廣闊的洞窟內，岩石間滿布點點閃爍晶瑩的晶石，因此我能清晰發現洞內中央位置間，竟聳立著一座由晶簇所形成的寶座！我一時好奇正想靠坐這寶座時，卻被「光人」立刻制止，並從意識間傳來一個意會……這是一個結集八千萬億咒印成就和智慧功德的寶座，未成就者是不能尋覓得見及靠近……！這時前方虛空同時出現兩幅不同內容的「曼陀羅」，並瞬間合併驟放出一團光感滿布的空間入口。我被「光人」領進這個以「聲光架構」運作的多重意識空間內！


    （註：這是跟地球物質世界截然不同的溝通和學習模式，是一念多重感應的超然運作！可惜當「意識」重返地'
- md: '球跳回肉身時，因兩種不同時空及能量轉換的運作下，這些超然的感觀和記憶會被隱沒！）


    又剎那間……當我再回神時，我竟佇立在另一組廢墟前方，這是一組看來像是某種藏式靈塔建築的景象。從塔上那些斑駁殘存的紋飾及布局來看，應是古時某位大成就者的靈骨紀念塔！這時只感到山下傳來某些唱著藏歌的人聲步語，我正好奇是那些景致時，竟隨即被「光人」一把拉回飛走……於是我只能在這個瞬間機緣從空中向下窺看，發現原來是一班老中青藏民騎驢踏步來到這個荒蕪廢墟。那刻我只能在內心猜度這些藏民是來「朝聖」還是純粹路過而已？


    後記：很多時在出體遊歷中所到過的眾多地方，只能意會是存在某些國家而已！對正確的地點、方向和名稱所知甚少，更遑論能「真實地」到此一遊來印證「出體見聞」中的各種內容及啟迪！幸運地……這個出現在多年前的「出體見聞」，在若干年月後竟被我無意間發現，並為我造就出另一段奇異的結緣！


    # 前世今生


    自從那回出體遊歷中，被五名身穿歐洲中古服飾的怪客教訓後；我便發現往後每次的出體活動，似被監控的規範著！但亦因此令我對背後那團循循善誘的「巨大意識」開始注視及留意，因而覺知到這「光人——靈界導師」就是「巨大意識」的顯現！再加上某次被引領至藏族聖地廢墟遊歷後，令我不禁好奇彼此間的轉世關係？


    某天清晨我又在「光人——靈界導師」的引領下，穿過那團飄浮在窗外的銀白光波的空間入口，來到地球另一面的漆黑倫敦街頭。這是一條濕漉漉的石板小街，可是對於我這個當年不曾遊歷過西方國家的土傢伙來說，對每樣東西及景致，還是顯得充滿好奇和興奮！我更因發現一個與《芝麻街》節目中同款的垃圾桶，而驚喜雀躍地圍著它細意研究，現在回想這實在是過於失態了！


    當時我並未意會到這是「靈界導師」給我回溯彼此結緣的人世時空！只是茫然無知地跟隨在「導師」的穿梭引領下，飛到那些英、法、歐洲和其他古老國度的片段重遊！


    直至某次，我們來到一組看來是歐洲某國的偌大歌德式古建築前；首先發現是那眾多巨石人像，佇建在這組建築物的內外，處處流露出雕樑畫棟的中古歐洲瑰麗風格。在我們飛越穿梭眾多由大石築成的圓拱長廊的通道後，發現當中闢有精緻的西式小花園和給遊人閒適休憩的園林小區。並看見不少從各地前來參觀的遊客，當中更有為數不少的上年紀日本旅客，在旅遊領隊帶領下魚貫進內（註：那些年日本遊客是屬於高消費類別的一群）。從這些中古景致和充滿藝術氛圍的環境看來，這裡應是歐洲某國一所出名的名勝建築。


    但當我跟隨「靈界導師」飛至另一區域參觀時，卻發現這是一片幽靜荒僻的林區。當中滿布著一些錯落有序及充滿宗教意味的墓飾和誌銘，此刻我才意會到……原來這是一所建於中古時代的修道院！但奇怪地當我靠近林區某角時，竟對其中某塊隱沒在雜草叢中的墓碑注目留意；當我嘗試用指尖輕拭這荒墳墓碑上的字母雕刻時，我竟然明白這些用拉丁文寫成的墓誌銘文內容！原來這是一位生於中古時期的某年輕修士的墳墓，當下一刻只感到意識間傳來一陣無名傷感！這時「靈界導師」引領我步至前方另一組比較大的墓群，並從意識間傳來答案……這是修道院內的修士墓園區。


    此刻我對當前一切更感茫然，正玄奇何解會被安排參觀這些遠方景致？就在這疑竇生起的剎那，我已被「導師」牽領著，飛至前方另一組高聳的拱門大石建築前，並瞬間穿過那些由大石磚砌成的圍牆……剎那間我的視點竟化為「第三身」的旁觀者姿態出現，意識間只感到像是觀看螢幕畫面的角度來運作……


    畫面開始……一個由石磚構成的黑漆室內，看見一身形瘦削的年青黑袍修士，手執雪白羽毛筆桿在一張細長的木桌前忙於抄寫。由於這石室的窗戶實在細小，因此就算是大白天，還得倚仗桌上的小蠟燭來照明！只見滿室滿桌，擺放著各種羊皮卷軸和各式捆作一團的文物和圖畫。這位看來像是十八九歲的年青修士，擁有歐洲人的高鉤鼻型；加上滿面暗瘡，再配以一頭地中海式的修士髮型，果真令人感到印象深刻！未幾一位中年修士進來審視當中的抄寫進度，並為年青修士解答某些疑問，此刻只感到他們彼此間早已構建出一種，亦父亦子的深厚師徒情誼！


    在看著的同時，我的念頭不期然生出對這個中古時代背景的好奇！霎時間畫面一轉看見教庭審判、捉拿、焚燒和虐殺畫面……看見某些修士背著教庭命令，暗中營救被認為「異端」或「不貞」的無辜者……亦看到盡力營救收藏和保護的部分古卷歷史文獻！關於這些古卷文獻的來歷，從意識間傳來一團複習內容……原來這是從土耳其人手上奪過來的古埃及法老珍寶，只因當中涉及被認為會危害整個教庭教皇統治的宗教內容，因而被有關方面有計劃地燒毀煙滅！可是這卻是關係到某些「根源」的珍貴文物，因此某些修士只好暗中把這批將被毀滅的文物，盡量繙譯及抄寫收藏！


    而這位「年青修士」和他的教長「中年修士」，原來正是這些暗中營救的修士成員之一。在他們的心坎中認為這些「營救行動」是更「接近神的旨意」……神是希望人類用智慧和愛來為其服務，而不是利用殺戮和神權來唬嚇傳道！並認為保存這些文物亦是身為「神的侍者、僕人」……修士的天職！


    及後畫面一轉……只怪東窗事發年青修士被監禁於一所漆黑的牢房內，一位穿載華麗的貴族公爵到來探望這位獄中人。只見兩人同樣擁有相同的高鉤鼻型，可是年青修士對這位貴族中人，所知甚少及陌生！這時我的八卦意識又再無名閃現，因此剎那間竟看見這名鉤鼻公爵，當年杯酒貪歡跟某情人幽會的場景！此刻我才明白原來年青修士是公爵的「私生子」，因其貴族血統故此在出生後被暗中送進修道院撫養，但這段秘密卻在其一生亦不曾道破！相反年青修士卻跟那位中年的修士教長；師徒情誼深厚，不惜冒死追隨及忠誠學習其教誨！後來我更看到這批「營救修士」分別被安排不同方式的處決，年青修士和教長則被處以服毒正法的刑罰。只見年青修士抖震的雙手接過那盛著綠色毒液的石碗一飲而盡！遺願只是要求能夠死在修士教長之前，並認為一生中能夠得到這位如慈父般照料的教長；為其主持臨終祈禱及祝福，實在是何其幸福的結局！


    看到這裡，我的「第三身視點」忽然被調回原來的「第一身視點」運作，我竟然又再出現在剛才的修士墓園區！由於剛才看見的全是淒然難堪的遠古印記，因此我的目光早被面前不遠的一組亮麗新墳所吸引！並發現墳前圍飾著不少奪目鮮豔的鮮花和活潑飛舞的蝴蝶。就在我驚豔不已打算再靠前觀看時，卻看見一身穿神父袍模樣的西方男士從墓碑後閃至！只見這名看來像是六七十歲的神職人員身上同樣籠罩著一團亮光，但其光顯程度卻遠比「光人——靈界導師」遜色百倍！可是對方卻對我和導師的出現表現得欣喜萬分，更不斷手舞足蹈地表示：「在這段期間每天都誠心守候和打理這片新墳上的一花一草，並祈禱天使降臨前來接引……！」只感到對方竟然將「我」誤會為前來接引他往生天堂的天使？


    此時此刻……意識間突然傳來「應該離去」的指示！我當然不忍在這關鍵時刻被召回肉身的安排！可是我還是被背後那股無形力量強行拉走！就在這千鈞一髮的倥傯時空下，我驀然回望鳥瞰那新墳主人的去向！可是我卻驚見「靈界導師」竟頃刻間化現出一幕「天使降臨」接引新魂飄進天堂的震撼奪魄壯麗情景！這是恍如文藝復興時期宗教名畫般刻劃的場景，只見一眾天使、彩虹、鮮花和音樂、耀目祥光同時拼現……！


    當下我只感到無比震惑，一時之間難以接受這奇幻的見聞，並對「靈界導師」的身分感到茫然萬分！就在我還處於靈魂狀態懷有「五感神通」的一霎，我趕緊從意識間搜索這古修道院究竟是位處歐洲何國？好待我將來能夠「到此一遊」作出印證！就在快將被吸回肉身的千鈞一髮間，意識傳來「西班牙」的意會！


    後記：這是發生在九零年代初的一次出體經歷，亦因此而令我刻意逃避往後幾回的出體學習！只因當時我對「靈界導師」接引這新魂「神父」，所幻化的「接引天使」身分感到迷惘！因一直以來在我的心靈層面中，不曾想像到某段前生印記，竟然會跟西方宗教結緣？並對此段發生在遠古時空的「師徒」情誼感到震撼！


    # 探訪靈界的外婆


    自從當年在「夢中」跟隨藍衣導遊相送外婆至靈界後（收錄在第二章：〈帶外婆回家〉），我對外婆的思念還是那麼鮮明。至若干年後我才意識到這是珍貴的「出體經歷」！實在感恩來自靈界層面中的「高靈」和「導師」的細意幫忙，令我能透過這殊勝機緣，窺見靈界度亡的真實面貌！


    及後自諳掌握到不少「靈魂出竅」的技巧和能力，因此某晚我又在進行我的「出體實驗」了！那時候可說是我的「出體遊歷」黃金期，某次我無意之間認知到人世時空以外的「時空流」，更曾嘗試藉此為我實踐某些探究願望！


    這晚我又在「靈界導師」的安排下飛進「聲光架構」內學習，在我重返人世時空經過「時空流」期間，我忽然心生一個大膽念頭，嘗試利用這個特殊的時空架構來探望「靈界」中生活和學習的外婆！


    於是我刻意放緩並沒跳回人世時空，而是趁著還身處「時空流」的微妙瞬間，發放這團強烈的意念願望！剎那間只感到整體空間和意識急速流竄，瞬間過後我發現已身處一列布滿房間的光感長廊中！


    我隨意打開前方某道房門，卻已即時傳來熱鬧熙攘的人聲！當我定神細看時，竟發現父母、外婆及家人正歡天喜地圍坐在一起閒談品茗。由於眼前光景實在使我感到錯愕萬分，因此即時打量這究竟是何種場合？這刻方發現原來是身處某酒樓的貴賓廳！


    當下我只感到悵然若失，心諳莫非我的「意識焦點」能量不足，以至誤墮「夢身意識」內的夢境而已？只見外婆身穿一襲深啡織錦綴以金線的中式棉襖，整體看來像是吃團年飯前等待家人的熱鬧光景！


    這時坐於外婆身旁的母親更喚我快些進來，還埋怨我是否因交通阻塞而遲到！我就在這充滿疑竇的情況下跟家人圍席而坐！而我當然第一時間向多年不見的外婆親切問候，並急不及待詢問她在靈界生活的情況如何？可是外婆卻對我的問題表現得置若罔聞，只是一直微笑閒逸地坐於席間細聽家人間的閒談！這時母親向外婆抱怨三舅為何還未前來，還是待我們邊吃邊等吧！於是父親召來酒樓部長告知可即時起菜。


    可是我竟發現這名西裝筆挺的酒樓部長進來後，卻一直對我怒目瞄視！由於我對當前景況還是處於「混亂」思緒，再加上被這陌生人無故怒目注視時，頓然令我感到尷尬奇怪！未幾這名部長再次進來，表示剛收到一通找我的來電，並要求我隨他往外接聽電話。這回我的內心疑竇果真急速加劇，並在意識間不斷思索……何解在虛無夢中竟可接聽世間來電？


    在我隨部長步出貴賓廳時，我已即時被他拉作一旁輕聲怪責！


    當下一刻我茫然地圓瞪著空洞的眼神，未及反應和意會！剎那間只見身後房間和這光感長廊已即時隱滅消失，而眼前那位酒樓部長原來是「光人」導師的幻化！此刻我只感到「原形敗露」羞愧莫名！


    「導師」訓誡著我這樣的妄為是會打擾「外婆」在靈界的淨化和回溯學習，更表示這不是當初將我「喚醒」的原意！


    後記：這則經歷曾於某個關於「新時代 New Age」為主題的網上討論區發表。當時某位持 New Age 理念的版友認為，我這次的「靈界探訪」可能是進入了「外婆」某段時空的意識層中……但這段「意識」可能是來自外婆某個「或然」的演化！


    # 飛蛾


    這是發生在九零年代中的一個驚險和突然的試煉，直至往後多年就算這屋村早已清拆，但每當我舊地重遊還是對此經歷留下深刻印記！


    某晚回母家飯後與妹妹一同返回牛下舊居，在大約八時多途經牛下十三座對出的行人天橋回家時，從橋上方已發覺有一身穿短袖黃色 T 恤的男子，蹲在那些擺放在欄杆前方的盂蘭化寶桶旁！那刻才令我想起牛下一年一度的盂蘭神功戲即將舉行的日子！由於樓梯前方晚上經常聚集某些賣小吃的流動攤販在這兒擺賣，因此當初我對這奇怪行徑的黃衣男子，意會為某些吃路邊攤的居民而已！（如圖示：當年這些位置還未加設大型鐵閘，是一組開放的屋村平台）。


    可是當我從行人天橋步近這位置時，方發現這些化寶桶原來正點燃著不少祭奠紙品在其中，而這黃衣男子竟可挨靠在這些熱烘烘的鐵桶旁而不被灼傷？故此才令我對此好奇不已！就在我經過其身旁時，那刻才發覺原來男子身上穿的是一件髒兮兮的
    T 恤，由於當時他是蹲在一旁的關係，所以猜想應是穿著一條短褲吧！再加上這男子不停發出尖細低沉的……嘿嘿笑聲，因此我刻意護著身後的妹妹，並意會此人可能是神智失常的流浪漢！


    但當途經其身邊時，我突然感應到一股不懷好意的意念襲來；更發現這男子竟徐徐步近跟隨其後，並向我們瞄視怪笑！我輕聲向身旁的妹妹查問，是否同樣察覺這黃衣異樣？可是妹妹卻表示身後並沒甚麼黃衣男子！此刻我只好不發一言，領著妹妹轉至另一邊的十四座「電壓房」方向樓梯奔去，只希望能夠用迂迴的方式將其擺脫！可是此刻顱內竟清晰看見身後「鬼物」一直緊隨的影象，並感應到一個震駭內容⋯⋯原來這是一隻充滿慾念的「鬼魅」！


    在這驚遽無助的情況下，我隨即默念六字真言並祈請「靈界導師」前來幫忙！這時心靈間即時傳來「提示」⋯⋯著我「應把一切思想意念觀空」，這樣身後那隻「急色鬼」就不能偵測到我的思想意識⋯⋯「腦電波」，從而打探不到我的位置，還有不可回頭張望只須快速游走亂步，這樣就可干擾和杜絕其跟蹤騷擾！


    而在身旁的妹妹看見我突然改變回家路線和亂步，早已意會到這位「麻煩姊姊」應是又看見甚麼「遊魂野鬼」吧！因此她亦隨即模仿著我的行徑，我們兩人就在這左衝右趕的步伐下急步奔跑回家！原以為終可鬆口氣回家安寢時，妹妹卻在臨關上家門時好奇地往後回望了一眼！這晚只期望能夠擺脫這「鬼物」就心滿意足了！


    ******


    如是者日子又匆匆流逝，我早已對個多月前那驚遽見聞忘掉得一乾二淨。某晚獨個兒在家安睡因此我又在進行出體學習，依稀記憶當時正在靈界中轉站（亦稱為「星光平台」）與靈魂團隊一起學習交流，可是身旁的「靈界導師」突然向我表示應盡快返回肉身，因有某些東西正衝著我而來……！


    於是我隨即從床中驟然起來，並瞬間感應到確有某團不懷好意的東西，正在家門外搜索著我的位置。我有如驚弓鳥般試圖轉近電話旁，好待不得已時可報警處理！可是當我回望一刻，竟發現床上還躺著另一個自己時，那刻才意會到原來我還是處於「出竅階段」！因此我利用還在「靈魂狀態」下的五感神通透視家門外的景況，只見有一男子竟於深宵時分在門外長廊末的電壓房位置，挨家逐戶地探頭穿牆的搜索張望，那刻我已意會到這是當晚出現在盂蘭化寶桶旁的黃衣「鬼物」了！


    眼看門外「鬼物」快將發現我的位置時，那刻只想即時跳回肉身，讓我可加緊防備！可是正當打算步近時，卻迅速被肉身吸回體內！由於過於趕急因此我卻陷進「夢身意識」的狀態中，還被那滿懷慾念的「急色鬼」逮個正著！


    （註：關於這種「夢身意識」的狀態……這是一種力不從心和容易被意識慾念所左右的境地，那刻我必須保持清醒靈明的心靈，才可抵抗那隻「急色鬼」於夢中來犯！）


    此刻那頭「色中餓鬼」早已跳上床中將我一把按住，在夢境中的「他」竟化身為一清亮光潔的白衣青年！「他」更在耳邊輕聲軟語著我應把一切世間道德枷鎖拋開，盡情享受夢中性愛……！那刻我的意識確實處於兩種狀態……理智與迷夢邊緣。我必須猛烈地抗拒這種「魔鬼試煉」！於是我隨即召念六字大明，並觀想「高靈本尊」前來解救，助我跳出迷夢！


    與此同時意識即時傳來一團感應畫面……看見一位年邁母親哭喪著的從後攬抱著這黃衣男子，地點背景是發生在牛下八九座之間某一單位。原來這黃衣男子是一名染上不良嗜好的癮君子，在長年累月的毒癮加深下，已進展到要在大腿上施打白粉針來止癮！可是因某次在腿上施針時誤打進大腿動脈，因而導致大量出血暴亡家中！


    此刻的我意識更加堅決定要衝出色慾迷夢，更不停地誦念心咒，並召請「高靈本尊」大放光明將一切幻象驅散……！


    ********


    在幾經努力和掙扎下，我終於擺脫「夢魘」如願醒來！在我以為終可鬆口氣的時候，卻驚覺何以昏黑室內竟傳來……S……S……的怪叫聲？於是我立即跳下床並試圖開燈查找！在這驚鴻一刻我赫然發現床頭上方的牆中，竟伏著一頭巨型的震翼飛蛾！那刻真把我嚇煞得膽顫心驚，萬沒料到一個人煙稠密的城市地段，竟會出現這種巨型昆蟲！而這巨型飛蛾的體積，竟然是成人雙手張開的比例，當時那毛茸茸的觸角及抖震著的雙翼，還在急速地拍打著陣陣……S……S……的求偶鳴震頻率！


    那刻只想將這「鬼東西」立刻趕離，只怪我不忍生殺只求將它驅逐，於是我盡開窗戶並拿著衣架試圖將其撥走。在幾次撥趕下終於順利將其逐出窗外，可是這巨型飛蛾；竟在半空飛拍幾回後，突於眼前消失！那刻我的驚遽情緒果真步向臨界邊緣，我隨即把窗戶關上害怕這「鬼東西」又再貿然出現！


    自從此驚遽震惑的經歷發生後，晚間再不敢打開睡房窗戶安睡，只因害怕再遇上甚麼「魑魅魍魎」又再招來驚悸試煉！


    ********


    就算往後多年，對那些巨型飛蛾的陰影還是縈繞不散！至於那「鬼東西」的去向，卻在若干年後牛下快將清拆時；無意中在電台某個分享牛下靈異故事的節目內，打聽到相關內容！


    有一男聽眾表示自己是神功弟子，因某位家住牛下親友的年輕女兒，遇上陰邪事件而向他求教！話說此女子每晚總被一白衣男子於夢中性侵，年月下更被摧殘至命若懸絲，及後更害怕晚間來臨、害怕睡眠！可是男聽眾表示他們就算聯同一眾師兄，給予寫符封身亦不能解救此女子出陰邪，因此後來只好請來師公僮身給予指點開示！但奇怪地師公所傳來的答案，只是要求他們將其家中所有傢俱雜物抖出，自會解決問題！


    於是他們一干人等，大舉將一切傢俱雜物抖出；可是亦找不到甚麼端倪，直至再請來師公清楚明示後，才發現女子家中，某衣櫃內躲著一隻巨型飛蛾！於是他們立即於櫃上貼滿符咒，將此傢俱一併運返師公壇前將其燒毀！


    ********


    後記：早於十多年前，此經歷曾於某個以「靈魂出竅」為主題的網上討論區發表。主因是……發現有某些持「新時代 New Age」理念為藉口的海外版友，竟公然發帖宣揚「出體換妻」或「出體雜交」的主題內容！更繪聲繪色地表示這是更能抹去世間道德枷鎖的「新時代」模式的「大愛理念」！


    對於這些歪狂藉口，我只可以說是假借一些現象或學說來滿足一己私慾的愚昧行為而已！這類人口中的所謂「出體現象」極其量只是個人潛意識下的催眠產物！


    因為在多年的「出體經驗」中明確感知到，如出體者帶有任何意識或動機不純的念頭生起一霎，已即時被身後「銀帶」急速勒回肉身內，還會影響到下回的出體能力和層次呢！因為這種珍貴練就的「出竅」能耐（星光身層次），必先要保持意識清明、心輪能量光顯亮才可達致！'
  mdcn: '球跳回肉身時，因兩種不同時空及能量轉換的運作下，這些超然的感觀和記憶會被隱沒！）


    又剎那間……當我再回神時，我竟佇立在另一組廢墟前方，這是一組看來像是某種藏式靈塔建築的景象。從塔上那些斑駁殘存的紋飾及布局來看，應是古時某位大成就者的靈骨紀念塔！這時只感到山下傳來某些唱著藏歌的人聲步語，我正好奇是那些景致時，竟隨即被「光人」一把拉回飛走……於是我只能在這個瞬間機緣從空中向下窺看，發現原來是一班老中青藏民騎驢踏步來到這個荒蕪廢墟。那刻我只能在內心猜度這些藏民是來「朝聖」還是純粹路過而已？


    後記：很多時在出體遊歷中所到過的眾多地方，只能意會是存在某些國家而已！對正確的地點、方向和名稱所知甚少，更遑論能「真實地」到此一遊來印證「出體見聞」中的各種內容及啟迪！幸運地……這個出現在多年前的「出體見聞」，在若干年月後竟被我無意間發現，並為我造就出另一段奇異的結緣！


    # 前世今生


    自從那回出體遊歷中，被五名身穿歐洲中古服飾的怪客教訓後；我便發現往後每次的出體活動，似被監控的規範著！但亦因此令我對背後那團循循善誘的「巨大意識」開始注視及留意，因而覺知到這「光人——靈界導師」就是「巨大意識」的顯現！再加上某次被引領至藏族聖地廢墟遊歷後，令我不禁好奇彼此間的轉世關係？


    某天清晨我又在「光人——靈界導師」的引領下，穿過那團飄浮在窗外的銀白光波的空間入口，來到地球另一面的漆黑倫敦街頭。這是一條濕漉漉的石板小街，可是對於我這個當年不曾遊歷過西方國家的土傢伙來說，對每樣東西及景致，還是顯得充滿好奇和興奮！我更因發現一個與《芝麻街》節目中同款的垃圾桶，而驚喜雀躍地圍著它細意研究，現在回想這實在是過於失態了！


    當時我並未意會到這是「靈界導師」給我回溯彼此結緣的人世時空！只是茫然無知地跟隨在「導師」的穿梭引領下，飛到那些英、法、歐洲和其他古老國度的片段重遊！


    直至某次，我們來到一組看來是歐洲某國的偌大歌德式古建築前；首先發現是那眾多巨石人像，佇建在這組建築物的內外，處處流露出雕樑畫棟的中古歐洲瑰麗風格。在我們飛越穿梭眾多由大石築成的圓拱長廊的通道後，發現當中闢有精緻的西式小花園和給遊人閒適休憩的園林小區。並看見不少從各地前來參觀的遊客，當中更有為數不少的上年紀日本旅客，在旅遊領隊帶領下魚貫進內（註：那些年日本遊客是屬於高消費類別的一群）。從這些中古景致和充滿藝術氛圍的環境看來，這裡應是歐洲某國一所出名的名勝建築。


    但當我跟隨「靈界導師」飛至另一區域參觀時，卻發現這是一片幽靜荒僻的林區。當中滿布著一些錯落有序及充滿宗教意味的墓飾和誌銘，此刻我才意會到……原來這是一所建於中古時代的修道院！但奇怪地當我靠近林區某角時，竟對其中某塊隱沒在雜草叢中的墓碑注目留意；當我嘗試用指尖輕拭這荒墳墓碑上的字母雕刻時，我竟然明白這些用拉丁文寫成的墓誌銘文內容！原來這是一位生於中古時期的某年輕修士的墳墓，當下一刻只感到意識間傳來一陣無名傷感！這時「靈界導師」引領我步至前方另一組比較大的墓群，並從意識間傳來答案……這是修道院內的修士墓園區。


    此刻我對當前一切更感茫然，正玄奇何解會被安排參觀這些遠方景致？就在這疑竇生起的剎那，我已被「導師」牽領著，飛至前方另一組高聳的拱門大石建築前，並瞬間穿過那些由大石磚砌成的圍牆……剎那間我的視點竟化為「第三身」的旁觀者姿態出現，意識間只感到像是觀看螢幕畫面的角度來運作……


    畫面開始……一個由石磚構成的黑漆室內，看見一身形瘦削的年青黑袍修士，手執雪白羽毛筆桿在一張細長的木桌前忙於抄寫。由於這石室的窗戶實在細小，因此就算是大白天，還得倚仗桌上的小蠟燭來照明！只見滿室滿桌，擺放著各種羊皮卷軸和各式捆作一團的文物和圖畫。這位看來像是十八九歲的年青修士，擁有歐洲人的高鉤鼻型；加上滿面暗瘡，再配以一頭地中海式的修士髮型，果真令人感到印象深刻！未幾一位中年修士進來審視當中的抄寫進度，並為年青修士解答某些疑問，此刻只感到他們彼此間早已構建出一種，亦父亦子的深厚師徒情誼！


    在看著的同時，我的念頭不期然生出對這個中古時代背景的好奇！霎時間畫面一轉看見教庭審判、捉拿、焚燒和虐殺畫面……看見某些修士背著教庭命令，暗中營救被認為「異端」或「不貞」的無辜者……亦看到盡力營救收藏和保護的部分古卷歷史文獻！關於這些古卷文獻的來歷，從意識間傳來一團複習內容……原來這是從土耳其人手上奪過來的古埃及法老珍寶，只因當中涉及被認為會危害整個教庭教皇統治的宗教內容，因而被有關方面有計劃地燒毀煙滅！可是這卻是關係到某些「根源」的珍貴文物，因此某些修士只好暗中把這批將被毀滅的文物，盡量繙譯及抄寫收藏！


    而這位「年青修士」和他的教長「中年修士」，原來正是這些暗中營救的修士成員之一。在他們的心坎中認為這些「營救行動」是更「接近神的旨意」……神是希望人類用智慧和愛來為其服務，而不是利用殺戮和神權來唬嚇傳道！並認為保存這些文物亦是身為「神的侍者、僕人」……修士的天職！


    及後畫面一轉……只怪東窗事發年青修士被監禁於一所漆黑的牢房內，一位穿載華麗的貴族公爵到來探望這位獄中人。只見兩人同樣擁有相同的高鉤鼻型，可是年青修士對這位貴族中人，所知甚少及陌生！這時我的八卦意識又再無名閃現，因此剎那間竟看見這名鉤鼻公爵，當年杯酒貪歡跟某情人幽會的場景！此刻我才明白原來年青修士是公爵的「私生子」，因其貴族血統故此在出生後被暗中送進修道院撫養，但這段秘密卻在其一生亦不曾道破！相反年青修士卻跟那位中年的修士教長；師徒情誼深厚，不惜冒死追隨及忠誠學習其教誨！後來我更看到這批「營救修士」分別被安排不同方式的處決，年青修士和教長則被處以服毒正法的刑罰。只見年青修士抖震的雙手接過那盛著綠色毒液的石碗一飲而盡！遺願只是要求能夠死在修士教長之前，並認為一生中能夠得到這位如慈父般照料的教長；為其主持臨終祈禱及祝福，實在是何其幸福的結局！


    看到這裡，我的「第三身視點」忽然被調回原來的「第一身視點」運作，我竟然又再出現在剛才的修士墓園區！由於剛才看見的全是淒然難堪的遠古印記，因此我的目光早被面前不遠的一組亮麗新墳所吸引！並發現墳前圍飾著不少奪目鮮豔的鮮花和活潑飛舞的蝴蝶。就在我驚豔不已打算再靠前觀看時，卻看見一身穿神父袍模樣的西方男士從墓碑後閃至！只見這名看來像是六七十歲的神職人員身上同樣籠罩著一團亮光，但其光顯程度卻遠比「光人——靈界導師」遜色百倍！可是對方卻對我和導師的出現表現得欣喜萬分，更不斷手舞足蹈地表示：「在這段期間每天都誠心守候和打理這片新墳上的一花一草，並祈禱天使降臨前來接引……！」只感到對方竟然將「我」誤會為前來接引他往生天堂的天使？


    此時此刻……意識間突然傳來「應該離去」的指示！我當然不忍在這關鍵時刻被召回肉身的安排！可是我還是被背後那股無形力量強行拉走！就在這千鈞一髮的倥傯時空下，我驀然回望鳥瞰那新墳主人的去向！可是我卻驚見「靈界導師」竟頃刻間化現出一幕「天使降臨」接引新魂飄進天堂的震撼奪魄壯麗情景！這是恍如文藝復興時期宗教名畫般刻劃的場景，只見一眾天使、彩虹、鮮花和音樂、耀目祥光同時拼現……！


    當下我只感到無比震惑，一時之間難以接受這奇幻的見聞，並對「靈界導師」的身分感到茫然萬分！就在我還處於靈魂狀態懷有「五感神通」的一霎，我趕緊從意識間搜索這古修道院究竟是位處歐洲何國？好待我將來能夠「到此一遊」作出印證！就在快將被吸回肉身的千鈞一髮間，意識傳來「西班牙」的意會！


    後記：這是發生在九零年代初的一次出體經歷，亦因此而令我刻意逃避往後幾回的出體學習！只因當時我對「靈界導師」接引這新魂「神父」，所幻化的「接引天使」身分感到迷惘！因一直以來在我的心靈層面中，不曾想像到某段前生印記，竟然會跟西方宗教結緣？並對此段發生在遠古時空的「師徒」情誼感到震撼！


    # 探訪靈界的外婆


    自從當年在「夢中」跟隨藍衣導遊相送外婆至靈界後（收錄在第二章：〈帶外婆回家〉），我對外婆的思念還是那麼鮮明。至若干年後我才意識到這是珍貴的「出體經歷」！實在感恩來自靈界層面中的「高靈」和「導師」的細意幫忙，令我能透過這殊勝機緣，窺見靈界度亡的真實面貌！


    及後自諳掌握到不少「靈魂出竅」的技巧和能力，因此某晚我又在進行我的「出體實驗」了！那時候可說是我的「出體遊歷」黃金期，某次我無意之間認知到人世時空以外的「時空流」，更曾嘗試藉此為我實踐某些探究願望！


    這晚我又在「靈界導師」的安排下飛進「聲光架構」內學習，在我重返人世時空經過「時空流」期間，我忽然心生一個大膽念頭，嘗試利用這個特殊的時空架構來探望「靈界」中生活和學習的外婆！


    於是我刻意放緩並沒跳回人世時空，而是趁著還身處「時空流」的微妙瞬間，發放這團強烈的意念願望！剎那間只感到整體空間和意識急速流竄，瞬間過後我發現已身處一列布滿房間的光感長廊中！


    我隨意打開前方某道房門，卻已即時傳來熱鬧熙攘的人聲！當我定神細看時，竟發現父母、外婆及家人正歡天喜地圍坐在一起閒談品茗。由於眼前光景實在使我感到錯愕萬分，因此即時打量這究竟是何種場合？這刻方發現原來是身處某酒樓的貴賓廳！


    當下我只感到悵然若失，心諳莫非我的「意識焦點」能量不足，以至誤墮「夢身意識」內的夢境而已？只見外婆身穿一襲深啡織錦綴以金線的中式棉襖，整體看來像是吃團年飯前等待家人的熱鬧光景！


    這時坐於外婆身旁的母親更喚我快些進來，還埋怨我是否因交通阻塞而遲到！我就在這充滿疑竇的情況下跟家人圍席而坐！而我當然第一時間向多年不見的外婆親切問候，並急不及待詢問她在靈界生活的情況如何？可是外婆卻對我的問題表現得置若罔聞，只是一直微笑閒逸地坐於席間細聽家人間的閒談！這時母親向外婆抱怨三舅為何還未前來，還是待我們邊吃邊等吧！於是父親召來酒樓部長告知可即時起菜。


    可是我竟發現這名西裝筆挺的酒樓部長進來後，卻一直對我怒目瞄視！由於我對當前景況還是處於「混亂」思緒，再加上被這陌生人無故怒目注視時，頓然令我感到尷尬奇怪！未幾這名部長再次進來，表示剛收到一通找我的來電，並要求我隨他往外接聽電話。這回我的內心疑竇果真急速加劇，並在意識間不斷思索……何解在虛無夢中竟可接聽世間來電？


    在我隨部長步出貴賓廳時，我已即時被他拉作一旁輕聲怪責！


    當下一刻我茫然地圓瞪著空洞的眼神，未及反應和意會！剎那間只見身後房間和這光感長廊已即時隱滅消失，而眼前那位酒樓部長原來是「光人」導師的幻化！此刻我只感到「原形敗露」羞愧莫名！


    「導師」訓誡著我這樣的妄為是會打擾「外婆」在靈界的淨化和回溯學習，更表示這不是當初將我「喚醒」的原意！


    後記：這則經歷曾於某個關於「新時代 New Age」為主題的網上討論區發表。當時某位持 New Age 理念的版友認為，我這次的「靈界探訪」可能是進入了「外婆」某段時空的意識層中……但這段「意識」可能是來自外婆某個「或然」的演化！


    # 飛蛾


    這是發生在九零年代中的一個驚險和突然的試煉，直至往後多年就算這屋村早已清拆，但每當我舊地重遊還是對此經歷留下深刻印記！


    某晚回母家飯後與妹妹一同返回牛下舊居，在大約八時多途經牛下十三座對出的行人天橋回家時，從橋上方已發覺有一身穿短袖黃色 T 恤的男子，蹲在那些擺放在欄杆前方的盂蘭化寶桶旁！那刻才令我想起牛下一年一度的盂蘭神功戲即將舉行的日子！由於樓梯前方晚上經常聚集某些賣小吃的流動攤販在這兒擺賣，因此當初我對這奇怪行徑的黃衣男子，意會為某些吃路邊攤的居民而已！（如圖示：當年這些位置還未加設大型鐵閘，是一組開放的屋村平台）。


    可是當我從行人天橋步近這位置時，方發現這些化寶桶原來正點燃著不少祭奠紙品在其中，而這黃衣男子竟可挨靠在這些熱烘烘的鐵桶旁而不被灼傷？故此才令我對此好奇不已！就在我經過其身旁時，那刻才發覺原來男子身上穿的是一件髒兮兮的
    T 恤，由於當時他是蹲在一旁的關係，所以猜想應是穿著一條短褲吧！再加上這男子不停發出尖細低沉的……嘿嘿笑聲，因此我刻意護著身後的妹妹，並意會此人可能是神智失常的流浪漢！


    但當途經其身邊時，我突然感應到一股不懷好意的意念襲來；更發現這男子竟徐徐步近跟隨其後，並向我們瞄視怪笑！我輕聲向身旁的妹妹查問，是否同樣察覺這黃衣異樣？可是妹妹卻表示身後並沒甚麼黃衣男子！此刻我只好不發一言，領著妹妹轉至另一邊的十四座「電壓房」方向樓梯奔去，只希望能夠用迂迴的方式將其擺脫！可是此刻顱內竟清晰看見身後「鬼物」一直緊隨的影象，並感應到一個震駭內容⋯⋯原來這是一隻充滿慾念的「鬼魅」！


    在這驚遽無助的情況下，我隨即默念六字真言並祈請「靈界導師」前來幫忙！這時心靈間即時傳來「提示」⋯⋯著我「應把一切思想意念觀空」，這樣身後那隻「急色鬼」就不能偵測到我的思想意識⋯⋯「腦電波」，從而打探不到我的位置，還有不可回頭張望只須快速游走亂步，這樣就可干擾和杜絕其跟蹤騷擾！


    而在身旁的妹妹看見我突然改變回家路線和亂步，早已意會到這位「麻煩姊姊」應是又看見甚麼「遊魂野鬼」吧！因此她亦隨即模仿著我的行徑，我們兩人就在這左衝右趕的步伐下急步奔跑回家！原以為終可鬆口氣回家安寢時，妹妹卻在臨關上家門時好奇地往後回望了一眼！這晚只期望能夠擺脫這「鬼物」就心滿意足了！


    ******


    如是者日子又匆匆流逝，我早已對個多月前那驚遽見聞忘掉得一乾二淨。某晚獨個兒在家安睡因此我又在進行出體學習，依稀記憶當時正在靈界中轉站（亦稱為「星光平台」）與靈魂團隊一起學習交流，可是身旁的「靈界導師」突然向我表示應盡快返回肉身，因有某些東西正衝著我而來……！


    於是我隨即從床中驟然起來，並瞬間感應到確有某團不懷好意的東西，正在家門外搜索著我的位置。我有如驚弓鳥般試圖轉近電話旁，好待不得已時可報警處理！可是當我回望一刻，竟發現床上還躺著另一個自己時，那刻才意會到原來我還是處於「出竅階段」！因此我利用還在「靈魂狀態」下的五感神通透視家門外的景況，只見有一男子竟於深宵時分在門外長廊末的電壓房位置，挨家逐戶地探頭穿牆的搜索張望，那刻我已意會到這是當晚出現在盂蘭化寶桶旁的黃衣「鬼物」了！


    眼看門外「鬼物」快將發現我的位置時，那刻只想即時跳回肉身，讓我可加緊防備！可是正當打算步近時，卻迅速被肉身吸回體內！由於過於趕急因此我卻陷進「夢身意識」的狀態中，還被那滿懷慾念的「急色鬼」逮個正著！


    （註：關於這種「夢身意識」的狀態……這是一種力不從心和容易被意識慾念所左右的境地，那刻我必須保持清醒靈明的心靈，才可抵抗那隻「急色鬼」於夢中來犯！）


    此刻那頭「色中餓鬼」早已跳上床中將我一把按住，在夢境中的「他」竟化身為一清亮光潔的白衣青年！「他」更在耳邊輕聲軟語著我應把一切世間道德枷鎖拋開，盡情享受夢中性愛……！那刻我的意識確實處於兩種狀態……理智與迷夢邊緣。我必須猛烈地抗拒這種「魔鬼試煉」！於是我隨即召念六字大明，並觀想「高靈本尊」前來解救，助我跳出迷夢！


    與此同時意識即時傳來一團感應畫面……看見一位年邁母親哭喪著的從後攬抱著這黃衣男子，地點背景是發生在牛下八九座之間某一單位。原來這黃衣男子是一名染上不良嗜好的癮君子，在長年累月的毒癮加深下，已進展到要在大腿上施打白粉針來止癮！可是因某次在腿上施針時誤打進大腿動脈，因而導致大量出血暴亡家中！


    此刻的我意識更加堅決定要衝出色慾迷夢，更不停地誦念心咒，並召請「高靈本尊」大放光明將一切幻象驅散……！


    ********


    在幾經努力和掙扎下，我終於擺脫「夢魘」如願醒來！在我以為終可鬆口氣的時候，卻驚覺何以昏黑室內竟傳來……S……S……的怪叫聲？於是我立即跳下床並試圖開燈查找！在這驚鴻一刻我赫然發現床頭上方的牆中，竟伏著一頭巨型的震翼飛蛾！那刻真把我嚇煞得膽顫心驚，萬沒料到一個人煙稠密的城市地段，竟會出現這種巨型昆蟲！而這巨型飛蛾的體積，竟然是成人雙手張開的比例，當時那毛茸茸的觸角及抖震著的雙翼，還在急速地拍打著陣陣……S……S……的求偶鳴震頻率！


    那刻只想將這「鬼東西」立刻趕離，只怪我不忍生殺只求將它驅逐，於是我盡開窗戶並拿著衣架試圖將其撥走。在幾次撥趕下終於順利將其逐出窗外，可是這巨型飛蛾；竟在半空飛拍幾回後，突於眼前消失！那刻我的驚遽情緒果真步向臨界邊緣，我隨即把窗戶關上害怕這「鬼東西」又再貿然出現！


    自從此驚遽震惑的經歷發生後，晚間再不敢打開睡房窗戶安睡，只因害怕再遇上甚麼「魑魅魍魎」又再招來驚悸試煉！


    ********


    就算往後多年，對那些巨型飛蛾的陰影還是縈繞不散！至於那「鬼東西」的去向，卻在若干年後牛下快將清拆時；無意中在電台某個分享牛下靈異故事的節目內，打聽到相關內容！


    有一男聽眾表示自己是神功弟子，因某位家住牛下親友的年輕女兒，遇上陰邪事件而向他求教！話說此女子每晚總被一白衣男子於夢中性侵，年月下更被摧殘至命若懸絲，及後更害怕晚間來臨、害怕睡眠！可是男聽眾表示他們就算聯同一眾師兄，給予寫符封身亦不能解救此女子出陰邪，因此後來只好請來師公僮身給予指點開示！但奇怪地師公所傳來的答案，只是要求他們將其家中所有傢俱雜物抖出，自會解決問題！


    於是他們一干人等，大舉將一切傢俱雜物抖出；可是亦找不到甚麼端倪，直至再請來師公清楚明示後，才發現女子家中，某衣櫃內躲著一隻巨型飛蛾！於是他們立即於櫃上貼滿符咒，將此傢俱一併運返師公壇前將其燒毀！


