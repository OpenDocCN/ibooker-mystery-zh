  md: '# 第一章：牛下童年


    還是會直望到前方這片中間位置，況且這亦是通往必經的樓梯和垃圾房的出入口！故此雖然人沒步近，但我還是時常看見這批「神秘坊眾」聚集在這兒的情景。由於他們的神情和態度實在令人感到陰沉古怪，到後來我亦對他們的出現產生疑問！


    回憶當年……每當夜闌人靜，這片神秘空間總會傳來不少耳語或是幽幽歌聲！當年我雖是年紀小，亦慢慢地開始對這班總是滲著一股不安感覺的「神秘坊眾」畏避起來！


    又一回，同樣是跟隨母親到菜市場的早上，由於颱風剛過，街上還是比較大風和濕漉漉的。所以每當經過一些頭頂開揚、全無遮擋位置的地方時，母親總會喚我緊捉其衣角跟隨。原因是當年那些公屋居民習慣在窗外掛滿雜物，如：膠盆、掃帚、鍋蓋等……故此常有垃圾、花盆、玻璃瓶等物品，被刻意或意外地拋出窗外！（註：若干年後，牛下真的發生了好幾宗高空雜物造成意外傷亡的不幸事件，之後更傳出不少靈異傳聞，一眾牛下街坊更要集資超幽！）


    忽然人群中傳來老人家的呼喊聲，原來有位婆婆背著幼小孫兒買菜途中，孫兒不幸被樓上吹跌下來的竹掃帚擊中頭部；老人家直至發現何以衣角會無故的滲著鮮血時，'
  merge: -1
  pgno: 32
- img_proc: true
  md: '才驚覺身後孫兒情況嚴重，因而嚇得方寸大亂急向途人求救！只見街上坊眾有的上前安慰老人家，有的細心察看嬰孩傷勢，有男士更即時撕開煙包取出煙絲捂著孫兒傷口，有的更跑到附近藥房購來雲南白藥為孫兒止血。當時只見孫兒頭顱上不斷滲出鮮血，昏沉睡著，各人都神情緊張地料理著！而我早被當前景況嚇怕得躲靠在母親身後，亦首次認知到體內血液是鮮紅色的事實！這時母親和其他坊眾看見孫兒傷口還未能止血，紛紛提議應盡早召喚救護車趕送醫院治理。可惜當年的普羅大眾對召喚「白車」甚為忌諱，綜合原因很多……如醫療費用、貪污風氣和惡劣的醫護人員態度等……都令市民對公營機構卻步和害怕！


    正當眾人為著孩子傷勢擔憂不已時，我卻好奇地拉著母親的手並指向半空嚷著：「媽，你看……前方很美！」母親聽罷隨即捂著我的嘴巴，並悄聲告誡著我此刻不要胡言亂語！而我因被母親厲言訓斥後頓時感到不安，但我卻對眼前所見的不解景象十分眩惑！皆因這刻我竟看見前方虛空，出現另一個狀如霧氣般的孫兒在半空中飄浮。只見這飄出的孫兒，恍如懷胎時期的胎兒般蜷曲沉睡著，其身旁更出現亮麗光人護著！由於前來幫忙的街坊漸多，母親為免我又再亂說話，因此已急步把我從人群中拉走。'
