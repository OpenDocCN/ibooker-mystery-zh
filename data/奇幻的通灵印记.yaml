    後記：自這事件發生後，我和這鄰居小孩都因此而生了一場大病，可是當他痊癒後對之前種種「看見」竟然了無記憶和印象！


    # 父親的宵夜


    自三妹出生後家中開銷漸多，故此父親除了日間的司機正職外，亦購置一台二手房車作為晚間兼做「白牌」的生意。由於每晚總工作至深宵時分才回家，我們孩子只能待周末晚才能看見父親。因此我們總是期待每星期一次共嚐宵夜的時段，而母親每次總會為父親送上親自烹調的熱騰騰美食！


    這晚父親預先致電母親，告知宵夜只須預備一窩明火白粥和若干薑蔥，因他已在菜市場買來新鮮食材作主料。及至父親回家後，母親才知原來這晚的宵夜食材，竟是幾隻活生生的田雞……這種生物對我們小孩來說倒是首次見聞，我和姊姊都對這種生物感到既好奇又害怕，而我更不明白何以這些小生物跟今晚的宵夜有何關聯？未幾母親卻埋怨父親為何不請檔販代為屠宰，因為她對這些跳脫田雞亦感到相當害怕，更遑論親自主理！父親正苦惱誰可擔此重任時，在思索一會後隨即想起住在隔壁的同鄉鄰居——吳伯！因吳伯是南北行某海味店的主廚伙頭，他定能幫忙解決這批鮮活食材，於是母親只好冒昧的相請吳伯到家中廚內操刀。


    吳伯是一位和藹敦厚的傳統潮州長者，時常送上可口的家鄉菜式給我們鄰里分享！可是這晚一向熱心助人的吳伯卻表示對屠宰田雞不太在行，所以他亦顯得有些為難，故此只好硬著頭皮舉刀嘗試！只見吳伯一手將田雞反轉，並按著牠的腹部；然後打算將其宰頸放血，可是卻令田雞更為手抓腳握奮力頑抗的掙扎！正當吳伯打算補上第二刀的剎那，我卻看見正想舉刀艱劈的吳伯在其心輪間竟閃現出一團晦暗的血紅光波，而那隻被按著待宰的田雞；卻從雙眼及心輪間，同時閃出一道狀如箭尖的光波，直射向吳伯！一時間，我對這驟然閃現的奇幻畫面，感到萬分迷惑和害怕！只因不曾見聞宰殺動物的畫面，更為這血腥場面感到萬分難過和不願！此刻我才發現，原來這些外形奇怪的小生物；竟跟我們一樣，擁有相同顏色的血液和四肢，內心只感到難以接受和充滿疑問。


    及後父親憶起菜市場那些賣田雞攤販的屠宰方式，是先從田雞背後劈去頭部，才屠宰其餘部分；吳伯經此提示終能掌握當中竅門，因此在宰殺其餘田雞時手法也比較順暢和利落，眼見吳伯手起刀落，田雞隨即身首二處。可是與此同時，我卻看見一個奇怪現象：就在宰刀一霎間；卻看見當中跳出某些光影，從濕漉漉的廚房地面躍彈進另一邊的廁所方向！我隨即詢問長輩這些田雞是否全都躍進廁所內？還請求他們放生這些小生物……今晚只吃白粥吧！


    # 第一章：牛下童年


    眾人均對我的說話感到奇怪，吳伯隨即向我展示那些被宰後還在微微抖動的田雞時，還笑說問我是否眼睛長有毛病？可是我實在對剛才的血腥情景感到難以忘卻，所以往後來，任憑他們怎樣哄騙，我也不吃今晚的宵夜！


    可是在往後日子，我卻時常感到廁內渠位暗處；總是傳來隱約怪聲！還感到某些閃爍小眼，正瑟縮於暗角在偷看著！直至某天午後我和姊姊正在廳中趕功課，突然從身後傳來「咯咯」的怪聲；正想轉身往後察看時，卻被四方八面突然跳至的某些發光生物嚇煞！當我定神細看時才驚覺原來是當晚宵夜的田雞！我當然害怕得即時跳上椅子並呼喊母親快來解救！可是母親對我突然聲稱家中再現田雞蹤影感到非常不滿！更即時厲聲斥責我是否腦袋長出毛病？還表示當晚的田雞早被吃掉，試問又何來一室彈跳田雞呢？可是我對母親竟無視這混亂情況，深感疑惑和無奈！我只有一直站於椅上無助地哭鬧！可是自這天後，我已如驚弓鳥般；害怕家中又再突然跳出田雞，因此連日來只屈縮在椅上活動，而我這種行為當然招來母親責備和打罵！


    往後一個不為意的中午，這些小生物又突然在家中閃現，但這回卻在頃刻間於半空彈跳後消失！但最奇怪的是……我發覺牠們各自身後都被一道多重發亮的光團追捕著……當中還發出有如高頻率迴音的「時時」聲。而這些帶著光影的田雞隨即急竄亂跳，可是卻怎也逃不過這些光團的吸力，不消一會已全被吸進這些光團中消失！


    後來父母認為我這次的胡鬧舉動，可能是源於小孩首次驚見屠宰畫面而心生幻覺，故此往後亦盡量避免購買須自行宰殺的食材回家。


    ********


    後記：有一回因臨近新年家中要趕購雞隻過年，早上我跟隨母親到比較大型的牛下臨時街市去（註：此街市早已清拆，但舊圖片可在港鐵藍田站月台回顧）。由於市場實在太過擠迫，母親著我拿著一片小竹牌「雞牌」站於場內某角落等候，而她就背著妹妹自行擠進其他攤檔去。正當我呆站著等候母親回來的時候，突然感到身後的門縫間傳來一股令人驚遽不安的情緒！在好奇心的驅使下，我逕自轉身查看身後這間由兩扇木門虛掩著的髒房間內是何景況？


    # 第一章：牛下童年


    當我從門縫往內察看時，赫然驚見房內牆角近天花頂的上方，竟出現一團拖著長長飄絮、半虛帶實的暗黑怪物附伏在牆角上！只見當時這頭怪物正張著尖牙巨口吸嗦著那些剛從大圓鐵鍋內飄升浮至的眾多小光團。


    由於那是處於年幼無知的五至六歲階段，因此對這個驚愕深刻的畫面一直不懂解讀及描述！直至多年後我才明瞭房內那些大圓鐵鍋的用途，原來這是用作放置剛被割喉放血的家禽。這刻我才醒悟到那團怪物可能是……一頭專以吸食家禽靈識為生的靈界生物！


    # 坐在門邊的伯伯


    自榮升二家姐後不久，父母即安排我跟隨姊姊入讀同一所學校。這是位於觀塘外婆家附近的雅各英文幼稚園，此校更開設小學及初中課程。而我當初正是被校內那些陳列在玻璃窗櫥中的玩具所吸引，因此時常嚷著要跟隨姊姊一同上學去，可惜當入讀後卻發覺美好的感覺全是假象！最明顯是那些在長輩面前表現親切關懷的師長，在只剩小孩學生時卻常以責罵和體罰來作為教學手段，只能嗟嘆體罰學生在當年亦算普遍！與其說這是一所學校，倒不如稱它為學店較為貼切，因學校每月總會開出林林總總的名目和節慶聚會來向家長收費！


    而這故事是發生在剛入讀幼稚園那年，母親要我戒掉晚間用尿布的习惯。可惜自幾次尿床被打罵過後，我的情況亦未見改善！所以每晚當我睡至半夜時分，母親都會用腳輕踢睡在床尾的我起床如廁，這對我來說倒是一件苦事！皆因熟睡中被喚醒的滋味並不好受，特別在寒冷冬天的晚上要獨自步向漆黑的廁所！而且在睡眼惺忪間經常會發現客廳中竟會坐著某些陌生人，他們大多如古老攝影館照黑白相片般的模式坐著！而這些夜半出現家中的陌生訪客，大多穿著陳舊、神態詭異的坐在客廳，觀看著電視螢幕的黑白雪花！及至後來我方意識到……在這深宵時段電視台早已休台，試問當時又何來節目觀賞？但以當年的小腦袋思維只聯想到……這些人明天定是不用上班，所以才可延遲就寢，因而齊集廳中觀看雪花畫面！


    # 第一章：牛下童年


    直至某一晚我又被母親半夜喚醒，當步出客廳時，竟看見一位服飾有如舊日鄉居莊稼的老伯，蹲坐在通往廚廁的門階邊唱歌（註：舊式政府屋村布局大多是廚廁一左一右並排）。當時老伯手中更拿著一根木筷和一個空碗，正在邊敲邊拍，在唱和著那滿帶鄉音的歌謠！眼看通往廁所的通道被這老伯佔坐著，於是我站至他的身旁並禮貌地說：「伯伯，請給我讓路吧，因我要前往廁所！」老伯看來有些錯愕，但也友善地給我讓出通道前往。待我完事後老伯還稱讚我是一名有禮貌的孩子！到了第二天我竟模仿起老伯用筷子敲打著家中飯碗唱歌，可是卻立刻被母親嚴加訓斥和阻止！


    往後某晚我又如常起床如廁，但當步出客廳時已發覺窗外傳來喧鬧人聲；而早前出現過的老伯亦坐在相同位置抽水煙，我禮貌地喚過老伯後，和藹的他告誡我不用理會街上情況，只須如廁後快快上床就寢。可惜我在完事後，卻出於好奇；竟逕自蹲在窗縫下的通風石欄邊窺看，竟發現窗外那泊滿車輛的街道上，聚集著眾多年青男女活像舉行派對般狂恣歌舞！有些邊跳邊唱，有些更索性站在停泊在路邊的車身或車頂上跳舞，有更甚的還對車身不斷砸打發洩！正當我對眼前所見感到茫然萬分之際，心中突然想起父親剛買來的那輛稱為「錢七」的房車，會否遭到同樣破壞？因此我蹲在石欄邊盯著街道上的車輛尋找！正當我生起這「尋車」念頭時，剎那間卻驚見這批恣意男女；竟頃刻間停頓所有聲音和動作，然後竟一致地舉頭怒瞪著我的位置！由於他們全都露出詭異和敵意的神態，我即時被此情景嚇煞得慌忙後退！但剎那間卻發現窗前閃現一猙獰男子，更伸出長長手臂想把我捉逮！就在這危亂關頭，老伯迅速地丟出一根筷子將這男子打退，接著老伯隨即用手遮擋著我的雙眼並說：「乖，不要看，快些上床安睡吧！」之後老伯還一直護送我至睡房門邊才跟我道別！


    及至天亮後母親起床煮早餐時，更投訴差點被掉在廚房地上的筷子絆倒，還責罵我們不好好執拾地方！我即時向母親解釋這是伯伯昨晚丟出的，但母親因忙於早飯和給妹妹沖奶，所以並沒理會我所說的內容！又一晚在差不多時段，只見老伯坐在相同位置吃橙，他還特意將橙分成兩份留待與我分享！但以當年家境來說……我們全屋只有神櫃上下位置供奉著兩份水果（即：關帝和地主神位），而平日只有父親才可享有，在神櫃取吃水果的特權；只因潮州人重男輕女觀念，認為只有一家之主「男主人」才有資格向神靈換供撤供，而我們小孩；只能留待初一十五換供時，才能要求分享。


    因此當我看見伯伯竟可獨個兒享用時，即急著追問這些水果是從何而來？老伯隨即指著神櫃下方的地主神位笑說：「是從這兒拿來的！」我即時告知：「這些橙是父母買來給地主伯伯享用。」老伯聽罷隨即笑說：「正是這緣故，所以我現在拿來請你吃呢！」可是我對老伯這番說話感到萬分不解，再加上父母時常告誡我們孩子，不可隨意接受陌生人的東西和食物；故此我禮貌地推卻，然後趕緊到廁所完事後便急急返回房間就寢。直至某天晚飯後母親要求父親向神位換供；我們孩子立即興奮地圍攏著，等待分享水果！但此刻亦令我憶起早前老伯請吃橙的情景，內心不禁暗忖著……為何當晚給吃掉的水果，現在還存在著呢？這時父親亦撕開這顆放在最頂位置的橙時，卻發覺這顆橙外貌雖然無異，但內裡卻是乾涸無味，但另外四顆卻是完好多汁並無異樣！姊姊好奇詢問何解時，父親帶笑告知這顆橙定是給地主伯伯嚐過吧！此刻我興奮地告知父親我當晚正正看見地主伯伯在吃這顆橙呢！父親聽罷後隨即譏笑著說：「你居然看見地主伯伯吃橙？想不到你和地主伯伯這麼投緣……！」父母還著我要多加努力學習，還說地主伯伯只疼愛乖巧聽話和勤力讀書的小孩！


    自此以後我不再害怕每晚深宵的起床時段，因為知道有位和藹慈祥的地主伯伯在家中守護著。有回伯伯著我如廁後快些趕回床上安睡，待晚些會帶我到其家中作客……


    ********


    及後時段伯伯真的前來將我喚醒，他牽著我的小手一起穿過家中鎖著的大門鐵閘；但當穿過鐵閘後我竟發現本來熟悉的門外長廊，左右兩邊卻出現不少比例偏小的舊日農戶（註：就在穿越門牆的同時，我和伯伯竟在不知不覺間身形由原來的比例漸縮小至跟這些偏小農戶吻合的身形）。


    只見各農戶的大門兩旁均貼有紅聯（註：如電視古裝劇的兩扇木樺門）……而這些舊日農戶，卻是化現在牛下現居的兩戶鄰居間，那一組組水錶設施下方位置。只見長廊間的各戶村民熙來攘往的出入，熱鬧情況儼如一條繁盛村落；當步至對面某家農戶門前時，伯伯隨即輕叩大門；未幾一位態度跟伯伯同樣親切的老婆婆啟門相迎，我馬上被迎至簡樸的室內；並看見小廳堂內的桌上放滿不同的果品與清茶，伯伯告知這是他和妻子……「地主婆婆」特意為我所準備的果品！這對一個小孩來說能受到這般盛情招待，當然令我深感忐忑和感謝！他們著我隨意享用時，我才留意到桌上某些果品；正是今天黃昏時，母親敬拜地主時，所奉上的蒸糕和水果。伯伯即時意會到我內心所想，故此親切表示某些果品確是早前所供之物，但某些是其他鄰居所供的果品！還表示這是在人世時廣修善行，因此可守一方之土。言談間還指出現今陽居人常把地主方位錯向，理應設在面對家門的方向才有守護門扉的作用……


    （題外話：多年後在國內旅遊時曾刻意考證這些內容，發現原來古時房舍的土地神位，果真是建在可照見家門的對面或門側）。


    還有和藹慈祥的地主婆婆多番促我多吃多嚐，更表示日常供品只需蒸糕和果品，因老人家不喜酒肉只愛清淡的素品！後來伯伯更向我透露……原來早在我們剛搬來的時候，彼此的緣分原來早已接通……原來當初父親手抱著三'
