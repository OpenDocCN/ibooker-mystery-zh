  mdcn: '身內，在這尷尬狼狽的場景中；我只能雙手按著床沿，靠向地板滑去；有如螃蟹脫殼般，將這個「能量身體」抽出！及後在「光人」多番教導下，我亦終於對某些技巧生出竅門。及後我的意識焦點和好奇膽子，亦越趨穩定和成熟，不多久我已懂得運用這種「出竅」能力，進行多方面的能耐嘗試！


