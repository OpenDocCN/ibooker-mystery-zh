    ## 通靈雜感（三）

    ### 找零錢


    很多時「通靈感應」經常出現在不為意的瞬間，因此常令我於日常生活中，遇上很多不足向外人道的尷尬情況或趣事！


    某晚與好友飯聚後打算乘車回家，於是步行至始創中心門外那組巴士站候車，可是在等候一段時間後還不見所需的巴士出現！再加上十時半後附近一帶的商店亦陸續關門，因此街上的燈光亦開始變得昏暗，而排隊候車的人龍亦漸多！


    就在我呆站等候期間，身後突然傳來一股令人不安的靈感反應！因此我隨即望向身後查找，卻發現原來是來自前方不遠處的某位女途人！只見此人身上籠罩著一團灰白的光暈，令我不期然暗諳著……「擁有如此灰調光暈的人，如果不是鬼物，應該是病入膏肓離死不遠的重病患者！可是此人從外觀上，卻又不像如斯景況？」就在我還在推敲懷疑之際，突然傳來兩聲幽幽喊聲……「小姐，小姐！」我不為意地往後一看，原來這名女途人已站在我的身旁，並聲線細弱地說：「小姐，我剛看畢醫生準備乘車回家，可是卻發現身上沒有零錢，請問可否給我幫忙呢？」


    此刻我才看清楚此人的外觀及衣飾，這是一位身形瘦削和面色蒼白的女士，在炎炎盛夏的晚上穿了一件淺紫色的薄毛衣，她左手挽著一個精緻的繡花籐籃手袋，右手拿著一張廿元紙幣。細聽之下此女士原來是看畢醫生回程中，因此令我不禁對剛才那灰白氣場的意會感到吻合！就在我打算拿出錢包為其效勞之際，突然從意識間傳來「靈界導師」的猛烈警告……「不要，千萬不要接過此人身上的任何物件！」由於這提示驟然急至和強烈，因此令我一時之間心跳亦為之加速和震惑！於是我只好向其辯稱身上的零錢不足，可是此女士卻向我表示：「可否用此廿元紙幣作合併車資？」我隨即拿出身上的「八達通」車票向其展示，並表示沒此需要及抱歉！


    由於這女士看來非常失望，因此令我一時之間忘卻「靈界導師」的警醒，反而提議她向其他候車人士查詢！可是我卻發現她並沒向其他人提問，而是逕自的慢慢步遠！這時我才發現，排在我身後的那對年長夫婦，竟然對我露出錯愕和害怕的神情，兼且整個候車隊伍竟然跟我開出某些距離！有些更對我指劃及耳語，令我一時間感到非常尷尬！


    及至巴士到來行車期間,那對年長夫婦還對我表現得非常敵視及迴避!令我不期然回憶剛才情景,莫非他們因看不見紫衣女士而誤會我對著空氣說話,因而認為我是一名精神病患者?


