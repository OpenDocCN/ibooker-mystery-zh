    # 第一章：牛下童年


    糕來慰勞老師和同學！就算我當時年紀雖小，但也深諳家中的資金並不充裕，對這個人生第一次的生日會感到有些矛盾！回家後如實告知母親時，母親才意會到這是我的首個生日會，故此她亦想為我帶來愉快的回憶與分享，所以母親在這段時間默默的為我籌措和安排當天的禮物……一個分量十足的朱古力蛋糕！還記得當時母親對我表示這個蛋糕比普通口味的價格貴些，期望我能於生日會完結後帶回一些給妹妹品嚐！因此當天我喜孜孜的帶同這個名貴蛋糕回校，更暗地裡跟幾位要好的同學表示今天會有朱古力蛋糕吃，只因當年這種味道的蛋糕是屬於貴價口味！但可惜到後來卻發現我們學生只能分享到普通口味的蛋糕，而我帶來那個全場最大和最貴的朱古力蛋糕，卻早被搬至教員室內某角了！


