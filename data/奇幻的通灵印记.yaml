- md: '## 出體事件簿（一）

    ### 巴士上的神秘來電


    在眾多的出體見聞中，這是一件在多年後亦令我感到充滿玄奇的事件之一。


    某晚我在進入其他次元的出體學習回程中，在重返現世時空架構時，無意間被「時空流」某段訊號所吸引，因此跳進這段不知發生在地球何時何刻的事件見聞中！


    這是從高空飛行鳥瞰中的畫面，一通莫名的手機來電訊號把我吸引過來！只感到這是一則充滿求救意識的來電，我在這不知名的時空下不斷追尋，終於發現原來是來自某輛雙層巴士中某乘客的手機響聲！可是這卻是一輛滿目瘡痍的巴士殘骸畫面，我驚心動魄地飛至這殘骸中搜索，看見一幕屍橫遍野的災後場景！由於那手機來電的聲音感覺充滿絕望情感，因此我從東歪西倒的座椅中不斷尋找！意識亦慢慢地感知到這是一位被困在巴士上，某位不知名者的求救來電！可是就在我感到即將尋至之際，我卻被背後一般強勁的引力拉走，如是者我又再投回現世時空中營營役役！


    可是這次的驚心見聞，卻像不解迷團般於往後的出體回程中尋常再現，而每次只能從中了知到些微的事件內容。某回終於感應到這位來電求救者，是一位於鄉郊地區工作的教師身分，可是我還是未能真正步近將其解救！因為每次總是被某些外力所左右而令我被迫回體！


    某次又在一個不知名的出體時空中，又傳來這名等待救援的老師來電；可是這回我從巴士殘骸中所接收到的感應，卻是這名老師因未能準時回校上班的愧疚內容！及後再經過幾回感知探索下，我才意識到這是一輛從高架橋上被意外拋至谷底的巴士慘劇！


    由於那時妹妹剛巧大學畢業，而她的志願是當一名中學教師；但那時聘請初級教師最多教席的地區，就只有元朗或上水一帶的偏遠中學。所以當時常令我不期然將這則「巴士意外」的出體見聞聯想在一起！後來更要求妹妹不要出席某間位於元朗中學的應徵約見，這當然換來妹妹的莫名疑問！於是我只好婉轉表示這是「夢中」感應情節，對於妹妹來說只感到我是一名過於憂天的「杞人」而已！


    如果這只是剎那間心靈的無意識浮現幻象，為何又會尋常湧現在多次的出體回程時空中？因此後來我只能以誦經持咒的方式來期望減輕這巴士慘劇的發生！


    ********


    後記：這是發生在九零年中的一連串出體見聞之一。

    可是直至 2003 年「汀九橋巴士意外」發生那一刻，我才意會到若干年前的這則出體奇遇，竟於大約十年後在「時空演練」下真的發生了！


    ## 出體事件簿（二）

    ### 元朗村屋


    大約九零年中，某朋友聯同另外兩名友人一起分租某棟位於元朗區的陳年村屋，這是一棟三組並排而建、超越世紀的古舊建築。


    由於這位朋友知道我一向對古物及建築饒有興致，因此某天相約我到這村屋留宿參觀，好待友儕間的聚舊談天更能盡興！


    那天我早被這棟兩層高的村屋建築所吸引，從建築頂所標示的年分看來，已了知到這是一棟接近百年的古物！那些門楣設計有如黃飛鴻「寶芝林」時期的閩南式兩層木欏形式，再加上紅磚瓦頂闊灶布局，果真令人有置身清末民初般的錯覺！


    關於這棟百年建築，據包租所述……早年是那些退休馬姐集資興建的「姑婆屋」，後來業權落入某位老姑的契女身上（亦即包租一家），因此她們就將其中一組分租出來以增收入。當時這裡分別由三戶所分住，左邊地下為古老的闊灶廚房；樓上是那些老姑居所，可惜不久前最後一位亦宣告離世！而中間為包租一家，朋友就住在最後那棟地下，樓上則由另外兩名年青人租住。由於這些舊建築大都空間寬敞明堂廣闊，前方戶外更置有一片露天庭園，因此當晚大家均浸淫在這片閒逸涼快的氛圍中樂上一晚！


    朋友本來打算讓出房間給我享用，可是我還是推卻這番盛情選擇在客廳安睡！由於這天實在盡興因此當晚就寢時，不消一會我已投進沉沉夢鄉！可是就在我睡至深宵夜半的迷濛時空中，卻被附近那片嘈雜人聲所弄醒；我隨即瞇著惺忪睡眼轉身望向廳外，竟看見廳中來回著很多穿著舊日布衣的坊眾！由於那刻實在過於疲倦，因此我只作簡單的觀想「結界」護身，隨即又投回未完的夢鄉中！


    ********


    矇矓中我的意識竟如輕煙般，一縷就飄進這組房子的隔壁上層，亦即是包租一家所聲稱用來堆放雜物的樓層中，可是眼前所見卻是滿壁排列著的層層木神主牌！前方更設有幾組香爐及一些水果祭品，從那些布滿蛛絲塵垢的神主牌看來，這棟老房子原來還寄住著不少冥界原居民，怪不知剛才客廳所見會是這般熱鬧呢！而這些舊坊眾還一直喧鬧來回至臨近清晨某刻，及至一聲充滿弦頻的雞啼聲後，就一切歸於平靜及消失！


    接著傳來附近村民清晨發放一聲鞭炮巨響後，各種現世聲音又再重現（註：這跟當年第一次回鄉省親時，當晚的「見鬼」情況相同，亦是出現一聲不像來自現世的雞啼聲後，那滿室鬼物才消失）！


    ********


    至第二天，朋友們當然詢問我昨晚是否睡得安然，還自滿地表示這是一片遠離市區的清幽樂土！可是我卻向他們表示另一套相反論調，還諷刺昨晚有如睡在鬧市中的「彌敦道」般繁雜！由於我了解到這些朋友是睿智的人，對一些超自然現象持開明態度，因此我才斗膽向其道出這些異界見聞！我微笑道出這是昨晚「靈魂出竅」所了知的內容，還表示這是人體的心靈正常現象之一！及後由住在樓上的兩人暗中潛進此房間打探，只為證實我所謂的「出竅見聞」是否胡謅，還可滿足他們的好奇心！


    可笑是不消一會兒，這兩名年青伙子便神色凝重地急跑下來，然後煞有介事地向我和友人輕聲表示……當中景況竟如我所言般吻合！這時他們才憶起每天定會發現包租持香進出此房間的情景，亦曾經好奇詢問對方時卻辯說這能為老房子除濕氣！現在回想原來隔壁住著過百位「原居民」，果真令他們意料不及呢！


    *********


    後記：關於這棟百年建築的由來，原來當年是由一班退休馬姐集資籌建而成的清修庵堂；但後來隨著不少老姑、老尼去世，這庵堂輾轉傳了幾代後便落在最後一任住持的契女手中，亦即包租一家。而當中附設的接收條件，就是要求每天早晚供奉清香，祭奠這批庵堂靈位先人！


    ## 出體事件簿（三）

    ### 法國手信


    同樣發生在九零年中，一位「好友同修」來電告知將會跟隨堂主夫婦及某些親信弟子同赴歐洲傳法及旅遊。這是堂主臨時議定的同行名單，預計整個行程將會是個多月的時光，臨別前「好友同修」更表示將會送我某些法國手信！


    對於這番盛情我當然感到無比珍惜，並為好友能夠參與這趟歐洲傳法之旅而高興萬分！好友表示對那些歐洲景致早已神往，此趟終能實踐多年願望，能夠隨心所欲地參觀名聞遐邇的羅浮宮，實在是其畢生難忘的體驗！


    如是者我的日子繼續在港營役打拼，不知不覺間已到了個多月後的時光，因此我的內心亦開始好奇好友會為我帶來甚麼的「法國手信」！


    ********


    某朝清晨的迷濛時空中，我在「靈界導師」的帶領下從其他次元重返地球的現世時空。可是出奇地這次出體學習回程的空間入口，卻不是往常的出現在家居窗外或床邊，而是設在萬里晴空的一片雲霞當中！可笑是……在我還未反應過來「導師」已示意我望向前方，竟然看見雲海中出現一架大型的民航客機！接著「導師」更示意我入內尋找相識的友人！


    剎那間已發現「自己」身處客機的座位通道上，我隨即沿著左右兩排的座位中尋找，果然看見這位「好友同修」坐在窗邊某位置，更發現與其同行的不少同修！我當然即時上前在其身旁揮手示意，並雀躍地向其表示我現在是用「靈魂出竅」的方式來跟他們見面和溝通！可是他們還是對此無知無覺，於是我隨即想起同行的那位聲稱擁有「天眼」神通的堂主，期望他能看見我的出現！


    在尋覓了一會後終看見他們夫婦二人同坐於經濟倉某中間位置，於是我即時飛近，並發現堂主正在閱讀一本由我所借閱有關「新時代」內容的書籍。我又嘗試在他們面前揮手問好，可是情況還是跟剛才那些同修一樣！那刻我不禁暗諳著……原來堂主所謂的「天眼」全是騙人技倆，更遑論甚麼時刻守護其身旁的「隱形護法」！經過這次親自測試令我更能證實，原來這全是唬人的幌子！


    這時身後突然傳來一些嘈雜聲，我隨即轉身查看卻發現一輛由空姐推著的餐車正急駛而來，並迅速穿過我的靈魂身體……於是我就在這突如其來的驚遽意外下，剎那掉回床中乍醒！


    ********


    我隨即從床上起來並查看身旁鬧鐘，原來這是清晨五時多時段，於是我又再多睡片刻至八時醒來如常上班。可是那天我的思緒全是清晨時段的出體見聞，因此我當日即時致電那位「好友同修」向其問好！可笑是對方的第一個反應，以為我是從航空公司那兒打聽航班資料，竟然在未知會何日回程的情況下來電慰問？於是我向其道出這是「靈魂出竅」的見聞，可是卻換來好友投訴我總陶醉在那些荒誕的幻想情操中！為了證實我的所見所聞並非虛構，於是好友向我提問航機上某些內容和細節，我都能清晰地為其娓娓道來！


    而我還向其表示……我感應到她此行的心情並不怎樣寬懷，原因是她亦看清那位領袖人物及其家眷，在某些生活事相行持上的真實面貌……！


    但令我意外得著的竟然是……這好友卻成為我其中一位敢於向其透露靈界見聞的忠實聽眾！


    ********


    後記：初期我還對這位自稱神通滿身的堂主猶有餘畏，害怕他口中所聲稱「任何懷疑其能力的人」會被其身旁的隱形護法懲罰！及後隨著時日下的所見所聞，我和某些同修早已察覺這「堂主」只是一個借宗教來混騙斂財的神棍而已！


    後來堂主眼看退修者眾，只好對外宣稱歸隱閉關，卻還暗中招攬和資助某些無知的年少弟子遠赴印度出家求法，以求供其杜撰剽竊（美其名「印證」），繼續欺世蒙混以求博取尊敬和供養！


    ## 出體事件簿（四）

    ### 神秘地道


    這是發生在某個不知名時空的出體見聞……無意間一團充滿哀號的情感能量襲來，我只意識到這是來自一位母親與女兒的無助情緒！矇矓間來到一組深山叢林，奇怪地當中竟發現鋪設了某些小型的火車路軌，並且一直延伸至那些深山洞穴中。


    畫面一轉，看見洞中建構一組組的秘道，全由某些巨大重型的鋼閘所區分。這些隱藏在深山內的秘密通道一直蜿蜒至地底某些岩層，出入其中全賴以簡陋的小火車連接。畫面中看見很多人被分派到來修築這些地下秘道，這全是用血和生命來換取的成果。


    那刻我的意識全被那突然襲來的無助情感所充斥著，只感到這是爭分奪秒的危難拯救時刻，我定要聚精會神努力探索定將這對母女安全救出！於是我坐上其中某車卡沿著洞中路軌一直向下進發，耳邊傳來的是那些金屬撞擊再加上深山迴傳的深邃弦震聲響！當闖至某層洞穴時我終於看見這位中年母親絕望地向我匍匐招手，只見她用盡生命最後一口氣來要求我務必將其女兒安全救出！


    這全是心靈上的意識傳遞能量，此刻我才清楚知道這位年青女兒和某些人被留置在洞內某些再深層的地段中！他們是肩負著修建與保守這些神秘地道的使命，並為那些沉厚的閘門把關。某些驚世實驗正在醞釀爆發，可是這些內容所帶來的震撼和後患會是無窮無盡的深遠！


    突然意識間只感到一團震動，此刻我才明白到原來剛才是參與了一場「靈界度亡」行動！「靈界團隊」引領著這場災難中的眾人以及這對母女的靈識重逢，塵世上的種種塵勞到了此刻終可釋懷！


    而我和某些「靈界隊員」亦安然地返回各自的塵世軀殼中，繼續未完的人間角色。


    ********


    後記：這是眾多穿越「靈界中轉站」及其他次元的某些學習內容之一。可是當中種種的見聞和內容，在重返塵世時只能留下一鱗半爪的丁點印象！


    以這則見聞為例，在醒後的第二天腦中傳來的內容竟然是發生在北韓的某些核試場景？當時我無意間向某位同修（是一位中學地理老師）透露某些內容，可是卻被其取笑為天馬行空的幻想橋段！


    直至多年後，當年這神秘的北韓國度終於證實擁有核武的事實，世人亦從某些機密內容了解到，這是藉由深山秘道、穿越多重岩層的「地下核試場」所成就的結果。


    ## 出體事件簿（五）

    ### 毒氣村


    又是一個迷離的國度，我竟然聳立在一個簡樸荒蕪的漆黑鄉郊。沿路上看見很多人從某方向急跑逃命，可是我還是向著相反方向前進！


    剎那間來到某戶農家，卻看見一桌未吃完的菜餚凌亂散落一地，看來像是發生甚麼突如其來的事故而被迫一家撤離的場面！這是一個暮氣沉沉的迷亂景致，只感到這是一個非比尋常的黑夜！


    我只好嘗試向那些逃難的村民查詢，可惜那全是冒現著鐵青慌亂的面孔，眾人只顧奮力狂奔無視我的提問！此刻我才發現到，原來沿路上驚現不少牲畜和人類的屍體，但大多看來並沒有表面傷痕！此刻我只好跟隨眾人步伐隨他們一起逃命！在幾經轉折下我終來到一條通往市鎮的大道，可是卻發現早已被軍方設置不少關卡封鎖一切，可惜此時此刻我還未了知到……這晚究竟發生了何種的生態災難，何以一之夜間這條簡樸農村竟會化為煉獄場景？


    突然間身後「銀帶」傳來必須回體的訊號，此刻我方明白原來這是出體見聞！於是我只好盡最後努力，嘗試利用還處於靈魂狀態下的「神通感應」，努力探究這晚發生的是甚麼生態災難？瞬間傳來……「毒氣滲漏」事故的答案！

    於是我再爭分奪秒嘗試再感應是發生在甚麼地方？就在回體前的一霎靈感只隱約傳來一個名叫「河源」的名稱。


    ********


    後記：由於這個發生在九零年中的「出體見聞」實在鮮明深刻，因此第二天我隨即打聽甚麼跟「河源」有關的地方資料；由於那時互聯網還未普及，因此我只能到圖書館找尋相關資料來了解，可惜竟發現地圖上充斥著相同地方名的國家亦有幾個之多……如：中國、越南、韓國和台灣等！

    及至若干年後某天，電視新聞突然傳來國內甚麼化工廠礦坑毒氣滲漏的內容時，當下一刻已令我即時聯想到當年那個相關的「出體見聞」，更發現這與當年出體時所感知到的「河源」地方名相吻合！

    由於這場造成大量人命牲口傷亡的中毒事件情況嚴重，官方早已對外封鎖並派出軍隊到來協助清理及善後，因此國內外新聞傳媒全被摒逐在外不得入內採訪！後來官方只公布有限的傷亡名單，所以後來逐漸被人們淡忘而了無印象！


    ## 藍地義工


    當年經常跟隨某些好友或同修自發到一些鄉郊地方做義工，多數為一些年老無依的長者送上溫馨探訪，或年尾時為一些家居或院舍清潔維修。


    某年年終，我們一行人來到屯門藍地某間位於山上的庵堂進行大掃除，這是一所古舊荒僻的戰前三層式建築；據老住持所憶述全盛時期這裡居住過百女尼、居士和香客；可惜現在只餘這位年邁尼師住持，和一名剛從國內到來參學的年輕女尼居住。由於位處偏僻因此她們日常生活上的基本配套，只能以簡單的方式運作和飲食，故此這些尼師多數不甚健康！


    當日我跟隨大家初次來到這地方時，早被那感覺似曾到訪的山路所警醒，因此沿路上我於腦中極力追尋這是何種現象時，腦袋才憶及這是某些「夢中景致」！


    及至到步後發生了一段小插曲⋯⋯我們站在鐵絲網前那白木籬笆門外等候進內時，我已急不及待向友人表示，這是我某次夢中「到此一遊」的地方！還向他們表示：「夢中顯示⋯⋯當我進入此籬笆門後，會被突然從左邊撲來的一頭黑色惡犬所咬傷，因此我害怕會惡夢成真！」此刻另一位曾到訪多次的同修表示:「這裡從沒有你所提及的甚麼黑犬,你這種多疑的性格實在是庸人自擾!」於是他還主動跟我掉換位置,只為證實我的愚昧!可是當我們步進籬笆門內的剎那,左方竟然真的撲出一頭凶惡異常的黑犬;由於我對此情景早有防備,因此我並沒如夢中受到傷害!相反那位跟我調換位置的同修卻被那黑犬噬個正著,猶幸他及時用背包阻擋,因此只是被咬破背包某角因而避過一劫!而這突然闖至的黑犬則被其他同修用竹竿合力轟走!細問之下女尼表示此應為山上野犬,可能是從某角籬笆缺口潛入,因此要求我們盡早修繕以防再有同類事件發生!


    接著我們先向老住持問訊寒暄,然後由女尼帶領進入室內向主佛壇頂禮後便各自幹活。有些清潔廚房、有些拭抹門窗、有些為戶外鐵器上漆,一時間忙個不亦樂乎!


    至大約下午四時左右,老住持要求我們一同參與庵堂晚課,因此我們便放下手上工作潔淨雙手跟隨。眾人均手持清香一枝,然後魚貫跟隨住持及女尼,到各樓層間的佛壇繞佛及頂禮!由於這些儀式要配合經偈及佛號念誦,而我自覺對這些唱誦不太熟悉,因此我被安排在一行人的末端位置,只須跟隨合十頂禮便可!


    就在老住持敲打數下拍板,示意我們攝心準備之時;我卻看見有位身穿袈裟、身形矮小，及有些背彎的老尼從某房間緩緩步出，然後逕自加入這晚課的拜誦行列當中。當下我只想到……「原來這庵堂中的尼師還有這年邁的一位，合共三人呢！」


    於是我沿著一眾步伐手持清香，一唸一拜行遍各樓層間的佛壇頂禮；直至轉至地面向主佛壇頂禮後，前方這位矮小老尼卻逕自步向戶外一所另建的矮門小屋中。由於我一直緊隨其後因此亦順應步向這小屋，可是中年女尼卻從後將我請回，然後更將這小屋重門深鎖！對此情景當然令我感到相當奇怪，因為這樣豈不會將那矮小老尼鎖於其中？只因這是一組不設窗戶恍似密室的建築。於是我隨即向中年女尼示意還有另一位背彎老尼在內還未步出！可是中年女尼聽罷隨即否定我的話語，並語帶微笑認為我可能是忙了整天體力透支，所以才會心生幻覺！並向我表示已預備了某些素點請移步前往分享！


    可是當時我只想到「人命攸關」，定要重開小屋之門好好檢視一番！於是女尼只好悄悄地將我再領至小屋前，然後重啟鐵門讓我看個明白！當小屋燈光再次開啟後，眼前出現的竟然是排列整齊的一組組靈骨龕塔，原來這是安置及供奉庵堂歷任出家女尼的靈骨墓塚！當下我的思緒頓然明白一切，只好默不作聲辯說……可能我真是一時眼花而看錯！當然這又或多或少招來某些同修言語譏諷！


    ********


    後記：這次經歷，令我即時想起……某次跟隨「靈界導師」出體飛到遙遠的西班牙回溯前生後，在修士墓園區所遇見某位剛離世的西方神父新魂事件。這些生前為宗教奉上一生的神職人員，死後還禁錮在某些教條中等待救贖或審判！再不然像這庵堂老尼舊魂情況，還盤踞在庵中繼續拜唱行儀！可能這是過於追尋宗教上的「文字義」而忽略心靈智慧參悟的結果，因此導致死後意識還執迷於形相物質，因而無法超昇至光明清亮的靈界層面中，結果還蒙蔽在塵世年月內而不自知！


    ## 通靈雜感（一）

    ### 荔枝角商廈


    此經歷大約發生在九七年後，當時我已是一名廣告設計從業員。由於工作關係每天總要加班至若干時數方可下班，猶幸這間剛入職的新公司超時情況並不嚴重，此實屬這行業的異數！


    這間新入職的公司，是座落於荔枝角某棟新式商廈，一切布局清新時尚；可惜洗手間卻屬於共用模式，並設置於前後梯間。由於男廁設在偏遠的後樓梯某角，因此男同事大多貪求方便，經常使用設於近電梯那方的「輪椅使用者廁所」……簡稱「殘廁」。


    某天午飯時與幾位同事準備一起外出用膳，臨行前某男同事要求；待他先到洗手間後才起行，於是我們一同站於電梯旁閒談等待。只見這位男同事一手推開「殘廁」門進入時，我已看見當中還有一位戴眼鏡的中年男士在其中。由於我不曾進入過這類「殘廁」因此對此不以為意，直至某次因女廁進行緊急維修，因此只好轉而使用這「殘廁」時，我才發現原來這類廁所布局只是供一人使用。因此那刻才令我奇怪……「何以某次那男同事使用時，卻對那戴眼鏡的中年男士無視，竟會兩人於同一時間使用？」於是我將此疑問向這位男同事提出時，卻被對方質疑我應該檢查視力！


    直至個多月後，要為某戶外服裝品牌的知名客戶；趕製新季度的一系列宣傳刊物，因此我和團隊同事早為這些製作而忙了一段日子。可是由於客方在臨煞科前，還有大量資料需要加入；因此這段時間各同事已加緊努力，務求於死線前順利完成。


    在忙了多個晚上後，這晚只餘下我一人留下繼續工作。另一部門某位親切同事獲悉此事後，特意前來向我送上溫馨提示……叮囑我務必要在晚上十二時前離開，因為此為這棟商廈間的共識！可是由於專注於工作上，因此我並未留意時間的過去；直至突然聽到不遠處，傳來推拉座椅及一聲長長的嘆氣聲後；我才意會到原來已是凌晨一時多！當下我只猜想到是否還有同事未及離開？因此我隨即轉向身後查看，卻看見不遠處有位戴眼鏡的陌生男子，坐在某座位前低頭不語！於是我隨即向著這方詢問是否還有同事加班？可是對方卻對我不言不語，於是我只好步近查看，卻發現原來空無一人！


    我只好再步回座位，打算再多拼一會才下班回家。'
  mdcn: '## 出體事件簿（一）

    ### 巴士上的神秘來電


    在眾多的出體見聞中，這是一件在多年後亦令我感到充滿玄奇的事件之一。


    某晚我在進入其他次元的出體學習回程中，在重返現世時空架構時，無意間被「時空流」某段訊號所吸引，因此跳進這段不知發生在地球何時何刻的事件見聞中！


    這是從高空飛行鳥瞰中的畫面，一通莫名的手機來電訊號把我吸引過來！只感到這是一則充滿求救意識的來電，我在這不知名的時空下不斷追尋，終於發現原來是來自某輛雙層巴士中某乘客的手機響聲！可是這卻是一輛滿目瘡痍的巴士殘骸畫面，我驚心動魄地飛至這殘骸中搜索，看見一幕屍橫遍野的災後場景！由於那手機來電的聲音感覺充滿絕望情感，因此我從東歪西倒的座椅中不斷尋找！意識亦慢慢地感知到這是一位被困在巴士上，某位不知名者的求救來電！可是就在我感到即將尋至之際，我卻被背後一般強勁的引力拉走，如是者我又再投回現世時空中營營役役！


    可是這次的驚心見聞，卻像不解迷團般於往後的出體回程中尋常再現，而每次只能從中了知到些微的事件內容。某回終於感應到這位來電求救者，是一位於鄉郊地區工作的教師身分，可是我還是未能真正步近將其解救！因為每次總是被某些外力所左右而令我被迫回體！


    某次又在一個不知名的出體時空中，又傳來這名等待救援的老師來電；可是這回我從巴士殘骸中所接收到的感應，卻是這名老師因未能準時回校上班的愧疚內容！及後再經過幾回感知探索下，我才意識到這是一輛從高架橋上被意外拋至谷底的巴士慘劇！


    由於那時妹妹剛巧大學畢業，而她的志願是當一名中學教師；但那時聘請初級教師最多教席的地區，就只有元朗或上水一帶的偏遠中學。所以當時常令我不期然將這則「巴士意外」的出體見聞聯想在一起！後來更要求妹妹不要出席某間位於元朗中學的應徵約見，這當然換來妹妹的莫名疑問！於是我只好婉轉表示這是「夢中」感應情節，對於妹妹來說只感到我是一名過於憂天的「杞人」而已！


    如果這只是剎那間心靈的無意識浮現幻象，為何又會尋常湧現在多次的出體回程時空中？因此後來我只能以誦經持咒的方式來期望減輕這巴士慘劇的發生！


    ********


    後記：這是發生在九零年中的一連串出體見聞之一。

    可是直至 2003 年「汀九橋巴士意外」發生那一刻，我才意會到若干年前的這則出體奇遇，竟於大約十年後在「時空演練」下真的發生了！


    ## 出體事件簿（二）

    ### 元朗村屋


    大約九零年中，某朋友聯同另外兩名友人一起分租某棟位於元朗區的陳年村屋，這是一棟三組並排而建、超越世紀的古舊建築。


    由於這位朋友知道我一向對古物及建築饒有興致，因此某天相約我到這村屋留宿參觀，好待友儕間的聚舊談天更能盡興！


    那天我早被這棟兩層高的村屋建築所吸引，從建築頂所標示的年分看來，已了知到這是一棟接近百年的古物！那些門楣設計有如黃飛鴻「寶芝林」時期的閩南式兩層木欏形式，再加上紅磚瓦頂闊灶布局，果真令人有置身清末民初般的錯覺！


    關於這棟百年建築，據包租所述……早年是那些退休馬姐集資興建的「姑婆屋」，後來業權落入某位老姑的契女身上（亦即包租一家），因此她們就將其中一組分租出來以增收入。當時這裡分別由三戶所分住，左邊地下為古老的闊灶廚房；樓上是那些老姑居所，可惜不久前最後一位亦宣告離世！而中間為包租一家，朋友就住在最後那棟地下，樓上則由另外兩名年青人租住。由於這些舊建築大都空間寬敞明堂廣闊，前方戶外更置有一片露天庭園，因此當晚大家均浸淫在這片閒逸涼快的氛圍中樂上一晚！


    朋友本來打算讓出房間給我享用，可是我還是推卻這番盛情選擇在客廳安睡！由於這天實在盡興因此當晚就寢時，不消一會我已投進沉沉夢鄉！可是就在我睡至深宵夜半的迷濛時空中，卻被附近那片嘈雜人聲所弄醒；我隨即瞇著惺忪睡眼轉身望向廳外，竟看見廳中來回著很多穿著舊日布衣的坊眾！由於那刻實在過於疲倦，因此我只作簡單的觀想「結界」護身，隨即又投回未完的夢鄉中！


    ********


    矇矓中我的意識竟如輕煙般，一縷就飄進這組房子的隔壁上層，亦即是包租一家所聲稱用來堆放雜物的樓層中，可是眼前所見卻是滿壁排列著的層層木神主牌！前方更設有幾組香爐及一些水果祭品，從那些布滿蛛絲塵垢的神主牌看來，這棟老房子原來還寄住著不少冥界原居民，怪不知剛才客廳所見會是這般熱鬧呢！而這些舊坊眾還一直喧鬧來回至臨近清晨某刻，及至一聲充滿弦頻的雞啼聲後，就一切歸於平靜及消失！


    接著傳來附近村民清晨發放一聲鞭炮巨響後，各種現世聲音又再重現（註：這跟當年第一次回鄉省親時，當晚的「見鬼」情況相同，亦是出現一聲不像來自現世的雞啼聲後，那滿室鬼物才消失）！


    ********


    至第二天，朋友們當然詢問我昨晚是否睡得安然，還自滿地表示這是一片遠離市區的清幽樂土！可是我卻向他們表示另一套相反論調，還諷刺昨晚有如睡在鬧市中的「彌敦道」般繁雜！由於我了解到這些朋友是睿智的人，對一些超自然現象持開明態度，因此我才斗膽向其道出這些異界見聞！我微笑道出這是昨晚「靈魂出竅」所了知的內容，還表示這是人體的心靈正常現象之一！及後由住在樓上的兩人暗中潛進此房間打探，只為證實我所謂的「出竅見聞」是否胡謅，還可滿足他們的好奇心！


    可笑是不消一會兒，這兩名年青伙子便神色凝重地急跑下來，然後煞有介事地向我和友人輕聲表示……當中景況竟如我所言般吻合！這時他們才憶起每天定會發現包租持香進出此房間的情景，亦曾經好奇詢問對方時卻辯說這能為老房子除濕氣！現在回想原來隔壁住著過百位「原居民」，果真令他們意料不及呢！


    *********


    後記：關於這棟百年建築的由來，原來當年是由一班退休馬姐集資籌建而成的清修庵堂；但後來隨著不少老姑、老尼去世，這庵堂輾轉傳了幾代後便落在最後一任住持的契女手中，亦即包租一家。而當中附設的接收條件，就是要求每天早晚供奉清香，祭奠這批庵堂靈位先人！


    ## 出體事件簿（三）

    ### 法國手信


    同樣發生在九零年中，一位「好友同修」來電告知將會跟隨堂主夫婦及某些親信弟子同赴歐洲傳法及旅遊。這是堂主臨時議定的同行名單，預計整個行程將會是個多月的時光，臨別前「好友同修」更表示將會送我某些法國手信！


    對於這番盛情我當然感到無比珍惜，並為好友能夠參與這趟歐洲傳法之旅而高興萬分！好友表示對那些歐洲景致早已神往，此趟終能實踐多年願望，能夠隨心所欲地參觀名聞遐邇的羅浮宮，實在是其畢生難忘的體驗！


    如是者我的日子繼續在港營役打拼，不知不覺間已到了個多月後的時光，因此我的內心亦開始好奇好友會為我帶來甚麼的「法國手信」！


    ********


    某朝清晨的迷濛時空中，我在「靈界導師」的帶領下從其他次元重返地球的現世時空。可是出奇地這次出體學習回程的空間入口，卻不是往常的出現在家居窗外或床邊，而是設在萬里晴空的一片雲霞當中！可笑是……在我還未反應過來「導師」已示意我望向前方，竟然看見雲海中出現一架大型的民航客機！接著「導師」更示意我入內尋找相識的友人！


    剎那間已發現「自己」身處客機的座位通道上，我隨即沿著左右兩排的座位中尋找，果然看見這位「好友同修」坐在窗邊某位置，更發現與其同行的不少同修！我當然即時上前在其身旁揮手示意，並雀躍地向其表示我現在是用「靈魂出竅」的方式來跟他們見面和溝通！可是他們還是對此無知無覺，於是我隨即想起同行的那位聲稱擁有「天眼」神通的堂主，期望他能看見我的出現！


    在尋覓了一會後終看見他們夫婦二人同坐於經濟倉某中間位置，於是我即時飛近，並發現堂主正在閱讀一本由我所借閱有關「新時代」內容的書籍。我又嘗試在他們面前揮手問好，可是情況還是跟剛才那些同修一樣！那刻我不禁暗諳著……原來堂主所謂的「天眼」全是騙人技倆，更遑論甚麼時刻守護其身旁的「隱形護法」！經過這次親自測試令我更能證實，原來這全是唬人的幌子！


    這時身後突然傳來一些嘈雜聲，我隨即轉身查看卻發現一輛由空姐推著的餐車正急駛而來，並迅速穿過我的靈魂身體……於是我就在這突如其來的驚遽意外下，剎那掉回床中乍醒！


    ********


    我隨即從床上起來並查看身旁鬧鐘，原來這是清晨五時多時段，於是我又再多睡片刻至八時醒來如常上班。可是那天我的思緒全是清晨時段的出體見聞，因此我當日即時致電那位「好友同修」向其問好！可笑是對方的第一個反應，以為我是從航空公司那兒打聽航班資料，竟然在未知會何日回程的情況下來電慰問？於是我向其道出這是「靈魂出竅」的見聞，可是卻換來好友投訴我總陶醉在那些荒誕的幻想情操中！為了證實我的所見所聞並非虛構，於是好友向我提問航機上某些內容和細節，我都能清晰地為其娓娓道來！


    而我還向其表示……我感應到她此行的心情並不怎樣寬懷，原因是她亦看清那位領袖人物及其家眷，在某些生活事相行持上的真實面貌……！


    但令我意外得著的竟然是……這好友卻成為我其中一位敢於向其透露靈界見聞的忠實聽眾！


    ********


    後記：初期我還對這位自稱神通滿身的堂主猶有餘畏，害怕他口中所聲稱「任何懷疑其能力的人」會被其身旁的隱形護法懲罰！及後隨著時日下的所見所聞，我和某些同修早已察覺這「堂主」只是一個借宗教來混騙斂財的神棍而已！


    後來堂主眼看退修者眾，只好對外宣稱歸隱閉關，卻還暗中招攬和資助某些無知的年少弟子遠赴印度出家求法，以求供其杜撰剽竊（美其名「印證」），繼續欺世蒙混以求博取尊敬和供養！


    ## 出體事件簿（四）

    ### 神秘地道


    這是發生在某個不知名時空的出體見聞……無意間一團充滿哀號的情感能量襲來，我只意識到這是來自一位母親與女兒的無助情緒！矇矓間來到一組深山叢林，奇怪地當中竟發現鋪設了某些小型的火車路軌，並且一直延伸至那些深山洞穴中。


    畫面一轉，看見洞中建構一組組的秘道，全由某些巨大重型的鋼閘所區分。這些隱藏在深山內的秘密通道一直蜿蜒至地底某些岩層，出入其中全賴以簡陋的小火車連接。畫面中看見很多人被分派到來修築這些地下秘道，這全是用血和生命來換取的成果。


    那刻我的意識全被那突然襲來的無助情感所充斥著，只感到這是爭分奪秒的危難拯救時刻，我定要聚精會神努力探索定將這對母女安全救出！於是我坐上其中某車卡沿著洞中路軌一直向下進發，耳邊傳來的是那些金屬撞擊再加上深山迴傳的深邃弦震聲響！當闖至某層洞穴時我終於看見這位中年母親絕望地向我匍匐招手，只見她用盡生命最後一口氣來要求我務必將其女兒安全救出！


    這全是心靈上的意識傳遞能量，此刻我才清楚知道這位年青女兒和某些人被留置在洞內某些再深層的地段中！他們是肩負著修建與保守這些神秘地道的使命，並為那些沉厚的閘門把關。某些驚世實驗正在醞釀爆發，可是這些內容所帶來的震撼和後患會是無窮無盡的深遠！


    突然意識間只感到一團震動，此刻我才明白到原來剛才是參與了一場「靈界度亡」行動！「靈界團隊」引領著這場災難中的眾人以及這對母女的靈識重逢，塵世上的種種塵勞到了此刻終可釋懷！


    而我和某些「靈界隊員」亦安然地返回各自的塵世軀殼中，繼續未完的人間角色。


    ********


    後記：這是眾多穿越「靈界中轉站」及其他次元的某些學習內容之一。可是當中種種的見聞和內容，在重返塵世時只能留下一鱗半爪的丁點印象！


    以這則見聞為例，在醒後的第二天腦中傳來的內容竟然是發生在北韓的某些核試場景？當時我無意間向某位同修（是一位中學地理老師）透露某些內容，可是卻被其取笑為天馬行空的幻想橋段！


    直至多年後，當年這神秘的北韓國度終於證實擁有核武的事實，世人亦從某些機密內容了解到，這是藉由深山秘道、穿越多重岩層的「地下核試場」所成就的結果。


    ## 出體事件簿（五）

    ### 毒氣村


    又是一個迷離的國度，我竟然聳立在一個簡樸荒蕪的漆黑鄉郊。沿路上看見很多人從某方向急跑逃命，可是我還是向著相反方向前進！


    剎那間來到某戶農家，卻看見一桌未吃完的菜餚凌亂散落一地，看來像是發生甚麼突如其來的事故而被迫一家撤離的場面！這是一個暮氣沉沉的迷亂景致，只感到這是一個非比尋常的黑夜！


    我只好嘗試向那些逃難的村民查詢，可惜那全是冒現著鐵青慌亂的面孔，眾人只顧奮力狂奔無視我的提問！此刻我才發現到，原來沿路上驚現不少牲畜和人類的屍體，但大多看來並沒有表面傷痕！此刻我只好跟隨眾人步伐隨他們一起逃命！在幾經轉折下我終來到一條通往市鎮的大道，可是卻發現早已被軍方設置不少關卡封鎖一切，可惜此時此刻我還未了知到……這晚究竟發生了何種的生態災難，何以一之夜間這條簡樸農村竟會化為煉獄場景？


    突然間身後「銀帶」傳來必須回體的訊號，此刻我方明白原來這是出體見聞！於是我只好盡最後努力，嘗試利用還處於靈魂狀態下的「神通感應」，努力探究這晚發生的是甚麼生態災難？瞬間傳來……「毒氣滲漏」事故的答案！

    於是我再爭分奪秒嘗試再感應是發生在甚麼地方？就在回體前的一霎靈感只隱約傳來一個名叫「河源」的名稱。


    ********


    後記：由於這個發生在九零年中的「出體見聞」實在鮮明深刻，因此第二天我隨即打聽甚麼跟「河源」有關的地方資料；由於那時互聯網還未普及，因此我只能到圖書館找尋相關資料來了解，可惜竟發現地圖上充斥著相同地方名的國家亦有幾個之多……如：中國、越南、韓國和台灣等！

    及至若干年後某天，電視新聞突然傳來國內甚麼化工廠礦坑毒氣滲漏的內容時，當下一刻已令我即時聯想到當年那個相關的「出體見聞」，更發現這與當年出體時所感知到的「河源」地方名相吻合！

    由於這場造成大量人命牲口傷亡的中毒事件情況嚴重，官方早已對外封鎖並派出軍隊到來協助清理及善後，因此國內外新聞傳媒全被摒逐在外不得入內採訪！後來官方只公布有限的傷亡名單，所以後來逐漸被人們淡忘而了無印象！


    ## 藍地義工


    當年經常跟隨某些好友或同修自發到一些鄉郊地方做義工，多數為一些年老無依的長者送上溫馨探訪，或年尾時為一些家居或院舍清潔維修。


    某年年終，我們一行人來到屯門藍地某間位於山上的庵堂進行大掃除，這是一所古舊荒僻的戰前三層式建築；據老住持所憶述全盛時期這裡居住過百女尼、居士和香客；可惜現在只餘這位年邁尼師住持，和一名剛從國內到來參學的年輕女尼居住。由於位處偏僻因此她們日常生活上的基本配套，只能以簡單的方式運作和飲食，故此這些尼師多數不甚健康！


    當日我跟隨大家初次來到這地方時，早被那感覺似曾到訪的山路所警醒，因此沿路上我於腦中極力追尋這是何種現象時，腦袋才憶及這是某些「夢中景致」！


    及至到步後發生了一段小插曲⋯⋯我們站在鐵絲網前那白木籬笆門外等候進內時，我已急不及待向友人表示，這是我某次夢中「到此一遊」的地方！還向他們表示：「夢中顯示⋯⋯當我進入此籬笆門後，會被突然從左邊撲來的一頭黑色惡犬所咬傷，因此我害怕會惡夢成真！」此刻另一位曾到訪多次的同修表示:「這裡從沒有你所提及的甚麼黑犬,你這種多疑的性格實在是庸人自擾!」於是他還主動跟我掉換位置,只為證實我的愚昧!可是當我們步進籬笆門內的剎那,左方竟然真的撲出一頭凶惡異常的黑犬;由於我對此情景早有防備,因此我並沒如夢中受到傷害!相反那位跟我調換位置的同修卻被那黑犬噬個正著,猶幸他及時用背包阻擋,因此只是被咬破背包某角因而避過一劫!而這突然闖至的黑犬則被其他同修用竹竿合力轟走!細問之下女尼表示此應為山上野犬,可能是從某角籬笆缺口潛入,因此要求我們盡早修繕以防再有同類事件發生!


    接著我們先向老住持問訊寒暄,然後由女尼帶領進入室內向主佛壇頂禮後便各自幹活。有些清潔廚房、有些拭抹門窗、有些為戶外鐵器上漆,一時間忙個不亦樂乎!


    至大約下午四時左右,老住持要求我們一同參與庵堂晚課,因此我們便放下手上工作潔淨雙手跟隨。眾人均手持清香一枝,然後魚貫跟隨住持及女尼,到各樓層間的佛壇繞佛及頂禮!由於這些儀式要配合經偈及佛號念誦,而我自覺對這些唱誦不太熟悉,因此我被安排在一行人的末端位置,只須跟隨合十頂禮便可!


    就在老住持敲打數下拍板,示意我們攝心準備之時;我卻看見有位身穿袈裟、身形矮小，及有些背彎的老尼從某房間緩緩步出，然後逕自加入這晚課的拜誦行列當中。當下我只想到……「原來這庵堂中的尼師還有這年邁的一位，合共三人呢！」


    於是我沿著一眾步伐手持清香，一唸一拜行遍各樓層間的佛壇頂禮；直至轉至地面向主佛壇頂禮後，前方這位矮小老尼卻逕自步向戶外一所另建的矮門小屋中。由於我一直緊隨其後因此亦順應步向這小屋，可是中年女尼卻從後將我請回，然後更將這小屋重門深鎖！對此情景當然令我感到相當奇怪，因為這樣豈不會將那矮小老尼鎖於其中？只因這是一組不設窗戶恍似密室的建築。於是我隨即向中年女尼示意還有另一位背彎老尼在內還未步出！可是中年女尼聽罷隨即否定我的話語，並語帶微笑認為我可能是忙了整天體力透支，所以才會心生幻覺！並向我表示已預備了某些素點請移步前往分享！


    可是當時我只想到「人命攸關」，定要重開小屋之門好好檢視一番！於是女尼只好悄悄地將我再領至小屋前，然後重啟鐵門讓我看個明白！當小屋燈光再次開啟後，眼前出現的竟然是排列整齊的一組組靈骨龕塔，原來這是安置及供奉庵堂歷任出家女尼的靈骨墓塚！當下我的思緒頓然明白一切，只好默不作聲辯說……可能我真是一時眼花而看錯！當然這又或多或少招來某些同修言語譏諷！


    ********


    後記：這次經歷，令我即時想起……某次跟隨「靈界導師」出體飛到遙遠的西班牙回溯前生後，在修士墓園區所遇見某位剛離世的西方神父新魂事件。這些生前為宗教奉上一生的神職人員，死後還禁錮在某些教條中等待救贖或審判！再不然像這庵堂老尼舊魂情況，還盤踞在庵中繼續拜唱行儀！可能這是過於追尋宗教上的「文字義」而忽略心靈智慧參悟的結果，因此導致死後意識還執迷於形相物質，因而無法超昇至光明清亮的靈界層面中，結果還蒙蔽在塵世年月內而不自知！


    ## 通靈雜感（一）

    ### 荔枝角商廈


    此經歷大約發生在九七年後，當時我已是一名廣告設計從業員。由於工作關係每天總要加班至若干時數方可下班，猶幸這間剛入職的新公司超時情況並不嚴重，此實屬這行業的異數！


    這間新入職的公司，是座落於荔枝角某棟新式商廈，一切布局清新時尚；可惜洗手間卻屬於共用模式，並設置於前後梯間。由於男廁設在偏遠的後樓梯某角，因此男同事大多貪求方便，經常使用設於近電梯那方的「輪椅使用者廁所」……簡稱「殘廁」。


    某天午飯時與幾位同事準備一起外出用膳，臨行前某男同事要求；待他先到洗手間後才起行，於是我們一同站於電梯旁閒談等待。只見這位男同事一手推開「殘廁」門進入時，我已看見當中還有一位戴眼鏡的中年男士在其中。由於我不曾進入過這類「殘廁」因此對此不以為意，直至某次因女廁進行緊急維修，因此只好轉而使用這「殘廁」時，我才發現原來這類廁所布局只是供一人使用。因此那刻才令我奇怪……「何以某次那男同事使用時，卻對那戴眼鏡的中年男士無視，竟會兩人於同一時間使用？」於是我將此疑問向這位男同事提出時，卻被對方質疑我應該檢查視力！


    直至個多月後，要為某戶外服裝品牌的知名客戶；趕製新季度的一系列宣傳刊物，因此我和團隊同事早為這些製作而忙了一段日子。可是由於客方在臨煞科前，還有大量資料需要加入；因此這段時間各同事已加緊努力，務求於死線前順利完成。


    在忙了多個晚上後，這晚只餘下我一人留下繼續工作。另一部門某位親切同事獲悉此事後，特意前來向我送上溫馨提示……叮囑我務必要在晚上十二時前離開，因為此為這棟商廈間的共識！可是由於專注於工作上，因此我並未留意時間的過去；直至突然聽到不遠處，傳來推拉座椅及一聲長長的嘆氣聲後；我才意會到原來已是凌晨一時多！當下我只猜想到是否還有同事未及離開？因此我隨即轉向身後查看，卻看見不遠處有位戴眼鏡的陌生男子，坐在某座位前低頭不語！於是我隨即向著這方詢問是否還有同事加班？可是對方卻對我不言不語，於是我只好步近查看，卻發現原來空無一人！


    我只好再步回座位，打算再多拼一會才下班回家。'
