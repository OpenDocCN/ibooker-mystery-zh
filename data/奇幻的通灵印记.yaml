    後記：可能二舅病歿是發生在中國人最珍視的吃團年飯日子前夕，因此當晚的留院病人及醫護亦對這客死異鄉的二舅感到婉惜！因此各自的心靈間拼現出真摯亮麗的祝禱意念，從而形成這晚一個令我難以忘卻的亮麗「大愛」光波頻譜！


    直到現在我還深切難忘當晚主診醫生的搶救畫面，因在其心輪間所發放如青草嫩綠的光波，是何等奪目和充滿關愛的能量發放，是一股無私的「大愛」甘霖！'
