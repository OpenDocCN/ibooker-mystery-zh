    我從牛下居所飄出後，瞬間轉至九龍灣港鐵站的那條行人天橋方向。那時候這段天橋還未加建頂部，因此我從高空可鳥瞰橋上，眾多撐著雨傘的行人；卻發現每把雨傘的頂部，卻如煙花般拼現出一團團亮麗的光影畫面！就在這好奇思想產生的一霎，從意識間竟傳來一團「意念」答案……「這些發放著耀目光波的源頭，是源自那些往來如鯽行人的頂輪光。」我更即時感念到……橋上某小學生與同行母親身上，所相互共融的真摯情感光譜能量。並發現公園內林木間，小如一片葉子的光影也是格外亮麗！由千百葉片光影共震所匯聚而成的一顆樹，這種奇妙組合已令我驟然感念出，一種宇宙間無私「大愛」的情感覺悟！


    這時感到身後的那團「巨大意識」一直引領著我飛至更遠更高的天際，來到一個呈現半圓畫面的浩翰海洋上空，隨即發現遠方竟出現兩條亮麗飄帶，並從大海蜿蜒至天際盡處。就在意識間生出疑問的一霎，已即時傳來一個捕魚畫面……看見幾艘西方的先進捕魚船，從湛藍深海圍捕魚獲的壯觀畫面。百千萬億的魚獲，源源不絕被拖上船艙即時保鮮……這時只見船艙已即時飄出億萬光點，遁向天際那條亮麗蜿蜒的飄帶中去！這刻我才恍然驚覺，原來這是兩度進出「地球」的空間通道；霎時間被這運行在宇宙間的生死法則，震懾得嘆喟無言！


