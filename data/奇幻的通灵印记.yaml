    有一男聽眾表示自己是神功弟子，因某位家住牛下親友的年輕女兒，遇上陰邪事件而向他求教！話說此女子每晚總被一白衣男子於夢中性侵，年月下更被摧殘至命若懸絲，及後更害怕晚間來臨、害怕睡眠！可是男聽眾表示他們就算聯同一眾師兄，給予寫符封身亦不能解救此女子出陰邪，因此後來只好請來師公僮身給予指點開示！但奇怪地師公所傳來的答案，只是要求他們將其家中所有傢俱雜物抖出，自會解決問題！


