  md: '接著被救護員送上擔架床，並作初步檢驗。


    看罷此情此景，使我不期然對眼前景象生起疑問？剎那間……身後突然感到一團充滿智慧的「巨大意識」降臨，我知道這是一直給予守護和多方教導的「靈界導師」！「光人導師」傳來一團意念內容……令我瞬間明白這是甚麼一回事！


    原來這是發生在半年前的某單交通意外，一名報館記者某天駕著一輛電單車；途經此迴旋路段時不幸發生意外，頭部更撞向路邊燈柱即場喪生……！因此靈界團隊於今夜時空，幻化為「白衣救護員」將其迎向靈界安頓！


    （註：大多數人意會往生之期，應在七七期限內出現。但實情是這些時空上的感觀現象，不是單純以地球所意會的時間來計算！而是因人而異……還有因業力而左右！）


    由於這輛救護車的車身紋式過於特別，因此使我對此產生另一重好奇和疑問；因為我發現這救護車上的左右車身中的「十字」紋式，竟然是一組亮麗多彩、恍似禮物包上的「蝴蝶結」圖樣！


    當這疑團閃現的一霎「靈界導師」已即時送上解答內容：「在你們世界中意會『死亡』是一個哀傷的終結，但在靈界層面來看，『死亡』是塵勞釋盡，迎向新生的另一'
  merge: -1
  pgno: 355
- img_proc: true
  md: "個開始！是人世學習任務告一段落，融返『靈界老家』的\n\n『迎新』時刻，當然是一個充滿歡欣大愛的喜樂層面！」\n\n就在我還在消化「導師」傳來這「靈界訊息」的時候，\n\
    \n突然感到頭頂上空，像被某團東西緊盯似的感覺出現！我\n\n當然即時轉往上空凝望尋找，竟發現漆黑的虛空中現出\n\n一雙圓亮的大眼！我當下第一個意念反應，竟將此意會為\n\
    \n「尼泊爾」加德滿都「八眼塔」之聯想！就在我滿心歡喜\n\n自以為瞥見「佛眼」之際，「導師」竟然責問我何以近來\n\n借故偷閒放逸，不禪修打坐！\n\n\
    我冷不防被「導師」這麼當頭棒喝，因此剎那心神悸\n\n動，瞬間被一股力量吸回肉身之內！由於這回是由前額位\n\n置返回肉身關係，因此我卻意外發現前額位置，那組恍似\n\
    \n蓮花瓣的脈輪光暈組合模樣！\n\n一個意念間，我又從漆黑的某個「將軍澳」迴旋街道，\n\n瞬間掉回肉身，並安躺於溫暖的床上。我隨即睜開雙眼看\n\n看是何種景況，還在對我一直緊盯凝視？\
    \ \n\n眼前驚現一雙圓圓大眼，接著只感到滿面盡是口水的\n\n********\n\n第三章：靈魂出竅\n\n355"
  merge: -1
  pgno: 356
- img_proc: true
  md: '痕跡！原來滿以為是「出體」中瞥見「佛眼」的殊勝光景，竟然只是頑皮小狗「比 B」的一雙圓圓大眼而已！這刻只感到哭笑不得，唯有自我安慰抖擻情神重新再睡！


    ********


    後記：首先要向大家闡明一個「靈魂出竅」的誤解，可能大眾千百年來受到戲劇故事或字面所影響，以為「靈魂出竅」是整團靈魂意識，一併抽離跳出肉身之外的活動，只留下一具恍如屍體般冰冷的軀殼現象。實情是……「出體現象」只是將某部分「意識」被投射於體外而已，因此躺在床上的身體，還是存有體溫及呼吸運作（只是進入微細的呼吸層面）！故此西方「新時代學說」將此現象稱為「意識投射」（Projection
    of Consciousness）活動，如同投映機般往外投射出一團「意識能量身體」，進入非物質次元中旅行或探索。


    「人世生命」是一團由不同「靈覺意識」所構成的「身心靈」生命體，當中可粗略概括為「可隨意」（五感思考和肢體上的自主活動範疇）和不能自主的「非隨意」（心跳脈搏髓液微循環等……）兩組意識所構成！因此正好說'
  merge: -1
  pgno: 357
- img_proc: true
  md: '明……這個擁有複雜構造「身心靈」生命體之所以能夠在「地球教室」出現，所肩負的使命是跟另一重廣大無垠的「靈性世界」（純意識非物質界）有所聯繫和肩負著某些轉世責任。


    從整體「靈性生命體」的角度來看，跳進人世學習的那些「比例」猶如伸入池塘輕觸水面的指尖般，只佔整個「靈性生命體」的極微小部分的觸感而已！因此從另一個層面來看，這個現實世界卻反被視為幻象！一個平衡宇宙法則，與業力試煉的學習場所、體驗教室。'
  merge: -1
  pgno: 358
- img_proc: true
  md: '# 結語：人世學習


    書中對「靈界」的描寫，是刻意避開某些宗教言詞上的借用！原因是這個浩瀚無垠的「靈界空間」，當中的「宇宙高靈」或「靈界導師」；從來都只是世人或宗教將其劃分和套入某些「神祇」名相來專利，這實在將整個「靈界」層面狹義化和褪色失真！


    當然讀者還是從文章中，可看到有關故事；亦曾採用某些宗教詞彙的名相，來描述當中的人與事。只源於想盡量保留當初我對「靈界」認知的早期意會！


    還有一重點，就是這個「人世之旅」是「靈界團體」的整體安排，是共同所議定的體驗旅程！因此當中的正反向計劃，都可作為被議定的學習重點！故此世人所鄙棄的困乏災厄的人生，在背後可能是肩負多生所濃縮學習和體驗的重點！相反那些富饒康莊的平順人生，可能只是延長人世學習的避風港！


    只因世間上的人和事，可說是一場角色扮演的幻境遊戲而已！背後的統籌議定和程式編寫，還可藉每晚夢鄉；跟「靈界團體」互動交流，來豐富或更新這「生命藍圖」（意識創造實相）。'
  merge: -1
  pgno: 359
- img_proc: true
  md: '所以我們應該積極建構和創造各自的「人世劇本」，努力做好人世角色上的任務！世人不須擔當宗教救世主的角色，更不須藉宗教犧牲、奉獻或參與聖戰才可得到上天眷顧！只須踏實認真的發揮樂觀正向的人生態度，這樣才能跟「光明靈界」結緣，這正是「物以類聚」的「吸引力」法則！


    ********


    註：文中所指的「靈界」一詞，是形容充滿宇宙大愛能量（同理心、慈愛心）的「靈界空間」（純意識、非物質界）（並不是中國人一向所意會的幽冥陰間）。而這個浩瀚無垠的「靈界空間」當中有被我稱為「靈界中轉站」的地方（西方的通靈學者稱為：星光平台
    Astral Plane）。


    這正是人世旅程的開端和回歸的地方，期望藉書中故事，可給各界多一個角度了知「靈界面貌」！這是一個以心靈意識所主導的亮麗空間、是一個充滿正面能量的光明境界！因此應該摒棄那些古老不實的暗沉陰間傳說，用積極樂觀的心靈來發放歸向能量，創造出通往這片空間的神奇力量！'
  merge: -1
  pgno: 360
