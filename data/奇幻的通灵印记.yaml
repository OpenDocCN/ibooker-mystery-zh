    雖然從小經歷不少「見鬼」見聞，但我並不是將所有「超自然現象」全偏向鬼神方向來意會！反而是從不同的角度來思考，從而啟發更多研究與探討！


    # 靈界導師


    其實在早期的出體遊歷中，總發覺背後經常伴隨著一團充滿光感能量的「巨大意識」，並在遊歷當中隨時為我送上答案和導引。


