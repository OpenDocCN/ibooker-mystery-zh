    # 靈界起點'
  - '[PAGE 13]


    # # 投生前的靈界起點


    古時的東方傳說……每個投生世間的生靈都要飲過「孟婆湯」後才可上路，好讓各式前塵往事清洗得一乾二淨，才展開瀟灑平生。可惜這個傳說套用在我身上，某程度可說是失效的！只因自出生後，我還存在未被涮去的靈界轉世記憶……可惜這些先天記憶和通靈感應，並沒為我帶來不錯的做人優勢，卻反而為我帶來不足為外人道的世間磨煉，令崎嶇的人生路走來更顯艱辛和孤困！


    ********


    說起這段投生前的光景，印象中這是一個非以人類單純文字和筆墨可以描述得透澈的空間層面……是一片非物質、非形相示現的虛無境地。而是以「光波」與「聲韻」（Sound
    and Light）為涵蓋溝通的境界！雖然無形相，但當中的溝通架構是以「多重的超覺感知」來呈現的。這多彩亮麗的聲光，蘊涵著極致的巨大意識——宇宙本源。它包含至善智慧與無私大愛的成分，亦是整體宇宙運作的重要能量元素！'
  - '[PAGE 14]


    在朦朧的歲月中「靈明一點」的意識被喚醒……由「本源光」中化現而成。從極致的空間中穿越重重的能量架構，剎那間閃現至由一眾「宇宙高靈」（亦可稱為：靈界導師）所共同創造的遼闊宏大空間中……（註：直至投進此空間的一霎，才示現出類似世間的形相意識）。這空間是結集來自不同「星光架構」的「意識體」，是投生「地球教室」即「物質界」前的議事和規劃空間，這亦是那些剛從地球離世歸來的「靈魂意識」被接引回家的中轉站，亦是某些在地球還擁有肉身軀體的靈魂出竅者，進出靈界探索的最終站。這是集一切意念和形相構建而成的意識舞台，這個不可思議的神奇國度，我將它稱為「靈界中轉站」……西方的通靈學者稱為：「星光平台」（Astral
    Plane）。


    ********


    直至到達「靈界中轉站」後，這顆「靈明意識」此刻才有一個「我」的概念感念而生。一眾靈界導師和這個剛化現而成的「我」，隨即參與這個共同規劃和議定的「人世藍圖」（註：還記得在靈界規劃議定時，這些導師皆以古希臘長袍智者形相示現。但值得一提的是，導師所示現'
  - '[PAGE 15]


    的形相是因應各自因緣感念而生，故此當然會各有不同形象。 ) 藉著投生「地球教室」，期望能為靈界團隊帶來豐富多樣的靈性進程和體驗！因這個以物質架構為用、時間運作單向線性的「地球教室」，有來自種不同輪迴架構的轉世團隊。「我們——靈界團隊」，共同規劃和議定這幅「生命藍圖」應以何種性別、樣貌、智慧和父母眷屬為組合。可能大家會奇怪，當然人人都希望選擇樣貌娟好、智慧和身分優越的條件來作為投生人世的裝備，可是當你身處這個「靈界當下」，順向或逆向的規劃模式都可成為被選取的手段。而所有規劃，只會著重於此趟轉世經驗能為「靈界團隊」帶來怎樣的靈命進程和體會！不同組合的「靈界團隊」大多來自不同次元，由不同的「輪迴圈」頻譜的屬性組合而成。


    「我們——靈界團隊」剎那間已進入了快速回溯的時空中，檢視多重次元的各種轉世經驗……現在只隱約憶及當時「靈界團隊」表示，過去因為逃避「地球教室」某段不忍的殺戮時空，已跳過了幾次應該起行的轉世安排……所以已與靈命進程發展得較和諧、頻譜較一致的「輪轉成員」相去漸遠。所以如這次還再遲疑，下回的轉世組合只能與較疏離、靈性光波震動較不一致的輪轉組合結緣！及後「我'
  - '[PAGE 16]


    們——靈界團隊」共同議定，這趟以女性的角色來參與這次的人世之旅，這將會更能體現出某些靈性感知！選取樸實平庸的外貌及智慧，將可經歷到另一種的人世體驗。在這個光明亮麗的靈界層面中……「靈界團隊」所著重的是整體的靈命進程，以及採集和完備不同的經歷及情感面貌！


    還記得這廣闊無垠的「靈界中轉站」有一座宏偉光亮、高聳無際的記錄大廳，是儲存和記錄眾多轉世資料的地方（註：西方通靈學者稱為……阿卡西紀錄 Akashic Records）。當「我」進入這個巨碩無垠、有如圖書館般的資料庫後，極目是無盡無邊的光體書冊；而當中最矚目的當然是放在中央高臺位置的那冊……散發著純金亮光的厚厚巨冊！當飄近這巨冊的一霎，「我」已即時感知到當中所記錄的內容！這是記錄著為地球教室，帶來啟蒙的一眾圓滿者的，轉世記錄內容。此刻「我」只感悟到一股由衷的讚嘆與欣喜！


    往後，這個還是處於粗略意識階段的「我」，被引領飄至其中一個展示台前停下。一本屬於「我」此趟轉世歷程大綱的書冊，在虛空中緩緩浮現！此刻「我」亦深諳如能圓滿這趟「人世之旅」，將會是加快修畢「地球教室」課題的關鍵，將是前往另一個更為微細的星空架構的……轉世契機。'
  - '[PAGE 17]


    由於快將投生人世，所以在剎那間「我」已閃現至另一個場景，這是那些將要進入「地球教室」轉世者的學習班。這時的「我」已不知不覺間感現出一個人形光體，同時亦隱約傳來與物質界相連繫的生命聲音……卜卜的心跳脈搏聲此刻正式開展了！'
  - '[PAGE 18]


    # 意外地來到人世


    前塵至此……竟發生一件，現在回想起來很是慚愧的事情！因隨著轉世部署漸趨明確，「我」對將投進人世的布局與組合充滿期盼……對此趟的學習進程，會以何種方向實踐感到好奇。故在熱切的好奇心驅使下，「我」竟私下溜進記錄大廳，偷看規劃中的「記錄冊」內容。「我」靜靠在記錄大廳前不遠處的一座……名為「靈界花園」的池畔，但當「我」正想打開細閱大綱時，這「記錄冊」竟突然迸射出奪目亮光，而「我」竟猛然被身後一股巨大的吸力扯進這光波池中！這突如其來的意外，自諳時機未至卻突然掉進世間迷陣；慌亂的意識隨即發出強大的召喚，請求靈界導師前來解救……可惜一切卻為時已晚！


    現在還深刻記得當初掉進「地球教室」時，對此塵世空間驚鴻一瞥的情景……那是一股巨大強烈的急速跌墮感，恍如火箭升空失敗意外後，由萬里宇外跌回地球的震撼衝力！在經歷沒完沒了的天旋地轉和沖擊跌宕後，「我」驚訝的發現……何以「地球教室」竟結集著，眾多不同的黑暗意識？當中寄居著為數不少、無以名狀的「片段體」和「意識體」！若干年後靈界導師告知……這是那些忘卻'
  - '[PAGE 19]


    回家路……沒返回「靈界中轉站」接受「宇宙本源光」淨化的殘存意識。這亦是窒礙「地球教室」整體生靈進化的巨大阻力！


    經過這有如猛烈暴風及非比尋常的一輪跌宕後，一股強大迫力把「我」這團意識；瞬間壓榨進一個昏黑和侷促的空間之內。那是一股無比的壓迫感，「我」隨即感受到一股有如粉身碎骨般的巨創，並在強烈的暈眩感中不斷轉向！經過這麼多的折騰後，只感到意識漸次模糊，最後昏殁在不知不覺的時空中。


    ********


    先來簡介一下我的成長背景，出生時家中有親切的外婆、父母、姊姊（若干年後再添兩妹）。聽母親細說從前，在我出世那天的早上，母親還頂著七個月的身孕為父親在廚房煮早飯。由於當時一家幾口租住在旺角那些廚廁共用的分租房中，那朝母親卻意外地；在廚房因誤踏火水，而從後翻倒，因而被急送至醫院催生（註：這點竟跟我在靈界時所遇上的意外吻合）。由於是早產嬰關係，自小便感到體質不佳！母親曾告知由於我是早產，初出生時我的雙'
  - '[PAGE 20]


    眼還是整天緊閉昏睡。直至三個月後那次到健康院體檢時，

    發生了一些小枝節，才令我首度睜開眼睛。


    至於當年這個健康院體檢的小枝節，亦可說是我平生

    第一個景象記憶……還記得當時，我是突然被背後一股寒

    徹骨髓的冰冷感覺所驚醒！原來體檢護士，在輪到為我磅

    體重時；竟一時忘記在嬰兒磅上墊薄毛巾，就快手快腳地

    把我直接置於冰冷的金屬磅盤內。由於我被這突然而來的

    徹骨冰感所驚醒，因此被驚嚇得睜眼嚎哭！這刻護士卻發

    現我的雙眼竟可睜得這樣明亮時，即時送上驚喜的歡呼，

    還急不及待叫喚母親快來察看！


    這可說是我投生人世的第一個畫面……矇矓中看見多

    張笑臉……高掛在健康院天花上一把呼呼吹著的大型三葉

    吊扇……面對這突然而來的陌生喧鬧場景和刺眼的光線，

    早把我驚嚇得涕淚漣漣！直至感覺到一股溫暖親切和芳郁

    暖流襲來，眼前矇矓出現一個全身籠罩著粉亮光波的女士

    身影時，我的意識心靈早已辨別出這是「母親」的氣味！

    從她身上所透出的熟悉體香和在其輕柔的聲音安撫下，我

    即時感到無比的溫暖和安穩；頓時止住哭聲倦躺在其懷抱

    中，並傾聽著這親切熟悉的卜卜心跳聲！


    剎那間我又再沉醉在這個來自母親與孩子間的心靈'
  - '[PAGE 21]


    連繫，感受這濃郁的愛意甘霖！我從心底報上默默的感恩……感激這來自塵世遠方的真摯相迎！但不久我又再被頭顱內不適的睏倦感犯著，又再倦極昏睡了。'
