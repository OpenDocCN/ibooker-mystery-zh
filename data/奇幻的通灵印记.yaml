  mdcn: '那刻我只感到百般意外，萬沒想到就這樣跟伯母失去聯絡，心中頓然感到十分遺憾！


    我只好失望地從荔景上空瞬回飛返家中，隨即跳回肉身致電給正在上班的舊同事。


    ********


    舊同事聽罷我所描述的出體見聞後，隨即向我詢問當中細節；而我亦對當中內容感到疑問重重，因此各自提出不少查詢……由於出體畫面中伯母年紀，看來跟臨終時年輕廿載；再加上這同事的家居布局，竟然是整齊明亮；如梳化和餐桌均蓋上某些簇新布飾，而伯母當時卻不是印象中每天都在搓麻雀，反而是優雅地整理餐桌上的花卉和盆栽！


    只因舊同事曾表示在上回那個清晨夢中，所見的亡母容貌是醫院臨終前，因口鼻曾經插上管子而遺留下來的受傷形象！可是我卻反而是看見一個開懷、年輕和健康的伯母？而且同事為了證實我這回出體所見的真偽，因此隨即詢問我當時所見的伯母身上衣飾是何模樣？我如實告知那是一件白底印有紫色和紅色細花的中式服裝，再配以一條黑褲……當我說罷這一切，電話另一方卻沉默一片！那刻我只有懷著抱歉的心情，意會到這次出體任務定是失敗告終！


    就在我不停地向對方表示抱歉之際，電話中傳來舊同事飲泣哭喊的聲音；並表示我所描述的衣飾，正是當日亡母大斂入棺時的衣飾模樣！而她亦透露亡母生前喜歡栽種植物，還有我所描述現在的家居布局，亦如我出體時所見般吻合！可是當舊同事向我查詢其亡母於那光團畫面消失後的去向時，我卻表示不知道！就這樣我懷著愧疚的心情期望能再嘗試借用「出體」能力再作尋訪，可惜在往後日子中卻不曾如願！


    ***


    後記：對於這次「出體度亡」任務未能成功，令我感到十分遺憾！而舊同事雖然沒當面怪罪於我，但從眉宇言談間卻帶些抱怨和傷感！


    於是我只好將這次「出體」內容，悄悄地向某資深的同修提及；因此才做就後來，北上拜見另一位適逢南下弘法的「西藏瑜伽士」！


    # 西藏瑜伽士


    為了趕赴國內拜會這位從西藏遠道南下的「瑜伽士」，因此我特意申請特快證件，於某個周末專誠前往。就在某資深同修帶領下，聯同我和那位滿帶亡母去向疑問的「舊同事」，一同到達位於深圳某棟樓宇中。


    話說這位從西藏而來的「瑜伽士仁波切」，是一位終年於海拔高原之山洞中，斷食閉關的禪修者。並曾遊歷於一百零八個大大小小的天葬台修行，只因背負著重建千年傳承廟宇的重任，所以特意南下廣結善緣，因此前來求見的人群，整天都絡繹不絕。


    當日下午，只見現場早已坐滿一室求見的訪客和弟子；由於這位資深同修與「瑜伽士仁波切」結緣非淺，因此我們只須在預約時間之中，再等候一會便可入內拜訪。當接見室房門打開的一霎，迎面所見當中盤坐著一位頭頂盤有長髮的「瑜伽士仁波切」；身旁還有另一位年青的「仁波切」為我們作漢語翻譯。我們恭敬地合十頂禮後便坐在一旁，由這位資深同修向年青「仁波切」道明來意；請求給予幫忙和指引，讓這位「舊同事」能夠知悉亡母去向！


    「瑜伽士仁波切」聽罷「舊同事」親述關於亡母往生超度後，卻在半年後再現家中！並於夢中瞥見亡母的內容後，慨嘆這是源於「我執」原故！因此指示其親人兒女，應為亡母多作誦經迴向；並於各大寺院的超度法會中，多為亡母報名超度，令其早日開悟投向光明境地！


    由於「瑜伽士仁波切」此行，以利樂眾生廣結善緣為任；因此亦詢問我有甚麼問題，可向其提出！這時同行的資深同修向我悄聲提議，可借此機緣向這位「仁波切」詢問……那抑壓在內心多年的「神秘夢示」指引（註：詳見第四篇〈不斷重複的神秘夢境〉）！


    於是我只好坦誠地向面前兩位「仁波切」道出不少「人生秘密」，並提及轉世前在「靈界」的某些記憶和「出竅」見聞。想像不到這位從西藏而來的禪修者，竟然耐心聆聽我的「通靈故事」；更因接見我而推卻往後的預約者，當中包括某些有分量、有背景的求見人士！「瑜伽士仁波切」更向我表示，從西藏沿路南下而來，接見了很多來自不同階層的求見者，大都只為滿足「世間八法」而來；求姻緣、求福報、求取世間物慾滿足……而只有我是唯一向其表示，要努力修行超脫輪迴、自度度他。所以對此感到非常高興！


    及至提及自經歷過「瀕死經歷」後，竟發現夢中經常出現一位「光人導師」向我教授「靈魂出竅」技巧，並隨他穿越不同時空參與回溯與學習！這時「瑜伽士仁波切」向我提問：「如你所言非虛，能否說出『死亡』現前時『五內解體』（地水火風空）的各種現象？」於是我逐一道出體內各能量元素解體時，所產生的超覺感官現象和見聞！當他們聽到我因塵世心願未了誓要重返人間，竟然是藉著那宇宙三元音頻……「嗡啊吽」（OM
    AH HUNG）而回來！此時這位一直閉目盤坐著唸咒的「瑜伽士仁波切」竟發出像是感到意外的一聲「哦……」後，隨即對我好奇凝視！


    接著「瑜伽士仁波切」詢問我首次參與密宗法會時，可曾看見甚麼異象？我隨即回憶早年某次關於「觀音寶冠」法會往事……當時在我看來還誤會這是某些舞台特效！因為當與會眾人及台上那位戴上「寶冠」的「大胖子仁波切」（來自錫金）一同唸著「六字大明咒」時，我竟然看見那「大胖子仁波切」真的幻化為一尊美麗莊嚴的觀世音！還發現菩薩手中的淨瓶，更緩緩向下流出縷縷雲霧，並且由台上飄至會場中湧向各人跟前！只可惜當年我對「密宗」存有某些偏見和誤解，所以誤以為這是取悅信眾的手法！及至法會結束後，我向同行友人提問時才意會到，原來這殊勝場景只是我個人的「見聞」而已！萬沒想到這位「瑜伽士仁波切」在若干年後；竟向我詢問這陳年往事，此刻才令我意會到莫非當中存在著某些含意？


    接著我向「瑜伽士仁波切」訴說：「可惜過去就算曾參與過不少靈界的度亡活動，如：親送外婆往靈界等……我卻還未能尋找得到……那個縈繞多年的『神秘夢示』答案！」聽罷「瑜伽士仁波切」向我表示：「世間上眾多形式的傳法上師，並不能明白和了解你的現象！因此一般的人間導師並不能真正滿足於你！」於是我請求「瑜伽士仁波切」給我當中指引！可是卻被他譏道：「既然你說過去經常得到菩薩、護法的幫忙和指示，你又何不亦向祂們提問呢？」我只有低頭慚愧地表示：「早已嘗試過多遍，可惜還是未能如願！」


    於是我向兩位「仁波切」道出夢示內容，及至提及夢中那頂最為深刻的「五彩寶冠」時，「仁波切」要求我將「寶冠」外貌形態和構造清楚描述！因此我將其細說一遍後，更表示因這「寶冠」影像多年來經常出現在夢中，故此心諳如再次發現，我定能將其清楚辨認！這時那位擔任翻譯的年青「仁波切」；竟然對我顯露出驚喜的神情，接著神秘兮兮地轉向身旁的「瑜伽士仁波切」用藏語交談了一會。只感到他們在談論了一些時間後，接著「瑜伽士仁波切」忽然指示年青「仁波切」從房間某角的高櫃頂，取下一個用白色「哈達」（藏族吉祥絲巾
    Kha Ta）包裹著的方盒物體。當時我只感到奇怪納悶，猜想定是兩位「仁波切」因為意會到接見了這麼一段時間後，所以從櫃頂拿來一罐家庭裝什餅來給我們作為小休的茶點！


    於是我拿出紙巾；恭敬地準備接過從這方盒所分發的餅乾，卻發現原來這是一個四邊均繪上藏式吉祥圖案的木盒。只見年青「仁波切」一邊念著密咒，一邊躬身體貌地，從盒中再拿出某團裹上名貴絲綢的物體。接著再由「瑜伽士仁波切」小心翼翼地打開裹著的絲綢，並拿出一頂古舊陳樣的布造帽子！


    由於當時我的遲鈍腦袋還未懂得反應，還在懵懂地痴痴凝望這破舊物體！反觀坐在我身旁的兩位友人，卻對此情景顯得雀躍萬分！這時「瑜伽士仁波切」喚我上前，細辨其上的「帽子」是否如夢中模樣？當下我才意會是怎麼一回事！於是我恭敬地將「帽子」細看一遍後，如實地表示：「仁波切……雖然這『帽子』從頂到底的構造和外形上跟夢境吻合！可惜夢中所見的是一頂簇新和色彩亮麗，並由五色綢緞所製成的『寶冠帽子』！還有一重點是……那『五彩寶冠』在夢中，感到是來自密宗祖師『蓮華花生大士』所擁有！自諳這位滿帶神話色彩的宗教人物所佩戴之物，又怎會輕易落入凡塵，並留傳至現代時空呢！」經翻譯後，但見兩位「仁波切」相視而笑，然後悄聲向我們透露其手上這破舊「寶冠」的來歷！原來這是一頂珍藏經年的「蓮師伏藏」聖物，一直被藏於某雪域深山洞穴之中，再經由「伏藏師」從禪定中尋找而來！因此當然跟簇新時的模樣大有出入！


    由於那多年夢示中的「五彩寶冠」擁有者，是代表作為我的「人間導師」暗示；故此在我尋訪多年遊歷不少地方，猶如《西遊記》眾主角般嚐遍種種磨煉……因此剎那間我的腦海中，不禁將夢境與現實兩者的人物身形；再相互推敲思考，只感到這是一個精妙玄奇的結緣故事！


    「瑜伽士仁波切」看見我還在茫然思索，於是輕喚門外侍者拿來飲品茶點給我們享用。這時門外侍者向「仁波切」表示還有很多求見者不願離開，全是要求為其加持祝福！於是我們禮貌地表示告辭，可是卻被「瑜伽士仁波切」要求在會客室外小休片刻，待其為求見者祝福加持後，再接見我們。


    於是我們一邊吃著茶點，一邊觀看「仁波切」從西藏帶來那些重建「千年傳承廟宇」的籌建照片。從資料得悉，原來這組「千年廟宇」是位於西藏與不丹邊境的「噶舉派」（密宗白教）發祥地，是「白教」藏傳祖師「馬爾巴」大譯師於十一世紀前期所創建，亦是噶舉傳承的第一間寺廟。當中更記載著一個千年傳說：甚麼隱藏於某時空當中的一組神秘的水晶法座……這裡更充滿著「馬爾巴」與其某位大成就弟子「密勒日巴」尊者師徒之間的足跡。因此我們均對這些照片看得分外入神！


    突然間我被其中某張照片所吸引，這是多年前「仁波切」一行人初抵達此聖地時，這組傳承廟宇的失修荒蕪景象（即是籌建初期）。當下令我不期然回憶起某次在「靈界導師」所引領下的「出體」見聞，現在回想同樣是發生在多年前的某個清晨（註：詳見第六篇〈被遺忘的聖地〉）！


    於是我拿著這些照片向加持完信眾後的「瑜伽士仁波切」詢問，並將那次的「出體」見聞向其細說！只見「瑜伽士仁波切」不斷吩咐我明年定必要親臨此聖地，還表示讓我回家細想三天，如認為彼此可結師徒緣分的話，可於第四天早上九時前到達！至晚上臨別前「仁波切」更向我送上一些小布塊和吉祥草，並囑咐我將其置於枕頭內，並在這段日子中勤唸某本尊的心咒！


    說來奇怪的是，在這三天的臨清晨時段中，竟然生了三個跟修持和密法有關的奇怪夢境！至第四天我於早上再見「瑜伽士仁波切」時，他竟然細問我這幾天以來的夢境內容！


    就這樣……我跟這位來自西藏邊陲雪域的「瑜伽士仁波切」正式結上師徒緣，從此展開人生另一頁的修持與見聞！


    *********


    後記：世事總是充滿著意料以外的玄奇！本來此行是為著「舊同事」的亡母往生去向；而求見這位「瑜伽士仁波切」，卻因此而造就了我的一段拜師奇遇！


    同時亦見證了十多年前某次藉「靈魂出竅」飛至「不知名聖地」的真實印證！原來當年我在「聖地」將回體時，曾於高空鳥瞰發現一隊從山下騎驢踏唱、哼著藏歌而來的朝聖藏民……竟然就是「瑜伽士仁波切」這一行人當初到達此「聖地」的同一時刻！


    從那天開始，他們正式擔起重建這「千年傳承廟宇」的艱苦重任，包括付出金錢、血汗和親人生命！


    # 尋訪聖跡


    自從跟「瑜伽士仁波切」結上師徒緣之後，翌年我和妹妹及幾位同修更親抵西藏朝聖，並能親身印證到早年在「靈魂出竅」狀態下的所見所聞，竟然跟現實景象相互吻合！


    可惜在「現實世界」的首次西藏朝聖到訪，卻令我患上輕微的高原不適；終日只感到頭痛目眩，看見很多充滿西藏意景的玄奇景象！及至到達位於海拔高原的「聖地祖廟」時，卻發現眼前所見的異象更甚！但我還是選擇默不作聲，直至此行終結前「瑜伽士仁波切」為我們一行人送上感謝慰問時，我才向他表示：「仁波切，是否還有一些禪修山洞聖跡此行不曾到訪？」「瑜伽士仁波切」向我親切表示：「這方一帶充滿過百以上的禪修山洞，圍繞祖廟四周各處的山上；均有不少歷代修建的禪洞，你想參觀的是哪個山洞？」此刻我只感到「意識」竟如坐在直升機上，從高空鳥瞰地面般的狀況出現，並能瞬間搜尋那個殊勝特別的禪修洞位置！於是我向「仁波切」表示：「應該是位於寺廟後方位置，再跨越兩山後的距離！」


    此刻但見「仁波切」表現欣喜的要我道出是何因緣，會對此禪修洞這般興趣和了知！是否又是過往「靈魂出竅」時的某些見聞？於是我向其道出……這是學佛初期某次禪修打坐時的無意發現！當時只感到身處環境，竟然剎那間化現為一個原始洞穴！並表示這是今早從心靈間突然湧現的「意念」聲音，並不停催喚著我務必向「仁波切」提出這個請求！


    於是「仁波切」要求我將此洞穴環境布局描述一遍，於是我如實地道出當中內容！只見「仁波切」聽罷微笑告知：「只因這是海拔高原更嚴峻的山上，還是留待下年你的高原不適減輕痊癒後才一起前往吧！」可是我卻發現當時同處一室的其他藏族僧侶和眷屬，卻突然間全湧向前方並對我報以好奇目光！


    如是者第二年的朝聖之旅又如期展開，這回當然要實現親臨這個令我感到神秘和好奇的「禪修洞」行程！原來「瑜伽士仁波切」事前曾對此行卜修一遍，並選定某個吉祥日與一眾僧侶浩蕩出發，並打算在目的地舉行一場薈供法會。


    沿路上山路險要陡斜再加上高原空氣稀薄，只感到每跨出一步均令人氣喘如牛，看來我真的把此行程看輕了！幾經艱辛終於順利抵達「禪修洞」，我當然要對此好好印證一番！而同行那位親切的「年青仁波切」更向我悄聲說笑：「人生難得今已得……是否感到領著這個『肉身』前來充滿艱辛，還是以『靈魂出竅』的方式飛來比較自在！」我當然對此感到認同，並表示這回太低估這些山路險要！「年青仁波切」續說：「四大假合肉身雖然不甚完美，但還須藉著這個臭皮囊來體驗世間種種，從而引領靈性和智慧開悟！但你們還是首批到達此『禪修洞』聖跡的漢人，這是一次非常殊勝的因緣！」


    接著在兩位「仁波切」的帶領下，我們一行人在「禪修洞」外共修了一場薈供法會！而我竟然又一次看見某些異象，當然我又對此保持緘默，並在心靈間感激在過去曾給予幫忙和引領的一切善緣、善知識、高靈和靈界導師！


    ********


    後記：當年在「靈魂出竅」狀態下所看見的「藏式廟宇廢墟」和「藏式靈塔」，原來就是「白教」藏傳祖師「馬爾巴」大譯師，所建立的第一間祖廟和他的靈塔所在地。至於那個殊勝特別的「禪修洞」來歷，原來是其大成就弟子「密勒日巴」尊者由「空行授記」的禪洞。因此千百年來，這些勝跡曾經相當輝煌！可惜後來經歷戰火和政治洗禮下，被時間洪流湮沒從而令其破敗不堪！


    註解：


    「馬爾巴」大譯師（Marpa Chökyi Lodrö，1012 年至 1097 年），西藏重要的譯經家。他將時輪金剛等密法傳入西藏，建立西藏噶舉傳承，是噶舉派在西藏的第一位上師。


    「密勒日巴」尊者是一位深受藏人愛戴的瑜珈修行者、哲人及詩人。


    空行：藏傳佛教中的天神。


    # 結上蝴蝶結的救護車


    某年冬天，愛狗如命的三妹突然帶著愛犬「比B」搬來小住；作為姊姊的我當然要作出包容和遷就，因此在那段日子中，我的禪修和打坐時段因而暫停。


    可能陌生環境對小動物來說不易適應，因此小狗「比B」晚上只是小睡片刻，然後整晚不停穿梭我和三妹的床邊搗蛋嬉戲，這情況對我來說真的感到不是味兒！由於自西藏朝聖之旅後，「瑜伽士仁波切」傳授了一些功課給我們，因此在這段日子中不但未能如期進行，還大大影響晚間的睡眠質素，對此漸感兩難和壓力！因此只好向三妹提出改善建議，請其將房門好好關上免卻小狗於晚間四處游走，可惜愛狗如命的三妹；卻認為這樣會嚴重影響愛犬晚間進出，及飲水等活動的自由和興致！


    某晚氣溫驟降，睡在近北面窗戶房間的「比B」可能因為寒冷關係，這晚卻從主人的床邊溜進我的房門位置，整晚更不停地搥門哀號，嚷著要睡在我的身旁！我帶著惺忪倦意只好勉為其難給牠如願，因此滿帶雀躍感恩的「比B」竟骨碌地跳上床來，還給我熱情的搖尾及擁抱，更把我吻得滿面口水！


    那刻，我在內心不期然地暗諳著……「唉『比 B』居然在我滿懷睡意的時候將我喚醒，這樣是很容易造成『靈魂出竅』呢！」


    可惜說時遲那時快，頃刻間我竟發現自己身穿睡衣、光著腳板，已佇立於陌生的深宵街道上！


    那刻只感到一片迷惘，隨即打量身處位置……從意念間瞬間傳來「將軍澳」某個迴旋的馬路邊！


    於是我只好定神觀察這陌生的街道，竟發現右邊身旁，停靠著一輛閃動著車頂燈的救護車；並看見兩名身穿白衣制服的救護員，抬著擔架床從車廂中步出，然後趕往前方不遠處的一組馬路燈柱前停下！這情景使我感到相當奇怪，因為現場所見，並沒發現甚麼傷者或意外發生，只有寒冷冬夜伴著幾盞昏黃街燈，所映照下的冷清街景而已！


    就在我還在滿腹疑竇之際，只見這兩名白衣救護員竟然靠在某燈柱旁輕聲慰問！未幾我卻赫然驚見一名抱按著頭顱、像是受傷待救的年輕男子，從這組燈柱中曳然跳出，接著被救護員送上擔架床，並作初步檢驗。


    看罷此情此景，使我不期然對眼前景象生起疑問？剎那間……身後突然感到一團充滿智慧的「巨大意識」降臨，我知道這是一直給予守護和多方教導的「靈界導師」！「光人導師」傳來一團意念內容……令我瞬間明白這是甚麼一回事！


    原來這是發生在半年前的某單交通意外，一名報館記者某天駕著一輛電單車；途經此迴旋路段時不幸發生意外，頭部更撞向路邊燈柱即場喪生……！因此靈界團隊於今夜時空，幻化為「白衣救護員」將其迎向靈界安頓！


    （註：大多數人意會往生之期，應在七七期限內出現。但實情是這些時空上的感觀現象，不是單純以地球所意會的時間來計算！而是因人而異……還有因業力而左右！）


    由於這輛救護車的車身紋式過於特別，因此使我對此產生另一重好奇和疑問；因為我發現這救護車上的左右車身中的「十字」紋式，竟然是一組亮麗多彩、恍似禮物包上的「蝴蝶結」圖樣！


    當這疑團閃現的一霎「靈界導師」已即時送上解答內容：「在你們世界中意會『死亡』是一個哀傷的終結，但在靈界層面來看，『死亡』是塵勞釋盡，迎向新生的另一個開始！是人世學習任務告一段落，融返『靈界老家』的『迎新』時刻，當然是一個充滿歡欣大愛的喜樂層面！」


    就在我還在消化「導師」傳來這「靈界訊息」的時候，突然感到頭頂上空，像被某團東西緊盯似的感覺出現！我當然即時轉往上空凝望尋找，竟發現漆黑的虛空中現出一雙圓亮的大眼！我當下第一個意念反應，竟將此意會為「尼泊爾」加德滿都「八眼塔」之聯想！就在我滿心歡喜自以為瞥見「佛眼」之際，「導師」竟然責問我何以近來借故偷閒放逸，不禪修打坐！


    我冷不防被「導師」這麼當頭棒喝，因此剎那心神悸動，瞬間被一股力量吸回肉身之內！由於這回是由前額位置返回肉身關係，因此我卻意外發現前額位置，那組恍似蓮花瓣的脈輪光暈組合模樣！


    一個意念間，我又從漆黑的某個「將軍澳」迴旋街道，瞬間掉回肉身，並安躺於溫暖的床上。我隨即睜開雙眼看看是何種景況，還在對我一直緊盯凝視？


    眼前驚現一雙圓圓大眼，接著只感到滿面盡是口水的痕跡！原來滿以為是「出體」中瞥見「佛眼」的殊勝光景，竟然只是頑皮小狗「比 B」的一雙圓圓大眼而已！這刻只感到哭笑不得，唯有自我安慰抖擻情神重新再睡！


    ********


    後記：首先要向大家闡明一個「靈魂出竅」的誤解，可能大眾千百年來受到戲劇故事或字面所影響，以為「靈魂出竅」是整團靈魂意識，一併抽離跳出肉身之外的活動，只留下一具恍如屍體般冰冷的軀殼現象。實情是……「出體現象」只是將某部分「意識」被投射於體外而已，因此躺在床上的身體，還是存有體溫及呼吸運作（只是進入微細的呼吸層面）！故此西方「新時代學說」將此現象稱為「意識投射」（Projection
    of Consciousness）活動，如同投映機般往外投射出一團「意識能量身體」，進入非物質次元中旅行或探索。


    「人世生命」是一團由不同「靈覺意識」所構成的「身心靈」生命體，當中可粗略概括為「可隨意」（五感思考和肢體上的自主活動範疇）和不能自主的「非隨意」（心跳脈搏髓液微循環等……）兩組意識所構成！因此正好說'
