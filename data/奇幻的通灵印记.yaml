    # 第一章：牛下童年


    一個跟現實相反的夢境內容……


    夢中到了一個風光明媚和陽光燦爛的沙灘中遊玩，清涼海風徐徐輕送；沙灘上還見到眾多男女向她表示歡迎，及後她還打算步向清澈的海中暢泳的情節……！


    聽罷我真的打從心底裡抹把冷汗，但又好奇一向與靈界絕緣的父親，這晚竟擁有嚇退那批神秘坊眾的能耐？當然這都只能在我的內心暗自疑問！


    直至某日不知父親何來雅興，竟然跟我們閒話家常時向我們透露了一件人生小秘密！父親曾自誇……「平生不作虧心事，夜半敲門也不驚」！就在我們再三好奇詢問他人生中果真沒有污點時，父親才淡然表示過去曾作過一件虧心事……！


    這是十五歲時在鄉間參與土改勞動時，跟隨鄉親族人到山上；將漫山遍野的山墳移平，以求騰出更多耕地作為糧食增長之用。及至清理一個明朝將軍的墓地時，竟發覺將軍屍身居然多年不腐，並在魁梧的胸前伴有一把長長古劍陪葬。父親還說：「從其魁梧身形來看，這將軍生前應是關外人士；並且長年馬上馳騁，因而導至其大腿骨呈半月形彎曲，而那把陪葬古劍更有千斤之重……！」當前這番景象早把眾鄉親嚇至膽顫心驚！正當眾人不知應如何處'
  - '[PAGE 131]


    置之際，父親卻一馬當先自告奮勇地將古屍一把從棺槨中拉出……！父親告知可能當時只是一名十五歲小伙子，正是年青人天不怕地不怕的反叛時期！後來他還命眾鄉人堆來一把大柴火將屍體燒掉後再用作堆肥，只可惜那把古劍亦只當廢鐵般燒溶，自此以後眾鄉親亦對父親的大膽作風傳頌多時！


    往後又隔了一段時日，某天父親跟隨祖父到山上劈斬柴枝時，卻因天色漸晚祖父要他獨個兒留在山上看守柴堆。當晚可說是父親有生以來最惶恐的一晚！只因當年山上時有老虎出沒，還有漆黑的山上整晚傳來眾多不知名的動物叫聲；因此父親整夜根本不能安心入睡，及至天亮時才覺稍為安心，最後終敵不過睡魔悄然睡著……可是在夢中竟突然現出五隻小鬼，強拉其頭首四肢，像要將他五馬分屍般處置！猶幸父親在夢中還懂奮力頑抗，所以才得以脫險從夢中掙扎醒來！


    聽罷，我當時已即時慨嘆：「真可惜，鄉下人不懂珍惜文物，大好古劍卻落在一幫愚鈍鄉人手中。」但父親卻對我續說：「當年鄉間處處鬧著大饑荒，那種慘況連人吃人亦時有出現；正所謂人比鬼更惡，試問又怎會怕那夢中區區的五隻小鬼呢！」哈……這種強頑精神，就是父親年'
