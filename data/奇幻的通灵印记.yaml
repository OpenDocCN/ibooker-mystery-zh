    # 鄰居三姑的白飯


    這經歷是發生在小四那年的一個炎夏，那時我們已是六口之家……跟我最投緣的四妹出生了！可是家中經濟還是捉襟見肘，所以每年夏天的午飯時段多數以白粥作為主食，再配以簡單的鹹菜豆芽。母親說這樣既可減輕家中的開銷負擔，又可滋養腸胃。可是當年的我果真年少無知，並不了解母親操持家計之苦況，常對午飯總是吃粥感到抱怨。初期我還可跟隨各人一同飲食，可是到後來我著實感到難以接受，因此寧願餓著空肚子也不願跟隨！


    我這種行為當然惹來母親棒喝打罵，但母親眼看我在打罵過後態度還是這麼堅決時，她只好硬著頭皮致電住在十三座的同鄉長輩「三姑」那兒商借一碗白飯。由於三姑嬸嬸每天都會備有新鮮熱飯，供其正攻讀預科的么兒子放學後回家享用，而且我們又是同鄉關係感情當然比其他鄰里熟絡，故此母親才放心讓我到其家中添飯。但臨行前母親還是特意的告誡我要有禮貌，到長輩家裡時要主動向人家問好！於是我滿心歡喜地拿著飯碗到三姑嬸嬸那兒叩門，到步後我發覺原來三姑早把家門虛掩，好讓我能直接進來逕自步往廚房。但當大門鐵閘打開後我卻發現其家中的客廳長木椅上，坐著一位身穿棕黑色唐裝衫褲的中年大叔，那位面容和態度極為嚴肅的中年大叔骨架相當魁梧；看樣子像是舊式城鄉人物，在我看來他對我的出現好像帶些不滿，而且我還發現當我打算步近經過時，這位大叔更即時對我瞪目怒視呢！


    舊式屋村間隔多數在近大門側設置房間，還會在房門口掛上布簾遮擋。但由於大叔所處的位置是房間與客廳之間的必經通道，故此我必須禮貌地請求他讓路才可前行！但當時我的內心著實對這大叔深感懼怕，只在心靈間嘀咕著應以怎樣言詞請其讓路！這時早在廚房準備為我添飯的三姑，眼看我站在廳房通道前還不進來感到相當奇怪，因此她帶笑打趣地說：「這兒並沒有養狗，不會放狗咬你，大可放心進來不要再站在房門邊嬉戲！」眼看三姑再三催促但身旁大叔又不願讓路的困窘處境下，令我一時間忘卻了母親臨行前的吩咐……到別人家要懂得向長輩問好的教導！我只有躡足屏息的依在房門邊挨靠著木板牆前行，盡量希望不要打擾這位厲色怒目的擋架大叔！


    正當打算步向廚房方向時，我才發現其廳中的神櫃前置有整桌的食物祭品，心忖原來三姑正在上香拜神……！及後三姑親切地在我帶來的碗內壓上厚厚熱飯，她還著我如吃過後感到回味可以再來添取！正當我滿心喜悅地捧著熱飯打算打道回府之際，轉身卻看見剛才那位擋路大叔已從座位上移開，並寬步叉腰的站在不遠位置對我更為怒瞪！面對這樣的窘局我的內心更為懼怕，只懂低頭急竄迅步的奔跑回家！回家後我才覺釋懷，正當打算享用手上熱飯之際，母親著急的查問我有否向三姑說出我們每天午飯都只是吃白粥的真相！只因母親早前致電時所持的理由是……剛巧吃光飯鍋內的白飯，但又趕不及來為一碗半碗米飯重新下鍋……！因母親害怕被人家看穿我們家中開銷緊絀的實況！後來母親眼看我拿了人家這麼大碗的熱飯，心想到了三姑兒子放學回家後，豈不要勞煩人家再煮？於是我將剛才所見向母親說：「三姑今天家裡拜神，桌上放滿各種美食，有燒鵝、燒肉……而且她家中更有客人到訪，所以我看見她家中的飯鍋，還有半鍋熱飯呢！」


    當母親聽到三姑家裡今天來了訪客和正在拜神時，即時查問我面對長輩有沒有主動打招呼和問好？我面有難色的坦言只因這位客人樣子實在太惡，所以令我膽怯不敢跟其問好的事實！母親聽罷即時怪責我怎能如斯失禮，但同時亦奇怪何以彼此同鄉理應所有習俗和拜神日子一盡相同！會否是她一時大意忘卻而疏漏了某些祭祀呢？（註：因傳統潮州人普遍偏向迷信，對一切鄉間所定的祭祀和習俗定必盡量跟隨。）於是母親隨即致電三姑先來報上感謝熱飯的給予，然後就詢問今天是甚麼的拜神日子？還詢問是否有同鄉親友到來探訪？


    只見母親在聽罷原因後就平靜地將電話聽筒放下，並敦促我快些吃飯，然後應馬上做功課，最後更叮囑我不要養成講大話的習慣！我順從的應了一聲後，就大口大口的吃著甘甜的熱飯了。接著在往後多天，三姑都親切主動的來電喚我到其家中添飯，於是我又拿著家中飯碗迎接我的熱飯！可是這回我又看見當天的大叔，獨自一人坐在暗黑的房間某角；我原本打算這次會鼓起勇氣跟他打招呼，可是當被他雷厲的眼神再次瞄著時，著實令我感到膽怯！因此我每次都選擇快步的低頭掠過，只想快快添飯後快步的趕回家去。還有當嚐過這些白飯後，我們姊妹間都認為三姑家中的白飯果真與眾不同，後來母親告知三姑家中的白米還是她親自混合的配方！


    又一回中午，三姑來電表示家中剛買來雪櫃並著我們前來觀看（註：雪櫃在當年並不是每家都可擁有的家庭電器）。我和母親當然第一時間趕至其家中觀賞這新產品⋯⋯現在回想真可笑！眼看這電器可製出各種冰品和冷飲，當然令我們十分羨慕！就在長輩間互相閒聊的時候，我無意間發現三姑家中神櫃上，竟放著當天在其家中作客的厲目大叔的相片！我即時告知母親那天我並沒有講大話，當天的客人正是這位相中人時，剎那間本來熱鬧的氣氛頓時變得死寂！母親即時喝罵我不可胡謅甚麼鬼話！於是我將拜神當日，這位大叔所處位置和當時的動作再描述一次，母親即時拉趕著我一同回家！而三姑亦煞有介事地表示要到菜市場補買東西，瞬間竟各自急步離開。


    及後某晚夢中，那位厲目大叔對我多次到三姑家中添飯表示極為不滿；他不斷重複的恐嚇著我並表示如有再犯必定前來算帳！而當晚我早被這夢境驚嚇出病來，因此任憑三姑往後怎樣誠意邀請，我也不敢再貪吃美味的熱飯了！


    ********


    後記：現在回想當年的傻勁果真不少，小時候並不知道原來放在神櫃上的照片是逝去先人的遺照，只因當年大多數的照片都是黑白關係。還有過去亦曾好奇向父母詢問鄰居那些放在神櫃上的照片用意？父親在思索一會後表示，這代表是家中最受尊敬的人。可笑是某次我們孩子間趁母親午睡時段，在提議玩拜神賞月模仿遊戲時，竟將父親的照片也放在神櫃上，玩著膜拜的遊戲；因為在我們心靈間，父親當然是家中最受尊敬的人物！


    至於當年在三姑家中所意會的拜神事件，原來那日是三姑亡夫的忌辰，故此桌上豐富的食物是供先人享用的祭品！現在回想，怪不知在我剛進三姑家門時，那厲目大叔正坐在神櫃前那桌祭品旁的木長椅上。


    另外，從小認識三姑只知這是三口子家庭（母親和兩名兒子），但其兄弟間的年齡差距卻有七八年以上。在我讀小四當年，大兒子早已出來工作，而小兒子卻仍攻讀預科。至於那位我稱為「厲目大叔」的先人，其生前是怎樣的人物背景，多年來亦常令我深感好奇！


    直至去年我終向母親打聽到……有關這位幾年前才過身的三姑資料及那位亡夫生平。原來這位大叔生前是一名在上環經營米行的傳統潮州商人，而三姑則是一名剛從鄉間來港打工的中年婦女，並帶著因戰亂而失去生父的大兒子。緣由這潮籍商人深感髮妻早亡又膝下無兒，看見三姑同是新寡而眼見她的兒子又長得伶俐，再加上認為三姑面相是屬於那種「宜男相」格局……必生貴子，因此就續絀將其納為繼室。可是在過了一段安定日子後，萬沒想到好景不長！就在三姑懷孕期間，某天這米行商人卻突然心臟病發暴亡！未幾那些男家的長老親屬，卻趁機將米行及其他產業統統奪去，還將這些孤兒寡婦一併轟走！可憐三姑帶著大兒子和後來出生的遺腹子，過了多年艱辛歲月後，才獲編配至牛下安居。


    在我聽罷母親向我述說的這些陳年往事後，當下我才意識到……當年常遭這位「厲目大叔」無故怨懟的原因為啥？可能是不捨他一生最珍視的白米又落在外人手上！這刻亦令我猜想到……這先人多年來還對塵世這麼依戀的另一原因……莫非是要看望著唯一的親兒子康健成長？還有三姑早年是一位傳統的燒香拜拜婦人，但多年後卻改作基督徒；主因是深感拜拜多年，家中常感陰靈騷擾……因大兒子婚後其妻常有家中意外；及後更多次流產，某次還險些兒送命！相反小兒子卻情路幾回坎坷，終日借酒消愁！其實在我心中明白，多年來他們一家所發生過的某些意外事端，緣由都是出自這位先人對非親生兒子心存芥蒂，可能是出於一種自私的傳統偏見思想吧！


    # 十三座的神秘坊眾


    這是尋常的一個晚上，家中各人早就寢，只餘母親和我還在忙著父親的宵夜。總括而言我對踏入晚間時段的牛下總帶幾分警覺！一來此屋村的人口和治安開始變得複雜，二來某些經常盤踞在十三座公共大廳的神秘坊眾還是經常出現。


    因此我總害怕晚間到這位置前的垃圾房傾倒垃圾，每次都會速來速往絕不多加回望。直至某日姊姊暗中透露某晚曾生惡夢，夢見這位置竟是鄉間祠堂，供奉著一排排的神主牌……於是我將多年所見與之透露，因此我們姊妹間暗自警惕，盡量迴避這生人勿近的鬼地方！


    這夜在差不多煮好宵夜時父親剛好回家，在我正想開門之際；姊姊卻突然從上格床中起來開門，當時我和母親都不以為意，只管在廚房繼續忙亂。可是姊姊卻在開門給父親進來後，她卻逕自赤著腳往家門外一直走去！我對姊姊這突如其來的舉動，當然感到非常詫異！隨即急喚著她快些回來，與此同時，我亦看見那些神秘坊眾，列坐在老地方向其招手和咧笑！那刻我的內心感到非常害怕，但又礙於不便向雙親言明（註：因為靈鬼話題一向是家中禁忌），因此只懂漲紅著眼轉向父母召援！這時正在房中更衣的父親吩咐我只須把姊姊拉回便可，不要在夜深人靜時還在門外喧嚷！可是我對當前景象真的感到相當懼怕和惶恐，眼看姊姊越步越近這神秘異域時；外邊的風也越刮越大，而此刻這批神秘坊眾亦露出陰晦冷峻的笑容！我向父親言明害怕獨自步往，還遭父親埋怨是否門外有鬼會將你強行拉走？這刻我早已被迫嚇得雙眼漲紅，只好直認對當前景象相當懼怕！於是父親只好從房中急跑至姊姊身旁，將其強行拉回！


    正當父親趕至解救姊姊一刻，站在家門前的我正好將此忙亂情景望個正著；只見那批神秘坊眾一看到父親步近時，各人均露出猙獰怒怨的眼神，然後竟徐徐隱沒淡化在迷霧中消失！回家後姊姊卻像對剛才所發生的一切了無知覺，竟一個骨碌重返床上繼續夢鄉！出奇地，父母並沒責備姊姊腳上滿是塵垢，還讓她徐徐安睡。面對這番異象令我百思不得其解之際，父親解釋這可能是日間玩樂太過或是功課壓力，而導至出現夢遊現象，還示意不可將她隨意驚醒，讓其睡至天亮！


    到了第二天我當然第一時間向姊姊查探昨晚的異象，姊姊對我所詢問的一切顯得茫然萬分，而她卻向我訴說著一個跟現實相反的夢境內容……


    夢中到了一個風光明媚和陽光燦爛的沙灘中遊玩，清涼海風徐徐輕送；沙灘上還見到眾多男女向她表示歡迎，及後她還打算步向清澈的海中暢泳的情節……！


    聽罷我真的打從心底裡抹把冷汗，但又好奇一向與靈界絕緣的父親，這晚竟擁有嚇退那批神秘坊眾的能耐？當然這都只能在我的內心暗自疑問！


    直至某日不知父親何來雅興，竟然跟我們閒話家常時向我們透露了一件人生小秘密！父親曾自誇……「平生不作虧心事，夜半敲門也不驚」！就在我們再三好奇詢問他人生中果真沒有污點時，父親才淡然表示過去曾作過一件虧心事……！


    這是十五歲時在鄉間參與土改勞動時，跟隨鄉親族人到山上；將漫山遍野的山墳移平，以求騰出更多耕地作為糧食增長之用。及至清理一個明朝將軍的墓地時，竟發覺將軍屍身居然多年不腐，並在魁梧的胸前伴有一把長長古劍陪葬。父親還說：「從其魁梧身形來看，這將軍生前應是關外人士；並且長年馬上馳騁，因而導至其大腿骨呈半月形彎曲，而那把陪葬古劍更有千斤之重……！」當前這番景象早把眾鄉親嚇至膽顫心驚！正當眾人不知應如何處置之際，父親卻一馬當先自告奮勇地將古屍一把從棺槨中拉出……！父親告知可能當時只是一名十五歲小伙子，正是年青人天不怕地不怕的反叛時期！後來他還命眾鄉人堆來一把大柴火將屍體燒掉後再用作堆肥，只可惜那把古劍亦只當廢鐵般燒溶，自此以後眾鄉親亦對父親的大膽作風傳頌多時！


    往後又隔了一段時日，某天父親跟隨祖父到山上劈斬柴枝時，卻因天色漸晚祖父要他獨個兒留在山上看守柴堆。當晚可說是父親有生以來最惶恐的一晚！只因當年山上時有老虎出沒，還有漆黑的山上整晚傳來眾多不知名的動物叫聲；因此父親整夜根本不能安心入睡，及至天亮時才覺稍為安心，最後終敵不過睡魔悄然睡著……可是在夢中竟突然現出五隻小鬼，強拉其頭首四肢，像要將他五馬分屍般處置！猶幸父親在夢中還懂奮力頑抗，所以才得以脫險從夢中掙扎醒來！


    聽罷，我當時已即時慨嘆：「真可惜，鄉下人不懂珍惜文物，大好古劍卻落在一幫愚鈍鄉人手中。」但父親卻對我續說：「當年鄉間處處鬧著大饑荒，那種慘況連人吃人亦時有出現；正所謂人比鬼更惡，試問又怎會怕那夢中區區的五隻小鬼呢！」哈……這種強頑精神，就是父親年青歲月時的人生哲理！


    ********


    後記：聽罷父親當年的成長實況後，我的內心亦終明白到……何以那次父親，竟可無聲無息地將那批一直盤踞在十三座的神秘坊眾嚇退？可能就是……因為過去父親曾經幹過破山墳、燒古屍的往事……？因此連鬼亦懼其三分呢！


    # 結語。牛下童年


    過去父親曾對我們堅決肯定……世上是沒有鬼魂這回事！更表示這只是意志低迷的人才會相信的現象。但可惜隨著年月的增長，我對這方的感應和發現還是相當敏感！但礙於父母的權威和引導下，我亦對此方現象選以掩耳盜鈴式的鴕鳥政策來面對……以眼花、幻覺來作為對自我解說的答案。實情是內心害怕被標籤為異類，被父母及家人厭棄！如是者，自覺經歷了多年風平浪靜的時光！


    直至初中那年，第一次回鄉省親時，竟看見滿室靈界鄉親！當晚的經歷，令我又再度跌回深沉的迷思中！對過去種種出現在自身的靈異現象，又再重提問號！令封存在內心深處的那段童年夢魘般的困惑，又被重新發掘出土！


    亦從那時開始，感覺有某種背後力量一直導引著我繼續前行……鼓勵著我從新探求生命中的各種靈性內容！


    ## 第二章 通靈現象


    ### 通靈現象·導讀


    這是承接〈牛下童年〉的第二章延續，由一開始記錄初中時第一次回鄉省親時被再度喚醒的通靈現象，直至往後無有間斷的種種奇遇經歷和不可思議發現……


    那些年……在經歷了十多年的人世生活後，我亦逐漸對潛伏在心靈間的通靈感應；視為荒誕不經的幻覺塵想，心底害怕再度觸及和面對！自以為終可告一段落的時候，可是竟又傳來層出不窮的異界感知！


    經過這些特別體驗後，令我終於明白到……每人的生命藍圖各有不同的規劃，有些與生俱來是專注「外在世界」、但有些卻反過來「探索內在」呢！


    ********


    「記憶」是一種很微妙的運作，可將種種快樂或不想回顧的內容分門別類存放著；快樂回憶每時每刻都可從腦際間輕易滲出，藉以滋養生命。相反不快或難抵傷害的印記，卻可從腦際間隱沒封存！但我卻在無意間將這久被遺忘的夢魘記憶，又從腦海中被突然按鍵重現！


    自經歷那趟回鄉「見聞」後，一些早被煙沒遺忘的感受和回憶竟又再慢慢滲出，令我的視野不再單純只放眼人世的片面景象，後來更令我逐漸邁向宗教層面追尋探索。至後來才發現這原來亦是人世藍圖上「規劃課題」的某種試煉！


    及後跟我感情要好的外婆過身，觸發我向靈界提出大膽的請求，使我能親身經歷和見聞這靈界度亡的奇幻，亦藉此機緣令我發現這靈異國度的種種面貌！


    我亦從那刻開始……發覺原來活於世上並不孤單，因為明白到心靈深處存在著某種靈性依歸……令我樂觀探索這精彩世界中各種生命意義！


    ### 第一次回鄉


    想當年對祖國對家鄉的認識真的非常貧乏，印象中這是廣東沿海的某個潮州窮鄉而已。因每次鄉親來信都只是要求財帛或物資的訴求，因此印象中這是一個欠缺吸引的地方。


    可是某年初中中的一個暑假，母親帶著我們首度回鄉省親；這在我們孩子來看可真是一個不討好的活動，但又不能違抗和推卻！還記得初時被母親哄騙誤導……表示這潮州娘家是一個風光明媚的地方，有山有水還有恍如《飄零燕》卡通中的瑞士山區面貌……。由於當年極之嚮往陶醉這動畫內容，聽罷我反而是嚷著要求早日出發的一員呢！


    其實這次回鄉是有其目的和任務，因這年正是父親鄉間祖屋落成的日子。所以祖父的每房子孫均要親至祝賀，只可惜父親正處於創業初期，業務繁重不能貿然前往，因此母親就成了這次任務的帶領者！


    由於當年國內還處於改革開放初期，因此交通配套上非常不足，車程十多小時才能到達父親的家鄉。但此刻我們才驚悉，這村落還是水電供應不足和基建貧乏落後！晚間只餘簡單的火水燈照明，每房床邊更置有馬桶作為解決內急之用，縱觀這些簡陋裝置著實令我們感到非常詫異和不習慣！只可惜已不能回港，只好期望下回到母親娘家作客時，我就可好好欣賞母親所描述如《飄零燕》般的翠綠青蔥的田園景致！在此寄住多日後，好不容易終於捱到往母親家鄉作客的日子。前來接載的只是幾輛臨時租借的三輪車，可是，在半路中途年僅七歲的四妹；卻被車輪夾傷左腳被緊急送至一間簡陋的醫療站治理，由於妹妹的傷勢看來頗令人擔心關係！因此本來滿有期待的心情頓然失卻，而我們亦漸察覺沿途的風景、氣氛全不是母親口中所描述的那回事，已令我們感到失望和無奈！但無可否應母親的家鄉著實比較先進些，起碼每家每戶都有簡單的電力供應，而且在村口位置亦建有某些供村民聚集的廣場和籃球場，可是這亦不足以媲美《飄零燕》中那瑞士鄉村景致呢！


    還記得這天因四妹的腳傷關係，我們延至很晚才到達；母家的鄉親鄰里早已齊集在村口相迎，當然還有過多月前從香港出發在此會合的外婆。由於母親當年離鄉時的年紀還小，因此我們被熱情的鄉親簇擁著帶至鄉間三舅家。到達後才發現這是一間共住了四組來自不同家庭的舊平房，前半部分兩戶人家更將居室用作兼製鞭炮的小工場；而舅家雖佔住後排整個部分，可是亦在中庭位置圈養著不少豬隻和家禽。環顧這紛雜和帶點異味的環境和布局，整體而言果真令我們的心情失落至冰點，有被騙上賊船的感覺！


    潮州人是一個對傳統文化極為尊重和保守的一群，因此我們首先被要求的事項……便是向祖先神位上香及叩拜，只見供桌上早已放滿豐富多樣的祭品，當中還有我們從香港遠道帶來的日本即食麵。而當晚由於前來相迎的鄉親實在太多，因此我們被折騰至很晚才可就寢。由於舅家地方有限，因此我們一行六人被安置在表哥的房間內休息，而表哥則暫往同學家中借宿。而我、大姊及外婆共睡在一張面向房門的臨時板床上，母親和兩名妹妹則睡在另一張床。其實我在當晚較早時段，早已感到有些發燒不適，但念及母親要照顧腳傷的四妹而不敢提出！


    可是當睡至深宵時分漸覺體溫上升，並感到頭昏腦脹的不適感加劇，於是只好獨個兒步出房間飲水降溫。由於鄉間房屋的門全是中式古老兩扇的扣門設計，因此在開關上會很嘈吵和笨重；有見及此所以宅內房門多數只是虛掩著，只因不想造成嘈音但卻出現一條粗大的門縫。可是由於不適的感覺漸趨嚴重，所以回房間後我並不能安然入睡，只期望明早尋找醫生治理！'
  mdcn: '多番照護和導引才能平安成長！地主伯伯和地主婆婆是我童年時的慈祥守護者，直至現在我還是對他們充滿懷念和感恩呢！


    # 鄰居三姑的白飯


    這經歷是發生在小四那年的一個炎夏，那時我們已是六口之家……跟我最投緣的四妹出生了！可是家中經濟還是捉襟見肘，所以每年夏天的午飯時段多數以白粥作為主食，再配以簡單的鹹菜豆芽。母親說這樣既可減輕家中的開銷負擔，又可滋養腸胃。可是當年的我果真年少無知，並不了解母親操持家計之苦況，常對午飯總是吃粥感到抱怨。初期我還可跟隨各人一同飲食，可是到後來我著實感到難以接受，因此寧願餓著空肚子也不願跟隨！


    我這種行為當然惹來母親棒喝打罵，但母親眼看我在打罵過後態度還是這麼堅決時，她只好硬著頭皮致電住在十三座的同鄉長輩「三姑」那兒商借一碗白飯。由於三姑嬸嬸每天都會備有新鮮熱飯，供其正攻讀預科的么兒子放學後回家享用，而且我們又是同鄉關係感情當然比其他鄰里熟絡，故此母親才放心讓我到其家中添飯。但臨行前母親還是特意的告誡我要有禮貌，到長輩家裡時要主動向人家問好！於是我滿心歡喜地拿著飯碗到三姑嬸嬸那兒叩門，到步後我發覺原來三姑早把家門虛掩，好讓我能直接進來逕自步往廚房。但當大門鐵閘打開後我卻發現其家中的客廳長木椅上，坐著一位身穿棕黑色唐裝衫褲的中年大叔，那位面容和態度極為嚴肅的中年大叔骨架相當魁梧；看樣子像是舊式城鄉人物，在我看來他對我的出現好像帶些不滿，而且我還發現當我打算步近經過時，這位大叔更即時對我瞪目怒視呢！


    舊式屋村間隔多數在近大門側設置房間，還會在房門口掛上布簾遮擋。但由於大叔所處的位置是房間與客廳之間的必經通道，故此我必須禮貌地請求他讓路才可前行！但當時我的內心著實對這大叔深感懼怕，只在心靈間嘀咕著應以怎樣言詞請其讓路！這時早在廚房準備為我添飯的三姑，眼看我站在廳房通道前還不進來感到相當奇怪，因此她帶笑打趣地說：「這兒並沒有養狗，不會放狗咬你，大可放心進來不要再站在房門邊嬉戲！」眼看三姑再三催促但身旁大叔又不願讓路的困窘處境下，令我一時間忘卻了母親臨行前的吩咐……到別人家要懂得向長輩問好的教導！我只有躡足屏息的依在房門邊挨靠著木板牆前行，盡量希望不要打擾這位厲色怒目的擋架大叔！


    正當打算步向廚房方向時，我才發現其廳中的神櫃前置有整桌的食物祭品，心忖原來三姑正在上香拜神……！及後三姑親切地在我帶來的碗內壓上厚厚熱飯，她還著我如吃過後感到回味可以再來添取！正當我滿心喜悅地捧著熱飯打算打道回府之際，轉身卻看見剛才那位擋路大叔已從座位上移開，並寬步叉腰的站在不遠位置對我更為怒瞪！面對這樣的窘局我的內心更為懼怕，只懂低頭急竄迅步的奔跑回家！回家後我才覺釋懷，正當打算享用手上熱飯之際，母親著急的查問我有否向三姑說出我們每天午飯都只是吃白粥的真相！只因母親早前致電時所持的理由是……剛巧吃光飯鍋內的白飯，但又趕不及來為一碗半碗米飯重新下鍋……！因母親害怕被人家看穿我們家中開銷緊絀的實況！後來母親眼看我拿了人家這麼大碗的熱飯，心想到了三姑兒子放學回家後，豈不要勞煩人家再煮？於是我將剛才所見向母親說：「三姑今天家裡拜神，桌上放滿各種美食，有燒鵝、燒肉……而且她家中更有客人到訪，所以我看見她家中的飯鍋，還有半鍋熱飯呢！」


    當母親聽到三姑家裡今天來了訪客和正在拜神時，即時查問我面對長輩有沒有主動打招呼和問好？我面有難色的坦言只因這位客人樣子實在太惡，所以令我膽怯不敢跟其問好的事實！母親聽罷即時怪責我怎能如斯失禮，但同時亦奇怪何以彼此同鄉理應所有習俗和拜神日子一盡相同！會否是她一時大意忘卻而疏漏了某些祭祀呢？（註：因傳統潮州人普遍偏向迷信，對一切鄉間所定的祭祀和習俗定必盡量跟隨。）於是母親隨即致電三姑先來報上感謝熱飯的給予，然後就詢問今天是甚麼的拜神日子？還詢問是否有同鄉親友到來探訪？


    只見母親在聽罷原因後就平靜地將電話聽筒放下，並敦促我快些吃飯，然後應馬上做功課，最後更叮囑我不要養成講大話的習慣！我順從的應了一聲後，就大口大口的吃著甘甜的熱飯了。接著在往後多天，三姑都親切主動的來電喚我到其家中添飯，於是我又拿著家中飯碗迎接我的熱飯！可是這回我又看見當天的大叔，獨自一人坐在暗黑的房間某角；我原本打算這次會鼓起勇氣跟他打招呼，可是當被他雷厲的眼神再次瞄著時，著實令我感到膽怯！因此我每次都選擇快步的低頭掠過，只想快快添飯後快步的趕回家去。還有當嚐過這些白飯後，我們姊妹間都認為三姑家中的白飯果真與眾不同，後來母親告知三姑家中的白米還是她親自混合的配方！


    又一回中午，三姑來電表示家中剛買來雪櫃並著我們前來觀看（註：雪櫃在當年並不是每家都可擁有的家庭電器）。我和母親當然第一時間趕至其家中觀賞這新產品⋯⋯現在回想真可笑！眼看這電器可製出各種冰品和冷飲，當然令我們十分羨慕！就在長輩間互相閒聊的時候，我無意間發現三姑家中神櫃上，竟放著當天在其家中作客的厲目大叔的相片！我即時告知母親那天我並沒有講大話，當天的客人正是這位相中人時，剎那間本來熱鬧的氣氛頓時變得死寂！母親即時喝罵我不可胡謅甚麼鬼話！於是我將拜神當日，這位大叔所處位置和當時的動作再描述一次，母親即時拉趕著我一同回家！而三姑亦煞有介事地表示要到菜市場補買東西，瞬間竟各自急步離開。


    及後某晚夢中，那位厲目大叔對我多次到三姑家中添飯表示極為不滿；他不斷重複的恐嚇著我並表示如有再犯必定前來算帳！而當晚我早被這夢境驚嚇出病來，因此任憑三姑往後怎樣誠意邀請，我也不敢再貪吃美味的熱飯了！


    ********


    後記：現在回想當年的傻勁果真不少，小時候並不知道原來放在神櫃上的照片是逝去先人的遺照，只因當年大多數的照片都是黑白關係。還有過去亦曾好奇向父母詢問鄰居那些放在神櫃上的照片用意？父親在思索一會後表示，這代表是家中最受尊敬的人。可笑是某次我們孩子間趁母親午睡時段，在提議玩拜神賞月模仿遊戲時，竟將父親的照片也放在神櫃上，玩著膜拜的遊戲；因為在我們心靈間，父親當然是家中最受尊敬的人物！


    至於當年在三姑家中所意會的拜神事件，原來那日是三姑亡夫的忌辰，故此桌上豐富的食物是供先人享用的祭品！現在回想，怪不知在我剛進三姑家門時，那厲目大叔正坐在神櫃前那桌祭品旁的木長椅上。


    另外，從小認識三姑只知這是三口子家庭（母親和兩名兒子），但其兄弟間的年齡差距卻有七八年以上。在我讀小四當年，大兒子早已出來工作，而小兒子卻仍攻讀預科。至於那位我稱為「厲目大叔」的先人，其生前是怎樣的人物背景，多年來亦常令我深感好奇！


    直至去年我終向母親打聽到……有關這位幾年前才過身的三姑資料及那位亡夫生平。原來這位大叔生前是一名在上環經營米行的傳統潮州商人，而三姑則是一名剛從鄉間來港打工的中年婦女，並帶著因戰亂而失去生父的大兒子。緣由這潮籍商人深感髮妻早亡又膝下無兒，看見三姑同是新寡而眼見她的兒子又長得伶俐，再加上認為三姑面相是屬於那種「宜男相」格局……必生貴子，因此就續絀將其納為繼室。可是在過了一段安定日子後，萬沒想到好景不長！就在三姑懷孕期間，某天這米行商人卻突然心臟病發暴亡！未幾那些男家的長老親屬，卻趁機將米行及其他產業統統奪去，還將這些孤兒寡婦一併轟走！可憐三姑帶著大兒子和後來出生的遺腹子，過了多年艱辛歲月後，才獲編配至牛下安居。


    在我聽罷母親向我述說的這些陳年往事後，當下我才意識到……當年常遭這位「厲目大叔」無故怨懟的原因為啥？可能是不捨他一生最珍視的白米又落在外人手上！這刻亦令我猜想到……這先人多年來還對塵世這麼依戀的另一原因……莫非是要看望著唯一的親兒子康健成長？還有三姑早年是一位傳統的燒香拜拜婦人，但多年後卻改作基督徒；主因是深感拜拜多年，家中常感陰靈騷擾……因大兒子婚後其妻常有家中意外；及後更多次流產，某次還險些兒送命！相反小兒子卻情路幾回坎坷，終日借酒消愁！其實在我心中明白，多年來他們一家所發生過的某些意外事端，緣由都是出自這位先人對非親生兒子心存芥蒂，可能是出於一種自私的傳統偏見思想吧！


    # 十三座的神秘坊眾


    這是尋常的一個晚上，家中各人早就寢，只餘母親和我還在忙著父親的宵夜。總括而言我對踏入晚間時段的牛下總帶幾分警覺！一來此屋村的人口和治安開始變得複雜，二來某些經常盤踞在十三座公共大廳的神秘坊眾還是經常出現。


    因此我總害怕晚間到這位置前的垃圾房傾倒垃圾，每次都會速來速往絕不多加回望。直至某日姊姊暗中透露某晚曾生惡夢，夢見這位置竟是鄉間祠堂，供奉著一排排的神主牌……於是我將多年所見與之透露，因此我們姊妹間暗自警惕，盡量迴避這生人勿近的鬼地方！


    這夜在差不多煮好宵夜時父親剛好回家，在我正想開門之際；姊姊卻突然從上格床中起來開門，當時我和母親都不以為意，只管在廚房繼續忙亂。可是姊姊卻在開門給父親進來後，她卻逕自赤著腳往家門外一直走去！我對姊姊這突如其來的舉動，當然感到非常詫異！隨即急喚著她快些回來，與此同時，我亦看見那些神秘坊眾，列坐在老地方向其招手和咧笑！那刻我的內心感到非常害怕，但又礙於不便向雙親言明（註：因為靈鬼話題一向是家中禁忌），因此只懂漲紅著眼轉向父母召援！這時正在房中更衣的父親吩咐我只須把姊姊拉回便可，不要在夜深人靜時還在門外喧嚷！可是我對當前景象真的感到相當懼怕和惶恐，眼看姊姊越步越近這神秘異域時；外邊的風也越刮越大，而此刻這批神秘坊眾亦露出陰晦冷峻的笑容！我向父親言明害怕獨自步往，還遭父親埋怨是否門外有鬼會將你強行拉走？這刻我早已被迫嚇得雙眼漲紅，只好直認對當前景象相當懼怕！於是父親只好從房中急跑至姊姊身旁，將其強行拉回！


    正當父親趕至解救姊姊一刻，站在家門前的我正好將此忙亂情景望個正著；只見那批神秘坊眾一看到父親步近時，各人均露出猙獰怒怨的眼神，然後竟徐徐隱沒淡化在迷霧中消失！回家後姊姊卻像對剛才所發生的一切了無知覺，竟一個骨碌重返床上繼續夢鄉！出奇地，父母並沒責備姊姊腳上滿是塵垢，還讓她徐徐安睡。面對這番異象令我百思不得其解之際，父親解釋這可能是日間玩樂太過或是功課壓力，而導至出現夢遊現象，還示意不可將她隨意驚醒，讓其睡至天亮！


    到了第二天我當然第一時間向姊姊查探昨晚的異象，姊姊對我所詢問的一切顯得茫然萬分，而她卻向我訴說著一個跟現實相反的夢境內容……


    夢中到了一個風光明媚和陽光燦爛的沙灘中遊玩，清涼海風徐徐輕送；沙灘上還見到眾多男女向她表示歡迎，及後她還打算步向清澈的海中暢泳的情節……！


    聽罷我真的打從心底裡抹把冷汗，但又好奇一向與靈界絕緣的父親，這晚竟擁有嚇退那批神秘坊眾的能耐？當然這都只能在我的內心暗自疑問！


    直至某日不知父親何來雅興，竟然跟我們閒話家常時向我們透露了一件人生小秘密！父親曾自誇……「平生不作虧心事，夜半敲門也不驚」！就在我們再三好奇詢問他人生中果真沒有污點時，父親才淡然表示過去曾作過一件虧心事……！


    這是十五歲時在鄉間參與土改勞動時，跟隨鄉親族人到山上；將漫山遍野的山墳移平，以求騰出更多耕地作為糧食增長之用。及至清理一個明朝將軍的墓地時，竟發覺將軍屍身居然多年不腐，並在魁梧的胸前伴有一把長長古劍陪葬。父親還說：「從其魁梧身形來看，這將軍生前應是關外人士；並且長年馬上馳騁，因而導至其大腿骨呈半月形彎曲，而那把陪葬古劍更有千斤之重……！」當前這番景象早把眾鄉親嚇至膽顫心驚！正當眾人不知應如何處置之際，父親卻一馬當先自告奮勇地將古屍一把從棺槨中拉出……！父親告知可能當時只是一名十五歲小伙子，正是年青人天不怕地不怕的反叛時期！後來他還命眾鄉人堆來一把大柴火將屍體燒掉後再用作堆肥，只可惜那把古劍亦只當廢鐵般燒溶，自此以後眾鄉親亦對父親的大膽作風傳頌多時！


    往後又隔了一段時日，某天父親跟隨祖父到山上劈斬柴枝時，卻因天色漸晚祖父要他獨個兒留在山上看守柴堆。當晚可說是父親有生以來最惶恐的一晚！只因當年山上時有老虎出沒，還有漆黑的山上整晚傳來眾多不知名的動物叫聲；因此父親整夜根本不能安心入睡，及至天亮時才覺稍為安心，最後終敵不過睡魔悄然睡著……可是在夢中竟突然現出五隻小鬼，強拉其頭首四肢，像要將他五馬分屍般處置！猶幸父親在夢中還懂奮力頑抗，所以才得以脫險從夢中掙扎醒來！


    聽罷，我當時已即時慨嘆：「真可惜，鄉下人不懂珍惜文物，大好古劍卻落在一幫愚鈍鄉人手中。」但父親卻對我續說：「當年鄉間處處鬧著大饑荒，那種慘況連人吃人亦時有出現；正所謂人比鬼更惡，試問又怎會怕那夢中區區的五隻小鬼呢！」哈……這種強頑精神，就是父親年青歲月時的人生哲理！


    ********


    後記：聽罷父親當年的成長實況後，我的內心亦終明白到……何以那次父親，竟可無聲無息地將那批一直盤踞在十三座的神秘坊眾嚇退？可能就是……因為過去父親曾經幹過破山墳、燒古屍的往事……？因此連鬼亦懼其三分呢！


    # 結語。牛下童年


    過去父親曾對我們堅決肯定……世上是沒有鬼魂這回事！更表示這只是意志低迷的人才會相信的現象。但可惜隨著年月的增長，我對這方的感應和發現還是相當敏感！但礙於父母的權威和引導下，我亦對此方現象選以掩耳盜鈴式的鴕鳥政策來面對……以眼花、幻覺來作為對自我解說的答案。實情是內心害怕被標籤為異類，被父母及家人厭棄！如是者，自覺經歷了多年風平浪靜的時光！


    直至初中那年，第一次回鄉省親時，竟看見滿室靈界鄉親！當晚的經歷，令我又再度跌回深沉的迷思中！對過去種種出現在自身的靈異現象，又再重提問號！令封存在內心深處的那段童年夢魘般的困惑，又被重新發掘出土！


    亦從那時開始，感覺有某種背後力量一直導引著我繼續前行……鼓勵著我從新探求生命中的各種靈性內容！


    ## 第二章 通靈現象


    ### 通靈現象·導讀


    這是承接〈牛下童年〉的第二章延續，由一開始記錄初中時第一次回鄉省親時被再度喚醒的通靈現象，直至往後無有間斷的種種奇遇經歷和不可思議發現……


    那些年……在經歷了十多年的人世生活後，我亦逐漸對潛伏在心靈間的通靈感應；視為荒誕不經的幻覺塵想，心底害怕再度觸及和面對！自以為終可告一段落的時候，可是竟又傳來層出不窮的異界感知！


    經過這些特別體驗後，令我終於明白到……每人的生命藍圖各有不同的規劃，有些與生俱來是專注「外在世界」、但有些卻反過來「探索內在」呢！


    ********


    「記憶」是一種很微妙的運作，可將種種快樂或不想回顧的內容分門別類存放著；快樂回憶每時每刻都可從腦際間輕易滲出，藉以滋養生命。相反不快或難抵傷害的印記，卻可從腦際間隱沒封存！但我卻在無意間將這久被遺忘的夢魘記憶，又從腦海中被突然按鍵重現！


    自經歷那趟回鄉「見聞」後，一些早被煙沒遺忘的感受和回憶竟又再慢慢滲出，令我的視野不再單純只放眼人世的片面景象，後來更令我逐漸邁向宗教層面追尋探索。至後來才發現這原來亦是人世藍圖上「規劃課題」的某種試煉！


    及後跟我感情要好的外婆過身，觸發我向靈界提出大膽的請求，使我能親身經歷和見聞這靈界度亡的奇幻，亦藉此機緣令我發現這靈異國度的種種面貌！


    我亦從那刻開始……發覺原來活於世上並不孤單，因為明白到心靈深處存在著某種靈性依歸……令我樂觀探索這精彩世界中各種生命意義！


    ### 第一次回鄉


    想當年對祖國對家鄉的認識真的非常貧乏，印象中這是廣東沿海的某個潮州窮鄉而已。因每次鄉親來信都只是要求財帛或物資的訴求，因此印象中這是一個欠缺吸引的地方。


    可是某年初中中的一個暑假，母親帶著我們首度回鄉省親；這在我們孩子來看可真是一個不討好的活動，但又不能違抗和推卻！還記得初時被母親哄騙誤導……表示這潮州娘家是一個風光明媚的地方，有山有水還有恍如《飄零燕》卡通中的瑞士山區面貌……。由於當年極之嚮往陶醉這動畫內容，聽罷我反而是嚷著要求早日出發的一員呢！


    其實這次回鄉是有其目的和任務，因這年正是父親鄉間祖屋落成的日子。所以祖父的每房子孫均要親至祝賀，只可惜父親正處於創業初期，業務繁重不能貿然前往，因此母親就成了這次任務的帶領者！


    由於當年國內還處於改革開放初期，因此交通配套上非常不足，車程十多小時才能到達父親的家鄉。但此刻我們才驚悉，這村落還是水電供應不足和基建貧乏落後！晚間只餘簡單的火水燈照明，每房床邊更置有馬桶作為解決內急之用，縱觀這些簡陋裝置著實令我們感到非常詫異和不習慣！只可惜已不能回港，只好期望下回到母親娘家作客時，我就可好好欣賞母親所描述如《飄零燕》般的翠綠青蔥的田園景致！在此寄住多日後，好不容易終於捱到往母親家鄉作客的日子。前來接載的只是幾輛臨時租借的三輪車，可是，在半路中途年僅七歲的四妹；卻被車輪夾傷左腳被緊急送至一間簡陋的醫療站治理，由於妹妹的傷勢看來頗令人擔心關係！因此本來滿有期待的心情頓然失卻，而我們亦漸察覺沿途的風景、氣氛全不是母親口中所描述的那回事，已令我們感到失望和無奈！但無可否應母親的家鄉著實比較先進些，起碼每家每戶都有簡單的電力供應，而且在村口位置亦建有某些供村民聚集的廣場和籃球場，可是這亦不足以媲美《飄零燕》中那瑞士鄉村景致呢！


    還記得這天因四妹的腳傷關係，我們延至很晚才到達；母家的鄉親鄰里早已齊集在村口相迎，當然還有過多月前從香港出發在此會合的外婆。由於母親當年離鄉時的年紀還小，因此我們被熱情的鄉親簇擁著帶至鄉間三舅家。到達後才發現這是一間共住了四組來自不同家庭的舊平房，前半部分兩戶人家更將居室用作兼製鞭炮的小工場；而舅家雖佔住後排整個部分，可是亦在中庭位置圈養著不少豬隻和家禽。環顧這紛雜和帶點異味的環境和布局，整體而言果真令我們的心情失落至冰點，有被騙上賊船的感覺！


    潮州人是一個對傳統文化極為尊重和保守的一群，因此我們首先被要求的事項……便是向祖先神位上香及叩拜，只見供桌上早已放滿豐富多樣的祭品，當中還有我們從香港遠道帶來的日本即食麵。而當晚由於前來相迎的鄉親實在太多，因此我們被折騰至很晚才可就寢。由於舅家地方有限，因此我們一行六人被安置在表哥的房間內休息，而表哥則暫往同學家中借宿。而我、大姊及外婆共睡在一張面向房門的臨時板床上，母親和兩名妹妹則睡在另一張床。其實我在當晚較早時段，早已感到有些發燒不適，但念及母親要照顧腳傷的四妹而不敢提出！


    可是當睡至深宵時分漸覺體溫上升，並感到頭昏腦脹的不適感加劇，於是只好獨個兒步出房間飲水降溫。由於鄉間房屋的門全是中式古老兩扇的扣門設計，因此在開關上會很嘈吵和笨重；有見及此所以宅內房門多數只是虛掩著，只因不想造成嘈音但卻出現一條粗大的門縫。可是由於不適的感覺漸趨嚴重，所以回房間後我並不能安然入睡，只期望明早尋找醫生治理！'
