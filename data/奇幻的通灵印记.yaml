    ## 第一章：牛下童年


    ### 觀塘外婆的家


    小時候跟外婆相處的機會比較多，雖然我們並不是住在同一地區，但外婆總會隔些日子應母親要求到我家留宿，而我們亦會不時到其位於觀塘的家中探訪。但每次到外婆家時，我總會發現某些神情和外貌古怪的陌生人，經常出現其中！早期礙於年紀小不懂表達，只是好奇為何外婆家的門窗後，常會躲著某些總是帶著陰沉寒慄感覺的陌生人！


    回顧這故事前，先來簡介一下外婆居所內外的某些布局環境。外婆與三舅同住在觀塘崇仁街某唐樓低層單位，當年這方一帶只開發了前排街道，而後方一帶還是無路通往的漆黑山野。這是一棟沒有升降機設備的戰後唐樓，而當年某些住戶；總會在窗外加建鳥籠式平台，以增可用空間。故此外婆家，亦加建了一道圍繞在整個單位外牆，呈
    L 形的鳥籠大平台。而我和姐姐，亦一同就讀位於外婆家樓下的一所學校（前文曾提及）。


    外婆家中陳設著很多不同的家居飾品和舊物，大多都是別人送贈，由於老人家持來者不拒的心態來接收，慢慢地把本來明亮的睡房和門廊，堆得幽暗狹隘！由於從大門步入可直望到外婆睡房內的窗口，故此我每次進屋；總會看見這窗外的鳥籠平台上，經常躲著一外貌灰沉、神態厄異古怪的中年女人。後來由於發現的次數著實太多，令我對這陌生人的存在也充滿疑惑，曾向姊姊詢問何解有些人；總愛躲於大門及窗後位置，兼且默不作聲的偷望？他們到底在玩著甚麼遊戲？由於姊姊跟我只差一歲，故此她的小腦袋在思索了一會後；馬上猜想到，這可能是玩「捉迷藏」的遊戲模式。還告知她在校內曾和同學亦玩過此遊戲幾回！自此我漸對那些常躲在門窗暗角的陌生人，意會為……「這些人一定又是在玩捉迷藏了」！


    又一回我們小孩無意間發現外婆睡房門後那堆舊物中，有一頂用舊報紙裹著的英式禮帽，我和姊姊立即聯想到這定是會變出白兔的魔術師帽！因此我們立刻拿出來爭相試戴和把玩，期間姊姊更一手把我按坐在帽上，還戲說要將我由帽中變走。可是外婆對我倆這般胡鬧深感不悅！更立刻奪回，並告知……這禮帽是某位遠親的女兒所送贈，還表示這是那名遠親父親的心愛舊物，更是當年在英國打工時所買來的外國貨。


    其實在我們孩子間鬧哄哄在房門後爭相把玩禮帽的同時，我是看見一個恍似早期「黑人牙膏」包裝上，那咧嘴男人圖樣的老頭站於門後！此是一身黑色西洋燕尾禮服，瘦骨嶙峋和皮膚黝黑的怪老頭。由於當時我早被這頂魔術師帽所吸引，因此我對躲在門後這怪老頭只意會為⋯⋯可能他跟躲在窗外的怪女人正玩著捉迷藏！但說來奇怪的是⋯⋯每次到外婆家留宿或午睡後，我們孩子間總會遇到或多或少的不適或發燒生病，而我往往是不適感最嚴重的那位！及後父母親認為，這可能是小孩對陌生環境不適應，或日間玩得太熱烈的正常反應。


    還記得當年母親因忙於照料初生的妹妹，曾把我寄住在外婆家個多星期，況且我所就讀的幼稚園是座落在外婆的住宅樓下。在這段日子中外婆總為我製作喜愛的食品，更會買來父母嚴禁多吃的汽水和雪糕，因此我就算發現她家中；常出現某些怪客或奇怪生物，亦不太理會。直至某天晚上，我、外婆和間中回家留宿的三舅父一起看完《歡樂今宵》後關燈就寢，但不久大門廊外的後樓梯；突然傳來一男子呼叫「救命」的聲音，可是同樓的其他住戶，卻迅速地各自關上鐵閘內的木門和燈光！而外婆亦不斷的哄著我，不要理會只須趕快入睡！但奇怪地⋯⋯我卻感到頭顱內的前額位置的腦海中，竟浮現出一個鮮明畫面⋯⋯看見一個男人從後樓梯回家時，被一早躲在暗角的吸毒歹徒從後跟蹤行劫；男人被搶劫財物後，還遭對方狂刺多刀後負傷求救的情節……！呼叫聲過後門廊內外氣氛沉寂，不久街外就傳來警車與救護車輛由遠而至的響號聲，更從窗外映入紅藍閃曳的轉動燈影，這時各樓層的住戶才敢攀近窗邊探頭外望。由於這晚所發生的一切，著實令這小區街坊感到相當沉重和不安，所以到了清晨附近各坊眾和商戶都在暗自談論著。後來從長輩的話語中了解到……這晚劫案中的男子最後因失血過多失救而亡，而當晚持刀搶劫的元凶果真是一名癮君子。


    還有說來奇怪的是，自此命案發生後一段冗長時間，這後樓梯的電燈就經常無故的短路失靈，故此往後此段位置亦經常變成漆黑一片，漸漸地各住戶都不再使用此段後排樓梯出入，及後年月還堵塞著不少垃圾與雜物。


    *********


    後記：至於外婆家中時常出現這些不速之客的現象，經過往後另一次經歷後，我才了知到這是某種現象內容。至於這棟大廈在多年前曾發生過一次造成人命傷亡的火災，再加上這類大廈設施已顯得落後和陳舊，故此早已不復童年時那種光潔環境！


    ### 廣華醫院


    這經歷的開端對現在的我來說已有些模糊，只依稀記得自經歷那次床頭婆婆事件而病了一場後，我的體質變得比較孱弱。有一回適逢觀塘區舉辦，潮州人最為看重的；一連三天盂蘭盆會祭祀，於是我們舉家遷往外婆的家中幫忙和留宿。由於母親和外婆都非常喜愛觀看，當中現場演出的潮語神功戲；因此在最後一晚的通宵戲，她們已早早安排我們孩子上床就寢以方便她們前往。


    但當睡至深宵某時段，在半夢半醒間我卻突然被一個從房間某角閃出的黑影所驚醒，我即時護著睡在床尾的妹妹，只見那黑影隨即閃回某角消失！未幾我卻在夢中被一個異常陰深的黑衣老人扼著頸項和唬嚇怒哮……幾經掙扎方從夢中醒來並哭喪著急喚母親！幸運地剛巧母親回家並聽到房間傳來我的呼救聲，於是立刻衝進房間給我安慰。但此刻我只懂不停的哭嚷著……害怕！雙手更緊緊地抱著母親並在其懷中不斷抖震！只因當下的我……感覺圍繞在身上的那團「精神能量」像被瞬間抽掉潰散一樣，恍如一顆耗盡能源的泄氣電池！母親從我驚駭的神情中，看出我定是在夢中被某種東西所嚇煞著；於是她立即向著虛空中比劃出一個斬劈手勢，並大聲怒斥：「斬……斬死一切妖魔鬼怪……！」


    可是自這天後，我總會在黃昏至晚間時段；無原故的發高熱，隨著日子過去我在日間的表現總是昏瞶落魄；可惜父親只懂埋怨母親照顧不周，令本來捉襟見肘的家用又為著孩子生病而多花！眼看父母親為著我的患病問題而終日吵架，我的內心亦對自己的不濟，而感到無比不安和難受！即使就診了一段日子，我的健康情況也沒有好轉，而我總會在黃昏過後；看到一眾猙獰和不懷好意的傢伙，聚結在四周的天花與門牆角落，對我譏笑或嚇唬。直至某個星期天，父母親特意帶我們飲早茶後，就把妹妹暫交鄰居託管。最意外的是，母親在茶樓門外的攤檔，買來一件鐵皮玩具給我。這是一輛上發條後，可行走的賣雪糕單車玩具。可是姊姊對母親突然給我買來簇新玩具，顯得有些醋意！只因她自覺是家中長女，給我所享用的衣物玩具，都應該由她佔先，而父親亦對母親的花錢舉動略帶微言！


    及後我們乘車到達一個當時我並不知道是哪兒的地點，未幾有位親切和藹的白衣姐姐帶我到一個光潔的地方洗澡和換上一套全白衣裳；還記得我當時竟天真地詢問現在又不是過新年，何解會突然為我準備新衣裳呢？白衣姐姐笑說：因你是聽父母話的好孩子，所以我們特意送你新衣和寫有你姓名的新手帶……說罷還著我趕快展示給父母看看。接著我被帶進一個寄住著眾多小孩和睡床式樣一致的房間，我傻乎乎的聽從指示，走到父母跟前展示著這新造型。只見父親對早已漲紅了雙眼的母親耳語一番後，就帶同姊姊離去。而我立刻趕上前拖著母親的手，亦打算跟隨！但母親向我表示要先行回家餵妹妹喝奶，著我好好午睡後就會回來接我歸家。此時另一位白衣姐姐帶我到達一張床邊安頓……這是一張兩邊連有掛軸欄柵的白鐵床。接著母親把剛買來的玩具和一些衣物水果，放入床邊的小木櫃內。此刻我對自己竟擁有一張私人睡床和小木傢俱，感到意外萬分；但又為著要跟媽媽暫別感到傷心難過！最後她們只有半哄帶騙的把我留置在這陌生的地方，亦在這晚一件令我永世難忘的驚駭事件發生！


    在我午睡過後也不見母親蹤影，所以又為此而哭了一場！可是我隨即被另一位白衣姐姐嚴斥一番後只勉強吃過一點晚飯，她們又再哄說只因現已夜深所有車輛早已停駛，所以我的母親要到明天才可前來接我歸家……還說好孩子應早睡早起和聽話等……聽罷我只有乖乖的跟從指示，一心期盼明早快來可跟母親團聚！


    就在這晚正當睡至深宵某個時段，窗外突然刮起一陣寒風和傳來人聲嘶吼的尖聲；我隨即起床卻看見對面那列大窗外的灌木叢中，竟突然閃現出眾多目露凶光的猙獰坊眾！這眾多深宵闖進來的中老年男女坊眾，均是穿著舊時那薄衣粗布的中式服裝；他們怒闖進來後隨即閃至床邊並附伏在各睡著的小孩旁，肆意地吸嗦著小孩身上的那團光感能量……「精神氣」。此刻除了我之外，但見還有二三小孩都被這批突然闖至的陌生人所驚醒，而啼哭不止！當然亦有不知就裡還在懵然安睡的孩子。現還記得那時我對這批「不速之客」竟意會為長輩口中所說的「拐子佬」和「鴉烏婆」……臆猜定是要來捉拿那些晚間不睡覺和不聽話孩子！當中最深刻的是那雙眼亮著厲白螢光的嬸嬸正想撲至我的床邊時，在極度惶恐的本能反應下我只懂力竭聲嘶的哀求這「鴉烏婆嬸嬸」……不要靠近！更試圖拉開圍在鐵床兩旁的欄柵逃走，可惜因力氣不濟只能無助地退縮在床角邊緣絕望驚泣！此刻房間內的啼哭聲漸多，就在一片孩子的驚喊哭聲不絕下，房間的燈光忽然重新亮起！只見那批猙獰坊眾剎那間從四方閃逃，各自遁回窗外那堆灌木叢中消失隱去！兩名白衣姐姐跑來查看，均奇怪何以眾多小孩，在夜深時分無故驚醒還哭鬧不已？


    好不容易終於捱至天亮一心等待母親前來，可是白衣姐姐發現我和房中某些小孩的健康情況反趨嚴重，其中有些本可早上歸家的小孩卻因此而延期！於是她們立刻召來一位身被灰斗篷的中年女人到來……由於我熱切期盼母親到來，所以我拒絕跟隨其他小孩到另一房間吃早餐。


    當那位身穿灰斗篷的女人聽取過眾人匯報後，竟氣沖沖的揮著一根像是某儀器附件的長鐵棒來至我面前，語氣非常嚴厲的對我訓誡著：「我是這兒童病房的護士長，從來不曾見過像你這麼搗蛋和不聽話的孩子，第一晚進來竟不好好安睡還整夜胡鬧，更把房中其他孩子也弄至發燒生病……這麼不聽話的孩子……所以你的父母才會把你丟棄在這醫院！」此刻我才恍然知道身處的地方原來是醫院內的兒童病房，小小心靈中頓感忐忑害怕……猜想也許是因我時常生病而虛耗金錢，所以父母親只想養育姊姊和剛出生的妹妹，因此決意把我遺棄在這所醫院！（註：當年我的小腦袋竟將醫院和孤兒院聯想在一起！）臆想至此我內心的悲鬱感覺頓然加劇，此刻我又按捺不住即時嚎啕大哭！可是到後來我還是由她們強拉進一間被稱為「黑房」的房間內以作懲罰。


    這是一間堆放著病人衣服和床單雜物的小房間，當房門關上後可謂伸手不見五指的漆黑一片。我聲淚俱下的不斷哀求她們原諒和釋放，無奈只換來更嚴厲的苛責！我歇斯底里地不停敲打著房門哀求，可惜那護士長還是認為這是給我最恰當的懲罰和教導！就在我無助地不斷抽泣搥門的一霎，忽從暗黑的身後傳來一把細語嘀咕的悽戚聲，我隨即轉身後望，竟赫然發現房中某角亮著一團晦綠螢光！我循那螢光方向步往尋看時，竟看見一個和我穿戴相同（白色服裝和手帶）的老伯正抱頭蹲坐在房中暗角淒泣痛哭！當老伯發現房中不止他一人時即時向我招手及叫嚷：「你看見我嗎？你是見到我的……！求你告訴他們我還未死，叫醫生快來解救我吧！求求你告知醫生……我還未死的……！求他們不要帶走我……！不要帶走我！」說罷這蒼白老伯隨即起來並想撲附過來！我對老伯所嘀咕哭訴的內容似懂非懂的疑慮著，再加上他身上籠罩著一股令人深感驚駭不安的氛圍！令我感到極之懼怕，隨即急跑回門邊奮力搥門與哀求……！這時門外隱約傳來眾多人聲，原來是院長帶同幾位外國人巡院參觀，所以那位護士長才急召其他人來把我釋放和安頓在房外某一位置。


    我在這醫院住了個多星期可是健康情況反趨嚴重。而某些日子母親又為著照顧患流感的妹妹沒有前來，還有每晚我總是提心吊膽的害怕又再遇到令我驚遽的「鴉烏婆」重臨；再加上剛入院時母親送我的唯一玩具又被不知名的病房小孩強搶去……面對種種不足為外人道的內外壓力下，年幼的我亦感到日子和健康過得不太樂觀！


    直至某天下午的探病時間，我如常安坐在病房大廳等候母親到來，雙眼總是緊盯著長廊的入口，期盼第一時間能看見母親前來接我歸家！就在我熱切期盼等候的一霎，竟看見身穿校服的姊姊從長廊那方進來並與我招手！看見多日不見的親人，我當然非常興奮地往前相迎，還立即從衣袋中取出剛分發得來的糖果與她分享！還好奇詢問姊姊為何只有她獨自前來卻不見母親同行？但奇怪的是姊姊由始至終都不發一言，只是面帶微笑的揮手示意我跟隨其後，眼看姊姊瞬間又跑回長廊遠處，我當然亦步亦趨的緊貼跟隨……就在我快將追至姊姊的一霎，忽從身後傳來母親急喚我乳名的聲音，我隨即轉身尋找母親身影，可是並無所見，再回過頭來再尋找姊姊時，卻發現原來我已危站在長廊盡頭往下方向的樓梯邊緣！由於瞬間所有親人突然消失於眼前，而自己又要孤單地被留置在這冷漠陌生的醫院，此刻我又再按捺不住放聲痛哭！後來由於我又被投訴離群亂跑及經常哭鬧，於是那嚴厲的護士長竟命人把我捆綁在床上並禁止所有活動！在往後的記憶中由於精神和健康已漸趨萎靡，所以往後內容是母親在多年後應我的查問而道來的⋯⋯


    母親後來發現我的健康非但得不到改善，還在醫院受了這麼多不仁待遇後；所以堅持要接我出院，但院方以種種理由阻撓致雙方鬧得極之不快！


    ********


    後記：關於童年時此段如夢魘般的深刻回憶，直至成長後，當年所遭遇的種種靈異片段仍在我內心縈繞不散！總想探究這所醫院過去曾發生過甚麼故事而導致寄存著這麼多的冤靈坊眾？直至早幾年適逢這醫院建院一百周年紀念，有關機構舉辦了一些回顧歷史，這抑壓在內心多年的疑團終於解開了⋯⋯


    原來這醫院在二戰期間部分建築不幸被日軍戰機炸彈擊中，當警報響起時有不少居民坊眾逃至急症室躲避（註：因國際條約明示敵方不可對醫院進行轟炸），可惜當年日軍無視這制約而導致生靈塗炭！


    另：去年終於再重臨此院探望一位患病朋友，臨離去前順道到院外林區閒逛；其間發現兩棵大樹間建有一所中式建築物——「東華三院文物館」。正想上前細看時，卻感到此間存著一股強烈的壓迫力和不安感；發現原來這庭前兩樹和建築物之間，還寄存著某些靈界生物，故此我並無再進一步的入內觀看便馬上離開了。


    ### 道壇驅煞


    在留院多日後終於祈盼得到母親前來解救，臨出院前她還親自餵我飲了一些清水後，就把我帶至觀塘會合一位牛下街坊……若干年後我才知悉這是事先安排好的符水。這街坊是一位住在牛下十三座的同鄉年長嬸嬸，我們尊稱她三姑。原來之前多日不見母親前來醫院探望，是跟隨這位同鄉嬸嬸到一處位於觀塘的道壇求助問事。


    事緣這位年長嬸嬸早前應母親要求曾到醫院探望，嬸嬸發覺我的病情可能是犯著甚麼陰煞邪靈，故此她著母親先帶同我的衣物和出生資料到此道壇扶乩問事。及後母親更應這位同鄉老道人「壇主」要求在壇前跪拜三天來為我解厄！老道人從乩文得知我因好惹閒事而犯煞，故此叮囑母親應設法接我出院並親至壇前為我解厄，並告知事情已發展到非常危急的地步，如再耽誤恐會性命不保！故此我就在狀態頗為不佳的情況下，被帶到這個位於觀塘某單棟唐樓的道壇（註：因此道壇現還在經營，故只好隱去其名，所供奉的主位是八仙中的某大師神祇）。


    還記得當時的我自覺體虛乏力由母親手抱著，在到達該道壇的地下入口大閘時；我已發現大廈四周及天花門頂間；均出現眾多拖著大白尾巴的小白貓、小人兒和眾多紙鳥，在這棟樓層間的天花與牆垣間來回穿梭與飛舞……


    （註：這些小人兒體積有如 LEGO 樂高小玩偶般大小，而那些紙鳥全是由黃色的符紙所摺成；而當時我誤以為是白貓的動物，至若干年後我才意會到，這應是道教傳說中的狐族信使。）


    這個看來忙而有序的場景當中，還夾雜著熱鬧的踏步聲與「熠熠」紙聲。但發覺……當越是接近目的地時，耳邊傳來越發響亮的高階音頻迴聲。及至該道壇時，我竟看見有位穿戴得像電影中的古裝仙人，正襟垂目盤坐在神壇之上！這是一個頭頂盤有髮髻、身穿道服和黑髮長鬚的清瘦神仙形象，但是其整體外形及比例卻跟真實人物偏細。只見那仙人頭頂上方及左右，均發出幾柱耀目強光，手執塵拂安然寂坐在壇中主位！而在他身後更化現出一個亮麗多彩的大圓旋轉光圈，那急速轉動的光圈看來像是某個異度空間的出入口！而此刻我才明白原來那些高階音頻迴聲，是由這個光速旋轉的大圓光圈所發出！（註：在非降乩時段，沒有仙人坐壇的現實環境時；神壇背面牆壁，只是繪著一巨型「陰陽八卦」的黑白圖案而已）。


    此時我對這眼前光景只感到相當眩迷，對母親何解將我帶至此地更感迷妄，只知心中懼怕又被送至一個令我驚遽的陌生地方！這時三姑領著母親和我來到壇前，在稟明來意後我們隨即上香跪拜，只見壇前設有一排供桌和築有一道木圍柵分隔著眾多前來問事的善信。當時壇前站著幾位道人各自忙著不同程序……有的在抄寫、有的在宣讀、有的手執丫形樹枝圍攏在一張八角形的雲石小几前撥弄推拉，可是那時我並不知道這些人原來正在扶乩問事！


    當前的熱鬧畫面，更有天花牆垣間；來回穿梭的眾多小人兒……全是手執朝笏、腳踏長靴和身穿古長袍的文官模樣，其排列及步伐一致並大步行走於壇前及室內所有空間，像是忙於執領甚麼法旨！再加上那眾多在壇前與供桌間來回走動的大尾白貓，還有在門窗之間虛空往返飛翔的「熠熠」紙鳥……就在我對這眼前迷亂玄奇的光景感到極度茫然之際，只見老道人壇主口中唸唸有詞稟請，並從壇中請來一個古舊的大木方印，然後猛力地在我的頭頂蓋上一個朱砂紅印……被這出其不意的猛力一擊後，我頓覺潰散昏瞶的意識，竟在瞬間從四方八面的虛空中全都收攝回來！還感覺頭顱上方那恍如張開布袋般的缺口，瞬間像被捆綁封緊！而那潰敗的精神意識，頃刻間從新薈聚、頓覺沉痾頓癒！'
  mdcn: '歲的我向地主神位上香和卜杯稟請其到位，伯伯深感投緣便應我家請求前來照應。可惜我對此真的了無印象！伯伯更表示及後某晚上，我要求讓路時；那刻才發現我竟能看見其形象，並能與之交談，對此更是深感錯愕！因此伯伯好奇地向我詢問，是否來自傳說中的「界外境地」？可是我對甚麼界內界外真的並無概念，只告知自覺初出生時因犯著某些過失；因此在一個充滿亮光的高空急墮下來！但當再次回憶時腦間只感到像被某些東西隱蔽著，只餘某些矇矓印記。伯伯聽罷隨即向妻子表示，過去曾聽說過某些關於「界外」的傳說！


    只可惜這次拜會地主家的其他內容，於天亮睡醒時卻被我忘掉不少！只隱約記得伯伯要我保守一切跟其交往的秘密，因這只會為我招來災厄！


    後記：地主伯伯在我幼年時曾給予多次保護，後來才知悉，幾次出現在妹妹嬰兒床邊的……甚麼「床頭婆婆」，是被伯伯驅離轟走。後來伯伯還感嘆告知：「只怪我們陽居人一股傻勁將這『織娘』恭請進來！」直至很多年後我才推敲到當年伯伯所指的甚麼「織娘」意會，因從這怪物的肢體外形上臆猜，這可能是指某昆蟲的舊稱。


    至於那些神秘農戶村落的出現並不是每晚如是，有時候多晚不見地主伯伯前來；及後伯伯告知因彼此境地不同，要藉某些時段才有連接兩界的道路前往……還有過去牛下一帶地域，全屬荒蕪清幽的海角，屬於中土南方盡處；此間山巒茂密又人跡罕至，因而結集不少山魅精靈在此間盤踞修真。地主伯伯更表示，早前曾跟我有所接觸的神秘玩伴，正是來自後山一帶的精靈族群。


    據資料記載……在開埠初期英軍在這海域一帶及山上都修築了不少軍營和碉堡。而位於坪石前方，三山國王廟的山上，現還保存著當年軍營的部分建築。從百多年前開始，這寧靜荒蕪的海灣地貌，正式被人為徹底的改變過來。


    ## 第一章：牛下童年


    ### 觀塘外婆的家


    小時候跟外婆相處的機會比較多，雖然我們並不是住在同一地區，但外婆總會隔些日子應母親要求到我家留宿，而我們亦會不時到其位於觀塘的家中探訪。但每次到外婆家時，我總會發現某些神情和外貌古怪的陌生人，經常出現其中！早期礙於年紀小不懂表達，只是好奇為何外婆家的門窗後，常會躲著某些總是帶著陰沉寒慄感覺的陌生人！


    回顧這故事前，先來簡介一下外婆居所內外的某些布局環境。外婆與三舅同住在觀塘崇仁街某唐樓低層單位，當年這方一帶只開發了前排街道，而後方一帶還是無路通往的漆黑山野。這是一棟沒有升降機設備的戰後唐樓，而當年某些住戶；總會在窗外加建鳥籠式平台，以增可用空間。故此外婆家，亦加建了一道圍繞在整個單位外牆，呈
    L 形的鳥籠大平台。而我和姐姐，亦一同就讀位於外婆家樓下的一所學校（前文曾提及）。


    外婆家中陳設著很多不同的家居飾品和舊物，大多都是別人送贈，由於老人家持來者不拒的心態來接收，慢慢地把本來明亮的睡房和門廊，堆得幽暗狹隘！由於從大門步入可直望到外婆睡房內的窗口，故此我每次進屋；總會看見這窗外的鳥籠平台上，經常躲著一外貌灰沉、神態厄異古怪的中年女人。後來由於發現的次數著實太多，令我對這陌生人的存在也充滿疑惑，曾向姊姊詢問何解有些人；總愛躲於大門及窗後位置，兼且默不作聲的偷望？他們到底在玩著甚麼遊戲？由於姊姊跟我只差一歲，故此她的小腦袋在思索了一會後；馬上猜想到，這可能是玩「捉迷藏」的遊戲模式。還告知她在校內曾和同學亦玩過此遊戲幾回！自此我漸對那些常躲在門窗暗角的陌生人，意會為……「這些人一定又是在玩捉迷藏了」！


    又一回我們小孩無意間發現外婆睡房門後那堆舊物中，有一頂用舊報紙裹著的英式禮帽，我和姊姊立即聯想到這定是會變出白兔的魔術師帽！因此我們立刻拿出來爭相試戴和把玩，期間姊姊更一手把我按坐在帽上，還戲說要將我由帽中變走。可是外婆對我倆這般胡鬧深感不悅！更立刻奪回，並告知……這禮帽是某位遠親的女兒所送贈，還表示這是那名遠親父親的心愛舊物，更是當年在英國打工時所買來的外國貨。


    其實在我們孩子間鬧哄哄在房門後爭相把玩禮帽的同時，我是看見一個恍似早期「黑人牙膏」包裝上，那咧嘴男人圖樣的老頭站於門後！此是一身黑色西洋燕尾禮服，瘦骨嶙峋和皮膚黝黑的怪老頭。由於當時我早被這頂魔術師帽所吸引，因此我對躲在門後這怪老頭只意會為⋯⋯可能他跟躲在窗外的怪女人正玩著捉迷藏！但說來奇怪的是⋯⋯每次到外婆家留宿或午睡後，我們孩子間總會遇到或多或少的不適或發燒生病，而我往往是不適感最嚴重的那位！及後父母親認為，這可能是小孩對陌生環境不適應，或日間玩得太熱烈的正常反應。


    還記得當年母親因忙於照料初生的妹妹，曾把我寄住在外婆家個多星期，況且我所就讀的幼稚園是座落在外婆的住宅樓下。在這段日子中外婆總為我製作喜愛的食品，更會買來父母嚴禁多吃的汽水和雪糕，因此我就算發現她家中；常出現某些怪客或奇怪生物，亦不太理會。直至某天晚上，我、外婆和間中回家留宿的三舅父一起看完《歡樂今宵》後關燈就寢，但不久大門廊外的後樓梯；突然傳來一男子呼叫「救命」的聲音，可是同樓的其他住戶，卻迅速地各自關上鐵閘內的木門和燈光！而外婆亦不斷的哄著我，不要理會只須趕快入睡！但奇怪地⋯⋯我卻感到頭顱內的前額位置的腦海中，竟浮現出一個鮮明畫面⋯⋯看見一個男人從後樓梯回家時，被一早躲在暗角的吸毒歹徒從後跟蹤行劫；男人被搶劫財物後，還遭對方狂刺多刀後負傷求救的情節……！呼叫聲過後門廊內外氣氛沉寂，不久街外就傳來警車與救護車輛由遠而至的響號聲，更從窗外映入紅藍閃曳的轉動燈影，這時各樓層的住戶才敢攀近窗邊探頭外望。由於這晚所發生的一切，著實令這小區街坊感到相當沉重和不安，所以到了清晨附近各坊眾和商戶都在暗自談論著。後來從長輩的話語中了解到……這晚劫案中的男子最後因失血過多失救而亡，而當晚持刀搶劫的元凶果真是一名癮君子。


    還有說來奇怪的是，自此命案發生後一段冗長時間，這後樓梯的電燈就經常無故的短路失靈，故此往後此段位置亦經常變成漆黑一片，漸漸地各住戶都不再使用此段後排樓梯出入，及後年月還堵塞著不少垃圾與雜物。


    *********


    後記：至於外婆家中時常出現這些不速之客的現象，經過往後另一次經歷後，我才了知到這是某種現象內容。至於這棟大廈在多年前曾發生過一次造成人命傷亡的火災，再加上這類大廈設施已顯得落後和陳舊，故此早已不復童年時那種光潔環境！


    ### 廣華醫院


    這經歷的開端對現在的我來說已有些模糊，只依稀記得自經歷那次床頭婆婆事件而病了一場後，我的體質變得比較孱弱。有一回適逢觀塘區舉辦，潮州人最為看重的；一連三天盂蘭盆會祭祀，於是我們舉家遷往外婆的家中幫忙和留宿。由於母親和外婆都非常喜愛觀看，當中現場演出的潮語神功戲；因此在最後一晚的通宵戲，她們已早早安排我們孩子上床就寢以方便她們前往。


    但當睡至深宵某時段，在半夢半醒間我卻突然被一個從房間某角閃出的黑影所驚醒，我即時護著睡在床尾的妹妹，只見那黑影隨即閃回某角消失！未幾我卻在夢中被一個異常陰深的黑衣老人扼著頸項和唬嚇怒哮……幾經掙扎方從夢中醒來並哭喪著急喚母親！幸運地剛巧母親回家並聽到房間傳來我的呼救聲，於是立刻衝進房間給我安慰。但此刻我只懂不停的哭嚷著……害怕！雙手更緊緊地抱著母親並在其懷中不斷抖震！只因當下的我……感覺圍繞在身上的那團「精神能量」像被瞬間抽掉潰散一樣，恍如一顆耗盡能源的泄氣電池！母親從我驚駭的神情中，看出我定是在夢中被某種東西所嚇煞著；於是她立即向著虛空中比劃出一個斬劈手勢，並大聲怒斥：「斬……斬死一切妖魔鬼怪……！」


    可是自這天後，我總會在黃昏至晚間時段；無原故的發高熱，隨著日子過去我在日間的表現總是昏瞶落魄；可惜父親只懂埋怨母親照顧不周，令本來捉襟見肘的家用又為著孩子生病而多花！眼看父母親為著我的患病問題而終日吵架，我的內心亦對自己的不濟，而感到無比不安和難受！即使就診了一段日子，我的健康情況也沒有好轉，而我總會在黃昏過後；看到一眾猙獰和不懷好意的傢伙，聚結在四周的天花與門牆角落，對我譏笑或嚇唬。直至某個星期天，父母親特意帶我們飲早茶後，就把妹妹暫交鄰居託管。最意外的是，母親在茶樓門外的攤檔，買來一件鐵皮玩具給我。這是一輛上發條後，可行走的賣雪糕單車玩具。可是姊姊對母親突然給我買來簇新玩具，顯得有些醋意！只因她自覺是家中長女，給我所享用的衣物玩具，都應該由她佔先，而父親亦對母親的花錢舉動略帶微言！


    及後我們乘車到達一個當時我並不知道是哪兒的地點，未幾有位親切和藹的白衣姐姐帶我到一個光潔的地方洗澡和換上一套全白衣裳；還記得我當時竟天真地詢問現在又不是過新年，何解會突然為我準備新衣裳呢？白衣姐姐笑說：因你是聽父母話的好孩子，所以我們特意送你新衣和寫有你姓名的新手帶……說罷還著我趕快展示給父母看看。接著我被帶進一個寄住著眾多小孩和睡床式樣一致的房間，我傻乎乎的聽從指示，走到父母跟前展示著這新造型。只見父親對早已漲紅了雙眼的母親耳語一番後，就帶同姊姊離去。而我立刻趕上前拖著母親的手，亦打算跟隨！但母親向我表示要先行回家餵妹妹喝奶，著我好好午睡後就會回來接我歸家。此時另一位白衣姐姐帶我到達一張床邊安頓……這是一張兩邊連有掛軸欄柵的白鐵床。接著母親把剛買來的玩具和一些衣物水果，放入床邊的小木櫃內。此刻我對自己竟擁有一張私人睡床和小木傢俱，感到意外萬分；但又為著要跟媽媽暫別感到傷心難過！最後她們只有半哄帶騙的把我留置在這陌生的地方，亦在這晚一件令我永世難忘的驚駭事件發生！


    在我午睡過後也不見母親蹤影，所以又為此而哭了一場！可是我隨即被另一位白衣姐姐嚴斥一番後只勉強吃過一點晚飯，她們又再哄說只因現已夜深所有車輛早已停駛，所以我的母親要到明天才可前來接我歸家……還說好孩子應早睡早起和聽話等……聽罷我只有乖乖的跟從指示，一心期盼明早快來可跟母親團聚！


    就在這晚正當睡至深宵某個時段，窗外突然刮起一陣寒風和傳來人聲嘶吼的尖聲；我隨即起床卻看見對面那列大窗外的灌木叢中，竟突然閃現出眾多目露凶光的猙獰坊眾！這眾多深宵闖進來的中老年男女坊眾，均是穿著舊時那薄衣粗布的中式服裝；他們怒闖進來後隨即閃至床邊並附伏在各睡著的小孩旁，肆意地吸嗦著小孩身上的那團光感能量……「精神氣」。此刻除了我之外，但見還有二三小孩都被這批突然闖至的陌生人所驚醒，而啼哭不止！當然亦有不知就裡還在懵然安睡的孩子。現還記得那時我對這批「不速之客」竟意會為長輩口中所說的「拐子佬」和「鴉烏婆」……臆猜定是要來捉拿那些晚間不睡覺和不聽話孩子！當中最深刻的是那雙眼亮著厲白螢光的嬸嬸正想撲至我的床邊時，在極度惶恐的本能反應下我只懂力竭聲嘶的哀求這「鴉烏婆嬸嬸」……不要靠近！更試圖拉開圍在鐵床兩旁的欄柵逃走，可惜因力氣不濟只能無助地退縮在床角邊緣絕望驚泣！此刻房間內的啼哭聲漸多，就在一片孩子的驚喊哭聲不絕下，房間的燈光忽然重新亮起！只見那批猙獰坊眾剎那間從四方閃逃，各自遁回窗外那堆灌木叢中消失隱去！兩名白衣姐姐跑來查看，均奇怪何以眾多小孩，在夜深時分無故驚醒還哭鬧不已？


    好不容易終於捱至天亮一心等待母親前來，可是白衣姐姐發現我和房中某些小孩的健康情況反趨嚴重，其中有些本可早上歸家的小孩卻因此而延期！於是她們立刻召來一位身被灰斗篷的中年女人到來……由於我熱切期盼母親到來，所以我拒絕跟隨其他小孩到另一房間吃早餐。


    當那位身穿灰斗篷的女人聽取過眾人匯報後，竟氣沖沖的揮著一根像是某儀器附件的長鐵棒來至我面前，語氣非常嚴厲的對我訓誡著：「我是這兒童病房的護士長，從來不曾見過像你這麼搗蛋和不聽話的孩子，第一晚進來竟不好好安睡還整夜胡鬧，更把房中其他孩子也弄至發燒生病……這麼不聽話的孩子……所以你的父母才會把你丟棄在這醫院！」此刻我才恍然知道身處的地方原來是醫院內的兒童病房，小小心靈中頓感忐忑害怕……猜想也許是因我時常生病而虛耗金錢，所以父母親只想養育姊姊和剛出生的妹妹，因此決意把我遺棄在這所醫院！（註：當年我的小腦袋竟將醫院和孤兒院聯想在一起！）臆想至此我內心的悲鬱感覺頓然加劇，此刻我又按捺不住即時嚎啕大哭！可是到後來我還是由她們強拉進一間被稱為「黑房」的房間內以作懲罰。


    這是一間堆放著病人衣服和床單雜物的小房間，當房門關上後可謂伸手不見五指的漆黑一片。我聲淚俱下的不斷哀求她們原諒和釋放，無奈只換來更嚴厲的苛責！我歇斯底里地不停敲打著房門哀求，可惜那護士長還是認為這是給我最恰當的懲罰和教導！就在我無助地不斷抽泣搥門的一霎，忽從暗黑的身後傳來一把細語嘀咕的悽戚聲，我隨即轉身後望，竟赫然發現房中某角亮著一團晦綠螢光！我循那螢光方向步往尋看時，竟看見一個和我穿戴相同（白色服裝和手帶）的老伯正抱頭蹲坐在房中暗角淒泣痛哭！當老伯發現房中不止他一人時即時向我招手及叫嚷：「你看見我嗎？你是見到我的……！求你告訴他們我還未死，叫醫生快來解救我吧！求求你告知醫生……我還未死的……！求他們不要帶走我……！不要帶走我！」說罷這蒼白老伯隨即起來並想撲附過來！我對老伯所嘀咕哭訴的內容似懂非懂的疑慮著，再加上他身上籠罩著一股令人深感驚駭不安的氛圍！令我感到極之懼怕，隨即急跑回門邊奮力搥門與哀求……！這時門外隱約傳來眾多人聲，原來是院長帶同幾位外國人巡院參觀，所以那位護士長才急召其他人來把我釋放和安頓在房外某一位置。


    我在這醫院住了個多星期可是健康情況反趨嚴重。而某些日子母親又為著照顧患流感的妹妹沒有前來，還有每晚我總是提心吊膽的害怕又再遇到令我驚遽的「鴉烏婆」重臨；再加上剛入院時母親送我的唯一玩具又被不知名的病房小孩強搶去……面對種種不足為外人道的內外壓力下，年幼的我亦感到日子和健康過得不太樂觀！


    直至某天下午的探病時間，我如常安坐在病房大廳等候母親到來，雙眼總是緊盯著長廊的入口，期盼第一時間能看見母親前來接我歸家！就在我熱切期盼等候的一霎，竟看見身穿校服的姊姊從長廊那方進來並與我招手！看見多日不見的親人，我當然非常興奮地往前相迎，還立即從衣袋中取出剛分發得來的糖果與她分享！還好奇詢問姊姊為何只有她獨自前來卻不見母親同行？但奇怪的是姊姊由始至終都不發一言，只是面帶微笑的揮手示意我跟隨其後，眼看姊姊瞬間又跑回長廊遠處，我當然亦步亦趨的緊貼跟隨……就在我快將追至姊姊的一霎，忽從身後傳來母親急喚我乳名的聲音，我隨即轉身尋找母親身影，可是並無所見，再回過頭來再尋找姊姊時，卻發現原來我已危站在長廊盡頭往下方向的樓梯邊緣！由於瞬間所有親人突然消失於眼前，而自己又要孤單地被留置在這冷漠陌生的醫院，此刻我又再按捺不住放聲痛哭！後來由於我又被投訴離群亂跑及經常哭鬧，於是那嚴厲的護士長竟命人把我捆綁在床上並禁止所有活動！在往後的記憶中由於精神和健康已漸趨萎靡，所以往後內容是母親在多年後應我的查問而道來的⋯⋯


    母親後來發現我的健康非但得不到改善，還在醫院受了這麼多不仁待遇後；所以堅持要接我出院，但院方以種種理由阻撓致雙方鬧得極之不快！


    ********


    後記：關於童年時此段如夢魘般的深刻回憶，直至成長後，當年所遭遇的種種靈異片段仍在我內心縈繞不散！總想探究這所醫院過去曾發生過甚麼故事而導致寄存著這麼多的冤靈坊眾？直至早幾年適逢這醫院建院一百周年紀念，有關機構舉辦了一些回顧歷史，這抑壓在內心多年的疑團終於解開了⋯⋯


    原來這醫院在二戰期間部分建築不幸被日軍戰機炸彈擊中，當警報響起時有不少居民坊眾逃至急症室躲避（註：因國際條約明示敵方不可對醫院進行轟炸），可惜當年日軍無視這制約而導致生靈塗炭！


    另：去年終於再重臨此院探望一位患病朋友，臨離去前順道到院外林區閒逛；其間發現兩棵大樹間建有一所中式建築物——「東華三院文物館」。正想上前細看時，卻感到此間存著一股強烈的壓迫力和不安感；發現原來這庭前兩樹和建築物之間，還寄存著某些靈界生物，故此我並無再進一步的入內觀看便馬上離開了。


    ### 道壇驅煞


    在留院多日後終於祈盼得到母親前來解救，臨出院前她還親自餵我飲了一些清水後，就把我帶至觀塘會合一位牛下街坊……若干年後我才知悉這是事先安排好的符水。這街坊是一位住在牛下十三座的同鄉年長嬸嬸，我們尊稱她三姑。原來之前多日不見母親前來醫院探望，是跟隨這位同鄉嬸嬸到一處位於觀塘的道壇求助問事。


    事緣這位年長嬸嬸早前應母親要求曾到醫院探望，嬸嬸發覺我的病情可能是犯著甚麼陰煞邪靈，故此她著母親先帶同我的衣物和出生資料到此道壇扶乩問事。及後母親更應這位同鄉老道人「壇主」要求在壇前跪拜三天來為我解厄！老道人從乩文得知我因好惹閒事而犯煞，故此叮囑母親應設法接我出院並親至壇前為我解厄，並告知事情已發展到非常危急的地步，如再耽誤恐會性命不保！故此我就在狀態頗為不佳的情況下，被帶到這個位於觀塘某單棟唐樓的道壇（註：因此道壇現還在經營，故只好隱去其名，所供奉的主位是八仙中的某大師神祇）。


    還記得當時的我自覺體虛乏力由母親手抱著，在到達該道壇的地下入口大閘時；我已發現大廈四周及天花門頂間；均出現眾多拖著大白尾巴的小白貓、小人兒和眾多紙鳥，在這棟樓層間的天花與牆垣間來回穿梭與飛舞……


    （註：這些小人兒體積有如 LEGO 樂高小玩偶般大小，而那些紙鳥全是由黃色的符紙所摺成；而當時我誤以為是白貓的動物，至若干年後我才意會到，這應是道教傳說中的狐族信使。）


    這個看來忙而有序的場景當中，還夾雜著熱鬧的踏步聲與「熠熠」紙聲。但發覺……當越是接近目的地時，耳邊傳來越發響亮的高階音頻迴聲。及至該道壇時，我竟看見有位穿戴得像電影中的古裝仙人，正襟垂目盤坐在神壇之上！這是一個頭頂盤有髮髻、身穿道服和黑髮長鬚的清瘦神仙形象，但是其整體外形及比例卻跟真實人物偏細。只見那仙人頭頂上方及左右，均發出幾柱耀目強光，手執塵拂安然寂坐在壇中主位！而在他身後更化現出一個亮麗多彩的大圓旋轉光圈，那急速轉動的光圈看來像是某個異度空間的出入口！而此刻我才明白原來那些高階音頻迴聲，是由這個光速旋轉的大圓光圈所發出！（註：在非降乩時段，沒有仙人坐壇的現實環境時；神壇背面牆壁，只是繪著一巨型「陰陽八卦」的黑白圖案而已）。


    此時我對這眼前光景只感到相當眩迷，對母親何解將我帶至此地更感迷妄，只知心中懼怕又被送至一個令我驚遽的陌生地方！這時三姑領著母親和我來到壇前，在稟明來意後我們隨即上香跪拜，只見壇前設有一排供桌和築有一道木圍柵分隔著眾多前來問事的善信。當時壇前站著幾位道人各自忙著不同程序……有的在抄寫、有的在宣讀、有的手執丫形樹枝圍攏在一張八角形的雲石小几前撥弄推拉，可是那時我並不知道這些人原來正在扶乩問事！


    當前的熱鬧畫面，更有天花牆垣間；來回穿梭的眾多小人兒……全是手執朝笏、腳踏長靴和身穿古長袍的文官模樣，其排列及步伐一致並大步行走於壇前及室內所有空間，像是忙於執領甚麼法旨！再加上那眾多在壇前與供桌間來回走動的大尾白貓，還有在門窗之間虛空往返飛翔的「熠熠」紙鳥……就在我對這眼前迷亂玄奇的光景感到極度茫然之際，只見老道人壇主口中唸唸有詞稟請，並從壇中請來一個古舊的大木方印，然後猛力地在我的頭頂蓋上一個朱砂紅印……被這出其不意的猛力一擊後，我頓覺潰散昏瞶的意識，竟在瞬間從四方八面的虛空中全都收攝回來！還感覺頭顱上方那恍如張開布袋般的缺口，瞬間像被捆綁封緊！而那潰敗的精神意識，頃刻間從新薈聚、頓覺沉痾頓癒！'
