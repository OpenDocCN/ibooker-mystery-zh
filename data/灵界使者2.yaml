    在我們神明的眼中，你們的感情走到這個地步，其實都是受苦的靈魂。


    與其繼續在膠著中拉來拉去，守著不算緣分的緣分，還不如此時放開手，重新自由去尋覓對的緣分。


    其實，你並不是離不開她，只是生命中有一種「怠惰」、「懶散」的業力，對於感情的態度也是得過且過。以致即使這幾年來曾有过多次良好的機緣，卻都因此蹉跎了。


