    「財富」和「感情」是絕大多數的人生命中的兩大願望，幾乎所有的難題都跟這兩大願望有所關聯，而只要在這兩項願望有所達成時，大概任何問題也都可以得到相當程度的解決了。所以，我會告訴我的客戶，不管現在縈繞在腦海中是怎樣盤根錯節的難題，先從兩大根本的方面去著手，一步一步去增加自己能量和運勢的籌碼，到時候，自然就會發現，難題似乎也沒有原來看起來的那麼難了。


