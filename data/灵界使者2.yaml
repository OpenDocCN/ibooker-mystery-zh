    ### ### 安親班女老師槍殺命案


    「不讓我愛，就送妳棺材！」二〇〇九年十二月一日，位於台北市內湖的某托育中心門口，發生了一起駭人聽聞的「恐怖情人」槍擊案。曾有殺人前科的兇嫌吳敏誠，因為不滿女友黃瓊瑤提出分手，兩人在激烈爭吵之後，就在黃瓊瑤轉身離去時，吳敏誠拔槍近距離朝她的後腦勺連開兩槍。女方當即倒臥在血泊之中，送醫急救兩天之後，宣告不治身亡。而早在案發前一個多月，兇嫌就曾經發出恐嚇簡訊警告，一定會殺了對方再送上一副棺材！


    這是一段令人費猜疑猜的感情，而且根本不受到周遭衆人的祝福。死者黃瓊瑤大約四十歲，早年命運多舛，父親很早就因為乳癌過世，原本的一段婚姻也極為不順利。離婚後她成了一個單親媽媽，帶著兒子搬回孃家與母親同住，也許就是太多的不順讓她受不了，於是她才會把名字從原本的「黃富蘭」改為後來的「黃瓊瑤」。即使生活中充滿了這許多的不如意，但是黃瓊瑤平素仍是一個溫和善良的人，在鄰居的眼中，她很好相處，也熱心助人，更是附近許多小朋友口中親切可人的「阿姨」。


    相較於善良的黄瓊瑤，她的男友吳敏誠則根本就像是一個「凶星轉世」的可怕人物。由於從小患有唇顎裂（兔唇），破相使吳敏誠在極端自卑中養成了一種暴戾與報復交織的性格，而父母因為歉疚也對他過分溺愛，讓他予取予求，終於使他成了「只可我負天下人，不許天下人負我」的可怕人物。在感情世界裡，吳敏誠是一個佔有慾極強卻又不知專為何物的人，早在十幾年前，才剛結婚生女沒多久的他，就外遇劈腿，甚至因為外遇對象與他開車出遊時，幾句無心的玩笑話，竟在車內憤而拔刀，把對方亂捅成蜂窩。由於鑽法律的漏洞，犯下殺人滔天大罪的吳敏誠居然只坐了兩年多的牢就假釋出獄了，出獄後，即使妻子已經與他離婚，但實在太過畏懼他的兇狠殘暴，仍被迫同出一個屋簷下，長期活在家暴的陰影中。


    這樣天差地別的一對男女，怎麼會湊在一起？已經有過不愉快婚姻的黃瓊瑤，為什麼要把自己的第二春，押在一個殺人前科犯身上？吳敏誠明明是一個暴力、自私、風評不佳的男人，為何黃瓊瑤就是不顧身邊親友的強烈反對，執意要與他交往？既然逐漸醒悟對方是個恐怖情人而決定分手，為什麼會一時昏了頭單獨與這個煞星談判——不能報警嗎？不能請朋友同事陪同嗎？明明是個十惡不赦、兇殘成性的人，為何有那麼多陰錯陽差加諸在吳敏誠身上，讓他短暫坐牢就能出獄？難道，吳敏誠生來就是黃瓊瑤的煞星，專門來終結她的生命的？


    太多的問號，已經難以找到解答，只是徒增世人的扼腕而已！


    ### 通靈解析


    一場悲劇性收場的感情糾葛，肇因於累世的不良業力作祟。


    透過深入探查黃瓊瑤和吳敏誠兩位的靈魂因果檔案，我赫然發現，其實她們兩個早從幾世以來就有著情人的關係，而且重複好幾次。'
