    ## 林清岳殺父母案


    常常有父母在教訓浪費的兒女時，會脫口罵出：「你這個來討債的！」然而，這句話套用在林清岳的身上，卻成了令人毛骨悚然的讖語。


    一九九八年雙十國慶剛過的凌晨，林口鄉下福村發生了震撼人心的逆倫弒親血案。從事餐飲外燴的林銀樹、曾玉甘夫婦，在熟睡當中，遭到時年十九歲的親生獨子林清岳夥同三名友人，瘋狂砍殺一一〇九刀（其中一一六刀為林清岳親手所為），即使砍殺的過程中父母淒厲哀嚎求告：「我是你爸爸呀！」「阿弟，不要這樣。」但是林清岳根本殺紅了眼，絲毫沒有罷手的意思。在毫不留情一刀、一刀砍殺了父母之後，他甚至計畫放火燒房子，並且A保險金、收父母的奠儀花用。如此沒有人性的犯案手法，林清岳迭經審判皆維持死刑定讞，於二〇一二年執行槍決伏法。


    原本從事醬菜、自助餐的林銀樹，後來藉著經營土雞城、餐飲外燴而逐漸致富。在發財的同時，原本只有兩個女兒的林銀樹，又和第二任妻子曾玉甘生下唯一的兒子林清岳，事業亨通再加上喜獲麟兒，相信林銀樹當時一定是欣喜若狂的。


    膝下只有這麼一個男丁，林銀樹當然是寵到了極點，甚至是溺愛了，從小要什麼就買什麼，年紀輕輕就買進口跑車給兒子代步，供應金錢讓他囂張揮霍做大哥：…然而，在溺愛的同時，林銀樹卻犯了一個大多數「有錢而忙碌」的爸爸都會犯的錯誤——養而不教。在物質上極盡供應之能事，在精神上卻無法循循善誘，反而因爲工作忙碌加上「給錢的就是老大」的態度，每當兒子闖禍、錯得離譜時，總是氣急敗壞先打了、罵了再說，甚至不顧慮兒子的同儕友人就在旁邊，兒子的自尊是否受損？


    面對父母的溺愛，林清岳卻從來都沒有感恩的心情，反而似乎與生俱來一種根深蒂固的叛逆感：「這一切，都是他們『欠』我的！」所以，父親給他金錢，他從不珍惜：供他念書，他從不用功：想把一身廚藝傳給他，他也不願認真學。而且，在受到打罵時，林清岳的心情就會陷入怒火中燒：「總有一天，我要殺了你！」他到案後供稱，其實「弒親」的念頭在他心中存在已久。


    ### 通靈解析


    究竟是怎樣的「相欠債」，讓原本應該父慈子孝的局面完全變調？諷刺的是，林銀樹靠著外燴致富，最後讓他在驚恐中含恨而逝的，致富之後生的獨生愛子手裡拿著瘋狂砍他的，就是外燴時專用的剁骨刀。這一切，究竟要如何解釋？


    如此駭人聽聞的逆倫弒親血案，我原本覺得加害人和被害人之間必然有著糾結交錯的因果關係，周遭的人也都直覺認爲是父子之間前世「相欠債」，林清岳才會在今世做出這樣人神共憤的事情，但是事實上並非如此。


    深入調查林銀樹、曾玉甘夫婦和獨子林清岳的前世因果檔案，意外地發現，在轉世到今生之前，這竟是三條完全不相干的靈魂。彼此之間別說沒有因果糾纏，甚至連最近幾世都完全沒有互相認識的紀錄，三個人這輩子湊在一起成為夫妻、父子，完完全全就是偶然的組合。


    我換個角度來說，其實林銀樹、曾玉甘夫婦是完全無辜的，他們並沒有欠過林清岳任何因果債，真正造成今世惡緣的問題關鍵，來自於林清岳累世「受傷、生病」的問題靈魂。


    在調查結果中，我發現，林清岳在過去世裡面，曾經因為嚴重的精神問題而有自殘、自殺的紀錄，這是一條非常孤獨、怨念深重、而且沒有任何因緣伴侶的靈魂。就是因為這樣，每一次的轉世，林清岳的靈魂深處都帶著極為深重的「自毀傾向」不良業力。


    越是孤獨、孤僻的人，事實上反而越不甘於孤獨、平凡的人生。所以林清岳的自我毀滅傾向，就絕不會選擇消極的自殺來結束生命，他會想要藉著惹事生非，做一些驚天動地的大事情來自我了結。甚至是想方設法去找機會「被殺」——靈魂深處他不斷告訴自己，如果找不到人來殺我，那我就要犯下非判死刑不可的重罪。


    種人就很像是傳說中的「凶煞轉世」，誰家出了這種子孫，誰家就要出問題。即使不是發生逆倫弒親的血案，也免不了會在外惹是生非，讓家人為他傷透腦筋，一輩子嘆氣流淚。


    ## 建商小開王鴻偉殘殺女學生


    富有四海的人，原本應該眼界高遠、心胸寬廣。然而，卻就有一些家境富裕、生活無虞的人，偏偏比常人更執迷不悟，病態的佔有慾往往讓他們鑄成大錯，悔恨終身。究竟是累積了多少世的「不甘心」，讓這種人拘執於某項人、事、物，不得之或不毀之便誓不甘休呢？


    二○○○年九月，一向遊客如織的淡水小鎮，竟意外地登上了社會版面。淡水一名富商子弟王鴻偉，苦追正值雙十年華的女學生張雅玲不得，遭到拒絕後，居然心生惡念，伺機在女方住家的巷口開著賓士車撞傷她，使其陷入昏迷。最後，王鴻偉在車廂內狂砍張雅玲一七六刀，使她幾乎身首分離，並故布姦殺疑陣棄屍於草叢中。血腥而兇殘的殺人手法，使王鴻偉四度判處死刑，原本他可以擁有比常人更容易幸福、成功的條件，卻在情網中迷失了人性，就此葬送了別人的生命、自己的前程。


    最讓人覺得不可原諒的，是王鴻偉在開車意圖棄「屍」的過程中，其實兩度發現張雅玲還有氣息，事情當下還有轉圜的餘地。然而，王鴻偉似乎泯滅了天良，他就是怎麼也不肯放過張雅玲，反而像著了魔似的，一次又一次加重殺害，一次比一次砍更多刀，砍到張雅玲連脖子都快斷了。或許是受到太不人道、太兇殘的殺害，讓張雅玲冤氣沖天，據說藏屍的賓士車後車廂，雖然已被警方查扣，但在停車場內卻時常無故自動開關關關，彷彿死者有什麼話語想要吶喊出來。後車廂開關的過程完全被監視錄影器錄下，連目睹的警衛都說：「看到它莫名其妙打開也不用管它，因為過一下子又會自動闔起來。」


    尤其讓死者家屬憤憤不平的是，即使已經面臨死刑定讞，王鴻偉還是不肯透露張雅玲確實斷氣的地點，讓張家始終無法順利招魂完成法事。王鴻偉心中似乎打定了主意：「殺死妳還不夠，我還要讓妳成為無處依歸的孤魂野鬼！」


    同樣是苦戀、失戀，有些人可以慢慢放開手，但像王鴻偉這種人卻執意賭上「生死」來表達自己的不滿。相較於一般人，王鴻偉在感情上可以有更多美好的發展，即使失意也有更寬廣的退路，卻執意要鑽入一個害人害己的死胡同。這讓我們不禁懷疑，雙方真的如表面上所看到，只是認識了一個多月、甚至連交往都還沒展開？到底是怎樣的怨恨和孽緣，讓這齣悲劇在惡念蔓延中，遲遲無法落幕呢？


    ### 通靈解析


    我想，王鴻偉今生應該就是來了結一段糾纏了好幾世的惡緣。表面上看來，王鴻偉是因為追求張雅玲不得，導致心有不甘，因而由愛生恨，終於失去理智痛下殺手。但實際從累世的因果檔案去了解，我發現了一個驚人的答案。原來，王鴻偉處心積慮要毀滅張雅玲，已經長達好幾世之久了。


    雖然王鴻偉出身富裕的家庭，有著優越的社會、經濟條件，但在靈魂的深處，其實當他面對張雅玲時，卻是充滿自卑和不安的。因為，早在幾世之前，「追求不得、由愛生恨」的戲碼早就已經上演過了。當時，張雅玲的地位是尊貴而高不可攀的，王鴻偉想要追求卻被拒絕得很徹底，甚至有言語深深地傷害了他的自尊，成為烙印在他靈魂體上長久難以抹滅的傷痕，這就是隔世宿怨的源起。


    幾乎每一世轉世的王鴻偉，都帶著毀滅張雅玲的因果動機而誕生，但是每一世都在失敗下結束，在一次又一次失敗的同時，雙方靈魂的過節越結越深，不斷累積的結果，終於在今生來到一個徹底解決的臨界點。


    也是因為彼此牽扯的恩怨實在太深了，以致張雅玲在先天上也會沒來由地對王鴻偉存在著敵意。這正是現實中，為什麼當王鴻偉一對她透露追求的意圖，她立刻就予以嚴峻的拒絕，根本不願給對方任何接近的機會。我想，這就是張雅玲的靈魂深處，已經習慣性地察覺到危機的存在，絲毫不想讓對方有任何傷害自己的藉口和機會。


    實際上，根據我深入的通靈調查，張雅玲的靈魂已經閃躲王鴻偉超過二世以上了，沒想到這一世終於還是被找到。看來，因果總是要有所了結的，誰也無法改寫那必然的進程。而也因爲王鴻偉幾世前受到的打擊和刺激實在太深，再加上累世尋仇不可得，以致今生轉世時立下靈魂的誓約，要以最極端的方式解決這場宿世的追逐戰——殺了對方，接受制裁！


    當我透過通靈隔空診斷王鴻偉的靈魂體時，發現他由於不斷的怨恨和追殺，其實本身的靈魂體也受到了創傷，以致今生重新來到地球上時，是帶著「無法自制」的不良業力誕生的。這種不良業力，就好像腦袋、情緒缺少了緊急煞車系統，一旦崩潰就一發不可收拾，完全不留餘地、沒有退路。


    除了缺乏自制力之外，王鴻偉的靈魂體中，還有著「殘忍」、「報復」、「不聽人意見」等等不良業力，種種業力的交叉作用，造就出一個專橫跋扈、極端自我的蠻橫少年——即使這樣，他面對張雅玲時，還是充滿了先天的自卑感。


    透過關老爺的指引，我成功地搜尋到張雅玲的靈魂體，很遺憾地，她仍徘徊在地球上無法飛昇。由於整個靈魂體處在極度不舒服、驚恐的狀態中，一開始她根本無法與我溝通。我只好又冒著頭暈嘔吐的風險，把自己的腦能量和她的靈魂完全結合，雙方才有辦法溝通。


    張雅玲的靈魂透露，現在的她仍感覺到非常暈眩、意識模糊，因為一開始的撞擊力道實在太過劇烈，當時她就已經完全昏厥過去，一點也不清楚後來發生的事情，連自己目前魂在何方都不知道，被封閉在小小的角落中無法脫離，更別說前往找兇手報仇了。


    可嘆的是，王鴻偉的靈魂體以爲殘殺對方、接受制裁就能了結宿世的恩怨，殊不知，充滿惡念的解決方式，只是讓自己的靈魂更添惡業，如果不能真心懺悔自己的罪過，靈魂將繼續沉淪、墮落，永遠在仇恨、怨念中迷途，尋不回真實的自我！


    ## 與張國榮通靈接觸（一九五六年九月十二日～二〇〇三年四月一日）


    彷彿是天之驕子一般，自從一九八三年開始走紅以後，張國榮從青春偶像到百變伶王，一直都是華語世界最閃耀的巨星之一。然而，這顆讓人愛煞、羨煞的巨星，卻在一長串問號和驚嘆號之中自我了斷、結束正值巔峰的生命。


    本名「張發宗」的張國榮，祖籍廣東梅縣而生於香港，父親是著名的裁縫張活海，他是家中排行第十的老幺，受到大家的疼愛。從小到大，除了剛踏入演藝圈的前五年稍有不如意之外，從第六年轉入無線電視台開始，就一帆風順、平步青雲，總而言之，張國榮一生幾乎沒有過到什麼苦日子。


    至於在感情方面，二〇〇一年張國榮接受《時代週刊》亞洲版專訪時，大方承認自己具有雙性戀的性向。除了在二十二歲時曾向女星毛舜筠求過婚之外，二十餘年來一直有個穩定交往、關係親密的男性伴侶唐鶴德先生。即使大方公開自己的同性戀傾向，仍完全無損於張國榮在華人演藝圈的光芒和地位。這樣的一顆閃耀巨星，傳聞中卻是因為憂鬱症而跳樓輕生，讓自己以面目全非的狀態離開人世間，著實讓人難以接受。


    也有人說，張國榮在拍攝遺作《異度空間》期間，這部靈異、玄疑、愛恨交織的電影，在情節上已經把他帶入一種難以自拔的境界，甚至曾有港媒直指生性細膩、多愁善感的張國榮因為拍這部片子而「卡陰」了。無論如何，片中原本天眞無邪的小女孩，因爲失戀極度傷心而自殘、跳樓，這種讓人震撼的情節，或者在某種程度上也影響了張國榮。


    原本，在跳樓身亡前的一段日子裡，張國榮曾多次向身邊的友人提到，自己其實有很多話想向影迷、歌迷們說。然而，在他自殺時留下的遺書裡，卻只有很簡單地提到：「⋯⋯呢一年來好辛苦（這一年來很痛苦）不能再忍受⋯⋯我一生人無做壞事（我這輩子沒做過壞事）為何會這樣？」


    這樣的一個人，究竟為了什麼而痛苦？為了什麼而憂鬱？是和唐先生的感情變異？還是後悔承認自己的同志身分？到底想向影迷、歌迷說些什麼話？隨著張國榮選擇在愚人節當天跳樓輕生，這些謎團，恐怕將永遠難再得到解答。


    ### 通靈解析


    恐怕我的通靈結果，要讓許多張國榮的粉絲非常難過！我和張國榮的靈魂體，很輕易地就接上線了，因為目前他仍困在地球上，很不快樂，充滿了憂愁、鬱悶，在深沉的哀愁中極渴望找到一個人傾訴。


    張國榮的靈魂體對我傳達了這樣的訊息：「我很疲倦、匱乏，而且也很恐懼、害怕，無法相信任何人。即使到現在，我的憂鬱還是無法解開。」'
