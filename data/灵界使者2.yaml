    \ 因果業力面面觀\n\n## 何謂因果？\n\n### 累世因果造就的業力，對今生運勢有何影響？\n\n常常有人問我說，究竟什麼是因果？為什麼前世乃至於累世造就的因，要影響到今生的一切呢？有沒有可能擺脫累世因果所造成的影響，活出真正屬於自己的人生？也有許多人問我，今生我明明是個好人，為何要為前世的所作所為付出代價？又問，前世的我，真的做過那些我已經毫無印象並和現在毫無關聯的事嗎？果真如此，我又該如何知道自己的前世今生呢？\n\
    \n如果要以簡單的方式來講，我認為因果之間所存在最直接的定律，就是：「有因必有果。」只要種下一個「因」，就必然有一個相對應的「果」產生。因跟果之間的關係就像是「作用力」與「反作用力」，有多大的能量投射出去，必然有同等的力量反射回來。\n\
    \n在宇宙中有一種平衡法則，說的就是這個道理。就像是鐘擺在擺動的狀況，無論它擺向左邊的力量有多強，必然有對等的力量擺向右邊。而當能量最終被平衡時，鐘擺就回歸到中心點，在中心點靜止的當下，就呈現「空性」的狀態——不生不滅、不垢不淨、不增不減，這就是無業力的狀態。當我們進入到無業力的狀態，這時是能量最充沛的時候，因為無業力並非無能量，而是能量的零極限。在零極限的狀態當中，充滿了千變萬化的可能性，這也是最終的神性。\n\
    \n在生命過程中，我們無時無刻都面臨著做抉擇的機會，擺在你我面前的，往往是雙岔、三岔甚至是多岔路口，每一種選擇都將導致後續不同的結果，而起心動念之間，一個「因」就已經種下。思想是「因」的初始，這就是「動機」，而「動機」呢？動機就是我在這裡所謂的「業」。每一個生在地球上的人都有各自的業力，我們的業力被儲存在我們的靈魂體當中，就好像是驅動程式一般，你也可以看做是我們的潛意識，潛意識主宰著我們的喜怒哀樂，並且帶領著我們做下每一個選擇，即使你以為自己只是漫無目地隨緣下的一個決定，這背後都潛藏著你的「業」所產生的強大驅動力。\n\
    \n不過，因果之間形成與糾葛的過程，可就不是：「種善因、得善果」或者「諸惡莫作，眾善奉行」那麼單純而已。因為，因和果之間是一種「連鎖反應」，在不同的「因」交叉連續撞擊之下，產生各種方向迥異的「果」。不同的「果」又交互作用，再成為另外的因，就這麼一直延續下去，無止無盡。一輩子作用不完，繼續累積到下輩子、下下輩子，直到我們被沉重的業力所淹沒，再也無法清明與清晰地看透事物的本質與真相，而隨著業力流轉無法自拔。\n\
    \n舉個例子來講，當你看到路邊有個殘障人士拿個碗在乞討，因為心懷悲憫而在碗中丟入十元硬幣，當下看來，應該是你為自己種下了一個善因；然而在故事的另一面，說不定殘障人士其實是詐騙集團的班底，他們就是利用眾人的愛心在詐財為惡，你所投入的十元，也許就被用來做壞事，甚至匯入下一個龐大犯罪計畫的資本之中。或許你要為自己辯解，自己只是一片好心而施捨，別人怎麼運用根本與你無關。那麼，我不禁要反問你，在沒有確定那枚十元硬幣的去向和用途之前，你又如何確定自己放入碗中的舉動，是發善心、種善因呢？你的起心動念是做善事，但卻助長了壞的影響力量，這樣究竟是做了好事還是壞事呢？\n\
    \n讓我再舉一個發生在我客戶身上的一個實例：這位懷著愛心的太太來找我的時候，整個人已經疲累不堪，她說她很愛狗，所以發心要救流浪狗。為了救也救不完的流浪狗，她租下了一個山坡地圈起來蓋了間狗舍，裡頭有數百隻她從各地搶救而來的狗兒。每個月光是租金加上飼料費用就要好幾十萬元，這也使得她早已傾家蕩產，負債上百萬。我問她為什麼要救這麼多的流浪狗？她說狗狗不救很可憐，這些沒人要的狗若是不救，就會被政府抓走安樂死，她是抱著能救一隻是一隻的心態在做善事。我問她那資金來源怎麼辦？她說她也很想去給郭台銘下跪，看能不能有財團發善心願意幫助這些流浪狗。\n\
    \n其實，我舉的這兩個例子，看起來很弔詭，卻能夠很直接指出一個道理——我們不一定知道善惡的真相是什麼。我們多數的人早已經在層層疊疊是非善惡、因果循環當中，不但迷失了自己的智慧，也有可能誤導了他人。就像是這位救流浪狗的太太，為了救狗而負債數百萬，她的一顆慈悲心卻為自己種下了「負債」、「貧窮」、「無安全感」、「筋疲力竭」的不良程式，這樣到底算是做對了還是做錯了呢？\n\
    \n因果果不斷地交織成一種連鎖的反應，從最初始開始運作，這種驅使能量運動的力量就是「業力」。每個人人生來都有自己累生累世的「業力」，不論過去世我們做過些什麼或想過些什麼，這些思想波被分門別類儲存於一所大型資料庫當中，就像是佛家稱爲獨立於「眼、耳、鼻、舌、身、意」之外的「阿賴耶識」。每一世的每一刻，凡有任何動念、言行、施受，都像電腦excel程式一樣，一條一條序列分明地記錄下來。即使人的生命逝去、肉體腐朽，今生的感觀與感覺完全消失，但「業」（阿賴耶識）仍然追隨著靈魂穿梭前生來世，「萬般帶不去，惟有業隨身」就是這個道理。\n\
    \n所謂「前生造業今生受」，很多人從出生開始，周遭環境就存在許多不利於生存的條件，諸如：出身貧寒、資質魯鈍、不得人緣、求學謀生困難、所求不順遂等，這些皆爲累世的業力所造成；又或者，本來看似一帆風順的人，在生命中某個時間點，突然沒來由、無預警地運勢急轉直下，像是有些人爆發了財務危機、有些人有了外遇、有些人得了難治的病症：這些看似突發的狀況，其實都是過去種下的因，經過長期連鎖反應所產生出的不良業力。\n\
    \n關於我們被自身的因果業力所纏繞的理論，也許有些人會不苟同，認為只要靠著自己的力量，任何事都能在自己的掌握之中，而且任何事都會成。我遇過不少很鐵齒的人，說著什麼不相信命運啦、因果啦，還認為像這種很佛教的理論只會造成大家的宿命。如果你也很鐵齒，請你扪心自問，基於理性和生物的基本求生原則，你會存心故意去做錯事、做壞事、做蠢事嗎？但這種事偏偏就是會在你手中「不小心」、「碰巧」做出來，所謂「智者千慮，必有一失」，這種人力無法掌控的、得失之間的不經意與不小心，就是因果業力的顯現。\n\
    \n前一陣子很流行的一本書《祕密》，造成了熱賣轟動，這本書中的觀念很簡單，就是心想事成的吸引力法則，只要你真心相信、並且去吸引它、執行它，你的夢想就會實現。不過這本書中沒有提到的面相，是每個人的因果業力如何扭曲了我們的夢想，延遲了我們得到幸福的時間。若是按照心想事成功祕密法則的運作，這世界上一定都是幸福快樂又富有之人，但為什麼不是每一個人都既幸福快樂又富有呢？有一句話叫做「事與願違」，只光靠想像力是不夠的，還必須清除掉我們自身的不良業力，才能在生命中活出美好。\n\
    \n總之，業力的存在是人類無法避免的，除了自己的起心動念，更多的是來自於父母祖先的家族業力遺傳，或者因為感情糾葛而承接了對方的業力影響。有時人與人之間只要有稍微頻繁的互動、比較深刻的承諾，有合作的形式或是發生了性愛的關係，哪怕只是一夜情，都必然導致業力的發生與加重。\n\
    \n在這個文明的社會中卻有許多精神疾病的人：憂鬱症、躁鬱症、上癮症、自閉症、過動症、人格分裂症、幻想症，這些都是在靈魂的能量頻率上出了問題所導致的現象。如果你以爲自己很正常，並沒有什麼不良業力，也沒有精神問題，但你可能總是無法待在一段關係當中而不斷想要劈腿，或是你有批判他人的習性、對人說謊，時常害怕、忿怒、感覺自我的價值很低，這些都是讓人不自覺的不良業力，也會影響著你的運勢。\n\
    \n解釋到這邊，相信你應該就可以瞭解，為什麼因果、業力和你今生的運勢、遭際有著密不可分的關聯性了吧！\n\n## 藉著消除不良業力，化解當前的逆境，開展運勢的坦途\n\
    \n我想要以更簡單的方式來解釋「業力」這東西，在我的定義當中，「業力」也分好的業力與壞的業力。凡是起心動念產生出好的行動力量，這就是好的業力程式，反之就是不好的業力程式。一個人的靈魂體當中，一定是好好壞壞的業力程式都有，好的業力程式越多的人，自然就有好的福報，因為他所投射的皆為好的，而一個惡運連連的人又該責怪誰呢？\n\
    \n我常常對許多想要改變運氣的人們說，運勢不是靠著命理師嘰哩咕嚕念幾句經咒，或者燒幾紙符咒、幾箱紙錢就能改善或開展的。我想要舉一個我自身的例子來鼓勵大家切勿迷信，大家都知道我曾經因為父親的緣故而揹上了官司，在那八年打官司的過程中，我簡直吃盡了苦頭，也不斷地求神問卜希望求得解脫之道。在那期間有一位朋友介紹我一位道行高深的老師，說是可解救我，我遂專程去找她。這位女老師可以與神明溝通，在她碎碎唸了一段時間，也代我向神明請示之後，說是要燒化某數量的紙錢可解官司，按照老師的說法我是卡到了冤親債主，現在必須要回饋給無形的鬼魂才有得解。我從下午一直又跪又拜，還燒了一卡車的紙錢，直到深更半夜，最後的官司結果還是要進去關。在那時的我還不似現今如此有智慧，能參透因果的道理，只一味地想著自己這麼有孝心，為何神明菩薩都不幫忙我呢？\n\
    \n現在我明白了因果業力自有它運作的法則，我既然已抱定了為父親承擔的因，又怎麼能夠不去承受該受的果呢？如果殺人放火作奸犯科都能靠著命理師唸唸燒燒符化解掉，那大家都可以不負責任的過生活了。但這就不是我們來到地球的目的：學習去為自已的一言一行負起全部的責任。\n\
    \n如何能夠有效率的生活著，並且為自已的人生創造更多的幸福？我認為最重要的一件事，就是要清除生命中一直帶來負面影響力量的「不良業力程式」。換句話說，如果人生是一部電腦，「不良業力程式」就是各種的病毒，病毒可以讓電腦無法良好運行，甚至當機、故障、成為廢物，「不良業力程式」也會讓人空轉、停滯，甚至走向毀滅。在許多的不良業力程式當中，有一種程式是「自殺程式」，當事人會沒由來的厭世、憎恨自己。有一些品學兼優的好學生，最後卻選擇跳樓結束生命，就是「自殺程式」在起作用，這個程式若不清除，此人只要一遇到挫折、不如意就會想去死，真的很可怕。\n\
    \n如果想要擺脫人生當中的不如意，活出一個圓滿的人生，「清除不良業力程式」實在是太重要了！揹著沉重包袱的人，無法抬頭遠眺，無法快速前進，無法攀登高峰，只有拿掉包袱，才能身輕如燕、盡其在我、大展拳腳、實現生命當中的夢想。我在清除了自己的「不良業力程式」之後，就得著了一個很棒的老公，也有了很幸福的家庭，這都要歸功於所有聖靈團隊的努力，幫我找出負向的程式去做清除。\n\
    \n當不好的程式被清除乾淨之後，靈魂體就會開始轉好，好像是你的靈魂做了一次靈性的手術，移除了讓你變笨變慢的程式之後，當然就開始變快變聰明，而變快變聰明就代表著更具有競爭力，不論是在賺錢或是感情方面，你會發現自己更圓融也更有智慧去處理一切事物。我在幫自己清除了「逃避」與「無安全感」這兩項程式之後，我成為了一個更好的女人與母親，也更能承擔生命帶給我的責任，因此，我也得到了最大的幸福感與滿足感。我很感謝我不再害怕，而可以去信任宇宙帶給我的豐足。\n\
    \n到目前為止，業力的清除聽起來似乎是一種很玄妙的境界，其實在遙遠的天外，你也可以說是上天、天堂或是上面，根據不同的信仰系統，各地的人類給予不同的敬稱。總之，在高處有一個光明、高等、真善淨美的空間、資訊場，其中有著許多高度智慧、高能量、高神通的高靈（也有人稱作天使、聖靈、菩薩、上師：：：），祂們分層負責並且就像是一個有效率議會在運作一般，隨時掌管、記錄著有關靈魂的一切因果資訊，鉅細靡遺地登載、審核，並採取公平、適切的措施。\n\
    \n我在幫助客戶做不良業力的清除時，必須先稟報上天，在客戶的指導靈、我的指導靈與天上的聖靈們共同運作之下，就可以查出客戶累積多世的不良業力為何。這些業力程式在移除的前一、兩天，有時我的客戶就會有明顯的感覺，有些人會感覺頭暈暈的，有些人會很想睡覺，還有些人會頭痛，這些都是聖靈已經開始運作的跡象。當我幫客戶清除了障礙與不好的程式之後，客戶會有好轉的反應，多數的人回報說，感覺壓力減輕、頭腦變快速、原本糾結的問題開始有轉機。\n\
    \n我相信聖靈是很愛我們的，當靈魂生病時，顯現在外在的就是不順利，而我們的指導靈是非常希望我們能回復元氣與旺盛的創造力。當你開始想要清除你的不良業力程式時，你就已經踏上了回歸的道路，回歸神性、回歸佛性、回歸萬有與合一。\n\
    \n最近，有一位來自台東的黎先生前來魔法命理學院，希望我幫他清除不良業力。初見面的時候，很明顯他的思維邏輯不算清晰，不但答非所問，而且一句話老是結結巴巴講了老半天還表達不清楚。我通靈幫黎先生調查之後，發現他身上所揹負的不良業力真的是錯綜複雜、根深柢固，有來自前世因果的，也有承接自祖父母的惡業，甚至還有因為幼時不愉快體驗所產生的陰影。這種種盤根錯節的不良業力，導致他出社會後幾乎處處碰壁，工作、感情兩頭沒有著落，似乎看不見人生有什麼前景。\n\
    \n在我幫黎先生做第一次的不良業力程式清除時、我的指導靈向我回報說，黎先生前世曾經有精神體不合諧的情形、在出生時又受到了腦部的創傷，這些腦細胞的損傷造成了他思緒的紊亂，也阻礙了他的學習能力。我再調查他的因果資料，發現他也承接了家族的業力；他的祖父母那一輩有自尊心低落、貧窮、不愛惜後代的不良業力，這就造成了來誕生於黎家的他，在母親的懷胎中，就有了負面的動力程式。靈魂的負向動力造就黎先生的失敗人生，這些都必須仰賴聖靈團隊的力量，才能幫黎先生做修正。\n\
    \n黎先生很信任我，即使我已經跟他說，他的問題不是那麼容易被解決，因為這牽涉到靈魂體的損傷、信念的錯誤與累世累積的障礙，但是我看得出來他相信我一定能夠幫助他。在幫他做不良業力程式清除的那一個早上，我很虔誠地向上天禱告。我請求主耶穌基督與我的聖靈團隊，將奇蹟再一次地展現在黎先生身上。我請求我的指導靈幫助我去找出他的不良業力，我記起了耶穌基督曾經說過的一句話：「在信的人，凡事都能。」我向天使議會要求：「請您們清除黎某某的不良業力！」\n\
    \n當黎先生再度造訪魔法學院時，整個人就像是變成另外一個人一般，連我的員工都覺得這真是太神奇了！黎先生講話不再結結巴巴，思緒也產生了有條不紊的現象。我問他感覺怎麼樣？他自己也說真的很神奇，這麼明顯的改變連他的家人都感覺到了。當然，黎先生還有許多根基性的問題，留待日後我再慢慢幫他解決。不過，看到黎先生的進步，我感覺聖靈團隊真的很厲害。\n\
    \n這一年來，我陸續幫助了上百位的客戶清除了他們的不良業力，許多人是感情與"
