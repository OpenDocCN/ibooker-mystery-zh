  mdcn: '## 靈界百寶箱


    如何察覺自己是否有卡陰的狀況？


    卡陰的人通常運勢會沒來由地急轉直下，做什麼事都不順遂，有些人甚至會有無故破財、急速漏財、人際紛爭的現象產生。此外，當凱莉完成了這一切，突然間覺得心情豁然開朗，她相信好友小芬應該可以放心地離去了。當凱莉告訴我這些狀況時，基於關心我立刻又通靈感應，果然發現，小芬原本憂鬱難解的亡靈，已經卸下執念，化作一道白光飄向彼岸。


    母愛真的很偉大，為了自己摯愛的孩子，竟然能夠穿越陰陽界的阻隔，克服種種關卡，只為了傳達自己愛的意念。本身做爲一個母親，其實這次的事件真的讓我感同身受，也奉勸大家，務必要爲你所愛的人，好好珍惜生命。


    ## 第二章


    心理、生理都可能出现状况，脑袋会像卡住一样，思绪不清、情绪不稳，负面能量纠缠身上什么部位，那裡就会出现病痛不适的情形。总之，卡阴就是负面能量缠身，周身磁场运势都会变调，不但自己凡事都朝不顺利的方向发展，连家人亲友都会莫名其妙产生疏离感。


    ### ◆ 什麼樣的人容易成為親友亡靈的訊息傳遞者？


    通常是比較熱心於家族公共事務、生性比較雞婆愛發言、較具同儕親族間影響力者，或者心軟、體弱多病、對靈異敏感體質者，也容易成為被選擇的對象；至於鐵齒不信鬼神、靈感度遲鈍者，因為找這種人目的不容易達成，所以不太可能成為被求助的對象。


    ### ◆ 答應鬼魂的事，一定要做到嗎？


    最好根本不要有任何的約定，因為約定之後可能必須付出的代價很大。一般人對鬼魂根本沒有制約的能力，即使本身完成了約定，但鬼魂若貪得無厭，對「交易」反悔了，普通人又能如何？所以，面對鬼魂的要求、甚至是勒索，絕對要堅定不理會，趕緊透過專業的命理老師出面處理，才能確保自身安全無虞。


    有些執迷不悟的人，迷信養小鬼、或是把鬼魂當跟班小弟，以為自己可以就此役使鬼魂或因此從靈界獲得一些便利，甚至把鬼魂當成唯一、真心的好朋友，這都是謬誤到極點的觀念，鬼魂就是陰暗、負面的能量，跟在身邊只會吸取、消耗正面的能量和運勢，絕對不可能獲得任何好處的。


    ## 住在冷氣機裡的鬼？


    一坐下來，黃先生的第一句話就是：「老師，只要能解決我的問題，無論花多少錢我都在所不惜！」感覺好像是盛氣凌人，但實際去了解他的問題，才知道他的心中是如此地焦慮、無助。


    做爲一個事業有成的大老闆，黃先生外表看起來光鮮亮麗，講起話來也是有條不紊、口若懸河，這樣一個黃金單身漢，按理講應該過著令旁人羨煞的生活。然而，在私底下，黃先生近幾年來卻飽受靈界糾纏之苦，幾乎無時無刻都在卡陰狀態當中。嚴重的程度，簡直要讓他有「生不如死」的感覺了。


    問題剛開始的時候，黃先生聽了別人的指點，認爲是祖靈方面的問題，於是想方設法改善祖墳風水，希望能平息祖先的不滿。然而，錢花下去了，能做的都做了，他依舊持續被「看不見的東西」干擾，行走坐臥之間總是諸事不順，好像有人躲在暗處專門跟他過不去，動不動就惡作劇整他一下。


    最近，讓黃先生感到最無法忍受的，如他所說是「家裡的冷氣機住了鬼」。乍聽之下似乎讓人覺得有些荒誕不經，但在黃先生口中講來，卻又像真有其事一般。一般來講，冷氣機倘若出現刺耳的雜音，或許是出廠時組裝有問題，也可能是使用日久內部零件鬆脫。總之，無論是什麼因素，總是還在常識可接受的範圍中。然而，黃先生卻說，他家冷氣機的雜音是「活」的，是有情緒的，這就有些詭異了。


    冷氣機的雜音，並不是每一次打開就會產生，反而有一種奇妙的產生模式——它總在黃先生最需要安靜的時候產生：思考時、心煩時、入睡時……就像是跟他心靈相通卻又故意唱反調。為了一探究竟，他甚至請了水電師傅把冷氣機做細部分解，逐步檢測，但卻一點問題也找不到。後來，乾脆更換一部全新的冷氣機，結果一裝上去，竟發現「惡作劇的雜音」依舊隨著他的心情產生，黃先生簡直要抓狂了！


    有一次，黃先生終於受不了失控，居然把冷氣機當成人一樣，對它惡狠狠地罵了一句髒話。說也奇怪，原本嘈雜的冷氣機居然像是「愣」了一下，安靜了片刻，隨即又繼續發出刺耳的雜音，好像是在嘲弄黃先生一樣。於是，黃先生繼續罵髒話，但是卻沒有效了，冷氣機的雜音甚至隨著他的叫罵聲而有高低起伏的韻律感。最後，黃先生舉白旗投降，他實在「罵不贏」冷氣機。


    聽完黃先生的講述，初步我排除了他是屬於精神有問題的人，因為他的遭遇雖然匪夷所思，但他的措詞用字、行為舉止都顯示他是一個有教養的正常人。而且，黃先生確實卡陰卡得很嚴重，從他一踏入學院，我就清楚感應到他的身上至少有十幾條鬼魂糾纏著，經過初步通靈，這些鬼魂都是游離於人間的孤魂野鬼，與黃先生並沒有任何因緣上的牽連，更沒有一個是他的祖靈。


    我向黃先生說完初步的通靈結果之後，他眼睛一亮露出有些興奮的表情，感覺好像是終於找到「知音」了。他說：「對、對、對！就是這些鬼，住在我的冷氣機裡面！」我耐心地向他解釋，這些鬼魂並沒有住在冷氣機裡面，而是纏在他的身上。而且，鬼魂有可能依附在佛像裡面，卻不可能住進冷氣機，因為沒有人會用香火供奉膜拜冷氣機。


    不過，家電用品因為會產生電波磁場，這種電波有可能和鬼魂的能量產生共鳴，所以鬼魂是可以操弄電器用品作弄人類、引起恐懼效應的。其實，這也是為什麼一些鬧鬼的地方，會有燈光忽明忽暗、電器自開自關的情形產生。


    感覺上黃先生的問題並不難解決，透過關老爺出面談判勸喻，我沒用多少時間，就把他全身上下糾纏的十幾條鬼魂清光、送走了。然後我告訴黃先生：「OK！可以回家吹冷氣了。」


    大約二、三天後，黃先生興奮地打電話過來：「老師，真是太神奇了！這幾天冷氣機真的沒有『叫』了！」聽到這樣的好消息，我當然也為他感到高興，可沒想到的是，事情並沒有這麼簡單。


    不到一個禮拜，黃先生又哭喪著臉來到學院，他一進門，我也大吃一驚：「怎麼身上又卡了這麼多？」才幾天沒有見，他的身上又纏了十幾條鬼魂，而且全部是「新來的」，跟之前一個重複的也沒有。真奇怪，就算是時常進出墳場的人也沒有他這麼嚴重。沒辦法，還是得要幫他一隻一隻耐心地勸走。


    我試著更透徹地替黃先生清淨他的磁場，增加護持的力量，但作用似乎不大，他總是過沒幾天就又帶著十幾個「好兄弟」來求助，它的身體就像是鬼魂的「民宿」一樣，好不容易送走一批，沒多久又有下一批陸陸續續來報到。


    於是，我深入調閱了黃先生的靈魂檔案，赫然發現這幾年當中，他的「腦門」無意中打開了。腦門就在我們頭頂的中央，是可以溝通靈界的管道，一般來講，新生兒的腦門都還沒有關閉，所以很容易受到外靈干擾而「嚇到」。絕大多數孩子會隨著年紀漸長，腦門就閉合不太再受到干擾了；少部分從小到大都不會閉合的人，可能就會成為靈媒或是乩童。而像黃先生這種，成年後腦門莫名其妙突然打開，就屬於真的很少見的例子了。這種人的困擾就是，會變成像「鬼魂吸吸機」一般的人物，就像磁鐵進入鐵砂堆，每經過一次就吸引一堆過來——大街小巷只要有游魂野鬼，看到他就會自然而然地靠過來。


    我只能無奈地對黃先生說：「這可能也是天命的一種，由於你是本身的條件引發，而非外力侵犯，所以我能幫助的程度有限，恐怕無法為你徹底改善，看來你只好試著去適應了，世界上有陰陽眼、通靈能力的人不算少數，他們也都能和鬼靈和平共處，接受吧！不接受又能如何呢？」不過，黃先生仍不願意放棄希望，於是我介紹了幾位專職治鬼驅邪的法師給他，希望能夠有所幫助。但據了解，還是沒有人能夠徹底解決他的問題。


    以卡陰的狀況來講，黃先生算是特例中的特例，不知道現在是否已經適應了？還是仍在四處流浪，尋求可以「根治」他的高人？


    ## 靈界百寶箱


    什麼樣的物品容易招聚鬼魂來居住？


    一般來講，對人世間生活還有執念迷戀的鬼魂，會想要依附在人物、空心雕像等等還保有「人」形象的物品，尤其最喜歡神佛的像，因為可藉此獲得香火的供養。


    對於家中設置神桌的人，我一直想要闡明一個觀念——神像，就好比比神明前來受香查看的一個暫時座位，坐一會兒就會離開，離開後神像就空了，若屋主是沒有修行的人，神桌就不會有天兵天將隨時護持，這時候鬼魂就容易趁虛而入，滿足一下當「神」的欲望。


    所以，一般住家根本不適合設置神桌，最好連祖先牌位都不要，只有本身有修行的人，才適合在家中供奉神祇。


    ### 居家環境應該注意些什麼，才能防止穢氣或邪靈入侵？


    倘若家裡用不到的舊電器、舊物品很多，長期堆放便會形成不好的磁場，這樣也就容易聚陰。所以，用不著的東西能清掉就盡量清掉，隨時保持居家環境窗明几淨、整齊清潔、通風流暢是很重要的。


    另外，爭吵、悲傷、怨恨等負面情緒磁場，也很可能和陰靈起感應而招聚進門。還有，本身是凶宅或近鄰是凶宅，盤踞其中的負面能量也會逐漸侵蝕靠近，導致家運不順。


    因此，為了確保磁場清淨、家運興旺，最好在家中適當的方位設置「能量風水陣」，形成守護、開運的磁場結界，自然就能招來好運、摒擋厄運。


    ### ◆走在路上，如何防止游魂野鬼靠過來？


    對於遊魂野鬼，一般人只能盡量閃避，基本上並沒有任何排拒、抵抗的能力。我所能做的建議就是，少去陰暗污穢的地方，喪宅、喪儀現場、殯儀館甚至有在燒化金銀紙的地方，都要盡可能遠離，最好遠遠看到就能提早繞道而行。尤其是正逢運勢低迷、體氣耗弱的人，或者磁場頻率接近於靈界者，鬼魂一靠過來就必定黏到身上，不撈一點好處是不肯離開的，所以這種人更要小心在意。還有，最重要的，不管在任何情況下，千萬不要試圖自己跟鬼魂打交道。


    ## 嚇！為什麼找上我？


    朋友入住新居，一般都是可喜可賀的好事，隆重其事者辦桌宴客，至少也會邀請三五好友，前來新居歡樂熱鬧一番，一方面活絡一下屋氣，另一方面也讓大家分享喜悅的氣氛。不過，如果事先沒有先做個了解就貿然前往，那麼，沾染的可就不一定是喜氣喔！


    米米是長期在學院請我幫忙調氣場的客戶，經過我的調整，有一段時間她的運氣真的很不錯，無論是工作業績還是人際關係都得心應手，儼然一副商場女強人的態勢。不過，接下來的時間裡，由於她時常奉派到國外出差開會，所以就鮮少來到學院，對於她的近況我也不太了解了。


    直到那一天米米氣急敗壞地跑來學院，我簡直快認不出她來了！那個原本神采飛揚、自信滿滿的女強人，怎麼變得臉色憔悴、印堂發黑，甚至周身籠罩在一團灰撲撲的氣場之中。


    幾乎要哭出來了，米米著急地對我說：「老師，這幾天來我的運氣實在是太糟糕了，連續『凸槌』了好幾個企劃，莫名其妙跟一些同事、好朋友吵架，連飯碗都岌岌可危了，老師，快救我！」我問她這樣的情形有多久了，她告訴我，其實自從出國機會頻繁、少來學院之後，運氣感覺就沒有原來那麼順利了，甚至身體也常常因為在外地水土不服而感染微恙。不過，這幾天以來，運氣卻真的是急轉直下，雖然時間短，所造成的損害卻讓她完全措手不及！


    我趕緊為米米通靈感應，發現她被一隻極為黑暗、汙穢的鬼魂糾纏著，而且彼此的鏈結非常緊密，兩個靈魂幾乎到達完全重疊的地步。我問她這幾天有沒有去什麼不對勁的地方，她偏頭仔細想了想，實在記不起自己有去過什麼奇怪的地方，只是在不到一個禮拜前，由於朋友喬遷新居，一群人前往慶賀，大家喝喝小酒熱鬧一下而已，當時並沒有感覺什麼異狀，也沒聽說事後有誰跟她一樣倒楣的。


    經過關老爺的指示，才知道原來那天所前往朋友的新居，其實當中一直住著一隻「地縛靈」，這個靈體被禁錮在那個房子的磁場中已經很久了，怎麼都掙脫不了，越是掙脫不了，怨念就越深。直到慶祝入住新居的那天，正好碰到時運正低、磁場耗弱的米米，雙方面的磁場一拍即合，米米把這隻地縛靈吸到身上來了，不知不覺就把它給帶出那個閉鎖許久的磁場，就這樣成為附在米米身上的附身靈。


    就在這時候，米米的一位朋友碰巧也來了學院，這個朋友之前有跟我學過一段時間的塔羅牌，具有基礎的通靈能力，那天她也跟米米一起前往慶祝了。據這個朋友證實，那間房子的確極為詭異：「我一進去就覺得渾身不舒服，坐立難安，才停留一下子就有嚴重頭暈想吐的狀況出現，我直覺地認為這間房子一定有问题，恐怕有什麼不乾淨的東西在裡面，所以只有禮貌性地寒暄一會兒就告辭離開了。」


    米米和這隻靈體的鏈結那麼緊密，處理起來頗為費事，我先用溝通的方式和它談判，是否願意和平離開米米的身體？沒想到這隻狡猾的鬼魂頗為囂張，居然說自己被禁錮太久了，如今好不容易重獲自由，暫時想要「借用」這個身體在人世間好好享樂玩耍一番，等到玩膩了、過癮了，才會考慮要不要離開。


    簡直是氣死人了，等到這隻惡鬼玩夠了，米米豈不早就被折磨得不成人形了，還有命在嗎？真是「不施霹靂手段，難顯菩薩心腸」，看來要硬碰硬了。我拿出法器給米米全身做徹底的淨化，運用靈氣讓那隻惡鬼感到痛苦。一段時間之後，它終於受不了了，「彈」出了米米的身體。原本以爲這樣做，惡鬼就該知難而退了，沒想到它居然執迷不悟，閃到了學院的門外企圖埋伏，等米米待會兒出門時再靠上去。


    面對這樣的「賴皮鬼」，我真的忍無可忍，根本是太低估正道的力量了！於是，我請出學院不輕易使用的終極能量法器鈴鐺，「噹」的一聲就把它遠遠震開了，沒想到它重傷之餘還是快速飄回來，居然在學院所在大樓的一樓大門外，飄盪徘徊不肯離去。看來，這隻邪惡的鬼魂，原本之所以成爲地縛靈，必然也是揹負著龐大的惡業才會被禁錮那麼久。如此的冥頑不靈，最後我只能請關老爺出手，把這隻惡鬼扔到偏遠縹緲的另一個空間「關禁閉」，讓它在那裡好好懺悔吧！


    完成之後，我讓米米佩帶著學院的護身寶物離開，並告誡她寶物時刻不得離身，以免在磁場運勢回穩之前，又被其他靈體乘虛而入，再度附身。


    其實，前往陌生、不熟悉的地方時，真的很應該注意，因爲你不知道自己踏進去的房子，會不會是凶宅，或者可能最近剛有人往生於其中。尤有甚者，有些凶宅根本是無跡可循的「隱藏式凶宅」，比如前屋主因為意外事件往生於外地，或是病逝於醫院，像這樣的狀況，法律上並不會將他的房子定位為凶宅。


    然而，事實上，前任屋主的亡靈因為依戀自己的居處，通常還是會魂歸於此一段時間，大致停留幾個月到一年多的時間，直到依戀的執念消失。像這種隱藏式凶宅，如果想避免與鬼同居的情形，就是在取得產權、正式入住之前，給房子的內部裝潢、格局來個大改造，徹底改頭換面，當前屋主的亡靈歸來時，會發現根本認不出來、不像是自己的房子，在感到陌生之餘，自然而然就會卸下執念離去。


    無論是前往一般凶宅還是隱藏式凶宅，如果自己剛好精神不濟、體氣虛弱，不但很可能被附身，嚴重影響往後的運勢，甚至自己的身體被當成媒介，把惡性重大的邪靈給帶出來，縱放到外面危害世人，那後果就不堪設想了——倘若惡鬼為禍造業，把它放出來的人也要負因果連帶責任的。


    還有，計畫搬新家的人也要注意，居處的水、磁場跟自己的運勢可是息息相關的，尤其是閒置很久或長期滯銷的空房子，你在短時間當中很難去了解房子的歷史或其中暗藏什麼玄機，謹慎永遠不嫌多。


    ## 靈界百寶箱


    看房子的時候，可以從哪些方面察覺房子是否「乾淨」？


    最快速的判別方式，就是一踏進去即感覺頭暈不適、難以保持平衡，情況越嚴重就表示房子裡面的負面磁場越強大；其次，有些房子才一進去就明顯感受到停滯、沉重、鬱悶的氣場，空氣中透露出汗濁、腐朽、怪異的氣味，這也是磁場不佳的現象；還有，靈體盤踞的屋宅，食物容易腐敗變質，這也是可以參考的條件之一。最保險的方式，還是請通曉風水地理的專業人士陪同看屋，更能獲得客觀正確的意見。當然，不建議找靈異敏感體質的親友一起去，因為這可能會害到他。


    租房子、買房子之前，最好還是委請通曉看屋訣竅法門的人士，先幫你了解一下屋況，看看目標屋是否真的與你相配，才能夠幫助運勢水漲船高，千萬別讓開心的事變成運勢的負擔。


    ### 閒置許久的空房子，該如何清淨磁場？


    首先，把房子內外打掃乾淨，清除無用舊物，讓採光、通風良好，屋內動線順暢；其次，重新裝潢布置，可清除穢氣，再用老師加持過的線香，順時針繞行整個屋內，早中晚三次，至少連續三天。倘若要徹底改造、淨化磁場，可全時播放一些具有心靈SPA作用、放鬆情緒好磁場的靈性音樂。


    ### 如果房子當中有地縛靈，該如何清除或請走？


    房子裡面有地縛靈，它的居住時間肯定超過即將入住的現任屋主，菜鳥憑什麼趕老鳥走呢？如果實在無法接受，那就只有自己搬家一途。我絕對不建議找法師處理地縛靈的問題，因為很多地縛靈被禁錮在這個空間當中，是因為因果業力的關係，必須到一定的年限才有辦法脫離，找法師來也無法請走，反而變成騷擾，招致怨念，彼此變成惡鄰居，生活不安穩。


    如果實在無法搬離，那就只好在同一個屋簷下、不同的空間裡，彼此和平共存、互不騷擾。有時候，改變屋氣、清淨磁場，跟屋子連結不深的靈體，也有可能自行離開。


    ## 戀鬼戀上癮


    無意間看過我的書之後，葳葳立刻就趕到學院來求助，才在我面前一坐定，她就急急忙忙地說：「老師！請您務必幫幫忙！我們家的問題真的很嚴重！」我請她稍安勿躁，遇到任何問題我都會竭盡所能幫忙，不過至少得先把問題講清楚。


    於是，葳葳定了定神說：「這個問題困擾我們家很久了，問題的來源是我妹妹，她卡陰的狀況非常嚴重，常常呆坐著自言自語，或是跟看不見的人對話。」聽了葳葳的話，我反問：「為何妳會覺得妹妹的狀況是卡陰，會不會是精神上的疾病？例如『幻聽』或是『妄想症』？」葳葳斬釘截鐵地說：「絕對不是精神病，而是真的有個鬼魂跟在她身邊，這個鬼魂甚至會向我妹妹透露家中其他人私密的事情，還會告狀說一些我們在妹妹背後所做的事情。」


    聽到崴崴所講述的狀況，她妹妹確實像是能夠透過身邊的鬼魂感應一些事情。事實上，許多養小鬼的江湖術士，就是用這種方式去刺探客戶心中的隱私或生活的經驗，藉以博取信任。於是，我請崴崴把妹妹帶到學院來，我必須當面進行通靈診斷，以便更進一步去找出問題的關鍵所在。


    幾天之後，咪咪和她的母親半哄半押地把妹妹妮妮帶到學院來。一進門，我看到妮妮一臉蒼白、毫無血色，而且眼神詭譎閃爍、畏畏縮縮，周身的能量呈現完全萎縮的狀況，無論是生理還是心理，似乎都給人極度不健康的感覺。我直覺地認為，她一定在生活中發生過什麼重大的變故。


    直視著妮妮不斷閃躲的雙眼，我以沉穩威嚴的語氣問她：「妳知道自己有卡陰嗎？」出乎意料地，她不但完全知道自己有卡陰的狀況，而且對於整個事件的來龍去脈似乎也知道得非常清楚，這真的是很特殊的一個案例。


    我在這裡做一個大概的說明，一般人在卡陰的初期，通常自己完全沒有感知的能力，總是在情況漸趨嚴重，影響到日常生活或者身體狀況時，才能有所察覺；就算是具有敏感體質的人，即使一開始就知道自己卡到陰，但絕大多數還是無法知道是「誰」跟隨或依附在自己身邊，總是需要具有通靈能力的人代為溝通確認，才能有效解決問題。像妮妮這樣，長久以來就對本身卡陰情況瞭若指掌的人，難道……她是自願的？


    果然，妮妮仔細回憶起自己卡陰的緣起，大約兩年前，她曾經前往某家知名保險業務公司應徵工作，負責面試的主管當時見她姿容秀麗、體態誘人，心裡立刻起了邪念，當場就說些不三不四的言語挑逗她，甚至有性騷擾的舉動。接下來的日子裡，妮妮發現，自己不知道為什麼，開始不由自主地接受那位主管的指令，不但在公司辦公室和對方發生肉體關係，而且還多次出外開房間上床。妮妮甚至語出驚人地說：「就是那位主管，化身成靈體一直跟在我身邊，和我談天、分享心事。其實今天他也跟著來了，只是走不進學院，現在在外面等我。」


