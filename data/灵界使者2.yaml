    當下，我請助教忻宜為妮妮進行「七脈輪寶石治療」。然而，才一躺上療癒的床，妮妮卻像是渾身長了蟲子一樣，扭動個不停，直嚷著「不舒服」、「躺不住」，惡狠狠地瞪著忻宜說：「妳們是誰？為什麼把這些東西擺在我身上？我討厭這些東西，快拿開！這麼強的能量讓我好不舒服！」才說完，妮妮又立刻恢復自己原來的樣子，不好意思地說：「很抱歉，剛才那些話不是『我』說的。」躺了一下子，妮妮又突然兇狠狠地咆哮：「好啊！妳們給我記住，老子現在先離開，我不會就這樣放過她的！」


