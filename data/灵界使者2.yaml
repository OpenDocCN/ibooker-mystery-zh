- img_proc: true
  md: '# 開運十大步驟


    +   - 安桃花位、紅鸞位

    - 施魔法於屋氣中改變頻率（旺財、旺愛情、旺事業……）


    在達到改善、提升屋氣，使房子的磁場歸於正向之後，接下來就要更加強房子對居住者守護、招福、開運的能量脈動，最有效的方式，就是由我根據每一位不同的客戶，所量身打造、精心設置的「風水能量佈陣」。


    具體的作法，完全不同於坊間制式的风水堪輿，我是使用接收磁場訊號的通靈系統來判定風水。有時即使是不用親臨現場，只要客戶提供住宅或辦公地址，我即能探測到該處的风水磁場為何。這是因為每一處宅所都有一種能量波，藉由接收從宇宙傳來的訊號，就能知道它適合怎樣的方式來著手佈陣。


    總而言之，風水的能量磁場，可以藉由魔法加持過的水晶或寶物來活化其創造力與活力。這對於無力搬遷或者無法更動改善住宅座向的人而言，是最省錢、便利又有效的方法。


    至於選擇何種水晶寶物以及如何佈一個開運陣法，則有賴於我和指導靈與關老爺'
  merge: -1
