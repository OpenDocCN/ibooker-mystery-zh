    因果果不斷地交織成一種連鎖的反應，從最初始開始運作，這種驅使能量運動的力量就是「業力」。每個人人生來都有自己累生累世的「業力」，不論過去世我們做過些什麼或想過些什麼，這些思想波被分門別類儲存於一所大型資料庫當中，就像是佛家稱爲獨立於「眼、耳、鼻、舌、身、意」之外的「阿賴耶識」。每一世的每一刻，凡有任何動念、言行、施受，都像電腦excel程式一樣，一條一條序列分明地記錄下來。即使人的生命逝去、肉體腐朽，今生的感觀與感覺完全消失，但「業」（阿賴耶識）仍然追隨著靈魂穿梭前生來世，「萬般帶不去，惟有業隨身」就是這個道理。


