    所謂「恩主」，就是指對蒼生有「恩」、為百姓作「主」的神祇，從遠古時代就已經存在這種稱呼，可以說是極高的一種神明位階或職銜，包括：玄天上帝、孚佑帝君⋯⋯都曾經榮膺這個職位，受到廣大信眾的稱頌，而關聖帝君就是現任的恩主公。


    在歷史上，關聖帝君——關雲長，乃是文武兼備、義薄雲天的知名武將，曾經傳下許多令人感佩、深植民心的英勇史蹟，可以說是「忠、誠、勇、義」的化身。因此在成神之後，千百年來始終受到民心的擁戴和信奉，成為正氣、正道的代表。


