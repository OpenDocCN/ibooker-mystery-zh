  md: '# 因果業力面面觀


    關係就像是「作用力」與「反作用力」，有多大的能量投射出去，必然有同等的力量反射回來。


    在宇宙中有一種平衡法則，說的就是這個道理。就像是鐘擺在擺動的狀況，無論它擺向左邊的力量有多強，必然有對等的力量擺向右邊。而當能量最終被平衡時，鐘擺就回歸到中心點，在中心點靜止的當下，就呈現「空性」的狀態——不生不滅、不垢不淨、不增不減，這就是無業力的狀態。當我們進入到無業力的狀態，這時是能量最充沛的時候，因為無業力並非無能量，而是能量的零極限。在零極限的狀態當中，充滿了千變萬化的可能性，這也是最終的神性。


    在生命過程中，我們無時無刻都面臨著做抉擇的機會，擺在你我面前的，往往是雙岔、三岔甚至是多岔路口，每一種選擇都將導致後續不同的結果，而起心動念之間，一個「因」就已經種下。思想是「因」的初始，這就是「動機」，而「動機」呢？動機就是我在這裡所謂的「業」。每一個生在地球上的人都有各自的業力，我們的業力被儲存在我們的靈魂體當中，就好像是驅動程式一般，你也可以看做是我們的潛意識，潛意識主宰著我們的喜怒哀樂，並且帶領著我們做下每一個選擇，即使你以


