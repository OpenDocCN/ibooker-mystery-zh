    ### 累世因果造就的業力，對今生運勢有何影響？


    常常有人問我說，究竟什麼是因果？為什麼前世乃至於累世造就的因，要影響到今生的一切呢？有沒有可能擺脫累世因果所造成的影響，活出真正屬於自己的人生？也有許多人問我，今生我明明是個好人，為何要為前世的所作所為付出代價？又問，前世的我，真的做過那些我已經毫無印象並和現在毫無關聯的事嗎？果真如此，我又該如何知道自己的前世今生呢？


    如果要以簡單的方式來講，我認為因果之間所存在最直接的定律，就是：「有因必有果。」只要種下一個「因」，就必然有一個相對應的「果」產生。因跟果之間的'
