    ## 【通靈筆記】第一章 勇闖陰陽界


    ### 被鬼魂挾持的女人


    因為長期感情上的不如意，小琪到處求神問卜，跑遍了各地的宮廟神壇。不過，香油添了，金紙也燒了，銀子花了大把，感情姻緣還是一點著落也沒有。不但如此，她發現自己其他的運勢也開始低落，沒來由的諸事不順，連身體狀況也糟了起來。


    當小琪上門求助時，我竟然發現她的身邊纏滿了鬼魂，龐大的負面能量壓得她幾乎要透不過氣了。雖然，所有的鬼魂沒一個膽敢跟著小琪踏入學院一步，但卻仍徘徊在門外四周，等著她離開時再靠上去糾纏。


    奇怪，我心想，小琪說她常常求神拜佛，究竟是怎麼拜的，居然拜到卡陰卡得這麼嚴重？透過關老爺的調查，才發現，原來小琪來找我之前，曾經去找過一位崇拜動物靈的江湖術士。


    所謂的術士，其實連稱做法師都不夠資格，因為他們根本並未領有天命，只是偶然學到了一些與鬼靈溝通、或役使低階動物靈的方法，便覺得掌握了什麼神通，自己入了邪道，也藉此斂財害人。小琪所碰上的術士，就是打著動物靈的名號騙財騙色，這次就是垂涎小琪的美色，在訛詐了她不少金錢供奉之後，還想進一步染指，於是招引了大量的鬼魂糾纏小琪，想讓她因為依賴而無法脫離，任其予取予求，卻不顧這樣的做法會讓小琪運勢、健康受到極大的損壞，完全只是想逞一己之私慾而已。


    當小琪發現苗頭不對，已經太晚了，負面的能量已經籠罩全身，精神萎靡、運勢低落。幸好，她有緣來到學院，像這種天理不容的事情，我一定要幫她解決的。我運用魔法為小琪灌輸光明能量，讓她能夠不受邪氣的侵犯，但是我告訴她：「這只是暫時的，因為光明能量在妳身上還是會慢慢消散的。所以，除了要定期補充能量之外，最好能搬離現在的住處，對方不知道妳的居處，就無法再對妳隔空施法，這樣才能徹底擺脫邪術的糾纏。畢竟，我是沒有辦法二十四小時跟在妳身邊保護的。」


    照著我說的乖乖去做之後，小琪的磁場和生活總算慢慢回穩，在學院的持續幫助之下，她也終於找到了穩定的感情並且論及了婚嫁，多年的渴望、幸福，終於來向她招手了。


    沒想到，那個術士居然還不肯罷手，原本即將到嘴的肥肉，他豈肯功虧一簣就這麼讓她溜走？透過多方打聽調查，居然從小琪的某個老朋友口中套出了她的新地址。


    這次他決定痛下殺手，居然召喚了「五鬼」向小琪發出凌厲的攻勢，這五鬼可不是一般的鬼魂，而是怨念深重、惡性重大的五條厲鬼。


    攻勢來得如此突然，再加上洶湧而來的負面能量太過強大，居然衝破了我為小琪在居處佈下的風水防禦陣勢，事情就這麼發生了⋯⋯


    根據小琪事後的回憶，當天的情形是這樣的：「我本來和未婚夫在逛街，突然他接到電話，臨時有緊急公務必須回公司處理，我只好先回家等他下班來接我一起吃飯。」回到家之後，小琪沒來由地感到非常疲憊，全身痠軟無力，看到床鋪立刻倒頭睡得不省人事。直到夜幕低垂，一陣電話鈴聲把小琪吵醒，接起來，另一端是未婚夫已經到樓下準備接她一起去享用晚餐。但是不知道為什麼，一覺醒來的小琪完全變了一個人，粗暴地叫未婚夫不要管她、不要吵她，心裡驀然升起一個念頭：「人生好絕望，我好想死、我好想死⋯⋯」強大的負面能量重壓在心頭，思想和動作越來越不受自己主宰，眼看著她逐漸向窗邊走去⋯⋯


    小琪在電話中的反常讓未婚夫湯先生嚇壞了，由於他知道小琪有卡陰的先例，於是趕緊打電話到學院向我求救。我立刻通靈請示，知道事態緊急，趕緊要湯先生無論如何一定要立刻把小琪帶到學院來。當湯先生破門而入時，小琪已經攀到窗台上，極可能遲個幾秒鐘悲劇就發生了。雖然及時發現，但要把小琪從窗台上勸下來、扯下來可也費了好一番工夫，她不斷抗拒，力氣大得異乎尋常，而且彷彿完全不認識自己的未婚夫了。


    用了九牛二虎之力，湯先生總算把小琪「架」到學院來了，看到她坐在椅子上惡狠狠地瞪著每個人，完全不是平常溫柔婉約的模樣。我看著她，眼前的人外表雖然仍然是小琪，但是神態、語調完全是另一個人，甚至大剌剌地根本不是一個女人了。關老爺告訴我，小琪的腦波完全被五條厲鬼控制住了，而她的靈魂也在住家被禁錮住了，不趕快去救她，說不定會魂飛魄散、貽害終身。


    情形這麼嚴重，說不得，我必須要親自出馬了。還記得那天我用寶物先鎮住小琪之後，請助教忻宜陪同湯先生一起看顧她。我則是請我老公和我一起前往小琪的住處，畢竟是晚上了，我一個女人家前往陌生地方，不怕鬼也要怕壞人。


    踏入小琪住的地方，我直趨她的臥室，立刻就被五條厲鬼包圍，它們像旋風一般在我身邊迴繞不停，房子內部也跟著颳起異樣的氣旋，所有門窗開開闔闔，乒乒乓乓響個不停，似乎是想給我來個下馬威，幸好我叫老公在外面等我，要不然他一定會嚇壞了。


    在關老爺的護持之下，我的態度很強硬，開門見山向那五條厲鬼表示：「這邊是有關老爺的力量罩著的，立刻放過小琪，否則就準備硬碰硬被收伏！」厲鬼們一開始還有點不甘示弱：「我們一出馬，是不可能空手而回的！」我繼續威嚇它們：「你們有所求，就回去找召喚你們的人，小琪是我們學院的客戶，絕不允許你們傷害她，更不可能讓你們牽走她的魂魄。」對付惡鬼，絕不能用姑息、賄賂的做法，而是要義正詞嚴、態度堅決，用光明正大的力量逼退或消滅它們。這五條厲鬼大概是自知不敵，沒有硬碰硬的本錢，只好不甘不願地知難而退。如果照我所說的，它們回去反噬那個江湖術士，那他的下場一定會很慘，這就是所謂的「作法自斃」！


    很神奇的，當厲鬼退去的同時，小琪就恢復正常了。我一回到學院，就看到小琪已經神智復原，雖然還是覺得很疲憊無力，對於睡醒後以及如何來到學院的一切記憶，也是完全空白，但我心中的一塊大石頭總算放下了。


    在這裡我要奉勸諸位讀者，求神問卜一定要慎選光明慈悲的地方，亂求亂拜，不但得不到保佑，反而很容易被邪惡力量趁虛而入，變成任人宰割的對象，後果可就不堪設想囉！


    ### 靈界百寶箱


    **如何判別命理老師正派與否？**


    首先，要注意看老師是否擁有良好的人格品質，這一點，可以從工作地點環境陳設是否潔淨、舒適，或者是雜亂無章、讓人感覺晦暗不舒服，這雖然是細節，卻可以由此覺察老師的個性和思緒取向。


    此外，好的老師不會用恐嚇威脅的方式讓客戶心生畏懼，藉以矇騙金錢，也不會一昧推銷遊說，以斂財為務。在專業服務的部分，無論是以任何方式進行命理解析，都不會提供不確定、模稜兩可的答案，這一點，可以在諮詢過程中，從本身的感覺去體驗準確度。以收費標準來看，如果過度偏離常規（太低或太高），就是不合理的現象，單以命理諮詢而言，大約一個小時一至三千元的收費標準屬正常範圍。


    **鬼魂即將靠近或侵犯時，是否有任何徵兆？**


    鬼魂容易影響人心，所以當有鬼魂靠近時，心情會瞬間大幅低落，行走坐臥都心神不寧，無法提起精神、做事情無法專心，稍具敏感體質者，會有頭暈想吐的狀況。


    **身邊若有親友出現被鬼附身的狀況，是否有緊急應變措施？**


    當然要先確定究竟是鬼魂附身，還是精神方面的問題？若是精神疾病應儘速就醫，以免延誤治療。倘若確定是鬼魂附身，可以先泡鹽水澡，因為鬼魂不喜歡鹽，有時泡了鹽水澡就能讓鬼魂自行離去。其次，可以用由老師加持過的除穢香，以逆時針繞圈的方式，清除周身的穢氣。


    倘若上述兩種方法無法奏效，表示附體的負面能量極為強大，應趕緊尋找正確的專業人士進行處理，千萬不要試圖自己進行談判溝通，因為鬼魂通常都不會認真遵守承諾，賄賂和求情都是行不通的，需要由具法術通靈能力的人，以義正詞嚴的態度進行驅離。


    ## 轉世的日本軍官


    初次見到愛麗的時候，我就覺得她似乎「怪怪的」，老是喜歡自言自語，有時候是自問自答，有時候又像是身邊有人在跟她耳語。一開始，我還以爲她是幻聽、幻覺的患者，曾經誠懇地請她不妨尋求醫藥的幫助。


    不過，隨著接觸的日漸頻繁，我發現愛麗的狀況遠比我想像的嚴重，而且極不尋常。無論是談話中還是工作中，愛麗常常會突然不自覺地罵人或唱歌，當然，有人會覺得或許這是某種強迫症或是安瑞氏症，但讓人想不透的是，愛麗所罵的是日本話、唱的是日本歌，並且不只是一些隻字片語，而是長篇大論，突兀的行徑讓她成了衆人眼中的「怪咖」。然而，無辜的是，愛麗完全不懂日本話，而且罵完、唱完之後，她一點也記不起自己有過這些舉動，彷彿「怪咖的愛麗」和「正常的愛麗」，是徹底剝離的兩個人。


    雖然，原本愛麗是因為財運事業不順才來到學院找我幫忙的，但在多次以魔法幫助她卻達不到預期效果時，我逐漸注意到，問題的關鍵並不在於她一時的運勢不順，而是她本身與生俱來的因果業力所致。我深入愛麗的靈魂檔案徹底查究，發現居然有好幾條帶著怨念的鬼魂是從她出生時就跟在身邊的。


    向愛麗提起我的調查結果時，她一時之間頗爲震驚，隨即不好意思地低頭自己向我承認，其實這是她從小就藏在心裡面數十年的祕密。打從懂事開始，愛麗的身邊就一直有奇怪的聲音圍繞著，彷彿一群生氣的人不分晝夜地在斥責她，甚至還會有人用日本話跟她說話。雖然愛麗從來沒有學過日本話，但當耳際響起日本話時，她卻能自然而然地搭腔，即使完全搞不懂自己在說些什麼。隨著年歲漸長，愛麗的情況越來越變本加厲，就算身邊沒有雜音干擾，她也會三不五時突然腦袋一片空白，而在旁人的眼中，放空時的愛麗，其實是在唱歌或跟自己對罵。


    長期以來被這種怪異的情形干擾著，又難以向旁人啓齒求助，使得愛麗的個性也變得孤僻詭異，難怪會諸事不順，人生陷入低潮。看來，想要真正幫上愛麗的忙，就要從關鍵處著手，在因果當中尋求解決之道。


    不過，當我從心裡動念想要幫助愛麗時，坐在對面的她似乎也有所感應，剎那間臉色大變，表情變得陰狠猙獰，跟著兇惡地瞪著我，開始用粗野的語調罵起日本話來。與此同時，突然有好多靈體從愛麗身上冒出，向我撲過來，開始在我身邊盤旋圍繞，一起七嘴八舌地罵起來。當時我處變不驚，定下心神跟這些靈體溝通，透過思想的交流，才知道它們是在威脅我不要「多管閒事」！


    我很訝異為何這些靈體滿懷仇恨和怨念，於是一邊運用本身的能量之光壓制住它們，一邊耐心與之溝通探究。原來，愛麗的前世是日據時代一個殘忍嗜殺的日本軍官，在戰爭期間不斷殺戮姦淫，造下不少惡業。由於殺孽太重，被害者怨念難以平息，群聚在一起不願輪迴投胎，寧願化作冤魂跟著來到今世，發誓要作弄今世的愛麗直到她發狂自殺為止，而且這一世還不夠，一條人命一世還，生生世世都要折磨她。


    一時之間籌思不出妥善的解決辦法，我只能先把這些怨靈驅逐出學院，並且要助教忻宜趕緊為愛麗安排「七脈輪寶石治療」。沒想到，忻宜一邊為她進行七脈輪，她卻一邊用日本話咆哮辱罵忻宜，真是讓人又好氣又好笑。在這同時，我立刻通靈請示關老爺，該如何救助愛麗。


    更出乎意料的是，關老爺居然阻止我幫助愛麗，原因是：既然我有幸領受天命而能夠通徹明瞭前世今生，對於因果就應該要宏觀、持平。今生的愛麗雖然可憐，那前世被日本軍官無辜殺害的人，難道就不可憐嗎？愛麗之所以前生罪孽深重而還能轉世為人，就是造化的安排，要她在今生行善積德化解冤孽和惡業。如果強制以法力為她消除那麼龐大的業力，結果就是造成因果秩序大亂，也違背了我們維持陰陽界平衡、公正的宗旨，所以，貿然插手是萬不可行的。


    完成「七脈輪寶石治療」之後，愛麗暫時恢復了穩定，但我卻不知該如何告訴她，我對她的情形愛莫能助。經驗告訴我，像愛麗這樣長期封閉孤僻的人，心中必然已經充滿了自怨自艾、憤世嫉俗的錯誤觀念，想要勸服她需要靠自己的努力才能解決問題，一時之間恐怕是難以辦到的。然而，我又擔心愛麗在有所覺醒之前，就被那些怨靈整垮而有生命危險，於是我介紹她去拜訪另一位專職於驅魔治鬼的法師，並請助教護送她過去。臨別時，我諄諄告誡愛麗，當狀況有所改善時，一定要再回來與我詳談，很可惜，從此以後我沒有再見過她。


    想不到，忻宜在護送愛麗回來之後，居然生了一場怪病，到處打針吃藥也不見好轉，醫生也檢查不出個所以然來。我驚覺這一定是因為她的靈異敏感體質，在護送愛麗的過程中，沾染了怨靈的汙穢磁場，導致怪病纏身。我趕緊施法為她淨身治療，總算逐漸恢復了健康。


    直到現在，我仍不時想起愛麗曲折坎坷的境遇，不知道她的狀況改善了嗎？希望她已經敞開心胸，走上行善積德的光明道路了。


    ### 靈界百寶箱


    **當耳際突然有看不見的人對我說話，該如何判定是否為靈界的訊息？**


    如果聽到的是無意義、無意識的訊息，只是單純要驅使自己去做某些事（去尋短、去狂吃），那大致就可判定是心理上的問題，非靈界的訊息。鬼魂傳達的訊息，若是有因果冤仇者，通常是語氣憤恨、辱罵叫囂，而有事相託者，則會強烈傳達讓人清楚感應訊息。


    **累世的因果業報，可以祈求神明代為化解或清除嗎？**


    雖然神明有這樣的能力，但一般神明大多不願介入因果造業的糾葛，因為這也有可能形成它們本身的業障，妨礙修行和提升。只有具備無上慈悲願力的高階神明，會在情況特殊時幫忙化解因果業報，例如：觀音上師的「觀音法門擴大療癒」，或是西方天使聖靈團透過調閱天界議會的因果資料，幫助清除不良業力程式。


    **靈異敏感體質的人，平時該做什麼自保的的措施？**


    最重要抱定一個宗旨「井水不犯河水」，不主動挑釁。就我的觀點而言，容易卡陰者平常可以配戴學院中的加持寶物，因為加持者的正氣，以及導引灌入宇宙間的正面能量，自然而然會跟負面、陰暗的能量形成區隔，鬼魂當然也就難以靠近。平常家中也可以使用加持過的薰香，以順時針的方式給居家磁場做淨化，不過，千萬不能使用普通未加持的線香，因為這樣做反而會招來不明的過路靈體。


    事實上，包括燒普通香、金銀紙、陳設供桌等等動作，我強烈建議一般人日常居家都不該進行，因為這都是招待鬼魂、請靈體來做客的行為，只會受到騷擾跟後續勒索，根本不會被保佑。


    ## 放不下的母愛


    服務於八大行業的凱莉，雖然在林森北路過著燈紅酒綠的夜生活，但在個性上卻很刻苦自律，對朋友、姐妹淘也很講義氣，是大家眼中的好大姐。


    長久以來，凱利一有空就會來到學院要我幫她調整運氣，灌注財運魔法，再加上工作需要難免喝酒熬夜，所以她也會進行「七脈輪寶石治療」，以便讓自己的身體磁場循環順暢。尤其，在配戴學院的招財寶物手鍊之後，凱莉覺得自己的運氣真的變好了，無論是打牌、划拳幾乎都連戰皆捷，贏錢、小費無形中讓她的收入大幅增加。就這樣，凱莉對學院的信仰與日俱深，一直跟我們維持很不錯的友誼。


    有一天，凱莉突然打電話給我，很著急地說：「老師，我好像卡陰了，怎麼辦？」我聽了也大吃一驚，便請她盡速趕到學院。凱莉才一坐下，我直覺地就認爲事態嚴重，因為她整個人都不對勁了。初步一測就發現凱莉全身所有的脈輪全都卡住了，而且連靈異敏感體質的助教忻宜才一靠近她，立刻就感應到狀況很不尋常。


    究竟為什麼會覺得自己卡陰了，凱利喝了口茶，將緣由娓娓道來：「這一、兩個禮拜當中，我突然莫名其妙覺得房子裡多了一個人，而且彷彿亦步亦趨地跟著我上上下下，那種多了一雙眼睛盯著自己看的感覺，真的很不自在。原本我搞不清楚究竟是被誰跟了，但是整整一個禮拜以來，我幾乎不論碰到誰，都會跟我提起一個已經在半年多前往生的好姐妹小芬。」


    小芬是凱莉最要好的姐妹之一，大約半年多前，因為感情的因素，一時想不開而輕生自殺了，由於走得很突然，所以幾乎沒有留下隻字片語。雖然當初事情發生的時候，凱莉非常地悲慟惋惜，但是大半年的時間過去了，她也已經逐漸淡忘了這不愉快的回憶。偏偏就在凱莉開始感覺卡到陰的同時，她幾乎逢人就會被問起：「最近有想起小芬嗎？」、「之前妳跟小芬怎樣怎樣……」、「妳有夢到過小芬嗎？」


    說也奇怪，凱莉還真的在這個禮拜當中連續兩個晚上夢到小芬。夢中出現的都是過去的場景，兩人一起出遊，吃喝玩樂、談天說笑等等。夢裡面的小芬栩栩如生，恍如從來沒有離開過，只是她的眉宇之間彷彿鎖著淡淡哀愁，感覺心裡面有什麼鬱結放不開。把最近的遭遇跟夢境連結起來，凱莉覺得滿腹疑竇，這是不是一種「提示」？會不會跟在身邊的鬼魂就是小芬？


    為了確定狀況，我立刻就通靈幫凱莉調查，發現她的身邊果然跟著一個靈體。雖然只有一個，但是卻靠凱莉靠得很近。透過意念的溝通，我問那個靈體：「請問，你是小芬小姐嗎？」對方很肯定回答：「是的。」


    當我把結果告訴凱莉時，她頓時驚駭莫名，幾乎從椅子上跳起來，有些歇斯底里地說：「小芬，我跟妳是那麼好的姐妹，幹嘛回來嚇我啦？」我連忙先安撫凱莉的情緒，並解釋給她聽：「親友的亡靈會在短時間內頻繁密集地來接觸，通常並不會有害人的意圖，大概都是有事相託，或者有什麼訊息要傳達。」


    經過持續與小芬的靈體溝通後，我問凱莉：「小芬是不是有什麼親人一直讓她罣礙，放不下心的？」凱莉睜大了眼睛點頭說：「沒錯！她還有一個在念小學的女兒。」看來，這就是問題的關鍵所在。


    為了瞭解小芬女兒的近況，凱莉趕緊和小芬的親姐姐聯絡。當凱莉前往拜訪，並硬著頭皮向小芬的姐姐解釋來意時，對方立刻就大吃一驚。因為，大約一個多禮拜前，也就是跟凱莉開始感覺卡陰差不多的時候，小芬的姐姐接到了孩子打來求救的電話。


    原來，在小芬自殺往生之後，她的孩子就跟著爸爸過活，不過爸爸很快地就和另一個女人在一起，據了解，「後母」對孩子態度很不好，一點也不關心她。於是，孩子忍不住哭著打電話找阿姨，也就是小芬的姐姐訴苦，她說她好思念媽咪，希望阿姨帶她去看媽咪。


    或許就是母子連心，小芬的亡靈感應到了孩子的呼喚，它深怕孩子過得不快樂，也怕孩子在這種環境下成長，未來會不順遂、人格不健全，所以只好找上了生前最要好的姐妹凱莉，希望凱莉出面關心、幫助孩子。


    於是，凱莉召集了小芬的家人，要他們正視孩子的狀況，並隨時從旁付出關懷、施予援手。跟著又帶小女孩去給媽咪上香。上香的同時，也向孩子轉達了母親的訊息——當初媽咪不會想，所以才沒有珍惜生命離妳而去，現在媽咪也很後悔，對不起！寶貝妳要乖乖長大，媽咪會一直守護妳的。'
  mdcn: '# 因果業力面面觀


    人際上面的問題，在做完程式清除之後，關係確實有好轉。還有些客戶想要改善他們的事業與金錢運勢，如果一個人有靈魂體上的創傷或是承襲了家族業力，想要改善狀況就必須要找出深層問題。我最高興的事就是看到我的客戶奇蹟似的轉變，與其燒香拜拜、求神問卜，不如真正的把自身的問題治療好，這會帶來靈性的成長，也會讓你周邊的人受益。


    因果之間所存在最直接的定律，就是：「有因必有果。」


    因跟果的關係就像是「作用力」與「反作用力」，有多大的能量投射出去，必然有同等的力量反射回來。


    ## 【通靈筆記】第一章 勇闖陰陽界


    ### 被鬼魂挾持的女人


    因為長期感情上的不如意，小琪到處求神問卜，跑遍了各地的宮廟神壇。不過，香油添了，金紙也燒了，銀子花了大把，感情姻緣還是一點著落也沒有。不但如此，她發現自己其他的運勢也開始低落，沒來由的諸事不順，連身體狀況也糟了起來。


    當小琪上門求助時，我竟然發現她的身邊纏滿了鬼魂，龐大的負面能量壓得她幾乎要透不過氣了。雖然，所有的鬼魂沒一個膽敢跟著小琪踏入學院一步，但卻仍徘徊在門外四周，等著她離開時再靠上去糾纏。


    奇怪，我心想，小琪說她常常求神拜佛，究竟是怎麼拜的，居然拜到卡陰卡得這麼嚴重？透過關老爺的調查，才發現，原來小琪來找我之前，曾經去找過一位崇拜動物靈的江湖術士。


    所謂的術士，其實連稱做法師都不夠資格，因為他們根本並未領有天命，只是偶然學到了一些與鬼靈溝通、或役使低階動物靈的方法，便覺得掌握了什麼神通，自己入了邪道，也藉此斂財害人。小琪所碰上的術士，就是打著動物靈的名號騙財騙色，這次就是垂涎小琪的美色，在訛詐了她不少金錢供奉之後，還想進一步染指，於是招引了大量的鬼魂糾纏小琪，想讓她因為依賴而無法脫離，任其予取予求，卻不顧這樣的做法會讓小琪運勢、健康受到極大的損壞，完全只是想逞一己之私慾而已。


    當小琪發現苗頭不對，已經太晚了，負面的能量已經籠罩全身，精神萎靡、運勢低落。幸好，她有緣來到學院，像這種天理不容的事情，我一定要幫她解決的。我運用魔法為小琪灌輸光明能量，讓她能夠不受邪氣的侵犯，但是我告訴她：「這只是暫時的，因為光明能量在妳身上還是會慢慢消散的。所以，除了要定期補充能量之外，最好能搬離現在的住處，對方不知道妳的居處，就無法再對妳隔空施法，這樣才能徹底擺脫邪術的糾纏。畢竟，我是沒有辦法二十四小時跟在妳身邊保護的。」


    照著我說的乖乖去做之後，小琪的磁場和生活總算慢慢回穩，在學院的持續幫助之下，她也終於找到了穩定的感情並且論及了婚嫁，多年的渴望、幸福，終於來向她招手了。


    沒想到，那個術士居然還不肯罷手，原本即將到嘴的肥肉，他豈肯功虧一簣就這麼讓她溜走？透過多方打聽調查，居然從小琪的某個老朋友口中套出了她的新地址。


    這次他決定痛下殺手，居然召喚了「五鬼」向小琪發出凌厲的攻勢，這五鬼可不是一般的鬼魂，而是怨念深重、惡性重大的五條厲鬼。


    攻勢來得如此突然，再加上洶湧而來的負面能量太過強大，居然衝破了我為小琪在居處佈下的風水防禦陣勢，事情就這麼發生了⋯⋯


    根據小琪事後的回憶，當天的情形是這樣的：「我本來和未婚夫在逛街，突然他接到電話，臨時有緊急公務必須回公司處理，我只好先回家等他下班來接我一起吃飯。」回到家之後，小琪沒來由地感到非常疲憊，全身痠軟無力，看到床鋪立刻倒頭睡得不省人事。直到夜幕低垂，一陣電話鈴聲把小琪吵醒，接起來，另一端是未婚夫已經到樓下準備接她一起去享用晚餐。但是不知道為什麼，一覺醒來的小琪完全變了一個人，粗暴地叫未婚夫不要管她、不要吵她，心裡驀然升起一個念頭：「人生好絕望，我好想死、我好想死⋯⋯」強大的負面能量重壓在心頭，思想和動作越來越不受自己主宰，眼看著她逐漸向窗邊走去⋯⋯


    小琪在電話中的反常讓未婚夫湯先生嚇壞了，由於他知道小琪有卡陰的先例，於是趕緊打電話到學院向我求救。我立刻通靈請示，知道事態緊急，趕緊要湯先生無論如何一定要立刻把小琪帶到學院來。當湯先生破門而入時，小琪已經攀到窗台上，極可能遲個幾秒鐘悲劇就發生了。雖然及時發現，但要把小琪從窗台上勸下來、扯下來可也費了好一番工夫，她不斷抗拒，力氣大得異乎尋常，而且彷彿完全不認識自己的未婚夫了。


    用了九牛二虎之力，湯先生總算把小琪「架」到學院來了，看到她坐在椅子上惡狠狠地瞪著每個人，完全不是平常溫柔婉約的模樣。我看著她，眼前的人外表雖然仍然是小琪，但是神態、語調完全是另一個人，甚至大剌剌地根本不是一個女人了。關老爺告訴我，小琪的腦波完全被五條厲鬼控制住了，而她的靈魂也在住家被禁錮住了，不趕快去救她，說不定會魂飛魄散、貽害終身。


    情形這麼嚴重，說不得，我必須要親自出馬了。還記得那天我用寶物先鎮住小琪之後，請助教忻宜陪同湯先生一起看顧她。我則是請我老公和我一起前往小琪的住處，畢竟是晚上了，我一個女人家前往陌生地方，不怕鬼也要怕壞人。


    踏入小琪住的地方，我直趨她的臥室，立刻就被五條厲鬼包圍，它們像旋風一般在我身邊迴繞不停，房子內部也跟著颳起異樣的氣旋，所有門窗開開闔闔，乒乒乓乓響個不停，似乎是想給我來個下馬威，幸好我叫老公在外面等我，要不然他一定會嚇壞了。


    在關老爺的護持之下，我的態度很強硬，開門見山向那五條厲鬼表示：「這邊是有關老爺的力量罩著的，立刻放過小琪，否則就準備硬碰硬被收伏！」厲鬼們一開始還有點不甘示弱：「我們一出馬，是不可能空手而回的！」我繼續威嚇它們：「你們有所求，就回去找召喚你們的人，小琪是我們學院的客戶，絕不允許你們傷害她，更不可能讓你們牽走她的魂魄。」對付惡鬼，絕不能用姑息、賄賂的做法，而是要義正詞嚴、態度堅決，用光明正大的力量逼退或消滅它們。這五條厲鬼大概是自知不敵，沒有硬碰硬的本錢，只好不甘不願地知難而退。如果照我所說的，它們回去反噬那個江湖術士，那他的下場一定會很慘，這就是所謂的「作法自斃」！


    很神奇的，當厲鬼退去的同時，小琪就恢復正常了。我一回到學院，就看到小琪已經神智復原，雖然還是覺得很疲憊無力，對於睡醒後以及如何來到學院的一切記憶，也是完全空白，但我心中的一塊大石頭總算放下了。


    在這裡我要奉勸諸位讀者，求神問卜一定要慎選光明慈悲的地方，亂求亂拜，不但得不到保佑，反而很容易被邪惡力量趁虛而入，變成任人宰割的對象，後果可就不堪設想囉！


    ### 靈界百寶箱


    **如何判別命理老師正派與否？**


    首先，要注意看老師是否擁有良好的人格品質，這一點，可以從工作地點環境陳設是否潔淨、舒適，或者是雜亂無章、讓人感覺晦暗不舒服，這雖然是細節，卻可以由此覺察老師的個性和思緒取向。


    此外，好的老師不會用恐嚇威脅的方式讓客戶心生畏懼，藉以矇騙金錢，也不會一昧推銷遊說，以斂財為務。在專業服務的部分，無論是以任何方式進行命理解析，都不會提供不確定、模稜兩可的答案，這一點，可以在諮詢過程中，從本身的感覺去體驗準確度。以收費標準來看，如果過度偏離常規（太低或太高），就是不合理的現象，單以命理諮詢而言，大約一個小時一至三千元的收費標準屬正常範圍。


    **鬼魂即將靠近或侵犯時，是否有任何徵兆？**


    鬼魂容易影響人心，所以當有鬼魂靠近時，心情會瞬間大幅低落，行走坐臥都心神不寧，無法提起精神、做事情無法專心，稍具敏感體質者，會有頭暈想吐的狀況。


    **身邊若有親友出現被鬼附身的狀況，是否有緊急應變措施？**


    當然要先確定究竟是鬼魂附身，還是精神方面的問題？若是精神疾病應儘速就醫，以免延誤治療。倘若確定是鬼魂附身，可以先泡鹽水澡，因為鬼魂不喜歡鹽，有時泡了鹽水澡就能讓鬼魂自行離去。其次，可以用由老師加持過的除穢香，以逆時針繞圈的方式，清除周身的穢氣。


    倘若上述兩種方法無法奏效，表示附體的負面能量極為強大，應趕緊尋找正確的專業人士進行處理，千萬不要試圖自己進行談判溝通，因為鬼魂通常都不會認真遵守承諾，賄賂和求情都是行不通的，需要由具法術通靈能力的人，以義正詞嚴的態度進行驅離。


    ## 轉世的日本軍官


    初次見到愛麗的時候，我就覺得她似乎「怪怪的」，老是喜歡自言自語，有時候是自問自答，有時候又像是身邊有人在跟她耳語。一開始，我還以爲她是幻聽、幻覺的患者，曾經誠懇地請她不妨尋求醫藥的幫助。


    不過，隨著接觸的日漸頻繁，我發現愛麗的狀況遠比我想像的嚴重，而且極不尋常。無論是談話中還是工作中，愛麗常常會突然不自覺地罵人或唱歌，當然，有人會覺得或許這是某種強迫症或是安瑞氏症，但讓人想不透的是，愛麗所罵的是日本話、唱的是日本歌，並且不只是一些隻字片語，而是長篇大論，突兀的行徑讓她成了衆人眼中的「怪咖」。然而，無辜的是，愛麗完全不懂日本話，而且罵完、唱完之後，她一點也記不起自己有過這些舉動，彷彿「怪咖的愛麗」和「正常的愛麗」，是徹底剝離的兩個人。


    雖然，原本愛麗是因為財運事業不順才來到學院找我幫忙的，但在多次以魔法幫助她卻達不到預期效果時，我逐漸注意到，問題的關鍵並不在於她一時的運勢不順，而是她本身與生俱來的因果業力所致。我深入愛麗的靈魂檔案徹底查究，發現居然有好幾條帶著怨念的鬼魂是從她出生時就跟在身邊的。


    向愛麗提起我的調查結果時，她一時之間頗爲震驚，隨即不好意思地低頭自己向我承認，其實這是她從小就藏在心裡面數十年的祕密。打從懂事開始，愛麗的身邊就一直有奇怪的聲音圍繞著，彷彿一群生氣的人不分晝夜地在斥責她，甚至還會有人用日本話跟她說話。雖然愛麗從來沒有學過日本話，但當耳際響起日本話時，她卻能自然而然地搭腔，即使完全搞不懂自己在說些什麼。隨著年歲漸長，愛麗的情況越來越變本加厲，就算身邊沒有雜音干擾，她也會三不五時突然腦袋一片空白，而在旁人的眼中，放空時的愛麗，其實是在唱歌或跟自己對罵。


    長期以來被這種怪異的情形干擾著，又難以向旁人啓齒求助，使得愛麗的個性也變得孤僻詭異，難怪會諸事不順，人生陷入低潮。看來，想要真正幫上愛麗的忙，就要從關鍵處著手，在因果當中尋求解決之道。


    不過，當我從心裡動念想要幫助愛麗時，坐在對面的她似乎也有所感應，剎那間臉色大變，表情變得陰狠猙獰，跟著兇惡地瞪著我，開始用粗野的語調罵起日本話來。與此同時，突然有好多靈體從愛麗身上冒出，向我撲過來，開始在我身邊盤旋圍繞，一起七嘴八舌地罵起來。當時我處變不驚，定下心神跟這些靈體溝通，透過思想的交流，才知道它們是在威脅我不要「多管閒事」！


    我很訝異為何這些靈體滿懷仇恨和怨念，於是一邊運用本身的能量之光壓制住它們，一邊耐心與之溝通探究。原來，愛麗的前世是日據時代一個殘忍嗜殺的日本軍官，在戰爭期間不斷殺戮姦淫，造下不少惡業。由於殺孽太重，被害者怨念難以平息，群聚在一起不願輪迴投胎，寧願化作冤魂跟著來到今世，發誓要作弄今世的愛麗直到她發狂自殺為止，而且這一世還不夠，一條人命一世還，生生世世都要折磨她。


    一時之間籌思不出妥善的解決辦法，我只能先把這些怨靈驅逐出學院，並且要助教忻宜趕緊為愛麗安排「七脈輪寶石治療」。沒想到，忻宜一邊為她進行七脈輪，她卻一邊用日本話咆哮辱罵忻宜，真是讓人又好氣又好笑。在這同時，我立刻通靈請示關老爺，該如何救助愛麗。


    更出乎意料的是，關老爺居然阻止我幫助愛麗，原因是：既然我有幸領受天命而能夠通徹明瞭前世今生，對於因果就應該要宏觀、持平。今生的愛麗雖然可憐，那前世被日本軍官無辜殺害的人，難道就不可憐嗎？愛麗之所以前生罪孽深重而還能轉世為人，就是造化的安排，要她在今生行善積德化解冤孽和惡業。如果強制以法力為她消除那麼龐大的業力，結果就是造成因果秩序大亂，也違背了我們維持陰陽界平衡、公正的宗旨，所以，貿然插手是萬不可行的。


    完成「七脈輪寶石治療」之後，愛麗暫時恢復了穩定，但我卻不知該如何告訴她，我對她的情形愛莫能助。經驗告訴我，像愛麗這樣長期封閉孤僻的人，心中必然已經充滿了自怨自艾、憤世嫉俗的錯誤觀念，想要勸服她需要靠自己的努力才能解決問題，一時之間恐怕是難以辦到的。然而，我又擔心愛麗在有所覺醒之前，就被那些怨靈整垮而有生命危險，於是我介紹她去拜訪另一位專職於驅魔治鬼的法師，並請助教護送她過去。臨別時，我諄諄告誡愛麗，當狀況有所改善時，一定要再回來與我詳談，很可惜，從此以後我沒有再見過她。


    想不到，忻宜在護送愛麗回來之後，居然生了一場怪病，到處打針吃藥也不見好轉，醫生也檢查不出個所以然來。我驚覺這一定是因為她的靈異敏感體質，在護送愛麗的過程中，沾染了怨靈的汙穢磁場，導致怪病纏身。我趕緊施法為她淨身治療，總算逐漸恢復了健康。


    直到現在，我仍不時想起愛麗曲折坎坷的境遇，不知道她的狀況改善了嗎？希望她已經敞開心胸，走上行善積德的光明道路了。


    ### 靈界百寶箱


    **當耳際突然有看不見的人對我說話，該如何判定是否為靈界的訊息？**


    如果聽到的是無意義、無意識的訊息，只是單純要驅使自己去做某些事（去尋短、去狂吃），那大致就可判定是心理上的問題，非靈界的訊息。鬼魂傳達的訊息，若是有因果冤仇者，通常是語氣憤恨、辱罵叫囂，而有事相託者，則會強烈傳達讓人清楚感應訊息。


    **累世的因果業報，可以祈求神明代為化解或清除嗎？**


    雖然神明有這樣的能力，但一般神明大多不願介入因果造業的糾葛，因為這也有可能形成它們本身的業障，妨礙修行和提升。只有具備無上慈悲願力的高階神明，會在情況特殊時幫忙化解因果業報，例如：觀音上師的「觀音法門擴大療癒」，或是西方天使聖靈團透過調閱天界議會的因果資料，幫助清除不良業力程式。


    **靈異敏感體質的人，平時該做什麼自保的的措施？**


    最重要抱定一個宗旨「井水不犯河水」，不主動挑釁。就我的觀點而言，容易卡陰者平常可以配戴學院中的加持寶物，因為加持者的正氣，以及導引灌入宇宙間的正面能量，自然而然會跟負面、陰暗的能量形成區隔，鬼魂當然也就難以靠近。平常家中也可以使用加持過的薰香，以順時針的方式給居家磁場做淨化，不過，千萬不能使用普通未加持的線香，因為這樣做反而會招來不明的過路靈體。


    事實上，包括燒普通香、金銀紙、陳設供桌等等動作，我強烈建議一般人日常居家都不該進行，因為這都是招待鬼魂、請靈體來做客的行為，只會受到騷擾跟後續勒索，根本不會被保佑。


    ## 放不下的母愛


    服務於八大行業的凱莉，雖然在林森北路過著燈紅酒綠的夜生活，但在個性上卻很刻苦自律，對朋友、姐妹淘也很講義氣，是大家眼中的好大姐。


    長久以來，凱利一有空就會來到學院要我幫她調整運氣，灌注財運魔法，再加上工作需要難免喝酒熬夜，所以她也會進行「七脈輪寶石治療」，以便讓自己的身體磁場循環順暢。尤其，在配戴學院的招財寶物手鍊之後，凱莉覺得自己的運氣真的變好了，無論是打牌、划拳幾乎都連戰皆捷，贏錢、小費無形中讓她的收入大幅增加。就這樣，凱莉對學院的信仰與日俱深，一直跟我們維持很不錯的友誼。


    有一天，凱莉突然打電話給我，很著急地說：「老師，我好像卡陰了，怎麼辦？」我聽了也大吃一驚，便請她盡速趕到學院。凱莉才一坐下，我直覺地就認爲事態嚴重，因為她整個人都不對勁了。初步一測就發現凱莉全身所有的脈輪全都卡住了，而且連靈異敏感體質的助教忻宜才一靠近她，立刻就感應到狀況很不尋常。


    究竟為什麼會覺得自己卡陰了，凱利喝了口茶，將緣由娓娓道來：「這一、兩個禮拜當中，我突然莫名其妙覺得房子裡多了一個人，而且彷彿亦步亦趨地跟著我上上下下，那種多了一雙眼睛盯著自己看的感覺，真的很不自在。原本我搞不清楚究竟是被誰跟了，但是整整一個禮拜以來，我幾乎不論碰到誰，都會跟我提起一個已經在半年多前往生的好姐妹小芬。」


    小芬是凱莉最要好的姐妹之一，大約半年多前，因為感情的因素，一時想不開而輕生自殺了，由於走得很突然，所以幾乎沒有留下隻字片語。雖然當初事情發生的時候，凱莉非常地悲慟惋惜，但是大半年的時間過去了，她也已經逐漸淡忘了這不愉快的回憶。偏偏就在凱莉開始感覺卡到陰的同時，她幾乎逢人就會被問起：「最近有想起小芬嗎？」、「之前妳跟小芬怎樣怎樣……」、「妳有夢到過小芬嗎？」


    說也奇怪，凱莉還真的在這個禮拜當中連續兩個晚上夢到小芬。夢中出現的都是過去的場景，兩人一起出遊，吃喝玩樂、談天說笑等等。夢裡面的小芬栩栩如生，恍如從來沒有離開過，只是她的眉宇之間彷彿鎖著淡淡哀愁，感覺心裡面有什麼鬱結放不開。把最近的遭遇跟夢境連結起來，凱莉覺得滿腹疑竇，這是不是一種「提示」？會不會跟在身邊的鬼魂就是小芬？


    為了確定狀況，我立刻就通靈幫凱莉調查，發現她的身邊果然跟著一個靈體。雖然只有一個，但是卻靠凱莉靠得很近。透過意念的溝通，我問那個靈體：「請問，你是小芬小姐嗎？」對方很肯定回答：「是的。」


    當我把結果告訴凱莉時，她頓時驚駭莫名，幾乎從椅子上跳起來，有些歇斯底里地說：「小芬，我跟妳是那麼好的姐妹，幹嘛回來嚇我啦？」我連忙先安撫凱莉的情緒，並解釋給她聽：「親友的亡靈會在短時間內頻繁密集地來接觸，通常並不會有害人的意圖，大概都是有事相託，或者有什麼訊息要傳達。」


    經過持續與小芬的靈體溝通後，我問凱莉：「小芬是不是有什麼親人一直讓她罣礙，放不下心的？」凱莉睜大了眼睛點頭說：「沒錯！她還有一個在念小學的女兒。」看來，這就是問題的關鍵所在。


    為了瞭解小芬女兒的近況，凱莉趕緊和小芬的親姐姐聯絡。當凱莉前往拜訪，並硬著頭皮向小芬的姐姐解釋來意時，對方立刻就大吃一驚。因為，大約一個多禮拜前，也就是跟凱莉開始感覺卡陰差不多的時候，小芬的姐姐接到了孩子打來求救的電話。


