    「我覺得指導靈對我來說，就是一種安定心靈的力量，也是生命中最能夠完全信任的後盾。祂告訴我，不需要懷疑、不需要憂慮，神的力量是確實存在的，我只要全心全意去接受、體驗跟見證。果然，有指導靈的照顧，一切擔憂都是多餘的，心想事成。」


    「我就快要結婚了，這份可貴的姻緣也是來自上天的恩澤，指導靈告訴我，結婚是我人生當中一個極為重要的里程碑，婚後一定會越來越幸福的。未來，我想自己一定還是要持續接受指導靈給我的建議，繼續去感受、見證這神奇的力量。」


    - **欣欣的指導靈說**：「設定自己的目標，並且持續朝向目標堅定地前進，最終必然達至成功。」


    欣欣說：「堅持！我一定要堅持！我曾經活在慌亂、沒有主見當中，感覺生命茫然沒有方向感。所幸有指導靈引導我，祂告訴我：『雖然面前有那麼多條道路讓人迷惑，但是只要心懷正念，就能夠選出正確的那一條，就能夠走上正途。』」


    「我相信目前所走著的道路就是正途，現在的我充滿自信、不疑不懼，雖然現在周遭仍然有不少的外力想要拉扯我、迷惑我，想要讓我偏離正道走入歧途，但我一定會繼續遵循指導靈的教誨，把持住自我，努力去學習，即使不是短時間內就能成功，我還是會努力不懈的！」


    - **信穎的指導靈說**：「靈性成長與實務工作同等重要，你必須在兩者之間達到平衡點，缺少任何一邊都會造成失衡。」


    信穎說：「指導靈告訴我，最近我在工作上的表現很努力、很積極，這是值得鼓勵的；但是，在心靈方面卻沒有任何進步，反而因為忙於工作而呈現少許退步、負成長的現象。聽到這樣的指示，雖然心中難免會有一些沮喪，但我還是很感謝指導靈這麼關心我，就像我最親密的朋友一樣，督促我、幫我注意到自己疏忽的地方。」


    「很久之前指導靈也曾經指點過我，本身的條件很適合去修習提升心靈的學問，既然我自己也有著濃厚的興趣，就應該排除萬難去安排時間從事相關活動。」


    「這次，指導靈又再一次這樣提醒我，讓我想通了，無論日常工作再怎麼忙碌，接下來我都一定要撥出空閒的時間，去報名靈性修行的課程。」


