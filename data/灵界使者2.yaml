    碼。\n如果手機號碼在五大要素中通過檢測皆為正能量時，恭喜！這是一支可以讓主人\n開運興旺的手機號碼。而如果手機號碼在五大要素中的任何一項存有負面性能量時，\n\
    建議趕緊選擇換一支好的手機號碼來增強您的運勢發展。\n\n## 步驟六\n運勢撐竿跳——障礙清除、逆轉勝\n\n曾幾何時，你是否感覺自己的生活當中，有些許的不順心，這種全面性的運勢低落，有可能是因為在您的業力磁場中，沾染上了負能量。這些負能量可能是累積了許多年的負面思考、錯誤的信念、家族負向業力承襲、或者是環境當中的不好磁場。\n\
    當一個人帶著這些負能量時，往往會在工作上引發挫敗與無力感、健康上顯化出病癥與疲累、感情上呈現停滯不動或情緒化。當這些負向業力深刻地影響一個人時，當事人會感到所求不能如願的阻礙感。\n\
    感謝上天賦予我神奇能力，讓我能夠接通宇宙間愛的能量，使奇蹟發生——也就是「魔法障礙清除」，這是一項特殊的障礙清除法，施行魔法之人必須通過上天層層的考驗、帶著良善之心去助人，這樣的人才是上天所揀選的。\n\
    \n在客戶接受「魔法障礙清除」時，我會同步幫助他檢測個人的靈能趨向，並且在聖靈的指導下，運用白水晶之光、純白之光、花精保護靈氣打通周身磁場，清除沾染在氣場中的黑色雜質。\n\
    經過「魔法障礙清除」之後，就可以運用水晶靈擺同步驗證自己的磁場，已經由負向的逆轉成為正向的轉動。帶著正向與光亮的驅動力，在生活中逐漸感到全面的好轉。不少客戶感激地表示，他們經由「魔法障礙清除」，慢慢地感覺到運氣變好、好事持續發生、歡笑與喜悅出現、事業有所突破、身體健康平衡、生活平安順遂。\n\
    \n### ◆《魔法障礙清除》適用對象\n\n- 運勢低落不順心\n- 失業、負債、遇不到貴人\n- 事業一直出狀況、沒有好機會與好人才\n- 感情關係拉扯、分分合合、感覺傷心\n\
    - 財運進展不順、經常有拖延變數\n- 突如其來的厄運\n- 被他人惡意下符咒\n- 身體不適但又找不到原因、活力降低、常生病\n- 憂鬱、愁苦、煩躁及其他心理狀況的不適\n\
    - 家人關係不合、無法溝通\n- 自信心低落、無法全面性表達自我意見\n- 卡住的感覺、能量不流通\n- 其他的不順心\n\n除了「魔法障礙清除」之外，「逆轉勝魔法全方位整合」也是一項可以快速催化能量、幫助運勢更上層樓的法門。這項「逆轉勝魔法全方位整合」是由指導靈們協助指導，在地球完成的光波治療項目，特別針對脈輪氣場紊亂失衡者、運勢低迷不順遂者、想要增強運勢者、被邪靈干擾附身者、罹患慢性病與重大疾病而需要緊急救助者、情緒崩潰與心靈失調者、重大情感或事業創傷、或其他需要聖靈緊急導引光波救助者。\n\
    \n此光波療法旨在於運用光束改變個人能量體的頻率，清除沾附在靈魂體上之負能量，讓細胞與靈氣充滿彩光，導正所有的不合協與低頻率，讓身心靈重新回復新生的能量。\n\
    \n一直以來，我總是與助教忻宜通力合作，齊心為客戶服務，希望運用「魔法障礙清除」以及「逆轉勝魔法全方位整合」兩種充滿靈性的療程，讓上主之光重回到客戶身上，並就此開啓重生之道，只要願意接受聖靈的幫助，奇蹟就會發生。\n\
    \n## 步驟七\n### 能量大作戰——寶物佩戴\n\n凡是從「沈嶸老師魔法命理學院」所購買的魔法手鍊、項鍊、水晶寶物、珍貴寶石等，每一項皆是由我精心挑選、檢測能量，確保交至客戶手上時，寶物的頻率皆為一百分的正能量。不過，當我為寶物灌入「好運魔法」或「特殊魔法」時，這個寶物的內部頻率結構就已然被改變，灌入魔法的寶物已被光波活化而變得敏銳、敏感，周遭的磁場若是有不良因素，皆容易改變寶物的能量場，而使得寶物的魔法淡化消失。\n\
    \n在佩戴魔法寶物的時候，就像是為自己的靈魂體配置了一顆超強的「好運電池」，自一戴上寶物的剎那，正能量就開始輸送至周身的頻率場，源源不絕地幫助佩戴者吸引來好的人、事、物。不過，就像電池根據不同新舊程度、耗電率的電器，而有不同的使用效率，魔法寶物的魔法有效時間，也會依個人狀況而定。通常氣運越低者，消耗掉魔法的時間越快，大致上用肉眼就可以判定魔法是否還儲存在寶物內，通常寶物看起來不像剛買時那麼透亮乾淨時，就是魔法已經有了相當程度的耗損。\n\
    \n所以，我總是建議佩戴寶物的客戶，最好每週回來學院一次，將珍愛的魔法寶石再次地交給我作淨化導正，這會使得疲憊的寶石能再次充電，將好運加強至一百分，也可以使得佩戴者的運程一直保持在良好穩定的狀態。\n\
    \n若是魔法寶石因為太久未淨化充電，因而沾染上負能量，我就不建議再繼續佩戴了。通常過度耗損的魔法寶石，寶石的色澤會像被吸乾一樣呈現灰暗慘白的狀況，這時就需要對寶石做緊急拯救。但即使急救之後，有時也無法全然地將寶石恢復到當初的美觀，所以持之以恆地經常回來學院，按時將魔法寶石淨化充電，才能讓寶石始終保持在最佳狀況，避免永久性的損害，能量的守護也將長保周全、飽滿。\n\
    \n### ◆ 魔法寶物須知\n\n• 寶石自灌入魔法之後，就不可讓其他人碰觸，以免沾染上他人之負能量。\n• 洗澡與睡眠要將貼身之魔法寶物取下，平常皆可佩戴。\n\
    • 最好連續戴上一至三個月爲佳，讓正能量不間斷運作。\n• 在家取下的魔法寶物，最好放置在學院精選的水晶充電器上持續充電。\n• 若是無購買水晶充電器，則可將寶物放置在床頭或清淨之處。\n\
    • 魔法寶物與水晶充電器需要定期拿回學院淨化與導正，確保正能量。\n• 若是魔法寶物已戴至慘白變色，務必趕緊拿回學院作緊急處理。\n• 若是將一百分的魔法寶物送給他人，他人將得到一百分的好運氣。\n\
    \n## 步驟八\n小卒變英雄——不良業力清除\n\n幾乎每一個靈魂體都是經過累世轉生而來，因此在進入地球時，皆帶有我們與過去世相關人、事、物與情境，由於因緣糾纏而產生的不良業力程式。這些業力程式，往往在今生阻礙了靈魂的清晰度與進展程度，造成生活當中難以突破的問題不斷重新上演，成為宿命般的惡性循環。不良業力程式可能在累世中的任一時刻造成，諸如：前世、轉世之間，今生或是靈魂體創造之時。\n\
    不良業力程式可能在靈魂體上造成創傷、印記、慣性行為與無意識反應等影響，也可能承襲自家族的業力而形成不良的遺傳因果，諸如暴力與上癮症。過多的不良業力程式，會帶來意識層面的混亂、匱乏感與無意識的失敗感。這些不良業力程式若是不被解碼清除，會造成靈魂體沉重的負擔，導致財運、事業、感情、家庭、健康與人際關係的連鎖性問題。\n\
    此外，我們也可能在過去世的因果當中，因為與某某人的糾紛、惡緣、施受不當而創造了不良業力程式，諸如：不信任的問題、分手的問題、怨恨的問題、不公平的問題、無安全感的問題、欺騙外遇問題等負面氣場。這些不良業力程式將在累世中造成因果糾葛的纏繞，使得當事人無法明晰地在生活中創造幸福感與富足感。\n\
    一般來講，不良業力程式大致可以歸類爲幾個大項：\n\n| 金錢不良程式 | 感情不良程式 | 事業不良程式 |\n| :--- | :--- | :---\
    \ |\n| 貧窮、匱乏、無法創造富足、耗損支出、惡性消費、無法儲蓄、負債……等。 | 拋棄、分離、無法承諾、欺騙、傷害、無助、無安全感、第三者、婚姻問題……等。\
    \ | 失敗、半途而廢、無創造力、無法擴大進展、信心不足、擔憂……等。 |\n\n《業力程式清除療法》是我與主耶穌基督、大天使、聖靈與指導靈通力合作而開發出來的，主要就是針對客戶生活當中的疑難、困擾，運用「靈魂體資料系統」與「障礙清除性魔法」，運用通靈技術進入每個人的靈魂系統，調出隱藏在潛意識底層的問題根源，將根深柢固的不良業力程式迅速移除。當不良業力程式被清除一空，靈魂體在逐步導正之後，整個人由裡到外會有如釋重負的輕鬆感，彷彿重獲新生，而運途發展也將獲得全面性的改善和提升。\n\
    \n當我幫客戶移除了靈魂體當中的不良業力程式之後，就好比是清除了電腦程式中的病毒和不良軟體，他們會因此發現自己頭腦變得清晰，也容易看出事件的真相而不身陷其中，進而改善了生命的品質，也能夠使得自己與他人關係好轉。幾乎每一位接受這個療程的客戶，都會在一段時間後回來感謝我，因為他們目前已經活在自信滿滿、穩定成長的人生之中。\n\
    \n> 健康不良程式\n器官疾病、細胞病變、慢性病、家族遺傳疾病、精神疾病、肺部、腦部……等。\n\n既然人體能夠像一部電腦那樣，清除妨礙、干擾運作順暢的病毒程式，當然也就\n\
    能運用光明的魔法，重新灌入正向提升、功能加強的良好升級程式。一般來講，接受\n良好程式的重灌，必須循序漸進，分為初階、中階、高階。\n\n初階的良好程式，下載後可以幫助人感覺到思緒超前、變聰明，凡事正向思考、\n\
    果決明快，不同程式下載會有不同的效果，大致有以下選項：\n\n- 接收外星訊息程式初級版\n- 聖經與耶教知識系統\n- 豐盛意識程式\n- 時間管理程式\n\
    - 動力程式\n- 靈魂體自我治療程式\n- 良好溝通表達程式\n- 親和力程式\n- 靈感想像力程式\n\n在完成初階良好程式下載之後，大約已經向思緒清晰、理路順暢邁進了一大步，\n\
    但是要成為一位問鼎高峰的傑出人士，就要進步再進步，接受下載中階的良好程式，\n這些程式，有助於比別人更聰明、更有競爭力、更靈敏，我稱之為「X-MAN 變種人程式」：\n\
    \n### ◆ X-MAN 變種人程式\n\n- 高專業度程式\n- 無所畏懼程式\n- 讀心術\n- 意志力強化程式\n- 隨機應變靈活程式\n- 情緒傷害防護罩\n\
    - 智商高 IQ\n- 靈魂自動修復系統\n- 頭腦清晰敏銳程式\n- 磁場敏銳度程式\n- 理解力強化程式\n- 第六感直覺力強化程式\n\n基本上，完成初、中階的良好程式下載之後，在社會上的競爭條件已經遠遠凌駕於一般人之上，接下來，好還要更好，應該讓自己「形象精品化、運勢精緻化、能力精英化」，成為金字塔頂端、別人可望而不可及的「名牌」。我會建議再接再厲，接受最高階的程式升級，分為兩個大項：\n\
    \n### BEAUTY PROGRAM 大美人程式\n\n- 靈性美人程式\n- 延緩衰老程式\n- 時尚穿著品味程式\n- 美容保養各類知識程式\n-\
    \ 知性美與學院風程式\n- 自我感覺良好與愛自己程式\n- 吃得健康美人程式\n\n### RICHMAN 有錢人程式\n\n- 金錢管理程式\n- 人脈擴張程式\n\
    - 精打細算省錢程式\n- 基金股市分析解讀程式\n- 有錢人思考模式\n- 房地產投資與管理程式\n- 大老闆人才運程式\n- 聰明消費程式\n- 企業經營管理程式\n\
    - 輕鬆儲蓄程式\n- 精準投資遠見程式\n\n## 步驟九\n### 福地福人居——改善屋氣、風水能量佈陣\n\n> 古語有云：「君子不立於危牆之下。」身處於磁場不佳、條件惡劣的環境之中，再怎麼傑出、卓越的人才，也會感到一籌莫展。所以，在完成了個人全方位的條件提升之後，接下來就該好好給自己的居家環境、辦公營業場所做個體檢了。\n\
    \n就跟提升人的運勢磁場一樣，對於房子也是要從「改善、加強」兩方面按部就班去進行。第一步，就是要檢測屋氣，並予以改善、導正、提升。我從宇宙下載了新的密碼，藉由聖靈的力量，以能量波與光波導入屋氣當中，只要是處理過後的屋子，可以讓人瞬間感覺到磁場變亮與好轉。而大約在兩週之後，更能感受到運勢的增強與好運的到來。\n\
    \n對於屋氣的改善和提升，一般我會根據客戶指定的需求和選擇，從下列幾個方面著手：\n\n- 勘查欲購買之新屋或中古屋之屋氣\n- 勘查何處為屋子之旺位\n\
    - 驅逐穢氣與邪靈干擾\n- 屋子淨化魔法與開光\n- 屋子結界擋煞\n- 安財位\n- 安桃花位、紅鸞位\n- 施魔法於屋氣中改變頻率（旺財、旺愛情、旺事業……）\n\
    \n在達到改善、提升屋氣，使房子的磁場歸於正向之後，接下來就要更加強房子對居住者守護、招福、開運的能量脈動，最有效的方式，就是由我根據每一位不同的客戶，所量身打造、精心設置的「風水能量佈陣」。\n\
    \n具體的作法，完全不同於坊間制式的风水堪輿，我是使用接收磁場訊號的通靈系統來判定風水。有時即使是不用親臨現場，只要客戶提供住宅或辦公地址，我即能探測到該處的风水磁場為何。這是因為每一處宅所都有一種能量波，藉由接收從宇宙傳來的訊號，就能知道它適合怎樣的方式來著手佈陣。\n\
    \n總而言之，風水的能量磁場，可以藉由魔法加持過的水晶或寶物來活化其創造力與活力。這對於無力搬遷或者無法更動改善住宅座向的人而言，是最省錢、便利又有效的方法。\n\
    \n至於選擇何種水晶寶物以及如何佈一個開運陣法，則有賴於我和指導靈與關老爺溝通之後，從宇宙中下載不同排列形式的外星陣法，依照屋主想達成的目的，幫屋主設計最生旺的魔法陣，以期在最短的時間內幫助累積財富與好運。佈陣所需的寶物都是由我運用魔法親自加持點化，而陣法也是在聖靈的指示下審慎完成，因此皆為獨一無二之作品。\n\
    \n好運難得，長時延續好運更是難能可貴，即使目前已經達到無往不利、鴻運當頭的境界，也應該要好好考慮，如何保持勝利的戰果，如何讓自己永遠走在一帆風順的道路上。\n\
    \n就我的認知，想要讓自己得來不易的好運氣恆久保持，就要長期親近光明力量，隨時隨地不忘給自己的磁場運勢補充正面能量。\n\n因此，我們學院常常會不定期舉辦「與指導靈對話」的活動，除了適时解決生活中的疑難雜症之外，也能徹底檢視本身當下的磁場運勢是否出現漏洞，或是暗藏什麼隱憂，以便事先預防、趨吉避凶。\n\
    \n此夕卜，在特殊的良辰吉日來臨時，也會引導有緣者與關老爺對話，從因果關係當中解析出運程的走向，在困境中規畫出正確的出路。當然，關老爺威靈顯赫，也能幫助對話者解決邪氣穢氣糾纏的困擾。\n\
    \n值得注意的是，在「與指導靈對話」的活動當中，我將會為參與的學員標誌「天使的印記」。這是一項很神聖的光榮，不論來自何種宗教信仰，只要真心願意接受天使聖團的祝福，並且願意在無時無刻都能呼喚天使們的協助，以及未來在離開地球之旅時蒙受天使們的接引，就可以要求在自己的靈魂體當中標誌「天使的印記」。\n\
    \n標誌了「天使的印記」之後，靈魂體修會比之前更爲光亮，就像是在黑暗的森林中身上裝置著一顆強力探照燈一般，心念與意志修會快速地被天使聖團們得知，並且獲得天使們的協助與保護。當一個人標誌了「天使的印記」，代表著他認可並遵守「天使公約」，並且願意保持純真善良之心去愛人與助人，從此走在光亮的道途上。\n\
    \n事實上，正如「奇蹟課程」中所述：「奇蹟只是手段，啟示才是目的。」當一串的奇蹟顯現在運勢的提升，順利打造圓滿璀璨的生活之後，我們所獲得的啟示就是，唯有長保心境光明、隨時秉持善念的人，才能夠永遠領受上天的恩澤，日復一日、年復一年擁有用不完的好運氣。\n\
    \n### 天使公約\n\n1. 相信光明，遠離黑暗。\n2. 熱心助人，博愛無私。\n3. 遵行正道，不為非作歹。\n4. 追尋真理，不依靠邪魔歪道。\n\
    5. 起心動念，合乎「真、善、美、信、望、愛」。\n6. 遠離謊言與虛假。"
  mdcn: "## 開運十大步驟\n\n  2. 強化事業運程\n3. 生旺財路獲利\n4. 人際關係和諧\n5. 愛情桃花順遂\n\n碼。\n只有具備了這五大要素的手機號碼，才能被我認可，稱得上是一個好運的手機號\n\
    碼。\n如果手機號碼在五大要素中通過檢測皆為正能量時，恭喜！這是一支可以讓主人\n開運興旺的手機號碼。而如果手機號碼在五大要素中的任何一項存有負面性能量時，\n\
    建議趕緊選擇換一支好的手機號碼來增強您的運勢發展。\n\n## 步驟六\n運勢撐竿跳——障礙清除、逆轉勝\n\n曾幾何時，你是否感覺自己的生活當中，有些許的不順心，這種全面性的運勢低落，有可能是因為在您的業力磁場中，沾染上了負能量。這些負能量可能是累積了許多年的負面思考、錯誤的信念、家族負向業力承襲、或者是環境當中的不好磁場。\n\
    當一個人帶著這些負能量時，往往會在工作上引發挫敗與無力感、健康上顯化出病癥與疲累、感情上呈現停滯不動或情緒化。當這些負向業力深刻地影響一個人時，當事人會感到所求不能如願的阻礙感。\n\
    感謝上天賦予我神奇能力，讓我能夠接通宇宙間愛的能量，使奇蹟發生——也就是「魔法障礙清除」，這是一項特殊的障礙清除法，施行魔法之人必須通過上天層層的考驗、帶著良善之心去助人，這樣的人才是上天所揀選的。\n\
    \n在客戶接受「魔法障礙清除」時，我會同步幫助他檢測個人的靈能趨向，並且在聖靈的指導下，運用白水晶之光、純白之光、花精保護靈氣打通周身磁場，清除沾染在氣場中的黑色雜質。\n\
    經過「魔法障礙清除」之後，就可以運用水晶靈擺同步驗證自己的磁場，已經由負向的逆轉成為正向的轉動。帶著正向與光亮的驅動力，在生活中逐漸感到全面的好轉。不少客戶感激地表示，他們經由「魔法障礙清除」，慢慢地感覺到運氣變好、好事持續發生、歡笑與喜悅出現、事業有所突破、身體健康平衡、生活平安順遂。\n\
    \n### ◆《魔法障礙清除》適用對象\n\n- 運勢低落不順心\n- 失業、負債、遇不到貴人\n- 事業一直出狀況、沒有好機會與好人才\n- 感情關係拉扯、分分合合、感覺傷心\n\
    - 財運進展不順、經常有拖延變數\n- 突如其來的厄運\n- 被他人惡意下符咒\n- 身體不適但又找不到原因、活力降低、常生病\n- 憂鬱、愁苦、煩躁及其他心理狀況的不適\n\
    - 家人關係不合、無法溝通\n- 自信心低落、無法全面性表達自我意見\n- 卡住的感覺、能量不流通\n- 其他的不順心\n\n除了「魔法障礙清除」之外，「逆轉勝魔法全方位整合」也是一項可以快速催化能量、幫助運勢更上層樓的法門。這項「逆轉勝魔法全方位整合」是由指導靈們協助指導，在地球完成的光波治療項目，特別針對脈輪氣場紊亂失衡者、運勢低迷不順遂者、想要增強運勢者、被邪靈干擾附身者、罹患慢性病與重大疾病而需要緊急救助者、情緒崩潰與心靈失調者、重大情感或事業創傷、或其他需要聖靈緊急導引光波救助者。\n\
    \n此光波療法旨在於運用光束改變個人能量體的頻率，清除沾附在靈魂體上之負能量，讓細胞與靈氣充滿彩光，導正所有的不合協與低頻率，讓身心靈重新回復新生的能量。\n\
    \n一直以來，我總是與助教忻宜通力合作，齊心為客戶服務，希望運用「魔法障礙清除」以及「逆轉勝魔法全方位整合」兩種充滿靈性的療程，讓上主之光重回到客戶身上，並就此開啓重生之道，只要願意接受聖靈的幫助，奇蹟就會發生。\n\
    \n## 步驟七\n### 能量大作戰——寶物佩戴\n\n凡是從「沈嶸老師魔法命理學院」所購買的魔法手鍊、項鍊、水晶寶物、珍貴寶石等，每一項皆是由我精心挑選、檢測能量，確保交至客戶手上時，寶物的頻率皆為一百分的正能量。不過，當我為寶物灌入「好運魔法」或「特殊魔法」時，這個寶物的內部頻率結構就已然被改變，灌入魔法的寶物已被光波活化而變得敏銳、敏感，周遭的磁場若是有不良因素，皆容易改變寶物的能量場，而使得寶物的魔法淡化消失。\n\
    \n在佩戴魔法寶物的時候，就像是為自己的靈魂體配置了一顆超強的「好運電池」，自一戴上寶物的剎那，正能量就開始輸送至周身的頻率場，源源不絕地幫助佩戴者吸引來好的人、事、物。不過，就像電池根據不同新舊程度、耗電率的電器，而有不同的使用效率，魔法寶物的魔法有效時間，也會依個人狀況而定。通常氣運越低者，消耗掉魔法的時間越快，大致上用肉眼就可以判定魔法是否還儲存在寶物內，通常寶物看起來不像剛買時那麼透亮乾淨時，就是魔法已經有了相當程度的耗損。\n\
    \n所以，我總是建議佩戴寶物的客戶，最好每週回來學院一次，將珍愛的魔法寶石再次地交給我作淨化導正，這會使得疲憊的寶石能再次充電，將好運加強至一百分，也可以使得佩戴者的運程一直保持在良好穩定的狀態。\n\
    \n若是魔法寶石因為太久未淨化充電，因而沾染上負能量，我就不建議再繼續佩戴了。通常過度耗損的魔法寶石，寶石的色澤會像被吸乾一樣呈現灰暗慘白的狀況，這時就需要對寶石做緊急拯救。但即使急救之後，有時也無法全然地將寶石恢復到當初的美觀，所以持之以恆地經常回來學院，按時將魔法寶石淨化充電，才能讓寶石始終保持在最佳狀況，避免永久性的損害，能量的守護也將長保周全、飽滿。\n\
    \n### ◆ 魔法寶物須知\n\n• 寶石自灌入魔法之後，就不可讓其他人碰觸，以免沾染上他人之負能量。\n• 洗澡與睡眠要將貼身之魔法寶物取下，平常皆可佩戴。\n\
    • 最好連續戴上一至三個月爲佳，讓正能量不間斷運作。\n• 在家取下的魔法寶物，最好放置在學院精選的水晶充電器上持續充電。\n• 若是無購買水晶充電器，則可將寶物放置在床頭或清淨之處。\n\
    • 魔法寶物與水晶充電器需要定期拿回學院淨化與導正，確保正能量。\n• 若是魔法寶物已戴至慘白變色，務必趕緊拿回學院作緊急處理。\n• 若是將一百分的魔法寶物送給他人，他人將得到一百分的好運氣。\n\
    \n## 步驟八\n小卒變英雄——不良業力清除\n\n幾乎每一個靈魂體都是經過累世轉生而來，因此在進入地球時，皆帶有我們與過去世相關人、事、物與情境，由於因緣糾纏而產生的不良業力程式。這些業力程式，往往在今生阻礙了靈魂的清晰度與進展程度，造成生活當中難以突破的問題不斷重新上演，成為宿命般的惡性循環。不良業力程式可能在累世中的任一時刻造成，諸如：前世、轉世之間，今生或是靈魂體創造之時。\n\
    不良業力程式可能在靈魂體上造成創傷、印記、慣性行為與無意識反應等影響，也可能承襲自家族的業力而形成不良的遺傳因果，諸如暴力與上癮症。過多的不良業力程式，會帶來意識層面的混亂、匱乏感與無意識的失敗感。這些不良業力程式若是不被解碼清除，會造成靈魂體沉重的負擔，導致財運、事業、感情、家庭、健康與人際關係的連鎖性問題。\n\
    此外，我們也可能在過去世的因果當中，因為與某某人的糾紛、惡緣、施受不當而創造了不良業力程式，諸如：不信任的問題、分手的問題、怨恨的問題、不公平的問題、無安全感的問題、欺騙外遇問題等負面氣場。這些不良業力程式將在累世中造成因果糾葛的纏繞，使得當事人無法明晰地在生活中創造幸福感與富足感。\n\
    一般來講，不良業力程式大致可以歸類爲幾個大項：\n\n| 金錢不良程式 | 感情不良程式 | 事業不良程式 |\n| :--- | :--- | :---\
    \ |\n| 貧窮、匱乏、無法創造富足、耗損支出、惡性消費、無法儲蓄、負債……等。 | 拋棄、分離、無法承諾、欺騙、傷害、無助、無安全感、第三者、婚姻問題……等。\
    \ | 失敗、半途而廢、無創造力、無法擴大進展、信心不足、擔憂……等。 |\n\n《業力程式清除療法》是我與主耶穌基督、大天使、聖靈與指導靈通力合作而開發出來的，主要就是針對客戶生活當中的疑難、困擾，運用「靈魂體資料系統」與「障礙清除性魔法」，運用通靈技術進入每個人的靈魂系統，調出隱藏在潛意識底層的問題根源，將根深柢固的不良業力程式迅速移除。當不良業力程式被清除一空，靈魂體在逐步導正之後，整個人由裡到外會有如釋重負的輕鬆感，彷彿重獲新生，而運途發展也將獲得全面性的改善和提升。\n\
    \n當我幫客戶移除了靈魂體當中的不良業力程式之後，就好比是清除了電腦程式中的病毒和不良軟體，他們會因此發現自己頭腦變得清晰，也容易看出事件的真相而不身陷其中，進而改善了生命的品質，也能夠使得自己與他人關係好轉。幾乎每一位接受這個療程的客戶，都會在一段時間後回來感謝我，因為他們目前已經活在自信滿滿、穩定成長的人生之中。\n\
    \n> 健康不良程式\n器官疾病、細胞病變、慢性病、家族遺傳疾病、精神疾病、肺部、腦部……等。\n\n既然人體能夠像一部電腦那樣，清除妨礙、干擾運作順暢的病毒程式，當然也就\n\
    能運用光明的魔法，重新灌入正向提升、功能加強的良好升級程式。一般來講，接受\n良好程式的重灌，必須循序漸進，分為初階、中階、高階。\n\n初階的良好程式，下載後可以幫助人感覺到思緒超前、變聰明，凡事正向思考、\n\
    果決明快，不同程式下載會有不同的效果，大致有以下選項：\n\n- 接收外星訊息程式初級版\n- 聖經與耶教知識系統\n- 豐盛意識程式\n- 時間管理程式\n\
    - 動力程式\n- 靈魂體自我治療程式\n- 良好溝通表達程式\n- 親和力程式\n- 靈感想像力程式\n\n在完成初階良好程式下載之後，大約已經向思緒清晰、理路順暢邁進了一大步，\n\
    但是要成為一位問鼎高峰的傑出人士，就要進步再進步，接受下載中階的良好程式，\n這些程式，有助於比別人更聰明、更有競爭力、更靈敏，我稱之為「X-MAN 變種人程式」：\n\
    \n### ◆ X-MAN 變種人程式\n\n- 高專業度程式\n- 無所畏懼程式\n- 讀心術\n- 意志力強化程式\n- 隨機應變靈活程式\n- 情緒傷害防護罩\n\
    - 智商高 IQ\n- 靈魂自動修復系統\n- 頭腦清晰敏銳程式\n- 磁場敏銳度程式\n- 理解力強化程式\n- 第六感直覺力強化程式\n\n基本上，完成初、中階的良好程式下載之後，在社會上的競爭條件已經遠遠凌駕於一般人之上，接下來，好還要更好，應該讓自己「形象精品化、運勢精緻化、能力精英化」，成為金字塔頂端、別人可望而不可及的「名牌」。我會建議再接再厲，接受最高階的程式升級，分為兩個大項：\n\
    \n### BEAUTY PROGRAM 大美人程式\n\n- 靈性美人程式\n- 延緩衰老程式\n- 時尚穿著品味程式\n- 美容保養各類知識程式\n-\
    \ 知性美與學院風程式\n- 自我感覺良好與愛自己程式\n- 吃得健康美人程式\n\n### RICHMAN 有錢人程式\n\n- 金錢管理程式\n- 人脈擴張程式\n\
    - 精打細算省錢程式\n- 基金股市分析解讀程式\n- 有錢人思考模式\n- 房地產投資與管理程式\n- 大老闆人才運程式\n- 聰明消費程式\n- 企業經營管理程式\n\
    - 輕鬆儲蓄程式\n- 精準投資遠見程式\n\n## 步驟九\n### 福地福人居——改善屋氣、風水能量佈陣\n\n> 古語有云：「君子不立於危牆之下。」身處於磁場不佳、條件惡劣的環境之中，再怎麼傑出、卓越的人才，也會感到一籌莫展。所以，在完成了個人全方位的條件提升之後，接下來就該好好給自己的居家環境、辦公營業場所做個體檢了。\n\
    \n就跟提升人的運勢磁場一樣，對於房子也是要從「改善、加強」兩方面按部就班去進行。第一步，就是要檢測屋氣，並予以改善、導正、提升。我從宇宙下載了新的密碼，藉由聖靈的力量，以能量波與光波導入屋氣當中，只要是處理過後的屋子，可以讓人瞬間感覺到磁場變亮與好轉。而大約在兩週之後，更能感受到運勢的增強與好運的到來。\n\
    \n對於屋氣的改善和提升，一般我會根據客戶指定的需求和選擇，從下列幾個方面著手：\n\n- 勘查欲購買之新屋或中古屋之屋氣\n- 勘查何處為屋子之旺位\n\
    - 驅逐穢氣與邪靈干擾\n- 屋子淨化魔法與開光\n- 屋子結界擋煞\n- 安財位\n- 安桃花位、紅鸞位\n- 施魔法於屋氣中改變頻率（旺財、旺愛情、旺事業……）\n\
    \n在達到改善、提升屋氣，使房子的磁場歸於正向之後，接下來就要更加強房子對居住者守護、招福、開運的能量脈動，最有效的方式，就是由我根據每一位不同的客戶，所量身打造、精心設置的「風水能量佈陣」。\n\
    \n具體的作法，完全不同於坊間制式的风水堪輿，我是使用接收磁場訊號的通靈系統來判定風水。有時即使是不用親臨現場，只要客戶提供住宅或辦公地址，我即能探測到該處的风水磁場為何。這是因為每一處宅所都有一種能量波，藉由接收從宇宙傳來的訊號，就能知道它適合怎樣的方式來著手佈陣。\n\
    \n總而言之，風水的能量磁場，可以藉由魔法加持過的水晶或寶物來活化其創造力與活力。這對於無力搬遷或者無法更動改善住宅座向的人而言，是最省錢、便利又有效的方法。\n\
    \n至於選擇何種水晶寶物以及如何佈一個開運陣法，則有賴於我和指導靈與關老爺溝通之後，從宇宙中下載不同排列形式的外星陣法，依照屋主想達成的目的，幫屋主設計最生旺的魔法陣，以期在最短的時間內幫助累積財富與好運。佈陣所需的寶物都是由我運用魔法親自加持點化，而陣法也是在聖靈的指示下審慎完成，因此皆為獨一無二之作品。\n\
    \n好運難得，長時延續好運更是難能可貴，即使目前已經達到無往不利、鴻運當頭的境界，也應該要好好考慮，如何保持勝利的戰果，如何讓自己永遠走在一帆風順的道路上。\n\
    \n就我的認知，想要讓自己得來不易的好運氣恆久保持，就要長期親近光明力量，隨時隨地不忘給自己的磁場運勢補充正面能量。\n\n因此，我們學院常常會不定期舉辦「與指導靈對話」的活動，除了適时解決生活中的疑難雜症之外，也能徹底檢視本身當下的磁場運勢是否出現漏洞，或是暗藏什麼隱憂，以便事先預防、趨吉避凶。\n\
    \n此夕卜，在特殊的良辰吉日來臨時，也會引導有緣者與關老爺對話，從因果關係當中解析出運程的走向，在困境中規畫出正確的出路。當然，關老爺威靈顯赫，也能幫助對話者解決邪氣穢氣糾纏的困擾。\n\
    \n值得注意的是，在「與指導靈對話」的活動當中，我將會為參與的學員標誌「天使的印記」。這是一項很神聖的光榮，不論來自何種宗教信仰，只要真心願意接受天使聖團的祝福，並且願意在無時無刻都能呼喚天使們的協助，以及未來在離開地球之旅時蒙受天使們的接引，就可以要求在自己的靈魂體當中標誌「天使的印記」。\n\
    \n標誌了「天使的印記」之後，靈魂體修會比之前更爲光亮，就像是在黑暗的森林中身上裝置著一顆強力探照燈一般，心念與意志修會快速地被天使聖團們得知，並且獲得天使們的協助與保護。當一個人標誌了「天使的印記」，代表著他認可並遵守「天使公約」，並且願意保持純真善良之心去愛人與助人，從此走在光亮的道途上。\n\
    \n事實上，正如「奇蹟課程」中所述：「奇蹟只是手段，啟示才是目的。」當一串的奇蹟顯現在運勢的提升，順利打造圓滿璀璨的生活之後，我們所獲得的啟示就是，唯有長保心境光明、隨時秉持善念的人，才能夠永遠領受上天的恩澤，日復一日、年復一年擁有用不完的好運氣。\n\
    \n### 天使公約\n\n1. 相信光明，遠離黑暗。\n2. 熱心助人，博愛無私。\n3. 遵行正道，不為非作歹。\n4. 追尋真理，不依靠邪魔歪道。\n\
    5. 起心動念，合乎「真、善、美、信、望、愛」。\n6. 遠離謊言與虛假。"
