    惡狠狠地瞪著忻宜說：「妳們是誰？為什麼把這些東西擺在我身上？我討厭這些東西，快拿開！這麼強的能量讓我好不舒服！」才說完，妮妮又立刻恢復自己原來的樣子，不好意思地說：「很抱歉，剛才那些話不是『我』說的。」躺了一下子，妮妮又突然兇狠狠地咆哮：「好啊！妳們給我記住，老子現在先離開，我不會就這樣放過她的！」


