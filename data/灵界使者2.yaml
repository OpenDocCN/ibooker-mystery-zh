    ### ### 安親班女老師槍殺命案


    「不讓我愛，就送妳棺材！」二〇〇九年十二月一日，位於台北市內湖的某托育中心門口，發生了一起駭人聽聞的「恐怖情人」槍擊案。曾有殺人前科的兇嫌吳敏誠，因為不滿女友黃瓊瑤提出分手，兩人在激烈爭吵之後，就在黃瓊瑤轉身離去時，吳敏誠拔槍近距離朝她的後腦勺連開兩槍。女方當即倒臥在血泊之中，送醫急救兩天之後，宣告不治身亡。而早在案發前一個多月，兇嫌就曾經發出恐嚇簡訊警告，一定會殺了對方再送上一副棺材！


    這是一段令人費猜疑猜的感情，而且根本不受到周遭衆人的祝福。死者黃瓊瑤大約四十歲，早年命運多舛，父親很早就因為乳癌過世，原本的一段婚姻也極為不順利。離婚後她成了一個單親媽媽，帶著兒子搬回孃家與母親同住，也許就是太多的不順讓她受不了，於是她才會把名字從原本的「黃富蘭」改為後來的「黃瓊瑤」。即使生活中充滿了這許多的不如意，但是黃瓊瑤平素仍是一個溫和善良的人，在鄰居的眼中，她很好相處，也熱心助人，更是附近許多小朋友口中親切可人的「阿姨」。


    相較於善良的黄瓊瑤，她的男友吳敏誠則根本就像是一個「凶星轉世」的可怕人物。由於從小患有唇顎裂（兔唇），破相使吳敏誠在極端自卑中養成了一種暴戾與報復交織的性格，而父母因為歉疚也對他過分溺愛，讓他予取予求，終於使他成了「只可我負天下人，不許天下人負我」的可怕人物。在感情世界裡，吳敏誠是一個佔有慾極強卻又不知專為何物的人，早在十幾年前，才剛結婚生女沒多久的他，就外遇劈腿，甚至因為外遇對象與他開車出遊時，幾句無心的玩笑話，竟在車內憤而拔刀，把對方亂捅成蜂窩。由於鑽法律的漏洞，犯下殺人滔天大罪的吳敏誠居然只坐了兩年多的牢就假釋出獄了，出獄後，即使妻子已經與他離婚，但實在太過畏懼他的兇狠殘暴，仍被迫同出一個屋簷下，長期活在家暴的陰影中。


    這樣天差地別的一對男女，怎麼會湊在一起？已經有過不愉快婚姻的黃瓊瑤，為什麼要把自己的第二春，押在一個殺人前科犯身上？吳敏誠明明是一個暴力、自私、風評不佳的男人，為何黃瓊瑤就是不顧身邊親友的強烈反對，執意要與他交往？既然逐漸醒悟對方是個恐怖情人而決定分手，為什麼會一時昏了頭單獨與這個煞星談判——不能報警嗎？不能請朋友同事陪同嗎？明明是個十惡不赦、兇殘成性的人，為何有那麼多陰錯陽差加諸在吳敏誠身上，讓他短暫坐牢就能出獄？難道，吳敏誠生來就是黃瓊瑤的煞星，專門來終結她的生命的？


    太多的問號，已經難以找到解答，只是徒增世人的扼腕而已！


    ### 通靈解析


    一場悲劇性收場的感情糾葛，肇因於累世的不良業力作祟。


    透過深入探查黃瓊瑤和吳敏誠兩位的靈魂因果檔案，我赫然發現，其實她們兩個早從幾世以來就有著情人的關係，而且重複好幾次。'
  mdcn: '## 第二章


    身體不適也會造成氣場虛弱，穢氣邪祟就有機可乘了。此外，出門在外，最好隨身配戴能量正面而溫和的護身寶物，既可以保護自己隔絕負面磁場，也不會對外靈造成挑釁或攻擊性，招致怨念。一般來說，「白水晶」的手鍊、鍊墜所散發出來的能量之光，溫和又極爲正向，若能灌注充沛的法力，就成爲出門在外最適切的護身寶物。此外，若事先知道前往的地方是比較兇險、較容易有靈異事件發生，那麼搭配佩戴加持過的「黑曜岩」飾品，更能加強護身驅邪的力量。


    ### ◆ 撞邪的時候，有沒有緊急處理的措施？


    在條件許可的狀況下，我會建議立刻離開撞邪的處所，如果是投宿旅館，應該馬上要求更換房間，或是盡快轉投其他旅館。在離開該場域的當下，心中同時要誠懇懷著歉意，畢竟「撞邪」是站在本身的立場而言，實際上是因爲自己突然的出現去沖撞、冒犯了對方。在此，我指導大家一些撞邪時可以緊急解救的小祕法：


    找幾片新鮮的檸檬片，放入乾淨的飲用水中，喝下去即可幫助祛毒解穢；倘若實在找不到檸檬片，也可前往便利商店購買純淨的礦泉水，左手拿著礦泉水、右手拿著白水晶手鍊或項鍊，將白水晶按在水瓶上，口中虔誠默念「請聖靈淨化這瓶水，將邪靈從我身上驅離」，然後小口小口慢慢把礦泉水喝完，一樣有驅開邪靈穢氣的功效。


    ### ◆ 在磁場陰森晦暗的地方，哪些話千萬不能說？


    帶有挑釁、冒犯、輕蔑等意味的話語千萬不要出口，禁止去評論現場任何事物，不要祈求、不要許諾、不要開玩笑。總之，能少說話就盡量閉緊嘴巴，在陰森森的地方，那麼多話幹什麼？尤其是前往歷史悠久的古蹟，例如：寺廟、古城、古戰場……更是要謹言慎行，不要拿禁忌開玩笑，以免引起在地古老靈體的不滿。


    ### ## 不要忘了拜祖先啊！


    隨著社會型態的變遷，許多工作事業忙碌的工商界人士，雖然有心親近光明力量，卻往往很難抽出長時間去從事修行的活動。所以，我們魔法命理學院所提倡的「方便修行法門」，因為符合簡單、自在的原則，許多社會上的青壯人士、中流砥柱，紛紛趨之若鶩，迫不及待想要歸屬進入天使聖靈系統。


    吉米就是一個思想新穎、作風隨性的年輕人，雖然家族經營頗富盛名的觀音廟宇，但是從小到大，他就是一個不愛拿香、不耐煩跪跪拜拜的人。其實這個人的心地很善良，凡事都很隨和，可就是受不了那種香煙繚繞、鑼鼓喧天的場合，每逢那種敬神祭祖的時刻，他總是能免則免。


    透過老婆的關係，吉米有緣接觸了學院方便修行的法門，再加上長年以來他在事業上雖然平順，卻沒有什麼顯著的發展，于是他有心想要歸屬於天使聖靈系統，藉助魔法的力量讓自己的磁場運勢更上層樓。


    當吉米來到學院表明來意時，我便向指導靈請示，初步獲得允許之後，跟著就著手想要引導他的能量與天使聖靈的信仰系統連接上線。然而，進行了很多次卻發現都無法成功，我趕緊詢問指導靈，怎麼會這樣？


    透過指導靈的搜尋調查，得到了這樣的答案：「吉米本身已經歸屬在東方的觀音大士信仰系統當中，對方傳達訊息表示不准他脫離系統轉投，所以我們的系統不能接受他。」


    聽到這樣的指示，吉米完全無法接受：「怎麼會這樣？難道我沒有選擇宗教信仰的自由嗎？太不公平了！」


    指導靈接著表示：「沒辦法，剛才已經仔細察看過了，吉米身上確實有著極為清晰的觀音大士印記，他的靈魂和觀音信仰系統有著極為強烈的連結。」


    當下我仔細詢問吉米：「你或你的家人曾經有向觀音大士許願立誓嗎？」吉米表示，他本身肯定沒有，因為他連拜拜都不太能接受了，怎麼可能去許願？不過，長輩方面就無法確定，必須進一步了解。於是，吉米的太太在旁邊立刻撥了電話給婆婆、也就是吉米的母親。


    電話的那一頭，吉米的母親一開始本來也表示：「沒有啊！沒有許什麼願或發什麼誓啊！」納悶了一會兒才恍然想起：「我想起來了！在很久很久以前，吉米的祖母曾經對我說過，由於我連生好幾胎都是女兒，他祖父擔心家中沒有男丁傳宗接代，所以向觀音大士求了好久，後來我才生了吉米。他祖母說得很清楚，這個一脈單傳的孫子，是『送子觀音』破例恩賜的。實在是太久以前的事了，我都幾乎忘了。」


    就在這時候，觀音大士方面也派了使者傳達訊息，要我轉問吉米：「你原本是觀音蓮座駕前的童子，因為看在你祖父虔誠祈求，才破例送出去給他做孫子，因緣了結之後，還是要回歸觀音座前繼續修行的，怎麼可以忘記原本的因緣想要脫離呢？這些年來，你不是諸事平安、生活穩定嗎？觀音大士有少了保佑你嗎？」


    面對越來越嚴峻的質問，吉米也有些誠惶誠恐，他低頭稟報說：「我了解這些年來能夠平安過生活，都是受到觀音大士的慈悲庇佑。但是，人生在世，總是不能只求安穩而胸無大志吧！我真的希望能夠接觸新的信仰系統，幫助自己在事業上能夠有一番衝刺，獲得好成績。懇請觀音大士恩准。」


    沉默了片刻沒有訊息傳來，可能使者正在請示觀音大士。過了一會兒，又有訊息傳送過來：「好吧！只要你隨時保持善念，始終走在正途上，修不會太強烈去干涉你信仰其他系統的。」吉米聽了之後，總算鬆了一口氣，他終於可以安心加入天使聖靈系統，順利接受魔法的洗禮了。


    沒想到，過了一下子，又有訊息傳來，要我轉告吉米：「這次是你的祖靈透過觀音大士前來指示。他們擔心你信了耶穌之後，從此就完全不拿香拜拜了。你是唯一的男丁子孫，如果你不拜祖先，香火就會斷絕。所以，信仰歸信仰，對於祖先還是要飲水思源，逢年過節不可以忘記拜祖先喔！」


    事情總算有了皆大歡喜的結局，想不到我們學院不但要幫人處理卡陰驅邪的問題，偶爾還要擔任不同信仰系統之間，傳達訊息的信差呢！


    ## 靈界百寶箱


    - **一般人可以同時信仰兩種不同的宗教系統嗎？**

    對於一般剛剛接觸宗教的人，我並不建議跨界域的信仰，因為不同的宗教派別，在細節之處多少還是會有衝突，一般人在有所牴觸的時候，就容易造成本身信仰系統的混亂。只有在修行已經有一定的程度，心靈的提升已經超越儀式、教條、表相的人，才可以放開心胸去接觸不同系統的宗教信仰，無須繼續拘泥於形式，倘若心中有所掛礙、始終放不開教條規範，那就不適合跨界域的宗教信仰了。


    - **如果想要脫離原本的信仰系統，該怎麼進行比較妥當？**

    首先要確定自己是否曾跟原來的主神許願或立下誓約，是否有該還願而未達成的。如果誓約是由長輩親友代為立下，並非本身的決定，那麼就可直接更改信仰無妨。倘若本身對誓約知情，而且與主神已經有較長期深入的連結，那麼就必須回歸主神駕前稟告，或由較權威的通靈人士代為隔空稟告。


    神明都是慈善祥和的，對於信仰，只要同樣是勸善行義者，並不會去硬性規範不能轉信，通常都會大開方便之門任人來去。不過，禮貌上都一定要稟報打個招呼，就像學生轉校，對於長期以來照顧自己的師長，真誠致謝是有其必要的。


    ## 如何加入天使聖靈的信仰系統？


    以我們學院為例，是屬於新時代（New Age）的天使聖靈信仰，著重於隨性、自在、開放的方便修行，所以對於加入的方式也很輕鬆，只要是有心提升自我靈性的人，都能夠隨時踏入這個殿堂。


    首先，可以試著熟讀聖經當中著名、優美、有意義的佳句名言，如果覺得自己的心靈、意念都真心接受並融入其中，就可以進一步閱讀有關天使聖靈、水晶靈氣方面的書籍。如果對這些相關知識都能自在無礙地接受、研習，那麼基本上就已經走在神性的道路上了。再深入一些，可以繼續接觸「與神對話、光的課程、奇蹟課程、奧修體驗、脈輪、水晶光波療癒」等相關活動，這樣子，就是在潛移默化當中，歸屬於天使聖靈的信仰系統了。


    總之，以愛的能量為出發點、以提升人類靈性為主要課題，我們的道路是寬闊而不拘執於形式的。


    ## 第三章


    # 洪若潭凶宅之謎


    在台灣，只要一提起凶宅，相信絕大多數的人，心頭必定清晰浮起一個名字——洪若潭。


    民國九十年九月五日，住在彰化縣二林鎮的洪若潭、姚寶月夫妻，被發現陳屍在自家豪宅的小型焚化爐中。洪若潭的遺書中表示，家庭內部失和、外人對他成就的閒言閒語，再加上對於政治時局的無奈，於是萌生自盡的念頭，一生堅持完美主義的他，連死都想帶著全家一起走。於是，他慫恿再娶的妻子姚寶月，一同策劃了一場「人間蒸發式」的自殺案。


    直到今天，警方都還無法找到洪若潭三名子女的屍骨，僅能從大兒子筆記中所發現的隻字片語：「跟父親一起自殺好嗎？」推斷三個孩子也已同時遇難。有可能是一家人五口相約共赴黃泉，也可能是本身死意甚堅的洪若潭，先以藥物迷昏、殺死三名兒女，再毀屍滅跡後，才與妻子攜手自殺於焚化爐內。


    據了解，當時造價約兩億、擁有三千坪花園造景的超級豪宅，一開始就是建築在「怨念」之上⋯⋯


    建豪宅的土地，原本是洪若潭的親兄弟承繼自父親的遺產。後來，弟弟因故向身為長兄的洪若潭借貸，並以土地作爲抵押。在無力償還的時候，身爲哥哥的洪若潭二話不說將土地佔爲己有，並立刻斥巨資興建豪宅。這種作法，連老母親都看不下去，直指這個做哥哥的太苛刻、太不顧兄弟情分。


    此外，占地數千坪的花園豪宅，用料及設計皆華麗考究，從歐洲空運來台的造景巨石動輒上千萬，在三林這個鄉下地方真的是讓人瞠目結舌的大手筆。不過，洪若潭不但從未曾想和鄉民們分享，反而廣築高牆、多蓄狼犬，讓別人難以接近，自己也成了深居簡出的神祕人物。因此，豪宅的座落，不但沒有受到四鄰的祝福，反而被私底下謔稱爲「無法親近的城堡」，而那些原本守護豪宅的兇猛狼犬，最後的下場也和牠們的主人一樣化爲灰燼。


    在洪若潭夫婦自盡之後，據說不時仍有人在深夜時分看到他牽著狼犬，在逐漸荒廢的花園中巡視，即使如今豪宅已經易手，但許多鄉民仍認為洪若潭還在裡面。究竟是什麼樣的執迷眷戀，讓洪若潭無法放下離開？還是什麼樣的詛咒禁錮了無奈的幽魂，怎麼也無法超昇？


    ### 通靈解析


    當我透過通靈調到洪若潭靈魂的資料時，我很訝異這個靈魂竟然是如此的怨恨、固執、不快樂！


    一開始，當我與關老爺通靈想要了解洪若潭目前的狀況時，關老爺的指示是這樣的：「這個靈魂體目前已經是『鬼魂』的狀態，能量殘存在地球上。基本上，他一直在凶宅中徘徊成為地縛靈，無法離去，難以超脱昇華。」


    我不禁感到納悶，據了解，不是已經有許多人為洪若潭一家舉辦過好幾次盛大的超渡法會，甚至他生前所建立的豪宅也已經換了主人，怎麼還會在其中糾纏不清呢？


    透過關老爺的指點，我才恍然大悟。原來，除了洪若潭本身怨恨、執念太深，不捨離去之外，最重要的是他犯下幾樁大錯，以致遲遲無法解脫：第一，在陽壽未盡的時候就自己了結生命，「自殺罪」是天地間不可輕犯的大律之一，自殺者即使肉體已經毀壞腐朽，靈魂仍然要禁錮在人間完成未竟的課題；第二，強制奪去家人的生命，而且是殘殺無辜；第三，對於自己的所作所為，到現在還是執迷不悟，毫無悔意，反而放肆自己的怨念橫行。就是這樣的狀況，導致即使舉辦了儀式召喚接引者前來，但是所有的神明都不願插手相助，而在無法受到渡引的同時，其實洪若潭自己也不願卸下執念尋求超生。


    一方面是懷著悲憫的心情，一方面也是好奇心使然，我決定親自與洪若潭進行通靈接觸。當我先通靈檢視洪家的故宅時，狀況真的很驚人，裡面竟然同時有多達六個鬼魂存在著。其實，數年前我就曾親自踏勘洪氏凶宅，當時便已經感應到裡面滿滿都是鬼魂，只是沒想到屋主洪若潭也在其中。


    在六個鬼魂當中，有一個怨念特別深、負面能量非常強大，我斷定他應該就是洪若潭。


    > 我說：「你就是洪先生嗎？」


    他似乎很痛苦，非常不客氣地回應：「沒錯，妳是誰？為什麼要來打擾我？」


    我試著發出友善而溫和的電波，這應該能稍稍減輕洪若潭鬼魂的痛苦和怨念，於是，我們得以持續溝通。


    根據洪若潭鬼魂的敘述，當初興建豪宅的緣起是這樣的⋯⋯雖然母親和兄弟非常地不滿和抗議，但是他認爲自己取得土地所有權的方式和過程一切合法，在商言商，親兄弟也是要明算帳。


    而且，在洪若潭的心中一直有一個夢想，他想打造一座氣勢磅礴、傲視群倫的豪宅，無論如何都要付諸實行。然而，一切的問題就出在豪宅建成之後，沒錯，豪宅蓋起來了，但是洪若潭卻覺得悵然若失。突然發現，人生最大的目標已經達成了，那活著還有什麼意義？他開始懊悔，跟著心靈也失去寄託，因為豪宅的建成並未帶來預期的滿足感，夢想完全破滅了。於是，洪若潭決定結束自己的生命，讓自己的靈魂永遠留在這座豪宅當中。


    這麼偏激的想法，實在讓我感到驚異莫名，在保持和洪若潭鬼魂通靈聯繫的同時，我一邊請示關老爺，究竟他為什麼會有這樣詭異、甚至變態的行事作風？


    關老爺指示，其實洪若潭的靈魂從一來到地球降生時，就已經有問題了，他是帶著「痛苦、壓抑、不得意」等種種不良業力誕生的。也因此，洪若潭的生命，今生註定要以悲劇收場。相較於洪若潭，和他一起自焚的妻子姚寶月靈魂則沒有那麼強烈的波動，只是緊緊地在丈夫的鬼魂旁邊。經過通靈了解，其實姚寶月從降生時靈魂就跟洪若潭有宿緣的糾纏，因為深愛洪若潭，所以她本身也成了一個脾氣特異、不愛與外人深入交遊的人，也之所以當洪若潭向她提起全家人一起「人間蒸發」的計畫時，她只能毫無異議地接受了。


    於是，我轉而詢問洪若潭的鬼魂：「那你的兒女呢？你對他們做了什麼事？」


    沒想到，他竟大言不慚地回覆我：「我親手『結束』了他們的生命，當初購買焚化爐，就是整個計畫最重要的部分，讓一切『不留痕跡』！」


    怎麼會有這麼殘忍、自私的父親？雖然事情已經過去很久了，但是我仍忍不住斥責洪若潭的鬼魂，我憤怒的腦電波似乎讓他的痛苦加劇，他只能斷斷續續地辯解：「……沒有未來了……我看不見任何希望……沒有我，這些孩子……也不會有好的未來……乾脆一起走好了！」


    或許這也是一種父愛，但卻是那麼地愚昧和可悲，基於對這一家人（鬼魂）的同情，我轉而請示關老爺，看看有什麼方式可以幫助他們解脫。關老爺指示：「很難，除非洪若潭本身願意真心悔悟，承認自己的過錯，誠懇地接受光明，在覺醒、轉變的當下，才能幫助自己並帶著一家人從負面能量的桎梏中解脫。天助自助者，目前還在執迷自誤當中的洪若潭，沒有任何神明會願意伸手幫他的。」


    於是，我試著探詢洪若潭鬼魂的意向：「洪先生，你願意卸下執念跟家人一起解脫嗎？」


    「不！」近乎粗暴的回應，他的能量擺幅瞬間變大、變快，彷彿急切地在原地來回踱步，咆哮著說：「我不需要幫助，也不要離開！我是這裡『永遠的主人』，不准多管閒事，誰也別想拆散我們一家人，沒有人能把我的房子搶走！」面對這樣固執、放棄救贖的鬼魂，我只能暗自嘆口氣，無奈只好撤回自己的通靈，最後再檢視一次這棟充滿怨氣的豪宅時，赫然發現，原本只有六條鬼魂，無意間竟已變成十幾條鬼魂。當他們發現我在窺探時，龐大的負面能量剎時整個湧向我，我一時措手不及，頓然感到全身乏力、煩悶欲嘔。所幸，在關老爺的及時護持之下，我安然撤回自己的意念。


    關老爺告訴我，這座凶宅以磁場而論，已經變成一塊極其負面、汙穢的陰地。原本，發生過兇案的地方，唯一適合的用途就是蓋廟，以神明之力鎮壓煞氣。然而，洪家凶宅實在負面能量太沉重了，連神明也不願進駐，因為會妨礙到自己的光明修行。據了解，洪若潭鬼魂為了抗拒任何力量去淨化、接收他的宅邸，目前就像是個「黑洞」一般招聚周邊所有的負面能量，附近鬼魂來來去去，把那裡當成了交誼廳，而洪若潭鬼魂也宛若霸踞一方的凶煞。


    不過，我仍然不死心，繼續請示主耶穌基督，希望對化解這一方冤孽有所幫助。幸好，主耶穌基督就是那麼慈悲，祂說，如果那塊地願意改建成教堂、教會學校，祂將指派天使聖團進駐，淨化並解脫那裡的負面磁場。如果有緣，真希望這篇文章能夠被洪家親友或新屋主看到，並可以參考這樣的解決之道。


    事情還是有轉機的，欣慰之餘，我仍不免感嘆，因果業力的影響竟是如此深遠。我判斷，洪若潭必然前世因果有所虧欠，才會在今生來到地球上時，帶著那麼多不良業力出世。可惜，他沒有善用自己可貴的生命化解因果宿怨，反而輕易放棄選擇自盡。未來就算有重新輪迴的機會，免不了還是相同的惡業揹在身上，總是要完成學習、償清虧欠，才能結束這場惡性循環。


