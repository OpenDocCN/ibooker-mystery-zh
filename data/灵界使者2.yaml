    妳的先生並非不是好人，但卻不是對的人，以致妳當初不知為何而嫁，對這段婚姻也很快就後悔，多年來因此活在不快樂當中。不過，想要迎接新的好緣分，舊緣就必須善了，拖延只是讓彼此越來越痛苦。本著良心做事，真誠地祝福對方，一起解脫感情的執迷，各自獲得真正能夠共同幸福生活的好伴侶。


