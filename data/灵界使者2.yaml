    「不過，指導靈也告訴我，生活歸生活，在心境上還是可以保持寧靜致遠的狀態，心才是最重要的，只要心情淡泊、不忮不求，那何必在意是否離群索居呢？」


    - **淑玉的指導靈說**：「人生當中真正的安全感，是來自於物質金錢的滿足，和心靈上的自由，缺一不可。」


    淑玉有些不好意思地說：「這次指導靈真的是給了我當頭棒喝！我一直過著得過且過的生活。長期以來，從未認真想過好好給自己做一些生涯規劃，以致感情和生活都未能盡如人意。指導靈說，祂在我身旁都替我感到著急不已，藉著這次對話的機會，祂指示我應該趕緊把握有限的青春，不要吝於付出時間學習和進修，不要一直做一些無法讓自己成長、沒有長遠規劃的事。個人謀生技能有提升，金錢和經濟的報酬才會跟著提升，給自己的人生設定正確的方向和目標，一步一步去達成，才能找到生命中長久穩定的安全感。」


    - **家燦的指導靈說**：「走在正確的軌道上，不違背真理做事，才是事業真正的根基。」


    家燦一臉懊悔地說：「唉！我真後悔沒有遵行指導靈給我的提示。雖然指導靈一直諄諄告誡我『一定要走在正途上』，但是我自己卻故意忽略而毫不在意。都怪自己，看到有賺大利的機會，就想學人家做偏門的投資，自己心念不正，被出賣了也無話可說，損失了巨額的金錢，又結了那麼多朋友，我真的好後悔！」


    「幸好，在我真懺悔之後，指導靈也原諒了我，並且建議我，當務之急就是把情緒冷靜下來，好好思考、計畫未來的道路，失去的已經失去了，不要繼續困在自怨自艾的低氣壓當中無法自拔，趕緊彌補經濟和人際的漏洞，才是最重要的。」


    在生命過程中，我們無時無刻都面臨著做抉擇的機會，每一種選擇都將導致後續不同的結果，而起心動念之間，一個「因」就已經種下。


    # 第五章

    ## 與關老爺對話


    # 緣起


    很多人都知道關關老爺——關聖帝君就是恩主公，但恐怕很少有人能了解，恩主公可不一定就是指關聖帝君喔！


    所謂「恩主」，就是指對蒼生有「恩」、為百姓作「主」的神祇，從遠古時代就已經存在這種稱呼，可以說是極高的一種神明位階或職銜，包括：玄天上帝、孚佑帝君⋯⋯都曾經榮膺這個職位，受到廣大信眾的稱頌，而關聖帝君就是現任的恩主公。


    在歷史上，關聖帝君——關雲長，乃是文武兼備、義薄雲天的知名武將，曾經傳下許多令人感佩、深植民心的英勇史蹟，可以說是「忠、誠、勇、義」的化身。因此在成神之後，千百年來始終受到民心的擁戴和信奉，成為正氣、正道的代表。


    自從我在獄中獲得上主的眷顧而獲得通靈能力之後，無論是東西方的聖靈、神祇都能與我溝通無礙。原本我所信仰的西方天使聖靈系統,已經是非常高階的法力來源,但是聖靈、指導靈都太過慈悲爲懷了,有時我面對客戶卡陰問題時,祂們會想要對邪靈惡鬼給予寬恕,總是主張以感化、循序漸進的方式,慢慢進行處理。爲了因應客戶想要快速處理的需求,我認爲自己需要尋求比較強硬、有魄力的法力後盾,於是,我向恩主公系統祈求援助。


    基於這樣的機緣,我正式拜關老爺爲義父並且領受天命,秉承恩主公的法力系統,不時與冥頑不化的邪靈惡鬼鬥智鬥法。很多人會問我,同時崇奉東、西方的通靈系統,難道不會有衝突嗎?在這裡,我可以詳細爲大家解說釋疑。


    其實,來自高遠的天外、至善淨美的光明力量只有一種,而傳遞到地球上時,只是因爲東、西方民族文化背景的不同,而產生了信仰方式和接收途徑的不同。根據我的了解,東、西方通靈信仰系統其實都是互相呼應對照的,例如觀音大士信仰系統,對應到西方就是聖母瑪利亞信仰系統,彼此都代表了最高光明力量慈悲、垂憐、母性光輝的一面。


    而恩主公信仰系統，對應到西方其實就是「天使長」信仰系統。不用意外，讓我告訴你，在聖經當中記載，天使聖靈當中，最高位階的熾天使，祂的面龐就和關老爺一樣是紅色的。此外，正如同恩主公是天庭的管理者，熾天使也是聖殿的管理者，兩者都以「傳遞正信、佈達天道」為首要任務。


    另外，在上帝座前有兩位天使長：一位是負責來去天上地下、傳達神聖意旨的加百列，另一位則是天使大軍的統帥、隨時與邪惡搏鬥、持劍護衛聖殿的米迦勒。巧合的是，在佛祖跟前，也有兩大護法：對應到加百列的，是號稱衆仙佛之中飛行最快速、負責傳達天界訊息的韋馱尊者，而對應到米迦勒的，則爲手持青龍偃月刀、正氣凜然、威靈顯赫壓制諸邪的關聖帝君。由此可知，天使長信仰系統以及恩主公信仰系統，同樣代表的就是光明力量負責彰顯正道、懲惡懲奸、不姑息邪魔歪道的那一面。


