    安妮說：「跟指導靈對話的體驗真的很棒！每當我心中產生疑惑時，只要靜下心來和我的指導靈溝通，總是能夠幫助我快速找到問題的解決之道！指導靈總是能夠清楚掌握我腦袋裡的訊息，每天、每一次與外界的互動，指導靈都能為我清晰指出當中的意義何在。這次指導靈的話，對我來說就像是當頭棒喝，過去自己想事情總是容易鑽牛角尖，讓負面的思考左右自己。越想，反而讓情緒的起伏波動更劇烈。學習去冷靜、有效的思考之後，現在的我，即使偶爾悲傷，也能讓壞情緒一閃而過，很快就走出陰霾，活得越來越有自信了！」


    - **小琪的指導靈說**：「去成為神的見證人，並在生命中創造奇蹟。」


