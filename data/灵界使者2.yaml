    # 第四章

    ## 你該知道的指導靈


    每個人誕生到這個地球上時，身邊一定都會有一個指導靈。


    指導靈的角色，就像是陪伴每個人成長、學習，面對疑難時進行靈性上的指導、建議、扶助的「監護人」。根據不同的文化背景、宗教信仰，有人會稱做守護神、守護靈，而在西方天使聖靈系統中，我們稱之為指導靈。


    就我的了解，指導靈是屬於高等光明的靈體，在天界的位階僅次於天使，要成為指導靈，必須經過各個「天使長」嚴格的考核和選拔，通過並獲得指導靈資格之後，才能跟隨每一個即將誕生的人類新生命一起來到地球，幫助人類就是指導靈修行、鍛鍊的基本課題，因為不斷有所貢獻而有位階的晉升。換個方式來解釋，指導靈就像是天界的公務員，系統龐大而有品級職等之分，相較於服侍上主的天使，指導靈的主要任務就是服務人類，幫助人類提升、向善。


    指導靈的陪伴是無時無刻、無微不至的，一天二十四小時都陪伴在我們身邊，比諸生命過程中最親暱的親友情人，指導靈跟我們心靈契合的程度其實更是有過之而無不及。甚至，當我們的生命走到終點站時，最後陪伴、引導我們走向彼岸的，也是與我們相始相終的忠實夥伴——指導靈，因為每個人在臨終前的信仰、思維的差異，也是指導靈也可能幻化各種形象來接引我們，有時是已往生的親友，也可能是菩薩、天使、聖靈等等，總之就是幫助人們在最無礙、放鬆的狀況下，盡可能沒有遺憾地離開這個世界，前往另一個光明國度。


    由於每個人誕生時，與生俱來的靈性基礎、開發程度不同，好比佛家所說「根器各有利鈍」，所以派駐在身邊的指導靈位階也各有差異，總是最適切於輔助、引導守護的對象為主。不過，當一個人在精神、性靈方面有所成長，提升到一定水準時，上面就會為他更換進階的指導靈，給予更深入、高階的幫助和指導，也讓這個人有能力去對其他人做出美好的影響。


    所以，一個人的一生中，只要不斷在心靈、意念上力求超凡脫俗，那麼他的指導靈就可能不斷更換，等級越來越高，相對的也會幫助守護對象的成就日益精進。以我自己為例，目前身邊幫助我、給我建議的指導靈，就是「大師級指導靈」，大師級指導靈就是頂級的指導靈，即將晉階爲天使了，祂們有可能原本是累世修持高深的修行者，或者是一方宗派、教門的領袖人物，也可能是在地球上已經締造難以數計的善影響、功德圓滿的高階指導靈。


    歷史上，許多出類拔萃的領袖、學者、藝文天才，例如：蘇格拉底、柏拉圖、貝多芬、羅丹、富蘭克林、甘地、華盛頓等等，身邊必然都有著大師級或是準大師級的指導靈，指導靈往往在關鍵時刻給予靈光乍現的臨門一腳，讓這些偉人的魄力、創意、才能，如流水般展現出來，目的不但是成就他們的豐功偉業，更要藉此造福世人、宣揚真理，就像國父孫中山先生所說的：「天才者，服億萬人之務也。」


    如果不是指導靈在人們最需要靈感時，適當地注入催化劑，在信心動搖時幫助堅定意志，那麼歷史上很多震古鑠今的事業作品，恐怕就難以呈現在你我眼前。那麼多人被樹上掉下來的東西砸到，爲什麼偏偏一顆蘋果讓牛頓發現「萬有引力」？爲什麼耳朵已經全聾了，貝多芬依然堅持創作，寫下那璀璨的交響樂章？倘若因爲貧困交迫、債台高築就放棄了，羅丹能完成「巴爾扎克」、「沉思者」那麼多劃時代的精彩雕塑嗎？幾乎所有人看到閃電都避之唯恐不及，富蘭克林卻由此進行實驗發現了電，若不是他發現了電的可用之處，愛迪生會發明電燈、我們今天能有電腦用嗎？


    我相信自己的努力足夠，幸運也足夠，所以走在正確的服務道路上，並因此受到上天眷顧，配備了大師級的指導靈。這對我的命理事業助益極為龐大，因為指導靈的等級夠高、資歷夠深，才能夠幫助我接通天界龐大而繁雜的資料系統，深入調閱每一個人的前世今生，乃至於揹負在人們身上因果業力的詳情，當有人因為遭遇困難、瓶頸、危疑向我求助時，我就能快速找到問題的關鍵所在，並且正確地對症下藥，給予最有效、具建設性的建議。


    當然，一般普羅大眾所配備的指導靈，多數為普通等級的指導靈，其中有些可能是來自於自己的祖先長輩。不管等級為何，指導靈都是慈悲、善良、為人類著想的，充滿了愛與和平的思想，絕不可能出現威脅、恫嚇、黑暗的意念。凡是讓人類產生恐懼的，肯定不是上天指派的指導靈，應該是冒充的邪靈或低階靈體。


    可能你還是要問我，真的有指導靈二十四小時緊緊跟隨著嗎？無論做什麼事情祂都看著嗎？那麼做一些私密的事情時，豈不是會很不好意思嗎？這樣的想法其實是過度擔心了，自己和指導靈事實上就是一體兩面，你就是指導靈、指導靈就是你，再沒有比這更契合緊密的程度了。指導靈看著你，就好像你從鏡子裡看自己，如果有什麼事情，是你看著自己做時也會害羞、無法接受的，那恐怕就是虧心事或嚴重缺乏自信了，在聖歌《愛的真諦》裡面不是教導我們「不做害羞的事」嗎？當你打從心裡覺得害羞、無法坦然時，就該反省自己的態度和作為了。


    至於要如何感覺指導靈的存在呢？讓我來告訴你，在你的生命體驗中，是否曾經在過去的時光裡，不經意地做了什麼感覺並無特殊意義的事情，或是沒來由地堅持購買某個看似無用的物品，卻在長久以後的重要關頭，發現這件事、這個東西居然巧妙地派上用場了，神奇地解決了讓你原本很頭痛的問題。又或者，進行某些計畫、創作某些作品時，突然遭遇瓶頸卡住了，就在乾著急的當下，身邊出現了一個小插曲，吸引了目光、思緒的轉向，剎那間福至心靈，全新的創意、靈感引領你衝破難關。這一切種種，就是指導靈在每個關鍵時刻，不著痕跡的巧妙安排。


    在學院中，我會指導學員們運用靈擺，跟自己的指導靈溝通，藉以解決生活上的一些疑難。不過，久而久之，有些學員會向我抱怨：「老師，好奇怪喔！剛開始指導靈都會很熱心給我建議，但最近卻不太理會我了。」怎麼會有這種狀況？指導靈應該是不會拒絕任何求助的。經過我通靈查詢結果，才知道，她們太濫用指導靈的力量了，問的問題太過瑣碎，而且明明指導靈已經給過答案了，但因為答案不是自己想要的，就重複一直問一直問，這就好像連小事都要去廟裡擲筊求籤，求不到吉籤就執迷不悟一直求下去。指導靈看到她們依賴心變得這麼重，變得沒有主見、無法獨立，這樣根本不可能進步，乾脆暫時封閉溝通管道，等待她們靠自己的力量覺醒。


    所以，在這裡我要告訴大家，指導靈來的目的，是為我們的生命規劃最佳的路徑、創造最大的福祉，因此所給的建議都會是最正確、經得起考驗的選擇，但是正確不代表是你想要的，至少未必是目前想要的，總是要有足夠遠見、意志堅定的人，才能以客觀態度接受正確的建議。


    然而，有些無法受教的人，往往因此離棄了指導靈給予的康莊大道，反而鑽進了沉淪、愚昧的死胡同，就像一些酗酒、嗑藥的上癮症患者，或者揹負其他不良業力卻不思進取改善的人，即使指導靈從他的心裡面不斷告誡「這樣子不好」、「這麼做不對」，仍然無法把他拉回正途。畢竟，指導靈只能從心靈方面做努力，蒙蔽心靈、違心而行的人，指導靈雖不會離他而去，但也只能在一旁搖頭嘆息，愛莫能助。


    其實，人類真的是很幸福的，在浩瀚的宇宙中，能夠獨受垂青眷愛，有那麼龐大而完善的天使聖靈系統守護、支持我們，沐浴在慈悲、溫馨的光明力量之中，你是否和我一樣感動？


    如果，你想要更了解指導靈是如何看顧、引導你，或是想要學習如何跟自己的指導靈溝通、對話，獲得全方位的指導，歡迎你隨時造訪沈巒魔法命理學院。


