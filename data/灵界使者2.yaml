    ## 關老爺的指示


    ### 語庭請示：為何感情無法持久，總是遇不到對的男人？


    並不是從未遇到過正確的緣分，而是未去努力修成善緣。要反問自己，面對每一次的感情，是否付出足夠的專注、專心，全心全意去為對方著想？用心經營感情，才是真正修得善緣的方法。


    其實感情緣分不過正緣已經好幾世了，累世的感情不圓滿，導致心靈當中的空虛不斷累積。尤其過去曾有一世身爲國色天香的大美女，且是當代眾星拱月的成功藝術家，但由於高傲的緣故，在感情上讓許多人受傷、失望，甚至還嘲笑、不屑那些爲妳朝思暮想、傾家蕩產的追求者。


    前世果報，今世顯現，命中帶有「輕忽感情」、「不珍惜」的不良業力，曾經對感情的忽略、不在意，勢必讓自己也在今生體驗到爭取不到、感情付出沒有回饋的經歷。今世在感情上的重要課題，就是要去學會懺悔累世的不珍惜，才會開始有好的回報。


    心存正念，問心無愧，讓良心回來，跟隨良心而行才是唯一指標。因爲未來將會面臨一個考驗，只要真誠對待感情，並在日常生活中身體力行，就能通過考驗並一舉清除累世的業力。目前遇到的人並不是正確的良配，完全沒有和對方續修善緣的必要。不該留住的就不要留，遇到不好的為何不走？執迷也是一種罪，離開吧！


    ### 家希請示：如何成為一個成功的命理工作者，並獲得主神快速而準確的指引？


    #### 關老爺的指示


    不要問自己能否成為一個成功的命理工作者，而要問自己是否決心成為一個有良心的命理工作者！


    神明是慈悲的，在給予人們指示或指引的時候，絕對不會導入任何使人害怕的情緒。所以，只要心平氣和，不需要緊張，依循正道而走，主神不會讓你招引任何麻煩或問題的。


    目前通靈的層級還沒到達標準，所以在命理工作中，還無法快速而準確地接收訊息指導。時機未到，持續努力自然可以水到渠成，這只是時間早晚的問題而已。


