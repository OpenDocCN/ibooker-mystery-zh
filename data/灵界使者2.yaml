- md: '## 第二章


    後，情況不但沒有改善，反而跟鬼魂更加有說有笑，完全不理会旁人的感覺，家人制止她也完全不聽。聽到這樣的情形，我也有點生氣，不客氣地質問妮妮：「看來，妳根本不想擺脫鬼魂的糾纏，反而很享受這種感覺？」聽到我的質問，妮妮竟然露出詭異的笑容，表情就好像是小孩子惡作劇被抓到一樣漫不在乎，她坦言：「是啊！我很喜歡跟鬼在一起的感覺！」


    原來，自從開始受到符法控制之後，妮妮的生活陷入極端的不正常，漸漸的沒有朋友、沒有感情、不愛出門，摒棄一切社交活動，生活的重心只剩下與鬼魂溝通，只有鬼魂是唯一和她分享悲喜的「朋友」。據妮妮透露，鬼魂甚至每天夜裡來壓在她的身上，與她交媾，而鬼魂給她的高潮，更是讓她打從心底不想抗拒，就這樣墮入夜夜交歡的肉慾之中。


    也許是一抹良知尚未泯滅，根據葳葳的描述，她妹妹目前陷入了很嚴重的人格分裂當中，有時候跟鬼魂相處甚歡，有時候又覺得自己很髒、很羞恥，不斷洗澡、擦拭身體、換衣服，甚至連上完廁所出來，都會不由自主，一直反覆問著：「我這樣乾淨嗎？我這樣乾淨嗎？」看到這樣，我心裡的悲憫油然升起，且別說鬼魂的玩弄對妮妮的心理狀況造成怎樣的破壞，光是每天這樣卑鄙地侵蝕消耗她的精氣能量，久了就一定危及她的生命。


    當我再次使用「七脈輪寶石治療」為妮妮的身體進行清理時，她才躺上去，鬼魂就逃之夭夭了。妮妮說：「它很害怕寶石的能量，尤其白水晶的力量讓它特別不舒服。其實，今天它一直阻止我來這邊，因為它說沈嶸老師一定會拆散我們。老實說，我來這裡真的對它很不好意思。」聽了妮妮的說法，我暫時並不言語。


    等到治療結束，妮妮又恢復磁場清淨、身體放鬆和心靈舒適時，我才心平氣和地對她說：「記住妳現在全身舒服的感覺，人生就應該活得這樣輕鬆自在，而不是畏縮在陰暗的空間，和黑暗汙穢的東西糾纏不清。冷靜想想，妳不覺得那樣子活著很不值得嗎？」末了，我讓她戴上學院的護身寶物，並再次耳提面命：「其實最有力的武器就是妳的意志力，心正則諸邪不侵，相反的，如果妳還是執迷不悟，繼續沉淪在慾念當中，那神明也幫不上妳的忙！」


    鬼魂為了迷惑、操弄人類來騙取供饗，往往利用物慾、情慾、肉慾來引誘、控制意志不堅的人，這種做法就像是引誘人染上毒癮無法自拔，毒品最終一定會害人送命，鬼魂惡意的給予也一樣讓人遭到業報。所以，千萬不要被眼前鬼靈製造的假象給迷惑了，一點小小的甜頭，往往隱伏著重大的災禍報應。


    ### 鬼魂大多用哪些方式迷惑人類？


    一定是為了撈取某些好處，鬼魂才會依附在人身上，它們常會以言詞哄騙，表示自己會忠實地待在「宿主」身邊，表面上裝成好朋友，並暗示會帶來好運，實際上是要逐步操控、侵蝕、佔據人體。


    ### 防止鬼魂惡意的靠近，應該隨身佩戴哪些東西？


    透過老師正氣、正念加持的寶物，例如水晶驅魔五行鍊，或者泡具有除穢淨化功能的古鹽沐浴，平時可點燃加過的薰香淨身，也可飲用我們學院獨有的財運旺旺茶，從體內開始清淨磁場，讓身體由內而外散發能量之光，惡鬼畏懼這種光芒，自然就難以靠近。


    ## 如何知道自己是否被人下符咒或施邪術？


    被下符施術的人，通常會明顯感覺運氣急轉直下——原本順遂的會突然四處碰壁、一時間慌亂無依，情緒無法控制；而原本就不順的，更會直接盪到谷底、難以翻身，產生想要尋短的傾向。反應在身體健康方面，會有不明怪病不斷纏身、無法根治的情形，而且印堂發黑、脾氣暴躁，生理的不適跟心理的變異交互衝擊，動不動就與人爭吵失和，人際關係敗壞，孤立無援。最精準的判知方法，我會建議來學院進行通靈檢測，除了測試是否遭人惡法暗害，也可找出自己磁場氣運的漏洞，事先預防，便可大幅降低被下符施術的可能性。


    ## 人貓情未了


    彩螢時常到學院來向我諮詢運勢方面的問題，無論遭遇到哪一方面的疑難，她都希望參考我的意見來解決。單身的她，把自己養的貓咪喵喵當女兒一般寵愛，甚至大約兩年前喵喵往生之後，她還隆重其事，像對待親人一樣辦後事、入塔位，三不五時就前往祭拜、追思。


    或許是因為生活中驟失重心，彩螢一直無法從思念喵喵的悲傷氛圍中走出來，與別人聊天的時候，總是動不動就提起曾經和貓咪共處的點點滴滴。就連來到學院的時候，彩螢一邊向我諮詢的同時，也總不忘帶到幾句喵喵的事情。


    為此，我不只一次諄諄告誡彩螢：「逝者已矣，要試著逐漸放下，不要投注太強烈的思念在動物靈的身上。因為動物靈的腦波思維比較簡單，如果妳一直用思念抓住牠，會讓牠捨不得離開，造成彼此靈魂的連結，不但無法順利投胎轉世，恐怕還會回頭來跟隨妳。不只別太常思念、掛在嘴上，更不要前往動物納骨塔去祭拜。那個地方充滿了各式各樣來歷不明、死因不詳的動物靈，陰氣非常深重，沾染上身對運勢會有極大程度的損害唷！」


    聽了我的勸告之後，彩螢果然有比較收斂，往後就不常提起貓咪的事情了。直到有一天，彩螢又來到學院做命理諮詢。等待的時候，她踱步來到魔法寶物的櫥窗前瀏覽，突然間，她面前一條寶石手鍊「啪」的一聲掉落到地板上，摔了個粉碎。就在大家都愕然一驚的當下，我卻清楚知道，手鍊並不是彩螢弄掉的，而是剛才有一團黑影從她身上蹦出來，那團黑影突然伸出「爪子」把手鍊給撥落了。


    事實上，從彩螢一踏入學院開始，我就感應到她身邊有一團灰黑陰暗的能量跟著，而且很活潑地跳過來、跳過去，彷彿一刻也安靜不下來。當我開始凝聚腦能量緊盯著那團黑影時，它開始畏懼，活動力也漸趨減弱，變得懶洋洋的樣子，最後乾脆縮到彩螢的身體裡躲起來。當彩螢凝視著寶石手鍊時，可能是手鍊的能量太強，讓那團黑影不舒服，終於忍不住把手鍊撥落到地面上。


    初步的通靈結果，我發現這團晦暗的能量並不是人類的鬼魂，大概心裡就有數了，立刻問彩螢：「妳最近是跑去哪裡了？怎麼卡動物靈卡得這麼嚴重？」


    彩螢大吃一驚，她坦承：「清明節的時候，我因為實在是太思念喵喵了，所以跑去祭拜牠，說說話⋯⋯」


    「拋開思念不是嘴巴上不提起就可以了，心裡的執念也要放開！難道妳祭拜回來之後，都沒有感覺怪怪的嗎？」我進一步追問。


    「真的！」彩螢張大了眼睛說：「最近我家裡真的是怪事連連！我老是覺得身邊有什麼東西跳來跳去，搞得我心神不寧，老是沒來由地就覺得心慌、很害怕，但也摸不清究竟是在害怕什麼。最奇怪的是，家裡面的東西常常莫名其妙摔落、跌破，又不像是風吹的，好像是有人故意跟我搗蛋，想要引起我的注意。而且，前幾天我跟老師結緣的三條魔法手鍊，突然自己斷裂了，所有寶物都完全失去光澤，顏色也走樣變灰暗了。我就是擔心是不是有什麼不好的事情要發生，今天才會跑來找老師。」


    進一步通靈之後，我又問彩螢：「妳是不是跟喵喵訂下了什麼誓約？牠表示，是妳心甘情願帶牠回家的，所以風水寶物才沒有擋住牠。反而是喵喵一直受不了被光明能量照射，才會不斷進行破壞。剛才是因為妳聚精會神盯著寶石手鍊，讓牠受不了，更怕妳買回家，所以乾脆先下手為強。」


    大概是感覺到事態嚴重了，彩螢支支吾吾、不好意思地說：「我在祭拜的時候，有對牠說，喵喵，媽咪好想你，如果可以的話，媽咪希望你以後可以投胎來當我的子女，讓我繼續疼愛你。我想，我一直那麼疼愛喵喵，牠應該不會害我吧？」


    「雖然牠不會存心害妳，但是卻會纏住妳！」我說：「這種陰暗的磁場，只要一直接黏在妳身邊，久而久之就會產生負面的壞影響。妳的意念會開始迷糊、錯亂，無法做出正確決定，運勢也會越來越低落、諸事不順，最後極可能會有自殘、輕生的傾向。而且，由低階動物靈轉世投胎的孩子，通常會有先天腦能量不足的問題，無論是智慧還是運勢，起步、成長都會差別人一大截！妳根本不清楚狀況，怎麼可以在那種敏感、陰氣重的場所，輕易許下這種很可能導致嚴重後果的承諾？」


    輕輕嘆了口氣，我取出「除穢香」和「驅魂鈴」，一方面幫彩螢清淨周身的磁場，跟負面能量做隔離、切割，一方面指導她這麼說：「喵喵，你走吧！一路好走喔！不用掛念媽咪，趕快前往光明的國度修行吧！一路好走喔！」在芬芳的氣息、和脆的鈴聲中，我清晰感應到，黑暗的能量逐漸淨化、轉淡，冉冉地飄向遠方。


    ### 和寵物的緣分可以延續到來世嗎？


    在我漫長的通靈命理過程中，從來沒有這種例子出現過。而且，隔世之後，彼此都已忘記前緣，延續也是沒有意義的。


    ### 動物靈和人類的鬼魂有何不同？


    大部分動物靈的跳躍性、活動性都比較高，不會盤踞在固定地點不動，牠們習慣依存在人類身邊，不太會直接附身。


    ### 寵物往生之後，該如何處理，對主人和寵物都比較適宜？


    依循正常的管道處理，直接把寵物的靈送走，既然已經緣盡，就可能不要有任何依戀，難分難捨不但妨礙寵物的轉世投胎，也可能造成飼主本身後續的麻煩。


    ## 阿爸有話要說


    做爲一個命理工作者，我很喜歡爲大家解惑、看清未來的道路，但由於通靈的能力太強了，難免偶爾要扮演「靈媒」的角色。雖然有些無奈，但只要看到許多人鬱悶的心結因而獲得開解，那麼與陰靈溝通時的頭暈、想吐也就值得了。


    秀綿是長期找我算命解惑的客戶，每次我經過通靈所給予她的指示、建議總是讓她信服不已，也因此在工作上解決了不少疑難。


    不過，有一次秀綿卻攙扶著一位看來極爲樸實、敦厚的老婦人來到學院，風塵僕僕的模樣，應該是剛從遠方趕車過來的吧！


    一坐下，秀綿立刻介紹：「老師，這位是我母親，她有一些問題想請教您。」


    這時候，突然從秀綿母親的身後冒出一個龐大的黑暗靈體，快速「走」到我身邊，還伸手用力推了我肩膀一把。我因此用力晃了一下，趕緊運用靈眼透視，竟然是一位滿臉怒容、吹鬍子瞪眼睛的老先生，兩手交叉環抱胸前，兇巴巴地望著我和秀綿她們。


    剛才我的身體用力搖晃，讓秀綿和她母親吃了一驚，但接下來我所說出的話，讓她們更加吃驚，我說：「妳母親卡陰了，對不對？」


    秀綿用不敢置信的口吻說：「老師，您真是太神了！我媽媽最近真的是被怪事、怪現象騷擾到快神經衰弱了。她最近在家裡面，老是隱隱約約看到有人影走來走去，有時候又覺得有人如影隨形跟著她出出入入，家裡的東西會沒來由地更換位置，半夜也常出現怪異聲響。」


    透過感應，我知道身旁這個靈體和秀綿她們的關係非比尋常，於是對她們說：「應該是親人的靈回家了，可能有什麼重要事項非交代不可，所以做出一連串的舉動來引起注意，否則妳們也不會來找我吧！」


    「親人……？難道是我爸爸嗎？」秀綿說，我幫她向那個靈體做進一步確認：「請問，您是秀綿的父親嗎？」老先生點點頭，神色稍微和緩了一些。


    秀綿的母親當場眼淚迸出來，悲傷地說：「老欸啊！你是有什麼事情要交代，你來夢裡告訴我就好了，何必跑回家嚇我們呢？」


    秀綿在一旁向我解釋，父親在臨終之前的一段日子裡，就已經昏迷不醒了，以致於有什麼要交代的、心中有什麼放不下的，都沒能說清楚就撒手人寰了。


    只見老先生的靈體氣沖沖地對我說：「妳給我問她們，我都已經過世那麼久了，為什麼到現在還不給我的骨灰罈正位？讓我沒辦法安穩『入厝』，害我住在那邊都被『左鄰右舍』取笑，我『回家』想要問個清楚，結果根本沒辦法溝通，怎麼鬧她們都無法了解。」我稍微通靈調查一下，發現秀綿和她母親都是靈感比較不敏銳的人，難怪老先生沒辦法對她們托夢或是以任何方式做溝通。


    於是，我轉告秀綿她們：「為什麼還不給令尊的靈骨正位？」


    秀綿不好意思地說：「因為我們找的水準師傅，一直挑不到適合的時辰正式入塔，所以就只好一直暫厝。」


    聽了秀綿的說詞，我有些生氣：「還挑什麼時辰？眼前擺明了就是先人住得不安樂，還不趕快辦妥這件事？為人子女，辦理先人的身後事，不能總是考量要挑吉時吉位興旺子孫、庇蔭後代，要知道，讓先人不安樂，就已經先犯了大忌！」


    聽完我的轉告和指示，老先生靈體的情緒波動緩和了不少，但接下來他又焦急地要我轉問：「老么呢？為什麼他沒來給我送終？告別式也沒來送我最後一程，一直到現在也從來沒到靈前拜過我，我很掛念他呀！」


    秀綿流著眼淚說：「阿爸，小弟他在外頭惹了麻煩，欠了很多錢，黑道天天找他要債，所以他暫時躲到大陸去避風頭了，現在他在大陸一切還好，您不用煩惱。等過一陣子比較沒事了，我會叫他趕快回來，到靈前給您上香的。」


    聽了秀綿的話，老先生的靈體說：「喔！我知道了，趕快把骨灰罈正位的事給我辦妥！」急促地丟下這句話，靈體「咻」的一聲轉頭走掉、消失了。


    這時候，秀綿才像是突然想起什麼似的，趕忙問我說：「老師，我想起來有些事要跟爸爸問清楚！」


    我無奈地說：「來不及了，令尊已經離開了。」


    聽到這個情形，秀綿的母親立刻答腔：「對啦、對啦！他從在世的時候就是這種怪脾氣，老是匆匆忙忙說完自己要交代的事情，然後轉頭就離開，從來不理會別人有沒有什麼話要說的，對啦！就是這個樣子。」


    唉！前一陣子我自己也才經歷喪父之痛，對於這次的事件真的感觸特別深刻。為人子女的，應該把握機會多關懷自己的父母，再怎麼忙碌，也別忘了撥空去握一握那曾經呵護、扶攜你的雙手。


    ### 親人的靈來接近時，會有什麼情形？


    就我所知，大部分親人的靈會回來，都是為了有所囑託或求助，如果無法以「托夢」達到溝通的目的，可能會有一些無傷大雅的惡作劇、或是較不具破壞性的舉動，以便引起陽世親人的注意，轉而尋求通靈命理人士的專業協助。


    ### 和親人的靈接觸，會對本身有害嗎？


    我必須告訴大家，只要是鬼魂，無論彼此的關係、接觸的目的為何，都難免帶有負面能量，只要接觸稍微頻繁，必然會對生人磁場造成或多或少的損害。以磁場屬性而言，「在世為正、過世為負」，正和負碰在一起，必然互相抵銷，對於本身運勢的正向提升和發展，一定也會相對削弱。


    ### 陰宅風水真的會影響子孫後代嗎？


    風水之說，信者恆信，不信者恆不信。為人子孫者，恪盡孝道，但求心安理得，「在世敬一口，更勝死後拜豬頭」，無論長上生前死後，都能夠讓自己心安的方式對待和處理。心不安，整天疑神疑鬼，家庭、工作都難免籠罩陰影，造成不順利的狀況，這樣又算不算陰宅風水的影響呢？


    換個角度來看，同樣一門風水，讓不同師承、派別的水老師來看，必然會各有各的說法，常人又該如何遵循？以我自己而言，還是寧願相信父母在世時盡心孝順、一家和樂最重要，何必在意陰陽兩隔之後虛無縹緲的事？只要心安理得、量力而為，納骨塔、樹葬、植葬未必就不如工程浩大的墓園。


