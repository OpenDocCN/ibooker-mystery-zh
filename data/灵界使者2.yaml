    ## 第六章

    開運十大步驟


    ### 步驟一

    親算論命——全方位解析問題


    中醫說：「望、聞、問、切。」其實我從事命理服務時，也是秉持這樣的原則。觀察客戶的氣運磁場、傾聽他們的疑難雜症、問清楚內心的需求、確實診斷出最佳的解決改善方式。


    超過十年的服務經驗，我自信擁有深厚的專業命理學識與通靈的特殊感應能力，因此，舉凡任何大小事件，我皆能給予客戶一個清晰的答案，並且協助他們在人生的道途上更加順利。


    通常在四十分鐘內的個案服務中，不限任何問題，我提供的服務大致包含以下三大項目：


    ### 塔羅牌占卜


    運用塔羅牌來解析客戶的事件問題、感情對應關係、進入對方腦波讀取訊號、探測未來走向⋯⋯


    ### 紫微斗數命盤分析


    每一個人出生時，帶來了屬於自己靈魂的業力密碼，這些密碼的組合是經由前幾世自己所創造的因與果交織而成，也就是個人的靈魂印記。這些印記資料被整理整合成一套個人的系統，也就是紫微斗數命盤。


    紫微斗數是一套古老而精密的演算系統，隨著年月日時的變化而帶出不同的、屬於個人的訊息路徑，直到今日還是相當準確。出生命盤記錄了每個人這輩子所要面對的人生課題與挑戰，若是忽略與生俱來所設定的命盤路徑，很可能會錯過此生重要的轉機與成就。而我就是根據客戶的命盤，根據所需分析財運、愛情運、事業運、十年大運與流年運勢。


    ### 通靈解讀


    運用通靈的方式，接收來自天界的訊息，從龐大的靈魂資料庫之中，查詢想知道的事、查詢是否有正姻緣、查詢心儀的對象或眼前的伴侶是否為正姻緣、查詢前世今生資料、引導客戶與指導靈接軌、查詢客戶的能量場是否有外靈介入、查詢生命藍圖當中任何想知道的資料、傳達聖靈界特別的訊息、手機號碼能量探測、居家風水能量探測、姓名與英文名是否生旺、事業與財運能量分析、請東方神明解析因果問題、卡陰與鬼魂各類問題處理⋯⋯


    從事命理諮詢這麼多年，我服務與教學的對象遠超過千人，將塔羅牌占卜與紫微斗數相結合，再運用獨特的通靈感應力去接收聖靈界訊息，不拘泥於門戶派別的服務，才真正能夠全方位解析客戶的問題，進而達到強化運勢的效果。


    ### 步驟一

    運勢加分——檢測運氣、七脈輪


    來到魔法命理學院，首先我們會運用「靈擺」進行檢測，測驗客戶的運勢磁場目前處在什麼樣的狀況。另外，也會針對人體的七個脈輪逐一測試，了解是否運轉順暢、生生不息地散發能量。


    七脈輪指的就是人體的七個脈輪場，當我檢測客戶本身的能量頻率，發現呈現「負面」的情形時，就表示他身上的脈輪有卡住、運作不順暢的狀況，卡住的負能量會嚴重影響氣運與健康，造成工作、感情、健康與財運的不順。


