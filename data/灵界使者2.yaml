    當脈輪卡住的時候，就必須進行「七脈輪寶石治療」，這是神奇而有效的水晶寶石能量治療，專門對應在人體的七個脈輪場，協助強化調整身體的能量頻率，並且使得靈氣氛圍保持應有的亮度與彩度。此身體療法是由我通靈下來的一個新的系統，在指導靈的協助之下，運用光波與寶石能量波，將宇宙光源灌入失衡的身體頻率中，導正偏差性能量而回復身體應有的正頻率。


    「七脈輪寶石治療」運用宇宙三大元素導正身體頻率，將紅、橙、黃、綠、藍、靛、紫色寶石放置在身體的對應區域，再導引特定光波，結合植物花精與保護靈氣灌入需要的能量場，活化並且鬆動儲存負頻率之脈輪。將黑色雜質排出靈氣場，強化身體能量，增加動力與清晰的決斷力。此療法所運用的彩色寶石，都是經過我精心篩選波頻正確穩定的能量石，再配合多種元素之花精與宇宙光源，確保每一位客戶的能量場，在經由調整之後能維持穩定平衡。


    ### 步驟三

    靈氣的武裝——魔法保護靈氣


    開運最重要的課題，就是「清除壞的」、「招來好的」兩大主軸雙管齊下。所以，我會要客戶平常在居家環境、辦公營業場所，點燃經過灌注能量、光明加持的魔法線香，除了有淨化環境、驅除穢氣的功能之外，還能夠分門別類根據客戶當下的需求招來各種好運氣，包括：財富、事業、桃花、貴人、健康……而且不分日夜時間都能隨時點燃，非常方便。


    除了點燃魔法線香之外，也能夠運用「魔法保護靈氣」來增強自己的磁場運勢。「保護靈氣」（The Pomander）為英國 Aura-Soma 學院所出品的一系列產品，內含有色彩、植物精華與水晶寶石的能量頻率，旨在保護與平衡我們的能量場之穩定運作。


    「保護靈氣」每一瓶依色彩的分別而有不同的作用，可以隨身攜帶給予使用者支持與保護，並在靈氣磁場形成一個彩光的保護膜，防止負能量的侵擾。尤其重要的是，在十五種不同顏色的「保護靈氣」當中，有我從天界導引能量所灌注的高階魔法，依據不同顏色而有不同的開運功能，例如：金黃色的「成功瓶」、翠綠色的「財富瓶」、寶藍色的「智慧瓶」、珊瑚色的「桃花瓶」等等。而這就是我們學院獨家創造的「魔法保護靈氣」——魔法加上保護靈氣，讓護持、淨化、開運的能量更加旺盛。


    經由我不斷的實驗證明，當一個運勢低落呈現負能量的人，在使用特定顏色之「魔法保護靈氣」之後，本身的能量場會瞬間被提升至正能量，並且效果可以維持三至五個小時，所以建議每天使用至少三次。每一瓶的「保護靈氣」皆帶有不同的能量頻率與訊息，這是來自特定的寶石、色彩與植物所混合而造成的協同作用。


    對於「魔法保護靈氣」感到好奇、有興趣的人，不妨親臨學院參與研習「保護靈氣教學課程」，這是為了想要多瞭解每一瓶「魔法保護靈氣」的特定作用而產生的課程，這項課程由聖靈與我共同指導教學，所以客戶會在課堂當中得到通靈的訊息，針對每一瓶「保護靈氣」的作用，將有深入的分析與瞭解。這將有助於每個人在使用「保護靈氣」時，能更加明瞭在何種狀況之下，使用何種的「保護靈氣」能夠更為恰當。


    至於「魔法保護靈氣師父瓶」（Quintessence），則為「魔法保護靈氣」的高階版，因為靈魂進化至更高的階段時，極需要更為快速與有力的支持。這些粉彩系列的師父瓶正是適合靈性成長的追求者，師父瓶的高頻率有助於與宇宙中的高靈師父們接軌，幫助自己也幫助其他人類朋友提升意識與靈魂轉化。


